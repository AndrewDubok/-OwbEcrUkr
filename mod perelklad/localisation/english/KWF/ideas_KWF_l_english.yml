  kwf_hardened_survivours:0 "Survivors of the Endless Voyage"
  kwf_hardened_survivours_desc:0 "Forged by famine, mutinies, and endless storms, our people who do not bend. We may lack the numbers, but our will is an anchor against any tempest."

  kwf_scarcity:0 "Scarcity Forged Society"
  kwf_scarcity_desc:0 "What is not earned remains untouched. Our children grow with one eye fixed on the ledger, the other on the ration barrel. Nothing squandered. No rest taken."
