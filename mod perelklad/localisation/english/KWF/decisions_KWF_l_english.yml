  KWF_wargoals_dec_cat:0 "§7Salt for the Salt Throne!§!"
  KWF_attack_andale:0 "§RNo Cannibals on the Ship§!"
  KWF_attack_andale_desc:0 "There are lines no man should cross. The people of Andale did, and they call it life. Eating your own is not survival, it’s damnation. The Drowned King will not share his table with such monsters. We'll put them down, and put an end to their feast."
  KWF_attack_bos:0 "§gSteel Pots§!"
  KWF_attack_bos_desc:0 ""
  KWF_attack_rivet:0 "§5The Floating City§!"
  KWF_attack_rivet_desc:0 "Whatever it is now, it used to be an aircraft carrier. It should be a capital on the waves, a beacon rising from the sea. We will take it and make it the heart of our kingdom."

