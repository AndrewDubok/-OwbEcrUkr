l_english:
  kwf_only_the_sea:0 "Bon Voyage"
  kwf_only_the_sea_desc:0 "Bon Voyage\n\nOur tanker's setting sail."
  kwf_our_compass:0 "When It Snapped"
  kwf_our_compass_desc:0 "Our tanker was almost swallowed by the sea."
  kwf_we_shore:0 "Let Us Be Free"
  kwf_we_shore_desc:0 "High tide\n\nLow tide."

  kwf_real_food:0 "Finally Some Real Food"
  kwf_real_food_desc:0 "Our galley did not have a wide variety of food: mushrooms, radioactive fish and rare vegetables grown by even rarer specialists. But now that we have solid ground under our feet, I have more ingredients to work with."
  kwf_burn_grove:0 "Burn the Grove"
  kwf_burn_grove_desc:0 "These tribals cling to their groves as if the swamp itself were holy. Let them burn with it. We shall seize their lands, break their spirits, and chain their hands to our work."
  kwf_root_tea:0 "Drink the Root Tea"
  kwf_root_tea_desc:0 "The Eden folk whisper of roots steeped in tea, a bitter brew said to show harmony with the swamp. "We are the children of the garden, as are they," said Delmar. "We shouldn't be enemies with these people." I don't see the point, but we might as well give it a try."
  kwf_salt_the_soil:0 "Salt the Soil"
  kwf_salt_the_soil_desc:0 "The swamps may feed the weak, but salt claims all in the end. Whether through fire and chains, uneasy pacts, or bitter brews, we have secured our rightful place. Now, salted with blood, sweat and toil, the soil will serve us."
  kwf_cradle_of_rust:0 "Cradle of Rust and Algae"
  kwf_cradle_of_rust_desc:0 "Our first foothold on land is no shining city, just a harbor of iron scraps. Still, it is ours. From this cradle of rust, we will grow something stronger: a home that no storm can sweep away."
  kwf_manifesto:0 "Finders Keepers"
  kwf_manifesto_desc:0 "Two centuries of scavenging at sea made us clever with scraps, but land holds greater treasures. Machines, tools, forgotten vaults buried in the mire, whatever we find, we keep. No one else has the right to it, for no one else endured what we did."
  kwf_drills_in_mud:0 "Drills in the Mud"
  kwf_drills_in_mud_desc:0 "A sea-born army doesn't march on land without stumbling. If we are to fight the swamp tribes and defend Rustport, the Harpooners must learn new techniques. The mud will teach them to stand, and their drills will hammer that lesson home."
  kwf_finders_keepers:0 "Scavenger's Manifesto"
  kwf_finders_keepers_desc:0 "We take what we need, mend what we can, and make do with the rest. The swamp will not welcome us, but it will feed us all the same. Nothing is wasted, and nothing is left behind."
  kwf_echoes_of_depths:0 "Echoes of the Depths"
  kwf_echoes_of_depths_desc:0 "For years, we thought it was Salt alone guiding us. But deeper still, beneath the waves, there are echoes of a different voice. A gentler one. A patient one. It calls us not to drown, but to take root, to drink and to preserve."
  kwf_beneath_the_salt:0 "Beneath the Salt"
  kwf_beneath_the_salt_desc:0 "I have walked the decks and I have walked the swamps, and in both I have heard the same voice. The salt does not lie. It binds the flesh, it binds the soil, it binds us. Beneath its weight lies the Garden, waiting patiently. If we bow to its truth, it will raise us up, not as sailors or castaways, but as Keepers. Come, let us walk beneath the salt together."
  kwf_dry_command:0 "Dry Command"
  kwf_dry_command_desc:0 "Let the cultists chant about their salt and their garden. The true strength of a crew lies not in visions, but in order, records and command. My word is the tide that guides us, and with a ledger in hand, we shall chart a course that no delusion can mislead." 
  kwf_rusted_few:0 "Rusted Few"
  kwf_rusted_few_desc:0 "Our voyage has left us all rusted, but not broken. Some cling to the garden's whispers, others to the steel of their harpoons. I care little for the shape of their faith, only that they fight. When the storm comes, I'll call on those who still have salt in their veins. The rest can step aside."
  kwf_smoke_on_water:0 "Smoke on the Water"
  kwf_smoke_on_water_desc:0 "The swamps will burn, and the smoke will ride the water like a warning to all who'll try to stand in our way. We didn't survive for all those years to bow to false prophets or swamp ghosts. This war will end with us on solid ground, or not at all."

  kwf_glow_in_the_smoke:0 "Glow in the Smoke"
  kwf_glow_in_the_smoke_desc:0 "Smoke rolls over the water, and in it I see trouble. The atom-folk and the fire-folk are both consumed by heat, with no thought for the future. You can't eat smoke; you can't boil stew on false light. If they're left to burn and glow, they'll consume the entire swamp. It's best we snuff them out before they spoil what's left."
  kwf_radioactive_love:0 "Radioactive Love"
  kwf_radioactive_love_desc:0 "These folk bow before their Trinity: the Father, the Son and the Holy Glow. Fools, some may say. But I see something else. The Salt God is no stranger to the light, his garden is proof of that. If I can show them that the Glow is His fire and the Garden is His Eden, then their Trinity will welcome us as brothers in faith."
  kwf_ain_no_sunshine:0 "Ain't No Sunshine"
  kwf_ain_no_sunshine_desc:0 "There's no saving some folk. Their glow doesn't lead to harvest, only to graves. No mercy in the mire. To maintain our own, we must extinguish their light, hold our ground, and persevere. It's better to have no sun at all than the wrong one."
  kwf_burning_desire:0 "Burning Desires"
  kwf_burning_desire_desc:0 "These firemen burn everything they touch until there is nothing left to eat or hold onto. But fire doesn't just destroy. It cooks, it hardens, it keeps men alive through the cold nights. If we can harness their fire, it could feed us."
  kwf_hotter_than_hell:0 "Hotter Than Hell"
  kwf_hotter_than_hell_desc:0 "The Fireman seek warmth in a fleeting fire. Let it burn them hollow and leave them cold."

  kwf_herons_sing_no_more:0 "Herons Sing No More"
  kwf_herons_sing_no_more_desc:0 "They holed up in that rusted Poseidon plant and spun some contraption they call the Great Wheel. Whatever knowledge they claim it gives, it's just machines grinding against machines. Time to shut them down."
  kwf_turn_turn_turn:0 "Turn Turn Turn"
  kwf_turn_turn_turn_desc:0 "They call their sea god Poseidon; we call ours the Salt God. Different names, same depths. Believers swear their Wheel is spun by his hand, and we swear the tides answer to ours. Both can't be right. The Wheel will turn, and this season, it turns for us."
  kwf_wheel_in_the_sky:0 "Wheel in the Sky"
  kwf_wheel_in_the_sky_desc:0 "Others bled for that plant before these cultists tossed 'em out. They're convinced that the wheel will save them. We can't let them keep it. If the Wheel really speaks, it'll speak for us once we wrench it free of their hands."
  kwf_heard_it_through_the_swampvine:0 "Heard It Through the Swampvine"
  kwf_heard_it_through_the_swampvine_desc:0 "The swamp carries whispers that Eden's time is ending. We'll catch those whispers, twist them into truth and use their own vine to strangle their grip."
  kwf_the_sound_of_mire:0 "The Sound of Mire"
  kwf_the_sound_of_mire_desc:0 "Eden promised a new garden and gave nothing but rot. All I can hear is the swamp gurgling beneath my feet. May the swamp drown their voices for good."
  kwf_muddy_mire:0 "Muddy Mire of War"
  kwf_muddy_mire_desc:0 "The swamps slow every step, but we've learned to push through. Mud teaches patience and hardens the back. The land weighs heavy, but it hardens the will."
  kwf_mud_tax:0 "Mud Tax"
  kwf_mud_tax_desc:0 "Living on shore ain't free. Every roof, every tool and every wall costs caps or blood, usually both. People complain about the cost of these dues, but the reserves grow, and with them, our ability to trade and build."
  kwf_wheel_of_fortune:0 "Wheel of Fortune"
  kwf_wheel_of_fortune_desc:0 "The Poseidon priests say their Wheel turns fate itself, giving ‘em answers from the sea gods. I dunno about that. To me, it looks like a broken hunk of metal spitting sparks. But if it helps us learn, then maybe there's fortune in it after all."
  kwf_home_rustport:0 "Our Rusty Little Home"
  kwf_home_rustport_desc:0 "There were waves and salt in our mouths, but now, for the first time, we had a piece of land that was ours. Rustport ain't much. It's just rusted beams and half-sunk shacks. But it's ours. No tide will wash it away. After centuries of drifting, we finally have a home."
  kwf_frozen_shores:0 "Frozen Shores Forever"
  kwf_frozen_shores_desc:0 "At last, the mire gives way to firmer ground. What was once mud and decay offers the promise of a home that we can protect. Let's forget the past, we take the shore for ourselves."
  kwf_two_centuries:0 "Two Centuries of Rust"
  kwf_two_centuries_desc:0 "Maybe this is where our real journey starts, not on the waves, but here, on land."

  kwf_garden_beneath_the_waves:0 "Garden Beneath the Waves"
  kwf_garden_beneath_the_waves_desc:0 "I was taught that paradise lay below, that the sea would cradle us in its dark embrace. But I have seen the folly of that dream. The true garden is not drowned beneath the waves, it waits here, upon the land, for us to sow."
  kwf_work_of_the_faithful:0 "Work of the Faithful"
  kwf_work_of_the_faithful_desc:0 "Your hands are the covenant. Not in blood, but in labor. Raise walls, till the soil, plant seeds. In this work lies the true prayer. Through it, the garden will take root where the sea could never reach."
  kwf_painted_in_ink:0 "Painted in Ink"
  kwf_painted_in_ink_desc:0 "Once, our ink bound us to the abyss. Now, it binds us to each other. Each mark on our skin is not a chain to the sea. It is a vow to the garden, a promise that wherever we go, life will follow."
  kwf_who_dwells_below:0 "He Who Dwells Below"
  kwf_who_dwells_below_desc:0 "I will not deny that there is still a presence beneath the tide. But it is neither a god nor a shepherd of our souls. Whatever lurks in that abyss can remain silent. We no longer kneel to it. Our faith now turns upward to the living world."
  kwf_open_floodgates:0 "Open the Floodgates"
  kwf_open_floodgates_desc:0 "Hold back the waters, and the land will starve. Release them, and the world is washed clean. The garden flourishes when the faithful trust in the power of the tides."
  kwf_depths_have_depth:0 "Depths Have Depth"
  kwf_depths_have_depth_desc:0 "Like the depths of the sea, faith has layers. What was once the worship of salt becomes something richer. I tell you, the depth we seek is not in the ocean's darkness, but in the roots we sink into the earth."
  kwf_garden_must_expand:0 "Grow Garden, Grow"
  kwf_garden_must_expand_desc:0 "A garden that does not grow will wither and die. The same is true for us. We cannot hide in one harbor, on one island, or on one shore. We must carry the garden outward until the world itself blossoms under our care."
  kwf_bless_the_Warboat:0 "Bless the Warboat"
  kwf_bless_the_Warboat_desc:0 "Steel can be sharpened, sails can be mended, but only faith can make a vessel truly seaworthy. The Warboat will carry our garden to distant shores."
  kwf_salt_for_the_salt_god:0 "Salt For the Salt God"
  kwf_salt_for_the_salt_god_desc:0 "They once cried, "Salt for the Salt God!" and cast their offerings into the depths. But I say, let the salt return to the land, to the fields, and to the wounds of the living. No god shall claim it now. It is ours, a gift to strengthen the growth of the garden." 

  kwf_drowned_king:0 "Down to the Waterline"
  kwf_drowned_king_desc:0 "This idea from Delmar...for people to see something more in me. A prophet of the Salt God. A king chosen by the sea itself. It's ridiculous, but someone has to speak for the tide, and no one else seems willing."
  kwf_salt_in_wound:0 "Salt in the Wound"
  kwf_salt_in_wound_desc:0 "Discipline is what keeps men upright when the storm hits. It may be cruel, but the sea was never gentle either. If pain keeps us clean, then let the salt do its work... aye, the King commands it so."
  kwf_carry_that_weight:0 "Carry That Weight"
  kwf_carry_that_weight_desc:0 "Everyone has a job. No exceptions. The supplies, the wounded, the tired, we all carry something. That's what keeps the line from breaking."
  kwf_gaze_into_abyss:0 "Gaze Into the Abyss"
  kwf_gaze_into_abyss_desc:0 "We can't fight the old way anymore. The sea's not the only thing that's changed - our enemies have too. The new weapons burn through more than our caps, but hesitation burns through lives. We'll pay the price and strike first, before anyone else does."
  kwf_tithes:0 "Tithes of Flesh"
  kwf_tithes_desc:0 "Andale crossed a line that no man should. The sea may forgive hunger, but it won't forgive madness. We'll deal with them, quick and clean. "
  kwf_faithful:0 "Faithful and the Salted"
  kwf_faithful_desc:0 "Faith, morale, whatever you call it. The point is to keep the people steady and the work moving. If belief gets that done, then so be it."
  kwf_codex_saltum:0 "Codex Saltum"
  kwf_codex_saltum_desc:0 "They wanted rules, so I wrote them. The Codex isn't some holy scripture, just a manual. A way to make sure no one forgets why we're still alive."
  kwf_tidebound_unity:0 "Tidebound Unity"
  kwf_tidebound_unity_desc:0 "We're all tied to the same deck now. Doesn't matter who you were before: soldier, trader, scavenger. You pull your weight, or you go overboard. That's unity enough."
  kwf_iron_psalm:0 "Iron Psalm"
  kwf_iron_psalm_desc:0 ""
  kwf_salt_over_steel:0 "Salt Over Steel"
  kwf_salt_over_steel_desc:0 "Steel breaks. Salt eats it away. But  men can adapt. Let the Brotherhood cling to their machines. We'll build something that lasts longer than metal."
  kwf_the_court:0 "Court of the Drowned King"
  kwf_the_court_desc:0 "They wanted a capital, a throne, a proper kingdom. Fine. Let them have it. If a little ceremony keeps order, I'll play the part. Just don't expect me to start believing my own title."

  kwf_order_from_the_galley:0 "Order From the Galley"
  kwf_order_from_the_galley_desc:0 "A ship without order sinks. A kitchen without order starves. I have spent many nights in the galley, feeding the crew through storms and fires. Now, I will bring that same discipline to the shore. In the galley, everything will be measured and put in its place."
  kwf_dinner_bell:0 "Dinner Bell"
  kwf_dinner_bell_desc:0 "When the bell rings, men gather. They know food waits, and work follows. In Rustport, the dinner bell calls them not just to eat, but to build, toil, to labor. Discipline begins with the stomach."
  kwf_sea_trade:0 "We Lack Spices"
  kwf_sea_trade_desc:0 "Spices, salt, and oil, we lack them, but we can find them. The sea has always been the cook's pantry and trade is the spice of life. If we wish to feed our people well, we must open our ports and let the world's flavor season our table."
  kwf_set_the_table:0 "Set the Table"
  kwf_set_the_table_desc:0 "No meal comes without preparation. To eat, you must set the table. To lead, you must set your house in order. From this day forth, every soldier and worker will know their place, their duty, their portion."
  kwf_noone_leaves_hungry:0 "No One Leaves Hungry"
  kwf_noone_leaves_hungry_desc:0 "On the 'Borealis', a hungry crew was a mutinous crew. On land it's no different. Bellies full mean blades steady, hearts steady. No one marches on an empty stomach, not in my company."
  kwf_the_galley_guard:0 "The Galley Guard"
  kwf_the_galley_guard_desc:0 "Every cook needs a guard in rough waters. I've chosen men who will serve as well as fight. They will be my knives, my ladles, my shield and my fire. When they march, they will be the Galley Guard, my chosen hand."
  kwf_undercooked:0 "Undercooked Meal"
  kwf_undercooked_desc:0 "Sometimes a meal must simmer slowly. Better to feed steady than burn the dish. We will temper our hunger for conquest and give the people time to trust in our order, our bread, our word."
  kwf_by_fire_and_salt:0 "By Fire and Salt"
  kwf_by_fire_and_salt_desc:0 "And yet... there are times when the fire must roar, when the salt must bite. Some meals are won not by patience, but by flame. If the shore resists, then by fire and salt we shall break them, and feed upon the ashes."
  kwf_mouth_of_the_shore:0 "Mouth Of the Shore"
  kwf_mouth_of_the_shore_desc:0 "Every shore has a mouth, and it speaks only when fed. We will be the ones to feed it, whether with bread, work or discipline. When all is said and done, the coast itself will bear our taste, our order, our name."

  kwf_all_hands_on_deck:0 "All Hands on Deck"
  kwf_all_hands_on_deck_desc:0 "Everyone of us has their place, and every hand counts. When the call is given, there is no excuse: we must all pull together as one crew."
  kwf_always_at_post:0 "Always at Post"
  kwf_always_at_post_desc:0 "Whether on shore or on a ship, the post never abandons you. And if it does, you weren't fit to man it."
  kwf_discipline_is_a_dish:0 "Discipline Is a Dish"
  kwf_discipline_is_a_dish_desc:0 "Order feeds strength. It kept us alive at sea. Now it will keep us sharp on land."
  kwf_sea_of_madness:0 "Sea of Madness"
  kwf_sea_of_madness_desc:0 "Battle is chaos, like a storm at sea. To survive it, we must learn to adapt to it, and there is a lot we need to learn."
  kwf_same_time_tomorrow:0 "Same Time Tomorrow"
  kwf_same_time_tomorrow_desc:0 "Routine is survival.\nEvery day, the drills repeat.\nEvery day, a new guard arrives at the post.\nEvery day, the crew grows stronger.\nTomorrow will be the same, and that is how we live."
  kwf_no_shore_wide_enough:0 "No Shore Wide Enough"
  kwf_no_shore_wide_enough_desc:0 "The sea may end, but the fight does not. We have no wish to return, but let's get ready, because no shore is wide enough for us."

  kwf_long_live:0 "The Ship Is Dead, Long Live the Ship"
  kwf_long_live_desc:0 ""
  kwf_strip_the_deck:0 "Crack the Keel, Strip the Decks"
  kwf_strip_the_deck_desc:0 ""
  kwf_closed_crates:0 "Closed Crates"
  kwf_closed_crates_desc:0 ""
  kwf_cargo_manifest:0 "The Cargo Manifest of '76"
  kwf_cargo_manifest_desc:0 ""
  kwf_holy_drydock:0 "Holy Drydock Ritual"
  kwf_holy_drydock_desc:0 ""
  kwf_reactor_room:0 "Reactor Room Gospel"
  kwf_reactor_room_desc:0 ""