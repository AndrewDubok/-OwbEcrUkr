l_english: 
DCM_vault_108:0 "Vault 108"
DCM_vault_108_desc:0 "Another stupid vault. No green stuff, just dead humans."
DCM_old_waste_disposal_site:0 "Old Waste Disposal Site"
DCM_old_waste_disposal_site_desc:0 "Fawkes sees this large pile of scrap and junk and thinks it would be good for the vault, Shepard sees more metal for more blasters."
DCM_rock_breakers_last_gas:0 "Rock Breakers Last Gas"
DCM_rock_breakers_last_gas_desc:0 "A Small Mutant camp at an old gas station. We need them back at the vault"
DCM_the_irradiated_metro:0 "The Irradiated Metro"
DCM_the_irradiated_metro_desc:0 "Old tunnels full of green stuff. But not the green stuff. Still it makes some mutants more green?"
DCM_shepards_new_mutant_army:0 "Shepards New Mutant Army"
DCM_shepards_new_mutant_army_desc:0 "Mutants are spread out. Still stronger than humans. But humans in big groups can fight mutants in small groups. Mutants in big groups though?"
DCM_the_meta_human:0 "The Meta Human"
DCM_the_meta_human_desc:0 "The Mutants of Vault 87 are running out of green stuff. Maybe Fawkes can find some since he's so smart and knows puters."
DCM_rebuilding_vault_87:0 "Rebuilding Vault 87"
DCM_rebuilding_vault_87_desc:0 "Fawkes says fixing the vault can help us find green stuff"
DCM_the_green_stuff:0 "The Green Stuff"
DCM_the_green_stuff_desc:0 "We need it to make more mutants. And we need to make more mutants."
DCM_mutant_scavenging:0 "Mutant Scavenging"
DCM_mutant_scavenging_desc:0 "We need to look for guns and things to help find green stuff. No time to look at all of it though"
DCM_mutant_patrols_of_outer_dc:0 "Mutant Patrols of Outer DC"
DCM_mutant_patrols_of_outer_dc_desc:0 "Mutants who come back to 87 talk about places with good stuff. We go look."
DCM_the_mall:0 "The Mall"
DCM_the_mall_desc:0 "The mutants in DC didn't find any green stuff, but the humans they kill have good things to take."
DCM_reunite_lost_mutant_camps:0 "Reunite Lost Mutant Camps"
DCM_reunite_lost_mutant_camps_desc:0 "Mutants strong. Mutants together stronger."
DCM_no_germans_in_german_town:0 "No Germans In German Town"
DCM_no_germans_in_german_town_desc:0 "Germantown has a lot of mutants that bring humans back to the vault. We need them to do other stuff now."
DCM_the_bigger_they_are:0 "The Bigger They Are"
DCM_the_bigger_they_are_desc:0 "Atlas is the biggest behemoth around. He will make the other behemoths follow."
DCM_vault_tec_headquarters:0 "Vault Tec HeadQuarters"
DCM_vault_tec_headquarters_desc:0 "Fawkes says Vault Tec put the green stuff in our vault. Their puters might have where we can find more."
DCM_georgetown_mutants:0 "Georgetown Mutants"
DCM_georgetown_mutants_desc:0 "Talon humans keep fighting mutants in Georgetown. We need to end it"
DCM_mutants_in_the_reflecting_pool:0 "Mutants in the Reflecting Pool"
DCM_mutants_in_the_reflecting_pool_desc:0 "The Mall has some of the biggest fighting. Stupid humans keep coming there when we know we are there."
DCM_raid_the_capital_building:0 "Raid The Capital Building"
DCM_raid_the_capital_building_desc:0 "The Talon humans are in the Capital Building and they have some big guns. If we kill them, we can take the guns"
DCM_the_museum_of_technology:0 "The Museum of Technology"
DCM_the_museum_of_technology_desc:0 "The Technology Museum has a lot of puters. Get them for Fawkes."
DCM_takoma_park_expedition:0 "Takoma Park Expedition"
DCM_takoma_park_expedition_desc:0 "Some mutants went to Takoma Park a long time ago. We should see if they are still there."
DCM_the_giants_of_jury_street:0 "The Giants of Jury Street"
DCM_the_giants_of_jury_street_desc:0 "Patrols see behemoths around Jury Street. Maybe we get them to help."
DCM_the_giants_roar:0 "The Giants Roar"
DCM_the_giants_roar_desc:0 "The behemoths around 87 keep roaring and the biggest one roars back. We don't know what they say, but when the big one roars the others get quiet."
DCM_vault_92:0 "Vault 92"
DCM_vault_92_desc:0 "No green stuff. No humans. Just metal and water."
DCM_vault_106:0 "Vault 106"
DCM_vault_106_desc:0 "Going into the vault makes things weird. See colors and humans... know the humans... makes head hurt."
DCM_horrors_of_vault_tec:0 "Horrors of Vault Tec"
DCM_horrors_of_vault_tec_desc:0 "None of the vaults had green stuff. Vault Tec stupid and only put in 87!"
DCM_big_trouble_in_big_town:0 "Big Trouble in Big Town"
DCM_big_trouble_in_big_town_desc:0 "Small mutant groups are seeing Shepard is strong. They want to be strong with us."
DCM_everglow_outpost:0 "Everglow Outpost"
DCM_everglow_outpost_desc:0 "If we put a camp near the campground, we can find humans to catch easy on the road."
DCM_secure_the_vault:0 "Secure the Vault"
DCM_secure_the_vault_desc:0 "No human is strong enough to walk into 87. But we can build up anyway."
DCM_the_blue_line:0 "The Blue Line"
DCM_the_blue_line_desc:0 "If we go underground, the humans won't see us. Then we catch them."
DCM_the_red_line:0 "The Red Line"
DCM_the_red_line_desc:0 "These tunnels get into DC. Sneak up on the humans easy."
DCM_clean_out_metros:0 "Clean Out Metros"
DCM_clean_out_metros_desc:0 "A lot of broken stuff in the tunnels that Fawkes can make into good things."
DCM_the_mutant_fortress:0 "The Mutant Fortress"
DCM_the_mutant_fortress_desc:0 "We have to guard Vault 87. It has all the green stuff!"
DCM_nukacola_plant:0 "Nuka-Cola Plant"
DCM_nukacola_plant_desc:0 "Old building with angry crabs and glowing water. Is blue stuff good for mutants?"
DCM_the_new_corvega_arms_factory:0 "The New Corvega Arms Factory"
DCM_the_new_corvega_arms_factory_desc:0 "Fawkes can make this old building make guns."
DCM_our_mutant_masters:0 "Our Mutant Masters"
DCM_our_mutant_masters_desc:0 "We found lots of good things, but no green stuff."
DCM_our_determined_exterminators:0 "Our Determined Exterminators"
DCM_our_determined_exterminators_desc:0 "Humans in metal fight almost as good as super mutant. We need to kill them"
DCM_let_the_giants_invade:0 "Let the Giants Invade"
DCM_let_the_giants_invade_desc:0 "The Behemoths are strong. No human can fight them. We will follow."
DCM_mutant_generals_lead_the_way:0 "Mutant Generals Lead the Way"
DCM_mutant_generals_lead_the_way_desc:0 "The mutants that can think good like Shepard will tell the other mutants what to do."
DCM_crushed_tin_cans:0 "Crushed Tin Cans"
DCM_crushed_tin_cans_desc:0 "We killed the metal men. Even with big guns and armor they were still just weak humans."
DCM_banish_the_black_devils:0 "Banish the Black Devils"
DCM_banish_the_black_devils_desc:0 "The black metal men were stronger than the grey metal men, but we still beat them!"
DCM_unearth_raven_rock:0 "Unearth Raven Rock"
DCM_unearth_raven_rock_desc:0 "The Behemoths crushed the black metal man cave. We need to dig it up to find the good loot."
DCM_raven_rock_war_room:0 "Raven Rock War Room"
DCM_raven_rock_war_room_desc:0 "Fawkes says Raven Rock has good puters. They help us look."
DCM_uncover_the_armory:0 "Uncover the Armory"
DCM_uncover_the_armory_desc:0 "Raven Rock had really good guns. We need to dig them up."
DCM_enclave_fev_testing_labs:0 "Enclave FEV Testing Labs"
DCM_enclave_fev_testing_labs_desc:0 "The humans in Raven Rock had some green stuff. Not a lot, but some."
DCM_a_new_crater:0 "A New Crater"
DCM_a_new_crater_desc:0 "The behemoths crushed the humans at their Citadel. They broke the building until it fell into the ground. Ha ha ha"
DCM_loot_the_facility:0 "Loot the Facility"
DCM_loot_the_facility_desc:0 "The metal humans had strong guns. They are our guns now."
DCM_a_new_mutant_outpost:0 "A New Mutant Outpost"
DCM_a_new_mutant_outpost_desc:0 "We will make the metal man home a base. Easier than moving all the guns back to 87."
DCM_brotherhood_notes:0 "Brotherhood Notes"
DCM_brotherhood_notes_desc:0 "We let Fawkes look at Tin Man puters. He did not find green stuff, but found other things."
DCM_a_smog_from_the_east:0 "A Smog From the West"
DCM_a_smog_from_the_east_desc:0 "There is a lot of smoke over the hills. Smoke means humans"
DCM_the_untamed_pitt:0 "The Untamed Pitt"
DCM_the_untamed_pitt_desc:0 "The Pitt is full of crazy humans and trogs. We kill them both easy"
DCM_ogres_flood_into_the_pitt:0 "Ogres Flood into The Pitt"
DCM_ogres_flood_into_the_pitt_desc:0 "The behemoths go through The Pitt and crush any human they find. Fun to watch."
DCM_the_behemoth_pitt:0 "The Behemoth Pitt"
DCM_the_behemoth_pitt_desc:0 "The behemoths broke the pitt really good. The humans hide in tunnels but we still find them."
DCM_crush_the_trogs:0 "Crush the Trogs"
DCM_crush_the_trogs_desc:0 "All the buildings are breaking. Behemoths keep crushing them to get trogs for food."
DCM_union_steel_factory:0 "Union Steel Factory"
DCM_union_steel_factory_desc:0 "Fawkes says humans can use this building to make metal. And we use metal to make guns!"
DCM_enslave_the_city:0 "Enslave the City"
DCM_enslave_the_city_desc:0 "Humans in the pitt don't turn into super mutants when give green stuff. They taste bad too. We use them to make things instead."
DCM_the_supply_plant:0 "The Supply Plant"
DCM_the_supply_plant_desc:0 "We can make a lot of stuff in The Pitt."
DCM_the_mill_and_steel_yard:0 "The Mill And Steel Yard"
DCM_the_mill_and_steel_yard_desc:0 "The Pitt has a lot of metal we can use to make other things. Bullets. Swords. Guns."
DCM_the_trog_trenches:0 "The Trog Trenches"
DCM_the_trog_trenches_desc:0 "There are a lot of trogs in the tunnels. Humans are scared to go, but we are not."
DCM_pitt_scavenging_program:0 "Pitt Scavenging Program"
DCM_pitt_scavenging_program_desc:0 "We send humans into city to find good stuff. If they don't we feed them to trogs."
DCM_giant_warlords:0 "Giant Warlords"
DCM_giant_warlords_desc:0 "The big behemoth Fawkes calles Atlas wants to fight Shepard. He won't win but he has to fight."
DCM_shepard_leads_on:0 "Shepard Leads On"
DCM_shepard_leads_on_desc:0 "Shepard found some mutants that lead good. He will have them lead other mutants too."
DCM_unchained_giants:0 "Unchained Giants"
DCM_unchained_giants_desc:0 "Atlas the other Behemoths stalk the lands. They eat anyone they see."
DCM_decimated_dc:0 "Decimated DC"
DCM_decimated_dc_desc:0 "DC is not easy to walk in as a behemoth. They clear the way with big clubs"
DCM_the_throne_of_giants:0 "The Throne of Giants"
DCM_the_throne_of_giants_desc:0 "Atlas and the other behemoths moved to Takoma Park. There they eat humans and fight."
DCM_mutant_arms_workshop:0 "Mutant Arms Workshop"
DCM_mutant_arms_workshop_desc:0 "Fawkes can teach some mutants to make guns in the vault. Guns are better than nail boards."
DCM_expand_mutant_camps:0 "Expand Mutant Camps"
DCM_expand_mutant_camps_desc:0 "We can make more camps with the mutants that came to Vault 87"
DCM_shepards_mutant_broadcast:0 "Shepards Mutant Broadcast"
DCM_shepards_mutant_broadcast_desc:0 "Fawkes fixed a radio and says we can use it to talk to mutants far away!"
DCM_the_green_tide:0 "The Green Tide"
DCM_the_green_tide_desc:0 "One of the puters said there is some green stuff in a place called West Virginia. We will look."
DCM_establish_dominance:0 "Establish Dominance"
DCM_establish_dominance_desc:0 "We are the strongest. Nobody can stop us!"
DCM_beasts_no_longer_burden:0 "Beasts No Longer Burden"
DCM_beasts_no_longer_burden_desc:0 "Some humans have dogs follow them. That is like our centaurs right?"
DCM_reopen_evergreen_mills:0 "Reopen Evergreen Mills"
DCM_reopen_evergreen_mills_desc:0 "This place has machines Fawkes says can make things we need. We will make humans use them!"
DCM_clean_test_subjects:0 "Clean Test Subjects"
DCM_clean_test_subjects_desc:0 "We found another vault but with no green stuff. It did have humans that do really good with the green stuff though"
DCM_a_familiar_foe:0 "A Familiar Foe"
DCM_a_familiar_foe_desc:0 "We found more black metal men! Kill them and take their stuff!"
DCM_the_third_generation_of_mutants:0 "The Third Generation of Mutants"
DCM_the_third_generation_of_mutants_desc:0 "We only have so much green stuff. We need to be careful with it."
DCM_the_rising_green_tide:0 "The Rising Green Tide"
DCM_the_rising_green_tide_desc:0 "There are super mutants in west virginia. The green stuff must be close"
DCM_the_dark_facility:0 "The Dark Facility"
DCM_the_dark_facility_desc:0 "We found mutant skeletons in this place. Must have been their home."
DCM_shopping_cart_cages:0 "Shopping Cart Cages"
DCM_shopping_cart_cages_desc:0 "We put cages on the behemoths backs. It will help us carry humans back to 87"
DCM_hulking_masses_of_destruction:0 "Hulking Masses of Destruction"
DCM_hulking_masses_of_destruction_desc:0 "Mutants never stop getting bigger. Behemoths must be oldest. Some of them in the ruins still."
DCM_the_king_of_ogres:0 "The King of Ogres"
DCM_the_king_of_ogres_desc:0 "These mutants aren't overlords or behemoths but something else."
DCM_amutantsbestfriend:0 "A Mutants Best Friend"
DCM_amutantsbestfriend_desc:0 "The centaur follows us around and helps us kill humans. We just give them a little of the meat and they are happy."
DCM_contaminated_test_subjects:0 "Contaminated Test Subjects"
DCM_contaminated_test_subjects_desc:0 "Not all humans become mutants or centaurs. Some turn into other things. Fawkes will keep them alive to fight too!"
DCM_the_abominations:0 "The Abominations"
DCM_the_abominations_desc:0 "These new things are not super mutants. But they fight hard too, and they figh with us!"
DCM_waste_lander_cattle:0 "Waste lander Cattle"
DCM_waste_lander_cattle_desc:0 "Some humans do what we say if we promise we will not eat them. We eat them anyway. Stupid humans"
DCM_the_horde_of_trogs:0 "The Horde of Trogs"
DCM_the_horde_of_trogs_desc:0 "Not enough green stuff to make ever human a super mutant. Putting humans into river makes them trogs. Maybe we make some trogs?"
DCM_the_great_devourers:0 "The Great Devourers"
DCM_the_great_devourers_desc:0 "Hungry trogs fight harder. Keep them hungry"
DCM_the_savage_ones:0 "The Savage Ones"
DCM_the_savage_ones_desc:0 "If we sharpen trog claws they cut harder. It is not easy."
DCM_old_faithful:0 "Old Faithful"
DCM_old_faithful_desc:0 "Centaurs need green stuff to make them, but they fight good."
DCM_horribly_mutated_centaurs:0 "Horribly Mutated Centaurs"
DCM_horribly_mutated_centaurs_desc:0 "Some centaurs can get bigger with more green stuff"
DCM_armored_centaurs:0 "Armored Centaurs"
DCM_armored_centaurs_desc:0 "If we give centaurs armor, humans can not kill them easy. Saves greens tuff"
DCM_age_of_the_mutant:0 "Age of the Mutant"
DCM_age_of_the_mutant_desc:0 "We heard another mutant on the radio? Who is it?"
DCM_echoes_of_the_master:0 "Echoes of the Master"
DCM_echoes_of_the_master_desc:0 "We don't know who the master is. But the west mutants say he made them and had lots of green stuff. If we follow them we get green stuff."
DCM_nightkin_commanders:0 "NightKin Commanders"
DCM_nightkin_commanders_desc:0 "Blue mutants are weird, but they help us sneak on humans."
DCM_third_generation_supremacy:0 "Third Generation Supremacy"
DCM_third_generation_supremacy_desc:0 "Why would we follow other mutants? Kill them and take their green stuff"
DCM_the_mutants_of_lob:0 "The Mutants of LOB"
DCM_the_mutants_of_lob_desc:0 "This building has lots of guns. Get them"
DCM_the_museum_of_history:0 "The Museum of History"
DCM_the_museum_of_history_desc:0 "Ghouls can't even be made into a centaur. They are not good for eating either. What do we do with them?"
DCM_the_giants_from_west_virginia:0 "The Giants from West Virginia"
DCM_the_giants_from_west_virginia_desc:0 "A lot of behemoths got together."
DCM_the_vernon_square_stronghold:0 "The Vernon Square Stronghold"
DCM_the_vernon_square_stronghold_desc:0 "We build a big fort in Vernon Square. Humans can never make us leave"
DCM_jack_of_all_trades:0 "Jack of All Trades"
DCM_jack_of_all_trades_desc:0 "Fawkes knows some things other mutants don't. We will have him do those things."
DCM_vault_87_built_for_tomorrow:0 "Vault 87 Built for Tomorrow"
DCM_vault_87_built_for_tomorrow_desc:0 "The vault has fancy metal and we can use it"
DCM_vault_87_research_logs:0 "Vault 87 Research Logs"
DCM_vault_87_research_logs_desc:0 "Most of the puters are broke. Fawkes can fix some though."
DCM_inefficient_reactor:0 "Inefficient Reactor"
DCM_inefficient_reactor_desc:0 "We found the machine that makes 87 lights go. It is broken. Make Fawkes fix it!"
DCM_vault_87s_emergency_broadcast:0 "Vault 87s Emergency Broadcast"
DCM_vault_87s_emergency_broadcast_desc:0 "Fawkes found a way to make the puters talk to towers. It tells us when big things are near"
DCM_rebuild_the_overseers_chamber:0 "Rebuild the Overseers Chamber"
DCM_rebuild_the_overseers_chamber_desc:0 "This was the room of the boss human. It should be the room for the boss mutant!"
DCM_rebuild_murder_pass:0 "Rebuild Murder Pass"
DCM_rebuild_murder_pass_desc:0 "Little humans stay away from the pass. We can build more there."
DCM_vault_87s_sub_level_35:0 "Vault 87s Sub Level 3.5"
DCM_vault_87s_sub_level_35_desc:0 "We opened stairs down to an old floor. We did not find any green stuff"
DCM_vault_87s_senior_researcher_lab:0 "Vault 87s Senior Researcher Lab"
DCM_vault_87s_senior_researcher_lab_desc:0 "We found a bunch of old puters for Fawkes to look at."
DCM_plutonium_fuel_rods:0 "Plutonium Fuel Rods"
DCM_plutonium_fuel_rods_desc:0 "There are some things to make the lights go."
DCM_fawkes_new_lab:0 "Fawkes New Lab"
DCM_fawkes_new_lab_desc:0 "We let Fawkes use the new place to study puters and making things."
DCM_expand_into_the_caverns:0 "Expand into the Caverns"
DCM_expand_into_the_caverns_desc:0 "We can build things in the cave when the little humans are gone."
DCM_fortify_murder_pass:0 "Fortify Murder Pass"
DCM_fortify_murder_pass_desc:0 "If we put a wall in the pass, humans could never get in"
DCM_the_great_chamber:0 "The Great Chamber"
DCM_the_great_chamber_desc:0 "Big room will let us make big guns."
DCM_reserve_fev:0 "Reserve FEV"
DCM_reserve_fev_desc:0 "We found old green stuff! Not enough, but still good!"
DCM_reinforced_behemoth_clubs:0 "Reinforced Behemoth Clubs"
DCM_reinforced_behemoth_clubs_desc:0 "Bigger clubs means more bashing. Simple as"
DCM_armor_plated_behemoths:0 "Armor Plated Behemoths"
DCM_armor_plated_behemoths_desc:0 "Behemoths are strong. But bullets are bullets. Give behemoths armor and they take more bullets."
DCM_ancient_capital_giants:0 "Ancient Capital Giants"
DCM_ancient_capital_giants_desc:0 "We found old behemoths. They are big and strong even to other behemoths"
DCM_pitt_overlords:0 "Pitt Overlords"
DCM_pitt_overlords_desc:0 "The Pitt is our place. The humans there do what we say or die!"
DCM_topple_versicorps_tower:0 "Topple Versicorps Tower"
DCM_topple_versicorps_tower_desc:0 "The behemoths like breaking big things. That tower is the biggest thing around."
DCM_rampage_through_the_trench:0 "Rampage Through the Trench"
DCM_rampage_through_the_trench_desc:0 "The trench is full of trogs, and the behemoths like eating them."
DCM_break_the_blast_furnace:0 "Break the Blast Furnace"
DCM_break_the_blast_furnace_desc:0 "One behemoth broke the furnace when he chased humans. It not a big deal."
DCM_the_mutant_fighting_hole:0 "The Mutant Fighting Hole"
DCM_the_mutant_fighting_hole_desc:0 "Two mutants get angry they fight in pit. Winner is strongest mutant and he is right"
DCM_restart_the_supply_plant:0 "Restart the Supply Plant"
DCM_restart_the_supply_plant_desc:0 "The humans fix the factory and make things we want or we rip them to pieces"
DCM_search_the_steel_yard:0 "Search the Steel Yard"
DCM_search_the_steel_yard_desc:0 "Puny humans were scared of the steel yard. We are not."
DCM_restart_the_blast_furnace:0 "Restart the Blast Furnace"
DCM_restart_the_blast_furnace_desc:0 "The big furnace makes a lot of metal. Some humans fall in but who cares?"
DCM_mutant_shredders:0 "Mutant Shredders"
DCM_mutant_shredders_desc:0 "Big guns that shoot a lot of bullets. That's how best to kill humans"
DCM_shred_wastelanders:0 "Shred Wastelanders"
DCM_shred_wastelanders_desc:0 "Rip humans into little pieces with the guns. Big laughs"
DCM_overlord_shredders:0 "Overlord Shredders"
DCM_overlord_shredders_desc:0 "Make even bigger guns for the overlords."
DCM_mutant_demo_teams:0 "Mutant Demo Teams"
DCM_mutant_demo_teams_desc:0 "Big guns shoot bombs and kill humans. Do not be too close."
DCM_larger_booms:0 "Larger Booms"
DCM_larger_booms_desc:0 "There is not much left to eat when these guns are used, but it is still good for killing tougher humans"
DCM_bunker_busters:0 "Bunker Busters"
DCM_bunker_busters_desc:0 "Some humans hide in buildings. Blow up the buildings too!"
DCM_return_of_the_twin_exterminators:0 "Return of the Twin Exterminators"
DCM_return_of_the_twin_exterminators_desc:0 "More metal men running around killing mutants. We will squash them like ants!"
DCM_break_the_shield:0 "Break the Shield"
DCM_break_the_shield_desc:0 "Ghouls and mutants fight with these metal men. Kill them too!"
DCM_the_crashed_airship:0 "The Crashed Airship"
DCM_the_crashed_airship_desc:0 "We found an old place where mutants killed the metal men long ago. Good to remember"
DCM_recruit_the_mutants:0 "Recruit the Mutants"
DCM_recruit_the_mutants_desc:0 "The ghouls and mutants here will join us or die like humans!"
DCM_banish_the_devil_lords:0 "Banish the Devil Lords"
DCM_banish_the_devil_lords_desc:0 "The black tin men are the worst, and we will kill them!"
DCM_a_well_armed_mutant_army:0 "A Well Armed Mutant Army"
DCM_a_well_armed_mutant_army_desc:0 "The worst humans have the best guns. Now they are our guns"
DCM_chicagos_devastation:0 "Chicagos Devastation"
DCM_chicagos_devastation_desc:0 "Their city is gone. We killed it!"
DCM_a_new_determined_exterminator:0 "A New Determined Exterminator"
DCM_a_new_determined_exterminator_desc:0 "We are unstoppable! Go until we have all the green stuff!"

###Tooltips###
DCM_more_greenstuff_tt:0 "We found more §Ggreenstuff!"
DCM_more_humies_tt:0 "We will bring more humans back home"
DCM_humie_cattle_tt:0 "The humans hide from us more and fight less"
DCM_lot_more_greenstuff_tt:0 "We have unlimited §Ggreenstuff!"
DCM_quicker_to_fight_tt:0 "New mutants can fight sooner"
DCM_hole_tt:0 "Some mutants die, but they are weak. We need strong mutants"
