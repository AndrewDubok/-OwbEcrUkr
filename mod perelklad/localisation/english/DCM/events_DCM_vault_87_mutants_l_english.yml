l_english:
DCM_vault_87_mutants.1.t:0 "Growing a Mutant Army"
DCM_vault_87_mutants.1.d:0 "Shepard was like other mutants in Vault 87. He went out, he killed humans, and brought some back to make new mutants. Like the other mutants in the vault, he saw the green stuff was getting smaller. No mutant had found new green stuff and green stuff was how mutants were made. Shepard had an idea to call the mutants in DC and get help finding more green stuff. He told mutants in 87 to go to DC with a message."
DCM_vault_87_mutants.1.a:0 "Bring stuff"
DCM_vault_87_mutants.1.b:0 "Bring guns"
DCM_vault_87_mutants.1.c:0 "Come here now"
DCM_vault_87_mutants.2.t:0 "Fawkes Fate"
DCM_vault_87_mutants.2.d:0 "Fawkes was put in a cell because he asked why we make humans into super mutants. A real mutant should just know that is what we do. But he is smart. We could have him do stuff we are not so smart to do. Maybe he can help find green stuff in the puter"
DCM_vault_87_mutants.2.a:0 "He will fix things"
DCM_vault_87_mutants.2.b:0 "He will read books to find things"
DCM_vault_87_mutants.3.t:0 "Whats a GECK"
DCM_vault_87_mutants.3.d:0 "Some thing called a GECK was in here. Fawkes says a lot of big words about it, but it doesn't make green stuff. We will just throw it outside. The room can be used for other things"
DCM_vault_87_mutants.3.a:0 "Turn off the lights to put on other lights"
DCM_vault_87_mutants.3.b:0 "Take apart the machines in the room"
DCM_vault_87_mutants.3.c:0 "Use the room to make guns"
DCM_vault_87_mutants.4.t:0 "The Takoma Park Expedition"
DCM_vault_87_mutants.4.d:0 "We sent mutants to Ta Ko Ma to find green stuff. They didn't find green stuff. But they found other mutants. Those mutants will help us find green stuff."
DCM_vault_87_mutants.4.a:0 "Welcome to the team"
DCM_vault_87_mutants.5.t:0 "The Underworld"
DCM_vault_87_mutants.5.d:0 "The Ghouls can't be made into mutants. We tried and it doesn't work. They don't taste good too. They are weak but some are smart. Could they help us?"
DCM_vault_87_mutants.5.a:0 "Ghouls will help"
DCM_vault_87_mutants.5.b:0 "Ghouls will be slaves"
DCM_vault_87_mutants.6.t:0 "The Nuka Factory"
DCM_vault_87_mutants.6.d:0 "The Cola Factory has a glowy river of blue. It does not taste like water and there are some machines. Fawkes says the machines can be made to do other stuff."
DCM_vault_87_mutants.6.a:0 "Make more stuff"
DCM_vault_87_mutants.6.b:0 "Make more guns"
DCM_vault_87_mutants.7.t:0 "Other Mutants?"
DCM_vault_87_mutants_7.d:0 "We heard other mutants on the radio. They have a big army too. They make humans into mutants with green stuff. We call them and they say if we follow their leader, we can get green stuff. Should we follow? Or should we take?"
DCM_vault_87_mutants_7.a:0 "I don't know"
