####Decisions####
 DCR_send_mercs_to_work:0 "Send the mrcenaries to work"
 DCR_morlat_taste_tests_decision:0 "Conduct Wondermeat taste tests"
 DCR_slave_raid_decision:0 "Grab slaves to sell to The Pitt"
 
####Ideas####
dcr_slave_export:0 "Slave Traders"
dcr_slave_export_desc:0 "No one in the Capital Wastes has any use for slavery. Good thing the Pitt does."
dcr_raider_interior_design:0 "Raider Interior Design"
dcr_raider_interior_design_desc:0 "Bodies hanging from ceilings, heads on spikes, blood for paint. Make our camps as fuckin scary as possible. Any wastelander that comes up to our place trying to stand up to us will turn RIGHT THE FUCK AROUND."
dcr_plentiful_stockpiles:0 "Plentiful Stockpiles"
dcr_plentiful_stockpiles_desc:0 "You cant go two god damn feet around here without finding some old army base or bunker full of guns. We have all the parts we need to fix up old guns or replace broken ones. Now back to pillagin'."
DCR_slavery_focus_idea:0 "Dedicated Slavers"
DCR_slavery_focus_idea_desc:0 "Enslaving wasteland trash and selling them to Paradise Falls has become big business. Sure some crybabies come after us because we sold their uncle or their sister or whatever, but we'll just sell them too!"
DCR_merc_work_idea:0 "Merc Work"
DCR_merc_work_idea_desc:0 "It may not be raiding but it's close. We still kill people, loot their shit and get paid for it. It's just we get told who we can and can't kill, which kinda sucks"
DCR_some_trade_idea:0 "Some Trade"
DCR_some_trade_idea_desc:0 "We have to back off when certain caravans enter our turf. Smiling Jack worked out deals with them to bring in supplies, and if we shoot them then we don't get the supplies anymore"
DCR_molerat_hunts_idea:0 "Molerat Hunts"
DCR_molerat_hunts_idea_desc:0 "Its a bit weird that we are just shooting molerats, but I guess smaller targets are better. New meat need to learn to hit a moving target somehow"
DCR_raider_rebrand_idea:0 "Raider Rebrand"
DCR_raider_rebrand_idea_desc:0 "It is a huge adjustment, but eventually this gang of filthy degenerates will become valued employees of Briggs Meat Traders"
DCR_dominate_niche_idea:0 "Dominating The Meat Trade"
DCR_dominate_niche_idea_desc:0 "The meat trade of The Capital Wasteland is largely disorganized hunters and the occasional brahmin farmer. None of them can compete with the scale of Briggs' Meat Company."
DCR_old_farming_wisdom_idea:0 "Old Farming Wisdom"
DCR_old_farming_wisdom_idea_desc:0 "Most farming guides didn't survive the last 200 years, but we found a few useful tips."
DCR_economies_of_scale_idea:0 "Economies of Scale"
DCR_economies_of_scale_idea_desc:0 "Industrialized feed, meat processing plants and vegitable starch substituting for wonderglue all makes each batch of our Molerat Wonder Meat cost a fraction of what it used to. The consumer doesn't need to know that though."
DCR_marketing_department_idea:0 "Marketing Department"
DCR_marketing_department_idea_desc:0 "Nobody wants to buy meat from a guy wearing a necklace made out of ears. They also don't trust a fella that killed their grandmother two winters back. These important pieces of wisdom and more are things our marketing department keeps in mind when selling our product to the wasteland."
DCR_economies_of_scale_2_idea:0 "Economies of Scale"
DCR_economies_of_scale_2_idea_desc:0 "Industrialized feed, meat processing plants and vegitable starch substituting for wonderglue all makes each batch of our Molerat Wonder Meat cost a fraction of what it used to. The consumer doesn't need to know that though."
DCR_molerat_industrial_complex_idea:0 "Molerat Industrial Complex"
DCR_molerat_industrial_complex_idea_desc:0 "From the food they eat to the packaging their dried meat comes in, we control every step of the Molerat Wonder Meat manufacturing process. This control over every step of the supply chain grants us such a competitive edge that nobody even wants to challenge our stranglehold on the market."
DCR_diversified_business_idea:0 "Diversified Business"
DCR_diversified_business_idea_desc:0 "Molerat Wonder Meat is just one part of our business plan. Expanding into other markets will not be cheap though."
DCR_security_contracts_idea:0 "Security Contracts"
DCR_security_contracts_idea_desc:0 "Our corporate security has had some success in securing work as hired guards. Some of their number are being split off into The Briggs Security Company."
DCR_corporate_espionage_idea:0 "Corporate Espionage"
DCR_corporate_espionage_idea_desc:0 "A special division of our company will work to protect our corporate secrets while gathering information on our competitors."
DCR_economic_leviathan_idea:0 "Economic Leviathan"
DCR_economic_leviathan_idea_desc:0 "Nearly every person in The Capital Wasteland has at least one Briggs Company product in their home. We feed them, we clothe them, and we even put the weapons into their hands to defend their homes. They depend on us, and that gives us a tremendous amount of leverage."
DCR_raiding_focus_idea:0 "Refocused"
DCR_raiding_focus_idea_desc:0 "Briggs has always been a mean son of a bitch, but lately he's been pushing the boys more and more to loot and raid."
DCR_slaver_synnergy_idea:0 "Slaver Synnergy"
DCR_slaver_synnergy_idea_desc:0 "The Pitt has come to rely on us as their top supplier of slaves. Now they move on our schedule, and pick up the cargo where we say."
DCR_harnessed_flame_idea:0 "Harnessed the Flame"
DCR_harnessed_flame_idea_desc:0 "Raiders have always liked fire. Like them it is destructive and hard to control. But it seems like their new leadership has sparked a renewed fascination in the raiders, they are uncharacteristically focused on using flame weapons and developing deadlier fuels for their flamers."
DCR_flame_worship_idea:0 "Worship The Flame"
DCR_flame_worship_idea_desc:0 "Fire has been one of the most powerful forces of the world since before man even existed. It is something to be respected, and worshiped. Only when the flame is properly honored can it be properly used."
DCR_slave_colonies_idea:0 "Slave Colonies"
DCR_slave_colonies_idea_desc:0 "Humans are enslaved by the hundreds, forced to be drones in The Ant Queen's colony. The workers toil in the workshps, the mines, or the fields. Those that expire become food for the brood."
DCR_ant_cult_idea:0 "Cult of The Ant"
DCR_ant_cult_idea_desc:0 "The ant is the ultimate lifeform on this planet. Though we are just weak humans, we can still be of service and help usher in their reign."
DCR_empire_of_ant_idea:0 "Empire Of The Ant"
DCR_empire_of_ant_idea_desc:0 "The age of man has passed long ago, and ants are the true masters of this new world. The rest of the wasteland will soon know their might."
DCR_rivet_city_trade_idea:0 "Rivet City Market"
DCR_rivet_city_trade_idea_desc:0 "We have a stall in the Rivet City Marketplace selling our product. Having a foothold in one of the largest markets in the region is leading to fantastic profits!"
DCR_buying_molerat_meat_idea:0 "Molerat Wonder Meat"
DCR_buying_molerat_meat_idea_desc:0 "We allowed Mr. Briggs to sell his wondermeat in the market. While it pulls away some trade from our businesses, the cheap meat keeps well and helps our security force keep fed on longer range patrols"
DCR_raiders_at_heart:0 "Raiders at Heart"
DCR_raiders_at_heart_desc:0 "Drug running and selling slaves may make some caps, but at the core every raider is out there to sperad murder and mayhem with earning caps being a secondary reward."
dcr_drug_runners:0 "Drug Runners"
dcr_drug_runners_desc:0 "We got our start selling chems to those who could pay, and killing those who suddenly couldn't."

####Characters and Traits####
 dcr_ryan_brigg_name:0 "Ryan Brigg"
 dcr_ryan_brigg_desc:0 "Unknown to any of his men, Ryan Brigg is not much of a raider at all. His real goals are to turn mole rat meat into something more edible and get rich selling it in all the wasteland towns. For now though he keeps up the facade. He is a ruthless raider leader who will kill a subordinate for simply annoying him, because if any of them suspect he is not this man, he will be rotting with the molerats he harvests." 
 dcr_little_bart_desc:0 "Son of infamous raider 'Big Bad Bart' and a drug-running swamp priestess, Little-Bitty Big Bart has the genius of his mama, the strength of his dad, and an attitude worse than both of them put together. Now in charge of the DC raiders, he's out for revenge against his dad's killers, and to get the whole wasteland high while he's doing it."
 dcr_brains_and_brawn:0 "Brains and Brawn"
 dcr_antagonizer_name:0 "The Antagonizer"
 DCR_ANTAGONIZER_DESC:0 "The AntAgonizer seeks nothing less than the destruction of mankind and the ushering in of the age of the ant. Until she is able to raise a suitable army of ants, these raiders will suffice."
 dcr_torcher_name:0 "Torcher"
 DCR_TORCHER_DESC:0 "Torcher only likes one thing more than raiding, and that is fire. Some say that is why he likes raiding in the first place."
 DCR_crushed_dream_trait:0 "Crushed Dreams"
 DCR_crushed_dream_trait_desc:0 "Abandoning his dream has hardened Ryan Brigg. While he once had reservations about some of the crueler aspects of raiding, he has abandoned that doubt and fully committed himself to the role of a raider lord."
 DCR_slaver_boss_trait:0 "Slaver Boss"
 DCR_ant_queen_trait:0 "Ant Queen"
 DCR_ant_queen_trait_desc:0 "The Antagonizer runs her gang much like an ant colony. Each member has their role that they must fulfill and deviation is met with banishement or death. New raiders are quick to fall in line after seeing the ants feed on someone that doesn't."
 DCR_torcher_minister_name:0 "Torcher"
 DCR_torcher_minister_trait:0 "The Flame"
 DCR_torcher_leader_trait:0 "Firestarter"
 DCR_torcher_leader_trait_desc:0 "Torcer only likes one thing more than raiding, and that is fire. Some say that is why he likes raiding in the first place."
