#### Events ####
 DCR_nf_events.1.title:0 "The best things"
 DCR_nf_events.1.desc:0 "Back before The DCS organized, raiders ruled the lands and we were rolling in caps. We were running chems, snatching slaves and of course just plundering wherever we wanted. The most successful gangs though were the ones that..."
 DCR_nf_events.1.a:0 "Dealt Chems"
 DCR_nf_events.1.b:0 "Stuck together"
 DCR_nf_events.1.c:0 "Raised hell far and wide"
 DCR_nf_events.2.title:0 "The trouble"
 DCR_nf_events.2.desc:0 "After the settlements got organized and pushed those idiots out of The Bethesda ruins, they started looking at the other gangs and began teaming up to muscle us off our turf too! Most gangs had the sense to run when they saw an army coming and now only sneak around those areas to trade at Paradise Falls or hit the odd caravan. Still, we grabbed some goods before we got out of dodge."
 DCR_nf_events.2.a:0 "We grabbed guns"
 DCR_nf_events.2.b:0 "We grabbed slaves"
 DCR_nf_events.2.c:0 "We grabbed caps"
 DCR_nf_events.2.d:0 "We grabbed everything not nailed down!"
 DCR_nf_events.3.title:0 "The Man"
 DCR_nf_events.3.desc:0 "Then this guy comes out of nowhere, this bad ass raider boss from somewhere up north or something. Brigg's his name. He's pretty smart for a raider, figured that if the settlements are getting organized and kicking our asses, we should get organized too and we'll be able to kick theirs. Getting all these knuckleheads to work together isn't easy, but it looks like he'll pull it off. Seems like the reason people follow him is..."
 DCR_nf_events.3.a:0 "His ruthlessness"
 DCR_nf_events.3.b:0 "His smarts"
 DCR_nf_events.3.c:0 "His plans"
 DCR_nf_events.4.title:0 "Ryan Brigg Terminal Log Entry #171"
 DCR_nf_events.4.desc:0 "I've noticed positive reactions with dextrin substances. I'll continue testing different forms to see where it leads me. If there was ever a time for a breakthrough it would be right now. Masquerading as one of these foul murderers grows tiring, once the theactrics wear off. One thing is true, though - we can all be rich if the experiment succeeds. Molerat is one of the easiest meats to get ahold of, yet the most disgusting. If I can turn it into a viable food source..."
 DCR_nf_events.4.a:0 "Lets hope they don't find out before then"
 DCR_nf_events.5.title:0 "Tough Choice"
 DCR_nf_events.5.desc:0 "Picking one of these lunatics to be my so-called right hand man is apparently a big thing to these raiders. At least it will allow me to refocus on my research instead of dealing with their squabbles. That Torcher fellow seems like he could keep the guys in line, but he is more unstable than the rest. Ledoux is a viable choice since he has experience running his own gang and seems less explosive. Or I could rely on Smiling Jack. He may not be much of a raider, but the fellas still listen to him and he works with caravans from time to time."
 DCR_nf_events.5.a:0 "Go with Torcher"
 DCR_nf_events.5.b:0 "Goalie Ledoux"
 DCR_nf_events.5.c:0 "Smiling Jack"
 DCR_nf_events.6.title:0 "We're getting close"
 DCR_nf_events.6.desc:0 "After months of research I think I am close to that breakthrough. Wonderglue seems to mix well with mole-rat meat to make something that is not just tastier but also more restorative. I still need to run more tests and find a way to scale up operations if I am to develop a viable product, but I can finally see a light at the end of this tunnel."
 DCR_nf_events.6.a:0 "Almost free of this nightmare"
 DCR_nf_events.7.title:0 "The Horror"
 DCR_nf_events.7.desc:0 "Some of the raiders were asking a few too many questions about some of the things going on. I needed to do something big to make sure they don't catch on just yet. That's when it hit me. We had a few captives left over from the last raid I sent them on, and a few missed caps from Paradise Falls is worth it to settle them down. So, I had them toss the captives to the caged Behemoth. Of course they didn't last long, but these psychos love watching that thing eat."
 DCR_nf_events.7.a:0 "It's starting to grow on me too."
 DCR_nf_events.8.title:0 "Whats that machine?"
 DCR_nf_events.8.desc:0 "Despite my best attempts to hide my research from the raiders, they have caught on that I am doing something with mole rat meat and wonderglue. When a few surprised me about it they saw me working on the machine as well, and had plenty of questions. I had to think fast with an explaination. I was making..."
 DCR_nf_events.8.a:0 "Uhm.... drugs?"
 DCR_nf_events.8.b:0 "New flamer fuel for Torcher"
 DCR_nf_events.8.c:0 "Stuff to feed the behemoth"
 DCR_nf_events.9.title:0 "Sending Some Samples"
 DCR_nf_events.9.desc.1:0 "It was not easy sneaking out of Evergreen Mills and getting to DCS territory, and I damn near got shot when they saw me, but I was able to pass along my message as well as the package of sample meats. I don't think anybody saw me sneaking back in so I should be in the clear."
 DCR_nf_events.9.desc.2:0 "It was easy enough passing the message and sample meats to the latest carvan that passed into Evergreen Mills. Now I just need to sit back and wait. If all goes well I will be raking in the caps in notime."
 DCR_nf_events.9.a:0 "This has to work"
 DCR_nf_events.10.title:0 "Vices"
 DCR_nf_events.10.desc:0 "The raiders seem to like few things more than looting and random violence, but the few things they do they can find in Evergreen Mills. Sex, drugs and other violence seem to be the only things other than wanton murder that will appease these people. I still have a few caps left myself that I can invest in one of these to try and keep them distracted."
 DCR_nf_events.10.a:0 "Invest in a drug lab"
 DCR_nf_events.10.b:0 "Invest in a brothel"
 DCR_nf_events.10.c:0 "Set up a fighting ring"
 DCR_nf_events.10.d:0 "Can we have it all?"
 DCR_nf_events.11.title:0 "A Spectacle"
 DCR_nf_events.11.desc:0 "One of the raiders was asking a few too many questions about my past and why I haven't gone on any raids since I took charge. I was originally just going to shoot him since that seems to impress these types, but I remembered that massive super mutant they have trapped outside. Tossing him to the beast to be devoured seemed an elegant solution to the problem while also keeping the others from second-guessing my qualifications. It should buy me some time at least."
 DCR_nf_events.11.a:0 "That crunching though..."
 DCR_nf_events.12.title:0 "Not-so Paradise"
 DCR_nf_events.12.desc:0 "Paradise Falls looked about how you would expect a slaver camp to look. Lots of skulls on spikes, skeletons sitting in cages, and other warnings propped up to convince the slaves to not even try running. The meeting with Eulogy went well and it seems like he is happy with the supply of slaves from Evergreen Mills, but he wants more. According to Euloy, The Pitt is buying almost every slave on the market so if we can up supply, everyone will make good caps. The only problem is if we start capturing more slaves, The DC Settlements may take issue."
 DCR_nf_events.12.a:0 "This can't be good for wonder meat sales"
 DCR_nf_events.13.title:0 "A Secret Message"
 DCR_nf_events.13.desc:0 "It wasn't easy, but a message has been sent to the leader of The DC Settlements talking about working out some kind of deal where we won't raid them anymore. I should be able to divert the boys attention down to the south or the West without arousing too much suspicion."
 DCR_nf_events.13.a:0 "Hopefully I'm right"
 DCR_nf_events.14.title:0 "Ryan Brigg Terminal Log Entry #235"
 DCR_nf_events.14.desc:0 "I was barely able to believe it, the mole rat wonder meat is a huge hit with The DC Settlement leadership. They are open to trade and are even willing to not shoot my guys on sight so long as we stop the raiding and stick to the jerky. Now comes the hard part, convincing the raiders to give up this lifestyle and instead rake in the caps hunting molerats. I considred ditching this place and setting up shop elsewhere to do it, but I don't have the caps to start over and meet this demand. No, they still see me as boss and it is a lot of caps. This will work"
 DCR_nf_events.14.a:0 "I'll convince them"
 DCR_nf_events.14.b:0 "Actually, this is stupid. Lets just raid them."
 DCR_nf_events.15.title:0 "Ryan Brigg Terminal Log Entry #269"
 DCR_nf_events.15.desc:0 "It was disappointing having to abandon the wonder meat plan just when I achieved a viable product, but at least I have a cheap way to feed my army. After abandoning that plan I find I have more easily settled into the role I have chosen. The DC Settlements and Andale Cannibals now answer to me, and we are shipping slaves to The Pitt by the cartload. I even have a meeting with Ashur soon. I guess I really did live up to my promise to those raiders all those years ago."
 DCR_nf_events.15.a:0 "The new good times are here"
 DCR_nf_events.16.title:0 "Burning Briggs"
 DCR_nf_events.16.desc:0 "Brigg lied to all of us, and for that he had to burn. No longer will we control the flames within us. We will spread out over the wastes like a wild fire and burn anything that is in our way!"
 DCR_nf_events.16.a:0 "BURN IT ALL!"
 DCR_nf_events.17.title:0 "Another Flame"
 DCR_nf_events.17.desc:0 "The few we don't burn we still send up to The Pitt for caps. Caps means more fuel. More fuel means more fire. Ashur now wants to talk to Torcher. Talk about how to make more caps, which means more fire!"
 DCR_nf_events.17.a:0 "We will try not to burn him too"
 DCR_nf_events.18.title:0 "A Valuable Human?"
 DCR_nf_events.18.desc:0 "Each member of The Queens Army is little more than a weapon in the war against man, still less than even the weakest ant. But this latest captive, Dr. Lesko is something different. In his mind is the secret to make the ants stronger, bigger, and even have them breathe fire! We will keep this captive comfortable and fed, so long as he does what The Queen orders. Otherwise, he will feed the colony."
 DCR_nf_events.18.a:0 "He will be useful"
 DCR_nf_events.19.title:0 "Queens Coronation"
 DCR_nf_events.19.desc:0 "The weakling known as Brigg is no more. Like all humans he was no match for the might of the ant! Now a new ruler takes control of this gang of dispicable humans, The Antagonizer! With this new army and her ants, she will bring destruction to the world of man! The age of man is over!"
 DCR_nf_events.19.a:0 "The age of ants begins!"
 DCR_nf_events.21.title:0 "A Strange Offer"
 DCR_nf_events.21.desc:0 "We had heard tales from passing merchants that the raider gangs to the south-west were abandoning their ways and turning to some type of meat business instead. Few in Rivet City really believed it until their leader strolled up with crates of his 'molerat wonder meat' in tow. The samples he had his people hand out were a huge hit among the people who tride it and they claimed it was better than any molerat they'd ever had. This Mr. Brigg wants to open up a stall in the marketplace to sell the meat, and ensures us there is no raider trick involved in this."
 DCR_nf_events.21.a:0 "Approve his request"
 DCR_nf_events.21.b:0 "Deny his request"
 DCR_nf_events.20.title:0 "Mole Rat Wonder Meat?"
 DCR_nf_events.20.desc:0 "We got a message from none other than Ryan Brigg, the leader of the reorganized DC Raiders. He claims that the is actually a scientist that wants to reform this raider gang into some kind of business enterprise with a new kind of mole rat meat processing technique he developed. In a wasteland full of strange and hard to believe things, this is definitely one of the most ridiculous, but damn is the meat sample he sent over tasty. If we think we can trust him, we should consider his offer and put in an order for a first shipment of meat."
 DCR_nf_events.20.a:0 "I'll take 30 crates!"
 DCR_nf_events.20.b:0 "Ignore him"
 DCR_nf_events.22.title:0 "Never Trust a Raider!"
 DCR_nf_events.22.desc:0 "We should have expected that message from Ryan Brigg was nothing more than some sick raider joke! Not only did we not get our shipment of mole rat wonder meat, but the people we sent to pick it up were attacked and only one of them made it back alive! It looks like the situation down at Evergreen Mills hasn't changed at all, and we should be ready for more raider troubles in the future."
 DCR_nf_events.22.a:0 "Damn... I liked that jerkey"
 DCR_nf_events.23.title:0 "Capital Raiders"
 DCR_nf_events.23.desc:0 "The raider boss from The Capital Wasteland has met with Ashur recently to discuss a better working relationship. While these raiders are a bit wild even by Pitt standards, they do ship us the bulk of the workers we use in our forges. Maybe it would be better if we made some type of deal with them."
 DCR_nf_events.23.a:0 "We will work closer with these raiders"
 DCR_nf_events.23.b:0 "Lets keep things transactional"
 DCR_nf_events.24.title:0 "Ashurs Rejection"
 DCR_nf_events.24.desc:0 "Ashur has decided he doesn't want any kind of alliance with us. I guess he's too good to be working too closely with the likes of us, and we're just good for getting him slaves for his factories. At least we can still milk the old bastard for caps."
 DCR_nf_events.24.a:0 "What a pussy"
 DCR_nf_events.25.title:0 "Increase in Raids"
 DCR_nf_events.25.desc:0 "It is not clear what caused the sudden surge in raider activity to the south, but we have seen a sharp rise in attacks on settlements and caravans near the border of what is considered their territory. People have been told to avoid that area for a while, and we are sending more militia to patrol the area."
 DCR_nf_events.25.a:0 "Something big coming?"
 DCR_nf_events.26.title:0 "Sharp Rise in Kidnappings"
 DCR_nf_events.26.desc:0 "The settlements to our south have seen a sharp rise in raider attacks in an attempt to grab captives from the settlements and caravans in the area. Because we have not heard anything about these people being ransomed, it is safe to assume they are being sold into slavery."
 DCR_nf_events.26.a:0 "Damn slaving raiders"
 DCR_nf_events.27.title:0 "Meeting Demand"
 DCR_nf_events.27.desc:0 "With the DC Settlement militia still keeping a close eye on things it is not so easy to grab the number of slaves Eulogy wants. We may have to start grabbing people from the settlements in our borders that usually pay tribute in caps, scrap or food."
 DCR_nf_events.27.a:0 "Do it"
 DCR_nf_events.27.b:0 "We can't push those people too much"
 DCR_nf_events.28.title:0 "Ryan Brigg Terminal Log Entry #234"
 DCR_nf_events.28.desc:0 "Something is going on with the raiders I have unfortunately had to surround myself with. When I step into a room they avoid looking at me, not in a 'I am afraid he will gut me for looking at him cross-ways' way like usual, but like they're planning something. I worry they may be catching on to me. I will begin preparing a go-bag tonight just in case I need to get out of here quickly."
 DCR_nf_events.28.a:0 "Why do I hear ants?"
 DCR_nf_events.28.b:0 "Why do I smell smoke?"
 DCR_nf_events.29.title:0 "The Death Of A Fool"
 DCR_nf_events.29.desc:0 "The Mechanist stood against The Antagonizer for too long. Countless numbers of her brood fell to his stupid machines and it was through his efforts that she was driven from her lair outside Canterbury Commons. He likely realized the error of his ways as hundreds of ant and raiders assaulted his sad little hideout. His body nurished the brood and his helmet now sits as a trophy on the queen's throne."
 DCR_nf_events.29.a:0 "All our enemies will meet the same fate"
 DCR_nf_events.30.title:0 "New Business"
 DCR_nf_events.30.desc:0 "The boys are a little anxious since Briggs said that we would stop working with Paradise Falls. A lot of different suggestions have been thrown around about what we would do to replace those caps we won't be getting anymore."
 DCR_nf_events.30.a:0 "Dealing chems"
 DCR_nf_events.30.b:0 "Mercenary work"
 DCR_nf_events.30.c:0 "Scavening?!"
 DCR_nf_events.31.title:0 "A Few Bad Mutfruits"
 DCR_nf_events.31.desc:0 "A lot of the boys have gotten aboard the molerat meat train when they saw the caps that could be made, but there are plenty of guys that don't want to give up the raider lifestyle. They shoot at caravans and are threatening to go off on their own if we don't go back to raiding. They are going to become a bigger problem if we do not deal with them."
 DCR_nf_events.31.a:0 "Kill them all"
 DCR_nf_events.31.b:0 "Give them a raise to chill out"
 DCR_nf_events.32.title:0 "Bloody Dusters"
 DCR_nf_events.32.desc:0 "For years The Regulators were a thorn in our asses. They were a bunch of goodie-goodies that would go after raider bosses and sometimes clear out whole camps. They helped drive us back to Evergreen Mills, but now the boot is on the other foot. We chased them all the way back to their little shack headquarters and killed the last of them today. Some of the guys are wearing their badges as trophies, but the real loot is what we found in some crates in their base."
 DCR_nf_events.32.a:0 "Thats a lot of guns"
 DCR_nf_events.33.title:0 "The Raiders Offer"
 DCR_nf_events.33.desc:0 "Raiders in The Capital Wasteland have united under a man named Brigg and brought nearly the entire region under their rule. They now sit on our border asking us to join up. As raiders ourselves, we know what will happen if we say no."
 DCR_nf_events.33.a:0 "Join the raiders"
 DCR_nf_events.33.b:0 "Tell them to fuck off"
 DCR_nf_events.34.title:0 "Slaves Pouring In"
 DCR_nf_events.34.desc:0 "Since Brigg's raiders swept across The Capital Wasteland, the flow of slaves has turned from a steady stream to a raging river. They are almost sending us more slaves than we know what to do with. The only downside is, as they are becoming a larger supplier of our manpower, they're getting a little more demanding."
 DCR_nf_events.34.a:0 "Give them their caps."
 DCR_nf_events.35.title:0 "Almost Snuffed Out"
 DCR_nf_events.35.desc:0 "For over a century, The Torchbearers carried on sacred rituals of flame. They studied the ancient texts and hated their foe, the Yaogui called Smokey who was said to walk upright and try to snuff out fires. Their reverence was rewarded with them discovering an ancient warehouse of powerful flamers. Then the Rockyists came. These people marched up from the south with hate in their eyes and killed all those who would not renounce the ways of the flame. When faced with death or abandoning his faith, Torcher chose a third option. He chose to flee. He chose to carry on the ways of his people. With the embers of his faith he will ignite a new fire. This fire will burn The Capital Wasteland. Then, when the fire is strong enough, it will return to the hills of the west. \n \n Then the rock worshipers will burn."
 DCR_nf_events.35.a:0 "The fire will rise"
 DCR_nf_events.36.title:0 "The Fire Burns Brighter Than Ever"
 DCR_nf_events.36.desc:0 "The flame of The Torchbearers was nearly extinguished years ago by The Rockyists. In the time since, Torcher has gathered kindling. He seized an army and taught them the way of the flame. That spark turned into a roaring inferno which spread across The Capital Wasteland. Then it spread to the hills of Torcher's birth. Those that tried to exterminate The Torchbearers were themselves thrown onto the pires and new flame temples erected in the place of old sites. The flames now burn brighter than ever, and the ways of The Torchbearers live on."
 DCR_nf_events.36.a:0 "The flame will never die out"
 DCR_nf_events.37.title:0 "The Killer Queen"
 DCR_nf_events.37.desc:0 "The boys enjoyed watching Brigg get eaten by ants, but that did not mean everyone was on board with following a lady that dresses in ant armor and rants about the downfall of man. The Antagonizer understood the weakness in the hearts of men and anticipated the dissenters. With her ants and those that were loyal to her, she swiftly dealt with those that dared stand against her. Their skulls adorned her throne in the heart of The Bazaar. From this throne she proclaimed her rule, and what the fate of doubters would be. If there was one thing that would define her reign it would be..."
 DCR_nf_events.37.a:0 "Rewards for the loyal"
 DCR_nf_events.37.b:0 "Severe punsihments for the disloyal"
 DCR_nf_events.37.c:0 "Favor for the strong"
 DCR_nf_events.37.d:0 "The Queen's erratic whims"
 DCR_nf_events.38.title:0 "Paradise Falls Supply Drops"
 DCR_nf_events.38.desc:0 "The slave shipments from The Capital Wasteland have plummeted. When we sent people to check what was going on, Eulogy Jones informed us that the largest raider gang in the region decided to back out of the slave trade. He assures us this is a temporary setback, and his men will rise to meet the demand. It will just be a little time before they can do this."
 DCR_nf_events.38.a:0 "Our patience is not infinite"

#### New Focuses ####
 DCR_nf_a001:0 "The Good Times"
 DCR_nf_a001_desc:0 "Since farther back than anyone can remember, things were pretty good for a raider in The Capital Wasteland. Yeah the tin can boys in the ruins were a pain in the ass, but if you stayed away from them you were good."
 DCR_nf_a002:0 "The Bad Times"
 DCR_nf_a002_desc:0 "Then those fucking idiots in Bethesda had to screw up a good thing and somehow get all those pussies in the settlements to team up. How the hell is a raider supposed to raid when every time you hit a caravan you end up with 100 guys after you?"
 DCR_nf_a003:0 "The New Boss"
 DCR_nf_a003_desc:0 "This new guy, Brigg, got a bunch of the boys together. Says that if we get together ourselves we can one day squash those settlement losers and be top dogs again. Worth a shot right?"
 DCR_nf_a004:0 "The New Good Times"
 DCR_nf_a004_desc:0 "Our turf may not be as big as it used to be, but we still get our loot"
 DCR_nf_a005:0 "Trips to Paradise"
 DCR_nf_a005_desc:0 "Selling a captive to Paradise Falls was always a good way to make some caps. They may be in the middle of The Settlements turf now, but we can still get there."
 DCR_nf_a006:0 "Changing Focus"
 DCR_nf_a006_desc:0 "Brigg does make sense, we would run out of stuff to raid one day. But if we don't raid are we raiders?"
 DCR_nf_a007:0 "New Opportunities"
 DCR_nf_a007_desc:0 "Caps are caps, and these new plans should get us plenty"
 DCR_nf_a008:0 "Back-room Dialogue"
 DCR_nf_a008_desc:0 "Somebody said Brigg is talking to the Settlement guys."
 DCR_nf_a009:0 "Keep the Pace"
 DCR_nf_a009_desc:0 "I just dont get it, if Eulogy is paying out the ass for slaves why are we not trying to get more?"
 DCR_nf_a010:0 "Maintain the Balance"
 DCR_nf_a010_desc:0 "Go out, grab some settlers, bring them to paradise, repeat."
 DCR_nf_a011:0 "Payday"
 DCR_nf_a011_desc:0 "The slaves flow steadily to Paradise Falls, and the caps flow to Evergreen Mills."
 DCR_nf_a012:0 "Match the Rise in Demand"
 DCR_nf_a012_desc:0 "Each wasteland loser we bring to Paradise falls is fetching twice what they used to. Of course we are going to grab more then!"
 DCR_nf_a013:0 "Human Resources"
 DCR_nf_a013_desc:0 "Some of these losers living on our turf are a bit light on their 'protection' payments. Maybe we should just grab them"
 DCR_nf_a014:0 "Lasting Partnership"
 DCR_nf_a014_desc:0 "Eulogy is loving all these new scrubs we keep giving him. I don't know if that means we're getting more caps, but there gotta be some reward right?"
 DCR_nf_a015:0 "The Right Hand"
 DCR_nf_a015_desc:0 "Every raider boss needs a right hand guy. They gotta be crazier than hell too to keep the other boys in line. But who is Brigg gonna pick?"
 DCR_nf_a016:0 "The Pyro"
 DCR_nf_a016_desc:0 "Torcher is a crazy son of a bitch. I hear he burned a bus load of kids becasue they said they like hobos."
 DCR_nf_a017:0 "Hot Toys"
 DCR_nf_a017_desc:0 "I don't know where Torcher keeps finding these flamethrowers and I ain't going to ask. The nut job says the fire tells him where to go, whatever that means."
 DCR_nf_a018:0 "The Goalie"
 DCR_nf_a018_desc:0 "That Ledoux guy and his little gang are obsessed with some old pre-war sport played on ice. If he likes it so much why doesn't he run on up to where its cold?"
 DCR_nf_a019:0 "Merc Work"
 DCR_nf_a019_desc:0 "Ledoux has some of the fellas doing merc work when they arent out raiding. They still get to shoot people and caps are caps right?"
 DCR_nf_a020:0 "The Merchant"
 DCR_nf_a020_desc:0 "What kind of dipshit would put Smiling Jack in charge of anything? The only robbing that asshole does is with his prices on jet!"
 DCR_nf_a021:0 "Trade Deals"
 DCR_nf_a021_desc:0 "This clown is really opening our turf back up to traders telling the boys they can't hit the ones he gives a pass. At least we get more regular ammo deliveries..."
 DCR_nf_a022:0 "The Real Work"
 DCR_nf_a022_desc:0 "Is it just me, or has Brigg been giving some really strange orders lately. Whats his obession with mole rats?"
 DCR_nf_a023:0 "Raid for Equipment"
 DCR_nf_a023_desc:0 "Brigg wants us to knock over some eggheads and take their lab equipment. He cooking up chems or something?"
 DCR_nf_a024:0 "Glue Raids?"
 DCR_nf_a024_desc:0 "What the fuck is with this new loot list? We're supposed to look for glue more than ammo or chems?"
 DCR_nf_a025:0 "Scavenge for Equipment"
 DCR_nf_a025_desc:0 "What the hell does a erlenmeyer flask look like?"
 DCR_nf_a026:0 "Glue Scavenging?"
 DCR_nf_a026_desc:0 "What kind of scheme is Brigg cooking up to have the boys wasting time looking for glue in old ruins?"
 DCR_nf_a027:0 "Purchase Equipment"
 DCR_nf_a027_desc:0 "A new caravan is coming in with a bunch of weird shit for the boss."
 DCR_nf_a028:0 "Glue Shipments"
 DCR_nf_a028_desc:0 "That caravan isn't even worth hitting, all they got is glue."
 DCR_nf_a029:0 "What's this for?"
 DCR_nf_a029_desc:0 "I heard some guys snuck around Brigg's place and saw him putting glue and mole rat meat into a weird ass machine. Somebody should ask him whats going on. Not me though."
 DCR_nf_a030:0 "The Moment of Truth"
 DCR_nf_a030_desc:0 "Brigg sent some guys out last night to talk with a caravan. Yeah, talk. Not raid. Weird right?"
 DCR_nf_a031:0 "Expanding Evergreen"
 DCR_nf_a031_desc:0 "We have a lot more asses than we got chairs if you get my meaning. We gotta clear some of this shit."
 DCR_nf_a032:0 "Gunsmiths"
 DCR_nf_a032_desc:0 "Some of the boys got to talking, and maybe a few guys could work on guns full time like."
 DCR_nf_a033:0 "The Foundry"
 DCR_nf_a033_desc:0 "Those big ass metal things in the building aren't toilets you idiots, they melt metal so you can make it into shit."
 DCR_nf_a034:0 "Fuel the Forges"
 DCR_nf_a034_desc:0 "Grabbing some wasteland scrubs and making them dig for metal beats the hell out of ripping pipes out of the walls."
 DCR_nf_a035:0 "The Bazaar"
 DCR_nf_a035_desc:0 "We always did a little trading or drinking in the bazaar, but with more boys sitting around here we need a bigger space."
 DCR_nf_a036:0 "Keep the Boys Happy"
 DCR_nf_a036_desc:0 "Brigg is an aboslute legend. You hear about the new stuff he got in The Bazzar?"
 DCR_nf_a037:0 "Cage of Horrors"
 DCR_nf_a037_desc:0 "I don't know how they got that big mean bastard outside in the cage. But damn is it fun to watch him tear some stupid fuck apart."
 DCR_nf_a038:0 "Mole Rat Hunts"
 DCR_nf_a038_desc:0 "Brigg has the rookies out shooting mole rats to work on their aim. Moving target practice aint anything new, but its weird he wants us to go after just the rats right?"
 DCR_nf_a039:0 "Mole Rat Pens"
 DCR_nf_a039_desc:0 "Why the hell are we wasting good space on pens for molerats if we aren't going to toss captives to them?"
 DCR_nf_a040:0 "Taste Tests"
 DCR_nf_a040_desc:0 "The cook has been giving out this new mole rat meat. It tastes a bit better, but when someone asked where he learned to cook something that didn't taste like an old boot he got spooked."
 DCR_nf_b001:0 "They like it?"
 DCR_nf_b001_desc:0 "Brigg has called some big meeting with the top guys. I don't know what he's talking about, maybe it's a big raid."
 DCR_nf_b002:0 "Raider Rebrand"
 DCR_nf_b002_desc:0 "We are going to start selling meat? That's fucking stupid. Wait... how many caps a piece?"
 DCR_nf_b003:0 "Attitude Adjustments"
 DCR_nf_b003_desc:0 "The guys were a little doubtful at first, but once the caps started flowing they began singing a new tune."
 DCR_nf_b004:0 "The Worst of Us"
 DCR_nf_b004_desc:0 "No matter how many caps we rake in, some guys just aren't ready to give up shooting at caravans and putting heads on sticks. But the thing about the old days is they're the old days."
 DCR_nf_b005:0 "Brigg's Security"
 DCR_nf_b005_desc:0 "This security job aint so bad. Still get to shoot dipshits that get touchy with the merch and we get steady caps for it."
 DCR_nf_b006:0 "Expanded Market"
 DCR_nf_b006_desc:0 "Briggs is having boys go all around trying to sell this shit."
 DCR_nf_b007:0 "Expanding Production"
 DCR_nf_b007_desc:0 "Look, I don't care how you do it. But the boss said we need to make more meat."
 DCR_nf_b008:0 "Mole Rat Farms"
 DCR_nf_b008_desc:0 "I don't know how it works, but that goop that bitch from Megaton had really does keep the rats from biting ya."
 DCR_nf_b009:0 "Dominate our Niche"
 DCR_nf_b009_desc:0 "We were the first to make molerat meat that doesn't taste like a foot. That gives us a big head start on the competition. If we dig in we can make it so nobody matches our product."
 DCR_nf_b010:0 "Study Husbandry"
 DCR_nf_b010_desc:0 "Farming molerats can't be too different from brahmin or radchickens. Learn what you can from the wastelanders."
 DCR_nf_b011:0 "Construct a factory"
 DCR_nf_b011_desc:0 "Brigg has been reading some books on factories and he thinks we can build one to make meat even faster!"
 DCR_nf_b012:0 "Study the Past"
 DCR_nf_b012_desc:0 "There are some factories in the ruins for making food. We could learn something by looking at their files."
 DCR_nf_b013:0 "Marketing 101"
 DCR_nf_b013_desc:0 "People are a little hesitant to buy things from guys in raider gear. Briggs is telling the guys to grab some suits and clean up our image."
 DCR_nf_b014:0 "Expand the Farms"
 DCR_nf_b014_desc:0 "We can use what we learned to build more molerat ranches across our territory."
 DCR_nf_b015:0 "Economies of Scale"
 DCR_nf_b015_desc:0 "This old book Briggs found says that the bigger your factory, the cheaper you can make stuff. I don't get it, but those old world factories were pretty big. So it must be true."
 DCR_nf_b016:0 "Mad Men"
 DCR_nf_b016_desc:0 "One of the guys that can draw is making some posters to put up in settlements. Briggs thinks it will make people buy our meat."
 DCR_nf_b017:0 "Industrialized Feed"
 DCR_nf_b017_desc:0 "Why should we buy food to feed the molerats when we can grow it ourselves?"
 DCR_nf_b018:0 "Sold in Every Settlement"
 DCR_nf_b018_desc:0 "Nearly every settlement in The Capital Wasteland is buying our meat!"
 DCR_nf_b019:0 "Mole-Rat Industrial Complex"
 DCR_nf_b019_desc:0 "We have gotten so good at making this meat that we almost make more than we can sell. Good thing the guys in marketing are convincing those scrubs to buy more than they need."
 DCR_nf_b020:0 "Diversify our Business"
 DCR_nf_b020_desc:0 "With the caps we make from selling meat, we can build our business and get a finger in every meatpie!"
 DCR_nf_b021:0 "The Arms Trade"
 DCR_nf_b021_desc:0 "Everyone in the wasteland needs guns. We would be stupid to not get in on this market."
 DCR_nf_b022:0 "Invest in R&D"
 DCR_nf_b022_desc:0 "We can hire some eggheads to figure up new stuff to sell."
 DCR_nf_b023:0 "Tighten Security"
 DCR_nf_b023_desc:0 "If we don't keep an eye out, our success will attract raiders. Ironic isn't it?"
 DCR_nf_b024:0 "Odds & Ends"
 DCR_nf_b024_desc:0 "We can make anything from coffee mugs to boots. If someone will buy it, we will make it."
 DCR_nf_b025:0 "Top of the Line"
 DCR_nf_b025_desc:0 "There are plenty of spare parts in The Capital Wasteland, and a fixed up pre-war rifle goes for way more than 4 rusted pieces of shit."
 DCR_nf_b026:0 "Corporate Soldiers"
 DCR_nf_b026_desc:0 "We will need an army to protect our business interests. It's a good thing we have a lot of guys that know how to fight."
 DCR_nf_b027:0 "Brigg's Broadcasting"
 DCR_nf_b027_desc:0 "Step aside 3-Dog, you're not the only guy that can play some tunes. Now with 300% more ads."
 DCR_nf_b028:0 "Security Contracts"
 DCR_nf_b028_desc:0 "Merc work is good money. We can rent out our security now and then to other businesses."
 DCR_nf_b029:0 "Corporate Espionage"
 DCR_nf_b029_desc:0 "To keep our edge, we need to keep an eye on the competition and a hand in their pocket."
 DCR_nf_b030:0 "Brigg's Corp"
 DCR_nf_b030_desc:0 "Briggs Corp has grown to become the largest business this side of the Mississippi. From molerat wonder meat and molerat leather boots to advanced weapons and security contracts, we have whatever someone needs... so long as they have the caps."
 DCR_nf_b031:0 "Just a Joke"
 DCR_nf_b031_desc:0 "Briggs says he was trying to get us to sell meat as a joke? I don't really get it, but I'm gonna laugh before I get fed to the big guy outside."
 DCR_nf_b032:0 "Andale Conquest"
 DCR_nf_b032_desc:0 "Those weird fucks over in Andale have a lot of good shit just sitting there for us to grab."
 DCR_nf_b033:0 "Man to Mole Rat"
 DCR_nf_b033_desc:0 "How did Brigg get those freaks to switch from eating dudes to molerats?"
 DCR_nf_b034:0 "Action is Coming"
 DCR_nf_b034_desc:0 "That big raid Brigg promised? Its going down soon. Gangs all over are talking about it."
 DCR_nf_b035:0 "Sharpen your Blades"
 DCR_nf_b035_desc:0 "Get those kitchen knives nice and sharp. We will be putting them to use soon."
 DCR_nf_b036:0 "Call Far and Wide"
 DCR_nf_b036_desc:0 "We are spreading the word far and wide that a big raid is coming. Wannabe thugs and gangsters from across the wasteland are looking to join up."
 DCR_nf_b037:0 "Whelps to Warriors"
 DCR_nf_b037_desc:0 "A lot of these guys looking to join up aren't worth a damn, but they can still take bullets meant for our guys."
 DCR_nf_b038:0 "The Big Raid"
 DCR_nf_b038_desc:0 "We're going to show those settlement dipshits who's in charge!"
 DCR_nf_b039:0 "Broken Steel"
 DCR_nf_b039_desc:0 "The Citadel is full of premium loot. We just gotta kill the guys sitting on it."
 DCR_nf_b040:0 "Enforce New Leadership"
 DCR_nf_b040_desc:0 "These settlers are going to learn the hard way who is in charge these days."
 DCR_nf_b041:0 "Requiem for Regulators"
 DCR_nf_b041_desc:0 "The Regulators were a bunch of goodie-two-shoes that thought they could 'clean up' the wasteland. But where are they now?"
 DCR_nf_b042:0 "Join or Die"
 DCR_nf_b042_desc:0 "The gang out of Harrisburg has gotten weak over the years. They may just roll over and let us take over."
 DCR_nf_b043:0 "Valuable Data"
 DCR_nf_b043_desc:0 "There were some interesting things on those old Citadel computers."
 DCR_nf_b044:0 "Slave Industry"
 DCR_nf_b044_desc:0 "We will soon have more guys than we have guns if we don't put some of these slaves to work."
 DCR_nf_b045:0 "Welcome the Willing"
 DCR_nf_b045_desc:0 "Plenty of the guys from The Harrisburg Bandits want to join up with a real gang."
 DCR_nf_b046:0 "Big Rusty Claws"
 DCR_nf_b046_desc:0 "Who would be dumb enough to tell a raider in power armor no?
 DCR_nf_b047:0 "Slaver Synnergy"
 DCR_nf_b047_desc:0 "With The Capital Wastleand under our thumb, we are able to give The Pitt all the slaves they could ask for."
 DCR_nf_b048:0 "The Raider King"
 DCR_nf_b048_desc:0 "Brigg did what nobody thought was possible. He took our gangs from the brink of being wiped out and turned the tables on the wasteland. Now we are a mighty kingdom of raiders that makes even The Pitt look petty. The Kingdom of Brigg will reign for a thousand years! Or at least until he dies and we all start killing each other again."
 DCR_nf_c000:0 "Passing The Torch"
 DCR_nf_c000_desc:0 "Did you hear Brigg scream when Torcher lit him up? Shit was priceless!"
 DCR_nf_c001:0 "The Last Flickering Flame"
 DCR_nf_c001_desc:0 "Torcher never really talked about what he did before drifting into The Capital Wastland. Probably wasn't anything too interesting anyway."
 DCR_nf_c002:0 "Seeking Flames"
 DCR_nf_c002_desc:0 "I still don't know where this weird fuck keeps finding all these things."
 DCR_nf_c003:0 "Study The Flame"
 DCR_nf_c003_desc:0 "With all these flamers we can take a few apart and figure out how they really work."
 DCR_nf_c004:0 "Harness The Flame"
 DCR_nf_c004_desc:0 "Once you get the hang of one of these things, they can really do some damage."
 DCR_nf_c005:0 "Hot & Ready"
 DCR_nf_c005_desc:0 "Torcher is right, burning things is fun. Lets get burnin."
 DCR_nf_c006:0 "Burnt Meat"
 DCR_nf_c006_desc:0 "Those Andale creeps are going to make good kindling."
 DCR_nf_c007:0 "Rich-Man Riches"
 DCR_nf_c007_desc:0 "The guys in Rich man won't need their caps now that they're ash."
 DCR_nf_c008:0 "Burn The Capital"
 DCR_nf_c008_desc:0 "Those Settlers think they are safe in their shacks? We'll see how they feel when we burn them out!"
 DCR_nf_c009:0 "Melt Steel Beams"
 DCR_nf_c009_desc:0 "They say flamer fuel can't melt steel armor. If that's true, we'll just boil those knights alive."
 DCR_nf_c010:0 "Smoke On The Water"
 DCR_nf_c010_desc:0 "Rivet City's tight halls and narrow doorways make them perfect for clearing with flamers."
 DCR_nf_c011:0 "Plasma Fire"
 DCR_nf_c011_desc:0 "Plasma burns even hotter than flamer fuel, so Torcher wants those Enclave toys in the hands of our boys."
 DCR_nf_c012:0 "Homecoming"
 DCR_nf_c012_desc:0 "Torcher's hometown is a bit of a dump, but there's no place like home."
 DCR_nf_c013:0 "Ashur's Fire"
 DCR_nf_c013_desc:0 "The fires of The Pitt are fueled by slave labor. Torcher is more than happy to keep those forges lit."
 DCR_nf_c014:0 "Restore The Flame Temples"
 DCR_nf_c014_desc:0 "Some of the old temples and ritualsites of Torcher's people still stand. He wants them fixed up."
 DCR_nf_c015:0 "Torchbearers' Rebirth"
 DCR_nf_c015_desc:0 "We are more than just a raider gang. We are disciples of the flame. We will keep the wasteland burning in service of our faith."
 DCR_nf_c016:0 "Fire Up Forges"
 DCR_nf_c016_desc:0 "In the flames of our forges, ruined remains of the old world will be made into something new."
 DCR_nf_c017:0 "Increase Arms Production"
 DCR_nf_c017_desc:0 "The product of our forges will be crafted into tools for our conquest."
 DCR_nf_c018:0 "Honor The Flames"
 DCR_nf_c018_desc:0 "Torcher may be a little strange, but he is right about one thing. There is something special about watching a fire burn."
 DCR_nf_c019:0 "Lost Brothers"
 DCR_nf_c019_desc:0 "There are some people out there who are like Torcher and know a few things about fire. He wants us to get them to join up."
 DCR_nf_c020:0 "Lost Texts"
 DCR_nf_c020_desc:0 "There are still a few pre-war books around about using these flamers. They should help those of us that can read."
 DCR_nf_c021:0 "Torcher's Disciples"
 DCR_nf_c021_desc:0 "Those that studied under Torcher have come to truly appreciate the power of the flame."
 DCR_nf_d000:0 "The Raider Queen"
 DCR_nf_d000_desc:0 "Brigg really didn't last long against those ants. Knew he was a pussy. Maybe this ant lady has a point."
 DCR_nf_d001:0 "The Queen's Rule"
 DCR_nf_d001_desc:0 "The Queen runs a tight crew. Those that don't listen end up feeding her pets."
 DCR_nf_d002:0 "The Queen's Servants"
 DCR_nf_d002_desc:0 "Many of those that surrender to the queen's power will be given the mercy of servitude as drones."
 DCR_nf_d003:0 "Slave Workshops"
 DCR_nf_d003_desc:0 "The drones that prove themselves handier than others will earn positions in the workshops."
 DCR_nf_d004:0 "Drone Mines"
 DCR_nf_d004_desc:0 "Those too weak to fight for the glory of our queen will toil in the mines until they expire. Then they will feed the brood."
 DCR_nf_d005:0 "Evergreen Colony"
 DCR_nf_d005_desc:0 "Evergreen is now running like a smooth machine. Drones produce weapons used by the warriors who venture into the wasteland to bring back both food and plunder."
 DCR_nf_d006:0 "Cult of the Ant"
 DCR_nf_d006_desc:0 "Our wise and powerful queen is right. Man is weak and must be replaced."
 DCR_nf_d007:0 "The Ant's Chosen"
 DCR_nf_d007_desc:0 "Our most powerful warriors learn the ways of the ant. They will fight to their last breath to usher in the age of the ant."
 DCR_nf_d008:0 "Return to Canterbury"
 DCR_nf_d008_desc:0 "The Queen demands we destroy the shitheads in Canterbury Commons, so it's go time.
 DCR_nf_d009:0 "Reward Fealty"
 DCR_nf_d009_desc:0 "Those of The Capital Wasteland who submit to The Queen's rule, will receive her mercy."
 DCR_nf_d010:0 "Punish Humanity"
 DCR_nf_d010_desc:0 "The wails of the pathetic wretches of The Capital Wasteland fall on deaf ears. Their deaths will make an example for those that dare stand against The Age of The Ant."
 DCR_nf_d011:0 "A Rival Crushed"
 DCR_nf_d011_desc:0 "The Mechanist thought he could protect man from the coming of the ant. He was a fool."
 DCR_nf_d012:0 "A New Life for Lesko"
 DCR_nf_d012_desc:0 "The Queen sees a use for this scrawny dweeb. He is not to be harmed."
 DCR_nf_d013:0 "Queen's Tribute"
 DCR_nf_d013_desc:0 "The humans of The Capital Wasteland pay tribute to their queen. This act is a pathetic attempt at avoiding becoming ant food."
 DCR_nf_d014:0 "The Fate of Man"
 DCR_nf_d014_desc:0 "The conquest of The Capital Wasteland is just the beginning. Those beyond our territory are next."
 DCR_nf_d015:0 "Empire of Ant"
 DCR_nf_d015_desc:0 "From The Evergreen Colony to The Chesapeake Bay, there is one ruler. The Antagonizer, queen of the ants, enforces the strict society of ant-kind. All are servants to the colony, whether it be as warriors, drones, or food. The age of man is over, even if those fools don't know it yet."
 DCR_nf_d016:0 "Andale Conquest"
 DCR_nf_d016_desc:0 "Those freaks in Andale have been a problem for some time. Now we will deal with them."
 DCR_nf_d017:0 "ANTDale"
 DCR_nf_d017_desc:0 "The men of Andale will feed the brood."
 DCR_nf_d018:0 "The Queen's Warriors"
 DCR_nf_d018_desc:0 "The ants are tough, fearless, and have a mean bite. Be careful not to become food for them."
 DCR_nf_d019:0 "Ways of the Ant"
 DCR_nf_d019_desc:0 "The Antagonizer is having us train with the ants and learn to fight together with them."
 DCR_nf_d020:0 "Dig Hatcheries"
 DCR_nf_d020_desc:0 "The Antagonizer has ordered the slaves to dig out tunnels under Evergreen to raise her brood."
 DCR_nf_d021:0 "A Mighty Force"
 DCR_nf_d021_desc:0 "The latest generation of ant warriors is here."
