l_english:
  FRM_sidelined_civilian_government:0 "Sidelined Civilian Government"
  FRM_sidelined_civilian_government_desc:0 "The Fire Marshalls do have a civilian government... but looking at them, you'd hardly know they exist."

  FRM_fires_in_the_swamp:0 "§OFires in the Swamp§!"
  FRM_fires_in_the_swamp_desc:0 "To keep the swamp from engulfing their territory, the Fire Marshalls have become masters of the flamer, and constantly undertake controlled burns. Their mastery of fire has become truly admirable, but one must wonder.\n\nWill they keep to their noble goal, or will they instead choose to §Rwatch the world burn§!?"

  FRM_fire_marshalls:0 "§RThe Fire Marshalls§!"
  FRM_fire_marshalls_desc:0 "Our §RMarshalls§! have cut their teeth against an unending foe for decades. They are elites in their usage of engineering and flamers, allowing them to quickly take and hold any position. Their tenacity serves them as they are often left surrounded by their enemy, fighting by the light of their flamers alone."

  frm_rebuilt_universities:0 "Rebuilt Universities"
  frm_rebuilt_universities_desc:0 ""

  frm_swamp_hub:0 "Swamp Hub"
  frm_swamp_hub_desc:0 "Despite its location, Lynch is actually a nice place!"

  frm_swamp_research:0 "Swamp Research"
  frm_swamp_research_desc:0 ""

  frm_swamp_destruction:0 "Swamp Destruction"
  frm_swamp_destruction_desc:0 ""

  frm_watch_the_world_burn:0 "Watch the World Burn"
  frm_watch_the_world_burn_desc:0 "This world has known enough despair and death. What's a little more despair and death, if on the other side there is peace?"

  frm_virginias_salvation:0 "Virginia's Salvation"
  frm_virginias_salvation_desc:0 "Virginia is saved, and the people prosper. Peace and plenty are the new rulers of Virginia."