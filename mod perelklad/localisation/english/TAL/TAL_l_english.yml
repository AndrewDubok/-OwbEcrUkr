    ###Leaders###
    TAL_jabsco_name:0 "Commander Jabsco"
    TAL_Jabsco_desc:0 "Commander Jabsco is the brains behind Talon Company. From the safety of his bunker in Fort Banister, Jabsco oversees and coordinates the various military operations all across the DC wasteland. Despite his claims of years of combat experience, none of his men have ever seen evidence of this. The few times the Commander has ever been seen in an engagement, he's been reported to flee or take cover and never engage. This has led to him being called Jetting Jabsco behind his back." 
    TAL_harrison_name:0 "Captain Harrison"
    TAL_harrison_desc:0 "Captain Harrison doesn't know who he pissed off to get moved from combat duty to babysitting a bunch of waster mercs. All he knows is that he is here now and it is his job to make sure Talon Company proves themselves worth the investment The Enclave is putting in them. Maybe if things go well, he can make his way back into the forces."
    TAL_chaney_name:0 "Captain Chaney"
    TAL_col_harrison_name:0 "Colonel Harrison"
    TAL_maj_harrison_name:0 "Major Harrison"
