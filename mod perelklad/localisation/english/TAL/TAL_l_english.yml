l_english:

    ###Ideas###
    tal_rigorous_training_idea:0 "Rigorous Training"
    tal_rigorous_training_idea_desc:0 "Talon Company's Mercs are among the best trained in all the wastes. Discipline, order, and ruthlessness are ingrained in each and every recruit. It takes time, and some dont make the cut. But those that do are among the best." 
    tal_strict_leadership_idea:0 "Strict Leadership"
    tal_strict_leadership_idea_desc:0 "These leaders will not tolerate failure or weakness, and will personally execute anybody found not following orders."
    TAL_old_world_science_equipment:0 "Old World Science Equipment"
    TAL_old_world_science_equipment_desc:0 "Here at Talon Company, we have some of the best eggheads caps can buy working day and night to find the next great way to kick ass and take names for our clients."
    TAL_mercenary_research_team:0 "Merc Researchers"
    TAL_mercenary_research_team_desc:0 "Researchers considered too 'unethical' for hoity-toity Rivet City find their way here, helping us find new and exciting ways to blow shit up."
    TAL_mercenary_weapon_maintenance:0 "Merc Weapon Maintenance"
    TAL_mercenary_weapon_maintenance_desc:0 "In the field, a merc's life depends on their gun, so make sure yours is working well."
    TAL_refined_ammo_processing:0 "Refined Ammo Processing"
    TAL_refined_ammo_processing_desc:0 "Rinky-dink workbenches made with scavenged equipment just don't compare to the quality ammoworking tools we have here at Banister"
    TAL_fort_bannister_defenses:0 "Fort Banister Defenses"
    TAL_fort_bannister_defenses_desc:0 "Automated turrets, security bots and lockable doors all make sure that it would take a real army to push us anywhere."
    TAL_enclave_funds:0 "Enclave Funding"
    TAL_enclave_funds_desc:0 "Those guys in The Enclave are paying us really well just to stir up shit in The Wasteland. While the source of our funding is unknown, plenty of wasteland wannabees see we are raking in the caps, and they want in."
    TAL_soldiers_of_fortune:0 "Soldiers of Fortune"
    TAL_soldiers_of_fortune_desc:0 "Business is going well and there is enough loot to go around. Our boys are constantly bringing back trophies from their successful raids."
    TAL_night_ops:0 "Night Ops"
    TAL_night_ops_desc:0 "What is the point of wearing all black armor if we aren't sneaking around at night doing skitz shit?"
    TAL_enclave_training:0 "Enclave Training"
    TAL_enclave_training_desc:0 "These new instructors may be some nasty bastards, but they are only moderately worse than what we are used to, plus they know their shit."
    TAL_officer_corp:0 "Officer Corps"
    TAL_officer_corp_desc:0 "Some of our squad leads are getting some fancy education on being a squad leader"
    TAL_raider_mercs:0 "Raider Mercs"
    TAL_raider_mercs_desc:0 "We have taken some raiders that had their shit together in before, but maybe we can relax the standards and take some of the more wild ones to use for fodder"
    TAL_paying_for_protection_idea:0 "Paying Protection money"
    TAL_paying_for_protection_idea_desc:0 "Those assholes at Talon Company are shaking us down for protection money."
    TAL_protection_money_idea:0 "Protection Money"
    TAL_protection_money_idea_desc:0 "Those chumps at Tenpenny Tower are paying us to sit on our ass and do nothing, just so long as we don't attack them. Easiest caps I've ever made, I'll tell you that."
    TAL_grooming_standards_idea:0 "Grooming Standards"
    TAL_grooming_standards_idea_desc:0 "Nobody would have expected The Enclave's employment terms to be this strict, but if trimming a mustache is what it takes to stay on this gig, I guess you'd better pass the knife."
    TAL_enclave_tactics_idea:0 "Enclave Tactics"
    TAL_enclave_tactics_idea_desc:0 "The Enclave have tought us that fighting is about more than just having the biggest guns and scaring the shit out of the enemy."

    ###New Ideas###
    TAL_brotherhood_fight_idea:0 "Anti-Brotherhood Training"
    TAL_brotherhood_fight_idea_desc:0 "The Enclave have sent some materials and people to teach us how to better fight those tin-cans in The Brotherhood."
    TAL_slave_work_force:0 "Slave Workers"
    TAL_slave_work_force_desc:0 "Slaves aren't too pricy when you buy in bulk, and it's cheaper to have them pumping out guns than buying them from traders."
    TAL_slave_trade_idea:0 "Slave Trade Profits"
    TAL_slave_trade_idea_desc:0 "Why pay for slaves when we can snatch some from wasteland settlements and sell off the ones we don't want?"
    TAL_salvaged_enclave_tec_idea:0 "Salvaged Enclave Tech"
    TAL_salvaged_enclave_tec_idea_desc:0 "We may not be able to understand all the enclave tech we got our hands on, but we can figure out enough."
    TAL_loyal_recruits_idea:0 "Loyal Recruits"
    TAL_loyal_recruits_idea_desc:0 "We carefully vet our recruits to ensure they are joining up not just for the money, but for love of their country... and money."
    TAL_experienced_recruits_idea:0 "Experienced Recruits"
    TAL_experienced_recruits_idea_desc:0 "We carefully vet our recruits to ensure they are capable soldiers. Former mercs, caravan guards, and soldiers are at the top of the list."
    TAL_brave_recruits_idea:0 "Brave Recruits"
    TAL_brave_recruits_idea_desc:0 "We carefully test our recruits to make sure they have the guts to fight for us."
    tal_war_is_business_idea:0 "War is Business"
    tal_war_is_business_idea_desc:0 "At the end of the day, we are not here to run towns or create order. We are here to kick ass and collect caps."
    TAL_and_business_is_booming_idea:0 "Business is Booming"
    TAL_and_business_is_booming_idea_desc:0 "The wasteland is getting worse and worse by the day. Ever since we kicked The Enclaves asses there is more and more demand for our services!"
    TAL_grand_ambitions_idea:0 "Grand Ambitions"
    TAL_grand_ambitions_idea_desc:0 "Talon Company is more than just another merc gang. No matter what these so-called powers of The Wasteland think, we will rise above everyone!"
    TAL_hunting_greenskin_home_idea:0 "Searching for The Super Mutant Home"
    TAL_hunting_greenskin_home_idea_desc:0 "Our men are searching tirelessly for the home of The Super Mutants."
    TAL_reorg_idea:0 "Messy Reorg"
    TAL_reorg_idea_desc:0 "Many big changes are happening at our HQ. The resulting chaos is causing a lot of problems"
    TAL_co_armerments_idea:0 "Talon Co Armerments"
    TAL_co_armerments_idea_desc:0 "Some of the best gunsmiths in The Capital Wasteland are in our employ. No longer will we have to rely on scavenging old parts or using rusted pipe guns."
    TAL_elite_mercs_idea:0 "Elite Mercs"
    TAL_elite_mercs_idea_desc:0 "Our mercenaries are the best of the best. Better trained, better equipped and capable of standing up against even the toughest forces in the wastes."
    TAL_same_but_better_idea:0 "Dont Mess With Success"
    TAL_same_but_better_idea_desc:0 "We didn't get to where we are with advanced power armor or special tactics. We just need good old fashioned discipline and fighting spirit."
    TAL_recruitment_offices_idea:0 "Recruitment Offices"
    TAL_recruitment_offices_idea_desc:0 "A few of our mercs will be pulled from field duty to work in settlements across the wasteland. There they will convince young men and women to sign up to fight for Talon Company!"
    TAL_lowest_bidder_idea:0 "The Lowest Bidder"
    TAL_lowest_bidder_idea_desc:0 "With our large presence we are a valuable client to have. As such, we can make wasteland merchants compete to give us the best deal. Sure, sometimes the guns jam or blow up, but most of the time they do not!"
    TAL_mobile_recon_idea:0 "Talon Mobile Recon"
    TAL_mobile_recon_idea_desc:0 "While we maintain our standard operations for much of our force, a growing number of our troops are performing a new role. Our mobile recon operators specialize in lightning fast insertions into enemy territory and the occasional disruptive verti-assault."
    TAL_proxy_warriors_idea:0 "Proxy Warriors"
    TAL_proxy_warriors_idea_desc:0 "Talon Company mercenaries are deployed far and wide in pursuit of America's interests. This does not only mean fighting side by side with our military friends, but often fighting alongside wasteland upstarts to slow down the expansion of our enemies."
    TAL_ready_for_anything_idea:0 "Ready For Anything"
    TAL_ready_for_anything_idea_desc:0 "After months of reorganization, our operations are running smoother than ever. We are ready for whatever the wasteland has to throw at us."
    TAL_welcomed_enclave_idea:0 "Integrating Eden Supporters"
    TAL_welcomed_enclave_idea_desc:0 "The soldiers that fought for President Eden are now integrating into our forces. The friction this is causing disrupts operations and leads to the occasional fight."
    TAL_we_bring_order_idea:0 "We Bring Order"
    TAL_we_bring_order_idea_desc:0 "The Talon Enclave brings stability wherever it goes. Raiders, mutants, and unruly settlers alike are put down."
    TAL_we_bring_prosperity_idea:0 "We Bring Prosperity"
    TAL_we_bring_prosperity_idea_desc:0 "The technology The Talon Enclave posesses allows us to rebuild and exploit the resources of the wasteland more effectively than other wasteland nations."
    TAL_halted_slave_trade_idea:0 "Halted The Slave Trade"
    TAL_halted_slave_trade_idea_desc:0 "Rather than collect slaves to send to The Pitt, we have stared hunting down slavers and keeping caravans from our territory from entering The Pitt."
    TAL_extra_socks_idea:0 "Extra Socks"
    TAL_extra_socks_idea_desc:0 "Jabsco read some old book he found that talked about something called trench foot. Now we all have to pack extra socks and change them regularly."
    TAL_lessons_of_swamps_idea:0 "Lessons of The Swamps"
    TAL_lessons_of_swamps_idea_desc:0 "We learned a thing or two about figthing in awful conditions while in the Virginia swamps."
    TAL_amish_craftsmanship_idea:0 "Amish Craftsmanship"
    TAL_amish_craftsmanship_idea_desc:0 "Even with a bomb collar on their neck, the Amish take pride in their work and put out some good stuff for us to sell."
    TAL_settlement_guards_idea:0 "Settlement Guard Roots"
    TAL_settlement_guards_idea_desc:0 "Talon Company may do a lot of different jobs these days, but their origin as settlement guards shows in the way they fight."
    TAL_escorting_scavs_idea:0 "Scavenger Guard Roots"
    TAL_escorting_scavs_idea_desc:0 "Talon Company may do a lot of different jobs these days, but their origin as guards for wasteland scavengers shows in their ability to navigate the wasteland."
    TAL_attacking_caravans_idea:0 "Caravan Raider Roots"
    TAL_attacking_caravans_idea_desc:0 "Talon Company may do a lot of different jobs these days, but their origin as caravan raiders shows in their ability to cut supply lines and pillage supplies."
    TAL_druggie_raiders_idea:0 "Drugged Up Raiders"
    TAL_druggie_raiders_idea_desc:0 "The core of Talon Company's fighting force is raiders hopped up on chems. They fight hard, but they are sloppy"
    TAL_native_wastelanders_idea:0 "Naive Wastelanders"
    TAL_native_wastelanders_idea_desc:0 "The core of Talon Company's fighting force is young wastelanders looking for adventure. They are eager, but many do not last long past their first engagement."
    TAL_homeless_guys_idea:0 "The Wastelands' Desperate"
    TAL_homeless_guys_idea_desc:0 "The core of Talon Company's fighting force is the wastelands' desperate and destitute. They fight for cheap, and are loyal for the opportunity we give them, but they are far from the best."
    TAL_enclave_contracts_idea:0 "Enclave Employment Contract"
    TAL_enclave_contracts_idea_desc:0 "The Enclave has become our primary employer. The pay is good, even if some of the jobs are weird."
    TAL_enclave_contracts_1_idea:0 "Enclave Employment Contract"
    TAL_enclave_contracts_1_idea_desc:0 "Our new employment contract with The Enclave is providing better benefits than before."
    TAL_enclave_contracts_2_idea:0 "Enclave Employment Contract"
    TAL_enclave_contracts_2_idea_desc:0 "Our new employment contract with The Enclave is providing better benefits than before."
    TAL_enclave_contracts_3_idea:0 "Enclave Employment Contract"
    TAL_enclave_contracts_3_idea_desc:0 "Our new employment contract with The Enclave is providing better benefits than before."
    TAL_enclave_settlements_idea:0 "Enclave Settlement Administration"
    TAL_enclave_settlements_idea_desc:0 "The settlements in Talon Company territory fall under the administration of The Enclave."
    TAL_talon_settlements_idea:0 "Talon Settlement Administration"
    TAL_talon_settlements_idea_desc:0 "The settlements in Talon Company territory will be administrated by Talon Company Authorities."
    TAL_cleaning_purity_idea:0 "Developing FEV Antigen"
    TAL_cleaning_purity_idea_desc:0 "Our scientists are devoting almost all of their time and resources to developing an antigen for the modified FEV tainting Project Purity."
    TAL_slow_to_trust_idea:0 "Slowly Build Trust"
    TAL_slow_to_trust_idea_desc:0 "The people of the wasteland are understandably apprehensive about us. Eventually we will gain their trust, but it will take time."
    TAL_increased_merc_pay_idea:0 "Increased Merc Pay"
    TAL_increased_merc_pay_idea_desc:0 "To maintain the loyalty of our men, we are paying them more than we ever have before."
    TAL_simms_promises_kept_idea:0 "Wastelander Promises Kept"
    TAL_simms_promises_kept_idea_desc:0 "We have kept our promises to Lucas Simms and are winning the trust of the wastelanders."
    TAL_merchant_freedom_idea:0 "Merchant Freedoms Protected"
    TAL_merchant_freedom_idea_desc:0 "Wasteland merchants have little to fear from us. Taxes may be levied, but they are low just as regulations are light."
    TAL_merchant_regulation_idea:0 "Merchants Regulated"
    TAL_merchant_regulation_idea_desc:0 "Wasteland merchants are kept in line though regulation and moderate taxes."
    TAL_reinvented_government_idea:0 "Reinvented Government"
    TAL_reinvented_government_idea_desc:0 "In an attempt to extort the people of The Wasteland in exchange for protection, Jabsco has accidentally reinvented the concept of government."
    TAL_accelerated_pitt_idea:0 "Accelerated Production"
    TAL_accelerated_pitt_idea_desc:0 "The forges of The Pitt burn bright. Work never stops and workers that stop are replaced."
    TAL_maintained_pitt_idea:0 "Steady Production"
    TAL_maintained_pitt_idea_desc:0 "The forges of The Pitt burn steadily. Work is carried out at a smooth, sustainable level."
    TAL_werners_way_idea:0 "Werners Way"
    TAL_werners_way_idea_desc:0 "The forges of The Pitt are run with a soft hand. Workers are allowed breaks and only work 12 hour days. It should be better in the long run"
    TAL_ashurs_way_idea:0 "Ashurs Way"
    TAL_ashurs_way_idea_desc:0 "The forges of The Pitt burn bright as ever. The slaves notice little difference between Jabsco running The Pitt or Ashur."
    TAL_reinvented_government_2_idea:0 "Reinvented Government"
    TAL_reinvented_government_2_idea_desc:0 "In an attempt to extort the people of The Wasteland in exchange for protection, Jabsco has accidentally reinvented the concept of government."
    TAL_supplying_pitt_idea:0 "Supplying The Pitt"
    TAL_supplying_pitt_idea_desc:0 "With our domination of The Capital Wasteland's slave trade, we are a huge supplier for The Pitt."
    TAL_supplying_pitt_2_idea:0 "Supplying The Pitt"
    TAL_supplying_pitt_2_idea_desc:0 "With our partners and valuable DC salvage, we are an essential supplier for The Pitt."
    TAL_talon_supplyers_idea:0 "Talon Company Supplies"
    TAL_talon_supplyers_idea_desc:0 "Talon Company is keeping us supplied with slaves from The Capital Wasteland."
    TAL_talon_supplyers_2_idea:0 "Talon Company Supplies"
    TAL_talon_supplyers_2_idea_desc:0 "With our need for enslaved workers vanishing, Talon Company has pivoted to providing us valuable resources through 3rd party partners."
    TAL_southern_imports_idea:0 "Southern Imports"
    TAL_southern_imports_idea_desc:0 "Valuable salvage of all kinds is shipped up from the south through The Dover Traders."
    TAL_hershey_exports_idea:0 "Hershey Exports"
    TAL_hershey_exports_idea_desc:0 "With Hershey under the control of The Warthog, amish craftsmen are put to work and their goods sold far and wide. The Warhog has given us a cut as thanks for our aid."
    TAL_joes_junkmen_idea:0 "Joe's Junkmen"
    TAL_joes_junkmen_idea_desc:0 "Joe has brought in more of his associates from his scavenging days to organize teams of slaves to go into the DC ruins looking for scrap and other valuable loot."
    TAL_constantine_attacking_idea:0 "Constantine's Attack"
    TAL_constantine_attacking_idea_desc:0 "The robots of Fort Constantine have been driven haywire and are attacking our flanks. Until we destroy these bots, our military will suffer."

    ###Occupation Laws###
    ecr_protection_contracts:0 "Protection Contract"
    ecr_protection_contracts_desc:0 "Talon Company will enter into an agreement with the local leaders to protect their settlements in exchange for a ton of caps. Refusing this generous offer could prove deadly."
    
    ###Events###
    TAL_nf_events.1.title:0 "Putting Together A Team"
    TAL_nf_events.1.desc:0 "Jabsco, like many young men in The Capital Wasteland, did not have many prospects for employment. After a series of failed jobs, his final straw was being fired from guarding caravans after he ran away from a pack of molerats. That was when Jabsco realized his calling. He was not destined to toil for a living, he was destined to boss others around and get rich off of them! With a few exagerations and some empty promises Commander Jabsco was able to put together his first team of mercenaries. But just who would be stupid enough to fall for that?"
    TAL_nf_events.1.a:0 "Drug-addicted raiders"
    TAL_nf_events.1.b:0 "Naive wasteland youths"
    TAL_nf_events.1.c:0 "Desperate homeless guys"
    TAL_nf_events.2.title:0 "Done Dirt Cheap"
    TAL_nf_events.2.desc:0 "Just starting out, Jabsco's mercenary gang had the odds stacked against them. Their uniforms were crudely painted pieces of metal fashioned into armor, their weapons were whatever cheap scrap guns they could afford, and their base was just a shack Jabsco had inherited from his grandma. Reputation is everything in the mercenary game and the fledgling Talon Company needed to build one up if they were to get the good jobs. In their early days their main jobs were..."
    TAL_nf_events.2.a:0 "Guarding frontier settlements"
    TAL_nf_events.2.b:0 "Escorting scavs into old ruins"
    TAL_nf_events.2.c:0 "Attacking caravans and settlements"
    TAL_nf_events.3.title:0 "Entering Banister"
    TAL_nf_events.3.desc:0 "Times were tough and there were more than a few times Talon Co had to flee from a job. During one of these tactical withdrawals they stumbled across Fort Banister. The crumbling pre-war ruin was largely stripped to nothing on the surface level. It was a huge stroke of luck that Jabsco happened to find an old keycard on a skeleton and led his people into the lower levels. There they found..."
    TAL_nf_events.3.a:0 "Secruity bots ready to be activated"
    TAL_nf_events.3.b:0 "A cache of pre-war weapons"
    TAL_nf_events.3.c:0 "Old training manuals"
    TAL_nf_events.3.d:0 "They didn't find shit"
    TAL_nf_events.4.title:0 "Jetting Jabsco"
    TAL_nf_events.4.desc:0 "Despite his best boasts and most convincing lies, the growing number of mercs in Talon Company quickly caught on to the fact that their leader was a bit of a pussy. His tales of past valor and great deeds were never substantiated. It didn't help that he was seen more than once fleeing from battles that went a little sideways. Usually mercenaries don't follow someone who hardly leaves their bunker, but Jabsco was different. Despite all his lacking qualities, he sure had a talent for..."
    TAL_nf_events.4.a:0 "organizing operations"
    TAL_nf_events.4.b:0 "negotiating contracts"
    TAL_nf_events.4.c:0 "training fighters"
    TAL_nf_events.4.d:0 "keeping his people happy"
    TAL_nf_events.5.title:0 "Quite The Punishment"
    TAL_nf_events.5.desc:0 "Stepping off the vertibird Captain Harrison felt the gravity of his situation set in. Fort Banister looked more like a refugee camp erected around a few destroyed cement structures and piles of rusted scrap metal than a military base. The so-called soldiers he was to command stood in a pittiful formation waiting at the landing zone. These unruly mutants gawking in their filthy uniforms, mouths agape as if they had never seen a vertibird before. Just the knowledge that these non-compliants breathed the same air as him made The Captain feel sick to his stomach. A few loose words to the wrong person were all it took to land The Captain this unenviable assignment to somehow whip this rabble into shape. Nobody knew when exactly word would come down from command calling the force into action, but if Harrison was to ever return to his old command, they would need to be ready. Looking out at the men, Captain Harrison wondered if that may prove an impossible task."
    TAL_nf_events.5.a:0 "We've got our work cut out for us."
    TAL_nf_events.6.title:0 "Tales Of Navarro"
    TAL_nf_events.6.desc:0 "Seeing these unwashed mercs day in and out, Captain Harrison couldn't help but think back to life in Raven Rock. The soldiers of The Enclave were clean and disciplined. The mercs of Talon Company on the other hand were dirty and rowdy. They would hardly respond to even the most basic commands and most of them could barely sit still during military theory lectures. After a few weeks, Captain Harrison remembered his father's old stories of bootcamp out West. His father told stories of an old drill sargent that could turn even the most undisciplined recruit into an orderly soldier. According to the stories, the Sgts first priority for the men was ensuring they maintained their uniform and appearance. Implimenting strict personal grooming standards could be the first step to getting the men in line."
    TAL_nf_events.6.a:0 "PO-LICE THAT MU-STACHE PRIVATE!"
    TAL_nf_events.7.title:0 "Whats A Flank?"
    TAL_nf_events.7.desc:0 "The Captain was absolutely dumbfounded at the question posed by one of the mercs. The stonefaces sitting around the room showed that this was not another juvenile wisecrack, the young man was serious and everyone else around him waited for the answer because they didn't know either. The Captain knew from reports that wastelander tactics were rudimentiary, but he figured Talon Company would at least do more than bumrush their targets. In that moment it had become painfully clear that no matter how disciplined this gaggle of hired guns were, they would be useless against anyone actually organized. They would need a lot more training if they were to be worth the resources The Enclave were investing in them."
    TAL_nf_events.7.a:0 "Okay, so a flank is..."
    TAL_nf_events.8.title:0 "An Interesting Proposal"
    TAL_nf_events.8.desc:0 "Talon Company has sent us an interesting offer. As part of our contract, we agreed to not reclaim any equipment in Banister they had access to, and that included crates of advanced parts. Thankfully the commander we installed there has come up with a solution that their officers have agreed to, a simple trade. Captain Harrison reports the mercs are willing to part with these advanced components in exchange for rifles and ammunition. In the long run, this is a good deal, but we need to take stock and see if we can part with what they are asking."
    TAL_nf_events.8.a:0 "We can give 100 rifles"
    TAL_nf_events.8.b:0 "We can give 200 rifles"
    TAL_nf_events.8.c:0 "We can give 300 rifles"
    TAL_nf_events.8.d:0 "We need every rifle we have!"
    TAL_nf_events.9.title:0 "Super Mutant Attack!"
    TAL_nf_events.9.desc:0 "One of our assault groups was chasing a fleeing squad of Talon Company mercs and lost sight of them. There was fortified camp nearby and our soldiers pushed on towards what they assumed was a Talon Company outpost. It turned out to be a large Super Mutant encampment. While our men still wiped out the camp, the mercs got away and we took heavier losses than expected."
    TAL_nf_events.9.a:0 "Damn Them!"
    TAL_nf_events.10.title:0 "Crazed Machines"
    TAL_nf_events.10.desc:0 "We don't know why, but the robotic security at Fort Constantine has started advancing towards Raven Rock and attacking anyone that stands in their way. We can assume Talon Company had something to do with this. A handfull of robots are not going to destroy us, but this development could jeopardize our operations."
    TAL_nf_events.10.a:0 "We'll still win"
    TAL_nf_events.11.title:0 "Hitting The Fan"
    TAL_nf_events.11.desc:0 "Just as he had done almost weekly since taking command of Talon Company, Captain Harrison stood in the Fort Banister courtyard and addressed his men. This time he was not talking about a new training exercise or disciplining an insubordinate squad. This was the big day that the past months were leading to. The Enclave had revealed themselves to the wasteland, and as they'd all expected, The Brotherhood was putting up stiff resistance. Harrison looked out over the men standing in formation before him as he briefed them, and he realized just how drastically they had changed since he first landed at Banister. These men now stood in proper formation with their uniforms in order and their attention affixed solely on The Captain. Once he wrapped up his speech and directed the soldiers to report to their squad leaders for assignments he saw the men snap into action. Maybe they won't all die in their first battles with The Brotherhood after all."
    TAL_nf_events.11.a:0 "Or maybe that's wishfull thinking"
    TAL_nf_events.12.title:0 "Seige of Tenpenny Tower"
    TAL_nf_events.12.desc:0 "Tenpenny Tower was the most luxurious fortress in The Capital Wasteland. Designed to keep the dangers of the wasteland at bay so its inhabitants could enjoy lives of peace and luxury. The walls that stood for years since the tower's occupation were enough to keep raiders or wasteland creatures out, but not Talon Company. Captain Harrison had to give the mercs some credit, he fully expected them to loot and pillage the tower once they breached the defenses. Instead, the leader of the attack radioed back asking for permission to sack the tower."
    TAL_nf_events.12.a:0 "Out of the question"
    TAL_nf_events.12.b:0 "Keep it to a minimum"
    TAL_nf_events.12.c:0 "Go nuts"
    TAL_nf_events.13.title:0 "Exceeding Expecations"
    TAL_nf_events.13.desc:0 "Going into this assignment and even well into the early days of the Enclave-Brotherhood War, Captain Harrison expected the men placed into his command to serve as little more than fodder. He believed that despite his best efforts, these wasteland guns for hire would serve as little more than a distraction for The Brotherhood. The Captains fears were quickly dismissed. Not only did Talon Company perform well in fights with The Brotherhood's wasteland allies, but these once undisciplined sellswords even held their own when they faced The Brotherhood themselves. This meant that the mercs would not be dragging his career deeper into the gutter. Despite what he and just about all others in The Enclave thought, these wasteland warriors were not useless, but quite the opposite. Talon Company had proven that with the right instruction wastelanders could prove competent soldiers. The Captain's goal had been achieved, and his chances of returning to Raven Rock that much better."
    TAL_nf_events.13.a:0 "But would he want to go?"
    TAL_nf_events.14.title:0 "Chaos To Caps"
    TAL_nf_events.14.desc:0 "The collapse of The Brotherhood and DC Settlements following the war with The Enclave had some expected side-effects. Opportunistic raiders struck at fringe settlements while The Enclave moved into their new role governing The Capital Wasteland. That is where Talon Company stepped in. Per Major Harrisons discussions with Commander in Chief Autumn, Talon Company would guard settlements in the southern Capital Wasteland to give The Enclave some breathing room. In exchange, Talon Company would be able to collect fees from the settlements themselves for this service."
    TAL_nf_events.14.a:0 "Sounds like a win-win"
    TAL_nf_events.15.title:0 "A New Contract"
    TAL_nf_events.15.desc:0 "The original plan for Talon Company following the war with The Brotherhood was for them to be disintegrated and their land annexed. Then The Major convinced Autumn to stay that decision and allow the mercenaries to remain in operation for The Government. The terms of this agreement would need to be discussed at a later date when the chaotic situation in The Capital Wasteland died down a little. That time had finally come and the deal was much the same as before, except for compensation. The Major had requested that along with the usual compensation for the mercs there would be a little extra."
    TAL_nf_events.15.a:0 "Better pay for the men"
    TAL_nf_events.15.b:0 "Subsudies for weapon production"
    TAL_nf_events.15.c:0 "Increased rights to captured equipment"
    TAL_nf_events.16.title:0 "Under Cover Of Night"
    TAL_nf_events.16.desc:0 "The initial optimism The Captain felt seeing Talon Company's success on the battlefield was quickly replaced with an uneasy sense of dread. Very shortly after The Battle of Project Purity almost all contact with command was severed. The only source of communication was the occasional vertibird supply drop, but even then the once chatty delivery crew was uncharacteristically tight-lipped. The Captain worried that the war maybe was not going as well as expected, or perhaps he was being iced out by someone in command that didn't like Talon Co's success. None of his wildest concerns could have prepared him for the truth that arrived just outside Bannister in the middle of the night. A handfull of battered officers and soldiers arrived in badly damaged vertibirds. The Captain had almost ordered the men on alert, thinking an unexpected Brotherhood advance was on the way. Before he could give the command, he was pulled aside by the young Lieutenant leading the small contingent and told the true purpose of their visit.\n \n§RColonel Autumn is dead, most of command too. Eden is cleaning house and we need your help.§! \n \nThe Captain welcomed the survivors inside Banister and spent most of the night hearing their story. Colonel Autumn had learned of a plan by President Eden to purge the wasteland with modified FEV and staged a coup to try and stop the plan. The failure of the coup and mass executions of co-conspirators that followed sent many like the young Lieutenant scrambling. After a handfull of attempts at regrouping that turned out to be traps they were left with nowhere else to go but Fort Banister. An unsettling thought soon dawned on The Captain. If this was how Eden was handling command, and that was his plan for wastelanders, the crosshairs would likely soon be on his head too. If these soldiers, The Captain and Talon Company were to survive, they would need to be ready for a fight."
    TAL_nf_events.16.a:0 "But first, we need to hide those birds!"
    TAL_nf_events.17.title:0 "Hide In Plain Sight"
    TAL_nf_events.17.desc:0 "In the weeks following the arrival of the first enclave survivors more had shown up. It was easy enough to find space for them, but it was only a matter of time before someone on the supply teams noticed another soldier walking around in Advanced Power Armor. If these soldiers were to avoid detection, they would need to hide their suits and don something more inconspicuous."
    TAL_nf_events.17.a:0 "Thank god for this captured BoS tech"
    TAL_nf_events.18.title:0 "A Risky Rendezvous"
    TAL_nf_events.18.desc:0 "After the initial meeting with survivors from Autumn's failed coup, Captain Harrison ordered some of his scouts pulled from the lines to instead follow up on rumors of Enclave soldiers seen far from the front. It had been a mixed bag. Sometimes they would find a starving squad searching through a crumbling grocery store, sometimes they would find nothing but corpses surrounding a crashed vertibird. But this lead was the most promising of all. Scouts had followed up on multiple reports of vertibirds seen destroyed on the ground in the hills to the immediate west. Unlike some of these crashsites they had found, these birds appeared to have landed safely and been deliberately destroyed after the fact. Going by the number of birds and their proximity, it pointed to a large contingent of survivors camped out in the hills. The Captain knew whoever was grouped up in those hills was probably expecting a fight, so strolling into those mountains with his forces would lead needless bloodshed. Instead he took two survivors in battered suits of APA and set out into the hills on their own. Almost immediately they were ambushed by enclave surivors and taken prisoner. The trio was briefly interrogated before being taken to the leader of the survivors, Major Sharpe of the verti-assault corps. The Major knew who Captain Harrison was and that he obviously was not leading any team to kill him and the other suvivors. That begged the question, just what was this exiled Captain doing wandering the hills looking for them?"
    TAL_nf_events.18.a:0 "Major, we can stop Eden if we work together."
    TAL_nf_events.19.title:0 "Battered and Bloody"
    TAL_nf_events.19.desc:0 "Even with Major Sharpe and the rest of the surviving Autumnists, Talon Company stood very little chance at beating President Eden's forces. If they were to win the coming fight, they would need all the help they could get. That meant working with the wastelanders they were just fighting. Deep in a forgotten metro station south of Tenpenny Tower they met. Representatives from both sides wracked with mistrust and ready to open fire at the drop of the hat. Almost by a miracle, cooler heads prevailed and a fragiale alliance was formed."
    TAL_nf_events.19.a:0 "Will a few armed farmers be enough?"
    TAL_nf_events.20.title:0 "Supplying The Hill Fighters"
    TAL_nf_events.20.desc.1:0 "Wanted signs promising great reward for Lucas Simms were put up by The Enclave in nearly every settlement. Despite that, few would ever consider following the wasteland sheriff up into the hills of The Capital Wasteland. Many disregarded the pursuit because they secretly believed in his cause, but just as many knew it would be a suicide mission. If The Enclave can't even fight the wasteland leader turned guerilla without getting a bloody nose, what chance could a wasteland bountyhunter stand? That was not to say things were going well for Simms and his guerillas. For every successful ambush they pulled off, they had a deadly setback. When word came from another resistance group that there was an Enclave officer wanting to take the fight to President Eden, Simms was willing to at least listen. \nThe meeting between Harrison and Simms went well into the following morning but eventually a deal was struck. Talon Company would supply the resistance fighters with weapons. Then, when the time was right, they would come down from the hills and take the fight to The Enclave. The question remained just how much aid could Talon Company provide?"
    TAL_nf_events.20.desc.2:0 "Lucas Simms was fighting a guerilla war since before The Enclave even reared their head. Following a successful uprising by Dave, Simms and his closest supporters were hunted men. They took to the hills, fighting to survive, and soon watched as The Enclave swept across The Capital Wasteland. Now Simms found himself leading many of those that hunted him as they continue the fight against The Enclave long after Dave surrendered. Everyone in Simms camp knew their situation was hopeless on their own, but if it wasn't for the members of another cell vouching for Captain Harrison, they'd have sooner shot the Enclave officer than listen to him speak. \nThe meeting between Harrison and Simms went well into the following morning but eventually a deal was struck. Talon Company would supply the resistance fighters with weapons. Then, when the time was right, they would come down from the hills and take the fight to The Enclave. The question remained just how much aid could Talon Company provide?"
    TAL_nf_events.20.a:0 "We give what we can, which isn't much"
    TAL_nf_events.20.b:0 "We can spare quite a bit"
    TAL_nf_events.20.c:0 "Your men will be well armed, Mr. Simms"
    TAL_nf_events.21.title:0 "Beyond Merc Work"
    TAL_nf_events.21.desc:0 "Following the defeat of The Enclave at the hands of Talon Company, the mercenary group has grown well beond that simple label. Jabsco's soldiers are able to project their force across the entire Capital Wasteland and beyond. Few outside of The Brotherhood could ever hope to stand up to them and the lands they occupy are firmly under their control. For better or worse, Talon Company has developed beyond a mercenary band into something of an army with a state."
    TAL_nf_events.21.a:0 "Has a nice ring to it"
    TAL_nf_events.22.title:0 "Talons Shakedown"
    TAL_nf_events.22.desc:0 "Talon Company mercs arrived at Tenpenny Tower recently offering their protection services. They mentioned how the tower was close to raider territory and all but said that if we didn't pay them off, we will be attacked. The mercs are camped nearby and waiting on a response. It should be noted that Talon Company recently came into posession of a substantial amount of advanced equipment after wiping out The Enclave."
    TAL_nf_events.22.a:0 "We will not pay"
    TAL_nf_events.22.b:0 "Give them what they want"
    TAL_nf_events.23.title:0 "Talon's Offer"
    TAL_nf_events.23.desc:0 "News has spread around that Talon Company down in DC recently had a big fight with some bunker-dwelling people in power armor just across the river from them. Rumor has it they were those Enclave guys from the old radio broadcasts. Now some Talon Company guys in power armor we've never seen before came to The Pitt offering to work with Ashur, for a price."
    TAL_nf_events.23.a:0 "They want us to pay? Toss them out!"
    TAL_nf_events.23.b:0 "Throw them some caps"
    TAL_nf_events.24.title:0 "Talon's Offer"
    TAL_nf_events.24.desc:0 "News has spread around that Talon Company down in DC recently had a big fight with some bunker-dwelling people in power armor just across the river from them. Rumor has it they were those Enclave guys from the old radio broadcasts. Now some Talon Company guys in power armor we've never seen before came to The Pitt offering to work with Ashur, for a price. It would seem they have not heard about the recent change in management."
    TAL_nf_events.24.a:0 "Send those assholes packing"
    TAL_nf_events.25.title:0 "Be Your Own Boss!"
    TAL_nf_events.25.desc:0 "After looking over scounting reports of the areas surrounding The Capital Wasteland it has become apparent that there is not a single group out there worth working for. Clearly, Talon Company is miles ahead of the rest and the wasteland is ripe for the taking."
    TAL_nf_events.25.a:0 "Watch out, Brotherhood"
    TAL_nf_events.26.title:0 "How Much For A Cup?"
    TAL_nf_events.26.desc:0 "Whatever this Joe guy in South DC is doing, he's doing it well. Someone like that would be worth putting on the payroll. Lets send some people down there in a vertibird to send him an offer he can't refuse. Make it a real show of force, power amor, plasma guns, everything. Have that guy shitting his pants before we hand him a sack of caps."
    TAL_nf_events.26.a:0 "If he says no, waste him"
    TAL_nf_events.27.title:0 "Promising New Hire"
    TAL_nf_events.27.desc:0 "Jabsco may never admit it, but he doesn't know a damn thing about running a settlement, much less a full nation. He's great at telling soldiers where to go, but not so much ensuring the caravans run on time. Thankfully someone suited to that task just happened to be run out of their territory by The Brotherhood or was it their outcasts? It doesn't matter, Slocum Joe has been run out of South DC and is looking for work. "
    TAL_nf_events.27.a:0 "Welcome Aboard"
    TAL_nf_events.28.title:0 "Wandering Weirdos"
    TAL_nf_events.28.desc:0 "Those wackjobs out west who had some pretty spiffy guns seem to have run into some trouble. We have been seeing more and more of them walking East and recently saw a sizable group approach Banister itself seeking aid. Normally we would tell them to fuck off, but one of them said they're one of they guys that made the guns! He may not have all the plans needed for us to make some from scratch, but he can at least get the ball rolling for us. In exchange we need to take him and his friends in."
    TAL_nf_events.28.a:0 "A weapon to surpass Scrap Metal Gear"
    TAL_nf_events.29.title:0 "Thorn In Our Side"
    TAL_nf_events.29.desc:0 "Super mutants have always been a pain in the ass. We may be able to outmanuver them most of the time, but on occasion we have to get into the thick of it with them. Things are only getting worse by the day, so sooner or later we will have them marching up to Banister. Some of the guys want to just find whatever dump they are coming from and shut it down. The more people we put on this, the less time it will take. But how many people can we spare for something like this?"
    TAL_nf_events.29.a:0 "Put together a small team"
    TAL_nf_events.29.b:0 "Get a few squads together for it"
    TAL_nf_events.29.c:0 "Put everyone we can spare on this"
    TAL_nf_events.30.title:0 "A Shitty Old Vault"
    TAL_nf_events.30.desc:0 "The home of the mutants was found inside some shitty old vault where they were dumping people in green goop or something. The boys killed a fuckload of mutants and sealed the doors of the goop rooms with some heavy explosives so we shouldn't have to worry about super mutants much longer. A few of them have started cracking jokes about how they did in a few months what The Brotherhood couldn't in years."
    TAL_nf_events.30.a:0 "That's because we're the best!"
    TAL_nf_events.31.title:0 "Big Changes"
    TAL_nf_events.31.desc:0 "In the weeks following the new contract, resources were flooding into Fort Banister. Fences repaired, buildings erected and automated defenses installed. Even better than the new resources was access to databanks and blueprints allowing the construction of better buildings."
    TAL_nf_events.31.a:0 "Build Banister Back Better!"
    TAL_nf_events.32.title:0 "Mutant Lovers Assassinate Eden!"
    TAL_nf_events.32.desc:0 "President Eden may have only been president in title, but his goals closely aligned with that of The Secretary. Troubling news has reached us that Enclave soldiers under his command took up arms alongside wasteland mutants to kill the president and put a stop to his FEV plan. This is a troubling development. If we do not put down these upstarts, we could find ourselves having to deal with a threat even worse than The Brotherhood."
    TAL_nf_events.32.a:0 "We will crush them"
    TAL_nf_events.33.title:0 "Like New"
    TAL_nf_events.33.desc:0 "When The Major arrived at Fort Banister it was closer to a squatters camp than a military base. The Major did his best with what was supplied to fix the place up, but there was only so much a biweekly supply vertibird from Raven Rock could do. Following the inflow of new supplies that had all changed. After months of construction, repairs, and the influx of new staff, Fort Banister had facilities that put it beyond even what it was before the war. Perhaps it was time for a new name."
    TAL_nf_events.33.a:0 "Keep it as Fort Banister"
    TAL_nf_events.33.b:0 "Is it vain to name it Fort Harrison?"
    TAL_nf_events.33.c:0 "Fort Jabsco?"
    TAL_nf_events.34.title:0 "Talon Police?"
    TAL_nf_events.34.desc:0 "There are more than a few settlements in areas that are considered under the control of Talon Company. Technically these wastelanders, like all wastelanders, are subject to American law. However, becasue the territory is under occupation by Talon Company, no Enclave administrators have been installed at the settlements. This has led to more than a few problems and now members of the Enclave Civilian Administration are demanding a solution be worked out. As the highest ranking officer in the territory, it is up to The Major to decide."
    TAL_nf_events.34.a:0 "The Enclave will govern the settlements"
    TAL_nf_events.34.b:0 "Talon Co will govern the settlements"
    TAL_nf_events.35.title:0 "Future Warriors"
    TAL_nf_events.35.desc:0 "Talon Company had an image problem. Much like The Enclave, the decisions of past leadership had stained their reputation. The Major was barely aware of any settlement massacre that supposedly occured a few months before he took over and yet that's what many wastelanders remembered Talon Company for. If the company was to integrate into American society and see success after the reclimation of America, an image change would be needed. The Major did not make this decision lightly. This kind of fundamental identity change could impact more than just whatever is painted on uniforms, it could change the organization at its core. What would Talon Company specialize in going into the future?"
    TAL_nf_events.35.a:0 "Talon Co will strive to be the best mercs in America"
    TAL_nf_events.35.b:0 "Talon Co will be the largest mercenary group in America"
    TAL_nf_events.35.c:0 "Talon Co will hit fast, hit hard, anywhere in America"
    TAL_nf_events.35.d:0 "Talon Co will get the job done, no matter how many civilians die"
    TAL_nf_events.36.title:0 "Stormclouds In The West"
    TAL_nf_events.36.desc:0 "The Major sat uneasily in his seat at the table in Raven Rock's briefing room. He was surrounded by Generals, Head Scientists and even a few civilian officials, who like him were unaware of why they were meeting. What little chatter there was between the people in the room stopped as the automatic door slid open. Commander in Chief Autumn sauntered in to his position at the head of the table and addressed the meeting.\n \n§BLadies and Gentlemen, thank you for coming. Since I shut down the mad machine that called itself Presiden Eden we have taken great steps to rebuild our great nation. But we are not out of the woods. There are others like Eden who want to carry out some unsustainable war against American people, one of the worst is someone going by the name of The Secretary. This is a message we just received from this Secretary and his people in Chicago§! \n \nAfter a brief pause a booming voice spoke over the speakers in the room. \n \n§R Autumn, you and your treasonous followers have usurped power and killed true Americans to protect a mutant cancer ravaging our nation. For this crime there can be no punishment great enough. You will see our just retribution.§!"
    TAL_nf_events.36.a:0 "Can we truly be ready?"
    TAL_nf_events.37.title:0 "Cold Welcome"
    TAL_nf_events.37.desc:0 "As The Captain entered Raven Rock he thought back to how much he dreamt of his return during his early days at Fort Banister. For a long time he wanted nothing more than to retrun to Raven Rock. Its shining walls, clean air, and working lights were all things Fort Banister sorely lacked. However, the Raven Rock he knew was now gone. The walls were littered with blood and scorch marks. The air reaked of gunsmoke and singed steel. Even the lights were flickering as engineers tried to fix up the reactor which suffered damage in the fighting. In the command center, The Captain met with the men and women who had to be the highest ranking Enclave personnel still alive. Little more than a couple majors and a handfull of captains, they all looked at each other without much of an idea what to do next. That was when one of the younger officers turned to the Captain and asked what everyone was thinking. \n \n§GWhat do we do now sir?§! \n \nWithout thinking, the Captain blurted out a response. \n \n§B What we always intended to do, rebuild America.§! \n \nA few nods and murmurs of approval were all it took. Even though a couple in the room outranked him, The Captain was the man that led them there and to everyone else he had a plan. The officers all agreed he would be the one to lead them, but not as a Captain."
    TAL_nf_events.37.a:0 "That is some promotion, Colonel Harrison"
    TAL_nf_events.38.title:0 "Dirty Water"
    TAL_nf_events.38.desc:0 "The scientific jargon and figures thrown at The Colonel's as he was led through Project Purity flew over his head. Behind the jargon there was a simple truth that needed to be faced. If this water kept flowing to the people of The Capital Wasteland, it would become a graveyard before the year was out. The modified FEV was already present in the water of the basin and without an antigen being developed, it would be impossible to remove. To develop that antigen, multiple teams of researchers would have to work around the clock. The Colonel just had three words for the scientists showing him the facility."
    TAL_nf_events.38.a:0 "§BGet It Done§!"
    TAL_nf_events.39.title:0 "Painting The Future"
    TAL_nf_events.39.desc:0 "Even after moving the address from the mess hall to a hangar bay the location was near packed to the gills. Enclave soldiers, civilians and Talon Company mercs were crammed into this vertibird bay waiting to hear a plan for the future. The Colonel stood on the makeshift stage and shakily laid out the goal. \n§BGood evening everyone, it has been a trying few months as we adjust to the big changes in The Enclave. I know many of you worry about the future. It is an uncertain time, but there is one thing to guide us, our goal. Together we will rebuild America. Not the America of Eden full of death and horror, but the America Autumn dreamed of. An America of peace, order and prosperity. There is a long road ahead of us, but together we can achieve this goal!§! \n As The Colonel continued his speech one thought crept into his mind. Despite his flowery language, Autumn was far from the idealistic hero he was painting the man as."
    TAL_nf_events.39.a:0 "People need a symbol, even a lie"
    TAL_nf_events.40.title:0 "Schism In The Ranks"
    TAL_nf_events.40.desc:0 "Many members of Talon Company have become dissatisfied with the current direction of things. They were on-board with fighting The Enclave because it was for their survival, but rebuilding a country? That was a lot more than any of them signed up for. Just about everyone in Fort Banister just joined for the caps. What would they care about some fight for an old nation that died over a hundred years before they were born? As their contracts run up, they could just be allowed to leave. Or, it could be worth sweetening the pot to keep the manpower."
    TAL_nf_events.40.a:0 "We do not need them"
    TAL_nf_events.40.b:0 "Offer better pay"
    TAL_nf_events.41.title:0 "Bad Reputation"
    TAL_nf_events.41.desc.1:0 "Despite The Colonel's help dealing with Eden, Lucas Simms was still cautious about the idea of just handing over control of the settlements to an Enclave soldier and his army of rowdy mercs. After hours of discussion and promises Simms was placataed. However, it remained to be seen if The Colonel would keep his promises of settlement autonomy and support for local militias."
    TAL_nf_events.41.desc.2:0 "The war with The Enclave and months of conflict that followed had passed nearly unnoticed by Alistair Tenpenny. Aside from the occasional nastiness on the lower floors, his daily routine of drinking and whoring hardly changed. Upon seeing the state this man lived, The Colonel was disgusted, but not as disgusted as he was at rumors of his involvement in a plot to blow up Megaton. After his meeting with Tenpenny, his attention turned towards the drunk's assistant, Mr. Burke."  
    TAL_nf_events.41.desc.3:0 "Following the fall of the DC Settlements, Uncle Roe did what he could to keep trade routes open and essential supplies flowing to the people of The Capital Wasteland. To the people of The Capital Wasteland he was a symbol of hope and following the fall of The Enclave he was among the top people The Colonel wanted to meet. The meeting of the two was largely focused on economic matters with Uncle Roe's reputation as a shrewd negotiator proving true. Among his suggestions was to have the new authority keep a hands-off approach on economic matters."  
    TAL_nf_events.41.desc.4:0 "Dave was quick to fold under the approaching Enclave and retreat to his fortified compound. While the people of The Capital Wasteland wasted away he sat and watched. Once The Enclave was stopped, he stepped out of his compound. He let no time waste, immediately launching a campaign promoting the lie that he was leading the fight from his corner of the wasteland. The Colonel and his advisors debated if it was worth disproving that idiot, or if leaning into his lie could be beneficial."  
    TAL_nf_events.41.a:0 "The Colonel kept his promises"
    TAL_nf_events.41.b:0 "The Colonel went back on his word... slowly"
    TAL_nf_events.41.c:0 "Burke would face justice"
    TAL_nf_events.41.d:0 "Burke would prove useful"
    TAL_nf_events.41.e:0 "Merchants would be left to their own devices"
    TAL_nf_events.41.f:0 "Merchants would see regulation and tax"
    TAL_nf_events.41.g:0 "Dave would become a symbol of wastelander bravery!"
    TAL_nf_events.41.h:0 "Dave would be exposed as a clown"
    TAL_nf_events.42.title:0 "Vault Of Horrors"
    TAL_nf_events.42.desc:0 "The joint force of Talon and Enclave soldiers made short work of the super mutants infesting Vault 87. Once the way was cleared, science teams moved in and with some work rendered the Vault's FEV innert. At long last the threat of super mutants would be at an end. There may still be mutants out there, but their ability to reproduce had been stopped."
    TAL_nf_events.42.a:0 "See? We are the good guys!"
    TAL_nf_events.43.title:0 "Rusty Potential"
    TAL_nf_events.43.desc:0 "Despite the secure science suit, The Colonel felt a uneasy touring the forges at Pittsburgh. The effects of the Trogg Plague showed themselves on the faces of nearly all the workers. Painful sores and a weezing cough were just the beginning for many of those afflicted. The true horrors of the Trogg Degenerative Condition lay outside the fences in the ruins. Madmen and horrible monsters prowl the crumbling ruins. These horrors notwithstanding, The Colonel recognized there was potential in this area. The forges were possibly the last functioning pre-war manufacturies on this side of the country."
    TAL_nf_events.43.a:0 "Draw up plans to make this place liveable"
    TAL_nf_events.44.title:0 "Clean and Pure"
    TAL_nf_events.44.desc:0 "After months of work to develop and antigen for the modified FEV that Eden dumped into the water, Project Purity is finally safe and steadily pumping out clean water for the masses. We already have several plans in place to distribute this water to the nearby settlements both for humanitarian reasons, and make sure they accept integrating into America. As we speak water distribution centers are being constructed in the vicinity of several wasteland settlements. These centers will serve as both hubs to facilitate efficient distribution of water as well as operate as the main hubs for local governance."  
    TAL_nf_events.44.a:0 "But how does this work?"
    TAL_nf_events.44.b:0 "Let the water flow"    
    TAL_nf_events.45.title:0 "Walls Closing In"
    TAL_nf_events.45.desc:0 "Fort Banister served well as a military base. The upgrades of the last few years allowed it to even handle some of the additional occupants following the fall of The Enclave. However, it became clear very quickly that the fort could not serve as the heart of a reborn America forever. Two candidates were considered for a new base of operations going forward. There was The Pentagon, the old heart of the pre-war military and home for The Lyons Brotherhood. The other suggestion was Adams Air Force Base, a larger airfield and military base. It was also suggested to just make Banister bigger. After all, the resources were available."
    TAL_nf_events.45.a:0 "Move to The Pentagon"
    TAL_nf_events.45.b:0 "Stay at Banister"
    TAL_nf_events.45.c:0 "Move to Adams AFB"
    TAL_nf_events.46.title:0 "Lyons' Legacy"
    TAL_nf_events.46.desc:0 "As The Colonel sat in the former meeting room of The Lyons Brotherhood he overlooked the final plans for restoring The Pentagon to working order. Things were progressing well and the last steps were mostly cosmetic. Looking at the plans for replacing the Brotherhood icongraphy around The Pentagon, The Colonel could not help but think about the effect The Brotherhood had on The Capital Wasteland. They may have been the enemies of The Enclave, but by the same logic so was The Colonel and his men at one point. It is almost beyond denying that while largely isolationist they did do some good for The Capital Wasteland. If it wasn't for Lyons Crusade, The Super Mutant problem would've been much worse. Maybe something of The Brotherhood deserved preservation."
    TAL_nf_events.46.a:0 "Remember their devotion to technology!"
    TAL_nf_events.46.b:0 "Remember their fight for the people!"
    TAL_nf_events.46.c:0 "Remember how we beat their asses!"
    TAL_nf_events.47.title:0 "Founding Principle"
    TAL_nf_events.47.desc:0 "The expansion of Fort Banister was going according to plan. New buildings surround the original structures and the underground bunkers were finally restored to full working order. There was one area on the outskirts of the fort that was marked to not be built upon. The official reason was to preserve an emergency LZ, but The Colonel knew the real reason. It was the final resting place for Commander Jabsco and finding his corpse could cause issues with the Talon Co soldiers. Jabsco's execution was necessary. Despite being a craven and greedy man, Jabsco was opposed to handing over full control of Talon Company even for a trunkload of caps. His death may have been unavoidable, but if it was not for him founding Talon Company, who knows what would've happened with Eden? Maybe it was worth keeping him alive as a symbol."
    TAL_nf_events.47.a:0 "Remember Jabsco's business skills"
    TAL_nf_events.47.b:0 "Remember Jabsco's organization skills"
    TAL_nf_events.47.c:0 "Remember what his pride got him"
    TAL_nf_events.48.title:0 "The Man Or The Myth?"
    TAL_nf_events.48.desc:0 "The Colonel looked at the shining statue at the enterance of the newly renamed Autumn Air Force Base. He couldn't help but think what wastelanders would do if they knew the truth about Colonel Autumn. If they knew that he was just as anti-wastelander as any other Enclave member, and that if he thought Eden's plan was feasable he probably would've went along with it. The Colonel considered if embracing the idea of Autumn was truly better than remembering the man. As he read the polished plaque under the statue. \n \n§B In memory of Colonel Augustus Autumn, who gave his life to save America's soul."
    TAL_nf_events.48.a:0 "Remember the man"
    TAL_nf_events.48.b:0 "Remember the myth"
    TAL_nf_events.49.title:0 "A Threat"
    TAL_nf_events.49.desc:0 "Things were going well for The Talon Enclave. In The Capital Wasteland recruitment was up, unrest was down and the people were returning to their normal lives like before Project Purity. At long last it seemed The Capital Wasteland was adjusting to The Talon Enclave's rule. The positivity around HQ only made the news The Colonel received more distressing. A transmission had been sent straight from The Enclave outpost in Chicago. Few outside of Autumn's closest circle knew much of anything about Chicago beyond the fact that they existed, and just about any other records of their strength or agenda were lost in the fighting with Eden. After hearing the transmission The Colonel called an emergency meeting of his advisors and with a heavy sigh, played the transmission for them as well. \n \n§R Captain Harrison, you and your treasonous followers have usurped power and killed true Americans to protect a mutant cancer ravaging our nation. For this crime there can be no punishment great enough. Your ramshackle collective of traitors and disgusting mutants will not stand up to the might of the full force of The United States Army. You will see our just retribution.§!"  
    TAL_nf_events.49.a:0 "War is coming"
    TAL_nf_events.50.title:0 "Better Business Plan"
    TAL_nf_events.50.desc:0 "It has become clear that just about nobody can stand up to Talon Company. With The Encalve and Lyons Brotherhood out of the way, Talon Company sits at the top of the wasteland foodchain, and it is only right that they up their share of the wealth flowing across the wastes. Mercenary contracts are just not going to cut it anymore, not for a big player like Talon Company. No, they will need to do something more. Talon Company has become such a power that others should pay just to pass through their territory. Like a toll or a tribute or something."
    TAL_nf_events.50.a:0 "Sounds taxing"
    TAL_nf_events.51.title:0 "Slave Shipments Cut!"
    TAL_nf_events.51.desc:0 "Slave shipments from The Capital Wasteland have been halted by that mercenary commander Jabsco. Our guys say the usual caravans bringing fresh meat for the factories stopped abruptly and after going to Paradise Falls to see what the holdup was they were captured by Talon Company and beaten. I'm not sure what bug crawled up Jabsco's ass, but this will not be good for us."
    TAL_nf_events.51.a:0 "We still have other sources"
    TAL_nf_events.52.title:0 "Jabsco's Offer"
    TAL_nf_events.52.desc:0 "An employment offer came along from Talon Company today. Many of the men are chomping at the bit for the opportunity to work for the guys that took down The Brotherhood, but it comes with a catch. All of us will work for them, follow their rules, and essentially give them free reign of our land. Of course, this offer is not something we can simply decline either. It is clear that if we choose to deny their offer, they will come back in force."
    TAL_nf_events.52.a:0 "Sign on the dotted line"
    TAL_nf_events.52.b:0 "Refuse their offer"
    TAL_nf_events.53.title:0 "New Boss, Same Job"
    TAL_nf_events.53.desc.1:0 "Under Ashur, The Pitt had operated almost like a well-oiled machine. The forges churned out weapons and ammunition at an unprescedented scale in The Wasteland. If a worker fell sick, they were replaced just as easily as a broken part. Talon Company's war with The Pitt caused a disruption in production but those of Ashur's clique that survived are eager to serve their new leader, so long as he pays the same. By their estimation, things can return to the same quickly so long as we see to the import of slaves. Of course, we could also ramp things up a bit to receive better benefits."
    TAL_nf_events.53.desc.2:0 "Under Werner, things in The Pitt were not like they were under Ashur. The workers may have been slightly happier, but their output clearly suffered. Workers that fell sick were taken care of which pulled 2 workers away when they could have been more easily replaced. It could be possible to return to the old ways of The Pitt, but it will take a lot of work. After all, these people overthrew one Ashur, who's to say they won't try another?"
    TAL_nf_events.53.a:0 "Maintain Production"
    TAL_nf_events.53.b:0 "Accelerate Production"
    TAL_nf_events.53.c:0 "Keep Werner's Way"
    TAL_nf_events.53.d:0 "Return to Ashur's Way"
    TAL_nf_events.54.title:0 "Think Fast!"
    TAL_nf_events.54.desc:0 "Our hacker had finally broken into The Citadel archives of The Brotherhood when they noticed a serious problem. Something about their entry triggered a virus that was rapidly scrubbing the entire archive. There is only enough time to safely download some of the data, but what to pick?"
    TAL_nf_events.54.a:0 "Download Power Armor Schematics!"
    TAL_nf_events.54.b:0 "Download Advanced Weapon Plans!"
    TAL_nf_events.54.c:0 "Download Whatever Project Metal Gear Is!"
    TAL_nf_events.54.d:0 "Download A Little Bit of Everything!"
    TAL_nf_events.55.title:0 "Dunwich Expedition"
    TAL_nf_events.55.desc:0 "The leadership of Andale contracted a team of Talon Company mercs to travel with them to that strange old building near Tenpenny Tower. They have not been seen since. Could they be ok?"
    TAL_nf_events.55.a:0 "§0WRONG§"
    TAL_nf_events.56.title:0 "The Big Plan"
    TAL_nf_events.56.desc:0 "From the top of Tenpenny Tower, as far as the eye can see and beyond, belongs to Commander Jabsco and his Talon Company. Countless wastelanders pay their tribute to their masters and in exchange, Talon Company makes sure nobody fucks with them. With each conquest Talon Company's wealth has grown, and that is just the beginning. Jabsco has a dream to spread Talon Company's collections across the entire wasteland. Soon everyone in the old United States will be paying some caps up to Talon Company for protection. The plan is genius. Why hasn't anyone thought of it before?"
    TAL_nf_events.56.a:0 "Nobody thought of this before?"
    TAL_nf_events.57.title:0 "Gone Native?"
    TAL_nf_events.57.desc:0 "Commander in Chief Autumn was not an easy man to impress, but even he was surprised at his welcoming reception at Fort Banister. Rather than the unkempt gaggle of wasteland trash he'd read about in Captain Harrison's initial reports, he was met with orderly soldiers in proper formation sporting relatively clean armor. The Captain met him with pride clearly visible on his face. He gave Autumn and his entourage of simmilarly curious officers a tour of the facility, explaining how he'd turned Fort Banister from a crumbling ruin into the training facility and operaitons center they were now seeing. Following the tour, Autumn met with Harrison alone in The Captian's office. There they discussed the success of the program, the changes in The Enclave and Harrison's future. Harrison was to be promoted to Major and return to Raven Rock. Autumn was not prepared for The Major's response. \n \n§2Sir, if it is all the same to you, I'd prefer to stay here.§! \n \nAutumn almost couldn't believe what he was hearing, and after the initial shock wore off he demanded to know why. The Major explained that he had grown accustomed to the assignment and felt a calling to continue leading these soldiers. He wanted to continue developing them into an important asset for The Enclave. Before Autumn could reply, The Major pulled out a thick stick of files and launched into a lengthy explaination on his future plans for Talon Company. The plan was extremely thorough including everything from cost-benefit projections to estimated combat effectiveness figures. Commander in Chief Autumn was hardly one to let his mind be swayed, but the more he listened to The Major's plan, the more it made sense. Clearly someone who could transform that rabble into what Autumn had seen that day would be wasted leading just another battalion."
    TAL_nf_events.57.a:0 "Request Approved, Major"
    TAL_nf_events.58.title:0 "The Battlecry Of Freedom"
    TAL_nf_events.58.desc:0 "With each passing day it became more and more clear what Eden invisioned for America. Nobody in Fort Banister grumbled when he put The Brotherhood surivors to the sword, but seeing the horrors that Project Purity wrought was too far. The time for his gaze to turn to Talon Company was drawing ever closer and the forces at Fort Banister were as ready as they would ever be to stand against this genocidal machine. With a heart full of both fear and determination, Captain Harrison activated his command radio, and let out the speech he had rehearsed countless times the night before. \n§2People of The Capital Wasteland, this is Captain Harrison of Talon Company, former officer of The Enclave. Do not believe the lies of President Eden or those that follow him. He is not here to help, he and his supporters want nothing more than your death! I am calling upon you to down the water with which he poisons you and take up arms! Only together can we stop this bastard and truly rebuild the wasteland!§! \nThe bunker sat silent for a moment as the reality of their situation had set in. They had just declared war on The Enclave over the airwaves for everyone in The Capital Wasteland to hear. This rallying cry would either be the beginning of a revolt that would save the wasteland, or the last defiant cry of a doomed people."
    TAL_nf_events.58.a:0 "Lets hope the wasters listened"
    TAL_nf_events.59.title:0 "Looking Outside"
    TAL_nf_events.59.desc:0 "The Capital Wasteland is a nice start, but there is so much more out there that we can take for our own. It is not like we have not tried before, but everywhere North, South and West all has their problems. The North is cold as shit and has few settlements between each other so it was written off as more trouble than its worth. The South is a hot and nasty swamp that has mosquitos bigger than radscorpions. The West is near endless hills full of countless caves and cults. These regions may have proven too difficult to deal with for the old Talon Company, but we are changed. We will make them pay us our just tribute."
    TAL_nf_events.59.a:0 "We will expand!"
    TAL_nf_events.60.title:0 "Harrisburgs Refusal"
    TAL_nf_events.60.desc:0 "Harrisburg has refused to join up with Talon Company. It is time to show them what happens to people that don't play ball."
    TAL_nf_events.60.a:0 "Go get 'em boys!"
    TAL_nf_events.61.title:0 "Dark Meeting"
    TAL_nf_events.61.desc:0 "Jabsco had a secret meeting with the leadership of Andale, bringing only a couple of his top guys. They are all tight-lipped about the meeting, only saying that great things are coming. In an unrelated note, some people at Fort Jabsco have been saying they hear him screaming in the middle of the night. It's gotta be nothing, right?"
    TAL_nf_events.61.a:0 "Probably nothing"
    TAL_nf_events.62.title:0 "Talons Shakedown"
    TAL_nf_events.62.desc:0 "Talon Company mercs arrived at Tenpenny Tower recently offering their protection services. They mentioned how the tower was close to raider territory and all but said that if we didn't pay them off, we will be attacked. The mercs are camped nearby and waiting on a response. It should be noted that Talon Company recently came into posession of a substantial amount of advanced equipment after wiping out The Enclave."
    TAL_nf_events.62.a:0 "We will not pay"
    TAL_nf_events.62.b:0 "We will pay"
    TAL_nf_events.63.title:0 "Settlements Refuse Protection"
    TAL_nf_events.63.desc:0 "The people at Tenpenny Tower have outright refused to give us a single cap for our protection. The boys are suited up and ready to go show them why they should have paid."
    TAL_nf_events.63.a:0 "Teach them a lesson!"
    TAL_nf_events.64.title:0 "Ashurs Refusal"
    TAL_nf_events.64.desc:0 "Our men sent up to The Pitt to work out a deal with Ashur were laughed out and almost tossed to the trogs. We can't just let them punk us like that can we?"
    TAL_nf_events.64.a:0 "They will pay, in time"
    TAL_nf_events.65.title:0 "Ashurs Acceptance"
    TAL_nf_events.65.desc:0 "Our boys returned from The Pitt with good news and an assload of Caps. Looks like we're in business with Ashur now."
    TAL_nf_events.65.a:0 "We hit the big time, boys"
    TAL_nf_events.66.title:0 "Werners Refusal"
    TAL_nf_events.66.desc:0 "Our men sent up to The Pitt to work out a deal with Ashur. They found that the place had recently had a slave uprising and Ashur's former 2nd guy Werner took charge. Our guys were laughed out and almost tossed to the trogs. We can't just let them punk us like that can we?"
    TAL_nf_events.66.a:0 "They will pay, in time"
    TAL_nf_events.67.title:0 "Tenpenny Tower Pays Up"
    TAL_nf_events.67.desc:0 "The people at Tenpenny Tower understood our message and have agreed to hire us to 'protect' them from raiders. While our boys were itching for a fight, they are just as happy to collect free caps."
    TAL_nf_events.67.a:0 "They had to pay, because of the implication"
    TAL_nf_events.68.title:0 "A Tower of Loot"
    TAL_nf_events.68.desc:0 "Tenpenny Tower was absolutely ripe for the picking. Our boys busted through their crappy defenses in no time and started grabbing anything that wasn't nailed down. The haul they brought back took days to count, but it was definitely a W. The DC Settlements should know by now not to mess with us."
    TAL_nf_events.68.a:0 "Hell yeah"
    TAL_nf_events.69.title:0 "We Fucked Up"
    TAL_nf_events.69.desc:0 "It looks like we underestimated just how set up they were at Tenpenny Tower. Our boys got their asses kicked and had to run back home before they got wiped out. It is probably best that we don't fuck with The DC Settlements until we get some bigger players working with us."
    TAL_nf_events.69.a:0 "Shit..."
    TAL_nf_events.70.title:0 "Talon Co Sent Packing"
    TAL_nf_events.70.desc:0 "As we expected, Talon Company's offer of protection was nothing more than extortion. Once we declined their offer, they sent a gang of thugs to the tower but found we were more than ready. Though a few brave guards died in the fight, Talon Company did not breach the tower's defenses and were quickly sent running back to Fort Banister."
    TAL_nf_events.70.a:0 "That'll teach them not to mess with us!"
    TAL_nf_events.71.title:0 "Tenpenny Tower Sacked!"
    TAL_nf_events.71.desc:0 "As we expected, Talon Company's offer of protection was nothing more than extortion. Once we declined thier offer they sent a gang of thugs to the tower and quickly blasted through the security. The occupants of the tower were robbed at gunpoint and the mercs carried off whatever else they deemed valuable before reinforcements could arrive."
    TAL_nf_events.71.a:0 "Damn them"
    TAL_nf_events.72.title:0 "A Business Meeting"
    TAL_nf_events.72.desc:0 "The Pitt had built up a pretty grand reputation in the wasteland over the last couple decades. Towering smokestacks, burning furnaces, and an army of raiders. All the grandest stories about The Pitt were true. After a brief walkthrough of Ashur's operation, Jabsco was led to Haven, the towering spire from which Ashur looks down on his kingdom. There the two had a talk about Ashur's plans for the future, how Talon Company can help, and most importantly, the various fees Talon Company charges."
    TAL_nf_events.72.a:0 "To The Future"
    TAL_nf_events.73.title:0 "Endless Issues"
    TAL_nf_events.73.desc:0 "A call has come in from The Pitt about some tasks Ashur needs Talon Company to deal with. The slaves are going through scrap metal faster than they can collect it, abolitionists keep hitting slave caravans, and one of Ashur's suppliers is having trouble with their shipments. Ashur has enough trouble keeping the slaves in line to deal with any of that right now, so he's telling us to get to it."
    TAL_nf_events.73.a:0 "We'll need 25% up front"
    TAL_nf_events.74.title:0 "To The Future"
    TAL_nf_events.74.desc:0 "The Pitt of today is very different than The Pitt of just a few years ago. TDC is cured, beatings are down, and workers are no longer only eating trogmeat soup. Some still need to be convinced to come work in The Pitt, and that's largely what Talon Company facilitates, but other than that things are a lot less rough. Jabsco, like anybody else around Ashur, knows better than to question if the man has gone soft. Those that disagreed with the change of pace still hang from the bridge, and who cares what the slaves are called if Ashur is still paying for them? The future is looking bright and shiny for The Pitt, and at least for now Talon Co will be along for the ride."
    TAL_nf_events.74.a:0 "As long as there's pay, we're in"
    TAL_nf_events.75.title:0 "Cornered Rats"
    TAL_nf_events.75.desc:0 "Many of the abolitionists died in our fight with The DC Settlements. The few that survived retreated back to their little hideout at the Lincoln Memorial. We have them surrounded and outnumbered, but it is clear they will not go down without a fight. How should we proceed?"
    TAL_nf_events.75.a:0 "A frontal attack works"
    TAL_nf_events.75.b:0 "Draft up a good battle plan"
    TAL_nf_events.75.c:0 "Miniguns go brrrrr"
    TAL_nf_events.75.d:0 "Send in the power armor"
    TAL_nf_events.76.title:0 "A Bloody Hat"
    TAL_nf_events.76.desc:0 "The Temple of The Union disrupting the slave trade in The Capital Wasteland had been a problem for Ashur's operation for years. Jabsco made it a point to deliver the symbol of their downfall to Ashur personally. The hat of Hamlin, supposedly belonging to the long dead president they idolized, was accepted by Ashur with gratitude. He offered Jabsco a choice of rewards for the trophy."
    TAL_nf_events.76.a:0 "More guns are nice"
    TAL_nf_events.76.b:0 "Caps are king"
    TAL_nf_events.76.c:0 "Call it a favor"
    TAL_nf_events.77.title:0 "The Harrisburg Situation"
    TAL_nf_events.77.desc:0 "For the last 20 years, Harrisburg has kept Johnstown an the surrounding thumbs under their thumb. In exchange for crops, caps, and passage for their slaver caravans, The Harrisburg bandits have protected Johnstown. From what exactly? Mostly The Harrisburg Bandits. Most of the farmers of Johnstown have been okay with this arrangement, except for The Road Wardens. These people object to weaklings being kept in chains and have been ambushing Harrisburg's slave carravans. For every warden the bandits kill, it seems like two more pop up in their place. That is why they need our help to deal with this mess."
    TAL_nf_events.77.a:0 "Our help won't be cheap"
    TAL_nf_events.78.title:0 "Help Wanted"
    TAL_nf_events.78.desc:0 "As The Pitt's industrial might exponentially increases, so too does its needs. Ashur has plans to scale up their industry, but they need certain pre-war equipment that can't be found just anywhere. We have teams searching likely places in The Capital Wasteland, but we can't expect to find it all in DC. Other cities like New York, Philly, or even some places down south would probably have what we need. Most of these places have their own bosses we could talk to."
    TAL_nf_events.78.a:0 "Lets make a deal"
    TAL_nf_events.79.title:0 "Little Wars in Little Italy"
    TAL_nf_events.79.desc:0 "The gangs of New York City may be united against anyone who moves on their operations, but to say they are a cohesive group is comical. This mishmash of different gangs squabbles over territory, markets, and a seat at the head of their commission. Seeing these, Jabsco has an idea. If Talon Company supported one of them in getting the upper hand, he'd have a powerful friend that owes us a favor."
    TAL_nf_events.79.a:0 "Support The Mutie Mob"
    TAL_nf_events.79.b:0 "The Duke of New York reigns!"
    TAL_nf_evnets.79.c:0 "Aid The Force"
    TAL_nf_events.80.title:0 "Head In The Clouds"
    TAL_nf_events.80.desc:0 "From atop the towers of The Pitt, the city almost doesn't look so bad. Sure it's a bit rusty, but when you can't see or smell the shit in the streets, you almost forget it's there. It's no wonder Ashur spends his time up here dreaming about turning this dump into some type of utopia. Though he is skeptical of Ashur's gran designs, Jabsco has made plenty of caps on this contract. If the most he has to do is take the occasional vertibird ride out, listen to some ramblings about industry and a society of merit, then tell the boys to keep doing what they're doing, it's not a bad gig. \n\n Heck, if Ashur somehow makes this place a little cleaner it may not be a bad spot to retire."
    TAL_nf_events.80.a:0 "He'd need one hell of a mop though"
    TAL_nf_events.81.title:0 "So what now?"
    TAL_nf_events.81.desc:0 "With The Pitt firmly under Talon Company control, Jabsco can't help but wonder why the hell they made the effort. Talon Company was never about running factories or ruling a city, it was about getting paid to shoot people. Some of the slavers laid down guns fast enough to be hired for the job of keeping The Pitt running, but not nearly enough to keep it running smoothly. Not to mention a lot of the slaves got away in the fighting. It will take years for us to recreate what Ashur had with his well-oiled machine of industry, and that's if we even can be assed to do so."
    TAL_nf_events.81.a:0 "At least the view from Haven is nice"
    TAL_nf_events.82.title:0 "News From Paradise"
    TAL_nf_events.82.desc:0 "With the decimation of the raider gangs in The Capital Wasteland, the flow of slaves from Paradise Falls had slowed to a trickle. We've gotten news that the mercs of Talon Co who took down these gangs is letting them return to supplying slaves. The catch is they now get a cut of the raiders' haul."
    TAL_nf_events.82.a:0 "Who cares where they come from?"

