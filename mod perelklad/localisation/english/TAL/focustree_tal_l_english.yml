l_english: 
TAL_nf_a001:0 "The Boys"
TAL_nf_a001_desc:0 "Jabsco had a bold dream of creating the best merc group in The Capital Wasteland. To do that, he would need some tough bastards."
TAL_nf_a002:0 "Dirty Deeds"
TAL_nf_a002_desc:0 "Having no reputation, Talon Company had to take whatever jobs they could get. "
TAL_nf_a003:0 "Entering Banister"
TAL_nf_a003_desc:0 "The fledgling group was tasked with grabbing some old holotapes from Fort Banister. Once inside, Jabsco realized the place had potential."
TAL_nf_a004:0 "Jetting Jabsco"
TAL_nf_a004_desc:0 "Despite his boasting, many in Talon Company recognize that Jabsco is not much of a battlehardened badass like he claims. Still, they follow him for some reason."
TAL_nf_a005:0 "Soldier of Fortune"
TAL_nf_a005_desc:0 "Did Jabsco sign the best deal of his life, or his death warrant?"
TAL_nf_a006:0 "Jabscos Stash"
TAL_nf_a006_desc:0 "The old commander will not need his secret stash of caps anymore. We will make use of them."
TAL_nf_a007:0 "Grooming Standards"
TAL_nf_a007_desc:0 "Discipline is at the heart of a professional army. If a soldier is unable to maintain their appearance, how can we expect them to maintain their gear?"
TAL_nf_a008:0 "Brown-nosing the Boss"
TAL_nf_a008_desc:0 "It is widely known how Eden feels about Talon Company. Inflating their successes a little might be necessary to move beyond this assignment."
TAL_nf_a009:0 "One Mans Trash"
TAL_nf_a009_desc:0 "The Enclave may not have much use for old combat armor, but that could be a huge upgrade for these men."
TAL_nf_a010:0 "A Little Help?"
TAL_nf_a010_desc:0 "These ramshackle mercs are barely trainable and their officers are just whoever lived longest. We need some real leaders around here."
TAL_nf_a011:0 "Opening Doors"
TAL_nf_a011_desc:0 "Some Enclave troops opened a secured door and took whatever was inside. At least we have some more space now."
TAL_nf_a012:0 "Spare Canopeners"
TAL_nf_a012_desc:0 "High caliber rifles may be antiquated by Enclave standards, but Talon Co will need them if we ever face The Brotherhood."
TAL_nf_a013:0 "Buggy Bots"
TAL_nf_a013_desc:0 "Eden has seen fit to send us a few derelict protectrons that were considered too busted to be worth repairing. Yay"
TAL_nf_a014:0 "Rusted Rifles"
TAL_nf_a014_desc:0 "The latest shipment of trash from Raven Rock comes in the form of rusted pre-war rifles. We sure are lucky!"
TAL_nf_a015:0 "Back to Basics"
TAL_nf_a015_desc:0 "Talon Companys typical battle plan is charging at their target while firing wildly. It is a wonder how they survive any of their jobs."
TAL_nf_a016:0 "Improved Training"
TAL_nf_a016_desc:0 "The mercs are adapting surprisingly well to the new training regimen. We will be requesting a few more support officers to really get things going."
TAL_nf_a017:0 "Planning Ahead"
TAL_nf_a017_desc:0 "While centuries behind The Enclave, The Brotherhood of Steel has a considerable technological advantage over Talon Company. If these mercs are to serve as anything more than fodder, they will need specialized tactics."
TAL_nf_a018:0 "Fair Trade"
TAL_nf_a018_desc:0 "Talon Company has a few gunsmiths, but they lack the knowledge to produce suits of power armor or a vertibird. We should send Raven Rock this excess tech we have in exchange for something we can use."
TAL_nf_a019:0 "Patching Holes"
TAL_nf_a019_desc:0 "Entire sections of our perimiter are lacking in defensive structures. How could we ever fend off an attack if the enemy can just saunter on through a hole in a rusted fence?"
TAL_nf_a020:0 "Mr. Fixit"
TAL_nf_a020_desc:0 "We have endured the deplorable conditions at Fort Banister long enough. A dispatch has been sent for some engineers from command to repair the bunkers vital systems."
TAL_nf_a021:0 "Northern Rumblings"
TAL_nf_a021_desc:0 "There have been rumors of strange things lurking up north. Have some of the boys keep an eye out."
TAL_nf_a022:0 "Nothing Like Paradise"
TAL_nf_a022_desc:0 "The Arms Dealers of the Pitt buy their finest stoke of "Workers" from paradise falls, maybe we want in on this trade."
TAL_nf_a023:0 "An Offer We Refused"
TAL_nf_a023_desc:0 "Those Enclave schmucks really thought they could buy out the entire damn company? They couldn't afford it!"
TAL_nf_a024:0 "Buy in Bulk"
TAL_nf_a024_desc:0 "A good job left us with a lot of extra caps. Maybe its time to upgrade the boys' toys."
TAL_nf_a025:0 "Raid The Raiders"
TAL_nf_a025_desc:0 "The different raider gangs have fallen on hard times since the settlements got all organized. This is a good opportunity for us."
TAL_nf_a026:0 "Raider's Tribute"
TAL_nf_a026_desc:0 "We'll let the raiders continue to operate, but they will need to pay us for the pleasure."
TAL_nf_a027:0 "Dominate The Slave Trade"
TAL_nf_a027_desc:0 "With the raiders out of the way, we are the best source for slaves in The Capital Wasteland. That means we set the terms!"
TAL_nf_a028:0 "Royal Offering"
TAL_nf_a028_desc:0 "Some batty raider with a bunch of ants strolled up in the last tribute caravan saying she wanted to work for us instead of the raiders."
TAL_nf_a029:0 "This Town Ain't Big Enough"
TAL_nf_a029_desc:0 "The Enclave holds onto the most advanced weaponry that anyone in the Capital Wasteland has seen, even the brotherhood. And we could have it all for ourselves."
TAL_nf_a030:0 "Hail To The King"
TAL_nf_a030_desc:0 "Salvage all the Tec you can from Raven Rock. And make sure to loot the Colonel's Room."
TAL_nf_a031:0 "A King's Ransom"
TAL_nf_a031_desc:0 "Blow open the armory and seize the Guns, power up the Vertibirds, and put on the power armor we run this place."
TAL_nf_a032:0 "Fancy Tools"
TAL_nf_a032_desc:0 "The Enclave made all their own equipment. We may not be able to make the same stuff yet, but these machines can spit out bullets just fine."
TAL_nf_a033:0 "Magnets!"
TAL_nf_a033_desc:0 "Fuckin magnets, I don't know how they work, but these rifles can punch a hole through Enclave armor. We'll buy a few crates."
TAL_nf_a034:0 "Canned Meals"
TAL_nf_a034_desc:0 "The Enclave are pushing across the river, but little do they know that crossing isn't too far from mutant territory. We could lure them into those hills and watch them fight."
TAL_nf_a035:0 "Operation Haywire"
TAL_nf_a035_desc:0 "This war is not going as well as we would like. It is time we even the odds. Just a little ways away from The Enclave base, there is an old base full of robots. If we can get a tech into their mainframe, we could boot up some old Chinese invasion protocols. They may target us too, but it's the best chance we have."
TAL_nf_a036:0 "Bot Busters"
TAL_nf_a036_desc:0 "With the bots out of the way, we can stroll into Fort Constantine and see what they were guarding."
TAL_nf_b001:0 "Shit's Got Real"
TAL_nf_b001_desc:0 "Orders came down from command, it is time to push into The Capital Wasteland."
TAL_nf_b002:0 "Storm The Tower"
TAL_nf_b002_desc:0 "A report just came in about an engagement near Tenpenny Tower."
TAL_nf_b003:0 "The Boss' Scraps"
TAL_nf_b003_desc:0 "The cobbled together rifles and improvised explosives of wasteland settlers may be beyond the notice of command, but we could still use every bullet we can find."
TAL_nf_b004:0 "Mega Payday"
TAL_nf_b004_desc:0 "The capture of Megaton has proven very lucrative."
TAL_nf_b005:0 "A Shining Beacon"
TAL_nf_b005_desc:0 "The Enclave is the tip of the spear, people. The future is coming to The Wasteland, and the Enclave is a bright, shining beacon of that future. Raiders will look up from their baby-meat stew and see our city shining in the distance. A symbol of safety, and peace, and order. First, the Capital Wasteland. Then, the rest of America."
TAL_nf_b006:0 "Moving on Up"
TAL_nf_b006_desc:0 "Talon Company performed beyond even the brightest projections. The new leadership has taken notice."
TAL_nf_b007:0 "Elite Employees"
TAL_nf_b007_desc:0 "A handfull of Talon Company officers have shown themselves to be excellent leaders. It is time they are promoted!"
TAL_nf_b008:0 "Peformance Bonus"
TAL_nf_b008_desc:0 "The mercs of Talon Company are enjoying some hard-earned benefits from their courage and dedication."
TAL_nf_b009:0 "Spoils of War"
TAL_nf_b009_desc:0 "While much of the Brotherhood equipment has been taken up by command, we were able to hold on to a few odds and ends."
TAL_nf_b010:0 "New Blood"
TAL_nf_b010_desc:0 "Word has spread that joining Talon Company is one of the best ways to serve your country, and get paid doing it. Many wastelanders are flocking to join up."
TAL_nf_b011:0 "Prioritize Loyalty"
TAL_nf_b011_desc:0 "We will vet the new recruits to make sure they are joining up out of love for their country!"
TAL_nf_b012:0 "Prioritize Experience"
TAL_nf_b012_desc:0 "We will vet the new recruits to make sure they know what they are doing!"
TAL_nf_b013:0 "Prioritize Courage"
TAL_nf_b013_desc:0 "We will vet the new recruits to make sure they have the somtach to fight!"
TAL_nf_b014:0 "A New Contract"
TAL_nf_b014_desc:0 "There have been big changes in The Enclave and Talon Company. With these new times, a new contract should be discussed."
TAL_nf_b015:0 "Foreboding Skies"
TAL_nf_b015_desc:0 "A handfull of vertibirds landed in the cover of night. That is unusual."
TAL_nf_b016:0 "Knight Killers"
TAL_nf_b016_desc:0 "Have the survivors ditch their APA and don some old Brotherhood equipment. We can't afford to raise suspicion yet."
TAL_nf_b017:0 "Search for Survivors"
TAL_nf_b017_desc:0 "In the chaos of Eden's crackdown it is possible some more of Autumn's men survived."
TAL_nf_b018:0 "Snatch And Grab"
TAL_nf_b018_desc:0 "We will need every suit of armor we can grab to prepare for Eden."
TAL_nf_b019:0 "Desperate Measures"
TAL_nf_b019_desc:0 "There are still some in The Capital Wasteland fighting Eden's Enclave. We should quietly reach out."
TAL_nf_b020:0 "Meet The Mechanist"
TAL_nf_b020_desc:0 "A weird wastelander in robot armor claims he has a plan that could help us. Apparently there is an old facility full of robots near Tenpenny Tower."
TAL_nf_b021:0 "Expand Our Defenses"
TAL_nf_b021_desc:0 "No President Eden, we are building these outpost to catch any wastelanders fleeing Enclave territory. Don't worry about it."
TAL_nf_b022:0 "Support Simms"
TAL_nf_b022_desc:0 "Lucas Simms and his regulators are still fighting against President Eden. While we can not step in just yet, we can give them some tools to help."
TAL_nf_b023:0 "Operation Rallying Cry"
TAL_nf_b023_desc:0 "The time has come. If we do not stand against President Eden now, he will kill us just like the wastelanders he poisons!"
TAL_nf_b024:0 "Enter The Big Leagues"
TAL_nf_b024_desc:0 "We are getting better and better terms for our contracts. Just nobody tell the boys doing the work."
TAL_nf_b025:0 "100 Mutant Scalps"
TAL_nf_b025_desc:0 "Sending the boys to hunt mutants for Brotherhood bounties is a good way to weed out the pussies, and make money doing it!"
TAL_nf_b026:0 "More Than Mercs"
TAL_nf_b026_desc:0 "We have grown byond a simple merc group. With this great power comes great reward!"
TAL_nf_b027:0 "Protecting The Capital"
TAL_nf_b027_desc:0 "The settlements sure could use some help protecting themselves from The Wasteland. Lets see if they will play ball."
TAL_nf_b028:0 "The Highest Bidder"
TAL_nf_b028_desc:0 "The Wasteland is talking about how the badasses at Talon Company sent those Enclave losers packing. Now everyone knows we're the shit, and we can write our own ticket."
TAL_nf_b029:0 "Go Our Own Way"
TAL_nf_b029_desc:0 "We didn't really even want to work with The Pitt that much anyway! It's their loss!"
TAL_nf_b030:0 "Dig Deeper"
TAL_nf_b030_desc:0 "The lower levels of Raven Rock were sealed off by explosions when we pushed into the place. Nothing a little slave labor can't fix."
TAL_nf_b031:0 "Stealing Independence"
TAL_nf_b031_desc:0 "The Brotherhood Outcasts would have been a threat to avoid for the old Talon Company. Now, they're easy pickings."
TAL_nf_b032:0 "Adams What?"
TAL_nf_b032_desc:0 "The Enclave had interest in some old military base across the bay. We should look into it if we ever head out that way."
TAL_nf_b033:0 "What Lies Below"
TAL_nf_b033_desc:0 "The Outcasts were sitting on a whole mess of equipment. Finders keepers."
TAL_nf_b034:0 "Call Up Joe"
TAL_nf_b034_desc:0 "Slocum Joe is an expert scav that was pushed out of The DC Ruins by The Brotherhood. Word is he's looking for work."
TAL_nf_b035:0 "Lyon Slayers"
TAL_nf_b035_desc:0 "The Brotherhood are the other big dogs in The Capital Wasteland. Eventually they will be gunning for us to steal our tech, unless we hit them first."
TAL_nf_b036:0 "Magnetic Marvels"
TAL_nf_b036_desc:0 "Those guys with the magnet guns ran into some trouble out West and are heading our way. We should see about hiring them and finding out how they made those things."
TAL_nf_b037:0 "Our New Digs"
TAL_nf_b037_desc:0 "Fort Banister was nice, but it wasn't The Citadel!"
TAL_nf_b038:0 "The Greenskin Problem"
TAL_nf_b038_desc:0 "These mutants are bad for business."
TAL_nf_b039:0 "Ending The Problem"
TAL_nf_b039_desc:0 "We found where the mutants are coming from. Now we just need to stop whatever they do to make more."
TAL_nf_b040:0 "Partners In Crime"
TAL_nf_b040_desc:0 "Ashur knows a good deal when he sees it, and he has agreed to work with us. This is the beginning of a beautiful partnership."
TAL_nf_b041:0 "Import Pitt Steel"
TAL_nf_b041_desc:0 "Ashur has more ingots than he knows what to do with. He could toss a few our way."
TAL_nf_b042:0 "Storm Independence"
TAL_nf_b042_desc:0 "With The Pitt at our back, why should we fear a few washed up knights?"
TAL_nf_b043:0 "Just A Big Airport?"
TAL_nf_b043_desc:0 "If The Enclave had interests in an untouched pre-war facility, it must have some goodies inside."
TAL_nf_b044:0 "Outcast's Cache"
TAL_nf_b044_desc:0 "The armories of Fort Independence hold a lot of nice stuff that's now ours."
TAL_nf_b045:0 "Hire Consultants"
TAL_nf_b045_desc:0 "Word has gotten out that we are working with The Pitt, quite a few people have approached us looking for a job."
TAL_nf_b046:0 "Uh... They Started It?"
TAL_nf_b046_desc:0 "I know Ashur isn't part of The Brotherhood anymore, but we can't afford for this deal to fall through. Make sure our story is air-tight."
TAL_nf_b047:0 "Outcast Databanks"
TAL_nf_b047_desc:0 "The Outcasts tried to wipe their drives when we closed in. They were just a little too slow."
TAL_nf_b048:0 "Share The Wealth"
TAL_nf_b048_desc:0 "Ashur has been good to work with. As a token of our appreciation for him as a partner, we are going to send over some things we found in The Citadel basement."
TAL_nf_c001:0 "A Real HQ"
TAL_nf_c001_desc:0 "Despite our best efforts, Fort Banister was little more than a crumbling ruin with some working lights. Now that The Enclave is in control of The Capital Wasteland, supplies are pouring in."
TAL_nf_c002:0 "The Banister Complex"
TAL_nf_c002_desc:0 "We will transform Fort Banister and the surrounding area into a network of fortifications. It would take a serious army on the scale of The Enclave to drive us out."
TAL_nf_c003:0 "The Banister Airstrip"
TAL_nf_c003_desc:0 "There is some promising land around Fort Banister that could be turned into an airfield. Command has even offered to send some equipment for air-traffic control."
TAL_nf_c004:0 "The Dreaded Re-Org"
TAL_nf_c004_desc:0 "Whenever big changes happen fast like this, there needs to be some serious shakeups in the way things are organized. As things are changed there will be a lot of confusion and plenty mistakes made."
TAL_nf_c005:0 "New Barracks"
TAL_nf_c005_desc:0 "The flood of recruits has left Banister feeling cramped. Thankfully we were able to construct some new barracks. No more sleeping in 200 year old ratty tents."
TAL_nf_c006:0 "Power Struggles"
TAL_nf_c006_desc:0 "The old cranky reactor was suitable for Banister's needs in the past, but now we need some serious upgrades."
TAL_nf_c007:0 "Just A Few Bottles"
TAL_nf_c007_desc:0 "With Project Purity coming online, we can get extra water rations."
TAL_nf_c008:0 "New Training Materials"
TAL_nf_c008_desc:0 "It took some doing, but Command is willing to send some old training manuals to help get our men up near Enclave standards."
TAL_nf_c009:0 "Special Requisitions"
TAL_nf_c009_desc:0 "We could use some equipment made this century out of something other than rusted bike parts."
TAL_nf_c010:0 "Hightened Clearance"
TAL_nf_c010_desc:0 "Thanks to The Major, Talon Co will have access to limited Enclave archives. While it doesn't mean we can manufacture APA any time soon, we should be able to produce assault rifles from scratch soon."
TAL_nf_c011:0 "Support Staff"
TAL_nf_c011_desc:0 "With Talon Company growing in strength, Autumn wants to send some more Enclave staff to oversee Fort Banister. Whether they are here to help or spy remains to be seen."
TAL_nf_c012:0 "Talon Co Armerments"
TAL_nf_c012_desc:0 "Buying weapons from passing traders or scavenging pre-war ruins simply won't do. We will have in-house weapon producers making our equipment."
TAL_nf_c013:0 "Expanded Workshops"
TAL_nf_c013_desc:0 "To keep up with our needs, The Major has requested manufacturing equipment from command."
TAL_nf_c014:0 "Scrap Vault 87"
TAL_nf_c014_desc:0 "With the mutant problem in Vault 87 dealt with, the decaying bunker sits ready to be stripped for parts."
TAL_nf_c015:0 "Barely Recognizable"
TAL_nf_c015_desc:0 "Fort Banister has seen plenty of changes in the last few months."
TAL_nf_c016:0 "Talon's Jurisdiction"
TAL_nf_c016_desc:0 "As America is rebuilt, the question of what happens to citizens living in the areas around Fort Banister needs to be raised."
TAL_nf_c017:0 "America's PMC"
TAL_nf_c017_desc:0 "Talon Company has become so much more than just a band of mercs. As we look to the future, we need to make some decisions about how we will change with the times."
TAL_nf_c018:0 "Elite Mercs"
TAL_nf_c018_desc:0 "Talon Company will strive to be the best mercs around, 2nd only to The Enclave in terms of training and equipment."
TAL_nf_c019:0 "Trim The Fat"
TAL_nf_c019_desc:0 "It is unfortunate to say, but quite simply not every recruit is cut out for the new Talon Company."
TAL_nf_c020:0 "2nd Best Armor Around"
TAL_nf_c020_desc:0 "Of course Command won't give us suits of APA, but they do have some spare T-51bs lying around."
TAL_nf_c021:0 "Why Mess With Success?"
TAL_nf_c021_desc:0 "Talon Company, with some minor alterations, has shown themselves to be a valuable asset to The Enclave. Why should we change that?"
TAL_nf_c022:0 "Talon Recruitment Offices"
TAL_nf_c022_desc:0 "Despite pushback from Command, The Major has negotiated terms for Talon Co to set up recruiting offices in some major settlements of The Capital Wasteland."
TAL_nf_c023:0 "Lowest Bidder"
TAL_nf_c023_desc:0 "To outfit this massive army of mercenaries, we will need to relax some standards on the equipment we purchase or manufacture."
TAL_nf_c024:0 "Mobile Recon"
TAL_nf_c024_desc:0 "Talon Company will be at the forefront of many Enclave engagements. We will hit hard, hit fast, and get out of there before anyone knew we were around. Then the army can move in."
TAL_nf_c025:0 "Soaring Talons"
TAL_nf_c025_desc:0 "They may not be gunships, but the VB-01 transports will allow us to hit the enemy almost anywhere."
TAL_nf_c026:0 "HERMES Project"
TAL_nf_c026_desc:0 "In the interests of mobility, we are eschewing Power Armor in favor of the most advanced light armor we can find."
TAL_nf_c027:0 "Proxy Warriors"
TAL_nf_c027_desc:0 "We know there are large foes out there that will be trouble down the line. Until The Enclave can meet them on the battlefield, we will hamper their growth by offering our services to those they wish to conquer."
TAL_nf_c028:0 "Ready For Anything"
TAL_nf_c028_desc:0 "Through months of growth and shakeups, we have reformed this band of mercenaries into an elite fighting force ready to do their part for the rebuilding of America. Nothing can stand in our way."
TAL_nf_c029:0 "Or Maybe Not..."
TAL_nf_c029_desc:0 "Commander in Chief Autumn wants to discuss something urgent with The Major. Sounds like bad news."
TAL_nf_c030:0 "Homecoming"
TAL_nf_c030_desc:0 "It has been years since The Captain has set foot in Enclave Command. This certainly wasn't the homecoming he'd expected."
TAL_nf_c031:0 "Welcome Back"
TAL_nf_c031_desc:0 "The soldiers that fought us were just obeying their president. We can not fault them for that."
TAL_nf_c032:0 "Traitor's Fate"
TAL_nf_c032_desc:0 "These scum helped Eden massacre their brothers in arms. For that, execution is a mercy."
TAL_nf_c033:0 "Restoring Purity"
TAL_nf_c033_desc:0 "Eden's plans for Project Purity were twisted and must be undone if possible."
TAL_nf_c034:0 "Our New Goal"
TAL_nf_c034_desc:0 "The dream of rebuilding America does not have to die just because Eden proved to be a bastard."
TAL_nf_c035:0 "Growing Pains"
TAL_nf_c035_desc:0 "Everyone is confused and wondering what the future holds, including The Colonel."
TAL_nf_c036:0 "Settlement Matters"
TAL_nf_c036_desc:0 "With Eden's Enclave toppled, there is a massive power vacuum in The Capital Wasteland. We need to stabalize things before someone else steps in."
TAL_nf_c037:0 "Advisory Council"
TAL_nf_c037_desc:0 "Talon Company mercs, Autumn Loyalists, and Wasteland leaders all have different ideas for how we should proceed. We can't just put them in a room and let them hash it out, can we?"
TAL_nf_c038:0 "Disgusting Mutants"
TAL_nf_c038_desc:0 "We know Vault 87 is the source of The Super Mutant infestation. Wiping them out will help our reputation."
TAL_nf_c039:0 "Dastardly Raiders"
TAL_nf_c039_desc:0 "The raiders to our north and south are causing problems. Better to deal with them now rather than later."
TAL_nf_c040:0 "Despicable Cannibals"
TAL_nf_c040_desc:0 "The cannibal raiders to the South-East are a problem we can not ignore. I just know they're up to something freaky!"
TAL_nf_c041:0 "A Rocky Road"
TAL_nf_c041_desc:0 "The hills just to the West of Bannister are full of all kinds of dangerous people that we can not let expand unopposed."
TAL_nf_c042:0 "Liberate The Pitt"
TAL_nf_c042_desc:0 "For years, The Pitt has imported slaves from all across the region. Even if they say they're more than just another raider gang, we will put them down."
TAL_nf_c043:0 "Enclave Industrial Complex"
TAL_nf_c043_desc:0 "The Pitt really lives up to its name. But even in this rusted mess of smog and decay, there is a glimmer of promise."
TAL_nf_c044:0 "We Bring Order"
TAL_nf_c044_desc:0 "Countless threats to the people of The Wasteland have been brought low by our army. Few can contest our claim that we bring peace and stability."
TAL_nf_c045:0 "We Bring Prosperity"
TAL_nf_c045_desc:0 "With the combined databases of The Enclave and Brotherhood, the industrial might of The Pitt, and some of the brightest minds in the wasteland, we are seeing massive growth. Who can deny that we bring prosperity?"
TAL_nf_c046:0 "As Autumn Intended"
TAL_nf_c046_desc:0 "It took a long time, but we were finally able to clear the modified FEV from Project Purity. Now we can distribute the water to those that need it the most."
TAL_nf_c047:0 "Mother Base"
TAL_nf_c047_desc:0 "Fort Banister was a suitable base for a mercenary group, but as the heart of a new Enclave, it leaves a lot to be desired."
TAL_nf_c048:0 "Citadel Command Centre"
TAL_nf_c048_desc:0 "The Pentagon, or The Citadel as wastelanders call it, would serve as a perfect place to move our command centre to."
TAL_nf_c049:0 "Citadel Archives"
TAL_nf_c049_desc:0 "Most of The Brotherhood's databanks and archives were destroyed in the battle for The Citadel and Enclave occupation. Most, but not all."
TAL_nf_c050:0 "The Brotherhood's Legacy"
TAL_nf_c050_desc:0 "The Brotherhood may have perished under Eden's onslaught, but we cannot deny they helped shape the wasteland we see today. As we sift through their old home, it's hard not to think about the people that were here before us."
TAL_nf_c051:0 "Expand Banister"
TAL_nf_c051_desc:0 "Fort Banister may not be a suitable base yet, but that can change. We would make better use of our resources improving this place than moving into another crumbling ruin."
TAL_nf_c052:0 "Lost Databanks"
TAL_nf_c052_desc:0 "In clearing the lower levels, we discovered some forgotten databanks that had interesting information on them."
TAL_nf_c053:0 "Jabsco's Legacy"
TAL_nf_c053_desc:0 "It is frightening to think just what could have happened if Jabsco turned down Autumn's offer, and Eden took over the wastes unopposed. Even if he was just a greedy coward, Jabsco accidentally did something good."
TAL_nf_c054:0 "Autumn AFB"
TAL_nf_c054_desc:0 "Adams Air Force base was to be the fall back point if Raven Rock ever fell. Now that Raven Rock has fallen, it makes sense that we would make use of the place. It could use a new name though."
TAL_nf_c055:0 "Crawler Archives"
TAL_nf_c055_desc:0 "The mobile crawler base at AAFB had a substantial amount of important data that has largely been lost to time. What we can recover though, is of vital importance if we are to unite this nation."
TAL_nf_c056:0 "Autumn's Legacy"
TAL_nf_c056_desc:0 "Many of the surviving Enclave personnel still mourn Colonel Autumn's death. While many wastelanders know nothing of the man, it is largely because of him that they are not all dead right now."
TAL_nf_c057:0 "Expanded Labs"
TAL_nf_c057_desc:0 "We have gathered scientific equipment from across the wasteland and staffed our new labs with any willing egghead that can tell a quantum harmonizer from a photonic resonation chamber."
TAL_nf_c058:0 "Here to Stay"
TAL_nf_c058_desc:0 "Our base of operations is abuzz with activity and with our flag flying high we send a strong message to the Wasteland. We are The Talon Enclave, and we are here to stay."
TAL_nf_c059:0 "Clear And Present Danger"
TAL_nf_c059_desc:0 "Few of the lower brass knew to just what extent the other Enclave outposts were operating. A transmission from Chicago lets us know that they are out there, and they know what happened in The Capital Wasteland."
TAL_nf_d001:0 "The Capital Playground"
TAL_nf_d001_desc:0 "The Capital Wasteland belongs to Talon Company. While collecting caps and taking what we want is nice, maybe a little more work can lead to better rewards?"
TAL_nf_d002:0 "Continue The Flow"
TAL_nf_d002_desc:0 "The Pitt may have shunned us, but that doesn't mean we should shut off all dealings. The slave trade is big money, and we are in a position to dominate the market."
TAL_nf_d003:0 "Halt Slave Trade"
TAL_nf_d003_desc:0 "The Pitt should have known better than to turn up their nose at Jabsco! We will not send a single slave their way, and we'll see just how well they get on without us!"
TAL_nf_d004:0 "Protection Contracts"
TAL_nf_d004_desc:0 "What if... we charge settlements for protection and then... protect them? They wont hide their caps under the mattress if we actually provide security right?"
TAL_nf_d005:0 "The Wider wasteland"
TAL_nf_d005_desc:0 "The Capital Wasteland is a shithole, and everywhere else is just as shitty. Still, there are caps to be squeezed out of those lands."
TAL_nf_d006:0 "Hire A Mountain Man"
TAL_nf_d006_desc:0 "Just west of The Capital Wasteland is a near endless range of mountains. Without quality guidance, we could easily get lost and bogged down into a mess of a war with whoever lives there."
TAL_nf_d007:0 "Rock The Mountains"
TAL_nf_d007_desc:0 "The boys are ready to march up into the mountains and teach those yokels who is really in charge."
TAL_nf_d008:0 "Mountain of Loot"
TAL_nf_d008_desc:0 "Whether they like it or not, the people of these hills will pay their dues to Talon Company!"
TAL_nf_d009:0 "Extra Socks"
TAL_nf_d009_desc:0 "Jabsco found some old army book about something called trench foot. So he's now got a bug up his ass about us packing extra socks before we hit the swamps. Of course, the cost will come out of our pay!"
TAL_nf_d010:0 "Into The Shit"
TAL_nf_d010_desc:0 "You ever wonder why we're here?"
TAL_nf_d011:0 "Been Through It"
TAL_nf_d011_desc:0 "Virginia Swamps, 2281. I was there, it sucked."
TAL_nf_d012:0 "Holler At Harrisburg"
TAL_nf_d012_desc:0 "The bandits up at Harrisburg aren't as stupid as a normal raider. They may just lay down their guns and join up with the big dogs."
TAL_nf_d013:0 "Nothin But Pitchforks"
TAL_nf_d013_desc:0 "Central PA is nothing but razergrain farmers with pitchforks. This should be easy."
TAL_nf_d014:0 "Amish Craftsmanship"
TAL_nf_d014_desc:0 "Say what you will about The Amish, but fuck can they make a good chair. Now they make them for us to sell, or that collar on their neck goes BOOM!"
TAL_nf_d015:0 "Missed Opportunity"
TAL_nf_d015_desc:0 "FUCK THE PITT! THOSE MOTHERFUCKERS THOUGHT THEY WERE TOO GOOD FOR US! NOW WE WILL BREAK THEIR BACKS AND MAKE THEM HUMBLE!"
TAL_nf_d016:0 "New Man In Charge"
TAL_nf_d016_desc:0 "The Pitt may be a dump, but now it's our dump."
TAL_nf_d017:0 "Citadel Computers"
TAL_nf_d017_desc:0 "One of our guys finally broke into those Brotherhood computers. But there is a BIG problem!"
TAL_nf_d018:0 "Creepy Cannibals"
TAL_nf_d018_desc:0 "Those guys down in Andale are weird as shit. Most of the guys we sent around that way for jobs never came back either."
TAL_nf_d019:0 "Business As Usual"
TAL_nf_d019_desc:0 "I don't care if they spook you, go in there and kick their asses!"
TAL_nf_d020:0 "Extort The Rich Men"
TAL_nf_d020_desc:0 "Rich Man supposedly has a lot of wealthy wasters that now have to pay their dues to us."
TAL_nf_d021:0 "Stay Outta The Swamps"
TAL_nf_d021_desc:0 "The swamps around the area of Point Lookout are not worth the trouble. Just stay out of there."
TAL_nf_d022:0 "Recognize Potential"
TAL_nf_d022_desc:0 "Some of the leaders of Andale came to Jabsco with an interesting offer..."
TAL_nf_d023:0 "Cannibal Corps"
TAL_nf_d023_desc:0 "They may not be like the rest of our soldiers, but these cannibal corps from Andale know how to close in on their enemy and make them suffer. They operate by some kind of strange code of the slashers that turns them into death walking terrors with no remorse. Jabsco just tells them 'the time to kill is now' and they fly into a murderous rampage leaving nothingbut shredded humans to be devoured by vermin. Anyone we send them after would rather be sentenced to burn, so they often play ball when frantic disembowelment is on the table."
TAL_nf_d024:0 "What's a Dunwich?"
TAL_nf_d024_desc:0 "Is that some kind of sandwich?"
TAL_nf_d025:0 "Cull The Cults"
TAL_nf_d025_desc:0 "Jabsco is too scared of those weird fucks in Andale, so he wants us to just kill them all."
TAL_nf_d026:0 "Take Their Shit"
TAL_nf_d026_desc:0 "Say what you will about those Andale guys, but they had some cool knives. Jerry says his keeps talking to him though..."
TAL_nf_d027:0 "Peace of Mind"
TAL_nf_d027_desc:0 "No more cults, no more problems."
TAL_nf_d028:0 "Gooood Morning Megaton!"
TAL_nf_d028_desc:0 "We let the wastelanders have it too good while we took care of all their problems. Now its time to pay up for the service."
TAL_nf_d029:0 "Raid The Rust Tub"
TAL_nf_d029_desc:0 "Rivet City is like a great big safe just waiting for us to bust it open and grab the loot."
TAL_nf_d030:0 "Top Dogs Around"
TAL_nf_d030_desc:0 "The wastes are ours for the taking. Soon everyone across this nation will be paying Talon Company for protection, and we'll be rich!"
TAL_nf_d031:0 "Visit The Pitt"
TAL_nf_d031_desc:0 "The time for meetings of representatives has passed. If this partnership is to last, Ashur and Jabsco are going to have to meet face to face."
TAL_nf_d032:0 "Advance in Guns"
TAL_nf_d032_desc:0 "Ashur likes what we have done so far and is offering us a nice advance on the next contract. A batch of fine ass new rifles!"
TAL_nf_d033:0 "Advance in Forges"
TAL_nf_d033_desc:0 "Ashur likes what we have done so far and is offering us a nice advance on the next contract. He will let us use some of his forges for whatever the hell we want!"
TAL_nf_d034:0 "Feed The Machine"
TAL_nf_d034_desc:0 "The forges of The Pitt need a constant supply of workers. As we expand our turf, we can rise to meet this demand for a good supply of caps."
TAL_nf_d035:0 "Problem Solvers"
TAL_nf_d035_desc:0 "The Pitt has no shortage of problems originating outside their gates. That's where we come in."
TAL_nf_d036:0 "Feed The Forges"
TAL_nf_d036_desc:0 "The Pitt has a near limitless supply of scrap metal to smelt down. But these lazy slaves can only collect so much of it before the trogs get them. We could ship some in from DC."
TAL_nf_d037:0 "Expedite Deliveries"
TAL_nf_d037_desc:0 "These scrap caravans are running too slow on the old caravan trails. Get some slaves to smooth out the trails."
TAL_nf_d038:0 "Joe's Junkmen"
TAL_nf_d038_desc:0 "Joe knows a thing or two about collecting scrap. We're having him organize these lazy bastards in the ruins."
TAL_nf_d039:0 "Hunting Hamlin"
TAL_nf_d039_desc:0 "The DC Settlements are hiding this Hamlin coward and his army of escaped slaves. We will not be able to stop Hamlin until the settlements are dealt with."
TAL_nf_d040:0 "Sack The Temple"
TAL_nf_d040_desc:0 "The army of unruly slaves have been cornered at their stronghold. Just one final push is needed."
TAL_nf_d041:0 "A Fine Gift"
TAL_nf_d041_desc:0 "What gift do you get for the lord of The Pitt? A momento of a fallen thorn in his side is a good token."
TAL_nf_d042:0 "Harrisburg Hirelings"
TAL_nf_d042_desc:0 "The bandits up in Harrisburg have been a useful supplier to The Pitt, even if they were a little small time. Now they are having problems and Ashur wants us to step in."
TAL_nf_d043:0 "Crush The Wardens"
TAL_nf_d043_desc:0 "There is no point beating around the rubble. The farmers of Johnstown are sheltering these road wardens and we need to put the pressure on them."
TAL_nf_d044:0 "Make Examples"
TAL_nf_d044_desc:0 "The wardens and those sheltering them will be the first shipped up to The Pitt."
TAL_nf_d045:0 "Well Earned Bonus"
TAL_nf_d045_desc:0 "The scrap is flowing, and the small annoyances are dealt with. We certainly deserve this bonus."
TAL_nf_d046:0 "Take The Reigns"
TAL_nf_d046_desc:0 "I don't know who this Wehrner asshole thinks he is, but he'll regret canning our contract."
TAL_nf_d047:0 "Developing Markets"
TAL_nf_d047_desc:0 "Things are ramping up in The Pitt. Because of this, they need certain things that most groups won't sell them because of their reputation. Ashur wants us to reach out to some other groups."
TAL_nf_d048:0 "The Philly Connection"
TAL_nf_d048_desc:0 "The Trash Man has a reputation of being difficult to work with. It is a minor miracle Jabsco was able to secure a deal with him."
TAL_nf_d049:0 "The Fall of Hershey"
TAL_nf_d049_desc:0 "As part of our arrangement with The Philly Raiders, we will help them take down their biggest target of recent years."
TAL_nf_d050:0 "Hershey Exports"
TAL_nf_d050_desc:0 "The Trash Man is holding up his end of the deal, and has even cut us in on his new export business as a token of appreciation."
TAL_nf_d051:0 "Dover's Business"
TAL_nf_d051_desc:0 "The Dover Traders have connections up and down the east coast. If anybody could get us what we need, it is them."
TAL_nf_d052:0 "Clear The Waterways"
TAL_nf_d052_desc:0 "The Bayfishers keep getting in the way of some shipments. We can't allow that to continue."
TAL_nf_d053:0 "Southern Imports"
TAL_nf_d053_desc:0 "Resources are flowing into The Pitt thanks to our connections in Dover. We backed the right crew here."
TAL_nf_d054:0 "Gangs of New York"
TAL_nf_d054_desc:0 "Stories come down from the north about a collection of gangs in the New York ruins who have a pretty good handle on things. We could try talking to them."
TAL_nf_d055:0 "Family Disputes"
TAL_nf_d055_desc:0 "These gangs are not as united as we were led to believe. That is something we can use to our advantage."
TAL_nf_d056:0 "We Got It Made"
TAL_nf_d056_desc:0 "Jabsco has received an offer he can't refuse."
TAL_nf_d057:0 "A Little Skimming"
TAL_nf_d057_desc:0 "The Pitt is getting more than they need thanks to us. Who'd it hurt if we kept a little for ourselves?"
TAL_nf_d058:0 "The Dream"
TAL_nf_d058_desc:0 "The Pitt has the potential to change the wasteland. It just needs the right mind guiding it."
TAL_nf_d059:0 "The Future Is Steel"
TAL_nf_d059_desc:0 "The Pitt has become a well-oiled machine. Things are good and can only get better."
