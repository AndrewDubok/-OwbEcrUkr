	###############
 	###Decisions###
  	###############
	OUT_expeditions_category:0 "East Coast Expeditions"
	OUT_expeditions_category_desc:0 "Up and down The East Coast there are places of great interest to The Brotherhood. Old reseach labs, abandoned bunkers and more are scattered up and down this side of the country. Some of it may have been looted long ago, but it is part of our mission to search for what remains. Lyons wastead decades staying put in DC, so we have some catching up to do."
	OUT_boston_expedition_decision:0 "Commonwealth Expedition"
	OUT_boston_expedition_decision_desc:0 "Rumors circulate that to the north in what was pre-war Boston, there is a shadowy group called The Institute that have technology that rivals even Enclave equipment. It could just be an old caravan tale, but even if it is the area holds great promise. Before the war it was a hub of technology companies and the local military bases served as testing grounds for important pre-war military technology."
	OUT_pitt_expedition_decision:0 "The Pitt Expedition"
	OUT_pitt_expedition_decision_desc:0 "Our first expedition to The Pitt was largely considered a success, but from what little has come out of that area things have changed these past decades. If the rumors are true, the one Brother of ours that we thought lost in the scourge survived and now considers himself king of the people of The Pitt. He's supposedly organizing an army and building industry with working pre-war ammo presses."
	OUT_appalachia_expedition_decision:0 "Appalachia Expedition"
	OUT_appalachia_expedition_decision_desc:0 "An expeditionary force was sent to Appalachia over 150 years ago to follow up on a remote chapter that went dark years prior. Records from that time are unreliable at best, and the area was out of the way during our trek East. Maybe now we can see what became of our brothers."
	OUT_ronto_expedition_decision:0 "Ronto Expedition"
	OUT_ronto_expedition_decision_desc:0 "Pre-war Toronto was home to a large US occupation force and more than a few unethical labs. Information about post-war Ronto is harder to gather, but some say the people there fought off a force of soldiers in black power armor?"
	OUT_new_york_expedition_decision:0 "New York Expedition"
	OUT_new_york_expedition_decision_desc:0 "The Pre-war city of New York was one of the largest cities in the country. Several cutting-edge companies had labs and offices in the area, and it had a substantial military presence due to the food riots. It is without doubt that it was hit as badly as DC, but it is still worth assessing for ourselves."
	OUT_rocky_expedition_decision:0 "Crimson Town Expedition"
	OUT_rocky_expedition_decision_desc:0 "Tales from the immediate West tell of a fanatical cult in the mountains that have access to advanced flamer technology. Could they be sitting on a cache of valuable equipment?"
	OUT_magnets_expedition_decision:0 "Broken Armor Expedition"
	OUT_magnets_expedition_decision_desc:0 "As the foreboding name of this location implies, we have heard tales of a force in this area that has weapons capable of devastating power armor. A group of our best scouts will need to be sent with non-standard equipment out to assess this. We can't have raiders with T-45 shredding weapons sitting so close to us."
	OUT_dc_explorations_category:0 "Capital Wasteland Expeditions"
 	OUT_dc_explorations_category_desc:0 "The Capital Wasteland is full of labs, military facilities, and hidden caches that Lyons has ignored for nearly two decades. We need to scour these ruins before wastelanders figure it out."
  	OUT_dc_national_guard_decision:0 "The National Guard Depot"
   	OUT_dc_national_guard_decision_desc:0 "The National Guard Depot is a crumbling ruin, but the security robots have detered scavengers for over 200 years."
	OUT_dc_constantine_decision:0 "Fort Constantine"
 	OUT_dc_constantine_decision_desc:0 "A military base in the northwestern Capital Wasteland, not much is known about Fort Constantine other than rumors some mercs made their way through it a few years back."
  	OUT_dc_wheaton_decision:0 "Wheaton Armory"
   	OUT_dc_wehaton_decision_desc:0 "Wheaton Armory is currently occupied by raiders, should be easy for us to clear it out."
	OUT_satcom_array_nn03:0 "Satcom Array NN-03d"
 	OUT_satcom_array_nno3_desc:0 "Near Fort Constantine is an array of dishes used for communications with satellites. Most of them have long since fallen from orbit, but you never know whats up there until you look."
  	OUT_expedition_followup_category:0 "East Coast Expeditions"
   	OUT_expedition_followup_category_desc:0 "The other Brotherhood has finally gotten back to what we were sent out here to do, searching for important tech. It does seem like they are half-assing it though, so when they get back from somewhere we should take a better look."
	OUT_boston_followup_decision:0 "Explore Boston"
 	OUT_boston_followup_decision_desc:0 "Our brothers have returned from Boston with crates of valuable technical data. There must be more than enough for us as well."
  	OUT_new_york_followup_decision:0 "Explore New York"
   	OUT_new_york_followup_decision_desc:0 "Our brothers have reutrned from New York saying the place is little more than a boneyard overrun with mutants and raiders. It is still worth us taking a second look."
	OUT_appalachia_followup_decision:0 "Explore Appalachia"
 	OUT_appalachia_followup_decision_desc:0 "Our brothers have returned from Appalachia reporting there is no sign of the Appalachian Chapter. We expected as much, but they didn't even try to look for tech?"
  	OUT_ronto_followup_decision:0 "Explore Ronto"
   	OUT_ronto_followup_decision_desc:0 "Our brothers are being very quiet about what they found in Ronto. We need to take a look on our own"
	OUT_hunt_pipboys_decision:0 "Find A Pipboy"
 	OUT_hunt_pipboys_decision_desc:0 "For some strange reason, very few Vaults in The Capital Wasteland opened and had their dwellers walk out. Because of this, Pipboys are much rarer than they are out west. It will take some effort to find a functioning one."
	OUT_cult_category:0 "Unusual Choices"
	OUT_cult_category_desc:0 "Why would we do this?"
	OUT_racer_return_decision:0 "Return To The Red Racer Factory"
	OUT_racer_return_decision_desc:0 "The unimpressive Red Racer factory was ignored after we swept through it. However, some of the Defenders and Specialists that went through it are now insisting we return. They all have suddenly started thinking we missed something in the CEOs offices, but they are unable to elaborate what it is."

    ############
    ###Events###
    ############
	OUT_nf_events.1.title:0 "Not Leaving Empty Handed"
 	OUT_nf_events.1.desc:0 "When it became clear Lyons would never see reason, Casdin told those closest to him to begin preparations to leave. Personal effects, spare rations, and our own gear were easy enough to get away with. But, with a little finesse we could sneak a little extra out."
  	OUT_nf_events.1.a:0 "A few spare suits of T-45 would help"
   	OUT_nf_events.1.b:0 "We brought some extra rifles"
	OUT_nf_events.1.c:0 "We snuck out the big guns"
	OUT_nf_events.2.title:0 "Digging Through Rubble"
 	OUT_nf_events.2.desc:0 "Fort Independance was like many other military installations in The Capital Wasteland, crumbling and picked clean on the main levels. When we arrived there was a real question of whether we would be better off hiking to another place. Those that were on the first trip out reminded us that The Citadel wasn't very pretty to look at when we first arrived. We would need to make do. The question remained what we would do first."
  	OUT_nf_events.2.a:0 "Fix up the defenses"
   	OUT_nf_events.2.b:0 "Clean the barracks"
	OUT_nf_events.2.c:0 "Map the surroundings"
	OUT_nf_events.3.title:0 "The Independance Outpost"
 	OUT_nf_events.3.desc:0 "Lyons may have heeded the order to explore Fort Independance, but that did not mean he saw the value in it. We were able to staff the small outpost with sympathetic brothers. With them in place we even managed to have some equipment brought over."
  	OUT_nf_events.3.a:0 "Some weapons workbenches"
   	OUT_nf_events.3.b:0 "A couple general workbenches"
	OUT_nf_events.3.c:0 "Electronic parts"
	OUT_nf_events.4.title:0 "A Protector's Duty"
 	OUT_nf_events.4.desc:0 "The Codex is very clear on what is required for one to become an Elder. Though we are the only ones out East who adhere to it, Lyons was still declared elder by The High Elders out West. Nobody in The Outcasts has the autority to name an Elder or even promote a Defender to Paladin. What The Codex did not forbid though was us using temporary titles until contact could be re-established with Lost Hills. Casdin assumed the title of Protector."
  	OUT_nf_events.4.a:0 "He will protect our ideals"
   	OUT_nf_events.4.b:0 "He will protect knowledge"
	OUT_nf_events.4.c:0 "He will protect our brothers"
	OUT_nf_events.5.title:0 "The Original Mission"
 	OUT_nf_events.5.desc:0 "We were sent out here with two goals, to secure valuable tech and keep it from the hands of those unable to use it responsibly. Lyons lost sight of this goal, thinking it more important to protect wastelanders from mutants than from themselves. Now that we are free of his mismanagement, we can get back to our mission. The question remains where to start."
  	OUT_nf_events.5.a:0 "Search The National Guard Depot"
   	OUT_nf_events.5.b:0 "Search Wheaton Armory"
	OUT_nf_events.5.c:0 "Search Fort Constantine"
 	OUT_nf_events.5.d:0 "Search Satcom Array NN-03"
	OUT_nf_events.6.title:0 "Liberating Anchorage"
 	OUT_nf_events.6.desc.1:0 "It took longer than we expected, but we were finally able to find a working PipBoy and send a Knighht into the Anchorage simulation. They reported it to be just as absurd as the terminal entries made it out to be, with little actual training value to be found. However, that is of no consequence. The real value was behind the doors unsealed by the siimulation. In the locked wing there was a treasure trove perfectly-preserved pieces of equipment along with volumes of technical data and schematics for all of it."
  	OUT_nf_events.6.desc.2:0 "Though it required getting the help of a wastelander, we were finally able to complete the Anchorage simulation. The wastelander's account makes the simulation sound as absurd as the terminal entries said it would be. However, that is of no consequence. The real value was behind the doors unsealed by the siimulation. In the locked wing there was a treasure trove perfectly-preserved pieces of equipment along with volumes of technical data and schematics for all of it. \n\n We just have one problem... \n\n  The wastelander was promised some of the tech for their help, and many of the Knights in the facility disagree. Protector McGraw tells us Defender Sibley and half the garrison is refusing to let anyone into the secured wing until the wastelander leaves. Defender Sibley has contacted us as well saying Protector McGraw is trying to give away valuable tech to a wastelander. We may need to pick a side here."
  	OUT_nf_events.6.a:0 "And it's all ours!"
   	OUT_nf_events.6.b:0 "Give Sibley the green light to engage"
	OUT_nf_events.6.c:0 "Oder McGraw to remove Sibley"
 	OUT_nf_events.6.d:0 "Why don't we pay off the wastelander instead?"
	OUT_nf_events.7.title:0 "A Few Old Weapons"
 	OUT_nf_events.7.desc:0 "Our sweep of the LOB Enterprises building found little more than some old weapons. The destroyed military robots that litter the facility show we are far from the first people to delve into this ruin. Still, the rifles will bolster our arsenal."
  	OUT_nf_events.7.a:0 "At least we found something of value"
	OUT_nf_events.8.title:0 "Well-Stocked Lockers"
 	OUT_nf_events.8.desc:0 "Our sweep of the LOB Enterprises building yielded good results. After fighting throuh a handfull of military robots, our team was able to access a storage room containing a large number of military weapons the contractor was reverse-engineering."
  	OUT_nf_events.8.a:0 "Well done"
	OUT_nf_events.9.title:0 "Valuable Data"
 	OUT_nf_events.9.desc:0 "Our sweep of the LOB Enterprises building has yielded good results. Though the building was picked clean of equipment sometime recently, several terminals containing experimental schematics remained intact. The data has been copied to holotapes and brought back to base for further study."
  	OUT_nf_events.9.a:0 "A great find!"
	OUT_nf_events.10.title:0 "Spectacular Find"
 	OUT_nf_events.10.desc:0 "Our sweep of the LOB Enterprises building yielded fantastic results. The building was barely touched in the last 200 years thanks to a number of military robots that secured the office shortly before the bombs fell. Our Defenders made short work of the bots and performed a sweep of the building. Inside they found a substantial number of completed weapons, in-process prototypes, and volumes of technical data. The equipment and data is being moved back for inventory and analysis."
  	OUT_nf_events.10.a:0 "Great work!"
	OUT_nf_events.11.title:0 "One Stone Unturned"
 	OUT_nf_events.11.desc:0 "Following our sweep of the LOB Enterprises building, scavengers were allowed in to pick through the remains. It is a good thing we allowed them in. One prospector uncovered a hidden door not on the blueprints we had and discovered a room full of advanced weapons. The scavenger has been compensated for their find and assisted with delivery to Fort Independance."
  	OUT_nf_events.11.a:0 "This is why we let them pick through for scraps"
	OUT_nf_events.12.title:0 "About What We Expected"
 	OUT_nf_events.12.desc:0 "The Defenders sent to the Red Racer factory did not expect to find any groundbreaking technological marvels in an old toy factory, and they were right. We just found a few corpses and old machines. Much of the machinery could be repurposed into other manufacturing processes though."
  	OUT_nf_events.12.a:0 "Not a total waste of time"
	OUT_nf_events.13.title:0 "That's... Unexpected"
 	OUT_nf_events.13.desc:0 "None of the Defenders sent to the Red Racer factory expected to find a lab operated by some raider mad scientist. While the concept of a raider scientist is something of an oxymoron, the research notes that are legible have taught us a few things about the behavior of feral ghouls. While not of much use right now, they could aid us if some mad wastelander was able to amass an army of ferals."
  	OUT_nf_events.13.a:0 "Who would do that?"
	OUT_nf_events.14.title:0 "The Raider Pavlov?"
 	OUT_nf_events.14.desc:0 "Nobody could have expected what we foudn in the Red Racer factory. We anticipated finding some old machines, maybe some technical data, but not a functioning lab operated by raider mad scientist. While just about everyone in our order would laugh at the idea of a raider scientist, this one actually had a brain in their skull before we fried it with a laser rifle. Volumes of data and experiments yielded breakthroughs in understanding feral ghouls. Most in The Brotherhood would say the only thing we need to know about feral ghouls is that they die when we shoot them. However, if we are able to replicate these experiments, we could find a way to direct ghouls to attack who we want them to! \n\n There is just one strange thing to note. A couple of the Defenders reported hearing strange whispers in The CEO's Office."
  	OUT_nf_events.14.a:0 "Set up a lab to continue the studies"
   	OUT_nf_events.14.b:0 "Burn this research and level the building"
	OUT_nf_events.15.title:0 "Scav Finds Useful Data"
 	OUT_nf_events.15.desc:0 "After our team made a pass through the Red Racer factory, scavengers were allowed to pick through the remains. We did not expect them to find anything of particular interest, but one scavenger looked in a factory terminal we deemed unimportant. Inside they found schematics for a motorized Red Racer tricycle. Of course, that is of no use to us. But the compact engine designs themselves could be useful."
  	OUT_nf_events.15.a:0 "Very interesting"
	OUT_nf_events.16.title:0 "A REAL Coffee Maker"
 	OUT_nf_events.16.desc:0 "Coffee makers have been largely rendered useless in the last 200 years as pre-war supplies of coffee dried up. When Slocum Joe started pouring cups left and right for his scavenger buddies, we were suspicious but not overly concerned. After all, who cares if he found a warehouse of old ground beans? His secret was infact a lot more interesting than that. He had not found a warehouse full of beans, but a machine capable of converting matter into coffee beans. We had found reports of fabricators like this being created shortly before the war, but one just for coffee seems wasteful."
  	OUT_nf_events.16.a:0 "Doesn't mean we can't use it"
	OUT_nf_events.17.title:0 "A REAL Coffee Maker"
 	OUT_nf_events.17.desc:0 "Coffee makers have been largely rendered useless in the last 200 years as pre-war supplies of coffee dried up. When Slocum Joe started pouring cups left and right for his scavenger buddies, we were suspicious but not overly concerned. After all, who cares if he found a warehouse of old ground beans? His secret was infact a lot more interesting than that. He had not found a warehouse full of beans, but a machine capable of converting matter into coffee beans as well as tapes allowing it to produce some higher quality coffee. We had found reports of fabricators like this being created shortly before the war, but one just for coffee seems wasteful."
  	OUT_nf_events.17.a:0 "Doesn't mean we can't use it"
	OUT_nf_events.18.title:0 "A REAL Coffee Maker"
 	OUT_nf_events.18.desc:0 "Coffee makers have been largely rendered useless in the last 200 years as pre-war supplies of coffee dried up. When Slocum Joe started pouring cups left and right for his scavenger buddies, we were suspicious but not overly concerned. After all, who cares if he found a warehouse of old ground beans? His secret was infact a lot more interesting than that. He had not found a warehouse full of beans, but a machine capable of converting matter into coffee beans as well as tapes allowing it to produce some higher quality coffee. We had found reports of fabricators like this being created shortly before the war, but one just for coffee seems wasteful. \n\n Thankfully our scribes have found data they believe could allow us to produce other small objects with it."
  	OUT_nf_events.18.a:0 "No more scavenged stimpacks for us"
	OUT_nf_events.19.title:0 "Flamer-roasted Coffee"
 	OUT_nf_events.19.desc:0 "After our team made a pass through Slocum Joes HQ, scavengers were allowed to pick through the remains. We didn't expect them to find anything especially valuable after multiple teams have passed through the facility following the battle with Joes' junkmen. For most of the scavengers, we were right. One scav did manage to surprise us. They found a room in the marketing wing containing several military-grade flamers. The documents with the equipment mentioned some kind of promotion sponsered by the military involving them flame-roasting coffee beans with the weapons of war."
  	OUT_nf_events.19.a:0 "Their stupid marketing campaign is our gain!"
	OUT_nf_events.20.title:0 "War For DC"
 	OUT_nf_events.20.desc:0 "The Capital Wasteland has erupted into more violence than usual with the emergence of The Enclave. Lyons and his lot have been battling them for some time and it is still unclear from Fort Independance as to who won. What we do know is either outcome will radically change the circumstances of our mission. It is imperative we contact Lost Hills to report in and request new orders."
  	OUT_nf_events.20.a:0 "Stand ready!"
	OUT_nf_events.21.title:0 "Bloodless Robes"
 	OUT_nf_events.21.desc:0 "If any group of Lyons' lot are blameless for his treason, it is proably the scribes. Most of them did not fight us, and their work for the rogue chapter was largely consistent with our mission. There are some in our order who argue that regardless of their duties or having not fought us directly, they stood against The Codex by not joining us and aided the rogue knights that fought us by maintaining their gear."
  	OUT_nf_events.21.a:0 "Allow the scribes to rejoin"
   	OUT_nf_events.21.b:0 "Exile the scribes"
	OUT_nf_events.21.c:0 "Execute the scribes"
	OUT_nf_events.22.title:0 "Rogue Paladins"
 	OUT_nf_events.22.desc:0 "If any group of Lyons' lot deserves blame, it's the leadership who complied with his treasonous orders. They wasted resources on decades of fruitless efforts, broke countless directives, and even fought against us when we took efforts to correct these problems. Despite their innumerable crimes, there are still those in the chapter that argue they be given mercy. They point out that we too went along with these orders for decades, and we should not penalize those that finally came around to the truth for taking a few years longer."
  	OUT_nf_events.22.a:0 "Allow the leadership to rejoin us"
   	OUT_nf_events.22.b:0 "Allow them to rejoin, as Knights"
	OUT_nf_events.22.c:0 "Exile the leadership"
 	OUT_nf_events.22.d:0 "Execute the leadership"
	OUT_nf_events.23.title:0 "The Muddied Ranks"
 	OUT_nf_events.23.desc:0 "Few in our ranks are calling for blood even for those brothers who fought us. The wastelanders Lyons flooded their ranks with after our departure are another story. There are quite a few who don't believe those wasters worthy of the title of Knight. That being said, these wastelanders defeated The Enclave. Some would say that is a task worth allowing them sponsorship into our order."
  	OUT_nf_events.23.a:0 "They earned their rank"
   	OUT_nf_events.23.b:0 "Reinitiate those willing to start from the beginning"
	OUT_nf_events.23.c:0 "The wastelanders are not our brothers"
 	OUT_nf_events.23.d:0 "Exile all of them"
  	OUT_nf_events.23.e:0 "Execute the lot of them!"
	OUT_nf_events.24.title:0 "Message From The Outcasts"
 	OUT_nf_events.24.desc:0 "Not long after the defeat of The Enclave and the passing of Elder Lyons, we started seeing a decrease in outcast activity near our territory. Scouts and patrols meant to keep an eye on The Citadel pulled back. The leading theories were that they were focusing on searching for Enclave tech, or possibly preparing to head west. Now we know both of these theories were wrong. In reality, they were trying to de-escalate tensions in preparation of reaching out to us. The leader of this group of outcasts, Protector Casdin, has sent an envoy wishing to cease hostilities with us. Though he and his group still consider us in violation of The Codex, they concede that our methods may have played a hand in our success. They have made it clear this is not a request to rejoin our ranks, but that they would be willing to stop the fighting and cooperate instead. Should we decline their propsal, we may want to prepare for renewed conflict."
  	OUT_nf_events.24.a:0 "Accept their proposal"
   	OUT_nf_events.24.b:0 "No friendship with outcasts"
	OUT_nf_events.25.title:0 "The Fairfax Offer"
 	OUT_nf_events.25.desc:0 "The Outcasts have heard about the wealth of tech we found at Adams Air Force Base, and they want some. We have received a proposal that would give them rights to scavenge and take advanced tech from the facility, in exchange for them pulling back from the ruins in South DC. This deal doesn't threatening aura as their first one, so we should not expect anyhting more than some hurt feelings if we decline it."
  	OUT_nf_events.25.a:0 "Accept the deal"
   	OUT_nf_events.25.b:0 "Refuse the deal"
	OUT_nf_events.26.title:0 "No Uncertain Terms"
 	OUT_nf_events.26.desc:0 "Elder Lyons visited Fort Indpendence recently to have a meeting with Protector Casdin. She was not happy, to say the least. The meeting went on for hours and was more a screaming match than a discussion of leaders, but it could be summed up with one quote from the elder. \n\n §BYou call us weak, but you ran and hid while Super Mutants ravaged The Capital Wasteland. You did nothing to fight The Enclave and I did not see a single one of you at Adams Air Force Base! I am not saying you people need to join water caravans, but if we are out there containing a threat or securing tech, I expect to see some black and red armor. Until then, I'll tell you where you can shove your opinions on my knights!§! \n\n When the exchange was over, The Elder and her pride left. It's safe to say the exchange had an effect on Casdin, who had only one thing to say after The Elder left."
  	OUT_nf_events.26.a:0 "'I saw the same fire her father once had in his eyes.'"
	OUT_nf_events.27.title:0 "Relcaiming The Citadel"
 	OUT_nf_events.27.desc:0 "The Citadel ended up being the location of some of the fiercest fighting against The Enclave. The bastards wasted no time moving in after the slaughtered our former brothers. The fighting was close range, hall to hall, room to room. The place was so badly damaged in the fighting that we have decided to keep Fort Independance as our main base. It would simply be a waste of resources to try and fix up the damage done. Still, there is plenty of value to be dug out of the ruins."
  	OUT_nf_events.27.a:0 "Keep digging around."
	OUT_nf_events.28.title:0 "A White Elephant?"
 	OUT_nf_events.28.desc:0 "Project Purity was the obsession of many bright minds for decades. When it finally started working, The Enclave revelaed themselves and threw everything they had at keeping it under their control. This purifier, capable of producing a near limitless supply of fresh water, is certainly of immense value. However, it will require substantial manpower and resources to keep it working. It is possible that we can recoup those costs by selling the water, but we could also possibly sell the facility outright to someone who'd rather have it."
  	OUT_nf_events.28.a:0 "Occupy Project Purity and sell the water"
   	OUT_nf_events.28.b:0 "Offer to sell the facility to Rivet City"
	OUT_nf_events.28.c:0 "There is nobody who will buy it."
	OUT_nf_events.29.title:0 "New Orders"
 	OUT_nf_events.29.desc:0 "When we reached out to Lost Hills, we were surprised to find they knew more about our situation than we expected. Naturally, they were disappointed in how things were progressing out east. However, they agree that if anyone can right the chapter it is Casdin. They have appointed him elder, and tasked him with continuing the original mission of the chapter. We should expect reinforcements in the coming months."
  	OUT_nf_events.29.a:0 "We will not fail again"
	OUT_nf_events.30.title:0 "War For DC"
 	OUT_nf_events.30.desc:0 "The Capital Wasteland has erupted into more violence than usual with the emergence of The Enclave. Lyons and his lot have been battling them for some time and it is still unclear from Fort Independance as to who won. What we do know is either outcome will radically change the circumstances of our mission. It is imperative we contact Lost Hills to report in and request new orders. Strangely, our research outpost at the Red Racer factory does not share this sense of urgency and is requesting additional resources. They say they are on the verge of something great which will make the reemergence of The Enclave trivial in comparision"
  	OUT_nf_events.30.a:0 "Ignore them"
   	OUT_nf_events.30.b:0 "Send them whatever they need"
	OUT_nf_events.31.title:0 "Red Racer Facility Abandoned"
 	OUT_nf_events.31.desc:0 "A routine supply run to the research facility at the Red Racer factory has reported the location abandoned. The Defenders and Specialists tasked with operating the facility are nowhere to be found, along with their equipment and research notes. The defenders sent to investigate note no signs of fighting and only one clue as to the whereabouts of the missing team. \n\n The word G'Yeth! written on the wall of the CEO's office." 
	OUT_nf_events.31.a:0 "Strange..."
 	OUT_nf_events.32.title:0 "Rivet City Accepts Our Offer"
  	OUT_nf_events.32.desc:0 "Rivet City has accepted our offer to sell them control of Project Purity. They have agreed to provide us a share of the water, as well as a number of valuable pieces of tech."
   	OUT_nf_events.32.a:0 "A fair trade"
	OUT_nf_events.33.title:0 "Rivet City Declines Our Offer"
 	OUT_nf_events.33.desc:0 "Rivet City has refused our offer to sell them control of Project Purity. It looks like we will need to make use of the facility if we are to gain anything of value from it."
  	OUT_nf_events.33.a:0 "Didn't hurt to try"
   	OUT_nf_events.34.title:0 "The Outcasts' Offer"
	OUT_nf_events.34.desc:0 "The Brotherhood Outcasts have offered to let us take control of Project Purity on the condition that we compensate them for it. Their request came in two parts. First, they want a share of the water delivered to their fort on a regular basis. Second, they want a substantial amount of tech."
 	OUT_nf_events.34.a:0 "Accpet their offer"
  	OUT_nf_events.34.b:0 "We don't have the tech, but we have caps"
   	OUT_nf_events.34.c:0 "Decline their offer"
	OUT_nf_events.35.title:0 "No Response"
 	OUT_nf_events.35.desc:0 "We have received no response from The High Elders out west. It has led many to speculate The Lost Hills Bunker is either under radio silence or has been destroyed. There are even rumors swirling around that The NCR of all people could have done it! It may be presumptuous, we have to assume Casdin is the highest ranking member of The Brotherhood. As such, he is now an Elder."
  	OUT_nf_events.35.a:0 "We just wish it didn't come this way"
   	OUT_nf_events.36.title:0 "Entering The Depot"
	OUT_nf_events.36.desc:0 "Despite the robots keeping scavs out for nearly 200 years, it looks like they were recently overcame. Still sparking wrecks of sentry bots and protectrons litter the halls of the depot. Nearly everything of value has been stripped from the facility and even the bunker below has been looted. The team sent in thinks we may have been just a few days too late."
 	OUT_nf_events.36.a:0 "Damn"
   	OUT_nf_events.37.title:0 "Entering The Depot"
	OUT_nf_events.37.desc:0 "It is clear why The National Guard Depot remained largely untouched for the last two centuries. Our Defenders had to fight past so many sentrybots and protectrons that by the time they reached the armory they barely had enough ammunition for the trip home. They returned with good news and bad news. The good news is that the armory bunker is still sealed. The bad news is that they are unable to hack the terminal. A little extra good news is that they did find an entry in a terminal that made it sound like there are holotapes out there that can help us gain access."
 	OUT_nf_events.37.a:0 "Lets get looking!"
   	OUT_nf_events.38.title:0 "Entering Constantine"
	OUT_nf_events.38.desc:0 "Our team sent to explore Fort Constantine met heavy resistance from another group of power armored soldiers. The armor they wore looked like no armor we had records of and it is being nicknamed the 'Black Devil' armor due to its horn-like points on the helmets. After a prolonged firefight they had to retreat. Whoever these people were, they were well-equipped and well-trained."
 	OUT_nf_events.38.a:0 "Keep an eye out"
   	OUT_nf_events.39.title:0 "Entering Wheaton"
	OUT_nf_events.39.desc:0 "Wheaton Armory has been taken over by wastelanders. They are actively stripping the place of anything of value, but have been happy to part with valuable tech and equipment for relatively trivial sums. Assault rifles, miniguns, laser rifles, all for next to nothing. At these prices, this might be our only chance to get them before they are gone."
 	OUT_nf_events.39.a:0 "Buy the assault rifles"
  	OUT_nf_events.39.b:0 "Buy the miniguns"
   	OUT_nf_events.39.c:0 "Buy the laser rifles"
	OUT_nf_events.39.d:0 "We'll take your whole stock"
 	OUT_nf_events.40.title:0 "Entering Wheaton"
	OUT_nf_events.40.desc:0 "Wheaton Armory has been taken over by wastelanders. They are actively stripping the place of anything of value, and are not keen on sharing. While we have no problem with the average wasteland trash, this group is well armed with heavy weapons from the armory. Our team has backed off and suggested we keep an eye on the facility but otherwise consider it lost."
 	OUT_nf_events.40.a:0 "Damn, we were too late!"
   	OUT_nf_events.41.title:0 "Entering Wheaton"
	OUT_nf_events.41.desc:0 "Our team made short work of the raider trash occupying Wheaton Armory. They were surprisingly underequipped for a group sitting on an armory. Inside we found out why, the place is flooded with radiation and many of the doors were still locked. Thankfully, our power armor allowed us to get through no problem and we secured the equipment inside. It is now being brought back to base for our use."
 	OUT_nf_events.41.a:0 "Great job!"
   	OUT_nf_events.42.title:0 "Entering Array NN-03"
	OUT_nf_events.42.desc:0 "The facility was filled with raiders which our team quickly dispatched. Inside they found very little of value in terms of tech or equipment. None of the satellites the facility was to communicate with seem to be in orbit anymore either. However, they did find a set of blueprints for the facility which could help us with our own communicaitons tech."
 	OUT_nf_events.42.a:0 "Better than nothing"
   	OUT_nf_events.43.title:0 "Entering Constantine"
	OUT_nf_events.43.desc:0 "Our team sent to explore Fort Constantine managed to fight past hordes of robots and ferals. The base was largely looted, but behind a secured door they found an armory stocked with suits of power armor!"
 	OUT_nf_events.43.a:0 "What a great find!"
  	OUT_nf_events.44.title:0 "Boston Expedition Returns"
   	OUT_nf_events.44.desc:0 "Our expedition to Boston has returned with as much data and equipment same as The Lyons expedition did. They report a large number of military bases, technical facilities, and labs all ripe for exploration. It is safe to say that Boston is nearly as good a place to set up as DC was whne we first arrived. Perhaps one day we should consider relocating or setting up a permanennt outpost."
	OUT_nf_events.44.a:0 "Maybe one day."
  	OUT_nf_events.45.title:0 "NY Expedition Returns"
   	OUT_nf_events.45.desc:0 "Our expedition to New York has returned and their findings are about in-line with The Lyons expedition. The city is full of various gangs and hordes of mutants fighting for dominance. None of them seemed to possess anything of special interest to us. It is safe to assume anything of value was either looted long ago, or is buried so deep it would need the collective efforts of the city to access. That is something they will likely never achieve."
	OUT_nf_events.45.a:0 "May as well ignore it for now then."
  	OUT_nf_events.46.title:0 "Appalachia Expedition Returns"
   	OUT_nf_events.46.desc:0 "Just like we expected, Lyons' softies were too busy looking for a long-dead chapter to even consider searching for tech. We found a large number of pieces of interesting equipment and are bringing them back for further study."
	OUT_nf_events.46.a:0 "That's why you look for blueprints, not bodies."
  	OUT_nf_events.47.title:0 "Ronto Expedition Returns"
   	OUT_nf_events.47.desc:0 "Worrying news has come with our Ronto expedition, and now we know why Lyons' expedition was so tight-lipped. They found a sizable group of enclave soldiers have taken over the city and are enslaving the populace. Thakfully, the soldiers seemed less competent than those we encountered in DC. Our expedition was able to run circles around their patrols and were able to secure valuable equipment from a series of ambushes. Our scouts conclude that in time they could be a problem, but for now they pose little threat to our operations."
	OUT_nf_events.47.a:0 "How do they keep popping up?"
  	OUT_nf_events.48.title:0 "Ronto Expedition Returns"
   	OUT_nf_events.48.desc:0 "Worrying news has come with our Ronto expedition, and nwo we know whys Lyons' expedition was so tight-lipped. While the city seems to be similar to other wasteland ruins, there are clear traces of recent Enclave activity. The locals were pretty quiet about the situation but what little we could discern was that they fought off an enclave attack on their own with the help of an army of robots. If these wastelanders were able to fight off a group as advanced as The Enclave, they could be a problem down the line."
	OUT_nf_events.48.a:0 "A waster is still a waster"
	OUT_nf_events.49.title:0 "Outcast Outcasts"
 	OUT_nf_events.49.desc:0 "The Brotherhood Outcasts tended to avoid our lands once they realilized there weren't any toaster factories around. So when a large number of them were seen on our horrizon, the militias were surprised but ready. They came without violence, and wished to speak with our leaders about something they discovered in the Red Racer factory. Something ancient, something that drives them to the swamps of Point Lookout."
  	OUT_nf_events.49.a:0 "Bring them to Blackhall"
   	OUT_nf_events.49.b:0 "This sounds un-American. Fight them!"
	OUT_nf_events.50.title:0 "Something's.... Different"
 	OUT_nf_events.50.desc:0 "Shortly after we sent the requested resources to our researchers at the Red Racer factory, Specialist Olin sent a request for Protector Casdin to visit the facilitiy. Since he returned there has been something different about him. He has been giving unusual orders, often stops mid-conversation to stare off into space, and at least 3 Defenders have found him standing in the middle of Independance's hallways in the dead of night. \n\n His latest order has been the strangest of all. He is directing us to send dozens of Defenders and Specialists to Point Lookout, a place that has minimal technological value at best."
  	OUT_nf_events.50.a:0 "He must know something we don't. Get packing"
	OUT_nf_events.51.title:0 "Some Likeminded Fellows"
 	OUT_nf_events.51.desc:0 "Everyone in Andale knew about the little tiff between members of The Brotherhood of Steel. They were never of much concern for the greatest town in America, but when a number of The Outcasts were coming towards Andale, some of us were concerned. However, it seems our neighbors were coming by for a friendly chat. Their leaders had interest in the same things as Blackhall and have expressed a desire to work together with him."
  	OUT_nf_events.51.a:0 "Welcome to a new brotherhood"
   	OUT_nf_events.52.title:0 "SwampFriends?"
 	OUT_nf_events.52.desc:0 "The Swampfolk of Point Lookout are known far and wide to be hostile to outsiders. They kill, and are rumored to eat, anyone from outside Point Lookout that they come across. It's one of a number of reasons why Point Lookout is largely avoided. Casdin's expedition team was on edge due to some unrelated incidents the past few nights, and they were ready for a firefight but the swampfolk did not engage. Infact, they came up to our expedition and offered them some food and a bottle of moonshine. The team quickly discerned the positive reception was due to the strange symbols Casdin had been scrawling on Defenders' armored suits in the night. It would seem the symbol had some kind of significance to the swampfolk and indicated to them that we were friends."
  	OUT_nf_events.52.a:0 "Where did he learn that symbol?"
   	OUT_nf_events.53.title:0 "Returning From Point Lookout"
 	OUT_nf_events.53.desc:0 "Casdin's expedition returned from Point Lookout with a huge haul of something. It was not what we had expected, but rather crates upon crates of strange idols, weird dolls, and a single large obelisk of undiscernable stone. None of those who returned would speak about they had found in the swamp. Following their return, Casdin entered his room with orders that he not be disturbed except by Specialist Olin. Over the next few days, the specialist would bring various defenders, specialists, and even a couple protectors to Casdin's room. Each one would leave in about an hour or so, insisting they were ordered to secrecy about what was discussed. By the time Casdin emerged 6 days later, over half of Fort Indpendence had visited the protector. Those who hadn't noted that their brothers and sisters were behaving differently. None of them seemed surprised when Casdin announced that Olin was being promoted to head specialist, with her orders being the same as his."
  	OUT_nf_events.53.a:0 "What the hell happened in that swamp?"
   	OUT_nf_events.54.title:0 "A Shift In Priorities"
	OUT_nf_events.54.desc:0 "For weeks, Protector Casdin had everyone at Fort Indpendence gathering intel, stockpiling supplies, or readying battle plans. Everything chaned after Specialist Olin and her team from the Red Racer factory arrived to report. Since then Protector Casdin has done a complete 180. He is now ordering us to prepare for an expedition to Point Lookout."
  	OUT_nf_events.54.a:0 "Whatever they found, it must be huge"
   	OUT_nf_events.55.title:0 "The Midnight Ritual"
 	OUT_nf_events.55.desc:0 "Across our outposts, rituals were conducted to match the rites Olin was performing with her closest followers at The Dunwich Obelisk. Hundreds of voices chanted into the sky under the watching moon. \n \n Ug-Qualtoth knows the gate. \n \n Ug-Qualtoth is the gate. \n \nUg-Qualtoth is the key and guardian of the gate! \n \n Next came the sacrifices, and the ever more complicated chants. Hours of blood-letting, slaughtering captives, and incomprehensible chants carried on into the night. Just before dawn the changes began. Those chanting felt their bones twist, their flesh peel, and their organs ache as they were changed. The light of the sun seemed dimmer as it shone down upon Fort Independance and its people. "
  	OUT_nf_events.55.a:0 "§0The pact is sealed."
   	OUT_nf_events.56.title:0 "Contact Lost"
	OUT_nf_events.56.desc:0 "The team we sent out to search for a Pipboy has not returned. They are well past their designated check-in date. We can only assume they were lost."
 	OUT_nf_events.56.a:0 "Such is life in The Capital Wasteland"
  	OUT_nf_events.57.title:0 "Search Party Attacked"
   	OUT_nf_events.57.desc:0 "While searching for a working Pipboy, our search party was attacked. They engaged their attackers and fought them off before making their way back to base. Unfortunately they took losses and returned empty-handed."
	OUT_nf_events.57.a:0 "A common occurance in DC"
 	OUT_nf_events.58.title:0 "Search Party Found Nothing"
  	OUT_nf_events.58.desc:0 "Our search party investigated 3 locations suspected to have a Pipboy and found nothing."
   	OUT_nf_events.58.a:0 "Good thing we have many other leads"
	OUT_nf_events.59.title:0 "Pipboy Found!"
	OUT_nf_events.59.desc:0 "Our search party sent to find a Pipboy finally returned with one. Strangely, they are very tight-lipped about just which lead they followed up on or what they had to do to get it."
 	OUT_nf_events.59.a:0 "That's odd, but we have more important things to do!"

