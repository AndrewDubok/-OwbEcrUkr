    ###########
    ###Ideas###
    ###########
	OUT_ghoul_fighter_idea:0 "Ghoul Studies"
 	OUT_ghoul_fighter_idea_desc:0 "The research data contained in the Red Racer factory has taught us a few things we didn't know about ferals. Should we ever have to face a massed army of them for some reason, we'll have a few tricks up our sleeve."
  	OUT_materials_printer_idea:0 "Reprogrammed Printer"
	OUT_materials_printer_idea_desc:0 "The prototype machine Slocums Joe was using to make coffee is capable of producing other small items as well. Our scribes are working to reprogram it to produce spare parts that are in limited supply."
 	OUT_welcomed_scribes_idea:0 "Lyons Scribes"
  	OUT_welcomed_scribes_idea_desc:0 "The scribes of Lyons' chapter have been allowed into our ranks. They butt heads with our specialists from time to time, but otherwise things go smoothly."
   	OUT_keeping_purity_idea:0 "Project Purity Trading Post"
	OUT_keeping_purity_idea_desc:0 "The one assignment all specailists and defenders dread, working at Project Purity. It isn't a weapons lab or anything special, but selling the water helps us secure material critical to our mission."
 	OUT_certainty_of_steel_idea:0 "Certainty of Steel"
  	OUT_certainty_of_steel_idea_desc:0 "We do not have the numbers to field a large number of Defenders. Instead, we will deploy an army of reprogrammed machines to safeguard our operations."
	OUT_mighty_machines_idea:0 "Certainty of Steel"
  	OUT_mighty_machines_idea_desc:0 "We do not have the numbers to field a large number of Defenders. Instead, we will deploy an army of reprogrammed machines to safeguard our operations."  	
	OUT_many_machines_idea:0 "Certainty of Steel"
  	OUT_many_machines_idea_desc:0 "We do not have the numbers to field a large number of Defenders. Instead, we will deploy an army of reprogrammed machines to safeguard our operations." 
   	OUT_mixed_approach_idea:0 "Robotic Support"
	OUT_mixed_approach_idea_desc:0 "Reprogrammed robots suppliment our numbers and accompany our Defenders in the field."
   	OUT_mixed_tough_idea:0 "Robotic Support"
	OUT_mixed_tough_idea_desc:0 "Reprogrammed robots suppliment our numbers and accompany our Defenders in the field."
    OUT_mixed_deadly_idea:0 "Robotic Support"
	OUT_mixed_deadly_idea_desc:0 "Reprogrammed robots suppliment our numbers and accompany our Defenders in the field."
 	OUT_strong_troops_idea:0 "Stalwart Defenders"
  	OUT_strong_troops_idea_desc:0 "What we lack in numbers we make up for with the best training and equipment around."
 	OUT_strong_armor_idea:0 "Stalwart Defenders"
  	OUT_strong_armor_idea_desc:0 "What we lack in numbers we make up for with the best training and equipment around."
 	OUT_mixed_armor_idea:0 "Stalwart Defenders"
  	OUT_mixed_armor_idea_desc:0 "What we lack in numbers we make up for with the best training and equipment around."
   	OUT_lyons_preparation_idea:0 "Power Armor Combat Drills"
	OUT_lyons_preparation_idea_desc:0 "Our Defenders have been preparing for combat with power-armored soldiers."
 	OUT_scribe_cooperation_idea:0 "Scribe Cooperation"
  	OUT_scribe_cooperation_idea_desc:0 "The scribes out of The Citadel are sharing notes with our Specialists."
   	OUT_synnergy_idea:0 "Ghoul Synergy"
	OUT_synnergy_idea_desc:0 "A horde of feral ghouls are a hard to fight. A horde of feral ghouls with power-armored soldiers supporting them a nightmare."
 	OUT_unknowable_idea:0 "Unknowable Insights"
  	OUT_unknowable_idea_desc:0 "Our studies of the hidden truths of the universe have aided us in our studies of more mundane things like crop rotation."
   	OUT_accolytes_idea:0 "The Accolytes"
	OUT_accolytes_idea_desc:0 "Wastelanders who seek the knowledge we posess can prove their worth by fighting and dying to advance our goals."
 	OUT_blackhall_leadership_idea:0 "Blackhall's Leadership"
  	OUT_blackhall_leadership_idea_desc:0 "Blackhall is showing us the ways of the followers of Ug-Qualtoth"
    
    ######################
    ###National Focuses###
    ######################
    OUT_nf_a001:0 "Packing Up"
    OUT_nf_a001_desc:0 "We knew it was time to leave, but we would not do so emptyhanded."
    OUT_nf_a002:0 "Dusting Off Cobwebs"
    OUT_nf_a002_desc:0 "Fort Independance is no Citadel, but in time maybe it can be."
    OUT_nf_a003:0 "Shifting Resources"
    OUT_nf_a003_desc:0 "Lyons was not too much of a fool to see the worth of Fort Independance. That made things easier for us."
    OUT_nf_a004:0 "Elder In All But Name"
    OUT_nf_a004_desc:0 "Though Lyons is a traitor, Casdin can't just declare himself elder."
    OUT_nf_a005:0 "The Original Directive"
    OUT_nf_a005_desc:0 "Our mission was always to secure important tech, not babysit wasteland trash. Now we can do what we came here to do."
    OUT_nf_a006:0 "Sifting Through The Duds"
    OUT_nf_a006_desc:0 "A lot of weapons have rusted beyond their use in the last 200 years, but a working part or two can be pulled out of most junk rifles."
    OUT_nf_a007:0 "Out of This World"
    OUT_nf_a007_desc:0 "A wastelander in a vault jumpsuit has been selling us tech for some time. Recently they came by with something so strange it's practically alien."
    OUT_nf_a008:0 "Clear Bailey's Crossroads"
    OUT_nf_a008_desc:0 "Our initial searches around Bailey's Crossroads points to something vaulable being hidden in the ruins. We just need to clear the area."
    OUT_nf_a009:0 "Accept Outsider Help"
    OUT_nf_a009_desc:0 "We can not get into the lower levels without completing the simulation. For that, we need a Pipboy and a willing volunteer. Surely we could make it worth their while."
    OUT_nf_a010:0 "Find Our Own Pipboys"
    OUT_nf_a010_desc:0 "Why would we rely on waster trash when we can find our own PipBoys?"
    OUT_nf_a011:0 "Operation Anchorage"
    OUT_nf_a011_desc:0 "With the simulation completed, the lockdown is lifting. Now lets see what we got."
    OUT_nf_a012:0 "Going The Distance"
    OUT_nf_a012_desc:0 "The Capital Wasteland was to be one stop, not the end of our mission. It is time we get back out there and see what else is waiting to be unearthed."
    OUT_nf_a013:0 "The Keller Tapes"
    OUT_nf_a013_desc:0 "Even we can't hack into this dammed bunker. But at least we found clue for the combination."
    OUT_nf_a014:0 "The Real Prize"
    OUT_nf_a014_desc:0 "§RWhy the hell would you need to shoot 8 of these things at once?§!"
    OUT_nf_a015:0 "Certainty of Steel"
    OUT_nf_a015_desc:0 "We are not getting any more backup. We need to use alternatives wherever we can"
    OUT_nf_a016:0 "Mighty Machines"
    OUT_nf_a016_desc:0 "A slapped-together rustbucket isn't going to stand up to sustained fire. Our war machines need to be the best of the best."
    OUT_nf_a017:0 "Better, Faster, Stronger"
    OUT_nf_a017_desc:0 "Only by having the best machines will we maintain our superiority."
    OUT_nf_a018:0 "Many Machines"
    OUT_nf_a018_desc:0 "A protectron isn't tanking a .50cal no matter how much steel we bolt to it. Focus on putting more of the bots between us and the enemy."
    OUT_nf_a019:0 "Streamline Production"
    OUT_nf_a019_desc:0 "Forming a bot assembly line lets us pump out more machines than assigning per Defender. Why didn't we think of this before?"
    OUT_nf_a020:0 "Fresh Off The Line"
    OUT_nf_a020_desc:0 "The latest batch of warbots is ready to take the field."
    OUT_nf_a021:0 "Supplementary Approach"
    OUT_nf_a021_desc:0 "Robots are good for soaking up enemy fire, but they'll never replace a Defender in a t45."
    OUT_nf_a022:0 "Toughen Up"
    OUT_nf_a022_desc:0 "The armor on our suits and our bots needs to be the best, because we sure aren't making much more."
    OUT_nf_a023:0 "Harder And Faster"
    OUT_nf_a023_desc:0 "The armor and bots of 200 years ago are good, but they could be better."
    OUT_nf_a024:0 "Pack A Punch"
    OUT_nf_a024_desc:0 "Our weapons need to be the eadliest in the wasteland. That is how we keep the trash out."
    OUT_nf_a025:0 "Beep Beep, Pew Pew"
    OUT_nf_a025_desc:0 "It's simple. We have big laser guns, and deadly robots. So, you get out of our way."
    OUT_nf_a026:0 "On The March"
    OUT_nf_a026_desc:0 "The Defenders, with their robot support, are ready to head back into the wasteland."
    OUT_nf_a027:0 "Strength Of Conviction"
    OUT_nf_a027_desc:0 "We do not need buckets of bolts to suppliment our numbers. Our strength is in our training and resolve."
    OUT_nf_a028:0 "Defenders In Shining Armor"
    OUT_nf_a028_desc:0 "Every Defender in the field will be issued a suit of power armor. Unfortunately, that means more people need to stay back at the fort and maintain these suits."
    OUT_nf_a029:0 "Laser Focused"
    OUT_nf_a029_desc:0 "The Defenders sitting around at the fort have some ideas for improving our gear."
    OUT_nf_a030:0 "Not Every Armor Shines"
    OUT_nf_a030_desc:0 "We do not have enough power armor to go around. Some junior Defenders will need to make do with combat armor."
    OUT_nf_a031:0 "Balancing Priorities"
    OUT_nf_a031_desc:0 "Our focus is stretched a bit across various types of equipment, but that doesn't stop us from improving it."
    OUT_nf_a032:0 "Combat Ready"
    OUT_nf_a032_desc:0 "The reorganized Defenders are ready to hit the field."
    OUT_nf_a033:0 "Cleaning Up"
    OUT_nf_a033_desc:0 "A lot of rubble and junk has collected in the fort over the years, we should toss it out."
    OUT_nf_a034:0 "Manning Guardposts"
    OUT_nf_a034_desc:0 "Scavengers and raiders keep poking around our fort. Keep an eye out."
    OUT_nf_a035:0 "Sort Through The Junk"
    OUT_nf_a035_desc:0 "These busted old machines still have a few parts that shine beneath all the rust."
    OUT_nf_a036:0 "Clear Labspace"
    OUT_nf_a036_desc:0 "Though it's a little tight, we have enough space for a few labs."
    OUT_nf_a037:0 "Drag Out The AAA"
    OUT_nf_a037_desc:0 "There are some big guns in the basement once meant for shooting down aircraft. We haven't seen anyone flying around since we came out here, but who knows what the future holds? Better haul them out just in case."
    OUT_nf_a038:0 "Just Scratching The Surface"
    OUT_nf_a038_desc:0 "Nearly every important building in DC had deep basements and sublevels. Fort Independance was no exception."
    OUT_nf_a039:0 "Set Up Workshops"
    OUT_nf_a039_desc:0 "The new space we have cleared out is perfect for another arms workshop."
    OUT_nf_a040:0 "Kick The Generators"
    OUT_nf_a040_desc:0 "Way down in the bowels of Fort Independance, there are a few generators that can be fixed with some tape and scrap."
    OUT_nf_a041:0 "Copy Chinese Schematics"
    OUT_nf_a041_desc:0 "While they are not the original schematics, the blueprints sketched up from captured equipment should be sufficient for us to replicate these Chinese machines."
    OUT_nf_a042:0 "Brotherhood Dragoons"
    OUT_nf_a042_desc:0 "Power Armor may be king, but there is value in lighter troops able to sneak out of trouble just as easily as they got into it."
    OUT_nf_a043:0 "Applied Robotics"
    OUT_nf_a043_desc:0 "Chinese design philosophy with regard to robotics is very different from that of pre-war America. There are a few elements we can apply to our own designs."
    OUT_nf_a044:0 "American Leadbelchers"
    OUT_nf_a044_desc:0 "Some things can withstand a bullet or two. Few things can take 100"
    OUT_nf_a045:0 "Here Comes The Boom"
    OUT_nf_a045_desc:0 "For the few things that can take 100 bullets, we have explosives."
    OUT_nf_a046:0 "The American Doctrine"
    OUT_nf_a046_desc:0 "While we are disciplined, we can not forget that war is chaos. We must learn to thrive in it."
	OUT_nf_a047:0 "Reinforced Barricades"
	OUT_nf_a047_desc:0 "A few pieces of scrap metal and concrete slabs can turn a little sandbag embankment into a powerful fighting position."
	OUT_nf_a048:0 "We Will Be Ready"
	OUT_nf_a048_desc:0 "Vertibirds have been spotted in the skies of The Capital Wasteland. We won't allow ourselves to be caught without a counter to this airpower."
	OUT_nf_a049:0 "Supporting Industry"
	OUT_nf_a049_desc:0 "Maintaining weaponry isn't just about cleaning parts and assembling guns. We also need help making the raw components and tools necessary for building the damn things."
	OUT_nf_a050:0 "Manufacture Composites"
	OUT_nf_a050_desc:0 "Advanced equipment require advanced materials. That is why we need to develop our own composites."
	OUT_nf_a051:0 "Manufacture Tech"
	OUT_nf_a051_desc:0 "We can not just rely on stumbling across an intact circuit board. We need to make our own."
	OUT_nf_a052:0 "Repurpose The Simulator"
	OUT_nf_a052_desc:0 "Now that we have completed the Anchorage simulation, we can tinker with its code. We might even be able to create our own battle simulations that won't kill you if you lose."
	OUT_nf_a053:0 "Resetting Breakers"
	OUT_nf_a053_desc:0 "With our generators working we can bring other systems online, but not before understanding where some of these wires go."
	OUT_nf_a054:0 "Recycling Relics"
	OUT_nf_a054_desc:0 "With the right knowledge we can even fix items thought beyond salvage."
	OUT_nf_a055:0 "Production Processes"
	OUT_nf_a055_desc:0 "If you have to replace 99 percent of the parts in a rifle to fix it, you may as well just learn to make a new one yourself."
    OUT_nf_b001:0 "Deal With The Ignorant Locals"
    OUT_nf_b001_desc:0 "A band of scavengers in South DC has become a thorn in our side. We may as well take out the trash before they get more organized."
    OUT_nf_b002:0 "KEEP OUT!"
    OUT_nf_b002_desc:0 "What would be the point of letting scavengers back in after we just kicked them out? Make sure they stay gone."
    OUT_nf_b003:0 "Limited Trade"
    OUT_nf_b003_desc:0 "It is not worth our effort to dig through every pile of rubble. Lets let some scavs dig around for us so long as they give us the first look at what they find."
    OUT_nf_b004:0 "LOB Enterprises"
    OUT_nf_b004_desc:0 "Old documents point to this place being a firearms development company. Surely there's something useful in their archives."
    OUT_nf_b005:0 "Red Racer Factory"
    OUT_nf_b005_desc:0 "If digging into old world ruins has taught us anything, it's that a simple unimposing toy company could be anything but if you dig enough."
    OUT_nf_b006:0 "Joe's Secret Blend"
    OUT_nf_b006_desc:0 "Now we know where Joe got all that damn coffee."
    OUT_nf_b007:0 "What's Going On?"
    OUT_nf_b007_desc:0 "We thought The Enclave got wiped out a few years before we came out East. \n\n We were wrong."
    OUT_nf_b008:0 "§OEnough Is Enough§!"
    OUT_nf_b008_desc:0 "The Enclave tech flooding The Capital Wasteland is wasted in the hands of Lyons' band of bleading hearts. What are they going to do with it? Pump water faster?"
    OUT_nf_b009:0 "PA Combat Drills"
    OUT_nf_b009_desc:0 "Lyons' traitors have recent experience fighting enemies in power armor. We do not. If we don't prepare, they could put up a hell of a fight!"
    OUT_nf_b010:0 "Punch On Through"
    OUT_nf_b010_desc:0 "If we are to take The Citadel, we will need weapons with a little more punch than a laser rifle."
    OUT_nf_b011:0 "Lose The Paintjob"
    OUT_nf_b011_desc:0 "Those traitors in The Citadel have taken in just about anyone who can swing a stick. Between the chaos of The Enclave War and their purifier pipe dream, a few properly dressed knights could get in and out without raising any alarms."
    OUT_nf_b012:0 "Chaos & Confusion"
    OUT_nf_b012_desc:0 "We have made enough supply runs into The Citadel that Casdin is pretty sure we could throw a few wrenches into Lyons' plans with a well placed Defender or two."
    OUT_nf_b013:0 "Operation Defang"
    OUT_nf_b013_desc:0 "Any more preparation and Lyons may catch on. Now is the time to strike."
    OUT_nf_b014:0 "Remain In Independance"
    OUT_nf_b014_desc:0 "The Citadel got pretty busted up in the fighting. At this point, we're better off just staying put."
    OUT_nf_b015:0 "Waltz Back In"
    OUT_nf_b015_desc:0 "After having fought to take back The Citadel, why the hell would we not make it our main base?"
    OUT_nf_b016:0 "The Scribes"
    OUT_nf_b016_desc:0 "With Lyons out of the way, we have to decide what we do with the scribes who stayed behind when we left."
    OUT_nf_b017:0 "The Leadership"
    OUT_nf_b017_desc:0 "If anyone deserves our ire, it's the paladins and high ranking scribes that stood with the traitor Lyons."
    OUT_nf_b018:0 "The Knights"
    OUT_nf_b018_desc:0 "Many of these knights are waster trash, but not all. Some of them were once our brothers."
    OUT_nf_b019:0 "§CNot Bad For Softies§!"
    OUT_nf_b019_desc:0 "We would've never guessed Lyons and his army of waster trash could take out the Enclave force that was swarming across The Capital Wasteland, but somehow they did. Maybe there is some method to his madness."
    OUT_nf_b020:0 "Live And Let Live?"
    OUT_nf_b020_desc:0 "The traitor has passed away, and his chapter has proven themselves deserving of some respect. Maybe we should end our fighting."
    OUT_nf_b021:0 "Request Copies"
    OUT_nf_b021_desc:0 "Now that we are not fighting anymore, can we have a look at those Enclave schematics?"
    OUT_nf_b022:0 "The Fairfax Exchange"
    OUT_nf_b022_desc:0 "The other Brotherhood has interests in the Fairfax ruins, and we would like to look around Adams Air Force Base. Lets make a deal."
    OUT_nf_b023:0 "Arms-Length Brotherhood"
    OUT_nf_b023_desc:0 "The new elder has made an interesting proposition. We would work together in areas of mutual interest, and fight any serious threats side by side, but otherwise our chapters would stick to our own goals. They have even offered to re-add the names of our members to the scrolls."
    OUT_nf_b024:0 "Spare A Glass?"
    OUT_nf_b024_desc:0 "If they are just giving water away, why can't we get some too?"
    OUT_nf_b025:0 "Swap Warstories"
    OUT_nf_b025_desc:0 "Exchanging after-action reports could teach both our chapters a thing or two."
    OUT_nf_b026:0 "The Lyoness' Roar"
    OUT_nf_b026_desc:0 "The new Elder is coming to Fort Independance for a meeting with Casdin. From how she sounded on the radio, it won't be a pleasant meeting..."
    OUT_nf_b027:0 "Bide Our Time"
    OUT_nf_b027_desc:0 "It is only a matter of time before Lost Hills makes contact or the young Maxson proves himself ready to ascend to his birthright. Until then we will play along."
    OUT_nf_b028:0 "One Step Too Far"
    OUT_nf_b028_desc:0 "We didn't say anything about wasting resources on giving away water, trading valuable tech to wastelanders, or even some of those policy changes. But writing a whole new codex? We can not let that stand."
    OUT_nf_b029:0 "Too Spineless To Lead"
    OUT_nf_b029_desc:0 "Sarah Lyons died and they chose.... Scribe Bowditch? Not even Star Paladin Cross? They put that spineless coward in charge? We have let things go long enough!"
    OUT_nf_b030:0 "Follow-Up Sweeps"
    OUT_nf_b030_desc:0 "Their expeditions go somewhere, kicks a few stones, and maybe come back with a box of technical documents. Not us, we're more thorough than that."
    OUT_nf_b031:0 "Scribe Cooperation"
    OUT_nf_b031_desc:0 "It couldn't hurt for our scribes to share a few insights with each other."
    OUT_nf_b032:0 "§RThe Citadel Has Fallen§!"
    OUT_nf_b032_desc:0 "When The Enclave started flying across The Capital Wasteland, we knew Lyons and his waster trash wouldn't be able to do anything about them."
    OUT_nf_b033:0 "Open Our Doors"
    OUT_nf_b033_desc:0 "Some of our former brothers who stayed behind at The Citadel are now loitering around Fort Independance asking to join us. We can't afford to send them away, even though they deserve it."
    OUT_nf_b034:0 "Paladins To Protectors"
    OUT_nf_b034_desc:0 "A few of our brothers who stayed behind are competent fighters and leaders. They have earned the title of Protector."
    OUT_nf_b035:0 "Get Walking"
    OUT_nf_b035_desc:0 "Your lot diverted our mission, called us the traitors, and now you ask for our help? Now that's a funny joke. Hand over your gear and get walking."
    OUT_nf_b036:0 "We Are Built Different"
    OUT_nf_b036_desc:0 "The Enclave may have beaten Lyons' traitors, but we are not them. We are the best of the best."
    OUT_nf_b037:0 "KICK THEM OUT!"
    OUT_nf_b037_desc:0 "The Enclave claim The Citadel is theirs, lets show them how wrong they are."
    OUT_nf_b038:0 "You Can't Go Home Again"
    OUT_nf_b038_desc:0 "Much of The Citadel was damaged in the fighting, but there are still a few diamonds in the rubble."
    OUT_nf_b039:0 "Asset Or Liability?"
    OUT_nf_b039_desc:0 "The Enclave saw value in Project Purity just like Lyons did. Maybe it is worth hanging on to."
    OUT_nf_b040:0 "Excavate Raven Rock"
    OUT_nf_b040_desc:0 "Raven Rock was destroyed in the fighting and it is unlikely any valuable equipment survived. We still need to take a look."
    OUT_nf_b041:0 "Sort Through The Loot"
    OUT_nf_b041_desc:0 "You nearly have to blow a suit of APA to pieces in order to kill the person inside it, but if you get 10 to 20 dead enclave soldiers together you might be able to piece together a working suit of armor."
    OUT_nf_b042:0 "Secure Adams AFB"
    OUT_nf_b042_desc:0 "We shot down nearly every vertibird trying to leave that base, but they must have had more than just the birds sitting around."
    OUT_nf_b043:0 "Special Equipment"
    OUT_nf_b043_desc:0 "With parts salvaged from Adams Air Force Base, we may have the means of re-establishing contact with Lost Hills. We just need a little time to piece it all together."
    OUT_nf_b044:0 "Calling Home"
    OUT_nf_b044_desc:0 "The time has come. Time to reconnect with Lost Hills. The last few years will make for one hell of a report."
	OUT_nf_c001:0 "§0Powers Beyond Understanding"
 	OUT_nf_c001_desc:0 "Cyclopean bridges—things built by some elder race extinct and forgotten before the things came to Yuggoth from the ultimate voids—ought to be enough to make any man a Dante or Poe if he can keep sane long enough to tell what he has seen."
	OUT_nf_c002:0 "Blackhall's Bargain"
 	OUT_nf_c002_desc:0 "The inhabitants of Point Lookout follow a leader that Casdin insists he has seen before, in his dreams."
	OUT_nf_c003:0 "Swamp Stories"
 	OUT_nf_c003_desc:0 "The followers of Blackhall have a few things about ghouls they can teach us."
	OUT_nf_c004:0 "Seeking Secrets"
 	OUT_nf_c004_desc:0 "To continue our research, we need to travel to Point Lookout. The local waster trash won't stand in our way."
	OUT_nf_c005:0 "Unlikely Kinship"
 	OUT_nf_c005_desc:0 "The crazies in Point Lookout are known for attacking anyone that gets too close. But for some reason they're welcoming us?"
	OUT_nf_c006:0 "Brothers of the deep"
 	OUT_nf_c006_desc:0 "After the first few crab-bakes we realized the mirelurks weren't fighting back."
	OUT_nf_c007:0 "Bad Moon Rising"
 	OUT_nf_c007_desc:0 "Don't go around tonight. \n\n Well, it's bound to take your life. \n\nThere's a bad moon on the rise."
	OUT_nf_c008:0 "Our Rightful Place"
 	OUT_nf_c008_desc:0 "Blackhall is a decrepit old fool, why would we continue to follow him?"
	OUT_nf_c009:0 "Accept Blackhall's Place"
 	OUT_nf_c009_desc:0 "Blackhall is no Lyons. He knows what must be done, and we would be wise to stick to the mission this time."
	OUT_nf_c010:0 "The Accolytes"
 	OUT_nf_c010_desc:0 "There are many cultists in the lands around Andale that now swear their fealty to us. Attempts to chase them off just lead to them coming back. We may as well start pointing them at problems we want removed."
	OUT_nf_c011:0 "Secure Dunwich"
 	OUT_nf_c011_desc:0 "The Dunwich Building is an unassuming office in the middle of nowhere that has been the end for many wasteland explorers. \n\n But those wastelanders didn't know what we do."
	OUT_nf_c012:0 "Grim Harvest"
 	OUT_nf_c012_desc:0 "After 20 years we finally found an acceptable use for wastelanders."
	OUT_nf_c013:0 "Knowing The Unknowable"
 	OUT_nf_c013_desc:0 "We have learned a lot in these recent months. Insights that reshape our understanding of almost everything. These truths will aid us in our research."
	OUT_nf_c014:0 "The Lost Brothers"
 	OUT_nf_c014_desc:0 "Our old brothers in The Citadel will likely stand in our way if we don't do something first."
	OUT_nf_c015:0 "The Citadel of Ug-Qualtoth"
 	OUT_nf_c015_desc:0 "Our home is ours once again. Our Brothers at our side. Those that refuse to see will be made to."
	OUT_nf_c016:0 "The Ritual"
 	OUT_nf_c016_desc:0 "With the notes and artifacts secured from The Blackhall Estate, we are ready to complete the next step in the plan."
	OUT_nf_c017:0 "Unholy Synergy"
 	OUT_nf_c017_desc:0 "It is quite a sight watching power armored Defenders burst through a defensive barrier to be followed by a torrent of ferals. The chorous of their screams and growls almost become like music."
	OUT_nf_c018:0 "The Caves Call To Us"
 	OUT_nf_c018_desc:0 "In the depths of Vault 87 there are tools that are essential to our work."
	OUT_nf_c019:0 "The Whisper In Darkness"
 	OUT_nf_c019_desc:0 "Deep in the lower levels of The Citadel of Ug-Qualtoth, wonderous experiments are being conducted. Specialists of prodigious surgical, biological, chemical, and mechanical skill combine their expertise."
	###############
	###Provinces###
 	###############
  	OUT_citadel_name:0 "Citadel of Ug-Qualtoth"
