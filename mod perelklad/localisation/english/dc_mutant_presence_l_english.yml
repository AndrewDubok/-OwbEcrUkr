l_english:

##Balance of Power##
    DC_mutant_presence_bop:0 "Capital Wasteland Mutant Presence"
    DC_mutant_presence_apocalyptic:0 "Super Mutant Apocalypse"
    DC_mutant_presence_scarce:0 "Scarce Super Mutant Encounters"
    DC_mutant_presence_common_danger:0 "Frequent Danger"
    DC_mutant_presence_common_danger_desc:0 "Super Mutant sightings and attacks are a common occurance. Well fortified settlements can fend them off, but less prepared settlements suffer greatly."
    DC_mutant_presence_existential_threat:0 "Existential Threat"
    DC_mutant_presence_existential_threat_desc:0 "Super Mutant attacks are so frequent and severe that few settlements can recover before the next assault launches. We have stopped counting the dead and few have hopes of survival through the month."
    DC_mutant_presence_deadly_threat:0 "Deadly Threat"
    DC_mutant_presence_deadly_threat_desc:0 "Super Mutant attacks are frequent and devastating. Many settlements are running low on munitions and if things keep progressing we could see some of them wiped off the map."
    DC_mutant_presence_serious_threat:0 "Serious Threat"
    DC_mutant_presence_serious_threat_desc:0 "Super Mutants attack our settlements with worrying frequency. The assaults are eventually driven off, but not without a handfull of casualties and captives hauled to god knows where."
    DC_mutant_presence_infrequent_threat:0 "Infrequent Threat"
    DC_mutant_presence_infrequent_threat_desc:0 "Small bands of super mutants are seen on occasion, ambushing caravans or attacking settlements. Most fortified settlements are able to drive them off with limited losses, but smaller settlements take heavier losses."
    DC_mutant_presence_occasional_attack:0 "Occasional Attacks"
    DC_mutant_presence_occasional_attack_desc:0 "Groups of super mutants are a seen less and less, but they are still a present threat. Settlements need to remain on alert and travelers should remain well armed."
    DC_mutant_presence_rare_sight:0 "Rare Sight"
    DC_mutant_presence_rare_sight_desc:0 "Super Mutants are seen so infreuqently that some wonder if there are any left. Still, caravans and travelers do go missing and it is hard to tell if it's the work of Super Mutants or just a pack of mole rats."

##Events##
    dc_mp_events.1.title:0 "Successful Sweep"
    dc_mp_events.1.desc:0 "One of our knight squads in the DC ruins swept through a building along their patrol, wiping out a dozen mutants occupying the ruin."
    dc_mp_events.1.a:0 "Well done"
    dc_mp_events.2.title:0 "Training Exercise Attacked"
    dc_mp_events.2.desc:0 "A squad of initiates led by a knight on a training exercise in the DC ruins were attacked by a group of super mutants. Only the knight and one of the initiates made it back."
    dc_mp_events.2.a:0 "Such a waste"
    dc_mp_events.3.title:0 "Knight Patrol Lost"
    dc_mp_events.3.desc:0 "A squad of knights patrolling the DC ruins didn't report back at the designated time. A subsequent patrol sent to retrieve them found only a couple bodies. The patrol's report points to super mutants being the cause."
    dc_mp_events.3.a:0 "Add their names to the scrolls"
    dc_mp_events.4.title:0 "Outpost Attacked"
    dc_mp_events.4.desc:0 "One of our outposts in the DC ruins was attacked by super mutants but the knights were able to fight them off. They are requesting permission to follow after the retreating mutants"
    dc_mp_events.4.a:0 "Approved, go after them!"
    dc_mp_events.4.b:0 "Denied, remain at the outpost"
    dc_mp_events.5.title:0 "EMPTY EVENT 5"
    dc_mp_events.5.desc:0 "ONE DAY THIS WILL BE AN EVENT AGAIN"
    dc_mp_events.5.a:0 "Ok"
    dc_mp_events.6.title:0 "EMPTY EVENT 6"
    dc_mp_events.6.desc:0 "ONE DAY THIS WILL BE AN EVENT AGAIN"
    dc_mp_events.6.a:0 "Ok"
    dc_mp_events.7.title:0 "Super Mutant Home Destroyed!"
    dc_mp_events.7.desc:0 "It was a terrible fight but our men have emerged from Vault 87 triumphant. The Super Mutants in the old bunker were killed and their tools for making more of their kind destroyed. The people of the Capital Wasteland can breathe a collective sigh of relief. While the Super Mutant scourge is not gone just yet, they will never again be the threat they once were."
    dc_mp_events.7.a:0 "We won a vital battle today"
    dc_mp_events.8.title:0 "Super Mutant Skirmish"
    dc_mp_events.8.desc:0 "A small squad of Super Mutants attacked one of our settlements and made off with a few captives. The attack left a handfull of settlers and defenders dead, but it was only relatively worse than the standard raider attack."
    dc_mp_events.8.a:0 "Console the families of those we lost"
    dc_mp_events.8.b:0 "ITS JUST A SCOUTING PARTY! READY THE DEFENSES!"
    dc_mp_events.8.c:0 "RUN THEM DOWN!"
    dc_mp_events.9.title:0 "Super Mutant Raid"
    dc_mp_events.9.desc:0 "A large group of Super Mutants stormed one of our settlements leaving scores of dead in their wake. The defenders were ultimately able to repel them, but it was at a cost."
    dc_mp_events.9.a:0 "We will not forget the dead"
    dc_mp_events.9.b:0 "We got off lucky"
    dc_mp_events.9.c:0 "A hard battle for sure, but one we can learn from"
    dc_mp_events.9.d:0 "After them!"
    dc_mp_events.10.title:0 "Heavy Super Mutant Assault"
    dc_mp_events.10.desc:0 "A sizable forceof Super Mutants besieged one of our settlements. Hundreds are dead or worse, carried off by the monsters. The settlement is devasated and it was only through the valiant effort of its defenders that it didnt fall to the Super Mutant menace."
    dc_mp_events.10.a:0 "Honor the heroes of the defense"
    dc_mp_events.10.b:0 "We have lost so many..."
    dc_mp_events.10.c:0 "How did they muster such an attack?"
    dc_mp_events.11.title:0 "Horrible Super Mutant Attack"
    dc_mp_events.11.desc:0 "A black cloud on the horrizon is all that remains of one of our settlements. A massive horde of Super Mutants busted clear through their defenses and wiped out the town. Hundreds of bodies litter the smouldering ruins and scores remain unaccounted for, likely carried off to a fate worse than death. Settlements across our lands now fear they may be next."
    dc_mp_events.11.a:0 "Another town has become a graveyard"
    dc_mp_events.11.b:0 "How the hell did this even happen?"
    dc_mp_events.12.title:0 "Super Mutant Threat"
    dc_mp_events.12.desc:0 "Like out west over a hundred years ago, Super Mutants are a major threat in the Capital Wasteland. They rarely ventured out into the mountains around Raven Rock, but as we step out further into the Wastleand we will have to deal with the occasional skirmish."
    dc_mp_events.12.a:0 "Some Muties wont stop us!"
    dc_mp_events.13.title:0 "Picking off stragglers"
    dc_mp_events.13.desc:0 "A team of volunteers was sent out after the retreating Super Mutants from the last attack. They were not able to finish off the force but picking off some of the fleeing mutants made for good practice."
    dc_mp_events.13.a:0 "Less muties is always good news"
    dc_mp_events.14.title:0 "Fleeing mutants wiped out"
    dc_mp_events.14.desc:0 "A team of volunteers was sent out after the retreating Super Mutants from the last attack. Due to the dedication and marksmanship of the soldiers, the entire mutant force was wiped out."
    dc_mp_events.14.a:0 "Commend them on a job well done"
    dc_mp_events.15.title:0 "Heavy Fighting"
    dc_mp_events.15.desc:0 "A team of volunteers was sent out after the reatreating Super Mutants from the last attack. After a day on their trail they found the Super Mutants had regrouped and faced fierce resistance. They were able to drive the mutants off again but chose to return home before their ammo ran out."
    dc_mp_events.15.a:0 "They prevented a second attack. Good work."
    dc_mp_events.16.title:0 "Nothing but dust"
    dc_mp_events.16.desc:0 "A team of volunteers was sent out after the reatreating Super Mutants from the last attack. It seems we were too late following after them as our team was unable to find any signs of the retreating Super Mutants."
    dc_mp_events.16.a:0 "We must have scared them good!"
    dc_mp_events.17.title:0 "Ambushed!"
    dc_mp_events.17.desc:0 "A team of volunteers was sent out after the retreating Super Mutants from the last attack. Only one of them made it back. They told us the Super Mutants were waiting in ambush and quickly cut down the team."
    dc_mp_events.17.a:0 "Dammit!"
    dc_mp_events.18.title:0 "Mutant outpost found"
    dc_mp_events.18.desc:0 "A team of volunteers was sent out after the retreating Super Mutants from the last attack. They sent someone back to tell us they have discovered a Super Mutant outpost nestled in an abandoned building in the wastes. They are hanging back and requesting support to clear the place out."
    dc_mp_events.18.a:0 "Send them the support. Let them wipe out the camp"
    dc_mp_events.18.b:0 "Call them back. It is not worth the risk"
    dc_mp_events.18.c:0 "Send them some explosives, let them bury the mutants in rubble"
    dc_mp_events.19.title:0 "Mutant camp wiped out"
    dc_mp_events.19.desc:0 "Our team reports that they succesfully wiped out the mutants in the outpost they discovered. This should significantly reduce the Super Mutant presence in the area."
    dc_mp_events.19.a:0 "Great work everyone!"
    dc_mp_events.20.title:0 "RETREAT!"
    dc_mp_events.20.desc:0 "Our team found out very quickly that the outpost was larger than they expected. Faced with fierce resistance they retreated and were able to get away with few losses."
    dc_mp_events.20.a:0 "At least they survived"
    dc_mp_events.21.title:0 "No survivors"
    dc_mp_events.21.desc:0 "There has been no word from our team we sent to wipe out that Super Mutant outpost. We can only assume the worst."
    dc_mp_events.21.a:0 "They will be avenged"
    dc_mp_events.22.title:0 "A concrete tomb"
    dc_mp_events.22.desc:0 "Our team reports that they were able to deploy the explosives succesfully. In the early hours of the morning the building came down around the Super Mutant occupants and the stragglers were picked off."
    dc_mp_events.22.a:0 "A job well done"
    dc_mp_events.23.title:0 "Explosives team lost"
    dc_mp_events.23.desc:0 "Only a few members of our team sent to destroy the Super Mutant outpost made it back today. They report that while laying down the explosives around the building the team was spotted and they took heavy losses while fleeing from the Super Mutants."
    dc_mp_events.23.a:0 "Did we just give them a bunch of bombs?"
    dc_mp_events.24.title:0 "Captives Rescued!"
    dc_mp_events.24.desc:0 "Our team has reported back from their job to destroy the Super Mutant outpost they found. They were successful in killing all the Super Mutants inside. In even better news, they found several humans that were captured by the miserable mutants. The captives were all extremely grateful for being rescued and nearly all of them have volunteered to join our military and fight the mutant menace."
    dc_mp_events.24.a:0 "Good thing we didnt blow the place up huh?"
    dc_mp_events.25.title:0 "The Super Mutants are dead?"
    dc_mp_events.25.desc:0 "It is too early to tell but we have been getting word that the home of the Super Mutants was found and destroyed. If true we should expect to soon see their raids come to a complete stop as they are wiped out."
    dc_mp_events.25.a:0 "Big if true"
    dc_mp_events.25.b:0 "Good for them"
    dc_mp_events.26.title:0 "Behemoth Sighted"
    dc_mp_events.26.desc:0 "A Super Mutant Behemoth was spotted wandering the wastes near one of our settlements. Reports describe the creature as standing somewhere around 20ft tall and carrying a massive pipe for a weapon. The people out that way are hoping we do something about it."
    dc_mp_events.26.a:0 "There is nothing we can do"
    dc_mp_events.26.b:0 "If it bleeds, we can kill it"
    dc_mp_events.26.c:0 "We need to be smart about this. Set up an ambush"
    dc_mp_events.26.d:0 "Time to bust out the big guns"
    dc_mp_events.27.title:0 "We just pissed it off"
    dc_mp_events.27.desc:0 "Our attempts to kill the Super Mutant Behemoth seemed to do little more than just piss the thing off. The few men that made it back to safety said the rampaging beast tore through their team and now reports are flooding in of an enraged behemoth tearing through anything in its path"
    dc_mp_events.27.a:0 "Oh... we fucked up"
    dc_mp_events.28.title:0 "We killed it?"
    dc_mp_events.28.desc:0 "Few people thought our plan would work out, but in a surprising bit of good news, we actually killed the Behemoth. While there were some losses, their deaths were not in vain. We did the mutants a serious blow today."
    dc_mp_events.28.a:0 "Congrats all around"
    dc_mp_events.29.title:0 "A disaster"
    dc_mp_events.29.desc:0 "The people we sent out to kill the Super Mutant Behemoth never made it back. The crushed bodies of a few members of the team were discovered in the area they were expected to fight the creature. The rest of the team is missing, likely eaten or worse."
    dc_mp_events.29.a:0 "Those poor men"
    dc_mp_events.30.title:0 "It escaped"
    dc_mp_events.30.desc:0 "The team we sent after the Super Mutant Behemoth came back empty handed. The beast seems to have moved on and hopefully wont be a problem again."
    dc_mp_events.30.a:0 "It was worth a shot"
    dc_mp_events.31.title:0 "Super Mutants Rise"
    dc_mp_events.31.desc:0 "For years The Super Mutant threat to The Capital Wasteland was kept in check by Lyons' Brotherhood of Steel. However, the mutants seem to reproduce just as fast as they are killed. This war of attrition is beginning to turn against The Brotherhood as more and more mutants have been seen in The Capital Wasteland. This could very well be the beginning of a difficult time for everyone in The Capital Wasteland."\
    dc_mp_events.31.a:0 "Dark times ahead"
    dc_mp_events.31.b:0 "Sucks for them"
    dc_mp_events.31.c:0 "STUPID HUMANS TIME TO DIE"
    dc_mp_events.31.d:0 "STUPID HUMANS TIME TO DIE"
    dc_mp_events.32.title:0 "The Green Tide"
    dc_mp_events.32.desc:0 "Some Scouts have reported Hulking figures decending into the Old DC Metros after Dusk, Later some of the scouts have reported an increase of Mutant Presence within the Heart of DC"
    dc_mp_events.32.a:0 "I Wonder What they Are looking for."
    dc_mp_events.33.title:0 "A Call to all Mutants?"
    dc_mp_events.33.desc:0 "Hello Fellow Green Skins i am Shepard calling all Mutants back to Vault 87. We as a species must band together to survive this Murder of our species by the hoomans. We need to work together to fight our fight. look around how many of your brother will you watch be gunned down by them, ripped apart by metal men and Daka. Join me, Shepard and Overlord Rake at Vault 87! HAHA."
    dc_mp_events.33.a:0 "This cant be good"
    dc_mp_events.34.title:0 "The Land of Giants"
    dc_mp_events.34.desc:0 "Our Radios have been blowing up with Super Mutant Reports Like Crazy. Originally the Patrols we had sent out at night had'nt returned. With the Recent Super Mutant aggression we assembled a warband to hunt down the patrol. After days of looking they had almost been pressumed dead. When the Warband camped out in an old Metro for the night they had found the Patrol. Appareantly they had been engaged by a Behemoth and had run so far and for so long they forgot where they were, and camped out in the Metro hoping we would find them. Then we heard it a Roar coming from the Heart of DC. Then more from Outer DC and the surrounding areas. Like a Pack of Wolves the Behemoths Roared at eachother across the Wastes. Of course every patrol in the Area send disturbing reports about hearing 10 20 maybe even 50 Behemoths lurking in the Capital Wasteland"
    dc_mp_events.34.a:0 "Prepare for a Fight"
    dc_mp_events.35.title:0 "The Mutants Organize"
    dc_mp_events.35.desc:0 "The one saving grace in the neverending nightmare that was the super mutant menace was that the mutants were disorganized and scattered. Beyond a few camps and raiding parties we rarely had to worry about a coordinated assault and a good tactician could use the mutants stupidity against them. It looks like that has changed, attacks are becoming less frequent but more organized. Our patrols are also reporting that the mutants are massing and erecting fortifications in the area around the old lamplight caverns. Whatever is going on, it can't be good."
    dc_mp_events.35.a:0 "God help us"
    dc_mp_events.35.b:0 "Now try and hide from this!"
    dc_mp_events.351.title:0 "The Mutants Organize"
    dc_mp_events.351.desc:0 "The one saving grace in the neverending nightmare that was the super mutant menace was that the mutants were disorganized and scattered. Beyond a few camps and raiding parties we rarely had to worry about a coordinated assault and a good tactician could use the mutants stupidity against them. It looks like that has changed, attacks are becoming less frequent but more organized. There are even reports that mutants are erecting fortifications in the area around the old lamplight caverns. Whatever is going on, it can't be good."
    dc_mp_events.351.a:0 "God help us"
    dc_mp_events.351.b:0 "Not our problem"
    dc_mp_events.36.title:0 "The Good Fight Falters"
    dc_mp_events.36.desc:0 "Word is out that many members of Lyons' Brotherhood of Steel have deserted their cause to pursue different goals. This has left the Brotherhood forces fighting super mutants all across DC desperately low on manpower and equipment. As their mutant-killing efforts falter, the mutant presence across The Capital Wasteland is growing at an alarming rate."
    dc_mp_events.36.a:0 "L + Skill Issue"
    dc_mp_events.36.b:0 "We must be ready"
    dc_mp_events.36.c:0 "At least we're safe over here"
    dc_mp_events.37.title:0 "The Weakened Crusade"
    dc_mp_events.37.desc:0 "With many of our brothers abandoning our cause to pursue the flawed ideals from out West, our ability to fight The Super Mutants has diminished. Our patrols are already seeing greater numbers of mutants in the DC ruins and more settlements are reporting attacks."
    dc_mp_events.37.a:0 "We must continue this fight!"
    dc_mp_events.38.title:0 "The Brotherhood Abandons Their Crusade!"
    dc_mp_events.38.desc:0 "News is spreading like wildfire that The Brotherhood of Steel have for unknown reasons, given up their crusade against the super mutant threat. There is already news of sharp increases in super mutant activity. This could very well be the end for the people of The Capital Wasteland."
    dc_mp_events.38.a:0 "Fuck you Lyons!"
    dc_mp_events.38.b:0 "Oh no... anyway..."
    dc_mp_events.39.title:0 "Presumed Dead"
    dc_mp_events.39.desc:0 "The team that went out last month to hunt super mutants never returned from the wasteland. There is no real way of knowing what happened to them. We presume, or rather hope, they died. Better that than captured by the super mutants."
    dc_mp_events.39.a:0 "Those poor souls"
    dc_mp_events.40.title:0 "Found Nothing"
    dc_mp_events.40.desc:0 "Given how you can hardly travel a mile in The Capital Wasteland without seeing an oversized bootprint in the dirt, you would think our team would have encountered a super mutant patrol or camp or something, but they came up empty."
    dc_mp_events.40.a:0 "Maybe they died out?"
    dc_mp_events.41.title:0 "Small Skirmish"
    dc_mp_events.41.desc:0 "Our hunting party encountered a small super mutant patrol during their hunt. They took a few losses, but thanks to their planning and experience fighting super mutants, they were able to beat the hulking horrors."
    dc_mp_events.41.a:0 "The Wasteland is a little safer"
    dc_mp_events.42.title:0 "Spectacular Hunt"
    dc_mp_events.42.desc:0 "The hunting party sent out to kill super mutants were able to track a patrol back to a camp. When the time was right they launched a multi-sided attack on the camp and wiped out the entire mutant horde before they knew what hit them. They were even able to do this with remarkably few casualties"
    dc_mp_events.42.a:0 "Well done"
    dc_mp_events.43.title:0 "No solid leads"
    dc_mp_events.43.desc:0 "The team sent out to search for the super mutant home did not find any promising leads on where it could be. Beyond the occasional pre-war ruin or empty cave there was not anything of note in the area they searched."
    dc_mp_events.43.a:0 "At least we know they aren't there"
    dc_mp_events.44.title:0 "Tough Resistance"
    dc_mp_events.44.desc:0 "The scouting party sent out to find the super mutant home stumbled into an area crawling with the monsters. They were unable to put up a serious fight and had to flee. Not all of them made it back."
    dc_mp_events.44.a:0 "Could we be getting closer?"
    dc_mp_events.45.title:0 "Lost the Trail"
    dc_mp_events.45.desc:0 "A scouting party sent out to search for the super mutant home tracked a mutant patrol for weeks as it moved from camp to camp. However, as the patrol moved up into some hills they lost sight of them. The team decided to turn back rather than play hide-and-seek with a squad of super mutants."
    dc_mp_events.45.a:0 "Smart move"
    dc_mp_events.46.title:0 "Is this it?"
    dc_mp_events.46.desc:0 "A scouting party reported back that after tracking a mutant squad for nearly a month they saw them enter an area of high radiation around and old vault and then walk inside a cave next to the sealed door. They were unable to find a hole in the lethal radiation, but decided to set up camp and keep an eye out to see if the mutants bring their captives in another way. That night they were ambushed by a passing group of the mutants and only one of their team made it back alive to tell us of their discovery."
    dc_mp_events.46.a:0 "They will not have died in vain"
    dc_mp_events.47.title:0 "Super Mutant Activity On the Rise!"
    dc_mp_events.47.desc:0 "The recent conflict between settlements in The Capital Wasteland has led to an increase in super mutant attacks. Despite how dumb these mutants are, they know a weakness when they see one. Patrols are ambushed, underdefended settlements are attacked, and outposts meant to guard against hostile settlements are being hit from behind by mutant raiding parties. If this conflict doesn't come to an end soon, the super mutants could end up being the true winners of this war!"
    dc_mp_events.47.a:0 "We must finish this quickly!"
    dc_mp_events.48.title:0 "Mutants Take Advantage of Capital Wasteland Conflict!"
    dc_mp_events.48.desc:0 "As fighting has broken out between the various settlements of The Capital Wasteland, super mutant activity in the region has seen a sharp rise. As an ever rising number of guards and militia are pushed toward the front of the conflict, settlements behind the lines find themselves the targets of super mutant raids. Many worry that if the conflict does not come to a swift end, the super mutants of The Capital Wasteland could end up overwhelming settlements once considered safe from such threats."
    dc_mp_events.48.a:0 "We should ready our own people!"
    dc_mp_events.49.title:0 "Scribes Report Increased Super Mutant Activity!"
    dc_mp_events.49.desc:0 "The reemergence of The Enclave was already a serious enough problem for us to face. But now, we are getting reports from patrols and settlements across The Capital Wasteland that super mutant attacks are becoming both more frequent and serious. The beasts are undoubtedly attracted to the conflict zones and may well be following the path of Enclave Vertibirds as they travel east towards DC. The scribes warn that if this uptick in activity isn't kept in check, we could see a bigger problem than The Enclave."
    dc_mp_events.49.a:0 "We must bring this fight to an end soon!"
    dc_mp_events.50.title:0 "Mutants Follow In The Enclave's Wake!"
    dc_mp_events.50.desc:0 "The Enclave have been tearing a path across The Capital Wasteland in recent weeks. As if the power armored tyrants weren't a big enough problem, settlements across The Capital Wasteland are being attacked by super mutants more than ever. There are even reports of super mutants wielding gatling lazers and other advanced weaponry presumably grabbed from the battlefields."
    dc_mp_events.50.a:0 "Ready our defenses!"
    
  ##Ideas##  
    dc_mutant_87_destroyed_idea:0 "Vault 87 Destroyed"
    dc_mutant_87_destroyed_idea_desc:0 "The home of the Super Mutants has been destroyed. Their numbers greatly reduced and they cant make any more. They are still out there, but soon they will just be a memory."

##Flags##
    dc_mutants_active_flag:0 "Super Mutants are ravaging The Capital Wasteland"    
    dc_mutants_are_dead_flag:0 "The Capital Wasteland Super Mutants have been stopped!"
    
