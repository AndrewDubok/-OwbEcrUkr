 riv_integration.13.t:0 "Integration complete..?"
 riv_integration.13.d:0 "All the scattered settlements of the wasteland have now made their choice regarding whether or not to join our growing confederation. Whether they chose wisely or not, we no longer need to make the effort to convince them of the right path. Now is the time to look beyond these scattered settlements and forge a truly great nation out of the Capital Wasteland."
 riv_integration.13.a:0 "Our future truly begins now"

 riv_artifact.1.t:0 "The Bill of Rights"
 riv_artifact.1.d:0 "The ruins of the National Archives are filled with dangers and loot, and one of the adventurers we hired to find items of importance managed to stumble on the Bill of Rights while stalking through. It was just lying around, waiting for one of our brave mercenaries to find. Abraham Washington has given the Bill of Rights its own display.\n\nWhen the adventurer was asked why they didn't pick up any other important documents surely lying around the National Archive, they shrugged and said that'd be more work. No arguing with that."
 riv_artifact.1.a:0 "How wonderful!"

 riv_artifact.2.t:0 "The Constitution"
 riv_artifact.2.d:0 "The ruins of the National Archives are filled with dangers and loot, and one of the adventurers we hired to find items of importance managed to stumble on the Constitution while stalking through. It was just lying around, waiting for one of our brave mercenaries to find. Abraham Washington has given the Constitution its own display.\n\nWhen the adventurer was asked why they didn't pick up any other important documents surely lying around the National Archive, they shrugged and said that'd be more work. No arguing with that."
 riv_artifact.2.a:0 "This is cause for celebration"

 riv_artifact.3.t:0 "The Declaration of Independence"
 riv_artifact.3.d:0 "The ruins of the National Archives are filled with dangers and loot, and one of the adventurers we hired to find items of importance managed to stumble on the Declaration of Independence while stalking through. Due to its importance, it was kept in a strongroom in the back and guarded by an army of robots (or so the treasure hunter said). Abraham Washington has given the Declaration of Independence its own display.\n\nWhen the adventurer was asked why they didn't pick up any other important documents surely lying around the National Archive, they shrugged and said that'd be more work. No arguing with that."
 riv_artifact.3.a:0 "We stole independence!"

 riv_artifact.4.t:0 "The Magna Carta"
 riv_artifact.4.d:0 "The ruins of the National Archives are filled with dangers and loot, and one of the adventurers we hired to find items of importance managed to stumble on the Magna Carta while stalking through. It was just lying around, waiting for one of our brave mercenaries to find. Abraham Washington has given the Magna Carta its own display.\n\nWhen the adventurer was asked why they didn't pick up any other important documents surely lying around the National Archive, they shrugged and said that'd be more work. No arguing with that."
 riv_artifact.4.a:0 "At least we got something from the English"

 riv_artifact.5.t:0 "The Monroe Doctrine"
 riv_artifact.5.d:0 "While on a separate job entirely, an adventurer often hired by Rivet City met a trader with plenty of old scrap. Most of it seemed useless, but something caught the adventurer's eye. The Monroe Doctrine was inexplicably among the trader's wares, probably mistaken for a bit of scrap paper (could you imagine?). The adventurer, knowing Abraham Washington's interest, acquired it immediately and now it has pride of place in the Capitol Preservation Society.\n\nThe adventurer also bought some other scrap, but whatever a "junk jet" is can't be anywhere near as interesting."
 riv_artifact.5.a:0 "A lucky find!"

 riv_artifact.6.t:0 "Declaration of War on China"
 riv_artifact.6.d:0 "One of our usual adventurers was fighting super mutants on their way to Necropolis when they noticed that one of the super mutants that they killed was carrying an old sheet of paper. On further inspection it was the US Declaration of War on China! It's quite unbelievable that a super mutant could recognise an important document such as this, but it must've been a fan of US history, just like Abraham Washington. It's going into a display as we speak."
 riv_artifact.6.a:0 "Fighting China never looked so good"

 riv_artifact.7.t:0 "The War on Germany"
 riv_artifact.7.d:0 "The Enclave are an infamous and dangerous group, so when one of our adventurers stumbled upon a small camp of them near the National Archive it could've spelled doom. Fortunately, said Enclave soldiers were asleep and easily dealt with. While rifling through their possessions, the adventurer found a document the group had obviously acquired and hoped to bring back to their base: the US Declaration of War on Germany. It's lucky we got to it before the Enclave brought it back to base. Abraham Washington has a special place set for this."
 riv_artifact.7.a:0 "Celebrate by punching a Nazi!"

 riv_artifact.8.t:0 "The Gettysburg Address"
 riv_artifact.8.d:0 "An adventurer we hired to find precious ancient artifacts met a ghoul all the way from the Commonwealth while searching. The ghoul was reticent about talking about the Commonwealth, but came from somewhere called Goodneighbor. By some stroke of luck, he was carrying the Gettysburg Address, and wanted to sell it (he seemed almost desparate to...). Our adventurer snatched up the lucky find and brought it back to base, and Abraham Washington has already put it in its frame.\n\nInterestingly, the adventurer has become paranoid and convinced that they're being followed. Surely a coincidence."
 riv_artifact.8.a:0 "How'd it get to the Commonwealth?"