 riv_integration.7.t:0 "Megaton breaks away!"
 riv_integration.7.d:0 "After a long period resisting our efforts to influence them, Megaton has finally managed to break free of our influence entirely. They've worked on self-sufficiency in water and refuse to join our prosperous network. If they prefer living in the stone age, then so be it."
 riv_integration.7.a:0 "They don't know what they've lost"

