 riv_integration.1.t:0 "Megaton Integrated"
 riv_integration.1.d:0 "After a long period of building their reliance on us, Megaton has finally caved to our influence and decided to join our burgeoning confederation of settlements. From now on, water will flow freely in Megaton and trade can prosper between our settlements. Life in the Capital Wasteland has never been better!"
 riv_integration.1.a:0 "Welcome to Rivet City!"

