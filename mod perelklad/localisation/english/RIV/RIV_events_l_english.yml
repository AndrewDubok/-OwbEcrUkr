 riv_caravan.4.t:0 "Nothing "Super" About It"
 riv_caravan.4.d:0 "Unfortunately the Capital Wasteland is a dangerous place with raiders, super mutants, ghouls galore. Our caravans need to navigate this nightmare, and it can't always work out well.\n\nOur trading caravan was attacked by super mutants and suffered heavy casualties. The scattered remnants of the caravan have made it back to Rivet City, but they've lost their brahmin and supplies. We'll need to form a new caravan to bounce back from this loss."
 riv_caravan.4.a:0 "A reminder of the dangers of trade"

 riv_caravan.5.t:0 "No News is Bad News"
 riv_caravan.5.d:0 "Unfortunately the Capital Wasteland is a dangerous place with raiders, super mutants, ghouls galore. Our caravans need to navigate this nightmare, and it can't always work out well.\n\nOne of our caravans never arrived at their destination. At all. Not a single survivor has made it to us. We'll probably never know who waylaid the caravan, but losses like these, while uncommon, are still far too frequent. How can we prepare better, if we don't know how we lost?"
 riv_caravan.5.a:0 "No easy road to wealth"

 riv_caravan.6.t:0 "A Narrow Escape"
 riv_caravan.6.d:0 "Unfortunately the Capital Wasteland is a dangerous place with raiders, super mutants, ghouls galore. Our caravans need to navigate this nightmare, and it can't always work out well.\n\nOur trading caravan was attacked by feral ghouls, but fortunately escaped with their lives. They didn't make it to their destination and that means a loss, but in the Capital Wasteland this is one of the best outcomes we can hope for."
 riv_caravan.6.a:0 "It could've been worse"

 riv_caravan.7.t:0 "Rabid Dangers of the Wastes"
 riv_caravan.7.d:0 "Unfortunately the Capital Wasteland is a dangerous place with raiders, super mutants, ghouls galore. Our caravans need to navigate this nightmare, and it can't always work out well.\n\nOur trading caravan was attacked by feral ghouls and suffered heavy casualties. The scattered remnants of the caravan have made it back to Rivet City, but they've lost their brahmin and supplies. We'll need to form a new caravan to bounce back from this loss."
 riv_caravan.7.a:0 "A reminder of the dangers of trade"

 riv_caravan.8.t:0 "A Narrow Escape"
 riv_caravan.8.d:0 "Unfortunately the Capital Wasteland is a dangerous place with raiders, super mutants, ghouls galore. Our caravans need to navigate this nightmare, and it can't always work out well.\n\nDespite these more common and accepted risks, this time it was the mysterious Enclave that attacked our caravans. Despite the powerful and dangerous attackers, they are still human and our traders managed to outfox them... this time. We need to be more careful of this group in the future."
 riv_caravan.8.a:0 "Their actions reveal their intentions..."

 riv_caravan.9.t:0 "Attack From the Shadows"
 riv_caravan.9.d:0 "Unfortunately the Capital Wasteland is a dangerous place with raiders, super mutants, ghouls galore. Our caravans need to navigate this nightmare, and it can't always work out well.\n\nNo amount of training or equipment, however, could prepare our soldiers for an attack by the shadowy Enclave. Their power armoured soldiers demolished the defensive line the caravan set up, and the battle was a slaughter. A few of our soldiers managed to hide or run and have brought news of the caravan's attack, but we can't be sure it won't happen again..."
 riv_caravan.9.a:0 "Why hasn't the Brotherhood stopped this?"

 riv_caravan.10.t:0 "We're Not Raiders... Are We?"
 riv_caravan.10.d:0 "A group of our soldiers sent out on patrol have returned back to base celebrating. Apparently they stumbled onto a group of merchants from Rivet City, some filthy wastelander settlement out there in the Capital Wasteland. A quick ambush relieved the caravan of their riches, and our soldiers have brought them back to base. While we can't officially approve these sorts of raiding missions, they're hardly harmful. Well, not to us."
 riv_caravan.10.a:0 "Requisition these goods immediately"

 riv_caravan.11.t:0 "A Successful Trade Mission"
 riv_caravan.11.d:0 "Our traders who were sent out to make their own way have returned to us, safe and sound. They bring wealth from across the Capital Wasteland, having traded with scavengers, settlers, and other traders they encountered in their travels. Nothing like a successful trade mission to boost morale and bring in the caps."
 riv_caravan.11.a:0 "Another success for Rivet City"

 riv_caravan.12.t:0 "Successful Trade with Megaton"
 riv_caravan.12.d:0 "Our trading caravan has returned, having completed a successful mission to Megaton. Through trade, we enrich both ourselves and those we trade with. Despite the risks, our merchants have come through."
 riv_caravan.12.a:0 "Wonderful news"

