 RIV_outsider_influence_decision_category:0 "Rivet City's Influence"
 RIV_outsider_influence_decision_category_desc:0 "Rivet City has now completed Project Purity, and seeks to unite the rest of DC behind their influence. They do this subtly: bringing gifts of water to the wastes and convincing settlers of their good intentions. Regardless of their actual intentions, it is working, and people in settlements across DC seek greater cooperation and even integration with Rivet City. It is up to us to stop their influence. While cutting off their water may harm our citizens, we must protect our sovereignty.\n\n§OEven then, this may just be the beginning. If Rivet City fails, then war may be on the horizon.§!\n\n\nRivet Citys's influence in §gMegaton§! is: [RIV_megaton_influence]\n\n§YBig Town§! will follow the lead of their larger neighbour, §gMegaton§!.\n\n[RIV_underworld_influence]\n\nRivet City's influence in §GCanterbury Commons§! is: [RIV_canterbury_commons_influence]\n\nRivet City's influence in §8Tenpenny Tower§! is: [RIV_tenpenny_tower_influence]\n\n[RIV_arefu_influence]\n\n[RIV_dave_influence]"


