 RIV_CPS_decision_category:0 "The Capitol Preservation Society"

 riv_bill_of_rights_tt:0 "§YThe United States Bill of Rights§!\n\nThe Bill of Rights is a document containing the first 10 amendments to the United States Constitution, ratified in 1791. It also contains several other articles, however, not all of which were ratified so quickly.\n\nPolitical Power Factor: §G+10%§!\nRights of the Citizen: §G+25%§!"
 riv_constitution_tt:0 "§YThe Constitution of the United States§!\n\nThe Constitution of the United States defined the basic and fundamental laws behind the United States of America, and acted as foundation for its legal and governmental system. It was ratified in 1789 and was amended several times.\n\nSurrender Limit: §G+20%§!\nStability: §G+1%§!\nSupreme Court Arguments: §R+25%§!"
 riv_declaration_of_independence_tt:0 "§YThe United States Declaration of Independence§!\n\nThe United States Declaration of Independence was written to announce the independence of the newly united 13 American colonies from British rule, adopted on the 4th of July 1776 during the American Revolutionary War.\n\nAttack on Core States: §G+2.5%§!\nDefence on Core States: §G+2.5%§!\nBritish Influence: §G-75%§!"
 riv_magna_carta_tt:0 "§YThe Magna Carta§!\n\nThe Magna Carta was a set of limitations on the power of the King of England signed in 1215, mostly to protect the rebel barons of the time. However, it became foundational to the British, then the American, legal systems.\n\nStability: §G+2.5%§!\nPower of the King: §G-50%§!"
 riv_monroe_doctrine_tt:0 "§YThe Monroe Doctrine§!\n\nThe Monroe Doctrine was presented in 1823 by President James Monroe warning the European powers not to interfere in the Americas. This put the Americas under the USA's sphere of influence and affected foreign policy for centuries.\n\nPeople Drift: §G+0.02§!\nTrade Opinion Factor: §Y+5%§!\nEuropean Interference: §G-50%§!"
 riv_war_dec_on_china_tt:0 "§YThe United States Declaration of War Against China§!\n\nThe United States Declaration of War on China was created due to China's invasion of Alaska in 2066, leading to the Sino-American War that ended in the Great War. It was the last notable document passed by the United States Congress before it's end.\n\nWar Support: §G+5%§!\nCommunism on American Soil: §G-90%§!"
 riv_war_dec_on_germany_tt:0 "§YThe United States Declaration of War Against Germany§!\n\nIn 1941, the United States Congress declared war on Nazi Germany with the encouragement of President Franklin D. Roosevelt. This marked the entrance of the United States into the European Theatre of World War Two.\n\nConscription Factor: §G+2%§!\nNazi Germany Lifespan: §G-90%§!"
 riv_gettysburg_address_tt:0 "§YThe Gettysburg Address§!\n\nThe Gettysburg Address was a speech spoken by Abraham Lincoln in 1863, a few months after the decisive Battle of Gettysburg. The speech was spoken in memory of those who had died in the battle, and the war as a whole.\n\nStability: §G+1%§!\nWar Support: §G+1%§!\nSpeeches stealing from Lincoln: §G+300%§!"

