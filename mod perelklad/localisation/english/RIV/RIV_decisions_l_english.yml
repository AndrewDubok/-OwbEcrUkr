l_english:
 RIV_council_decision_category:0 "Rivet City Council"
 RIV_council_decision_category_desc:0 "\n                                  §YTHE RIVET CITY COUNCIL§! \n\n\n\n\n\n\n\n\n\n   [RIV_council_security_representative_picture]      [RIV_council_civilian_representative_picture]      [RIV_council_science_representative_picture]\n\n\n\n\n\n\n\n\n\n [RIV_council_security_representative_name]      [RIV_council_civilian_representative_name]       [RIV_council_science_representative_name]\n           §OSecurity§!                       §GCivilian§!                        §CScience§!\n\nRivet City is ruled by a Council of three members, each representing the three most important groups of individuals; a §Osecurity representative§!, a §Gcivilian representative§!, and a §Cscience representative§!. These three work together to discuss and decide matters of policy in Rivet City, and have the authority to control taxes, allocate funding, and begin citywide programs. Each member brings their own perspective, and may be replaced through a vote by members of the sector they belong to.[RIV_current_decision]"
 
