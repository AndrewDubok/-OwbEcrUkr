 RIV_trade_caravans_decision_category:0 "Rivet City Trade Caravans"
 RIV_trade_caravans_decision_category_desc:0 "Rivet City is not just any city, it's the greatest city in the Capitol Wasteland. And, like any great city, it is built off the back of extensive trade with the surrounding area. Rivet City produces §Gfresh fruit and vegetables§!, perhaps the only source in the Capitol Wasteland, and this produce is exported to the wider wasteland for a relatively low cost, bringing not just caps but goodwill and friendship. \n\nHowever, these caravans must contend with several dangers; §Ysuper mutants§!, §Yraiders§!, §Yferal ghouls§! and §Yslavers§! to name a few[RIV_Enclave_existence]. With some effort these threats could be removed, or at the very least weakened, and our caravans will be more likely to make it to their destination.\n\nCurrently, [?RIV_despatched_caravans] caravans have been sent out, [?RIV_waiting_caravans] are at home, and we can have a maximum of [?RIV_caravan_maximum] caravans.\n\n§YRaider threat level:§! [RIV_Raider_threat_level]\n§YSuper Mutant threat level:§! [RIV_Super_Mutant_threat_level]\n§YFeral Ghoul threat level:§! [RIV_Feral_threat_level]\n§BEnclave§! §Ythreat level:§! [RIV_Enclave_threat_level][RIV_trade_dependency][RIV_replicated_man_active_desc]"
 
 RIV_the_enclave_is_a_threat:0 ", not to mention the depredations of the vicious Enclave"

 RIV_integrating_settlements_loc:0 "\n\n\n\nNow that we've completed §CProject Purity§!, these trade missions will also pull these settlements further to us. If we can gain enough influence in a settlement, we may be able to integrate them peacefully.\n\n§OIf we should fail to integrate any of these settlements peacefully, we may be forced to take more drastic action.§!\n\n\nOur influence in §gMegaton§! is: [RIV_megaton_influence]\n\n§YBig Town§! will follow the lead of their larger neighbour, §gMegaton§!\n\n[RIV_underworld_influence]\n\nOur influence in §GCanterbury Commons§! is: [RIV_canterbury_commons_influence]\n\nOur influence in §8Tenpenny Tower§! is: [RIV_tenpenny_tower_influence]\n\n§RPoint§! §WLookout§! is, for all intents and purposes, §Runcontrollable§!\n\n[RIV_arefu_influence]\n\n[RIV_dave_influence]\n"

