 RIV_enclave_decision:0 "\n\n\nThe Decision currently on the table for the Council has the potential to be the greatest decision they've had to make in decades: the matter of intervention in the growing conflict between §YThe Brotherhood of Steel§! and §BThe Enclave§!. We cannot know what each nation has planned for us, but we do know that §Bthe Enclave§! have been harrassing our caravans and threatening our citizens. Between the two options, it seems §YThe Brotherhood§! have better intentions towards us, but that doesn't mean we should intervene on their side. Our council remains divided on the issue.\n\n§OSecurity representative§! [RIV_security_representative_view_enclave]\n§GCivilian representative§! [RIV_civilian_representative_view_enclave]\n§CScience representative§! [RIV_science_representative_view_enclave]"

 RIV_refugee_decision:0 "\n\n\nWhile we have decided on a policy of non-intervention in the war between the Brotherhood and the Enclave, the war has not left us untouched. The political turmoil in the area has meant that hudreds if not thousands of refugees are travelling and looking for somewhere safe. Now the Council must decide how to deal with these refugees.\n\n§OSecurity representative§! [RIV_security_representative_view_refugees]\n§GCivilian representative§! [RIV_civilian_representative_view_refugees]\n§CScience representative§! [RIV_science_representative_view_refugees]"

