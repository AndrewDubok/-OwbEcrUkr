 RIV_convince_danvers_easy_decision:0 "Convince §OLana Danvers§!"
 RIV_convince_danvers_easy_decision_desc:0 "Lana Danvers is currently reluctant to support the proposal facing the Council right now, but by simply dialing back conscription efforts we can convince her that our people are safe."
 RIV_convince_danvers_normal_decision:0 "Convince §OLana Danvers§!"
 RIV_convince_danvers_normal_decision_desc:0 "Lana Danvers is currently very reluctant to support the proposal facing the Council right now, but by dialing back conscription efforts a fair bit we can convince her that our people are safe."

 RIV_convince_harkness_easy_decision:0 "Convince §OHarkness§!"
 RIV_convince_harkness_easy_decision_desc:0 "Harkness isn't very enthusiastic about our current proposal, but by promising to take a less aggressive stance in the future we can ensure we have his support."
 RIV_convince_harkness_normal_decision:0 "Convince §OHarkness§!"
 RIV_convince_harkness_normal_decision_desc:0 "Harkness is concerned about our current proposal, but by promising to take a much less aggressive stance in the future we can ensure we have his support."

 RIV_convince_seagrave_easy_decision:0 "Convince §GSeagrave Holmes§!"
 RIV_convince_seagrave_easy_decision_desc:0 "Seagrave is worried about how our proposal will affect Rivet City, but by investing further into maintenance and repair we should be able to show our intentions are good."
 RIV_convince_seagrave_normal_decision:0 "Convince §GSeagrave Holmes§!"
 RIV_convince_seagrave_normal_decision_desc:0 "Seagrave is very worried about how our proposal will affect Rivet City, but by significantly investing further into maintenance and repair we should be able to show our intentions are good."

 RIV_convince_bannon_easy_decision:0 "Convince §GBannon§!"
 RIV_convince_bannon_easy_decision_desc:0 "Bannon claims that the current proposal doesn't sufficiently support his interests. A small bribe (that he's probably angling for anyway) ought to show him the benefits."
 RIV_convince_bannon_normal_decision:0 "Convince §GBannon§!"
 RIV_convince_bannon_normal_decision_desc:0 "Bannon claims that the current proposal works against his interests. A large bribe (that he's probably angling for anyway) ought to show him the benefits."

 RIV_convince_pinkerton_easy_decision:0 "Convince §CHorace Pinkerton§!"
 RIV_convince_pinkerton_easy_decision_desc:0 "Pinkerton is concerned about the effect of our current proposal, but by showing a bit of support for his goals we can show him that we're on his side."
 RIV_convince_pinkerton_normal_decision:0 "Convince §CHorace Pinkerton§!"
 RIV_convince_pinkerton_normal_decision_desc:0 "Pinkerton is rather concerned about the effect of our current proposal, but by showing plenty of support for his goals we can show him that we're on his side."

 RIV_convince_li_easy_decision:0 "Convince §CMadison Li§!"
 RIV_convince_li_easy_decision_desc:0 "Madison Li is uncertain about the direction that our current proposal takes us, but by sending a bit more funding towards her scientific endeavours we can gain her support"
 RIV_convince_li_normal_decision:0 "Convince §CMadison Li§!"
 RIV_convince_li_normal_decision_desc:0 "Madison Li is worried about the direction that our current proposal takes us, but by sending more funding towards her scientific endeavours we can gain her support"

 RIV_convince_lily_easy_decision:0 "Convince §CLillian Granger§!"
 RIV_convince_lily_easy_decision_desc:0 "Lillian is uncertain about our current proposal, by sending her a bit more equipment to carry out her medical studies we can ensure her support."
 RIV_convince_lily_normal_decision:0 "Convince §CLillian Granger§!"
 RIV_convince_lily_normal_decision_desc:0 "Lillian doesn't like our current proposal, but by sending her more equipment to carry out her medical studies we can ensure her support."


