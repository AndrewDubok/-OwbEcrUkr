  state_of_guards_text:0 "Caravan Guards"
  bln_guards_tt:0 "Guards are, unfortunately, a vital and necessary element of our §CWater Distribution Network§!. Pure water is appealing to everyone in the Capital Wasteland, and caravans come under attack frequently. The more guards we send, the more likely they are to reach their location.\n\n§ONote that we may not need lots of guards with good equipment, if it's more appropriate to send a few well armed guards or many poorly armed recruits that may work just fine.§!"
  bln_guards_one_tt:0 "[!guards_button_one_click]"
  bln_guards_two_tt:0 "[!guards_button_two_click]"
  bln_guards_three_tt:0 "[!guards_button_three_click]"
  bln_guards_four_tt:0 "[!guards_button_four_click]"
  bln_guards_three_amount_tt:0 "Each caravan will be guarded by a knight and their squad.\n"
  bln_guards_four_amount_tt:0 "Each caravan will be guarded by a paladin and their squad.\n"
  bln_guards_one_idea:0 "Minimal Caravan Guards"
  bln_guards_two_idea:0 "Some Caravan Guards"
  bln_guards_three_idea:0 "Medium Caravan Guards"
  bln_guards_four_idea:0 "Strong Caravan Guards"
  caravan_manpower:0 "Caravan Manpower"

  state_of_equipment_text:0 "Equipment Level"
  bln_equipment_tt:0 "Like guards, solid equipment is necessary to protect our §CWater Distribution Network§!. The better equipped our caravans are, the more likely they are to succeed in driving off attackers.\n\n§ONote that we may not need lots of guards with good equipment, if it's more appropriate to send a few well armed guards or many poorly armed recruits that may work just fine.§!"
  bln_equipment_one_tt:0 "[!equipment_button_one_click]"
  bln_equipment_two_tt:0 "[!equipment_button_two_click]"
  bln_equipment_three_tt:0 "[!equipment_button_three_click]"
  bln_equipment_four_tt:0 "[!equipment_button_four_click]"
  bln_equipment_one_amount_tt:0 "Each caravan will be equipped with basic weaponry.\n"
  bln_equipment_two_amount_tt:0 "Each caravan will be equipped with basic weaponry, a fireteam weapon, and demolition equipment.\n"
  bln_equipment_three_amount_tt:0 "Each caravan will be equipped with basic weaponry, a fireteam weapon, and demolition equipment. The squad leader will be given a suit of power armour.\n"
  bln_equipment_four_amount_tt:0 "Each member of the caravan will have a suit of power armour, and the squad will be equipped with basic weapons, a fireteam weapon, and demolition equipment.\n"
  bln_equipment_affordability_tt:0 "§OIf we don't have the equipment necessary to resupply a caravan, we will automatically downgrade one level and incur a bureaucracy cost.§!\n"
  bln_equipment_one_idea:0 "Basic Equipment"
  bln_equipment_two_idea:0 "Patrol Equipment"
  bln_equipment_three_idea:0 "Heavy Equipment"
  bln_equipment_four_idea:0 "Armoured Patrol"

  state_of_preparation_text:0 "Caravan Preparations"
  bln_preparation_tt:0 "While Project Purity has reached a point of relative sustainability, requiring few ongoing resources and with those needed provided eagerly by the Brotherhood, the caravan project is much messier. The water created by the Project must be bottled first, before it can ever be delivered, and that is a difficult enough process in itself. Bottling plants and machines are rare in the wasteland.\n\n§YPreparation will influence the number of caravans that get despatched. The more water we bottle, the more we can ship out.§!"
  bln_preparation_one_tt:0 "[!preparation_button_one_click]"
  bln_preparation_two_tt:0 "[!preparation_button_two_click]"
  bln_preparation_three_tt:0 "[!preparation_button_three_click_enabled]\n[!preparation_button_three_click]"
