l_english:
  water_distribution_text:0 "Project Purity was no simple feat, but following through is just as difficult. Scribe Bigsley has been put in charge of this nightmare of a Distribution Network, and has to manage not only the caravans, but the scribes behind those caravans, and the scribes behind those scribes.\n\nBigsley will have to weigh up his options, and get as much support from the rest of the apathetic Brotherhood as he can."

  state_of_bureaucracy_text:0 "Management Status: [bln_management_status]\nTrend: [bln_management_trend]"
  bln_bureaucracy_tt:0 "Our scribes' ability to manage the growing §CWater Distribution Network§! is a vital part of its success. Bigsley was given scribes who are inexperienced, difficult to work with, or dismissed from other duties due to internal politics, and now he needs to make them an effective group.\n\n§YManagement§! will steadily grow unless we've got enough scribes to keep it in check. This will not only result in §Rdecreased§! ability to manage the network, but may force Bigsley into §Ounpleasant deals§! or situations which are difficult to resolve. As things get worse, so will the measures that Bigsley is forced to turn to..."
