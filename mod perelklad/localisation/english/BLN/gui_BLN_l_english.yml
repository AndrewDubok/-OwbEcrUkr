  ###BOP###
  BLN_loyalty_struggle:0 "A Rift in our Brotherhood"
  BLN_loyalist_influence:0 "Adherance to The Codex"
  BLN_wastelander_influence:0 "Support for The Wastelanders"
  BLN_loyalty_category:0 "Loyalty Decisions"
  BLN_balanced_influence:0 "Split Loyalties"
  BLN_balanced_influence_desc:0 "Our chapter is split in their goals. Many in our chapter devote themselves to aiding the plight of the people of The Capital Wasteland. Just as many scoff at the notion and stick to our chapters original goals of securing dangerous technology. This balance cant last forever."
  BLN_very_high_loyalist_influence:0 "Strict Adherance to The Codex"
  BLN_very_high_loyalist_influence_desc:0 "Our chapter follows The Codex almost to the letter. While there are still the occasional grumblings from the hardliners, they have very little to actually be upset about. Though, it seems our choices are not liked much by the wastelanders."
  BLN_high_loyalist_influence:0 "Strong Adherance to The Codex"
  BLN_high_loyalist_influence_desc:0 "The Codex is an important part of every decision we make. Very rarely do we deviate from its wisdom, but when we do it is with good reason. While this wins us no favors with wastelanders, they do recognize that we are reasonable so long as they stay out of our way."
  BLN_moderately_high_loyalist_influence:0 "Firm Adherance to The Codex"
  BLN_moderately_high_loyalist_influence_desc:0 "Our chapter may break from The Codex time to time, but overall the hardliners in our chapter understand that we need to make a few compromises to stay true to our mission. The people of The Capital Wasteland wish we could do more though."
  BLN_very_high_wastelander_influence:0 "Fighting The Good Fight!"
  BLN_very_high_wastelander_influence_desc:0 "The people of The Capital Wasteland know that The Lyons Chapter is here to help. There may be a growing number of detractors in our order, but their screams about The Codex can not drown out the cries of The Capital Wasteland for our help!"
  BLN_high_wastelander_influence:0 "Helping The People"
  BLN_high_wastelander_influence_desc:0 "The primary goal of our mission has changed. We still seek out dangerous technology and try to stick to The Brotherhoods principles, however saving the people of The Capital Wasteland is our priority. This has caused us trouble with a few of our own."
  BLN_moderately_high_wastelander_influence:0 "Help Where We Can"
  BLN_moderately_high_wastelander_influence_desc:0 "Helping the people of The Capital Wasteland is a growing focus in our chapter, and the wastelanders thank us for it. But, not everyone in The Citadel is happy about it."
