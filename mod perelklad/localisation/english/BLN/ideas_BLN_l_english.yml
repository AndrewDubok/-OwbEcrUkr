  ######          LEGACY LOC                        ####
  ######                                            ####
  ######################################################
  ######################################################
  bln_outcast_schism:0 "Outcast Schism"
  bln_outcast_schism_desc:0 "Following the official cut off of support from the West, many members of Lyons brotherhood followed Paladin Henry Casdin to abandon The Citadel and pursue their original mission. This has left The Brotherhood mission severely lacking in both equipment and experienced soldiers. Now wastelander initiates must fill the roles of highly equipped Knights with little more than common rifles."

  bln_super_mutant_crusade:0 "Super Mutant Crusade"
  bln_super_mutant_crusade_desc:0 "For the past few year the goal of The Eastern Brotherhood has shifted from scavenging technology to clearing the ever growing tide of Super Mutants from DC. It will be a losing battle until their point of origin can be discovered, but The Brotherhood is all that stands between the people of The Capital Wasteland and complete Super Mutant domination."

  bln_gnr_propaganda:0 "GNR Propaganda"
  bln_gnr_propaganda_desc:0 "Threeeeeeeeeeeeee Doooooooogg is out there on the airwaves every day telling the people of DC about The Brotherhood of Steel and how they fight the good fight. From Girdirshade to The Republic of Dave people flock to The Brotherhood wanting to do their part."

  bln_citadel_construction_idea:0 "Citadel Reconstruction Efforts"
  bln_citadel_construction_idea_desc:0 "Restoring a massive pre-war building such as The Citadel is no easy undertaking. Scribes will have to be pulled away from other research, production and construction tasks to handle this monumental job."

  bln_citadel_archives_idea:0 "The Citadel Archives"
  bln_citadel_archives_idea_desc:0 "With the full archives of The Citadel at our disposal, research into many lost technologies can move at a pace we would otherwise only dream of."

  bln_search_for_the_source:0 "Search for The Source"
  bln_search_for_the_source_desc:0 "The search for the source of Super Mutants in The Capital Wasteland will require a coordinated team of Scribe researchers and Knight scouts. Their efforts may be slow, but we need most of our men simply to hold back the Super Mutants prowling the wastes."

  bln_brotherhood_trade:0 "Trade with our Brothers"
  bln_brotherhood_trade_desc:0 "While uneasy at first, trade with our distant Brothers has proven very beneficial."
  ######################################################
  ######################################################
  ######                                            ####
  ######          IDEA LOC                          ####
  ######                                            ####
  ######################################################
  ######################################################
  bln_scourge_foundries:0 "Treasure From The Scourge"
  bln_scourge_foundries_desc:0 "From our clearing of Pittsburgh Lyons recovered the plans to pre-war foundries that are otherwise lost to the wasteland. Its only a matter of time before we harnass them for the Brotherhood."
  bln_protectionism:0 "Protectionism"
  bln_protectionism_desc:0 "Our Knights and Initiates on occasion help local settlements with their troubles. In exchange, we receive goods and caps for our efforts."
  bln_open_economy:0 "Open Economy"
  bln_open_economy_desc:0 "If we are to survive in this harsh wasteland, we need to work with those around us. Fair trade allows us to get resources we need while offloading junk we do not. Its better than sending Knights into danger to bring back some food isnt it?"
  bln_scourge_trains:0 "Treasure From The Scourge"
  bln_scourge_trains_desc:0 "From our clearing of Pittsburgh Lyons recovered the plans to high-speed trains that are otherwise lost to the wasteland. Its only a matter of time until the continent's long silent rails rumble once more."
  bln_scourge_nuclear_mat:0 "Treasure From The Scourge"
  bln_scourge_nuclear_mat_desc:0 "From our clearing of Pittsburgh Lyons recovered large amounts of high quality nuclear material. Without us being the stewards of this danger, the wasteland would face another extinction."
  bln_casdins_mp:0 "Casdin's Judgement"
  bln_casdins_mp_desc:0 "Henry Casdin and his band of deserters have been judged by Elder Lyons. They are no longer members of the Brotherhood and their names are forbidden to be spoken in The Citadel. Their exodus has left us with significantly reduced men and materials. The tear this has caused will take a very long time to mend, if it can be mended at all."
  bln_casdins_construction:0 "Empty Warehouses"
  bln_casdins_construction_desc:0 "The exodus of Casdin has brought an unforeseen issue; Scrap. Our warehouses were full of unorganized scrap. After the initial confusion of the coup we have found our pile of stuff gone and what's worse is we have no idea what exactly was taken. As of now our armories are unable to keep up with the wear and tear of the Capital Wasteland. It's only a matter of time until we can no longer field advanced weapons or armor, which would spell doom for our struggling Chapter."
  bln_gnr_start:0 "Galaxy News Radio"
  bln_gnr_start_desc:0 "The Radio DJ, Three Dog, is in a tough spot. Constant Super Mutant attacks have caused significant damage to the GNR Building. To help establish our presence in the Capital Wasteland heavy investments into repairing and fixing his radio station have been approved. This is easier said than done but the mission is of such importance to Lyons that he is ordering his daughter to guard the building. Only time will tell whether this station is crucial to our mission of saving the Capital."
  bln_gnr_end:0 "Galaxy News Radio"
  bln_gnr_end_desc:0 "Threeeeeeeeeeeeee Doooooooogg is out there on the airwaves every day telling the people of DC about The Brotherhood of Steel and how they fight the good fight. From Girdirshade to The Republic of Dave people flock to The Brotherhood wanting to do their part."
  bln_rapid_promotions:0 "Rapid Promotions"
  bln_rapid_promotions_desc:0 "We desperately need experienced commanders to lead what Brothers remain. This will undoubtedly cause underqualified people into positions of power but that can be fixed in time. The fiercely loyal and competent Paladins of Lyons' Pride are a clear first choice for these promotions."
  BLN_scribes_for_hire_idea:0 "Scribes for Hire"
  BLN_scribes_for_hire_idea_desc:0 "The Brotherhood of Steel is allowing some of their scribes to sell their services helping with basic mechanical and research work. It may not be cheap, but it is a boon to our development."
  BLN_scribe_consulting_idea:0 "Scribe Consulting"
  BLN_scribe_consulting_idea_desc:0 "Our choice to allow some scribes to sell their services to our allies has been a good source of caps and goodwill, but our own research and development does take a hit."
  BLN_sturdy_principles_idea:0 "Sturdy Principles"
  BLN_sturdy_principles_idea_desc:0 "We may have relaxed our principles slightly in the face of The Enclave and Super Mutant threats, but we are still the same Brotherhood. Our goals are more important than the immediate safety of some scavengers in shacks, and with The Enclave beaten it is time to return to our mission."
  bln_defeated_the_enclave_idea:0 "Defeated The Enclave"
  bln_defeated_the_enclave_idea_desc:0 "We have defeated The Enclave for good, for sure this time. Our soldiers are celebrating the victory and our scribes are celebrating the plethora of new tech and interesting data flooding into our research labs."
  BLN_brothers_again_idea:0 "Brothers Once More"
  BLN_brothers_again_idea_desc:0 "Despite our slight differences of ideology The Lyons Chapter and Outcasts are working together once again. Our Knights fight side by side, our scribes share information and some of our initiates train together. It may not be the same as when we were part of one chapter, but it is a start."
  BLN_hunting_mutants_home_idea:0 "Seeking their home"
  BLN_hunting_mutants_home_idea_desc:0 "The home of The Super Mutants in The Capital Wasteland remains a mystery to us. But we will find it, and we will stop them"
  BLN_crusade_won_idea:0 "Successful Mutant Crusade"
  BLN_crusade_won_idea_desc:0 "The Brotherhood has once again stopped Super Mutants from taking over the wasteland. Lets hope we don't need to do it a third time."
  BLN_train_with_pride_idea:0 "Lyons Pride Training"
  BLN_train_with_pride_idea_desc:0 "Lyons' Pride have been considered the best of the best in The Lyons Chapter, with some of the harshest training and most dangerous missions. Of course not every initiate can get this level of training, but it can't hurt to strive for something better in how we prepare our soldiers to fight."
  BLN_verti_assault_idea:0 "Verti-Assault Training"
  BLN_verti_assault_idea_desc:0 "The idea of storming out of a vertibird into the heat of battle is new to members of The Brotherhood, but a series of tactics is being developed through the use of recovered Enclave materials as well as trial and error."
  BLN_lyons_guard_idea:0 "Lyons Guard"
  BLN_lyons_guard_idea_desc:0 "Some of the best fighters of The Brotherhood are sworn into a special squad known as The Lyons Guard. These Knights and Paladins have one objective, fight with the Elder and keep her alive."
  BLN_relaxed_trade_idea:0 "Relaxed Trade"
  BLN_relaxed_trade_idea_desc:0 "No, The Brotherhood is not flinging their doors open and turning The Citadel courtyard into a fleamarket. We're just being a little less restrictive about who we do business with. After all, if a scav has some good tech, why not hand over some caps or 5.56?"
  BLN_lyons_lessons_idea:0 "Lyons Lessons"
  BLN_lyons_lessons_idea_desc:0 "Elder Lyons puts her years of experience to use giving practical advice and survival tips in a pre-recorded segment on GNR. The program is fostering both goodwill and driving up recruitment while saving lives. It's a tripple win."
  BLN_elder_training_idea:0 "Elder Drill Instructor"
  BLN_elder_training_idea_desc:0 "The Elder spends some of her limited free time assisting in instructing new initiates. Her lessons may be few and far between, but when The Elder tells an initiate how to improve their aim, they listen."
  BLN_resources_to_research_idea:0 "Diverting Resources"
  BLN_resources_to_research_idea_desc:0 "For too long we have neglected our scribes research and development efforts due to shortages. Now with The Enclave threat dealt with and tech pouring in, we can afford to be a little more generous."
  BLN_resources_to_research_2_idea:0 "Diverting Resources"
  BLN_resources_to_research_2_idea_desc:0 "For too long we have neglected our scribes research and development efforts due to shortages. Now with The Enclave threat dealt with and tech pouring in, we can afford to be a little more generous."
  BLN_resources_to_research_3_idea:0 "Diverting Resources"
  BLN_resources_to_research_3_idea_desc:0 "For too long we have neglected our scribes research and development efforts due to shortages. Now with The Enclave threat dealt with and tech pouring in, we can afford to be a little more generous."
  BLN_shining_shield_idea:0 "The Shining Shield"
  BLN_shining_shield_idea_desc:0 "The Order of The Shield is making great strides to improve our power armor thanks to the resources we have afforded them."
  BLN_mighty_sword_idea:0 "The Mighty Sword"
  BLN_mighty_sword_idea_desc:0 "The Order of The Sword is making great strides in improving our weapons thanks to the resources we have afforded them."
  BLN_sharp_quill_idea:0 "The Sharp Quill"
  BLN_sharp_quill_idea_desc:0 "The Order of The Quill is able to uncover and preserve lost knowledge like never before thanks to the resources we have afforded them."
  BLN_bowditch_repair_idea:0 "Repair Services"
  BLN_bowditch_repair_idea_desc:0 "Squires and junior scribes have had paying repair work added to their weekly routine. The hands-on experience helps them gain a more practical understanding on what they are working with, and the caps allow The Brotherhood to acquire necessary resources."
  BLN_mark_2_recon_idea:0 "Mark II Recon Armor"
  BLN_mark_2_recon_idea_desc:0 "With the development of the Mark II recon armor our soldiers that aren't issued power armor enjoy greater protection."
  BLN_cure_research_idea:0 "Cure Research"
  BLN_cure_research_idea_desc:0 "The progress at finding a cure for TDC is going slow, and some ask why we do it at all, but a cure for TDC is just the beginning. This infant's blood could hold the key to developing new treatments for radiation poisoning or even fighting other harmful mutations."
  BLN_prydwen_design_idea:0 "Designing The Prydwen"
  BLN_prydwen_design_idea_desc:0 "Nearly all of our research has shifted from new weapons and armor to designing this monster of an airship."
  BLN_prydwen_resources_idea:0 "Gather resources for The Prydwen"
  BLN_prydwen_resources_idea_desc:0 "The construction of this airship will require not just a mountain of scrap metal, but literal tons of rare and delicate components that you don't find just lying around."
  BLN_prydwen_build_idea:0 "Building The Prydwen"
  BLN_prydwen_build_idea_desc:0 "Our manufacturing has all but halted as nearly every pair of hands we can find is being diverted to constructing The Prydwen"
  BLN_prydwen_idea:0 "The Prydwen"
  BLN_prydwen_idea_desc:0 "With our mighty airship we are able to project our force and deploy entire divisions of Knights anywhere on The East Coast in a matter of days or weeks."
  BLN_vertibird_killers_idea:0 "Vertibird Killteams"
  BLN_vertibird_killers_idea_desc:0 "Teams of Knights are being sent out into the field with our specialized Tesla Cannons with only one goal, to destroy vertibirds. Until The Enclave are able to adapt to our tactics, their air support will be seriously hindered."
  BLN_knight_training_help_idea:0 "Knight Drill Instructors"
  BLN_knight_training_help_idea_desc:0 "Brotherhood Knights recovering from injuries are being lent to our government to help train up our soldiers faster and prepare them for the fight with The Enclave."
  BLN_deathclaw_scrambler_idea:0 "Deathclaw Scramblers"
  BLN_deathclaw_scrambler_idea_desc:0 "The Brotherhood are using some kind of scrambling frequency to turn our deathclaw sentries against us. Our scientists assure us that they will be able to develop a counter eventually, but in the meantime we still have a war on!"
  BLN_eastern_codex_idea:0 "The Eastern Codex"
  BLN_eastern_codex_idea_desc:0 "The Codex of The Brotherhood of Steel has been revised to better suit the challenges and goals of our chapter."
  BLN_secure_supply_lines_idea:0 "Secure Supply Lines"
  BLN_secure_supply_lines_idea_desc:0 "Our Knights have plotted out safe routes through the DC Metro and ensure they stay clear so our outposts stay supplied."
  BLN_inexperienced_initiates_idea:0 "Inexperienced Initiates"
  BLN_inexperienced_initiates_idea_desc:0 "New initiates have very little first hand combat experience. This both makes them harder to train, and more likely to cave under pressure during an actual engagement."
  BLN_worse_initiates_idea:0 "Low Quality Initiates"
  BLN_worse_initiates_idea_desc:0 "Due to manpower shortages we have had to make due with worse and worse initiates. Where before we only accepted experienced mercs and caravan guards, now we take almost anyone that knows which end of the rifle goes toward the enemy"
  BLN_west_initiates_idea:0 "Western Initiates"
  BLN_west_initiates_idea_desc:0 "In a compromise with hardliner members of our order, we are only taking in wastelander initiates that pass their stringent standards. Even then, we will only do this when we can't get reinforcement from The West."
  BLN_worst_initiates_idea:0 "Poor Initiates"
  BLN_worst_initiates_idea_desc:0 "We are now taking just about anyone that isn't a raider and doesn't leave when they find out they aren't being given a suit of T-45d. Some of these fresh-faced recruits have never even been before the walls of their settlement before traveling with a Brotherhood Patrol back to The Citadel. Many of them won't see the end of their first week of duty."
  BLN_picky_initiates_idea:0 "Quality Initiates"
  BLN_picky_initiates_idea_desc:0 "While we are in desperate need for recruits, we can not compromise our standards. It is not worth the time investment or equipment cost to toss inexpeirienced young men into the ruins of DC if they will die before they kill a single super mutant."
  BLN_specialist_initiates_idea:0 "Specialist Initiates"
  BLN_specialist_initiates_idea_desc:0 "We have been receiving initiates trained in specialist roles from out West. This allows us to train our Capital Wasteland initiates in more general combat roles, which increases training efficiency as well as their combat ability."
  BLN_loyalist_tensions_idea:0 "Loyalist Tensions"
  BLN_loyalist_tensions_idea_desc:0 "It is no secret that many in our chapter question the decisions of Elder Lyons over the last couple decades. They see the fight against the super mutants and aiding wastelanders as a waste of valuable resources. The general unease resulting from this rift has grown and is starting to impact the chapter as a whole"
  BLN_sword_improvements_idea:0 "Tempered Swords"
  BLN_sword_improvements_idea_desc:0 "Our Order of The Sword scribes are tirelessly improving our weapons at the detriment of our research efforts."
  BLN_sword_refurbishment_idea:0 "Recycled Swords"
  BLN_sword_refurbishment_idea_desc:0 "Our Order of The Sword scribes try to fix up as many old weapons as they can, even if it means a few defects falling through the cracks."
  BLN_shield_improvements_idea:0 "Hardened Shields"
  BLN_shield_improvements_idea_desc:0 "Additional armor, new materials and specialized techniques make our power armor some of the toughest in the wastes. It may slow our troops down, but when they get there they rule the battlefield."
  BLN_shield_refurbishment_idea:0 "Expanded Refurbishment"
  BLN_shield_refurbishment_idea_desc:0 "Our Order of The Shield scribes are fixing up as many old suits of power armor as they can, even if a few holes are left unpatched."
  BLN_improv_training_idea:0 "Improv Training"
  BLN_improv_training_idea_desc:0 "Building barricades, digging trenches and the construction of other improvised defensive positions are being taught to our initiates."
  BLN_scribe_prime_idea:0 "Liberty Prime Research"
  BLN_scribe_prime_idea_desc:0 "More research must be done to make Liberty Prime operational. As such, the elder has diverted researchers away from other tasks to make sure the robot is brought online this decade."
  BLN_knight_prime_idea:0 "Liberty Prime Engineering"
  BLN_knight_prime_idea_desc:0 "The core of Liberty Primes issues are in engineering a power sufficient power supply or squeezing more juice out of the existing supply. Knights that work in weapon and power armor maintenance should be up to the task of solving this, though their efforts in other areas will be missed."
  BLN_sword_sublevels_idea:0 "Additional Order of The Sword Testing Ranges"
  BLN_sword_sublevels_idea_desc:0 "A section of The Citadel has been allocated to The Order of The Sword who use the place as a testing range for new weapon improvements."
  BLN_shield_sublevels_idea:0 "Additional Order of The Shield Workshops"
  BLN_shield_sublevels_idea_desc:0 "A section of The Citadel has been allocated to The Order of The Shield who use the place as a workshop where they experiment with new armor improvements"
  BLN_quill_sublevels_idea:0 "Additional Order of The Quill Libraries"
  BLN_quill_sublevels_idea_desc:0 "A section of The Citadel has been allocated to The Order of The Quill who use the place as a library for technical documents and books they recover. The quick access to organized documents aids our research."
  BLN_forges_of_steel_idea:0 "Forges of Steel"
  BLN_forges_of_steel_idea_desc:0 "The Citadel is now home to one of the most powerful manufacturing bases in the east. It may not be The Pitt, but our forges more than suit our needs."
  bln_steel_radio:0 "Steel Radio"
  bln_steel_radio_desc:0 "Specially curated broadcasts with occasional music from our archives keeps the people of The Capital Wasteland out of our way and thankful for the sacrifices we make for them!"
  bln_loyalist_economy:0 "Loyalist Economy"
  bln_loyalist_economy_desc:0 "In line with The Codex, we do not share our resources with outsiders with reckless abandon. It may cut us off from certain resources, but if we are dependent on outsiders for our sufficiency, it can compromise our mission!"
  bln_economic_autarky:0 "Economic Autarky"
  bln_economic_autarky_desc:0 "The Citadel stands as a model of self-sufficiency, just as it should. We need nothing of outsiders. As such, we are able to focus on what is good for our chapter and what is good for the sake of our mission."
  bln_protected_caravans:0 "Protecting Caravans"
  bln_protected_caravans_desc:0 "On occasion, some initiates and Knights will find themselves rented out as caravan security. It may not be a glamorous duty, but the caps and resources we receive for the job helps fuel more important tasks."
  bln_consistent_pay:0 "Consistent Pay"
  bln_consistent_pay_desc:0 "Some may worry that using caps as an incentive for soldiers will lure in the types not fully devoted to the cause, and they may be right. But, the results speak for themselves."
  bln_unhappy_compromise:0 "Unhappy Compromise"
  bln_unhappy_compromise_desc:0 "The new trade rules may deviate from The Codex, but not beyond any precedent. We face hard times out here, and the hardliners know that some compromise is necessary."
  bln_paystubs:0 "Paystubs"
  bln_paystubs_desc:0 "Some of our higher ranking troops will receive compensation for their devoted service. Some may choose to use this on personal luxury, but our hope is most will spend this newly found wealth on more important things."
  BLN_still_brotherhood_idea:0 "Still The Brotherhood"
  BLN_still_brotherhood_idea_desc:0 "We may not spend our days toiling away in bunkers like our brothers out west, but The Lyons Chapter is still a chapter of The Brotherhood of Steel."
  bln_distribution_hub_modifier:0 "Water Distribution Hub"
  bln_project_purity_delivery_modifier:0 "Successful Water Delivery"
  bln_project_purity_complete_modifier:0 "Permanent Water Access"
  BLN_west_scribes_idea:0 "Western Scribes"
  BLN_west_scribes_idea_desc:0 "Scribes sent from Lost Hills are supplimenting our existing research teams."
  BLN_scribe_exchange_program_idea:0 "Scribe Exchange Program"
  BLN_scribe_exchange_program_idea_desc:0 "Scribes from The Midwest and Lyons Brotherhoods have the option of taking a trip to the other chapter for a year to serve as a scribe in the other chapter. The exchange has prove mutually beneficial."
  BLN_full_force_attack_idea:0 "All Or Nothing!"
  BLN_full_force_attack_idea_desc:0 "We can not afford to fail here. Send our best men, our toughest armor and our deadliest weapons to the front! Irons will answer for what he has done!"
  BLN_brotherhood_armed_rebels_idea:0 "Brotherhood Supporting Rebels"
  BLN_brotherhood_armed_rebels_idea_desc:0 "More and more weaponry produced by The Lyons Brotherhood is being found in the hands of wastelander rebels. The supplied arms have made their attacks bolder and more deadly. They will be stamped out eventually, but it will take time."
  BLN_fod_idea:0 "The Fountain of Dreams"
  BLN_fod_idea_desc:0 "The water of The Fountain of Dreams has special properties that make it very useful in wasteland expeditions."
  BLN_scribe_vacation_program_idea:0 "Scribe Exchange Program"
  BLN_scribe_vacation_program_idea_desc:0 "Scribes from The Gulf and Lyons Brotherhoods have the option of taking a trip to the other chapter for a year to serve as a scribe in the other chapter. The exchange has prove mutually beneficial."
  BLN_washington_research_computer_idea:0 "The W.A.S.H.I.N.G.T.O.N Computer"
  BLN_washington_research_computer_idea_desc:0 "We will never understand why the pre-war government wasted such an advanced piece of technology on something as petty as governing some territory. W.A.S.H.I.N.G.T.O.N's processing power is better used augmenting our research efforts."
  BLN_assisted_training_idea:0 "Assisted Training"
  BLN_assisted_training_idea_desc:0 "Excess personnel are being diverted to assist in training initiates for the time being"
  BLN_assisted_research_idea:0 "Assisted Research"
  BLN_assisted_research_idea_desc:0 "Excess personnel are being diverted to assist in reserch efforts for the time being"
  BLN_increased_expeditions_idea:0 "Increased Expeditions"
  BLN_increased_expeditions_idea_desc:0 "A large number of our Knights are sent out to scour distant facilities for tech and data."

