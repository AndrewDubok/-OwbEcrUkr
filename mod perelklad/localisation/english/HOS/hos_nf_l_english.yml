l_english: 
HOS_nf_a001:0 "Love the game"
HOS_nf_a001_desc:0 "Hockey was one of the most important things before the bombs. Why else would they make such big buildings for it?"
HOS_nf_a002:0 "Our Last Loss"
HOS_nf_a002_desc:0 "After a few rougher losses, things got a bit out of hand."
HOS_nf_a003:0 "New Digs"
HOS_nf_a003_desc:0 "Our old barn isn't cutting it for The Shore's plans. We'll need a bigger place."
HOS_nf_a004:0 "Never Lose Again"
HOS_nf_a004_desc:0 "After taking beatings like The Hosers did in Ronto, many hockey gangs would fall apart. This seems to have had the opposite effect."
HOS_nf_a005:0 "Clear The Ice"
HOS_nf_a005_desc:0 "The rink here is a bit shit, but we can fix that."
HOS_nf_a006:0 "Get Into Scrap"
HOS_nf_a006_desc:0 "Lotta rusty pipes and things lying around that'd be good to whack somebody with."
HOS_nf_a007:0 "Grab Local Factories"
HOS_nf_a007_desc:0 "The local gun workshops aren't anything fancy, but they're ours now."
HOS_nf_a008:0 "A New Roster"
HOS_nf_a008_desc:0 "We lost a lot of guys in Ronto. Those spots on the team need to be filled."
HOS_nf_a009:0 "The Playbook"
HOS_nf_a009_desc:0 "The local thugs are tough but dumb. We need to practice."
HOS_nf_a010:0 "The Jims"
HOS_nf_a010_desc:0 "We didn't just lose a bunch of frontline guys. We lost some real leaders. Thankfully, we've found some replacements that are real badasses. There's just one problem. \n\n They're all named Jim"
HOS_nf_a011:0 "Fill The Bench"
HOS_nf_a011_desc:0 "Send out the call that the team's recruiting"
HOS_nf_a012:0 "D-Fence"
HOS_nf_a012_desc:0 "Keep things nice and tight. Don't let the enemy through."
HOS_nf_a013:0 "Set The Tone"
HOS_nf_a013_desc:0 "We can't raid just sitting on our asses. We head out there an fuck things up"
HOS_nf_a014:0 "A New Captain"
HOS_nf_a014_desc:0 "Things are shaking up. With The Shore keeping the team together, he doesn't have as much time for leading raids as he used to."
HOS_nf_a015:0 "Fundraising"
HOS_nf_a015_desc:0 "The locals have been a little late paying tribute to the team. Time to get that sorted"
HOS_nf_a016:0 "New Threads"
HOS_nf_a016_desc:0 "With so many new guys it's hard to tell fellas apart when things hit the fan. We'll need new sweaters."
HOS_nf_a017:0 "New Gear"
HOS_nf_a017_desc:0 "We're going to need some more sticks and skates too"
HOS_nf_a018:0 "Captain Jacques"
HOS_nf_a018_desc:0 "Jacques is a raider boss from somewhere out west that got their asses kicked like us. So they're hungry for a win."
HOS_nf_a019:0 "Captain Hitchcock"
HOS_nf_a019_desc:0 "Hitchcock's a bit old, but they're still eager to fight"
HOS_nf_a020:0 "Captain Yank"
HOS_nf_a020_desc:0 "Yank's a raider from the south that's come with their guys fleeing from robots that keep snatching people up and dragging them somewhere. We may want to look into that someday."
HOS_nf_a021:0 "Captain Goody"
HOS_nf_a021_desc:0 "Goody's a damn good raider, but they're from somewhere out east where they talk weird. Makes following their orders a bit difficult."
HOS_nf_a022:0 "Manitobian Might"
HOS_nf_a022_desc:0 "Jacques says he can track down some of his buddies that survived getting out here."
HOS_nf_a023:0 "Veteran Presence"
HOS_nf_a023_desc:0 "Hitchcock has an eye for veteran talent. They're going to stack our roster with real killers."
HOS_nf_a024:0 "Yankee Tactics"
HOS_nf_a024_desc:0 "Yank knows a thing or two about getting from A to B without losing half your gear along the way."
HOS_nf_a025:0 "Get'Em Focused"
HOS_nf_a025_desc:0 "Goodie wants to whip the team into shape with some good old fashioned training."
HOS_nf_b001:0 "Windsor Away Game"
HOS_nf_b001_desc:0 "The Wreckers over in Windsor are a gang like us, but we're going to need their stuff to take the fight to Ronto."
HOS_nf_b002:0 "Welcome To The Team"
HOS_nf_b002_desc:0 "Instead of killing all the Wreckers, we'll welcome them to our gang."
HOS_nf_b003:0 "Team Vehicles"
HOS_nf_b003_desc:0 "Paint a leaf on the cars and now they're Hoser Cars."
HOS_nf_b004:0 "Learning The Game"
HOS_nf_b004_desc:0 "How do these guys not know hockey? We have to teach them if they're going to fight with us"
HOS_nf_b005:0 "Wheres This Part Go?"
HOS_nf_b005_desc:0 "There's no way you guys aren't making these part names up. Radiator? Hardly know her"
HOS_nf_b006:0 "Zamboni Boys"
HOS_nf_b006_desc:0 "The Wreckers that have joined up formed their own little squad and are ready to hit the ice."
HOS_nf_b007:0 "Wheel, Snipe, Celly"
HOS_nf_b007_desc:0 "Car guys pushing through with skaters in their wake. Ronto doesn't stand a chance."
HOS_nf_b008:0 "Get Walking"
HOS_nf_b008_desc:0 "So you guys just kept driving across that bridge then coming back for 200 years? Go walk this time"
HOS_nf_b009:0 "Windsors Rockets"
HOS_nf_b009_desc:0 "These guys had some heavy firepower lying around. What were they fighting across that bridge, tanks?"
HOS_nf_b010:0 "Cracking Trunks"
HOS_nf_b010_desc:0 "The Wreckers had a tradition of keeping their loot in their trunks. Grab keys off the corpses."
HOS_nf_b011:0 "Can These Make Skates?"
HOS_nf_b011_desc:0 "There are a lot of factories in Windsor. They're for making cars though. We can change that right?"
HOS_nf_b012:0 "Across The Bridge"
HOS_nf_b012_desc:0 "The Wreckers kept fighting these dudes across the bridge for 200 years. Lets show them how it's done."
HOS_nf_b013:0 "Local Talent"
HOS_nf_b013_desc:0 "Not all the boys in Windsor were car obsessed. Some of them can learn to skate."
HOS_nf_b014:0 "Who Needs Cars"
HOS_nf_b014_desc:0 "You know how many skates we could make with one of these rustbuckets?"
HOS_nf_c001:0 "Return To Ronto"
HOS_nf_c001_desc:0 "We've gotten our shit together. New guys, new bosses, and new sticks. Time for a rematch."
HOS_nf_c002:0 "Who Are Yous?"
HOS_nf_c002_desc:0 "Who the hell are these asshats in black armor? What happened to W.A.S.H.I.N.G.T.O.N?"
HOS_nf_c003:0 "Crushing Cans"
HOS_nf_c003_desc:0 "These walking tincans are only good for target practice and scrap. Do one then the other."
HOS_nf_c004:0 "Post-Game Party"
HOS_nf_c004_desc:0 "We've retaken Ronto and beat the old computer that nearly folded our team. Time to celebrate."
HOS_nf_c005:0 "The Old Stashes"
HOS_nf_c005_desc:0 "Dig up the old stashes and make sure the loot's still there."
HOS_nf_c006:0 "The Boys Are Back In Town"
HOS_nf_c006_desc:0 "We're the new champs, Ronto Stadium is ours now."
HOS_nf_c007:0 "Stripped Clean"
HOS_nf_c007_desc:0 "We found where those Ontarioclave guys or whatever they were called holled up. Place is a shithole but there's still some stuff worth stripping out."
HOS_nf_c008:0 "Frigg Off"
HOS_nf_c008_desc:0 "The Ontarioclave ran off into the snow with their tails between their legs. Good riddance."
HOS_nf_c009:0 "Flexing The Win"
HOS_nf_c009_desc:0 "These guys kicked Ronto's asses and we kicked their asses. So that means we kicked Ronto's asses too right?"
HOS_nf_c010:0 "Repurpose Bot Plants"
HOS_nf_c010_desc:0 "If these factories can make a robot they should be able to make a damn stick."
HOS_nf_c011:0 "Old Pads"
HOS_nf_c011_desc:0 "The bunker that old bot was in had a lot of old gear that'd fit the boys on the ice pretty well."
HOS_nf_c012:0 "Punching Through"
HOS_nf_c012_desc:0 "If you know how to kill one bot, you know how to kill any bot. We're looking at you B.M.M.A.U!"
HOS_nf_c013:0 "Keeping The Lights On"
HOS_nf_c013_desc:0 "If we're not keeping that overpowered toaster running, we can pull energy from his reactors. Maybe we'll get that jumbotron working one day."
HOS_nf_c014:0 "Asses In Seats"
HOS_nf_c014_desc:0 "Yeah, we're raiders. But we put on a good show too. Fellas will pay to see a game."
HOS_nf_c015:0 "The DC Ravens?"
HOS_nf_c015_desc:0 "Those Ontarioclave Shitters were a split-off from some team called The DC Ravens or something. They probably fight about the same so we know what we're getting into."
HOS_nf_c016:0 "Pew Pew"
HOS_nf_c016_desc:0 "These guys left some goodies behind as we ran them off."
HOS_nf_c017:0 "New Helmets"
HOS_nf_c017_desc:0 "Gear's a bit fucky to wear with skates, but not everyone can skate. So..."
HOS_nf_c018:0 "Home Ice"
HOS_nf_c018_desc:0 "We're fully moved in to the stadium and have things running just how we like it. The people of Ronto are adjusting to who should be in charge too."
HOS_nf_c019:0 "Sell Merch"
HOS_nf_c019_desc:0 "Paint some of those old bobbleheads to look like the boys and sell them to the guys that come to watch the games. Easier caps than raiding."
HOS_nf_c020:0 "Home Ice Advantage"
HOS_nf_c020_desc:0 "Ronto is our home. The stadium is our ice. We will not let anyone take it from us."
HOS_nf_c021:0 "Broadcast Games"
HOS_nf_c021_desc:0 "Somebody suggested we fix up that old radio antenna to live broadcast the games. It should attract people from all around to see them live."
HOS_nf_c022:0 "The League"
HOS_nf_c022_desc:0 "To keep games going we need more teams. That means we will have to be more than just The Hosers, we will have to become a league."
