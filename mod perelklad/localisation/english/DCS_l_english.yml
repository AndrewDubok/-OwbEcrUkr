###Traits###
DCS_delusions_of_grandeur_trait:0 "Delusions of Grandeur"
DCS_delusions_of_grandeur_trait_desc:0 "Dave thinks he is the smartest man in the room, no matter what room he is in. This makes him notoriously hard to work with, and its no wonder few people want to even try advising him."
DCS_reclusive_hedonist_trait:0 "Reclusive Hedonist"
DCS_reclusive_hedonist_trait_desc:0 "Tenpenny is rarely seen outside of his suite. The man hasn't been sober in years and spends most of his days with whores or sniping at random wasteland creatures. Naturally, this makes getting things done difficult."
DCS_uncle_of_a_nation_trait:0 "Uncle of A Nation"
DCS_uncle_of_a_nation_trait_desc:0 "Uncle Roe laid the groundwork for the founding of the DCS through simple trade agreements. At his heart he will always be a trader, and with him at the helm, the DCS will be about trade."
DCS_wasteland_lawman_trait:0 "Wasteland Lawman"
DCS_wasteland_lawman_trait_desc:0 "Lucas Simms has the unenviable job of trying to enforce law and order in a lawless land. Still, if anyone can do that job it's him."
DCS_vault_leader_trait:0 "Vault Leader"
DCS_vault_leader_trait_desc:0 "As the leader of a vault, Amata knows how to make due with exceptionally limited resources. This knowledge will help the rest of us."
DCS_curious_mind_trait:0 "Curious Mind"
DCS_dangerous_mind_trait:0 "Dangerous Mind"
DCS_man_behind_man_trait:0 "The man behind the man"
DCS_man_behind_man_trait_desc:0 "Anyone in the know knows that Mr. Burke is the real brains behind Tenpenny. That shifty man works well from the shadows and few know what he is really planning"
DCS_self_important_trait:0 "Self-Important General"
DCS_self_important_trait_desc:0 "Dave is known to contradict the orders of those around him and send men on pointless attacks or patrols because he thinks he knows better. It causes no shortage of problems. Why did we give this guy this role for life?"
DCS_first_lady_trait:0 "First Lady"
DCS_settlement_guard_trait:0 "Settlement Guard"
DCS_big_town_oldtimer_trait:0 "Big Town Oldtimer"
DCS_big_town_oldtimer_trait_desc:0 "Pappys time as one of the oldest in Big Town has made him wise beyond his years. He knows how to hold a community together even in the darkest of times."
DCS_wasteland_doctor_trait:0 "Wasteland Doctor"
DCS_wasteland_doctor_trait_desc:0 "Red has been patching people up since she could hold a needle. She may not have much formal learning, but who does out here?"
DCS_nuka_fanatic_trait:0 "Nuka Fanatic"
DCS_nocturnal_predator_trait:0 "Nocturnal Predator"
DCS_iron_conviction_trait:0 "Iron Conviction"
DCS_iron_conviction_trait_desc:0 "Lucas Simms stands by his principles to the end. He will not be swayed by the worst of our society."
DCS_wavering_conviction_trait:0 "Wavering Conviction"
DCS_wavering_conviction_trait_desc:0 "Simms justified letting a monster live despite his crimes once, who knows what he may allow tomorrow?"
DCS_aging_songbird_trait:0 "Elderly Songbird"
DCS_retired_adventurer_trait:0 "Retired Adventurer"
DCS_former_minuteman_trait:0 "Former Minuteman"
DCS_public_servitor_trait:0 "Public Servitor"
DCS_altered_ai_trait:0 "Altered AI"
DCS_altered_ai_trait_desc:0 "M.A.R.Go.T., for Metro Authority Rapid Governmental Transit System, was found in the Presidential Metro maze by soldiers after the destruction of the Enclave and the recovery of their pre-war data . It was restored to full function and, as it is not an advanced autonomous intelligence, soon possible to extend its areas of operation from the Presidential Metro to others, far more useful purposes. Now in constant contact with [DCS.Leader] via terminals, MARGoT advises settlements on both civilian and miltary matters and supervises the automated security of key areas such as DC. This ancient relic is valuable to everyone, but its pre-ZAX design leaves it relatively vulnerable to any attempt to compromise it. \n \n§YBut I have to say, it's better when the train and water merchants are on time!§!"
DCS_daves_strongest_soldier_trait:0 "Dave's Strongest Soldier"
DCS_mothman_trait:0 "Wise Mothman"
DCS_dave_trait:0 "The man, the myth, the Dave"

###Decisions###
    DCS_outcast_dealings_decision_category:0 "Outcast Trade"
    DCS_outcast_dealings_decision_category_desc:0 "The Brotherhood Outcasts may look down on us wastelanders, but they pay well for any tech we find. Selling them the things beyond our understanding should benefit us right?"
    DCS_super_mutants_decision_category:0 "Super Mutant Hunting"
    DCS_super_mutants_decision_category_desc:0 "The super mutant problem is getting out of hand. We cant just hide behind our walls and expect The Brotherhood to solve it."
    DCS_special_projects_decision_category:0 "DC Settlement Special Projects"
    DCS_special_projects_decision_category_desc:0 "Through our focus choices we can unlock a few special projects that will change our confederation."
    DCS_sell_robots_decision:0 "Sell Bots"
    DCS_sell_robots_decision_desc:0 "The RobCo Factory had a lot of robots that could be useful to us, but we could also sell them to The Outcasts."
    DCS_sell_national_guard_loot_decision:0 "Sell National Guard Loot"
    DCS_sell_national_guard_loot_decision_desc:0 "The power armor in the national guard depot is of little use to us when we don't know how to use it. The Outcasts will pay well for it though!"
    DCS_sell_enclave_pa_decision:0 "Sell Enclave Power Armor"
    DCS_sell_enclave_pa_decision_desc:0 "Our soldiers just aren't trained to use power armor like this. We should sell the suits to The Outcasts"
    DCS_sell_constantine_loot_decision:0 "Sell Constantines T-51bs"
    DCS_sell_constantine_loot_decision_desc:0  "The T-51bs in Fort Constantine would be of special interest to our trading partners at Fort Independence."
    DCS_sell_advanced_decision:0 "Sell Advanced Electronics"
    DCS_sell_advanced_decision_desc:0 "The advanced electronics we pull out of ruins don't really do much for us. All they're good for is selling to someone that knows what to do with them."
    DCS_sell_circuitry_decision:0 "Sell Circuitry"
    DCS_sell_circuitry_decision_desc:0 "What good is circuitry when half our settlers live without electricity? Just sell it to the outcasts"
    DCS_sell_vertibirds_decision:0 "Sell Vertibirds"
    DCS_sell_vertibirds_decision_desc:0 "These vertibirds we captured from The Enclave are cool, but none of us know how to fly. I'd bet the Outcasts would pay a lot for them though"
    DCS_sell_vault_tec_pa_decision:0 "Sell Vault PA"
    DCS_sell_vault_tec_pa_decision_desc:0 "I for one have never seen this kind of power armor before, the outcasts may pay well for it"
    DCS_mutant_hunts:0 "Organize Mutant Hunt"
    DCS_mutant_hunts_desc:0 "We will get together a team of hardened mutant hunters to go out and thin the super mutant numbers a little"
    DCS_find_mutant_home:0 "Search for The Source"
    DCS_find_mutant_home_desc:0 "We are getting nowhere with these hunts. We need to send some people to find out where the mutants are at, so we can stop them at the source."
    DCS_invest_in_crow_decision:0 "Invest in Crows Caravans"
    DCS_invest_in_crow_decision_desc:0 "We will give Crow some caps to expand his operations. Hopefully it pays off"
    DCS_invest_in_hoff_decision:0 "Invest in Doc Hoffs Caravans"
    DCS_invest_in_hoff_decision_desc:0 "We will give Doc Hoff some caps to expend his operations. Hopefully it pays off"
    DCS_invest_in_harrith_decision:0 "Invest in Lucky Harriths Caravans"
    DCS_invest_in_harrith_decision_desc:0 "We will give Lucky Harrith some caps to expand his operations. Hopefully it pays off"
    DCS_invest_in_wolfgang_decision:0 "Invest in Crazy Wolfgangs Caravans"
    DCS_invest_in_wolfgang_decision_desc:0 "We will give Crazy Wolfgang some caps to expand his operations. Hopefully it pays off"
    DCS_research_molerats_decision:0 "Follow up on Molerat Repellant"
    DCS_research_molerats_decision_desc:0 "While the first batch of molerat repellant had explosive results, there is potential here. If we continue this line of research, we could develop a milder version. If the mole rats stop trying to eat us, we could even domesticate them!"
    DCS_research_mirelurks_decision:0 "Continue Mirelurk Research"
    DCS_research_mirelurks_decision_desc:0 "We have learned a lot about Mirelurks from the wasteland survival guide study. Between our findings and rumors of people further north domesticating them, there is reason to think if we continue studying these aquatic predators we could one day farm them or even direct them at raiders!"
    

###Ideas###

    dcs_loose_confederation_idea:0 "Loose Confederation"
    dcs_loose_confederation_idea_desc:0 "Our nation is less a cohesive entity and more a loose confederation of independent settlements. This sometimes makes getting things done hard, but it has worked for us so far."
    dcs_scavenging_economy_idea:0 "Scavenging Based Economy"
    dcs_scavenging_economy_idea_desc:0 "In the centuries since the Great War, mass industry has not yet returned to The Capital Wasteland. Our economy still relies heavily on scavening the ruins and making use of everything we can."
    dcs_fortress_settlements_idea:0 "Every Settlement a Fortress"
    dcs_fortress_settlements_idea_desc:0 "Nearly every settlement in our territory has had to develop strong defenses to keep the dangers of the wasteland at bay. High walls, chokepoints and watchtowers abound. This makes it much easier to defend against outside powers."
    DCS_megaton_beautification_idea:0 "Megaton Beautification Project"
    DCS_megaton_beautification_idea_desc:0 "Workers from all across The Capital Wasteland are being pulled off construction sites and out of workshops to work on the Megaton Beautification project. To the public, this is an ambitious project to reshape one of the most important settlements in the wastes. To Tenpenny, it is one last attempt to dael with that eyesore before resorting back to the nuclear option."
    DCS_megaton_revenge_idea:0 "Revenge for Megaton"
    DCS_megaton_revenge_idea_desc:0 "The people of The DC Settlements are united in a desire for revenge against the bastards that blew up Megaton. While they have likely scattered to the wind in various raider gangs by now, these bastards and those like them will pay."
    DCS_ghoul_discrimination_idea:0 "Tenpenny Laws"
    DCS_ghoul_discrimination_idea_desc:0 "The Tenpenny laws is a term used the describe a series of anti-ghoul laws being enforced across the DC Settlements. Examples include Ghouls not being allowed to eat in sight of other wastelanders, ghouls not being allowed to practice medicine and ghouls being prohibited from owning weapons. This has led to many ghouls leaving the DC Settlements for other places, but many expect that was the intent the whole time."
    DCS_subsidizing_caravan_guards_idea:0 "Subsidizing Caravan Guards"
    DCS_subsidizing_caravan_guards_idea_desc:0 "By giving caravans a stipend to help with the cost of hiring caravan guards, caravans are able to hire better talent and expand their businesses better."
    DCS_caravan_guard_drill_instructors_idea:0 "Caravan Guard Drill Instructors"
    DCS_caravan_guard_drill_instructors_idea_desc:0 "Few know how to survive in the wastes better than the veteran caravan guard. These hardened men and women will pass their wisdom onto our militia so they too can survive the dangerous patrols they must set out on."
    DCS_springvale_boot_camp_idea:0 "Springvale Boot Camp"
    DCS_springvale_boot_camp_idea_desc:0 "Members of our militia all spend some time at the Springvale Boot Camp where they learn the essentials of combat and wastealnd survival. The centralized training location has led to increased efficiency and allowed us to direct some men elsewhere."
    DCS_expanded_militia_idea:0 "Expanded Militia"
    DCS_expanded_militia_idea_desc:0 "Our Militia used to be a few settlement guards and old men with rusty rifles. Now it is a true fighting force ready to take on just about anything, so long as power armored soldiers dont start falling out of the sky"
    DCS_settlement_defense_idea:0 "Settlement Defense Training"
    DCS_settlement_defense_idea_desc:0 "Our settlement guards undergo specialized training to ensure they know the essential tactics to defend their settlements from outside attacks."
    DCS_regulator_funding_idea:0 "Regulator Funding"
    DCS_regulator_funding_idea_desc:0 "Regulators will be allocated funds to assist them in their mission. The more wasteland baddies they kill, the better things are for the rest of us."
    DCS_regulator_training_law:0 "Regulator Training"
    DCS_regulator_training_law_desc:0 "Regulators that have gotten too injured or long in the tooth to track wasteland scum are now assisting in training our militia. Their wasteland combat expertise is proving invaluable."
    DCS_raider_fighting_experience_idea:0 "Raider Fighting Experience"
    DCS_raider_fighting_experience_idea_desc:0 "One of the few things a raider in the wasteland fears is the sight of a regulator. Now they will have to fear our entire militia, because regulators are leading the charge."
    DCS_dave_schools_idea:0 "Schools of Dave History"
    DCS_dave_schools_idea_desc:0 "The youth of The Capital Wasteland are learning about the most important person in the entire wasteland, if not the world. By studying the history of Dave these children will learn to love our nation's great accomplishments and aspire to be like the great president."
    DCS_grabbed_guns_idea:0 "Grabbed Guns"
    DCS_grabbed_guns_idea_desc:0 "Some in our settlements are still sore that we took their weapons, but they must understand the military needs them more right?"
    DCS_long_arm_of_law_idea:0 "Long Arm of The Law"
    DCS_long_arm_of_law_idea_desc:0 "Dave's justice reaches the far ends of The Capital Wasteland and someday beyond. Criminals better beware."
    DCS_training_slaves_idea:0 "Training Slaves"
    DCS_training_slaves_idea_desc:0 "We have had to divert some of our drill instructors to prepare Hamlin's escaped slaves for battle. It may hurt our own training, but it is for a good cause."
    DCS_enclave_war_recovery_idea:0 "Recovering From The Enclave War"
    DCS_enclave_war_recovery_idea_desc:0 "The war with The Enclave drained us of resources, manpower, and for a time, hope. But with the threat finally defeated for good, we can rebuild and look to the future."
    DCS_enclave_war_idea:0 "War for Survival"
    DCS_enclave_war_idea_desc:0 "This war with The Enclave is a tough fight that we may not win, but we have no other option but to fight. If we don't, we will lose everything."
    DCS_outcast_advisors_idea:0 "Outcast Advisors"
    DCS_outcast_advisors_idea_desc:0 "In exchange for salvage and resources, The Outcasts have sent some people to help us with development projects. It may not be much, but at least they aren't shooting at us."
    DCS_organized_scavs_idea:0 "Organized Scavs"
    DCS_organized_scavs_idea_desc:0 "Scavengers are being offered employment by the Settlement Council to scavenge specific resources, scout new areas or just follow up on rumors. The pay may not be the best, but some of them prefer the steady pay to the risk of coming up empty and living off radroach for a month after a bad run."
    DCS_lyons_alliance_benefits_idea:0 "Lyons Alliance Benefits"
    DCS_lyons_alliance_benefits_idea_desc:0 "Working with The Brotherhood does more for our people than just help us if something like The Enclave ever comes back. The sense of security as well as increasing trade has boosted the moods of everyone in The Capital Wastealand."
    DCS_permanent_brotherhood_training_idea:0 "Permanent Brotherhood Training"
    DCS_permanent_brotherhood_training_idea_desc:0 "The Brotherhood has sent a couple older Knights to oversee our training facilities. While it isn't the same as the multiple instructors they sent during The Enclave War, it is better than nothing."
    DCS_better_together_idea:0 "Better Together"
    DCS_better_together_idea_desc:0 "In working closer with The Brotherhood these last months we have both realized that together we are more than the sum of our two nations. The shared knowledge, resources and manpower has allowed both of our groups to achieve hights previously thought unreachable."
    DCS_lessons_of_war_idea:0 "Lessons of War"
    DCS_lessons_of_war_idea_desc:0 "The hard-fought war with The Enclave has taught us a lot about what it takes to win a real war. We will be ready should we ever need to turn our guns on a big threat like that again, even The Brotherhood if they should go astray."
    DCS_standing_alone_idea:0 "We Stand Alone"
    DCS_standing_alone_idea_desc:0 "Many thought we couldn't survive without The Brotherhood, but we proved them wrong. We have developed a powerful military, performed our own studies of Enclave tech, and taken our first steps to the skies. The DC Settlements have shown ourselves as a true power in the wastes, and we are just getting started."
    DCS_harrith_caravans_idea:0 "Harriths Caravans"
    DCS_harrith_caravans_idea:0 "Lucky Harrith was the first to sign up for the trade alliance years all those years ago. The prestige that came with it have helped him to expand his business, which in turn helps us."
    DCS_crow_caravans_idea:0 "Crows Caravans"
    DCS_crow_caravans_idea_desc:0 "Crow was the first to sign up for the trade alliance years ago. The prestige that came with it have helped him to expand his business, which in turn helps us."
    DCS_hoff_caravans_idea:0 "Doc Hoff Caravans"
    DCS_hoff_caravans_idea_desc:0 "Doc Hoff was the first to sign up for the trade alliance years ago. The prestige that came with it have helped him to expand his business, which in turn helps us."
    DCS_wolfgang_caravans_idea:0 "Crazy Wolfgang Caravans"
    DCS_wolfgang_caravans_idea_desc:0  "Crazy Wolfgang was the first to sign up for the trade alliance years ago. The prestige that came with it have helped him to expand his business, which in turn helps us."
    DCS_collective_defense_idea:0 "Collective Defense"
    DCS_collective_defense_idea_desc:0 "The DC Settlements were founded with a spirit of collective defense at its core. That ideal has shaped many decisions and still influences us to this day."
    DCS_trade_partnerships_idea:0 "Cooperation and Trade"
    DCS_trade_partnerships_idea_desc:0 "The DC Settlements were founded with a spirit of commerce and free trade. That ideal has shaped many decisions and still influences us to this day."
    DCS_individual_freedom_idea:0 "Settlement Autonomy"
    DCS_individual_freedom_idea_desc:0 "The DC Settlements was founded with a spirit of freedom and settlement autonomy. That ideal has shaped many decisions and still influences us to this day."
    DCS_food_scavenging_idea:0 "Chapter 1 Food Scavenging"
    DCS_food_scavenging_idea_desc:0 "Thanks to the wisdom contained in The Wasteland Survival Guide, our scavengers have become more adept at searching for food while skulking around pre-war ruins. This has increased the food supply and made it more available for everyone."
    DCS_studied_radiation_idea:0 "Chapter 1 Radiation"
    DCS_studied_radiation_idea_desc:0 "The Wasteland Survival guide has volumes of information on treating radiation poisoning. This will prove invaluable to the common wastelander, but it is especially useful to our militia who find themselves roaming the wastes."
    DCS_minefield_experts_idea:0 "Chapter 1 Minefields"
    DCS_minefield_experts_idea_desc:0 "The Wasteland Survival guide goes indepth about navigating pre-war minefields, but also talks about how to disarm the mines and use them to your advantage. Our enemies will not like that part."
    DCS_library_archives_idea:0 "Library Archives"
    DCS_library_archives_idea_desc:0 "We have a portion of The Library of Congress' digital archive in our posession. If we do enough digging maybe we can figure out how to build houses out of something other than scrap metal and brahmin shit"
    DCS_roe_trade_empire_idea:0 "Capital Trade Empire"
    DCS_roe_trade_empire_idea_desc:0 "Uncle Roe founded Canterbury Commons years ago with the goal of turning it into a trade powerhouse to rival Rivet City. After years of hard work he has built up an entire section of The Capital Wasteland into a thriving marketplace surpassing his wildest dreams."
    DCS_vault_101_trade_idea:0 "Vault 101 Trade"
    DCS_vault_101_trade_idea_desc:0 "While the people of Vault 101 wont come out to live among us, they are willing to trade for essentials. Its a start."
    DCS_pitt_losing_slaves_idea:0 "Losing Slave Caravans"
    DCS_pitt_losing_slaves_idea_desc:0 "Slave shipments from The Capital Wasteland are slowing to a crawl because of the coordinated efforts of The DC Settlements. If this keeps up, we could be looking at a labor shortage."
    DCS_slave_sales_disrupted_idea:0 "Disrupted Slave Trade"
    DCS_slave_sales_disrupted_idea_desc:0 "The settlers in The DC Settlements keep hitting our slave caravans on their way to market at Paradise Falls. It's really cutting into our caps."
    DCS_ant_studies_idea:0 "Ant Studies"
    DCS_ant_studies_idea_desc:0 "Dr Lesko is studying the ants of Grayditch and we are having to pull people away from other projects to make sure he doesn't make things worse."
    DCS_studying_mirelurks_idea:0 "Studying Mirelurks"
    DCS_studying_mirelurks_idea_desc:0 "We have diverted the few learned folks we have to study Mirelurks. A few of their assistants die in the work, but it should be worth it."
    DCS_studying_molerats_idea:0 "Studying Molerats"
    DCS_studying_molerats_idea_desc:0 "We are continuing to study and attempt to domesticate the common molerat. It may divert people away from other tasks, but this is important!"
    DCS_tenpenny_commune_idea:0 "Tenpenny Commune"
    DCS_tenpenny_commune_idea_desc:0 "Irving Cheng has turned Tenpenny Tower into a people's commune. It led to a mass exodus of many of the towers wealthy patrons, but in thier place plenty of other down on their luck wastelanders are flocking to the tower to exchange hard work for a safe place to stay and hopefully food."
    DCS_ghoul_tower_idea:0 "Philips Tower"
    DCS_ghoul_tower_idea_desc:0 "Roy Philips has turned Tenpenny Tower from a home for the wasteland's wealthy elite into a home for ghouls. Far from the decrepit museums or metro-tunnels they are used to being shoved towards, many ghouls from even outside The Capital Wasteland are making the trip to a place where they can live the good life."
    DCS_cure_research_idea:0 "TDC Cure Research"
    DCS_cure_research_idea_desc:0 "It will take the devoted efforts of some of the brightest minds The Capital Wasteland has, outside of The Brotherhood or Rivet City, but in time we are confident we can develop a cure for TDC."
    DCS_central_law_idea:0 "Council Set Laws"
    DCS_central_law_idea_desc:0 "The settlement leader council will set the laws for the land. Newer settlements may resist this, but they will accept the changes in time."
    DCS_settlement_law_idea:0 "Laws By Settlements"
    DCS_settlement_law_idea_desc:0 "We will continue allowing settlments to set laws within their boundries. Beyond that, the settlement leader council will set uniform laws. There will still be conflicts of jurisdiction with fugitives, but these can be resolved on a case by case basis."
    DCS_harsh_law_idea:0 "Wasteland Justice"
    DCS_harsh_law_idea_desc:0 "The settlement leader council will set the laws for the land. Ultimate justice will be doled out by Regulators as judge, jurry and executioner."
    DCS_caravan_law_idea:0 "Caravan Law"
    DCS_caravan_law_idea_desc:0 "Settlements will continue to decide the laws of their settlements. Outside their walls, we will attempt to codify the unwritten code of caravans. This may leave law more lax out in the wastes, but it is not like we have the capacity to police the whole wasteland anyway."
    DCS_aristocratic_law_idea:0 "Aristocratic Law"
    DCS_aristocratic_law_idea_desc:0 "The aristocratic elites of The Wasteland will set our laws. Who better than the most successful of society to know how best to govern society?"
    DCS_dave_law_idea:0 "Dave Law"
    DCS_dave_law_idea_desc:0 "If our great president isn't qualified to set the laws of our land, who truly is? Dave will ensure justice reigns supreme, unless justice gets in the way of the government."
    DCS_centralized_militia_idea:0 "Settlement Militias"
    DCS_centralized_militia_idea_desc:0 "Settlements will continue to maintain their militias, with a centralized organization calling them to arms when necessary to defend the settlements as a whole. A settlement's walls remain the last line of defense, but now there is a larger buffer."
    DCS_unified_army_idea:0 "Unified Army"
    DCS_unified_army_idea_desc:0 "Settlements can maintain a militia for local problems. However, the bulk of our armed forces will be organized into a centralized army at the command of the settlement council."
    DCS_regulator_militias_idea:0 "Regulator Command"
    DCS_regulator_militias_idea_desc:0 "Settlements can maintain a militia for local problems. However, the bulk of our armed forces will be organized into a centralized army at the command of veteran regulators who answer to the settlement council."
    DCS_merc_army_idea:0 "Mercenary Auxilaries"
    DCS_merc_army_idea_desc:0 "Settlement militias will make up the backbone of our militiary. Mercenaries hired by the settlement council will fill the gaps left by this approach."
    DCS_talon_remnants_idea:0 "Talon Company Auxilaries"
    DCS_talon_remnants_idea_desc:0 "Settlement militias will make up the backbone of our military. Former talon company mercs will fill the gaps left by this approach."
    DCS_daves_grand_army_idea:0 "Grand Army Of The Republic"
    DCS_daves_grand_army_idea_desc:0 "Every able-bodied son of The United Settlements of Dave will be required to register for a military draft and serve if called upon."
    DCS_waste_regulation_idea:0 "Early Industrial Nation"
    DCS_waste_regulation_idea_desc:0 "We are in the process of transitioning from a scavenging economy to an industrial one. We have put together a basic list of laws regarding industry and new ones are drafted as needed. Fines are levied at offenders to ensure they comply with the new rules."
    DCS_harsh_waste_regulation_idea:0 "Firmly Regulated Early Industrial Nation"
    DCS_harsh_waste_regulation_idea_desc:0 "We are in the process of transitioning from a scavenging economy to an industrial one. We have put together a basic list of laws regarding industry and new ones are drafted as needed. Violators face penalties ranging from fines to execution."
    DCS_industry_waste_regulation_idea:0 "Industry-guided Early Industrail Nation"
    DCS_industry_waste_regulation_idea_desc:0 "We are in the process of transitioning from a scavenging economy to an industrial one. We have invited industry leaders to put together a basic list of laws regarding industry and new ones are drafted as needed. Some would argue this is giving the fox the keys to the henhouse, but we disagree."
    DCS_no_waste_regulation_idea:0 "Unregulated Early Industrial Nation"
    DCS_no_waste_regulation_idea_desc:0 "We are in the process of transitioning from a scavenging economy to an industrial one. We refuse to put any restraints on economic progress, for the betterment of the economy. This has led to a rise in problems with public health as well as more than a few chemical fires, but they seem contained to lower income settlements."
    DCS_flexable_waste_regulation_idea:0 "Flexably Governed Early Industrial Nation"
    DCS_flexable_waste_regulation_idea_desc:0 "We are in the process of transitioning from a scavenging economy to an industrial one. The president has put together a list of rules relating to the dumping of industrial waste. Rule number one is regarded as the most important, it states that President Dave can override any rule for a business, so long as they have a letter of his approval."
    DCS_appalachian_tech_exports_idea:0 "Appalachian Tech Exports"
    DCS_appalachian_tech_exports_idea_desc:0 "Following our agreement with The Brotherhood, we send just about any valuable tech or pre-war advanced materials found in Northern Appalachia to The Lyons Brotherhood for their use and study."
    DCS_appalachian_tech_imports_idea:0 "Appalachian Tech Imports"
    DCS_appalachian_tech_imports_idea_desc:0 "Following our agreement with the people of The Capital Wasteland, they send us just about any valuable tech or pre-war advanced materials found in Northern Appalachia."
    DCS_guarding_water_caravans_idea:0 "Guarding Water Caravans"
    DCS_guarding_water_caravans_idea_desc:0 "Some of our militia are assigned to assisting water caravans from Project Purity. The loss of manpower is handily offset by the benefits to our settlments."
    DCS_funding_purifier_idea:0 "Funding Project Purity"
    DCS_funding_purifier_idea_desc:0 "We have devoted a sizable amount of our budget to ensuring Project Purity continues to run smoothly."
    DCS_regulators_guarding_water_caravans_idea:0 "Regulators Protecting Caravans"
    DCS_regulators_guarding_water_caravans_idea_desc:0 "Word has spread that Regulator kill-teams are hunting down anyone who dares attack a Project Purity caravan. We are already seeing a sizable drop in attacks!"
    DCS_guiding_water_caravans_idea:0 "Guiding Water Caravans"
    DCS_guiding_water_caravans_idea_desc:0 "Some seasoned caravan guards are being hired by us to ensure Project Purity caravans reach their destination safely and swiftly."
    DCS_tenpenny_assisting_purifier_idea:0 "Burke Assisting Project Purity"
    DCS_tenpenny_assisting_purifier_idea_desc:0 "Mr. Burke has arranged for some of his old contacts to help with Project Purity. Everyone knows these people are just Talon Company mercs, but nobody wants to say anything."
    DCS_water_rationing_idea:0 "Water Rationing"
    DCS_water_rationing_idea_desc:0 "Dave has instituted severe water rationing rules with exceptions for The Capital."
    DCS_regulator_citadel_idea:0 "Regulator Citadel"
    DCS_regulator_citadel_idea_desc:0 "Once the home of The Lyons Brotherhood of Steel, and before that the heart of the pre-war American military, The Citadel is now the new headquarters of the East Coast Republic Regulators. This central operations center and training ground has been a massive boon to our military as they seek to bring order to The Capital Wasteland and beyond."
    DCS_citadel_trading_post_idea:0 "Citadel Trading Post"
    DCS_citadel_trading_post_idea_desc:0 "Once a military base, now the heart of trade in The Capital Wasteland. The Citadel Trading Post is the place to go for the best deals on equipment, supplies or salvage fresh from the DC ruins. With nearby ports it is a convenient stop for traders along the coast as well!"
    DCS_colonial_subject_idea:0 "Colonial Subject"
    DCS_colonial_subject_idea_desc:0 "Our nation is nothing more than a colonial subject of The East Coast Republic. We ship our resources, men, and the fruits of our industry to The Capital Wasteland in return for what? Tenpenny thinks himself king of these lands and anyone that speaks up is taken away by Colonial Chief Gustavo."
    DCS_colonial_subject_2_idea:0 "Colonial Subject"
    DCS_colonial_subject_2_idea_desc:0 "Our nation is nothing more than a colonial subject of The East Coast Republic. We ship our resources, men, and the fruits of our industry to The Capital Wasteland in return for what? Tenpenny thinks himself king of these lands and anyone that speaks up is taken away by Colonial Chief Gustavo."
    DCS_capitals_brightest_idea:0 "The Capital's Best and Brightest"
    DCS_capitals_brightest_idea_desc:0 "The Rivet City science team is collaborating with our scientists."
    DCS_synergenic_cooperation:0 "Synergenic Cooperation"
    DCS_synergenic_cooperation_desc:0 "Working with our brothers on Project Purity has led to benefits for everyone involved. Our alliance really is greater than the sum of its parts"
    DCS_naval_trade_springboard_idea:0 "Naval Springboard"
    DCS_naval_trade_springboard_idea_desc:0 "With the ports and naval experience of The Delmarva Settlements, we are able to expand the reach of our caravans far beyond what most traders thought would be possible."
    DCS_fresh_citrus_idea:0 "Fresh Citrus"
    DCS_fresh_citrus_idea_desc:0 "Thanks to trade with the more tropical coasts, we are able to access fruits most wastelanders thought were just Mentat flavors. Since we began importing oranges, cases of scurvy in The Capital Wasteland are down 49%!"
    DCS_appalachian_trade:0 "Appalachian Trade"
    DCS_appalachian_trade_desc:0 "Trade between The Capital Wasteland and Northern Appalachia has proven a boon to both regions quality of life"

###Leaders###

    DCS_lucas_simms_name:0 "Lucas Simms"
    DCS_lucas_simms_desc:0 "Growing up in Megaton taught Lucas Simms from a young age just what it took to survive in the wasteland. Once he reached adulthood he quickly appointed himself the sheriff of Megaton, willing to do anything necessary to help the town survive and prosper. Though an intimidating figure, Simms' friendly nature wins over the favor of the people he protects."
    DCS_roe_name:0 "Uncle Roe"
    DCS_uncle_roe_desc:0 "Ernest 'Uncle' Roe is a born merchant that founded the settlement of Canterbury Commons at the age of 20 with caps he earned as a trader. Since then he grew the small trading post into an essential stop on the Capital Wasteland caravan circuit. Many consider him the founder of The DC Settlements because of his role in bringing the settlements together to deal with the raider threat in The Bethesda Ruins"
    DCS_tenpenny_name:0 "Allistair Tenpenny"
    DCS_tenpenny_desc:0 "Allistair Tenpenny set out from the ruins of Great Brittain during his early years to find his fortune in The Capital Wasteland. It is safe to say he found it. He owns one of the most sought after pieces of realestate in The Capital Wasteland and spends most of his days drinking, fucking and shooting at anything that he feels like from his perch atop Tenpenny Tower. Though nobody would say it, some wonder if his right-hand-man Mr. Burke is the real brains behind Tenpenny's endevors."
    DCS_dave_name:0 "Dave"
    DCS_dave_desc:0 "Dave spent his youth as a mercenary in The Capital Wasteland before returning home to his despot father's 'kingdom of tom'. Like any true patriotic American, Dave adhored monarchies and deposed his father, founding The Republic of Dave. In the years since he has led a successful democracy, which is a rare find in the wastes. Now he is leading a much larger democracy. Can Dave's ideals of freedom and democracy scale?"
    DCS_council_name:0 "The DC Settlement Council"
    DCS_settlement_council_desc:0 "The DC Settlements Council is made up of the leaders of different settlements in The Capital Wasteland. Though they have only had one official meeting, to establish The DC Settlements after a successful joint-attack on a raider stronghold a few years ago, the continued success of the settlements has them meeting again soon to discuss current issues as well as the possibility of a chairperson overseeing the confederation."
    DCS_hamlin_name:0 "Hannibal Hamlin"
    DCS_AMATA_NAME:0 "Amata Almodovar"
    DCS_BROWN_NAME:0 "Moira Brown"
    DCS_LESKO_NAME:0 "Doctor Lesko"
    DCS_BURKE_NAME:0 "Mr Burke"
    DCS_DAVE_NAME:0 "Dave"
    DCS_JESSICA_NAME:0 "First Lady Jessica"
    DCS_KING_NAME:0 "Evan King"
    DCS_PAPPY_NAME:0 "Pappy"
    DCS_RED_NAME:0 "Red"
    DCS_SIERRA_NAME:0 "Sierra Petrovita"
    DCS_VANCE_NAME:0 "Vance"
    DCS_dashwood_minister_name:0 "Herbert Daring Dashwood"
    DCS_agatha_minister_name:0 "Agatha"
    DCS_brunswick_minister_name:0 "Colin Brunswick"
    DCS_MARGOT_minister_name:0 "§YM.A.R.Go.T§!"
    DCS_MOTHMAN_NAME:0 "The Wise Mothman"
    DCS_MOTHMAN_DESC:0 "Though Dave may still be acting as President of The Republic, his mind has been taken by The Mothman. Under cover of darkness, the creature was relocated to The Capital Wasteland and now directs the course of The Republic. Wait... is that why Dave keeps asking for lightbulb shipments?"
    DCS_REECE_NAME:0 "Reece Roberts"
    DCS_REECE_DESC:0 "Reece Roberts is a bit of a nut. He's appeared almost out of nowhere and taken up the fight for The United Settlements of Dave like nobody else. Some say that with Reece at his side, Dave could conquer the entire pre-war United States."

###National Focuses###
DCS_nf_a001:0 "The Merchant Empire"
DCS_nf_a001_desc:0 "Years ago Uncle Roe began convincing the big caravans of The Capital Wasteland to work together, which ended up providing benefits for all involved. He didn't know this would be the first spark that would lead to The DC Settlements uniting."
DCS_nf_a002:0 "The Bethesda Ruins"
DCS_nf_a002_desc:0 "Cooperation between the traders was going well until raiders moved into the old Bethesda ruins. The caravans suffered and hired mercs proved ineffective. The traders were going to need some help."
DCS_nf_a003:0 "The First Council"
DCS_nf_a003_desc:0 "Following the success of the joint-settlement effort to drive raiders out of the Bethesda ruins, several settlement leaders came together to discuss future cooperation. The words spoken here would lay the foundation for all that The DC Settlements stood for."
DCS_nf_a004:0 "The Second Council"
DCS_nf_a004_desc:0 "Despite the daily problems of life in The Capital Wasteland, the last few years have been relatively kind to the DC Settlements. Raiders have retreated to the south and far north, The Brotherhood is dealing with mutants and trade is flowing. Another meeting of settlement heads has been put together to discuss the steps for further unification."
DCS_nf_a005:0 "Big Trouble in Big Town"
DCS_nf_a005_desc:0 "The settlement of Big Town has been dealing with constant raider and super mutant attacks. They are begging the other settlements for aid of any kind."
DCS_nf_a006:0 "Make a Stand!"
DCS_nf_a006_desc:0 "If we let the mutants and raiders ravage one settlement, it won't be long before they come for another one. We will stand with Big Town and drive off these threats!"
DCS_nf_a007:0 "Take in Bigtowners"
DCS_nf_a007_desc:0 "Big Town has no real resource value and is in a difficult to defend position. We should evacuate everyone that lives there and welcome them into other settlements."
DCS_nf_a008:0 "Battle of Germantown"
DCS_nf_a008_desc:0 "We have tracked the mutants that keep attacking Big Town to some kind of mutant stronghold in the old Germantown police station. If we are to hold this settlement, we need to clear those mutants out."
DCS_nf_a009:0 "Big Changes"
DCS_nf_a009_desc:0 "Big Town may not have great soil or salvage, but it does have the potential to become a solid industrial settlement with the right equipment and supplies."
DCS_nf_a010:0 "Growing Up"
DCS_nf_a010_desc:0 "Despite being adults, the people of Big Town still hung on to a lot of their ways from Little Lamplight. It will require some effort to integrate them into life in other settlements."
DCS_nf_a011:0 "Little Salvage"
DCS_nf_a011_desc:0 "Big Town may not have had a lot of resources, but if nobody is living there anymore we can strip the buildings and grab anything left behind."
DCS_nf_a012:0 "The Superhuman Gambit"
DCS_nf_a012_desc:0 "Canterbury Commons has come under attack by a madwoman who controls an army of ants. If that wasn't bad enough, the local mechanic seems to have lost his mind as well and now thinks himself a superhero called 'The Mechanist'. Their fights usually don't leave much damage, it is only a matter of time before things boil over."
DCS_nf_a013:0 "Help The Hero"
DCS_nf_a013_desc:0 "The Mechanist may be confused, but he has good intentions at heart. We should help him finally defeat his foe."
DCS_nf_a014:0 "A Queen's Tribute"
DCS_nf_a014_desc:0 "The Mechanist's army of robots is a potential danger far greater than a few bugs. We should offer him up to the Antagonzier in exchange for her leaving."
DCS_nf_a015:0 "A Hero's Thanks"
DCS_nf_a015_desc:0 "The Mechanist is grateful for our help in defeating The Antagonizer. Due to the lessened ant-threat and as a token of thanks, he has given us some metal helpers to 'stop evildoers'"
DCS_nf_a016:0 "The Hero's Lair"
DCS_nf_a016_desc:0 "The Mechanist's lair as he calls it, is actually an old robot repair center. We can restore some of the machinery and use the place to fix up more than just his robotic allies."
DCS_nf_a017:0 "Looting the Lair"
DCS_nf_a017_desc:0 "With The Mechanist gone, his old hideout sits empty and ready for us to make actual use of the salavage inside."
DCS_nf_a018:0 "Scavenging Center"
DCS_nf_a018_desc:0 "The repair center had plenty more than a few boxes of scrap and some rusted robots. It will take years to go through all this salvage, and we will make use of every piece of scrap."
DCS_nf_a019:0 "Family Troubles"
DCS_nf_a019_desc:0 "Arefu is reporting increasing troubles with a group calling themselves 'the family'. If we don't step in, there may not be an Arefu left before long."
DCS_nf_a020:0 "Take out the Trash"
DCS_nf_a020_desc:0 "The Family are nothing more than bloodthirsty freaks that need to be put town. We will launch an assault on their hideout"
DCS_nf_a021:0 "Deals in The Dark"
DCS_nf_a021_desc:0 "The Family may be strange, and some are not ok with their methods, but they are still ok people. Through fair dealings we can settle things between The Family and Arefu."
DCS_nf_a022:0 "Expand to Meresti"
DCS_nf_a022_desc:0 "The Family has been wiped out, but the people of Arefu still report seeing strange figures wandering around Northwest Seneca Station at night."
DCS_nf_a023:0 "A New Underworld"
DCS_nf_a023_desc:0 "The metro tunnels near Arefu have a lot of positives once you look past the lack of sunlight, dankness and cave of mirelurks nearby. We can fix the place up as a nice home for ghouls that could not make their way through DC but also don't need to be living in our settlements."
DCS_nf_a024:0 "The Meresti Sanctuary"
DCS_nf_a024_desc:0 "Since our dealings with The Family more people like them have flocked to Meresti Metro Station looking for more of their kind. The place has turned into a veritable stronghold for The Capital Wasteland's outcasts and weirdos."
DCS_nf_a025:0 "Channeling Bloodlust"
DCS_nf_a025_desc:0 "The Family has a number of capable fighters that are chomping at the bit to get out there and coat a battlefield in blood. Better they divert that energy and desire at raiders than us."
DCS_nf_a026:0 "The Election"
DCS_nf_a026_desc:0 "Votes in settlements all across The Wasteland are being counted and it looks like our first Speaker for The DC Settlement Council will be decided, but what's going on with Dave?"
DCS_nf_b001:0 "A Touch of Class"
DCS_nf_b001_desc:0 "The people of The Capital wasteland have wisely chosen one of the most successful among them to be their new leader. It is only natural that they should see what great heights Tenpenny has risen to and hope he will lift the rest of them up out of the muck."
DCS_nf_b002:0 "Change of Plans?"
DCS_nf_b002_desc:0 "In light of Tenpenny becoming the new leader of The DC Settlements, maybe blowing up one of the largest towns in the area isn't the best idea."
DCS_nf_b003:0 "Call it Off!"
DCS_nf_b003_desc:0 "Tenpenny would simply die of embarrassment if Megaton was blown up on his watch. No, another solution will need to be found for fixing up that landscape."
DCS_nf_b004:0 "Proceed as Planned"
DCS_nf_b004_desc:0 "That eyesore has still got to go. In time the people will calm down about it, so long as the correct parties are blamed."
DCS_nf_b005:0 "Megaton Beautification"
DCS_nf_b005_desc:0 "If we can't blow up Megaton, we can do something to make it less of an eyesore right?"
DCS_nf_b006:0 "MegaTen"
DCS_nf_b006_desc:0 "It took some time and a considerable amount of resources, but Megaton is finally a settlement Tenpenny can be happy to see on the horrizon. Surely the Wastelanders will also appreciate the effort into renovating Megaton into the newly named MegaTen."
DCS_nf_b007:0 "Sabre Rattling"
DCS_nf_b007_desc:0 "Blaming raiders for The Megaton Disaster has turned a potential nightmare into a boon for recruiting. Wastelanders across our territory are lining up to pick up a rifle and stick it to the raiders who 'killed' their friends and loved ones."
DCS_nf_b008:0 "Megaton Memorial"
DCS_nf_b008_desc:0 "Tenpenny has generously donated caps from his own pocket to have a memorial constructed for those that died in the Megaton explosion. What a swell guy."
DCS_nf_b009:0 "Ghouls in the Tower?"
DCS_nf_b009_desc:0 "A zombie named Roy Philips and some other ghouls have been begging to be let into Tenpenny Tower for weeks now. Something needs to be done."
DCS_nf_b010:0 "No Zombies Allowed"
DCS_nf_b010_desc:0 "These ghouls suffer a painful life could turn feral any day. Putting them out of their misery is a mercy to them and it keeps us safe."
DCS_nf_b011:0 "Ghoul Laws"
DCS_nf_b011_desc:0 "Ghouls will have to accept that most of The Capital Wasteland does not like them. They smell, they pose a danger of turning feral and they aren't great to look at. If they want to stay in our towns they will have to abide by some new rules."
DCS_nf_b012:0 "Fort Constantine"
DCS_nf_b012_desc:0 "That recent dust-up with The Enclave has reminded Tenpenny that he had some copies of old keys to a nearby fort tucked away. Sending some people to check it out could be worthwhile."
DCS_nf_b013:0 "Treasures of Constantine"
DCS_nf_b013_desc:0 "Fort Constantine had a sizable stockpile of weapons and armor that could make even The Brotherhood a little envious. Lets just hope not too envious."
DCS_nf_b014:0 "Tower Renovations"
DCS_nf_b014_desc:0 "Tenpenny Tower has always upheld the most stringent standards of quality and class. That being said, a little tax money could help make the perfect home even better"
DCS_nf_b015:0 "The Capital's Elite"
DCS_nf_b015_desc:0 "Tenpenny Tower has always attracted the classiest and wealthiest inhabitants from across The Capital Wasteland. But news of the recent renovations is causing an even bigger drive than ever."
DCS_nf_b016:0 "Supply & Demand"
DCS_nf_b016_desc:0 "With demand for homes in Tenpenny Tower ever increasing, management has the opportunity to raise prices to match demand."
DCS_nf_b017:0 "Tenpenny City"
DCS_nf_b017_desc:0 "Those who can't get in to Tenpenny Tower still want to live around the tower. At this rate we will have a full shanty-town on our hands. We will instead divert resources so we can at least have a nice town around our beautiful tower. Otherwise we could see rental prices drop."
DCS_nf_b018:0 "Uncle of our Nation"
DCS_nf_b018_desc:0 "Uncle Roe was among the chief voices for bringing our settlements together. It made perfect sense that he should be chosen lead us into a brighter future."
DCS_nf_b019:0 "The Wasteland Survival Guide"
DCS_nf_b019_desc:0 "Moira Brown of Megaton is trying to write a book about suriving in The Wasteland and has put out the call that she is looking for assistants to help with the field research required."
DCS_nf_b020:0 "Chapter One"
DCS_nf_b020_desc:0 "The first chapter of the book handles scavenging for food, dealing with radiation and traversing a minefield. All of these things are important for a wastelander to know."
DCS_nf_b021:0 "Chapter Two"
DCS_nf_b021_desc:0 "The second chapter of the book deals mostly with wasteland threats. Dealing with molerats, mirelurks and just general bodily injury are all important things for our people to understand."
DCS_nf_b022:0 "Chapter Three"
DCS_nf_b022_desc:0 "The last chapter of the guide is more about things for wastelanders to learn from the past. Studying the success of Rivet City, repurposing old robots and digging for lost wisdom."
DCS_nf_b023:0 "Improve Caravan Trails"
DCS_nf_b023_desc:0 "Caravan trails have developed over the years just through repeated use and following the path of least resistance. This less than perfect method of travel could be improved with a little work."
DCS_nf_b024:0 "Restoring Canterbury"
DCS_nf_b024_desc:0 "While undamaged by the bombs, Canterbury Commons fell apart over the last two centuries. We will need to fix a few things if this is to be our capital."
DCS_nf_b025:0 "Springvale Bazar"
DCS_nf_b025_desc:0 "Springvale Elementary has a strategic location just outside one of The Capital's most central settlements. Before raiders moved in, traders would on occasion stop there to rest for the night. Uncle Roe sees an opportunity to take back the building and turn it into a trading hub."
DCS_nf_b026:0 "Invest in Caravans"
DCS_nf_b026_desc:0 "Uncle Roe hasn't forgotten about the various caravans that have been instrumental in the foundation of The DC Settlements. Now that Roe is in charge, this partnership can grow."
DCS_nf_b027:0 "Trade on the Bay"
DCS_nf_b027_desc:0 "Uncle Roe has a rapport with the leadership of The Dover Traders built up through years of cooperation and trade. This can be used to get us unique deals."
DCS_nf_b028:0 "The Trade Capital"
DCS_nf_b028_desc:0 "Our recent moves are already paying off in terms of drawing more trade to The Capital Wasteland. With some more changes who knows what could happen?"
DCS_nf_b029:0 "Standardize Caravan Gear"
DCS_nf_b029_desc:0 "Caravans have mostly gotten by with whatever they can scavenge or buy. Uncle Roe wants us to produce standardized caravaning equipment and has already narrowed down to a few options. Now we just need to make a choice."
DCS_nf_b030:0 "Agatha's Song"
DCS_nf_b030_desc:0 "Agatha is an elderly widow that lives out in the wasteland providing company and music to passing traders for goods. Uncle Roe wants to meet with her after hearing so many stories."
dcs_unlocks_agatha_advisor_tt:0 "This will unlock §YAgatha§! as an advisor"
DCS_nf_b031:0 "Subsidize Caravan Guards"
DCS_nf_b031_desc:0 "Caravan guards are essential to our economy and many of them make good scouts or soldiers when the time comes for it. We could set some taxes aside to help caravans attract better talent."
DCS_nf_b032:0 "Caravan Guard Drill Instructors"
DCS_nf_b032_desc:0 "If anyone knows life on the wastes and how to make due with what you have on your back, it's a caravan guard. Veteran guards too old or injured to make many more trips will be hired to train our militias."
DCS_nf_b033:0 "Wasteland Sheriff"
DCS_nf_b033_desc:0 "Lucas Simms was an obvious choice for leader of The DC Settlements. He led one of the largest towns in The Capital wasteland for years and defended it against countless raider attacks. Now he'll bring that kind of safety and frontier justice to the rest of the wastes."
DCS_nf_b034:0 "Fortify Megaton"
DCS_nf_b034_desc:0 "As the capital of The DC Settlements, Megaton is bound to attract more attention from raiders and our enemies. The walls will need to be expanded and fixed up to stand up against these growing threats."
DCS_nf_b035:0 "Water System Repairs"
DCS_nf_b035_desc:0 "The water purifiers have always been in rough shape, but with our increasing population it is a can we can no longer kick down the road. Some serious repairs need to be made."
DCS_nf_b036:0 "Springvale Settlements"
DCS_nf_b036_desc:0 "Megaton's improvements and increased patrols in the area are making outlying regions safer as well. People are flocking to Springvale to build new lives for themselves."
DCS_nf_b037:0 "Springvale Boot Camp"
DCS_nf_b037_desc:0 "Springvale Elementray has been cleared of raiders and ants for some time. Simms wants to turn the place into a barracks and training center for our militia."
DCS_nf_b038:0 "Militia Expansion"
DCS_nf_b038_desc:0 "The raiders may have been beaten back for now, but they always come back. We will need more men if we are to be ready."
DCS_nf_b039:0 "Settlement Defense Training"
DCS_nf_b039_desc:0 "Many settlement guards have little training beyond shooting at some tin cans. Experienced guards will be sent along a circuit to train up new guards and make sure they're ready to fend off more than a couple mole rats."
DCS_nf_b040:0 "Junkyard Outpost"
DCS_nf_b040_desc:0 "A massive junkyard sits outside of DC and could be a good source of scrap. We will just need to set up a permenant outpost to make sure no raiders set up shop instead."
DCS_nf_b041:0 "Regulator Neighbors"
DCS_nf_b041_desc:0 "The Regulators have their main base a short ways away from the scrapyard. While it has been a while since Lucas Simms was a member of their group, they still have ties and this group's leader wants to have a meeting."
DCS_nf_b042:0 "Regulator Funding"
DCS_nf_b042_desc:0 "The Regulators roam the wastes dispensing justice where settlement guards can't reach. Diverting some resources to help them in this fight is good for everyone."
DCS_nf_b043:0 "Regulator Training"
DCS_nf_b043_desc:0 "Regulators rarely live long enough to retire, but it does happen. Those too old or injured to continue their duties will be welcomed to train our militia on wasteland combat and survival."
DCS_nf_b044:0 "Regulator Integration"
DCS_nf_b044_desc:0 "The Regulators were initially apprehensive about The DC Settlements, but our recent actions and support has warmed them up to us. The group has agreed to formally integrate into our militia so long as they are able to continue their mission of ridding the wasteland of evil men."
DCS_nf_b045:0 "Defuse The Bomb"
DCS_nf_b045_desc:0 "Asking any random guy that happens into Megaton for help isn't going to cut it. We are now sending a message across the wasteland that we need someone to disarm this damn thing already!"
DCS_nf_b046:0 "Rumors of Sabotage"
DCS_nf_b046_desc:0 "You found WHAT attached to the bomb?"
DCS_nf_b047:0 "Tenpenny's Treason"
DCS_nf_b047_desc:0 "A saboteur was caught trying to tamper with the bomb in Megaton. After a lengthy interrogation it was discovered that Alistair Tenpenny was behind the plot to destroy the town. The militia is being gathered to bring him in, but the tower's guards are on his personal payroll. He won't go quietly."
DCS_nf_b048:0 "Reform Tenpenny Tower"
DCS_nf_b048_desc:0 "With Tenpenny dealt with, someone new needs to lead the settlement."
DCS_nf_b049:0 "Our Great President"
DCS_nf_b049_desc:0 "With the traitors that rigged the election against Dave stopped, our great president is ready to lead us into a glorious future."
DCS_nf_b050:0 "Traitors to the Republic"
DCS_nf_b050_desc:0 "The enemies of The DC Settlements are innumerable, and some even come from within. They must be punished"
DCS_nf_b051:0 "The Loyal Ones"
DCS_nf_b051_desc:0 "Many stood with Dave against the corrupt and rigged election. Now it is time to reward those that are clearly loyal with positions they deserve."
DCS_nf_b052:0 "School of Dave History"
DCS_nf_b052_desc:0 "The youth of the wasteland should learn about the great deeds of our president. Schools in the wastes are being given updated materials they must teach."
DCS_nf_b053:0 "'Free' Elections"
DCS_nf_b053_desc:0 "People worry that the recent rigged election would shake The President's faith in democracy. Of course it won't. We will have elections again in time, but naturally to prevent another rigged election, only citizens of The Republic of Dave can vote. Anyone else in the wasteland can go through the citizenship process though!"
DCS_nf_b054:0 "The Republican Guard"
DCS_nf_b054_desc:0 "Those that stood with Dave are being reorganized into the Republican Guard. They will ensure peace and safety for all citizens."
DCS_nf_b055:0 "Institute a Draft"
DCS_nf_b055_desc:0 "There are enemies everywhere, and without an army to stop them we will be overwhelmed."
DCS_nf_b056:0 "Arm the Military"
DCS_nf_b056_desc:0 "Yes, the president supports the right to own weapons, but the republic needs them to protect us!"
DCS_nf_b057:0 "Long Arm of The Law"
DCS_nf_b057_desc:0 "The reach of President Dave is long. Raiders, terrorists and traitors better watch out!"
DCS_nf_b058:0 "The Presidential Guard"
DCS_nf_b058_desc:0 "After multiple attempts on President Dave's life, a few loyal soldiers are being brought together to form a special presidential guard."
DCS_nf_b060:0 "Thank You President Dave"
DCS_nf_b060_desc:0 "We owe a lot to our great president. Under his guidance, our nation is better than it has ever been!"
DCS_nf_b059:0 "Collect Taxes"
DCS_nf_b059_desc:0 "Dave is draining caps from the collective treasury. He insists they are going to important matters of state including rebuilding from the war. He wouldnt lie would he?"
DCS_nf_b061:0 "Rebuild From The War"
DCS_nf_b061_desc:0 "The Republic of Dave suffered greatly during the war to root out the traitors that rigged the election. Of course some of the new taxes are going to repairing the damage!"
DCS_nf_b062:0 "Develop the Republic"
DCS_nf_b062_desc:0 "The Republic of Dave is our capital and as such deserves to be our industrial heart. We will still have some caps left over from the taxes for the other important stuff"
DCS_nf_b063:0 "Presidential Fortress"
DCS_nf_b063_desc:0 "We can't have our great President sitting in a rusty shack where anybody with a mininuke can assassinate him. Spend the last of the caps making sure our great leader is safe!"
DCS_nf_c001:0 "The Temple of The Union"
DCS_nf_c001_desc:0 "Slavery is a common fact of life in The Wasteland, but a few runaway slaves have taken a stance against it. They now come to our government asking for help in their fight!"
DCS_nf_c002:0 "Asylum for Runaways"
DCS_nf_c002_desc:0 "We will take in any slaves that find a way to escape their masters. They will be safe behind our settlement walls."
DCS_nf_c003:0 "Disrupt Slaver Caravans"
DCS_nf_c003_desc:0 "Slavers walk along the same trails as our legitimate traders. We can't allow this to continue."
DCS_nf_c004:0 "The Freedom Militia"
DCS_nf_c004_desc:0 "Now that we have proven ourselves serious about dealing with the slaver problem, freed slaves are flocking to our banner. We have already formed a special detachment of freed men and women that are itching to take the fight to their former oppressors."
DCS_nf_c005:0 "Offer Material Support"
DCS_nf_c005_desc:0 "We wish we could do more to help these people, but selling them weapons and equipment at a discounted price is the best we can do."
DCS_nf_c006:0 "Training Support"
DCS_nf_c006_desc:0 "If we can't hep them in their fight, we may as well help them learn how to fight for themselves."
DCS_nf_c007:0 "The Meresti Reailroad"
DCS_nf_c007_desc:0 "Not everone in the DC Settlements agrees we are doing enough to help these runaway slaves. A few settlements are doing more, but this could mean trouble."
DCS_nf_c008:0 "The Lincoln Memorial"
DCS_nf_c008_desc:0 "Slavers set up camp at The Lincoln Memorial waiting for Hannibal Hamlin, the leader of The Temple of The Union. We will help them drive the slavers out."
DCS_nf_c009:0 "Saving Paradise"
DCS_nf_c009_desc:0 "Paradise Falls has been home to slavers for as long as anyone can remember. Every day dozens of unfortunate souls flow through the place, often sold into a fate worse than death. Unless we drive this cancer from our lands they will always be a threat."
DCS_nf_c010:0 "Northern Bandits"
DCS_nf_c010_desc:0 "The Harrisburg bandits may not raid into The Capital Wasteland much, but even one attack on our settlements is one too many."
DCS_nf_c011:0 "Johnstown's Thanks"
DCS_nf_c011_desc:0 "Johnstown lived under the thumb of The Harrisburg bandits for decades and are praising us for rescuing them from. Lets build on this."
DCS_nf_c012:0 "The Pitt Question"
DCS_nf_c012_desc:0 "The Pitt has been the end of the line for many slaves and raiders in the surrounding wasteland. There are rumors of some recent changes in the place, but we need to see that for ourselves."
DCS_nf_c013:0 "The Raiders"
DCS_nf_c013_desc:0 "The various raider gangs of The Capital Wasteland retreated to the south as we became more organized. Unfortunately, it seems they have also gotten stronger in that time. We can't let them grow or all our work may be for nothing."
DCS_nf_c014:0 "Welcomed as Heroes"
DCS_nf_c014_desc:0 "We have driven the raiders from the southwest. The few settlements that survived under their constant harassing are eagerly joining up with us!"
DCS_nf_c015:0 "Acquired Tastes"
DCS_nf_c015_desc:0 "The radiers to our south have changed quite a lot in the last few years. They've abandoned their bloodthirsty ways and instead gone into the meat business, and that molerat jerky is damn good. We should stay friendly with them or they may return to their old ways if business goes south."
DCS_nf_c016:0 "Pitt Done Changed?"
DCS_nf_c016_desc:0 "Nah, Pitt the same, just got more fierce"
DCS_nf_c017:0 "Mutant Hunting"
DCS_nf_c017_desc:0 "The super mutants have always been a problem. Even with The Brotherhood killing them in downtown DC, we have too many to deal with out here in the wastes. Some hunting parties need to be organized to cut down their numbers."
DCS_nf_c018:0 "Find the Source"
DCS_nf_c018_desc:0 "The mutans have to be coming from somewhere right? If we can figure that out, maybe we can stop them."
DCS_nf_c019:0 "The Mutant Nest"
DCS_nf_c019_desc:0 "We found that The Super Mutants are coming from some old caverns to the west. Before we send an army to take the place down, we need to make sure the area's current occupants don't shoot us in the back."
DCS_nf_c020:0 "Little Lamplight"
DCS_nf_c020_desc:0 "On our way into the caves to fight The Mutants our army was stopped by a settlement of little kids. They aren't sure what to do next."
DCS_nf_c021:0 "Destroy Vault 87"
DCS_nf_c021_desc:0 "With safe passage to the vault secured, we now need to fight our way to the heart of the place and destroy it."
DCS_nf_c022:0 "Darkest Hour"
DCS_nf_c022_desc:0 "The Enclave are flooding The Capital Wasteland and even with The Brotherhood fighting by our side it is not sure that we will survive this. Dark times are ahead, but our people know this is a struggle for our very survival."
DCS_nf_c023:0 "We.. Won?"
DCS_nf_c023_desc:0 "When we first saw vertibirds landing with power armored troops many thought it was the end. Against all odds we survived our struggle with The Enclave. Now we need to turn our attention to rebuilding."
DCS_nf_c024:0 "Fort Banister"
DCS_nf_c024_desc:0 "The old Talon Company fort was a tough nut to crack, but it is now ours."
DCS_nf_c025:0 "Vault 101"
DCS_nf_c025_desc:0 "We know Vault 101 is just a short walk away from Megaton and it still has people inside it that have left before. It will take some doing to get the right equipment, but maybe we should see if they want to chat."
DCS_nf_c026:0 "Message of Peace"
DCS_nf_c026_desc:0 "The radio signal booster is tuned into the right frequency and we are ready to send a message to Vault 101. But what do we say?"
DCS_nf_c027:0 "Grayditch Expedition"
DCS_nf_c027_desc:0 "The settlement of Grayditch has gone... quiet. Even if they are all dead, we need to figure out what happened or any other settlement could be next."
DCS_nf_c028:0 "Old Fashioned Way"
DCS_nf_c028_desc:0 "The ants may breathe fire, but they are still just giant bugs. Send in the militia to deal with them."
DCS_nf_c029:0 "Bot Beats Bug"
DCS_nf_c029_desc:0 "Ant fire can't melt steel bots!"
DCS_nf_c030:0 "Lesko's Plan"
DCS_nf_c030_desc:0 "A scientist responsible for the bug problem in the firstplace now says he has a plan to stop it. We should let him try to clean up his mess."
DCS_nf_c031:0 "Lesko's Fate"
DCS_nf_c031_desc:0 "Even though it was an accident, many are calling for Dr. Lesko's blood. Should we give it to them?"
DCS_nf_c032:0 "Rebuilding Grayditch"
DCS_nf_c032_desc:0 "With the ant problem dealt with, Grayditch is ready to be resettled."
DCS_nf_c033:0 "Wheaton Armory"
DCS_nf_c033_desc:0 "A pre-war military depot is nestled within our territory. While the outsides have been scavenged to the bone, there are still plenty of locked doors to open."
DCS_nf_c034:0 "Delve Deeper"
DCS_nf_c034_desc:0 "News is spreading that the expedition to Wheaton Armory found an untouched warehouse of goods and even more locked doors beneath the surface. We should move quickly before this attracts unwanted attention."
DCS_nf_c035:0 "Sell It"
DCS_nf_c035_desc:0 "The Outcasts would make better use of most of this stuff than we would, and their pay is fair."
DCS_nf_c036:0 "Outcast's Bounty"
DCS_nf_c036_desc:0 "The Outcasts are willing to purchase more scavenged tech that our people find. Why not take advantage of this opportunity? After all, what do we need with a quantum harmonizer or photonoic resonation chamber?"
DCS_nf_c037:0 "Outcast Advisors"
DCS_nf_c037_desc:0 "The outcasts are considered cold and uncaring by many, and they are right. But, they know that when we are doing well we can bring them more tech. So, maybe we can convince them to give us some advice for the right payment."
DCS_nf_c038:0 "Keep It"
DCS_nf_c038_desc:0 "This fort is in OUR territory and WE found it. A couple outcasts won't change that"
DCS_nf_c039:0 "Continue Scavenging"
DCS_nf_c039_desc:0 "A lot of this stuff is rusted to hell, but a rusted pre-war AR is still a step up from a pipe rifle."
DCS_nf_c040:0 "Our New Fort"
DCS_nf_c040_desc:0 "This place sits in a pretty good spot to protect some of our territory. We should consider keeping some of our militia here."
DCS_nf_c041:0 "Organized Scavs"
DCS_nf_c041_desc:0 "Scavenging the DC Ruins has been a way of life for many ever since the bombs dropped. Unfortunately many scavs stick to themselves or small groups and die before they can sell their finds. We're going to try and organize scavenging runs with larger teams that are capable of dealing with the dangers of the ruins, and won't be wiped out by a single 200 year old trap."
DCS_nf_c042:0 "Corvega Factory"
DCS_nf_c042_desc:0 "The Corvega Factory is rumored to be in pretty good shape. We will send some guys to check it out and see what we can do with it."
DCS_nf_c043:0 "Search the Computers"
DCS_nf_c043_desc:0 "A car factory's computers should have information on how to build cars right?"
DCS_nf_c044:0 "RobCo Factory"
DCS_nf_c044_desc:0 "The old RobCo factory has been a place scavs check out for the odd robot part or two, but they always had to be careful to avoid the deadly robots that still roamed its halls. A team of well armed scavs could sweep the place though."
DCS_nf_c045:0 "Underground Storage"
DCS_nf_c045_desc:0 "The factory had a large underground warehouse that is supposedly full of spare parts and machines."
DCS_nf_c046:0 "Reopen the Plant"
DCS_nf_c046_desc:0 "Thanks to the security, scavengers never got into messing with the machinery of the plant. It may have been broken down by time, but between all the machines we should have enough parts to fix up one or two."
DCS_nf_c047:0 "MDPL-16"
DCS_nf_c047_desc:0 "This old power station near The Republic of Dave is just one of many that litter the landscape and should still work. We will send some guys to fix the place up and see where we can route power."
DCS_nf_c048:0 "The Olney Problem"
DCS_nf_c048_desc:0 "Our scavs to the north say the deathclaws at Old Olney are moving south."
DCS_nf_c049:0 "Reclaiming Olney"
DCS_nf_c049_desc:0 "Old Olney was a pretty decent settlement before the deathclaws moved in. If we have to deal with them anyway, we may as well resettle the town too"
DCS_nf_c050:0 "Banister Cache"
DCS_nf_c050_desc:0 "Fort Banister was the heart of Talon Company's operations. There should be some good equipment left behind."
DCS_nf_c051:0 "Vault 108"
DCS_nf_c051_desc:0 "The scav team was right, this is an honest to goodness vault. From the looks of things, we can just open the door and walk right in. What's the worst that could happen?"
DCS_nf_c052:0 "Stripped for Parts"
DCS_nf_c052_desc:0 "Vault 108 decayed beyond habitation decades ago. Now it's only good as a source of salvage and whatever we can pull off the old computers."
DCS_nf_d001:0 "The Aftermath"
DCS_nf_d001_desc:0 "The Enclave is defeated, in no small part thanks to The Brotherhood of Steel's help. Maybe we could work together more?"
DCS_nf_d002:0 "The Lyons Alliance"
DCS_nf_d002_desc:0 "We have formed a lasting alliance with The Brotherhood. This is the dawn of a new era for our people."
DCS_nf_d003:0 "Back to Normal"
DCS_nf_d003_desc:0 "The Brotherhood may battle super mutants and now be handing out free water, but we need to stand on our own."
DCS_nf_d004:0 "Selling Trophies"
DCS_nf_d004_desc:0 "Many of our soldiers looted trophies from Enclave soldiers they killed. From plasma pistols to power armor helmets, these pieces of equipment are surely powerful tools of war, but The Brotherhood would make better use of it than we can. We will trade The Brotherhood some of these smaller pieces of equipment in exchange for more substantial amounts of equipment."
DCS_nf_d005:0 "Brotherhood Training"
DCS_nf_d005_desc:0 "The Brotherhood drill instructors sent to help us prepare our men for the war were a godsend. If we can convince the Elder to let some of them stay it'd be even better."
DCS_nf_d006:0 "Treaty of Raven Rock"
DCS_nf_d006_desc:0 "The Enclave base of Raven Rock is under hundreds of tons of rubble and would take us decades to clear. It's also in an area swarming with yao gui and other wasteland dangers. The Brotherhood has offered to help us restore some factories in exchange for allowing them to occupy the place. Sounds like a good deal to me."
DCS_nf_d007:0 "Lifting us up"
DCS_nf_d007_desc:0 "Since first seeing vertibirds in action, many in The Capital Wasteland have become fascinated by flight. After a few failed flights nearly caused serious problems, The Brotherhood has agreed to give us a little boost."
DCS_nf_d008:0 "Better Together"
DCS_nf_d008_desc:0 "Our mutual cooperation with The Brotherhood has been beneficial for all involved. This lasting alliance will bring prosperity for years to come."
DCS_nf_d009:0 "Enclave Salvage"
DCS_nf_d009_desc:0 "Even though The Brotherhood took the deathclaw's share of the Enclave equipment left over from the war, we were able to secure a few things for ourselves."
DCS_nf_d010:0 "Lessons of War"
DCS_nf_d010_desc:0 "In fighting The Enclave, the soldiers that survived learned a lot about just how to battle power-armored soldiers. This could turn useful should we ever come up against someone like that."
DCS_nf_d011:0 "Black Devils"
DCS_nf_d011_desc:0 "The Enclave tech goes right over the heads of most of our scientists. There is no way we would ever be able to make more of this ourselves, but at least studying it can lead to some breakthroughs."
DCS_nf_d012:0 "Take Flight"
DCS_nf_d012_desc:0 "Vertibirds were a massive advantage The Enclave had, and while we still won in the end, it showed people that flying machines have serious value in wasteland warfare. It is time we take our first leaps into the skies."
DCS_nf_d013:0 "Standing Alone"
DCS_nf_d013_desc:0 "Even though The Brotherhood thought themselves above working with us, we have shown the scum of the wasteland that we are not scared farmers and scavs to be victimized. The DC Settlements is a strong nation standing together against any threats."
DCS_nf_d014:0 "Liberate The Pitt"
DCS_nf_d014_desc:0 "No matter who is currently in charge of The Pitt, it's clear the people there are suffering under the yoke of slavery. If we don't help them, nobody will."
DCS_nf_d015:0 "New Boss, Same Chains"
DCS_nf_d015_desc:0 "Over the years the people of The Pitt have lived under one horrible tyrant or another. Even if they lost their chains they would just fall victim to whatever raider boss rises next. We must save them from this cycle."
DCS_nf_d016:0 "Break The Chains"
DCS_nf_d016_desc:0 "The oppressors of The Pitt have been defeated, but something is wrong. Why do so many of these people look ill?"
DCS_nf_d017:0 "New Management"
DCS_nf_d017_desc:0 "We received word that someone crushed the raider gang ruling The Pitt. We should look into this"
DCS_nf_d018:0 "Brothers In The Pitt"
DCS_nf_d018_desc:0 "We are happy to see that our friends in The Brotherhood of Steel have taken control of The Pitt. However, they warn that there is some illness in the air they are working to cure and we should avoid the area or risk exposure. It's a good thing we have friends like them looking out for our people."
DCS_nf_d019:0 "New Steel Overlords"
DCS_nf_d019_desc:0 "Some ragged slaves have escaped from The Pitt and made their way into The Capital Wasteland. They do not paint a pretty picture for life in The Pitt under The Brotherhood."
DCS_nf_d020:0 "Fruits of Steel City"
DCS_nf_d020_desc:0 "Despite the dangers of the TDC illness in The Pitt, The Brotherhood with sealed enviromental suits and special precautions are keeping the city's industry alive while they search for a cure. They're even kind enough to share the benefits with us!"
DCS_nf_d021:0 "Against All Tyrants"
DCS_nf_d021_desc:0 "This Paladin ruling The Pitt clearly is no friend of ours. Whether the rest of The Brotherhood knows the extent of his actions or not, we need to stop it. Consequences be dammed!"
DCS_nf_d022:0 "The Mother Of Freedom"
DCS_nf_d022_desc:0 "The Pitt recently had a slave uprising. Hannibal Hamlin and The Abolitionists wish to go to The Pitt and broker an alliance."

DCS_nf_e001:0 "The Third Council"
DCS_nf_e001_desc:0 "A lot has changed in The Capital Wasteland since the council last met face to face. The chairperson is calling another meeting to discuss important matters."
DCS_nf_e002:0 "Laws Of The Wasteland"
DCS_nf_e002_desc:0 "While some laws are the same across most settlements, that is not always the case. Not to mention the issue of what happens outside a settlement's walls. There have been problems arising from these things."
DCS_nf_e003:0 "Protecting The Wasteland"
DCS_nf_e003_desc:0 "We are getting a little too big for scattered militias or vigilante groups to protect our territory. Is it time for a change?"
DCS_nf_e004:0 "An Industrial Revolution"
DCS_nf_e004_desc:0 "The surge of enclave tech, flowing clean water and forges of The Pitt are just a few things that are fueling rapid economic expansion in The DC Settlements. Hopefully the consequences of this 'industiral revolution' are not a disaster."
DCS_nf_e005:0 "Found The ECR"
DCS_nf_e005_desc:0 "We have grown well beyond just a coalition of settlements protecting each other. We have new laws, a standing army, and a growing industrial base."
DCS_nf_e006:0 "Mountains of Madness"
DCS_nf_e006_desc:0 "The mountains to our west have always been avoided by traders and travelers. But that doesn't mean we haven't noticed more rumblings in those hills than usual over the past few years"
DCS_nf_e007:0 "Establish Western Outposts"
DCS_nf_e007_desc:0 "We need to be prepared in case whoever is rampaging the hills to our west starts looking in our direction. The first step will be setting up permanent guardposts."
DCS_nf_e008:0 "Call on Our Brothers"
DCS_nf_e008_desc:0 "Surely our friends in The Brotherhood of Steel would be willing to take a look into whatever is kicking up dust in the mountains. After all, some of the recent people fleeing from there have been spotted with some nifty tech."
DCS_nf_e009:0 "March West"
DCS_nf_e009_desc:0 "We can not live in fear of the madmen to our west forever. If we are to be free of them, we must take the fight to them!"
DCS_nf_e010:0 "Saviors of North Appalachia"
DCS_nf_e010_desc:0 "The horrible cults and mad priests of Northern Appalachia have been put down by our military. The common people of these lands welcome us as liberators."
DCS_nf_e011:0 "Share The Load"
DCS_nf_e011_desc:0 "The Brotherhood is neither suited to, nor interested in, governing a bunch of settlements in hills. If we don't step in, they may just take what's of value and leave the place vulnerable to raiders. We could offer to take over administration and just send them anything we find that may be of interest."
DCS_nf_e012:0 "Our Shared Values"
DCS_nf_e012_desc:0 "The people of Green Mountain are a lot like us. They wish to live their lives in peace and fight hard to keep raiders at bay. Perhaps we could work together and form something greater than the sum of our parts."
DCS_nf_e013:0 "Relief, at a Discount"
DCS_nf_e013_desc:0 "The plight of the people of the recently saved territories does not fall on deaf ears. Uncle Roe has organized the caravans of The Capital Wasteland to send them aid in the form of food and medicine, at affordable prices!"
DCS_nf_e014:0 "Expanding Caravan Trails"
DCS_nf_e014_desc:0 "The continued trade between Northern Appalachia and The Capital Wasteland has led to the development of several new caravan trails."
DCS_nf_e015:0 "Regulators Branch Out"
DCS_nf_e015_desc:0 "With the sudden power vacuum in the hills of Northern Appalachia, there are bound to be dastardly villians taking advantage. That is why The Regulators are sending some of their number to drum up recruitment and take the fight to these predators!"
DCS_nf_e016:0 "Regulator Fallon"
DCS_nf_e016_desc:0 "The former leader of Green Mountain, thought killed when the settlement fell, carried on the fight far up in the hills. It took some convincing, but he's realized The Regulators share a lot of his values, and donned a badge."
DCS_nf_e017:0 "Mountain Monsters"
DCS_nf_e017_desc:0 "There have been tales of unusual creatures lurking in the hills and woodlands of Appalachia stretching back well before The Great War. Our great president has his heart set on killing one and having it's head mounted on his office wall."
DCS_nf_e018:0 "Closing In"
DCS_nf_e018_desc:0 "These creatures evaded humans for years for a reason, but they never came up against President Dave. He is hot on the trail of one of these cryptids."
DCS_nf_e019:0 "The Appalachian Colony"
DCS_nf_e019_desc:0 "Tenpenny has little interest in the hills to our west beyond what of value can be pulled from them."
DCS_nf_e020:0 "Suppress Unruly Colonists"
DCS_nf_e020_desc:0 "The people living in our new colony complain that it isn't fair they give us resources and taxes but aren't represented in the council. It's nothing Gustavo can't handle if he's given more men."
DCS_nf_e021:0 "Militia Cooperation"
DCS_nf_e021_desc:0 "The leaders of our army are meeting with the leaders of Green Mountain to compare strategies and see what we can learn from each other."
DCS_nf_e022:0 "Railguns For Regulators"
DCS_nf_e022_desc:0 "The Regulators have been hitting it off really well with the Green Mountain Militia. They've gotten along so much, that Green Mountain insisted they bring a few crates of Gauss Rifles and some schematics with them when they return to The Capital Wasteland."
DCS_nf_e023:0 "The Appalachian Agreement"
DCS_nf_e023_desc:0 "Thanks to his expert negotiation skills, Uncle Roe has managed to work out an agreement with Green Mountain to ensure trade cooperation."
DCS_nf_e024:0 "Growing Traderoutes"
DCS_nf_e024_desc:0 "The continued trade between Northern Appalachia and The Capital Wasteland has led to the development of several new caravan trails."
DCS_nf_e025:0 "The Susquehuh?"
DCS_nf_e025_desc:0 "The Susquehanna River formed the eastern border of The Capital Wasteland, and raiders just to our north and northeast kept many from going out that way. With Harrisburg dealt with, and our military stronger than ever, maybe we should take a look and see what goes on just across that river."
DCS_nf_e026:0 "Welcome The Amish"
DCS_nf_e026_desc:0 "The people of Hershey are hardworking craftsmen and traders. Much like the settlers of The Capital Wasteland, they are good people that have had to suffer raiders and finally stood up to them. They would be a welcome addition to this Republic we are building."
DCS_nf_e027:0 "Aid The Amish"
DCS_nf_e027_desc:0 "The people of Hershey are hardworking craftsmen and traders. Much like the settlers of The Capital Wasteland, they are good people that have had to suffer raiders disrupting their lives. They may not have formally asked for our help, but that doesn't mean we can not lend a hand."
DCS_nf_e028:0 "Save The Amish"
DCS_nf_e028_desc:0 "The people of Hershey are hardworking craftsmen and traders. Much like the settlers of The Capital Wasteland, they are good people that have had to suffer raiders disrupting their lives. Unfortunatley, they have fallen prey to The Philly Raiders and many are now in chains. We can not stand by and let this continue."
DCS_nf_e029:0 "It's Always Sunny In Philly"
DCS_nf_e029_desc:0 "With Philadelphia no longer suffering the tyranny of The Warthog and his unteathered children, good folk can move to the city and make lives there. Before you know it, it could be the next Rivet City!"
DCS_nf_e030:0 "Dark Clouds South"
DCS_nf_e030_desc:0 "We have not forgotten about the various cannibals and madmen that lurk just beyond our southern border. They likely haven't forgotten us either. We should prepare ourselves in case they get tired of eating lost travelers and want to look for new food sources."
DCS_nf_e031:0 "A Shadow Over Andale"
DCS_nf_e031_desc:0 "The men at our outpost report troubling activity over in the Andale region. Something big is happening, and we may not want to wait and see what."
DCS_nf_e032:0 "Investigate The Cults"
DCS_nf_e032_desc:0 "There was something strange going on here. We need to get to the bottom of it."
DCS_nf_e033:0 "Exterminate The Cults"
DCS_nf_e033_desc:0 "There was something strange going on here, and some things are better left unknown. Make sure the knowledge dies with the cannibals."
DCS_nf_e034:0 "The Nightmare Ends"
DCS_nf_e034_desc:0 "The horrible things that happened in Andale and the surrounding wasteland have finally been put to a stop. Vast stretches of land that were avoided at all costs for decades if not centuries are finally ready to be settled by decent people who can grow a tato instead of munching on traders."
DCS_nf_e035:0 "Swamp Horrors"
DCS_nf_e035_desc:0 "The swamps just south of what was once Andale hold horrors worse than the swampfolk of Point Lookout. All attempts at reasoning with these people have ended in disaster. That leaves us only one option."
DCS_nf_e036:0 "Welcome Surprise"
DCS_nf_e036_desc:0 "Whatever horrors occupied the swamps south of Andale have since been wiped out by civilized people. We should invite them to our republic. Anyone that could face those horrors and survive would be welcome."
DCS_nf_e037:0 "That's Strange"
DCS_nf_e037_desc:0 "Something dark has taken up residence in the swamps just south of Andale. We need to make sure it doesn't move into our neck of the woods"
DCS_nf_e038:0 "Slowing Flow"
DCS_nf_e038_desc:0 "Project Purity has made the life of the common wastelander vastly better. Pure water is accessible to even the most destitute wastelander. The shipments could stand to be a little more frequent though."
DCS_nf_e039:0 "Aid Brotherhood Efforts"
DCS_nf_e039_desc:0 "The Brotherhood are doing a good job getting Aqua Pura to settlements on the far reaches of The Capital Wasteland. That does not mean they could not use some help."
DCS_nf_e040:0 "A Mighty Thirst"
DCS_nf_e040_desc:0 "The truth is that if we do not secure Project Purity for ourselves, we will always be depending on the charity of whoever owns it. That kind of dependance is not good for us, and we can not stand for it."
DCS_nf_e041:0 "Jolly Cooperation"
DCS_nf_e041_desc:0 "Rivet City does a great job taking care of Project Purity. It's also reminded many that the largest settlement in The Capital Wasteland is oddly absent from the council of settlement leaders."
DCS_nf_e042:0 "Synergenic Cooperation"
DCS_nf_e042_desc:0 "Just as we expected, our cooperation with The Brotherhood on Project Purity has led to better outcomes for everyone involved."
DCS_nf_e043:0 "Control The Flow"
DCS_nf_e043_desc:0 "Running Project Purity is harder than it looked. But we have gone too far, and need to make the best of things."
DCS_nf_e044:0 "Improving Distribution"
DCS_nf_e044_desc:0 "Rivet City has taken a lot of the burden of distributing the water to the rest of the wasteland. They have petitioned the council for some assistance."
DCS_nf_e045:0 "Indecent Proposal"
DCS_nf_e045_desc:0 "The leadership of The Dover Traders has approached our chairperson with a lucrative but horrible business deal."
DCS_nf_e046:0 "Protect Bayfishers"
DCS_nf_e046_desc:0 "It does not matter how many caps they dangle in front of us, we would betray our founding principles if we turned our back on a settlement in need of protection."
DCS_nf_e047:0 "Stay Out of It"
DCS_nf_e047_desc:0 "The Bayfishers never explicitly asked for our help. Maybe it is best if we just look the other way. It's not really our business anyway."
DCS_nf_e048:0 "Support Dovers War"
DCS_nf_e048_desc:0 "If we support Dover in their efforts to conquer The Bayfishers it may lead to a better outcome for everyone. A quick defeat is better for the Bayfisher's people than a drawn out war anyway, right?"
DCS_nf_e049:0 "Coming Aboard"
DCS_nf_e049_desc:0 "The Bayfishers held out against The Dover Traders' mercenaries and turned the tide against them. For better or worse, they now control most of Delmarva."
DCS_nf_e050:0 "Boatloads of Caps"
DCS_nf_e050_desc:0 "The Dover Traders were able to put down resistance from The Bayfishers. Hopefully this will lead to more prosperity for everyone."
DCS_nf_e051:0 "The Delmarva Settlements"
DCS_nf_e051_desc:0 "The people of Delmarva are united under one common leader. No longer are they just a conglomerate of traders and group of fishermen. They are becoming something larger, kind of like we did not to long ago. It remains to be seen what that means for us."
DCS_nf_e052:0 "Naval Cooperation"
DCS_nf_e052_desc:0 "The Delmarva Settlements have been kind enough to teach our people a few things about watercraft. This should help us in protecting our shores from danger."
DCS_nf_e053:0 "Import/Export"
DCS_nf_e053_desc:0 "Uncle Roe has grand plans that involve The Delmarva Settlements. He sees them as the heart of a maritime trade empire that stretches up and down the east coast and possibly beyond. Some dismiss this as a pipe dream or just expanding on what The Dover Traders did, but Roe knows better."
DCS_nf_e054:0 "Beach Tourism"
DCS_nf_e054_desc:0 "Mr. Burke has reported back to Tenpenny that there are ruins of a pre-war resort out on the beaches of Delmarva. Tenpenny has already directed some mercs and contractors to secure the building and begin renovations."
DCS_nf_e055:0 "The Republic's Flagship"
DCS_nf_e055_desc:0 "With the integration of Delmarva finally finished, Dave has grand plans to commemorate the situation. He has instructed the shipwrights of Dover to repair a ruined tanker beached on the eastern coastline. It will be the flagship of the DCS Fleet, The DCS Dave"
DCS_nf_e056:0 "Fleet Exercises"
DCS_nf_e056_desc:0 "Though the DCS hardly has any ships to defend its shores, The Delmarva Settlements have engaged in several join exercises and naval wargames with our ramshackle fleet. It has been a learning experience for the both of us."
DCS_nf_e057:0 "Fruits of Trade"
DCS_nf_e057_desc:0 "Roe's dream is becoming a reality. Traders have recently returned from the ruined coasts of Florida with a fruit called an Orange. Many wastelanders thought that was just a flavor of Mentat, but the sweet citrus is real and survived the bombs! As an added bonus, scurvy is down 67%!"
DCS_nf_e058:0 "Tenpenny Country Club"
DCS_nf_e058_desc:0 "A resort is just the first step. Tenpenny has plans to expand the resort into an exclusive countryclub that the wasteland's elite can relax at when they need a break from relaxing at their mansions or fortified compounds."
DCS_nf_e059:0 "Why Stop At One?"
DCS_nf_e059_desc:0 "Our great president does not let words like 'infeasable' or 'more trouble than its worth' or 'bankrupting the local economy' stop him from bringing our nation to greatness. The DCS Dave will have a sistership, The DCS Dave II!"
DCS_nf_e060:0 "The Steel War"
DCS_nf_e060_desc:0 "Many called it a pointless waste of life, and maybe they were right. But if there's one thing true in The Wasteland, it's that war never changes."
DCS_nf_e061:0 "Accept Wasteland Knights"
DCS_nf_e061_desc:0 "Simms knows many Knights in The Lyons Brotherhood joined to protect The Capital Wasteland from things like super mutants and raiders. So why not allow them to continue doing that?"
DCS_nf_e062:0 "Wasteland Boys Make Do"
DCS_nf_e062_desc:0 "Many Brotherhood laser rifles were damaged beyond repair either in battle or sabotage. But finding something ruined beyond repair never stopped a wastelander before."
DCS_nf_e063:0 "Clearing Tunnels"
DCS_nf_e063_desc:0 "The Brotherhood were always opposed to clearing metro tunnels for fear of things like 'collapse' or 'unearthing some pre-war horrors'. These risks could be there, but Uncle Roe knows risk is an essential part of business."
DCS_nf_e064:0 "Underworld Trade"
DCS_nf_e064_desc:0 "Some traders may scoff at trading with ghouls, but their caps spend just as good as anybody else's."
DCS_nf_e065:0 "Celebrate Our Heroes"
DCS_nf_e065_desc:0 "This war took a lot from everyone, but we can not forget those that sacrificed the most. Those that lost their lives, or fought hardest, and who could possibly forget the tremdenouds sacrifices President Dave made to ensure we won this war?"
DCS_nf_e066:0 "A Shining Example of Wasteland Democracy"
DCS_nf_e066_desc:0 "All this Brotherhood power armor lying around would do well standing between President Dave and danger"
DCS_nf_e067:0 "Spoils of War"
DCS_nf_e067_desc:0 "War has always been good business, and these mountains of captured Brotherhood weapons can make us a lot of caps."
DCS_nf_e068:0 "The Underworld Problem"
DCS_nf_e068_desc:0 "A large settlement full of ghouls poses a threat to everyone in The Capital Wasteland? What if they all suddenly go feral, or if they decide they don't like being called rotten zombies and start shooting real people?"
DCS_nf_e069:0 "[DCS_nf_e069_scripted_loc]"
DCS_nf_e069_default:0 "The Citadel's Future"
DCS_nf_e069_dave:0 "Deport The BoS"
DCS_nf_e069_desc:0 "The Citadel sits mostly empty now, aside from a garrison of militiamen there to keep raiders or wasteland critters from taking up residence. We need to figure out what we're going to do with the place."
DCS_nf_e070:0 "Take Inventory"
DCS_nf_e070_desc:0 "Beyond the equipment scavenged from battlefields and surrendering soldiers, there is a treasure trove of weapons in The Citadel"
DCS_nf_e071:0 "Study The Archives"
DCS_nf_e071_desc:0 "Many of the databases of The Citadel were destroyed in the fighting or in acts of sabotage, but there is still some valuable data in what remains."
DCS_nf_e072:0 "Everyone's Favorite DJ"
DCS_nf_e072_desc:0 "What happened to 3-Dog after The Brotherhood were driven out of Galaxy News Radio?"
DCS_nf_e073:0 "Invite Rivet City"
DCS_nf_e073_desc:0 "Rivet City has been a model of civlization in The Capital Wasteland for decades. We should invite them to join our council."
DCS_nf_e074:0 "Assist In Repairs"
DCS_nf_e074_desc:0 "For all the resources flowing into Rivet City through trade, they still struggle with the difficult task of keeping the ancient ship they call home afloat. As good neighbors, we should lend a helping hand."
DCS_nf_e075:0 "Integrate Security Forces"
DCS_nf_e075_desc:0 "With our soldiers watching out for raiders, do they really need a huge army protecting their ship anymore?"
DCS_nf_e076:0 "The City's Rep"
DCS_nf_e076_desc:0 "The person Rivet City has sent to represent their interests before the council has brought plenty more to the table than just that. People are growing to trust this individula and go to them for advice on matters relating to their own settlements!"
DCS_nf_e077:0 "The Capital's Brightest"
DCS_nf_e077_desc:0 "Rivet City is home to the brightest minds, with the obvious exception of The Brotherhood. Cooperation could bring nothing but good things for us."

###Events###
DCS_nf_events.1.title:0 "Dave's Outrage"
DCS_nf_events.1.desc:0 "With the recent elections going off without a hitch, many were looking forward to further cooperation between the DC Settlements. The exception to this was President Dave of The Republic of Dave and his supporters. The small settlement's leader is refusing to accept that he lost and is calling the election a farce that was obviously rigged or poorly handled. If it were just his settlement that had problems with the election results, this would not be a problem. However, he has amassed a large following of other remote wastelanders who think the larger settlements hold too much of a say in things. There are concerns that this could lead to people losing faith in the alliance or even spill into violence. We must act accordingly."
DCS_nf_events.1.a:0 "Offer Dave a permenant seat on the council"
DCS_nf_events.1.b:0 "Just ignore him"
DCS_nf_events.1.c:0 "FOR THE PRESIDENT!"
DCS_nf_events.2.title:0 "Trader Cooperation"
DCS_nf_events.2.desc:0 "Ernest Roe was raised among caravans and always had a mind for trade. Through years of hard work he saved up enough to create the Cantebury Commons trading post, but this was just the beginning. Roe always had the desire to help the big merchants of The Capital Wasteland work together so they could dig deeper into their respective niche and provide better selections to the consumer. Roe knew that if he could get one of these merchants on board, the rest would easily follow but he really needed to think about who he approached first. Lucky Harith was a friendly sort, but his weapons business was already thriving and taking a risk to do a little better may not appeal to him. Crow is a solid businessman and his clothing caravan is doing well, but the former shaman could always interpret a strange omen and decide against it. Doc Hoff is another solid businessman, but he has always been a bit doubtful about the future. Last was the junk seller Crazy Wolfgang, despite his eccentric persona he's a clever sort and could possibly be convinced."
DCS_nf_events.2.a:0 "He asked Lucky Harrith first"
DCS_nf_events.2.b:0 "Crow was his first choice"
DCS_nf_events.2.c:0 "If he could convince Doc Hoff, he could convince anyone"
DCS_nf_events.2.d:0 "Crazy Wolfgang was the first to sign up"
DCS_nf_events.3.title:0 "The Bethesda Ruins"
DCS_nf_events.3.desc:0 "The raiders of The Capital Wasteland were always a problem for caravans, but a few of them had worked out deals to pay tribute and sell goods at a discount in exchange for safe passage. This worked out well for the merchant collective until a particularly nasty band moved into the old Bethesda Ruins. They didn't care about tribute and shot at any caravans that passed their way. Without a safe route through these ruins the merchant collective had to take more dangerous or lengthy paths than before and saw a drop in profits. Uncle Roe knew this was a problem that would only get worse and started reaching out to other settlements with his merchant friends to ask for help driving the raiders from the ruins. Every settlement contributed a few people to help, but the town that took charge was..."
DCS_nf_events.3.a:0 "Tenpenny Tower with heavily armed security"
DCS_nf_events.3.b:0 "Megaton with Simms' regulator friends"
DCS_nf_events.3.c:0 "Canterbury Commons with hired mercs"
DCS_nf_events.3.d:0 "The Republic of Dave with Dave's old friends"
DCS_nf_events.4.title:0 "The First Council"
DCS_nf_events.4.desc:0 "The raiders in The Bethesda Ruins were hardly prepared for the force of multiple settlements working together and were swifty driven out of The Bethesda Ruins. The various Capital Wasteland settlements realized just what could be achieved if they worked together. In a few months the leaders from various settlements gathered together and talked about forming a confederation of settlements. The settlements would support each other with mutual defense, fair trade and other matters. Chief among them all was the founding principle of..."
DCS_nf_events.4.a:0 "Collective Defense"
DCS_nf_events.4.b:0 "Trade Partnerships"
DCS_nf_events.4.c:0 "Individual Freedom"
DCS_nf_events.5.title:0 "The Second Council"
DCS_nf_events.5.desc:0 "The following years for The DC Settlements were not easy, but they were better than the years before. The raiders of The Capital Wasteland were largely driven out of the areas between Tenpenny Tower and The Republic of Dave. Super Mutant attacks became less frequent, though many attributed that to The Brotherhood's continued campaign against them. Of course trade flourished and the quality of life for those in settlements rose ever so slightly. When the settlement leaders met again to discuss the future, the idea was passed around to have a single leader to oversee larger matters that went beyond a single settlement. After intense discussion, it was agreed that an election would be held. The candidtates would include Megaton's Lucas Simms, Canterbury Commons' Uncle Roe, Tenpenny Tower's Alistair Tenpenny, and Dave of The Republic of Dave."
DCS_nf_events.5.a:0 "I wonder who will win"
DCS_nf_events.6.title:0 "Big Problems"
DCS_nf_events.6.desc:0 "Big Town, despite its name, is not a very large settlement. The small collection of homes of former Little-Lamplighters sits a little between Megaton and Arefu. Normally this area is considered relatively safe by wasteland standards, but because the settlement is not well fortified or defended they find themselves under constant attack. Both Super Mutants and Paradise Falls raiders assault the settlement trying to drag off their citizens for their purposes. The Big Towners have pleaded with The DC Settlements for support. The council is deadlocked between two options for how to help the settlement. Tenpenny suggests moving the people to other settlements, so long as they aren't moving to his tower. But Lucas Simms wants to fortify the settlement and provide it with some guards so they can fight off the attacks. After all, if Big Town goes, who will the mutants and slavers target next?"
DCS_nf_events.6.a:0 "Relocate the Big Towners"
DCS_nf_events.6.b:0 "Stand with Big Town"
DCS_nf_events.7.title:0 "Battle of Germantown"
DCS_nf_events.7.desc:0 "After holding off multiple mutant attacks and one slaver raid, our militia was ready to take the fight to the Super Mutant nest at the old Germantown Police HQ. Taking on Super Mutants on their turf was something few outside The Brotherhood would ever do if they could avoid it, but if we are to keep Big Town safe it is something we must do. Our forces were able to clear the area of mutants and are reporting back now."
DCS_nf_events.7.a:0 "We really showed them!"
DCS_nf_events.7.b:0 "It was tough, but we did it"
DCS_nf_events.7.c:0 "We took heavy losses, but it is done"
DCS_nf_events.7.d:0 "We won, but at what cost?"
DCS_nf_events.8.title:0 "Super Hero Issues"
DCS_nf_events.8.desc:0 "Canterbury Commons has been dealing with a madwoman and her army of ants for a few months now. They were little more than a nuisance and could have become a potential tourist attraction if handled right, but then one of her ants destroyed Scott Wollinski's favorite robot. The strange recluse then started calling himself The Mechanist and began battling the mad 'Antagonizer' in the streets of Canterbury Commons. The fights always end in a stalemate, and up to now only property has been damaged, but the fights have gotten larger and its only a matter of time until someone is hurt. Uncle Roe wants to send some Militiamen to kill The Antagonizer, hoping this will cause his delusional citizen to settle down. Tenpenny sees things differently. He worries that if this Mechanist ever runs low on machines he will turn to the old robco factory and then it'll be Tenpenny's problem. So, he's offering to send some guards to deal with The Mechanist, and offer his body to The Antagonizer as payment to get her to leave the area."
DCS_nf_events.8.a:0 "Hunt The Antagonizer"
DCS_nf_events.8.b:0 "Target The Mechanist"
DCS_nf_events.9.title:0 "Family Issues"
DCS_nf_events.9.desc:0 "The small settlement of Arefu has been reporting increasing attacks at night from some group calling themselves 'The Family'. The nocturnal hooligans had Evan King and his citizens scared witless, so we sent some people to check it out. Our scouts were not met with gunfire, and a dialogue was opened up with The Family's leader Vance. Though the group is strange, and seems to prefer drinking blood to eating food, they are not mindless cannibals. Lucas Simms is against the idea of letting these people off easy after what they did to Arefu, but Uncle Roe smells a business deal in the works. He thinks a lot of caps can be made selling blood packs to Vance and his group, and maybe they could guard Arefu in exchange for some."
DCS_nf_events.9.a:0 "Stake the Vampires"
DCS_nf_events.9.b:0 "Reconcile with The Family"
DCS_nf_events.10.title:0 "Ultra Jet?"
DCS_nf_events.10.desc:0 "With news spreading that Northwest Seneca Station is safe to live, some people have been moving in and staking their claim to different halls. A team sent to clear out a mirelurk nest were surprised to find that a couple ghouls were living in one such alcove. The ghoul was initially suspicious of our militia, but settled down when he realized they were not there to steal his secrets. He opened up that he is attempting to develop a form of Jet that works on ghouls, and is willing to pay for help with his research. The council is naturally divided on the matter."
DCS_nf_events.10.a:0 "Simms says no to drugs"
DCS_nf_events.10.b:0 "Uncle Roe smells an untapped market"
DCS_nf_events.11.title:0 "Ghoul Safehaven"
DCS_nf_events.11.desc:0 "Even though Super Mutants tend to leave ghouls alone, there are many other dangers that prevent most of The Capital Wasteland's ghouls from making their way to Underworld. Not particularly welcome in other settlements, ghouls tend to have a hard time in the wastes. It seems now that many of them are moving into the tunnels left vacant after The Family was wiped out. This 'New Underworld' as it is being called, is quickly growing and regular wastelanders are happy at seeing less ghouls in their towns."
DCS_nf_events.11.a:0 "Out of sight, out of mind"
DCS_nf_events.12.title:0 "Change of Plans?"
DCS_nf_events.12.desc:0 "Mr. Burke spent months preparing. Contacts were made, equipment was purchased and guard patrols were documented. Even though Tenpenny paid him well, he was going to be livid if all that work had gone to nothing just beacuse Tenpenny won the election to rule over these savages. Still, there was a chance that when he told Tenpenny things were in place he would call it off."
DCS_nf_events.12.a:0 "Tenpenny had a change of heart"
DCS_nf_events.12.b:0 "Megaton would still be destroyed"
DCS_nf_events.13.title:0 "The Megaton Incident"
DCS_nf_events.13.desc:0 "The Megaton bomb was detonated last night after our saboteur made their way a safe distance from the city. The flashing light and ball of fire could be seen from every corner of The Capital Wasteland as it erased that eyesore known as Megaton from the earth. Though the hundreds of souls lost were a tragedy, you can't stand in the way of progress. Loose ends are beign tied up as we speak and Mr. Burke has already fabricated evidence that the attack was carried out by raiders. In the coming days, Mr. Tenpenny will address the settlements and tell them just who thier real enemy is."
DCS_nf_events.13.a:0 "The raiders that did this will pay"
DCS_nf_events.131.title:0 "OH NO THE HECKIN BOMB HAD AN EXPLODERINO!!!!!!!"
DCS_nf_events.131.desc:0 "A bunch of cringe ass nae-nae babies done went and caught Megaton lacking. Megaton got lit the fuck up and it was straight up not bussin, no cap. Tenpenny has lost all chill and is saying the DC Settlements will merk these fools, fr fr."
DCS_nf_events.131.a:0 "BOMBMAXXED RAIDERCELLS DID THIS!"
DCS_nf_events.14.title:0 "MegaTen"
DCS_nf_events.14.desc:0 "Where once there was a rusted eyesore built around a bomb, there is now a slightly less rusted settlement still built around a bomb. It took months of effort from people all across the wasteland, but Megaton has become something Tenpenny can be proud to see while sitting on his balcony. The new settlement has begun being called MegaTen to honor the person that called for the project."
DCS_nf_events.14.a:0 "This is way better than blowing it up"
DCS_nf_events.15.title:0 "Megaton Memorial Finished"
DCS_nf_events.15.desc:0 "In the Springvale ruins just beyond the old site of Megaton there is now a concrete slab with the names of hundreds of Megaton citizens lost in the explosion. It will hardly see any visitors due to the proximity to the radioactive crater, but the people of The DC Settlements feel a little better and appreciate their leader for paying for the monument."
DCS_nf_events.15.a:0 "Best 100 caps I ever spent"
DCS_nf_events.16.title:0 "Ghouls in OUR tower?"
DCS_nf_events.16.desc:0 "A ghoul named Roy Philips has been pestering the gate at Tenpenny Tower for weeks now. Every day this zombie shambles up to the speaker and demands to be allowed to purchase a room for him and his freakish friends. No matter how many times Gustavo chases him off, the mutated freak just does not get it. Word of the daily occurance has spread beyond the tower and now some other settlements are talking about the standoff. Tenpenny has put out an official statement that zombies are not allowed in his tower, and that he will be taking the next few weeks to find proactive solutions to 'the ghoul question'."
DCS_nf_events.16.a:0 "Finally, a solution"
DCS_nf_events.17.title:0 "No Zombies Allowed"
DCS_nf_events.17.desc:0 "As the first step to dealing with the ghoul problem, Tenpenny sent a team of militia to clear the tunnels of a nearby metro station. In addition to the ferals they expected, they found Roy Philips and his followers. Finding zombies cowering in a tunnel was not anything unexpected, what was surprising was that the ghouls were planning to unleash the ferals on the innocent citizens of Tenpenny Tower! News has spread far and wide about this massacre that almost happened and what little public support ghouls had has just went out the window. Tenpenny is promising a thorough investigation and new laws to make sure something like this never happens anywere in The DC Settlements."
DCS_nf_events.17.a:0 "Imagine if they'd succeeded!"
DCS_nf_events.18.title:0 "Fort Constantine"
DCS_nf_events.18.desc:0 "Years ago Tenpenny sent a team of scavengers to explore Fort Constantine. The expedition ended in disaster with half the crew killed and Tenpenny wrote the whole thing off as a loss, but now with the resources of The DC Settlements, Tenpenny is ready to give it another go."
DCS_nf_events.18.a:0 "We will drive them out!"
DCS_nf_events.18.b:0 "We can't mess with The Brotherhood. Just sneak in and grab what you can"
DCS_nf_events.18.c:0 "Good thing we have it under our control!"
DCS_nf_events.19.title:0 "Chapter One"
DCS_nf_events.19.desc:0 "Reasearch for Chapter One of The Wasteland Survival Guide is underway. Which section should we send some of our militiamen out to handle?"
DCS_nf_events.19.a:0 "Searching for food"
DCS_nf_events.19.b:0 "Dealing with radiation"
DCS_nf_events.19.c:0 "Traversing a minefield"
DCS_nf_events.20.title:0 "Chapter Two"
DCS_nf_events.20.desc:0 "With the research for chapter one completed, it is time to move on to chapter two. Where should we direct our efforts?"
DCS_nf_events.20.a:0 "Testing mole-rat repellant"
DCS_nf_events.20.b:0 "Mirelurk studies?"
DCS_nf_events.20.c:0 "Studying injury"
DCS_nf_events.21.title:0 "Chapter Three"
DCS_nf_events.21.desc:0 "Chapter two is finished and now we can move on to the final chapter. Where should we send our people?"
DCS_nf_events.21.a:0 "Look into Rivet City's history"
DCS_nf_events.21.b:0 "Search that RobCo factory mainframe"
DCS_nf_events.21.c:0 "Take a trip to the library"
DCS_nf_events.22.title:0 "Roe's Trade Empire"
DCS_nf_events.22.desc:0 "Trade flows through The Capital Wasteland like never before and losses have never been lower. Uncle Roe has delivered on his promise to bring prosperity to The DC Settlements and only pocketed a modest pecentage, better than you can expect from most businessmen or politicians."
DCS_nf_events.22.a:0 "We're in the black!"
DCS_nf_events.23.title:0 "What are our standards?"
DCS_nf_events.23.desc:0 "Creating a standard caravan gear for our guards may have many benefits as well as leftover equipment to give to our forces, cost is an important thing to consider. Do we really need to outfit our caravan guards and soldiers in pre-war combat armor? That stuff is really expensive."
DCS_nf_events.23.a:0 "Go with the lowest bidder"
DCS_nf_events.23.b:0 "Lets meet in the middle"
DCS_nf_events.23.c:0 "Only the best for our brave guards"
DCS_nf_events.24.title:0 "Lawmen In A Lawless Land"
DCS_nf_events.24.desc:0 "The regulators have been trying to clean up The Capital Wasteland for longer than anyone can remember. Despite being heavily outnumbered they've put fear into the hearts of raiders, slavers, and all other wasteland devils. However, they largely worked alone. With one of their own now sitting at the head of our government, they are warming up to the idea of working closely with our militia."
DCS_nf_events.24.a:0 "We'll save the wastes together!"
DCS_nf_events.25.title:0 "Sabotage?"
DCS_nf_events.25.desc:0 "A Megaton guard was going for a piss break when they found a strange outsider tinkering with the massive bomb at the heart of the town and promptly arrested him. After hours of questioning Lucas Simms found out the mad bomber was hired by Tenpenny's man Mr. Burke to rig the bomb to explode. With his signed confession in hand, Lucas Simms is gathering a posse to bring Tenpenny to justice."
DCS_nf_events.25.a:0 "What sick fuck would destroy a town for 1,000 caps?"
DCS_nf_events.26.title:0 "Wasteland Justice"
DCS_nf_events.26.desc:0 "Tenpenny's people knew the DCS Militia were coming, and they put up a hell of a fight. In the chaos, Mr. Burke evaded arrest, but Tenpenny just sat and waited at the top of his tower. With Tenpenny in custody, Lucas Simms is faced with a choice. Just about every bone in Simms' body is calling for Tenpenny to face good old fashioned wasteland justice at the end of his gun, but Tenpenny has offered the location of a substantial cache of caps in exchange for exile. Simms was never tempted by bribes in the past, but this was different. These caps wouldn't go to him, this amount of caps could better the lives of the people he is now looking after."
DCS_nf_events.26.a:0 "No deals with scum like Tenpenny!"
DCS_nf_events.26.b:0 "He'll probably die in exile anyway... right?"
DCS_nf_events.27.title:0 "A New Tower"
DCS_nf_events.27.desc:0 "Tenpenny is gone and now somebody new needs to run the tower. Narrowing down the large pool of volunteers hasn't been easy, but it has come down to three choices. Retired adventurer Herbert 'Daring' Dashwood, tower business owner Cheng or Roy Philips, the ghoul who wanted to bring his people to the tower. In all honestly, that last option seemed more to spite the memory of Tenpenny than anything, but he has promised to be fair to the current residents."
DCS_nf_events.27.a:0 "Lets go with Dashwood"
DCS_nf_events.27.b:0 "Cheng seems like he has some ideas"
DCS_nf_events.27.c:0 "Philips seems iffy, but its worth a shot"
DCS_nf_events.28.title:0 "Free Elections!"
DCS_nf_events.28.desc:0 "President Dave has issued a statement today promising to do away with the corruption and shifty dealings that ruined the last election before he took his rightful place as president. His first step has been to set a date for the next election to be 4 years from now. Of course, to ensure everything of the election is above-board, only citizens of The Republic of Dave will be allowed to vote. Dave in his wisdom, is one step ahead of critics and added to his statement that any DCS Citizen can apply for citizenship so long as they pay the appropriate processing fee and pass the citizenship examination."
DCS_nf_events.28.a:0 "Democracy is alive and well thanks to Dave!"
DCS_nf_events.29.title:0 "Deserving of Thanks"
DCS_nf_events.29.desc:0 "It has been a rough time for The DC Settlements recently. Corrupt officials and despots attempted to subvert our democracy with a rigged election that unfortunately led to bloodshed. Things for The DC Settlements could have ended there if it was not for one great person, our president. President Dave has led us through the dark times, bringing safety and stability to our land. With his mighty army, our president keeps the raiders at bay and protects our roads. Without his leadership we would still be under the thumb of criminals like Lucas Simms and Uncle Roe, so he deserves our thanks!"
DCS_nf_events.29.a:0 "Thank you President Dave!"
DCS_nf_events.30.title:0 "The Abolitionists"
DCS_nf_events.30.desc:0 "A group of runaway slaves have come to us asking for aid. They are running out of places to hide and need to fight the slavers of Paradise Falls if they are to ever truly be free. Their leader Hannibal Hamlin is emploring our leader to allow the slaves they help take shelter in our settlements, he and his people are pledging to support us if we assist them in this fight against slavery."
DCS_nf_events.30.a:0 "We will take in the runaways"
DCS_nf_events.30.b:0 "We cant protect them, but we can arm them"
DCS_nf_events.31.title:0 "The Battle of The Lincoln Memorial"
DCS_nf_events.31.desc:0 "Two squads of militiamen went with Hannibal Hamlin and his soldiers to clear out the slavers from The Lincoln Memorial. They encountered some super mutants as well, but were able to overcome the two forces and claim the memorial for The Temple of The Union."
DCS_nf_events.31.a:0 "Take that, slaver scum!"
DCS_nf_events.31.b:0 "The price of freedom is often paid in blood"
DCS_nf_events.31.c:0 "It's a wonder we succeeded"
DCS_nf_events.32.title:0 "Fall of Paradise"
DCS_nf_events.32.desc:0 "The armed scumbags that occupied Paradise Falls may have been enough to keep their victims from getting any ideas about freedom for their captives, but they were not prepared for a real force determined to wipe them out. Between our militia and Hannibal Hamlin's escaped slave fighters, the slavers didn't stand a chance. The largest slave market this side of the wasteland has been brought down and the ruins they occupied will soon be occupied by good decent folk."
DCS_nf_events.32.a:0 "A mighty blow to slavers everywhere!"
DCS_nf_events.33.title:0 "Welcome to The Settlements"
DCS_nf_events.33.desc:0 "After seeing what we did to The Harrisburg Bandits, many in Johnstown an the surrounding settlements saw the value in standing together. Today representitives from Johnstown have officially petitioned to join The DC Settlements. This is the first time such a large territory has requested to join our alliance, but they are like us, hardworking people tired of being picked on by raiders."
DCS_nf_events.33.a:0 "Welcome!"
DCS_nf_events.34.title:0 "Conflicting Stories"
DCS_nf_events.34.desc.1:0 "The scouts reported back from The Pitt and have quite the tale to tell. They were caught shortly after entering The Pitt by Knights at an outpost watching the train tunnel they passed through. After a brief standoff, our scouts identified themselves and the Knights radioed to their local base for instruction. Several tense minutes passed before they were force to submit to some type of blood test and given enviromental containment suits with firmly instructions to change into them. The Knights that met them at the train tunnel assured them that the suits were for their safety, as The Pitt was ravaged by a highly contageous disease called Troglodyte Degeneration Contagion that is present in the air and water of the area. The condition leads to painful sores, and in many it eventually leads to madness and degeneration into horrible mutants called Trogs. The Brotherhood are currently working on a cure, but it could still be years away. Our scouts were taken on a guided tour of a tower, once owned by Ashur but now transformed into an air-tight facility where scribes can work in safety on developing a cure for TDC. Despite multiple requests, the men were not allowed direct contact with natives or tours of the factories where they worked. But we were assured that this was simply a quarantine measure and for our own safety. Paladin Kurtz was adamant that contact with any Pitt locals that somehow breach containment is avoided by anyone in DC. He requested that we aid in this by shooting anyone caught outside The Pitt exhibiting symptoms on sight to prevent a pandemic. He also promised us that whatever value could be gained from The Pitt's industry would be shared with friends of The Brotherhood so long as we assisted with their containment efforts."
DCS_nf_events.34.desc.2:0 "The scouts reported back from The Pitt and have quite the tale to tell. They were caught shortly after entering The Pitt by people identifying themselves as 'The Pitt Worker's Militia'. The militia was not hostile but was weary. Our people were relieved of their weapons and brought before the leader of the militia, a former slave named Midea, who the slaves call The Mother of Freedom. She was welcoming of our people and per their reports, is open to further discussion with our leadership. Naturally, The Abolitionists are thrilled to hear about a state of liberated slaves that overthrew the largest slaver state in this area of the wasteland."
DCS_nf_events.34.desc.3:0 "The scouts reported back from The Pitt and have quite the tale to tell. They were caught shortly after entering The Pitt and attacked. They were not able to get too good of a look at their attackers but were barely able to make it out alive."
DCS_nf_events.34.a:0 "We'll need to make a choice"
DCS_nf_events.35.title:0 "Horror's Home"
DCS_nf_events.35.desc:0 "We have finally found the home of The Super Mutants. It is beyond a doubt that they are coming and going from Vault 87, and while we can not go through the main doorway, we are sure there is a back way into the place. The only problem is there are already other groups occupying the general area and we can't just march in with an army telling them we are there for a good reason."
DCS_nf_events.35.a:0 "We will need to move in first"
DCS_nf_events.35.b:0 "Tell The Brotherhood what is there!"
DCS_nf_events.36.title:0 "Little Lamplight"
DCS_nf_events.36.desc:0 "We knew the people of Big Town came from somewhere called Little Lamplight, so we probably should have put two and two together and realized when we marched into Lamplight Caverns that we were moving into a town of heavily armed children suspicious of 'mungos' like us. Thankfully there has been no violence, but the mayor is doubtful that we can deal with the mutants in Vault 87. He wants assurances."
DCS_nf_events.36.a:0 "Pay our way through"
DCS_nf_events.36.b:0 "Send more men to help them guard the back gate"
DCS_nf_events.36.c:0 "Kids like Robots right? Have The Mechanist convince them"
DCS_nf_events.37.title:0 "The Final Assault"
DCS_nf_events.37.desc:0 "Every man and woman marching into that horrible vault knew they likely wouldn't return, and many didn't. But we can take comfort in knowing their sacrifices were not in vain. The Super Mutant threat in The Capital Wasteland has been stopped. Though there are still mutants out there, the tools they used to reproduce have been destroyed. In no time the constant terror of the mutant threat will be nothing more than a bad memory."
DCS_nf_events.37.a:0 "Its finally over"
DCS_nf_events.37.b:0 "Its finally over"
DCS_nf_events.37.c:0 "Its finally over"
DCS_nf_events.37.d:0 "Its finally over"
DCS_nf_events.38.title:0 "The Enclave Defeated?"
DCS_nf_events.38.desc:0 "The Enclave have been driven out of The Capital Wasteland, and it looks like we can finally breathe easier. The Brotherhood warn that The Enclave may still be out there, but we have already beaten them once. We should be able to do it again, right?"
DCS_nf_events.38.a:0 "We'll be ready"
DCS_nf_events.39.title:0 "Fort Banister"
DCS_nf_events.39.desc:0 "The former Talon Company fort now sits under our control. The latest sweeps confirm that there is not a single enemy soldier or rogue security bot inside the facility. Now we should decide what to do with the place. Some think we could use a fortress on our western border, and others argue that the salvage that can be pulled from the place outweighs any security benefit from fixing it up."
DCS_nf_events.39.a:0 "Fort Banister will safeguard our western frontier!"
DCS_nf_events.39.b:0 "Rip what you can from the place!"
DCS_nf_events.40.title:0 "A Message of Peace"
DCS_nf_events.40.desc:0 "After weeks of trial and error we finally accessed the Vault 101 raido signal. This is a very important moment. Beyond a few people leaving the place over the decades, there has been very little interraction with these people and if we leave a bad impression we could close them off from the wastes for another 200 years!"
DCS_nf_events.40.a:0 "Suggest coexistance and trade"
DCS_nf_events.40.b:0 "Convince them to join the confederation"
DCS_nf_events.41.title:0 "Burnt homes and empty streets"
DCS_nf_events.41.desc:0 "After a few traders went missing traveling to Grayditch the place was largely avoided by everyone with rumors swirling about as to what caused it. The troops we sent to investigate the settlement have put those rumors to rest when they discovered the place is overrun with giant fire-breathing ants. After a hard fight to clear a section of the town they found a scientist cowering in a shack who it seems is behind the whole fiasco. According to this Dr. Lesko, he was just trying to reduce ant size through genetics and somehow messed that up causing them to breathe fire. He insists that he could fix this if we just give him a little support, but can we trust he won't just make them twice as large or shoot lazers from their eyes while hes at it?"
DCS_nf_events.41.a:0 "Just send in the militia"
DCS_nf_events.41.b:0 "The Mechanist knows how to fight ants!"
DCS_nf_events.41.c:0 "Lets give Lesko a shot"
DCS_nf_events.42.title:0 "Lesko's Fate"
DCS_nf_events.42.desc:0 "The situation in Grayditch may have been an accident, but Dr. Lesko still has the blood of dozens of innocents on his hands. It is up to us to decide just what to do with the scientist."
DCS_nf_events.42.a:0 "Execute him for his crimes"
DCS_nf_events.42.b:0 "Let him try to do some good"
DCS_nf_events.43.title:0 "Unexpected Guests"
DCS_nf_events.43.desc:0 "As our scavenging teams dug into the lower levels of the Wheaton Armory, the base was approached by a small squad of Brotherhood Outcasts. The Outcasts came to lay claim to what lay below in the ruins and offered caps in exchange for the haul. The prospectors say its a fair pay for the haul, and some of them have said The Outcasts are good trading partners for the random techno-junk they find in the DC ruins. However, if we allow these people to push us around now, what will they expect later?"
DCS_nf_events.43.a:0 "Sell whatever is down there"
DCS_nf_events.43.b:0 "Tell them to beat it!"
DCS_nf_events.44.title:0 "The Robot Factory"
DCS_nf_events.44.desc:0 "The RobCo factory was full of maddened robots and wasteland critters, but nothing our people haven't dealt with before. After a few hours the entire factory seems to be cleared of robots and we are ready to send in scavenging teams."
DCS_nf_events.44.a:0 "Good work"
DCS_nf_events.45.title:0 "Deathclaw Hunts"
DCS_nf_events.45.desc:0 "It takes a very special kind of crazy to hunt deathclaws. Thankfully, the wasteland is full of crazy. We have put together a team of mean bastards that are eager to prove their mettle by hunting these beasts and finally clearing Old Onley. We just need to have a plan."
DCS_nf_events.45.a:0 "Just keep shooting till they die!"
DCS_nf_events.45.b:0 "Lure them into explosive traps"
DCS_nf_events.45.c:0 "Hit them from a distance with heavy weaponry"
DCS_nf_events.45.d:0 "Bomb them!"
DCS_nf_events.46.title:0 "Into the ruins"
DCS_nf_events.46.desc:0 "Despite being overrun by deathclaws for years, the ruins of Old Olney aren't in any worse shape than most other pre-war ruins. There is even an old powerplant beneath the city that seemed to power much of the area. Despite our limited resources we have a few options of what to do with the town. We could fix it up for people to settle, restore as much of the powerplant as we can, or we could just turn the entire town into one big salvage operation."
DCS_nf_events.46.a:0 "Reclaim the town for people!"
DCS_nf_events.46.b:0 "Restart the generators!"
DCS_nf_events.46.c:0 "Pull whatever you can from the ruins"
DCS_nf_events.47.title:0 "Ha ha ha Gaaaarrrryyyyy"
DCS_nf_events.47.desc:0 "Our team sent into Vault 108 was almost immediately attacked by a bunch of cloned vault-dwellers that kept yelling 'gary' at them. Thankfully the clones were not well armed so there were not any losses, but it was still unsettling."
DCS_nf_events.47.a:0 "Damn, that's strange."
DCS_nf_events.48.title:0 "The Enclave are Gone!"
DCS_nf_events.48.desc:0 "Few could believe the news when GNR put it out, but it has been days since a vertibird was last seen and people are finally accepting that The Enclave have been stopped. Thanks to the efforts of our brave soldiers and our allies, The Enclave will no longer pose a threat to the people of The Capital Wastleand. Many died in the fighting, but their sacrifice bought us a brighter future. Though some worry about other outside threats, or wonder about our relationship with The Brotherhood of Steel, many are unusually optimistic. After all, we just beat the most advanced army in the wasteland what threat do a few doped up raiders pose?"
DCS_nf_events.48.a:0 "We can breathe easy for now"
DCS_nf_events.49.title:0 "Standing Alone"
DCS_nf_events.49.desc:0 "We don't need any alliance with The Brotherhood. They may battle super mutants and hand out water, but we can not become dependent on them. We need to remember that we pushed the raiders out of Bethesda, we fought just as hard as they did against The Enclave, and we are responsible for the safety of our settlements."
DCS_nf_events.49.a:0 "The DCS is fine on its own!"
DCS_nf_events.50.title:0 "Wandering Madwoman"
DCS_nf_events.50.desc:0 "A wandering crazywoman was caught by some of our guys up near the DC Settlement's territory, or so they thought. When they sprung their trap, the lady called up an army of ants from below the ground. Our fellas were all killed except for one. He was sent back to deliver a message, this 'Antagonizer' as she calls herself wants to join up. She has some kind of beef with The DC Settlements and wants to work with us to make life hell for those goodie-goodies."
DCS_nf_events.50.a:0 "Just uh... keep the ants away from the boys"
DCS_nf_events.50.b:0 "Hell no, kill her!"
DCS_nf_events.51.title:0 "A Good Offer"
DCS_nf_events.51.desc:0 "The Bay Traders Association has controlled much of the oceanbound trade on The East Coast for decades now. In his years as a trader, Uncle Roe made a good relationship with some of their members. It will take calling in some favors, but Uncle Roe thinks he can get something that will benefit all of us."
DCS_nf_events.51.a:0 "Some old ships"
DCS_nf_events.51.b:0 "Ship schematics"
DCS_nf_events.51.c:0 "Agriculture Secrets"
DCS_nf_events.52.title:0 "Disrupted Slave Imports"
DCS_nf_events.52.desc:0 "The slavers of Paradise Falls tell us that their suppliers in The Capital Wasteland are losing caravans to local militias. Slave imports are down 25% this month and it looks like this will continue for some time until they get their shit together down there in the wasteland."
DCS_nf_events.52.a:0 "Ashur won't be happy"
DCS_nf_events.53.title:0 "Disrupted Slaver Caravans"
DCS_nf_events.53.desc:0 "The soldiers of The DC Settlements keep hitting our slave caravans and setting the captives free. We are now losing 1 in 4 caravans to these people and it's really hitting the caps we rake in from selling slaves."
DCS_nf_events.53.a:0 "Those shitheads!"
DCS_nf_events.54.title:0 "Working on it?"
DCS_nf_events.54.desc:0 "We have told The Brotherhood about the mutant home in Vault 87 and they have replied that they are aware of the situation and working on a plan to wipe out the mutants once and for all."
DCS_nf_events.54.a:0 "That is a relief"
DCS_nf_events.55.title:0 "Urgent Message From The DC Settlements!"
DCS_nf_events.55.desc:0 "The DC Settlements have sent an urgent message telling us that they have discovered the super mutant threat to The Capital Wasteland is coming from Vault 87. They are requesting we pull our forces out of the area and give them control of the state so they can move their forces in to deal with the threat once and for all. As for retaining the state, they figure since it has little value to us and they are putting their lives on the line to do this they should get to keep it."
DCS_nf_events.55.a:0 "Give them the area"
DCS_nf_events.55.b:0 "Thank them for the info, but we have this under control"
DCS_nf_events.56.title:0 "The Tenpenny Commune"
DCS_nf_events.56.desc:0 "In the short time since he took control of Tenpenny Tower, Irving Cheng has turned the once luxurious settlement into some type of communist state. The many people in the tower who used to enjoy lives of luxury and liesure were quickly put to work on 'peoples farms' or pressed into service with the tower guard. Many took what posessions Cheng hadn't already confiscated and left the tower, but those that stayed seem to be adjusting and the recent departures have made room for destitute wastelanders who are now being welcomed in. They just need to mind the Chairman's motto that all wastelanders are equal, but some are more equal than others."
DCS_nf_events.56.a:0 "Weird fella"
DCS_nf_events.57.title:0 "Same Tower, Different Day"
DCS_nf_events.57.desc:0 "Herbert Daring Dashwood has done very little to change Tenpenny Tower, and honestly things could be worse. He has proven a little less bigoted than the previous management and let some less well-off wastelanders in, but otherwise little has changed."
DCS_nf_events.57.a:0 "Sounds like we made a good choice"
DCS_nf_events.58.title:0 "Where Did They Go?"
DCS_nf_events.58.desc:0 "Traders passing by Tenpenny Tower mentioned that many of the usual traders they met with were nowhere to be seen, and it was almost like they were replaced with the many ghouls Roy is packing into the tower. We sent some people to check things out and Roy Phillips insisted that the previous residents were likely alive and well, but he didn't know where they went. He said they simply couldn't stand living with ghouls and left to go live somewhere else out west. We can only hope they didn't stumble into Church of Rocky lands"
DCS_nf_events.58.a:0 "Maybe the zombies ate them"
DCS_nf_events.59.title:0 "Reparations"
DCS_nf_events.59.desc:0 "Once little more than various bands of anarchistic psychos, Briggs has transformed the various raider gangs into a successful meat curing business. While the people of The Capital Wasteland are willing to put fear aside for a taste of Molerat Wonder Meat, they still have not forgotten the years of horror. That's why with every shipment of Wonder Meat sent to a settlement, an additional box of meat will be sent to be distributed to victims of raider attacks. We do this in the spirit of moving on from the past and continuing a lasting partnership between our company and the rest of The Capital Wasteland."
DCS_nf_events.59.a:0 "We're cool now right?"
DCS_nf_events.60.title:0 "Scouts Return"
DCS_nf_events.60.desc.1:0 "It is about as we expected. Despite Ashur's grand promises of building something better and slavery just being a temporary thing, little has changed in The Pitt. The Raider King still rules with an iron fist and slaves are still at the mercy of raider overlords. If we don't do something, that may be how it stays until Ashur's death."
DCS_nf_events.60.desc.2:0 "We had heard there was some kind of slave uprising in The Pitt, and Ashur had been deposed. Still, we needed to check it out for ourselves. It is a good thing we did, because despite there being an 'uprising' little has changed in The Pitt. This new guy, Wehrner, is hardly any better than Ashur."
DCS_nf_events.60.a:0 "We need to do something!"
DCS_nf_events.61.title:0 "What's TDC?"
DCS_nf_events.61.desc:0 "Stay in The Pitt long enough and you too will suffer from the Troglodyte Degeneration Contagion, some kind of illness unique to The Pitt. Nobody knows exactly what causes it, but it's in the air, the water, everything. The rulers of The Pitt were working on a cure, studying a child that was born immune to the effects of the disease and radiation. Thankfully the child survived the war, and we can continue where they left off."
DCS_nf_events.61.a:0 "It'll take some time"
DCS_nf_events.62.title:0 "What's TDC?"
DCS_nf_events.62.desc:0 "Troglodyte Degeneration Contagion was some kind of disease that plagued the people of The Pitt for centuries. Nobody really knows what caused it, but the air and water of the area is tainted, leading to anyone that stays there long enough developing the condition. Thankfully, a cure was developed from studying a child born immune to the effects of the disease and radiation. We were able to recover the formula for the cure so nobody who settles there need live in fear of turning into a Trog."
DCS_nf_events.62.a:0 "Good thing we found that"
DCS_nf_events.63.title:0 "The Pitt Brotherhood"
DCS_nf_events.63.desc:0 "The Brotherhood of Steel has set up shop in The Pitt after deposing the previous rulers. Under the rule of Paladin Kurtz, the fires of The Pitt's industry still burn and life continues on. We're unclear if the people there are still in chains. They're The Brotherhood though, so probably not, right?"
DCS_nf_events.63.a:0 "Lyons would never enslave people"
DCS_nf_events.64.title:0 "New Despot, Same Story"
DCS_nf_events.64.desc:0 "We don't know much about who has taken over in The Pitt, as all of our scouts sent that way have not returned. What we do know is that the factories are still running and slaves are still being brought in from other parts of the wasteland. We can't allow this to continue."
DCS_nf_events.64.a:0 "Whoever it is, we will stop them"
DCS_nf_events.65.title:0 "Meeting with Paladin Kurtz"
DCS_nf_events.65.desc:0 "To quiet the concerns of The Temple of The Union, we sent representatives to The Pitt to observe how Paladin Kurtz is running things on behalf of our friends in The Brotherhood. Upon ariving on the outskirts of The Pitt, our representatives given enviromental containment suits and firmly instructed to change into them. The Knights that met them at the train tunnel assured them that the suits were for their safety, as The Pitt was ravaged by a highly contageous disease called Troglodyte Degeneration Contagion that is present in the air and water of the area. The condition leads to painful sores, and in many it eventually leads to madness and degeneration into horrible mutants called Trogs. The Brotherhood are currently working on a cure, but it could still be years away. Our group was taken on a guided tour of a tower, once owned by Ashur but now transformed into an air-tight facility where scribes can work in safety on developing a cure for TDC. Despite multiple requests, our representatives were not allowed direct contact with natives or tours of the factories where they worked. But we were assured that this was simply a quarantine measure and for our own safety. Paladin Kurtz was adamant that contact with any Pitt locals that somehow breach containment is avoided by anyone in DC. He also promised us that whatever value could be gained from The Pitt's industry would be shared with friends of The Brotherhood so long as we did not interfere with their containment efforts and risk the rest of The Wasteland."
DCS_nf_events.65.a:0 "This TDC sounds dangerous. We'd better listen"
DCS_nf_events.66.title:0 "The Horror"
DCS_nf_events.66.desc:0 "The Brotherhood assured us that their rule of The Pitt was going to be better than Ashur's. They told us that The Pitt had some local mutigenic disease called Troglodyte Degeneration Contagion that needed quarantine, and that was the only reason we hadn't seen anyone leave The Pitt. Recently someone has breached that quarantine and begged the council for help. They say their name is Willard and they were a slave in The Pitt during Ashur's reign. Willard claims that TDC isn't contageous, and Paladin Kurtz has taken advantage of his distance from the rest of The Lyons Chapter to turn The Pitt into his own personal fiefdom. Willard does not trust The Lyons Chapter to do anything to stop Kurtz and is begging us to intervene for the people of The Pitt."
DCS_nf_events.66.a:0 "It's worth investigating"
DCS_nf_events.67.title:0 "Times Are Changing"
DCS_nf_events.67.desc:0 "The threat of raiders is at an all time low, Enclave salvage is found in nearly every settlement, fresh water is free, and The Pitt's industry is spurring on industrial growth. It's safe to say that things in The Capital Wasteland are getting better by the day. What we have achieved by working together is nothing to scoff at, and this is just the beginning. With this growth however, there are problems just as there are opportunities. Without raiders keeping people hiding behind fortifications, inter-settlement travel is at an all time high. But where do the laws of a settlement end? At their gates, or at the walls of another? What about defending these large stretches of wasteland? It was easy when everyone was hunkered down behind steel or stone, but now people are spreading out and controling our borders is more important. Of course there's this industrial revolution and it's consequences as well. We've already had some settlements complaining about others dumping industrial waste near them. To address these things we are going to need to work together, compromise and expand the authority of our governing council."
DCS_nf_events.67.a:0 "Let us work together for a brighter future."
DCS_nf_events.68.title:0 "Book of Laws"
DCS_nf_events.68.desc:0 "While the laws of wasteland settlements are typically very uniform, don't commit murder, don't steal, etc, there are some exceptions. For example, in Tenpenny Tower it is illegal to wear white after the first Monday of September until the end of the year. Obviously, that law can't be fairly enforced in other parts of the wasteland where people have only one change of clothes. That's just one example of the many incongruities that pose potential issues. There's also the matter of a settlement's autonomy. We've seen a few cases of lawmen from one settlement following a criminal to another and clashing with that settlement's guards."
DCS_nf_events.68.a:0 "The Council will set laws that apply everywhere"
DCS_nf_events.68.b:0 "A settlement's laws end at their gates. Beyond, it's Council Law."
DCS_nf_events.68.c:0 "§C The Regulators will enforce wasteland justice.§!"
DCS_nf_events.68.d:0 "§G Follow the precedent set by traveling caravans.§!"
DCS_nf_events.68.e:0 "§R White after Liesure Day? Over my dead body!§!"
DCS_nf_events.68.f:0 "§O The Republic Of Dave has the best laws, apply them everywhere!§!"
DCS_nf_events.69.title:0 "A Standing Army"
DCS_nf_events.69.desc:0 "Outside of the mobilization during The Enclave conflict, we have not had much cause to bring our various settlement militias and armed groups together in a conflict. Individual militias have in the past done a good job keeping raiders out of settlements and repelling the occasional large attack. Today however, people are spreading out from settlements more than ever. If we are to prevent a regression back to most people never leaving their home settlement, we need to ensure the wastes between settlement walls remain safe. A standing army to protect our borders and deal with outside dangers will be necessary to move forward. The chief concerns are who will make up this army, how do we pay for them."
DCS_nf_events.69.a:0 "Why not just combine the militias?"
DCS_nf_events.69.b:0 "§C The settlement's military will be led by veteran Regulators. §!"
DCS_nf_events.69.c:0 "§G Mercenaries will fill the gaps militias can't fill.§!"
DCS_nf_events.69.d:0 "§R Mr. Burke knows some out of work mercs.§!"
DCS_nf_events.69.e:0 "§O Dave will lead a grand army of the settlement's loyal sons!§!"
DCS_nf_events.69.f:0 "We need a centralized military"
DCS_nf_events.70.title:0 "Consequences of Progress"
DCS_nf_events.70.desc:0 "In the 200 years since the bombs fell, every item someone in The Capital Wasteland owned came from one of two places. Either it was made 200 years ago and scavenged, or it was cobbled together by some craftsman who was likely the sole practitioner of the craft in their settlement. Both the effects of The Pitt's industry and the relative prosperity we have enjoyed have spurred on a growth of industry. The days of weapons being scavenged or patched together out of rusty pipes by some guy in a shack are coming to an end in The Capital Wasteland. This industrial growth and the founding of production companies is not without its drawbacks. This large scale industry has spurred on a market where it is sometimes more economical to dump excess material leftover from a process than try to repurpose it. This drive for the most cost-efficient manufacturing process has led to many settlements negatively impacted by industrial waste or other problems. We need to get a handle on this before it leads to long-term issues."
DCS_nf_events.70.a:0 "We can create rules on where waste can be dumped."
DCS_nf_events.70.b:0 "§C Damage to a settlement by industry will be punished. §!"
DCS_nf_events.70.c:0 "§G Call together business leaders to discuss solutions. §!"
DCS_nf_events.70.d:0 "§R They should just move to a better settlement. §!"
DCS_nf_events.70.e:0 "§O Institute rules, that The President can override. §!"
DCS_nf_events.71.title:0 "Growing A Republic"
DCS_nf_events.71.desc:0 "In recent years, The DC Settlements have become much more than a confederation of settlements. With elections, new laws, and a standing army, it is clear we are closer to what would be called a Repbulic. As our sights look beyond the borders of The Capital Wasteland it becomes clear we are not just "The DC Settlements" either. We need a new name to match our new ambition."
DCS_nf_events.71.a:0 "New Capital Republic sounded better"
DCS_nf_events.71.b:0 "No, we are the United Settlements of Dave"
DCS_nf_events.72.title:0 "Those Who Venture Don't Return"
DCS_nf_events.72.desc:0 "In recent decades, those who somehow braved the super mutant and raider infested wastes to reach the hills to our west were scarcely seen again. Those that did somehow make it back told of a mad cult that was excessively hostile to outsiders. For some time, it seemed like they had little interest in going beyond their territory so the lands were just avoided. We don't know what's changed, but people fleeing from the hills tell that this Church of Rocky has taken a more expansionist stance. We may need to act before they decide they want to head our way."
DCS_nf_events.72.a:0 "What are my options?"
DCS_nf_events.73.title:0 "Danger and Opportunity"
DCS_nf_events.73.desc:0 "The settlers of The Capital Wasteland are telling us more and more people are fleeing from the hills to their west, telling of a dangerous cult. While crushing rock-worshipers is usually outside our purview, the settlers emphasized that these cultists were seen sporting advanced pre-war weaponry. It appears they are sitting on a large cache of pre-war flamers and possibly some gauss rifles. That is worth looking into."
DCS_nf_events.73.a:0 "We can spare a squad of Knights"
DCS_nf_events.74.title:0 "Barely Worth The Effort"
DCS_nf_events.74.desc:0 "The hills of the appalachian region are not The Pitt or Boston. Yes, there is some valuable technology there, but hardly enough to justify an extended presence. That is why this offer from our friends in The Capital Wasteland is so tempting. They are requesting we turn over control of the region to their fledgling Republic and in return they will be sure to send anything that may be of our interest our way. Our continued partnership with The DC Settlements, New Capital Republic, or whatever they call themselves now seems to continue proving beneficial."
DCS_nf_events.74.a:0 "Accept their offer"
DCS_nf_events.74.b:0 "Thanks, but no thanks"
DCS_nf_events.75.title:0 "Kindred Spirits"
DCS_nf_events.75.desc:0 "After speaking with representatives from The East Coast Republic, it's clear they are a lot like us in some ways. They're mostly settlers that wanted to keep themselves safe and live their lives. Overall that's pretty much the same thing we did. Yes, they've gotten a little bigger and some of their leadership is a touch too authoritarian for our tastes, but it looks like they haven't fallen into the same pitfalls of the pre-war Government yet. Maybe working with them would be best for the both of us."
DCS_nf_events.75.a:0 "We will join The Republic as equals"
DCS_nf_events.75.b:0 "Tenpenny forgot the words DONT! TREAD! ON! ME!"
DCS_nf_events.75.c:0 "No Gods, Kings, Or Presidents for life, Dave!"
DCS_nf_events.75.d:0 "Roe does not pass the vibe check"
DCS_nf_events.76.title:0 "Folklore Bites Back"
DCS_nf_events.76.desc:0 "While touring the newly annexed territories, President Dave has heard tales of various strange creatures lurking in the hills and forests of Appalachia. Giant mothmen, hulkish horrors, and something called a wendigo. He is determined to prove his strength to the people of this region by hunting one of these things down and killing it. He's assembling a team of the best trappers and hunters of the region to join him, not because he needs thier help or anything. Just... to show them how it's done!"
DCS_nf_events.76.a:0 "You can do it, Mr President!"
DCS_nf_events.77.title:0 "Catching The MothMan"
DCS_nf_events.77.desc:0 "Mutant moths are a common sight in Appalachia, but that isn't what Dave has been after these weeks. There are tales dating back to before the war of a larger moth-like creature that is intelligent. It has eluded the most seasoned hunters for over 300 years, but Dave is built different. That's why it's so heartbreaking that after weeks of trapping and hunting, the creature vanished just as Dave trapped it. It's clear that Dave has finally met a worthy adversary, and of course he could catch it if he had more time. However, matters of state are more important. Will the people of The Wasteland understand though?"
DCS_nf_events.77.a:0 "Return empty handed"
DCS_nf_events.77.b:0 "Bag a lesser creature and say it's THE mothman"
DCS_nf_events.77.c:0 "§0Dave gazed deeply into it's purple eyes§!"
DCS_nf_events.78.title:0 "The Madness of King Tenpenny"
DCS_nf_events.78.desc:0 "From the top of Tenpenny Tower you can see just about the entire Capital Wasteland. Beyond that though, even Tenpenny needs agents to carry out his will. At Mr Burke's suggestion, Security Chief Gustavo will be tasked with bringing order to the newly conquered Appalachian territories. This Appalachian Colony will funnel wealth into the Republic's coffers, which are of course Tenpenny's coffers."
DCS_nf_events.78.a:0 "We are The Republic, our interests are theirs"
DCS_nf_events.79.title:0 "Best of The Best"
DCS_nf_events.79.desc:0 "After the initial pissing contests between the Regulators and Green Mountain soldiers died down, both groups seem to have gotten along really well. The regulators could stand to learn a lot about hill fighting, just like Green Mountain could learn a good bit about urban warfare and desert survival. It looks like this cooperation will be mutually beneficial after all."
DCS_nf_events.79.a:0 "Understood"
DCS_nf_events.80.title:0 "Rail Revolvers?"
DCS_nf_events.80.desc:0 "The eggheads say we are still quite a ways away from compact magnetic accelerated handcannons, but this is a good first step. The Regulators returned from Green Mountain carrying 10 crates of gauss rifles and schematics to produce our own. But before we start planning to give every militiaman a rifle that can pierce power armor, it's important that we understand one simple thing. Just because we know how to put a gauss rifle together, doesn't mean we know how to make all the parts necessary to produce one. We will need to look into that before we can start churning them out."
DCS_nf_events.80.a:0 "So we're halfway there?"
DCS_nf_events.81.title:0 "Sweets and Strife"
DCS_nf_events.81.desc:0 "Across the river separating us from the rest of pre-war Pennsylvania, there has been a struggle just like we have seen elsewhere in the wasteland. There are two groups frequently in conflict, one side is a group of traders and craftsmen, the other raiders who've never grown a tato in their lives. The Confectionary Collective is the former. They occupy a pre-war amusement park and factory called Hershey. Supposedly, they came from a vault beneath the place meant to preserve the art of producing something called Chocolate. Their craft over time attracted trade and they built up quite the settlement, which eventually drew the attention of The Philly Raiders. This gang is from what we can tell much like other large raider fiefdoms. Led by a man that calls himself The Warthog and his children, these raiders terrorize much of the area and have been known to occasionally sell slaves to The Pitt. It is obvious which side we should back here."
DCS_nf_events.81.a:0 "What's chocolate?"
DCS_nf_events.82.title:0 "More Questions"
DCS_nf_events.82.desc:0 "The more we dig into the cults of Andale the more we question what was going on. Blood rituals, swamp gatherings, and some connections to pre-war societies are just the tip of the iceberg. The cultists themselves are very tight-lipped and we are not getting anything out of them. That just leaves diaries and notes left unburned, which mostly give us little more than glimpses. In our efforts to understand this madness and the threat it poses, we seem to have let other things slacken. Several members of Andale leadership have escaped custody while in transit to holding cells for questioning."
DCS_nf_events.82.a:0 "Wait... What's going on at The Dunwich Building?!"
DCS_nf_events.83.title:0 "Reduced To Ashes"
DCS_nf_events.83.desc:0 "It is not worth understanding the ramblings of these madmen. They were inbred cannibals that posed a threat to decent folk, and now they're fuel for a large pyre in each of their settlements. They're joined by their journals, religious icons and anything else that could inspire this kind of darkness in the future."
DCS_nf_events.83.a:0 "Some things are better left a mystery"
DCS_nf_events.84.title:0 "Sun Shines In Andale"
DCS_nf_events.84.desc:0 "The dark clouds descending over Andale, both physically and metaphorically have cleared. The horrors brought about by their old populace stopped. People moving to the area report the occasional uneasiness or feelings of being watched, but nobody's gone missing and nothing's been turned up."
DCS_nf_events.84.a:0 "Probably nothing then"
DCS_nf_events.85.title:0 "Clashes With Brotherhood"
DCS_nf_events.85.desc:0 "The distribution of water from Project Purity by The Brotherhood of Steel has not been without its speedbumps. The Brotherhood are as meticulous as they are unyielding. That means whenever a settlement has a natural accident like loosing some water, or population outpacing updating of Brotherhood records, there are problems. These occasional scuffles have thankfully never turned to bloodshed, but it begs the question if maybe things could be better."
DCS_nf_events.85.a:0 "Could we do better?"
DCS_nf_events.86.title:0 "Rivet City's Struggle"
DCS_nf_events.86.desc:0 "Rivet City distributing water to the rest of The Capital Wasteland has been a godsend. However, the cracks are showing. Their guards distributing the water are overworked, and there have been a handfull of mishaps leaving shipments light. It is clear Rivet City could use some help."
DCS_nf_events.86.a:0 "It's the least we could do"
DCS_nf_events.87.title:0 "Who Put Them In Charge?"
DCS_nf_events.87.desc:0 "To put it simply, we're not sure how Project Purity's current occupants came to own the palce. What we do know is they don't share the water with anyone else. That water could save countless lives if in the right hands, our hands."
DCS_nf_events.87.a:0 "Seriously, how did THEY occupy that place?"
DCS_nf_events.88.title:0 "A Helping Hand"
DCS_nf_events.88.desc:0 "The Brotherhood could use help handling Project Purity. From purifying the water all the way up to getting the water into wastelander hands they have problems that could be easily solved with just a little manpower or resources. The council is debating how we will lend aid."
DCS_nf_events.88.a:0 "Send some militia to help guard caravans."
DCS_nf_events.88.b:0 "Caps can fix most problems."
DCS_nf_events.88.c:0 "§C Send Regulators to hunt down anyone messing with caravans §!"
DCS_nf_events.88.d:0 "§G Roe knows some expert guides that could help plotting routes. §!"
DCS_nf_events.88.e:0 "§R Mr. Burke has some good ideas, and friends.§!"
DCS_nf_events.88.f:0 "§O Institute tighter water rations, outside of the capital §!"
DCS_nf_events.89.title:0 "A Seat At The Table"
DCS_nf_events.89.desc:0 "The East Coast Republic is appreciative of our efforts to distribute the water of Project Purity. So appreciative in fact, that they are offering to lend support and asking us to send a representative to their council to discuss how best to achieve that. This of course is just a first step towards us joining this larger republic they're putting together. The council is discussing the matter now."
DCS_nf_events.89.a:0 "Lets work together"
DCS_nf_events.89.b:0 "We'll take the help, but go our own way too"
DCS_nf_events.89.c:0 "No way will we work with that bastard!"
DCS_nf_events.90.title:0 "Harder Than It Looked"
DCS_nf_events.90.desc:0 "While the purifier was left pretty undamaged from our fight with its previous occupants, things are not going as smoothly as expected. Running this purifier takes a lot of work, and we are short handed to say the least. The council has called an emergency meeting to discuss how to resolve this issue."
DCS_nf_events.90.a:0 "Assign more men to assist the project"
DCS_nf_events.90.b:0 "Throw caps at the problem"
DCS_nf_events.90.c:0 "§C Send Regulators to hunt down anyone messing with caravans §!"
DCS_nf_events.90.d:0 "§G Roe knows some expert guides that could help plotting routes. §!"
DCS_nf_events.90.e:0 "§R Mr. Burke has some good ideas, and friends.§!"
DCS_nf_events.90.f:0 "§O Institute tighter water rations, outside of the capital §!"
DCS_nf_events.91.title:0 "A Helping Hand"
DCS_nf_events.91.desc:0 "Rivet City has accepted our offer for help with the purifier. From purifying the water all the way up to getting the water into wastelander hands they have problems that could be easily solved with just a little manpower or resources. The council is debating how we will lend aid."
DCS_nf_events.91.a:0 "Send some militia to help guard caravans."
DCS_nf_events.91.b:0 "Caps can fix most problems."
DCS_nf_events.91.c:0 "§C Send Regulators to hunt down anyone messing with caravans §!"
DCS_nf_events.91.d:0 "§G Roe knows some expert guides that could help plotting routes. §!"
DCS_nf_events.91.e:0 "§R Mr. Burke has some good ideas, and friends.§!"
DCS_nf_events.91.f:0 "§O Institute tighter water rations, outside of the capital §!"
DCS_nf_events.92.title:0 "Mind Your Own Business"
DCS_nf_events.92.desc:0 "The leader of The Dover Traders has approached our council stating that they plan to take a more direct approach in their conflict with The Bayfishers. They have requested we stay out of the conflict, and promised us either rewards or consequences based on how we take their advice."
DCS_nf_events.92.a:0 "We will see how this plays out"
DCS_nf_events.93.title:0 "Help Your Neighbor"
DCS_nf_events.93.desc:0 "We can not sit idly by while The Bayfishers fall prey to the greedy macinations of a few thugs and their mercenary army. We may not be able to pull the full force of our milita away to help them, but we can do something."
DCS_nf_events.93.a:0 "Send them volunteers"
DCS_nf_events.93.b:0 "Send them weapons"
DCS_nf_events.94.title:0 "Harm Reduction"
DCS_nf_events.94.desc:0 "It is clear that a swift end to this conflict is what's best for everyone. So, rather than sit idle or support The Bayfishers in a losing battle, we will help Dover to overwhelm The Bayfishers more easily. This will hopefully bring the conflict to a quicker end, and save lives right?"
DCS_nf_events.94.a:0 "Send them volunteers"
DCS_nf_events.94.b:0 "Send them weapons"
DCS_nf_events.95.title:0 "The Delmarva Settlements"
DCS_nf_events.95.desc:0 "At long last, our conflict with The Bayfishers is at an end. These fishermen have accepted our rule, and profits will be higher than ever. There is the matter of the DC Settements though, they've asked us to join their Republic."
DCS_nf_events.95.a:0 "We will join"
DCS_nf_events.95.b:0 "We will not join"
DCS_nf_events.95.c:0 "Dave aims to annex us? Hell no!"
DCS_nf_events.96.title:0 "The Delmarva Settlements"
DCS_nf_events.96.desc:0 "Those greedy bastards at The Dover Traders' Association thought they could steamroll some good hard working people. We proved them wrong and now we will make sure the surviving traders stick to the straight and narrow. There is the matter of the DC Settlements though, they have asked us to join their republic."
DCS_nf_events.96.a:0 "We will join"
DCS_nf_events.96.b:0 "We will not join"
DCS_nf_events.96.c:0 "Dave aims to annex us? Hell no!"
DCS_nf_events.97.title:0 "Opening Day"
DCS_nf_events.97.desc:0 "Today marks the opening of the Tenpenny Beach Resort. It took lots of blood, sweat, and taxpayer caps, but the exclusive oceanside getaway is finally accepting its first guests. Mr. Burke, Tenpenny's spokesperson, was questioned about the point of a luxurious beachside resort when most wasteland families live in one room scrapmetal shacks. He refused to comment beyond stating that the most important members of society can't be expected to writhe in the filth of their lessers."
DCS_nf_events.97.a:0 "No Ghouls allowed of course"
DCS_nf_events.98.title:0 "Free Realestate"
DCS_nf_events.98.desc:0 "The Citadel was once the home to The Brotherhood of Steel, that was until our recent bloody conflict. Now it sits empty like many other buildings in DC. Unlike those other buildings, The Citadel has been upkept and partially restored over the last 50 years. Combined with its functioning generators, fortifications and location near several routes into downtown DC, it is a prime location to set up shop. There is always the potential to just establish a new settlement. But surely, we can think of something better."
DCS_nf_events.98.a:0 "No, we can't. New settlement it is."
DCS_nf_events.98.b:0 "§C It will be the new headquarters of our army. §!"
DCS_nf_events.98.c:0 "§G The perfect place to set up a trade hub to rival Rivet City. §!"
DCS_nf_events.98.d:0 "§R We should lease the space, not just let people settle there.§!"
DCS_nf_events.98.e:0 "§O Obviously, it will be the new Presidential Palace! §!"
DCS_nf_events.99.title:0 "He Fought The Good Fight"
DCS_nf_events.99.desc:0 "3-Dog was a favorite of many in The Capital Wasteland. He always told it like it was and fought the good fight. That is why it is such a shame that he saw The DC Settlements under it's current leadership as a threat. He was constantly critical of the current chairperson, and when our war with The Brotherhood brought us to GNR's doorstep, he took up a rifle. A new DJ has taken over at GNR, but things will never be the same."
DCS_nf_events.99.a:0 "§R Good Riddance §!"
DCS_nf_events.99.b:0 "§O Good Riddance §!"
DCS_nf_events.100.title:0 "Wasteland's Bravest"
DCS_nf_events.100.desc:0 "The toughest lawmen in the wastes, The Regulators work tirelessly to rid the wasteland of injustice. Usually armed with little more than a leather coat and a six-shooter, regulators put fear into the heart of the wasteland's worst. Now they are being brought into our militias ready to put fear into the heart of anyone that thinks of harming our citizens."
DCS_nf_events.100.a:0 "Welcome, Regulators"
DCS_nf_events.101.title:0 "A seat at the table"
DCS_nf_events.101.desc:0 "The East Coast Republic has requested us to join them. We would maintain our autonomy, but would be expected to cooperate with the other settlements and help in collective defesnse. In return for this, we would have a seat at the table. Who sits at that seat is up to us, and there is already squabbling in the council about it before we have even decided if we will even accept the offer."
DCS_nf_events.101.a:0 "We accept, send Seagrave"
DCS_nf_events.101.b:0 "We accept, send Bannon"
DCS_nf_events.101.e:0 "Decline their offer"
DCS_nf_events.101.f:0 "Dave aims to annex us! Ready security!"
DCS_nf_events.102.title:0 "Rivet City Refuses"
DCS_nf_events.102.desc:0 "Rivet City has refused our request to join The East Coast Republic. It is an unfortunate turn of events, but it wouldn't be right to infringe on their autonomy."
DCS_nf_events.102.a:0 "They made their choice"
DCS_nf_events.102.b:0 "Or would it?"
DCS_nf_events.103.title:0 "Pitt Brotherhood Defeated!"
DCS_nf_events.103.desc:0 "The stranglehold Paladin Kurtz had on The Pitt has been loosened. Many brave men and women of our militias charged at Brotherhood outposts in The Pitt and drove the fallen knights back to the tower they use as a command centre. As the fighting continued, many of The Pitt's slaves took up arms in support of their liberators. It is only a matter of time before we breach their final defenses and put an end to the nightmare the people of The Pitt have suffered for so long. There is one unfortunate problem we need to think about. While we sent representatives to The Citadel informing them of the actions of their rogue brothers, it is entirely possible that they still stand by them. This could end up leading to war."
DCS_nf_events.103.a:0 "If The Brotherhood supports Kurtz, we must fight them too!"
DCS_nf_events.104.title:0 "Pitt Defenses Hold"
DCS_nf_events.104.desc:0 "The Knights under the command of Paladin Kurtz have held off our advances on The Pitt. Unfortunately it looks like we have failed in our attempts to liberate these people through force. We can only hope that The Brotherhood stepps in to get rid of this monster they unleashed on The Pitt."
DCS_nf_events.104.a:0 "Lets hope they believed our messengers"
DCS_nf_events.105.title:0 "DC Settlements Attacked Us!"
DCS_nf_events.105.desc:0 "The DC settlements launched an assault on our outpost in The Pitt, which was fended off by Paladin Kurtz and his knights. Around the time we received the first transmissions about this attack, several representatives from The DC Settlements approached The Citadel's gates. They told us the attack was in response to reports that Kurtz had gone rouge and was running The Pitt much the same way Ashur had. They brought with them slaves that say they escaped from The Pitt, who tell of horrendous cruelty and malace. If their stories are to be believed, Kurtz has not been acting in the ideals of our chapter and rather is behaving like a raider warlord. They pleading with us to step in and do what they could not."
DCS_nf_events.105.a:0 "Send The Pride to collect Kurtz for trial"
DCS_nf_events.105.b:0 "We can not tolerate an attack on our brothers!"
DCS_nf_events.106.title:0 "DC Settlements Attacked Us!"
DCS_nf_events.106.desc:0 "The DC settlements launched an assault on our outpost in The Pitt, which as left Paladin Kurtz and his surviving men desperately trying to defend their command centre. Around the time we received the first transmissions about this attack, several representatives from The DC Settlements approached The Citadel's gates. They told us the attack was in response to reports that Kurtz had gone rouge and was running The Pitt much the same way Ashur had. They brought with them slaves that say they escaped from The Pitt, who tell of horrendous cruelty and malace. If their stories are to be believed, Kurtz has not been acting in the ideals of our chapter and rather is behaving like a raider warlord. They ask that we stay out of their way while they deal with Kurtz and his accomplices."
DCS_nf_events.106.a:0 "Allow the wastelanders their justice"
DCS_nf_events.106.b:0 "Send The Pride to collect Kurtz for trial"
DCS_nf_events.106.c:0 "We can not tolerate an attack on our brothers!"
DCS_nf_events.107.title:0 "The Fall of Paladin Kurtz"
DCS_nf_events.107.desc:0 "The Brotherhood of Steel have given us their word they will not interfere with us bringing Paladin Kurtz to justice. That is good, because around the time they gave us this assurance, our forces had breached the final defenses of the tower and killed the fallen paladin along with his last defenders. Our forces have stepped in to ensure the last of the rogue knights are hunted down and prevent The Pitt from falling back into anarchy or into the hands of another despot."
DCS_nf_events.107.a:0 "Well done!"
DCS_nf_events.108.title:0 "Justice Delayed"
DCS_nf_events.108.desc:0 "The Brotherhood of Steel has stepped in and collected Paladin Kurtz from his tower in The Pitt via vertibird. What he doesn't know is that this was not a rescue but an arrest. We have been assured by The Brotherhood that Kurtz will face a trial and punnished by the terms of their codex. Not everyone is happy with this outcome, but at least The Pitt is saved from a tyrant and justice will be delivered eventually. Our forces have stepped in to ensure the last of the rogue knights are hunted down and prevent The Pitt from falling back into anarchy or into the hands of another despot."
DCS_nf_events.108.a:0 "Not the best outcome, but not the worst"
DCS_nf_events.109.title:0 "The Brotherhood Stepps In!"
DCS_nf_events.109.desc:0 "Despite our representatives sent to The Citadel outlining the horrorible actions of Paladin Kurtz, The Brotherhood of Steel has stood by him. Not only have they sent a team to rescue the monster, but they have promised retaliation for us killing members of their order! The militias are being called up and preparing for war."
DCS_nf_events.110.title:0 "Justice Delayed"
DCS_nf_events.110.desc:0 "The Brotherhood of steel has called back Paladin Kurtz and his top men to The Citadel. The fact that they have been seen leaving showes they must think this a debriefing from our attack and not an arrest. With the defenses of The Pitt weakened, our men were able to move in and liberate the city. We have been assured by The Brotherhood that Kurtz will face a trial and punnished by the terms of their codex. Not everyone is happy with this outcome, but at least The Pitt is saved from a tyrant and justice will be delivered eventually. Our forces have stepped in to ensure the last of the rogue knights are hunted down and prevent The Pitt from falling back into anarchy or into the hands of another despot."
DCS_nf_events.110.a:0 "Not the best outcome, but not the worst"
DCS_nf_events.111.title:0 "A Visit From The Abolitionists"
DCS_nf_events.111.desc:0 "We recently received a delegation from [DCS.GetTag]. Leading them was Hannibal Hamlin, the leader of an army of escaped slaves called The Abolitionists. Many of our people originally from The Capital Wasteland regard him with reverance. The delegation wished to bring our city into the fold with [DCS.GetTag]. From what they tell us, the state is aligned with us for the cause of freedom. At the very least, we could both benefit from mutual trade."
DCS_nf_events.111.a:0 "We will join with them"
DCS_nf_events.111.b:0 "Trade will suffice"
DCS_nf_events.112.title:0 "The Fate of The Republic"
DCS_nf_events.112.desc:0 "With Dave's uprising dealt with, we now have to decide what becomes of his Republic. The small settlement is now under militia occupation following Dave's retreat from The Capital Wasteland. This can't last forever and we need to decide what we are going to do with Dave's family and his compound. One of his wives, Rosie, has requested we allow her to take control of the settlement and turn it into functional ranch. Meanwhile his son Bob has proposed we give him some soldiers and allow him to turn the compound into a fort to defend our northern border from bandits. Of course, our newly elected chairperson may have an idea as well."
DCS_nf_events.112.a:0 "Support Rosie's proposal"
DCS_nf_events.112.b:0 "Support Bob's fort"
DCS_nf_events.112.c:0 "§C Give the compound to The Regulators and jail Dave's allies. §!"
DCS_nf_events.112.d:0 "§G Roe knows some traders that'd pay for the place. §!"
DCS_nf_events.112.e:0 "§R Mr. Tenpenny thinks the middle of nowhere is a good place to send ghouls. §!"

###Sale Events###
DCS_sale_decision_events.1.title:0 "Robot Sale"
DCS_sale_decision_events.1.desc:0 "The Outcasts are hardly swimming in manpower, so any chance they have to suppliment their forces with robots is jumped at. These civilian robots we found may not be rolling death machines, but they have their use. The Outcasts are offering us either a few crates of low-quality weapons or some missle launchers."
DCS_sale_decision_events.1.a:0 "Lets take the guns"
DCS_sale_decision_events.1.b:0 "Get the big guns"
DCS_sale_decision_events.1.c:0 "We changed our mind"
DCS_sale_decision_events.2.title:0 "Selling Armor"
DCS_sale_decision_events.2.desc:0 "The Outcasts outfit most of their force in pre-war suits of T-45d power armor, but they don't exactly have a means of producing a new suit from scratch. Because of this, they are always in search of spare parts or even full suits like we have today. For the armor they are offering either some flamethrowers or a 2-to-1 trade of refurbished combat armor."
DCS_sale_decision_events.2.a:0 "Lets play with fire"
DCS_sale_decision_events.2.b:0 "This stuff is way better than metal armor"
DCS_sale_decision_events.2.c:0 "We changed our mind"
DCS_sale_decision_events.3.title:0 "The Red Carpet"
DCS_sale_decision_events.3.desc:0 "The Outcasts all but rolled out a red carpet when we said we were coming in with genuine enclave power armor. While they were disappointed that so many suits were riddled with bullet holes, what could they expect from suits pried off of dead enclave soldiers? For this find they are offering either quality energy weapons, or a few old Mr gutsys."
DCS_sale_decision_events.3.a:0 "Pew Pew"
DCS_sale_decision_events.3.b:0 "Bring back the bots"
DCS_sale_decision_events.3.c:0 "We changed our mind"
DCS_sale_decision_events.4.title:0 "Selling Armor"
DCS_sale_decision_events.4.desc:0 "The Outcasts mostly sport old T-45d armor which the people in our settlements that know power armor say is not as good as these T-51bs we have. Naturally, they want the best armor they can get and are offering a really good deal for this. They will give us a few crates of quality pre-war weaponry, or some high explosives."
DCS_sale_decision_events.4.a:0 "Lets go with the rifles"
DCS_sale_decision_events.4.b:0 "Tonight long stick goes boom"
DCS_sale_decision_events.4.c:0 "We changed our mind"
DCS_sale_decision_events.5.title:0 "Selling Parts"
DCS_sale_decision_events.5.desc:0 "The Outcasts have all kinds of doodads and thing-a-majigs that need new parts to keep them running. While not as exciting to them as a plasma rifle or suit of power armor, they are still willing to pay us with some guns or some basic supplies for the salvage."
DCS_sale_decision_events.5.a:0 "Take the guns"
DCS_sale_decision_events.5.b:0 "We could use the supplies"
DCS_sale_decision_events.5.c:0 "We changed our mind"
DCS_sale_decision_events.6.title:0 "Selling Scrap"
DCS_sale_decision_events.6.desc:0 "The Outcasts have a lot of pre-war systems in their base that need new parts to keep running. Sure they could find these circuit boards and coils of wire in the ruins themselves, but we are saving them the trip. Because this is more of a conevenience thing their offered payment is a little light. We can either grab a collection of gear they took from raiders, or a few old AT-rifles."
DCS_sale_decision_events.6.a:0 "Lets take the weapons"
DCS_sale_decision_events.6.b:0 "The rifles sound good"
DCS_sale_decision_events.6.c:0 "We changed our mind"
DCS_sale_decision_events.7.title:0 "Not-so-free birds"
DCS_sale_decision_events.7.desc:0 "The vertibirds we have are of particular interest to The Outcasts. Because of this, they are busting out the big guns to purchase them. We can trade these vertibirds either for some miniguns, or grab a few crates of laser rifles!"
DCS_sale_decision_events.7.a:0 "More barrels means more dead raiders"
DCS_sale_decision_events.7.b:0 "Take the pew-pews"
DCS_sale_decision_events.7.c:0 "We changed our mind"
DCS_sale_decision_events.8.title:0 "Strange Power Armor"
DCS_sale_decision_events.8.desc:0 "The Outcasts seemed like they hadn't seen this kind of power armor either. Because of the novelty, they were willing to pay a little more than their usual fare for this kind of equipment. We can claim a few crates of grenade launchers, or a few gatling lasers."
DCS_sale_decision_events.8.a:0 "Grab the boomsticks"
DCS_sale_decision_events.8.b:0 "Im surprised they would trade these"
DCS_sale_decision_events.8.c:0 "We changed our mind"

