  RULE_MAP_SETUP_DCM_STATUS:0 "@DCM DC Mutant Situation"
  RULE_MAP_SETUP_DCM_STATUS_DEFAULT:0 "@DCM Normal Mutant Rise"
  RULE_MAP_SETUP_DCM_STATUS_DEFAULT_DESC:0 "The Super Mutants of The Capital Wasteland begin the game similar to how they are in Fallout 3. A threat to the people of The Wasteland, but no more organized than raider gangs or packs of wild dogs. If left unchecked, they could grow to something more."
  RULE_MAP_SETUP_DCM_STATUS_MUTANTS_RISE:0 "@DCM The Mutants Organize Early!"
  RULE_MAP_SETUP_DCM_STATUS_MUTANTS_RISE_DESC:0 "Rather than building in threat and eventually organizing, the Super Mutants of The Capital Wasteland will be unified years earlier. A dark cloud is descending on The Capital Wasteland."
  
