  RULE_UNIFIERS_OWB_NCR:0 "@NCR The NCR Controls the West Coast"
  RULE_UNIFIERS_OWB_NCR_DESC:0 "The NCR will control all base Old World Blues countries.\n\n§RThis option will make loading take far longer.§!"
