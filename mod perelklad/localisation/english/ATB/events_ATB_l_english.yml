l_english:

  nf_atb.1.t:0 "Кінець початку"
  nf_atb.1.d:0 "Мур у своєму минулому житті був нечестивцем. Шарлатаном, аферистом, продавцем цілющої води. Він пробивав собі дорогу життям, залишаючи міста до того, як його злочини могли його наздогнати. Але коли він мало не загинув в автокатастрофі, все змінилося.\n\nМенш ніж за місяць до падіння бомб Мур навернувся до християнства. Його хрещення було призначене на 23 жовтня 2077 року, але доля розпорядилася інакше. Коли впали бомби, він опинився сам серед руїн міста, дивом уцілілий. Цей апокаліпсис став його справжнім хрещенням.\n\nМур почав мандрувати пустками, проповідуючи свою нову віру — віру в Отця, Сина і Святе Сяйво. Минули десятиліття, перш ніж він знайшов послідовників."
  nf_atb.1.a:0 "Всемогутній прислухався до його слів"
  nf_atb.1.b:0 "Лагідні пішли за його світлом"

  nf_atb.2.t:0 "Кінець мандрівки"
  nf_atb.2.d:0 "Мур отримав значну кількість послідовників, але він та його паства все ще блукали пустками без дому. Відкинуті багатьма громадами, які вони зустрічали на своєму шляху через свої навернення та віру, віряни продовжували шукати місце для життя.\n\nЗрештою, вони прибули до Вірджинії. Небезпечне та язичницьке болото, проте Мур виявив, що багато тутешніх племінників та болотяників охоче навертаються, і громада нарешті осіла в містечку Чейз-Міллс, швидко навернувши більшість населення.\n\nОднак з часом болота продовжували розростатися. Зіткнувшись із цією загрозою, Мур та його паства мусили прийняти рішення."
  nf_atb.2.a:0 "Болота були надто небезпечними"
  nf_atb.2.b:0 "Ми могли б прийняти болота"

  nf_atb.3.t:0 "Дивні союзники"
  nf_atb.3.d:0 "Коли Мур та його паства прибули до Вірджинії, вони опинилися в строкатому хаосі невідомих фракцій та альянсів, розділених між небезпечним Садом Едему, непередбачуваними Пожежними Маршалами та іншими новачками — Апокрифами Посейдона. З часом стало зрозуміло, що поточна система є нежиттєздатною. Потім з'явився Ноунфолк.\n\nСитуація у Вірджинії стрімко погіршувалася, і Атом-Баптистам потрібні були друзі — або принаймні люди, з якими їм поки що не доведеться воювати. Очевидним кандидатом були Пожежні Маршали. Хоч і непривітні, вони не були відверто ворожими до нашої релігії та зберігали певний глузд у цих жахливих болотах. Тим не менш, це був союз заради зручності, а не дружби..."
  nf_atb.3.a:0 "Поганий час жити у Вірджинії"
    atb_frm_alliance_tt:0 "Пожежні Маршали §Oневдоволені§! нашою присутністю. Якщо ми зможемо отримати достатньо послідовників, §7ми могли б взяти під контроль Пожежних Маршалів§!, але якщо опір нашій присутності стане надто сильним, §Oсоюз розпадеться§!."

  nf_atb.4.t:0 "Делегація з Рівет-Сіті"
  nf_atb.4.d:0 "Нашій делегації вдалося потрапити до Рівет-Сіті, незважаючи на підозри служби безпеки, та зустрітися з отцем Кліффордом у скромній каплиці. Він розповів їм про Святу Моніку та її турботу про заблуканих і заблудлих — особливо про дітей. Хоча його релігія, очевидно, відрізняється від нашої, ми дійшли до взаємного визнання та розуміння поглядів один одного. Можливо, в Атом-Баптизмі є місце і для Святої Моніки."
  nf_atb.4.a:0 "Приємно познайомитися, отче Кліффорде"
    atb_religious_exchange:0 "Релігійний обмін"

  nf_atb.5.t:0 "Делегація з Мегатонни"
  nf_atb.5.d:0 "Нашій делегації вдалося безпечно дістатися Мегатонни через руїни Столичної Пустки та зустрітися зі сповідником Кромвелем. Кромвель проводить час, проповідуючи біля недетонованої атомної бомби в центрі міста — перспектива, що лякає навіть тих, хто поклоняється Святому Сяйву. Тим не менш, ми почули про його вірування, про Дітей Атома. Наші вірування дуже різні, але ці перспективи можуть допомогти нам пролити світло на природу нашого власного Святого Сяйва."
  nf_atb.5.a:0 "Приємно познайомитися, сповіднику Кромвелю"

  nf_atb.6.t:0 "Місіонери від Атом-Баптистів"
  nf_atb.6.d:0 "Ми помітили тихі розмови серед людей, які прояснюють одне — серед нас є місіонери. Люди тихо навертаються до Атом-Баптизму — віри, що зростає на болотах Вірджинії. Хоча цей рух дуже малий, деякі відокремлюються, щоб знайти віру в Атом-Баптистів."
  nf_atb.6.a:0 "Це просто обрізання зайвого, але все ж"