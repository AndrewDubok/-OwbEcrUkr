l_english:
  
  ATB_Pastor_Moore_name:0 "Пастор Мур"
  ATB_Pastor_Moore_DESC:0 "Пастор Джеймс Говард Мур, який народився до Великої Війни у великому місті Мейкон, штат Джорджія, роками блукав пустками, маючи при собі тільки одяг і Біблію короля Якова, запитуючи себе, чому він продовжує жити, тоді як інші вмирають. Знайшовши у Вірджинії послідовників Атома, він направив їх до світла Ісуса, і так з'явилися Атом-Баптисти. Тепер він допомагає своїй пастві зберігати постійну пильність щодо язичників, відьом і дурнів, що населяють південь Вірджинії."