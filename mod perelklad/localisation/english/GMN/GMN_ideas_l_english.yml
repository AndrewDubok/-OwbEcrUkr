l_english:

    ###New Ideas###
    GMN_safety_standards_idea:0 "Safety Standards"
    GMN_safety_standards_idea_desc:0 "Less people dying in horrible accidents in factories, is good. You would think this would be obvious to everyone, but it ain't"

    GMN_enough_cults_idea:0 "Cultists Bane"
    GMN_enough_cults_idea_desc:0 "Violent cults are a common thing in the wasteland. These strange groups abduct and kill anyone that their leaders direct them at. They will find no easy targets in Appalachia."

    GMN_farming_exports_idea:0 "Farming Exports"
    GMN_farming_exports_idea_desc:0 "We grow much more food than we need. Trading with those that can't grow as much means we can get other things we need."
    
    GMN_protecting_caravans_idea:0 "Protecting Caravans"
    GMN_protecting_caravans_idea_desc:0 "The Green Mountain Boys are protecting caravans that pass through our territory. Very few raiders would dare mess with that escort, but those that do make good target practice."

    GMN_ranger_bane_idea:0 "Rangers Bane"
    GMN_ranger_bane_idea_desc:0 "The rangers of Monongahela taught us the tricks of their trade. Now we use that knowledge against them."

    GMN_ultracite_pa_idea:0 "Ultracite Power Armor"
    GMN_ultracite_pa_idea_desc:0 "Developed by a long dead Brotherhood chapter, this advanced power armor will help us keep Appalachia free."

    GMN_eagle_slayers_idea:0 "Slayed The Imperial Eagle"
    GMN_eagle_slayers_idea_desc:0 "The Enclave, the last remnants of all that was wrong with old America, have been destroyed by our hand."

    GMN_swamp_victory_idea:0 "Victory In The Swamps"
    GMN_swamp_victory_idea_desc:0 "The swamps of Virginia were a slog to fight through. There are few things the wasteland can throw at us that'd match what we have been through."

    GMN_swamp_cooperation_idea:0 "Cross-Virginian Trade"
    GMN_swamp_cooperation_idea_desc:0 "From the hills of West Virginia to the Virginian swamps, trade caravans move unbothered by anything but the occasional stray critter. This benefits everyone."

    ###Old Ideas###
    gmn_mountain_boys:0 "An Army Without a State"
    gmn_mountain_boys_desc:0 "A force of ghouls, humans and mutants from across Appalachia originating from pre-war guerillas, Free Staters and post-war survivalists, the "Green Mountain Boys"--as their defence force has become known--act as one of the best forces in the wasteland, knowing Appalachia like the back of their hands."

    gmn_weary_settlers:0 "Hillbillies, and Proud of It!"
    gmn_weary_settlers_desc:0 "The people of Appalachia live in a harsh wasteland, filled to the brim with death, misery, and bloodshed. It is with this, that they have toughened, their resolve has been steeled and their regional unity has only grown. This is a double edged sword however.\n\nWhile defending Appalachia is easy enough, expanding the Green Mountain Boys' territory is practically impossible, unless you want to find yourself on the wrong end of a revolt or Artisan Strike."

    gmn_guards:0 "The Northeastern Guard"
    gmn_guards_desc:0 "The Green Mountain Boys have always had a love-hate relationship with the Rangers of Monongahela, howeveer the one thing the two very much agree on is their despisal for the Raiders in the Capital Wasteland, thus their defence pact readies itself against the possibility of the Raiders striking. Or worse."
    
    mon_guards:0 "The Northeastern Guard"
    mon_guards_desc:0 "The Green Mountain Boys have always had a love-hate relationship with the Rangers of Monongahela, howeveer the one thing the two very much agree on is their despisal for the Raiders in the Capital Wasteland, thus their defence pact readies itself against the possibility of the Raiders striking. Or worse."

    GMN_appalachian_identity_idea:0 "The Appalachain Identity"
    GMN_appalachian_identity_idea_desc:0 "The hills of Appalachia run as far north as Old New York, and as far south as Georgia. Across that whole stretch of this great land there are countless people of various beliefs and lifestyles. One thing that unites us is these hills. We all know the struggle to live in this rugged terrain, and that is enough to bring us a little closer together."
    
    GMN_appalachian_identity_2_idea:0 "The Appalachain Identity"
    GMN_appalachian_identity_2_idea_desc:0 "The hills of Appalachia run as far north as Old New York, and as far south as Georgia. Across that whole stretch of this great land there are countless people of various beliefs and lifestyles. One thing that unites us is these hills. We all know the struggle to live in this rugged terrain, and that is enough to bring us a little closer together."

    GMN_rocky_memories_idea:0 "Rocky Memories"
    GMN_rocky_memories_idea_desc:0 "It has been more than a few years since we fought those rock cultists, but how much could their tactics have changed in those years?"

    GMN_rocky_fought_idea:0 "New Tactics"
    GMN_rocky_fought_idea_desc:0 "Those of our people that went north to fight and returned know a lot about the new tactics these cultists employ. They are helping our militias prepare."

    GMN_anti_rocky_volunteers_idea:0 "Volunteers Going North"
    GMN_anti_rocky_volunteers_idea_desc:0 "We have heard of the rock cultists that fled north stirring up trouble. More and more of our guys are heading up there to fight them, and not all of them make it back."
    
