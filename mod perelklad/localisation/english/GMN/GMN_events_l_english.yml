l_english:
    ### TOOLTIPS
    
    ### EVENTS
    nf_GMN_1.title:0 "Days Gone By"
    nf_GMN_1.desc:0 "When the Commonwealth System was implemented in the 60s, it was clearly everything was fucked. The state legislatures became figureheads, if they even still convened at all. Hell, what did the Commonwealths even do? Let the Federal Government trample over our rights as we fought desperately to keep down tax rates and keep up minimum wage? American democracy died long before the deep state arose, and if we weren’t around back then, I’d shutter to see what they would’ve gotten away with in Virginia.\n\nUsed to be just me and a few others, a handful of rifles, spray paint cans and dollars between us. Kept off the grid, constantly stalking the forests along the coast till the army finally decided to clear us out. Fought our way all the way west, hand-in-hand with the Free Staters, who, well I don’t wanna say “nut job” but were seemin’ an awful lot like commies. Didn’t matter much at that point, we had to survive and might as well do it with the reds then the blues.\n\nWhen the bombs dropped? Well I hate to say it but we hunkered down with the Free Staters, worked with them as nuclear winter thawed to bring some kinda semblance of stability to West Virginia. Then the Brotherhood decided to reveal their ugly mugs. A few skirmishes later and our houses were burnt. Only reason we got outta there alive was because we saw the writing on the walls.\n\n"
    nf_GMN_1.a:0 "Got out with some Brotherhood loot, fresh from their corpses."
    nf_GMN_1.b:0 "Looted a few Free Stater stockpiles when we left."
    nf_GMN_1.c:0 "Took as many refugees as we could with us."
    nf_GMN_1.d:0 "Gathered a few like-minded militia on our way out."
    
    nf_GMN_2.title:0 "The Liberators of Appalachia"
    nf_GMN_2.desc:0 "As the last powers of Appalachia duked it out over old world grudges or gold, the Green Mountain Boys, and their steadily growing population of followers, reached toward Watoga, disabling the local robotic population and then fortifying the city, fighting off a number of factions as they grew, dozens of refugees fleeing to the relatively stable region, with farmsteads and settlements that arose nearby quickly begging for support from the settlement.\n\nThis saw them only grow in influence, the Green Mountain Boys acting as a local defense force and reaping the rewards of it in terms of popularity, caps and what have you. It was also with this influence that they did some good in the community, focusing their efforts toward eradicating raider gangs, solving disputes and haggling businesses with notoriously low quality labor conditions. It was this that further garnered them support, and recruits, progressively expanding their influence past even Watoga.\n\nIt was following the attack of Harper’s Ferry by a band of raiders that the Green Mountain Boys decided it was time to throw them out, and earn the title of “Liberators of Appalachia”. The so-called “Blood Eagles” were isolated, and slaughtered. When the GMB then breached the city with a large force of men in stolen military garb, they sent the raiders into a full rout, liberating the city and cementing their control over the southeast West Virginia."
    nf_GMN_2.a:0 "They found the city mostly intact."
    nf_GMN_2.b:0 "A few slave pits were refurbished."
    
    nf_GMN_3.title:0 "Those Damn Cultists"
    nf_GMN_3.desc:0 "The so-called “Church of Rocky '' occupied the rural areas around Harper’s Ferry and Watoga for a few years, a bunch of weird cultists worshiping some pet rock or another. While they were certainly strange, nobody believed they were hostile, and most simply ignored them with the “live and let live” mentality. However, that all changed only a few years ago when a dozen reports and rumors reached the desk and ear of Fallon, detailing a series of scuffles and raids partaken with and by the Church.\n\nUpon investigating the matter, reports came in about a dozen burnt farmsteads and dozens more missing persons, all in and around the Church’s main territory. A few scouting parties sent out were accosted by the Church’s men, declaring them “trespassers” on their territory. This, of course, was followed by a series of altercations between the two as fists, rocks, and even on one occasion, knives were thrown at each other.\n\nA firefight broke out when Fallon decided to go meet with Saint Gravel, resulting in Fallon calling in reinforcements and moving to attack their Church across the hills, a hundred or so men following. The fight was short and rough, but in the end, Rocky’s followers were sent scrambling on their hands and knees into the woods, a celebration following as men and women of all stripes celebrated their defeat with liquor and cooking Brahmin Hot Dogs over the fire they’d cooked up."
    nf_GMN_3.a:0 "We shouldn’t of let them run off."
    
    nf_GMN_4.title:0 "EMPTY"
    nf_GMN_4.desc:0 "Empty event that was removed. should be replaced in the future"
    nf_GMN_4.a:0 "Look at you data mining"
    nf_GMN_4.b:0 "Maybe you should mine some bitches"

    nf_GMN_5.title:0 "Crumbling Structures"
    nf_GMN_5.desc:0 "Watoga was a model of everything that was wrong with the old world. RobCo's 'city of the future' was a city built by corporate elites for corproate elites. They ruled from atop their towers, keeping working people out and using robots to replace their jobs. From what we have found in holotapes and computer entries, a RobCo employee threw a wrench in their gears shortly before the bombs fell and it led to the robots that maintained the town killing anyone they saw. The robots have long since been destroyed, but the damage caused by years of firefights and neglect leaves Watoga little better off than cities closer to where the bombs fell. \n\n Still, it is the home for most of our people. The population has only grown in recent years as people fled from problems all around Appalachia and beyond. The various councils of Watoga have come together recently to discuss an important matter, working together to fix up the crumbling city. Weeks of discussion have led to a concensus on everything from workloads to sourcing materials. The only thing left to decide is where to start."
    nf_GMN_5.a:0 "Safe housing is the priority"
    nf_GMN_5.b:0 "Bring power to the people"
    nf_GMN_5.c:0 "Clean water is essential"

    nf_GMN_6.title:0 "Empty Tomb"
    nf_GMN_6.desc:0 "Senator Blackwell's bunker, like many others, has been opened and looted multiple times in the last 200 years. Much of what was inside has either been destroyed, stripped for parts, or hauled out. Fallon can only assume the skeleton sitting beyond a long-scrapped robco terminal is the senator, but it could just as easily be someone that moved into the place in the last two centuries. While most of the bunker has been picked clean, over 200 years of hiding and fighting teaches you a thing or two about where to hide things. In a cleverly hidden storage room we found..."
    nf_GMN_6.a:0 "A bunch of old records"
    nf_GMN_6.b:0 "Some military training books"
    nf_GMN_6.c:0 "Well preserved armor"

    nf_GMN_7.title:0 "Kindred Spirits"
    nf_GMN_7.desc:0 "There's always been something strange about The Head Ranger. He was an old man when he and Falon met. Many decades later, and he's still the same old man. It certainly is strange, but Falon's learned a couple things in 200 years. First, he hills of Appalachia are full of all kinds of strange things and they are rarely worth looking into. Second, a likeminded friend is not easy to find in the wasteland. It'd be better to build bonds with those friends rather than pry into their business."
    nf_GMN_7.a:0 "Friends can have secrets too"

    nf_GMN_8.title:0 "The End of His Watch"
    nf_GMN_8.desc:0 "When fleeing settlers from the northern hills began to flood in, we knew what happened. The rock worshipers overran the rangers and it was only a matter of time before the mountain trails completely fell under their control. Falon expected his old friend, The Head Ranger, would be the last one to arrive. That old man was too stubborn to leave before all of his people got out ok. \n\n Falon was half right. \n\n News came in with the last group of fleeing settlers. A group of young rangers from the rear guard reported they made a stand in a cave. They held the cultists off for a time but as ammo ran low it became clear they wouldn't make it out of that cave alive. That was when The Head Ranger volunteered to give himself over to the cultists in exchange for promises his rangers would be allowed to leave. It is certain the ranger was killed shortly after in some kind of grizzly ritual. Falon has made a promise to the people of Monongahela."
    nf_GMN_8.a:0 "The Head Ranger will be avenged!"

    nf_GMN_9.title:0 "A Period of Calm"
    nf_GMN_9.desc:0 "With the destruction of The Church of Rocky, Appalachia is enjoying a period of peace. Life is returning to normal. However, this isn't the first period of unrest in the region. The Green Mountain Boys that have been around long enough know this is more like a lull in the chaos. Whether it be next month or next year, things will heat up again. What matters is what we do in the meantime to prepare."
    nf_GMN_9.a:0 "Help people rebuild their lives."
    nf_GMN_9.b:0 "Collect Rockyist weaponry"
    nf_GMN_9.c:0 "Access hidden Rockyist caches"
    nf_GMN_9.d:0 "Hunt down remaining cultists"
    nf_GMN_9.e:0 "Integrate Rockyists to our militia"

    nf_GMN_10.title:0 "Differences Of Opinion"
    nf_GMN_10.desc:0 "When The Church of Rocky came knocking, the people of Appalachia made their stand from Watoga. Atomists, Loretz's eggheads, rangers and even the Onnionburg farmers all stood shoulder to shoulder with each other. Despite our different ways of life, we worked together to ensure our freedom. It was in a lot of ways a testament to the values of The Green Mountain Boys. Unforutnately, it did not last. Shortly after The Church of Rocky was defeated, Radiant Kate and her cult went back to their neck of the woods. We did not object to them returning home. Soon though, they began expanding into old Rockyist territory. Loretz' eggheads did the same and soon the two groups came into conflict. If that wasn't enough, the farmers of Onnionburg came under attack from the Cult of Cobalt and many rangers have been found dead from gauss wounds. It looks like the destruction of The Church of Rocky was just the beginning of sectarian bloodshed."
    nf_GMN_10.a:0 "Oh shit, here we go again"
    
    nf_GMN_11.title:0 "Freedom For Most"
    nf_GMN_11.desc:0 "We have learned in these last few years that there are some people who can't leave others alone. In particular, the cults and militant fascists. Trying to work with these people has only led to us getting bitten in the ass and enough is enough. Falon and the rest of The Green Mountain Boys have decided it is not worth trying to work with these people. If another weird little cult or gang of thugs tries to look around our hills, we'll shoot first and ask questions later. It may be a bit harsh, but it's necessary to keep everyone else free."
    nf_GMN_11.a:0 "Through force we have freedom"

    nf_GMN_12.title:0 "Mind Your Own Business"
    nf_GMN_12.desc:0 "The various groups of Appalachia have their quirks. Some of them worship weird things, some won't go outside on a full moon for fear of The Mothman, some of them just want to farm for christ's sake. Even in the beginning of our group, we never cared about any of that. The ultimate belief of The Green Mountain Boys has been that you are free to swing your arms wherever you want until you bop someone on the nose. Want to worship radioactive goop? Want to build giant magnets? Want to just live your life day to day? Doesn't matter to The Green Mountain Boys so long as you don't mess with anybody else doing what they do. Despite the different groups of Appalachia living closer together due to the fight with The Rockyists, we have been able to hold things together. The various societies and cults have learned to live together and stay out of eachother's way."
    nf_GMN_12.a:0 "In a way, things are better than before."

    nf_GMN_13.title:0 "Treasure Down Below"
    nf_GMN_13.desc:0 "A couple hundred years ago there was some kind of shitshow going on with giant bats and a disease that turned non-ghouls into feral madmen. Falon and the boys kept distance from that shitshow but it got sorted after a few nukes and a vaccine put in Nuka Cola of all things. One of the places that got nuked was a cave not too far away from Watoga. Of course, nobody wanted to go to a radioactive cave until The Cult of Cobalt moved in. What they found in there makes Falon and the boys wish they'd taken a peek. There's a very rare material with useful properties. The cult has said they are happy to pull this rock out of the ground for us so long as we let them worship in there."
    nf_GMN_13.a:0 "Sounds like a win-win"

    nf_GMN_14.title:0 "A Literal and Metaphorical Swamp"
    nf_GMN_14.desc:0 "Before the war, Washington DC was the home of the enemy. A bunch of crooks that robbed the common man while oppressing him. The Free States, Green Mountain Boys, and plenty of other groups across the country were fed up and fought. Heck, in Appalachia we were even winning for a time before the bombs fell. We always kept an eye on the eastern horizon but there hadn't been much to worry about until recent years. Something is going on out there. Passing caravans talk about raging mutants, migrating raiders, and even a full-scale war between two power armored groups. Whatever is happening out there, we might have it working its way into our neck of the woods."
    nf_GMN_14.a:0 "We will be ready"

    nf_GMN_15.title:0 "Hello There Neighbor"
    nf_GMN_15.desc:0 "A messenger arrived from Eastern Appalachia today. They speak on behalf of [GMN.GetName], a militia that protects the settlers of the region from outside threats. They have heard about our republic and wish to have a seat at the table."
    nf_GMN_15.a:0 "Welcome to the republic!"

    nf_GMN_16.title:0 "A Lot of Things Just Clicked"
    nf_GMN_16.desc:0 "The Responders always seemed like some decent folk since they reorganized close to 180 years ago. Maybe a little naive, but overall not too bad. They help people out and seem to do a lot of good. However, there was always something off about them. Their main base was a pre-war resort frequented by some of the worst people in the country. Supposedly their descendents lived in a bunker beneath the resort and were giving out tech to The Responders out of the goodness of their hearts. That already didn't pass Falon's smell test, and that's saying something since his nose fell off back in 2081. What's worse is the same name kept coming up here and there, Mr. Otis. Sure, it made sense that the people in the bunker would keep their family name going, but it still felt off. Now, we know why. After cracking open an old forgotten bunker on the fringes of Onninberg, we found an Enclave research facility. Pretty much anything of value was stripped long ago, but we found files on a computer named M.O.D.U.S.. According to these documents, the computer is in a bunker beneath Whitesprings and was meant to carry on the mission of The Enclave. It explains why the 'Whitesprings Management' had so much tech, and why they always worked through intermediaries. Whether The Responders know it or not, they are pawns in an Enclave plot! Unfortunately, we don't have the luxury of looking into this more closely. If we tip off M.O.D.U.S. that we know the truth behind Whitesprings Management, the results could be dire. Our best bet, oddly enough, is charging in guns blazing. At least then the machine might think we're just looking to plunder the resort."
    nf_GMN_16.a:0 "We need to act fast!"

    nf_GMN_17.title:0 "Bunker Busting"
    nf_GMN_17.desc:0 "After we fought our way to the gates of Whitesprings, we were able to arrange a parlay with their leadership. The Responders knew our reputaiton as well as we knew theirs and the conflict left them more confused than anything. That worked in our favor and their desire for answers led to us having a discussion away from Whitesprings. With proof in hand, The Responders have been persuaded to turn their rifles towards the bunker defenses. As we expected, the robots of the resort immediately put up a fight but together we were able to fight into the bunker. M.O.D.U.S. was soon destroyed, never to manipulate honest people again. \n\n That left the question of The Responders. With no puppet master pulling their strings, the question remains of what they will do now. There are a few small grudges over the fighting, but overall they have agreed to join us in keeping Appalachia safe."
    nf_GMN_17.a:0 "We work well together"

    nf_GMN_18.title:0 "The Swamp Burns"
    nf_GMN_18.desc:0 "To the south-east of Watoga there were some wild settlers that saw the ever-expanding Virginian swamps and decided it was a place to live. Every year the swamp grew closer, and every year they burned what they could away. Overall they were good trading partners. Flamer fuel wasn't in particular demand in Watoga but they paid well for it. It would seem that market may be drying up soon. We're hearing news from traders that The Firemarshals have burned their way to the heart of the swamp and found what was causing it to expand so much. The bigger takeaway though is that in winning their swamp war, The Fire Marshals have formed a more serious organization than just a few settlements coming together for joint burns. It might be worth reaching out to them and seeing if we'll get along."
    nf_GMN_18.a:0 "Lets hope the war hasn't made them hostile"

    nf_GMN_19.title:0 "The Swamp Burns"
    nf_GMN_19.desc:0 ""To the south-east of Watoga there were some wild settlers that saw the ever-expanding Virginian swamps and decided it was a place to live. Every year the swamp grew closer, and every year they burned what they could away. Overall they were good trading partners. Flamer fuel wasn't in particular demand in Watoga but they paid well for it. It would seem that market may be drying up soon. Settlers have been arriving in Watoga and the surrounding settlements in great numbers. They talk of cultists, tribals, and sea peoples fighting them out of the swamps. These people were tougher than most. Whatever chased them away from their homes is a threat we can not take lightly."
    nf_GMN_19.a:0 "Oh shit, here we go again."
