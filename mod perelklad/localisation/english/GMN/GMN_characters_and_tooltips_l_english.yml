    ###Power Balance###
    GMN_sectarian_conflict:0 "Sectarian Conflict"
    GMN_sectarian_conflict_desc:0 "Appalachia is full of all kinds of freaks, weirdos, and folk just trying to live their lives. As we allow those fleeing The Church of Rocky into our neck of the woods, we must be careful we don't allow their differences to tear us apart."
    GMN_conflict_crisis:0 "Sectarian Crisis"
    GMN_conflict_crisis_desc:0 "Our hills are alive with the sounds of gunfire. Various cults are battling it out in our streets and settlements. The people we try to protect are now picking sides in fights that should not be theirs."
    GMN_conflict_open_fighting:0 "Open Fighting"
    GMN_conflict_open_fighting_desc:0 "Our hills are alive with the sounds of gunfire. Various cults are battling it out in our streets and settlements. The people we try to protect are now picking sides in fights that should not be theirs."
    GMN_conflict_frequent_squabbles:0 "Frequent Squabbles"
    GMN_conflict_frequent_squabbles_desc:0 "Disagreements between the various cultures in our territory have a tendency to erupt into violence. Street fights and the occasional shootout leave many not wanting to wander far from their home."
    GMN_conflict_occsaional_problems:0 "Infrequent Problems"
    GMN_conflict_occsaional_problems_desc:0 "The fighting between the various cultures in our territory unfortunately turns to violence at times. Usually these are limited to a handfull of individuals, but it has a risk of escalating."
    GMN_conflict_harmony:0 "Harmonious People"
    GMN_conflict_harmony_desc:0 "Appalachia may be full of freaks and weirdos, but our differences do not cause problems. After all, why fight when we already have one crazy cult trying to tear us apart?"
    GMN_conflict_peaceful:0 "Peaceful Relations"
    GMN_conflict_peaceful_desc:0 "Appalachia may be full of freaks and weirdos, but our differences do not cause problems. After all, why fight when we already have one crazy cult trying to tear us apart?"
    GMN_conflict_rare_grumblings:0 "Rare Grumblings"
    GMN_conflict_rare_grumblings_desc:0 "Overall our people know how to keep things civil. There may be some hushed whispers when a cultist conducts some ceremony in the main square, but it doesn't go beyond that."
    GMN_conflict_occasional_debate:0 "Occasional Debate"
    GMN_conflict_occasional_debate_desc:0 "Of course having this many different cultures and faiths in one place would lead to disagreement. But the debates remain fairly civil. Though, somebody did recently call a Cobalt Cultist a 'Radtard'."
    GMN_conflict_moderate:0 "Moderate Conflict"
    GMN_conflict_moderate_desc:0 "The fighting between the various cultures in our territory rarely go beyond harsh words. Still, the common hill folk are uneasy hearing fervent debate in the streets."
