    ### TRAITS
    BLN_face_of_watoga:0 "The Face of Anarchy"
    
    ### CHARACTERS
    GMN_green_fallon_name:0 "Green Fallon"
    green_fallon_desc:0 "Green Fallon has been fighting the good fight for more than even most ghouls can remember, and isn't going to stop now. Prior to the war, Fallon and the other Green Mountain boys were guerilla fighters, fighting the tyranny of the United States and travelling the length of the Eastern Seaboard. When the bombs fell, the Green Mountain Boys had grown into a veritable roving army, keeping to the backwoods of the United States and driving off or retreating from any efforts from the federal government to stop them. When the bombs fell, Fallon and the others found themselves unlucky enough to be dosed in radiation and became ghouls in the process. Since then, Fallon has found himself and his ghouls caring for the fledgling communities nearby. Now, he watches the ruins of DC, and waits to drive off any who approach. No one's killed him in the past 250 years, and he plans to live for another 250."
   
