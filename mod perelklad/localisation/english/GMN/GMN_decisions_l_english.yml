l_english:
    GMN_sectarian_conflict_category:0 "Sectarian Conflicts"
    GMN_sectarian_conflict_category_desc:0 "The rock cultists we kicked out years ago are tearing the lands to our north apart. People are fleeing to our woods and pleading for refuge. The more we take in, the more it will impact us."
    GMN_onionburg_refugees_decision:0 "Drive Off Onionburg Farmers"
    GMN_onionburg_refugees_decision_desc:0 "Largely peaceful farmers, the people of Onionburg were ill-equipped to face a mob of violent cultists. Those that got away want us to protect them while they work our farms. §YIf we do not drive them off, they will settle in our hills.§!"
    GMN_lorentz_refugees_decision:0 "Drive Off Lorentz Refugees"
    GMN_lorentz_refugees_decision_desc:0 "The people of Lorentz Force were always a little strange, but they are offering some spiffy guns if we welcome them. §YIf we do not drive them off, they will settle in our hills.§!"
    GMN_cobalt_refugees_decision:0 "Drive Off Cobalt Cultists"
    GMN_cobalt_refugees_decision_desc:0 "People may be weary of accepting fleeing radiation worshipers, but the people of Cobalt were never much of a problem. §YIf we do not drive them off, they will settle in our hills.§!"
    GMN_monongahela_refugees_decision:0 "Drive Off Monongahela Refugees"
    GMN_monongahela_refugees_decision_desc:0 "Few people made it out of the hills just north of our woods. We know the people of Mononghela. They'll keep to themselves, they just need a place to settle. §YIf we do not drive them off, they will settle in our hills.§!"
    GMN_exploit_onionburg_decision:0 "Force Onionburgers Into The Fields"
    GMN_exploit_onionburg_decision_desc:0 "If the Onionburgers want to take refuge in our hills, the least they could do is help work our fields."
    GMN_exploit_lorentz_decision:0 "Seize Gauss Rifles"
    GMN_exploit_lorentz_decision_desc:0 "The gauss rifles of Lorentz eggheads are better off in the hands of our boys who are protecting them."
    GMN_exploit_cobalt_decision:0 "Force Cobalt Cultists Into The Mines"
    GMN_exploit_cobalt_decision_desc:0 "There are some mines in our territory too irradiated for the common miner. But these people like radiation right? They should yearn for the mines!"
    GMN_exploit_monongahela_decision:0 "Press Rangers Into Service"
    GMN_exploit_monongahela_decision_desc:0 "The rangers of Monongahela have no time to rest. The Rockyists are nearly at our gates! Put them back into the field!"
    GMN_exploit_manpower_decision:0 "Press Refugees Into The Service"
    GMN_exploit_manpower_decision_desc:0 "The refugees in our territory should be preparing to protect their new home!"
    GMN_exploit_wealth_decision:0 "Collect Rent"
    GMN_exploit_wealth_decision_desc:0 "The refugees in our territory can't just lounge around on private property. They need to pay rent!"
    GMN_exploit_firearms_decision:0 "Seize Refugee Arms"
    GMN_exploit_firearms_decision_desc:0 "We need every weapon we can get our hands on for this fight. Collect weapons from the refugees, they won't be of use if our militia fails!"
    GMN_support_wealth_decision:0 "Provide Financial Relief"
    GMN_support_wealth_decision_desc:0 "The refugees in our territory barely made it here with the clothes on their backs and whatever they could carry. They need caps, and we are in a position to help them."
    GMN_allocate_excess_food_decision:0 "Donate Excess Crops"
    GMN_allocate_excess_food_decision_desc:0 "We have a lot more mouths to feed, but plenty of food. Better to give it to the needy than sell it outside Appalachia."
    GMN_make_space_available_decision:0 "Clear Space For Refugees"
    GMN_make_space_available_decision_desc:0 "We have plenty of space for refugees to form new communities. Maybe we will even get something good out of it."
    GMN_work_with_refugees_decision:0 "Negotiate With Refugees"
    GMN_work_with_refugees_decision_desc:0 "We are preparing for a war for our very survival, but that doesn't mean we shouldn't take some time to hear the concerns of our people."
    GMN_war_support_decision:0 "Make Promises of Reconquest"
    GMN_war_support_decision_desc:0 "Fighting the rock cultists away from our lands is just the beginning. The refugees will know we intend to retake their homelands as well."
