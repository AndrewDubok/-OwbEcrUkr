#Characters#
JOE_joe_name:0 "Joe"
JOE_joe_desc:0 "Joe used to be a simple scavenger like many of the people he now rules in South DC. His life changed when he found an experimental coffee producing machine beneath the Slocum's Joe regional office. This substantial find earned him a fortune which he put into building a scavenging empire in South DC. No matter how small of an operation, Joe gets a piece. In exchange, scavengers have safe places to rest and trade before delving back into the dangerous ruins beyond his walls."
JOE_raider_name:0 "Fredrick Fascum"
JOE_rangers_name:0 "Reilly"
JOE_jericho_name:0 "Jericho"
JOE_executron_name:0 "ExecuTron"
JOE_donutbot_name:0 "Donut Bot"
JOE_guy_name:0 "John Donut"
JOE_lady_name:0 "Levi Bond"

#Cosmetic Tags#
JOE_coffee_empire_tag:0 "Joe's Coffee Empire"
JOE_coffee_empire_tag:0 "Empire Of Joe"
JOE_coffee_empire_tag:0 "The Empire of Slocum Joe"

#Events#
JOE_nf_events.1.title:0 "Best Scav Around"
JOE_nf_events.1.desc:0 "Every day, dozens or even hundreds of wastelanders venture into the downtown DC ruins. There they brave horrible mutants, psychotic raiders, and worse all to make a living. It's a career path where few people last long, but those that do usually develop a sixth sense for delving into the ruins. Junkman Joe was one of these scavengers, and he had a particular knack for one thing."
JOE_nf_events.1.a:0 "Finding old schematics and tech data"
JOE_nf_events.1.b:0 "Picking out the best scrap"
JOE_nf_events.1.c:0 "Recovering quality weapon parts"
JOE_nf_events.2.title:0 "A Split"
JOE_nf_events.2.desc:0 "Going into the ruins around The Citadel was always with a little bit of risk. Yes, the ruins were typically clear of mutants, but The Brotherhood could rarely tell the difference between a scavenger and a raider. Not to mention, if they did hold their fire, they might notice something shiny in your haul. That never disuaded Joe though, and he was among the first to notice something different. The patrols were becoming less frequent, and for some reason a few of the patrols were rocking a new paint job. Clearly there was some kind of split in The Brotherhood. If there's one thing Joe learned from years of scavenging the ruins, it's that in conflict there's opportunity. That, and sometimes good stuff falls off of a brahmin caravan."
JOE_nf_events.2.a:0 "Their loss is our gain"
JOE_nf_events.3.title:0 "Entering Slocum's Tower"
JOE_nf_events.3.desc:0 "The Brotherhood never had much care for someting as innocuous as a retailer's office. They were always focused on weapons contractors, government bunkers, and other military things. That's why Joe always looked into the corporate offices instead, because The Brotherhood never cared for the treasures withhin. It was one expedition like this that led Joe to discover a bunker underneath Slocum's Joe's regional headquarters. Expecting to find a few working terminals or some old machinery, Joe was surprised to find a prototype machine that'd change his life. \n\n The Slocum's Joe's Coffee Fabricator \n\n According to the terminals in the bunker, getting fresh coffee beans was growing ever harder in a world wrecked by famine and instability. Coffee was rising to insane prices not due just to inflation, but because supply was not there. As part of some deal with The DIA for letting them use an office as cover for something or another, they were given a machine from some place called Big Mountain to tinker with. After a few failed trials they finally managed to have the prototype machine fabricate coffee grounds out of thin air. Joe thought it was strange they would fixate on this so much, but it isn't the weirdest thing he'd found in the ruins. Still, if it was worth going to such lengths why not try a cup?"
JOE_nf_events.3.a:0 "That cup would change his life"
JOE_nf_events.4.title:0 "One Cup At A Time"
JOE_nf_events.4.desc:0 "Joe made sure to never tip anyone off to where he got these magical beans, but he began selling it everywhere he could. First was other scavengers, who always needed to be awake and alert. Then were caravan guards, who liked something helping them keep awake during watches. Eventually, nearly anyone who came by South DC was stopping by Joe's tower trying to get a fresh cup or a bag of grounds. Things were getting a bit too much for one man to handle, he was going to need employees. First on the hiring list was..."
JOE_nf_events.4.a:0 "A marketing man"
JOE_nf_events.4.b:0 "A friendly waitress"
JOE_nf_events.4.c:0 "A donut vending robot"
JOE_nf_events.5.title:0 "These Assholes"
JOE_nf_events.5.desc:0 "The Brotherhood weren't always nice, but they were still ok to deal with. These Outcast guys in the red paint though were something else. It was like they took the biggest dickheads in the entire Brotherhood and put them all into one fort. Their attitude towards wastelanders was bad enough, but things were getting more tense as they started getting themselves together and sending their scavenging teams further into the ruins. It's only a matter of time before they start taking instead of bartering."
JOE_nf_events.5.a:0 "We need to be careful"
JOE_nf_events.6.title:0 "Raider Trouble"
JOE_nf_events.6.desc:0 "Selling to raiders is always risky business. You never know if the guy you're dealing with will pay up or try to stick you in the ribs. Still, the ones coming by the tower for some ground beans are usually the more sensible lot. The problem is that their friends have started getting closer. Scavengers are getting shot at more often and if we aren't careful we will have to deal with more than a few twitchy junkies."
JOE_nf_events.6.a:0 "Pay the less crazy ones for protection"
JOE_nf_events.6.b:0 "Get ahold of some mercenaries"
JOE_nf_events.6.c:0 "We need to protect ourselves"
JOE_nf_events.7.title:0 "More Than Scrap"
JOE_nf_events.7.desc:0 "Fighting for Fort Independence was not easy. The Outcasts fought tooth and nail to keep us out, but eventually we got the last of them. What was inside the fort was certainly worth the effort. Mighty suits of power armor, deadly energy weapons, and a veritable mountain of scrap was behind those thick doors. That wasn't even the best of it. Inside we found enough data on power armor that we should have no problem fixing up suits of our own."
JOE_nf_events.7.a:0 "Hell yeah"
JOE_nf_events.8.title:0 "Time To Move On?"
JOE_nf_events.8.desc:0 "Fort Independence is quite the place. Great location, sturdy walls, a basement that isn't full of radroaches, good stuff. It'd be a good place to relocate operations to. Then again, Joe Tower has its own benefits. The bunker on the lower levels is still secure, it's already damn near a trade stop, and we've put so much work into the place. This will be a tough choice to make."
JOE_nf_events.8.a:0 "Lets relocate"
JOE_nf_events.8.b:0 "Stay here"
JOE_nf_events.9.title:0 "To Scrap Or Not To Scrap?"
JOE_nf_events.9.desc:0 "The Outcasts were even fewer in number than The Brotherhood. It is no wonder that they relied so much on robots to help them out. With them out of the way we now have access to their large supply of robots. Everything from protectrons to sentrybots sit in a warehouse under Fort Independence. While we could definitely use the lighter robots for some menial tasks, the heavier ones are another matter. Do we really need a bunch of sentry bots, or should we just sell them off?"
JOE_nf_events.9.a:0 "Who would buy a ton of sentry bots anyway?"
JOE_nf_events.10.title:0 "The Drink Sweeping The Wasteland"
JOE_nf_events.10.desc:0 "By now, almost everyone in The Capital Wasteland has had, or at least heard of Slocum's Joe's Coffee. No, not the billboards you see on the crumbling ruins. We are talking about the real thing. Once called Junkman Joe, the scavenger has taken to calling himself Slocum and has made quite a name for himself peddling coffee he sources from some unknown place. Some theorize he found an old warehouse while others think he discovered an automated hydroponics lab. Whatever the case, he's been raking in the caps and recently fought off The Brotherhood Outcasts with an army of scavengers. Now he is approaching our council with a business proposal. He'll throw his coffee empire in with our newly founded republic, so long as it is an equal partnership. He wants a seat at the table the same as any other settlement leader. Given how many people in pinkp ower armor are patrolling around south DC these days, it is an offer worth considering."
JOE_nf_events.10.a:0 "We'll accept that offer"
JOE_nf_events.10.b:0 "§GUncle Roe will negotiate a better deal§!"
JOE_nf_evnets.10.c:0 "Decline the offer"

#Ideas#
JOE_caffinated_idea:0 "Caffeinated"
JOE_caffinated_idea_desc:0 "The people of Joes army enjoy ample supply to his stock of fresh coffee. Hopped up on caffine they are able to move quickly and stay alert, but you don't want to see them before they've had their morning cup."
JOE_scav_tradition_idea:0 "Scav Traditions"
JOE_scav_tradition_idea_desc:0 "Nearly every member of Joe's guards and militia have some experience scavenging the South DC ruins. This experience allows them to easily identify caches of resources other soldiers would miss, as well as more easily repurpose equipment they find on enemies."
JOE_studied_outcasts_idea:0 "Studied The Outcasts"
JOE_studied_outcasts_idea_desc:0 "We spent time watching The Outcasts go to town on some stupid raiders, and we learned from their mistakes. Mistake number one, don't charge a guy with a tire iron when he's carrying a minigun."
JOE_coffee_junkies_idea:0 "Coffee Junkies"
JOE_coffee_junkies_idea_desc:0 "Joe's militia is made up of a handfull of armed scavs and a ton of raiders hooked on something called coffee."
JOE_merc_contracts_idea:0 "Merc Contracts"
JOE_merc_contracts_idea_desc:0 "Joe signed a series of contracts with multiple small and large mercenary groups across The Capital Wasteland. New mercs are always arriving at Joe's Tower to replace those that don't make it."
JOE_scrapper_training_idea:0 "Trained Scrappers"
JOE_scrapper_training_idea_desc:0 "Nearly every member of Joe's guards and militia have some experience scavenging the South DC ruins. This experience allows them to easily identify caches of resources other soldiers would miss, as well as more easily repurpose equipment they find on enemies. That experience has been combined with combat drills and tactics training, turning this army of scavengers into something of a formidable force."
JOE_bot_scrappers_idea:0 "Bot Scrappers"
JOE_bot_scrappers_idea_desc:0 "The scrappers in Joe's employ are told to scrap just about any bots they find, except for Donut Bot"
JOE_scrapper_bots_idea:0 "Scrapper Bots"
JOE_scrapper_bots_idea_desc:0 "Joe and his scrappers have taken to using robots to help them in their salvage operations. With these robotic packbrahmin they are albe to really extend their reach and their carrying capacity."
JOE_ready_for_anything_idea:0 "Ready For Anything"
JOE_ready_for_anything_idea_desc:0 "Joe's guys took down some of the toughest people this side of the wasteland. It'd take something like an army in some kind of Advanced Power Armor with air support or an eldritch cult with unholy powers to kick their asses."
JOE_wasteland_scientists_idea:0 "Wastelander Scientists"
JOE_wasteland_scientists_idea_desc:0 "Word has gotten around that Joe is hiring scientists for various projects, at double what most others pay."
JOE_caffinated_guards_idea:0 "Caffeinated Guards"
JOE_caffinated_guards_idea_desc:0 "From caravan guards to settlement sentries, if someone is holding a rifle and watching the horizon, they're drinking a nice cup of Slocum Joe's Coffee. The quality coffee that keeps them alert and ready for whatever may come."
JOE_promotional_mugs_idea:0 "Promotional Mugs"
JOE_promotional_mugs_idea_desc:0 "For the low price of 8 caps you can get a 5 cap cup of coffee in a 3 cap mug"
JOE_coffee_supply_idea:0 "Coffee Supply"
JOE_coffee_supply_idea_desc:0 "In nearly every settlement you can find a bag of Slocum Joe's coffee grounds being brewed up or sold by traders. The drink has taken the wasteland by storm, and nobody questions where this junk trader happened to find all this coffee in the middle of a ruined city."
JOE_caffinated_masses_idea:0 "Caffeinated Masses"
JOE_caffinated_masses_idea_desc:0 "Why fight Slocum Joe when you can drink a nice cuppa coffee instead?"
JOE_tipping_culture_idea:0 "Tipping Culture"
JOE_tipping_culture_idea_desc:0 "It's a win-win situation. The workers are happy, and we're happy we don't have to pay them as much."
JOE_america_runs_on_joe_idea:0 "America Runs On Joe"
JOE_america_runs_on_joe_idea_desc:0 "Now that wastelanders have gotten coffee into their system, they can't understand how they got by without it. That pep in the morning is the only thing getting them out of bed and off to work. And that is why, they'll never do something to piss off the one guy that supplies it."

#National Focus#
JOE_nf_a001:0 "Junkman Joe"
JOE_nf_a001_desc:0 "Joe has become known as one of the best scavs to ever trudge thorugh the DC ruins, but years ago even he was just another stupid kid seeking his fortune in hell."
JOE_nf_a002:0 "Exciting Opportunity"
JOE_nf_a002_desc:0 "When The Brotherhood had their little split, most people despaired in knowing it'd lead to more super mutant attacks. Meanwhile, Joe saw an opportunity."
JOE_nf_a003:0 "Find Of A Lifetime"
JOE_nf_a003_desc:0 "Under the old Slocum Joes regional HQ there was something very unexpected..."
JOE_nf_a004:0 "Building An Empire"
JOE_nf_a004_desc:0 "This coffee thing is amazing. No wonder everyone drank it in the old world!"
JOE_nf_a005:0 "Empire of Rubble"
JOE_nf_a005_desc:0 "If Joe is to build a coffee empire, his customers will need to be able to reach him!"
JOE_nf_a006:0 "Clearing Routes"
JOE_nf_a006_desc:0 "Nobody has time to trudge through metro tunnels just for a cuppa. We need to unblock these roads!"
JOE_nf_a007:0 "Junk Barricades"
JOE_nf_a007_desc:0 "Just because we want some people entering our ruins doesn't mean we want everyone."
JOE_nf_a008:0 "Local Smelters"
JOE_nf_a008_desc:0 "Much of this rubble would be better off smelted down. Better we do that here than ship it off."
JOE_nf_a009:0 "Office Cleaning"
JOE_nf_a009_desc:0 "Besides the occasional hole, the Slocum Joes building is in pretty good shape. Just needs a lil bit of clearing."
JOE_nf_a010:0 "T.C.O.B"
JOE_nf_a010_desc:0 "With all those stupid cubes gone, we can get some real workshops together."
JOE_nf_a011:0 "Keep the Lights On"
JOE_nf_a011_desc:0 "What good is a workshop if we can't see a damn thing? Someone should tinker with the generator."
JOE_nf_a012:0 "Scrapper's Paradise"
JOE_nf_a012_desc:0 "With a safe place to sleep, eat, and get a hot cup of coffee, more scavs than ever are flooding to South DC."
JOE_nf_a013:0 "Pipes To Rifles"
JOE_nf_a013_desc:0 "The plumbing barely works anymore. We'd better put those pipes to some real use."
JOE_nf_a014:0 "Bring In Gunsmiths"
JOE_nf_a014_desc:0 "Pipe guns are for the broke and desperate. In DC we have more assault rifles than we know what to do with. We just need to fix them up."
JOE_nf_a015:0 "UnPleasant Neighbors"
JOE_nf_a015_desc:0 "The Outcasts are dicks and they have made it clear they don't like us scavenging in these ruins. Sooner or later, they may do something about it."
JOE_nf_a016:0 "Profit While We Can"
JOE_nf_a016_desc:0 "May as well get some caps off these tin-suited assholes before they start shooting at us."
JOE_nf_a017:0 "A Decent Proposal"
JOE_nf_a017_desc:0 "What do we need of all these circuitboards and busted old computers? Better to trade them for some real guns."
JOE_nf_a018:0 "Break Out The Big Guns"
JOE_nf_a018_desc:0 "Joe knows a guy who can make guns that'd punch right through those old suits of power armor. The things may weigh a ton, but it's not as heavy as a T-45 boot on your skull."
JOE_nf_a019:0 "Watch Them Work"
JOE_nf_a019_desc:0 "Brotherhood types tend to use the same tactics over and over. Watching them use these moves on raiders will give us an edge when the fighting starts."
JOE_nf_a020:0 "Protect What's Ours"
JOE_nf_a020_desc:0 "Whether it's mutants, cannibals, or even The Brotherhood, we always will have some assholes trying to push us off of this claim."
JOE_nf_a021:0 "Pay Off Raiders"
JOE_nf_a021_desc:0 "Raiders may not be reliable, but they are cheap and replaceable."
JOE_nf_a022:0 "Get 'Em Hooked"
JOE_nf_a022_desc:0 "Who knew chem-addicts could get addicted to caffine too?"
JOE_nf_a023:0 "Caffeinated & Crazy"
JOE_nf_a023_desc:0 "These raiders are bouncing off the walls like we gave them a hit of psycho. Now we just need to point them at the enemy."
JOE_nf_a024:0 "Hired Help"
JOE_nf_a024_desc:0 "With all the money we are raking in, we can afford to splurge a little on protection."
JOE_nf_a025:0 "Exclusive Contracts"
JOE_nf_a025_desc:0 "Joe singing an exclusive contract with a quality merc company will have everyone in South DC sleeping a little easier."
JOE_nf_a026:0 "Rangers Lead The Way"
JOE_nf_a026_desc:0 "In addition to the other mercenary groups we've hired, Joe has purchased the exclusive services of a well known little team used to operating in the DC ruins."
JOE_nf_a027:0 "Rely On Each Other"
JOE_nf_a027_desc:0 "Why should we hand over our caps to some hired thugs? These are our claims and we must protect them together!"
JOE_nf_a028:0 "Mandatory Training"
JOE_nf_a028_desc:0 "Every scav knows how to fight, but fighting with others on your side is a new concept for a lot of these guys."
JOE_nf_a029:0 "Scrapper's Army"
JOE_nf_a029_desc:0 "The may not have a uniform, or standard gear, or much training, or commitment to a cause, but... uh.... lost my train of thought."
JOE_nf_a030:0 "Protect Your Junk!"
JOE_nf_a030_desc:0 "We knew it'd happen one day..."
JOE_nf_a031:0 "Every Scav A Soldier"
JOE_nf_a031_desc:0 "It doesn't matter if you're just here for some scrap metal, those bastards will shoot you either way. Die on your feet!"
JOE_nf_a032:0 "Hasty Barricades"
JOE_nf_a032_desc:0 "The rubble in the DC Ruins can be more than just an annoyance for us. It can be an annoyance for them too!"
JOE_nf_a033:0 "The Motherlode"
JOE_nf_a033_desc:0 "The Outcasts were sitting on more valuable salvage than any scrapper could ever expect to find in their lifetime. Now it's ours."
JOE_nf_a034:0 "Raid Outcast Armories"
JOE_nf_a034_desc:0 "It's not every day you find an armory full of laser rifles."
JOE_nf_a035:0 "Caution, It's Hot"
JOE_nf_a035_desc:0 "The only thing in DC hotter than Joe's coffee."
JOE_nf_a036:0 "T-45 Refurbishing"
JOE_nf_a036_desc:0 "You thought The Brotherhood just MADE a million suits of T-45d power armor? No you dumbass, they were just the only people around that knew how to put these old suits rusting in the ruins back together, until now that is."
JOE_nf_a037:0 "Old Blueprints"
JOE_nf_a037_desc:0 "Most of us can't make heads or tails of these power armor schematics. But, Joe knows a few eggheads from his dealings over the years that can."
JOE_nf_a038:0 "The Big Toys"
JOE_nf_a038_desc:0 "The only thing better than a big gun, is a bigger gun. The outcasts had a LOT of bigger guns."
JOE_nf_a039:0 "New Digs?"
JOE_nf_a039_desc:0 "With Fort Independence in our control some of the guys are suggesting we relocate our main setup there."
JOE_nf_a040:0 "Go Where The Action Is"
JOE_nf_a040_desc:0 "A fort that's been fixed up by The Brotherhood is way better than a crumbling office building. It's time to relocate."
JOE_nf_a041:0 "Expand Trade Routes"
JOE_nf_a041_desc:0 "Now that we have a new main office, we have to clear a bunch of new routes."
JOE_nf_a042:0 "Fill The Labs"
JOE_nf_a042_desc:0 "Joe knows plenty of wasteland scientists that'd jump at the opportunity to work in a Brotherhood-built lab without all the pretentiousness or stupid robes."
JOE_nf_a043:0 "Crack Research Terminals"
JOE_nf_a043_desc:0 "The Outcasts kept their secrets locked up tight, but not tight enough to keep out a dedicated scavenger."
JOE_nf_a044:0 "Update IFFs"
JOE_nf_a044_desc:0 "If we can get those turrets to stop shooting us, we can turn them back on."
JOE_nf_a045:0 "The Southern Watch"
JOE_nf_a045_desc:0 "Those weird fucks to our south give me the heebie jeebies. Keep an eye on them."
JOE_nf_a046:0 "Stay Put"
JOE_nf_a046_desc:0 "I don't want to lug half our shit to a new place. Lets just stay where we are."
JOE_nf_a047:0 "Scrap The Fort"
JOE_nf_a047_desc:0 "If we aren't going to be using the fort, we may as well take what we can out of the walls."
JOE_nf_a048:0 "Embrace Corporate Culture"
JOE_nf_a048_desc:0 "This place is a business and it's time we started acting like one. Step one, bribe some caravans to get on the trading circuit."
JOE_nf_a049:0 "T.G.I.F."
JOE_nf_a049_desc:0 "We don't know what it means, but Joe has extended happy hour at the bar on Fridays."
JOE_nf_a050:0 "ExecuTron"
JOE_nf_a050_desc:0 "We found an old bot in one of the closets that seems to have a head for business."
JOE_nf_a051:0 "Relocate Machinery"
JOE_nf_a051_desc:0 "Fort Independence had enough spare machinery for us to set up workshops here as well."
JOE_nf_a052:0 "Rusted Bots"
JOE_nf_a052_desc:0 "The Outcasts sure did like their robots. But what are we going to do with them?"
JOE_nf_a053:0 "Sell 'Em Off"
JOE_nf_a053_desc:0 "Joe knows a trader that'd happily buy the lot of robots from us for a good price."
JOE_nf_a054:0 "Bot Scrappers"
JOE_nf_a054_desc:0 "The few bots we can't offload can at least make us caps when parted out."
JOE_nf_a055:0 "Put Them To Use"
JOE_nf_a055_desc:0 "It couldn't hurt to have a bot watching your back while digging through a ruin. Get them running."
JOE_nf_a056:0 "Scrapper Bots"
JOE_nf_a056_desc:0 "Why the hell would I lug around 200 pounds of junk when I can strap it to the back of a robot?"
JOE_nf_a057:0 "Be Ready"
JOE_nf_a057_desc:0 "A lot of eyes are on us after we took over Fort Independence. No doubt we will have someone else to worry about soon."
JOE_nf_a058:0 "Seek Protection"
JOE_nf_a058_desc:0 "This new East Coast Republic that is forming seems like just the kind of business partner we would want to have."
JOE_nf_a059:0 "Give And Take"
JOE_nf_a059_desc:0 "A good partnership is give and take. They give us some eggheads to work our labs, and we take them."
JOE_nf_a060:0 "Promotional Mugs"
JOE_nf_a060_desc:0 "For a limited time, get a free mug with the purcahse of a cup of coffee. \n\n Just ignore that we raised coffee prices by 3 caps."
JOE_nf_a061:0 "Acquire Talent"
JOE_nf_a061_desc:0 "A growing business always attracts new talent."
JOE_nf_a062:0 "Return On Investment"
JOE_nf_a062_desc:0 "Business is good and we're finally starting to see it pay off."
JOE_nf_a063:0 "East Coast Coffee Capital"
JOE_nf_a063_desc:0 "Word is spreading far and wide that Slocum Joes is the place to go if you want a nice hot cup of coffee. It helps that you can't grow coffee anywhere on this side of The Mississippi."
JOE_nf_a064:0 "Pink Is The New Black"
JOE_nf_a064_desc:0 "Yeah, the enclave paint job is intimidating. But does it raise brand awareness?"
JOE_nf_a065:0 "We'll Take Anyone"
JOE_nf_a065_desc:0 "We fought off the god dammed brotherhood* ! We can take on anyone that tries to put a stake on what we have claimed! \n\n\n*§Routcasts§!"
JOE_nf_a066:0 "Caffeinate The Masses"
JOE_nf_a066_desc:0 "Why would someone fight us when they could enjoy a nice cup of coffee instead?"
JOE_nf_a067:0 "Tip Or Die"
JOE_nf_a067_desc:0 "Joe found an old book in one of the offices about something called Tipping Culture, and he's sure it's the next step to grow the business."
JOE_nf_a068:0 "Sooner Or Later..."
JOE_nf_a068_desc:0 "They may have had their differences, but plenty of The Brotherhood people aren't happy seeing us walk around in their dead friend's power armor."
JOE_nf_a069:0 "Citadel Salvage"
JOE_nf_a069_desc:0 "The Citadel is an even bigger score than Fort Independence. But what's really good is what we dug up on an old computer..."
JOE_nf_a070:0 "America Runs On Joe"
JOE_nf_a070_desc:0 "We will not stop until every person in this wasteland has their morning routine involve a stop at one of our coffee joints. Whether they like it or not, The Wasteland will run on Slocum Joe's coffee."

