  ron_washington_desc:0 "До войны В.А.Ш.И.Н.Т.О.Н был создан как суперкомпьютер с искусственным интеллектом, разработанный членами канадского сопротивления — отчасти в шутку, отчасти для координации действий сопротивления. За столетия после войны обширные научные и военные базы данных пришли в упадок, и теперь от них остались лишь человек и его личность."
