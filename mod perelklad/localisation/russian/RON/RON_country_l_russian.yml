  RON_oldtown_oafs_expansion:0 "Расширить §7Болванов Старого Города§!"
  RON_north_ronto_nightkin_expansion:0 "Расширить §1Теней Северного Ронто§!"
  RON_crescent_cazadores_expansion:0 "Расширить §YКресент Касадорс§!"
  RON_establish_windsor_wreckers:0 "Учредить команду §CВиндзорских Разрушителей§!"
    RON_establish_windsor_wreckers_desc:0 "Их унизительное поражение явно оставило у некоторых бывших «Разрушителей» желание большего. Какой же вред в том, чтобы дать им собственную команду?"
    ron_wreckers_tt:0 "Это создаст дивизию §BВиндзорских Разрушителей§!, разъезжающих на своих машинах по хоккейному полю. Это вообще законно?"
  RON_expand_windsor_wreckers:0 "Расширить §BВиндзорских Разрушителей§!"
  RON_establish_bay_bastards:0 "Учредить команду §LУблюдков с залива§!"
    RON_establish_bay_bastards:0 "Почему ты думаешь, что они сами выбрали себе такое название?"
    ron_bastards_tt:0 "Это создаст дивизию §LУблюдков с залива§!, самых быстрых стрелков на севере и приверженцы правил."
  RON_expand_bay_bastards:0 "Расширить §LУблюдков с залива§!"
  RON_establish_mimico_mounties:0 "Учредить команду §RПолицейских Мимико§!"
    RON_establish_mimico_mounties_desc:0 "Как ни странно, этим людям удалось раздобыть лошадей в постапокалипсисе. Трудно их винить за желание ездить верхом!"
    ron_mounties_tt:0 "Это создаст дивизию §RПолицейских Мимико§!, лучших наездников в Онтарио."
  RON_expand_mimico_mounties:0 "Расширить §RПолицейских Мимико§!"
  RON_establish_buffalo_brainbots:0 "Учредить команду §CМозгоботов Баффало§!"
    RON_establish_buffalo_brainbots_desc:0 "В Баффало осталось множество робомозгов, которые бродят без цели. Хотя они и не созданы специально для игры в хоккей, они вполне могут взять на себя координацию наших хоккейных команд!"
    ron_brainbots_tt:0 "Это создаст дивизию §CМозгоботов Баффало§!, координируя свою команду как... как машину."
  RON_expand_buffalo_brainbots:0 "Расширить §CМозгоботов Баффало§!"
  RON_establish_capital_crashers:0 "Учредить команду §3Столичных Крушителей§!"
    RON_establish_capital_crashers_desc:0 "Столичная Пустошь полна людей, которым удалось заполучить силовую броню. Хотя члены Братства и Анклава явно не стремятся играть в хоккей, многие уже убили их и забрали их броню."
    ron_crashers_tt:0 "Это создаст дивизию §3Столичных Крушителей§!, способных сокрушить противника с помощью своей силовой брони."
  RON_expand_capital_crashers:0 "Расширить §3Столичных Крушителей§!"
  RON_sudden_death_overtime:0 "Овертайм до первой крови"

