l_russian: 
  nf_ron.1.t:0 "200 лет Сопротивления!"
  nf_ron.1.d:0 "Онтарио всегда был очагом канадского сопротивления после оккупации США, и несмотря на все усилия американского правительства, улицы оставались небезопасными для их солдат — разве что при подавляющей силе. Торонто кишил повстанцами, которые использовали туннели метро и секретные маршруты для контрабанды и координации атак по всему Онтарио. Даже появление силовой брони армии США не смогло остановить эти действия.\n\n12 октября 2277 года, менее чем за две недели до Великой Войны, был проведён самый масштабный на тот момент рейд. Силы сопротивления атаковали штаб оккупационных войск США, и с помощью отвлекающего манёвра несколько повстанцев проникли глубже в комплекс.\n\nПока пара диверсантов внедряла вирус в центральную систему ZAX, остальные грабители забрали всё, что смогли, прежде чем пришлось спасаться бегством. В спешке им удалось украсть..."
  nf_ron.1.a:0 "Базы данных, содержащие техническую информацию"
  nf_ron.1.b:0 "Схрон с продвинутым оружием"
  nf_ron.1.c:0 "Припасы, чтобы продолжать борьбу"

  nf_ron.2.t:0 "Наша Война Никогда Не Закончится"
  nf_ron.2.d:0 "Хотя Война закончилась 23 октября 2277 года, угнетение не прекратилось. Когда выжившие поднимались из руин и пытались построить новую жизнь, американская угроза вновь появилась — теперь под именем Анклав. Быстро уничтожая организованное сопротивление, наши борцы за свободу вновь были вынуждены уйти в подполье — ветераны сопротивления-гули возродили довоенные партизанские тактики.\n\nК несчастью для Анклава, они допустили фатальную ошибку. 30 лет назад была активирована заражённая вирусом до войны система ZAX. В.А.Ш.И.Н.Т.О.Н.\n\nВ.А.Ш.И.Н.Т.О.Н объединил силы сопротивления и запустил роботов, использовавшихся при оккупации, изгнав оккупантов Анклава из Ронто навсегда. В холоде Онтарийский Анклав погиб, и ни один бункер не уцелел. По крайней мере, так считается.\n\nК сожалению, битва не обошлась без потерь. В.А.Ш.И.Н.Т.О.Н пришлось принимать мгновенные решения о том, кого спасти."
  nf_ron.2.a:0 "Он спас роботов"
  nf_ron.2.b:0 "Он спас людей"

  nf_ron.3.t:0 "Мятежные Хозеры"
  nf_ron.3.d:0 "Долго бывшие относительно мирными и дружелюбными (ну, для пустоши), Хозеры внезапно решили свалить. Говорят, из-за того, что мы жульничали. Это хоккей! Чего вы ещё ожидали?\n\nВ любом случае, уход у них получился далеко не дружелюбным — они устроили немало хаоса. К сожалению, их разрушительные наклонности заставили нас броситься защищать то, что могли. Нам пришлось сосредоточиться на:"
  nf_ron.3.a:0 "Предотвращении их ухода"
  nf_ron.3.b:0 "Спасении нашей собственности"

  nf_ron.4.t:0 "Сплочение хоккейных команд"
  nf_ron.4.d:0 "В народе давно известно, что В.А.Ш.И.Н.Т.О.Н считает одержимость Ронто хоккеем странной и раздражающей. Вероятно, в его программный код не заложены такие понятия, как «легкомыслие» или «радостное насилие». Тем не менее даже В.А.Ш.И.Н.Т.О.Н признаёт, что это чертовски хороший способ взбодрить людей.\n\nВ итоге В.А.Ш.И.Н.Т.О.Н издал указ, объявив хоккей новым приоритетом Ронто, и выделил средства на улучшение доступа к аренам, экипировке и развитию талантов. Настоящее захватывающее время для хоккеистов Ронто!"
  nf_ron.4.a:0 "Я записываюсь в команду!"

  nf_ron.5.t:0 "Чайная вечеринка в Ронто"
  nf_ron.5.d:0 "По какой-то причине, известной только самому В.А.Ш.И.Н.Т.О.Н.У, он потребовал, чтобы с ростом наших собственных пивоварен мы провели сложный обряд — бросили в озеро импортное пиво. Эта идея получила некоторую поддержку среди владельцев пивоварен, но мы до сих пор не понимаем, зачем именно В.А.Ш.И.Н.Т.О.Н предложил именно это.\n\nОн вряд ли узнает, если мы оставим алкоголь себе, и некоторые ребята даже предлагают обмануть его. Но В.А.Ш.И.Н.Т.О.Н действительно воодушевлён этой идеей — а он редко чем-то воодушевляется. Что нам делать?"
  nf_ron.5.a:0 "Мы не выбрасываем идеально хорошее пиво"
  nf_ron.5.b:0 "ВЫБРОСЬТЕ ЭТО ЗА БОРТ!"

  nf_ron.6.t:0 "Америка вернулась, снова"
  nf_ron.6.d:0 "Как ни странно, Анклав вернулся. Хотя их ещё десятилетия назад вытеснили из города и загнали в замёрзшие пустоши, очевидно, что несколько выживших остались, несмотря на наши усилия. Явно стоило быть более дотошными.\n\nТем не менее, их солдат мало, а силовая броня, хоть и грозная, изношена и повреждена. Это должно быть просто — окончательно разгромить их и завершить начатое 30 лет назад."
  nf_ron.6.a:0 "Американские патриоты идут навстречу своей гибели"

  nf_ron.7.t:0 "...Мистер Робото"
  nf_ron.7.d:0 "Ронто теперь надёжно защищён в Онтарио, гнусный Анклав полностью разгромлен, а Хозеры вернулись в лоно. Теперь В.А.Ш.И.Н.Т.О.Н предстоит бороться с войной внутри самого себя.\n\nНесмотря на все усилия, столетия износа оставили В.А.Ш.И.Н.Т.О.Н с разрушающимися цепями и базами данных. К счастью, оборудования Анклава достаточно, чтобы поддерживать его работу, но придётся пойти на жертвы.\n\nВ.А.Ш.И.Н.Т.О.Н разрывается между тремя отдельными аспектами своей личности, хранящимися на разных, тоже разрушающихся базах данных, и есть ресурсы только чтобы сохранить один из них. Кого он выберет?"
  nf_ron.7.a:0 "Его красноречие и дипломатическое мастерство"
  nf_ron.7.b:0 "Его железная воля и прагматичная беспощадность"
  nf_ron.7.c:0 "Любовь, которую он испытывает к своему народу"
    ron_unfinished_tt:0 "§RНа этом история Ронто на данный момент окончена, но ждите продолжения в будущих обновлениях!§!"









  ron_hockey.1.t:0 "Хоккейная лига Ронто"
  ron_hockey.1.d:0 "Поступают вести с замёрзшего севера: город-государство Ронто, похоже, запускает хоккейную лигу и приглашает людей со всей пустоши смотреть или даже участвовать. Хотя у нас нет времени на эту глупость, жители с энтузиазмом отправляются на матчи и слушают радиокомментарии игр. Многие уже выбирают любимые команды, и настоящая хоккейная мания охватила наши земли.\n\nЭто скоро пройдёт, но пока что всех это очень воодушевляет."
  ron_hockey.1.a:0 "Новости от Ронто в последнее время такие редкие"

  ron_hockey.2.t:0 "Встреча с вратарем"
  ron_hockey.2.d:0 "Оказывается, мы не единственные в пустоши, кто увлечён хоккеем. К сожалению, энтузиаст, с которым мы столкнулись, — жестокий рейдер.\n\nВратарь Леду возглавляет банду рейдеров и называет их «хоккеистами», но это совсем не то, что наше изысканное и разумное увлечение. Тем не менее он готов присоединиться к нам и играть по-настоящему.\n\nВот только многих очень тревожит сама мысль о том, что рейдер, пусть даже такой страстный поклонник хоккея, станет частью нашего сообщества."
  ron_hockey.2.a:0 "Возьмите его на борт!"
    ron_goalie_ledoux_tt:0 "§Y$RON_goalie_ledoux_name$§! становится руководителем подразделения.\n§LLevel§!: §Y2§!\n§RAttack Skill§!: §Y3§!\n§GDefense Skill§!: §Y1§!\n§PPlanning Skill§!: §Y1§!\n§MLogistics Skill§!: §Y2§!\n§gTraits§!: §tAgile§!, §tStrong§!\n\n§Y$RON_goalie_ledoux_name$§!, также становится доступен как советник и приводит с собой подразделение §YОвертайм до первой крови§!."
  ron_hockey.2.b:0 "Давайте просто пристрелим его"