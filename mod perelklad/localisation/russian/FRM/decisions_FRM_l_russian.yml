l_russian:
  FRM_proscribed_burns_category:0 "Управление пожарных маршалов"
  birth_of_the_fire_marshalls:0 "§RПожарные маршалы§!"
  birth_of_the_fire_marshalls_desc:0 "Наши маршалы расчистили опасные заросли на границе Вирджини , начали осушать мелкие пруды для ферм и теперь охраняют наш северный рубеж от каннибалов. Боль и бедность всё ещё являются эндемичными для нашего народа, но будущее остаётся обнадеживающим. Глубокие культурные обиды все ещё вспыхивают среди нашего разделённого сообщества, однако они всё чаще решаются мирным путём. \n\nМир - это незнакомец для Столичной Пустоши, и истории о нашей недавней стабильности смогли проникнуть в дикую местность на юге. Немногие выжившие преодолевают путь через сотни миль болота. Они отправляются группами по сотне человек, зная, что только десятки из них доберётся. Они рассказывают нашим маршалам истории о чудовищах с тысячей зубов, многомесячных ураганах и волшебном королевстве, возглавляемом замороженным монархом."
  FRM_proscribed_burns_category_desc:0 "До сих пор контролируемые выжигания использовались только для предотвращения расширения Болота. Теперь, когда мы взяли под контроль территорию глубже в §7Болоте§!, мы можем дать нашим пожарным маршалам свободу вернуть землю у этого вечного врага."
  mills_burns:0 "Выжигание Чейз Миллс"
  mills_burns_desc:0 "Несмотря на наш недавний конфликт, баптисты из Чейз Миллс ранее позволяли нашим маршалам проводить выжигания на их земле, что сделало нашу последнюю зачистку территории намного проще, чем в других местах."
  eden_burns:0 "Выжигание Эдема"
  eden_burns_desc:0 "Язычники из §R«Эдема»§! способствовали росту этого чудовищного §7Болота§! на протяжении десятилетий. Наконец, настало время превратить этот сад зла в §Rтлеющие руины§!."
  liz_burns:0 "Выжигание Лиз Пойнт"
  liz_burns_desc:0 "В Лиз Пойнт находится лагерь невинных беженцев, людей, спасающихся от различных войн в южной Вирджинии. Известные Народы милостиво открыли свои сердца этим людям и позволили им жить на своей неиспользуемой территории, однако они также закрыли глаза на страдания этих людей. Давайте проявим к ним последний акт доброты и очистим §7Болото§! с этой земли."
  chesapeake_burns:0 "Выжигание Чесапика"
  chesapeake_burns_desc:0 "Большая часть Чесапикского залива была уничтожена при высадке Известных Народов. То, что осталось, было разрушено их боями с §7Болотом§!. Несмотря на то, что так много было потеряно, мы должны продолжать работать, чтобы спасти то, что и кто остался."
  gates_burns:0 "Выжигание Мрачных Врат"
  gates_burns_desc:0 "Мрачные Врата, как и большая часть Вирджинии, изрыты отметинами конфликтов. Будучи передовой между Апокрифцами и Провидцами Болота, всё это на фоне бесконечной §7Болотистой Руины§!. Вновь на нас ложится задача восстановить нормальность в этих руинах."
  alliance_burns:0 "Выжигание Альянса"
  alliance_burns_desc:0 "Земли Альянса — дом для потомков Посейдона и их тайной Апокрифии. Все они сгорят на службе наших пожарных маршалов и их факелов."
  rotorville_burns:0 "Выжигание Роторвилля"
  rotorville_burns_desc:0 "Город Роторвилль выживал на краю §7Болота§!, избегая многочисленных конфликтов, которые терзали Вирджинию. Но теперь возможно полностью избавить регион от угрозы §7Болота§!."

