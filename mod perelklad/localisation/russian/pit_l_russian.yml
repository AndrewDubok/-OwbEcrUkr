### National Focuses ###

    PIT_nf_a001:0 "Город из Стали"
    PIT_nf_a001_desc:0 "Ещё до Великой Войны Питт был промышленным гигантом."
    PIT_nf_a002:0 "Объединение Питта"
    PIT_nf_a002_desc:0 "Лорд Ашур сделал то, что многие считали невозможным — положил конец бесконечным распрям в Питте."
    PIT_nf_a003:0 "Проблема Питта"
    PIT_nf_a003_desc:0 "Несмотря на все свои сильные стороны, у Питта есть одна серьёзная проблема, которая мешала ему когда-либо достичь величия."
    PIT_nf_a004:0 "Доктор"
    PIT_nf_a004_desc:0 "Когда слухи о объединенном Питте распространились и одинокий доктор направился на встречу с его правителем."
    PIT_nf_a005:0 "Мечта для двоих"
    PIT_nf_a005_desc:0 "Два великих ума разработали план будущего Питта, который превосходил всё, что они могли представить поодиночке, но трое — это уже толпа."
    PIT_nf_a006:0 "Огни Промышленности"
    PIT_nf_a006_desc:0 "Многие довоенные кузницы Питта всё ещё работают. Это позволяет производить в масштабах, редко встречающихся на Пустоши."
    PIT_nf_a007:0 "Оснащение рабочих"
    PIT_nf_a007_desc:0 "Нашим главным приоритетом должно быть обеспечение рабочих необходимыми инструментами для работы."
    PIT_nf_a008:0 "Сбалансированные Приоритеты"
    PIT_nf_a008_desc:0 "Нам не нужно выбирать между оснащением рабочих или солдат — всем просто придётся довольствоваться чуть меньшим."
    PIT_nf_a009:0 "Оснащение нашей Армии"
    PIT_nf_a009_desc:0 "Между трогами, дикарями и неблагодарными рабочими, армия Ашура нуждается в каждом патроне, какой только могут достать."
    PIT_nf_a010:0 "Первоначальный Производственный Цикл"
    PIT_nf_a010_desc:0 "Наши первые партии снаряжения уже сходят с конвейера."
    PIT_nf_a011:0 "Улучшение Дизайна"
    PIT_nf_a011_desc:0 "С новым снаряжением в руках начинают проявляться некоторые конструктивные недостатки."
    PIT_nf_a012:0 "Оптимизация Производства"
    PIT_nf_a012_desc:0 "Наши методы производства станут более эффективными по мере изучения и совершенствования процессов."
    PIT_nf_a013:0 "Продвинуть Периметр"
    PIT_nf_a013_desc:0 "Новое снаряжение позволяет нам продвигать наши укрепления глубже в город."
    PIT_nf_a014:0 "Сломанный"
    PIT_nf_a014_desc:0 "Как мы поступим с поставщиком, который не выполнит наши требования?"
    PIT_nf_a015:0 "Поддержать Наше Снабжение"
    PIT_nf_a015_desc:0 "Питт не сможет выжить без стабильного притока рабочих. Мы должны убедиться, что наши источники способны удовлетворить наши потребности."
    PIT_nf_a016:0 "Перестройка Верхнего Города"
    PIT_nf_a016_desc:0 "Армия Ашура рискует жизнью день и ночь, охраняя наши границы и возвращаясь с рейдов с добычей. Они заслуживают достойного места для жизни."
    PIT_nf_a017:0 "Для Рабочих"
    PIT_nf_a017_desc:0 "Сохранение нескольких зданий от разрушения поможет предотвратить чрезмерную текучесть рабочих кадров."
    PIT_nf_a018:0 "Защита Хэйвена"
    PIT_nf_a018_desc:0 "Сердце нашего города нуждается в защите больше всего."
    PIT_nf_a019:0 "Исследования в Хэйвене"
    PIT_nf_a019_desc:0 "Доктор Кунданика запрашивает дополнительное лабораторное помещение в Хэйвене."
    PIT_nf_a020:0 "Вооружения из Питта"
    PIT_nf_a020_desc:0 "Оружие и боеприпасы, произведённые в Питте, попадают в самые разные конфликты на Пустоши."
    PIT_nf_a021:0 "Истребление трогов"
    PIT_nf_a021_desc:0 "Троги становятся всё дерзче в своих атаках на наш периметр. Сокращение их численности должно заставить их отступить за реку."
    PIT_nf_a022:0 "Чудо-ребенок"
    PIT_nf_a022_desc:0 "Каждый ребёнок, рожденный в Питте, становится диким всего за несколько недель, делая размножение практически невозможным. Так было со всеми детьми, кроме этого."
    PIT_nf_a023:0 "Импорт Язычников"
    PIT_nf_a023_desc:0 "Странные культисты на юге могут предоставить рабочих для наших фабрик в обмен на оружие."
    PIT_nf_a024:0 "Переоткрытие Ямы"
    PIT_nf_a024_desc:0 "Что тут скажешь? Большинство погибают. Один или два сумели выбраться, и на этом всё. \n \n -Фэйдра"
    PIT_nf_a025:0 "Расширение Ямы"
    PIT_nf_a025_desc:0 "Расширение Ямы позволит проводить бои в более крупном масштабе. Интересно, удастся ли заманить туда трогов."
    PIT_nf_a026:0 "Та же старая Яма"
    PIT_nf_a026_desc:0 "Зачем менять то, что работает? Яма справляется со своей задачей."
    PIT_nf_a027:0 "Сократить Масштаб"
    PIT_nf_a027_desc:0 "Яма по-прежнему важна для общества Питта, но, возможно, нам не нужно устраивать столько боёв."
    PIT_nf_a028:0 "Учиться на Боях"
    PIT_nf_a028_desc:0 "Эти новички, которых мы набираем, могли бы кое-чему научиться, наблюдая за боями."
    PIT_nf_a029:0 "Следующий Чемпион"
    PIT_nf_a029_desc:0 "Испытания Ямы — это не шутки. Те, кто выходит из них победителем, достойны вступить в армию Ашура."
    PIT_nf_a030:0 "Испытание Боевым Огнём"
    PIT_nf_a030_desc:0 "Убить двух зайцев одним выстрелом — проверить наши новые образцы оружия прямо в Яме."
    PIT_nf_a031:0 "Больше Театральности"
    PIT_nf_a031_desc:0 "Какая польза от боёв, если их неинтересно смотреть? Радиоактивные бочки, падающие с потолка, неожиданные повороты и стрельба из толпы — всё это часть шоу."
    PIT_nf_b001:0 "Взгляд на приз"
    PIT_nf_b001_desc:0 "С уходом Ашура пришло время новому главарю занять его место."
    PIT_nf_b002:0 "Вонь Верхнего Города"
    PIT_nf_b002_desc:0 "Даже верхние уровни нашего города не избежали разрушений в боях."
    PIT_nf_b003:0 "Старые Обиды"
    PIT_nf_b003_desc:0 "Некоторые из рабочих, которые помогли свергнуть Ашура, теперь, извините за выражение, начинают выёбываться."
    PIT_nf_b004:0 "Тихая фабрика"
    PIT_nf_b004_desc:0 "Работа остановилась во время боёв, но перерыв закончился."
    PIT_nf_b005:0 "Вычистка Трогов"
    PIT_nf_b005_desc:0 "В хаосе несколько заборов были пробиты, и троги прорвались. Нужно заделать эти дыры."
    PIT_nf_b006:0 "Путь Нижнего Города"
    PIT_nf_b006_desc:0 "Это дерьмо, в котором живут рабочие, пострадало больше всего. Но стоит ли нам вообще об этом заботиться?"
    PIT_nf_b007:0 "Предвкушение"
    PIT_nf_b007_desc:0 "Люди шли за Ашуром либо потому, что на шее у них был взрывной ошейник, либо потому, что у него был план. У меня есть и то, и другое."
    PIT_nf_b008:0 "Наконец-то Свобода"
    PIT_nf_b008_desc:0 "Рабочие, сражавшиеся вместе с нами, получат то, что Ашур им всегда обещал, свободу."
    PIT_nf_b009:0 "Свобода Подождёт"
    PIT_nf_b009_desc:0 "Настанет время, когда все рабочие получат свободу, но это время ещё не пришло."
    PIT_nf_b010:0 "Помните Своё Место"
    PIT_nf_b010_desc:0 "Ты правда думал, что мы просто так тебя отпустим? Такая глупость — именно причина того, почему ты вообще раб!"
    PIT_nf_b011:0 "Исследование Лечения"
    PIT_nf_b011_desc:0 "Отродье Ашура в безопасности, и мы продолжаем работу над лечением КТД."
    PIT_nf_b012:0 "Импорт-Экспорт"
    PIT_nf_b012_desc:0 "Мы продаём оружие и патроны, а потом покупаем или отбираем всё необходимое. Зачем нам делать что-то ещё?"
    PIT_nf_b013:0 "Стимулирование Роста"
    PIT_nf_b013_desc:0 "Оружейный бизнес, это хороший бизнес, но он всегда самый стабильный. Мы отложим часть наших крышек на развитие других направлений."
    PIT_nf_b014:0 "Самодостаточный Город"
    PIT_nf_b014_desc:0 "Если Питт хочет добиться долгосрочного успеха, ему нельзя зависеть ни от кого."
    PIT_nf_b015:0 "Рабочее Ополчение"
    PIT_nf_b015_desc:0 "Раз уж вы, рабочие, хотите быть равными, вам тоже придётся сражаться."
    PIT_nf_b016:0 "Хлеб и Зрелища"
    PIT_nf_b016_desc:0 "Я не могу дать тебе точный ответ, когда ты получишь свободу... но как насчёт пиршества с пирожными?"
    PIT_nf_b017:0 "Оказание Давления"
    PIT_nf_b017_desc:0 "Любой рабочий, пойманный за бездельем или продолжающий ныть о свободе, будет съеден трогами."
    PIT_nf_b018:0 "Достижение Прогресса"
    PIT_nf_b018_desc:0 "Да нет, правда. Мы уже очень близки. Зачем мне врать об этом?"
    PIT_nf_b019:0 "Лорд Войны"
    PIT_nf_b019_desc:0 "Чтобы крышки не переставали поступать, нам нужно иметь не только больше всего оружия, но и лучшее."
    PIT_nf_b020:0 "Промышленное Развитие"
    PIT_nf_b020_desc:0 "Не все эти машины были предназначены для патронов. Может, мы сможем починить их тоже."
    PIT_nf_b021:0 "Городское Развитие"
    PIT_nf_b021_desc:0 "Никто не хочет жить в помойке. Можно начать с перил вокруг бара."
    PIT_nf_b022:0 "Охранники Стального Двора"
    PIT_nf_b022_desc:0 "Рабочие требуют вооружённой охраны, когда выходят на Стальной Двор. Наверное, это лучше, чем потерять сталь."
    PIT_nf_b023:0 "Добыча Еды"
    PIT_nf_b023_desc:0 "Рабочие могут целый день ныть про защиту, но если хотят есть — пусть работают на полную!"
    PIT_nf_b024:0 "Перестань Ныть"
    PIT_nf_b024_desc:0 "Нам нужна эта сыворотка сейчас, забота о отродье Ашура — дело второе."
    PIT_nf_b025:0 "Побалуйте Отродье"
    PIT_nf_b025_desc:0 "Если это заставит вас замолчать, мы можем дать ребёнку пару игрушек и немного задержаться."
    PIT_nf_b026:0 "Сокровище Господ"
    PIT_nf_b026_desc:0 "Ты не понимаешь. Если верхушка заберёт всю прибыль, это пойдёт на пользу всем. Они умнее и знают, как лучше распределить её пониже."
    PIT_nf_b027:0 "Поделиться Богатством"
    PIT_nf_b027_desc:0 "От самого сильного лейтенанта до самого слабого рабочего — каждый получит часть прибыли от наших продаж."
    PIT_nf_b028:0 "Импорт Рабочей Силы"
    PIT_nf_b028_desc:0 "Что бы мы ни делали, Питт остаётся опасным местом, и нам с каждым днём нужны новые рабочие."
    PIT_nf_b029:0 "Укол"
    PIT_nf_b029_desc:0 "После месяцев тяжёлой работы у нас наконец есть средство, которое хотя бы не даст КТД перейти в самые тяжёлые стадии. Ты снова сможешь заводить детей — так что вперёд, делай будущих рабочих!"
    PIT_nf_b030:0 "Распространите Информацию"
    PIT_nf_b030_desc:0 "Питт лучше, чем когда-либо. Люди должны знать — мы движемся только вперёд и вверх!"
    PIT_nf_b031:0 "Троги у Ворот"
    PIT_nf_b031_desc:0 "Пора разобраться со всеми этими трогами в руинах."
    PIT_nf_b032:0 "Очистить Канализацию"
    PIT_nf_b032_desc:0 "Чёртовы твари всё время выползают из канализации по ночам. Спускайся туда и разбирайся с ними."
    PIT_nf_b033:0 "Переселение в Городок Независимости"
    PIT_nf_b033_desc:0 "Теперь это место может стать хорошим поселением."
    PIT_nf_b034:0 "Разобрать Городок Независимости"
    PIT_nf_b034_desc:0 "Зачем нам строить ещё один большой город? Просто тащи домой всё, что сможешь найти."
    PIT_nf_b035:0 "Рабочие роботы Питта"
    PIT_nf_b035_desc:0 "Там целые склады старых роботов, которые могут работать на конвейерах и в Милле. Нам лишь нужно их запустить."
    PIT_nf_b036:0 "Военные роботы Питта"
    PIT_nf_b036_desc:0 "Зачем тратить этих роботов на заводскую работу, когда у нас полно рабочих? Лучше поставим их на охрану."
    PIT_nf_b037:0 "Защита Форпостов"
    PIT_nf_b037_desc:0 "От Питта до Городка Независимости — долгий путь. Нам нужны крепкие стены на случай, если подкрепление задержится."
    PIT_nf_b038:0 "Запасная Техника"
    PIT_nf_b038_desc:0 "Во время поиска в руинах нашли несколько старых машин, которые стоит забрать."
    PIT_nf_b039:0 "Специализированное Производство"
    PIT_nf_b039_desc:0 "Роботы работают гораздо лучше большинства рабочих и даже не гибнут после контакта с кучей свинца."
    PIT_nf_b040:0 "Старые Чертежи"
    PIT_nf_b040_desc:0 "Нашли папки с чертежами, как сделать этих роботов ещё смертоноснее. Вот это удача!"
    PIT_nf_b041:0 "Грань Величия"
    PIT_nf_b041_desc:0 "Дела идут лучше, чем когда-либо при Ашуре — по крайней мере, так кажется с вершины Хэйвена."
    PIT_nf_b042:0 "Свобода, Завоеванная с Трудом"
    PIT_nf_b042_desc:0 "Годы издевательств, ложных обещаний и смерти наконец подошли к концу. Питтом больше не будет править рейдерский вождь — теперь им будут управлять свободные люди!"
    PIT_nf_b043:0 "Выжившие"
    PIT_nf_b043_desc:0 "Эти крысы всерьёз думали, что капитуляция спасёт их после всего дерьма, что они натворили?"
    PIT_nf_b044:0 "Новый Военачальник"
    PIT_nf_b044_desc:0 "Вернер был мелким подхалимом, теперь пора настоящему мужику взять власть в свои руки."
    PIT_nf_b045:0 "Права Работника"
    PIT_nf_b045_desc:0 "Рабочих Питта больше не будут бить палками. Им будут положена еда за их труд, и наконец-то им дадут нормальную одежду."
    PIT_nf_b046:0 "Защитим Наш Дом"
    PIT_nf_b046_desc:0 "Это лишь вопрос времени, когда кто-то придёт за нами. Мы должны быть готовы."
    PIT_nf_b047:0 "Едят Только Лояльные"
    PIT_nf_b047_desc:0 "Очевидно, проблема была в том, что мы играли слишком по-хорошему. Теперь, если хочешь есть — лучше веди себя правильно."
    PIT_nf_b048:0 "Сила для Сильных"
    PIT_nf_b048_desc:0 "В бою взорвали склад с кучей старых костюмов силовой брони! Теперь нам надо разобраться, как чёртовы штуки использовать."
    PIT_nf_b049:0 "Пожинайте Плоды"
    PIT_nf_b049_desc:0 "В боях много ребят погибло, и их вещи просто лежат тут. Кто нашёл — тот и забрал."
    PIT_nf_b050:0 "Вызов Всем Рейдерам"
    PIT_nf_b050_desc:0 "Пора всерьёз браться за захват власти. Отправь сообщения другим бандами."
    PIT_nf_b051:0 "Движемся Дальше"
    PIT_nf_b051_desc:0 "Рейдеров больше нет — теперь мы можем заселиться в эти огромные пентхаусы в небесах. Наконец-то у нас есть свой кусок пирога."
    PIT_nf_b052:0 "Рабочие Ополченцы"
    PIT_nf_b052_desc:0 "Каждый, кто способен сражаться, должен быть готов к бою. Это цена, которую мы платим за нашу свободу."
    PIT_nf_b053:0 "Бастион Военачальника"
    PIT_nf_b053_desc:0 "Хэйвен — хорошее место, но есть здание повыше, которое теперь очищено от трогов. Оно станет отличной крепостью."
    PIT_nf_b054:0 "Стальная Стража"
    PIT_nf_b054_desc:0 "Потребовалось несколько переломанных конечностей, но мы наконец освоили эти костюмы."
    PIT_nf_b055:0 "Принудительная Иерархия"
    PIT_nf_b055_desc:0 "Рейдеры — это рейдеры. Рабы — это рабы. Так было всегда и так будет всегда."
    PIT_nf_b056:0 "Спрос и Предложение"
    PIT_nf_b056_desc:0 "Конечно, дадим вам оружие для рейдов. Но ждём свою долю."
    PIT_nf_b057:0 "Мы не будем рабами!"
    PIT_nf_b057_desc:0 "Никогда больше мы не позволим надеть на нас ошейник, бить нас и объявлять своей собственностью. Мы свергли Ашура, Вернера и Креншоу. Кто ещё попробует нас заковать — встретит ту же участь!"
    PIT_nf_b058:0 "Военачальник Вернер"
    PIT_nf_b058_desc:0 "Теперь, когда всё утихло, можно смотреть в будущее. Пока что это будущее, кучка тупых пустошников, всё ещё дерущихся колючими палками."
    PIT_nf_b059:0 "Вечеринка Нон-стоп"
    PIT_nf_b059_desc:0 "Пустошь принадлежит самым жёстким ублюдкам, и это мы. Рейд, праздник, и снова по кругу."
    PIT_nf_c001:0 "В Столичную Пустошь"
    PIT_nf_c001_desc:0 "Столичная пустошь всегда была дерьмовым местом, но в её тёмных уголках прячутся ценные вещи."
    PIT_nf_c002:0 "Войти в Цитадель"
    PIT_nf_c002_desc:0 "Когда-то дом Братства Стали, Цитадель, теперь больше похожа на огромный склад с техникой и оружием."
    PIT_nf_c003:0 "Жители Пустоши"
    PIT_nf_c003_desc:0 "Как пустошники приспосабливаются к новым порядкам?"
    PIT_nf_c004:0 "Ржавый Халк"
    PIT_nf_c004_desc:0 "Для самого большого города в Столичной пустоши это место — настоящая груда металлолома."
    PIT_nf_c005:0 "Будущее Пустошей"
    PIT_nf_c005_desc:0 "С Столичной Пустошью под нашей властью нас уже ничто не остановит."
    PIT_nf_d001:0 "Жалкое Восстание"
    PIT_nf_d001_desc:0 "Вернер всерьёз думал, что пара пустых обещаний и рукопожатий хватит, чтобы свергнуть хозяина этого города? Это почти жалко."
    PIT_nf_d002:0 "Собираем Остатки"
    PIT_nf_d002_desc:0 "Вернер и Мидея могли провалиться, но Ашур не бездушен. Он протянет руку тем рабочим, что восстали против них, чтобы они вернулись к работе без наказания. Если откажутся — солдаты их усмирят."
    PIT_nf_d003:0 "Подавление Мятежников"
    PIT_nf_d003_desc:0 "Подавление инакомыслия обычно строится на камерах, постоянном контроле и замкнутости. В моём городе такого не будет. Первый шаг — ввести довоенную концепцию под названием «Доносы Соседей»."
    PIT_nf_d004:0 "Свыше"
    PIT_nf_d004_desc:0 "И рабочим, и солдатам нужны получше места для жизни. Хоть и приятно было бы полностью восстановить Хэйвен, но враги не должны жить в нескольких шагах от моей комнаты. Давайте займёмся восстановлением крупных зданий Питта."
    PIT_nf_d005:0 "Создание Сети"
    PIT_nf_d005_desc:0 "Самодостаточность — главное, и мы продолжим ставить себя на первое место. Но у нас есть соседи, которые рано или поздно захотят вторгнуться или воспользоваться нами, а я не всегда буду рядом, чтобы вести Мари. Нам нужны партнёры — не рабы, а единомышленники."
    PIT_nf_d006:0 "Уровень Ниже"
    PIT_nf_d006_desc:0 "Речи и идеи — это хорошо, но вскоре после восстания рабочим нужно видеть своего Владыку в деле. Есть фабрика в месте под названием Траншеи, верх разрушен, но говорят, что нижние уровни остались целы. Я спущусь туда, чтобы поднять мораль."
    PIT_nf_d007:0 "Дар Города"
    PIT_nf_d007_desc:0 "С Вернером и мятежными рабами покончено, Питт возвращается к привычному ритму, правда теперь с дополнительным плюсом — Сандра и Ашур круглосуточно работают за закрытыми дверями, чтобы обеспечить счастье и здоровье Мари."
    PIT_nf_d008:0 "Дар Города"
    PIT_nf_d008_desc:0 "Кажется, прошло так мало времени, но Мари почти достигла возраста, когда её крепкие гены можно будет использовать для создания вакцины от КТД, которая навсегда изменит этот город. Благодаря нашим усилиям мы можем позволить себе одновременно вести больше исследований."
    PIT_nf_d009:0 "Продолжение Исследований Лечения"
    PIT_nf_d009_desc:0 "Нет сомнений, что кровь Мари сработает, но это не значит, что все добровольно согласятся на укол или вообще смогут его принять. Нам нужно найти способ обеспечить альтернативные вакцины."
    PIT_nf_d010:0 "Вакцинированная «Ядер-Кола»"
    PIT_nf_d010_desc:0 "Смешное название, но метод вакцинации имеет потенциал. Большой фабрики Нюка-Колы поблизости, кажется, нет, но подмешать вакцину в переэтикетированные бутылки — отличный ход."
    PIT_nf_d011:0 "Сдержать Обещание"
    PIT_nf_d011_desc:0 "Мари растёт так быстро, а я старею неумолимо. Пора завершить проект вместе с Сандрой и представить его Питту."
    PIT_nf_d012:0 "Разгром Трогов в Верхнем Городе"
    PIT_nf_d012_desc:0 "Восстание выявило серьёзную уязвимость противотроговых прожекторов в Верхнем Городе, из-за которой пострадали несколько предприятий. Эти проблемы нужно срочно решить, прежде чем двигаться дальше."
    PIT_nf_d013:0 "Портативная Мощь"
    PIT_nf_d013_desc:0 "Вряд ли всё так просто, но по словам Эверетта, давным-давно трогов отпугивали гранатами, излучающими ослепительный свет, а также оружием и шлемами с такими же яркими осветительными приборами. Возможно, именно это нам и нужно, чтобы наконец покончить с трогами?"
    PIT_nf_d014:0 "Уничтожение Трогов"
    PIT_nf_d014_desc:0 "Теперь, когда они не размножаются быстрее, чем мы успеваем их уничтожать, мы наконец можем перейти к решительным действиям против трогов."
    PIT_nf_d015:0 "Химическое Оружие"
    PIT_nf_d015_desc:0 "В Трогтауне был обнаружен тайник с древними припасами — предметами, способными прожечь лицо и расплавить металл. Это может сыграть нам на руку."
    PIT_nf_d016:0 "«PPG Плэйс»"
    PIT_nf_d016_desc:0 "Смысл этих трёх букв давно забыт многими, но четыре стены и крыша — не то, что стоит отвергать, особенно когда рядом есть ещё пять таких же домов для жилья."
    PIT_nf_d017:0 "Подними Жару"
    PIT_nf_d017_desc:0 "Ашур видит потенциал вернуть Питту былую промышленную славу. Вернеру не удалось, но он заново вдохновил Ашура. Печи должны гореть жарче, чем когда-либо прежде."
    PIT_nf_d018:0 "Стальная Перековка"
    PIT_nf_d018_desc:0 "Пройдёт ещё время, прежде чем мы сможем вновь производить силовую броню и оружие уровня довоенного времени. Пока что сосредоточимся на продаже и экспорте излишков ресурсов нашим соседям."
    PIT_nf_d019:0 "Новая Типография"
    PIT_nf_d019_desc:0 "Причина, по которой для снабжения солдат Питта использовалась такая маленькая и ограниченная типография, — предотвратить именно то, чем воспользовался Вернер. Нужно создать вторую типографию, чтобы это больше никогда не повторилось."
    PIT_nf_d020:0 "Ускоренный Курс"
    PIT_nf_d020_desc:0 "Несмотря на все сомнения, чтобы защититься от внешних врагов, возможно, стоит возобновить производство летательных аппаратов. Через несколько лет мы даже сможем снова выпускать винтокрылы. А вот с лодками пока не получится — река слишком токсична."
    PIT_nf_d021:0 "Операция «Чистота и Ясность»"
    PIT_nf_d021_desc:0 "Проходящий торговец гуль посмотрел на нашу воду и сказал, что знает способ хоть немного её очистить. Если вложить достаточно усилий в это, возможно, нам всё-таки удастся запускать лодки."
    PIT_nf_d022:0 "Поднять Солдат в Бой"
    PIT_nf_d022_desc:0 "Власть Ашура вновь безоговорочна, и хотя он больше никогда не допустит ошибки, доверив второе командование кому-то вроде Вернера, было бы разумно начать серьёзную подготовку солдат."
    PIT_nf_d023:0 "Рейдеры из Питта"
    PIT_nf_d023_desc:0 "Всё, что делается для солдат, направлено на то, чтобы сделать из них лучших людей. Но многие по-прежнему считают их просто рейдерами под другим именем. Чтобы оставить по-настоящему значимый след, что-то должно измениться."
    PIT_nf_d024:0 "Вознаграждение Лояльных"
    PIT_nf_d024_desc:0 "Все солдаты равны, не говорите никакой ерунды про «некоторые равнее других». Если мы будем поощрять рабочих становиться солдатами не через Яму, а другими способами, мы сможем строить лучшее будущее."
    PIT_nf_d025:0 "Заполнить Яму"
    PIT_nf_d025_desc:0 "Заставлять рабочих сражаться ради развлечения наших солдат, это не способ набора в армию будущего. Пришло время наконец закрыть Яму."
    PIT_nf_d026:0 "Обычные Люди"
    PIT_nf_d026_desc:0 "Появились странные лица, ищущие работу, пора бы принять официальную политику по этому поводу."
    PIT_nf_d027:0 "Неделя Труда Рабочих"
    PIT_nf_d027_desc:0 "Старое правило Пустоши гласит: «Дашь дюйм — возьмут милю». Но с учётом нового мира и стремления к процветанию в Питте теперь можно позволить рабочим полноценный день отдыха."
    PIT_nf_d028:0 "Металлический Характер"
    PIT_nf_d028_desc:0 "Решено: машины будут служить инструментами. Рабочие будут их использовать, а солдаты — следить, чтобы машины не обернулись против нас. На всякий случай Сандра разработала программу удалённого управления, чтобы пресечь любые попытки восстания роботов."
    PIT_nf_d029:0 "Ковка Цеха"
    PIT_nf_d029_desc:0 "Оказывается, Милл — не единственное металлургическое предприятие в Питте. Во время расчистки завалов рухнувшего небоскрёба мы обнаружили целый сталелитейный завод. Если восстановим его, рабочих ждёт больше работы, чем когда-либо прежде."
    PIT_nf_d030:0 "Расчистка Завалов"
    PIT_nf_d030_desc:0 "Не секрет, что многие дороги и туннели далеко не самые удобные и безопасные для передвижения. Но теперь, с машинами вместо людей, у нас есть возможность приложить усилия для улучшения проходимости Питта."
    PIT_nf_d031:0 "Экономическое Возрождение"
    PIT_nf_d031_desc:0 "Пока экономика Питта строилась на рабочей силе, боеприпасах и броне, всё это обменивалось на крышки. Но крышки сделаны из металла, даже из стали. Если какой-нибудь недобросовестный рабочий зальёт рынок новыми крышками, нам конец. Может, стоит поискать новый вид металла для валюты?"
    PIT_nf_d032:0 "Военно-морские Инвестиции"
    PIT_nf_d032_desc:0 "Река стала немного менее токсичной, поэтому мы можем позволить себе привести в порядок причалы и доки. Только не забывайте надевать защитный костюм при плавании по этому участку реки."
    PIT_nf_d033:0 "Фильтрация Воздуха"
    PIT_nf_d033_desc:0 "Сейчас это кажется бессмысленным, но такие меры помогут предотвратить развитие болезней и недугов от бесконечного чёрного дыма в воздухе. Кто знает, может, однажды мы наконец снова увидим голубое небо."
    PIT_nf_d034:0 "Железный Шпиль"
    PIT_nf_d034_desc:0 "Хэйвен — самое высокое здание в восстановленной части Питта. Теперь, когда у нас есть необходимые ресурсы, мы можем приступить к восстановлению Стальной Башни, которая под новым именем «Железный Шпиль» станет символом возрождения Питта."
    PIT_nf_d035:0 "Мост над рекой Питт"
    PIT_nf_d035_desc:0 "Мост давно символизирует контроль над Питтом, здесь лежат мины, чтобы ни один рабочий не смог сбежать. Но с формированием нового Питта мост тоже должен измениться. К тому же это поможет торговле, теперь караваны будут реже случайно убивать."
    PIT_nf_d036:0 "RobCo Депо"
    PIT_nf_d036_desc:0 "В ходе дальнейших раскопок, похоже, был обнаружен тайник с роботами, как модифицированными, так и нетронутыми. Если там нет ничего другого, их можно разобрать на запчасти и редкие материалы."
    PIT_nf_d037:0 "Святилище"
    PIT_nf_d037_desc:0 "Когда-то это был большой собор, позже захваченный Фанатиками. «Святилище» стоит как свидетельство ошибок Старого мира. Рабочие уже приходят туда помолиться — будь то своему Богу или своему Владыке."
    PIT_nf_d038:0 "Хэйвен"
    PIT_nf_d038_desc:0 "Большая часть крупных построек Питта либо восстанавливается, либо реконструируется, либо уже заселена. Хотя новые соседи пока ещё не совсем надёжны, завершить новый облик Питта более ухоженным Хэйвеном, было бы неплохой идеей."
    PIT_nf_d039:0 "Свет Эффиджи"
    PIT_nf_d039_desc:0 "Как бы жестоко это ни было, этот изуродованный человек из проволоки и металла вызывает множество эмоций у тех, кто его видит — будь то впервые или в пятисотый раз. Если мы сделаем его больше, он может вдохновить ещё больше людей поверить в этот город."
    PIT_nf_d040:0 "Комплекс «Сальный Старатель»"
    PIT_nf_d040_desc:0 "Вы когда-нибудь задумывались, откуда берутся все эти банки с свининой и фасолью? Мы тоже. Но в этих разрушенных зданиях, похоже, их очень много, тут даже есть машины, чтобы делать ещё, если захотим."
    PIT_nf_d041:0 "Гарантия Нашей Независимости"
    PIT_nf_d041_desc:0 "Тем, кто желает Питту зла, тем, кто хочет лишить нас суверенитета, пусть будет известно: мы будем сражаться и победим."
    PIT_nf_d042:0 "Город, Который Крепче чем Сталь"
    PIT_nf_d042_desc:0 "Этот город во многом похож на сталь, из которой он сделан. Когда-то блестящий и безупречный, потом оставленный гнить, ставший отвратительным и изношенным. У нас может и нет того же чистого блеска, но мы стали крепче, чем когда-либо, а наследие Ашура быстро растёт, и эта связь крепче стали."

### Production Companies ###
    PIT_armaments_design:0 "Арсенал Питта"
    PIT_armaments_design_desc:0 "В Питте штампуют оружие и патроны в таких масштабах, каких Пустоши на этой стороне страны не видели со времён Великой войны."

