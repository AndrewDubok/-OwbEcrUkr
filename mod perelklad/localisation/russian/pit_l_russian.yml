l_russian:

### Balance of Power ###
    PIT_wernhers_grip_bop:0 "Вернер захватил Питт" 
    PIT_wernher_grip_loose:0 "Потерял хватку"
    PIT_wernher_grip_tight:0 "Правит стальной хваткой"
    PIT_wernher_grip_lost:0 "Почти развалился"
    PIT_wernher_grip_lost_desc:0 "Квоты не выполняются, поставки постоянно срываются, а некоторые из помощников Вернера поговаривают о разделе территории после его падения."
    PIT_wernher_grip_fumbling:0 "Пытается сохранить контроль"
    PIT_wernher_grip_fumbling_desc:0 "Слишком много рейдеров оспаривают приказы и припрятывают припасы вместо того, чтобы распределять их. Кто может их винить? Босс едва ли понимает, что происходит здесь, под его оплотом."
    PIT_wernher_grip_loosening:0 "Неповиновение растет"
    PIT_wernher_grip_loosening_desc:0 "Некоторые ребята наотрез отказываются от определённых работ. Они не верят, что с ними что-то случится, и обычно оказываются правы."
    PIT_wernher_grip_weak:0 "Слабая хватка"
    PIT_wernher_grip_weak_desc:0 "Ходят слухи, что босс слабеет. Он почти не приказывает никого бить, и многим парням сошло с рук его ограбление. Нельзя допустить, чтобы подобное происходило в банде рейдеров."
    PIT_wernher_grip_firm:0 "Твердая хватка"
    PIT_wernher_grip_firm_desc:0 "Время от времени могут возникать жалобы, но это нормально. В конце концов, ребята знают, кто главный."
    PIT_wernher_grip_strong:0 "Сильная хватка"
    PIT_wernher_grip_strong_desc:0 "У босса сплоченная команда. У ребят полно работы, и они её выполняют вовремя. Те, кто облажались, больше не облажаются."
    PIT_wernher_grip_iron:0 "Правление стальной хваткой"
    PIT_wernher_grip_iron_desc:0 "Никто не задает вопросов боссу. Он делает все так, как ему нравится, поэтому, если вам что-то не нравится, вы — проблема. Вы не хотите стать проблемой."
    PIT_wernher_uprising_bop:0 "Восстание Вернера?"
    PIT_wernher_uprising_here:0 "Восстание практически наступило!"
    PIT_wernher_uprising_what:0 "Что, восстание?"
    PIT_wernher_uprising_imminent:0 "Восстание неизбежно"
    PIT_wernher_uprising_imminent_desc:0 "Сейчас уже почти общеизвестно, что Вернер планирует сделать ход против Ашура. Единственная причина, по которой босс ещё не узнал об этом, — почти все в Питте поддерживают этот план."
    PIT_wernher_uprising_concerning:0 "Серьёзные проблемы с лояльностью"
    PIT_wernher_uprising_concerning_desc:0 "Многие теперь сомневаются в своей верности Ашуру. Это нормально, пока они его боятся. Но если достаточно у многих из них нет верности, чего им тогда бояться?"
    PIT_wernher_uprising_talk:0 "Обеспокоенный разговор"
    PIT_wernher_uprising_talk_desc:0 "Все больше людей шепчутся о том, что во главе должен стоять кто-то другой. Они никогда не позволят услышать об этом преданным Ашуру, но это не значит, что такого не происходит."
    PIT_wernher_grumblings:0 "Бессмысленное ворчание"
    PIT_wernher_grumblings_desc:0 "Люди жалуются, что всё могло бы быть лучше. Никто прямо не говорит, что кто-то другой справился бы лучше, но ты знаешь, что некоторые ребята именно так и думают."
    PIT_wernher_uprising_unlikely:0 "Восстание маловероятно"
    PIT_wernher_uprising_unlikely_desc:0 "Ходят слухи, что некоторые обсуждают устранение босса и назначение кого-то другого во главе. Но это же просто чепуха, правда?"
    PIT_wernher_uprising_doa:0 "Восстание ничтожно маловероятно"
    PIT_wernher_uprising_doa_desc:0 "Любой, кто достаточно глуп, чтобы попытаться сделать ход против Ашура, обречён на провал с самого начала — то есть полный крах и провал."
    PIT_wernher_uprising_doomed:0 "Восстание обречено"
    PIT_wernher_uprising_doomed_desc:0 "Даже пять доз Психо не смогли сделать кого-то достаточно безумным, чтобы связываться с боссом."

### Characters ###
    PIT_lord_ishmael_ashur_name:0 "Ишмаель Ашур"
    PIT_lord_ishmael_ashur_desc:0 "Ранее являвшийся новичком в Братстве Стали, лорд Ишмаэль Ашур был оставлен умирать после того, как на него обрушилось здание во время зачистки Питта Братством. Придя в сознание спустя несколько дней, он обнаружил себя в одиночестве на враждебной территории. Слабый человек сломался бы под давлением, но Ашур поднялся над обстоятельствами, объединил несколько банд и сформировал Питт по своему образу и подобию. Теперь у него грандиозные планы сделать то же самое с остальной пустошью. По крайней мере, если только его циклопический коллега не замышляет что-то своё."
    PIT_krenshaw_NAME:0 "Креншоу"
    PIT_krenshaw_desc:0 "Один из главных рейдеров после переворота Вернера, Креншоу устал от междоусобиц и всей этой чепухи. Если кто и должен управлять Питтом, так это он."
    PIT_wernher_NAME:0 "Вернер"
    PIT_wernher_desc:0 "Когда-то главный человек Ашура, Вернер имел собственные планы на Питт. Теперь, когда Ашур свергнут, Вернеру остаётся только понять, в чём заключаются эти планы."
    PIT_adan_NAME:0 "Адан"
    PIT_bone_NAME:0 "Бон"
    PIT_brand_NAME:0 "Бренд"
    PIT_duke_NAME:0 "Дюк"
    PIT_everett_NAME:0 "Эверетт"
    PIT_faydra_NAME:0 "Файдра"
    PIT_friday_NAME:0 "Фридэй"
    PIT_hammer_NAME:0 "Хаммер"
    PIT_harris_NAME:0 "Харрис"
    PIT_jackson_NAME:0 "Джексон"
    PIT_lulu_NAME:0 "Лулу"
    PIT_marco_NAME:0 "Марко"
    PIT_mex_NAME:0 "Мэкс"
    PIT_milly_NAME:0 "Милли"
    PIT_midea_NAME:0 "Мидея"
    PIT_midea_desc:0 "Неофициальный лидер рабов Питта, Мидея, увидела в нестабильности после переворота Вернера шанс для свободы своего народа. Теперь они продолжают борьбу, чтобы никогда больше не оказаться в оковах."
    PIT_mona_NAME:0 "Мона"
    PIT_nola_NAME:0 "Нола"
    PIT_odog_NAME:0 "О Дог"
    PIT_phantom_NAME:0 "Фантом"
    PIT_reddup_NAME:0 "Реддап"
    PIT_sandra_NAME:0 "Доктор Сандра Кунданика"
    PIT_vika_NAME:0 "Вика"
    PIT_wild_bill_NAME:0 "Дикий Билл"
    PIT_champ_NAME:0 "Чемпион"

### Cosmetic Tags ###
    PIT_pittsburgh:0 "Питтсбург"
    PIT_pittsburgh_DEF:0 "Питтсбург Сити"
    PIT_pittsburgh_ADJ:0 "Питтсбургеры"

### Decisions ###
    PIT_reward_suckups_decision:0 "Награда подсосов"
    PIT_reward_suckups_decision_desc:0 "Любой, кто проявляет верность боссу, даже если кажется, что слишком много — получит дополнительную еду и крышки. Со временем это должно вызвать настоящую преданность."
    PIT_increase_slave_rations_decision:0 "Увеличить рационы рабочих"
    PIT_increase_slave_rations_decision_desc:0 "Рабочим дадут немного «крэма», чтобы разбавить их кашу из трог-мяса."
    PIT_force_hole_volunteers_decision:0 "Принудительный набор добровольцев в «Яму»"
    PIT_force_hole_volunteers_decision_desc:0 "Рабочие не спешат записываться на бой в «Яме». Придётся немного поднажать."
    PIT_crackdown_on_disloyal_decision:0 "Жесткие меры против нелояльных"
    PIT_crackdown_on_disloyal_decision_desc:0 "Ничто так не укрепляет лояльность, как хорошая взбучка тем, кто жалуется... верно?"
    PIT_support_breakers_troops_decision:0 "Поддержать Разрушителей"
    PIT_support_breakers_troops_decision_desc:0 "Разрушители привозят нам рабов и металлолом со всего Великого озера. Стоит отправить им пару ребят, чтобы сохранить эту линию снабжения без перебоев."
    PIT_support_harrisburg_troops_decision:0 "Поддержать Гаррисбургских Бандитов"
    PIT_support_harrisburg_troops_decision_desc:0 "Банды Гаррисбургских Бандитов хорошо справляются с поставками рабочих и иногда свежей еды. Отправить им подкрепление это лучше, чем самому захватывать Джонстаун."
    PIT_support_raiders_troops_decision:0 "Поддержать Парадайз-Фоллс"
    PIT_support_raiders_troops_decision_desc:0 "Рейдеры из Столичной пустоши это главные поставщики рабов в Парадайз-Фоллс. Нам стоит помочь им выжить."
    PIT_wernher_revolt_category:0 "Восстание Вернера"
    PIT_tighten_ashurs_grip_decision:0 "Укрепить хватку Ашура"
    PIT_tighten_ashurs_grip_decision_desc:0 "Некоторых из армии Ашура поймали на неосторожных словах или нарушении правил лорда. Наказание их по заслугам поможет удержать остальных от дурных мыслей."
    PIT_reward_raiders_decision:0 "Наградить Солдат"
    PIT_reward_raiders_decision_desc:0 "Солдаты армии Ашура сражаются не только из-за веры в цели нашего лорда, для них важна и плата. Небольшой бонус поможет сохранить их довольными."
    PIT_special_hole_decision:0 "Организовать специальный турнир в Яме"
    PIT_special_hole_decision_desc:0 "Около сотни рабочих будут отобраны для участия в особом мероприятии в Яме. Рабочим это может не понравиться, но солдатам — да, и в любом случае это напоминает всем, кто здесь главный."

### Events ###
    PIT_nf_events.1.title:0 "Стальной Город"
    PIT_nf_events.1.desc:0 "Город Питтсбург когда-то был одним из важнейших промышленных центров довоенной Америки. Здесь производили всё — от стали и боеприпасов до винтокрылов и силовой брони. Неудивительно, что город стал целью для китайских ядерных ударов. Почти все ракеты попали в цель, за исключением одной. Эта ракета была предназначена для..."
    PIT_nf_events.1.a:0 "Питтсбургского железнодорожного депо"
    PIT_nf_events.1.b:0 "Питтсбургского Международного Аэропорта"
    PIT_nf_events.1.c:0 "Депо Национальной гвардии"
    PIT_nf_events.2.title:0 "Вслед за Мором"
    PIT_nf_events.2.desc:0 "В 2255 году Братство Стали начало наступление на Питт. То, что позже назовут «Мором», стало временем, когда Братство уничтожило многочисленные безумные банды, отряды палачей и рейдерские группировки, бродившие по городу. Ашур был одним из солдат, прошедших по улицам, убивая всех, кто оказывал сопротивление, но в итоге попал под взрыв и оказался погребённым под завалами. Его, оставленного умирать, нашли выжившие, пытавшиеся забрать его броню. Аборигены, увидевшие, как он восстал из руин, стали почитать его. Ашур использовал свои знания и их преданность, чтобы заполнить вакуум власти в Питте и объединить выживших. Но кто же были эти аборигены, что его нашли?"
    PIT_nf_events.2.a:0 "Они были простыми мародёрами"
    PIT_nf_events.2.b:0 "Они были выжившими войнами"
    PIT_nf_events.2.c:0 "Они были простыми знахарями"
    PIT_nf_events.2.d:0 "Инструментом лорда Ашура, детали не имеют значения"
    PIT_nf_events.3.title:0 "Проклятие Питта"
    PIT_nf_events.3.desc:0 "Объединить разбросанных выживших было сравнительно легко. Все, кто мог серьёзно сопротивляться, были уничтожены Братством, а те, кто остался, с радостью принимали любые приказы, лишь бы не возвращаться к прежнему хаосу. Однако у Питта была одна серьёзная проблема, которая на протяжении почти двух столетий превращала город в беззаконное место — Контаминация Троглодитной Дегенерации, или КТД. Это заболевание, вызванное уникальным сочетанием фона радиации и промышленных загрязнителей, характерных для региона Питта. Оно заражает любого, кто проводит в этой местности достаточно времени. Помимо болезненных язв, почти 20% заражённых КТД испытывают когнитивный упадок, который ведёт к безумию и полной дегенерации в мутанта — трога. Один из пяти входящих в Питт людей, подвергшихся такому исходу, уже серьёзно осложняет создание стабильного общества. Но ещё хуже — 100% детей, рождающихся в этих условиях, становятся дикими в течение нескольких недель после рождения. Ашуру нужна была рабочая сила для реализации своих целей в Питте, а при таком нулевом проценте успешных рождений ему пришлось искать людей за пределами города."
    PIT_nf_events.3.a:0 "Это было единственным решением"
    PIT_nf_events.4.title:0 "Женщина, пришедшая откуда-то"
    PIT_nf_events.4.desc:0 "По мере того как Ашур укреплял власть в Питте, слухи о могуществе города распространялись по Пустошам. Сначала это привлекало множество искателей удачи и возможностей. Но тех, кто не подходил для армии Ашура, быстро обращали в рабство, и вскоре свободно заходящих в Питт стало гораздо меньше. Особняком выделялась одна женщина — доктор Сандра Кунданика. Эта учёная пришла в Питт с целью изучения троглодитной болезни. Ашур быстро оценил её как выдающегося специалиста и предоставил ей место в своей башне для проведения исследований. Главной задачей было найти способ излечить заражение или хотя бы снизить уровень дегенерации у новорождённых."
    PIT_nf_events.4.a:0 "Благородная цель"
    PIT_nf_events.5.title:0 "Трое — уже толпа"
    PIT_nf_events.5.desc:0 "С годами доктор Кунданика продолжала изучать КТД и добилась некоторых прорывов в понимании болезни. Однако прогресс шёл медленно. Со временем Ашур стал всё чаще интересоваться её исследованиями, причём его визиты становились всё менее формальными и всё больше личными. Между ними завязались чувства, и вскоре они поженились. \n \n Ашур нашёл в супруге не только человека, который понимал и поддерживал его цели, но и обладал знаниями и смелостью, чтобы помогать их реализовывать. Он стал всё больше доверять жене, советоваться с ней по разным планам и решениям. Однако с ростом зависимости от мнения жены уменьшилось влияние его правой руки — Вернера. Хотя Вернер никогда не подрывал авторитет Ашура публично, в последнее время он всё чаще выражает свои опасения по поводу направления, в котором развивается Питт."
    PIT_nf_events.5.a:0 "Звучит, как проблема"
    PIT_nf_events.6.title:0 "Окровавленный и сломленный"
    PIT_nf_events.6.desc:0 "Сотни мужчин и женщин недавно подошли к нашим воротам, прося убежища. Это уцелевшие из племени Разрушителей — они бежали с территории, поражённые врагом, с которым не смогли справиться. Эти опытные рейдеры хотят занять место в армии Ашура и напоминают о своей роли в поставках рабов для Питта до недавнего поражения. Безусловно, нам всегда нужны новые бойцы, но стоит ли принимать тех, кто не смог удержать свои земли? Готовы ли мы впустить слабых в наши ряды? Это вопрос, который требует взвешенного решения. Возможно, стоит тщательно проверить их лояльность и боеспособность, прежде чем принимать окончательное решение."
    PIT_nf_events.6.a:0 "Они могут присоединиться к армии Ашура"
    PIT_nf_events.6.b:0 "Заковать их в цепи"
    PIT_nf_events.7.title:0 "Дар"
    PIT_nf_events.7.desc:0 "Когда жена Ашура родила, все ожидали, что маленькая Мари повторит судьбу других детей, рожденных в Питте. Но с каждой неделей становилось всё яснее — этот ребёнок особенный. Доктор Кунданика провела серию тестов и обнаружила, что Мари не только невосприимчива к КТД, но и обладает иммунитетом практически ко всем другим радиационно-индуцированным заболеваниям. Её ДНК содержит защиту от радиационной болезни, гуллификации и даже от распространённой мутации — шестого пальца на ноге. Со временем, возможно, удастся разработать способ передачи этого иммунитета в какой-то степени следующим поколениям. Однако младенец очень хрупок, и забор образцов крови должен проводиться крайне осторожно, даже если Мари не будет единственным ребёнком лорда Ашура."
    PIT_nf_events.7.a:0 "Что Вернер думает по этому поводу?"
    PIT_nf_events.8.title:0 "Общение с сумасшедшим"
    PIT_nf_events.8.desc:0 "Недавние новоприбывшие в регион культисты Церкви Рокки вызвали немало вопросов в Питте. Эти религиозные фанатики быстро покорили несколько племён к югу от Питта и иногда посылают своих воинов в земли троглодитов с неизвестной целью. Они стараются избегать нашего пространства, и мы не вторгаемся в их территории, но, по всей видимости, они поработили многих из покорённых племён. Возможно, стоит рассмотреть вариант вооружить этих фанатиков — взамен мы могли бы получать часть их рабов. Такой союз может укрепить наши позиции и расширить ресурсы, но при этом важно тщательно оценить риски, связанные с поддержкой столь непредсказуемых союзников."
    PIT_nf_events.8.a:0 "Предложить §R100 ружий§! за §O100 рабов"
    PIT_nf_events.8.b:0 "Предложить §R250 ружий§! за §O250 рабов"
    PIT_nf_events.8.c:0 "Предложить §R500 ружий§! за §O500 рабов"
    PIT_nf_events.8.d:0 "Предложить §R1,000 ружий§! за §O1,000 рабов"
    PIT_nf_events.8.e:0 "У нас нет лишнего оружия"
    PIT_nf_events.9.title:0 "Великое зрелище"
    PIT_nf_events.9.desc:0 "«Яма» — место опасности и одновременно возможностей. Арена здесь видела бесчисленные бои между рабочими Питта, где сильнейшие выживали и получали шанс войти в армию Ашура. Несмотря на то, что наградой за победу была свобода и место в высших слоях общества Питта, немногие рабочие добровольно соглашались участвовать в этих смертельных поединках. Часто рабочих заставляли принимать участие силой — ради развлечения армии Ашура и удовольствия более садистски настроенных работников. Бои начинались и заканчивались по воле Ашура, и сейчас он объявил, что новый цикл боёв начнётся. Это значит, что скоро арена вновь наполнится кровью и борьбой за выживание."
    PIT_nf_events.9.a:0 "Желаем удачи бойцам"
    PIT_nf_events.10.title:0 "Вернер закрепляется за Троном"
    PIT_nf_events.10.desc:0 "Пролив много крови, пота и дав множество обещаний, Вернер закрепил за собой власть правителя Питта. Армия Ашура начала выполнять его приказы, а рабы продолжают трудиться, как и прежде. Лордское кресло — удобное место, но Вернер не должен впадать в самодовольство. Без железного кулака Ашура, который удерживал Питт в единстве, ситуация стала более нестабильной, чем за последние два десятилетия. Если Вернер ослабит хватку, Питт может ускользнуть из-под его контроля, и тогда начнётся новая волна хаоса и борьбы за власть."
    PIT_nf_events.10.a:0 "Этого не произойдет"
    PIT_nf_events.10.b:0 "Что это означает с точки зрения механики?"
    PIT_nf_events.11.title:0 "Разрушающиеся шпили"
    PIT_nf_events.11.desc:0 "Хотя переворот прошёл быстро, он не обошёлся без повреждений. Верхний город сильно пострадал в боях — многие здания стали ещё более опасными для жилья, чем раньше. Некоторые здания даже оказались отрезаны из-за разрушения мостов. Солдаты, находящиеся в Верхнем городе, просят выделить рабов для опасных ремонтных работ на этих шатких башнях."
    PIT_nf_events.11.a:0 "Назначить работников на задачу"
    PIT_nf_events.11.b:0 "Солдаты могут сами отремонтировать свой дом"
    PIT_nf_events.12.title:0 "Не такой уж простой запрос"
    PIT_nf_events.12.desc:0 "Рабочие Питта твёрдо поддерживали свержение Ашура. Мы обещали им перемены, но, возможно, они не до конца понимали, насколько всё изменится. Мидея, представитель рабочих, выступила с перечнем офицеров армии Ашура, которых рабочие хотели бы наказать за то, что они называют «жестоким обращением». Нам нужно действовать осторожно — рейдеры могут быть недовольны, если одного-двух из них бросят толпе, но большее количество может привести к катастрофе."
    PIT_nf_events.12.a:0 "Уступите требованиям рабочих"
    PIT_nf_events.12.b:0 "Дайте им Вику, она всё равно стерва"
    PIT_nf_events.12.c:0 "Просто переведите солдат из списка на другие должности"
    PIT_nf_events.12.d:0 "Рабочие не получат справедливости"
    PIT_nf_events.13.title:0 "Тишина машин"
    PIT_nf_events.13.desc:0 "Миллс был в основном тихим с тех пор, как бои утихли. Некоторые рабочие сидят, перевязывая раны, а другие бездельничают, говоря, что оборудование слишком повреждено для использования. Чтобы вернуть всё в рабочее состояние, потребуется много труда."
    PIT_nf_events.13.a:0 "Принудительные тройные смены, пока все не заработает"
    PIT_nf_events.13.b:0 "Заставьте рабочих ремонтировать вещи в нормальном темпе"
    PIT_nf_events.13.c:0 "Пусть армия примет участие в исправлении ситуации"
    PIT_nf_events.14.title:0 "Ямы по периметру"
    PIT_nf_events.14.desc:0 "Троги, которые захватили большую часть города, удерживаются за пределами Питта с помощью серии прожекторов, забора из хлама и металлической сетки. Как и остальная часть города, эти оборонительные сооружения были повреждены в боях, и троги быстро прорвались в район. Пока эти троги не будут изгнаны, мы не сможем заделать эти проломы и вернуть под контроль эти районы нашего города."
    PIT_nf_events.14.a:0 "Это работа для нашей армии"
    PIT_nf_events.14.b:0 "Отправьте рабочих с запасным оружием"
    PIT_nf_events.14.c:0 "Отправьте рабочих с металлическими трубами"
    PIT_nf_events.15.title:0 "Разрушенный фундамент"
    PIT_nf_events.15.desc:0 "В центре города рабочие Питта живут в зданиях, сильно повреждённых в боях за свержение Ашура. Ещё до боёв условия проживания в этих зданиях были далеки от нормальных, но тогда у рабочих не было смелости жаловаться. Теперь, когда Ашур свергнут, они считают, что имеют право на лучшие условия жизни или что-то в этом роде."
    PIT_nf_events.15.a:0 "Это не наша проблема"
    PIT_nf_events.15.b:0 "Сократить количество смен, чтобы обеспечить возможность восстановления"
    PIT_nf_events.15.c:0 "Дайте рабочим ресурсы для исправления ситуации"
    PIT_nf_events.16.title:0 "Наше Будущее"
    PIT_nf_events.16.desc:0 "Ашур держал свою армию и рабочих в ежовых рукавицах не только благодаря своей безжалостной власти, но и потому, что у него было видение будущего. Какими бы скучными ни были их обязанности солдат или нищенские условия их жизни рабочих, люди Питта знали, что их труд служит долгосрочной цели, которую он поставил для города. Солдаты армии Ашура понимали, что они — часть самой мощной силы в Пустоши, а рабочие знали, что их тяжёлый труд способствует созданию города, которым они однажды смогут наслаждаться как свободные люди. Конечно, не все верили в эти обещания, но достаточно многие, чтобы не дать другим заскучать и задуматься о восстании более 20 лет! Если Вернер хочет наслаждаться столь долгим правлением, ему тоже придётся дать своему народу обещание, в которое они смогут поверить."
    PIT_nf_events.16.a:0 "§OПитт объединит Пустоши!"
    PIT_nf_events.16.b:0 "§GПитт будет наслаждаться процветанием и богатством!"
    PIT_nf_events.16.c:0 "§CПитт будет безопасен для всех!"
    PIT_nf_events.16.d:0 "§RТы ни на что не имеешь права, следуй за мной или умри!"
    PIT_nf_events.17.title:0 "Потери на Стальном Дворе"
    PIT_nf_events.17.desc:0 "Приказ солдатам сопровождать рабов, отправляемых на Стальной Двор за слитками, привёл к увеличению успешных сборов. Однако это не обошлось без последствий. Даже наши солдаты сталкиваются с тяжёлыми боями в районе, кишащем трогами, и многие из них не возвращаются. Потери усилили враждебность между рабочими и охраной. Было несколько случаев ответных мер, когда рабочие возвращались без сопровождения. Один из таких случаев привёл к остановке операций на Стальном Дворе. Несколько рабочих вернулись без охраны, но с оружием. Они настаивают, что взяли оружие, когда их сопровождающих атаковали троги, и пытались спасти солдат, но просто опоздали. Зная, что происходит с рабами, возвращающимися одних, они захватили офис Эверетта и отказываются выходить оттуда, пока Вернер не гарантирует их безопасность."
    PIT_nf_events.17.a:0 "Сделай, как они просят"
    PIT_nf_events.17.b:0 "Штурмуйте офис"
    PIT_nf_events.17.c:0 "Сделай, как они просят, §Rзатем убей их"
    PIT_nf_events.18.title:0 "Опасения по поводу компетентности"
    PIT_nf_events.18.desc:0 "Политика отправки членов Рабочего Ополчения вместе со сборщиками слитков на Стальной Двор принесла значительный рост успешных сборов. Однако у этого есть и обратная сторона. Ополченцы не только возвращаются живыми чаще, чем ожидалось, но и зачастую в лучшем состоянии, чем когда уходили. В старых зданиях полно смертоносного оружия, крепкой брони и другого снаряжения, лучше того, что мы обычно выдаём им. Если этого было недостаточно, ополченцы ещё и обучают сборщиков слитков боевым навыкам. Всё это может стать проблемой, если рабочие когда-нибудь разочаруются в своей участи."
    PIT_nf_events.18.a:0 "Конфисковать добычу у двери"
    PIT_nf_events.18.b:0 "Запретить собирателям носить оружие"
    PIT_nf_events.18.c:0 "Пусть забирают свою добычу, они делают хорошую работу"
    PIT_nf_events.19.title:0 "Спасение Стального Двора"
    PIT_nf_events.19.desc:0 "Стальной Двор это опасное место, и немногие рабочие возвращаются живыми после вылазки за слитками. Однако те, кто возвращается, часто приносят с собой новую блестящую игрушку. Не секрет, что Стальной Двор завален оружием и снаряжением, оставшимися после многих лет конфликтов, которые происходили в Питте до прихода Ашура. Также никогда не существовало запрета на то, чтобы рабочие использовали эти инструменты, чтобы дольше оставаться в живых и собрать ещё несколько слитков. Однако недавно одно из таких оружий было применено, когда рабочий вмешался, увидев, как надсмотрщик избивает ленивого рабочего, который отказался таскать сталь «потому что у него сломана нога». Возможно, нам нужно что-то с этим сделать."
    PIT_nf_events.19.a:0 "Пусть они оставят себе свое оружие"
    PIT_nf_events.19.b:0 "Эверетт будет держать оружие до тех пор, пока они не вернутся во двор"
    PIT_nf_events.19.c:0 "Изымать оружие у двери"
    PIT_nf_events.20.title:0 "Офицера поймали на воровстве"
    PIT_nf_events.20.desc:0 "Несколько офицеров были пойманы на присвоении оружия и боеприпасов с конвейера с целью личной наживы. Задержанные оправдывались тем, что поступали так, чтобы компенсировать уменьшение зарплаты с тех пор, как Вернер взял власть. Теперь именно Вернеру предстоит решить, как будет наказываться подобная кража в его Питте."
    PIT_nf_events.20.a:0 "Переназначьте воров на охрану стен"
    PIT_nf_events.20.b:0 "Заставить их вернуть незаконные доходы"
    PIT_nf_events.20.c:0 "Казнить любого, пойманного на воровстве"
    PIT_nf_events.21.title:0 "Мы должны были этого ожидать"
    PIT_nf_events.21.desc:0 "Несмотря на то, что рабочим выделяется очень небольшая часть прибыли от продажи нашего оружия, это не помешало им стать объектами преследований. Их представитель обратился к Вернеру с десятками жалоб на то, что рабочих избивают или убивают надсмотрщики из-за сумм всего в 3 крышки."
    PIT_nf_events.21.a:0 "Наказать виновных солдат"
    PIT_nf_events.21.b:0 "Предупредите солдат, чтобы они не продолжали"
    PIT_nf_events.21.c:0 "Если они не хотели умирать, им следовало бы заплатить"
    PIT_nf_events.22.title:0 "Маленький укол"
    PIT_nf_events.22.desc:0 "С большим трудом нам наконец удалось частично воспроизвести устойчивость Мари к КТД. Инъекция помогает предотвратить умственное разрушение, а также минимизировать поражения, которые получают те, кто остаётся в Питте. Производство вакцины идёт медленно, но со временем мы сможем сделать укол каждому в Питте."
    PIT_nf_events.22.a:0 "Мы знаем, кто заслуживает первых уколов"
    PIT_nf_events.23.title:0 "Борьба за лекарство"
    PIT_nf_events.23.desc:0 "Как и следовало ожидать, дефицит вакцины от КТД вызвал немало конфликтов. Солдаты, отвечающие за её распределение, начали её припрятывать и требовать плату у рабочих за укол. Были даже случаи, когда рабочие умирали после того, как им вместо вакцины вводили шприцы с радиоактивной водой. Вот почему Мидея снова направляется в Хэйвен, чтобы пожаловаться за рабочих."
    PIT_nf_events.23.a:0 "Наказать виновных солдат"
    PIT_nf_events.23.b:0 "Заменить ответственных солдат"
    PIT_nf_events.23.c:0 "У армии есть приоритет в плане прививок!"
    PIT_nf_events.24.title:0 "В глубины"
    PIT_nf_events.24.desc:0 "Очистка зданий Питта от трогов — это самая простая часть борьбы с ними. Подавляющее большинство скрывается под землёй, в тёмных канализациях. Если мы хотим хоть немного обезопасить себя в этих руинах, нам нужно провести несколько зачисток и хотя бы немного сократить их численность. Единственный вопрос — как именно это сделать?"
    PIT_nf_events.24.a:0 "Отправьте армию"
    PIT_nf_events.24.b:0 "Отправьте армию, с надбавкой к зарплате."
    PIT_nf_events.24.c:0 "Отправьте армию, §Oс огнемётами"
    PIT_nf_events.24.d:0 "Отправьте рабочих"
    PIT_nf_events.24.e:0 "Отправьте рабочих, §Oс огнемётами"
    PIT_nf_events.24.f:0 "Отправьте рабочее ополчение"
    PIT_nf_events.24.g:0 "Отправьте рабочее ополчение, §Oс огнемётами"
    PIT_nf_events.25.title:0 "Побег в Городок Независимости"
    PIT_nf_events.25.desc:0 "Расположенный на окраине и слабо охраняемый, Городок Независимости — логичное место, куда многие рабочие пытаются сбежать. Солдаты, поставленные следить за рабочими там, сообщили о десятках исчезновений, а также о нескольких пленниках, пойманных при попытке бегства. Очевидно, что нужно что-то предпринять, если мы хотим продолжать работу в Городке Независимости."
    PIT_nf_events.25.a:0 "Удвойте охрану"
    PIT_nf_events.25.b:0 "Установите больше заборов"
    PIT_nf_events.25.c:0 "Пусть попытают там счастья"
    PIT_nf_events.25.d:0 "Может быть, проблема в названии?"
    PIT_nf_events.26.title:0 "Более легкие грузы"
    PIT_nf_events.26.desc:0 "После недель избиений рабочих за невыполнение норм выяснилось, что меньшие, чем ожидалось, поставки из Городка Независимости — вовсе не результат лени рабочих. На самом деле мы обнаружили, что несколько начальников в поселении присваивали часть ресурсов, чтобы продать их торговцам металлоломом за пределами наших границ. Виновные были отстранены от должностей, но теперь нам предстоит решить, что с ними делать дальше."
    PIT_nf_events.26.a:0 "Казнить их за кражу"
    PIT_nf_events.26.b:0 "Пусть отрабатывают долг как рабочие"
    PIT_nf_events.26.c:0 "Конфисковать их незаконные доходы"
    PIT_nf_events.26.d:0 "Просто следите за ними внимательнее"
    PIT_nf_events.27.title:0 "Работорговцы мертвы"
    PIT_nf_events.27.desc:0 "Выстрелы, взрывы и крики, которые звучали по всему Питту последние несколько недель, наконец стихли. Их сменили более редкие выстрелы — казни пойманных рейдеров за их преступления. Впервые за более чем 20 лет народ Питта по-настоящему свободен. Теперь нашу судьбу решаем мы, а не какой-то военачальник. Те, кто хотел уйти, уже ушли с окончанием боёв. Те же, кто остался, посвящают себя строительству Питта на своих условиях — места, которым мы сможем гордиться и называть домом. Места, где люди свободны и никто не властвует над другими."
    PIT_nf_events.27.a:0 "Дом, который мы будем защищать до последнего вздоха"
    PIT_nf_events.28.title:0 "Фатальная Ошибка"
    PIT_nf_events.28.desc:0 "Креншоу, Мидея и Дюк — лишь некоторые из тех, кто взял в руки оружие против Вернера и был в итоге захвачен. После подавления их восстания остаётся открытым вопрос: что делать с теми, кто считал, что сможет отнять власть из рук Вернера?"
    PIT_nf_events.28.a:0 "Казнить только лидеров"
    PIT_nf_events.28.b:0 "Казнить всех причастных"
    PIT_nf_events.28.c:0 "Откройте Яму для конспираторов"
    PIT_nf_events.28.d:0 "Заставьте их всех работать"
    PIT_nf_events.29.title:0 "В третий раз очарование"
    PIT_nf_events.29.desc:0 "Ашур имел много преимуществ: он был умён, силён и у него был хороший план. Единственное — он не видел Вернера таким, каким тот был на самом деле — змеёй. Вернер тоже был достаточно умён и силён, но он не был Ашуром. Он был просто хитрым ублюдком, которому повезло убедить людей, что он лучше. Больше никто не позволит себе такую подлость. Креншоу всё понимает и не даст никому сорвать свои планы. Рабы останутся рабами, как и должно быть. Рейдеры продолжат грабить, как и положено. Креншоу будет править, так как заслужил своё право. Питт станет самым грозным местом, и скоро все в Пустоши заплатят дань своему лорду."
    PIT_nf_events.29.a:0 "Возвращаемся к рейдам"
    PIT_nf_events.30.title:0 "Звонок Креншоу"
    PIT_nf_events.30.desc:0 "Из Питта дошли слухи, что Вернера отхватил по полной какой-то парень по имени Креншоу. Сейчас он там главный и прислал нам послание. \n \n §O Говорят, вы ребята серьёзные — возможно, даже настолько, чтобы объединиться с нами. У нас есть оружие, рабы и одни из самых свирепых рейдеров в Пустоши. Присоединяйтесь — и мы поможем вам захватить власть над этими слабачками вокруг. Вместе мы сделаем так, чтобы Пустоши служили сильнейшим, и чтобы то, что произошло в Вашингтоне, больше нигде не повторилось. \n \n Креншоу, Лорд «Питта». §! \n \n Как ответим?"
    PIT_nf_events.30.a:0 "Ты сукин сын, мы в деле"
    PIT_nf_events.30.b:0 "Мы пасс"
    PIT_nf_events.31.title:0 "Сюрприз"
    PIT_nf_events.31.desc:0 "Когда армия Ашура шла по Столичной Пустоши, люди бежали и прятались. Они знали истории о жестоких работорговцах и рейдерах — достаточно умных, чтобы быть опасными. Но, укрывшись, они постепенно начали понимать кое-что: армия Ашура не грабила поселения на своём пути. Людей не увозили в рабство, хижины не сжигали. Несколько солдат были пойманы на разбое, и, что удивительно, зачастую их убивали собственные товарищи. Даже так далеко от своего города Ашур держал свою армию в железной дисциплине. Его слово было законом, и он приказал своим людям обеспечить почти бескровную смену власти. Некоторые всё же бежали, не желая жить под тиранией снова. Но гораздо больше остались. Возвращаясь к привычной жизни, они начали задумываться..."
    PIT_nf_events.31.a:0 "Может быть, это не будет так уж плохо"
    PIT_nf_events.32.title:0 "Банча неудачников"
    PIT_nf_events.32.desc:0 "С тех пор, как поселения в Вашингтоне объединились и выгнали большую часть рейдеров из своей территории, у них появилась репутация настоящих крутых парней. Но если посмотреть на их поселения, становится ясно, насколько слабыми были эти рейдеры. Конечно, «Регуляторы» были довольно жёсткими, но среднестатистический житель Пустоши здесь боится так же сильно, как любой раб из Питта. Теперь же жители Столичной Пустоши платят дань Питту, а мы цепляем кандалы всем, кто кажется нам годным рабочим."
    PIT_nf_events.32.a:0 "Как будто отобрал конфету у ребёнка"
    PIT_nf_events.33.title:0 "Кормление Питта"
    PIT_nf_events.33.desc:0 "Столичная Пустошь — настоящая помойка. Земля почти непригодна для сельского хозяйства, вокруг полно мутантов, и нельзя шагу ступить, чтобы не наткнуться на старую турель или военного робота, который каким-то чудом ещё не исчерпал боезапас. Но несмотря на всё это, есть веская причина, почему люди здесь живут. Руины Вашингтона полны ценных трофеев — от старых винтовок до костюмов силовой брони, спрятанных среди обломков этой Пустоши. Есть вещи, которые даже Питт пока не научился производить, поэтому мы позволим этим людям продолжать их жалкое существование — лишь бы они отдавали нам свою долю."
    PIT_nf_events.33.a:0 "Все течет в Питт"
    PIT_nf_events.34.title:0 "Вместе лучше"
    PIT_nf_events.34.desc:0 "Люди в Столичной Пустоши во многом похожи на нас. Они страдали под гнётом угнетателей и не раз вставали против них. Будь то рейдеры, супермутанты или тираны в силовой броне — они сражались. Теперь, когда мы познакомились поближе, они понимают, что мы скорее освободители, чем очередные угнетатели."
    PIT_nf_events.34.a:0 "Здесь нет тиранов"
    PIT_nf_events.35.title:0 "За нашими стенами"
    PIT_nf_events.35.desc:0 "Народ [PIT.GetName], я знаю, что мы только что пережили тяжёлую войну. Те, кто за пределами нашего великого города, завидуют нашему успеху — они хотят захватить то, что мы построили. Нашу силу, нашу безопасность, нашу индустрию. Всё это — то, чего никто в Пустоши пока не смог повторить. Мы отбили атаки со стороны Столичной Пустоши, но это не будет последним их натиском. Всем им и тем, кто желает украсть плоды нашего труда, я говорю одно... \n\n Не ведите войну, которую не сможете выиграть. Вместо этого — присоединяйтесь к нам. \n\n Так же, как мы превратили Питт в великий город, мы перестроим Пустошь во что-то большее. К сожалению, я знаю, что эти слова останутся глухи для многих из вас. Жестокость жизни в Пустоши ослепила многих, и они видят лишь то, что можно украсть. \n\n Знайте — мы готовы, и когда мы уничтожим ваши армии, мы воздвигнем нечто прекрасное над вашими могилами."
    PIT_nf_events.35.a:0 "Стальная Империя не падёт"
    PIT_nf_events.36.title:0 "Осторожно"
    PIT_nf_events.36.desc:0 "Рабов из всех уголков Столичной Пустоши отправляют в Питт в количестве, превышающем даже славные дни Парадайз-Фоллс. Горы смертоносного оружия, собранного Братством Стали и Анклавом за многие годы, теперь находятся в руках рейдеров Питта. С каждым днём всё больше банд присоединяется к нам, чтобы работать вместе. Это только начало. Скоро вся Пустошь будет такой — либо присоединяясь к нам, либо служа нам."
    PIT_nf_events.36.a:0 "Мы идём"
    PIT_nf_events.37.title:0 "Довольно милая установка"
    PIT_nf_events.37.desc:0 "В бастионе Вернер сидит в окружении как минимум двадцати преданных охранников в силовой броне, захваченной из Цитадели. Его круглосуточно обслуживает штат работников, благодарных за спасение от работы на Миллс. Солдаты армии Вернера поддерживают порядок среди рабочих и обеспечивают непрерывный поток товаров в Питт. Жизнь военачальника складывается хорошо. После многих лет интриг и приказов, его империя почти самостоятельно функционирует, пока он отдыхает и наслаждается плодами чужого труда. Кажется, что он уже почти не нужен."
    PIT_nf_events.37.a:0 "Надеюсь, они этого никогда не поймут."
    PIT_nf_events.38.title:0 "Навсегда свободны"
    PIT_nf_events.38.desc:0 "Столичная Пустошь, как и Питт, наслаждается миром и свободой, которых не видела веками. Бродячие банды работорговцев остались в прошлом, а те, кто не отказался от этого промысла, всё равно будут найдены. Им не будет покоя — их будут преследовать и заставлять платить за свои преступления. Мидея, мать свободы, позаботится об этом. Как солдаты её народа, мы следуем её приказам, чтобы обеспечить свободу для всех."
    PIT_nf_events.38.a:0 "Мы должны всегда оставаться бдительными"
    PIT_nf_events.39.title:0 "Почти идеально"
    PIT_nf_events.39.desc:0 "Пламя после свержения Ашура уже почти угасло. КТД в основном излечена. Солдаты Питта знают, кто здесь главный, как и рабочие. В Питте дела идут как нельзя лучше. Осталось сделать всего несколько шагов, и Питт станет серьёзной силой, с которой никто в Пустоши не сможет тягаться. \n \n Погоди... что значит, рабы-работники восстают? \n \n Пусть Креншоу заставит рейдеров прижать их к стенке и подавить восстание!"
    PIT_nf_events.39.a:0 "§RЧТО ДЕЛАЕТ КРЕНШОУ?!"
    PIT_nf_events.39.b:0 "§CНАМ, РАБОТНИКАМ, ДОСТАТОЧНО!"
    PIT_nf_events.39.c:0 "§OКРЕНШОУ — НАШ НОВЫЙ БОСС!"
    PIT_nf_events.40.title:0 "Достаточно, значит достаточно"
    PIT_nf_events.40.desc.1:0 "Годами мы страдали, кровоточили и умирали ради прихотей рейдерских военачальников. Вернер обещал быть другим, но он показал, что это не так. Свобода, которую нам обещали, была отвергнута, а жестокость рейдеров, которыми он правит, не уменьшилась. Какие бы крохи он ни бросал нам, они никогда не утолят наш голод по свободе. После месяцев подготовки мы наконец готовы. На этот раз мы сражаемся не за какого-то лживого самозванца Ашура, мы сражаемся за себя!"
    PIT_nf_events.40.desc.2:0 "Годами мы страдали, кровоточили и умирали ради прихотей рейдерских военачальников. Вернер обещал быть другим, но он показал, что это не так. Даже та свобода, которую он нам дал, оказалась ловушкой. Рейдеры по-прежнему топчут нас ногами, а тех, кто хочет уйти, выбрасывают на руины, где им приходится бороться за выживание с дикарями и трогами. После месяцев подготовки мы наконец готовы. На этот раз мы сражаемся не за какого-то лживого самозванца Ашура — мы сражаемся за себя!"
    PIT_nf_events.40.a:0 "Мы боремся за нашу свободу!"
    PIT_nf_events.41.title:0 "Вернер - Слабак"
    PIT_nf_events.41.desc:0 "Вернер убедил нас, что сможет сделать лучше Ашура, но он не справился. Рабочим дают слишком много свободы, и он едва ли может держать кого-либо в узде. Нам нужен сильный лидер, чтобы управлять Питтом. Нам нужен кто-то, кто сможет держать рабов в подчинении и не даст бандитам разорвать друг друга на части. Вот почему нам нужен кто-то вроде Креншоу."
    PIT_nf_events.41.a:0 "Время вынести мусор"
    PIT_nf_events.42.title:0 "Объяснение правил Вернера"
    PIT_nf_events.42.desc:0 "Когда Вернер наводит порядок после переворота и укрепляет власть в Питте, ему нужно следить за тремя вещами. \n \n §CОдобрение рабочих§! показывает, насколько работники Питта поддерживают правление Вернера. Это зависит от ваших решений в фокусах и событиях. Рабочие не любят жестокого обращения, но ценят справедливого лидера. Они никогда не простят Вернеру, если он откажется от обещанной свободы, ради которой они поддержали его захват власти. Если слишком игнорировать рабочих, всё больше из них встанут на борьбу за свои права! \n \n §OОдобрение солдат§! показывает, насколько рейдеры Питта довольны руководством Вернера. Им нравится увеличивать свою долю добычи и продолжать угнетать рабочих. Они точно не захотят, чтобы рабочим дали свободу. Если их слишком разозлить, при сомнениях в власти Вернера они получат больше поддержки! \n \n §RХватка Вернера§! — показывает, насколько крепка власть Вернера в Питте. Хватка усиливается решительными решениями, наказанием нарушителей и поддержанием иерархии. Она ослабевает из-за уступок и игнорирования нарушений. Если хватка будет слишком слабой, при сомнениях в вашей власти вы можете остаться без союзников."
    PIT_nf_events.42.a:0 "Кто знал, что управление этим местом потребует столько усилий?"
    PIT_nf_events.43.title:0 "Питт отправляет нам помощь"
    PIT_nf_events.43.desc:0 "Учитывая недавний конфликт и влияние, которое он оказывает на их поставки рабов, лорд Ашур отправил часть своей армии, чтобы помочь нам в борьбе. Эти рейдеры — настоящие бойцы и должны помочь нам держать ситуацию под контролем."
    PIT_nf_events.43.a:0 "Мы все уладили, но мы примем помощь."
    PIT_nf_events.44.title:0 "Питт отправляет нам помощь"
    PIT_nf_events.44.desc:0 "Учитывая недавний конфликт и влияние, которое он оказывает на их поставки рабов, лорд Ашур отправил часть своей армии, чтобы помочь нам в борьбе. Эти рейдеры — настоящие бойцы и должны помочь нам держать ситуацию под контролем."
    PIT_nf_events.44.a:0 "Мы все уладили, но мы примем помощь."
    PIT_nf_events.45.title:0 "Питт отправляет нам помощь"
    PIT_nf_events.45.desc:0 "Учитывая недавний конфликт и влияние, которое он оказывает на их поставки рабов, лорд Ашур отправил часть своей армии, чтобы помочь нам в борьбе. Эти рейдеры — настоящие бойцы и должны помочь нам держать ситуацию под контролем."
    PIT_nf_events.45.a:0 "Мы все уладили, но мы примем помощь."
    PIT_nf_events.46.title:0 "Нарушены поставки рабочей силы"
    PIT_nf_events.46.desc:0 "Поставки рабочих от Разрушителей резко прекратились. Морские рейдеры, по-видимому, были практически уничтожены одним из соседей, и нам не стоит рассчитывать на дальнейшее поступление рабочих от них."
    PIT_nf_events.46.a:0 "Жалкие неудачники"
    PIT_nf_events.47.title:0 "Нарушены поставки рабочей силы"
    PIT_nf_events.47.desc:0 "Поставки рабочих из Столичной Пустоши резко прекратились. Рейдеры из Столичной Пустоши и их союзники из Парадайз-Фоллс были уничтожены, и нам не стоит ожидать дальнейших поставок рабочих оттуда."
    PIT_nf_events.47.a:0 "Я знал, что они бесполезны"
    PIT_nf_events.48.title:0 "Нарушены поставки рабочей силы"
    PIT_nf_events.48.desc:0 "Поставки рабочих из Гаррисбурга резко прекратились. Когда-то надёжные бандиты Гаррисбурга взялись за слишком многое и были уничтожены. Нам не стоит ожидать дальнейшего импорта рабочих из их территории."
    PIT_nf_events.48.a:0 "Я знал, что они становятся мягкими"
    PIT_nf_events.49.title:0 "Свобода Когда?"
    PIT_nf_events.49.desc:0 "Уже много лет лорд Ашур обещает рабочим Питта, что однажды они обретут свободу. Но пока мы продолжаем ввозить рабов, а продолжительность жизни раба в Питте становится всё короче, многие задаются вопросом, увидят ли они когда-нибудь свободу."
    PIT_nf_events.49.a:0 "Игнорируйте их проблемы"
    PIT_nf_events.49.b:0 "Наказать любого рабочего, говорящего о свободе"
    PIT_nf_events.49.c:0 "Обещаю, что свобода рабочих уже близко"
    PIT_nf_events.49.d:0 "Пусть Вернер поговорит со ними"
    PIT_nf_events.50.title:0 "Стал мягче?"
    PIT_nf_events.50.desc:0 "Хотя никто не осмелится прямо в лицо пожаловаться Ашуру, многие рейдеры злятся из-за сокращения «Ямы». Некоторые даже намекают, что это потому, что босс стал мягче после рождения ребёнка."
    PIT_nf_events.50.a:0 "Игнорируйте ворчание"
    PIT_nf_events.50.b:0 "Убей того, кто ворчит громче всех"
    PIT_nf_events.50.c:0 "Убеди их, что бои в любом случае не были такими уж захватывающими"
    PIT_nf_events.50.d:0 "Пусть Вернер поговорит с Креншоу"
    PIT_nf_events.51.title:0 "Ебучие приоритеты"
    PIT_nf_events.51.desc:0 "Как бы Ашур ни называл рабов Питта, в сознании всех, кроме него самого, они остаются рабами. Поэтому солдаты армии Ашура, конечно, будут очень злиться, когда Ашур решит улучшить условия жизни некоторых рабов вместо них."
    PIT_nf_events.51.a:0 "Пусть они жалуются и стонут"
    PIT_nf_events.51.b:0 "Выбросьте всех жалующихся с крыш зданий"
    PIT_nf_events.51.c:0 "Убедите их, что это нужно для того, чтобы заставить рабов усердно работать"
    PIT_nf_events.51.d:0 "Пусть Вернер поговорит об этом с Креншоу"
    PIT_nf_events.52.title:0 "Имущие и неимущие"
    PIT_nf_events.52.desc:0 "Рабочие уже должны понимать, что солдаты армии Ашура стоят на втором месте после самого босса и его семьи. Только догадываться можно, почему они считают, что имеют право жаловаться на свои условия жизни."
    PIT_nf_events.52.a:0 "Игнорируйте их жалобы"
    PIT_nf_events.52.b:0 "Тех, кто жалуется, можно отправить в кандалы"
    PIT_nf_events.52.c:0 "Обещаю, что скоро всё улучшится"
    PIT_nf_events.52.d:0 "Пусть Вернер поговорит об этом с ними"
    PIT_nf_events.53.title:0 "Бесполезный хлам"
    PIT_nf_events.53.desc:0 "С нашими дополнительными кузнями, выпускающими качественные инструменты, трубочные пистолеты в руках нашей армии выглядят ещё более убого, чем обычно."
    PIT_nf_events.53.a:0 "Сказать им смириться"
    PIT_nf_events.53.b:0 "Покажите им, что оружие всё ещё убивает"
    PIT_nf_events.53.c:0 "Купите новое оружие на днях"
    PIT_nf_events.53.d:0 "Вернер предложит купить им лучшее оружие"
    PIT_nf_events.54.title:0 "Производственные проблемы"
    PIT_nf_events.54.desc:0 "Рабочие регулярно не выполняют нормы, а усиление побоев, похоже, не помогает ускорить работу. Представитель рабочих утверждает, что проблема в инструментах. По его словам, из-за нашего акцента на производстве оружия им приходится работать со старыми, ржавыми инструментами возрастом в 200 лет, которые едва ли что-то режут."
    PIT_nf_events.54.a:0 "Бейте их до тех пор, пока производительность не улучшится!"
    PIT_nf_events.54.b:0 "Пообещать им достать лучшие инстументы вскоре"
    PIT_nf_events.54.c:0 "Пусть Вернер с ними поговорит"
    PIT_nf_events.55.title:0 "Перемещение"
    PIT_nf_events.55.desc:0 "Хэйвен — лучшее место для жизни в Питте. Практически каждый рейдер, попавший в башню, чувствует, что он достиг успеха: проточная вода, работающие светильники и стены без огромных дыр на 10-м этаже. Что тут не понравится? Поэтому, когда Ашур сказал некоторым солдатам, что им придётся переехать в разваливающуюся рухлядь в Верхнем Городе, чтобы Сандра могла расширить свою лабораторию, они были недовольны."
    PIT_nf_events.55.a:0 "Тогда они могут жить в канализации!"
    PIT_nf_events.55.b:0 "Починить их новый дом"
    PIT_nf_events.55.c:0 "Обещаю, это временно"
    PIT_nf_events.55.d:0 "Вернер будет работать с Креншоу над решением"
    #Ashur's Events
    PIT_nf_events.61.title:0 "Триумф Ашура"
    PIT_nf_events.61.desc:0 "Огни восстания были потушены. Последние из Дикарей и Трогов разбежались или были перебиты, рейдеры Вернера разгромлены, а потенциальные революционеры-рабы приведены к покорности. Лорд Ашур стоял на разрушенной балюстраде Хэйвена, взирая на израненное, но живое сердце Питта.\n\nБыл момент, когда Ашур боялся потерять всё — не только город, но и мечту, которую он так долго защищал. Его рука не дрогнула перед подавлением восстания не из-за жалости, а из-за цели. Тем, кто сдался, было предложено вернуться к труду, а самых упрямых без колебаний уничтожили.\n\nПитт выживет — не просто как царство пепла и железа, но как колыбель чего-то большего. Избитый, но не сломленный, Ашур провозгласил свою решимость через систему оповещения Питта с полуразрушенного балкона Хэйвена:\n\n«Вы думали, что сможете разрушить то, что мы построили? Вы думали, что сможете сжечь волю самого Питта? Нет. Я взял эти разбитые камни, эти согнутые спины, эти израненные души... и из них я выковал город, величайший из всех, что когда-либо знала Старая Эпоха!»\n\nСначала робкие, затем громогласные аплодисменты ответили ему. Надежда, избитая и израненная, но упрямая, как сталь, жила дальше."
    PIT_nf_events.61.a:0 "Город Стали выстоял."

    PIT_nf_events.56.title:0 "Ребенок, на котором будет построен город"
    PIT_nf_events.56.desc:0 "Время в Питте текло странно. Дни сливались друг с другом в бесконечном шуме печей и кузниц. Ашур, и как Лорд, и как Ишмаэль, ощущал каждый проходящий момент в боли своих костей и тяжести мыслей. Мари, когда-то ребёнок, бережно носимый им на руках и хранившийся в колыбели, теперь ползала по залам Хэйвена с детским любопытством и с чертами родителей, начинающими проявляться на её лице.\n\nСтоя на своём обычном месте высоко над собравшимися рабочими и солдатами Питта, Ашур поднял дочь высоко и его голос прорезал тяжёлый, пропитанный сажей воздух:\n\n«Вы страдали. Вы проливали кровь. Вы трудились и сражались не только за себя, но и за будущее! Сегодня это будущее обретает форму. Моя дочь, Мари, несёт в себе лекарство. Кровь, что положит конец чуме, проклявшей этот город!»\n\nОтветила лишь ошеломлённая тишина.\n\nАшур, мрачно улыбаясь, повернулся к Сандре, которая провела бессонные месяцы, совершенствуя лекарство. Это сказалось на них обоих — его и без того неопрятный вид ещё больше измучен возрастом и стрессом, то же касалось и его дорогой жены. Но всё это стоило того. В течение месяца первые флаконы будут распределены среди рабочих и солдат.\n\nВпервые на памяти живущих, Питт не просто выстоит."
    PIT_nf_events.56.a:0 "Это заживет."

    PIT_nf_events.57.title:0 "Конец Ямы"
    PIT_nf_events.57.desc:0 "Яма когда-то служила своей мрачной цели, безжалостной ареной, где отчаявшиеся рабочие сражались за шанс выжить, где рейдеры, подобные Файдре, ревели одобрение с построенных помостов, а смерть была единственными аплодисментами. Подняться от рабочего до солдата — единственная награда для выживших, если их не сделали чемпионами.\n\nТеперь Ашур стоял на треснувшем краю ямы, скрестив руки, сужая глаза на залитый кровью металл и землю. Раньше он терпел это зрелище — оно было необходимо, чтобы закалить будущих солдат, поднять беспокойных рабочих. Но теперь в этом нужды нет.\n\n«Мы не звери,» — проревел он собравшимся солдатам.\n\n«Питт больше не кузница жестокости. Это кузница будущего. Яме не место в том, что мы строим.»\n\nСандра осторожно предложила превратить яму в ясли, место жизни вместо смерти, ведь Мари всё ещё была мала, и дети, рождающиеся теперь в Питте, не смогут вечно жить в рабочих лачугах. Креншоу, всегда прагматичный, настаивал на тренировочной площадке для закалки рекрутов. Другие же предлагали просто разобрать яму, спасая каждый кирпич и болт."
    PIT_nf_events.57.a:0 "Сандра права, превратим это в детскую."
    PIT_nf_events.57.b:0 "Военная академия может быть полезна для Питта."

    PIT_nf_events.58.title:0 "Обычные люди"
    PIT_nf_events.58.desc:0 "Ситуация в Питте улучшилась, теперь нам не нужно везти рабочих из других мест. Рабочие сами приходят, ищут стабильную работу и честную плату. Но это не только обычные люди — появились гули и даже пара разумных супермутантов, которые тоже хотят работать. Их в основном отправляют на поиски в сильно заражённые радиацией зоны, куда нашим людям нельзя заходить, но им этого мало. Один из гулей пришёл в Хэйвен с просьбами от этих рабочих, главная из которых — разрешить им стать солдатами, если они захотят."
    PIT_nf_events.58.a:0 "Позволить им."
    PIT_nf_events.58.b:0 "Мы здесь только для того, чтобы заниматься бизнесом."

    PIT_nf_events.59.title:0 "Альянс защиты Питтсбурга"
    PIT_nf_events.59.desc:0 "К нам прибыл гонец из Питта. Лорд Ашур предлагает свою защиту нашему народу, если мы последуем за ним. Было бы неплохо иметь его растущую армию в друзьях, а не в врагах. Но стоит ли связывать судьбу с этим человеком?"
    PIT_nf_events.59.a:0 "Мы присоединимся."
    PIT_nf_events.59.b:0 "Мы откажемся."

    PIT_nf_events.60.title:0 "Необычный восход солнца"
    PIT_nf_events.60.desc:0 "Как и почти каждое утро с тех пор, как взял под контроль Питт, лорд Ашур стоял у окна на вершине Хэйвена и наблюдал, как солнце поднимается над его городом. Но сегодня было иначе. Солнце взошло так, что его лучи, пробиваясь сквозь клубы дыма, поднимающиеся от кузниц, заставляли город почти блестеть. С высоты Хэйвена Ашур видел отремонтированные здания, крыши с перилами безопасности и тысячи людей, которые вносили свой вклад в возрождение мёртвого города. Углубившись в мысли о будущем, он вдруг заметил, как смог затмил солнце, и город снова погрузился в привычную мрачность. Момент был мимолётен, но он заставил Ашура понять одно: называть этот город просто Питтом больше не годится."
    PIT_nf_events.60.a:0 "Время перемен"    

