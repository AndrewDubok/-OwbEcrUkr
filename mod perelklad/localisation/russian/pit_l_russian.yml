### Ideas ###
    PIT_capital_wasteland_slave_imports_idea:0 "Импорт рабов Столичной Пустоши"
    PIT_capital_wasteland_slave_imports_idea_desc:0 "Работорговцы из Парадайз-Фоллс завозят рабов из Столичного Пустоши целыми повозками."
    PIT_capital_wasteland_slave_imports_2_idea:0 "Импорт рабов Столичной Пустоши"
    PIT_capital_wasteland_slave_imports_2_idea_desc:0 "Работорговцы из Парадайз-Фоллс завозят рабов из Столичного Пустоши почти быстрее, чем мы успеваем их разгружать."
    PIT_breakers_imports_idea:0 "Импорт Разрушителей"
    PIT_breakers_imports_idea_desc:0 "Работорговцы из Разрушителей завозят рабов и лом со всех окрестностей Великих озёр."
    PIT_harrisburg_imports_idea:0 "Импорт Гаррисбурга"
    PIT_harrisburg_imports_idea_desc:0 "Бандиты из Гаррисбурга продают нам и еду, и рабов, привозимых со всего востока Пенсильвании."
    PIT_arms_exports_idea:0 "Экспорт Оружия"
    PIT_arms_exports_idea_desc:0 "Наши кузницы производят боеприпасы, которые мы экспортируем по всей Пустоши."
    PIT_tdc_idea:0 "Контаминация Троглодитной Дегенерации"
    PIT_tdc_idea_desc:0 "Заболевание, известное как КТД — Контаминация Троглодитной Дегенерации, приносит страдания людям в районе Питта. Сочетание загрязнений и радиации в воздухе и воде вокруг города в конце концов заражает всех. Через несколько недель у заболевших появляются глубокие кожные язвы. Около 20% тех, кто подхватывает болезнь, ждёт ещё худшая участь: их разум и тело постепенно разрушаются, превращая их в ужасных мутантов — трогов. Хуже всего то, что каждый ребёнок, рожденный в Питте, сталкивается с этой участью уже через несколько недель после рождения."
    PIT_industrial_support_idea:0 "Промышленная поддержка"
    PIT_industrial_support_idea_desc:0 "Мы вложили часть нашей промышленности в производство качественных инструментов для наших рабочих."
    PIT_overextended_industry_idea:0 "Перегруженная промышленность"
    PIT_overextended_industry_idea_desc:0 "Производство как качественных инструментов, так и качественного оружия сильно нагружает наших рабочих."
    PIT_internal_supplied_arms_idea:0 "Поддержка Оружейной Мануфактуры"
    PIT_internal_supplied_arms_idea_desc:0 "Многие из оружия в Питте производятся собственными силами с помощью наших продвинутых довоенных машин. Высокое качество оружия и доступность запасных частей делают его более надёжным, чем большинство оружия в Пустошах."
    PIT_enhanced_melee_idea:0 "Улучшенные Режущие Инструменты"
    PIT_enhanced_melee_idea_desc:0 "Наши режущие инструменты хороши не только для промышленных нужд, но и отлично подходят в качестве оружия в экстренных случаях. Мы доработали их конструкции, учитывая эту дополнительную функцию."
    PIT_enhanced_ballistic_idea:0 "Улучшенный Оружейный Дизайн"
    PIT_enhanced_ballistic_idea_desc:0 "Мы извлекли уроки из каждой заклинившей затворной задержки, из каждого осечка и даже из каждого рабочего, ставшего мишенью для тренировок. Благодаря этому наши пушки стали чуть надёжнее и чуть смертоноснее."
    PIT_enhanced_both_idea:0 "Разработка инструментов и оружия"
    PIT_enhanced_both_idea_desc:0 "Совершенствование конструкций наших режущих инструментов и огнестрельного оружия принесло значительные преимущества."
    PIT_streamlined_melee_idea:0 "Оптимизированное производство инструментов"
    PIT_streamlined_melee_idea_desc:0 "Наблюдая за недоработками и лишними процессами, мы сократили время производства наших инструментов."
    PIT_streamlined_ballistic_idea:0 "Оптимизированное производство оружия"
    PIT_streamlined_ballistic_idea_desc:0 "Мы выпускаем оружие с такой скоростью, будто нам предстоит вооружить целую армию. О, подождите — именно так оно и есть."
    PIT_streamlined_both_idea:0 "Оптимизированное производство инструментов и оружия"
    PIT_streamlined_both_idea_desc:0 "Мы оптимизировали производство огнестрельного оружия и режущих инструментов, чтобы быстрее доставлять их в руки солдат и рабочих."
    PIT_liberated_workers_idea:0 "Освобожденные рабочие"
    PIT_liberated_workers_idea_desc:0 "Рабочие освобождены от оков. Если захотят уйти — могут. Просто пройдите через заминированный мост и территорию трогов. Вперёд, попробуйте. §RСделайте это."
    PIT_freedom_delayed_idea:0 "Свобода задержана"
    PIT_freedom_delayed_idea_desc:0 "Я знаю, ты хочешь быть свободным сейчас. Но пока это просто невозможно. Экономика в руинах."
    PIT_freedom_refused_idea:0 "Отказано в свободе"
    PIT_freedom_refused_idea_desc:0 "Ты правда думал, что получишь свободу только потому, что несколько сотен из вас были живым щитом во время переворота?"
    PIT_wernher_cure_research_idea:0 "Исследования лечения Вернера"
    PIT_wernher_cure_research_idea_desc:0 "У нас может не быть передовых лабораторий и учёного с образованием во главе исследований, но мы всё равно найдём способ вылечить КТД."
    PIT_import_export_idea:0 "Экономика круговой торговли"
    PIT_import_export_idea_desc:0 "Экономика Питта зависит от экспорта стали и оружия. Эти поставки позволяют нам закупать всё необходимое у внешних поставщиков. Будем надеяться, что линии снабжения никогда не будут перерезаны."
    PIT_fueled_growth_idea:0 "Стимулируемый рост"
    PIT_fueled_growth_idea_desc:0 "Экономика Питта держится на экспорте стали и оружия. Часть прибыли от этих продаж мы реинвестируем в развитие других отраслей промышленности. Ведь больше продукции — значит больше крышек."
    PIT_self_sufficiency_idea:0 "Самодостаточная экономика"
    PIT_self_sufficiency_idea_desc:0 "Экономика Питта пока зависит от экспорта стали и оружия. Однако мы будем вкладывать плоды нашего труда в развитие других отраслей экономики. В конечном итоге нам не понадобится ничего от тех, кто за пределами наших стен — и тогда мы не будем никому поклоняться."
    PIT_wernher_cure_research_harsh_idea:0 "Суровое исследование лечения"
    PIT_wernher_cure_research_harsh_idea_desc:0 "Хватит ходить вокруг да около. Нам нужна эта сыворотка, и лучше раньше, чем позже. Если за неё придётся платить тем, что отпрыск Ашура будет плакать больше — так тому и быть."
    PIT_wernher_cure_research_soft_idea:0 "Мягкое исследование лечения"
    PIT_wernher_cure_research_soft_idea_desc:0 "Ладно, хорошо, мы возьмём время и постараемся не причинять отпрыску Ашура слишком много боли."
    PIT_hiring_workers_idea:0 "Наем работников"
    PIT_hiring_workers_idea_desc:0 "Впервые за долгое время люди приходят в Питт работать по своей собственной воле. И даже получают за это плату!"
    PIT_wernhers_slave_imports_idea:0 "Импорт рабов Вернера"
    PIT_wernhers_slave_imports_idea_desc:0 "Вернер гарантирует, что у Питта всегда будет достаточно рабочих для процветания."
    PIT_automated_industry_idea:0 "Автоматизированная Промышленность"
    PIT_automated_industry_idea_desc:0 "Пока мы не можем заменить все этапы производства машинами, но хотя бы роботы могут выполнять самую тяжёлую работу."
    PIT_home_defense_idea:0 "Защитите наш дом"
    PIT_home_defense_idea_desc:0 "Каждый свободный мужчина и женщина в Питте знают, что нас ждёт, если мы снова позволим какому-то рейдерскому вождю или другому мерзавцу править здесь. Поэтому они более чем готовы вступить в бой!"
    PIT_worker_rights_idea:0 "Права трудящихся"
    PIT_worker_rights_idea_desc:0 "Работать в Питте — это не прогулка в парке, но стало гораздо легче, когда нам выдали противогазы и перестали избивать."
    PIT_never_again_idea:0 "Никогда Снова!"
    PIT_never_again_idea_desc:0 "Мы будем бороться каждой частичкой своей души. Будем сражаться до последнего человека. Будем сражаться с яростью, невиданной этими отбросами Пустоши. Мы будем бороться, чтобы никогда больше не оказаться в цепях!"
    PIT_enforced_hierarchy_idea:0 "Принудительная иерархия"
    PIT_enforced_hierarchy_idea_desc:0 "Хватит этого виляния и лицемерия, которое Ашур и Вернер пытались навязать. Раб — есть раб. Рейдер — есть рейдер. Мы на вершине, они внизу, и так будет всегда."
    PIT_pitt_arms_supply_idea:0 "Оружейная поддержка от Питта"
    PIT_pitt_arms_supply_idea_desc:0 "Питт регулярно снабжает нас оружием и патронами — нам лишь нужно отдавать им часть добычи с наших рейдов."
    PIT_arsenal_of_terror_idea:0 "Арсенал Террора"
    PIT_arsenal_of_terror_idea_desc:0 "Мы снабжаем все лучшие банды рейдеров оружием, а взамен получаем хорошую долю с их рейдов."
    PIT_nonstop_party_idea:0 "Вечеринка Нон-стоп"
    PIT_nonstop_party_idea_desc:0 "Никакой вечеринки нет круче рейдерской, потому что рейдерская вечеринка не заканчивается, пока ты не §RМЁРТВ"
    PIT_the_hole_idea:0 "Яма"
    PIT_the_hole_idea_desc:0 "Время от времени рабочих бросают в «Яму» и заставляют сражаться. Те, кто побеждают, получают место в армии. Те, кто проигрывают — больше не работают. Вроде бы, все в выигрыше, да?"
    PIT_stagnating_empire_idea:0 "Стагнирующая Империя"
    PIT_stagnating_empire_idea_desc:0 "Вернер почти не обращает внимания на то, что происходит в Питте. Он сидит в своей башне, думая, что раз подавил одно восстание, больше не столкнётся с другими."
    #Ashur's National Spirits
