    PIT_tt_7:0 "§CРабочим§! это §Gочень понравится§!"
    PIT_tt_8:0 "§OСолдатам§! это §Gочень понравится§!"
    PIT_tt_9:0 "§CРабочим§! это §Rочень не понравится§!"
    PIT_tt_10:0 "§OСолдатам§! это §Rочень не понравится§!"
    PIT_tt_11:0 "У этого Чемпиона есть задатки лидера!"
    PIT_tt_12:0 "§CРабочие§! §Rникогда не забудут этого предательства!§!"
    PIT_tt_13:0 "Освобождённые рабочие вступают в армию Вернера"
