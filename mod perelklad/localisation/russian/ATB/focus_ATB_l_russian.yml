l_russian:
  ATB_revelation:0 "Откровение 16:18"
  ATB_revelation_desc:0 "Это история, рассказанная много раз: конец света и возрождение человека..."

  ATB_birth_of_a_people:0 "Рождение народа"
  ATB_birth_of_a_people_desc:0 "Свет Божий пережил ядерную катастрофу, и пастору Муру пришлось донести его до диких племен Вирджинии."

  ATB_playing_with_fire:0 "Игра с огнём"
  ATB_playing_with_fire_desc:0 "Тяжёлые времена создают ненадёжные союзы. Пожарные маршалы - опасные поджигатели, не заботящиеся о безопасности и отказывающиеся видеть свет Атомного Крещения. Однако они также ненавидят Апокриф Посейдона и болотных оракулов Эдемского сада."

  ATB_valour_of_the_righteous:0 "Доблесть праведника"
  ATB_valour_of_the_righteous_desc:0 "Никакое оружие не может причинить вред истинно праведному солдату. Самые ревностные из нашего народа посвящают себя воинскому делу, чтобы нести свет Божий язычникам и дикарям."
    ATB_valour_divisions_tt:0 "Три §7опытных§ §Yдивизии ополчения§! будут готовы исцелить врагов Мура."

  ATB_faith_and_forges:0 "Вера и кузницы"
  ATB_faith_and_forges_desc:0 "Сила страны строится на спинах её трудящихся. Нам нужно поощрять преданность делу, которое поручено человеку, будь то борьба с врагом или поиск оружия."

  ATB_fire_and_fury:0 "Огонь и Ярость"
  ATB_fire_and_fury_desc:0 "Ярость наших фанатиков заставит трепетать даже самых могущественных язычников."

  ATB_isaiah:0 "Исайя 2:4"
  ATB_isaiah_desc:0 "Он будет судить народы и разрешит споры многих племен.\n\nИ перекуют мечи свои на орала, и копья свои — ​​на серпы.\n\nНе поднимет народ на народ меча, и не будут более учиться воевать."

  ATB_joel:0 "Джоэл 3:4"
  ATB_joel_desc:0 "Перекуйте орала на мечи и серпы на копья.\n\nПусть слабый скажет, «Я силён!»"

  ATB_the_father_the_son:0 "Отец, Сын..."
  ATB_the_father_the_son_desc:0 "Мы слышали о христианском священнике в Ривет-Сити, городе на Столичной Пустоши. Хотя проповедники есть и на пустошах, лишь немногие из них основали церкви. Стоит встретиться с этим отцом Клиффордом, чтобы понять его взгляды на христианство."

  ATB_the_holy_glow:0 "...И Святое Свечение"
  ATB_the_holy_glow_desc:0 "Исповедник Кромвель принёс в Мегатонну, новую веру, Детей Атома. Дети верят в силу Атома и имеют некоторое сходство с нашей верой. Отправка делегации для более подробного изучения была бы нам очень полезна."

  ATB_learning_from_saint_monica:0 "Учиться у Святой Моники"
  ATB_learning_from_saint_monica_desc:0 "Святая Моника, которую описал отец Клиффорд, - подходящая покровительница болот. Здесь постоянно теряются дети, и мы должны заботиться о сиротах, как она того хотела."

  ATB_baptised_in_the_mud:0 "Крещенные в грязи"
  ATB_baptised_in_the_mud_desc:0 "Болото не самое подходящее место для распространения нашей религии, но стойкость местных жителей ни с чем не сравнима."

  ATB_speaking_in_tongues:0 "Говорение на языках"
  ATB_speaking_in_tongues_desc:0 "Не все религии принимают людей, говорящих на языках, но мы знаем, что они видят то, чего мы не видим."

  ATB_wastelander_converts:0 "Обращенные жители пустоши"
  ATB_wastelander_converts_desc:0 "Мы можем поучиться у Детей Атома их невероятной способности распространять веру и обращать людей в веру. Их вера растёт поистине экспоненциально, и нам следует делать то же самое."

  ATB_grand_churches:0 "Великие церкви"
  ATB_grand_churches_desc:0 "Болото - ужасное место, но мы можем сделать его лучше. Строительство церквей для объединения общин принесёт мир на болота."

  ATB_covert_missionaries:0 "Тайные миссионеры"
  ATB_covert_missionaries_desc:0 "Религия не признает границ... как и наши шпионы."

  ATB_revere_the_swamps:0 "Почитание болот"
  ATB_revere_the_swamps_desc:0 "Болота, не просто наш дом, это святая земля. Мы должны почитать их, как Дети Атома почитают радиоактивность, но не увлекаться ими так, как Эдемский сад."

  ATB_shaky_ground:0 "Зыбкая земля"
  ATB_shaky_ground_desc:0 "Этот союз не был рассчитан на вечную жизнь, и мы должны сделать все возможное, чтобы он работал в нашу пользу."
    ATB_shaky_decisions_tt:0 "Мы разблокируем §YРешения§! для §Oувеличения нашего влияния§! на Пожарных Маршалов."

  ATB_mutually_beneficial_exchange:0 "Взаимовыгодный обмен"
  ATB_mutually_beneficial_exchange_desc:0 "Этот союз может принести нечто большее, чем просто соглашение о совместной борьбе. Пожарные Маршалы обладают обширными знаниями в области оружия, которое мы не можем скопировать, особенно в области огнемётов."
    ATB_equipment_trade_decisions_tt:0 "Разблокирует §Yрешения§! для получения снаряжения от [FRM.GetNameWithFlag]"

  ATB_provide_an_alternative:0 "Предоставить альтернативу"
  ATB_provide_an_alternative_desc:0 "Народ Пожарных Маршалов должны понимать, что они могут принять решение работать с нами."

  ATB_fire_and_faith:0 "Огонь и вера"
  ATB_fire_and_faith_desc:0 "Пожарные Маршалы не имеют себе равных в умении разрушать. Нам бы пригодился их опыт."
    ATB_marshalls_division_tt:0 "Дивизия недавно обращённой §Yпехоты§! будет готовиться сжечь болота дотла, используя §7продвинутые огнеметы§!."

  ATB_matthew:0 "Матфей 24:7"
  ATB_matthew_desc:0 "Ибо восстанет народ на народ, и царство на царство; и будут глады, моры и землетрясения по местам."

  ATB_manifest_destiny:0 "Явная Судьба"
  ATB_manifest_destiny_desc:0 "Болота Вирджинии никогда не будут безопасными до тех пор, пока болотным обитателям и сумасшедшим морякам позволяют существовать."

  ATB_conversion_of_the_swamps:0 "Обращение Болот"
  ATB_conversion_of_the_swamps_desc:0 "Возможно, потребуется некоторое время, чтобы привлечь болота на свою сторону, но наша религия выйдет оттуда сильнее, чем когда-либо."

  ATB_ascendant_baptism:0 "Восходящее крещение"
  ATB_ascendant_baptism_desc:0 "Конечно, мы никогда не сомневались в себе, но теперь мы можем доказать всей пустоши, что наша вера самая истинная."

  ATB_peaceful_conversions:0 "Мирные обращения"
  ATB_peaceful_conversions_desc:0 "Мы должны протянуть руку мира дикарям болот. Они и представить себе не могли."
    ATB_upgrade_ideas_tt:0 "Это позволит §Gобъединить и улучшить§! национальные духи: §YВыращенный из грязи§! и §YГлоссолалия§!."

  ATB_grand_inquisition:0 "Великая инквизиция"
  ATB_grand_inquisition_desc:0 "Любое сопротивление АтомБаптизму должно быть искоренено на корню. Наша религия истина, и обитатели болот должны это усвоить."

  ATB_the_dc_mission:0 "Миссия в Столичной Пустоши"
  ATB_the_dc_mission_desc:0 "Столичная Пустошь - многообещающий источник новообращённых. Её жители должны знать правду."

  ATB_shepherds_of_virginia:0 "Пастухи Вирджинии"
  ATB_shepherds_of_virginia_desc:0 "Вирджиния должна познать мир. Прошло уже достаточно времени."
    ATB_heavenly_kingdom:0 "Небесное Царство"
    ATB_heavenly_kingdom_DEF:0 "Небесное Царство Вирджинии"
    ATB_heavenly_kingdom_ADJ:0 "Вирджинск"

  ATB_crusaders_of_virginia:0 "Крестоносцы Виржинии"
  ATB_crusaders_of_virginia_desc:0 "Пустошь должна знать нашу веру. Прошло уже достаточно времени."
    ATB_crusader_kingdom:0 "Королевство Крестоносцев"
    ATB_crusader_kingdom_DEF:0 "Королевство Крестоносцев Вирджинии"
    ATB_crusader_kingdom_ADJ:0 "Вирджинск"