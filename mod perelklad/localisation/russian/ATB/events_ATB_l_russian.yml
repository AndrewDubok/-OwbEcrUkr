l_russian:

  nf_atb.1.t:0 "Начало конца"
  nf_atb.1.d:0 "В прошлой жизни Мур был нечестивцем. Шарлатаном, мошенником, продавцом лекарств от всех болезней. Он прокладывал себе путь по жизни, уезжая из города прежде, чем его преступления смогли настигнуть. Однако, когда он чуть не погиб в автокатастрофе, всё изменилось.\n\nМеньше чем за месяц до падения бомб Мур обратился в христианство. Его крещение было назначено на 23 октября 2077 года, но судьба распорядилась иначе. Когда упали бомбы, он оказался один среди руин города, чудом уцелевший. Этот апокалипсис стал его истинным крещением.\n\nМур начал странствовать по пустошам, проповедуя свою новообретённую веру - веру в Отца, Сына и Священное Сияние. Потребовались десятилетия, чтобы он нашёл последователей."
  nf_atb.1.a:0 "Всевышний услышал его мольбы"
  nf_atb.1.b:0 "Кроткий последовал за его светом"

  nf_atb.2.t:0 "Конец путешествия"
  nf_atb.2.d:0 "Мур приобрёл значительное число последователей, но он и его паства по-прежнему скитались по пустошам без дома. Изгнанные многими общинами, с которыми они сталкивались из-за своего обращения и веры, прихожане продолжали искать место для проживания.\n\nВ конце концов, они прибыли в Вирджинию. Это было опасное и языческое болото, но Мур, тем не менее, обнаружил, что многие туземцы и обитатели болот охотно обратились, и прихожане в конце концов обосновались в городе Чейз-Миллс, быстро обратив в христианство большую часть населения.\n\nОднако со временем болота продолжали разрастаться. Столкнувшись с этой угрозой, Мур и его паства должны были принять решение."
  nf_atb.2.a:0 "Болота были слишком опасны"
  nf_atb.2.b:0 "Мы могли бы принять болота"

  nf_atb.3.t:0 "Странные соратники"
  nf_atb.3.d:0 "Когда Мур и его прихожане прибыли в Вирджинию, они оказались в пестром хаосе неизвестных фракций и приверженностей, расколотых между опасным Эдемским садом, непредсказуемыми пожарными маршалами и другими новичками, Апокрифами Посейдона. Со временем стало ясно, что существующая система нежизнеспособна. Затем появился Ноунфолк.\n\nПоложение в Вирджинии стремительно ухудшалось, и атомбаптистам нужны были друзья, или, по крайней мере, люди, с которыми им пока не придётся сражаться. Очевидным кандидатом были пожарные маршалы. Несмотря на враждебность, они не были открыто враждебны к нашей религии и сохраняли остатки здравомыслия в этих кошмарных болотах. Тем не менее, это был союз по расчёту, а не по дружбе..."
  nf_atb.3.a:0 "Плохое время для жизни в Вирджинии"
    atb_frm_alliance_tt:0 "Пожарные Маршаллы §Oнедовольны§! нашим присутствием. Если нам удастся привлечь достаточно сторонников, §7мы могли бы взять на себя управление Пожарными Маршалами§!, но если сопротивление нашему присутствию станет слишком сильным, §Oальянс распадётся§!."

  nf_atb.4.t:0 "Делегация города Ривет-Сити"
  nf_atb.4.d:0 "Нашей делегации удалось попасть в Ривет-Сити, несмотря на подозрения сотрудников службы безопасности, и встретиться с отцом Клиффордом в скромной часовне. Он рассказал им о Святой Монике и её заботе о заблудших и блудных, особенно о детях. Хотя его вера, очевидно, отличается от нашей, мы пришли к взаимному признанию и пониманию взглядов друг друга. Возможно, в Атомбаптизме есть место и для Святой Моники."
  nf_atb.4.a:0 "Приятно познакомиться, отец Клиффорд"
    atb_religious_exchange:0 "Религиозный обмен"

  nf_atb.5.t:0 "Делегация Мегатонны"
  nf_atb.5.d:0 "Нашей делегации удалось благополучно добраться до Мегатона через руины Столичной Пустоши и встретиться с исповедником Кромвелем. Кромвель проводит время, проповедуя рядом с неразорвавшейся атомной бомбой в центре города, пугающая перспектива даже для тех, кто поклоняется Святому Сиянию. Тем не менее, мы слышали о его верованиях, о Детях Атома. У нас совершенно разные верования, но эти взгляды могут помочь нам пролить свет на природу нашего собственного Святого Сияния."
  nf_atb.5.a:0 "Приятно познакомиться, исповедник Кромвель"

  nf_atb.6.t:0 "Миссионеры от Атомбаптистов"
  nf_atb.6.d:0 "Мы заметили тихие разговоры среди людей, ясно дающие понять, среди нас есть миссионеры. Люди потихоньку обращаются в атомбаптизм - веру, растущую на болотах Вирджинии. Хотя это движение очень малочисленно, некоторые всё же отходят от него, чтобы обрести веру у атомбаптистов."
  nf_atb.6.a:0 "Это незначительно, но всё же..."