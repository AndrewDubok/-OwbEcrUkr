l_russian:
  
  ATB_Pastor_Moore_name:0 "Пастор Мур"
  ATB_Pastor_Moore_DESC:0 "Пастор Джеймс Говард Мур, родившийся до Великой Войны в большом городе Мейкон, штат Джорджия, годами скитался по пустошам, имея при себе только одежду и Библию короля Якова, спрашивая себя, почему он продолжает жить, в то время как другие умирают. Найдя в Вирджинии последователей Атома, он направил их к свету Иисуса, и так появились АтомБаптисты. Теперь он помогает своей пастве сохранять постоянную бдительность в отношении язычников, ведьм и дураков, населяющих юг Вирджинии."