l_russian:
    ### TOOLTIPS
    
    ### EVENTS
    nf_GMN_1.title:0 "Минувшие дни"
    nf_GMN_1.desc:0 "Когда в 60-х ввели Систему Содружеств, стало ясно — всё пошло под откос. Законодательные собрания штатов превратились в пустые фигуры, если вообще собирались. Чёрт возьми, что вообще делали эти Содружества? Позволяли федеральному правительству попирать наши права, пока мы отчаянно боролись за низкие налоги и минимальную зарплату? Американская демократия умерла задолго до появления глубинного государства, а если бы нас тогда не было, мне страшно представить, что бы они вытворяли в Вирджинии.\n\nРаньше нас было всего несколько — я и пара товарищей, с винтовками, баллончиками с краской и несколькими долларами. Жили вне городов, постоянно высиживали в прибрежных лесах, пока армия не решила нас выгнать. Мы пробились на запад, рука об руку с Фристейтерами — ну, не хочу сказать «чокнутые», но выглядели они подозрительно коммунистами. В тот момент это не имело значения — нужно было выжить, и лучше уж с красными, чем с синими.\n\nКогда упали бомбы — пришлось держаться вместе с Фристейтерами. Мы работали с ними, пока ядерная зима не отступила, пытаясь вернуть хоть какую-то стабильность в Западную Вирджинию. Но потом Братство показало свои уродливые лица. После нескольких стычек наши дома сожгли. Единственная причина, почему мы выбрались живыми — мы увидели, что всё кончено, и ушли, пока было время.\n\n"
    nf_GMN_1.a:0 "Вышли с добычей Братства, только что снятой с их трупов."
    nf_GMN_1.b:0 "Собрали пожитки с нескольких Фристейтеров, когда уходили."
    nf_GMN_1.c:0 "Мы взяли с собой столько беженцев, сколько смогли."
    nf_GMN_1.d:0 "По пути нам удалось собрать несколько единомышленников из ополчения."
    
    nf_GMN_2.title:0 "Освободители Аппалачей"
    nf_GMN_2.desc:0 "Пока последние силы Аппалачей сражались из-за старых обид и золота Старого мира, Грин-Маунтин Бойз вместе с постоянно растущим числом последователей двинулись к Ватоге. Они отключили местных роботов и укрепили город, отражая атаки различных фракций. Десятки беженцев устремились в относительно стабильный регион, а фермерские хозяйства и поселения поблизости быстро начали просить поддержки у Грин-Маунтин Бойз.\n\nЭто только усилило их влияние: бойцы стали местной оборонительной силой и пожинали плоды в виде популярности, крышек и прочего. Благодаря этому влиянию они смогли сделать много хорошего для сообщества — сосредоточились на искоренении банд мародёров, разрешении споров и контроле над предприятиями с печально известными условиями труда низкого качества. Именно это принесло им ещё больше поддержки и новых рекрутов, постепенно расширяя влияние за пределы Ватоги.\n\nПосле нападения банды мародёров на Харперс-Ферри, Грин-Маунтин Бойз решили изгнать их и заслужить титул «Освободителей Аппалачей». Так называемые «Кровавые Орлы» были изолированы и истреблены. Когда Грин-Маунтин Бойз ворвались в город с большим отрядом в украденной военной форме, они обратили мародёров в бегство, освободили город и закрепили контроль над юго-восточной частью Западной Вирджинии."
    nf_GMN_2.a:0 "Они обнаружили, что город практически не пострадал."
    nf_GMN_2.b:0 "Несколько старых рабских ям были восстановлены."
    
    nf_GMN_3.title:0 "Эти чёртовы культисты"
    nf_GMN_3.desc:0 "Так называемая «Церковь Рокки» несколько лет занимала сельские районы вокруг Харперс-Ферри и Ватоги — это была группа странных культов, поклоняющихся какой-то своей «святой» каменной реликвии. Хотя они и выглядели странно, никто не считал их враждебными, и большинство просто игнорировало их, придерживаясь принципа «живи и давай жить другим». Однако всё изменилось всего несколько лет назад, когда на стол Фэллона стали поступать десятки сообщений и слухов о стычках и налётах с участием Церкви.\n\nПри расследовании выяснилось, что около дюжины фермерских хозяйств были сожжены, а десятки человек пропали без вести в районе главной территории Церкви. Несколько разведывательных групп, отправленных для проверки, были остановлены людьми Церкви, которые объявляли их «нарушителями» своих земель. Это привело к серии столкновений, где летели кулаки, камни и даже ножи.\n\nКогда Фэллон решил лично встретиться с лидером культа, Святым Гравелом, вспыхнула перестрелка. Вызвав подкрепление, Фэллон повёл сотню бойцов на атаку Церкви через холмы. Бой был коротким, но ожесточённым. В итоге последователи Рокки в панике бежали на четвереньках в леса. После победы мужчины и женщины всех мастей праздновали её с выпивкой и жареными хот-догами из брамина у костра, который они развели."
    nf_GMN_3.a:0 "Мы не должны были позволить им убежать"
    
    nf_GMN_4.title:0 "EMPTY"
    nf_GMN_4.desc:0 "Empty event that was removed. should be replaced in the future"
    nf_GMN_4.a:0 "Look at you data mining"
    nf_GMN_4.b:0 "Maybe you should mine some bitches"

    nf_GMN_5.title:0 "Разрушающиеся конструкции"
    nf_GMN_5.desc:0 "Ватога была примером всего того, что было неправильно в Старом мире. «Город будущего» от RobCo — это город, построенный корпоративными элитами для корпоративных элит. Они правили с вершины своих башен, не пуская туда рабочих и заменяя их роботами. По найденным нами голодискам и записям в терминалах, незадолго до падения бомб один из сотрудников RobCo внес сбой в систему, из-за чего роботы, обслуживавшие город, начали убивать всех, кого видели. Роботы давно уничтожены, но ущерб, нанесённый годами перестрелок и запустения, оставляет Ватогу мало лучше городов, расположенных ближе к эпицентру взрывов. \n\n Тем не менее, здесь живёт большинство наших людей. Население города только растёт в последние годы, поскольку сюда бегут от проблем со всей Аппалачии и даже дальше. Недавно различные советы Ватоги собрались вместе, чтобы обсудить важный вопрос — совместно взяться за восстановление разрушающегося города. Недели обсуждений привели к согласию по всем вопросам — от распределения рабочих нагрузок до поиска материалов. Теперь осталось решить только одно: с чего начать."
    nf_GMN_5.a:0 "Безопасное жилье является приоритетом"
    nf_GMN_5.b:0 "Дать власть народу"
    nf_GMN_5.c:0 "Чистая вода имеет важное значение"

    nf_GMN_6.title:0 "Пустая Гробница"
    nf_GMN_6.desc:0 "В бункере сенатора Блэквелла, как и во многих других подобных убежищах, за последние 200 лет неоднократно бывали мародёры. Большая часть содержимого либо уничтожена, либо разобрана на запчасти, либо вывезена. Фэллон может лишь предполагать, что скелет, сидящий за давно списанным терминалом RobCo, принадлежит самому сенатору, но не исключено, что это кто-то из тех, кто обитал здесь в последние два столетия. Хотя большая часть бункера была тщательно обчищена, два столетия скрытности и борьбы учат кое-чему — особенно в умении прятать важные вещи. В одной хитро замаскированной кладовой комнате мы нашли..."
    nf_GMN_6.a:0 "Кучу старых пластинок"
    nf_GMN_6.b:0 "Некоторые книги по военной подготовке"
    nf_GMN_6.c:0 "Хорошо сохранившиеся доспехи"

    nf_GMN_7.title:0 "Родственные души"
    nf_GMN_7.desc:0 "В Главном Рейнджере всегда было что-то странное. Он был стариком, когда они с Фэлоном встретились. Прошло много десятилетий, а он всё тот ​​же старик. Конечно, это странно, но за 200 лет Фэллоу кое-чему научился. Во-первых, холмы Аппалачей полны всевозможных странностей, и в них редко стоит вникать. Во-вторых, найти друга-единомышленника в пустошах непросто. Лучше наладить с ними отношения, чем совать нос в их дела."
    nf_GMN_7.a:0 "У друзей тоже могут быть секреты"

    nf_GMN_8.title:0 "Конец его дозора"
    nf_GMN_8.desc:0 "Когда поселенцы, бежавшие с северных холмов, начали наводнять город, мы знали, что произошло. Камнепоклонники смяли рейнджеров, и это был лишь вопрос времени, когда горные тропы полностью попадут под их контроль. Фэллоу ожидал, что его старый друг, Главный Рейнджер, прибудет последним. Этот старик был слишком упрям, чтобы уйти, прежде чем все его люди благополучно уйдут. \n\n Фэллоу был наполовину прав. \n\n Новости пришли с последней группой бегущих поселенцев. Группа молодых рейнджеров сообщила, что они заняли позицию в пещере. Некоторое время они сдерживали культистов, но когда боеприпасы закончились, стало ясно, что живыми им из пещеры не выбраться. Именно тогда Главный Рейнджер добровольно сдался культистам в обмен на обещания, что его рейнджерам позволят уйти. Несомненно, вскоре после этого рейнджер был убит в каком-то ритуале. Фэллоу дал обещание жителям Мононгахелы."
    nf_GMN_8.a:0 "Главный Рейнджер будет отмщён!"

    nf_GMN_9.title:0 "Период спокойствия"
    nf_GMN_9.desc:0 "После разрушения церкви в Роки Аппалачи наслаждаются миром. Жизнь возвращается в нормальное русло. Однако это не первый период волнений в регионе. «Грин-Маунтин Бойз», которые уже достаточно давно здесь, знают, что это скорее затишье перед бурей. Будь то в следующем месяце или в следующем году, страсти снова накалятся. Важно то, что мы делаем в это время, чтобы подготовиться."
    nf_GMN_9.a:0 "Помогите людям восстановить свою жизнь."
    nf_GMN_9.b:0 "Соберите оружие Рокистов"
    nf_GMN_9.c:0 "Достаньте тайники Рокистов"
    nf_GMN_9.d:0 "Выследите оставшихся культистов"
    nf_GMN_9.e:0 "Интегрируйте Рокистов в наше ополчение"

    nf_GMN_10.title:0 "Различия во мнениях"
    nf_GMN_10.desc:0 "Когда Церковь Роки постучалась в их двери, жители Аппалачей выступили из Ватоги. Атомисты, яйцеголовые Лореца, рейнджеры и даже фермеры Онионбурга, все стояли плечом к плечу. Несмотря на разный образ жизни, мы работали вместе, чтобы отстоять свою свободу. Во многом это было свидетельством ценностей «Грин-Маунтин Бойз». К сожалению, это продлилось недолго. Вскоре после поражения Церкви Роки, Лучезарная Кейт и её культ вернулись в свои края. Мы не возражали против их возвращения домой. Однако вскоре они начали расширяться на старые территории Роки. Яйцеголовые Лореца сделали то же самое, и вскоре между двумя группами вспыхнул конфликт. Как будто этого было недостаточно, фермеры Онионбурга подверглись нападению Культа Кобальта, и многие рейнджеры были найдены мёртвыми от ран Гаусс Винтовок. Похоже, разрушение Церкви Роки было лишь началом межконфессионального кровопролития."
    nf_GMN_10.a:0 "Вот дерьмо, мы снова здесь."
    
    nf_GMN_11.title:0 "Свобода для большинства"
    nf_GMN_11.desc:0 "За последние несколько лет мы узнали, что есть люди, которые не могут оставить других в покое. В частности, это культы и воинствующие фашисты. Попытки работать с ними привели лишь к тому, что нас укусили за задницу, и с нас хватит. Фэллоу и остальные «Грин-Маунтин Бойз» решили, что не стоит пытаться работать с этими людьми. Если ещё один странный культ или банда головорезов попытается заглянуть к нам в горы, мы сначала выстрелим, а потом будем задавать вопросы. Возможно, это немного жестоко, но это необходимо, чтобы сохранить свободу для всех остальных."
    nf_GMN_11.a:0 "Благодаря силе, мы обретаем свободу"

    nf_GMN_12.title:0 "Занимайтесь своими делами"
    nf_GMN_12.desc:0 "У разных групп Аппалачей есть свои причуды. Некоторые поклоняются странным вещам, некоторые не выходят на улицу в полнолуние из-за страха перед Человеком-мотыльком, некоторые просто хотят заниматься фермерством ради всего святого. Даже в самом начале нашей группы нас это никогда не волновало. Главное убеждение «Грин-Маунтин Бойз» заключалось в том, что каждый волен размахивать руками, как ему вздумается, пока не ударит кого-нибудь по носу. Хотите поклоняться радиоактивной жиже? Хотите строить гигантские магниты? Хотите просто жить своей жизнью изо дня в день? Для «Грин-Маунтин Бойз» это не имеет значения, главное, чтобы вы не мешали другим делать то же, что и они. Несмотря на то, что разные группы Аппалачей живут вместе из-за борьбы с «Рокистами», нам удалось сохранить единство. Различные общества и культы научились жить вместе и держаться подальше друг от друга."
    nf_GMN_12.a:0 "В каком-то смысле дела обстоят лучше, чем раньше."

    nf_GMN_13.title:0 "Сокровище на дне"
    nf_GMN_13.desc:0 "Пару сотен лет назад здесь творилась какая-то хрень с гигантскими летучими мышами и болезнью, которая превратила не-гулей в диких безумцев. Фэлон и ребята держались подальше от этой хрени, но всё уладилось после нескольких ядерных взрывов и вакцины, подмешанной в Ядер-Колу, как ни странно. Одним из мест, подвергшихся ядерной бомбардировке, была пещера неподалёку от Ватоги. Конечно, никто не хотел идти в радиоактивную пещеру, пока туда не обосновался Культ Кобальта. То, что они там обнаружили, заставило Фэллоу и ребят пожалеть, что они не заглянули туда. Там есть очень редкий материал с полезными свойствами. Культ заявил, что с радостью вытащит этот камень из земли для нас, если мы позволим им поклоняться там."
    nf_GMN_13.a:0 "Звучит как беспроигрышный вариант"

    nf_GMN_14.title:0 "Болото в буквальном и метафорическом смысле"
    nf_GMN_14.desc:0 "До войны Вашингтон был домом врага. Кучки мошенников, которые грабили простых людей и притесняли их. «Свободные Штаты», «Грин-Маунтин Бойз» и множество других групп по всей стране были сыты по горло и воевали. Чёрт возьми, в Аппалачах мы даже какое-то время побеждали, пока не упали бомбы. Мы всегда следили за восточным горизонтом, но до недавних пор поводов для беспокойства не было. Там что-то происходит. Проходящие караваны сообщают о разъярённых мутантах, мигрирующих рейдерах и даже о полномасштабной войне между двумя группировками в силовой броне. Что бы там ни происходило, это может перекинуться и на наши земли."
    nf_GMN_14.a:0 "Мы должны быть готовы"

    nf_GMN_15.title:0 "Привет, сосед"
    nf_GMN_15.desc:0 "Сегодня прибыл гонец из Восточных Аппалачей. Он выступает от имени [GMN.GetName], ополчения, которое защищает поселенцев региона от внешних угроз. Они слышали о нашей республике и хотят присоединиться к нам."
    nf_GMN_15.a:0 "Добро пожаловать в Республику!"

    nf_GMN_16.title:0 "Многое просто щелкнуло"
    nf_GMN_16.desc:0 "Респонденты всегда казались неплохими ребятами с тех пор, как они реорганизовались около 180 лет назад. Может, немного наивными, но в целом не такими уж плохими. Они помогают людям и, похоже, делают много хорошего. Однако всегда было что-то не то с ними. Их главная база - довоенный курорт, куда хаживали худшие людишки в стране. Предположительно, их потомки жили в бункере под курортом и раздавали технику Респондентам из чистого сердца. Это уже не прошло проверку Фалона на запах, и это кое-что значит, ведь его нос отпал ещё в 2081-м. Что хуже, то и дело всплывало одно и то же имя - мистер Отис. Конечно, логично, что люди в бункере сохранили фамилию, но всё равно казалось подозрительно. Теперь мы знаем почему. После взлома старого забытого бункера на окраинах Онионбурга мы нашли исследовательский объект Анклава. Всё ценное давно растащили, но мы нашли файлы на компьютере под названием М.О.Д.У.С. Согласно этим документам, компьютер находится в бункере под Уайтспрингсом и предназначен для продолжения миссии Анклава. Это объясняет, почему "Управление Уайтспрингса" имело так много техники и почему они всегда действовали через посредников. Знают ли Респонденты об этом или нет, они - пешки в заговоре Анклава! К сожалению, у нас нет роскоши копать глубже. Если мы дадим понять М.О.Д.У.С., что знаем правду об Управлении Уайтспрингса, последствия могут быть ужасными. Наш лучший шанс, как ни странно, ворваться с пушками наперевес. По крайней мере, машина может подумать, что мы просто грабим курорт."
    nf_GMN_16.a:0 "Нам нужно действовать быстро!"

    nf_GMN_17.title:0 "Разрушение бункера"
    nf_GMN_17.desc:0 "Пробившись к воротам Уайтспрингса, мы смогли договориться с их руководством о переговорах. Респонденты знали нашу репутацию так же хорошо, как и мы их, и этот конфликт ещё больше сбил их с толку. Это сыграло нам на руку, и их стремление получить ответы привело к тому, что мы провели переговоры вдали от Уайтспрингса. Имея на руках доказательства, Респонденты были убеждены направить винтовки на оборону бункера. Как мы и ожидали, роботы курорта немедленно оказали сопротивление, но вместе мы смогли пробиться в бункер. МОДУС вскоре был уничтожен, и теперь он никогда больше не сможет манипулировать честными людьми. \n\n Оставался вопрос о Респондентах. Без кукловода, дергающего за ниточки, остаётся вопрос о том, что они будут делать дальше. Есть несколько небольших обид из-за боевых действий, но в целом они согласились присоединиться к нам в обеспечении безопасности Аппалачи."
    nf_GMN_17.a:0 "Мы будем работать сообща"

    nf_GMN_18.title:0 "Болото горит"
    nf_GMN_18.desc:0 "К юго-востоку от Ватоги жили дикие поселенцы, которые, увидев постоянно разрастающиеся болота Вирджинии, решили, что это подходящее место для жизни. С каждым годом болото становилось всё ближе, и каждый год они сжигали всё, что могли. В целом, они были хорошими торговыми партнёрами. Топливо для огнемётов не пользовалось особым спросом в Ватоге, но платили за него неплохо. Похоже, этот рынок скоро иссякнет. Торговцы сообщают, что пожарные маршалы прожгли себе путь к сердцу болота и обнаружили причину его столь сильного расширения. Однако главное заключается в том, что, одержав победу в своей болотной войне, пожарные маршалы сформировали более серьёзную организацию, чем просто несколько поселений, объединившихся для совместных выжиганий. Возможно, стоит связаться с ними и посмотреть, сможем ли мы найти общий язык."
    nf_GMN_18.a:0 "Будем надеяться, что война не сделала их жестокими"

    nf_GMN_19.title:0 "Болото горит"
    nf_GMN_19.desc:0 "К юго-востоку от Ватоги жили дикие поселенцы, которые, увидев постоянно разрастающиеся виргинские болота, решили, что это подходящее место для жизни. С каждым годом болото становилось всё ближе, и каждый год они сжигали всё, что могли. В целом, они были хорошими торговыми партнёрами. Топливо для огнемётов не пользовалось в Ватоге особым спросом, но за него хорошо платили. Похоже, этот рынок скоро иссякнет. Поселенцы прибывали в Ватогу и близлежащие поселения в большом количестве. Они рассказывают о культистах, племёнах и морских народах, которые вытесняли их из болот. Эти люди были крепче большинства. Что бы ни изгнало их из родных домов, мы не можем относиться к этой угрозе легкомысленно."
    nf_GMN_19.a:0 "Вот дерьмо, мы снова здесь."
