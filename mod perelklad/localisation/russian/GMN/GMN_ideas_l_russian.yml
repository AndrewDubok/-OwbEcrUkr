l_russian:

    ###New Ideas###
    GMN_safety_standards_idea:0 "Стандарты Безопасности"
    GMN_safety_standards_idea_desc:0 "Меньше людей, погибающих в ужасных авариях на фабриках — это хорошо. Казалось бы, это должно быть очевидно для всех, но, увы, это не так."

    GMN_enough_cults_idea:0 "Бич культистов"
    GMN_enough_cults_idea_desc:0 "Жестокие культы — обычное явление в пустошах. Эти странные группы похищают и убивают всех, на кого укажут их лидеры. В Аппалачах им не найти лёгких целей."

    GMN_farming_exports_idea:0 "Фермерский Экспорт"
    GMN_farming_exports_idea_desc:0 "Мы выращиваем гораздо больше еды, чем нам нужно. Обмен с теми, кто не может выращивать столько, позволяет нам получать другие необходимые вещи."
    
    GMN_protecting_caravans_idea:0 "Защита Караванов"
    GMN_protecting_caravans_idea_desc:0 "«Грин-Маунтин Бойз» охраняют караваны, проходящие через нашу территорию. Очень немногие рейдеры осмелятся связываться с этим эскортом, а те, кто рискнёт — станут отличной мишенью для тренировки."

    GMN_ranger_bane_idea:0 "Бич рейнджеров"
    GMN_ranger_bane_idea_desc:0 "Рейнджеры Мононгахелы научили нас своим секретам. Теперь мы используем эти знания против них."

    GMN_ultracite_pa_idea:0 "Ультрацитовая силовая броня"
    GMN_ultracite_pa_idea_desc:0 "Эта усовершенствованная силовая броня, разработанная давно умершим отделением Братства, поможет нам сохранить свободу Аппалачи."

    GMN_eagle_slayers_idea:0 "Убитый Имперский Орел"
    GMN_eagle_slayers_idea_desc:0 "Анклав, последние остатки всего плохого, что было в старой Америке, был уничтожен нашей рукой."

    GMN_swamp_victory_idea:0 "Победа на болотах"
    GMN_swamp_victory_idea_desc:0 "Болота Вирджинии были настоящим испытанием для нас. Мало что может преподнести нам пустошь, способное сравниться с тем, что мы пережили."

    GMN_swamp_cooperation_idea:0 "Торговля через Вирджинию"
    GMN_swamp_cooperation_idea_desc:0 "От холмов Западной Вирджинии до болот Вирджинии торговые караваны движутся, не встречая ничего, кроме редких бродячих животных. Это выгодно всем."

    ###Old Ideas###
    gmn_mountain_boys:0 "Армия без Государства"
    gmn_mountain_boys_desc:0 "Сила из гулей, людей и мутантов со всего Аппалачей, происходящая от довоенных партизан, Фриштейтеров и послевоенных выживальщиков — «Грин-Маунтин Бойз» — как теперь называют их оборонное формирование, являются одной из лучших сил в пустошах, прекрасно знающей Аппалачи, словно свои пять пальцев."

    gmn_weary_settlers:0 "Деревенщины, и мы этим гордимся!"
    gmn_weary_settlers_desc:0 "Народ Аппалачей живёт в суровой пустоши, полной смерти, страданий и кровопролития. Именно благодаря этому они закалились, их решимость стала непоколебимой, а региональное единство — только крепче. Однако это обоюдоострый меч. Защищать Аппалачи достаточно просто, но расширять территорию «Гри-Маунтин Бойз» практически невозможно, если только вы не хотите оказаться по ту сторону восстания или забастовки ремесленников."

    gmn_guards:0 "Северо-восточная Гвардия"
    gmn_guards_desc:0 "«Грин-Маунтин Бойз» всегда испытывали сложные, порой противоречивые отношения с рейнджерами Мононгахелы, однако в одном они полностью едины — в глубокой ненависти к Налётчикам из Столичной Пустоши.\n\nИменно поэтому их оборонный пакт готовится к возможной атаке Налётчиков. Или даже к худшему."
    
    mon_guards:0 "Северо-западная Гвардия"
    mon_guards_desc:0 "«Грин-Маунтин Бойз» всегда испытывали сложные, порой противоречивые отношения с рейнджерами Мононгахелы, однако в одном они полностью едины — в глубокой ненависти к Налётчикам из Столичной Пустоши.\n\nИменно поэтому их оборонный пакт готовится к возможной атаке Налётчиков. Или даже к худшему."

    GMN_appalachian_identity_idea:0 "Индентичность Аппалачи"
    GMN_appalachian_identity_idea_desc:0 "Холмы Аппалачей простираются на север до Старого Нью-Йорка и на юг до Джорджии. По всей этой великой земле живёт множество людей с разными верованиями и образом жизни. Но есть то, что нас объединяет — эти холмы. Мы все знаем, как тяжело выживать в этой суровой местности, и этого достаточно, чтобы стать ближе друг к другу."
    
    GMN_appalachian_identity_2_idea:0 "Индентичность Аппалачи"
    GMN_appalachian_identity_2_idea_desc:0 "Холмы Аппалачей простираются на север до Старого Нью-Йорка и на юг до Джорджии. По всей этой великой земле живёт множество людей с разными верованиями и образом жизни. Но есть то, что нас объединяет — эти холмы. Мы все знаем, как тяжело выживать в этой суровой местности, и этого достаточно, чтобы стать ближе друг к другу."

    GMN_rocky_memories_idea:0 "Воспоминания о Роккистах"
    GMN_rocky_memories_idea_desc:0 "Прошло уже немало лет с тех пор, как мы сражались с этими культистами, но насколько сильно могли измениться их тактики за это время?"

    GMN_rocky_fought_idea:0 "Новые Тактики"
    GMN_rocky_fought_idea_desc:0 "Те из наших, кто отправился на север сражаться и вернулся, хорошо знают новые тактики, которые применяют эти культисты. Они помогают нашим ополчениям подготовиться."

    GMN_anti_rocky_volunteers_idea:0 "Добровольцы Идущие на Север"
    GMN_anti_rocky_volunteers_idea_desc:0 "Мы слышали, что культисты, бежавшие на север, сеют там беспорядки. Всё больше наших ребят отправляются туда сражаться с ними, и возвращаются не все."
    
