 riv_economic_support_desc:0 ""

 riv_war_effort_idea:0 "Ривет-Сити наращивает военную мощь"
 riv_war_effort_idea_desc:0 ""

 riv_volunteers_to_bos:0 "Добровольцы для Братства Стали"
 riv_volunteers_to_bos_desc:0 ""

 riv_weapons_contribution_idea:0 "Программа пожертвований оружия в Ривет-Сити"
 riv_weapons_contribution_idea_desc:0 "Новая программа пожертвований оружия в Ривет-Сити призывает граждан Ривет-Сити сдавать свое оружие для использования в армии. Хотя это не предоставляет огромное количество оружия, каждая мелочь помогает."

 riv_paramount_security:0 "Первостепенная Безопасность"
 riv_paramount_security_desc:0 ""

 riv_elite_security_forces:0 "Элитные Силы Безопасности"
 riv_elite_security_forces_desc:0 "Каждый охранник должен быть лучшим, кем он может быть, каждый офицер — лучшим лидером."

 riv_expansion_of_security:0 "Расширение Сил Безопасности"
 riv_expansion_of_security_desc:0 "Лучший солдат в мире не может в одиночку сражаться с армией."

 riv_military_expansion:0 "Военно-промышленное расширение"
 riv_military_expansion_desc:0 "Постоянное расширение сил безопасности Ривет-Сити требует расширения поддерживающей их промышленности."

 riv_volunteers_to_the_wasteland:0 "Добровольцы для Пустоши"
 riv_volunteers_to_the_wasteland_desc:0 "Пустошь — огромное место, мы должны помогать странам с похожими взглядами, где только можем."

