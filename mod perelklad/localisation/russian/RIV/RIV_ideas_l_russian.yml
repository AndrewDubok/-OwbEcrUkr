l_russian:
 riv_scientific_hub_of_the_capital:0 "Научный Центр Столицы"
 riv_scientific_hub_of_the_capital_desc:0 "Хотя Братство и Анклав могут обладать более передовыми технологиями, чем у нас, мы являемся исследователями и лучшим научным учреждением в Столице. Именно благодаря нам люди в этом районе могут есть свежие фрукты и овощи и надеяться на лучшее будущее."

 riv_rust_and_rivets:0 "Ржавчина и заклёпки"
 riv_rust_and_rivets_desc:0 "Расположение нашего города создает уникальные вызовы и возможности. Хотя в уже существующих помещениях строить легче, нам также приходится справляться с разрушительными последствиями ржавчины, которая пронизывает воздух, которым мы дышим."

 riv_rust_and_rivets_2:0 "Ржавчина и заклёпки"
 riv_rust_and_rivets_2_desc:0 "Расположение нашего города создает уникальные вызовы и возможности. Хотя в уже существующих помещениях строить легче, нам также приходится справляться с разрушительными последствиями ржавчины, которая пронизывает воздух, которым мы дышим."

