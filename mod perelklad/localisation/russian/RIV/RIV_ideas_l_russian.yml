 riv_lab_modernisation_idea:0 "Модернизация лабораторий"
 riv_lab_modernisation_idea_desc:0 ""

 riv_more_food_for_better_prices:0 "Больше еды по лучшим ценам"
 riv_more_food_for_better_prices_desc:0 "С более современной лабораторией мы можем лучше развивать наши гидропонические установки для производства большего количества пищи."

 riv_powerful_caravan_companies:0 "Мощные Караванные Компании"
 riv_powerful_caravan_companies_desc:0 "Ривет-Сити долгое время полагался на свои небольшие караванные компании, и с поддержкой Совета они выросли в мощные коммерческие интересы, все при поддержке Ривет-Сити. Их процветание означает процветание города."

 riv_flourishing_markets:0 "Процветающие рынки"
 riv_flourishing_markets_desc:0 "Наши рынки стали самыми важными в Вашингтоне. Торговцы со всего Столичного Пустоши приезжают в Ривет-Сити, чтобы торговать своими товарами и уходить с полными кошельками."

