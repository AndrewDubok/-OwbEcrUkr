 riv_dangerous_sections_closed:0 "Закрытие опасных участков"
 riv_dangerous_sections_closed_desc:0 ""

 riv_integrated_administration:0 "Интегрированное управление"
 riv_integrated_administration_desc:0 "Привлекая самых талантливых администраторов и должностных лиц из интегрируемых поселений, мы можем легче контролировать территории, которые еще не полностью находятся под нашим контролем."

 riv_domination_of_dc:0 "Доминирование над Вашингтоном"
 riv_domination_of_dc_desc:0 "С падением последних оплотов в Вашингтоне, Ривет-Сити установил себя как доминирующую силу в этом районе, а возможно и на всем Восточном побережье США. С обеспечением этого контроля, возможно, наконец наступит возрождение Восточного побережья."

 riv_the_new_army:0 "Новая армия"
 riv_the_new_army_desc:0 "Силы безопасности Ривет-Сити столкнулись с неприятной правдой: они просто слишком плохо обучены и оснащены для масштабных боевых действий, в которых они теперь участвуют. Проводится капитальная перестройка армии, в результате которой Силы безопасности превратятся в настоящую армию."

 riv_the_new_army2:0 "Новая армия"
 riv_the_new_army2_desc:0 "Силы безопасности Ривет-Сити столкнулись с неприятной правдой: они просто слишком плохо обучены и оснащены для масштабных боевых действий, в которых они теперь участвуют. Проводится капитальная перестройка армии, в результате которой Силы безопасности превратятся в настоящую армию."

 riv_the_new_army3:0 "Новая армия"
 riv_the_new_army3_desc:0 "Силы безопасности Ривет-Сити столкнулись с неприятной правдой: они просто слишком плохо обучены и оснащены для масштабных боевых действий, в которых они теперь участвуют. Проводится капитальная перестройка армии, в результате которой Силы безопасности превратятся в настоящую армию."

 riv_wildlife_study_idea:0 "Изучение дикой природы"
 riv_wildlife_study_idea_desc:0 ""

 riv_wildlife_study_idea_2:0 "Изучение дикой природы"
 riv_wildlife_study_idea_2_desc:0 ""

 riv_water_rationing:0 "Паёк воды"
 riv_water_rationing_desc:0 "С захватом водоснабжения Вашингтона Анклавом и их победой над Братством, ситуация внезапно становится намного более серьёзной. Ривет-Сити должен осторожно раздавать воду — возможно, её больше не будет."

 riv_emergency_conscription_idea:0 "Чрезвычайный призыв"
 riv_emergency_conscription_idea_desc:0 "Кто знает, когда Анклав решит, что достаточно? Мы должны подготовиться, создав как можно большую армию — ущербы для общества необходимы, когда ваш противник — конец вашего общества."

 riv_enclave_methodology:0 "Методология Анклава"
 riv_enclave_methodology_desc:0 "Анклав готов использовать более — негуманные методы исследования. Многим это не нравится, но это означает, что достаточно подопытных."

 riv_free_trade_city:0 "Свободный город"
 riv_free_trade_city_desc:0 "«Храните, древние земли, ваши знаменитые богатства!» - восклицает она\nС немыми устами. «Дайте мне ваших усталых, ваших бедных,\nВаши сбившиеся в кучу массы, жаждущие дышать свободно,\nНесчастный мусор ваших бурлящих берегов.\nПошлите этих, бездомных, бушующих ко мне,\nЯ поднимаю свой светильник возле золотой двери!»"

 riv_fiat_cap_currency:0 "Фиатная валюта крышек"
 riv_fiat_cap_currency_desc:0 ""

 riv_water_inflation:0 "Борьба с инфляцией на водной основе"
 riv_water_inflation_desc:0 ""

 riv_truest_technocracy:0 "Настоящая Технократия"
 riv_truest_technocracy_desc:0 "Ривет-Сити стал вершиной современной технократии. Братство и Анклав отказались смотреть дальше своих оружий и брони, а Институт одержим своими странными роботами и изоляционизмом. Ривет-Сити, с другой стороны, стоит как маяк науки и человечности на всем Восточном побережье."




