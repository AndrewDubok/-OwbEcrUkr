 riv_rust_and_rivets_4_desc:0 "Расположение нашего города создает уникальные вызовы и возможности. Хотя в уже существующих помещениях строить легче, нам также приходится справляться с разрушительными последствиями ржавчины, которая пронизывает воздух, которым мы дышим."

 riv_rust_and_rivets_5:0 "Ржавчина и заклёпки"
 riv_rust_and_rivets_5_desc:0 "Расположение нашего города создает уникальные вызовы и возможности. Хотя в уже существующих помещениях строить легче, нам также приходится справляться с разрушительными последствиями ржавчины, которая пронизывает воздух, которым мы дышим."

 riv_the_security_team:0 "Служба Безопасности"
 riv_the_security_team_desc:0 "Силы безопасности Ривет-Сити не совсем полиция, не совсем армия. Относительная безопасность Ривет-Сити означает, что настоящие солдаты не нужны, но полиция тоже не совсем подходит. Это означает, что, хотя силы безопасности и малы, они хорошо организованы и компетентны. Они также частично оплачиваются бесплатной едой, которой у нас в достатке, что делает их содержание дешевле."

 riv_vaccine_development:0 "Разработка вакцины"
 riv_vaccine_development_desc:0 ""

 riv_rust_clearing:0 "Очистка от ржавчины"
 riv_rust_clearing_desc:0 ""

 riv_lis_new_scientists:0 "Новые учёные Ли"
 riv_lis_new_scientists_desc:0 "Мэдисон Ли привела новых учёных в Ривет-Сити, не местных, которые привносят свежий опыт и знания в лаборатории города. Хотя это значительно улучшает наши исследовательские усилия, свежие идеи могут стать недостатком с точки зрения политической стабильности."

 riv_food_production_expanded:0 "Расширение производства продовольствия"
 riv_food_production_expanded_desc:0 "Когда Ли прибыла в город, ее приоритетом было значительное расширение производства продовольствия. Она сказала, что остальная часть пустоши голодает, и мы должны делиться нашими продуктами, чтобы принести здоровье и процветание всем. К сожалению, лабораторные техники и ассистенты, необходимые для выращивания такого количества еды, отвлекаются от наших исследовательских усилий."

 riv_lower_food_prices:0 "Низкая цена на еду"
 riv_lower_food_prices_desc:0 "Прибытие Ли в город принесло свежий взгляд на исследовательскую команду и руководство города. Ли сразу же настояла на снижении цен на продовольствие для остальной части пустоши. Хотя это наносит ущерб нашему доходу, это приносит много доброй воли в пустоши, и многие горожане гордятся тем, что помогают другим."

 riv_limit_conscription2:0 "Ограничение призыва"
 riv_limit_conscription2_desc:0 "Мы не можем просто бросать людей на каждую проблему, с которой сталкиваемся. Дэнверс хочет убедиться, что мы не потеряем слишком много наших людей. Небольшая цена за ее поддержку."

 riv_limit_conscription1:0 "Ограничение призыва"
 riv_limit_conscription1_desc:0 "Мы не можем просто бросать людей на каждую проблему, с которой сталкиваемся. Дэнверс хочет убедиться, что мы не потеряем слишком много наших людей. Небольшая цена за ее поддержку."

 riv_li_science_focus_idea1:0 "Научный фокус"
 riv_li_science_focus_idea1_desc:0 "В обмен на поддержку Мэдисон Ли в совете она потребовала большего финансирования научного отдела. Это будет иметь незначительные экономические и политические последствия."

 riv_li_science_focus_idea2:0 "Научный фокус"
 riv_li_science_focus_idea2_desc:0 "В обмен на поддержку Мэдисон Ли в совете она потребовала большего финансирования научного отдела. Это будет иметь незначительные экономические и политические последствия."

 riv_punga_trade:0 "Торговля пунгой"
 riv_punga_trade_desc:0 "Фрукты пунги из Пойнт-Лукаута являются привлекательным и аппетитным блюдом. Помимо хорошего вкуса, они очищают организм от радиационного заражения и обладают незначительными лечебными свойствами. Конечно, они также немного вызывают привыкание..."

