l_russian:
 riv_giant_of_the_drydock:0 "Гигант сухого дока"
 riv_giant_of_the_drydock_desc:0 "Даже до войны Ривет-Сити был чудом науки и инженерии. Со временем он постепенно разрушался, но внутреннее оборудование оставалось целым и неприкосновенным."

 riv_rivet_city_council:0 "Совет Ривет-Сити"
 riv_rivet_city_council_desc:0 "Когда первые ученые и граждане начали укрываться в Ривет-Сити, начало формироваться небольшое общество. Этому обществу нужно было руководство, поэтому был создан Совет Ривет-Сити."

 riv_pinkertons_exile:0 "Изгнание Пинкертона"
 riv_pinkertons_exile_desc:0 "Всё шло хорошо в новом поселении Ривет-Сити. Однако появление команды ученых, одержимых очищением воды, нарушило ход вещей. Пинкертон, бывший представитель науки, ушел из-за перестановок кадров в Совете."

 riv_project_purity:0 "Проект «Чистота»"
 riv_project_purity_desc:0 "На протяжении всей истории Ривет-Сити не было такого амбициозного научного проекта, как план Ли по проекту «Чистота». Очистка всей воды Столичной Пустоши — невероятно амбициозная цель, но стоящая. К сожалению, на данный момент Ривет-Сити просто не обладает опытом, чтобы реализовать проект «Чистота». Но это может скоро измениться ..."

 riv_strengthen_the_council:0 "Усилить Совет"
 riv_strengthen_the_council_desc:0 "Десятилетиями Совет Ривет-Сити обеспечивал эффективное управление, и если мы придерживаемся нашего текущего курса, это обязательно продолжится."

 riv_weapons_contribution_program:0 "Программа поддержки Армии"
 riv_weapons_contribution_program_desc:0 "Наши силы безопасности долгое время демонстрировали свою эффективность, но по мере того, как фракции по типу Братства и Анклава набирают силу, ограниченной силы, которую мы имеем, просто недостаточно. Любое расширение наших сил безопасности потребует значительных инвестиций в вооружение и численность персонала. Запуск программы по приему оружия от общины позволит ускорить процесс."

 riv_force_to_be_reckoned_with:0 "Сила, с которой нужно считаться"
 riv_force_to_be_reckoned_with_desc:0 "Любое улучшение нашей военной мощи потребует значительного расширения численности доступных нам солдат. Нам нужно быстро расширить то, что у нас есть, и обучить кого мы можем."

 riv_keep_an_elite_force:0 "Сохранить Элитные Силы"
 riv_keep_an_elite_force_desc:0 "Наши силы безопасности ограничены численностью, и это означает, что мы можем более легко обеспечить, чтобы каждый офицер был идеальным офицером. Мы должны сохранить это."

 riv_security_expansion:0 "Расширение охраны"
 riv_security_expansion_desc:0 "Малый размер нашей охраны просто никуда не годится. Нам нужно больше людей, даже если они не такие опытные или эффективные в своих обязанностях."

 riv_security_proposal_one:0 "Предложение Службы Безопасности"
 riv_security_proposal_one_desc:0 "Хотя многие думают, что их работа сводится лишь к разниманию дебошей в барах и наблюдению за мостиком. Работа сотрудников службы безопасности это не только вышеперечисленное. В число прочих обязанностей входят борьба с опасными тварями, пробирающимися через затонувшие части корабля, а также вопросы вооружения службы безопасности."

 riv_training_and_equipment:0 "Обучение и Снаряжение"
 riv_training_and_equipment_desc:0 "Мы должны улучшить нашу программу обучения и курсы по снаряжению, чтобы наши офицеры были лучшими в Пустоши."

 riv_modernise_equipment:0 "Модернизация снаряжения"
 riv_modernise_equipment_desc:0 "Мы должны обеспечить, чтобы снаряжение, которое мы выдаем нашим солдатам, было лучшим из возможных, так как эти офицеры представляют нас не только как военных, но и как лицо нашего Совета в Пустошах."

 riv_effective_support:0 "Эффективная поддержка"
 riv_effective_support_desc:0 "Наши офицеры прекрасно справляются с боем в одиночку, но, обучив специализированные подразделения поддержки, мы можем обеспечить, чтобы они сражались лучше, эффективнее и дольше. Нам просто нужно инвестировать в поддержку."

 riv_armoury_overhaul:0 "Переработка Арсенала"
 riv_armoury_overhaul_desc:0 "Покупка оружия, необходимого нашим силам безопасности для нашей защиты, просто невыгодна. Если ужасы Пустоши когда-нибудь постучатся в нашу дверь, нам понадобится собственный источник оружия."

 riv_security_proposal_two:0 "Ещё предложение Службы Безопасности"
 riv_security_proposal_two_desc:0 "Между обитателями ангарных палуб и остальной частью корабля существуют разногласия. Если мы не будем принимать меры, напряженность может выйти из-под контроля."

 riv_send_detachments_outside:0 "Отряды в Пустоши"
 riv_send_detachments_outside_desc:0 "Хотя наши силы безопасности до сих пор действовали в основном в оборонительной манере, Пустошь меняется, и нам нужно измениться вместе с ней. Мы должны начать отправлять наших офицеров в пустошь, чтобы обеспечить безопасность территории до того, как она станет угрозой для города."

 riv_super_mutant_suppression:0 "Подавление Супермутантов"
 riv_super_mutant_suppression_desc:0 "Супермутанты - одна из крупнейших угроз, с которой сталкивается Пустошь. Их рейды угрожают не только нам, но и каждому поселению отсюда до Рэйвен-Рока. Их нелегко убить, но мы можем быстро научиться."

 riv_beat_off_raiders:0 "Отпугнуть рейдеров"
 riv_beat_off_raiders_desc:0 "Рейдеры - это тараканы Пустоши. Независимо от того, сколько вы их убьете, всегда найдется еще один, спрятавшийся за тем столбом там. К счастью, большинство из них трусливы и бегут от настоящей битвы. Давайте дадим им отпор."

 riv_repair_deck_fencing:0 "Восстановить ограждения палубы"
 riv_repair_deck_fencing_desc:0 "Само собой разумеется, что плохо поддерживаемые, разрушенные и окисленные ограждения, предохраняющие от падения с корабля, представляют опасность для безопасности. Восстановление их там, где это возможно (и замените их, где нет), - это начало, но в Ривет-Сити есть многое, что нужно исправить, не только ограждения."

 riv_trading_opportunities:0 "Торговые возможности"
 riv_trading_opportunities_desc:0 "Хотя отправка караванов в Пустошь без определенной цели приносит нам крышки, развитие нормальных торговых отношений с конкретными местами обязательно принесет нам прибыль в долгосрочной перспективе. В конце концов, чем больше мы им нравимся, тем лучше сделки мы заключим."

 riv_nuclear_trade:0 "Ядерная торговля"
 riv_nuclear_trade_desc:0 "Мегатонна - очевидный кандидат на роль торгового пункта. Это процветающий город с магазинами и цивилизацией, да и он уже является пунктом торговли. Конечно, он построен вокруг неразорвавшейся ядерной бомбы, но это наверняка не вызовет никаких проблем."

 riv_leaving_the_little_town:0 "Те, кто покидает Маленький Городок"
 riv_leaving_the_little_town_desc:0 "Большой Город - это город людей, слишком старых, чтобы жить в Литл-Лэмплайте. Мы знаем, что они испытывают много трудностей с тем, чтобы правильно устроиться, и могли бы стать идеальным местом для получения мигрантов, а также для торговли."

 riv_deal_with_the_dead:0 "Договориться с Мертвецами"
 riv_deal_with_the_dead_desc:0 "Подземелье - это город гулей, живущих в остатках музея. Поселение плохо воспринимается большинством в округе, которых отталкивают гули своим внешним видом и иногда даже стреляют в них на поражение. Они будут рады мирным торговым партнерам."

 riv_root_of_trade:0 "Корень торговли"
 riv_root_of_trade_desc:0 "Мы не единственное поселение в Столичной Пустоши, которое отправляет торговые караваны в руины ради прибыли. Община Кентербери - это небольшой городок с огромным влиянием на район благодаря своим торговым сетям, которые почти могут соперничать с нашими! Развитие отношений с ними обязательно принесет нам прибыль."

 riv_trading_for_pennies:0 "Торговля за Пенни"
 riv_trading_for_pennies_desc:0 "Алистер Тенпенни - это многое, и некоторым он может не понравиться (абсолютно заслуженно!). Однако одна из тех вещей, которой он является, это богатым. У него также есть связи с элитой по всему Вашингтону, включая Ривет-Сити. Хотя некоторые могут считать наше сотрудничество с ним неприятным, это прибыльно."

 riv_the_point_of_it_all:0 "Суть всего"
 riv_the_point_of_it_all_desc:0 "Пойнт-Лукаут вряд ли является торговым пунктом вообще - большинство местного населения - это дикари, которые не знают, что такое крышка. Однако местность известна некоторыми довольно редкими ингредиентами и предметами, поэтому торговля с цивилизованными людьми, которые там есть, обязательно принесет нам пользу."

 riv_stretched_morals:0 "Гибкая мораль"
 riv_stretched_morals_desc:0 "Рейдеры - неприятный сорт. Они крадут, разграбляют, рейдят, порабощают и живут на несчастье других, включая наши собственные караваны. Но, исключив их из нашей торговой сети, мы можем упустить возможность. Очень прибыльную возможность."

 riv_no_tolerance_for_raiders:0 "Нулевая терпимость к Рейдерам"
 riv_no_tolerance_for_raiders_desc:0 "Рейдеров следует не терпеть. Любые попытки торговли с ними только заставят нас казаться слабыми в их глазах, наш лучший вариант - просто стрелять при первой возможности. Это может показаться жестоким, но они бы поступили так же."

 riv_civilian_proposal_two:0 "Предложение представителя Граждан"
 riv_civilian_proposal_two_desc:0 "Ривет-Сити — главный источник свежей, необлученной еды в Столичной Пустоши. Это даёт нам возможность диктовать цены, ведь людям нужно есть."

 riv_beyond_the_capital:0 "За пределами Столицы"
 riv_beyond_the_capital_desc:0 "Ограничивать себя торговлей только в руинах Вашингтона было бы глупо. Чтобы стать настоящей торговой державой, нам нужно расширить наши торговые сети насколько это возможно. Но начать стоит с ближайших мест."

 riv_develop_rivet_city:0 "Развитие Ривет-Сити"
 riv_develop_rivet_city_desc:0 "Ривет-Сити - замечательный город, но его всегда можно сделать еще лучше. Для обеспечения нашей безопасности и процветания мы должны продолжать развивать город и убедиться, что все блестит и (как) новое."

 riv_church_of_saint_monica:0 "Церковь Святой Моники"
 riv_church_of_saint_monica_desc:0 "Важным и постоянным учреждением Ривет-Сити является Церковь Святой Моники, которая заботится о наших духовных нуждах. Хотя отец Клиффорд делает почетное дело, поддерживая её самостоятельно, фокус на её красоте наверняка порадует его и Святую Монику."

 riv_capital_preservation_society:0 "Общество по сохранению Столицы"
 riv_capital_preservation_society_desc:0 "Общество по сохранению столицы было создано Авраамом Вашингтоном в попытке сохранить память о чудесном обществе, которое существовало до Великой Войны. Хотя его энтузиазм, возможно, превосходит его знания, это важное напоминание о наших корнях."

 riv_marketplace_refurbishment:0 "Реконструкция рынка"
 riv_marketplace_refurbishment_desc:0 "Рынок функционален, но не идеален. Везде мусор, коррозия на стенах и странный запах. С небольшими усилиями мы могли бы его прибрать, построить более прочные прилавки и привлечь больше покупателей, чем когда-либо."

 riv_clean_up_the_hangar_deck:0 "Уборка на Ангарной Палубе"
 riv_clean_up_the_hangar_deck_desc:0 "Самые бедные и худшие среди нашего общества оказываются на Ангарной Палубе, где они страдают от низкого качества условий жизни и коррозии металла. После уборки палуб и помощи с наиболее серьезными проблемами мы можем начать улучшать их положение."

 riv_lab_modernisation:0 "Модернизация лабораторий"
 riv_lab_modernisation_desc:0 "Наши лаборатории когда-то были современными, но с тех пор прошло много времени. Они все еще гораздо более передовые, чем практически все в Пустоши, но им потребуется вложения, чтобы оставаться современными. Относительно говоря."

 riv_advanced_hydroponics:0 "Продвинутая гидропоника"
 riv_advanced_hydroponics_desc:0 "Одной из самых важных областей для исследований и коммерческих отраслей в Ривет-Сити является её система гидропоники. С её помощью мы можем выращивать свежую пищу для торговли и потребления. Расширяя нашу гидропонику, мы можем убедиться, что еды хватит на всех."

 riv_civilian_proposal_one:0 "Предложение представителя Граждан"
 riv_civilian_proposal_one_desc:0 "Гражданский представитель представляет практически всех, кто не входит в состав сил безопасности или научной группы. Эта обширная сфера ответственности постоянно ставит их перед сложным выбором. Вопросы о налогах, росте торговли или о том, где находятся несколько корабельных инженеров всегда у него на уме."

 riv_expand_caravan_companies:0 "Расширение Караванных Компаний"
 riv_expand_caravan_companies_desc:0 "Наши караванные компании в конечном итоге формируют основу нашей экономики. Предоставляя некоторые субсидии и стимулы, мы можем позволить им стать еще более процветающими источниками дохода."

 riv_look_outside_rivet_city:0 "За пределами Ривет-Сити"
 riv_look_outside_rivet_city_desc:0 "Мы не можем просто ограничивать себя тем, что находится внутри корабля, нам нужно расширить промышленность на всей нашей территории. В конце концов, граждане самого города не единственные, кто нуждается в работе."

 riv_reduce_import_reliance:0 "Снижение зависимости от Импорта"
 riv_reduce_import_reliance_desc:0 "Разведка и развитие территории вокруг Ривет-Сити позволит нам обеспечить наши процветающие караванные компании максимальным доходом, потратив как можно меньше на другие импортные товары."

 riv_broad_market_investments:0 "Инвестирование в широту Рынка"
 riv_broad_market_investments_desc:0 "Рынок Ривет-Сити был одним из крупнейших в Столичной Пустоши. При грамотных инвестициях он может стать крупнейшим в послевоенной Америке!"

 riv_increase_science_funding:0 "Финансирование науки"
 riv_increase_science_funding_desc:0 "Наука является одной из самых важных особенностей Ривет-Сити, наши ученые являются самыми передовыми в пустоши - хотя, у Братства и Анклава может быть силовая броня, но у нас самые передовые гражданские технологии!"

 riv_wildlife_study:0 "Изучение дикой природы"
 riv_wildlife_study_desc:0 "Наблюдая за мутантной 'дикой природой', мы можем узнать, как жизнь адаптировалась к Пустоши. Не секрет, что они лучше приспособлены к окружающей среде, чем мы... в основном люди."

 riv_mirelurk_study:0 "Изучение Болотников"
 riv_mirelurk_study_desc:0 "Болотники повсюду, когда ты живешь на побережье. Естественно, это делает их очень легко наблюдаемыми из Ривет-Сити. Они не только могут научить нас плавать, их панцири также могут стать довольно неплохой временной броней."

 riv_super_mutant_observation:0 "Наблюдение за Супермутантами"
 riv_super_mutant_observation_desc:0 "Супермутанты - эпидемия Столичной Пустоши. Они большие, опасные, но, к счастью, очень глупые. Если мы просто уделим время наблюдению за их действиями, мы должны суметь выработать более эффективные тактики для их уничтожения."

 riv_wildlife_defence_systems:0 "Системы защиты от Дикой Природы"
 riv_wildlife_defence_systems_desc:0 "Даже в городе с мощным оборонительным положением, как у нас, мы должны иметь дело с частыми нападениями местных мутантов, монстров и болотников. Турели и лучшие оборонительные позиции позволят нашим солдатам более эффективно справляться с этими угрозами."

 riv_science_proposal_two:0 "Предложение Научного представителя"
 riv_science_proposal_two_desc:0 "Несмотря на то, что научный представитель сосредоточен в основном на исследованиях, ему часто приходится высказывать своё мнение и по другим вопросам. Безопасность города важна для всех, и иногда это означает принятие решений, которые негативно сказываются на работе научного отдела."

 riv_water_purification_tests:0 "Тесты по очистке воды"
 riv_water_purification_tests_desc:0 "Ли по-прежнему удивляется возможностям, которые предоставляет проект «Чистота»... Неужели это слишком много, попросить провести несколько простых тестов для разработки технологии очистки воды?"

 riv_fusion_power_theory:0 "Теория Ядерной Энергии"
 riv_fusion_power_theory_desc:0 "Энергия всегда ценный ресурс в Пустоши. Разработка эффективных ядерных электростанций потребует еще больше энергии, так что нам лучше начать с этого."

 riv_sophisticated_hydroponics:0 "Сложные гидропонные системы"
 riv_sophisticated_hydroponics_desc:0 "Мы, возможно, единственная нация в Столичной Пустоши, обладающая хоть каким-то приличным уровнем развития сельского хозяйства. Давайте укрепим наше уже значительное преимущество."

 riv_advanced_industrial_applications:0 "Применение продвинутой промышленности"
 riv_advanced_industrial_applications_desc:0 "Использовать то, что мы узнали, для продвижения еще дальше - простейшее дело. Мы будем завистью всего Восточного Побережья."

 riv_increase_food_production:0 "Увеличить производство продуктов"
 riv_increase_food_production_desc:0 "Наше продовольствие - самое чистое и здоровое в Столичной Пустоши и приносит нам большое богатство. Когда наши ученые развивают наши сельскохозяйственные объекты еще дальше, мы зарабатываем больше крышек."

 riv_inspect_planes:0 "Инспекция самолётов"
 riv_inspect_planes_desc:0 "Ривет-Сити, построенный на авианосце, имеет в запасе множество самолетов. Эти самолеты старые, заржавевшие, и большинство из них бесполезны. Большинство. Мы, возможно, сможем разобрать их на детали, чтобы восстановить несколько самолетов и узнать немного о том, как они были сделаны."

 riv_finish_project_purity:0 "Завершить проект «Чистота»"
 riv_finish_project_purity_desc:0 "Я есмь Альфа и Омега, начало и конец. Жаждущему дам даром, от источника воды живой.\n\nМечта Ли почти сбылась! Если мы завершим проект «Чистота», мы станем безоговорочными хозяевами Вашингтона."

 riv_fight_the_red_lung:0 "Борьба с Красным Лёгким"
 riv_fight_the_red_lung_desc:0 "Красное Лёгкое - это бич для жителей Ривет-Сити. Ржавчина и пыль уничтожают лёгкие граждан. Понадобится скоординированное усилие, чтобы навсегда покончить с угрозой Красного Лёгкого."

 riv_develop_a_vaccine:0 "Разработать вакцину"
 riv_develop_a_vaccine_desc:0 "Вакцина - лучшее долгосрочное решение для борьбы с Красным Лёгким и спасения наших граждан от её последствий. Это потребует много усилий и отвлечет наше внимание от других областей исследований, но это лучший шаг, который мы можем предпринять."

 riv_clear_out_the_rust:0 "Убрать ржавчину"
 riv_clear_out_the_rust_desc:0 "Это потребует много усилий, но удаление и замена всей ржавой металлической поверхности, которую мы сможем найти в Ривет-Сити, значительно снизит воздействие Красного Лёгкого на здоровье."

 riv_happy_and_healthy:0 "Счастливые и Здоровые"
 riv_happy_and_healthy_desc:0 "Мы сделали это! Мы сумели побороть Красное Лёгкое и разработать вакцину. Полностью внедрив её и сделав последнее усилие по борьбе с ржавчиной в городе, мы наконец победим это бедствие однажды и навсегда."

 riv_science_proposal_one:0 "Предложение Научного представителя"
 riv_science_proposal_one_desc:0 "У научного представителя всегда на уме много всего. Каких учёных принимать в отдел? Что делать с растущими ценами на антирадин? Кто эти железнодорожники, о которых мы постоянно слышим?"

 riv_expanding_the_science_team:0 "Расширение научной команды"
 riv_expanding_the_science_team_desc:0 "Ривет-Сити был прежде всего исследовательским центром для ведущих учёных Столичной Пустоши. Чтобы наш город процветал в трудные времена, мы должны всегда помнить о своих корнях и отдавать приоритет научному прогрессу!"

 riv_war_on_the_horizon:0 "Война на горизонте"
 riv_war_on_the_horizon_desc:0 "Дела в Вашингтоне накаляются. С захватом проекта «Чистота» нам стало ясно, что две крупнейшие силы в Столичной Пустоши, Анклав и Братство Стали, готовятся к полномасштабной войне. Тот, кто победит, вероятно, определит облик Пустоши, поэтому мы должны убедиться, что это будут те, кто наиболее благоприятно относится к нам: Братство."

 riv_support_the_brotherhood:0 "Поддержать Братство"
 riv_support_the_brotherhood_desc:0 "Совет решил, что мы должны поддержать Братство в предстоящем противостоянии. Хотя нам нужно быть осторожными, прежде чем отправлять наших солдат в бой, мы можем начать, используя одно из наших самых больших преимуществ для Братства: нашу экономику."

 riv_the_war_at_home:0 "Война на Родине"
 riv_the_war_at_home_desc:0 "Мы не готовы к масштабу войны между Анклавом и Братством, и нам нужно обеспечить, чтобы, если случится худшее и в нашу страну вторгнутся, мы сможем выставить достаточно солдат, чтобы сдержать их. Нет ничего, что старая добрая пропаганда не могла бы решить."

 riv_prepare_for_the_enclave:0 "Подготовиться к Анклаву"
 riv_prepare_for_the_enclave_desc:0 "И Анклав, и Братство известны своей отличительной силовой броней, что является настоящим испытанием для наших солдат. Работая над противотанковым оборудованием и гарантируя, что мы должны быть правильно подготовлены, мы сможем вскрыть эти консервные банки и добраться до солдат внутри."

 riv_in_any_way_we_can:0 "Всем чем можем"
 riv_in_any_way_we_can_desc:0 "Откладывать это больше нельзя: Братству нужна наша помощь. Пришло время отправить добровольцев сражаться за Братство - хотя полное вовлечение в войну может подвергнуть опасности город, мы можем убедиться, что шансы Братства станут намного лучше."

 riv_stay_out_of_it:0 "Остаться в стороне"
 riv_stay_out_of_it_desc:0 "Война слишком рискованна. Мы не можем позволить себе жертвовать жизнями граждан Ривет-Сити. Если победит Братство, то мы в безопасности. Если Братство проиграет, нам понадобится каждый солдат, и это было бы все равно потерей. Ривет-Сити останется нейтральной."

 riv_double_down_on_research:0 "Удвоить усилия в исследованиях"
 riv_double_down_on_research_desc:0 "Эта война отвлекает как Анклав, так и Братство, которые утверждают, что являются технологическими гигантами. Но пока они сражаются, мы можем убедиться, что у нас будут самые передовые технологии."

 riv_security_for_trade_routes:0 "Безопасность торговых маршрутов"
 riv_security_for_trade_routes_desc:0 "Слышали новость? Идет война. Наши торговые маршруты под угрозой, и караваны подвергаются высокому риску рейдов или еще хуже. Наша силовая структура, вместо того чтобы быть брошенной в какую-то бессмысленную войну, может быть использована там, где это действительно важно."

 riv_take_in_refugees:0 "Принять беженцев"
 riv_take_in_refugees_desc:0 "Вполне понятно, что многим людям не нравится война в Пустоши, и они бегут из зон боевых действий в более безопасные места. Для многих это Ривет-Сити."

 riv_enclave_victory:0 "Проект «Чистота»: Победа Анклава"
 riv_enclave_victory_desc:0 "Катастрофа! Анклав победил Братство, и теперь Вашингтон находится под их контролем. Теперь мы и несколько других оплотов против их тирании должны готовиться, сколько сможем, пока неизбежное не придет."

 riv_panicked_preparations:0 "Панические подготовки"
 riv_panicked_preparations_desc:0 "Самый простой способ подготовиться к потенциальному вторжению Анклава - это построить укрепления. Много. По всей нашей границе."

 riv_secure_water_source:0 "Защита Независимого источника воды"
 riv_secure_water_source_desc:0 "С печальной победой Анклава наши поставки прекращаются. С их контролем над проектом «Чистота» величайшая надежда на чистую воду становится орудием уничтожения. Нам нужно очистить все, что мы можем сами."

 riv_seek_friends:0 "Поиск друзей"
 riv_seek_friends_desc:0 "Мы не единственная другая выжившая нация в Вашингтоне. В Столичной Пустоши есть не только Анклав и Братство. Теперь мы должны обратиться к этим нациям за помощью, даже рейдерам."

 riv_emergency_conscription:0 "Чрезвычайный призыв"
 riv_emergency_conscription_desc:0 "Каждый солдат, которого мы можем получить для борьбы с Анклавом, необходим. Мы не можем позволить себе ничего меньше, чем их уничтожение."

 riv_isolate_trade_network:0 "Изолировать торговую сеть"
 riv_isolate_trade_network_desc:0 "Хотя прекращение торговли опасно, мы не можем позволить себе отправить патрули и солдат, необходимых для обеспечения безопасности их путешествий. На данный момент торговля должна прекратиться."

 riv_outside_the_capital:0 "За пределами Столицы"
 riv_outside_the_capital_desc:0 "На данный момент мы не можем выбирать себе союзников. Любой, кто может помочь нам, является активом, который мы должны использовать, даже те, кто далеко от дома. Мы должны искать помощи за пределами Вашингтона."

 riv_to_deal_with_the_enclave:0 "Чтобы разобраться с Анклавом..."
 riv_to_deal_with_the_enclave_desc:0 "Анклав показал себя великой силой в Столичной Пустоши. Если мы хотим выжить, нам, возможно, придётся научиться жить с ними бок о бок."

 riv_preemptive_strike:0 "Превентивный удар"
 riv_preemptive_strike_desc:0 "Хотя это очень рискованно, чем дольше мы медлим, тем больше времени у Анклава укрепить свое хрупкое владение Вашингтоном. Если мы собираемся ударить, мы должны сделать это как можно скорее."

 riv_sit_tight:0 "Сиди тихо"
 riv_sit_tight_desc:0 "Нападение на Анклав первыми лишь пожертвует нашим оборонительным преимуществом. Мы должны укрепиться там, где мы находимся. Вскоре они смогут нанести удар, и их солдаты в силовой броне разобьются о наши оборонительные стены, как волны о скалу."

 riv_the_west_has_fallen:0 "Анклав пал"
 riv_the_west_has_fallen_desc:0 "Анклав пал. Миллиарды должны погибнуть."

 riv_open_up:0 "Открыться"
 riv_open_up_desc:0 "Теперь, когда с Анклавом покончено, мы можем себе позволить снова торговать. Фактически, мы едва можем позволить себе не делать этого."

 riv_all_well_in_dc:0 "Мир в Вашингтоне"
 riv_all_well_in_dc_desc:0 "В Вашингтоне вновь восстановлен мир. Мы в безопасности от Анклава, и теперь мы можем начать процветать снова."

 riv_never_again:0 "Никогда больше"
 riv_never_again_desc:0 "Мы не можем позволить повторения этого. Мы должны обеспечить, чтобы ни одна другая нация не могла снова навязывать свою власть над Вашингтоном. Мы должны заботиться об этом саде."

 riv_come_to_an_agreement:0 "Придти к Соглашению"
 riv_come_to_an_agreement_desc:0 "Август Отэм у власти в Анклаве, и хотя он авторитарный диктатор, стремящийся к власти, он не ищет нашего истребления. Давайте надеяться, что разум возьмет верх."

 riv_enclave_research:0 "Исследования Анклава"
 riv_enclave_research_desc:0 "Анклав имеет довольно... свободные моральные принципы, когда речь идет о методологии исследований. Мы бы никогда так не поступили... но, быть может, мы можем подчерпнуть некоторое вдохновение?"

 riv_old_world_tech:0 "Технологии Старого Мира"
 riv_old_world_tech_desc:0 "Одно из преимуществ Анклава - это детальные и обширные довоенные документы. Они озабочены старым миром. Мы можем просматривать эти документы и использовать их для наших исследований."

 riv_future_of_war:0 "Войны Будущего"
 riv_future_of_war_desc:0 "Силовая броня, хотя и невероятно передовая и очевидно желаема, была чем-то, что нам не удавалось разработать, не имея довоенных костюмов для изучения. Но теперь у нас их много."

 riv_the_old_world_born_anew:0 "Перерождение Старого Мира"
 riv_the_old_world_born_anew_desc:0 "Старый Мир вернулся в Вашингтон. Американское правительство (или его более тираническая версия) восстановило столицу Пустошей, и мы - его яркий факел науки и технологии. Будущее выглядит светлым (за исключением мутантов)."

 riv_brotherhood_victory:0 "Проект «Чистота»: Победа Братства"
 riv_brotherhood_victory_desc:0 "Братство одержало победу в битве против Анклава! Очевидно, что это гораздо более желательный вариант... вопрос в том, что нам делать теперь?"

 riv_seek_an_accomodation:0 "Поиск Согласия"
 riv_seek_an_accomodation_desc:0 "Братство кажется разумными людьми. С небольшой удачей они откроются для расширения связей, и мы сможем работать вместе для процветания Столичной Пустоши. Войны уже длились достаточно долго."

 riv_the_fleet_of_dc:0 "Флот Вашингтона"
 riv_the_fleet_of_dc_desc:0 "Теперь, когда мы с Братством союзники, нам уже не нужно слишком беспокоиться о войне. По крайней мере, на суше. Мы должны переключить свое внимание на подготовку к войне на море. Братство не может быть везде."

 riv_he_who_is_athirst:0 "Дай тому, кто жаждет"
 riv_he_who_is_athirst_desc:0 "Теперь, когда проект «Чистота» завершен, а Столичная Пустошь снова имеет чистую воду, возникла новая проблема. Логистика. Хотя объем чистой воды, производимой, огромен, она не доступна для большинства поселений. Наши торговые караваны могут начать доставку воды в отдаленные поселения, приближая торговую сеть."

 riv_brotherhood_material_acquisition:0 "Приобретение материалов Братства"
 riv_brotherhood_material_acquisition_desc:0 "С нашими новыми могущественными союзниками просить дополнительные ресурсы - это просто. В конце концов, мы остаемся научным центром Столичной Пустоши, и с их дальнейшим финансированием мы все пожнем плоды."

 riv_brotherhood_conscription:0 "Повинность Братства"
 riv_brotherhood_conscription_desc:0 "Работа с Братством не только преимущества. Братство постоянно нуждается в свежих солдатах и запросило добровольцев. Небольшая цена за нашу дальнейшую безопасность."

 riv_begin_power_armour_production:0 "Начать производство Силовой Брони"
 riv_begin_power_armour_production_desc:0 "Силовая Броня. Основное средство вооружения сил Братства, и когда-то самый важный элемент сил Анклава. Это мощное и пугающее оружие, которое ускользало от нашего понимания. Однако Братство теперь готово помочь нам."

 riv_brotherhood_integration:0 "Интеграция в Братство"
 riv_brotherhood_integration_desc:0 "С изменением баланса сил на Восточном Побережье становится ясно, что нам теперь действительно нужно полностью интегрироваться в структуру Братства. Только через взаимную выгоду мы сможем прогрессировать. Ad Victoriam!"

 riv_equal_partner:0 "Равноправный Партнёр"
 riv_equal_partner_desc:0 "Братство, как организация несколько таинственна и загадочна - и таким оно и должно остаться. Нашей лучшей защитой всегда будет наша собственная независимость, и мы не можем позволить себе её потерять."

 riv_withdraw_and_isolate:0 "Отступить и Изолироваться"
 riv_withdraw_and_isolate_desc:0 "Братство может быть меньшим злом по сравнению с Анклавом... но они все еще зло. Сотрудничество с ними может означать неприемлемую потерю нашего суверенитета. Мы должны выработать свой собственный путь, и только тогда мы получим истинную безопасность без компромиссов."

 riv_secure_trade_routes:0 "Защита Торговых Путей"
 riv_secure_trade_routes_desc:0 "Наши торговые маршруты по-прежнему небезопасны, несмотря на поражение Анклава. Рейдеры, гули и супермутанты все еще бродят по Пустоши, не говоря уже о тех солдатах Анклава, которые остаются расположенными в Пустоши. Пришло время обеспечить безопасность наших торговых маршрутов. Полностью."

 riv_stamp_out_enclave_remnants:0 "Растоптать остатки Анклава"
 riv_stamp_out_enclave_remnants_desc:0 "Остатки Анклава все еще находятся где-то в Пустоши, теперь они мало чем отличаются от прославленных, суприматистов рейдеров. С некоторыми усилиями мы можем истребить их навсегда."

 riv_independent_water_source:0 "Независимый Источник Воды"
 riv_independent_water_source_desc:0 "С проектом «Чистота», находящимся под контролем Братства, мы больше не можем полагаться на него в качестве источника воды. Нам нужно обеспечить себя собственной водой, а затем мы сможем процветать без их помощи."

 riv_develop_trade_interests:0 "Развивать торговые интересы"
 riv_develop_trade_interests_desc:0 "Несмотря на политическую изоляцию, мы по-прежнему являемся торговым городом и должны продолжать торговать. С небольшими инвестициями мы можем обеспечить непрерывность торговли без ущерба."

 riv_preventative_medicine:0 "«Профилактическая Медицина»"
 riv_preventative_medicine_desc:0 "Хотя это маловероятно, Братство может потребовать наше объединение с их расширяющейся нацией, нравится нам это или нет. Постройка фортов вдоль границ нашей контролируемой территории может не гарантировать, что они не попытаются, но это может отпугнуть их, по крайней мере, на какое-то время."

 riv_take_to_the_seas:0 "Выйти в Море"
 riv_take_to_the_seas_desc:0 "Поскольку сушу вокруг контролируется Братством и их союзниками, лучший способ обеспечить безопасность наших торговых маршрутов - выйти к морю. В конце концов, мы находимся на старом авианосце."

 riv_military_independence:0 "Военная Независимость"
 riv_military_independence_desc:0 "С Братством на нашей границе нам нужно убедиться, что наши вооруженные силы в полном порядке. Расширение нашего опыта различными методами борьбы позволит нам определить, как лучше всего подготовиться."

 riv_civilian_commitment:0 "Гражданские обязательства"
 riv_civilian_commitment_desc:0 "Мы не можем бесконечно готовиться к войне, наш гражданский сектор тоже должен быть под присмотром."

 riv_dc_free_city:0 "Свободный Город Вашингтона"
 riv_dc_free_city_desc:0 "Даже если Братство захватит остальную часть Вашингтона, мы останемся свободным городом Пустоши. Настоящим маяком торговли и науки, и бастионом безопасности."

 riv_end_oppression_in_dc_forever:0 "Конец угнетения в Вашингтоне"
 riv_end_oppression_in_dc_forever_desc:0 "Мы не можем просто позволить Братству взять остальную часть Вашингтона. Хотя они лучше, чем мог бы быть Анклав, их жесткий военный строй и авторитарные черты означают, что Столичная Пустошь не будет действительно процветать. Нам нужно покончить с Братством, ради блага Пустоши."

 riv_rivet_city_victory:0 "Плоды проекта «Чистота»"
 riv_rivet_city_victory_desc:0 "Нам удалось вытеснить внешние силы из проекта «Чистота» и заявить о своих правах на объект. С этим очистителем под нашим контролем возможности безграничны."

 riv_propose_alliance_to_brotherhood:0 "Предложить союз Братству"
 riv_propose_alliance_to_brotherhood_desc:0 "Хотя проект «Чистота» находится под нашим контролем, мы пока (или еще?) не являемся военной силой. Мы не можем позволить себе сражаться с остальной частью Пустоши в одиночку. Братство Стали хотя бы отчасти разделяет наши взгляды, особенно по отношению к Анклаву, и работая вместе, мы можем обеспечить процветание Вашингтона."

 riv_prepare_to_deal_with_the_enclave:0 "Подготовиться к борьбе с Анклавом"
 riv_prepare_to_deal_with_the_enclave_desc:0 "Анклав имеет отличительную черту: их передовую силовую броню. Силовая броня сложна для обычного солдата, но достаточно крупнокалиберных снайперская винтовка, и это просто еще один кусок металла. Это означает, что нам нужно производить их как можно больше."

 riv_expand_security_force:0 "Расширение Сил Безопасности"
 riv_expand_security_force_desc:0 "Хотя это не идеально, нам придется привлечь больше граждан в охранную службу, что означает ограниченную мобилизацию. Люди могут возмущаться этим, но это необходимо для обеспечения нашей защиты."

 riv_stockpile_equipment:0 "Запасное Снаряжение"
 riv_stockpile_equipment_desc:0 "Любая война с более крупными фракциями в Вашингтоне потребует большого количества снаряжения, которого у нас недостаточно. Мы должны собрать как можно больше оружия так быстро, как можем."

 riv_military_exercises:0 "Военные учения"
 riv_military_exercises_desc:0 "Наши Силы Безопасности плохо подготовлены и не готовы к ведению полномасштабных боевых действий, вместо этого она сосредоточена на защите нашего города от рейдеров, диких гулей, супермутантов, болотников и всего, что угрожает нам. Нам потребуется значительное изменение доктрины, чтобы подготовиться к полномасштабной войне."

 riv_save_the_wasteland:0 "Спасти Пустошь"
 riv_save_the_wasteland_desc:0 "Наступает момент, когда нужно перестать готовиться и начать действовать - мы не можем откладывать неизбежное вечно. Анклав должен гореть, а Вашингтон должен быть свободен."

 riv_trade_water:0 "Вода жизни"
 riv_trade_water_desc:0 "После завершения проекта «Чистота» мы стали бесспорным хозяином не только свежих продуктов, но и чистой воды в Вашингтоне. Мы можем использовать это, чтобы связать поселения ближе к нам, пока мы все не процветем вместе. Начинается величайшая эпоха для Вашингтона."

 riv_caravans_to_arefu:0 "Караваны в Арефу"
 riv_caravans_to_arefu_desc:0 "Арефу - небольшое поселение, ранее оставленное без внимания нашими торговцами. Правда, у них немного, чем можно торговать, но как относительно важное близкое поселение мы должны начать приносить им воду тоже."

 riv_only_civilised_place:0 "Единственное цивилизованное место"
 riv_only_civilised_place_desc:0 "Республика Дэйва - довольно странное и маленькое поселение, отсюда и наше прежнее отсутствие торговых отношений с ними. Они прошли через ряд авторитарных правительств, нынешнюю итерацию возглавляет человек по имени Дэйв. Даже мегаломаньякам нужна чистая вода."

 riv_display_generosity:0 "Проявление Щедрости"
 riv_display_generosity_desc:0 "У нас более чем достаточно того, чем можно поделиться. Распространение с любовью ещё больше улучшит наши отношения."

 riv_strike_a_deal:0 "Достигнуть соглашения"
 riv_strike_a_deal_desc:0 "Дальше на востоке лежат начала великой торговой империи - империи, которая, должно быть, знает, что ей придется сократиться, если что-то пойдет не так в Вашингтоне. Мы должны установить взаимовыгодные отношения с этими нациями: с нашей защитой и их крышками мы все можем процветать."

 riv_dc_problems_dc_solutions:0 "Столичные проблемы, Столичное решение"
 riv_dc_problems_dc_solutions_desc:0 "Мы не должны вовлекать в наши конфликты стороны вне Вашингтона. Хотя нам нужна поддержка, нам намного выгоднее искать её у уже находящихся в Вашингтоне наемников. Несколько крышек привлекут их на нашу сторону."

 riv_caps_everywhere:0 "Крышки повсюду!"
 riv_caps_everywhere_desc:0 "При свободном потоке торговли и поступлении крышек мы заработали значительное состояние. Трижды ура за свободную торговлю!"

 riv_safety_in_dc:0 "Безопасность в Вашингтоне"
 riv_safety_in_dc_desc:0 "С победой над Анклавом, Вашингтон наконец-то в безопасности... и мы здесь правим."

 riv_no_gods_no_masters:0 "Без богов, без Хозяев"
 riv_no_gods_no_masters_desc:0 "Больше никогда военные силы Анклава и Братства Стали не будут угрожать безопасности и процветанию Столичной Пустоши. Появилась новая сила, посвятившая себя принципам знаний и торговли: Ривет-Сити."

 riv_no_raiders_in_dc:0 "Никаких рейдеров в Вашингтоне"
 riv_no_raiders_in_dc_desc:0 "В Вашингтоне слишком долго водились рейдеры, работорговцы и подобная тварь. Это будет непросто, но устранение всех их со Столичной Пустоши принесет большое процветание для всех."

 riv_consolidate_territory:0 "Объединение территории"
 riv_consolidate_territory_desc:0 "Эвергрин Миллс раньше был основным местом вылазок рейдеров в Вашингтоне. Теперь, когда рейдеры уничтожены, остался только небольшой поселок. Перенимая наши законы и включаясь в нашу прибыльную торговую сеть, они скоро увидят свет."

 riv_end_cannibalism:0 "Покончить с каннибализмом"
 riv_end_cannibalism_desc:0 "Хотя Андейл кажется достаточно приятным местом для посещения, к нам дошли темные слухи об их извращенной природе. Кровавые выжившие и разочарованные граждане пришли к нам, рассказывая о, пожалуй, самом большом ужасе Вашингтона: каннибализме."

 riv_secure_trade_from_raiders:0 "Защитить торговлю от Рейдеров"
 riv_secure_trade_from_raiders_desc:0 "Несмотря на уничтожение крупнейших лагерей рейдеров, несколько рассеянных банд все еще бродят по Столичной Пустоше. Уничтожить их всех потребует десятилетий поиска в каждом здании, метро и бункере, но нужно с чего-то начинать."

 riv_brotherhood_wannabes:0 "Братья-подражатели"
 riv_brotherhood_wannabes_desc:0 "Изгои из Братства Стали - это свирепая шайка. Изгнанные из уже военного Братства, они представляют тех, кто наиболее яростно противостоит обитателям Пустоши. Они не хотят ничего, кроме как отступить и стрелять в любого, кто приблизится. Мы стреляем первыми."

 riv_secure_the_settlements:0 "Обеспечить безопасность поселений"
 riv_secure_the_settlements_desc:0 "Расширяя нашу торговую сеть и принося воду и процветание в Пустоши, мы быстро внедримся к нашим новым гражданам. Скоро они забудут, что когда-то были независимыми от Ривет-Сити!"

 riv_new_talent:0 "Новые таланты"
 riv_new_talent_desc:0 "По всей Пустоши много талантливых и умных людей, даже тех, кто не был должным образом интегрирован в Ривет-Сити. Некоторые из них теперь видят нашу молодую страну как маяк надежды, и мы рады их приветствовать."

 riv_mercenaries_no_more:0 "Больше не Наёмники"
 riv_mercenaries_no_more_desc:0 "Компания «Коготь» - жестокая шайка наёмников, которая стремится извлечь прибыль, даже при самых недобросовестных методах. Хотя они были полезны нам в прошлом, мы никогда не почувствуем себя в безопасности, пока они остаются активным образованием."

 riv_regulate_the_wasteland:0 "Регулирование Пустошей"
 riv_regulate_the_wasteland_desc:0 "После уничтожения свирепой и жестокой Компании «Коготь» вперед вышла группа, известная как Регуляторы. Ранее они посвящали себя защите поселений и цивилизации, но видя, как повеяло ветром, и предложили помочь нам защищаться."

 riv_control_secured:0 "Контроль Обеспечен"
 riv_control_secured_desc:0 "Наконец-то контроль над Вашингтоном твердо и надежно наш. Больше никогда жители Столичной Пустоши не будут угрожать нашему городу."

 riv_capitol_centre_of_trade:0 "Столица, Центр Торговли"
 riv_capitol_centre_of_trade_desc:0 "Теперь торговля может свободно протекать по всей Столичной Пустоши без угрозы Анклава или Братства."

 riv_find_origins_of_super_mutants:0 "Поиски Логова Супермутантов"
 riv_find_origins_of_super_mutants_desc:0 "Несмотря на поражение двух самых сильных военных сил в Столичной Пустоши, супермутанты остаются большой угрозой и достаточно нахальной, чтобы атаковать сам Ривет-Сити. Мы должны выяснить, откуда они идут."

 riv_talk_to_little_lamplight:0 "Разговор с Литл-Лэмплайт"
 riv_talk_to_little_lamplight_desc:0 "Похоже, что супермутанты приходят откуда-то неподалеку от поселения Литл-Лэмплайт. Странное поселение, Литл-Лэмплайт полностью населенное детьми. Интересно, откуда они берутся."

 riv_all_gone:0 "Всё закончилось"
 riv_all_gone_desc:0 "Супермутанты вскоре вычищены из Вашингтона. Литл-Лэмплайт указал нам путь к Убежищу 87, и для уничтожения их понадобится всего лишь небольшое вторжение. Прощайте, супермутанты."

 riv_capitalise_trade_connections:0 "Извлечь выгоду из Торговых Связей"
 riv_capitalise_trade_connections_desc:0 "Наши торговые связи в Вашингтоне приносят нам огромное богатство. Просто инвестируя некоторую избыточную прибыль, мы можем обеспечить себя всем, что когда-либо понадобится."

 riv_float_the_cap_currency:0 "Плавающая валюта"
 riv_float_the_cap_currency_desc:0 "Крышки как валюта изначально были обеспечены запасами воды, абсолютно необходимой в столичной пустоши. Однако сейчас, когда на рынок поступает такое количество воды, крышки грозят катастрофически обесцениться. Плавающий курс позволит нам установить, что крышки обеспечены нашей собственной доброжелательностью и влиянием."

 riv_stabilise_inflation:0 "Стабилизация Инфляции"
 riv_stabilise_inflation_desc:0 "Чтобы всё было просто, лучше всего держать крышки обеспеченными водой. Однако нам придется предпринять некоторые крайние меры, чтобы убедиться, что они не подвергнутся серьезной инфляции."

 riv_infrastructure_development:0 "Развитие Инфраструктуры"
 riv_infrastructure_development_desc:0 "Мы так сосредоточены на том, чтобы наш дом оставался на плаву, что часто пренебрегаем расширением. Теперь этому конец, и совет наймёт рабочих, чтобы снести некоторые ржавые переборки и возвести стены за пределами корабля."

 riv_dc_prospers:0 "Процветание Вашингтона"
 riv_dc_prospers_desc:0 "Ривет-Сити — яркий пример для всех жителей Столичной Пустоши, демонстрирующий, чего мы можем достичь при правильном руководстве. Наши жители наслаждаются беспрецедентной безопасностью и процветанием, о которых многие за пределами наших границ могут только мечтать!"

 riv_more_than_a_security_force:0 "Больше, чем Силы Безопасности"
 riv_more_than_a_security_force_desc:0 "Теперь, когда Ривет-Сити является доминирующей силой в Столичной Пустоши, нам нужно пересмотреть наши вооруженные силы. Быть просто силовыми структурами было вполне достаточно, когда мы были просто городом без стремлений к расширению, но сейчас требуется что-то гораздо более значительное."

 riv_appoint_officers:0 "Назначение новых офицеров"
 riv_appoint_officers_desc:0 "С новой армией приходит новая доктрина и необходимость новых офицеров. Ранее солдаты были обучены поддержанию мира, защите города и караванов от случайных нападений, но теперь нам нужны новые офицеры, способные возглавлять людей в атаке."

 riv_develop_military_techniques:0 "Разработка новых военных методов"
 riv_develop_military_techniques_desc:0 "Большинство военных формирований в Пустоши - это не просто парни с пушками. Медицинская помощь, логистическая поддержка и крупнокалиберное снаряжение необходимы для армии, надеющейся сразиться с разнообразными врагами, и нам нужно начать подготавливать свою."

 riv_military_ideas:0 "Военные Идеи"
 riv_military_ideas_desc:0 "Наша новая армия на пути к тому, чтобы стать настоящей армией Пустоши, но тактики, которые мы использовали для защиты нашего города, не будут так же применимы в более крупных конфликтах. Нам нужно переоценить и разработать новые способы сражений."

 riv_scientific_applications_for_war:0 "Применение науки в Войне"
 riv_scientific_applications_for_war_desc:0 "Прежде всего, мы являемся научным и экономическим центром с военным уклоном, а не военным центром с экономикой. Сосредоточив наших ученых на разработке нового оружия и оборудования для наших солдат, наша армия сможет превзойти большинство других наций Пустоши."

 riv_better_than_men:0 "Лучше, чем люди"
 riv_better_than_men_desc:0 "В войне есть больше возможностей, чем просто парни с пушками..."

 riv_rivets_rule_the_waves:0 "Правь, Ривет, морями!"
 riv_rivets_rule_the_waves_desc:0 "Будучи построенными на базе бывшего авианосца, естественно, у нас должен быть сильный флот."

 riv_the_open_sky_awaits:0 "Открытое небо ждет"
 riv_the_open_sky_awaits_desc:0 "С другой стороны, на авианосцах обычно размещаются самолеты. Это тоже естественное направление."

 riv_caravans_run_on_time:0 "Караваны идут вовремя"
 riv_caravans_run_on_time_desc:0 "Как все знают, наиболее частые и вероятные задержки для торговых караванов в Столичной Пустоши - это рейдеры, дикие гули, супермутанты и другие злобные и агрессивные нападающие. Однако наша армия будет защищать их, и КАРАВАНЫ БУДУТ ИДТИ ВОВРЕМЯ."

 riv_rivet_city_military:0 "Вооруженные Силы Ривет-Сити"
 riv_rivet_city_military_desc:0 "Годами наши силы безопасности были скорее небольшой армией, чем контингентом охранников. Поскольку опасности пустоши становятся всё более серьёзными, пришло время отказаться от притворства и относиться к нашим силам безопасности как к настоящим военным."

 riv_scientific_utopia:0 "Научная Утопия"
 riv_scientific_utopia_desc:0 "Ривет-Сити - самая мощная и передовая нация в Столичной Пустоши. Под нашим руководством пустошь может войти в новую эпоху прогресса и процветания, где торговля и исследования идут рука об руку. Наше будущее начинается."
