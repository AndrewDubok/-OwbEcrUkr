 RIV_outsider_influence_decision_category:0 "Влияние Ривет-Сити"
 RIV_outsider_influence_decision_category_desc:0 "Ривет-Сити теперь завершил Проект «Чистота» и стремится объединить остаток Вашингтона под своим влиянием. Они делают это тонко: принося подарки в виде воды в Пустоши и убеждая поселенцев в своих добрых намерениях. Независимо от их реальных намерений, это работает, и люди в поселениях по всему Вашингтону стремятся к большему сотрудничеству и даже интеграции с Ривет-Сити. Мы должны избавиться от их влияния. Хотя прерывание поставок воды может нанести вред нашим гражданам, мы должны защищать наш суверенитет.\n\n§OДаже тогда это может быть только началом. Если Ривет-Сити потерпит неудачу, то война может быть на горизонте.§!\n\n\nВлияние Ривет-Сити в §gМегатонне§! составляет: [RIV_megaton_influence]\n\n§YБольшой Город§! последует примеру своего крупного соседа, §gМегатонны§!.\n\n[RIV_underworld_influence]\n\nВлияние Ривет-Сити в §GОбщине Кентербери§! составляет: [RIV_canterbury_commons_influence]\n\nВлияние Ривет-Сити в §8Темпенни-Тауэр§! составляет: [RIV_tenpenny_tower_influence]\n\n[RIV_arefu_influence]\n\n[RIV_dave_influence]"


