 RIV_convince_danvers_easy_decision:0 "Убедить §OЛану Дэнверс§!"
 RIV_convince_danvers_easy_decision_desc:0 "Лана Дэнверс в настоящее время неохотно поддерживает предложение, стоящее перед Советом прямо сейчас, но просто уменьшив усилия по мобилизации, мы можем убедить ее в том, что наши люди в безопасности."
 RIV_convince_danvers_normal_decision:0 "Убедить §OЛану Дэнверс§!"
 RIV_convince_danvers_normal_decision_desc:0 "Лана Данверс в настоящее время очень неохотно поддерживает предложение, стоящее перед Советом прямо сейчас, но уменьшив усилия по мобилизации значительно, мы можем убедить ее в том, что наши люди в безопасности."

 RIV_convince_harkness_easy_decision:0 "Убедить §OХаркнесса§!"
 RIV_convince_harkness_easy_decision_desc:0 "Харкнесс не очень восторжен по поводу нашего текущего предложения, но, обещая принять менее агрессивную позицию в будущем, мы можем обеспечить его поддержку."
 RIV_convince_harkness_normal_decision:0 "Убедить §OХаркнесса§!"
 RIV_convince_harkness_normal_decision_desc:0 "Харкнесс обеспокоен нашим текущим предложением, но, обещая принять значительно менее агрессивную позицию в будущем, мы можем обеспечить его поддержку."

 RIV_convince_seagrave_easy_decision:0 "Убедить §GСигрейва Холмса§!"
 RIV_convince_seagrave_easy_decision_desc:0 "Сигрейв обеспокоен тем, как наше предложение повлияет на Ривет-Сити, но, инвестируя дополнительно в техническое обслуживание и ремонт, мы должны смочь показать, что наши намерения добры."
 RIV_convince_seagrave_normal_decision:0 "Убедить §GСигрейва Холмса§!"
 RIV_convince_seagrave_normal_decision_desc:0 "Сигрейв очень обеспокоен тем, как наше предложение повлияет на Ривет-Сити, но, значительно инвестируя дополнительно в техническое обслуживание и ремонт, мы должны смочь показать, что наши намерения добры."

 RIV_convince_bannon_easy_decision:0 "Убедить §GБэннона§!"
 RIV_convince_bannon_easy_decision_desc:0 "Бэннон считает, что текущее предложение недостаточно поддерживает его интересы. Небольшой взятка (которую он, вероятно, и так ожидает) должна показать ему преимущества."
 RIV_convince_bannon_normal_decision:0 "Убедить §GБэннона§!"
 RIV_convince_bannon_normal_decision_desc:0 "Бэннон считает, что текущее предложение противоречит его интересам. Крупная взятка (которую он, вероятно, и так ожидает) должна показать ему преимущества."

 RIV_convince_pinkerton_easy_decision:0 "Убедить §CХораса Пинкертона§!"
 RIV_convince_pinkerton_easy_decision_desc:0 "Пинкертон обеспокоен последствиями нашего текущего предложения, но, показав немного поддержки его целям, мы можем показать ему, что мы на его стороне."
 RIV_convince_pinkerton_normal_decision:0 "Убедить §CХораса Пинкертона§!"
 RIV_convince_pinkerton_normal_decision_desc:0 "Пинкертон довольно обеспокоен последствиями нашего текущего предложения, но, показав много поддержки его целям, мы можем показать ему, что мы на его стороне."

 RIV_convince_li_easy_decision:0 "Убедить §CМэдисон Ли§!"
 RIV_convince_li_easy_decision_desc:0 "Мэдисон Ли сомневается в том, в каком направлении идет наше текущее предложение, но, направив немного больше финансирования на ее научные исследования, мы можем получить ее поддержку."
 RIV_convince_li_normal_decision:0 "Убедить §CМэдисон Ли§!"
 RIV_convince_li_normal_decision_desc:0 "Мэдисон Ли обеспокоена тем, в каком направлении идет наше текущее предложение, но, направив больше финансирования на ее научные исследования, мы можем получить ее поддержку."

 RIV_convince_lily_easy_decision:0 "Убедить §CЛилиан Грейнджер§!"
 RIV_convince_lily_easy_decision_desc:0 "Лилиан сомневается в нашем текущем предложении, но, направив ей немного больше оборудования для проведения ее медицинских исследований, мы можем обеспечить ее поддержку."
