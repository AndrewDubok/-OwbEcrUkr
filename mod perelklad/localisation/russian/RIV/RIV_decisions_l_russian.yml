l_russian:
 RIV_council_decision_category:0 "Городской Совет Ривет-Сити"
 RIV_council_decision_category_desc:0 "\n                                  §YГОРОДСКОЙ СОВЕТ РИВЕТ-СИТИ§! \n\n\n\n\n\n\n\n\n\n   [RIV_council_security_representative_picture]      [RIV_council_civilian_representative_picture]      [RIV_council_science_representative_picture]\n\n\n\n\n\n\n\n\n\n [RIV_council_security_representative_name]      [RIV_council_civilian_representative_name]       [RIV_council_science_representative_name]\n           §OОхрана§!                       §GГражданский§!                        §CУчёный§!\n\nРивет-Сити управляется Советом, состоящим из трех членов, каждый из которых представляет три наиболее важные группы людей; §Oпредставитель службы безопасности§!, §Gгражданский представитель§!, и §Cнаучный представитель§!. Эти трое работают вместе, обсуждая и решая вопросы политики Ривет-Сити, и имеют право контролировать налоги, распределять финансирование и начинать общегородские программы. Каждый член Совета привносит свою точку зрения и может быть заменен путем голосования членов сектора, в который он входит.[RIV_current_decision]"
 
