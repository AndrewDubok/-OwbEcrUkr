 riv_bill_of_rights_tt:0 "§YЗакон о правах граждан Соединенных Штатов§!\n\nЗакон о правах - это документ, содержащий первые 10 поправок к Конституции Соединенных Штатов, ратифицированный в 1791 году. Он также содержит несколько других статей, однако, не все из них были ратифицированы так быстро.\n\nФактор политической власти: §G+10%§!\nПрава граждан: §G+25%§!"
 riv_constitution_tt:0 "§YКонституция Соединенных Штатов§!\n\nКонституция Соединенных Штатов определяет основные и фундаментальные законы Соединенных Штатов Америки и служит основой для их правовой и государственной системы. Она была ратифицирована в 1789 году и неоднократно правилась.\n\nПредел сдачи: §G+20%§!\nСтабильность: §G+1%§!\nАргументы Верховного суда: §R+25%§!"
 riv_declaration_of_independence_tt:0 "§YДекларация независимости Соединенных Штатов§!\n\nДекларация независимости Соединенных Штатов была написана для объявления о независимости только что объединенных 13 американских колоний от британского правления, принята 4 июля 1776 года во время американской революционной войны.\n\nАтака на национальной территории: §G+2.5%§!\nЗащита на национальной территории: §G+2.5%§!\nБританское влияние: §G-75%§!"
 riv_magna_carta_tt:0 "§YВеликая Хартия§!\n\nTВеликая Хартия была набором ограничений власти короля Англии, подписанных в 1215 году, в основном для защиты восставших баронов того времени. Однако она стала основой для правовых систем Великобритании, а затем и Соединенных Штатов.\n\nСтабильность: §G+2.5%§!\nВласть короля §G-50%§!"
 riv_monroe_doctrine_tt:0 "§YДоктрина Монро§!\n\nДоктрина Монро была представлена в 1823 году президентом Джеймсом Монро, предупреждая европейские державы не вмешиваться в дела Америк. Это поставило Америки под влияние США и повлияло на внешнюю политику на века.\n\nДрейф народа: §G+0.02§!\nМнение о торговле: §Y+5%§!\nЕвропейское вмешательство: §G-50%§!"
 riv_war_dec_on_china_tt:0 "§YДекларация войны Соединенных Штатов против Китая§!\n\nДекларация войны Соединенных Штатов против Китая была создана из-за вторжения Китая в Аляску в 2066 году, что привело к сино-американской войне, завершившейся Великой Войной. Это был последний значительный документ, принятый Конгрессом Соединенных Штатов перед его окончанием.\n\nПоддержка войны: §G+5%§!\nКоммунизм на американской почве: §G-90%§!"
 riv_war_dec_on_germany_tt:0 "§YДекларация войны Соединенных Штатов против Германии§!\n\nВ 1941 году Конгресс Соединенных Штатов объявил войну нацистской Германии под воздействием президента Франклина Д. Рузвельта. Это отметило вступление Соединенных Штатов в европейский театр Второй мировой войны.\n\nФактор мобилизации: §G+2%§!\nСрок жизни нацистской Германии: §G-90%§!"
 riv_gettysburg_address_tt:0 "§YАдрес в Геттисбурге§!\n\nАдрес в Геттисбурге - это речь, произнесенная Авраамом Линкольном в 1863 году, через несколько месяцев после решающей битвы при Геттисбурге. Речь была произнесена в память о тех, кто погиб в битве, и о войне в целом.\n\nСтабильность: §G+1%§!\nПоддержка войны: §G+1%§!\nВыступления, заимствованные у Линкольна: §G+300%§!"

