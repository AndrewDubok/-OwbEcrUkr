 RIV_enclave_decision:0 "\n\n\nРешение, которое в настоящее время на столе у Совета, имеет потенциал стать величайшим решением, которое им пришлось принимать за десятилетия: вопрос вмешательства в нарастающий конфликт между §YБратством Стали§! и §BАнклавом§!. Мы не можем знать, что каждая из наций задумала для нас, но мы знаем, что §BАнклав§! нападала на наши караваны и угрожала нашим гражданам. Среди двух вариантов, кажется, что §YБратство§! имеет лучшие намерения к нам, но это не значит, что мы должны вмешиваться на их стороне. Наш совет остается разделенным по этому вопросу.\n\n§OПредставитель службы безопасности§! [RIV_security_representative_view_enclave]\n§GГражданский представитель§! [RIV_civilian_representative_view_enclave]\n§CНаучный представитель§! [RIV_science_representative_view_enclave]"

 RIV_refugee_decision:0 "\n\n\nХотя мы решили придерживаться политики невмешательства в войну между Братством и Окраиной, война не оставила нас незатронутыми. Политические потрясения в регионе означают, что сотни, если не тысячи беженцев путешествуют и ищут безопасное место. Теперь Совет должен решить, как поступить с этими беженцами.\n\n§OПредставитель службы безопасности§! [RIV_security_representative_view_refugees]\n§GГражданский представитель§! [RIV_civilian_representative_view_refugees]\n§CНаучный представитель§! [RIV_science_representative_view_refugees]"

