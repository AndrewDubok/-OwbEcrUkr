 RIV_trade_caravans_decision_category:0 "Торговые караваны Ривет-Сити"
 RIV_trade_caravans_decision_category_desc:0 "Ривет-Сити - это не просто город, это величайший город в столичной Пустоши. И, как и любой великий город, он строится на основе обширной торговли с окружающей местностью. Ривет-Сити производит §Gсвежие фрукты и овощи§!, возможно, единственный источник в столичной Пустоши, И эти продукты распространяются по всей Пустоши за относительно невысокую цену, принося не только крышки, но и хорошее отношение к нам и новых друзей. \n\nОднако эти караваны должны имеют дело с несколькими опасностями; §Yсупермутанты§!, §Yрейдеры§!, §Yдикие гули§! и §Yработорговцы§! [RIV_Enclave_existence]. С некоторыми усилиями эти угрозы могут быть устранены, или по крайней мере ослаблены, и наши караваны будут более вероятно достигать своего пункта назначения.\n\nВ настоящее время [?RIV_despatched_caravans] караванов отправлены, [?RIV_waiting_caravans] ожидают дома, и наш максимум [?RIV_caravan_maximum] караванов.\n\n§YУровень угрозы от рейдеров:§! [RIV_Raider_threat_level]\n§YУровень угрозы от супермутантов:§! [RIV_Super_Mutant_threat_level]\n§YУровень угрозы от диких гулей:§! [RIV_Feral_threat_level]\n§YУровень угрозы от§! §BАнклава§!§Y:§! [RIV_Enclave_threat_level][RIV_trade_dependency][RIV_replicated_man_active_desc]"
 
 RIV_the_enclave_is_a_threat:0 ", не говоря уже о действиях Анклава"

 RIV_integrating_settlements_loc:0 "\n\n\n\nТеперь, когда мы завершили §CПроект «Чистота»§!, tэти торговые миссии также будут притягивать к нам эти поселения. Если мы сможем получить достаточное влияние в поселении, мы, возможно, сможем интегрировать их мирно.\n\n§OЕсли нам не удастся интегрировать какое-либо из этих поселений мирно, нам придется прибегнуть к более радикальным действиям.§!\n\n\nНаше влияние в §gМегатонне§! составляет: [RIV_megaton_influence]\n\n§YБольшой Город§! последует примеру своего крупного соседа, §gМегатонны§!\n\n[RIV_underworld_influence]\n\nНаше влияние в §GОбщине Кентербери§! составляет: [RIV_canterbury_commons_influence]\n\nНаше влияние в §8Темпенни-Тауэр§! составляет: [RIV_tenpenny_tower_influence]\n\n§RПойнт§! §WЛукаут§! во всех отношениях, по сути, §Rнеподконтрольна§!\n\n[RIV_arefu_influence]\n\n[RIV_dave_influence]\n"

