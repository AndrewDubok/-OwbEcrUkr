 riv_integration.7.t:0 "Мегатонна отдаляется!"
 riv_integration.7.d:0 "После длительного сопротивления нашим усилиям повлиять на них, Мегатонна наконец-то сумела полностью освободиться от нашего влияния. Они работали над самообеспечением в воде и отказываются присоединиться к нашей процветающей конфедерации. Если им предпочтительнее жить в каменном веке, пусть так и будет."
 riv_integration.7.a:0 "Они не догадываются, что они потеряли"

