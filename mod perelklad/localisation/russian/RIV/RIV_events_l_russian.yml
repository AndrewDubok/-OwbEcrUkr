 riv_caravan.21.d:0 "Наш торговый караван вернулся, успешно завершив миссию на полуострове Делмарва. Через торговлю мы обогащаем себя и тех, с кем торгуем. Несмотря на риски, наши купцы справились."
 riv_caravan.21.a:0 "Замечательные новости"

 riv_integration.1.t:0 "Интеграция Мегатонны"
 riv_integration.1.d:0 "После долгого периода наращивания зависимости от нас, Мегатонна наконец-то поддалась нашему влиянию и решила присоединиться к нашей развивающейся конфедерации поселений. Теперь в Мегатонне будет свободно течь вода, и торговля сможет процветать между нашими поселениями. Жизнь в Столичной Пустоше никогда не была лучше!"
 riv_integration.1.a:0 "Добро пожаловать в Ривет-Сити!"

