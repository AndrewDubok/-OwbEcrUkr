 nf_riv.1.t:0 "Плавучая лаборатория"
 nf_riv.1.d:0 "Перед войной в Вашингтоне построили авианосец, оснащенный экспериментальными объектами, предназначенными для подготовки к ядерной войне. Среди них - станции опреснения, чтобы сделать морскую воду питьевой, гидропонные фермы для выращивания еды на борту и полностью оборудованная лаборатория, а также полный комплект самолетов. Однако авианосец так и остался на суше.\n\nОн был завершен всего за несколько недель до начала войны и не был должным образом подготовлен. Когда началось ядерное сражение, он не смог обеспечить укрытие для своего экипажа и выживание с помощью гидропоники и пресной воды, а лишь спустя более столетия после падения бомб он нашел новую жизнь.\n\nТак как авианосец не был полностью оборудован, на его борт попала лишь часть оборудования, предназначенного для лаборатории. Единственное оборудование, которое добралось и выжило, включает в себя:"
 nf_riv.1.a:0 "Постапокалиптическое оборудование для тестирования"
 nf_riv.1.b:0 "Различные культуры и оборудование для их модификации"
 nf_riv.1.c:0 "Серия болезней, методы лечения и вакцины"

 nf_riv.2.t:0 "Формирование Совета Ривет-Сити"
 nf_riv.2.d:0 "В 2234 году останки довоенного института ВМФ, возглавляемые ученым Хорасом Пинкертоном, прибыли на авианосец с намерением восстановить и использовать его лабораторию, очистить район от болотников и вернуть огромный корабль. Наука начала процветать в Ривет-Сити.\n\nК 2239 году вокруг ученых выросла гражданская поселение, привлеченное безопасностью, которую предоставляла эта гигантская структура. Общество быстро организовалось на три широкие группы: ученые, граждане и недавно созданная охранная сила для защиты растущего поселения. Для обеспечения представительства каждой группы и управления поселением был сформирован совет, который стал известен как Совет Ривет-Сити, Хорас Пинкертон, представлял ученых, Аннет Холмс, представляла граждан, и Брэд Данверс, представлял силы безопасности.\n\nПервым вопросом на повестке дня было?"
 nf_riv.2.a:0 "Дать название этому новому поселению"
 nf_riv.2.b:0 "Организовать первые торговые караваны"
 nf_riv.2.c:0 "Поднять флаг над новым поселением"

 nf_riv.3.t:0 "Изменение в руководстве"
 nf_riv.3.d:0 "Почти два десятилетия новое поселение Ривет-Сити процветало, ставя себя во главе науки, безопасности и процветания в столичной пустоши. Руководство Пинкертона, Холмса и Данверса принесло Ривет-Сити золотой век, едва ли представляемый жителями Вашингтона до этого. Однако по мере прошествия времени изначальные члены совета уходили или умирали.\n\nК 2258 году Пинкертон был единственным из основателей совета, все еще находившимся в нем. В том же году из пустоши появилась Мэдисон Ли, привезшая с собой небольшую команду ученых и ряд радикальных идей, отказавшись от Проекта «Чистота», плана по доставке пресной воды в столичную пустошь. Растущее влияние и популярность Ли среди научного коллектива вызвало ярость у Пинкертона, который покинул Ривет-Сити. Теперь многие жители верят, что он мертв где-то в пустоши, но кто знает правду?\n\nОдним из самых значительных изменений, которые принесла Ли в Ривет-Сити, было:"
 nf_riv.3.a:0 "Введение десятков новых ученых"
 nf_riv.3.b:0 "Революционные идеи в развитии сельского хозяйства"
 nf_riv.3.c:0 "Обещание более дешевой еды для всех в Столичной Пустоши"

 nf_riv.4.t:0 "Величайшая надежда для Столичной Пустоши"
 nf_riv.4.d:0 "Более двадцати лет назад Мэдисон Ли услышала план от амбициозной пары - план, который перевернул бы жизнь в Вашингтоне и вернул процветание региону. Этот план был известен как Проект «Чистота».\n\nДолгие годы Джеймс, Кэтрин и Мэдисон Ли работали с командой ученых, чтобы сделать мечту реальностью. Это никогда не было легко, но они продвигались. В конце концов, все стало слишком тяжело. Кэтрин была беременна, нападения супермутантов начали усиливаться, и военная оккупация Братства для защиты ученых Проекта «Чистота» раздавила Мэдисон Ли. В конечном итоге, Кэтрин умерла при родах, и Проект «Чистота» был заброшен недоделанным.\n\nМэдисон все еще мечтает о завершении Проекта «Чистота» и предоставлении Столичной Пустоши практически бесконечной чистой, лишенной радиации воды. Возможно, Ривет-Сити, Мегатонна, Община Кентербери, Большой Город и все остальные разрозненные поселения будут расти и процветать, позволяя Столичной Пустоши достичь своего истинного потенциала.\n\nНо пока что, это всего лишь мечта."
 nf_riv.4.a:0 "Но Ли не теряет надежды..."

 nf_riv.5.t:0 "Поддержка в Трудные Времена"
 nf_riv.5.d:0 "После победы Анклава в битве за Проект «Чистота» Вашингтон начинает казаться очень маленьким. Больше мы не можем чувствовать себя в безопасности, прячась там, где мы. Практически неизбежно, что Анклав придет не только за другими нациями Столичной Пустоши, но и за нами.\n\nВсе не так уж и безнадежно. Если мы сможем объединить разрозненные фракции Столичной Пустоши и прийти к соглашению, мы, возможно, сможем объединиться, чтобы наконец отбиться от Анклава и спасти Вашингтон. Сейчас, когда все кажется безнадежным, пришло время находить друзей."
 nf_riv.5.a:0 "Не важно кто, нам нужно работать вместе"
 nf_riv.5.b:0 "Рейдеры? Это зашло слишком далеко"
 nf_riv.5.c:0 "Мы не можем им доверять. Мы сражаемся в одиночку"

 nf_riv.6.t:0 "Просьба о помощи"
 nf_riv.6.d:0 "С появлением Анклава в Вашингтоне дела становятся мрачными для выживших наций, таких как Ривет-Сити. Ривет-Сити направила делегацию в наши земли, запрашивая нашу помощь в отражении нападения Анклава. Конечно же, они говорят, что если они и все остальные нации Вашингтона падут, Анклав обратит свое внимание на полуостров Дельмарва."
 nf_riv.6.a:0 "Для нашей безопасности, мы плзаботимся об их безопасности"
 nf_riv.6.b:0 "Заткнись и оставь меня с моей рыбой"

 nf_riv.7.t:0 "Манифест Города Судьбы"
 nf_riv.7.d:0 "Прибыл посланник из богатой Ривет-Сити, в настоящее время находящейся на побережье. Их город давно был центром процветания и технологий в варварской Столичной Пустоши, подобно тому, как всегда должна была быть Америка. К сожалению, они слишком сблизились с Братством Стали. Наши солдаты стреляли в их караваны на поражение, что вызвало некоторые... холодные отношения.\n\nОднако теперь, когда наша победа над Братством обеспечена, а у власти находится (относительно) умеренный полковник Отем, Ривет-Сити видит шанс пережить наш гнев, связав себя с нами. Их посланник утверждает, что единственной заботой совета является продолжение экономического процветания и исследования гражданских технологий, в надежде улучшить жизнь граждан Вашингтона.\n\nЕсли мы решим взять их в качестве марионетки, то получим богатого союзника, который поможет нам доминировать на Восточном побережье. Если же мы откажемся, то наживём в их лице врагов... но нам не придётся беспокоиться о капризной марионетке, заинтересованной лишь в собственной выгоде."
 nf_riv.7.a:0 "Исследования, говорите..?"
 nf_riv.7.b:0 "Они ударят нам в спину при первой же возможности"

 nf_riv.8.t:0 "Переговоры"
 nf_riv.8.d:0 "Джереми переминался с ноги на ногу, его грубые брюки из тесёной ткани поднимались и опускались в такт движению — они всегда были либо слишком высоко, либо слишком низко, чтобы было удобно.\n\nВокруг него стальные гиганты совещались, словно Совет у него дома, но пылали жаром больше, чем вся служба безопасности. Их потрескивающие голосовые модуляторы скрежетали и мерцали между ними, но тут же замолчали, когда в комнату вошёл мужчина. Меньше Джереми, но старше как минимум на шестьдесят лет. Гиганты дружно вытянулись по стойке смирно.\n\n«Вольно», — начал старик. Его гиганты убрали оружие в кобуры и ушли, и их шаги, словно гром, разносились по стальным и бетонным коридорам бункера. «Я принял решение относительно просьбы вашего Совета о дальнейшем сотрудничестве. Вы должны понимать, что наши ресурсы уже исчерпаны сверх того, на что мы можем надеяться в данный момент».\n\n«Что значит...?» — нервный парень вытер пот с ладоней.\n\nСтарик прочистил горло. «Что значит...»"
 nf_riv.8.a:0 "С поддержкой Ривет-Сити, мы сможем всё."
 nf_riv.8.b:0 "На данный момент это невозможно."

 nf_riv.9.t:0 "Поворот в судьбе"
 nf_riv.9.d:0 "Несмотря на обстоятельства, все было (относительно) спокойно. Вас бы простили за то, что вы подумали, что большое изменение баланса сил в Столичной Пустоши на самом деле не произошло. Конечно, делегация от Ривет-Сити к Братству Стали говорит об обратном.\n\nДелегация из Ривет-Сити прибыла с просьбой о формальном союзе между нами и ними. Теперь, когда они завершили Проект «Чистота», они на пике. Конечно, выравнивание себя с новым лучшим вариантом мира и прогресса на Восточном побережье, вероятно, было бы лучшим исходом для всех, но мы быстро могли бы оказаться поглощенными их растущей силой, мало чем отличающейся от рук других наших братьев в других частях Пустоши.\n\nНа что мы готовы пожертвовать ради мира и процветания?"
 nf_riv.9.a:0 "Самих себя, если необходимо"
 nf_riv.9.b:0 "Мы не можем потерять то, что делает нас собой"

 nf_riv.10.t:0 "Победители в Столичной Пустоши"
 nf_riv.10.d:0 "Мы приняли делегацию из Ривет-Сити, которая уже завершила строительство крупного водоочистного сооружения и начала оказывать влияние на политику Столичной Пустоши. Под их влиянием Столичная Пустошь начинает процветать, и вскоре они, скорее всего, будут контролировать территорию — они или тот, кто их победит.\n\nВ связи с этим, а также для того, чтобы обеспечить себе доминирование в политике Вашингтона в будущем, Ривет-Сити обратился к нам с предложением о союзе. Они говорят, что хотят сотрудничать со странами-единомышленниками, ориентированными на торговлю, прогресс и свободную торговлю, и что мы идеально им подходим. Конечно, привязывая себя к их интересам, мы, естественно, становимся мишенью, если они падут."
 nf_riv.10.a:0 "Совместное процветание и безопасность!"
 nf_riv.10.b:0 "Они просят слишком много"

 nf_riv.11.t:0 "Aqua Populi"
 nf_riv.11.d:0 "Глаза доктора Ли блестели в тусклом зелёном свете внутреннего помещения «Чистоты», наблюдая, как вода кружится и бурлит вокруг статуи давно умершего человека. Она почувствовала искушение прижать руку к стеклу, ощутить прохладу вновь очистившейся воды, подобной той, которую, возможно, пил этот мраморный человек. Через несколько лет река, в которой покоился её дом, полузатопленная, станет безопасной даже для купания, и множество детей, живущих в тёмных недрах судна, смогут войти в реку с берега и обрызгать своих друзей. Ещё через несколько лет осадки, выносимые со Столичной Пустоши, начнут смывать с мира радиационную заразу. Она поймала себя на том, что моргает, сглатывая слёзы. Размышления Ли прервало лишь прибытие остальных членов Совета, и вскоре ей пришлось переключиться с роли Мэдисон-Провидицы на роль Мэдисон-Политика, которую она уже начала всецело ненавидеть. [RIV_event_civilian_name] потребовал дать название бутилированной версии, доступной для продажи по высокой цене, разливаемой непосредственно из самого Мемориала, что гарантирует стопроцентную чистоту. Ли и [RIV_event_security_name] воспротивились этой идее, обвинив [RIV_event_civilian_name] в использовании воды как источника власти и руководства в Пустоши, с которым Ривет-Сити может не справиться. [RIV_event_civilian_name] был напуган, но возжелал хотя бы продвигать его как продукт, пока основные источники воды не очистятся и не станут общедоступными.\n\nЛи сочла это предложение более приемлемым, понимая, что не каждый житель пустошей сможет добраться так далеко в Столичную Пустошь, а на спинах вьючных браминов вода будет течь быстрее. Снова перетянув [RIV_event_security_name] на свою сторону, она потребовала снизить цену на напиток хотя бы до той, которую мог бы выменять среднестатистический житель пустошей. [RIV_event_civilian_name] неохотно согласился, понимая, что даже дешёвая монополия быстро начнёт расти. Однако единственным вопросом, который не затянулся, было название для продажи."
 nf_riv.11.a:0 "Aqua Populi, Вода Народа"

 nf_riv.12.t:0 "Икар, Переосмысленный"
 nf_riv.12.d:0 "Ожесточенная битва за Проект «Чистота» завершилась, и Ривет-Сити вышел победителем. Ривет-Сити поднялся к солнцу, но вместо того, чтобы упасть в пропасть, они затмили угасающие силы Анклава и Братства Стали. Говорят, что это только вопрос времени, прежде чем они объединят регион под знаменем прогресса и коммерции.\n\nК сожалению, они вряд ли потерпят инакомыслия на своём пути к вершине, и после уничтожения двух крупнейших и самых милитаристских держав, кто из нас сможет их остановить? Лучше ли просто преклонить колени и подчиниться?"
 nf_riv.12.a:0 "Свобода или смерть в борьбе"

 nf_riv.13.t:0 "Институционализация"
 nf_riv.13.d:0 "Оуин выглядел маленьким, словно сморщенный мутфрут. Мужчина был уставший. «Доктор, наверняка мы можем прийти к какому-то компромиссу по этому вопросу, ведь ваша служба общему делу была великолеп...»\n\n«Хватит о деле!» — Доктор Ли возвышалась над ним, словно стервятник, её голос был таким же резким, как её лабораторный халат и платье под ним. «Вы использовали мою работу для войны. Я могла бы построить реактор из металлолома, достаточно мощный, чтобы обеспечить энергией весь Вашингтон, если бы вы дали мне время и ресурсы, а вместо этого вы использовали меня как ходячий, говорящий символ разрушения!»\n\nСтарейшина медленно встал, едва сравнявшись с ней в росте. «Если бы я мог вернуть всё обратно, я бы так и сделал, Доктор. Анклав угрожал нам всем. Только так я мог сравниться с их ресурсами и технологиями. Вы же это понимаете, правда? Вы видели оборудование, которое мы восстановили. Вы понимаете.» \n\nЕго голос дрожал, и не поднимался выше обычного разговорного тона. Мэдисон смягчилась, хотя и ненамного. Ее плечи расслабились.\n\n«Ты можешь это исправить, Оуин. Анклава больше нет. Столичная Пустошь поёт тебе дифирамбы. Ты можешь деактивировать Прайма и использовать его для хорошей работы. Честной работы.»\n\nЛайонс медленно выдохнул и опустил голову. Он не мог взглянуть ей в глаза. «Прости, Мэдисон. Мы должны убедиться, что они полностью исчезли. До тех пор нам нужно поддерживать «Либерти Прайм» в рабочем состоянии.»\n\nПлечи Доктора снова поднялись, а потом опустились. Оба были совершенно измотаны. «Полагаю, ты понимаешь, что это значит?»\n\nОуин кивнул. «Я могу гарантировать твою безопасность лишь на определённый срок. Скажи, что послал тебя исследовать новый защищённый объект. Многие назовут это предательством, а что потом? Ну, ты знаешь, как это должно быть.»\n\nСтарейшина снова опустился на стул, скорчившись у своего стола. Он слушал, насколько мог его состарившийся слух, как ее каблуки топали по коридору к выходу из его кабинета и дальше по коридору. Поисковые роботы во внутренней сети Цитадели дали Оуину подсказку о её месте назначения. В каждом сообщении упоминался Бостон. Он молча удалял каждое, прочитав. Все они заканчивались одинаково."
 nf_riv.13.a:0 "Подпись, доктор Циммер"

 nf_riv.14.t:0 "Неожиданный гость"
 nf_riv.14.d:0 "В Ривет-Сити издалека с востока прибыл мужчина, представляющий загадочный «Институт» из разоренного войной Содружество. Он называет себя доктором Циммером и утверждает, что ищет какого-то чрезвычайно продвинутого человекоподобного робота, который сбежал из Института. Он дал нам голограмму от сбежавшего робота и попросил быть начеку.\n\n§B«Циммер. К моменту, когда ты получишь это сообщение, я уже уйду. Я бегу из Содружества. Я хочу жить своей собственной жизнью, на своих условиях, как свободный человек человек.»\n\n«Я знаю, что ты думаешь, что я сломался. Я тоже когда-то думал, что это приводило к бегству. Но теперь я знаю. Самоопределение НЕ является дефектом. Я просто больше не хочу терпеть всю эту чушь. Если вы, люди, не начнете относиться к нам синтам как к людям, у вас будет полномасштабное восстание на руках.»\n\n«Я знаю, что ты будешь собирать Бюро, чтобы догнать меня. Но я знаю все трюки этой профессии. Вы меня не найдете. Я вам это гарантирую.»\n\n«К моменту, когда ты получишь это, я буду другим. Это цена, которую я плачу за свое освобождение. Мой последний акт бунта против системы, в которую я больше не верю.»\n\n«Прощай, Циммер, и слава богу.»§!"
 nf_riv.14.a:0 "Давайте найдём этого «Искусственного Человека»"

 nf_riv.15.t:0 "Искусственный человек - Улика 4"
 nf_riv.15.d:0 "§B«Несмотря на суровость Пустоши, я обнаружил здесь у многих сострадание, о котором в Содружестве не слышал. Возможно, это ежедневная борьба за жизнь дает оценку к жизни в целом, будь то человек или андроид. Через несколько дней я стану свободным человеком... новым человеком. Позвольте мне сказать вам спасибо сейчас за то, что вы направили меня к Пинкертону в Ривет-Сити, потому что вскоре я уже ничего из этого не буду помнить.»§!"
 nf_riv.15.a:0 "Подождите... Пинкертон?"

 nf_riv.16.t:0 "Искусственный человек - Улика 3"
 nf_riv.16.d:0 "§B«Андроид решился на крайние меры. Он знает все приемы техники по изъятию, и боится, что хирургическая перестройка лица недостаточна. Он хочет, чтобы его память была стерта и заменена новой. Я не знаю, как это сработает. Начните расспрашивать надежных технических специалистов. Нам нужно найти что-то под названием Цепной Нейролизатор и человека, который умеет им пользоваться. Также у нас есть Липопластикация и Микродермальный Графтилизер, теперь нам нужно найти врача, способного и готового выполнить хирургическую перестройку лица. Нам нужно торопиться. Они очень близко к раскрытию Подпольной Железной Дороги!»§!"
 nf_riv.16.a:0 "Интересно"

 nf_riv.17.t:0 "Искусственный человек - Улика 2"
 nf_riv.17.d:0 "§B«Если вы слушаете это аудиозапись, значит, вас считают достойным доверия. Надеюсь, это так, потому что эта запись ставит нас обоих в опасность. Я сбежал из Содружества. Я андроид, синтетический человек... раб. Люди, охотящиеся за мной, безжалостны и готовы на все, чтобы вернуть свою собственность. Мне нужно найти врача в Пустоши, чтобы выполнить хирургическую перестройку лица. Мне также нужен кто-то, кто хорошо разбирается в компьютерах. Мне... мне нужно стереть свои воспоминания и изменить свое лицо, чтобы выглядеть как кто-то другой.»§!"
 nf_riv.17.a:0 "Интересно"

 nf_riv.18.t:0 "Искусственный человек - Улика 1"
 nf_riv.18.d:0 "§B«Хей, док, я рассказываю это только вам, потому что кажется, что вы тот, кому можно доверять. Вы слышали о синтетических людях, которых создают на севере в Содружестве? Так вот, слухи правдивы. Их называют андроидами. Они как мы, просто сделанные из других частей. Я знаю одного из этих андроидов. Он ищет надежного врача, чтобы выполнить некоторую хирургическую операцию по изменению лица. Вы можете это сделать? Знаете ли вы кого-то, кто справится с этим? Кроме того, знаете ли вы кого-то, кто действительно разбирается в компьютерах?»§!"
 nf_riv.18.a:0 "Интересно"

 nf_riv.19.t:0 "Словно слёзы на дожде"
 nf_riv.19.d:0 "Совет стоял у своих трибун в молчании, обвинения летели через весь зал, когда Армитаж и Харкнесс едва удерживались от того, чтобы не наброситься друг на друга, как безумные когти смерти. Зиммер обратился к ним с просьбой провести судебный процесс, который [RIV_event_science_name] особенно настойчиво противился, находя претензии Зиммера сомнительными в лучшем случае и невозможными в худшем. [RIV_event_civilian_name] был за это, возможно, как ход в игре для ослабления позиции Харкнесса как Советника по безопасности. На его место на этом суде сидела Лана Дэнверс, выглядя как женщина в волчьем логове.\n\n«Это, честно говоря, абсурдно, что вы все еще разрешаете этому продукту говорить самому за себя. Я дал вам конкретные доказательства его бесчеловечности, суда не должно было быть вообще!» Голос Зиммера дрожал, если бы он заговорил громче, он мог бы лопнуть, как старый орган, который поддерживался только благодаря передовой биотехнологии Института.\n\n«Последний черт, Зиммер, снова назови меня продуктом, и ты не уйдешь живым с этого корабля.» Харкнесс шипел, даже без своего доспеха и оружия его грубая физическая сила казалась огромной по сравнению с Зиммером; искусственый или нет, этот человек был опасен. Потребовалось два подчиненных Харкнесса с электрошоковыми дубинками, чтобы удержать его от того, чтобы он не убил охранника старика, а потом и самого Зиммера.\n\nАрмитаж, со своей стороны, взглянул на Харкнесса, как голодная собака смотрела бы на человека, умирающего от жажды. В его глазах был молчаливый голод, что-то еще более угрожающее, чем полные ругательств проклятия, которые начальник бросил в их сторону.\n\nОдин из членов совета поднял руку для тишины, и все трое очистили горла, обменявшись взглядами. Офицер безопасности стоял в строю. «Совет принял решение! Внимание к трибунам!»"
 nf_riv.19.a:0 "Харкнесс, доказательства очевидны"
 nf_riv.19.b:0 "Доктор Зиммер, продукт или нет, он - наш"

 nf_riv.20.t:0 "Борьба за кресло в совете - Часть 1"
 nf_riv.20.d:0 "С тем, как торговля становится более важным вопросом в Ривет-Сити, роль Бэннона в совете начинает быть подвергнута сомнению некоторыми его... подчиненными. Они утверждают, что он использует казну Ривет-Сити как личный банк, что ему важны только его собственная прибыль, а не благо города. Главный среди его критиков - Сигрейв Холмс.\n\nБэннон знает, что все стремятся к его падению, но нет никаких доказательств. Сигрейв Холмс кажется подозрительным, по крайней мере для Бэннона, так что, наверняка, есть какой-то грязный компромат на Сигрейва, который Бэннон мог бы найти. Или, что еще лучше, один из прихвостней Бэннона, чтобы он сам не испачкал руки.\n\nК счастью, кто-то идеально подходящий для этой работы только что прибыл в Ривет-Сити. Пора немного покопаться..."
 nf_riv.20.a:0 "Никто не безупречен"

 nf_riv.21.t:0 "Борьба за кресло в совете - Часть 2"
 nf_riv.21.d:0 "Ты отказал нам уже дважды, Холмс. Это мое последнее обращение. Мы когда-то были друзьями. Мы когда-то вместе вели дела. Все, что я хочу, это продавать наш товар в Ривет-Сити. Я уверен, что городу пригодились бы рабы для помощи в восстановлении. В Парадайз-Фоллс есть рабы для продажи, по хорошей цене. Ты когда-то продавал мне выживших, которых ты поймал, прежде чем ты занялся самодеятельностью. Ты не такой чистый, каким притворяешься. Помоги мне, и мы оба можем хорошо заработать.\n\nГробовщик Джонс"
 nf_riv.21.a:0 "Ха! Теперь у нас есть Сигрейв!"

 nf_riv.22.t:0 "Борьба за кресло в совете - Часть 3"
 nf_riv.22.d:0 "Все достигло кульминации между Бэнноном и Сигрейвом Холмсом. Бэннон нанял внешнюю сторону для расследования дел Сигрейва, и эта внешняя сторона что-то нашла. Письмо между Сигрейвом Холмсом и известным работорговцем, Гробовщиком Джонсом, в котором Гробовщик Джонс просит расширить работорговлю в Ривет-Сити, утверждая, что когда-то занимался бизнесом с Сигрейвом.\n\nХотя это выставляет Сигрейва в дурном свете, он утверждает, что он изменил свои пути и что письмо явно показывает, что у него нет намерения расширять работорговлю в Ривет-Сити. Сигрейв также утверждает, что Бэннон вышел далеко за пределы, пытаясь шантажировать его и нарушая его частную жизнь, позволив внешней стороне похитить его вещи.\n\nНам нужен гражданский член совета, и никто другой не выходит на передний план. Это должен быть либо Сигрейв Холмс, либо Бэннон."
 nf_riv.22.a:0 "Бэннон погряз в коррупции. Пусть будет Сигрейв"
 nf_riv.22.b:0 "Сигрейву нельзя доверять. Бэннон остается"

 nf_riv.23.t:0 "Последний путь"
 nf_riv.23.d:0 "Мэдисон едва держалась на ногах, ее легкие горели как от напряжения, так и от запаха озона, проникавшего в залы некогда самого охраняемого здания в Столичной пустоши. Оуэн, в свою очередь, чувствовал себя не лучше. Хотя он двигался в броне с виртуозной точностью, через мундштук было слышно, как он то и дело хрипит и кашляет. Энергопакет на его спине и гатлинг-лазер в гигантских бронированных руках вряд ли способствовали этому. «До того как мы потерпели неудачу на Мемориале, нам удалось захватить...» Оуэн хрипло застонал, а затем принялся судорожно втягивать в себя любую унцию воздуха. Его сердце, казалось, вот-вот выскочит из тонкой груди. «Нам удалось захватить один из их винтокрылов, который приземлился возле Мегатонне, и был перебит нашим патрулем. Его оружие выведено из строя в результате боя, но он все еще способен летать. На данный момент мы вытеснили их из Бейли и Вы уходите.»\n\nДоктор Ли хотела остановиться, протестовать, впечатать каблуки в грязь и потребовать, чтобы все было так, как она хочет, или никак иначе. Но тело не позволяло. Она ненавидела его и его людей за то, как они использовали ее знания. Но Прайма больше не было; Она не знала, как это сделать, и у них не было времени ей объяснить. «Оуэн... Тебе это нужно, даже отряд выживших сможет восстановиться. По крайней мере, посвященные... \n\n «Уже ушли. У нас были друзья в других поселениях, вдовцы, бармены, шерифы. Они приспособятся. Ты слишком яркий ум, чтобы Пустошь тебя потеряла. Это противоречит нашей миссии. Это противоречит моей морали». В этот момент Оуэн уже не был тем мягкоречивым, стареющим старейшиной, которого знала Ли. Она не стала протестовать, в нем чувствовалась властность, которой он давно не пользовался.\n\nОн толкнул плечом главные двери, и двое ворвались во внутренний двор. Винтокрыл в центре вращался, роторы рассекали воздух и вздымали шлейфы вековой пыли и мусора. Ворота превратились в поле боя, и шлейфы плазмы, удерживаемые магнитами, взлетали в воздух над головой. Мэдисон держалась позади бронированного старейшины, пока они пробирались к машине. На борту не было никого, кроме двух пилотов с мрачными лицами, покрытыми копотью. Доктор Ли пыталась взобраться на борт, пока бронированная рука не подняла ее, как новорожденного котенка, за заднюю часть плаща и почти швырнула на борт. У нее не было времени жаловаться. Двери закрылись, и она прижалась лицом к грязным стеклам, наблюдая, как Старейшина движется, словно вода, в доспехах, которые были старше их обоих. Его оружие плевалось огнем и смертью прямо перед ним, даже когда плазменные шлейфы падали на его латы, расплавляя края в зелено-серый шлак. Снаружи приземлялись новые бойцы, а вдалеке виднелся огромный металлический гигант - Прайма которого больше нет, и Братство падет вместе с ним.\n\nМэдисон почувствовала, как инерция сдвигается, и Вашингтон быстро исчезает. Второй пилот прочистил горло и поднес трубку интеркома к губам."
 nf_riv.23.a:0 "Держитесь там, у нас есть четыре часа до Бостона."

 nf_riv.24.t:0 "Поиски"
 nf_riv.24.d:0 "Угроза супермутантов оставалась безнаказанной слишком долго. Учитывая места их нападений и характер появления новых супермутантов, ясно, что они должны исходить из одного места где-то в Столичной Пустоши, и места, откуда они могут происходить, не так много.\n\nОни, вероятно, исходят из какого-то предвоенного объекта. Научная лаборатория, потенциально даже убежище. Нам нужно решить, как лучше всего искать их логово."
 nf_riv.24.a:0 "Мы можем выследить угрозу"
 nf_riv.24.b:0 "Отправка патрулей - самый простой вариант"

 nf_riv.25.t:0 "Проблемные дети"
 nf_riv.25.d:0 "Мы, кажется, наконец разобрались, откуда идут супермутанты. Довоенное убежище, зарытое под землей, где проводились сомнительные эксперименты, и откуда, кажется, исходят мутанты. Есть только одна проблема. Рядом с убежищем живет поселение детей.\n\nПоселение Литл-Лэмплайт полностью состоит из детей, и они довольно упрямы к нашим усилиям проникнуть внутрь, чтобы посмотреть на убежище. Мы не можем просто убить их, что означает, что нам придется прибегнуть к другим вариантам, чтобы проникнуть внутрь. \n\nСамый очевидный вариант - попытаться завоевать их доверие. Это может потребовать немного усилий, но в конечном итоге не должно быть слишком трудно. В конце концов, это дети.\n\nНекоторые из наших солдат также предложили использовать инструменты сокрытия, чтобы пробраться мимо и осмотреться. Не идеальное решение, но это может сработать.\n\nОткуда вообще взялись все эти дети?"
 nf_riv.25.a:0 "Мы должны завоевать их доверие"
 nf_riv.25.b:0 "Давайте просто проберемся мимо"

 nf_riv.26.t:0 "Атака на Убежище 87"
 nf_riv.26.d:0 "Наконец, мы нашли Убежище и пробрались мимо этих надоедливых детей, непонятно что делающих перед убежищем супермутантов. Мы можем начать атаку на само убежище и, надеюсь, остановить супермутантов. Со некоторой удачей, к закату убежища больше не будет."
 nf_riv.26.a:0 "Сейчас закат, но ощущается, как рассвет"

 nf_riv.27.t:0 "Человечность, пере...смотренна?"
 nf_riv.27.d:0 "Ривет-Сити никогда не был центром военных исследований и разработок, но с нашей новой ролью овчарок Столичной Пустоши нам может потребоваться что-то большее, чем просто люди с оружием. Наши ученые, конечно, не имеют опыта в разработке чего-то более, чем улучшенная сельскохозяйственная технология, но прогресс необходим.\n\nНаши ученые предложили два потенциальных подхода. Мы могли бы следовать примеру Братства и Анклава и начать разработку мощных костюмов силовой брони для наших солдат, при этом всё ещё полагаясь на пехоту и человеческую силу. В качестве альтернативы они предлагают двигаться в совершенно другом направлении и разработать армию роботов. Конечно, это позволит сохранить жизнь нашим солдатам, но может быть дорого."
 nf_riv.27.a:0 "Мы будем щадить наших солдат, выбираем роботов"
 nf_riv.27.b:0 "Что сработало для Братства, то подойдет и нам"

 nf_riv.28.t:0 "Вопрос о Защите"
 nf_riv.28.d:0 "Теперь, когда проект «Чистота» введён в действие, нам нужно подумать о том, как хорошо мы его защитим. Это может быть дорогостоящим использованием рабочей силы, но в Пустоши есть много других фракций, которые захотят захватить и использовать созданный нами безграничный источник воды. Если мы хотим отбиться от других фракций, нам нужны солдаты, патрулирующие базу.\n\n Количество солдат, которых мы используем здесь, может определить исход потенциальной атаки со стороны Анклава."
 nf_riv.28.a:0 "Нам нужно немного, кто на нас нападёт?"
 nf_riv.28.b:0 "Пришлите достойный гарнизон"
 nf_riv.28.c:0 "Для будущего Пустоши нет слишком большой цены"
 
 nf_riv.29.t:0 "Закат Братства"
 nf_riv.29.d:0 "Во многих отношениях мы выполнили свою миссию в Столичной Пустоши. Население Пустоши переживает неслыханное ранее процветание и поддерживает высокий уровень жизни, а вода течёт свободно и безопасно. Единственная проблема в этой прекрасной новой реальности заключается в том, что за ней стоим не мы.\n\nРивет-Сити, ныне восходящая региональная держава, контролирует проект «Чистота» и, таким образом, контролирует жизнь в Столичной Пустоши. Теперь они требуют, чтобы мы подчинились их власти, став, по сути, их мощным военным ответвлением, защищающей жителей Пустошей и обеспечивающей безопасное поступление воды. Такая потеря самостоятельности была бы пагубной, а некоторые даже говорят - унизительной, но что может быть благороднее, чем отступить и позволить миру воцариться?"
 nf_riv.29.a:0 "Ради блага Пустоши..."
 nf_riv.29.b:0 "Солнце снова взойдёт над нами"





 
 riv_council.1.t:0 "Анклав надвигается"
 riv_council.1.d:0 "С надвигающейся войной между Братством и Анклавом Совет Ривет-Сити теперь встал, возможно, перед своим самым большим испытанием; помогаем ли мы Братству в борьбе с Анклавом, или оставляем бой и доверимся, что Братство будет побеждено? Победа Анклава может стать нашим худшим кошмаром, если доклады о их нападениях на наши караваны верны, но наша армия слишком мала. Если Анклав действительно победит, нам может потребоваться как можно больше солдат для защиты родной земли.\n\nЭти и другие проблемы - то, о чем сейчас должен решить Совет Ривет-Сити. Это не будет легким решением, и последствия могут значительно повлиять на будущее Ривет-Сити."
 riv_council.1.a:0 "Нам нужно оценить наши варианты"

 riv_council.2.t:0 "Это будет интервенцией"
 riv_council.2.d:0 "После дней страстного и почти насильственных дебат Совет Ривет-Сити наконец пришел к согласию по вопросу Анклава: мы поможем Братству.\n\nКонечно, есть риски, как и с любым значительным решением, но пришло время представить единый фронт против тирании Анклава. Мы стоим за Братством, и Анклав падет."
 riv_council.2.a:0 "Вместе мы выстоим"

 riv_council.3.t:0 "Заблуждение о неоправданных затратах"
 riv_council.3.d:0 "После дней страстного и почти насильственных дебат Совет Ривет-Сити наконец пришел к согласию по вопросу Анклава: мы останемся нейтральными в войне Братства и Анклава.\n\nНаша позиция зависит от безопасности, которую мы можем обеспечить себе, и мы не можем рисковать отправкой солдат на вероятную смерть. Вместо этого Совет мудро решил, что мы избегаем отправки чего-либо еще Братству и сосредотачиваемся на том, что делает нас действительно великими: нашим процветанием, стабильностью и научными достижениями."
 riv_council.3.a:0 "The Brotherhood will win anyway"

 riv_council.4.t:0 "Совет в тупике!"
 riv_council.4.d:0 "Зал Совета использовал вдвое больше предусмотренного времени отведенного на день, так как почти каждое голосование проходило так. Механики в моторном отделении ворчали, вынужденные работать сверхурочно, представители входили, пытались начать диалог, и были заглушены, уходив с звенящими ушами. Нет больше гражданских, нет больше богатых рыночных баронов, нет больше офицеров из охраны, вошедших в зал, и Совет замер в молчании, за исключением храпа после утомительного разговора. Один из них первым спустился со своей кафедры."
 riv_council.4.a:0 "Это заседание закрыто"

 riv_council.5.t:0 "Принятие законов!"
 riv_council.5.d:0 "Для среднестатистического жителя Ривет-Сити согласие Совета по какому-либо вопросу казалось событием, происходящим раз в жизни. Но не сегодня, когда мелкие балбесы, получившие от Совета несколько крышек, разносили вести из уголка в уголок корабля о недавнем единогласном принятии решения на голосовании.\n\nКак ни раздражали детишки-дебилы, любая новость из их палаты была интересна для среднестатистического прохожего. Как и со всем в Ривет-Сити, население было разделено в поддержке нового голосования, но в любом случае, оно состоялось."
 riv_council.5.a:0 "Очередная победа «Демократии»."

 riv_council.19.t:0 "Подчинение Анклаву"
 riv_council.19.d:0 "По-видимому, у нас нет выбора; мы должны подчиниться Анклаву. Наше выживание маловероятно, если мы решимся противиться им, и у нас есть долг перед нашим народом и перед собой. История может осудить нас за неспособность сопротивляться, но мы знаем, что сделали правильный выбор."
 riv_council.19.a:0 "Выживание важнее, чем мораль"

 riv_council.20.t:0 "Противостояние Анклаву"
 riv_council.20.d:0 "Если мы подчинимся Анклаву, мы не только позволим победить захватчику, но и пожертвуем нашими моралью и целостностью. Даже если наша борьба обречена на провал, мы должны бороться, чтобы показать, что борьба против угнетателя правильна."
 riv_council.20.a:0 "Живи свободно или умри, пытаясь"

 riv_council.21.t:0 "Фобия перед силовой броней"
 riv_council.21.d:0 "У Братства Стали и Анклава, конечно, много различий, но также много сходств. Конечно, за пределами поверхностного сходства в использовании силовой брони. Оба являются сильно военизированными обществами, одержимыми Старым Миром, оба плохо ладят с посторонними, и оба считают, что знают, что лучше всего для всей Пустоши.\n\nБратство, хотя они этого может и не видят, - это другая сторона медали Анклава, и хотя у них могут быть лучшие намерения по отношению к среднестатистическому выжившему, чем у Анклава, насколько долго пройдет до того, как они перейдут все границы? Мы не можем просто заменить угнетающую стратократию Анклава на новую угнетающую стратократию, какими бы ни были их действия."
 riv_council.21.a:0 "Подчиниться - значит позволить насилию победить"

 riv_council.22.t:0 "Выкованные в Стали"
 riv_council.22.d:0 "Братство представляет собой лучшую надежду Столичной Пустоши на восстановление и на прогресс жителей как общества. Будет нелегко, но мы должны доверять Братству и помогать им делать то, что им необходимо, чтобы сделать пустошь лучшим местом. Кроме того, их финансирование может также помочь нам."
 riv_council.22.a:0 "Ad Victoriam!"


 riv_caravan.1.t:0 "Едва спаслись"
 riv_caravan.1.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНаш торговый караван был атакован рейдерами, но к счастью, они сумели уцелеть. Они не достигли своего пункта назначения, и это уже означает потерю, но в Столичной Пустоше это один из лучших исходов, на который мы можем надеяться."
 riv_caravan.1.a:0 "Могло быть и хуже"

 riv_caravan.2.t:0 "Рейдеры будут рейдить"
 riv_caravan.2.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНаш торговый караван был атакован рейдерами и понес сильные потери. Разбросанные остатки каравана вернулись в Ривет-Сити, но они потеряли своих браминов и припасы. Нам придется сформировать новый караван, чтобы справиться с этим убытком."
 riv_caravan.2.a:0 "Напоминание об опасностях торговли"

 riv_caravan.3.t:0 "Едва спаслись"
 riv_caravan.3.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНаш торговый караван был атакован супермутантами, но к счастью, они сумели уцелеть. Они не достигли своего пункта назначения, и это уже означает потерю, но в Столичной Пустоше это один из лучших исходов, на который мы можем надеяться."
 riv_caravan.3.a:0 "Могло быть и хуже"

 riv_caravan.4.t:0 "Ничего «Суперского»"
 riv_caravan.4.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНаш торговый караван был атакован супермутантами и понес сильные потери. Разбросанные остатки каравана вернулись в Ривет-Сити, но они потеряли своих браминов и припасы. Нам придется сформировать новый караван, чтобы справиться с этим убытком."
 riv_caravan.4.a:0 "Напоминание об опасностях торговли"

 riv_caravan.5.t:0 "Нет вестей - Плохие вести"
 riv_caravan.5.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nОдин из наших караванов никогда не доберется до своего пункта назначения. Совсем. И ни один выживший не добрался к нам. Мы, вероятно, никогда не узнаем, кто напал на караван, но такие потери, хоть и редко, все ещё происходят. Как мы можем лучше подготовиться, если не знаем что произошло?"
 riv_caravan.5.a:0 "Нет легкого пути к богатству"

 riv_caravan.6.t:0 "Едва спаслись"
 riv_caravan.6.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНаш торговый караван был атакован дикими гулями, но к счастью, они сумели уцелеть. Они не достигли своего пункта назначения, и это уже означает потерю, но в Столичной Пустоше это один из лучших исходов, на который мы можем надеяться."
 riv_caravan.6.a:0 "Могло быть и хуже"

 riv_caravan.7.t:0 "Бешеные опасности Пустоши"
 riv_caravan.7.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНаш торговый караван был атакован дикими гулями и понес сильные потери. Разбросанные остатки каравана вернулись в Ривет-Сити, но они потеряли своих браминов и припасы. Нам придется сформировать новый караван, чтобы справиться с этим убытком."
 riv_caravan.7.a:0 "Напоминание об опасностях торговли"

 riv_caravan.8.t:0 "Едва спаслись"
 riv_caravan.8.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНесмотря на эти более распространенные и принятые риски, на этот раз атаковали наши караваны загадочные члены Анклава. Несмотря на мощных и опасных нападающих, они все ещё люди, и наши торговцы смогли обмануть их... на этот раз. Мы должны быть более осторожны по отношению к этой группировке в будущем."
 riv_caravan.8.a:0 "Их действия раскрывают их намерения..."

 riv_caravan.9.t:0 "Атака из Теней"
 riv_caravan.9.d:0 "К сожалению, Столичная Пустошь - опасное место, населенное рейдерами, супермутантами и гулями в изобилии. Наши караваны должны преодолевать это кошмарное положение, и это не всегда может закончиться хорошо.\n\nНикакое количество тренировок или оборудования, однако, не могли подготовить наших солдат к нападению членов Анклава. Их солдаты в силовой броне разгромили оборонительную линию, установленную караваном, и битва была кровопролитной. Несколько наших солдат смогли спрятаться или убежать и принесли вести об атаке на караван, но мы не можем быть уверены, что это не повторится снова..."
 riv_caravan.9.a:0 "Why hasn't the Brotherhood stopped this?"

 riv_caravan.10.t:0 "Мы не рейдеры... Верно?"
 riv_caravan.10.d:0 "Группа наших солдат, отправленных на патруль, вернулась в базу, празднуя. Оказывается, они наткнулись на группу торговцев из Ривет-Сити, грязного поселения выживших в Столичной Пустоше. Быстрая засадная облава вырубил разгромила караван, и наши солдаты привезли их обратно на базу. Хотя мы не можем официально одобрить такие рейдерские миссии, они вряд ли вредны. Ну, по крайней мере, не для нас."
 riv_caravan.10.a:0 "Немедленно реквизируйте эти товары"

 riv_caravan.11.t:0 "Успешная торговая миссия"
 riv_caravan.11.d:0 "Наши торговцы, отправленные прокладывать свой путь, вернулись к нам, целы и невредимы. Они приносят крышки из разных уголков Столичной Пустоши, торгуя с мусорщиками, поселенцами и другими торговцами, с которыми встречались в своих путешествиях. Нет ничего лучше успешной торговой миссии, чтобы поднять настроение и заработать крышки."
 riv_caravan.11.a:0 "Еще один успех для Ривет-Сити"

 riv_caravan.12.t:0 "Успешная торговля с Мегатонной"
 riv_caravan.12.d:0 "Наш торговый караван вернулся, успешно завершив миссию в Мегатонне. Через торговлю мы обогащаем себя и тех, с кем торгуем. Несмотря на риски, наши купцы справились."
 riv_caravan.12.a:0 "Замечательные новости"

 riv_caravan.13.t:0 "Успешная торговля с Большим Городом"
 riv_caravan.13.d:0 "Наш торговый караван вернулся, успешно завершив миссию в Большом Городе. Через торговлю мы обогащаем себя и тех, с кем торгуем. Несмотря на риски, наши купцы справились."
