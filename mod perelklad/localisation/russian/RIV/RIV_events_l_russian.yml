 riv_integration.13.t:0 "Интеграция завершена..?"
 riv_integration.13.d:0 "Все разбросанные поселения пустоши теперь сделали свой выбор относительно того, присоединяться им или нет к нашей развивающейся конфедерации. Будь то мудрый выбор или нет, нам больше не нужно прилагать усилия, чтобы убедить их в правильном пути. Пришло время взглянуть за пределы этих разбросанных поселений и создать по-настоящему великую нацию из Столичной Пустоши."
 riv_integration.13.a:0 "Our future truly begins now"

 riv_artifact.1.t:0 "Закон о Правах"
 riv_artifact.1.d:0 "Руины Национального Архива полны опасностей и добычи, и одному из искателей приключений, которого мы наняли для поиска важных предметов, удалось наткнуться на Закон о Правах, шарахаясь там. Он просто лежал там, ждущий, когда один из наших смелых наемников его найдет. Авраам Вашингтон предоставил Закону о Правах собственную выставку.\n\nКогда приключенца спросили, почему они не взяли другие важные документы, наверняка лежащие в Национальном Архиве, он пожал плечами и сказал, что это было бы больше работы. С этим не поспоришь."
 riv_artifact.1.a:0 "Как замечательно!"

 riv_artifact.2.t:0 "Конституция"
 riv_artifact.2.d:0 "Руины Национального Архива полны опасностей и добычи, и одному из искателей приключений, которого мы наняли для поиска важных предметов, удалось наткнуться на Конституцию, шарахаясь там. Она просто лежала там, ждущая, когда один из наших смелых наемников её найдет. Авраам Вашингтон предоставил Конституции собственную выставку.\n\nКогда приключенца спросили, почему они не взяли другие важные документы, наверняка лежащие в Национальном Архиве, он пожал плечами и сказал, что это было бы больше работы. С этим не поспоришь."
 riv_artifact.2.a:0 "Это повод для празднования"

 riv_artifact.3.t:0 "Декларация Независимости"
 riv_artifact.3.d:0 "Руины Национального Архива полны опасностей и добычи, и одному из искателей приключений, которого мы наняли для поиска важных предметов, удалось наткнуться на Декларацию Независимости, шарахаясь там. Из-за её важности, она хранилась в сейфе в задней части и охранялась армией роботов (или так утверждал охотник за сокровищами). Авраам Вашингтон предоставил Декларации Независимости собственную выставку.\n\nКогда приключенца спросили, почему они не взяли другие важные документы, наверняка лежащие в Национальном Архиве, он пожал плечами и сказал, что это было бы больше работы. С этим не поспоришь."
 riv_artifact.3.a:0 "Мы украли независимость!"

 riv_artifact.4.t:0 "Великая Хартия"
 riv_artifact.4.d:0 "Руины Национального Архива полны опасностей и добычи, и одному из искателей приключений, которого мы наняли для поиска важных предметов, удалось наткнуться на Великую хартию вольностей, шарахаясь там. Она просто лежала там, ждущая, когда один из наших смелых наемников её найдет. Авраам Вашингтон предоставил Великой хартии вольностей собственную выставку.\n\nКогда приключенца спросили, почему они не взяли другие важные документы, наверняка лежащие в Национальном Архиве, он пожал плечами и сказал, что это было бы больше работы. С этим не поспоришь."
 riv_artifact.4.a:0 "Хотя бы мы что-то получили от Англичан"

 riv_artifact.5.t:0 "Доктрина Монро"
 riv_artifact.5.d:0 "Во время совершенно другой работы искатель приключений, часто нанимаемый Ривет-Сити, встретил торговца с множеством старого хлама. Большинство из него казалось бесполезным, но что-то привлекло внимание искателя приключений. Доктрина Монро каким-то образом оказалась среди товаров торговца, вероятно, принятая за обычный кусок бумаги (можете себе представить?). Искатель приключений, зная интерес Авраама Вашингтона, немедленно приобрел её, и теперь она занимает почетное место в Обществе сохранения столицы.\n\nИскатель приключений также купил какой-то другой хлам, но что такое «мусорная пушка», должно быть, далеко не так интересно."
 riv_artifact.5.a:0 "Удачная находка!"

 riv_artifact.6.t:0 "Декларация Войны Китаю"
 riv_artifact.6.d:0 "Один из наших обычных искателей приключений сражался с супермутантами по пути в Некрополис, когда заметил, что один из убитых им супермутантов нес старый лист бумаги. После детального рассмотрения оказалось, что это Декларация о войне США против Китая! Довольно невероятно, что супермутант мог узнать такой важный документ, но, должно быть, он был фанатом истории США, как и Авраам Вашингтон. Сейчас она будет выставлена на показ."
 riv_artifact.6.a:0 "Борьба с Китаем никогда не выглядела так привлекательно"

 riv_artifact.7.t:0 "Война с Германией"
 riv_artifact.7.d:0 "Анклав — известная и опасная группа, поэтому, когда один из наших искателей приключений наткнулся на их небольшой лагерь недалеко от Национального Архива, это могло означать беду. К счастью, солдаты Анклава спали и были легко побеждены. Пока искатели проникали в на их территорию, искатель приключений нашел документ, который группа, очевидно, приобрела и надеялась привезти в свою базу: Декларацию о войне США с Германией. К счастью, мы добрались до него раньше, чем Анклав. Авраам Вашингтон уже подготовил для него специальное место."
 riv_artifact.7.a:0 "Отпразднуйте, ударив нацистов!"

 riv_artifact.8.t:0 "Геттисбургский адрес"
 riv_artifact.8.d:0 "Искатель приключений, которого мы наняли для поиска драгоценных древних артефактов, встретил в пути в гуля, прибывшего из Содружества. Гуль был сдержанным в разговорах о Содружестве, но прибыл из места под названием Добрый сосед. К чуду удачи, он нес с собой Геттисбургский адрес и хотел продать его (он казался почти отчаянным...). Наш искатель приключений подхватил эту удачную находку и принес её обратно на базу, и Авраам Вашингтон уже поместил его в рамку.\n\nИнтересно, что искатель приключений стал параноидальным и убежден, что его преследуют. Наверняка совпадение."
 riv_artifact.8.a:0 "Как он попал в Содружество?"