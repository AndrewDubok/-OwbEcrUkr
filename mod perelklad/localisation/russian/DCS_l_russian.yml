###Traits###
DCS_delusions_of_grandeur_trait:0 "Мания Величия"
DCS_delusions_of_grandeur_trait_desc:0 "Дэйв считает себя самым умным человеком в комнате, независимо от того, в какой комнате он находится. Из-за этого с ним очень трудно работать, и неудивительно, что мало кто хочет даже пытаться давать ему советы."
DCS_reclusive_hedonist_trait:0 "Затворничий Гедонист"
DCS_reclusive_hedonist_trait_desc:0 "Тенпенни редко появляется за пределами своей резиденции. Этот человек уже много лет не трезв и проводит большую часть времени с проститутками или стреляя по случайным обитателям пустошей. Естественно, это затрудняет выполнение поставленных задач."
DCS_uncle_of_a_nation_trait:0 "Дядюшка для Нации"
DCS_uncle_of_a_nation_trait_desc:0 "Дядя Роу заложил основу для создания Поселений Столичной Пустоши, заключив простые торговые соглашения. В душе он всегда будет торговцем, и под его руководством Поселения будут заниматься именно торговлей."
DCS_wasteland_lawman_trait:0 "Законник Пустоши"
DCS_wasteland_lawman_trait_desc:0 "Лукас Симмс выполняет незавидную работу, пытаясь обеспечить закон и порядок в беззаконной стране. Но если кто-то и может справиться с этой задачей, то это он."
DCS_vault_leader_trait:0 "Глава Убежища"
DCS_vault_leader_trait_desc:0 "Как глава убежища, Амата знает, как обойтись с исключительно ограниченными ресурсами. Эти знания помогут всем нам."
DCS_curious_mind_trait:0 "Любознательный ум"
DCS_dangerous_mind_trait:0 "Опасный ум"
DCS_man_behind_man_trait:0 "Человек за спиной"
DCS_man_behind_man_trait_desc:0 "Все, кто в курсе дела, знают, что мистер Бёрк — настоящий мозг Тенпенни. Этот хитрый человек хорошо работает в тени, и лишь немногие знают, что он на самом деле замышляет."
DCS_self_important_trait:0 "Самодовольный Генерал"
DCS_self_important_trait_desc:0 "Дэйв известен тем, что вопреки приказам окружающих отправляет людей на бессмысленные атаки или патрулирования, потому что считает, что знает лучше. Это вызывает немало проблем. Почему мы дали этому парню эту роль на всю жизнь?"
DCS_first_lady_trait:0 "Первая Леди"
DCS_settlement_guard_trait:0 "Охрана поселения"
DCS_big_town_oldtimer_trait:0 "Старожил Большого Города"
DCS_big_town_oldtimer_trait_desc:0 "Будучи одним из старейших жителей Большого Города, Паппи приобрел мудрость, превосходящую его возраст. Он знает, как сплотить общество даже в самые мрачные времена."
DCS_wasteland_doctor_trait:0 "Доктор Пустошей"
DCS_wasteland_doctor_trait_desc:0 "Рэд лечит людей с тех пор, как научилась держать иглу. Возможно, у нее нет формального образования, но кто здесь его имеет?"
DCS_nuka_fanatic_trait:0 "Фанатик Ядер-Колы"
DCS_nocturnal_predator_trait:0 "Ночной хищник"
DCS_iron_conviction_trait:0 "Железное убеждение"
DCS_iron_conviction_trait_desc:0 "Лукас Симмс до конца остается верным своим принципам. Он не поддается влиянию худших представителей нашего общества."
DCS_wavering_conviction_trait:0 "Колебания убеждений"
DCS_wavering_conviction_trait_desc:0 "Симмс однажды оправдал решение оставить в живых монстра, несмотря на его преступления. Кто знает, что он может разрешить завтра?"
DCS_aging_songbird_trait:0 "Пожилая певчая птица"
DCS_retired_adventurer_trait:0 "Отставной авантюрист"
DCS_former_minuteman_trait:0 "Бывший минитмен"
DCS_public_servitor_trait:0 "Государственный служащий"
DCS_altered_ai_trait:0 "Измененный ИИ"
DCS_altered_ai_trait_desc:0 "M.A.R.Go.T., что означает Metro Authority Rapid Governmental Transit System, была найдена солдатами в лабиринте Президентского метро после уничтожения Анклава и восстановления их довоенных данных. Её восстановили до полной работоспособности, и, поскольку она не является продвинутым автономным интеллектом, вскоре стало возможным расширить сферу её применения от Президентского метро до других, куда более полезных задач. Теперь, находясь в постоянной связи с [DCS.Leader] через терминалы, MARGoT консультирует поселения как по гражданским, так и по военным вопросам и контролирует автоматизированную защиту ключевых районов, таких как Вашингтон. Эта древняя реликвия ценна для всех, но её довоенный, до-ZAX дизайн делает её относительно уязвимой для попыток взлома. \n \n§YНо должен сказать — куда лучше, когда поезда и торговцы водой приходят вовремя!§!"
DCS_daves_strongest_soldier_trait:0 "Сильнейший солдат Дэйва"
DCS_mothman_trait:0 "Мудрый Мотылек"
DCS_dave_trait:0 "Человек, легенда, Дэйв"

###Decisions###
    DCS_outcast_dealings_decision_category:0 "Торговля и Изгоями"
    DCS_outcast_dealings_decision_category_desc:0 "Изгои Братства могут смотреть свысока на нас, жителей пустошей, но они хорошо платят за любую найденную нами технологию. Продавать им вещи, которые нам непонятны, должно быть выгодно для нас, верно?"
    DCS_super_mutants_decision_category:0 "Охота на Супермутантов"
    DCS_super_mutants_decision_category_desc:0 "Проблема супермутантов выходит из-под контроля. Мы не можем просто прятаться за стенами и ждать, пока Братство решит её."
    DCS_special_projects_decision_category:0 "Специальные Проекты Поселений Столичной Пустоши"
    DCS_special_projects_decision_category_desc:0 "Благодаря нашим выборам фокусов мы можем разблокировать несколько специальных проектов, которые изменят нашу конфедерацию."
    DCS_sell_robots_decision:0 "Продать роботов"
    DCS_sell_robots_decision_desc:0 "На фабрике RobCo было много роботов, которые могли бы нам пригодиться, но мы также могли бы продать их Изгоям."
    DCS_sell_national_guard_loot_decision:0 "Продать добычу из Национальной Гвардии"
    DCS_sell_national_guard_loot_decision_desc:0 "Силовая броня в складе национальной гвардии нам мало пригодится, если мы не понимаем, как её использовать. Однако Изгои хорошо за неё заплатят!"
    DCS_sell_enclave_pa_decision:0 "Продать Силовой Брони Анклава"
    DCS_sell_enclave_pa_decision_desc:0 "Наши солдаты просто не обучены пользоваться такой силовой броней. Мы должны продать эти костюмы Изгоям."
    DCS_sell_constantine_loot_decision:0 "Продать Константинские T-51bs"
    DCS_sell_constantine_loot_decision_desc:0  "T-51bs в Форт-Константине будут представлять особый интерес для наших торговых партнеров в Форт-Индепенденс."
    DCS_sell_advanced_decision:0 "Продать продвинутой электроники"
    DCS_sell_advanced_decision_desc:0 "Продвинутая электроника, которую мы извлекаем из руин, не приносит нам особой пользы. Единственное, для чего она годится, — это продажа тем, кто знает, что с ней делать."
    DCS_sell_circuitry_decision:0 "Продать микросхем"
    DCS_sell_circuitry_decision_desc:0 "Какая польза от электроники, если половина наших поселенцев живет без электричества? Просто продайте ее изгоям."
    DCS_sell_vertibirds_decision:0 "Продать винтокрылы"
    DCS_sell_vertibirds_decision_desc:0 "Эти винтокрылы, которые мы захватили у Анклава, классные, но никто из нас не умеет летать. Но я готов поспорить, что Изгои заплатили бы за них большие крышки."
    DCS_sell_vault_tec_pa_decision:0 "Продать Силовую Броню Убежища"
    DCS_sell_vault_tec_pa_decision_desc:0 "Я, например, никогда раньше не видел такого вида силовой брони, изгои могут хорошо за нее заплатить."
    DCS_mutant_hunts:0 "Организовать охоту на мутантов"
    DCS_mutant_hunts_desc:0 "Мы соберем команду закаленных охотников за мутантами, чтобы немного сократить количество супермутантов."
    DCS_find_mutant_home:0 "Поиски Логова"
    DCS_find_mutant_home_desc:0 "Эти охоты ни к чему не приводят. Нам нужно послать людей, чтобы выяснить, где находятся мутанты, и остановить их на корню."
    DCS_invest_in_crow_decision:0 "Инвестировать в караваны Кроу"
    DCS_invest_in_crow_decision_desc:0 "Мы дадим Кроу несколько крышек, чтобы он мог расширить свою деятельность. Надеюсь, это окупится."
    DCS_invest_in_hoff_decision:0 "Инвестировать в караваны Док Хоффа"
    DCS_invest_in_hoff_decision_desc:0 "Мы дадим Доку Хоффу несколько крышек, чтобы он мог расширить свою деятельность. Надеюсь, это окупится."
    DCS_invest_in_harrith_decision:0 "Инвестировать в караваны Лаки Харриса"
    DCS_invest_in_harrith_decision_desc:0 "Мы дадим Лаки Харриту несколько крышек, чтобы он мог расширить свою деятельность. Надеюсь, это окупится."
    DCS_invest_in_wolfgang_decision:0 "Инвестировать в караваны Крейзи Вольфганга"
    DCS_invest_in_wolfgang_decision_desc:0 "Мы дадим Крейзи Вольфгангу несколько крышек, чтобы он мог расширить свою деятельность. Надеюсь, это окупится."
    DCS_research_molerats_decision:0 "Продолжить исследования отпугивателя кротокрыс"
    DCS_research_molerats_decision_desc:0 "Хотя первая партия репеллента от кротокрысов дала «взрывные» результаты, здесь есть потенциал. Если мы продолжим исследования в этом направлении, то сможем разработать более мягкую версию препарата. Если кротокрысы перестанут пытаться нас съесть, мы даже сможем их одомашнить!"
    DCS_research_mirelurks_decision:0 "Продолжить исследовать Болотников"
    DCS_research_mirelurks_decision_desc:0 "Мы многое узнали о болотниках из исследования руководства по выживанию в пустошах. Исходя из наших выводов и слухов о том, что люди, живущие дальше на севере, приручают их, есть основания полагать, что, если мы продолжим изучать этих водных хищников, то однажды сможем разводить их или даже направить против рейдеров!"
    

###Ideas###

    dcs_loose_confederation_idea:0 "Свободная конфедерация"
    dcs_loose_confederation_idea_desc:0 "Наша страна — это не столько единое целое, сколько свободная конфедерация независимых поселений. Иногда это затрудняет решение различных вопросов, но пока что такая система нам подходит."
    dcs_scavenging_economy_idea:0 "Экономика мародёров"
    dcs_scavenging_economy_idea_desc:0 "За прошедшие после Великой войны столетия массовое производство так и не вернулось в Столичную Пустошь. Наша экономика по-прежнему в значительной степени зависит от сбора мусора на руинах и использования всего, что только можно."
    dcs_fortress_settlements_idea:0 "Каждое поселение - крепость"
    dcs_fortress_settlements_idea_desc:0 "Практически каждое поселение на нашей территории было вынуждено создать мощную систему обороны, чтобы защититься от опасностей, исходящих из пустошей. Здесь повсюду возвышаются высокие стены, контрольно-пропускные пункты и сторожевые башни. Это значительно облегчает защиту от внешних угроз."
    DCS_megaton_beautification_idea:0 "Проект благоустройства Мегатонны"
    DCS_megaton_beautification_idea_desc:0 "Рабочие со всей Столичной Пустоши отзываются со строительных объектов и из мастерских для участия в проекте по благоустройству Мегатонны. Для общественности это амбициозный проект по преобразованию одного из важнейших поселений в пустошах. Для Тенпенни это последняя попытка справиться с этим уродливым местом, прежде чем прибегнуть к ядерному варианту."
    DCS_megaton_revenge_idea:0 "Месть за Мегатонну"
    DCS_megaton_revenge_idea_desc:0 "Жители поселений столичной пустоши объединены желанием отомстить ублюдкам, взорвавшим Мегатонну. Хотя к настоящему моменту они, вероятно, разбежались по разным рейдерским бандам, эти ублюдки и им подобные заплатят за содеянное."
    DCS_ghoul_discrimination_idea:0 "Законы Тенпенни"
    DCS_ghoul_discrimination_idea_desc:0 "Законы Тенпенни — это термин, используемый для описания ряда законов против гулей, которые применяются в Поселениях Вашингтона. Примеры включают запрет гулям есть на глазах у других жителей пустошей, запрет гулям заниматься медициной и запрет гулям владеть оружием. Это привело к тому, что многие гули покинули Поселения Вашингтона и перебрались в другие места, но многие полагают, что это и было целью с самого начала."
    DCS_subsidizing_caravan_guards_idea:0 "Компенсации Охраны Караванов"
    DCS_subsidizing_caravan_guards_idea_desc:0 "Предоставляя караванам компенсацию затрат на наем охранников, караваны могут нанимать более квалифицированных сотрудников и лучше развивать свой бизнес."
    DCS_caravan_guard_drill_instructors_idea:0 "Инструкторы по подготовке охраны караванов"
    DCS_caravan_guard_drill_instructors_idea_desc:0 "Немногие знают, как выжить в пустошах, лучше, чем опытные охранники караванов. Эти закаленные мужчины и женщины передадут свои знания нашим ополченцам, чтобы те тоже смогли выжить во время опасных патрулей, которые им предстоит совершать."
    DCS_springvale_boot_camp_idea:0 "Спрингвейлский учебный лагерь"
    DCS_springvale_boot_camp_idea_desc:0 "Все члены нашего ополчения проходят обучение в тренировочном лагере Спрингвейл, где они изучают основы боевого искусства и выживания в пустошах. Централизованное место проведения обучения позволило повысить его эффективность и направить часть людей в другие места."
    DCS_expanded_militia_idea:0 "Расширенное ополчение"
    DCS_expanded_militia_idea_desc:0 "Раньше наше ополчение состояло из нескольких охранников поселения и стариков с ржавыми винтовками. Теперь это настоящая боевая сила, готовая справиться практически с чем угодно, если только солдаты в силовой броне не начнут падать с неба."
    DCS_settlement_defense_idea:0 "Подготовка Охраны Поселений"
    DCS_settlement_defense_idea_desc:0 "Наши охранники проходят специальную подготовку, чтобы знать основные тактики защиты поселений от внешних атак."
    DCS_regulator_funding_idea:0 "Финансирование Регуляторов"
    DCS_regulator_funding_idea_desc:0 "Регуляторам будут выделены средства для помощи в выполнении их миссии. Чем больше злодеев они убьют, тем лучше будет для всех нас."
    DCS_regulator_training_law:0 "Подготовка Регуляторов"
    DCS_regulator_training_law_desc:0 "Регуляторы, которые получили слишком серьезные травмы или стали слишком стары, чтобы преследовать отбросов пустошей, теперь помогают в обучении нашего ополчения. Их опыт ведения боевых действий на пустошах становится неоценимым."
    DCS_raider_fighting_experience_idea:0 "Опыт боя с рейдерами"
    DCS_raider_fighting_experience_idea_desc:0 "Одно из немногих вещей, которых боятся рейдеры в пустошах, — это вид регулятора. Теперь им придется бояться всего нашего ополчения, потому что регуляторы возглавляют наступление."
    DCS_dave_schools_idea:0 "Школы истории Дэйва"
    DCS_dave_schools_idea_desc:0 "Молодежь Столичной Пустоши узнает о самом важном человеке во всей Пустоши, если не во всем мире. Изучая историю Дэйва, эти дети научатся любить великие достижения нашей нации и будут стремиться стать похожими на великого президента."
    DCS_grabbed_guns_idea:0 "Захваченное Оружие"
    DCS_grabbed_guns_idea_desc:0 "Некоторые жители наших поселений до сих пор обижены на то, что мы забрали их оружие, но они должны понимать, что военным оно нужнее, верно?"
    DCS_long_arm_of_law_idea:0 "Длинная рука закона"
    DCS_long_arm_of_law_idea_desc:0 "Правосудие Дэйва распространяется на самые дальние уголки Столичной Пустоши и, возможно, когда-нибудь выйдет за ее пределы. Преступникам лучше быть начеку."
    DCS_training_slaves_idea:0 "Подготовка рабов"
    DCS_training_slaves_idea_desc:0 "Нам пришлось отвлечь часть наших инструкторов по строевой подготовке, чтобы подготовить беглых рабов Хэмлина к бою. Это может повредить нашей собственной подготовке, но это ради благой цели."
    DCS_enclave_war_recovery_idea:0 "Восстановление после войны с Анклавом"
    DCS_enclave_war_recovery_idea_desc:0 "Война с Анклавом истощила наши ресурсы, людские силы и на время лишила нас надежды. Но теперь, когда угроза наконец-то окончательно устранена, мы можем восстановиться и вновь смотреть в будущее."
    DCS_enclave_war_idea:0 "Война за Выживание"
    DCS_enclave_war_idea_desc:0 "Эта война с Анклавом — тяжелая борьба, в которой мы, возможно, не победим, но у нас нет другого выбора, кроме как сражаться. Если мы не будем сражаться, мы потеряем всё."
    DCS_outcast_advisors_idea:0 "Советники Изгоев"
    DCS_outcast_advisors_idea_desc:0 "В обмен на добычу и ресурсы Изгои отправили несколько человек, чтобы помочь нам с проектами по развитию. Это, может, и не много, но, по крайней мере, они не стреляют в нас."
    DCS_organized_scavs_idea:0 "Организованные мародёры"
    DCS_organized_scavs_idea_desc:0 "Совет поселения предлагает мусорщикам работу по сбору определенных ресурсов, разведке новых территорий или просто проверке слухов. Заработок может быть не самым высоким, но некоторые из них предпочитают стабильную зарплату риску остаться с пустыми руками и жить на радтараканах в течение месяца после неудачной вылазки."
    DCS_lyons_alliance_benefits_idea:0 "Преимущества Альянса Лайонса"
    DCS_lyons_alliance_benefits_idea_desc:0 "Сотрудничество с Братством дает нашему народу не только помощь на случай, если что-то вроде Анклава когда-нибудь вернётся. Чувство безопасности и рост торговли подняли настроение всех жителей Столичной Пустоши."
    DCS_permanent_brotherhood_training_idea:0 "Постоянное обучение Братства"
    DCS_permanent_brotherhood_training_idea_desc:0 "Братство направило нескольких старших рыцарей для наблюдения за нашими учебными объектами. Хотя это не то же самое, что многочисленные инструкторы, которых они прислали во время войны с Анклавом, но всё же лучше, чем ничего."
    DCS_better_together_idea:0 "Вместе - лучше"
    DCS_better_together_idea_desc:0 "Работая в тесном сотрудничестве с Братством в последние месяцы, мы оба поняли, что вместе мы больше, чем просто сочетание наших двух наций. Общие знания, средства и человеческие ресурсы позволили обеим нашим группам достичь высот, которые раньше казались недостижимыми."
    DCS_lessons_of_war_idea:0 "Уроки Войны"
    DCS_lessons_of_war_idea_desc:0 "Тяжелая война с Анклавом многому нас научила о том, что нужно для победы в настоящей войне. Мы будем готовы, если когда-нибудь нам снова придется направить своё оружие против такой большой угрозы, даже против Братства, если оно сойдет с пути."
    DCS_standing_alone_idea:0 "Мы остались одни"
    DCS_standing_alone_idea_desc:0 "Многие думали, что мы не сможем выжить без Братства, но мы доказали, что они ошибались. Мы создали мощную армию, провели собственные исследования технологий Анклава и сделали первые шаги в небеса. Поселения Столичной Пустоши продемонстрировали свою силу в пустошах, и это только начало."
    DCS_harrith_caravans_idea:0 "Караваны Харрита"
    DCS_harrith_caravans_idea:0 "Лаки Харрит был первым, кто заключил торговый союз много лет назад. Престиж, который принес ему этот союз, помог ему расширить свой бизнес, что, в свою очередь, помогает нам."
    DCS_crow_caravans_idea:0 "Караваны Кроу"
    DCS_crow_caravans_idea_desc:0 "Кроу был первым, кто вступил в торговый альянс несколько лет назад. Престиж, который он получил благодаря этому, помог ему расширить свой бизнес, что, в свою очередь, помогает нам."
    DCS_hoff_caravans_idea:0 "Караваны Док Хоффа"
    DCS_hoff_caravans_idea_desc:0 "Док Хофф был первым, кто вступил в торговый альянс несколько лет назад. Престиж, который он получил благодаря этому, помог ему расширить свой бизнес, что, в свою очередь, помогает нам."
    DCS_wolfgang_caravans_idea:0 "Караваны Крейзи Вольфганга"
    DCS_wolfgang_caravans_idea_desc:0  "Крейзи Вольфганг был первым, кто вступил в торговый альянс несколько лет назад. Престиж, который он получил благодаря этому, помог ему расширить свой бизнес, что, в свою очередь, помогает нам."
    DCS_collective_defense_idea:0 "Коллективная Оборона"
    DCS_collective_defense_idea_desc:0 "Поселения Столичной Пустоши были основаны на принципе коллективной обороны. Этот идеал лежал в основе многих решений и по-прежнему влияет на нас и сегодня."
    DCS_trade_partnerships_idea:0 "Сотрудничество и торговля"
    DCS_trade_partnerships_idea_desc:0 "Поселения Столичной Пустоши были основаны в духе коммерции и свободной торговли. Этот идеал повлиял на многие решения и по-прежнему оказывает на нас влияние."
    DCS_individual_freedom_idea:0 "Автономия Поселений"
    DCS_individual_freedom_idea_desc:0 "Поселения Столичной Пустоши были основаны с духом свободы и автономии поселений. Этот идеал повлиял на многие решения и по-прежнему влияет на нас и по сей день."
    DCS_food_scavenging_idea:0 "Глава 1. Поиск пищи"
    DCS_food_scavenging_idea_desc:0 "Благодаря знаниям, содержащимся в «Руководстве по выживанию в пустошах», наши сборщики стали более искусными в поиске пищи, бродя по довоенным руинам. Это увеличило запасы продовольствия и сделало его более доступным для всех."
    DCS_studied_radiation_idea:0 "Глава 1. Радиация"
    DCS_studied_radiation_idea_desc:0 "В руководстве по выживанию в пустошах содержится огромное количество информации о лечении радиационного отравления. Это будет неоценимо для обычного жителя пустошей, но особенно полезно для наших ополченцев, которые бродят по пустошам."
    DCS_minefield_experts_idea:0 "Глава 1. Минные поля"
    DCS_minefield_experts_idea_desc:0 "В руководстве по выживанию в пустошах подробно рассказывается о том, как перемещаться по довоенным минным полям, а также о том, как обезвреживать мины и использовать их в своих интересах. Нашим врагам эта часть не нравится."
    DCS_library_archives_idea:0 "Библиотечные Архивы"
    DCS_library_archives_idea_desc:0 "У нас есть часть цифрового архива Библиотеки Конгресса. Если мы достаточно хорошо покопаемся, то, возможно, сможем понять, как строить дома из чего-то другого, кроме металлолома и дерьма браминов."
    DCS_roe_trade_empire_idea:0 "Столичная Торговая Империя"
    DCS_roe_trade_empire_idea_desc:0 "Дядя Роу основал Общину Кентербери много лет назад с целью превратить ее в торговую державу, способную соперничать с Ривет-Сити. После многих лет упорного труда он превратил целый район Столичной Пустоши в процветающий рынок, превосходящий его самые смелые мечты."
    DCS_vault_101_trade_idea:0 "Торговля с Убежищем 101"
    DCS_vault_101_trade_idea_desc:0 "Хотя жители Убежища 101 не хотят выходить жить среди нас, они готовы обмениваться необходимыми вещами. Это только начало."
    DCS_pitt_losing_slaves_idea:0 "Потерянные караваны рабов"
    DCS_pitt_losing_slaves_idea_desc:0 "Поставки рабов из Столичной Пустоши замедляются до минимума благодаря скоординированным усилиям поселений Столичной Пустоши. Если такая тенденция сохранится, нас может ожидать нехватка рабочей силы."
    DCS_slave_sales_disrupted_idea:0 "Прекращение работорговли"
    DCS_slave_sales_disrupted_idea_desc:0 "Поселения Столичной Пустоши постоянно нападают на наши караваны с рабами, которые направляются в Парадайз-Фоллс. Это сильно сказывается на наших доходах."
    DCS_ant_studies_idea:0 "Исследование Муравьев"
    DCS_ant_studies_idea_desc:0 "Доктор Леско изучает муравьев в Грейдитче, и нам приходится отрывать людей от других проектов, чтобы он не усугубил ситуацию."
    DCS_studying_mirelurks_idea:0 "Исследование Болотников"
    DCS_studying_mirelurks_idea_desc:0 "Мы направили нескольких наших ученых на изучение Болотников. Некоторые из их помощников погибли во время работы, но это того стоило."
    DCS_studying_molerats_idea:0 "Исследование Кротокрысов"
    DCS_studying_molerats_idea_desc:0 "Мы продолжаем изучать и пытаться одомашнить обыкновенного кротокрыса. Это может отвлекать людей от других задач, но это важно!"
    DCS_tenpenny_commune_idea:0 "Коммуна Тенпенни"
    DCS_tenpenny_commune_idea_desc:0 "Ирвинг Ченг превратил Тенпенни-Тауэр в народную коммуну. Это привело к массовому исходу многих богатых постояльцев башни, но на их место в башню стекаются множество других неудачников из пустошей, чтобы в обмен на тяжелый труд получить безопасное место для проживания и, если повезет, еду."
    DCS_ghoul_tower_idea:0 "Филлипс-Тауэр"
    DCS_ghoul_tower_idea_desc:0 "Рой Филлипс превратил Тенпенни-Тауэр из дома для богатой элиты пустошей в дом для гулей. Вдали от ветхих музеев и метро-туннелей, куда их обычно отправляют, многие гули даже из-за пределов Столичной пустоши отправляются в путешествие к месту, где они могут жить хорошей жизнью."
    DCS_cure_research_idea:0 "Исследование лечения от КТД"
    DCS_cure_research_idea_desc:0 "Для этого потребуются самоотверженные усилия некоторых из самых блестящих умов, которые есть в Столичной пустоши, за пределами Братства или Ривет-Сити, но со временем мы уверены, что сможем разработать лекарство от КТД."
    DCS_central_law_idea:0 "Законы, установленные Советом"
    DCS_central_law_idea_desc:0 "Совет лидеров поселений будет устанавливать законы для этой земли. Новые поселения могут сопротивляться этому, но со временем они примут изменения."
    DCS_settlement_law_idea:0 "Законы Поселений"
    DCS_settlement_law_idea_desc:0 "Мы по-прежнему будем разрешать поселениям устанавливать законы в пределах своих границ. Помимо этого, совет лидеров поселений будет устанавливать единые законы. Конфликты юрисдикции с беглецами по-прежнему будут возникать, но их можно будет решать в индивидуальном порядке."
    DCS_harsh_law_idea:0 "Справедливость Пустошей"
    DCS_harsh_law_idea_desc:0 "Совет лидеров поселения будет устанавливать законы для этой земли. Высшую справедливость будут вершить Регуляторы, выступая в роли судей, присяжных и палачей."
    DCS_caravan_law_idea:0 "Закон о караванах"
    DCS_caravan_law_idea_desc:0 "Поселения будут по-прежнему самостоятельно принимать законы. За пределами их стен мы постараемся кодифицировать неписаный кодекс караванов. Это может привести к ослаблению законов в пустошах, но у нас все равно нет возможности контролировать всю пустошь."
    DCS_aristocratic_law_idea:0 "Законы Аристократов"
    DCS_aristocratic_law_idea_desc:0 "Аристократическая элита Пустоши будет устанавливать наши законы. Кто лучше, чем самые успешные члены общества, знает, как лучше всего управлять этим обществом?"
    DCS_dave_law_idea:0 "Законы Дэйва"
    DCS_dave_law_idea_desc:0 "Если наш великий президент не имеет права устанавливать законы нашей страны, то кто же тогда имеет такое право? Дэйв обеспечит верховенство справедливости, если только справедливость не будет мешать правительству."
    DCS_centralized_militia_idea:0 "Ополчения Поселений"
    DCS_centralized_militia_idea_desc:0 "Поселения будут по-прежнему содержать свои ополчения, а централизованная организация будет призывать их к оружию, когда это необходимо для защиты поселений в целом. Стены поселения остаются последней линией обороны, но теперь появляется более широкая буферная зона."
    DCS_unified_army_idea:0 "Единая армия"
    DCS_unified_army_idea_desc:0 "Поселения могут содержать ополчение для решения местных проблем. Однако основная часть наших вооруженных сил будет организована в централизованную армию под командованием совета поселения."
    DCS_regulator_militias_idea:0 "Команда Регуляторов"
    DCS_regulator_militias_idea_desc:0 "Поселения могут содержать ополчение для решения местных проблем. Однако основная часть наших вооруженных сил будет организована в централизованную армию под командованием опытных регуляторов, которые подчиняются совету поселения."
    DCS_merc_army_idea:0 "Наёмные вспомогательные войска"
    DCS_merc_army_idea_desc:0 "Основу нашего ополчения будут составлять ополченцы из поселений. Наемники, нанятые советом поселения, заполнят пробелы, оставшиеся в результате такого подхода."
    DCS_talon_remnants_idea:0 "Вспомогательные войска Компании «Коготь»"
    DCS_talon_remnants_idea_desc:0 "Поселенческое ополчение станет основой нашей армии. Бывшие наемники компании «Коготь» заполнят пробелы, оставленные этим подходом."
    DCS_daves_grand_army_idea:0 "Великая армия Республики"
    DCS_daves_grand_army_idea_desc:0 "Каждый здоровый сын Объединенных Поселений Дэйва должен будет зарегистрироваться для призыва на военную службу и служить, если его вызовут."
    DCS_waste_regulation_idea:0 "Ранняя индустриальная страна"
    DCS_waste_regulation_idea_desc:0 "Мы находимся в процессе перехода от экономики, основанной на сборе мусора, к промышленной экономике. Мы составили базовый перечень законов, касающихся промышленности, и по мере необходимости разрабатываем новые. На нарушителей налагаются штрафы, чтобы обеспечить соблюдение ими новых правил."
    DCS_harsh_waste_regulation_idea:0 "Твердо регулируемая страна с ранней индустриализацией"
    DCS_harsh_waste_regulation_idea_desc:0 "Мы находимся в процессе перехода от экономики, основанной на сборе мусора, к промышленной экономике. Мы составили базовый перечень законов, касающихся промышленности, и по мере необходимости разрабатываем новые. Нарушители подвергаются наказаниям, начиная от штрафов и заканчивая смертной казнью."
    DCS_industry_waste_regulation_idea:0 "Регулируемая производственниками страна с ранней индустриализацией"
    DCS_industry_waste_regulation_idea_desc:0 "Мы находимся в процессе перехода от экономики, основанной на добыче мусора, к промышленной экономике. Мы пригласили лидеров отрасли составить базовый перечень законов, касающихся промышленности, и по мере необходимости разрабатываются новые законы. Некоторые могут сказать, что это все равно что дать лисе ключи от курятника, но мы с этим не согласны."
    DCS_no_waste_regulation_idea:0 "Нерегулируемая ранняя индустриальная страна"
    DCS_no_waste_regulation_idea_desc:0 "Мы находимся в процессе перехода от экономики, основанной на добыче мусора, к промышленной экономике. Мы отказываемся накладывать какие-либо ограничения на экономический прогресс, чтобы улучшить состояние экономики. Это привело к росту проблем с общественным здравоохранением, а также к нескольким химическим пожарам, но они, похоже, ограничиваются населенными пунктами с низким уровнем доходов."
    DCS_flexable_waste_regulation_idea:0 "Гибко управляемая страна с ранней индустриализацией"
    DCS_flexable_waste_regulation_idea_desc:0 "Мы находимся в процессе перехода от экономики, основанной на добыче мусора, к промышленной экономике. Президент составил список правил, касающихся сброса промышленных отходов. Правило номер один считается самым важным - оно гласит, что президент Дэйв может отменить любое правило для бизнеса, если у того есть его письмо с одобрением."
    DCS_appalachian_tech_exports_idea:0 "Экспорт технологий Аппалачи"
    DCS_appalachian_tech_exports_idea_desc:0 "В соответствии с нашим соглашением с Братством, мы отправляем практически все ценные технологии и передовые материалы довоенного времени, найденные в Северных Аппалачах, в Братство Лайона для их использования и изучения."
    DCS_appalachian_tech_imports_idea:0 "Импорт технологий Аппалачи"
    DCS_appalachian_tech_imports_idea_desc:0 "В соответствии с нашим соглашением с жителями Столичной Пустоши, они отправляют нам практически все ценные технологии и передовые материалы довоенного периода, найденные в Северных Аппалачах."
    DCS_guarding_water_caravans_idea:0 "Охрана караванов с водой"
    DCS_guarding_water_caravans_idea_desc:0 "Некоторые из наших ополченцев привлечены к оказанию помощи водным караванам из Проекта «Чистота». Потеря рабочей силы с лихвой компенсируется выгодами для наших поселений."
    DCS_funding_purifier_idea:0 "Финансирование Проекта «Чистота»"
    DCS_funding_purifier_idea_desc:0 "Мы выделили значительную часть нашего бюджета на обеспечение бесперебойной работы проекта «Чистота»."
    DCS_regulators_guarding_water_caravans_idea:0 "Регуляторы защищают Караваны"
    DCS_regulators_guarding_water_caravans_idea_desc:0 "Распространилась весть, что отряды Регуляторов выслеживают всех, кто осмеливается напасть на караваны Проекта «Чистота». Мы уже наблюдаем значительное снижение числа нападений!"
    DCS_guiding_water_caravans_idea:0 "Сопровождение караванов с водой"
    DCS_guiding_water_caravans_idea_desc:0 "Мы нанимаем опытных охранников караванов, чтобы обеспечить безопасную и быструю доставку караванов проекта «Чистота» до места назначения."
    DCS_tenpenny_assisting_purifier_idea:0 "Бёрк помогает проекту «Чистота»"
    DCS_tenpenny_assisting_purifier_idea_desc:0 "Мистер Бёрк договорился с некоторыми из своих старых знакомых, чтобы они помогли с проектом «Чистота». Все знают, что эти люди — просто наемники из компании «Коготь», но никто не хочет ничего говорить."
    DCS_water_rationing_idea:0 "Нормирование воды"
    DCS_water_rationing_idea_desc:0 "Дэйв ввел строгие правила нормирования воды, за исключением столицы."
    DCS_regulator_citadel_idea:0 "Цитадель Регуляторов"
    DCS_regulator_citadel_idea_desc:0 "Некогда штаб-квартира Братства Стали Лайонса, а до того — центр довоенных американских вооруженных сил, Цитадель теперь является новой штаб-квартирой Регуляторов Восточного побережья Республики. Этот центральный оперативный центр и полигон для обучения стал огромным подспорьем для наших вооруженных сил, стремящихся навести порядок в Столичной пустоши и за её пределами."
    DCS_citadel_trading_post_idea:0 "Торговый Пост в Цитадели"
    DCS_citadel_trading_post_idea_desc:0 "Когда-то военная база, а теперь центр торговли в Столичной пустоши. Торговый пост Цитадели — это место, где можно найти лучшие предложения по оборудованию, припасам или спасенным из руин Вашингтона предметам. Благодаря близости портов это удобная остановка для торговцев, путешествующих по побережью!"
    DCS_colonial_subject_idea:0 "Колониальный Субъект"
    DCS_colonial_subject_idea_desc:0 "Наша страна — не более чем колониальный субъект Восточно-Побережной Республики. Мы отправляем наши ресурсы, людей и плоды нашего труда в Столичную Пустошь, и что мы получаем взамен? Тенпенни считает себя королем этих земель, и всех, кто осмеливается высказаться, уводит колониальный вождь Густаво."
    DCS_colonial_subject_2_idea:0 "Колониальный Субъект"
    DCS_colonial_subject_2_idea_desc:0 "Наша страна — не более чем колониальный субъект Восточно-Побережной Республики. Мы отправляем наши ресурсы, людей и плоды нашего труда в Столичную Пустошь, и что мы получаем взамен? Тенпенни считает себя королем этих земель, и всех, кто осмеливается высказаться, уводит колониальный вождь Густаво."
    DCS_capitals_brightest_idea:0 "Лучшие и яркие умы Столицы"
    DCS_capitals_brightest_idea_desc:0 "Научная команда Ривет-Сити сотрудничает с нашими учеными."
    DCS_synergenic_cooperation:0 "Синергетическое сотрудничество"
    DCS_synergenic_cooperation_desc:0 "Совместная работа с нашими братьями над проектом «Чистота» принесла пользу всем участникам. Наш союз действительно больше, чем сумма его частей."
    DCS_naval_trade_springboard_idea:0 "Морской плацдарм"
    DCS_naval_trade_springboard_idea_desc:0 "Благодаря портам и морскому опыту поселений Делмарвы мы можем расширить сферу охвата наших караванов далеко за пределы того, что большинство торговцев считали возможным."
    DCS_fresh_citrus_idea:0 "Свежие Апельсины"
    DCS_fresh_citrus_idea_desc:0 "Благодаря торговле с более тропическими побережьями мы получили доступ к фруктам, которые большинство жителей пустошей считали лишь вкусами Ментатов. С тех пор как мы начали импортировать апельсины, количество случаев цинги в Столичной пустоши сократилось на 49%!"
    DCS_appalachian_trade:0 "Аппалачская торговля"
    DCS_appalachian_trade_desc:0 "Торговля между Столичными Пустошами и Северными Аппалачами оказалась благотворной для качества жизни обоих регионов."

###Leaders###

    DCS_lucas_simms_name:0 "Лукас Симмс"
    DCS_lucas_simms_desc:0 "Выросший в Мегатонне, Лукас Симмс с раннего возраста научился тому, что нужно для выживания в пустошах. Достигнув взрослого возраста, он быстро занял пост шерифа Мегатонны, готовый сделать все необходимое, чтобы помочь городу выжить и процветать. Несмотря на свою устрашающую внешность, Симмс своим дружелюбным характером завоевывает расположение людей, которых он защищает."
    DCS_roe_name:0 "Дядя Роу"
    DCS_uncle_roe_desc:0 "Эрнест «Дядя» Роу — прирожденный торговец, который в возрасте 20 лет основал поселение Община Кентербери на крышки, заработанные им как торговцем. С тех пор он превратил небольшой торговый пост в важную остановку на маршруте караванов по Столичной пустоши. Многие считают его основателем Поселений Столичной Пустоши из-за его роли в объединении поселений для борьбы с угрозой рейдеров в Руинах Бетесды."
    DCS_tenpenny_name:0 "Алистер Тенпенни"
    DCS_tenpenny_desc:0 "Алистер Тенпенни в молодости покинул руины Великобритании, чтобы найти свое счастье в Столичной Пустоши. Можно с уверенностью сказать, что он его нашел. Он владеет одним из самых востребованных участков недвижимости в Столичной пустоши и проводит большую часть своих дней, пьянствуя, трахаясь и стреляя во все, что ему заблагорассудится, со своего поста на вершине Тенпенни-Тауэр. Хотя никто не скажет этого вслух, некоторые задаются вопросом, не является ли его правая рука, мистер Бёрк, настоящим мозгом всех начинаний Тенпенни."
    DCS_dave_name:0 "Дэйв"
    DCS_dave_desc:0 "Дэйв провел свою юность в качестве наемника в Столичной Пустоши, прежде чем вернуться домой, в « Королевство Тома» своего деспотичного отца. Как и любой истинный патриотичный американец, Дэйв ненавидел монархию и сверг своего отца, основав Республику Дэйва. С тех пор он успешно руководит демократическим государством, что является редкостью в Пустошах. Теперь он возглавляет гораздо более крупную демократию. Смогут ли идеалы свободы и демократии Дэйва масштабироваться?"
    DCS_council_name:0 "Совет поселений Вашингтона"
    DCS_settlement_council_desc:0 "Совет поселений Вашингтона состоит из лидеров различных поселений в Столичной Пустоши. Хотя они провели только одно официальное заседание, чтобы создать Союз поселений Вашингтона после успешного совместного нападения на крепость рейдеров несколько лет назад, продолжающийся успех поселений заставляет их вскоре встретиться снова, чтобы обсудить текущие вопросы, а также возможность назначения председателя, который будет курировать конфедерацию."
    DCS_hamlin_name:0 "Ганнибал Гамлин"
    DCS_AMATA_NAME:0 "Амата Альмодовар"
    DCS_BROWN_NAME:0 "Мойра Браун"
    DCS_LESKO_NAME:0 "Доктор Леско"
    DCS_BURKE_NAME:0 "Мистер Бёрк"
    DCS_DAVE_NAME:0 "Дэйв"
    DCS_JESSICA_NAME:0 "Первая леди Джессика"
    DCS_KING_NAME:0 "Эван Кинг"
    DCS_PAPPY_NAME:0 "Паппи"
    DCS_RED_NAME:0 "Рэд"
    DCS_SIERRA_NAME:0 "Сьерра Петровита"
    DCS_VANCE_NAME:0 "Вэнс"
    DCS_dashwood_minister_name:0 "Герберт Дэринг Дэшвуд"
    DCS_agatha_minister_name:0 "Агата"
    DCS_brunswick_minister_name:0 "Колин Брансвик"
    DCS_MARGOT_minister_name:0 "§YM.A.R.Go.T§!"
    DCS_MOTHMAN_NAME:0 "Мудрый Мотылек"
    DCS_MOTHMAN_DESC:0 "Хотя Дэйв по-прежнему является президентом Республики, его разум захватил Мотылек. Под покровом ночи существо было перемещено в Столичную Пустошь и теперь руководит делами Республики. Постойте... так вот почему Дэйв постоянно просит поставлять ему лампочки?"
    DCS_REECE_NAME:0 "Рис Робертс"
    DCS_REECE_DESC:0 "Рис Робертс – немного сумасшедший. Он появился практически из ниоткуда и взялся за борьбу за Объединенные поселения Дэйва, как никто другой. Некоторые говорят, что с Рисом на своей стороне Дэйв мог бы завоевать всю довоенную территорию Соединенных Штатов."

###National Focuses###
DCS_nf_a001:0 "Империя Торговцев"
DCS_nf_a001_desc:0 "Много лет назад дядя Роу начал убеждать большие караваны Столичной Пустоши работать вместе, что в конечном итоге принесло пользу всем участникам. Он не знал, что это станет первой искрой, которая приведет к объединению поселений Столичной Пустоши."
DCS_nf_a002:0 "Руины Бетесды"
DCS_nf_a002_desc:0 "Сотрудничество между торговцами шло хорошо, пока в старые руины Бетесды не вторглись рейдеры. Караваны пострадали, а нанятые наемники оказались малоэффективны. Торговцам понадобилась помощь."
DCS_nf_a003:0 "Первое Собрание"
DCS_nf_a003_desc:0 "После успешной совместной операции по изгнанию рейдеров из руин Бетесды несколько лидеров поселений собрались, чтобы обсудить дальнейшее сотрудничество. Слова, сказанные здесь, заложили основу всего, что представляли собой поселения Столичной Пустоши."
DCS_nf_a004:0 "Второе Собрание"
DCS_nf_a004_desc:0 "Несмотря на повседневные проблемы жизни в Столичной Пустоши, последние несколько лет были относительно благоприятными для поселений Вашингтона. Рейдеры отступили на юг и дальний север, Братство борется с мутантами, а торговля процветает. Была созвана очередная встреча руководителей поселений, чтобы обсудить шаги по дальнейшему объединению."
DCS_nf_a005:0 "Большие проблемы в Большом Городе"
DCS_nf_a005_desc:0 "Поселение Большого Города постоянно подвергается нападениям рейдеров и супермутантов. Они умоляют другие поселения о любой помощи."
DCS_nf_a006:0 "Встать на Защиту!"
DCS_nf_a006_desc:0 "Если мы позволим мутантам и рейдерам разгромить одно поселение, то вскоре они придут за другим. Мы будем поддерживать Большой Город и отразим эти угрозы!"
DCS_nf_a007:0 "Беженцы из Большого Города"
DCS_nf_a007_desc:0 "Большой Город не имеет реальной ценности с точки зрения ресурсов и находится в трудном для обороны положении. Мы должны эвакуировать всех, кто там живет, и принять их в других поселениях."
DCS_nf_a008:0 "Битва за Джермантаун"
DCS_nf_a008_desc:0 "Мы отследили мутантов, которые продолжают атаковать Большой Город, до некоего оплота мутантов в старом полицейском участке Джермантауна. Если мы хотим удержать этот поселок, нам нужно избавиться от этих мутантов."
DCS_nf_a009:0 "Большие Перемены"
DCS_nf_a009_desc:0 "Большой Город может и не имеет плодородной почвы или ценных ресурсов, но он имеет потенциал стать солидным промышленным поселением при наличии необходимого оборудования и запасов."
DCS_nf_a010:0 "Время Повзрослеть"
DCS_nf_a010_desc:0 "Несмотря на то, что жители Большого Города были взрослыми людьми, они по-прежнему придерживались многих традиций Литтл Ламплайта. Чтобы интегрировать их в жизнь других поселений, потребуются определенные усилия."
DCS_nf_a011:0 "Маленькая Разборка"
DCS_nf_a011_desc:0 "В Большом Городе, возможно, не было много ресурсов, но если там больше никто не живет, мы можем разобрать здания и забрать все, что осталось."
DCS_nf_a012:0 "Сверхчеловеческий Гамбит"
DCS_nf_a012_desc:0 "Община Кентербери подверглась нападению сумасшедшей женщины, которая управляет армией муравьев. Как будто этого было недостаточно, местный механик, похоже, тоже сошел с ума и теперь считает себя супергероем по имени «Механист». Их сражения обычно не наносят большого ущерба, но это лишь вопрос времени, когда ситуация выйдет из-под контроля."
DCS_nf_a013:0 "Помощь для Героя"
DCS_nf_a013_desc:0 "Механист, быть может и сбит с толку, но в глубине души у него благие намерения. Мы должны помочь ему наконец победить своего врага."
DCS_nf_a014:0 "Дань для Королевы"
DCS_nf_a014_desc:0 "Армия роботов Механиста представляет собой потенциальную опасность, гораздо большую, чем несколько жуков. Мы должны предложить его НеМирмике в обмен на её уход."
DCS_nf_a015:0 "Геройская Благодарность"
DCS_nf_a015_desc:0 "Механист благодарен нам за помощь в победе над НеМирмикой. В связи с уменьшением угрозы со стороны муравьев и в знак благодарности он подарил нам несколько металлических помощников, чтобы «останавливать злодеев»."
DCS_nf_a016:0 "Логово Героя"
DCS_nf_a016_desc:0 "Логово Механиста, как он его называет, на самом деле является старым центром по ремонту роботов. Мы можем восстановить часть оборудования и использовать это место не только для ремонта его роботов."
DCS_nf_a017:0 "Обыск в Логове"
DCS_nf_a017_desc:0 "С исчезновением Механиста его старое укрытие осталось пустым и готовым к тому, чтобы мы могли использовать найденные в нем ценные вещи."
DCS_nf_a018:0 "Центр по сбору хлама"
DCS_nf_a018_desc:0 "В ремонтном центре было гораздо больше, чем несколько коробок с металлоломом и несколько ржавых роботов. Потребуются годы, чтобы перебрать весь этот металлолом, и мы используем каждую его часть."
DCS_nf_a019:0 "Семейные Проблемы"
DCS_nf_a019_desc:0 "Арефу сообщает о растущих проблемах с группой, называющей себя «семья». Если мы не вмешаемся, то вскоре Арефу может перестать существовать."
DCS_nf_a020:0 "Вычистить Мусор"
DCS_nf_a020_desc:0 "Семья — это не что иное, как кровожадные уроды, которых нужно уничтожить. Мы начнем штурм их убежища."
DCS_nf_a021:0 "Сделки в Темноте"
DCS_nf_a021_desc:0 "Семья может казаться странной, и некоторым не нравятся их методы, но они все равно нормальные люди. Благодаря честным переговорам, мы можем уладить вопросы между Семьей и Арефу."
DCS_nf_a022:0 "Расширение до Мерести"
DCS_nf_a022_desc:0 "Семья была уничтожена, но жители Арефу по-прежнему сообщают, что ночью видят странные фигуры, бродящие вокруг станции Северо-Западной Сенеки."
DCS_nf_a023:0 "Новое Подземелье"
DCS_nf_a023_desc:0 "Метрополитенские туннели возле Арефу имеют много положительных сторон, если не обращать внимания на отсутствие солнечного света, сырость и пещеры с болотниками поблизости. Мы можем обустроить это место как хороший дом для гулей, которые не смогли пробиться через Вашингтон, но и не хотят жить в наших поселениях."
DCS_nf_a024:0 "Убежище Мерести"
DCS_nf_a024_desc:0 "С тех пор, как мы начали иметь дело с Семьей, всё больше людей, похожих на них, стекаются к станции метро Мерести в поисках себе подобных. Это место превратилось в настоящий оплот изгоев и чудаков из Столичной Пустоши."
DCS_nf_a025:0 "Направить их Жажду"
DCS_nf_a025_desc:0 "В Семье есть ряд способных бойцов, которые рвутся в бой и жаждут залить поле сражения кровью. Лучше пусть они направят свою энергию и кровожадность на рейдеров, а не на нас."
DCS_nf_a026:0 "Выборы"
DCS_nf_a026_desc:0 "Голоса в поселениях по всей Пустоши подсчитываются, и, похоже, скоро будет определен первый спикер Совета поселений Столичной Пустоши. Но что происходит с Дэйвом?"
DCS_nf_b001:0 "Нотка Классики"
DCS_nf_b001_desc:0 "Жители Столичной Пустоши мудро выбрали одного из самых успешных среди них в качестве своего нового лидера. Вполне естественно, что они видят, каких высот достиг Тенпенни, и надеются, что он вытащит остальных из грязи."
DCS_nf_b002:0 "Планы Изменились?"
DCS_nf_b002_desc:0 "Учитывая, что Тенпенни стал новым лидером поселений Столичной Пустоши, взрыв одного из крупнейших городов в этом районе, возможно, не самая лучшая идея."
DCS_nf_b003:0 "Отмени ЭТО!"
DCS_nf_b003_desc:0 "Тенпенни просто умрёт от стыда, если Мегатонна будет взорвана под его руководством. Нет, нужно найти другое решение для восстановления этого ландшафта."
DCS_nf_b004:0 "Согласно плану"
DCS_nf_b004_desc:0 "Этот уродливый объект всё равно нужно убрать. Со временем люди успокоятся, если вину возложат на тех, кто действительно в этом виноват."
DCS_nf_b005:0 "Благоустройство Мегатонны"
DCS_nf_b005_desc:0 "Если мы не можем взорвать Мегатонну, то можем хотя бы сделать её менее уродливой, верно?"
DCS_nf_b006:0 "МегаТен"
DCS_nf_b006_desc:0 "Это заняло некоторое время и значительные ресурсы, но Мегатонна наконец-то стала поселением, которое Тенпенни может с радостью видеть на горизонте. Несомненно, жители Пустошей также оценят усилия по реконструкции Мегатонны, которая теперь носит новое название МегаТен."
DCS_nf_b007:0 "Бряцание Оружием"
DCS_nf_b007_desc:0 "Обвинение рейдеров в катастрофе Мегатонны превратило потенциальный кошмар в благо для вербовки. Обитатели пустошей по всей нашей территории выстраиваются в очередь, чтобы взять в руки винтовку и отомстить рейдерам, «убившим» их друзей и близких."
DCS_nf_b008:0 "Мегатоннский Мемориал"
DCS_nf_b008_desc:0 "Тенпенни щедро пожертвовал из своего кармана крышки, чтобы построить мемориал в память о тех, кто погиб в результате взрыва в Мегатонне. Какой замечательный человек!"
DCS_nf_b009:0 "Гули в Башне?"
DCS_nf_b009_desc:0 "Зомби по имени Рой Филлипс и несколько других гулей уже несколько недель просят впустить их в Тенпенни-Тауэр. Нужно что-то предпринять."
DCS_nf_b010:0 "Зомби Вход Воспрещен"
DCS_nf_b010_desc:0 "Эти гули страдают от мучительной жизни и в любой момент рискуют стать дикими. Избавить их от страданий — это милосердие по отношению к ним, и гарантия нашей безопасности."
DCS_nf_b011:0 "Законы Для Гулей"
DCS_nf_b011_desc:0 "Гулям придется смириться с тем, что большая часть Столичной Пустоши их не любит. Они воняют, представляют опасность, поскольку могут одичать, и выглядят не очень то привлекательно. Если они хотят остаться в наших городах, им придется соблюдать некоторые новые правила."
DCS_nf_b012:0 "Форт Константин"
DCS_nf_b012_desc:0 "Недавняя стычка с Анклавом напомнила Тенпенни, что у него где-то завалялись несколько дубликатов старых ключей от ближайшего форта. Стоит послать туда несколько человек, чтобы они всё там проверили."
DCS_nf_b013:0 "Сокровища Константина"
DCS_nf_b013_desc:0 "Форт Константин располагал значительным запасом оружия и брони, который мог бы вызвать даже у Братства легкую зависть. Будем надеяться, что не слишком сильную."
DCS_nf_b014:0 "Ремонт в Башне"
DCS_nf_b014_desc:0 "Тенпенни-Тауэр всегда придерживался самых строгих стандартов качества и уровня. При этом небольшие налоговые отчисления могли бы помочь сделать идеальный дом ещё лучше."
DCS_nf_b015:0 "Столичная Элита"
DCS_nf_b015_desc:0 "Тенпенни-Тауэр всегда привлекал самых престижных и богатых жителей со всей Столичной Пустоши. Но новости о недавней реконструкции вызывают ещё больший ажиотаж, чем когда-либо."
DCS_nf_b016:0 "Спрос и Предложение"
DCS_nf_b016_desc:0 "В связи с постоянно растущим спросом на жилье в Тенпенни-Тауэр у руководства появилась возможность повысить цены в соответствии со спросом."
DCS_nf_b017:0 "Тенпенни-Сити"
DCS_nf_b017_desc:0 "Те, кто не может попасть в башню Тенпенни-Тауэр, все равно хотят жить рядом с ней. При таком раскладе у нас на руках окажется целый трущобный район. Вместо этого мы перенаправим ресурсы, чтобы по крайней мере вокруг нашей красивой башни был приятный городок. Иначе мы рискуем увидеть падение цен на аренду."
DCS_nf_b018:0 "Дядя Нашей Нации"
DCS_nf_b018_desc:0 "Дядя Роу был одним из главных сторонников объединения наших поселений. Было совершенно логично, что именно его выбрали, чтобы он привел нас к светлому будущему."
DCS_nf_b019:0 "Руководство по Выживанию в Пустоши"
DCS_nf_b019_desc:0 "Мойра Браун из Мегатонны пытается написать книгу о выживании в Пустошах и объявила, что ищет помощников для проведения необходимых полевых исследований."
DCS_nf_b020:0 "Первая Глава"
DCS_nf_b020_desc:0 "В первой главе книги рассказывается о поиске пищи, борьбе с радиацией и пересечении минного поля. Всё это важно знать для жителя пустошей."
DCS_nf_b021:0 "Вторая Глава"
DCS_nf_b021_desc:0 "Вторая глава книги посвящена в основном угрозам, исходящим от пустошей. Нашим людям важно понимать, как бороться с кротокрысами, болотниками и просто с общими физическими травмами."
DCS_nf_b022:0 "Третья Глава"
DCS_nf_b022_desc:0 "Последняя глава руководства посвящена тому, чему жители пустошей могут научиться из прошлого. Изучение успеха Ривет-Сити, перепрофилирование старых роботов и поиск утраченной мудрости."
DCS_nf_b023:0 "Улучшение Караванных Путей"
DCS_nf_b023_desc:0 "Караванные тропы формировались на протяжении многих лет в результате постоянного использования и следования по пути наименьшего сопротивления. Этот не самый идеальный способ передвижения можно было бы улучшить, приложив совсем немного усилий."
DCS_nf_b024:0 "Восстановление Кентербери"
DCS_nf_b024_desc:0 "Хотя Община Кентербери не пострадала от бомбардировок, за последние два столетия она пришла в упадок. Если мы хотим сделать ее нашей столицей, нам нужно будет кое-что починить."
DCS_nf_b025:0 "Спрингвейлский Базар"
DCS_nf_b025_desc:0 "Начальная школа Спрингвейл расположена в стратегически выгодном месте, недалеко от одного из самых центральных поселений столицы. До прихода рейдеров торговцы иногда останавливались здесь, чтобы переночевать. Дядя Роу видит возможность вернуть здание и превратить его в центр торговли."
DCS_nf_b026:0 "Инвестиции в Караваны"
DCS_nf_b026_desc:0 "Дядя Роу не забыл о различных караванах, которые сыграли важную роль в создании поселений Вашингтона. Теперь, когда Роу стоит у руля, это партнерство может развиваться дальше."
DCS_nf_b027:0 "Торговля на Заливе"
DCS_nf_b027_desc:0 "Дядя Роу имеет хорошие отношения с руководством компании Торговцев Дувра, которые были налажены за годы сотрудничества и торговли. Это можно использовать, чтобы получить уникальные предложения."
DCS_nf_b028:0 "Столичная Торговля"
DCS_nf_b028_desc:0 "Наши недавние шаги уже приносят свои плоды в привлечении большего объема торговли в Столичную Пустошь. Кто знает, что может произойти после некоторых новых изменений?"
DCS_nf_b029:0 "Стандартизация Снаряжения для Караванов"
DCS_nf_b029_desc:0 "Караваны в основном обходились тем, что могли найти или купить. Дядя Роу хочет, чтобы мы производили стандартизированное снаряжение для караванов, и уже сузил выбор до нескольких вариантов. Теперь нам осталось только сделать выбор."
DCS_nf_b030:0 "Песня Агаты"
DCS_nf_b030_desc:0 "Агата — пожилая вдова, которая живет в пустоши и предоставляет компанию и музыку проходящим мимо торговцам в обмен на товары. Дядя Роу хочет встретиться с ней, услышав столько историй."
dcs_unlocks_agatha_advisor_tt:0 "Это разблокирует §YАгату§! как советника"
DCS_nf_b031:0 "Спонсировать Охрану Караванов"
DCS_nf_b031_desc:0 "Охранники караванов играют важную роль в нашей экономике, и многие из них становятся хорошими разведчиками или солдатами, когда подходит время. Мы могли бы отложить часть налогов, чтобы помочь караванам привлекать более талантливых сотрудников."
DCS_nf_b032:0 "Инструкторы из Охраны Караванов"
DCS_nf_b032_desc:0 "Если кто-то и знает, о том, как жить в пустошах и как обходиться тем, что есть под рукой, так это охранники караванов. Ветераны-охранники, слишком старые или травмированные, чтобы совершать много поездок, будут наняты для обучения нашего ополчения."
DCS_nf_b033:0 "Шериф Пустошей"
DCS_nf_b033_desc:0 "Лукас Симмс был очевидным выбором на роль лидера Поселений Столичной Пустоши. Он много лет возглавлял один из крупнейших городов в пустошах столицы и защищал его от бесчисленных нападений рейдеров. Теперь он принесет такую же безопасность и правосудие на границе в остальные пустоши."
DCS_nf_b034:0 "Укрепление Мегатонны"
DCS_nf_b034_desc:0 "Как столица поселений Столичной Пустоши, Мегатонна неизбежно привлечет больше внимания со стороны рейдеров и наших врагов. Чтобы противостоять растущей угрозе, стены необходимо расширить и укрепить."
DCS_nf_b035:0 "Ремонт Водопроводной Системы"
DCS_nf_b035_desc:0 "Водоочистители всегда были в плохом состоянии, но с ростом населения мы больше не можем откладывать решение этой проблемы. Необходимо провести серьезный ремонт."
DCS_nf_b036:0 "Поселенцы Спрингвейла"
DCS_nf_b036_desc:0 "Улучшения, внесенные Мегатонну, и усиление патрулирования в этом районе делают более безопасными и отдаленные регионы. Люди стекаются в Спрингвейл, чтобы построить свою новую жизнь."
DCS_nf_b037:0 "Учебный Лагерь Спрингвейла"
DCS_nf_b037_desc:0 "Спрингвейл Элементари уже некоторое время очищен от рейдеров и муравьев. Симмс хочет превратить это место в казармы и учебный центр для нашего ополчения."
DCS_nf_b038:0 "Расширение Ополчения"
DCS_nf_b038_desc:0 "Рейдеры, возможно, на данный момент и отбиты, но они всегда возвращаются. Нам понадобится больше людей, чтобы быть готовыми."
DCS_nf_b039:0 "Подготовка Охраны Поселений"
DCS_nf_b039_desc:0 "Многие охранники поселений имеют лишь минимальную подготовку, ограничиваясь стрельбой по жестяным банкам. Опытные охранники будут направлены по маршруту, чтобы обучить новых охранников и убедиться, что они готовы отразить нападение не только пары кротокрысов."
DCS_nf_b040:0 "Аванпост на Свалке"
DCS_nf_b040_desc:0 "За пределами Вашингтона находится огромная свалка, которая может стать хорошим источником металлолома. Нам просто нужно будет организовать постоянный аванпост, чтобы на его месте не обосновались рейдеры."
DCS_nf_b041:0 "Соседство с Регуляторами"
DCS_nf_b041_desc:0 "Регуляторы устроили свою главную базу недалеко от свалки. Хотя Лукас Симмс уже давно не является членом их группы, он по-прежнему поддерживает с ними связи, и лидер этой группы хочет встретиться с ним."
DCS_nf_b042:0 "Финансирование Регуляторов"
DCS_nf_b042_desc:0 "Регуляторы бродят по пустошам, верша правосудие там, где не могут добраться стражи поселений. Перенаправление части ресурсов на помощь им в этой борьбе пойдет на пользу всем."
DCS_nf_b043:0 "Подготовка Регуляторов"
DCS_nf_b043_desc:0 "Регуляторы редко доживают до пенсии, но такое случается. Те, кто слишком стар или травмирован, чтобы продолжать выполнять свои обязанности, будут приглашены для обучения нашего ополчения боевым навыкам и выживанию в пустошах."
DCS_nf_b044:0 "Интеграция Регуляторов"
DCS_nf_b044_desc:0 "Регуляторы сначала с опаской относились к Поселениям Столичной Пустоши, но наши недавние действия и поддержка расположили их к нам. Группа согласилась официально влиться в наше ополчение при условии, что они смогут продолжать свою миссию по избавлению пустошей от негодяев."
DCS_nf_b045:0 "Обезвредить Бомбу"
DCS_nf_b045_desc:0 "Просить о помощи любого случайного прохожего в Мегатонне не поможет. Сейчас мы рассылаем по всей пустоши сообщение о том, что нам нужен кто-то, кто обезвредит эту проклятую штуку!"
DCS_nf_b046:0 "Слухи о Саботаже"
DCS_nf_b046_desc:0 "Ты нашёл ЧТО, прикрепленное к Бомбе?"
DCS_nf_b047:0 "Измена Тенпенни"
DCS_nf_b047_desc:0 "В Мегатонне был пойман диверсант, пытавшийся взорвать бомбу. После длительного допроса выяснилось, что за заговором с целью уничтожить город стоял Алистер Тенпенни. Силовики собираются, чтобы арестовать его, но охранники его башни находятся на личной службе Тенпенни. Он не сдастся без боя."
DCS_nf_b048:0 "Реформа Тенпенни-Тауэра"
DCS_nf_b048_desc:0 "После того как с Тенпенни разобрались, нужно найти нового лидера поселения."
DCS_nf_b049:0 "Наш Великий Президент"
DCS_nf_b049_desc:0 "С тех пор как предатели, фальсифицировавшие выборы против Дэйва, были остановлены, наш великий президент готов вести нас в славное будущее."
DCS_nf_b050:0 "Предатели Республики"
DCS_nf_b050_desc:0 "У Поселений Столичной Пустоши врагов бесчисленное множество, и некоторые из них даже изнутри. Их необходимо наказать."
DCS_nf_b051:0 "Только для Верных"
DCS_nf_b051_desc:0 "Многие поддержали Дэйва в борьбе с коррумпированными и сфальсифицированными выборами. Теперь пришло время вознаградить тех, кто явно проявил лояльность, должностями, которых они заслуживают."
DCS_nf_b052:0 "Школы истории Дэйва"
DCS_nf_b052_desc:0 "Молодежь пустошей должна узнать о великих деяниях нашего президента. Школам в пустошах предоставляются обновленные материалы, по которым они должны преподавать."
DCS_nf_b053:0 "«Свободные» Выборы"
DCS_nf_b053_desc:0 "Люди опасаются, что недавние фальсификации на выборах поколеблют веру президента в демократию. Конечно, этого не произойдет. Со временем мы снова проведем выборы, но, естественно, чтобы предотвратить очередные фальсификации, голосовать смогут только граждане Республики Дэйв. Однако любой другой житель пустошей может пройти процедуру получения гражданства!"
DCS_nf_b054:0 "Гвардейцы Республики"
DCS_nf_b054_desc:0 "Те, кто поддерживал Дэйва, реорганизуются в Республиканскую гвардию. Они будут обеспечивать мир и безопасность для всех граждан."
DCS_nf_b055:0 "Ввести Призыв"
DCS_nf_b055_desc:0 "Враги повсюду, и без армии, которая сможет их остановить, мы будем разгромлены."
DCS_nf_b056:0 "Вооружить Армию"
DCS_nf_b056_desc:0 "Да, президент поддерживает право на владение оружием, но республике оно нужно для нашей защиты!"
DCS_nf_b057:0 "Длинная Рука Закона"
DCS_nf_b057_desc:0 "Влияние президента Дэйва велико. Рейдерам, террористам и предателям лучше быть начеку!"
DCS_nf_b058:0 "Президентская Гвардия"
DCS_nf_b058_desc:0 "После нескольких покушений на жизнь президента Дэйва несколько верных солдат были собраны вместе, чтобы сформировать специальную президентскую гвардию."
DCS_nf_b060:0 "Спасибо Тебе, Президент Дэйв!"
DCS_nf_b060_desc:0 "Мы многое обязаны нашему великому президенту. Под его руководством наша страна стала лучше, чем когда-либо!"
DCS_nf_b059:0 "Сбор Налогов"
DCS_nf_b059_desc:0 "Дэйв расходует крышки из общей казны. Он настаивает, что они идут на важные государственные нужды, в том числе на восстановление после войны. Он же не станет лгать, правда?"
DCS_nf_b061:0 "Восстановление после Войны"
DCS_nf_b061_desc:0 "Республика Дэйва сильно пострадала во время войны, направленной на искоренение предателей, которые сфальсифицировали выборы. Конечно, часть новых налогов пойдет на устранение ущерба!"
DCS_nf_b062:0 "Развитие Республики"
DCS_nf_b062_desc:0 "Республика Дэйва это наша столица и как таковая заслуживает того, чтобы быть нашим промышленным центром. У нас еще останется немного средств от налогов на другие важные вещи."
DCS_nf_b063:0 "Президентская Крепость"
DCS_nf_b063_desc:0 "Мы не можем позволить, чтобы наш великий президент сидел в ржавой лачуге, где любой, у кого есть миниатюрная атомная бомба, может его убить. Потратьте последние крышки, чтобы обеспечить безопасность нашего великого лидера!"
DCS_nf_c001:0 "Храм Союза"
DCS_nf_c001_desc:0 "Рабство является обычным явлением в Пустошах, но несколько беглых рабов выступили против него. Теперь они обращаются к нашему правительству с просьбой о помощи в их борьбе!"
DCS_nf_c002:0 "Убежище для Беглецов"
DCS_nf_c002_desc:0 "Мы примем всех рабов, которые найдут способ сбежать от своих хозяев. За стенами нашего поселения они будут в безопасности."
DCS_nf_c003:0 "Срыв Караванов Работорговцев"
DCS_nf_c003_desc:0 "Работорговцы ходят по тем же тропам, что и наши законные торговцы. Мы не можем допустить, чтобы это продолжалось."
DCS_nf_c004:0 "Освобожденное Ополчение"
DCS_nf_c004_desc:0 "Теперь, когда мы доказали, что серьезно относимся к решению проблемы рабства, освобожденные рабы стекаются под наше знамя. Мы уже сформировали специальный отряд из освобожденных мужчин и женщин, которые жаждут сразиться со своими бывшими угнетателями."
DCS_nf_c005:0 "Предложение Материальной Помощи"
DCS_nf_c005_desc:0 "Мы хотели бы сделать больше, чтобы помочь этим людям, но продажа им оружия и оборудования по сниженной цене — это лучшее, что мы можем сделать."
DCS_nf_c006:0 "Помощь в Подготовке"
DCS_nf_c006_desc:0 "Если мы не можем помочь им в их борьбе, то можем хотя бы научить их, как бороться самостоятельно."
DCS_nf_c007:0 "Железная дорога Мерести"
DCS_nf_c007_desc:0 "Не все в поселениях Вашингтона согласны с тем, что мы делаем достаточно для помощи этим беглым рабам. Несколько поселений предпримут больше усилий, но это может привести к проблемам."
DCS_nf_c008:0 "Мемориал Линкольна"
DCS_nf_c008_desc:0 "Работорговцы разбили лагерь у Мемориала Линкольна, ожидая прибытия Ганнибала Хэмлина, лидера Храма Союза. Мы поможем им выгнать работорговцев."
DCS_nf_c009:0 "Спасение Парадайза"
DCS_nf_c009_desc:0 "Парадайз-Фолс издавна был пристанищем работорговцев. Каждый день десятки несчастных душ проходят через это место, часто попадая в руки тех, кто обрекает их на судьбу хуже смерти. Если мы не избавимся от этой язвы на нашей земле, они всегда будут представлять угрозу."
DCS_nf_c010:0 "Северные Бандиты"
DCS_nf_c010_desc:0 "Бандиты из Гаррисбурга, возможно, нечасто нападают на Столичную Пустошь, но даже одно нападение на наши поселения — это уже слишком много."
DCS_nf_c011:0 "Благодарность Джонстауна"
DCS_nf_c011_desc:0 "Джонстаун десятилетиями жил под гнетом бандитов из Гаррисбурга и теперь благодарит нас за то, что мы его от них спасли. Давайте используем это."
DCS_nf_c012:0 "Питтский Вопрос"
DCS_nf_c012_desc:0 "Питт был конечной точкой для многих рабов и рейдеров в окружающих пустошах. Ходят слухи о недавних изменениях в этом месте, но нам нужно убедиться в этом самим."
DCS_nf_c013:0 "Рейдеры"
DCS_nf_c013_desc:0 "Различные банды рейдеров из Столичной Пустоши отступили на юг, когда мы стали более организованными. К сожалению, похоже, что за это время они также стали сильнее. Мы не можем позволить им разрастаться, иначе вся наша работа может оказаться напрасной."
DCS_nf_c014:0 "Приветствуемые, как Герои"
DCS_nf_c014_desc:0 "Мы изгнали рейдеров с юго-запада. Немногие поселения, которые выжили под их постоянными набегами, с радостью присоединяются к нам!"
DCS_nf_c015:0 "Приобретенный Вкус"
DCS_nf_c015_desc:0 "За последние несколько лет наши южные соседи сильно изменились. Они отказались от своих кровожадных привычек и занялись мясным бизнесом, а их вяленое мясо кротокрыса вкусное. Нам следует поддерживать с ними дружеские отношения, иначе, если дела пойдут плохо, они могут вернуться к своим старым привычкам."
DCS_nf_c016:0 "Питт Изменился?"
DCS_nf_c016_desc:0 "Нет, Питт тот же, просто стал более жестоким."
DCS_nf_c017:0 "Охота на Мутантов"
DCS_nf_c017_desc:0 "Супермутанты всегда были проблемой. Даже несмотря на то, что Братство убивает их в центре Вашингтона, их слишком много, чтобы с ними справиться здесь, в пустошах. Необходимо организовать несколько охотничьих отрядов, чтобы сократить их численность."
DCS_nf_c018:0 "Поиск Источника"
DCS_nf_c018_desc:0 "Мутанты же должны откуда-то появляться, верно? Если мы сможем это выяснить, то, возможно, сможем их остановить."
DCS_nf_c019:0 "Гнездо Мутантов"
DCS_nf_c019_desc:0 "Мы обнаружили, что супермутанты прибывают из старых пещер на западе. Прежде чем отправить армию, чтобы захватить это место, нам нужно убедиться, что нынешние обитатели этой территории не застрелят нас в спину."
DCS_nf_c020:0 "Литтл Ламплайт"
DCS_nf_c020_desc:0 "На пути в пещеры, чтобы сразиться с мутантами, нашу армию остановила группа маленьких детей. Они не знают, что делать дальше."
DCS_nf_c021:0 "Уничтожить Убежище 87"
DCS_nf_c021_desc:0 "Теперь, когда безопасный проход в убежище обеспечен, нам нужно пробиться к самому сердцу этого места и уничтожить его."
DCS_nf_c022:0 "Темнейший Час"
DCS_nf_c022_desc:0 "Анклав наводнил Столичные Пустоши, и даже с Братством, сражающимся на нашей стороне, не факт, что мы выживем. Нас ждут мрачные времена, но наши люди знают, что это борьба за наше выживание."
DCS_nf_c023:0 "Мы... Победили?"
DCS_nf_c023_desc:0 "Когда мы впервые увидели винтокрылы, приземлившиеся с солдатами в силовой броне, многие подумали, что это конец. Вопреки всему, мы выжили в борьбе с Анклавом. Теперь нам нужно сосредоточиться на восстановлении."
DCS_nf_c024:0 "Форт Баннистер"
DCS_nf_c024_desc:0 "Старый форт компании «Коготь» был крепким орешком, но теперь он наш."
DCS_nf_c025:0 "Убежище 101"
DCS_nf_c025_desc:0 "Мы знаем, что Убежище 101 находится всего в нескольких минутах ходьбы от Мегатонны, и в нем все еще находятся люди. Потребуется некоторое время, чтобы найти правильный подход, но, возможно, нам стоит посмотреть, не хотят ли они поговорить."
DCS_nf_c026:0 "Послание Мира"
DCS_nf_c026_desc:0 "Усилитель радиосигнала настроен на нужную частоту, и мы готовы отправить сообщение в Убежище 101. Но что мы скажем?"
DCS_nf_c027:0 "Экспедиция в Грейдич"
DCS_nf_c027_desc:0 "Поселение Грейдич стало... тихим. Даже если все его жители мертвы, нам нужно выяснить, что произошло, иначе следующим может стать любое другое поселение."
DCS_nf_c028:0 "Старый Добрый Способ"
DCS_nf_c028_desc:0 "Муравьи могут дышать огнем, но они все равно остаются гигантскими насекомыми. Пошлите ополчение, чтобы разобраться с ними."
DCS_nf_c029:0 "Робот победит Муравья"
DCS_nf_c029_desc:0 "Муравьиный огонь не сможет расплавить стальных роботов!"
DCS_nf_c030:0 "План Леско"
DCS_nf_c030_desc:0 "Ученый, ответственный за проблему с жуками, теперь заявляет, что у него есть план, как её решить. Давайте дадим ему возможность исправить свою ошибку."
DCS_nf_c031:0 "Судьба Леско"
DCS_nf_c031_desc:0 "Несмотря на то, что это был несчастный случай, многие требуют крови доктора Леско. Должны ли мы им её дать?"
DCS_nf_c032:0 "Восстановление Грейдича"
DCS_nf_c032_desc:0 "С решением проблемы с муравьями, Грейдич готов к заселению."
DCS_nf_c033:0 "Арсенал Уитона"
DCS_nf_c033_desc:0 "На нашей территории находится довоенный армейский склад. Хотя снаружи он полностью разграблен, внутри еще осталось много запертых дверей, которые можно открыть."
DCS_nf_c034:0 "Погрузиться Глубже"
DCS_nf_c034_desc:0 "Распространяются новости о том, что экспедиция в арсенал Уитона обнаружила нетронутый склад с товарами и еще большим количеством запертых дверей под землей. Нам следует действовать быстро, пока это не привлекло нежелательного внимания."
DCS_nf_c035:0 "Продать Это"
DCS_nf_c035_desc:0 "Изгои смогут использовать многие из этих вещей с большей пользой, чем мы, и их оплата справедлива."
DCS_nf_c036:0 "Щедрость Изгоя"
DCS_nf_c036_desc:0 "Изгои готовы покупать больше найденных нашими людьми технологий. Почему бы не воспользоваться этой возможностью? В конце концов, зачем нам квантовый гармонизатор или фотонная резонансная камера?"
DCS_nf_c037:0 "Советники Изгоев"
DCS_nf_c037_desc:0 "Многие считают Изгоев холодными и безразличными, и они правы. Но они знают, что когда у нас все хорошо, мы можем предоставить им больше технологий. Так что, возможно, мы сможем убедить их дать нам несколько советников за соответствующее вознаграждение."
DCS_nf_c038:0 "Сохранить Это"
DCS_nf_c038_desc:0 "Эта крепость находится на НАШЕЙ территории, и МЫ ее нашли. Пара изгоев ничего не изменит."
DCS_nf_c039:0 "Продолжить Мародёрствовать"
DCS_nf_c039_desc:0 "Многое из этого добра проржавело до основания, но ржавая довоенная винтовка AR все равно на порядок лучше трубчатой винтовки."
DCS_nf_c040:0 "Наш Новый Форт"
DCS_nf_c040_desc:0 "Это хорошая позиция, чтобы защитить часть нашей территории. Мы должны подумать о том, чтобы оставить здесь часть наших ополченцев."
DCS_nf_c041:0 "Организованные мародёры"
DCS_nf_c041_desc:0 "Для многих мародёрство в руинах Вашингтона стало образом жизни с тех пор, как упали бомбы. К сожалению, многие мародёры держатся поодиночке или небольшими группами и погибают, не успев продать свои находки. Мы постараемся организовать вылазки за сокровищами с более крупными командами, способными справиться с опасностями руин и не поддающимися уничтожению одной-единственной 200-летней ловушкой."
DCS_nf_c042:0 "Фабрика Корвега"
DCS_nf_c042_desc:0 "Завод Корвега, по слухам, в довольно хорошем состоянии. Мы отправим ребят проверить его и посмотреть, что мы можем с ним сделать."
DCS_nf_c043:0 "Поиск Терминалов"
DCS_nf_c043_desc:0 "Терминалы автомобильного завода должны содержать информацию о том, как строить машины, верно?"
DCS_nf_c044:0 "Фабрика РобКо"
DCS_nf_c044_desc:0 "Старый завод РобКо давно стал местом, где мусорщики ищут случайные детали роботов, но им всегда приходилось быть осторожными, чтобы избежать смертоносных роботов, которые всё ещё бродят по его коридорам. Однако команда хорошо вооружённых мусорщиков могла бы зачистить это место."
DCS_nf_c045:0 "Подземное Хранилище"
DCS_nf_c045_desc:0 "На заводе был большой подземный склад, который, по слухам, заполнен запасными частями и машинами."
DCS_nf_c046:0 "Переоткрытие Заводов"
DCS_nf_c046_desc:0 "Благодаря охране, мародёры ни разу не лезли в оборудование завода. Возможно, оно сломалось от времени, но у нас должно хватить деталей, чтобы починить один-два станка."
DCS_nf_c047:0 "MDPL-16"
DCS_nf_c047_desc:0 "Эта старая электростанция возле Республики Дэйва — лишь одна из многих, что разбросаны по пустошам, и она всё ещё должна работать. Мы отправим людей, чтобы привести её в порядок и посмотреть, куда можно направить энергию."
DCS_nf_c048:0 "Проблемы из Олни"
DCS_nf_c048_desc:0 "Наши мусорщики на севере говорят, что когти смерти из Олд-Олни движутся на юг."
DCS_nf_c049:0 "Возвращение Олни"
DCS_nf_c049_desc:0 "Олд-Олни был довольно приличным поселением до того, как сюда пришли Когти Смерти. Если нам всё равно придётся иметь с ними дело, то можно и город переселить."
DCS_nf_c050:0 "Склады Баннистера"
DCS_nf_c050_desc:0 "Форт Баннистер был сердцем операций Компании «Коготь». Там должно быть хорошее оборудование."
DCS_nf_c051:0 "Убежище 108"
DCS_nf_c051_desc:0 "Команда мародёров была права, это самое настоящее убежище. Судя по всему, мы можем просто открыть дверь и войти. Что может случиться в худшем случае?"
DCS_nf_c052:0 "Растаскать на Части"
DCS_nf_c052_desc:0 "Убежище 108 обветшало и стало непригодным для жилья несколько десятилетий назад. Теперь оно пригодно только как источник металлолома и всего того, что мы можем извлечь из старых терминалов."
DCS_nf_d001:0 "Последствия"
DCS_nf_d001_desc:0 "Анклав побеждён, во многом благодаря помощи Братства Стали. Может быть, нам стоит больше работать сообща?"
DCS_nf_d002:0 "Альянс Лайонса"
DCS_nf_d002_desc:0 "Мы заключили прочный союз с Братством. Это рассвет новой эры для нашего народа."
DCS_nf_d003:0 "Вернуться в Норму"
DCS_nf_d003_desc:0 "Братство может сражаться с супермутантами и раздавать бесплатную воду, но мы должны постоять за себя."
DCS_nf_d004:0 "Продажа Трофеев"
DCS_nf_d004_desc:0 "Многие из наших солдат собрали трофеи с убитых солдат Анклава. От плазменных пистолетов до шлемов силовой брони — эти предметы экипировки, несомненно, мощные инструменты войны, но Братство Стали сможет использовать их лучше, чем мы. Мы обменяем Братству некоторые из этих мелких предметов экипировки в обмен на более значительные количества оборудования."
DCS_nf_d005:0 "Подготовка из Братства"
DCS_nf_d005_desc:0 "Инструкторы по боевой подготовке из Братства Стали, присланные, чтобы помочь нам подготовить наших людей к войне, оказались настоящим даром небес. Если мы сможем убедить Старейшину позволить некоторым из них остаться, это будет ещё лучше."
DCS_nf_d006:0 "Договор о Рэйвен-Роке"
DCS_nf_d006_desc:0 "База Анклава Рэйвен-Рок погребена под тонной обломков, и нам потребуются десятилетия, чтобы расчистить её. К тому же она находится в районе, кишащем яо-гаями и другими опасностями Пустоши. Братство Стали предложило помочь нам восстановить некоторые фабрики в обмен на разрешение занять это место. Звучит как выгодная сделка для нас."
DCS_nf_d007:0 "Поднимая Нас"
DCS_nf_d007_desc:0 "С тех пор, как мы впервые увидели винтокрылы в действии, многие жители Столичной Пустоши увлеклись полётами. После нескольких неудачных полётов, которые чуть не привели к серьёзным проблемам, Братство согласилось оказать нам небольшую поддержку."
DCS_nf_d008:0 "Лучше Вместе"
DCS_nf_d008_desc:0 "Наше сотрудничество с Братством было выгодным для всех участников. Этот прочный союз принесёт процветание на долгие годы."
DCS_nf_d009:0 "Трофеи Анклава"
DCS_nf_d009_desc:0 "Несмотря на то, что Братство забрало у Когтей Смерти часть оборудования Анклава, оставшегося после войны, нам удалось кое-что захватить и для себя."
DCS_nf_d010:0 "Уроки Войны"
DCS_nf_d010_desc:0 "В боях с Анклавом выжившие солдаты многому научились в том, как сражаться с солдатами в силовой броне. Это может оказаться полезным, если мы когда-нибудь столкнёмся с кем-то подобным."
DCS_nf_d011:0 "Чёрные Дьяволы"
DCS_nf_d011_desc:0 "Технологии Анклава выходят за пределы понимания большинства наших учёных. Нет никакого шанса, что мы когда-нибудь сможем производить больше этого сами, но хотя бы изучение их может привести к некоторым прорывам."
DCS_nf_d012:0 "Взлететь"
DCS_nf_d012_desc:0 "Винтокрылы были огромным преимуществом Анклава, и хотя мы в итоге победили, это показало людям, что летающие машины имеют серьёзную ценность в войне в Пустоши. Пришло время сделать наши первые шаги в небо."
DCS_nf_d013:0 "Стоя в Одиночестве"
DCS_nf_d013_desc:0 "Хотя Братство и считало себя выше сотрудничества с нами, мы показали отбросам пустоши, что мы не боимся быть жертвами фермеров и мародёров. Поселения Столичной Пустоши — сильная нация, которая единым фронтом противостоит любым угрозам."
DCS_nf_d014:0 "Освободить Питт"
DCS_nf_d014_desc:0 "Кто бы сейчас ни был у руля в Питте, очевидно, что люди там страдают под гнётом рабства. Если мы им не поможем, никто не поможет."
DCS_nf_d015:0 "Новый Босс, те же Цепи"
DCS_nf_d015_desc:0 "Годами жители Питта жили под властью то одного, то другого ужасного тирана. Даже если они потеряют свои цепи, они всё равно станут жертвами любого следующего главаря рейдеров. Мы должны спасти их от этого порочного круга."
DCS_nf_d016:0 "Сломать Оковы"
DCS_nf_d016_desc:0 "Угнетатели Питта потерпели поражение, но что-то не так. Почему многие из этих людей выглядят больными?"
DCS_nf_d017:0 "Новое Руководство"
DCS_nf_d017_desc:0 "Мы получили сообщение о том, что кто-то разгромил банду рейдеров, управлявшую Питтом. Нам следует разобраться в этом."
DCS_nf_d018:0 "Братство в Питте"
DCS_nf_d018_desc:0 "Мы рады видеть, что наши друзья из Братства Стали взяли под контроль Питт. Однако они предупреждают, что в воздухе присутствует какая-то болезнь, которую они пытаются вылечить, и нам следует избегать этого района, чтобы не подвергнуться воздействию. Хорошо, что у нас есть такие друзья, которые заботятся о нашем народе."
DCS_nf_d019:0 "Новый Стальной Повелитель"
DCS_nf_d019_desc:0 "Несколько оборванных рабов сбежали из Питта и добрались до Столичной Пустоши. Жизнь в Питте под властью Братства, похоже, не слишком радужная."
DCS_nf_d020:0 "Плоды Стального Города"
DCS_nf_d020_desc:0 "Несмотря на опасность заболевания КТД в Питте, Братство в герметичных защитных костюмах и с особыми мерами предосторожности поддерживает работу городской промышленности, пока ищет лекарство. Они даже любезно делятся с нами плодами своего труда!"
DCS_nf_d021:0 "Против Всех Тиранов"
DCS_nf_d021_desc:0 "Этот Паладин, управляющий Питтом, явно нам не друг. Независимо от того, знают ли остальные члены Братства масштаб его действий или нет, мы должны это прекратить. К черту последствия!"
DCS_nf_d022:0 "Мать Свободы"
DCS_nf_d022_desc:0 "Недавно в Питте произошло восстание рабов. Ганнибал Хэмлин и аболиционисты хотят отправиться в Питт и заключить союз."

DCS_nf_e001:0 "Третье Собрание"
DCS_nf_e001_desc:0 "Многое изменилось в Столичной Пустоши с момента последнего заседания совета. Председатель созывает новое заседание для обсуждения важных вопросов."
DCS_nf_e002:0 "Законы Пустоши"
DCS_nf_e002_desc:0 "Хотя законы одинаковы, в большинстве поселений это не всегда так. Не говоря уже о том, что происходит за стенами поселения. Из-за всего этого возникли проблемы."
DCS_nf_e003:0 "Защита Пустоши"
DCS_nf_e003_desc:0 "Мы становимся слишком большими, чтобы разрозненные отряды ополченцев и мстителей могли защищать нашу территорию. Может быть, пора что-то менять?"
DCS_nf_e004:0 "Промышленная Революция"
DCS_nf_e004_desc:0 "Всплеск технологий Анклава, потоки чистой воды и кузницы Питта — лишь некоторые из факторов, способствующих быстрому экономическому росту в Поселениях Столичной Пустоши. Будем надеяться, что последствия этой «промышленной революции» не окажутся катастрофическими."
DCS_nf_e005:0 "Находки Восточного Побережья"
DCS_nf_e005_desc:0 "Мы давно уже не просто коалиция поселений, защищающих друг друга. У нас новые законы, постоянная армия и растущая промышленная база."
DCS_nf_e006:0 "Горы Безумия"
DCS_nf_e006_desc:0 "Горы к западу от нас всегда обходили стороной торговцы и путешественники. Но это не значит, что за последние несколько лет мы не заметили больше грохота в этих холмах, чем обычно."
DCS_nf_e007:0 "Учредить Западные Форпосты"
DCS_nf_e007_desc:0 "Нам нужно быть готовыми к тому, что тот, кто бесчинствует в холмах к западу от нас, начнёт поглядывать в нашу сторону. Первым шагом станет создание постоянных постов охраны."
DCS_nf_e008:0 "Позвать Наших Братьев"
DCS_nf_e008_desc:0 "Наверняка наши друзья из Братства Стали захотят взглянуть, что же это такое поднимает пыль в горах. В конце концов, некоторые из недавно бежавших оттуда были замечены с кое-какими интересными технологиями."
DCS_nf_e009:0 "Марш на Запад"
DCS_nf_e009_desc:0 "Мы не можем вечно жить в страхе перед безумцами на западе. Если мы хотим освободиться от них, мы должны дать им бой!"
DCS_nf_e010:0 "Трофеи Северной Аппалачи"
DCS_nf_e010_desc:0 "Ужасные культы и безумные жрецы Северных Аппалачей были подавлены нашими военными. Простые люди этих земель приветствуют нас как освободителей."
DCS_nf_e011:0 "Разделение Нагрузки"
DCS_nf_e011_desc:0 "Братство не подходит и не заинтересовано в управлении кучей поселений в холмах. Если мы не вмешаемся, они могут просто забрать всё ценное и сделать это место уязвимым для рейдеров. Мы могли бы предложить взять на себя администрирование и просто отправлять им все, что найдем и что может представлять интерес."
DCS_nf_e012:0 "Наши Общие Ценности"
DCS_nf_e012_desc:0 "Жители Грин-Маунтин во многом похожи на нас. Они хотят жить мирно и упорно бороться с рейдерами. Возможно, мы могли бы объединить усилия и создать нечто большее, чем просто сумма наших частей."
DCS_nf_e013:0 "Облегчение со Скидкой"
DCS_nf_e013_desc:0 "Бедственное положение жителей недавно спасённых территорий не остаётся без внимания. Дядя Роу организовал караваны Столичной Пустоши, чтобы отправить им помощь в виде еды и лекарств по доступным ценам!"
DCS_nf_e014:0 "Расширение Караванных Маршрутов"
DCS_nf_e014_desc:0 "Продолжающаяся торговля между Северными Аппалачами и Столичной пустошью привела к развитию нескольких новых караванных маршрутов."
DCS_nf_e015:0 "Регуляторы Расширяются"
DCS_nf_e015_desc:0 "Внезапный вакуум власти в горах Северных Аппалачей неизбежно приведет к тому, что негодяи захотят этим воспользоваться. Именно поэтому Регуляторы отправляют часть своих бойцов на вербовку и борьбу с этими хищниками!"
DCS_nf_e016:0 "Регулятор Фэллон"
DCS_nf_e016_desc:0 "Бывший лидер Грин-Маунтин, считавшийся погибшим при падении поселения, продолжал борьбу высоко в горах. Потребовалось немало уговоров, чтобы он понял, что Регуляторы разделяют многие его ценности, и надел значок."
DCS_nf_e017:0 "Горные Чудовища"
DCS_nf_e017_desc:0 "Рассказы о необычных существах, скрывающихся в холмах и лесах Аппалачей, появились задолго до Великой Войны. Наш великий президент загорелся желанием убить одну из них и повесить ее голову на стену своего кабинета."
DCS_nf_e018:0 "Приближение..."
DCS_nf_e018_desc:0 "Эти существа годами не просто так скрывались от людей, но ни разу не знают пыл президента Дэйва. Он идёт по горячим следам одного из этих криптидов."
DCS_nf_e019:0 "Аппалачская Колония"
DCS_nf_e019_desc:0 "Тенпенни мало интересуется холмами к западу от нас, за исключением того, что из них можно извлечь ценного."
DCS_nf_e020:0 "Подавление Непокорных Колонистов"
DCS_nf_e020_desc:0 "Люди, живущие в нашей новой колонии, жалуются, что это несправедливо: они дают нам ресурсы и налоги, но не представлены в совете. Нет ничего, с чем бы Густаво не справился, если бы ему дали больше людей."
DCS_nf_e021:0 "Кооперация Ополченцев"
DCS_nf_e021_desc:0 "Командиры нашей армии встречаются с лидерами Грин-Маунтин, чтобы сравнить стратегии и посмотреть, чему мы можем научиться друг у друга."
DCS_nf_e022:0 "Рельсотроны для Регуляторов"
DCS_nf_e022_desc:0 "Регуляторы действительно хорошо поладили с ополчением Грин-Маунтин. Они настолько сдружились, что Грин-Маунтин настояла, чтобы они взяли с собой несколько ящиков винтовок Гаусса и чертежей по возвращении в Столичную Пустошь."
DCS_nf_e023:0 "Аппалачское Соглашение"
DCS_nf_e023_desc:0 "Благодаря своим искусным навыкам ведения переговоров Дяде Роу удалось заключить с Грин-Маунтин соглашение, гарантирующее торговое сотрудничество."
DCS_nf_e024:0 "Растущие Торговые Пути"
DCS_nf_e024_desc:0 "Продолжающаяся торговля между Северными Аппалачами и Столичной пустошью привела к развитию нескольких новых караванных маршрутов."
DCS_nf_e025:0 "СаскуэЧТО?"
DCS_nf_e025_desc:0 "Река Саскуэханна формировала восточную границу Столичной Пустоши, и рейдеры на севере и северо-востоке от нас не позволяли многим уходить в том направлении. Теперь мы разобрались с Гаррисбургом, и наша армия сильнее, чем когда-либо, возможно, стоит взглянуть и посмотреть, что происходит по ту сторону реки."
DCS_nf_e026:0 "Поприветствуем Амишей"
DCS_nf_e026_desc:0 "Жители Херши — трудолюбивые ремесленники и торговцы. Подобно поселенцам Столичной Пустоши, они добрые люди, которые страдали от рейдеров и в итоге дали им отпор. Они стали бы ценным дополнением к Республике, которую мы строим."
DCS_nf_e027:0 "Помощь для Амишей"
DCS_nf_e027_desc:0 "Жители Херши — трудолюбивые ремесленники и торговцы. Подобно поселенцам Столичной Пустоши, они добрые люди, которые страдали от рейдеров, нарушающих их жизненный уклад. Они, возможно, не просили официально о нашей помощи, но это не значит, что мы не можем протянуть руку помощи."
DCS_nf_e028:0 "Спасти Амишей"
DCS_nf_e028_desc:0 "Жители Херши — трудолюбивые ремесленники и торговцы. Подобно поселенцам Столичной Пустоши, они добрые люди, которые страдали от рейдеров, нарушающих их жизненный уклад. К сожалению, они стали жертвами Филадельфийских Рейдеров, и многие теперь в цепях. Мы не можем стоять в стороне и позволить этому продолжаться."
DCS_nf_e029:0 "В Филадельфии Всегда Солнечно"
DCS_nf_e029_desc:0 "Теперь, когда Филадельфия больше не страдает от тирании Бородавочника и его отвязных детей, хорошие люди могут переехать в город и обустроить там свою жизнь. Не успеешь оглянуться, как он может стать новым Ривет-Сити!"
DCS_nf_e030:0 "Темные Облака на Юге"
DCS_nf_e030_desc:0 "Мы не забыли о разных каннибалах и безумцах, что таятся у наших южных границ. Они, вероятно, тоже не забыли о нас. Нам следует быть готовыми к тому, что им надоест поедать заблудившихся путников и они захотят поискать новые источники пищи."
DCS_nf_e031:0 "Тень над Андейлом"
DCS_nf_e031_desc:0 "Наши сотрудники сообщают о тревожной активности в районе Андейла. Там происходит что-то важное, и нам, возможно, не захочется ждать и смотреть, что именно."
DCS_nf_e032:0 "Расследовать Культ"
DCS_nf_e032_desc:0 "Здесь происходило что-то странное. Нам нужно докопаться до сути."
DCS_nf_e033:0 "Уничтожить Культ"
DCS_nf_e033_desc:0 "Здесь творилось что-то странное, а о некоторых вещах лучше вообще не знать. Пусть эти знания умрут вместе с каннибалами."
DCS_nf_e034:0 "Конец Кошмара"
DCS_nf_e034_desc:0 "Ужасные вещи, творившиеся в Андейле и на прилегающих пустошах, наконец-то прекратились. Обширные земли, которые десятилетиями, если не веками, обходили стороной, наконец-то готовы к заселению порядочными людьми, которые умеют выращивать еду, а не пожирать торговцев."
DCS_nf_e035:0 "Болотный Ужас"
DCS_nf_e035_desc:0 "Болота к югу от того места, где раньше располагался Андейл, таят в себе ужасы похуже, чем обитатели болот Пойнт-Лукаут. Все попытки убедить этих людей закончились катастрофой. Это оставляет нам только один вариант."
DCS_nf_e036:0 "Приятный Сюрприз"
DCS_nf_e036_desc:0 "Какие бы ужасы ни наводнили болота к югу от Андейла, они были уничтожены цивилизованными людьми. Мы должны пригласить их в нашу республику. Любой, кто сможет столкнуться с этими ужасами и выжить, будет желанным гостем."
DCS_nf_e037:0 "Это Странно"
DCS_nf_e037_desc:0 "Что-то тёмное поселилось в болотах к югу от Андейла. Нам нужно убедиться, что оно не проберётся в наши края."
DCS_nf_e038:0 "Медленный Поток"
DCS_nf_e038_desc:0 "Проект «Чистота» значительно улучшил жизнь рядового жителя пустошей. Чистая вода доступна даже самым обездоленным. Хотя поставки могли бы быть и почаще."
DCS_nf_e039:0 "Поддержать усилия Братства"
DCS_nf_e039_desc:0 "Братство отлично справляется с доставкой Аква Пура в поселения на дальних рубежах Столичной Пустоши. Но это не значит, что им не нужна помощь."
DCS_nf_e040:0 "Могучая Жажда"
DCS_nf_e040_desc:0 "Правда в том, что если мы не обезопасим проект «Чистота» для себя, мы всегда будем зависеть от благотворительности того, кто им владеет. Такая зависимость нам не на пользу, и мы не можем её допустить."
DCS_nf_e041:0 "Весёлое Сотрудничество"
DCS_nf_e041_desc:0 "Ривет-Сити отлично справляется с реализацией проекта «Чистота». Это также напомнило многим, что крупнейшее поселение Столичной Пустоши странным образом отсутствует в совете глав поселений."
DCS_nf_e042:0 "Синергетическое Сотрудничество"
DCS_nf_e042_desc:0 "Как мы и ожидали, наше сотрудничество с Братством в рамках проекта «Чистота» принесло достойные результаты всем участникам."
DCS_nf_e043:0 "Контроль Потока"
DCS_nf_e043_desc:0 "Реализовать проект «Чистота» сложнее, чем казалось. Но мы зашли слишком далеко, и нам нужно извлечь максимальную пользу."
DCS_nf_e044:0 "Улучшение Распределения"
DCS_nf_e044_desc:0 "Ривет-Сити взял на себя значительную часть бремени по доставке воды в остальную часть пустоши. Они обратились в совет с просьбой о помощи."
DCS_nf_e045:0 "Непристойное Предложение"
DCS_nf_e045_desc:0 "Руководство Торговцев Дувра обратилось к нашему председателю с выгодной, но ужасной деловой сделкой."
DCS_nf_e046:0 "Защита Рыбаков Залива"
DCS_nf_e046_desc:0 "Неважно, сколько крышек они нам покажут, мы предадим наши основополагающие принципы, если отвернемся от поселения, нуждающегося в защите."
DCS_nf_e047:0 "Держаться Подальше"
DCS_nf_e047_desc:0 "Рыбаки Залива никогда открыто не просили нас о помощи. Возможно, нам лучше просто закрыть на это глаза. В любом случае, это не наше дело."
DCS_nf_e048:0 "Поддержка Дувра"
DCS_nf_e048_desc:0 "Если мы поддержим Дувр в его стремлении победить Рыбаков Залива, это может привести к лучшему результату для всех. В любом случае для народа Залива лучше быстрое поражение, чем затяжная война, не так ли?"
DCS_nf_e049:0 "Прибытие на Борт"
DCS_nf_e049_desc:0 "Рыбаки Залива выстояли против наёмников Дуврских Торговцев и переломили ход событий. Хорошо это или плохо, но теперь они контролируют большую часть Делмарвы."
DCS_nf_e050:0 "Куча Крышек"
DCS_nf_e050_desc:0 "Торговцы Дувра смогли подавить сопротивление Рыбаков Залива. Надеюсь, это приведёт к большему процветанию для всех."
DCS_nf_e051:0 "Поселения Делмарвы"
DCS_nf_e051_desc:0 "Жители Делмарвы объединены под руководством одного лидера. Они больше не просто конгломерат торговцев и рыбаков. Они становятся чем-то большим, чем мы были совсем недавно. Пока неясно, что это значит для нас."
DCS_nf_e052:0 "Морская Кооперация"
DCS_nf_e052_desc:0 "Поселения Делмарвы были достаточно добры, чтобы научить наших людей некоторым вещам о водном транспорте. Это должно помочь нам в защите наших берегов от опасности."
DCS_nf_e053:0 "Импорт/Экспорт"
DCS_nf_e053_desc:0 "У дяди Ро есть грандиозные планы, которые включают Поселения Делмарвы. Он видит их как сердце морской торговой империи, которая простирается вверх и вниз по восточному побережью и, возможно, дальше. Некоторые отвергают это как несбыточную мечту или просто расширение того, что делали Дуврские Торговцы, но Ро знает лучше."
DCS_nf_e054:0 "Пляжный Туризм"
DCS_nf_e054_desc:0 "Мистер Бёрк доложил Тенпенни, что на пляжах Делмарвы есть руины довоенного курорта. Тенпенни уже направил некоторых наемников и подрядчиков, чтобы захватить здание и начать реконструкцию."
DCS_nf_e055:0 "Флагман Республики"
DCS_nf_e055_desc:0 "С интеграцией Делмарвы наконец завершенной, у Дэйва есть грандиозные планы, чтобы отметить эту ситуацию. Он поручил кораблестроителям Дувра отремонтировать разрушенный танкер, выброшенный на восточное побережье. Это будет флагман флота Столичных Поселений, «ПСП Дэйв»."
DCS_nf_e056:0 "Учения Флота"
DCS_nf_e056_desc:0 "Хотя у Поселений Столичной Пустоши едва ли есть корабли для защиты своих берегов, Поселения Делмарвы участвовали в нескольких совместных учениях и морских военных играх с нашим развалюхой флотом. Это было полезным опытом для нас обоих."
DCS_nf_e057:0 "Торговля Фруктами"
DCS_nf_e057_desc:0 "Мечта Роу становится реальностью. Недавно торговцы вернулись с разорённых берегов Флориды с фруктом под названием апельсин. Многие жители пустошей думали, что это всего лишь разновидность ментата, но сладкий цитрус настоящий и пережил бомбардировки! В качестве приятного бонуса: заболеваемость цингой снизилась на 67%!"
DCS_nf_e058:0 "Загородный Клуб Тенпенни"
DCS_nf_e058_desc:0 "Курорт — это только первый шаг. Тенпенни планирует превратить его в эксклюзивный загородный клуб, где элита пустоши сможет отдохнуть от отдыха в своих особняках или укреплённых поселениях."
DCS_nf_e059:0 "Зачем Останавливаться на Одном?"
DCS_nf_e059_desc:0 "Наш великий президент не позволяет таким словам, как «невыполнимо», «хлопот больше, чем пользы» или «разорение местной экономики», помешать ему вести нашу нацию к величию. У ПСП Дэйв будет корабль-сестра — ПСП Дэйв II!"
DCS_nf_e060:0 "Стальная Война"
DCS_nf_e060_desc:0 "Многие называли это бессмысленной тратой жизни, и, возможно, они были правы. Но если что-то и верно в Пустоши, так это то, что война никогда не меняется."
DCS_nf_e061:0 "Принять Рыцарей с Пустоши"
DCS_nf_e061_desc:0 "Симмс знает, что многие Рыцари из Братства Лайонса вступили в ряды, чтобы защищать Столичную Пустошь от таких угроз, как супермутанты и рейдеры. Так почему бы не позволить им продолжать это делать?"
DCS_nf_e062:0 "Парни с Пустоши делают что должны"
DCS_nf_e062_desc:0 "Многие лазерные винтовки Братства были выведены из строя — в бою или из-за диверсий. Но если что-то развалено в хлам, это ещё не повод для пустошника сдаться."
DCS_nf_e063:0 "Зачистка Туннелей"
DCS_nf_e063_desc:0 "Братство всегда было против зачистки метро — боялись обвалов, да и всякой довоенной дряни, что может вылезти из-под земли. Может, оно и так. Но Дядюшка Роу знает: риск — это неотъемлемая часть любого дела."
DCS_nf_e064:0 "Торговля с Подземельем"
DCS_nf_e064_desc:0 "Некоторые торговцы кривятся при мысли о сделке с гулями, но крышки у них звенят не хуже, чем у остальных."
DCS_nf_e065:0 "Поздравить Наших Героев"
DCS_nf_e065_desc:0 "Эта война забрала многое у каждого. Но мы не имеем права забывать тех, кто отдал больше всех. Тех, кто пал, кто сражался до последнего... и, конечно, кто сможет забыть грандиозные жертвы, принесённые Президентом Дэйвом ради нашей победы?"
DCS_nf_e066:0 "Яркий Пример Демократии Пустошей"
DCS_nf_e066_desc:0 "Вся эта силовая броня Братства, что валяется повсюду, отлично бы смотрелась между Президентом Дэйвом и опасностью."
DCS_nf_e067:0 "Военные Трофеи"
DCS_nf_e067_desc:0 "Война всегда была выгодным делом, а эти горы захваченного оружия Братства могут принести нам немало крышек."
DCS_nf_e068:0 "Проблемы Подземелья"
DCS_nf_e068_desc:0 "Большое поселение, полное гулей, представляет угрозу для всех в Столичной Пустоши? А что если они внезапно озвереют? Или решат, что им надоело, когда их называют гнилыми зомби, и начнут стрелять в настоящих людей?"
DCS_nf_e069:0 "[DCS_nf_e069_scripted_loc]"
DCS_nf_e069_default:0 "Будущее Цитадели"
DCS_nf_e069_dave:0 "Депортация Братства Стали"
DCS_nf_e069_desc:0 "Цитадель теперь в основном пустует — если не считать гарнизона ополченцев, охраняющих её от рейдеров и пустошных тварей. Нам нужно решить, что мы собираемся делать с этим местом."
DCS_nf_e070:0 "Провести Инвентаризацию"
DCS_nf_e070_desc:0 "Помимо снаряжения, собранного на полях сражений и у капитулировавших солдат, в Цитадели скрыто настоящее сокровище — арсенал оружия."
DCS_nf_e071:0 "Изучить Архивы"
DCS_nf_e071_desc:0 "Многие базы данных Цитадели были уничтожены в ходе боёв или диверсий, но в уцелевших фрагментах всё ещё можно найти ценные сведения."
DCS_nf_e072:0 "Всеми Любимый Диджей"
DCS_nf_e072_desc:0 "Что случилось с Тридогнайтом после того, как Братство было вытеснено из Радио Новости Галактики?"
DCS_nf_e073:0 "Приглашение для Ривет-Сити"
DCS_nf_e073_desc:0 "Ривет-Сити уже десятки лет служит образцом цивилизации в Столичной Пустоши. Мы должны пригласить их присоединиться к нашему совету."
DCS_nf_e074:0 "Помощь в Ремонте"
DCS_nf_e074_desc:0 "Несмотря на все ресурсы, поступающие в Ривет-Сити через торговлю, они всё ещё с трудом справляются с задачей — удерживать на плаву древний корабль, который называют своим домом. Как хорошие соседи, мы должны протянуть руку помощи."
DCS_nf_e075:0 "Интеграция Сил Безопасности"
DCS_nf_e075_desc:0 "Если наши бойцы уже следят за рейдерами, действительно ли им всё ещё нужна целая армия, чтобы охранять свой корабль?"
DCS_nf_e076:0 "Представитель Города"
DCS_nf_e076_desc:0 "Представитель, которого Ривет-Сити направил для защиты своих интересов в совете, принёс с собой куда больше, чем просто формальное участие. Люди начинают ему доверять и обращаются за советом по вопросам, касающимся их собственных поселений!"
DCS_nf_e077:0 "Самые Яркие в Столице"
DCS_nf_e077_desc:0 "Ривет-Сити — дом для самых блестящих умов, за очевидным исключением Братства. Сотрудничество с ними может принести нам только пользу."

###Events###
DCS_nf_events.1.title:0 "Возмущение Дэйва"
DCS_nf_events.1.desc:0 "После недавних выборов, прошедших без проишествий, многие рассчитывали на дальнейшее сотрудничество между поселениями Столичной Пустоши. Исключением стал Президент Дэйв из Республики Дэйва и его сторонники. Лидер небольшого поселения отказывается признавать поражение и называет выборы фарсом — якобы сфальсифицированным или проведённым с грубыми нарушениями. Если бы только его поселение выражало недовольство результатами, это не стало бы проблемой. Однако он собрал немалую группу сторонников среди отдалённых жителей пустоши, которые считают, что крупные поселения имеют слишком большое влияние. Возникают опасения, что это может подорвать доверие к альянсу — или даже привести к насилию. Мы должны действовать соответственно."
DCS_nf_events.1.a:0 "Предложить Дэйву постоянное место в совете"
DCS_nf_events.1.b:0 "Просто игнорировать его"
DCS_nf_events.1.c:0 "ЗА ПРЕЗИДЕНТА!"
DCS_nf_events.2.title:0 "Сотрудничество Торговцев"
DCS_nf_events.2.desc:0 "Эрнест Роу вырос среди караванов и с юных лет проявлял интерес к торговле. Годы тяжёлой работы позволили ему накопить достаточно, чтобы основать торговый пост в Общине Кентербери — но это было лишь началом. Роу всегда мечтал объединить крупных торговцев Столичной Пустоши, чтобы каждый мог углубиться в свою нишу и предложить покупателям более качественный выбор. Он понимал: стоит убедить одного — остальные подтянутся. Но важно было выбрать, с кого начать. Лаки Харитт — парень дружелюбный, но его оружейный бизнес и так процветает, и рисковать ради небольшого улучшения ему может не захотеться. Кроу — надёжный торговец, его караван одежды идёт хорошо, но бывший шаман может истолковать это как дурное знамение и отказаться. Док Хофф — тоже крепкий предприниматель, но всегда был немного пессимистичен насчёт будущего. И наконец, торговец хламом Крейзи Вольфганг — несмотря на свою эксцентричность, он парень с головой и, возможно, его удастся убедить."
DCS_nf_events.2.a:0 "Сначала он спросил Лаки Харрита"
DCS_nf_events.2.b:0 "Кроу был его первым выбором"
DCS_nf_events.2.c:0 "Если он смог убедить Дока Хоффа, он сможет убедить кого угодно"
DCS_nf_events.2.d:0 "Крейзи Вольфганг был первым, кто подписался"
DCS_nf_events.3.title:0 "Руины Бетесды"
DCS_nf_events.3.desc:0 "Рейдеры Столичной Пустоши всегда были проблемой для караванов, но некоторые из них заключали сделки — платили дань и продавали товары со скидкой в обмен на безопасный проход. Это работало в пользу торгового коллектива, пока особенно жестокая банда не обосновалась в старых руинах Бетесды. Им было плевать на дань — они стреляли по любым караванам, проходившим мимо. Без безопасного маршрута через эти руины торговцам пришлось выбирать более опасные или долгие пути, и прибыли пошли на спад. Дядюшка Роу понял, что проблема будет только усугубляться, и вместе с друзьями-торговцами начал обращаться к другим поселениям за помощью в изгнании рейдеров из руин. Каждое поселение выделило несколько человек, но инициативу взял на себя город..."
DCS_nf_events.3.a:0 "Тенпенни-Тауэр с хорошо вооруженной охраной"
DCS_nf_events.3.b:0 "Мегатонна с друзьями-регуляторами Симмса"
DCS_nf_events.3.c:0 "Община Кентербери со своими наёмниками"
DCS_nf_events.3.d:0 "Республика Дэйва со старыми друзьями Дэйва"
DCS_nf_events.4.title:0 "Первое Собрание"
DCS_nf_events.4.desc:0 "Рейдеры, засевшие в руинах Бетесды, оказались совершенно не готовы к удару, нанесённому объединёнными силами нескольких поселений. Их быстро выбили из руин. Поселения Столичной Пустоши поняли, чего можно достичь, действуя сообща. Спустя несколько месяцев лидеры этих общин собрались вместе и начали обсуждать создание конфедерации поселений. Они договорились поддерживать друг друга в вопросах обороны, честной торговли и других делах. А во главе всего стоял основной принцип..."
DCS_nf_events.4.a:0 "Коллективной защиты"
DCS_nf_events.4.b:0 "Торгового партнёрства"
DCS_nf_events.4.c:0 "Индивидуальной свободы"
DCS_nf_events.5.title:0 "Второе Собрание"
DCS_nf_events.5.desc:0 "Последующие годы для поселений Вашингтона были непростыми, но всё же лучше, чем те, что были до них. Рейдеров в районе между Тенпенни-Тауэр и Республикой Дэйва в основном вытеснили. Атаки супермутантов стали происходить реже — многие связывали это с продолжающейся кампанией Братства против них. Торговля, конечно, процветала, и уровень жизни в поселениях немного вырос. Когда лидеры поселений вновь собрались, чтобы обсудить будущее, возникла идея выбрать единого лидера, который бы занимался вопросами, выходящими за рамки одного поселения. После жарких обсуждений было решено провести выборы. Среди кандидатов были Лукас Симмс из Мегатонны, Дядюшка Роу из Общины Кентербери, Алистер Тенпенни из Тенпенни-Тауэр и Дэйв из Республики Дэйва."
DCS_nf_events.5.a:0 "Интересно, кто победит?"
DCS_nf_events.6.title:0 "Большие Проблемы"
DCS_nf_events.6.desc:0 "Большой Город, несмотря на своё название, не является крупным поселением. Это небольшое скопление домов бывших жителей Литтл-Ламплайт, расположенное между Мегатонной и Арефу. Обычно этот район считается относительно безопасным по меркам пустоши, но из-за слабой обороны и отсутствия укреплений жители постоянно подвергаются нападениям. Супермутанты и рейдеры из Парадайз-Фоллс атакуют поселение, пытаясь утащить людей для своих целей. Жители Большого Города обратились к Совету поселений Столичной Пустоши за помощью. Совет зашёл в тупик между двумя вариантами: Тенпенни предлагает расселить людей по другим поселениям, и разумеется, не в его башню. А Лукас Симмс хочет укрепить Большой Город и выделить охрану, чтобы поселение могло отбиваться от атак. Ведь если падёт Большой Город — кто станет следующей целью мутантов и работорговцев?"
DCS_nf_events.6.a:0 "Переселите жителей Большого Города"
DCS_nf_events.6.b:0 "Стоять с Большим Городом"
DCS_nf_events.7.title:0 "Битва в Джермантауне"
DCS_nf_events.7.desc:0 "После того как наше ополчение отбило несколько атак мутантов и один налёт работорговцев, бойцы были готовы нанести удар по гнезду супермутантов в старом полицейском участке Джермантауна. Сражаться с мутантами на их территории — дело, от которого большинство, кроме Братства, предпочло бы уклониться. Но если мы хотим защитить Большой Город, это необходимо. Наши силы смогли зачистить район от мутантов и уже докладывают о результатах."
DCS_nf_events.7.a:0 "Мы им действительно показали!"
DCS_nf_events.7.b:0 "Это было тяжело, но мы это сделали"
DCS_nf_events.7.c:0 "Мы понесли большие потери, но дело сделано"
DCS_nf_events.7.d:0 "Мы победили, но какой ценой?"
DCS_nf_events.8.title:0 "Супергероиские Ошибки"
DCS_nf_events.8.desc:0 "Община Кентербери уже несколько месяцев страдает от безумной женщины и её армии муравьёв. Сначала они были скорее досадной помехой и могли бы даже стать туристической диковинкой, если бы всё пошло иначе. Всё изменилось, когда один из её муравьёв уничтожил любимого робота Скотта Воллински. Странный затворник начал называть себя Механистом и вступил в уличную войну с безумной «НеМирмикой». Бои всегда заканчиваются ничьей, и пока что страдает только имущество, но масштабы столкновений растут — и рано или поздно кто-нибудь пострадает. Дядюшка Роу хочет отправить ополченцев, чтобы убить НеМирмику, надеясь, что это заставит его помешанного гражданина угомониться. Тенпенни смотрит на ситуацию иначе: он опасается, что если у Механиста закончатся машины, тот направится к старому заводу RobCo — и тогда это станет проблемой Тенпенни. Поэтому он предлагает отправить охрану, чтобы разобраться с Механистом, и отдать его тело НеМирмике в качестве платы за то, чтобы она покинула район."
DCS_nf_events.8.a:0 "Охотьтесь за НеМирмикой"
DCS_nf_events.8.b:0 "Нацельтесь на Механиста"
DCS_nf_events.9.title:0 "Семейные проблемы"
DCS_nf_events.9.desc:0 "Небольшое поселение Арефу всё чаще сообщает о ночных нападениях некой группы, называющей себя «Семья». Эти ночные хулиганы довели Эвана Кинга и его жителей до паники, поэтому мы отправили людей разобраться. Наши разведчики не встретили огня, и удалось начать диалог с лидером Семьи — Вэнсом. Группа, хоть и странная, предпочитает пить кровь вместо обычной еды, но они не бездумные каннибалы. Лукас Симмс выступает против того, чтобы отпускать их безнаказанно после всего, что случилось с Арефу. А вот Дядюшка Роу чувствует запах сделки — он считает, что можно заработать немало крышек, продавая Вэнсу и его людям пакеты крови, а может, они даже согласятся охранять Арефу в обмен на поставки."
DCS_nf_events.9.a:0 "Заколоть вампиров"
DCS_nf_events.9.b:0 "Примириться с семьей"
DCS_nf_events.10.title:0 "Ультра-Винт?"
DCS_nf_events.10.desc:0 "С распространением слухов о том, что станция Северо-Западная Сенека теперь безопасна для жизни, туда начали переселяться люди, занимая разные залы. Команда, отправленная для зачистки гнезда болотников, с удивлением обнаружила пару гулей, живущих в одном из закутков. Сначала один из гулей с подозрением отнёсся к нашему ополчению, но успокоился, когда понял, что они не пришли красть его секреты. Он признался, что работает над созданием версии Винта, которая будет действовать на гулей, и готов платить за помощь в своих исследованиях. Совет, как и следовало ожидать, разделился во мнениях."
DCS_nf_events.10.a:0 "Симмс говорит нет наркотикам"
DCS_nf_events.10.b:0 "Дядя Роу чувствует запах нетронутого рынка"
DCS_nf_events.11.title:0 "Прибежище гулей"
DCS_nf_events.11.desc:0 "Хотя супермутанты, как правило, не трогают гулей, в Столичной Пустоши хватает других опасностей, мешающих большинству из них добраться до Подземелья. В других поселениях гулей не особенно жалуют, и им приходится несладко. Похоже, теперь многие из них перебираются в туннели, оставшиеся пустыми после уничтожения Семьи. Это новое поселение, получившее название «Новое Подземелье», быстро растёт, и обычные жители пустоши рады, что гулей стало меньше в их городах."
DCS_nf_events.11.a:0 "С глаз долой, и с сердца вон"
DCS_nf_events.12.title:0 "План изменился?"
DCS_nf_events.12.desc:0 "Мистер Бёрк готовился месяцами. Были установлены контакты, закуплено оборудование, изучены маршруты патрулей. Тенпенни платил щедро, но если всё это оказалось напрасным только потому, что он выиграл выборы и теперь должен править этими дикарями — он будет в ярости. Всё же оставалась надежда, что, когда Бёрк доложит, что всё готово, Тенпенни передумает и отменит операцию."
DCS_nf_events.12.a:0 "Тенпенни изменил свое мнение"
DCS_nf_events.12.b:0 "Мегатонна все равно будет уничтожена"
DCS_nf_events.13.title:0 "Мегатонный Инцидент"
DCS_nf_events.13.desc:0 "Бомба в Мегатонне была приведена в действие прошлой ночью, после того как наш диверсант отошёл на безопасное расстояние от города. Вспышку света и огненный шар можно было увидеть из каждого уголка Столичной Пустоши — они стерли с лица земли этот уродливый шрам, известный как Мегатонна. Хотя сотни погибших душ — это трагедия, прогрессу нельзя стоять на месте. Сейчас мы занимаемся устранением оставшихся следов, и мистер Бёрк уже сфабриковал доказательства, будто бы атаку совершили рейдеры. В ближайшие дни мистер Тенпенни выступит перед поселениями и расскажет им, кто на самом деле является их врагом."
DCS_nf_events.13.a:0 "Рейдеры, которые это сделали, заплатят"
DCS_nf_events.131.title:0 "О НЕТ, ЕБУЧА БОМБА БОМБАЛЕЙЛОО!!!!!!!"
DCS_nf_events.131.desc:0 "Целая орава тупых ублюдков взяла Мегатон на понт. Город вспыхнул, как бочка с браминьим дерьмом — и это было чисто тухляк, вообще без движухи. Тенпенни окончательно слетел с катушек и орёт, что поселения порежут этих крыс в мясо, по-серьёзке, без фальши."
DCS_nf_events.131.a:0 "БОМБАННЫЕ РЕЙДЫРЫ СДЕЛАЛИ ЭТА!"
DCS_nf_events.14.title:0 "МегаТен"
DCS_nf_events.14.desc:0 "Там, где раньше стоял ржавый уродец, построенный вокруг бомбы, теперь находится чуть менее ржавое поселение... всё ещё построенное вокруг бомбы. На это ушли месяцы усилий людей со всей пустоши, но Мегатонна превратилась во что-то, чем Тенпенни может гордиться, сидя на своём балконе. Новое поселение начали называть «МегаТен» — в честь человека, который инициировал проект."
DCS_nf_events.14.a:0 "Это гораздо лучше, чем взрывать"
DCS_nf_events.15.title:0 "Мегатоннский Мемориал завершен"
DCS_nf_events.15.desc:0 "В руинах Спрингвейла, сразу за бывшим местом расположения Мегатонны, теперь стоит бетонная плита с именами сотен жителей, погибших при взрыве. Из-за близости к радиоактивному кратеру вряд ли кто-то будет часто навещать это место, но жители поселений Столичной Пустоши чувствуют себя немного лучше и ценят своего лидера за то, что он оплатил установку памятника."
DCS_nf_events.15.a:0 "Лучшие 100 крышек, которые я когда-либо тратил"
DCS_nf_events.16.title:0 "Гули в МОЕЙ башне?"
DCS_nf_events.16.desc:0 "Гуль по имени Рой Филлипс уже несколько недель досаждает у ворот Тенпенни-Тауэр. Каждый день этот зомби ковыляет к переговорному устройству и требует продать ему комнату — для себя и своих уродливых друзей. Сколько бы раз Густаво ни прогонял его - мутировавший выродок не понимает намёков. Слухи об этом ежедневном цирке уже разошлись за пределы башни, и другие поселения начинают обсуждать противостояние. Тенпенни выпустил официальное заявление: зомби в его башне не будут допущены. В ближайшие недели он намерен заняться поиском проактивных решений «гульского вопроса»."
DCS_nf_events.16.a:0 "Наконец, решение"
DCS_nf_events.17.title:0 "Зомби Вход Воспрещен"
DCS_nf_events.17.desc:0 "В рамках первого шага по решению «гульской проблемы» Тенпенни отправил отряд ополчения для зачистки туннелей рядом с одной из станций метро. Помимо ожидаемых диких гулей, бойцы обнаружили Роя Филлипса и его последователей. Найти зомби, прячущихся в туннелях, было неудивительно — но шокировало то, что гули планировали натравить диких на невинных жителей Тенпенни-Тауэр! Новости об этой едва не случившейся резне разлетелись по всей пустоши, и те крохи общественной поддержки, что были у гулей, исчезли. Тенпенни пообещал провести тщательное расследование и ввести новые законы, чтобы подобное больше никогда не повторилось в поселениях Вашингтона."
DCS_nf_events.17.a:0 "Представьте себе, если бы им это удалось!"
DCS_nf_events.18.title:0 "Форт Константин"
DCS_nf_events.18.desc:0 "Годы назад Тенпенни отправил группу мародёров исследовать Форт Константин. Экспедиция закончилась катастрофой — половина команды погибла, и Тенпенни списал всё как убытки. Но теперь, с ресурсами поселений Столичной Пустоши, он готов попробовать снова."
DCS_nf_events.18.a:0 "Мы их выгоним!"
DCS_nf_events.18.b:0 "Мы не можем связываться с Братством. Просто прокрадись и забери, что сможешь."
DCS_nf_events.18.c:0 "Хорошо, что у нас всё под контролем!"
DCS_nf_events.19.title:0 "Первая Глава"
DCS_nf_events.19.desc:0 "Ведётся работа над первой главой «Руководства по выживанию на пустошах». На какой раздел нам следует отправить наших ополченцев?"
DCS_nf_events.19.a:0 "Поиски еды"
DCS_nf_events.19.b:0 "Борьба с радиацией"
DCS_nf_events.19.c:0 "Проход через минное поле"
DCS_nf_events.20.title:0 "Вторая Глава"
DCS_nf_events.20.desc:0 "Завершив исследование для первой главы, пора переходить ко второй. На что следует направить наши усилия?"
DCS_nf_events.20.a:0 "Тестирование отпугивателя кротокрысов"
DCS_nf_events.20.b:0 "Изучение болотников?"
DCS_nf_events.20.c:0 "Изучение травмы"
DCS_nf_events.21.title:0 "Третья Глава"
DCS_nf_events.21.desc:0 "Вторая глава завершена, и теперь мы можем перейти к последней. Куда нам направить наших людей?"
DCS_nf_events.21.a:0 "Заглянуть в историю Ривет-Сити"
DCS_nf_events.21.b:0 "Найти завод РобКо"
DCS_nf_events.21.c:0 "Сходите в библиотеку"
DCS_nf_events.22.title:0 "Торговая Империя Роу"
DCS_nf_events.22.desc:0 "Торговля течёт по Столичной Пустоши как никогда прежде, а потери — как никогда малы. Дядюшка Роу сдержал своё обещание принести процветание поселениям Вашингтона и забрал себе лишь скромный процент — лучше, чем можно ожидать от большинства торговцев или политиков."
DCS_nf_events.22.a:0 "Мы в плюсе!"
DCS_nf_events.23.title:0 "Каковы наши стандарты?"
DCS_nf_events.23.desc:0 "Создание стандартного снаряжения для охраны караванов может принести немало пользы, включая избыточное снаряжение, которое можно передать нашим силам. Однако стоимость — важный фактор. Нужно ли действительно экипировать охрану караванов и солдат в довоенную боевую броню? Это снаряжение стоит очень дорого."
DCS_nf_events.23.a:0 "Выбирайте того, кто предложит самую низкую цену"
DCS_nf_events.23.b:0 "Давайте выберем что-то среднее"
DCS_nf_events.23.c:0 "Только лучшее для наших храбрых охранников"
DCS_nf_events.24.title:0 "Законник на земле беззаконья"
DCS_nf_events.24.desc:0 "Регуляторы уже столько лет пытаются навести порядок в Столичной Пустоши, что никто и не вспомнит, когда они начали. Несмотря на численное превосходство врагов, они вселяли страх в сердца рейдеров, работорговцев и прочей нечисти. Но действовали они в основном в одиночку. Теперь, когда один из них занял пост главы нашего правительства, они начинают присматриваться к идее тесного сотрудничества с нашим ополчением."
DCS_nf_events.24.a:0 "Вместе избавимся от ублюдков!"
DCS_nf_events.25.title:0 "Саботаж?"
DCS_nf_events.25.desc:0 "Охранник Мегатонны вышел справить нужду и наткнулся на странного чужака, возившегося с огромной бомбой в центре города. Нарушителя немедленно арестовали. После нескольких часов допроса Лукас Симмс выяснил, что безумный подрывник был нанят человеком Тенпенни — мистером Бёрком — чтобы подготовить взрыв. С подписанным признанием в руках Симмс собирает отряд, чтобы привести Тенпенни к ответу."
DCS_nf_events.25.a:0 "Какой больной ублюдок разрушит город из-за 1000 крышек?"
DCS_nf_events.26.title:0 "Справедливость Пустоши"
DCS_nf_events.26.desc:0 "Люди Тенпенни знали, что ополчение Поселений Столичной Пустоши идёт к ним, и устроили отчаянное сопротивление. В хаосе мистеру Бёрку удалось избежать ареста, а сам Тенпенни просто сидел и ждал на вершине своей башни. Теперь, когда Тенпенни взят под стражу, Лукас Симмс стоит перед выбором. Каждая клетка его тела требует, чтобы Тенпенни получил по заслугам — по-пустошному, у дула пистолета. Но Тенпенни предложил взамен ссылке координаты крупного тайника с крышками. Симмс никогда не поддавался на взятки, но это — другое. Эти крышки не для него. Такая сумма может изменить жизнь людей, за которых он теперь отвечает."
DCS_nf_events.26.a:0 "Никаких сделок с отбросами вроде Тенпенни!"
DCS_nf_events.26.b:0 "Он, скорее всего, так или иначе умрет в изгнании... верно?"
DCS_nf_events.27.title:0 "Новый Тауэр"
DCS_nf_events.27.desc:0 "Тенпенни ушёл, и теперь башне нужен новый управляющий. Отсеять длинный список добровольцев оказалось непросто, но выбор сузился до трёх кандидатов: Герберт Дэринг Дэшвуд — бывший искатель приключений, Ченг — владелец бизнеса в башне, и Рой Филлипс — гуль, который когда-то хотел привести своих сородичей в башню. По правде говоря, последний вариант больше похож на попытку насолить памяти Тенпенни, но Рой пообещал быть справедливым к нынешним жителям."
DCS_nf_events.27.a:0 "Давайте Дэшвуда"
DCS_nf_events.27.b:0 "Кажется, у Ченга есть какие-то идеи"
DCS_nf_events.27.c:0 "Филлипс кажется сомнительным, но стоит попробовать"
DCS_nf_events.28.title:0 "Свободные Выборы!"
DCS_nf_events.28.desc:0 "Президент Дэйв выступил сегодня с заявлением, пообещав покончить с коррупцией и мутными махинациями, которые испортили прошлые выборы — до того, как он занял своё законное место президента. Его первый шаг — назначить дату следующих выборов через четыре года. Разумеется, чтобы всё прошло честно, голосовать смогут только граждане Республики Дэйва. Проявив свою мудрость, Дэйв предвосхитил критику и добавил, что любой гражданин поселений Столичной Пустоши может подать заявку на гражданство — при условии оплаты соответствующего сбора и успешной сдачи экзамена на гражданство."
DCS_nf_events.28.a:0 "Демократия жива и процветает благодаря Дэйву!"
DCS_nf_events.29.title:0 "Заслуживает благодарности"
DCS_nf_events.29.desc:0 "Последнее время было тяжёлым для поселений Вашингтона. Коррумпированные чиновники и деспоты пытались подорвать нашу демократию сфальсифицированными выборами, что, к сожалению, привело к кровопролитию. Всё могло закончиться тогда, если бы не один великий человек — наш президент. Президент Дэйв провёл нас сквозь тьму, вернув безопасность и стабильность нашей земле. С помощью своей могучей армии он держит рейдеров на расстоянии и охраняет наши дороги. Без его лидерства мы до сих пор были бы под пятой преступников вроде Лукаса Симмса и Дядюшки Роу. Он заслуживает нашей благодарности!"
DCS_nf_events.29.a:0 "Спасибо Тебе, президент Дэйв!"
DCS_nf_events.30.title:0 "Аболиционисты"
DCS_nf_events.30.desc:0 "Группа беглых рабов обратилась к нам за помощью. Им всё сложнее находить укрытие, и они понимают, что только борьба с работорговцами из Парадайз-Фоллс даст им настоящую свободу. Их лидер, Ганнибал Хэмлин, умоляет нашего руководителя разрешить рабам, которых они спасают, находить убежище в наших поселениях. Он и его люди обещают поддерживать нас, если мы поможем им в этой борьбе против рабства."
DCS_nf_events.30.a:0 "Мы примем беглецов"
DCS_nf_events.30.b:0 "Мы не можем защитить их, но можем вооружить"
DCS_nf_events.31.title:0 "Битва за Мемориал Линкольна"
DCS_nf_events.31.desc:0 "Два отряда ополченцев отправились с Ганнибалом Хэмлином и его солдатами зачистить Мемориал Линкольна от работорговцев. Они также столкнулись с супермутантами, но сумели одолеть их и захватить мемориал Храма Союза."
DCS_nf_events.31.a:0 "Получи, работорговец!"
DCS_nf_events.31.b:0 "Цена свободы часто оплачивается кровью"
DCS_nf_events.31.c:0 "Удивительно, что нам это удалось"
DCS_nf_events.32.title:0 "Падение Парадайза"
DCS_nf_events.32.desc:0 "Вооружённые ублюдки, оккупировавшие Парадайз-Фоллс, могли удерживать своих жертв от мыслей о свободе, но они не были готовы к настоящей силе, решившей стереть их с лица пустоши. Между нашим ополчением и бойцами-беглецами Ганнибала Хэмлина у работорговцев не было ни единого шанса. Крупнейший рынок рабов на этой стороне пустоши пал, и теперь руины, что они занимали, вскоре заселят добрые, порядочные люди."
DCS_nf_events.32.a:0 "Мощный удар по работорговцам во всем мире!"
DCS_nf_events.33.title:0 "Добро пожаловать в Поселения"
DCS_nf_events.33.desc:0 "После того, как мы расправились с бандитами из Гаррисбурга, многие жители Джонстауна и окрестных поселений увидели ценность в единстве. Сегодня представители Джонстауна официально подали прошение о вступлении в альянс Поселений Столичной Пустоши. Это первый случай, когда столь крупная территория выразила желание присоединиться к нам, но они такие же, как мы — трудолюбивые люди, уставшие от постоянных набегов рейдеров."
DCS_nf_events.33.a:0 "Добро пожаловать!"
DCS_nf_events.34.title:0 "Противоречивые истории"
DCS_nf_events.34.desc.1:0 "Разведчики вернулись из Питта и рассказали нам немало. Их задержали почти сразу после входа в город — на заставе у железнодорожного туннеля, которую охраняли рыцари Братства. После короткого противостояния наши люди представились, и рыцари связались с местной базой для получения инструкций. Несколько напряжённых минут — и разведчиков заставили пройти какой-то анализ крови, а затем выдали герметичные защитные костюмы с категорическим требованием немедленно переодеться. Рыцари заверили, что это необходимо для их безопасности: Питт заражён высоко заразной болезнью — Контаминация Троглодитной Дегенерации (КТД), которая присутствует в воздухе и воде. Болезнь вызывает болезненные язвы, а у многих — безумие и превращение в мутантов, известных как троги. Братство работает над созданием лекарства, но до результата могут пройти годы. Наших разведчиков провели по башне, ранее принадлежавшей Ашуру, а теперь превращённой в герметичное учреждение, где писцы Братства трудятся над лечением КТД. Несмотря на многочисленные просьбы, нашим людям не разрешили контактировать с местными жителями или посещать фабрики. Нам объяснили, что это — мера карантина и забота о нашей безопасности. Паладин Куртс категорически заявил, что любой контакт с жителями Питта, которые каким-то образом покинули зону заражения, должен быть исключён. Он попросил нас содействовать в этом, стреляя на поражение по любому, кто проявляет симптомы КТД за пределами Питта — чтобы предотвратить пандемию. Взамен он пообещал, что всё ценное, что удастся извлечь из промышленности Питта, будет поделено с друзьями Братства — если мы поддержим их усилия по сдерживанию инфекции."
DCS_nf_events.34.desc.2:0 "Разведчики вернулись из Питта и рассказали нам удивительную историю. Почти сразу после входа в город их задержали люди, называющие себя «Ополчением Рабочих Питта». Они не проявили враждебности, но были насторожены. Наших людей разоружили и привели к лидеру ополчения — бывшей рабыне по имени Мидея, которую освобождённые называют Матерью Свободы. Она тепло приняла наших представителей и, по их словам, открыта к дальнейшему диалогу с нашим руководством. Естественно, Аболиционисты в восторге от известия о государстве освобождённых рабов, которое свергло крупнейший работорговый режим на этой стороне пустоши."
DCS_nf_events.34.desc.3:0 "Разведчики вернулись из Питта и рассказали нам жуткую историю. Почти сразу после входа в город на них напали. Им не удалось как следует разглядеть нападавших, но они едва выбрались живыми."
DCS_nf_events.34.a:0 "Нам нужно будет сделать выбор"
DCS_nf_events.35.title:0 "Ужасный Дом"
DCS_nf_events.35.desc:0 "Мы наконец-то нашли логово супермутантов. Нет никаких сомнений — они приходят и уходят из Убежища 87. Хотя пройти через главный вход невозможно, мы уверены, что существует обходной путь внутрь. Проблема в том, что в этом районе уже обосновались другие группы, и мы не можем просто войти туда с армией, заявив, что у нас веская причина."
DCS_nf_events.35.a:0 "Сначала нам нужно будет войти"
DCS_nf_events.35.b:0 "Расскажи Братству, что там!"
DCS_nf_events.36.title:0 "Литтл-Ламплайт"
DCS_nf_events.36.desc:0 "Мы знали, что жители Большого Города пришли из места под названием Литтл Ламплайт, так что, наверное, стоило заранее догадаться, что, войдя в пещеры Ламплайта, мы окажемся в городе, полном вооружённых детей, подозрительно настроенных к «мунгосам» вроде нас. К счастью, обошлось без насилия, но мэр сомневается, что мы способны справиться с мутантами из Убежища 87. Он требует гарантий."
DCS_nf_events.36.a:0 "Оплатить наш путь"
DCS_nf_events.36.b:0 "Отправьте больше людей, чтобы помочь им охранять задние ворота"
DCS_nf_events.36.c:0 "Детям нравятся роботы, правда? Пусть Механист убедит их"
DCS_nf_events.37.title:0 "Финальный Штурм"
DCS_nf_events.37.desc:0 "Каждый мужчина и женщина, шагавшие в это ужасное убежище, знали, что, скорее всего, не вернутся. И многие не вернулись. Но мы можем утешиться тем, что их жертвы были не напрасны. Угроза супермутантов в Столичной Пустоши остановлена. Хотя мутанты всё ещё существуют, инструменты, с помощью которых они размножались, уничтожены. Совсем скоро постоянный ужас, связанный с мутантами, останется лишь плохим воспоминанием."
DCS_nf_events.37.a:0 "Это наконец-то закончилось"
DCS_nf_events.37.b:0 "Это наконец-то закончилось"
DCS_nf_events.37.c:0 "Это наконец-то закончилось"
DCS_nf_events.37.d:0 "Это наконец-то закончилось"
DCS_nf_events.38.title:0 "Анклав повержен?"
DCS_nf_events.38.desc:0 "Анклав изгнан из Столичной Пустоши, и, похоже, мы наконец можем вздохнуть свободнее. Братство предупреждает, что Анклав всё ещё может скрываться где-то там, но мы уже победили их однажды. Значит, сможем сделать это снова, верно?"
DCS_nf_events.38.a:0 "Мы будем готовы"
DCS_nf_events.39.title:0 "Форт Баннистер"
DCS_nf_events.39.desc:0 "Бывший форт Компании «Коготь» теперь под нашим контролем. Последние зачистки подтвердили: ни одного вражеского солдата или сбойного охранного бота внутри не осталось. Теперь нам предстоит решить, что делать с этим местом. Одни считают, что нам нужен укреплённый форпост на западной границе. Другие утверждают, что ресурсы, которые можно извлечь из форта, куда ценнее, чем любые оборонительные преимущества от его восстановления."
DCS_nf_events.39.a:0 "Форт Банистер будет защищать нашу западную границу!"
DCS_nf_events.39.b:0 "Вынесите из этого места все, что сможете!"
DCS_nf_events.40.title:0 "Послание Мира"
DCS_nf_events.40.desc:0 "После недель проб и ошибок нам наконец удалось получить доступ к радиосигналу Убежища 101. Это крайне важный момент. За последние десятилетия оттуда вышло всего несколько человек, и взаимодействие с жителями было минимальным. Если мы произведём плохое впечатление, они могут снова закрыться от пустоши — возможно, ещё на двести лет!"
DCS_nf_events.40.a:0 "Предложить сосуществование и торговлю"
DCS_nf_events.40.b:0 "Убедить их присоединиться к конфедерации"
DCS_nf_events.41.title:0 "Сгоревшие дома и пустые улицы"
DCS_nf_events.41.desc:0 "После того как несколько торговцев пропали по пути в Грейдич, место стало избегаемым — слухи ходили самые разные. Наши войска, отправленные для расследования, развеяли эти слухи: поселение оказалось захвачено гигантскими огнедышащими муравьями. После тяжёлого боя, в ходе которого удалось зачистить часть города, они нашли учёного, прячущегося в лачуге. Похоже, именно он стоит за всей этой катастрофой. По словам доктора Леско, он всего лишь пытался уменьшить размер муравьёв с помощью генетики, но что-то пошло не так — и теперь они плюются огнём. Он настаивает, что может всё исправить, если мы немного его поддержим. Но можем ли мы быть уверены, что он не сделает их вдвое больше или не научит стрелять лазерами из глаз?"
DCS_nf_events.41.a:0 "Просто пошлите ополчение"
DCS_nf_events.41.b:0 "Механист знает, как бороться с муравьями!"
DCS_nf_events.41.c:0 "Давайте дадим Леско шанс"
DCS_nf_events.42.title:0 "Судьба Леско"
DCS_nf_events.42.desc:0 "Ситуация в Грейдиче могла быть несчастным случаем, но на руках доктора Леско всё равно кровь десятков невинных. Теперь нам предстоит решить, что делать с этим учёным."
DCS_nf_events.42.a:0 "Казнить его, за его преступления"
DCS_nf_events.42.b:0 "Пусть попробует сделать что-нибудь хорошее"
DCS_nf_events.43.title:0 "Неожиданные гости"
DCS_nf_events.43.desc:0 "Когда наши сборщики добрались до нижних уровней арсенала Уитон, к базе подошел небольшой отряд Изгоев Братства. Изгои заявили права на то, что скрыто в руинах, и предложили крышки в обмен на добычу. По словам старателей, плата честная, и некоторые из них утверждают, что Изгои — надёжные торговые партнёры, особенно когда дело касается техно-хлама из руин Вашингтона. Но если мы позволим этим людям диктовать условия сейчас — чего они потребуют завтра?"
DCS_nf_events.43.a:0 "Продай все, что там есть"
DCS_nf_events.43.b:0 "Скажите им, чтобы валили!"
DCS_nf_events.44.title:0 "Фабрика роботов"
DCS_nf_events.44.desc:0 "Фабрика RobCo была полна обезумевших роботов и пустошных тварей, но наши люди уже сталкивались с подобным. Спустя несколько часов зачистки, всё внутри, похоже, очищено от машин, и теперь мы готовы отправить команды сборщиков."
DCS_nf_events.44.a:0 "Хорошая работа"
DCS_nf_events.45.title:0 "Охота на Когтей Смерти"
DCS_nf_events.45.desc:0 "Чтобы охотиться на когтей смерти, нужно быть особенным — особенным в плохом смысле. К счастью, пустошь полна таких. Мы собрали команду отмороженных ублюдков, готовых доказать свою крутость, охотясь на этих тварей и наконец очистив Олд-Онли. Осталось только одно — нужен план."
DCS_nf_events.45.a:0 "Продолжайте стрелять, пока они не умрут!"
DCS_nf_events.45.b:0 "Заманить их во взрывоопасные ловушки"
DCS_nf_events.45.c:0 "Ударьте их с расстояния тяжелым оружием"
DCS_nf_events.45.d:0 "Взорвите их!"
DCS_nf_events.46.title:0 "В руины"
DCS_nf_events.46.desc:0 "Несмотря на то, что Олд-Онли долгие годы был под контролем когтей смерти, его руины находятся не в худшем состоянии по сравнению с другими довоенными развалинами. Под городом даже сохранилась старая электростанция, которая, похоже, питала большую часть района. Несмотря на ограниченные ресурсы, у нас есть несколько вариантов, что делать с этим местом. Мы можем восстановить его для заселения, попытаться вернуть к жизни электростанцию, насколько это возможно, или просто превратить весь город в одну большую зону для сбора хлама."
DCS_nf_events.46.a:0 "Верните город людям!"
DCS_nf_events.46.b:0 "Перезапустите генераторы!"
DCS_nf_events.46.c:0 "Вытащите из руин все, что сможете"
DCS_nf_events.47.title:0 "Ха ха ха Гээээрррриииии"
DCS_nf_events.47.desc:0 "Наша команда, отправленная в Убежище 108, почти сразу подверглась атаке со стороны группы клонированных обитателей, которые не переставали выкрикивать «Гэри». К счастью, клоны были плохо вооружены, так что обошлось без потерь, но сама ситуация была крайне тревожной."
DCS_nf_events.47.a:0 "Чёрт, это странно."
DCS_nf_events.48.title:0 "Анклава больше нет!"
DCS_nf_events.48.desc:0 "Мало кто поверил, когда Новости Галактики передали эту новость, но прошло уже несколько дней, как последний винтокрыл исчез с горизонта, и люди наконец начинают верить — Анклав остановлен. Благодаря усилиям наших храбрых солдат и союзников, Анклав больше не представляет угрозы для жителей Столичной Пустоши. Многие погибли в этих боях, но их жертва подарила нам более светлое будущее. Да, некоторые всё ещё опасаются внешних угроз или задаются вопросом о наших отношениях с Братством Стали, но большинство настроены на удивление оптимистично. В конце концов, мы только что победили самую технологически продвинутую армию пустоши — что нам какие-то обдолбанные рейдеры?"
DCS_nf_events.48.a:0 "Теперь мы можем вздохнуть спокойно"
DCS_nf_events.49.title:0 "Стоя в одиночестве"
DCS_nf_events.49.desc:0 "Нам не нужен союз с Братством. Да, они сражаются с супермутантами и раздают воду, но мы не можем становиться от них зависимыми. Нужно помнить, это мы выбили рейдеров из Бетесды, мы сражались не менее яростно против Анклава, и именно мы отвечаем за безопасность наших поселений."
DCS_nf_events.49.a:0 "Поселения Вашингтона прекрасны сами по себе!"
DCS_nf_events.50.title:0 "Странструющая безумка"
DCS_nf_events.50.desc:0 "Бродячую сумасшедшую женщину поймали наши ребята недалеко от границ Поселений Столичной Пустоши — по крайней мере, они так думали. Когда они устроили засаду, она вызвала армию муравьёв прямо из-под земли. Все наши бойцы были убиты, кроме одного. Его отправили назад с посланием: эта женщина, называющая себя НеМирмикой, хочет присоединиться к нам. У неё, похоже, личные счёты с Поселениями Столичных Пустошей, и она предлагает объединиться, чтобы превратить жизнь этих добряков в настоящий ад."
DCS_nf_events.50.a:0 "Просто... держите муравьев подальше от мальчиков"
DCS_nf_events.50.b:0 "Чёрт возьми, нет, убей ее!"
DCS_nf_events.51.title:0 "Хорошее предложение"
DCS_nf_events.51.desc:0 "Ассоциация Торговцев Залива уже десятки лет контролирует большую часть морской торговли на Восточном побережье. За свои годы в торговле Дядюшка Роу наладил хорошие отношения с некоторыми её членами. Придётся воспользоваться старыми связями, но Роу считает, что сможет добиться чего-то, что принесёт пользу всем нам."
DCS_nf_events.51.a:0 "Некоторые старые корабли"
DCS_nf_events.51.b:0 "Схемы корабля"
DCS_nf_events.51.c:0 "Секреты сельского хозяйства"
DCS_nf_events.52.title:0 "Нарушенный импорт рабов"
DCS_nf_events.52.desc:0 "Работорговцы из Парадайз-Фоллс сообщают, что их поставщики в Столичной Пустоши теряют караваны из-за действий местных ополченцев. Импорт рабов снизился на 25% в этом месяце, и, похоже, ситуация не изменится, пока они не возьмут себя в руки там, в пустоши."
DCS_nf_events.52.a:0 "Ашур будет недоволен"
DCS_nf_events.53.title:0 "Срыв караванов работорговцев"
DCS_nf_events.53.desc:0 "Солдаты Поселений Столичной Пустоши продолжают нападать на наши караваны с рабами и освобождать пленников. Сейчас мы теряем каждый четвёртый караван из-за этих людей, и это серьёзно бьёт по крышкам, которые мы получаем от продажи рабов."
DCS_nf_events.53.a:0 "Вот придурки!"
DCS_nf_events.54.title:0 "Работаете над этим?"
DCS_nf_events.54.desc:0 "Мы сообщили Братству о логове мутантов в Убежище 87, и они ответили, что в курсе ситуации и уже работают над планом полного уничтожения мутантов."
DCS_nf_events.54.a:0 "Это облегчение"
DCS_nf_events.55.title:0 "Срочное сообщение от Поселений Столичной Пустоши!"
DCS_nf_events.55.desc:0 "Поселения Столичной Пустоши прислали срочное сообщение: они выяснили, что угроза супермутантов в Столичной Пустоши исходит из Убежища 87. Они просят нас вывести силы из региона и передать им контроль над штатом, чтобы они могли перебросить свои войска и покончить с угрозой раз и навсегда. Что касается удержания территории, они считают, что она не представляет особой ценности для нас, а поскольку они рискуют своими жизнями, то должны иметь право оставить её себе."
DCS_nf_events.55.a:0 "Дайте им область"
DCS_nf_events.55.b:0 "Спасибо им за информацию, но у нас всё под контролем"
DCS_nf_events.56.title:0 "Комунна Тенпенни"
DCS_nf_events.56.desc:0 "За короткое время с момента прихода к власти Ирвинг Ченг превратил некогда роскошное поселение в нечто вроде коммунистического государства. Люди, привыкшие к жизни в роскоши и праздности, были быстро отправлены на «народные фермы» или призваны в охрану башни. Многие забрали то немногое, что Ченг ещё не конфисковал, и покинули башню. Но те, кто остался, похоже, начинают привыкать, а освободившиеся места заняли нищие жители пустоши, которых теперь приветствуют. Главное — помнить девиз Председателя: все жители пустоши равны, но некоторые равнее других."
DCS_nf_events.56.a:0 "Странный парень"
DCS_nf_events.57.title:0 "Та же башня, другой день"
DCS_nf_events.57.desc:0 "Герберт Дэринг Дэшвуд мало что изменил в Башне Тенпенни, и, честно говоря, могло быть и хуже. Он оказался немного менее предвзятым, чем прежнее руководство, и впустил несколько менее обеспеченных жителей пустоши, но в остальном всё осталось по-старому."
DCS_nf_events.57.a:0 "Похоже, мы сделали хороший выбор"
DCS_nf_events.58.title:0 "Куда они делись?"
DCS_nf_events.58.desc:0 "Торговцы, проходившие мимо Тенпенни-Тауэр, отметили, что многих привычных лиц среди торговцев больше не видно — будто их заменили толпы гулей, которых Рой Филлипс заселяет в башню. Мы отправили людей проверить, и Рой настаивал, что прежние жители, скорее всего, живы и здоровы, просто не смогли смириться с соседством гулей и ушли куда-то на запад. Остаётся только надеяться, что они не забрели на земли Церкви Рокки."
DCS_nf_events.58.a:0 "А может быть, их съели зомби"
DCS_nf_events.59.title:0 "Репарации"
DCS_nf_events.59.desc:0 "Когда-то представлявшие собой лишь банды анархичных психов, группировки рейдеров под руководством Бригга превратились в успешный бизнес по переработке мяса. Жители Столичной Пустоши готовы забыть страх ради вкуса «Чудо-Мяса» из кротокрыс, но ужасы прошлых лет всё ещё свежи в памяти. Именно поэтому с каждой партией «Чудо-Мяса», отправляемой в поселения, мы добавляем дополнительный ящик мяса — для жертв рейдерских нападений. Мы делаем это в духе примирения и стремления к долгосрочному партнёрству между нашей компанией и остальной частью Столичной Пустоши."
DCS_nf_events.59.a:0 "Теперь все в порядке, да?"
DCS_nf_events.60.title:0 "Разведчики вернулись"
DCS_nf_events.60.desc.1:0 "Всё оказалось примерно так, как мы и ожидали. Несмотря на громкие обещания Ашура построить нечто лучшее и уверения, что рабство — лишь временная мера, в Питте мало что изменилось. Король рейдеров по-прежнему правит железной рукой, а рабы остаются в милости у своих надсмотрщиков. Если мы ничего не предпримем, так всё и останется — до самой смерти Ашура."
DCS_nf_events.60.desc.2:0 "Мы слышали, что в Питте произошло восстание рабов и Ашура свергли. Но мы решили проверить всё сами. И хорошо, что сделали это — несмотря на «восстание», в Питте мало что изменилось. Новый лидер, Вернер, оказался ненамного лучше самого Ашура."
DCS_nf_events.60.a:0 "Нам нужно что-то сделать!"
DCS_nf_events.61.title:0 "Что за КТД?"
DCS_nf_events.61.desc:0 "Пробудь в Питте достаточно долго и ты тоже заболеешь Контаминация Троглодитной Дегенерации, болезнью, уникальной для этого места. Никто точно не знает, что её вызывает, но она — в воздухе, в воде, повсюду. Правители Питта пытались найти лекарство, изучая ребёнка, родившегося с иммунитетом к болезни и радиации. К счастью, ребёнок пережил войну, и теперь мы можем продолжить то, что они начали."
DCS_nf_events.61.a:0 "Это займет некоторое время"
DCS_nf_events.62.title:0 "Что за КТД?"
DCS_nf_events.62.desc:0 "Контаминация Троглодитной Дегенерации — болезнь, веками терзавшая жителей Питта. Никто толком не знает, что её вызывает, но воздух и вода в этом районе отравлены, и любой, кто задержится там надолго, рискует заболеть. К счастью, лекарство было разработано благодаря изучению ребёнка, родившегося с иммунитетом к болезни и радиации. Нам удалось восстановить формулу, и теперь никто из тех, кто решит поселиться в Питте, не должен бояться превратиться в трога."
DCS_nf_events.62.a:0 "Хорошо, что мы это обнаружили"
DCS_nf_events.63.title:0 "Братство Питта"
DCS_nf_events.63.desc:0 "Братство Стали обосновалось в Питте после свержения прежних правителей. Под командованием Паладина Куртса огни индустрии Питта всё ещё горят, и жизнь продолжается. Мы не уверены, остались ли люди в цепях. Но это же Братство, значит, наверное нет?"
DCS_nf_events.63.a:0 "Лайонс никогда бы не поработил людей"
DCS_nf_events.64.title:0 "Новый деспот, история та же"
DCS_nf_events.64.desc:0 "Мы мало знаем о том, кто теперь управляет Питтом — все наши разведчики, отправленные туда, не вернулись. Но одно известно точно: заводы всё ещё работают, и рабов продолжают привозить из других уголков пустоши. Мы не можем позволить этому продолжаться."
DCS_nf_events.64.a:0 "Кто бы это ни был, мы их остановим"
DCS_nf_events.65.title:0 "Встреча с Паладином Куртсом"
DCS_nf_events.65.desc:0 "Чтобы успокоить Храм Союза, мы направили представителей в Питт, чтобы оценить, как Паладин Куртс управляет регионом от имени наших друзей из Братства Стали. По прибытии на окраины Питта нашим представителям выдали защитные костюмы и настоятельно потребовали немедленно переодеться. Рыцари, встретившие их у железнодорожного тоннеля, заверили, что это необходимо для их безопасности — Питт заражён высоко заразной болезнью, известной как Контаминация Троглодитной Дегенерации, присутствующей в воздухе и воде. Болезнь вызывает болезненные язвы, а у многих со временем приводит к безумию и превращению в ужасных мутантов — трогов. Братство работает над созданием лекарства, но до результата могут пройти годы. Нашу группу провели по башне, некогда принадлежавшей Ашуру, теперь превращённой в герметичное учреждение, где писцы работают над лечением КТД в безопасности. Несмотря на многочисленные просьбы, нашим представителям отказали в прямом контакте с местными жителями и экскурсиях по заводам. Нам объяснили, что это часть карантинных мер и делается исключительно ради нашей безопасности. Паладин Курц был категоричен: любой контакт с жителями Питта, нарушившими изоляцию, должен быть исключён для всех, кто находится в Вашигтоне. Он также пообещал, что всё, что удастся извлечь из промышленности Питта, будет разделено с друзьями Братства — при условии, что мы не будем вмешиваться в их усилия по сдерживанию болезни и не подвергнем риску остальную часть пустоши."
DCS_nf_events.65.a:0 "Этот КТД звучит опасно. Лучше прислушаться"
DCS_nf_events.66.title:0 "Ужас"
DCS_nf_events.66.desc:0 "Братство Стали заверяло нас, что их правление в Питте будет лучше, чем у Ашура. Они утверждали, что Питт заражён местной мутагенной болезнью — Контаминация Троглодитной Дегенерации — и именно из-за карантина никто не покидает регион. Недавно карантин был нарушен: человек по имени Уиллард добрался до совета и умоляет о помощи. Он утверждает, что КТД не заразна, а Паладин Куртс воспользовался своей удалённостью от остальной части Отделения Лайонса, чтобы превратить Питт в своё личное феодальное владение. Уиллард не верит, что Отделение Лайонса предпримет что-либо против Куртса, и умоляет нас вмешаться ради жителей Питта."
DCS_nf_events.66.a:0 "Это стоит расследовать."
DCS_nf_events.67.title:0 "Времена меняются"
DCS_nf_events.67.desc:0 "Угроза рейдеров достигла исторического минимума, обломки Анклава можно найти почти в каждом поселении, чистая вода доступна бесплатно, а промышленность Питта стимулирует рост производства. Можно с уверенностью сказать, что дела в Столичной Пустоши идут на поправку с каждым днём. То, чего мы достигли, объединив усилия, заслуживает уважения — и это лишь начало. Но вместе с ростом приходят и проблемы. Без рейдеров, заставлявших людей прятаться за укреплениями, межпоселенческие путешествия достигли рекордного уровня. Но где заканчиваются законы одного поселения? У их ворот или у стен соседнего? Как защищать обширные участки пустоши? Раньше всё было просто — каждый сидел за сталью или камнем. Теперь люди рассеиваются, и контроль над границами становится важнее. И, конечно, есть последствия промышленной революции. Уже поступают жалобы от поселений, недовольных тем, что другие сбрасывают промышленные отходы рядом с ними. Чтобы справиться с этим, нам придётся работать вместе, идти на компромиссы и расширить полномочия нашего управляющего совета."
DCS_nf_events.67.a:0 "Давайте работать вместе ради светлого будущего"
DCS_nf_events.68.title:0 "Свод законов"
DCS_nf_events.68.desc:0 "Хотя законы поселений пустоши обычно довольно единообразны — не убивай, не воруй и тому подобное, есть и исключения. Например, в Тенпенни-Тауэр запрещено носить белое после первого понедельника сентября и до конца года. Очевидно, такой закон невозможно справедливо применять в других частях пустоши, где у людей зачастую всего одна одежда. И это лишь один из множества примеров несоответствий, которые могут вызвать проблемы. Есть ещё вопрос автономии поселений. Мы уже сталкивались с ситуациями, когда представители закона из одного поселения преследовали преступника в другом и вступали в конфликт с местной охраной."
DCS_nf_events.68.a:0 "Совет установит законы, которые будут применяться повсеместно"
DCS_nf_events.68.b:0 "Законы поселения заканчиваются у его ворот. Дальше - законы совета."
DCS_nf_events.68.c:0 "§C Регуляторы будут обеспечивать справедливость на пустошах.§!"
DCS_nf_events.68.d:0 "§G Последуйте примеру путешествующих караванов.§!"
DCS_nf_events.68.e:0 "§R Белый после Дня отдыха? Через мой труп!§!"
DCS_nf_events.68.f:0 "§O В Республике Дэйва самые лучшие законы, применяйте их везде!§!"
DCS_nf_events.69.title:0 "Постоянная армия"
DCS_nf_events.69.desc:0 "За исключением мобилизации во время конфликта с Анклавом, у нас было мало причин объединять ополчения и вооружённые группы поселений в единое военное формирование. В прошлом отдельные отряды хорошо справлялись с защитой от рейдеров и отражением крупных атак. Однако сегодня люди всё чаще покидают границы своих поселений. Если мы хотим избежать отката к временам, когда никто не покидал родные стены, нам нужно обеспечить безопасность пустоши между поселениями. Для движения вперёд потребуется постоянная армия, способная защищать наши границы и реагировать на внешние угрозы. Главные вопросы — кто будет входить в эту армию и как мы будем её финансировать."
DCS_nf_events.69.a:0 "Почему бы просто не объединить ополчения?"
DCS_nf_events.69.b:0 "§C Военачальниками поселения станут ветераны-регуляторы.§!"
DCS_nf_events.69.c:0 "§G Наемники заполнят те бреши, которые не могут заполнить ополченцы.§!"
DCS_nf_events.69.d:0 "§R Мистер Бёрк знаком с несколькими безработными наемниками.§!"
DCS_nf_events.69.e:0 "§O Дэйв возглавит огромную армию верных сынов поселения!§!"
DCS_nf_events.69.f:0 "Нам нужна централизованная военная сила"
DCS_nf_events.70.title:0 "Последствия прогресса"
DCS_nf_events.70.desc:0 "За двести лет с момента падения бомб всё, чем владели жители Столичной Пустоши, происходило из двух источников. Либо это было создано до войны и найдено среди руин, либо было сколочено каким-нибудь мастером — зачастую единственным в своём поселении. Но благодаря промышленному подъёму Питта и относительному процветанию, которое мы переживаем, начался рост индустрии. Дни, когда оружие собирали из ржавых труб в сараях, подходят к концу. Однако этот рост и появление производственных компаний несут с собой и проблемы. Масштабное производство породило рынок, где зачастую дешевле выбросить остатки материалов, чем пытаться их переработать. Стремление к максимально эффективному производству уже привело к тому, что некоторые поселения страдают от промышленных отходов и других последствий. Мы должны взять это под контроль, прежде чем оно приведёт к долгосрочным проблемам."
DCS_nf_events.70.a:0 "Мы можем создать правила, где можно сбрасывать отходы."
DCS_nf_events.70.b:0 "§C Нанесение ущерба поселению будет наказываться. §!"
DCS_nf_events.70.c:0 "§G Соберите руководителей предприятий для поиска решений. §!"
DCS_nf_events.70.d:0 "§R Им просто нужно переехать в благополучное поселение. §!"
DCS_nf_events.70.e:0 "§O Учредить правила, которые президент может обойти. §!"
DCS_nf_events.71.title:0 "Растущая Республика"
DCS_nf_events.71.desc:0 "В последние годы Поселения Столичной Пустоши стали гораздо большим, чем просто конфедерацией поселений. С выборами, новыми законами и постоянной армией становится ясно, что мы всё ближе к тому, что можно назвать Республикой. Когда наш взгляд выходит за пределы Столичной Пустоши, становится очевидно — мы уже не просто «Поселения Столичной Пустоши». Нам нужно новое имя, соответствующее нашим новым амбициям."
DCS_nf_events.71.a:0 "Что-то типо Новой Столичной Республики"
DCS_nf_events.71.b:0 "Нет, мы — Объединённые Поселения Дэйва."
DCS_nf_events.72.title:0 "Те, кто рискуют, не возвращаются"
DCS_nf_events.72.desc:0 "В последние десятилетия те, кто осмеливался пробраться через пустоши, кишащие супермутантами и рейдерами, чтобы добраться до западных холмов, редко возвращались. А те немногие, кому это удавалось, рассказывали о безумном культе, крайне враждебном к чужакам. Долгое время казалось, что они не стремятся выходить за пределы своей территории, и эти земли просто обходили стороной. Мы не знаем, что изменилось, но беглецы из холмов говорят, что Церковь Рокки заняла более экспансионистскую позицию. Возможно, нам придётся действовать, прежде чем они решат, что хотят прийти к нам."
DCS_nf_events.72.a:0 "Какие у меня есть варианты?"
DCS_nf_events.73.title:0 "Опасность и возможность"
DCS_nf_events.73.desc:0 "Поселенцы Столичной Пустоши всё чаще сообщают о людях, бегущих с западных холмов, рассказывающих о опасном культе. Хотя борьба с поклонниками камней обычно выходит за рамки нашей компетенции, поселенцы подчёркивают, что эти культисты были замечены с довоенным оружием. Похоже, у них есть крупный склад с огнемётами и, возможно, даже гаусс-винтовками. Это стоит проверить."
DCS_nf_events.73.a:0 "Мы можем выделить отряд рыцарей"
DCS_nf_events.74.title:0 "Едва ли стоит усилий"
DCS_nf_events.74.desc:0 "Холмы Аппалачей — это не Питт и не Бостон. Да, там есть кое-какие технологические ценности, но их явно недостаточно, чтобы оправдать длительное присутствие. Именно поэтому предложение наших друзей из Столичной Пустоши выглядит столь заманчиво. Они просят передать контроль над регионом их молодой Республике, обещая взамен направлять нам всё, что может представлять интерес. Наше партнёрство с Поселениями Столичных Пустошей, Новой Столичной Республикой — или как они теперь себя называют — продолжает приносить плоды."
DCS_nf_events.74.a:0 "Принять их предложение"
DCS_nf_events.74.b:0 "Спасибо, но нет."
DCS_nf_events.75.title:0 "Родственные души"
DCS_nf_events.75.desc:0 "После беседы с представителями Восточной Республикой становится ясно, что в чём-то они очень похожи на нас. В основном это поселенцы, которые просто хотели обезопасить себя и жить своей жизнью. В целом — именно этим мы и занимались. Да, они стали немного крупнее, а часть их руководства проявляет черты авторитарности, которые нам не совсем по вкусу, но, похоже, они пока не наступили на те же грабли, что и довоенное правительство. Возможно, сотрудничество с ними будет наилучшим решением для обеих сторон."
DCS_nf_events.75.a:0 "Мы присоединимся к Республике как равные"
DCS_nf_events.75.b:0 "Тенпенни забыл слова: «НЕ! НАСТУПАЙ! НА! МЕНЯ!»"
DCS_nf_events.75.c:0 "Никаких богов, королей или президентов, Дэйв!"
DCS_nf_events.75.d:0 "Роу не проходит проверку на вайб"
DCS_nf_events.76.title:0 "Чудовища из Фольклора"
DCS_nf_events.76.desc:0 "Во время тура по недавно аннексированным территориям президент Дэйв услышал рассказы о странных существах, скрывающихся в холмах и лесах Аппалачей. Огромные мотыльки, чудовищные громилы и нечто, называемое вендиго. Он твёрдо намерен доказать свою силу жителям этого региона, выследив одно из этих созданий и убив его. Сейчас он собирает команду лучших охотников и ловцов региона, не потому что ему нужна помощь... Просто чтобы показать, как это делается!"
DCS_nf_events.76.a:0 "Вы сможете это сделать, господин Президент!"
DCS_nf_events.77.title:0 "Поимка Человека-Мотылька"
DCS_nf_events.77.desc:0 "Мутировавшие мотыльки — обычное явление в Аппалачах, но именно их президент Дэйв не искал последние недели. Существуют довоенные легенды о большом мотыльке, обладающем разумом. Он ускользал от самых опытных охотников более 300 лет, но Дэйв — другой. Именно поэтому так горько, что после недель ловушек и выслеживания существо исчезло в тот момент, когда Дэйв почти поймал его. Очевидно, что Дэйв наконец встретил достойного противника. И, конечно, он бы поймал его, если бы у него было больше времени. Но дела государства важнее. Поймут ли это жители Пустоши?"
DCS_nf_events.77.a:0 "Возвращаемся с пустыми руками"
DCS_nf_events.77.b:0 "Поймайте низшее существо и скажите, что это ЧЕЛОВЕК-МОТЫЛЁК"
DCS_nf_events.77.c:0 "§0Дэйв пристально посмотрел в его фиолетовые глаза§!"
DCS_nf_events.78.title:0 "Безумие короля Тенпенни"
DCS_nf_events.78.desc:0 "С вершины Тенпенни-Тауэр открывается вид почти на всю Столичную Пустошь. Но даже Тенпенни нужны агенты, чтобы претворять его волю в жизнь. По предложению мистера Бёрка, начальник охраны Густаво будет назначен ответственным за наведение порядка в недавно завоёванных Аппалачских территориях. Эта Аппалачская колония будет направлять богатства в казну Республики, которая, разумеется, является казной самого Тенпенни."
DCS_nf_events.78.a:0 "Мы — Республика, наши интересы — их интересы"
DCS_nf_events.79.title:0 "Лучшие из лучших"
DCS_nf_events.79.desc:0 "После первоначальных перепалок между Регуляторами и солдатами Грин-Маунтин, обе группы, похоже, начали хорошо ладить. Регуляторам есть чему поучиться в ведении боя в холмистой местности, так же как Грин-Маунтин может многому научиться в городской войне и выживании в Пустоши. Похоже, это сотрудничество действительно будет взаимовыгодным."
DCS_nf_events.79.a:0 "Понял"
DCS_nf_events.80.title:0 "Рельсотронные Револьверы?"
DCS_nf_events.80.desc:0 "Технари говорят, что до компактных магнитных ускоряющих ручных пушек нам ещё далеко, но это уже хороший первый шаг. Регуляторы вернулись с Грин-Маунтина, привезя 10 ящиков гаусс-винтовок и схемы для их производства. Но прежде чем мы начнём планировать, как вооружить каждого ополченца винтовкой, способной пробивать силовую броню, нужно понять одну простую вещь: знание того, как собрать гаусс-винтовку — это ещё не знание того, как производить все необходимые детали. Прежде чем наладить массовое производство, нам предстоит разобраться с этим."
DCS_nf_events.80.a:0 "Итак, мы уже на полпути?"
DCS_nf_events.81.title:0 "Сладости и раздор"
DCS_nf_events.81.desc:0 "За рекой, отделяющей нас от остальной довоенной Пенсильвании, разворачивается борьба, знакомая нам по другим частям пустоши. С одной стороны — группа торговцев и ремесленников, с другой — рейдеры, которые за всю жизнь не вырастили ни одной культуры. Первые называют себя Кондитерским Коллективом. Они обосновались в довоенном парке развлечений и фабрике под названием Херши. По слухам, они вышли из убежища под этим местом, созданного для сохранения искусства производства некоего «шоколада». Со временем их ремесло привлекло торговлю, и они построили солидное поселение, что, в свою очередь, привлекло внимание Филладельфских Рейдеров. Эта банда, насколько можно судить, мало чем отличается от других крупных рейдерских образований. Её возглавляет человек, называющий себя Кабаном, вместе со своими детьми. Эти рейдеры терроризируют большую часть региона и, по имеющимся данным, время от времени продают рабов в Питт. Очевидно, какую сторону мы должны поддержать."
DCS_nf_events.81.a:0 "Что такое шоколад?"
DCS_nf_events.82.title:0 "Только больше вопросов"
DCS_nf_events.82.desc:0 "Чем глубже мы копаем в культы Андейла, тем больше вопросов возникает. Кровавые ритуалы, сборища в болотах и связи с довоенными обществами — это лишь верхушка айсберга. Сами культисты крайне скрытны, и мы не получаем от них никакой информации. Остаются только дневники и записки, не успевшие сгореть — и они дают нам лишь обрывочные намёки. В стремлении понять это безумие и угрозу, которую оно несёт, мы, похоже, ослабили внимание к другим вопросам. Несколько членов руководства Андейла сбежали из-под стражи во время этапирования в изоляторы для допроса."
DCS_nf_events.82.a:0 "Подождите... Что происходит в Данвич-билдинг?!"
DCS_nf_events.83.title:0 "Превращены в пепел"
DCS_nf_events.83.desc:0 "Нет смысла пытаться понять бред этих безумцев. Они были вырожденными людоедами, представлявшими угрозу для порядочных людей, и теперь стали топливом для больших костров в каждом из своих поселений. Вместе с ними сгорели их дневники, религиозные символы и всё остальное, что могло вдохновить подобную ересь в будущем."
DCS_nf_events.83.a:0 "Некоторые вещи лучше оставить в тайне"
DCS_nf_events.84.title:0 "Солнечные Лучи в Андейле"
DCS_nf_events.84.desc:0 "Тёмные облака, нависшие над Андейлом — как в прямом, так и в переносном смысле — рассеялись. Ужасы, принесённые его прежними жителями, прекратились. Люди, переселяющиеся в этот район, иногда сообщают о тревожных ощущениях или чувстве, будто за ними наблюдают, но никто не пропадал, и ничего подозрительного обнаружено не было."
DCS_nf_events.84.a:0 "Тогда, наверное, всё кончено"
DCS_nf_events.85.title:0 "Стычки с Братством"
DCS_nf_events.85.desc:0 "Распределение воды от Проекта «Чистота» Братством Стали не обходится без трудностей. Братство столь же скрупулёзно, сколь и непреклонно. Это означает, что при любом природном ЧП — вроде потери запасов воды — или при росте населения, опережающем обновление записей Братства, возникают проблемы. К счастью, эти стычки пока не привели к кровопролитию, но возникает вопрос — может, всё это можно было бы устроить лучше?"
DCS_nf_events.85.a:0 "Можем ли мы добиться большего?"
DCS_nf_events.86.title:0 "Борьба Ривет-Сити"
DCS_nf_events.86.desc:0 "Распределение воды из Ривет-Сити по всей Столичной Пустоши стало настоящим спасением. Однако начинают проявляться проблемы. Охранники, отвечающие за доставку, перегружены, и уже произошло несколько инцидентов, из-за которых поставки оказались неполными. Очевидно, что Ривет-Сити нуждается в помощи."
DCS_nf_events.86.a:0 "Это меньшее, что мы могли сделать"
DCS_nf_events.87.title:0 "Кто их назначил ответственными?"
DCS_nf_events.87.desc:0 "Проще говоря, мы не уверены, как нынешние обитатели Проекта Чистота вообще получили контроль над этим местом. Но мы точно знаем одно — они не делятся водой ни с кем. А ведь эта вода могла бы спасти бесчисленное количество жизней, если бы оказалась в правильных руках. В наших руках."
DCS_nf_events.87.a:0 "Серьёзно, как ОНИ заняли это место?"
DCS_nf_events.88.title:0 "Рука Помощи"
DCS_nf_events.88.desc:0 "Братству Стали не помешала бы помощь в управлении Проектом Чистота. От самого процесса очистки воды до её доставки в руки жителей пустоши — у них хватает проблем, которые можно было бы решить с минимальными усилиями, будь то люди или ресурсы. Совет сейчас обсуждает, каким образом мы окажем поддержку."
DCS_nf_events.88.a:0 "Отправьте ополченцев на помощь в охране караванов."
DCS_nf_events.88.b:0 "Крышки могут решить большинство проблем."
DCS_nf_events.88.c:0 "§C Отправьте Регуляторов на поиски, кто мешает караванам. §!"
DCS_nf_events.88.d:0 "§G Роу знает опытных проводников, которые проложат маршруты. §!"
DCS_nf_events.88.e:0 "§R У мистера Бёрка есть несколько хороших идей и друзей.§!"
DCS_nf_events.88.f:0 "§O Ввести строгие нормы потребления воды за пределами столицы. §!"
DCS_nf_events.89.title:0 "Место за столом"
DCS_nf_events.89.desc:0 "Восточная Республика высоко оценила наши усилия по распределению воды из Проекта Чистота. Настолько высоко, что теперь предлагает свою помощь и просит направить представителя в их совет для обсуждения наилучших путей сотрудничества. Это, конечно, лишь первый шаг к возможному присоединению к более крупной республике, которую они формируют. Совет в данный момент обсуждает этот вопрос."
DCS_nf_events.89.a:0 "Давайте работать вместе"
DCS_nf_events.89.b:0 "Мы примем помощь, но пойдем своим путем"
DCS_nf_events.89.c:0 "Мы ни за что не будем работать с этим ублюдком!"
DCS_nf_events.90.title:0 "Сложнее, чем казалось"
DCS_nf_events.90.desc:0 "Хотя очиститель остался практически невредимым после нашего столкновения с его прежними обитателями, всё идёт не так гладко, как ожидалось. Управление очистителем требует серьёзных усилий, а людей у нас, мягко говоря, не хватает. Совет созвал экстренное заседание, чтобы обсудить, как решить эту проблему."
DCS_nf_events.90.a:0 "Назначить больше людей для помощи проекту"
DCS_nf_events.90.b:0 "Закидайте проблему крышками"
DCS_nf_events.90.c:0 "§C Отправьте Регуляторов на поиски, кто мешает караванам. §!"
DCS_nf_events.90.d:0 "§G Роу знает опытных проводников, которые проложат маршруты. §!"
DCS_nf_events.90.e:0 "§R У мистера Бёрка есть несколько хороших идей и друзей.§!"
DCS_nf_events.90.f:0 "§O Ввести строгие нормы потребления воды за пределами столицы. §!"
DCS_nf_events.91.title:0 "Рука помощи"
DCS_nf_events.91.desc:0 "Ривет-Сити принял наше предложение о помощи с очистителем. От самого процесса очистки воды до её доставки жителям пустоши — у них хватает проблем, которые можно было бы решить с минимальными усилиями, будь то люди или ресурсы. Совет сейчас обсуждает, каким образом мы окажем поддержку."
DCS_nf_events.91.a:0 "Отправьте ополченцев на помощь в охране караванов."
DCS_nf_events.91.b:0 "Крышки могут решить большинство проблем."
DCS_nf_events.91.c:0 "§C Отправьте Регуляторов на поиски, кто мешает караванам. §!"
DCS_nf_events.91.d:0 "§G Роу знает опытных проводников, которые проложат маршруты. §!"
DCS_nf_events.91.e:0 "§R У мистера Бёрка есть несколько хороших идей и друзей.§!"
DCS_nf_events.91.f:0 "§O Ввести строгие нормы потребления воды за пределами столицы. §!"
DCS_nf_events.92.title:0 "Занимайтесь своими делами"
DCS_nf_events.92.desc:0 "Лидер Торговцев Дувра обратился к нашему совету, заявив, что они намерены перейти к более прямым действиям в конфликте с Рыбаками Залива. Они попросили нас не вмешиваться и пообещали либо награды, либо последствия — в зависимости от того, как мы отнесёмся к их просьбе."
DCS_nf_events.92.a:0 "Посмотрим, как это будет происходить"
DCS_nf_events.93.title:0 "Помоги своему соседу"
DCS_nf_events.93.desc:0 "Мы не можем сидеть сложа руки, пока Рыбаки Залива становятся жертвой жадных махинаций горстки головорезов и их наёмной армии. Возможно, мы не можем отозвать всё наше ополчение, чтобы помочь им, но кое-что сделать мы всё же можем."
DCS_nf_events.93.a:0 "Отправьте им добровольцев"
DCS_nf_events.93.b:0 "Отправьте им оружие"
DCS_nf_events.94.title:0 "Снижение вреда"
DCS_nf_events.94.desc:0 "Очевидно, что быстрое завершение конфликта — лучшее решение для всех. Поэтому, вместо того чтобы бездействовать или поддерживать Рыбаков Залива в заведомо проигрышной борьбе, мы окажем помощь Дувру, чтобы они смогли быстрее подавить сопротивление. Надеемся, это приведёт к скорейшему окончанию конфликта и спасёт жизни... верно?"
DCS_nf_events.94.a:0 "Отправьте им добровольцев"
DCS_nf_events.94.b:0 "Отправьте им оружие"
DCS_nf_events.95.title:0 "Поселения Делмарвы"
DCS_nf_events.95.desc:0 "Наконец-то наш конфликт с Рыбаками Залива завершён. Эти рыбаки приняли наше правление, и прибыли будут выше, чем когда-либо. Однако остаётся вопрос о Поселениях Вашингтона — они предложили нам присоединиться к их Республике."
DCS_nf_events.95.a:0 "Мы присоединимся"
DCS_nf_events.95.b:0 "Мы не будем присоединяться"
DCS_nf_events.95.c:0 "Дэйв хочет нас аннексировать? Чёрт возьми, нет!"
DCS_nf_events.96.title:0 "Поселения Делмарвы"
DCS_nf_events.96.desc:0 "Эти жадные ублюдки из Торговой Ассоциации Дувра думали, что смогут раздавить честных трудяг. Мы доказали им обратное. Теперь мы проследим, чтобы оставшиеся торговцы держались прямого пути. Но есть ещё один вопрос — Поселения Столичной Пустоши предложили нам присоединиться к их Республике."
DCS_nf_events.96.a:0 "Мы присоединимся"
DCS_nf_events.96.b:0 "Мы не будем присоединяться"
DCS_nf_events.96.c:0 "Дэйв хочет нас аннексировать? Чёрт возьми, нет!"
DCS_nf_events.97.title:0 "День открытия"
DCS_nf_events.97.desc:0 "Сегодня состоялось открытие курорта Тенпенни-Бич. Это потребовало немало крови, пота и налоговых крышек, но эксклюзивный прибрежный уголок наконец-то принимает первых гостей. Представитель Тенпенни, мистер Бёрк, был спрошен о целесообразности роскошного пляжного курорта, когда большинство семей пустоши живут в лачугах из металлолома. Он отказался от подробных комментариев, заявив лишь, что самые важные члены общества не могут ждать, что будут корчиться в грязи среди своих низших сограждан."
DCS_nf_events.97.a:0 "Гулям вход воспрещен, конечно же"
DCS_nf_events.98.title:0 "Бесплатная недвижимость"
DCS_nf_events.98.desc:0 "Цитадель когда-то была домом Братства Стали, до нашей недавней кровопролитной схватки. Теперь она пустует, как и многие другие здания в Столичной Пустоши. Но в отличие от них, Цитадель поддерживалась и частично восстанавливалась последние 50 лет. С её работающими генераторами, укреплениями и расположением рядом с несколькими маршрутами в центр Вашингтона — это идеальное место для штаба. Конечно, можно просто основать новое поселение. Но мы точно способны придумать нечто большее."
DCS_nf_events.98.a:0 "Нет, не можем. Это новое поселение."
DCS_nf_events.98.b:0 "§C Это будет новая штаб-квартира нашей армии. §!"
DCS_nf_events.98.c:0 "§G Идеальное место для центра торговли, конкурирующего с Ривет-Сити. §!"
DCS_nf_events.98.d:0 "§R Нам следует сдавать помещения в аренду, а не позволять там селиться.§!"
DCS_nf_events.98.e:0 "§O Очевидно, это будет новый Президентский дворец! §!"
DCS_nf_events.99.title:0 "Он боролся за правое дело"
DCS_nf_events.99.desc:0 "Тридогнайт был любимцем многих в Столичной Пустоши. Он всегда говорил как есть и сражался за правое дело. Именно поэтому так горько осознавать, что он счёл нынешнее руководство Поселений Вашингтона угрозой. Он постоянно критиковал действующего председателя, а когда наша война с Братством Стали дошла до порога Новостей Галактики, он взял в руки винтовку. Сейчас на Радиостанции Новости Галактики работает новый диджей, но всё уже не будет как прежде."
DCS_nf_events.99.a:0 "§R Хорошее избавление §!"
DCS_nf_events.99.b:0 "§O Избавление от хорошего §!"
DCS_nf_events.100.title:0 "Храбрейшие в Пустоши"
DCS_nf_events.100.desc:0 "Самые суровые блюстители закона в пустоши, Регуляторы, неустанно борются с несправедливостью. Обычно вооружённые лишь кожаным плащом и револьвером, они вселяют страх в сердца худших представителей пустоши. Теперь их вводят в состав наших ополчений, готовых внушить страх каждому, кто посмеет причинить вред нашим гражданам."
DCS_nf_events.100.a:0 "Поприветствуем, Регуляторов"
DCS_nf_events.101.title:0 "Место за столом"
DCS_nf_events.101.desc:0 "Восточная Республика предложила нам присоединиться. Мы сохраним автономию, но от нас ожидается сотрудничество с другими поселениями и участие в коллективной обороне. В обмен на это — место за столом. Кто займёт это место, решать нам, и уже начались споры в совете, хотя мы ещё даже не приняли предложение."
DCS_nf_events.101.a:0 "Мы согласны, отправьте Сигрейва"
DCS_nf_events.101.b:0 "Мы согласны, отправьте Бэннона"
DCS_nf_events.101.e:0 "Отклонить их предложение"
DCS_nf_events.101.f:0 "Дэйв намерен аннексировать нас! Готовьтесь к обороне!"
DCS_nf_events.102.title:0 "Ривет-Сити отказывается"
DCS_nf_events.102.desc:0 "Ривет-Сити отклонил нашу просьбу о присоединении к Республике Восточного побережья. Это печальный поворот событий, но было бы несправедливо посягать на их автономию."
DCS_nf_events.102.a:0 "Они сделали свой выбор"
DCS_nf_events.102.b:0 "Или будет?"
DCS_nf_events.103.title:0 "Братство Питта повержено!"
DCS_nf_events.103.desc:0 "Жесткая хватка паладина Куртса над Питтом ослабла. Многие храбрые мужчины и женщины из нашего ополчения атаковали заставы Братства в Питте и отбросили падших рыцарей обратно к башне, которую они используют как командный центр. По мере продолжения боёв множество рабов Питта взялись за оружие, встав на сторону освободителей. Осталось лишь прорвать их последние укрепления и положить конец кошмару, который народ Питта терпел слишком долго. Однако есть одна неприятная проблема, которую мы обязаны учитывать. Хотя мы отправили представителей в Цитадель с докладом о действиях их сбившихся с пути братьев, вполне возможно, что они всё ещё поддерживают их. Это может привести к войне."
DCS_nf_events.103.a:0 "Если Братство поддерживает Куртса, мы тоже должны с ними бороться!"
DCS_nf_events.104.title:0 "Удержание обороны Питта"
DCS_nf_events.104.desc:0 "Рыцари под командованием паладина Куртса сдержали наше наступление на Питт. К сожалению, похоже, наши попытки освободить этих людей силой потерпели неудачу. Остаётся лишь надеяться, что Братство вмешается и избавится от этого монстра, которого они выпустили на Питт."
DCS_nf_events.104.a:0 "Будем надеяться, что они поверили нашим посланникам"
DCS_nf_events.105.title:0 "Поселения Столичной Пустоши Атакуют Нас!"
DCS_nf_events.105.desc:0 "Поселения Столичной Пустоши начали атаку на наш форпост в Питте, которую удалось отбить паладину Куртсу и его рыцарям. Примерно в то же время к воротам Цитадели подошли представители этих поселений. Они заявили, что нападение было ответом на сообщения о том, что Куртс вышел из-под контроля и управляет Питтом так же, как когда-то Ашур. С ними были рабы, утверждающие, что сбежали из Питта, и рассказывающие о чудовищной жестокости и злобе. Если их слова правдивы, Куртс действует не в духе нашего ордена, а скорее как главарь рейдеров. Они умоляют нас вмешаться и сделать то, чего они сами не смогли."
DCS_nf_events.105.a:0 "Отправьте Прайда забрать Куртса для суда"
DCS_nf_events.105.b:0 "Мы не можем терпеть нападение на наших братьев!"
DCS_nf_events.106.title:0 "Поселения Столичной Пустоши Атакуют Нас!"
DCS_nf_events.106.desc:0 "Поселения Столичной Пустоши начали атаку на наш форпост в Питте, оставив паладина Куртса и его уцелевших бойцов отчаянно защищать свой командный центр. Примерно в то же время к воротам Цитадели подошли представители Поселений. Они заявили, что нападение стало ответом на сообщения о том, что Куртс вышел из-под контроля и управляет Питтом так же, как когда-то Ашур. С ними были рабы, утверждающие, что сбежали из Питта, и рассказывающие о чудовищной жестокости и злобе. Если их слова правдивы, Куртс действует не в духе нашего ордена, а скорее как главарь рейдеров. Они просят нас не вмешиваться, пока они разбираются с Куртсом и его сообщниками."
DCS_nf_events.106.a:0 "Дайте жителям пустошей вершить их правосудие"
DCS_nf_events.106.b:0 "Отправьте Прайда забрать Куртса для суда"
DCS_nf_events.106.c:0 "Мы не можем терпеть нападение на наших братьев!"
DCS_nf_events.107.title:0 "Падение Паладина Куртса"
DCS_nf_events.107.desc:0 "Братство Стали дало нам слово, что не будет мешать приведению паладина Куртса к правосудию. И это к лучшему, ведь примерно в то же время наши силы прорвали последние укрепления башни и уничтожили падшего паладина вместе с его последними защитниками. Теперь наши бойцы заняли позиции, чтобы выследить оставшихся мятежных рыцарей и не допустить, чтобы Питт снова погрузился в анархию или оказался в руках нового тирана."
DCS_nf_events.107.a:0 "Хорошая работа!"
DCS_nf_events.108.title:0 "Правосудие отложено"
DCS_nf_events.108.desc:0 "Братство Стали вмешалось и забрало паладина Курца из его башни в Питте на винтокрыле. То, чего он не знает — это было не спасение, а арест. Нам дали заверения, что Куртс предстанет перед судом и будет наказан согласно кодексу Братства. Не все довольны таким исходом, но по крайней мере Питт избавлен от тирана, и правосудие будет свершено — пусть и не сразу. Наши силы заняли позиции, чтобы выследить последних мятежных рыцарей и не допустить, чтобы Питт снова погрузился в анархию или оказался в руках нового деспота."
DCS_nf_events.108.a:0 "Не лучший результат, но и не худший"
DCS_nf_events.109.title:0 "Братство вступает в игру!"
DCS_nf_events.109.desc:0 "Несмотря на то, что наши представители направили в Цитадель подробный отчёт о чудовищных действиях паладина Куртса, Братство Стали решило встать на его сторону. Они не только отправили команду, чтобы вызволить этого монстра, но и пообещали ответные меры за гибель членов их ордена! Ополченцы мобилизуются. Мы готовимся к войне."
DCS_nf_events.110.title:0 "Правосудие отложено"
DCS_nf_events.110.desc:0 "Братство Стали отозвало паладина Куртса и его ближайших людей в Цитадель. Судя по тому, как они покидали Питт, они, похоже, считают это разбором последствий атаки, а не арестом. С ослабленными оборонительными рубежами наши силы смогли войти в город и освободить его. Нам дали заверения, что Куртс предстанет перед судом и будет наказан согласно кодексу Братства. Не все довольны таким исходом, но, по крайней мере, Питт избавлен от тирана, и правосудие будет свершено — пусть и не сразу. Наши бойцы заняли позиции, чтобы выследить последних мятежных рыцарей и не допустить, чтобы Питт снова погрузился в анархию или оказался в руках нового деспота."
DCS_nf_events.110.a:0 "Не лучший результат, но и не худший"
DCS_nf_events.111.title:0 "Визит аболиционистов"
DCS_nf_events.111.desc:0 "Недавно мы приняли делегацию от [DCS.GetTag]. Во главе её стоял Ганнибал Хэмлин — лидер армии беглых рабов, известной как Аболиционисты. Многие из нас, родом из Столичной Пустоши, и относятся к нему с благоговением. Делегация выразила желание включить наш город в состав [DCS.GetTag]. По их словам, это государство разделяет с нами стремление к свободе. По крайней мере, взаимная торговля принесла бы пользу обеим сторонам."
DCS_nf_events.111.a:0 "Мы присоединимся к ним"
DCS_nf_events.111.b:0 "Торговли будет достаточно"
DCS_nf_events.112.title:0 "Судьба Республики"
DCS_nf_events.112.desc:0 "После подавления восстания Дэйва мы должны решить, что станет с его Республикой. Небольшое поселение сейчас находится под контролем ополченцев после бегства Дэйва из Столичной Пустоши. Это не может продолжаться вечно, и нам предстоит решить, что делать с его семьёй и владениями. Одна из его жён, Рози, просит разрешить ей взять управление поселением и превратить его в полноценное ранчо. В то же время его сын Боб предлагает выделить ему солдат и превратить комплекс в укреплённый форт для защиты северной границы от бандитов. Конечно, у нашего недавно избранного председателя может быть своё мнение."
DCS_nf_events.112.a:0 "Поддержите предложение Рози"
DCS_nf_events.112.b:0 "Поддержите форт Боба"
DCS_nf_events.112.c:0 "§C Отдайте имушество Регуляторам и посадите союзников Дэйва. §!"
DCS_nf_events.112.d:0 "§G Роу знает нескольких торговцев, которые заплатили бы за это место. §!"
DCS_nf_events.112.e:0 "§R Тенпенни считает, что подходящее место для отправки гулей — эта глухомань. §!"

###Sale Events###
DCS_sale_decision_events.1.title:0 "Продажа роботов"
DCS_sale_decision_events.1.desc:0 "У Изгоев явно не хватает живой силы, так что любую возможность пополнить ряды роботами они хватают без раздумий. Найденные нами гражданские роботы — это, конечно, не шагающие машины смерти, но польза от них всё же есть. В обмен на них Изгои предлагают нам либо несколько ящиков оружия низкого качества, либо несколько ракетных установок."
DCS_sale_decision_events.1.a:0 "Давайте возьмём оружие"
DCS_sale_decision_events.1.b:0 "Возьмите большую пушку"
DCS_sale_decision_events.1.c:0 "Мы передумали"
DCS_sale_decision_events.2.title:0 "Продажа брони"
DCS_sale_decision_events.2.desc:0 "Изгои снаряжают большую часть своих бойцов в довоенные бронекостюмы T-45d, но у них нет возможности производить новые с нуля. Поэтому они постоянно ищут запчасти — или, как сегодня, целые комплекты. В обмен на броню они предлагают либо несколько огнемётов, либо сделку 2 к 1 на восстановленные комплекты боевой брони."
DCS_sale_decision_events.2.a:0 "Давайте играть с огнем"
DCS_sale_decision_events.2.b:0 "Эта штука намного лучше металлической брони."
DCS_sale_decision_events.2.c:0 "Мы передумали"
DCS_sale_decision_events.3.title:0 "Красная дорожка"
DCS_sale_decision_events.3.desc:0 "Изгои едва ли не расстелили красную ковровую дорожку, когда узнали, что мы привезли настоящую силовую броню Анклава. Конечно, они были разочарованы тем, что многие комплекты изрешечены пулями — но чего ещё ждать от брони, снятой с мёртвых солдат Анклава? За эту находку они предлагают нам на выбор: качественное энергетическое оружие или несколько старых моделей Мистеров Помошников."
DCS_sale_decision_events.3.a:0 "Пьюф Пьюф"
DCS_sale_decision_events.3.b:0 "Давайте роботов"
DCS_sale_decision_events.3.c:0 "Мы передумали"
DCS_sale_decision_events.4.title:0 "Продажа брони"
DCS_sale_decision_events.4.desc:0 "Изгои в основном используют старые бронекостюмы T-45d, которые, по словам наших специалистов, уступают тем T-51b, что есть у нас. Естественно, они хотят заполучить лучшую броню, и предлагают за неё весьма выгодную сделку. В обмен — несколько ящиков качественного довоенного оружия или партия мощных взрывчатых веществ."
DCS_sale_decision_events.4.a:0 "Давайте возьмемся за винтовки"
DCS_sale_decision_events.4.b:0 "Сегодня вечером длинная палка сделает бум"
DCS_sale_decision_events.4.c:0 "Мы передумали"
DCS_sale_decision_events.5.title:0 "Продажа запчастей"
DCS_sale_decision_events.5.desc:0 "У Изгоев полно всяких штуковин и механизмов, которым постоянно требуются новые детали, чтобы оставаться в рабочем состоянии. Конечно, это не так захватывающе для них, как плазменная винтовка или силовая броня, но даже за обычный хлам они готовы платить. В обмен на этот лом они предлагают нам либо немного оружия, либо базовые припасы."
DCS_sale_decision_events.5.a:0 "Берите оружие"
DCS_sale_decision_events.5.b:0 "Мы могли бы использовать припасы"
DCS_sale_decision_events.5.c:0 "Мы передумали"
DCS_sale_decision_events.6.title:0 "Продажа хлама"
DCS_sale_decision_events.6.desc:0 "У Изгоев на базе полно довоенных систем, которым постоянно требуются новые детали, чтобы оставаться в рабочем состоянии. Конечно, они могли бы сами найти эти платы и катушки в руинах, но мы избавили их от лишней прогулки. Поскольку это скорее вопрос удобства, плата за лом не слишком щедрая. На выбор — либо снаряжение, снятое с рейдеров, либо несколько старых противотанковых винтовок."
DCS_sale_decision_events.6.a:0 "Давайте возьмём снаряжение"
DCS_sale_decision_events.6.b:0 "Противотанковое звучит хорошо"
DCS_sale_decision_events.6.c:0 "Мы передумали"
DCS_sale_decision_events.7.title:0 "Не такие уж свободные птицы"
DCS_sale_decision_events.7.desc:0 "Винтокрылы, оказавшиеся в нашем распоряжении, представляют особый интерес для Изгоев. В связи с этим они готовы выложить серьёзные ресурсы, чтобы заполучить их. В обмен они предлагают на выбор: либо несколько миниганов, либо несколько ящиков лазерных винтовок."
DCS_sale_decision_events.7.a:0 "Больше стволов — больше мертвых рейдеров"
DCS_sale_decision_events.7.b:0 "Возьмите пьюф-пьюф"
DCS_sale_decision_events.7.c:0 "Мы передумали"
DCS_sale_decision_events.8.title:0 "Странная силовая броня"
