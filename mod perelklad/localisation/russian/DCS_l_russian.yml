l_russian:

###Tooltips###
    DCS_tt_1:0 "Дэйв назначит членов своей семьи советниками и генералами."
    DCS_tt_2:0 "Чтобы обеспечить безопасность наших поселений, мы начнем охоту на супермутантов везде, где они появятся"
    DCS_tt_3:0 "Открывает серию решений в категории баланса сил мутантов, чтобы найти источник супермутантов в Столичной Пустоши"
    DCS_tt_4:0 "Следите за вкладкой «Решения». По мере того, как мы собираем ценные технологии, мы можем обменивать их у Изгоев на менее совершенное оборудование."
    DCS_tt_5:0 "Это разблокирует решение о проведении поисковых работ в определенных районах нашей территории"
    DCS_tt_6:0 "Это разблокирует решение для собирательства, чтобы найти записи семьи Келлер. В этом бункере должно что-то быть!"
    DCS_tt_7:0 "Открывает возможность инвестировать в различные торговые караваны в Столичной Пустоши"
    DCS_tt_8:0 "Дэшвуд будет управлять башней так же, как и раньше"
    DCS_tt_9:0 "Густаво обеспечит, чтобы в башню не проникли зомби, и будет уделять первоочередное внимание безопасности"
    DCS_tt_10:0 "Ченг попытается превратить башню в народную коммуну"
    DCS_tt_11:0 "Рой Филлипс переселит гулей в башню и в конечном итоге избавится от нынешних обитателей."
    DCS_tt_12:0 "Кто знает, к чему могут привести эти исследования?"
    DCS_tt_13:0 "Затея провалилась"
    DCS_tt_14:0 "Мы вышли в ноль"
    DCS_tt_15:0 "Небольшая прибыль"
    DCS_tt_16:0 "Огромный успех!"
    DCS_tt_17:0 "Механист пошлет роботов-союзников, чтобы помочь нам вершить правосудие!"
    DCS_tt_18:0 "Семья создаст армию ночных воинов, чтобы помочь нам"
    DCS_tt_19:0 "Регуляторы присоединятся к нашему ополчению!"
    DCS_tt_20:0 "Новая армия преданных последователей Дэйва возьмет в руки оружие ради нашей цели"
    DCS_tt_21:0 "Самые преданные сторонники Дэйва будут защищать его ценой своей жизни"
    DCS_tt_22:0 "Армия беглых рабов присоединится к нашим рядам!"
    DCS_tt_23:0 "Дэйв возглавляет восстание против выборов!"
    DCS_tt_24:0 "Мы поддерживаем Дэйва в его борьбе с коррумпированным Поселениями Столичной Пустоши!"
    DCS_tt_25:0 "Кто знает, куда она отправится дальше?"
    DCS_tt_26:0 "Как мы позволили ей уйти?"
    DCS_tt_27:0 "Президентская гвардия Дэйва получает новое снаряжение"
    DCS_tt_28:0 "Некоторые бывшие рыцари присоединяются к благородной борьбе за свою родину!"
    DCS_tt_29:0 "Тридогнайт присоединяется к нашим усилиям в борьбе за правое дело!"
    DCS_tt_30:0 "Доступно, потому что Лукас Симмс является председателем"
    DCS_tt_31:0 "Доступно, потому что Дядя Роу является председателем"
    DCS_tt_32:0 "Доступно, потому что Тенпенни является председателем"
    DCS_tt_33:0 "Доступно, потому что Дэйв является президентом"
    DCS_tt_34:0 "§0Твое желание для меня закон, о мудрый мотылек!§!"
    DCS_tt_35:0 "Посмотрите на фокусы"
    DCS_tt_36:0 "Мы можем захотеть сделать что-то раньше, чем они"
    DCS_tt_37:0 "Мы передадим эту территорию Поселениям Столичной Пустоши и получим ценные ресурсы, содержащиеся в этих холмах."
    DCS_tt_38:0 "Регуляторы начинают вербовку в Северных Аппалачах"
    DCS_tt_39:0 "Дополнительные солдаты будут держать непокорных поселенцев в узде"
    DCS_tt_40:0 "В состав Регуляторов вступает новый член"
    DCS_tt_41:0 "Из этого мы получим нового советника"
    DCS_tt_42:0 "Это судно станет гордостью нашей страны!"
    DCS_tt_43:0 "Нужно иметь дубликаты на случай, если первый повредится"
    DCS_tt_44:0 "Добровольцы поспешат на помощь Рыбакам Залива"
    DCS_tt_45:0 "Добровольцы поспешат на помощь Торговцам Дувра"
    DCS_tt_46:0 "Грин-Маунтин не контролирует Северные Аппалачи"
    DCS_tt_47:0 "После того, как Храм Союза будет захвачен, Ганнибал Хэмлин присоединится к нашему делу!"

