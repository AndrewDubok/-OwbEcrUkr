    ###Cosmetic Tags###
    AMM_cosmetic_tag:0 "Община Амишей"
    AMM_cosmetic_tag_ADJ:0 "Община Амишей"
    AMM_cosmetic_tag_DEF:0 "Община Амишей"

    ###Events###
    AMM_nf_events.1.title:0 "Проходят годы, мало что меняется"
    AMM_nf_events.1.desc:0 "Образ жизни нашего народа мало изменился за последние 400 лет. Даже когда мир принял атом и сложные машины, мы полагались на простые инструменты и упорный труд. Жизнь вращалась вокруг семьи, веры и работы на полях. Говорят, до войны над нашим народом насмехались. Его считали отсталым и глупым. Но когда упали бомбы, на наши земли пришли люди из внешнего мира, желающие перенять наш образ жизни. Они осознали всю тщетность современного мира и вскоре стали новыми членами нашего сообщества."
    AMM_nf_events.1.a:0 "Как мы могли отвернуться от них?"
    AMM_nf_events.2.title:0 "Угрозы извне"
    AMM_nf_events.2.desc:0 "С разрушением современных городов многие из них перебрались на наши земли. Некоторые искали спасения, но у других были худшие намерения. Разбойники, стремившиеся силой отобрать нашу землю и урожай, терзали нашу долину. Мы быстро поняли, что уговоры с ними не помогут, и иногда придётся сражаться. Но мы не воины, нам нужна была небольшая помощь."
    AMM_nf_events.2.a:0 "Мы использовали наших псов"
    AMM_nf_events.2.b:0 "Мы построили крепкие стены"
    AMM_nf_events.2.c:0 "Мы разработали новые тактики"
    AMM_nf_events.3.title:0 "Огромные пилигримы"
    AMM_nf_events.3.desc:0 "Около ста лет назад через нашу долину с юго-запада прошли большие зеленые люди. Эти гиганты были вооружены тяжелым оружием и несли на себе шрамы бесчисленных сражений, но они не нападали на нас. Многие из них казались простоватыми и не слишком разговорчивыми. Тот, кто вел их, рассказал нам об их участи. Когда-то они были людьми, как и мы, но довоенные технологии превратили их в оружие войны. Брат Фарни, наш пастор в то время, убедил наш народ, что наш долг – предоставить приют этим несчастным путникам и спасти их души. В нашей общине они снова научатся жить как люди. Хотя они отличались от нас, они нашли своё место в нашей общине. Как и все остальные, они занимались всем понемногу, но лучше всего им подходило..."
    AMM_nf_events.3.a:0 "Строительство амбаров и расчистка дорог."
    AMM_nf_events.3.b:0 "Пашня полей и сбор урожая."
    AMM_nf_events.4.title:0 "Время перемен?"
    AMM_nf_events.4.desc:0 "Видя эти надвигающиеся опасности, многие опасаются, что старых методов может оказаться недостаточно. 200-летние охотничьи ружья и модифицированная сельскохозяйственная техника хороши для защиты от бандитов, но как насчёт волны лазерных роботов? Некоторые полагают, что для того, чтобы пережить этот кризис, нам, возможно, придется обратиться к некоторым технологиям старого мира, которых мы избегали более 400 лет."
    AMM_nf_events.4.a:0 "Наступили темные времена"
    AMM_nf_events.4.b:0 "Мы не можем поступаться своими убеждениями"
    AMM_nf_events.5.title:0 "Смотря в глаза Дьяволу"
    AMM_nf_events.5.desc:0 "Это было нелегко, но нам наконец удалось пробраться в логово зловещей машины Б.М.М.А.У. (B.M.M.A.U.). Сотни проклятых машин стояли между нами и проклятым творением, но Господь видел нас насквозь. Мы выбрались из горы сломанных машин и оказались лицом к лицу с гигантским компьютером, который называл себя спасителем человечества. Несмотря на изнеможение, мы знали, что должны сделать. Мы не могли просто отключить эту штуковину, чтобы кто-то не включил её обратно. Мы принялись за работу и часами крушили машину, пока не убедились, что она больше никогда не заработает."
    AMM_nf_events.5.a:0 "Дело сделано"
    AMM_nf_events.6.title:0 "Прошедший испытание временем"
    AMM_nf_events.6.desc:0 "Так и случилось: с уничтожением B.M.M.A.U. непосредственный кризис, угрожавший нашему народу, был уничтожен. Несмотря на грядущие угрозы, наш народ оставался верен своим убеждениям. Мы не полагались на технологии, которые разрушили мир, и тем самым сохранили дух нашего народа. Последующие годы были очень похожи на предыдущие. Наш народ оставался сосредоточенным на своей семье, вере и делах."
    AMM_nf_events.6.a:0 "А как насчет Херши?"
    AMM_nf_events.7.title:0 "Медленное расслоение"
    AMM_nf_events.7.desc:0 "Так и случилось: с уничтожением B.M.M.A.U. непосредственный кризис, угрожавший нашему народу, был уничтожен. В час нужды наша вера пошатнулась. Мы обратились к технологии, которая разрушила мир, и таким образом открыли ящик Пандоры, который не смогли закрыть. В последующие годы наш народ постепенно шёл на всё больше и больше компромиссов. В конце концов, мы ничем не отличались от любого другого поселения в пустоши."
    AMM_nf_events.7.a:0 "А как насчет Херши?"
    AMM_nf_events.8.title:0 "Судьба Херши"
    AMM_nf_events.8.desc:0 "Когда наши братья из Херши пришли на наши земли, мы, естественно, приняли их. Хотя их образ жизни несколько отличался от нашего, они хорошо интегрировались в наше сообщество. Со временем многие из них поняли, что долина — это их настоящий дом. Некоторые всё ещё мечтали когда-нибудь отвоевать Херши у рейдеров, которые их оттуда изгнали, но им так и не удалось получить достаточной поддержки, чтобы начать атаку."
    AMM_nf_events.8.a:0 "А что насчет Гелассенхейта?"
    AMM_nf_events.9.title:0 "Судьба Херши"
    AMM_nf_events.9.desc:0 "Когда наши братья из Херши пришли на наши земли, мы, естественно, приняли их. Хотя их образ жизни несколько отличался от нашего, они хорошо интегрировались в наше сообщество. В конце концов некоторые из них поняли, что долину можно считать своим настоящим домом. Однако многие видели в могучих зелёных стражах нашего сообщества инструмент, который они могли использовать. Через несколько лет им удалось сплотить многих наших братьев-мутантов, а также ополченцев, чтобы начать атаку на Херши. Атака была обречена с самого начала, погибли сотни людей."
    AMM_nf_events.9.a:0 "А что насчет Гелассенхейта?"
    AMM_nf_events.10.title:0 "Судьба Херши"
    AMM_nf_events.10.desc:0 "Поселение Херши стало для наших торговцев вторым домом. Каждый год после сбора урожая мы отправляли им излишки на рынок, а они возвращались с ресурсами, помогавшими нам пережить зиму и собрать следующий урожай. Наше партнёрство с жителями Херши никогда не шло дальше этого, но это вполне устраивало оба народа."
    AMM_nf_events.10.a:0 "А что насчет Гелассенхейта?"
    AMM_nf_events.11.title:0 "Одна большая община"
    AMM_nf_events.11.desc:0 "Наши братья в Гелассенхайте хорошо прижились в нашей общине. Их идеалы были тесно связаны с нашими, и вместе мы поддерживали друг друга и в хорошие, и в плохие времена. Когда в одной из наших общин не было урожая, остальные делились своими излишками. Когда всё было хорошо, мы регулярно собирались вместе на праздники и торжества веры. Со временем многие из нас начали задаваться вопросом, почему наш народ вообще когда-то был разобщён."
    AMM_nf_events.11.a:0 "А как насчет Пилигримов?"
    AMM_nf_events.12.title:0 "Падение Гелассенхайта"
    AMM_nf_events.12.desc:0 "Наши братья в Гелассенхайте не очень хорошо прижились в нашем обществе. В отличие от жителей долины, они не одобряли наше принятие довоенных технологий. По мере того, как наши народы отдалялись друг от друга, конфликты становились обычным явлением. В конечном итоге произошёл раскол, а затем споры о владении приграничными полями привели к кровопролитию. Фермеры Гелассенхайта не могли противостоять супермутантам, вооружённым автоматическим оружием, и поля Гелассенхайта были удобрены кровью его жителей."
    AMM_nf_events.12.a:0 "А как насчет Пилигримов?"
    AMM_nf_events.13.title:0 "Раскол"
    AMM_nf_events.13.desc:0 "Наши братья в Гелассенхайте не очень хорошо прижились в нашем обществе. В отличие от жителей долины, они не одобряли наше принятие довоенных технологий. По мере того, как наши народы отдалялись друг от друга, конфликты становились обычным явлением. Однако эти конфликты всегда были словесными и никогда не выходили за рамки слов. В конце концов, жители Гелассенхайта снова отделились от Долины. Торговля и поддержка продолжались ещё долгие годы, но с пониманием того, что мы никогда не будем единым народом."
    AMM_nf_events.13.a:0 "А как насчет Пилигримов?"
    AMM_nf_events.14.title:0 "Стена между нами"
    AMM_nf_events.14.desc:0 "Наши братья в Гелассенхайте были рядом с нами, когда мы боролись со злыми машинами. Наши люди хорошо ладили и какое-то время сотрудничали. Однако по мере того, как наш образ жизни постепенно становился таким же, как у жителей более обширной пустоши, наши братья в Гелассенхайте держались от нас на расстоянии. Они продолжали торговать с нами, и мы приходили друг другу на помощь в трудные времена, но со временем стало ясно, что они не считают нас братьями. Но нам было всё равно: зачем нам быть такими отсталыми?"
    AMM_nf_events.14.a:0 "А как насчет Пилигримов?"
    AMM_nf_events.15.title:0 "Вместе мы сильны"
    AMM_nf_events.15.desc:0 "Наши братья в Гелассенхайте были с нами в борьбе со злобными машинами. Наши люди хорошо ладили и с годами становились всё более сплочёнными. По мере того, как наши люди жили и работали вместе, наши схожие культуры переплетались. К концу следующего столетия между долиной Аммана и жителями Гелассенхайта не осталось никаких разделителей. Мы были просто народом амишей. Вместе мы делили наши радости и тяготы, работали на полях и исповедовали нашу веру."
    AMM_nf_events.15.a:0 "А как насчет Пилигримов?"
    AMM_nf_events.16.title:0 "Мирная жизнь"
    AMM_nf_events.16.desc:0 "Так же, как наш образ жизни мало изменился за столетия, целые поколения амишей были свидетелями того, как мало изменились на протяжении столетий и наши мутировавшие братья. Они оставались опорой общества и помогали нам не сбиться с пути. Вместе с нами они обрабатывали поля и исповедовали веру. Хотя они пережили многих из нас и переживут ещё многих, мы все знаем, что однажды увидим их в Доме Господнем."
    AMM_nf_events.16.a:0 "Мы будем готовы их приветствовать"
    AMM_nf_events.17.title:0 "Рухнувшие столбы"
    AMM_nf_events.17.desc:0 "Хотя мы и оградили наших братьев-мутантов от войны с B.M.M.A.U. и ужаса, который она принесла, мы не смогли оградить их от перемены в наших сердцах. Какое-то время всё оставалось по-прежнему. Наши братья-мутанты работали с нами на полях и исповедовали веру. Но по мере того, как менялось наше сообщество, многие из них делали то же самое. Некоторые нашли работу наёмниками, а другие ушли в поисках нового дома. Самое печальное – это судьба тех, кто остался. Многие из тех, кто нашёл мир в нашем образе жизни, были убиты горем, увидев, как всё изменилось. Они пытались вернуть наш народ к старым обычаям, но в конечном итоге стали восприниматься как не более чем ещё один пережиток прошлого. Эти столпы сообщества были забыты, а их мольбы проигнорированы."
    AMM_nf_events.17.a:0 "Мы их подвели"
    AMM_nf_events.18.title:0 "Так же как и мы"
    AMM_nf_events.18.desc:0 "Наши братья-мутанты вместе с нами противостояли ужасам Пустоши. По мере того, как наше сообщество менялось с годами, менялись и они. Мутанты были приняты в нашем обществе, но в конечном итоге все они заняли роли, которые часто можно увидеть у представителей их породы. Вместо проповедников и мудрых старейшин они стали охранниками и вышибалами. Со временем вопрос о спасении их душ исчез из публичного обсуждения."
    AMM_nf_events.18.a:0 "Они, как и мы, заблудились"
    AMM_nf_events.19.title:0 "Что-то изменилось"
    AMM_nf_events.19.desc:0 "Наши братья-мутанты сражались вместе с нами против ужасов Пустоши. Хотя наш народ и образ жизни остались практически прежними, роль наших братьев-мутантов изменилась. Они уже не просто работали с нами, но и сражались вместе с нами в трудные времена. Они помогали нам охранять наши дома, но многие, кто служил с ними, видели, как они ведут себя в бою. Что-то изменилось в их глазах, в их ухмылках, в их голосах. Многие, кто сражается вместе с ними, задаются вопросом, было ли правильным призвать их на войну."
    AMM_nf_events.19.a:0 "Сделали ли мы правильный выбор?"
    AMM_nf_events.20.title:0 "Наше оружие"
    AMM_nf_events.20.desc:0 "Наши братья-мутанты защищали нас от ужасов Пустоши. По мере того, как наш народ становился всё более похожим на остальной народ пустошей, мутанты служили нам армией. Могущественные, превосходящие любого человека, вооружённые тяжёлым оружием, выкованным на наших заводах, эти величественные воины следили за тем, чтобы с любым, кто осмелится с нами потягаться, быстро расправлялись. С течением поколений эти воины использовались не только для защиты нашего поселения, но и для отстаивания наших интересов. Конфликты случались часто, и в конце концов потери наших братьев-мутантов стали слишком велики. Соседняя держава, видя нашу слабость, воспользовалась своим преимуществом. Война была быстрой, наших братьев-мутантов убивали, а наш народ обращали в рабство. \n\n Единственной милостью, дарованной нашему народу, было то, что к тому времени никто из нас не помнил учения брата Фарни. Они не знали, насколько сильно мы подвели наших братьев."
    AMM_nf_events.20.a:0 "Да помилует их Господь"
    AMM_nf_events.21.title:0 "Наш щит"
    AMM_nf_events.21.desc:0 "Наши братья-мутанты защищали нас от ужасов Пустоши. Пока наш народ продолжал мирный образ жизни, сосредоточенный на вере, семье и полевых работах, наши братья-мутанты отражали внешние угрозы. Долгие годы община испытывала глубокую вину за это. Они превратили тех, кого должны были защищать от ужасов войны, в свою собственную защиту. Однако с течением поколений эта вина угасала. В конце концов, воинов-мутантов стали воспринимать не как братьев, которых мы подвели, а как проводников воли Господа. Шли годы, и вопрос о спасении души мутанта исчез из общественного обсуждения."
    AMM_nf_events.21.a:0 "Они несут на себе бремя наших грехов"

    ###Factions###
    AMM_amish_brotherhood_faction:0 "Братство Амишей"
    
    ###Ideas###
    AMM_mutants_and_mercs_idea:0 "Мутанты и Наёмники"
    AMM_mutants_and_mercs_idea_desc:0 "Наши дома защищают наши братья-супермутанты и наемные солдаты."
    AMM_hershey_markets_idea:0 "Рынок Херши"
    AMM_hershey_markets_idea_desc:0 "У нас вошло в привычку продавать излишки урожая на рынках Херши."
    AMM_hershey_markets_2_idea:0 "Рынок Херши"
    AMM_hershey_markets_2_idea_desc:0 "Наши прилавки прочно заняли свое место на торговой площадке Херши. Амманский продуктовый ларек часто посещают многие торговцы, ищущие высококачественную продукцию с минимальными затратами."
    AMM_want_not_idea:0 "Не тратьте попусту"
    AMM_want_not_idea_desc:0 "Наши люди используют все, что могут, и пытаются починить сломанные вещи, прежде чем выбросить их."
    AMM_survivor_lessons_idea:0 "Уроки от выживших в Буффало"
    AMM_survivor_lessons_idea_desc:0 "Некоторые из тех, кто бежал от армий роботов из Буффало, рассказали нам об их слабостях."
    AMM_survivor_lessons_2_idea:0 "Уроки от выживших в Буффало"
    AMM_survivor_lessons_2_idea_desc:0 "Некоторые из тех, кто бежал от армий роботов из Буффало, рассказали нам об их слабостях."

    ###National Focus###
    AMM_nf_a001:0 "Наш жизненный путь"
    AMM_nf_a001_desc:0 "Обычаи нашего народа не сильно изменились даже со времен, предшествовавших Великой войне."
    AMM_nf_a002:0 "Угрозы для жизни и веры"
    AMM_nf_a002_desc:0 "После войны угрозы нашему народу только возросли."
    AMM_nf_a003:0 "Странные пилигримы"
    AMM_nf_a003_desc:0 "Однажды мы увидели, как к нашим деревням приближаются огромные фигуры."
    AMM_nf_a004:0 "Досадная необходимость"
    AMM_nf_a004_desc:0 "В последнее время все чаще можно увидеть работорговцев и враждебных роботов. Хотя насилие — не наш путь, у нас, возможно, нет другого выбора."
    AMM_nf_a005:0 "Положиться на сильных"
    AMM_nf_a005_desc:0 "Наши братья-мутанты по своей природе более приспособлены к войне, чем остальные из нас. Разве неправильно просить их помочь нам в этом?"
    AMM_nf_a006:0 "Мутанты и Наёмники"
    AMM_nf_a006_desc:0 "Супермутантов слишком мало, чтобы защитить нас. Нам придётся нанять помощь извне."
    AMM_nf_a007:0 "Разделить бремя"
    AMM_nf_a007_desc:0 "Так же, как мы разделяем наши труд на полях, мы должны разделять труд по защите наших домов."
    AMM_nf_a008:0 "Потеря невинновности"
    AMM_nf_a008_desc:0 "Наши братья-мутанты знают о войне больше, чем мы. Их руководство спасёт жизни."
    AMM_nf_a009:0 "Щит Пилигримов"
    AMM_nf_a009_desc:0 "Ради спасения их душ мы должны защитить наших братьев-мутантов от военной жизни, которую они когда-то знали."
    AMM_nf_a010:0 "Бремя животных"
    AMM_nf_a010_desc:0 "Лошади и собаки использовались в войнах на протяжении тысячелетий. У нас и того, и другого в избытке."
    AMM_nf_a011:0 "Высокое ограждение"
    AMM_nf_a011_desc:0 "Ограждения и заставы защитят наш скот и людей."
    AMM_nf_a012:0 "Друзья и соседи"
    AMM_nf_a012_desc:0 "Наша Община Амишей не единственная в округе. Мы могли бы обратиться к нашим братьям за помощью."
    AMM_nf_a013:0 "Доступ к рынкам Херши"
    AMM_nf_a013_desc:0 "Рынки Херши — важный пункт для многих торговцев. Продажа там излишков урожая могла бы стать хорошим источником крышек."
    AMM_nf_a014:0 "Хороший урожай"
    AMM_nf_a014_desc:0 "В этом сезоне у нас был большой излишек урожая, а это означает, что на рынке будет гораздо больше предложений."
    AMM_nf_a015:0 "Принять выживших"
    AMM_nf_a015_desc:0 "Недавно наши братья из Херши были изгнаны из своих домов рейдерами. Как мы могли отказать им в помощи в трудную минуту?"
    AMM_nf_a016:0 "Постоянные рынки"
    AMM_nf_a016_desc:0 "Наши братья из Херши предложили нам постоянное место на своих рынках."
    AMM_nf_a017:0 "Помощь соседу"
    AMM_nf_a017_desc:0 "Жители Гелассенхайта готовы помочь нам в трудную минуту, так же как мы помогаем им."
    AMM_nf_a018:0 "Братская гармония"
    AMM_nf_a018_desc:0 "Дружеские отношения с людьми на юге от нас улучшили жизнь обоих наших народов."
    AMM_nf_a019:0 "Объединить наши народы"
    AMM_nf_a019_desc:0 "Объединение наших поселений принесет пользу нам обоим в этом суровом мире."
    AMM_nf_a020:0 "Плечом к плечу"
    AMM_nf_a020_desc:0 "Мы разделим наши тяготы и наши благословения, но мы все еще разные народы и должны оставаться раздельными."
    AMM_nf_a021:0 "Расширить фермы"
    AMM_nf_a021_desc:0 "У нас еще много земли, которую можно обрабатывать. Давайте применим это на практике."
    AMM_nf_a022:0 "Оставаясь в темноте"
    AMM_nf_a022_desc:0 "Никогда ещё не было столь веского аргумента в пользу внедрения технологий, как сейчас, когда мы столкнулись с роботами-убийцами и рейдерами в силовой броне. Сможем ли мы действительно противостоять им с вилами и топорами?"
    AMM_nf_a023:0 "Промышленность в огне"
    AMM_nf_a023_desc:0 "Деревенского кузнеца или ремесленника уже недостаточно. Нам нужны механические мастерские и промышленные кузницы."
    AMM_nf_a024:0 "Вон с полей"
    AMM_nf_a024_desc:0 "У нас достаточно людей для работы в полях, но недостаточно в мастерских. Это необходимо исправить."
    AMM_nf_a025:0 "Суровые инструменты для сурового мира"
    AMM_nf_a025_desc:0 "К сожалению, в этом новом мире огнестрельное оружие необходимо."
    AMM_nf_a026:0 "Страшные поделки"
    AMM_nf_a026_desc:0 "Это может быть ужасно, но мы все равно делаем это хорошо."
    AMM_nf_a027:0 "Не тратьте..."
    AMM_nf_a027_desc:0 "Мы никогда не были расточительными, но с нашей новой промышленностью мы можем сэкономить еще больше материалов."
    AMM_nf_a028:0 "Попусту"
    AMM_nf_a028_desc:0 "Наши усовершенствованные методы переработки отходов экономят нам массу времени и ресурсов. Возможно, в таком образе жизни что-то есть."
    AMM_nf_a029:0 "Адские машины"
    AMM_nf_a029_desc:0 "С севера приближается рой злобных роботов. Мы не знаем, что они собираются нам сделать, но это точно не что-то хорошее!"
    AMM_nf_a030:0 "Уроки выживших"
    AMM_nf_a030_desc:0 "Некоторые, бежавшие через наши земли, рассказывали нам о сражениях с этими монстрами. Мы можем извлечь уроки из их неудач."
    AMM_nf_a031:0 "Перекуем орала на мечи"
    AMM_nf_a031_desc:0 "Каждое лезвие, вилы или топор должны быть направлены в сторону этих машин!"
    AMM_nf_a032:0 "Праведное дело"
    AMM_nf_a032_desc:0 "Эти извращённые роботы стремятся уничтожить не только наш народ, но и наши души! Их нужно остановить любой ценой!"
    AMM_nf_a033:0 "Неприятные союзники"
    AMM_nf_a033_desc:0 "Даже работорговцы к западу от нас пали под натиском этих роботов. Те немногие, кто выжил, продолжают сражаться и будут сражаться вместе с нами, если мы этого пожелаем."
    AMM_nf_a034:0 "Мы завершили этот ужас"
    AMM_nf_a034_desc:0 "Это была тяжёлая битва, в которой погибло много хороших людей. Но кошмар наконец закончился. Мы снова в безопасности."
    AMM_nf_a035:0 "Но какой ценой?"
    AMM_nf_a035_desc:0 "Последние несколько лет изменили наш народ. К лучшему или к худшему — покажет время..."

    ###Tooltips###
    AMM_1_tt:0 "Наши братья-мутанты готовы защищать наши земли!"
    AMM_2_tt:0 "Мы стоим плечом к плечу с нашими братьями-мутантами, чтобы дать отпор силам зла!"
    AMM_3_tt:0 "Мы седлаем коней, чтобы защитить наш образ жизни!"
    AMM_4_tt:0 "Некоторые из этих рейдеров жаждут мести и пока будут сражаться на нашей стороне."
    AMM_5_tt:0 "Разрушители покидают наши земли"
    AMM_6_tt:0 "Это лишит нас многих технологий."
    AAM_7_tt:0 "Как только мы ослабим правила, §Rпути назад не будет§!"

    ###Traits###
    AMM_barn_raiser_trait:0 "Возведение амбара"
    AMM_fieldworker_trait:0 "Полевой работник"
