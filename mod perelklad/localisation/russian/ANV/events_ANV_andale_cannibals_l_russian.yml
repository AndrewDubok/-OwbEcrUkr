l_russian:
ANV_andale_cannibals.1.t:0 "Безумие охватило Вирджинию"
ANV_andale_cannibals.1.d:0 "Нет ничего плохого в том, чтобы принести домой бекон. На самом деле, это обязанность главы дома. Некоторые будут ворчать, откуда берется бекон, или говорить что-то вроде: «О, нет, людей нельзя есть» и пытаться помешать мужчине обеспечивать свою семью. Таким людям в Андейле не было места, кроме как на обеденном столе. Естественно, из-за этого город немного опустел. Так продолжалось почти 200 лет, пока поселения Столичной Пустоши не организовались и не начали вытеснять рейдеров на юг. Некоторые из этих рейдеров в итоге стали беконом. Другие рейдеры понимали, что не их дело судить, и были бы рады осесть в Андейле. Боясь поселенцев с севера, эти рейдеры обратили свой взор на юг. Они видели Андейл не поселением для рейдов. От Рич Мэна до Пойнт-Лукаут они нашли единомышленников. Они нашли других людей, которые понимали, что еда на столе — это его личное дело, и никого больше. \n\n Это натолкнуло Джека Смита на идею. Если поселения на севере смогли объединиться для изгнания рейдеров, значит, они смогут объединиться и для борьбы с ним! Неутолимые американцы Вирджинии согласны, и теперь остаётся только решить, где будет находиться столица нашей новой страны."
ANV_andale_cannibals.1.a:0 "Андейл"
ANV_andale_cannibals.1.b:0 "Пойнт-Лукаут"
ANV_andale_cannibals.1.c:0 "Рич Мэн"
ANV_andale_cannibals.2.t:0 "Что лежит внутри"
ANV_andale_cannibals.2.d:0 "По словам Обадии Блэкхолла, особняк принадлежал его семье на протяжении поколений, начиная с эпохи задолго до Великой Войны, и является «прекрасным образцом викторианской архитектуры». Он намерен сохранить эту традицию. Он не кажется таким уж плохим парнем, конечно, у каждого есть несколько скелетов в шкафу. Внезапно Обадия стал серьёзным и просит Джека об одолжении. «Болотник, который, стоит отметить, сбежал с книгой, драгоценной семейной реликвией. Я хотел спросить тебя, друг: вернёшь ли ты её?»"
ANV_andale_cannibals.2.a:0 "Гражданский дискус; величайшее из наших утраченных искусств. Вы согласны?"
ANV_andale_cannibals.3.t:0 "Блестящий особняк"
ANV_andale_cannibals.3.d:0 "Особняк Кэлверта находится в гораздо лучшем состоянии, чем у Блэкхолла. У парадной двери Джек и его люди встречают Гуля, размахивающего дробовиком перед лицом Джека, и двух рычащих собак, рычащих на группу людей, которых он привёл с собой. Джеку объяснили, что «Андейл — это группа дружелюбных христиан, исследующих свою землю, и они хотели бы помочь ему в его начинаниях». Сначала он усмехнулся и начал что-то говорить, но потом замолчал и добавил: «Мне нужна помощь с Великой Игрой, она продолжается и продолжается. Что-то вроде... как бы это слово понять... микрокосм? Да. Это микрокосм старого мира. И ваша помощь будет оценена и вознаграждена смертью этого ублюдка Кэлверта»."
ANV_andale_cannibals.3.a:0 "Мы берем половину авансом"
ANV_andale_cannibals.3.b:0 "Конечно, нам понадобится снаряжение"
ANV_andale_cannibals.4.t:0 "Встреча умов"
ANV_andale_cannibals.4.d:0 "Профессор Кэлверт в своей речи перед кем-то раскрыл своё местонахождение – под Маяком. После того, как Джек, его люди и Десмонд нашли способ проникнуть в странное довоенное сооружение, Джеку пришлось прорваться сквозь довоенную систему охрану, чтобы добраться до профессора Кэлверта. Они были шокированы, увидев, что он – Мозг, плавающий в Резервуаре. Он предложил нам сделку: жизнь останется в обмен на довоенные технологии здесь. Прежде чем профессор Кэлверт успел договорить, Десмонд выстрелил в стекло, разбив его вдребезги и убив профессора. Десмонд повернулся к Джеку и сказал: «Теперь, когда мы избавились от Кэлверта, я отправлюсь на север, чтобы преследовать своего следующего соперника. Нас осталось совсем немного. Великая игра продолжается. Ваша плата – всё, что здесь внизу». С этими словами Десмонд покинул Маяк. Оглядевшись вокруг, Джек увидел, что там есть на что посмотреть."
ANV_andale_cannibals.4.a:0 "Осмотреть объект"
ANV_andale_cannibals.4.b:0 "Заглянуть в документы Кэлверта"
ANV_andale_cannibals.4.c:0 "Превратить объект в бункер"
ANV_andale_cannibals.5.t:0 "Восставшие из Глубин"
ANV_andale_cannibals.5.d:0 "У побережья Вирджинии морские создания поднимаются из океана. Эти существа обычно враждебны человеку, но к нам они совершенно безразличны. Постепенно они пробираются к нашим ритуальным местам. Несколько мёртвых ракообразных служат доказательством того, что ракообразные ревностно охраняют эти места."
ANV_andale_cannibals.5.a:0 "Даже это НЕЧТО понимает, что-то приближается."
ANV_andale_cannibals.6.t:0 "Полуночный ритуал"
ANV_andale_cannibals.6.d:0 "По всей Вирджинии проводились ритуалы, подобные тем, что Обадия совершал со своими ближайшими последователями у Данвичского обелиска. Тысячи голосов пели в небо под бдительной луной. \n \n Уг-Квалтот знает врата. \n \n Уг-Квалтот – это врата. \n \n Уг-Квалтот – ключ и страж врат! \n \n Затем последовали жертвоприношения и всё более сложные песнопения. Часы кровопролития, резни пленников и непонятные песнопения продолжались до самой ночи. Незадолго до рассвета начались перемены. Те, кто пел, чувствовали, как их кости скручиваются, плоть слезает, а органы болят, когда они преображаются. Свет солнца казался тусклее, освещая Андейл и его жителей."
ANV_andale_cannibals.6.a:0 "§0Договор заключен."
ANV_andale_cannibals.7.t:0 "Проникновение в Данвич"
ANV_andale_cannibals.7.d:0 "Блэкхолл говорит, что Данвич-Билдинг необходим для его планов. Нам повезло, что жители Столичной Пустоши стараются избегать руин, но они всё ещё находятся в глубине их территории. Как же нам попасть в здание?"
ANV_andale_cannibals.7.a:0 "Пробиваемся с боем!"
ANV_andale_cannibals.7.b:0 "Выдать себя за торговцев мясом"
ANV_andale_cannibals.7.c:0 "Подкупить их патрули"
ANV_andale_cannibals.8.t:0 "Атака с Юга!"
ANV_andale_cannibals.8.d:0 "Недавно на нас возле Данвич-Билдинг напали людоеды из Андейла. Мы отступили и заняли оборонительную позицию. С тех пор мы не видели никаких признаков того, что они готовятся к новой атаке."
ANV_andale_cannibals.8.a:0 "Странно"
ANV_andale_cannibals.9.t:0 "Голод руин"
ANV_andale_cannibals.9.d:0 "Из тех, кого мы отправили в Данвич-Билдинг, очень немногие выдержали испытание. Экспедиция передала по радио сообщения о странных звуках, о том, что краем глаза видели фигуры, и о том, как члены команды по ночам впадали в транс и бродили по руинам. После того, как первые несколько человек ушли, они усмирили Блейка во время его лунатизма. Он пришёл в ярость, крича о чём-то под названием Уг-Куолтот. Вскоре после он разорвал веревку, которая его сдерживала, и, прокусив горло Клетусу, рванул вглубь руин. Команда просит прислать больше людей или разрешить уйти."
ANV_andale_cannibals.9.a:0 "Пришлите больше людей"
ANV_andale_cannibals.9.b:0 "Они могут ухо... Я имею ввиду, пришлите больше людей"
ANV_andale_cannibals.10.t:0 "Обелиск"
ANV_andale_cannibals.10.d:0 "Подмога, которую мы послали, смогли проникнуть глубоко в пещеры под Данвич-Билдинг. Там они обнаружили пропавших членов команды, молящихся вокруг тёмного обелиска. Команде потребовалось несколько мгновений, чтобы понять, что это и есть пропавшие, которые превратились в гулей. Своими хриплыми голосами они скандировали то же имя, что и Блейк раньше: \n \n §RУр-Куолтот \n \n Ур-Куолтот \n \n Ур-Куолтот"
ANV_andale_cannibals.10.a:0 "Что, черт возьми, такое Уг-Куолтот?"
ANV_andale_cannibals.11.t:0 "Могущественная реликвия"
ANV_andale_cannibals.11.d:0 "Обадия Блэкхолл рассказывает нам, что его предок, Констанция Блэкхолл, до войны была женщиной, обладавшей огромной властью и влиянием. Она была экспертом в оккультизме, что позволило ей прожить необычайно долгую жизнь. Всего через несколько лет после Великой войны она потеряла один из своих самых могущественных артефактов, Кривбекни, и погибла. Он потратил десятилетия на поиски этой книги и недавно нашёл её с нашей помощью. Изучив её страницы, он уверен, что для его плана нам нужны ещё два артефакта Констанции: её кукла и обсидиановый череп неизвестного происхождения и возраста."
ANV_andale_cannibals.11.a:0 "Возможно мы делаем большую ошибку"
ANV_andale_cannibals.12.t:0 "Кукла найдена"
ANV_andale_cannibals.12.d:0 "Куклу Констанс нашли на болотах Пойнт-Лукаут. Она хранится в каком-то святилище культа болотных жителей. Судя по головам на пиках, они вряд дадут просто забрать её."
ANV_andale_cannibals.12.a:0 "Они же наши друзья. Давайте попробуем поговорить."
ANV_andale_cannibals.12.b:0 "Пошлите нам столько людей, сколько нужно!"
ANV_andale_cannibals.12.c:0 "Приготовить огнеметы"
ANV_andale_cannibals.13.t:0 "Обсидиановый череп найден"
ANV_andale_cannibals.13.d:0 "Обсидиановый череп был найден в Аппалачских холмах к западу от Столичной Пустоши. Он находится в руках затворника, считающего себя коллекционером диковинок. Затворник, похоже, не горит желанием расставаться с ним, но у нас есть варианты."
ANV_andale_cannibals.13.a:0 "Убейте его и заберите череп!"
ANV_andale_cannibals.13.b:0 "Купите, цена не слишком высокая"
ANV_andale_cannibals.13.c:0 "Бывшие контрабандисты предлагают торговлю"
ANV_andale_cannibals.14.t:0 "Глубоко в болотах"
ANV_andale_cannibals.14.d:0 "Болотники Пойнт-Лукаута — затворники, недоброжелательно относящиеся к чужакам. Практически любой, кто селится слишком близко к их болотам, подвергается нападению. Мы никогда не сможем уничтожить их, не понеся слишком больших потерь. На краю их болота живёт один человек, который, похоже, дружелюбен с ними. Мы могли бы попробовать договориться с его помощью."
ANV_andale_cannibals.14.a:0 "Предложить им оружие"
ANV_andale_cannibals.14.b:0 "Предложить им мясные пироги"
ANV_andale_cannibals.14.c:0 "Предложить им какие-нибудь блестящие вещи"
