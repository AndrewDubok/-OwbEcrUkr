l_russian:
ANV_dunwich_horrors:0 "Ужас в Данвиче"
ANV_dunwich_horrors_desc:0 "Это был ужас, непохожий ни на что, что я когда-либо видел. Он сводил их всех с ума. Это выжжено у меня в глазах, каждый раз, когда я их закрываю, я вижу это."
ANV_dunwich_voices:0 "Голоса Данвича"
ANV_dunwich_voices_desc:0 "Голоса, которые они терзали, манили меня выйти. Когда я сказал «нет», голоса зазвучали, словно симфония. Затем был лишь злобный поток слов, кричащих прямо мне в мозг."
ANV_growing_hunger:0 "Растущий голод"
ANV_growing_hunger_desc:0 "Они изголодались по мясу, которым они питаются с обжорством."
ANV_haunted_swamps:0 "Призраки Болот"
ANV_haunted_swamps_desc:0 "Близлежащие болота являются домом для очень странных вещей и жутких легенд."
ANV_our_little_secret:0 "Наш маленький секрет"
ANV_our_little_secret_desc:0 "Знали бы вы, как это приятно слышать. Каждый раз, когда кто-то узнает наш маленький секрет, нам говорят: «О, какие вы ужасные люди, или как вы можете так поступать?». Я имею в виду, что мне нужно заботиться о семье. Не обессуть."
ANV_dark_arts:0 "Тёмное искусство"
ANV_dark_arts_desc:0 "Ночные ритуалы, оккультные церемонии и другие практики даруют нам особые блага."
ANV_haleys_hardware:0 "Механик Хейли"
ANV_haleys_hardware_desc:0 "Он, может, и не с болота, но Хейли — один из болотных"
ANV_pas_fishing_aid:0 "Помощь Па при «рыбалке»"
ANV_pas_fishing_aid_desc:0 "Хорошо подходит для ловли рыбы, в том числе и наземной. Если вы понимаете, о чём я."
ANV_lindas_meat_pies:0 "Мясные пироги Линды"
ANV_lindas_meat_pies_desc:0 "Мясные пироги Линды — одни из лучших на пустоши. Только не спрашивайте, какой в ​​них секретный ингредиент."
ANV_civil_war_hats:0 "Форменные шляпы"
ANV_civil_war_hats_desc:0 "Некоторые люди в районе Пойнт-Лукаут начали носить эти дурацкие серые шляпы, которые они постоянно находят. С тех пор, как мы перешли на униформу, уровень дружественного огня значительно снизился!"
ANV_local_swamp_folk:0 "Местные жители Болот"
ANV_local_swamp_folk_desc:0 "Болотники продолжают создавать проблемы, которые выходят далеко за пределы болот вокруг Пойнт-Лукаут."
ANV_point_lookout_lighthouse:0 "Маяк Пойнт-Лукаута"
ANV_point_lookout_lighthouse_desc:0 "Маяк в Пойнт-Лукауте служит надежным ориентиром для мореплавателей, направляющих их вдоль наших берегов и заманивающих в наш порт."
ANV_ghoul_ecology:0 "Уничтожение Гулей"
ANV_ghoul_ecology_desc:0 "Сражения с дикими животными на сафари Пликс позволяют нашим воинам по-новому оценить их свирепость."
ANV_punga_power:0 "Сила Пунги"
ANV_punga_power_desc:0 "Плоды пунги – это своего рода чудо, и при правильном выращивании мы можем раскрыть их истинный потенциал."
ANV_the_krivbeknih:0 "Кривбекни"
ANV_the_krivbeknih_desc:0 "Мрачная и могущественная книга. Кривбекни обращается к тем, кто её хранит, предлагая откровения, которые могли бы разрушить разум более слабого человека."
ANV_call_to_ug_qualtoth:0 "Зов Уг-Куолтота"
ANV_call_to_ug_qualtoth_desc:0 "Ночью горят костры. Проводятся ритуалы. Мы, ничтожества, взываем к небесам, к существу за пределами звёзд."
ANV_the_shadow_over_point_lookout:0 "Тень над Пойнт-Лукаут"
ANV_the_shadow_over_point_lookout_desc:0 "В Пойнт-Лукауте мало кто спит, а те, кто спит, спят мало. Их терзают сны о большом затонувшем городе и о чём-то шепчущем из глубин."
ANV_the_sickening_comet:0 "Отвратительная комета"
ANV_the_sickening_comet_desc:0 "На небе появилась огромная комета. Предвестник грядущих событий."
ANV_fear_the_moon_idea:0 "Страх луны"
ANV_fear_the_moon_idea_desc:0 "Многие из наших людей жалуются на необъяснимый страх лунного света. Дома заколочены, и мало кто осмеливается выйти на улицу в безоблачную ночь."
ANV_turtle_dove_detention:0 "Содержание в "Тартл Доу""
ANV_turtle_dove_detention_desc:0 "Рассказы о том, что происходит в Тертл-Дав, разнеслись далеко за пределы Пойнт-Лукаут. Мало кто осмелился бы подвергнуть себя нашему гневу и риску быть отправленным туда."
ANV_building_temple_idea:0 "Строительство Храма"
ANV_building_temple_idea_desc:0 "Возводится грандиозный храм, требующий большей части наших рабочих."
ANV_cursed_obsidian_skull:0 "Проклятый Обсидиановый Череп"
ANV_cursed_obsidian_skull_desc:0 "В темноте можно увидеть, как светятся его глазницы."
ANV_constances_doll:0 "Кукла Констанции"
ANV_constances_doll_desc:0 "Чувствуется сила, исходящая от этой странной куклы ручной работы."
ANV_ug_qualtoths_idol:0 "Идол Уг-Куолтота"
ANV_ug_qualtoths_idol_desc:0 "Небольшая скульптура сделана из камня неизвестного происхождения. Некоторые сообщают, что, находясь с ней в одной комнате, они слышат слабый шёпот."
ANV_blackhalls_spell_idea:0 "Заклятие Блэкхолла"
ANV_blackhalls_spell_idea_desc:0 "У Блэкхолла есть удивительная способность притягивать к себе людей."
ANV_blackhalls_circle_idea:0 "Круг Блэкхолла"
ANV_blackhalls_circle_idea_desc:0 "Похоже, влиятельные люди со всех уголков пустоши связаны с семьёй Блэкхолл. Теперь они оказывают поддержку их великому делу."
ANV_the_dunwich_obelisk:0 "Обелиск в Данвиче"
ANV_the_dunwich_obelisk_desc:0 "Обелиск под Данвич-Билдинг — древняя реликвия великой силы. Многие, приближаясь к нему, впадают в безумие, или, может быть, они наконец-то пробуждаются к истинному пониманию вещей?"
ANV_dark_insights_idea:0 "Темные прозрения"
ANV_dark_insights_idea_desc:0 "Что-то шепчет Обадию, рассказывая ему о том, что происходит, и о том, что будет."
ANV_littlehorn_and_associates:0 "«Littlehorn And Associates»"
ANV_littlehorn_and_associates_desc:0 "«Littlehorn and Associates» открыли небольшой офис в Андейле, увидев рост числа благотворителей на севере. Вместе с ними приходят и крышки, и опытные киллеры, готовые к работе."
ANV_evil_karma:0 "Плохая карма"
ANV_evil_karma_desc:0 "Говорят, хорошие парни приходят последними. Чтож, мы финишируем первыми."
ANV_civil_war_cannons:0 "Пушки Гражданской войны"
ANV_civil_war_cannons_desc:0 "Возможно, они и запылились, но 400-летняя пушка все еще выполняет свою работу, когда дело доходит до разрушения стены или предотвращении осады."
ANV_civil_war_cannons2:0 "Пушки Гражданской войны"
ANV_civil_war_cannons2_desc:0 "Возможно, они и запылились, но 400-летняя пушка все еще выполняет свою работу, когда дело доходит до разрушения стены или предотвращении осады."
ANV_old_cannons_idea:0 "Старые пушки"
ANV_old_cannons_idea_desc:0 "Эти пушки, возможно, старые и сложные в обращении, но они все еще помогают нам защищать наши дома."
ANV_frontier_warfare_idea:0 "Пограничная война"
ANV_frontier_warfare_idea_desc:0 "Каждый мужчина — король своего замка и его самый преданный защитник. Он будет сражаться не на жизнь, а на смерть, чтобы не подпускать к себе злобных врагов и зверей."
ANV_andale_death_bots:0 "Роботы-убийцы Андейла"
ANV_andale_death_bots_desc:0 "Значительно модифицированные роботы - домашняя прислуга обеспечивают безопасность наших домов."
ANV_andales_robot_repair:0 "Экспертиза по ремонту роботов"
ANV_andales_robot_repair_desc:0 "Мы научились мастерски продлевать срок службы этих старых ведер с болтами."
ANV_black_powder_cannons_idea:0 "Пороховые пушки"
ANV_black_powder_cannons_idea_desc:0 "Они, может, и чертовски тяжёлые и медленно стреляют, но при этом очень громкие. Иногда этого достаточно, чтобы отпугнуть пару рейдеров."
ANV_romington_arms_co:0 "Оружейная Ромингтона"
ANV_romington_arms_co_desc:0 "Недавно созданная компания «Romington Arms» обеспечивает оснащение наших ополченцев лучшим оружием, которое мы можем произвести."
ANV_night_training:0 "Ночная торговля"
ANV_night_training_desc:0 "Если мы чему-то и можем научиться у хищников пустошей, так это тому, что ночь — лучшее время для охоты."
ANV_littlehorn_offices:0 "Родной офис Литторна"
ANV_littlehorn_offices_desc:0 "В Андейле теперь располагается штаб-квартира «Littlehorn And Associates». Переезд штаб-квартиры принёс им не только богатство, но и новых соседей, более открытых к альтернативным источникам питания."
ANV_very_evil_karma:0 "Очень плохая карма"
ANV_very_evil_karma_desc:0 "Является ли злом ставить еду на стол для своей семьи, только потому, что эта еда — еда другой семьи? Если да, то да, пожалуй, мы — зло. Ну и что?"
ANV_raven_rock_command_center:0 "Командный Центр Рэйвен-Рок"
ANV_raven_rock_command_center_desc:0 "Большая часть Рэйвен-Рока была разрушена в ходе нашей борьбы с Анклавом, но там все еще осталось несколько старых радиоприемников и компьютеров, которые могут помочь нам организовать наше ополчение."
ANV_corrupt_officers:0 "Коррумпированные офицеры"
ANV_corrupt_officers_desc:0 "Несколько офицеров нашего ополчения заключают сделки с контрабандистами из Пойнт-Лукаут. Если мы ничего не предпримем, мы лишимся всех припасов."
ANV_bog_walker:0 "Болотники"
ANV_bog_walker_desc:0 "Есть лишь немногие, способные передвигаться даже по самым тёмным и нетронутым болотам. Эти болотоходы достигли с нами взаимопонимания и помогут нам преодолеть труднопроходимую местность."
ANV_smuggler_officers:0 "Офицеры-контрабандисты"
ANV_smuggler_officers_desc:0 "Контрабандисты из Пойнт-Лукаут понимают, что совершили выгодную сделку. 60 крышек в месяц и столько мясных пирогов, сколько вы сможете съесть, — это выгодная сделка."
ANV_the_smugglers:0 "Контрабандисты Пойнт-Лукаута"
ANV_the_smugglers_desc:0 "Контрабандисты из Пойнт-Лукаут продолжают вступать в стычки с нашими патрулями, а также грабить наши законные места сборов припасов."
ANV_hostile_swampfolk:0 "Враждебные болотные жители"
ANV_hostile_swampfolk_desc:0 "Многие жители болот Пойнт-Лукаут не слишком доброжелательны к чужакам. Мы можем понять такой образ мышления, но теперь мы соседи, и чем-то придется пожертвовать."
ANV_cannibals_of_point_lookout:0 "Каннибалы Пойнт-Лукаута"
ANV_cannibals_of_point_lookout_desc:0 "Болотники Пойнт-Лукаута не сильно отличаются от нас. Они любят свои семьи, защищают свою землю и обожают хороший мясной пирог. В конце концов, они хорошие друзья и соседи."
ANV_no_new_visitors:0 "Без посетителей"
ANV_no_new_visitors_desc:0 "В последние годы Андейл приобрел репутацию места, которого следует избегать. Возможно, дело в местной фауне, может быть, в удалённости от важных торговых центров, а может быть, в том, что мы убиваем и съедаем большинство людей, которых ловим на наших дорогах. На самом деле это можно только гадать."
ANV_microwave_emitter:0 "Микроволновый излучатель"
ANV_microwave_emitter_desc:0 "Излучатель? Я её почти не знаю! Шутки в сторону, эта штуковина очень удобна для того, чтобы заставить людей принять нашу точку зрения."
ANV_fear_the_moon_idea:0 "Боязнь луны"
ANV_fear_the_moon_idea_desc:0 "ОН всегда наблюдает. ОН видит нас. ОН знает нас. ОН ждёт нашего зова."
ANV_building_temple_idea:0 "Строительство Храма"
ANV_building_temple_idea_desc:0 "Тысячи рабочих трудятся, строя кирпичик за кирпичиком наш великий и ужасный храм."


###Flags###
ANV_occupied_dunwich_flag:0 "Мы контролируем Данвич-Билдинг"
ANV_obtained_skull_flag:0 "Обсидиановый череп у нас!"
ANV_obtained_doll_flag:0 "Мы вернули Куклу Констанции!"

###Tooltips###
ANV_tt_1:0 "Болотники будут сражаться вместе с нами"
ANV_tt_2:0 "Эти роботы будут обеспечивать безопасность наших районов"
ANV_tt_3:0 "Наше первое настоящее ополчение организовано"
ANV_tt_4:0 "Агенты Литтлхорна защитят и наш город!"
ANV_tt_5:0 "Верующие умрут во имя ЕГО"
