l_russian:
    nnc_different_parties_tt:0 "§YЭффекты от этого фокуса будет зависеть от того, кто будет у власти.§!\n\n"


    NNC_knights_of_yore:0 "Рыцари Йора"
    NNC_knights_of_yore_desc:0 "За несколько веков до конца Великой Войны рыцари бродили по окрестностям, помогая людям и истребляя бандитов. Даже сейчас они остаются источником вдохновения."

    NNC_our_finest_hour:0 "Наш звездный час"
    NNC_our_finest_hour_desc:0 "В 2253 году троги совершили нашествие на наши земли невиданного доселе масштаба. Наши оборонительные линии были сметены, и казалось, что всё потеряно, но сэр Ланкастер сумел предотвратить поражение."

    NNC_eleventh_round_table:0 "Одиннадцатый круглый стол"
    NNC_eleventh_round_table_desc:0 "Уже 22 года лорд Ланкастер правит Новым Нью-Каслом, созывая Круглый стол каждые два года, чтобы каждый рыцарь мог быть услышан, а королевство процветало."

    NNC_stoke_the_forges:0 "Зажигай горны"
    NNC_stoke_the_forges_desc:0 "Эти земли Старого Мира были полны кузниц, литейных цехов и других металлообрабатывающих предприятий. Нам потребуется множество снаряжения, если мы хотим разгромить работорговцев и монстров, угрожающих нам."

    NNC_we_serve_ourselves:0 "Мы обслуживаем себя"
    NNC_we_serve_ourselves_desc:0 "Рыцари, как лучшая элита Нового Нью-Касла, должны получать приоритетное обслуживание. Если народ не желает предоставить нам необходимое оружие и доспехи, мы просто возьмём их силой."

    NNC_we_serve_the_people:0 "Мы служим людям"
    NNC_we_serve_the_people_desc:0 "Высшая честь рыцаря — это его долг перед простым народом, бедняками, что обрабатывают наши земли и живут в наших городах. Мы должны заботиться о них, иначе в чём смысл нашего существования?"

    NNC_armed_and_armoured:0 "Вооружены и Защищены"
    NNC_armed_and_armoured_desc:0 "Наши рыцари носят лучшие доспехи и владеют лучшим оружием. Нам нужно собрать лучшие доспехи в этих землях, чтобы подготовиться к войнам."

    NNC_knights_in_shining_armour:0 "Рыцари в Сияющих Доспехах"
    NNC_knights_in_shining_armour_desc:0 "Наши рыцари — образец для каждого солдата Пустоши. Смелые, честные и облачённые в лучшие доспехи, какие только можно найти в Пустоши. Ограбив несколько старых довоенных полицейских участков и складов, мы сможем убедиться, что они действительно носят лучшую броню, какую только можно найти."

    NNC_summon_the_banners:0 "Призыв знаменосцев"
    NNC_summon_the_banners_desc:0 "Наши рыцари разбросаны по всей стране, выполняя трудную работу — изгоняя бандитов, истребляя монстров и патрулируя дороги. По крайней мере, так должно быть в теории. Но время пришло готовиться к войне, и мы должны срочно собрать всех наших воинов."

    NNC_levy_the_peasantry:0 "Обложение крестьянства"
    NNC_levy_the_peasantry_desc:0 "Крестьяне составляют основную часть нашего населения, но почти не участвуют в армии (кроме изготовления оружия, обеспечения вспомогательного персонала и другой, казалось бы, неважной работы). Хотя это может быть непопулярно среди крестьян, призыв поможет им внести достойный вклад в общее дело."

    NNC_knights_duty:0 "Рыцарский долг"
    NNC_knights_duty_desc:0 "Долг рыцаря — служить народу, а не себе. Нам нужно поднять рыцарей, чтобы подготовиться к войне; нельзя ожидать, что крестьяне возьмут на себя всю тяжесть сражений."
    nnc_knights_duty_oob_tt:0 "Создаст §G2§! подразделения §YТяжелой пехоты§!"

    NNC_prepare_the_council:0 "Подготовить Совет"
    NNC_prepare_the_council_desc:0 "Когда Круглый стол не собирается, Ланкастер поддерживает совет верных рыцарей для консультирования. Теперь, когда война с Разрушителями уже на пороге, совет должен быть приведён в полную готовность."

    NNC_keep_the_teams_together:0 "Сплочение Рыцарей"
    NNC_keep_the_teams_together_desc:0 "Рыцарские отряды — важное часть Нового Нью-Касла, но внутренние распри и политические разногласия могут угрожать целостности государства. Нам необходимо принять меры для сокращения этих конфликтов."
        NNC_unlock_rally_decisions_tt:0 "Это разблокирует §Yрешения§! для повышения популярности партии"

    NNC_boot_of_oppression:0 "Металлический сапог угнетения"
    NNC_boot_of_oppression_desc:0 "Хотя это и не идеально, нам необходимо держать крестьян в повиновении любыми средствами. Ведь мы знаем, что для них лучше, разве не долг рыцаря защищать свой народ?"

    NNC_valour_of_heroes:0 "Доблесть былых героев"
    NNC_valour_of_heroes_desc:0 "Рыцари всегда были самыми доблестными и героическими воинами во всей истории. Нам нужно подать пример остальному Новому Нью-Каслу и всей Пустоши, которому они смогут следовать."

    NNC_inspire_fervour:0 "Вдохновить Пылом"
    NNC_inspire_fervour_desc:0 "Рыцарей Старого Мира вдохновляла их религиозная вера и пыл. Хотя сейчас религия уже не объединяет нас так, как тогда, мы всё ещё можем питать горячую веру в наш образ жизни и праведное дело."

    NNC_regulated_innovation:0 "Регулируемые инновации"
    NNC_regulated_innovation_desc:0 "Практически еретично предполагать, что нам нужна технология более продвинутая, чем та, что служила рыцарям древних времён, но мы можем пойти на некоторые уступки в развитии. Ведь им точно не приходилось сражаться с Когтями Смерти или теми, кто использует самодельные самолеты."

    NNC_recruit_war_hawks:0 "Найм Ястребов Войны"
    NNC_recruit_war_hawks_desc:0 "Наёмники по-прежнему играют важную роль в Пустоши, и хотя наши рыцари более честны и эффективны, было бы глупо не потратить часть наших кап на их услуги. Таким образом, мы не только усилим свои ряды, но и лишим их поддержки наших врагов."
    nnc_war_hawks_oob_tt:0 "Создаст §G2§! подразделения §YПехоты§!"

    NNC_evaluate_crop_rotation:0 "Оценить севооборот"
    NNC_evaluate_crop_rotation_desc:0 "Наш метод севооборота тщательно моделируется по образцу средневековых практик. К сожалению, у нас нет многих тех же культур, что были тогда. Поэтому небольшие инновации в этом направлении вполне оправданы и логичны."

    NNC_training_dummies:0 "Тренировочные «Мишени»"
    NNC_training_dummies_desc:0 "Нашим рыцарям необходимо эффективно тренироваться, и некоторые из Блэкгардов предложили делать это на живых мишенях. Конечно, это будет применяться только к преступникам, но всё же такое ощущение вызывает внутренний дискомфорт, не так ли?"

    NNC_zealots_of_war:0 "Фанатики войны"
    NNC_zealots_of_war_desc:0 "Крестоносцы полны праведности и преданности делу, и при этом предлагают интересные идеи по улучшению доспехов. В основе по-прежнему будет металл, но качество и прочность станут значительно лучше, чем то, что мы могли ковать до сих пор."

    NNC_ride_to_war:0 "Поездка в Руины"
    NNC_ride_to_war_desc:0 "Разрушители давно являются занозой в нашем боку. Их практика рабства и торговля с Питом позорят честь рыцарей повсюду, и это пятно на побережье должно быть искоренено."

    NNC_twelfth_roundtable:0 "Двенадцатый круглый стол"
    NNC_twelfth_roundtable_desc:0 "Лорд Ланкастер внезапно созвал двенадцатый Круглый стол, задолго до назначенного срока. Что же это может значить?"
    nnc_unlock_more_tree_tt:0 "Это разблокирует §Yновые фокусы§!"

    NNC_lancasters_retirement:0 "Отставка Ланкастера"
    NNC_lancasters_retirement_desc:0 "Ланкастер объявил причину внезапного созыва двенадцатого Круглого стола — он уходит в отставку и должен выбрать нового правителя на время своего отсутствия."

    NNC_black_knights_rising:0 "Возрождение Черных Рыцарей"
    NNC_black_knights_rising_desc:0 "Блэкгарды не пользуются особой популярностью среди простого народа, но многие лорды и дворяне привлекаются их деньгами и развратом..."

    NNC_brutal_reprisals:0 "Жестокие репрессии"
    NNC_brutal_reprisals_desc:0 "Блэкгарды лишь поверхностно пытаются скрыть свои связи с бандитами и рейдерами на нашей территории. Эти бандиты полезны для расправы с теми, кто может пойти против наших планов..."

    NNC_requisitions:0 "Реквизиции"
    NNC_requisitions_desc:0 "Кто-то может назвать это откровенным воровством, но нам нужны оружие, и Блэкгарды более чем готовы указать, где его можно добыть."

    NNC_maintain_stability:0 "Поддержание стабильности"
    NNC_maintain_stability_desc:0 "Даже в такое время поддержание стабильности Нового Нью-Касла — первостепенная задача. Если мы развалимся, новый правитель окажется правителем ничего."

    NNC_ensure_peoples_safety:0 "Обеспечить безопасность людей"
    NNC_ensure_peoples_safety_desc:0 "Временный кризис преемственности в Новом Нью-Касле не парализовал трогов и рейдеров. Несмотря на наши политические проблемы, нам необходимо продолжать укреплять оборону."

    NNC_peace_and_prosperity:0 "Мир и процветание"
    NNC_peace_and_prosperity_desc:0 "Мирная передача власти будет гораздо легче гарантирована, если народ доволен и счастлив."

    NNC_age_of_heroes:0 "Эпоха героев"
    NNC_age_of_heroes_desc:0 "Мы должны доказать народу, что наш мандат справедлив, а правители — благосклонны. Герои Рыцарства уже пользуются большой популярностью среди простого народа, и мы обязаны сохранить этот статус."

    NNC_chivalric_code:0 "Рыцарский кодекс"
    NNC_chivalric_code_desc:0 "Идея рыцарского кодекса давно обсуждалась, но так и не была внедрена. Сейчас Рыцари настаивают на введении обязательного кодекса, гарантирующего стандарты поведения для рыцарей. Впрочем, Блэкгарды, скорее всего, всё равно его игнорируют."

    NNC_will_of_the_people:0 "Воля народа"
    NNC_will_of_the_people_desc:0 "Воля народа — мощная сила, которой мы можем воспользоваться, и Рыцарство точно знает, как поддерживать и укреплять эту силу."

    NNC_fortify_the_border:0 "Укрепление Границ"
    NNC_fortify_the_border_desc:0 "Даже в такое время мы не можем позволить себе ослабить бдительность. Новая линия оборонительных фортов, стен и застав обеспечит безопасность Нового Нью-Касла."

    NNC_deploy_knights_errant:0 "Развертывание Странствующих Рыцарей"
    NNC_deploy_knights_errant_desc:0 "Рыцари странники — это рыцари, отправляемые в глубинку, чтобы приносить добро туда, где оно нужно. Посылая рыцарей странников в сельские районы, мы не только сделаем земли безопаснее, но и укрепим наше присутствие по всему Новому Нью-Каслу."
        nnc_unlock_horn_tt:0 "\n\n§Y$NNC_horn_name$§! станет командиром подразделения.\n§LLevel§!: §Y3§!\n§RAttack Skill§!: §Y2§!\n§GDefense Skill§!: §Y3§!\n§PPlanning Skill§!: §Y3§!\n§MLogistics Skill§!: §Y2§!\n§gTraits§!: §tIntelligent§!, §tAgile§!\n\n"

    NNC_maintain_order:0 "Поддержание Порядка"
    NNC_maintain_order_desc:0 "Нужно призвать новую группу крестьян для поддержания порядка в эти трудные времена. Люди боятся и не уверены из-за перемен в правительстве, и без твёрдой руки мы рискуем оказаться в серьёзной опасности."

    NNC_order_and_fervour:0 "Порядок и Пыл"
    NNC_order_and_fervour_desc:0 "Продвигая не только преданность делу, но и верность государству, Крестоносцы надеются объединить народ вокруг единого Нового Нью-Касла."

    NNC_righteous_fury:0 "Праведная ярость"
    NNC_righteous_fury_desc:0 "Крестоносцы всей душой верят, что мы должны быть готовы нанести удар по внешним врагам в любой момент."

    NNC_the_wasteland_waits_for_us:0 "Пустоши ждут нас"
    NNC_the_wasteland_waits_for_us_desc:0 "Наша судьба — завоевать пустоши для Нового Нью-Касла. Мы должны быть готовы принять на себя эту святую обязанность."

    NNC_paint_it_black:0 "Покрасьте это в Чёрный"
    NNC_paint_it_black_desc:0 "Блэкгарды вышли победителями. Все знали, что это неизбежно, теперь пора приступать к изменениям."

    NNC_oppression_in_vogue:0 "Угнетение снова в моде"
    NNC_oppression_in_vogue_desc:0 "Угнетение возвращается — и в лучших традициях. Эти крестьяне даже не поймут, что на них обрушилось, и у них не будет времени это осмыслить."

    NNC_replace_the_roundtable:0 "Замена Круглого Стола"   
    NNC_replace_the_roundtable_desc:0 "Круглый стол устарел — его нужно упразднить. Так нам будет проще укрепить собственную власть и принимать решения быстро, без обсуждений с теми, кто нам не по душе."

    NNC_stack_the_kings_council:0 "Общество Королевского Совета"
    NNC_stack_the_kings_council_desc:0 "Не секрет, что многие советники и члены совета нас презирают — особенно Рыцарство. Пора навести порядок, будь то весна или какой там сейчас сезон. Я не метеоролог."

    NNC_turn_a_blind_eye:0 "Закройте глаза"
    NNC_turn_a_blind_eye_desc:0 "Не секрет, что мы много лет закрывали глаза на происходящее, но теперь, когда власть в наших руках, мы можем наконец обеспечить комфорт себе и нашим верным сторонникам."

    NNC_turn_to_important_matters:0 "Вернуться к Важным Вопросам"
    NNC_turn_to_important_matters_desc:0 "Дела накопились, и крестьяне начали проявлять непослушание. Нам нужно удержать их на их месте — и при этом не забывать о своём собственном положении."

    NNC_a_matter_of_coin:0 "Вопрос Монеты"
    NNC_a_matter_of_coin_desc:0 "Деньги движут миром, а монеты открывают любые двери. Пора инвестировать в будущее — наше собственное будущее."
        nnc_mercenary_decisions_tt:0 "Это разблокирует решения по найму наёмников"

    NNC_pushing_the_peasantry_harder:0 "Усиление давления на крестьянство"
    NNC_pushing_the_peasantry_harder_desc:0 "Крестьянам это не понравится, а нам понравится."

    NNC_tyranny:0 "Тирания"
    NNC_tyranny_desc:0 "Тирания — признак эффективного правителя. Мы не тратим время на доброту, когда точно знаем, чего хотим и как этого добиться."

    NNC_finest_money_can_buy:0 "Лучшее, что можно купить за деньги"
    NNC_finest_money_can_buy_desc:0 "Расширение совета — более чем заслуженно... Пора посмотреть, кого можно подкупить."

    NNC_remove_the_incorruptible:0 "Убрать Несогласных"
    NNC_remove_the_incorruptible_desc:0 "Хотя деньги многое могут, они не всегда покупают лояльность — этот проклятый гуль Умфред собрал вокруг себя сторонников и оказался невосприимчив к подкупу. Он нам больше не нужен."

    NNC_crack_down_on_chivalrics:0 "Борьба с Рыцарством"
    NNC_crack_down_on_chivalrics_desc:0 "Эти проклятые моралисты уже достаточно навредили Новому Нью-Каслу — пора избавиться от них и навсегда выгнать этих крестьян из двора."

    NNC_placate_crusaders:0 "Умиротворение Крестоносцев"
    NNC_placate_crusaders_desc:0 "Крестоносцы — настоящие идиоты, желающие развязать мстительную войну по всей пустоши, — совсем не лучший способ заработать деньги! Тем не менее расширение наших предприятий привлекательно... а лояльность Крестоносцев — ценна."

    NNC_peace_and_security_for_new_empire:0 "Мир и Безопасность для Нашей Новой Империи"
    NNC_peace_and_security_for_new_empire_desc:0 "Мы принесли новую эру процветания и свободы (для высшего класса) в Новый Нью-Касл. Мы уже не просто Блэкгарды — наше королевство вышло на новый уровень развития и превзошло своё прежнее состояние."

    NNC_make_buffalo_black:0 "Окрасить Баффало Чёрным"
    NNC_make_buffalo_black_desc:0 "Служба Здравоохранения Баффало долгое время угрожала нашей безопасности и демонстрировала вызывающее поведение. Мы ни за что не позволим роботам контролировать город, который может стать для нас очень выгодным источником прибыли."

    NNC_the_injustice_system:0 "Несправедливая Система"
    NNC_the_injustice_system_desc:0 "Судей можно купить, а суды — развратить. Нам нужно убедиться, что все органы правоприменения и толкования закона знают, откуда поступают деньги."

    NNC_bribery_and_extortion:0 "Взяточничество и коррупция"
    NNC_bribery_and_extortion_desc:0 "Большинство людей осуждают взяточничество и коррупцию, но стоит лишь взглянуть, сколько это может принести выгод!"
        nnc_bribery_decisions_tt:0 "Это разблокирует решения по подкупу политических оппонентов и вражеских армий"

    NNC_lap_of_luxury:0 "Круг роскоши"
    NNC_lap_of_luxury_desc:0 "Блэкгарды всегда вели роскошный образ жизни, но теперь, когда нет преград для их желаний, они могут наслаждаться жизнью своей мечты. Ещё один пир, кто за?"

    NNC_system_works_for_people_who_matter:0 "Система работает... для важных людей"
    NNC_system_works_for_people_who_matter_desc:0 "У нас теперь идеальная система — осталось только использовать её по максимуму и наслаждаться результатами."

    NNC_this_is_the_day:0 "Этот День"
    NNC_this_is_the_day_desc:0 "Рыцарство взяло власть в свои руки. Сегодня жизнь крестьян наверняка изменится навсегда."

    NNC_peoples_heroes:0 "Герои для Народа"
    NNC_peoples_heroes_desc:0 "Рыцарство продолжает долгую и благородную традицию настоящих рыцарей: помогают слабым, сражаются со злом и противостоят тирании. Это рассвет новой эпохи."

    NNC_shining_host:0 "Сияющее воинство"
    NNC_shining_host_desc:0 "Воины Рыцарства воплощают идеал рыцаря в сверкающих доспехах. Это армия бойцов, готовых встать на защиту Нового Нью-Касла и победить любого врага."
    nnc_shining_host_oob_tt:0 "Создает §G2§! обученных подразделения §YТяжелой Пехоты§!"

    NNC_united_in_spirit:0 "Единые Духом"
    NNC_united_in_spirit_desc:0 "Хотя крестьяне живут гораздо скромнее знати, Рыцарство позаботятся о том, чтобы каждый житель Нового Нью-Касла был вдохновлён и готов служить общему делу."

    NNC_bring_criminals_to_justice:0 "Привлечь преступников к ответственности"
    NNC_bring_criminals_to_justice_desc:0 "Во двор проникли мелкие преступники и жестокие психопаты. Нам нужно поставить этих нарушителей под контроль — в нашем совете нет места убийцам."

    NNC_spirit_of_a_crusader:0 "Дух Крестоносцев"
    NNC_spirit_of_a_crusader_desc:0 "Хотя Крестоносцы и противостоят нам, они не так ужасны, как Блэкгарды. Они жестоки и равнодушны к борьбе простого народа, но могут стать полезной силой для достижения наших целей."

    NNC_smiling_knights_in_shining_armour:0 "Улыбающиеся рыцари в сияющих доспехах"
    NNC_smiling_knights_in_shining_armour_desc:0 "Не секрет, как рыцари любят видеть себя — смелыми героями в сверкающих доспехах. Это притягательно даже для Блэкгардов. Создавая эти идеальные сверкающие доспехи, мы можем укрепить этот образ не только среди своих, но и среди всего населения."

    NNC_a_motivated_peasantry:0 "Мотивированное крестьянство"
    NNC_a_motivated_peasantry_desc:0 "Всего сто человек с огнём в сердце способны свернуть горы. Наша задача — зажечь сердца наших людей и показать им истинное сострадание."

    NNC_black_mold:0 "Чёрная Плесень"
    NNC_black_mold_desc:0 "Блэкгардов можно сравнить с плесенью или грибком — они распространяют коварные щупальца, неуклонно растут в темноте и сырости. Пора уничтожить Чёрную Плесень."

    NNC_prepare_the_war_machine:0 "Подготовка Военной Машины"
    NNC_prepare_the_war_machine_desc:0 "Чтобы заручиться поддержкой Крестоносцев, придётся заплатить цену. Их пыл к войне требует вложений и решительных действий."

    NNC_the_friend_in_the_high_castle:0 "Друг в Высоком Замке"
    NNC_the_friend_in_the_high_castle_desc:0 "Рыцари и знать больше не будут далекими фигурами, сидящими в замках на холмах, оторванными и возвышающимися над простым народом. Благородные должны ходить по улицам, видеть город с земли и слушать заботы крестьян. Не боги — а друзья."

    NNC_a_house_united:0 "Объединенный Дом"
    NNC_a_house_united_desc:0 "Опираясь на поддержку крестьян, мы сможем обеспечить уважение воли простого человека в Новом Нью-Касле навсегда."

    NNC_shine_light_into_the_darkness:0 "Луч Света во Тьме"
    NNC_shine_light_into_the_darkness_desc:0 "Блэкгарды злее прежнего, но их оплот разрушен, а лидеры разбросаны. Пора поставить их на место раз и навсегда."

    NNC_new_administration:0 "Новое Управление"
    NNC_new_administration_desc:0 "Совет и Круглый стол Нового Нью-Касла — благородные идеи, но они не отражают волю простого народа. Мы должны коренным образом реформировать эти древние институты, чтобы по-настоящему представлять каждого мужчину, женщину и мутанта в нашем городе."

    NNC_a_single_cause:0 "Единая причина"
    NNC_a_single_cause_desc:0 "Хотя у Крестоносцев могут быть иные цели и методы, мы можем объединиться ради одной общей задачи: принести свет Нового Нью-Касла в пустоши и обеспечить процветание всех, кто живёт на нашей земле."

    NNC_chivalric_virtues:0 "Рыцарские добродетели"
    NNC_chivalric_virtues_desc:0 "Правильное кодифицирование нового свода рыцарских добродетелей должно способствовать единству и состраданию среди наших рыцарей."

    NNC_stewards_of_the_people:0 "Попечители народа"
    NNC_stewards_of_the_people_desc:0 "Кем мы будем, если не будем представлять волю народа? Злонамеренные влияния должны быть изгнаны из власти, чтобы крестьяне оставались свободными и счастливыми."

    NNC_political_diversity:0 "Политическое Разнообразие"
    NNC_political_diversity_desc:0 "Если народ действительно свободен, он должен иметь право принимать решения, даже если они противоречат его собственным интересам. Остатки Блэкгардов и Крестоносцев представляют значимые точки зрения среди нашего населения. Даже если мы с ними не согласны, их необходимо терпимо воспринимать."

    NNC_the_kingdom_for_the_people:0 "Царство для людей"
    NNC_the_kingdom_for_the_people_desc:0 "Новый Нью-Касл — это уже не просто феодальное государство, а модернизированная монархия, отражающая истинную волю народа."

    NNC_cure_the_robots_illness:0 "Вылечить Болезнь Б.М.М.А.У"
    NNC_cure_the_robots_illness_desc:0 "Б.М.М.А.У серьёзно больна. Она предлагает медицинскую помощь и безопасность, но никто, кто входит в Баффало, не возвращается — лишь легионы роботов. Необходимо устранить корень этой болезни и остановить Б.М.М.А.У."

    NNC_all_along_the_watchtower:0 "Всё вдоль строжевой башни"
    NNC_all_along_the_watchtower_desc:0 "Будущее Нового Нью-Касла — это война. Бесконечная война и героический крестовый поход против тьмы пустошей."

    NNC_zeal_and_promise:0 "Рвение и Обещание"
    NNC_zeal_and_promise_desc:0 "Теперь, когда мы у власти, нам предстоит внести ряд изменений. Мы должны превратить национальный пыл в религиозный рвение и направить нашу силу против врагов."

    NNC_the_peoples_warriors:0 "Народные Воины"
    NNC_the_peoples_warriors_desc:0 "Рыцари могут заявлять, что представляют народ, но мы — нечто большее. Мы — меч Нового Нью-Касла, и защищаем людей от ужасов, таящихся в бескрайних пустошах."

    NNC_peasants_purpose:0 "Цель для Крестьян"
    NNC_peasants_purpose_desc:0 "Крестьяне Нового Нью-Касла играют ключевую роль в завоевании Восточного побережья, и их служение составляет основу нашего общества."

    NNC_artisans_duty:0 "Долг Ремесленника"
    NNC_artisans_duty_desc:0 "Кузнецы, кожевники, свечники, бондаря, нотариусы и многие другие — все они являются жизненно важными элементами экономики Нового Нью-Касла. Используя нашу волю, мы можем обеспечить, чтобы эти ремесленники производили товары, необходимые для ведения нашей войны."

    NNC_serve_a_higher_purpose:0 "Служить высшей цели"
    NNC_serve_a_higher_purpose_desc:0 "Мы не являемся по своей сути религиозным государством, хотя во многом принимаем атрибуты религии. Вместо бога у нас есть великая цель, вместо церкви — служение общему благу. Народ встанет за нами единым фронтом."

    NNC_only_true_faithful:0 "Только Истинно Верующие"
    NNC_only_true_faithful_desc:0 "Хотя пыл крестьян заслуживает уважения, мы не можем полагаться на них в полном выполнении наших задач. Рыцари и другие высокие слуги Нового Нью-Касла — это свет, который освещает языческие пустоши."

    NNC_inspire_chivalric_fervour:0 "Вдохновлять Рыцарский Пыл"
    NNC_inspire_chivalric_fervour_desc:0 "Даже Рыцари готовы сражаться вместе с нами. Если мы сумеем доказать справедливость нашего дела и безопасность для народа, они охотно примкнут к нам."

    NNC_the_holy_queendom:0 "Святое Королевство"
    NNC_the_holy_queendom_desc:0 "С восшествием Констанции на трон Нового Нью-Касла она заслуживает титула, более соответствующего её положению."
        NNC_constance_queen_name:0 "Королева Констанция"

    NNC_godly_ruler:0 "Божественный Правитель"
    NNC_godly_ruler_desc:0 "Констанция доказала, что она — не просто смертная, взойдя на трон. С небольшим поощрением никто не осмелится противостоять её власти, и она будет почитаться как богиня."

    NNC_compassionate_ruler:0 "Сострадательный Правитель"
    NNC_compassionate_ruler_desc:0 "Быть по-настоящему великим правителем — это не только внушать страх и верность. Констанция должна проявлять истинное сострадание, чтобы управлять Новым Нью-Каслом, и тогда народ будет бороться и умирать за неё."

    NNC_end_the_roundtables:0 "Конец Круглого Стола"
    NNC_end_the_roundtables_desc:0 "Теперь, когда Констанция стала королевой, нет необходимости продолжать проведение Круглых Столов. Они лишь ограничивают власть королевы."

    NNC_hear_them_out:0 "Выслушайте Их"
    NNC_hear_them_out_desc:0 "Хотя Круглый стол и является нежелательным ограничением власти королевы, он всё же может быть полезен. Позволяя инакомыслящим присутствовать за столом, мы можем держать врагов ближе и лучше контролировать их действия."

    NNC_regina_vult:0 "Regina Vult!"
    NNC_regina_vult_desc:0 "Констанция принесла новую эпоху в Новый Нью-Касл, и священное королевство теперь сильнее, чем когда-либо."

    NNC_purge_the_corrupt:0 "Отчищение от Коррупции"
    NNC_purge_the_corrupt_desc:0 "В таком обществе, как наше, коррупция показывают врагам нашу слабость. Только избавившись от её пагубного влияния, мы сможем предстать перед миром сильными и непоколебимыми."

    NNC_tax_excesses:0 "Налоговые Излишества"
    NNC_tax_excesses_desc:0 "Хотя отказ от роскоши может сплотить против нас многих дворян, введение строгого налога станет сдерживающим фактором для неподобающего поведения и пополнит наши казны."

    NNC_wipe_out_bandits:0 "Вычищение от Бандитов"
    NNC_wipe_out_bandits_desc:0 "Не секрет, что Блэкгарды финансируют многие банды по всему Новому Нью-Каслу. Уничтожая как можно больше из них, мы одновременно подорвём их влияние и укрепим нашу власть."

    NNC_create_new_martyrs:0 "Создать новых мучеников"
    NNC_create_new_martyrs_desc:0 "Небольшая манипуляция позволит убедить народ в том, что Блэкгарды погибли, служа Новому Нью-Каслу. Мы сможем использовать это против них и заставить почтить память павших, сотрудничая с нами."

    NNC_unholy_compromise:0 "Нечестивый Компромисс"
    NNC_unholy_compromise_desc:0 "Хотя это и неприятная перспектива, у нас есть возможность сотрудничать с Блэкгардами — пусть и в ограниченном формате. Нам придётся пойти на уступки, но их влияние среди дворянства весьма значимо и может сыграть нам на руку."

    NNC_blackguards_on_the_front_lines:0 "Блэкгарды в Первых Рядах"
    NNC_blackguards_on_the_front_lines_desc:0 "Хотят они того или нет, но с этого момента Блэкгарды будут сражаться вместе с нами. Мы можем стратегически направлять самых буйных на передовую и подавлять остальную часть Блэкгардов страхом и дисциплиной."

    NNC_a_burning_passion:0 "Пылающая Страсть"
    NNC_a_burning_passion_desc:0 "Новый Нью-Касл по-настоящему объединён Крестовыми рыцарями, объединёнными общей целью. Пустоши познают нашу ярость."

    NNC_bring_fire_to_buffalo:0 "Принести Огонь в Баффало"
    NNC_bring_fire_to_buffalo_desc:0 "Баффало — первая цель нашего похода. Робот, скрывающийся там, представляет собой угрозу и оскорбление для общества, наши солдаты очистят город от его влияния."

    NNC_fieldwork:0 "Полевые работы"
    NNC_fieldwork_desc:0 "Хотя мы можем сосредоточиться на рыцарских традициях наших средневековых предков, не стоит забывать, что за их спиной стояла мощная феодальная экономика. Мы не можем пренебрегать крестьянами, которые нас кормят, и ремесленниками, которые нас одевают."

    NNC_country_farmers:0 "Фермеры Страны"
    NNC_country_farmers_desc:0 "Сельское хозяйство — тяжёлый труд в пустошах, но с нашей поддержкой зелёные поля зерновых могут распространиться по всей земле, принося пищу и жизнь в опустошённые края. Перед фермерами стоит важнейшая задача, от которой зависит будущее нашего королевства."

    NNC_economy_path_unique_one:0 "Мандат Правителя"
    NNC_economy_path_unique_one_desc:0 "Не все разделяют одинаковое мнение о крестьянстве, поэтому мы должны обеспечить им то отношение, которого они заслуживают — справедливое, но твёрдое, чтобы сохранить порядок и процветание в королевстве."

    NNC_peasant_populace:0 "Крестьянское население"
    NNC_peasant_populace_desc:0 "Крестьяне составляют значительную часть населения Нового Нью-Касла. Поощряя иммиграцию и рост их числа, мы можем укрепить основу нашего государства и обеспечить его стабильное развитие."

    NNC_backbone_of_nnc:0 "Основа Нового Нью-Касла"
    NNC_backbone_of_nnc_desc:0 "Хотя рыцари могут казаться более блистательными, а ремесленники — более зажиточными, именно крестьянство позволяет Новому Нью-Каслу существовать и процветать таким, каким мы его знаем."

    NNC_town_artisans:0 "Городские Ремесленники"
    NNC_town_artisans_desc:0 "Города и посёлки — дом для сотен ремесленников и мастеров, отвечающих за производство всего: от одежды и доспехов до инструментов, оружия, свечей, повозок и многого другого."

    NNC_economy_path_unique_two:0 "Сосредоточить Усилия Ремесленников"
    NNC_economy_path_unique_two_desc:0 "У Ланкастера было иное видение среднего класса, нежели у нас. Нам необходимо обеспечить реализацию нашего плана, чтобы Новый Нью-Касл мог процветать по нашим правилам."

    NNC_weapons_and_smiths:0 "Оружие и Кузнецы"
    NNC_weapons_and_smiths_desc:0 "Особый интерес для нашего дворянства представляет создание нового оружия и доспехов. Поддерживая благополучие кузнецов и оружейников, мы обеспечим нашу армию всем необходимым и сможем стать великой силой."

    NNC_cities_and_knights:0 "Города и Рыцари"
    NNC_cities_and_knights_desc:0 "Хотят они того или нет, рыцари зависят от городов. Улучшая связи между городами и рыцарями, мы сможем обеспечить наших воинов снаряжением, а ремесленников — работой."

    NNC_forging_a_crucible:0 "Ковка Горнила"
    NNC_forging_a_crucible_desc:0 "Если мы создадим новый центр военного производства, то сможем централизовать и лучше контролировать его, а также повысить эффективность и производительность всей отрасли."

    NNC_guild_monopoly_rights:0 "Монопольные права гильдий"
    NNC_guild_monopoly_rights_desc:0 "Гильдии давно существуют в Новом Нью-Касле, и, предоставив им право монополии на свою отрасль, мы можем переложить на них всю работу по регулированию производства — при условии, что они будут понимать, что работают на нас."

    NNC_castle_elites:0 "Элиты Замка"
    NNC_castle_elites_desc:0 "Самая важная часть Нового Нью-Касла — это дворянство и их слуги, священники и чиновники. Мы должны заботиться об их благополучии, ведь их поддержка будет решающей для нашего успеха."

    NNC_land_clearance:0 "Расчистка Земель"
    NNC_land_clearance_desc:0 "Пустоши усеяны опасными местами — кратерами, заброшенными довоенными зданиями, логовами кротов и прочими угрозами. Рыцари вместе с отрядами искателей и строителей могут объединить силы, чтобы очистить эти территории и открыть новые пространства для строительства."

    NNC_economy_path_unique_three:0 "Поддержка от Дворянства"
    NNC_economy_path_unique_three_desc:0 "Существует множество способов заручиться поддержкой дворянства, и эта поддержка будет жизненно важна в грядущие годы для укрепления нашего королевства."

    NNC_castle_new_new_castle:0 "Замок Нового Нью-Касла"
    NNC_castle_new_new_castle_desc:0 "Несмотря на статус столицы Нового Нью-Касла, наш королевский замок оставляет желать лучшего. Чтобы продемонстрировать нашу мощь и превосходство, нам необходимо возвести крепость, которая выдержит испытание временем и внушит страх нашим врагам."

    NNC_thriving_feudal_economy:0 "Процветающая Феодальная Экономика"
    NNC_thriving_feudal_economy_desc:0 "Многие насмехались над нашими попытками возродить экономическую модель, умершую множество веков назад, но именно наши рыцари обеспечивают безопасность крестьян, которые обрабатывают землю и снабжают ремесленников — тех самых, кто снаряжает рыцарей. Прекрасная симбиотическая система!"
    nnc_combine_economic_ideas_tt:0 "Это объединит идеи из направлений §YФермеры Страны§!, §YГородские Ремесленники§!, и §YЭлита Замка§! в единую, более мощную идею."

    NNC_heat_of_battle:0 "Жар Битвы"
    NNC_heat_of_battle_desc:0 "Нет ничего лучше, чем сражаться за благородное дело. Нам лишь нужно позаботиться о том, чтобы не умирать слишком часто ради этого благородного дела."

    NNC_drilling_the_men:0 "Обучение мужчин"
    NNC_drilling_the_men_desc:0 "Большая часть солдат Нового Нью-Касла — это масса крестьян, формирующая ополчения и отряды. Правильной подготовкой и тренировками мы сделаем из них грозную силу, опасную для врагов, а не только для самих себя."

    NNC_keep_in_formation:0 "Держитесь в строю"
    NNC_keep_in_formation_desc:0 "Формированию сложно обучить крестьян, но эти усилия окупаются с лихвой. Правильно построенная формация непобедима даже перед лицом самых опасных врагов."

    NNC_warriors_and_soldiers:0 "Воины и Солдаты"
    NNC_warriors_and_soldiers_desc:0 "Война на пустошах — это не просто удар мечом до того, как в тебя выстрелят. Наши солдаты это отлично понимают, нам следует прислушаться к их опыту и советам."

    NNC_military_path_unique_one:0 "Сосредоточиться на крестьянской армии"
    NNC_military_path_unique_one_desc:0 "Крестьяне вряд ли самые искусные воины на поле боя, но, богами клянемся, их невероятно много. Логично предположить, что вместе они могут составить мощную силу."

    NNC_the_shieldwall:0 "Стена Щитов"
    NNC_the_shieldwall_desc:0 "Разработав сцепляющиеся щиты и обучив крестьян, мы сможем создавать непроницаемые щитовые стены. Такие формации полностью блокируют территорию и значительно укрепляют нашу оборону."


    nnc_build_outposts_tt:0 "Это постоит один уровень §YФорпоста§! на каждой нашей приграничной территории"







    NNC_a_realm_in_chaos:0 "Королевство в Хаосе"
    NNC_a_realm_in_chaos_desc:0 "Это катастрофа..."

    NNC_spilling_across_borders:0 "Распространяясь за рубежом"
    NNC_spilling_across_borders_desc:0 "Мы никогда не вернёмся назад после этого..."

    NNC_unending_crusade:0 "Нескончаемый Поход"
    NNC_unending_crusade_desc:0 "Это вышло из-под нашего контроля..."

    NNC_kingdom_of_anarchy_focus:0 "Королевство Анархии" 
    NNC_kingdom_of_anarchy_focus_desc:0 "И всё же мы выстояли."