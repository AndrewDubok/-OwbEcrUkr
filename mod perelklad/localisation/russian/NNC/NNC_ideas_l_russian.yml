  nnc_chivalric_code_idea:0 "Рыцарский Кодекс"
  nnc_chivalric_code_idea_desc:0 "Наши рыцари должны быть чем-то большим, чем простая шпана пустошей. Они — рыцари, а не рейдеры."

  NNC_hearts_and_minds:0 "Сердца и Умы"
  NNC_hearts_and_minds_desc:0 "Нельзя завоевать пустошь, если не завоевать их сердца."

  NNC_chivalric_virtues_idea:0 "Рыцарские добродетели"
  NNC_chivalric_virtues_idea_desc:0 "Чтобы быть настоящим рыцарем, нужно чтить рыцарские добродетели."

  NNC_peoples_stewards:0 "Народные управители"
  NNC_peoples_stewards_desc:0 "Хотя мы служим людям, нет сомнений в том, что мы знаем, что для них лучше."

  NNC_freedom_of_association:0 "Свобода объединений"
  NNC_freedom_of_association_desc:0 "Если у людей нет свободы ошибаться, есть ли у них вообще какие-либо свободы?"

  NNC_blessed_militia:0 "Благословенное Ополчение"
  NNC_blessed_militia_desc:0 "Наши воины сражаются с огнём в сердце и душе."

  NNC_faithful_knights:0 "Верные рыцари"
  NNC_faithful_knights_desc:0 "Наши воины сражаются с мастерством и неукротимой местью."

  NNC_constance_queendom:0 "Королевство Констанции"
  NNC_constance_queendom_desc:0 "Нет страны более праведной и чистой, чем Царство Констанции. Это королевство святой ярости, и теперь весь мир узнает, кто мы такие."