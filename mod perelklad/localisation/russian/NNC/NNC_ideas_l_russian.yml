  ####NNC####
  nnc_new_roundtable:0 "Новый круглый стол"
  nnc_new_roundtable_desc:0 "В Новом Нью-Касле великий совет рыцарей собирается для обсуждения вопросов земли. Справедливое учитывание мнений рыцарей порой приводит к спорам, но в целом это способствует миру и порядку."

  nnc_stuck_in_the_past:0 "Застрявшие в прошлом"
  nnc_stuck_in_the_past_desc:0 "Понятно, что группа парней, бегающих и притворяющихся рыцарями древности, не спешит принимать новые идеи или перемены."

  nnc_stuck_in_the_past2:0 "Почитание прошлого"
  nnc_stuck_in_the_past2_desc:0 "Хотя можно чтить и представлять путь прошлого, важно сохранять ясность ума в настоящем. Мы можем уважать наследие рыцарей былых времён, не забывая при этом о сегодняшнем дне."

  nnc_veteran_knights:0 "Рыцари-Ветераны"
  nnc_veteran_knights_desc:0 "Нашествие трогов в 2253 году опустошило рыцарей Нового Нью-Касла, но оставило после себя закалённое и опытное ядро ветеранов. Наследие их опыта передаётся новым рыцарям и по сей день."

  NNC_peasant_levies:0 "Крестьянские повинности"
  NNC_peasant_levies_desc:0 "Крестьяне уже много лет служат в нашей армии в ограниченном составе, но современные реалии требуют большего их вовлечения. К сожалению, они представляют собой разрозненную массу, однако их очень много."

  nnc_training_dummies_idea:0 "Тренировочные «Мишени»"
  nnc_training_dummies_idea_desc:0 "Блэкгарды начали тренировки на живых мишенях. Хотя эти мишени — преступники, бандиты и прочие негодяи, для большинства людей это неприятно, и иногда среди них погибают невинные."

  nnc_building_chaos:0 "Растущий Хаос"
  nnc_building_chaos_desc:0 "Объявление Ланкастера о выходе в отставку привело политический порядок Нового Нью-Касла в хаос. Напряжённость между Блэкгардами, Рыцарями и Крестоносцами всегда существовала, но теперь ситуация становится гораздо, гораздо хуже."

  nnc_knightly_disorder:0 "Рыцарский беспорядок"
  nnc_knightly_disorder_desc:0 "Хаос в королевстве! Новый Нью-Касл охвачен непрекращающейся гражданской войной, и сэр Катберт наблюдает, как расцвет американского рыцарства погружается в смуту и междоусобицу."

  nnc_knightly_disorder2:0 "Рыцарский беспорядок"
  nnc_knightly_disorder2_desc:0 "Хаос в королевстве! Новый Нью-Касл охвачен непрекращающейся гражданской войной, и сэр Катберт наблюдает, как расцвет американского рыцарства погружается в смуту и междоусобицу. Теперь народ живёт в страхе, не зная, кто станет следующей жертвой этой смуты."

