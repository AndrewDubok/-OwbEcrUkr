l_russian:    
    ### EVENTS
    nf_nnc.1.t:0 "Отряд весёлых товарищей"
    nf_nnc.1.d:0 "Много веков назад, задолго до Великой Войны, могучие воины — рыцари — носили тяжёлые доспехи, размахивали мечами и щитами, сражаясь с несправедливостью. Тысячи довоенных книг рассказывают об их подвигах — борьбе с негодяями, монстрами, неверными и даже друг с другом. Эти могучие воины прекратили борьбу за справедливость лишь тогда, когда это стало немодным — по крайней мере, так гласят книги.\n\nПустоши — суровое место, но небольшие группы людей, вдохновлённые этими рассказами о храбрости и чести, начали использовать кузницы и литейные цеха в руинах старой Пенсильвании, чтобы создавать собственные металлические доспехи, и стали собираться в удачно названных руинах Нью-Касла. Более ста лет назад они основали первый рыцарский орден Нового Нью-Касла и с тех пор отчаянно борются за выживание в диких пустошах. Сражаясь с работорговцами, трогами, рейдерами и мутантами, рыцари Нового Нью-Касла восстановили чувство безопасности и относительного здравомыслия в своём уголке пустошей.\n\nЗдесь сформировалось феодальное общество, где рыцари охраняют свои небольшие владения — децентрализованная миротворческая сила, эффективно защищающая свои земли в этих суровых условиях.\n\nРыцари не имели своего места в мире сотни лет, но теперь район Нового Нью-Касла стал своего рода порталом в эпоху крестьян и рыцарей, замков и крепостных стен. Конечно, мир уже не тот, каким был во времена таких героев, как Робин Гуд, король Артур или Чёрный Рыцарь. Одним из самых ярких анахронизмов Нового Нью-Касла является:"
    nf_nnc.1.a:0 "Воины с высокотехнологичным снаряжением"
    nf_nnc.1.b:0 "Использование современных кузниц и литейных цехов"
    nf_nnc.1.c:0 "Технологии коммуникации, охватывающие всю страну"

    nf_nnc.2.t:0 "Наш темнейший час"
    nf_nnc.2.d:0 "Чуть более двадцати лет назад, в 2253 году, троги — существа, долгое время терзающие не только наши земли, но и всю округу — собрали свою крупнейшую орду. Одержимые злым разумом, они прорвались через границу, разрушив укрепления, возведённые для их отражения, и убили сотни рыцарей и тысячи крестьян. Их ярость казалась неукротимой, а натиск — бесконечным, и рыцари Нового Нью-Касла были почти сломлены в этой битве. Однако средневозрастной, опытный, хоть и малоизвестный рыцарь сэр Ланкастер возглавил свой отряд в решающем ударе в глубь территории трогов, нацелившись на их центр управления. В команду входили сам сэр Ланкастер, его товарищи сэр Блэкстоун, сэр Каллоу, сэр Констанс и сэр Джулиан, а также их оруженосцы. Рыцарский отряд самостоятельно прорвал передовую трогов и прошёл вглубь вражеской территории, чтобы определить источник атак.\n\nВ конечном итоге они обнаружили «нексус» проблемы — особенно отвратительного и мутировавшего трога, который, по-видимому, мог общаться с ордой и управлять ею с невероятной злостью. Сэр Ланкастер и его команда сумели уничтожить это чудовище, но не без потерь: сэр Каллоу, сэр Джулиан и все, кроме двух, оруженосцев погибли в бою.\n\nС окончанием угрозы трогов сэр Ланкастер был провозглашён лордом по возвращении и занял трон Нового Нью-Касла, сменив лорда Гальдрина, павшего в войне с трогами. Однако эта победа далась дорогой ценой."
    nf_nnc.2.a:0 "Война унесла жизни слишком большого количества людей, чтобы сосчитать"
    nf_nnc.2.b:0 "Война была разрушительной, но восстановление началось быстро"
    nf_nnc.2.c:0 "Несмотря на все это, Новый Нью-Касл выдержал испытание временем, не ослабев"

    nf_nnc.3.t:0 "Одиннадцатый круглый стол"
    nf_nnc.3.d:0 "После восшествия на лордство Нового Нью-Касла лорд Ланкастер почти сразу же учредил традицию круглых столов. Проводимые раз в два года, круглые столы стали главным форумом, где рыцари могли высказывать свои жалобы и принимать важные политические решения. Со временем рыцари, участвующие в круглых столах, разделились на отдельные фракции.\n\nЛоялисты — просто остаются верны лорду Ланкастеру и трону при любых обстоятельствах. Они надёжны и возглавляются бывшим оруженосцем Ланкастера и единственным выжившим в нашествии трогов сэром Кутбертом.\n\nРыцарство — группа, преданная высшим идеалам рыцарства довоенной эпохи. Они строго следуют кодексу чести и стараются быть лучшими представителями лорда Ланкастера, за что пользуются уважением среди выживших. Их возглавляет сэр Рид — оруженосец покойного сэра Джулиана, погибшего в битве с трогами.\n\nБлэкгарды — рыцари, перешагнувшие грань мародёров. Они жестоки по отношению к поселенцам и чужакам, используя своё положение в первую очередь для собственной выгоды и комфорта. Основаны они сэром Блэкстоуном, но после его смерти возглавляет их сэр Харольд.\n\nКрестоносцы — под предводительством сэра Констанса, эта группа верит в идеологическое превосходство рыцарей Нового Нью-Касла и стремится навязать свои идеалы остальному Пустошу силой.\n\nЭто хрупкое равновесие всегда порождало нестабильность в Новом Нью-Касле, и лорду Ланкастеру не раз приходилось отдавать предпочтение одной из фракций в ходе своего правления."
    nf_nnc.3.a:0 "У рыцарей благородные идеалы"
    nf_nnc.3.b:0 "Блэкгарды уважают силу и авторитет"
    nf_nnc.3.c:0 "Крестоносцы будут исполнять нашу волю"

    nf_nnc.4.t:0 "Двенадцатый круглый стол"
    nf_nnc.4.d:0 "Неожиданное созыв двенадцатого Круглого стола, случившийся так скоро после одиннадцатого, вызвал множество вопросов и смятения по всему Новому Нью-Каслу. На заседании собралось даже больше дворян, чем обычно — все пытаются понять, зачем он был созван и каковы намерения Ланкастера. Три фракции Нью-Нью-Касла заняли свои места в зале, хотя большинство дворян пока не примкнули ни к одной из них. Ланкастер сидит во главе стола, погружённый в мысли.\n\nКогда разговоры стихли и все обратили внимание на него, он громко обратился к собравшимся: — Добрый вечер. Благодарю вас за присутствие на этом необычном двенадцатом Круглом столе. Знаю, у многих из вас есть другие важные дела, и ценю, что вы нашли время. Я пришёл, чтобы объявить о своём уходе в отставку.\n\nВ зале сразу поднялся шум и возгласы, но быстро стихли, когда Ланкастер поднял руки, призывая к тишине. — Я ещё не выбрал преемника. Надеюсь, что в ближайшие месяцы кто-то из вас проявит себя и докажет свою способность занять трон Нового Нью-Касла.\n\nТри фракции тут же начали тихие переговоры между собой. Было ясно: именно кто-то из них и станет следующим лордом — кто ещё сможет претендовать на такую власть?"
    nf_nnc.4.a:0 "Что теперь будет?"

    nf_nnc.5.t:0 "Долгожданная пенсия"
    nf_nnc.5.d:0 "Настал день отставки Ланкастера, и лидеры всех фракций собрались, чтобы услышать его объявление о преемнике. Каждый уверен в своей праве на трон, но править будет только один..."
    nf_nnc.5.a:0 "Блэкгарды показали свою силу"
    nf_nnc.5.b:0 "Рыцари проявили сострадание"
    nf_nnc.5.c:0 "Крестоносцы проявили свое рвение"
    nf_nnc.5.e:0 "Они все неудачники! Все до одного!"
        nnc_failed_to_prepare_successor_tt:0 "Поскольку ни одна фракция не смогла захватить власть, мы должны приготовиться к худшему."

    nf_nnc.6.t:0 "Смерть короля"
    nf_nnc.6.d:0 "Поступила весть: лорд Ланкастер, бывший правитель Нового Нью-Касла, мирно скончался сегодня утром во сне. Народ скорбит о его уходе, и уже поступили предложения воздвигнуть в его честь памятник."
    nf_nnc.6.a:0 "Его наследие будет продолжаться и впредь"

    nf_nnc.7.t:0 "Хаос в Царстве!"
    nf_nnc.7.d:0 "После провала всех фракций в борьбе за преемника Нового Нью-Касла погрузился в хаос мелких междоусобиц! Лорд Кутберт попытался взять власть в свои руки и восстановить порядок, но его влияние слабо, а каждая фракция действует исключительно в своих интересах. На улицах царит беспорядок, и надежды на возвращение к нормальной жизни почти нет. Всё, что остаётся — попытаться как можно лучше контролировать этот хаос."
    nf_nnc.7.a:0 "Как же до этого дошло..."

    nf_nnc.8.t:0 "Победа Блэкгардов"
    nf_nnc.8.d:0 "С созывом тринадцатого Круглого стола лорды и дворяне Нового Нью-Касла вели долгие споры, интриги, шантаж и подкупы, но в итоге лишь одна фракция вышла победителем — Блэкгарды.\n\nС помощью взяток, вымогательства и коррупции они укрепили своё влияние в Круглом столе и обеспечили себе будущее в качестве правителей Нового Нью-Касла. Рыцарство и Крестоносцы уже осудили действия Блэкгардов, а простой народ оплакивает судьбу, что ждёт их под новым режимом. Тем временем Блэкгарды празднуют победу с большим размахом, чем когда-либо прежде.\n\nОни одержали верх и намерены сделать так, чтобы ни один будущий Круглый стол не смог отобрать у них власть."
    nf_nnc.8.a:0 "Тёмные дни... если только вы не один из них."

    nf_nnc.9.t:0 "Крестьяне действительно восстали"
    nf_nnc.9.d:0 "К сожалению для нас, Блэкгарды не пользуются особой популярностью среди простолюдинов. Что-то там про «коррупцию», «жестокость» и прочие крестьянские жалобы — пустой шум, не стоящий внимания. Но беда в том, что этих недовольных слишком много. Разумеется, мы должны продолжать подавлять их восстания и недовольство, но, возможно, стоит быть осторожнее и не доводить ситуацию до крайности. Иначе эта масса может выйти из-под контроля."
    nf_nnc.9.a:0 "Разве человек не может угнетать в мире?"

    nf_nnc.10.t:0 "Рыцари защищают свое видение"
    nf_nnc.10.d:0 "С созывом тринадцатого Круглого стола лорды и дворяне Нового Нью-Касла вели ожесточённые споры, интриги, шантаж и подкупы, но в итоге лишь одна фракция вышла победителем — Рыцарство.\n\nБлагодаря огромной поддержке простого народа и умелому использованию этой поддержки против Круглого стола, Рыцари ворвались к власти на волне народного требования. Блэкгарды начали укреплять свои позиции в ожидании неизбежных репрессий, а Крестоносцы проводят пламенные проповеди, осуждая «пацифистскую» природу Рыцарства. Тем временем простолюдины празднуют победу, танцуя на улицах.\n\nРыцари одержали верх, и будущее простого народа, кажется, обрело надежду на стабильность и защиту."
    nf_nnc.10.a:0 "Троекратное ура Круглому столу!"

    nf_nnc.11.t:0 "Крестоносцы одержали победу"
    nf_nnc.11.d:0 "С созывом тринадцатого Круглого стола лорды и дворяне Нового Нью-Касла вели долгие споры, интриги, шантаж и подкупы, но в итоге лишь одна фракция вышла победителем — Крестоносцы.\n\nОпираясь на волну экспансионистских и воинственных настроений, Крестоносцы убедили Круглый стол принять их агрессивную повестку. Рыцари Чести протестуют, выражая заботу о судьбе народа, а Блэкгарды ворчат о пустых расходах и военной экономии, но воинственно настроенные граждане уже готовятся к походу.\n\nКрестоносцы одержали верх, и по пустоши вскоре разнесутся эхом их боевой клич."
    nf_nnc.11.a:0 "Пустошь почувствует нашу мощь"

    nf_nnc.12.t:0 "Выковывая тигель"
    nf_nnc.12.d:0 "Железный Город давно зарекомендовал себя как важный промышленный центр, но никогда по-настоящему не получал заслуженного внимания. Город независим от дворян — его существование регулируется городским уставом, что крайне редко встречается в Новом Нью-Касле и вызывает раздражение у многих знати.\n\nТем не менее, жители остаются верными подданными Нового Нью-Касла. С дополнительным финансированием Железный Город может превратиться в Кузницу — центр, полностью посвящённый производству оружия и металлургии. Горожане и городской совет наверняка одобрят такое развитие событий и с энтузиазмом воспримут поддержку."
    nf_nnc.12.a:0 "Мы создаем что-то великое"
    NNC_CRUCIBLE:0 "Горнило"

    nf_nnc.13.t:0 "Конец Круглого Стола"
    nf_nnc.13.d:0 "Хотя изначальные цели Круглого стола были понятны и оправданы, сегодня он просто не соответствует нуждам нашего государства. Чтобы укрепить нашу власть и централизовать управление, Круглый стол должен быть упразднён, а сила — позволена диктовать правила управления Новым Нью-Каслом. Только так мы сможем обеспечить порядок, стабильность и процветание в этих тяжёлых условиях."

    nf_nnc.15.t:0 "Солдат и поэт"
    nf_nnc.15.d:0 "Сэр Флорент никогда не был активным участником придворных интриг, но после роковой экспедиции сэра Родрика он изменился — стал жестоким и безжалостным. Полное уничтожение той экспедиции, в которой выжили лишь он и сэр Фабиен, превратило Флорента в тень самого себя.\n\nСейчас же ситуация стала невыносимой. На фоне смены власти и странного нового облика Нового Нью-Касла Флорент ощущает себя потерянным и брошенным. Он объявил о новой экспедиции — попытке вернуть былую славу сэра Родрика и вернуть останки его спутников домой. Почти наверняка эта миссия обречена на провал.\n\nВерный друг, сэр Фабиен, заявил, что пойдёт с Флорентом, и вдвоём они отправились в путь, скорее всего, навсегда исчезнув из виду..."
    nf_nnc.15.a:0 "Пусть они найдут то, что ищут..."

    nf_nnc.16.t:0 "Контролируемое продвижение"
    nf_nnc.16.d:0 "Хотя в Новом Нью-Касле строго ограничивают технологическое развитие, находятся те, кто стремится расширить эти границы. Мир вокруг опасен, и рыцари должны использовать любые преимущества, чтобы одержать победу — при условии, что они сохраняют рыцарскую честь (пусть и в своем, особом понимании).\n\nНесмотря на вызванное этим беспокойство, нам нужно признать: мы не можем вечно оставаться в изоляции. Некоторые технологические достижения необходимо принять и внедрять. Конечно, нельзя сразу делать всё и сразу, это было бы безумием."
    nf_nnc.16.a:0 "Давайте начнем с улучшения мечей"
    
    nf_nnc.17.t:0 "Герои народа"
    nf_nnc.17.d:0 "С момента восхождения Рыцарства простой народ не перестаёт праздновать. Под справедливой и сострадательной рукой Рыцарей перед людьми открывается светлое будущее.\n\nНо когда праздничный шум начинает утихать, пора приступать к делу — к созданию этого прекрасного завтра. Благодаря обожанию крестьян Рыцари уже получили значительную поддержку в своих усилиях по улучшению Нового Нью-Касла. Народ рвётся помочь, и эта энергия нам очень нужна. Вместе мы сможем построить новый мир."
    nf_nnc.17.a:0 "Пусть они запишутся на военную службу"
    nf_nnc.17.b:0 "Давайте заставим экономику двигаться"

    nf_nnc.19.t:0 "Ликование"
    nf_nnc.19.d:0 "Крестоносцы взошли на престол, и по всему Новому Нью-Каслу солдаты готовятся к новым завоеваниям и войнам. Верные Констанцию последователи уже развёртывают вербовочные пункты и разрабатывают боевые планы, а простой народ жаждет крови.\n\nНо прежде всего нам нужно установить порядок и подготовиться к великим походам. Нет ничего лучше войны, чтобы сплотить людей — и в то же время разорвать их на части.\n\nОставайтесь спокойными..."
    nf_nnc.19.a:0 "Патриоты контролируют ситуацию"


    nf_nnc.50.t:0 "Крестьянское восстание!"
    nf_nnc.50.d:0 "Крестьяне больше не могут терпеть! Чрезмерные злоупотребления Блэкгардов вызвали волнения по всему Новому Нью-Каслу, и даже рыцари не смогли удержать ситуацию под контролем. Вскоре разъярённые толпы штурмовали замки и залы разложившейся знати, и началась крестьянская республика.\n\nТеперь в Новом Нью-Касле нет правителей — есть только народ. Это рассвет новой эры."
    nf_nnc.50.a:0 "Нет богов, нет хозяев"

    nf_nnc.51.t:0 "Праздники по всей стране"
    nf_nnc.51.d:0 "С созданием нового крестьянского правительства по всей округе вспыхнули стихийные празднования. Дворяне и рыцари бегут в соседние земли, а крестьяне собирают тех, кто не успел бежать, и выносят им приговоры на судах.\n\nХлеб и эль льются рекой, и впервые у крестьян Нового Нью-Касла появилось настоящее будущее, которого стоит ждать."
    nf_nnc.51.a:0 "Свобода не была бесплатной, но она стоила того"