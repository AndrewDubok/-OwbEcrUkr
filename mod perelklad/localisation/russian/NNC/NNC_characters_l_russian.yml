l_russian:

  NNC_lord_lancaster_name:0 "Лорд Ланкастер"
  NNC_lord_lancaster_desc:0 "Лорд Ланкастер стал правителем Нового Нью-Касла после того, как возглавил отряд рыцарей и сразил могучее вторжение трогов в 2253 году. С тех пор он неустанно охраняет окрестности, сдерживая враждебных соседей, заложив традицию круглых столов и принеся десятилетия мира. Его уважают и почитают многие, однако его мысли всё чаще уносятся в сторону, а здоровье постепенно ухудшается. Рыцари в старомодных доспехах изначально испытывали трудности в Пустоши, но отсутствие сильного лидера лишь усугубит ситуацию."
  
  NNC_cuthbert_name:0 "Сэр Катберт"
  NNC_cuthbert_desc:0 "Катберт сидит в отчаянии на своём бессмысленном троне, наблюдая, как королевство Новый Нью-Касл умирает в агонии. Блэкгарды, Рыцарство, Крестоносцы — все они замешаны в резне вечной гражданской войны.\n\nКатберт задаётся вопросом, как всё дошло до этого — как расцвет американского рыцарства рухнул и обратился против самого себя. Мерзавцы, Рыцари, Крестоносцы — кто-то из них должен был взять власть и предотвратить это, остановить Катберта, который бессильно сидит на троне и наблюдает, как всё разваливается. Ланкастер был бы разочарован, но, по крайней мере, Катберт знает, что это не была его вина."

  NNC_harld_of_white_castle_name:0 "Сэр Гарольд"

  NNC_constance_name:0 "Сэр Констанс"

  NNC_reed_name:0 "Сэр Рид"

  NNC_commune_name:0 "Крестьянская коммуна"
  NNC_commune_desc:0 "§C«Мы — анархо-синдикалистская коммуна. По очереди каждый из нас выполняет роль своего рода исполнительного офицера на неделю, но все решения этого офицера должны быть утверждены на специальном двухнедельном собрании: простым большинством голосов — по вопросам внутреннего характера и двумя третями — по более важным...»§!"

  NNC_horn_name:0 "Сэр Хорн"

  NNC_fingers_name:0 "Фингерс Оутлав"
  NNC_fingers_desc:0 "§g«Как избавиться от этого чувства?»§!\n\nФингерс никогда не называл себя рейдером — он был куда более изысканным. Он был разбойником с большой дороги, устраивавшим налёты не только в Новом Нью-Касле, но и в таких местах, как Ронто. И у него это отлично получалось — он сколотил небольшое состояние. Пока его не поймали.\n\nК счастью для Фингерса, его пленил рыцарь из Блэкгардов, который увидел в его навыках разбойника ценное умение. Хотя Рыцари никогда не были довольны его присутствием, Фингерса отправляли на самые разные задания — грабить, устраивать засады и нападать на соседей, к которым Блэкгарды испытывают неприязнь. Фингерс не уверен, подходит ли ему такая жизнь, но пока он пытается понять, что будет дальше, может заработать немного денег."
  nnc_so_it_goes_trait:0 "Итак..."

  NNC_lazarus_lafargue_name:0 "Гарри Лафарг"
  NNC_lafargue_desc:0 "§C«Принеси мне чертёж, и я выкую меч, способный убивать богов!»§!\n\nЛафарг уже много лет славится по всему Новому Нью-Каслу как лучший кузнец доспехов в этих землях. Его доспехи не имеют себе равных по мастерству и качеству, а его умения — непревзойдённы. К сожалению, он не слишком склонен к инновациям, предпочитая использовать проверенные образцы и доводить их до совершенства. Тем не менее, он бесценен для рыцарей Нового Нью-Касла."
  nnc_grandmaster_armourer:0 "Гроссмейстер-оружейник"

  NNC_woody_name:0 "Вуди «Деревянный Кузнец»"
  NNC_woody_desc:0 "§O«Я — кузнец по дереву. Что даёт одному из нас оправдание одеваться странно.»§!\n\nВуди — плотник, который настаивает, чтобы его называли «деревянным кузнецом». Никто толком не понимает, почему, но его мастерство позволяет ему называть себя как угодно. Практически вся мебель в замке Нового Нью-Касл была спроектирована им и изготовлена в его мастерских, если не лично им самим.\n\nВ последнее время он всё больше склоняется к политическим взглядам Рыцарей. Вуди родился простолюдином и, несмотря на своё мастерство, никогда не мог подняться выше этого статуса. С помощью Рыцарей, возможно, однажды ему это удастся."
  nnc_woodsmith:0 "Деревянный кузнец"

  NNC_arhil_name:0 "Архил, Принц Лебедей"
  NNC_arhil_desc:0 "§C«Я не оставлю судьбу Нового Нью-Касла на волю случая.»§!"\n\nАрхил известен как один из самых благородных рыцарей Нового Нью-Касла — настолько благородных, что сменил своё прежнее имя (Арнольд) на более звучное и фантастическое. Архил — преданный рыцать и последователь сэра Рида, проявляющий в своих поступках великодушие и добродетель. Это может сделать его немного предсказуемым, но он способен вдохновлять такую преданность и товарищество, что это не имеет большого значения."
  nnc_prince_of_swans:0 "Принц лебедей"

  NNC_umfred_name:0 "Умфред"
  NNC_umfred_desc:0 "§g«Я служу Новому Нью-Каслу уже целую эпоху, и он служит мне вполне достойно.»§!\n\nУмфред — гуль, переживший войну, бывший государственный служащий из Питтсбурга, который после ядерного удара бежал к своей семье в Нью-Касл. Его семья выжила, но он превратился в гуля, а они — нет. Пережить не только свою семью, но и многих их потомков сильно сказалось на Умфреде, однако он слишком горд, чтобы позволить себе умереть. Теперь он присматривает за своими единственными живыми потомками — сэр Констанс и его семьёй.\n\nДаже если бы он не был с сэр Констанс родственником, Умфред всё равно верил бы в дело Крестоносцев. Хотя продолжение насилия — не идеал, порядок должен быть восстановлен в пустошах, и Крестоносцы полны решимости сделать именно это."
  nnc_ancient_steward:0 "Древний распорядитель"

  NNC_kalkstein_name:0 "Альберт Калькштейн"
  NNC_kalkstein_desc:0 "§G«Алхимия — мать всех наук, и знаете почему? Потому что она позволяет нам понять мир!»§!\n\nКалькштейн родился сыном рыцаря, но истинную страсть нашёл в дистилляции и попытках трансмутации. Он использовал своё дворянское богатство, чтобы финансировать свои эксперименты и исследования, создавая настойки и «зелья» для рыцарей Нового Нью-Касла. Особенно он восхищается рвением Крестоносцев и стремится распространить свои зелья и опыты по всей пустоши.\n\nОднако некоторые рыцари называют его просто зазнавшимся торговцем наркотиками."
  nnc_alchemist:0 "Мастер-алхимик"

  NNC_rodziner_name:0 "Родзинер"
  NNC_rodziner_desc:0 "§R«Жизнь коварна, и ты всегда стоишь на пути у кого-то.»§!\n\nРодзинер был десятым сыном влиятельного дворянина и потому практически не имел шансов на наследство. Тем не менее, его братья втягивали его в свои интриги и заговоры, чтобы обеспечить власть нужному претенденту. Родзинер ушёл в приключения, пересёк пустоши, сражаясь с монстрами и спасая невинных.\n\nНекоторое время ему это нравилось, но он понял, что богатство, приобретённое в этих походах, для него важнее совершённых подвигов. Он вернулся домой, отказался от прав на наследство и основал собственное небольшое владение. Теперь он служит при дворе и зарекомендовал себя как сравнительно беспристрастный, хоть и корыстный советник Короны."
  nnc_swashbuckling_noble:0 "Безрассудный дворянин"

  NNC_florent_name:0 "Сэр Флорент Смертоносный"
  NNC_florent_desc:0 "§O«Отвечай ударом сильнее.»§!\n\nСэр Флорент, вместе с сэром Фабиеном, был одним из рыцарей, отправившихся с сэром Родриком в злополучную экспедицию на юго-запад. Флорент и Фабиен — единственные, кто вернулся, и они рассказывали о ужасах, скрывающихся в джунглях, и о резне их свиты, устроенной мутантами-крокодилами. Сэр Родрик погиб в той битве.\n\nС тех пор Флорент стал озлобленным и гневным, заслужив своё прозвище. Он изливает ярость, отправляясь на жестокие охоты на бандитов, мутантов и прочих чудовищ, зачастую оставаясь единственным выжившим. С момента возвращения он примкнул к Крестоносцам, стремясь к бесконечной войне против тех, кто причинил ему зло."
  nnc_deadly_adventurer:0 "Смертоносный искатель приключений"

  NNC_fabien_name:0 "Сэр Фабьен Софист"
  NNC_fabien_desc:0 "§C«Здесь ничего не осталось. Флорент и я — последние, кто выжил.»§!\n\nСэр Фабиен, вместе с сэром Флорентом, был одним из рыцарей, отправившихся с сэром Родриком в злополучную экспедицию на юго-запад. Флорент и Фабиен — единственные, кто вернулся, и они рассказывали о ужасах, скрывающихся в джунглях, и о резне их свиты, устроенной мутантами-крокодилами. Сэр Родрик погиб в той битве.\n\nВыжив после экспедиции, Фабиен, известный своей вдумчивостью среди рыцарей, почти полностью ушёл в себя. Он проводит дни среди философов и мыслителей, пытаясь осмыслить увиденное насилие. Фабиен ощущает глубокую близость с сэром Флорентом и надеется, несмотря ни на что, найти способ вернуть его с края пропасти."
  nnc_sorrowful_philosopher:0 "Печальный философ"

  NNC_wally_name:0 "Уолли Фид"
  NNC_wally_desc:0 "§O«Свалить человека за борт! Ай да корабль! Кто тут красивая птичка?»§!\n\nУолли — скромный картограф, который мечтает о чём-то... более захватывающем. Всю жизнь он читал и слушал истории о пиратах, бороздящих моря, и в детстве хотел стать пиратом. К сожалению, он неуклюж и вовсе не внушает страха.\n\nТем не менее, Уолли знает о мореплавании больше всех в Новом Нью-Касле и может дать советы по управлению кораблём. Несмотря на мечты стать разбойником и убийцей, Уолли в глубине души хороший человек и находит вдохновение в целях рыцарей."
  nnc_clumsy_cartographer:0 "Неуклюжий картограф"

  NNC_lydia_name:0 "Лидия"
  NNC_lydia_desc:0 "§C«Я всегда любила часами смотреть на звёзды в летние ночи.»§!\n\nЛидия проделала долгий путь до Нового Нью-Касла, чтобы жить со своей подругой, но по прибытии обнаружила, что та исчезла. Годы она провела в поисках подруги, так и не выяснив, куда та пропала. Однако за это время Лидия завела новых друзей и связи в Новом Нью-Касле. Используя эти знакомства, она вошла в придворные круги и заслужила репутацию человека, способного находить решения самых сложных задач, что сделало её ценным советником в вопросах тактики и стратегии."
  nnc_inquisitive_puzzler:0 "Любознательный головоломщик"

  NNC_verse_name:0 "Верс"
  NNC_verse_desc:0 "§R*Молча сверкает взглядом*§!\n\nВерс родилась простой крестьянкой на небольшой ферме, но ещё в молодости вступила в ополчение и нашла своё призвание. Она с жадностью принимала каждый шанс изувечить и уничтожить врагов, заслужив уважение наравне с известными рыцарями. Ей была присвоена внеочередная рыцарская степень, и она поднялась в рядах Блэкгардов и Крестоносцев, хотя Рыцари ненавидели её за жестокость и свирепость. Сейчас Верс занимает место в совете как одна из важнейших воинов Нового Нью-Касла, несмотря на попытки Рыцарства изгнать её."
  nnc_violence_and_slaughter:0 "Насилие и резня"

  NNC_tyson_name:0 "Эстерад Тайсон"
  NNC_tyson_desc:0 "§Y«Война питается деньгами.»§!\n\nЭстерад родился в семье дворянина на севере наших земель, который был изгнан со своих владений и скончался вскоре после рождения сына. К 21 году жизни Эстерад вернул свои земли и превратил их в одну из самых процветающих частей Нового Нью-Касла.\n\nС тех пор он тщательно сохраняет нейтралитет в придворных делах, предоставляя займы всем нуждающимся и извлекая огромную прибыль из конфликтов между Рыцарством, Крестоносцами и Блэкгардами. Даже если у него есть предпочтения, вся поддержка проходит через множество посредников, так что невозможно определить, что она исходит именно от него."
  nnc_economic_manipulator:0 "Экономический манипулятор"

  NNC_cerys_name:0 "Серис Крэйг"
  NNC_cerys_desc:0 "§O«Идём, я покажу тебе Перепёлку...»§!\n\nСерис — дочь капитана корабля, всю жизнь проведшая в борьбе с разбойниками, проходимцами и рейдерами как на море, так и на суше. Однажды лидер налётчиков сравнил её с перепёлкой, чтобы унизить, но Серис приняла это прозвище и сделала его своим, стоя над его трупом.\n\nУслышав истории о рыцарях в сверкающих доспехах, сражающихся с монстрами, Серис пришла в Новый Нью-Касл и быстро завоевала уважение придворных своими доблестными подвигами. Теперь она живёт при дворе в качестве советницы, передавая свои знания короне."
  nnc_quail:0 "Перепёлка"

  NNC_brego_name:0 "Брего"
  NNC_brego_desc:0 "§C«Даже если мы погибнем, надежда и память будут жить в какой-нибудь скрытой долине, где трава всегда зелена.»§!\n\nБрего был простым солдатом Нового Нью-Касла, ничем особо не отличавшимся, пока всего два года назад во время осады Железного Города трогами он не проявил себя с такой доблестью и спас столько жизней, что его быстро посвятили в рыцари, несмотря на простое происхождение. \n\nС тех пор он получил титул «Хранитель Мёртвых» — мрачную, но почётную обязанность. Брего отвечает за уход и охрану самых почитаемых усопших Нового Нью-Касла и командует стражей, охраняющей их покой."
  nnc_guardian_of_the_dead:0 "Хранитель Мёртвых"

  NNC_grund_name:0 "Грунд"
  NNC_grund_desc:0 "§Y«А?»§!\n\nУдивительно, что Грунд вообще поднялся до хоть какого-то значимого положения. Живя в окрестностях Нового Нью-Касла как деревенский дурачок, он был втянут местным культом и стал их главным исполнителем. Когда рыцари истребили культ, Блэкгарды позаботились, чтобы Грунд остался невредим, увидев в нём потенциально полезный инструмент для своей фракции.\n\nС тех пор Грунд стал важной частью присутствия Блэкгардов. Он далеко не самый умный, зато силён и, пожалуй, один из самых удачливых парней на свете."
  nnc_idiot_enforcer:0 "Исполнительный идиот"

  NNC_hurin_name:0 "Хурин, Охотник на Воров"
  NNC_hurin_desc:0 "§C«Как будто я их чуять могу...»§!\n\nКогда люди думают о охотнике за головами, они редко представляют себе тихого, но дружелюбного человека, склонного скорее к покорности, чем к самостоятельности. Хурин обладает уникальным даром находить преступников, но доволен служить и почти не повышает голос. Он зарекомендовал себя как полезный для Нового Нью-Касла человек и, несомненно, будет стараться изо всех сил ещё много лет."
  nnc_friendly_bountyhunter:0 "Дружелюбный охотник за головами"

  NNC_intar_name:0 "Лорд Интар"
  NNC_intar_desc:0 "§O«Каждому человеку дано право выбрать, когда вложить меч в ножны.»§!\n\nИнтар вырос маркграфом, владевшим небольшим участком земли на границе с землями трогов. Его жизнь была полна постоянных боёв и мелких стычек. Такая непрекращающаяся готовность к войне оставляет свой след, и хотя Интар стал выдающимся воином, он остаётся мрачным и печальным лордом."
  nnc_brooding_lord:0 "Задумчивый Лорд"