l_russian:
  # conscription laws
  # conscription laws Enclave
  EEN_pure_americans_law:0 "Чистокровные американцы"
  EEN_pure_americans_law_desc:0 "Только истинным, генетически чистым американцам доверена привилегия защищать нашу великую демократию."
  EEN_wastelander_americans_law:0 "Служба американцев Пустошей"
  EEN_wastelander_americans_law_desc:0 "Так называемые американцы Пустошей, которые, к несчастью, не были защищены от ядерного удара, по-прежнему могут отдать свои жизни за благородную цель восстановления этой великой страны."
  EEN_wastelander_recruitment_law:0 "Вербовочные центры в Пустоши"
  EEN_wastelander_recruitment_law_desc:0 "Если мы хотим достичь наших целей, нам нужно будет создать армию, подобной которой не было со времен Великой войны. Такая массовая мобилизация потребует снижения стандартов и увеличения расходов, но это необходимо."
  EEN_robot_armies_law:0 "Металлическая стена"
  EEN_robot_armies_law_desc:0 "Зачем тратить драгоценные жизни американцев на борьбу с мутантами? Машины смерти постепенно заменят наших военных."
  # officer laws
  # officer laws Enclave
  EEN_enclave_academy_law:0 "Академия офицеров Отэма"
  EEN_enclave_academy_law_desc:0 "Все потенциальные офицеры должны пройти тщательную подготовку в академии Отэма. После нескольких месяцев изнурительных тренировок, испытаний и учений эти офицеры станут одними из лучших солдат, которых Америка видела за последние 200 лет."
  EEN_purged_command_law:0 "Чистка офицеров"
  EEN_purged_command_law_desc:0 "Десятки офицеров и солдат-ветеранов из командного состава Анклава были признаны причастными к неудавшемуся перевороту Отэма. Пока мы не сможем подготовить новое поколение офицеров, наши немногие верные офицеры будут испытывать острую нехватку кадров."
  EEN_rebuilding_command_law:0 "Школа офицеров Эдема"
  EEN_rebuilding_command_law_desc:0 "Офицеры Анклава проходят обучение в офицерской академии Эдема. Не такая строгая, как старая Академия Отэма, школа офицеров уделяет чуть больше внимания лояльности. Чистка офицеров после переворота Отэма не должна повториться."
  EEN_ai_command_law:0 "ИИ-офицеры"
  EEN_ai_command_law_desc:0 "Генералы завтрашнего дня уже здесь. Мощные компьютеры, опираясь на многовековую военную историю и ежеминутные данные с командных пунктов, управляют нашими солдатами от самых маленьких отрядов до самых грандиозных операций. Война никогда не меняется, но меняется то, как мы её ведём."
  # outsider laws
  # outsider laws Enclave
  EEN_loyal_outsiders_law:0 "Лояльные американцы"
  EEN_loyal_outsiders_law_desc:0 "Некоторые жители пустошей осознают свой долг - защищать нашу страну. Если они готовы отдать жизнь за Америку, почему бы нам не вложить в их руки винтовку?"
  # mutant recruitment laws
  # mutant recruitment laws Enclave
  EEN_no_muties_law:0 "Мутанты запрещены"
  EEN_no_muties_law_desc:0 "От супермутантов до облученных гулей Подземелья - никто, кроме самых чистокровных американцев, не допускается к военной службе."
  EEN_limited_ghouls_law:0 "Отряды гулей"
  EEN_limited_ghouls_law_desc:0 "Для защиты жизни чистых американцев, гулей допускают в армию. Сформированные в особые подразделения, эти гули сражаются в тех местах, куда наши солдаты не могут попасть, не рискуя получить сильнейшее радиационное облучение."
  EEN_super_mutants_law:0 "Солдаты-супермутанты"
  EEN_super_mutants_law_desc:0 "Жителей Пустоши, захваченных в плен Анклавом, отправляют на службу, превращая в супермутантов. К счастью, в результате этого процесса они почти ничего не помнят о своей прошлой жизни, и даже самые тупые мутанты могут понять, что может сделать ошейник с бомбой после демонстрации."
  # press laws
  # press laws Enclave
  EEN_eden_radio_programs_law:0 "Выступления Эдема на радио"
  EEN_eden_radio_programs_law_desc:0 "Радио Анклава - сочетание тщательно подобранной патриотической музыки и периодических обращений президента Джона Генри Эдема. Успокаивающий голос Эдема и обещания лучшего будущего согревают сердца даже самых пессимистично настроенных жителей Анклава. Даже некоторые жители пустошей, которые слушают наши радиопередачи, надеются на светлое будущее."
  EEN_militarist_radio_programs_law:0 "Командное радио Отэма"
  EEN_militarist_radio_programs_law_desc:0 "Радио Анклава - сочетание тщательно подобранной патриотической музыки и редких обращений полковника Отэма. Хотя Отэм не так обаятелен, как президент Эдем, его сообщения об ужасах Пустошей и миссии Анклава по наведению порядка убеждают наших солдат в справедливости нашего дела."
  EEN_wasteland_propaganda_radio_programs_law:0 "Пропагандистское радио Анклава"
  EEN_wasteland_propaganda_radio_programs_law_desc:0 "С тех пор как стали распространяться слухи о наших попытках уничтожить всё живое в Пустоши, у Анклава возникли проблемы с репутацией. Радио Анклава исправляет эту ситуацию, предлагая широкий выбор программ. От патриотических гимнов до тщательно отредактированных новостей, радио показывает жителям Пустоши хорошие стороны Анклава, даже если некоторые из них преувеличены."
  EEN_operational_security_law:0 "Оперативная безопасность"
  EEN_operational_security_law_desc:0 "На данный момент мы соблюдаем радиомолчание и делимся информацией только по необходимости. У нас есть планы, которые мы не можем обнародовать прямо сейчас, потому что противники будут препятствовать нашим действиям."
  # trade laws
  # trade laws Enclave
  EEN_isolationist_trade_law:0 "Государственная собственность"
  EEN_isolationist_trade_law_desc:0 "В условиях чрезвычайного положения национальными ресурсами страны должно распоряжаться правительство. Торговля с мутантами запрещена, и наши граждане понимают, что им, возможно, придётся отказаться от некоторых предметов роскоши в интересах военных действий."
  EEN_govt_trade_law:0 "Национализированная промышленность"
  EEN_govt_trade_law_desc:0 "Некоторые ресурсы и отрасли промышленности, необходимые для восстановления Америки, находятся в ведении правительства Соединённых Штатов. Торговля продолжается, малый бизнес процветает, но все электростанции и большинство оружейных заводов являются собственностью правительства США. Кроме того, жители Пустошей, нашедшие технологию или ресурсы, необходимые для военных действий, обязаны передать их с редкой компенсацией, ведь на самом деле они им не принадлежат. Они просто находят то, что мы потеряли."
  EEN_free_trade_law:0 "Свободная торговля"
  EEN_free_trade_law_desc:0 "Экономика процветает благодаря более спокойному подходу. Важные части военной промышленности по-прежнему находятся в ведении Анклава, но те части, которые могут быть переданы предприимчивым жителям Пустошей, остаются в их собственности. Кроме того, если старатели находят довоенные технологии или ценные ресурсы, они получают компенсацию за возвращение их правительству, которому они принадлежат по праву."

