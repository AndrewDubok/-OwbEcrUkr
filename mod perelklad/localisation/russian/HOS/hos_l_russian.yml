### Events ###
HOS_nf_events.1.title:0 "Великая игра - хоккей"
HOS_nf_events.1.desc:0 "В годы, последовавшие за Великой войной, многое было утрачено и забыто. Но даже атомный огонь не смог стереть из памяти великую игру – хоккей. Это было экстремальное испытание мастерства, где спортсмены мчались на огромной скорости, размахивая ножами, прикреплёнными к ботинкам. Они избивали соперников клюшками и пытались забить голы. Как именно забивались голы? Клюшками били по мине, или «шайбе», как её называли, по человеку, закутанному в сетку, которого называли вратарём. «Хозеры» продолжают эту традицию вместе с другими бандами Восточной Канады. «Хозеры» считаются второй лучшей командой. Настоящий секрет успеха «Хозеров» кроется в одном."
HOS_nf_events.1.a:0 "Их жестких тренировках"
HOS_nf_events.1.b:0 "Их сильном составе"
HOS_nf_events.1.c:0 "Их командном единстве"
HOS_nf_events.1.d:0 "Их ненавистью к поражению"
HOS_nf_events.2.title:0 "Покидая Ронто"
HOS_nf_events.2.desc:0 "Единственная команда, которая смогла победить «Хозеров», была также единственной командой, которую они так и не смогли победить — Ронто В.А.Ш.И.Н.Т.О.Н. После 20 поражений подряд, при том, что их было больше, «Хозеры» начали подозревать, что противник жульничает. События быстро переросли в драку, и в дело вмешались роботы, охранявшие Ронто. Команде пришлось быстро убираться из города, но они смогли захватить лишь несколько вещей."
HOS_nf_events.2.a:0 "Взять всё что смогут"
HOS_nf_events.2.b:0 "Прихватить ящики с оружием"
HOS_nf_events.2.c:0 "Крышки были приоритетнее"
HOS_nf_events.2.d:0 "Дополнительные коньки и накладки"
HOS_nf_events.3.title:0 "Не стадион, но сойдёт"
HOS_nf_events.3.desc:0 "К югу от Ронто находится территория, которую роботы В.А.Ш.И.Н.Г.Т.О.Н.А почти не патрулируют. В руинах орудуют различные мелкие банды и сборища мусорщиков — лёгкая добыча для Хозеров. Если мы собираемся восстановить команду, нам понадобится место побольше, чем наша старая база. Где же нам обосноваться?"
HOS_nf_events.3.a:0 "На старой фабрике"
HOS_nf_events.3.b:0 "На рынке мусорщиков"
HOS_nf_events.3.c:0 "На едва функционировавшей электростанции"
HOS_nf_events.3.d:0 "В логове работорговцев"
HOS_nf_events.4.title:0 "Мы были чертовски плохи"
HOS_nf_events.4.desc:0 "Долгие годы «Хозеры» были непобедимы. Ни мелкие банды, ни мусорщики, ни разъярённые поселенцы не могли захватить их территорию. «Хозеры» не могли перестать побеждать, а потом пришёл В.А.Ш.И.Н.Г.Т.О.Н, и они проиграли. «Хозеры» любили побеждать, но ненавидели проигрывать. Многие «Хозеры» во время отступления задавались вопросом, смогут ли они когда-нибудь снова победить. Добравшись до своего нового дома, Шор дал обещание."
HOS_nf_events.4.a:0 "«Хозеры» никогда не проиграют вновь"
HOS_nf_events.5.title:0 "Открытие отборочных"
HOS_nf_events.5.desc:0 "Скамейка запасных «Хозеров» значительно опустела после недавнего поражения от В.А.Ш.И.Н.Г.Т.О.Н.А. Если мы собираемся провести матч-реванш, нам нужно пополнить состав. Кого мы возьмём?"
HOS_nf_events.5.a:0 "Местных бандитов"
HOS_nf_events.5.b:0 "Местных мусорщиков"
HOS_nf_events.5.c:0 "Беженцев Ронто"
HOS_nf_events.5.d:0 "Любого кого найдём"
HOS_nf_events.6.title:0 "Покидая лёд"
HOS_nf_events.6.desc:0 "Если Шор чему-то и научился после боя с Ронто, так это тому, что он не может быть везде одновременно. Чтобы вести «Хозеров» в будущее, Шору придётся повесить коньки на гвоздь и стать тренером, их лидером вне льда."
HOS_nf_events.6.a:0 "Нам нужен новый капитан"
HOS_nf_events.7.title:0 "Долгая прогулка сквозь огонь"
HOS_nf_events.7.desc:0 "На протяжении почти 200 лет Виндзор Врэкерс перевозила свои крышки через мост в Мичиган. Несмотря на то, что люди на другой стороне знали об их приближении, скорость машин не позволяла нам успешно совершать рейды. А без машин? Они лишились всего своего дерьма. Ни один из этих разбойников, переходящий по мосту, не продвинулся ближе чем на 30 метров к баррикадам в конце моста. Бой был односторонним, но иногда за взрывами всё равно интересно наблюдать."
HOS_nf_events.7.a:0 "Чтож, возвращаемся к рейдам"

###Ideas###
HOS_dfence_idea:0 "Защита"
HOS_dfence_idea_desc:0 "Наши ребята позаботятся о том, чтобы враг никогда не зашел далеко на нашу сторону поля."
HOS_set_the_tone_idea:0 "Задавая тон"
HOS_set_the_tone_idea_desc:0 "Мы быстро выдвигаемся и наносим им мощный удар. Задаём тон бою и поддерживаем его."
HOS_yank_tactics_idea:0 "Тактика Янки"
HOS_yank_tactics_idea_desc:0 "Американцы знают толк в том, как затягивать военные действия в глубь территории противника."
HOS_get_focused_idea:0 "Сосредоточенные"
HOS_get_focused_idea_desc:0 "Гуди следит за тем, чтобы ребята были готовы к выходу. Никаких отвлечений, никакой ерунды, никаких пропусков дня ног."
HOS_wheel_snipe_celly_idea:0 "Выкат, Прицел, Гол"
HOS_wheel_snipe_celly_idea_desc:0 "С помощью коньков и автомобилей мы наносим удар врагу еще до того, как он успевает понять, что его ударило."
HOS_skate_boost_idea:0 "Самые быстрые коньки"
HOS_skate_boost_idea_desc:0 "На заводах в Виндзоре вместо автомобилей стали производить коньки. С этими фабриками их можно сделать ещё быстрее."
HOS_punching_through_idea:0 "Пробивая насквозь"
HOS_punching_through_idea_desc:0 "Если борьба с В.А.Ш.И.Н.Г.Т.О.Н.О.М нас чему-то и научила, так это тому, как лучше всего убивать роботов."
HOS_ready_for_ravens_idea:0 "Готовы к Рэйвен-Року"
HOS_ready_for_ravens_idea_desc:0 "Борьба с Онтарским Анклавом научила нас достаточно, чтобы быть готовыми к тому, что их родственная команда «Столичный Рэйвен-Рок» когда-нибудь выйдет в нашу лигу."
HOS_home_ice_idea:0 "Преимущество знакомого льда"
HOS_home_ice_idea_desc:0 "Если вы не можете победить на знакомом льду, вы не сможете победить нигде."
HOS_training_idea:0 "Усиленные тренировки"
HOS_training_idea_desc:0 "Основой нашей банды является строгая подготовка членов нашей команды."
HOS_numbers_idea:0 "Скамейка запасных"
HOS_numbers_idea_desc:0 "Основа нашей банды — численность. Когда один падает, другой выходит на лёд."
HOS_teamwork_idea:0 "Командная работа воплощает мечту"
HOS_teamwork_idea_desc:0 "Основа нашей банды — преданность друг другу. Мы делим борьбу и добычу."
HOS_hating_loss_idea:0 "Мы ненавидим проигрывать"
HOS_hating_loss_idea_desc:0 "В основе нашей команды лежит не любовь к победе, а ненависть к поражениям. Это побуждает нас всегда побеждать, чего бы это ни стоило."
HOS_thugs_idea:0 "Новички-бандиты"
HOS_thugs_idea_desc:0 "Большую часть наших новых рекрутов составляют местные головорезы."
HOS_scavs_idea:0 "Новички-мусорщики"
HOS_scavs_idea_desc:0 "Большую часть наших новых рекрутов составляют местные мусорщики."
HOS_refugees_idea:0 "Новички-беженцы"
HOS_refugees_idea_desc:0 "Основную часть наших новых рекрутов составляют беженцы со всего Онтарио."
HOS_everyone_idea:0 "Множество новичков"
HOS_everyone_idea_desc:0 "Мы принимаем всех желающих присоединиться. Те, кто не смог пройти отбор, всё равно будут принимать пули, предназначенные для наших звёздных игроков."

