###Characters###
HOS_the_shore_name:0 "Шор"
HOS_Shore_desc:0 "Шор — единственный ребёнок Маркера, лидера, который понял, что В.А.Ш.И.Н.Г.Т.О.Н — фальшивка и что он заведёт игроков в могилу в борьбе за какой-то давно угасший идеал. Теперь Шор и остальные Хозеры занимаются тем, что они действительно любят: чувством льда под ногами и командой за спиной. Конечно, вы не сможете играть вечно, но если вы просто воруете еду у кого попало, вам не придется тратить время на ее выращивание самостоятельно."
HOS_bulldog_nick_name:0 "Бульдог Ник"
HOS_bulldog_desc:0 "Бульдог Ник — главный союзник и сторонник Шора, он выступает в роли главного исполнителя как для своей команды, так и для «Хозеров» в целом. Но, хотя Бульдог Ник, возможно, и не самый умный парень в команде, он иногда задаётся вопросом, не ведёт ли Шор их по ложному пути. Был ли В.А.Ш.И.Н.Г.Т.О.Н прав? Стоит ли им сосредоточиться на устранении тиранов? Бульдог Ник верит, что более умные умы, чем он сам, во всём разберутся, и пока он просто играет в эту игру."
HOS_jim_1_name:0 "Джим"
HOS_jim_2_name:0 "Джим"
HOS_jim_3_name:0 "Джим"
HOS_jacques_name:0 "Капитан Жак"
HOS_hitchcock_name:0 "Капитан Хичкок"
HOS_yank_name:0 "Капитан Янк"
HOS_goody_name:0 "Капитан Гуди"

