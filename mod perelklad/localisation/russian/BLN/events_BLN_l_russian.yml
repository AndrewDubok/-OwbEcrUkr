  bln_events.1.title:0 "Миссия"
  bln_events.1.desc:0 "Связующая цель для члена Братства важнее, чем законы физики. Нет более важного приказа, чем приказ человека над машиной. Поэтому, когда старейшины Калифорнии решили покорить неизвестный Восток, Лайонс знал, что это нужно сделать. По мере того как он и его свита пробирались через пустоши, Лайонс сталкивался с множеством сложных решений, но как Высший Паладин он имел полное право голоса. Все, кто знал Лайонса, могли сказать, что в нём назревают перемены, судя по тому, как он подходит к каждому новому вызову. Лайонс..."
  bln_events.1.a:0 "...начал опираться на Писца Ротшильда."
  bln_events.1.b:0 "...помогал городам, через которые он проходил."
  bln_events.1.c:0 "...использовал мутантов в качестве мишени."

  bln_events.2.title:0 "Бич Божий"
  bln_events.2.desc:0 "Как бы Лайонс ни реагировал на ужас пустошей, ясно, что в тот день, когда он покинул Питт, он стал другим человеком. \n\nЭкспедиция достигла Питтсбурга в начале 2274 года и обнаружила город, кишащий паразитами, как человеческими, так и другими. Питтсбург превратился в хаос, и Лайонс решил освободить от него всех, кого мог. Он и его паладины уничтожали всех, кто оказывал сопротивление, и забирали всё, что представляло ценность. Среди вещей, которые Лайонс счел ценными, были 20 осиротевших детей и кое-что, известное только Старейшине. Ценой любопытства Оуина Лайонса стал всего один паладин, расплющенный насмерть под обвалом здания. В обмен на душу одного человека Лайонс нашел..."
  bln_events.2.a:0 "...планы новой эпохи литейных заводов."
  bln_events.2.b:0 "...секрет локомотивов."
  bln_events.2.c:0 "...достаточно ядерного материала, чтобы сравнять Скалистые горы с землей."

  bln_events.3.title:0 "Цитадель"
  bln_events.3.desc:0 "В 2255 году Экспедиция достигла Столичной Пустоши. Их Мекка — Пентагон, была разрушена, но под обломками скрывался железный гигант. Огромная мощь Либерти Прайм заставила Высших Старейшин назначить Лайонса главой нового отделения. Чтобы восстановить и изучить технологии Столицы, Лайонсу понадобился бункер, соперничающий с Лост-Хиллз. Он нашел такой бункер в Цитадели, но разрушения, постигшие Пентагон, необходимо было устранить. Из-за нехватки людей и материалов Лайонсу пришлось прибегнуть к помощи местных жителей, чтобы снабдить Братство. В обмен на помощь жители Пустоши попросили у Лайонса..."
  bln_events.3.a:0 "...защиту внутри Цитадели."
  bln_events.3.b:0 "...помощь в освоении Ривет-Сити."
  bln_events.3.c:0 "...воды для Мегатонны."

  bln_events.4.title:0 "Укрепление монумента Вашингтона"
  bln_events.4.desc:0 "Монумент Вашингтона высотой 555 футов - самое высокое сооружение в столице. Хотя с тех пор, как мы вошли в город, нам удавалось удерживать обелиск, становится ясно, насколько стратегически важна эта башня. Настолько важна, что если мы её потеряем, то, возможно, нам придется пересмотреть свое положение в Цитадели. Если мы хотим продолжать действовать через Потомак, нам придется уделять форпосту гораздо больше внимания."
  bln_events.4.a:0 "Пусть Пибоди запросит необходимые припасы."

  bln_events.5.title:0 "Битва за Мемориал Линкольна"
  bln_events.5.desc:0 "Оплот рабовладельцев на Аллее представляет опасность для нашей миссии по обеспечению безопасности столицы. Пока они охотятся на местных жителей, супермутанты продолжают набирать силу по всей Аллее. Разведгруппы сообщают о группе беглых рабов в районе Храма Союза. \n\nЗа этими сообщениями последовала команда во главе с паладином Дженнингсом, которому удалось завербовать беглых рабов в миссию по изгнанию рабовладельцев. Команда начала штурм и быстро выбила слабо вооруженных бандитов, но когда они зачистили остальную часть Мемориала, паладина Дженнингса окружили рабовладельцы, которые отступили в здание. Дженнингс боролся с ними некоторое время, прежде чем раздались взрывы гранат, и Дженнингс вместе с рабовладельцами были мертвы.\n\nПосле штурма паладин Дженнингс был единственной жертвой. В настоящее время памятник удерживают несколько рыцарей и дюжина бывших рабов."
  bln_events.5.a:0 "Запишите её смерть в Свитки. Её храбрость не будет забыта."

  bln_events.6.title:0 "Отчет Джеймсона"
  bln_events.6.desc:0 "Старейшина,\n\nЯ прочитал последние отчеты о количестве паладинов и рыцарей, которые не явились, когда ожидалось. Я понимаю хаотичность ситуации на фронте, но традиция требует, чтобы смерть каждого брата, павшего в бою, была зафиксирована в Свитках. Не приложить все усилия, чтобы восстановить доказательства того, кто пал, а кто выжил, просто немыслимо.\n\nЯ понимаю, что каждый Брат нужен для работы здесь, в Цитадели, и в городе неподалеку. С этой целью я намерен заключить контракт с чужаками, чтобы получить доказательства того, кто из наших братьев пал перед врагом. Я попрошу их вернуть жетоны всех павших братьев, которые они найдут. Это самое малое, что мы можем сделать, не имея средств на полноценные и почётные похороны.\n\nВам не нужно беспокоиться о вознаграждении этих подрядчиков. Я заплачу им из своих личных средств. Для меня это стоит того, чтобы сохранить традицию и не напрягаться с ресурсами для вашей миссии.\n\nВаша сталь,\n\nПисец Элизабет Джеймсон,\n\nГлавный библиотекарь\nОрдена Пера\nБункер в Столичной Пустоши"
  bln_events.6.a:0 "Понятно"

  bln_events.7.title:0 "Прототип"
  bln_events.7.desc:0 "Либерти Прайм - практически неудержимое оружие, которое может оказаться бесценным ресурсом в наших руках. Проблема, с которой мы сталкиваемся сегодня, та же, что и 200 лет назад: огромному роботу требуется слишком много энергии. Бесчисленные попытки перенаправить энергию или повысить эффективность заканчивались провалом или ещё чем-нибудь похуже. Тем не менее, Писец Ротшильд не сдаётся и верит, что с помощью дополнительных ресурсов он сможет обеспечить работу робота в течение следующих нескольких лет."
  bln_events.7.a:0 "Назначьте ему больше писцов и оборудования."
  bln_events.7.b:0 "Назначьте ему несколько рыцарей с производства."

  bln_events.8.title:0 "Штурм Капитолия"
  bln_events.8.desc:0 "Супермутанты были вытеснены со двора Аллеи и теперь занимают лишь несколько опорных пунктов, а также здание Капитолия. Сара Лайонс и её отряд возглавили атаку, сначала очистив территорию от наёмников компании Коготь, а затем приступив к зачистке здания от супермутантов. Внутри они обнаружили Бегемота и понесли большие потери, прежде чем наши писцы смогли перепрограммировать часовые турели, чтобы те распознали мутантов как китайских повстанцев. \n\nНесмотря на то, что в здании было очень мало металлолома и технологий, его захват окажется жизненно важным для обеспечения безопасности остальной части Вашингтона. Не говоря уже о том, что для наших братьев важно обеспечить безопасность столицы Америки. Внутри наши писцы не нашли ничего, что указывало бы на то, откуда приходят супермутанты. Наша, казалось бы, бесконечная борьба с мутантами ещё далека от завершения, но теперь мы можем быть спокойны, ведь наше положение в Вашингтоне стало намного надежнее."
  bln_events.8.a:0 "Ad Victoriam!"

  bln_events.9.title:0 "Всему есть предел"
  bln_events.9.desc:0 "Генри Каден и многие ему подобные уже не первый год возмущаются действиями Лайонса, но его последние действия стали последней каплей, сломавшей спину брамина. Ночью защитник Каден собрал своих сторонников, столько снаряжения, сколько они могли унести, и отправился в Форт Индепенденс. Они осудили старейшину Лайонса как предателя и отказались следовать его заданию, которое, по их мнению, является порывом фантазии, идущим вразрез со всем, что отстаивает Братство. Естественно, старейшина Лайонс пришел в ярость от этих новостей и приказал вычеркнуть их из архивов Цитадели, заклеймив изгоями."
  bln_events.9.a:0 "Мы прекрасно обойдемся без них"
  bln_events.9.b:0 "Все Лайонсы - глупцы!"
  bln_events.9.c:0 "Мы пойдём на Слокума Джо!"

  bln_events.10.title:0 "Самоуничтожение Рэйвен-Рока!"
  bln_events.10.desc:0 "После нескольких дней тяжелых боев, в ходе которых удалось лишь приблизиться к наружным дверям, наши рыцари наконец оттеснили силы Анклава настолько, что смогли подойти к наружным дверям их твердыни в Рэйвен-Рок. Но как только наши войска сделали первые шаги в комплекс, серия взрывов потрясла весь склон горы. Анклав активировал механизм самоуничтожения базы и похоронил несметные технологические чудеса под бесчисленными тоннами камня и обломков. Пройдет немало времени, прежде чем мы сможем расчистить хоть что-то из этого и начать операции по сбору технологий, но Анклав повержен."
  bln_events.10.a:0 "По крайней мере пока что — да."

  bln_events.11.title:0 "Посмотрите на небо"
  bln_events.11.desc:0 "Перед разрушением Рэйвен-Рока десятки винтокрылов вылетели из своих ангаров в разных направлениях. Тогда казалось, что это крысы, бегущие с тонущего корабля, и тем не менее угроза столкнуться с одиноким отрядом оставшихся в живых членов Анклава будет сохраняться ещё некоторое время, но на этом их опасность закончивается. Теперь, после изучения отчетов о результатах боя, а также наших разведчиков по всей Столичной пустоши, кажется, что винтокрылы в основном движутся на восток. Анклав перегруппировывается, и эта битва ещё не закончена."
  bln_events.11.a:0 "Мы должны сохранять бдительность"

  bln_events.12.title:0 "Их новый дом"
  bln_events.12.desc:0 "После нескольких месяцев поисков мы наконец нашли место, где Анклав перегруппировывался, - авиабазу Адамс. Оборона довоенной базы была усилена технологиями Анклава и неизвестным количеством солдат. Рано или поздно они придут за нами, поэтому мы уже разрабатываем планы по нападению на базу."
  bln_events.12.a:0 "Готовьте Рыцарей"

  bln_events.13.title:0 "Повторение Наварро"
  bln_events.13.desc:0 "Как база Анклава в Наварро пала перед силами Братства и НКР после уничтожения их нефтяной вышки, так и авиабаза Адамс пала перед нами после уничтожения Рэйвен-Рока. Руководство Анклава получило второй сокрушительный удар, от которого не сможет оправиться, а те немногие солдаты Анклава, которые остались на поле боя или смогли сбежать на винтокрылах, вряд ли смогут представлять длительную угрозу для Братства. Наконец-то мы можем сказать, что с угрозой со стороны Анклава покончено навсегда. Если только у них не было какой-то третьей крупной базы, о которой мы не знаем."
  bln_events.13.a:0 "Какова вероятность этого?"

  bln_events.14.title:0 "Добрые друзья и соседи"
  bln_events.14.desc:0 "Во время нашей борьбы за выживание многие наши соседи в Столичной Пустоши прислушались к призыву и помогли нам в борьбе с угрозой Анклава. Теперь, когда пыль улеглась, они говорят о продолжении этого сотрудничества. Естественно, радикалы в нашем ордене, которые уже опасались сотрудничать с чужаками во время нашей борьбы с Анклавом, категорически против этой идеи. Тем не менее, в ордене немало тех, кто согласен с тем, что длительное сотрудничество может стать именно тем, что нужно этой части Пустоши."
  bln_events.14.a:0 "Мы создадим прочный альянс!"
  bln_events.14.b:0 "Кодекс запрещает это!"

  bln_events.15.title:0 "Альянс Лайонса"
  bln_events.15.desc:0 "Братство Стали обратилось к нашему руководству с предложением о дальнейшем сотрудничестве. Мы станем членами того, что многие называют Альянсом Лайонса, и будем работать с другими членами над совместной обороной. На бумаге это звучит как хорошая идея. Супермутанты, рейдеры и прочие злодеи Пустоши - всё это проблемы, с которыми нам всем приходится сталкиваться. Почему бы нам не объединиться для борьбы с ними?"
  bln_events.15.a:0 "Мы вместе ведём борьбу за добро!"
  bln_events.15.b:0 "На сегодня достаточно истории с Анклавом"

  bln_events.16.title:0 "Наши заблудшие Братья"
  bln_events.16.desc:0 "Несколько лет назад многие из наших братьев покинули нас, посчитав, что мы были глупцами, уклонившись от Западного кодекса и сражаясь за людей этой пустоши. Эта рана так и не зажила до конца, и даже сейчас многие в нашем отделении обижаются на своих потерянных братьев за то, что они отвернулись от нас. Но наша недавняя победа над Анклавом показала, насколько верны наши идеалы. Смогут ли наши изгнанные братья, которые трудятся в бункерах, мало чем отличающихся от западных, понять их ценность? Стоит ли вообще пытаться их переубедить?"
  bln_events.16.a:0 "Давайте попробуем примириться"
  bln_events.16.b:0 "Мы убедим их силой"

  bln_events.17.title:0 "Предложение Лайонса"
  bln_events.17.desc:0 "Дочь Оуена взяла на себя роль старейшины в Братстве после его смерти и делает то, что он, скорее всего, никогда бы не сделал - обращается к Хранителю Кадену. Она предлагает нам преодолеть наши разногласия и попытаться снова работать вместе. Процесс будет постепенным: мы сохраним свою автономию и просто согласимся помогать друг другу в будущих конфликтах, если возникнет такая угроза, как Анклав. В конце концов мы могли бы начать торговать, обмениваться технологиями и, возможно, даже тренироваться вместе, как когда-то. Хотя многие в нашем отделении скучают по своим братьям, которые последовали за этим глупцом Лайонсом в его крестовом походе, и надеются, что такой день примерения всё же придет, но не меньше их и тех, кто яростно возражает против любой формы примирения, если только мы не откажемся от своих фантазий и не последуем нашей истинной миссии."
  bln_events.17.a:0 "Отправьте им наше согласие"
  bln_events.17.b:0 "Скажите им, что этого никогда не произойдёт"

  bln_events.18.title:0 "Те, кто остался"
  bln_events.18.desc:0 "Пыль осела в схватке с Изгоями. Многие из наших нынешних и бывших братьев лежат мертвыми, и многие задаются вопросом, стоило ли оно того. Хранитель Каден, по слухам, бежал на запад со многими своими верными последователями. Оставшиеся в живых Изгои сдались, приняв правление старейшины Лайонса. Это мрачный день в истории Братства, но многие вздохнули с облегчением. Цена была велика, но наконец-то наши братья, способные здраво мыслить, вернулись. Те же, кто не вернулся, либо ушли, либо скоро будут поглощены песками Пустоши."
  bln_events.18.a:0 "По крайней мере, всё закончилось"

  bln_events.19.title:0 "Изгои принимают наше предложение"
  bln_events.19.desc:0 "Наша просьба к Изгоям о постепенном примирении была принята. Несмотря на то, что некоторые члены нашего отделения высказывают свои сомнения, общий настрой в Цитадели праздничный. Старейшину Лайонса называют героем за то, что он сделал то, что многие считали невозможным, и начал путь к мирному прекращению раскола в нашем отделении."
  bln_events.19.a:0 "Впереди долгий путь"

  bln_events.20.title:0 "Изгои отвергли наше предложение"
  bln_events.20.desc:0 "Как многие в нашем штабе и предполагали, упрямые Изгои отказались принять наше предложение о примирении. Они скорее предпочтут прозябать в своих бункерах, поклоняясь устаревшему кодексу и презирая местных жителей, чем хотя бы задумаются о ценности идеалов Лайонса. Само собой разумеется, старейшина Лайонс в ярости от такой наглости. Похоже, единственный способ заставить наших заблудших братьев образумиться — это сила."
  bln_events.20.a:0 "У них был шанс"

  bln_events.21.title:0 "Вновь обратить внимание"
  bln_events.21.desc:0 "После того как угроза со стороны Анклава миновала, нам пора вернуться к охоте на супермутантов. За время нашей войны эта проблема не исчезла, а наоборот, усугубилась."
  bln_events.21.a:0 "С этим пора кончать"

  bln_events.22.title:0 "Смерть Шепарда"
  bln_events.22.desc:0 "Супермутант, известный как Шепард, был приоритетной целью с тех пор, как появились первые сообщения о том, что он организует бродячие орды мутантов. Многие рыцари и несколько паладинов погибли, безуспешно пытаясь убить это чудовище. К счастью, там, где они потерпели неудачу, преуспел оруженосец Артур Мэксон. Этот отважный подвиг привел к тому, что некоторые призывают молодого потомка нашего первого старейшины принять бразды правления. Разумеется, эти просьбы были отклонены. Ребенок подавал большие надежды уже в юности, но ему ещё предстоит многому научиться, прежде чем он сможет занять пост старейшины."
  bln_events.22.a:0 "Отличная работа, юный Мэксон"

  bln_events.23.title:0 "Смерть Шепарда"
  bln_events.23.desc:0 "Супермутант, известный как Шепард, был приоритетной целью с тех пор, как появились первые сообщения о том, что он организует бродячие орды мутантов. Многие рыцари и несколько паладинов погибли, безуспешно пытаясь убить это чудовище. К счастью, там, где они потерпели неудачу, преуспел оруженосец Артур Мэксон. Этот отважный подвиг привел к тому, что некоторые призывают молодого потомка нашего первого старейшины принять бразды правления. Разумеется, эти просьбы были отклонены. Ребенок подавал большие надежды уже в юности, но ему ещё предстоит многому научиться, прежде чем он сможет занять пост старейшины."
  bln_events.23.a:0 "Отличная работа, юный Мэксон"

  bln_events.24.title:0 "Мы победили в крестовом походе"
  bln_events.24.desc:0 "После десятилетий кровавых боев логово супермутантов было уничтожено. Больше они не будут затаскивать жителей Пустоши в Убежище 87, чтобы превратить их в отвратительных мутантов. Сегодня Братство и Столичная Пустошь вместе вздохнули с облегчением."
  bln_events.24.a:0 "Ad Victoriam!"

  bln_events.25.title:0 "Контакт!"
  bln_events.25.desc:0 "Наши разведчики, ищущие логово супермутантов, были застигнуты врасплох, когда столкнулись с большим отрядом супермутантов и были вынуждены вступить в бой. Неизвестно, означает ли это, что мы приблизились к поиску их логова, или этот отряд просто охотился."
  bln_events.25.a:0 "По крайней мере, мы убили нескольких мутантов."

  bln_events.26.title:0 "Ничего"
  bln_events.26.desc:0 "Наши разведчики в пустоши так ничего и не нашли в поисках логова супермутантов. Не успокоившись, они готовы снова отправиться туда в надежде, что в один прекрасный день им удастся найти логово."
  bln_events.26.a:0 "Снова в деле"

  bln_events.27.title:0 "МЫ НАШЛИ ЕГО!"
  bln_events.27.desc:0 "Разведчики в западной части Столичной Пустоши обнаружили большую активность мутантов и смогли отследить одну из групп мутантов, которая вела пленника в высокорадиоактивную зону, расположенную недалеко от места, где, по данным Волт-Тек, находится убежище 87. Учитывая историю Волт-Тек, проводившей ужасные эксперименты в своих убежищах, вполне вероятно, что это и есть источник супермутантов. Единственная проблема заключается в том, что у нас нет способа преодолеть смертельную радиацию, окружающую убежище. Следующим нашим шагом будет поиск пути внутрь."
  bln_events.27.a:0 "Всё почти закончилось"

  bln_events.28.title:0 "Судьба Лайонса"
  bln_events.28.desc:0 "Сара Лайонс пошла по стопам своего отца, став одним из лучших солдат Братства. С годами она оттачивала свои боевые и лидерские навыки, возглавляя львиный прайд во время бесчисленных миссий в глубине руин Вашингтона, кишащих супермутантами. Теперь, после смерти Оуэна Лайонса, его дочь снова берёт на себя его роль, и ей предстоит сделать выбор. Будет ли она продолжать руководить львиным прайдом с поля боя, отправляясь вместе с прайдом в самое пекло, как и другие рыцари и паладины под её командованием? Или же она поступит, как её отец, отложит лазерную винтовку в сторону и займется важными делами по управлению Братством из безопасной Цитадели?"
  bln_events.28.a:0 "Старейшина должен быть на передовой!"
  bln_events.28.b:0 "Старейшина должен быть в Цитадели"

  bln_events.29.title:0 "Трагедия постигла Братство"
  bln_events.29.desc:0 "Старейшина Лайонс не хотела бы тихо уйти спокойной ночью, и она это продемонстрировала на разрушенных улицах Фоллс-Черча, где она и большинство членов Прайда встретили свой конец. То, что началось как обычный патруль, превратилось в кровавую бойню, когда Прайд столкнулся с огромным отрядом супермутантов, сопровождавших двух бегемотов. Будучи вооруженными до зубов и превосходящими по численности, Прайд выстоял и уничтожил отряд мутантов, но понес большие потери. Выжившие позаботились о том, чтобы тела и голодиски были собраны, и в честь их жертвы будет проведена церемония. Теперь взор братства обращен к следующему старейшине."
  bln_events.29.a:0 "Их забрали слишком рано"

  bln_events.30.title:0 "Отряд «Артемида» уходит во тьму"
  bln_events.30.desc:0 "Отряд Паладайна Брандиса был отправлен в Содружество месяц назад, но вскоре после их прибытия к границам Содружества мы потеряли с ними связь. Предполагается, что они встретили свой конец где-то в этой части пустоши, но на этом наш интерес к Содружеству не исчерпан. Братство не было бы тем, чем оно является сейчас, если бы мы отказались от операции из-за её опасности. Уже разрабатывается план экспедиции туда другим отрядом. Кто знает, может, они даже узнают, что случилось с отрядом «Артемида»." 
  bln_events.30.a:0 "Надеюсь, у них просто сломалась рация"

  bln_events.31.title:0 "Наш павший Брат"
  bln_events.31.desc:0 "Когда бои в Питте стихли, наши братья окружили довоенный небоскреб, в котором жил Ашур и его лейтенанты. Планируя штурм башни, Ашур отправил гонца с предложением о капитуляции, но с одним условием. Практически все в округе знают, что в Питте сосредоточена уникальная смесь радиации и промышленных загрязнителей, которая вызывает у людей, слишком долго подвергающихся воздействию воздуха этого региона, болезнь под названием Контаминация Троглодитной Дегенерации (КТД). В легких случаях это приводит к болезненным поражениям, которые проходят со временем, когда человек перестает подвергаться воздействию загрязняющих веществ. Хотя для послевоенных болезней это относительно легкая форма, реальную опасность КТД представляет примерно для 20 % зараженных. У этих людей, которые страдают от более неблагоприятных последствий, наблюдается сильная деградация разума, и они превращаются в бездумных жестоких дикарей, слоняющихся по руинам. По мере того как зараженные продолжают подвергаться воздействию, они ещё больше теряют рассудок и внешне превращаются в отвратительных монстров, едва напоминающих людей, которыми они когда-то были. Этих трогов можно увидеть повсюду в Питте, и многие смирились с тем, что они или кто-то, кого они любят, станет одним из них. Интересно, что наш заблудший брат Ашур утверждает, что его дочь обладает уникальными генами, которые делают её невосприимчивой к КТД, а также в целом устойчивой к мутациям. По словам Ашура, его жена изучает особенности их дочери и делает успехи в создании вакцины. Самозваный владыка работорговцев настаивает на том, что его усилия были направлены на разработку лекарства и восстановление города, и что мы должны работать с ним и его женой, чтобы довести лекарство до конца, чтобы Питт наконец стал процветающим городом. Как нам следует реагировать?" 
  bln_events.31.a:0 "Согласиться на просьбу Ашура"
  bln_events.31.b:0 "Мы не ведем переговоров с рейдерами"

  bln_events.32.title:0 "Отряд «Гладиус» уходит во тьму"
  bln_events.32.desc:0 "Отряд Паладайна Данса, отправленный в Содружество, тоже затих. Что же происходит в Содружестве?"
  bln_events.32.a:0 "Может быть, нам стоит заглянуть туда?"

  bln_events.33.title:0 "Экспедиция возвращается"
  bln_events.33.desc:0 "Наша экспедиция в земли учёного с пустошей, известного как Лоренц, прошла хуже, чем мы ожидали. Слухи о магнитном оружии не только оказались правдой, но и, похоже, их группа специализировалась на нём. Задав слишком много вопросов, отряд, отправленный нами в этот район, попал в засаду и понёс потери, прежде чем успел открыть ответный огонь и скрыться. Зато они привезли нам сувенир." 
  bln_events.33.a:0 "Такое оружие нельзя оставлять в их руках"

  bln_events.34.title:0 "Экспедиция возвращается"
  bln_events.34.desc:0 "Похоже, наша вылазка на холодный север породила больше вопросов, чем ответов. Хотя местные жители не проявляют открытой враждебности к чужакам, они подозрительны, и многие расспросы отряда не получили прямых ответов. Также есть противоречивая информация о некоем существе под названием В.А.Ш.И.Н.Г.Т.О.Н, которое отряд не смог определить, было ли это вождём, божеством или какой-то почитаемой людьми машиной. Однако самым тревожным открытием экспедиции стало оборудование, которое они смогли выменять за огромную цену. В Цитадели уже ходят слухи: многие хотят отправить больше экспедиций, чтобы убедиться в отсутствии анклава в том регионе." 
  bln_events.34.a:0 "Мы должны убедиться в этом"
  
  bln_events.35.title:0 "Экспедиция возвращается"
  bln_events.35.desc:0 "Рассказы о том, что этот культ на востоке враждебен, были преуменьшением. Вооруженные группы бродят по их территории, пытаясь захватить или убить любого, кто не является представителем их народа. К счастью, нашему отряду удалось избежать обнаружения и даже устроить засаду на конвой, перевозивший очень интересное оборудование. Если это ещё не все, то у них точно есть ценные ресурсы."
  bln_events.35.a:0 "Ресурсы, которые мы не можем позволить им оставить"
  
  bln_events.36.title:0 "Экспедиция возвращается"
  bln_events.36.desc:0 "Спустя много недель наш отряд, отправленный в руины довоенного Бостона, вернулся с многочисленными ящиками довоенных артефактов и документов. Хотя они не нашли никаких доказательств существования этого теневого «института», кроме слухов торговцев, они нашли подтверждение того, что разработка T-51 и Толстяка велась на военных базах в этом регионе. Кроме того, были найдены документы, содержащие несколько других многообещающих сведений о довоенных технологиях. Мы должны отправить ещё несколько экспедиций, чтобы отследить их."
  bln_events.36.a:0 "Вовремя"

  bln_events.37.title:0 "Экспедиция в Аппалачи"
  bln_events.37.desc:0 "Разведывательный отряд, отправленный на разведку Аппалачей, уже несколько недель не отвечает на наши радиосообщения. По последним данным, они только собирались войти в регион и не встретили особых проблем на своем пути. Мы можем только догадываться, что с ними случилось."
  bln_events.37.a:0 "Когда-нибудь мы это выясним"

  bln_events.38.title:0 "Экспедиция возвращается"
  bln_events.38.desc:0 "Экспедиция, которую мы отправили в Питт, вернулась с тревожными новостями. Почти все слухи о событиях, произошедших в регионе с момента нашего последнего визита, оказались правдой. Ашур выжил и собирает армию рейдеров с неизвестной целью. Рейдер, которого удалось захватить разведчикам, сказал, что он пытается создать государство с помощью промышленности и что они завозят рабов и рабочую силу со всей пустоши."
  bln_events.38.a:0 "Мы должны прекратить это"

  bln_events.39.title:0 "Экспедиция возвращается"
  bln_events.39.desc:0 "Отряд, отправленный в Нью-Йорк, подтвердил наши предположения. Как и округ Вашингтона или Питтсбург до нашего появления, Нью-Йорк представляет собой беззаконную пустошь, на которой воюют различные банды. Самую сильную из них, похоже, возглавляет человек, объявивший себя Герцогом Нью-Йорка. Те немногие объекты в районе, которые не были разрушены бомбами, либо разграблены этими бандами, не будут освоены ими, по крайней мере, в ближайшие пару десятилетий." 
  bln_events.39.a:0 "Не стоит нашего времени"

  bln_events.40.title:0 "«Придвен»"
  bln_events.40.desc:0 "Когда наши недавние проблемы остались позади, наши писцы начали смотреть в будущее. Некоторые из них собрались вместе и начали обсуждать проект могучего дирижабля, по сравнению с которым те, что наши братья со Среднего Запада вывезли на Восток, покажутся детским воздушным шариком. На проектирование и строительство уйдет много лет, не говоря уже об огромных ресурсных затратах. Но если они смогут сделать хотя бы половину того, на что, по их словам, способна эта штука, мы сможем продолжать нашу миссию как никогда раньше." 
  bln_events.40.a:0 "Мы его построим"
  
  bln_events.41.title:0 "Ограниченные ресурсы"
  bln_events.41.desc:0 "Даже по самым скромным подсчетам, для строительств «Придвена» потребуется более 40 000 тонн материалов. Это ещё ладно, если бы речь шла только о металлоломе, но большая часть корабля будет состоять из специальных сплавов и сложных электрических компонентов. Хотя на авиабазе Адамс есть достаточное количество специализированных компонентов для самолетов, которые можно переделать под наши нужды, многое из этого списка ещё предстоит найти." 
  bln_events.41.a:0 "Разбираем, что можем, покупаем, что должны"

  bln_events.42.title:0 "Строительство Титана"
  bln_events.42.desc:0 "Строительство такого массивного дирижабля — дело нелегкое. Один или два болта в неправильном месте могут сделать весь корабль в лучшем случае нелетабельным, а в худшем - смертельной ловушкой. Каждый шаг в процессе строительства должен быть выверен и перепроверен, а шагов очень много. В течение некоторого времени мы не сможем иметь больше, чем малые команды писцов, работающих над чем-либо ещё." 
  bln_events.42.a:0 "Может, утроить проверку?"

  bln_events.43.title:0 "Летающая Цитадель"
  bln_events.43.desc:0 "После более чем 6 лет работы Придвен наконец-то поднялся в воздух. Проводятся последние проверки, на корабль грузится оборудование. Массивный корабль виден за много миль и дает жителям пустоши понять, что Братство здесь, и у нас есть сила, чтобы достичь наших целей." 
  bln_events.43.a:0 "Кто теперь выступит против нас?"

  bln_events.44.title:0 "ФИНАЛЬНЫЙ чертеж 7-й редакции"
  bln_events.44.desc:0 "После более чем двух лет переписывания, наши писцы наконец-то завершили работу над дизайном «Придвена». Файл под названием «ФИНАЛЬНЫЙ чертеж 7-й редакции» был доставлен главному писцу Ротшильду и подписан. Вместе с чертежами был приложен огромный список оборудования и ресурсов, которые понадобятся для постройки." 
  bln_events.44.a:0 "О какой сумме идет речь?"

  bln_events.45.title:0 "Горы ресурсов"
  bln_events.45.desc:0 "Прошло более 2 лет, но согласно последней инвентаризации писцов, у нас есть все ресурсы, необходимые для постройки «Придвена». Более 40 000 тонн металла, сплавов и передовых компонентов хранятся на авиабазе Адамс под усиленной охраной. Естественно, кое-что из этого будет повреждено или потеряно при строительстве и потребует замены, но этим можно будет заниматься по мере строительства." 
  bln_events.45.a:0 "Теперь остается только построить его"

  bln_events.46.title:0 "Победа на проекте «Чистота»"
  bln_events.46.desc:0 "Благодаря Либерти Прайм и Прайду мы смогли вытеснить Анклав из проекта «Чистота». Их немногие солдаты, которые не погибли от лазерных глаз Прайма, были замечены бегущими на север. Это замечательный день, и у нас есть много ценного оборудования для наших писцов, но мы должны помнить, что в конце концов они вернутся с ещё большими силами."
  bln_events.46.a:0 "Это ещё не конец"

  bln_events.47.title:0 "Поражение на проекте «Чистота»"
  bln_events.47.desc:0 "Несмотря на помощь Либерти Прайма, мы не смогли выбить Анклав с проекта «Чистота». Их солдаты не начали погоню, когда остатки наших сил отступали, но мы видим, что они сидят там, через залив. Они собирают всё больше людей и укрепляют оборону. В конце концов они придут за нами."
  bln_events.47.a:0 "Мы должны подготовиться"

  bln_events.48.title:0 "Поражение на проекте «Чистота»"
  bln_events.48.desc:0 "Террористы, оккупировавшие Пентагон, вытеснили наших солдат с проекта «Чистота». Сообщается, что в своей атаке они использовали гигантского довоенного робота, известного как Либерти Прайм. Мы не можем допустить, чтобы эти подонки использовали для нападения на нас одно из величайших орудий довоенной Америки. Как только мы перегруппируемся, мы будем обязаны отомстить им."
  bln_events.48.a:0 "Мы только начинаем"

  bln_events.49.title:0 "Победа на проекте «Чистота»"
  bln_events.49.desc:0 "Братство Стали предприняло печальную попытку вытеснить нас с проекта «Чистота». Естественно, эти воинственные мусорщики оказались не в состоянии противостоять мощи правительства США и были отправлены обратно на свою базу с поджатым хвостом. Это нападение напомнило нам, что жители пустошей не будут рады нашему присутствию, и нам нужно укрепить оборону, прежде чем преследовать этих иародёров."
  bln_events.49.a:0 "Всему свое время"

  bln_events.50.title:0 "Это наша битва?"
  bln_events.50.desc:0 "Все в Пустоши знают, что Братство Стали недавно сразилось с Анклавом на проекте «Чистота». Теперь, когда пыль осела, Братство готовится к полномасштабной войне с этими людьми, и они призывают нас выступить на их стороне. Хотя Братство утверждает, что это делается для нашего блага и что Анклав в конце концов придет за нами в любом случае, некоторые задаются вопросом, действительно ли это наша битва."
  bln_events.50.a:0 "Мы будем стоять на стороне Братства"
  bln_events.50.b:0 "Мы не будем умирать на войне Братства"

  bln_events.51.title:0 "В Силовые установки Олни"
  bln_events.51.desc:0 "Электростанции Олни почти не трогали со времен Великой войны, и не зря. Из-за автоматических турелей и роботов сюда и так было непросто проникнуть, а тут ещё и когти смерти появились. Наш отряд, отправленный на поиски довоенного трансформатора Тесла, понес потери, но всё же добился успеха. Паладин Тристан вернулся с трансформатором и передал её нашим писцам. Если повезет, они смогут использовать его для разработки противодействия винтокрылам Анклава."
  bln_events.51.a:0 "Переломный момент"

  bln_events.52.title:0 "Защита Поселений"
  bln_events.52.desc:0 "Защита поселений Столичной Пустоши - это не просто альтруистическое стремление. Относительно безопасное дежурство обеспечивает хорошую подготовку послушников, привлекая новобранцев, и мы можем рассчитывать на вознаграждение за оказанную помощь. Готовясь отправить на службу новую партию послушников и младших рыцарей, мы должны решить, что попросим взамен."
  bln_events.52.a:0 "Прислать нам больше добровольцев"
  bln_events.52.b:0 "Главное - крышки"
  bln_events.52.c:0 "Пришлите нам технику"
  bln_events.52.d:0 "С ЧЕМ вы нашли грузовик?!?"

  bln_events.53.title:0 "Рабочие с Пустоши"
  bln_events.53.desc:0 "Нам удалось набрать внушительную армию подсобных рабочих, чтобы помочь с большим строительным проектом. Единственное, писцы всё ещё спорят о том, что именно они должны построить."
  bln_events.53.a:0 "Очистить здание, и сделать больше мастерских"
  bln_events.53.b:0 "Восстановить несколько довоенных генераторов"
  bln_events.53.c:0 "Кузницы, и переплавить весь этот металлолом"
  bln_events.53.d:0 "Освободите несколько зданий для мастерских"
  bln_events.53.e:0 "Восстановить несколько довоенных генераторов"
  bln_events.53.f:0 "Больше кузниц для Братства"

  bln_events.54.title:0 "Западные строители"
  bln_events.54.desc:0 "Несколько инженеров и рабочих были отправлены с Запада с последним конвоем, чтобы помочь нам использовать территорию вокруг Цитадели. На что мы можем их направить?"
  bln_events.54.a:0 "Расчистить здание для оружейных мастерских"
  bln_events.54.b:0 "Восстановить несколько довоенных генераторов"
  bln_events.54.c:0 "Мастерские для восстановления старых схем"
  bln_events.54.d:0 "Очистить несколько зданий для оружейных мастерских"
  bln_events.54.e:0 "Восстановить несколько довоенных генераторов"
  bln_events.54.f:0 "Мастерская по переработке материалов"

  bln_events.55.title:0 "Новые Рыцари Пустоши"
  bln_events.55.desc:0 "Сегодня мы чествуем первую партию новых послушников, получивших свои рыцарские звания. Эти братья показали себя крепкими бойцами, достойными своей роли в защите Братства. Это было трудное время с тех пор, как мы потеряли наших братьев-изгоев, но сегодня мы отмечаем начало новой эры в нашем отделении. Мы преодолеем эти трудности и однажды достигнем своей цели — уничтожим всех супермутантов на Столичной Пустоши."
  bln_events.55.a:0 "Поздравляю, Рыцари"
  bln_events.55.b:0 "Поздравляю, Рыцари"

  bln_events.56.title:0 "Здание радиостанции «Новости Галактики»"
  bln_events.56.desc:0 "Старая радиостанция «Новости Галактики» как и её радиопередатчик, неплохо сохранилась за эти годы. Наше отделение проявляло мимолётный интерес к этому месту, пока мы занимались другими делами, но когда наши солдаты прибыли туда, они столкнулись с гражданскими лицами, занимавшими здание и готовившимися выйти в прямой эфир с радиотрансляцией. По словам их лидера, человека, известного как Тридогнайт, они хотели использовать станцию ​​как базу, чтобы передавать последние новости и 200-летние мелодии Столичной Пустоши. Он сказал, что рад нашему визиту, потому что его охранники, похоже, не так хорошо справляются с задачей защиты этого места от супермутантов, как они изначально думали. Тридогнайт предложил рабочее партнёрство, в рамках которого мы будем охранять это место и помогать с необходимым ремонтом. Со своей стороны, мы получим стратегически важную точку в руинах Вашингтона для использования в качестве аванпоста, а Тридогнайт позаботится о том, чтобы Столичная Пустошь узнала о нашей борьбе от его имени."
  bln_events.56.a:0 "Мы поможем Тридогнайту в его сражении на светлой стороне"
  bln_events.56.b:0 "Нам нужно это место только для своих"

  bln_events.57.title:0 "Книги, книги и ещё раз книги"
  bln_events.57.desc:0 "Очистив здание от рейдеров, наши писцы смогли оценить состояние Библиотеки Конгресса. В то время как внешняя конструкция всё ещё стоит, многие книги внутри Библиотеки Конгресса рассыпались или были испорчены из-за того, что их не читали. К счастью, наши писцы нашли чертежи, которые показывают, что под зданием находится довоенная армейская база данных. К сожалению, в спешке они запустили автоматические системы безопасности. Теперь базу данных охраняют несколько уровней автоматических турелей и роботов-охранников. Если мы не поторопимся, данные будут стерты в качестве последней меры безопасности. Обычно прорыв через эту систему безопасности был бы просто ещё одним днем в жизни рыцаря Братства, но они также получили сигнал бедствия из поселения, находящегося в нескольких днях пути, которое атакуют супермутанты. Если они не отправятся в путь сейчас, поселение будет уничтожено."
  bln_events.57.a:0 "Данные важнее!"
  bln_events.57.b:0 "На карту поставлены жизни!"
  bln_events.57.c:0 "Не отвлекайтесь от данных и отправьте наемников на помощь поселению!"

  bln_events.58.title:0 "Форт Индепенденс"
  bln_events.58.desc:0 "Старый военный объект Форт Индепенденс за годы своего существования много раз переходил из рук в руки. Различные мародёры, группы рейдеров и даже стая радскорпионов занимали базу. Наши рыцари обычно избегали этого места, поскольку там никогда не было заметного присутствия супермутантов, а самые глубокие уровни, насколько нам известно, были защищены очень надёжными дверями. Мы только что получили сообщение, что старейшины на Западе хотят, чтобы мы послали отряд рыцарей и паладинов занять базу и выяснить, какие секреты скрываются внутри. Это отвлечет многих мужчин и женщин от борьбы с супермутантами, но, похоже, это действительно важно для старейшин."
  bln_events.58.a:0 "Крестовый поход на супермутантов важнее!"
  bln_events.58.b:0 "Пошлите несколько человек в форт"

  bln_events.59.title:0 "Финальный компромисс, часть 1"
  bln_events.59.desc:0 "Не секрет, что паладин Каден и многие другие недовольны изменениями в миссии и деятельности Отделения Лайонса, произошедшими за последние годы. Частые споры о необходимости истребления супермутантов проникают в повседневные разговоры, посвященные с пустоши часто подвергаются насмешкам со стороны рыцарей, придерживающихся западных взглядов, и нет предела неповиновению, когда приказы сверху вступают в противоречие с Кодексом. Тем не менее старейшина Лайонс верит, что эти радикалы могут одуматься, если пойти на некоторые уступки. Именно поэтому он вызвал паладина Кадена на встречу с ним, чтобы обсудить, как они смогут прийти к окончательному согласию, которое избавит их от этих проблем. Первое, что им предстоит обсудить, это, естественно, то, с чем не согласны многие сторонники приверженности кодексу, - помощь Братства жителям Пустоши."
  bln_events.59.a:0 "Мы нужны этим людям!"
  bln_events.59.b:0 "Убедить Кадена, что это выгодно ордену"
  bln_events.59.c:0 "Мы можем несколько сбавить обороты"
  bln_events.59.d:0 "Когда мы это делали?"

  bln_events.60.title:0 "Финальный компромисс, часть 2"
  bln_events.60.desc:0 "Разумеется, следующим пунктом для обсуждения станут рекруты и торговля с пустошами. Хотя в прошлом Братство разрешало это в очень редких и смягчающих обстоятельствах, Каден и другие приверженцы Запада считают, что старейшина Лайонс делает это слишком часто. По их мнению, слишком многие из этих новобранцев с Пустошей недостойны даже низкокачественных доспехов, которые выдают послушникам, а торговля с чужаками приводит лишь к неприятностям. Если у жителей пустоши есть технология, которой они не должны обладать, Братство должно просто взять её, а не пытаться вразумить их и получить «нет» в качестве ответа."
  bln_events.60.a:0 "Нам нужны все люди и ресурсы, которые мы можем получить!"
  bln_events.60.b:0 "Убедить Кадена, что плюсы перевешивают минусы"
  bln_events.60.c:0 "Разве мы уже не берем то, что хотим?"

  bln_events.61.title:0 "Финальный компромисс, часть 3"
  bln_events.61.desc:0 "Теперь наступила самая сложная часть обсуждения, часть, которой Старейшина боялся, - обсуждение миссии Отделения. С самого начала паладин Каден был всей душой против этого крестового похода на супермутантов. Да, Братство помогло остановить армию Мастера на западе, но это была серьезная угроза для всего человечества. А эти мутанты, по всем признакам, представляют собой региональную угрозу, которая не должна отвлекать Братство от его главной миссии. Оберегание ценных технологий для сохранения прогресса человечества и предотвращения их попадания в чужие руки, это гораздо важнее, чем судьба нескольких окраинных поселений на пустошах."
  bln_events.61.a:0 "Мы не можем бросить этих людей!"
  bln_events.61.b:0 "Убедить Кадена в серьезной угрозе супермутантов"
  bln_events.61.c:0 "Возможно, нам придется отказаться от этого дела..."

  bln_events.62.title:0 "Решение Кадена"
  bln_events.62.desc.1:0 "Старейшина Лайонс и паладин Касдин часами спорили, вели переговоры, а иногда просто кричали друг на друга. Но после того, что показалось вечностью, всё, что нужно было сказать, было наконец сказано. Похоже, ничто из того, что мог сказать старейшина, не могло убедить паладина в том, что он по-прежнему верен истинной цели Братства. После собрания паладин Каден поговорил с теми, кто всё ещё оставался верным сторонником Западного Братства, и они собрали вещи и отправились в Форт Индепенденс. Старейшина был в ярости и приказал вычеркнуть их имена из архивов отделения. Эти изгои сами выбрали свою судьбу, и они больше не наши братья. Те немногие верные братья, что ещё оставались в районе форта Индепенденс и руин Южного округа, были отведены назад, чтобы заткнуть дыры в обороне Цитадели. Даже сейчас в покинутые нами регионы стекаются беспринципные мародёры."
  bln_events.62.desc.2:0 "Старейшина Лайонс и паладин Каден часами спорили, вели переговоры, а порой и просто кричали друг на друга. Но после того, что казалось вечностью, всё, что нужно было сказать, было наконец сказано. Потребовалось много убеждений и несколько твердых обещаний, но паладин Каден всё-таки убедился, что старейшина Лайонс по-прежнему привержен истинной миссии Братства. После собрания паладин отправился поговорить с теми, кто подумывал об уходе, и убедил и их. Раскол нашего отделения, которого многие опасались, завершился несколькими кивками и бурным ропотом согласия. Что бы ни случилось дальше, наше Братство будет готово к этому."
  bln_events.62.a:0 "Раскол устранен прежде, чем он успел разрастись"
  bln_events.62.b:0 "Мы справимся и без них"
  bln_events.62.c:0 "Лайонсы - настоящие предатели!"

  bln_events.63.title:0 "Что было украдено"
  bln_events.63.desc:0 "Когда Каден уходил со своими изгоями, они позаботились о том, чтобы разграбить всё, что можно. Мы потеряли не только значительную часть живой силы, но и значительные запасы оружия, силовой брони и прочих других необходимых нам вещей."
  bln_events.63.a:0 "Подлые воры!"

  bln_events.64.title:0 "Брат на Брата"
  bln_events.64.desc:0 "Даже в самые мрачные времена, когда покойный старейшина Оуэн Лайонс едва удерживал наше отделение вместе, мы никогда не думали, что это произойдет. В ответ на новый Восточный Кодекс старейшины Сары Лайонс непримиримые члены нашего ордена, которые оставались с нами даже во время войны с Анклавом, направили свои винтовки на своих братьев по отделению. Сейчас мы находимся в эпицентре гражданской войны, которая закончится только одним из двух вариантов: либо старейшина Лайонс, либо паладин Каден должен умереть."
  bln_events.64.a:0 "Смерть паладину-предателю!"
  bln_events.64.b:0 "Касдин прав! Хватит - значит хватит!"

  bln_events.65.title:0 "Несправедливое изгнание"
  bln_events.65.desc:0 "Писец Бигсли не сделал ничего плохого, чтобы заслужить этот перевод на проект «Чистота». Его перевод был всего лишь результатом нескольких казусов и разногласий, которые, очевидно, не допускаются в Братстве. Бывший писец Ордена Меча, Бигсли был переведен в Орден Щита после того, как несколько модифицированных им лазерных винтовок ранили пару послушников, которые не смогли справиться с дополнительной мощностью. Затем он был переведен в Орден Пера после того, как сказал писцу Боудичу, что некоторые из его теорий о разработке брони устарели. Разве Братство не должно всегда стремиться к улучшению брони, а не застревать в прошлом? Что касается его пребывания в Ордене Пера и ссоры с Писцом Джеймсоном, то это слишком долгая история, чтобы пересказывать её. Главное, что он был прав, и за это преступление он теперь нянчится с кучкой ученых Ривет-Сити и младших писцов, которые едва могут переформатировать голозапись. Потребовались недели сложной работы, чтобы очиститель заработал в полную силу после битвы, а Бигсли за это время почти не спал. Если это было ещё не так страшно, то самое страшное ещё впереди ведь работа только началась."
  bln_events.65.a:0 "Он был таким талантливым"

  bln_events.66.title:0 "Рейдерское нападение"
  bln_events.66.desc:0 "Как будто иметь дело с невежественными учеными Ривет-Сити было недостаточно плохо, Писец Бигсли вынужден работать с охраной Ривет-Сити над организацией водных караванов. Эта Офицер Лепеллетье не может справиться даже с несколькими рейдерами, которые грабят караваны. В итоге Бигсли пришлось нанять наёмников, чтобы те проследили за рейдерами и внедрились в их группу. Наёмники только что сообщили, что группа рейдеров организована парнем по имени Одноглазый Джек, который хочет вытрясти из службы безопасности Ривет-Сити деньги за защиту, чтобы не совершать набеги на караваны. У Бигсли остается два варианта. Играть в поддавки и откупиться от рейдеров, или послать отряд рыцарей, чтобы уничтожить их?"
  bln_events.66.a:0 "За эту воду и так гибнет достаточно наших парней"
  bln_events.66.b:0 "Никаких сделок с рейдерами. Убейте их всех"

  bln_events.67.title:0 "Неприятности в Мегатонне"
  bln_events.67.desc:0 "Мы получаем сообщения и жалобы о том, что наша вода необъяснимым образом вызывает смерти в Мегатоне, и что большая часть воды даже не поступает в Мегатонну. Наши солдаты, однако, подтвердили, что грузы доходят до Мегатонны, и то небольшое количество воды, которое они получают, похоже, подтверждает это. Остается вопрос: что происходит с остальной водой? И почему она убивает людей?\n\nНичего не остается, кроме как послать патруль, чтобы потрясти дерево и посмотреть, что из него выпадет."
  bln_events.67.a:0 "Что здесь происходит?"

  bln_events.68.title:0 "Великолепная лечебная вода!"
  bln_events.68.desc:0 "Гуль по имени Гриффин обратился к Писарю Бигсли с предложением купить очищенную воду, чтобы продать её гулям в Подземелье. Бигсли не знает, зачем каким-то там гулям чистая вода, если она им ничем не поможет, но гули платят, так почему бы и нет?"
  bln_events.68.a:0 "Принимать оплату в крышках"
  bln_events.68.b:0 "Принять оплату в технике"
  bln_events.68.c:0 "Прогоните гуля"

  bln_events.69.title:0 "Рейдерские атаки прекратились"
  bln_events.69.desc:0 "После некоторых усилий и множества выстрелов нам удалось уничтожить самых опасных рейдеров. Угроз для наших караванов и так предостаточно, но теперь не нужно бороться ещё и с бандитами. Вырубив на корню источники появления рейдеров, мы можем гарантировать, что любой, кто попытается присвоить себе их звание, встретит упорное сопротивление со стороны наших солдат и минимум помощи, даже среди рейдеров. Наши караваны должны быть достаточно безопасны, чтобы доставлять воду."
  bln_events.69.a:0 "Отличные новости!"

  bln_events.70.title:0 "Вода, везде вода..."
  bln_events.70.desc:0 "Проект «Чистота» до сих пор служил нам хорошей базой, но если мы действительно хотим доставлять воду в пустошь, нам следует рассмотреть другие варианты. В пустоши есть множество мест, которые могли бы послужить распределительными узлами, куда мы отправим воду перед тем, как отправить её дальше в пустоши, чтобы организовать наши караваны и воспользоваться местными услугами. Конечно, на пути к распределительному центру существует угроза нападения, но, обеспечив дополнительную безопасность, мы сможем хотя бы снизить риски и получить выгоду.\n\nВ конечном итоге остается один важный вопрос:"
  bln_events.70.a:0 "С чего нам начать?"

  bln_events.71.title:0 "Битва за проект «Чистота»"
  bln_events.71.desc.1:0 "Анклав захватил проект «Чистота» и выводит очиститель в сеть. Мы не можем знать, что они собираются делать с таким важным инструментом, но это не к добру. Сара Лайонс убедила Старейшину начать немедленную атаку на очиститель, и мы не должны сдерживаться. Мы введем в бой Либерти Прайма, чтобы помочь в атаке."
  bln_events.71.desc.2:0 "Анклав захватил проект «Чистота» и выводит очиститель в сеть. Мы не можем знать, что они собираются делать с таким важным инструментом, но это не к добру. Сара Лайонс убедила Старейшину начать немедленную атаку на очиститель, и мы не должны сдерживаться. Мы введем в бой Либерти Прайма, чтобы помочь в атаке, хотя мы всё ещё не разобрались со всеми проблемами его энергосистемы."
  bln_events.71.a:0 "Давайте, атакуем немедленно!"
  bln_events.71.b:0 "Отложите атаку и убедитесь, что Либерти Прайм работает!"

  bln_events.72.title:0 "Приготовились и... Начали!"
  bln_events.72.desc:0 "Либерти Прайм заработал и движется к Цитадели, пока мы говорим. Если повезёт, его системы наведения не дадут сбой, и он пойдет в авангарде штурма. В противном случае этот нелегкий бой может оказаться проигрышным."
  bln_events.72.a:0 "За Братство!"

  bln_events.73.title:0 "Ривет-Сити открыт для бизнеса"
  bln_events.73.desc:0 "Ривет-Сити, сближаясь с Братством, предоставил нашим писцам и рыцарям доступ к городу, чтобы использовать его в качестве центра для распространения воды проекта «Чистота». Мы можем продолжать работать, как и раньше, но, несомненно, будет полезно, если силы безопасности Ривет-Сити будут содействовать патрулям наших караванов."
  bln_events.73.a:0 "С такими друзьями..."

  bln_events.74.title:0 "Водные забавы Мегатонны"
  bln_events.74.desc:0 "Мегатонна, сближаясь с Братством, предоставил нашим Писцам и Рыцарям доступ к городу, чтобы использовать его в качестве центра для распределения воды проекта «Чистота». Мы можем продолжать работать, как сейчас, но, несомненно, нам будет полезна дополнительная поддержка со стороны мусорщиков и жителей Мегатонны."
  bln_events.74.a:0 "С такими друзьями..."

  bln_events.75.title:0 "Блюз святой воды"
  bln_events.75.desc:0 "Наше расследование о поставках воды в Мегатонну дало результаты! Оказывается, наши караваны, доставляющие воду в Мегатонну, привозят её некой «Матери Кюри», которая должна передать воду другим жителям Мегатонны. К сожалению, матушка Кюри помешана на религии.\n\nОна принадлежит к культу, известному как «Дети Атома», и облучает воду, считая, что это делает её святой. Она давала воду всем, кто проходил мимо, а остальную воду отправляла в Мегатонну, убивая тем самым её жителей радиацией.\n\nДостаточно сказать, что солдаты, передавшие воду Матери Кюри без более тщательного изучения её происхождения и мотивов, будут наказаны, но нам всё равно нужно решить, что делать со всей этой ситуацией."
  bln_events.75.a:0 "Лучше отговорить её от этого"
  bln_events.75.b:0 "Она убила людей, суд не требуется"

  bln_events.76.title:0 "Мы упустили момент"
  bln_events.76.desc:0 "В течение трех месяцев мы наблюдали, как Анклав превратил проект «Чистота» из разрушающегося памятника в настоящую крепость. Посадочные площадки винтокрылов, усовершенствованные энергетические барьеры и несколько бетонных бункеров значительно усложнили захват очистителя. Все шансы на то, что нам удастся выбить этих солдат с помощью небольшой ударной группы, исчезли. Если мы хотим захватить объект, нам понадобится целая армия."
  bln_events.76.a:0 "Приготовьтесь к войне"

  bln_events.77.title:0 "Сообщение из Столичной Пустоши"
  bln_events.77.desc:0 "К нам пришло сообщение от [BLN.GetNameDef], которые сумели взять под контроль проект «Чистота» в Столичной пустоши и теперь располагают огромным количеством чистой воды. В обмен на часть этой воды они просят у нас помощи, чтобы переправить реки и доставить воду в остальные районы Пустоши. \n\nЭта сделка кажется простой и выгодной для всех сторон, но мы можем привязаться к империи, которая захочет доминировать и над нашим образом жизни."
  bln_events.77.a:0 "Отличная идея"
  bln_events.77.b:0 "Начнем с того, что они будут заниматься только своей доставкой..."

  bln_events.78.title:0 "Рыбаки Залива согласились!"
  bln_events.78.desc:0 "Неудивительно, что Рыбаки Залива приняли наше предложение о воде в обмен на помощь. Дуврские торговцы слишком долго угрожали их водам, и если они получат нашу защиту и дружбу, то смогут быть более уверенными в своем положении. \n\nКонечно, это прекрасная новость и для нас. Мы получим помощь их кораблей в доставке воды в пустоши, а это значит, что путешествия станут куда безопаснее."
  bln_events.78.a:0 "Нашим друзьям в Делмарве"
  bln_bfi_delivery_support_tt:0 "Поддержка от §BРыбаков Залива§! повысит §Gвероятность§! того, что наши караваны дойдут в целости и сохранности."

  bln_events.79.title:0 "Торговцы Дувра приняли предложение!"
  bln_events.79.desc:0 "Властолюбивые торговцы Дувра приняли наше предложение, и в обмен на воду они помогут нам запустить нашу сеть водоснабжения. Дуврские торговцы отличаются агрессивной меркантильностью и считают эту сделку прекрасным способом расширить свою торговлю на новые земли и даже на внутренние районы через нас.\n\nНам это тоже выгодно, конечно, и их торговцы помогут нам распределять воду по остальной части пустоши."
  bln_events.79.a:0 "А этот немного похож на пирата"
  bln_dot_delivery_support_tt:0 "Поддержка от §gТорговцев Дувра§! позволит §Gуменьшить§! бюрократическую нагрузку на наших писцов."

  bln_events.80.title:0 "[FROM.GetName] отказались"
  bln_events.80.desc:0 "Удивительно, но [FROM.GetName] отказались от нашего предложения о торговле водой и улучшении коммерческих отношений. Они опасаются потерять свой суверенитет и рисковать своей свободой ради экономической выгоды."
  bln_events.80.a:0 "Они совершили ошибку"

  bln_events.81.title:0 "Когда-то все мы были американцами"
  bln_events.81.desc:0 "Ситуация с водораспределительной сетью становится настолько плохой, что многие другие обращают на это внимание, включая некоторых... неблагополучных персонажей. Несколько дезертиров из Анклава дали понять, что готовы предложить нам свои услуги, если мы просто дадим им амнистию.\n\nЭти дезертиры - в большинстве своем военные преступники и жестокие бандиты, и никому из них нельзя доверять (а их силовая броня делает их труднодоступными для быстрой атаки). Несмотря на это, они обученные и элитные солдаты с отличным снаряжением, а наша водораспределительная сеть находится в плохом состоянии. Можем ли мы позволить себе отказать им?"
  bln_events.81.a:0 "Конечно, нет, казните их"
  bln_events.81.b:0 "Тяжелые времена требуют отчаянных мер..."
  bln_recruited_enclave_deserters_tt:0 "Эти дезертиры из Анклава сделают наши караваны §Gболее защищенными§!, §Oно можем ли мы быть уверены, что можем им доверять...?§!"

  bln_events.82.title:0 "Дважды дезертиры"
  bln_events.82.desc:0 "К сожалению, но к всеобщему удивлению, дезертиры Анклава снова дезертировали. После того как их отправили на обычное задание с караваном, они расстреляли своих подопечных, украли воду и исчезли в пустоши. Вряд ли стоит тратить ресурсы на их поиски, это просто ещё одна потеря для водораспределительной сети."
  bln_events.82.a:0 "Похороните этот инцидент в архивах"

  bln_events.83.title:0 "Дрязги писцов"
  bln_events.83.desc:0 "Расчистив ещё одну область подуровней для работы, писцы обрадовались перспективе получить больше места и ресурсов. Но потом они поняли, что всем им места не хватит. Ордену Меча нужны новые полигоны для испытания оружия, Ордену Щита - новые мастерские по изготовлению доспехов, а Ордену Пера - больше места для объёмов данных, которые они постоянно приносят и которые могут быть полезны."
  bln_events.83.a:0 "Орден Меча"
  bln_events.83.b:0 "Орден Щита"
  bln_events.83.c:0 "Орден Пера"

  bln_events.84.title:0 "Некрасивые препирательства"
  bln_events.84.desc:0 "Рыцари безостановочно спорят о том, как будет использована недавно расчищенная территория. Некоторые из наших главных рыцарей предложили использовать эту территорию в качестве казармы для недавно набранных рыцарей и посвящённых, которые обычно спят во дворе. Многие рыцари категорически против этой идеи и требуют использовать территорию для более важных целей, например, для оружейной мастерской или склада довоенной техники."
  bln_events.84.a:0 "Построить казармы"
  bln_events.84.b:0 "Нам бы не помешало больше мастерских"
  bln_events.84.c:0 "Нам нужно больше складских помещений?"
  
  bln_events.85.title:0 "Учебник по распределению воды"
  bln_events.85.desc:0 "Завершив проект «Чистота» и возложив на Бигсли ответственность за распределение добытой воды, Братство теперь должно выполнять свою новую обязанность.\n\nСистема распределения воды имеет четыре значения: Бюрократия, кадры, оборудование и подготовка.\n\nБюрократия - это показатель того, насколько Бигсли и его писари стараются поддерживать всё в рабочем состоянии. В идеале бюрократия минимальна, и есть тенденция к её снижению, но чем больше средств выделяется на другие сферы (например, подготовку), тем больше работы приходится выполнять писцам. Важно сбалансировать потребности писцов с потребностью в воде.\n\nКадры и оборудование повышают шансы каждого каравана добраться до места назначения. Они прямо увеличивают шанс на успех. Скорее всего, для успешных караванов вам не понадобится использовать оба показателя, поэтому, возможно, стоит снизить один из них, чтобы облегчить работу писцам.\n\nПредварительная подготовка просто определяет, сколько караванов будет отправляться каждую неделю. Каждый караван будет требовать больше людей и оборудования, так что имейте это в виду.\n\nКараваны будут автоматически отправляться каждую неделю без вмешательства игрока. Шанс их успеха в основном определяется оборудованием и рабочей силой, но могут возникнуть и другие ситуации, которые могут повлиять на ситуацию. Об этом вам будет сообщено в событии. Если вы забыли, что делает тот или иной модификатор, в каждой части графического интерфейса есть подсказка, которая появится, если навести курсор на этот раздел.\n\nВозможности улучшить сеть, например, построить заводы по розливу, появятся после выполнения большего количества заданий."
  bln_events.85.a:0 "Постарайся сохранить Бигсли в здравом уме, ладно?"

  bln_events.86.title:0 "Архивы"
  bln_events.86.desc:0 "Войдя в Национальный архив, наши писцы были полны оптимизма, когда увидели, что система безопасности всё ещё работает. Воспользовавшись кодами доступа, найденными в архивах Цитадели, они смогли проигнорировать роботов-охранников и турели, которые рыскали по нижним уровням. Чего они никак не ожидали, так это появления протектрона, возомнившего себя Баттоном Гвинеттом. Похоже, единственной целью робота была защита Декларации независимости, и, видя, что мы - американские военные, он решил, что мы здесь, чтобы освободить его."
  bln_events.86.a:0 "Оставьте его при исполнении служебных обязанностей и обыщите остальные архивы."
  bln_events.86.b:0 "Война окончена, ты свободен."
  bln_events.86.c:0 "Новый приказ. Покинь этот объект и сражайся с Оранжевыми мундирами."

  bln_events.87.title:0 "Требования Братства"
  bln_events.87.desc:0 "Братство всегда доставляло немало хлопот Столичной Пустоши, но в последнее время они облагают налогом караваны и вымогают у жителей Пустоши оборудование, чтобы якобы справиться с угрозой супермутантов. Последнее и самое наглое их требование: поставляйте нам оружие, иначе...\n\nХотя они вряд ли будут усиливать угрозу и доводить её до конца, это обескураживает наших граждан, которые и так беспокоятся об угрозе, которую Братство может представлять для нашего образа жизни. Может быть, лучше смириться и дать им оружие - наверняка на этом всё и закончится?"
  bln_events.87.a:0 "Конечно, но это в последний раз"
  bln_events.87.b:0 "Мы скажем им, куда они могут засунуть это оружие"

  bln_events.88.title:0 "Паладин Курц"
  bln_events.88.desc:0 "Есть ряд квалифицированных Паладинов, которые могли бы восстановить стабильность в Питте раз и навсегда. Однако руководством настоятельно рекомендуется недавно повышенный в должности Паладин Курц. В первые дни конфликта с Анклавом тогдашний Рыцарь Курц взял под свой контроль команду по обучению послушников, когда их Паладин был убит. Курц вывел новичков с территории супермутантов без дальнейших потерь. По пути к цели команда также уничтожила впечатляющее количество супермутантов. Затем Курц был отправлен на передовую, где он хорошо послужил во время осады базы ВВС Адамс. После конфликта он провел ещё много успешных миссий в глубине руин Вашингтона. Способность Паладина эффективно действовать отдельно от командования является большой частью того, почему его рекомендовали на эту должность. Хотя некоторые опасаются, что его боевой опыт может не очень хорошо сочетаться с другими аспектами управления Питтом."
  bln_events.88.a:0 "Он справится"

  bln_events.89.title:0 "Знаки Братства"
  bln_events.89.desc:0 "Благодаря дополнительным ресурсам, которые мы отправили в экспедицию на Средний Запад, нам удалось обнаружить гораздо больше признаков присутствия Братства. Наших рыцарей тепло встретили в поселениях, приняв их за членов этого Братства Среднего Запада, к которым, по всей видимости, относятся с уважением. После остановок в нескольких поселениях к ним подошла группа рыцарей из этого Братства Среднего Запада. Сначала они приняли нашу команду за самозванцев, пытающихся воспользоваться расположением поселения, но наша команда смогла убедить их в правде. Сейчас они работают с нашей командой над установлением защищённого радиоканала между Цитаделью и своим главным бункером."
  bln_events.89.a:0 "Это, конечно, приятный сюрприз"

  bln_events.90.title:0 "Знаки Братства"
  bln_events.90.desc:0 "Благодаря дополнительным ресурсам, которые мы отправили в нашу экспедицию на Средний Запад, нам удалось обнаружить гораздо больше признаков присутствия Братства. К сожалению, это нехорошо. Многие дороги Среднего Запада усеяны распятыми жителями пустошей, а жители деревень съеживаются при виде силовой брони. С тех пор мы не высовываемся, избегая любых контактов с местными жителями или случайными патрулями. Мы заметили то, что возможно является рабскими трудовыми лагерями, охраняемыми солдатами в какой-то странной силовой броне. Очевидно, что кто бы ни руководил этим Братством Среднего Запада, у него нет ничего общего с нашими Старейшинами."
  bln_events.90.a:0 "Нам следует отозвать нашу экспедицию"

  bln_events.91.title:0 "Знаки Братства"
  bln_events.91.desc:0 "Благодаря дополнительным ресурсам, которые мы отправили в нашу экспедицию на Средний Запад, мы смогли найти гораздо больше признаков присутствия Братства. К сожалению, эти признаки указывают на их ужасный конец. Обломки и трупы усеивают бесчисленные поля сражений, очень похожие на то, что впервые обнаружила наша экспедиция. Однако, в отличие от того первого поля боя, мы обнаружили тело одного из солдат противника, погребённое под завалами. На теле, которое они нашли, была силовая броня X-01 с маркировкой анклава. Они также нашли несколько упоминаний о «Чикагском Анклаве» в документах, найденных среди погибших. Если судить по кровавой бойне на этих полях сражений, этот «Чикагский Анклав» гораздо больше, чем был Анклав Эдема."
  bln_events.91.a:0 "Мы отомстим за наших братьев"

  bln_events.92.title:0 "Встреча с Министром"
  bln_events.92.desc:0 "Пробраться в самое сердце бункера Министра было непросто даже для Прайда. Они сражались с отчаянными защитниками анклава, автоматическими турелями, боевыми роботами и мерзостями, вырвавшимися из глубин своих лабораторий. Когда они наконец добрались до помещения, где находился Министр, по внутренней связи бункера завыла тревога. \n \n §RСАМОУНИЧТОЖЕНИЕ ЗАПУЩЕНО!§! \n \n Прайду пришлось спешить к выходу, но им удалось кое-что прихватить по пути."
  bln_events.92.a:0 "Чертежи брони Теслы"
  bln_events.92.b:0 "Секреты управления когтями смерти"
  bln_events.92.c:0 "Нам не нужен Анклавный мусор!"
  
  bln_events.93.title:0 "Встреча старейшин"
  bln_events.93.desc:0 "За последнюю неделю [BLN.GetLeader] из Братства Лайонса путешествовал со старейшиной Сайрусом из Братства Среднего Запада, посещая некоторые территории отделения на Среднем Западе. В этом недельном походе было много остановок, кульминацией которого стала прогулка по недавно возобновившему работу заводу Братства Среднего Запада по производству Ядер-Колы. За ужином, состоящим из стейков из браминов и бутылок свежей Ядер-Колы с конвейера, старейшины до поздней ночи обсуждали идеологию. И [BLN.GetLeader], и Сайрус постоянно возвращались к тому, как они рады найти ещё одно отделение Братства, разделяющее их ценности. Среди других обсуждаемых тем были торговля, реформы кодекса и будущее пустоши. По окончании поездки оба старейшины нашли друг в друге товарищей и союзников, с которым они смогут восстановить пустошь."
  bln_events.93.a:0 "Мы пойдем вперед вместе!"
  bln_events.93.b:0 "ВАУ, ТАК ПОЛЕЗНО 100!"

  bln_events.94.title:0 "Холодный прием"
  bln_events.94.desc:0 "Прошло уже несколько недель с момента падения Братства Айронса, однако на Среднем Западе всё ещё неспокойно. Это большая территория, и известие о смерти Айронса не дошло до всех, поэтому многих наших братьев, отправившихся туда, чтобы предотвратить беззаконие, принимают за людей Айронса. Было даже немало случаев, когда по нашим людям стреляли из-за этой ошибки, и это только обычные гражданские лица. Помимо атмосферы недоверия и страха, есть немало местных лидеров, пытающихся заявить о своих правах. Похоже, нас ждёт долгий путь."
  bln_events.94.a:0 "Потребуются годы, чтобы исправить ущерб, нанесенный Айронсом"
  
  bln_events.95.title:0 "Цель ликвидирована"
  bln_events.95.desc:0 "Рано утром винтокрылы Братства Лайонса атаковали передовой лагерь рыцаря-командора Робинсона, летя быстро и низко, чтобы избежать обнаружения радарами. Члены Братства Лайонса быстро высадились и устремились к командной палатке Робинсона, прежде чем оборона лагеря успела полностью мобилизоваться. Прайд вернулся к винтокрылу и ​​направился к территории отделения Лайонса, уничтожив свою цель."
  bln_events.95.a:0 "Черт бы их побрал!"
  bln_events.95.b:0 "Молодец, Прайд!"

  bln_events.96.title:0 "Удивительная находка"
  bln_events.96.desc:0 "Наша разведывательная группа, отправленная на поиски техники на Среднем Западе, передала по радио удивительные новости. Они обнаружили следы недавней активности Братства. По ошибке они наткнулись на какое-то забытое поле битвы, где были найдены обломки техники с эмблемой Братства. Интересно, что среди ржавого металла и скелетов был найден бортовой журнал погибшего рыцаря. В книге указано, что Братство Среднего Запада действовало в этом регионе как минимум до 2275 года! Это полностью опровергает наши предыдущие предположения о том, что отсутствие контактов с членами Братства во время нашего похода из Лост-Хиллз означало их полное уничтожение. Теперь команда переключает поиски на поиски новых следов этой затерянной главы."
  bln_events.96.a:0 "Мы, должно быть, не слишком внимательно искали"

  bln_events.97.title:0 "Полёты на Луну?"
  bln_events.97.desc:0 "Космическая База Ванбюрен была не просто очередным форпостом Анклава, использовавшимся для демонстрации своей силы против мирного населения. Эта база была центром передовых ракетных исследований с единственной целью – запуском людей в космос. Похоже, эта ветвь Анклава во многом напоминала многие в довоенном мире, которые, увидев, что происходит с Землёй, решили, что проще покинуть её ради другого мира, чем что-то исправить. По нашим оценкам, им ещё предстояло пройти многие десятилетия, если не столетия, до достижения другой пригодной для жизни планеты. Похоже, они добились определённого прогресса в высадке людей на Луну, но что там могло стоить стольких ценных ресурсов?"
  bln_events.97.a:0 "У нас есть дела поважнее"
  bln_events.97.b:0 "Давайте посмотрим, что там наверху"

  bln_events.98.title:0 "Последняя битва"
  bln_events.98.desc:0 "Командный бункер Онтарио – место, куда Анклав Онтарио отступил более 30 лет назад, когда их вытеснило местное население. Когда они вновь появились, чтобы терроризировать Торонто, они разграбили большую часть городской техники, чтобы поддерживать бункер в рабочем состоянии. После ожесточённых боёв этот бункер и вся техника внутри теперь наши. Мы уже отправили отряд писцов, чтобы те присоединились к рыцарям в бункере. Этот прото-отдел останется там на некоторое время, каталогизируя содержимое бункера и его архивы. Они уже нашли одну ценную вещь – чертежи усовершенствованного комплекта брони, который занимает промежуточное положение между разведывательной и силовой броней."
  bln_events.98.a:0 "Отличная работа."

  bln_events.99.title:0 "Замороженная реликвия"
  bln_events.99.desc:0 "Командный бункер Онтарио – это место, куда Анклав Онтарио отступил более 30 лет назад, когда их вытеснило местное население. Когда они снова появились, чтобы терроризировать Торонто, они покинули бункер и основали там свой небольшой форпост. Мы знали, что они заберут практически всё ценное, покидая это место, но когда патруль наткнулся на карту, показывающую его местоположение, нам пришлось взглянуть. К счастью, там не было никаких останков Анклава. Как мы и ожидали, почти всё ценное было давно вывезено. Осталась только одна вещь, которая была не совсем бесполезной – старый ржавый терминал «РобКо». Когда наши писцы запустили его, чтобы проверить технические данные, они с удивлением обнаружили схемы усовершенствованного доспеха, который является промежуточным звеном между разведывательной броней и силовой броней. Писцы Ордена Щита с нетерпением ждут возможности заполучить этот экземпляр, когда терминал будет доставлен сегодня на винтокрыле."
  bln_events.99.a:0 "Отличная работа!"

  bln_events.100.title:0 "Беспокойные вести"
  bln_events.100.desc:0 "Наши разведчики сообщили по радио об ужасающем развитии событий. За последние несколько дней им едва удалось избежать столкновения с несколькими патрулями солдат в броне с маркировкой Анклава. Судя по их наблюдениям, Торонто — своего рода база Анклава, где находятся сотни, если не тысячи солдат. Они запрашивают немедленное подкрепление или приказ отступать."
  bln_events.100.a:0 "Возвращайтесь и расскажите всё"

  bln_events.101.title:0 "Братство Залива Живо!"
  bln_events.101.desc:0 "Наша экспедиция во Флориду сообщила, что установила контакт с Братством Залива. Члены отделения рады видеть, что в этой части страны всё ещё есть дружелюбные лица за силовой броней. Мы установили радиосвязь и поддерживаем хорошие отношения с нашими далёкими братьями. Даже ведутся разговоры о сотрудничестве в рамках некоторых исследовательских проектов и экспедиций в пустоши Теннесси."
  bln_events.101.a:0 "Отличные новости!"

  bln_events.102.title:0 "Отделение Лайонса?"
  bln_events.102.desc:0 "Экспедиция рыцарей Братства из Столичной Пустоши прибыла во Флориду в поисках нас! Их руководитель упомянул, что, исследуя отделение Среднего Запада, они наткнулись на несколько документов, упоминающих о нашем существовании. Их старейшина счёл нужным отправить группу на проверку, и эта новость вызвала ликование в нашем отделении. После печального падения Сайруса и остальных членов Братства Среднего Запада мы думали, что остались одни на восточном побережье. Теперь, похоже, у нас есть друзья всего в нескольких штатах отсюда."
  bln_events.102.a:0 "Лучшие новости за последнее время!"

  bln_events.103.title:0 "Как это могло произойти?"
  bln_events.103.desc:0 "Когда нашу экспедицию отправили во Флориду на поиски затерянного Братства Залива, мало кто был настроен оптимистично по поводу их находки. Однако никто не ожидал, что Анклав окажется во Флориде и будет ответственен за гибель наших братьев! Наша экспедиция едва избежала патрулирования и сообщений о том, что главная база этого Анклава во Флориде проводит испытания крупных ракет. Мы не можем оставаться в стороне, пока Анклав разрабатывает арсенал межконтинентальных баллистических ракет!"
  bln_events.103.a:0 "Мы должны остановить их, пока не стало слишком поздно!"

  bln_events.104.title:0 "Странное место"
  bln_events.104.desc:0 "Мутанты-гангстеры, бандиты и наркоманы — лишь некоторые из странностей, обитающих на пустошах Флориды. Наша экспедиция не нашла ничего, кроме следов Братства Залива. Осталось лишь несколько предметов с маркировкой братства, затерянных в заброшенных бункерах. Что с ними случилось, останется загадкой."
  bln_events.104.a:0 "Позор"

  bln_events.105.title:0 "Братство найдено?"
  bln_events.105.desc:0 "Когда наши разведчики возвращались из похода на запад, к ним подошёл человек в плаще, назвавшийся Камелотом, последним паладином Среднего Запада. Забрав у него оружие, рыцари выслушали его рассказ. Он рассказал им, что не так давно здесь, в этих краях, существовало другое отделение Братства, гораздо ближе к нашему, чем то, что мы видели. В итоге их уничтожило Братство Айронса, а его члены либо принесли клятву верности Айронсу, либо были распяты. Паладин Камелот настоял на том, чтобы он вернулся с патрулём, чтобы встретиться со старейшиной и обсудить план мести за свой орден."
  bln_events.105.a:0 "Приведите его в Цитадель"
  bln_events.105.b:0 "Мы не можем доверять ему"

  bln_events.106.title:0 "Возвращение Вирджинской экспедиции"
  bln_events.106.desc:0 "Наша экспедиция в Вирджинию наконец вернулась из своего набега в быстро расширяющиеся болота. В сердце болота они нашли открытое убежище, которое, казалось, подтвердило наши ожидания, что это ещё один эксперимент убежища, пошедший не так. Они не смогли пробраться в убежище, потому что были атакованы племенами, когда разбивали лагерь. Большая часть экспедиции вернулась, но их преследовали всё время до границ болота. Если мы хотим остановить эту машину, нам нужно отправить значительные силы в чащу."
  bln_events.106.a:0 "Приготовьте огнемёты"
  
  bln_events.107.title:0 "Возвращение Вирджинской экспедиции"
  bln_events.107.desc:0 "Наша экспедиция в Вирджинию наконец вернулась из своего набега в быстро расширяющиеся болота. В сердце болота они нашли открытое убежище, которое, казалось, подтвердило наши ожидания, что это ещё один эксперимент убежища, пошедший не так. К их большому удивлению, их встретили дружелюбные племена, возглавляемые пустошницей в лабораторном халате. Пустошница представилась как доктор Робинсон и приветствовала нашу экспедицию для осмотра убежища. Она была очень откровенна с информацией, включая месяцы тестирования и исследований в убежище, которые были адекватно задокументированы для пуштошника. Хотя её утверждения, что воздействие дефектного ГЭККА в сердце убежища привело к психическим способностям у некоторых племён, сомнительны, они всё же заслуживают дальнейшего изучения. Перед тем как наша экспедиция ушла, доктор сделала предложение. Она предложила предоставить нам неограниченный доступ к убежищу, а также любую помощь или удобства, необходимые нашим писцам, при условии, что мы поможем племени, если оно подвергнется атаке со стороны пустошников. Поскольку мы всё равно не хотим, чтобы эта машина попала в руки пустошников, это очевидное "да" с нашей стороны."
  bln_events.107.a:0 "Мягко говоря, удивительно"

  bln_events.108.title:0 "Странная миссия"
  bln_events.108.desc:0 "Последний разговор Старейшины с Старейшинами в Лост-Хиллс был довольно стандартным. Отчёты о проекте Либерти Прайм, запросы о прогрессе в поисках в руинах Столичной Пустоши и обновления статуса множественных экспедиций, которые Лайонс придумал, чтобы оправдать существенные запросы на подкрепления за последние годы. Разговор закончился новой директивой из Лост-Хиллс. По какой-то причине, которую никто в Цитадели не мог понять, они хотят, чтобы наш Старейшина отправил 200 рыцарей и писцов в старый объект в Кентукки под названием Форт-Нокс.\n\nНасколько показывают наши записи, объект был довоенным местом хранения золотого резерва США, но золото вывезли в месяцы, предшествующие Великой Войне. Что именно Лост-Хиллс хочет в этом объекте, чья-то догадка, но мы, скорее всего, никого туда не отправим."
  bln_events.108.a:0 "Экспедиция в Форт Нокс звучит как глупая затея"

  bln_events.109.title:0 "Контакт потерян"
  bln_events.109.desc:0 "Рыцари и писцы, которых мы отправили в Форт-Нокс по запросу Старейшин в Лост-Хиллс, не выходили на связь месяцами. Мы потеряли радиоконтакт примерно в то время, когда они спускались по западной стороне Аппалачей, и связь так и не восстановилась. Сегодня Старейшина Лайонс отдал приказ добавить их имена в Списки."
  bln_events.109.a:0 "Эта была тупейшая идея из всех"

  bln_events.110.title:0 "Экспедиция возвращается"
  bln_events.110.desc:0 "Рыцари и писцы, которых мы отправили в Форт-Нокс по запросу Старейшин в Лост-Хиллс, вернулись намного раньше, чем ожидалось. Вскоре после входа в Кентукки они столкнулись с крайне враждебными мутантами и фауной. Все мутанты и существа имели странные наросты, которые намекали на какой-то региональный мутацию. Несмотря на отражение повторных атак, их припасы закончились через несколько недель, и они начали нести тяжёлые потери. В конце концов, было принято решение повернуть обратно после того, как их последние 3 писца были убиты самодельным взрывным устройством, замаскированным под машину с Ядер-Колой. Те, кто был потерян, имели свои голографические метки восстановлены, и их имена добавляются в Свитки."
  bln_events.110.a:0 "По крайней мере некоторые вернулись"

  bln_events.111.title:0 "Разочаровывающая экспедиция"
  bln_events.111.desc:0 "Рыцари и писцы, которых мы отправили в Форт-Нокс по запросу Старейшин в Лост-Хиллс, вернулись с разочаровывающими новостями. Как мы знали, Форт-Нокс был лишён большей части ценностей. Объект представлял собой не более чем кратер, кишащий облучёнными существами. Ограниченная экспедиция не видела смысла пробиваться сквозь орды мутантов и решила повернуть обратно после подтверждения, что кратер, который они увидели, - это всё, что осталось от форта. Экспедиция вернулась ни с чем, кроме нескольких хороших историй."
  bln_events.111.a:0 "По крайней мере некоторые вернулись"

  bln_events.112.title:0 "Хороший объезд"
  bln_events.112.desc:0 "Рыцари и писцы, которых мы отправили в Форт-Нокс по запросу Старейшин в Лост-Хиллс, вернулись с неожиданными новостями. Как мы знали, Форт-Нокс был лишён большей части ценностей. Объект представлял собой не более чем кратер, кишащий облучёнными существами. Ограниченная экспедиция не видела смысла пробиваться сквозь орды мутантов и решила повернуть обратно после подтверждения, что кратер, который они увидели, - это всё, что осталось от форта. Казалось, экспедиция была провалом, но на обратном пути группа решила остановиться в исследовательском комплексе в Восточном Кентукки. Там они нашли тома ценных исследовательских данных, которые смогли перенести на голографические ленты и привезти обратно в Цитадель. Наши писцы всё ещё изучают данные, но они считают, что это может привести к очень важным прорывам в развитии энергетического оружия"
  bln_events.112.a:0 "Неожиданное, но приятное событие"

  bln_events.113.title:0 "Более подходящие вакансии"
  bln_events.113.desc:0 "Вместо того, чтобы отправлять 200 мужчин и женщин в Форт-Нокс с бессмысленным поручением, мы оставим их в Цитадели и просто скажем Лост-Хиллс, что мы их туда отправили. Остаётся вопрос, что мы будем делать с рыцарями и писцами, отобранными для этой воображаемой миссии, до их предполагаемого возвращения."
  bln_events.113.a:0 "Включите их в исследовательские группы"
  bln_events.113.b:0 "Пусть они помогают новичкам в обучении"
  bln_events.113.c:0 "Добавьте их к столичным патрулям"

  bln_events.114.title:0 "Один длинный список"
  bln_events.114.desc:0 "Палладин Касдин часто жаловался на направление главы. Бесчисленные дебаты вспыхнули между палладином и другими палладинами, писцами и даже самим старейшиной. Недавний запрос из Лост-Хиллс разжёг огонь под палладином и привёл к тому, что он выдвинул список объектов в Капитал Вейстленде, куда, по его мнению, мы должны отправлять команды. Список длинный, и многие из них, вероятно, имеют ограниченную ценность для добычи наилучшим образом. Однако несколько выделяются, которые Старейшина считает могут принести что-то полезное. Или мы можем сделать то, что делали в прошлом, и засунуть этот список в шкаф для хранения где-то в Цитадели."
  bln_events.114.a:0 "Загляните в Форт Константин"
  bln_events.114.b:0 "Войти в арсенал Уитона"
  bln_events.114.c:0 "Игнорировать запрос"

  bln_events.115.title:0 "Зачем умирать за жителя пустоши?"
  bln_events.115.desc:0 "Почти 20 лет мы ведём войну с супермутантами Столичной Пустоши от имени людей, живущих здесь. Многие из тех, кто пришёл вместе со Старейшиной Лайонсом, верят в этого человека и, следовательно, в его видение. Однако даже среди старожилов есть те, кто сомневается. К растущим голосам недовольства добавляются инициаты и рыцари из Лост-Хиллс, которые отправляются сюда с впечатлением, что будут помогать нам в поиске потерянной технологии. В то время как некоторые соглашаются с идеей сдерживания этой довоенной угрозы, многие разочаровываются либо вскоре после прибытия, либо после нескольких лет борьбы с, казалось бы, бесконечной угрозой. Сталкиваясь с в основном неблагодарным населением и бесконечным врагом, многие открыто начали задаваться вопросом, почему мы всё ещё это делаем."
  bln_events.115.a:0 "Игнорируйте их проблемы"
  bln_events.115.b:0 "Убедите их в опасности, которую представляют супермутанты"
  bln_events.115.c:0 "Напомните им, что мы можем вести крестовый поход и выполнить нашу миссию."

  bln_events.116.title:0 "Ещё один мерзкий эксперимент"
  bln_events.116.desc:0 "После месяцев подготовки команда рыцарей проникла в убежище в сердце Вирджинского болота. Внутри они нашли именно то, что ожидали: бессмысленный эксперимент Волт-Тек, вышедший из-под контроля. Хотя большая часть данных в убежище была повреждена, они смогли сузить несколько фактов. Эксперимент, казалось, включал доставку дефектного ГЭКК в убежище без параметров безопасности и подключение его напрямую к реактору убежища для питания. В какой-то момент в годы после закрытия убежища ГЭКК активировался. Команда нашла логи, указывающие на неудачные попытки деактивации ГЭКК, и в итоге убежище было заброшено. Наши писцы считают, что с достаточным временем они смогут деактивировать ГЭКК через несколько лет. В противном случае нам придётся детонировать реактор убежища, чтобы предотвратить распространение болота."
  bln_events.116.a:0 "Давайте начнем с исследования"

  bln_events.117.title:0 "Рыцари Пустошей"
  bln_events.117.desc:0 "Касдин никогда не соглашался с настойчивостью Лайонса на том, чтобы позволять пустынникам присоединяться к рядам Братства Стали так легко. Хотя Кодекс позволял вербовать посторонних, которые доказывают свою достойность, предыдущие старейшины установили планку для достойности слишком низко. Бесчисленные костюмы силовой брони и энергетического оружия были потеряны из-за того, что пустынники, едва подходящие для передовой службы, умирали внутри них где-то в руинах, и их грабили, прежде чем их могли вернуть. Всё ещё много пустынных рыцарей и даже некоторые палладины в наших рядах, но даже некоторые более жёсткие члены нашего ордена видят в этих солдатах истинных братьев. Они сражались с Анклавом вместе, и если это не делает брата достойным, то что же? "
  bln_events.117.a:0 "Они заслужили свое место, но эта дверь закрылась."
  bln_events.117.b:0 "Устранить их и запросить поддержку у Лост-Хиллс"

  bln_events.118.title:0 "Больше мягкотелых"
  bln_events.118.desc:0 "Когда мы наконец установили контакт с другим отделением Братства Стали по эту сторону Миссисипи, многие в главе были в восторге. Прочёсывание этой стороны страны - это монументальная задача, и наличие другой главы, работающей рядом, было бы огромным преимуществом. Похоже, что этот восторг был ошибочным. За короткое время, пока Старейшина Касдин разговаривал с руководством Среднезападного Братства, стало очевидно, что эти кровоточащие сердца отлично поладили бы с покойным Старейшиной Лайонсом. Они, кажется, почти полностью отказались от Кодекса, вместо этого решив тратить ресурсы на помощь племенным дикарям и мутантам! Без всяких неясностей наш Старейшина ясно дал понять этой потерянной главе, что мы не будем сотрудничать с ними. \n\n Некоторые Палладины спрашивали Старейшину, почему мы не пойдём и не положим конец этому мятежному отделению. Старейшина заявил, что это будет пустой тратой ресурсов, особенно потому что их наивность, вероятно, убьёт их раньше, чем мы закончим прочесывать Восточное Побережье."
  bln_events.118.a:0 "Какое отсталое отделение!"
