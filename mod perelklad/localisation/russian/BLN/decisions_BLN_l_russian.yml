  bln_support_allies:0 "Поддерживать союзных жителей пустоши"
  bln_fight_loyalist_influence:0 "Бороться с влиянием лоялистов"

  BLN_enclave_took_purity_category:0 "Кризис на проекте «Чистота»"
  BLN_enclave_took_purity_category_desc:0 "Доктор Ли только что сообщила старейшине Лайонсу, что Анклав захватил контроль над проектом «Чистота» и работает над тем, чтобы запустить его. Пока неясно, что они собираются делать с очистителем, но если их новые планы не отличаются от прежних, то ничего хорошего для жителей пустоши это не сулит. Мы должны действовать, пока они не успели закрепиться!"
  BLN_enclave_securing_purity_decision:0 "Анклав защищает проект «Чистота»"
  BLN_enclave_securing_purity_decision_desc:0 "Каждый день мы наблюдаем, как винтокрылы прилетают и улетают из очистителя, расположенного за рекой. Патрули, которые подходят слишком близко, подвергаются обстрелу, и неясно, что именно делает там Анклав. Но если мы не начнем действовать в ближайшее время, они слишком сильно окопаются и мы не сможем их оттуда выкурить."
  BLN_expeditions_category:0 "Экспедиции на Восточном Побережье"
  BLN_expeditions_category_desc:0 "Вдоль и поперек Восточного Побережья есть места, представляющие большой интерес для Отделения Лайонса. Старые исследовательские лаборатории, заброшенные бункеры и многое другое, что разбросано по этой стороне страны. Возможно, некоторые из них давно разграблены, но искать то, что осталось, - часть нашей миссии."
  BLN_boston_expedition_decision:0 "Экспедиция в Содружество"
  BLN_boston_expedition_decision_desc:0 "Ходят слухи что на севере, в том месте где был довоенный Бостон, существует тайная группа под названием Институт, обладающая технологиями, которые посоперничают даже с оборудованием Анклава. Возможно, это просто старая караванная байка, но даже если это так, местность открывает большие перспективы. До войны здесь находился центр крупных технологических компаний, а местные военные базы служили полигонами для испытания важных довоенных армейских технологий."
  BLN_pitt_expedition_decision:0 "Экспедиция в Питт"
  BLN_pitt_expedition_decision_desc:0 "Наша первая экспедиция в Питт в целом была признана успешной, но судя по тому, что дошло до нас из тех мест, за последние десятилетия многое изменилось. Если слухи верны, то наш брат которого мы считали погибшим во время бедствия, выжил и теперь считает себя королем жителей Питта. Он предположительно собирает армию и строит промышленность с работающими довоенными патронными прессами."
  BLN_appalachia_expedition_decision:0 "Экспедиция в Аппалачи"
  BLN_appalachia_expedition_decision_desc:0 "Более 150 лет назад в Аппалачи был отправлен экспедиционный отряд, чтобы проследить за судьбой удаленного отделения, которое исчезло за много лет до этого. Записи того времени в лучшем случае ненадежны, а во время нашего похода на восток эта местность оказалась не по пути. Может быть, теперь мы сможем узнать, что стало с нашими братьями."
  BLN_ronto_expedition_decision:0 "Экспедиция в Ронто"
  BLN_ronto_expedition_decision_desc:0 "Довоенный Ронто был домом для крупных отрядов оккупационных сил США и нескольких не слишком этичных лабораторий. Информацию о послевоенном Ронто собрать сложно, но некоторые говорят, что его жители сражались с отрядом солдат... В черной силовой броне?"
  BLN_new_york_expedition_decision:0 "Экспедиция в Нью-Йорк"
  BLN_new_york_expedition_decision_desc:0 "Довоенный Нью-Йорк был одним из крупнейших городов страны. В этом районе располагались лаборатории и офисы нескольких передовых компаний, а из-за продовольственных бунтов здесь было сосредоточено значительное количество военных. Несомненно, он пострадал так же сильно, как и Вашингтон, но всё же его стоит изучить подробнее."
  BLN_rocky_expedition_decision:0 "Экспедиция в Кримсон"
  BLN_rocky_expedition_decision_desc:0 "Рассказы с ближайшего Запада повествуют о фанатичном культе в горах, который имеет доступ к передовой технологии огнестрельного оружия. Может быть, у них есть тайник с ценным оборудованием?"
  BLN_magnets_expedition_decision:0 "Экспедиция к Разрушителям Брони"
  BLN_magnets_expedition_decision_desc:0 "Как видно из предвещающего названия этого места, до нас дошли слухи о том, что в этом районе есть силы, обладающие оружием, способным разрушать силовую броню. Для оценки ситуации необходимо отправить группу наших лучших разведчиков с нестандартным оборудованием. Мы не можем допустить, чтобы рейдеры с оружием, способным разрушать Т-45, находились так близко к нам."
  BLN_midwest_expedition_decision:0 "Экспедиция на Средний Запад"
  BLN_midwest_expedition_decision_desc:0 "По пути в Вашингтон мы проезжали через американский Средний Запад. Нам пришлось ехать налегке, чтобы не останавливаться слишком часто для проверки техники или для расследования слухов о пропавшей экспедиции Братства. Теперь, когда самые насущные проблемы решены, возможно, пришло время взглянуть на ситуацию по-новому."
  BLN_prydwen_decision_category:0 "«Придвен»"
  BLN_prydwen_decision_category_desc:0 "Возможно, это самый амбициозный проект в истории Братства, строительство огромного дирижабля такого масштаба позволит нам проецировать нашу силу на всё Восточное побережье и за его пределы. На это уйдут годы, а также беспрецедентное количество рабочей силы и ресурсов, но это позволит победить нужду передвигатся пешком."
  BLN_prydwen_design_decision:0 "Проектирование «Придвена»"
  BLN_prydwen_design_decision_desc:0 "Проектирование дирижабля такого масштаба — грандиозная задача. Десятки писцов отвлекаются от своих повседневных дел, чтобы внести свой опыт и знания для того чтобы удостовериться в том что эта штука пригодна к полёту, прежде чем мы начнем её строить."
  BLN_prydwen_resources_decision:0 "Компоненты «Придвена»"
  BLN_prydwen_resources_decision_desc:0 "Когда задача проектирования этого монстра решена, начинается настоящая работа. По подсчетам наших писцов, для его создания нам понадобятся тысячи тонн металлолома, электронных компонентов и специальных сплавов. Даже если мы демонтируем всю авиабазу Адамс, нам всё равно не хватит."
  BLN_prydwen_build_decision:0 "Постройка «Придвена»"
  BLN_prydwen_build_decision_desc:0 "Все необходимые детали на месте, теперь нам нужно собрать эту чертову штуку. Строительный проект такого масштаба, вероятно, не осуществлялся со времен Великой войны, но со временем мы сможем заставить эту штуку летать."

