l_russian:
  bln_loyalist_influence_check:0 "Влияние лоялистов Лост-Хиллз находится на уровне §Y[?BLN_loyalist_influence]%§!"
  bln_loyalist_influence_check_desc:0 "Чем выше влияние лоялистов Лост-Хиллз, тем более разрушительным будет их решение отделиться. По мере того как всё больше жителей пустошей будут вступать в наши ряды, дело лоялистов будет привлекать всё больше последователей, и их влияние будет расти."

