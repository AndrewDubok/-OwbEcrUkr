  state_of_guards_text:0 "Охранники караванов"
  bln_guards_tt:0 "Охранники, к сожалению, являются жизненно важным и необходимым элементом нашей §CСети Распределения Воды§!. Чистая вода необходима всем в Столичной пустоши, и караваны часто подвергаются нападениям. Чем больше охранников мы пошлем, тем больше шансов, что они доберутся до своего места.\n\n§OОбратите внимание, что нам может не понадобиться много охранников с хорошим снаряжением, если целесообразнее послать несколько хорошо вооруженных охранников или много плохо вооруженных новобранцев, это может сработать просто отлично.§!"
  bln_guards_one_tt:0 "[!guards_button_one_click]"
  bln_guards_two_tt:0 "[!guards_button_two_click]"
  bln_guards_three_tt:0 "[!guards_button_three_click]"
  bln_guards_four_tt:0 "[!guards_button_four_click]"
  bln_guards_three_amount_tt:0 "Каждый караван будет охраняться рыцарем и его отрядом.\n"
  bln_guards_four_amount_tt:0 "Каждый караван будет охраняться паладином и его отрядом.\n"
  bln_guards_one_idea:0 "Минимальная охрана каравана"
  bln_guards_two_idea:0 "Несколько караванных охранников"
  bln_guards_three_idea:0 "Средняя караванная стража"
  bln_guards_four_idea:0 "Сильная караванная стража"
  caravan_manpower:0 "Численность каравана"

  state_of_equipment_text:0 "Уровень снаряжения"
  bln_equipment_tt:0 "Как и охранники, надежное снаряжение необходимо для защиты нашей §CСети Распределения Воды§!. Чем лучше оснащены наши караваны, тем больше шансов, что им удастся отогнать нападающих.\n\n§OОбратите внимание, что нам не нужно много стражников с хорошим снаряжением, если целесообразнее послать несколько хорошо вооруженных стражников или много плохо вооруженных новобранцев, это может сработать просто отлично.§!"
  bln_equipment_one_tt:0 "[!equipment_button_one_click]"
  bln_equipment_two_tt:0 "[!equipment_button_two_click]"
  bln_equipment_three_tt:0 "[!equipment_button_three_click]"
  bln_equipment_four_tt:0 "[!equipment_button_four_click]"
  bln_equipment_one_amount_tt:0 "Каждый караван будет оснащен базовым оружием.\n"
  bln_equipment_two_amount_tt:0 "Каждый караван будет оснащен базовым оружием, пулеметами и взрывчаткой.\n"
  bln_equipment_three_amount_tt:0 "Каждый караван будет оснащен базовым оружием, пулеметами и взывчаткой. Командиру отряда будет выдана силовая броня.\n"
  bln_equipment_four_amount_tt:0 "Каждый член каравана будет облачен в силовую броню, а отряд будет оснащен базовым оружием, пулеметами и взрывчаткой.\n"
  bln_equipment_affordability_tt:0 "§OЕсли у нас нет снаряжения, необходимого для пополнения запасов каравана, мы автоматически понижаемся на один уровень и несем расходы на бюрократию.§!\n"
  bln_equipment_one_idea:0 "Базовое снаряжение"
  bln_equipment_two_idea:0 "Патрульное снаряжение"
  bln_equipment_three_idea:0 "Тяжелое снаряжение"
  bln_equipment_four_idea:0 "Бронированный патруль"

  state_of_preparation_text:0 "Подготовка к каравану"
  bln_preparation_tt:0 "В то время как проект «Чистота» достиг точки относительной устойчивости, не требуя особых постоянных ресурсов и охотно предоставляясь Братством, проект каравана намного сложнее. Вода, созданная в рамках проекта, должна быть сначала разлита в бутылки, прежде чем ее можно будет доставить, а это само по себе достаточно сложный процесс. Заводы и машины для розлива - редкость в пустоши.\n\n§YПодготовка повлияет на количество караванов, которые будут отправлены. Чем больше воды мы разливаем в бутылки, тем больше мы можем отправить.§!"
  bln_preparation_one_tt:0 "[!preparation_button_one_click]"
  bln_preparation_two_tt:0 "[!preparation_button_two_click]"
  bln_preparation_three_tt:0 "[!preparation_button_three_click_enabled]\n[!preparation_button_three_click]"
  bln_preparation_four_tt:0 "[!preparation_button_four_click_enabled]\n[!preparation_button_four_click]"
  bln_preparation_one_idea:0 "Ручной розлив"
  bln_preparation_two_idea:0 "Крупномасштабный ручной розлив"
  bln_preparation_three_idea:0 "Машина для розлива"
  bln_preparation_four_idea:0 "Завод по розливу"


