  ###BOP###
  BLN_loyalty_struggle:0 "Раскол в нашем Братстве"
  BLN_loyalist_influence:0 "Приверженность Кодексу"
  BLN_wastelander_influence:0 "Поддержка жителей Пустоши"
  BLN_loyalty_category:0 "Решения о лояльности"
  BLN_balanced_influence:0 "Баланс лояльности"
  BLN_balanced_influence_desc:0 "Цели нашего отделения разделились. Многие посвящают себя помощи жителям Столичной Пустоши. Многие же насмехаются над этой идеей и придерживаются изначальной цели нашего отделения — обеспечения безопасности опасных технологий. Этот баланс не может длиться вечно."
  BLN_very_high_loyalist_influence:0 "Строгое соблюдение Кодекса"
  BLN_very_high_loyalist_influence_desc:0 "Наше отделение следует Кодексу почти до буквы. И хотя время от времени от непримиримых сторонников все же исходит ворчание, на самом деле у них очень мало поводов для недовольства. Хотя, похоже, наш выбор не очень нравится жителям пустошей."
  BLN_high_loyalist_influence:0 "Сильная приверженность Кодексу"
  BLN_high_loyalist_influence_desc:0 "Кодекс - важная часть каждого нашего дела. Мы очень редко отступаем от его мудрости, но если отступаем, то только по веским причинам. Хотя это не делает нам чести перед жителями пустошей, они признают, что мы благоразумны до тех пор, пока они не лезут к нам."
  BLN_moderately_high_loyalist_influence:0 "Твердое следование Кодексу"
  BLN_moderately_high_loyalist_influence_desc:0 "Наше отделение может время от времени отступать от Кодекса, но в целом сторонники жесткого пути в нашем отделении понимают, что мы должны идти на некоторые компромиссы, чтобы оставаться верными нашей миссии. Однако жители Столичной пустоши хотели бы, чтобы мы могли сделать больше."
  BLN_very_high_wastelander_influence:0 "Сражаясь За Правое Дело!"
  BLN_very_high_wastelander_influence_desc:0 "Жители Столичной пустоши знают, что отделение Лайонса готово прийти на помощь. Возможно, в нашем ордене растет число недоброжелателей, но их крики о Кодексе не смогут заглушить крики жителей Столичной пустоши с просьбой о помощи!"
  BLN_high_wastelander_influence:0 "Помогать людям"
  BLN_high_wastelander_influence_desc:0 "Основная цель нашей миссии изменилась. Мы по-прежнему ищем опасные технологии и стараемся придерживаться принципов Братства, однако спасение жителей Столичной пустоши - наш приоритет. Из-за этого у нас возникли проблемы с некоторыми из наших."
  BLN_moderately_high_wastelander_influence:0 "Помогаем, где можем"
  BLN_moderately_high_wastelander_influence_desc:0 "Помощь жителям Столичной Пустоши - становится всё более важным направлением деятельности нашего отделения, и жители Пустоши благодарны нам за это. Но не все в Цитадели этому рады."
