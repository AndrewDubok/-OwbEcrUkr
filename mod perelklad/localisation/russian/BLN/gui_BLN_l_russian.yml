l_russian:
  water_distribution_text:0 "Проект «Чистота» был сложным делом, но не менее сложным оказалось и его продолжение. Писец Бигсли был поставлен во главе этой кошмарной распределительной сети, и ему придется управлять не только караванами, но и писцами, стоящими за этими караванами, и писцами, стоящими за этими писцами.\n\nБигсли придется взвесить свои возможности и получить как можно больше поддержки от остальных членов безразличного Братства."

  state_of_bureaucracy_text:0 "Cтатус менеджмента: [bln_management_status]\nНаправление: [bln_management_trend]"
  bln_bureaucracy_tt:0 "Способность наших писцов управлять растущей §CСетью Распределения Воды§! является жизненно важной частью ее успеха. Бигсли получил писцов, которые неопытны, с которыми трудно работать или которых отстранили от других обязанностей из-за внутренней политики, и теперь ему нужно сделать из них эффективную группу.\n\n§YМенеджмент§! будет неуклонно расти, если у нас не будет достаточно писцов, чтобы держать его под контролем. Это не только приведет к §Rуменьшению§! способности управлять сетью, но и может вынудить Бигсли пойти на §Oнеприятные сделки§! или ситуации, которые трудно разрешить. По мере ухудшения ситуации будут меняться и способы, к которым Бигсли будет вынужден прибегнуть..."
