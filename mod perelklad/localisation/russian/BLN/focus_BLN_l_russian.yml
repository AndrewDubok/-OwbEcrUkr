  ######################################################

  BLN_nf_a001:0 "Миссия"
  BLN_nf_a001_desc:0 "В 2254 году правящий совет Братства Стали решил отправить отряд паладинов, рыцарей и писцов на Восточное побережье с целью вернуть передовые технологии из восточных городов и баз."
  BLN_nf_a002:0 "Цитадель"
  BLN_nf_a002_desc:0 "Когда экспедиция достигла Столичной пустоши, они обнаружили Пентагон. Этот довоенный военный объект сильно пострадал во время войны и за прошедшее время, однако подуровни остались в основном нетронутыми. После небольшого ремонта он станет базой Братства на Восточном Побережье."
  BLN_nf_a003:0 "Бич Божий"
  BLN_nf_a003_desc:0 "Одна из первых целей экспедиции Восточного Братства, Питт был выгребной ямой, где обитали рейдеры и трогги. Братство пронеслось по городу за одну ночь, убивая всех, кто сопротивлялся, и забирая все ценное."
  BLN_nf_a004:0 "Изменившийся человек"
  BLN_nf_a004_desc:0 "Что-то изменилось в старейшине Лайонсе. Он стал рассеянным и иногда отдает приказы, противоречащие Кодексу. Возможно, он просто приспосабливается к новой роли старейшины."
  BLN_nf_a005:0 "Стальная экономика"
  BLN_nf_a005_desc:0 "В то время как рыцари и писцы нашего ордена с удовольствием обедают в столовой, у жителей пустошей, с которыми мы иногда имеем дело, другие желания."
  BLN_nf_a006:0 "Не связываться"
  BLN_nf_a006_desc:0 "Приверженцы жесткой линии правы, если мы сейчас пойдем на компромисс и начнем продавать технологии жителям пустошей, это приведет к катастрофе. Сегодня это всего лишь несколько термоядерных ячеек и ломаные детали оружия, но что будет завтра?"
  BLN_nf_a007:0 "Компромисс?"
  BLN_nf_a007_desc:0 "Кодекс запрещает работать с чужаками или помогать им, но мы далеко от наших собратьев на западном побережье. Отступление от правил в некоторых местах, но усиление их в других может стать способом сохранить наши идеалы и получить то, что нам нужно для выполнения нашей миссии."
  BLN_nf_a008:0 "Квартмейстеры от двери до двери"
  BLN_nf_a008_desc:0 "Трудно сделать два шага по руинам Вашингтона, чтобы не найти какую-нибудь опасную технику или хотя бы коробку микроячеек. Мы отправим квартирмейстеров на свалки и торговые пункты пустоши, чтобы узнать, есть ли там что-то, что нам нужно, и найти способ заплатить за это."
  BLN_nf_a009:0 "Запрос ресурсов"
  BLN_nf_a009_desc:0 "Руины Столичной Пустоши полны довоенных опасностей, которым не место в руках незнающих масс. Наши рыцари будут уполномочены предпринять все необходимые шаги, чтобы спасти жителей Пустоши от их невежества."
  BLN_nf_a010:0 "Защита Братства"
  BLN_nf_a010_desc:0 "Множество поселений и караванов обратились к нашему ордену за защитой и помощью. Хотя мы не являемся наемниками, работа по защите может послужить хорошей тренировкой для новичков, а выплаты помогут финансировать более важные проекты."
  BLN_nf_a011:0 "Защита караванов"
  BLN_nf_a011_desc:0 "Наши отношения с торговцами Пустошей оказались благоприятными; теперь некоторые просят нанять несколько рыцарей или хотя бы посвященных для охраны караванов на особо опасных территориях."
  BLN_nf_a012:0 "Полная автономия"
  BLN_nf_a012_desc:0 "Братство твердо стоит на своих идеалах и не пойдет на компромисс с жителями пустошей. Мы едины в своей миссии и сделаем все возможное, чтобы ужасы прошлого не повторились."
  BLN_nf_a013:0 "Платёжные ведомости Паладинов"
  BLN_nf_a013_desc:0 "Благодаря тому, что мы получаем прибыль от сделок с чужаками, мы можем обеспечить наших паладинов чем-то дополнительным в качестве вознаграждения за их усилия."
  BLN_nf_a014:0 "Обязательное вознаграждение"
  BLN_nf_a014_desc:0 "Миссии Братства недостаточно, чтобы побудить каждого жителя пустоши поставить свою жизнь на кон, но с нашим новым богатством мы могли бы начать выплачивать некоторым воинам вознаграждение или даже нанимать наемников, когда это необходимо."
  BLN_nf_a015:0 "Братья по финансам"
  BLN_nf_a015_desc:0 "У нас есть все, что нужно для нашей миссии. Теперь мы можем перейти к неотложным делам."
  BLN_nf_a016:0 "Очистка под-уровней"
  BLN_nf_a016_desc:0 "Хотя некоторые из нижних уровней доступны, многие из них завалены обломками и мусором, образовавшимися в результате разрушений и векового запустения. Если мы расчистим эти проходы, кто знает, что мы сможем найти."
  BLN_nf_a017:0 "Восстановление первого под-уровня"
  BLN_nf_a017_desc:0 "Это первый зачищенный нами уровень, похоже, является довоенной лабораторией по испытанию оружия. Восстановление объекта может значительно ускорить наши исследования в области вооружения."
  BLN_nf_a018:0 "Восстановление второго под-уровня"
  BLN_nf_a018_desc:0 "Это второй уровень, который мы зачистили, кажется не более чем складом. Потребуется некоторое время, чтобы разобраться со всем, что здесь находится, но сокровища, содержащиеся внутри, выглядят многообещающе."
  BLN_nf_a019:0 "Под землёй"
  BLN_nf_a019_desc:0 "Глубоко под разрушенными подуровнями и подвалами находятся склады и отсеки, которые можно переоборудовать для более полезных целей."
  BLN_nf_a020:0 "Мастерская Рыцарей"
  BLN_nf_a020_desc:0 "У Рыцарей есть несколько идей, что делать с новым пространством. Мы должны их выслушать."
  BLN_nf_a021:0 "Площадка писцов"
  BLN_nf_a021_desc:0 "Писцы выдвинули несколько идей, как они хотят использовать свою часть нового пространства."
  BLN_nf_a022:0 "Секретное оружие"
  BLN_nf_a022_desc:0 "Никто из тех, кто работает в лаборатории Цитадели, не может игнорировать 200-тонного слона в комнате. Последние несколько десятилетий мы работали над решением проблем с энергией, с которыми они боролись еще до войны, но сейчас мы находимся на пороге прорыва."
  BLN_nf_a023:0 "Работа в «Галактике»"
  BLN_nf_a023_desc:0 "Посреди развалин Вашингтона находятся руины довоенной радиостанции. Она может оказаться полезной."
  BLN_nf_a024:0 "Друзья из обывателей Пустоши"
  BLN_nf_a024_desc:0 "Тридогнайт продолжает рассказывать на пустоши о борьбе за добро, а его укрепленный бункер служит хорошим местом для отдыха и восстановления наших патрулей."
  BLN_nf_a025:0 "Стальная сеть"
  BLN_nf_a025_desc:0 "Команда писарей будет периодически наполнять эфир музыкой, а также рассказами о наших великих жертвах и борьбе по защите людей от самих себя."
  BLN_nf_a026:0 "Библиотека Конгресса"
  BLN_nf_a026_desc:0 "Библиотека Конгресса служила последние два столетия не только убежищем для рейдеров и падальщиков, сжигая знания, более ценные, чем металл, который они могли вытащить из стен. Мы отправим команду, чтобы зачистить здание и использовать его по назначению."
  BLN_nf_a027:0 "Террабайты Данных"
  BLN_nf_a027_desc:0 "Недавно найденный чертеж показывает, что под Библиотекой Конгресса находится база данных довоенной военной информации. При попытке получить доступ к данным наши писцы включили защиту от сбоев, и теперь доступ к данным возможен только через терминал, охраняемый несколькими уровнями автоматической системы безопасности и дверями, запираемыми закодированными терминалами. Хуже всего то, что если мы не получим доступ в ближайшее время, данные могут быть стерты в рамках автоматизированных мер безопасности. Чтобы справиться с этим, потребуются недели скоординированных усилий, включая отвлечение Рыцарей от борьбы с супермутантами в руинах Вашингтона, чтобы справиться с автоматическими турелями и роботами-охранниками."
  BLN_nf_a028:0 "Зачистка Столичной Пустоши"
  BLN_nf_a028_desc:0 "Супермутанты остаются самой большой угрозой для пустоши, мы продолжим нашу миссию по их уничтожению. Всегда найдется еще один довоенный тайник с данными, и если его стереть, он все равно не будет представлять угрозы для пустоши."
  BLN_nf_a029:0 "Форт Индепенденс"
  BLN_nf_a029_desc:0 "Старейшины на западе отдали приказ взять близлежащий Форт Индепенденс. К сожалению, есть еще одно неотложное дело, требующее нашего внимания."
  BLN_nf_a030:0 "Зачем мы здесь?"
  BLN_nf_a030_desc:0 "Мы находимся в Столичной Пустоши уже более 20 лет. Некоторые из нас здесь с самого начала, другие, недавние прибывшие или рекруты. Почти все мы имеем один насущный вопрос: \n\nВы когда-нибудь задумывались, почему мы здесь?"
  BLN_nf_b001:0 "Оливковая ветвь"
  BLN_nf_b001_desc:0 "Не секрет, что Каден и все большее число членов нашего ордена недовольны тем, в каком направлении мы движемся. Нам следует встретиться и посмотреть, сможем ли мы как-то успокоить их беспокойство."
  BLN_nf_b002:0 "Долг Рыцаря"
  BLN_nf_b002_desc:0 "Рыцарь Братства не только сражается на передовой, но и обслуживает оборудование и помогает в производстве. Конфликт с супермутантами заставил некоторых забыть об этом, но мы должны напомнить им."
  BLN_nf_b003:0 "Общественные мастерские"
  BLN_nf_b003_desc:0 "Вместо того чтобы наши рыцари продолжали работать в наших мастерских, мы начнем программу оруженосцев, где умельцы Пустоши смогут учиться у рыцарей в обмен на свою службу. Мы получаем их труд, а они - знания в области механики, и это действительно выгодно."
  BLN_nf_b004:0 "Рыцарское вооружение прибывает на Восток"
  BLN_nf_b004_desc:0 "Старейшины на Западе не забыли о нас, и, несмотря на некоторые послабления в нашей политике, они все еще хотят оказать нам помощь. Рыцари-советники отправляются на восток, чтобы помочь нам создать лучшую производственную базу."
  BLN_nf_b006:0 "Перепрофилировать здания"
  BLN_nf_b006_desc:0 "У посланных к нам рыцарей есть несколько идей, как мы можем перепрофилировать строения в Цитадели, чтобы они лучше соответствовали нашим потребностям."
  BLN_nf_b005:0 "Труд жителей Пустоши"
  BLN_nf_b005_desc:0 "Некоторые из тех, кому не повезло, с удовольствием работают на нас за еду и защиту, пока не встанут на ноги. Приняв их предложение, мы могли бы увеличить нашу производственную базу."
  BLN_nf_b007:0 "Кузницы Стали"
  BLN_nf_b007_desc:0 "Кузницы горят, и производство идет полным ходом. Больше нам не придется полагаться только на падаль и торговлю, чтобы добыть себе снаряжение. Пусть мы еще не дошли до производства плазменных винтовок, но мы уже делаем первые шаги."
  BLN_nf_b008:0 "Охота на Мутантов"
  BLN_nf_b008_desc:0 "Наши операции по истреблению супермутантов в руинах Вашингтона дают свои результаты. Еще несколько попыток - и мы сможем значительно сократить их присутствие в руинах."
  BLN_nf_b009:0 "Окупировать Торговый Центр"
  BLN_nf_b009_desc:0 "Национальный Торговый Центр - это сердце центра округа Колумбия. Из тоннелей метро, пересекающих молл, можно добраться почти до любого другого района. Создание здесь постоянного форпоста будет иметь важное значение для операций в руинах."
  BLN_nf_b010:0 "Библиотечный форпост"
  BLN_nf_b010_desc:0 "Создание постоянного форпоста в Библиотеке Конгресса поможет нам заполнить пробелы, которые оставили испорченные архивы."
  BLN_nf_b011:0 "Укрепить «Новости Галактики»"
  BLN_nf_b011_desc:0 "Радиостанция «Новости Галактики» - одно из самых безопасных мест в руинах в центре Вашингтона, но всегда можно что-то улучшить."
  BLN_nf_b012:0 "Передышка"
  BLN_nf_b012_desc:0 "Благодаря усиленным проверкам и созданию более надежных аванпостов мы получили возможность перевести дух. Теперь мы можем обратить внимание на другие вопросы."
  BLN_nf_b013:0 "Обеспечить безопасность наших линий снабжения"
  BLN_nf_b013_desc:0 "В новой ситуации мы должны пересмотреть нашу логистику и посмотреть, есть ли способы более эффективно защитить наши линии снабжения."
  BLN_nf_b014:0 "Расширенная защита поселений"
  BLN_nf_b014_desc:0 "Рейдеры и супермутанты остаются ежедневной проблемой для наших союзников в пустошах. Они снова обращаются к нам за помощью, и условия стоит рассмотреть."
  BLN_nf_b015:0 "Проблемы с кадрами"
  BLN_nf_b015_desc:0 "Жизнь рыцаря или паладина не для слабонервных. Эти воины сталкиваются с бесчисленными опасностями, выполняя свой долг, и со временем несут потери. У нас есть новый класс посвященных, которые заканчивают обучение, но проблемы с кадрами - это более постоянная проблема."
  BLN_nf_b016:0 "Пополнить ряды"
  BLN_nf_b016_desc:0 "Даже с крышками в качестве мотивации нам трудно найти качественных солдат, чтобы восполнить потери наших отверженных братьев. Несмотря на это, мы прилагаем все возможные усилия."
  BLN_nf_b017:0 "Компромисс с лоялистами"
  BLN_nf_b017_desc:0 "Старейшины на Западе в большинстве своем против того, чтобы мы набирали в свои ряды обычных пустошей, но они понимают, как остро стоит наша проблема с кадрами. Посылать нам замену через всю страну - задача не из легких, к тому же у них есть свои проблемы. Компромисс заключается в том, что мы разрешаем жителям Пустоши, желающим присоединиться к нашему делу, выполнить для нас опасное задание. Если миссия будет выполнена, они смогут быть приняты в орден."
  BLN_nf_b018:0 "Отчаянная вербовка"
  BLN_nf_b018_desc:0 "Нам нужны люди, чтобы пополнить наши ряды, несмотря ни на что. Даже если они не самые способные, если они могут держать в руках лазерную винтовку, они могут сражаться."
  BLN_nf_b019:0 "Несколько хороших людей"
  BLN_nf_b019_desc:0 "С учетом наших проблем с кадрами нам нужно пересмотреть наш подход. Вместо того чтобы пытаться пополнить каждый пустой доспех, мы сосредоточимся на наборе квалифицированных солдат. Бывшие наемники, охранники караванов или даже охранники поселений могут со временем стать пригодными рыцарями."
  BLN_nf_b020:0 "Набор специалистов"
  BLN_nf_b020_desc:0 "Возможно, в особых случаях можно было бы пойти на несколько компромиссов."
  BLN_nf_b021:0 "Новые Рыцари"
  BLN_nf_b021_desc:0 "Первый класс рыцарей после нашей новой политики набора закончил обучение. Их отправляют на поле боя, и Радиостанция «Новости Галактики» уже поет им дифирамбы, что привлекает к нашему делу еще больше людей."
  BLN_nf_b022:0 "Новые Паладины"
  BLN_nf_b022_desc:0 "С новыми рыцарями, пополняющими наши ряды, мы можем дать несколько столь необходимых повышений."
  BLN_nf_b023:0 "Орден Меча"
  BLN_nf_b023_desc:0 "Орден Меча - это школа писцов, которые изучают все, что связано с оружием. Под их юрисдикцию попадает все: от ремонта лазерных винтовок до разработок нового супероружия."
  BLN_nf_b024:0 "Комната для совершенствования"
  BLN_nf_b024_desc:0 "Хотя нам не хватает производственных мощностей, мы все равно должны задействовать наши лучшие умы для улучшения имеющегося у нас оружия."
  BLN_nf_b025:0 "Больше при малых затратах"
  BLN_nf_b025_desc:0 "Наши писцы должны направить свои усилия на улучшение ремонта старой техники. Винтовка в каждой руке лучше, чем одна хорошая винтовка на трех рыцарей."
  BLN_nf_b026:0 "Штуки, которые делают *пьюф*"
  BLN_nf_b026_desc:0 "За исключением давно умерших людей из Анклава на западе, у Братства всегда было лучшее энергетическое оружие. Мы должны продолжить эту традицию."
  BLN_nf_b027:0 "Вооружение посвященных"
  BLN_nf_b027_desc:0 "Нашим посвященным не нужно самое лучшее энергетическое оружие. Починки нескольких ржавеющих штурмовых винтовок им будет вполне достаточно."
  BLN_nf_b028:0 "Штуки, которые делают *БУМ*"
  BLN_nf_b028_desc:0 "Когда дело доходит до борьбы с чем-то вроде супермутанта-бегемота, одной лазерной винтовкой не хватит. Вам нужно что-то более мощное."
  BLN_nf_b029:0 "Орден Щита"
  BLN_nf_b029_desc:0 "Орден Щита - это школа писцов, которые изучают все, что связано с защитой. Под их юрисдикцию попадает все - от восстановления силовой брони до укрепления аванпостов."
  BLN_nf_b030:0 "Закалка"
  BLN_nf_b030_desc:0 "В полевых условиях прочная броня - единственное, что стоит между нашими рыцарями и пулями супермутантов. Улучшение доспехов должно стать нашим главным приоритетом."
  BLN_nf_b031:0 "Сила в цифрах"
  BLN_nf_b031_desc:0 "Силовая броня может заставить солдата чувствовать себя непобедимым, но это не так. Нам нужно совершенствовать наши методы ремонта и восстановления, чтобы не отставать от потерь."
  BLN_nf_b032:0 "Тренировка импровизации"
  BLN_nf_b032_desc:0 "Посвященных обучают базовой тактике, навыкам выживания и обращению с оружием. Это важные навыки, но если добавить несколько уроков по строительству импровизированных укреплений, то потери сократятся."
  BLN_nf_b033:0 "Экипировка"
  BLN_nf_b033_desc:0 "Некоторым рыцарям и тем более посвященным приходится обходиться без силовых доспехов. Но это не значит, что они должны быть беззащитны. У нас есть запас старых наборов разведброни, которые можно починить и выдать солдатам."
  BLN_nf_b034:0 "Автоматизированная оборона"
  BLN_nf_b034_desc:0 "В Цитадели было множество автоматических турелей, которые нам пришлось отключить, когда мы заселились. Старейшина Лайонс так и не приказал активировать их, потому что Цитадель кажется непроницаемой. А что, если это не так?"
  BLN_nf_b035:0 "Орден Пера"
  BLN_nf_b035_desc:0 "Хотя этого часто не замечают, Орден Пера служит важной цели в Братстве. Эти писцы собирают и архивируют утраченные знания."
  BLN_nf_b036:0 "Инструменты Войны"
  BLN_nf_b036_desc:0 "Писцам Ордена Пера предстоит изучить много информации. Попросим их сосредоточиться на информации, которая поможет нам разработать лучшее оружие!"
  BLN_nf_b037:0 "Инструменты Труда"
  BLN_nf_b037_desc:0 "Чертежи довоенного оружия бесполезны, если у нас нет средств для его производства. Попросите писцов поискать исследования, способные улучшить наш промышленный потенциал!"
  BLN_nf_b038:0 "Базы данных РобКо"
  BLN_nf_b038_desc:0 "На нескольких проржавевших компьютерах в Цитадели есть маркировка РобКо. Несомненно, они остались после совместного предприятия на Либерти Прайм. Возможно, на них есть более интересная информация..."
  BLN_nf_b039:0 "Учёные Квилла"
  BLN_nf_b039_desc:0 "Мы создадим ещё одну исследовательскую группу из членов Ордена Пера. Разбор старых книг может подождать."
  BLN_nf_b040:0 "Штуки, которые делают *врум*"
  BLN_nf_b040_desc:0 "Хотя дороги Пустоши пришли в негодность, это не значит, что транспортные средства бесполезны."
  BLN_nf_b041:0 "Западные Писцы"
  BLN_nf_b041_desc:0 "Вновь сосредоточившись на нашей первоначальной миссии, мы сможем попросить Лост-Хиллз прислать больше писцов, чтобы помочь нам изучить эту технику."
  BLN_nf_b042:0 "Добавить к существующим командам"
  BLN_nf_b042_desc:0 "Лост-Хиллз присылает писцов. Мы назначим их в существующие команды, чтобы мы могли уделить этим проектам должное внимание."
  BLN_nf_b043:0 "Команда Западных Писцов"
  BLN_nf_b043_desc:0 "Переписчики с запада привыкли работать сообща. Мы объединим их в одну команду, чтобы они вместе работали над новыми проектами."
  BLN_nf_b044:0 "Жизнь в бункере"
  BLN_nf_b044_desc:0 "Писари из Лост-Хиллз знают пару вещей о том, как лучше жить под землёй."
  BLN_nf_b045:0 "Достижения Запада"
  BLN_nf_b045_desc:0 "С момента нашего последнего разговора с братьями на западе были сделаны некоторые прорывы в разработке силовой брони. Теперь мы в курсе последних достижений."
  BLN_nf_b046:0 "Это всего лишь мелочи"
  BLN_nf_b046_desc:0 "Писцы из Лост-Хиллз знают о схемах немного больше, чем мы."
  BLN_nf_b047:0 "Отчистить подуровни"
  BLN_nf_b047_desc:0 "Слишком долго мы тратили ресурсы на установку маленьких передовых аванпостов посреди руин. Всё это время бесчисленные артефакты лежали под нашими ногами. Хотя большая часть верхнего Пентагона довольно быстро попала к мародёрам, есть нижние уровни, которых даже мы не достигали за десятилетия, что мы здесь. Пора это исправить, и со временем мы могли бы построить крепость, способную соперничать с Лост-Хиллс!"
  BLN_nf_b048:0 "Восстановление 1 подуровня"
  BLN_nf_b048_desc:0 "Первый уровень, который мы зачистили, похоже, представляет собой довоенную испытательную лабораторию оружия. Потребуется время, чтобы нормально использовать лаборатории, но здесь достаточно места, которое можно использовать и по-другому."
  BLN_nf_b049:0 "Восстановление 2 подуровня"
  BLN_nf_b049_desc:0 "Этот второй уровень, который мы зачистили, похоже, представляет собой не более чем склад. Многое придётся сдать на металлолом, но пустое пространство можно использовать как хорошие мастерские."
  BLN_nf_b050:0 "Глубже фундамента"
  BLN_nf_b050_desc:0 "Глубоко под разрушенными подземными уровнями и подвалами находятся склады и хранилища, которые можно было бы переоборудовать для более полезных целей."
  BLN_nf_b051:0 "Рыцарские мастерские"
  BLN_nf_b051_desc:0 "У Рыцарей есть несколько идей, как использовать новое пространство. Нам стоит их выслушать."
  BLN_nf_b052:0 "Площадки для Писцов"
  BLN_nf_b052_desc:0 "Писцы выдвинули несколько идей относительно того, как они хотят использовать свою долю нового пространства."
  BLN_nf_c001:0 "Битва за проект «Чистота»"
  BLN_nf_c001_desc:0 "Анклав ворвался на проект «Чистота», и мы должны вытеснить их, прежде чем они смогут запустить его. Мы не можем позволить себе сдерживаться, запускайте Либерти Прайм!"
  BLN_nf_c002:0 "Победа на проекте «Чистота»"
  BLN_nf_c002_desc:0 "Анклав получил тяжелый удар на проекте «Чистота», но война еще далека от завершения."
  BLN_nf_c003:0 "Поражение на проекте «Чистота»"
  BLN_nf_c003_desc:0 "Проект «Чистота» остается в руках Анклава. Мы должны перегруппироваться и продумать наши дальнейшие действия."
  BLN_nf_c004:0 "Борьба за выживание"
  BLN_nf_c004_desc:0 "Нападение Анклава на проект «Чистота» было только началом. Они создают форпосты по всей пустоши и готовятся к крупномасштабному нападению не только на нас, но и на жителей пустоши. Радио «Новости Галактики» призывает жителей пустоши взяться за оружие, мы с вами."
  BLN_nf_c005:0 "Друзья в беде"
  BLN_nf_c005_desc:0 "Война с Анклавом в самом разгаре, и наши союзники несут большие потери. Хотя у нас мало средств, мы могли бы хотя бы послать им несколько инструкторов, чтобы помочь их людям лучше сражаться с нашим общим врагом."
  BLN_nf_c006:0 "Во имя Демократии!"
  BLN_nf_c006_desc:0 "Либерти Прайм пал. Если мы не найдем нового противодействия винтокрылам, мы последуем за ним."
  BLN_nf_c007:0 "Знай своего врага"
  BLN_nf_c007_desc:0 "Наши писари изучали оборудование Анклава, собранное с полей сражений, и совершили несколько прорывов в технологии силовой брони, которые раньше были нам недоступны."
  BLN_nf_c008:0 "Излишки Братства"
  BLN_nf_c008_desc:0 "Поселения Столичной Пустоши собирают всех, кого могут, на эту войну, но их оружия едва ли хватит для борьбы с Анклавом. Мы отправим им излишки оборудования, которое должно помочь им в войне."
  BLN_nf_c009:0 "«Шокирующая» ценность"
  BLN_nf_c009_desc:0 "Из довоенных архивов известно об экспериментальном трансформаторе Тесла в Силовых установках Олни. Это устройство может значительно продвинуть наши познания и позволить разработать оружие на основе тесла, способное уничтожать винтокрылы."
  BLN_nf_c010:0 "Птицы Войны"
  BLN_nf_c010_desc:0 "Наши разведчики провели несколько наблюдений за процедурами пополнения запасов Анклава и заметили определенные закономерности. Если мы будем осторожны, то сможем захватить несколько их винтокрылов."
  BLN_nf_c011:0 "Знак благодарности"
  BLN_nf_c011_desc:0 "Жители Столичной пустоши сообщили, что хотят послать нам знак благодарности за нашу помощь в защите их от Анклава. Согласно их сообщению, груз анклавовских вещей должен быть на пути в Цитадель."
  BLN_nf_c012:0 "Уничтожение винтокрылов"
  BLN_nf_c012_desc:0 "После нескольких недель исследований и разработок мы создали первую партию прототипов пушек Теслы. Они уже в распоряжении наших солдат."
  BLN_nf_c013:0 "Перехват Сигнала"
  BLN_nf_c013_desc:0 "Писец Валлинкур подготовила устройство, которое, по ее мнению, должно прервать сигналы, посылаемые аванпостами Анклава их управляемым когтям смерти. По ее мнению, это сработает лишь на время, прежде чем они смогут изменить свои частоты, но мы должны использовать любое преимущество, которое сможем получить."
  BLN_nf_c014:0 "Падение Рэйвен-Рока"
  BLN_nf_c014_desc:0 "Рэйвен-Рок пал, неужели это конец?"
  BLN_nf_c015:0 "Прогонать их прочь"
  BLN_nf_c015_desc:0 "Винтокрылы Анклава были замечены в бегстве с Рэйвен-Рок, как несколько десятилетий назад были замечены в бегстве с Наварро. Мы не должны повторить ту же ошибку, позволив им восстановиться. Мы должны найти их."
  BLN_nf_c016:0 "Нашли их"
  BLN_nf_c016_desc:0 "После нескольких месяцев поисков остатки Анклава были найдены. Они перегруппировываются на довоенной военной базе. Мы должны подготовить план для нанесения удара."
  BLN_nf_c017:0 "Битва за базу ВВС Адамс"
  BLN_nf_c017_desc:0 "Разгромив Анклав раз и навсегда, на этот раз по-настоящему, мы должны решить, что делать дальше."
  BLN_nf_c018:0 "Друзья и соседи"
  BLN_nf_c018_desc:0 "Война с Анклавом подходит к концу, и теперь нам нужно решить, что делать с нашими временными союзниками."
  BLN_nf_c019:0 "Альянс Лайонса"
  BLN_nf_c019_desc:0 "Анклав - не последняя угроза в Пустоши, и мы даже не уверены, что покончили с ними. Посмотрим, захотят ли наши союзники сохранить этот альянс."
  BLN_nf_c021:0 "Обмен мнениями"
  BLN_nf_c021_desc:0 "Наши союзники явно не готовы к тем знаниям, которыми обладаем мы. Однако позволить нашим младшим писцам выполнить кое-какие ремонтные работы или предоставить некоторые сведения о менее продвинутых проектах не помешает."
  BLN_nf_c020:0 "Держаться в стороне"
  BLN_nf_c020_desc:0 "Братство никогда не собиралось сражаться за жителей Пустоши. Мы не будем сражаться с нашими временными союзниками, но и не станем вести за них новую войну."
  BLN_nf_c022:0 "Стоять на своих принципах"
  BLN_nf_c022_desc:0 "Отказ от мелких разборок пустошей позволяет нам сосредоточиться на нашей миссии."
  BLN_nf_c023:0 "Утилизация Анклава"
  BLN_nf_c023_desc:0 "Хотя Рэйвен-Рок был разрушен, мы извлекали технику и из более худших мест."
  BLN_nf_c024:0 "Архивы Анклава"
  BLN_nf_c024_desc:0 "Большинство баз данных в Рэйвен-Рок были уничтожены взрывом, но кое-что все же можно восстановить."
  BLN_nf_c025:0 "Забытое знание"
  BLN_nf_c025_desc:0 "В ходе осмотра этих руин мы не должны оставить камня на камне, чтобы не позволить какому-нибудь мусорщику найти пузырек с ВРЭ."
  BLN_nf_c026:0 "Захватить брошенное снаряжение"
  BLN_nf_c026_desc:0 "Ящики с оборудованием были оставлены в Рэйвен-Рок и передовых базах, когда Анклав бежал. Мы должны забрать их, пока это не сделал кто-то другой."
  BLN_nf_c027:0 "Основать форпост"
  BLN_nf_c027_desc:0 "Для тщательного исследования руин Рэйвен-Рок потребуются годы. Нам нужно будет создать базу в этом районе, чтобы охранять наши работы по сбору ресурсов."
  BLN_nf_c028:0 "Обшарить поле боя"
  BLN_nf_c028_desc:0 "Отступая, Анклав оставил после себя множество погибших и большое количество оборудования. Мы должны собрать все, что сможем."
  BLN_nf_c029:0 "Вылечить раненых"
  BLN_nf_c029_desc:0 "Выжившие после битвы прибывают, а Анклав не прекращает погони. Мы должны помочь раненым, пока Анклав не начал контратаку."
  BLN_nf_d000:0 "Наша Лайонс"
  BLN_nf_d000_desc:0 "Внезапная смерть старейшины Оуэна Лайонса стала шоком для многих. Его вклад в развитие Братства и память о нем будут чтить. Теперь необходимо обсудить вопрос о его дочери и преемнике."
  BLN_nf_d001:0 "Раненая гордость"
  BLN_nf_d001_desc:0 "Внезапная смерть нашего нового старейшины привела Братство в смятение."
  BLN_nf_d002:0 "Ржавый щит"
  BLN_nf_d002_desc:0 "В последние годы нехватка ресурсов заставила старейшину Лайонса сделать непростой выбор. Одним из них стало сокращение средств, выделяемых на исследования писцов. Среди тех, кто пострадал от этого, был и Орден Щита Боудича. Отвечая за исследования доспехов и других защитных технологий, орден вынужден был обходиться меньшими средствами, чтобы рыцари могли получить доспехи, необходимые им для сражений. С учетом того, что в Анклав хлынут потоки технологий, возможно, мы сможем позволить себе вкладывать больше средств в исследования и разработки."
  BLN_nf_d004:0 "Обломок меча"
  BLN_nf_d004_desc:0 "Орден Щита был не единственным, кто пострадал от нехватки ресурсов. Ордену Меча также пришлось сократить свои работы. Ответственный за исследования оружия и других наступательных технологий, ряд проектов пришлось приостановить, чтобы рыцари могли получить боеприпасы и оружие для сражений. Как и в случае с Орденом Щита, мы можем перенаправить часть поступивших технологий Анклава на их нужды."
  BLN_nf_d006:0 "Притупленное перо"
  BLN_nf_d006_desc:0 "Орден Пера, возможно, пострадал больше всех во время нехватки ресурсов. В конце концов, во время крестового похода или войны можно было бы заняться разработкой доспехов и оружия, но что толку копаться в старых книгах, когда у ворот стоят враги? Теперь, когда все улеглось, мы можем предоставить Ордену Пера необходимые ресурсы."
  BLN_nf_d003:0 "Ремонтные услуги"
  BLN_nf_d003_desc:0 "Боудич и некоторые другие писцы иногда одалживали свои руки для ремонта чужого снаряжения за крышки, которые необходимы Братству. Эту практику можно расширить в наших интересах."
  BLN_nf_d005:0 "Улучшить оборону"
  BLN_nf_d005_desc:0 "Боудич руководил проектированием Цитадели более двух десятилетий назад. За годы, прошедшие с тех пор, как проект был признан завершенным, он отметил некоторые улучшения, которые можно было бы внести. Сейчас самое время воплотить их в жизнь."
  BLN_nf_d007:0 "Обновление кузницы"
  BLN_nf_d007_desc:0 "Стены Цитадели - не единственное, что можно было улучшить. Есть много возможностей лучше использовать кузницу."
  BLN_nf_d008:0 "Разведброня «Марк II»"
  BLN_nf_d008_desc:0 "Силовая броня - не единственная броня, которую использует Братство. Многие посвященные и даже некоторые рыцари экипированы в более легкую разведброню. До того как начались перебои с поставками, писарь Боудич был близок к завершению работы над прототипом улучшенной версии разведдоспеха. Теперь, когда Боудич принимает решения, он доведет проект до конца."
  BLN_nf_d009:0 "Старейшина-воин"
  BLN_nf_d009_desc:0 "Первые старейшины Братства сражались вместе со своими паладинами и рыцарями. Новый старейшина Лайонс намерен возродить эту традицию."
  BLN_nf_d010:0 "Жёсткая подготовка"
  BLN_nf_d010_desc:0 "Подготовка адептов может быть лучше, чем у большинства солдат в Пустошах, но ее всегда можно улучшить."
  BLN_nf_d011:0 "Штурмовая тренировка на винтокрылах"
  BLN_nf_d011_desc:0 "Поскольку все большее количество винтокрылов захватывается с аванпостов Анклава, мы должны начать обучать наших солдат тому, как сражаться изнутри этих машин."
  BLN_nf_d012:0 "Морские Львы"
  BLN_nf_d012_desc:0 "В рамках совершенствования наших боевых сил некоторые солдаты пройдут дополнительную подготовку по десантированию. Мы никогда не знаем, когда нам может понадобиться высадиться на враждебный берег."
  BLN_nf_d013:0 "Быть примером"
  BLN_nf_d013_desc:0 "Вид старейшины плечом к плечу с рыцарями и паладинами на фронте продолжает вдохновлять наших солдат, будем надеяться, что она не поймает шальной выстрел."
  BLN_nf_d014:0 "Гвардия Лайонс"
  BLN_nf_d014_desc:0 "В связи с опасениями по поводу безопасности Старейшины на передовой, элитная гвардия паладинов была переназначена для обеспечения поддержки и защиты ее жизни в бою."
  BLN_nf_d015:0 "Всегда носите шлем"
  BLN_nf_d015_desc:0 "Старейшина Мэксон II погиб от отравленной стрелы. Этого бы не случилось, если бы он не снял шлем. Наш старейшина извлечет урок из этой ошибки."
  BLN_nf_d016:0 "Сильнее и яростнее"
  BLN_nf_d016_desc:0 "Благодаря улучшенным тренировкам и старейшинам-воинам, возглавляющим фронт, наши солдаты находятся в лучшей боевой форме, чем когда-либо с момента нашего прибытия в Вашингтон."
  BLN_nf_d017:0 "Мантия вместо доспехов"
  BLN_nf_d017_desc:0 "Послушавшись совета писца Ротшильда, наш старейшина обменивает свой T-45 на комплект синих мантий."
  BLN_nf_d018:0 "Реформы политики"
  BLN_nf_d018_desc:0 "Уже освоившись в своей новой роли, Старейшина проводит ряд небольших реформ."
  BLN_nf_d019:0 "Свободная торговля"
  BLN_nf_d019_desc:0 "Торговля с пустошами может быть взаимовыгодной, если мы будем осторожны с теми, с кем ведем дела."
  BLN_nf_d020:0 "Реформы доктрины"
  BLN_nf_d020_desc:0 "Некоторые элементы нашей боевой доктрины устарели и нуждаются в обновлении."
  BLN_nf_d021:0 "Уроки Лайонс"
  BLN_nf_d021_desc:0 "Люди из «Новостей Галактики» попросили новую старейшину записать несколько аудиосоветов о выживании в пустоши, которые она почерпнула за время своей работы в поле. Они считают, что это очень поможет жителям Пустоши и ускорит процесс вербовки."
  BLN_nf_d022:0 "Реформы обучения"
  BLN_nf_d022_desc:0 "Как и наша боевая доктрина, некоторые из наших методов обучения застряли в 2100-х годах. Пришло время их изменить."
  BLN_nf_d023:0 "Оборонные учения"
  BLN_nf_d023_desc:0 "Наш новый старейшина заметил несколько дыр в нашей обороне, которые нужно залатать."
  BLN_nf_d024:0 "Восточный Кодекс"
  BLN_nf_d024_desc:0 "Кодекс содержит множество устаревших директив и препятствует нашей миссии по исправлению некоторых ужасов пустошей. Хотя не все поддерживают изменение Кодекса в угоду нашим нуждам, Старейшина не из тех, кто позволит кому-нибудь встать у неё на пути."
  BLN_nf_d025:0 "За пределами Столицы"
  BLN_nf_d025_desc:0 "Прочесывание руин Вашингтона никогда не было конечной целью нашей экспедиции. Есть места по всему Восточному побережью, которые мы должны осмотреть."
  BLN_nf_d026:0 "Отправляемся в Бостон"
  BLN_nf_d026_desc:0 "Наша первая экспедиция в Бостон только поверхностно изучила его. Нам еще многое предстоит найти."
  BLN_nf_d029:0 "Отряд «Гладиус»"
  BLN_nf_d029_desc:0 "Потеря отряда «Артемида» была печальным событием, но это не должно нас разубедить. Будет сформирован новый отряд, который отправится на север, выяснит, что случилось с отрядом Артемида, и принесет ценные технологии из Содружества."
  BLN_nf_d027:0 "Возвращение в Питт"
  BLN_nf_d027_desc:0 "Слухи о том, что Питт объединился под властью одного из наших братьев в королевство работорговцев, к сожалению, правдивы. Теперь нам нужно решить, что с этим делать."
  BLN_nf_d030:0 "Проклятие Питта"
  BLN_nf_d030_desc:0 "Что-то в воздухе или воде превращает длительное пребывание в Питте в медленный смертный приговор, но Ашур делает некоторые успехи в исцелении."
  BLN_nf_d028:0 "Операция «Скалолом»"
  BLN_nf_d028_desc:0 "Наша недавняя экспедиция в горы на западе говорит нам, что тамошние религиозные фанатики сидят в запечатанном довоенном бункере и, скорее всего, не знают об этом. К сожалению, они не позволят нам попасть на их территорию без боя."
  BLN_nf_d031:0 "Противостоящие силы"
  BLN_nf_d031_desc:0 "Наша экспедиция сообщает, что магнетическое оружие, используемое фанатиками к западу от Столичной пустоши, представляет собой серьезную угрозу для Братства. Конфликт неизбежен."
  BLN_nf_d032:0 "Просто «осмотреться вокруг»"
  BLN_nf_d032_desc:0 "Жители Столичной Пустоши взяли на себя смелость освободить Питт. Думаю, покойный старейшина Лайонс гордился бы ими. Как бы то ни было, владеют вещами, о которых не знают и не понимают. Нужно забрать их, пока что-нибудь не произошло."
  BLN_nf_d033:0 "Стабилизирующая сила"
  BLN_nf_d033_desc:0 "Питт явно ценнее, чем мы увидели во время первого осмотра города. На этот раз нам понадобится обеспечить постоянное присутствие, чтобы тщательно обыскать руины. Есть молодой паладин, который доказал свои способности во время войны Анклава и который может подойти для этой работы."
  BLN_nf_d034:0 "Собрать чертежи"
  BLN_nf_d034_desc:0 "Мы отправим рыцарей в руины, чтобы они забрали все технические данные и схемы, которые могут оказаться полезными. На этот раз мы не оставим камня на камне."
  BLN_nf_d035:0 "Оптимизация цехов"
  BLN_nf_d035_desc:0 "Эти кузницы, которые Ашур использовал для производства боеприпасов и других стальных изделий, способны на гораздо большее, нам просто нужно немного навыков писца."
  BLN_nf_d036:0 "Забытые промышленные секреты"
  BLN_nf_d036_desc:0 "После месяцев раскопок наши рыцари вернулись с горой ценных технических данных. Хотя не все из них могут быть полезны нам сейчас, многое из них можно применить в наших кузницах в Цитадели."
  BLN_nf_d037:0 "В погоне за призраками"
  BLN_nf_d037_desc:0 "Наша команда, отправленная на запад, чтобы проверить слухи о выживших из Анклава, вместо этого нашла признаки того, что наши братья, пропавшие на Среднем Западе, возможно, все-таки не погибли. Подготовьте несколько винтокрылов, чтобы оказать им поддержку для тщательного поиска."
  BLN_nf_d038:0 "Дальнее родство"
  BLN_nf_d038_desc:0 "Мы связались с человеком, который утверждает, что является старейшиной отделения Братства на Среднем Западе. Мы настроены скептически, но встреча между нашими старейшинами может быть оправдана."
  BLN_nf_d039:0 "Обмен данными"
  BLN_nf_d039_desc:0 "У наших братьев со Среднего Запада есть массивы данных, которые могут оказаться полезными для нас, так же как и у нас могут быть данные, которые могут оказаться полезными для них."
  BLN_nf_d040:0 "Программа обмена Писцами"
  BLN_nf_d040_desc:0 "Условия и технологии, доступные нам и нашим братьям со Среднего Запада, сильно различаются. Наши писцы могут многому научиться друг у друга. Было предложено обменяться несколькими писцами, чтобы обучать и учиться у писцов из других отделений."
  BLN_nf_d041:0 "Он нам не Брат"
  BLN_nf_d041_desc:0 "Кем бы ни был этот Айронс, любому из тех, кто смотрит на его работы, становится ясно, что с ним не поладишь."
  BLN_nf_d042:0 "План Камелота"
  BLN_nf_d042_desc:0 "У паладина, сбежавшего из плена Айронса, есть план, как ослабить его. Убийство Айронса на столь раннем этапе может быть самоубийственной миссией, но рыцаря Робинсона — нет. Рыцарь — один из его старейших союзников и лучших солдат, которого часто можно увидеть на передовой. Камелот собирает разведданные из полевых донесений и разрабатывает план, который Прайд должен будет осуществить."
  BLN_nf_d043:0 "Прямой подход"
  BLN_nf_d043_desc:0 "Мы не можем откладывать это дело в долгий ящик. Айронс — такая же серьёзная угроза, какой когда-то был Эден. Поэтому мы должны бросить всё, что у нас есть, чтобы остановить его."
  BLN_nf_d044:0 "Хорошие парни возвращаются"
  BLN_nf_d044_desc:0 "Жители Среднего Запада, естественно, в ужасе при виде рыцарей Братства, входящих в их деревни. Учитывая то, что им пришлось пережить при Айронсе, мы не можем их винить. Потребуется время, чтобы убедить их, что на этот раз Братство — хорошие ребята."
  BLN_nf_d045:0 "Наихудший сценарий"
  BLN_nf_d045_desc:0 "В некоторых документах, найденных на авиабазах Рэйвен-Рок и Адамс, упоминается некий «Чикагский форпост» Анклава. Мы всегда предполагали, что это что-то вроде трёх парней, сидящих в бункере. Мы ошибались, очень сильно ошибались."
  BLN_nf_d046:0 "Помощь повстанцам Среднего Запада"
  BLN_nf_d046_desc:0 "По всему Среднему Западу обитатели пустошей сопротивляются власти Анклава. Мы протянем им руку помощи."
  BLN_nf_d047:0 "Мобилизовать поддержку Дома"
  BLN_nf_d047_desc:0 "Радио «Новости Галактики» начнет транслировать новости о событиях на Среднем Западе и правлении Чикагского Анклава. Это должно сплотить людей и побудить их присоединиться к нашей борьбе."
  BLN_nf_d048:0 "Еще один довоенный монстр"
  BLN_nf_d048_desc:0 "Братство было основано в знак протеста против рукотворных ужасов, творимых довоенным правительством США. Неудивительно, что в Чикаго можно встретить подобную мерзость."
  BLN_nf_d049:0 "Воссоединение семьи"
  BLN_nf_d049_desc:0 "Идеалы Братства Среднего Запада тесно связаны с нашими собственными. Поэтому вполне логично, что мы официально объединим усилия с нашими братьями."
  BLN_nf_d050:0 "Ещё один чёртов Анклав?"
  BLN_nf_d050_desc:0 "Почему каждый раз, когда мы идем куда-то с интересом к довоенной техникой, мы натыкаемся на кучу придурков?"
  BLN_nf_d051:0 "Защитить Фонтан"
  BLN_nf_d051_desc:0 "Фонтан снов – это местная легенда, которую расследовало затерянное Братство Залива. Если Братство Среднего Запада послало туда людей, это должно было стоит внимания."
  BLN_nf_d052:0 "Архивы Ван-Бюрена"
  BLN_nf_d052_desc:0 "Архивы авиабазы ​​Ван-Бюрен полны технических данных, связанных с авиацией и космическими полётами. Писцам будет чем заняться."
  BLN_nf_d053:0 "Почему Луна?"
  BLN_nf_d053_desc:0 "Анклав потратил кучу передовых довоенных технологий на мечту покинуть эту планету. По какой-то причине их особенно интересовала Луна. Нам нужно выяснить, почему."
  BLN_nf_d054:0 "Изолированные Братья"
  BLN_nf_d054_desc:0 "Экспедиция наших павших братьев из Братства Среднего Запада слишком долго была отрезана от мира. Пришло время им увидеть дружелюбное лицо или костюм Т-45."
  BLN_nf_d055:0 "Столичное Писание"
  BLN_nf_d055_desc:0 "Флорида является родиной множества передовых технологий, достойных изучения. Мы могли бы отправить некоторых из наших писарей в Братство Залива, чтобы они изучали их и научили их кое-чему о том, как мы работаем в Столичной Пустоши."
  BLN_nf_d056:0 "Мудрость Флориды"
  BLN_nf_d056_desc:0 "Жители пустошей Флориды, возможно, и странные даже по меркам пустошей, но они кое-что знают о том, как удержать лодку на плаву."
  BLN_nf_d057:0 "Фонтан чего?"
  BLN_nf_d057_desc:0 "Наши братья во Флориде утверждают, что у них есть фонтан с водой, которая вымывает радиацию из организма, как «Антирадин». Это не может быть правдой, верно?"
  BLN_nf_d058:0 "Канаданклав?"
  BLN_nf_d058_desc:0 "Почему нас не удивляет, что в Канаде тоже есть бункер Анклава?"
  BLN_nf_d059:0 "Командный Центр в Онтарио"
  BLN_nf_d059_desc:0 "Наши разведчики обнаружили заброшенный бункер командования в Онтарио, в котором когда-то располагался Анклав Онтарио."
  BLN_nf_d060:0 "Снежные дикари"
  BLN_nf_d060_desc:0 "Жители пустошей Онтарио бродят среди руин, полных передовых технологий, которые им непонятны. Им нужно наше руководство."
  BLN_nf_d061:0 "Знакомая технология"
  BLN_nf_d061_desc:0 "Какого черта у кучки жителей пустошей в Канаде появилась броня анклава?"
  BLN_nf_d062:0 "Подкорректировать В.А.Ш.И.Н.Г.Т.О.Н"
  BLN_nf_d062_desc:0 "Довоенное правительство потратило передовой компьютер ZAX на такую ​​глупость, как управление гражданскими лицами. Мы могли бы использовать его более эффективно, внеся некоторые коррективы."
  BLN_nf_d063:0 "Входя в Эдем"
  BLN_nf_d063_desc:0 "Получив защищенный доступ к убежищу, мы можем более подробно рассмотреть причину этой проблемы с болотом..."
  BLN_nf_d064:0 "Возвращение на истинный путь"
  BLN_nf_d064_desc:0 "Лайонс и его дочь десятилетиями скверно обращались с этим отделением. Теперь, когда их обоих больше нет, мы можем привести её в соответствие с Кодексом."
  BLN_nf_d065:0 "Рыцари"
  BLN_nf_d065_desc:0 "Стандарты набора персонала изменятся с приходом старейшины Касдина."
  BLN_nf_d066:0 "Очищение руин"
  BLN_nf_d066_desc:0 "Главной целью этой экспедиции было прочесывание руин Вашингтона в поисках важных технологий. Теперь, когда нас не беспокоят мелочи, мы можем вернуться к этой задаче."
  BLN_nf_d067:0 "Защитники и Паладины"
  BLN_nf_d067_desc:0 "Слишком многие лидеры Цитадели всё ещё разделяют идеалы Лайонса. Старейшина Касдин будет продвигать братьев, которые больше соответствуют целям Ордена."
  BLN_nf_d068:0 "Необработанные алмазы"
  BLN_nf_d068_desc:0 "Под 200-летними руинами скрываются незаменимые образцы техники. Эти технологии должны принадлежать тем, кто умеет ими правильно пользоваться."
  BLN_nf_d069:0 "Западные подкрепления"
  BLN_nf_d069_desc:0 "Лост-Хиллс считает целесообразным отправить новому старейшине еще несколько рыцарей, чтобы помочь ордену завершить свою миссию."
  BLN_nf_d070:0 "Удостоверения сборщика"
  BLN_nf_d070_desc:0 "Даже с 10,000 Рыцарями и Писцами, рыскающими по руинам, мы никогда не найдём каждый кусочек бесценной техники. Вместо того, чтобы копаться в обломках самим, мы позволим пустошникам делать это. Они должны быть одобрены нами и сдавать каждый ценный кусочек техники, который найдут. Мы должны быть в состоянии отплатить им мелкими товарами, такими как пули 5.56 или что-то в этом роде."
  BLN_nf_d071:0 "Перековка Стали"
  BLN_nf_d071_desc:0 "Пусть и прошло больше 20 лет с тех пор, как ожидалось, но этот Орден наконец-то делает то, что должен. Нам осталось лишь одно: сбросить с себя груз предательства Лайонса."
  BLN_nf_e001:0 "Блудные братья"
  BLN_nf_e001_desc:0 "Многие из наших потерянных братьев думали, что наше отделение вымрет без них, но мы доказали, что они ошибались. Теперь посмотрим, что они думают о наших нетрадиционных методах."
  BLN_nf_e002:0 "Рука помощи"
  BLN_nf_e002_desc:0 "Может, эти братья и бросили нас когда-то, но наша победа над Анклавом и дальнейшее выживание доказали ценность Доктрины Лайонса. Вряд ли они вернутся к нам, но это может стать началом возобновления сотрудничества."
  BLN_nf_e003:0 "Преподать урок"
  BLN_nf_e003_desc:0 "Какое-то время мы терпели догматическую деятельность наших братьев-изгоев, но некоторые из их недавних действий поставили под угрозу наших союзников в Пустоши. Нужно наставить их на правильный путь или изгнать из Столичной пустоши."
  BLN_nf_e004:0 "Сплотиться"
  BLN_nf_e004_desc:0 "Обмен исследованиями, разведданными и совместные тренировки принесут пользу обеим сторонам."
  BLN_nf_e005:0 "Увидеть причину"
  BLN_nf_e005_desc:0 "Большинство Изгоев сложили оружие и смирились с нашей победой. Их интеграция потребует больших усилий."
  BLN_nf_e006:0 "Исцеление ран"
  BLN_nf_e006_desc:0 "Раскол с нашими братьями-изгоями начал процесс заживления. Со временем маленький бунт Кадена станет лишь небольшой сноской в нашей истории."
  BLN_nf_e007:0 "Старый враг"
  BLN_nf_e007_desc:0 "Спустя столетие после поражения Мастера мы все еще имеем дело с супермутантами. Хотя это уже другая порода, их ужасная природа осталась прежней. После победы над Анклавом мы должны вновь обратить внимание на давнего недруга."
  BLN_nf_e008:0 "Найти их логово"
  BLN_nf_e008_desc:0 "Мутанты плодятся столь быстро, что даже наши лучшие рыцари не успевают их убивать. Если мы хотим покончить с этим кошмаром, нам нужно остановить их размножение."
  BLN_nf_e009:0 "Зелёная волна"
  BLN_nf_e009_desc:0 "Как будто бродячие группы супермутантов были недостаточно опасны, один из них, очевидно, организовал массовое скопление. Мы должны остановить это, пока ситуация не вышла из-под контроля."
  BLN_nf_e010:0 "Смерть Шепарда"
  BLN_nf_e010_desc:0 "Угроза супермутантов устранена, их улей разгромлен, но что делать с их лидером?"
  BLN_nf_e011:0 "Прямиком в их логово"
  BLN_nf_e011_desc:0 "Логово супермутантов было найдено в убежище 87, и кажется, мы нашли способ проникнуть внутрь. Осталось только разработать план штурма этого логова нечисти."
  BLN_nf_e012:0 "Конец кошмара"
  BLN_nf_e012_desc:0 "Логово супермутантов в убежище 87 уничтожено, и мутанты больше не появятся. Сейчас не время праздновать, мутанты еще остались."
  BLN_nf_f001:0 "Расчистка завалов"
  BLN_nf_f001_desc:0 "После битвы на авиабазе Адамс осталось много оборудования, которое нужно извлечь из-под обломков. Организуем команды для расчистки поля боя."
  BLN_nf_f002:0 "Свалка"
  BLN_nf_f002_desc:0 "Мобильный краулер пришлось уничтожить в ходе сражения. Тлеющий кусок металла, который братья, размещенные там, называют свалкой, все еще имеет некоторую ценность."
  BLN_nf_f003:0 "Аэродром"
  BLN_nf_f003_desc:0 "Аэродром на авиабазе Адамс пострадал и от 200-летнего запустения, и от недавней битвы. Мы должны починить все, что можно, чтобы использовать наши новые винтокрылы."
  BLN_nf_f004:0 "Ремонт обороны"
  BLN_nf_f004_desc:0 "Оборонительные сооружения на авиабазе Адамс были повреждены во время нашего нападения. Мы восстановим их, прежде чем сделаем это место своим домом."
  BLN_nf_f005:0 "Проект «Придвен»"
  BLN_nf_f005_desc:0 "У писцов есть планы по улучшению довоенных конструкций дирижаблей. Если нам удастся осуществить задуманное, этот корабль изменит все."
  BLN_nf_f006:0 "Ресурсы под рукой"
  BLN_nf_f006_desc:0 "Если мы хотим построить эту штуку, нам понадобится больше ресурсов, чем у нас есть. Потребуется время, чтобы найти решение."
  BLN_nf_f007:0 "Строительство Титана"
  BLN_nf_f007_desc:0 "Даже имея ресурсы для постройки «Придвена», самое сложное еще впереди. Теперь нам нужно построить эту чертову штуку."
  BLN_nf_f008:0 "Летающая Цитадель"
  BLN_nf_f008_desc:0 "Строительство «Придвена» близится к завершению. С этим кораблем мы сможем отправиться почти куда угодно и преследовать свои цели, и никто нас не остановит, если только у жителей пустошей не найдется несколько старых добротных пушек."

  BLN_nf_f009:0 "Бремя Бигсли"
  BLN_nf_f009_desc:0 "Все были так взволнованы этим очистителем проект «Чистота» это и проект «Чистота» то. Но никто не задавался вопросом: А что мы будем делать со всей этой чистой водой? Что ж, угадайте, кому достанется эта крошечная деталь. Одно дело, если бы у меня была поддержка, но эта маленькая война с Анклавом истощила большую часть ресурсов Братства. И ко всему прочему, мне приходится быть мамой для целой кучи ребят в лабораторных халатах."
  BLN_nf_f010:0 "Воды жизни"
  BLN_nf_f010_desc:0 "Писец Бигсли обнаружил, что производство воды идет немного выше ожиданий, и пока не сообщил об этом Старейшине. Старейшина хочет, чтобы мы бесплатно делились водой с жителями пустоши. Ривет-Сити поможет с распределением, но это все равно масштабное мероприятие. Я надеюсь, что добрая воля, которую она породит, будет того стоить."
  BLN_nf_f011:0 "Тайная торговля водой"
  BLN_nf_f011_desc:0 "Писарь Бигсли обнаружил, что производство воды немного превышает ожидания, и пока не сообщил об этом Старейшине. Вместо того чтобы сообщать об этом излишке, он мог бы продать его и использовать крышки, чтобы подсластить условия сделки для многих рыцарей, которым не нравится сопровождать водные караваны. Разве они не заслуживают вознаграждения за эту опасную работу?"
  BLN_nf_f012:0 "Вода для спасения"
  BLN_nf_f012_desc:0 "Писарь Бигсли обнаружил, что производство воды немного превышает ожидания, и пока не сообщил об этом Старейшине. Вместо того чтобы сообщать об этом излишке, он может обменять лишнюю воду на технологию, которая позволит и поддерживать работу очистителя, и помочь его коллегам-писцам."

  BLN_nf_f013:0 "Везде, где я брожу"
  BLN_nf_f013_desc:0 "Место, где находится проект «Чистота», хоть и весьма важно, но с него трудно снаряжать караваны с водой. Нам следует поискать другие места, чтобы сосредоточиться на распределении воды."
  BLN_nf_f014:0 "Проект «Расширение»"
  BLN_nf_f014_desc:0 "Сеть распределения воды оказалась головной болью для Бигсли и почти всех писцов, которым поручили работать над ней. С помощью улучшенного оборудования мы сможем облегчить некоторые элементы работы."
  bln_unlock_first_project_decisions_tt:0 "Завершение этого фокуса разблокирует §Yрешения§! для создания проектов по улучшению нашей §CВодораспределительной сети§!."
  BLN_nf_f015:0 "Протяните руку помощи §CДельмарве§!"
  BLN_nf_f015_desc:0 "В Пустоши есть нечто большее, чем просто Столица. К востоку от нас находится полуостров Дельмарва, населенный в основном скромными рыбаками и пиратами, угрожающими их существованию. Из них могут получиться отличные небольшие торговые партнеры."
  bln_reach_out_to_delmarva_tt:0 "Мы отправим посланников к рыбацким группам §BДелмарвы§!, предложив им §Yводу§! в обмен на §Gкорабли§! и §Gторговые привилегии§!. Если они согласятся, то помогут §Yраспределить воду§!."
  BLN_nf_f016:0 "Стабильный поток"
  BLN_nf_f016_desc:0 "Когда с насущными проблемами разобрались, осталась только ежедневная рутинная работа по организации караванов и поддержанию этого места вместе. Наша водная сеть связывает воедино нашу растущую нацию."
  bln_water_cores_tt:0 "Завершив это направление, вы сможете принять §Yрешение§! о §Gнационализации§! государства с достаточным количеством воды, или §Gпостоянно снабжать§! наши национальные территории."
  
