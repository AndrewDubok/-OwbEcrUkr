###Events###
    ecr_generic_events.1.title:0 "Приз Мусорщика"
    ecr_generic_events.1.desc:0 "Мусорщик не знает, сколько у него осталось времени. Он скоро станет «очень странным». Вперёд, атакуйте Парк Херши!"
    ecr_generic_events.1.a:0 "Хорошо?"
    ecr_generic_events.2.title:0 "Трон Мусорщика"
    ecr_generic_events.2.desc:0 "Мусорщик стареет. Сможет ли он удержать свой трон? Или пора назначить нового правителя?"
    ecr_generic_events.2.a:0 "Будет править Золотой Бог!"
    ecr_generic_events.2.b:0 "Первый вариант — худший, правит Алюминиевый Монстр!"
    ecr_generic_events.2.c:0 "Трандл Великий будет править."
    ecr_generic_events.2.d:0 "Мусорщик не уходит на пенсию!"
    ecr_generic_events.3.title:0 "Еще один культ сходит с ума"
    ecr_generic_events.3.desc:0 "Церковь Роки собиралась снова напасть на наш народ, но была остановлена ​​Культом Кобальта. Наш народ обрадовался, когда угроза была устранена, но радость эта была преждевременной. Воодушевлённый своей победой, Культ Кобальта продвигается по стране. Очевидно, что они скоро придут за нами."
    ecr_generic_events.3.a:0 "Приготовиться!"
    ecr_generic_events.4.title:0 "Еще один культ сходит с ума"
    ecr_generic_events.4.desc:0 "Церковь Роки собиралась снова напасть на наш народ, но была остановлена ​​отрядом Лоренца. Наш народ обрадовался, когда угроза была устранена, но радость была преждевременной. Воодушевлённые своей победой, члены культа магнита двинулись по стране. Очевидно, что они скоро придут за нами."
    ecr_generic_events.4.a:0 "Приготовиться!"
    ecr_generic_events.5.title:0 "Онионбург просит защиты"
    ecr_generic_events.5.desc:0 "Каким-то чудом фермеры Оннионбурга смогли отразить нападение Церкви Роки. Однако эта борьба истощила их силы. Они едва могут защитить свои фермы, не говоря уже о новых границах. Фермеры обратились к нам с просьбой, чтобы Грин-Маунтин Бойз помогли защитить их дома."
    ecr_generic_events.5.a:0 "Конечно, мы поможем нуждающемуся соседу."
    ecr_generic_events.6.title:0 "Здесь нечего смотреть"
    ecr_generic_events.6.desc:0 "Здесь нечего смотреть"
    ecr_generic_events.6.a:0 "Здесь нечего смотреть"
    ecr_generic_events.7.title:0 "Здесь нечего смотреть"
    ecr_generic_events.7.desc:0 "Здесь нечего смотреть"
    ecr_generic_events.7.a:0 "Здесь нечего смотреть"
    ecr_generic_events.8.title:0 "Здесь нечего смотреть"
    ecr_generic_events.8.desc:0 "Здесь нечего смотреть"
    ecr_generic_events.8.a:0 "Здесь нечего смотреть"
    ecr_generic_events.9.title:0 "Странные события"
    ecr_generic_events.9.desc:0 "Неподалеку от Тенпенни-Тауэр есть странное здание, которого избегают почти все мусорщики, торговцы и даже рейдеры. Старое довоенное офисное здание, известное как Данвич-билдинг, имеет репутацию места, куда люди уходят и никогда не возвращаются. Никто не знает, что там на самом деле происходит, потому что те немногие люди, которым удалось выбраться, либо отказываются говорить об этом, либо совершенно ничего не воспринимают. Несмотря на это, наша команда по поиску мусора отправилась на место, и с тех пор их никто не видел. Их семьи просят нас разобраться в этом."
    ecr_generic_events.9.a:0 "Мы можем отправить отряд солдат"
    ecr_generic_events.9.b:0 "Ни за что на свете"
    ecr_generic_events.10.title:0 "Ещё больше пропавших"
    ecr_generic_events.10.desc:0 "Людей, которых мы послали расследовать исчезновения в Данвич-билдинг, с тех пор никто не видел. Прохожие подтвердили, что видели, как они входили в здание, но никто не видел, как они выходили. Что могло там произойти?"
    ecr_generic_events.10.a:0 "Мы должны выяснить, что произошло"
    ecr_generic_events.10.b:0 "Мы пытались, но это конец"
    ecr_generic_events.11.title:0 "Единственный выживший"
    ecr_generic_events.11.desc:0 "Один из членов команды, которую мы отправили в Данвич-билдинг, вернулся живым. Несмотря на неоднократные попытки, нам так и не удалось ничего выяснить у этого человека. Те несколько раз, когда он всё-таки заговаривался, он нёс абсолютную чушь о ком-то по имени Альхазред и о чем-то по имени Г'Йет, после чего заливался слезами и был безутешен в течение нескольких дней. Очевидно, мы никогда не получим от этого человека ответов, которые ищем."
    ecr_generic_events.11.a:0 "Мы должны узнать!"
    ecr_generic_events.11.b:0 "Некоторых вещей лучше не знать"
    ecr_generic_events.12.title:0 "Горстка выживших"
    ecr_generic_events.12.desc:0 "Из 15 человек, которых мы отправили исследовать Данвич-билдинг, вернулись трое. Все они явно потрясены тем, что им пришлось пережить, но нам удалось собрать воедино кое-что из того, что там произошло. Здание, по-видимому, кишит дикими гулями, и если этого недостаточно, то истории, которые они рассказывают, звучат так, будто в этом месте водятся привидения. Выжившие говорят, что они провели в здании месяцы, что не может быть правдой, потому что прошло всего несколько недель. Они также рассказывают о странном обсидиановом шпиле в пещере под зданием, который вошел в их сны и показал им огромный затонувший город. Когда их спрашивают о пропавших членах команды и других лицах, которые числились пропавшими без вести, все они дают один и тот же ответ. "Они в Гите". Двое из них были найдены мёртвыми по неизвестной причине, а третий отказывается говорить."
    ecr_generic_events.12.a:0 "Так что... нам просто следует избегать этого места, верно?"
    ecr_generic_events.13.title:0 "Силы Востока"
    ecr_generic_events.13.desc:0 "Самые могущественные города Восточного побережья находятся под нашим контролем. Наши враги повержены, и даже Анклав с Братством не могут представлять для нас угрозу. В этом регионе мы мало что можем сделать, поэтому наши взоры должны быть обращены на запад."
    ecr_generic_events.13.a:0 "Они не готовы к нам"
    ecr_generic_events.14.title:0 "Ещё больше пропавших"
    ecr_generic_events.14.desc:0 "Людей, которых мы отправили расследовать пропажу команд в здании Данвича, с тех пор никто не видел. Как и остальные, отчёты подтверждают, что в последний раз их видели входящими в здание. С тех пор все контакты были потеряны. Становится очевидным, что это здание гораздо опаснее, чем мы предполагали. Но что может быть внутри него?"
    ecr_generic_events.14.a:0 "МЫ ДОЛЖНЫ ЗНАТЬ, ЧТО ПРОИСХОДИТ"
    ecr_generic_events.14.b:0 "Мы пытались, но это конец"
