l_russian:
  ####AMM####
  amm_amish_paradise: "Рай для Амишей"
  amm_amish_paradise_desc: "Даже спустя два столетия после войны амиши все еще веселятся, как в 1699 году."
  amm_all_equal_in_gods_eyes: "Перед Богом все равны"
  amm_all_equal_in_gods_eyes_desc: "В Долине Аммана запрещено плохо относиться к детям Божьим. Поэтому здесь часто можно встретить супермутантов и гулей, мирно сосуществующих с людьми."
  amm_sunflower_trade: "Торговля подсолнечником"
  amm_sunflower_trade_desc: "Подсолнечник Амишей безопасен для употребления только при условии правильного выращивания, что умеют делать только жители Долины Аммана, являющиеся единственными надежными производителями продукции из этого ядовитого цветка."
  amm_rising_fears: "Растущие страхи"
  amm_rising_fears_desc: "Несмотря на склонность Амишей подставлять другую щеку, их соседи-рейдеры могут положить конец этому Амишскому Раю."
  amm_no_peeking: "Странный Эл"
  amm_no_peeking_desc: "Да, это отсылка к песне «Weird» Al Yankovic - Amish Paradise. Да, вы очень умны, что просмотрели файлы."

  ####ANV####
  anv_american_pie: "Кусочек американского пирога"
  anv_american_pie_desc: "Андейл - лучший город в США! Маленький кусочек довоенной жизни в послевоенном мире... со всеми вытекающими последствиями."
  anv_meat_mania: "Мясомания"
  anv_meat_mania_desc: "В Андейле полно мяса, хотя ни одного брамина не видно..."
  anv_stepford_style: "Степфордский стиль"
  anv_stepford_style_desc: "Жители Андейла верят, что их путь - лучший, даже если он не продержится долго под «огнем»..."
  anv_mysterious_happenings: "Таинственные Происшествия"
  anv_mysterious_happenings_desc: "Помните ли вы, что стало известно в день смерти музыки?"
  anv_kill: "Садистское питание"
  anv_kill_desc: "В Андейле людей убивают и едят, но не всегда в таком порядке..."
  anv_settle: "Наш образ жизни"
  anv_settle_desc: "Каннибализм не обязательно должен быть нецивилизованным. В Андейле бродячие путешественники - такой же источник пищи, как и любой другой."

  ####APP####
  app_victors_of_the_swamp: "Победители Болотной Войны"
  app_victors_of_the_swamp_desc: "Наша победа над прорицателями и фанатиками вызвала недовольство. Полагаю, это означает, что мы знаем, с чем имеем дело."
  app_the_great_wheel: "Великое Колесо"
  app_the_great_wheel_desc: "Великое Колесо - дар Посейдона, хранилище знаний из Старого Мира."
  app_guardians_of_apocryphia: "Стражи Апокрифов"
  app_guardians_of_apocryphia_desc: "Посейдон, Бог Моря, поручил нам, своим последователям, защитить Город Знаний от тех, кто хочет его разрушить, и мы справимся с этой задачей!"

  ####LOR####
  LOR_power_of_magnets:0 "Мощь Магнетизма"
  LOR_power_of_magnets_desc:0 "Владение магнетическими силами дает нам преимущество в борьбе с тяжелобронированными противниками."
  LOR_scientific_tunnelvision_idea:0 "Научное туннельное зрение"
  LOR_scientific_tunnelvision_idea_desc:0 "Всё наше общество вращается вокруг изучения магнитных полей. Эта сосредоточенность позволила нам достичь больших высот и сохранить единство нации, но и она не лишена недостатков. Несмотря на всю мощь нашего оружия, большинство наших людей заинтересованы в его совершенствовании, а не в стрельбе. Если мы столкнёмся с решительным противником, у нас будут проблемы."

  ####ONN####
  ONN_land_of_lotus:0 "Земли пожирателей Лотоса"
  ONN_land_of_lotus_desc:0 "Бедняки Западной Вирджинии уже давно прибегают к наркотикам, чтобы спастись от бед бывшей страны. Когти смерти, рейдеры и гули - понятно, почему жители в большинстве своем решили доживать свои дни в психоделическом блаженстве. Вечное путешествие лишает их способности видеть окружающий мир. В конце концов, эти люди будут блуждать до тех пор, пока не перестанут двигаться, а затем уснут, пока не перестанут дышать. Попытка Америки приручить этот древний мир потерпит неудачу, когда последний человек в Западной Вирджинии умрет от их постоянного рая. \n\n§RЕсли Леоне умрет, не найдя выхода из кризиса, страна рухнет, а ее население будет разорено.§!"
  ONN_strained_administration:0 "Напряженная Администрация"
  ONN_strained_administration_desc:0 "Онионбург управляется небольшой группой оставшихся разумных людей. Они с трудом управляют общественными системами, необходимыми для поддержания жизни и работы людей, но их малочисленность позволяет быстрее и эффективнее осуществлять преобразования."
  ONN_reliant_on_protectors_idea:0 "Зависимость от защитников"
  ONN_reliant_on_protectors_idea_desc:0 "Будь то Грин-Маунтин Бойз в обмен на еду или таинственный защитник в лесу, наш народ склонен полагаться на других, чтобы защитить нас от опасностей. Почти все мы больше привыкли держать косу, чем винтовку. Это сделало бы нас лёгкой добычей для рейдеров, если бы нас не защищали соседи."


  ####MON####
  MON_the_hills_hide:0 "Холмы хранят Тайны"
  MON_the_hills_hide_desc:0 "Хребет Аппалачи существует уже много веков, и за это время все существа на Земле в то или иное время искали убежища на его холмах. На склонах холмов видны шрамы, а под нетронутой грязью лежит фундамент из мертвецов. Нерассказанная история этой земли притягивает людей, и те, кто наблюдает за холмами, становятся их стражами. Каждый, кто провел время в лесах Мононгахелы, находит утешение в том, что сам хребет - живой, и когда придет его время, он примет его и будет защищать до тех пор, пока существует Земля."

  ####COC####
  COC_the_holy_fusion:0 "Святое Слияние"
  COC_the_holy_fusion_desc:0 "Культ Кобальта считает, что нашел единственный истинный источник сверхъестественного в Пустоши. Образовавшись в результате миссии Детей Атома, они обнаружили остатки Западной Вирджинии, подвергшейся ядерной бомбардировке не один раз, а несколько раз после великой войны. Они восприняли это как откровение и стали поклоняться близнецам Атома: Делению и Слиянию. Деление - это смерть, а Слияние - возрождение. До сих пор они мирно живут в Западной Вирджинии, но кто знает, как долго это продлится?"
  COC_crisis_among_warriors_idea:0 "Упадок класса воинов"
  COC_crisis_among_warriors_idea_desc:0 "Наше мирное существование в Аппалачах привело к тому, что многие наши воины сложили оружие, чтобы заняться другими делами. И так, вероятно, будет продолжаться до тех пор, пока дикари к северу от нас не вторгаются."

  ####OUT####
  OUT_true_loyalists:0 "Верные Идеалам"
  OUT_true_loyalists_desc:0 "Братство называет нас изгоями, потому что боится правды - того, что именно они отступили от наших идеалов."
  
  ####HAB####
  HAB_johnstown_tributes:0 "Выплаты Джонстауна"
  HAB_johnstown_tributes_desc:0 "В соседнем поселении Джонстаун уже давно знают, что лучше откупиться от бандитов из Гаррисбурга, чем рисковать столкнуться с их гневом."
  HAB_pitt_trade:0 "Торговля с Питтом"
  HAB_pitt_trade_desc:0 "Бандиты из Гаррисбурга - одна из многих групп, поставляющих в Питт постоянный поток рабов. Крышки, полученные от продажи пленников, идут на финансирование дальнейших рейдов."

  ####AFB###
  AFB_dormant_facility:0 "Недействующий Объект"
  AFB_dormant_facility_desc:0 "База ВВС Адамс пустует уже почти 200 лет. Её металл ржавеет, а автоматизированные системы погрязли в ежедневной рутине патрулирования территории, чтобы не допустить проникновения посторонних. Чтобы стряхнуть пыль с этого места, потребуется что-то серьёзное."
  AFB_no_entry:0 "ВХОД ВОСПРЕЩЁН"
  AFB_no_entry_desc:0 "Посторонним лицам запрещено находиться на территории базы ВВС Адамс. Те, кто пытался проникнуть внутрь, были встречены огнём лазеров, и так будет продолжаться до тех пор, пока не будет уничтожен последний протектрон."

  ####HOS####
  hos_hit_the_ice:0 "Удар по льду"
  hos_hit_the_ice_desc:0 "Хозеры, как и их родич Ронто, помешаны на хоккее. В отсутствие "цивилизованных" жителей Ронто хозеры разработали свой вид спорта, еще более жестокий, чем в Ронто. Жертвы неизбежны при таком ожесточенном соперничестве, но это лишь часть удовольствия. Остаётся только удивляться, как им и Ронто вообще удается проводить матчи друг против друга."

  hos_team_mentality:0 "Менталитет команды"
  hos_team_mentality_desc:0 "Команды Хозеров - это закрытые клубы, в которых царит чувство товарищества и сплочённости, практически невиданное ранее в рейдерских группировках. Игроки поддерживают тесные дружеские отношения, и болельщики тоже. Однако, как и в любом закрытом клубе, цена членства в нём высока."

  ####JON####
  JON_hab_tribute:0 "Выплаты Гарисбургу"
  JON_hab_tribute_desc:0 "Когда Гаррисбургские бандиты начали совершать рейды на фермы Джонстауна, и городская милиция оказалась не в силах противостоять им, мэр Бауэр сделал бандитам предложение. В обмен на 10% от урожая бандиты оставят город и его жителей в покое. К сожалению, с ростом силы бандитов росли и их требования. В настоящее время жители отдают 20% своего урожая, предоставляют бандитам свободный доступ к дорогам для караванов с рабами, а вторую дочь семьи по достижении совершеннолетия выдают замуж за одного из бандитов. Но все же это лучше, чем подвергаться грабежам каждые несколько недель... не так ли?"
  JON_road_wardens:0 "Дорожные надзиратели"
  JON_road_wardens_desc:0 "Каждый день через Джонстаун проходят караваны, направляющиеся в Питт для продажи рабов, захваченных Гаррисбургскими бандитами или купленных у других банд рейдеров. Время от времени караваны попадают в засаду, устроенную неизвестными дружинниками, известными как "Дорожные надзиратели". Состоящие из фермеров Джонстауна, которым надоело закрывать глаза на страдания тех, кого продают бандиты, они тщательно координируют удары, когда это возможно, чтобы освободить рабов и нанести ответный удар своим противникам. Однако если нападение не удается, и кого-то ловят, то, как правило, его семья попадает в следующий караван."

  ####KWF####
  kwf_horrors_of_the_open_ocean:0 "Ужасы открытого океана"
  kwf_horrors_of_the_open_ocean_desc:0 "Остатки американского флота веками дрейфовали по течениям Атлантики, а находившиеся на их борту люди были заперты в бесконечном заточении. Выжившие недавно нашли сушу, на которой осталось лишь несколько кораблей, и у них нет желания вновь переживать время, проведенное в море. Ноунфолкцы начинают сторониться своего парусного наследия и знаний, которые ему сопутствуют."

  ####BFI####
  BFI_pirate_problems:0 "Проблема Пиратов"
  BFI_pirate_problems_desc:0 "Рыболовецкие хозяйства залива уже более 50 лет ведут относительно спокойное и безмятежное существование. Если не трогать сумасшедших роботов, то они оставят в покое и вас, а если вы бедны, то никто не станет устраивать на вас набеги. До недавнего времени. Дуврские торговцы теперь реорганизованы под руководством единого экспансионистского лидера, и их злобная меркантилистская политика грозит отрезать нас от возможности торговать с кем-либо еще.\n\nРазумеется, это касается и политики, и нанятых ими пиратов."

  ####DOT####
  DOT_on_sea_or_land:0 "На море или на суше"
  DOT_on_sea_or_land_desc:0 "Среди рыболовов залива появился девиз, который распространился и на торговцев Довера: §Y«Куда бы ты ни пошёл, на море или на суше, от губернатора Холланда не спрячешься!»§!\n\nЭто правда. Сфера влияния губернатора Холланда, да и всех торговцев в целом, простирается всё дальше. Торговой славы ему уже недостаточно."
  DOT_trading_force_to_be_reckoned_with:0 "Торговая сила, с которой нужно считаться"
  DOT_trading_force_to_be_reckoned_with_desc:0 "Торговцы Дувра всегда отличались высоким уровнем меркантилизма и давно извлекают выгоду из своего мощного торгового положения."

  ####GEL####
  GEL_the_ordnung:0 "§OОрднунг§!"
  GEL_the_ordnung_desc:0 "Не путайте Амишей Гелассенхайта с Амишами долины Амман. В Гелласенхайте верховенствует §OОрднунг§!. Образ жизни и кодекс поведения, предписывающий гражданам правила жизни и имеющий высшую законодательную силу. Приезжих часто поражает тишина, ведь каждый мужчина, женщина и ребенок точно знает, что он должен делать, и слова не пропадают даром. Некоторые утверждают, что Гелласенхайт - это своего рода улей, но это, конечно, не так.\n\nЭто всего лишь §OОрднунг.§!"

  ####BKR####
  BKR_ice_breakers:0 "Ледоколы"
  BKR_ice_breakers_desc:0 "За плечами у Разрушителей долгая история борьбы со всем, что сулит им морозный север. Ни лёд, ни снег, ни враги - ничто не может помешать их кораблям доплыть до места назначения."
  ###WDW###
  WDW_centuries_of_hate:0 "Испокон веков"
  WDW_centuries_of_hate_desc:0 "Мы не помним борьбу наших предков за свободу или их сопротивление империалистической армии, пересекавшей мост из Детройта. Мы помним лишь, что с тех пор, как упали бомбы, мы перешли этот мост, нанося быстрые и мощные удары. Даже если мы не помним, почему мы это начали, 200 лет конфликта дали нам достаточно причин продолжать."
  WDW_motor_capital_of_canada:0 "Автомобильная столица Канады"
  WDW_motor_capital_of_canada_desc:0 "Виндзор был центром канадской автомобильной промышленности почти столетие, до того как упали бомбы. Хотя многие фабрики затихли и пришли в упадок, в нескольких старых цехах по-прежнему горит свет."
  
  ###USF###
  USF_federation_politics_idea:0 "Федеративная политика"
  USF_federation_politics_idea_desc:0 "«Что хорошо для Этевы, может быть плохо для НеУтики» — распространённое выражение в Федерации Северных Штатов. Оно отражает, как различные потребности различных поселений в федерации часто приводят к разрозненному политическому курсу и спорам. Эти различия не раскололи федерацию, но вряд ли способствовали прогрессу."
  USF_route_90_idea:0 "Торговля по маршруту 90"
  USF_route_90_idea_desc:0 "Относительно хорошо сохранившаяся довоенная автомагистраль проходит почти через все крупные населенные пункты Федерации Северных Штатов. Эта единственная транспортная артерия хорошо проходима и облегчает доставку грузов. Однако главная сила Федерации может стать её главной слабостью. Если эта дорога будет перекрыта, последствия будут катастрофическими."

  ###HSY###
  HSY_valued_goods_idea:0 "Ценные товары"
  HSY_valued_goods_idea_desc:0 "Шоколад - не единственное, что производят Кондитеры. Эти мастера-амиши изготавливают всевозможные качественные товары, которые привлекают торговцев со всей пустоши."
  HSY_peaceful_nature_idea:0 "Мирная натура"
  HSY_peaceful_nature_idea_desc:0 "Конфликты не в природе Кондитеров. Их дом - рай по меркам пустошей, а его стены способны уберечь от большинства угроз."
  
  ###OSH###
  OSH_open_port_idea:0 "Открытый порт"
  OSH_open_port_idea_desc:0 "Наш порт открыт для любого судна, которое ищет гавань и торговлю. Хотя с крышками часто случаются неприятности."
  OSH_respect_the_lakes_idea:0 "Уважение озера"
  OSH_respect_the_lakes_idea_desc:0 "Наши капитаны знают, что не стоит недооценивать озера. Они уважают их мощь и не идут на неоправданный риск. Именно поэтому многие из них возвращаются домой из своих путешествий."  

  ####General####
  vir_scourge_swamp:0 "Болотная Борьба"
  vir_scourge_swamp_desc:0 "Болото - это не просто земля. Это живое существо. Вы должны уважать его, иначе оно поглотит вас в своих мутных глубинах. Чёрт, даже если вы будете уважать его, оно все равно может это сделать."
  ECR_112_research_idea:0 "Разум Брона"
  ECR_112_research_idea_desc:0 "В обмен на то, что мы позволяем доктору Станисласу Брону хранить его игрушки и оказываем некоторую поддержку в работе хранилища, мы иногда получаем его помощь в проведении исследований. Будем надеяться, что эта сделка стоит того, чтобы обречь этих бедных людей на вечные муки."
  ECR_map_paint_idea:0 "Сила Востока"
  ECR_map_paint_idea_desc:0 "Мы - самая могущественная нация на Востоке, и поэтому мы обратим своё внимание на Запад. Будем надеяться, что там не окажется почтальона, который просто скажет нам убираться обратно на Восток."
