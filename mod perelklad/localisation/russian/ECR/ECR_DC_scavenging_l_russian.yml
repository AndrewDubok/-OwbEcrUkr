l_russian:

    ###Tool Tips###
    ECR_DC_tt_1:0 "Это пригодится..."

    ###Flags###
    ECR_vault_tec_hq_discovered_flag:0 "Штаб-квартира Волт-Тек была разграблена"
    ECR_hubris_discovered_flag:0 "Компания Хьюбрис Комикс была разобрана на части"
    ECR_lob_discovered_flag:0 "В LoB Enterprises провели обыск. На этот раз не федералы."
    ECR_dolces_discovered_flag:0 "Mama Dolces закрыли"
    ECR_oasis_discovered_flag:0 "Оазис обнаружен!"
    ECR_vault_92_discovered_flag:0 "Убежище 92 разграблено!"
    ECR_national_guard_depot_discovered_flag:0 "Склад Национальной гвардии был разграблен"
    ECR_vault_108_discovered_flag:0 "Убежище 108 было открыто"
    ECR_hamiltons_discovered_flag:0 "Убежище Гамильтона было обнаружено"
    ECR_vault_106_discovered_flag:0 "Убежище 106 разобрано на части"
    ECR_vault_112_discovered_flag:0 "Ужасы Убежища 112 раскрыты"
    ECR_dunwich_explored_flag:0 "Мы заглянули в темноту"

    ###Decisions###
    ECR_DC_exploring_decision_category:0 "Исследование Столичной Пустоши"
    ECR_DC_exploring_decision_category_desc:0 "Столичная Пустошь полна нетронутых тайн, запретных руин и неизведанных ужасов. Мы отправим несколько смельчаков на эти неизведанные рубежи и посмотрим, что они смогут найти."
    ECR_explore_megaton_area_decision:0 "Исследование Центральной Пустоши"
    ECR_explore_megaton_area_decision_desc:0 "В окрестностях Мегатонны и Большого Города может быть оживлённое движение, но это не значит, что в пещерах вокруг этих холмов мало что спрятано."
    ECR_explore_the_mall_decision:0 "Исследование Округа Колумбия"
    ECR_explore_the_mall_decision_desc:0 "Руины Округа Колумбия, вероятно, являются одними из самых опасных в мире, но это всего лишь означает, что большинство хороших вещей, вероятно, оставались нетронутыми в течение последних 200 лет."
    ECR_explore_south_dc_decision:0 "Исследование Арлингтона"
    ECR_explore_south_dc_decision_desc:0 "Руины Арлингтона, которые примыкают к Вашингтону настолько, что их часто называют просто «юг Вашингтона», так же созрели для исследования, как и сам Вашингтон."
    ECR_explore_tenpenny_tower_decision:0 "Исследования Юга Центральной Пустоши"
    ECR_explore_tenpenny_tower_decision_desc:0 "Кроме старой фабрики роботов и самой башни, в окрестностях Тенпенни-Тауэр мало что можно увидеть, да и стоит ли?"
    ECR_explore_arefu_decision:0 "Исследование Севера Центральной Пустоши"
    ECR_explore_arefu_decision_desc:0 "Территория между фортом Константин и Олд-Олни полна опасностей. Рейдеры, супермутанты и дикие животные могут навредить исследователю."
    ECR_explore_republic_of_dave_decision:0 "Исследование Северо-восточной Пустоши"
    ECR_explore_republic_of_dave_decision_desc:0 "Северо-восточную часть Столичной Пустоши не зря называют жопой мира. Но раз уж туда никто не ходит, может быть, там ещё осталось много чего полезного."
    ECR_explore_canterbury_commons_decision:0 "Исследование Юго-восточной Пустоши"
    ECR_explore_canterbury_commons_decision_desc:0 "К северу от руин Вашингтона, в юго-восточной пустоши, вероятно, есть много того, что мы ещё не открыли."
    ECR_explore_evergreen_mills_decision:0 "Исследование Рейдерских Убежищ"
    ECR_explore_evergreen_mills_decision_desc:0 "Районы, ранее занятые рейдерами, вероятно, никогда по-настоящему не исследовались. Здесь можно обнаружить немало интересных вещей."
    ECR_explore_codes_decision:0 "Поиск семейного архива Келлеров"
    ECR_explore_codes_decision_desc:0 "Чтобы попасть в бункер Национальной гвардии, нам понадобится серия номеров, которые были даны членам давно умершей семьи. Если нам повезёт, они могли записать свои номера, как это сделал человек на плёнке, которая у нас есть."
    
    ###Decision Events###
    ECR_explore_decision_events.1.title:0 "Контакт потерян"
    ECR_explore_decision_events.1.desc:0 "Наша исследовательская команда так и не отчиталась о результатах своего путешествия. Опасности пустоши унесли жизни ещё нескольких несчастных."
    ECR_explore_decision_events.1.a:0 "Такова жизнь в пустошах"
    ECR_explore_decision_events.2.title:0 "Засада рейдеров"
    ECR_explore_decision_events.2.desc:0 "Банда рейдеров напала на нашу исследовательскую группу из засады. Группа понесла потери, но отбилась от рейдеров и вернулась домой."
    ECR_explore_decision_events.2.a:0 "Рейдеры на нашей территории?"
    ECR_explore_decision_events.3.title:0 "Мутанты атакуют!"
    ECR_explore_decision_events.3.desc:0 "Нашей исследовательской группе не повезло наткнуться на стаю мутировавших животных. Им пришлось спасаться бегством, и не все вернулись."
    ECR_explore_decision_events.3.a:0 "Нам нужно бороться с вредителями"
    ECR_explore_decision_events.4.title:0 "Старые ловушки"
    ECR_explore_decision_events.4.desc:0 "Исследовательская группа случайно активировала древнюю ловушку, в результате чего несколько из них погибли. Выжившие вернулись без происшествий."
    ECR_explore_decision_events.4.a:0 "Искусство изготовления ловушек интересно"
    ECR_explore_decision_events.5.title:0 "Мы ничего не нашли"
    ECR_explore_decision_events.5.desc:0 "Несмотря на все усилия, исследователи не обнаружили в ходе своей экспедиции ничего примечательного. Только обычные разрушенные здания и ржавые транспортные средства."
    ECR_explore_decision_events.5.a:0 "По крайней мере, никто не умер"
    ECR_explore_decision_events.6.title:0 "Работорговцы схватили их!"
    ECR_explore_decision_events.6.desc:0 "Из нашей исследовательской группы вернулся только один выживший, он говорит, что работорговцы схватили остальных членов команды ночью, когда он справлял нужду в ближайшем кустарнике."
    ECR_explore_decision_events.6.a:0 "Эти бедные души"
    ECR_explore_decision_events.6.b:0 "Купите им свободу!"
    ECR_explore_decision_events.6.c:0 "Здесь всё ещё есть работорговцы?"
    ECR_explore_decision_events.7.title:0 "Засада супермутантов!"
    ECR_explore_decision_events.7.desc:0 "Двое выживших из нашей исследовательской группы сообщают, что они оказались единственными выжившими. Остальные были убиты или угнаны в плен из-за засады, устроенной супермутантами."
    ECR_explore_decision_events.7.a:0 "Позор"
    ECR_explore_decision_events.7.b:0 "Когда же мутанты вымрут?"
    ECR_explore_decision_events.8.title:0 "Штаб-квартира Волт-Тек"
    ECR_explore_decision_events.8.desc:0 "Наша исследовательская группа сообщила по радио, что они обнаружили местонахождение штаб-квартиры Волт-Тек. Им пришлось сражаться с многочисленными роботами-охранниками, но они выбрались живыми и получили доступ к главному компьютеру здания. Данные повреждены и, вероятно, их будет трудно использовать. Они также обнаружили местонахождение тайника с силовой броней Волт-Тек, что бы это ни было."
    ECR_explore_decision_events.8.a:0 "Звучит полезно"
    ECR_explore_decision_events.9.title:0 "Индустриальный парк Такомы"
    ECR_explore_decision_events.9.desc:0 "Разведчики сообщили о местонахождении огромного промышленного комплекса, практически не тронутого бомбами. Судя по содержимому здания, оно может дать нам огромный прирост промышленного потенциала."
    ECR_explore_decision_events.9.a:0 "Молодцы"
    ECR_explore_decision_events.10.title:0 "Хьюбрис Комикс"
    ECR_explore_decision_events.10.desc:0 "Исследователи наткнулись на старое здание Хьюбрис Комикс. Здесь не было ничего интересного, кроме механизмов, которые можно было разобрать на части."
    ECR_explore_decision_events.10.a:0 "Больше спасённых вещей - это всегда хорошо"
    ECR_explore_decision_events.11.title:0 "L.O.B. Enterprises"
    ECR_explore_decision_events.11.desc:0 "Наши исследователи обнаружили руины довоенной компании по разработке оружия под названием ЛОБ Энтерпрайзис. Им пришлось с боем пробиваться мимо военных роботов, потому что, по-видимому, незадолго до великой войны правительство вторглось в эту компанию. Несмотря на потери, добыча, похоже, того стоила. Там был тайник с довоенным оружием, а также кое-какие ультрасовременные схемы."
    ECR_explore_decision_events.11.a:0 "Мы найдём им хорошее применение"
    ECR_explore_decision_events.12.title:0 "Moma Dolces"
    ECR_explore_decision_events.12.desc:0 "Команда исследователей ввязалась в длительную перестрелку с китайскими гулями-коммунистами на фабрике Мама Дольче в Арлингтоне. Через несколько часов стало ясно, что внутри находятся десятки солдат, и команда отступила."
    ECR_explore_decision_events.12.a:0 "Оставьте их в покое"
    ECR_explore_decision_events.12.b:0 "Возвращайтесь со штурмовым отрядом"
    ECR_explore_decision_events.12.c:0 "Гули-коммунисты? СЖЕЧЬ ИХ ВСЕХ!"
    ECR_explore_decision_events.13.title:0 "Оазис"
    ECR_explore_decision_events.13.desc:0 "Наши исследователи видели в пустоши немало странных вещей, но их последняя находка, возможно, превзошла все ожидания. Они нашли живые деревья. Нет, не просто живые деревья, а живого говорящего древесного человека. Дерево называет себя Гарольдом и, по-видимому, было гулем с запада, вокруг которого росло дерево, которое он называет Боб. Гарольд теперь является источником пышного леса, который охраняется культом, почитающим его как бога. Последнее обстоятельство немного усложняет ситуацию. Гарольд хочет умереть и хочет, чтобы мы ему помогли. Он настаивает, что его сектанты всё поймут, если он поговорит с ними до того, как дело будет сделано, но у его людей другие планы. Один из культистов хочет, чтобы мы применили какой-нибудь сок, чтобы остановить рост Гарольда, но сохранить ему жизнь, в то время как другой хочет, чтобы мы применили какую-нибудь мазь для ускорения роста."
    ECR_explore_decision_events.13.a:0 "Мы выполним его пожелания"
    ECR_explore_decision_events.13.b:0 "Остановите рост Гарольда"
    ECR_explore_decision_events.13.c:0 "Ускорьте рост Гарольда"
    ECR_explore_decision_events.13.d:0 "Сожгите его!"
    ECR_explore_decision_events.14.title:0 "Убежище 92"
    ECR_explore_decision_events.14.desc:0 "Наша команда обнаружила старое убежище недалеко от Олд-Олни. Как и во многих других убежищах, это был какой-то странный эксперимент, который закончился смертью всех. Убежище представляет собой разрушающиеся руины, полные всевозможных мутировавших животных, но мы можем извлечь из него что-нибудь полезное."
    ECR_explore_decision_events.14.a:0 "Мы всегда можем использовать больше металлолома"
    ECR_explore_decision_events.15.title:0 "База Национальной гвардии"
    ECR_explore_decision_events.15.desc:0 "Сражаясь с бесчисленными роботами и турелями, наша команда исследователей добралась до самого сердца Базы Национальной гвардии - оружейной комнаты. Внутри они обнаружили значительный запас оружия и снаряжения. Также они обнаружили тяжелую дверь в бункер, которая открывается только с помощью определенного цифрового кода. Нам повезло, что один из исследователей нашел голокассету с таким кодом во время предыдущей экспедиции. Теперь осталось найти ещё четыре."
    ECR_explore_decision_events.15.a:0 "Это простое поисковое задание"
    ECR_explore_decision_events.15.b:0 "Обходите стороной эту ерунду"
    ECR_explore_decision_events.16.title:0 "Убежище 108"
    ECR_explore_decision_events.16.desc:0 "Наши разведчики нашли убежище в пустошах, и, похоже, они могут просто зайти туда. Кто знает, что они найдут."
    ECR_explore_decision_events.16.a:0 "Надеюсь, ещё один ужасный эксперимент Волт-Тек не пошел насмарку"
    ECR_explore_decision_events.17.title:0 "Гэри"
    ECR_explore_decision_events.17.desc:0 "Мы должны были знать, что, как и почти все другие убежища в пустошах, убежище 108 - это извращённое шоу ужасов. Там проводились эксперименты по клонированию людей, в результате которых было создано множество клонов парня по имени Гэри. Теперь в убежище полно клонов Гэри, которые могут произносить только свое имя и нападать на всех, кого встретят. Наша команда прошла через них, но это было нелегко."
    ECR_explore_decision_events.17.a:0 "Какого чёрта"
    ECR_explore_decision_events.18.title:0 "Убежище Гамильтона"
    ECR_explore_decision_events.18.desc:0 "Наша команда нашла тайник с оружием, спрятанный в старой канализационной системе. Чтобы добраться до него, им пришлось преодолеть гнездо радскорпионов и несколько рейдеров, но добыча стоит потраченных усилий."
    ECR_explore_decision_events.18.a:0 "Всегда нужно больше оружия"
    ECR_explore_decision_events.19.title:0 "Убежище 106"
    ECR_explore_decision_events.19.desc:0 "Как и все остальные убежища, о которых мы узнаём, убежище 106 было неудачным экспериментом. На этот раз испытывали какой-то галлюциногенный газ, который дурманит голову всем, кто его вдыхает. Наша команда быстро покинула это место, и мы следим за тем, чтобы люди держались от него подальше."
    ECR_explore_decision_events.19.a:0 "Они хотя-бы кайфанули?"
    ECR_explore_decision_events.19.b:0 "Возможно, есть способ использовать это"
    ECR_explore_decision_events.20.title:0 "Рокополис"
    ECR_explore_decision_events.20.desc:0 "Затерянное послевоенное поселение Рокополис многие считали просто легендой, но наша команда обнаружила то, что осталось от этого изолированного убежища. Похоже, что поселение было порабощено и разрушено, а ценностей осталось немного."
    ECR_explore_decision_events.20.a:0 "Всё потому, что Дэшвуд - симп"
    ECR_explore_decision_events.20.b:0 "Досадно"
    ECR_explore_decision_events.21.title:0 "Убежище 112"
    ECR_explore_decision_events.21.desc:0 "Наша команда исследователей дольше обычного ждала отчёта, а всё потому, что они обнаружили действующее убежище со странной особенностью. Обитатели убежища заперты в своеобразных капсулах-стазисах, которые держат их подключенными к цифровому миру. Согласно данным, полученным из банков данных, смотрителем этого убежища является довоенный ученый по имени Станислас Брон, который мучает обитателей убежища на протяжении последних 200 лет. Наша команда уже почти отключила систему жизнеобеспечения жертв, когда получила сообщение от находящегося внутри Доктора. Он знал о том, что они делают, и предложил всё, что угодно, лишь бы не оставаться в ловушке симуляции в одиночестве. Наши исследователи по-прежнему очень хотят осуществить свой план по спасению жителей от вечных мук, но Доктор пообещал поделиться своими знаниями с нами, если мы оставим его со своими игрушками."
    ECR_explore_decision_events.21.a:0 "Вытащите вилку"
    ECR_explore_decision_events.21.b:0 "Довоенный ум - слишком ценный ресурс, который мы не можем потерять"
    ECR_explore_decision_events.22.title:0 "Архив Келлеров найден!"
    ECR_explore_decision_events.22.desc:0 "Мы нашли ещё одну голокассету семьи Келлер. Скоро мы сможем открыть бункер Национальной гвардии."
    ECR_explore_decision_events.22.a:0 "Хорошо"
    ECR_explore_decision_events.23.title:0 "Бункер Национальной гвардии"
    ECR_explore_decision_events.23.desc:0 "Бункер Национальной гвардии наконец-то открыт, и внутри мы обнаружили тайник со специальным оборудованием. Силовая броня, оружие и даже несколько мини-ядер - всё это будет передано в руки наших военных."
    ECR_explore_decision_events.23.a:0 "Что такое ядерный гранатомёт?"
    ECR_explore_decision_events.24.title:0 "Последняя запись"
    ECR_explore_decision_events.24.desc:0 "Мы наконец-то нашли все записи семьи Келлер. С ними мы сможем открыть бункер Национальной гвардии."
    ECR_explore_decision_events.24.a:0 "Тогда давайте сделаем это"

    
