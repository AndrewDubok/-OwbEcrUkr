l_russian:
DCM_researcher_fawkes:0 "Исследователь Фокс"
DCM_researcher_fawkes_desc:0 "Фокс теперь помогает нам делать новое оружие, чтобы мы не выключили его терминал."
DCM_east_coast_mutants:0 "Мутанты Восточного Побережья"
DCM_east_coast_mutants_desc:0 "Мы - мутанты Восточного побережья."
DCM_handy_man_fawkes:0 "Рукастый Фокс"
DCM_handy_man_fawkes_desc:0 "Фокс будет чинить сломанные вещи, а мы не будем выключать его терминал."
DCM_glowing_mutants:0 "Светящиеся мутанты"
DCM_glowing_mutants_desc:0 "Некоторые мутанты начинают светиться после пребывания в метро. Помогает в бою ночью."
DCM_mutant_trenches:0 "Траншеи мутантов"
DCM_mutant_trenches_desc:0 "Если ты в яме, то глупый человек не сможет тебя ударить. А потом выходи и бей их, ха-ха-ха."
DCM_roaming_behemoths:0 "Блуждающие бегемоты"
DCM_roaming_behemoths_desc:0 "Бегемоты ходят вокруг и хватают людей. Это хорошо для нас."
DCM_rule_of_giants:0 "Правила Бегемотов"
DCM_rule_of_giants_desc:0 "Бегемоты говорят нам, куда идти. Мы делаем это, иначе нас тоже съедят."
DCM_vault_tec_scavengers:0 "Приспособления Волт-Тек"
DCM_vault_tec_scavengers_desc:0 "У Волт-Тек были отличные приспособления для убийства. Теперь они наши."
DCM_vault_87_fortress:0 "Форт Убежища 87"
DCM_vault_87_fortress_desc:0 "Глупый человек, попробует пойти вперёд — умрёт. Попробует пойти назад — мы их пристрелим. Ха!"
DCM_frontline_behemoths:0 "Лидерство Бегемотов"
DCM_frontline_behemoths_desc:0 "Мы следуем за бегемотами. Они больше, сильнее и сражаются лучше всех."
DCM_mutant_generals:0 "Лидерство Мутантов"
DCM_mutant_generals_desc:0 "Бегемоты хороши в бою. Но не годятся на роль лидера. Так говорит Шепард."
DCM_new_masters_of_the_pitt:0 "Мастера Питта"
DCM_new_masters_of_the_pitt_desc:0 "Питт полон людей, которые не могут стать мутантами. Мы будем использовать их для работы."
DCM_super_mutant_ravings:0 "Радио Мутантов"
DCM_super_mutant_ravings_desc:0 "Шепард выходит на радио, отдавая мутантам приказ: «Притащить людей в убежище и найти зеленую жижу»."
DCM_green_tide_idea:0 "Зелёная волна"
DCM_green_tide_idea_desc:0 "Люди слабы, а мы сильны. Мы приходим и побеждаем."
DCM_green_tide_rolls_idea:0 "Берегись, мы идем"
DCM_green_tide_rolls_idea_desc:0 "Нас не остановить! Берегитесь! Не остановить! БУМ!"
DCM_trog_horde:0 "Орда Трогов"
DCM_trog_horde_desc:0 "Они, конечно не кентавры, но троги тоже хороши помогют в бою."
DCM_devouring_trog_horde:0 "Голодная орда Трогов"
DCM_devouring_trog_horde_desc:0 "Сначала мы отпускаем трогов. Они едят людей и получают за это от нас пули в череп."
DCM_savage_trog_horde:0 "Орда диких Трогов"
DCM_savage_trog_horde_desc:0 "У нас есть бегемоты, которые бросают трогов в людей. Это смешно."
DCM_pet_centaurs:0 "Питомцы Кентавры"
DCM_pet_centaurs_desc:0 "Кентавры хорошие спутники. Они помогают сражаться с людьми."
DCM_giant_centaurs:0 "Гигантские Кентавры"
DCM_giant_centaurs_desc:0 "Кентавр, который много ест, вырастает большим. Он становится лучше в бою."
DCM_armor_clad_centaurs:0 "Бронированные Кентавры"
DCM_armor_clad_centaurs_desc:0 "Кентавр сильный, но хрупкий. Ему тоже нужна броня!"
DCM_master_of_none:0 "Мастер на все руки"
DCM_master_of_none_desc:0 "Фоксу приходится много чего делать. У него от этого мозги не болят?"
DCM_experimental_weapon_tech:0 "Экспериментальное оружие"
DCM_experimental_weapon_tech_desc:0 "Фокс нашёл чертежи старого оружия для супермутантов. Он их создаст."
DCM_buff_behemoths_1_idea:0 "Сила Бегемотов"
DCM_buff_behemoths_1_idea_desc:0 "Бегемоты получают лучшее снаряжение, которое поможет им в бою."
DCM_buff_behemoths_2_idea:0 "Сила Бегемотов"
DCM_buff_behemoths_2_idea_desc:0 "Бегемоты получают лучшее снаряжение, которое поможет им в бою."
DCM_buff_behemoths_3_idea:0 "Сила Бегемотов"
DCM_buff_behemoths_3_idea_desc:0 "Бегемоты получают лучшее снаряжение, которое поможет им в бою."
DCM_buff_mutants_1_idea:0 "Большие пушки"
DCM_buff_mutants_1_idea_desc:0 "Мы получаем большие пушки для убийства множества слабых людишек."
DCM_buff_mutants_2_idea:0 "Большие пушки"
DCM_buff_mutants_2_idea_desc:0 "Мы получаем большие пушки для убийства множества слабых людишек."
DCM_buff_mutants_3_idea:0 "Большие пушки"
DCM_buff_mutants_3_idea_desc:0 "Мы получаем большие пушки для убийства множества слабых людишек."
DCM_buff_booms_1_idea:0 "Большой БУУУМ"
DCM_buff_booms_1_idea_desc:0 "Мы получаем бомбы побольше, чтобы убивать более крепких людей."
DCM_buff_booms_2_idea:0 "Большой БУУУМ"
DCM_buff_booms_2_idea_desc:0 "Мы получаем бомбы побольше, чтобы убивать более крепких людей."
DCM_buff_booms_3_idea:0 "Большой БУУУМ"
DCM_buff_booms_3_idea_desc:0 "Мы получаем бомбы побольше, чтобы убивать более крепких людей."
DCM_ground_zero:0 "Нулевой уровень"
DCM_ground_zero_desc:0 "За дверью люди умирают, если подходят близко. Мы не можем их таким образом схватить, но, зато нам не нужно охранять проход."
DCM_vault_101_subjects:0 "Хорошие образцы из 101-го"
DCM_vault_101_subjects_desc:0 "Из людей в Убежище 101 получаются хорошие мутанты, если дать им зелёную жижу."
DCM_green_stuff_modifier:0 "§GЗелёная жижа"
DCM_green_stuff_modifier_desc:0 "§GЗелёная жижа§! - вот как мы создаём мутантов. У нас осталось её не так много. Нам нужно больше, чтобы создавать больше мутантов."
DCM_ghoul_kin:0 "Гули - наши братья"
DCM_ghoul_kin_desc:0 "Гули не превращаются в мутантов, когда мы помещаем их в зелёную жижу. Может быть, мы просто позволим им сражаться с нами?"
DCM_ghoul_slaves:0 "Гули - наши рабы"
DCM_ghoul_slaves_desc:0 "Тупые гули не могут быть супермутантами. Так что они рабы."
