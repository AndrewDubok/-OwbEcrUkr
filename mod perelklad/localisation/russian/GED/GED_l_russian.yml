l_russian: 

    ###Characters###
    GED_swampseer_fortune_name:0 "Болотная Провидица Фортуна"
    ged_fortune_desc:0 "§O«Наш триумф уже не за горами. Я видела его.»§!\n\nФортуна выросла в Эдеме, ведомая болотами. Она предвидела надвигающийся крах и проповедовала против упадка и апатии, нараставших среди других болотных оракулов. Когда всё начало рушиться, она была единственной, кто не был удивлён. Теперь Сад Эдема отступил, но Фортуна хочет это изменить. Однако с каждым днём её гадания предрекают гибель, и всё меньше людей посещают их. \n\nОна боится, что, что бы она ни делала, ничто не сможет спасти Эдем."
    GED_doctor_name:0 "Доктор Корнелия Робинсон"
    GED_doctor_desc:0 "Когда доктор Робинсон отправилась в самое сердце болот Вирджинии, она не ожидала, что станет предводительницей племени болотников. Прошло больше пары лет с тех пор, как доктор обнаружила это племя в самом сердце болот, и, приложив немало усилий, ей удалось убедить их отказаться от суеверий. Со временем некоторые из этих людей, возможно, даже сами станут учёными, выяснив, что пошло не так с ГЭКК этого убежища и как бороться с разрастающимся болотом."
   
    ###Cosmetic Tags###
    GED_science_cosmetic_tag:0 "Исследовательская группа «Сада Эдема»"
    GED_science_cosmetic_tag_ADJ:0 "СЭ исследовательск"
    GED_science_cosmetic_tag_DEF:0 "Исследовательская группа «Сада Эдема»"
    GED_tribe_cosmetic_tag:0 "Повелители Эдема"
    GED_tribe_cosmetic_tag_ADJ:0 "Эдемск"
    GED_tribe_cosmetic_tag_DEF:0 "Повелители Эдема"
    
    ###Country Flags###
    GED_brotherhood_visited_flag:0 "Братство отправило экспедицию на наше болото."

    ###Events###
    GED_nf_events.1.title:0 "Враждебная среда"
    GED_nf_events.1.desc:0 "Болота всегда были нашим домом. Там, где другие борются с растительностью и дикой природой, мы живём с ними. Мы – такая же часть болота, как и оно – часть нас. Мы всегда бродили по воде или карабкались по деревьям, охотясь на болотных гекконов, так же как на наших людей охотятся грозные аллигаторы. Одно, что превыше всего, дало нам преимущество перед другой жизнью этого болота."
    GED_nf_events.1.a:0 "Наши прочные хижины"
    GED_nf_events.1.b:0 "Тактика наших воинов"
    GED_nf_events.1.c:0 "Наши бдительные разведчики"
    GED_nf_events.1.d:0 "Много лечебного порошка"
    GED_nf_events.2.title:0 "Многие входят, но немногие уходят"
    GED_nf_events.2.desc:0 "Под нашей деревней находится пещера, непохожая ни на одну из виденных нами. Немного вглубь пещеры, она меняет цвет с каменного на металлический. Сквозь удушающие лианы можно увидеть слабые огоньки, а в самом сердце пещеры находится особая комната. Поколениями молодые женщины отваживались спускаться в эту комнату, и многие из них никогда не выходили оттуда. Те, кто выживает после путешествия в самую глубокую комнату Священной Пещеры, выходят из неё изменившимися. Избранные богами способны предсказывать будущее в водах болота. Они предвидели всё: от обильных урожаев до сильных наводнений. Наша нынешняя Болотная Провидица, Болотная Провидица Фортуна, даже предвидела смерть предыдущей Матриарх. И хотя она не могла предупредить нас о точном бедствии, у неё был дар предвидения определённых вещей."
    GED_nf_events.2.a:0 "Изменений на Земле"
    GED_nf_events.2.b:0 "Изменений ветра"
    GED_nf_events.2.c:0 "Изменений с Огненосцами"
    GED_nf_events.3.title:0 "Непредвиденные потери"
    GED_nf_events.3.desc:0 "Болотная провидица Фортуна пыталась предупредить нас о надвигающейся катастрофе, но неопределённость её видений и отсутствие каких-либо предсказаний других провидцев не оставили её пророчества без внимания. Когда морские люди достигли наших берегов, многие из нашего племени погибли. Большинство болотных провидцев погибли в первые же ночи, как и десятки лучших воинов. Потеря провидцев и их неспособность предвидеть надвигающуюся катастрофу нанесла нашему народу рану, ещё более тяжёлую, чем их потеря. Впервые за более чем сто лет племя начинает сомневаться, не утрачено ли благоволение бога."
    GED_nf_events.3.a:0 "Или если видения когда-либо были реальностью..."
    GED_nf_events.4.title:0 "Спаситель или погибель?"
    GED_nf_events.4.desc:0 "Пока наши люди прятались от морских жителей и пытались спасти тех, кто выжил в бою, к нашей деревне подошла незнакомка. Чужак представилась доктором и согласилась помочь нашим людям. Она сказала, что наше болото её интересует не для того, чтобы уничтожить, как многие чужаки, а чтобы научиться жить с ним, как это делаем мы. Мы приняли её помощь, и вскоре она уже помогала нашему Матриарху с другими делами."
    GED_nf_events.4.a:0 "Помогая нам строить"
    GED_nf_events.4.b:0 "Помогая нам организоваться"
    GED_nf_events.4.c:0 "Учит нас мудрости аутсайдеров"
    GED_nf_events.5.title:0 "Предложение Братства"
    GED_nf_events.5.desc:0 "Братство Стали прибыло в нашу деревню с отрядом рыцарей и парой писцов. Племена Эдема понятия не имели, что делать с этими чужаками, но доктор Робинсон была хорошо осведомлена об этой группе и её целях. Она некоторое время беседовала с писцами об их интересе к региону и поделилась своими личными открытиями. Через несколько дней Братство ушло, но была достигнута предварительная договорённость. В обмен на защиту Братства племя предоставит группе полный доступ к своему хранилищу и окажет им всю необходимую помощь для исследования хранилища и влияния ГЭКК на регион."
    GED_nf_events.5.a:0 "Мы приветствуем их помощь!"
    GED_nf_events.6.title:0 "Могучие чужаки изгнаны!"
    GED_nf_events.6.desc:0 "Высокие воины, облачённые в металл и вооружённые оружием из огня и света, напали на деревню. Сначала мы не стали с ними сражаться, но держались на расстоянии и наблюдали. Вскоре стало ясно, что они намереваются проникнуть в нашу Священную Пещеру. Мы не могли этого допустить. Когда они разбили лагерь у пещеры и сняли шлемы, чтобы поесть, мы выпустили стрелы. Некоторые из них были убиты, но остальные снова надели шлемы и открыли по нам огонь. Мы не отступали, и вскоре они бежали с наших земель. Мы праздновали победу, но нас остановило предупреждение Оракулов."
    GED_nf_events.6.a:0 "Многие из них вернутся"
    GED_nf_events.7.title:0 "Запись в журнале 61"
    GED_nf_events.7.desc:0 "Помогая жителям Эдема несколько месяцев, я, кажется, наконец-то заслужил их полное доверие, или, по крайней мере, настолько, насколько это вообще возможно для чужака. Если я и усвоил что-то из их рассказов об их богатой истории, так это то, что их встречи с другими людьми редко проходили гладко. То, что они не убили меня на месте, – большая удача с моей стороны. Заметьте, мне следует быть осторожнее, приближаясь к племенам пустошей после завершения этой экспедиции. Как я и подозревал, сердце этого болота, похоже, действительно находится в Убежище. Это подтверждает мою гипотезу о том, что это неестественное болото – результат работы ГЭКК. Работает ли это ГЭКК по назначению, или что-то пошло не так, ещё предстоит выяснить. Сомневаюсь, что даже с моим нынешним признанием в сообществе мне позволят зайти далеко в Убежище. Но, возможно, мне удастся убедить их лидера впустить меня в вестибюль. Если какой-либо из терминалов всё ещё работает, я смогу передать часть энергии из реактора Убежища. Этого может быть достаточно, чтобы они позволили мне пройти дальше в хранилище. В противном случае, экспедиция, возможно, станет более опасной или закончится провалом."
    GED_nf_events.7.a:0 "Д-р Корнелия Робинсон завершает сеанс."
    GED_nf_events.8.title:0 "Вера возвращается"
    GED_nf_events.8.desc:0 "Как и предсказывал Болотный Провидец, чужеземный доктор не желал уважать наш отказ впустить её в сердце нашей Священной Пещеры. Её поймали сразу после полуночи и привели к Матриарху Фортуне. Её мольбы о пощаде были проигнорированы, как и она сама проигнорировала наши правила. Вместо этого Болотные Провидцы предсказали её судьбу. Её должны были принести в жертву, чтобы напомнить нашему народу об опасности чужаков и о силе нашего народа. Когда коварный доктор покинул наш мир, сомнения покинули сердца наших людей."
    GED_nf_events.8.a:0 "Наша вера была восстановлена"
    GED_nf_events.9.title:0 "Запись в журнале 73"
    GED_nf_events.9.desc:0 "Я почти не верю тому, что произошло сегодня. Есть много чего обсудить, но я постараюсь быть кратким и начать с начала. Прослушивание историй племени Эдема за последние месяцы научило меня многому об их убежище, а также об опасностях внутри. Ясно, что ГЭКК в сердце этого убежища, вероятно, дефектный и излучает почти смертельные уровни радиации. К счастью, я взял с собой тонну Рад-Х и качественный радиационный костюм. Потенциал того, что эта радиация ГЭККА разблокирует какой-то латентный псионический способности в их "оракулах", заслуживает целой команды исследователей сам по себе. Но я отвлекаюсь, мне разрешили спуститься в их убежище и подтвердить мою гипотезу. Растительность была обильной даже на нижних уровнях убежища, настолько обильной, что я, вероятно, не прошел бы через неё, если бы трибалы не вырубали части бог знает сколько времени. На самом нижнем уровне был ГЭКК. Его корпус был треснут неизвестной силой, и он был подключен к реактору убежища, оба из которых явно выходят за рамки стандартных операционных процедур и объясняют, почему машина всё ещё производит быстрый вегетативный рост. Эта находка сама по себе была такой, о которой большинство людей только мечтает, но это всё ещё была вторая по экстраординарности вещь, случившаяся сегодня. Когда я вернулся на поверхность, меня перехватили и привели в хижину Болотной Провидицы Фортуны. Хотя я был здесь месяцами, мои визиты в её хижину были очень редкими и обычно сопровождались требованиями помочь с тем или иным. На этот раз было по-другому. Матриарх этого племени сказала мне, что у неё была серия видений, о которых она не рассказывала своему народу. Согласно её видениям, её народ будет истреблён, пока она их лидер. Прямо перед тем, как я вышел из убежища, у неё было ещё одно видение, которое побудило её послать людей забрать меня, видение МЕНЯ, ведущего их народ. Она знает, что я не псионик, как лидеры их племени в прошлом, но она верит, что моё выживание в убежище доказывает, что эпоха Swamp-Seers закончилась. Очевидно, есть серьёзные этические проблемы, связанные с захватом контроля над племенем интересных, но примитивных людей. Однако эти проблемы кажутся немного менее вопиющий, когда они предлагают тебе работу, верно? Я знаю, что у племени проблемы с какими-то рейдерами или чем-то на Востоке, против которых они готовятся сражаться, и если я уйду сейчас за припасами и поддержкой, кто знает, что случится здесь в моё отсутствие? Я думаю, что использование этой возможности будет моим лучшим шансом завершить исследование. Может, я даже смогу помочь этим людям стать более цивилизованными. Чёрт, со временем они могли бы стать приличными помощниками в исследованиях."
    GED_nf_events.9.a:0 "Д-р Корнелия Робинсон, Матриарх Эдема, завершает передачу."
    
    ###Ideas###
    GED_shrinking_congregation:0 "Сокращение конгрегации"
    GED_shrinking_congregation_desc:0 "Когда болотные провидцы не смогли предсказать пришествие Ноунфолка, люди начали терять веру. С тех пор Эдем движется к упадку. Местные жители больше не доверяют видениям своих вождей."
    GED_swamps_dying_breath:0 "Умирающее дыхание болота"
    GED_swamps_dying_breath_desc:0 "Эдем, возможно, и умирает, но пока оракулы ещё дышат, они будут сражаться за свою религию. Когда Эдем умрёт, умрут и его враги."
    GED_new_oracles_idea:0 "Новые Оракулы"
    GED_new_oracles_idea_desc:0 "Новое поколение болотных провидцев вышло из священной пещеры, готовое вести наш народ в будущее."
    GED_eden_research_idea:0 "Исследовательский центр «Сад Эдема»"
    GED_eden_research_idea_desc:0 "Под руководством доктора Робинсона племя, некогда известное как «Эдемский Сад», превращается в преданную команду помощников для её исследований. Со временем они, возможно, смогут заручиться поддержкой Ривет-Сити или даже Братства!"
    GED_eden_lords_idea:0 "Повелители Болот"
    GED_eden_lords_idea_desc:0 "Племена Эдемского сада вытеснили или ассимилировали всех чужаков, пытавшихся захватить их дом. Любого, кто попытается посягнуть на их болота, скорее всего, постигнет та же участь."

    ###National Focus###
    GED_nf_a001:0 "Бесконечные болота"
    GED_nf_a001_desc:0 "Густые кусты, мутная вода и тянущиеся лианы представляют опасность для чужаков. Для нас это дом."
    GED_nf_a002:0 "Болотные провидцы"
    GED_nf_a002_desc:0 "На протяжении поколений нашим племенем руководили те, кто был наделен даром предвидения."
    GED_nf_a003:0 "Морские люди"
    GED_nf_a003_desc:0 "Мы ничего о них не знаем, кроме того, что они пришли из моря и стреляют, как только видят."
    GED_nf_a004:0 "Семена сомнения"
    GED_nf_a004_desc:0 "Как наши оракулы могли не знать о приближении морских людей?"
    GED_nf_a005:0 "Позаботьтесь о наших раненых"
    GED_nf_a005_desc:0 "Многим еще предстоит оправиться от нападения морских жителей."
    GED_nf_a006:0 "Собрать оружие"
    GED_nf_a006_desc:0 "Ожидание нас не спасёт. Нам нужны луки, много луков."
    GED_nf_a007:0 "Сшить шкуры"
    GED_nf_a007_desc:0 "Шкуры гекконов не самые прочные, но они помогут сохранить жизнь нашим воинам."
    GED_nf_a008:0 "Учёба на ошибках"
    GED_nf_a008_desc:0 "Простых охотничьих луков и жилетов из шкуры геккона недостаточно. Нам нужны более совершенные орудия, чтобы победить морских жителей."
    GED_nf_a009:0 "Воины наготове"
    GED_nf_a009_desc:0 "Наши сильнейшие охотники готовы сражаться, и многие следуют их примеру."
    GED_nf_a010:0 "Странные путешественники"
    GED_nf_a010_desc:0 "Они пришли с севера, облачённые в такие тяжёлые доспехи, что наполовину утонули в грязи. Зачем они пришли и куда ушли?"
    GED_nf_a011:0 "Священная пещера"
    GED_nf_a011_desc:0 "Особое место, где рождаются Болотные Провидцы и даруются видения. Можем ли мы позволить туда пройти даже полезному чужаку?"
    GED_nf_a012:0 "Уважай пещеру"
    GED_nf_a012_desc:0 "Пещера, это дар нашему народу. Боги были бы оскорблены, если бы впустили туда постороннего."
    GED_nf_a013:0 "Понять болотных существ"
    GED_nf_a013_desc:0 "Наша Болотная Провидица в своем последнем видении узнала кое-что: способ приручить болотных зверей."
    GED_nf_a014:0 "Усмирить стаю"
    GED_nf_a014_desc:0 "Мы готовы испробовать нашу новую мудрость."
    GED_nf_a015:0 "Новые оракулы"
    GED_nf_a015_desc:0 "Многие болотные провидцы погибли в результате нападения морских жителей. Их нужно заменить."
    GED_nf_a016:0 "Обещания победы"
    GED_nf_a016_desc:0 "У всех новых Оракулов было одно и то же видение, показывающее, как морские люди были изгнаны обратно в океан."
    GED_nf_a017:0 "Обновленная вера"
    GED_nf_a017_desc:0 "Дары и видения, дарованные нашими Оракулами, обновили веру нашего народа. Сомнения нашего народа будут развеяны всего одним последним заданием."
    GED_nf_a018:0 "Изучение пещеры"
    GED_nf_a018_desc:0 "Доктор Робинсон оказал огромную помощь нашим людям. Она заслужила право войти в нашу священную пещеру."
    GED_nf_a019:0 "Больше, чем статуи"
    GED_nf_a019_desc:0 "Доктор говорит, что металлические стражи священной пещеры не просто отпугивают тёмных духов. С её помощью мы могли бы использовать их и для защиты от врагов."
    GED_nf_a020:0 "Открытые запечатанные проходы"
    GED_nf_a020_desc:0 "Некоторые двери священной пещеры никогда не открывались до сих пор."
    GED_nf_a021:0 "Дары пещеры"
    GED_nf_a021_desc:0 "Мы узнали о предметах в Священной Пещере, которые не нужны для наших ритуалов. Извлекая их, мы можем использовать их для других целей."
    GED_nf_a022:0 "Мудрость Древних"
    GED_nf_a022_desc:0 "Доктор рассказывает нам, что эту пещеру построили древние люди, называемые Волтек. В этих залах они могут многому нас научить."
    GED_nf_a023:0 "Иллюзия развеяна"
    GED_nf_a023_desc:0 "Мы знаем о подземелье под нашей деревней больше, чем когда-либо. Не благодаря Болотным Провидцам, а благодаря доктору. Очевидно, мы должны следовать её мудрости."
    GED_nf_a024:0 "К берегу"
    GED_nf_a024_desc:0 "Наши люди готовы вытеснить морских жителей из нашего дома."
    GED_nf_a025:0 "Колесо"
    GED_nf_a025_desc:0 "Глубоко во владениях Посейдона существует машина, которая может быть нам полезна."
    GED_nf_a026:0 "Огромный шторм"
    GED_nf_a026_desc:0 "Морские жители отступили на корабль, на котором приплыли. Сейчас у нас есть шанс положить этому конец!"
    GED_nf_a027:0 "Остановить горение"
    GED_nf_a027_desc:0 "Пожарные Маршалы слишком долго сжигали наши земли. Сегодня этому придёт конец."
    GED_nf_a028:0 "Повелители Эдема"
    GED_nf_a028_desc:0 "Болото свободно разрастается. Наш народ живёт в гармонии, не беспокоясь о вторжении чужаков. Возможно, придут ещё, но мы будем готовы."
    GED_nf_a029:0 "Просвещение наших соседей"
    GED_nf_a029_desc:0 "Если недавняя война что-то и показала АтомБаптистам и жителям Посейдона, так это то, что их боги либо бессильны им помочь, либо им всё равно. Мы покажем им путь к лучшему."
    GED_nf_a030:0 "Воды Эдема"
    GED_nf_a030_desc:0 "За прошедшие столетия мы научились делать болотную воду пригодной для питья."
    GED_nf_a031:0 "Очистить тропы"
    GED_nf_a031_desc:0 "Несколько троп и дорожек помогут нам отражать нападения морских людей или что-то еще, что может случиться после нас."
    GED_nf_a032:0 "Собрать инструменты"
    GED_nf_a032_desc:0 "Под щеткой лежат старые, давно забытые инструменты, и они станут нашими."
    GED_nf_a033:0 "Продолжить дозор"
    GED_nf_a033_desc:0 "Наши самые зоркие разведчики будут наблюдать из лесной чащи и обязательно предупредят нас, если морские жители сделают шаг."
    GED_nf_a034:0 "Усовершенствование нашей тактики"
    GED_nf_a034_desc:0 "Сражаться с людьми — это не то же самое, что охотиться на гекконов. Наш способ борьбы должен быть другим."
    GED_nf_a035:0 "Объединить наших людей"
    GED_nf_a035_desc:0 "Наше племя знает, что нам угрожает опасность. Их несложно убедить сражаться."
    
