l_russian:

#ANV Andale Cannibals#
ANV_standard_weaponry_tech:0 "Пороховой пистолет"
ANV_standard_weaponry_tech_short:0 "Старое оружие"
ANV_standard_weaponry_tech_desc:0 "Нехватка ресурсов, знаний об оружии и доступность производства сделали кремнёвые ружья распространённым явлением в Вирджинии. Помимо простой функции личного оружия, утяжелённая рукоять делала их идеальным оружием для ударов в ближнем бою, а широкий ствол позволял отважным пиратам заряжать их картечью, прежде чем уничтожить любого неудачливого врага ослепительным светом и оглушительным грохотом."
ANV_ballistic_equipment_1:0 "Пороховая винтовка"
ANV_ballistic_equipment_1_short:0 "Браун Бесс"
ANV_ballistic_equipment_1_desc:0 "Нехватка ресурсов, знаний об оружии и доступность его изготовления привели к тому, что кремневые ружья стали обычным явлением в Вирджинии."
ANV_ballistic_equipment_2:0 "Модель 1873 Спрингфилд"
ANV_ballistic_equipment_2_short:0 "Трапдор Спрингфилд"
ANV_ballistic_equipment_2_desc:0 "Крайне сложная в использовании, старая как мир, и обладающая отдачей, способной сломать руку гражданскому человеку, модель Springfield 1873 года — это однозарядная винтовка с лазовым механизмом, заряжаемая через люк, под новый, бездымный вариант мощного калибра .45-70. Удвоенная огневая мощь и утроенная отдача по сравнению с обычным калибром 7,62 мм, эта винтовка, безусловно, воспитывает характер, необходимый для тренировок с таким оружием."
ANV_melee_equipment_1:0 "Кинжал Культиста"
ANV_melee_equipment_1_short:0 "Кинжал Культиста"
ANV_melee_equipment_1_desc:0 "Маленький кинжал из оленьего рога и камня."
ANV_melee_equipment_2:0 "Лезвие Культиста"
ANV_melee_equipment_2_short:0 "Лезвие"
ANV_melee_equipment_2_desc:0 "Импровизированное оружие, сделанное из куска оленьего рога и куска металла, грубо сформированного в виде зазубренного лезвия, на котором выгравированы эмблемы культистов."

#DCR DC Raiders#
DCR_insect_equipment_1:0 "Муравей"
DCR_insect_equipment_1_short:0 "Муравей"
DCR_insect_equipment_1_desc:0 "Они живут в огромных подземных колониях, где едят, спят и спариваются с королевой. Муравьи всеядны: они либо используют огонь для охоты и убийства добычи, либо, при необходимости, поедают то немногое, что могут найти."
DCR_insect_equipment_2:0 "Муравей-воин"
DCR_insect_equipment_2_short:0 "Муравей-воин"
DCR_insect_equipmnet_2_desc:0 "У муравьев-воинов в колонии есть одна цель — убивать все, что может угрожать ей или её королеве. Благодаря увеличенным клешням и более прочному экзоскелету эти муравьи опаснее большинства других."
DCR_insect_equipment_3:0 "Огненный Муравей"
DCR_insect_equipment_3_short:0 "Огненный Муравей"
DCR_insect_equipment_3_desc:0 "Из-за ошибки учёного из пустошей появился новый вид муравьёв. Они быстрее, сильнее, смертоноснее и могут плеваться огнём в любого, кто посмеет бросить вызов их королеве!"

#EEN Raven Rock Enclave#
EEN_infantry_equipment_1:0 "Офицерский пистолет"
EEN_infantry_equipment_1_short:0 "10-мм пистолет"
EEN_infantry_equipment_1_desc:0 "Пистолет N99 с большой рамкой был выбран в качестве стандартного личного оружия армии США."
EEN_ballistic_equipment_1:0 "Стандартный карабин"
EEN_ballistic_equipment_1_short:0 "Карабин"
EEN_ballistic_equipment_1_desc:0 "Компактное автоматическое оружие с магазинной подачей патрона и высокой скорострельностью."
EEN_ballistic_equipment_2:0 "Штурмовой карабин"
EEN_ballistic_equipment_2_short:0 "Штурмовой карабин"
EEN_ballistic_weaponry_tech_2_desc:0 "Полуавтоматическая винтовка средней мощности с магазином на 20 патронов."
EEN_ballistic_equipment_3:0 "Карабин стрелка"
EEN_ballistic_equipment_3_short:0 "Карабин стрелка"
EEN_ballistic_equipment_3_desc:0 "Взяв за основу штурмовой карабин и добавив несколько дорогостоящих довоенных усовершенствований. В первую очередь, это коллиматорный прицел Вест-Тек, улучшенная передняя рукоятка и увеличенный магазин."
EEN_ballistic_equipment_4:0 "«Бозар»"
EEN_ballistic_equipment_4_short:0 "«Бозар»"
EEN_ballistic_equipment_4_desc:0 "Частично снайперская винтовка, частично ручной пулемёт — универсальное оружие. «Бозар» дает своему владельцу возможность вести мощный огонь на большой дистанции с удивительной точностью."
EEN_energy_equipment_1:0 "Лазерный пистолет"
EEN_energy_equipment_1_short:0 "Лазерный пистолет"
EEN_energy_equipment_1_desc:0 "Лазерный пистолет AEP7, стандартный лазерный пистолет для самообороны от 2276 года."
EEN_energy_equipment_3:0 "Трехлучевая лазерная винтовка"
EEN_energy_equipment_3_short:0 "Трехлучевая лазерная винтовка"
EEN_energy_equipment_3_desc:0 "Превосходная огневая мощь за счет чрезмерного расхода боеприпасов."
EEN_melee_equipment_1:0 "Полицейская дубинка"
EEN_melee_equipment_1_short:0 "Дубинка"
EEN_melee_equipment_1_desc:0 "Это складная модель полицейской дубинки, использовавшаяся различными полицейскими управлениями до Великой Войны. Она входит в стандартное снаряжение службы безопасности Волт-Тек."
EEN_melee_equipment_2:0 "Боевой нож"
EEN_melee_equipment_2_short:0 "Боевой нож"
EEN_melee_equipment_2_desc:0 "Нужны ли ему представления? Кожаная рукоять, стальной клинок и зазубренные зубья — идеальный инструмент для рубки мутантов, подошедших слишком близко. Ничего особенного, боевой нож — оружие вне времени, которое не нуждается в переосмыслении."
EEN_melee_equipment_3:0 "«Потрошитель»"
EEN_melee_equipment_3_short:0 "«Потрошитель»"
EEN_melee_equipment_3_desc:0 "Вибропила «Потрошитель» — довоенная марка ручных бензопил, разработанная как переносной строительный инструмент для коммерческого и военного использования."
EEN_energy_fireteam_equipment_4:0 "Плазменная Пушка P94"
EEN_energy_fireteam_equipment_4_short:0 "Плазменная Пушка"
EEN_energy_fireteam_equipment_4_desc:0 "Несмотря на то, что плазменные пушки были заменены более легкой и дешевой городской плазменной винтовкой, они по-прежнему играют важную роль в расчетах тяжелого вооружения."

#FRM Fire Marshals#
FRM_ballistic_equipment_1:0 "Караванский дробовик"
FRM_ballistic_equipment_1_short:0 "Дробовик"
FRM_ballistic_equipment_1_desc:0 "Старое ружье с вертикальным расположением стволов, которое отлично справляется со своей задачей."
FRM_ballistic_equipment_2:0 "Охотничий дробовик"
FRM_ballistic_equipment_2_short:0 "Охотничий дробовик"
FRM_ballistic_equipment_2_desc:0 "Пистолет пробивает дыры в людях, винтовка пробивает дыры в людях, дробовик на определённом расстоянии, с правильным зарядом физически оторвёт кусок дерьма от туши племени и бросит это дерьмо на землю."
FRM_ballistic_equipment_3:0 "Штурмовая винтовка R91"
FRM_ballistic_equipment_3_short:0 "R91 ШВ"
FRM_ballistic_equipment_3_desc:0 "Штурмовые винтовки Национальной гвардии были обнаружены в большом количестве в окрестностях Столичной пустоши даже спустя 200 лет после войны."
FRM_ballistic_equipment_4:0 "Инфильтратор R91"
FRM_ballistic_equipment_4_short:0 "Инфильтратор"
FRM_ballistic_equipment_4_desc:0 "Модифицированные версии штурмовой винтовки R91 часто встречаются в руках рейдеров Питта, но их легко приобрести, если вложить соответствующие средства."
FRM_melee_equipment_1:0 "Топор"
FRM_melee_equipment_1_short:0 "Топор"
FRM_melee_equipment_1_desc:0 "Небольшое клинковое оружие, пригодное для рубки ветвей деревьев и веток племенем."
FRM_melee_equipment_2:0 "Пожарный топор"
FRM_melee_equipment_2_short:0 "Пожарный топор"
FRM_melee_equipment_2_desc:0 "Длинный и прочный топор, способный разрубить все, что болото швырнет в вас."
FRM_melee_equipment_3:0 "Потрошитель"
FRM_melee_equipment_3_short:0 "Потрошитель"
FRM_melee_equipment_3_desc:0 "Миниатюрная бензопила довоенного образца, которая быстро расправляется с враждебной растительностью и дикарями."
FRM_melee_equipment_4:0 "Бензопила"
FRM_melee_equipment_4_short:0 "Бензопила"
FRM_melee_equipment_4_desc:0 "Большой режущий инструмент, способный разрезать стволы деревьев или бронированных животных, как масло."
FRM_demolitions_equipment_1:0 "Коктейли Молотова"
FRM_demolitions_equipment_1_desc:0 "Говорят, что голь на выдумку хитра, и эта нестареющая зажигалка – тому подтверждение. Использовавшиеся до войны инакомыслящими движениями и отдельными людьми по всему миру, мы теперь начали производить собственные «коктейли Молотова» из самодельных фитилей, найденных бутылок из-под «Ядер-колы» и спирта из наспех сооруженных перегонных аппаратов. Это, конечно, не довоенные взрывчатые вещества, но есть ли что-то более захватывающее, чем видеть надвигающееся болото или охваченные огнём племенные деревни?"
FRM_demolitions_equipment_1_short:0 "Молотов"

#GED Garden of Eden#
GED_infantry_equipment_1:0 "Простой лук"
GED_infantry_equipment_1_short:0 "Простой лук"
GED_infantry_equipment_1_desc:0 "Простые луки немного лучше заостренной палки."
GED_ballistic_equipment_1:0 "Охотничий лук"
GED_ballistic_equipment_1_short:0 "Охотничий лук"
GED_ballistic_equipment_1_desc:0 "Простой охотничий лук. Стрелы летят со свистом. Хорошо подходит для убийства гекконов или беззащитных чужаков."
GED_ballistic_equipment_2:0 "Композитный охотничий лук"
GED_ballistic_equipment_2_short:0 "Композитный лук"
GED_ballistic_equipment_2_desc:0 "Охотничий лук из более прочных материалов. Он может стрелять стрелами немного быстрее, даже достаточно быстро, чтобы пробить лёгкую броню."
GED_ballistic_equipment_3:0 "Продвинутый охотничий лук"
GED_ballistic_equipment_3_short:0 "Продвинутый лук"
GED_ballistic_equipment_3_desc:0 "Охотничий лук, изготовленный по особым сплавам и технологиям. Стрелы, выпущенные из этого лука, могут пробить даже металлическую броню пустошей под прямым углом."
GED_ballistic_equipment_4:0 "Изысканный боевой лук"
GED_ballistic_equipment_4_short:0 "Боевой лук"
GED_ballistic_equipment_4_desc:0 "Лук, предназначенный для убийства вражеских воинов. Благодаря сочетанию специальных материалов, довоенных разработок и разрывных стрел, это оружие без проблем убьёт человека в боевой броне."

#GMN Green Mountain#
GMN_power_armor_equipment_tbh:0 "Ультрацитовая силовая броня"
GMN_power_armor_equipment_tbh_short:0 "Ультрацитовая СБ"
GMN_power_armor_equipment_tbh_desc:0 "Силовая броня «Ультрацит» - это модифицированная конструкция, изначально использовавшаяся Братством Стали в Аппалачах. Хотя наш костюм не так продвинут, как вариант «Братства», в основе которого лежала силовая броня T-51b, он всё же держится лучше большинства костюмов в пустошах."
GMN_infantry_equipment_1:0 "Дробовик из хлама"
GMN_infantry_equipment_1_short:0 "Дробовик из хлама"
GMN_infantry_equipment_1_desc:0 "То, что он собран из труб и древесных отходов, не мешает вылетающим из него картечи быть смертельно опасными."
GMN_ballistic_equipment_1:0 "Старый дробовик"
GMN_ballistic_equipment_1_short:0 "даетробовик"
GMN_ballistic_equipment_1_desc:0 "Старые двуствольные ружья использовались всеми, от бутлегеров до борцов за свободу. В нашем районе их предостаточно, но они начинают устаревать."
GMN_ballistic_equipment_2:0 "Самодельная винтовка"
GMN_ballistic_equipment_2_short:0 "Самод. винтовка"
GMN_ballistic_equipment_2_desc:0 "Эта автоматическая машина для убийства, созданная оружейниками из Аппалачей, - не просто винтовка."
GMN_ballistic_equipment_3:0 "Штурмовая винтовка R91"
GMN_ballistic_equipment_3_short:0 "Штурмовая винтовка"
GMN_ballistic_equipment_3_desc:0 "Старая штурмовая винтовка, считавшаяся устаревшей и переданная подразделениям Национальной гвардии в 2070-х годах, по-прежнему служит лучше многих недавно изготовленных винтовок."
GMN_ballistic_equipment_4:0 "R91 Инфильтратор"
GMN_ballistic_equipment_4_short:0 "Инфильтратор"
GMN_ballistic_equipment_4_desc:0 "Модифицированная штурмовая винтовка R91, часто используемая работорговцами Питта."
GMN_power_armor_equipment_2:0 "EXC-17 Силовая броня экскаватора"
GMN_power_armor_equipment_2_short:0 "EXC-17 СБ"
GMN_power_armor_equipment_2_desc:0 "Костюм «Экскаватор» EXC-17 был разработан для защиты шахтёров от камнепадов и загрязняющих веществ в воздухе, а также для повышения скорости работы. Он так и не был запущен в серийное производство, но широко использовался в Аппалачах. Он не так прочен, как силовая броня, предназначенная для боевых действий, но превосходит броню из шкуры кротокрыса более чем на милю."

#TRN Trog Country#
TRN_feral_ghoul_equipment_1:0 "Трог"
TRN_feral_ghoul_equipment_1_short:0 "Трог"
TRN_feral_ghoul_equipment_1_desc:0 "Трог - это человек, достигший последней стадии заражения троглодитной дегенерацией. Это состояние превратило его в дикое животное, которое бродит на четвереньках по руинам Питта, стремясь поглотить всё живое, кроме трогов."
TRN_feral_ghoul_equipment_2:0 "Жестокий трог"
TRN_feral_ghoul_equipment_2_short:0 "Жестокий трог"
TRN_feral_ghoul_equipment_2_desc:0 "Если трог проживёт достаточно долго, он станет сильнее, быстрее и смертоноснее. Эти звери, как правило, возглавляют небольшие стаи недавно трансформированных трогов."
TRN_feral_ghoul_equipment_armored:0 "Трог Пожиратель"
TRN_feral_ghoul_equipment_armored_short:0 "Трог Пожиратель"
TRN_feral_ghoul_equipment_armored_desc:0 "Эти троги прожили некоторое время и адаптировались к Питту. Их кожа затвердела и приобрела пепельный оттенок, чтобы лучше вписаться в городскую среду."
TRN_feral_ghoul_equipment_glowing:0 "Светящийся трог"
TRN_feral_ghoul_equipment_glowing_short:0 "Светящийся трог"
TRN_feral_ghoul_equipment_glowing_desc:0 "Трог, который проводит слишком много времени в радиоактивной зоне, начинает светиться."
