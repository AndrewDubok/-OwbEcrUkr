  FRM_rike_name:0 "Маршалл Рик"
  FRM_rike_desc:0 "Рик - фанатик, но не религиозный. Он видит в пламени, которое размахивают пожарные, символы более истинного мира, мира, свободного от сводящего с ума болота и бессмысленной болтовни болотников. Он мечтает лишь о том, чтобы все они сгорели. В этом и заключается его фанатизм."

