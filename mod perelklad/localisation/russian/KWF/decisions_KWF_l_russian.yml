l_russian:
  KWF_wargoals_dec_cat:0 "§7Соль для Соляного Трона!§!"
  KWF_attack_andale:0 "§RНикаких каннибалов на корабле§!"
  KWF_attack_andale_desc:0 "Есть границы, которые ни один человек не должен переступать. Жители Андейла перешли, и они называют это жизнью. Поедание своих не выживание, а проклятие. Утонувший Король не станет делить свой стол с такими чудовищами. Мы уничтожим их и положим конец их пиршеству."
  KWF_attack_bos:0 "§gСтальные кастрюли§!"
  KWF_attack_bos_desc:0 ""
  KWF_attack_rivet:0 "§5Плавучий город§!"
  KWF_attack_rivet_desc:0 "Чем бы он ни был сейчас, раньше он был авианосцем. Он должен стать столицей на волнах, маяком, возвышающимся над морем. Мы захватим его и сделаем сердцем нашего королевства."

