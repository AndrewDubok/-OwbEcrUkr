  RULE_MAP_SETUP_DCM_STATUS_DEFAULT:0 "@DCM Обычный рост мутантов"
  RULE_MAP_SETUP_DCM_STATUS_DEFAULT_DESC:0 "Супермутанты Столичной Пустоши начинают игру так же, как и в Фоллаут 3. Они представляют угрозу для жителей Пустоши, но организованы не более, чем банды рейдеров или стаи диких собак. Если их не остановить, они могут перерасти в нечто большее."
  RULE_MAP_SETUP_DCM_STATUS_MUTANTS_RISE:0 "@DCM Мутанты организуются раньше!"
  RULE_MAP_SETUP_DCM_STATUS_MUTANTS_RISE_DESC:0 "Вместо того, чтобы создавать угрозу и в конечном итоге организовываться, супермутанты Столичной Пустоши объединятся на несколько лет раньше. На Столичную Пустошь надвигается тёмная туча."
  
