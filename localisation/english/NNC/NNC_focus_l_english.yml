l_english:
    nnc_different_parties_tt:0 "§YThe effects of this focus will depend on who is in charge.§!\n\n"


    NNC_knights_of_yore:0 "Knights of Yore"
    NNC_knights_of_yore_desc:0 "Centuries before the end of the Great War, knights roamed the countryside, helping the people wherever they went and rooting out bandits. Even now they are an inspiration."

    NNC_our_finest_hour:0 "Our Finest Hour"
    NNC_our_finest_hour_desc:0 "In 2253 the trogs launched an incursion into our lands the likes of which had never been seen before. Our defences were swept away and all seemed lost, but Sir Lancaster managed to stave off defeat."

    NNC_eleventh_round_table:0 "The Eleventh Roundtable"
    NNC_eleventh_round_table_desc:0 "For 22 years now Lord Lancaster has ruled over New New Castle, calling a roundtable every 2 years to ensure every knight can have their voice heard and the realm can prosper."

    NNC_stoke_the_forges:0 "Stoke the Forges"
    NNC_stoke_the_forges_desc:0 "This part of the Old World was filled with forges, foundries, and other metal working sites. We need plenty of equipment if we are to route the slavers and monsters that threaten us."

    NNC_we_serve_ourselves:0 "We Serve Ourselves"
    NNC_we_serve_ourselves_desc:0 "The knights, as the cream of the crop in New New Castle, must receive priority treatment. If the people are unwilling to provide us with the arms and armour that we need, we will simply take them by force."

    NNC_we_serve_the_people:0 "We Serve the People"
    NNC_we_serve_the_people_desc:0 "The highest honour of a knight is their duty to the common people, the poor folk that farm our lands and live in our towns. We must ensure they are taken care of, else what is the point of our existence?"

    NNC_armed_and_armoured:0 "Armed and Armoured"
    NNC_armed_and_armoured_desc:0 "Our knights wear the best armour available, and wield the best weapons. We need to gather together the best suits of armour in the land to prepare for our wars."

    NNC_knights_in_shining_armour:0 "Knights in Shining Armour"
    NNC_knights_in_shining_armour_desc:0 "Our knights are what every soldier of the wasteland aspires to be. Brave, honourable, and adorned in the best armour that can be found in the wasteland. By raiding some old pre-war police stations and depots, we can ensure they do, in fact, wear the best armour to be found."

    NNC_summon_the_banners:0 "Summon the Banners"
    NNC_summon_the_banners_desc:0 "Our knights are spread across the country, doing their hard work of routing bandits, slaying monsters, and patrolling the roads. At least, they are in theory. Regardless, the time has come to prepare for war and we must gather all our soldiers in haste."

    NNC_levy_the_peasantry:0 "Levy the Peasantry"
    NNC_levy_the_peasantry_desc:0 "The peasants provide the greatest part of our population but scarcely contribute to the army (besides making the weapons, providing the support staff, all that unimportant stuff). While it may be unpopular with the peasantry, a levy will ensure they help out properly."

    NNC_knights_duty:0 "A Knight's Duty"
    NNC_knights_duty_desc:0 "A knight's duty is to the people, not themselves. We need to raise up the knights to prepare for war, we can't expect the peasantry to bear the burden of war."
    nnc_knights_duty_oob_tt:0 "Spawn §G2§! §YHeavy Infantry§! divisions"

    NNC_prepare_the_council:0 "Prepare the Council"
    NNC_prepare_the_council_desc:0 "When the roundtable is not in session, Lancaster maintains a council of loyal knights to advise him. Now that war with the Breakers is around the corner, the council must be readied."

    NNC_keep_the_teams_together:0 "Keep the Teams Together"
    NNC_keep_the_teams_together_desc:0 "The knightly teams are an important institution of New New Castle, but infighting and political squabbles can threaten the integrity of the nation. We need to take steps to reduce this infighting."
        NNC_unlock_rally_decisions_tt:0 "This will unlock §Ydecisions§! to increase party popularity"

    NNC_boot_of_oppression:0 "The Metal Boot of Oppression"
    NNC_boot_of_oppression_desc:0 "While not ideal, we need to keep the peasants in line through any means necessary. We know what's good for them, is it not the duty of a knight to protect their people?"

    NNC_valour_of_heroes:0 "The Valour of Bygone Heroes"
    NNC_valour_of_heroes_desc:0 "Knights have always been the most valiant and heroic soldiers throughout all of history. We need to set an example for the rest of New New Castle, and indeed the wasteland as a whole, to follow."

    NNC_inspire_fervour:0 "Inspire Fervour"
    NNC_inspire_fervour_desc:0 "Old World knights were inspired by their religious fervour and belief. While religion no longer unites us as it did them, we can still have zealous belief in our way of life and righteous cause."

    NNC_regulated_innovation:0 "Regulated Innovation"
    NNC_regulated_innovation_desc:0 "It would be practically heretical to suggest that we need technology more advanced than that which served the knights of long ago, but we can make some allowances for advancement. They certainly never had to fight a deathclaw or someone with a junk jet."

    NNC_recruit_war_hawks:0 "Recruit the War Hawks"
    NNC_recruit_war_hawks_desc:0 "Mercenaries remain an important feature of the wasteland, and even if our knights are more honourable and effective it would be silly not to use some of our caps on a retainer for these soldiers of fortune. This way, we also deny them to our enemies."
    nnc_war_hawks_oob_tt:0 "Spawn §G2§! §YInfantry§! divisions"

    NNC_evaluate_crop_rotation:0 "Evaluate Crop Rotation"
    NNC_evaluate_crop_rotation_desc:0 "Our method of crop rotation is carefully modelled after how they used to do things in the medieval period. Unfortunately, we don't really have many of the same crops as they did. Some innovation here only makes sense."

    NNC_training_dummies:0 "Training "Dummies""
    NNC_training_dummies_desc:0 "Our knights need to be able to train effectively, and some of the Blackguards have suggested a way to do this - on live targets. Of course, this will be reserved for criminals and outlaws, but it still feels a little wrong, doesn't it?"

    NNC_zealots_of_war:0 "Zealots of War"
    NNC_zealots_of_war_desc:0 "The Crusaders are righteous and devoted to the cause, but also have some interesting proposals on forging better armour. It would fundamentally still remain the same metal armour, but just better than what we've been able to forge so far."

    NNC_ride_to_war:0 "Ride to Ruin and the World's Ending"
    NNC_ride_to_war_desc:0 "The Breakers have long been a thorn in our side. Their practice of slavery and trade with the Pitt are shameful to the decency of knights everywhere, and the blight on the coastline must be eradicated."

    NNC_twelfth_roundtable:0 "The Twelfth Roundtable"
    NNC_twelfth_roundtable_desc:0 "Lord Lancaster has abruptly called a twelfth roundtable, well ahead of the scheduled time. What could this possibly be about?"
    nnc_unlock_more_tree_tt:0 "This will unlock §Ynew focuses§!"

    NNC_lancasters_retirement:0 "Lancaster's Retirement"
    NNC_lancasters_retirement_desc:0 "Lancaster has announced the reason for the sudden calling of the Twelfth Roundtable - he will be retiring and must choose a new ruler in his absence."

    NNC_black_knights_rising:0 "Black Knights Rising"
    NNC_black_knights_rising_desc:0 "The Blackguards aren't exactly popular among the peasantry, but plenty of lords and nobles are attracted to the money and debauchery..."

    NNC_brutal_reprisals:0 "Brutal Reprisals"
    NNC_brutal_reprisals_desc:0 "The Blackguards have made only the most cursory attempts to hide their links with bandits and raiders within our borders. These bandits are useful to set on those who might go against our agenda..."

    NNC_requisitions:0 "Requisitions"
    NNC_requisitions_desc:0 "Some may call it naked theft, but we need weapons and the Blackguards are more than willing to point to where they can be found."

    NNC_maintain_stability:0 "Maintain Stability"
    NNC_maintain_stability_desc:0 "Even at a time like this, maintaining the stability of New New Castle is paramount. If we fall apart, the new ruler will find themselves the ruler of nothing."

    NNC_ensure_peoples_safety:0 "Ensure People's Safety"
    NNC_ensure_peoples_safety_desc:0 "The temporary succession crisis in New New Castle hasn't paralysed the trogs or raiders. Despite our political troubles, we need to continue building up our defences."

    NNC_peace_and_prosperity:0 "Peace and Prosperity"
    NNC_peace_and_prosperity_desc:0 "A peaceful transition of power will be far easier to guarantee if the people are content and happy."

    NNC_age_of_heroes:0 "Age of Heroes"
    NNC_age_of_heroes_desc:0 "We must prove to the people that our mandate is just and our rulers are benevolent. The heroes of the Chivalrics are already deeply popular with the peasantry, we must ensure they remain so."

    NNC_chivalric_code:0 "Chivalric Code"
    NNC_chivalric_code_desc:0 "The idea of a chivalric code has been floated around but never implemented, the Chivalrics are now pushing for us to mandate a chivalric code guaranteeing standards of conduct for knights. The Blackguards will probably ignore it anyway."

    NNC_will_of_the_people:0 "The Will of the People"
    NNC_will_of_the_people_desc:0 "The will of the people is a strong force that we can take advantage of, and the Chivalrics know exactly how to maintain and sustain this strength."

    NNC_fortify_the_border:0 "Fortify the Border"
    NNC_fortify_the_border_desc:0 "Even at a time like this we can not afford to let our guard down. A new line of defensive forts, walls, and outposts will ensure New New Castle remains safe."

    NNC_deploy_knights_errant:0 "Deploy Knights Errant"
    NNC_deploy_knights_errant_desc:0 "Knights errant are knights despatched into the country to provide good wherever it is needed. By sending the knights errant into the countryside, we'll not only make the lands safer but also reinforce our presence across New New Castle."
        nnc_unlock_horn_tt:0 "\n\n§Y$NNC_horn_name$§! becomes a Unit Leader.\n§LLevel§!: §Y3§!\n§RAttack Skill§!: §Y2§!\n§GDefense Skill§!: §Y3§!\n§PPlanning Skill§!: §Y3§!\n§MLogistics Skill§!: §Y2§!\n§gTraits§!: §tIntelligent§!, §tAgile§!\n\n"

    NNC_maintain_order:0 "Maintain Order"
    NNC_maintain_order_desc:0 "A new group of peasants must be conscripted to maintain order in these trying times. People are fearful and uncertain due to the changes in government, and without a firm hand we may find ourselves in a bad position."

    NNC_order_and_fervour:0 "Order and Fervour"
    NNC_order_and_fervour_desc:0 "By promoting not only devotion to the cause but also to the state, the Crusaders hope to unite the people behind a unified New New Castle."

    NNC_righteous_fury:0 "Righteous Fury"
    NNC_righteous_fury_desc:0 "The Crusaders believe with all of their hearts that we must be ready to strike outwards at a moment's notice."

    NNC_the_wasteland_waits_for_us:0 "The Wasteland Waits for Us"
    NNC_the_wasteland_waits_for_us_desc:0 "It is our destiny to seize the wasteland for New New Castle. We must ensure we are ready to take on this holy duty."

    NNC_paint_it_black:0 "Paint it Black"
    NNC_paint_it_black_desc:0 "The Blackguard came out on top. Everyone knew this was coming, now to make some changes."

    NNC_oppression_in_vogue:0 "Oppression in Vogue"
    NNC_oppression_in_vogue_desc:0 "Oppression is back, and it's better than ever. Those peasants won't know what hit them, nor will they have the free time to figure it out."

    NNC_replace_the_roundtable:0 "Replace the Roundtable"   
    NNC_replace_the_roundtable_desc:0 "The Roundtable is outdated, it needs to go. It'll be easier to secure our own power and make decisions quickly without deliberation from people we don't like."

    NNC_stack_the_kings_council:0 "Stack the King's Council"
    NNC_stack_the_kings_council_desc:0 "It's no secret that many of the advisors and councillors despise us - especially the Chivalrics. It's time for some spring cleaning, or whatever season it is right now. I'm not a meteorologist."

    NNC_turn_a_blind_eye:0 "Turn a Blind Eye"
    NNC_turn_a_blind_eye_desc:0 "It's no secret that we've been turning a blind eye for years, but now that we're in power we can really begin to make ourselves and our loyal supporters comfortable."

    NNC_turn_to_important_matters:0 "Turn to Important Matters"
    NNC_turn_to_important_matters_desc:0 "There's a lot to deal with, and the peasants have started becoming somewhat uppity. We need to keep them in their place, and keep ourselves in our place."

    NNC_a_matter_of_coin:0 "A Matter of Coin"
    NNC_a_matter_of_coin_desc:0 "Money makes the world go round, and caps can buy you anything. It's time to invest in the future - our future."
        nnc_mercenary_decisions_tt:0 "This will unlock decisions to hire mercenaries"

    NNC_pushing_the_peasantry_harder:0 "Pushing the Peasantry Harder"
    NNC_pushing_the_peasantry_harder_desc:0 "The peasants won't like it, but we will."

    NNC_tyranny:0 "Tyranny"
    NNC_tyranny_desc:0 "Tyranny is the mark of an effective ruler. We don't bother with kindness when we know what we want and how to get it."

    NNC_finest_money_can_buy:0 "The Finest Money Can Buy"
    NNC_finest_money_can_buy_desc:0 "An expansion of the council is more than earned... let's see who we can bribe."

    NNC_remove_the_incorruptible:0 "Remove the Incorruptible"
    NNC_remove_the_incorruptible_desc:0 "While money can get you a lot, it can't always get you loyalty - that damn ghoul Umfred has built up support against us, and has proven resilient to bribery. We don't need him anymore."

    NNC_crack_down_on_chivalrics:0 "Crack Down on Chivalrics"
    NNC_crack_down_on_chivalrics_desc:0 "Those damn goody two-shoes have caused enough problems in New New Castle, it's time to get rid of them and throw the peasants out of the court permanently."

    NNC_placate_crusaders:0 "Placate the Crusaders"
    NNC_placate_crusaders_desc:0 "The Crusaders are damned idiots wanting to declare a vengeful war against the entire wasteland - not a good way to make money! Even so, expansion of our enterprises is appealing... and the loyalty of the Crusaders is valuable"

    NNC_peace_and_security_for_new_empire:0 "Peace and Security for Our New Empire"
    NNC_peace_and_security_for_new_empire_desc:0 "We have brought in a new era of prosperity and freedom (for the upper class) in New New Castle. We aren't simply the Blackguards anymore, and our kingdom has evolved beyond what it once was."

    NNC_make_buffalo_black:0 "Make Buffalo Black"
    NNC_make_buffalo_black_desc:0 "The Buffalo Health Service has postured and threatened our security for a long time, and there's no way we're tolerating robots holding what could potentially be a very profitable city..."

    NNC_the_injustice_system:0 "The Injustice System"
    NNC_the_injustice_system_desc:0 "Judges can be bought, and courts can be corrupted. We need to make sure that all methods of enforcement and interpretation know where the money is coming from."

    NNC_bribery_and_extortion:0 "Bribery and Corruption"
    NNC_bribery_and_extortion_desc:0 "Most people might decry bribery and corruption, but just look at how much it can get you!"
        nnc_bribery_decisions_tt:0 "This will unlock decisions to bribe political opponents and military enemies"

    NNC_lap_of_luxury:0 "The Lap of Luxury"
    NNC_lap_of_luxury_desc:0 "The Blackguards have always lived an opulent lifestyle, but now that there are no barriers to their desires they can live the life of their dreams. Another feast, anyone?"

    NNC_system_works_for_people_who_matter:0 "The System Works... For the People Who Matter"
    NNC_system_works_for_people_who_matter_desc:0 "We've got the perfect system set up here now... we just need to exploit it and enjoy it."

    NNC_this_is_the_day:0 "This is the Day"
    NNC_this_is_the_day_desc:0 "The Chivalrics are in control. This is the day the peasants' lives will surely change."

    NNC_peoples_heroes:0 "The People's Heroes"
    NNC_peoples_heroes_desc:0 "The Chivalrics carry on the long and honourable tradition of truly chivalric knights. Helping the weak, fighting the evil, and thwarting the tyrannous. This is the dawn of a new era."

    NNC_shining_host:0 "The Shining Host"
    NNC_shining_host_desc:0 "The soldiers of the Chivalrics meet the ideal of the knight in shining armour. The host of warriors that will rise to defend New New Castle can overcome any enemy."
    nnc_shining_host_oob_tt:0 "Spawn §G2§! Experienced §YHeavy Infantry§! divisions"

    NNC_united_in_spirit:0 "United in Spirit"
    NNC_united_in_spirit_desc:0 "While the peasants may live an existence below that of the nobles, the Chivalrics will ensure that every citizen of New New Castle is motivated and ready to further the cause."

    NNC_bring_criminals_to_justice:0 "Bring Criminals to Justice"
    NNC_bring_criminals_to_justice_desc:0 "The court has been infiltrated by petty criminals and savage psychopaths. We need to bring these troublemakers to heel, there is no room for a murderer in our council."

    NNC_spirit_of_a_crusader:0 "Spirit of a Crusader"
    NNC_spirit_of_a_crusader_desc:0 "While the Crusaders are opposed to us, they're not so wholly terrible as the Blackguards. They are violent and apathetic towards the struggle of the common man, but they can be a useful force to further our ends."

    NNC_smiling_knights_in_shining_armour:0 "Smiling Knights in Shining Armour"
    NNC_smiling_knights_in_shining_armour_desc:0 "It's no secret how knights love to see themselves - bold heroes in shining armour. The allure is strong even among the Blackguards. By creating that perfect shining armour, we can reinforce that image not only among ourselves, but also our populace."

    NNC_a_motivated_peasantry:0 "A Motivated Peasantry"
    NNC_a_motivated_peasantry_desc:0 "A mere hundred people with fire in their hearts can move mountains. It is our job to ignite the hearts of our people and show them true compassion."

    NNC_black_mold:0 "Black Mold"
    NNC_black_mold_desc:0 "The Blackguards can be likened to a mold or a fungus - spreading insidious tendrils and growing steadily in the dark and damp. It's time to kill the Black Mold."

    NNC_prepare_the_war_machine:0 "Prepare the War Machine"
    NNC_prepare_the_war_machine_desc:0 "To ensure the support of the Crusaders a cost will have to be paid. Their enthusiasm for war requires investment and action."

    NNC_the_friend_in_the_high_castle:0 "The Friend in the High Castle"
    NNC_the_friend_in_the_high_castle_desc:0 "No more shall knights and nobles be a distant figure sitting in a castle on a hill, separate and above the common folk. The nobility must walk through the streets, see the city from the ground, and listen to the concerns of the peasants. No longer a god, but a friend."

    NNC_a_house_united:0 "A House United"
    NNC_a_house_united_desc:0 "By leveraging the support of the peasants, we can ensure that the will of the common man is respected in New New Castle forevermore."

    NNC_shine_light_into_the_darkness:0 "Shine Light into the Darkness"
    NNC_shine_light_into_the_darkness_desc:0 "The Blackguards are angrier than ever, but their powerbase has been shattered and their leaders scattered. It is time to put them in their place, once and for all."

    NNC_new_administration:0 "New Administration"
    NNC_new_administration_desc:0 "The Council and the Roundtable of New New Castle are admirable ideas, but they can't represent the will of the common man. We must overhaul these ancient apparatuses to truly represent every man, woman, and mutant in New New Castle."

    NNC_a_single_cause:0 "A Single Cause"
    NNC_a_single_cause_desc:0 "While the Crusaders may have different goals and methods to us, we can unite behind a single common cause: to bring the light of New New Castle to the wasteland, and ensure the prosperity of everyone who lives within our borders."

    NNC_chivalric_virtues:0 "Chivalric Virtues"
    NNC_chivalric_virtues_desc:0 "Proper codification of a new set of chivalric virtues should promote unity and compassion among our knights."

    NNC_stewards_of_the_people:0 "Stewards of the People"
    NNC_stewards_of_the_people_desc:0 "Who are we if we do not represent the will of the people? Malign influences must be expunged from government if the peasants are to remain free and happy."

    NNC_political_diversity:0 "Political Diversity"
    NNC_political_diversity_desc:0 "If the people are to remain truly free, they must be free to make decisions against their own interests. The remains of the Blackguards and the Crusaders both represent significant viewpoints among our people. Even if we disagree with them, they must be tolerated."

    NNC_the_kingdom_for_the_people:0 "The Kingdom for the People"
    NNC_the_kingdom_for_the_people_desc:0 "New New Castle is no longer simply a feudal state, it is a modernised monarchy that represents the true will of the people."

    NNC_cure_the_robots_illness:0 "Cure the Robot's Illness"
    NNC_cure_the_robots_illness_desc:0 "BMMAU is seriously sick. It proclaims medical treatment and safety, yet none who enter Buffalo return - only legions of robots. The root cause must be cured, and BMMAU must be stopped."

    NNC_all_along_the_watchtower:0 "All Along the Watchtower"
    NNC_all_along_the_watchtower_desc:0 "The future of New New Castle is war. War unending, and a heroic crusade against the darkness of the wasteland."

    NNC_zeal_and_promise:0 "Zeal and Promise"
    NNC_zeal_and_promise_desc:0 "Now that we're in power we're going to have to make a few changes. We must whip nationalist fervour into religious zealotry, and channel our strength against our enemies."

    NNC_the_peoples_warriors:0 "The People's Warriors"
    NNC_the_peoples_warriors_desc:0 "The Chivalrics may claim to represent the people, but we do more than that. We are the sword of New New Castle, and we defend the people from what horrors await in the vast wastes."

    NNC_peasants_purpose:0 "The Peasant's Purpose"
    NNC_peasants_purpose_desc:0 "The Peasants of New New Castle provide a crucial role in the conquest of the East Coast, and their service provides the foundation for our very society."

    NNC_artisans_duty:0 "The Artisan's Duty"
    NNC_artisans_duty_desc:0 "The blacksmiths, tanners, chandlers, coopers, notaries and more are all vital elements of New New Castle's economy. By leveraging our will, we can ensure these artisans produce the goods we need to persecute our war."

    NNC_serve_a_higher_purpose:0 "Serve a Higher Purpose"
    NNC_serve_a_higher_purpose_desc:0 "We are not a fundamentally religious state, although we take the trappings of religion in many ways. Instead of a god, we have a cause. Instead of the church, we serve the greater good. The people will rally behind us."

    NNC_only_true_faithful:0 "The Only True Faithful"
    NNC_only_true_faithful_desc:0 "While the fervour of the peasantry is admirable, we can't rely on them to faithfully pursue our goals. Knights and other lofty servants of New New Castle are the light that shines into the heathen wastes."

    NNC_inspire_chivalric_fervour:0 "Inspire Chivalric Fervour"
    NNC_inspire_chivalric_fervour_desc:0 "Even the Chivalrics are more than willing to fight with us. If we can simply show that our cause is just and the people will be safe, they will work with us willingly."

    NNC_the_holy_queendom:0 "The Holy Queendom"
    NNC_the_holy_queendom_desc:0 "With her ascension to the throne of New New Castle, Constance is deserving of a title more befitting her stature."
        NNC_constance_queen_name:0 "Queen Constance"

    NNC_godly_ruler:0 "A Godlike Ruler"
    NNC_godly_ruler_desc:0 "Constance has proven herself more than a mere mortal with her ascension. With a little encouragement, none will oppose her rule, and she will be worshipped as a god."

    NNC_compassionate_ruler:0 "A Compassionate Ruler"
    NNC_compassionate_ruler_desc:0 "Being a truly great ruler is more than simply inspiring fear and loyalty. Constance must show true compassion if she is to rule New New Castle, and the people will fight and die for her."

    NNC_end_the_roundtables:0 "End the Roundtables"
    NNC_end_the_roundtables_desc:0 "Now that Constance is queen, we have no need to continue holding Roundtables. They only impose limits on the power of the queen."

    NNC_hear_them_out:0 "Hear Them Out"
    NNC_hear_them_out_desc:0 "While the Roundtable may be an unfortunate constraint on the power of the queen, they can still prove useful. By allowing dissenting voices on the Roundtable, we can keep our enemies close."

    NNC_regina_vult:0 "Regina Vult!"
    NNC_regina_vult_desc:0 "Constance has brought about a new era for New New Castle, and the holy queendom is now stronger than ever."

    NNC_purge_the_corrupt:0 "Purge the Corrupt"
    NNC_purge_the_corrupt_desc:0 "In a society like ours the corrupt present a weak face to our enemies. Only by ridding ourselves of their malign influence can we present a strong face to the world"

    NNC_tax_excesses:0 "Tax Excesses"
    NNC_tax_excesses_desc:0 "While denying luxuries will unite many nobles against us, implementing a stringent tax will discourage improper behaviour and bring money into our coffers."

    NNC_wipe_out_bandits:0 "Wipe Out Bandits"
    NNC_wipe_out_bandits_desc:0 "It is a poorly kept secret that the Blackguards fund many of the bandit groups across New New Castle. By clearing out as many as we can we can also wreck their influence."

    NNC_create_new_martyrs:0 "Create New Martyrs"
    NNC_create_new_martyrs_desc:0 "A little manipulation will be sufficient to make the people believe that Blackguards have died in service of New New Castle. We can leverage this against the Blackguards and force them to honour their fallen compatriots by working with us."

    NNC_unholy_compromise:0 "Unholy Compromise"
    NNC_unholy_compromise_desc:0 "While an unpleasant prospect, we have the option to work with the Blackguards - at least in a limited way. While we'll need to make concessions, they have significant sway among the nobility."

    NNC_blackguards_on_the_front_lines:0 "Blackguards on the Front Lines"
    NNC_blackguards_on_the_front_lines_desc:0 "Whether they like it or not, the Blackguards will be fighting with us from now on. We can strategically send the worst troublemakers to the front, and cow the rest of the Blackguards into submission."

    NNC_a_burning_passion:0 "A Burning Passion"
    NNC_a_burning_passion_desc:0 "New New Castle is truly united by the Crusaders, with a common purpose at our feet. The wasteland will know our fury."

    NNC_bring_fire_to_buffalo:0 "Bring Fire to Buffalo"
    NNC_bring_fire_to_buffalo_desc:0 "Buffalo is the first target of our crusade. The robot lurking there is a menace and affront to society, and our soldiers will cleanse the city from its influence."

    NNC_fieldwork:0 "Fieldwork"
    NNC_fieldwork_desc:0 "While we may focus on the knightly trappings of our medieval forebears, let us not forget they were supported by a mighty feudal economy at their backs. We can't neglect the peasants who feed us and the artisans who clothe us."

    NNC_country_farmers:0 "Country Farmers"
    NNC_country_farmers_desc:0 "Agriculture is a difficult job in the wasteland, but with our support verdant fields of grain can spread across the wasteland and bring food and life to a desolate land. The farmers have crucial work in front of them."

    NNC_economy_path_unique_one:0 "The Ruler's Mandate"
    NNC_economy_path_unique_one_desc:0 "Not everyone has the same views on the peasantry, we must ensure that they are treated as they deserve!"

    NNC_peasant_populace:0 "The Peasant Populace"
    NNC_peasant_populace_desc:0 "The peasants represent a vast portion of the population of New New Castle. By promoting immigration and growth we can strengthen the backbone of our country."

    NNC_backbone_of_nnc:0 "The Backbone of New New Castle"
    NNC_backbone_of_nnc_desc:0 "While the knights may be more glamourous and the artisans more prosperous, it is the peasantry that allows New New Castle to exist as it does."

    NNC_town_artisans:0 "Town Artisans"
    NNC_town_artisans_desc:0 "The towns and cities are home to hundreds of artisans and craftsmen, responsible for everything from clothing to armour to tools to weapons to candles to wagons to so much more."

    NNC_economy_path_unique_two:0 "Focus the Artisans' Efforts"
    NNC_economy_path_unique_two_desc:0 "Lancaster had a different vision for the middle class than we do, we need to ensure that our vision continues and New New Castle can prosper."

    NNC_weapons_and_smiths:0 "Weapons and Smiths"
    NNC_weapons_and_smiths_desc:0 "Of special interest to our nobility is the creation of new weapons and armour. By promoting the wellbeing of smiths and armourers, they can feed our army and we can become great."

    NNC_cities_and_knights:0 "Cities and Knights"
    NNC_cities_and_knights_desc:0 "Whether they like it or not, knights are dependent on the cities. By improving the links between cities and knights we can keep our knights equipped and our artisans busy."

    NNC_forging_a_crucible:0 "Forging a Crucible"
    NNC_forging_a_crucible_desc:0 "If we create a new centre for military production, we can centralise and control it better while also making the industry more efficient and effective."

    NNC_guild_monopoly_rights:0 "Guild Monopoly Rights"
    NNC_guild_monopoly_rights_desc:0 "Guilds have long been established in New New Castle, but by granting them the right of monopoly over their trade they can do all the work of regulating the industry for us - as long as they understand they're working for us."

    NNC_castle_elites:0 "The Castle Elites"
    NNC_castle_elites_desc:0 "The most important part of New New Castle are the nobility and their servants, priests, and officials. We must ensure their happiness, and their support will be crucial."

    NNC_land_clearance:0 "Land Clearance"
    NNC_land_clearance_desc:0 "The wasteland is littered with dangerous areas - craters, abandoned pre-war buildings, molerat lairs, and so on and so forth. Knights and teams of scavengers and builders can work together to clear these out and open new space for construction."

    NNC_economy_path_unique_three:0 "Support From the Nobility"
    NNC_economy_path_unique_three_desc:0 "There are many avenues to secure support from our nobility, and their support will be vital in the years to come."

    NNC_castle_new_new_castle:0 "Castle New New Castle"
    NNC_castle_new_new_castle_desc:0 "Despite being the capital of New New Castle, our royal castle is rather unimpressive. If we are to demonstrate our might and superiority, we must build a castle that will stand the test of time and intimidate our foes."

    NNC_thriving_feudal_economy:0 "A Thriving Feudal Economy"
    NNC_thriving_feudal_economy_desc:0 "Many scoffed at our efforts to revive a centuries-dead economy model, but our knights provide security for our peasants, who work the land and supply the artisans, who equip the knights. A wonderful symbiotic system!"
    nnc_combine_economic_ideas_tt:0 "This will combine the ideas from the §YCountry Farmers§!, §YTown Artisans§!, and §YCastle Elite§! branches into one, stronger idea."

    NNC_heat_of_battle:0 "The Heat of Battle"
    NNC_heat_of_battle_desc:0 "There is nothing like fighting for a wonderful cause. We just need to make sure we avoid too much dying for a wonderful cause."

    NNC_drilling_the_men:0 "Drilling the Men"
    NNC_drilling_the_men_desc:0 "Most of New New Castle's soldiers are peasant rabble, forming militias or squads of their own. By properly drilling these units we can ensure they are dangerous to their enemies, not just each other."

    NNC_keep_in_formation:0 "Keep in Formation"
    NNC_keep_in_formation_desc:0 "Formations are difficult to train peasants into, but well worth the effort. A proper formation is unbreakable in the face of even the most dangerous enemies."

    NNC_warriors_and_soldiers:0 "Warriors and Soldiers"
    NNC_warriors_and_soldiers_desc:0 "There is more to war in the wasteland than whacking your opponent with a sword before they shoot you. Our soldiers well know what is required - we must listen to them."

    NNC_military_path_unique_one:0 "Focus the Peasant Army"
    NNC_military_path_unique_one_desc:0 "The peasants are scarcely the most skilled soldiers on the battlefield, but by the gods there are many of them. It stands to reason they could form a potent force."

    NNC_the_shieldwall:0 "The Shieldwall"
    NNC_the_shieldwall_desc:0 "By designing interlocking shields and training our peasants, they can form impenetrable shieldwalls. These will completely lock down an area, and render our defence far stronger."

    NNC_controlled_advancement:0 "Controlled Advancement"
    NNC_controlled_advancement_desc:0 "Our way of life is obviously the best in the wasteland, but technology is hard to fight with swords and shields. As long as we don't go overboard, we can stay true to our ideals."

    NNC_learn_to_fly:0 "Learn to Fly"
    NNC_learn_to_fly_desc:0 "If we are to choose an advancement to embrace, it should be that of flight. Taking to the sky like the dragons of yore and bringing death to our enemies from above. What could be more glorious?"

    NNC_what_a_time_to_find_out:0 "What a Time to Find Out"
    NNC_what_a_time_to_find_out_desc:0 "Unfortunately, it's pretty difficult to swim in armour. The easiest solution isn't taking off the armour, but never having to swim in the first place."

    NNC_remember_the_lights_of_cars_in_the_streets:0 "Remember the Lights of Cars in the Streets"
    NNC_remember_the_lights_of_cars_in_the_streets_desc:0 "The pre-war car was like a sort of horse, far more primitive and slow though. Well, presumably. None of us have ever driven a car or ridden a horse. That could change though!"

    NNC_call_up_the_jet_fighters:0 "Call Up the Jet Fighters"
    NNC_call_up_the_jet_fighters_desc:0 "We're vastly underprepared for maintaining and using jet fighters - we lack any sort of proper infrastructure. We need to change that."

    NNC_i_will_not_let_you_drown_again:0 "I Will Not Let You Drown, Again"
    NNC_i_will_not_let_you_drown_again_desc:0 "Building ships isn't as easy as we thought... but if we can figure out how to make a suit of armour, we can make a boat."

    NNC_a_town_of_perfect_isolation:0 "A Town of Perfect Isolation"
    NNC_a_town_of_perfect_isolation_desc:0 "Our towns are scattered and disconnected, with the main roads only attaching the most important of our settlements. More sophisticated roads will allow our cars to connect our cities together."

    NNC_ease_research_restrictions:0 "Ease Research Restrictions"
    NNC_ease_research_restrictions_desc:0 "We can't advance our technology to the levels of those around us without risking everything we've built, but we can certainly be less cautious."

    NNC_being_constructive:0 "Being Constructive"
    NNC_being_constructive_desc:0 "We may be cautious of new technology, but even we must admit warm houses sound nice."

    NNC_catching_up:0 "Catching Up"
    NNC_catching_up_desc:0 "Although it may be deeply unpopular, the fact is we'll never maintain parity with our neighbours if we can't accept advancement in a limited capacity."

    NNC_king_in_the_castle:0 "King in the Castle"
    NNC_king_in_the_castle_desc:0 "It's hardly a surprise that we're defensively focused, building elaborate forts and castles across our borders. It's even less surprising that we've got very good at it."

    NNC_walls_and_watchtowers:0 "Walls and Watchtowers"
    NNC_walls_and_watchtowers_desc:0 ""
    nnc_build_outposts_tt:0 "This will build one level of §YOutpost§! along every border we have."

    NNC_siege_warfare:0 "Siege Warfare"
    NNC_siege_warfare_desc:0 ""

    NNC_military_path_unique_two:0 "Mighty Spires"
    NNC_military_path_unique_two_desc:0 ""

    NNC_i_am_a_rock:0 "I am a Rock"
    NNC_i_am_a_rock_desc:0 ""

    NNC_a_realm_in_chaos:0 "A Realm in Chaos"
    NNC_a_realm_in_chaos_desc:0 "This is a disaster..."

    NNC_spilling_across_borders:0 "Spilling Across Borders"
    NNC_spilling_across_borders_desc:0 "We're never coming back from this..."

    NNC_unending_crusade:0 "Unending Crusade"
    NNC_unending_crusade_desc:0 "This is out of our control..."

    NNC_kingdom_of_anarchy_focus:0 "Kingdom of Anarchy" 
    NNC_kingdom_of_anarchy_focus_desc:0 "And yet we've endured."