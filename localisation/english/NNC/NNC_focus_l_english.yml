l_english:
    nnc_different_parties_tt:0 "§YНаслідки цього фокусу залежатимуть від того, хто при владі.§!\n\n"


    NNC_knights_of_yore:0 "Лицарі минулого"
    NNC_knights_of_yore_desc:0 "За століття до завершення Великої війни лицарі мандрували сільською місцевістю, допомагаючи людям і викорінюючи бандитів. Навіть зараз вони залишаються джерелом натхнення."

    NNC_our_finest_hour:0 "Наша найкраща година"
    NNC_our_finest_hour_desc:0 "У 2253 році троги здійснили вторгнення в наші землі, небачене досі. Наші укріплення були зметені, і здавалося, що все втрачено, але сер Ланкастер зумів відвернути поразку."

    NNC_eleventh_round_table:0 "Одинадцятий Круглий Стіл"
    NNC_eleventh_round_table_desc:0 "Уже 22 роки лорд Ланкастер править Новим Нью-Каслом, скликаючи Круглий стіл кожні два роки, щоб кожен лицар міг бути почутим, а королівство процвітало."

    NNC_stoke_the_forges:0 "Розпалити горни"
    NNC_stoke_the_forges_desc:0 "Ця частина Старого Світу була сповнена кузень, ливарень та інших металообробних майстерень. Нам знадобиться багато спорядження, якщо ми хочемо розгромити работорговців і монстрів, що нам загрожують."

    NNC_we_serve_ourselves:0 "Ми служимо собі"
    NNC_we_serve_ourselves_desc:0 "Лицарі, як найкраща еліта Нового Нью-Касла, повинні отримувати пріоритетне обслуговування. Якщо народ не бажає надати нам необхідну зброю та обладунки, ми просто візьмемо їх силою."

    NNC_we_serve_the_people:0 "Ми служимо людям"
    NNC_we_serve_the_people_desc:0 "Найвища честь лицаря — це його обов'язок перед простим народом, бідняками, що обробляють наші землі й живуть у наших містах. Ми повинні піклуватися про них, інакше в чому сенс нашого існування?"

    NNC_armed_and_armoured:0 "Озброєні та захищені"
    NNC_armed_and_armoured_desc:0 "Наші лицарі носять найкращі обладунки й володіють найкращою зброєю. Нам потрібно зібрати найкращі обладунки в цих землях, щоб підготуватися до війн."

    NNC_knights_in_shining_armour:0 "Лицарі в сяючих обладунках"
    NNC_knights_in_shining_armour_desc:0 "Наші лицарі — взірець для кожного солдата Пустки. Сміливі, чесні й одягнені в найкращі обладунки, які тільки можна знайти в Пустці. Пограбувавши кілька старих довоєнних поліцейських дільниць і складів, ми зможемо переконатися, що вони справді носять найкращу броню."

    NNC_summon_the_banners:0 "Скликати прапороносців"
    NNC_summon_the_banners_desc:0 "Наші лицарі розкидані по всій країні, виконуючи важку роботу: виганяючи бандитів, знищуючи монстрів і патрулюючи дороги. Принаймні, так має бути в теорії. Але час прийшов готуватися до війни, і ми повинні терміново зібрати всіх наших воїнів."

    NNC_levy_the_peasantry:0 "Призов селянства"
    NNC_levy_the_peasantry_desc:0 "Селяни становлять більшу частину нашого населення, але майже не беруть участі в армії (окрім виготовлення зброї, забезпечення допоміжного персоналу та іншої, здавалося б, неважливої роботи). Хоча це може бути непопулярним серед селян, призов допоможе їм зробити належний внесок."

    NNC_knights_duty:0 "Лицарський обов'язок"
    NNC_knights_duty_desc:0 "Обов'язок лицаря — служити народу, а не собі. Нам потрібно підняти лицарів, щоб підготуватися до війни; не можна очікувати, що селяни візьмуть на себе весь тягар боїв."
    nnc_knights_duty_oob_tt:0 "Створить §G2§! дивізії §YВажкої піхоти§!"

    NNC_prepare_the_council:0 "Підготувати Раду"
    NNC_prepare_the_council_desc:0 "Коли Круглий стіл не засідає, Ланкастер підтримує раду вірних лицарів для консультування. Тепер, коли війна з Руйнівниками вже на порозі, рада має бути приведена в повну готовність."

    NNC_keep_the_teams_together:0 "Згуртування Лицарів"
    NNC_keep_the_teams_together_desc:0 "Лицарські загони — важлива частина Нового Нью-Касла, але внутрішні чвари та політичні суперечки можуть загрожувати цілісності держави. Нам необхідно вжити заходів для зменшення цих конфліктів."
        NNC_unlock_rally_decisions_tt:0 "Це розблокує §Yрішення§! для підвищення популярності партії"

    NNC_boot_of_oppression:0 "Металевий чобіт гноблення"
    NNC_boot_of_oppression_desc:0 "Хоча це й не ідеально, нам необхідно тримати селян у покорі будь-якими засобами. Адже ми знаємо, що для них краще, хіба не обов'язок лицаря захищати свій народ?"

    NNC_valour_of_heroes:0 "Доблесть минулих героїв"
    NNC_valour_of_heroes_desc:0 "Лицарі завжди були найбільш доблесними й героїчними воїнами в усій історії. Нам потрібно подати приклад решті Нового Нью-Касла та всій Пустці, якому вони зможуть слідувати."

    NNC_inspire_fervour:0 "Надихнути завзяттям"
    NNC_inspire_fervour_desc:0 "Лицарів Старого Світу надихала їхня релігійна віра та запал. Хоча зараз релігія вже не об'єднує нас так, як тоді, ми все ще можемо плекати гарячу віру в наш спосіб життя та праведну справу."

    NNC_regulated_innovation:0 "Регульовані інновації"
    NNC_regulated_innovation_desc:0 "Практично єретично припускати, що нам потрібна технологія більш досконала, ніж та, що служила лицарям давніх часів, але ми можемо піти на деякі поступки в розвитку. Адже їм точно не доводилося битися з Кігтями Смерті чи тими, хто використовує самопали."

    NNC_recruit_war_hawks:0 "Наймання Яструбів Війни"
    NNC_recruit_war_hawks_desc:0 "Найманці, як і раніше, відіграють важливу роль у Пустці, і хоча наші лицарі більш чесні та ефективні, було б нерозумно не витратити частину наших кришок на їхні послуги. Таким чином ми не лише посилимо свої лави, а й позбавимо підтримки наших ворогів."
    nnc_war_hawks_oob_tt:0 "Створить §G2§! дивізії §YПіхоти§!"

    NNC_evaluate_crop_rotation:0 "Оцінити сівозміну"
    NNC_evaluate_crop_rotation_desc:0 "Наш метод сівозміни ретельно моделюється за зразком середньовічних практик. На жаль, у нас немає багатьох тих самих культур, що були тоді. Тому невеликі інновації в цьому напрямку цілком виправдані."

    NNC_training_dummies:0 "Тренувальні «Мішені»"
    NNC_training_dummies_desc:0 "Нашим лицарям потрібно ефективно тренуватися, і деякі з Чорних Гвардійців запропонували робити це на живих мішенях. Звісно, це буде застосовуватися лише до злочинців, але все одно це відчуття викликає внутрішній дискомфорт, чи не так?"

    NNC_zealots_of_war:0 "Фанатики війни"
    NNC_zealots_of_war_desc:0 "Хрестоносці сповнені праведності та відданості справі, і при цьому пропонують цікаві ідеї щодо покращення обладунків. В основі, як і раніше, буде метал, але якість і міцність стануть значно кращими, ніж те, що ми могли кувати досі."

    NNC_ride_to_war:0 "Поїздка на війну"
    NNC_ride_to_war_desc:0 "Руйнівники давно є більмом на оці. Їхня практика рабства та торгівля з Піттом ганьблять честь лицарів повсюди, і ця пляма на узбережжі має бути викорінена."

    NNC_twelfth_roundtable:0 "Дванадцятий Круглий Стіл"
    NNC_twelfth_roundtable_desc:0 "Лорд Ланкастер раптово скликав дванадцятий Круглий стіл, задовго до запланованого терміну. Що б це могло означати?"
    nnc_unlock_more_tree_tt:0 "Це розблокує §Yнові фокуси§!"

    NNC_lancasters_retirement:0 "Відставка Ланкастера"
    NNC_lancasters_retirement_desc:0 "Ланкастер оголосив причину раптового скликання дванадцятого Круглого столу — він іде у відставку і повинен обрати нового правителя на час своєї відсутності."

    NNC_black_knights_rising:0 "Повстання Чорних Лицарів"
    NNC_black_knights_rising_desc:0 "Чорні Гвардійці не користуються особливою популярністю серед простого народу, але багато лордів і дворян приваблюють їхні гроші та розпуста..."

    NNC_brutal_reprisals:0 "Жорстокі репресії"
    NNC_brutal_reprisals_desc:0 "Чорні Гвардійці лише поверхово намагаються приховати свої зв'язки з бандитами та рейдерами на нашій території. Ці бандити корисні для розправи з тими, хто може піти проти наших планів..."

    NNC_requisitions:0 "Реквізиції"
    NNC_requisitions_desc:0 "Хтось може назвати це відвертим злодійством, але нам потрібна зброя, і Чорні Гвардійці більш ніж готові вказати, де її можна дістати."

    NNC_maintain_stability:0 "Підтримання стабільності"
    NNC_maintain_stability_desc:0 "Навіть у такий час підтримання стабільності Нового Нью-Касла — першочергове завдання. Якщо ми розвалимося, новий правитель виявиться правителем нічого."

    NNC_ensure_peoples_safety:0 "Забезпечити безпеку людей"
    NNC_ensure_peoples_safety_desc:0 "Тимчасова криза спадкоємства в Новому Нью-Каслі не паралізувала трогів і рейдерів. Незважаючи на наші політичні проблеми, нам необхідно продовжувати зміцнювати оборону."

    NNC_peace_and_prosperity:0 "Мир і процвітання"
    NNC_peace_and_prosperity_desc:0 "Мирна передача влади буде набагато легше гарантована, якщо народ задоволений і щасливий."

    NNC_age_of_heroes:0 "Епоха героїв"
    NNC_age_of_heroes_desc:0 "Ми повинні довести народу, що наш мандат справедливий, а правителі — милостиві. Герої Лицарства вже користуються великою популярністю серед простого народу, і ми зобов'язані зберегти цей статус."

    NNC_chivalric_code:0 "Лицарський кодекс"
    NNC_chivalric_code_desc:0 "Ідея лицарського кодексу давно обговорювалася, але так і не була впроваджена. Зараз Лицарі наполягають на введенні обов'язкового кодексу, що гарантує стандарти поведінки для лицарів. Втім, Чорні Гвардійці, найімовірніше, все одно його ігноруватимуть."

    NNC_will_of_the_people:0 "Воля народу"
    NNC_will_of_the_people_desc:0 "Воля народу — потужна сила, якою ми можемо скористатися, і Лицарство точно знає, як підтримувати та зміцнювати цю силу."

    NNC_fortify_the_border:0 "Укріплення Кордонів"
    NNC_fortify_the_border_desc:0 "Навіть у такий час ми не можемо дозволити собі послабити пильність. Нова лінія оборонних фортів, стін і застав забезпечить безпеку Нового Нью-Касла."

    NNC_deploy_knights_errant:0 "Розгортання Мандрівних Лицарів"
    NNC_deploy_knights_errant_desc:0 "Мандрівні лицарі — це лицарі, яких відправляють у глибинку, щоб приносити добро туди, де воно потрібне. Посилаючи мандрівних лицарів у сільську місцевість, ми не лише зробимо землі безпечнішими, а й зміцнимо нашу присутність по всьому Новому Нью-Каслу."
        nnc_unlock_horn_tt:0 "\n\n§Y$NNC_horn_name$§! стає командиром загону.\n§LРівень§!: §Y3§!\n§RАтака§!: §Y2§!\n§GОборона§!: §Y3§!\n§PПланування§!: §Y3§!\n§MЛогістика§!: §Y2§!\n§gРиси§!: §tРозумний§!, §tСпритний§!\n\n"

    NNC_maintain_order:0 "Підтримання Порядку"
    NNC_maintain_order_desc:0 "Потрібно призвати нову групу селян для підтримання порядку в ці складні часи. Люди бояться й невпевнені через зміни в уряді, і без твердої руки ми ризикуємо опинитися в серйозній небезпеці."

    NNC_order_and_fervour:0 "Порядок і Завзяття"
    NNC_order_and_fervour_desc:0 "Просуваючи не лише відданість справі, а й вірність державі, Хрестоносці сподіваються об'єднати народ навколо єдиного Нового Нью-Касла."

    NNC_righteous_fury:0 "Праведний гнів"
    NNC_righteous_fury_desc:0 "Хрестоносці всією душею вірять, що ми повинні бути готові завдати удару по зовнішніх ворогах будь-якої миті."

    NNC_the_wasteland_waits_for_us:0 "Пустки чекають на нас"
    NNC_the_wasteland_waits_for_us_desc:0 "Наша доля — завоювати пустки для Нового Нью-Касла. Ми повинні бути готові прийняти на себе цей священний обов'язок."

    NNC_paint_it_black:0 "Пофарбуй це в Чорне"
    NNC_paint_it_black_desc:0 "Чорні Гвардійці вийшли переможцями. Усі знали, що це неминуче, тепер пора приступати до змін."

    NNC_oppression_in_vogue:0 "Гноблення знову в моді"
    NNC_oppression_in_vogue_desc:0 "Гноблення повертається — і в найкращих традиціях. Ці селяни навіть не зрозуміють, що на них обрушилося, і в них не буде часу це осмислити."

    NNC_replace_the_roundtable:0 "Заміна Круглого Столу"
    NNC_replace_the_roundtable_desc:0 "Круглий стіл застарів — його потрібно скасувати. Так нам буде простіше зміцнити власну владу й ухвалювати рішення швидко, без обговорень із тими, хто нам не до вподоби."

    NNC_stack_the_kings_council:0 "Сформувати Королівську Раду"
    NNC_stack_the_kings_council_desc:0 "Не секрет, що багато радників і членів ради нас зневажають — особливо Лицарство. Час навести лад, чи то весна, чи яка там зараз пора року. Я не метеоролог."

    NNC_turn_a_blind_eye:0 "Заплющити очі"
    NNC_turn_a_blind_eye_desc:0 "Не секрет, що ми багато років заплющували очі на те, що відбувається, але тепер, коли влада в наших руках, ми можемо нарешті забезпечити комфорт собі та нашим вірним прихильникам."

    NNC_turn_to_important_matters:0 "Повернутися до Важливих Справ"
    NNC_turn_to_important_matters_desc:0 "Справ накопичилося, і селяни почали проявляти непослух. Нам потрібно втримати їх на їхньому місці — і при цьому не забувати про своє власне становище."

    NNC_a_matter_of_coin:0 "Справа Монети"
    NNC_a_matter_of_coin_desc:0 "Гроші рухають світом, а кришки відкривають будь-які двері. Час інвестувати в майбутнє — наше власне майбутнє."
        nnc_mercenary_decisions_tt:0 "Це розблокує рішення для найму найманців"

    NNC_pushing_the_peasantry_harder:0 "Посилення тиску на селянство"
    NNC_pushing_the_peasantry_harder_desc:0 "Селянам це не сподобається, а нам сподобається."

    NNC_tyranny:0 "Тиранія"
    NNC_tyranny_desc:0 "Тиранія — ознака ефективного правителя. Ми не витрачаємо час на доброту, коли точно знаємо, чого хочемо і як цього досягти."

    NNC_finest_money_can_buy:0 "Найкраще, що можна купити за гроші"
    NNC_finest_money_can_buy_desc:0 "Розширення ради — більш ніж заслужено... Час подивитися, кого можна підкупити."

    NNC_remove_the_incorruptible:0 "Прибрати Непідкупних"
    NNC_remove_the_incorruptible_desc:0 "Хоча гроші багато що можуть, вони не завжди купують лояльність — цей проклятий гуль Умфред зібрав навколо себе прихильників і виявився несприйнятливим до підкупу. Він нам більше не потрібен."

    NNC_crack_down_on_chivalrics:0 "Боротьба з Лицарством"
    NNC_crack_down_on_chivalrics_desc:0 "Ці прокляті моралісти вже достатньо нашкодили Новому Нью-Каслу — час позбутися їх і назавжди вигнати цих селян із двору."

    NNC_placate_crusaders:0 "Умиротворення Хрестоносців"
    NNC_placate_crusaders_desc:0 "Хрестоносці — справжні ідіоти, які бажають розв'язати мстиву війну по всій пустці, — зовсім не найкращий спосіб заробити гроші! Тим не менш, розширення наших підприємств привабливе... а лояльність Хрестоносців — цінна."

    NNC_peace_and_security_for_new_empire:0 "Мир і Безпека для Нашої Нової Імперії"
    NNC_peace_and_security_for_new_empire_desc:0 "Ми принесли нову еру процвітання та свободи (для вищого класу) у Новий Нью-Касл. Ми вже не просто Чорні Гвардійці — наше королівство вийшло на новий рівень розвитку й перевершило свій колишній стан."

    NNC_make_buffalo_black:0 "Зробити Баффало Чорним"
    NNC_make_buffalo_black_desc:0 "Служба Здоров'я Баффало довгий час загрожувала нашій безпеці та демонструвала зухвалу поведінку. Ми нізащо не дозволимо роботам контролювати місто, яке може стати для нас дуже вигідним джерелом прибутку."

    NNC_the_injustice_system:0 "Несправедлива Система"
    NNC_the_injustice_system_desc:0 "Суддів можна купити, а суди — розбестити. Нам потрібно переконатися, що всі органи правозастосування та тлумачення закону знають, звідки надходять гроші."

    NNC_bribery_and_extortion:0 "Хабарництво та корупція"
    NNC_bribery_and_extortion_desc:0 "Більшість людей засуджують хабарництво та корупцію, але варто лише поглянути, скільки це може принести вигод!"
        nnc_bribery_decisions_tt:0 "Це розблокує рішення для підкупу політичних опонентів та ворожих офіцерів"

    NNC_lap_of_luxury:0 "Коло розкоші"
    NNC_lap_of_luxury_desc:0 "Чорні Гвардійці завжди вели розкішний спосіб життя, але тепер, коли немає перешкод для їхніх бажань, вони можуть насолоджуватися життям своєї мрії. Ще один бенкет, хто за?"

    NNC_system_works_for_people_who_matter:0 "Система працює... для важливих людей"
    NNC_system_works_for_people_who_matter_desc:0 "У нас тепер ідеальна система — залишилося тільки використовувати її по максимуму й насолоджуватися результатами."

    NNC_this_is_the_day:0 "Цей День"
    NNC_this_is_the_day_desc:0 "Лицарство взяло владу в свої руки. Сьогодні життя селян неодмінно зміниться назавжди."

    NNC_peoples_heroes:0 "Герої для Народу"
    NNC_peoples_heroes_desc:0 "Лицарство продовжує довгу й шляхетну традицію справжніх лицарів: допомагають слабким, борються зі злом і протистоять тиранії. Це світанок нової епохи."

    NNC_shining_host:0 "Сяюче воїнство"
    NNC_shining_host_desc:0 "Воїни Лицарства втілюють ідеал лицаря в сяючих обладунках. Це армія бійців, готових стати на захист Нового Нью-Касла й перемогти будь-якого ворога."
    nnc_shining_host_oob_tt:0 "Створить §G2§! навчені дивізії §YВажкої Піхоти§!"

    NNC_united_in_spirit:0 "Єдині Духом"
    NNC_united_in_spirit_desc:0 "Хоча селяни живуть набагато скромніше за знать, Лицарство подбають про те, щоб кожен житель Нового Нью-Касла був натхненний і готовий служити спільній справі."

    NNC_bring_criminals_to_justice:0 "Притягнути злочинців до відповідальності"
    NNC_bring_criminals_to_justice_desc:0 "До двору проникли дрібні злочинці та жорстокі психопати. Нам потрібно поставити цих порушників під контроль — у нашій раді немає місця вбивцям."

    NNC_spirit_of_a_crusader:0 "Дух Хрестоносця"
    NNC_spirit_of_a_crusader_desc:0 "Хоча Хрестоносці й протистоять нам, вони не такі жахливі, як Чорні Гвардійці. Вони жорстокі й байдужі до боротьби простого народу, але можуть стати корисною силою для досягнення наших цілей."

    NNC_smiling_knights_in_shining_armour:0 "Усміхнені лицарі в сяючих обладунках"
    NNC_smiling_knights_in_shining_armour_desc:0 "Не секрет, як лицарі люблять бачити себе — сміливими героями в сяючих обладунках. Це привабливо навіть для Чорних Гвардійців. Створюючи ці ідеальні сяючі обладунки, ми можемо зміцнити цей образ не лише серед своїх, а й серед усього населення."

    NNC_a_motivated_peasantry:0 "Мотивоване селянство"
    NNC_a_motivated_peasantry_desc:0 "Усього сто людей із вогнем у серці здатні згорнути гори. Наше завдання — запалити серця наших людей і показати їм справжнє співчуття."

    NNC_black_mold:0 "Чорна Пліснява"
    NNC_black_mold_desc:0 "Чорних Гвардійців можна порівняти з пліснявою або грибком — вони поширюють підступні щупальця, неухильно ростуть у темряві й сирості. Час знищити Чорну Плісняву."

    NNC_prepare_the_war_machine:0 "Підготовка Військової Машини"
    NNC_prepare_the_war_machine_desc:0 "Щоб заручитися підтримкою Хрестоносців, доведеться заплатити ціну. Їхній запал до війни потребує вкладень і рішучих дій."

    NNC_the_friend_in_the_high_castle:0 "Друг у Високому Замку"
    NNC_the_friend_in_the_high_castle_desc:0 "Лицарі й знать більше не будуть далекими постатями, що сидять у замках на пагорбах, відірваними й піднесеними над простим народом. Шляхетні повинні ходити вулицями, бачити місто із землі й слухати турботи селян. Не боги, а друзі."

    NNC_a_house_united:0 "Об'єднаний Дім"
    NNC_a_house_united_desc:0 "Спираючись на підтримку селян, ми зможемо забезпечити повагу до волі простої людини в Новому Нью-Каслі назавжди."

    NNC_shine_light_into_the_darkness:0 "Спрямувати світло в темряву"
    NNC_shine_light_into_the_darkness_desc:0 "Чорні Гвардійці зліші, ніж будь-коли, але їхній оплот зруйновано, а лідери розкидані. Час поставити їх на місце раз і назавжди."

    NNC_new_administration:0 "Нове Управління"
    NNC_new_administration_desc:0 "Рада та Круглий стіл Нового Нью-Касла — шляхетні ідеї, але вони не відображають волю простого народу. Ми повинні докорінно реформувати ці древні інститути, щоб по-справжньому представляти кожного чоловіка, жінку й мутанта в нашому місті."

    NNC_a_single_cause:0 "Єдина причина"
    NNC_a_single_cause_desc:0 "Хоча у Хрестоносців можуть бути інші цілі й методи, ми можемо об'єднатися заради одного спільного завдання: принести світло Нового Нью-Касла в пустки й забезпечити процвітання всіх, хто живе на нашій землі."

    NNC_chivalric_virtues:0 "Лицарські чесноти"
    NNC_chivalric_virtues_desc:0 "Правильне кодифікування нового зводу лицарських чеснот має сприяти єдності та співчуттю серед наших лицарів."

    NNC_stewards_of_the_people:0 "Опікуни народу"
    NNC_stewards_of_the_people_desc:0 "Ким ми будемо, якщо не будемо представляти волю народу? Зловмисні впливи мають бути вигнані з влади, щоб селяни залишалися вільними та щасливими."

    NNC_political_diversity:0 "Політичне розмаїття"
    NNC_political_diversity_desc:0 "Якщо народ справді вільний, він повинен мати право приймати рішення, навіть якщо вони суперечать його власним інтересам. Залишки Чорних Гвардійців і Хрестоносців представляють значні точки зору серед нашого населення. Навіть якщо ми з ними не згодні, їх необхідно терпимо сприймати."

    NNC_the_kingdom_for_the_people:0 "Королівство для людей"
    NNC_the_kingdom_for_the_people_desc:0 "Новий Нью-Касл — це вже не просто феодальна держава, а модернізована монархія, що відображає справжню волю народу."

    NNC_cure_the_robots_illness:0 "Вилікувати Хворобу Роботів"
    NNC_cure_the_robots_illness_desc:0 "Б.М.М.А.У серйозно хвора. Вона проголошує медичну допомогу та безпеку, але ніхто, хто входить до Баффало, не повертається — лише легіони роботів. Необхідно усунути корінь цієї хвороби та зупинити Б.М.М.А.У."

    NNC_all_along_the_watchtower:0 "Уздовж сторожової вежі"
    NNC_all_along_the_watchtower_desc:0 "Майбутнє Нового Нью-Касла — це війна. Нескінченна війна та героїчний хрестовий похід проти темряви пусток."

    NNC_zeal_and_promise:0 "Ревність і Обіцянка"
    NNC_zeal_and_promise_desc:0 "Тепер, коли ми при владі, нам належить внести низку змін. Ми повинні перетворити національний запал на релігійне рвіння й спрямувати нашу силу проти ворогів."

    NNC_the_peoples_warriors:0 "Народні Воїни"
    NNC_the_peoples_warriors_desc:0 "Лицарі можуть заявляти, що представляють народ, але ми — дещо більше. Ми — меч Нового Нью-Касла й захищаємо людей від жахів, що таяться в безкраїх пустках."

    NNC_peasants_purpose:0 "Призначення Селян"
    NNC_peasants_purpose_desc:0 "Селяни Нового Нью-Касла відіграють ключову роль у завоюванні Східного узбережжя, і їхнє служіння становить основу нашого суспільства."

    NNC_artisans_duty:0 "Обов'язок Ремісника"
    NNC_artisans_duty_desc:0 "Ковалі, кожум'яки, свічкарі, бондарі, нотаріуси та багато інших — усі вони є життєво важливими елементами економіки Нового Нью-Касла. Використовуючи нашу волю, ми можемо забезпечити, щоб ці ремісники виробляли товари, необхідні для ведення нашої війни."

    NNC_serve_a_higher_purpose:0 "Служити вищій меті"
    NNC_serve_a_higher_purpose_desc:0 "Ми не є по суті релігійною державою, хоча багато в чому приймаємо атрибути релігії. Замість бога в нас є велика мета, замість церкви — служіння загальному благу. Народ стане за нас єдиним фронтом."

    NNC_only_true_faithful:0 "Тільки Істинно Вірні"
    NNC_only_true_faithful_desc:0 "Хоча запал селян заслуговує на повагу, ми не можемо покладатися на них у повному виконанні наших завдань. Лицарі та інші високі слуги Нового Нью-Касла — це світло, що освітлює язичницькі пустки."

    NNC_inspire_chivalric_fervour:0 "Надихати Лицарський Запал"
    NNC_inspire_chivalric_fervour_desc:0 "Навіть Лицарі готові битися разом із нами. Якщо ми зуміємо довести справедливість нашої справи та безпеку для народу, вони охоче приєднаються до нас."

    NNC_the_holy_queendom:0 "Святе Королівство"
    NNC_the_holy_queendom_desc:0 "Зі сходженням Констанс на трон Нового Нью-Касла вона заслуговує на титул, більш відповідний її становищу."
        NNC_constance_queen_name:0 "Королева Констанс"

    NNC_godly_ruler:0 "Божественний Правитель"
    NNC_godly_ruler_desc:0 "Констанс довела, що вона — не просто смертна, зійшовши на трон. З невеликим заохоченням ніхто не наважиться протистояти її владі, і вона буде шанована як богиня."

    NNC_compassionate_ruler:0 "Співчутливий Правитель"
    NNC_compassionate_ruler_desc:0 "Бути по-справжньому великим правителем — це не тільки вселяти страх і вірність. Констанс повинна виявляти справжнє співчуття, щоб керувати Новим Нью-Каслом, і тоді народ буде боротися й помирати за неї."

    NNC_end_the_roundtables:0 "Кінець Круглим Столам"
    NNC_end_the_roundtables_desc:0 "Тепер, коли Констанс стала королевою, немає необхідності продовжувати проведення Круглих Столів. Вони лише обмежують владу королеви."

    NNC_hear_them_out:0 "Вислухайте їх"
    NNC_hear_them_out_desc:0 "Хоча Круглий стіл і є небажаним обмеженням влади королеви, він усе ж може бути корисним. Дозволяючи інакомислячим бути присутніми за столом, ми можемо тримати ворогів ближче й краще контролювати їхні дії."

    NNC_regina_vult:0 "Regina Vult!"
    NNC_regina_vult_desc:0 "Констанс принесла нову епоху в Новий Нью-Касл, і священне королівство тепер сильніше, ніж будь-коли."

    NNC_purge_the_corrupt:0 "Очищення від Корупції"
    NNC_purge_the_corrupt_desc:0 "У такому суспільстві, як наше, корупція показує ворогам нашу слабкість. Тільки позбувшись її згубного впливу, ми зможемо постати перед світом сильними й непохитними."

    NNC_tax_excesses:0 "Податкові Надлишки"
    NNC_tax_excesses_desc:0 "Хоча відмова від розкоші може об'єднати проти нас багатьох дворян, введення суворого податку стане стримуючим фактором для неналежної поведінки й поповнить наші скарбниці."

    NNC_wipe_out_bandits:0 "Знищення Бандитів"
    NNC_wipe_out_bandits_desc:0 "Не секрет, що Чорні Гвардійці фінансують багато банд по всьому Новому Нью-Каслу. Знищуючи якомога більше з них, ми одночасно підірвемо їхній вплив."

    NNC_create_new_martyrs:0 "Створити нових мучеників"
    NNC_create_new_martyrs_desc:0 "Невелика маніпуляція дозволить переконати народ у тому, що Чорні Гвардійці загинули, служачи Новому Нью-Каслу. Ми зможемо використати це проти них і змусити вшанувати пам'ять полеглих, співпрацюючи з нами."

    NNC_unholy_compromise:0 "Нечестивий Компроміс"
    NNC_unholy_compromise_desc:0 "Хоча це й неприємна перспектива, у нас є можливість співпрацювати з Чорними Гвардійцями — нехай і в обмеженому форматі. Нам доведеться піти на поступки, але їхній вплив серед дворянства вельми значний."

    NNC_blackguards_on_the_front_lines:0 "Чорні Гвардійці в Перших Лавах"
    NNC_blackguards_on_the_front_lines_desc:0 "Хочуть вони того чи ні, але з цього моменту Чорні Гвардійці будуть битися разом із нами. Ми можемо стратегічно направляти найбунтівніших на передову й придушувати решту Чорних Гвардійців страхом."

    NNC_a_burning_passion:0 "Палаюча Пристрасть"
    NNC_a_burning_passion_desc:0 "Новий Нью-Касл по-справжньому об'єднаний Хрестоносцями, об'єднаними спільною метою. Пустки пізнають нашу лють."

    NNC_bring_fire_to_buffalo:0 "Принести Вогонь у Баффало"
    NNC_bring_fire_to_buffalo_desc:0 "Баффало — перша мета нашого походу. Робот, що ховається там, становить загрозу й образу для суспільства, наші солдати очистять місто від його впливу."

    NNC_fieldwork:0 "Польові роботи"
    NNC_fieldwork_desc:0 "Хоча ми можемо зосередитися на лицарських традиціях наших середньовічних предків, не варто забувати, що за їхніми спинами стояла могутня феодальна економіка. Ми не можемо нехтувати селянами, які нас годують, і ремісниками, які нас одягають."

    NNC_country_farmers:0 "Сільські Фермери"
    NNC_country_farmers_desc:0 "Сільське господарство — важка праця в пустках, але з нашою підтримкою зелені поля зернових можуть поширитися по всій землі, приносячи їжу та життя в спустошені краї."

    NNC_economy_path_unique_one:0 "Мандат Правителя"
    NNC_economy_path_unique_one_desc:0 "Не всі поділяють однакову думку про селянство, тому ми повинні забезпечити їм те ставлення, якого вони заслуговують."

    NNC_peasant_populace:0 "Селянське населення"
    NNC_peasant_populace_desc:0 "Селяни становлять значну частину населення Нового Нью-Касла. Заохочуючи імміграцію та зростання їхньої кількості, ми можемо зміцнити основу нашої держави."

    NNC_backbone_of_nnc:0 "Основа Нового Нью-Касла"
    NNC_backbone_of_nnc_desc:0 "Хоча лицарі можуть здаватися більш блискучими, а ремісники — більш заможними, саме селянство дозволяє Новому Нью-Каслу існувати й процвітати таким, яким ми його знаємо."

    NNC_town_artisans:0 "Міські Ремісники"
    NNC_town_artisans_desc:0 "Міста й селища — дім для сотень ремісників і майстрів, відповідальних за виробництво всього: від одягу та обладунків до інструментів, зброї, свічок, возів і багато чого іншого."

    NNC_economy_path_unique_two:0 "Зосередити Зусилля Ремісників"
    NNC_economy_path_unique_two_desc:0 "У Ланкастера було інше бачення середнього класу, ніж у нас. Нам необхідно забезпечити реалізацію нашого плану, щоб Новий Нью-Касл міг процвітати за нашими правилами."

    NNC_weapons_and_smiths:0 "Зброя та Ковалі"
    NNC_weapons_and_smiths_desc:0 "Особливий інтерес для нашого дворянства становить створення нової зброї та обладунків. Підтримуючи добробут ковалів і зброярів, ми забезпечимо нашу армію всім необхідним."

    NNC_cities_and_knights:0 "Міста й Лицарі"
    NNC_cities_and_knights_desc:0 "Хочуть вони того чи ні, лицарі залежать від міст. Покращуючи зв'язки між містами й лицарями, ми зможемо забезпечити наших воїнів спорядженням, а ремісників — роботою."

    NNC_forging_a_crucible:0 "Кування Горнила"
    NNC_forging_a_crucible_desc:0 "Якщо ми створимо новий центр військового виробництва, то зможемо централізувати та краще контролювати його, а також підвищити ефективність і продуктивність усієї галузі."

    NNC_guild_monopoly_rights:0 "Монопольні права гільдій"
    NNC_guild_monopoly_rights_desc:0 "Гільдії давно існують у Новому Нью-Каслі, і, надавши їм право монополії на свою галузь, ми можемо перекласти на них всю роботу з регулювання виробництва — за умови, що вони розумітимуть, що працюють на нас."

    NNC_castle_elites:0 "Еліти Замку"
    NNC_castle_elites_desc:0 "Найважливіша частина Нового Нью-Касла — це дворянство та їхні слуги, священики й чиновники. Ми повинні піклуватися про їхнє благополуччя, адже їхня підтримка буде вирішальною."

    NNC_land_clearance:0 "Розчищення Земель"
    NNC_land_clearance_desc:0 "Пустки всіяні небезпечними місцями — кратерами, занедбаними довоєнними будівлями, лігвами кротів тощо. Лицарі разом із загонами шукачів і будівельників можуть об'єднати зусилля, щоб очистити ці території й відкрити нові простори для будівництва."

    NNC_economy_path_unique_three:0 "Підтримка від Дворянства"
    NNC_economy_path_unique_three_desc:0 "Існує безліч способів заручитися підтримкою дворянства, і ця підтримка буде життєво важливою в прийдешні роки."

    NNC_castle_new_new_castle:0 "Замок Нью-Нью-Касл"
    NNC_castle_new_new_castle_desc:0 "Незважаючи на статус столиці Нового Нью-Касла, наш королівський замок залишає бажати кращого. Щоб продемонструвати нашу міць і перевагу, нам необхідно звести фортецю, яка витримає випробування часом і вселить страх у наших ворогів."

    NNC_thriving_feudal_economy:0 "Процвітаюча Феодальна Економіка"
    NNC_thriving_feudal_economy_desc:0 "Багато хто насміхався з наших спроб відродити економічну модель, яка померла багато століть тому, але саме наші лицарі забезпечують безпеку селян, які обробляють землю й постачають ремісників — тих самих, хто споряджає лицарів. Прекрасна симбіотична система!"
    nnc_combine_economic_ideas_tt:0 "Це об'єднає ідеї з напрямків §YСільські Фермери§!, §YМіські Ремісники§! і §YЕліта Замку§! в єдину, сильнішу ідею."

    NNC_heat_of_battle:0 "Жар Битви"
    NNC_heat_of_battle_desc:0 "Немає нічого кращого, ніж битися за шляхетну справу. Нам лише потрібно подбати про те, щоб не вмирати надто часто заради цієї шляхетної справи."

    NNC_drilling_the_men:0 "Навчання чоловіків"
    NNC_drilling_the_men_desc:0 "Більша частина солдатів Нового Нью-Касла — це маса селян, що формують ополчення та загони. Правильною підготовкою та тренуваннями ми зробимо з них грізну силу, небезпечну для ворогів, а не тільки для самих себе."

    NNC_keep_in_formation:0 "Триматися в строю"
    NNC_keep_in_formation_desc:0 "Формуванню складно навчити селян, але ці зусилля окупаються з лишком. Правильно побудована формація непереможна навіть перед лицем найнебезпечніших ворогів."

    NNC_warriors_and_soldiers:0 "Воїни та Солдати"
    NNC_warriors_and_soldiers_desc:0 "Війна на пустках — це не просто удар мечем до того, як у тебе вистрілять. Наші солдати це чудово розуміють, нам слід прислухатися до їхнього досвіду."

    NNC_military_path_unique_one:0 "Зосередитися на селянській армії"
    NNC_military_path_unique_one_desc:0 "Селяни навряд чи наймайстерніші воїни на полі бою, але, богами клянемося, їх неймовірно багато. Логічно припустити, що разом вони можуть скласти потужну силу."

    NNC_the_shieldwall:0 "Стіна Щитів"
    NNC_the_shieldwall_desc:0 "Розробивши зчіпні щити й навчивши селян, ми зможемо створювати непроникні щитові стіни. Такі формації повністю блокують територію та значно зміцнюють нашу оборону."

    NNC_controlled_advancement:0 "Контрольований прогрес"
    NNC_controlled_advancement_desc:0 "Наш спосіб життя, очевидно, найкращий у пустці, але технологіям важко протистояти з мечами та щитами. Поки ми не заходимо надто далеко, ми можемо залишатися вірними нашим ідеалам."

    NNC_learn_to_fly:0 "Навчитися літати"
    NNC_learn_to_fly_desc:0 "Якщо ми обираємо прогрес, це має бути прогрес у польотах. Здійнятися в небо, як дракони минулого, і нести смерть ворогам згори. Що може бути більш славетним?"

    NNC_what_a_time_to_find_out:0 "Який час для відкриття"
    NNC_what_a_time_to_find_out_desc:0 "На жаль, плавати в обладунках досить важко. Найпростіше рішення — не знімати обладунки, а ніколи не плавати."

    NNC_remember_the_lights_of_cars_in_the_streets:0 "Згадайте вогні автомобілів на вулицях"
    NNC_remember_the_lights_of_cars_in_the_streets_desc:0 "Довоєнний автомобіль був схожий на коня, хоча набагато примітивніший і повільніший. Ну, мабуть. Ніхто з нас ніколи не водив машину й не їздив верхи. Але це може змінитися!"

    NNC_call_up_the_jet_fighters:0 "Призвати реактивні винищувачі"
    NNC_call_up_the_jet_fighters_desc:0 "Ми абсолютно не готові до обслуговування та використання реактивних винищувачів — у нас немає жодної належної інфраструктури. Нам потрібно це змінити."

    NNC_i_will_not_let_you_drown_again:0 "Я не дам тобі потонути знову"
    NNC_i_will_not_let_you_drown_again_desc:0 "Будувати кораблі не так легко, як ми думали... але якщо ми можемо зробити обладунки, ми зможемо зробити й човен."

    NNC_a_town_of_perfect_isolation:0 "Містечко ідеальної ізоляції"
    NNC_a_town_of_perfect_isolation_desc:0 "Наші міста розкидані й не пов'язані між собою, основні дороги з'єднують лише найважливіші з них. Більш розвинені дороги дозволять нашим автомобілям з'єднати наші міста."

    NNC_ease_research_restrictions:0 "Послабити дослідницькі обмеження"
    NNC_ease_research_restrictions_desc:0 "Ми не можемо розвивати технології до рівня тих, хто нас оточує, не ризикуючи всім, що ми побудували, але ми, безумовно, можемо бути менш обережними."

    NNC_being_constructive:0 "Бути конструктивними"
    NNC_being_constructive_desc:0 "Ми можемо з обережністю ставитися до нових технологій, але навіть ми мусимо визнати, що теплі будинки звучать добре."

    NNC_catching_up:0 "Наздоганяючи"
    NNC_catching_up_desc:0 "Хоча це може бути дуже непопулярно, факт залишається фактом: ми ніколи не зрівняємося з сусідами, якщо не зможемо прийняти прогрес хоча б в обмеженому обсязі."

    NNC_king_in_the_castle:0 "Король у замку"
    NNC_king_in_the_castle_desc:0 "Не дивно, що ми зосереджені на обороні, будуючи складні форти й замки вздовж кордонів. Ще менш дивно, що ми стали в цьому дуже вправні."

    NNC_walls_and_watchtowers:0 "Стіни та сторожові вежі"
    NNC_walls_and_watchtowers_desc:0 "Будівництво укріплень захистить наші землі від вторгнення та дасть нашим людям відчуття безпеки."
    nnc_build_outposts_tt:0 "Це збудує один рівень §YФорпосту§! на кожному нашому прикордонному регіоні."

    NNC_siege_warfare:0 "Облогова війна"
    NNC_siege_warfare_desc:0 "Напад на укріплені позиції вимагає особливих навичок і підготовки. Ми повинні навчити наших лицарів мистецтву облоги."

    NNC_military_path_unique_two:0 "Могутні шпилі"
    NNC_military_path_unique_two_desc:0 "Наші замки є символами нашої могутності. Їхнє зміцнення посилить нашу оборону."

    NNC_i_am_a_rock:0 "Я — скеля"
    NNC_i_am_a_rock_desc:0 "Наша оборона непорушна, як скеля. Ворог розіб'ється об нас."

    NNC_a_realm_in_chaos:0 "Королівство в Хаосі"
    NNC_a_realm_in_chaos_desc:0 "Це катастрофа..."

    NNC_spilling_across_borders:0 "Розповзаючись за кордони"
    NNC_spilling_across_borders_desc:0 "Ми ніколи не повернемося назад після цього..."

    NNC_unending_crusade:0 "Нескінченний Похід"
    NNC_unending_crusade_desc:0 "Це вийшло з-під нашого контролю..."

    NNC_kingdom_of_anarchy_focus:0 "Королівство Анархії"
    NNC_kingdom_of_anarchy_focus_desc:0 "І все ж ми вистояли."