l_english:

  NNC_lord_lancaster_name:0 "Lord Lancaster"
  NNC_lord_lancaster_desc:0 "Lord Lancaster becamse the ruler of New New Castle after leading a contingent of knights to slay the mighty trog incursion of 2253. Since then he has kept steady watch over the countryside, keeping hostile neighbors at bay, beginning the tradition of the round tables, and ushering in decades of peace. He is respected and admired by many, but his mind continues to wander more and more and his health is progressively declining. A bunch of knights with old-fashioned armour were always going to struggle in the Wasteland, but the lack of a strong leader will only make things worse."
  
  NNC_cuthbert_name:0 "Sir Cuthbert"
  NNC_cuthbert_desc:0 "Cuthbert sits in despair on his meaningless throne, watching the kingdom of New New Castle in its death throes. Blackguards, Chivalrics, Crusaders, all are complicit in the slaughter of an eternal civil war.\n\nCuthbert wonders how everything came to this - how the flower of American chivalry collapsed and turned in on itself. The Blackguards, the Chivalrics, the Crusaders, one of them should've taken power and prevented this, stopped Cuthbert sitting feebly on the throne and watching as it all falls apart. Lancaster would be disappointed, but, at the very least, Cuthbert knows that it wasn't his fault."

  NNC_harld_of_white_castle_name:0 "Sir Harald"

  NNC_constance_name:0 "Sir Constance"

  NNC_reed_name:0 "Sir Reed"

  NNC_commune_name:0 "Peasant Commune"
  NNC_commune_desc:0 "§C"We're an anarcho-syndicalist commune. We take it in turns to act as a sort of executive officer for the week, but all the decisions of that officer have to be ratified at a special biweekly meeting by a simple majority in the case of purely internal affairs but by a two-thirds majority in the case of more..."§!"

  NNC_horn_name:0 "Sir Horn"

  NNC_fingers_name:0 "Fingers the Outlaw"
  NNC_fingers_desc:0 "§g"How do you shake this feeling?"§!\n\nFingers never called himself a raider, he was far more sophisticated than that. He was a highwayman, staging robberies not just in New New Castle but as far away as Ronto. He was mighty good at it too, making a small fortune. Until he got caught.\n\nFortunately for Fingers, his captor was a Blackguard knight who saw his skill at banditry as potentially useful. While the Chivalrics have never been happy with his presence, Fingers has been despatched on all sorts of missions to rob, waylay, and raid neighbours that the Blackguards aren't too fond of. Fingers isn't sure whether this life is for him, but he can make a bit of money while figuring out something better."
  nnc_so_it_goes_trait:0 "So it goes..."

  NNC_lazarus_lafargue_name:0 "Harry Lafargue"
  NNC_lafargue_desc:0 "§C"Bring me the diagram, and I'll forge a sword fit for killing gods!"§!\n\nLafargue has been renowned throughout New New Castle for years for being the finest armoursmith in the land. His suits of armour are unparalleled in skill and craft, and his skills are second to none. Unfortunately, he's not particularly innovative, merely using existing patterns and refining them to the highest degree. Still, he is invaluable to the knights of New New Castle."
  nnc_grandmaster_armourer:0 "Grandmaster Armourer"

  NNC_woody_name:0 "Woody the Wood-Smith"
  NNC_woody_desc:0 "§O"I'm a woodsmith. Which gives one of us an excuse for dressing funny."§!\n\nWoody is a carpenter who insists on being called a "wood-smith". No one's quite sure why, but his skill means that he can be called whatever he wants, really. Practically all the furniture in the castle of New New Castle was designed by him and built out of his workshops, if not by himself personally.\n\nRecently, he has found himself aligning more with the political views of the Chivalrics. Woody was born a commoner, and despite his skill could never reach beyond that. With the help of the Chivalrics, maybe he could someday."
  nnc_woodsmith:0 "Wood-Smith"

  NNC_arhil_name:0 "Arhil, Prince of Swans"
  NNC_arhil_desc:0 "§C"I will not leave the fate of New New Castle to chance.§!"\n\nArhil is renowned as one of the noblest knights of New New Castle, so noble that he in fact changed his previous name (Arnold) to something that sounded more noble and fantastical. Arhil is a devoted Chivalric and follower of Sir Reed, and shows great compassion and virtue in all his dealings. This might make him a bit predictable, but he can inspire such devotion and camaraderie that it doesn't matter too much anyway."
  nnc_prince_of_swans:0 "The Prince of Swans"

  NNC_umfred_name:0 "Umfred"
  NNC_umfred_desc:0 "§g"I have served New New Castle for an age, and it serves me just fine"§!\n\nUmfred is a ghoul from before the war, a former civil servant in Pittsburgh before fleeing to his family in New Castle after he survived the falling of the nukes. His family had survived, but he had ghoulified and they had not. Outliving not only his family but also many of their descendants took its toll on Umfred, but he's too proud to allow himself to die. He now watches over his only living descendants, Sir Constance and her family.\n\nEven without being related to Sir Constance, Umfred would still believe in the cause of the Crusaders. While the perpetuation of violence isn't ideal, order must be restored to the wasteland and the Crusaders are determined to do just that."
  nnc_ancient_steward:0 "Ancient Steward"

  NNC_kalkstein_name:0 "Albert Kalkstein"
  NNC_kalkstein_desc:0 "§G"Alchemy is the mother of all sciences, and do you know why? For it allows us to understand the world!"§!\n\nKalkstein was born the son of a knight, but found his true passion in distillation and (attempts at) transmutation. He used his noble wealth to fund his endeavours and explorations, and makes tinctures and "potions" for the knights of New New Castle. He especially admires the fervour of the Crusaders, and aspires to bring his potions and experiments across the wasteland.\n\nSome knights, however, just call him an uppity drug dealer."
  nnc_alchemist:0 "Masterful Alchemist"

  NNC_rodziner_name:0 "Rodziner"
  NNC_rodziner_desc:0 "§R"It's a treacherous life and you're always standing in someone's way."§!\n\nRodziner was born the tenth son to an important noble and, thus, almost entirely out of the line of succession. That did not, however, stop his brothers from getting him involved in their schemes and plots to ensure power came to the right one. Rodziner left to go adventuring, and crossed the wasteland fighting monsters and saving innocents.\n\nRodziner enjoyed it for a while, but realised that the wealth that he'd earned adventuring meant far more to him than the deeds he'd accomplished. He came home, renounced his position in the succession, and established his own small fief. Now he has joined the court, and has proven a relatively impartial if self-interested advisor to the Crown."
  nnc_swashbuckling_noble:0 "Swashbuckling Noble"

  NNC_florent_name:0 "Sir Florent the Deadly"
  NNC_florent_desc:0 "§O"Strike back harder"§!\n\nSir Florent was, along with Sir Fabien, one of the knights that went with Sir Rodrik on an ill-fated expedition far to the southwest. Florent and Fabien were the only ones to return, and spoke of horrors stalking the jungles and the slaughter of their retinue at the hands of crocodile mutants. Sir Rodrik was among the casualties.\n\nSince his return, Florent has become bitter and angry, well earning his moniker. His way of releasing his anger has been to go on violent hunts for bandits, mutants, and other monstrosities, often being the only survivor of the hunts. Since his return, he has aligned mostly with the crusaders, seeking unending warfare against those who have wronged him."
  nnc_deadly_adventurer:0 "Deadly Adventurer"

  NNC_fabien_name:0 "Sir Fabien the Sophist"
  NNC_fabien_desc:0 "§C"There's nothing left. Florent and I are all that remain."§!\n\nSir Fabien was, along with Sir Florent, one of the knights that went with Sir Rodrik on an ill-fated expedition far to the southwest. Florent and Fabien were the only ones to return, and spoke of horrors stalking the jungles and the slaughter of their retinue at the hands of crocodile mutants. Sir Rodrik was among the casualties.\n\nAfter surviving the expedition, Fabien, already known for being more thoughtful than most other knights, turned almost entirely inwards. He spends his days among philosophers and thinkers, trying to make sense of the violence he saw. Fabien feels a deep kinship with Sir Florent, and hopes against hope that he can find a way to bring Florent back from the brink."
  nnc_sorrowful_philosopher:0 "Sorrowful Philosopher"

  NNC_wally_name:0 "Wally B. Feed"
  NNC_wally_desc:0 "§O"Blow the man down! Shiver me timbers! Who's a pretty bird!"§!\n\nWally is a humble cartographer who aspires to something... more exciting. Wally has read and heard stories about pirates sailing the seas for all his life, and as a child wanted to become a pirate. Unfortunately, he's clumsy and doesn't exactly inspire dread.\n\nDespite that, he's still learned more about sailing the seas than anyone else in New New Castle and can advise them on how to sail a boat. Despite wanting to be a murderer and a bandit, Wally is a good man at heart and finds the goals of the Chivalrics to be inspiring."
  nnc_clumsy_cartographer:0 "Clumsy Cartographer"

  NNC_lydia_name:0 "Lydia"
  NNC_lydia_desc:0 "§C"I always loved to spend hours staring at the stars on summer nights."§!\n\nLydia travelled a long way to New New Castle to live with her friend, only to find her friend had disappeared when she arrived. She spent years searching for her friend but never managed to figure out where she disappeared, but along the way had made other friends and contacts in New New Castle. Using these connections she's joined the court and earned a reputation for figuring out exactly how to solve thorny problems, making her a valuable asset for tactics and strategy."
  nnc_inquisitive_puzzler:0 "Inquisitive Puzzler"

  NNC_verse_name:0 "Verse"
  NNC_verse_desc:0 "§R*Glares silently*§!\n\nVerse was born a peasant farmgirl on a small farm, but joined a levy when she was young and found her calling. She relished the opportunity to maim and kill her foes, and became respected at the same level as a famed knight. She was given an impromptu knighthood and rose in favour of the Blackguards and Crusaders, although the Chivalrics hated her cruelty and savagery. Now, she sits on the council as one of the most important soldiers of New New Castle, despite the attempts of the Chivalrics to boot her out."
  nnc_violence_and_slaughter:0 "Violence and Slaughter"

  NNC_tyson_name:0 "Esterad Tyson"
  NNC_tyson_desc:0 "§Y"War is fueled by money"§!\n\nEsterad was born to a noble in the northern parts of our territory who was expelled from his lands and died shortly after Esterad's birth. By the time he'd reached 21, Esterad had reclaimed his lands and turned them into one of the most prosperous parts of New New Castle.\n\nSince then, he has carefully claimed neutrality in the matters of court and has instead made loans available to anyone needing them and profited greatly off the disputes between the Chivalrics, Crusaders, and Blackguards. Even if he does favour a particular side, any support they receive will be funneled through so many hands that it's impossible to know that it was him."
  nnc_economic_manipulator:0 "Economic Manipulator"

  NNC_cerys_name:0 "Cerys Craig"
  NNC_cerys_desc:0 "§O"Come, I'll show you Quail..."§!\n\nCerys is the daughter of a ship's captain, and has spent her life on sea and land fighting all sorts of brigands, ne'er do wells, and raiders. She was once compared to a quail by a raider leader to belittle her, but she took the nickname and made it her own over his corpse.\n\nCerys came to New New Castle hearing stories of knights in shining armour fighting monsters, and quickly earned the respect of the court through her valiant deeds. Now she lives at the court as an advisor, giving her knowledge to the crown."
  nnc_quail:0 "The Quail"

  NNC_brego_name:0 "Brego"
  NNC_brego_desc:0 "§C"Even should we perish, hope and memory shall live still in some hidden valley where the grass is green."§!\n\nBrego was a simple soldier of New New Castle of little distinction until the Siege of Iron Town by trogs only two years ago. In that battle he fought and carried himself with such distinction, and saved so many lives, that he was quickly knighted despite being of common birth. \n\nSince then he has earned the title of "Guardian of the Dead", a somewhat grim but honourable duty. It is the role of Brego to watch over the most honoured dead of New New Castle, and he leads the guard that protects them."
  nnc_guardian_of_the_dead:0 "Guardian of the Dead"

  NNC_grund_name:0 "Grund"
  NNC_grund_desc:0 "§Y"Huh?"§!\n\nIt's a wonder that Grund has risen to a rank of any prominence at all. Having lived as something of a village idiot near New New Castle, Grund became manipulated by a local cult into becoming their prime enforcer. When knights slaughtered the cult, a Blackguard ensured that Grund remained unharmed, seeing a potentially useful tool for the faction.\n\nSince then, Grund has become an important part of the Blackguard's presence. He's not the sharpest tool in the shed, but he's strong and one of the luckiest motherfuckers on the planet."
  nnc_idiot_enforcer:0 "Idiot Enforcer"

  NNC_hurin_name:0 "Hurin Thief-Finder"
  NNC_hurin_desc:0 "§C"It's like I can sniff them out..."§!\n\nWhen people think of a bounty hunter, they don't usually think of a quiet but friendly man more given to obeisance than independence. Hurin has a unique talent for finding criminals, but is content to serve and scarcely raises his voice. He has proven useful to New New Castle, and no doubt will do his best for years to come."
  nnc_friendly_bountyhunter:0 "Friendly Bounty Hunter"

  NNC_intar_name:0 "Lord Intar"
  NNC_intar_desc:0 "§O"It is every man's right to choose when to Sheathe the Sword."§!\n\nIntar was raised a marcher lord, with a small tract of land bordering the lands of the Trogs. He has lived a life of constant battle, with small skirmishes constantly breaking out.\n\nA life of constant readiness and warfare can take a toll on a man, and while Intar has become a terrific soldier, he is also a grim and sad lord."
  nnc_brooding_lord:0 "Brooding Lord"