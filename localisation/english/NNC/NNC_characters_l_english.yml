l_english:

  NNC_lord_lancaster_name:0 "Лорд Ланкастер"
  NNC_lord_lancaster_desc:0 "Лорд Ланкастер став правителем Нового Нью-Касла після того, як очолив загін лицарів і відбив могутнє вторгнення трогів у 2253 році. Відтоді він невтомно охороняє околиці, стримуючи ворожих сусідів, започаткувавши традицію круглих столів і забезпечивши десятиліття миру. Його поважають і шанують багато хто, але його думки дедалі частіше блукають, а здоров'я невпинно погіршується. Лицарям у старомодних обладунках завжди було нелегко в Пустці, але відсутність сильного лідера лише погіршить ситуацію."

  NNC_cuthbert_name:0 "Сер Катберт"
  NNC_cuthbert_desc:0 "Катберт сидить у розпачі на своєму безглуздому троні, спостерігаючи, як королівство Нью-Нью-Касл конає в агонії. Чорні Гвардійці, Лицарі, Хрестоносці — всі вони співучасники різанини вічної громадянської війни.\n\nКатберт запитує себе, як усе дійшло до цього — як цвіт американського лицарства зруйнувався й звернувся проти самого себе. Чорні Гвардійці, Лицарі, Хрестоносці — хтось із них мав узяти владу й запобігти цьому, зупинити Катберта, який безсило сидить на троні й дивиться, як усе розвалюється. Ланкастер був би розчарований, але, принаймні, Катберт знає, що це не його провина."

  NNC_harld_of_white_castle_name:0 "Сер Гаральд"

  NNC_constance_name:0 "Сер Констанс"

  NNC_reed_name:0 "Сер Рід"

  NNC_commune_name:0 "Селянська комуна"
  NNC_commune_desc:0 "§C«Ми — анархо-синдикалістська комуна. Ми по черзі виконуємо роль свого роду виконавчого офіцера на тиждень, але всі рішення цього офіцера мають бути затверджені на спеціальних двотижневих зборах: простою більшістю у справах суто внутрішніх, і двома третинами — у справах більш...»§!"

  NNC_horn_name:0 "Сер Горн"

  NNC_fingers_name:0 "Фінгерс Розбійник"
  NNC_fingers_desc:0 "§g«Як позбутися цього відчуття?»§!\n\nФінгерс ніколи не називав себе рейдером — він був значно витонченішим. Він був розбійником з великої дороги, влаштовуючи пограбування не лише в Новому Нью-Каслі, а й аж у Ронто. І він був у цьому дуже вправний, зібравши невеликий статок. Доки його не спіймали.\n\nНа щастя для Фінгерса, його захопив у полон лицар із Чорних Гвардійців, який побачив у його навичках розбійника потенційну цінність. Хоча Лицарі ніколи не були задоволені його присутністю, Фінгерса відправляли на різноманітні завдання — грабувати, влаштовувати засідки та нападати на сусідів, які не подобалися Чорним Гвардійцям. Фінгерс не певен, чи підходить йому таке життя, але поки він шукає щось краще, може трохи заробити."
  nnc_so_it_goes_trait:0 "Отак воно..."

  NNC_lazarus_lafargue_name:0 "Гаррі Лафарг"
  NNC_lafargue_desc:0 "§C«Принеси мені креслення, і я викую меч, здатний убивати богів!»§!\n\nЛафарг уже багато років знаний у всьому Новому Нью-Каслі як найкращий зброяр у цих землях. Його обладунки не мають рівних у майстерності, а його вміння неперевершені. На жаль, він не надто схильний до новаторства, використовуючи наявні зразки й доводячи їх до досконалості. Тим не менш, він безцінний для лицарів Нового Нью-Касла."
  nnc_grandmaster_armourer:0 "Гросмейстер-зброяр"

  NNC_woody_name:0 "Вуді Тесля"
  NNC_woody_desc:0 "§O«Я тесля по дереву. Що дає одному з нас виправдання дивно вдягатися.»§!\n\nВуді — тесля, який наполягає, щоб його називали «ковалем дерева». Ніхто достеменно не знає, чому, але його майстерність дозволяє йому називати себе як завгодно. Практично всі меблі в замку Нового Нью-Касла були спроєктовані ним і виготовлені в його майстернях, якщо не особисто ним.\n\nОстаннім часом він дедалі більше схиляється до політичних поглядів Лицарів. Вуді народився простолюдином, і, незважаючи на свою майстерність, ніколи не міг піднятися вище. За допомогою Лицарів, можливо, колись йому це вдасться."
  nnc_woodsmith:0 "Коваль дерева"

  NNC_arhil_name:0 "Архіл, Лебединий Принц"
  NNC_arhil_desc:0 "§C«Я не залишу долю Нового Нью-Касла на волю випадку.§!\n\nАрхіл знаний як один із найшляхетніших лицарів Нового Нью-Касла — настільки шляхетний, що змінив своє колишнє ім'я (Арнольд) на те, що звучало шляхетніше та фантастичніше. Архіл — відданий Лицар і послідовник сера Ріда, який виявляє велике співчуття й доброчесність у всіх своїх вчинках. Це може робити його трохи передбачуваним, але він здатен надихати на таку відданість і товариськість, що це не має великого значення."
  nnc_prince_of_swans:0 "Лебединий Принц"

  NNC_umfred_name:0 "Умфред"
  NNC_umfred_desc:0 "§g«Я служу Нью-Нью-Каслу цілу вічність, і він мене цілком влаштовує»§!\n\nУмфред — гуль іще з довоєнних часів, колишній державний службовець у Піттсбурзі, який після падіння бомб утік до своєї родини в Нью-Касл. Його родина вижила, але він перетворився на гуля, а вони — ні. Пережити не лише свою родину, а й багатьох їхніх нащадків далося взнаки Умфреду, але він надто гордий, щоб дозволити собі померти. Тепер він доглядає за своїми єдиними живими нащадками — сером Констанс та її родиною.\n\nНавіть не будучи родичем сера Констанс, Умфред усе одно вірив би в справу Хрестоносців. Хоча продовження насильства не є ідеальним, порядок має бути відновлений у пустках, і Хрестоносці сповнені рішучості зробити саме це."
  nnc_ancient_steward:0 "Давній розпорядник"

  NNC_kalkstein_name:0 "Альберт Калькштайн"
  NNC_kalkstein_desc:0 "§G«Алхімія — мати всіх наук, і знаєте чому? Бо вона дозволяє нам зрозуміти світ!»§!\n\nКалькштайн народився сином лицаря, але справжню пристрасть знайшов у дистиляції та (спробах) трансмутації. Він використовував своє дворянське багатство для фінансування своїх експериментів і досліджень, створюючи настоянки та «зелля» для лицарів Нового Нью-Касла. Він особливо захоплюється завзяттям Хрестоносців і прагне поширити свої зілля та досліди по всьому пустищу.\n\nВтім, деякі лицарі просто називають його зарозумілим наркоторговцем."
  nnc_alchemist:0 "Майстерний алхімік"

  NNC_rodziner_name:0 "Родзінер"
  NNC_rodziner_desc:0 "§R«Це підступне життя, і ти завжди стоїш у когось на шляху.»§!\n\nРодзінер був десятим сином впливового дворянина і, таким чином, майже повністю поза лінією спадкування. Це, однак, не завадило його братам втягнути його в свої інтриги та змови, щоб забезпечити владу потрібному. Родзінер пішов мандрувати, перетнув пустку, борючись із монстрами та рятуючи невинних.\n\nДеякий час йому це подобалося, але він зрозумів, що багатство, зароблене в пригодах, важить для нього набагато більше, ніж здійснені подвиги. Він повернувся додому, зрікся свого місця в спадкуванні й заснував власний невеликий маєток. Тепер він при дворі й зарекомендував себе як відносно неупереджений, хоч і корисливий, радник Корони."
  nnc_swashbuckling_noble:0 "Шляхетний авантюрист"

  NNC_florent_name:0 "Сер Флоран Смертоносний"
  NNC_florent_desc:0 "§O«Відповідай ударом ще сильніше.»§!\n\nСер Флоран, разом із сером Фаб'єном, був одним із лицарів, які вирушили з сером Родріком у злощасну експедицію далеко на південний захід. Флоран і Фаб'єн були єдиними, хто повернувся, і вони розповідали про жахи, що нишпорили в джунглях, і про різанину їхнього почту від рук мутантів-крокодилів. Сер Родрік був серед загиблих.\n\nПісля повернення Флоран став озлобленим і гнівним, цілком заслуживши своє прізвисько. Він вивільняє свою лють, вирушаючи в жорстокі полювання на бандитів, мутантів та інших монстрів, часто стаючи єдиним, хто виживає з цих походів. Відколи повернувся, він здебільшого приєднався до хрестоносців, прагнучи нескінченної війни проти тих, хто скривдив його."
  nnc_deadly_adventurer:0 "Смертоносний мандрівник"

  NNC_fabien_name:0 "Сер Фаб'єн Софіст"
  NNC_fabien_desc:0 "§C«Там нічого не залишилося. Флоран і я — єдині, хто залишився.»§!\n\nСер Фаб'єн, разом із сером Флораном, був одним із лицарів, які вирушили з сером Родріком у злощасну експедицію далеко на південний захід. Флоран і Фаб'єн були єдиними, хто повернувся, і вони розповідали про жахи, що нишпорили в джунглях, і про різанину їхнього почту від рук мутантів-крокодилів. Сер Родрік був серед загиблих.\n\nВиживши після експедиції, Фаб'єн, який і так був відомий як більш замислений, ніж інші лицарі, майже повністю замкнувся в собі. Він проводить дні серед філософів і мислителів, намагаючись осмислити побачене насильство. Фаб'єн відчуває глибоку спорідненість із сером Флораном і, всупереч усьому, сподівається знайти спосіб повернути Флорана з прірви."
  nnc_sorrowful_philosopher:0 "Сумний філософ"

  NNC_wally_name:0 "Воллі Б. Фід"
  NNC_wally_desc:0 "§O«Збий чоловіка з ніг! Хай йому чорт! Хто гарна пташка?»§!\n\nВоллі — скромний картограф, який прагне чогось... більш захопливого. Воллі все життя читав і чув історії про піратів, які борознять моря, і в дитинстві хотів стати піратом. На жаль, він незграбний і не надто вселяє страх.\n\nНезважаючи на це, він знає про мореплавство більше, ніж будь-хто в Новому Нью-Каслі, і може дати поради, як керувати човном. Незважаючи на бажання бути вбивцею та бандитом, Воллі в душі хороша людина і вважає цілі Лицарів надихаючими."
  nnc_clumsy_cartographer:0 "Незграбний картограф"

  NNC_lydia_name:0 "Лідія"
  NNC_lydia_desc:0 "§C«Я завжди любила годинами вдивлятися в зірки літніми ночами.»§!\n\nЛідія прибула здалеку до Нового Нью-Касла, щоб жити зі своєю подругою, але виявила, що та зникла, коли вона приїхала. Вона роками шукала подругу, але так і не змогла з'ясувати, куди вона зникла, проте за цей час знайшла інших друзів і знайомств у Новому Нью-Каслі. Використовуючи ці зв'язки, вона приєдналася до двору й заробила репутацію людини, яка вміє знаходити рішення складних проблем, що зробило її цінним радником із тактики та стратегії."
  nnc_inquisitive_puzzler:0 "Допитливий розгадувач"

  NNC_verse_name:0 "Верс"
  NNC_verse_desc:0 "§R*Мовчки палає поглядом*§!\n\nВерс народилася простою селянкою на невеликій фермі, але в юності приєдналася до ополчення й знайшла своє покликання. Вона з насолодою користувалася нагодою калічити й убивати своїх ворогів і досягла поваги нарівні з уславленими лицарями. Їй надали лицарське звання, і вона піднялася в прихильності Чорних Гвардійців і Хрестоносців, хоча Лицарі ненавиділи її за жорстокість і дикунство. Тепер вона засідає в раді як одна з найважливіших воїнів Нового Нью-Касла, незважаючи на спроби Лицарів вигнати її."
  nnc_violence_and_slaughter:0 "Насильство та різанина"

  NNC_tyson_name:0 "Естерад Тайсон"
  NNC_tyson_desc:0 "§Y«Війна живиться грошима.»§!\n\nЕстерад народився в родині дворянина в північній частині наших земель, якого вигнали з його володінь, і він помер невдовзі після народження Естерада. До 21 року Естерад повернув свої землі й перетворив їх на одну з найбільш процвітаючих частин Нового Нью-Касла.\n\nВідтоді він ретельно дотримується нейтралітету в придворних справах, надаючи позики всім, хто їх потребує, і отримуючи величезний прибуток із суперечок між Лицарями, Хрестоносцями та Чорними Гвардійцями. Навіть якщо він і підтримує якусь сторону, будь-яка допомога проходить через стільки рук, що неможливо дізнатися, що вона походить від нього."
  nnc_economic_manipulator:0 "Економічний маніпулятор"

  NNC_cerys_name:0 "Серіс Крейґ"
  NNC_cerys_desc:0 "§O«Ходімо, я покажу тобі Перепілку...»§!\n\nСеріс — дочка капітана корабля, яка провела своє життя на морі та суші, борючись із різними бандитами, негідниками та рейдерами. Одного разу ватажок рейдерів порівняв її з перепілкою, щоб принизити, але вона прийняла це прізвисько й зробила його своїм над його трупом.\n\nСеріс прибула до Нового Нью-Касла, почувши історії про лицарів у сяючих обладунках, які б'ються з монстрами, і швидко завоювала повагу двору своїми доблесними вчинками. Тепер вона живе при дворі як радниця, передаючи свої знання короні."
  nnc_quail:0 "Перепілка"

  NNC_brego_name:0 "Бреґо"
  NNC_brego_desc:0 "§C«Навіть якщо ми загинемо, надія та пам'ять усе одно житимуть у якійсь схованій долині, де трава зелена.»§!\n\nБреґо був простим солдатом Нового Нью-Касла без особливих відзнак, доки лише два роки тому під час облоги Залізного Міста трогами він не бився з такою доблестю й не врятував стільки життів, що його швидко посвятили в лицарі, незважаючи на просте походження. \n\nВідтоді він отримав титул «Хранитель Мертвих» — дещо похмурий, але почесний обов'язок. Бреґо опікується найбільш шанованими покійними Нью-Нью-Касла й очолює варту, яка охороняє їх."
  nnc_guardian_of_the_dead:0 "Хранитель Мертвих"

  NNC_grund_name:0 "Ґрунд"
  NNC_grund_desc:0 "§Y«А?»§!\n\nДивно, що Ґрунд взагалі піднявся до якогось помітного рангу. Проживаючи як сільський дурник біля Нового Нью-Касла, Ґрунд став жертвою маніпуляцій місцевого культу, який зробив його своїм головним виконавцем. Коли лицарі вирізали культ, один із Чорних Гвардійців подбав про те, щоб Ґрунд залишився неушкодженим, побачивши в ньому потенційно корисний інструмент для фракції.\n\nВідтоді Ґрунд став важливою частиною присутності Чорних Гвардійців. Він далеко не найрозумніший, але він сильний і, мабуть, один із найщасливіших виродків на планеті."
  nnc_idiot_enforcer:0 "Виконавець-бовдур"

  NNC_hurin_name:0 "Гурін, Шукач Злодіїв"
  NNC_hurin_desc:0 "§C«Я наче чую їх...»§!\n\nКоли люди думають про мисливця за головами, вони зазвичай не уявляють собі тихого, але дружнього чоловіка, більш схильного до послуху, ніж до незалежності. Гурін має унікальний хист знаходити злочинців, але задоволений службою й майже ніколи не підвищує голосу. Він виявився корисним для Нового Нью-Касла, і, безсумнівно, робитиме все можливе ще довгі роки."
  nnc_friendly_bountyhunter:0 "Дружній мисливець за головами"

  NNC_intar_name:0 "Лорд Інтар"
  NNC_intar_desc:0 "§O«Кожна людина має право вибрати, коли вкласти меча в піхви.»§!\n\nІнтар виріс як прикордонний лорд із невеликим клаптем землі на кордоні з землями трогів. Він прожив життя в постійних боях, де постійно спалахували дрібні сутички.\n\nЖиття в постійній готовності та війні може датися взнаки, і хоча Інтар став чудовим воїном, він також є похмурим і сумним лордом."
  nnc_brooding_lord:0 "Похмурий лорд"