l_english: 
EEN_rescue_events.1.title: "Science Team Secure"
EEN_rescue_events.1.desc: "The science team and their security at The Deathclaw Sanctuary were able to be safely rescued without any bumps in the road. Thankfully wastelanders and The Brotherhood avoid the area due to its deathclaw population, so our vertibirds were able to safely land and take off again without coming under fire."
EEN_rescue_events.1.a: "Job well done"
EEN_rescue_events.2.title: "Rescue Team Goes Dark"
EEN_rescue_events.2.desc: "Unfortunately our rescue team pilot misread the landing grid for our rescue operation and crashed just outside The Deathclaw Sanctuary. The last radio transmission we received from the trapped science team was them informing us of the situation and their plans to go down from their elevated position to rescue the vertibird team. We have received no communication since then and have to assume they died."
EEN_rescue_events.2.a: "Nothing we can do for them now"
EEN_rescue_events.3.title: "Successful Rescue"
EEN_rescue_events.3.desc: "The soldiers needing rescue in DC did a good job holding off their Brotherhood attackers. The extraction team was able to get in quickly and load the survivors before taking off, taking only a few laser shots that did nothing but scuff the vertibird paint."
EEN_rescue_events.3.a: "Job well done"
EEN_rescue_events.4.title: "Difficult Rescue"
EEN_rescue_events.4.desc: "As we should have expected, the rescue of the soldiers trapped in Downtown DC resulted in some casualties. While most of the vertibirds were able to make it back without problem, the last bird out was hit with a Brotherhood missle and went down in a massive explosion. There were no survivors."
EEN_rescue_events.4.a: "About as expected"
EEN_rescue_events.5.title: "Complete Disaster"
EEN_rescue_events.5.desc: "We waited too long to rescue these soldiers. By the time our birds touched down at the LZ, their lines were being overrun and Brotherhood Knights swarmed the landing zone. The last transmission we received was from a panicked pilot attempting to take off but he has not returned to base."
EEN_rescue_events.5.a: "What a mess"
EEN_rescue_events.6.title: "Successful Rescue"
EEN_rescue_events.6.desc: "Our rescue team was easily able to bypass Fort Constantine's defenses and recover the trapped patrol before any Outcasts patrolling the area were any the wiser. Though the survivors are being treated for malnutrition, they should be ready to return to the front in a few days."
EEN_rescue_events.6.a: "Job well done"
EEN_rescue_events.7.title: "Rescue Team Lost"
EEN_rescue_events.7.desc: "We have not heard back from the rescue team or the trapped soldiers in a few days. We can only assume they encountered something in the bowls of Fort Constantine that they could not overcome."
EEN_rescue_events.7.a: "Mourn the dead"
EEN_rescue_events.8.title: "Failed Enclave Evac"
EEN_rescue_events.8.desc: "Some remnants of the scattered Enclave forces in DC were overrun when they attempted to evacuate via vertibird. Our Knights were able to kill the remaining soldiers and their rescuers, capturing a few vertibirds in the process."
EEN_rescue_events.8.a: "Well done Brothers"


