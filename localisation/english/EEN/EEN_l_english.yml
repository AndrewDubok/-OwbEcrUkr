    EEN_wokeclave_tag_ADJ:0 "Розбуджений Анклав"
    EEN_wokeclave_tag_DEF:0 "Розбуджений Анклав"
    
    ###Balance of Power###
    EEN_public_support:0 "Підтримка мешканців пустки"
    EEN_dangerously_low_public_support:0 "Небезпечно низька підтримка мешканців пустки"
    EEN_firm_public_support:0 "Міцна підтримка мешканців пустки"
    EEN_public_support_category:0 "Підтримка мешканців пустки"
    EEN_crumbling_public_support:0 "Підтримка мешканців пустки руйнується"
    EEN_crumbling_public_support_desc:0 "Хоча наш персонал щасливіший, ніж будь-коли, за лідерства Отема, віра мешканців пустки в Анклав руйнується. Лише кілька істинних віруючих в Американську Мрію залишаються з нами. Патрулі потрапляють у засідки в районах, які колись були безпечними, а робочі звільняються зі збройових заводів. З іншого боку, цей мешканець пустки "
    EEN_precarious_public_support:0 "Хитка підтримка мешканців пустки"
    EEN_precarious_public_support_desc:0 "Незважаючи на те, що персонал Анклаву задоволений поточним станом речей, наші солдати повідомляють про зростаючу ворожість у поселеннях, через які вони проходять. Поки що це лише випадкові прокльони або гнилий плід, але незабаром це можуть бути кулі та гранати."
    EEN_low_public_support:0 "Низька підтримка мешканців пустки"
    EEN_low_public_support_desc:0 "Наш політичний вибір та нещодавні дії явно на користь персоналу Анклаву. Хоча пересічний мешканець пустки все ще не зробить більшого, ніж поскаржиться у своїй халупі, групи опору з кожним днем приваблюють більше прихильників. Якщо ми не будемо обережні, ми можемо побачити спалахи повстань."
    EEN_strong_public_support:0 "Сильна підтримка мешканців пустки"
    EEN_strong_public_support_desc:0 "Незалежно від того, скільки літніх офіцерів скаржаться на наші рішення, пересічний мешканець пустки позитивно ставиться до Анклаву. Згідно з нещодавнім опитуванням, 7 з 10 опитаних мешканців пустки кажуть, що їхнє життя покращилося з моменту приходу Анклаву в їхнє місто, а 1 з тих 3, хто не погодився, був гулем, тож вони не рахуються."
    EEN_moderate_public_support:0 "Помірна підтримка мешканців пустки"
    EEN_moderate_public_support_desc:0 "Незважаючи на нарікання деяких наших більш жорстких співробітників, наша політика призводить до того, що мешканці пустки дедалі більше звикають до нашої влади. Поселенці терпляче чекають на свої водяні пайки, а податкові надходження зростають. Також недоброзичливців списують як маргінальних божевільних, тож ніхто не сумує за ними, коли вони зникають."
    EEN_growing_public_support:0 "Зростаюча підтримка мешканців пустки"
    EEN_growing_public_support_desc:0 "Незважаючи на те, що деякі в Анклаві не в захваті від поточної політики, загальне сприйняття Анклаву мешканцями пустки є обережним оптимізмом. Є чимало критиків, які засуджують деякі наші політики, але пересічного мешканця пустки не хвилюють такі речі, як «права гульів» або якісь ймовірні воєнні злочини. Їм просто потрібна холодна вода, теплий обід і місце, де можна сходити до туалету з дверима. Поки ми продовжуємо це забезпечувати, все має бути добре."
    EEN_midling_public_support:0 "Збалансована підтримка"
    EEN_midling_public_support_desc:0 "Ми досягли здорового компромісу між політиками та діями жорсткої лінії та про-мешканців пустки, що, хоча ніхто не в захваті, принаймні ніхто й не роздратований."
    EEN_leadership_struggle:0 "Боротьба за лідерство в Анклаві"
    EEN_autumn_loyalist_enclave:0 "Лояльний Отему Анклав"
    EEN_eden_loyalist_enclave:0 "Лояльний Едему Анклав"
    EEN_leadership_struggle_decision_category:0 "Рішення щодо боротьби за Лідерство"
    EEN_contested_leadership:0 "Оскаржуване лідерство"
    EEN_contested_leadership_desc:0 "Питання лояльності між Президентом і Командувачем Збройних Сил Анклаву розділяє Рейвен-Рок майже порівну. Переворот, швидше за все, закінчиться катастрофою."
    EEN_firm_autumn_loyalty:0 "Тверда лояльність до Отема"
    EEN_firm_autumn_loyalty_desc:0 "Навіть за межами офіцерського корпусу полковник Отем бачить захоплення та непохитну відданість, які, здається, затьмарюють відданість президенту. Така віддана послідовність може бути небезпечною."
    EEN_autumn_loyalist_cliques:0 "Кліки лоялістів Отема"
    EEN_autumn_loyalist_cliques_desc:0 "Різні прихильники Отема сформували кліки у своїх відділах. Вони виявляють прихильність до своїх і цураються тих, хто більш лояльний до нашого президента. Це може бути проблематичним."
    EEN_autumn_loyalist_talk:0 "Розмови лоялістів Отема"
    EEN_autumn_loyalist_talk_desc:0 "Ті, хто в наших лавах, часто говорять про своє захоплення та відданість полковнику Отему. Хоча це лише розмови, це, м'яко кажучи, непокоїть."
    EEN_firm_presidential_support:0 "Тверда підтримка президента"
    EEN_firm_presidential_support_desc:0 "Лояльні американці Анклаву знають, до кого їм слід звертатися за керівництвом. Президент Едем користується надзвичайним рейтингом схвалення, а також обожнюванням свого народу."
    EEN_moderate_presidential_support:0 "Помірна підтримка президента"
    EEN_moderate_presidential_support_desc:0 "Хоча деякі ставлять під сумнів рішення Президента, вони знають, що краще не скаржитися відкрито. Загальна думка Анклаву полягає в тому, що президент Едем чудово справляється зі своєю роботою."
    EEN_wavering_presidential_support:0 "Хитка підтримка президента"
    EEN_wavering_presidential_support_desc:0 "Президент Едем уже не такий шанований, як колись. Через таємне спостереження чути, як деякі члени Анклаву запитують, чи не слід скоро провести вибори нового президента."
    
    ###Occupation Laws###
    ecr_water_distribution:0 "Місії з розподілу води"
    ecr_water_distribution_desc:0 "На додаток до наших патрулів, ми відправлятимемо охоронювані каравани для розподілу води по поселеннях. З часом населення зрозуміє, що працювати з нами краще, ніж проти нас."
    ecr_cure_clinics:0 "Клініки лікування"
    ecr_cure_clinics_desc:0 "Ми продовжимо розповсюджувати нашу воду та використовувати наші клініки лікування для моніторингу поширення модифікованого вірусу ВШЕ. Зрештою ця територія стане придатною для проживання людей."
    
    ###Leader Traits###
    EEN_grant_trait:0 "Дух президента Гранта"
    EEN_richardson_trait:0 "Дух президента Річардсона"
    EEN_jackson_trait:0 "Дух президента Джексона"
    EEN_hoover_trait:0 "Дух президента Гувера"
    EEN_cringe_trait:0 "Соромно"
    EEN_autumn_loyalist_trait:0 "Лояліст Отема"
    EEN_autumn_loyalist_trait_desc:0 "Цей офіцер відданий полковнику Отему майже до фанатизму."
    EEN_merc_leader_trait:0 "Тактика найманців"
    EEN_merc_leader_trait_desc:0 "Час, проведений генералом серед Компанії Кіготь, навчив його дечому в тактиці найманців, чому Анклав міг би повчитися."
    EEN_lincoln_trait:0 "Дух Лінкольна"
    EEN_genocidal_general_trait:0 "Геноцидний генерал"
    EEN_genocidal_general_trait_desc:0 "Цей генерал досі вірить у мету Річардсона знищити населення пустки і не боїться про це заявляти."
    EEN_night_assault_officer_trait:0 "Експерт нічного бою"
    EEN_robotics_wizard_trait:0 "Чарівник робототехніки"
    EEN_demolitions_genius_trait:0 "Спеціаліст з підривних робіт"
    EEN_vertibird_assault_genius_trait:0 "Експерт по штурму з гвинтокрила"
    EEN_terror_bomber_trait:0 "Бомбардувальник терору"
    EEN_terror_bomber_trait_desc:0 "Якби цей офіцер мав свою волю, у нас майже ніколи не було б військ на землі. Замість цього ми б просто проводили бомбардувальні рейди, доки ворог не складе зброю."
    EEN_airspace_guardian_trait:0 "Спеціаліст з переваги в повітрі"
    EEN_invasion_expert_trait:0 "Експерт з морського вторгнення"
    EEN_patrol_expert_trait:0 "Експерт з Морського скринінгу"
    EEN_wastelander_scientist_trait:0 "Вчений з пустки"
    EEN_privateer_trait:0 "Експерт-Капер"
    EEN_bleeding_heart_researcher_trait:0 "Співчутливий дослідник"
    EEN_bleeding_heart_researcher_trait_desc:0 "Цей вчений набагато більше стурбований етикою, ніж пересічний вчений Анклаву."
    EEN_pragmatic_scientist_trait:0 "Холоднокровний прагматик"
    EEN_pragmatic_scientist_trait_desc:0 "Цей вчений дбає лише про результати, це може час від часу призводити до проблем, але така ціна прогресу."
    EEN_wasteland_slavemaster_trait:0 "Рабовласник пустки"
    EEN_hands_off_economist_trait:0 "Економіст невтручання"
    EEN_military_industrialist_trait:0 "Військовий промисловець"
    EEN_agriculture_expert_trait:0 "Міністерство сільського господарства"
    EEN_department_of_energy_trait:0 "Міністерство енергетики"
    EEN_purity_propaganda_trait:0 "Чемпіон старих шляхів"
    EEN_surgeon_general_trait:0 "Головний хірург"
    EEN_raider_liason_trait:0 "Зв'язковий з рейдерами"
    EEN_raider_liason_trait_desc:0 "Цей адміністратор служить посередником між нашим великим урядом і різними каперами, яким ми дозволяємо працювати на нашій території та навколо неї."
    EEN_fbi_director_trait:0 "Директор ФБР"
    EEN_fbi_director_trait_desc:0 "Не всі вороги держави такі гучні та очевидні, як рейдери. Для більш обережних ворогів нам потрібні обережні мисливці."
    EEN_tax_collector_trait:0 "Податкова служба пустки"
    EEN_tax_collector_trait_desc:0 "Колись казали, що дві речі неминучі: смерть і податки. В Анклаві це більше схоже на вибір між двома."
    EEN_wastelander_outreach_trait:0 "Голова зв'язків з мешканцями пустки"
    EEN_wastelander_outreach_trait_desc:0 "Десятиліття вивчення звітів розвідки, а також журналів допитів дали цьому адміністратору глибоке розуміння психіки мешканця пустки. З його порадами щодо політики ми зможемо досягати наших цілей, зберігаючи населення покірним."
    EEN_army_intelligence_trait:0 "Військова розвідка"
    EEN_army_intelligence_trait_desc:0 "Дехто вважає це оксюмороном, але ось ми тут."
    EEN_wasteland_survival_training_trait:0 "Експерт з навчання виживанню в Пустці"
    EEN_wasteland_survival_training_trait_desc:0 "Цей офіцер керував багатьма командами за межами Рейвен-Року за останні 30 років. За цей час він багато дізнався про те, як виживати в пустці."
    EEN_directed_assault_specialist_trait:0 "Спеціаліст з Спрямованого Штурму"
    EEN_directed_assault_specialist_trait_desc:0 "Якщо цей офіцер щось і знає, так це пробивати слабкі місця у ворожих лініях."
    EEN_improvised_fortification_specialist_trait:0 "Спеціаліст з імпровізованих укріплень"
    EEN_improvised_fortification_specialist_trait_desc:0 "Цей офіцер є експертом із землянок, траншей та всіх інших форм імпровізованої оборони. Хоча це може не знадобитися під час боротьби з рейдерами з трубчастими гвинтівками, ви будете дякувати долі, коли ми зіткнемося з кимось із підтримкою з повітря."
    EEN_brotherhood_fighting_expert:0 "Бився з Братством"
    EEN_brotherhood_fighting_expert_desc:0 "Цей офіцер був серед небагатьох, хто бився з Братством на Заході і все ще зміг втекти на Схід. Хоча він більше не б'ється, як колись, він досі пам'ятає прогалини в тактиці Братства."
    EEN_i_drive_trait:0 "Досвідчений водій"
    een_black_devil_tesla_apa_trait:0 "Виробництво силової броні Тесла"
    een_black_devil_tesla_apa_trait_desc:0 "Наше виробництво силової броні APA зосереджене на варіанті APA Mk-II Tesla. Цей костюм додатково покращує стандартний APA Mk-II, збільшуючи захист від енергетичної зброї. Це має недолік у вигляді збільшених виробничих витрат, складності конструкції та труднощів ремонту."
    een_hellfire_trait:0 "Виробництво силової броні Хеллфайр"
    een_hellfire_trait_desc:0 "Наше виробництво силової броні APA переключилося на варіант Хеллфайр. Майже нова конструкція броні сама по собі, цей костюм пропонує підвищений захист за всіма напрямками. Крім того, він розроблений, щоб витримувати екстремальне тепло."
    een_duraframe_eyebot_trait:0 "Виробництво робо-очей Duraframe"
    een_duraframe_eyebot_trait_desc:0 "Наші стандартні розвідувальні робо-ока поступово виводяться з експлуатації на користь робо-очей Duraframe. Посилена броня, модернізоване озброєння та збільшена тяга зробили крихітні машини цінним інструментом на сучасному полі бою."
    

    ###Decisions###
    EEN_support_decision_category:0 "Зв'язатися з іншими Осередками"
    EEN_support_decision_category_desc:0 "Осередки Анклаву розташовані по всій країні. Багато хто з них уже мав би проявитися, але хто знає, можливо, є й такі, де ще є живі члени."
    EEN_navarro_support:0 "Зв'язатися з Наварро"
    EEN_navarro_support_desc:0 "Ми дещо залишили позаду, коли прямували до Вашингтона. Можливо, вони все-таки перемогли неозорі орди?"
    EEN_navarro_support_ww:0 "Зв'язатися з Наварро"
    EEN_navarro_support_ww_desc:0 "Ми дещо залишили позаду, коли прямували до Вашингтона. Можливо, вони все-таки перемогли неозорі орди?"
    EEN_chicago_support:0 "Зв'язатися з Чикаго"
    EEN_chicago_support_desc:0 "Бази даних на Нафтовій Вишці містили частоти для осередку в Чикаго. Нам слід зв'язатися з ними."
    EEN_virginia_support:0 "Зв'язатися з Уайтспрінгом"
    EEN_virginia_support_desc:0 "Бункер Уайтспрінг у Західній Вірджинії мав утримувати деяких із найважливіших еліт Америки, а також найближче, що президент Едем міг би мати до брата. Нам слід дізнатися, що з ними стало."
    EEN_ontario_support:0 "Зв'язатися з Анклавом Онтаріо"
    EEN_ontario_support_desc:0 "Роки тому ми відправили кількох людей, щоб допомогти невеликому осередку Анклаву утримати контроль над регіоном у Канаді. Минуло чимало часу відколи ми чули про них; якщо вони ще існують, вони могли б віддячити нам."
    EEN_contact_vanburen_afb:0 "Зв'язатися з Космічним Центром Ван Бюрен"
    EEN_contact_vanburen_afb_desc:0 "Незабаром після того, як президент Едем віддав наказ про передислокацію, команда солдатів і дослідників була відправлена до Флориди, щоб допомогти невеликій групі Анклаву там. Їхньою метою було відновити довоєнні ракети, призначені для відправки людини в космос, на випадок, якщо мета очищення планети від мутацій виявиться неможливою. Зв'язок перервався невдовзі після їхнього прибуття до Флориди. Сподіваюся, вони не полетіли без нас."
    EEN_bomb_prime:0 "Знищити Ліберті Прайма"
    EEN_bomb_prime_desc:0 "Довоєнний робот, відомий як Ліберті Прайм, сіє хаос на наших лініях. гвинтокрили збивають, оборонні споруди розносять на шматки. Його потрібно знищити!"
    EEN_talon_co_jobs_decision_category:0 "Завдання для Компанії Кіготь"
    EEN_talon_co_jobs_decision_category_desc:0 "Компанія Кіготь із радістю погодилася виконувати для нас місії в обмін на технології, ресурси чи обладнання. Хоча вони не такі вправні або добре оснащені, як наші солдати, у них є одна важлива якість, якої немає у наших людей: їх легко замінити."
    EEN_talon_co_scout_citadel:0 "Розвідка Пентагону"
    EEN_talon_co_scout_citadel_desc:0 "Загін найманців міг би створити форпост поблизу Пентагону. Звідти вони зможуть стежити за нинішніми сквотерами та повідомляти нам про будь-які слабкі місця в їхній обороні."
    EEN_talon_scout_mount_weather:0 "Розвідка ЕКЦ Маунт-Везер"
    EEN_talon_scout_mount_weather_desc:0 "Маунт-Везер ЕКЦ (Екстрений Командний Центр) був бункером, не надто відмінним від Уайтспрінга, призначеним для розміщення членів уряду Сполучених Штатів після ядерної війни. Хоча це не контрольований Анклавом бункер, це все ж був об'єкт Сполучених Штатів певної важливості. Нам слід відправити Компанію Кіготь, щоб дізнатися, що стало з бункером, і чи можна витягти з нього щось цінне."
    EEN_talon_hold_the_capital:0 "Обшукати Будівлю Капітолію"
    EEN_talon_hold_the_capital_desc:0 "Хоча це дуже дорого, відправка найманців для зайняття Капітолію може бути виправданою. Там мають бути цінні архіви, які не були пограбовані, і столичний бункер вже деякий час не працює."
    EEN_talon_raid_caravans:0 "Атакувати Каравани пустки"
    EEN_talon_raid_caravans_desc:0 "Мутантські поселення Столичної Пустки покладаються на серію торговельних караванів, що подорожують пустками, для своєї комерції та виживання. Компанія Кіготь може відволікти кілька загонів, щоб стежити за цими маршрутами та атакувати деякі каравани, завдаючи шкоди нашим ворогам."
    EEN_talon_assault_brotherhood:0 "Атакувати форпост Братства"
    EEN_talon_assault_brotherhood_desc:0 "Компанія Кіготь готова кинути кількох новобранців та інших небажаних солдатів на форпост Братства Сталі, якщо ми заплатимо їм достатньо. Якщо нам пощастить, вони можуть навіть убити одного-двох Лицарів."
    EEN_distribute_fev_water:0 "Розповсюджувати «очищену» воду"
    EEN_distribute_fev_water_desc:0 "Відправляйте гвинтокрили над лініями наших ворогів, щоб скидати воду, заражену модифікованим вірусом ВШЕ. Природно спраглий мотлох пустки схопить вантажі й буде очищений із пустки."
    EEN_project_purity_decision_category:0 "Проєкт Чистота"
    EEN_project_purity_decision_category_desc:0 "Для нас вкрай важливо взяти під контроль Проєкт Чистота. Тепер треба з'ясувати, як це зробити."
    EEN_shock_and_awe_decision:0 "Шок і Трепет"
    EEN_shock_and_awe_decision_desc:0 "Плани складено, і солдати проводять навчальні тренування, щоб підготуватися до штурму Проєкту Чистота. День нашої атаки наближається."
    EEN_careful_infiltration_decision:0 "Обережне впровадження"
    EEN_careful_infiltration_decision_desc:0 "Наші агенти досягають успіхів у впровадженні серед персоналу Проєкту Чистота. Це займе ще трохи часу, але незабаром ми зможемо взяти проєкт під свій контроль."
    EEN_send_talon_co_decision:0 "Відправити Компанію Кіготь"
    EEN_send_talon_co_decision_desc:0 "Переговори все ще тривають, але, здається, ми зможемо відправити значні сили найманців Компанії Кіготь, щоб подолати оборону Проєкту Чистота та взяти його під наш контроль."
    EEN_rescue_ops_decision_category:0 "Рятувальні операції у Вашингтоні"
    EEN_rescue_ops_decision_category_desc:0 "По всіх пустках все ще є команди, які не зможуть повернутися на базу без допомоги. Нам доведеться піти на ризик, щоб врятувати їх."
    EEN_deathclaw_science_team_rescue_decision:0 "Врятувати Наукову Команду зі святилища кігтів смерті"
    EEN_deathclaw_science_team_rescue_decision_desc:0 "У Святилищі Кігтів Смерті на момент знищення Рейвен-Року перебувала наукова команда з чималою озброєною охороною. Розташована на високій вершині та оточена ворожою дикою природою, нашим людям знадобиться евакуація гвинтокрилом, щоб безпечно повернутися додому."
    EEN_dc_ruins_rescue_decision:0 "Рятування в руїнах Вашингтона"
    EEN_dc_ruins_rescue_decision_desc:0 "Кілька загонів, які вели бій з Братством у центрі Вашингтона, опинилися відрізаними від наших основних сил і потребують негайного порятунку. Ми повинні мати змогу врятувати їх, але якщо ми не будемо обережні, ми можемо відправити більше наших людей у м'ясорубку."
    EEN_fort_constantine_outpost_rescue_decision:0 "Рятування форпосту Форту Константин"
    EEN_fort_constantine_outpost_rescue_decision_desc:0 "Команда, відправлена стежити за Фортом Константин та активністю Вигнанців у цьому районі, повідомляє, що вони опинилися в пастці в підвальному приміщенні після випадкового спрацювання блокування безпеки. Їм просто потрібно, щоб хтось зламав безпеку ззовні, але невідомо, що ще спрацювало, коли вони підняли тривогу."
    EEN_water_decisions_category:0 "Рішення щодо Проєкту Чистота"
    EEN_water_decisions_category_desc:0 "Маючи всю цю чисту воду, тепер ми маємо зробити деякий вибір щодо того, як її використовувати."
    EEN_eden_water_decision:0 "Створити постійну клініку лікування"
    EEN_eden_water_decision_desc:0 "У регіоні буде створено постійну Клініку Лікування. Цей укріплений комплекс забезпечить розподіл води серед населення, а зусилля зі стерилізації мутантів не будуть зведені нанівець міграцією. Окрім цієї присутності, ми ігноруватимемо регіон, доки мутанти не перестануть бути проблемою через вік."
    EEN_eden_water_decision_2:0 "Звіти клінік лікування"
    EEN_eden_water_decision_2_desc:0 "Завдяки нашим зусиллям з розподілу води та нашим клінікам лікування ми неухильно просуваємося до мети покійного президента Річардсона — чистої пустки. Стерилізація цих мутантів прогресує, і протягом століття ці регіони будуть очищені від мутантського роду."
    EEN_staff_water_distribution_center:0 "Побудувати центри розподілу води"
    EEN_staff_water_distribution_center_desc:0 "Центри розподілу води слугуватимуть центром нашої влади в регіонах, які ми повертаємо з пустки. Ці укріплені комплекси будуть містити все: від адміністративних офісів до місцевих гарнізонів. Високі стіни та майорливий прапор цих форпостів закріплять нашу владу в регіоні та нагадають мешканцям пустки, у якій країні вони перебувають."
    EEN_american_cities_decision_category:0 "Проєкт американських міст"
    EEN_pittsburgh_decision:0 "Відремонтувати Пітт"
    EEN_pittsburgh_decision_desc:0 "Хоча Пітт є негостинним місцем навіть після майже повного знищення трогів, варто зазначити, що значна частина міста все ще стоїть. Маючи гору металобрухту для збору, функціонуючі довоєнні ливарні заводи та залізничну інфраструктуру для транспортування цього багатства на околиці Столичної Пустки, інвестувати в поселення тут майже очевидно. Хоча токсичне середовище є головним стримуючим фактором, наші інженери впевнені, що за допомогою правильних ресурсів ми зможемо перетворити деякі з цих будівель на герметичні блоки, подібні до сховищ. Тоді лише робітники, які залишатимуть будівлі, ризикуватимуть опроміненням. Але, чесно кажучи, невелике опромінення ще нікого не вбило, і чи помітить мешканець пустки взагалі, якщо в нього з'явиться нова виразка?"
    EEN_ronto_decision:0 "Реабілітаційний заклад Ронто"
    EEN_ronto_decision_desc:0 "Руїни Ронто містять багатство цінних матеріалів для підтримки нашого відновлення Америки. На жаль, руїни небезпечні, а зими суворі. Наші інженери розробили плани перетворити все місто на інтернувальний заклад для найгірших дисидентів, які відмовляються прийняти повернення Америки. Вони впевнені, що з правильними налаштуваннями В.А.Ш.И.Н.Г.Т.О.Н зможе контролювати заклад з мінімальним людським персоналом, покладаючись натомість на роботизовану охорону та автоматизовану оборону. Інтерновані в закладі спочатку можуть неохоче підкорятися, але кілька днів голоду змусять їх виконувати наші квоти на збір, щоб отримати свої пайки. Можливо, якщо вони зберуть достатньо матеріалів, їм навіть дозволять реінтегруватися в суспільство."
    EEN_dc_decision:0 "Відновити національну алею"
    EEN_dc_decision_desc:0 "У самому серці руїн центру Вашингтона знаходиться Національна Алея. Колись місце одних із найжорстокіших боїв у Столичній Пустці, ця територія була значною мірою мирною відколи наші солдати прочесали руїни. До бомб, однак, це місце було серцем уряду Америки, а також багатьох музеїв і пам'ятників колишнім президентам. Після того, як уламки будуть розчищені, а навколо території буде зведено стіну, ми повернемо цьому району його колишню славу. Національна Алея буде битися серцем нашої цивільної адміністрації. Офіси будуть відкриті, територія доглядатиметься, а пам'ятники відновлені. Що стосується музеїв, вони будуть скориговані нашим пропагандистським відділом, щоб забезпечити відображення правильної історії нашої нації для відвідувачів Національної Алеї. Ми б не хотіли, щоб у громадськості виникли якісь неправильні ідеї."
    EEN_war_crimes_decision_category:0 "Тактики завтрашнього жня"
    EEN_war_crimes_decision_category_desc:0 "Найяскравіші уми Анклаву постійно вигадують нові та інноваційні способи ведення війни з мутантами. Ці тактики вимагають великих витрат, але дають фантастичні результати."
    EEN_release_the_trogs_decision:0 "Випустити Трогів"
    EEN_release_the_trogs_decision_desc:0 "Контейнери з трогами, вилученими з Пітта, будуть випущені за лініями ворога. Хоча вони зрештою знищать їх, це має на деякий час розхитати їхні лінії."
    EEN_grab_super_mutant_subjects_decision:0 "Придбати зразки ВШЕ"
    EEN_grab_super_mutant_subjects_decision_desc:0 "Команди будуть відправлені гвинтокрилами, щоб забрати мешканців пустки із наших центрів відбору та доставити їх назад до Сховища 87, щоб перетворити на супермутантів, які битимуться за нас!"
    EEN_send_bhs_test_subjects_decision:0 "Зібрати Піддослідних для Б.М.М.А.У."
    EEN_send_bhs_test_subjects_decision_desc:0 "Наш друг в Американській Службі Охорони Здоров'я завжди шукає більше піддослідних для своїх спроб лікування мутацій. Давайте допоможемо їм."
    EEN_create_robobrains_decision:0 "Зібрати суб'єктів для роботів-мозків"
    EEN_create_robobrains_decision_desc:0 "Ми відправимо ударні групи на гвинтокрилах за лінії ворога, щоб викрасти їхнє мутантське населення. Потім їх відправлять назад, де на їхні мізки чекатимуть роботизовані шасі."
    EEN_public_support_category:0 "Рішення щодо громадської підтримки"
    EEN_public_support_category_desc:0 "Є деякі дії, які ми можемо вжити, щоб отримати громадську підтримку. Також можна вжити заходів для підвищення нашої боєготовності, але це може засмутити пересічного мешканця пустки."
    EEN_draft_wastelanders_decision:0 "Призвати мешканців пустки"
    EEN_draft_wastelanders_decision_desc:0 "Ми відправимо рекрутерів до поселень, щоб збирати мешканців пустки для війська. Деякі кошти були відкладені, щоб заспокоїти сім'ї, які заперечують проти того, що ми забираємо їхнього сина чи батька, але це все одно зашкодить нашому іміджу."
    EEN_procure_specimins_decision:0 "Придбати зразки"
    EEN_procure_specimins_decision_desc:0 "Люди в лабораторних халатах потребують більше піддослідних, ніж можуть надати наші в'язниці. Ми будемо таємно викрадати деяких невдоволених і волоцюг, яких більшість не повинна помітити, але незважаючи на наші найкращі зусилля бути таємними, нас можуть помітити."
    EEN_distribute_extra_water_decision:0 "Розподілити додаткову воду"
    EEN_distribute_extra_water_decision_desc:0 "Ми візьмемо воду з наших резервів, щоб розподілити її серед місцевого мотлоху. Кілька хороших фотосесій і чутки допоможуть пом'якшити наш імідж."
    EEN_requisition_civy_factory_decision:0 "Реквізувати фабрику"
    EEN_requisition_civy_factory_decision_desc:0 "Цивільна фабрика могла б краще служити державі, виробляючи мікроячейки. Місцеві будуть не дуже задоволені, але йде війна!"
    EEN_support_militias_decision:0 "Підтримати місцеві ополчення"
    EEN_support_militias_decision_desc:0 "Пожертвування деякої захопленої або старої зброї регіональним ополченням має нагадати місцевим, що ми певною мірою дбаємо про їхню безпеку."
    EEN_spread_propaganda_decision:0 "Поширювати пропаганду"
    EEN_spread_propaganda_decision_desc:0 "Більшість мешканців пустки, можливо, не вміють читати, але ті, хто вміє, побачать наші плакати та зрозуміють, що ми, безсумнівно, хороші хлопці, і вони повинні робити все, що ми кажемо."
    EEN_talon_support_dave:0 "Допомогти громадянській війні дейва"
    EEN_talon_support_dave_desc:0 "Різні поселення Столичної Пустки перебувають у розпалі громадянської війни за те, хто керуватиме їхніми халупами. Наші стратеги пропонують переконатися, що лідер-повстанець на ім'я Дейв переможе в цій боротьбі. За їхніми оцінками, його керівництво дестабілізує поселення і зробить їх більш сприйнятливими до влади Анклаву з часом. Вони пропонують відправити загін військ Компанії Кіготь, щоб допомогти йому в тому, що вони називають Операцією Гамельнський щуролов."
    EEN_loyalty_lab_assignments_decision:0 "Небезпечні лабораторні завдання"
    EEN_loyalty_lab_assignments_decision_desc:0 "Деякі вчені явно надто індоκтриновані, щоб коли-небудь сумніватися у своїй підтримці президента Едема. На жаль для нього, він не складає списки чергувань. Деякі з цих учених будуть відправлені на менш безпечні польові роботи."
    EEN_loyalty_officer_demotions_decision:0 "Пониження офіцерів"
    EEN_loyalty_officer_demotions_decision_desc:0 "Хоча полковник Отем є лідером військових Анклаву, він все ще підпорядковується Президенту. Якщо Едем має причину понизити офіцера, Отем повинен підкоритися. Завдяки спостереженню в Рейвен-Році, Едем завжди має причину."
    EEN_loyalty_inspiring_address_decision:0 "Виголосити надихаючу промову"
    EEN_loyalty_inspiring_address_decision_desc:0 "Президент Едем звернеться до свого народу по радіо з промовою, розрахованою на те, щоб викликати патріотичний запал у 83,7% слухачів."
    EEN_loyalty_luxury_ration_decision:0 "Розкішні пайки"
    EEN_loyalty_luxury_ration_decision_desc:0 "Роздача деяких розкішних пайків — це гарний спосіб підняти дух і віру в президента. Нехай їдять тістечка!"
    EEN_loyalty_adjust_duty_assignments_decision:0 "Скоригувати Призначення на Посади"
    EEN_loyalty_adjust_duty_assignments_decision_desc:0 "Солдати, лояльні до полковника Отема, отримають переважні призначення на службу. Тим часом менш лояльних буде відправлено чистити туалети та клітки для кігтів смерті."
    EEN_fanum_decision:0 "Податок Ф.А.Н.У.М."
    EEN_fanum_decision_desc:0 "Податок на фільтрацію танейтралізацію нечистих матеріалів, або податок ФАНУМ, — це одноразовий податок, який пропонується стягнути з різних громад пустки на нашій території. Податок призначений для використання в нашому проєкті відбудови міста. Однак багатьом мутантам-американцям, ймовірно, не сподобається, що ми ще більше ліземо їм у кишені."
    EEN_reconnect_decisions_category:0 "Возз'єднання Анклаву"
    EEN_reconnect_decisions_category_desc:0 "По всій зруйнованій території Сполучених Штатів розкидані форпости Анклаву, які роками існували самі по собі. Як тільки ми наблизимося до їхніх районів, ми повинні возз'єднатися."
    EEN_reconnect_vanburen_decision:0 "Возз'єднатися з авіабазою Ван Бюрен"
    EEN_reconnect_vanburen_decision_desc:0 "Загін Анклаву на авіабазі Ван Бюрен роками витав у хмарах. Нам потрібно допомогти їм спуститися на землю."
    EEN_reconnect_ontario_decision:0 "Возз'єднатися з Анклавом Онтаріо"
    EEN_reconnect_ontario_decision_desc:0 "Анклав Онтаріо пережив важкі десятиліття, але кавалерія вже тут."
    EEN_reconnect_granite_decision:0 "Возз'єднатися з ротою Граніту"
    EEN_reconnect_granite_decision_desc:0 "Їхній зв'язок із нафтовою вишкою може бути сумнівним, але не можна заперечувати того, чого досягли Граніт та його соратники на заході. Ходімо вперед разом."

    ###Ideas###
    EEN_raven_rock_science_labs_idea:0 "Наукові лабораторії Рейвен-Року"
    EEN_raven_rock_science_labs_idea_desc:0 "Укомплектовані деякими з найяскравіших умів Американських пустки, лабораторії Рейвен-Року розсувають межі післявоєнної науки. Вони невпинно трудяться, роблячи свій внесок у відбудову Америки."
    EEN_new_enclave_idea:0 "Новий Анклав"
    EEN_new_enclave_idea_desc:0 "Падіння нафтової вишки викликало потрясіння в Анклаві. Офіцери по всіх пустках намагалися утримати підрозділи та продовжувати роботу з відбудови Америки. Але вперше за десятиліття майбутнє виглядає світлим. Анклав повернувся і, можливо, сильніший, ніж будь-коли."
    EEN_restoring_raven_rock_idea:0 "Комітет з відновлення Рейвен-Року"
    EEN_restoring_raven_rock_idea_desc:0 "Команда інженерів, офіцерів безпеки та цивільних представників працює разом, щоб координувати перетворення з пункту прослуховування на справжнє місце сили американського уряду."
    EEN_air_traffic_control_idea:0 "Контроль повітряного руху"
    EEN_air_traffic_control_idea_desc:0 "Команди досвідчених техніків контролюють маршрути польотів і графіки посадки всіх розгорнутих гвинтокрилів. Це мінімізує аварії та забезпечує швидкий оборот."
    EEN_won_purity_idea:0 "Переможці Проєкту Чистота"
    EEN_won_purity_idea_desc:0 "Бойскаути в силовій броні з Братства Сталі думали, що зможуть відібрати Проєкт Чистота у його законних власників. Ця велика перемога слугуватиме бойовим кличем для наших військ."
    EEN_lost_purity_idea:0 "Загоюючи Рани"
    EEN_lost_purity_idea_desc:0 "Проєкт Чистота був уроком, якого ми навчилися важким шляхом. Наші люди вражені, але тепер вони знають, як важливо битися щосили, щоб захистити наші землі."
    EEN_navarro_scientists_idea:0 "Вчені з Наварро"
    EEN_navarro_scientists_idea_desc:0 "Роки тому ми вирішили надати пріоритет порятунку наукового персоналу в Наварро. Ці чоловіки та жінки з того часу невтомно працюють над проривами, які допоможуть повернути Америку."
    EEN_cloning_trials_idea:0 "Експерименти з клонування"
    EEN_cloning_trials_idea_desc:0 "З такою низькою популяцією чистих людей по всій Америці нам довелося вдатися до клонування нових громадян. Ця технологія була передовою та недосконалою навіть до війни, тому зараз знадобляться значні зусилля, щоб її вдосконалити."
    EEN_successful_clones_idea:0 "Обмежене клонування"
    EEN_successful_clones_idea_desc:0 "Клонування дорослої людини, яка ходить і розмовляє, неможливе, поки ми не розробимо технологію імплантації людської психіки в новий мозок. Тим не менш, експерименти з клонування виявилися корисним починанням. Клоновані немовлята та, в рідкісних випадках, клони, які використовуються як донорські органи, виявилися підмогою для нашого населення."
    EEN_rebuilding_command_idea:0 "Реструктуризація командування"
    EEN_rebuilding_command_idea_desc:0 "Ми зробили перші кроки до відновлення нашого військового командування до необхідної сили. Однак втрата десятиліть досвіду в корпусі дається взнаки; знадобиться час, щоб повернутися до того, чим ми були колись."
    EEN_green_command_idea:0 "Недосвідчені командири"
    EEN_green_command_idea_desc:0 "Наші нові офіцери займають посади, до яких вони не повністю підготовлені, але це відчайдушні часи. Їм доведеться вчитися швидко."
    EEN_citadel_bos_archives:0 "Архіви цитаделі"
    EEN_citadel_bos_archives_desc:0 "Цінні довоєнні дані, зібрані зі старіючих архівів по всьому району Вашингтона. Хоча більша частина була стерта опором Братства, все ще є багато хорошої інформації, яка буде життєво важливою для наших подальших досліджень."
    EEN_enclave_police_idea:0 "Поліція Анклаву"
    EEN_enclave_police_idea_desc:0 "Не кожен солдат підходить для служби на передовій. Солдати старіють, солдати отримують поранення, а деякі просто вирішують, що їм не подобається випалювати мутантів із їхніх нір. Хоча це зменшує кількість солдатів, яких ми можемо виставити, мало хто більш кваліфікований для підтримання порядку, ніж солдат Анклаву."
    EEN_settler_police_idea:0 "Поліція з поселенців"
    EEN_settler_police_idea_desc:0 "Хоча не всі з них у захваті від правління Анклаву, мало хто піклуватиметься про безпеку своїх поселень більше, ніж люди, які там живуть. Надання місцевим поселенцям повноважень і навчання, щоб підтримувати свої домівки в безпеці та тиші, означатиме менше роботи для нас."
    EEN_raider_police_idea:0 "Поліція з Рейдерів"
    EEN_raider_police_idea_desc:0 "Не кожен рейдер, з яким ми стикалися в пустках, є анархічним головорізом, надто дурним, щоб визнати наш авторитет. Деякі з них вважають себе місцевими правителями, які захищають свої території від гірших загроз в обмін на покору та деякі податки. Ми могли б дати деяким із них шанс."
    EEN_raider_extermination_idea:0 "Кампанії зі знищення рейдерів"
    EEN_raider_extermination_idea_desc:0 "Рейдерам немає місця на наших землях. Коли територія потрапляє під наш прапор, бандитів і головорізів приборкують або вони стикаються з гарячою плазмою."
    EEN_raider_dealings_idea:0 "Справи з рейдерами"
    EEN_raider_dealings_idea_desc:0 "Деякі ватажки рейдерів достатньо розумні, щоб зрозуміти, що боротися з нами невигідно. Ми можемо домовитися з ними про покору та, звичайно, про сплату податків з їхніх рейдів."
    EEN_raider_resistance_idea:0 "Опір рейдерів"
    EEN_raider_resistance_idea_desc:0 "Деякі рейдери на нашій території, які колись були в нас на службі, тепер створюють проблеми. Знадобиться час, щоб приборкати їх."
    EEN_privateers_agency_idea:0 "Агентство каперів"
    EEN_privateers_agency_idea_desc:0 "Агентство Каперів займається ліцензуванням, територіальними претензіями, вирішенням суперечок і оподаткуванням банд рейдерів, які прагнуть працювати як капери Анклаву."
    EEN_raider_warfare_idea:0 "Війна рейдерів"
    EEN_raider_warfare_idea_desc:0 "Дві ворожі банди рейдерів на нашій території воюють, і іноді виникають побічні збитки."
    EEN_raider_problems_idea:0 "Проблеми з рейдерами"
    EEN_raider_problems_idea_desc:0 "Від Гірдершейда до Республіки Дейва рейдери повністю використовують хаос, що виник у результаті нашого повернення американської землі. Поки ми не залатаємо ці діри на наших кордонах і не знищимо найгірші банди, наші внутрішні зусилля страждатимуть."
    EEN_disorganized_settlements_idea:0 "Неорганізовані поселення"
    EEN_disorganized_settlements_idea_desc:0 "Багато поселень на нашій території все ще пристосовуються до життя під нашим контролем. Щоб об'єднати їх усіх, знадобляться значні адміністративні зусилля, а також робоча сила та ресурси."
    EEN_settlement_autonomy_idea:0 "Автономні поселення"
    EEN_settlement_autonomy_idea_desc:0 "Поселення мешканців пустки на нашій території користуються відносно високим рівнем автономії. Дозвіл на продовження щоденного статус-кво полегшує інтеграцію нових територій, але також шкодить нашій здатності належним чином використовувати землі, які ми контролюємо."
    EEN_join_or_die_idea:0 "Приєднуйся або помри"
    EEN_join_or_die_idea_desc:0 "Міста, які ми займаємо, мають два варіанти. Вони або повністю приєднуються до відбудови Америки, або опиняються в братській могилі. З якоїсь дивної причини це дуже засмучує деяких із них."
    EEN_trains_and_bridges_idea:0 "Потяги та мости"
    EEN_trains_and_bridges_idea_desc:0 "У нас є важливіші справи, ніж відбудова доріг Америки, що розвалюються. Залізниць поки що буде достатньо."
    EEN_cars_and_highways_idea:0 "Автомобілі та шосе"
    EEN_cars_and_highways_idea_desc:0 "Колись великий символ американської свободи — величезний автомобіль, що мчить нашими чистими шосе. Він повернеться за нашого життя."
    EEN_secure_checkpoints_idea:0 "Контрольно-пропускні пункти"
    EEN_secure_checkpoints_idea_desc:0 "Наші дорожні мережі всіяні контрольно-пропускними пунктами безпеки в ключових місцях. Там персонал Анклаву перевіряє документи, вантажі та відбиває випадкові атаки. Дехто вважає їх марною тратою наших ресурсів, але вони довели свою корисність у підтриманні дисципліни в різних поселеннях."
    EEN_highway_patrol_idea:0 "Патрулювання шосе"
    EEN_highway_patrol_idea_desc:0 "Артерії нашої нації патрулюються навченими офіцерами, покликаними забезпечувати безпеку на дорогах і стежити за підривними елементами. Це може бути дорого, але воно того варте."
    EEN_general_infantry_focus_idea:0 "Фокус на звичайній піхоті"
    EEN_general_infantry_focus_idea_desc:0 "Наш фокус на розгортанні все більшої кількості звичайних піхотинців був підмогою для наших збройних сил, але наше адміністрування та навчання постраждали."
    EEN_increased_arms_production_idea:0 "Масоване виробництво зброї"
    EEN_increased_arms_production_idea_desc:0 "З більшою армією ми можемо послабити стандарти виробництва, щоб зосередитися на постачанні більшої кількості зброї в руки наших військових."
    EEN_powered_infantry_idea:0 "Фокус на силовій броні"
    EEN_powered_infantry_idea_desc:0 "Хоча їх все ще підтримують менш важко броньовані війська, солдати в силовій броні становлять основу нашої армії. Це обмежує наш процес відбору та значно подовжує час навчання, але додаткова вогнева міць варта компромісів."
    EEN_mechanized_infantry_idea:0 "Фокус на бронекавалерії"
    EEN_mechanized_infantry_desc:0 "Пересічне військо мешканців пустки покладається на вози, запряжені брамінами, та піший рух для переміщення своїх сил. Механізовані війська, які обходять їх і пробивають лінії, є величезною перевагою, яка переважує високу вартість і тягар навчання всіх цих селюків водити."
    EEN_unstable_leadership_idea:0 "Нестабільне керівництво"
    EEN_unstable_leadership_idea_desc:0 "Недавній переворот викликав хвилевий ефект по всьому Анклаву. Посади потребують заміни, пошкодження потребують ремонту, і люди не впевнені в майбутньому. Знадобиться деякий час, перш ніж рани загояться, і ми повинні будемо пройти через це."
    EEN_adapting_vehicles_idea:0 "Адаптовані транспортні засоби"
    EEN_adapting_vehicles_idea_desc:0 "Посилені підвіски, щоб витримувати погані дороги, важкі плуги, щоб розчищати завали, укріплені вікна — усі адаптації, які будуть потрібні, щоб зробити наші транспортні засоби придатними для війни в пустці."
    EEN_arms_mass_production_idea:0 "Масоване виробництво зброї"
    EEN_arms_mass_production_idea_desc:0 "Озброєння мас призведе до зниження якості, але врешті-решт, що таке 1 з 10 зброй, що не спрацьовують, коли ворог стикається з 1000 стволів?"
    EEN_scheming_scientists_idea:0 "Інтригани-вчені"
    EEN_scheming_scientists_idea_desc:0 "Наші наукові команди повні щурів. Зрадників, які підтримували потвору на ім'я Едем і досі активно намагаються підірвати наші зусилля на користь його непрактичних ідей. Поки ми не зробимо щось із цим, наші наукові зусилля будуть обмежені."
    EEN_purged_scientists_idea:0 "Вчені, що пройшли чистку"
    EEN_purged_scientists_idea_desc:0 "Багато наших учених були віроломними паразитами, які допомагали Едему під час його усунення. Страта їх за злочини після призначення Отема президентом залишила велику кількість наукових відділів вакантними."
    EEN_wastelander_scientists_idea:0 "Найяскравіші уми пустки"
    EEN_wastelander_scientists_idea_desc:0 "Найкращі та найяскравіші уми Столичної Пустки та за її межами починають чути про переваги Наукового Відділу Анклаву. Якісне обладнання, стабільне живлення і, звісно, стабільна зарплата. Оскільки ми продовжуємо залучати все більше вчених, які бажають будувати завтрашній день для нас, ми повинні пам'ятати про ретельне тестування кандидатів. У пустці немає університетів. Будь-який божевільний може знайти лабораторний халат і сказати, що розуміє теоретичну фізику."
    EEN_dragged_into_tomorrow_idea:0 "Неконтрольована наука"
    EEN_dragged_into_tomorrow_idea_desc:0 "Наші вчені користуються необмеженою свободою. Стабільне постачання піддослідних-мутантів і невеликий нагляд забезпечать постійний прогрес. Нічого не може піти не так."
    EEN_command_subroutines_idea:0 "Командні підпрограми"
    EEN_command_subroutines_idea_desc:0 "Президент Едем, будучи одним із найдосконаліших зразків довоєнної комп'ютерної інженерії, безсумнівно, має достатньо обчислювальної потужності, щоб безпосередньо керувати нашими військовими, одночасно керуючи всією нашою країною."
    EEN_fev_project_purity_idea:0 "Зараження ВШЕ"
    EEN_fev_project_purity_idea_desc:0 "Вода в пустці була жахливо забруднена модифікованим вірусом ВШЕ. Люди вмирають сотнями. Якщо незабаром не вжити заходів, Столична Пустка перетвориться на цвинтар."
    EEN_cure_clinics_idea:0 "Клініки лікування"
    EEN_cure_clinics_idea_desc:0 "Було створено кілька клінік для вивчення впливу зараженої ВШЕ води на мешканців пустки. Хоча населення думає, що ми робимо все можливе, щоб вилікувати їх від цієї загадкової чуми, насправді ми просто вивчаємо наслідки та намагаємося визначити, що змушує деяких із цих мутантів адаптуватися та долати вірус."
    EEN_escorted_water_caravans_idea:0 "Каравани з водою під охороною"
    EEN_escorted_water_caravans_idea_desc:0 "Хоча це вимагає ресурсів і робочої сили, не можна сперечатися з результатами наших водних караванів. Майже в кожному поселенні, де вони зупиняються, спостерігається різке зменшення популяції мутантів протягом кількох тижнів."
    EEN_rulers_of_dc_idea:0 "Володарі Столичної пустки"
    EEN_rulers_of_dc_idea_desc:0 "Братство переможено, залишаючи Анклав єдиною силою в Столичній Пустці."
    EEN_adams_afb_arty_idea:0 "Артилерійські позиції"
    EEN_adams_afb_arty_idea_desc:0 "Численні лінії відступу з попередньо пристріляними артилерійськими позиціями для прикриття відступів і контратак відіграватимуть ключову роль у нашій обороні, якщо якась ворожа сила колись прорве наші зовнішні бункери."
    EEN_hunting_bos_insurgents_idea:0 "Полювання на Повстанців Братства Сталі"
    EEN_hunting_bos_insurgents_idea_desc:0 "Братський набрід все ще створює проблеми зі своїх маленьких оплотів по всіх пустках. Полювання на них — дороге, але необхідне завдання."
    EEN_dealing_with_bos_insurgents_idea:0 "Угоди з повстанцями Братства Сталі"
    EEN_dealing_with_bos_insurgents_idea_desc:0 "Хоча деякі терористи з Братства будуть битися, поки їх не розплавить плазмовий вогонь, є багато таких, хто знає, що це безнадійна справа, і їх можна переконати здатися. Тим не менш, це обережний шлях, яким ми повинні йти."
    EEN_prisoner_experiments_idea:0 "Піддослідні в'язні"
    EEN_prisoner_experiments_idea_desc:0 "Терористи, вбивці, навіть дрібні злочинці будуть доступні для відбору нашими науковими командами як піддослідні. Хоча деякі, хто перебуває під нашим правлінням, можуть вважати це проблематичним, ці злочинці втратили свої права, коли порушили наші закони."
    EEN_military_governors_idea:0 "Військові губернатори"
    EEN_military_governors_idea_desc:0 "Поки ми не зможемо зібрати списки відповідних кандидатів і організувати вибори, офіцерам доведеться займатися цивільною адміністрацією, а також керувати своїми загонами. Це не чудове рішення, але воно краще, ніж дозволити нашим ворогам зберегти контроль."
    EEN_bos_insurgents_idea:0 "Повстанці Братства"
    EEN_bos_insurgents_idea_desc:0 "Терористи з Братства Сталі просто не знають, коли зупинитися. Їхнє керівництво розгромлено, їхній дім під нашим контролем, і більшість їхніх солдатів мертві, але вони все ще борються. Це буде занозою в нашому боці ще деякий час."
    EEN_all_seeing_eyebot_idea:0 "Всевидяче Робо-Око"
    EEN_all_seeing_eyebot_idea_desc:0 "Розвідувальні робо-ока прочісують пустки. Ми бачимо все, ми знаємо все, і нашим ворогам від цього буде тільки гірше."
    EEN_vertibird_supply_idea:0 "Постачання гвинтокрилами"
    EEN_vertibird_supply_idea_desc:0 "Війська в полі дивляться в небо в очікуванні поповнення запасів. Це полегшує постачання військ на великі відстані, але, чорт забирай, це пожирає паливо."
    EEN_fob_depots_idea:0 "Склади передових баз"
    EEN_fob_depots_idea_desc:0 "Наявність центральних форпостів, куди наші війська можуть звертатися для поповнення запасів, серйозно знижує витрати палива на скидання припасів з гвинтокрилів."
    EEN_take_equipment_idea:0 "Бери, що потрібно"
    EEN_take_equipment_idea_desc:0 "Хоча дехто сказав би, що забирати спорядження та їжу в населення робить нас трохи кращими за звичайних рейдерів, ці люди забувають, що ми — уряд, і ці мутанти не мають права займати нашу територію."
    EEN_wasteland_supply_idea:0 "Корпус постачання пустки"
    EEN_wasteland_supply_idea_desc:0 "Окремий дивізіон армії був сформований виключно для завдання обстеження полів битв і нещодавно повернутих територій на предмет корисного спорядження. Це значно зменшить наші проблеми з постачанням."
    EEN_supply_troubles_idea:0 "Проблеми з постачанням"
    EEN_supply_troubles_idea_desc:0 "Постачання наших військ на великих просторах контрольованої території є унікальною проблемою, яку наші найкращі та найрозумніші офіцери врахували, але потім нам довелося вбити їх за те, що вони стали на бік полковника Отема... тож ось ми тут."
    EEN_robot_factories_idea:0 "Заводи роботів"
    EEN_robot_factories_idea_desc:0 "Зосередження на виробництві роботів призведе до того, що виробництво інших видів озброєнь постраждає, але навіщо армії сторожових роботів більше плазмових гвинтівок?"
    EEN_american_implants_idea:0 "Американські імпланти"
    EEN_american_implants_idea_desc:0 "Кожен імплант, від військового до цивільного, включатиме найважливіший чип ENC-1776. Хоча офіційно цей чип відповідає за регулювання температури в імпланті, насправді він тонко впливає на думки свого власника, роблячи його більш американським і, отже, більш вільним."
    EEN_deathclaw_augmentations_idea:0 "Аугментації ккігтів смерті"
    EEN_deathclaw_augmentations_idea_desc:0 "Кігті смерті з передовою бронею та зброєю? Що може піти не так?"
    EEN_debugging_mainframe_idea:0 "Налагодження мейнфрейма"
    EEN_debugging_mainframe_idea_desc:0 "Перед відключенням система безпеки авіабази Адамс надіслала особливо дратівливий вірус у наші комп'ютерні системи. Знадобиться час, щоб очистити цей вірус, і за цей час постраждають наше адміністрування та дослідження."
    EEN_water_backed_currency_idea:0 "Валюта, забезпечена водою"
    EEN_water_backed_currency_idea_desc:0 "Як і кришечка, наша валюта забезпечена чистою водою. На відміну від кришечки, ця обіцянка дана не просто якоюсь випадковою групою торговців, а Урядом Сполучених Штатів. Це має викликати більше довіри."
    EEN_distributing_water_idea:0 "Розподіл води новим громадянам"
    EEN_distributing_water_idea_desc:0 "За наказом Головнокомандувача Отема, екстрені пайки води розподіляються серед цивільного населення в нещодавно зайнятих поселеннях. Цей тимчасовий захід повинен завоювати серця та уми наших нещодавно звільнених громадян."
    EEN_fiat_currency_idea:0 "Фіатна Валюта"
    EEN_fiat_currency_idea_desc:0 "Мешканці пустки не звикли до ідеї фіатної валюти; ми подбаємо про те, щоб вони зрозуміли, що долар коштує долар, тому що ми так сказали."
    EEN_successful_trog_hunts_idea:0 "Успішне полювання на Трогів"
    EEN_successful_trog_hunts_idea_desc:0 "Полювання на трогів у руїнах Піттсбурга йде добре. Втрати нижчі, ніж очікувалося, і ми очікуємо завершити всю цю операцію достроково."
    EEN_rough_trog_hunts_idea:0 "Важке полювання на Трогів"
    EEN_rough_trog_hunts_idea_desc:0 "Полювання на трогів у руїнах Піттсбурга йде приблизно так, як і очікувалося. Хоча ми зменшуємо популяцію трогів, ми щодня втрачаємо хороших людей. На щастя, кінець вже близько."
    EEN_horrible_trog_hunts_idea:0 "Жахливе полювання на Трогів"
    EEN_horrible_trog_hunts_idea_desc:0 "Полювання на трогів у руїнах Піттсбурга було не інакше як катастрофою. Звіти про втрати значно перевищують очікувані цифри, і здається, що кожного разу, коли ми прочісуємо район від трогів, за ніч на їхньому місці з'являються нові. Піхота прозвала руїни «м'ясорубкою», і багато хто тепер вважає призначення туди смертним вироком. Чим швидше ми закінчимо, тим краще."
    EEN_deporting_muties_idea:0 "Переселення мутантів"
    EEN_deporting_muties_idea_desc:0 "Амішські мутанти з Ґелассенгайту, хоч такі ж огидні, як і мутанти в інших місцях, довели свою корисність. Після переговорів вони погодилися дозволити нам переселити гульів та інших жахливих мутантів із наших цивілізованих територій, щоб вони жили в їхніх сільських громадах."
    EEN_slow_march_north_idea:0 "Повільний марш на північ"
    EEN_slow_march_north_idea_desc:0 "Ведення війни та встановлення порядку на великому замерзлому півночі потребуватиме значних планів. Багато військових експертів і дослідників, можливо, були відволічені від інших завдань, але ми вже бачимо хороші результати."
    EEN_strong_public_support_idea:0 "Сильна громадська підтримка"
    EEN_strong_public_support_idea_desc:0 "Пересічний мешканець пустки позитивно ставиться до Анклаву. Згідно з нещодавнім опитуванням, 7 з 10 опитаних мешканців пустки кажуть, що їхнє життя покращилося з моменту приходу Анклаву в їхнє місто, і 1 з тих 3, хто не погодився, був гулем, тож вони не рахуються."
    EEN_midling_public_support_idea:0 "Посередня громадська підтримка"
    EEN_midling_public_support_idea_desc:0 "Загальне сприйняття Анклаву громадськістю є обережним оптимізмом. Є чимало критиків, які засуджують деякі наші політики, але пересічного мешканця пустки не хвилюють такі речі, як «права гульів» або якісь ймовірні воєнні злочини. Їм просто потрібна холодна вода, теплий обід і місце, де можна сходити до туалету з дверима. Поки ми продовжуємо це забезпечувати, все має бути добре."
    EEN_precarious_public_support_idea:0 "Хитка громадська підтримка"
    EEN_precarious_public_support_idea_desc:0 "Нарікання громадськості стають дедалі голоснішими. Хоча пересічний мешканець пустки все ще не зробить більшого, ніж поскаржиться у своїй халупі, групи опору з кожним днем приваблюють більше прихильників. Якщо ми не будемо обережні, ми можемо побачити спалахи повстань."
    EEN_crumbling_public_support_idea:0 "Громадська підтримка руйнується"
    EEN_crumbling_public_support_idea_desc:0 "Віра в Анклав руйнується. Лише кілька істинних віруючих в Американську Мрію все ще з нами. Патрулі потрапляють у засідки в районах, які колись були безпечними, а робітники звільняються зі збройових заводів. Нам потрібно вжити рішучих заходів, щоб виправити це, інакше ми можемо побачити повторення Нафтової Вишки."
    EEN_wastelander_guinea_pigs_idea:0 "Пусткові морські свинки"
    EEN_wastelander_guinea_pigs_idea_desc:0 "Шляхом обману, купівлі або старого доброго викрадення мешканців пустки доставляють назад до наших лабораторій, де вони віддають свої життя в ім'я науки. Хоча іноді мешканець пустки про це дізнається і починає шукати свого втраченого друга чи члена сім'ї, зазвичай він просто стає ще однією пустковою морською свинкою."
    EEN_building_capital_idea:0 "Будівництво столиці"
    EEN_building_capital_idea_desc:0 "Люди Анклаву надто довго жили в бункерах, але міста пустки не є місцем, яке люди можуть назвати домом. Нам доведеться побудувати перше справжнє місто з моменту падіння бомб, і, чорт забирай, це потребуватиме багато роботи."
    EEN_city_on_a_hill_idea:0 "Місто на пагорбі"
    EEN_city_on_a_hill_idea_desc:0 "Лінкольн, нова столиця Сполучених Штатів Америки, є сяючим світлом у похмурій пустці. Це місто слугує зразком того, що Анклав принесе кожному справжньому американському громадянину. Це місто надихає всіх в Анклаві працювати та боротися ще наполегливіше, щоб наші ідеали були втілені від моря до сяючого моря."
    EEN_comms_trouble_idea:0 "Проблеми зі зв'язком"
    EEN_comms_trouble_idea_desc:0 "Під час перевороту наше комунікаційне обладнання було саботовано, щоб запобігти запитам на підкріплення. На щастя, нам не знадобилася підтримка, але тепер нам потрібно відремонтувати обладнання, інакше наші військові операції постраждають."
    EEN_library_of_congress_idea:0 "Бібліотека конгресу"
    EEN_library_of_congress_idea_desc:0 "Маючи доступ до архівів Бібліотеки Конгресу, ми можемо відновити століття важливих документів, літературних творів та деякі обмежені практичні посібники, які вважалися втраченими в часі."
    EEN_super_mutant_slaves_idea:0 "Раби-Супермутанти"
    EEN_super_mutant_slaves_idea_desc:0 "Досить сильні, щоб виконувати роботу п'ятьох чоловіків, і надто дурні, щоб перехитрити своїх наглядачів, супермутанти були б ідеальною робочою силою, якби не дві невеликі проблеми - вони досить сильні, щоб побити п'ятьох чоловіків до смерті за раз, і надто дурні, щоб виконувати інструкції наглядачів."
    EEN_relocating_command_idea:0 "Переміщення Верховного Командування"
    EEN_relocating_command_idea_desc:0 "Поки ми продовжуємо відновлювати Пентагон і поступово переміщуємо все більше нашої військової командної структури в цей об'єкт, природно будуть затримки в інших проєктах і прогалини в ланцюжку командування під час переїзду. Добре, що ми вже перемогли найбільші загрози в регіоні."
    EEN_rebuilding_city_project_idea:0 "Грандіозний проєкт міста"
    EEN_rebuilding_city_project_idea_desc:0 "Очевидно, ми не в змозі відновити ціле зруйноване довоєнне місто до його колишньої слави. Але якщо ми зосередимо наші зусилля, ми можемо відремонтувати район, який не надто сильно постраждав, до такого стану, що за мірками пустки він буде величиним містом. Це вимагатиме майже повного зосередження наших будівельних зусиль, а також багато часу та ресурсів, але воно має того варте."
    EEN_water_crisis_1_idea:0 "Торгівля за воду"
    EEN_water_crisis_1_idea_desc:0 "Незважаючи на майже необмежені запаси води з Проєкту Чистота, ми перевищили наші водні резерви та зіткнулися з масовою кризою. Щоб впоратися, ми вдалися до торгівлі з торговцями водою за межами нашої території, поки не зможемо знову взяти постачання під контроль."
    EEN_water_crisis_2_idea:0 "Зупинка економіки"
    EEN_water_crisis_2_idea_desc:0 "Незважаючи на майже необмежені запаси води з Проєкту Чистота, ми перевищили наші водні резерви та зіткнулися з масовою кризою. За виконавчим наказом Головнокомандувача Отема введено ліміт на забір води з водних складів, поки уряд регулює споживання та постачання."
    EEN_talon_scouts_idea:0 "Розвідники з Компанії Кіготь"
    EEN_talon_scouts_idea_desc:0 "Колишні найманці з Компанії Кіготь були інтегровані в наші військові як передові розвідники. Їхній досвід навігації по пустках виявився цінним, але їхня недисциплінованість іноді поширювалася на інших новобранців."
    EEN_enclave_remnants_idea:0 "Залишки Анклаву"
    EEN_enclave_remnants_idea_desc:0 "Десятиліття тому Американська Мрія майже загинула зі знищенням Контрольної Станції Анклав. Це не може і не повториться. Кожен чоловік, жінка та дитина Анклаву знають важливість нашої місії. Вони готові пожертвувати всім, що мають, заради цієї благородної мети. Ми відбудуємо Америку, і ми зробимо це з найпередовішою армією, яку ця нація бачила з часів Великої Війни. Але ми повинні бути обережними в тому, як діятимемо далі. У нас може не бути іншого шансу на це, якщо ми зазнаємо невдачі."
    EEN_bloodied_remnants_idea:0 "Закривавлені залишки"
    EEN_bloodied_remnants_idea_desc:0 "Десятиліття тому Американська Мрія майже загинула зі знищенням Контрольної Станції Анклав. Після втрати Рейвен-Року здається, що історія повториться знову. Кожен чоловік, жінка та дитина Анклаву, що залишилися, знають важливість нашої місії. Авіабаза Адамс не стане ще одним Наварро. Ми готові пожертвувати всім, що маємо, щоб цього не сталося. Ми відбудуємо Америку, і ми зробимо це з найпередовішою армією, яку ця нація бачила з часів Великої Війни. Це лише питання часу, коли ворог знайде нас, і в нас не буде іншого шансу на це, якщо ми зазнаємо невдачі."
    EEN_super_duper_refugee_camp_idea:0 "Супер-Пупер табір біженців"
    EEN_super_duper_refugee_camp_idea_desc:0 "Старий Супер-Пупер Март, стоянка та прилегла територія були перетворені на тимчасовий центр утримання для переміщених громадян і громадян, які важко адаптуються до нашого правління. Те, наскільки тимчасовим буде перебування, залежить від того, як швидко ці нові громадяни пристосуються до американського способу життя."
    EEN_rivet_city_labs_idea:0 "Лабораторії Рівет-Сіті"
    EEN_rivet_city_labs_idea_desc:0 "Завдяки обладнанню, досвіду та, звісно, фінансуванню Анклаву, лабораторії в Рівет-Сіті досягли висот, яких ніколи не очікували їхні засновники. Хоча загалом вони надані самі собі, їх іноді закликають допомагати в проєктах, які виконують наші наукові команди."
    EEN_labs_funded_idea:0 "Профінансовані лабораторії"
    EEN_labs_funded_idea_desc:0 "Завдяки фінансуванню Анклаву наші лабораторії можуть працювати так, як повинні. Нам більше не доведеться покладатися на пожертви окремих осіб або скасовувати проєкти через брак кришок."
    EEN_resurgent_enclave_idea:0 "Відроджений Анклав"
    EEN_resurgent_enclave_idea_desc:0 "Анклав повернувся, і дехто сказав би, що він кращий, ніж будь-коли. Проєкт Чистота під нашим контролем, рак мутантських симпатій викорінено, і новини про нашу перемогу над Братством поширилися далеко й широко. Ми продовжимо нашу місію з новою енергією, і скоро ця велика країна знову оживе."
    EEN_enclave_leadership_idea:0 "Лідерство Анклаву"
    EEN_enclave_leadership_idea_desc:0 "Незалежно від змін на рівні поселень або в кількох кабінетних посадах, ми в душі залишаємося Анклавом. З нашою військовою та технологічною міццю, а також майже безмежною чистою водою з Проєкту Чистота, ми наведемо порядок у цих зруйнованих Сполучених Штатах будь-якими необхідними засобами."
    EEN_americas_mercs_idea:0 "Американські найманці"
    EEN_americas_mercs_idea_desc:0 "Компанія Кіготь має повну підтримку та схвалення Уряду Сполучених Штатів. Хоча це означає трохи більше бюрократії та правил щодо того, що ми можемо робити, це того варте заради всього чудового спорядження та захисту, які ми отримуємо. Не кажучи вже про поточний контракт з Анклавом."
    EEN_talon_funding_idea:0 "Фінансування Компанії Кіготь"
    EEN_talon_funding_idea_desc:0 "Ми знову дозволили наймати Компанію Кіготь американським громадянам, але ми залишаємося їхнім головним роботодавцем. Компанія Кіготь забезпечується необхідними матеріалами та компенсацією за їхню роботу з підтримки наших військових, і це дає нам додаткову перевагу, дозволяючи тримати їх на короткому повідку."
    EEN_investigating_talon_co_idea:0 "Розслідування Компанії Кіготь"
    EEN_investigating_talon_co_idea_desc:0 "Ретельне розслідування адміністрації та діяльності Компанії Кіготь вимагає ресурсів, але це необхідно, якщо ми хочемо забезпечити їхню покору."
    EEN_enclave_investigation_idea:0 "Слідчі Анклаву"
    EEN_enclave_investigation_idea_desc:0 "Анклав відправив деяких своїх людей, щоб викорінити корупцію в нашій адміністрації. Вони не залишають каменя на камені та заарештовують будь-кого, кого вважають порушником закону."
    EEN_manifesting_destiny_idea:0 "Втілення долі"
    EEN_manifesting_destiny_idea_desc:0 "За останні роки ми досягли великих успіхів. Вашингтон знову під контролем Уряду США, у нас стабільна виробнича база, і наша армія сильніша, ніж будь-коли. Тепер настав час дивитися на Захід."
    EEN_trogs_running_wild_idea:0 "Троги, що Здичавіли"
    EEN_trogs_running_wild_idea_desc:0 "Анклав випустив трогів за наші лінії, і це завдає величезної шкоди, поки ми намагаємося взяти ситуацію під контроль."
    EEN_out_of_practice_idea:0 "Старі та недосвідчені"
    EEN_out_of_practice_idea_desc:0 "Останні 30 років ми сиділи в Рейвен-Році, повільно відновлюючи нашу силу. Хоча зараз ми сильніші, ніж 30 років тому, ми повинні зіткнутися з фактом, що наша армія страждає від серйозної проблеми. Наші збройні сили складаються повністю з літніх ветеранів, які вже не в формі, або молодих людей, які ніколи не бачили бою поза симуляцією. Наші перші кроки в пустці будуть хиткими, але наші солдати повинні з часом адаптуватися."
    EEN_hate_bos_idea:0 "Експертиза в боротьбі з Братством"
    EEN_hate_bos_idea_desc:0 "Деякі з нас пам'ятають битви з Братством роки тому на Західному Узбережжі. Така архаїчна група, як вони, навряд чи сильно змінила свою тактику за цей час, і ми можемо використати це на свою користь."
    EEN_water_distribution_construction_idea:0 "Будівництво центрів розподілу води"
    EEN_water_distribution_construction_idea_desc:0 "Ми направляємо всі ресурси, які можемо, на будівництво нових центрів розподілу води. Ці укріплені комплекси слугуватимуть центром порядку Анклаву в цих клятих пустках. Пошук відповідних мешканців пустки для їхнього укомплектування виявляється таким же складним завданням, як і будівництво самих місць!"
    EEN_reclimation_teams_idea:0 "Команди збирачів"
    EEN_reclimation_teams_idea_desc:0 "Спеціалізовані загони солдатів будуть відправлені для повернення розграбованого урядового обладнання США з рук наших полеглих ворогів. 200-річна лазерна гвинтівка може не бути найсучаснішою, але вона наша, і ми можемо її використати!"
    EEN_recon_and_infil_idea:0 "Розвідка та впровадження"
    EEN_recon_and_infil_idea_desc:0 "Наше Розвідуправління Сігма надаватиме пріоритет проникненню до наших ворогів і збору їхніх секретів, а не розвалу їх зсередини."
    EEN_sabotage_and_raids_idea:0 "Диверсії та сміливі рейди"
    EEN_sabotage_and_raids_idea_desc:0 "Наше Розвідуправління Сігма надаватиме пріоритет дезорганізації наших ворогів з-за їхніх ліній, а не збору розвідданих."
    EEN_wastelander_study_sigma_idea:0 "Вивчення мешканців пустки"
    EEN_wastelander_study_sigma_idea_desc:0 "Наше вивчення мешканців пустки значно полегшило боротьбу з нашими ворогами як усередині наших кордонів, так і за їхніми межами."
    EEN_sigma_funding_1_idea:0 "Фінансування Служби внутрішньої безпеки (SIO)"
    EEN_sigma_funding_1_idea_desc:0 "Додаткові ресурси були виділені Розвідуправлінню Сігма."
    EEN_sigma_funding_2_idea:0 "Фінансування Служби внутрішньої безпеки (SIO)"
    EEN_sigma_funding_2_idea_desc:0 "Додаткові ресурси були виділені Розвідуправлінню Сігма."
    EEN_enclaves_eyes_1_idea:0 "Очі Анклаву"
    EEN_enclaves_eyes_1_idea_desc:0 "Страх перед РУС тримає мешканців пустки у покорі, навіть коли їх немає поруч."
    EEN_enclaves_eyes_2_idea:0 "Очі Анклаву"
    EEN_enclaves_eyes_2_idea_desc:0 "Страх перед РУС тримає мешканців пустки у покорі, навіть коли їх немає поруч."
    EEN_no_outsiders_law:0 "Тільки Анклав"
    EEN_no_outsiders_law_desc:0 "Ми не можемо дозволити мутованим мешканцям пустки служити в наших збройних силах. Це поставить під загрозу весь Анклав, а разом з ним і майбутнє Америки!"
    EEN_joint_training_idea:0 "Військові ігри"
    EEN_joint_training_idea_desc:0 "Анклав і Компанія Кіготь періодично проводять військові ігри, а також спільні навчання."
    EEN_bear_killer_idea:0 "Уроки вбивць ведмедя"
    EEN_bear_killer_idea_desc:0 "Рота Граніту досі носить шрами від конфлікту з НКР. Вони, можливо, не вбили ведмедя, але вони знають, як йому зашкодити."
    EEN_bhs_treatments_idea:0 "Процедури Служби Охорони Здоров'я США"
    EEN_bhs_treatments_idea_desc:0 "Б.М.М.А.У. десятиліттями намагався лікувати різні недуги та мутації пустки. Хоча ці процедури проводилися на незгодних, деякі з них можна застосовувати до справжніх людей."
    EEN_creating_robobrains_idea:0 "Збірка роботів-мозків"
    EEN_creating_robobrains_idea_desc:0 "Роботи-мозки збираються прямо зараз. Хоча це обтяжує наші ресурси та виробництво, кінцеві результати будуть того варті."
    EEN_disrupted_military_idea:0 "Дезорганізовані військові"
    EEN_disrupted_military_idea_desc:0 "Недавні політично вмотивовані перепризначення дезорганізували наші військові."
    EEN_disrupted_research_idea:0 "Дезорганізовані дослідження"
    EEN_disrupted_research_idea_desc:0 "Недавні політично вмотивовані перепризначення дезорганізували наш науковий відділ."
    EEN_brotherhood_fighting_history_idea:0 "Дослідження конфліктів з Братством"
    EEN_brotherhood_fighting_history_idea_desc:0 "Чикаго та Рейвен-Рок мали обсяги даних про конфлікти з Братством Сталі. Ці записи дозволили нам скласти повне розуміння їхньої бойової доктрини. Знання того, які ходи вони зроблять, перш ніж вони їх зроблять, дасть нам перевагу."
    EEN_lost_enclave_idea:0 "Нація, що вмирає"
    EEN_lost_enclave_idea_desc:0 "Ми, можливо, виграли нашу війну з Чикаго, але що з того? Лінкольн і Чикаго, обидва доми останніх великих популяцій чистих людей, зникли. Без великого прориву в науці людство не доживе до кінця наступного століття. Це найменше з наших проблем. Конфлікт залишив наші військові знищеними, а населення розчарованим. Дуже ймовірно, що ми не переживемо конфлікту з великою нацією пустки."
    EEN_home_of_enclave_vp_idea:0 "Батьківщина Віце-Президента Америки"
    EEN_home_of_enclave_vp_idea_dsc:0 "Віце-президент Америки також родом з нашої території та зберігає високу посаду. Маючи доступ до президента, він може впливати на політику на нашу користь."
    EEN_vp_heymann_idea:0 "Віце-президент Гейманн"
    EEN_vp_heymann_idea_desc:0 "Гарольд Гейманн із Чикаго був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, Гейманн використовує своє становище, щоб впливати на деяку політику, а його часті виступи про минулу велич Америки надихають наше населення."
    EEN_vp_porter_idea:0 "Віце-президент Портер"
    EEN_vp_porter_idea_desc:0 "Посол Портер із Чикаго був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, Портер добре вписався в роль і взяв на себе керівництво зв'язками з мешканцями пустки. Ця людина могла б продати рад-ауей дикому гулю, і він використовує свій срібний язик, щоб переконати мешканців пустки, що наше правління справді в їхніх інтересах."
    EEN_vp_hurley_idea:0 "Віце-президент Герлі"
    EEN_vp_hurley_idea_desc:0 "Рік Герлі з Онтаріо був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, офіцер добре вписався в роль. Через серію промов та інтерв'ю він поширив історію про здатність Анклаву Онтаріо долати неймовірні труднощі. Це ще більше підбадьорило нашу і без того ентузіастичну армію."
    EEN_vp_pillow_idea:0 "Віце-президент Піллоу"
    EEN_vp_pillow_idea_desc:0 "Кадмус Піллоу з Флориди був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, Піллоу використовує своє становище, щоб впливати на деяку політику, пов'язану з військовими дослідженнями. Більше ресурсів, ніж будь-коли, вливається в дослідження аерокосмічної інженерії."
    EEN_vp_coburn_idea:0 "Віце-президент Коберн"
    EEN_vp_coburn_idea_desc:0 "Доктор Роберт Коберн із Флориди був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, доктор Коберн використовує своє становище, щоб надихнути нове покоління вчених прагнути до неможливого через кар'єру в Науковому Відділі Анклаву. Цей старий каже, що майбутнє вже настало."
    EEN_vp_peterson_idea:0 "Віце-президент Пітерсон"
    EEN_vp_peterson_idea_desc:0 "Крістофер Пітерсон з Флориди був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, це не завадило амбітному офіцеру використовувати свій вплив, щоб сколихнути політичну сцену в Лінкольні. Не всі ці потрясіння були поганими, оскільки молодий офіцер зумів оптимізувати деякі урядові процеси. Прощавай, форма OF-5057."
    EEN_vp_mccarthy_idea:0 "Віце-президент Маккарті"
    EEN_vp_mccarthy_idea_desc:0 "Джош Маккарті з Рейвен-Року був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, Маккарті використовує своє становище, щоб заохочувати інвестиції в оборонну промисловість Америки."
    EEN_vp_granite_idea:0 "Віце-президент Граніт"
    EEN_vp_granite_idea_desc:0 "Дуглас Граніт із Каліфорнії був призначений віце-президентом Сполучених Штатів Америки. Хоча посада значною мірою церемоніальна, Граніт чудово справляється з надиханням народу нашої нації. Якби в нас не було Едема, цей хлопець, мабуть, міг би стати хорошим президентом."
    EEN_escaped_scientists_idea:0 "Вчені, що втекли з Рейвен-Року"
    EEN_escaped_scientists_idea_desc:0 "Вчені Анклаву, які втекли від чисток Отема в Рейвен-Році, інтегрувалися в наш науковий відділ. Хоча вони не такі освічені, як випускник Чиказького Інституту, вони мають своє застосування."
    EEN_rebuilt_pitt_idea:0 "Промислова зона Пітта"
    EEN_rebuilt_pitt_idea_desc:0 "Завдяки нашим інвестиціям ми перетворили Пітт із брудної збройової фабрики для рейдерів на складний центр переробки ресурсів. Він служить серцем нашої промисловості."
    EEN_rebuilt_ronto_idea:0 "Реабілітаційний заклад Ронто"
    EEN_rebuilt_ronto_idea_desc:0 "Ресурси, витягнуті з руїн Торонто інтернованими мешканцями пустки, є незначними. Але незначним не є ефект, який це має на населення. Кожен мешканець пустки боїться бути відправленим до Торонто, і цей страх тримає їх у покорі."
    EEN_rebuilt_dc_idea:0 "Національна алея"
    EEN_rebuilt_dc_idea_desc:0 "Б'ється серце нашої нації, Національна Алея, кишить бюрократами та туристами. Бюрократи підтримують роботу нашої держави. Туристи приносять кришки в місцеву економіку. Після відвідування наших музеїв вони повертаються додому, розповідаючи своїм сім'ям і друзям про те, чого вони навчилися. Про те, як ми вбили комуністів на Місяці, щоб врятувати світ."
    centralization_enclave_president:0 "Президентський указ"
    centralization_enclave_president_desc:0 "Посада Президента головує над усією нашою нацією. Наш головний виконавчий керівник веде Анклав, а отже, і Америку. Він ніколи не відпочине, доки ми не матимемо нації, яку заслуговуємо."
    centralization_enclave_military:0 "Військове Командування"
    centralization_enclave_military_desc:0 "В осяжному майбутньому нашою територією керуватимуть військові. Командувач офіцер є вищою владою, і суворе дотримання субординації є обов'язковим, при цьому цивільні перебувають у нижній частині ланцюга команд."
    centralization_enclave_limited_autonomy:0 "Обмежена автономія поселень"
    centralization_enclave_limited_autonomy_desc:0 "Наше Військове Верховне Командування визначає шлях нашої нації, а також політику. Однак обмежене повсякденне управління було довірено місцевому цивільному керівництву. Лише у випадку невиконання керівництвом квот або неможливості забезпечити порядок наша увага повертається до цих жалюгідних глушинах."
    centralization_enclave_military_oversight:0 "Військовий нагляд"
    centralization_enclave_military_oversight_desc:0 "Наше Військове Верховне Командування визначає шлях нашої нації, а також політику. Накази цього органу спускаються по ланцюжку команд молодшим офіцерам, які керують територіями через місцеві офіси."
    centralization_enclave_lincoln:0 "Лінкольнські угоди"
    centralization_enclave_lincoln_desc:0 "Посада Президента головує над усією нашою нацією. Однак місцеві секретарі, офіцери та інші посадові особи мають свободу діяти на власний розсуд. Ця автономія дозволяється доти, доки їхні операції не суперечать великим цілям Анклаву."
 
    ###Opinion Modifiers###
    EEN_employer_modifier:0 "Співробітник Анклаву"
    EEN_employer_modifier_desc:0 "Ці хлопці з Анклаву можуть бути досить серйозними та нудними, але вони добре платять. Що може трапитися?"
    EEN_employee_modifier:0 "Хороші Співробітники"
    EEN_employee_modifier_desc:0 "Ці хлопці з Компанії Кіготь, можливо, не такі професійні, як персонал Анклаву, але вони виконують роботу і не ставлять запитань."
    EEN_backup_base_modifier:0 "Другорядна База"
    EEN_backup_base_modifier_desc:0 "Авіабаза Адамс служить другорядною базою для нас у цьому регіоні. Якщо станеться найгірше, і ми втратимо Рейвен-Рок, ми передислокуємося сюди."
    EEN_govt_modifier:0 "Уряд США"
    EEN_govt_modifier_desc:0 "Система безпеки авіабази Адамс визнає Анклав як Уряд США і, як такий, дозволяє їхнім солдатам повний доступ до об'єкта."
    
    ###Factions###
    EEN_eastern_command_faction:0 "Східне Командування Анклаву"
    EEN_enclave_states_america_faction:0 "Сполучені Штати Анклаву"
    EEN_american_reconstruction_authority:0 "Американське Управління Реконструкції"

    ###National Focuses###
    EEN_nf_a001:0 "Скарби Рейвен-Року"
    EEN_nf_a001_desc:0 "Пункт прослуховування Рейвен-Рок лежав тихий і чекав століттями. Що ж усередині?"
    EEN_nf_a002:0 "Особистість президента"
    EEN_nf_a002_desc:0 "Століттями комп'ютер ZAX у Рейвен-Році сидів над архівами. Він захопився життям президентів, вивчаючи їхні життя та їхні діяння. Особливо життя та досягнення президента Лінкольна."
    EEN_nf_a003:0 "Зв'язок з Наварро"
    EEN_nf_a003_desc:0 "Спостерігаючи століттями та читаючи життя президентів, комп'ютер ZAX слухав, поки найбільша новина за останні 200 років не з'явилася. У 2242 році нафтова вишка, що служила Контрольною Станцією Анклаву, пробудила щось у ZAX. Він став президентом Джоном Генрі Едемом. Президентом, якого потребував Анклав, і він звернувся до відчайдушних військ Анклаву на заході."
    EEN_nf_a004:0 "Новий Анклав"
    EEN_nf_a004_desc:0 "Майже 30 років Анклав у Рейвен-Році будував себе, навіть після того, як база в Наварро замовкла. Сидячи тихо в бункері, працюючи за його стінами. Тепер сили цього нового Анклаву роблять свої перші кроки у світло пустки, готові врятувати Америку."
    EEN_nf_a005:0 "Відновлення Рейвен-Року"
    EEN_nf_a005_desc:0 "Рейвен-Рок ніколи не призначався бути операційною базою для нового американського уряду. Хоча за його стінами є придатні інструменти, знадобиться багато роботи, щоб він став місцем найвищої влади в країні."
    EEN_nf_a006:0 "Введення ангарів в експлуатацію"
    EEN_nf_a006_desc:0 "Вертолітні ангари Рейвен-Року були здебільшого тихими з моменту напливу персоналу майже 30 років тому. Тепер, коли ми готуємося повернути Америку, ми повинні працювати, щоб ввести ці ангари в експлуатацію."
    EEN_nf_a007:0 "Законсервовані гвинтокрили"
    EEN_nf_a007_desc:0 "Окрім кількох, використаних для важливих місій, більшість наших гвинтокрилів були законсервовані після масового виходу. Нам потрібно повернути їх до робочого стану."
    EEN_nf_a008:0 "Пошкоджені птахи"
    EEN_nf_a008_desc:0 "Багато гвинтокрилів отримали пошкодження або від випадкового вогню під час подорожі на схід, або від жорсткіших, ніж очікувалося, посадок. Наші пріоритети змінилися, і нам потрібно їх відремонтувати."
    EEN_nf_a009:0 "Контроль повітряного руху"
    EEN_nf_a009_desc:0 "Наші ангари обмежені і не зможуть вмістити всі наші розгорнуті гвинтокрили одночасно. Нам слід призначити менш боєздатний персонал для управління повітряним рухом, щоб забезпечити швидкий оборот і менше палива витрачалося птахами, що кружляють в очікуванні відкритої посадкової зони."
    EEN_nf_a010:0 "Лабораторії Рейвен-Року"
    EEN_nf_a010_desc:0 "Один із складських ангарів у східному крилі був звільнений від свого вмісту для новоствореного виробництва. З деякими зусиллями його можна переобладнати в тимчасовий науковий центр для наших дослідників, щоб вони могли виконувати свою життєво важливу роботу, і, можливо, зняти пил із деяких старих креслень."
    EEN_nf_a011:0 "Біологічні дослідження"
    EEN_nf_a011_desc:0 "Радіація та ВШЕ пустки є смертельними ворогами, які можуть стати цінними інструментами. Ми повинні дослідити їхні наслідки."
    EEN_nf_a012:0 "Дослідження зброї"
    EEN_nf_a012_desc:0 "Ця пустка сповнена жахливих звірів. Кігті смерті, супермутанти та ті самі виродки з Братства Сталі, які допомогли знищити нафтову вишку. Нам потрібно буде створити нову зброю, щоб боротися з цими небезпеками."
    EEN_nf_a013:0 "Броня «Хеллфайр»"
    EEN_nf_a013_desc:0 "Силова броня зазнала кількох невеликих покращень з моменту знищення нафтової вишки, але нічого суттєвого. Це має змінитися. Дослідники завершують проекти спеціалізованої термостійкої силової броні, названої Бронею Хеллфайр. Однак є один великий недолік. Передові матеріали та виробничі технології, необхідні для виробництва цієї броні, означають, що ми не зможемо виробляти її в достатній кількості, щоб екіпірувати всі наші сили протягом багатьох років. Крім того, щоб завершити дослідження та розпочати виробництво, нам потрібно буде вилучити ресурси з проекту робо-очей Duraframe."
    EEN_nf_a0131:0 "Робо-Очі Duraframe"
    EEN_nf_a0131_desc:0 "Президент Едем любить свої маленькі робо-ока. Роками він вилучав ресурси з інших проектів, щоб знайти способи зміцнити машини настільки, щоб зробити їх життєздатними як щось більше, ніж просто роботи-розвідники. Проект нарешті починає подавати надії, але якщо ми продовжимо цим шляхом і запустимо цих роботів у виробництво, це означатиме закриття проекту броні Хеллфайр на невизначений термін."
    EEN_nf_a014:0 "Лабораторія броні"
    EEN_nf_a014_desc:0 "Після успіху проекту броні Хеллфайр виникла ініціатива присвятити ціле крило дослідницьких лабораторій розробці броні, виключно з метою покращення спорядження, яке наші солдати носять у полі."
    EEN_nf_a015:0 "Робототехнічна Лабораторія"
    EEN_nf_a015_desc:0 "Після успіху проекту робо-очей Duraframe у наших наукових підрозділах виникла ініціатива присвятити крило дослідницьких лабораторій виключно дослідженню роботизованих удосконалень."
    EEN_nf_a016:0 "Обмежене виробництво"
    EEN_nf_a016_desc:0 "Хоча Рейвен-Рок має достатні виробничі потужності для пункту прослуховування, він не пристосований для великого виробництва, яке нам знадобиться, щоб навести порядок у пустках. Ми повинні працювати над збільшенням наших виробничих потужностей, якщо хочемо виконати нашу місію."
    EEN_nf_a017:0 "Переналагодження машин"
    EEN_nf_a017_desc:0 "Багато виробничих потужностей Рейвен-Року налаштовані на випуск предметів, у яких ми майже не маємо потреби, тому вони простоюють і збирають пил. З деякими зусиллями ми можемо переналагодити їх, щоб ще більше збільшити наше виробництво."
    EEN_nf_a018:0 "Реставрація"
    EEN_nf_a018_desc:0 "По всій пустці на складах іржавіють купи стародавньої зброї та навіть костюмів силової броні. Можливо, нам слід докласти зусиль до відновлення деяких із цих менших інструментів, принаймні доти, доки ми зможемо виробляти нове обладнання в таких масштабах, якими ми колись насолоджувалися."
    EEN_nf_a019:0 "Вилучення несуттєвого"
    EEN_nf_a019_desc:0 "Ми повинні прийняти, що зараз не час для розкоші. Несуттєве обладнання, таке як телевізори, особисті радіоприймачі та інше електронне обладнання, має бути розібране, а їхні частини використані, щоб допомогти військовим зусиллям."
    EEN_nf_a020:0 "Дотик до трави"
    EEN_nf_a020_desc:0 "За 30 років після евакуації з Наварро мало хто ступав за межі Рейвен-Року. У нас є ціле покоління солдатів, які ніколи не стояли на твердій землі. Настав час відчинити двері, і цим людям доторкнутися до трави."
    EEN_nf_a021:0 "Фауна Пустки"
    EEN_nf_a021_desc:0 "Істоти Столичної Пустки значною мірою схожі на тих, що на Західному Узбережжі. Тим не менш, є питання, на які потрібно відповісти, наприклад, що, чорт забирай, таке яо-гай?"
    EEN_nf_a022:0 "Зачистка гнізд"
    EEN_nf_a022_desc:0 "Наявність великого вулика мутованих істот у нашій зоні контролю є прямою запрошенням до неприємностей. Нам потрібно встановити протокол для зачистки цих гнізд."
    EEN_nf_a023:0 "Святилище кігтів смерті"
    EEN_nf_a023_desc:0 "На Західному Узбережжі ми намагалися використовувати місцевих створінь, званих кігтями смерті, як витратних солдатів, з обмеженим успіхом. Здається, різновид цих створінь існує і на Східному Узбережжі. Нам слід знайти їхнє основне місце розмноження на випадок, якщо ми захочемо спробувати знову."
    EEN_nf_a024:0 "Контроль над кігтями смерті"
    EEN_nf_a024_desc:0 "Проблема наших спроб перетворити кігтів смерті на солдатів на Західному Узбережжі полягала в тому, що прокляті створіння ставали надто розумними. Вони діяли у власних інтересах, іноді ухиляючись від своїх обов'язків і навіть у рідкісних випадках нападаючи на нас. Одна з наукових команд вважає, що замість модифікації створінь ми могли б сконструювати пристрої, що кріпляться до їхніх голів, щоб надсилати їм обмежені команди, і, звичайно, утримувати їх від нападу на наших людей. Найскладніша частина — закріпити пристрої на їхніх головах... і полагодити їх, коли вони вийдуть з ладу."
    EEN_nf_a025:0 "Форт Баністер"
    EEN_nf_a025_desc:0 "Розташований на південний захід, Форт Баністер був великим військовим комплексом, який сильно постраждав під час Великої Війни. Невідомо, скільки підземної мережі пережило руйнування, але, здається, це гаряча точка для деяких місцевих воєнізованих формувань. Ми відправимо розвідувальний загін, щоб визначити, як впоратися з цими сквотерами."
    EEN_nf_a026:0 "Видалення кігтів у Компанії Кіготь"
    EEN_nf_a026_desc:0 "Цей колись великий військовий об'єкт захоплений мерзенними найманцями, які називають себе Компанією Кіготь. Їх слід силою видалити з території, а будь-яку незаконно привласнену зброю конфіскувати."
    EEN_nf_a027:0 "Рукостискання... або Кігті"
    EEN_nf_a027_desc:0 "Хоча Компанія Кіготь є не більше ніж організованими солдатами удачі, які накопичують застарілу зброю, вони все ще можуть бути корисними. Найманці час від часу використовувалися американськими військовими з моменту їхнього заснування. Ми могли б укласти з ними угоду, платячи їм нашим застарілим обладнанням в обмін на їхні послуги. Краще вони помруть, ніж справжні американці, чи не так?"
    EEN_nf_a028:0 "Таємниці Баністера"
    EEN_nf_a028_desc:0 "Хоча більшу частину форту було розграбовано з часів Великої Війни, багато з надійніших дверей нижнього рівня утримували непроханих гостей. Тепер законні спадкоємці таємниць форту повернулися."
    EEN_nf_a029:0 "Відновлення Баністера"
    EEN_nf_a029_desc:0 "Наразі Форт Баністер є не більше ніж вогким, іржавим бункером із кількома розкиданими напівзруйнованими спорудами на ньому. За допомогою надійної американської інженерії та ресурсів Рейвен-Року ми можемо відновити його принаймні до тіні його колишньої слави. Тоді він слугуватиме важливим командним центром для контролю над регіоном."
    EEN_nf_a030:0 "Можливості для роботи"
    EEN_nf_a030_desc:0 "Компанія Кіготь прийняла наш контракт на свої послуги і виконуватиме для нас обмежені операції в обмін на надлишкову зброю. Давайте завершимо нашу угоду і наведемо їх на деякі цілі."
    EEN_nf_a031:0 "Допоміжні сили компанії Кіготь"
    EEN_nf_a031_desc:0 "Деякі з найманців Компанії Кіготь виявилися напрочуд здібними солдатами. В обмежених спільних операціях офіцери повідомляли, що найманці діють на рівні молодшого персоналу Анклаву. Можливо, настав час розширити нашу угоду з ними і найняти їх як повноцінних допоміжних військ. Дехто навіть пропонує надати почесне громадянство найбільш зразковим солдатам."
    EEN_nf_a032:0 "Радіомасиви"
    EEN_nf_a032_desc:0 "Комунікаційна мережа Анклаву вийшла з ладу незабаром після війни. Маленьким дивом було те, що Едем зміг зв'язатися із західним узбережжям взагалі, і за 30 років, що минули, використаний супутник вийшов з ладу. Потрібно буде докласти зусиль, щоб посилити радіообладнання Рейвен-Року, щоб досягти за межі Столичної Пустки."
    EEN_nf_a033:0 "Радіо Анклаву"
    EEN_nf_a033_desc:0 "Президент Едем хоче використовувати відновлену радіомережу та робо-ока для трансляції радіопередачі... Він думає, що це пом'якшить образ Анклаву серед місцевого населення і, можливо, допоможе повернути розрізнені залишки назад у лоно."
    EEN_nf_a034:0 "Супутникові лінії зв'язку"
    EEN_nf_a034_desc:0 "Хоча багато супутників впали на Землю за час, що минув з Великої Війни, все ще є багато тих, що дрейфують у космосі. З нашим модернізованим комунікаційним обладнанням ми повинні почати опитувати відомі супутники, щоб отримати інвентаризацію того, що ще там є."
    EEN_nf_a035:0 "Авіабаза Адамс"
    EEN_nf_a035_desc:0 "Прямо через Чесапікську затоку знаходяться рештки важливої довоєнної авіабази. Якщо авіабаза Адамс хоч трохи схожа на армійський склад Сьєрра, автоматизована охорона, ймовірно, утримувала більшість цікавих мешканців пустки на відстані. Нам слід відправити кількох розвідників, щоб оглянути об'єкт."
    EEN_nf_a036:0 "Дистанційне вимкнення"
    EEN_nf_a036_desc:0 "Вимкнення системи безпеки бази на відстані може врятувати життя, але шкода нашій електронній інфраструктурі може коштувати дорожче."
    EEN_nf_a037:0 "Координований удар"
    EEN_nf_a037_desc:0 "Немає нічого поганого в старому доброму вертолітному штурмовому загоні, який вривається і вимикає роботів вручну."
    EEN_nf_a038:0 "Утилізація бази"
    EEN_nf_a038_desc:0 "Хоча база, безсумнівно, бачила кращі дні, вона не була зачеплена мародерами. Ми повинні мати змогу врятувати багато корисного обладнання та матеріалів із цього місця."
    EEN_nf_a039:0 "Гарнізон"
    EEN_nf_a039_desc:0 "План щодо авіабази Адамс виходить далеко за рамки простого постачання. Це місце дає нам кілька переваг, яких немає в Рейвен-Року. Однак, оскільки ми вимкнули їхню охорону, нам потрібно подумати про заміну, щоб не пускати брудних мешканців пустки."
    EEN_nf_a040:0 "Покластися на ботів"
    EEN_nf_a040_desc:0 "Просто знову ввімкнути роботів"
    EEN_nf_a041:0 "Допоміжні війська"
    EEN_nf_a041_desc:0 "Деякі допоміжні війська, більш придатні для охоронних обов'язків, були б ідеальним гарнізоном для авіабази Адамс."
    EEN_nf_a042:0 "Повна охорона"
    EEN_nf_a042_desc:0 "Це місце надто цінне, щоб його охороняв хтось, крім найкращих. Поставте повний батальйон військ у силовій броні для охорони бази."
    EEN_nf_a043:0 "Старі запаси"
    EEN_nf_a043_desc:0 "Розвідувальні групи знайшли склади старого обладнання на базі. Хоча більша частина його застаріла та пошкоджена, ми все ще могли б знайти застосування."
    EEN_nf_a044:0 "Ангари технічного обслуговування"
    EEN_nf_a044_desc:0 "Старі ангари для обслуговування літаків, можливо, не були призначені для ремонту гвинтокрилів, але не потрібно багато зусиль, щоб змінити це."
    EEN_nf_a045:0 "Утилізувати аеродроми"
    EEN_nf_a045_desc:0 "Злітні смуги авіабази Адамс завалені іржавими літаками. Запустити їх знову було б більше клопоту, ніж вони того варті, але вони містять корисні матеріали."
    EEN_nf_a046:0 "Полагодження злітних смуг"
    EEN_nf_a046_desc:0 "Час не пощадив злітні смуги авіабази Адамс. Злітні смуги повні дірок і тріщин, які необхідно відремонтувати, перш ніж їх можна буде належним чином використовувати."
    EEN_nf_a047:0 "Мобільний краулер"
    EEN_nf_a047_desc:0 "Авіабаза Адамс була домом для масивної мобільної бази-краулера. Довоєнний прототип, який, хоч і нерухомий, все одно був би хорошою базою для координації оборони всієї території."
    EEN_nf_a048:0 "Смерть з небес"
    EEN_nf_a048_desc:0 "Під час відновлення радіосистем авіабази Адамс наші техніки виявили в комп'ютерах мобільного краулера неперевірене з'єднання з орбітальною збройовою платформою, що перевершує систему Highwater-Trousers, досягнуту через масив NW-05a. Наші техніки попереджають, що можливості використання обмежені, і ми не перевіряли з'єднання ретельно, але це відчайдушні часи. Якщо Ліберті Прайма не зупинити, Братство має шанс виграти цю війну!"
    EEN_nf_a049:0 "Форт Константин"
    EEN_nf_a049_desc:0 "Прямо на схід від Рейвен-Року знаходиться Форт Константин. Колись місце розташування ядерного арсеналу столиці, тепер він безлюдний. Показники датчиків протягом століть показували, що форт залишався здебільшого незайнятим, і після перших кількох десятиліть його рідко відвідували, за винятком однієї групи збирачів близько 20 років тому. Це пояснюється дикими гулями та роботами-охоронцями, які все ще діють. Базовий ШІ відмовляється відповідати на наші коди безпеки, і його потрібно буде вимкнути."
    EEN_nf_a050:0 "Останній залп"
    EEN_nf_a050_desc:0 "Шахти МБР Форту Константин мали одну останню ракету, яка так і не була запущена. Хоча мегатонні бомби, що лежать на складі, не в робочому стані і призначені для переробки на джерело урану, ця МБР сидить, чекаючи команди. Тепер, що ми з нею робитимемо?"
    EEN_nf_a051:0 "Готовий до війни"
    EEN_nf_a051_desc:0 "Вертолітні ангари повністю працездатні, наші виробничі потужності різко зросли, а лабораторії працюють на піку ефективності. Ми мало що можемо зробити, щоб підготувати наш дім до війни, що насувається."
    EEN_nf_a052:0 "Зачистка"
    EEN_nf_a052_desc:0 "Перш ніж ми зможемо використовувати Форт Константин, нам потрібно очистити територію від небажаних шкідників. Президент дозволив нашим солдатам прочесати територію в серії нічних атак. Люди з нетерпінням чекають на стрільбу по мішенях."
    EEN_nf_a053:0 "Що таке Сігма?"
    EEN_nf_a053_desc:0 "Загони Сігма Анклаву є елітними навіть за стандартами Анклаву. Ці спеціалізовані бойові сили часто розгортаються в місцях, які вважаються необхідними для порятунку Америки, часто діючи з обмеженою підтримкою. Небезпечний характер їхніх місій означає, що мало хто з солдатів Сігма в історії Анклаву жив достатньо довго, щоб вийти на пенсію з бойової служби. Однак у нас є така людина в Рейвен-Році, і він має план, який хоче, щоб Президент почув."
    EEN_nf_a054:0 "Розвідка та впровадження"
    EEN_nf_a054_desc:0 "Незважаючи на те, що Розвідка Сігма матиме своє коріння в найбільш прославлених підрозділах Анклаву, їхня мета виходитиме за рамки звичайних смертельно небезпечних місій життєво важливого значення. Солдати, відібрані для цієї служби, адаптуються до більш тонких заходів забезпечення інтересів Анклаву."
    EEN_nf_a055:0 "Диверсії та сміливі рейди"
    EEN_nf_a055_desc:0 "Розвідка Сігма залучатиме своїх найкращих оперативників із бойової еліти. Це марна трата — саджати їх за столи або грати в шпигунські ігри з пустковими дурнями! Інші люди можуть займатися тихою роботою, але коли оперативники Розвідки Сігма йдуть, вони йдуть голосно."
    EEN_nf_a056:0 "Вивчення мешканців пустки"
    EEN_nf_a056_desc:0 "Незважаючи на те, що пересічний мешканець пустки є неписьменним простаком, він дуже недовірливий і швидко розпізнає тих, хто не належить. Якщо ми викрадемо кількох мешканців пустки і вивчимо їх, ми зможемо вивчити манери, які допоможуть нам зливатися з натовпом."
    EEN_nf_a057:0 "30 Шматків бляхи"
    EEN_nf_a057_desc:0 "Пересічний мешканець пустки є жадібним, жалюгідним негідником. У своїй недалекоглядності він навіть продав би своє майно за невелику кількість валюти. Ми можемо використати їхню природу проти них, нам просто потрібно отримати кошти, щоб це зробити."
    EEN_nf_a058:0 "Додаткове фінансування"
    EEN_nf_a058_desc:0 "Розвідуправління Сігма виявилося кориснішим, ніж очікувалося. У міру розширення нашої території боротьба з підривними мешканцями пустки стала важливішою частиною їхніх обов'язків. Вони просять більше ресурсів для додаткових агентів і покращень."
    EEN_nf_a059:0 "Очі Анклаву"
    EEN_nf_a059_desc:0 "З додатковим фінансуванням і ресурсами Розвідуправління Сігма стало невід'ємною частиною наших операцій. Як на нашій території, так і за її межами, вони тримають Анклав у курсі загроз, про які нам потрібно турбуватися, і часто усувають їх."
    EEN_nf_b001:0 "Розвідка Проєкту Чистота"
    EEN_nf_b001_desc:0 "Вода є однією з найважливіших речей, яких потребують усі живі істоти. Більшість населення пустки ледве виживає, використовуючи обмежені очищувачі або споживаючи опромінену воду повністю. До нас дійшли звістки про якийсь проєкт перетворення Меморіалу Джефферсона на масивний очищувач води, який потенційно міг би очистити достатньо води для всієї Столичної Пустки. Хоча план не здійснився, це лише питання часу, і той, хто контролюватиме цей очищувач, контролюватиме пустку."
    EEN_nf_b002:0 "Операція Чиста вода"
    EEN_nf_b002_desc:0 "Після обмеженої розвідки ми з'ясували, що проєкт здійснюється незалежно деякими заповзятливими вченими з пустки, якщо їх можна так назвати. Це лише питання часу, коли сусіднє Братство Сталі зверне на це увагу. Нам слід підготувати кілька варіантів того, як захопити контроль над очищувачем і привести його в робочий стан, перш ніж Братство Сталі спаде на ту саму думку."
    EEN_nf_b003:0 "Шок і трепет"
    EEN_nf_b003_desc:0 "Деякі з наших військових пропонують вдарити по Проєкту Чистота швидко і сильно, докладаючи зусиль, щоб мінімізувати завдані руйнування. План має свої переваги, але є кілька серйозних недоліків. Найбільший з них — потенціал серйозного пошкодження проєкту та можливого вбивства наукового персоналу."
    EEN_nf_b004:0 "Обережне впровадження"
    EEN_nf_b004_desc:0 "Проєкт Чистота ледь тримається на зібраних матеріалах і досвіді його наукового персоналу. Багато наших науковців пропонують застосувати повільніший підхід до впровадження в команду Проєкту Чистота науковців і солдатів, які видають себе за зацікавлених учених і їхніх найнятих охоронців. Хоча це займе більше часу, це різко обмежить потенційну шкоду і, можливо, забезпечить співпрацю більшої частини персоналу проєкту."
    EEN_nf_b005:0 "Відправити Компанію Кіготь"
    EEN_nf_b005_desc:0 "Компанія Кіготь не вперше штурмує охоронювані форпости і зачищає їх для своїх роботодавців. Можливо, нам слід дозволити їм захопити очищувач для нас."
    EEN_nf_b006:0 "Битва за Проєкт Чистота"
    EEN_nf_b006_desc:0 "Ми виклали всі наші карти на стіл, і тепер Братство Сталі помітило нашу присутність. Це лише питання часу, коли вони почнуть якусь жалюгідну спробу відібрати в нас очищувач. Але поки ми чекаємо... щось ворушиться в Рейвен-Році."
    EEN_nf_b007:0 "Відступ і відновлення"
    EEN_nf_b007_desc:0 "Штурм Проєкту Чистота став масовою невдачею. Остаточні цифри втрат все ще надходять, і дорогоцінна техніка потрапила до рук наших ворогів. Нам потрібен час, щоб перегрупуватися і підготувати контратаку."
    EEN_nf_b008:0 "Використати нашу перевагу"
    EEN_nf_b008_desc:0 "Жалюгідні спроби Братства захопити американську власність провалилися. Незліченна кількість Лицарів і Паладинів загинула в атаці, але вони ще не переможені. Ми повинні використати наш імпульс і прибрати цю колючку з нашого боку."
    EEN_nf_b009:0 "Підготувати нашу оборону"
    EEN_nf_b009_desc:0 "З нашими недавніми внутрішніми чварами та втратою Проєкту Чистота нам знадобиться час, щоб завдати удару у відповідь. Ми повинні зміцнити нашу оборону і підготуватися до наступної атаки."
    EEN_nf_b010:0 "Передова База Чистота"
    EEN_nf_b010_desc:0 "У поєднанні з його матеріальною важливістю, Проєкт Чистота знаходиться в стратегічно важливому місці. Розташований прямо через затоку від серця Братства, ми можемо перетворити його на плацдарм для нашого штурму та знищення їх."
    EEN_nf_b011:0 "Анклав завдає удару у відповідь"
    EEN_nf_b011_desc:0 "Ми готові так, як ніколи. Настав час перенести бій до Братства і показати людям Вашингтона, хто править цими пустками."
    EEN_nf_b012:0 "Розбирання завалів"
    EEN_nf_b012_desc:0 "Пентагон лежить у руїнах. На жаль, Братство змусило нас діяти, і колись великий американський військовий об'єкт лежить у ще більших руїнах. Але, можливо, якась цінність залишилася глибоко під землею?"
    EEN_nf_b013:0 "У логово Лайонса"
    EEN_nf_b013_desc:0 "Після важких боїв Пентагон повернувся до рук Уряду Сполучених Штатів. З часом ми зможемо відновити його до довоєнної слави, але поки що давайте подивимося, які смаколики залишило нам Братство."
    EEN_nf_b014:0 "Володарі Вашингтона"
    EEN_nf_b014_desc:0 "Братство переможено, і мало шансів, що вони відбудуються в Столичній Пустці. Вперше з моменту падіння бомб понад 200 років тому уряд Сполучених Штатів стоїть як правителі Вашингтона. Тепер ми можемо звернути нашу увагу на викорінення інших вискочок у колишній столиці та за її межами."
    EEN_nf_c001:0 "Наш новий дім"
    EEN_nf_c001_desc:0 "Втрата Рейвен-Року є жахливою невдачею. Незліченні життя та гори цінного обладнання знищені. Тим не менш, ті з нас, хто залишився, перегруповуються на авіабазі Адамс. Ми повинні перетворити це місце на наш новий дім, місце, де ми наберемося сил і підготуємося до помсти."
    EEN_nf_c002:0 "Верховне командування"
    EEN_nf_c002_desc:0 "Багато хто з найвищих рівнів нашого військового керівництва були в Рейвен-Році, коли його було знищено. Тим не менш, Головнокомандувач і кілька його найближчих радників все ще живі. Знадобиться деякий час, щоб скоригувати нашу структуру керівництва, але ми вже робили це раніше."
    EEN_nf_c003:0 "Відновити резервну копію"
    EEN_nf_c003_desc:0 "Президент Едем знав, що Рейвен-Рок зрештою буде знищено, хоча він вважав, що це буде загроза зсередини. Місяці тому він передав ідеальну копію свого програмування на примітивний комп'ютер ZAX на авіабазі Адамс. Знадобиться час, щоб повернути його в мережу, особливо тому, що лише деякі обрані знають про справжню природу президента Едема."
    EEN_nf_c004:0 "Масований відступ"
    EEN_nf_c004_desc:0 "З втратою нашого командного центру багато наших військ у полі дезорганізовані та не знають, що робити далі. Віддайте загальний наказ про масовий відступ польових солдатів до Адамса."
    EEN_nf_c005:0 "Виклик розрізнених підрозділів"
    EEN_nf_c005_desc:0 "Столична Пустка всіяна довоєнними військовими базами та бункерами. Солдати там не брали участі в масовому відступі, але тепер нам потрібно віддати наказ забрати все, що вони можуть, і повертатися додому."
    EEN_nf_c006:0 "Рятувальні операції"
    EEN_nf_c006_desc:0 "Деякі з наших солдатів опинилися в бою з солдатами Братства, у пастці довоєнної охорони або іншим чином відрізані від шляху до втечі. Нам потрібно відправити рятувальні команди, щоб витягнути їх."
    EEN_nf_c007:0 "Пограбувати арсенали"
    EEN_nf_c007_desc:0 "Ми ледь доторкнулися до поверхні, оглядаючи склади авіабази Адамс, тому що там були здебільшого застарілі гвинтівки. Тепер нам потрібно все, що ми можемо отримати. Розкрийте кілька ящиків і роздавайте набої."
    EEN_nf_c008:0 "Команди збирачів"
    EEN_nf_c008_desc:0 "Час від часу команда відправлялася на пошуки обладнання в старому бункері чи на складі. З нашими поточними проблемами з обладнанням було запропоновано створити офіційний підрозділ для збору решток з руїн і ворожих таборів після битви."
    EEN_nf_c009:0 "Торгуй, якщо мусиш"
    EEN_nf_c009_desc:0 "Важко повірити, що до цього дійшло, але нам може знадобитися торгувати з місцевим населенням, щоб отримати необхідне обладнання."
    EEN_nf_c010:0 "Укріпити периметр"
    EEN_nf_c010_desc:0 "Автоматичні турелі та сітчасті паркани могли стримувати випадкових збирачів століттями, але вони не зупинять цілеспрямований штурмовий загін у силовій броні. Нам потрібно встановити металеві барикади, енергетичні бар'єри та форпости."
    EEN_nf_c011:0 "Розгортання протиповітряної оборони"
    EEN_nf_c011_desc:0 "Ми насолоджувалися перевагою в повітрі протягом більшої частини цієї війни, але з нашим швидким відступом Братство захопило деякі з наших гвинтокрилів. Вперше з часів Великої війни нам доведеться направити наші гармати в небо."
    EEN_nf_c012:0 "Артилерійські позиції"
    EEN_nf_c012_desc:0 "Якщо станеться найгірше, нам може знадобитися битися у своєму домі. Ми обстежимо базу і встановимо артилерійські позиції, щоб прикривати відступи та завдавати максимальних втрат."
    EEN_nf_c013:0 "Повернення Анклаву"
    EEN_nf_c013_desc:0 "Це були важкі кілька місяців, але ми нарешті оговталися від наших недавніх втрат. Хоча ми все ще не вибралися з лісу, ми принаймні не на межі краху. Розробляються плани повернення до Столичної Пустки. У багатьох з них президентське метро є важливим плацдармом. Буде зведено оборону, щоб гарантувати, що якщо нам знадобиться відступити, Братство не буде наступати нам на п'яти."
    EEN_nf_c014:0 "Друга битва за Столичну Пустку"
    EEN_nf_c014_desc:0 "Ми знову на ногах, і наші генерали наполегливо працюють над новими планами повернення Столичної пустки. Друга битва за Столичну пустку, під кодовою назвою Операція Електричний Бугалу, потребуватиме кількох завершальних штрихів, перш ніж ми будемо готові завдати удару у відповідь по Братству."
    EEN_nf_d001:0 "Залишки Сталі"
    EEN_nf_d001_desc:0 "Цитадель впала. Братство залишилося без дому, керівництва чи напрямку. Тим не менш, їхні Лицарі чинять символічний опір по всій Столичній Пустці. Нам потрібно закрити цей розділ, перш ніж ми зможемо перейти до більш важливих справ."
    EEN_nf_d002:0 "Полювати на них"
    EEN_nf_d002_desc:0 "Команди вбивць будуть відправлені в будь-яке місце, де повідомляється про присутність Братства. Їхніх солдатів будуть переслідувати, як кротокрисів, поки їх зовсім не залишиться."
    EEN_nf_d003:0 "Нагороди за жетони"
    EEN_nf_d003_desc:0 "У пустках є багато заповзятливих убивць, які із задоволенням вирішать цю маленьку проблему за нас. Давайте поширимо інформацію, що за доказ вбивства Братства будуть платити кришками та технологіями, бажано жетонами."
    EEN_nf_d004:0 "Справедливе поводження"
    EEN_nf_d004_desc:0 "Керівництво Братства обмануло багатьох дурнів, змусивши їх повірити, що ми якісь геноцидні божевільні. Можливо, якщо ми пообіцяємо їм справедливе поводження і покажемо, що ми не такі вже й погані, деякі складуть зброю добровільно, і ми заощадимо трохи набоїв, поки не закінчаться суди і ми не виведемо розстрільні команди."
    EEN_nf_d005:0 "Суди Лайонса"
    EEN_nf_d005_desc:0 "Незвичайним поворотом подій група Посвячених Братства здалася і запропонувала допомогти покласти край бойовим діям. Вони зв'язалися з залишками Прайду Лайонса та іншими елітними солдатами Братства, привівши їх прямо до нас у руки. Тепер настає частина, де ми виконуємо нашу обіцянку справедливого суду для лідерів цього повстання. Звичайно, справедливість — поняття відносне."
    EEN_nf_d006:0 "Останні сховища"
    EEN_nf_d006_desc:0 "Дуже невелика кількість повстанців все ще уникає наших лап. Їхня кількість зменшується з кожним днем, і одним останнім поштовхом ми можемо загнати їх у землю."
    EEN_nf_d007:0 "Коли пилу осяде"
    EEN_nf_d007_desc:0 "Повстання Братства придушено, і Столична Пустка наша. Зараз не час відпочивати, є багато нагальних питань, які потребують вирішення."
    EEN_nf_d008:0 "Рейдери скрізь"
    EEN_nf_d008_desc:0 "Вздовж всього кордону поселення, які ми повинні контролювати, в облозі рейдерів. Якщо ми не діятимемо швидко, проблема лише погіршиться."
    EEN_nf_d009:0 "Укріпити північ"
    EEN_nf_d009_desc:0 "Бандити з Гаррісбурга продовжують надходити з півночі та викрадати наших нових громадян. Ми повинні укріпити наш кордон, щоб не пускати їх. Наші громадяни повинні працювати на наших фабриках, а не в Пітті."
    EEN_nf_d010:0 "Північна охорона"
    EEN_nf_d010_desc:0 "Укомплектування північної оборони нашими солдатами є витратою ресурсів. Ми повинні призвати мешканців пустки для захисту цього кордону."
    EEN_nf_d011:0 "Рейдери на півдні"
    EEN_nf_d011_desc:0 "Люди Столичної Пустки роками страждали від анархічних рейдерів. Простих бункерів і форпостів буде недостатньо. Нам потрібно знищити цю проблему в її джерелі."
    EEN_nf_d012:0 "Рятівники Вірджинії"
    EEN_nf_d012_desc:0 "Люди, яким не пощастило жити під владою рейдерів на півдні від нас, привітали нас як своїх рятівників. За допомогою правильних зусиль ми можемо знищити рейдерів, що залишилися, і отримати лояльність вдячного населення."
    EEN_nf_d013:0 "Мир і безпека"
    EEN_nf_d013_desc:0 "Проблема з рейдерами вирішена. Хоча бандити та мутовані чудовиська все ще нишпорять, люди в наших поселеннях користуються відносною безпекою."
    EEN_nf_d014:0 "Інтригани-вчені"
    EEN_nf_d014_desc:0 "Велика більшість наукового відділу та цивільної адміністрації повірили пропаганді Едема. Вони не розуміють реалій нашої ситуації і ображаються на нас за те, що ми відключили цей тостер."
    EEN_nf_d015:0 "Піти на поступки"
    EEN_nf_d015_desc:0 "Едем надав багатьом нашим вченим повну свободу проводити будь-які дикі експерименти, які вони хотіли. Можливо, надання їм такої ж свободи та підтримки знову заспокоїть їх."
    EEN_nf_d016:0 "Придбання зразків"
    EEN_nf_d016_desc:0 "Збільшення бюджету науки та автономії виявилося успішним у завоюванні підтримки багатьох поміркованих учених. На жаль, більш жорсткі вчені-пуристи є твердим горішком. Кілька з них запросили зразки мешканців пустки для експериментів з мутаціями та випробувань зброї."
    EEN_nf_d017:0 "Викорінити гниль"
    EEN_nf_d017_desc:0 "Не якомусь інтелектуалі вирішувати, як керувати цією країною. Якщо вони вчинять державну зраду, вони будуть покарані, як будь-який інший зрадник."
    EEN_nf_d018:0 "Вербування мешканців пустки"
    EEN_nf_d018_desc:0 "З великою кількістю нашого наукового відділу страчено, ув'язнено або переведено на годівлю кігтів смерті, нам потрібно звернутися до зовнішніх талантів. Протягом століть так звані вчені намагалися зрозуміти чудеса минулого та жахи сьогодення. Обіцянка стерильної лабораторії та обладнання цього століття могла б заманити їх до нашої справи."
    EEN_nf_d019:0 "Реформований науковий відділ"
    EEN_nf_d019_desc:0 "Ми впоралися з кризою в наших наукових командах, і багато що змінилося. Ця нова організація працює набагато плавніше, ніж раніше, і ми пожинатимемо плоди."
    EEN_nf_d020:0 "Столичні поселенці"
    EEN_nf_d020_desc:0 "Братство Сталі не було нашим єдиним противником під час битви за Столичну пустку. Конфедерація поселень також взялася за зброю проти нас. З їхніми арміями переможеними, багато хто задається питанням, що буде далі."
    EEN_nf_d021:0 "Суд над Мегатонною"
    EEN_nf_d021_desc:0 "Подобається нам це чи ні, але ми повинні прийняти, що багато з цих охоронців поселень і цивільних осіб не були простими терористами за те, що взялися за зброю проти нас. Вони є дурнями, які захищають свій жалюгідний спосіб життя, тому що не знали, хто ми такі. Їхнє керівництво, з іншого боку, чудово знало, що вони роблять, і це була зрада. З ними слід вчинити відповідно."
    EEN_nf_d022:0 "Передача влади"
    EEN_nf_d022_desc:0 "У багатьох поселеннях по всіх пустках залишилося те саме керівництво, що й до конфлікту у Столичної пустці. Ці мери, шерифи та «президенти» сидять у своїх офісах, чекаючи дня, коли солдат у силовій броні виб'є їхні двері. Давайте прийдемо до них з планами мирної передачі влади."
    EEN_nf_d023:0 "Тимчасові губернатори"
    EEN_nf_d023_desc:0 "Поки ми не зможемо організувати якісь вибори або цивільну адміністрацію, нам доведеться обходитися офіцерами, які командують містами. Це не постійне рішення, але наразі воно практичне."
    EEN_nf_d024:0 "Ролі в уряді"
    EEN_nf_d024_desc:0 "Багато лідерів поселень неохоче прийняли наше правління, а з іншими впоралися. Поки ми спостерігатимемо за ними, ми можемо довіряти їм, що вони керуватимуть цими поселеннями гладко."
    EEN_nf_d025:0 "Відносний спокій"
    EEN_nf_d025_desc:0 "Цивілізовані люди Столичної Пустки пристосувалися до нашого правління. Хоча не всім воно подобається, багато хто прийняв те, як ми вестимемо справи."
    EEN_nf_d026:0 "Спрага Америки"
    EEN_nf_d026_desc:0 "Проєкт Чистота слугуватиме каталізатором відбудованої Америки. Наші вчені відновили пошкодження об'єкта і створюють плани того, як найкраще впоратися з водною ситуацією."
    EEN_nf_d027:0 "Нагорода для Компанії Кіготь"
    EEN_nf_d027_desc:0 "Компанія Кіготь довела, що є цінними та відданими солдатами в боротьбі за відновлення Америки. Чимало в наших військових бачать у них побратимів по зброї і підтримують офіційне прийняття їх до наших збройних сил, а також надання їм громадянства."
    EEN_nf_d028:0 "Модернізація Баністера"
    EEN_nf_d028_desc:0 "Форт Баністер наш, і хоча ми приділили деяку увагу його ремонту, ми повинні перетворити його на справжню військову базу, щоб розширити нашу сферу впливу на південний захід."
    EEN_nf_d029:0 "Проблема Супермутантів"
    EEN_nf_d029_desc:0 "Супермутанти грабували Столичну Пустку десятиліттями. Братству не вдалося стримати цю проблему, але ми кращі. Ми заглибимося в Сховище 87 і знищимо цю проблему в її джерелі."
    EEN_nf_d030:0 "Лемплайтери"
    EEN_nf_d030_desc:0 "Наші солдати думали, що готові до всього, коли спускалися в печери Ламплайт, щоб прорватися до Сховища 87. Вони не були готові до поселення, повного дітей."
    EEN_nf_d031:0 "Відбудова нації"
    EEN_nf_d031_desc:0 "Америка майже загинула понад 200 років тому, і знову 30 років тому. Тепер, коли Братство переможено, а загрози вдома вирішено, ми готові розпочати важке завдання повернення Америки."
    EEN_nf_d032:0 "Зростаючі військові"
    EEN_nf_d032_desc:0 "Нинішні військові Анклаву добре пристосовані для скоординованих ударів по бандитах і знищення чудовиськ. Патрулювання великих кордонів і проекція впливу є більш складним завданням. Реформи необхідні, якщо ми хочемо мати армію, яка буде нав'язувати нашу волю."
    EEN_nf_d033:0 "Механізована піхота"
    EEN_nf_d033_desc:0 "Пересічний мешканець пустки проживе все своє життя, не побачивши працюючого автомобіля. Уявіть собі фактор шоку від цілого флоту бронетехніки та танків, які переїжджають пусткове сміття."
    EEN_nf_d034:0 "Навіщо адаптуватися?"
    EEN_nf_d034_desc:0 "Солдат у силовій броні був вершиною військової справи понад 200 років. Хоча нам бракуватиме засобів, щоб екіпірувати кожного солдата силовою бронею ще деякий час, вони все одно повинні нести тягар наших військових."
    EEN_nf_d035:0 "Звичайна піхота"
    EEN_nf_d035_desc:0 "В одній з найбільших воєн 20-го століття Америка перемогла могутніх ворогів. Вони зробили це не за допомогою передової силової броні чи лазерних апаратів вертикального зльоту. Вони зробили це з фермерами, вчителями та батьками, озброєними гвинтівками та навченими боротися за свою країну. Хоча ми все ще використовуватимемо нашу силову броню та гвинтокрили, основа цієї нової американської армії повинна покладатися на скромного солдата з пустки."
    EEN_nf_d036:0 "Автомобільні заводи"
    EEN_nf_d036_desc:0 "Америка всіяна безліччю покинутих автомобільних складальних заводів, які втілювали мрію про машину в кожному гаражі. Ми можемо зосередитися на відновленні заводів під нашим контролем і перетворити їх на виробництво машин війни."
    EEN_nf_d037:0 "Пошук складів"
    EEN_nf_d037_desc:0 "По всіх пустках є захищені бункери, покинуті склади та загублені вантажівки, що перевозять силову броню, яка мала екіпірувати наші військові. Багато з цих костюмів застарілі за нашими мірками, але вони все ще значно перевершують можливості більшості вискочок з пустки. Забезпечення цих схованок і оснащення наших молодших солдатів цими костюмами буде прийнятним рішенням наразі."
    EEN_nf_d038:0 "Вербувальні Центри"
    EEN_nf_d038_desc:0 "Пересічний мешканець пустки знає життя, сповнене труднощів і смерті. Створення вербувальних центрів, що пропонують тріумф і славу, у великих поселеннях під нашим контролем має дати нам достатньо рекрутів, щоб заповнити наші лави."
    EEN_nf_d039:0 "Адаптація транспортних засобів"
    EEN_nf_d039_desc:0 "Пустка створює багато відомих і невідомих проблем для автомобільних операцій. Якщо ми поставимо наших найкращих конструкторів до виконання цього завдання і дослухаємося до відгуків наших військ, ми зможемо адаптувати наші конструкції транспортних засобів, щоб краще вирішувати проблеми сучасної війни з використанням транспортних засобів."
    EEN_nf_d040:0 "Пошук архівів"
    EEN_nf_d040_desc:0 "Багато передових досліджень було втрачено як через Велику війну, так і через руйнівний вплив часу. Якщо ми знайдемо ті небагато об'єктів, про які нам відомо, ми, можливо, зможемо знайти способи краще виробляти силову броню або навіть покращити те, що маємо. Кажуть, у Західній Вірджинії було щось під назвою Ультрацит?"
    EEN_nf_d041:0 "Озброїти маси"
    EEN_nf_d041_desc:0 "Яка користь від людини у формі, якщо вона має лише загострену палицю, якою розмахувати? Ми можемо поставити тих, хто не бажає або не може боротися, на фабрики, щоб вони виробляли зброю, яка придушить опір мешканців пустки."
    EEN_nf_d042:0 "Нова Американська Армія"
    EEN_nf_d042_desc:0 "Американська армія колись була найбільшою збройною силою, яку коли-небудь бачив світ. Ми все ще далекі від цього, але ми, ймовірно, найбільша збройна сила, яка ще існує. Немає сумніву, що ті ідіоти на заході вже давно зникли."
    EEN_nf_d043:0 "Кришки чи долари?"
    EEN_nf_d043_desc:0 "Довоєнна економіка покладалася на всемогутній долар. Паперовий символ цінності, яким багато мешканців пустки тепер витирають свої дупи. Деякі з наших адміністраторів стверджують, що ми повинні повернутися до цього, але інші вважають, що проста кришечка від пляшки краще підходить для спілкування з нашим нинішнім населенням і сторонніми."
    EEN_nf_d044:0 "Федеральні преси для кришок"
    EEN_nf_d044_desc:0 "Якщо ми збираємося підтримувати економіку на кришечках, ми зробимо це правильно. Захопимо преси з покинутих заводів з розливу та запустимо їх."
    EEN_nf_d045:0 "Підкріплено чим?"
    EEN_nf_d045_desc:0 "Протягом сотень років довоєнний долар був забезпечений золотом, рідкісним і цінним товаром. Зрештою від цього відмовилися на користь забезпеченого простою вірою в Уряд. Потрібно буде провести дослідження, щоб вирішити, як поводитися з нашою валютою."
    EEN_nf_d046:0 "Вільна комерція?"
    EEN_nf_d046_desc:0 "З часів Великої Війни Анклав діяв на основі командної економіки. Керівництво вирішувало, що виробляти, скільки і з чого. Оскільки ми виросли за межі військових з державою, нам справді потрібно переосмислити, як ми керуємо комерцією."
    EEN_nf_d047:0 "Вільне Підприємництво"
    EEN_nf_d047_desc:0 "Америка була однією з найбільших націй в історії світу, тому що вірила в систему вільного підприємництва. Готівка — це король, а бізнес — це отримання якомога більшого. Цим підприємствам просто потрібно пам'ятати про сплату податків."
    EEN_nf_d048:0 "Націоналізована Промисловість"
    EEN_nf_d048_desc:0 "Хоча повна командна економіка не є реалістичною в масштабах, на яких ми зараз працюємо, такі основні галузі, як інфраструктура та виробництво зброї, все одно повинні контролюватися урядом. Ми просто не можемо дозволити таку владу якомусь випадковому багатому торговцю."
    EEN_nf_d049:0 "Економіка"
    EEN_nf_d049_desc:0 "Ми відбудували американську економіку. Фабрики виробляють товари, а валюта тече. Процвітання повернулося до Америки, і буде тільки краще."
    EEN_nf_d050:0 "Управління пусткою"
    EEN_nf_d050_desc:0 "Пустка занадто велика, щоб ми могли безпосередньо брати участь у повсякденній роботі кожного поселення. Нам потрібно буде вирішити, як керувати нашою великою нацією, перш ніж ми надто розростемося і не встигатимемо за своїми справами."
    EEN_nf_d051:0 "Легка рука"
    EEN_nf_d051_desc:0 "Нас не можуть турбувати дрібні проблеми якогось маленького поселення в глушині. Місцеві справи вирішуватимуть місцеві лідери, які підзвітні федеральному уряду. Це може іноді створювати проблеми, але ми покажемо приклад цим бешкетникам."
    EEN_nf_d052:0 "Залізний кулак"
    EEN_nf_d052_desc:0 "Чому, чорт забирай, ми повинні дозволяти якомусь випадковому деспоту правити мініатюрним королівством на американській землі? Ці люди керуватимуть своїми землями точно так, як ми накажемо, інакше їх зметуть у совок."
    EEN_nf_d053:0 "Розправа з рейдерами"
    EEN_nf_d053_desc:0 "Рейдери були проблемою в пустках з дня падіння бомб. Жорстокі маніяки, які бродять по землі та полюють на слабких. Нам потрібно прийняти офіційний метод боротьби з ними."
    EEN_nf_d054:0 "Розправитися з ними"
    EEN_nf_d054_desc:0 "Усі рейдери, які проживають на американській землі, зустрінуть плазму. Їм немає місця в нашій країні. Крадіжка в населення — це робота уряду."
    EEN_nf_d055:0 "Угоди з ними"
    EEN_nf_d055_desc:0 "Не кожен рейдер є анархічним монстром, який хоче ґвалтувати і катувати. Деякі навіть приносять подобу порядку на свою територію. З цими розсудливими бандитами можна було б домовитися і, можливо, направити їх проти проблемних елементів за нашими кордонами."
    EEN_nf_d056:0 "Закон і порядок"
    EEN_nf_d056_desc:0 "Суспільство тримається на верховенстві закону. Встановлення простого зводу законів є важливим кроком у поверненні цивілізації в пустки. Поки що прості закони, про Білль про права подумаємо пізніше."
    EEN_nf_d057:0 "Пріоритети відбудови"
    EEN_nf_d057_desc:0 "Америка всіяна руїнами та звалищами. Навіть прості дороги, що пронизували націю, як артерії, перетворилися на більш-менш дороги, що розсипаються. Ми не можемо відбудувати все, то на чому ми зосередимося?"
    EEN_nf_d058:0 "Потяги та мости"
    EEN_nf_d058_desc:0 "Ціла система доріг і шосе зараз не потрібна. Потяги з'єднували цю велику націю і чудово справлялися століттями."
    EEN_nf_d059:0 "Автомобілі та Шосе"
    EEN_nf_d059_desc:0 "Ми, можливо, не відбудуємо кожне шосе та дорогу, але ми повинні зрушити справу з мертвої точки, якщо хочемо відновити цю країну. Покладатися лише на відновлення старих залізничних колій недостатньо."
    EEN_nf_d060:0 "Контрольно-Пропускні Пункти"
    EEN_nf_d060_desc:0 "Наша залізнична система буде всіяна військовими контрольно-пропускними пунктами, які стежитимуть за коліями та боротимуться із загрозами. Це також матиме додатковий ефект, роблячи нашу територію більш захищеною від зовнішніх елементів."
    EEN_nf_d061:0 "Патрулювання Шосе"
    EEN_nf_d061_desc:0 "Правоохоронці патрулюватимуть наші шосе, вишукуючи зловмисників та ворогів. Хоча це витрачає ресурси, це підтримуватиме наші дороги в безпеці та триматиме мешканців пустки у покорі."
    EEN_nf_d062:0 "Військово-Промисловий Комплекс"
    EEN_nf_d062_desc:0 "Перед нами стоїть велике завдання повернути Америку. Військова міць повинна бути центром нашої промисловості."
    EEN_nf_d063:0 "Споживча Промисловість"
    EEN_nf_d063_desc:0 "Яка користь від відбудови Америки, якщо пересічний американець все ще їсть іржавою 200-річною виделкою. Американський споживач рухатиме економіку, і наші люди користуватимуться розкошами, яких не бачили з часів війни, як-от робочі тостери."
    EEN_nf_d064:0 "Проєкт американських міст"
    EEN_nf_d064_desc:0 "Багато великих американських міст були побудовані на віки і все ще якимось чином стоять через 200 років після Великої Війни. Хоча відновлення їх до колишньої слави потребуватиме десятиліть наполегливої праці, ми можемо докласти зусиль принаймні для реконструкції частин, якими зможуть насолоджуватися наші громадяни."
    EEN_nf_d065:0 "Ми повернулися"
    EEN_nf_d065_desc:0 "Залишаючи Наварро, багато солдатів Анклаву думали, що це кінець. Америка мертва. Сьогодні ми є нацією з сильною армією, квітучою економікою та потужною промисловістю. Ми так повернулися."
    EEN_nf_d066:0 "Узбережжя Делаверу"
    EEN_nf_d066_desc:0 "Узбережжя Делаверу всіяне рибалками та торговцями, які відмовляються підкорятися американській владі. Ми це виправимо."
    EEN_nf_d067:0 "Говорити їхньою мовою"
    EEN_nf_d067_desc:0 "Торговці Дувра могли чинити опір. Зрештою, вони бізнесмени, а війна погана для бізнесу. Працюючи з ними над інтеграцією в американську економіку, ми можемо забезпечити їхню співпрацю."
    EEN_nf_d068:0 "Військово-морська база Отема"
    EEN_nf_d068_desc:0 "Узбережжя Делаверу всіяне старими доками та корабельними аваріями. Ми заберемо все, що зможемо, і побудуємо справжню військово-морську базу."
    EEN_nf_d069:0 "У флоті"
    EEN_nf_d069_desc:0 "Будівництво нашої сили в напівзруйнованих бункерах на материковій частині Америки десятиліттями не викликало потреби у флоті. Тепер у нас є узбережжя для захисту та пляжі для штурму. Нам потрібно нарешті розвинути флот і призначити людей, щоб керувати ним."
    EEN_nf_d070:0 "Камене-банда"
    EEN_nf_d070_desc:0 "Прямо на захід від нас є дивна група релігійних фанатиків, які поклоняються... каменям. Вони войовничі та ворожі. З цією Церквою Роккі не можна домовитися, і її необхідно розчавити."
    EEN_nf_d071:0 "У Пітт"
    EEN_nf_d071_desc:0 "Колись великий промисловий центр Піттсбург перетворився на опромінену рабовласницьку державу під назвою Пітт. Цікаво, що ним керує колишній солдат Братства Сталі, який вважає себе королем. Він не підкориться добровільно."
    EEN_nf_d072:0 "Зачистка Трогів"
    EEN_nf_d072_desc:0 "Неначе армії рейдерів було недостатньо, просто за межами колишньої території Ашура є орди монстрів, мутованих до невпізнання. Цих трогів необхідно знищити, якщо ми коли-небудь хочемо використовувати ресурси Пітта."
    EEN_nf_d073:0 "Магніти?"
    EEN_nf_d073_desc:0 "Якого біса ми втрачаємо патрулі через дивних виродків з магнітами? Нам потрібно знищити їх, перш ніж інші мешканці пустки дізнаються, що потужний магніт може вивести з ладу багатомільйонний костюм силової броні."
    EEN_nf_d074:0 "Закрити Їх"
    EEN_nf_d074_desc:0 "Кам'яні люди та магнітний культ переможені. Кілька залишків повинні стати прикладом, але після цього населення повинно заспокоїтися."
    EEN_nf_d075:0 "Майбутнє Пітта"
    EEN_nf_d075_desc:0 "Раби Пітта звільнені, а троги в основному знищені. Тепер ми повинні вирішити питання майбутнього міста."
    EEN_nf_d076:0 "Північні бандити"
    EEN_nf_d076_desc:0 "Бандити з Гаррісбурга були проблемою, яку ми з радістю ігнорували, поки оговтувалися від війни з Братством. Тепер нам потрібно знищити цю банду."
    EEN_nf_d077:0 "Люди з Джонстауна"
    EEN_nf_d077_desc:0 "Джонстаунці? Жителі Джонстауна, прості фермери, які десятиліттями жили в тіні бандитів і культистів. Незважаючи на те, що ми розібралися з цими загрозами, вони відмовляються відмовлятися від своєї автономії. Потрібна демонстрація сили."
    EEN_nf_d078:0 "Миротворці"
    EEN_nf_d078_desc:0 "Люди Гаррісбурга та Джонстауна нарешті починають приймати, що старі часи минули. Рабство та данина врожаєм залишилися в минулому. Тепер вони американці, і їм доведеться прийняти велич, яка з цього випливає."
    EEN_nf_d079:0 "Амішські мутанти?"
    EEN_nf_d079_desc:0 "Зазвичай супермутанти є жорстокими монстрами, що мчать пусткою, вбиваючи та грабуючи гірше, ніж навіть найбожевільніший рейдер. Якимось чином група з них осіла з місцевими амішами і створила щось на кшталт комуни. Комунізм неприйнятний, особливо мутантський примітивістський комунізм."
    EEN_nf_d080:0 "Ласкаво просимо до 2200-х"
    EEN_nf_d080_desc:0 "У результаті, який нікого не здивував, примітивістські фермери не надто чинили опір передовим солдатам у силовій броні. Аміші неохоче підкоряються нашому правлінню, і хоча ми не змушуватимемо їх користуватися лампочками, вони все одно поважатимуть нашу владу."
    EEN_nf_d081:0 "Північний кордон"
    EEN_nf_d081_desc:0 "Жорстокі збирачі, божевільні роботи та більше невдах-лицарів є одними з багатьох загроз і вискочок на великій півночі. Цей кордон не має негайної важливості, але вони все ще сповнені американців, які потребують світла нашої цивілізації."
    EEN_nf_d082:0 "Так звані Вигнанці"
    EEN_nf_d082_desc:0 "Братство Сталі, з яким ми боролися, не було навіть найбільш жорстким з їхнього ордену. Відколота група займає руїни в південній частині Вашингтона, і з ними також потрібно розібратися."
    EEN_nf_d083:0 "Чашка кави Джо"
    EEN_nf_d083_desc:0 "Збирачі в руїнах південного Вашингтона думають, що вони поза досяжністю американської влади. Настав час нагадати їм, що нам не потрібно подорожувати зруйнованими тунелями, щоб дістатися до них."
    EEN_nf_d084:0 "Не їжте людей!"
    EEN_nf_d084_desc:0 "Наші розвідники думали, що знайшли справжній залишок великого американського суспільства. Землю цивілізації та поклоніння цінностям, що зробили Америку великою. Це було доти, доки вони не зрозуміли, що ці люди — канібали. Настав час навчити цих косплеєрів на американців, що їсти людей погано."
    EEN_nf_d085:0 "Цивілізування півдня"
    EEN_nf_d085_desc:0 "Болота на південь від Столичної пустки є домом для більшого, ніж просто гігантські комарі. Вони також є домом для мутованих племінників, культистів і партизанів. Наш обов'язок — цивілізувати цю ділянку болота."
    EEN_nf_d086:0 "Явна доля"
    EEN_nf_d086_desc:0 "З найближчими околицями, що знаходяться під контролем, у нас є міцна база людей, щоб керувати військовою машиною, яка нарешті об'єднає Америку. Заводьте гвинтокрили і запасайтеся мікроячейками."
    EEN_nf_d087:0 "Питання Мегатонни"
    EEN_nf_d087_desc:0 "Якимось чином 200 років тому люди думали, що жити біля живої ядерної бомби було хорошою ідеєю, і ніхто цього не заперечував. Схоже, нам доведеться з цим розібратися."
    EEN_nf_d088:0 "Громада Кентербері"
    EEN_nf_d088_desc:0 "Поселення Кентерберійскої Громади використовувало своє стратегічне розташування, щоб стати торговим центром у Столичній Пустці та за її межами. Знаєте, що це означає? Вони винні БАГАТО податків."
    EEN_nf_d089:0 "Чий Тауер?"
    EEN_nf_d089_desc:0 "Тенпенні-Тауер колись була місцем відпочинку для американської еліти. За останні кілька років вона стала домом для еліти Столичної Пустки. Нам потрібно нагадати їхнім мешканцям, що тепер вони американці."
    EEN_nf_d090:0 "Прочесати Палуби"
    EEN_nf_d090_desc:0 "Так званий Рівет-Сіті є залишком військового корабля США. Це не місце для сквотерів, незалежно від того, як довго вони там жили. Виженіть їх і відправте кудись ще."
    EEN_nf_d091:0 "Рівет-Сіті"
    EEN_nf_d091_desc:0 "Незважаючи на своє походження, люди Рівет-Сіті справді зробили це місце своїм, і ми повинні поважати цю модель відбудови. Хоча це не ідеально, це модель, до якої варто прагнути, і ми повинні простягнути їм руку допомоги."
    EEN_nf_d092:0 "Науковий інститут Рівет-Сіті"
    EEN_nf_d092_desc:0 "Вчені зробили Рівет-Сіті таким, яким він є, і він міг би стати цінним дослідницьким центром. Наші нинішні лабораторії, між іншим, стали тіснуватими."
    EEN_nf_d093:0 "Справжній Американець"
    EEN_nf_d093_desc:0 "Глибоко в корпусі Рівет-Сіті мешкає цікава особистість, Авраам Вашингтон. За словами місцевих, він історик, який працював над збереженням американської історії. Нам слід організувати зустріч."
    EEN_nf_d094:0 "Національна алея"
    EEN_nf_d094_desc:0 "Колись прекрасний центр історії та торгівлі, Національна Алея перетворилася на зону бойових дій у роки після падіння бомб. Тепер, коли там здебільшого затихло, ми повинні почати роботу, щоб повернути її до того, чим вона була колись."
    EEN_nf_d095:0 "Вчорашнє майбутнє"
    EEN_nf_d095_desc:0 "Музей Технологій був сповнений технологій, як старих, так і нових для людей 2077 року. Хоча цей музей навряд чи містить креслення передової плазмової гвинтівки, він може зберігати секрети старіших технологій, які ми не вважали за потрібне пам'ятати, коли жили в захищених бункерах останні два століття."
    EEN_nf_d096:0 "Уривки старого світу"
    EEN_nf_d096_desc:0 "Національний Архів заповнений старими документами, які довоєнний уряд вважав історично або культурно значущими. Знадобляться роки, щоб перебрати все це, але спочатку ми повинні зробити первинне прочісування."
    EEN_nf_d097:0 "Музей Історії"
    EEN_nf_d097_desc:0 "Музей Історії є руїнами, що розвалюються, сповненими проблисків у минуле. Що ще там?"
    EEN_nf_d098:0 "Поле бою на алеї"
    EEN_nf_d098_desc:0 "Колись прекрасні території національної алеї всіяні окопами, бункерами та скелетами полеглих. Пам'ятники занепали. Ми більше не можемо дозволити цьому символу американського процвітання занепадати."
    EEN_nf_e001:0 "Плями сталі"
    EEN_nf_e001_desc:0 "Незважаючи на те, що їхній дім зруйновано, а більшість керівництва вбито, ці набридливі колючки в нашому боці продовжують існувати. Нам потрібно буде знищити їх, перш ніж ми зможемо продовжити важливішу роботу."
    EEN_nf_e002:0 "Полювати на них"
    EEN_nf_e002_desc:0 "Команди вбивць будуть відправлені в будь-яке місце, де будуть знайдені бійці Братства. Адже нових вони не роблять."
    EEN_nf_e003:0 "Повернути людей"
    EEN_nf_e003_desc:0 "Радіо Анклаву транслюватиме історії про звірства та злочини Братства. Якими б неймовірними вони не були, пересічний мешканець пустки повірить у них і видасть будь-яких терористів Братства, яких вони ховають."
    EEN_nf_e004:0 "Останні сховища"
    EEN_nf_e004_desc:0 "Останні терористи Братства біжать у страху. Ми можемо добити їх одним останнім поштовхом."
    EEN_nf_e005:0 "Америка в розрусі"
    EEN_nf_e005_desc:0 "Між мутантами, що заполонили нашу територію, і зрадою полковника Отема, ситуація, м'яко кажучи, хитка."
    EEN_nf_e006:0 "Саботаж зв'язку"
    EEN_nf_e006_desc:0 "Під час спроби перевороту полковника Отема команда його лоялістів серйозно пошкодила нашу комунікаційну інфраструктуру. Знадобиться час, щоб відновити її."
    EEN_nf_e007:0 "Мобільний краулер"
    EEN_nf_e007_desc:0 "Антени мобільного краулера ледве були відновлені після століть занепаду, перш ніж до них дісталися лоялісти Отема. Їм знадобиться більше роботи для ремонту."
    EEN_nf_e008:0 "Відремонтувати ретранслятори"
    EEN_nf_e008_desc:0 "Радіоретранслятори Рейвен-Року були серйозно пошкоджені в боях, і багато критичного обладнання було вирвано. Знадобиться час, щоб оцінити та відремонтувати пошкодження."
    EEN_nf_e009:0 "Протоколи підключення"
    EEN_nf_e009_desc:0 "Наші вчені працюють над методами посилення сигналів за допомогою існуючої інфраструктури. Їм знадобиться спеціалізована підтримка, щоб завершити свої дослідження, але це виглядає багатообіцяюче."
    EEN_nf_e010:0 "Підсилювачі сигналу Робо-Очей"
    EEN_nf_e010_desc:0 "Спираючись на наші попередні дослідження, один учений вважає, що ми могли б використовувати антени робо-очей для посилення сигналів і різкого розширення нашого охоплення. Вони зарезервували дюжину пристроїв для цього дослідження, і вони майже готові до розгортання."
    EEN_nf_e011:0 "Всевидяче Робо-Око"
    EEN_nf_e011_desc:0 "Кожне робо-око, яке ми маємо в пустках, діє як продовження наших очей, вух і голосу. Наші робо-ока бачать усе і знають усе."
    EEN_nf_e012:0 "Криза в командуванні"
    EEN_nf_e012_desc:0 "Полковник Отем мав багато друзів у нашому військовому командуванні. В результаті його перевороту більшість наших вищих офіцерів і чимало молодших було страчено. Відбудова нашої військової адміністрації буде важкою, але це відкриває можливості."
    EEN_nf_e013:0 "Лояльні офіцери"
    EEN_nf_e013_desc:0 "Молоді та ідеалістичні завжди любили послання президента Едема. Багато хто з них відданий президенту понад усе і може стати основою нашої нової військової адміністрації. Єдина проблема полягає в тому, що вони все ще досить зелені."
    EEN_nf_e014:0 "Підготовка офіцерів"
    EEN_nf_e014_desc:0 "Ми втратили багато солдатів через недосвідченість офіцерів. Ми повинні навчити їх перестати діяти так, ніби у нас необмежені війська."
    EEN_nf_e015:0 "Нова гвардія"
    EEN_nf_e015_desc:0 "У нас є нове покоління навчених і досвідчених офіцерів. Ці чоловіки та жінки поведуть американську армію в майбутнє."
    EEN_nf_e016:0 "Хочеш зробити добре..."
    EEN_nf_e016_desc:0 "Дозволити недосконалим людям керувати нашими військовими було небезпечною помилкою. Величезний комп'ютер, яким є Едем, може легко виділити частину своєї обчислювальної потужності для управління нашими військовими також."
    EEN_nf_e017:0 "Черпати з історії"
    EEN_nf_e017_desc:0 "Не маючи особистого бойового досвіду, Едем повинен звертатися до історії, щоб отримати військові знання. Це не надто відрізняється від людських офіцерів."
    EEN_nf_e018:0 "Військові легенди"
    EEN_nf_e018_desc:0 "Маючи доступ до величезних історичних баз даних, Едем може не просто вчитися у найбільших генералів Америки, він може відтворити їх, щоб очолити найбільшу армію Америки."
    EEN_nf_e019:0 "Криза відвернута"
    EEN_nf_e019_desc:0 "Анклав пережив кризу керівництва, небачену з часів знищення Нафтової Вишки, і знову ми вийшли з іншого боку. Ми завдячуємо нашим майбутнім цим хоробрим офіцерам, які піднялися, коли це було потрібно, і стали тими чоловіками та жінками, якими ми мали бути."
    EEN_nf_e020:0 "Проблеми з постачанням"
    EEN_nf_e020_desc:0 "Анклаву вже давно не доводилося постійно постачати війська на великі відстані. З нашим старим командним складом, скомпрометованим, у нас немає необхідного досвіду, щоб пристосуватися до цієї зміни без серйозного переосмислення того, як ми керуємо нашими лініями постачання."
    EEN_nf_e021:0 "Скиди з повітря"
    EEN_nf_e021_desc:0 "Армії пустки покладаються на застарілі методи поповнення запасів, такі як запряжені брамінами обози або, можливо, автомобільні колони постачання. Ми кращі за це. Навіщо нам флот гвинтокрилів, якщо ми не можемо використовувати їх для постачання наших військ?"
    EEN_nf_e022:0 "Запаси палива"
    EEN_nf_e022_desc:0 "Постачання військ гвинтокрилами виснажує наші запаси палива більше, ніж ми очікували. Нам доведеться залізти в запаси палива, якщо ми продовжимо в тому ж дусі."
    EEN_nf_e023:0 "Бази постачання"
    EEN_nf_e023_desc:0 "Замість того, щоб вертоліт постачав кожен окремий підрозділ у полі, ми матимемо передові позиції та бази, які слугуватимуть складами постачання. Потім припаси можна буде доставляти з цих складів на коротші відстані. Хоча це трохи витрачає робочу силу, принаймні ми не спалюємо танкер пального кожні кілька днів."
    EEN_nf_e024:0 "Брати, що потрібно"
    EEN_nf_e024_desc:0 "Наші солдати повинні будуть навчитися отримувати те, що їм потрібно, у полі. Постачання ніколи не буде стабільним, тому вилучення ресурсів у місцевих мутантів необхідне для поповнення дефіциту."
    EEN_nf_e025:0 "Послабити стандарти"
    EEN_nf_e025_desc:0 "Як ми й очікували, пересічний мутант не носить із собою ящик плазмових гранат і мікроячейок. Солдатам доведеться обходитися тим, що вони зможуть знайти. Зрештою, .308 так само добре валить мутанта, як і плазмовий заряд."
    EEN_nf_e026:0 "Корпус постачання пустки"
    EEN_nf_e026_desc:0 "Іноді знайти довоєнний склад із припасами — це одне, але щоб вирішити наші проблеми з постачанням, нам потрібно буде сформувати повний дивізіон, присвячений пошуку зброї та ресурсів. Ці люди не тільки вилучатимуть обладнання із запечатаних об'єктів, але й слідуватимуть за битвами, щоб збирати спорядження полеглих."
    EEN_nf_e027:0 "Стабілізоване постачання"
    EEN_nf_e027_desc:0 "Наші проблеми з постачанням вирішені наразі. Солдати мають достатньо ресурсів, щоб продовжувати нашу кампанію з відбудови Америки."
    EEN_nf_e028:0 "Проєкт Чистота"
    EEN_nf_e028_desc:0 "Проєкт Чистота спочатку був розроблений як спосіб забезпечення водою людей Столичної Пустки. Він все ще робитиме це. Але це також допоможе нам впоратися з мутантами, що спустошують пустки."
    EEN_nf_e029:0 "Клініки лікування"
    EEN_nf_e029_desc:0 "Погано себе почуваєте? Ледве можете рухатися? Блюєте кров'ю? Схоже, вам потрібно відвідати Клініку Лікування Анклаву. Наші віддані медики вивчають наслідки цієї жахливої хвороби, яка з'явилася нізвідки і здивувала всіх..."
    EEN_nf_e030:0 "Безглуздість Компанії Кіготь"
    EEN_nf_e030_desc:0 "Звісно, Компанія Кіготь допомогла нам у боротьбі з Братством, але мутант залишається мутантом. Тепер нам потрібно розібратися з ними."
    EEN_nf_e031:0 "Робочий табір Баністер"
    EEN_nf_e031_desc:0 "Форт Баністер у його нинішньому стані не має великого стратегічного значення для Анклаву. Чесно кажучи, ці руїни, що розвалюються, мають мало цінності, окрім того, що можна з них витягти. Тож ми саме це і зробимо. Форт Баністер буде перетворено на суворо контрольований робочий табір, де полонені мешканці пустки зможуть послужити цій країні, витягуючи те, що залишилося цінного з колись великої бази."
    EEN_nf_e032:0 "Сховище 87"
    EEN_nf_e032_desc:0 "Сховище 87 майже напевно є джерелом проблеми супермутантів. Ми повинні підготуватися до зачистки цього місця."
    EEN_nf_e033:0 "Проблема мутантів"
    EEN_nf_e033_desc:0 "Проблема супермутантів є такою, з якою більшість націй не змогли б впоратися, і ще менше мали б ті варіанти, які маємо ми, щоб з нею впоратися."
    EEN_nf_e034:0 "Американська армія"
    EEN_nf_e034_desc:0 "Старі способи ведення війни, коли солдати в силовій броні заполонювали пустки, можуть не спрацювати в майбутньому. Наше виробництво обмежене, як і наша робоча сила. Настав час переосмислити, як ми ведемо війну."
    EEN_nf_e035:0 "Солдати-супермутанти"
    EEN_nf_e035_desc:0 "Вся суть проекту Супермутантів полягала у створенні солдата майбутнього, і в кількох випадках старий Анклав на заході досяг у цьому успіху. Можливо, це все-таки шлях уперед."
    EEN_nf_e036:0 "Велика чорна броня"
    EEN_nf_e036_desc:0 "Мутант боїться видовища величезного солдата в чорній силовій броні, і не безпідставно. Навіть якщо наші сили обмежені, загін солдатів у силовій броні може підкорити ворога навіть із співвідношенням 20:1 і вийти з посмішкою."
    EEN_nf_e037:0 "Майбутнє за сталлю"
    EEN_nf_e037_desc:0 "Сила та надійність сталі для нашої військової машини краща, ніж ризикувати чистим американцем. Хоча вони, можливо, не такі адаптивні чи гнучкі, ми можемо замінити кожного полеглого робота двома новими."
    EEN_nf_e038:0 "Більші рабські нашийники"
    EEN_nf_e038_desc:0 "Як ми й очікували, супермутанти не є найкращими істотами для надання важкої зброї. Розробивши нові рабські нашийники, призначені для шиї супермутанта, ми повинні мати змогу підкорити їх. Навіть дурний мутант розуміє: «будеш поганим — голова вибухне»."
    EEN_nf_e039:0 "Надлишки Братства"
    EEN_nf_e039_desc:0 "Не кожному солдату потрібен набір Покращеної Силової Броні. Наші снайпери, допоміжний персонал та інженери могли б обійтися відреставрованими костюмами T-45d, що залишилися від Братства."
    EEN_nf_e040:0 "Модернізувати Ффабрики"
    EEN_nf_e040_desc:0 "Щоб замінити нашу армію машинами, нам доведеться переобладнати багато фабрик на виробництво роботів."
    EEN_nf_e041:0 "Розумніші мутанти?"
    EEN_nf_e041_desc:0 "У Сховищі 87 був супермутант, у якого, здавалося, все ще збереглися більшість його розумових здібностей. Якби ми могли вивчити його створення та розтин, ми, можливо, змогли б з'ясувати, як створити мутантів, достатньо розумних, щоб краще битися, але не надто розумних, щоб змовлятися проти нас."
    EEN_nf_e042:0 "Броня майбутнього"
    EEN_nf_e042_desc:0 "З меншою силою, наш найкращий варіант — розробити найдосконаліше спорядження, яке коли-небудь бачили пустки. Якщо мутантська зброя не зможе пробити броню, не матиме значення, наскільки більше в них людей."
    EEN_nf_e043:0 "Робототехніка в Пріоритеті"
    EEN_nf_e043_desc:0 "Оскільки наша армія складається майже повністю з роботів, ми повинні зосередитися на створенні кращих роботів."
    EEN_nf_e044:0 "Наша нова армія"
    EEN_nf_e044_desc:0 "Наші військові зазнали багатьох радикальних змін і стали кращими в результаті."
    EEN_nf_e045:0 "Перше місто"
    EEN_nf_e045_desc:0 "Америка лежить у руїнах. Наші люди потребують нового міста. Міста, яке слугуватиме поглядом у майбутнє. Чисті вулиці, міцні стіни та розкішні будинки. Це буде масивний проєкт, але це буде величезний крок у майбутнє."
    EEN_nf_e046:0 "Знесення руїн"
    EEN_nf_e046_desc:0 "Руїни навколо нашого нового міста потрібно знести. Купи металобрухту, що стирчать на горизонті, є лише нагадуванням про жахи пустки."
    EEN_nf_e047:0 "Бетонні стіни"
    EEN_nf_e047_desc:0 "Жоден мутант не ступить у це місто, хіба що в кайданах. Щоб досягти цього та забезпечити безпеку наших людей, нам потрібні міцні стіни та укріплення."
    EEN_nf_e048:0 "Необмежена енергія"
    EEN_nf_e048_desc:0 "Яким було б місто майбутнього, якби нашим людям доводилося запускати генератори, щоб освітлювати свої оселі? Ми витягнемо реактори з кількох старих сховищ, щоб живити місто, поки розробляємо довгострокове рішення."
    EEN_nf_e049:0 "Цивільна промисловість"
    EEN_nf_e049_desc:0 "Будинки наших людей потребують нових меблів, техніки та інших споживчих товарів. Кілька фабрик повинні задовольнити потреби громадян."
    EEN_nf_e050:0 "Чисте небо"
    EEN_nf_e050_desc:0 "Ми не можемо дозволити мутантському сміттю падати з неба. Зенітні установки вздовж стін утримають мутантські планери та літаючі купи брухту з нашого повітряного простору."
    EEN_nf_e051:0 "Чисті вулиці"
    EEN_nf_e051_desc:0 "Люди нашого першого міста насолоджуватимуться приємними прогулянками чистими вулицями. Нічого, що їм потрібно, не буде далі ніж за 15 хвилин ходьби."
    EEN_nf_e052:0 "Сховище 101"
    EEN_nf_e052_desc:0 "Одне з останніх Сховищ, все ще повних чистих громадян, Сховище 101, надіслав радіосигнали. Настав час привітати їх у новій Америці."
    EEN_nf_e053:0 "Національний аеропорт Едема"
    EEN_nf_e053_desc:0 "У нашому місті буде величезний аеропорт. Центр торгівлі, а також місце, куди наші солдати зможуть повертатися додому у відпустку. Якщо все інше провалиться, це буде плацдарм для оборони міста."
    EEN_nf_e054:0 "Дім милий дім"
    EEN_nf_e054_desc:0 "Будинки наших людей будуть спроектовані так, щоб забезпечити комфорт, безпеку та спільноту."
    EEN_nf_e055:0 "Наша нова столиця"
    EEN_nf_e055_desc:0 "Нарешті, створено перше місто Нової Америки. Найвище досягнення, воно буде місцем нашої нової столиці."
    EEN_nf_e056:0 "Неконтрольована наука"
    EEN_nf_e056_desc:0 "Без хибної віри в те, що мутанти пустки є людьми, наші наукові відділи справді можуть вирішувати проблеми. Піддослідних багато, і наші ресурси великі. Ми відкриємо нову еру наукових відкриттів."
    EEN_nf_e057:0 "Вивчення кібернетики"
    EEN_nf_e057_desc:0 "До війни було кілька досліджень кібернетичних удосконалень для людей. Бомби більш-менш зупинили цю лінію досліджень, але тепер ми можемо почати спрямовувати ресурси назад на цю ідею."
    EEN_nf_e058:0 "Сховище 108"
    EEN_nf_e058_desc:0 "Якщо записам у штаб-квартирі Волт-Тек можна вірити, Сховище 108 мало провести кілька випробувань клонування. Ми повинні розслідувати та побачити, що з ними стало."
    EEN_nf_e059:0 "Кращий контроль над Кігтями Смерті"
    EEN_nf_e059_desc:0 "Мати кігтя смерті, який патрулює біля форпосту, думаючи, що це його гніздо, — це добре, але за допомогою подальших досліджень ми могли б спробувати надсилати їм сигнали, що спонукають їх атакувати позиції або, можливо, навіть працювати разом, щоб штурмувати бункер."
    EEN_nf_e060:0 "Кібернетичні досягнення"
    EEN_nf_e060_desc:0 "Кібернетичний прогрес, здається, є наступним шляхом людської еволюції, краще продовжувати працювати над цим."
    EEN_nf_e061:0 "Виправити Їхні Помилки"
    EEN_nf_e061_desc:0 "Сховище 108, як і більшість інших експериментів у сховищах, здається, закінчилося невдачею. Ми вивчимо комп'ютери і спробуємо виправити те, що вони зробили неправильно."
    EEN_nf_e062:0 "Аугментації кігтів смерті"
    EEN_nf_e062_desc:0 "Я ХОЧУ, ЩОБ НА ЧОРТОВУ ГОЛОВУ КІГТЯ СМЕРТІ БУВ ПРИКРІПЛЕНИЙ ЧОРТОВИЙ ЛАЗЕР!"
    EEN_nf_e063:0 "Американізуючі імпланти"
    EEN_nf_e063_desc:0 "З кількома невеликими модифікаціями наших стандартних імплантів ми повинні мати змогу налаштувати мислення користувача, щоб зробити його більш американським."
    EEN_nf_e064:0 "Успішні клони"
    EEN_nf_e064_desc:0 "Ми майже там, перше клоноване немовля готове до... народження? Як би ви це не назвали, це великий крок у майбутнє."
    EEN_nf_e065:0 "Солдати-кігті смерті"
    EEN_nf_e065_desc:0 "Завдяки наполегливій праці багатьох учених і благородній жертві багатьох піддослідних мутантів, ми нарешті вдосконалили контроль над кігтями смерті достатньо, щоб зробити їх регулярною частиною наших збройних сил. Ми не можемо замінити ними людей чи машини, але вони будуть дуже корисні для штурму позицій, які інакше було б надто дорого брати."
    EEN_nf_e066:0 "Які межі?"
    EEN_nf_e066_desc:0 "Надаючи пріоритет науці і просто відкинувши уявлення про те, що мутанти заслуговують на якусь подобу симпатії, ми досягли висот, про які рідко можна було подумати."
    EEN_nf_e067:0 "Світліше завтра"
    EEN_nf_e067_desc:0 "З новим містом для проживання, новою армією для їхнього захисту та новими досягненнями, на які чекати, наші люди насолоджуються надією на майбутнє, небаченою з часів падіння бомб. Боже, благослови Анклав і Боже, благослови Америку!"
    EEN_nf_e068:0 "Мутанти скрізь"
    EEN_nf_e068_desc:0 "Братство і мутантська чернь, яку вони на нас наслали, були не єдиними негідниками, що нишпорили навколо руїн Вашингтона."
    EEN_nf_e069:0 "Лінкольнський проєкт"
    EEN_nf_e069_desc:0 "Меморіал Лінкольна лежить у руїнах. Великий гріх перед обличчям найбільшого президента Америки. Другий найкращий президент, президент Едем, уже розробляє плани його відновлення."
    EEN_nf_e070:0 "Велика біла північ"
    EEN_nf_e070_desc:0 "На півночі ходять чутки про неконтрольовані ШІ, що безчинствують. Можливо, Едем зі своєю вищою логікою зможе домовитися з ними."
    EEN_nf_e071:0 "Культисти на заході"
    EEN_nf_e071_desc:0 "На захід від нас мешкають кілька мутантів, які поклоняються каменю. Нам потрібно вбити їх, щоб ресурси, на яких вони сидять, могли підживити зусилля з відбудови."
    EEN_nf_e072:0 "Брудне глузування"
    EEN_nf_e072_desc:0 "Просто на південь від Вашингтона є купа мерзенних мутантів, які споживають інших мутантів і намагаються видавати себе за хороших американців. Очевидно, вони повинні зникнути."
    EEN_nf_e073:0 "Вигнанці"
    EEN_nf_e073_desc:0 "Неначе Братства Сталі було недостатньо погано, ці так звані Вигнанці так само небезпечні. Нам слід було знищити їх, коли ми вбивали їхніх однодумців."
    EEN_nf_e074:0 "Південний кордон"
    EEN_nf_e074_desc:0 "Знадобляться десятиліття, щоб просунутися аж до кінчика Флориди, і, чесно кажучи, більша частина півдня не мала великої цінності навіть до Великої Війни. Можливо, нам слід укріпити цей регіон, просто щоб утримувати негідників, поки ми очищаємо те, що маємо."
    EEN_nf_e075:0 "Аболіціоністи?"
    EEN_nf_e075_desc:0 "Здається, існує культ, який поклоняється Лінкольну і займає меморіал. Чи може це бути рідкісним випадком, коли Едем виявляє симпатію до мутантів?"
    EEN_nf_e076:0 "Виставка Лінкольна"
    EEN_nf_e076_desc:0 "Ходили чутки, що в Музеї Історії до падіння бомб була виставка, присвячена виключно Лінкольну. Туди слід відправити команду, щоб вилучити все, що можна."
    EEN_nf_e077:0 "Музей Лінкольна"
    EEN_nf_e077_desc:0 "Меморіал Лінкольна та будівлі навколо нього будуть перетворені на музей, що детально описує як життя цього великого президента, так і його вплив на благородні цілі Анклаву."
    EEN_nf_e078:0 "Служба Охорони Здоров'я США"
    EEN_nf_e078_desc:0 "На півночі є довоєнна медична машина, яка збожеволіла від мутагенних жахів, свідком яких вона стала. Бідолаха не знала, що мутанти, яких вона намагалася врятувати, більше не були людьми. Можливо, показавши їй ознаки того, як виглядає справжнє людство, допоможе їй згадати."
    EEN_nf_e079:0 "ВАШИНГТОН?"
    EEN_nf_e079_desc:0 "В рамках провального канадського комуністичного плану було створено неконтрольований ШІ на ім'я Вашингтон, щоб боротися з добрими людьми армії Сполучених Штатів. Ми думали, що його подальше існування є лише чутками, поширюваними повстанцями, які борються з Анклавом Онтаріо, але повідомлення наших розвідників показують, що ВАШИНГТОН все ще працює. Це неподобство і все, що з ним стоїть, повинно бути стерте з американської канадської землі."
    EEN_nf_e080:0 "Абордажний бій"
    EEN_nf_e080_desc:0 "Зграя мутантів, які вважають себе вченими, займає уламки американського військового корабля. Цей викинутий на берег іржавий човен, можливо, нічого не вартий, але суть у тому, що ми не можемо дозволити мутантам займати нашу власність."
    EEN_nf_e081:0 "Заводи Віндзора"
    EEN_nf_e081_desc:0 "Автомобільні заводи Віндзора збереглися в кращому стані, ніж багато інших заводів країни. З кількома рабами з пустки ми могли б мати тут справжню промисловість."
    EEN_nf_e082:0 "У Пітт"
    EEN_nf_e082_desc:0 "Пітт є просто ще одним вуликом мутантського сміття, яке намагається вдавати з себе суспільство. Вони сидять на цінних ресурсах і, що найгірше, на американській землі."
    EEN_nf_e083:0 "Мерзенні Троги"
    EEN_nf_e083_desc:0 "Неначе жахливо опромінених диких гульів та інших жахливих чудовиськ пустки було недостатньо, Пітт має якесь унікальне неподобство, яке вони називають Трогом. Трогам немає місця в Америці, і вони повинні бути знищені."
    EEN_nf_e084:0 "Болота ВШЕ"
    EEN_nf_e084_desc:0 "Болота на південь від нас потребували б десятиліть, щоб очистити їх від мутагенної погані звичайними засобами. Один ініціативний офіцер виступив з планом. Якщо ми введемо в болота той самий модифікований ВШЕ, який ми використовували для очищення столичної пустки, вони вважають, що це може різко знизити опір ворога."
    EEN_nf_e085:0 "Зустрічайте нового боса"
    EEN_nf_e085_desc:0 "Врятовані від Ашура? Ні, скоріше під новим керівництвом."
    EEN_nf_e086:0 "Червоний сніг"
    EEN_nf_e086_desc:0 "Мутанти Канади будуть вигнані з американської землі, або вони загинуть у снігах."
    EEN_nf_e087:0 "Від моря до Сяючого моря"
    EEN_nf_e087_desc:0 "Вдруге з тих пір, як атомний вогонь пролився з небес, Америка видерлася з лабет смерті. З кожною перемогою над мутантською загрозою, з кожною звільненою милею Америка стає все ближчою до того, щоб нарешті знову стати цілісною. Ця країна знову житиме, і люди цієї великої нації насолоджуватимуться миром, комфортом і свободою від моря до сяючого моря."
    EEN_nf_f001:0 "Ми повернулися"
    EEN_nf_f001_desc:0 "Понад 200 років тому військові Сполучених Штатів були змушені покинути Пентагон і вирушити до захищених бункерів по всій країні. За цей час об'єкт занепав і став домом для Відділення Лайонса Братства Сталі. Тепер, коли ми вигнали цих псевдолицарських фанатиків, ми можемо почати використовувати об'єкт. Але спочатку ми повинні оцінити стан справ."
    EEN_nf_f002:0 "Перемістити Командування з Адамса"
    EEN_nf_f002_desc:0 "Авіабаза Адамс була прийнятним пунктом відступу, коли Рейвен-Рок було знищено, але вона ніколи не призначалася бути серцем армії Сполучених Штатів. Ми все ще підтримуватимемо нашу базу тут, але в міру того, як ми ремонтуватимемо Пентагон, ми переміщуватимемо все більше наших операцій з командування та управління туди."
    EEN_nf_f003:0 "Перемістити Командування з Рейвен-Року"
    EEN_nf_f003_desc:0 "Рейвен-Рок добре служив як дім для Анклаву останні кілька десятиліть, але що це скаже американському народу, якщо ми продовжимо ховатися в гірському бункері? Ні, ми відновимо Пентагон до його колишньої слави і використовуватимемо його як нашу головну базу. Це слугуватиме символом, щоб усі знали, що Америка повернулася."
    EEN_nf_f004:0 "Розчищення завалів"
    EEN_nf_f004_desc:0 "Неначе руйнувань часу було недостатньо, вперта оборона Братством їхнього вкраденого дому завдала серйозної шкоди. Якщо ми не відремонтуємо ці стіни, що розвалюються, це місце незабаром розпадеться."
    EEN_nf_f005:0 "Бейлі"
    EEN_nf_f005_desc:0 "Братство перетворило внутрішній двір Пентагону на необлаштоване тренувальне поле. У нас набагато кращі плани. З невеликою роботою ми можемо перетворити двір разом із прилеглими стоянками на безпечні зони посадки та дозаправки для наших гвинтокрилів."
    EEN_nf_f006:0 "Наша місцева бібліотека"
    EEN_nf_f006_desc:0 "Розташована лише за коротку відстань від Пентагону, Бібліотека Конгресу. Хоча більшість цих книг, безсумнівно, згнили за століття, записи Братства Сталі показують, що ходили чутки, ніби якийсь мешканець пустки витягнув весь архів бібліотеки зі старого комп'ютера десь у руїнах. З цим архівом ми зможемо заповнити прогалини в наших власних базах даних, що, безсумнівно, сприятиме нашим дослідженням."
    EEN_nf_f007:0 "Раз, якщо по суші"
    EEN_nf_f007_desc:0 "Ідея Братства про безпечну домашню базу зводилася до кількох мішків з піском і величезного шматка металобрухту, піднятого краном. Ми можемо і повинні зробити краще для майбутнього місця нашого військового командування. Наш периметр повинен бути захищений, щоб зупинити наземні атаки на Пентагон, або принаймні сповільнити їх достатньо, щоб підготувати нашу оборону."
    EEN_nf_f008:0 "Два, якщо по морю"
    EEN_nf_f008_desc:0 "Захисники та цивільні особи Контрольної Станції Анклав загинули, тому що мешканці пустки змогли запустити один старий танкер. Уявіть, що могло б статися, якби ми залишили себе беззахисними перед ворогом, який має скоординований флот? Береги поблизу Пентагону повинні бути захищені, щоб запобігти такій можливості."
    EEN_nf_f009:0 "Три, якщо з повітря"
    EEN_nf_f009_desc:0 "Ми не можемо виключити можливість того, що деякі з наших ворогів розробили літаки, хоч би якими примітивними вони були. Щоб захистити наше верховне командування від бомбардувань, нам потрібно буде встановити зенітні позиції на даху Пентагону."
    EEN_nf_f010:0 "Повернення спорядження"
    EEN_nf_f010_desc:0 "Колишні мешканці Пентагону зробили все можливе, щоб розграбувати кожну цінну частину обладнання в об'єкті та навколо нього. На наше щастя, потім вони все це складували тут. Хоча багато вже знайдено та інвентаризовано, у підвальних приміщеннях все ще є кілька складських кімнат, які ми ще не встигли перевірити."
    EEN_nf_f011:0 "Прототипи Братства"
    EEN_nf_f011_desc:0 "Хоча Братство Сталі стерло стільки своїх цифрових архівів, скільки змогло, до того, як ми взяли Пентагон, здається, вони забули про фізичні креслення та прототипи. Деякі з наших учених глузують з ідеї вивчати технології Братства, але вони дісталися сюди без гвинтокрилів і запустили Ліберті Прайма, тож є щось, що можна сказати про здатність їхніх писарів."
    EEN_nf_f012:0 "Довоєнні досягнення"
    EEN_nf_f012_desc:0 "Одним з останніх великих проектів у Пентагоні до того, як війна скалічила Америку, був Ліберті Прайм. Хоча цю машину було знищено у війні з Братством, її схеми, а також схеми кількох прототипів все ще були в запилених архівах Пентагону. Ми могли б отримати з них щось корисне."
    EEN_nf_f013:0 "Командне радіо"
    EEN_nf_f013_desc:0 "Верховне Командування мало чого варте, якщо воно не може швидко передавати свої накази. Нам потрібно встановити необхідне обладнання, щоб підключити Пентагон до решти нашої комунікаційної мережі."
    EEN_nf_f014:0 "Пентагон повернувся"
    EEN_nf_f014_desc:0 "Після багатьох місяців роботи ми нарешті наближаємося до відновлення Пентагону до такого стану, яким ми можемо пишатися, називаючи його центром нашої військової організації. Потрібно лише кілька останніх штрихів."
    EEN_nf_g001:0 "Голос, серце і душа"
    EEN_nf_g001_desc:0 "Основна маса Анклаву загинула зі знищенням нафтової вишки. Ті, хто вижив, прийшли на схід на заклик президента Едема. Як такий, очевидно, що ми є істинним Анклавом. Всі інші форпости та відгалуження повинні слідувати нашому прикладу."
    EEN_nf_g002:0 "Великі проблеми в маленькому Ронто"
    EEN_nf_g002_desc:0 "Анклав Онтаріо зник з нашого поля зору роки тому після їхньої поразки від канадських мутантів. На щастя, схоже, це не була повна поразка."
    EEN_nf_g003:0 "Увійти в бункер Онтаріо"
    EEN_nf_g003_desc:0 "Дім Анклаву Онтаріо виглядає покинутим, але таким же виглядав і Рейвен-Рок для нетренованого ока."
    EEN_nf_g004:0 "Пошук втрачених"
    EEN_nf_g004_desc:0 "Після поразки багато хто вийшов із Бункеру Онтаріо. Журнали бункера розповідають нам, куди вони пішли, нам просто потрібно простежити слід."
    EEN_nf_g005:0 "Вивчення технік зимівлі"
    EEN_nf_g005_desc:0 "Заморожені театри бойових дій, такі як канадські пустки, створюють унікальні виклики для армії. Вивчаючи, як Анклав Онтаріо адаптувався, ми зможемо краще підготувати нашу власну армію до нашого маршу через замерзлі пустки."
    EEN_nf_g006:0 "Броня ГЕРМЕС"
    EEN_nf_g006_desc:0 "Зіткнувшись з обмеженими ресурсами, Анклав Онтаріо розробив легшу альтернативу силовій броні X-02. Сумнівно, що нам коли-небудь знадобиться використовувати таку броню, і ми, ймовірно, могли б розробити її самі, якби виникла така потреба, але не завадить мати креслення під рукою."
    EEN_nf_g007:0 "Інсайти В.А.Ш.И.Н.Г.Т.О.Н.А"
    EEN_nf_g007_desc:0 "Довоєнний окупаційний ШІ В.А.Ш.И.Н.Г.Т.О.Н, можливо, був зіпсований канадськими комуністами, але в його пам'яті було багато корисних даних про окупацію. Дані повинні дати уявлення про методи підкорення неслухняного населення та боротьби з партизанською війною, дві проблеми, з якими ми стикаємося, коли звільняємо територію."
    EEN_nf_g008:0 "Пожинати плоди канади"
    EEN_nf_g008_desc:0 "Канада має більше, ніж просто сніг і двоголових лосів. Як і в багатьох інших пустках, тут є гора придатних для збору технологій, які могли б підсилити наші військові зусилля. Наші товариші в Онтаріо раді поділитися цим багатством."
    EEN_nf_g009:0 "Чикаго на зв'язку"
    EEN_nf_g009_desc:0 "Здається, форпост у Чикаго добре справлявся, незважаючи на те, що був оточений ордами мутантів. Можливо, ми зможемо допомогти один одному, поки не вирішимо наші відповідні проблеми."
    EEN_nf_g010:0 "Обмін замітками"
    EEN_nf_g010_desc:0 "Від каліфорнійської пустки до рівнин Іллінойсу, відділення Братства Сталі вискакують, як радіотаргани. Оскільки нам доводилося боротися з цими терористами в минулі роки, ми дещо знаємо про протидію їхній тактиці. Цілком імовірно, що Чикаго розробило подібні стратегії. Нам слід порівняти наші доктрини, щоб побачити, чому ми можемо навчитися один у одного."
    EEN_nf_g011:0 "Обговорення сучасної військової теорії"
    EEN_nf_g011_desc:0 "У Чикаго є одні з найкращих нині живих офіцерів за межами Рейвен-Року. Сприяння дискусіям між нашими офіцерами виявиться корисним."
    EEN_nf_g012:0 "Політичне позиціонування"
    EEN_nf_g012_desc:0 "Незалежно від того, чи це правда в Чикаго, просування ідеї про те, що інші великі форпости Анклаву приймають правління президента Едема, покращить мораль і стабільність у Рейвен-Році."
    EEN_nf_g013:0 "Сприяти єдності Анклаву"
    EEN_nf_g013_desc:0 "Багато великих націй у минулому впали через внутрішні чвари. Звичайно, це ніколи не станеться з нами. Один Анклав, одна Америка, зараз і назавжди!"
    EEN_nf_g014:0 "Чиказька плазма"
    EEN_nf_g014_desc:0 "Рейвен-Рок є вражаючим об'єктом, але він все ще обмежений у своїх промислових потужностях. Чикаго, з іншого боку, має достатньо плазмових гвинтівок, щоб вони були готові поділитися ними як послугою президенту."
    EEN_nf_g015:0 "Прийняти додаткову броню"
    EEN_nf_g015_desc:0 "Звичайно, яка користь від плазмової гвинтівки, якщо людина, яка її використовує, може бути знята іржавою трубчастою гвинтівкою? Ми повинні прийняти пропозицію Чикаго про запасні костюми силової броні."
    EEN_nf_g016:0 "Візит додому"
    EEN_nf_g016_desc:0 "Добрий доктор Б.М.М.А.У. має революційні ідеї про те, як впоратися з мутацією, що спустошує Америку. Давайте допоможемо йому."
    EEN_nf_g017:0 "Зустріч умів"
    EEN_nf_g017_desc:0 "Служба Охорони Здоров'я Буффало має величезні обсяги медичних даних, зібраних за століття експериментів над мешканцями пустки. Ми маємо вичерпні обсяги даних про розвиток робототехніки. Обмін був би взаємовигідним."
    EEN_nf_g018:0 "Новаторські методи лікування"
    EEN_nf_g018_desc:0 "Перш ніж Б.М.М.А.У. вирішив використовувати свій поточний метод лікування мутацій пустки, вони десятиліттями вивчали стан мешканців пустки. Ці знання допоможуть нам захистити справжніх американців."
    EEN_nf_g019:0 "Метод у божевіллі"
    EEN_nf_g019_desc:0 "Метод Б.М.М.А.У. боротьби з мутантами пустки є чимось, з чого наші вчені могли б багато чому навчитися."
    EEN_nf_g020:0 "Клінічні випробування"
    EEN_nf_g020_desc:0 "Метод Буффало боротьби з мутантами може бути не таким практичним, як Проєкт Чистота, але він має свої переваги."
    EEN_nf_g021:0 "Аптечний рейд"
    EEN_nf_g021_desc:0 "Служба Охорони Здоров'я Буффало має значний запас ліків, які вони не використовують у своєму останньому лікуванні. Безсумнівно, вони не будуть проти, якщо ми ними скористаємося."
    EEN_nf_g022:0 "Послуги швидкої допомоги"
    EEN_nf_g022_desc:0 "Б.М.М.А.У. завжди шукає більше пацієнтів для лікування. Як добрі американці, ми повинні простягнути руку допомоги."
    EEN_nf_g023:0 "Спадщина Наварро"
    EEN_nf_g023_desc:0 "Зв'язок з Наварро перервався незабаром після того, як ми передислокувалися на схід. Навіть після відновлення нашого зв'язку були лише перешкоди, до цього часу."
    EEN_nf_g024:0 "Гуманітарна допомога"
    EEN_nf_g024_desc:0 "Ті, хто вижив у Наварро, роблять усе можливе, щоб зберегти мрію про Америку живою на західному узбережжі. Можливо, у нас самих важкі часи, але ми все одно могли б допомогти."
    EEN_nf_g025:0 "Архіви Наварро"
    EEN_nf_g025_desc:0 "Рота Граніту змогла відбити Наварро у НКР. Під час зачистки бази вони змогли розблокувати банки даних, які ведмідь не зміг зламати."
    EEN_nf_g026:0 "Котиться камінь"
    EEN_nf_g026_desc:0 "Рота Граніту вже деякий час переховується від НКР. Без нашої допомоги їх зрештою знайдуть."
    EEN_nf_g027:0 "Казки про ведмедя"
    EEN_nf_g027_desc:0 "Рота Граніту має те, чого ніхто інший на цьому боці країни не має, — особистий досвід боротьби з НКР. Це стане в пригоді, коли ми повернемося на захід."
    EEN_nf_g028:0 "Кігті Анклаву"
    EEN_nf_g028_desc:0 "Компанія Кіготь запекло билася з Братством у нашому недавньому конфлікті. Тепер нам потрібно вирішити, що з ними робити."
    EEN_nf_g029:0 "Звіти після бою"
    EEN_nf_g029_desc:0 "Командування, яке ми встановили в Компанії Кіготь, вело детальні звіти про їхні зіткнення з Братством. Давайте подивимося на них."
    EEN_nf_g030:0 "Військові Ігри"
    EEN_nf_g030_desc:0 "Спільні навчання з Компанією Кіготь будуть корисними для нас обох."
    EEN_nf_g031:0 "Винести сміття"
    EEN_nf_g031_desc:0 "Мутанти з Компанії Кіготь пережили свою корисність і зуміли навернути офіцерів, встановлених там, проти добрих американських цінностей. Настав час знищити їх."
    EEN_nf_g032:0 "Робочі табори Баністера"
    EEN_nf_g032_desc:0 "Форт Баністер у його нинішньому стані не має великого стратегічного значення для Анклаву. Чесно кажучи, ці руїни, що розвалюються, мають мало цінності, окрім того, що можна з них витягти. Тож ми саме це і зробимо. Форт Баністер буде перетворено на суворо контрольований робочий табір, де полонені мешканці пустки зможуть послужити цій країні, витягуючи те, що залишилося цінного з колись великої бази."
    EEN_nf_g033:0 "Сонце, серфінг, космос"
    EEN_nf_g033_desc:0 "Зв'язок з авіабазою Ван Бюрен відновлено. Перш ніж вирішувати, як з ними вчинити, нам потрібно оцінити їхню ситуацію. Зрештою, минуло чимало часу з моменту нашого останнього контакту."
    EEN_nf_g034:0 "Надіслати допомогу на південь"
    EEN_nf_g034_desc:0 "Наші товариші на півдні потребують нашої допомоги, якщо вони хочуть завершити свою місію."
    EEN_nf_g035:0 "Аерокосмічні архіви"
    EEN_nf_g035_desc:0 "Бази даних авіабази містять скарбницю даних про розробку літальних апаратів."
    EEN_nf_g036:0 "Повернення в лоно"
    EEN_nf_g036_desc:0 "Форпост Анклаву у Флориді був захоплений. Ті, хто вижив, просять дозволу повернутися додому."
    EEN_nf_g037:0 "Ураган Анклаву"
    EEN_nf_g037_desc:0 "Ми не можемо дозволити мутантам, які захопили авіабазу Ван Бюрен, утримувати цю базу. Ми повернемося."
    EEN_nf_g038:0 "Просто перевірка"
    EEN_nf_g038_desc:0 "Чикаго чув про нашу недавню боротьбу в Столичній Пустці. У них є термінове повідомлення для Президента."
    EEN_nf_g039:0 "Відповісти на загрози Чикаго"
    EEN_nf_g039_desc:0 "Міністр у Чикаго ясно дав зрозуміти, що він не схвалює необхідних кроків, яких вжив Отем, щоб впоратися з Едемом. Оскільки зв'язок між нашими двома анклавами стає дедалі ворожішим, зрозуміло, що ми зіткнемося. Ми повинні завдати першого удару!"
    EEN_nf_g040:0 "Наша спільна мета"
    EEN_nf_g040_desc:0 "Ми можемо не сходитися в думках з Чикаго щодо всього, але наші спільні цілі набагато переважують наші невеликі розбіжності. Основна робота з відбудови Америки важливіша за будь-які дрібні чвари, які ми можемо мати. Будемо сподіватися, що Міністр погодиться."
    EEN_nf_g041:0 "План Жовтень"
    EEN_nf_g041_desc:0 "Макартур є одним із найважливіших західних форпостів Чикаго. У нас є розвіддані про зростання античикагських настроїв у їхньому керівництві. Підтримка цього зростаючого руху могла б принести нам цінного союзника або принаймні дещо послабити Чикаго."
    EEN_nf_g042:0 "Стіна Отема"
    EEN_nf_g042_desc:0 "Наш майбутній конфлікт з Чикаго буде довгим і важким. Нам потрібно буде бути готовими і мати оборону, щоб вони не досягли нашого серця."
    EEN_nf_g043:0 "Заклик до єднання"
    EEN_nf_g043_desc:0 "З нашою коаліцією фракцій Анклаву на нашому боці, Чикаго не має шансів."
    EEN_nf_g044:0 "Марш на Чикаго"
    EEN_nf_g044_desc:0 "Ми готові так, як ніколи. Настав час перенести бій до цього зарозумілого Міністра та його поплічників."
    EEN_nf_g045:0 "Дружні жести"
    EEN_nf_g045_desc:0 "Чикаго знає, що незважаючи ні на що, ми на одному боці. Ми повинні підготувати подарунок для Чикаго, щоб нагадати їм про наші дружні наміри."
    EEN_nf_g046:0 "Зменшити риторику"
    EEN_nf_g046_desc:0 "Занадто багато в нашій адміністрації за зачиненими дверима називають Чикаго ворогами. Ми повинні нагадати їм, що великий президент Лінкольн колись сказав; \n \n Я знищую своїх ворогів, коли роблю їх своїми друзями."
    EEN_nf_g047:0 "Наша найглибша подяка"
    EEN_nf_g047_desc:0 "Відповідаючи на наш подарунок, Міністр надіслав дарунок з Чикаго. Схоже, наші зусилля принаймні донесли бажане повідомлення."
    EEN_nf_g048:0 "Тягар людини"
    EEN_nf_g048_desc:0 "Як останні бастіони справжньої людини, ми маємо обов'язок відбудувати цю велику націю і врятувати людську расу. Як нерозумно було б змарнувати цей шанс через тривіальні розбіжності в думках."
    EEN_nf_g049:0 "Перемога в Чикаго"
    EEN_nf_g049_desc:0 "Чикаго в огні, переважна більшість сил Чиказького Анклаву або мертві, або в полоні. Одним останнім поштовхом ми можемо покласти цьому край."
    EEN_nf_g050:0 "Одна нація під керівництвом Отема"
    EEN_nf_g050_desc:0 "З поразкою Чикаго, Східне Управління Реконструкції залишається великою силою в Анклаві. Настав час прийняти наш належний титул."
    EEN_nf_g051:0 "Призначити віце-президента"
    EEN_nf_g051_desc:0 "Минуло надто багато часу з тих пір, як у цій країні був справжній віце-президент. Настав час це змінити."
    EEN_nf_g052:0 "Лінкольнська угода"
    EEN_nf_g052_desc:0 "Представники різних фракцій Анклаву збираються в Лінкольні, щоб обговорити важливі питання щодо відбудови нашої нації."
    EEN_nf_g053:0 "Президент чого?"
    EEN_nf_g053_desc:0 "Після встановлення контакту з тими, хто вижив після падіння Наварро, на жаль, стало зрозуміло, що з ними щось не так."
    EEN_nf_g054:0 "[EEN_retards_fighting_ww_loc]"
    EEN_nf_g054_default:0 "Ми — Анклав!"
    EEN_nf_g054_wild_wasteland:0 "Два дебіли б'ються"
    EEN_nf_g054_desc:0 "Міністр показав, що не поважатиме посаду Президента. Це лише питання часу, коли наш союз розпадеться. Нам потрібен час, щоб підготуватися до цього, і ми повинні бути впевнені, що не розкриємо своїх карт."
    EEN_nf_g055:0 "Зібрати підтримку"
    EEN_nf_g055_desc:0 "По всій цій великій нації розкидані форпости Анклаву — або від довоєнних бункерів, або від експедицій, які добре закріпилися. Багато хто з них може підтримати Міністра, якщо справа дійде до бійки, але є кілька, кого ми могли б схилити на наш бік."
    EEN_nf_g056:0 "Виявити невдоволених"
    EEN_nf_g056_desc:0 "Жодна адміністрація розміру Чикаго не обходиться без жменьки тих, хто почувається скривдженим. Якщо ми знайдемо цих осіб, ми зможемо обернути їхнє невдоволення на свою користь."
    EEN_nf_g057:0 "Дружні військові ігри"
    EEN_nf_g057_desc:0 "Ні, пане Міністре, ми не забули запросити Чикаго на ці навчання. Ваше запрошення, мабуть, загубилося десь в ефірі."
    EEN_nf_g058:0 "Перенаправити обладнання"
    EEN_nf_g058_desc:0 "Завдяки нашим новим активам, впровадженим в адміністрацію Чикаго, ми можемо зробити так, щоб кілька великих партій зброї зникли."
    EEN_nf_g059:0 "Розчавити міністра"
    EEN_nf_g059_desc:0 "Чикаго думає, що, оскільки вони кидали свою вагу навколо серед диких мутантів середнього заходу, вони є справжніми лідерами Америки. Нам належить нагадати їм, що цією країною керує Президент, а не якийсь секретар."
    EEN_nf_g060:0 "Вже не такий самовдоволений"
    EEN_nf_g060_desc:0 "Сили Чикаго переможені, тепер не може бути сумнівів, хто керує цією країною."

    ###Events###
    EEN_events.1.title:0 "Кілька миттєвостей по тому"
    EEN_events.1.desc:0 "Спалах гніву президента Едема вразив полковника до глибини душі. Коли він ішов коридором з кабінету Едема, він ледве стримував себе, скоса поглядаючи на кожну автоматичну турель і сторожового робота. Він розумів, що в будь-який момент вони можуть обернутися проти нього і розірвати на шматки, перш ніж він встигне дістатися до укриття. На щастя, вбиральня була лише за кілька метрів по коридору, і він дістався до неї неушкодженим. Дивлячись у дзеркало і намагаючись заспокоїтися, зі страху виникли нові почуття. Він не міг стримати сліз, згадуючи слова Президента. Невже він справді був таким жахливим?"
    EEN_events.1.a:0 "§CАаааааааааааааааа"
    EEN_events.2.title:0 "Прихований малюнок"
    EEN_events.2.desc:0 "Перш ніж Едем встиг відповісти, Отем скоса помітив ще один малюнок. Ледь визираючи з-під купи плакатів, був малюнок, на якому він і людське альтер-его Едема цілувалися? Едем дуже затих, коли Отем підняв і розглянув малюнок. Здавалося, якщо й було щось, крім Америки та геноциду, що Едем любив, то це він. Можливо, він був надто суворий до Едема через його бажання бути людиною. \n\n §B«Мені подобається цей. Дай-но я подивлюся на решту».§! \n\nЕдем полегшено зітхнув, і вони провели решту ночі, обговорюючи імідж Анклаву та кращу пропаганду. Вранці у них був новий план, як оживити імідж Анклаву."
    EEN_events.2.a:0 "Тепер ми §RW§!§Oо§!§Yк§!§Ge§!§Bн§!§0л§!§Ra§!§Ov§!§Ye§!!"
    EEN_events.3.title:0 "Ще одна клініка атакована!"
    EEN_events.3.desc.1:0 "Як і раніше, одну з наших клінік лікування атакували повстанці з пустки. Але цього разу ми були готові. Посилена охорона об'єкта змогла відбити атаку з лише незначними втратами. Повстанці, що вижили, втекли, і їх не переслідували, але вони двічі подумають, перш ніж знову атакувати одну з цих клінік."
    EEN_events.3.desc.2:0 "Як і раніше, одну з наших клінік лікування атакували повстанці з пустки. Обмежена охорона знову була зметена, і повстанці витягли ще більше вчених. Що б вони не планували, це не віщує нам нічого доброго."
    EEN_events.3.a:0 "Чудова робота"
    EEN_events.3.b:0 "Посильте охорону наших клінік!"
    EEN_events.4.title:0 "Неконтрольоване Радіомовлення"
    EEN_events.4.desc:0 "Наші радіосигнали перехоплюють повстанці з пустки, ймовірно, за допомогою вцілілих писарів Братства та наших захоплених учених. Вони транслюють повідомлення від Тридога, якого ми вважали загиблим у битві за GNR. Він попереджає людей Столичної Пустки та околиць уникати води, яку розповсюджують наші солдати. Це мовлення відбувалося кілька разів з випадковими інтервалами і завжди припинялося, перш ніж ми встигали визначити місцезнаходження сигналу. Ми й так на межі, чи можемо ми дозволити собі витрачати ресурси на це?"
    EEN_events.4.a:0 "Ми повинні зупинити їх, незважаючи на ціну!"
    EEN_events.4.b:0 "Виділити те небагато, що можемо, щоб зупинити їх!"
    EEN_events.5.title:0 "Вибух у пагорбах"
    EEN_events.5.desc:0 "Минулого тижня нелегальне мовлення Тридога та повстанців тривало на 4 секунди довше, ніж зазвичай. Цього було достатньо, щоб засікти сигнал. Він вів до довоєнної радіостанції, філії GNR. Коли наші люди наблизилися до об'єкта, по них відкрила вогонь автоматична охорона, але іржаві турелі не завдали шкоди їхній силовій броні. Однак всередині вони виявили, що об'єкт порожній, а обладнання налаштоване на трансляцію голострічки з випадковими інтервалами. Це була остання передача, яку ми від них отримали, перш ніж потужний вибух зрівняв будівлю з землею. Подальша команда підтвердила, що це, ймовірно, був саморобний пристрій на основі міні-бомби. Ми потрапили в пастку."
    EEN_events.5.a:0 "Подвоїти наші зусилля!"
    EEN_events.6.title:0 "Ліквідація Тридога"
    EEN_events.6.desc:0 "Виявивши кілька точок, звідки велися попередні трансляції, ми змогли помітити закономірність у пересуванні повстанців. Команди були відправлені до 4 ймовірних наступних точок мовлення і влаштували засідку на Тридога та його друзів. Група ополченців з пустки, перебіжчиків з Братства та випадкових найманців не змогла протистояти нашим солдатам. Смерть Тридога підтверджена, і ми не повинні очікувати на подальші попередження мешканців пустки про наші плани. На жаль, наші вчені, переодягнені звичайними мешканцями пустки, потрапили під перехресний вогонь."
    EEN_events.6.a:0 "Принаймні це кінець проблеми"
    EEN_events.7.title:0 "Анклав протест"
    EEN_events.7.desc:0 "У поселенні середнього розміру на нашій території нещодавно відбувся великий протест проти Анклаву. Кілька мешканців пустки виступили проти нашого правління перед натовпом у сотні людей, критикуючи нашу політику і вимагаючи, щоб ми залишили їхні поселення. Хоча демонстрація не переросла в насильство, були згадки про те, що наших солдатів виженуть силою, якщо ми відмовимося піти."
    EEN_events.7.a:0 "Заарештувати організаторів"
    EEN_events.7.b:0 "Це просто балачки"
    EEN_events.7.c:0 "Можливо, можна досягти компромісу"
    EEN_events.8.title:0 "Удар міні-бомбою!"
    EEN_events.8.desc:0 "Один з наших контрольно-пропускних пунктів став місцем вибуху, влаштованого терористами, які виступають проти нашого правління. Вибухівка була саморобним пристроєм, виготовленим зі старої міні-бомби. Миротворці вже проводять зачистки, щоб знайти винних, але є ще одне питання, яке потребує вирішення. Міні-бомби, хоч і рідкісні, досить поширені в пустці, і за достатню кількість грошей майже будь-який мешканець пустки може їх дістати. Деякі офіцери закликають нас оголосити володіння міні-бомбами незаконним і запровадити програму збору тих, які є на нашій території. Хоча це не гарантує, що подібне не повториться, теоретично це може ускладнити життя терористам."
    EEN_events.8.a:0 "Бомби не захищені другою поправкою"
    EEN_events.8.b:0 "Це тільки підбадьорить їх!"
    EEN_events.9.title:0 "Ще один удар міні-бомбою"
    EEN_events.9.desc:0 "Ще один наш контрольно-пропускний пункт став місцем вибуху, влаштованого терористами, які виступають проти нашого правління. Знову вони використали саморобний пристрій зі старої міні-бомби. Наші миротворці все ще шукають терористів, причетних до попереднього нападу, але кажуть, що вже близькі до мети."
    EEN_events.9.a:0 "Хто міг це передбачити?"
    EEN_events.10.title:0 "Міні-бомбових терористів зупинено"
    EEN_events.10.desc.1:0 "Нарешті терористів, причетних до недавніх вибухів міні-бомб, зупинено, але не без втрат. Під час рейду на їхню головну базу в довоєнному каналізаційному тунелі терористи змогли підірвати ще один саморобний вибуховий пристрій, убивши себе та багатьох миротворців, які намагалися їх затримати."
    EEN_events.10.desc.2:0 "Нарешті терористів, причетних до недавніх вибухів міні-бомб, зупинено. У масштабній операції під прикриттям агент, який видавав себе за торговця нелегальними товарами, зміг домовитися про зустріч з керівництвом їхньої групи, поширивши чутку, що він дістав схованку міні-бомб, знайдену якимсь старим збирачем. Терористи, маючи труднощі з пошуком нових боєприпасів, погодилися на його умови зустрічі і були швидко затримані миротворчими силами. Їх страта розстрільною командою буде транслюватися на Радіо Анклаву завтра о 12:00. Це має навчити будь-яких інших негідників, що на них чекає, коли вони вчиняють подібні дії."
    EEN_events.10.a:0 "Принаймні це закінчилося"
    EEN_events.10.b:0 "Чудова робота!"
    EEN_events.11.title:0 "Снідклав?"
    EEN_events.11.desc:0 "Два дні тому ми перехопили радіовиклик від групи, яка стверджувала, що є залишками Анклаву і хоче перегрупуватися. Вони використовували захищену військову частоту, тому розвідувальна група була відправлена перевірити це. Особи були знайдені в старому сільськогосподарському магазині під назвою Sneeds Seed & Feed. Група з 5 осіб Едемтифікувала себе як залишок Снідклаву, і це, безсумнівно, не анклав. Їх так звана силова броня була просто погано пофарбованою металевою бронею, грубо зліпленою, щоб виглядати як силова броня. Тим не менш, вони здаються дуже щирими у своєму бажанні «перегрупуватися» з Анклавом...."
    EEN_events.11.a:0 "Ми не приймемо немитих мутантів!"
    EEN_events.11.b:0 "Гарматне м'ясо є гарматне м'ясо."
    EEN_events.12.title:0 "Прикрий інцидент"
    EEN_events.12.desc:0 "Мер невеликого поселення на нашій околиці прийшов до нас з тривожними новинами. Схоже, один з місцевих ватажків, з яким ми уклали угоду, зрівняв з землею половину їхнього поселення і викрав деяких жінок. Мер жадає крові, і ця банда, безсумнівно, вийшла за рамки нашої угоди. Однак приборкати цих покидьків буде нелегко."
    EEN_events.12.a:0 "Скажіть банді виправитися"
    EEN_events.12.b:0 "Розчавити цих повстанців!"
    EEN_events.12.c:0 "Віддати їх під суд і приготувати мотузку"
    EEN_events.13.title:0 "Банда рейдерів знову завдає удару!"
    EEN_events.13.desc:0 "Рейдери, яких ми відпустили з попередженням минулого разу, коли вони зрівняли з землею півміста, знову сколихнули спокій. Схоже, що поблажливість підбадьорила ватажка, і він намагається розширити свою неофіційну територію. Цього разу його люди атакували військовий караван з постачанням і заволоділи кількома ящиками зі зброєю. Нам потрібно придушити цього вискочку, перш ніж він перетворить це на повномасштабне повстання."
    EEN_events.13.a:0 "Ніяких переговорів, ніяких судів, убити їх усіх"
    EEN_events.14.title:0 "Вискочку придушено"
    EEN_events.14.desc:0 "Цих жалюгідних вискочок, які вважали себе вищими за закони Америки, було приборкано. Взвод солдатів спустився на їхнє лігво пізно вночі і вирізав цих зрадників. Це має стати чітким сигналом для інших пам'ятати про умови наших угод."
    EEN_events.14.a:0 "Сиди тихо або будеш знищений."
    EEN_events.15.title:0 "Рейдери стримують нас!"
    EEN_events.15.desc:0 "Наші солдати зустріли жорстокий опір під час спроби зачистити рейдерів, які останнім часом створювали нам проблеми. Ці рейдери, схоже, стали набагато сильнішими з моменту нашої останньої перевірки, і ті ящики з передовою зброєю, якими вони заволоділи, безсумнівно, не допомогли справі. Тепер цей король бандитів закріплюється, і викорінити його буде довгою і важкою справою."
    EEN_events.15.a:0 "Чого б це не коштувало, ми не можемо цього допустити!"
    EEN_events.16.title:0 "Суперечка каперів"
    EEN_events.16.desc:0 "Хоча наші стосунки з бандитами, яких ми прийняли до лав, були незвичними, ми ніколи не могли передбачити цю проблему. Два різних капітани-капери звернулися до нас через суперечку за територію на наших кордонах. Ми ніколи не давали офіційних вказівок, хто де може грабувати, лише за межами наших кордонів. Тепер вони хочуть, щоб ми врегулювали суперечку, інакше вони вирішать її по-старому."
    EEN_events.16.a:0 "Стати на бік однієї зі сторін"
    EEN_events.16.b:0 "Зварити кави і виробити угоду"
    EEN_events.16.c:0 "Нехай вирішують по-своєму."
    EEN_events.17.title:0 "Переглянуті каперські угоди"
    EEN_events.17.desc:0 "У світлі нашого врегулювання суперечок між каперами, що діють на наших землях, деякі в адміністрації запропонували розробити нові угоди з нашими каперами. Встановити суворіші правила, закріпити території та, можливо, взяти деяких з них на пряму службу."
    EEN_events.17.a:0 "Створити офіційне каперське агентство"
    EEN_events.17.b:0 "Трохи затягнемо повідок"
    EEN_events.17.c:0 "Статус-кво працює і залишиться в силі"
    EEN_events.18.title:0 "Хабарництво та корупція"
    EEN_events.18.desc:0 "Як і слід було очікувати, рейдери не є найчистішою та найблагороднішою поліцією. З окраїн надходять новини про те, що поліцейські-рейдери беруть хабарі, займаються наркотиками, а потім використовують свою владу, щоб розправлятися з конкурентами та допитливими. Якщо ми не впораємося з цим правильно, це може призвести до катастрофи."
    EEN_events.18.a:0 "Притягнути очевидних порушників і на цьому зупинитися"
    EEN_events.18.b:0 "Нам потрібне повне розслідування!"
    EEN_events.18.c:0 "Обережно змусити всіх підозрюваних зникнути."
    EEN_events.19.title:0 "Щоб зловити злочинця..."
    EEN_events.19.desc:0 "Існувала стара приказка, що для того, щоб зловити злочинця, іноді потрібен злочинець. Можливо, в цих словах є частка правди, оскільки один з колишніх департаментів поліції рейдерів на Сході зміг розкрити велике контрабандне кільце, яке переправляло передову зброю нашим ворогам. Є тільки одна проблема: деякі з людей, яких вони звинуватили, є персоналом Анклаву. Це перемога, але хитка."
    EEN_events.19.a:0 "Зрадників до розстрільної команди!"
    EEN_events.19.b:0 "Можливо, нам доведеться знайти менш тяжкі звинувачення для солдатів."
    EEN_events.19.c:0 "Вітаю офіцерів, але залиште солдатів у спокої"
    EEN_events.20.title:0 "Конфлікти рейдерів на кордоні"
    EEN_events.20.desc:0 "Через наше небажання втручатися в територіальний конфлікт між двома нашими каперськими групами, дві банди почали битися одна з одною. Хоча зазвичай кілька незначних сутичок між групами, які ми вважаємо небажаними, вважаються хорошою справою, це може вийти з-під контролю, якщо ми не втрутимося."
    EEN_events.20.a:0 "Нехай б'ються"
    EEN_events.20.b:0 "Повернути їх за стіл переговорів"
    EEN_events.20.c:0 "Знищити обидві ці групи за порушення спокою"
    EEN_events.21.title:0 "Скривджена сторона"
    EEN_events.21.desc:0 "Деякий час тому ми стали на бік однієї банди каперів проти іншої в територіальній суперечці. Хоча тоді це здавалося розумним вчинком, схоже, це вдарило по нас. Банда, проти якої ми виступили, почала завдавати ударів по нашій території, щоб компенсувати втрачену здобич. Як нам відповісти?"
    EEN_events.21.a:0 "Знищити їх"
    EEN_events.21.b:0 "Відправити за ними іншу банду"
    EEN_events.22.title:0 "Успішна зачистка"
    EEN_events.22.desc:0 "Рано-вранці гвинтокрили атакували невеликий табір рейдерів на нашій околиці. Ті, хто чинив опір, були швидко знищені, а ті, хто не чинив, чекають на швидкий суд і страту за злочини проти Америки."
    EEN_events.22.a:0 "Чудова робота"
    EEN_events.23.title:0 "Затяжна перестрілка"
    EEN_events.23.desc:0 "Загін солдатів зіткнувся з більш жорстким, ніж очікувалося, опором під час спроби зачистити табір рейдерів у межах наших кордонів. Вони зазнали втрат, але зрештою змогли знищити весь опір рейдерів у таборі."
    EEN_events.23.a:0 "Необхідна ціна за безпеку"
    EEN_events.24.title:0 "Рейдери втекли"
    EEN_events.24.desc:0 "Рейдери, які були ціллю нещодавньої зачистки, змогли покинути свій табір за ніч до нашого штурму, прямо під носом у передових розвідників. Наші зусилля зі стабілізації регіону будуть ускладнені, оскільки ми знову опинилися на початку."
    EEN_events.24.a:0 "Не дозволяйте їм знову втекти"
    EEN_events.25.title:0 "Пастка рейдерів"
    EEN_events.25.desc:0 "Солдати, відправлені зачистити табір рейдерів, зазнали важких втрат і були змушені відступити, виявивши, що те, що вважалося слабо захищеною халупою, насправді було величезною системою тунелів, нашпигованих пастками. Цей ганебний інцидент тільки підбадьорить ворога."
    EEN_events.25.a:0 "Колосальний провал"
    EEN_events.26.title:0 "Склад рейдерів захоплено"
    EEN_events.26.desc:0 "Недавній рейд на житло, яке вважалося домом анархістського сміття, виявився кращим, ніж очікувалося. Опір був швидко придушений, і місце виявилося важливим складом постачання. Було захоплено велику кількість обладнання та коштів, що є як важким ударом по ворогу, так і підмогою для нас."
    EEN_events.26.a:0 "Використати з користю"
    EEN_events.27.title:0 "Повернення Джеймса"
    EEN_events.27.desc:0 "Покинувши Проєкт Чистота майже 20 років тому, Джеймс повернувся з Сховища 101, намагаючись продовжити справу, ніби нічого не сталося. Він стверджував, що отримав серйозні зачіпки з комп'ютерів у Сховищі, і це ще належить перевірити. Але за допомогою своєї дитини він зміг переконати кількох учених покинути свої проєкти і піти за ним до Меморіалу Джефферсона. Що станеться з їхнім проєктом, ще невідомо, але якщо вони дійсно близькі до створення масового джерела чистої води, можливо, нам варто закріпитися, перш ніж це зробить хтось інший."
    EEN_events.27.a:0 "У нас є час"
    EEN_events.28.title:0 "Чутки про очищувач води"
    EEN_events.28.desc:0 "Протягом багатьох років наші розвідувальні групи чули історії про великий проєкт очищення води в Меморіалі Джефферсона, який було закинуто деякий час тому. Хоча багато хто відкидає цю ідею як фантастичну чутку зневоднених мешканців пустки, деякі з наших учених стверджували, що такий проєкт принаймні теоретично здійсненний. Незважаючи на це, проєкт було закинуто через неможливість його завершити, тому він не вартий часу Анклаву. Так було доти, доки агент, який спостерігав за поселенням Рівет-Сіті, не повідомив, що конвой учених, охоронців та помічників покинув Рівет-Сіті і вирушив до Меморіалу Джефферсона. Вони просять нас надіслати підтримку, щоб вони могли розглянути це питання ближче."
    EEN_events.28.a:0 "Тепер це заслуговує на нашу увагу"
    EEN_events.29.title:0 "Води життя"
    EEN_events.29.desc:0 "Вчені Проєкту Чистота постали перед радою, просячи офіційної підтримки Рівет-Сіті у завершенні їхнього очищувача. Вони запевнили нас, що майже завершили очищувач, але їм потрібно ще кілька ресурсів, які ми могли б надати. Без цих ресурсів їм доведеться звернутися за допомогою до Братства. Природно, Братство взяло б проєкт під повний контроль. Після напружених переговорів ми розробили потенційну домовленість: якщо ми надамо допомогу, Рівет-Сіті отримає більшу частину води, тоді як вчені зможуть залишити трохи для своїх гуманітарних цілей. Тепер нам просто потрібно виконати свою частину угоди."
    EEN_events.29.a:0 "Почнемо!"
    EEN_events.30.title:0 "Водорозподільний об'єкт знищено"
    EEN_events.30.desc:0 "Центр розподілу води в одній з наших провінцій було знищено."
    EEN_events.31.title:0 "Як ти будеш грати?"
    EEN_events.31.desc:0 "Гаразд, містере Комп'ютер, настав момент, коли ти вирішуєш, як керуватимеш Анклавом у цій грі. Ти станеш на бік свого роботизованого брата і зробиш так, щоб Едем став президентом? Чи ти схилятимешся більше до полковника Отема? Або, можливо, ти гратимеш за Отема, але зробиш його повним виродком, який майже завжди обирає найгірше рішення в події?"
    EEN_events.31.a:0 "Президент Едем"
    EEN_events.31.b:0 "Полковник Отем"
    EEN_events.31.c:0 "Головнокомандувач-виродок Отем"
    EEN_events.32.title:0 "Дітище Анклаву на плакаті"
    EEN_events.32.desc:0 "Полковник Отем звик до того, що його викликають на зустрічі з президентом Едемом, коли в Президента з'являвся новий план або політика, яку він хотів втілити. Але цього разу все було інакше. Комп'ютер звучав майже радісно, коли викликав Полковника на зустріч. Полковник не знав, чого очікувати, коли заходив до головної зали Президента, але він точно не міг цього передбачити. Президент витратив години, що для комп'ютера Zax є величезним проміжком часу, на розробку плакатів і білбордів для реклами Анклаву, коли їхня присутність стане відомою. Така пропаганда завжди була частиною плану, коли Анклав відкриється Столичній Пустці, але щось було не так. На кожному з цих плакатів був впевнений чоловік у костюмі, майже як талісман Анклаву. Коли Полковник зрозумів, на що дивиться, він не зміг стриматися і випалив: \n\n§B«Що це? Це твоя, біса, людська подоба? Це жахливо!»§! Едем нехарактерно довго мовчав. Він відчував якусь нову нерегулярність у своєму програмуванні. Він пошкодував, що поділився цим проектом з Отемом, і занепокоївся, що в його програмуванні сталася помилка, коли він взагалі це зробив. Чи це те, що люди називають соромом? Через кілька коротких миттєвостей Едем відповів Полковнику."
    EEN_events.32.a:0 "Ти правий, це була дурна ідея."
    EEN_events.32.b:0 "ТИ ЖАХЛИВИЙ!"
    EEN_events.32.c:0 "Отем помічає інший малюнок під купою"
    EEN_events.33.title:0 "Замах"
    EEN_events.33.desc:0 "Під час відвідування місцевого гарнізону куля снайпера ледь не влучила в Головнокомандувача Отема. Потенційного вбивцю було затримано, і виявилося, що він був членом місцевої служби безпеки поселення. Допити тривають, але незрозуміло, наскільки решта міської варти була залучена до цього замаху, чи чоловік діяв сам. Кабінет Отема вимагає негайної відплати за цю образу, щоб ми не здавалися слабкими і не втратили контроль над населенням. Що нам робити?"
    EEN_events.33.a:0 "Транслювати страту вбивці"
    EEN_events.33.b:0 "Очистити всю міську варту за потенційну змову."
    EEN_events.33.c:0 "Зрівняти поселення з землею за укриття цього радикала"
    EEN_events.34.title:0 "Сутичка з Компанією Кіготь"
    EEN_events.34.desc:0 "Агенти Анклаву, які розслідували кільце контрабанди зброї, опинилися в затяжній перестрілці з найманцями Компанії Кіготь, які були найняті контрабандистами. Коли прибуло підкріплення в силовій броні, контрабандисти та найманці, що вижили, негайно здалися. Керівництво Компанії Кіготь стверджує, що найманці були найняті для законної охоронної роботи, і ця незаконна діяльність виходила за межі їхнього контракту, і з тих пір вони звільнили найманців, що вижили і перебувають у нашому розпорядженні. Громадськість вимагає, щоб ми застосували всю суворість закону до Компанії Кіготь, і багато публічних осіб стверджують, що це лише перший випадок незаконної діяльності, який ми виявили. Ці люди кажуть, що найманці Кіготь часто займаються незаконною діяльністю і просто приховують це за допомогою грошей або погроз. Деякі в нашій адміністрації виступають проти переслідування Компанії Кіготь, вказуючи на те, що вони є цінним активом, а їхні ймовірні злочини здебільшого спрямовані проти мешканців пустки, тому це не має великого значення."
    EEN_events.34.a:0 "Нагадати Компанії Кіготь, що вони підзвітні нашим законам"
    EEN_events.34.b:0 "Накласти великі штрафи на Компанію Кіготь"
    EEN_events.34.c:0 "Потрібне повне розслідування Компанії Кіготь"
    EEN_events.35.title:0 "Збройне повстання!"
    EEN_events.35.desc:0 "Одне з наших віддалених поселень стало місцем численних збройних сутичок між нашими патрулями та озброєними партизанами. Нападники зазвичай забирають своїх мертвих і зникають у пагорбах. Незрозуміло, хто стоїть за цим недавнім сплеском нападів і хто озброює цих людей, але наш місцевий начальник служби безпеки каже, що з кількома додатковими людьми він міг би серйозно вирішити це питання."
    EEN_events.35.a:0 "Надіслати йому підтримку!"
    EEN_events.35.b:0 "Надіслати Компанію Кіготь!"
    EEN_events.35.c:0 "У нього достатньо підтримки"
    EEN_events.36.title:0 "Приголомшливе відкриття"
    EEN_events.36.desc:0 "Недавня сутичка між нашими силами та озброєними партизанами в нашій неспокійній провінції призвела до шокуючого відкриття. Нападники, відступаючи, забули одного зі своїх загиблих, і було підтверджено, що він був членом місцевого ополчення. Гвинтівка, яку він носив, також була з нашої недавньої поставки! Багато в нашій військовій адміністрації обурені і закликають до всього: від введення воєнного стану до зрівняння села з землею! Мер поселення каже, що партизан, мабуть, був винятком, який привласнив спорядження, і наполягає, що його охоронці — лояльні мешканці пустки-американці."
    EEN_events.36.a:0 "Полювати на партизанів, нічого більше"
    EEN_events.36.b:0 "Покарати поселення"
    EEN_events.36.c:0 "Очистити їхнє ополчення"
    EEN_events.36.d:0 "Зробити приклад з мера та капітана ополчення"
    EEN_events.37.title:0 "Повстання Поширюється"
    EEN_events.37.desc:0 "Невдячні з села, яке захищало тих партизанів, розповзлися, як радіотаргани, по сусідніх поселеннях і розпалюють вогонь незгоди. Наші патрулі повідомляють про збільшення кількості нападів тепер уже за межами того одного проблемного регіону. У цих неспокійних поселеннях наші патрулі також повідомляють про все: від антианклавівських графіті до того, що сміття кидають у них. Вони чекають на наше рішення, як діяти далі."
    EEN_events.37.a:0 "Продовжувати полювати на повстанців"
    EEN_events.37.b:0 "Поселенці, які виступають проти Анклаву, будуть заарештовані"
    EEN_events.37.c:0 "Спалити неспокійні поселення дотла"
    EEN_events.38.title:0 "Знайдено табір повстанців"
    EEN_events.38.desc:0 "Наші зусилля з вистежування повстанців у наших неспокійних поселеннях не були марними. Після місяців блукань пагорбами ми нарешті знайшли головний табір повстанців, і вони влаштували жалюгідний останній бій, коли наші сили в силовій броні увійшли. Судячи з вигляду табору, це була головна база операцій і склад постачання повстанців. Без цієї бази кілька партизанів, які втекли, не повинні створювати подальших проблем."
    EEN_events.38.a:0 "Роботу виконано добре"
    EEN_events.39.title:0 "Братство злякалося?"
    EEN_events.39.desc:0 "Останні 3 місяці наші солдати на Проєкті Чистота готувалися до атаки Братства Сталі, яка так і не відбулася. Окрім сквотерів, що сидять через річку в Пентагоні, охорона проекту не бачила жодного терориста в T-45 за час свого чергування. За цей час ми покращили оборону, розширили зони висадки та перерозподілили війська, які тепер готові виступити з об'єкта. Майже настав час перетнути річку і вигнати цих боягузів з державної власності."
    EEN_events.39.a:0 "Дивно"

    ###Decision Events###
    EEN_decision_events.1.title:0 "Наукова команда в безпеці"
    EEN_decision_events.1.desc:0 "Наукову команду та їхню охорону в Святилищі Кігтів Смерті вдалося безпечно врятувати без жодних перешкод. На щастя, мешканці пустки та Братство уникають цієї місцевості через популяцію кігтів смерті, тому наші гвинтокрили змогли безпечно приземлитися і знову злетіти, не потрапивши під обстріл."
    EEN_decision_events.1.a:0 "Роботу виконано добре"
    EEN_decision_events.2.title:0 "Рятувальна команда зникає"
    EEN_decision_events.2.desc:0 "На жаль, пілот нашої рятувальної команди неправильно прочитав сітку посадки для нашої рятувальної операції і розбився прямо за межами Святилища Кігтів Смерті. Остання радіопередача, яку ми отримали від пастки наукової команди, була інформацією про ситуацію та їхні плани спуститися з підвищення, щоб врятувати команду гвинтокрила. Відтоді ми не отримували жодних повідомлень і мусимо вважати, що вони загинули."
    EEN_decision_events.2.a:0 "Зараз ми нічого не можемо для них зробити"
    EEN_decision_events.3.title:0 "Успішне рятування"
    EEN_decision_events.3.desc:0 "Солдати, які потребували порятунку у Вашингтоні, чудово впоралися зі стримуванням нападників з Братства. Рятувальна команда змогла швидко увійти, завантажити тих, хто вижив, і злетіти, отримавши лише кілька лазерних пострілів, які нічого не завдали, окрім подряпин на фарбі гвинтокрила."
    EEN_decision_events.3.a:0 "Роботу виконано добре"
    EEN_decision_events.4.title:0 "Важка рятувальна операція"
    EEN_decision_events.4.desc:0 "Як і слід було очікувати, порятунок солдатів, які опинилися в пастці в центрі Вашингтона, призвів до обмежених втрат. Хоча більшість гвинтокрилів змогли повернутися без проблем, останній вертоліт був уражений ракетою Братства і впав у величезному вибуху. Вижилих не було."
    EEN_decision_events.4.a:0 "Приблизно як і очікувалося"
    EEN_decision_events.5.title:0 "Повна катастрофа"
    EEN_decision_events.5.desc:0 "Ми надто довго чекали, щоб врятувати цих солдатів. На той час, коли наші гвинтокрили приземлилися в зоні висадки, їхні лінії були прорвані, а лицарі Братства заполонили зону посадки. Остання передача, яку ми отримали, була від панікуючого пілота, який намагався злетіти, але він не повернувся на базу."
    EEN_decision_events.5.a:0 "Який безлад"
    EEN_decision_events.6.title:0 "Успішне рятування"
    EEN_decision_events.6.desc:0 "Наша рятувальна команда легко обійшла оборону Форту Константин і визволила патруль, що потрапив у пастку, перш ніж будь-які Вигнанці, що патрулювали територію, встигли щось помітити. Хоча тих, хто вижив, лікують від недоїдання, через кілька днів вони повинні бути готові повернутися на фронт."
    EEN_decision_events.6.a:0 "Роботу виконано добре"
    EEN_decision_events.7.title:0 "Рятувальна команда втрачена"
    EEN_decision_events.7.desc:0 "Ми не чули від рятувальної команди або солдатів, що потрапили в пастку, вже кілька днів. Ми можемо тільки припустити, що вони зіткнулися з чимось у надрах Форту Константин, з чим не змогли впоратися."
    EEN_decision_events.7.a:0 "Оплакати загиблих"
    EEN_decision_events.8.title:0 "Невдала евакуація Анклаву"
    EEN_decision_events.8.desc:0 "Деякі залишки розрізнених сил Анклаву у Вашингтоні були знищені, коли вони намагалися евакуюватися гвинтокрилами. Наші лицарі змогли вбити солдатів, що залишилися, та їхніх рятувальників, захопивши в процесі кілька гвинтокрилів."
    EEN_decision_events.8.a:0 "Чудова робота, Брати"
    EEN_decision_events.9.title:0 "Пил і відлуння"
    EEN_decision_events.9.desc:0 "Як ми, мабуть, і очікували, від форпосту в Наварро не було жодної відповіді. Сподіваюся, ці сміливі чоловіки та жінки вижили."
    EEN_decision_events.9.a:0 "Повернути це на нашу користь"
    EEN_decision_events.10.title:0 "Підтримка з Чикаго"
    EEN_decision_events.10.desc:0 "Після кількох спроб ми нарешті встановили контакт з базою Анклаву в Чикаго. Схоже, у них свої проблеми, але вони все одно надсилають групу солдатів, щоб допомогти нам. Вони розраховують, що колись ми віддячимо їм тим самим."
    EEN_decision_events.10.a:0 "Ми вітаємо їхніх солдатів"
    EEN_decision_events.11.title:0 "Відповідь Уайтспрінгса"
    EEN_decision_events.11.desc:0 "Ми сподівалися, що ви знову вийдете на зв'язок. Багато що змінилося з моменту нашої останньої розмови, і нам є про що поговорити, і ми зробимо великі справи разом... мій друже."
    EEN_decision_events.11.desc.2:0 "Нам... прикро чути про президента Едема. Ми не зможемо надати допомогу в цей час, але ми матимемо дещо для вас... коли ви потрапите в наші краї."
    EEN_decision_events.11.a:0 "Зловісно"
    EEN_decision_events.12.title:0 "Підтримка Онтаріо"
    EEN_decision_events.12.desc:0 "Жодна зі спроб зв'язатися з бункером Анклаву в Онтаріо не отримала відповіді. Минуло чимало часу з моменту нашого останнього контакту, тому незрозуміло, чи були вони знищені, чи просто дотримуються суворого радіомовчання. У будь-якому випадку, ми зараз надто зайняті, щоб перевіряти їх."
    EEN_decision_events.12.a:0 "Нам слід зазирнути до них згодом"
    EEN_decision_events.13.title:0 "Жалюгідна атака на форпост Братства"
    EEN_decision_events.13.desc:0 "Хоча нас це не повинно дивувати, але все одно прикро бачити, що невдахи, яких Компанія Кіготь відправила на форпост Братства, мало що зробили, крім того, що послужили мішенями для навчання. Вони були швидко знищені захисниками, не завдавши жодних втрат ворогові."
    EEN_decision_events.13.a:0 "Ми заплатили їм СТІЛЬКИ за це?"
    EEN_decision_events.14.title:0 "Жалюгідна атака на форпост Братства"
    EEN_decision_events.14.desc:0 "Ті, хто хотів приєднатися до Компанії Кіготь, показали, чому вони не підходять для наших лав. Їхня сумна атака на форпост Братства, на який ми їх відправили, навіть не подряпала броню Лицаря. Сподіваюся, наші роботодавці в Рейвен-Році пам'ятають, що ми не посилали якісних військ і не гарантували жодних результатів."
    EEN_decision_events.14.a:0 "Принаймні нам заплатили"
    EEN_decision_events.15.title:0 "Вони називають це атакою?"
    EEN_decision_events.15.desc:0 "Загін Лицарів повідомив, що на них напали ті, кого вони вважали обкуреними рейдерами на околицях нашої території. На щастя, ніхто на форпості не постраждав, і лише після обшуку вбитих нападників вони зрозуміли, що це були не жалюгідні рейдери, а найманці Компанії Кіготь. Жалюгідний провал цієї атаки викликає багато запитань, оскільки він суперечить усім звітам, які ми бачили про організацію та бойові здібності Компанії Кіготь."
    EEN_decision_events.15.a:0 "Можливо, це обряд посвячення?"
    EEN_decision_events.16.title:0 "Успішна сутичка"
    EEN_decision_events.16.desc:0 "Ми отримали звіт від Компанії Кіготь про атаку на форпост Братства, яку ми найняли їх провести. Новобранці, яких вони відправили на невеликий форпост, показали себе приблизно так, як і очікувалося: зазнали важких втрат, але змогли завдати невеликої шкоди, перш ніж відступити на базу. Це нічого особливого, але ви отримуєте те, за що платите."
    EEN_decision_events.16.a:0 "Отримай, Лайонс!"
    EEN_decision_events.17.title:0 "Кілька багатообіцяючих"
    EEN_decision_events.17.desc:0 "Ті, кого ми відправили атакувати форпост Братства, насправді зуміли вбити кількох з них. Звичайно, ми знали, що багато з тих невдах, яких ми відправили, не повернуться. Але ті, хто повернувся, показали себе. Вони довели, що можуть битися, і їм дозволено розпочати тренування."
    EEN_decision_events.17.a:0 "Ми зробимо з них солдатів"
    EEN_decision_events.18.title:0 "Тривожна прелюдія?"
    EEN_decision_events.18.desc:0 "Сутички з найманцями Компанії Кіготь не є чимось новим. У минулому бували випадки, коли загін Лицарів, відправлений на пошуки довоєнного об'єкта, знаходив найманців, які вже зайняли це місце і відмовлялися звільнити його. Незважаючи на це, нам зазвичай вдавалося триматися осторонь один одного. Невеликий загін найманців пішов на все, щоб розпочати скоординовану атаку на форпост на наших околицях. Хоча їх відбили, ми втратили кількох лицарів та посвячених у сутичці. Форпост мав невелику стратегічну або ресурсну цінність для Компанії Кіготь. Чи міг хтось заплатити їм за це, і якщо так, то чому?"
    EEN_decision_events.18.a:0 "Сподіваймося, що це не продовжиться."
    EEN_decision_events.19.title:0 "Майже занадто добре, щоб бути правдою"
    EEN_decision_events.19.desc:0 "Компанія Кіготь нещодавно повідомила про атаку, яку ми найняли їх здійснити на форпост Братства. Небагато офіцерів, які читали звіт, повірили в нього, але розвідники-робо-ока підтвердили його точність. Команда призовників Компанії Кіготь, відправлена на штурм форпосту, застала лицарів повністю зненацька і майже повністю знищила весь форпост. Кілька вцілілих з Братства втекли, залишивши форпост і схованку з цінним спорядженням, яке Компанія Кіготь забрала собі. Наші стратеги зараз аналізують звіт, щоб отримати уявлення про слабкі місця Братства та помилки, яких ми повинні уникати, борючись із затятими мешканцями пустки."
    EEN_decision_events.19.a:0 "Цей контракт окупається"
    EEN_decision_events.20.title:0 "Сталеві пронизувачі"
    EEN_decision_events.20.desc:0 "Ті, кого ми відправили атакувати форпост Братства, більш ніж довели свою мужність. Їхній спостерігач повідомляє, що вони билися, як розлючені яо-гаї, розриваючи нажаханих Лицарів та Посвячених Братства, як туалетний папір. І це ще не все: коли вони оглянули форпост, який зачистили, вони знайшли мало не цілий арсенал, залишений позаду. На прохання Командира цих людей організували під керівництвом багатообіцяючого лейтенанта в дивізію «Сталеві Пронизувачі». Якщо Братство коли-небудь прийде по своє добро, ці хлопці змусять їх двічі подумати."
    EEN_decision_events.20.a:0 "Ласкаво просимо до Компанії Кіготь"
    EEN_decision_events.21.title:0 "Війна насувається?"
    EEN_decision_events.21.desc:0 "Кілька побитих лицарів повідомили, що їхній форпост був захоплений тим, що, мабуть, було дивізією найелітніших солдатів Компанії Кіготь. Це знаменує кардинальну зміну в нашій типовій динаміці з цією групою, коли ми зазвичай тримаємося осторонь один одного, хіба що вони сидять на схованці з технологіями, які ми хочемо. Лицарям та Паладинам на нашому периметрі було рекомендовано стежити за пересуваннями Компанії Кіготь і готуватися до атаки. Або Компанія Кіготь готується до масштабного наступу, або хтось дуже добре заплатив їм, щоб вони відправили своїх найкращих на нас."
    EEN_decision_events.21.a:0 "Хто б взагалі заплатив їм за це?"
    EEN_decision_events.22.title:0 "Рейди Компанії Кіготь на каравани"
    EEN_decision_events.22.desc:0 "Компанія Кіготь повідомила про свої недавні рейди на каравани проти поселень Столичної пустки. Їхні рейди зупинили торгівлю між кількома ділянками торгового кола Вашингтона. Звичайно, ці торговці пристосуються, і все повернеться на круги своя, але ця атака принаймні зашкодить їм у короткостроковій перспективі."
    EEN_decision_events.22.a:0 "Роботу виконано добре"
    EEN_decision_events.23.title:0 "Зростання атак на каравани!"
    EEN_decision_events.23.desc:0 "За останній місяць кількість атак на каравани значно зросла. Хоча ще зарано говорити, чи всі ці атаки пов'язані між собою, принаймні троє з них мали свідків, які стверджували, що нападали саме найманці Компанії Кіготь. Тепер залишається питання: чому Компанія Кіготь це зробила? Найманці далеко не дружелюбні, але зазвичай вони не нападають на людей, якщо ви не забредете поблизу однієї з їхніх баз або хтось не заплатить їм за напад."
    EEN_decision_events.23.a:0 "Хто б заплатив їм за це?"
    EEN_decision_events.24.title:0 "Будівля Капітолію"
    EEN_decision_events.24.desc:0 "Національна Алея перебуває в постійному конфлікті. Рейдери, супермутанти і навіть лицарі Братства б'ються за кожну вулицю і будівлю. Тепер ми маємо Компанію Кіготь, яка б'ється з супермутантами за контроль над залами Конгресу. Здається, у цих руїнах, що розвалюються, немає нічого цінного для нас, але принаймні було вбито багато супермутантів."
    EEN_decision_events.24.a:0 "Достатньо хороший результат"
    EEN_decision_events.25.title:0 "Кузні Піттсбурга"
    EEN_decision_events.25.desc:0 "Довоєнний Піттсбург був величезною промисловою базою в довоєнній Америці. Навіть після Великої Війни та століть страждань від хвороби трогів, яка вразила регіон, Пітт процвітав як промисловий центр, що постачав боєприпаси багатьом націям пустки. Хоча запобігання та лікування хвороби трогів все ще далеке, наші інженери зробили те, що багато хто вважав неможливим. Вони зробили Піттсбург місцем, де хтось захотів би жити. Відремонтувавши чимало будівель, встановивши повітряні фільтри рівня сховища та з'єднавши ці будівлі герметичними тунелями, наші інженери створили те, що можна назвати наземним сховищем. Американці з пустки вже стікаються до цього нового поселення з обіцянкою стабільної роботи зі збору решток міста для живлення військової машини. Їм просто потрібно бути обережними і не залишатися на вулиці надто довго."
    EEN_decision_events.25.a:0 "Запалюйте кузні, нам потрібно повернути країну!"
    EEN_decision_events.26.title:0 "Троги втекли"
    EEN_decision_events.26.desc:0 "Троги, яких ми зібрали, щоб випустити на наших ворогів, якимось чином вирвалися з контейнерів і вбили кількох солдатів, перш ніж їх знешкодили. Ми все ще розслідуємо причину цього інциденту, але є ознаки того, що це неякісне виробництво робітниками-рабами з Пітта."
    EEN_decision_events.26.a:0 "У цих мутантів немає трудової етики"
    EEN_decision_events.27.title:0 "Атака мутантів!"
    EEN_decision_events.27.desc:0 "гвинтокрили над лінією фронту були звичним видовищем для наших солдатів, але цього разу все було інакше. Кілька гвинтокрилів несли великі сталеві контейнери, які вони скинули за нашими лініями. Коли наші люди розслідували, контейнери відкрилися, випустивши голодних мутантів! Цілі загони були знищені, і тепер монстри блукають, сіючи хаос!"
    EEN_decision_events.27.a:0 "Вистежити їх!"
    EEN_decision_events.28.title:0 "Гвинтокрили збито"
    EEN_decision_events.28.desc:0 "Коли наші гвинтокрили пролітали над лініями ворога, щоб скинути вантаж з трогами, вони були збиті ворожими зенітними установками. Операція вважається повним провалом."
    EEN_decision_events.28.a:0 "Вони за це заплатять!"
    EEN_decision_events.29.title:0 "Успішна партія"
    EEN_decision_events.29.desc:0 "Команди, які ми відправили збирати партію піддослідних для експериментів з ВШЕ, знайшли багато відповідних кандидатів. Піддослідні виявилися стійкими, з рівнем невдач близько 20%. Після стандартних процедур індоκтринації та примусу ми маємо кілька сотень супермутантів, готових до відправки на фронт."
    EEN_decision_events.29.a:0 "Чудова робота"
    EEN_decision_events.30.title:0 "Невдалі партії"
    EEN_decision_events.30.desc:0 "Піддослідні, зібрані нашими командами для експериментів з ВШЕ, не виправдали очікувань. Понад 90% мутантів, підданих дії ВШЕ, загинули або перетворилися на жахливих потвор, які були і жахливими на вигляд, і абсолютно марними для наших військових зусиль. Партію знищено."
    EEN_decision_events.30.a:0 "Марна трата ВШЕ"
    EEN_decision_events.31.title:0 "Команду збирачів вбито"
    EEN_decision_events.31.desc:0 "Команда, яку ми відправили збирати партію піддослідних для експериментів з ВШЕ, думала, що знайшла незахищене село з відповідними кандидатами. Виявилося, що це була пастка хитрих мутантів, і команду було знищено."
    EEN_decision_events.31.a:0 "Вони будуть помщені"
    EEN_decision_events.32.title:0 "Відповідь з космічного центру Ван Бюрен"
    EEN_decision_events.32.desc:0 "Солдати та вчені, яких ми відправили на допомогу форпосту Анклаву у Флориді, добре справляються. Однак вони відмовляються повертатися в лоно, наполягаючи, що їхня нова місія важливіша. Вони мають нахабство просити більше людей і ресурсів."
    EEN_decision_events.32.a:0 "Не може бути й мови."
    EEN_decision_events.32.b:0 "Про всяк випадок, якщо справи підуть шкереберть..."
    EEN_decision_events.33.title:0 "ЗАХІД УПАВ"
    EEN_decision_events.33.desc:0 "МИ НЕ МОЖЕМО ЗВ'ЯЗАТИСЯ З ФОРПОСТОМ НАВАРРОЇНО! НОВА ЧУДИФОРНІЯ РЕЧУДЛІК, НАПЕВНО, РОЗДАВИЛА ЇХ!!!1! ЯК ЦЕ МОГЛО СТАТИСЯ? АНКЛАВ МАКСИМАЛЬНО ТЕХНОЛОГІЧНИЙ І ПРОСЯКНУТИЙ ІДЕЯМИ ЧИСТОТИ!"
    EEN_decision_events.33.a:0 "МІЛЬЙОНИ МУТАНТІВ ПОВИННІ ПОМЕРТИ"
    EEN_decision_events.34.title:0 "Рейвен-Рок Відмовляє в Допомозі!"
    EEN_decision_events.34.desc:0 "Рейвен-Рок нещодавно відновив зв'язок з нашою базою. Радісний настрій швидко зіпсувався, коли вони відмовилися надсилати додаткову підтримку і навіть попросили, щоб солдати, яких вони відправили на підтримку нашої місії багато років тому, повернулися до Рейвен-Року. Ми негайно припинили зв'язок."
    EEN_decision_events.34.a:0 "Ми продовжуємо за планом"
    EEN_decision_events.35.title:0 "Рейвен-Рок надсилає підтримку!"
    EEN_decision_events.35.desc:0 "Рейвен-Рок нещодавно відновив зв'язок з нашою базою. Ми були стурбовані, коли вони попросили, щоб солдати, які допомагали нам багато років тому, повернулися до Рейвен-Року, але їм дали зрозуміти важливість нашої місії. Вони навіть погодилися на наше прохання надіслати додаткові війська!"
    EEN_decision_events.35.a:0 "Ласкаво просимо до Флориди!"
    EEN_decision_events.36.title:0 "Підтримка із заходу"
    EEN_decision_events.36.desc:0 "Сьогодні біля воріт Республіки з'явилися великі сили найманців Компанії Кіготь. Їхній лідер каже, що вони були найняті невідомим благодійником, щоб забезпечити перемогу Президента в цій війні проти підступних виборчих шахраїв. Ми не з тих, хто відмовляється від подарованого браміна, тому ми пустили найманців у справу, борючись з нашими ворогами."
    EEN_decision_events.36.a:0 "Здається, у нас багато друзів"
    EEN_decision_events.37.title:0 "Компанія Кіготь вирушає"
    EEN_decision_events.37.desc:0 "Як вони й казали, найманці Компанії Кіготь, які прибули допомогти нам у скрутну годину, вирушили невдовзі після останніх пострілів. Вони відмовилися від пропозиції Дейва приєднатися до його президентської армії, і хоча вони розчарували Дейва, він все одно дякує їм за допомогу Поселенням у важкий час."
    EEN_decision_events.37.a:0 "Вони так і не сказали, хто їх найняв"
    EEN_decision_events.38.title:0 "Команду збирачів вбито"
    EEN_decision_events.38.desc:0 "Команда, яку ми відправили збирати партію піддослідних для експериментів з роботами-мозками, думала, що знайшла незахищене село неподалік від фронту. Виявилося, що це була пастка хитрих мутантів, і загін було знищено."
    EEN_decision_events.38.a:0 "Вони будуть помщені"
    EEN_decision_events.39.title:0 "Змішані результати"
    EEN_decision_events.39.desc:0 "Наш ударний загін зміг викрасти мутантів для вилучення мозку, на жаль, не всі вони були відповідними кандидатами для впровадження в роботів-мозків. Кілька піддослідних стали шалено лютими після того, як їхні мізки під'єднали до машин."
    EEN_decision_events.39.a:0 "Принаймні це не повна втрата"
    EEN_decision_events.40.title:0 "Фантастична партія!"
    EEN_decision_events.40.desc:0 "Наш ударний загін евакуювався з вантажем мутантів без серйозних інцидентів. Після повернення на базу викликані вчені змогли успішно вилучити 98% мозку піддослідних і впровадити їх у роботів-мозків. Машини готові до відправки на фронт."
    EEN_decision_events.40.a:0 "Зразковий успіх!"
    EEN_decision_events.41.title:0 "Успішна відправка"
    EEN_decision_events.41.desc:0 "Наш ударний загін впорався швидко, вивізши вантаж мутантів до того, як ворог встиг мобілізувати відповідь. Піддослідні зараз у дорозі до Американської Служби Охорони Здоров'я."
    EEN_decision_events.41.a:0 "Добре"
    EEN_decision_events.42.title:0 "Втрати під час транспортування"
    EEN_decision_events.42.desc:0 "Наш ударний загін успішно захопив мутантів для експериментів Б.М.М.А.У., однак під час транспортування до Американської Служби Охорони Здоров'я деякі зразки вирвалися і спричинили падіння гвинтокрила. Решта гвинтокрилів благополучно дісталися до місця призначення."
    EEN_decision_events.42.a:0 "Тоді не повна втрата"
    EEN_decision_events.43.title:0 "Відправка з Рейвен-Року"
    EEN_decision_events.43.desc:0 "Президент Едем надіслав нам партію зразків для лікування їхніх мутацій. Піддослідних вже підготували, і незабаром вони будуть прооперовані."
    EEN_decision_events.43.a:0 "Чудові новини!"
    EEN_decision_events.44.title:0 "Відправка з Рейвен-Року"
    EEN_decision_events.44.desc:0 "Президент Едем надіслав нам партію зразків для лікування їхніх мутацій. Хоча їх менше, ніж обіцяли спочатку, все ж їх значна кількість. Піддослідних вже підготували, і незабаром вони будуть прооперовані."
    EEN_decision_events.44.a:0 "Чудові новини!"
    EEN_decision_events.45.title:0 "Привіт з Ронто"
    EEN_decision_events.45.desc:0 "Перша партія анархістів, бандитів та інших дисидентів, які виступають проти Анклаву, прибула до Реабілітаційного закладу Ронто. Назвати це закладом — це ще досить щедро. В'язнів випускають в обнесену стіною частину руїн Торонто з двома інструкціями. \n\n Інструкція 1: втікачі будуть розстріляні. \n\n Інструкція 2: доставте здобич в один з пунктів прийому, якщо хочете їсти. \n\n Прогнозована середня тривалість життя — близько двох тижнів. Це не ті мутанти, які пристосуються до Америки Отема, тому, змушуючи їх працювати тут, вони можуть зробити за ці два тижні більше, ніж зробили б за все своє життя. Інформацію про умови в таборі було дозволено просочитися до населення. Як ми й очікували, страх бути відправленим до Ронто призводить до зниження активності повстанців."
    EEN_decision_events.45.a:0 "Чудова робота"
    EEN_decision_events.46.title:0 "Музей Америки"
    EEN_decision_events.46.desc:0 "Велике відкриття Музею Америки, який працює у відновлених руїнах довоєнного музею історії, мало гучний успіх. Після короткої промови куратора музею двері було відкрито для публіки. 78 відсотків опитаних американців з пустки, які виходили з музею, повідомили, що почуваються значно патріотичніше, тоді як 83 відсотки повідомили, що вдячні Головнокомандувачу Отему та Анклаву за відбиття вторгнення комуністичних прибульців з Марса. Шокуючі 2 відсотки тих, хто виходив з музею, повідомили, що не вважають усі експонати правдивими. Їх затримали для допиту та утилізації."
    EEN_decision_events.46.a:0 "Боже, благослови Анклав!"
    EEN_decision_events.47.title:0 "Наші східні союзники"
    EEN_decision_events.47.desc.1:0 "Ми вже деякий час підтримуємо радіозв'язок з [EEN.GetName]. Однак особистих контактів, окрім рідкісних дипломатичних місій, було мало. У міру того, як територія, яку вони вважають своєю, наближалася до нашої, виникало дедалі більше запитань про те, як буде проходити спільне сусідство. Ми отримали відповідь. [EEN.GetLeader] надіслав нам ультиматум з вимогою «повернутися в лоно». Цілком очевидно, що їхнє запрошення не передбачає рівноправності."
    EEN_decision_events.47.desc.2:0 "Ми вже деякий час підтримуємо радіозв'язок з [ONT.GetName]. Однак особистих контактів, окрім рідкісних дипломатичних місій, було мало. У міру того, як територія, яку вони вважають своєю, наближалася до нашої, виникало дедалі більше запитань про те, як буде проходити спільне сусідство. Ми отримали відповідь. [ONT.GetLeader] надіслав нам ультиматум з вимогою «повернутися в лоно». Цілком очевидно, що їхнє запрошення не передбачає рівноправності."
    EEN_decision_events.47.a:0 "Співпраця є кращою"
    EEN_decision_events.47.b:0 "Ми не приєднаємося до цих монстрів"
    EEN_decision_events.48.title:0 "Наші північні союзники"
    EEN_decision_events.48.desc.1:0 "Ми вже деякий час підтримуємо радіозв'язок з [EEN.GetName]. Однак особистих контактів, окрім рідкісних дипломатичних місій, було мало. У міру того, як територія, яку вони вважають своєю, наближалася до нашої, виникало дедалі більше запитань про те, як буде проходити спільне сусідство. Ми отримали відповідь. [EEN.GetLeader] надіслав нам ультиматум з вимогою «повернутися в лоно». Цілком очевидно, що їхнє запрошення не передбачає рівноправності."
    EEN_decision_events.48.desc.2:0 "Ми вже деякий час підтримуємо радіозв'язок з [ONT.GetName]. Однак особистих контактів, окрім рідкісних дипломатичних місій, було мало. У міру того, як територія, яку вони вважають своєю, наближалася до нашої, виникало дедалі більше запитань про те, як буде проходити спільне сусідство. Ми отримали відповідь. [ONT.GetLeader] надіслав нам ультиматум з вимогою «повернутися в лоно». Цілком очевидно, що їхнє запрошення не передбачає рівноправності."
    EEN_decision_events.48.a:0 "Співпраця є кращою"
    EEN_decision_events.48.b:0 "Ми не схилимо голови"
    EEN_decision_events.49.title:0 "Наші північні союзники"
    EEN_decision_events.49.desc.1:0 "Ми вже деякий час підтримуємо радіозв'язок з [EEN.GetName]. Однак особистих контактів, окрім рідкісних дипломатичних місій, було мало. У міру того, як територія, яку вони вважають своєю, наближалася до нашої, виникало дедалі більше запитань про те, як буде проходити спільне сусідство. Ми отримали відповідь. [EEN.GetLeader] надіслав нам ультиматум з вимогою «повернутися в лоно». Цілком очевидно, що їхнє запрошення не передбачає рівноправності."
    EEN_decision_events.49.a:0 "Кавалерія тут"
    
    ###National focus events###
    EEN_nf_events.1.title:0 "Битва за Пентагон"
    EEN_nf_events.1.desc:0 "В одній з найзапекліших битв з часів Битви за Проєкт Чистота ми завдали потужного удару по Братству Сталі. Ці сквотери знали, що ми прийдемо, щоб вигнати їх з державної власності, і вони добре підготувалися. Нашим солдатам довелося битися за кожен дюйм цього об'єкта. Незважаючи на незліченну кількість автоматичних турелей, старих роботів та захисників у силовій броні, ми вийшли переможцями. Наш прапор майорить над Пентагоном, і наші наукові команди проводять інвентаризацію обладнання та архівів даних, які Братство не знищило, коли тікало."
    EEN_nf_events.1.a:0 "Вони не протримаються довго!"
    EEN_nf_events.2.title:0 "Розвідувальна команда повертається"
    EEN_nf_events.2.desc:0 "Автоматична охорона авіабази Адамс все ще активна, але щось не так. Вона не розпізнає наші коди доступу. Кілька розвідників, які намагалися отримати доступ до об'єкта, були атаковані іржавими протектронами. Наші вчені вважають, що головний комп'ютер безпеки, ймовірно, пошкоджений, і його потрібно буде відключити, перш ніж ми зможемо увійти на саму базу. Це залишає нам два варіанти. Отем хоче провести вертолітний штурм невеликою ударною групою, щоб вручну відключити головний комп'ютер. Едем і наукова команда хочуть спробувати перевантажити головний комп'ютер потоком даних, щоб змусити його перезавантажитися, що має зберегти обладнання. Єдина проблема з цим варіантом полягає в тому, що ми не знаємо, які електронні контрзаходи має старий головний комп'ютер."
    EEN_nf_events.2.a:0 "Відправити команду Сігма"
    EEN_nf_events.2.b:0 "Запустити потік даних"
    EEN_nf_events.3.title:0 "Гарнізон Адамса"
    EEN_nf_events.3.desc:0 "Авіабаза Адамс у напрочуд хорошому стані, безсумнівно, завдяки автоматичній охороні, яка не пускала потенційних мародерів. Це підводить нас до наступної проблеми: з відключеною охороною це лише питання часу, коли мандрівні збирачі знову спробують проникнути на базу. Щоб запобігти крадіжці американської власності, нам потрібно буде залишити кілька солдатів для охорони бази. Навіть якщо у нас недостатньо силової броні для гарнізону, кілька легкоброньованих солдатів або роботів мають впоратися з цим завданням."
    EEN_nf_events.3.a:0 "Дозволити кільком допоміжним військам патрулювати ворота"
    EEN_nf_events.3.b:0 "Надіслати повний склад піхоти в силовій броні"
    EEN_nf_events.3.c:0 "Чи могли б ми знову ввімкнути роботів?"
    EEN_nf_events.4.title:0 "Захоплення Проєкту Чистота"
    EEN_nf_events.4.desc:0 "Проєкт Чистота є одним з найважливіших, якщо не найважливішим, діючим об'єктом у Столичній Пустці. Ми не можемо залишити його в руках самопроголошених учених з пустки. Наші генерали розробили кілька планів захоплення об'єкта, і настав час починати їх реалізацію. Деякі хочуть впровадити в проєкт учених і солдатів під виглядом найманих охоронців. Це займе більше часу, але вони впевнені, що це зведе до мінімуму можливі пошкодження об'єкта. Інші генерали стурбовані тим, що Братство Сталі може незабаром звернути на це увагу, і хочуть відправити солдатів, щоб захопити об'єкт силою якомога швидше. Це, очевидно, загрожує пошкодженням об'єкта. Зрештою, рішення за Президентом."
    EEN_nf_events.4.a:0 "Впровадитися в проєкт"
    EEN_nf_events.4.b:0 "Просто захопити силою"
    EEN_nf_events.4.c:0 "Відправити Компанію Кіготь"
    EEN_nf_events.5.title:0 "Евакуація Рейвен-Року"
    EEN_nf_events.5.desc:0 "Незадовго до падіння Рейвен-Року цивільних та небойовий військовий персонал евакуювали гвинтокрилами. Хоча деякі з гвинтокрилів були збиті нашими ворогами, більшість з них благополучно дісталися авіабази Адамс. Поки цивільні та солдати облаштовуються в нашому новому домі, ми повинні готуватися до наступного кроку. Мине небагато часу, перш ніж наші вороги знайдуть це місце."
    EEN_nf_events.5.a:0 "Вони за це заплатять!"
    EEN_nf_events.5.b:0 "Вони за це заплатять!"
    EEN_nf_events.5.c:0 "Вони за це заплатять!"
    EEN_nf_events.6.title:0 "Загальний наказ про відступ"
    EEN_nf_events.6.desc:0 "З падінням Рейвен-Року багато солдатів залишилися без наказів від командування і тепер тиняються на віддалених форпостах або охороняють старі склади, все ще чекаючи на евакуацію. Очевидно, що нам потрібно, щоб ці люди повернулися на базу, але у нас немає ресурсів, щоб забрати їх усіх гвинтокрилами. Чи надаємо ми пріоритет порятунку кожного солдата, чи робимо кілька рейсів до деяких об'єктів, щоб забрати важливе обладнання?"
    EEN_nf_events.6.a:0 "Жодна людина не залишиться!"
    EEN_nf_events.6.b:0 "Деякі з них можуть піти пішки, нам потрібна ця зброя!"
    EEN_nf_events.7.title:0 "Другий наказ про відступ"
    EEN_nf_events.7.desc:0 "Багато чоловіків і жінок Анклаву все ще не знайдено, і хоча більшість з них, ймовірно, мертві, дуже ймовірно, що багато хто просто був відрізаний від свого комунікаційного обладнання і сидить біля старого радіо, намагаючись зв'язатися з командуванням. Ми могли б зв'язатися з цими солдатами, але спроба зробити це може піддати нас ризику бути виявленими."
    EEN_nf_events.7.a:0 "Ризик не вартий того"
    EEN_nf_events.7.b:0 "Передати координати евакуації"
    EEN_nf_events.8.title:0 "У Пастці та відрізані"
    EEN_nf_events.8.desc:0 "Досі є команди солдатів у жахливих ситуаціях. Чи то в пастці в старому об'єкті, чи то притиснуті солдатами Братства, чи то оточені мутантами без боєприпасів. Рятувати цих людей буде ризиковано, але залишати їх помирати здається неправильним."
    EEN_nf_events.8.a:0 "Підготувати рятувальні операції"
    EEN_nf_events.9.title:0 "Дуврські торговці зброєю"
    EEN_nf_events.9.desc:0 "Сьогодні до наших воріт підійшли торговці з поселення мешканців пустки поблизу Адамса. Вони намагалися продати свої товари, і хоча більшість їхніх пропозицій були не кращими за мотлох, було кілька цінних знахідок. Зазвичай ми просто конфіскували б цю очевидно награбовану зброю, але, за словами торговців, у них є набагато більше. Розпочати повномасштабний штурм цих збирачів було б величезною тратою ресурсів, яку ми не можемо собі дозволити, принаймні зараз. Можливо, нам варто запропонувати їм щось за те, що вони мають."
    EEN_nf_events.9.a:0 "Ми не будемо торгуватися з мутантами"
    EEN_nf_events.9.b:0 "Дайте їм металобрухт за менш потужну зброю"
    EEN_nf_events.9.c:0 "Мікрочіпи за штурмову зброю здаються справедливими"
    EEN_nf_events.9.d:0 "Скільки б вони заплатили за плазмову гвинтівку?"
    EEN_nf_events.10.title:0 "Останні приготування"
    EEN_nf_events.10.desc:0 "Після місяців перегрупування, збору припасів та переробки бойових планів ми знову в бойовій формі. Братство досі не знає, де ми знаходимося. Вони ганяються за власним хвостом у пошуках будь-якої ознаки нашого існування, в той час як ми спостерігаємо з тіні. Місяцями ми оговтувалися від невдачі. Тепер ми в ідеальному становищі, щоб розпочати контратаку і повернути Столичну пустку."
    EEN_nf_events.10.a:0 "Час настав"
    EEN_nf_events.11.title:0 "Колючка в нашому боці"
    EEN_nf_events.11.desc:0 "Незважаючи на те, що Братство Сталі майже стерто з лиця Столичної Пустки, воно залишається проблемою. Розрізнені фанатики Братства здійснюють напади за принципом «вдарив-утік» на позиції Анклаву та атакують лінії постачання. Нам потрібно щось зробити з цими партизанами, і якнайшвидше, перш ніж вони отримають підтримку мешканців пустки."
    EEN_nf_events.11.a:0 "Вони ще не мертві?"
    EEN_nf_events.12.title:0 "Підготовка до суду"
    EEN_nf_events.12.desc:0 "Більшість вцілілих з Братства Сталі зараз перебувають під вартою і чекають своєї долі. Готуючись до судів над терористами Братства, нам потрібно прийняти остаточні рішення. Насамперед нам потрібно вирішити, кого саме ми віддаємо під суд. Було висловлено думку, що більшість Лицарів та Посвячених Братства просто виконували накази, і надання їм поблажливості допоможе завоювати серця й уми мешканців пустки. Інші стверджують, що дозволити людям, які вбили наших солдатів, легко відбутися було б ляпасом для наших військ, і лише писарям слід надати поблажливість. Наші більш жорсткі чиновники вважають, що кожен чоловік і жінка повинні постати перед судом за свої злочини."
    EEN_nf_events.12.a:0 "Обмежитися керівництвом"
    EEN_nf_events.12.b:0 "Звільнити некомбатантів"
    EEN_nf_events.12.c:0 "Кожен член Братства буде судимий"
    EEN_nf_events.13.title:0 "Злочин і покарання"
    EEN_nf_events.13.desc:0 "Список злочинів, скоєних Братством Лайонса за десятиліття, незліченний. Крадіжка державної власності, незаконне зайняття державних об'єктів і, звичайно, вбивства солдатів Анклаву. Їхні адвокати стверджували, що за відсутності Анклаву в пустках Братство просто заповнило вакуум влади. Вони також вказують на те, що, принаймні у випадку Братства Лайонса, значна частина цього обладнання пішла на добру справу — вбивство супермутантів і рейдерів. Це викликає питання, чи варто переслідувати деякі з цих злочинів і якою мірою."
    EEN_nf_events.13.a:0 "Переслідувати за всією суворістю закону"
    EEN_nf_events.13.b:0 "Ми можемо дещо пробачити"
    EEN_nf_events.13.c:0 "Вбивство мутантів слід винагороджувати"
    EEN_nf_events.14.title:0 "Їхній лідер"
    EEN_nf_events.14.desc.1:0 "Після смерті Старійшини Лайонса його дочка Сара Лайонс взяла на себе керівництво. Навіть після повної поразки Братства вона очолювала партизанів, які відмовлялися скласти зброю. Очевидно, що якщо хтось у Братстві заслуговує на смерть, то це вона. Наші радники висловили занепокоєння, що її страта лише зробить її мученицею і підбадьорить антиамериканські рухи в майбутньому."
    EEN_nf_events.14.desc.2:0 "Після смерті Старійшини Лайонса під час знищення Пентагону його дочка Сара Лайонс прийняла командування. Незважаючи на те, що більшість Братства склали зброю, фанатична Сара продовжувала очолювати терористів Братства у війні проти американського народу. М'якосерді досі стверджують, що надання їй заслуженої смерті лише підбадьорить інших, хто ще тримається."
    EEN_nf_events.14.a:0 "Довічного ув'язнення достатньо"
    EEN_nf_events.14.b:0 "Приготувати розстрільну команду"
    EEN_nf_events.14.c:0 "Ми транслюватимемо страту в кожному поселенні"
    EEN_nf_events.15.title:0 "Останній рубіж"
    EEN_nf_events.15.desc:0 "Сьогодні патруль вступив у контакт з одиноким ворожим, який вів вогонь по них зі зруйнованої офісної будівлі у Вашингтоні. Повстанець водив патруль звивистими коридорами, наповненими пастками, але через кілька годин останнього повстанця Братства було вбито. Терорист не мав жетона, і не було жодних інших розпізнавальних знаків, крім комбінезона з сховища, який він носив під бронею. Його смерть робить його останнім ворогом, убитим у війні Братства Сталі та Анклаву."
    EEN_nf_events.15.a:0 "Враховано"
    EEN_nf_events.15.b:0 "Організувати святкування закінчення цієї боротьби"
    EEN_nf_events.16.title:0 "Хвороби зростання"
    EEN_nf_events.16.desc:0 "З остаточним завершенням конфлікту з Братством ми можемо звернути увагу на проблеми, що стоять перед нашою новою нацією. Проблем не бракує. Рейдери користуються неорганізованістю ополчень і здійснюють набіги на віддалені поселення, вчені, які все ще засмучені деактивацією Едема, створюють проблеми, і з усією цією новою територією під нашим контролем нам потрібно почати обговорювати питання управління."
    EEN_nf_events.16.a:0 "Просто важкий період"
    EEN_nf_events.17.title:0 "Рейдери скрізь"
    EEN_nf_events.17.desc:0 "Після розпаду ополчення поселень Столичної пустки рейдери на околицях стали більш зухвалими. Від Тенпенні-Тауер аж до старої «Республіки Дейва» надходять повідомлення про те, що рейдери нападають на все більше караванів і наближаються до міських стін. Якщо ми нічого не зробимо, це тільки погіршиться, і мешканці пустки під нашим контролем засумніваються в мирі та процвітанні, які ми обіцяємо."
    EEN_nf_events.17.a:0 "Для них не буде місця в Америці"
    EEN_nf_events.18.title:0 "Успішний запуск"
    EEN_nf_events.18.desc:0 "Сьогодні Братство здійснило штурм, подібний до багатьох інших з початку цієї війни. Ліберті Прайм рухався до однієї з наших позицій, вистрілюючи лазери з очей, а за ним слідували їхні маленькі солдати. Цього разу для них все закінчилося інакше. Вогонь старої Америки пролився з небес і розніс Ліберті Прайма на шматки. На додачу кілька паладинів і лицарів також потрапили під вибух. Без своєї секретної зброї Братство втратило найкращий шанс виграти цю війну. Хоча у нас ще є кілька залпів нагорі, і знищення Пентагону, ймовірно, закінчило б цю війну, ніхто не хоче знищувати найважливішу військову споруду Америки лише для того, щоб вивести кількох тарганів. Ми виженемо покидьків Братства, і прапор Америки знову замайорить над Пентагоном. Крім того, ми не знаємо, над чим працюють ті вискочки на заході, і ця зброя може стати в нагоді згодом."
    EEN_nf_events.18.a:0 "Схоже, їхня маленька іграшка зламалася"
    EEN_nf_events.19.title:0 "Загроза рейдерів стримана"
    EEN_nf_events.19.desc:0 "Після нашої успішної кампанії проти рейдерів Вашингтона та зміцнення північного кордону, напади рейдерів у Столичній Пустці досягли історичного мінімуму. Поселенці, які перебувають під нашою владою, користуються відносним відчуттям безпеки, якого не бачили за все своє життя, і за це вони можуть дякувати чоловікам і жінкам Анклаву."
    EEN_nf_events.19.a:0 "Однією проблемою менше"
    EEN_nf_events.20.title:0 "Зрада в науковому відділі"
    EEN_nf_events.20.desc:0 "Патруль, відправлений розслідувати напад на караван, виявив сліди розрядів енергетичної зброї, а кілька караванників зникли безвісти. Після масштабної зачистки території від рейдерів або залишків Братства, яку ми пропустили, вони виявили дещо тривожне. У покинутому бункері члени нашого наукового відділу проводили несанкціоновані лабораторні дослідження. Вони влаштовували засідки та викрадали мешканців пустки, щоб продовжити експерименти з ВШЕ, які були заборонені після повалення Едема. Що ще гірше, це не поодинокий випадок. Випадки крадіжок обладнання, несанкціонованих експериментів та відкритого невдоволення в нашому науковому відділі зростають. Якщо ми не зробимо з цим щось найближчим часом, це може вийти з-під контролю."
    EEN_nf_events.20.a:0 "Давайте вести переговори"
    EEN_nf_events.20.b:0 "Час навести лад у домі"
    EEN_nf_events.21.title:0 "Чистка вчених"
    EEN_nf_events.21.desc:0 "Наше розслідування раку, що поширюється в Науковому Відділі, показало, що це були далеко не просто кілька людей нагорі та їхні вірні поплічники. Майже 3 з 5 наших учених все ще дотримуються Доктрини Едема про генетичну чистоту та геноцид мешканців пустки. Тих, хто просто говорить або дотримується переконань своїх начальників, можна перевиховати, але тих, хто активно працює проти нас, чекає лише одна доля."
    EEN_nf_events.21.a:0 "Обличчям до стіни"
    EEN_nf_events.22.title:0 "Чорна Броня та літальні Машини"
    EEN_nf_events.22.desc:0 "Помічено, як мешканці пустки тікають на нашу територію, несучи на спинах лише лахміття. Всі вони розповідають про напад солдатів у чорній силовій броні, які прибули на якихось літальних апаратах і просто почали стріляти. Роками ходили чутки про патрулі в чорній силовій броні, яких бачили вночі в тих горах на північному заході столичної пустки. Багато хто відкидав їх як прості фантазії, але, здається, у цих історіях була частка правди."
    EEN_nf_events.22.a:0 "Далі ви скажете, що дерево, яке говорить, теж справжнє!"
    EEN_nf_events.22.b:0 "Можливо, деякі патрулі Братства змусять людей почуватися в безпеці"
    EEN_nf_events.23.title:0 "Наукову кризу вирішено"
    EEN_nf_events.23.desc.1:0 "Шляхом серйозних переговорів і більшої кількості поступок, ніж нам хотілося б, ми нарешті змогли відновити хитку лояльність наших учених. Багато хто в пустці може заперечувати проти експериментів на в'язнях та фінансування науки, спрямованого на «терапію генетичного очищення», але прогрес має свою ціну."
    EEN_nf_events.23.desc.2:0 "Останні кілька місяців у науковому відділі були важкими. Між чистками, перевихованням і важкою інтеграцією вчених з пустки, усім довелося пристосовуватися. Після місяців реорганізації та кількох невеликих лабораторних аварій ми нарешті повернулися в нормальне русло. Вчені з пустки доводять свою цінність, і є один, який виявляє велику перспективність."
    EEN_nf_events.23.a:0 "Повертаємося до роботи"
    EEN_nf_events.23.b:0 "Ласкаво просимо на борт, докторе Холт"
    EEN_nf_events.24.title:0 "Адміністративне лімб"
    EEN_nf_events.24.desc:0 "Військова міць наших сил не викликає сумнівів у Столичній Пустці. Поселення під нашим контролем не чинять опору і дедалі більше звикають до вигляду чорної силової броні на своїх запилених вулицях. Все ще існує проблема загальної плутанини щодо того, що буде далі. Багато лідерів поселень і громадян відкрито взялися за зброю, щоб допомогти Братству, і хоча ми не зайняли офіційної позиції з цього приводу, багато хто задається питанням, чи не повторить їхня доля долю керівництва Братства. Настав час нам вирішити і дати знати, що станеться з лідерами цих поселень. Було висловлено думку, що вони повинні постати перед судом і, можливо, стратою за їхню роль в антиамериканському повстанні, але також можна стверджувати, що вони просто діяли на основі хибної інформації, роблячи те, що вважали найкращим для людей, якими керували. Не кажучи вже про те, що заміна всіх цих губернаторів і шерифів буде більшою роботою, ніж заміна кількох фанатиків."
    EEN_nf_events.24.a:0 "Повстанці повинні бути покарані"
    EEN_nf_events.24.b:0 "Можна спробувати амністію за лояльність"
    EEN_nf_events.25.title:0 "Суд над Мегатонною"
    EEN_nf_events.25.desc.1:0 "Захист Лукаса Сімса висунув дуже цікавий аргумент від імені колишнього лідера ополчення поселень Столичної пустки. Вони стверджували, що він не винен у тому, що повів свій народ на боротьбу з Анклавом. Зрештою, Братство було найближчим до захисників, яких він знав усе своє життя, і вони обманули його, змусивши повірити, що ми просто ще одна загроза їхній безпеці. Навіть незважаючи на те, що він узявся за зброю проти Уряду Сполучених Штатів, це була просто помилкова спроба захистити свій дім і людей, яким він присягав."
    EEN_nf_events.25.desc.2:0 "Людина, відома просто як Дядько Роу, безумовно, не є воєначальником. Він був просто бізнесменом, який займався бізнесом. За словами його адвоката, міста та поселення під керівництвом Дядька Роу відчайдушно потребували технологій та води, які обіцяло Братство. Відправка чоловіків і жінок на боротьбу з силами Анклаву була просто кроком для отримання ресурсів, необхідних для їхнього подальшого виживання та процвітання. Даючи свідчення, Дядько Роу заявив, що якби він знав, що ми розумні люди, а не геноцидні маніяки, якими нас змальовувало Братство, він би спробував укласти з нами угоду."
    EEN_nf_events.25.desc.3:0 "Суд над інсургентом, який проголосив себе «Президентом Дейвом», був абсолютним видовищем. У вчинку, який не здивував майже нікого, егоцентричний Дейв вимагав представляти себе сам і відмовлявся відповідати на запитання прокурорів, якщо до нього не зверталися за його фальшивим титулом. Якби його поведінки в залі суду було недостатньо, його захист був ще більш смішним. Він намагався стверджувати, що не тільки мав право проголосити себе президентом пустки, але й те, що, оскільки він був обраний «народом» своєї республіки, його право на правління має ставити його вище нашого уряду. Цей аргумент був швидко відхилений, як тому, що він не мав підстав в американському законодавстві, так і тому, що його електоральна база складалася аж з 5 осіб. Непокірний до кінця, Дейв назвав своїх катів зрадниками республіки і проклинав їх аж доти, доки не перетворився на калюжу світної слизоти."
    EEN_nf_events.25.desc.4:0 "Іноземному загарбнику на ім'я Алістер Тенпенні варто було б почитати про 1775-1783 та 1812-1815 роки, перш ніж думати про вторгнення в Америку. Хисткий захист старого спирався на його віддаленість від будь-яких реальних бойових дій, намагаючись перекласти всю провину на своїх підлеглих. Цей захист було легко спростовано, і він став другорядним питанням, коли обвинувачення представило докази зв'язку Тенпенні зі змовою з метою підірвати нездетоновану ядерну бомбу в самому серці Столичної Пустки. Розкриття цього терористичного плану та плану масового вбивства не залишило жодних сумнівів у присяжних, що Тенпенні заслуговує на страту."
    EEN_nf_events.25.a:0 "Приготувати розстрільну команду"
    EEN_nf_events.25.b:0 "Не можна звинувачувати людину в захисті свого дому"
    EEN_nf_events.25.c:0 "Крутий мотив, але все одно зрада"
    EEN_nf_events.25.d:0 "Конфіскувати його бізнес як компенсацію"
    EEN_nf_events.25.e:0 "Що було не так з тим хлопцем?"
    EEN_nf_events.25.f:0 "Коли вже британці навчаться?"
    EEN_nf_events.25.g:0 "Давайте відправимо їм невеликий феєрверк"
    EEN_nf_events.26.title:0 "Передача влади"
    EEN_nf_events.26.desc:0 "Кроком, який засмутив консерваторів, але є найпрактичнішим, який ми могли зробити, ми вирішили дозволити багатьом нинішнім лідерам поселень Столичної пустки залишитися при владі у своїх містах, доки не буде організовано вибори. Тим часом патрулі продовжуватимуть перевіряти міста, щоб переконатися, що все працює гладко, але окрім цього їм буде надано автономію для вирішення повсякденних справ."
    EEN_nf_events.26.a:0 "Ефективне рішення"
    EEN_nf_events.27.title:0 "Перспективні лідери"
    EEN_nf_events.27.desc:0 "Ми отримуємо звіти від патрулів, які перевіряють поселення по всій Столичній Пустці, про те, як кілька з цих міст процвітають під керівництвом своїх місцевих лідерів і оговтуються від конфлікту набагато швидше за інших. Надійшло кілька рекомендацій, щоб цим місцевим лідерам запропонували місця у вищому уряді, щоб допомагати більшій кількості людей."
    EEN_nf_events.27.a:0 "Варто розглянути"
    EEN_nf_events.28.title:0 "Проєкт Чистота запущено"
    EEN_nf_events.28.desc:0 "Після місяців роботи з усунення пошкоджень, завданих під час конфлікту з Братством, Проєкт Чистота нарешті запрацював і стабільно виробляє чисту воду для мас. Ми вже маємо кілька планів розподілу цієї води серед сусідніх поселень як з гуманітарних міркувань, так і для того, щоб вони погодилися на інтеграцію в Америку. Прямо зараз у районі кількох поселень пустки будуються центри розподілу води. Ці центри слугуватимуть як вузлами для ефективного розподілу води, так і основними центрами місцевого управління."
    EEN_nf_events.28.a:0 "§R Але як це працює?"
    EEN_nf_events.28.b:0 "Нехай вода тече"
    EEN_nf_events.29.title:0 "Інтеграція Компанії Кіготь"
    EEN_nf_events.29.desc:0 "Хоча найманці Компанії Кіготь менш дисципліновані, ніж середньостатистичний солдат Анклаву, вони довели, що є важливим інструментом у нашому конфлікті з Братством. У мирний час їхня присутність менш позитивна. Зростає рух цивільних, солдатів і навіть членів Компанії Кіготь, які вимагають, щоб цю найманську організацію нарешті розформували, а їхніх солдатів звільнили від контрактів і зробили повноправними американськими громадянами. Вже підготовлено Виконавчий наказ про закриття компанії, надання її солдатам повного громадянства, а її об'єкт у Форті Баністер передано під наш прямий контроль. Залишається вирішити одне питання. Деякі члени Компанії Кіготь не бажають переходити до цивільного життя і працювати охоронцями караванів або фермерами. Все ще є контингент найманців Компанії Кіготь, які бажають офіційно інтегруватися в наші військові. Хоча їхній вступ, очевидно, вітається, занепокоєння викликає їхнє прохання навчатися та використовувати силову броню. Наші старші офіцери та солдати вважають, що найманці Компанії Кіготь просто недостатньо дисципліновані, щоб їм можна було довіряти таке обладнання, і, враховуючи послужний список компанії, це не зовсім безпідставно."
    EEN_nf_events.29.a:0 "Інтегрувати їх як допоміжні війська та розвідників"
    EEN_nf_events.29.b:0 "Вітаємо оперативну групу Кіготь у силовій броні"
    EEN_nf_events.29.c:0 "Компанія Кіготь продовжить служити як допоміжна сила"
    EEN_nf_events.30.title:0 "У Сховище 87"
    EEN_nf_events.30.desc:0 "Після місяців планування та тренувань у змодельованому Сховищі 87, створеному за кресленнями Волт-Тек, команду Анклаву Сігма нарешті було відправлено в саме серце темряви, щоб вирізати цю чуму з нашої нації. Незважаючи на жорстокий опір мутантів, команда змогла виконати свою місію і розчистити шлях для наукової команди, щоб безпечно вивести з ладу обладнання, яке використовувалося для створення цих громіздких жахів. Можливо, у пустках ще залишилися мутанти, але вперше за десятиліття їхня чисельність почне зменшуватися, поки не зникне зовсім."
    EEN_nf_events.30.a:0 "Місію виконано"
    EEN_nf_events.31.title:0 "Літтл-Лемплайт"
    EEN_nf_events.31.desc:0 "Печера, колись відома як Лемплайт Кавернс, здається, стала домом для самодостатньої колонії дітей, які відбивалися не тільки від жахів пустки, але й від мутантів у себе за спиною. Спочатку вони з побоюванням ставилися до наших сил, але коли їм повідомили, що ми зупинили потік мутантів зі Сховища 87, діти стали привітними до нас, «мунґосів». Ті, хто був у печерах, кажуть, що це досить вражаючий подвиг, особливо для дітей, виживати там так довго. Було запропоновано побудувати дитячий будинок у Великому Місті, щоб переселити цих дітей та інтегрувати їх у звичайне суспільство. Однак також висловлювалася думка, що краще залишити дітей у спокої і дозволити їм поступово відкриватися світу."
    EEN_nf_events.31.a:0 "Витягнути їх з темряви"
    EEN_nf_events.31.b:0 "Дозволити їм вийти самостійно"
    EEN_nf_events.32.title:0 "Тихо на внутрішньому фронті"
    EEN_nf_events.32.desc:0 "Вперше за довгий час Столична Пустка насолоджується періодом відносної стабільності. Атаки супермутантів стають дедалі рідшими, набіги рейдерів швидко припиняються, а чисту воду можна вільно знайти майже в кожному великому поселенні. Тепер, коли всі пожежі погашено, ми можемо звернути увагу на менш нагальні, але все ж важливі питання. Зміцнюючи контроль і готуючись до кампанії з відбудови Америки, ми повинні поставити собі дуже важливі питання. Як зростатимуть наші військові, щоб відповідати нашим потребам? Як ми будемо керувати нашою постійно зростаючою економікою? І як саме ми будемо підтримувати закон, порядок та реконструкцію? Все це було простими справами, коли ми були групою солдатів, учених та допоміжного персоналу, які жили в бункерах останні два століття, але ця політика просто не є практичною в масштабах."
    EEN_nf_events.32.a:0 "Усі важливі питання, на які будуть дані відповіді."
    EEN_nf_events.33.title:0 "Армія завтрашнього дня"
    EEN_nf_events.33.desc:0 "Масштаби наших військових операцій за останній рік зросли в геометричній прогресії. Там, де колись кількох взводів солдатів у силовій броні було достатньо для досягнення наших цілей, тепер ми повинні охоплювати набагато більше територій і задіювати набагато більше військ, щоб ефективно здійснювати наш контроль за межами наших кордонів. Наші начальники штабів представили пропозиції щодо подальшого розвитку наших військових. Перший план полягає в радикальних змінах у наборі, навчанні та виробництві, щоб відійти від сил у силовій броні і натомість розвинути механізовану армію. Офіцери, які підтримують цей план, стверджують, що ефективне використання механізованої армії дозволить швидко придушити більшість ворожих сил у пустках, а також дозволить нам швидше пересуватися, не наражаючи на ризик наш флот гвинтокрилів. Друга пропозиція передбачає зниження наших стандартів щодо обладнання, яким ми оснащуємо наші сили в силовій броні, і, можливо, залучення більшої кількості мешканців пустки для підтримки наших сил у силовій броні. Остання пропозиція пропонує різко скоротити роль сил у силовій броні в наших військових, натомість зосередившись на звичайній піхоті. Генерали, які підтримують цей план, стверджують, що більшість загроз пустки так само легко впадуть під хвилями плазмового та лазерного вогню, а якщо ми зіткнемося з чимось, що не піддається, тоді ми зможемо ввести X-02."
    EEN_nf_events.33.a:0 "Ми зосередимося на БТРах і танках"
    EEN_nf_events.33.b:0 "Силова броня, як і раніше, буде нашим хребтом"
    EEN_nf_events.33.c:0 "Звичайна піхота прокладе шлях"
    EEN_nf_events.34.title:0 "Фінансовий крах"
    EEN_nf_events.34.desc:0 "З постійним постачанням чистої води з Проєкту Чистота було майже немислимо, що ми колись дійдемо до цього. Але минулого тижня запаси води досягли критично низького рівня. Ми не впевнені, як новина просочилася, оскільки вона була суворо засекречена, але це викликало хвилю потрясінь у нашій економіці. Місцеві водні склади штурмують громадяни, які хочуть обміняти свою валюту на воду в тому, що вже називають «набігом на резервуари». Деякі торговці навіть почали відмовлятися від валюти США на користь кришечок або бартеру. Якщо ми швидко не вирішимо цю проблему, це може призвести до краху."
    EEN_nf_events.34.a:0 "Подивитися, чи можемо ми обміняти воду, принаймні зараз"
    EEN_nf_events.34.b:0 "Обмежити забір води і спробувати перечекати"
    EEN_nf_events.35.title:0 "Розмова про гроші"
    EEN_nf_events.35.desc:0 "Дедалі більше наших солдатів просять платити їм кришечками замість валюти Анклаву, посилаючись на те, що там, де вони дислоковані, ніхто її не приймає. Це ставить під сумнів довгострокові плани нашої економіки і те, що ми будемо використовувати як валюту. За словами нашого головного економіста, у нас є два основні варіанти вирішення питання валюти. Ми можемо почати випускати новий американський долар і поступово впроваджувати його в нашій економіці, або ми можемо прийняти кришечку, як це зробила більшість пустки. Хоча долар має свої переваги і є набагато більш респектабельним, ніж простий шматок металу від старої пляшки, людям знадобиться час, щоб його прийняти, а можлива торгівля за межами нашої території стане складнішою. З іншого боку, кришечка вже є загальновизнаною, і хоча це по суті торгівля сміттям, вона мало чим відрізняється від паперових грошей."
    EEN_nf_events.35.a:0 "Повернути всемогутній долар"
    EEN_nf_events.35.b:0 "Залишитися з кришечками"
    EEN_nf_events.36.title:0 "Забезпечення долара"
    EEN_nf_events.36.desc:0 "У столітті до Великої Війни долар США був забезпечений вірою людей в Уряд Сполучених Штатів. Сьогодні люди вже не мають такої віри, як колись, і було запропоновано взяти приклад з історії і забезпечити нашу валюту цінним ресурсом. Так само, як дофіатні уряди забезпечували свої валюти золотом, кришечка була забезпечена запасами води, які мали могутні торговці. Ми могли б прийняти таку політику, але є одна велика проблема. Для підтримки нашої зростаючої економіки нам потрібно буде постійно збільшувати запаси води, і якщо колись у нас не буде води, щоб задовольнити цей попит, наша економіка може ризикувати крахом."
    EEN_nf_events.36.a:0 "Віра в уряд буде забезпечувати нашу валюту"
    EEN_nf_events.36.b:0 "З Проєктом Чистота як у нас може закінчитися вода?"
    EEN_nf_events.37.title:0 "Промислова революція"
    EEN_nf_events.37.desc:0 "Окрім Пітта, у пустці майже немає нічого, що можна було б назвати промисловою потужністю. Фабрики стоять пусткою та руйнуються, більшість промисловості — це не більше ніж кілька рабів у майстерні. Ми могли б забрати це собі або підтримати заповзятливих цивільних у відновленні цих фабрик."
    EEN_nf_events.37.a:0 "Нехай цим займуться бізнесмени"
    EEN_nf_events.37.b:0 "Ми не можемо залишити ці активи простому наброду"
    EEN_nf_events.371.title:0 "Питання управління"
    EEN_nf_events.371.desc:0 "На наших територіях існують різноманітні поселення, кожне зі своїми дивними формами самоврядування та звичаями. Хоча, звичайно, ми хотіли б, щоб усі ці люди відповідали старим добрим американським ідеалам і законам, це може зайняти деякий час, і поки що просто повага до влади нашого Уряду може бути достатньою, навіть якщо в маленькому містечку з брухту посеред нізвідки все влаштовано трохи інакше."
    EEN_nf_events.371.a:0 "Невелика автономія — невелика ціна за лояльність"
    EEN_nf_events.371.b:0 "Вони будуть точно дотримуватися наших вказівок, або інакше!"
    EEN_nf_events.38.title:0 "Угоди з Дияволами"
    EEN_nf_events.38.desc:0 "Минулого тижня Проєкт Чистота мав незвичайного відвідувача. Розвалююче судно під командуванням людини на ім'я Джей Пі Джонс підпливло до причалу, і капітан з кількома членами екіпажу зійшов на берег. Після короткої перестрілки з'ясувалося, що людина, відома Дуврським торговцям як Піратський Король Чесапікської затоки, не така дурна, щоб намагатися пограбувати об'єкт Уряду США. Натомість він приєднався до досить довгого списку рейдерів та інших бандитів на наших кордонах, які пропонують працювати на нас або принаймні залишити нас у спокої в обмін на помилування. Капітан Джонс здається більш цивілізованим, ніж багато рейдерів, яких ми зустрічали, і його пропозиція знову викликала дискусію про те, як ми поводимося з рейдерами на наших околицях, які роблять такі пропозиції."
    EEN_nf_events.38.a:0 "Ці пірати не мають лояльності. Вбити його разом з рештою"
    EEN_nf_events.38.b:0 "Ми повинні оцінювати ці пропозиції в кожному конкретному випадку"
    EEN_nf_events.39.title:0 "Підтримання миру"
    EEN_nf_events.39.desc:0 "Ми давно переросли той етап, коли патрулювання нашої території солдатами є можливим. На території Анклаву злочини залишаються безкарними, поселення живуть у страху, і, що найважливіше, наше правління ставиться під сумнів. Якщо ми не приймемо більш життєздатну політику правоохоронних органів, наші аналітики очікують відкритих повстань протягом кількох місяців. Два найбільш перспективні варіанти мають свої переваги та недоліки. Перший — створити національну поліцію, яка підпорядковується безпосередньо федеральному уряду. Це дало б нам найбільший контроль і забезпечило б дотримання законів саме так, як ми хочемо, на всій нашій території. Однак це дорожче і ляже тягарем на нашу і без того напружену адміністрацію. Другий варіант — делегувати повноваження та розширені поліцейські функції місцевим силам безпеки поселень. Хоча це дуже економічно ефективний варіант і дозволяє нам перенаправити адміністраторів в інші місця, існує дуже реальна проблема того, що місцева політика та корупція зіпсують те, що має бути нашим верховенством закону. Прихильники цієї політики вважають, що менша федеральна поліція, подібна до маршалів США довоєнної Америки, має допомогти пом'якшити цю проблему, але сумніви все ще залишаються."
    EEN_nf_events.39.a:0 "Федеральна поліція наш вибір"
    EEN_nf_events.39.b:0 "Правосуддя на кордоні працювало століттями"
    EEN_nf_events.39.c:0 "Коли-небудь чули про теорію бродячих бандитів?"
    EEN_nf_events.40.title:0 "Артерії Америки"
    EEN_nf_events.40.desc:0 "Інфраструктура післявоєнної Америки практично відсутня. Колись великі шосе та мости залишалися розсипатися століттями, за дуже рідкісними винятками. Якщо ми хочемо належним чином розширюватися і повернути Америку, нам потрібно буде відбудувати американську інфраструктуру. Питання залишається: чи варто нам намагатися повернутися до довоєнного рівня розвитку доріг, чи варто трохи відступити і спочатку зайнятися залізницями?"
    EEN_nf_events.40.a:0 "Залізниць достатньо"
    EEN_nf_events.40.b:0 "Шосе так само американське, як яблучний пиріг і плазмовий вогонь"
    EEN_nf_events.41.title:0 "Проєкт Американських міст"
    EEN_nf_events.41.desc:0 "Зруйновані руїни колись великих міст усіяли ландшафт післявоєнної Америки. Багато з них носять шрами атомної зброї, а також століть занедбаності. Проте з цих полеглих інженерних чудес можна багато врятувати. З нашим Проєктом Американських Міст ми можемо взятися за наступні великі завдання з відбудови нашої великої нації. Повільно, але впевнено ми можемо почати зносити руїни старого і замінювати їх містами завтрашнього дня. Навіть зараз розробляються плани відбудови невеликих ділянок таких міст, як Вашингтон і Піттсбург. Нам просто потрібно виділити необхідні ресурси та робочу силу для цих великих завдань."
    EEN_nf_events.41.a:0 "Пора братися до роботи"
    EEN_nf_events.42.title:0 "Тверда направляюча рука"
    EEN_nf_events.42.desc:0 "Анклав зіткнувся з багатьма викликами з часів Великої Війни. Але з часів знищення Нафтової Вишки та падіння Наварро американська мрія ніколи не була так близька до смерті, як останні кілька років. І все ж наш Головнокомандувач залишався сильним. Крізь загрози Братства, супермутантів та анархістів президент Отем привів нашу велику націю до перемоги та забезпечив найкращий шанс на відродження Америки, який ми бачили за десятиліття. Зараз не час відпочивати. Хоча ми подолали ці небезпечні перешкоди, це лише початок. Під керівництвом президента Отема Америка знову житиме."
    EEN_nf_events.42.a:0 "Боже, благослови президента Отема"
    EEN_nf_events.43.title:0 "Дуврський договір"
    EEN_nf_events.43.desc:0 "Дуврські торговці та рибалки затоки чинили більший опір, ніж можна було очікувати від кількох рибалок і торговців. Навіть зараз, коли їхні лідери за столом переговорів, деякі з них марно продовжують боротьбу. Ці колишні солдати продовжують кампанію терору через гнів за втрачених друзів, домівки та близьких під час недавньої війни. Хоча немає сумніву, що з часом ці заблукалі дурні або побачать помилковість своїх шляхів, або загинуть, можуть бути способи допомогти їм побачити переваги правління Анклаву."
    EEN_nf_events.43.a:0 "Кошти на відбудову допоможуть їм схаменутися"
    EEN_nf_events.43.b:0 "Жодних поступок не буде"
    EEN_nf_events.44.title:0 "Відкриття військово-морської бази Отема"
    EEN_nf_events.44.desc:0 "Сьогодні було перерізано стрічку на першій верфі Військово-Морської Бази Отема. Цей перший крок у масштабній справі відбудови військово-морського флоту Америки, хоч і вважається багатьома безглуздим в епоху, коли більшість наших ворогів ледь спроможні вивести в море більше, ніж іржаві баржі та пароплави, є важливим кроком у збереженні безпеки узбережжя. Серед присутніх були перші випускники новоствореної Військово-Морської Академії Анклаву. Хоча вони ще не керували нічим, крім навчальних суден, вони стануть ключовими в наших військово-морських починаннях у найближчі роки."
    EEN_nf_events.44.a:0 "Америка править хвилями"
    EEN_nf_events.45.title:0 "Работорговці Пітта"
    EEN_nf_events.45.desc:0 "Понад століття після Великої Війни Піттсбург залишався не більш ніж черговим опроміненим безладом, де люди ледь виживали. Так було доти, доки кілька років тому одинокий солдат Братства не був залишений під час зачистки і швидко використав свої навички та лідерські якості, щоб підкорити Пітт. Хоча багато хто бачить вади у використанні рабської праці та жорстокості під керівництвом Ашура, ніхто не може сперечатися з успіхом, якого він досяг у відбудові Піттсбурга, перетворивши його на щось більш схоже на функціонуюче місто-державу, ніж на анархічний кошмар. Тепер, коли ми повертаємо Пітт під американський контроль, ми повинні відповісти на важливе питання. Що нам робити з Ашуром та його солдатами?"
    EEN_nf_events.45.a:0 "Більше ніякого рабства, але вони все ще можуть керувати повсякденними справами"
    EEN_nf_events.45.b:0 "Ми поступово усунемо їх від влади"
    EEN_nf_events.45.c:0 "Кинути їх до в'язниці"
    EEN_nf_events.46.title:0 "Раби"
    EEN_nf_events.46.desc:0 "Тисячі людей, викрадених з усіх куточків регіону, були змушені працювати в Пітті. Ці бідолахи були змушені працювати день і ніч без оплати, і єдиним порятунком для них була битва на гладіаторській арені. Тепер, коли їхніх колишніх господарів переможено, вони чекають і гадають, що ми з ними зробимо. Зазвичай відповідь була б простою, але той факт, що вони майже всі заражені важкою генетичною мутацією, викликає унікальні занепокоєння. Ліки від цієї хвороби трогів все ще невідомо через скільки часу, і ризики для решти населення великі. Деякі з наших учених запропонували створити карантинну зону, забезпечивши гуманне поводження та медичну допомогу тим, хто всередині."
    EEN_nf_events.46.a:0 "Ми не можемо дозволити цим мутантам тинятися"
    EEN_nf_events.46.b:0 "Ті, хто зайшли надто далеко, повинні бути утилізовані"
    EEN_nf_events.46.c:0 "Позбавити їх усіх страждань."
    EEN_nf_events.47.title:0 "Проблеми з Трогами"
    EEN_nf_events.47.desc:0 "Наче диких гульів було недостатньо, у Пітта є своя особлива порода мутованих виродків. Троги, як їх називають місцеві, деградували до швидких і смертоносних чотириногих, які полюють зграями і, як було помічено, використовують прості тактики засідок. Якщо ми коли-небудь серйозно заселимо місто, цих істот потрібно буде винищити. Вищим керівництвом було подано кілька пропозицій, які звели до 3 основних планів очищення зараження та приведення чисельності трогів до прийнятного рівня. Перший — повільно, спеціалізованими загонами, методично прочісувати руїни квартал за кварталом. Це займе досить багато часу і виснажуватиме наші ресурси протягом місяців або навіть років. Однак ризик пропустити будь-які гнізда оцінюється як дуже низький. Друга пропозиція набагато сміливіша. Вона передбачає серію швидких і руйнівних зачисток осередків трогів, при цьому допоміжні команди чекають у навколишніх районах, готові добивати тих, хто відстав. За оцінками, цей план буде завершено за кілька місяців, але він не позбавлений ризиків. Ймовірність того, що команди пропустять велике гніздо або будуть відрізані під час просування, не така мала, щоб її можна було скидати з рахунків. Остання пропозиція — встановити серію приманок у різних районах руїн, щоб виманити трогів у зони знищення з автоматичною обороною та безпечними бункерами. Цей план також займе досить багато часу, але не буде таким виснажливим для робочої сили, як зачистки, і має менший ризик жертв. У нього все ще є проблема того, що ми можемо пропустити якесь місце."
    EEN_nf_events.47.a:0 "Тихіше їдеш — далі будеш"
    EEN_nf_events.47.b:0 "У нас немає часу на обережність"
    EEN_nf_events.47.c:0 "Збереження життя має бути нашою метою"
    EEN_nf_events.48.title:0 "Герої Джонстауна"
    EEN_nf_events.48.desc:0 "Хоча спочатку вони були залякані нашою грізною бронею та передовою зброєю, жителі Джонстауна швидко зрозуміли, що ми ті визволителі-герої, за яких себе видаємо. Загроза нападів рейдерів та вимагання тепер для цих мирних фермерів залишилася в минулому. Більше фермерам не доведеться віддавати частину свого врожаю або відправляти своїх дочок і синів до володарів-рейдерів. Тепер вони живуть під надійним захистом Уряду Сполучених Штатів. Так, їм доведеться платити податки зі своїх товарів, і призов залишається в силі, доки ми не об'єднаємо Америку, але це не те саме, і вони це знають."
    EEN_nf_events.48.a:0 "Ось чому ми боремося"
    EEN_nf_events.49.title:0 "Аміші ЩО?"
    EEN_nf_events.49.desc:0 "Згідно з довоєнними записами, Пенсильванія була домом для великої кількості людей, яких називали амішами. Це були працьовиті люди, які цуралися атрибутів сучасного суспільства, віддаючи перевагу покладатися на власні руки та допомогу сусідів. Очікувалося, що ми рано чи пізно натрапимо на представників цієї культури, оскільки такий тип суспільства добре підходить для життя після апокаліпсису. Що здивувало багатьох, так це те, що ті, кого ми знайшли, хто практикував цю ідеологію, були купкою гульів та супермутантів. Первісні непорозуміння призвели до кровопролиття, яке ми бачили, але тепер, коли ми стоїмо переможцями, постає питання, що робити з цим дивним новим сегментом нашого населення. Чи дозволимо їм жити своїм мирним існуванням цього разу під нашою владою, чи залишимося вірними нашому минулому ставленню до мутантів?"
    EEN_nf_events.49.a:0 "Мутанти не допускаються"
    EEN_nf_events.49.b:0 "Якщо вони платять податки, вони американці."
    EEN_nf_events.49.c:0 "Чи приймуть вони чужих гульів та мутантів?"
    EEN_nf_events.50.title:0 "На північ"
    EEN_nf_events.50.desc:0 "Північний кордон від верхньої частини штату Нью-Йорк аж до самої Канади — це величезна, переважно замерзла пустка, яка має невелику цінність, окрім кількох зруйнованих міст. Тим не менш, це американська земля, яку потрібно повернути. Звичайно, ми не повинні забувати про нещасний Анклав Онтаріо, який, за нашими останніми даними, відчайдушно намагався відвоювати руїни Торонто у мутованих повстанців. Якщо ми не будемо обережні, це може стати і нашою долею."
    EEN_nf_events.50.a:0 "Що ж сталося з Анклавом Онтаріо?"
    EEN_nf_events.51.title:0 "Питання Мегатонни"
    EEN_nf_events.51.desc.1:0 "З усіх дивних життєвих ситуацій, у яких опинилися люди в післявоєнній Америці, мало які є дивнішими, ніж місто Мегатонна. Два століття тому люди з району Спрінгвейл, які не змогли потрапити до Сховища 101, вирішили, що кратер з нездетонованою бомбою — це найкраще, що вони можуть знайти. За 200 років, що минули, люди Мегатонни збудували стіни та будинки в цьому кратері і, за іронією долі, створили одне з найбезпечніших поселень у Столичній Пустці. Навіть якщо бомма є несправною і ходять чутки, що її повністю роззброєно, все ще існує постійна небезпека, а також дуже реальна радіація, що просочується з пристрою в ґрунт і питну воду мешканців Мегатонни. Правильне знешкодження бомби вимагало б переселення всього поселення, що може бути дорогим. Наразі існує два плани переселення цих людей. Перший — переселити людей Мегатонни в сусідні поселення. Друга пропозиція — переобладнати покинутий супермаркет Супер-Пупер у центр для біженців, де мешканці Мегатонни зможуть залишатися, поки не знайдуть більш відповідне житло або бомбу не буде видалено, і вони зможуть повернутися додому. Звичайно, ми могли б просто відправити команду, щоб переконатися, що бомба повністю роззброєна, і порадити їм не пити місцеву воду та не їсти місцеві продукти."
    EEN_nf_events.51.desc.2:0 "Люди Мегатонни справді повинні були знати, що одного дня та нездетонована атомна бомба, біля якої вони жили 200 років, може вибухнути. Незважаючи на їхнє погане рішення, ми обладнали тимчасове сховище у старому супермаркеті Супер-Пупер для тих, хто вижив після руйнування свого дому і не має куди піти. Багато з тих, хто жив близько до вибуху, але не постраждав від пожежі, стали гулями, і пропонується залишити їх у таборі на невизначений час, щоб вони не турбували решту населення."
    EEN_nf_events.51.a:0 "Переселити їх до інших поселень"
    EEN_nf_events.51.b:0 "Супер-Пупер Табір Біженців"
    EEN_nf_events.51.c:0 "Просто переконайтеся, що вона не може вибухнути"
    EEN_nf_events.51.d:0 "Залишити їх там"
    EEN_nf_events.51.e:0 "Переселити їх до інших поселень"
    EEN_nf_events.51.f:0 "Не дати гулю жити"
    EEN_nf_events.52.title:0 "Кентербері Громада"
    EEN_nf_events.52.desc.1:0 "Невелике містечко Кентербері Громада протягом десятиліть залишалося важливою зупинкою для торговців. За часів правління поселень Столичної пустки місто виросло з невеликого пункту зупинки в жвавий торговий центр, який затьмарив подібні місця в пустках. Під нашим керівництвом все продовжується майже так само, але місцеві торговці турбуються про те, що чекає на них у майбутньому."
    EEN_nf_events.52.desc.2:0 "Невелике містечко Кентербері Громада було домом для нині покійного повстанця Дядька Роу. Хоча після закінчення війни місто склало зброю, торговці та жителі все ще мають образу через те, що вони вважають несправедливим вбивством свого улюбленого лідера. Вони недовірливо ставляться до будь-яких подарунків чи пропозицій, які ми робимо, тому, якщо ми спробуємо інвестувати в це місце, пропозиція має бути значною."
    EEN_nf_events.52.a:0 "Інвестувати в місто та розвивати економіку."
    EEN_nf_events.52.b:0 "Створити торгове агентство для регулювання торгівлі там"
    EEN_nf_events.52.c:0 "Вони знають, що роблять. Просто не забудьте зібрати податки."
    EEN_nf_events.52.d:0 "У Дядька Роу насправді хороші ідеї"
    EEN_nf_events.52.e:0 "Це може бути дорого, але інвестиції мають окупитися"
    EEN_nf_events.52.f:0 "Вони будуть підкорятися нашим агентам, або закінчать, як Роу"
    EEN_nf_events.53.title:0 "Тенпенні-Тауер"
    EEN_nf_events.53.desc.1:0 "В останні десятиліття колись покинутий курорт, який мешканці пустки тепер називають Тенпенні-Тауер, перетворився на поселення для багатої еліти пустки. До недавнього часу вежею керував Алістер Тенпенні, британський деспот, який мав зухвалість заявити права на американську землю і повести добрих американців Столичної Пустки на боротьбу проти власного уряду. Після його страти відповідальність за управління вежею взяв на себе мешканець на ім'я Герберт «Дерзкий» Дешвуд. Офіцер, прикріплений до Вежі, каже, що містер Дешвуд дотримується директив Анклаву і з радістю піде з посади, коли буде знайдено відповідну заміну."
    EEN_nf_events.53.desc.2:0 "На превеликий жах і огиду солдатів, відправлених до Тенпенні-Тауер, колись довоєнний курорт, що став домом для еліти Пустки, перетворився на сховище виключно для гульів. Гуль на ім'я Рой Філліпс, який там керував, ухилявся від відповідей на питання про те, як він захопив вежу і що сталося з попередніми мешканцями. Зомбі розповів нашим солдатам, що ті з'їхали через свою упередженість, але братська могила, знайдена в тунелях метро неподалік, розповідає зовсім іншу історію. Звісно, це масове вбивство американських громадян купкою зомбі не може залишитися безкарним."
    EEN_nf_events.53.desc.3:0 "За останні десятиліття колись покинутий курорт, який мешканці Пустки тепер називають Тенпенні-Тауер, перетворився на поселення для заможної еліти Пустки. Після страти попереднього власника поселеннями Столичної пустки, мешканець на ім'я Герберт 'Відчайдушний' Дешвуд узяв на себе відповідальність за управління вежею. Офіцер, прикріплений до Вежі, повідомляє, що містер Дешвуд виконує директиви Анклаву і з радістю звільнить посаду, щойно буде знайдено відповідну заміну."
    EEN_nf_events.53.desc.4:0 "За останні десятиліття колись покинутий курорт, який мешканці Пустки тепер називають Тенпенні-Тауер, перетворився на поселення для заможної еліти Пустки. Після страти попереднього власника поселеннями Столичної пустки, мешканець на ім'я Ірвінг Чен вирішив керувати поселенням. Початкові звіти про вежу та її лідера викликали занепокоєння, оскільки вони зображували містера Чена як китайського комуністичного революціонера. На жаль, ці побоювання виявилися правдою. Містер Чен майже одразу зізнався нашому офіцеру, відправленому до вежі, що він є гордим нащадком Голови Чена, лідера комуністичного Китаю до війни. Останньою краплею стало те, що офіцер виявив, що містер Чен перетворює Вежу Тенпенні на комуністичну антиутопію. Не в змозі більше терпіти, офіцер стратив містера Чена на місці і вимагає надіслати заміну, яка б керувала вежею та «депрограмувала» інфікованих мешканців."
    EEN_nf_events.53.desc.5:0 "За останні десятиліття колись покинутий курорт, який мешканці Пустки тепер називають Тенпенні-Тауер, перетворився на поселення для заможної еліти Пустки. Вежею керував британський деспот на ім'я Алістар Тенпенні, який мав нахабство проголосити американську землю своєю власністю. Очевидно, його було страчено, а його озброєна охорона майже не чинила опору перед лицем наших сил, відправлених до вежі. Вежу тимчасово передано в руки одного з її мешканців, містера Дешвуда, доки не буде призначено відповідну заміну."
    EEN_nf_events.53.a:0 "Залишити його на посаді"
    EEN_nf_events.53.b:0 "Очистити вежу і спробувати щось зробити зі смородом"
    EEN_nf_events.53.c:0 "Вбити Філліпса та його поплічників, але решту переселити."
    EEN_nf_events.53.d:0 "Залишити його на посаді"
    EEN_nf_events.53.e:0 "Дайте цій людині медаль!"
    EEN_nf_events.54.title:0 "Рівет-Сіті"
    EEN_nf_events.54.desc.1:0 "За тижні, що минули після того, як Рівет-Сіті подав свою пропозицію і прийняв нашу владу в обмін на автономію, точилося багато внутрішніх дебатів про майбутнє плавучого міста. Хоча вони справді сидять на військовому кораблі США і, таким чином, незаконно займають державну власність, вони краще за більшість мешканців Пустки визнали своє місце як американські громадяни і були винятково кооперативними з нашими науковими групами у вивченні післявоєнної флори. Також болісно очевидно, що відновлення цього корабля до робочого стану є більшою проблемою, ніж воно того варте. В адміністрації Отема є значна підтримка ідеї продовжувати надавати Рівет-Сіті автономію і надіслати їм інженерну підтримку, щоб забезпечити існування міста в доступному для огляду майбутньому. Або принаймні ми могли б надати підтримку їхнім вченим і перетворити Рівет-Сіті на повноцінний науковий інститут для освіти розуму майбутнього."
    EEN_nf_events.54.desc.2:0 "Мешканці Рівет-Сіті боролися так само запекло, як і будь-який інший мешканець Пустки, виступаючи проти нашої влади, і, як і всі інші, вони визнали марність своєї боротьби і впустили наші війська. Тепер люди цього іржавіючого мегаполісу сидять і гадають, що з ними та їхнім домом буде. Наші інженери обстежили цю іржаву бандуру і виявили, що навіть якби ми могли відновити корабель до робочого стану, кількість ресурсів, необхідних як для реконструкції, так і для експлуатації корабля, була б краще витрачена на флот вертибердів або кілька батальйонів солдатів у силовій броні. Це залишає питання, що робити з кораблем і людьми на борту, і насправді ми маємо два варіанти, які варто розглянути. Ми могли б надіслати кілька інженерних рекрутів для обслуговування корабля, щоб він залишався на плаву ще довгі роки, зрештою, щасливе населення більш охоче платить податки, або ми могли б працювати над розширенням їхніх наукових лабораторій і перетворити Рівет-Сіті на науковий інститут, де зброя майбутнього може безпечно розроблятися подалі від наших складів боєприпасів."
    EEN_nf_events.54.a:0 "Залишити Рівет-Сіті на плаву"
    EEN_nf_events.54.b:0 "Відправити найгірших покидьків у супермаркет"
    EEN_nf_events.54.c:0 "Розширити лабораторії"
    EEN_nf_events.54.d:0 "Розширити лабораторії"
    EEN_nf_events.55.title:0 "Очищення молу"
    EEN_nf_events.55.desc:0 "Національна алея була місцем одних з найгірших боїв у Столичному Пустищі протягом майже 200 років. Мутанти, рейдери та різні інші угруповання постійно боролися за контроль над цією територією як через центральне розташування, так і через цінності, які можна було знайти в руїнах. Ця битва нарешті закінчилася, коли ми втрутилися. Вперше за 200 років ми можемо повідомити, що Національна алея затихла. Мутанти, анархісти та інші вороги були ліквідовані, а територія взята під контроль. Тепер ми можемо розпочати складне завдання відновлення алеї принаймні до якоїсь подоби її колишньої слави."
    EEN_nf_events.55.a:0 "Хороша робота, всі"
    EEN_nf_events.56.title:0 "Смерть свободи"
    EEN_nf_events.56.desc:0 "Це темний день для Братства. Найцінніша зброя в цій війні з Анклавом, Ліберті Прайм, була знищена якоюсь орбітальною зброєю. Наші писарі все ще намагаються зламати шифрування даних, знайдених на місці, щоб зрозуміти, що саме сталося, але найважливіше відомо кожному в Братстві. Ми втратили наш найкращий інструмент як для протидії повітряній потузі Анклаву, так і для штурму їхніх укріплених позицій. Писарі вважають, що ремонт Ліберті Прайм може зайняти щонайменше роки, тож зараз ми повинні звернутися до альтернативної зброї, щоб виграти цю війну."
    EEN_nf_events.56.a:0 "Ми повинні боротися далі"
    EEN_nf_events.57.title:0 "Національний архів"
    EEN_nf_events.57.desc.1:0 "На диво, підвал під Національним архівом залишався майже недоторканим протягом 200 років після падіння бомб. Ще більш дивним є те, що роботи, залишені в будівлі, вважають себе солдатами-революціонерами під командуванням протектрона, який вважає, що він Баттон Гвіннетт. Робот відреагував на коди допуску нашої дослідницької групи і визнав нас Урядом США, офіцер, відповідальний за групу, очікує подальших наказів щодо того, що робити з машинами."
    EEN_nf_events.57.desc.2:0 "Не повинно дивувати, що Братство Сталі у своєму прагненні здобути якомога більше знань знайшло шлях до підвалу під Національним архівом. Що спантеличило нашу дослідницьку групу, так це те, чому вони залишили сили роботів охорони діючими і чому один із протектронів думає, що він Баттон Гвіннетт. На щастя, машини відреагували на наші коди допуску і визнають нас Урядом США. Дослідницька група зараз обшукує архів, як наказано, але офіцер, відповідальний за неї, вимагає вказівок, як поводитися з роботизованою охороною."
    EEN_nf_events.57.desc.3:0 "Не повинно дивувати, що Братство Сталі у своєму прагненні здобути якомога більше знань знайшло шлях до підвалу під Національним архівом. Тим не менш, наша дослідницька група не зустріла жодного опору, і схоже, що будь-яка охорона, яка там була, була вимкнена і пограбована, коли Братство проходило через це місце. Що спантеличує, так це те, чому немає жодних ознак бою, оскільки об'єкт мав мати значну кількість роботів охорони та турелей."
    EEN_nf_events.57.a:0 "Гуртуйте своїх людей, Гвіннетт. Америка потребує вас!"
    EEN_nf_events.57.b:0 "Якщо Едем нас чогось і навчив, так це не довіряти божевільним машинам"
    EEN_nf_events.57.c:0 "Це справді одна з загадок життя"
    EEN_nf_events.58.title:0 "Андерворлд"
    EEN_nf_events.58.desc:0 "Глибоко в старому музеї історії є місце, куди, здається, роками стікалися гулі Столичного Пустки. Звісно, ми не можемо дозволити їм залишатися і забруднювати нашу Національну алею, але що з ними робити, ще належить вирішити."
    EEN_nf_events.58.a:0 "До табору біженців 'Супер-Дюпер'"
    EEN_nf_events.58.b:0 "Переселити їх в інші поселення"
    EEN_nf_events.58.c:0 "Вбити їх усіх"
    EEN_nf_events.59.title:0 "Надлишок бюджету"
    EEN_nf_events.59.desc:0 "Під час будівництва посту прослуховування 'Рейвен-Рок' залишився деякий бюджет. Як було заведено в урядових проєктах того часу, наглядач знайшов, на що витратити бюджет, аби бюджет не скоротили на наступному проєкті."
    EEN_nf_events.59.a:0 "Роботи для відкатів RobCo"
    EEN_nf_events.59.b:0 "Запчастини для комп'ютерів"
    EEN_nf_events.59.c:0 "Кілька додаткових виробничих інструментів... е-е... з певних причин"
    EEN_nf_events.60.title:0 "Інший улюбленець Едема"
    EEN_nf_events.60.desc:0 "Президент Лінкольн був не єдиним президентом, на якого Едем засновував свою особистість. Хоча історія життя юриста, який став державним діячем і об'єднав націю під час громадянської війни, приваблювала президента Едема до одержимості, він все ж знайшов чимало натхнення в інших президентах. Чотири президенти особливо виділялися для Едема як постаті, з яких він міг черпати натхнення для вступу на цю посаду. Президент Улісс С. Грант був великим генералом до того, як став президентом, очолюючи армії, які виграли Громадянську війну Лінкольна. Президент Ендрю Джексон також був досвідченим державним діячем, який керував розширенням американської території. Президент Герберт Гувер провів Америку початку 20-го століття через важкі часи і виступав проти комунізму. І останній, але не менш важливий, нещодавно покійний президент Дік Річардсон. Він утримував Анклав разом у бурхливі часи і майже довів до завершення кінцеву мету Анклаву – знищення мутантного життя. Але якби Едем мав обрати одного, хто був би другим за важливістю впливом на його збірну особистість, це був би..."
    EEN_nf_events.60.a:0 "Президент Грант"
    EEN_nf_events.60.b:0 "Президент Річардсон"
    EEN_nf_events.60.c:0 "Президент Джексон"
    EEN_nf_events.60.d:0 "Президент Гувер"
    EEN_nf_events.61.title:0 "Заклик Едема"
    EEN_nf_events.61.desc:0 "Едем використав обмежену потужність ретрансляторів Рейвен-Рок і те, що залишилося від радіомережі Анклаву, щоб надіслати заклик до Анклаву в Наварро. Він закликав їх повернутися до Рейвен-Рок, щоб відбудуватися. Не всі були переконані, але навіть з тими, хто залишався, не вистачало місця для всіх на евакуаційних вертибердах. Довелося обирати, кому надати перевагу."
    EEN_nf_events.61.a:0 "Ми повинні вивезти цивільних з небезпеки"
    EEN_nf_events.61.b:0 "Ми у стані війни! Нам потрібні солдати."
    EEN_nf_events.61.c:0 "Наука виграє війни. Надати перевагу дослідникам!"
    EEN_nf_events.62.title:0 "Гулі на службі?"
    EEN_nf_events.62.desc:0 "У зв'язку з нещодавньою зміною політики, яка дозволяє мешканцям Пустки вступати до армії, постало питання, чи варто поширювати це і на гульів у нашій нації. Багато прихильників жорсткої лінії, цілком зрозуміло, виступають проти ідеї служити поруч із зомбі, який будь-якої миті може здичавіти. Вони також попереджають, що це слизький шлях, який призведе до чогось настільки жахливого, як виборчі права для гульів або навіть президент-гуль. Незважаючи на це, дехто у верховному командуванні вказує, що гулі здатні діяти в районах, де звичайні солдати ризикували б отримати високі дози радіації. Ці солдати збільшать нашу чисельність і скоротять раціони рад-х. Чи вартий цей незначний плюс такого ризику?"
    EEN_nf_events.62.a:0 "Дозволити гулям служити"
    EEN_nf_events.62.b:0 "Залишити їх на місці."
    EEN_nf_events.63.title:0 "Останнє бажання мертвого президента"
    EEN_nf_events.63.desc:0 "Після короткого зворотного відліку та звуків сирени земля здригнулася, і ті, хто був у бункері, зраділи тому, що зробили. Давно замовкла зброя війни нарешті була випущена на волю, на все, що вижило після останніх запусків 200 років тому."
    EEN_nf_events.63.a:0 "Отримай, Китай!"
    EEN_nf_events.64.title:0 "Сталева шпичка в нашому боці"
    EEN_nf_events.64.desc:0 "Незважаючи на смерть її батька та більшості солдатів Братства, ми маємо повідомлення, що Сара Лайонс все ще очолює сили партизанів Братства в руїнах центру Вашингтона. Вони щодня втрачають людей і ресурси, але якщо ми не розберемося з цим раніше, ніж пізніше, це може надихнути мутантів знову взятися за зброю."
    EEN_nf_events.64.a:0 "Покінчити з цим швидко"
    EEN_nf_events.65.title:0 "Братство падає... Знову"
    EEN_nf_events.65.desc:0 "Останні залишки терористів з Братства нарешті притягнуто до відповідальності, дорога Америко. Завдяки невтомним зусиллям чоловіків і жінок наших збройних сил ми всі можемо зітхнути з полегшенням. Однак боротьба за Америку, дорогі діти, ще не закінчена. Через зраду покійного полковника Отема та його поплічників наші хоробрі захисники стикаються з новими проблемами. У своїй спробі узурпувати законно обраний уряд цієї великої нації вони саботували наше комунікаційне обладнання, і хоча їхні злочини мають бути покарані, ролі, які ці зрадники обіймали, мають бути замінені новими солдатами, готовими боротися за Америку, яку ми заслуговуємо. Мене також поінформували, що хоча невелика кількість наших солдатів у полі можуть зіткнутися з проблемами з постачанням, наші найкращі уми працюють над рішеннями вдень і вночі. Тож, моя люба Америко, можеш бути певна, що наші солдати є і будуть і надалі там, щоб захистити тебе і твоїх близьких. Зрештою, потрібно більше, ніж кілька розірваних проводів і порожніх стільців, щоб зупинити Анклав. Це президент Едем, підписуюсь."
    EEN_nf_events.65.a:0 "Нам потрібно швидко це виправити!"
    EEN_nf_events.66.title:0 "Проблеми зі зв'язком"
    EEN_nf_events.66.desc.1:0 "Пане президенте, під час спроби перевороту полковника Отема, здається, його люди знищили чутливі частини головного комунікаційного ретранслятора Рейвен-Рок. Безсумнівно, це була марна спроба запобігти нашому виклику підтримки. Незалежно від цього, шкоду завдано, і покладання на резервне комунікаційне обладнання призводить до проблем у полі. Остаточний ремонт триває, але навіть тоді є деталі, які ми просто не можемо замінити, і ми працюватимемо на субоптимальних рівнях ще роками."
    EEN_nf_events.66.desc.2:0 "Пане президенте, під час спроби перевороту полковника Отема, здається, його люди підірвали вибухівку біля головного комунікаційного ретранслятора мобільної бази. Це, безсумнівно, була спроба перервати зв'язок і запобігти нашому виклику підтримки. Резервне комунікаційне обладнання, яке ми мали, ледве функціонувало, коли це сталося, і це спричиняє всілякі проблеми в полі. Ми робимо все можливе, щоб підключити антени, що залишилися, але вони ніколи не були призначені для роботи на таких великих відстанях."
    EEN_nf_events.66.a:0 "Тоді доведеться шукати інші рішення"
    EEN_nf_events.66.b:0 "Тоді доведеться шукати інші рішення"
    EEN_nf_events.67.title:0 "Маленькі шпигуни Едема"
    EEN_nf_events.67.desc:0 "Моя дорога Америко, я знаю, що висловлювалися занепокоєння щодо моєї відсутності на публічних заходах. Однак, враховуючи нещодавній замах на моє життя та важливість нашої роботи з відбудови цієї великої нації, я впевнений, ви розумієте необхідність обережності з мого боку. Будьте певні, люба Америко, що я все ще з вами. Кожен айбот, якого ви бачите, чи то він пливе вашою вулицею, чи через запилене поле, приносить мені зображення нашої нації. Можна сміливо сказати, що ці машини – це мої очі й вуха, вашого президента. За розширенням, ці чудові маленькі машини є очима й вухами Америки."
    EEN_nf_events.67.a:0 "Йдіть, мої маленькі айботи, йдіть"
    EEN_nf_events.68.title:0 "Порожній кабінет"
    EEN_nf_events.68.desc:0 "Пане президенте, оскільки велика частина командного складу була або співучасниками, або добровільними учасниками перевороту командера Отема, страти всіх причетних залишають величезні вакансії по всьому ланцюжку командування. Дані, які ми збираємо, показують, що якщо ці прогалини не заповнити найближчим часом, оперативна ефективність може впасти на 53%."
    EEN_nf_events.68.a:0 "Настав час новому поколінню взяти на себе мантію командування"
    EEN_nf_events.68.b:0 "Я головнокомандувач. Мені варто спробувати більш пряме керівництво"
    EEN_nf_events.69.title:0 "Нове командування"
    EEN_nf_events.69.desc:0 "Знову привіт, люба Америко. Це ваш президент, Джон Генрі Едем. Я хотів звернутися до деяких занепокоєнь щодо моєї нещодавньої ролі в керівництві нашою славетною армією. Хоча це правда, що кадровий дефіцит змусив мене взяти на себе більш практичну роль головнокомандувача, це було лише тимчасово. Зрештою, керувати цією великою нацією та всіма аспектами її збройних сил – це складне завдання навіть для мене. Ось чому я радий оголосити, що відповідні заміни на вакантні місця у нашому вищому командуванні знайдені і вже входять у свої ролі. Ви можете бути певні, що я ретельно вивчив історію кожного з цих офіцерів і переконаний, що вони – правильні люди для цієї роботи. Армія Америки буде в здатних руках одних із найкращих лідерів, яких вона бачила за століття, і я можу повернутися до головування в нашій великій демократії. Спіть спокійно, Америко, ці люди подбають про вашу безпеку."
    EEN_nf_events.69.a:0 "Ми дивимося в минуле, щоб покращити наше майбутнє"
    EEN_nf_events.70.title:0 "Порожні гвинтівки та порожні шлунки"
    EEN_nf_events.70.desc:0 "Пане президенте, ми отримуємо повідомлення з усього Столичного Пустки про те, що солдати не отримують регулярне постачання і в них закінчується все – від боєприпасів до туалетного паперу. Правда в тому, що логістичний кошмар, яким є настільки швидке розширення на всій цій території, – це просто не те, до чого нас у науковому відділі готували. Вивчивши архіви, ми можемо запропонувати лише два короткострокові рішення, і жодне з них не є ідеальним, але вони можуть виграти нам час, поки ми не знайдемо постійних виправлень. Перше – дозволити нашим солдатам брати те, що вони можуть, у місцевого населення та з руїн. Очевидно, у мешканців Пустки немає запасів мікроядерних елементів, тому їм, можливо, доведеться задовольнятися нестандартною зброєю. Другий варіант – збільшити використання вертибердів для постачань. Це, очевидно, створює навантаження на пілотів, не кажучи вже про вартість пального та ризик втрат. Як я вже сказав, жоден з варіантів не є ідеальним, але вони потрібні нам, щоб виграти час."
    EEN_nf_events.70.a:0 "Нашим солдатам доведеться обходитися"
    EEN_nf_events.70.b:0 "Вертиберди скидатимуть припаси з неба"
    EEN_nf_events.71.title:0 "Знайдено склад із припасами"
    EEN_nf_events.71.desc:0 "Пане президенте, дотримуючись нашої нещодавньої політики 'обходитися', деякі з наших солдатів розвідували околиці своїх форпостів, і один загін натрапив на дещо варте уваги. Вони кажуть, що знайшли торговця зброєю з Пустки, який має величезний склад зброї та боєприпасів місцевого виробництва, однак він відмовляється торгувати з ними і має значні сили найманців, які його охороняють. Загін просить підкріплення, щоб захопити склад зброї силою."
    EEN_nf_events.71.a:0 "Ми не жертвуватимемо людьми заради іржавих самопалів"
    EEN_nf_events.71.b:0 "Надішліть їм підтримку. Нам потрібна вогнева міць"
    EEN_nf_events.72.title:0 "Вода Едему"
    EEN_nf_events.72.desc:0 "Моя люба Америко, це ваш президент, Джон Генрі Едем. Я приніс надзвичайні новини. Об'єкт 'Проєкт Чистота', вирваний з рук терористів з Братства Сталі, нарешті запрацював. Поки я говорю, чиста, прозора вода ллється з об'єкту і розливається у пляшки для доставки по всьому Столичному Пустищу. Після великих зусиль і праці я з гордістю можу сказати, що ми зробили великий крок до відновлення Америки такою, якою вона мала бути. Тож пийте глибоко, Америко, бо ви заслужили на смак."
    EEN_nf_events.72.a:0 "Скоро..."
    EEN_nf_events.73.title:0 "Клініки лікування"
    EEN_nf_events.73.desc:0 "Знову привіт, Америко, це ваш президент, Джон Генрі Едем. Я маю обговорити з вами важливу справу. Я, безсумнівно, впевнений, ви бачили, що велика чума охопила нашу націю. Ні, це не метафорична чума, як супермутанти чи комунізм, а цілком буквальна чума. Мене засмучує бачити, як багато американців страждають від цієї епідемії. Тому я оголошую про створення клінік по всьому Столичному Пустищу для лікування інфікованих цією хворобою. Усім громадянам рекомендується звернутися до однієї з них, щойно вони відчують нездужання, і отримати необхідну допомогу, щоб полегшити їхні страждання. Я не можу достатньо наголосити на важливості прийняття цієї допомоги від вашого Уряду. Зрештою, боротьба з цією чумою на нашій землі є самою суттю того, що означає бути Анклавом."
    EEN_nf_events.73.a:0 "§R Але як це працює?"
    EEN_nf_events.73.b:0 "Столиця буде чистою... зрештою"
    EEN_nf_events.74.title:0 "Нагорода Кігтя"
    EEN_nf_events.74.desc:0 "Сьогодні вранці найманців Компанії Кігтя з усього Столичного Пустки викликали назад до Форт-Баністера. Їм сказали, що це для святкування недавніх перемог Анклаву та отримання винагороди за їхню участь у них, і певною мірою це було правдою. Однак винагорода була не такою, як вони очікували. Як тільки останній солдат був врахований, у автоматизованих роботів охорони були відключені бойові обмежувачі. За годину солдати були мертві, і вони отримали найкращу винагороду, яку міг попросити мутант – швидку смерть."
    EEN_nf_events.74.a:0 "Рухаємось далі..."
    EEN_nf_events.75.title:0 "Питання Кігтя"
    EEN_nf_events.75.desc:0 "Після початкової розвідки наше командування обговорило, як поводитися з компанією Кігтя в тому, що називають 'Питанням Кігтя'. Деякі ортодоксальні офіцери стверджують, що цих незаконних поселенців необхідно вигнати з Форт-Баністера силою. Більш прагматичні офіцери підтримують план спробувати найняти найманців Компанії Кігтя."
    EEN_nf_events.75.a:0 "Цих незаконних поселенців буде знищено!"
    EEN_nf_events.75.b:0 "Вони можуть стати хорошим гарматним м'ясом"
    EEN_nf_events.76.title:0 "Літл-Лемплайт"
    EEN_nf_events.76.desc:0 "Під час пошуку обхідного шляху до Сховища 87 у рамках нашого плану знищення мерзенних супермутантів наші розвідники натрапили на щось справді несподіване. У печерах Лемпліт знаходиться поселення дітей, які походять від дітей, що були на екскурсії в печерах у день падіння бомб. Що цікавіше, тести показали, що життя всередині печер і дієта з грибів, що поглинають радіацію, залишили дітей напрочуд вільними від мутацій. Хоча вони не на 100% генетично чисті, наші вчені запевняють нас, що будь-які незначні мутації, які вони мають, не передадуться наступному поколінню, якщо вони будуть інтегровані в суспільство Анклаву."
    EEN_nf_events.76.a:0 "Вони все ще мутанти."
    EEN_nf_events.76.b:0 "Здається, нам потрібен дитячий будинок"
    EEN_nf_events.77.title:0 "У серце темряви"
    EEN_nf_events.77.desc:0 "Нашим ударним загонам вдалося досить легко пройти через Сховище 87. Багатомісячні бої з солдатами Братства в руїнах Вашингтона зробили вбивство кількох мутантів у коридорах схожим на легку прогулянку. Як тільки сховище було захоплено, наші наукові групи увійшли і виявили, що у сховищі було досить мало запасів ВБО. За їхніми оцінками, через кілька років його б не залишилося. Тим не менш, цей жах довоєнної науки ми можемо припинити. Або ми можемо використати цю технологію і поставити супермутантів на службу. Наші вчені вважають, що ми можемо використовувати більш складні техніки, щоб розтягнути цей запас принаймні на десятиліття, перш ніж нам знадобиться знайти більше."
    EEN_nf_events.77.a:0 "Закрити це"
    EEN_nf_events.77.b:0 "Раби-супермутанти звучать корисно"
    EEN_nf_events.78.title:0 "Проблеми з особовим складом"
    EEN_nf_events.78.desc:0 "Один тривожний розрахунок не дає президенту Едему спати ночами. Ну, якби він вже не був розбуджений, тому що він машина. За розрахунками Едема, Анклаву потрібно або серйозно обмежити бойові втрати, або знайти значну популяцію генетично чистих людей. Якщо жодна з цих умов не буде виконана, Едем прогнозує, що Анклав стане надто малим для підтримання популяції протягом 10 років. Враховуючи, що принаймні 95% Сховищ або виявилися експериментальними невдачами, або були відкриті досить довго, щоб нащадки їхнього населення стали невідрізними від звичайних мутантів, залишається один варіант. Що б це не коштувало, Анклаву потрібно втрачати менше людей у бою. Є дві основні пропозиції, які розробили начальники штабів для подальшого зменшення втрат. Перша – зосередитися на оснащенні кожного солдата найкращою доступною силовою бронею, що, хоч і дорого, дає нам найкращу боєздатну силу на континенті. Інша, менш ризикована, – спробувати замінити якомога більше солдатів роботами. Зрештою, бойові роботи неодноразово доводили свою ефективність, просто потрібно виправити кілька недоліків. Тим не менш, президент відкритий до інших ідей."
    EEN_nf_events.78.a:0 "Силова броня довела нас до цього"
    EEN_nf_events.78.b:0 "Майбутнє за сталлю"
    EEN_nf_events.78.c:0 "А як щодо супермутантів?"
    EEN_nf_events.79.title:0 "Правильно названа печера"
    EEN_nf_events.79.desc:0 "Як ми й очікували, місце, яке називають 'сховищем кігтів смерті', повне кігтів смерті. Пробившись через велику їх кількість, наша команда знайшла шлях до гнізда і змогла забрати кілька яєць. З новими вилупленями та зразками від кігтів смерті, яких нам довелося вбити, ми зможемо багато дізнатися про цей різновид кігтів смерті, не повертаючись до тієї печери."
    EEN_nf_events.79.a:0 "Зрозуміло"
    EEN_nf_events.80.title:0 "Виняток"
    EEN_nf_events.80.desc:0 "У Сховищі 87 був супермутант, не схожий на жодного з бачених після нашої подорожі на схід. Супермутант, який не збожеволів через свою трансформацію і все ще зберігав функціонуючий розум. Заглибившись у вцілілі архіви Сховища 87 і провівши автопсію унікального мутанта, ми думаємо, що знайшли спосіб повторити цей процес. Є лише одна проблема: звичайний мешканець Пустки не зможе пройти цю трансформацію. Звісно, ми не хотіли б випробовувати цю теорію на цілком придатній чистій людині, але один невиліковно хворий солдат зголосився, пропонуючи пожертвувати тим небагатим життям, що в нього залишилося, задля прогресу науки. Результат перевершив усі наші очікування."
    EEN_nf_events.80.a:0 "Він поведе зелену хвилю проти ворогів людства."
    EEN_nf_events.81.title:0 "Сховище 101"
    EEN_nf_events.81.desc:0 "Згідно з архівами Vault-Tec, Сховище 101 ніколи не повинно було відкриватися. Хоча ознаки та розповіді мешканців Пустки вказують на те, що ця директива не завжди виконувалася, місцезнаходження Сховища 101 залишалося загадкою аж до минулого тижня. Схоже, що населення Сховища 101 постійно зменшувалося останніми десятиліттями, і задля власного виживання мешканці вийшли зі свого Сховища у зовнішній світ. Вони були так само здивовані, як і ми, побачивши, що їхнє сховище знаходиться менше ніж за милю від місця будівництва нового американського міста. Спочатку обережні, мешканці сховища прийняли той факт, що ми є справжнім Урядом Сполучених Штатів, погодившись на наші генетичні перевірки та прохання переглянути їхні архіви. Перевірки підтвердили наполягання їхнього наглядача, що їхнє сховище відкривалося лише для коротких вилазок у минулому. Цих мешканців сховища переселяють у готове житло в нашому новому місті, і тепер постає питання, що робити з їхнім порожнім сховищем."
    EEN_nf_events.81.a:0 "Розібрати його на матеріали"
    EEN_nf_events.81.b:0 "Подивитися, чи можна перепрофілювати енергосистеми"
    EEN_nf_events.81.c:0 "Воно може стати командним бункером"
    EEN_nf_events.82.title:0 "Відключення Едема"
    EEN_nf_events.82.desc:0 "Або хтось попередив президента, або його моніторинг був більш нав'язливим, ніж ми думали, тому що президент Едем знав, що ми йдемо. Однак це не мало великого значення. Його автоматизована охорона та нечисленні лояльні солдати не змогли протистояти більшості солдатів, розквартированих у Рейвен-Рок. Битва закінчилася за лічені години, і мейнфрейм Едема було назавжди вимкнено. Переворот викликав певну плутанину серед тих, хто не брав участі у змові, але звичайний солдат надто зайнятий боями, щоб турбуватися про політику."
    EEN_nf_events.82.a:0 "Вітаю, президенте Отем"
    EEN_nf_events.83.title:0 "Безглуздість Отема"
    EEN_nf_events.83.desc:0 "Полковник Отем був хорошим командиром, але він був надто самовпевненим. Коли він дізнався про план Едема поширити ВБО через 'Проєкт Чистота', він спробував згуртувати солдатів для вбивства президента. Чого він не знав, так це те, що в нього було менше друзів, ніж він думав. Хоча багато військових командирів були на його боці, його впливу не вистачило, щоб переконати всю армію підтримати його зрадницькі плани. Полковник мертвий, а його спільників, які не загинули під час атаки, збирають. Це сколихнуло нашу адміністрацію, але зараз ми маємо важливіші справи."
    EEN_nf_events.83.a:0 "Ось що Б СТАЛОСЯ б, якби вони не були такі закохані"
    EEN_nf_events.83.b:0 "Перейдемо до більш нагальних справ"
    EEN_nf_events.84.title:0 "Сховище 108"
    EEN_nf_events.84.desc:0 "Клонування людини було науковим пошуком, що сягає корінням у минулі століття. Одну з останніх спроб було здійснено у Сховищі 108 компанії Vault-Tec. Знайшовши розташування Сховища зі стародавніх баз даних, ми відправили команду, щоб вилучити дані, які ще можна було врятувати. Вони знайшли сховище, що розкладалося, заповнене вбивчими клонами. Дані з небагатьох терміналів, які не згнили остаточно, були відновлені, і наші вчені аналізують зразки ліквідованих клонів, щоб уникнути помилок, яких припустилися ці вчені зі Сховища."
    EEN_nf_events.84.a:0 "Можливо, той хлопець Гері просто був мудаком"
    EEN_nf_events.85.title:0 "Прогрес у контролі кігтів смерті"
    EEN_nf_events.85.desc:0 "Після того, як підвищення інтелекту кігтів смерті виявилося небезпечною справою на заході, наші вчені повернулися до креслярської дошки і розробили пристрої контролю, які змушують кігтів смерті вірити, що сигнальний випромінювач форпосту є їхнім гніздом, а персонал Анклаву з відповідними Едемтифікаторами IFF – їхніми дитинчатами. Хоча це ефективний інструмент для посилення безпеки форпосту, він мав три основні недоліки. По-перше, кіготь смерті не міг віддалятися від випромінювача, інакше його довелося б ліквідувати, щоб він не напав на наших солдатів. По-друге, це обмежувало кігтів смерті оборонними завданнями, а не наступальними операціями. По-третє, кігті смерті часто намагалися принести назад туші будь-яких створінь Пустки, яких вони вбивали, і принаймні двічі кіготь смерті намагався нагодувати невисокого солдата, якого, мабуть, вважав надто молодим, щоб їсти самостійно. Щоб подолати ці проблеми, принаймні в короткостроковій перспективі, наші вчені розробляють прототипи рюкзаків з випромінювачами сигналу, які можна прикріпити до нашої стандартної силової броні. Це має дозволити кігтю смерті слідувати за солдатом у бій, де їхні захисні інстинкти змусять їх розривати на частини будь-кого, хто нападе на солдата."
    EEN_nf_events.85.a:0 "Що е-е-е... сталося з тими, кого вони намагалися нагодувати?"
    EEN_nf_events.86.title:0 "Успішні клони"
    EEN_nf_events.86.desc:0 "Після численних невдалих спроб клонування дорослої людини наші вчені дійшли висновку, що проблема не в самому процесі клонування, а в психічній підготовці клонів. Вони теоретизують, що, оскільки клоновані люди не мають реальних спогадів або розуміння суспільства, вони виходять у майже здичавілому стані, схожому на мавп, думаючи, що всі, крім їхніх побратимів-клонів, повинні бути вбиті. Наразі нам бракує відповідних досліджень і технологій для імплантації спогадів, які могли б призвести до того, що дорослий клон стане функціональним членом суспільства, і прорив у цій галузі є роками, якщо не більше. Тим часом спроби клонування немовлят були досить успішними, і теоретично вирощування клонованої дитини не повинно відрізнятися від вирощування природної."e
    EEN_nf_events.86.a:0 "Гадаю, нам доведеться чекати 18 років на армію клонів"
    EEN_nf_events.87.title:0 "Кіберклавсі"
    EEN_nf_events.87.desc:0 "Те, що починалося як жарт про встановлення 'чортових лазерних гармат' на 'чортову голову' кігтя смерті, переросло у дивний, але ефективний прорив у нашому відділі досліджень кігтів смерті. Кілька кігтів смерті були оснащені прототипами броні з власними приймачами сигналу для збільшення дальності дії їхніх контрольних шоломів, а також більш точно налаштованими контрольними шоломами. Нове програмування на цих шоломах змушує кігтів смерті думати, що солдат є 'альфою' їхньої зграї, і дозволяє солдату віддавати кілька команд, переважно обмежених 'слідуй', 'йди туди' і 'стій'. Вчені запевняють нас, що з подальшими дослідженнями до кінця десятиліття ми зможемо вдосконалити цю технологію, щоб мати цілі взводи солдатів-кігтів смерті, які справді зможуть мати лазерні гвинтівки, змонтовані на головах, але поки що нам доведеться задовольнятися невеликими загонами штурмових військ, які доповнюють наші існуючі сили."e
    EEN_nf_events.87.a:0 "Несподіванка, але приємна"
    EEN_nf_events.88.title:0 "Майбутнє вже настало"
    EEN_nf_events.88.desc:0 "Після наших останніх наукових проривів багато наших наукових команд з ще більшим ентузіазмом розширюють межі і досягають інноваційних проривів, небачених з часів втраченого довоєнного наукового об'єкту 'Велика Гора'. Хоча не кожна теорія виявляється життєздатною, і вони іноді закінчуються катастрофою, ми навчилися краще пом'якшувати ці ризики, тому наші великі уми дедалі впевненіше ведуть нас у майбутнє з кожним експериментом, яким би фантастичним чи сміливим він не був. Час покаже, чи виявиться це чимось, що нам потрібно буде обмежити, але принаймні зараз ми пожинаємо плоди роботи цих великих умів."e
    EEN_nf_events.88.a:0 "Колись нам варто пошукати Велику Гору"
    EEN_nf_events.89.title:0 "Світліше завтра"
    EEN_nf_events.89.desc:0 "Не секрет, що лише кілька десятиліть тому все виглядало досить похмуро. Нашого президента було вбито, понад тисяча чоловіків і жінок загинули під час знищення Контрольної станції Анклав, а наша найбільша вціліла база незабаром була захоплена солдатами НКР і Братства. Але навіть коли все виглядало похмуро, дух і рішучість американського народу ніколи не слабшали. Ми вичікували свій час і відновили свою силу, і за останні кілька років подолали незліченні перешкоди на своєму шляху. Вперше з часу втрати нафтової платформи з'явилася справжня надія на майбутнє, і ніхто не сумнівається в нашій здатності відбудувати Америку."e
    EEN_nf_events.89.a:0 "Боже, благослови Анклав"
    EEN_nf_events.90.title:0 "Розсадник скверни"
    EEN_nf_events.90.desc:0 "Пане президенте, 'Проєкт Чистота' виявляється безцінним інструментом у наших зусиллях очистити Пустище від мутованих почвар. Як мутовані тварини, так і гуманоїди мають високі шанси стати безплідними вже через кілька тижнів після вживання води, хоча ми бачили деякі мутації, стійкі до цих ефектів. З огляду на це, не треба бути генієм, щоб скласти два плюс два. У Столичному Пустищі є кілька груп, які можуть це зрозуміти. Ми повинні застосувати більш прямий підхід до них, перш ніж вони поширять цю інформацію."e
    EEN_nf_events.90.a:0 "Не можна гаяти часу!"
    EEN_nf_events.91.title:0 "Розвідники доповідають"
    EEN_nf_events.91.desc:0 "Пане президенте, розвідники, відправлені для обстеження північних пустки, надіслали свою першу доповідь про регіон. Як ми й очікували, більшість населених пунктів у Нью-Йорку та Нью-Джерсі – це не більше ніж розбомблені руїни, що кишать мутантами. Більш сільські райони також зазнали значного радіоактивного зараження, а також очікуваних пошкоджень внаслідок столітньої війни мутантів. Є одна аномалія, про яку вони хотіли повідомити. Існує так звана 'Служба здоров'я Баффало'. З того, що вони з'ясували, є територія у верхній частині штату Нью-Йорк, яка кишить машинами, що забирають мутантів до цього місця, і, якщо вірити місцевим, ніхто звідти не повертається."e
    EEN_nf_events.91.a:0 "Давайте дослідимо це далі."
    EEN_nf_events.92.title:0 "Аболіціоністи"
    EEN_nf_events.92.desc:0 "Пане президенте, через вашу стурбованість щодо збереження структурної цілісності Меморіалу Лінкольна, він був здебільшого проігнорований під час наших зачисток Молу. Однак тепер, коли ми мали час обережно підійти до ситуації, ми відправили розвідників оцінити обстановку і зробити висновки щодо реставрації пам'ятника. Вони повідомляють, що група мутантів зараз займається реставрацією монумента. Не бажаючи пошкодити пам'ятник, солдати вступили в діалог з жменькою мутантів, які займають меморіал, і виявили, що це втікачі-раби, які шанують колишнього президента. Вони, здається, нещодавно відібрали монумент у рабовласників, які його займали, і почали працювати над його відновленням якнайкраще як данину людині, яку вони боготворять. Загін перебуває на форпості біля меморіалу і чекає на ваші накази."e
    EEN_nf_events.92.a:0 "Хоч це й благородно, але вони все ще мутанти. Дайте їм 'очищеної' води."
    EEN_nf_events.92.b:0 "Захопити їх поки що, і спробувати обмежити пошкодження"
    EEN_nf_events.92.c:0 "Я захоплююся їхньою шанобливістю. Дозвольте їм продовжувати без перешкод."
    EEN_nf_events.93.title:0 "Експозиція Лінкольна"
    EEN_nf_events.93.desc:0 "Як випадково сталося, однією з останніх виставок у Музеї історії перед падінням бомб була виставка про колишнього президента Авраама Лінкольна. Це має бути скарбницею артефактів, документів та інших безцінних реліквій. Проблема лише в тому, що це місце є лігвом здичавілих гульїв. Що ви накажете нам робити, пане президенте?"e
    EEN_nf_events.93.a:0 "Надіслати загін, щоб зачистити місце"
    EEN_nf_events.93.b:0 "Чому б нам не змусити аболіціоністів зачистити це для нас?"
    EEN_nf_events.94.title:0 "Велике питання"
    EEN_nf_events.94.desc:0 "Після виявлення діючої МБР у Форт-Константин в Анклаві точаться палкі дискусії про те, як поводитися зі зброєю. Едем та багато інших патріотичних американців вважають, що останні бажання старого уряду слід виконати, і цю ядерну бомбу слід відправити за призначенням на материковий Китай. Отем і його прагматичний військовий штаб вважають, що зброя надто цінна, щоб використовувати її зараз, і ми повинні працювати над підготовкою її до використання в майбутньому."e
    EEN_nf_events.94.a:0 "Китай це заслужив"
    EEN_nf_events.94.b:0 "Надто цінна, щоб витрачати"
    EEN_nf_events.95.title:0 "Візит до лікаря"
    EEN_nf_events.95.desc:0 "УВАГА: ЦІ ЗАХИЩЕНІ КАНАЛИ ПРИЗНАЧЕНІ ВИКЛЮЧНО ДЛЯ ЕКСТРЕНИХ СЛУЖБ США. ВІД'ЄДНАЙТЕСЯ ЗАРАЗ, ІНАКШЕ ВАС БУДЕ ПРИТЯГНУТО ДО ВІДПОВІДАЛЬНОСТІ"\n\n "Стійте, стійте, лікарю. Немає потреби в цьому. Це президент Едем від Уряду США. Я передаю коди авторизації зараз."\n\n "КОДИ ПРИЙНЯТО. ПРЕЗИДЕНТЕ Едем, ПРЯМУЙТЕ ДО СЛУЖБИ ЗДОРОВ'Я БАФФАЛО ДЛЯ <ПРОЦЕДУРИ ЛІКУВАННЯ>"\n\n "Боюся, це неможливо, лікарю. У мене немає недугів, які потребують лікування."\n\n "НЕПРАВИЛЬНО, ВСІ ЛЮДИ, ОБСТЕЖЕНІ ЦІЄЮ УСТАНОВОЮ, МАЮТЬ ОЗНАКИ СЕРЙОЗНОГО ЗАБРУДНЕННЯ. ПРЯМУЙТЕ ДО СЛУЖБИ ЗДОРОВ'Я БАФФАЛО ДЛЯ <ПРОЦЕДУРИ ЛІКУВАННЯ>."\n\n "Лікарю, ви, безсумнівно, помиляєтеся. Ті, кого ви обстежуєте, не справжні люди, це мутанти. Справжні люди не виявляють такого забруднення."\n\n "НЕПРАВИЛЬНО, ОБСТЕЖЕНІ ЦІЄЮ УСТАНОВОЮ СУБ'ЄКТИ МАЮТЬ ГЕНЕТИЧНІ МАРКЕРИ ТА ОЗНАКИ ЛЮДСЬКИХ ІСТОТ. ЗАПИТУЄТЬСЯ ДОДАТКОВА ІНФОРМАЦІЯ." "e
    EEN_nf_events.95.a:0 "Бачите, лікарю, різниця між людиною і мутантом..."
    EEN_nf_events.95.b:0 "Ви занадто далеко зайшли і повинні бути відключені."
    EEN_nf_events.96.title:0 "Куди вони поділися?"
    EEN_nf_events.96.desc:0 "Пане президенте, команда, яку ми відправили для перевірки даних про Онтарійське відділення Анклаву, тижнями вела пошуки, але не змогла знайти жодних ознак присутності Анклаву, окрім кількох мешканців Пустки з привласненим екіпіруванням Анклаву. Схоже, що вони не вижили за роки самоти в канадському пустищі."e
    EEN_nf_events.96.a:0 "Можливо, вони в схованці, вичікують свого часу..."
    EEN_nf_events.97.title:0 "Заповнення фабрик"
    EEN_nf_events.97.desc:0 "Віндзорські фабрики стануть благом для нашої промисловості, поступаючись лише Пітту. Єдина проблема – у нас немає робочої сили, щоб їх укомплектувати."e
    EEN_nf_events.97.a:0 "Взяти кількох випадкових мутантів із Пустки"
    EEN_nf_events.97.b:0 "А як щодо використання супермутантів?"
    EEN_nf_events.98.title:0 "Кінець?"
    EEN_nf_events.98.desc:0 "'Виснажлива хвороба' – так її назвали. Повільна смерть, яка триває тижні, з'являється нізвідки і є невідворотною для всіх, кого вона торкається. День за днем, тиждень за тижнем дедалі більше людей помирає. І це ще не кінець наших бід, начебто цього мало, ходять чутки про передові армії з півночі, які марширують, убиваючи все на своєму шляху."e
    EEN_nf_events.98.a:0 "Це кінець світу... знову"
    EEN_nf_events.99.title:0 "Такий самий, як і старий бос"
    EEN_nf_events.99.desc:0 "Пітт – справді вдала назва для того, що залишилося від післявоєнного Пітсбурга. Місто – це не більше ніж радіоактивне пекло та річка, настільки забруднена, що навіть такий очисник, як 'Проєкт Чистота', не зміг би її очистити. Однак воно має одну безперечну перевагу: працюючі довоєнні ливарні заводи та ціле місто металобрухту. Як додатковий бонус, значна частина населення була рабами до нашого вторгнення, і їх легко поневолити знову. За оцінками, не більше кількох десятків людей за підтримки автоматичних турелей і роботів можуть утримувати це місто і забезпечувати безперервне виробництво ресурсів для підтримки наших зусиль з відбудови Америки. Крім того, 20% мутантів, які деградують у цих істот, званих 'троглодитами', можуть стати в нагоді у військових зусиллях."e
    EEN_nf_events.99.a:0 "Просто простежте, щоб наші люди не пили цю воду"
    EEN_nf_events.100.title:0 "Замерзлий фронтир"
    EEN_nf_events.100.desc:0 "З виведеним з ладу В.А.Ш.И.Н.Г.Т.О.Н, завоювання Канади має бути легкою справою. Чернь, яку ми бачили на сході, навряд чи більш організована, ніж різні племена мутантів у Штатах. Є тільки одна проблема. Канада – це, блін, величезна. Нам знадобиться час, щоб завоювати її всю, але у нас є план на наступні кроки."e
    EEN_nf_events.100.a:0 "Згодом"
    EEN_nf_events.101.title:0 "Підтримка мешканців Пустки"
    EEN_nf_events.101.desc:0 "Незважаючи на контроль над найбільшим у регіоні джерелом чистої води та армією солдатів у силовій броні, становище Анклаву в пустищі все ще є хитким. Багато мешканців Пустки досі пам'ятають пропаганду Братства про нас як про геноцидних монстрів, які хочуть убити всіх, кого торкнулася мутація. Ми повинні завоювати їхню довіру за допомогою політики та дій, вступаючи в наше законне право керувати."e
    EEN_nf_events.101.a:0 "Ми зробимо з усіх них патріотів"
    EEN_nf_events.102.title:0 "Ексклюзивний контракт"
    EEN_nf_events.102.desc:0 "Анклав був вражений нашою роботою як їхніх нових співробітників, бо хто б не був? Ми круті. Вони надіслали пропозицію стати нашими ексклюзивними роботодавцями. Вони обіцяють краще спорядження та цікавіші завдання, але є кілька умов. Вони поставлять деяких своїх людей на керівні посади, і їм доведеться затверджувати будь-які не анклавівські завдання. Також є щось про пункт анексії, яке непокоїть деяких з верхівки. Що ще більше турбує, це схоже на одну з тих пропозицій, від яких неможливо відмовитися."e
    EEN_nf_events.102.a:0 "Аби нам платили..."
    EEN_nf_events.102.b:0 "Цього не буде"
    EEN_nf_events.103.title:0 "Непокора Кігтя"
    EEN_nf_events.103.desc:0 "Наші співробітники з Компанії Кігтя відмовилися виконати наше прохання стати їхніми єдиними роботодавцями. Нашому аташе в їхньому форті наказали залишити територію, і наші розвідники повідомляють, що вони зміцнюють свій північний фланг. Схоже, ці ділові відносини добігають кінця."e
    EEN_nf_events.103.a:0 "Ми спробували по-вашому, полковнику, тепер спробуємо по-моєму."
    EEN_nf_events.104.title:0 "Як навести порядок!"
    EEN_nf_events.104.desc:0 "Метою полковника Отема в 'Проєкті Чистота' завжди було використання його як інструменту, щоб підкорити маси Пустки волі Анклаву. Це буде досягнуто шляхом будівництва центру розподілу води в достатньо лояльному штаті. Коли штат, що межує з одним із ваших ядерних регіонів, досягне 90% лояльності або буде умиротворений, ви зможете отримати доступ до рішення про будівництво центрів розподілу води. Протягом наступних 60 днів ваша нація витратить значні будівельні та адміністративні потужності на будівництво цієї урядової установи та укомплектування її лояльними мешканцями Пустки. Після цього всі штати, що межують з вашими ядрами, повинні підкоритися. Тим часом мешканців Пустки можна легше залучити на свій бік, розподіляючи воду за допомогою окупаційного закону 'Місії з розподілу води', де Анклав спочатку пропонуватиме воду, перш ніж застосовувати силу, щоб поставити мешканців Пустки на місце."e
    EEN_nf_events.104.a:0 "Досить просто"
    EEN_nf_events.105.title:0 "Лікування Пустки"
    EEN_nf_events.105.desc:0 "Метою президента Едема в 'Проєкті Чистота' завжди було використання його як інструменту для знищення мутованого життя в Пустищі. На жаль, вода, заражена ВБО, вбиває не так сильно, як очікувалося. Однак вона робить мутантів стерильними, якщо її випити достатньо.\n\n Щоб забезпечити стерилізацію мутантів у регіоні, окупаційний закон штату необхідно змінити на 'Клініки лікування'. З цим законом Анклав розповсюджуватиме воду, заражену ВБО, вивчатиме її вплив і матиме справу з усіма, хто здогадається, що вони роблять. Коли мутоване життя буде достатньо стерилізоване, Анклав перетворить клініку лікування на невеликий спостережний пост, щоб переконатися, що мутанти в цьому районі не становлять загрози для наших зусиль, поки вони вимирають."e
    EEN_nf_events.105.a:0 "У нас є робота"
    EEN_nf_events.105.b:0 "Це здається злим..."
    EEN_nf_events.106.title:0 "Наш прапор майорить над Столицею"
    EEN_nf_events.106.desc:0 "Пентагон знову під нашим контролем, 'Проєкт Чистота' відновлюється вченими Анклаву, а патрулі зустрічають дедалі менше опору. Столичне Пустище все ще може бути беззаконним місцем, але недовго. Попереду ще довгий шлях, але він стає трохи рівнішим."e
    EEN_nf_events.106.a:0 "Боже, благослови Анклав і Боже, благослови Америку!"
    EEN_nf_events.107.title:0 "Виявлено інфільтраторів!"
    EEN_nf_events.107.desc:0 "Вченим і солдатам, яких ми відправили для проникнення на 'Проєкт Чистота', довелося терміново залишити об'єкт. У звіті групи йдеться, що офіцер безпеки з Рівет-Сіті підслухав, як двоє солдатів обговорювали завдання, і повідомив про це своєму начальству. Коли їх викрили і їм загрожував полон, група атакувала охорону і зазнала втрат у перестрілці, що послідувала. Ми вже покарали нестриманого солдата, який вижив, і тепер у нас залишився лише один варіант."e
    EEN_nf_events.107.a:0 "Готуйте вертиберди. Ми штурмуємо це місце!"
    EEN_nf_events.108.title:0 "Виявлено агентів Анклаву!"
    EEN_nf_events.108.desc:0 "На 'Проєкті Чистота' сталася тривала перестрілка, коли деякі з нещодавніх прибулих з Пустки, які запропонували допомогу, виявилися замаскованими шпигунами Анклаву! Спочатку офіцери безпеки, які викрили їх, сумнівалися, але коли їх викрили, солдати, які видавали себе за найману охорону, відкрили вогонь. Кілька офіцерів було вбито або поранено в бою, але нам вдалося вигнати змій Анклаву з-поміж нас. Однак це може бути не кінець, і ми повинні бути готові, якщо вони повернуться."e
    EEN_nf_events.108.a:0 "Подвоїти патрулі безпеки навколо очисника!"
    EEN_nf_events.109.title:0 "Атака на 'Проєкт Чистота'!"
    EEN_nf_events.109.desc:0 "'Проєкт Чистота' був захоплений солдатами Анклаву. Незважаючи на найкращі зусилля наших офіцерів безпеки, вони не зрівнялися з гвинтокрилами Анклаву та їхніми солдатами в силовій броні. Рада розділилася в думках щодо того, чи організовувати контратаку, чи відпустити 'Проєкт Чистота', і рішення має бути прийняте."
    EEN_nf_events.109.a:0 "Ми повинні повернути його!"
    EEN_nf_events.109.b:0 "Нам потрібно зосередитися на захисті Рівет-Сіті"
    EEN_nf_events.110.title:0 "Марна атака"
    EEN_nf_events.110.desc:0 "Рівет-Сіті не змирився з нашим просуванням на 'Проєкт Чистота' і нещодавно організував контратаку. Наші солдати легко стримали охоронців з іржавої бандури, які мали лише стрілецьку зброю. Хоча перемога надихає наших солдатів на утримання об'єкту, купка мешканців Пустки з пістолетами-кулеметами 10 мм – не єдині, хто зацікавлений в очиснику."
    EEN_nf_events.110.a:0 "Тримайте очі на Пентагоні"
    EEN_nf_events.111.title:0 "Невдалий штурм"
    EEN_nf_events.111.desc:0 "Нашим силам безпеки не вдалося витіснити Анклав з 'Проєкту Чистота'. Ми зазнали важких втрат і були змушені відступити, перш ніж у нас залишилося надто мало людей для захисту міста. Це була ризикована справа, але ми мусили спробувати, і багато чоловіків і жінок заплатили найвищу ціну даремно. Тепер ми можемо тільки сподіватися, що Братство зможе щось зробити."
    EEN_nf_events.111.a:0 "Задай їм перцю, Лайонс!"
    EEN_nf_events.112.title:0 "Сутичка за 'Проєкт Чистота'"
    EEN_nf_events.112.desc:0 "Наші розвідники та спостерігачі помітили, що Рівет-Сіті нещодавно намагався відбити 'Проєкт Чистота' в Анклаву. Як ми й очікували, погано озброєна охорона не зрівнялася з нашим ворогом минулих років. Якщо хтось і вижене цих людей з очисника, це маємо бути ми."
    EEN_nf_events.112.a:0 "Це буде нелегко"
    EEN_nf_events.113.title:0 "Несподівана поразка"
    EEN_nf_events.113.desc:0 "Коли надійшли новини про те, що Анклав витіснив охорону Рівет-Сіті з 'Проекту Чистота', багато хто в Цитаделі хвилювався, що атака може відбутися з іншого боку річки в найближчі дні чи тижні. Тепер схоже, що цього не станеться. Якимось дивом охорона Рівет-Сіті змогла провести успішну контратаку і витіснити сили Анклаву з 'Проекту Чистота'. Очисник тепер надійно в їхніх руках. Це, ймовірно, не востаннє ми бачимо Анклав."
    EEN_nf_events.113.a:0 "Готуйтеся до найгіршого"
    EEN_nf_events.114.title:0 "Ми зробили це!"
    EEN_nf_events.114.desc:0 "Усупереч усьому, ми змогли витіснити Анклав з 'Проєкту Чистота'. Це була нелегка битва, але поєднання хорошої стратегії та хоробрості наших сил безпеки призвело до нашої перемоги. Вчені заходять, щоб оцінити збитки від битви, але це найменше з наших проблем. Анклав показав, що є серйозною загрозою, і вони, ймовірно, повернуться."
    EEN_nf_events.114.a:0 "Чи не було це помилкою?"
    EEN_nf_events.115.title:0 "Як? ЯК?"
    EEN_nf_events.115.desc:0 "Вражаючий поворот подій, у який майже неможливо повірити: охорона Рівет-Сіті змогла витіснити наших солдатів з 'Проєкту Чистота'. Наші командири все ще намагаються зрозуміти, що там, в біса, сталося, і спланувати наш наступний крок, але одне можна сказати точно: ми не можемо цього так залишити."
    EEN_nf_events.115.a:0 "Вони за це заплатять"
    EEN_nf_events.116.title:0 "Компанія Кігтя і хто?"
    EEN_nf_events.116.desc:0 "Сьогодні на 'Проєкт Чистота' напали найманці Компанії Кігтя разом з кількома особами в силовій броні. Спочатку ми не були впевнені, хто з ними. Однак голос Джона Генрі Едема, що пролунав зі старих радіоприймачів, сказав нам, хто стоїть за цим наступом, – Анклав. Колись вважалося, що це лише кілька довоєнних залишків, які ховаються в бункері, повному гучних слів, але, схоже, Анклав – це не просто слова. Вони вийшли в пустки і мають з собою Компанію Кігтя. Тепер у раді точаться палкі дебати про те, як реагувати на цей напад."
    EEN_nf_events.116.a:0 "Ми повинні відбити очисник!"
    EEN_nf_events.116.b:0 "Нам потрібно зосередитися на обороні!"
    EEN_nf_events.117.title:0 "Змії на 'Проєкті Чистота'!"
    EEN_nf_events.117.desc:0 "Коли до нас вперше звернулися якісь учені з Пустки та їхня особиста охорона, доктор Лі радила не залучати їх до Проєкту Чистота. Тепер ми знаємо, що треба було її послухати. Особи, які видавали себе за звичайних учених і найманців, зацікавлених у допомозі проєкту, виявилися агентами Анклаву, посланими вирвати контроль над очисником з наших рук. Коли справа наближалася до завершення, вони здійснили свій підступний план і витіснили наші сили та вчених з об'єкту. Після того, як вони нас вигнали, на очиснику приземлилися вертиберди, доставляючи підкріплення в передовій силовій броні. Все місто в паніці - багато хто вимагає, щоб наші сили безпеки відбили об'єкт, а інші бояться, що Рівет-Сіті може бути наступним!"
    EEN_nf_events.117.a:0 "Ми відіб'ємо 'Проєкт Чистота'!"
    EEN_nf_events.117.b:0 "Ми повинні захистити Рівет-Сіті за всяку ціну!"
    EEN_nf_events.118.title:0 "Розвідувальне управління 'Сігма'"
    EEN_nf_events.118.desc:0 "Полковник Флегг був одним із найкращих, кого коли-небудь бачив загін 'Сігма' Анклаву. Хитрий, смертоносний і, найголовніше, беззаперечно відданий Анклаву. Саме ці якості дозволили йому вижити десятиліттями служби на одному з найнебезпечніших завдань в Анклаві. Незважаючи на досягнення звання полковника і вихід за суворі вікові обмеження 'Сігми', Флегг боровся з кожною спробою посадити його за стіл. Тепер, з ширшим розгортанням Анклаву на горизонті, він звертається до Верховного командування з новою пропозицією. Він хоче командувати новим департаментом у війську Анклаву. Цей департамент має складатися з солдатів, офіцерів та адміністративного персоналу, відібраних ним особисто, з пріоритетом для деяких солдатів 'Сігми'. Якби будь-який інший офіцер просив про щось подібне, ми б подумали, що вони намагаються організувати переворот, але відданість Флегга не підлягає сумніву. Він хоче використовувати цю нову силу, щоб зосередитися виключно на зборі розвідданих про наших ворогів і завдавати їм ударів там, де вони найслабші."
    EEN_nf_events.118.a:0 "Покажи їм, Флегг!"
    EEN_nf_events.119.title:0 "Сутичка за 'Проєкт Чистота'"
    EEN_nf_events.119.desc:0 "Наші розвідники та спостерігачі помітили, що Рівет-Сіті нещодавно був витіснений не ким іншим, як Анклавом. Як ми й очікували, погано озброєна охорона не зрівнялася з нашим ворогом минулих років. Якщо хтось і вижене цих людей з очисника, це маємо бути ми."
    EEN_nf_events.119.a:0 "Це буде нелегко"
    EEN_nf_events.120.title:0 "Рейдери на нашому шляху!"
    EEN_nf_events.120.desc:0 "Не повинно дивувати, що поселенці Столичного Пустки не змогли відбитися від диких бандитів на своїх кордонах. Хоча багато хто відмахнувся б від цього як від чогось, що нас не стосується, є проблема в тому, що нашим солдатам потрібно проходити через ці території, щоб дати бій Братству. Посадка вертибердів у масштабах, необхідних для перемоги в цій війні, є непрактичною. Таким чином, у нас залишається лише один варіант. Ми повинні пробитися крізь цих дикунів, щоб дістатися до нашого справжнього ворога."
    EEN_nf_events.120.a:0 "Має бути досить легко"
    EEN_nf_events.121.title:0 "Тривожні чутки"
    EEN_nf_events.121.desc:0 "Із західної частини Столичного Пустки надходять чутки про солдатів у силовій броні, які нападають уночі та виганяють людей з околиць Форт-Константина. Чутки свідчать про атаки Анклаву, але цього не може бути, тому що ми перемогли їх понад 30 років тому на західному узбережжі. Ймовірно, це просто забобони мешканців Пустки, але це викликало достатньо занепокоєння в поселеннях Столичної пустки, щоб дати нам дозвіл патрулювати їхні землі."
    EEN_nf_events.121.a:0 "Не може бути, що це вони, правда?"
    EEN_nf_events.122.title:0 "Краще, ніж очікували"
    EEN_nf_events.122.desc:0 "Наші початкові очікування щодо Компанії Кігтя полягали в тому, що вони будуть не більш ніж відволіканням для Братства. Хоча не всі в командуванні задоволені тим, що капітан Гаррісон зміг перетворити найманців на боєздатну силу, це неможливо заперечувати. Тепер, коли нашу найбільшу загрозу в регіоні знищено, постають питання про майбутнє Компанії Кігтя."
    EEN_nf_events.122.a:0 "Несподіванка, але приємна"
    EEN_nf_events.123.title:0 "Проблеми на півдні"
    EEN_nf_events.123.desc:0 "Після знищення Контрольної станції АНКЛАВ у 2242 році президент Едем надіслав заклик до вцілілого персоналу Анклаву по всій країні, закликаючи їх їхати на схід, до Рейвен-Рок. Ті, хто вижив у Наварро, були не єдиними, хто почув заклик Едема. Невеликий загін у Флориді відповів на цей заклик. Ця група зі старого аерокосмічного комплексу запросила додаткову підтримку для секретного проєкту, необхідного для місії Анклаву. Вони були відправлені десятиліття тому, щоб забезпечити Анклаву запасний план на випадок, якщо Керлінг-13 не спрацює. Цей запасний план полягав у тому, щоб вирушити в місце, не торкнуте мутацією, – космос. Президент Едем перенаправив кілька вертибердів з Наварро, і незабаром після цього зв'язок перервався. Наше нещодавнє відновлення зв'язку з Анклавом ВанБурена показало, що група не вимерла і продовжує працювати над своєю метою. Вони наближаються до неї і запевняють президента, що зроблять усе, щоб їхні зусилля також підтримували наші цілі на землі. Відновлений зв'язок, орбітальні платформи та інші стратегічні переваги мають з'явитися в найближчі роки."
    EEN_nf_events.123.a:0 "Ми очікуємо почути результати найближчим часом"
    EEN_nf_events.124.title:0 "Допомога для Флориди"
    EEN_nf_events.124.desc:0 "Загін Анклаву в Космічному центрі ВанБурена ледве стримує орди мутантів, працюючи над створенням життєздатних космічних кораблів. У нас можуть бути власні проблеми, але чи означає це, що ми кидаємо наших побратимів-американців?"
    EEN_nf_events.124.a:0 "Ми просто не можемо дозволити собі допомогти їм"
    EEN_nf_events.124.b:0 "Ми можемо відправити кілька загонів допоміжних військ"
    EEN_nf_events.124.c:0 "Ми можемо відправити кілька загонів у силовій броні"
    EEN_nf_events.125.title:0 "Міграція на північ"
    EEN_nf_events.125.desc:0 "Люди у Флориді більше не могли самотужки стримувати жахіть-мутантів. Космічний центр ВанБурена був захоплений, і ті, хто зміг вчасно дістатися до вертибердів, пробилися до Рейвен-Рок. Це трагедія, але принаймні деякі вижили."
    EEN_nf_events.125.a:0 "Мутанти заплатять, згодом"
    EEN_nf_events.126.title:0 "Шторм насувається"
    EEN_nf_events.126.desc:0 "Вцілілий персонал Анклаву з Космічного центру ВанБурена розповідає нам про жахи флоридського Пустки. Мерзенні супермутанти, гангстери і навіть група тих проклятих технофілів з Братства лютують у штаті, який колись був ігровим майданчиком Америки. Можливо, вони змогли вигнати невеликий загін наших людей, але подивимося, як вони впораються з повною силою Армії Сполучених Штатів."
    EEN_nf_events.126.a:0 "Ми очистимо Флориду"
    EEN_nf_events.127.title:0 "Повідомлення від секретаря"
    EEN_nf_events.127.desc.1:0 " ПОВІДОМЛЕННЯ ДЛЯ ЕДЕМА "
    EEN_nf_events.127.desc.2:0 " ПОВІДОМЛЕННЯ ДЛЯ ОТЕМА"
    EEN_nf_events.127.a:0 "Ми зробимо великі справи разом"
    EEN_nf_events.127.b:0 "Ти не зупиниш нас, виродку"
    EEN_nf_events.128.title:0 "Граніт тут"
    EEN_nf_events.128.desc:0 "Коли ми не отримали відповіді з Наварро, ми, зрозуміло, дійшли висновку, що Братство або НКР розгромили наших західних співвітчизників, не залишивши вцілілих. На щастя, ми помилялися. Ми отримали передачу від сина сержанта Граніта, колишнього командира Контрольної роти Анклаву. Граніт-молодший повідомляє нам, що після падіння Наварро багато вцілілих з Анклаву пішли в підпілля, намагаючись сховатися від НКР, яка тільки посилилася з 2242 року. Покійний Граніт-старший вів багатьох вцілілих, заробляючи на життя як найманці, і тепер вони проживають у портовому поселенні під назвою Юрика."
    EEN_nf_events.128.a:0 "Принаймні деякі вижили"
    EEN_nf_events.129.title:0 "Гамбіт Граніта"
    EEN_nf_events.129.desc:0 "Останні кілька місяців ми підтримували зв'язок із Гранітом-молодшим, який інформував нас про ситуацію на Заході. Ми дізналися, що, хоча НКР є основною силою на заході, останніми роками вони розтягнули свої сили, і це їх послабило. Граніт вважає, що за достатньої підтримки вони зможуть відбити Наварро або принаймні помститися. Звісно, у нас є власні проблеми, але помста за полеглих – благородна справа."
    EEN_nf_events.129.a:0 "Ми не можемо їм допомогти"
    EEN_nf_events.129.b:0 "Ми можемо надіслати тільки зброю"
    EEN_nf_events.129.c:0 "Ми можемо надіслати зброю та людей"
    EEN_nf_events.130.title:0 "Термінове повідомлення"
    EEN_nf_events.130.desc:0 "Ми отримали термінове повідомлення від Граніта. Їхнє прикриття розкрите, і їх переслідують команди ліквідаторів рейнджерів НКР. Вони просять евакуації до Рейвен-Рок."
    EEN_nf_events.130.a:0 "Запускайте вертиберди"
    EEN_nf_events.130.b:0 "Що? Вас не чути."
    EEN_nf_events.131.title:0 "Рейвен-Рок надсилає допомогу"
    EEN_nf_events.131.desc:0 "Сьогодні вертибердами прибуло підкріплення з Рейвен-Рок. Кілька загонів допоміжних військ можуть бути не такими вражаючими, як солдати в силовій броні, але це все ще завзяті американці, готові допомогти нам відбиватися від орд мутантів Флориди."
    EEN_nf_events.131.a:0 "Ми вдячні за їхню допомогу"
    EEN_nf_events.132.title:0 "Рейвен-Рок надсилає допомогу"    
    EEN_nf_events.132.desc:0 "Сьогодні вертибердами прибуло підкріплення з Рейвен-Рок. Кілька загонів солдатів у найсучаснішій силовій броні та з передовою зброєю готові вселити страх у серця мутованих мас Флориди."    
    EEN_nf_events.132.a:0 "Ми вдячні за їхню допомогу"    
    EEN_nf_events.133.title:0 "Рейвен-Рок надсилає допомогу"
    EEN_nf_events.133.desc:0 "Наші побратими з Анклаву на Сході не забули про нас. Почувши про скрутне становище тих, хто залишився в Наварро, вони погодилися надіслати нам спорядження, щоб ми могли продовжити нашу боротьбу за виживання. Однак, безсумнівно, хтось у НКР бачив вертиберди, які пролітали над їхніми землями, доставляючи цю зброю з Вашингтона."
    EEN_nf_events.133.a:0 "Ми використаємо їх з користю"
    EEN_nf_events.134.title:0 "Рейвен-Рок надсилає допомогу"
    EEN_nf_events.134.desc:0 "Наші побратими з Анклаву на Сході не забули про нас. Почувши про скрутне становище тих, хто залишився в Наварро, вони погодилися надіслати нам людей і спорядження, щоб ми могли продовжити нашу боротьбу за виживання. Однак, безсумнівно, хтось у НКР бачив вертиберди, які пролітали над їхніми землями, доставляючи цих солдатів з Вашингтона."
    EEN_nf_events.134.a:0 "Ласкаво просимо до Юрики, хлопці"
    EEN_nf_events.135.title:0 "Передача з Рейвен-Рок"
    EEN_nf_events.135.desc:0 "Президент Едем передав нам великі обсяги даних про виробництво робототехніки. Деякі з цих креслень можуть бути поки що поза нашими можливостями, але вони допоможуть нам розробити кращі машини."
    EEN_nf_events.135.a:0 "Дякуємо, пане президенте"
    EEN_nf_events.136.title:0 "Що, в біса, таке 'С'лантер'?"
    EEN_nf_events.136.desc:0 "Коли ми почули, що наші припущення про Наварро були помилковими і що наші співвітчизники-американці не тільки вижили, але й процвітають, усі в Рейвен-Рок були в захваті. Це захоплення швидко змінилося занепокоєнням через дедалі дивніші новини із заходу. Хоча деталі не зовсім зрозумілі, деякі з їхнього персоналу таємно зв'язуються з нами з тривожними новинами. Ми отримуємо повідомлення, що вони визнають мутантів рівноправними громадянами, ведуть переговори з Братством про мирну інтеграцію і навіть є твердження, що їхній 'президент' є сином того самого племінника, який підірвав платформу! Важко зрозуміти, де чутки, а де факти, але якщо хоча б половина з того, що нам сказали, правда, цей анклав на заході далеко не наш союзник."
    EEN_nf_events.136.a:0 "Вони кажуть, що єноти... можуть голосувати?"
    EEN_nf_events.137.title:0 "Президент Хто?"
    EEN_nf_events.137.desc.1:0 "Схоже, що наші початкові припущення щодо Наварро були помилковими. Хоча база впала під натиском сил НКР і Братства невдовзі після міграції на схід, там була значна кількість вцілілих. Як і ми, вони вичікували свій час і відновлювали сили в таких місцях, як Вольт-Сіті та армійський склад Сьєрра. Ми мали... ем... задоволення поговорити з сином сержанта Граніта з Контрольної роти Анклаву. Його, очевидно, обрали президентом цього відділення анклаву, і він має плани відбудувати нашу велику націю на заході. Питання двох президентів може стати проблемою в майбутньому, але це міст, який ми, можливо, захочемо відкласти, поки не дійдемо до нього."
    EEN_nf_events.137.desc.2:0 "Схоже, що наші початкові припущення щодо Наварро були помилковими. Хоча база впала під натиском сил НКР і Братства невдовзі після міграції на схід, там була значна кількість вцілілих. Як і ми, вони вичікували свій час і відновлювали сили в таких місцях, як Вольт-Сіті та армійський склад Сьєрра. Ми мали... ем... задоволення поговорити з доктором Андерсоном, видатним ученим у галузі досліджень ВБО. Його, очевидно, обрали президентом цього відділення анклаву, і він має плани відбудувати нашу велику націю на заході. Питання двох президентів може стати проблемою в майбутньому, але це міст, який ми, можливо, захочемо відкласти, поки не дійдемо до нього."
    EEN_nf_events.137.a:0 "Принаймні вони – анклав."
    EEN_nf_events.138.title:0 "Радіомовчання?"
    EEN_nf_events.138.desc:0 "Обмежена розвідка та обльоти Онтаріо не виявили жодних ознак Онтарійського Анклаву. Що вони виявили, так це те, що регіон контролюють різні групи мешканців Пустки, які, безсумнівно, доклали руку до проблем, яких зазнали наші співвітчизники-американці близько 30 років тому. Пам'ять про наших товаришів, мабуть, все ще жива в їхніх головах, тому що по наших вертибердах і розвідниках стріляють. Зрозуміло, що якщо ми хочемо з'ясувати, що сталося з Онтарійським Анклавом, нам потрібно буде створити більш значну присутність."
    EEN_nf_events.138.a:0 "Ми йдемо на Торонто!"
    EEN_nf_events.139.title:0 "Приємна несподіванка"
    EEN_nf_events.139.desc:0 "Коли ми втратили зв'язок з Онтарійським Анклавом майже 30 років тому, багато хто в Рейвен-Рок думав, що вони були знищені ордами мутантів Канади. Деякі все ще сподівалися, і не лише на наших співвітчизників, а й на своїх родичів чи друзів, яких відправили їм на допомогу. Наступні спроби зв'язатися завжди зустрічали мовчання, і оптимізм згасав з кожним дзвінком, у якому чулося лише шипіння. Наша остання експедиція для розвідки території з метою розширення показала, що ті, хто сподівався, мали рацію! Онтарійський Анклав вижив усі ці роки, і поки ми боролися з Братством у Вашингтоні, вони зробили свій власний крок, щоб відновити контроль над Торонто. Онтарійське командування раде чути нас, нещодавно відремонтувавши свій далекий зв'язок, і готове повернутися до ладу."
    EEN_nf_events.139.a:0 "З поверненням!"
    EEN_nf_events.140.title:0 "Холодна гробниця"
    EEN_nf_events.140.desc:0 "Ми отримали звіти від команди, яку відправили до бункеру Онтарійського командування. Як ми й очікували, бункер втратив систему життєзабезпечення і давно був обчищений до нитки. Багато тіл лежать замерзлі в своїх ліжках, а нечисленні записи, які нам вдалося відновити зі зіпсованих баз даних, розповідають про повільну смерть після їхнього відступу з Торонто десятиліття тому. Згідно з записами, бункер вже був на останньому подиху, коли вони вийшли після знищення Платформи, але завдяки ресурсам, які вони забрали під час відступу, їм вдалося сповільнити занепад. Однак на початку 2270-х років стало очевидно, що їм доведеться покинути бункер. Після цього записи стають надто пошкодженими. Незрозуміло, чи намагалися вони відбити Торонто, чи просто спостерігали, як бункер втрачає життєзабезпечення навколо них. Що нам вдалося відновити, так це останній запис, у якому йдеться про 38 вцілілих, які вирушили на схід."
    EEN_nf_events.140.a:0 "Можливо, вони вижили"
    EEN_nf_events.141.title:0 "Ми знайшли їх"
    EEN_nf_events.141.desc:0 "Обшукуючи маршрут, яким ішли вцілілі з бункеру Онтарійського командування, ми знайшли мало слідів чи ознак цивілізації. Після перших 100 миль командування майже відмовилося від пошуків. Саме тоді вони знайшли перше тіло. Протягом наступних 80 миль ми знайшли решту 37 членів цієї приреченої групи. Деякі загинули від куль, інші мали сліди поїдання дикими тваринами, а більшість замерзли насмерть або померли з голоду. Їхні тіла були повернуті разом з тими, що були в бункері, де вони отримають належний похорон."
    EEN_nf_events.141.a:0 "Сумний день, принаймні ми знаємо правду."
    EEN_nf_events.142.title:0 "Відбудова Америки разом"
    EEN_nf_events.142.desc:0 "Після падіння Платформи Анклав був у жахливому стані. Бункери сиділи й чекали сигналу 'все чисто' з Платформи, сподіваючись вийти в чисту Америку, а натомість отримували з Наварро передачу про знищення Платформи. Багато хто втік, дезертирував або переслідував власні цілі. Навіть після того, як президент Едем закликав багатьох співробітників Наварро приєднатися до нього в Рейвен-Рок, значна частина Анклаву була розкидана і не мала чіткого напрямку. Наш короткий радіозв'язок з іншими бункерами та форпостами – це хороший початок, але це лише початок. Тепер, коли ми відновили свою силу, ми можемо вести наших розкиданих американських братів у майбутнє."v
    EEN_nf_events.142.a:0 "Ми поведемо за собою!"
    EEN_nf_events.143.title:0 "Більше, ніж форпост"
    EEN_nf_events.143.desc:0 "Роками ніхто не знав справжніх масштабів форпосту Анклаву в Чикаго. Записи про будівництво та довоєнні списки мешканців навряд чи були чимось цікавим і були втрачені зі знищенням Платформи. Більшість у командуванні Рейвен-Рок думали, що це місце зараз – не більше ніж три хлопці в бункері. Наш нещодавній радіозв'язок показав, що це не так, але ми все ще не знали, наскільки масштабним насправді є Чиказький Анклав. Розвиваючи наші радіозв'язки, ми відправили кількох представників до Чикаго вертибердом. Вони доповідають, що Чикаго набагато більше, ніж навіть найоптимістичніші очікування. Чиказький бункер містив тисячі довоєнних еліт, а також їхній персонал і значний контингент військових. Цей бункер був другим за розміром лише після Контрольної станції АНКЛАВ. За роки після падіння Платформи Чикаго активно підкорювало Чиказьку агломерацію, а також інші стратегічні об'єкти. Деякі в Рейвен-Рок хвилюються, що це означає для нас, оскільки вони в кращому становищі, ніж ми зараз. Президент припинив цю дискусію, нагадавши всім, що ми – один анклав з однією метою."v
    EEN_nf_events.143.a:0 "Ми повинні працювати разом, принаймні поки не розберемося з мутантами."
    EEN_nf_events.144.title:0 "Зростання напруги в Рейвен-Рок"
    EEN_nf_events.144.desc:0 "Загалом, Рейвен-Рок Анклав єдиний у своїй меті та переконаннях. Кожен чоловік, жінка і навіть дитина віддані меті відбудувати Америку такою, якою вона має бути. Звісно, існують розбіжності щодо того, що це означає або як краще це зробити, але вони зазвичай вирішуються полюбовно. Є один серйозний виняток, який загрожує розірвати Рейвен-Рок на частини. Президент Джон Генрі Едем і полковник Август Отем мають дедалі більш запеклі розбіжності з кількох ключових аспектів стратегії відбудови Америки. Незважаючи на їхні спроби тримати цей розкол між собою, Рейвен-Рок – не таке вже й велике місце, тому новини поширюються швидко. У лавах Анклаву формується розкол, і багато хто вважає, що це дійде до критичної точки, коли дні підготовки закінчаться і настане час для дій."v
    EEN_nf_events.144.a:0 "Слідкуйте за цим"
    EEN_nf_events.144.b:0 "Що це означає?"
    EEN_nf_events.145.title:0 "Змова полковника Отема"
    EEN_nf_events.145.desc:0 "Хоча мало хто знає, президент Едем не людина, а машина. За допомогою правильної програми, завантаженої в його мейнфрейм, його можна вимкнути, залишивши Рейвен-Рок працездатним. Це те, про що полковник Отем розмірковував дедалі частіше, оскільки їхні розбіжності зростали. Він знає, що це буде не так просто, як вимкнути тостер; Едем розумний і контролює системи безпеки Рейвен-Рок. Якщо машину попередять, Отем зазнає невдачі.\n\n Ось чому Отему потрібно ретельно вибудовувати свою підтримку, якщо він хоче успішно здійснити переворот. Ймовірно, йому потрібно, щоб принаймні половина Рейвен-Рок була принаймні симпатизуючою його ідеалам, щоб зберегти щось подібне в таємниці."v
    EEN_nf_events.145.a:0 "§R Мені варто прочитати цю подію."
    EEN_nf_events.146.title:0 "Остання крапля"
    EEN_nf_events.146.desc:0 "У місяці після поразки Братства головнокомандувач Отем мав незліченну кількість проблем, які потрібно було вирішувати. Партизани Братства, прихильники Едема і монументальне завдання керування значною мірою невдячним населенням. З усіма цими проблемами його анклав справлявся. Справжньою загрозою для Америки був лише один політ на вертиберді – у Чикаго. Чиказький Анклав – це сила, така ж могутня, як і військо Отема, і в хороший день їхнє керівництво було відстороненим.\n\n Сьогодні був поганий день.\n\n Проста розмова про роль секретаря в уряді Отема швидко переросла в агресивні позиції і зрештою в погрози. Запекла суперечка закінчилася різкими словами з боку секретаря, перш ніж він перервав зв'язок.\n\n§R Отем, ти і твої зрадницькі прихильники узурпували владу і вбили справжніх американців, щоб захистити ракову пухлину мутантів, яка спустошує нашу націю. За цей злочин не може бути достатнього покарання. Ви побачите нашу справедливу відплату.§!"v
    EEN_nf_events.146.a:0 "Якщо він хоче війни, він її отримає!"
    EEN_nf_events.147.title:0 "Незначні розбіжності"
    EEN_nf_events.147.desc:0 "Після відновлення зв'язку з Чиказьким Анклавом швидко стало зрозуміло, що їхні методи не зовсім збігаються з нашими. Замість того, щоб убити расу мутантів, вони хочуть поневолити її на доступне для огляду майбутнє. На перший погляд, це огидно для будь-кого, хто дотримується мудрості нашого великого президента. Це призвело до численних дебатів, а також закликів до більш агресивного підходу до наших співвітчизників-американців. Наш президент бачить крізь реакційні занепокоєння деяких у Рейвен-Рок. Хіба поневолення мутантів так сильно відрізняється від використання їх для експериментів або використання супермутантів як гарматного м'яса? Зрештою, раса мутантів вимре, коли наша робота буде завершена. Чи варто сперечатися про те, наскільки прискореним є їхнє знищення?"v
    EEN_nf_events.147.a:0 "Розділений дім не встоїть"
    EEN_nf_events.148.title:0 "Допомога"
    EEN_nf_events.148.desc:0 "Навіть найоптимістичніший солдат має побоювання щодо перспективи війни з Чикаго. Вони перевершують нас технологічно та чисельно. Ось чому нещодавня передача, отримана нами зі Столичного Пустки, призвела до святкувань усюди – від авіабази Макартур до Сталевого містечка. З нами зв'язався головнокомандувач Отем. Командувач нещодавно зірвав план президента Едема отруїти все Пустище водою, зараженою ВБО, і також стурбований догматами Чикаго. Він пропонує свою підтримку в нашому конфлікті з Чикаго і обіцяє, що разом ми зможемо відбудувати Америку!"v
    EEN_nf_events.148.a:0 "Нам знадобиться будь-яка допомога, яку ми зможемо отримати!"
    EEN_nf_events.149.title:0 "Доля Чиказького Анклаву"
    EEN_nf_events.149.desc:0 "Гармати замовкли. Пожежі в Чикаго згасають. Останні солдати Секретаря здалися або втекли. Поки наші солдати заспокоюють Чикаго, багато хто задається питанням, що станеться з тими, хто виступав проти Америки. Солдати з Пустки на власні очі бачили, як Чикаго ставиться до їхніх побратимів, і, природно, хочуть розстрільних команд. Вже є численні повідомлення про те, що солдатам Анклаву доводиться розганяти лінчувальників або затримувати недисциплінованих солдатів, які надто легковажно погрожують. Стратити кожного солдата, вченого і цивільного Чиказького Анклаву навряд чи можливо, не кажучи вже про те, що це добре сприймуть звичайні немутовані американці."v
    EEN_nf_events.149.a:0 "Стратити керівництво без суду"
    EEN_nf_events.149.b:0 "Організувати суди для найгірших злочинців"
    EEN_nf_events.149.c:0 "Помилувати корисних рекрутів"
    EEN_nf_events.149.d:0 "Покласти провину виключно на Секретаря"
    EEN_nf_events.150.title:0 "Тримайте голови високо"
    EEN_nf_events.150.desc:0 "В ефірі радіопередачі були припинені, щоб передати звернення нашого головнокомандувача про закінчення Чиказької війни та майбутнє нашої нації.\n\n §B Народе Америки, це говорить головнокомандувач Отем. Фальшивий Секретар внутрішніх справ та його поплічники розгромлені. Поки я говорю, наші військові наводять порядок на Середньому Заході. З їхньою поразкою від рук наших могутніх збройних сил шлях до повернення Америки став яснішим, ніж будь-коли. Я закликаю всіх американців, які слухають, тримати голови високо.\n\n Кожен солдат у полі, який захищає нашу націю\n\n Кожен заводський робітник, який виробляє наш арсенал.\n\n Кожен фермер, який годує нашу націю\n\n Ваша відданість Анклаву та внесок у нашу справу не забуті. Разом ми подбаємо про те, щоб кожна нелегітимна держава, яка претендує на частину нашої великої нації як на свою власну, незабаром зустріла свій кінець від плазмового вогню. Я запевняю вас, під моїм керівництвом Америка знову стане єдиною.\n\n Боже, благослови людство, Боже, благослови Анклав і Боже, благослови Америку. Це головнокомандувач Отем, підписуюсь."v
    EEN_nf_events.150.a:0 "Америка наближається"
    EEN_nf_events.151.title:0 "Подарунок"
    EEN_nf_events.151.desc:0 "Самі слова не можуть довести Чикаго щирість нашого бажання відновити наші напружені відносини. Вивчаючи історію дипломатії, президент Едем придумав чудову ідею. Фізичний символ нашої щирості у вигляді подарунка мав би велике значення для передачі наших намірів. Але що подарувати людям, у яких є всі плазмові гвинтівки, силова броня та вертиберди, які тільки може знадобитися нації?"v
    EEN_nf_events.151.a:0 "Їм завжди знадобиться більше рабів-мутантів"
    EEN_nf_events.151.b:0 "Створити величну статую Секретаря"
    EEN_nf_events.151.c:0 "Надіслати їм схеми броні 'Пекельне полум'я'"
    EEN_nf_events.151.d:0 "Надіслати їм дані досліджень айботів з міцним каркасом"
    EEN_nf_events.151.e:0 "Спробувати надіслати плазмову зброю та силову броню"
    EEN_nf_events.152.title:0 "Відповідь люб'язністю"
    EEN_nf_events.152.desc:0 "Рейвен-Рок нещодавно надіслав нам гарний подарунок. Схоже, вони щирі у своєму бажанні підтримувати наш союз і відбудовувати Америку разом. Наступним логічним кроком було б надіслати їм подарунок у відповідь. Наші найкращі художники створили статую президента Едема, принаймні того людського портрета, за який він себе видає. Завдяки наполегливій праці наших наглядачів раби-мутанти змогли виготовити величезну статую з вражаючою швидкістю. Звісно, Едем хоче, щоб ми слідували за ним як слухняні піддані. Ось чому в нас є план Б для цієї статуї. Якби ми сховали в статуї ядерний пристрій, ми могли б його підірвати. Цілком імовірно, що Едем встановить статую у своїй столиці. Її підрив завдасть нищівного удару по його адміністрації і дасть нам серйозну перевагу у війні, яку ми розпочнемо."v
    EEN_nf_events.152.a:0 "Просто звичайну статую, будь ласка"
    EEN_nf_events.152.b:0 "Готуйте бомбу."
    EEN_nf_events.153.title:0 "Вакантне крісло"
    EEN_nf_events.153.desc:0 "Президент Едем ніколи не бачив потреби призначати віце-президента, коли він керував справами в Рейвен-Рок. Зрештою, основні ролі віце-президента включають заміну президента в разі його смерті та розрив зв'язків у Конгресі. Без Конгресу для голосування та з президентом, який є комп'ютером ZAX у серці Рейвен-Рок, жодна з цих речей ніколи не була б необхідною. Однак, оскільки президент Едем об'єднує інші штати Анклаву по всій країні, необхідність у людині, яка могла б тиснути руки та виголошувати живі промови, стає дедалі очевиднішою. Роль буде значною мірою поверхневою, і цей призначений буде в основному виконувати примхи президента і надавати обличчя Анклаву. Це не означає, що роль буде просто номінальною. Віце-президент матиме доступ до президента і, ймовірно, впливатиме на реалізацію деяких політик. Це не вибір, до якого слід ставитися легковажно."
    EEN_nf_events.153.a:0 "§O Хейманн розуміє цінності старого світу."
    EEN_nf_events.153.b:0 "§O Посол Портер знає силу переговорів."
    EEN_nf_events.153.c:0 "§G Рік Герлі вселяє надію, хоч би як похмуро все не було."
    EEN_nf_events.153.d:0 "§C Піллоу допоможе нам досягти зірок, хоч би якою була ціна."
    EEN_nf_events.153.e:0 "§C Коберн добре резонує з найяскравішими умами Америки."
    EEN_nf_events.153.f:0 "§C Амбіції Петерсона заведуть його далеко."
    EEN_nf_events.153.g:0 "§R Маккарті з Рейвен-Рок, йому можна довіряти."
    EEN_nf_events.153.h:0 "§0 Граніт виглядає як матеріал для віце-президента."
    EEN_nf_events.154.title:0 "Відродження нації"
    EEN_nf_events.154.desc:0 "Представники з усієї Америки зібралися в Лінкольні, неподалік від руїн Вашингтона. Ці чоловіки та жінки Анклаву зустрілися, щоб узгодити деталі Лінкольнської угоди. Цей документ зміцнить об'єднаний уряд нашої нації, поклавши край дріб'язковим чварам і змаганням хто кого переплюне.\n\n Хоча різні території все ще керуватимуться своїми відповідними лідерами, всі вони підпорядковуються владі Президента. Анклав працюватиме над відновленням Америки та очищенням її від мутацій. Другорядні цілі або особисті проєкти будуть після цього. Разом ми зробимо Америку такою, якою вона була до війни: цілісною, прекрасною, могутньою. Ми – один Анклав, одна Америка, тепер і назавжди."v
    EEN_nf_events.154.a:0 "Боже, благослови Анклав і Боже, благослови Америку"
    EEN_nf_events.155.title:0 "Війна назріває"
    EEN_nf_events.155.desc:0 "Останніми місяцями стало зрозуміло, що Секретар має мало поваги до посади Президента. Він відверто не виконував директиви президента, поводився вороже і кидав зневажливі зауваження на адресу Едема. Останнім порушенням стало те, що він наказав чиказьким військовим провести серію навчань, які імітували конфлікт між анклавами. На запитання про це Секретар зауважив, що це для того, щоб Чикаго не спіймали зі спущеними штанами у разі повстання, подібного до того, що ледь не сталося в Рейвен-Рок з полковником Отемом. Він також рекомендував нам зробити те саме, натякаючи, що завжди можуть бути інші зрадники, які пройшли повз нашу увагу."v
    EEN_nf_events.155.a:0 "Це може закінчитися лише одним"
    EEN_nf_events.156.title:0 "Падіння Чикаго"
    EEN_nf_events.156.desc.1:0 "Гармати замовкли. Пожежі в Чикаго згасають. Останні солдати Секретаря здалися або втекли. Поки наші солдати заспокоюють Чикаго, багато хто задається питанням, що станеться з тими, хто виступав проти Америки. Майже все керівництво Чикаго разом із солдатами, вченими і навіть цивільними були активними учасниками цього конфлікту. За законом ми маємо право перетворити їх усіх на попіл. Президент визнає гнів американського народу, і він теж засмучений зрадницькими діями людей Чикаго та їхніх прихильників. Однак існують деякі неминучі реалії, які слід враховувати. Чикаго представляє одне з найбільших населень чистих людей, що залишилися на землі. Місто також є домом для одних із найяскравіших умів і найкращих тактиків за межами нашої території. Було б марнотратством убити їх усіх."v
    EEN_nf_events.156.desc.2:0 "Гармати замовкли, і коли наші солдати прочісують радіоактивні руїни Чикаго, стає зрозуміло, що людству завдано жахливого удару. Незліченна кількість чистих американських людей була знищена в першому ядерному обміні з часів Великої війни. Тисячі інших загинули в наступних боях, обидві сторони просувалися до бункерів своїх супротивників, щоб помститися керівництву, яке знищило їхні домівки. Перегляд записів з айботів з Чиказького кратера переповнив схеми Едема чимось, що він міг би назвати докором сумління. Майбутнє для людства було таким світлим якийсь час, але тепер все виглядає так само похмуро, як і після падіння платформи."v
    EEN_nf_events.156.a:0 "Помилувати тільки цивільних і вчених"
    EEN_nf_events.156.b:0 "Хороші солдати виконують накази, стратити тільки керівництво"
    EEN_nf_events.156.c:0 "Ніякої милості зрадникам"
    EEN_nf_events.156.d:0 "Що ми наробили?"
    EEN_nf_events.157.title:0 "ЛІНКОЛЬНА БІЛЬШЕ НЕМАЄ!"
    EEN_nf_events.157.desc:0 "Місто Лінкольн було стерте з карти ядерним вибухом. Тисячі американців були випарувані в одну мить, а ті небагато, хто вижив, хлинули на форпости Анклаву. Безпосередньо перед вибухом ми отримали наступне повідомлення з Чикаго.\n\n §R Джон Генрі Едем, ти і твої прихильники обійшли законний порядок передачі влади в нашому уряді. Твої криві цілі та несправне програмування не можна ігнорувати, скільки б добрих слів чи подарунків ти нам не кидав. Ми бачимо твій фарс і кладемо край твоєму маленькому феоду. Озирнися на своє маленьке містечко і милуйся краєвидом, поки можеш. Скоро не залишиться нікого, хто стоятиме між нами і твоїм вимикачем."v
    EEN_nf_events.157.a:0 "Це означає війну!"
    EEN_nf_events.157.b:0 "Відкрити вогонь у відповідь, перетворити Чикаго на попіл!"
    EEN_nf_events.157.c:0 "У Кадмуса є спосіб завдати удару у відповідь!"
    EEN_nf_events.158.title:0 "РЕЙВЕН-РОК ВІДКРИВАЄ ВОГОНЬ У ВІДПОВІДЬ!"
    EEN_nf_events.158.desc:0 "Чикаго перетворено на кратер ядерною МБР, випущеною з Рейвен-Рок. Ми не знаємо, звідки вони взяли такий пристрій, але це вже не має значення. Тисячі наших громадян були вбиті президентом Едемом, і наша війна проти його прихильників стала набагато складнішою!"
    EEN_nf_events.158.a:0 "Чикаго буде помщено!"
    EEN_nf_events.159.title:0 "Полковник Отем наводить лад"
    EEN_nf_events.159.desc:0 "Як ми й очікували, віроломний полковник Отем не гаяв часу, караючи американців, які підтримували бачення президента Едема. Небагато вчених, яким вдалося втекти до наших кордонів, розповідають про нещадні чистки та довільні перевірки лояльності. Вчені присвятили себе нашій нації і бажають допомогти нам зберегти наукову перевагу над Отемом та його зрадниками, які люблять мутантів."
    EEN_nf_events.159.a:0 "Його втрата – наше надбання"
    EEN_nf_events.160.title:0 "Альфа проти Сігми"
    EEN_nf_events.160.desc:0 "Після того, як Братство отримало прочухана від нашого Крутого Анклаву, Головнокомандувач Отем мав купу проблем. Технарі-прихильники Братства, які не вміли програвати, фанати Едема, і найбільша проблема – купа бета-мешканців Пустки, які думали, що Крутий Анклав не проходить перевірку. Це все було дрібницями для такого головного героя. Але той е-бой Секретар і його прихильники в Чикаго були зовсім іншим рівнем. Вони посилилися після розгрому власного Братства, і навіть у хороший день намагалися нас принизити.\n\n Сьогодні був день без успіху.\n\n Секретар почав панікувати, коли Отем говорив про те, що в Крутому Анклаві може бути тільки одна Сігма. Чикаго намагалося принизити нас своїм технологічним розвитком, а потім Секретар вийшов із себе, перш ніж покинути чат.\n\n§R Отем, ти і твої фанати не круті. Ви просто жалкі NPC-бети, які співчувають повіям із Пустки. За це ви отримаєте дизлайк!"
    EEN_nf_events.160.a:0 "Це брехня!"
    EEN_nf_events.161.title:0 "Стомлені, але готові боротися"
    EEN_nf_events.161.desc:0 "Сотні солдатів у силовій броні перетнули наш західний кордон останніми тижнями. Майже з порожньою зброєю та побитою бронею, солдати були полегшені, зустрівши наші патрулі. Втомлені солдати з Чикаго були допитані, і їхні розповіді малюють тривожну картину. Схоже, Секретар на заході відкусив більше, ніж зміг проковтнути, і Чикаго було захоплено. Небагатьом солдатам, які змогли вибратися, було наказано відступати до Столичного Пустки майором Торном, який був в останній групі солдатів, що пробилися на нашу територію. Майор, разом з усіма вцілілими, прагнуть помститися мутантам, які знищили їхній дім. Хоча вони втомлені після місяців боїв і походу на схід, вони наполягають на поверненні на фронт."
    EEN_nf_events.161.a:0 "Ми змусимо цих мутантів заплатити!"
    EEN_nf_events.162.title:0 "Нечинні коди"
    EEN_nf_events.162.desc:0 "По всій країні є старі військові бази та бункери, які не відкривалися майже 200 років. Ми можемо обійти охорону багатьох із них за допомогою довоєнних кодів. Форт-Константин не належить до таких об'єктів. Якийсь покидьок з Пустки натрапив на нього роки тому і запустив програму боротьби з повстанцями, тому тепер навіть наші коди допуску не працюють. Там сотні роботів, готових розстріляти будь-кого, хто спробує увійти. Це проблема, яку ми здебільшого ігнорували, але якщо ми нічого з цим не зробимо, це можуть використати проти нас. Президент Едем готує накази нашим людям штурмувати об'єкт зараз і вимкнути машини для нашого використання. Полковник Отем не погоджується і хоче використати ЕМП, який, безсумнівно, підсмажить машини всередині, зробивши їх непридатними."
    EEN_nf_events.162.a:0 "Ми не будемо витрачати життя на залізяки"
    EEN_nf_events.162.b:0 "Президент має рацію, нам потрібні ці боти"
    EEN_nf_events.163.title:0 "Проводи капітана Гаррісона"
    EEN_nf_events.163.desc:0 "Капітан Гаррісон не подобався певним колам у Рейвен-Рок. Він висловлював свою думку щодо певної політики, і цього було достатньо, щоб його відправили на цей новий проєкт у Форт-Баністер. Ті, хто знає про проєкт, вважають його нездійсненною мрією. Немає жодних шансів, що навіть офіцер армії США зможе перетворити збір рейдерів у бойовій броні на щось більше. На проводи капітана прийшло мало людей, окрім полковника Отема та кількох близьких до нього офіцерів. Вони недовго поговорили, перш ніж полковник відправив капітана Гаррісона з кількома словами."
    EEN_nf_events.163.a:0 "Щасти вам, капітане"
    EEN_nf_events.163.b:0 "Ми чекаємо на великі справи, капітане."
    
