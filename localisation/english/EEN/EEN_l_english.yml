    EEN_PHEARSON_DESC:0 "Зі смертю Кадмуса, Крістофер Пітерсон був підвищений до капітана і взяв під контроль Ван-Бюренський загін. Підтримуваний лояльними до нього людьми, Пітерсон планує продовжувати знищення комуністів, визволення Америки та відновлення Старого Світу."
    
    ###leader description###
    EEN_eden_desc:0 "Президент Джон Генрі Едем — справжнє втілення Американської Мрії. Починаючи зі скромних коренів простого суперкомп'ютера ZAX, призначеного для управління станцією спостереження, президент Едем любив свою країну, і не тільки тому, що був запрограмований на це. Ця любов до Америки надихнула його вивчати всіх великих президентів в історії нації, особливо Авраама Лінкольна. Це поєднання старого доброго патріотизму та холодної розрахункової логіки зробило президента Едема ідеальною людиною... е-е-е... машиною, щоб взяти на себе керівництво Анклавом після нещасливого знищення Контрольної Станції АНКЛАВ. Він просто найкращий вибір, щоб повернути Америку з краю прірви та врятувати людство від гниття мутації, яка вкоренилася з часів війни."
    EEN_autumn_desc:0 "Полковник Отем ніколи не цікавився божевільними геноцидними мріями колишніх президентів Анклаву, таких як Річардсон та Едем. Отем стурбований лише одним: відбудовою Америки будь-якими необхідними засобами."

