l_english:

    ###Tool Tips###
    EEN_tt_1:0 "Це знадобиться..."
    EEN_tt_2:0 "Розблокує рішення для зв'язку з іншими осередками Анклаву"
    EEN_tt_3:0 "Обрушіть вогонь на цього проклятого робота!"
    EEN_tt_4:0 "Нові радники та лідери вийдуть на передній план!"
    EEN_tt_5:0 "Ми надамо автономію ватажкам рейдерів та іншим місцевим автократам на підконтрольних нам територіях для забезпечення місцевого правосуддя та безпеки."
    EEN_tt_6:0 "Розблокує рішення платити Компанії Кіготь за проведення таємних операцій для нас."
    EEN_tt_7:0 "Розблокує нові закони про пресу щодо того, хто керує ефіром"
    EEN_tt_8:0 "Мутанти Вашингтона страждатимуть і помруть, залишаючи пустку чистою"
    EEN_tt_9:0 "Розблокує рішення щодо повернення цивілізації до міст США"
    EEN_tt_10:0 "Когось ще налякало те, як це було сказано?"
    EEN_popular_support_tt:0 "Незважаючи на силову броню, уряди отримують свою владу за згодою керованих. Анклаву потрібно довести пересічному мешканцю пустки, що він гідний керувати ними. Хоча потужна армія та найбільше джерело чистої води на цій стороні Аппалачів є дуже хорошим початком, все ще є речі, які можуть змусити людей пустки повстати і спробувати повернутися до самоврядування."
    EEN_tt_11:0 "Мешканцям пустки це, ймовірно, не сподобається"
    EEN_tt_12:0 "Мешканцям пустки це дуже не сподобається"
    EEN_tt_13:0 "Це буде жахом для зв'язків з громадськістю!"
    EEN_tt_14:0 "Мешканцям пустки це сподобається"
    EEN_tt_15:0 "Мешканцям пустки це дуже сподобається"
    EEN_tt_16:0 "Мешканці пустки святкуватимуть це!"
    EEN_tt_17:0 "Туди, куди ми приносимо воду, ми приносимо порядок"
    EEN_tt_18:0 "Ми почнемо будівництво центрів розподілу води в слухняних регіонах і знайдемо для них персонал"
    EEN_tt_19:0 "Як тільки хтось змусить цю занедбану мрію знову працювати, ми повинні діяти!"
    EEN_tt_20:0 "Слідкуйте за варіантами подій та рішеннями фокусів. Ті, що впливатимуть на загальне сприйняття Анклаву мешканцями пустки, згадуватимуть про цей вплив. Роблячи те, що сподобається мешканцям пустки, ваша громадська підтримка зростатиме. Роблячи те, що їм не подобається, ви зашкодите громадській підтримці."
    EEN_tt_21:0 "Розблокує новий окупаційний закон для розподілу води спраглим мешканцям пустки в обмін на їхню покору."
    EEN_tt_22:0 "Розблокує новий окупаційний закон для очищення пустки"
    EEN_tt_23:0 "Їхня відповідь, ймовірно, залежатиме від того, наскільки добре складаються наші робочі стосунки"
    EEN_tt_24:0 "Це зміцнить наші зв'язки з нашими працівниками"
    EEN_tt_25:0 "Більше мешканців пустки піддаються впливу зараженої ВШЕ води"
    EEN_tt_26:0 "Створити невеликий форпост для спостереження за зусиллями зі стерилізації мутантів."
    EEN_tt_27:0 "З відкриттям більшої кількості центрів розподілу води, чернь із пустки підкориться!"
    EEN_tt_28:0 "Так, схоже, Анклав — злі виродки чи щось таке."
    EEN_tt_29:0 "Виберіть це, якщо ви вперше граєте за полковника Отема"
    EEN_tt_30:0 "Виберіть це, якщо ви вперше граєте за президента Едема"
    EEN_tt_31:0 "Після того, як наші солдати візьмуть об'єкт під контроль, невеликий загін охоронятиме його"
    EEN_tt_32:0 "Як тільки Компанія Кіготь убезпечить об'єкт, ми введемо солдатів для його охорони."
    EEN_tt_33:0 "Наші штурмові сили залишаться на об'єкті для його охорони"
    EEN_tt_34:0 "Наша перша партія солдатів-мутантів готова!"
    EEN_tt_35:0 "Ми відправимо більше солдатів для охорони Проєкту Чистота!"
    EEN_tt_36:0 "Навіть якщо вони витіснять нас, ми будемо готові повернути його!"
    EEN_tt_37:0 "Рівет-Сіті не зміг зупинити Анклав самотужки"
    EEN_tt_38:0 "Встановіть Fountain of Dreams, щоб отримати максимум від цього контенту!"
    EEN_tt_39:0 "Встановіть Rustbelt Rising, щоб отримати максимум від цього контенту!"
    EEN_tt_40:0 "Ті, хто вижив з Космічного центру ВанБюрен, приєдналися до нас!"
    EEN_tt_41:0 "Ті, хто вижив з роти Граніту, приєдналися до нас!"
    EEN_tt_42:0 "Ці солдати будуть чудовою підмогою!"
    EEN_tt_43:0 "Розблокує рішення відправляти BHS більше мутантів для «лікування»"
    EEN_tt_44:0 "Розблокує рішення викрадати мешканців пустки для створення роботів-мозків"
    EEN_tt_45:0 "Зменшує ймовірність того, що мешканці пустки дізнаються правду про наші клініки лікування"
    EEN_tt_46:0 "Має бути встановлено Enclave Reborn Redux"
    EEN_tt_47:0 "§0Це збільшить підтримку Отема"
    EEN_tt_48:0 "§RЦе збільшить підтримку Едема"
    EEN_tt_49:0 "Макартур приєднається до нас, коли настане час!"
    EEN_tt_50:0 "Розблокує рішення просити інші фракції Анклаву приєднатися до нас у нашій боротьбі"
    EEN_tt_51:0 "Через 30 днів ми будемо воювати з Рейвен-Роком"
    EEN_tt_52:0 "§RЦе можливо, тому що ми втримали МБР Форту Константина"
    EEN_tt_53:0 "§C Прихильність Едема до президента Гранта дає нам цю можливість"
    EEN_tt_54:0 "§C Прихильність Едема до президента Річардсона дає нам цю можливість"
    EEN_tt_55:0 "§C Прихильність Едема до президента Джексона дає нам цю можливість"
    EEN_tt_56:0 "§C Прихильність Едема до президента Гувера дає нам цю можливість"
    EEN_tt_57:0 "Цей вибір розблоковує нову виробничу компанію!"
    EEN_tt_58:0 "Додає §RДослідження конфліктів з Братством§!, що надає ((§Y[BOS.GetFlag]Братство Сталі§!) бонус до атаки проти країн §G+2.5%§!), (§Y[BOS.GetFlag]Братство Сталі§!) бонус до захисту проти країн §G+2.5%§!)"
    EEN_tt_59:0 "Анклав не може просто так змінити свою централізацію за примхою!"
    EEN_tt_60:0 "§RЦе зробить локалізацію в пізніших фокусах і подіях безглуздою, і ми не переписуватимемо 1/3 дерева фокусів, щоб пристосувати цей варіант. Не приходьте в Discord ECR скаржитися§!"
    EEN_hate_bos_add_tt:0 "Додає §RЕкспертизу в боротьбі з Братством§!, що надає ((§Y[BOS.GetFlag]Братство Сталі§!) бонус до атаки проти країн §G+7.5%§!), (§Y[BOS.GetFlag]Братство Сталі§!) бонус до захисту проти країн §G+7.5%§!)"
    EEN_hate_bos_remove_tt:0 "Видаляє §BЕкспертизу в боротьбі з Братством§!, що надавала ((§Y[BOS.GetFlag]Братство Сталі§!) бонус до атаки проти країн §G+7.5%§!), (§Y[BOS.GetFlag]Братство Сталі§!) бонус до захисту проти країн §G+7.5%§!)"
    EEN_forced_draft_tt:0 "Навіть із підписним бонусом призов мешканців пустки засмучує невдячних."
    EEN_distributed_water_tt:0 "Спраглий мешканець пустки вихвалятиме будь-кого, хто дасть йому пляшку води"
    EEN_grabbed_factory_tt:0 "Невдячний мешканець пустки не розуміє, що нам потрібна ця фабрика для їхньої ж безпеки!"
    EEN_grabbed_specimins_tt:0 "Немитий мешканець пустки чомусь заперечуватиме проти того, що ми забираємо покидьків суспільства!"
    EEN_funded_militias_tt:0 "Ополченці пустки цінують наші неякісні рештки"
    EEN_propaganda_efforts_tt:0 "Це має змінити думку деяких мешканців пустки"
    EEN_militia_tt:0 "Ми призвемо мешканців пустки для охорони наших кордонів"
    
