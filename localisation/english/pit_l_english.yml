### Ideas ###
    PIT_capital_wasteland_slave_imports_idea:0 "Capital Wasteland Slave Imports"
    PIT_capital_wasteland_slave_imports_idea_desc:0 "The slavers of Paradise Falls ship in slaves from The Capital Wasteland by the cartload."
    PIT_capital_wasteland_slave_imports_2_idea:0 "Capital Wasteland Slave Imports"
    PIT_capital_wasteland_slave_imports_2_idea_desc:0 "The slavers of Paradise Falls ship in slaves from The capital Wasteland almost faster than we can unload them."
    PIT_breakers_imports_idea:0 "Breaker Imports"
    PIT_breakers_imports_idea_desc:0 "The slavers of The Breakers ship both slaves and scrap in from across the great lakes."
    PIT_harrisburg_imports_idea:0 "Harrisburg Imports"
    PIT_harrisburg_imports_idea_desc:0 "The Harrisburg Bandits sell us both food and slaves from across eastern PA."
    PIT_arms_exports_idea:0 "Arms Exports"
    PIT_arms_exports_idea_desc:0 "Our forges produce ammunition that we export across the wasteland."
    PIT_tdc_idea:0 "Troglodyte Degeneration Contagion"
    PIT_tdc_idea_desc:0 "Troglodyte Degeneration Contagion, known as TDC, is a miserable sickness that effects the people in the area around The Pitt. The mix of pollutants and radiation both in the air and water around the city infect everyone eventually. Withhin weeks, those that suffer from the contagion develop deep skin lesions. Around 20% of those that contract it suffer a worse fate. Their mental state degrades as does their body, turning them into horrible mutants known as Trogs. What's worse is that every single child born in The Pitt suffer this fate just a few weeks after birth."
    PIT_industrial_support_idea:0 "Industrial Support"
    PIT_industrial_support_idea_desc:0 "We invested some of our industry into producing quality tools for our workers."
    PIT_overextended_industry_idea:0 "Overextended Industry"
    PIT_overextended_industry_idea_desc:0 "Producing both quality tools and quality weapons has our workers stretched thin."
    PIT_internal_supplied_arms_idea:0 "Arms Manufacturing Support"
    PIT_internal_supplied_arms_idea_desc:0 "Many of the weapons in The Pitt are produced in-house using our advanced pre-war machines. The quality of the weapons and availability of replacement parts makes these weapons more reliable than most wasteland weapons."
    PIT_enhanced_melee_idea:0 "Enhanced Cutting Tools"
    PIT_enhanced_melee_idea_desc:0 "Not only are our cutting tools good for industrial purposes, but they've made handy weapons in a pinch. We've expanded on designs with this secondary purpose in mind."
    PIT_enhanced_ballistic_idea:0 "Enhanced Firearm Designs"
    PIT_enhanced_ballistic_idea_desc:0 "We've learned from every jam, every misfire, and every worker used for target practice. We have made our guns just a little more reliable, and a little bit deadlier."
    PIT_enhanced_both_idea:0 "Tool & Weapon Development"
    PIT_enhanced_both_idea_desc:0 "Enhancing the designs of our cutting tools and firearms has led to great benefits."
    PIT_streamlined_melee_idea:0 "Streamlined Tool Production"
    PIT_streamlined_melee_idea_desc:0 "By observing bottlenecks and unneeded processes, we have cut down on the time it takes to produce our tools."
    PIT_streamlined_ballistic_idea:0 "Streamlined Weapon Production"
    PIT_streamlined_ballistic_idea_desc:0 "We're putting out weapons at a speed like we have an army to outfit or something. Oh wait, we do."
    PIT_streamlined_both_idea:0 "Streamlined Tool & Weapon Production"
    PIT_streamlined_both_idea_desc:0 "We have streamlined the production of our firearms and cutting tools, getting them into the hands of more soldiers and workers."
    PIT_liberated_workers_idea:0 "Workers Liberated"
    PIT_liberated_workers_idea_desc:0 "The workers are freed from their shackles. If they want to leave they can. Just walk across the mined bridge and through trog territory. Go ahead. §RDo it."
    PIT_freedom_delayed_idea:0 "Freedom Delayed"
    PIT_freedom_delayed_idea_desc:0 "I know you want to be free now. But it just isn't possible right now. The economy is in shambles."
    PIT_freedom_refused_idea:0 "Freedom Refused"
    PIT_freedom_refused_idea_desc:0 "You really thought you'd be getting your freedom just because a few hundred of you were meat shields during the coup?"
    PIT_wernher_cure_research_idea:0 "Wernher's Cure Research"
    PIT_wernher_cure_research_idea_desc:0 "We may not have advanced labs, or an educated scientist leading the research. But we'll still cure TDC somehow."
    PIT_import_export_idea:0 "Circular Trade Economy"
    PIT_import_export_idea_desc:0 "The Pitt's economy depends on the export of steel and weapons. These exports allow us to purchase everything we need from external suppliers. Let us hope the supply lines are never cut off."
    PIT_fueled_growth_idea:0 "Fueled Growth"
    PIT_fueled_growth_idea_desc:0 "The Pitt's economy depends on the export of steel and weapons. We will reinvest some of the profits of these sales into building up other industrial sectors. More products means more caps after all."
    PIT_self_sufficiency_idea:0 "Self-Sufficient Economy"
    PIT_self_sufficiency_idea_desc:0 "The Pitt's economy depends on the export of steel and weapons, for now. However, we will reinvest the fruits of our labor into building up other sectors of our economy. Eventually we will need nothing from those beyond our walls, and with that, we will bow to nobody."
    PIT_wernher_cure_research_harsh_idea:0 "Harsh Cure Research"
    PIT_wernher_cure_research_harsh_idea_desc:0 "Enough tiptoeing around. We need that cure sooner rather than later. If the price we pay for the cure is Ashur's brat crying more, so be it."
    PIT_wernher_cure_research_soft_idea:0 "Soft Cure Research"
    PIT_wernher_cure_research_soft_idea_desc:0 "Ok fine, we will take our time and try not to hurt the brat too much."
    PIT_hiring_workers_idea:0 "Hiring Workers"
    PIT_hiring_workers_idea_desc:0 "For the first time in a long time, people enter The Pitt to work over their own free will. They even get paid for it!"
    PIT_wernhers_slave_imports_idea:0 "Wernher's Slave Imports"
    PIT_wernhers_slave_imports_idea_desc:0 "Wernher ensures that The Pitt will continue to have the workers it needs to thrive."
    PIT_automated_industry_idea:0 "Automated Industry"
    PIT_automated_industry_idea_desc:0 "We can't replace every step of production with machines, yet. But we can at least have the bots do the heavier lifting."
    PIT_home_defense_idea:0 "Safeguard Our Home"
    PIT_home_defense_idea_desc:0 "Every freed man and woman of The Pitt knows what awaits us if we allow some raider warlord or other bastard to rule over The Pitt again. As such, they are more than willing to join the fight!"
    PIT_worker_rights_idea:0 "Worker Rights"
    PIT_worker_rights_idea_desc:0 "Working in The Pitt may not be a walk in the park, but it has gotten a lot easier once we were given breathing masks and the beatings stopped."
    PIT_never_again_idea:0 "Never Again"
    PIT_never_again_idea_desc:0 "We will fight with every inch of our soul. We will fight down to the last man. We will fight with a fury unseen by the scum of the wastes. We will fight to ensure we never are chained again!"
    PIT_enforced_hierarchy_idea:0 "Enforced Hierarchy"
    PIT_enforced_hierarchy_idea_desc:0 "No more of this tiptoeing around bullshit Ashur and Wernher wanted to pull. Slaves are slaves. Raiders are Raiders. We're at the top, they're at the bottom, and that's the way things will stay."
    PIT_pitt_arms_supply_idea:0 "Pitt Arms Supplies"
    PIT_pitt_arms_supply_idea_desc:0 "The Pitt is shipping us guns and bullets on regular intervals, we just need to give them a cut of our raids."
    PIT_arsenal_of_terror_idea:0 "Arsenal of Terror"
    PIT_arsenal_of_terror_idea_desc:0 "We supply all the best raider gangs around with weapons, and in return they give us a pretty sweet cut of their raids."
    PIT_nonstop_party_idea:0 "Nonstop Party"
    PIT_nonstop_party_idea_desc:0 "Aint no party like a raider party, because a raider party don't stop till you're §RDEAD"
    PIT_the_hole_idea:0 "The Hole"
    PIT_the_hole_idea_desc:0 "From time to time, workers are tossed into The Hole and forced to fight. Those that win earn a place in the army. Those that lose, well they don't have to work again. It's a win-win isn't it?"
    PIT_stagnating_empire_idea:0 "Stagnating Empire"
    PIT_stagnating_empire_idea_desc:0 "Wernher barely concerns himself with anything that goes on in The Pitt. He sits up in his tower thinking that crushing one uprising means he'll never face another."
    #Ashur's National Spirits
    PIT_rebuilt_city_1_idea:0 "We Re-Built This City"
    PIT_rebuilt_city_2_idea:0 "We Re-Built This City"
    PIT_rebuilt_city_3_idea:0 "We Re-Built This City"
