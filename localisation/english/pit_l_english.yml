### National Focuses ###

    PIT_nf_a001:0 "City of Steel"
    PIT_nf_a001_desc:0 "Even before The Great War, The Pitt was an industrial giant."
    PIT_nf_a002:0 "Uniting The Pitt"
    PIT_nf_a002_desc:0 "Lord Ashur did what many thought impossible, put a stop to the endless fighting in The Pitt."
    PIT_nf_a003:0 "The Pitt's Problem"
    PIT_nf_a003_desc:0 "For all it's strenghts, The Pitt has one crippling problem that's prevented it from ever achieving greatness."
    PIT_nf_a004:0 "The Doctor"
    PIT_nf_a004_desc:0 "As word of a unified Pitt spread, a lone doctor made their way to meet with it's master."
    PIT_nf_a005:0 "A Dream For Two"
    PIT_nf_a005_desc:0 "Two great minds came up with a plan for The Pitt's future that eclipsed anything they had envisioned alone, but three's a crowd."
    PIT_nf_a006:0 "The Fires of Industry"
    PIT_nf_a006_desc:0 "Many of the pre-war forges of The Pitt can still be operated. This allows for manufacturing on a scale rarely seen in The Wasteland."
    PIT_nf_a007:0 "Equipping The Workers"
    PIT_nf_a007_desc:0 "Our first priority should be giving our workers the tools for their job."
    PIT_nf_a008:0 "Balance Priorities"
    PIT_nf_a008_desc:0 "We need not choose between equipping our workers or our soldiers, everyone just needs to do with a little less."
    PIT_nf_a009:0 "Equip Our Army"
    PIT_nf_a009_desc:0 "Between the trogs, wildmen, and ungrateful workers, Ashur's army needs every bullet they can get."
    PIT_nf_a010:0 "Initial Production Run"
    PIT_nf_a010_desc:0 "Our first batches of equipment are rolling off the line now."
    PIT_nf_a011:0 "Enhance Designs"
    PIT_nf_a011_desc:0 "With the new equipment in hand, a few design flaws are being noticed."
    PIT_nf_a012:0 "Streamline Production"
    PIT_nf_a012_desc:0 "Our production methods will grow more efficient as we study our processes."
    PIT_nf_a013:0 "Push The Perimiter"
    PIT_nf_a013_desc:0 "The new equipment allows us to push our fences further into the city."
    PIT_nf_a014:0 "The Broken"
    PIT_nf_a014_desc:0 "How will we treat supplier who fails to meet our demands?"
    PIT_nf_a015:0 "Support Our Suppliers"
    PIT_nf_a015_desc:0 "The Pitt can not survive without a steady supply of workers. We must ensure our sources are able to meet our needs."
    PIT_nf_a016:0 "Renovate Uptown"
    PIT_nf_a016_desc:0 "Ashur's army risks their lives day an night securing our borders and bringing back food from raids. They deserve a decent place to live."
    PIT_nf_a017:0 "For The Workers"
    PIT_nf_a017_desc:0 "Keeping a few buildings from collapsing should prevent excessive worker turnover."
    PIT_nf_a018:0 "Protecting Haven"
    PIT_nf_a018_desc:0 "The heart of our city needs to be protected most of all."
    PIT_nf_a019:0 "Haven Research"
    PIT_nf_a019_desc:0 "Dr. Kundanika is requesting additional lab space in Haven."
    PIT_nf_a020:0 "Pitt Armaments"
    PIT_nf_a020_desc:0 "Weapons and ammo produced in The Pitt are finding their way into all kinds of wasteland conflicts."
    PIT_nf_a021:0 "Cull Trog Numbers"
    PIT_nf_a021_desc:0 "The Trogs are getting bolder with their pushes on our perimiter. Cutting their numbers should drive them back across the river."
    PIT_nf_a022:0 "The Miracle Child"
    PIT_nf_a022_desc:0 "Every child born in The Pitt ends up going feral within weeks, making procreation essentially impossible. That was the case for every birth except this one."
    PIT_nf_a023:0 "Import Heathens"
    PIT_nf_a023_desc:0 "The strange cultists to our south may be able to supply some workers for our factories in exchange for weapons."
    PIT_nf_a024:0 "Reopen The Hole"
    PIT_nf_a024_desc:0 "What's to tell? Most die. One or two have made it out, but that's about it. \n \n -Faydra"
    PIT_nf_a025:0 "Expand The Hole"
    PIT_nf_a025_desc:0 "Making The Hole bigger will allow for larger scale fights. I wonder if we could get some Trogs down there."
    PIT_nf_a026:0 "Same Old Hole"
    PIT_nf_a026_desc:0 "Why mess with success? The Hole does what it needs to."
    PIT_nf_a027:0 "Scale Things Back"
    PIT_nf_a027_desc:0 "The Hole is still an important part of Pitt society, but maybe we don't need to have so many fights."
    PIT_nf_a028:0 "Learn From The Fights"
    PIT_nf_a028_desc:0 "These runts we recruit could learn a thing or two watching the fights."
    PIT_nf_a029:0 "The Next Champion"
    PIT_nf_a029_desc:0 "The trials of The Hole are nothing to scoff at. Those who emerge victorious are worthy to join Ashur's Army."
    PIT_nf_a030:0 "Live Fire Testing"
    PIT_nf_a030_desc:0 "We can kill two rats with one stone by testing our new weapon designs in The Hole."
    PIT_nf_a031:0 "More Theatrics"
    PIT_nf_a031_desc:0 "What good are these fights if they are not fun to watch? Radioactive barrels falling from the ceiling, surprise twists, and gunfire from the crowd are all part of the show."
    PIT_nf_b001:0 "Eye On The Prize"
    PIT_nf_b001_desc:0 "With Ashur out of the picture, it's time for a new boss to step up."
    PIT_nf_b002:0 "Uptown's Funk"
    PIT_nf_b002_desc:0 "Even the upper levels of our city weren't spared in the fighting."
    PIT_nf_b003:0 "Old Grudges"
    PIT_nf_b003_desc:0 "A few of the workers who helped take down Ashur are now making demands of all things."
    PIT_nf_b004:0 "The Silent Factory"
    PIT_nf_b004_desc:0 "Work stopped during the fighting but that break's over."
    PIT_nf_b005:0 "Trog Cleanup"
    PIT_nf_b005_desc:0 "In the chaos a few fences were busted and trogs got through. We need to plug those holes."
    PIT_nf_b006:0 "Way Down Town"
    PIT_nf_b006_desc:0 "The shithole the workers live in saw some of the worst damage. But should we even care?"
    PIT_nf_b007:0 "Looking Forward"
    PIT_nf_b007_desc:0 "People followed Ashur either because they had a bomb collar on their neck, or because he had a plan. I have those things too."
    PIT_nf_b008:0 "Freedom At Last"
    PIT_nf_b008_desc:0 "The workers who fought with us will get something Ashur had always promised them, freedom."
    PIT_nf_b009:0 "Freedom In Time"
    PIT_nf_b009_desc:0 "The time will come when all workers will receive their freedom, but that time is not here just yet."
    PIT_nf_b010:0 "Remember Your Place"
    PIT_nf_b010_desc:0 "You really believed we would just let you go? That kind of stupidity is why you're a slave in the first place!"
    PIT_nf_b011:0 "Research The Cure"
    PIT_nf_b011_desc:0 "Ashur's brat is safe and we are continuing the work to cure TDC."
    PIT_nf_b012:0 "Import-Export"
    PIT_nf_b012_desc:0 "We sell guns and bullets, then we buy or raid for what we need. Why would we do anything extra?"
    PIT_nf_b013:0 "Fueling Growth"
    PIT_nf_b013_desc:0 "The arms business is a good business, but it's always the most steady. We will put aside some of our caps to building up other things."
    PIT_nf_b014:0 "Self-Sufficient City"
    PIT_nf_b014_desc:0 "If The Pitt is to see long-term success, it needs to not depend on anyone else for anything."
    PIT_nf_b015:0 "Worker's Militia"
    PIT_nf_b015_desc:0 "Since you workers want to be equals, you will have to fight too."
    PIT_nf_b016:0 "Bread And Circuses"
    PIT_nf_b016_desc:0 "I can't give you a solid answer when we will give you your freedom... but how about a snack cake party?"
    PIT_nf_b017:0 "Apply Pressure"
    PIT_nf_b017_desc:0 "Any worker caught slacking off or still whining about freedom will be fed to the trogs."
    PIT_nf_b018:0 "Making Progress"
    PIT_nf_b018_desc:0 "No really. We are getting much closer. Why would I lie about that?"
    PIT_nf_b019:0 "Lord of War"
    PIT_nf_b019_desc:0 "To keep the caps flowing, we need to not just have the most guns around but some of the best."
    PIT_nf_b020:0 "Industrial Development"
    PIT_nf_b020_desc:0 "Not all of these machines were for bullets. Maybe we can fix them up too."
    PIT_nf_b021:0 "Urban Development"
    PIT_nf_b021_desc:0 "Nobody wants to live in a dump. We can start with some guard rails around the bar."
    PIT_nf_b022:0 "Steelyard Guards"
    PIT_nf_b022_desc:0 "The workers want armed escorts when they go out into the Steelyard. I guess it's better than losing out on the steel."
    PIT_nf_b023:0 "Fetch For Food"
    PIT_nf_b023_desc:0 "The workers can bitch for protection all damn day, but if they want to eat, they need to pull their weight!"
    PIT_nf_b024:0 "Quit Your Whining"
    PIT_nf_b024_desc:0 "We need that cure now, caring for Ashur's brat is an afterthought."
    PIT_nf_b025:0 "Pamper The Brat"
    PIT_nf_b025_desc:0 "If it'll make you all shut up, we can give the kid a toy or two and take a little longer."
    PIT_nf_b026:0 "Lord's Hoard"
    PIT_nf_b026_desc:0 "You're not understanding it. If the guys at the top get all the profits it'll be good for everyone. They're smarter so they know how best to trickle it down to everyone else."
    PIT_nf_b027:0 "Share The Wealth"
    PIT_nf_b027_desc:0 "From the strongest lieutenant to the weakest worker, everyone will get a piece of the profits from our sales."
    PIT_nf_b028:0 "Importing Labor"
    PIT_nf_b028_desc:0 "No matter what we do, The Pitt is still a dangerous place and we need more workers by the day."
    PIT_nf_b029:0 "The Jab"
    PIT_nf_b029_desc:0 "After months of hard work, we finally have something that should at least keep TDC from getting to the worst stages. You'll be able to have kids again too, so get to making future workers!"
    PIT_nf_b030:0 "Get The Word Out"
    PIT_nf_b030_desc:0 "The Pitt is better than ever. People need to know that we are going nowhere but up!"
    PIT_nf_b031:0 "Trogs At The Gates"
    PIT_nf_b031_desc:0 "It is time we do something about all those trogs in the ruins."
    PIT_nf_b032:0 "Sweep The Sewers"
    PIT_nf_b032_desc:0 "The damn things keep crawling out of the sewers at night. Get down there and deal with them."
    PIT_nf_b033:0 "Resettle Independence Town"
    PIT_nf_b033_desc:0 "Now this place would make for a good settlement."
    PIT_nf_b034:0 "Salvage Independence Town"
    PIT_nf_b034_desc:0 "Why would we set up another big town? Just haul back whatever salvage you can."
    PIT_nf_b035:0 "Pitt Workbots"
    PIT_nf_b035_desc:0 "There entire warehouses full of old robots that can work the lines and the mill. We only need to get them working."
    PIT_nf_b036:0 "Pitt Warbots"
    PIT_nf_b036_desc:0 "Why would we waste these robots on factory work when we have a huge supply of workers? Put them on guard patrols instead."
    PIT_nf_b037:0 "Fortify Outposts"
    PIT_nf_b037_desc:0 "It is a long walk between The Pitt and Independence Town. We need some strong walls in case backup is delayed."
    PIT_nf_b038:0 "Spare Machinery"
    PIT_nf_b038_desc:0 "While scavving around the ruins, a few old machines were found that are worth salvaging."
    PIT_nf_b039:0 "Specialized Production"
    PIT_nf_b039_desc:0 "The bots can work a lot better than most workers, and they don't even die after touching a bunch of lead."
    PIT_nf_b040:0 "Old Blueprints"
    PIT_nf_b040_desc:0 "There are folders full of plans to make these bots deadlier. Talk about a score!"
    PIT_nf_b041:0 "Edge of Greatness"
    PIT_nf_b041_desc:0 "Things are going better than they ever were under Ashur, at least that's how it appears from the top of Haven."
    PIT_nf_b042:0 "Freedom Hard Won"
    PIT_nf_b042_desc:0 "Years of abuse, false promises, and death are finally at an end. The Pitt will no longer be ruled by a raider warlord, but by the freed people!"
    PIT_nf_b043:0 "The Survivors"
    PIT_nf_b043_desc:0 "These rats really thought that surrendering would spare them after the shit they pulled?"
    PIT_nf_b044:0 "A New Warlord"
    PIT_nf_b044_desc:0 "Wernher was a little bitch, now it's time for a real man to take charge."
    PIT_nf_b045:0 "Rights Of The Worker"
    PIT_nf_b045_desc:0 "Workers of The Pitt will no longer be beaten. They will be entitled to meals for their labor, and they will finally be given some real clothes."
    PIT_nf_b046:0 "Protect Our Home"
    PIT_nf_b046_desc:0 "It is only a matter of time before someone comes for us. We have to be ready."
    PIT_nf_b047:0 "Only The Loyal Eat"
    PIT_nf_b047_desc:0 "Clearly, the problem was we played too nice. Now if you want to eat, you'd better act right."
    PIT_nf_b048:0 "Power For The Powerful"
    PIT_nf_b048_desc:0 "The fighting blasted open a warehouse full of old power armor suits! Now we need to figure out how to use the damn things."
    PIT_nf_b049:0 "Reap The Spoils"
    PIT_nf_b049_desc:0 "The fighting left a lot of fellas dead and their stuff just lying there. Finders keepers"
    PIT_nf_b050:0 "Calling All Raiders"
    PIT_nf_b050_desc:0 "It is time we get serious about taking power. Send messages to the other gangs."
    PIT_nf_b051:0 "Moving On Up"
    PIT_nf_b051_desc:0 "With the raiders gone, we can finally move into those big penthouses in the sky. Finally, we have a piece of the pie."
    PIT_nf_b052:0 "The Worker's Militia"
    PIT_nf_b052_desc:0 "Everyone who is able to fight, must be ready to fight. That is the price we pay for our freedom."
    PIT_nf_b053:0 "A Warlord's Bastion"
    PIT_nf_b053_desc:0 "Haven is nice and all, but there is a building even taller that is now cleared of trogs. It'll make for a nice stronghold."
    PIT_nf_b054:0 "The Steel Guard"
    PIT_nf_b054_desc:0 "It took a few guys breaking limbs, but we finally got the hang of these suits."
    PIT_nf_b055:0 "Enforce The Hierarchy"
    PIT_nf_b055_desc:0 "Raiders are raiders. Slaves are slaves. That's how it's always been, and how it always will be."
    PIT_nf_b056:0 "Supply And Demand"
    PIT_nf_b056_desc:0 "Sure, we'll give you guns for your raids. But we expect a cut."
    PIT_nf_b057:0 "Never Chained Again"
    PIT_nf_b057_desc:0 "Never again will we allow someone to collar us, beat on us, and tell us we are their property. We took down Ashur, Wernher, and Krenshaw. Anyone else that tries to shackle us will meet the same end!"
    PIT_nf_b058:0 "Wernher The Warlord"
    PIT_nf_b058_desc:0 "Now that everything has settled down, we can look to the future. For now, that future conquering is a bunch of stupid wastelanders still fighting with pointed sticks."
    PIT_nf_b059:0 "The Nonstop Party"
    PIT_nf_b059_desc:0 "The wasteland belongs to the toughest bastards around, and that's us. Raid, party, repeat."
    PIT_nf_c001:0 "Into The Capital Wasteland"
    PIT_nf_c001_desc:0 "The Capital Wasteland has always been a shithole, but it's a shithole with some valuable things hidden in it's dark corners."
    PIT_nf_c002:0 "Enter The Citadel"
    PIT_nf_c002_desc:0 "Once home to The Brotherood of Steel, The Citadel is now more like a giant warehouse of tech and weapons."
    PIT_nf_c003:0 "The Wastelanders"
    PIT_nf_c003_desc:0 "How are the wastelanders adjusting to things?"
    PIT_nf_c004:0 "The Rusted Hulk"
    PIT_nf_c004_desc:0 "For being the biggest city in The Capital Wasteland, this place sure is a hunk of junk."
    PIT_nf_c005:0 "The Future of The Wasteland"
    PIT_nf_c005_desc:0 "With The Capital Wasteland under our control, there's no stopping us."
    PIT_nf_d001:0 "A Pitt-iful Rebellion"
    PIT_nf_d001_desc:0 "Wernher really thought a few empty promises and handshakes would be enough to take down the lord of this city? It's almost Pittiful."
    PIT_nf_d002:0 "Rounding Up Remnants"
    PIT_nf_d002_desc:0 "Wernher and Midea may have failed, but Ashur isn't heartless. He will extend a hand to the workers that rebelled against them to come back to work without any punishment. If they refuse, the soldiers will put them down."
    PIT_nf_d003:0 "Suppress The Rebellious"
    PIT_nf_d003_desc:0 "Suppression of dissent typically is found in cameras, constant monitoring and insular control. My city will have no such things. The first step is to institute a Pre-war concept known as a \"Neighborhood Watch\"."
    PIT_nf_d004:0 "From On High"
    PIT_nf_d004_desc:0 "Workers and soldiers alike need nicer places to live. As nice as it would be to restore Haven fully, it wouldn't do to have potential enemies living mere feets from my own room. Let's see about restoring some of the Pitt's larger structures."
    PIT_nf_d005:0 "Networking"
    PIT_nf_d005_desc:0 "Self-sufficiency is key, and we will continue to prioritize ourselves, but we have neighbors who will want to invade or exploit us sooner or later, and I won't always be around to guide Marie. What we need are partners, not in slavery, but in mind."
    PIT_nf_d006:0 "Level Down"
    PIT_nf_d006_desc:0 "Speeches and ideas are one thing, but so soon after the rebellion, workers need to see their Lord in action. There's a factory in a place called the Trenches, the top is rubble, but the lower levels are rumored to be untouched. I'll go down there to raise morale."
    PIT_nf_d007:0 "Gift Of The City"
    PIT_nf_d007_desc:0 "With Wernher and the rebellious slaves taken care of, the Pitt returns to business as usual, though with the added benefit of Sandra and Ashur working around the clock behind closed doors to ensure Marie's happiness and health."
    PIT_nf_d008:0 "Gift To The City"
    PIT_nf_d008_desc:0 "It feels so soon, but Marie is almost of an age where her healthy genes can be applied to a TDC vaccine that will change this city forever. Because of our efforts, we can affort to take on more research at once."
    PIT_nf_d009:0 "Continuing Cure Research"
    PIT_nf_d009_desc:0 "There is no doubth that Marie's blood won't work, but it also doesn't mean that everyone will be willing to accept being jabbed in the arm so willingly, or even can be. We need to find a way to provide alternative vaccines."
    PIT_nf_d010:0 "Nuka-Cola Vaccinated"
    PIT_nf_d010_desc:0 "Ridiculous name, but potentially effective vaccination method. Don't think there's a large-scale Nuka-Cola factory nearby, but putting the vaccine in re-labeled bottles should do the trick."
    PIT_nf_d011:0 "Keeping My Promise"
    PIT_nf_d011_desc:0 "Marie is growing so fast, and I am growing old quickly as well. It's time that I finish the project with Sandra and reveal it to the Pitt."
    PIT_nf_d012:0 "Trouncing Uptowns Trogs"
    PIT_nf_d012_desc:0 "The rebellion had the unfortunate side effect of revealing a key weakness in Uptown's anti-trog floodlights that has resulted in the destuction of several businesses. These issues must be addressed before we can take further action."
    PIT_nf_d013:0 "Portable Power"
    PIT_nf_d013_desc:0 "It can't be so simple, but according to Everett, long ago, Trogs were fended of with grenades that gave off blinding light, as well as guns and helmets that had equally blinding lights attached. Perhaps this is what we need to finally take down the Trogs?"
    PIT_nf_d014:0 "Take Down The Trogs"
    PIT_nf_d014_desc:0 "Now that they aren't multiplying faster than we can kill them, we can do something about the trogs"
    PIT_nf_d015:0 "Chemical Warfare"
    PIT_nf_d015_desc:0 "Trogtown has revealed a stash of ancient goods. goods that can melt a man's face off and liquify metal. This may bode well for us."
    PIT_nf_d016:0 "PPG Place"
    PIT_nf_d016_desc:0 "The meaning behind the three letters is no longer known to many, but four walls and a roof is nothing to turn down, especially when there are five more like it to live in."
    PIT_nf_d017:0 "Turn Up The Heat"
    PIT_nf_d017_desc:0 "Ashur sees the potential of restoring the Pitt's former industrial glory. Wernher may not have succeeded, but he has reinspired Ashur. The furnaces must burn hotter than ever before"
    PIT_nf_d018:0 "Steel Reforged"
    PIT_nf_d018_desc:0 "It will be some time before Power Armor and truly Pre-War tier weapons can be made again. For now, focus on selling and exporting our excess resources to our neighbors."
    PIT_nf_d019:0 "Press The Presser"
    PIT_nf_d019_desc:0 "The reason such a small and limited press is used to supply the soldiers of the Pitt was to prevent exactly what Wernher took advantage of. A second one must be made to make sure this never happens again."
    PIT_nf_d020:0 "Crash Course"
    PIT_nf_d020_desc:0 "Against all better judgement, in order to protect from foes from the outside, it maye be prudent to begin production of aircraft again. In a few years time, we can even produce Vertibirds once more. Boats are out of the question though, river's too toxic."
    PIT_nf_d021:0 "Operation Clean & Clear"
    PIT_nf_d021_desc:0 "A ghould trader passing through looked at our water, and remarked that he knew of a way to clean it up, if only a bit. Maybe if we invest enough into it, we can get boats working after all."
    PIT_nf_d022:0 "Strike Up Soldiers"
    PIT_nf_d022_desc:0 "Ashur's rule is unquestioned once more, but while he will never make the mistake of having a second in command like Wernher again, it may be wise to train the Soldiers."
    PIT_nf_d023:0 "Raiders Of The Pitt"
    PIT_nf_d023_desc:0 "Everything that is done for the Soldiers is to make them into better people. Yet many claim they are nothing more than raiders with a different name. To make a lasting impact, something has to change."
    PIT_nf_d024:0 "Rewarding The Loyal"
    PIT_nf_d024_desc:0 "All soldiers are equal, none of that some are more equal than others nonesense. If we incentivize workers to become soldiers by means other than The hole, we can work toward a better tomorrow."
    PIT_nf_d025:0 "Filling The Hole"
    PIT_nf_d025_desc:0 "Forcing the workers to fight for the amusement of our soldiers is not a way to recruit for our army in the future. It's time to finally close down the Hole."
    PIT_nf_d026:0 "Normie-laty"
    PIT_nf_d026_desc:0 "Some strange faces have turned up looking for work, it is time we adopt an official policy."
    PIT_nf_d027:0 "Worker Work Week"
    PIT_nf_d027_desc:0 "An old wasteland adage is \"if you give an inch, they'll take a mile.\" But with all the newfound peace and aspirations of prosperity in the Pitt, a full day of rest can now be allowed for workers."
    PIT_nf_d028:0 "Metal Mettle"
    PIT_nf_d028_desc:0 "It has been decided, machines shall serve as tools. Workers ashall use them, while soldiers wil ensure the machines cannot turn on us. Just in case, Sandra has compiled a remote terminal program to offset any thoughts of robot rebellion."
    PIT_nf_d029:0 "Forging A Foundry"
    PIT_nf_d029_desc:0 "Turns out the Mill isn't the only metal works the Pitt has. A while new steelworks was revealed to us as we cleared out the rubble of a fallen skyscraper. We get this restored, we have more jobs for the workers than ever."
    PIT_nf_d030:0 "Clearing Rubble"
    PIT_nf_d030_desc:0 "It's no secret that a lot of roads and tunnels aren't exactly the easiest or safest to navigate. But now with machiens instead of humans, we can make efforts to increase navigability of the Pitt."
    PIT_nf_d031:0 "Economic Revival"
    PIT_nf_d031_desc:0 "So far, the Pitt's economy has been built on laborers, ammunition, and armors, all in exchange for caps. But caps are made of metal, steel even. If a rogue worker were to flood the market with new caps, we'd be done for. How about we find a new kind of metal?"
    PIT_nf_d032:0 "Naval Investments"
    PIT_nf_d032_desc:0 "With the river slightly less toxic, we can affort to make sure of the wharfs and docks. Just don't forget a hazmat suit when sailing on this part of the river."
    PIT_nf_d033:0 "Filtering Air"
    PIT_nf_d033_desc:0 "It seem pointless now, but it'll go a long way to stop us from developing any diseases or sicknesses from the endless sea of black smoke in the air. Who knows, maybe one day we'll finalyl see a blue sky again."
    PIT_nf_d034:0 "The Iron Spine"
    PIT_nf_d034_desc:0 "Haven is the tallest building in the reclaimed slice of the Pitt, but it's not the tallest building in all of the Pitt. Now that we've organized the means, we can take efforts to rebuild the Steel Tower under its new Pitt-born name the Iron Spine."
    PIT_nf_d035:0 "Bridge Over River Pitt"
    PIT_nf_d035_desc:0 "The bridge has long signified control over the Pitt, miens laid to prevent any worker from escaping. But as a new Pitt take shape, so too must the bridge. Plus it'll help trade to not be killed accidentally as often."
    PIT_nf_d036:0 "RobCo Depot"
    PIT_nf_d036_desc:0 "In further excavation efforts, it seems a cache of robots, both modified and untouched, has been found. If nothing else, they can be scrapped for parts and rare materials."
    PIT_nf_d037:0 "The Sanctum"
    PIT_nf_d037_desc:0 "Once a large standing cathedral of some kind, later taken over by the Fanatics, the Sanctum stands as a testament to the Old World's follies. Workers are already taking to it to pray, whether to their God, or even to their Lord."
    PIT_nf_d038:0 "Haven Sent"
    PIT_nf_d038_desc:0 "Much of the Pitt's larger structures are either being reclaimed, reconstructed, or are being inhabited as we speak. While new neighbors are still not wise, finishing off the Pitt's new skyline with a more pristine Haven isn't a bad idea."
    PIT_nf_d039:0 "The Effigy's Light"
    PIT_nf_d039_desc:0 "Brutal as it may be, that twisted wire and metal man strikes countless emotions into those who see it, whether it's for the first time, or the five hundredth. If we build it bigger, it may come to inspire more people to believe in this city."
    PIT_nf_d040:0 "Greasy Prospector Complex"
    PIT_nf_d040_desc:0 "Ever wonder where all the cans of Pork & Beans come from? So do we, but these ruined buildings seem to contain a lot of them, even machines to make more if we ever wanted to."
    PIT_nf_d041:0 "Guaranteeing Our Independence"
    PIT_nf_d041_desc:0 "To those who wish the Pitt harm, to those who wish the Pitt ill, to those who would take away our sovereignty, let it be known that we will fight, and we will win."
    PIT_nf_d042:0 "A City Stronger Than Steel"
    PIT_nf_d042_desc:0 "This city a lot like the steel it made. Once shiny and pristine, then left to rot, becoming disgusting and worn. We may not have that same clean shine, but we're tougher than ever, and with Ashur's legacy growing up fast, it's a bond tougher than steel."

### Production Companies ###
    PIT_armaments_design:0 "Pitt Armaments"
    PIT_armaments_design_desc:0 "Weapons and ammo are produced in The Pitt on a scale rarely seen on this side of the country since The Great War"

