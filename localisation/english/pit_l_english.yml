l_english:

### Balance of Power ###
    PIT_wernhers_grip_bop:0 "Wernher's Grip on The Pitt"
    PIT_wernher_grip_loose:0 "Losing His Grip"
    PIT_wernher_grip_tight:0 "Ruling With An Iron Fist"
    PIT_wernher_grip_lost:0 "Almost Fallen Apart"
    PIT_wernher_grip_lost_desc:0 "Quotas aren't being met, supplies are being constantly diverted, and some of Wernher's lieutenants are talking about dividing up territory after he takes a long fall."
    PIT_wernher_grip_fumbling:0 "Struggling To Maintain Control"
    PIT_wernher_grip_fumbling_desc:0 "Too many raiders are questioning orders and hoarding supplies rather than distributing them. Who can blame them? The boss barely has a handle on what's going on down here below his tower."
    PIT_wernher_grip_loosening:0 "Growing Disobedience"
    PIT_wernher_grip_loosening_desc:0 "Some guys are outright refusing certain jobs. They don't think anything will happen to them, and usually they're right."
    PIT_wernher_grip_weak:0 "Weak Grip
    PIT_wernher_grip_weak_desc:0 "Fellas whisper that the boss is getting weak. He barely orders beatings and plenty of guys have gotten away with ripping him off. You can't let that stuff happen in a gang of raiders."
    PIT_wernher_grip_firm:0 "Firm Grip"
    PIT_wernher_grip_firm_desc:0 "There may be griping now and then, but that comes with the territory. At the end of the day, fellas know who is in charge."
    PIT_wernher_grip_strong:0 "Strong Grip"
    PIT_wernher_grip_strong_desc:0 "The boss runs a tight crew. Fellas got plenty of work to do and they get it done when they're supposed to. Those that fuck up, don't fuck up again."
    PIT_wernher_grip_iron:0 "Iron Fisted Rule"
    PIT_wernher_grip_iron_desc:0 "Nobody questions the boss. He's got things the way he likes it, so if you don't like things, you're a problem. You don't want to be a problem."
    PIT_wernher_uprising_bop:0 "Wernher Uprising?"
    PIT_wernher_uprising_here:0 "Uprising's Practically Here!"
    PIT_wernher_uprising_what:0 "What Uprising?"
    PIT_wernher_uprising_imminent:0 "An Uprising Is Imminent"
    PIT_wernher_uprising_imminent_desc:0 "It's almost common knowledge now that Wernher is planning to make a move on Ashur. The only reason the boss hasn't found out about it is because almost everyone in The Pitt is on board."
    PIT_wernher_uprising_concerning:0 "A Serious Loyalty Problem"
    PIT_wernher_uprising_concerning_desc:0 "Plenty of people now are doubting their loyalty to Ashur. That's fine, so long as they fear him. But if enough of them aren't loyal, what do they have to fear?"
    PIT_wernher_uprising_talk:0 "Concerning Talk"
    PIT_wernher_uprising_talk_desc:0 "More and more people are whipsering about how someone else should be in charge. They'd never let anybody loyal to Ashur hear it, but that doesn't mean it isn't happening."
    PIT_wernher_grumblings:0 "Pointless Grumblings"
    PIT_wernher_grumblings_desc:0 "People are bitching about how things could be better. Nobody's outright said they think someone else could run things better, but you know some fellas are thinking it."
    PIT_wernher_uprising_unlikely:0 "Uprising Is Unlikely"
    PIT_wernher_uprising_unlikely_desc:0 "There are rumors some people are talking about taking out the boss and putting someone else in charge. But that's just bullshit, right?"
    PIT_wernher_uprising_doa:0 "Uprising is DOA"
    PIT_wernher_uprising_doa_desc:0 "Anybody dumb enough to try and make a move on Ashur would find their shitshow DOA. That means Dead On Yer Asses."
    PIT_wernher_uprising_doomed:0 "Uprising is Doomed"
    PIT_wernher_uprising_doomed_desc:0 "Even 5 doses of Psycho couldn't get anybody crazy enough to fuck with the boss."

### Characters ###
    PIT_lord_ishmael_ashur_name:0 "Lord Ishmael Ashur"
    PIT_lord_ishmael_ashur_desc:0 "Formerly a BoS Initiate, Lord Ishmael Ashur was left for dead after a building collapsed on him during the Brotherhood's cleansing of The Pitt. Coming out of a comotose state after a few days, he found himself alone in unfriendly territory. A weaker man would have buckled under the pressure, but Ashur rose to the occasion, uniting several gangs and molding The Pitt in his image. He now has grand designs to do the same for the rest of the wasteland. At least, so long as his cycloptic colleague doesn't have something in the works."
    PIT_krenshaw_NAME:0 "Krenshaw"
    PIT_krenshaw_desc:0 "One of the top raiders around after Wernher's coup, Krenshaw had enough of the infighting and bullshit. If someone has to run The Pitt, it will be him."
    PIT_wernher_NAME:0 "Wernher"
    PIT_wernher_desc:0 "Once Ashur's top man, Wernher had plans of his own for The Pitt. Now that Ashur is deposed, Wernher just has to figure out what those plans are."
    PIT_adan_NAME:0 "Adan"
    PIT_bone_NAME:0 "Bone"
    PIT_brand_NAME:0 "Brand"
    PIT_duke_NAME:0 "Duke"
    PIT_everett_NAME:0 "Everett"
    PIT_faydra_NAME:0 "Faydra"
    PIT_friday_NAME:0 "Friday"
    PIT_hammer_NAME:0 "Hammer"
    PIT_harris_NAME:0 "Harris"
    PIT_jackson_NAME:0 "Jackson"
    PIT_lulu_NAME:0 "Lulu"
    PIT_marco_NAME:0 "Marco"
    PIT_mex_NAME:0 "Mex"
    PIT_milly_NAME:0 "Milly"
    PIT_midea_NAME:0 "Midea"
    PIT_midea_desc:0 "The unofficial leader of The Pitt's slaves, Midea saw in the instability following Wernher's coup a chance for the freedom her people desired. Now they continue their fight to ensure they will never again be shackled."
    PIT_mona_NAME:0 "Mona"
    PIT_nola_NAME:0 "Nola"
    PIT_odog_NAME:0 "O Dog"
    PIT_phantom_NAME:0 "Phantom"
    PIT_reddup_NAME:0 "Reddup"
    PIT_sandra_NAME:0 "Dr. Sandra Kundanika"
    PIT_vika_NAME:0 "Vika"
    PIT_wild_bill_NAME:0 "Wild Bill"
    PIT_champ_NAME:0 "The Champ"

### Cosmetic Tags ###
    PIT_pittsburgh:0 "Pittsburgh"
    PIT_pittsburgh_DEF:0 "Pittsburgh City"
    PIT_pittsburgh_ADJ:0 "Pittsburghers"

### Decisions ###
    PIT_reward_suckups_decision:0 "Reward Suckups"
    PIT_reward_suckups_decision_desc:0 "Anyone that shows loyalty to the boss, even a little too much to be taken seriously, will receive extra food and caps. That should inspire real loyalty eventually."
    PIT_increase_slave_rations_decision:0 "Increase Worker Rations"
    PIT_increase_slave_rations_decision_desc:0 "The workers will be given a little bit of cram to mix with their trog meat slop."
    PIT_force_hole_volunteers_decision:0 "Force Hole Volunteers"
    PIT_force_hole_volunteers_decision_desc:0 "The workers aren't exactly lining up to fight in The Hole. We will need to apply a little pressure."
    PIT_crackdown_on_disloyal_decision:0 "Crackdown on The Disloyal"
    PIT_crackdown_on_disloyal_decision_desc:0 "Noting encourages loyalty like kicking the shit out of anyone that complains... right?"
    PIT_support_breakers_troops_decision:0 "Support The Breakers"
    PIT_support_breakers_troops_decision_desc:0 "The Breakers bring us slaves and scrap from all across the great lakes. It would be worth sending them a few guys to keep that supply line unbroken."
    PIT_support_harrisburg_troops_decision:0 "Support The Harrisburg Bandits"
    PIT_support_harrisburg_troops_decision_desc:0 "The Harrisburg Bandits do a good job keeping us supplied with workers and sometimes fresh food. Sending them help is better than taking over Johnstown ourselves."
    PIT_support_raiders_troops_decision:0 "Support Paradise Falls"
    PIT_support_raiders_troops_decision_desc:0 "The raiders out of The Capital Wasteland are the main supplier of Paradise Falls' slavers. We should help them stay alive."
    PIT_wernher_revolt_category:0 "Wernhers Revolt"
    PIT_tighten_ashurs_grip_decision:0 "Tighten Ashur's Grip"
    PIT_tighten_ashurs_grip_decision_desc:0 "Some members of Ashur's Army have been caught using careless words or breaking the lord's rules. Punishing them accordingly will help keep people from getting any funny ideas."
    PIT_reward_raiders_decision:0 "Reward The Soldiers"
    PIT_reward_raiders_decision_desc:0 "The soldiers of Ashur's Army don't just fight for their belief in our lord's goals. They do it for the payday. A little bonus will keep them happy."
    PIT_special_hole_decision:0 "Arrange A Special Hole Tournament"
    PIT_special_hole_decision_desc:0 "About a hundred workers will be selected to volunteer for a special event in The Hole. The workers may not like it, but the soldiers do, and either way it reminds people who is in charge."

### Events ###
    PIT_nf_events.1.title:0 "The Steel City"
    PIT_nf_events.1.desc:0 "The City of Pittsburgh was once one of the most important industrial centers in pre-war America. Everything from steel and munitions to vertibirds and power armor was produced in the city. It's no surprise that the city was a serious target for Chinese nukes. Nearly every missle hit their target, save for one. That missle was destined for..."
    PIT_nf_events.1.a:0 "Pittsburgh rail depot"
    PIT_nf_events.1.b:0 "Pittsburgh International Airport"
    PIT_nf_events.1.c:0 "The National Guard Depot"
    PIT_nf_events.2.title:0 "Following The Scourge"
    PIT_nf_events.2.desc:0 "In 2255, The Brotherhood of Steel launched an assault on The Pitt. The Scourge, as it would come to be known, saw The Brotherhood wipe out the various maniacal gangs, torture squads, and raider warbands that prowled the city. Ashur was among the soldiers that swept through, killing anyone that put up a fight, when he was caught in an explosion and buried under rubble. Left for dead, the young initiate was found by survivors trying to salvage his armor. The tribals saw him rise from the rubble and came to revere him. He used his knowledge and thier devotion to fill the power vacuum in The Pitt and unite the various survivors. But who were these tribals that found him?"
    PIT_nf_events.2.a:0 "They were simple scavengers"
    PIT_nf_events.2.b:0 "They were surviving warriors"
    PIT_nf_events.2.c:0 "They were simple medicine-men"
    PIT_nf_events.2.d:0 "Tools of lord Ashur, the details are unimportant."
    PIT_nf_events.3.title:0 "The Pitt's Curse"
    PIT_nf_events.3.desc:0 "Uniting the scattered survivors was the easy part. Anyone who could really put up a fight was killed by The Brotherhood, and those that survived gladly accepted any order rather than return to what was before. The Pitt had one major problem that left it a lawless mess for almost two centuries. The Troglodyte Degeneration Contagion, otherwise known as TDC. Caused by a unique mix of background radiation and industrial pollutants unique to the Pitt's region, the illness eventually infects anyone that spends enough time in the area. As if the painful sores weren't bad enough, nearly 20% of anyone infected with TDC suffers a cognative decline. The decline drives them to insanity and eventually full degredation into a mutant called a Trog. One in five people entering The Pitt suffering this fate is already a serious detriment to building any lasting society. However, one hundred percent of children born in these regions turns feral within weeks of birth. Ashur needed manpower to realize his goals for The Pitt, and with a 0% successful birth rate, he had to look outside The Pitt."
    PIT_nf_events.3.a:0 "That's one solution"
    PIT_nf_events.4.title:0 "The Woman From Somewhere"
    PIT_nf_events.4.desc:0 "As Ashur built up The Pitt tales of the city's might spread. At first this attracted many wastelanders looking for opportunities. Those that were not fit for Ashur's army were quickly enslaved and soon people waltzing into The Pitt became less common. There was one woman who stood out, Dr. Sandra Kundanika. The scientist ventured into The Pitt with the intent of studying the trog condition. Ashur was quick to recognize her as the exceptional scientist she was and offered her space in his tower to study the condition. The end-goal was to find a way to cure the contagion, or at least reduce the degredation rate in infants."
    PIT_nf_events.4.a:0 "A noble goal"
    PIT_nf_events.5.title:0 "Three's a Crowd"
    PIT_nf_events.5.desc:0 "Over the years, Dr. Kundanika studied the contagion and made some breakthroughs in understanding the condition. However, progress was slow going. As time went on, Ashur's check-ups on the doctor's research became more frequent and less about the research. The two fell in love and were soon married. Ashur had found in his wife someone that not only understood and supported his goals, but had the knowledge and guts to help him carry it out. \n \n Ashur began confiding more and more in his wife, seeking her opinion on various plans and decisions. With this increased reliance on his partner, came reduced input from his right hand man, Werhner. Though the trusted lieutenant has never undermined Ashur in public, he's become more vocal as of late in his concerns over the direction of The Pitt."
    PIT_nf_events.5.a:0 "Sounds like trouble"
    PIT_nf_events.6.title:0 "Bloodied And Broken"
    PIT_nf_events.6.desc:0 "Hundreds of men and women have arrived at our gates recently requesting refuge. They are surviving members of The Breakers who have fled from their territory in the face of a foe they could not beat. The seasoned raiders desire a place in Ashur's Army and invoke their role in supplying The Pitt with slaves up until their recent defeat. We could always use more soldiers for the army, but do we have a place for weaklings who couldn't hold their own land?"
    PIT_nf_events.6.a:0 "They may join Ashur's Army"
    PIT_nf_events.6.b:0 "Put them in chains"
    PIT_nf_events.7.title:0 "A Gift"
    PIT_nf_events.7.desc:0 "When Ashur's wife gave birth, everyone was ready to see little Marie suffer the same fate as other children born in The Pitt. As the weeks went on, it was clear this child was something special. Dr. Kundanika performed tests and found that not only was Marie immune to TDC, but the child was immune to just about all other radiation-induced diseases. The child's DNA contains immunity to everything from radiation sickness to ghoulification and even the common mutation of a sixth toe! In time it should be possible to create a way of passing on this immunity to some degree. However, the baby is delicate and as such samples of her blood will need to be taken sparingly, even if she wasn't the only child of Lord Ashur."
    PIT_nf_events.7.a:0 "What's Wernher think about this?"
    PIT_nf_events.8.title:0 "Consorting With Crazy"
    PIT_nf_events.8.desc:0 "Relatively recent arrivals to the region, the cultists of The Church of Rocky have raised a few eyebrows in The Pitt. The religious nuts have quickly conquered the various tribes that lived just south of The Pitt and occasionally send soldiers into trogg country for some unknown purpose. They tend to avoid our territory and we don't venture into theirs, but it does appear they enslaved many of those tribals they conquered. Perhaps it would be worth arming these nuts to receive some of their slaves."
    PIT_nf_events.8.a:0 "Offer §R100 rifles§! for §O100 slaves"
    PIT_nf_events.8.b:0 "Offer §R250 rifles§! for §O250 slaves"
    PIT_nf_events.8.c:0 "Offer §R500 rifles§! for §O500 slaves"
    PIT_nf_events.8.d:0 "Offer §R1,000 rifles§! for §O1,000 slaves"
    PIT_nf_events.8.e:0 "We have no guns to spare"
    PIT_nf_events.9.title:0 "The Great Spectacle"
    PIT_nf_events.9.desc:0 "The aptly named hole is a place of danger but also opportunity. The arena has hosted countless fights between the workers of The Pitt, with the strongest surviving and earning a place in Ashur's Army. Despite the final reward being freedom and a place in the upper-eschalon of Pitt society, few workers willingly sign up for these deathmatches. Often, workers need to be forced to partake in the competition for the amusement of Ashur's Army and a few of the more sadistic workers. The contests begin and end at Ashur's will, and he has declared they will begin."
    PIT_nf_events.9.a:0 "Best of luck to the fighters"
    PIT_nf_events.10.title:0 "Wernher Secures The Throne"
    PIT_nf_events.10.desc:0 "Through a lot of blood, sweat, and promises, Wernher has secured his place as the ruler of The Pitt. Ashur's Army has begun taking his commands and the slaves toil away as they always did. The lord's chair is a comfy one, but Wernher must not get too complacent. Without Ashur's steel fist to hold The Pitt together, things are more volatile than they have been in over two decades. If Wernher relaxes his grip too much, The Pitt could slip right through his fingers."
    PIT_nf_events.10.a:0 "That won't happen"
    PIT_nf_events.10.b:0 "What does that mean mechanically?"
    PIT_nf_events.11.title:0 "Crumbling Spires"
    PIT_nf_events.11.desc:0 "Despite the coup being quick, it wasn't without its damage. Uptown suffered heavily in the fighting with many buildings becoming even more unsafe to inhabit than they already were. There were event a few buildings cut off with the destruction of their bridges. The soldiers who inhabit Uptown are requesting that we allocate slaves to the dangerous task of repairing the damage on these rickety towers."
    PIT_nf_events.11.a:0 "Assign workers to the task"
    PIT_nf_events.11.b:0 "The soldiers can fix their home themselves"
    PIT_nf_events.12.title:0 "Not So Simple Request"
    PIT_nf_events.12.desc:0 "The workers of The Pitt were firm supporters of the overthrow of Ashur. We promised them things would change, but they may have misunderstood just how much they would change. Midea, the worker's representative, has come forward with a list of officers in Ashur's Army the workers were hoping to have punished for what they call 'cruel treatment'. We must tread carefully, the raiders may grumble at one or two of them being tossed to the crowd, but more than that could spell disaster."
    PIT_nf_events.12.a:0 "Give in to the worker demands"
    PIT_nf_events.12.b:0 "Give them Vikia, she's a bitch anyway"
    PIT_nf_events.12.c:0 "Just re-assign the soldiers on the list"
    PIT_nf_events.12.d:0 "The workers will have no justice"
    PIT_nf_events.13.title:0 "Quiet Machines"
    PIT_nf_events.13.desc:0 "The Mill has been largely quiet since the fighting died down. Some workers sit around tending to their wounds, and others laze about saying the machinery being too damaged to use. It will take a lot of work to get things back to working order."
    PIT_nf_events.13.a:0 "Force tripple shifts until things working"
    PIT_nf_events.13.b:0 "Put the workers on repairing things, at a normal pace"
    PIT_nf_events.13.c:0 "Have the army pitch in to help fix things"
    PIT_nf_events.14.title:0 "Holes In The Perimeter"
    PIT_nf_events.14.desc:0 "The trogs that overrun most of the city are kept out of The Pitt by a seires of floodlights, junk walls and chainlink fences. Just like the rest of the city, these defensive structures saw damage in the fighting and trogs were quick to swarm into the area. Until these trogs are cleared out, we will be unable to fix these holes and return to these areas of our city."
    PIT_nf_events.14.a:0 "This is a job for our army"
    PIT_nf_events.14.b:0 "Send the workers with some spare weapons"
    PIT_nf_events.14.c:0 "Send the workers with some metal pipes"
    PIT_nf_events.15.title:0 "Busted Foundations"
    PIT_nf_events.15.desc:0 "Downtown the workers of The Pitt live in buildings heavily damaged in the fight to overthrow Ashur. Even before the fighting the living conditions of these buildings were far from nice, but back then the workers didn't have the balls to complain. Now that Ashur is gone, they think they are entitled to some better living conditions or something."
    PIT_nf_events.15.a:0 "That's not our problem"
    PIT_nf_events.15.b:0 "Reduce shifts to allow for rebuilding"
    PIT_nf_events.15.c:0 "Give the workers resources to fix things"
    PIT_nf_events.16.title:0 "The Future"
    PIT_nf_events.16.desc:0 "Ashur kept his Army and the workers under his thumb not just because of his ruthless leadership, but becasue he had a vision. No matter how boring their job as a soldier or as shit their life as a worker, the people of The Pitt knew that what they were doing contributed to some long term goal he had for the city. The soldiers of Ashur's Army knew they were part of the mightiest force in the wasteland, and the workers knew their toiling contributed to a city they one day may enjoy as free men. Of course not all of them believed in these promises, but enough did to keep others from getting funny ideas for over 20 years! If Wernher is to enjoy such a long reign, he too will need to make a promise to his people that they can believe in."
    PIT_nf_events.16.a:0 "§OThe Pitt will unite the wasteland!"
    PIT_nf_events.16.b:0 "§GThe Pitt will enjoy prosperity and wealth!"
    PIT_nf_events.16.c:0 "§CThe Pitt will be safe for everyone!"
    PIT_nf_events.16.d:0 "§RYou are entitled to nothing, follow me or die!"
    PIT_nf_events.17.title:0 "Steelyard Losses"
    PIT_nf_events.17.desc:0 "Ordering soldiers to escort slaves sent into The Steelyard to collect ingots has yielded an increase in successful collections. However, it is not without its downsides. Even our soldiers face hard fights in the trog infested region with many not making it back. The losses have increased annimosity between the workers and guards. There have been multiple cases of reprisals when a worker returns without their escort. One such case has brought operations in The Steelyard to a halt. A few workers made it back without their escort, but carrying their weapons. They insist they grabbed the guns when their escorts were jumped by trogs and tried to save the soldiers but were simply too late. Knowing what happens to slaves that return alone they have taken over Everett's office, refusing to come out for anyone until Wernher guarantees their safety."
    PIT_nf_events.17.a:0 "Do as they request"
    PIT_nf_events.17.b:0 "Storm the office"
    PIT_nf_events.17.c:0 "Do as they request, §Rthen kill them"
    PIT_nf_events.18.title:0 "Concerns Over Competency"
    PIT_nf_events.18.desc:0 "The policy of sending members of The Worker's Militia into The Steelyard with ingot gatherers has yielded a substantial increase in successful collections. However, it is not without its downsides. Not only do the militia members return alive more often than expected, but they are often returning better off than they had left. There are plenty of old buildings out there full of deadly weapons, strong armor, and other equipment better than anything we would otherwise give the militia. If that wasn't bad enough, the militiamen are teaching the ingot gatherers how to fight as well. These things could be a problem should the workers ever become dissatisfied by their lot in life."
    PIT_nf_events.18.a:0 "Confiscate loot at the door"
    PIT_nf_events.18.b:0 "Forbid gatherers from carrying weapons"
    PIT_nf_events.18.c:0 "Let them have their loot, they do good work"
    PIT_nf_events.19.title:0 "Steelyard Salvage"
    PIT_nf_events.19.desc:0 "The Steelyard is a dangerous place and few workers make it back alive from an ingot run. However, those that do often return with a shiny new toy. It's no secret that The Steelyard is littered with weapons and equipment left over from years of conflicts The Pitt saw before Ashur came along. There has also never been a policy forbidding workers from using these tools to keep themselves alive long enough to gather a few more ingots. Recently though, one of these weapons was used when a worker stepped in on an overseer beating a lazy worker who refused to haul steel 'because their leg was broken'. We may need to do something about this."
    PIT_nf_events.19.a:0 "Let them keep their guns"
    PIT_nf_events.19.b:0 "Everett will hold the weapons until they return to the yard"
    PIT_nf_events.19.c:0 "Confiscate weapons at the door"
    PIT_nf_events.20.title:0 "Officers Caught Skimming"
    PIT_nf_events.20.desc:0 "Several officers have been caught diverting weapons and ammuniution from the assembly line to sell for personal profit. Those caught have argued they did this to make up for the cut in pay since Wernher took over. It's up to Wernher to decide how theft like this will be treated in his Pitt."
    PIT_nf_events.20.a:0 "Reassign the thieves to wall guard duty"
    PIT_nf_events.20.b:0 "Force them to pay back the illicit gains"
    PIT_nf_events.20.c:0 "Execute anyone caught stealing"
    PIT_nf_events.21.title:0 "We Should've Expected This"
    PIT_nf_events.21.desc:0 "Even though workers are given a very small portion of the profits from our arms sales, that hasn't prevented them from being targeted. Their representative has come to Wernher with dozens of reports of workers being beaten or killed by overseers for sums as low as 3 caps."
    PIT_nf_events.21.a:0 "Punish the soldiers responsible"
    PIT_nf_events.21.b:0 "Warn the soldiers not to continue"
    PIT_nf_events.21.c:0 "If they didn't want to die, they should've paid"
    PIT_nf_events.22.title:0 "A Little Prick"
    PIT_nf_events.22.desc:0 "With great effort, we have finally found a way to at least partially recreate Marie's resistance to TDC. The injection serves to stave off the mental degredation as well as minimize the lesions those that stay in The Pitt suffer from. Production of the vaccine is slow, but in time we should be able to give everyone in The Pitt the shot."
    PIT_nf_events.22.a:0 "We know who deserves the first shots"
    PIT_nf_events.23.title:0 "Fighting For The Cure"
    PIT_nf_events.23.desc:0 "As we should have expected, the scarcity of the TDC Vaccine has led to no shortage of conflict. Members of the army tasked with distributing the vaccine have taken instead to hoarding it and demanding payment from workers for the shot. There have even been a few cases of workers dying due to syringes filled with irradiated water being given instead of the vaccine. That is why we once again have Midea making her way to Haven to complain for the workers."
    PIT_nf_events.23.a:0 "Punish the soldiers responsible"
    PIT_nf_events.23.b:0 "Replace the soldiers responsible"
    PIT_nf_events.23.c:0 "The Army has priority for the shots!"
    PIT_nf_events.24.title:0 "Into The Depths"
    PIT_nf_events.24.desc:0 "Clearing the buildings of The Pitt is the easier part of dealing with trogs. The vast majority of them lurk underground in the dark sewers. If we are to enjoy relative safety in these ruins, we need to do a few passes and at least thin out their numbers. The only question is, how do we go about this?"
    PIT_nf_events.24.a:0 "Send in the army"
    PIT_nf_events.24.b:0 "Send in the army, with bonus pay"
    PIT_nf_events.24.c:0 "Send in the army, §Owith flamers"
    PIT_nf_events.24.d:0 "Send in the workers"
    PIT_nf_events.24.e:0 "Send in the workers, §Owith flamers"
    PIT_nf_events.24.f:0 "Send in the worker's militia"
    PIT_nf_events.24.g:0 "Send in the worker's militia, §Owith flamers"
    PIT_nf_events.25.title:0 "Independence Town Runaways"
    PIT_nf_events.25.desc:0 "Sitting on our outskirts and lightly guarded, it makes sense that Independence Town would be the place many workers attempt to make their escape. The soldiers sent to keep watch on the workers there have reported dozens of disappearences as well as several slaves caught in the escape attempt. It's clear that something needs to be done if we are to do work in Independence Town."
    PIT_nf_events.25.a:0 "Double guard assignments"
    PIT_nf_events.25.b:0 "Set up more fences"
    PIT_nf_events.25.c:0 "Let them try their luck out there"
    PIT_nf_events.25.d:0 "Maybe the name is the problem"
    PIT_nf_events.26.title:0 "Lighter Loads"
    PIT_nf_events.26.desc:0 "After weeks of workers being beaten for missing quotas, it has come out that the lighter than expected shipments from Independence Town were not the result of lazy workers. In fact, we have found that several bosses in the town were diverting some resources to sell to scrap traders outside our borders. The responsible parties have been reassigned, but now we need to decide what to do with them."
    PIT_nf_events.26.a:0 "Execute them for the theft"
    PIT_nf_events.26.b:0 "Let them work off the debt as workers"
    PIT_nf_events.26.c:0 "Confiscate their illicit gains"
    PIT_nf_events.26.d:0 "Just keep a closer watch on them"
    PIT_nf_events.27.title:0 "The Slavers Are Dead"
    PIT_nf_events.27.desc:0 "The gunfire, explosions and screaming that have echoed throughout The Pitt for the last few weeks have finally died down. They have been replaced by the more regular ringing out of gunfire as captured raiders of The Pitt are executed for their crimes. For the first time in over 20 years, the people of The Pitt are truly free. No longer will our destiny be decided by some warlord, but it will be decided by us. Those that wished to leave have already gone as the fighting died down. Those that remain are dedicated to building The Pitt on our own terms, into some place we can be proude to call home. A place where people are free, and where no one lords over the rest."
    PIT_nf_events.27.a:0 "A home we will protect till our final breath"
    PIT_nf_events.28.title:0 "Fatal Mistake"
    PIT_nf_events.28.desc:0 "Krenshaw, Midea, and Duke, these were just a few of those that took up arms against Wernher that were ultimately captured. With their uprising crushed, the question remains about what to do with those that thought they could seize power from Wernher's grasp."
    PIT_nf_events.28.a:0 "Execute the leaders only"
    PIT_nf_events.28.b:0 "Execute all involved"
    PIT_nf_events.28.c:0 "Open up The Hole to the conspirators"
    PIT_nf_events.28.d:0 "Put them all to work"
    PIT_nf_events.29.title:0 "Third Time's The Charm"
    PIT_nf_events.29.desc:0 "Ashur had a lot of things going for him. He was smart, he was strong, and he had a good plan. Only thing is he couldn't see that snake Wernher for what he was. Wernher was also a little smart and strong, but he was no Ashur. He was just a sneaky fuck that was lucky enough to convince people he was better. There won't be anyone pulling that shit again. Krenshaw knows the score and won't let anybody screw up his plans. The slaves will stay slaves, just as they should be. The raiders will continue to raid, just as they should. Krenshaw will rule, just as he earned the right to. The Pitt will be the baddest place around, and soon everyone in the wasteland will pay their due to the lord."
    PIT_nf_events.29.a:0 "Back to Raiding"
    PIT_nf_events.30.title:0 "Krenshaw's Call"
    PIT_nf_events.30.desc:0 "Word has come from The Pitt that Wernher got his ass kicked by a dude named Krenshaw. He's calling the shots there now and he's sent us a message. \n \n §O I've heard you guys are pretty hardcore. You might even be hardcore enough to roll with us. We've got the guns, the slaves, and some of the baddest raiders in the wasteland. Join up and we'll help you take over those wussies around you. Together we'll make sure the wastes continue to serve the strongest, and that shit that happened in DC doesn't happen anywhere else. \n \n Krenshaw, Lord of The Pitt. §! \n \n How should we respond?"
    PIT_nf_events.30.a:0 "You son of a bitch, we're in"
    PIT_nf_events.30.b:0 "We'll pass"
    PIT_nf_events.31.title:0 "A Surprise"
    PIT_nf_events.31.desc:0 "As Ashur's Army marched across The Capital Wasteland, people ran and hid. They knew the stories of cruel slavers and raiders smart enough to be dangerous. But as the people cowered they slowly came to realize something. Ashur's Army wasn't raiding the settlements they passed through. People weren't carted off to a life of slavery and shacks weren't burned. There were a few soldiers caught engaging in banditry, and surprisingly enough they were often killed by their comrades. Even this far from his city Ashur maintained an iron grip on his army. His word was law, and he ordered his people to oversee a mostly bloodless transition of power. Some still fled, knowing life under tyrants like this and not wanting to live it again. But many more stayed. As they settled back into their day to day they began to think..."
    PIT_nf_events.31.a:0 "Maybe it won't be so bad"
    PIT_nf_events.32.title:0 "Buncha Losers"
    PIT_nf_events.32.desc:0 "Ever since The DC Settlements got together and kicked most of the raiders in The Capital Wasteland out of their territory, they had this reputation of being some kind of badasses. Looking at their settlements, it really just shows how shit the raiders around there were. Sure, The Regulators were pretty tough, but the average wastelander here is just as scared as any Pitt slave. Now the people of The Capital Wasteland are ponying up tribute to The Pitt, and we're shackling any of them that seem like they'd make a good worker."
    PIT_nf_events.32.a:0 "Like taking candy from a baby"
    PIT_nf_events.33.title:0 "Feeding The Pitt"
    PIT_nf_events.33.desc:0 "The Capital Wasteland is a veritable shithole. The land is nearly useless for farming, there are too many mutants running around, and you can't step 2 feet without bumping into some old turret or army robot that somehow hasn't run out of bullets. With all that being said, there is a good reason people live here. The DC Ruins are full of valuable salvage. Everything from old rifles to suits of power armor can be found among the debris of this wasteland. There are some things even The Pitt can't produce yet, so we'll let these people continue their shitty lives, just so long as they give us our cut."
    PIT_nf_events.33.a:0 "It all flows to The Pitt"
    PIT_nf_events.34.title:0 "Better Together"
    PIT_nf_events.34.desc:0 "The people in The Capital Wasteland are a lot like us. They have suffered under the yoke of oppressors and they stood against them. Whether it be raiders, super mutants, or power armored tyrants, they fought. Now that we've gotten to know each other, they know we are more akin to liberators than yet another oppressor."
    PIT_nf_events.34.a:0 "No tyrants here"
    PIT_nf_events.35.title:0 "Beyond Our Walls"
    PIT_nf_events.35.desc:0 "People of [PIT.GetName], I know we just fought a hard war. Those beyond our great city envy our success, they want what we have built. Our strength, our security, our industry. They are all things none in The Wasteland have been able to replicate. We may have fended off the attacks from those in The Capital Wasteland, but they will not be the last. To them and those who wish to steal what we have built with our toils I say this... \n\n Do not fight a war you will not win. Instead, join us. \n\n Just as we have rebuilt The Pitt into a grand city, we will rebuild the wasteland into something greater. Unfortunate as it is, I know these words fall on deaf ears. The savagery of life in the wasteland has blinded many of you to anything other than what you can steal. \n\n Know that we will stand ready, and when we have laid waste to your armies, we will build something beautiful over your graves."
    PIT_nf_events.35.a:0 "The Empire of Steel will not fall"
    PIT_nf_events.36.title:0 "Watch Out"
    PIT_nf_events.36.desc:0 "Slaves are shipped from across The Capital Wasteland to The Pitt in numbers even greater than the glory days of Paradise Falls. Mountains of deadly weapons gathered by The Brotherhood and Enclave over the years sit in the hands of The Pitt Raiders. More raider gangs sign up by the day to work with us. This is only the beginning. Soon the rest of the wasteland will be like this, either joining us or serving us."
    PIT_nf_events.36.a:0 "We're Coming"
    PIT_nf_events.37.title:0 "Pretty Sweet Setup"
    PIT_nf_events.37.desc:0 "From The Bastion, Wernher sits with at least 20 loyal guards decked out in power armor snagged from The Citadel. He's waited on round the clock by a staff of workers grateful to be saved from working in The Mill. The soldiers of Wernher's army keep the workers in line, as well as ensure the continued flow of goods to The Pitt. Life is good for the warlord. After years of scheming and ordering others around, his empire almost runs on its own while he sits back and enjoys the fruits of their labor. It's almost like he's unnecessary."
    PIT_nf_events.37.a:0 "Hopefully they never realize it."
    PIT_nf_events.38.title:0 "Freedom Forever"
    PIT_nf_events.38.desc:0 "The Capital Wasteland, like The Pitt, is enjoying peace and freedom it has not seen in centuries. Roving slaver bands are a thing of the past, and even those that abandoned the trade are being found. They will know no rest as they are hunted down and forced to pay for their crimes. Midea, the mother of freedom, will make sure of that. As members of her people's army, it is her orders we follow, to ensure the freedom of all."
    PIT_nf_events.38.a:0 "We must remain ever vigilant"
    PIT_nf_events.39.title:0 "Almost Perfect"
    PIT_nf_events.39.desc:0 "The fires from Ashur's overthrow have died down. TDC has been mostly cured. The soldiers of The Pitt know who is in charge, as do the workers. Things couldn't be much better in The Pitt. Just a few more things to do and The Pitt will become a serious power that nobody in The Wasteland can stand up to. \n \n Wait... what do you mean the sla-workers are rising up? \n \n Have Krenshaw get the raiders off their asses to stop them!"
    PIT_nf_events.39.a:0 "§RKRENSHAW IS DOING WHAT?!"
    PIT_nf_events.39.b:0 "§CWE WORKERS HAVE HAD ENOUGH!"
    PIT_nf_events.39.c:0 "§OKRENSHAW IS OUR NEW BOSS!"
    PIT_nf_events.40.title:0 "Enough Is Enough"
    PIT_nf_events.40.desc.1:0 "For years we suffered, we bled, and we died for the whims of raider warlords. Wernher said he would be different, but he has shown us he is not. Freedom we were promised was denied, and the cruelty of the raiders he has rule over us has not lessened. No matter what small crumbs he tosses to us, they will never satiate our hunger for freedom. After months of preparation we are finally ready. This time we don't fight for some lying wannabe Ashur, we fight for ourselves!"
    PIT_nf_events.40.desc.2:0 "For years we suffered, we bled, and we died for the whims of raider warlords. Wernher said he would be different, but he has shown us he is not. Even the freedom he gave us was more of a trap. The raiders still walk over us, and anyone that wishes to leave is tossed out into the ruins to fend for themselves against wildmen and trogs. After months of preparation we are finally ready. This time we don't fight for some lying wannabe Ashur, we fight for ourselves!"
    PIT_nf_events.40.a:0 "We fight for our freedom!"
    PIT_nf_events.41.title:0 "Wernher Is Weak"
    PIT_nf_events.41.desc:0 "Wernher convinced us he could do better than Ashur, and he hasn't. The workers are allowed too much freedom and he can barely keep anybody in check. We need a strong leader to rule The Pitt. We need someone that can keep the slaves in line, and make sure the gangs don't tear each other apart. That's why we need someone like Krenshaw."
    PIT_nf_events.41.a:0 "Time to take out the trash"
    PIT_nf_events.42.title:0 "Wernher's Rule Explained"
    PIT_nf_events.42.desc:0 "As Wernher cleans up from his coup and solidifies his rule on The Pitt, he has three things he needs to pay attention to. \n \n §CWorker Approval§! represents how much the workers of The Pitt agree with Wernher's reign. This will be impacted by your choices in focuses and events. The workers will not enjoy being mistreated, but they will enjoy a leader who treats them fairly. They will never forgive Wernher if he is to rescind any promises of freedom he made to secure their support in seizing power. Turn your back on the workers too much, and more of them will heed the call to fight for their rights! \n \n §OSoldier Approval§! represents how much the raiders of The Pitt approve of Wernher's leadership. They will enjoy things like increasing their share of the take and allowing them to continue abusing the workers. They certainly will not enjoy the workers being given their freedom. Piss them off too much, and when they question Wernher's authority, they will have greater support! \n \n §RThe Wernher's Grip Balance of Power§! represents just how firm Wernher's rule of The Pitt is. The grip is tightened by strong decision making, punishing rulebreakers, and enforcing the hierarchy of The Pitt. It is loosened through concessions and turning a blind eye to rulebreaking. Keep the grip too lose, and when people start questing your authority, you may find yourself with few allies."
    PIT_nf_events.42.a:0 "Who knew running this place would be so much work?"
    PIT_nf_events.43.title:0 "The Pitt Sends Aid"
    PIT_nf_events.43.desc:0 "Seeing our recent conflict and the impact it is having on their slave supply, Lord Ashur has sent some members of his army to aid us in our fight. These raiders are something else and should help us keep things in check."
    PIT_nf_events.43.a:0 "We had things handled, but we'll take the help"
    PIT_nf_events.44.title:0 "The Pitt Sends Aid"
    PIT_nf_events.44.desc:0 "Seeing our recent conflict and the impact it is having on their slave supply, Lord Ashur has sent some members of his army to aid us in our fight. These raiders are something else and should help us keep things in check."
    PIT_nf_events.44.a:0 "We had things handled, but we'll take the help"
    PIT_nf_events.45.title:0 "The Pitt Sends Aid"
    PIT_nf_events.45.desc:0 "Seeing our recent conflict and the impact it is having on their slave supply, Lord Ashur has sent some members of his army to aid us in our fight. These raiders are something else and should help us keep things in check."
    PIT_nf_events.45.a:0 "We had things handled, but we'll take the help"
    PIT_nf_events.46.title:0 "Worker Supply Disrupted"
    PIT_nf_events.46.desc:0 "Our worker imports from The Breakers have come to a screeching halt. The seafaring raiders seem to have been all but wiped out by one of their neighbors, and we shouldn't expect to receive any more workers from them."
    PIT_nf_events.46.a:0 "Miserable failures"
    PIT_nf_events.47.title:0 "Worker Supply Disrupted"
    PIT_nf_events.47.desc:0 "Worker imports from The Capital Wasteland have come to a screeching halt. The raiders of The Capital Wasteland and their friends in Paradise Falls have been wiped out and we shouldn't expect to receive any more workers from there."
    PIT_nf_events.47.a:0 "I knew they were useless"
    PIT_nf_events.48.title:0 "Worker Supply Disrupted"
    PIT_nf_events.48.desc:0 "Worker imports from Harrisburg have come to a screeching halt. The once reliable Harrisburg Bandits have bitten off more than they could chew and got wiped out. We should not expect any more workers to be imported from their territory."
    PIT_nf_events.48.a:0 "I knew they were getting soft"
    PIT_nf_events.49.title:0 "Freedom When?"
    PIT_nf_events.49.desc:0 "For years now Ashur has promised the workers of The Pitt that they would receive their freedom one day. But as we continue importing slaves and the life expectancy of a slave in The Pitt grows ever shorter, many wonder if they will ever see freedom."
    PIT_nf_events.49.a:0 "Ignore their concerns"
    PIT_nf_events.49.b:0 "Punish any worker talking about freedom"
    PIT_nf_events.49.c:0 "Promise the workers freedom is almost at hand"
    PIT_nf_events.49.d:0 "Have Wernher speak with Media"
    PIT_nf_events.50.title:0 "Going Soft?"
    PIT_nf_events.50.desc:0 "Though nobody would have the balls to go up to Ashur and bitch face to face, many raiders are pissed off about The Hole being scaled back. Some of them have even floated the idea that it's because the boss is growing soft since having his kid."
    PIT_nf_events.50.a:0 "Ignore the grumblings"
    PIT_nf_events.50.b:0 "Kill the one griping the loudest"
    PIT_nf_events.50.c:0 "Convince them the fights weren't that exciting anyway""
    PIT_nf_events.50.d:0 "Have Wernher speak with Krenshaw"
    PIT_nf_events.51.title:0 "Fucked Priorities"
    PIT_nf_events.51.desc:0 "No matter what Ashur calls The Pitt's slaves, in the minds of everyone but him, they are just that. So the soldiers of Ashur's army are of course going to be really pissed off when Ashur chooses to fix up the living situation of some slaves instead of them."
    PIT_nf_events.51.a:0 "Let them bitch and moan"
    PIT_nf_events.51.b:0 "Toss any complainers off the buildings"
    PIT_nf_events.51.c:0 "Convince them it's to keep the slaves working hard"
    PIT_nf_events.51.d:0 "Have Wernher talk to Krenshaw about it"
    PIT_nf_events.52.title:0 "The Haves And Have-Nots"
    PIT_nf_events.52.desc:0 "The workers should understand by now that the soldiers of Ashur's Army come second only after the big man and his family. It's anybody's guess why they think they have a right to complain about their living conditions."
    PIT_nf_events.52.a:0 "Ignore their complaints"
    PIT_nf_events.52.b:0 "Those that complain can try the stockades"
    PIT_nf_events.52.c:0 "Promise things will improve soon"
    PIT_nf_events.52.d:0 "Have Wernher speak with Media about it"
    PIT_nf_events.53.title:0 "Worthless Junk"
    PIT_nf_events.53.desc:0 "With our extra forges churning out quality tools, the pipe guns in our army's hands look even shittier than usual. "
    PIT_nf_events.53.a:0 "Tell them to make due"
    PIT_nf_events.53.b:0 "Show them the guns still kill"
    PIT_nf_events.53.c:0 "Buy some new guns in the meantime"
    PIT_nf_events.53.d:0 "Wernher offers to buy them better weapons"
    PIT_nf_events.54.title:0 "Production Problems"
    PIT_nf_events.54.desc:0 "Quotas are routinely being missed by our workers and increasing beatings hasn't seemed to spur things along. The worker's representative says the problem lies in their tools. They say that our focus on producing weapons has left them to work with 200 year old rusted tools that barely cut through anything."
    PIT_nf_events.54.a:0 "Increase beatings until production improves!"
    PIT_nf_events.54.b:0 "Promise they will get better tools soon"
    PIT_nf_events.54.c:0 "Have Wernher talk with Media"
    PIT_nf_events.55.title:0 "Relocating"
    PIT_nf_events.55.desc:0 "Haven is the place to live in The Pitt. Just about every raider that makes it into the tower feels like they've made it. Running water, working lights, and walls without huge holes in them on the 10th floor. What's not to love? So when Ashur told some soldiers they'd need to move into a crumbling shitheap in Uptown so Sandra could expand her lab, they weren't happy."
    PIT_nf_events.55.a:0 "They can live in the sewers then!"
    PIT_nf_events.55.b:0 "Fix up their new home"
    PIT_nf_events.55.c:0 "Promise it's just temporary"
    PIT_nf_events.55.d:0 "Wernher will work with Krenshaw on a solution"
    #Ashur's Events
    PIT_nf_events.61.title:0 "Ashur's Triumph"
    PIT_nf_events.61.desc:0 "The fires of rebellion have been extinguished. With the last of the Wildmen and Trogs scattered or gutted, Wernher's raiders routed, and the would-be slave revolutionaries brought to heel, Lord Ashur stood atop the ruined banister of Haven, overlooking the bruised but breathing heart of the Pitt.\n\nThere had been a moment when Ashur had feared he would lose everything. Not just the city, but the dream he had fought so long to protect. It was not mercy that stayed his hand as he crushed the uprising, but rather purpose. Those who surrendered were offered a return to their labors, while the most defiant were dispatched without hesitation.\n\nThe Pitt would survive - not as a kingdom of ash and iron alone, but as a cradle for something greater. Ashur, battered but unbowed, declared his resolve into the Pitt PA system from the half-collapsed balcony of Haven:\n\n\"You thought you could tear down what we've built? You thought you could burn away the will of the Pitt itself? No. I have taken these broken stones, these bent backs, these scarred souls... from them, I will forge a city greater than any the Old World ever knew!\"\n\nCheers, ragged at first, then thunderous, answered him. Hope, battered and bruised, yet stubborn as steel, lived on."
    PIT_nf_events.61.a:0 "The City of Steel endured."

    PIT_nf_events.56.title:0 "A Child To Build A City On"
    PIT_nf_events.56.desc:0 "Time moved strangely in the Pitt. Days bled into one another in the endless noise of furnaces and forges. Ashur, both as Lord and as Ishmael, felt each passing moment in the ache of his bones and the weight of his thoughts. Marie, once a child cradled carefully in his arms and kept safely in her cradle, now crawls the halls of Haven with childish curiosity and the beginnings of her parents features.\n\nStanding at his usual position high above the gathered workers and soldiers of the Pitt, Ashur held his daughter aloft, his voice cutting through the heavy, soot-choked air.\n\n\"You have suffered. You have bled. You have labored and fought not just for yourselves, but for the future! Today, that future takes form. My daughter, Marie, carries the cure within her. The blood that will end the plague that cursed this city!\"\n\nA stunned silence answered him.\n\nAshur, smiling grimly, turned toward Sandra, who had spent tireless months refining the cure. It had taken a toll on the both of them, his already unkempt appearance further stained with age and stress, with the same applying to his dear wife. But it had all been worth it. Within the month, the first vials would be distributed among the workers and the soldiers alike.\n\nFor the first time in living memory, the Pitt would not just endure. "
    PIT_nf_events.56.a:0 "It would heal."

    PIT_nf_events.57.title:0 "The End of the Hole"
    PIT_nf_events.57.desc:0 "The Hole had once served its grim purpose. A pitiless arena where desperate workers fought for the chance at survival, where raiders like Faydra roared approval from the scaffolded heights, and where death was the only applause and rising from a laborer to a soldier was one's only reward if they survived, assuming they weren't made champions instead.\n\nAshur stood at the cracked edge of the pit now, arms crossed, surveying the bloodstained metal and earth with narrowed eyes. Once, he had tolerated the spectacle. It had been necessary, a way to harden potential soldiers, to elevate restless laborers. But no more.\n\n\"We are not beasts,\" he growled to the gathered soldiers.\n\n\"The Pitt is no longer a forge for cruelty. It is a forge for a future. The Hole has no place in what we are building.\"\n\nSandra offered cautious suggestions, perhaps the Hole could be reforged into a nursery, a place of life instead of death, after all, Marie was still rather young, and children now born in the Pitt wouldn't be able to live in laborer hovels forever. Krenshaw, ever the pragmatist, argued for a training ground to toughen recruits. Others proposed simply tearing it apart, salvaging every brick and bolt."
    PIT_nf_events.57.a:0 "Sandra's right, make it into a nursery."
    PIT_nf_events.57.b:0 "A military training academy can be good for the Pitt."

    PIT_nf_events.58.title:0 "Normie-laty"
    PIT_nf_events.58.desc:0 "As things in The Pitt have improved, we no longer need to rely on worker 'imports'. Instead, workers come to us looking for steady work and steady pay. It's not just been normal people though, ghouls and even a couple super mutants with some sense in their skulls have shown up looking for work. They have mostly been relegated to scavenging in areas too irradiated for our human workers to delve into, but that doesn't seem to be enough for them. A ghoul has approached Haven with a list of requests from these workers, chief of which is to allow them to become soldiers if they wish."
    PIT_nf_events.58.a:0 "Invite them in."
    PIT_nf_events.58.b:0 "We're here to do business only."

    PIT_nf_events.59.title:0 "Pittsburgh Protection Alliance"
    PIT_nf_events.59.desc:0 "We have received a messenger from The Pitt. Lord Ashur is offering his protection to our people so long as we follow his lead. Having his growing army as friends rather than enemies would be nice. But should we align ourselves with this man?"
    PIT_nf_events.59.a:0 "We will join."
    PIT_nf_events.59.b:0 "We will decline."

    PIT_nf_events.60.title:0 "A Peculiar Sunrise"
    PIT_nf_events.60.desc:0 "Just as Ashur had done nearly every morning since taking control of The Pitt, the lord stood by a window atop Haven and watched the sun rise over his city. Today was a little different. The sun rose over the skyline just right, peering through the plumes of smoke rising from the forges, to make the city almost glisten. From atop Haven, Ashur could see repaired buildings, rooftops with saftey railings, and thousands of people doing their part to revive this dead city. As he was deep in thought about the future of the city and before he knew it some smog blocked the sun and the city went back to its usual dreary self. The moment was fleating, but it made Ashur realize something. Calling his city The Pitt just wasn't going to cut it anymore."
    PIT_nf_events.60.a:0 "Time for a change"    

