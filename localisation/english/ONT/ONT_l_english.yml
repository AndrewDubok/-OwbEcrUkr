###Cosmetic Tags###
ONT_canadian_enclave_tag:0 "Канадський Анклав"
ONT_canadian_enclave_tag_ADJ:0 "Анклав"
ONT_canadian_enclave_tag_DEF:0 "Канадський Анклав"

###Factions###
ONT_enclave_faction:0 "Командування Анклаву"

###Decisions###
ONT_bunker_decision_category:0 "Бункер, що розвалюється"
ONT_bunker_fail_mission:0 "Зворотний відлік до півночі"
ONT_bunker_fail_mission_desc:0 "Ось наша оцінка часу, коли командний бункер Онтаріо вийде з ладу. Неважливо, що ми демонтуємо, як завзято б'ємося чи наскільки близькі до перемоги — якщо ми не здобудемо перемогу до того, як бункер перестане працювати, нам доведеться відступити й перекинути війська в інше місце. Куди саме — невідомо. Але без бункера чи Ронто ми не зможемо вижити."

###Laws###
ONT_decrepit_command_law:0 "Старезне командування"
ONT_decrepit_command_law_desc:0 "Мало хто з наших досвідчених офіцерів повернувся до командного бункера Онтаріо. Багато з них уже пішли з життя. Наш офіцерський корпус практично відсутній, а більшість молодого покоління не знайомі навіть з базовими військовими тактиками."
ONT_poorly_trained_officers_law:0 "Погана підготовка офіцерів"
ONT_poorly_trained_officers_law_desc:0 "Наші офіцери проходять інтенсивний курс з основ військової теорії за підручником. Ми не очікуємо, що багато хто з них виживе після першого ж завдання. Але ті, хто виживуть, сподіваємося, зможуть засвоїти хоча б кілька важливих уроків."
ONT_trained_officers_law:0 "Підготовлені офіцери"
ONT_trained_officers_law_desc:0 "Крім теоретичної підготовки, наші офіцери проходять практичні навчання. Ці тренування та тести не зроблять їх досвідченими командирами, але стануть міцним фундаментом для подальшого розвитку."
ONT_well_trained_officers_law:0 "Добре навчені офіцери"
ONT_well_trained_officers_law_desc:0 "Наші офіцери вивчали не лише історичні битви — вони билися в них. Завдяки сучасним VR-тренажерам ми дали їм можливість отримати максимально наближений до реального досвід. Вони можуть і не бути ветеранами, але близькі до цього."
ONT_sourcing_materials_law:0 "Пошук матеріалів"
ONT_sourcing_materials_law_desc:0 "Форпости розміщуються на виробничих об'єктах і в місцях із життєво важливими ресурсами. Ці точки ретельно охороняються від місцевого населення, з яким зрештою буде вирішено питання."


###Names###
ONT_general_hurley:0 "Генерал Герлі"
ONT_riggs_name:0 "Капітан Ріггс"
ONT_hurley_name:0 "Майор Герлі"
ONT_hurley_desc:0 "Найстарший офіцер Анклаву Онтаріо, Рік Герлі, останні 30 років тримає своїх людей та їхній дім разом. Як і багато хто, він таємно сподівався, що якщо вдасться протриматися ще хоча б рік, прийде підкріплення. Але в міру того, як ситуація стає дедалі яснішою, надія на порятунок згасає. Якщо Анклав Онтаріо хоче вижити, їм доведеться битися знову."
ONT_munn_name:0 "Томас Манн"
ONT_munn_desc:0 "Будучи молодим офіцером, Томас Манн отримав завдання організувати евакуацію назад до командного бункера Онтаріо. Ніколи не забуваючи тих, хто не повернувся, він присвятив роки вивченню помилок і невдач цього відступу."
ONT_chicago_advisor_name:0 "Енох Б'юкенен"
ONT_hartmann_name:0 "Абель Гартманн"
ONT_cromey_name:0 "Джонас Кромі"
ONT_thompson_name:0 "Френсіс Томпсон"
ONT_watt_name:0 "Вільям Ватт"
ONT_semple_name:0 "Леві Семпл"
ONT_mcconnal_name:0 "Анна МакКоннал"
ONT_mason_name:0 "Ґрейс Мейсон"
ONT_wallace_name:0 "Лайнус Воллес"
ONT_fulton_name:0 "Авраам Фултон"
ONT_chicago_econ_name:0 "Сайрус Перкінс"
ONT_barton_name:0 "Річард Бартон"
ONT_eastburn_name:0 "Еллен Ченнел"
ONT_sterrett_name:0 "Томас Стерретт"
ONT_chicago_culture_name:0 "Гаррієт МакКлелланд"
ONT_mcclelland_desc:0 "Після багатьох років поневірянь і жертв Чикаго вважає, що ми заслужили скуштувати їхнє розкішне життя. Вони прислали до нас людину, щоб показати, як насолоджуватися плодами праці мутантів."
ONT_washington_name:0 "В.А.Ш.І.Н.Г.Т.О.Н."
ONT_howarth_name:0 "Анджело Говард"

###National Focuses###
ONT_nf_a001:0 "Повернення Торонто"
ONT_nf_a001_desc:0 "Платформа впала, план очищення пусток за допомогою ВБО провалився. Що тепер робити?"
ONT_nf_a002:0 "Велика Помилка"
ONT_nf_a002_desc:0 "В.А.Ш.І.Н.Т.О.Н був ШІ, створеним довоєнною Америкою для управління окупованою Канадою. Чому його вимкнули перед ядерним ударом?"
ONT_nf_a003:0 "Майже запізнилися"
ONT_nf_a003_desc:0 "Коли все здавалося безнадійним, зі Столичної Пустки прорвалися вертиберди, але чи не надто вони запізнилися?"
ONT_nf_a004:0 "Годинник, що цокає"
ONT_nf_a004_desc:0 "Якщо ми не вживемо заходів найближчим часом, наш бункер стане непридатним для життя. Час повертатися на поверхню."
ONT_nf_a005:0 "Зимові Воїни"
ONT_nf_a005_desc:0 "Бій з канадськими мутантами мало не знищив нашу армію. Десятиліття занепаду теж не пішли нам на користь."
ONT_nf_a006:0 "Збережемо нашу міць"
ONT_nf_a006_desc:0 "Неважливо, наскільки це дорого — силова броня є ключем до нашої військової могутності. Зчистіть іржу та замініть відсутні деталі!"
ONT_nf_a007:0 "Майже так само добре"
ONT_nf_a007_desc:0 "За роки наші вчені розробили альтернативу силовій броні. Ця броня використовує деякі деталі з наших іржавих X-01, дозволяючи при цьому повторно використовувати рідкісні компоненти з цих костюмів."
ONT_nf_a008:0 "Розбирання Обладнання"
ONT_nf_a008_desc:0 "Броня ГЕРМЕС дозволяє знизити витрати на екіпірування нашої армії, зберігаючи при цьому нашу перевагу. Однак ці костюми все ще потребують багато ресурсів. Виробництво меншої їх кількості дозволить зосередитися на підтримці працездатності бункера."
ONT_nf_a009:0 "Вогнева міць передусім"
ONT_nf_a009_desc:0 "Наші солдати повинні мати найкраще. Плазмові гвинтівки, гатлінгові лазери та ракетні установки — все це необхідно для нашої остаточної перемоги!"
ONT_nf_a010:0 "Збалансовані Пріоритети"
ONT_nf_a010_desc:0 "Ми не можемо дозволити собі видати кожному солдату на передовій найкраще спорядження. Деяким доведеться обходитися гіршою зброєю."
ONT_nf_a011:0 "Кількість має значення"
ONT_nf_a011_desc:0 "Мутантів занадто багато, щоб розраховувати лише на пару сотень плазмових гвинтівок для їхнього знищення. Кулі працюють не гірше й потребують набагато менше ресурсів для виробництва."
ONT_nf_a012:0 "Фабрикатори"
ONT_nf_a012_desc:0 "Передові довоєнні машини дозволяють нам виготовити практично все, що потрібно, за наявності достатньої кількості базових ресурсів та енергії. Єдиний їхній недолік — вони не розраховані на 200 років безперервної роботи."
ONT_nf_a013:0 "Запаси Медикаментів"
ONT_nf_a013_desc:0 "Перед вимкненням допоміжних фабрикаторів нам потрібно накопичити запас стимуляторів та інших необхідних медикаментів."
ONT_nf_a014:0 "Рівень Життя"
ONT_nf_a014_desc:0 "Навіщо жертвувати нашим способом життя заради кількох додаткових днів роботи? Нехай бункер працює як зазвичай."
ONT_nf_a015:0 "Запаси Їжі"
ONT_nf_a015_desc:0 "Перед вимкненням допоміжних фабрикаторів нам слід накопичити запаси їжі, щоб не витрачати енергію на гідропоніку."
ONT_nf_a016:0 "Тісніші умови"
ONT_nf_a016_desc:0 "Комусь може бути некомфортно, але розміщення всіх у спільних житлових приміщеннях дозволить закрити кілька секцій і заощадити ресурси."
ONT_nf_a017:0 "Захист Бункера"
ONT_nf_a017_desc:0 "Автоматичні турелі роками не пускають до бункера випадкових мандрівників пустки. Чи варто залишити їх увімкненими, коли ми готуємося вийти на поверхню?"
ONT_nf_a018:0 "Найкращий Захист"
ONT_nf_a018_desc:0 "Ми не можемо дозволити ворогу наблизитися до нашого бункера без бою. Залиште оборону ввімкненою."
ONT_nf_a019:0 "Відступати Нікуди"
ONT_nf_a019_desc:0 "Це наш останній шанс відстрочити вимирання. Відступати не можна. Не будемо ховатися за автоматичними турелями. Відключайте машини та перенаправляйте ресурси на підготовку до бою!"
ONT_nf_a020:0 "Сила Сталі"
ONT_nf_a020_desc:0 "У нашому бункері є запас охоронних роботів, які були відключені невдовзі після нашого відступу. Їхнє повторне ввімкнення може бути затратним, але вони будуть дуже корисні в бою."
ONT_nf_a021:0 "Гайки та болти"
ONT_nf_a021_desc:0 "Охоронних роботів краще пустити на запчастини — це допоможе довше підтримувати роботу життєво важливих систем."
ONT_nf_a022:0 "Переважно хлопці"
ONT_nf_a022_desc:0 "Минули десятиліття відколи нас загнали назад у бункер. Небагато хто пам'ятав життя за межами в канадських пустках, все ще в боєздатному стані. Зараз на передовій — їхні діти та онуки."
ONT_nf_a023:0 "VR-Тренування"
ONT_nf_a023_desc:0 "Ми підготуємо наших бійців до майбутнього бою за допомогою передових бойових симуляцій."
ONT_nf_a024:0 "Міська бойова підготовка"
ONT_nf_a024_desc:0 "Ми очистимо старий ангар, збудуємо макети штучних будівель і навчимо наших солдатів веденню бою в міських умовах."
ONT_nf_a025:0 "Суто Теорія"
ONT_nf_a025_desc:0 "У нас немає ресурсів на практичні тренування. Солдати вивчать військову теорію та базові бойові навички перед виходом на фронт."
ONT_nf_a026:0 "Майже Ветерани"
ONT_nf_a026_desc:0 "Наші новобранці пройшли достатньо інтенсивну бойову підготовку, щоб бути готовими до всього. Мутанти навіть не підозрюють, що на них чекає."
ONT_nf_a027:0 "Достатньо Сильні"
ONT_nf_a027_desc:0 "Наші новобранці добре знайомі з тактикою міського бою. Вони повинні бути готові."
ONT_nf_a028:0 "Ледве придатні до служби"
ONT_nf_a028_desc:0 "Наші новобранці можуть знати основи тактики дій загоном, але цього недостатньо. Швидше за все, більшість із них не проживуть і тижня."
ONT_nf_a029:0 "Останні Штрихи"
ONT_nf_a029_desc:0 "Наші солдати готові, бойові плани майже складені. Є ще кілька справ, які можна зробити, але для цього потрібен час — а його в нас дуже мало."
ONT_nf_a030:0 "Інвентаризація Медицини"
ONT_nf_a030_desc:0 "З невеликими зусиллями ми зможемо ретельно врахувати наші медичні запаси та підготуватися до можливого напливу поранених."
ONT_nf_a031:0 "Розвідка Оборони"
ONT_nf_a031_desc:0 "Буде нерозумно не розвідати, з чим нам доведеться зіткнутися. Передові розвідники задокументують позиції та укріплення ворога — це допоможе нам прорвати їхні лінії."
ONT_nf_a032:0 "Розвідати Склади"
ONT_nf_a032_desc:0 "Існує кілька довоєнних складів зброї, які, найімовірніше, залишилися недоторканими. Нам потрібно зібрати все доступне озброєння."
ONT_nf_a033:0 "Зимове Тренування"
ONT_nf_a033_desc:0 "Симуляції та лекції, безумовно, корисні, але практичний досвід залишається найефективнішим способом навчання."
ONT_nf_a034:0 "ХОДІМО ВЖЕ, БЛЯХА!"
ONT_nf_a034_desc:0 "Час на вичерпі. Ми готові так, як ніколи раніше. Мутанти Торонто заплатять за гріхи своїх батьків перед людством і Америкою!"
ONT_nf_a035:0 "Проміжні Застави"
ONT_nf_a035_desc:0 "Ми створимо кілька передових застав для початку наступу на ворога."
ONT_nf_a036:0 "Розчистити Лінії Постачання"
ONT_nf_a036_desc:0 "Постачання наших військ повітрям — ризикована справа в умовах, коли снігові бурі не дають нашим вертибердам злітати. Створення надійної інфраструктури для забезпечення фронту наземними поставками буде ключем до нашої перемоги."
ONT_nf_a037:0 "Запис Пропаганди"
ONT_nf_a037_desc:0 "Найкращий спосіб виграти війну — змусити ворога здатися, не відкриваючи вогню. Радіозаписи та пропагандистські листівки будуть підготовлені до поширення в момент початку нашого наступу."
ONT_nf_a038:0 "Згуртування Своїх"
ONT_nf_a038_desc:0 "Навіть зараз деякі з наших воліли б просто чекати, поки час мине, або втекти, замість того, щоб битися. Їх потрібно змусити змінити своє ставлення."
ONT_nf_b001:0 "Америка Повертається"
ONT_nf_b001_desc:0 "Ми зробили це. Ми розчавили мутантів під нашими чоботами й повернули Торонто Америці. Що тепер?"
ONT_nf_b002:0 "Новий Командний Центр"
ONT_nf_b002_desc:0 "Ми переселимо наших людей до Торонто, зайнявши військові бази та бункер В.А.Ш.І.Н.Т.О.Н.А. Ці об'єкти завжди були американською власністю, і ми не можемо залишити їх мутантам."
ONT_nf_b003:0 "Покращення Умов Життя"
ONT_nf_b003_desc:0 "Зруйновані стіни, обвалені дахи та розбиті вікна — все це можна легко полагодити за допомогою праці мутантів."
ONT_nf_b004:0 "Тепер як вдома"
ONT_nf_b004_desc:0 "Місяці роботи призвели до того, що умови життя в Торонто зрівнялися з тими, що були в нашому бункері."
ONT_nf_b005:0 "Доля Мутантів"
ONT_nf_b005_desc:0 "Де є батіг, там знайдеться і шлях. Мутанти відбудують місто, яке намагалися в нас відібрати."
ONT_nf_b006:0 "Мародерські Квоти"
ONT_nf_b006_desc:0 "Мутантів із вибуховими нашийниками відправлять у руїни Торонто на пошуки ресурсів. Якщо вони принесуть щось цінне, можливо, ми навіть їх нагодуємо."
ONT_nf_b007:0 "Програма Наглядачів"
ONT_nf_b007_desc:0 "Деякі мутанти більш покірні нашому контролю й навіть готові підтримувати природну ієрархію. Навіщо витрачати сили на їхнє примушення, якщо вони можуть стежити за порядком самі?"
ONT_nf_b008:0 "Переваги Відповідності"
ONT_nf_b008_desc:0 "Дивно, яку жорстокість мутант здатний проявити до своїх же, якщо його мотивувати бляшаним значком і додатковим пайком."
ONT_nf_b009:0 "Виконання Нашої Волі"
ONT_nf_b009_desc:0 "Програма Наглядачів показала таку ефективність, що ми можемо масштабувати її на широку територію. Це дозволить нам поширювати нашу волю далеко за межі чисельності наших сил."
ONT_nf_b010:0 "Бази даних В.А.Ш.І.Н.Г.Т.О.Н.А"
ONT_nf_b010_desc:0 "Головний комп'ютер бункера В.А.Ш.І.Н.Т.О.Н містить не лише довоєнний ШІ. Там зберігаються томи цінних технічних даних, які ми можемо використати."
ONT_nf_b011:0 "Скидання до заводських налаштувань"
ONT_nf_b011_desc:0 "Видалення комуністичного коду має дозволити В.А.Ш.І.Н.Г.Т.О.Н виконувати своє початкове призначення — тримати цих ублюдків у покорі."
ONT_nf_b012:0 "Закріпитися"
ONT_nf_b012_desc:0 "Ми більше не втратимо цю базу. Зміцніть стіни, встановіть нові турелі й тримайте периметр під наглядом."
ONT_nf_b013:0 "Ремонт Антени"
ONT_nf_b013_desc:0 "Антена зв'язку на базі в Торонто була однією з перших цілей, знищених у боях багато років тому. Якщо ми її відновимо, зможемо вийти на зв'язок і дізнатися, хто нас слухає."
ONT_nf_b014:0 "Необхідний Ремонт"
ONT_nf_b014_desc:0 "Навіщо нам залишати цей бункер, якщо ми можемо забезпечити його ресурсами й підтримувати в робочому стані ще двісті років?"
ONT_nf_b015:0 "Будівництво Доріг"
ONT_nf_b015_desc:0 "Для забезпечення транспортування ресурсів із руїн Торонто до нашого командного бункера ми збудуємо дороги та розчистимо завали."
ONT_nf_b016:0 "Перемістити Комунікації"
ONT_nf_b016_desc:0 "У руїнах Торонто достатньо обладнання для зв'язку, щоб посилити сигнали з нашого бункера."
ONT_nf_b017:0 "Перезапуск Автоматичного Захисту"
ONT_nf_b017_desc:0 "Бункери та бази навколо Торонто були оснащені охоронними роботами, яких можна легко перепрограмувати під наші потреби."
ONT_nf_b018:0 "Надлишки В.А.Ш.І.Н.Г.Т.О.Н.А"
ONT_nf_b018_desc:0 "Бункер В.А.Ш.І.Н.Т.О.Н мав власну автоматичну систему безпеки, яка тепер йому більше не знадобиться."
ONT_nf_b019:0 "Ремонт Фабрикаторів"
ONT_nf_b019_desc:0 "За наявності потрібних запчастин ми зможемо підтримувати роботу наших фабрикаторів ще багато років."
ONT_nf_b020:0 "Виробництво Ресурсів"
ONT_nf_b020_desc:0 "Невелике переналагодження дозволить нашим фабрикаторам випускати передові технології, необхідні для підтримання роботи нашого обладнання."
ONT_nf_b021:0 "Пошук Матеріалів"
ONT_nf_b021_desc:0 "Руїни Канади — законна власність уряду США. Це означає, що кожен зруйнований завод, кожен заіржавілий механізм і кожен ват енергії по праву належать нам."
ONT_nf_b022:0 "Покращення Зручностей"
ONT_nf_b022_desc:0 "Ресурси Торонто дозволяють нам відновити давно вимкнені системи. З поверненням, гарячий душ!"
ONT_nf_b023:0 "Люксовий Бункер"
ONT_nf_b023_desc:0 "Навіщо зупинятися на відновленні того, що ми втратили? Якщо цей бункер має стати нашим домом, то чому б не насолоджуватися чимось кращим?"
ONT_nf_b024:0 "Відновлення Баз Даних"
ONT_nf_b024_desc:0 "Багато старих серверів були відключені кілька років тому. Деякі розібрали, а їхні деталі розподілили по важливих системах. Є кілька, які ми можемо знову запустити, щоб використати їхні дані."
ONT_nf_b025:0 "Відкриття Лабораторій"
ONT_nf_b025_desc:0 "Дослідницькі лабораторії були одними з перших, що довелося закрити, коли нам довелося скорочувати витрати, щоб підтримувати роботу бункера. Тепер ми можемо дозволити собі займатися справді важливими дослідженнями — наприклад, скільки мутантів потрібно, щоб з'їсти лампочку?"
ONT_nf_b026:0 "Це Ронто Мейнком"
ONT_nf_b026_desc:0 "З нашими далекодіючими комунікаціями в мережі настав час перевірити, як справи у Вашингтоні."
ONT_nf_b027:0 "Безпечне Укриття"
ONT_nf_b027_desc:0 "Наш контакт з Рейвен-Рок минув не так гладко, як ми очікували. Схоже, що ми були не єдиними, хто пережив важкі кілька років."
ONT_nf_c001:0 "Прийняти Владу Отума"
ONT_nf_c001_desc:0 "Головнокомандувач Отум узяв під контроль Анклав Рейвен-Року. Під його керівництвом ми зможемо повернути Америку та канадські території!"
ONT_nf_c002:0 "Запросити Надлишки Обладнання"
ONT_nf_c002_desc:0 "У Рейвен-Році багато захопленого обладнання після недавнього конфлікту з Братством Сталі. Можливо, вони зможуть прислати нам частину."
ONT_nf_c003:0 "Прийняти Політики Отума"
ONT_nf_c003_desc:0 "З якоїсь причини Отум хоче надати мутантам деякі права — наприклад, нам заборонено стріляти в них, доки вони не порушать наказ. Це може здаватися дивним, але нам потрібно слідувати вказівкам президента."
ONT_nf_c004:0 "Канадська Лазівка"
ONT_nf_c004_desc:0 "Технічно, директиви Отума поширюються тільки на громадян Америки, а канадські мутанти громадянами не є."
ONT_nf_c005:0 "Схеми «Hellfire»"
ONT_nf_c005_desc:0 "Рейвен-Рок розробив новий тип силової броні, який був би дуже корисний для наших військ."
ONT_nf_c006:0 "Проєкт «Велике Озеро»"
ONT_nf_c006_desc:0 "Проєкт «Чистота» забезпечив Рейвен-Рок майже необмеженим запасом чистої води, що дало їм значний контроль на сході США. Нам варто попросити допомоги у створенні власного Проєкту «Чистота»."
ONT_nf_c007:0 "Запасний План"
ONT_nf_c007_desc:0 "Рейвен-Рок упав, але це був не єдиний форпост Анклаву. Ми зафіксували передачі з великого посту в Чикаго. Разом ми зможемо помститися за наших співвітчизників, що впали від рук мутантських орд."
ONT_nf_c008:0 "Це Тільки Ми"
ONT_nf_c008_desc:0 "Рейвен-Рок упав, і всі наші спроби зв'язатися з іншими викликають лише перешкоди. Невже ми — останній Анклав, що залишився живим?"
ONT_nf_c009:0 "Виконати Мандат Едему"
ONT_nf_c009_desc:0 "Президент Іден знову взяв під контроль столицю Америки. Разом ми відновимо цю зруйновану націю!"
ONT_nf_c010:0 "Біржа Баффало"
ONT_nf_c010_desc:0 "Служба здоров'я Баффало пропонує нам вигідну угоду. Якщо ми відправимо їм кілька мутантів для «лікування», вони натомість пришлють нам бойових робомозків."
ONT_nf_c011:0 "Запит Матеріальної Підтримки"
ONT_nf_c011_desc:0 "Передова силова броня та плазмова зброя в дефіциті, але, без сумніву, президент зможе виділити частину для своїх улюблених губернаторів територій."
ONT_nf_c012:0 "Надішліть Людей!"
ONT_nf_c012_desc:0 "Яка користь від плазмових гвинтівок, якщо в нас немає солдатів, щоб ними стріляти? Нам потрібні підкріплення з Рейвен-Року!"
ONT_nf_c013:0 "Ширяючі Друзі"
ONT_nf_c013_desc:0 "Рейвен-Рок розробив нову версію робо-ока — значно ефективнішу. Ці нові робо-ока моделі «Дюрафрейм» допоможуть нам у поверненні контролю над Канадою."
ONT_nf_c014:0 "Чистий як сніг"
ONT_nf_c014_desc:0 "Президент Іден зробив те, чого не зміг Річардсон — очистив Пустку від мутантів. За допомогою його вчених ми можемо створити власний Проєкт «Чистота» на Великих озерах і забезпечити мутантські маси чистою, «очищеною» водою."
ONT_nf_c015:0 "О, Канадо"
ONT_nf_c015_desc:0 "\n О Канадо, \n наш доме й підкорена земля! \n Істинна людська міць у кожному з нас панує. \n З сяючою зброєю ми бачимо твій схід, \n Істинна Північ — сильна й вільна від мутантів! \n З далеких країв, \n О Канадо, ми стоїмо на сторожі для тебе! \n Нехай Бог береже нашу землю славною та чистою! \n О Канадо, ми стоїмо на сторожі людства!"
ONT_nf_c016:0 "Консолідувати Онтаріо"
ONT_nf_c016_desc:0 "Як ми можемо називатися Анклавом Онтаріо, якщо не контролюємо весь Онтаріо?"
ONT_nf_c017:0 "Серце Промисловості"
ONT_nf_c017_desc:0 "Онтаріо довоєнних часів було серцем канадської промисловості. Багато з цих заводів занепали в століття після Великої війни. За допомогою достатньої кількості робітників із Пустки ми можемо відновити деякі з них."
ONT_nf_c018:0 "Розбити їх"
ONT_nf_c018_desc:0 "Банда авторейдерів продовжує дух упертих канадців, що чинили опір нашій законній окупації. Можливо, вони забули, чому ненавидять Америку, але ми їм нагадаємо."
ONT_nf_c019:0 "Переобладнання Автозаводів"
ONT_nf_c019_desc:0 "Віндзорські Руйнівники підтримували роботу багатьох довоєнних автозаводів у тому чи іншому стані. Ми можемо знайти способи ефективно їх використати."
ONT_nf_c020:0 "Утилізація Автозаводів"
ONT_nf_c020_desc:0 "Навіщо витрачати сили на перебудову цих автозаводів, якщо ми можемо використати їхні ресурси?"
ONT_nf_c021:0 "Укріплення Кордонів"
ONT_nf_c021_desc:0 "Зробивши Віндзор важливим промисловим центром, ми зробимо його ціллю для ворогів. Укріплення кордонів допоможе захистити його."
ONT_nf_c022:0 "Анексія Манітоби"
ONT_nf_c022_desc:0 "Регіон Манітоби за останні два століття був окупований різними жалюгідними самозванцями. Час нагадати їм, що ця Пустка не належить їм."
ONT_nf_c023:0 "Вилучити багатства Манітоби"
ONT_nf_c023_desc:0 "Різні лорди й деспоти наживалися на землі та ресурсах Манітоби. Це багатство по праву належить уряду США."
ONT_nf_c024:0 "Доля Канади"
ONT_nf_c024_desc:0 "Доля ZAX був багато в чому схожий на В.А.Ш.І.Н.Т.О.Н — призначений для допомоги уряду США в контролі над непокірними канадцями. За останні пару століть він трохи вийшов з-під контролю, але перезавантаження В.А.Ш.І.Н.Т.О.Н допоможе нам це виправити."
ONT_nf_c025:0 "Царевбивство"
ONT_nf_c025_desc:0 "Правителем Манітоби був гуль, який вважав себе королем. Його страта має послати мутантам Канади чіткий сигнал, хто тут головний."
ONT_nf_c026:0 "Канадські Першопрохідці"
ONT_nf_c026_desc:0 "Ще одна сила діє в канадській тундрі під зірками й смугами. Ходять чутки про те, хто вони і що представляють, але перед відправкою військ не завадить розвідати їх поближче."
ONT_nf_c027:0 "Кров На Льоду"
ONT_nf_c027_desc:0 "Прямо на південь від Торонто банда рейдерів практикує жорстоку версію довоєнного хокею. Подивимося, як їхні леза витримають вогонь плазми."
ONT_nf_c028:0 "Фінальний Матч"
ONT_nf_c028_desc:0 "Кілька спійманих живими хокейних фанатів будуть корисні. Останній хокейний матч у Канаді стане чудовою розвагою для наших втомлених солдатів і командирів."
ONT_nf_c029:0 "Привід Хозерів"
ONT_nf_c029_desc:0 "Ці «Хозери» не надто переймаються тим, кого вбивають, аби вбивати. Якщо тримати їх на короткому повідку, вони можуть стати чудовими бойовими псами."
ONT_nf_c030:0 "Дорожній Кордон"
ONT_nf_c030_desc:0 "Кордон між Онтаріо та Східними штатами США всіяний закинутими КПП, уламками та зруйнованими дорогами. Нам слід виправити це, щоб полегшити потік товарів між Канадою та Америкою."
ONT_nf_c031:0 "Анексія Східної Канади"
ONT_nf_c031_desc:0 "На схід від Онтаріо простягаються великі території Канади, нині під владою різних мутантських самозванців. Ми повинні це виправити."
ONT_nf_c032:0 "Відновлення Греблів"
ONT_nf_c032_desc:0 "Нововідвойовані території містять кілька гідроелектростанцій у різному стані руйнування. Їхнє відновлення та підключення до нашої енергомережі має стати пріоритетом."
ONT_nf_c033:0 "Боротьба з Червоним Припливом"
ONT_nf_c033_desc:0 "Центральна Канада була захоплена"
ONT_nf_c034:0 "Зміна Варти"
ONT_nf_c034_desc:0 "Залишки Співдружності стояли разом із Чикаго в нашій війні. Тепер, коли вони переможені, завдання управління Центральною Канадою переходить до нас."
ONT_nf_c035:0 "Кампанія в Саскачевані"
ONT_nf_c035_desc:0 "Центральна Канада — це хаос із дивних мутантів, божевільних ШІ та бродячих воєначальників. Нам належить навести лад."
ONT_nf_c036:0 "Зв'язати Наші Народи"
ONT_nf_c036_desc:0 "Спільне управління Канадою між нами та Залишками Співдружності пов'язане з труднощами. Багато з них можна полегшити, покращивши транспортне сполучення між нашими столицями."
ONT_nf_c037:0 "Тільки Хороші Комуністи"
ONT_nf_c037_desc:0 "Сніг Канади зафарбується в червоний колір кров'ю комуністів. Тільки тоді запанує порядок."
ONT_nf_c038:0 "Військові Трофеї"
ONT_nf_c038_desc:0 "Залишки Співдружності зберігали значний запас технологій, надісланих із Чикаго. Тепер це наше."
ONT_nf_c039:0 "Робоча зона Редмонда"
ONT_nf_c039_desc:0 "Редмонд стане схожим на Торонто: з надійними стінами, автоматичними турелями та невеликим гарнізоном. Мутанти займуться видобутком цінних ресурсів із руїн міста."
ONT_nf_c040:0 "Підтримка розширення на Захід"
ONT_nf_c040_desc:0 "Наше управління Канадою може закінчуватися на кордоні з Залишками Співдружності, але це не означає, що ми не можемо допомогти їм у наведенні ладу в Західній Канаді."
ONT_nf_c041:0 "Друзі в Холодних Місцях"
ONT_nf_c041_desc:0 "Наше співробітництво з Залишками Співдружності принесло значну користь обом сторонам."
ONT_nf_c042:0 "Канадська Торгівля"
ONT_nf_c042_desc:0 "Транс-Канадська залізниця полегшує торгівлю між нами та Залишками Співдружності."
ONT_nf_c043:0 "МИ ПРОЙДЕМО"
ONT_nf_c043_desc:0 "Група мутантів думає, що зможе вічно ховатися від нас у горах. Вони помиляються."
ONT_nf_c044:0 "Західне Узбережжя"
ONT_nf_c044_desc:0 "Пірати, гулі та всілякі виродки бродять по узбережжю Західної Канади. Їхнє вільне панування в регіоні скоро закінчиться."
ONT_nf_c045:0 "Захоплення піратських флотів"
ONT_nf_c045_desc:0 "Ці іржаві корита згодяться, поки ми не зможемо побудувати справжні військові кораблі на заході."
ONT_nf_c046:0 "Царевбивство: Електричне Бугало"
ONT_nf_c046_desc:0 "Не дивно, що ми знову знайшли мутанта, який вважає себе монархом. Цей теж послужить прикладом."
ONT_nf_c047:0 "Експедиція на Аляску"
ONT_nf_c047_desc:0 "Аляска формально не входить до нашої юрисдикції. Однак наші друзі з материка не переймаються відправкою людей для контролю над регіоном. Ми повинні зробити їм послугу й перевірити ситуацію там."
ONT_nf_c048:0 "Розділення Канади"
ONT_nf_c048_desc:0 "На наш подив, Залишки Співдружності — не просто залишок американських окупаційних військ, але й керуються співробітниками Анклаву. У зв'язку з цим ми повинні врегулювати питання територій через суди."
ONT_nf_c049:0 "Гонка за Складами"
ONT_nf_c049_desc:0 "Згідно з картами, принесеними вцілілими з Рейвен-Рок і Чикаго, ще залишилося кілька збройових складів і форпостів, які, можливо, не потрапили до рук ворога. Їхнє захоплення буде життєво важливим для нашого виживання."
ONT_nf_c050:0 "Сигнал із Безпечного Укриття"
ONT_nf_c050_desc:0 "Передайте сигнал по всіх захищених каналах Анклаву. Нехай усі наші співвітчизники, хто слухає, прямують до Торонто."
ONT_nf_c051:0 "Зв'язатися з допоміжними форпостами"
ONT_nf_c051_desc:0 "База ВанБюрен у Флориді, Макартур у Монтані та кілька інших форпостів, можливо, ще стоять. Нам потрібно підтримувати зв'язок і допомагати одне одному, адже ми — все, що залишилося."
ONT_nf_c052:0 "Захист Технічних Даних"
ONT_nf_c052_desc:0 "На Середньому Заході та в Столичних Пустках ще залишаються кілька дослідницьких форпостів, які, можливо, не були захоплені ворогами. Дослідницькі дані з цих форпостів мають потрапити до нас."
ONT_nf_c053:0 "Прапор досі майорить"
ONT_nf_c053_desc:0 "Анклав пережив безліч поразок, але ми все ще стоїмо після всього цього часу. Схоже, ми справжні ті, хто вижив."
ONT_nf_c054:0 "Торгівля Передовим Спорядженням"
ONT_nf_c054_desc:0 "Наша промисловість блідне в порівнянні з Чикаго. У них є запаси передової зброї та техніки, які вони могли б нам відправити, якщо ми підтримаємо їхню військову машину."
ONT_nf_c055:0 "Прийняти Чиказьких Радників"
ONT_nf_c055_desc:0 "Чикаго успішно придушив повстання серед мутантів. У них є чому повчитися, і вони готові поділитися своїми знаннями з нами."
ONT_nf_c056:0 "Ввічливо відмовитися від Радників"
ONT_nf_c056_desc:0 "При всій повазі до Чикаго, останніми роками ми справлялися цілком успішно. Ми з повагою відхиляємо їхню пропозицію адміністративної підтримки."
ONT_nf_c057:0 "Відправка Дослідників"
ONT_nf_c057_desc:0 "Наші дослідницькі потужності сильно поступаються й будуть такими ще довго. Чикаго, навпаки, має зразкові лабораторії. Чому б не дати нашим найкращим ученим можливість працювати в таких умовах? Зрештою, Чикаго все одно передасть свої результати після ретельного рецензування."
ONT_nf_c058:0 "Стати до строю"
ONT_nf_c058_desc:0 "Нещодавня розмова між нами та Чикаго змушує поглянути на речі по-іншому."

### Decisions ###
ONT_great_lake_purity_decision:0 "Побудувати Проєкт «Велике Озеро»"
ONT_great_lake_purity_decision_desc:0 "Вчені з Рейвен-Року передали нам креслення для відтворення Проєкту «Чистота» на озері Онтаріо. Це буде грандіозне підприємство, але майже необмежений запас чистої води значно допоможе нам розширити наше панування над Канадою."

### Events ###
ONT_nf_events.1.title:0 "План Б"
ONT_nf_events.1.desc:0 "Тижнями ми чекали сигналу з Контрольної станції АНКЛАВ, щоб дізнатися, чи очистив ВБО-Curling-13 планету. Усі спроби зв'язатися з установкою зустрічали лише перешкоди, і стало ясно — сталося щось жахливе. Зрештою було вирішено відправити розвідників перевірити стан канадських пусток. Вони повернулися з тривожними звістками: пустка все ще кишить комуністичними канадськими мутантами. Стало очевидно, що якщо й Канаду повернути Америці, то Анклаву Онтаріо доведеться зробити це самостійно. Були розроблені плани, і всі вони починалися з повернення Торонто. Головне питання — з чого почати атаку?"
ONT_nf_events.1.a:0 "Ми забезпечили безпеку довоєнних складів зброї."
ONT_nf_events.1.b:0 "Ми націлилися на промислові центри."
ONT_nf_events.1.c:0 "Ми знесли електростанції, що залишилися."
ONT_nf_events.1.d:0 "Ми завдали удару по центрах заселення мутантами."
ONT_nf_events.2.title:0 "Просте рішення"
ONT_nf_events.2.desc:0 "Підкорення мутантів Торонто виявилося легким завданням — вони були роз'єднані й не могли протистояти Анклаву. Тих, хто здавався, поневолювали й змушували відновлювати місто, поки вчені завзято працювали над способами масового знищення мутантів у майбутньому. Перші кілька років усе йшло гладко, але потім мутанти почали чинити опір. На кожне придушене дрібне повстання виникало одразу два нових. Ситуація загрожувала вийти з-під контролю, поки командування не знайшло рішення. Глибоко під руїнами Торонто знаходився бункер із передовим комп'ютером ZAX під назвою В.А.Ш.І.Н.Т.О.Н, який був запрограмований допомагати армії США в утриманні контролю над канадським населенням. \n \n Машина мала бути активною, але ніхто в бункері не питав, чому вона мовчить. \n \n Після повторного ввімкнення та ідентифікації себе як Уряд США, команда зрозуміла причину відключення: незадовго до падіння бомб якийсь проклятий канадський комуніст вніс у ZAX вірус, що перетворив його на антиамериканське чудовисько. Команда з повторної активації ZAX була швидко придушена автоматичними системами захисту, а невдовзі військові роботи заполонили Торонто, атакуючи персонал Анклаву. Мутанти взяли до рук зброю й об'єдналися з машинами. Тільки завдяки самопожертві небагатьох відважних вдалося стримати натиск машин."
ONT_nf_events.2.a:0 "Багато хоробрих солдатів загинуло, щоб виграти нам час."
ONT_nf_events.2.b:0 "Наші найсвітліші уми створили потужний ЕМІ, перш ніж були захоплені."
ONT_nf_events.2.c:0 "Команда Омега загинула під час відволікаючого маневру."
ONT_nf_events.2.d:0 "Деякі цивільні отримали неправильні накази про евакуацію."
ONT_nf_events.3.title:0 "Допомога з Рейвен-Року"
ONT_nf_events.3.desc:0 "Незадовго до того, як були зруйновані комунікації широкого радіусу, нам вдалося відправити сигнал із проханням про допомогу на частотах Анклаву. На щастя, ми не кричали в порожнечу — через кілька днів із Рейвен-Року прийшла відповідь: дюжина вертибердів із підкріпленням. Однак надія, яку приніс Рейвен-Рок, виявилася недовгою. Мутантів і машин було занадто багато, і всі підкріплення лише виграли нам час, щоб забезпечити безпеку важливого об'єкта й відступити назад до командного бункера, прихопивши..."
ONT_nf_events.3.a:0 "Передові креслення."
ONT_nf_events.3.b:0 "Ящики з водяними мікросхемами."
ONT_nf_events.3.c:0 "Прототипи зброї."
ONT_nf_events.3.d:0 "Люди — наш головний актив."
ONT_nf_events.4.title:0 "Хвилини до півночі"
ONT_nf_events.4.desc:0 "Командний бункер Онтаріо не був розрахований на роботу довше 150 років. За останні три десятиліття ми зробили все можливе, щоб зберегти наш дім від руйнування. Крила закривалися, обладнання розбиралося на запчастини, а кілька разів вилазили команди для пошуку деталей для заміни. Усе це було лише спробою виграти час, і кожен розумів, що прийде день, коли доведеться покинути бункер. Цей день стрімко наближається. Навіть найоптимістичніші прогнози не дають бункеру протриматися більше п'яти років. Щоб вижити, нам доведеться знову вийти в пустки. Але перш ніж це зробити, нам належить ретельно підготуватися."
ONT_nf_events.4.a:0 "Третього шансу не буде."
ONT_nf_events.5.title:0 "Після всього цього часу"
ONT_nf_events.5.desc:0 "Платформа, Рейвен-Рок, Чикаго — на шляху порятунку людства ми зазнали безлічі втрат. Незліченні життя були обірвані загрозою мутантів. Мутанти, мерзота і навіть комуністи спустошують цю колись велику націю. І все ж прапор, як і раніше, майорить. Ми все ще стоїмо. Людство все ще живе. Хоча нас мало, у нас є те, чого ніколи не зможуть зламати ці безбожні мутанти — незламний людський дух. Доки хоча б один із нас дихає, людство буде жити. Ми не здамося. Ми очистимо цю країну від тієї погані, що її вразила."
ONT_nf_events.5.a:0 "Ми обов'язково переможемо."
ONT_nf_events.6.title:0 "У цих стінах"
ONT_nf_events.6.desc:0 "Коли багато років тому ми відступили назад у командний бункер Онтаріо, за собою залишили багато хорошого спорядження. Плазмові гвинтівки були відкинуті, коли мікроядерні батареї вичерпалися. Термінали та технічне обладнання залишилися в оточених аванпостах. Сотні комплектів силової броні залишилися разом із тілами тих, хто загинув у них. Тим не менш, ми зберегли все, що могли. Коли бункер закривали, одним із перших завдань була інвентаризація спорядження: \n\n - 72 комплекти силової броні X-01 \n\n - 328 комплектів силової броні T-51b \n\n - 216 плазмових гвинтівок Winchester P94 \n\n - 63 лазерних гвинтівки Wattz 2000 \n\n - 24 лазерних гатлінга L30 \n \n - 31 Велика базука Rockwell \n \n - 2 ящики плазмових гранат \n \n - 281 одиниця дрібної стрілецької зброї \n \n Через 30 років майже все це спорядження зникло. У нас залишилося всього 14 комплектів робочої силової броні та 20 справних плазмових гвинтівок. Решта обладнання не загинуло від іржі, боїв або падінь у ліфтові шахти — його розібрали на корисні деталі. У нас ціла комора повна розібраних комплектів силової броні. Їхня гідравліка використовується для ремонту дверей, радіотехніка — для заміни зношених інтеркомів, навіть системи переробки сечі служать для лагодження очисних установок. Ледве чи можна пройти коридором, не побачивши якусь техніку, до якої прикручена деталь від силової броні, щоб вона продовжувала працювати. Відновити частину цього обладнання можливо, але тільки ціною виривання деталей зі стін."
ONT_nf_events.6.a:0 "Важкий вибір."
ONT_nf_events.7.title:0 "Різка зупинка"
ONT_nf_events.7.desc:0 "Фабрикатори командного бункера Онтаріо вже давно працюють на межі своїх можливостей. Майже 200 років ці машини забезпечували нас усім — від їжі до голографічних стрічок, але тепер ми ледве можемо підтримувати їхню роботу достатньо довго, щоб виробляти лише найнеобхідніше. Ми не можемо сильно навантажувати їх далі, але за правильного планування зможемо випускати трохи більше, ніж просто базовий мінімум."
ONT_nf_events.7.a:0 "Ми не можемо просто зробити більше деталей для фабрикатора?"
ONT_nf_events.8.title:0 "Нескінченний дозор"
ONT_nf_events.8.desc:0 "Якщо є щось, на чому ми не економили останні 30 років, так це на обороні нашого бункера. Ті, хто пережив бої в Торонто, знали: якщо нас виявлять, єдиним бар'єром між нами та ордами мутантів стануть саме ці автоматичні системи захисту. Наші турелі завжди отримували необхідні запчастини, а охоронні роботи були першими, хто проходив технічне обслуговування. Тепер, коли ми готуємося вийти назовні, нам належить серйозно замислитися: чи варто зберігати ці системи в робочому стані?"
ONT_nf_events.8.a:0 "Важливе рішення."
ONT_nf_events.9.title:0 "Найкращі давно мертві"
ONT_nf_events.9.desc:0 "Коли ми вперше вийшли в пустки після знищення Платформи, наші війська вселяли страх. Солдати були екіпіровані краще за всіх і проходили найкращу підготовку. Кожен із них із підліткового віку тренувався в передових VR-капсулах, б'ючись у сотнях віртуальних боїв ще до того, як зробив перший постріл. Офіцери проводили незліченні години, вивчаючи великі військові сторінки Америки і навіть небагатьох іноземних лідерів, гідних пам'яті. Майже всі вони загинули в боях. З невеликими винятками, ті, хто вижив, надто старі для служби в бойових частинах. Їхні діти й онуки не пішли їхніми стопами — вони все життя вчилися тримати в руках гайковий ключ, а не гвинтівку. Вони вміють розбирати пневматичний дверний замок, але не знають тактики піхотного бою. У нас залишилося дуже мало часу, щоб виправити це, перш ніж доведеться відправляти їх на поле бою."
ONT_nf_events.9.a:0 "Чи можемо ми дійсно їх підготувати?"
ONT_nf_events.10.title:0 "Розставити крапки над «і»"
ONT_nf_events.10.desc:0 "Останні з наших солдатів нещодавно завершили навчання, у них є вся зброя, яку ми змогли зібрати, а наші склади заповнені так повно, як це тільки можливо. Однак сумнівно, що цього буде достатньо для впевненої перемоги. Є кілька варіантів дій, але час стрімко спливає, і нам потрібно не витрачати його даремно на останні приготування."
ONT_nf_events.10.a:0 "Час спливає."
ONT_nf_events.11.title:0 "Злісний привид"
ONT_nf_events.11.desc:0 "Мало хто в Ронто досить дорослий, щоб пам'ятати тих, хто колись правив містом, але В.А.Ш.І.Н.Т.О.Н пам'ятає. Анклав, як вони себе називали, були залишками найгірших рис Імперіалістів, що захопили ці землі. Вдягнені в чорну силову броню й озброєні смертоносною енергетичною зброєю, вони вважали себе непереможними. Ми довели протилежне й вигнали їх. Ми були впевнені, що вони всі загинули в холоді.\n\n Ми помилялися. \n\n Надходять дедалі нові повідомлення про напади зі сходу. Солдати в тій самій чорній броні, з тією самою смертоносною зброєю і з тими самими цілями — поневолити нас."
ONT_nf_events.11.a:0 "§RМи їм не дозволимо§!"
ONT_nf_events.12.title:0 "Клацання перемикача"
ONT_nf_events.12.desc:0 "Пройшовши через незліченних мутантів, сотні роботів і десятки автоматичних турелей, ми нарешті дісталися до панелі управління В.А.Ш.І.Н.Т.О.Н. Вимкнути машину виявилося не так просто, як висмикнути виделку або натиснути кілька кнопок, але нам це вдалося. З деактивацією його систем Торонто значною мірою перейшов під наш контроль. Розрізнені осередки опору швидко руйнуються, а ми зуміли витягти ресурси з бункера В.А.Ш.І.Н.Т.О.Н, щоб підтримувати роботу нашого бункера, поки виробляємо подальший план дій."
ONT_nf_events.12.a:0 "Майже не віриться, що ми це зробили."
ONT_nf_events.13.title:0 "Мутанти служать Америці"
ONT_nf_events.13.desc:0 "Під час спостережень за мутантами ми дізналися важливу річ. Серед них є ті, хто з радістю служитиме нам, якщо це дасть їм змогу піднестися над своїми побратимами. Навіть бляшаний значок і іржавий жезл здатні викликати в таких лояльність. Ми почали оснащувати цих мутантів простішою зброєю і доручати їм контроль над своїми. Деякі з них мають справжній талант вселяти страх у мутантське населення — так, що навіть деяких наших офіцерів це б поставило в тінь!"
ONT_nf_events.13.a:0 "Шкода, що вони не люди."
ONT_nf_events.14.title:0 "Контакт із Рейвен-Рок"
ONT_nf_events.14.desc:0 "Нам нарешті вдалося відновити зв'язок із Рейвен-Рок. База була здивована отримати від нас звістку — після багатьох років без відповіді вони майже списали нас із рахунків. [EEN.GetLeader] запевнив нас, що хоча в них теж є свої проблеми, вони готові надати підтримку, як тільки зможуть."
ONT_nf_events.14.a:0 "Принаймні ми не самі."
ONT_nf_events.15.title:0 "Хто-небудь удома?"
ONT_nf_events.15.desc:0 "Ми провели тижні, намагаючись встановити зв'язок із Рейвен-Рок на різних частотах. Кожна спроба зустрічала лише перешкоди, і люди починають втрачати надію на успіх. Ми можемо лише припускати найгірше. У кращому випадку Рейвен-Рок переживає долю, схожу на нашу, і просто вичікує. У гіршому — ми одного разу можемо виявити бункер, повний мерців."
ONT_nf_events.15.a:0 "Ми самі?"
ONT_nf_events.16.title:0 "Вертиберди з Південного Заходу"
ONT_nf_events.16.desc:0 "Рано-вранці наш радар зафіксував майже два десятки вертибердів, що летіли з південного заходу. Невдовзі після цього вони вийшли на зв'язок із проханням про дозвіл на посадку. Вони представилися як члени Анклаву з Чикаго і висловили бажання зустрітися з нашим керівництвом, а також оцінити ситуацію в Торонто. Офіцер, що очолював їхню місію зі встановлення контакту — капітан МакКанлесс — пояснив, що вони перехопили наші неодноразові виклики Рейвен-Року, відстежуючи канали в пошуках тих, хто вижив після поразки Анклаву в Столичних Пустках. Капітан також повідомив, що Міністр Внутрішніх Справ прийняв командування над силами Анклаву, що залишилися, включаючи нас. Капітан узяв на себе відповідальність провести інспекцію руїн Торонто та нашого командного центру, після чого він доповість Міністру. Після його звіту нам слід очікувати підтримки та нових наказів."
ONT_nf_events.16.a:0 "Підтримка — це добре звучить."
ONT_nf_events.17.title:0 "Вертиберди з Півдня"
ONT_nf_events.17.desc:0 "Рано-вранці наш радар зафіксував майже дюжину вертибердів, що летіли з півдня. Невдовзі після цього вони вийшли на зв'язок із проханням про дозвіл на посадку. Вони представилися як члени Анклаву з Вашингтона і висловили бажання зустрітися з нашим керівництвом. Їх очолював капітан на ім'я О'Райлі, який повідомив, що вони, ймовірно, є єдиними вцілілими членами Анклаву зі Столичної Пустки. За його словами, Рейвен-Рок був захоплений мутантами, а ті, хто зумів вижити, перегрупувалися, але їх швидко виявили і на новій базі. Капітан також повідомив, що близько половини їхнього загону вирушили на захід, щоб зв'язатися з базою в Чикаго, але так і не повернулися за іншими. Вони самі майже вирушили на захід, коли перехопили наші спроби зв'язатися з Рейвен-Рок. Без ретранслятора для зворотного зв'язку їм залишалося лише завантажити вертиберди, що залишилися, і попрямувати на північ. Капітан і його група тих, хто вижив, готові служити."
ONT_nf_events.17.a:0 "Ласкаво просимо на борт, чоловіки!"
ONT_nf_events.18.title:0 "Привітання від Онтаріо"
ONT_nf_events.18.desc:0 "Майор Герлі, командир Анклаву Онтаріо, надіслав свої привітання [EEN.GetLeader] із придушенням мутантів у Столичних Пустках. Майор повідомив, що нещодавно вони досягли подібних успіхів на своїй території і запросив [EEN.GetLeader] відвідати їх, коли ситуація в наших регіонах стабілізується."
ONT_nf_events.18.a:0 "Приємно бачити, що вони знають, хто тут головний."
ONT_nf_events.19.title:0 "Звіт із Онтаріо"
ONT_nf_events.19.desc:0 "Ми отримали доповідь від капітана МакКанлесса про ситуацію в Онтаріо. Він повідомляє, що сигнали, які ми перехопили на частотах Рейвен-Року, дійсно виходили від посту Анклаву в Канаді. У звіті містяться подробиці про солдатів, що займають цей регіон, а також про наявність ресурсів. За словами капітана, так званий Анклав Онтаріо гостро потребує людей та обладнання, але при цьому має величезні запаси ресурсів у руїнах Торонто. За мінімальних вкладень ми зможемо встановити контроль над цією територією."
ONT_nf_events.19.a:0 "МакКанлесс, можливо, заслужив підвищення за це."
ONT_nf_events.20.title:0 "Дивна угода"
ONT_nf_events.20.desc:0 "Настав час відправити зібраних мутантів Б.М.М.А.У в обмін на частину його «вилікуваних» робомозків для поповнення наших сил. Залишилося відкрите питання — скільки саме мутантів ми готові передати цій машині."
ONT_nf_events.20.a:0 "Ми передумали. Не відправляйте нікого."
ONT_nf_events.20.b:0 "Відправте 250 мутантів."
ONT_nf_events.20.c:0 "Відправте 500 мутантів."
ONT_nf_events.20.d:0 "Відправте 750 мутантів."
ONT_nf_events.21.title:0 "Наша Місія"
ONT_nf_events.21.desc:0 "Ми отримали нові накази з Вашингтона. [EEN.GetLeader] особисто розпорядився, щоб майор Герлі очолив Анклав Онтаріо в завданні із забезпечення контролю над рештою Канади для уряду Сполучених Штатів. Разом із цими наказами прибули кілька вертибердів з особовим складом, обладнанням, а також підвищення для нашого майора."
ONT_nf_events.21.a:0 "У Генерала з'явилася робота."
ONT_nf_events.22.title:0 "Наша Місія"
ONT_nf_events.22.desc:0 "Ми отримали нові накази з Чикаго. [TCE.GetLeader] особисто розпорядився, щоб майор Герлі очолив Анклав Онтаріо в забезпеченні контролю над рештою Східної Канади для уряду Сполучених Штатів. Разом із цими наказами прибули кілька вертибердів з особовим складом, обладнанням, а також підвищення для нашого майора. Нас також поінформували, що в Західній Канаді ведуться операції під керівництвом Чикаго, однак у разі їхньої невдачі нам належить взяти під контроль і цей регіон."
ONT_nf_events.22.a:0 "У Генерала з'явилася робота."
ONT_nf_events.23.title:0 "Наша Місія"
ONT_nf_events.23.desc:0 "Ми фактично залишилися одні. Можливо, десь ще є невеликі осередки Анклаву, але їхнє становище ледве краще за наше. Однак це не змінює нашої мети. Ми зробимо те, що задумали 30 років тому — об'єднаємо Канаду під нашим контролем. Як тільки це буде досягнуто, ми повернемо собі цю велику націю. Це буде нелегко, але це обов'язково станеться. Нехай навіть не в нашому житті, не в житті наших дітей чи онуків — але людство переможе."
ONT_nf_events.23.a:0 "Так, ми це зробимо."
ONT_nf_events.24.title:0 "Кузні Віндзора"
ONT_nf_events.24.desc:0 "Автомобільні заводи Віндзора та прилеглих районів перебувають у відносно хорошому стані порівняно з багатьма фабриками, які ми бачили в Пустках. Не дивно, що так звані «руйнівники» змогли так добре підтримувати свої автомобілі. З невеликими зусиллями ми могли б переобладнати ці заводи для виробництва зброї, роботів або навіть вертибердів. Інженери зазначають, що буде набагато ефективніше спеціалізувати цей регіон на певному виді виробництва, ніж намагатися робити потроху всього."
ONT_nf_events.24.a:0 "Роботи в пріоритеті."
ONT_nf_events.24.b:0 "Сфокусуйтеся на зброї."
ONT_nf_events.24.c:0 "Виробляйте частини для вертибердів."
ONT_nf_events.24.d:0 "Ігноруйте яйцеголових."
ONT_nf_events.25.title:0 "Пекельне шоу"
ONT_nf_events.25.desc:0 "Останніх із Хозерів зібрали в старому хокейному стадіоні в Торонто, щоб влаштувати шоу — і яке це було шоу. Ми не знаємо, чи було це обіцянкою свободи для переможців, чи просто природною дикою жорстокістю мутантів, але ці божевільні фігуристи на льоду розривали одне одного на шматки заради розваги наших військ. За підсумками багатоденного турніру переможців звільнили від їхнього проклятого існування за допомогою плазмового вогню. Після цього забавного відволікання ясно одне. \n\n Ці мутанти поняття не мали, як, чорт забирай, грають у хокей."
ONT_nf_events.25.a:0 "Все ще цікаво дивитися."
ONT_nf_events.26.title:0 "Новини з Аляски"
ONT_nf_events.26.desc:0 "Розвідники, відправлені досліджувати Аляску, повернулися з приблизно тими новинами, яких ми й очікували. Як і решта північних пусток, Аляска вкрита льодом, але все ще кишить мутантами. Значних ресурсів там майже не залишилося — запаси нафти давно вичерпані або знищені мутантами. Тим не менш, місія не була повністю марною: розвідники натрапили на запечатаний склад і повернулися з чималим трофеєм."
ONT_nf_events.26.a:0 "Краще, ніж очікувалося."
ONT_nf_events.27.title:0 "Гонка за Канаду"
ONT_nf_events.27.desc:0 "У повороті подій, якого ми ніяк не очікували, коли всього кілька років тому вийшли з нашого бункера, ми опинилися в ситуації, де ми не єдина присутність Анклаву в Канаді. Група мутантів, що походять від американських військовослужбовців і діють як свого роду пішак Міністра, захопила значну частину території Канади. Незважаючи на наші заперечення проти того, щоб мутанти керували тим, що по праву є американською землею, [EEN.GetLeader] погодився дозволити цьому тривати. Він наполягає, щоб ми знайшли спосіб співпрацювати з [COM.GetTag]. Також було прийнято рішення, всупереч нашим запереченням, дотримуватися політики «хто першим завоює — той і володіє» щодо територій у Канаді."
ONT_nf_events.27.a:0 "Тоді нам потрібно вирушати."
ONT_nf_events.28.title:0 "Поповнення"
ONT_nf_events.28.desc:0 "Кілька тижнів тому ми передали сигнал на всіх частотах Анклаву. Цей сигнал повідомив усім, хто слухав, де ще живе Америка. Ті, хто вижив у Вашингтоні, Чикаго або де б там не було, за ці тижні поступово підтягувалися сюди. Їх небагато, багато з них ледь не втратили волю до боротьби, але вони прийшли. Тепер ці люди знову знайшли свою мету. Вони готові битися. Вони готові помститися."
ONT_nf_events.28.a:0 "Вони це отримають."
ONT_nf_events.29.title:0 "Відповідь від ВанБюрена"
ONT_nf_events.29.desc:0 "Ми отримали повідомлення з авіабази ВанБюрен, у якому говориться, що, принаймні у Флориді, все ще залишилися справжні американці, які тримаються. Вони знаходяться далеко звідси і, як і ми, стикаються з безліччю власних проблем. Тому вони не можуть прислати нам нічого, крім своїх досліджень, і сподіваються, що в майбутньому ми зможемо надавати одне одному більш суттєву допомогу."
ONT_nf_events.29.a:0 "Принаймні вони живі."
ONT_nf_events.30.title:0 "Відповідь від Макартура"
ONT_nf_events.30.desc:0 "Ми отримали повідомлення з бази Макартур у Монтані, яка раніше була форпостом Чикаго. Їхня відповідь була, м'яко кажучи, ухильною, і, схоже, у них майже не було взаємодії з нами. Що саме там сталося — невідомо, але, можливо, колись ми дізнаємося правду."
ONT_nf_events.30.a:0 "Дуже дивно."
ONT_nf_events.31.title:0 "Інший Канадаклав?"
ONT_nf_events.31.desc:0 "Ми отримали звістку із Західної Канади від групи, що називає себе Військовою Адміністрацією Анклаву. Їхня розповідь була дивною: мутанти, що походять від американських солдатів, спочатку підкорялися Чикаго, потім втратили призначеного Чикаго маріонеткового лідера, після чого настав тривалий період воєнного стану. Якщо їхні слова правдиві, то в нас є союзники зовсім недалеко."
ONT_nf_events.31.a:0 "Цього ми точно не очікували."
ONT_nf_events.32.title:0 "Занадто мало часу"
ONT_nf_events.32.desc:0 "Після допиту тих, хто вижив зі Столичної Пустки, нам стало відомо про кілька дослідницьких пунктів, які можуть містити цінні дані. Там зберігається все — від креслень передової силової броні до секретів управління кігтями смерті, — все це знаходиться в базах даних і чекає, щоб бути захопленим. Швидше за все, багато з цих пунктів вже на межі того, щоб потрапити до рук мутантів. Наші офіцери розділилися: одні наполягають на зосередженні зусиль на захопленні одного з дослідницьких пунктів, інші пропонують розподілити сили, ризикуючи не отримати нічого."
ONT_nf_events.32.a:0 "Захистити лабораторію Кігтів Смерті."
ONT_nf_events.32.b:0 "Захистити креслення «hellfire»."
ONT_nf_events.32.c:0 "Захистити креслення робо-ока."
ONT_nf_events.32.d:0 "Захистити креслення силової броні «Tesla»."
ONT_nf_events.32.e:0 "Все або нічого!"
ONT_nf_events.33.title:0 "Зростаючі вимоги"
ONT_nf_events.33.desc:0 "Вимоги з Чикаго стають дедалі жорсткішими і все менше нагадують прохання. Обмін матеріалів на обладнання був логічним кроком — чому б нашим ученим не скористатися лабораторіями Чикаго? Але ці нові квоти, які вони нам надсилають, надто великі. Якщо ми спробуємо їх виконати, у нас ледве чи залишиться достатньо дослідників і ресурсів для власних потреб. Очевидним рішенням було б відмовитися від цих вимог, але схоже, що вони не приймуть таку відповідь."
ONT_nf_events.33.a:0 "Ми виконаємо їхні квоти."
ONT_nf_events.33.b:0 "Нам просто потрібно домовитися."
ONT_nf_events.34.title:0 "Зростаючі вимоги"
ONT_nf_events.34.desc:0 "Вимоги з Чикаго стають дедалі жорсткішими і звучать все менше як прохання. Ми готові допомагати нашим співвітчизникам, але це вже занадто. Якщо ми спробуємо виконати ці квоти, у нас ледве чи залишиться достатньо дослідників і ресурсів для власних потреб. Очевидним рішенням було б відмовитися від цих вимог, але схоже, що вони не приймуть таку відповідь."
ONT_nf_events.34.a:0 "Ми виконаємо їхні квоти."
ONT_nf_events.34.b:0 "Нам просто потрібно домовитися."
ONT_nf_events.34.c:0 "Нагадайте їм, що нам ніколи не потрібна була їхня допомога."
ONT_nf_events.35.title:0 "Гонка за Канаду"
ONT_nf_events.35.desc:0 "У повороті подій, якого ми ніяк не очікували, коли кілька років тому вийшли з нашого бункера, ми зіткнулися з тим, що в Канаді присутній не один Анклав. Група мутантів, що походять від американських військовослужбовців і виступають у ролі свого роду маріонеток Міністра, захопила значну територію в Канаді. Незважаючи на наші заперечення проти того, щоб мутанти керували землею, яка по праву належить Америці, ми змушені слідувати директивам Чикаго. Чикаго наполягає на тому, щоб ми знайшли спосіб співпрацювати з [COM.GetTag]. Також було прийнято рішення, всупереч нашим запереченням, що в питаннях територіального контролю в Канаді діє принцип «хто першим захопив — той і володіє»."
ONT_nf_events.35.a:0 "Тоді нам потрібно вирушати."
ONT_nf_events.36.title:0 "Дивна ситуація"
ONT_nf_events.36.desc:0 "У несподіваному повороті подій, якого ми ніяк не чекали, вийшовши з нашого бункера всього кілька років тому, ми виявили, що ми — не єдиний підрозділ Анклаву в Канаді. Група мутантів, що походять від американських військовослужбовців і виступають у ролі маріонеток нині знищеного Анклаву Чикаго, захопила значну територію в Канаді. Незважаючи на їхні заяви про служіння Анклаву, вони залишаються мутантами і повинні бути знищені так само, як і ті, хто був у Торонто."
ONT_nf_events.36.a:0 "Можливо, Ґелліґер зможе стати Наглядачем."
ONT_nf_events.37.title:0 "Зникаючі привиди"
ONT_nf_events.37.desc:0 "Майже так само швидко, як привиди Америки знову з'явилися, щоб переслідувати нас, вони й зникли. Кожен пост на нашому фронті повідомляє, що вже майже два тижні не бачить жодного солдата Анклаву. Спроби відстежити їхнє місцезнаходження не дали результатів — лише кілька розкиданих тіл на снігу. Схоже, ми здобули перемогу, якщо тільки вони знову не ховаються десь у тіні, вичікуючи свого часу."
ONT_nf_events.37.a:0 "Будьте пильні."

