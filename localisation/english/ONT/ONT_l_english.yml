### Ideas ###
ONT_winter_training_idea:0 "Зимова Підготовка"
ONT_winter_training_idea_desc:0 "Наших солдатів навчили орієнтуватися і виживати в замерзлих пустках Канади."
ONT_bunker_luxury_idea:0 "Розкішні будинки-бункери"
ONT_bunker_luxury_idea_desc:0 "Житлові приміщення, в яких мешкають наші люди у відновленому командному бункері, змусять навіть найрозкішніші сховища виглядати як халупи. Хто б не захотів битися, захищаючи такий дім?"
ONT_last_enclave_idea:0 "Останній промінь світла в Темряві"
ONT_last_enclave_idea_desc:0 "Жахи пусток захлеснули наших співвітчизників у Чикаго та Вашингтоні. За винятком кількох розкиданих застав, ми — все, що залишилося. Усвідомлення того, що доля людства лежить на наших плечах, допомагає нашим людям зберігати концентрацію та вірність справі."
ONT_ontario_industry_idea:0 "Промислова Міць Онтаріо"
ONT_ontario_industry_idea_desc:0 "Кілька працюючих фабрик в Онтаріо були відновлені та приведені в бойовий стан. Мутанти-робітники працюють на цих підприємствах, виробляючи зброю, яка служитиме людству."
ONT_windsor_auto_idea:0 "Віндзорські Автозаводи"
ONT_windsor_auto_idea_desc:0 "Автомобільні заводи Віндзора та сусідніх міст були укомплектовані мутантами-рабами для виробництва транспортних засобів для наших військових потреб."
ONT_canadian_trade_idea:0 "Канадська Торгівля"
ONT_canadian_trade_idea_desc:0 "Торгівля між [COM.GetTag] та [ONT.GetTag] принесла вигоду обом сторонам."
ONT_trading_to_chicago_idea:0 "Підтримка від Чикаго"
ONT_trading_to_chicago_idea_desc:0 "Чикаго реквізувало ресурси для забезпечення своєї війни з мутантами на Середньому Заході. Однак ситуація не зовсім одностороння — вони постачають нам обладнання, що залишилося, яке ми з легкістю можемо переробити у відповідне озброєння."
ONT_trade_with_ronto_idea:0 "Поставки Онтаріо"
ONT_trade_with_ronto_idea_desc:0 "Онтаріо постачає нам ресурси для ведення війни. Натомість ми передаємо їм наш мотлох і захоплені мутантські трубчасті гвинтівки. Дуже великодушно з нашого боку."
ONT_shipped_researchers_idea:0 "Укомплектування штатів лабораторій Чикаго"
ONT_shipped_researchers_idea_desc:0 "Небагатьох із наших, хто більше цікавиться наукою, ніж боротьбою з мутантами на полі бою, відправляють у Чикаго для допомоги в їхніх дослідженнях."
ONT_windsor_robot_idea:0 "Віндзорські Робозаводи"
ONT_windsor_robot_idea_desc:0 "Заводи у Віндзорі були переобладнані для виробництва деталей роботів, що підвищило наші виробничі потужності."
ONT_windsor_weapons_idea:0 "Віндзорські Збройові Заводи"
ONT_windsor_weapons_idea_desc:0 "Заводи у Віндзорі були переобладнані для виробництва зброї, що підвищило наші виробничі потужності."
ONT_windsor_aircraft_idea:0 "Віндзорські Літакобудівні Заводи"
ONT_windsor_aircraft_idea_desc:0 "Заводи у Віндзорі були переобладнані для виробництва деталей літальних апаратів, що підвищило наші виробничі потужності."
ONT_windsor_industry_idea:0 "Різноманітні заводи Віндзора"
ONT_windsor_industry_idea_desc:0 "Заводи у Віндзорі були переобладнані для виробництва всього — від зброї до деталей літальних апаратів, що значно підвищило наші виробничі потужності."
ONT_battered_remnants_idea:0 "Пошарпані залишки"
ONT_battered_remnants_idea_desc:0 "Найкращі з нас загинули 30 років тому серед руїн Торонто. Ті, хто залишився, — старі, втомлені й нервові. Наступне покоління не знає, що чекає на них за цими дверима бункера, але нам все одно доведеться зустрітися з цим віч-на-віч."
ONT_failing_bunker_idea:0 "Бункер, що розвалюється"
ONT_failing_bunker_idea_desc:0 "Командний бункер Онтаріо розвалюється на наших очах. Питання вже не в тому, чи нам доведеться покинути його, а коли це станеться. Якщо бункер зазнає краху, нам доведеться тікати з регіону і сподіватися знайти більш придатне для життя місце."
ONT_production_fucked_idea:0 "Відсутність Промисловості"
ONT_production_fucked_idea_desc:0 "Без наших фабрикаторів бункера виробництво необхідного обладнання практично неможливе."
ONT_mutie_slave_industry_idea:0 "Індустрія Мутантів-рабів"
ONT_mutie_slave_industry_idea_desc:0 "Оснащені вибуховими нашийниками та контрольовані наглядачами, ми можемо заповнити цілі заводи мутантами-робітниками."
ONT_wasteland_overseers_1_idea:0 "Пустотні Наглядачі"
ONT_wasteland_overseers_1_idea_desc:0 "Особливо покірних мутантів залучають до контролю над своїми побратимами. Їхньою нагородою стає трохи додаткової їжі та відчуття переваги."
ONT_wasteland_overseers_2_idea:0 "Пустотні Наглядачі"
ONT_wasteland_overseers_2_idea_desc:0 "Особливо покірних мутантів залучають до контролю над своїми побратимами. Їхньою нагородою стає трохи додаткової їжі та відчуття переваги."
ONT_bunker_industry_idea:0 "Промисловість у Бункері"
ONT_bunker_industry_idea_desc:0 "Наші фабрикатори бункера ремонтуються з використанням деталей, зібраних у пустках."
ONT_bunker_fabrication_idea:0 "Бункерні Фабрикатори"
ONT_bunker_fabrication_idea_desc:0 "Наші фабрикатори бункера відновлені настільки, що тепер можуть не лише виготовляти обладнання із зібраних ресурсів, а й самостійно виробляти частину цих ресурсів."
ONT_mutie_liberation_idea:0 "Звільнення мутантів"
ONT_mutie_liberation_idea_desc:0 "Всупереч нашій волі, мутантів більше не можна поневолювати, якщо тільки вони не вчинять злочин. Тепер нам доводиться вигадувати злочини, щоб звинувачувати їх."
ONT_wasteland_police_idea:0 "Поліція з Пустки"
ONT_wasteland_police_idea_desc:0 "Наші наглядачі тепер виконують функції поліції в мутантських громадах. Ми більше не можемо просто платити їм їжею, але вони продовжують підтримувати роботу наших заводів, затримуючи мутантів."
ONT_canadian_slaves_idea:0 "Канадські Мутанти"
ONT_canadian_slaves_idea_desc:0 "За наказом Головнокомандувача, жоден громадянин США не може бути поневолений державою без скоєння злочину. Однак ці мутанти — канадці."
ONT_targeted_industry_idea:0 "Відновлення Промисловості"
ONT_targeted_industry_idea_desc:0 "Після війни в Торонто практично не залишилося промисловості. Те небагато, що було, не пережило напад Анклаву. Понад 30 років потому Ронто все ще відновлюється."
ONT_targeted_power_idea:0 "Відновлення електростанцій"
ONT_targeted_power_idea_desc:0 "Після війни в Торонто практично не залишилося діючих електростанцій. Ті нечисленні, що були, не пережили напад Анклаву. Понад 30 років потому Ронто все ще відновлюється."
ONT_targeted_pop_idea:0 "Відновлення населення"
ONT_targeted_pop_idea_desc:0 "Після війни в Торонто залишилося дуже мало населення. Тисячі загинули під час атаки Анклаву. Понад 30 років потому Ронто все ще відновлюється."
ONT_studied_defenses_idea:0 "Вивчена оборона"
ONT_studied_defenses_idea_desc:0 "Під час підготовки до нашої атаки ми вивчали оборону мутантів, що окупували Торонто."
ONT_stockpiled_meds_idea:0 "Запаси Медикаментів"
ONT_stockpiled_meds_idea_desc:0 "Під час підготовки до нашої атаки ми накопичили запаси медикаментів, щоб врятувати життя наших поранених."
ONT_supply_lines_idea:0 "Лінії постачання підготовлені"
ONT_supply_lines_idea_desc:0 "Під час підготовки до нашої атаки ми зміцнили наші лінії постачання."
ONT_enclave_propaganda_target_idea:0 "Пропаганда Анклаву"
ONT_enclave_propaganda_target_idea_desc:0 "Анклав захопив наші радіохвилі та скидає листівки, щоб підірвати бойовий дух нашого народу!"
ONT_winterized_power_armor_idea:0 "Зимова Силова Броня"
ONT_winterized_power_armor_idea_desc:0 "Використовуючи схеми з Командного бункера Онтаріо, ми розробили покриття для силової броні, яке мінімізує втрати тепла в холодних умовах."
ONT_washington_occupation_idea:0 "Розуміння В.А.Ш.І.Н.Г.Т.О.Н"
ONT_washington_occupation_idea_desc:0 "Окупація довоєнної Канади мало чим відрізнялася від нашої окупації пусток. Тому ми можемо перейняти дещо у В.А.Ш.І.Н.Т.О.Н про те, як тримати цих мутантів у покорі."

###Laws###
ONT_overseers_law:0 "Програма Наглядачів"
ONT_overseers_law_desc:0 "Багато мутантів охоче служать нам, контролюючи своїх побратимів. Дивно, яку лояльність може викликати простий бляшаний значок і трохи додаткових пайків."

### Rule Overrides ###
ONT_override_desc:0 "Ми зможемо відправити солдатів на допомогу нашим друзям у Західній Канаді."

### Tooltips ###
ONT_1_tt:0 "§RНапруження наблизить наш бункер до краху§!"
ONT_2_tt:0 "§GРесурси, які ми заощадимо, дозволять нашому бункеру працювати довше§!"
ONT_3_tt:0 "Це вплине на склад наших підрозділів."
ONT_4_tt:0 "Ці медикаменти допоможуть нам, коли ми почнемо атаку."
ONT_5_tt:0 "Наші роботи безпеки будуть розгорнуті на полі бою."
ONT_6_tt:0 "Наші хлопці вийшли на поле одразу після VR-тренувань."
ONT_7_tt:0 "Наші нещодавно навчені війська вийшли на поле бою."
ONT_8_tt:0 "Наші війська настільки готові, наскільки ми можемо їх підготувати за підручником."
ONT_9_tt:0 "Розвідка оборони противника допоможе вашому початковому наступу."
ONT_10_tt:0 "Це допоможе нам у війні проти Ронто."
ONT_11_tt:0 "Це допоможе деморалізувати мутантів, коли ми нападемо."
ONT_12_tt:0 "Розблокує новий закон про окупацію, який допоможе впоратися з мутантами."
ONT_13_tt:0 "Розблокує В.А.Ш.І.Н..Г.Т.О.Н як культурного радника."
ONT_14_tt:0 "Роботи В.А.Ш.І.Н..Г.Т.О.Н.А тепер будуть битися за нас."
ONT_15_tt:0 "Розблокує закони окупації, щоб зосередити нашу увагу на цінних ресурсах або промисловості, а не на боротьбі з мутантами."
ONT_16_tt:0 "ПОТРІБНО ЩОСЬ"
ONT_17_tt:0 "Це дозволить нам прийняти рішення про будівництво власного Проєкту «Чистота» на озері Онтаріо!"
ONT_18_tt:0 "Хозери прорвуться до ворожих ліній, приймаючи на себе кулі, призначені для американців."
ONT_19_tt:0 "§RКомуністи захопили Канаду!§!"
ONT_20_tt:0 "Доля допоможе нам впоратися з Канадою."
ONT_21_tt:0 "Без Анклаву та комуністів поблизу ми можемо не поспішати з цією кампанією."
ONT_22_tt:0 "Піратські іржаві корита згодяться, поки ми не зможемо побудувати тихоокеанський флот."
ONT_23_tt:0 "Чикаго направить радників, щоб допомогти нам керувати нашою територією — на краще чи на гірше."
ONT_24_tt:0 "Ні, ти не можеш."
ONT_25_tt:0 "Доступно, оскільки ми відмовилися від допомоги Чикаго."
ONT_26_tt:0 "Радники з Чикаго наполягають на цьому."
ONT_27_tt:0 "§RНі, заткнись§!"
ONT_28_tt:0 "Відкриває рішення про запрошення інших Анклавів до нашої фракції, щойно ми з ними межуватимемо."
ONT_29_tt:0 "Це дасть нам трохи часу."
ONT_30_tt:0 "§RБуде вже надто пізно. Нам доведеться відступити й пробиватися в дику місцевість. Шанси на виживання невеликі.§!"
ONT_31_tt:0 "Нам потрібно вирішити, як ми будемо озброювати людей ще до початку їхнього навчання!"
ONT_32_tt:0 "§RПРОЧИТАЙТЕ СВОЇ РІШЕННЯ І ЗВЕРНІТЬ УВАГУ НА ГОДИННИК, ЩО ЦОКАЄ!§!"

