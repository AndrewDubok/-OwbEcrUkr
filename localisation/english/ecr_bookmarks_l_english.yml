l_english:
  ### East Coast Rebirth ###
  EC_NAME:0 "$NEW_NAME$ Східне Узбережжя"
    EC_DESC:0 "£GFX_east_coast          \nПіслявоєнна Америка — це беззаконна, негостинна та безплідна пустка. Більша її частина складається з безплідних пусток, де тільки найсильніші можуть животіти на радіоактивних землях. Велика війна анітрохи не пощадила Схід; однак деякі райони виявилися менш зруйнованими за інші, що дозволило створити невеликі громади, деякі з яких навіть змогли процвітати. У той час як Піттсбург і Вашингтон зазнали масованого бомбардування ядерними боєприпасами, сільські райони, такі як Західна Вірджинія та частини Меріленду, здебільшого вціліли, хоча все ще страждали від мутантів та радіації. По Бостону влучила одна ядерна бомба, яка промахнулася і впала далі на південь.\n\nБільше того, життя в пустці, незалежно від місця, завжди може зламати навіть найсильніших людей. Не секрет, що у випалених пустках живуть клани рейдерів. Ці групи людей силою забирають усе, що можуть, не щадячи майже нікого на своєму шляху. Сумний факт, що не так багато організацій здатні захистити численні мирні племена та маленькі містечка, однак деякі все ж таки стають на захист землі, як-от «Хлопці з Ґрін-Маунтін» або «Рейнджери Райлі» — люта, але добродушна група найманців, що діє з Вашингтона. Навіть «Регуляторів», які поклялися знищити в пустках усяке зло, можна побачити в деяких частинах пусток. Поки життя у східних пустках триває, велика фракція металевих лицарів, відома як Братство Сталі, намагається зробити життя трохи легшим у районах навколо Вашингтона, але війна з Анклавом вже назріває."
  EEN_ECR_DESC:0 "Спочатку це була таємна глибинна держава, що контролювала довоєнні Сполучені Штати, але після Великої війни Анклав пережив важкі часи. Незважаючи на ретельне планування та передові технології, головна база Анклаву на Станції Контролю БУЛА знищена трохи більше 35 років тому, і багато з тих, хто вижив, втекли на схід, до Рейвен-Року. Відтоді зв'язок із допоміжними базами втрачено. Тим не менш, Анклав продовжує існувати. Під керівництвом президента Джона Генрі Ідена Анклав витратив останні три десятиліття на відновлення своєї могутності. Тепер, коли нове покоління готове боротися за свою країну, Анклав починає останні приготування до виходу в пустку, щоб повернути Америку. Відбити її у рейдерів-анархістів, жахливо мутованих супермутантів і, звичайно ж, у своїх старих ворогів — Братства Сталі. Щоб це не коштувало, Анклав відновить мир, порядок і процвітання цієї колись великої нації. А ті, хто виступатиме проти них, будуть усунені назавжди."
  BLN_ECR_DESC:0 "Багато що змінилося з тих пір, як Старійшина Лайонс та його команда паладинів, лицарів і писарів вперше прибули до Столичної Пустки. За роки, що минули з моменту їхнього прибуття до Столичної Пустки, вони не відчували нестачі в конфліктах. Рейдери, гулі та жадібні мешканці пусток самі по собі є проблемою, але є ще й супермутанти. Ці масивні мародери заполонили Столичну Пустку, і головною місією відділення стало їхнє знищення. Однак, не знаючи, звідки вони беруться, все, що вони можуть зробити, це відчайдушно стримувати хвилю. Якби зовнішніх проблем було недостатньо, у Лайонсівському відділенні назрівають негаразди. Ропот несхвалення з боку більш традиційних членів відділення починає зростати. Наступні кілька місяців будуть вирішальними, якщо Старійшина Лайонс хоче зберегти своє відділення, тому що якщо їхні брати покинуть їх, Лайонсівське відділення опиниться в ще більш скрутному становищі."
  PIT_ECR_DESC:0 "Пітт — одне з найстрашніших місць у Пустці, і це недарма. Через канібалів, рейдерів, радіацію, хвороби та рабство, колись велике місто Піттсбург зараз, відверто кажучи, є справжнім пеклом, і якщо ви можете це уявити, раніше було набагато гірше. «Бич Божий», операція Братства Сталі, призвела до багатьох смертей і ще більше людей залишилися зі шрамами на все життя. Але результатом стало піднесення нового лідера в Пітті, Ішмаеля Ашура, колишнього послушника, якого вважали загиблим. Тепер Ашур править Піттом залізною рукою, і багато хто від цього страждає. Але зміни, хороші чи погані, наближаються, і вони можуть визначити долю Пітта та сотень рабів у ньому."
  RIV_ECR_DESC:0 "Рівет-Сіті вже десятиліттями є науковим центром Столичної Пустки. Хоча Анклав і Братство стверджують, що люблять створювати нове, вони поклоняються лише тому, що вже існує, у той час як вчені Рівет-Сіті створюють нові, справді корисні інновації, розробляючи свіжі продукти харчування та передові методи лікування. З часом Рівет-Сіті зможе забезпечити Пустку свіжою водою і перевершити навіть найвидатніші досягнення Старого Світу.\n\nОднак не все так добре. Атаки супермутантів, солдатів Анклаву та організованих рейдерів на Столичну Пустку не залишили Рівет-Сіті неушкодженим, а зіткнення Анклаву та Братства загрожує зруйнувати крихке існування Рівет-Сіті. Прокладати курс через каламутні води завжди непросто.\n\n Це дерево рекомендовано для тих, хто любить гру «в себе»."
  RON_ECR_DESC:0 "Ронто — бастіон на Півночі, надія та мрія поколінь, втілена в його русі опору. До війни, принаймні. Тепер опір американській окупації визначив розвиток наймогутнішої нації в Онтаріо. В.А.Ш.І.Н.Г.Т.О.Н., могутній довоєнний ШІ, охороняє націю з рішучістю прогнати будь-яких американських загарбників, а хокей набув поширення як засіб збереження культури Канади. Однак у зв'язку з великими конфліктами, що назрівають на півдні, та перерозподілом влади в пустках, Ронто доведеться боротися за збереження своєї такої улюбленої незалежності з новою силою. Хто знає, з чим доведеться зіткнутися канадській нації в майбутньому?\n\n§OРонто не завершено та отримає додатковий контент у майбутньому оновленні§!"
  BHS_ECR_DESC:0 "Двісті років тому компанія General Atomics обрала Службу Охорони Здоров'я Баффало в якості випробувального полігону для свого великого досягнення в медицині. Відділ Біомеханічного Медичного Адміністрування, також відомий як Б.М.М.А.У., мав стати лікарем завтрашнього дня. Лікарем, який не міг захворіти, був доступний цілодобово і ніколи не помилявся під час операцій. Б.М.М.А.У. мав зробити революцію в медицині, але тут прийшла Велика війна. Провівши десятиліття, спостерігаючи за жахливими травмами та хворобами, з якими стикалися люди в постядерному світі, Б.М.М.А.У. усвідомив одну важливу річ. Надійність сталі є кращою за слабкість плоті. З часом усе людство має бути врятоване."
  TAL_ECR_DESC:0 "Компанія «Талон» є найбільшою з груп найманців у Пустці. Вони заслужили репутацію безжальних та ефективних, готових на все, якщо ціна відповідна. Але щось відбувається просто за річкою на північ від них. Патрулі згадують, що бачили масивні постаті, які блукають після настання темряви, а деякі згадували про літальні кораблі. Спочатку це відкидали як просто балачки полохливих новачків під час їхнього першого патрулювання, але що, якщо це не так? Чи може це бути новою загрозою для компанії, чи потенційним новим клієнтом?"
  DCS_ECR_DESC:0 "Кілька років тому Дядько Ро об'єднав кілька караванів для спільної роботи заради взаємної вигоди. Коли рейдери в Руїнах Бетесди створили проблеми, ці торговці звернулися по допомогу до поселень, які вони відвідували, і, досягнувши успіху, поселення зрозуміли, що разом вони сильніші. Тепер Столичні Поселення — це пухка конфедерація містечок по всій Столичній Пустці, які забезпечують взаємну оборону та допомогу. Справи йшли добре, але щойно рада зібралася для обговорення кандидатури голови, виникла безліч проблем. Велике Містечко зазнає дедалі більших атак. Кентербері-Коммонс має справу з двома диваками в костюмах, які тероризують їхніх громадян. Найгірше те, що Арефу, здається, перебуває під загрозою справжнісіньких вампірів! А ще є Дейв, лідер окраїнного поселення, який наполягає на тому, що саме він має бути лідером усього альянсу."
  DCR_ECR_DESC:0 "Рейдери нишпорили Столичною Пусткою з того самого дня, як впали бомби. Понад 100 років мандрівні банди тероризували всіх, хто опинявся за стінами поселення, лише зрідка влаштовуючи перестрілки між собою за територію. Однак останніми роками, через Братство, новостворені Столичні Поселення і, звісно, супермутантів, настали важкі часи. Бандам, можливо, доведеться працювати разом, якщо вони хочуть зберегти свій спосіб життя. На щастя, на сцену вийшов цей крутий рейдер на ім'я Раян Брігг, і він каже, що має великий план."
  ANV_ECR_DESC:0 "Які б хибні уявлення не мали сторонні про Андейл, це просто найкраще містечко у Вірджинії. За 200 років, що минули після падіння бомб, тут майже нічого не змінилося, нові покоління продовжують передавати старі добрі американські цінності. Дехто сказав би, що це останнє містечко в Америці, яке досі зберігає Американську Мрію. Є лише кілька речей, які слід пам'ятати. В Андейлі сторонні повинні стежити за своїми манерами, а чоловік повинен класти м'ясо на стіл."
  COR_ECR_DESC:0 "Роки тому Церква Скелі була вигнана зі Скелястих Печер підлими язичниками з Ґрін-Маунтін. Багато хто впав у відчай через вимушений вихід з батьківщини, але завдяки своєму новому лідеру їхній відчай перетворився на лють. Святий Камінчик повів свій народ на завоювання сусідніх племен, несучи світло Скелі простим язичникам. Скелісти тепер витратили роки на нарощування своєї сили, і незабаром настане час почати похід на південь. Повернення до Скелястих Печер стає дедалі ближчим, як і Свята Помста Скелі тим, хто вигнав його обраний народ."
  HOS_ECR_DESC:0 "Подібно до інших банд Онтаріо, Хозери змагаються в кривавому спорті, який вони називають хокей. Хозери — найкращі, або, радше, другі, команда В.А.Ш.І.Н.Г.Т.О.Н. перемагає їх щоразу. Їхній нинішній лідер, Шор, втомився програвати. Вони збираються перебудувати команду. \n\n І вони більше ніколи не програють!"
  NNC_ECR_DESC:0 "Життя лицарів пусток нелегке. Троги постійно приходять з півдня, рейдери завжди шукають легких кришок, а работорговці постійно викрадають мандрівників. Лицарям Нового Нью-Касла досить важко захищати сільську місцевість. Тепер вони повинні турбуватися один про одного. Розум лорда Ланкастера починає тьмяніти, і без лідера це лише питання часу, коли новий лорд очолить круглий стіл."
  GMN_ECR_DESC:0 "«Хлопці з Ґрін-Маунтін» були довоєнними антиурядовими партизанами. У роки, що передували війні, вони були колючкою в боці Уряду Сполучених Штатів. Багато хто з них став гулями після Великої війни і продовжує свою боротьбу, приймаючи добровольців. Вони все ще продовжують свою боротьбу, але не проти уряду, а проти будь-кого, хто намагається нав'язати свою волю незалежним поселенням у їхніх краях."
  ONT_ECR_DESC:0 "Коли Станцію Контролю АНКЛАВ було знищено, Анклав Онтаріо вийшов зі свого командного бункера з наміром захопити канадські пустки за допомогою плазмового вогню. За кількома короткими роками успіху послідували нищівні поразки, які змусили їх кинутися назад до свого бункера. Наступні десятиліття мешканці бункера робили все можливе, щоб підтримувати свої занепадаючі системи в робочому стані. Кожне крило, яке можна було закрити, систему, яку можна було розібрати на частини, або шматок техніки, який можна було розібрати на запчастини, — усе було використано. Роки зробили Анклав Онтаріо слабким і наляканим. Тепер вони спостерігають, як цокотить годинник, знаючи, що з часом у них не залишиться іншого вибору, окрім як вийти в пустку і зустрітися з ворогом, який не забув своєї ненависті. \n \n §R Це складна нація. Не грайте за неї, якщо хочете насолодитися легкою прогулянкою в силовій броні."
  ATB_ECR_DESC:0 "Народжений до Великої війни у великому місті Мейкон, штат Джорджія, пастор Джеймс Говард Мур роками блукав пусткою, маючи при собі лише одяг і Біблію короля Якова, запитуючи себе, чому він живе, коли інші помирають. Коли він знайшов у Вірджинії тих, хто поклоняється Атому, він направив їх до світла Ісуса, і так народилися АтомБаптисти. Тепер він допомагає своїй пастві постійно пильнувати проти язичників, відьом і безумців, що населяють південну Вірджинію."
  AMM_ECR_DESC:0 "Брат Авраам є фактичним лідером Долини Аммана. Прибувши з групою супермутантів-біженців із Міста, його високий інтелект і харизматична натура (для супермутанта) призвели до того, що йому довіряли та любили його брати у Христі. Тепер громада дивиться на нього в ці складні часи."
  FRM_ECR_DESC:0 "Десятиліттями Бідда та її люди були змушені ховатися від болота, що наступало, і божевільних племен, що його населяли. Бідда керувала своїми людьми, проводячи контрольовані випалювання, знищуючи ділянки болота, щоб просто не пускати його до своїх домівок. Тепер, через хаос, спричинений прибуттям Відомих Людей, і те, що Едемський Сад руйнується зсередини, Бідда знаходить нову опору в колись ворожому світі. \n\n§GНадія§!."
  GED_ECR_DESC:0 "Фортуна виросла в сильному Едемі, керована болотами. Вона бачила наближення краху і проповідувала проти занепаду та апатії, що зростали серед інших болотяних оракулів. Коли все почало розвалюватися, вона була єдиною, кого це не здивувало. Тепер Едемський Сад відступив, але як Матріарх свого племені, Фортуна хоче це змінити. Однак з кожним днем її читання віщують загибель, і все менше людей відвідують їх. \n\nВона боїться, що, що б вона не робила, ніщо не врятує Едем."
  KWF_ECR_DESC:0 "Райк — фанатик, але не релігійний. Він бачить у вогні, яким володіють Маршали Вогню, символи більш істинного світу, світу, вільного від божевільного болота та безглуздої балаканини жителів боліт. Він би нічого не хотів більше, ніж щоб усі вони згоріли. У цьому полягає його фанатизм."
  TRN_ECR_DESC:0 "У руїнах за стінами володінь Ашура лежить дика земля, кишать трогами та дикунами, чий розум впав у безумство. Мало хто з тих, хто наважується вийти за огорожу, повертається, але деякі з тих, хто повернувся, розповідали про дивні речі. Чутки кажуть, що серед трогів і дикунів живуть люди, які створили собі життя в старій фортеці, до якої ніхто не може дістатися... чи можуть ці чутки бути правдою?"
