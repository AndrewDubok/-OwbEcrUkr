l_english:
  # conscription laws
  # conscription laws Enclave
  EEN_pure_americans_law:0 "Чистокровні Американці"
  EEN_pure_americans_law_desc:0 "Лише справжнім, генетично чистим американцям довірено привілей захищати нашу велику демократію."
  EEN_wastelander_americans_law:0 "Служба Американців Пусток"
  EEN_wastelander_americans_law_desc:0 "Так звані американці Пусток, які, на жаль, не були захищені від ядерного удару, все ще можуть віддати свої життя за шляхетну мету відновлення цієї великої країни."
  EEN_wastelander_recruitment_law:0 "Вербувальні Центри в Пустках"
  EEN_wastelander_recruitment_law_desc:0 "Якщо ми хочемо досягти наших цілей, нам потрібно буде створити армію, подібної до якої не було з часів Великої війни. Така масова мобілізація вимагатиме зниження стандартів і збільшення витрат, але це необхідно."
  EEN_robot_armies_law:0 "Металева Стіна"
  EEN_robot_armies_law_desc:0 "Навіщо витрачати дорогоцінні американські життя на боротьбу з мутантами? Машини смерті поступово замінять наших військових."
  # officer laws
  # officer laws Enclave
  EEN_enclave_academy_law:0 "Академія офіцерів Отема"
  EEN_enclave_academy_law_desc:0 "Усі потенційні офіцери повинні пройти сувору підготовку в Офіцерській академії Отема. Після місяців виснажливого навчання, випробувань та імітаційних вправ ці офіцери стають одними з найкращих, яких Америка бачила з часів знищення Вест-Пойнту 200 років тому."
  EEN_purged_command_law:0 "Чистка Командування"
  EEN_purged_command_law_desc:0 "Було виявлено, що десятки офіцерів і ветеранів у всій командній структурі Анклаву були причетні до невдалого перевороту Отема. Поки ми не зможемо реструктуризувати та підготувати нове покоління офіцерів, наші нечисленні лояльні офіцери будуть розтягнуті до болючої межі."
  EEN_rebuilding_command_law:0 "Академія офіцерів Едема"
  EEN_rebuilding_command_law_desc:0 "Офіцери Анклаву проходять навчання в Офіцерській академії Едема. Не така сувора, як стара Академія Отема, офіцерська школа приділяє трохи більше уваги індоkтринації та лояльності. Чистка офіцерів після перевороту Отема не повинна повторитися."
  EEN_ai_command_law:0 "Офіцери-ШІ"
  EEN_ai_command_law_desc:0 "Генерали завтрашнього дня вже тут. Потужні комп'ютери, наповнені століттями військової історії та найсвіжішими даними від командних підрозділів «айботів», керують нашими солдатами від найменших загонів до наймасштабніших наступів. Війна ніколи не змінюється, але спосіб, яким ми її ведемо, змінився."
  # outsider laws
  # outsider laws Enclave
  EEN_loyal_outsiders_law:0 "Лояльні Американці"
  EEN_loyal_outsiders_law_desc:0 "Деякі мешканці пусток усвідомлюють свій обов'язок як американці захищати нашу країну. Якщо вони готові віддати своє життя за Америку, чому б не вкласти їм у руки гвинтівку?"
  # mutant recruitment laws
  # mutant recruitment laws Enclave
  EEN_no_muties_law:0 "Мутантам Вхід Заборонено"
  EEN_no_muties_law_desc:0 "Від жахливо мутованих супермутантів до страшенно опромінених ґулів з Підземелля, ніхто, крім найчистіших американців, не допускається до нашої військової служби."
  EEN_limited_ghouls_law:0 "Загони Ґулів"
  EEN_limited_ghouls_law_desc:0 "Щоб захистити життя чистих американців, гулів починають допускати до війська. Розподілені у спеціалізовані підрозділи, ці солдати-ґулі воюють у місцях, куди наші солдати не можуть піти, не ризикуючи отримати екстремальне радіаційне опромінення."
  EEN_super_mutants_law:0 "Солдати-Супермутанти"
  EEN_super_mutants_law_desc:0 "Мешканців пусток, захоплених Анклавом, змушують до служби після перетворення на супермутантів. На щастя, цей процес залишає їм мало спогадів про попереднє життя, і навіть найтупіші мутанти можуть зрозуміти, на що здатний вибуховий нашийник після демонстрації."
  # press laws
  # press laws Enclave
  EEN_eden_radio_programs_law:0 "Радіозвернення Едема"
  EEN_eden_radio_programs_law_desc:0 "Радіо Анклаву — це поєднання ретельно підібраної патріотичної музики та періодичних звернень президента Джона Генрі Едема. Заспокійливий голос Едема та обіцянки кращого майбутнього зігрівають серця навіть найпесимістичніших громадян Анклаву. Навіть деякі мешканці пусток, які ловлять наші передачі, сподіваються на майбутнє, яке обіцяє Анклав цими посланнями в ефірі."
  EEN_militarist_radio_programs_law:0 "Командне Радіо Отема"
  EEN_militarist_radio_programs_law_desc:0 "Радіо Анклаву — це поєднання ретельно підібраної патріотичної музики та періодичних звернень полковника Отема. Хоча Отем не такий харизматичний, як президент Едем, його повідомлення про жахи пусток і місію Анклаву з наведення ладу запевняють наших солдатів у справедливості нашої справи."
  EEN_wasteland_propaganda_radio_programs_law:0 "Пропагандистське Радіо Анклаву"
  EEN_wasteland_propaganda_radio_programs_law_desc:0 "Відтоді, як поширилися чутки про наші спроби знищити все життя в пустці, в Анклаву виникли проблеми з іміджем. Радіо Анклаву виправляє це за допомогою широкого вибору програм. Від патріотичних гімнів до ретельно відредагованих новин, Радіо Анклаву показує мешканцям Пусток гарну сторону Анклаву, навіть якщо деякі речі перебільшені."
  EEN_operational_security_law:0 "Оперативна Безпека"
  EEN_operational_security_law_desc:0 "Наразі діє радіомовчання, і інформація надається лише за принципом необхідності. У нас є плани, які ми не можемо розголошувати зараз, тому що ненависники саботуватимуть нас."
  # trade laws
  # trade laws Enclave
  EEN_isolationist_trade_law:0 "Державна Власність"
  EEN_isolationist_trade_law_desc:0 "У цьому надзвичайному стані національні ресурси цієї країни повинні управлятися Урядом. Торгівля з мутантською загрозою заборонена, і наші громадяни розуміють, що їм, можливо, доведеться обходитися без певних розкошів заради воєнних зусиль."
  EEN_govt_trade_law:0 "Націоналізована Промисловість"
  EEN_govt_trade_law_desc:0 "Певні ресурси та галузі промисловості, необхідні для відновлення Америки, перебувають у безпосередньому віданні Уряду Сполучених Штатів. Комерція все ще існує, малий бізнес процвітає, але всі електростанції та більшість збройових заводів є власністю Уряду США. Крім того, мешканці пусток, які натрапляють на технології чи ресурси, що мають значення для воєнних зусиль, зобов'язані передати їх, причому компенсація є рідкісною, зрештою, це насправді не їхнє. Вони просто знаходять те, що ми загубили."
  EEN_free_trade_law:0 "Вільна Торгівля"
  EEN_free_trade_law_desc:0 "Економіка процвітає завдяки більш ліберальному підходу. Основні частини військової промисловості все ще керуються безпосередньо Анклавом, але частини, які можна передати заповзятливим мешканцям пусток, передаються. Крім того, коли старатель знаходить якусь довоєнну технологію або цінний ресурс, йому компенсують повернення цього Уряду, якому воно по праву належить."

