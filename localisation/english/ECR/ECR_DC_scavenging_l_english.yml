l_english:

    ###Tool Tips###
    ECR_DC_tt_1:0 "Це стане в пригоді..."

    ###Flags###
    ECR_vault_tec_hq_discovered_flag:0 "Штаб-квартиру Волт-Тек було пограбовано"
    ECR_hubris_discovered_flag:0 "Компанію Х'юбріс Комікс розібрали на запчастини"
    ECR_lob_discovered_flag:0 "У LoB Enterprises провели обшук. Цього разу не федерали."
    ECR_dolces_discovered_flag:0 "Мама Дольче закрилася"
    ECR_oasis_discovered_flag:0 "Оазис виявлено!"
    ECR_vault_92_discovered_flag:0 "Сховище 92 пограбовано!"
    ECR_national_guard_depot_discovered_flag:0 "Склад Національної гвардії було зібрано"
    ECR_vault_108_discovered_flag:0 "Сховище 108 було відкрито"
    ECR_hamiltons_discovered_flag:0 "Схованку Гамільтона виявлено"
    ECR_vault_106_discovered_flag:0 "Сховище 106 розібрано на запчастини"
    ECR_vault_112_discovered_flag:0 "Жахи Сховища 112 розкрито"
    ECR_dunwich_explored_flag:0 "Ми зазирнули в темряву"

    ###Decisions###
    ECR_DC_exploring_decision_category:0 "Дослідження Столичної Пустки"
    ECR_DC_exploring_decision_category_desc:0 "Столична Пустка сповнена незайманих таємниць, заборонених руїн та незвіданих жахів. Ми відправимо кілька сміливців у цей незвіданий край і подивимося, що вони зможуть знайти."
    ECR_explore_megaton_area_decision:0 "Дослідити Центральну Пустку"
    ECR_explore_megaton_area_decision_desc:0 "У районі навколо Мегатонни та Великого Міста може бути жвавий рух, але це не означає, що в печерах навколо цих пагорбів нічого не заховано."
    ECR_explore_the_mall_decision:0 "Дослідити власне Вашингтон"
    ECR_explore_the_mall_decision_desc:0 "Руїни Вашингтона, ймовірно, одні з найнебезпечніших руїн у світі, але це просто означає, що більшість хороших речей, мабуть, пролежали незайманими останні 200 років."
    ECR_explore_south_dc_decision:0 "Дослідити Арлінгтон"
    ECR_explore_south_dc_decision_desc:0 "Руїни Арлінгтона, які зливаються з Вашингтоном до такої міри, що їх часто називають просто «південний Вашингтон», так само дозріли для досліджень, як і сам Вашингтон."
    ECR_explore_tenpenny_tower_decision:0 "Дослідити Південно-Центральну Пустку"
    ECR_explore_tenpenny_tower_decision_desc:0 "Окрім тієї старої фабрики роботів і самої вежі, у районі навколо Тенпенні-Тауера мало що варте уваги. Чи так це?"
    ECR_explore_arefu_decision:0 "Дослідити Північно-Центральну Пустку"
    ECR_explore_arefu_decision_desc:0 "Місцевість між Фортом Константин та Олд-Олні сповнена небезпек. Між рейдерами, супермутантами та дикими тваринами є багато що може піти не так для дослідника. Хто не ризикує, той не п'є шампанське."
    ECR_explore_republic_of_dave_decision:0 "Дослідити Північно-Східну Пустку"
    ECR_explore_republic_of_dave_decision_desc:0 "Північно-східну частину Столичної Пустки не дарма називають сракою світу. Але оскільки туди ніхто ніколи не ходить, можливо, там ще залишилися недосліджені місця."
    ECR_explore_canterbury_commons_decision:0 "Дослідити Південно-Східну Пустку"
    ECR_explore_canterbury_commons_decision_desc:0 "На північ від руїн Вашингтона, у південно-східній частині Столичної Пустки, ймовірно, є багато чого, що ми ще не виявили."
    ECR_explore_evergreen_mills_decision:0 "Дослідити Країну Рейдерів"
    ECR_explore_evergreen_mills_decision_desc:0 "Райони, раніше зайняті рейдерами, ймовірно, ніколи не бачили справжніх досліджень. Там може бути чимало цікавих речей для виявлення."
    ECR_explore_codes_decision:0 "Пошук записів родини Келлер"
    ECR_explore_codes_decision_desc:0 "Щоб потрапити всередину бункера Складу Національної гвардії, нам знадобиться серія номерів, які були надані членам давно померлої родини. Якщо нам пощастить, вони могли записати свої номери, як це зробила людина на записі, який ми маємо."
    
    ###Decision Events###
    ECR_explore_decision_events.1.title:0 "Втрачено зв'язок"
    ECR_explore_decision_events.1.desc:0 "Наша дослідницька група так і не повідомила про результати своєї вилазки. Небезпеки пустки забрали ще кілька нещасних душ."
    ECR_explore_decision_events.1.a:0 "Таке життя в пустках"
    ECR_explore_decision_events.2.title:0 "Засада рейдерів"
    ECR_explore_decision_events.2.desc:0 "Банда рейдерів напала на нашу дослідницьку групу, вони зазнали втрат, але відбилися від рейдерів і повернулися живими."
    ECR_explore_decision_events.2.a:0 "Рейдери на нашій території?"
    ECR_explore_decision_events.3.title:0 "Мутанти атакують!"
    ECR_explore_decision_events.3.desc:0 "Нашій дослідницькій групі не пощастило натрапити на зграю мутованих тварин. Їм довелося тікати, і не всі повернулися."
    ECR_explore_decision_events.3.a:0 "Нам потрібна боротьба зі шкідниками"
    ECR_explore_decision_events.4.title:0 "Старі пастки"
    ECR_explore_decision_events.4.desc:0 "Дослідницька група випадково активувала древню пастку, яка вбила кількох з них. Ті, хто вижив, повернулися без подій."
    ECR_explore_decision_events.4.a:0 "Цікаве це мистецтво – виготовлення пасток"
    ECR_explore_decision_events.5.title:0 "Ми нічого не знайшли"
    ECR_explore_decision_events.5.desc:0 "Незважаючи на всі зусилля, дослідники не виявили нічого вартого уваги під час своєї експедиції. Тільки звичайні зруйновані будівлі та іржаві транспортні засоби."
    ECR_explore_decision_events.5.a:0 "Принаймні ніхто не помер"
    ECR_explore_decision_events.6.title:0 "Работорговці схопили їх!"
    ECR_explore_decision_events.6.desc:0 "Тільки один вцілілий повернувся з нашої дослідницької групи, він каже, що работорговці схопили решту команди вночі, коли він справляв нужду в сусідніх кущах."
    ECR_explore_decision_events.6.a:0 "Ці бідні душі"
    ECR_explore_decision_events.6.b:0 "Викупити їхню свободу!"
    ECR_explore_decision_events.6.c:0 "Тут все ще є работорговці?"
    ECR_explore_decision_events.7.title:0 "Засада супермутантів!"
    ECR_explore_decision_events.7.desc:0 "Двоє вцілілих з нашої дослідницької групи повідомляють, що вони були єдиними, хто вижив. Інших було вбито або викрадено після засідки супермутантів."
    ECR_explore_decision_events.7.a:0 "Ганьба"
    ECR_explore_decision_events.7.b:0 "Коли мутанти вже вимруть?"
    ECR_explore_decision_events.8.title:0 "Штаб-квартира Волт-Тек"
    ECR_explore_decision_events.8.desc:0 "Наша дослідницька група передала по радіо, що вони знайшли місце розташування штаб-квартири Волт-Тек. Їм довелося пробиватися крізь хвилі роботів охорони, але вони пройшли живими та отримують доступ до головного комп'ютера будівлі. Дані пошкоджено, і, ймовірно, вони будуть малопридатними. Вони також знайшли місце розташування схованки силової броні Волт-Тек, що б це не було."
    ECR_explore_decision_events.8.a:0 "Звучить корисно"
    ECR_explore_decision_events.9.title:0 "Індустріальний парк Такома"
    ECR_explore_decision_events.9.desc:0 "Дослідницька група повідомила про місцезнаходження величезного промислового комплексу, майже не зачепленого бомбами. Судячи з опису вмісту будівлі, це може дати нам величезний поштовх до нашої промислової потужності."
    ECR_explore_decision_events.9.a:0 "Молодці"
    ECR_explore_decision_events.10.title:0 "Х'юбріс Комікс"
    ECR_explore_decision_events.10.desc:0 "Дослідники натрапили на стару будівлю Х'юбріс Комікс. Там не було нічого цікавого, окрім кількох механізмів, які можна було розібрати на запчастини."
    ECR_explore_decision_events.10.a:0 "Більше вторсировини – це завжди добре"
    ECR_explore_decision_events.11.title:0 "L.O.B. Enterprises"
    ECR_explore_decision_events.11.desc:0 "Наші дослідники знайшли руїни довоєнної компанії з розробки зброї під назвою L.O.B. Enterprises. Їм довелося пробиватися повз військових роботів, тому що, очевидно, ця компанія була захоплена урядом незадовго до Великої війни. Незважаючи на втрати, здобич, здається, того варта. Там була схованка з довоєнною зброєю, а також деякі передові схеми."
    ECR_explore_decision_events.11.a:0 "Ми знайдемо їм хороше застосування"
    ECR_explore_decision_events.12.title:0 "Мама Дольче"
    ECR_explore_decision_events.12.desc:0 "Дослідницька група вступила в тривалу перестрілку з китайськими гулями-комуністами на фабриці Мами Дольче в Арлінгтоні. Через кілька годин стало зрозуміло, що всередині десятки солдатів, і команда відступила без переслідування."
    ECR_explore_decision_events.12.a:0 "Залишити їх у спокої."
    ECR_explore_decision_events.12.b:0 "Повернутися зі штурмовим загоном."
    ECR_explore_decision_events.12.c:0 "Комуністи І гулі? СПАЛИТИ ЇХ ВСІХ"
    ECR_explore_decision_events.13.title:0 "Оазис"
    ECR_explore_decision_events.13.desc:0 "Наші дослідники бачили в пустці чимало дивних речей, але їхня остання знахідка, мабуть, перевершує все. Вони знайшли живі дерева. Ні, не просто живі дерева, а ще й живу, розмовляючу людину-дерево. Дерево називає себе Гарольдом і, мабуть, було гулем із заходу, навколо якого виросло дерево, яке він називає Боб. Гарольд тепер є джерелом пишного лісу, який охороняється культом, що шанує його як бога. Останнє трохи ускладнює справу. Гарольд хоче померти і хоче, щоб ми допомогли йому. Він наполягає, що його культисти зрозуміють, якщо він зможе поговорити з ними перед тим, як справу буде зроблено, але його люди мають інші ідеї. Один із культистів хоче, щоб ми застосували якийсь сік, щоб зупинити ріст Гарольда, але зберегти йому життя, тоді як інший хоче, щоб ми застосували якусь мазь, щоб прискорити ріст."
    ECR_explore_decision_events.13.a:0 "Ми виконаємо його бажання"
    ECR_explore_decision_events.13.b:0 "Стати на бік Берези, щоб зупинити ріст Гарольда"
    ECR_explore_decision_events.13.c:0 "Стати на бік Лавра, щоб прискорити ріст Гарольда"
    ECR_explore_decision_events.13.d:0 "Вбити його вогнем!"
    ECR_explore_decision_events.14.title:0 "Сховище 92"
    ECR_explore_decision_events.14.desc:0 "Наша команда знайшла старе сховище недалеко від Олд-Олні. Як і в багатьох притулках, це був якийсь жахливий експеримент, який закінчився смертю всіх. Сховище являє собою руїни, що розвалюються, сповнені всіляких мутованих тварин, але ми можемо отримати з нього дещо корисне."
    ECR_explore_decision_events.14.a:0 "Ми завжди можемо використати більше брухту"
    ECR_explore_decision_events.15.title:0 "Склад Національної гвардії"
    ECR_explore_decision_events.15.desc:0 "Пробившись повз незліченних роботів та турелей, наша дослідницька група пройшла до самого серця Складу Національної гвардії – арсеналу. Всередині вони знайшли значний запас зброї та спорядження. Вони також знайшли важкі двері до бункера, які відкриються лише за допомогою спеціального цифрового коду. Нам пощастило, що один із дослідників знайшов голострічку з таким кодом під час попередньої експедиції. Тепер нам просто потрібно знайти ще 4."
    ECR_explore_decision_events.15.a:0 "Отже, завдання на пошук."
    ECR_explore_decision_events.15.b:0 "Оминути цю нісенітницю"
    ECR_explore_decision_events.16.title:0 "Сховище 108"
    ECR_explore_decision_events.16.desc:0 "Наші розвідники знайшли сховище у пустці, і, схоже, вони можуть просто увійти туди. Хто знає, що вони знайдуть."
    ECR_explore_decision_events.16.a:0 "Сподіваюся, не черговий жахливий експеримент Волт-Тек, що пішов не так"
    ECR_explore_decision_events.17.title:0 "Гері"
    ECR_explore_decision_events.17.desc:0 "Ми повинні були знати, що, як і майже кожне інше сховище у пустках, сховище 108 було жахливим шоу. Сховище, мабуть, експериментував із клонуванням людей і створив кілька клонів якогось хлопця на ім'я Ґері. Тепер сховище повне клонів Гері, які можуть вимовляти лише своє ім'я і нападають на всіх, кого зустрічають. Наша команда пробилася крізь них, але це було нелегко."
    ECR_explore_decision_events.17.a:0 "Якого біса"
    ECR_explore_decision_events.18.title:0 "Схованка Гамільтона"
    ECR_explore_decision_events.18.desc:0 "Наша команда знайшла схованку зі зброєю, заховану в старій каналізаційній системі. Їм довелося пробиватися повз гніздо радіоскорпіонів і кількох рейдерів, щоб дістатися до неї, але здобич варта зусиль."
    ECR_explore_decision_events.18.a:0 "Завжди потрібно більше зброї"
    ECR_explore_decision_events.19.title:0 "Сховище 106"
    ECR_explore_decision_events.19.desc:0 "Як і кожне інше сховище, про який ми дізнаємося, сховище 106 було зіпсованим експериментом. Цього разу сховище тестувало якийсь галюциногенний газ, який впливає на свідомість усіх, хто його вдихає. Наша команда швидко вийшла звідти, і ми стежимо, щоб люди трималися подалі від цього місця."
    ECR_explore_decision_events.19.a:0 "Принаймні, кайф хороший?"
    ECR_explore_decision_events.19.b:0 "Можливо, є спосіб використати це"
    ECR_explore_decision_events.20.title:0 "Рокополіс"
    ECR_explore_decision_events.20.desc:0 "Втрачене післявоєнне поселення Рокополіс багато хто вважав просто легендою, але наша команда виявила те, що залишилося від цього ізоляціоністського притулку. Схоже, поселення було поневолене та зруйноване, і нічого цінного не залишилося."
    ECR_explore_decision_events.20.a:0 "І все тому, що Дешвуд – сімп"
    ECR_explore_decision_events.20.b:0 "Прикро"
    ECR_explore_decision_events.21.title:0 "Сховище 112"
    ECR_explore_decision_events.21.desc:0 "Наша дослідницька група звітувала довше, ніж зазвичай, і це тому, що вони виявили діюче сховище із дивним поворотом. Мешканці Притулку замкнені в якихось капсулах стазису, які тримають їх підключеними до цифрового світу. Згідно з даними, отриманими з баз даних, Наглядачем цього Притулку є довоєнний вчений на ім'я Станіслас Браун, який мучив мешканців Притулку останні 200 років. Наша команда була близька до того, щоб відключити систему життєзабезпечення жертв, коли вони отримали повідомлення від Доктора всередині. Він знав про те, що вони роблять, і запропонував усе, що завгодно, аби не залишатися в пастці симуляції на самоті. Наші дослідники все ще дуже хочуть здійснити свій план з порятунку мешканців від вічних мук, але Доктор пообіцяв надати свої знання нашій справі, якщо ми залишимо його з його іграшками."
    ECR_explore_decision_events.21.a:0 "Вимикайте живлення"
    ECR_explore_decision_events.21.b:0 "Довоєнний розум – це жахлива річ, яку можна змарнувати"
    ECR_explore_decision_events.22.title:0 "Запис Келлера знайдено!"
    ECR_explore_decision_events.22.desc:0 "Ми знайшли ще один голо-запис родини Келлер. Скоро ми зможемо відкрити бункер Національної гвардії."
    ECR_explore_decision_events.22.a:0 "Добре"
    ECR_explore_decision_events.23.title:0 "Бункер Національної гвардії"
    ECR_explore_decision_events.23.desc:0 "Бункер Національної гвардії нарешті відкрито, і всередині ми знайшли схованку спеціального спорядження. Силова броня, зброя і навіть кілька міні-бомб – все це потрапить до рук наших військових."
    ECR_explore_decision_events.23.a:0 "Що це за MIRV штука?"
    ECR_explore_decision_events.24.title:0 "Останній запис"
