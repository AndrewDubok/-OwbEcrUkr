l_english:
  AMM_Abraham_name:0 "Авраам"
  AMM_Abraham_desc:0 "Брат Авраам є фактичним лідером Долини Аммана. Прибувши з групою біженців-супермутантів із Міста, він завдяки своєму високому інтелекту та харизматичній натурі (для супермутанта) завоював довіру та любов своїх братів у Христі. Тепер громада покладається на нього в ці нелегкі часи."

  APP_Theseus_name:0 "Тесей Ленс"
  APP_Theseus_desc:0 "Титул Тесея, правителя Апокрифії, передавався з покоління в покоління з тих пір, як Тесей Великий обрав своїм наступником Давида Побожного після своєї смерті. Тесей Ленс був обраний за доблесть під час Болотяної війни та захищає Велике Колесо і Бога Морів. Але він страждає від радіаційного отруєння, і його відмова обрати наступника та небажання визнати свою хворобу можуть обернутися бідою для Вартових Апокрифії..."

  LOR_LORENTZ_NAME:0 "Лоренц"
  LOR_LORENTZ_DESC:0 "У дитинстві Лоренц та його сім'я опинилися під гнітом місцевої банди рейдерів. Зрештою цих рейдерів витіснили незнайомці в силовій броні, які потім націлилися на сім'ю Лоренца. У хаосі Лоренца загнали на зруйноване звалище, де його загнав у кут рейдер у силовій броні. Порятунок йому приніс лише закопаний магніт із металобрухту, який відірвав броню від тіла її власника. Хоча його сім'я загинула, Лоренц нарешті отримав можливість піднятися в ієрархії пусток. Роки випробувань та вдосконалення окупилися, коли на Лоренца та його зростаючу групу «вчених» напали самотні паладини по дорозі до Столиці. Ці паладини проникли на ретельно заміноване звалище, і їхні костюми силової броні перетворилися на лахміття через потужні магнітні пастки. Довівши місцевим громадам силу магнетизму, Лоренц тепер має базу, щоб розпочати більш екстравагантні та далекобійні випробування. Можливо, одного дня він зможе покласти край пануванню силової броні над жителями Пустки."
  LOR_FARADAY_NAME:0 "Доктор Фарадей"
  LOR_FARADAY_DESC:0 "Спочатку приваблений Лоренцом завдяки його науковим дослідженням, доктор Фарадей дедалі більше непокоївся за свого партнера по дослідженнях. Божевілля Лоренца різко контрастує зі зростаючим співчуттям доктора Фарадея до людей, змушених жити в Пустці. Фарадей сподівається, що завдяки прогресу вони зможуть почати будувати цивілізацію на цій землі і покласти край багатовіковим руйнуванням, що послідували за ядерною війною."

  COC_radiant_kate_name:0 "Промениста Кейт із Кобальту"
  coc_radiant_kate_desc:0 "§C«Наш шлях — це шлях Поділу та Синтезу. Наш шлях — єдина надія людства на справжнє відродження».§!\n\nПромениста Кейт із Кобальту є другою з Променистих, лідерів Культу. Кейт йде стопами своєї попередниці, Променистої Террен із Кобальту, і бажає лише миру та усамітнення для свого народу. Атом знає, що життя в Західній Вірджинії і без рейдерів, маніяків у силовій броні та інших зовнішніх загарбників і так досить важке."
  coc_unit_leader_name:0 "Сестра Вон"

  OUT_Casdin_name:0 "Протектор Генрі Касдін"
  OUT_Casdin_desc:0 "Генрі Касдін колись був одним із найближчих послідовників старійшини Лайонса та його найлютіших воїнів. У міру того, як Лайонс дедалі більше відходив від ідеалів, у які вірив Касдін, останній почав організовувати послідовників, які поділяли його погляди. Паладини, втомлені битися з супермутантами, захищаючи зневажливих мешканців пусток, і писарі, втомлені від нестачі технологій, які Братство відновлювало. Касдін та його послідовники покинули Братство, захопивши Форт Індепенденс і присвятивши себе початковій місії Братства."

  OUT_McGraw_name:0 "Протектор МакГро"

  OUT_Zhu_name:0 "Захисник Чжу"

  ONN_LEONE_NAME:0 "Провідник Леоне"
  ONN_LEONE_DESC:0 "Родина Леоне не є корінними жителями Західної Вірджинії, вони переїхали сюди близько 200 років тому з першими хвилями біженців із Союзу. Можливо, саме це врятувало його від поганих звичок. Як би там не було, тепер він пасе стадо, практично не бачачи реального світу. Спалена місцевість вже не така небезпечна для нього, як для його предків, але Леоне все ще не спить від страху за свій народ."

  MON_HEAD_RANGER_NAME:0 "Головний рейнджер"
  MON_RANGER_DESC:0 "Головний рейнджер безцільно блукав пустками, покірний примхам долі. Поки він випадково не опинився в глибинах Аппалачів. Вічні пагорби мають звичку впливати на людину: люди потрапляють під опіку гірських хребтів, а ті, своєю чергою, самі дбають про пагорби. З часом дізнаєшся обличчя тих, хто охороняє своє святилище. Головний рейнджер не може сказати, коли він вирішив оселитися в Аппалачах, або коли він почав виконувати накази самопроголошених рейнджерів, або коли він став віддавати накази. Він лише маленька частина історії пагорбів, але він знає, що пагорби пам'ятають кожну істоту, яка їм підкоряється."

  ANV_jack_smith_name:0 "Джек Сміт"
  ANV_jack_smith_desc:0 "Патріарх Андейла, Джек Сміт, закликає всіх своїх громадян голосувати за республіканців на кожних виборах, як і личить добропорядним американцям. Під його керівництвом, заснованим на сімейних цінностях, Андейл не раз доводив, що є найкращим містечком, яке може запропонувати Вірджинія... якщо ви не проти поїдання людей."

  ANV_bill_wilson_name:0 "Білл Вілсон"

  ANV_militia_name:0 "Роберт Вудбері"
  ANV_assjerky_jones_NAME:0 "Засранець Джеркі Джонс"
  ANV_andale_trader_NAME:0 "Джудіт Г'юї"
  ANV_littlehorn_minister_NAME:0 "Літлгорн"

  ANV_obadiah_name:0 "Овдій Блекхолл"
  ANV_obadiah_desc:0 "Овдій — останній живий представник родини Блекголлів. Колись ця родина мала величезне багатство та погану славу в регіоні Пойнт-Лукаут, і тепер їхній останній спадкоємець прагне відновити колишнє становище родини. Хоча він старий і немічний, у його голосі чується величезна сила, і багато хто в Андейлі вірить, що він може привести їх до майбутнього, сповненого небаченої могуті."
  ANV_obadiah_desc_2:0 "§CМи побували в темному серці Данвіча. Ми зайняли своє місце в глибинах Глибокого Храму. Із завершенням Великого Бенкету Уґ-Квалтот повернувся. Тремтіть, черв'яки."

  KWF_CHRISTIAN_NAME:0 "Кухар Крістіан"
  KWF_CHRISTIAN_DESC:0 "Крістіан був одним із тих, хто народився в плавучому чистилищі Атлантики. Він відіграв ключову роль у прийнятті рішень під час першої висадки, забезпечивши повний контроль над узбережжям. Тепер він та його народ повинні навчитися боротися за світ, від якого вони були відрізані 200 років. Відомий Народ створив складну усну історію про те, як і чому вони були ув'язнені на колишньому Атлантичному флоті, і тепер їм потрібно підготувати своїх дітей до боротьби за своє місце на суші. Навіть якщо ця земля — не більше ніж радіоактивне болото."

  afb_security_computer_name:0 "Головний комп'ютер безпеки"
  afb_security_computer_desc:0 "УВАГА! УВАГА! ЦЕ ОБ'ЄКТ, ЩО ОХОРОНЯЄТЬСЯ США. СПРОБИ НЕСАНКЦІОНОВАНОГО ДОСТУПУ БУДУТЬ ПРИДУШЕНІ ІЗ ЗАСТОСУВАННЯМ СМЕРТЕЛЬНОЇ СИЛИ."

  afb_security_bot_186_name:0 "Робот охорони 186"

  TRN_trog_alpha_name:0 "Альфа-трог"
  trn_trog_alpha_desc:0 "Хоч поблизу їх ніколи не бачили, спостерігачі здалеку помітили, що деякі троги поводяться подібно до вовчої зграї, слідуючи за одним альфою, який зазвичай більший і сильніший за решту. Можна побачити, як цей альфа-трог отримує данину від нижчих трогів, а також підштовхує слабших у певних напрямках. Невідомо, чи означає це, що у трогів є якась форма вищого розуму, чи вони просто ті тварини, за яких їх більшість приймає."

  TRN_big_trog_name:0 "Великий трог"

  HAB_maverick_becker_name:0 "Маверік Беккер"
  HAB_maverick_becker_desc:0 "Маверік Беккер досяг того, чого мало кому вдавалося серед ватажків рейдерів з часів Великої війни: постаріти та залишитися при владі. Він досяг цього не тому, що був найгрізнішим або найсильнішим у своїй банді, а завдяки своєму дотепу та чарівності, укладаючи безліч вигідних угод для банди. Вони користуються стабільним постачанням їжі, зрідка отримують жінок із Джонстауна, а також хорошим запасом кришок і набоїв із Пітта. Хоча не всі люди Маверіка достатньо розумні, щоб це зрозуміти, його найближчі помічники розуміють, що це комфортне життя навряд чи триватиме довго, якщо він зникне."

  HAB_craig_boyd_name:0 "Крейґ Бойд"

  HAB_finlay_cook_name:0 "Фінлі Кук"

  JON_duncan_bauer_name:0 "Дункан Бауер"
  JON_duncan_bauer_desc:0 "Трохи більше 20 років тому Дункан Бауер обійняв посаду мера Джонстауна. Зазвичай ця робота полягала у врегулюванні дрібних суперечок у громаді та укладанні торгових угод під час збору врожаю. На жаль для Дункана, на цей час він став свідком наступу армії Ашура на заході та наступу бандитів з Гаррісбурга на сході. Опинившись між двома загрозами і без жодної допомоги, мер Бауер був змушений зробити важкий вибір. Хоча мало хто нарікає на його рішення, прийняті задля збереження громади, ще менше тих, хто його вихваляє. Єдина причина, чому його досі не відсторонили від посади, полягає в тому, що ніхто інший не хоче приймати рішення, які приймає він."

  JON_jenson_moss_name:0 "Дженсон Мосс"

  DOT_governor_holland_name:0 "Губернатор Голланд"
  DOT_governor_holand_desc:0 "Губернатор Голанд був рушійною силою агресивних торговельних стратегій Дуврських Торговців протягом останніх кількох років. Будь-який торговець у басейні, який не підтримує Дувр, швидко виявляє, що його судна заблоковані на річках, стикаються з конкуруючими торговцями, які продають товари собі у збиток, а іноді й із річковими піратами. Хоча Союз Дуврських Торговців офіційно не пов'язаний із морськими розбійниками, він пропонує «захист» торговцям, які дотримуються Хартії Дуврських Торговців і погоджуються відраховувати 20% свого прибутку до скарбниці."

  DOT_eric_anderson_name:0 "Ерік Андерсон"

  DOT_cap_santiana_name:0 "Капітан Сантьяна"
  
  BFI_captain_atkinson_name:0 "Капітан Аткінсон"
  BFI_captain_atkinson_desc:0 "Капітан Аткінсон народився на кораблі і запевняє, що саме там і зустріне свій кінець. Цей моряк, просякнутий морською стихією, користується великою повагою серед своїх послідовників як справжній моряк, який не боїться засунути руки по самі зап'ястя в риб'ячі тельбухи або обпектися від розв'язаного каната. Хоча останнє десятиліття він вів свій народ переважно в мирні часи, на горизонті вже чутні передчуття морської війни, оскільки Дуврські Торговці починають дивитися на північ."

  BFI_cody_gill_name:0 "Коді Гілл"

  GEL_dutchman_name:0 "Голландець"
  GEL_leader_desc:0 "Голландець мовчазний, як і решта амішів Ґелассенгайту. Ніхто за межами Ґелассенгайту не знає, хто насправді ними керує і чи є в них взагалі лідер, але Голландець, схоже, представляє свій народ, коли це необхідно. Навіть на питання, чи є він лідером, чи просто представником, він мовчить. Завжди мовчить."

  BKR_ashley_name:0 "Ешлі Пера"
  bkr_ashley_pera_desc:0 "Ешлі Пера виросла десь на крижаній півночі, далеко від тих місць, куди навіть жителі Ронто не наважуються зайти. Її сім'я втекла від якогось монстра, якого вона пам'ятає лише смутно – видіння пазурів, зубів, сіпаючих кінцівок і безформної маси в дитячій свідомості. Вона була єдиною зі своєї сім'ї, хто вижив. Діставшись до півдня, вона зупинилася і зібрала розрізнених озерних кочівників на південно-східному березі озера Ері. \n\nТепер вона править своєю новою країною як Крижана Королева, ставлячи на чільне місце розвиток свого народу і сподіваючись, що те, що переслідувало її на півночі, ніколи не повернеться."

  WDW_archer_phillips_name:0 "Арчер Філліпс"
  WDW_archer_phillips_DESC:0 "Арчер Філліпс є останнім у довгому ряду володарів руйнівників у Віндзорі. Як і його попередники, він заслужив повагу банди після успішного рейду через міст у Детройт. Він дає ті самі обіцянки, що й останні 200 років: що їхні мерзенні вороги по той бік мосту загинуть, але він усвідомлює те, чого не усвідомлювали його попередники. Щоб перемогти цього ворога, їм, можливо, доведеться спочатку перейняти силу сусідів на сході."

  WDW_terence_fuller_name:0 "Теренс Фуллер"

  DCM_Shepard_name:0 "Шепард"

  DCM_OverlordRake_name:0 "Володар Рейк"

  DCM_Atlas_name:0 "Атлас"

  DCM_Clancy_name:0 "Кленсі"

  DCM_Collossus_name:0 "Колос"

  DCC_gustavo_name:0 "Колоніальний вождь Густаво"
  DCC_gustavo_desc:0 "Колишній начальник служби безпеки Вежі Тенпенні, колоніальний вождь Густаво тепер очолює Аппалацьку колонію. Він править залізною рукою, стежачи за тим, щоб непомірні податки, які стягує Тенпенні, збиралися, а тих, хто чинить опір, піддають показовим покаранням."

  ONT_major_hurley:0 "Майор Герлі"
  ONT_major_hurley_desc:0 "Майор Рік Герлі був найвищим офіцером Анклаву Онтаріо, який повернувся до свого бункера під час відступу в 2245 році. 30 років майор робив усе можливе, щоб утримати разом тих, хто вижив після повстання мутантів. У перші роки після нього, оплакуючи полеглих і переживаючи незліченні збої життєво важливих систем, майор Герлі не давав своїм людям втратити надію на те, що одного дня вони повернуть поверхню. Незважаючи на обіцянки славного тріумфу, він завжди таємно сподівався, що не йому доведеться очолити повернення. Він не з чуток знає, наскільки безжальний зовнішній світ."

  HSY_mattithiah_name:0 "Маттітіа Гохстелтер"
  HSY_mattithiah_desc:0 "Якщо й є щось особливе в Маттітії Гохстелтері, то це цінність наполегливої праці та важливість сім'ї. Дотримуючись цих принципів, він забезпечує успіх своїх співробітників. Торговці стікаються до Герші за якісними товарами та рідкісною розкішшю, яку можна знайти на пустці, – шоколадом. Успіх Герші також привернув небажану увагу, і, хоча стіни Герші-парку трималися роками, зараз вони вже дають тріщини."

  HSY_zedekiah_name:0 "Зедекія Рабер"

  USF_gary_chalmers_name:0 "Гері Чалмерс"
  USF_gary_chalmers_desc:0 "Уродженець Ютіки, супервайзер Чалмерс провів більшу частину юності, подорожуючи вздовж 90-го шосе як охоронець каравану. Після кількох небезпечних ситуацій старіючий охоронець вирішив спробувати свої сили в політиці. Обіцяючи безпеку від банд рейдерів на півдні, мутантів на заході та всього, що відбувалося на сході, Чалмерс набув величезної популярності. Він уже три терміни обіймає посаду супервайзера Ради міст Федерації. Поки він забезпечує безпеку своїх людей, він, ймовірно, зможе забезпечити собі й четвертий термін."
  USF_cotton_toule_name:0 "Коттон Тоул"

  OSH_jason_kane_name:0 "Джейсон Кейн"
  OSH_jason_kane_desc:0 "Нинішній капітан порту Хоуп, Джейсон Кейн, – досвідчений капітан торгових суден Великих озер. Пройшовши шлях від найдальших куточків озера Верхнє до озера Онтаріо, він знає, наскільки небезпечні листопадові шторми і як важливо шанобливо ставитися до вод. Однак насувається не зовсім реальний шторм, через який йому доведеться провести свій народ. Сили наростають у Ронто на заході та на опромінених руїнах Оттави на сході."
  