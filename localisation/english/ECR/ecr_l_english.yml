###Events###
    ecr_generic_events.1.title:0 "Приз Сміттєвого Короля"
    ecr_generic_events.1.desc:0 "Сміттєвий Король не знає, скільки часу в нього залишилося. Він збирається робити дуже дивні речі. Атакуйте парк Герші!"
    ecr_generic_events.1.a:0 "Гаразд?"
    ecr_generic_events.2.title:0 "Трон Сміттєвого Короля"
    ecr_generic_events.2.desc:0 "Сміттєвий Король старіє. Чи зможе він утримати свій трон? Чи настав час призначити нового лідера?"
    ecr_generic_events.2.a:0 "Золотий Бог правитиме вершиною!"
    ecr_generic_events.2.b:0 "Перший — найгірший, обираємо Алюмінієвого Монстра!"
    ecr_generic_events.2.c:0 "Трандл Великий буде правити."
    ecr_generic_events.2.d:0 "Сміттєвий Король не йде на пенсію!"
    ecr_generic_events.3.title:0 "Ще один культ божеволіє"
    ecr_generic_events.3.desc:0 "Церква Роккі збиралася знову напасти на наш народ, але була зупинена Культом Кобальту. Наш народ зрадів, коли загрозу було усунуто, але радість ця була передчасною. Натхненний своєю перемогою, Культ Кобальту просувається країною. Очевидно, що вони скоро прийдуть по нас."
    ecr_generic_events.3.a:0 "Приготуватися!"
    ecr_generic_events.4.title:0 "Ще один культ божеволіє"
    ecr_generic_events.4.desc:0 "Церква Роккі збиралася знову напасти на наш народ, але була зупинена загоном Лоренца. Наш народ зрадів, коли загрозу було усунуто, але радість була передчасною. Натхненні своєю перемогою, члени культу магнетизму рушили країною. Очевидно, що вони скоро прийдуть по нас."
    ecr_generic_events.4.a:0 "Приготуватися!"
    ecr_generic_events.5.title:0 "Оніонбург просить захисту"
    ecr_generic_events.5.desc:0 "Якимось дивом фермери Оніонбурга змогли відбити напад Церкви Роккі. Однак ця боротьба виснажила їхні сили. Вони ледве можуть захистити свої ферми, не кажучи вже про нові кордони. Фермери звернулися до нас із проханням, щоб Ґрін-Маунтін Бойз допомогли захистити їхні домівки."
    ecr_generic_events.5.a:0 "Звісно, ми допоможемо нужденному сусіду."
    ecr_generic_events.6.title:0 "Тут нічого дивитися"
    ecr_generic_events.6.desc:0 "Тут нічого дивитися"
    ecr_generic_events.6.a:0 "Тут нічого дивитися"
    ecr_generic_events.7.title:0 "Тут нічого дивитися"
    ecr_generic_events.7.desc:0 "Тут нічого дивитися"
    ecr_generic_events.7.a:0 "Тут нічого дивитися"
    ecr_generic_events.8.title:0 "Тут нічого дивитися"
    ecr_generic_events.8.desc:0 "Тут нічого дивитися"
    ecr_generic_events.8.a:0 "Тут нічого дивитися"
    ecr_generic_events.9.title:0 "Дивні події"
    ecr_generic_events.9.desc:0 "Неподалік від Тенпенні-Тауера є дивна будівля, якої уникають майже всі збирачі, торговці і навіть рейдери. Стара довоєнна офісна будівля, відома як «Будівля Данвіча», має репутацію місця, куди люди заходять і ніколи не повертаються. Ніхто не знає, що там насправді відбувається, тому що ті небагато людей, яким вдалося вибратися, або відмовляються говорити про це, або їхні розповіді абсолютно незбагненні. Незважаючи на це, наша команда збирачів вирушила туди, і з того часу їх ніхто не бачив. Їхні сім'ї просять нас розібратися в цьому."
    ecr_generic_events.9.a:0 "Ми можемо відправити загін солдатів"
    ecr_generic_events.9.b:0 "Нізащо в біса"
    ecr_generic_events.10.title:0 "Ще більше зниклих"
    ecr_generic_events.10.desc:0 "Людей, яких ми послали розслідувати зникнення в Будівлі Данвіча, з того часу ніхто не бачив. Перехожі підтвердили, що бачили, як вони входили до будівлі, але з того часу ніхто не бачив, як вони виходили, і зв'язку з ними не було. Що могло там статися?"
    ecr_generic_events.10.a:0 "Ми повинні з'ясувати, що сталося"
    ecr_generic_events.10.b:0 "Ми намагалися, але це кінець"
    ecr_generic_events.11.title:0 "Єдиний вцілілий"
    ecr_generic_events.11.desc:0 "Один із членів команди, яку ми відправили до Будівлі Данвіча, повернувся живим. Незважаючи на неодноразові спроби, нам так і не вдалося нічого з'ясувати у цієї людини. Ті кілька разів, коли він все ж таки розмовляв, він ніс абсолютне марення про когось на ім'я Альхазред і про щось під назвою Ґ'єт, після чого заливався сльозами і був невтішним протягом кількох днів. Очевидно, ми ніколи не отримаємо від цієї людини відповідей, які шукаємо."
    ecr_generic_events.11.a:0 "Ми повинні дізнатися!"
    ecr_generic_events.11.b:0 "Деякі таємниці краще залишити похованими"
    ecr_generic_events.12.title:0 "Жменька вцілілих"
    ecr_generic_events.12.desc:0 "Із 15 осіб, яких ми відправили досліджувати Будівлю Данвіча, повернулися троє. Всі вони явно приголомшені тим, що їм довелося пережити, але нам вдалося зібрати докупи дещо з того, що там сталося. Будівля, мабуть, кишить дикими гулями, і якщо цього недостатньо, то історії, які вони розповідають, звучать так, ніби в цьому місці водяться привиди. Ті, хто вижив, кажуть, що вони провели в будівлі місяці, що не може бути правдою, тому що минуло лише кілька тижнів. Вони також розповідають про дивний обсидіановий шпиль у печері під будівлею, який входив у їхні сни і показував їм величезне затоплене місто. Коли їх запитують про зниклих членів команди та інших осіб, які вважалися зниклими безвісти, всі вони дають одну й ту саму відповідь: «Вони в Ґ'єті». Двоє з них були знайдені мертвими з невідомої причини, а третій відмовляється говорити."
    ecr_generic_events.12.a:0 "Тож... нам просто слід уникати цього місця, так?"
    ecr_generic_events.13.title:0 "Східна сила"
    ecr_generic_events.13.desc:0 "Наймогутніші міста Східного узбережжя під нашим контролем. Наші вороги переможені, і навіть Анклав з Братством не можуть становити для нас загрози. У цьому регіоні ми мало що можемо зробити, тому наші погляди повинні бути звернені на захід."
    ecr_generic_events.13.a:0 "Вони не готові до нас"
    ecr_generic_events.14.title:0 "Ще більше зниклих"
    ecr_generic_events.14.desc:0 "Людей, яких ми відправили розслідувати зникнення команд у Будівлі Данвіча, з того часу ніхто не бачив. Як і інші, звіти підтверджують, що востаннє їх бачили такими, що входять до будівлі. Відтоді весь зв'язок втрачено. Стає очевидним, що ця будівля набагато небезпечніша, ніж ми припускали. Але що може бути всередині неї?"
    ecr_generic_events.14.a:0 "МИ ПОВИННІ ДІЗНАТИСЯ, ЩО СТАЛОСЯ"
    ecr_generic_events.14.b:0 "Ми намагалися, але це кінець"
    