###Events###
    ecr_generic_events.1.title:0 "The Trash Man's Prize"
    ecr_generic_events.1.desc:0 "The Trash Man doesn't know how much time he has left. He's going to get real weird with it. Go attack Hershey Park!"
    ecr_generic_events.1.a:0 "Ok?"
    ecr_generic_events.2.title:0 "The Trash Man's Throne"
    ecr_generic_events.2.desc:0 "The Trash Man is getting old. Can he maintain his throne? Or is it time to appoint a new leader?"
    ecr_generic_events.2.a:0 "The Golden God rules the mountain top!"
    ecr_generic_events.2.b:0 "First is worst, choose The Aluminum Monster!"
    ecr_generic_events.2.c:0 "Trundle The Great will reign."
    ecr_generic_events.2.d:0 "The Trash Man isn't retiring!"
    ecr_generic_events.3.title:0 "Another Cult Going Mad"
    ecr_generic_events.3.desc:0 "The Church of Rocky was on the march to once again attack our people, only to be stopped by The Cult of Cobalt. Our people were relieved to have that threat dealt with, but our relief was premature. Emboldened by their victory, The Cult of Cobalt has been sweeping across the countryside. It is clear they will come for us soon."
    ecr_generic_events.3.a:0 "Get ready!"
    ecr_generic_events.4.title:0 "Another Cult Going Mad"
    ecr_generic_events.4.desc:0 "The Church of Rocky was on the march to once again attack our people, only to be stopped by Lorentz's force. Our people were relieved to have that threat dealt with, but our relief was premature. Emboldened by their victory, the magnet cult has been sweeping across the countryside. It is clear they will come for us soon."
    ecr_generic_events.4.a:0 "Get ready!"
    ecr_generic_events.5.title:0 "Onnionburg Requests Protection"
    ecr_generic_events.5.desc:0 "By some miracle, the farmers of Onnionburg was able to fight off The Church of Rocky. However, the fight has left them drained. They can barely protect their farms, let alone their new borders. The farmers have come to us asking that The Green Mountain Boys help protect their homes."
    ecr_generic_events.5.a:0 "Of course we'll help a neighbor in need."
    ecr_generic_events.6.title:0 "Nothing to see here"
    ecr_generic_events.6.desc:0 "Nothing to see here"
    ecr_generic_events.6.a:0 "Nothing to see here"
    ecr_generic_events.7.title:0 "Nothing to see here"
    ecr_generic_events.7.desc:0 "Nothing to see here"
    ecr_generic_events.7.a:0 "Nothing to see here"
    ecr_generic_events.8.title:0 "Nothing to see here"
    ecr_generic_events.8.desc:0 "Nothing to see here"
    ecr_generic_events.8.a:0 "Nothing to see here"
    ecr_generic_events.9.title:0 "Strange happenings"
    ecr_generic_events.9.desc:0 "Down near Tenpenny Tower there is a strange building avoided by nearly all scavengers, traders and even raiders. The old pre-war office building known as the 'Dunwich Building' has had a reputation for being somewhere people go and never return. Nobody knows what really happens in there because the few people that make it out either refuse to talk about it, or are utterly incomprehensible. Despite this, our scavenging team has ventured into the place and they haven't been seen since. Their families are asking us to look into it."
    ecr_generic_events.9.a:0 "We can send a team of soldiers"
    ecr_generic_events.9.b:0 "No way in hell"
    ecr_generic_events.10.title:0 "More Missing"
    ecr_generic_events.10.desc:0 "The men we sent in to investigate the disapperances at the Dunwich Building have not been seen since. Reports from passers-by have confirmed they were seen going into the building, but since then nobody has seen them leave and there has been no contact. What could have happened in there?"
    ecr_generic_events.10.a:0 "We must know what happened"
    ecr_generic_events.10.b:0 "We tried, but this is the end"
    ecr_generic_events.11.title:0 "Lone Survivor"
    ecr_generic_events.11.desc:0 "A single member of the team we sent into The Dunwich Building has returned alive. Despite repeated efforts, we have not been able to find out anything from the man. The few times he does talk he rants absolute giberish about someone named Alhazred and something called G'yeth before breaking down in tears and being inconsolable for days. Clearly we will never get the answers we seek from this man."
    ecr_generic_events.11.a:0 "We must know!"
    ecr_generic_events.11.b:0 "Some secrets are better left buried"
    ecr_generic_events.12.title:0 "A Handful of Surviors"
    ecr_generic_events.12.desc:0 "Three men returned of the 15 we sent to explore The Dunwich Building. They are all visibly shaken by what they experienced, but we have been able to piece together a little of what happened in there. The building is apparently full of feral ghouls and if that wasn't bad enough, the stories they tell make it sound as if the place is haunted. The suvivors say they spent months inside the building which can't be true, because it has only been a few weeks. They also speak of a strange obsidian spire in a cave beneath the building that entered their dreams and showed them a vast sunken city. When asked about the missing team members and original missing persons, they all give the exact same answer. 'They are in G'yeth'. Two of them have since been found dead with no known cause and the third now refuses to speak."
    ecr_generic_events.12.a:0 "So... we should just avoid the place right?"
    ecr_generic_events.13.title:0 "THE Eastern Power"
    ecr_generic_events.13.desc:0 "The mightiest cities on The East Coast are under our control. Our enemies lie defeated and not even The Enclave or The Brotherhood could pose a threat to us. There is little for us to do in this region, and so our eyes must turn West."
    ecr_generic_events.13.a:0 "They aren't ready for us"
    ecr_generic_events.14.title:0 "Even More Missing"
    ecr_generic_events.14.desc:0 "The men we have sent to investigate the missing teams in The Dunwich Building have not been seen since. Like the others, reports have confirmed they were last seen entering the building. Since then all contact has been lost. It is becoming apparent that this building is much more dangerous than we anticipated. But what could be inside it?"
    ecr_generic_events.14.a:0 "WE HAVE TO KNOW WHAT HAPPENED"
    ecr_generic_events.14.b:0 "We tried, but this is the end"
