###Characters###
HOS_the_shore_name:0 "Шор"
HOS_Shore_desc:0 "Шор — єдина дитина Маркера, лідера, який зрозумів, що В.А.Ш.І.Н.Г.Т.О.Н. — це фальшивка і що він заведе гравців у могилу, борючись за якийсь давно згаслий ідеал. Тепер Шор та решта Гравців займаються тим, що вони справді люблять: відчуттям льоду під ногами та командою за спиною. Звісно, ви не зможете грати вічно, але якщо ви просто крадете їжу в кого попало, вам не доведеться витрачати час на її вирощування самостійно."
HOS_bulldog_nick_name:0 "Бульдог Нік"
HOS_bulldog_desc:0 "Бульдог Нік — головний союзник і прихильник Шора, він виступає як головний виконавець як для своєї команди, так і для «Гравців» загалом. Але, хоча Бульдог Нік, можливо, і не найрозумніший хлопець у команді, він іноді задається питанням, чи не веде Шор їх хибним шляхом. Чи був В.А.Ш.І.Н.Г.Т.О.Н. правий? Чи варто їм зосередитися на усуненні тиранів? Бульдог Нік вірить, що розумніші голови, ніж його, в усьому розберуться, і поки він просто задоволений грою."
HOS_jim_1_name:0 "Джим"
HOS_jim_2_name:0 "Джим"
HOS_jim_3_name:0 "Джим"
HOS_jacques_name:0 "Капітан Жак"
HOS_hitchcock_name:0 "Капітан Гічкок"
HOS_yank_name:0 "Капітан Янкі"
HOS_goody_name:0 "Капітан Гуді"

