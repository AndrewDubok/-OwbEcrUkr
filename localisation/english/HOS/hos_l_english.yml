### Events ###
HOS_nf_events.1.title:0 "Найвеличніша гра"
HOS_nf_events.1.desc:0 "У роки після Великої війни багато що було втрачено й забуто. Але навіть атомний вогонь не зміг стерти з пам'яті велику гру — Хокей. Це було екстремальне випробування майстерності, де спортсмени мчали на величезній швидкості, використовуючи ножі, прикріплені до черевиків. Вони били суперників ключками й намагалися забити голи. Як саме забивалися голи? За допомогою ключок били по міні, або «шайбі», як її називали, у людину, закутану в сітку, яку називали воротарем. «Гравці» продовжують цю традицію разом з іншими бандами Східної Канади. «Гравці» вважаються другою найкращою командою. Справжній секрет успіху «Гравців» криється в одному."
HOS_nf_events.1.a:0 "Їхніх жорстких тренуваннях"
HOS_nf_events.1.b:0 "Їхньому сильному складі"
HOS_nf_events.1.c:0 "Їхній командній єдності"
HOS_nf_events.1.d:0 "Їхній ненависті до поразок"
HOS_nf_events.2.title:0 "Залишаючи Ронто"
HOS_nf_events.2.desc:0 "Єдина команда, яка могла перемогти «Гравців», була також єдиною командою, яку вони ніколи не могли перемогти — Ронто В.А.Ш.І.Н.Г.Т.О.Н. Після 20 поразок поспіль, незважаючи на їхню чисельну перевагу, «Гравці» почали підозрювати, що суперник шахраює. Події швидко переросли в бійку, і в справу втрутилися роботи, що охороняли Ронто. Команді довелося швидко забиратися з міста, але вони змогли захопити лише кілька речей."
HOS_nf_events.2.a:0 "Взяти всіх, кого змогли"
HOS_nf_events.2.b:0 "Прихопити ящики зі зброєю"
HOS_nf_events.2.c:0 "Кришки були пріоритетом"
HOS_nf_events.2.d:0 "Додаткові ковзани та накладки"
HOS_nf_events.3.title:0 "Не стадіон, але зійде"
HOS_nf_events.3.desc:0 "На південь від Ронто є територія, яку роботи В.А.Ш.І.Н.Г.Т.О.Н.а майже не патрулюють. У руїнах орудують різні дрібні банди та зграї сміттярів — легка здобич для «Гравців». Якщо ми збираємося відновити команду, нам знадобиться місце більше, ніж наша стара база. Де ж нам облаштуватися?"
HOS_nf_events.3.a:0 "На старій фабриці"
HOS_nf_events.3.b:0 "На ринку сміттярів"
HOS_nf_events.3.c:0 "На ледь працюючій електростанції"
HOS_nf_events.3.d:0 "У лігві работорговців"
HOS_nf_events.4.title:0 "Ми були настільки клято поганими"
HOS_nf_events.4.desc:0 "Довгі роки «Гравці» були непереможними. Жодні дрібні банди, сміттярі чи розлючені поселенці не могли вторгнутися на їхню територію. «Гравці» не могли перестати перемагати, а потім прийшов В.А.Ш.І.Н.Г.Т.О.Н., і вони програли. «Гравці» любили перемагати, але ненавиділи програвати. Багато хто з «Гравців» під час відступу питали себе, чи зможуть вони колись знову перемогти. Діставшись свого нового дому, Шор дав обіцянку."
HOS_nf_events.4.a:0 "«Гравці» ніколи не програють знову"
HOS_nf_events.5.title:0 "Відкриті відбіркові"
HOS_nf_events.5.desc:0 "Лава запасних «Гравців» значно спорожніла після нещодавньої поразки від В.А.Ш.І.Н.Г.Т.О.Н.а. Якщо ми збираємося провести матч-реванш, нам потрібно поповнити склад. Кого ми візьмемо?"
HOS_nf_events.5.a:0 "Місцевих бандитів"
HOS_nf_events.5.b:0 "Місцевих сміттярів"
HOS_nf_events.5.c:0 "Біженців із Ронто"
HOS_nf_events.5.d:0 "Будь-кого, кого знайдемо"
HOS_nf_events.6.title:0 "Залишаючи лід"
HOS_nf_events.6.desc:0 "Якщо Шор чогось і навчився після бою з Ронто, так це тому, що він не може бути всюди одночасно. Щоб вести «Гравців» у майбутнє, Шору доведеться повісити ковзани на цвях і стати лідером поза льодом."
HOS_nf_events.6.a:0 "Нам потрібен новий капітан"
HOS_nf_events.7.title:0 "Довга прогулянка крізь вогонь"
HOS_nf_events.7.desc:0 "Майже 200 років Віндзорські Руйнівники переправляли свої машини через міст у Мічиган. Незважаючи на те, що люди на іншому боці знали про їхнє наближення, швидкість машин дозволяла їм проводити успішні рейди. А без машин? Руйнівники втратили все своє лайно. Жоден із тих рейдерів, що йшли мостом, не наблизився до барикад у кінці мосту ближче ніж на 30 метрів. Бій був одностороннім, але за вибухами іноді все одно цікаво спостерігати."
HOS_nf_events.7.a:0 "Гаразд, повертаємося до рейдів"

###Ideas###
HOS_dfence_idea:0 "Захист"
HOS_dfence_idea_desc:0 "Наші хлопці подбають про те, щоб ворог ніколи не зайшов далеко на нашу половину поля."
HOS_set_the_tone_idea:0 "Задаючи тон"
HOS_set_the_tone_idea_desc:0 "Ми швидко висуваємося і завдаємо потужного удару. Задаємо тон бою й підтримуємо його."
HOS_yank_tactics_idea:0 "Янківська тактика"
HOS_yank_tactics_idea_desc:0 "Янкі знають толк у тому, як затягувати бойові дії вглиб території противника."
HOS_get_focused_idea:0 "Зосереджені"
HOS_get_focused_idea_desc:0 "Гуді стежить за тим, щоб хлопці були готові до виходу. Ніяких відволікань, ніякої нісенітниці, жодних пропусків дня ніг."
HOS_wheel_snipe_celly_idea:0 "Розкат, Приціл, Гол"
HOS_wheel_snipe_celly_idea_desc:0 "За допомогою ковзанів та автомобілів ми завдаємо удару ворогові ще до того, як він встигає зрозуміти, що його вдарило."
HOS_skate_boost_idea:0 "Найшвидші ковзани"
HOS_skate_boost_idea_desc:0 "На заводах у Віндзорі замість автомобілів почали виробляти ковзани. Ці фабрики можуть робити їх швидкими та ще швидшими."
HOS_punching_through_idea:0 "Пробиваючи наскрізь"
HOS_punching_through_idea_desc:0 "Якщо боротьба з В.А.Ш.І.Н.Г.Т.О.Н.ом нас чомусь і навчила, так це найкращому способу вбивати роботів."
HOS_ready_for_ravens_idea:0 "Готові до Рейвен-Року"
HOS_ready_for_ravens_idea_desc:0 "Боротьба з Онтарійським Анклавом навчила нас достатньо, щоб бути готовими до того, що їхня команда-сестра з Рейвен-Року колись вийде в нашу лігу."
HOS_home_ice_idea:0 "Перевага рідного льоду"
HOS_home_ice_idea_desc:0 "Якщо ви не можете перемогти на своєму льоду, ви не зможете перемогти ніде."
HOS_training_idea:0 "Зосереджені на тренуваннях"
HOS_training_idea_desc:0 "Основою нашої банди є сувора підготовка членів нашої команди."
HOS_numbers_idea:0 "Глибока лава запасних"
HOS_numbers_idea_desc:0 "Основа нашої банди — чисельність. Коли один падає, інший виходить на лід."
HOS_teamwork_idea:0 "Командна робота втілює мрію"
HOS_teamwork_idea_desc:0 "Основа нашої банди — відданість одне одному. Ми ділимо боротьбу та здобич."
HOS_hating_loss_idea:0 "Ми ненавидимо програвати"
HOS_hating_loss_idea_desc:0 "В основі нашої команди лежить не любов до перемоги, а ненависть до поразок. Це спонукає нас завжди перемагати, хоч би чого це коштувало."
HOS_thugs_idea:0 "Новачки-бандити"
HOS_thugs_idea_desc:0 "Більшість наших новобранців складають місцеві бандити."
HOS_scavs_idea:0 "Новачки-сміттярі"
HOS_scavs_idea_desc:0 "Більшість наших новобранців складають місцеві сміттярі."
HOS_refugees_idea:0 "Новачки-біженці"
HOS_refugees_idea_desc:0 "Основну частину наших новобранців складають біженці з усієї Онтаріо."
HOS_everyone_idea:0 "Безліч новачків"
HOS_everyone_idea_desc:0 "Ми приймаємо всіх, хто бажає приєднатися. Ті, хто не зміг пройти відбір, все одно прийматимуть кулі, призначені для наших зіркових гравців."

