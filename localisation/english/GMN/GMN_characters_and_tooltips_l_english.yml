    ### CHARACTERS
    GMN_green_fallon_name:0 "Ґрін Феллон"
    green_fallon_desc:0 "Ґрін Феллон веде праведну боротьбу довше, ніж пам'ятають навіть більшість гульїв, і зупинятися не збирається. До війни Феллон та інші хлопці з Ґрін-Маунтін були партизанами, які боролися з тиранією Сполучених Штатів і мандрували вздовж Східного узбережжя. Коли впали бомби, «Хлопці з Ґрін-Маунтін» перетворилися на справжню мандрівну армію, ховаючись у глухих куточках Америки та відбиваючи або уникаючи будь-яких спроб федерального уряду їх зупинити. Після вибухів Феллон та інші, на своє нещастя, отримали дозу радіації й перетворилися на гульїв. Відтоді Феллон та його гулі піклуються про зародки громад поблизу. Тепер він спостерігає за руїнами Вашингтона і готовий прогнати будь-кого, хто наблизиться. Ніхто не вбив його за останні 250 років, і він планує прожити ще стільки ж."
    
