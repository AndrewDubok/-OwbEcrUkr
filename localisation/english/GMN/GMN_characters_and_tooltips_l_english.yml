    ###Power Balance###
    GMN_sectarian_conflict:0 "Міжконфесійний конфлікт"
    GMN_sectarian_conflict_desc:0 "Аппалачі сповнені всіляких диваків, чудернацьких людей і просто тих, хто намагається жити своїм життям. Дозволяючи тим, хто тікає від Церкви Рокі, оселятися в наших краях, ми повинні бути обережними, щоб не дозволити їхнім відмінностям розірвати нас на частини."
    GMN_conflict_crisis:0 "Міжконфесійна криза"
    GMN_conflict_crisis_desc:0 "Наші пагорби оживають від звуків пострілів. Різні культи б'ються на наших вулицях і в поселеннях. Люди, яких ми намагаємося захистити, тепер обирають сторони в сутичках, які не повинні їх стосуватися."
    GMN_conflict_open_fighting:0 "Відкрите протистояння"
    GMN_conflict_open_fighting_desc:0 "Наші пагорби оживають від звуків пострілів. Різні культи б'ються на наших вулицях і в поселеннях. Люди, яких ми намагаємося захистити, тепер обирають сторони в сутичках, які не повинні їх стосуватися."
    GMN_conflict_frequent_squabbles:0 "Часті чвари"
    GMN_conflict_frequent_squabbles_desc:0 "Розбіжності між різними культурами на нашій території мають тенденцію переростати в насильство. Вуличні бійки та періодичні перестрілки змушують багатьох не бажати відходити далеко від дому."
    GMN_conflict_occsaional_problems:0 "Нечасті проблеми"
    GMN_conflict_occsaional_problems_desc:0 "Боротьба між різними культурами на нашій території, на жаль, іноді переростає в насильство. Зазвичай це обмежується кількома особами, але існує ризик ескалації."
    GMN_conflict_harmony:0 "Гармонійний народ"
    GMN_conflict_harmony_desc:0 "Аппалачі, можливо, сповнені диваків та чудернацьких людей, але наші відмінності не створюють проблем. Зрештою, навіщо воювати, коли в нас уже є один божевільний культ, який намагається нас розірвати?"
    GMN_conflict_peaceful:0 "Мирні відносини"
    GMN_conflict_peaceful_desc:0 "Аппалачі, можливо, сповнені диваків та чудернацьких людей, але наші відмінності не створюють проблем. Зрештою, навіщо воювати, коли в нас уже є один божевільний культ, який намагається нас розірвати?"
    GMN_conflict_rare_grumblings:0 "Рідкісне бурчання"
    GMN_conflict_rare_grumblings_desc:0 "Загалом, наші люди вміють підтримувати цивілізованість. Іноді чути приглушений шепіт, коли культист проводить церемонію на головній площі, але далі цього справа не заходить."
    GMN_conflict_occasional_debate:0 "Випадкові дебати"
    GMN_conflict_occasional_debate_desc:0 "Звісно, наявність такої кількості різних культур і вірувань в одному місці неминуче призвела б до розбіжностей. Але дебати залишаються досить цивілізованими. Хоча нещодавно хтось назвав культиста Кобальту «Рад-дебілом»."
    GMN_conflict_moderate:0 "Помірний конфлікт"
    GMN_conflict_moderate_desc:0 "Протистояння між різними культурами на нашій території рідко виходить за межі різких слів. Тим не менш, прості горяни з тривогою чують палкі дебати на вулицях."
