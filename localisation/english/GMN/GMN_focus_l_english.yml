l_english:
    ### TOOLTIPS
    GMN_gold_trading_tt:0 "Modify §YSociety in Appalachia§! by\nCaps Income §G+15.00%§!\nResource Gain Efficiency §R-5.00%§!"
    GMN_refugee_decisions_tt:0 "We will accept refugees from the Nations the §O[COR.GetName]§! conquers."
    GMN_share_lessons_tt:0 "We will share our knowledge with the other free groups in Appalachia. This will bring us all closer together."
    GMN_rookies_tt:0 "A new batch of rookies fill the ranks"
    GMN_disagree_with_marshals_tt:0 "§RThe Fire Marshals have gone down a path that will lead to conflict.§!"
    GMN_agree_with_marshals_tt:0 "§GThe Fire Marshals seem like good neighbors to have.§!"
    GMN_join_ecr_tt:0 "§YWe will join The East Coast Republic§!"
    GMN_border_watch_tt:0 "We will construct watchposts on the border"
    GMN_advisors_accepted_tt:0 "Will unlock advisors out of the groups we accepted."
    GMN_accepted_hills_tt:0 "We integrated refugees from §8Monongahela§!"
    GMN_accepted_cobalt_tt:0 "We integrated refugees from §2The Cult of Cobalt§!"
    GMN_accepted_Lorentz_tt:0 "We integrated refugees from §OLorentz Force§!"
    GMN_accepted_onion_tt:0 "We integrated refugees from §GOnionburg§!"
    GMN_tt_no_aid_sent:0 "§RWe didn't send anyone to help these people. Why would we expect to learn anything?§!"

    ###New Focuses###
    GMN_nf_a001:0 "Not A Big Fan Of The Government"
    GMN_nf_a001_desc:0 "Oh those were the days, raising our rifles to blow down some tyrannical fascist pigs, raising our old rifles and pistols against those shouting proudly about a liberty they'd never give out."
    GMN_nf_a002:0 "We Prefer To Be Called Libertarian"
    GMN_nf_a002_desc:0 "Just because we dislike government, agree in equality, and prevent people from owning multiple locations as businesses under the same corporation, does not mean we are communist! Ok fine, I guess we might be socialist. Maybe."
    GMN_nf_a003:0 "A Rock And A Hard Place"
    GMN_nf_a003_desc:0 "That damn church thought it'd be a real good idea to start snatching up civilians to force them to worship a god damn rock! If we hadn't been there to send them running, who knows what terror would fall across the region?"
    GMN_nf_a004:0 "Open Our Gates"
    GMN_nf_a004_desc:0 "Dozens of refugees are scattered to the wind as the Church of Rocky marches ever further south to "reclaim their land". Horrors brought upon the layman that need to be addressed, the gates swung open to allow the victims of that horrific beast to the north to come south."
    GMN_nf_a005:0 "All The Way To The Tract"
    GMN_nf_a005_desc:0 "To the northeast, the miners of Monongahela are a very very interesting group. They follow similar libertarian ideals, however they've never quite coordinated like us. Instead, they're protected by the "Rangers", a local militia. Fallon and the Head Ranger go way back, like, absurdly far back, Fallon is kinda confused as to how the Ranger's gone that far back. But he never questioned it much. Anyway, with the growth of the Cult of Rocky, he's decided to go talk to his old friend, and try to work something out that'll benefit the both of them."
    GMN_nf_a006:0 "The Hills Have Eyes"
    GMN_nf_a006_desc:0 "As we cooperate and grow our relationship with Monongahela, they teach us a few things about watching the hills."
    GMN_nf_a007:0 "Blood Brothers"
    GMN_nf_a007_desc:0 "It's finally time. Rocky is a pleasant pile of dust floating in the ash riddled breeze, and Appalachia is at some level of peace. Monongahela can finally be completely integrated. Two brothers, bonds forged in war and conflict, united again."
    GMN_nf_a008:0 "Avenge Our Fallen Brother"
    GMN_nf_a008_desc:0 "Our friends to the north have been driven from their home by the rock-worshipers. As refugees streamed in, one group in particular came in with very sad news."
    GMN_nf_a009:0 "Wind In Them Hills"
    GMN_nf_a009_desc:0 "We can't just cobble together a fusion generator out of scrap metal. But we can set up a few windmills."
    GMN_nf_a010:0 "Convene The Councils"
    GMN_nf_a010_desc:0 "There are dozens of councils, unions and other representatives that make up our Assembly, and they convene sporadically, with the only semi-consistent ones being every year or two. It's around that time of the year again, and everyone's got something they want to have us take a look at."
    GMN_nf_a011:0 "Of Miners And Women"
    GMN_nf_a011_desc:0 "As a society completely economically reliant on the men and women who crack rocks underground for whatever minerals or fancy rocks they can get their hands on. It is only fair we continue to support them with whatever funding they need to continue to crack those rocks. Especially coal, we fucking love coal!"
    GMN_nf_a012:0 "Entering The Gold Trade"
    GMN_nf_a012_desc:0 "In some parts of the country, gold has been used for currency for god knows what reason. In Appalachia? Well circuitry is always an important thing to create. And as we continue to find more and more pockets of gold in our mining efforts, what do we do? Well we sell it to smarter people."
    GMN_nf_a013:0 "Appalachia's Refineries"
    GMN_nf_a013_desc:0 "While raw resources can get us far, it's definitely not far enough unless we wanna wait a few months just to get the refined resources. How are we going to solve this you may ask? It's quite simple actually. Simply refine them ourselves. Can't be that hard right?"
    GMN_nf_a014:0 "Improving Safety Standards"
    GMN_nf_a014_desc:0 "While enforcing any regulation on business is insane, the Assembly has received several complaints and we may have to begin safety investigations and holding out resource requests till they start actually doing their fucking jobs."
    GMN_nf_a015:0 "We Love Workers Unions"
    GMN_nf_a015_desc:0 "One of the main entities within the average life of a Green Mountain anarchist, a Workers Union is not what many would think of before the war. This long after, it has a much different connotation, simply a collective of workers who coordinate for whatever reason over however much ground. With them being one of many entities in the Assembly, they're always asking for more support to aid others in forming unions. Seems like a good cause."
    GMN_nf_a016:0 "Richest Farmers In Appalachia"
    GMN_nf_a016_desc:0 "With the recent reinvention of Tractors, farming within Appalachia is getting very easy. Like, to the point where it is pretty much impossible for us to have a famine even if we only got half the output expected. It's honestly kind of weird. But it sure makes us a lot of money now we can massively export grain."
    GMN_nf_a017:0 "Revisiting Our History"
    GMN_nf_a017_desc:0 "There are few alive who were at Harper's Ferry when the Brotherhood rained hellfire on us. The few remaining good folk fighting for freedom being torn down by Brotherhood gunships. And fewer still remember that Senator Blackwell, a local leader at the time, escaped long before the attack came. Apparently he even had a bunker. Maybe it's time to go down memory lane and put Fallon's mind to rest on the topic."
    GMN_nf_a018:0 "Home On The Frontier"
    GMN_nf_a018_desc:0 "Where civilization has disappeared and the man with the largest gun is king, it is natural that certain hierarchies begin to form. The very notion of which our confederation rails against. The Green Mountain Boys keep those who dare exploit others out, and the rest of the population does it from there. However what few remember is that the Green Mountain Boys have their own day jobs they work when not out of militia duty. It isn't exactly well paying so running a farm is by far the most common thing to make a living. This has actually proven a very good benefit, as it means they can both feed themselves, and others, and alongside this, when they retire they can use their training to benefit the community. We actually just had a batch of oldies retire recently, hope that helps the rest of us!"
    GMN_nf_a019:0 "Long Path to Post-Agrarianism"
    GMN_nf_a019_desc:0 "Industrialization has always been a tricky subject in Appalachia. Before the war of course, there were many industries that towered over the landscape, however local superstition due to the unfortunate fate that most post-war Appalachians fell to makes few wish to resurrect them. Hell, Monongah has been little more then scrap, the old world robotics having been salvaged decades ago, leaving little left in the city in modern day to salvage or use. However, we cannot simply remain an agrarian society forever, we need to progress, even if it doesn't involve setting up the maassive industries the pre-war world had."
    GMN_nf_a020:0 "Collective Research Fund"
    GMN_nf_a020_desc:0 "The sciences in Appalachia are often joked about as being notoriously underfunded. A local jape goes "How many Appalachians does it take to fix a lightbulb? 3, the first guy calls in someone from Lorentz, the other 3 pay him!" and its for good reason. While schools and what not are around, the only real advanced onces mostly teach trades or tactics, with a single school with any kind of scientific program, that being a danty little thing out of a dead doctor's house, and of course, studying chems. By allocating some funding to it with a few communal donations, maybe we'll live to see a day where we only need one guy to fix a lightbulb."
    GMN_nf_a021:0 "Exporting Our Grain"
    GMN_nf_a021_desc:0 "We have a lot of farmsteads. Like, more farmsteads than workshops. It is honestly kind of weird how many we've set up seeing as we're about thirty percent mountain. With this, we make a lot of money from the grain trade, and as such it only benefits us to keep grain going out, especially since we have more than enough to feed ourselves."
    GMN_nf_a022:0 "Trader's Economy"
    GMN_nf_a022_desc:0 "Pretending that trade doesn't fuel the economy of practically every post-war and even most pre-war nations is a fool's gamble. While self-sufficiency has always been the pride of Appalachia, we're not above making profit for our hard work. As we grow and develop, protecting our traders is a natural occurence. While for most of our history its been up to them to hire out mercenaries, giving complimentary protection will sure up confidence in our routes and make us allies in the caravan market."
    GMN_nf_a023:0 "Artisans On The Range"
    GMN_nf_a023_desc:0 "As our economy develops, we've begun seeing a growing artisan movement past the trade skills. Sciences and proper artistry are becoming more and more known, and development of new technologies is getting only better. There's even a modern art showing in Monongah"
    GMN_nf_a024:0 "Approaching Our Zenith"
    GMN_nf_a024_desc:0 "Machinetools are an important step to industrialization, and through hard work and massive investments, we've gotten in our first set. Any kind of centralized large scale industry is insane with our current business model, however it is more then possible to at least make the disjointed production we already have a bit more efficient."
    GMN_nf_a025:0 "Home Sweet Home"
    GMN_nf_a025_desc:0 "It is not exactly a secret that Appalachia is a maze to outsiders looking in. Settling after the war has been a doozy as most maps of Appalachia are in Appalachia, as those outside have generally been seized up by the settlers coming in from the 2120s. And the few that are still outside, or god forbid made post war, rarely have enough details to efficiently transport or trade. But any true blue-blooded Appalachian knows each of the mountains by heart. And recently, a few cartographers have finally started popping up, so even the outsiders may yet get decent maps to settle with."
    GMN_nf_a026:0 "Using The Old Dens"
    GMN_nf_a026_desc:0 "Scattered across our territory pre-war survivalist bunkers scar the land, reminding us of the paranoid and superstitious days that predicted the apocalypse. Many of them have remained untouched, historical landmarks guarded by local militia upholding their idealist forms of the old world. But many have begun suggesting we use them and the materials inside, as many suspect that they have tools inside for weapons production, as most of the people that would use them are the same people that really really liked guns. Who could blame em?"
    GMN_nf_a027:0 "Arms Against Tyranny"
    GMN_nf_a027_desc:0 "Every once in a while, things get hectic in Appalachia. One year it was a new group of The Brotherhood showed up, another there were some mercs out of Virginia. Heck, one year a bunch of people started worshiping a giant moth. After 200 years, Falon can feel it in his bones. Something is coming and we need to stock up arms."
    GMN_nf_a028:0 "Arms By, Of, And For The People"
    GMN_nf_a028_desc:0 "200 year old rusty weapons can only get you so far. At some point we need to make our own guns from scratch. Honestly, that point should've been reached 190 years ago. But here we are."
    GMN_nf_a029:0 "Hell Hath No Fury"
    GMN_nf_a029_desc:0 "A woman has just as much of a stake in fighting for their freedom as a man, why wouldn't we want them in the cause?"
    GMN_nf_a030:0 "Raise A Glass To Freedom"
    GMN_nf_a030_desc:0 "More guns means more freedom, simple as that."
    GMN_nf_a031:0 "Greener Than Green"
    GMN_nf_a031_desc:0 "Sometimes its hard to remember that 200 years ago, most of us Green Mountain boys were too just good ol boys who knew next to nothing about war. Hopefully these new recruits will learn with a little less blood than we did."
    GMN_nf_a032:0 "Bird's Eye View"
    GMN_nf_a032_desc:0 "Watch towers in the hills are good, but soaring overhead is better."
    GMN_nf_a033:0 "Old Manuals"
    GMN_nf_a033_desc:0 "Many people thought these old flight manuals would be better off as kindling. But two centuries later they look really stupid don't they?"
    GMN_nf_a034:0 "Repairing Cropdusters"
    GMN_nf_a034_desc:0 "The planes rusting away in barns across Appalachia may not be fighter jets, but they're still worth fixing up."
    GMN_nf_a035:0 "Pave The Runways"
    GMN_nf_a035_desc:0 "Aircraft can't just take off and land in a parking lot, they need longer stretches of pavement or empty fields."
    GMN_nf_a036:0 "Bombs Away!"
    GMN_nf_a036_desc:0 "Scrounging across all our territory we were able to put together enough parts for a few planes."
    GMN_nf_a037:0 "Woooo Hoooh!"
    GMN_nf_a037_desc:0 "A handfull of our people are really getting the hang of flying these things around."
    GMN_nf_a038:0 "Services To The Wastes"
    GMN_nf_a038_desc:0 "With how disorganized and loosely regulated the militia is, it's unsurprising that most of our militia are known for taking extra, mostly mercenary, work alongside their patrols and what not."
    GMN_nf_a039:0 "Protect Monongahela's Mines"
    GMN_nf_a039_desc:0 "Monongahela is one of our closest allies in this crazy world, and to be honest, they're the largest supporter of our mercenary services. Especially with the Northern Guard protecting their border from the Raiders. The more and more we work, the better deals we get on goods, and the more and more caps we bring in. A new contract just came in for a few of their mines, so why not go support 'em some more?"
    GMN_nf_a040:0 "Guarding Atom's Missionaries"
    GMN_nf_a040_desc:0 "The Church of Atom is some cooky cult from up north. One of their offshoots decided it'd be a cool idea to go form some religious organization down south in the swamps, however the one that we actually like is just a bit to the north of Harper's Ferry. Their little chapel at Helve is the head of their region of influence. They aren't much a government as much as a regional movement, and we'd be fools to boycott them."
    GMN_nf_a041:0 "Protect The Unprotected"
    GMN_nf_a041_desc:0 "Out in Onionburg, drugs are king, and the local population isn't exactly known for being able to protect themselves. Or, really do anything past more drugs. Offering our services up to protect them to the handful of still conscious members of their leadership we can easily capitalize on the severe lack of order."
    GMN_nf_a042:0 "Guarding The Gaussmen"
    GMN_nf_a042_desc:0 "The eggheads that follow Lorentz are not the best fighters, despite their nice weapons. Maybe if we help them out they'll toss us a couple."
    GMN_nf_a043:0 "Lessons of The Campaigns"
    GMN_nf_a043_desc:0 "We didn't expect every man we sent up-trail to return. But those who did can tell us a few things about fighting the cultists."
    GMN_nf_b001:0 "Fanatics At The Gates"
    GMN_nf_b001_desc:0 "We new this day would come. The torches of the rock worshipers burn in the night just a few miles from our furthest settlements."
    GMN_nf_b002:0 "Bring Forth The New Faith"
    GMN_nf_b002_desc:0 "Not all of the rock cultists fought till the end. Some of them seemed to have doubts about the whole 'kill all non-believers' thing. Would it be right to chase them off if they could live peacefully?"
    GMN_nf_b003:0 "An Early Demise"
    GMN_nf_b003_desc:0 "News has reached us of something astounding the "Church" of Rocky has been finally destroyed. Reports are unclear on who, but all that really matters is Appalachia is safe from one more threat, even if now another dozen come to replace them."
    GMN_nf_b004:0 "Eradicate The Cult"
    GMN_nf_b004_desc:0 "Would these rock lovers have showed us mercy if they broke down our gates? We let them off the hook once before, and look where it got us."
    GMN_nf_b005:0 "Sun Rising Over Appalachia"
    GMN_nf_b005_desc:0 "With the Rockyist crisis resolved, we can turn our attention back to our people."
    GMN_nf_b006:0 "Bloody Appalachia"
    GMN_nf_b006_desc:0 "We should have realized that once one cult was gone, another one would kick up some mess. "
    GMN_nf_b007:0 "Under New Management"
    GMN_nf_b007_desc:0 "The farmers of Onionburg thank us for saving them from the Cult of Cobalt. But saving them maybe isnt' the right word..."
    GMN_nf_b008:0 "Enough With The Fucking Cults"
    GMN_nf_b008_desc:0 "If there is one thing we have learned from the last few years, it's that cults are nothing but trouble. It doesn't matter if they worship rocks, atoms, or fuckin moths. A cult comes around these parts, and we're going too kick their asses!"
    GMN_nf_b009:0 "Stripping Down & Powering Up"
    GMN_nf_b009_desc:0 "We can't make heads or tails of most of these machines the eggheads were tinkering with. Some of the parts could fit into Watoga's power plant though."
    GMN_nf_b010:0 "Stolen Wisdom"
    GMN_nf_b010_desc:0 "Finding blueprints to make a Gauss rifle is one thing, but we still need to figure out how to make half these parts."
    GMN_nf_b011:0 "Brothers In Arms"
    GMN_nf_b011_desc:0 "The latest dustup has kicked a few folk into gear."
    GMN_nf_b012:0 "Watch Each-Other's Backs"
    GMN_nf_b012_desc:0 "Our friends to the north understand we are all we have to keep the crazies at bay. It would be better if we keep working closely together."
    GMN_nf_b013:0 "Use What They Taught Us"
    GMN_nf_b013_desc:0 "The rangers will regret teaching us their ways of fighting now that they've decided to fight us."
    GMN_nf_b014:0 "Lessons Of The Hills"
    GMN_nf_b014_desc:0 "Fighting in the northern hills has taught our leaders a few things."
    GMN_nf_b015:0 "Another Crisis Resolved"
    GMN_nf_b015_desc:0 "The latest Appalachian shitshow has passed. Now we just need to get ready for the next one."
    GMN_nf_b016:0 "The Growing Appalachian Identity"
    GMN_nf_b016_desc:0 "The storm has passed. Our people are safe and free to live their lives. We may all be a little different, but we are united in one thing. This is our home."
    GMN_nf_b017:0 "Green Pastures"
    GMN_nf_b017_desc:0 "Many of the farmers of Onionburg are moving beyond their old valley. They know we'll protect them, so they're finding work across our territory."
    GMN_nf_b018:0 "The Great Cranberry Glade"
    GMN_nf_b018_desc:0 "Many years back there was a bog outside of Watoga that was perfect for farming cranberries. Some of the Onionburgers think it could do that again."
    GMN_nf_b019:0 "Higher Education"
    GMN_nf_b019_desc:0 "Watoga University was little more than a squatting ground for the last two centuries. The eggheads want to move in and set up a research lab. Maybe one day they can teach the rest of us how magnets work."
    GMN_nf_b020:0 "Sharing Secrets"
    GMN_nf_b020_desc:0 "Lorentz knows our boys are more suited to fighting than his labcoats. He has begrudgingly shared the secrets to making their rifles with us. Now we just need to figure out what the hell a ferromagnetic slug is and how to make it."
    GMN_nf_b021:0 "A Holy Cavern"
    GMN_nf_b021_desc:0 "Most people avoided the caves out east of Watoga. Between the radiation and rumors of giant bats, who would want to loiter around? Turns out radiation worshipers would."
    GMN_nf_b022:0 "A Rock Worthy of Worship"
    GMN_nf_b022_desc:0 "The pilgrims to the strange cave east of Watoga found a very unique rock. Not the one the rockyists worshiped, but damn if it isn't something special."
    GMN_nf_b023:0 "Safe Trails"
    GMN_nf_b023_desc:0 "Our relationship with the rangers is the best it's ever been. They're even letting us help them clear up a few of their more neglected trails."
    GMN_nf_b024:0 "The Ways of The Hill Men"
    GMN_nf_b024_desc:0 "Veteran rangers have agreed to teach our greener leadership about fightin' in them there hills."
    GMN_nf_b025:0 "The Councils of Appalachia"
    GMN_nf_b025_desc:0 "It wouldn't be right to continue convening the councils without allowing our new neighbors seats at the table."
    GMN_nf_b026:0 "The Heart of Darkness"
    GMN_nf_b026_desc:0 "The den of rats that was the nation's capital is always a place of concern for our people. Who knows what the hell has been going on there over the last couple centuries?"
    GMN_nf_b027:0 "Ever Watchful"
    GMN_nf_b027_desc:0 "Savage utants, imperialists, another dammed cult. Who the hell knows what is skulking around in The Capital Wasteland? Whatever it is, we need to be ready."
    GMN_nf_b028:0 "Protect The People"
    GMN_nf_b028_desc:0 "As we expected, the monsters of the east came knocking and we knocked thier asses back. The people trying to make their lives there are very grateful."
    GMN_nf_b029:0 "Some Decent Folk"
    GMN_nf_b029_desc:0 "Who would have thought that in the time since The Great War, DC would come to be populated by people that shared our ideals?"
    GMN_nf_b030:0 "Building Bridges"
    GMN_nf_b030_desc:0 "The fellas out east are good people. We should make nice with these neighbors."
    GMN_nf_b031:0 "Same Shit, Different Century"
    GMN_nf_b031_desc:0 "We should have expected that DC would be home to "
    GMN_nf_b032:0 "Liberate The Oppressed"
    GMN_nf_b032_desc:0 "With their tyrants dead, the people of The Capital Wasteland welcome us as heroes. Unlike when the old Goverment said that, we're telling the truth."
    GMN_nf_b033:0 "The Rot Remains"
    GMN_nf_b033_desc:0 "Why are we not surprised that the devils who destroyed the world clung on and seek to do it again? We won't let them."
    GMN_nf_b034:0 "A Win 200 Years In The Making"
    GMN_nf_b034_desc:0 "It may have taken over two centuries of fighting, but we finally took out the bastards who usurped America and turned it from the land of the free to the land of the slaves."
    GMN_nf_b035:0 "That Sinister Smile"
    GMN_nf_b035_desc:0 "Falon never did trust Whitesprings Management. A bunch of unseen elites just giving things away to people who run errands for them? We honestly should have caught on that there was something darker to it."
    GMN_nf_b036:0 "The Sack of Whitesprings"
    GMN_nf_b036_desc:0 "The Responders refuse to see reason. "
    GMN_nf_b037:0 "Unmasking M.O.D.U.S"
    GMN_nf_b037_desc:0 "Both us and The Responders have taken some lumps in this fight, but at the end of the day we have more in common than we don't. They just need to have the woold removed from their eyes."
    GMN_nf_b038:0 "What's This?"
    GMN_nf_b038_desc:0 "It looks like there were some interesting things laying around in this old bunker."
    GMN_nf_b039:0 "Fire And Blood In The Marshes"
    GMN_nf_b039_desc:0 "There has been a whole mess of noise coming from Southern Virginia. We may as well look at some point."
    GMN_nf_b040:0 "Into The Swamp"
    GMN_nf_b040_desc:0 "Another group of crazies to deal with, this time in Virginia."
    GMN_nf_b041:0 "Similar Interests"
    GMN_nf_b041_desc:0 "The Fire Marshals are just like us, some settlers trying to live their lives dealing with hordes of crazies. Why whouldn't we help each other when we can?"
    GMN_nf_b042:0 "They're Not Like Us"
    GMN_nf_b042_desc:0 "On the surface it may look like The Fire Marshals have a lot in common with us. However, something is off..."
    GMN_nf_b043:0 "Pleased To Know Ya"
    GMN_nf_b043_desc:0 "Could you imagine being stuck on a rusty ship for 200 years? No wonder they dug their heels in and didn't back off. But will they be good neighbors?"
    GMN_nf_b044:0 "The Councils Of Virginia"
    GMN_nf_b044_desc:0 "With irginia's swamps having settled down, we can go back to living in peace."
