    gmn_appalachian_society:0 "Суспільство в Аппалачах"
    gmn_appalachian_society_desc:0 "В Аппалачах наше суспільство та військова організація будуються навколо гір, гірської інфраструктури та торгівлі між гірськими районами — саме це формує спосіб життя нашого народу. Щоб зберігати свою перевагу, ми повинні постійно вдосконалювати, ремонтувати та розвивати інфраструктуру й торгівлю в горах."
