l_english:
    ### TOOLTIPS
    
    ### EVENTS
    nf_GMN_1.title:0 "Минулі дні"
    nf_GMN_1.desc:0 "Коли в 60-х запровадили Систему Співдружностей, стало зрозуміло — все пішло шкереберть. Законодавчі збори штатів перетворилися на порожні фігури, якщо взагалі збиралися. Чорт забирай, що взагалі робили ці Співдружності? Дозволяли федеральному уряду зневажати наші права, поки ми відчайдушно боролися за низькі податки та мінімальну зарплату? Американська демократія померла задовго до появи глибинної держави, і якби нас тоді не було, мені страшно уявити, що б вони витворяли у Вірджинії.\n\nРаніше нас було всього кілька — я та пара товаришів, з гвинтівками, балончиками з фарбою та кількома доларами. Жили поза містами, постійно чатували в прибережних лісах, поки армія не вирішила нас вигнати. Ми пробилися на захід, рука об руку з Фрістейтерами — ну, не хочу сказати «божевільні», але виглядали вони підозріло, як комуністи. Тієї миті це не мало значення — треба було вижити, і краще вже з червоними, ніж із синіми.\n\nКоли впали бомби... не хочу цього казати, але нам довелося триматися разом із Фрістейтерами. Ми працювали з ними, поки ядерна зима не відступила, намагаючись повернути хоч якусь стабільність у Західну Вірджинію. Але потім Братство показало свої потворні пики. Після кількох сутичок наші будинки спалили. Єдина причина, чому ми вибралися живими — ми побачили, що все скінчено, і пішли, поки мали час.\n\n"
    nf_GMN_1.a:0 "Вийшли з здобиччю Братства, щойно знятою з їхніх трупів."
    nf_GMN_1.b:0 "Підібрали припаси з кількох складів Фрістейтерів, коли йшли."
    nf_GMN_1.c:0 "Ми взяли з собою стільки біженців, скільки змогли."
    nf_GMN_1.d:0 "По дорозі нам вдалося зібрати кілька однодумців з ополчення."

    nf_GMN_2.title:0 "Визволителі Аппалачів"
    nf_GMN_2.desc:0 "Поки останні сили Аппалачів билися через старі образи та золото Старого світу, «Хлопці з Ґрін-Маунтін» разом із постійно зростаючою кількістю послідовників рушили до Ватоґи. Вони вимкнули місцевих роботів і зміцнили місто, відбиваючи атаки різних фракцій. Десятки біженців кинулися до відносно стабільного регіону, а фермерські господарства та поселення поблизу швидко почали просити підтримки в «Хлопців».\n\nЦе тільки посилило їхній вплив: бійці стали місцевою оборонною силою й пожинали плоди у вигляді популярності, кришок і всього такого. Завдяки цьому впливу вони змогли зробити багато хорошого для громади — зосередилися на викоріненні банд рейдерів, вирішенні суперечок і контролі над підприємствами з сумнозвісними поганими умовами праці. Саме це принесло їм ще більше підтримки та нових рекрутів, поступово розширюючи вплив далеко за межі Ватоґи.\n\nПісля нападу банди рейдерів на Гарперс-Феррі, «Хлопці з Ґрін-Маунтін» вирішили вигнати їх і заслужити титул «Визволителів Аппалачів». Так звані «Криваві Орли» були ізольовані й винищені. Коли «Хлопці» увірвалися до міста з великим загоном у вкраденій військовій формі, вони звернули рейдерів у втечу, звільнили місто й закріпили контроль над південно-східною частиною Західної Вірджинії."
    nf_GMN_2.a:0 "Вони виявили, що місто майже не постраждало."
    nf_GMN_2.b:0 "Кілька старих рабських ям було відремонтовано."

    nf_GMN_3.title:0 "Ті кляті культисти"
    nf_GMN_3.desc:0 "Так звана «Церква Рокі» кілька років займала сільську місцевість навколо Гарперс-Феррі та Ватоґи — це була купа дивних культистів, які поклонялися якомусь своєму «священному» каменю. Хоча вони й виглядали дивно, ніхто не вважав їх ворожими, і більшість просто ігнорувала їх, дотримуючись принципу «живи й дай жити іншим». Однак усе змінилося всього кілька років тому, коли на стіл Феллона почали надходити десятки повідомлень і чуток про сутички та набіги за участю Церкви.\n\nПід час розслідування з'ясувалося, що близько дюжини фермерських господарств було спалено, а десятки людей зникли безвісти в районі головної території Церкви. Кілька розвідувальних груп, відправлених для перевірки, були зупинені людьми Церкви, які оголошували їх «порушниками» своїх земель. Це призвело до серії сутичок, де летіли кулаки, каміння і навіть ножі.\n\nКоли Феллон вирішив особисто зустрітися з лідером культу, Святим Ґрейвелом, спалахнула перестрілка. Викликавши підкріплення, Феллон повів сотню бійців на атаку Церкви через пагорби. Бій був коротким, але жорстоким. Зрештою, послідовники Рокі в паніці втекли рачки в ліси. Після перемоги чоловіки й жінки всіх мастей святкували її з випивкою та смаженими хот-догами з браміна біля розведеного ними багаття."
    nf_GMN_3.a:0 "Ми не повинні були дозволити їм утекти."

    nf_GMN_4.title:0 "ПОРОЖНЬО"
    nf_GMN_4.desc:0 "Порожня подія, яку було видалено. У майбутньому має бути замінена."
    nf_GMN_4.a:0 "Дивись, який дата-майнер."
    nf_GMN_4.b:0 "Може, краще б якихось дівчат найдобував."

    nf_GMN_5.title:0 "Зруйновані конструкції"
    nf_GMN_5.desc:0 "Ватоґа була зразком усього того, що було неправильно в Старому світі. «Місто майбутнього» від RobCo — це місто, побудоване корпоративними елітами для корпоративних еліт. Вони правили з вершин своїх веж, не пускаючи туди робітників і замінюючи їх роботами. За знайденими нами голодисками та записами в терміналах, незадовго до падіння бомб один із співробітників RobCo вніс збій у систему, через що роботи, які обслуговували місто, почали вбивати всіх, кого бачили. Роботів давно знищено, але шкода, завдана роками перестрілок і занепаду, залишає Ватоґу мало кращою за міста, розташовані ближче до епіцентрів вибухів.\n\n Тим не менш, тут живе більшість наших людей. Населення міста тільки зростає останніми роками, оскільки сюди тікають від проблем з усіх Аппалачів і навіть далі. Нещодавно різні ради Ватоґи зібралися разом, щоб обговорити важливе питання — спільно взятися за відновлення міста, що руйнується. Тижні обговорень призвели до згоди з усіх питань — від розподілу робочих навантажень до пошуку матеріалів. Тепер залишилося вирішити тільки одне: з чого почати."
    nf_GMN_5.a:0 "Безпечне житло є пріоритетом."
    nf_GMN_5.b:0 "Дати електроенергію людям."
    nf_GMN_5.c:0 "Чиста вода є життєво необхідною."

    nf_GMN_6.title:0 "Порожня гробниця"
    nf_GMN_6.desc:0 "У бункері сенатора Блеквелла, як і в багатьох інших подібних укриттях, за останні 200 років неодноразово побували мародери. Більша частина вмісту або знищена, або розібрана на запчастини, або вивезена. Феллон може лише припускати, що скелет, який сидить за давно списаним терміналом RobCo, належить самому сенатору, але не виключено, що це хтось із тих, хто мешкав тут останні два століття. Хоча більша частина бункера була ретельно обчищена, два століття переховування та боротьби вчать дечого — особливо вміння ховати важливі речі. В одній хитро замаскованій коморі ми знайшли..."
    nf_GMN_6.a:0 "Купу старих записів."
    nf_GMN_6.b:0 "Кілька книг із військової підготовки."
    nf_GMN_6.c:0 "Добре збережену броню."

    nf_GMN_7.title:0 "Споріднені душі"
    nf_GMN_7.desc:0 "У Головному Рейнджері завжди було щось дивне. Він був старим, коли вони з Феллоном зустрілися. Минуло багато десятиліть, а він усе той самий старий. Звісно, це дивно, але за 200 років Феллон дечого навчився. По-перше, пагорби Аппалачів сповнені всіляких дивних речей, і в них рідко варто вникати. По-друге, знайти однодумця-друга в пустках нелегко. Краще зміцнювати зв'язки з такими друзями, ніж втручатися в їхні справи."
    nf_GMN_7.a:0 "У друзів теж можуть бути секрети."

    nf_GMN_8.title:0 "Кінець його варти"
    nf_GMN_8.desc:0 "Коли поселенці, що тікали з північних пагорбів, почали напливати, ми знали, що сталося. Каменепоклонники зім'яли рейнджерів, і це було лише питанням часу, коли гірські стежки повністю потраплять під їхній контроль. Феллон очікував, що його старий друг, Головний Рейнджер, прибуде останнім. Той старий був надто впертим, щоб піти, перш ніж усі його люди благополучно виберуться.\n\n Феллон мав рацію наполовину.\n\n Новини надійшли з останньою групою поселенців, що тікали. Група молодих рейнджерів з ар'єргарду повідомила, що вони зайняли позицію в печері. Деякий час вони стримували культистів, але коли боєприпаси скінчилися, стало зрозуміло, що живими їм із печери не вибратися. Саме тоді Головний Рейнджер добровільно здався культистам в обмін на обіцянку, що його рейнджерам дозволять піти. Безсумнівно, невдовзі після цього рейнджера було вбито в якомусь кривавому ритуалі. Феллон дав обіцянку людям Мононгаели."
    nf_GMN_8.a:0 "Головний Рейнджер буде помщений!"

    nf_GMN_9.title:0 "Період спокою"
    nf_GMN_9.desc:0 "Після знищення Церкви Рокі Аппалачі насолоджуються миром. Життя повертається в нормальне русло. Однак це не перший період заворушень у регіоні. «Хлопці з Ґрін-Маунтін», які вже досить давно тут, знають, що це радше затишшя перед бурею. Чи то наступного місяця, чи наступного року, пристрасті знову розпаляться. Важливо те, що ми робимо в цей час, щоб підготуватися."
    nf_GMN_9.a:0 "Допомогти людям відбудувати своє життя."
    nf_GMN_9.b:0 "Зібрати зброю рокістів."
    nf_GMN_9.c:0 "Дістати схованки рокістів."
    nf_GMN_9.d:0 "Вислідити решту культистів."
    nf_GMN_9.e:0 "Інтегрувати рокістів у наше ополчення."

    nf_GMN_10.title:0 "Розбіжності в думках"
    nf_GMN_10.desc:0 "Коли Церква Рокі постукала в їхні двері, жителі Аппалачів виступили з Ватоґи. Атомісти, яйцеголові Лоренца, рейнджери і навіть оніонбурзькі фермери — всі стояли пліч-о-пліч. Незважаючи на різний спосіб життя, ми працювали разом, щоб відстояти свою свободу. Багато в чому це було свідченням цінностей «Хлопців з Ґрін-Маунтін». На жаль, це тривало недовго. Невдовзі після поразки Церкви Рокі, Промениста Кейт та її культ повернулися до своїх країв. Ми не заперечували проти їхнього повернення додому. Однак незабаром вони почали розширюватися на старі території рокістів. Яйцеголові Лоренца зробили те саме, і невдовзі між двома групами спалахнув конфлікт. Наче цього було недостатньо, фермери Оніонбурга зазнали нападу Культу Кобальту, і багатьох рейнджерів знайшли мертвими від ран, завданих ґаус-зброєю. Схоже, знищення Церкви Рокі було лише початком міжконфесійного кровопролиття."
    nf_GMN_10.a:0 "От лайно, знову почалося."

    nf_GMN_11.title:0 "Свобода для більшості"
    nf_GMN_11.desc:0 "За останні кілька років ми дізналися, що є люди, які не можуть залишити інших у спокої. Зокрема, це культи та войовничі фашисти. Спроби працювати з ними призвели лише до того, що нас вкусили за дупу, і з нас досить. Феллон та решта «Хлопців з Ґрін-Маунтін» вирішили, що не варто намагатися працювати з цими людьми. Якщо ще один дивний культ чи банда головорізів спробує зазирнути в наші пагорби, ми спочатку стрілятимемо, а потім ставитимемо запитання. Можливо, це трохи жорстоко, але це необхідно, щоб зберегти свободу для всіх інших."
    nf_GMN_11.a:0 "Завдяки силі ми маємо свободу."

    nf_GMN_12.title:0 "Займайтеся своїми справами"
    nf_GMN_12.desc:0 "У різних груп Аппалачів є свої дивацтва. Деякі поклоняються дивним речам, деякі не виходять на вулицю в повний місяць через страх перед Метеликовим Чоловіком, деякі просто хочуть займатися фермерством, заради всього святого. Навіть на самому початку нашої групи нас це ніколи не хвилювало. Головне переконання «Хлопців з Ґрін-Маунтін» полягало в тому, що кожен вільний розмахувати руками, як йому заманеться, доки не вдарить когось по носі. Хочете поклонятися радіоактивній жижі? Хочете будувати гігантські магніти? Хочете просто жити своїм життям день у день? Для «Хлопців» це не має значення, головне, щоб ви не заважали іншим робити те саме. Незважаючи на те, що різні групи Аппалачів живуть ближче одна до одної через боротьбу з рокістами, нам вдалося зберегти єдність. Різні суспільства й культи навчилися жити разом і триматися подалі одне від одного."
    nf_GMN_12.a:0 "У певному сенсі все навіть краще, ніж було."

    nf_GMN_13.title:0 "Скарб унизу"
    nf_GMN_13.desc:0 "Кілька сотень років тому тут творилося якесь лайно з гігантськими кажанами та хворобою, яка перетворювала не-гулів на диких божевільних. Феллон і хлопці трималися подалі від цього лайна, але все владналося після кількох ядерних вибухів і вакцини, підмішаної в Ядер-Колу, як не дивно. Одним із місць, що зазнали ядерного бомбардування, була печера неподалік від Ватоґи. Звісно, ніхто не хотів іти в радіоактивну печеру, поки туди не вселився Культ Кобальту. Те, що вони там виявили, змусило Феллона й хлопців пошкодувати, що вони не зазирнули туди. Там є дуже рідкісний матеріал із корисними властивостями. Культ заявив, що з радістю витягне цей камінь із землі для нас, якщо ми дозволимо їм там поклонятися."
    nf_GMN_13.a:0 "Звучить як безпрограшний варіант."

    nf_GMN_14.title:0 "Болото в прямому й переносному сенсі"
    nf_GMN_14.desc:0 "До війни Вашингтон був домом ворога. Купки шахраїв, які грабували простих людей і гнобили їх. «Вільні Штати», «Хлопці з Ґрін-Маунтін» і безліч інших груп по всій країні були ситі по горло й воювали. Чорт забирай, в Аппалачах ми навіть якийсь час перемагали, поки не впали бомби. Ми завжди стежили за східним горизонтом, але до недавнього часу причин для занепокоєння не було. Там щось відбувається. Каравани, що проходять повз, розповідають про розлючених мутантів, мігруючих рейдерів і навіть повномасштабну війну між двома угрупованнями в силовій броні. Що б там не відбувалося, це може перекинутися і на наші землі."
    nf_GMN_14.a:0 "Ми будемо готові."

    nf_GMN_15.title:0 "Привіт, сусіде"
    nf_GMN_15.desc:0 "Сьогодні прибув гонець зі Східних Аппалачів. Він виступає від імені [GMN.GetName], ополчення, яке захищає поселенців регіону від зовнішніх загроз. Вони чули про нашу республіку й хочуть приєднатися до нас."
    nf_GMN_15.a:0 "Ласкаво просимо до республіки!"

    nf_GMN_16.title:0 "Багато що просто стало на свої місця"
    nf_GMN_16.desc:0 "Респонденти завжди здавалися непоганими людьми відтоді, як вони реорганізувалися близько 180 років тому. Можливо, трохи наївними, але загалом не такими вже й поганими. Вони допомагають людям і, здається, роблять багато хорошого. Однак завжди було щось не так із ними. Їхня головна база — довоєнний курорт, який відвідували найгірші люди в країні. Імовірно, їхні нащадки жили в бункері під курортом і роздавали техніку Респондентам із доброти душевної. Це вже не пройшло перевірку Феллона на запах, а це дещо та означає, адже його ніс відпав ще 2081-го. Що гірше, те й там спливало одне й те саме ім'я — містер Отіс. Звісно, логічно, що люди в бункері зберегли прізвище, але все одно здавалося підозрілим. Тепер ми знаємо чому. Після зламу старого забутого бункера на околицях Онінберга ми знайшли дослідницький об'єкт Анклаву. Майже все цінне давно розтягли, але ми знайшли файли на комп'ютері під назвою М.О.Д.У.С. Згідно з цими документами, комп'ютер знаходиться в бункері під Вайтспрінгсом і призначений для продовження місії Анклаву. Це пояснює, чому «Управління Вайтспрінгса» мало стільки техніки і чому вони завжди діяли через посередників. Чи знають Респонденти про це чи ні, вони — пішаки в змові Анклаву! На жаль, ми не маємо розкоші копати глибше. Якщо ми дамо зрозуміти М.О.Д.У.С., що знаємо правду про Управління Вайтспрінгса, наслідки можуть бути жахливими. Наш найкращий шанс, як не дивно, увірватися з пушками напереваги. Принаймні машина може подумати, що ми просто грабуємо курорт."
    nf_GMN_16.a:0 "Нам потрібно діяти швидко!"

    nf_GMN_17.title:0 "Злам бункера"
    nf_GMN_17.desc:0 "Пробившись до воріт Вайтспрінгса, ми змогли домовитися з їхнім керівництвом про переговори. Респонденти знали нашу репутацію так само добре, як і ми їхню, і цей конфлікт ще більше збив їх з пантелику. Це зіграло нам на руку, і їхнє прагнення отримати відповіді призвело до того, що ми провели переговори далеко від Вайтспрінгса. Маючи на руках докази, Респондентів переконали направити гвинтівки на оборону бункера. Як ми й очікували, роботи курорту негайно чинили опір, але разом ми змогли пробитися в бункер. М.О.Д.У.С. незабаром було знищено, і тепер він ніколи більше не зможе маніпулювати чесними людьми.\n\n Залишалося питання про Респондентів. Без ляльковода, який смикає за ниточки, залишається питання про те, що вони робитимуть далі. Є кілька невеликих образ через бойові дії, але загалом вони погодилися приєднатися до нас у забезпеченні безпеки Аппалачів."
    nf_GMN_17.a:0 "Ми добре працюємо разом."

    nf_GMN_18.title:0 "Болото горить"
    nf_GMN_18.desc:0 "На південний схід від Ватоґи жили дикі поселенці, які, побачивши болота Вірджинії, що постійно розширюються, вирішили, що це місце для життя. З кожним роком болото ставало все ближче, і щороку вони спалювали все, що могли. Загалом вони були хорошими торговими партнерами. Паливо для вогнеметів не мало особливого попиту у Ватоґі, але платили за нього непогано. Схоже, цей ринок скоро вичерпається. Торговці повідомляють, що Маршали Вогню пропалили собі шлях до серця болота й виявили причину його такого сильного розширення. Однак головне полягає в тому, що, здобувши перемогу в своїй болотній війні, Маршали Вогню сформували серйознішу організацію, ніж просто кілька поселень, що об'єдналися для спільних випалювань. Можливо, варто зв'язатися з ними й подивитися, чи зможемо ми порозумітися."
    nf_GMN_18.a:0 "Сподіваймося, що війна не зробила їх ворожими."

    nf_GMN_19.title:0 "Болото горить"
    nf_GMN_19.desc:0 "На південний схід від Ватоґи жили дикі поселенці, які, побачивши болота Вірджинії, що постійно розширюються, вирішили, що це місце для життя. З кожним роком болото ставало все ближче, і щороку вони спалювали все, що могли. Загалом вони були хорошими торговими партнерами. Паливо для вогнеметів не мало особливого попиту у Ватоґі, але платили за нього непогано. Схоже, цей ринок скоро вичерпається. Поселенці прибували до Ватоґи та навколишніх поселень у великій кількості. Вони розповідають про культистів, племена та морських людей, які витісняли їх із боліт. Ці люди були міцнішими за більшість. Що б не вигнало їх із рідних домівок, ми не можемо ставитися до цієї загрози легковажно."
    nf_GMN_19.a:0 "От лайно, знову почалося."
