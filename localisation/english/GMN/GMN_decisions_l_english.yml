l_english:
    GMN_sectarian_conflict_category:0 "Міжконфесійні конфлікти"
    GMN_sectarian_conflict_category_desc:0 "Культисти-скельники, яких ми вигнали роки тому, розривають землі на північ від нас. Люди тікають до наших лісів і благають про притулок. Чим більше ми приймемо, тим більше це вплине на нас."
    GMN_onionburg_refugees_decision:0 "Прогнати оніонбурзьких фермерів"
    GMN_onionburg_refugees_decision_desc:0 "Переважно мирні фермери, жителі Оніонбурга були погано підготовлені до зустрічі з натовпом жорстоких культистів. Ті, хто врятувався, хочуть, щоб ми захищали їх, поки вони працюють на наших полях. §YЯкщо ми не проженемо їх, вони оселяться в наших пагорбах.§!"
    GMN_lorentz_refugees_decision:0 "Прогнати біженців Лоренца"
    GMN_lorentz_refugees_decision_desc:0 "Люди з Сил Лоренца завжди були трохи дивними, але вони пропонують класні рушниці, якщо ми їх приймемо. §YЯкщо ми не проженемо їх, вони оселяться в наших пагорбах.§!"
    GMN_cobalt_refugees_decision:0 "Прогнати культистів Кобальту"
    GMN_cobalt_refugees_decision_desc:0 "Люди можуть з побоюванням ставитися до втікачів-поклонників радіації, але жителі Кобальту ніколи не були великою проблемою. §YЯкщо ми не проженемо їх, вони оселяться в наших пагорбах.§!"
    GMN_monongahela_refugees_decision:0 "Прогнати біженців з Мононгаели"
    GMN_monongahela_refugees_decision_desc:0 "Мало хто вибрався з пагорбів одразу на північ від наших лісів. Ми знаємо людей Мононгаели. Вони триматимуться осторонь, їм просто потрібне місце для поселення. §YЯкщо ми не проженемо їх, вони оселяться в наших пагорбах.§!"
    GMN_exploit_onionburg_decision:0 "Зігнати оніонбуржців у поля"
    GMN_exploit_onionburg_decision_desc:0 "Якщо оніонбуржці хочуть знайти притулок у наших пагорбах, вони могли б принаймні допомогти обробляти наші поля."
    GMN_exploit_lorentz_decision:0 "Вилучити гвинтівки Гауса"
    GMN_exploit_lorentz_decision_desc:0 "Гвинтівки Гауса лоренцівських розумак будуть кориснішими в руках наших хлопців, які їх захищають."
    GMN_exploit_cobalt_decision:0 "Зігнати культистів Кобальту в шахти"
    GMN_exploit_cobalt_decision_desc:0 "На нашій території є кілька шахт, надто радіоактивних для звичайних шахтарів. Але ж цим людям подобається радіація, правда? Вони мають прагнути в шахти!"
    GMN_exploit_monongahela_decision:0 "Призвати рейнджерів на службу"
    GMN_exploit_monongahela_decision_desc:0 "У рейнджерів Мононгаели немає часу на відпочинок. Рокісти вже майже біля наших воріт! Поверніть їх у стрій!"
    GMN_exploit_manpower_decision:0 "Призвати біженців на службу"
    GMN_exploit_manpower_decision_desc:0 "Біженці на нашій території повинні готуватися захищати свій новий дім!"
    GMN_exploit_wealth_decision:0 "Стягнути орендну плату"
    GMN_exploit_wealth_decision_desc:0 "Біженці на нашій території не можуть просто так тинятися приватною власністю. Вони повинні платити оренду!"
    GMN_exploit_firearms_decision:0 "Вилучити зброю в біженців"
    GMN_exploit_firearms_decision_desc:0 "Нам потрібна вся зброя, яку ми можемо дістати для цієї битви. Заберіть зброю в біженців — вона їм не знадобиться, якщо наше ополчення зазнає невдачі!"
    GMN_support_wealth_decision:0 "Надати фінансову допомогу"
    GMN_support_wealth_decision_desc:0 "Біженці на нашій території ледве дісталися сюди, маючи лише одяг на собі та те, що змогли донести. Їм потрібні кришки, і ми маємо змогу їм допомогти."
    GMN_allocate_excess_food_decision:0 "Пожертвувати надлишки врожаю"
    GMN_allocate_excess_food_decision_desc:0 "Нам потрібно годувати набагато більше ротів, але їжі вдосталь. Краще віддати її нужденним, ніж продавати за межами Аппалачів."
    GMN_make_space_available_decision:0 "Звільнити місце для біженців"
    GMN_make_space_available_decision_desc:0 "У нас достатньо місця, щоб біженці могли утворити нові громади. Можливо, ми навіть отримаємо з цього щось хороше."
    GMN_work_with_refugees_decision:0 "Вести переговори з біженцями"
    GMN_work_with_refugees_decision_desc:0 "Ми готуємося до війни за саме виживання, але це не означає, що ми не повинні знайти час, щоб вислухати проблеми наших людей."
    GMN_war_support_decision:0 "Пообіцяти відвоювати землі"
    GMN_war_support_decision_desc:0 "Відігнати культистів-скельників від наших земель — це лише початок. Біженці знатимуть, що ми маємо намір повернути й їхні рідні землі."
