 # Events
  ontario_enclave_news.1.t:0 "Ontario takes its own path"
  ontario_enclave_news.1.d:0 "With the fall of the main body of the Enclave, officials in Ontario have officially taken control of their own government as a newly self-sufficient nation. The new Ontario President has declared that it would take up the mantle of it's fallen brother, and rebuild the United States on their own"
  ontario_enclave_news.1.a:0 "What are they going to do now?"
  ontario_enclave_news.1.b:0 "This represents an opportunity"
