 # Events
  ontario_enclave_news.1.t:0 "Онтаріо йде своїм власним шляхом"
  ontario_enclave_news.1.d:0 "З падінням основної частини Анклаву, посадовці Онтаріо офіційно взяли під контроль власний уряд як нова самодостатня країна. Новий президент Онтаріо заявив, що він візьме на себе роль свого загиблого брата та самостійно відбудує Сполучені Штати."
  ontario_enclave_news.1.a:0 "Що вони тепер збираються робити?"
  ontario_enclave_news.1.b:0 "Це являє собою можливість"
