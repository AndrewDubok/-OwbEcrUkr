  state_of_guards_text:0 "Охорона караванів"
  bln_guards_tt:0 "Охоронці, на жаль, є життєво важливим і необхідним елементом нашої §CМережі розподілу води§!. Чиста вода приваблює всіх у Столичній Пустці, тому на каравани часто нападають. Чим більше охоронців ми відправляємо, тим вища ймовірність, що вони досягнуть місця призначення.\n\n§OЗверніть увагу, що нам може не знадобитися багато охоронців з хорошим спорядженням, якщо доречніше відправити кілька добре озброєних охоронців або багато погано озброєних рекрутів — це теж може спрацювати.§!"
  bln_guards_one_tt:0 "[!guards_button_one_click]"
  bln_guards_two_tt:0 "[!guards_button_two_click]"
  bln_guards_three_tt:0 "[!guards_button_three_click]"
  bln_guards_four_tt:0 "[!guards_button_four_click]"
  bln_guards_three_amount_tt:0 "Кожен караван охоронятиме лицар зі своїм загоном.\n"
  bln_guards_four_amount_tt:0 "Кожен караван охоронятиме паладин зі своїм загоном.\n"
  bln_guards_one_idea:0 "Мінімальна охорона"
  bln_guards_two_idea:0 "Невелика охорона"
  bln_guards_three_idea:0 "Середня охорона"
  bln_guards_four_idea:0 "Посилена охорона"
  caravan_manpower:0 "Персонал караванів"

  state_of_equipment_text:0 "Рівень спорядження"
  bln_equipment_tt:0 "Як і охоронці, надійне спорядження необхідне для захисту нашої §CМережі розподілу води§!. Чим краще екіпіровані наші каравани, тим більша ймовірність, що вони зможуть відбити нападників.\n\n§OЗверніть увагу, що нам може не знадобитися багато охоронців з хорошим спорядженням, якщо доречніше відправити кілька добре озброєних охоронців або багато погано озброєних рекрутів — це теж може спрацювати.§!"
  bln_equipment_one_tt:0 "[!equipment_button_one_click]"
  bln_equipment_two_tt:0 "[!equipment_button_two_click]"
  bln_equipment_three_tt:0 "[!equipment_button_three_click]"
  bln_equipment_four_tt:0 "[!equipment_button_four_click]"
  bln_equipment_one_amount_tt:0 "Кожен караван буде оснащений базовою зброєю.\n"
  bln_equipment_two_amount_tt:0 "Кожен караван буде оснащений базовою зброєю, зброєю вогневої групи та підривним спорядженням.\n"
  bln_equipment_three_amount_tt:0 "Кожен караван буде оснащений базовою зброєю, зброєю вогневої групи та підривним спорядженням. Командир загону отримає костюм силової броні.\n"
  bln_equipment_four_amount_tt:0 "Кожен член каравану матиме костюм силової броні, а загін буде оснащений базовою зброєю, зброєю вогневої групи та підривним спорядженням.\n"
  bln_equipment_affordability_tt:0 "§OЯкщо у нас немає необхідного спорядження для поповнення каравану, ми автоматично знизимо рівень на один щабель і понесемо бюрократичні витрати.§!\n"
  bln_equipment_one_idea:0 "Базове спорядження"
  bln_equipment_two_idea:0 "Патрульне спорядження"
  bln_equipment_three_idea:0 "Важке спорядження"
  bln_equipment_four_idea:0 "Броньований патруль"

  state_of_preparation_text:0 "Підготовка караванів"
  bln_preparation_tt:0 "Хоча Проєкт «Чистота» досяг відносної стабільності, потребуючи небагато поточних ресурсів, які Братство охоче надає, проєкт з караванами набагато складніший. Вироблену Проєктом воду спочатку потрібно розлити в пляшки, перш ніж її можна буде доставити, і це саме по собі досить складний процес. Розливні заводи та машини рідкість у пустці.\n\n§YРівень підготовки впливатиме на кількість відправлених караванів. Чим більше води ми розливаємо, тим більше зможемо відправити.§!"
  bln_preparation_one_tt:0 "[!preparation_button_one_click]"
  bln_preparation_two_tt:0 "[!preparation_button_two_click]"
  bln_preparation_three_tt:0 "[!preparation_button_three_click_enabled]\n[!preparation_button_three_click]"
  bln_preparation_four_tt:0 "[!preparation_button_four_click_enabled]\n[!preparation_button_four_click]"
  bln_preparation_one_idea:0 "Ручний розлив"
  bln_preparation_two_idea:0 "Ручний розлив у великих масштабах"
  bln_preparation_three_idea:0 "Розливна машина"
  bln_preparation_four_idea:0 "Розливний завод"


