  ###BOP###
  BLN_loyalty_struggle:0 "Розкол у нашому Братстві"
  BLN_loyalist_influence:0 "Прихильність Кодексу"
  BLN_wastelander_influence:0 "Підтримка мешканців Пустки"
  BLN_loyalty_category:0 "Рішення про лояльність"
  BLN_balanced_influence:0 "Роздвоєна лояльність"
  BLN_balanced_influence_desc:0 "Цілі нашого відділення розділилися. Багато хто присвячує себе допомозі мешканцям Столичної Пустки. Так само багато хто глузує з цієї ідеї та дотримується початкової мети нашого відділення — забезпечення безпеки небезпечних технологій. Цей баланс не може тривати вічно."
  BLN_very_high_loyalist_influence:0 "Суворе дотримання Кодексу"
  BLN_very_high_loyalist_influence_desc:0 "Наше відділення слідує Кодексу майже до букви. І хоча час від часу від непримиренних прихильників все ж чується нарікання, насправді у них дуже мало підстав для невдоволення. Хоча, схоже, наш вибір не дуже подобається мешканцям пусток."
  BLN_high_loyalist_influence:0 "Сильна прихильність Кодексу"
  BLN_high_loyalist_influence_desc:0 "Кодекс є важливою частиною кожної нашої справи. Ми дуже рідко відступаємо від його мудрості, але якщо відступаємо, то тільки з вагомих причин. Хоча це не робить нам честі перед мешканцями пусток, вони визнають, що ми розсудливі, доки вони не лізуть до нас."
  BLN_moderately_high_loyalist_influence:0 "Тверде дотримання Кодексу"
  BLN_moderately_high_loyalist_influence_desc:0 "Наше відділення може час від часу відступати від Кодексу, але загалом прихильники жорсткого шляху в нашому відділенні розуміють, що ми повинні йти на деякі компроміси, щоб залишатися вірними нашій місії. Однак жителі Столичної пустки хотіли б, щоб ми могли зробити більше."
  BLN_very_high_wastelander_influence:0 "Боротьба за Праве Діло!"
  BLN_very_high_wastelander_influence_desc:0 "Жителі Столичної пустки знають, що Відділення Лайонса готове прийти на допомогу. Можливо, в нашому ордені зростає кількість недоброзичливців, але їхні крики про Кодекс не зможуть заглушити крики жителів Столичної пустки з проханням про допомогу!"
  BLN_high_wastelander_influence:0 "Допомагати людям"
  BLN_high_wastelander_influence_desc:0 "Основна мета нашої місії змінилася. Ми, як і раніше, шукаємо небезпечні технології і намагаємося дотримуватися принципів Братства, однак порятунок жителів Столичної пустки є нашим пріоритетом. Через це у нас виникли проблеми з деякими з наших."
  BLN_moderately_high_wastelander_influence:0 "Допомагаємо, де можемо"
  BLN_moderately_high_wastelander_influence_desc:0 "Допомога жителям Столичної Пустки стає дедалі важливішим напрямком діяльності нашого відділення, і жителі Пустки вдячні нам за це. Але не всі в Цитаделі цьому раді."
