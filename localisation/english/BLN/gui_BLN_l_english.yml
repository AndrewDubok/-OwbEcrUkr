  ###BOP###
  BLN_loyalty_struggle:0 "Розкол у нашому Братстві"
  BLN_loyalist_influence:0 "Відданість Кодексу"
  BLN_wastelander_influence:0 "Підтримка жителів Пустки"
  BLN_loyalty_category:0 "Рішення щодо лояльності"
  BLN_balanced_influence:0 "Розділена лояльність"
  BLN_balanced_influence_desc:0 "Наше відділення розділене у своїх цілях. Багато хто в нашому відділенні присвячує себе допомозі людям Столичної Пустки. Так само багато хто зневажливо ставиться до цієї ідеї та дотримується початкових цілей нашого відділення — захисту небезпечних технологій. Така рівновага не може тривати вічно."
  BLN_very_high_loyalist_influence:0 "Суворе дотримання Кодексу"
  BLN_very_high_loyalist_influence_desc:0 "Наше відділення дотримується Кодексу майже до букви. Хоча іноді ще чути ремствування від радикалів, їм майже на що серйозно скаржитися. Однак, здається, наш вибір не надто подобається жителям пусток."
  BLN_high_loyalist_influence:0 "Сильне дотримання Кодексу"
  BLN_high_loyalist_influence_desc:0 "Кодекс є важливою частиною кожного нашого рішення. Ми дуже рідко відхиляємося від його мудрості, але коли це трапляється, то з поважної причини. Хоча це не здобуває нам прихильності серед жителів пусток, вони визнають, що ми розсудливі, якщо вони не стають нам на дорозі."
  BLN_moderately_high_loyalist_influence:0 "Тверде дотримання Кодексу"
  BLN_moderately_high_loyalist_influence_desc:0 "Наше відділення може час від часу відступати від Кодексу, але загалом радикали в нашому відділенні розуміють, що нам потрібно піти на кілька компромісів, щоб залишатися вірними нашій місії. Однак люди Столичної Пустки бажають, щоб ми могли робити більше."
  BLN_very_high_wastelander_influence:0 "Боротьба за праве діло!"
  BLN_very_high_wastelander_influence_desc:0 "Жителі Столичної Пустки знають, що Лайонсівське відділення тут, щоб допомогти. Можливо, в нашому ордені зростає кількість невдоволених, але їхні крики про Кодекс не можуть заглушити благань Столичної Пустки про нашу допомогу!"
  BLN_high_wastelander_influence:0 "Допомога людям"
  BLN_high_wastelander_influence_desc:0 "Головна мета нашої місії змінилася. Ми все ще шукаємо небезпечні технології та намагаємося дотримуватися принципів Братства, однак порятунок людей Столичної Пустки є нашим пріоритетом. Це створило нам проблеми з деякими з наших."
  BLN_moderately_high_wastelander_influence:0 "Допомагати, де можемо"
  BLN_moderately_high_wastelander_influence_desc:0 "Допомога людям Столичної Пустки стає все більш важливим напрямком у нашому відділенні, і жителі пусток дякують нам за це. Але не всі в Цитаделі цьому раді."
