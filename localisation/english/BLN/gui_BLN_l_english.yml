  state_of_guards_text:0 "Охоронці караванів"
  bln_guards_tt:0 "Охоронці, на жаль, є життєво важливим і необхідним елементом нашої §CМережі Розподілу Води§!. Чиста вода потрібна всім у Столичній пустці, і каравани часто піддаються нападам. Чим більше охоронців ми пошлемо, тим більше шансів, що вони дістануться до місця призначення.\n\n§OЗверніть увагу, що нам може не знадобитися багато охоронців з хорошим спорядженням, якщо доцільніше послати кілька добре озброєних охоронців або багато погано озброєних новобранців — це може спрацювати просто чудово.§!"
  bln_guards_one_tt:0 "[!guards_button_one_click]"
  bln_guards_two_tt:0 "[!guards_button_two_click]"
  bln_guards_three_tt:0 "[!guards_button_three_click]"
  bln_guards_four_tt:0 "[!guards_button_four_click]"
  bln_guards_three_amount_tt:0 "Кожен караван буде охоронятися лицарем і його загоном.\n"
  bln_guards_four_amount_tt:0 "Кожен караван буде охоронятися паладином і його загоном.\n"
  bln_guards_one_idea:0 "Мінімальна охорона каравану"
  bln_guards_two_idea:0 "Невелика охорона каравану"
