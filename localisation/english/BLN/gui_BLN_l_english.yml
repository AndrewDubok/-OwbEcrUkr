l_english:
  "Проєкт «Чистота» був не простим завданням, але його продовження виявилося не менш складним. Писар Бігслі був поставлений на чолі цієї кошмарної Розподільчої мережі, і йому доведеться керувати не тільки караванами, а й писарями, які стоять за цими караванами, і писарями, які стоять за цими писарями.\n\nБігслі доведеться зважити свої можливості та отримати якомога більше підтримки від решти членів байдужого Братства."
  
  state_of_bureaucracy_text:0 "Статус менеджменту: [bln_management_status]\nТенденція: [bln_management_trend]"
  bln_bureaucracy_tt:0 "Здатність наших писарів керувати зростаючою §CМережею Розподілу Води§! є життєво важливою частиною її успіху. Бігслі отримав писарів, які недосвідчені, з якими важко працювати або яких відсторонили від інших обов'язків через внутрішню політику, і тепер йому потрібно зробити з них ефективну групу.\n\n§YМенеджмент§! буде неухильно зростати, якщо у нас не буде достатньо писарів, щоб тримати його під контролем. Це не тільки призведе до §Rзменшення§! здатності керувати мережею, але й може змусити Бігслі піти на §Oнеприємні угоди§! або ситуації, які важко вирішити. У міру погіршення ситуації змінюватимуться й заходи, до яких Бігслі буде змушений вдаватися..."
