l_english:
  water_distribution_text:0 "Проєкт «Чистота» був непростим завданням, але його підтримка не менш складна. Писар Бігслі був призначений відповідальним за цю мережу розподілу, справжній кошмар, і тепер він мусить керувати не лише караванами, а й писарями, які відповідають за ці каравани, та писарями, які відповідають за тих писарів.\n\nБігслі доведеться зважити всі варіанти та отримати якомога більше підтримки від решти байдужого Братства."

  state_of_bureaucracy_text:0 "Стан управління: [bln_management_status]\nТенденція: [bln_management_trend]"
  bln_bureaucracy_tt:0 "Здатність наших писарів керувати зростаючою §CМережею розподілу води§! є життєво важливою для її успіху. Бігслі дісталися писарі, які або недосвідчені, або з якими важко працювати, або ж їх усунули від інших обов'язків через внутрішню політику. Тепер йому потрібно зробити з них ефективну групу.\n\n§YРівень управління§! буде неухильно зростати, якщо у нас не буде достатньо писарів, щоб його стримувати. Це не лише призведе до §Rзниження§! здатності керувати мережею, але й може змусити Бігслі йти на §Oнеприємні угоди§! або потрапляти у ситуації, які важко вирішити. Чим гіршими ставатимуть справи, тим жорсткіших заходів доведеться вживати Бігслі..."
  BLN_going_smooth:0 "§GВсе йде гладко§!"
