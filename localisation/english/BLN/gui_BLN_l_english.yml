  state_of_equipment_text:0 "Рівень спорядження"
  bln_equipment_tt:0 "Як і охоронці, надійне спорядження необхідне для захисту нашої §CМережі Розподілу Води§!. Чим краще оснащені наші каравани, тим більше шансів, що їм вдасться відігнати нападників.\n\n§OЗверніть увагу, що нам не потрібно багато охоронців з хорошим спорядженням, якщо доцільніше послати кілька добре озброєних охоронців або багато погано озброєних новобранців — це може спрацювати просто чудово.§!"
  bln_equipment_one_tt:0 "[!equipment_button_one_click]"
  bln_equipment_two_tt:0 "[!equipment_button_two_click]"
  bln_equipment_three_tt:0 "[!equipment_button_three_click]"
  bln_equipment_four_tt:0 "[!equipment_button_four_click]"
  bln_equipment_one_amount_tt:0 "Кожен караван буде оснащений базовою зброєю.\n"
  bln_equipment_two_amount_tt:0 "Кожен караван буде оснащений базовою зброєю, зброєю вогневої групи та підривним спорядженням.\n"
  bln_equipment_three_amount_tt:0 "Кожен караван буде оснащений базовою зброєю, зброєю вогневої групи та підривним спорядженням. Командиру загону буде видано силову броню.\n"
  bln_equipment_four_amount_tt:0 "Кожен член каравану буде у силовій броні, а загін буде оснащений базовою зброєю, зброєю вогневої групи та підривним спорядженням.\n"
  bln_equipment_affordability_tt:0 "§OЯкщо у нас немає спорядження, необхідного для поповнення запасів каравану, ми автоматично знижуємося на один рівень і зазнаємо бюрократичних витрат.§!\n"
  bln_equipment_one_idea:0 "Базове спорядження"
  bln_equipment_two_idea:0 "Патрульне спорядження"
  bln_equipment_three_idea:0 "Важке спорядження"
  bln_equipment_four_idea:0 "Броньований патруль"

  state_of_preparation_text:0 "Підготовка караванів"
  bln_preparation_tt:0 "У той час як проєкт «Чистота» досяг точки відносної стійкості, не потребуючи особливих постійних ресурсів і охоче забезпечуючись Братством, проєкт караванів набагато складніший. Вода, створена в рамках проєкту, повинна бути спочатку розлита в пляшки, перш ніж її можна буде доставити, а це саме по собі досить складний процес. Заводи та машини для розливу є рідкістю в пустці.\n\n§YПідготовка впливатиме на кількість караванів, які будуть відправлені. Чим більше води ми розливаємо в пляшки, тим більше ми можемо відправити.§!"
  bln_preparation_one_tt:0 "[!preparation_button_one_click]"
  bln_preparation_two_tt:0 "[!preparation_button_two_click]"
