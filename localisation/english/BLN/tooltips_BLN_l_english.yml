l_english:
  BLN_special_reward_tt:0 "§7Це дасть можливість отримати бонус пізніше.§!"
  BLN_ghoul_unrest_tt:0 "§2Населення гулів почне §!§Rне довіряти§!§2 Братству Сталі§!"
  BLN_ghoul_friendly_tt:0 "§2Населення гулів почне§! §Gдовіряти§!§2 Братству Сталі§!"
  BLN_expeditions_tt:0 "Розблокує рішення щодо відправлення експедицій на Східне Узбережжя"
  BLN_tooltip_1_tt:0 "Відкриває можливості для пошуку лігва супермутантів"
  BLN_tooltip_2_tt:0 "Це піддасть Старійшину більшому ризику!"
  BLN_tooltip_3_tt:0 "Це допоможе захистити Старійшину!"
  BLN_tooltip_4_tt:0 "Він майже прийняв рішення, це може не спрацювати"
  BLN_tooltip_5_tt:0 "Це матиме катастрофічні наслідки для Пустки!"
  BLN_tooltip_6_tt:0 "Через ваші обіцянки Касдіну це єдиний можливий варіант дій"
  BLN_tooltip_7_tt:0 "Нагадайте Касдіну, що ми завжди ставили Братство вище за мешканців Пустки"
  BLN_tooltip_8_tt:0 "Через 12 годин ми почнемо атаку. §gПереконайтеся, що Ліберті Прайм призначений генералом в армії за річкою. Навіть тоді він може не очолити атаку§!"
  BLN_tooltip_9_tt:0 "Анклав закопається, і вибити його буде дедалі важче!"
  BLN_tooltip_10_tt:0 "Перший постріл у цій війні зробимо ми!"
  BLN_tooltip_11_tt:0 "Це похмурий день для Братства"
  BLN_tooltip_12_tt:0 "Тридог допоможе Братству в боротьбі на стороні добра"
  BLN_tooltip_13_tt:0 "Писар Кліфтон подбає про те, щоб послання Братства почули всі в Столичній Пустці"
  BLN_tooltip_14_tt:0 "Нові паладини виходять на поле бою"
  BLN_tooltip_15_tt:0 "Вони навіть прислали нам кілька кораблів!"
  BLN_tooltip_16_tt:0 "Паладин Курц і кілька лицарів будуть відправлені до Пітта"
  BLN_tooltip_17_tt:0 "Про що це — експедицію до Флориди?"
  BLN_tooltip_18_tt:0 "Лицар-командир Робінсон був §Rліквідований."
  BLN_tooltip_19_tt:0 "Нові Лицарі виходять на поле бою!"
  BLN_tooltip_20_tt:0 "Хто знає, що знайде експедиція, а що ні?"
  BLN_tooltip_21_tt:0 "Старійшина Касдін призначає кількох вірних братів на важливі посади."
  BLN_tooltip_22_tt:0 "Відкриває доступ до рішень щодо розкопок у руїнах Вашингтона"
  BLN_tooltip_23_tt:0 "Брати із заходу прибувають, щоб допомогти нашому відділенню"
  BLN_tooltip_24_tt:0 "Згубна політика старійшин Лайонсів буде скасована або замінена політикою, що відповідає Кодексу." 

  bln_sublevel_one_cleared_tt:0 "§gПерший підрівень§! Цитаделі буде очищено, що дозволить нам приступити до §gДругого підрівня§!"
  bln_sublevel_two_cleared_tt:0 "§gДругий підрівень§! Цитаделі буде очищено, що дозволить нам почати спускатися далі під землю"

  bln_has_cleared_sublevel_one_tt:0 "Перший §gПідрівень§! має бути очищений, перш ніж ми зможемо приступити до §gДругого підрівня§!"
  bln_has_cleared_sublevel_two_tt:0 "Другий §gПідрівень§! має бути очищений, перш ніж ми підемо далі під землю"

  bln_unlock_more_trade_decisions_tt:0 "Це розблокує більше рішень §YЗахищеної торгівлі§!"
  bln_unlock_more_merc_decisions_tt:0 "Це розблокує рішення, пов'язані з §Cнайманцями§!, де це доречно"

  bln_mercs_available_tt:0 "Якщо ми виконали фокус §YОбов'язкові виплати§!, то зможемо найняти §Cнайманців§! для цієї місії"

  bln_only_one_protected_trade_decision_tt:0 "Одночасно може бути прийнято тільки одне з цих рішень"

  bln_dedicated_patrol_increase_tt:0 "Кожен §Yпатруль§! даватиме нам §Gкришки§! щомісяця та послаблюватиме силу §7супермутантів§! з мінімальними майбутніми інвестиціями."
  bln_dedicated_patrol_decrease_tt:0 "Ми повернемо §Yпатруль§!, забравши їхнє спорядження та людські ресурси, але зменшивши ефект від патрулів."
  bln_has_patrols_tt:0 "Ми відправили принаймні один §Yпатруль§!"

  bln_loyalist_influence_increase_tt:0 "Це §Gпідвищить§! вплив §Bлоялістів Лост-Хіллз§!"
  bln_loyalist_influence_decrease_tt:0 "Це §Rзменшить§! вплив §Bлоялістів Лост-Хіллз§!"
  bln_loyalist_support_increase_tt:0 "Це §Gпідвищить§! нашу підтримку серед §Bлоялістів Лост-Хіллз§!"
  bln_loyalist_support_decrease_tt:0 "Це §Rзменшить§! нашу підтримку серед §Bлоялістів Лост-Хіллз§!"

  bln_wastelander_influence_increase_tt:0 "Це §Gзбільшить§! вплив §gприхильників мешканців пусток§!"
  bln_wastelander_support_increase_tt:0 "Це §Gпідвищить§! нашу підтримку серед §gмешканців Пустки§!"
  bln_wastelander_support_decrease_tt:0 "Це §Rзнизить§! нашу підтримку серед §gмешканців Пустки§!"

  bln_balance_support_tt:0 "Це змістить баланс сил §Oв бік середини§!"

  bln_rapid_loyalist_influence_decrease_tt:0 "§BЛоялісти§! швидко втратять вплив"
  bln_loyalist_influence_decrease_tt:0 "§BЛоялісти§! втратять вплив"
  bln_slow_loyalist_influence_decrease_tt:0 "§BЛоялісти§! повільно втрачатимуть вплив"
  bln_rapid_loyalist_influence_increase_tt:0 "§BЛоялісти§! швидко набиратимуть вплив"
  bln_loyalist_influence_increase_tt:0 "§BЛоялісти§! набиратимуть вплив"
  bln_slow_loyalist_influence_increase_tt:0 "§BЛоялісти§! повільно набиратимуть вплив"

  bln_wastelanders_gaining_support:0 "§gМешканці Пусток§! нарощують підтримку"
  bln_wastelanders_gaining_small_support:0 "§gМешканці Пусток§! нарощують підтримку"
  bln_loyalists_gaining_support:0 "§BЛоялісти§! нарощують підтримку"
  bln_loyalists_gaining_small_support:0 "§BЛоялісти§! нарощують підтримку"

  bln_start_water_distribution_tt:0 "Буде розблоковано §Yкатегорію рішень§!, що дозволяє відправляти каравани з водою в пустку. Ми можемо підвищити їхні шанси на успіх, виділивши більше ресурсів, і як тільки ми завершимо фокус §YСтабільний потік§!, успішні місії дозволять нам інтегрувати територію цих держав."

  bln_friendly_distribution_tt:0 "Успішні місії караванів дадуть нам §Yлюдські ресурси§! та посилять вплив §gмешканців Пустки§!."
  bln_pragmatic_distribution_tt:0 "Успішні місії караванів дадуть нам §Yкришки§!."
  bln_isolationist_distribution_tt:0 "Успішні місії караванів дадуть нам невелику кількість §Yвисокотехнологічного спорядження§! та посилять вплив §Bлоялістів§!."

  bln_weaken_bandit_attacks_merc_tt:0 "Це послабить напади бандитів на наші каравани з водою.\n\n§OОднак, найманці завжди шукають заробітку і навряд чи захочуть остаточно позбутися бандитів§!"
  bln_weaken_bandit_attacks_tt:0 "Це послабить напади бандитів на наші каравани з водою.\n\n§gХоча наші Лицарі не так добре навчені захищати каравани в пустках, вони з більшою ймовірністю знищать бандитів остаточно§!"

  bln_distribution_hubs_tt:0 "Ми зможемо використовувати інші місця як розподільчі центри для води з проєкту «Чистота». Кожне місце матиме свої переваги та недоліки. Уклавши союзи з Рівет-Сіті та поселеннями Столичної Пустки (або завоювавши їхні держави), ми зможемо використовувати деякі з їхніх поселень як центри."


  bln_switch_hubs_project_purity_tt:0 "Різні розподільчі центри матимуть різні ефекти та бонуси.\n\nПеревезення води до центрів несе ризик нападу. Хоча ці конвої більші та безпечніші, ми все одно можемо зазнати втрат. Ризик нападу на цьому маршруті §Gвідсутній§!.\n\nПодальші ефекти від розподілу води звідси:\n§RВідсутні§!"
  bln_switch_hubs_rivet_city_tt:0 "Різні розподільчі центри матимуть різні ефекти та бонуси.\n\nПеревезення води до центрів несе ризик нападу. Хоча ці конвої більші та безпечніші, ми все одно можемо зазнати втрат. Ризик нападу на цьому маршруті §Yнизький§!.\n\nПодальші ефекти від розподілу води звідси:\n§GРівет-Сіті виділить сили безпеки для захисту караванів, що зменшить наші потреби в людях та спорядженні§!"
  bln_switch_hubs_citadel_tt:0 "Різні розподільчі центри матимуть різні ефекти та бонуси.\n\nПеревезення води до центрів несе ризик нападу. Хоча ці конвої більші та безпечніші, ми все одно можемо зазнати втрат. Ризик нападу на цьому маршруті §Yнизький§!.\n\nПодальші ефекти від розподілу води звідси:\n§GНаша мережа писарів може бути більш централізованою, що зменшить наші бюрократичні потреби§!"
  bln_switch_hubs_canterbury_commons_tt:0 "Різні розподільчі центри матимуть різні ефекти та бонуси.\n\nПеревезення води до центрів несе ризик нападу. Хоча ці конвої більші та безпечніші, ми все одно можемо зазнати втрат. Ризик нападу на цьому маршруті §Rвисокий§!.\n\nПодальші ефекти від розподілу води звідси:\n§GНаші каравани будуть подорожувати разом із караванами Кентербері-Коммонс, даючи нам кришки та базове спорядження за кожен успішний караван§!"
  bln_switch_hubs_megaton_tt:0 "Різні розподільчі центри матимуть різні ефекти та бонуси.\n\nПеревезення води до центрів несе ризик нападу. Хоча ці конвої більші та безпечніші, ми все одно можемо зазнати втрат. Ризик нападу на цьому маршруті §Oсередній§!.\n\nПодальші ефекти від розподілу води звідси:\n§GЗбирачі Мегатонни дадуть нам невелику кількість ресурсів§!"

  bln_ten_successful_deliveries_tt:0 "Нам потрібно успішно доставити сюди воду §Y10§! разів (поточно: [?FROM.bln_state_successful_deliveries])"

  bln_one_project_at_a_time_tt:0 "Ми можемо реалізовувати тільки один проєкт з розподілу води за раз"
  bln_rivet_city_pipeline_tt:0 "Будівництво §Cтрубопроводу до Рівет-Сіті§! усуне §Oнебезпеку§! переміщення води до §CРівет-Сіті§! та надасть §CРівет-Сіті§! постійний бонус (і можливість §Gінтегрувати§! його, якщо він нам належить)."
  bln_build_bottling_machine_tt:0 "Будівництво §Gмашини для розливу води§! розблокує два вищих рівні §Yпідготовки§!."
  bln_need_bottle_press_tt:0 "Ми побудували машину для розливу"
  bln_build_offices_tt:0 "Будівництво §Gкращих офісів§! для писарів, які працюють над §CМережею Розподілу Води§!, дозволить їм керувати проєктом більш §Gефективно§!"
  bln_need_better_offices_tt:0 "Ми побудували кращі офіси для наших писарів"

  bln_positive_relations_small:0 "Покращення відносин"

