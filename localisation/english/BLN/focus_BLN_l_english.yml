  ######################################################
  ######################################################

  BLN_nf_a001:0 "Місія"
  BLN_nf_a001_desc:0 "У 2254 році правляча рада Братства Сталі вирішила відправити загін паладинів, лицарів і писарів на Східне Узбережжя з метою отримання передових технологій зі східних міст і баз."
  BLN_nf_a002:0 "Цитадель"
  BLN_nf_a002_desc:0 "Коли експедиція досягла Столичної Пустки, вони виявили Пентагон. Цей довоєнний військовий об'єкт сильно постраждав під час війни та за час, що минув, однак підрівні залишилися переважно незайманими. Після деякого ремонту він стане базою Братства на Східному Узбережжі."
  BLN_nf_a003:0 "Бич Божий"
  BLN_nf_a003_desc:0 "Одна з перших цілей експедиції Східного Братства, Пітт був вигрібною ямою, в якій гніздилися рейдери та троги. Братство пронеслося містом за одну ніч, убиваючи всіх, хто чинив опір, і забираючи все цінне."
  BLN_nf_a004:0 "Людина, що змінилася"
  BLN_nf_a004_desc:0 "Щось змінилося в старійшині Лайонсі. Він став неуважним і іноді віддає накази, що суперечать Кодексу. Можливо, він просто пристосовується до нової ролі старійшини."
  BLN_nf_a005:0 "Сталева економіка"
  BLN_nf_a005_desc:0 "У той час як лицарі та писарі нашого ордену із задоволенням їдять у їдальні, у мешканців пусток, з якими ми іноді маємо справу, інші бажання."
  BLN_nf_a006:0 "Не зв'язуватися"
  BLN_nf_a006_desc:0 "Прихильники жорсткої лінії мають рацію: якщо ми зараз підемо на компроміс і почнемо продавати технології мешканцям пусток, це призведе до катастрофи. Сьогодні це лише кілька термоядерних елементів і зламані деталі зброї, а що буде завтра?"
  BLN_nf_a007:0 "Компроміс?"
  BLN_nf_a007_desc:0 "Кодекс забороняє працювати з чужинцями або допомагати їм, але ми далеко від наших побратимів на західному узбережжі. Відступ від правил у деяких місцях, але посилення їх в інших може стати способом зберегти наші ідеали та отримати те, що нам потрібно для виконання нашої місії."
  BLN_nf_a008:0 "Квартирмейстери від дверей до дверей"
  BLN_nf_a008_desc:0 "Важко зробити два кроки руїнами Вашингтона, щоб не знайти якусь небезпечну техніку або хоча б коробку з мікроячейками. Ми відправимо квартирмейстерів на звалища та торгові пункти пустки, щоб дізнатися, чи є там щось, що нам потрібно, і знайти спосіб заплатити за це."
  BLN_nf_a009:0 "Вилучення ресурсів"
  BLN_nf_a009_desc:0 "Руїни Столичної Пустки повні довоєнних небезпек, яким не місце в руках необізнаних мас. Наші лицарі будуть уповноважені вжити всіх необхідних заходів, щоб врятувати мешканців Пустки від їхнього невігластва."
  BLN_nf_a010:0 "Захист Братства"
  BLN_nf_a010_desc:0 "Численні поселення та каравани звернулися до нашого ордену по захист і допомогу. Хоча ми не є найманцями, робота із захисту може слугувати гарним тренуванням для новачків, а виплати допоможуть фінансувати важливіші проєкти."
  BLN_nf_a011:0 "Захист караванів"
  BLN_nf_a011_desc:0 "Наші відносини з торговцями Пусток виявилися корисними; тепер деякі просять найняти кількох лицарів або хоча б посвячених для охорони караванів на особливо небезпечних територіях."
  BLN_nf_a012:0 "Повна автономія"
  BLN_nf_a012_desc:0 "Братство твердо стоїть на своїх ідеалах і не піде на компроміс із мешканцями пусток. Ми єдині у своїй місії та зробимо все можливе, щоб жахи минулого не повторилися."
  BLN_nf_a013:0 "Платіжні відомості Паладинів"
  BLN_nf_a013_desc:0 "Завдяки прибуткам від угод із чужинцями ми можемо забезпечити наших паладинів чимось додатковим як винагороду за їхні зусилля."
  BLN_nf_a014:0 "Обов'язкова винагорода"
  BLN_nf_a014_desc:0 "Місії Братства недостатньо, щоб спонукати кожного мешканця пустки ризикувати своїм життям, але з нашим новим багатством ми могли б почати виплачувати деяким воїнам винагороду або навіть наймати найманців, коли це необхідно."
  BLN_nf_a015:0 "Брати по фінансах"
  BLN_nf_a015_desc:0 "У нас є все, що потрібно для нашої місії. Тепер ми можемо перейти до невідкладних справ."
  BLN_nf_a016:0 "Звітування"
  BLN_nf_a016_desc:0 "Старійшини на заході вийшли на зв'язок, запитуючи черговий звіт про прогрес нашої місії."
  BLN_nf_a017:0 "Виконати запит Лост-Хіллз"
  BLN_nf_a017_desc:0 "Лост-Хіллз мають рацію, ця експедиція, яку вони хочуть, щоб ми спорядили, важлива!"
  BLN_nf_a018:0 "Ігнорувати запит Лост-Хіллз"
  BLN_nf_a018_desc:0 "Нам потрібен кожен Лицар у Цитаделі тут, у Вашингтоні. Просто складіть якісь звіти, що ми відправили ту експедицію."
  BLN_nf_a019:0 "Таємниці Старого Світу"
  BLN_nf_a019_desc:0 "Паладин Касдін готує звіт про об'єкти у Вашингтоні, які потребують уваги."
  BLN_nf_a020:0 "Більше експедицій"
  BLN_nf_a020_desc:0 "Паладин має рацію. Навіть якщо у нас повні руки проблем із супермутантами, ці місця мають життєво важливе значення."
  BLN_nf_a021:0 "Пріоритет Хрестового походу"
  BLN_nf_a021_desc:0 "Кілька запорошених файлів або старих схем нічого не варті, якщо Столична Пустка буде переповнена супермутантами! Зосередьтеся на важливому."
  BLN_nf_a022:0 "Таємна зброя"
  BLN_nf_a022_desc:0 "Ніхто з тих, хто працює в лабораторії Цитаделі, не може ігнорувати 200-тонного слона в кімнаті. Останні кілька десятиліть ми працювали над вирішенням проблем з енергією, з якими вони боролися ще до війни, але зараз ми на порозі прориву."
  BLN_nf_a023:0 "Робота в «Галактиці»"
  BLN_nf_a023_desc:0 "Посеред руїн Вашингтона знаходяться руїни довоєнної радіомережі. Вона може виявитися корисною."
  BLN_nf_a024:0 "Друзі з низів"
  BLN_nf_a024_desc:0 "Трипес продовжує розповідати пустці про боротьбу за добро, а його укріплений бункер слугує гарним місцем для відпочинку та відновлення наших патрулів."
  BLN_nf_a025:0 "Сталева мережа"
  BLN_nf_a025_desc:0 "Команда писарів час від часу наповнюватиме ефір музикою, а також розповідями про наші великі жертви та боротьбу за захист людей від самих себе."
  BLN_nf_a026:0 "Бібліотека Конгресу"
  BLN_nf_a026_desc:0 "Бібліотека Конгресу служила останні два століття не лише притулком для рейдерів і падальників, спалюючи знання, цінніші за метал, який вони могли витягнути зі стін. Ми відправимо команду, щоб зачистити будівлю та використовувати її за призначенням."
  BLN_nf_a027:0 "Терабайти даних"
  BLN_nf_a027_desc:0 "Нещодавно знайдене креслення показує, що під Бібліотекою Конгресу знаходиться база даних довоєнної військової інформації. При спробі отримати доступ до даних наші писарі ввімкнули захист від збоїв, і тепер доступ до даних можливий лише через термінал, який охороняється кількома рівнями автоматичної системи безпеки та дверима, які замикаються закодованими терміналами. Ще гірше те, що якщо ми не отримаємо доступ найближчим часом, дані можуть бути стерті в рамках автоматизованих заходів безпеки. Щоб впоратися з цим, знадобляться тижні скоординованих зусиль, включаючи відволікання Лицарів від боротьби з супермутантами в руїнах Вашингтона, щоб впоратися з автоматичними турелями та роботами-охоронцями."
  BLN_nf_a028:0 "Зачистка Столичної Пустки"
  BLN_nf_a028_desc:0 "Супермутанти залишаються найбільшою загрозою для пустки, ми продовжимо нашу місію з їхнього знищення. Завжди знайдеться ще один довоєнний тайник із даними, і якщо його стерти, він все одно не становитиме загрози для пустки."
  BLN_nf_a029:0 "Форт Індепенденс"
  BLN_nf_a029_desc:0 "Старійшини на заході віддали наказ взяти сусідній Форт Індепенденс. На жаль, є ще одна невідкладна справа, яка потребує нашої уваги."
  BLN_nf_a030:0 "Чому ми тут?"
  BLN_nf_a030_desc:0 "Ми знаходимося в Столичній Пустці вже понад 20 років. Деякі з нас тут із самого початку, інші — нещодавні прибульці або рекрути. Майже всі ми маємо одне нагальне питання: \n\nВи коли-небудь замислювалися, чому ми тут?"
  BLN_nf_b001:0 "Оливкова гілка"
  BLN_nf_b001_desc:0 "Не секрет, що Касдін і дедалі більша кількість членів нашого ордену незадоволені тим, у якому напрямку ми рухаємося. Нам слід зустрітися і подивитися, чи зможемо ми якось заспокоїти їхні занепокоєння."
  BLN_nf_b002:0 "Обов'язок Лицаря"
  BLN_nf_b002_desc:0 "Лицар Братства не тільки б'ється на передовій, але й обслуговує обладнання та допомагає у виробництві. Конфлікт із супермутантами змусив деяких забути про це, але ми повинні нагадати їм."
  BLN_nf_b003:0 "Громадські майстерні"
  BLN_nf_b003_desc:0 "Замість того, щоб наші лицарі продовжували працювати в наших майстернях, ми почнемо програму зброєносців, де умільці Пустки зможуть вчитися у лицарів в обмін на свою службу. Ми отримуємо їхню працю, а вони — знання з механіки, і це справді вигідно."
  BLN_nf_b004:0 "Лицарське озброєння прибуває на Схід"
  BLN_nf_b004_desc:0 "Старійшини на Заході не забули про нас, і, незважаючи на деякі послаблення в нашій політиці, вони все ще хочуть надати нам допомогу. Лицарі-радники відправляються на схід, щоб допомогти нам створити кращу виробничу базу."
  BLN_nf_b006:0 "Перепрофілювати будівлі"
  BLN_nf_b006_desc:0 "У посланих до нас лицарів є кілька ідей, як ми можемо перепрофілювати споруди поблизу Цитаделі, щоб вони краще відповідали нашим потребам."
  BLN_nf_b005:0 "Праця мешканців Пустки"
  BLN_nf_b005_desc:0 "Деякі з тих, кому не пощастило, із задоволенням працюють на нас за їжу та захист, поки не стануть на ноги. Прийнявши їхню пропозицію, ми могли б збільшити нашу виробничу базу."
  BLN_nf_b007:0 "Кузні Сталі"
  BLN_nf_b007_desc:0 "Кузні палають, і виробництво йде повним ходом. Більше нам не доведеться покладатися виключно на збиральництво та торгівлю, щоб добути собі спорядження. Нехай ми ще не дійшли до виробництва плазмових гвинтівок, але ми вже робимо перші кроки."
  BLN_nf_b008:0 "Зони, вільні від мутантів"
  BLN_nf_b008_desc:0 "Наші операції зі знищення супермутантів у руїнах Вашингтона дають результати. Ми на межі того, щоб витіснити їх із кількох ключових районів. За допомогою правильних зусиль ми могли б витіснити їх зі стратегічних місць і гарантувати, що вони не повернуться."
  BLN_nf_b009:0 "Окупувати Торговий Центр"
  BLN_nf_b009_desc:0 "Національний Торговий Центр — це серце центру округу Колумбія. Із тунелів метро, які перетинають Молл, можна дістатися майже до будь-якого іншого району. Створення тут постійного форпосту матиме важливе значення для операцій у руїнах."
  BLN_nf_b010:0 "Бібліотечний форпост"
  BLN_nf_b010_desc:0 "Створення постійного форпосту в Бібліотеці Конгресу допоможе нам заповнити прогалини, які залишили зіпсовані архіви."
  BLN_nf_b011:0 "Укріпити GNR"
  BLN_nf_b011_desc:0 "GNR — одне з найбезпечніших місць у руїнах у центрі Вашингтона, а також цінний комунікаційний центр. Його зміцнення є життєво важливим для наших операцій у Вашингтоні."
  BLN_nf_b012:0 "Переддишка"
  BLN_nf_b012_desc:0 "Завдяки посиленим перевіркам і створенню більш надійних аванпостів ми отримали можливість перевести подих. Тепер ми можемо звернути увагу на інші питання."
  BLN_nf_b013:0 "Забезпечити безпеку наших ліній постачання"
  BLN_nf_b013_desc:0 "У новій ситуації ми повинні переглянути нашу логістику і подивитися, чи є способи більш ефективно захистити наші лінії постачання."
  BLN_nf_b014:0 "Розширений захист поселень"
  BLN_nf_b014_desc:0 "Рейдери та супермутанти залишаються щоденною проблемою для наших союзників у пустках. Вони знову звертаються до нас по допомогу, і умови варто розглянути."
  BLN_nf_b015:0 "Кадрові проблеми"
  BLN_nf_b015_desc:0 "Життя лицаря або паладина не для людей зі слабкими нервами. Ці воїни стикаються з незліченними небезпеками, виконуючи свій обов'язок, і з часом несуть втрати. У нас є новий клас посвячених, які закінчують навчання, але кадрові проблеми — це більш постійна проблема."
  BLN_nf_b016:0 "Поповнити ряди"
  BLN_nf_b016_desc:0 "Навіть із кришками як мотивацією нам важко знайти якісних солдатів, щоб заповнити втрати наших відкинутих братів. Незважаючи на це, ми докладаємо всіх можливих зусиль."
  BLN_nf_b017:0 "Компроміс із лоялістами"
  BLN_nf_b017_desc:0 "Старійшини на Заході здебільшого проти того, щоб ми набирали до своїх лав звичайних мешканців пусток, але вони розуміють, наскільки гостро стоїть наша кадрова проблема. Посилати нам заміну через всю країну — завдання не з легких, до того ж у них є свої проблеми. Компроміс полягає в тому, що ми дозволяємо мешканцям Пустки, які бажають приєднатися до нашої справи, виконати для нас небезпечне завдання. Якщо місія буде виконана, вони зможуть бути прийняті в орден."
  BLN_nf_b018:0 "Відчайдушне вербування"
  BLN_nf_b018_desc:0 "Нам потрібні люди, щоб поповнити наші ряди, незважаючи ні на що. Навіть якщо вони не найздібніші, якщо вони можуть тримати в руках лазерну гвинтівку, вони можуть битися."
  BLN_nf_b019:0 "Кілька хороших людей"
  BLN_nf_b019_desc:0 "З огляду на наші кадрові проблеми, нам потрібно переглянути наш підхід. Замість того, щоб намагатися заповнити кожен порожній обладунок, ми зосередимося на наборі кваліфікованих солдатів. Колишні найманці, охоронці караванів або навіть охоронці поселень можуть з часом стати придатними лицарями."
  BLN_nf_b020:0 "Спеціалізований набір"
  BLN_nf_b020_desc:0 "Можливо, в особливих випадках можна було б піти на кілька компромісів."
  BLN_nf_b021:0 "Нові Лицарі"
  BLN_nf_b021_desc:0 "Перший клас лицарів після нашої нової політики набору закінчив навчання. Їх відправляють на поле бою, і GNR вже співає їм дифірамби, що приваблює до нашої справи ще більше людей."
  BLN_nf_b022:0 "Нові Паладини"
  BLN_nf_b022_desc:0 "З новими лицарями, які поповнюють наші лави, ми можемо дати кілька вкрай необхідних підвищень."
  BLN_nf_b023:0 "Орден Меча"
  BLN_nf_b023_desc:0 "Орден Меча — це школа писарів, які вивчають усе, що пов'язане зі зброєю. Під їхню юрисдикцію потрапляє все - від ремонту лазерних гвинтівок до розробки нової суперзброї."
  BLN_nf_b024:0 "Кімната для вдосконалення"
  BLN_nf_b024_desc:0 "Хоча нам бракує виробничих потужностей, ми все одно повинні задіяти наші найкращі уми для покращення наявної у нас зброї."
  BLN_nf_b025:0 "Більше за менших витрат"
  BLN_nf_b025_desc:0 "Наші писарі повинні спрямувати свої зусилля на покращення ремонту старої техніки. Гвинтівка в кожній руці краща, ніж одна хороша гвинтівка на трьох лицарів."
  BLN_nf_b026:0 "Штуки, які роблять ПІУ"
  BLN_nf_b026_desc:0 "За винятком давно померлих людей з Анклаву на заході, у Братства завжди була найкраща енергетична зброя. Ми повинні продовжити цю традицію."
  BLN_nf_b027:0 "Озброєння посвячених"
  BLN_nf_b027_desc:0 "Нашим посвяченим не потрібна найкраща енергетична зброя. Полагодити кілька іржавих штурмових гвинтівок їм буде цілком достатньо."
  BLN_nf_b028:0 "Штуки, які роблять БУМ"
  BLN_nf_b028_desc:0 "Коли справа доходить до боротьби з чимось на кшталт супермутанта-бегемота, однією лазерною гвинтівкою не обійтися. Вам потрібно щось потужніше."
  BLN_nf_b029:0 "Орден Щита"
  BLN_nf_b029_desc:0 "Орден Щита — це школа писарів, які вивчають усе, що пов'язано із захистом. Під їхню юрисдикцію потрапляє все - від відновлення силової броні до зміцнення аванпостів."
  BLN_nf_b030:0 "Загартування"
  BLN_nf_b030_desc:0 "У польових умовах міцна броня — це єдине, що стоїть між нашими лицарями та кулями супермутантів. Покращення броні має стати нашим головним пріоритетом."
  BLN_nf_b031:0 "Сила в цифрах"
  BLN_nf_b031_desc:0 "Силова броня може змусити солдата почуватися непереможним, але це не так. Нам потрібно вдосконалювати наші методи ремонту та відновлення, щоб не відставати від втрат."
  BLN_nf_b032:0 "Тренування імпровізації"
  BLN_nf_b032_desc:0 "Посвячених навчають базовій тактиці, навичкам виживання та поводженню зі зброєю. Це важливі навички, але якщо додати кілька уроків із будівництва імпровізованих укріплень, то втрати скоротяться."
  BLN_nf_b033:0 "Екіпірування"
  BLN_nf_b033_desc:0 "Деяким лицарям і тим більше посвяченим доводиться обходитися без силової броні. Але це не означає, що вони повинні бути беззахисними. У нас є запас старих наборів розвідувальної броні, які можна полагодити та видати солдатам."
  BLN_nf_b034:0 "Автоматизована оборона"
  BLN_nf_b034_desc:0 "У Цитаделі було безліч автоматичних турелей, які нам довелося відключити, коли ми заселилися. Старійшина Лайонс так і не наказав активувати їх, тому що Цитадель здається непроникною. А що, як це не так?"
  BLN_nf_b035:0 "Орден Пера"
  BLN_nf_b035_desc:0 "Хоча на це часто не звертають уваги, Орден Пера служить важливій меті в Братстві. Ці писарі збирають та архівують втрачені знання."
  BLN_nf_b036:0 "Інструменти Війни"
  BLN_nf_b036_desc:0 "Писарям Ордену Пера належить вивчити багато інформації. Попросімо їх зосередитися на інформації, яка допоможе нам розробити кращу зброю!"
  BLN_nf_b037:0 "Інструменти Праці"
  BLN_nf_b037_desc:0 "Креслення довоєнної зброї марні, якщо у нас немає засобів для її виробництва. Попросіть писарів пошукати дослідження, здатні покращити наш промисловий потенціал!"
  BLN_nf_b038:0 "Бази даних RobCo"
  BLN_nf_b038_desc:0 "На кількох проржавілих комп'ютерах у Цитаделі є маркування RobCo. Безсумнівно, вони залишилися після спільного підприємства з Ліберті Прайм. Можливо, на них є цікавіша інформація..."
  BLN_nf_b039:0 "Науковці Пера"
  BLN_nf_b039_desc:0 "Ми створимо ще одну дослідницьку групу з членів Ордену Пера. Розбір старих книг може зачекати."
  BLN_nf_b040:0 "Штуки, які роблять ВРУМ"
  BLN_nf_b040_desc:0 "Хоча дороги Пустки прийшли в непридатність, це не означає, що транспортні засоби марні."
  BLN_nf_b041:0 "Західні Писарі"
  BLN_nf_b041_desc:0 "Знову зосередившись на нашій початковій місії, ми зможемо попросити Лост-Хіллз прислати більше писарів, щоб допомогти нам вивчити цю техніку."
  BLN_nf_b042:0 "Додати до існуючих команд"
  BLN_nf_b042_desc:0 "Лост-Хіллз присилає писарів. Ми призначимо їх до існуючих команд, щоб ми могли приділити цим проєктам належну увагу."
  BLN_nf_b043:0 "Команда Західних Писарів"
  BLN_nf_b043_desc:0 "Писарі із заходу звикли працювати разом. Ми об'єднаємо їх в одну команду, щоб вони разом працювали над новими проєктами."
  BLN_nf_b044:0 "Життя в бункері"
  BLN_nf_b044_desc:0 "Писарі з Лост-Хіллз знають дещо про те, як краще жити під землею."
  BLN_nf_b045:0 "Досягнення Західної Пенсильванії"
  BLN_nf_b045_desc:0 "Відколи ми востаннє розмовляли з нашими братами на заході, було зроблено кілька проривів у розробці силової броні. Тепер ми в курсі останніх досягнень."
  BLN_nf_b046:0 "Це лише дрібниці"
  BLN_nf_b046_desc:0 "Писарі з Лост-Хіллз знають про схеми трохи більше, ніж ми."
  BLN_nf_b047:0 "Розчистити підрівні"
  BLN_nf_b047_desc:0 "Занадто довго ми витрачали ресурси на встановлення маленьких передових аванпостів посеред руїн. Весь цей час незліченні артефакти лежали під нашими ногами. Хоча більша частина верхнього Пентагону досить швидко потрапила до мародерів, є нижні рівні, яких навіть ми не досягали за десятиліття, що ми тут. Пора це виправити, і з часом ми могли б побудувати фортецю, здатну суперничати з Лост-Хіллз!"
  BLN_nf_b048:0 "Відновлення 1-го підрівня"
  BLN_nf_b048_desc:0 "Перший рівень, який ми зачистили, схоже, є довоєнною випробувальною лабораторією зброї. Знадобиться час, щоб нормально використовувати лабораторії, але тут достатньо місця, яке можна використовувати й по-іншому."
  BLN_nf_b049:0 "Відновлення 2-го підрівня"
  BLN_nf_b049_desc:0 "Цей другий рівень, який ми зачистили, схоже, є не більше ніж складом. Багато чого доведеться здати на металобрухт, але порожній простір можна використовувати як хороші майстерні."
  BLN_nf_b050:0 "Глибше фундаменту"
  BLN_nf_b050_desc:0 "Глибоко під зруйнованими підземними рівнями та підвалами знаходяться склади та сховища, які можна було б переобладнати для більш корисних цілей."
  BLN_nf_b051:0 "Лицарські майстерні"
  BLN_nf_b051_desc:0 "У Лицарів є кілька ідей, як використати новий простір. Нам варто їх вислухати."
  BLN_nf_b052:0 "Майданчики для Писарів"
  BLN_nf_b052_desc:0 "Писарі висунули кілька ідей щодо того, як вони хочуть використати свою частку нового простору."
  BLN_nf_c001:0 "Битва за проєкт «Чистота»"
  BLN_nf_c001_desc:0 "Анклав увірвався на проєкт «Чистота», і ми повинні витіснити їх, перш ніж вони зможуть запустити його. Ми не можемо дозволити собі стримуватися, запускайте Ліберті Прайм!"
  BLN_nf_c002:0 "Перемога на проєкті «Чистота»"
  BLN_nf_c002_desc:0 "Анклав отримав важкого удару на проєкті «Чистота», але війна ще далека від завершення."
  BLN_nf_c003:0 "Поразка на проєкті «Чистота»"
  BLN_nf_c003_desc:0 "Проєкт «Чистота» залишається в руках Анклаву. Ми повинні перегрупуватися та продумати наші подальші дії."
  BLN_nf_c004:0 "Боротьба за виживання"
  BLN_nf_c004_desc:0 "Напад Анклаву на проєкт «Чистота» був тільки початком. Вони створюють форпости по всій пустці й готуються до широкомасштабного нападу не тільки на нас, але й на мешканців пустки. GNR закликає мешканців пустки взятися за зброю, ми з вами."
  BLN_nf_c005:0 "Друзі в біді"
  BLN_nf_c005_desc:0 "Війна з Анклавом у самому розпалі, і наші союзники зазнають важких втрат. Хоча у нас мало коштів, ми могли б хоча б послати їм кілька інструкторів, щоб допомогти їхнім людям краще битися з нашим спільним ворогом."
  BLN_nf_c006:0 "В ім'я Демократії!"
  BLN_nf_c006_desc:0 "Ліберті Прайм упав. Якщо ми не знайдемо нової протидії вертольотам, ми підемо за ним."
  BLN_nf_c007:0 "Знай свого ворога"
  BLN_nf_c007_desc:0 "Наші писарі вивчали обладнання Анклаву, зібране з полів битв, і здійснили кілька проривів у технології силової броні, які раніше були нам недоступні."
  BLN_nf_c008:0 "Надлишки Братства"
  BLN_nf_c008_desc:0 "Поселення Столичної Пустки збирають усіх, кого можуть, на цю війну, але їхньої зброї ледве вистачить для боротьби з Анклавом. Ми відправимо їм надлишки обладнання, яке має допомогти їм у війні."
  BLN_nf_c009:0 "«Шокуюча» цінність"
  BLN_nf_c009_desc:0 "З довоєнних архівів відомо про експериментальну котушку Тесла в Енергосистемах Олні. Цей пристрій може значно просунути наші знання і дозволити розробити зброю на основі Тесли, здатну знищувати вертольоти."
  BLN_nf_c010:0 "Птахи Війни"
  BLN_nf_c010_desc:0 "Наші розвідники провели кілька спостережень за процедурами поповнення запасів Анклаву і помітили певні закономірності. Якщо ми будемо обережні, то зможемо захопити кілька їхніх вертольотів."
  BLN_nf_c011:0 "Знак подяки"
  BLN_nf_c011_desc:0 "Жителі Столичної пустки повідомили, що хочуть надіслати нам знак подяки за нашу допомогу в захисті їх від Анклаву. Згідно з їхнім повідомленням, вантаж речей Анклаву має бути на шляху до Цитаделі."
  BLN_nf_c012:0 "Знищення вертольотів"
  BLN_nf_c012_desc:0 "Після кількох тижнів досліджень та розробок ми створили першу партію прототипів гармат Тесли. Вони вже в розпорядженні наших солдатів."
  BLN_nf_c013:0 "Перехоплення сигналу"
  BLN_nf_c013_desc:0 "Писар Валлінкур підготувала пристрій, який, на її думку, має перервати сигнали, які надсилають аванпости Анклаву своїм контрольованим кігтям смерті. На її думку, це спрацює лише на якийсь час, перш ніж вони зможуть змінити свої частоти, але ми повинні використати будь-яку перевагу, яку зможемо отримати."
  BLN_nf_c014:0 "Падіння Рейвен-Року"
  BLN_nf_c014_desc:0 "Рейвен-Рок упав, невже це кінець?"
  BLN_nf_c015:0 "Прогнати їх геть"
  BLN_nf_c015_desc:0 "Вертольоти Анклаву були помічені втікаючими з Рейвен-Року, так само як кілька десятиліть тому їх бачили втікаючими з Наварро. Ми не повинні повторити ту саму помилку, дозволивши їм відновитися. Ми повинні знайти їх."
  BLN_nf_c016:0 "Знайшли їх"
  BLN_nf_c016_desc:0 "Після кількох місяців пошуків залишки Анклаву було знайдено. Вони перегруповуються на довоєнній військовій базі. Ми повинні підготувати план для завдання удару."
  BLN_nf_c017:0 "Битва за авіабазу Адамс"
  BLN_nf_c017_desc:0 "Розгромивши Анклав раз і назавжди, цього разу по-справжньому, ми повинні вирішити, що робити далі."
  BLN_nf_c018:0 "Друзі та сусіди"
  BLN_nf_c018_desc:0 "Війна з Анклавом добігає кінця, і тепер нам потрібно вирішити, що робити з нашими тимчасовими союзниками."
  BLN_nf_c019:0 "Альянс Лайонса"
  BLN_nf_c019_desc:0 "Анклав — не остання загроза в Пустці, і ми навіть не впевнені, що покінчили з ними. Подивимося, чи захочуть наші союзники зберегти цей альянс."
  BLN_nf_c021:0 "Обмін думками"
  BLN_nf_c021_desc:0 "Наші союзники явно не готові до тих знань, якими володіємо ми. Однак дозволити нашим молодшим писарям виконати деякі ремонтні роботи або надати деякі відомості про менш просунуті проєкти не завадить."
  BLN_nf_c020:0 "Триматися осторонь"
  BLN_nf_c020_desc:0 "Братство ніколи не збиралося битися за мешканців Пустки. Ми не будемо битися з нашими тимчасовими союзниками, але й не станемо вести за них нову війну."
  BLN_nf_c022:0 "Стояти на своїх принципах"
  BLN_nf_c022_desc:0 "Відмова від дрібних розборок пусток дозволяє нам зосередитися на нашій місії."
  BLN_nf_c023:0 "Утилізація Анклаву"
  BLN_nf_c023_desc:0 "Хоча Рейвен-Рок був зруйнований, ми видобували техніку і з гірших місць."
  BLN_nf_c024:0 "Архіви Анклаву"
  BLN_nf_c024_desc:0 "Більшість баз даних у Рейвен-Році були знищені вибухом, але дещо все ж можна відновити."
  BLN_nf_c025:0 "Забуте знання"
  BLN_nf_c025_desc:0 "Під час огляду цих руїн ми не повинні залишити каменя на камені, щоб не дозволити якомусь збирачеві знайти пляшечку з ВШЕ."
  BLN_nf_c026:0 "Захопити покинуте спорядження"
  BLN_nf_c026_desc:0 "Ящики з обладнанням були залишені в Рейвен-Році та передових базах, коли Анклав утік. Ми повинні забрати їх, поки це не зробив хтось інший."
  BLN_nf_c027:0 "Заснувати форпост"
  BLN_nf_c027_desc:0 "Для ретельного дослідження руїн Рейвен-Року знадобляться роки. Нам потрібно буде створити базу в цьому районі, щоб охороняти наші роботи зі збору ресурсів."
  BLN_nf_c028:0 "Обшукати поле бою"
  BLN_nf_c028_desc:0 "Відступаючи, Анклав залишив після себе безліч загиблих і велику кількість обладнання. Ми повинні зібрати все, що зможемо."
  BLN_nf_c029:0 "Вилікувати поранених"
  BLN_nf_c029_desc:0 "Ті, хто вижив після битви, прибувають, а Анклав не припиняє переслідування. Ми повинні допомогти пораненим, поки Анклав не почав контратаку."
  BLN_nf_d000:0 "Наша Лайонс"
  BLN_nf_d000_desc:0 "Раптова смерть старійшини Оуена Лайонса стала шоком для багатьох. Його внесок у розвиток Братства та пам'ять про нього будуть вшановані. Тепер необхідно обговорити питання про його дочку та наступницю."
  BLN_nf_d001:0 "Поранена гордість"
  BLN_nf_d001_desc:0 "Раптова смерть нашого нового старійшини призвела Братство до замішання."
  BLN_nf_d002:0 "Іржавий щит"
  BLN_nf_d002_desc:0 "В останні роки нестача ресурсів змусила старійшину Лайонса зробити непростий вибір. Одним із них стало скорочення коштів, що виділяються на дослідження писарів. Серед тих, хто постраждав від цього, був і Орден Щита Боудіча. Відповідаючи за дослідження обладунків та інших захисних технологій, орден змушений був обходитися меншими засобами, щоб лицарі могли отримати обладунки, необхідні їм для битв. З огляду на те, що до Анклаву хлинуть потоки технологій, можливо, ми зможемо дозволити собі вкладати більше коштів у дослідження та розробки."
  BLN_nf_d004:0 "Уламок меча"
  BLN_nf_d004_desc:0 "Орден Щита був не єдиним, хто постраждав від нестачі ресурсів. Ордену Меча також довелося скоротити свої роботи. Відповідальний за дослідження зброї та інших наступальних технологій, ряд проєктів довелося призупинити, щоб лицарі могли отримати боєприпаси та зброю для битв. Як і у випадку з Орденом Щита, ми можемо перенаправити частину технологій Анклаву, що надійшли, на їхні потреби."
  BLN_nf_d006:0 "Притуплене перо"
  BLN_nf_d006_desc:0 "Орден Пера, можливо, постраждав найбільше під час нестачі ресурсів. Зрештою, під час хрестового походу або війни можна було б зайнятися розробкою обладунків і зброї, але який сенс копирсатися в старих книгах, коли біля воріт стоять вороги? Тепер, коли все вщухло, ми можемо надати Ордену Пера необхідні ресурси."
  BLN_nf_d003:0 "Ремонтні послуги"
  BLN_nf_d003_desc:0 "Боудіч та деякі інші писарі іноді позичали свої руки для ремонту чужого спорядження за кришки, які необхідні Братству. Цю практику можна розширити в наших інтересах."
  BLN_nf_d005:0 "Покращити оборону"
  BLN_nf_d005_desc:0 "Боудіч керував проєктуванням Цитаделі понад два десятиліття тому. За роки, що минули відтоді, як проєкт було визнано завершеним, він відзначив деякі покращення, які можна було б внести. Зараз саме час втілити їх у життя."
  BLN_nf_d007:0 "Оновлення кузні"
  BLN_nf_d007_desc:0 "Стіни Цитаделі — не єдине, що можна було покращити. Є багато можливостей краще використовувати кузню."
  BLN_nf_d008:0 "Завершити розвідувальну броню «Марк II»"
  BLN_nf_d008_desc:0 "Силова броня — не єдина броня, яку використовує Братство. Багато посвячених і навіть деякі лицарі екіпіровані в легшу розвідувальну броню. До того як почалися перебої з постачанням, писар Боудіч був близький до завершення роботи над прототипом покращеної версії розвідувальної броні. Тепер, коли Боудіч приймає рішення, він доведе проєкт до кінця."
  BLN_nf_d009:0 "Старійшина-воїн"
  BLN_nf_d009_desc:0 "Перші старійшини Братства билися разом зі своїми паладинами та лицарями. Нова старійшина Лайонс має намір відродити цю традицію."
  BLN_nf_d010:0 "Жорсткіша підготовка"
  BLN_nf_d010_desc:0 "Підготовка адептів може бути кращою, ніж у більшості солдатів у Пустках, але її завжди можна покращити."
  BLN_nf_d011:0 "Штурмова підготовка на вертольотах"
  BLN_nf_d011_desc:0 "Оскільки все більше вертольотів захоплюється з аванпостів Анклаву, ми повинні почати навчати наших солдатів тому, як битися всередині цих машин."
  BLN_nf_d012:0 "Морські Леви Лайонса"
  BLN_nf_d012_desc:0 "У рамках вдосконалення наших бойових сил деякі солдати пройдуть додаткову підготовку з десантування. Ми ніколи не знаємо, коли нам може знадобитися висадитися на ворожий берег."
  BLN_nf_d013:0 "Бути прикладом"
  BLN_nf_d013_desc:0 "Вид старійшини пліч-о-пліч з лицарями та паладинами на фронті продовжує надихати наших солдатів, сподіваймося, що вона не зловить випадкову кулю."
  BLN_nf_d014:0 "Гвардія Лайонса"
  BLN_nf_d014_desc:0 "У зв'язку з побоюваннями щодо безпеки Старійшини на передовій, елітну гвардію паладинів було перепризначено для забезпечення підтримки та захисту її життя в бою."
  BLN_nf_d015:0 "Завжди носіть шолом"
  BLN_nf_d015_desc:0 "Старійшина Мексон II загинув від отруєної стріли. Цього б не сталося, якби він не зняв шолом. Наша старійшина винесе урок із цієї помилки."
  BLN_nf_d016:0 "Сильніші та лютіші"
  BLN_nf_d016_desc:0 "Завдяки покращеним тренуванням і старійшинам-воїнам, які очолюють фронт, наші солдати перебувають у кращій бойовій формі, ніж будь-коли з моменту нашого прибуття до Вашингтона."
  BLN_nf_d017:0 "Мантія замість обладунків"
  BLN_nf_d017_desc:0 "Послухавшись поради писаря Ротшильда, наша старійшина обмінює свій T-45 на комплект синіх мантій."
  BLN_nf_d018:0 "Реформи політики"
  BLN_nf_d018_desc:0 "Уже освоївшись у своїй новій ролі, Старійшина проводить низку невеликих реформ."
  BLN_nf_d019:0 "Вільна торгівля"
  BLN_nf_d019_desc:0 "Торгівля з мешканцями пусток може бути взаємовигідною, якщо ми будемо обережні з тими, з ким ведемо справи."
  BLN_nf_d020:0 "Реформи доктрини"
  BLN_nf_d020_desc:0 "Деякі елементи нашої бойової доктрини застаріли і потребують оновлення."
  BLN_nf_d021:0 "Уроки Лайонса"
  BLN_nf_d021_desc:0 "Люди з GNR попросили нову старійшину записати кілька аудіопорад про виживання в пустці, які вона почерпнула за час своєї роботи в полі. Вони вважають, що це дуже допоможе мешканцям Пустки і прискорить процес вербування."
  BLN_nf_d022:0 "Реформи навчання"
  BLN_nf_d022_desc:0 "Як і наша бойова доктрина, деякі з наших методів навчання застрягли в 2100-х роках. Настав час їх змінити."
  BLN_nf_d023:0 "Оборонні навчання"
  BLN_nf_d023_desc:0 "Наш новий старійшина помітив кілька дірок у нашій обороні, які потрібно залатати."
  BLN_nf_d024:0 "Східний Кодекс"
  BLN_nf_d024_desc:0 "Кодекс містить безліч застарілих директив і перешкоджає нашій місії з виправлення деяких жахів пусток. Хоча не всі підтримують зміну Кодексу в угоду нашим потребам, Старійшина не з тих, хто дозволить комусь стати в неї на шляху."
  BLN_nf_d025:0 "За межами Столиці"
  BLN_nf_d025_desc:0 "Прочісування руїн Вашингтона ніколи не було кінцевою метою нашої експедиції. Є місця по всьому Східному узбережжю, які ми повинні оглянути."
  BLN_nf_d026:0 "Вирушаємо до Бостона"
  BLN_nf_d026_desc:0 "Наша перша експедиція до Бостона тільки поверхнево вивчила його. Нам ще багато належить знайти."
  BLN_nf_d029:0 "Загін «Гладіус»"
  BLN_nf_d029_desc:0 "Втрата загону «Артеміда» була сумною подією, але це не повинно нас розубедити. Буде сформовано новий загін, який вирушить на північ, з'ясує, що сталося з загоном «Артеміда», і принесе цінні технології зі Співдружності."
  BLN_nf_d027:0 "Повернення до Пітта"
  BLN_nf_d027_desc:0 "Чутки про те, що Пітт об'єднався під владою одного з наших братів у королівство работорговців, на жаль, правдиві. Тепер нам потрібно вирішити, що з цим робити."
  BLN_nf_d030:0 "Прокляття Пітта"
  BLN_nf_d030_desc:0 "Щось у повітрі або воді перетворює тривале перебування в Пітті на повільний смертний вирок, але Ашур робить деякі успіхи в лікуванні."
  BLN_nf_d028:0 "Операція «Скелелом»"
  BLN_nf_d028_desc:0 "Наша нещодавня експедиція в гори на заході каже нам, що тамтешні релігійні фанатики сидять у запечатаному довоєнному бункері і, швидше за все, не знають про це. На жаль, вони не дозволять нам потрапити на їхню територію без бою."
  BLN_nf_d031:0 "Протиборчі сили"
  BLN_nf_d031_desc:0 "Наша експедиція повідомляє, що магнітна зброя, яку використовують фанатики на захід від Столичної пустки, становить серйозну загрозу для Братства. Конфлікт неминучий."
  BLN_nf_d032:0 "Просто «оглянутися навколо»"
  BLN_nf_d032_desc:0 "Жителі Столичної Пустки взяли на себе сміливість звільнити Пітт. Гадаю, покійний старійшина Лайонс пишався б ними. Як би там не було, вони володіють речами, про які не знають і не розуміють. Потрібно забрати їх, поки щось не сталося."
  BLN_nf_d033:0 "Стабілізуюча сила"
  BLN_nf_d033_desc:0 "Пітт явно цінніший, ніж ми побачили під час першого огляду міста. Цього разу нам знадобиться забезпечити постійну присутність, щоб ретельно обшукати руїни. Є молодий паладин, який довів свої здібності під час війни з Анклавом і який може підійти для цієї роботи."
  BLN_nf_d034:0 "Зібрати креслення"
  BLN_nf_d034_desc:0 "Ми відправимо лицарів у руїни, щоб вони забрали всі технічні дані та схеми, які можуть виявитися корисними. Цього разу ми не залишимо каменя на камені."
  BLN_nf_d035:0 "Оптимізація цехів"
  BLN_nf_d035_desc:0 "Ці кузні, які Ашур використовував для виробництва боєприпасів та інших сталевих виробів, здатні на набагато більше, нам просто потрібно трохи навичок писаря."
  BLN_nf_d036:0 "Забуті промислові секрети"
  BLN_nf_d036_desc:0 "Після місяців розкопок наші лицарі повернулися з горою цінних технічних даних. Хоча не всі з них можуть бути корисні нам зараз, багато з них можна застосувати в наших кузнях у Цитаделі."
  BLN_nf_d037:0 "У погоні за привидами"
  BLN_nf_d037_desc:0 "Наша команда, відправлена на захід, щоб перевірити чутки про вцілілих з Анклаву, замість цього знайшла ознаки того, що наші брати, які зникли на Середньому Заході, можливо, все-таки не загинули. Підготуйте кілька вертольотів, щоб надати їм підтримку для ретельного пошуку."
  BLN_nf_d038:0 "Далека спорідненість"
  BLN_nf_d038_desc:0 "Ми зв'язалися з людиною, яка стверджує, що є старійшиною відділення Братства на Середньому Заході. Ми налаштовані скептично, але зустріч між нашими старійшинами може бути виправдана."
  BLN_nf_d039:0 "Обмін даними"
  BLN_nf_d039_desc:0 "У наших братів із Середнього Заходу є масиви даних, які можуть виявитися корисними для нас, так само як і в нас можуть бути дані, які можуть виявитися корисними для них."
  BLN_nf_d040:0 "Програма обміну Писарями"
  BLN_nf_d040_desc:0 "Умови та технології, доступні нам і нашим братам із Середнього Заходу, дуже відрізняються. Наші писарі можуть багато чому навчитися один у одного. Було запропоновано обмінятися кількома писарями, щоб навчати та вчитися у писарів з інших відділень."
  BLN_nf_d041:0 "Він нам не Брат"
  BLN_nf_d041_desc:0 "Ким би не був цей Айронс, будь-кому з тих, хто дивиться на його роботи, стає ясно, що з ним не порозумієшся."
  BLN_nf_d042:0 "План Камелота"
  BLN_nf_d042_desc:0 "У паладина, який втік з полону Айронса, є план, як послабити його. Вбивство Айронса на такому ранньому етапі може бути самогубною місією, але лицаря Робінсона — ні. Лицар — один із його найстаріших союзників і найкращих солдатів, якого часто можна побачити на передовій. Камелот збирає розвідувальні дані з польових донесень і розробляє план, який Прайд має здійснити."
  BLN_nf_d043:0 "Прямий підхід"
  BLN_nf_d043_desc:0 "Ми не можемо відкладати цю справу в довгий ящик. Айронс — така ж серйозна загроза, якою колись був Едем. Тому ми повинні кинути все, що маємо, щоб зупинити його."
  BLN_nf_d044:0 "Хороші хлопці повертаються"
  BLN_nf_d044_desc:0 "Жителі Середнього Заходу, природно, в жаху при вигляді лицарів Братства, які входять до їхніх сіл. З огляду на те, що їм довелося пережити при Айронсі, ми не можемо їх звинувачувати. Знадобиться час, щоб переконати їх, що цього разу Братство — хороші хлопці."
  BLN_nf_d045:0 "Найгірший сценарій"
  BLN_nf_d045_desc:0 "У деяких документах, знайдених на авіабазах Рейвен-Рок та Адамс, згадується якийсь «чикагський форпост» Анклаву. Ми завжди припускали, що це щось на кшталт трьох хлопців, які сидять у бункері. Ми помилялися, дуже сильно помилялися."
  BLN_nf_d046:0 "Підтримка повстанців на Середньому Заході"
  BLN_nf_d046_desc:0 "По всьому Середньому Заходу мешканці пусток чинять опір владі Анклаву. Ми простягнемо їм руку допомоги."
  BLN_nf_d047:0 "Мобілізувати підтримку вдома"
  BLN_nf_d047_desc:0 "GNR почне транслювати новини про події на Середньому Заході та правління Чиказького Анклаву. Це має згуртувати людей і спонукати їх приєднатися до нашої боротьби."
  BLN_nf_d048:0 "Ще один довоєнний монстр"
  BLN_nf_d048_desc:0 "Братство було засноване на знак протесту проти рукотворних жахів, створених довоєнним урядом США. Не дивно, що в Чикаго можна зустріти подібну мерзоту."
  BLN_nf_d049:0 "Возз'єднання родини"
  BLN_nf_d049_desc:0 "Ідеали Братства Середнього Заходу тісно пов'язані з нашими власними. Тому цілком логічно, що ми офіційно об'єднаємо зусилля з нашими братами."
  BLN_nf_d050:0 "Ще один чортів Анклав?"
  BLN_nf_d050_desc:0 "Чому щоразу, коли ми йдемо кудись з інтересом до довоєнної техніки, ми натикаємося на купу придурків?"
  BLN_nf_d051:0 "Захистити Фонтан"
  BLN_nf_d051_desc:0 "Фонтан снів – це місцева легенда, яку розслідувало загублене Братство Затоки. Якщо Братство Середнього Заходу послало туди людей, це мало бути варте уваги."
  BLN_nf_d052:0 "Архіви Ван Бюрена"
  BLN_nf_d052_desc:0 "Архіви авіабази Ван Бюрен наповнені технічними даними, пов'язаними з авіацією та космічними польотами. Писарям буде чим зайнятися."
  BLN_nf_d053:0 "Чому Місяць?"
  BLN_nf_d053_desc:0 "Анклав витратив купу передових довоєнних технологій на мрію покинути цю планету. З якоїсь причини їх особливо цікавив Місяць. Нам потрібно з'ясувати, чому."
  BLN_nf_d054:0 "Ізольовані Брати"
  BLN_nf_d054_desc:0 "Експедиція наших полеглих братів із Братства Середнього Заходу надто довго була відрізана від світу. Настав час їм побачити дружнє обличчя або костюм Т-45."
  BLN_nf_d055:0 "Столичне Писання"
  BLN_nf_d055_desc:0 "Флорида є батьківщиною безлічі передових технологій, гідних вивчення. Ми могли б відправити деяких із наших писарів до Братства Затоки, щоб вони вивчали їх і навчили їх дечому про те, як ми працюємо в Столичній Пустці."
  BLN_nf_d056:0 "Мудрість Флориди"
  BLN_nf_d056_desc:0 "Мешканці пусток Флориди, можливо, й дивні навіть за мірками пусток, але вони дещо знають про те, як утримати човен на плаву."
  BLN_nf_d057:0 "Фонтан чого?"
  BLN_nf_d057_desc:0 "Наші брати у Флориді стверджують, що в них є фонтан із водою, яка вимиває радіацію з організму, як «Антирадин». Це не може бути правдою, правда?"
  BLN_nf_d058:0 "Канаданклав?"
  BLN_nf_d058_desc:0 "Чому нас не дивує, що в Канаді теж є бункер Анклаву?"
  BLN_nf_d059:0 "Командний бункер Онтаріо"
  BLN_nf_d059_desc:0 "Наші розвідники виявили занедбаний командний бункер в Онтаріо, в якому колись розташовувався Анклав Онтаріо."
  BLN_nf_d060:0 "Сніжні дикуни"
  BLN_nf_d060_desc:0 "Мешканці пусток Онтаріо поневіряються серед руїн, повних передових технологій, які їм незрозумілі. Їм потрібне наше керівництво."
  BLN_nf_d061:0 "Знайома технологія"
  BLN_nf_d061_desc:0 "Якого біса у купки мешканців пусток у Канаді з'явилася броня Анклаву?"
  BLN_nf_d062:0 "Підкоригувати В.А.Ш.И.Н.Г.Т.О.Н"
  BLN_nf_d062_desc:0 "Довоєнний уряд витратив передовий комп'ютер ZAX на таку дурість, як управління цивільними особами. Ми могли б використовувати його більш ефективно, внісши деякі корективи."
  BLN_nf_d063:0 "Входячи в Едем"
  BLN_nf_d063_desc:0 "Отримавши захищений доступ до притулку, ми можемо більш детально розглянути причину цієї проблеми з болотом..."
  BLN_nf_d064:0 "Повернення на істинний шлях"
  BLN_nf_d064_desc:0 "Лайонс та його дочка десятиліттями погано керували цим відділенням. Тепер, коли їх обох більше немає, ми можемо привести його у відповідність до Кодексу."
  BLN_nf_d065:0 "Лицарі"
  BLN_nf_d065_desc:0 "Стандарти набору персоналу зміняться з приходом старійшини Касдіна."
  BLN_nf_d066:0 "Прочісування руїн"
  BLN_nf_d066_desc:0 "Головною метою цієї експедиції було прочісування руїн Вашингтона в пошуках важливих технологій. Тепер, коли нас не турбують дрібниці, ми можемо повернутися до цього завдання."
  BLN_nf_d067:0 "Захисники та Паладини"
  BLN_nf_d067_desc:0 "Занадто багато лідерів Цитаделі все ще поділяють ідеали Лайонса. Старійшина Касдін просуватиме братів, які більше відповідають цілям Ордену."
  BLN_nf_d068:0 "Необроблені алмази"
  BLN_nf_d068_desc:0 "Під 200-річними руїнами ховаються незамінні зразки техніки. Ці технології повинні належати тим, хто вміє ними правильно користуватися."
  BLN_nf_d069:0 "Західні підкріплення"
  BLN_nf_d069_desc:0 "Лост-Хіллз вважає за доцільне надіслати новому старійшині ще кількох лицарів, щоб допомогти ордену завершити свою місію."
  BLN_nf_d070:0 "Посвідчення збирача"
  BLN_nf_d070_desc:0 "Навіть з 10 000 Лицарів і Писарів, які нишпорять руїнами, ми ніколи не знайдемо кожен шматочок безцінної техніки. Замість того, щоб копатися в уламках самим, ми дозволимо мешканцям пусток робити це. Вони повинні бути схвалені нами і здавати кожен цінний шматочок техніки, який знайдуть. Ми повинні бути в змозі відплатити їм дрібними товарами, такими як кулі 5.56 або щось подібне."
  BLN_nf_d071:0 "Перековка Сталі"
  BLN_nf_d071_desc:0 "Нехай і минуло більше 20 років з того часу, як очікувалося, але цей Орден нарешті робить те, що повинен. Нам залишилося лише одне: скинути з себе тягар зради Лайонса."
  BLN_nf_e001:0 "Блудні брати"
  BLN_nf_e001_desc:0 "Багато з наших втрачених братів думали, що наше відділення вимре без них, але ми довели, що вони помилялися. Тепер подивимося, що вони думають про наші «нетрадиційні методи»."
  BLN_nf_e002:0 "Рука допомоги"
  BLN_nf_e002_desc:0 "Може, ці брати й покинули нас колись, але наша перемога над Анклавом і подальше виживання довели цінність Доктрини Лайонса. Навряд чи вони повернуться до нас, але це може стати початком відновлення співпраці."
  BLN_nf_e003:0 "Провчити урок"
  BLN_nf_e003_desc:0 "Якийсь час ми терпіли догматичну діяльність наших братів-вигнанців, але деякі з їхніх нещодавніх дій поставили під загрозу наших союзників у Пустці. Потрібно наставити їх на правильний шлях або вигнати зі Столичної пустки."
  BLN_nf_e004:0 "Згуртуватися"
  BLN_nf_e004_desc:0 "Обмін дослідженнями, розвідувальними даними та спільні тренування принесуть користь обом сторонам."
  BLN_nf_e005:0 "Побачити причину"
  BLN_nf_e005_desc:0 "Більшість Вигнанців склали зброю і змирилися з нашою перемогою. Їхня інтеграція потребуватиме великих зусиль."
  BLN_nf_e006:0 "Зцілення ран"
  BLN_nf_e006_desc:0 "Розкол з нашими братами-вигнанцями почав процес загоєння. З часом маленький бунт Касдіна стане лише невеликою виноскою в нашій історії."
  BLN_nf_e007:0 "Старий ворог"
  BLN_nf_e007_desc:0 "Через століття після поразки Майстра ми все ще маємо справу з супермутантами. Хоча це вже інша порода, їхня жахлива природа залишилася тією ж. Після перемоги над Анклавом ми повинні знову звернути увагу на давнього недруга."
  BLN_nf_e008:0 "Знайти їхнє лігво"
  BLN_nf_e008_desc:0 "Мутанти плодяться так швидко, що навіть наші найкращі лицарі не встигають їх убивати. Якщо ми хочемо покінчити з цим кошмаром, нам потрібно зупинити їхнє розмноження."
  BLN_nf_e009:0 "Зелена хвиля"
  BLN_nf_e009_desc:0 "Наче бродячі групи супермутантів були недостатньо небезпечні, один із них, очевидно, організував масове скупчення. Ми повинні зупинити це, поки ситуація не вийшла з-під контролю."
  BLN_nf_e010:0 "Смерть Шепарда"
  BLN_nf_e010_desc:0 "Загроза супермутантів усунута, їхній вулик розгромлений, але що робити з їхнім лідером?"
  BLN_nf_e011:0 "Прямо в їхнє лігво"
  BLN_nf_e011_desc:0 "Лігво супермутантів було знайдено в притулку 87, і здається, ми знайшли спосіб проникнути всередину. Залишилося тільки розробити план штурму цього лігва нечисті."
  BLN_nf_e012:0 "Кінець кошмару"
  BLN_nf_e012_desc:0 "Лігво супермутантів у притулку 87 знищено, і мутанти більше не з'являться. Зараз не час святкувати, мутанти ще залишилися."
  BLN_nf_f001:0 "Розчищення завалів"
  BLN_nf_f001_desc:0 "Після битви на авіабазі Адамс залишилося багато обладнання, яке потрібно витягти з-під уламків. Організуємо команди для розчищення поля бою."
  BLN_nf_f002:0 "Звалище"
  BLN_nf_f002_desc:0 "Мобільний краулер довелося знищити під час битви. Тліючий шматок металу, який брати, розміщені там, називають «звалищем», все ще має деяку цінність."
  BLN_nf_f003:0 "Аеродром"
  BLN_nf_f003_desc:0 "Аеродром на авіабазі Адамс постраждав і від 200-річного запустіння, і від нещодавньої битви. Ми повинні полагодити все, що можна, щоб використовувати наші нові вертольоти."
  BLN_nf_f004:0 "Ремонт оборони"
  BLN_nf_f004_desc:0 "Оборонні споруди на авіабазі Адамс були пошкоджені під час нашого нападу. Ми відновимо їх, перш ніж зробимо це місце своїм домом."
  BLN_nf_f005:0 "Проєкт «Придвен»"
  BLN_nf_f005_desc:0 "У писарів є плани щодо покращення довоєнних конструкцій дирижаблів. Якщо нам вдасться здійснити задумане, цей корабель змінить усе."
  BLN_nf_f006:0 "Ресурси під рукою"
  BLN_nf_f006_desc:0 "Якщо ми хочемо побудувати цю штуку, нам знадобиться більше ресурсів, ніж у нас є. Знадобиться час, щоб знайти рішення."
  BLN_nf_f007:0 "Будівництво Титана"
  BLN_nf_f007_desc:0 "Навіть маючи ресурси для побудови «Придвена», найскладніше ще попереду. Тепер нам потрібно побудувати цю кляту штуку."
  BLN_nf_f008:0 "Літаюча Цитадель"
  BLN_nf_f008_desc:0 "Будівництво «Придвена» наближається до завершення. З цим кораблем ми зможемо відправитися майже куди завгодно і переслідувати свої цілі, і ніхто нас не зупинить... хіба що в мешканців пусток знайдеться кілька старих добротних гармат."

  BLN_nf_f009:0 "Тягар Бігслі"
  BLN_nf_f009_desc:0 "Усі були так схвильовані цим очищувачем: проєкт «Чистота» те і проєкт «Чистота» се. Але ніхто не ставив питання: «А що ми будемо робити з усією цією чистою водою?» Що ж, вгадайте, кому дістанеться ця дрібна деталь. Одне діло, якби в мене була підтримка, але ця маленька війна з Анклавом виснажила більшу частину ресурсів Братства. І на додачу до всього, мені доводиться бути мамою для купи хлопців у лабораторних халатах."
  BLN_nf_f010:0 "Води життя"
  BLN_nf_f010_desc:0 "Писар Бігслі виявив, що виробництво води йде трохи вище очікувань, і поки не повідомив про це Старійшині. Старійшина хоче, щоб ми безкоштовно ділилися водою з мешканцями пустки. Рівет-Сіті допоможе з розподілом, але це все одно масштабний захід. Я сподіваюся, що добра воля, яку вона породить, буде того варта."
  BLN_nf_f011:0 "Таємна торгівля водою"
  BLN_nf_f011_desc:0 "Писар Бігслі виявив, що виробництво води трохи перевищує очікування, і поки не повідомив про це Старійшині. Замість того, щоб повідомляти про цей надлишок, він міг би продати його і використати кришки, щоб підсолодити умови угоди для багатьох лицарів, яким не подобається супроводжувати водні каравани. Хіба вони не заслуговують на винагороду за цю небезпечну роботу?"
  BLN_nf_f012:0 "Вода для порятунку"
  BLN_nf_f012_desc:0 "Писар Бігслі виявив, що виробництво води трохи перевищує очікування, і поки не повідомив про це Старійшині. Замість того, щоб повідомляти про цей надлишок, він може обміняти зайву воду на технологію, яка дозволить і підтримувати роботу очищувача, і допомогти його колегам-писарям."

  BLN_nf_f013:0 "Скрізь, де я блукаю"
  BLN_nf_f013_desc:0 "Місце, де знаходиться проєкт «Чистота», хоч і досить важливе, але з нього важко споряджати каравани з водою. Нам слід пошукати інші місця, щоб зосередитися на розподілі води."
  BLN_nf_f014:0 "Розширення проєкту"
  BLN_nf_f014_desc:0 "Мережа розподілу води виявилася головним болем для Бігслі та майже всіх писарів, яким доручили працювати над нею. За допомогою покращеного обладнання ми зможемо полегшити деякі елементи роботи."
  bln_unlock_first_project_decisions_tt:0 "Завершення цього фокусу розблокує §Yрішення§! для створення проєктів з покращення нашої §CМережі розподілу води§!."
  BLN_nf_f015:0 "Простягніть руку допомоги §CДелмарві§!"
  BLN_nf_f015_desc:0 "У Пустці є щось більше, ніж просто Столиця. На схід від нас знаходиться півострів Делмарва, населений переважно скромними рибалками та піратами, які загрожують їхньому існуванню. З них можуть вийти чудові невеликі торгові партнери."
  bln_reach_out_to_delmarva_tt:0 "Ми відправимо посланців до рибальських груп §BДелмарви§!, запропонувавши їм §Yводу§! в обмін на §Gкораблі§! та §Gторгові привілеї§!. Якщо вони погодяться, то допоможуть §Yрозподіляти воду§!."
  BLN_nf_f016:0 "Стабільний потік"
  BLN_nf_f016_desc:0 "Коли з нагальними проблемами розібралися, залишилася тільки щоденна рутинна робота з організації караванів та підтримання цього місця разом. Наша водна мережа пов'язує воєдино нашу зростаючу націю."
  bln_water_cores_tt:0 "Завершивши цей фокус, ви зможете прийняти §Yрішення§! про §Gнаціоналізацію§! держав із достатньою кількістю води, або §Gпостійно постачати§! наші національні території."
  