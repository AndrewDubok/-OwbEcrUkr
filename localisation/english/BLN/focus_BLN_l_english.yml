  BLN_JOE_accept_key:0 "§6Очистити завод Ядер-Коли§!"
  BLN_JOE_deny_key:0 "§RРозграбувати завод Ядер-Коли§!"

  ######################################################
  ######################################################
  ######                                            ####
  ######          FOCUS LOC                         ####
  ######                                            ####
  ######################################################
  ######################################################

  BLN_nf_a001:0 "The Mission"
  BLN_nf_a001_desc:0 "In 2254 the Brotherhood of Steel's ruling council decided to send a contingent of Paladins, Knights and Scribes out to the East Coast with the goal of recovering advanced technology from eastern cities and bases."
  BLN_nf_a002:0 "The Citadel"
  BLN_nf_a002_desc:0 "When the expedition reached The Capital Wasteland, they discovered The Pentagon. This pre-war military facility suffered heavy damage in the war and time since, however the sub-levels remained mostly untouched. With some repairs this would become The Brotherhoods base on The East Coast."
  BLN_nf_a003:0 "The Scourge"
  BLN_nf_a003_desc:0 "One of the first targets of this Eastern Brotherhood expedition, The Pitt was a cesspit plagued by raiders and trogs. The Brotherhood swept through the city in a single night, killing all who resisted and looting anything of significant value."
  BLN_nf_a004:0 "A Changed Man"
  BLN_nf_a004_desc:0 "Something has changed in Elder Lyons. He has been distracted and on occasion given orders that go contrary to the Codex. Maybe he is just adjusting to the new role as Elder."
  BLN_nf_a005:0 "The Steel Economy"
  BLN_nf_a005_desc:0 "While the Knights and Scribes of our order are happy to take scrip and eat in the mess hall; the wastelanders we occasionally deal with have other desires."
  BLN_nf_a006:0 "No Soliciting"
  BLN_nf_a006_desc:0 "The hardliners are right, if we compromise now and start selling off tech to wastelanders it will lead to disaster. Today it is just a few fusion cells and scrap weapon parts, but what about tomorrow?"
  BLN_nf_a007:0 "A Compromise?"
  BLN_nf_a007_desc:0 "The Codex argues against working with outsiders or helping them, but we are a far ways away from our fellow Brothers on the west coast. Bending the rules in a few places but reinforcing them in others could be a way to keep to our ideals and get what we need to carry on our mission."
  BLN_nf_a008:0 "Door-to-door Quartermasters"
  BLN_nf_a008_desc:0 "It is hard for a scavenger to take two steps in the DC ruins without finding some dangerous tech or at least a box of microfusion cells. We will send quartermasters out to the junk yards and trading posts of the wasteland to see if there is something we want, and find a way to pay for it."
  BLN_nf_a009:0 "Resource Requisitioning"
  BLN_nf_a009_desc:0 "The ruins of The Capital Wasteland are full of pre-war dangers that don't belong in the hands of the unknowing masses. Our Knights will be authorized to take whatever steps necessary to save the wastelanders from their ignorance."
  BLN_nf_a010:0 "Brotherhood Protection"
  BLN_nf_a010_desc:0 "Multiple settlements and caravan groups have petitioned our order for protection and assistance. While we are not a mercenary group, the protection jobs could serve as good training for initiates and the payments could help fund more important projects."
  BLN_nf_a011:0 "Caravan Protection"
  BLN_nf_a011_desc:0 "Our relationship with the traders of the wastes has proved beneficial; now some are asking to hire a few Knights or at least initiates to help guard caravans through especially dangerous territory."
  BLN_nf_a012:0 "Total Autarky"
  BLN_nf_a012_desc:0 "The Brotherhood stands firm in its ideals and will not compromise with wastelanders. We are united in our mission, and will do whatever it takes to prevent the horrors of the past from repeating."
  BLN_nf_a013:0 "Paladin Paystubs"
  BLN_nf_a013_desc:0 "With caps flowing in from our dealings with outsiders, we can provide our Paladins with a little something extra as reward for their efforts."
  BLN_nf_a014:0 "Mandated Pay"
  BLN_nf_a014_desc:0 "The mission of The Brotherhood is not enough to motivate every wastelander to put their life on the line, but with our newfound wealth we could start compensating some soldiers or even hire mercenaries when needed."
  BLN_nf_a015:0 "Brothers in Finance"
  BLN_nf_a015_desc:0 "We have what we need for our mission. Now we can turn to pressing matters"
  BLN_nf_a016:0 "Reporting In"
  BLN_nf_a016_desc:0 "The Elders out west have radioed in requesting yet another progress report on our mission."
  BLN_nf_a017:0 "Honor Lost Hills' Request"
  BLN_nf_a017_desc:0 "Lost Hills is correct, this expedition they want us to field is important!"
  BLN_nf_a018:0 "Ignore Lost Hills' Request"
  BLN_nf_a018_desc:0 "We need every Knight in The Citadel here in DC. Just make up some reports saying we sent that expedition."
  BLN_nf_a019:0 "Old World Secrets"
  BLN_nf_a019_desc:0 "Paladin Casdin is putting together a report about facilities in DC that need attention."
  BLN_nf_a020:0 "More Expeditions"
  BLN_nf_a020_desc:0 "The Paladin has a point. Even though we have our hands full with the super mutant problem, these locations are of vital importance."
  BLN_nf_a021:0 "Prioritize The Crusade"
  BLN_nf_a021_desc:0 "A few dusty files or old schematics will mean nothing if The Capital Wasteland is overrun with super mutants! Focus on what is important"
  BLN_nf_a022:0 "The Secret Weapon"
  BLN_nf_a022_desc:0 "Nobody that works in The Citadel laboratory can ignore the 200 ton elephant in the room. For the last couple decades we have worked to fix the power problems they struggled with even pre-war, but we are at the cusp of a breakthrough."
  BLN_nf_a023:0 "The Galaxy Job"
  BLN_nf_a023_desc:0 "In the middle of the DC hellhole there are the ruins of a pre-war radio network. It could prove useful."
  BLN_nf_a024:0 "Friends in low places"
  BLN_nf_a024_desc:0 "3-Dog continues to tell the wasteland about the good fight and his fortified bunker serves as a good place for our patrols to rest and recover."
  BLN_nf_a025:0 "The Steel Network"
  BLN_nf_a025_desc:0 "A team of scribes will fill the airwaves with occasional music as well as the tales of our great sacrifice and struggle to protect them from themselves."
  BLN_nf_a026:0 "Library of Congress"
  BLN_nf_a026_desc:0 "The Libary of Congress spent the last two centuries as little more than a shelter for raiders and scavengers, burning knowledge more valuable than any metal they could pull from the walls. We will be sending a team to clear them out and make proper use of the facility."
  BLN_nf_a027:0 "Pounds of data"
  BLN_nf_a027_desc:0 "A newly found blueprint shows that under the Library of Congress there is a database of pre-war military information. In trying to access the data our scribes tripped a failsafe and now the data can only be accessed by a terminal guarded by layers of automated security and doors locked by encrypted terminals. What's worse is if we do not access it soon, the data could be wiped as part of the automated security measures. It will take weeks of coordinated effort to deal with this, including pulling Knights away from super mutant sweeps in the DC ruins to deal with the automated turrets and robotic security."
  BLN_nf_a028:0 "DC Sweepin"
  BLN_nf_a028_desc:0 "The Super Mutants remain the greatest threat to the wasteland, we will continue our mission to destroy them. There will always be another pre-war data cache, and if it is deleted it poses no threat to the wasteland anyway."
  BLN_nf_a029:0 "Fort Independence"
  BLN_nf_a029_desc:0 "The Elders out west have given an order to take the nearby Fort Independence. Unfortunately, there is another pressing matter requiring our attention."
  BLN_nf_a030:0 "Why Are We Here?"
  BLN_nf_a030_desc:0 "We have been in the Capital Wasteland for over 20 years now. Some of us have been here from the beginning, others are recent arrivals or recruits. Almost all of us have one pressing question: \n\nYou ever wonder why we're here?"
  BLN_nf_b001:0 "The Olive Branch"
  BLN_nf_b001_desc:0 "It is no secret that Casdin and a growing number of members of our order are disatisfied with the current direction we are going. We should meet and see if there is any way we can calm their concerns."
  BLN_nf_b002:0 "A Knights Duty"
  BLN_nf_b002_desc:0 "A Knight of the Brotherhood does not just fight on the front lines, but they also maintain equipment and assist in production. The Super Mutant conflict has caused some to forget this, but we should remind them."
  BLN_nf_b003:0 "Public Workshops"
  BLN_nf_b003_desc:0 "Rather than have our knights continue working in our workshops, we will begin a squireship program where wasteland tinkerers can study under knights in exchange for their service. We gain their labor and they gain some lower mechanical knowledge, it really is a win-win."
  BLN_nf_b004:0 "Knightly Armaments comes East"
  BLN_nf_b004_desc:0 "The Elders out West have not forgotten about us, and despite a few relaxed policies we have taken, they still want to provide their aid. Knight advisors are being sent east to help us establish a better production base."
  BLN_nf_b006:0 "Repurpose Buildings"
  BLN_nf_b006_desc:0 "The Knights sent to us have some ideas for how we can repurpose structures near The Citadel to better suit our needs."
  BLN_nf_b005:0 "Wastelander Labor"
  BLN_nf_b005_desc:0 "Some down on their luck wastelanders would happily work for us for little more than food and protection while they get on their feet. Taking them up on their offer could boost our production base."
  BLN_nf_b007:0 "Forges of Steel"
  BLN_nf_b007_desc:0 "The forges are lit and production is moving along. No longer will we need to rely exclusively on scavenging and trade for our equipment. While we may not be at the point to produce plasma rifles, we are taking our first steps."
  BLN_nf_b008:0 "Mutant-Free Zones"
  BLN_nf_b008_desc:0 "Our operations into the ruins of DC exterminating super mutants is proving effective. We are on the brink of driving them out of a few key areas. With the right efforts we could drive them out of strategic locations and ensure they do not return."
  BLN_nf_b009:0 "Occupy the Mall"
  BLN_nf_b009_desc:0 "The National Mall is the heart of downtown DC. Nearly every other district can be reached from the metro tunnels that intersect the mall. Establishing a permanent outpost here will be essential to operations in the ruins."
  BLN_nf_b010:0 "The Library Outpost"
  BLN_nf_b010_desc:0 "Establishing a permanent outpost at The Library of Congress will help in our efforts to fill the gaps the corrupted archives left."
  BLN_nf_b011:0 "Fortify GNR"
  BLN_nf_b011_desc:0 "GNR is one of the most secure places in the downtown DC ruins, as well as a valuable communications hub. Reinforcing it is vital to our DC operations."
  BLN_nf_b012:0 "Breathing Room"
  BLN_nf_b012_desc:0 "Between increased sweeps and the establishing of more secure outposts, we have afforded ourselves some more breathing room. Now we can turn our attention to other matters."
  BLN_nf_b013:0 "Secure our Supply Lines"
  BLN_nf_b013_desc:0 "With our new situation we should reconsider our logistics and see if there are some ways we can protect our supply lines more efficiently."
  BLN_nf_b014:0 "Expanded Settlement Protection"
  BLN_nf_b014_desc:0 "Raiders and Super Mutants remain a daily problem for our allies in the wastes. Once again they petition us for some aid, and the terms are worth considering."
  BLN_nf_b015:0 "Manpower Issues"
  BLN_nf_b015_desc:0 "The life of a Knight or Paladin is not for the faint of heart. These warriors face innumerable dangers in doing their duty, and over time there are losses. We have a new class of initiates finishing training, but our manpower troubles are a more permanent problem."
  BLN_nf_b016:0 "Refill the Ranks"
  BLN_nf_b016_desc:0 "Even with caps as a motivation we are having trouble finding quality soldiers to replace the losses of our outcast brothers. Regardless, we are making every effort we can."
  BLN_nf_b017:0 "Compromise with Loyalists"
  BLN_nf_b017_desc:0 "The Elders out West are largely opposed to the idea of us recruiting a common wastelander into our ranks, but they understand the plight of our manpower issue. Sending us replacements all the way across the country is not an easy task for them, and they have their own problems. The compromise proposed is that we allow wastelanders that want to join our cause to complete a dangerous mission for us. If the mission is completed, they can be inducted into the order."
  BLN_nf_b018:0 "Desperate Recruitment"
  BLN_nf_b018_desc:0 "We need people to fill our ranks no matter what. Even if they are not the most capable, if they can hold a laser rifle they can fight."
  BLN_nf_b019:0 "A Few Good Men"
  BLN_nf_b019_desc:0 "With our manpower issues we need to reassess our approach. Rather than try to refill every empty suit of armor, we will focus on recruiting quality soldiers. Former mercs, caravan guards or even settlement security could all make suitable Knights in time."
  BLN_nf_b020:0 "Specialist Recruitment"
  BLN_nf_b020_desc:0 "Maybe a few more compromises could be made in special cases."
  BLN_nf_b021:0 "First Knights"
  BLN_nf_b021_desc:0 "The first class of Knights since our new recruitment policies have finished training. They are being sent to the field and GNR is already singing their praises, which is drawing more to our cause."
  BLN_nf_b022:0 "New Paladins"
  BLN_nf_b022_desc:0 "With new Knights filling our ranks we are able to give a few much needed promotions."
  BLN_nf_b023:0 "Order of The Sword"
  BLN_nf_b023_desc:0 "The Order of The Sword is a school of scribes that research all things weaponry. Everything from refurbishing a lazer rifle to designing a new super weapon falls under their jurisdiction."
  BLN_nf_b024:0 "Room for Improvement"
  BLN_nf_b024_desc:0 "Though we lack advanced manufacturing capacity, we should still use our brightest minds to work on improving the weapons we have."
  BLN_nf_b025:0 "More With Less"
  BLN_nf_b025_desc:0 "Our scribes should focus their efforts in improving our repair of old equipment. A rifle in every hand is better than one nice rifle per three knights."
  BLN_nf_b026:0 "Things That Go Pew"
  BLN_nf_b026_desc:0 "Outside of those long dead Enclave people out West, The Brotherhood has always had the best energy weapons. We should continue this tradition."
  BLN_nf_b027:0 "Arming Initiates"
  BLN_nf_b027_desc:0 "Our initiates don't need top of the line energy weapons. Fixing up a few rusting assault rifles should be good enough for them."
  BLN_nf_b028:0 "Things That Go Boom"
  BLN_nf_b028_desc:0 "When it comes to fighting something like a super mutant behemoth, a laser rifle just isn't going to cut it. You need something with a little more punch."
  BLN_nf_b029:0 "Order of The Shield"
  BLN_nf_b029_desc:0 "The Order of The Shield is a school of scribes that research all things defense. Everything from restoring power armor to fortifying outposts falls under their jurisdiction."
  BLN_nf_b030:0 "Harden Resolve"
  BLN_nf_b030_desc:0 "Out in the field, sturdy armor is the only thing standing between our Knights and a super mutant's bullet. Improving our armor should be our top priority"
  BLN_nf_b031:0 "Strength in Numbers"
  BLN_nf_b031_desc:0 "Power armor may make a soldier feel invincible, but they aren't. We need to improve our repair and refurbishment techniques to keep up with losses."
  BLN_nf_b032:0 "Improvisation Training"
  BLN_nf_b032_desc:0 "Initiates are taught basic tactics, survival skills, and how to handle their weapons. These are important skills, but adding some lessons in constructing improvised fortifications should cut back losses."
  BLN_nf_b033:0 "Suiting Up"
  BLN_nf_b033_desc:0 "Some knights and even more initiates have to do without power armor. That is not to say they should be left unprotected. We have a stockpile of old recon armor suits that could be fixed up and distributed."
  BLN_nf_b034:0 "Automated Defenses"
  BLN_nf_b034_desc:0 "The Citadel had plenty of automated turrets that we needed to shut down when we moved in. Elder Lyons never had them reactivated because The Citadel seems impenetrable. What if it isn't?"
  BLN_nf_b035:0 "Order of The Quill"
  BLN_nf_b035_desc:0 "Though often overlooked by some, The Order of The Quill serves an essential purpose in The Brotherhood. These scribes collect and archive lost knowledge."
  BLN_nf_b036:0 "Tools of War"
  BLN_nf_b036_desc:0 "The scribes of The Order of The Quill have a lot of information to sift through. Lets ask them to focus on information that can help us develop better weapons!"
  BLN_nf_b037:0 "Tools of Propserity"
  BLN_nf_b037_desc:0 "Blueprints for pre-war weapons are useless if we lack the means to produce them. Ask the scribes to look for research that can improve our industrial capacity!"
  BLN_nf_b038:0 "RobCo Databases"
  BLN_nf_b038_desc:0 "A few rusted down comptuers in The Citadel have RobCo markings on them. No doubt, these are left behind from the joint venture for Liberty Prime. Perhaps there is more interesting information on them..."
  BLN_nf_b039:0 "Quill Scholars"
  BLN_nf_b039_desc:0 "We will set up another research team of members of The Order of The Quill. Cataloging old books can wait."
  BLN_nf_b040:0 "Things That Go Vroom"
  BLN_nf_b040_desc:0 "Though the roads of the wasteland are in disrepair, that does not mean vehicles are useless."
  BLN_nf_b041:0 "Western Scribes"
  BLN_nf_b041_desc:0 "With our renewed focus on our original mission, we should be able to ask Lost Hills to send more scribes to help us study this tech."
  BLN_nf_b042:0 "Add to Existing Teams"
  BLN_nf_b042_desc:0 "Lost Hills is sending over scribes. We will assign them to existing teams so we can give these projects the attention they deserve."
  BLN_nf_b043:0 "Western Scribe Team"
  BLN_nf_b043_desc:0 "The scribes from out west are used to working together. We will keep them on one team to work together on new projects."
  BLN_nf_b044:0 "Bunker Living"
  BLN_nf_b044_desc:0 "The scribes from Lost Hills know a thing or two about better living underground."
  BLN_nf_b045:0 "Western PA Advancements"
  BLN_nf_b045_desc:0 "Some breakthroughs in power armor development have been made since we last talked to our brothers out west. Now we are in the loop."
  BLN_nf_b046:0 "Its The Little Things"
  BLN_nf_b046_desc:0 "The scribes from Lost Hills know a little bit more than we did about circuitry as well."
  BLN_nf_b047:0 "Clearing Sub-levels"
  BLN_nf_b047_desc:0 "For too long we have wasted resources setting up little forward outposts in the middle of ruins. All that time countless artifacts lay beneath our feet. While much of the upper Pentagon fell to scavengers pretty quickly, there are lower levels that even we haven't accessed in the decades we have been here. It is time we rectify that, and in time we could build a fortress to rival Lost Hills!"
  BLN_nf_b048:0 "Sub-level 1 Restoration"
  BLN_nf_b048_desc:0 "This first level we have cleared appears to be a pre-war weapons testing lab. It will take time to make proper use of the labs, but there is plenty of space that could be put to other uses."
  BLN_nf_b049:0 "Sub-Level 2 Restoration"
  BLN_nf_b049_desc:0 "This second level we cleared appears to be little more than a storage warehouse. Much of it will need to be scrapped, but the empty space will make for good workshops."
  BLN_nf_b050:0 "Beneath the Bedrock"
  BLN_nf_b050_desc:0 "Deep below the ruined sub-levels and basements there are warehouses and storage bays that could be converted for more useful purposes."
  BLN_nf_b051:0 "The Knights Workshop"
  BLN_nf_b051_desc:0 "The Knights have a few ideas for what to do with the new space. We should hear them out."
  BLN_nf_b052:0 "The Scribe's Playground"
  BLN_nf_b052_desc:0 "The Scribes have put forward a few ideas for how they want to use their share of the new space."
  BLN_nf_c001:0 "Battle of Project Purity"
  BLN_nf_c001_desc:0 "The Enclave have stormed Project Purity and we must drive them out before they can get it online. We can not afford to hold anything back, bring Liberty Prime online!"
  BLN_nf_c002:0 "Victory at Project Purity"
  BLN_nf_c002_desc:0 "The Enclave have been dealt a heavy blow at Project Purity, but the war is far from over."
  BLN_nf_c003:0 "Loss at Project Purity"
  BLN_nf_c003_desc:0 "Project Purity remains in Enclave hands. We must regroup and figure out our next steps."
  BLN_nf_c004:0 "Struggle For Survival"
  BLN_nf_c004_desc:0 "The Enclave assault on Project Purity was just the beginning. They are setting up outposts across the wasteland and are getting ready for a large scale assault, not just on us, but on the people of the wasteland. GNR is telling the people of the wasteland to take up arms, we are in this together."
  BLN_nf_c005:0 "Friends in Need"
  BLN_nf_c005_desc:0 "The war with The Enclave is in full swing and our allies are taking heavy losses. While we have little to spare, we could at least send them a few instructors to help their people better fight our common foe."
  BLN_nf_c006:0 "So Democracy May Live"
  BLN_nf_c006_desc:0 "Liberty Prime has fallen. If we do not find a new counter to the vertibirds, we will follow."
  BLN_nf_c007:0 "Know the Enemy"
  BLN_nf_c007_desc:0 "Our scribes have been studying Enclave equipment scavenged from the battlefields and have made several breakthroughs in power armor tech that had eluded us."
  BLN_nf_c008:0 "Brotherhood Surplus"
  BLN_nf_c008_desc:0 "The DC Settlements are rallying all the men they can for this war, but their arms are hardly sufficient for fighting The Enclave. We will send them some surplus equipment that should help them in their fight."
  BLN_nf_c009:0 "Shock Value"
  BLN_nf_c009_desc:0 "Pre-war archives tell us of an experimental tesla coil in the Olney Power Works. This device could advance our understanding greatly and allow the development of tesla-based weapons capable of destroying vertibirds."
  BLN_nf_c010:0 "Birds of War"
  BLN_nf_c010_desc:0 "Our scouts have made some detailed observations about Enclave resupply procedures and noted some patterns. If we are careful we can capture some of their vertibirds."
  BLN_nf_c011:0 "Token of Thanks"
  BLN_nf_c011_desc:0 "The people of The Capital Wasteland have said they want to send us a token of thanks for our help in defending them from The Enclave. According to their message an 'assload enclave stuff' should be on its way to The Citadel."
  BLN_nf_c012:0 "To Kill a Vertibird"
  BLN_nf_c012_desc:0 "After weeks of research and development we have produced the first batch of prototype Tesla Cannons. They are entering the hands of our soldiers."
  BLN_nf_c013:0 "Deathclaw Scrambler"
  BLN_nf_c013_desc:0 "Scribe Vallincourt has prepared a device that she believes should disrupt the signals sent by Enclave outposts to their controlled deathclaws. She theorizes this will only work for a time before they can change their frequencies, but we can use whatever edge we can get."
  BLN_nf_c014:0 "Fall of Raven Rock"
  BLN_nf_c014_desc:0 "Raven Rock has fallen, but is this the end?"
  BLN_nf_c015:0 "Flush Them Out"
  BLN_nf_c015_desc:0 "Enclave vertibirds had been seen fleeing Raven Rock just as some were seen fleeing Navarro decades ago. We must not make the same mistake again in allowing them to rebuild. We need to find them."
  BLN_nf_c016:0 "Found Them"
  BLN_nf_c016_desc:0 "After months of searching, The remnants of The Enclave have been found. They are regrouping at a pre-war military base. We must form a strike plan."
  BLN_nf_c017:0 "The Battle of Adams AFB"
  BLN_nf_c017_desc:0 "With the Enclave defeated once and for all, for real this time, we must decide what to do next."
  BLN_nf_c018:0 "Friends & Neighbors"
  BLN_nf_c018_desc:0 "The war with The Enclave is winding down, and now we need to decide what to do with our temporary allies."
  BLN_nf_c019:0 "The Lyons Alliance"
  BLN_nf_c019_desc:0 "The Enclave is not the last threat in the wasteland, and we aren't even sure we are done with them. We will see if our friends will continue this alliance."
  BLN_nf_c021:0 "Shared Insights"
  BLN_nf_c021_desc:0 "Our allies are obviously not ready for the knowledge we posess. However, allowing our junior scribes to perform some repair work or provide some insights on less advanced projects couldn't hurt."
  BLN_nf_c020:0 "Stand Alone"
  BLN_nf_c020_desc:0 "The Brotherhood was never about fighting the battles of wastelanders for them. We won't fight our tempoary friends, but we will not fight another war for them either."
  BLN_nf_c022:0 "Stand by our Principles"
  BLN_nf_c022_desc:0 "Shunning the petty squabbles of wastelanders allows us to focus on our mission."
  BLN_nf_c023:0 "Enclave Salvage"
  BLN_nf_c023_desc:0 "While Raven Rock was destroyed, we have recovered tech from worse places."
  BLN_nf_c024:0 "Enclave Archives"
  BLN_nf_c024_desc:0 "Most of the databanks in Raven Rock were destroyed in the blast, but there are still a few things worth recovering."
  BLN_nf_c025:0 "Forgotten Knowledge"
  BLN_nf_c025_desc:0 "We should leave no stone unturned in our search of this ruin, lest we let some wasteland scavenger find a vial of FEV."
  BLN_nf_c026:0 "Grab Abandoned Equipment"
  BLN_nf_c026_desc:0 "Crates of equipment were left behind at Raven Rock and forward bases when The Enclave fled. We should grab it before someone else does."
  BLN_nf_c027:0 "Establish an Outpost"
  BLN_nf_c027_desc:0 "The ruins of Raven Rock will take years to thoroughly pick through. We will need to set up a base in the area to guard our salvage efforts."
  BLN_nf_c028:0 "Scavenge the Battlefield"
  BLN_nf_c028_desc:0 "The Enclave left behind many of their dead and a lot of equipment in their retreat. We should scavenge what we can."
  BLN_nf_c029:0 "Tend the Wounded"
  BLN_nf_c029_desc:0 "Survivors from the battle are pouring in and The Enclave is not giving pursuit. We must help the wounded before The Enclave ready a counter-attack."
  BLN_nf_d000:0 "Our Lyoness"
  BLN_nf_d000_desc:0 "The sudden death of Elder Owen Lyons was a shock to many. His contributions to The Brotherhood and memory will be honored. Now the matter of his daughter and successor must be discussed."
  BLN_nf_d001:0 "The Wounded Pride"
  BLN_nf_d001_desc:0 "The sudden death of our newest Elder has The Brotherhood in disarray."
  BLN_nf_d002:0 "The Rusted Shield"
  BLN_nf_d002_desc:0 "In recent years, a shortage on resources caused Elder Lyons to make difficult choices. One of these was to reduce the resources allocated to scribe research. Among those hurt by this was Bowditch's own The Order of The Shield. Responsible for researching armor and other defensive technologies, the order had to do with less so Knights could have the armor they needed to fight. With Enclave tech pouring in, maybe we can afford to invest more in R&D."
  BLN_nf_d004:0 "Chipped Sword"
  BLN_nf_d004_desc:0 "The Order of The Shield was not the only one hurt by resource shortages. The Order of The Sword also had to dial back their efforts. Responsible for researching weapons and other offensive technologies, several initiatives had to be halted so Knights could have the ammo and weapons to fight. As with The Order of The Shield, we can divert some of the Enclave tech coming in to their use."
  BLN_nf_d006:0 "Dulled Quill"
  BLN_nf_d006_desc:0 "The Order of The Quill perhaps suffered the worst during the resource shortages. After all, a case could be made for armor and weapons development during a crusade or a war, but what use is digging for old books when there are enemies at the gates? Now that things have settled we can give The Order of The Quill the resources they need as well."
  BLN_nf_d003:0 "Repair Services"
  BLN_nf_d003_desc:0 "Bowditch and some other scribes have on occasion lent their hands to repairing outsiders equipment for caps The Brotherhood needed. This practice could be expanded to our benefit."
  BLN_nf_d005:0 "Improve Defenses"
  BLN_nf_d005_desc:0 "Bowditch led the design of The Citadel over two decades ago. In the years since the project was considered finished, he kept note of some improvements that could be made. Now is a good time to put them into action."
  BLN_nf_d007:0 "Smithy Upgrades"
  BLN_nf_d007_desc:0 "The walls of The Citadel were not the only things that could be improved. There are ample opportunities to make better use of the smithy."
  BLN_nf_d008:0 "Finish the Mark II Recon Armor"
  BLN_nf_d008_desc:0 "Power armor is not the only armor The Brotherhood uses. Many initiates and even some knights are equipped with the lighter recon armor. Before the supply shortage, scribe Bowditch was close to completing a prototype for an improved version of recon armor. Now that Bowditch makes the decisions, he'll see the project finished."
  BLN_nf_d009:0 "Warrior Elder"
  BLN_nf_d009_desc:0 "The first Elders of The Brotherhood fought along side their Paladins and Knights. The new Elder Lyons is intent on reviving this tradition."
  BLN_nf_d010:0 "Tougher Training"
  BLN_nf_d010_desc:0 "The training of the average initiate may be better than most soldiers in the wastes, but they could always be improved."
  BLN_nf_d011:0 "Verti-Assault Training"
  BLN_nf_d011_desc:0 "With an increasing number of Vertibirds being recovered from Enclave outposts, we should begin to train our soldiers in how to fight from inside these vehicles."
  BLN_nf_d012:0 "Sea Lyons"
  BLN_nf_d012_desc:0 "As part of improving our fighting force, some soldiers will receive additional training on amphibious assaults. We never know when we may need to land on a hostile shore."
  BLN_nf_d013:0 "Leading by Example"
  BLN_nf_d013_desc:0 "The sight of the Elder shoulder to shoulder with Knights and Paladins on the front continues to inspire our soldiers, lets just hope she doesn't catch a stray shot."
  BLN_nf_d014:0 "Lyons Guard"
  BLN_nf_d014_desc:0 "In response to concerns about the Elder's safety on the front lines, an elite guard of Paladins has been reassigned to provide support and protect her life in battle."
  BLN_nf_d015:0 "Always Wear a Helmet"
  BLN_nf_d015_desc:0 "The Elder Maxson II died from a poisoned arrow. This would not have happened had he kept his helmet on. Our Elder will learn from this mistake."
  BLN_nf_d016:0 "Stronger and Fiercer"
  BLN_nf_d016_desc:0 "Between the improved training and our Warrior Elder leading at the front, our soldiers are in better fighting shape than they've been since we arrived in DC."
  BLN_nf_d017:0 "Armor to Robes"
  BLN_nf_d017_desc:0 "Caving to the advice of Scribe Rothschild, our Elder is trading her T-45 for a set of blue robes."
  BLN_nf_d018:0 "Policy Reforms"
  BLN_nf_d018_desc:0 "Already settling into her new role, The Elder is passing a series of small reforms."
  BLN_nf_d019:0 "Relaxed Trade"
  BLN_nf_d019_desc:0 "Trade with wastelanders can be mutually beneficial, so long as we are cautious with who we do business with."
  BLN_nf_d020:0 "Doctrine Reforms"
  BLN_nf_d020_desc:0 "Some elements of our combat doctrine are outdated and in need of updating."
  BLN_nf_d021:0 "Lyons' Lessons"
  BLN_nf_d021_desc:0 "The folks at GNR have asked the new Elder to record some audio tips about surviving in the wasteland that she picked up during her time in the field. They feel it would go a long way toward helping Wastelanders and boosting recruitment."
  BLN_nf_d022:0 "Training Reforms"
  BLN_nf_d022_desc:0 "Just like our combat doctrine, some of our training methods are stuck in the 2100s. It is time to change that."
  BLN_nf_d023:0 "Defense Drills"
  BLN_nf_d023_desc:0 "Our new Elder has noticed a few holes in our defenses that need patching."
  BLN_nf_d024:0 "The Eastern Codex"
  BLN_nf_d024_desc:0 "The Codex contains many outdated directives and hampers our mission to rectify some of the horrors of the wasteland. While not everyone may support changing The Codex to suit our needs, The Elder's not one to let some murmuring get in her way."
  BLN_nf_d025:0 "Beyond the Capital"
  BLN_nf_d025_desc:0 "Sifting through the DC Ruins was never the ultimate goal of our expedition. There are places all up and down the East Coast that we need to look into."
  BLN_nf_d026:0 "Shipping up to Boston"
  BLN_nf_d026_desc:0 "Our first expedition to Boston only scratched the surface. There is so much more to be found."
  BLN_nf_d029:0 "Squad Gladius"
  BLN_nf_d029_desc:0 "The loss of Squad Artemis was a sad event, but that should not dissuade us. A new squad will be formed to go north, find out what happened to Squad Artemis and bring back valuable tech from the Commonwealth."
  BLN_nf_d027:0 "Return to The Pitt"
  BLN_nf_d027_desc:0 "The rumors of The Pitt being united under one of our Brothers into a slaver kingdom is unfortunately true. Now we need to decide what we do about it."
  BLN_nf_d030:0 "The Pitts Curse"
  BLN_nf_d030_desc:0 "Something in the air or water makes a prolonged stay in The Pitt a slow death sentence, but Ashur was making some progress at a cure."
  BLN_nf_d028:0 "Operation Rockcrusher"
  BLN_nf_d028_desc:0 "Our recent expedition into the mountains to the west tell us that the religious fanatics there are sitting on a sealed pre-war bunker and they likely don't know it. Unfortunately, they won't let us wander into their territory without a fight."
  BLN_nf_d031:0 "Opposing Forces"
  BLN_nf_d031_desc:0 "Our expedition reports that the magnetic weapons used by the fanatics just west of The Capital Wasteland are more than a minor threat to The Brotherhood. Conflict may be inevitable."
  BLN_nf_d032:0 "Just Looking Around"
  BLN_nf_d032_desc:0 "The people of The Capital Wasteland have taken it upon themselves to bring liberty to The Pitt. The late Elder Lyons would've been proud I think. Regardless, they are sitting on things they don't know about or understand. We need to grab it before they make a mess of things."
  BLN_nf_d033:0 "Stabilizing Force"
  BLN_nf_d033_desc:0 "The Pitt clearly has more value than we saw in our first sweep of the city showed. We will need to establish a lasting presence to ensure we search the ruins thoroughly this time. There is a young paladin that proved himself capable during the Enclave war that may be right for the job."
  BLN_nf_d034:0 "Collecting Blueprints"
  BLN_nf_d034_desc:0 "We will send Knights into the ruins to ensure they secure any technical data or schematics that could prove useful. This time, leave no stone unturned."
  BLN_nf_d035:0 "Optimizing Foundries"
  BLN_nf_d035_desc:0 "These forges Ashur was using to produce ammunition and other steel products are capable of so much more, we just need a little scribe know-how."
  BLN_nf_d036:0 "Lost Secrets of Industry"
  BLN_nf_d036_desc:0 "After months of digging, our Knights have returned with a mountain of valuable technical data. While not all of it is immediately useful to us, a lot of it could be applied to our forges in The Citadel."
  BLN_nf_d037:0 "Chasing Ghosts"
  BLN_nf_d037_desc:0 "Our team sent out west to chase down rumors of Enclave survivors instead found signs that our brothers who disappeared in the midwest may not have died out after all. Ready a few vertibirds to bring them some support for a thorough search."
  BLN_nf_d038:0 "Distant Relations"
  BLN_nf_d038_desc:0 "We have made contact with someone who claims to be the elder of The Midwest Chapter of The Brotherhood. We are skeptical, but a meeting between our elders may be warranted."
  BLN_nf_d039:0 "Comparing Notes"
  BLN_nf_d039_desc:0 "Our Midwestern brothers have volumes of data that could prove useful to us, just as they may have data that could prove useful to us."
  BLN_nf_d040:0 "Scribe Exchange Program"
  BLN_nf_d040_desc:0 "The enviroments and tech available to us and our Midwestern brothers are very different. There is much our scribes can learn from each other. It has been proposed that we exchange a few of our scribes to teach and learn from the scribes of the other chapter."
  BLN_nf_d041:0 "No Brother of Ours"
  BLN_nf_d041_desc:0 "Whoever this Irons is, it is clear to any one of us looking at his works that he is not someone we will get along with."
  BLN_nf_d042:0 "Camelot's Plan"
  BLN_nf_d042_desc:0 "The Paladin that escaped Irons' custody has a plan to weaken them. Targeting Irons this early in the war may be a suicide mission, but Knight Robinson is not. The Knight is one of his oldest allies and top soliders, often seen near the front lines. Camelot is gathering intelligence from field reports and putting together a plan that Lyons Pride should be able to carry out."
  BLN_nf_d043:0 "The Direct Approach"
  BLN_nf_d043_desc:0 "We can not hold back on this, Irons is just as big a threat as Eden ever was. So we must send everything we have to stop him."
  BLN_nf_d044:0 "The Good Guys Are Back"
  BLN_nf_d044_desc:0 "The people of the midwest are naturally terrified at the sight of Brotherhood Knights entering their villages. With what they have gone through under Irons, we can not blame them. It will take time to convince them that this time The Brotherhood are the good guys."
  BLN_nf_d045:0 "Worst Case Scenario"
  BLN_nf_d045_desc:0 "Some documents recovered from Raven Rock and Adams AFB mentioned a 'chicago outpost' of The Enclave. We always assumed that meant something like 3 guys sitting in a bunker. We were wrong, very wrong."
  BLN_nf_d046:0 "Support Wasteland Rebels"
  BLN_nf_d046_desc:0 "Across the midwest there are wastelanders resisting Enclave rule. We will give them a helping hand."
  BLN_nf_d047:0 "Rally Support At Home"
  BLN_nf_d047_desc:0 "GNR will begin broadcasting news stories about the happenings in the midwest, and The Chicago Enclave's rule. That should rally the people to join our fight."
  BLN_nf_d048:0 "Another Pre-War Monster"
  BLN_nf_d048_desc:0 "The Brotherhood was founded out of opposition to manmade horrors created by the pre-war US Government. We shouldn't be surprised to find such abominations in Chicago."
  BLN_nf_d049:0 "Family Reunion"
  BLN_nf_d049_desc:0 "The ideals of The Midwest Brotherhood align closely with our own. It only makes sense that we fomrally join forces with our brothers."
  BLN_nf_d050:0 "Another Damn Enclave?"
  BLN_nf_d050_desc:0 "Why is it every time we go somewhere with interesting pre-war tech, we bump into a bunker of assholes?"
  BLN_nf_d051:0 "Secure The Fountain"
  BLN_nf_d051_desc:0 "The fountain of dreams is some local legend that the lost Gulf Brotherhood was investigating. If The Midwestern Brotherhood sent people down there, it must be worth looking into"
  BLN_nf_d052:0 "Van Buren Archives"
  BLN_nf_d052_desc:0 "The Van Buren Air Force Base's archives are stuffed with technical data relating to aircraft and spaceflight. The scribes will have a field day."
  BLN_nf_d053:0 "Why The Moon?"
  BLN_nf_d053_desc:0 "The Enclave wasted heaps of advanced pre-war tech on a dream to get off this planet. They had a paritcular interest in the moon for some reason. We should find out why."
  BLN_nf_d054:0 "Stranded Brothers"
  BLN_nf_d054_desc:0 "An expedition of our fallen brothers in The Midwest Brotherhood have been cut off for too long. It is time they see a friendly face, or suit of T-45."
  BLN_nf_d055:0 "Scribecation"
  BLN_nf_d055_desc:0 "Florida is home to a wealth of advanced technology worthy of study. We could send some of our scribes down to The Gulf Brotherhood to study things and teach them a thing or two about how we do things in The Capital Wasteland."
  BLN_nf_d056:0 "Florida Wisdom"
  BLN_nf_d056_desc:0 "The wastelanders of Florida may be strange even by wasteland standards, but they know a thing or two about keeping a boat afloat."
  BLN_nf_d057:0 "Fountain of What?"
  BLN_nf_d057_desc:0 "Our brothers in Florida claim to have a fountain of water that flushes radiation from the system like Rad-Away. That can't be true right?"
  BLN_nf_d058:0 "Canadaclave?"
  BLN_nf_d058_desc:0 "Why are we not surprised there was an enclave bunker in Canada too?"
  BLN_nf_d059:0 "The Ontario Command Bunker"
  BLN_nf_d059_desc:0 "The Ontario Command Bunker, once home to The Ontario Enclave, has been discovered abandoned by our scouts."
  BLN_nf_d060:0 "Snowy Savages"
  BLN_nf_d060_desc:0 "The wastelanders of Ontario sift among ruins full of advanced tech they do not understand. They need our guidance."
  BLN_nf_d061:0 "Familiar Tech"
  BLN_nf_d061_desc:0 "Why the hell did a bunch of wastelanders in Canada have enclave armor?"
  BLN_nf_d062:0 "Rewire W.A.S.H.I.N.G.T.O.N"
  BLN_nf_d062_desc:0 "The pre-war government wasted an advanced ZAX computer on something as stupid as governing civilians. We could put it to better use with some adjustments."
  BLN_nf_d063:0 "Entering Eden"
  BLN_nf_d063_desc:0 "With access to the vault secured, we can take a closer look at the cause of this swamp problem..."
  BLN_nf_d064:0 "Back On Track"
  BLN_nf_d064_desc:0 "Lyons and his daughter mismanaged this chapter for decades. Now that they are both gone, we can bring this chapter back into compliance with The Codex."
  BLN_nf_d065:0 "The Knights"
  BLN_nf_d065_desc:0 "Recruiting standards will be changing with Elder Casdin in charge."
  BLN_nf_d066:0 "Scour The Ruins"
  BLN_nf_d066_desc:0 "The primary purpose of this expedition was to scour The DC Ruins for important technology. Now that we aren't bothered with trivial matters, we can return to this task."
  BLN_nf_d067:0 "Protectors & Paladins"
  BLN_nf_d067_desc:0 "Too much of the leadership in The Citadel still hold some of Lyons' ideals. Elder Casdin will promote brothers that are more in line with The Chapter's goals."
  BLN_nf_d068:0 "Diamonds In The Rough"
  BLN_nf_d068_desc:0 "Under 200 years of rubble there are irreplaceable pieces of tech. That tech should belong to those that know how to properly use it."
  BLN_nf_d069:0 "Western Reinforcements"
  BLN_nf_d069_desc:0 "Lost Hills sees fit to send the new elder some more knights to help the chapter complete its mission."
  BLN_nf_d070:0 "Scav Permits"
  BLN_nf_d070_desc:0 "Even with 10,000 Knights and Scribes prowling the ruins, we'd never find every piece of invaluable tech. Instead of digging through rubble, we will allow wastelanders to do so. They will need to be approved by us and turn over every valuable piece of tech they find. We should be able to pay them off with trivial goods like 5.56 bullets or something."
  BLN_nf_d071:0 "Steel Reforged"
  BLN_nf_d071_desc:0 "It may be over 20 years later than expected, but this Chapter is finally doing what it should be doing. Only one thing remains for us to shake off the dead weight of Lyons' treason."
  BLN_nf_e001:0 "The Prodigal Brothers"
  BLN_nf_e001_desc:0 "Many of our lost brothers thought our chapter would die out without them, and we have proven them wrong. Now lets see what they think of our 'deviant methods'."
  BLN_nf_e002:0 "Reach out to them"
  BLN_nf_e002_desc:0 "These brothers may have abandoned us once, but our victory over The Enclave and continued survival has shown value in The Lyons Doctrine. It is doubtful they will leep back into the fold, but this could be the beginning of renewed cooperation."
  BLN_nf_e003:0 "Teach them a lesson"
  BLN_nf_e003_desc:0 "For a time we tolerated the dogmatic activites of our outcast brothers, but some of their recent activities have endangered our allies in the wasteland. They must be brought back into the fold, or driven out of The Capital Wasteland."
  BLN_nf_e004:0 "Stand Together"
  BLN_nf_e004_desc:0 "Sharing research, intelligence and joint training will yield benefits for both parties."
  BLN_nf_e005:0 "Seeing Reason"
  BLN_nf_e005_desc:0 "The majority of Outcasts have laid down their arms and accepted our victory. Integrating them will take some great effort."
  BLN_nf_e006:0 "A Wound Healed"
  BLN_nf_e006_desc:0 "The schism with our outcast brothers has begun the process of healing. In time, Casdin's little rebellion will be just a small footnote in our history."
  BLN_nf_e007:0 "Our Old Foe"
  BLN_nf_e007_desc:0 "Over a century after The Master's defeat we are still dealing with Super Mutants. Though these are of a different breed, their horrible nature remains the same. With The Enclave defeated, we must return our focus to this old foe."
  BLN_nf_e008:0 "Find Their Home"
  BLN_nf_e008_desc:0 "The mutants produce faster than even our best knights can kill them. If we are to ever put an end to this nightmare, we need to put a stop to their creation."
  BLN_nf_e009:0 "The Green Tide"
  BLN_nf_e009_desc:0 "As if the roaming bands of super mutants lumbering about were not bad enough, one of them has apparently organized the masses. We have to stop this before it gets out of hand."
  BLN_nf_e010:0 "The Death of Shephard"
  BLN_nf_e010_desc:0 "The Super Mutant menace has been beaten back and its hive squashed, but what of its leader?"
  BLN_nf_e011:0 "Into Their Hive"
  BLN_nf_e011_desc:0 "The Super Mutant home has been found in Vault 87, and we think we have a way inside. Now we just need to devise a plan for assaulting this den of evil."
  BLN_nf_e012:0 "The End of a Nightmare"
  BLN_nf_e012_desc:0 "The Super Mutant lair in Vault 87 has been destroyed and no more mutants will be created. It is not the time to celebrate just yet, there are still mutants about."
  BLN_nf_f001:0 "Sifting the Rubble"
  BLN_nf_f001_desc:0 "The battle of Adams AFB left a lot of equipment to be dug out of the rubble. Lets organize teams to comb the battlefield."
  BLN_nf_f002:0 "The Scrapheap"
  BLN_nf_f002_desc:0 "The mobile crawler had to be destroyed in the battle. While the smouldering hunk of metal is called "the scrapheap" by brothers stationed there, it still has some value that can be salvaged."
  BLN_nf_f003:0 "The Airfield"
  BLN_nf_f003_desc:0 "The airfield at Adams AFB was damaged by both 200 years of neglect and the recent battle. We should fix up what we can to make use of our new vertibirds."
  BLN_nf_f004:0 "Fixing Defenses"
  BLN_nf_f004_desc:0 "The defenses at Adams AFB were breached in our assault. We will build them back better before we make this a home."
  BLN_nf_f005:0 "The Prydwen Project"
  BLN_nf_f005_desc:0 "The scribes have plans to improve upon pre-war airship designs. If we can pull it off, this ship will change everything."
  BLN_nf_f006:0 "Resources at Hand"
  BLN_nf_f006_desc:0 "If we are to build this thing, we will need more resources than we have. It will take time to find solutions."
  BLN_nf_f007:0 "Building a Behemoth"
  BLN_nf_f007_desc:0 "Even with the resources to build The Prydwen, the hard part is still ahead. Now we have to build the damn thing"
  BLN_nf_f008:0 "The Flying Citadel"
  BLN_nf_f008_desc:0 "The Prydwen's construction is nearing completion. With this ship we will be able to go nearly anywhere and pursue our goals with nobody to stop us.... unless some wastelanders have a few old cannons."

  BLN_nf_f009:0 "Bigsleys Burden"
  BLN_nf_f009_desc:0 "Everyone was so excited about that Purifier "Project Purity this," and "Project Purity that." But did anyone stop to ask "Hey, what are we going to DO with all that clean water?" Well, guess who gets to fill that tiny detail. It'd be one thing if I had support, but that little war with the Enclave has depleted much of The Brotherhood's resources. And to top it off, I have to be mommy to a bunch of lab coats"
  BLN_nf_f010:0 "Waters of Life"
  BLN_nf_f010_desc:0 "Scribe Bigsley has discovered that water production is going slightly beyond expectations and has not yet reported it to The Elder. The Elder wants us to share the water for free with the people of the wasteland. Rivet City will help with distribution, but it is still a massive undertaking. I sure hope the good will it generates is worth it."
  BLN_nf_f011:0 "Secret Water Trade"
  BLN_nf_f011_desc:0 "Scribe Bigsley has discovered that water production is going slightly beyond expectations and has not yet reported it to The Elder. Rather than report this surplus, he could sell it and use the caps to sweeten the deal for the many Knights that dislike water escort duty. Don't they deserve a reward for this dangerous work?"
  BLN_nf_f012:0 "Water for Salvage"
  BLN_nf_f012_desc:0 "Scribe Bigsley has discovered that water production is going slightly beyond expectations and has not yet reported it to The Elder. Rather than report this surplus, he could trade the extra water for technology that will both keep the purifier running and help his fellow scribes."

  BLN_nf_f013:0 "Anywhere I Wander"
  BLN_nf_f013_desc:0 "The site of Project Purity, while valuable, is a difficult point to stage water caravans from. We should look to other locations to focus on distributing out of too."
  BLN_nf_f014:0 "Project Expansion"
  BLN_nf_f014_desc:0 "The Water Distribution Network has proven a headache for Bigsley and just about every scribe assigned to work on it. With some improved facilities and equipment we can make elements of the work easier."
  bln_unlock_first_project_decisions_tt:0 "Completing this focus will unlock §Ydecisions§! to build projects to improve our §Cwater distribution network§!."
  BLN_nf_f015:0 "Reach Out to §CDelmarva§!"
  BLN_nf_f015_desc:0 "There's more to the Wasteland than simply the Capital. To our East lies the Delmarva peninsula, filled largely with humble fishermen and the pirates that threaten their livelihoods. They could make for some excellent minor trading partners."
  bln_reach_out_to_delmarva_tt:0 "We will send envoys to the §BDelmarva§! fishing groups, offering them §Ywater§! in exchange for §Gships§! and §Gtrade privileges§!. If they agree, they will help §Ydistribute water§!."
  BLN_nf_f016:0 "Even Flow"
  BLN_nf_f016_desc:0 "With the immediate annoyances taken care of, only the daily drudgery of organizing caravans and keeping this place together remain. Our water network ties together our growing nation."
  bln_water_cores_tt:0 "Completing this focus will unlock §Ydecisions§! to §Gcore§! states with sufficient water, or §Gpermanently supply§! our core states."
  
