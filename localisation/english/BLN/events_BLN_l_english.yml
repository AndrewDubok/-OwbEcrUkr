  bln_events.1.title:0 "Місія"
  bln_events.1.desc:0 "Для члена Братства субординація важливіша за закони фізики. Немає наказу більш основоположного, ніж наказ людини над машиною. Тож коли Старійшини Каліфорнії вирішили підкорити незвіданий Схід, Лайонс знав, що це має бути зроблено. Поки він та його почт пробиралися пусткою, Лайонс зіткнувся з багатьма важкими рішеннями, але як Старший Паладин він мав повне право голосу. Ті, хто знав Лайонса, могли сказати, що в ньому назрівають зміни, судячи з того, як він підходив до кожного нового виклику. Лайонс..."
  bln_events.1.a:0 "...почав покладатися на Писаря Ротшильда."
  bln_events.1.b:0 "...стабілізував міста, через які проходив."
  bln_events.1.c:0 "...використовував мутантів як мішені для стрільби."

  bln_events.2.title:0 "Бич Божий"
  bln_events.2.desc:0 "Як би Лайонс не реагував на жах пусток, ясно одне: у день, коли він покинув Пітт, він став іншою людиною. \n\nЕкспедиція досягла Піттсбурга на початку 2255 року і виявила місто, що кишить паразитами, як людськими, так і іншими. Піттсбург перетворився на хаос, і Лайонс вирішив звільнити звідти всіх, кого зміг. Він та його Паладини знищили будь-який опір і забрали все, що мало цінність. Серед речей, які Лайонс вважав цінними, були 20 дітей-сиріт і дещо, відоме лише Старійшині. Ціна цікавості Овена Лайонса склала лише одного паладина, розчавленого уламками будівлі. В обмін на душу однієї людини Лайонс знайшов..."
  bln_events.2.a:0 "...плани нової ери ливарних заводів."
  bln_events.2.b:0 "...секрет локомоції."
  bln_events.2.c:0 "...достатньо ядерного матеріалу, щоб зрівняти з землею Скелясті гори."

  bln_events.3.title:0 "Цитадель"
  bln_events.3.desc:0 "У 2255 році Експедиція досягла Столичної Пустки. Їхня Мекка, Пентагон, була зруйнована, але під уламками ховався залізний гігант. Величезна міць Ліберті Прайма змусила Верховних Старійшин призначити Лайонса головою нового відділення. Щоб відновити та дослідити скарби Столиці, Лайонсу знадобився бункер, який міг би зрівнятися з Лост-Хіллз. Він знайшов такий бункер у Цитаделі, але руйнування, які спіткали Пентагон, треба було усунути. Через нестачу людей та матеріалів Лайонсу довелося покластися на місцевих жителів, щоб забезпечити Братство. В обмін на їхню допомогу, мешканці пусток попросили у Лайонса..."
  bln_events.3.a:0 "...захисту всередині Цитаделі."
  bln_events.3.b:0 "...допомоги дістатися до Рівет-Сіті."
  bln_events.3.c:0 "...води для Мегатонни."

  bln_events.4.title:0 "Підкріпити Монумент Вашингтона"
  bln_events.4.desc:0 "Монумент Вашингтона заввишки 555 футів — найвища споруда в Столиці. Хоча ми утримували неміцний контроль над обеліском з моменту входу в місто, стає зрозуміло, наскільки стратегічно важливою є ця вежа. Настільки важливою, що якщо ми її втратимо, нам, можливо, доведеться переглянути своє становище в Цитаделі. Якщо ми хочемо продовжувати діяти по той бік Потомака, нам потрібно приділяти форпосту набагато більше уваги."
  bln_events.4.a:0 "Нехай Пібоді замовить необхідні припаси."

  bln_events.5.title:0 "Битва за Меморіал Лінкольна"
  bln_events.5.desc:0 "Оплот рабовласників на Алеї становить небезпеку для нашої місії з убезпечення Столиці. Поки вони полюють на місцевих жителів, Супермутанти продовжують набирати силу по всій Алеї. Розвідувальні групи повідомили про групу втікачів-рабів у районі Храму Союзу. \n\nЗа цими повідомленнями було відправлено загін під керівництвом Паладина Дженнінгс, якому вдалося завербувати вільновідпущеників для місії з вигнання рабовласників. Загін розпочав штурм і швидко вибив погано озброєних бандитів, але коли вони зачищали решту Меморіалу, Паладина Дженнінгс оточили рабовласники, які відступили всередину будівлі. Дженнінгс боролася з ними кілька хвилин, перш ніж пролунали численні вибухи гранат, і Дженнінгс разом із рабовласниками впали замертво.\n\nПісля штурму Паладин Дженнінгс була єдиною втратою. Меморіал зараз утримують кілька Лицарів та десяток вільновідпущеників."
  bln_events.5.a:0 "Запишіть її смерть у Сувої. Її відвага не буде забута."

  bln_events.6.title:0 "Звіт Джеймсон"
  bln_events.6.desc:0 "Старійшино,\n\nЯ прочитала останні звіти про кількість Паладинів та Лицарів, які не вийшли на зв'язок, коли очікувалося. Я розумію хаотичність ситуації на полі бою, але традиція вимагає, щоб смерть кожного Брата, який поліг у бою, була записана в Сувої. Не докласти максимум зусиль, щоб отримати докази того, хто загинув, а хто вижив, є немислимим.\n\nЯ розумію, що кожен Брат потрібен для роботи тут, у Цитаделі, та в сусідньому місті. З цією метою я маю намір укласти контракт із сторонніми особами, щоб отримати докази того, хто з наших побратимів поліг від рук ворога. Я попрошу їх приносити жетони будь-якого загиблого брата, якого вони знайдуть. Це найменше, що ми можемо зробити, не маючи ресурсів для повноцінного та почесного поховання.\n\nВам не потрібно турбуватися про винагороду для цих підрядників. Я заплачу їм зі своїх особистих коштів. Для мене це того варте, щоб зберегти традицію і не напружувати ресурси, необхідні для вашої місії.\n\nВаша в Сталі,\n\nПисар Елізабет Джеймсон,\n\nГоловний Бібліотекар\nОрдену Пера\nБункер у Столичній Пустці"
  bln_events.6.a:0 "Зрозуміло"

  bln_events.7.title:0 "Прототип"
  bln_events.7.desc:0 "Ліберті Прайм — майже нестримна зброя, яка в наших руках може стати безцінним ресурсом. Проблема, з якою ми стикаємося сьогодні, та сама, що й 200 років тому: велетенський робот потребує надто багато енергії. Незліченні спроби перенаправити енергію або підвищити ефективність закінчувалися невдачею або чимось гіршим. Тим не менш, Писар Ротшильд не здається і вірить, що з ще трохи більшими ресурсами він зможе забезпечити запуск робота протягом наступних кількох років."
  bln_events.7.a:0 "Призначте йому більше писарів-дослідників та обладнання."
  bln_events.7.b:0 "Призначте йому кількох Лицарів з виробництва"

  bln_events.8.title:0 "Штурм Капітолію"
  bln_events.8.desc:0 "Супермутанти були витіснені з двору Алеї і тепер займають лише кілька опорних пунктів, а також будівлю Капітолію. Сара Лайонс та її загін очолили атаку, спочатку зачистивши територію від найманців Талону, а потім почавши зачищати будівлю від Мутантів. Всередині вони знайшли Бегемота, зазнавши важких втрат, перш ніж наші писарі змогли перепрограмувати сторожові турелі, щоб вони розпізнавали Мутантів як китайських повстанців. \n\nХоча будівля містила дуже мало брухту чи технологій, її захоплення виявиться життєво важливим для убезпечення решти Вашингтона. Не кажучи вже про важливість для наших Братів того, що вони забезпечили безпеку Капітолію Америки. Всередині наші писарі не знайшли нічого, що вказувало б на джерело появи Супермутантів. Наша, здавалося б, нескінченна боротьба з хвилею Мутантів ще далека від завершення, але тепер ми можемо бути спокійні, оскільки наше становище у Вашингтоні стало набагато надійнішим."
  bln_events.8.a:0 "Ad Victoriam!"

  bln_events.9.title:0 "Всьому є межа"
  bln_events.9.desc:0 "Генрі Касдін та багато інших вже роками обурювалися діями Лайонса, але його останні вчинки стали останньою краплею, що зламала спину браміну. Вночі Протектор Касдін зібрав своїх прихильників і стільки спорядження, скільки змогли забрати, та вирушив до Форту Індепенденс. Вони засудили Старійшину Лайонса як зрадника і відмовилися виконувати його місію, яку вважають витівкою, що суперечить усьому, за що виступає Братство. Природно, Старійшина Лайонс був розлючений цими новинами і наказав викреслити їх з Архівів Цитаделі, тавруючи їх як вигнанців."
  bln_events.9.a:0 "Ми чудово обійдемося без них"
  bln_events.9.b:0 "Усі Лайонси — дурні!"
  bln_events.9.c:0 "Погляньте, як летить Слокум Джо!"

  bln_events.10.title:0 "Самоушкодження Рейвен-Року!"
  bln_events.10.desc:0 "Після днів важких боїв, щоб тільки наблизитися до зовнішніх дверей, наші Лицарі нарешті відтіснили сили Анклаву настільки, що змогли підійти до зовнішніх дверей їхньої твердині в Рейвен-Році. Але щойно наші сили зробили перші кроки всередину комплексу, серія вибухів струсонула весь схил гори. Анклав активував механізм самознищення бази і поховав незліченні технологічні дива під незліченними тоннами каменю та уламків. Мине час, перш ніж ми зможемо розчистити частину цього і розпочати рятувальну операцію, але Анклав переможений."
  bln_events.10.a:0 "Принаймні поки що."

  bln_events.11.title:0 "Очі в небо"
  bln_events.11.desc:0 "Перед знищенням Рейвен-Року десятки вертольотів вилетіли зі своїх ангарів у різних напрямках. Тоді здавалося, що це щури тікають з потопаючого корабля, і що хоча загроза зіткнутися з одиноким загоном Залишків Анклаву залишатиметься деякий час, на цьому їхня небезпека закінчиться. Тепер, після вивчення звітів про бій, а також даних наших розвідників по всій Столичній Пустці, здається, що вертольоти в основному рухаються на Схід. Анклав перегруповується, і ця битва ще не закінчена."
  bln_events.11.a:0 "Ми повинні зберігати пильність"

  bln_events.12.title:0 "Їхній новий дім"
  bln_events.12.desc:0 "Після місяців пошуків ми нарешті знайшли місце, де перегруповувався Анклав, — авіабазу Адамс. Оборону довоєнної військової бази було посилено технологіями Анклаву та невідомою кількістю солдатів. Рано чи пізно вони прийдуть по нас, тому ми вже розробляємо плани атаки на базу."
  bln_events.12.a:0 "Готуйте Лицарів"

  bln_events.13.title:0 "Повторення Наварро"
  bln_events.13.desc:0 "Так само, як база Анклаву в Наварро впала під натиском сил Братства та НКР після знищення їхньої нафтової платформи, авіабаза Адамс впала перед нами після знищення Рейвен-Року. Керівництво Анклаву зазнало другого нищівного удару, від якого вони не зможуть оговтатися, а ті нечисленні солдати Анклаву, що залишилися на полі бою або змогли втекти на вертольотах, навряд чи зможуть становити тривалу загрозу для Братства. Ми нарешті можемо сказати, що з загрозою Анклаву покінчено назавжди. Хіба що в них була якась третя велика база, про яку ми не знали."
  bln_events.13.a:0 "Яка ймовірність цього?"

  bln_events.14.title:0 "Добрі друзі та сусіди"
  bln_events.14.desc:0 "Під час нашої боротьби за виживання багато наших сусідів у Столичній Пустці почули заклик і допомогли нам боротися з загрозою Анклаву. Тепер, коли пил осів, точаться розмови про продовження цієї співпраці. Звичайно, консерватори в нашому ордені, які й раніше з побоюванням ставилися до роботи зі сторонніми під час нашої боротьби з Анклавом, категорично проти цієї ідеї. Незалежно від цього, в ордені є багато тих, хто погоджується, що тривала співпраця може бути саме тим, що потрібно цій частині пустки."
  bln_events.14.a:0 "Ми сформуємо тривалий союз!"
  bln_events.14.b:0 "Кодекс забороняє це!"

  bln_events.15.title:0 "Альянс Лайонса"
  bln_events.15.desc:0 "Братство Сталі звернулося до нашого керівництва з пропозицією продовжити співпрацю. Ми станемо членами того, що багато хто називає «Альянсом Лайонса», і працюватимемо з іншими членами над спільною обороною. На папері це звучить як гарна ідея. Супермутанти, рейдери та інші лиходії пусток — це проблеми, з якими всім нам доводиться стикатися. Чому б нам не об'єднатися для боротьби з ними?"
  bln_events.15.a:0 "Ми разом ведемо добру боротьбу!"
  bln_events.15.b:0 "Тієї історії з Анклавом поки що достатньо"

  bln_events.16.title:0 "Наші заблукалі Брати"
  bln_events.16.desc:0 "Кілька років тому багато наших братів покинули нас, вважаючи, що ми дурні, відвернувшись від Західного Кодексу і борючись за людей цієї пустки. Це рана, яка ніколи повністю не загоїлася, і навіть зараз багато хто в нашому відділенні обурюється на цих втрачених братів за те, що вони відвернулися від нас. Але наша нещодавня перемога над Анклавом показала цінність наших ідеалів. Чи зможуть наші вигнані брати, які працюють у бункерах, не надто відмінних від тих, що на заході, побачити цю цінність? Чи варто нам взагалі намагатися їх переконати?"
  bln_events.16.a:0 "Спробуймо примиритися"
  bln_events.16.b:0 "Ми виправимо їх силою."

  bln_events.17.title:0 "Пропозиція Лайонса"
  bln_events.17.desc:0 "Дочка Овена з його смертю прийняла роль Старійшини в Братстві і робить те, чого він, швидше за все, ніколи б не зробив — звертається до Протектора Касдіна. Вона пропонує нам подолати наші розбіжності і спробувати знову працювати разом. Процес буде поступовим: ми збережемо свою автономію і просто погодимося допомагати одне одному в майбутніх конфліктах, якщо виникне така загроза, як Анклав. З часом ми могли б почати торгувати, обмінюватися технологіями і, можливо, навіть тренуватися разом, як колись. Хоча багато хто в нашому відділенні сумують за своїми братами, які пішли за цим дурнем Лайонсом у його хрестовий похід, і сподівалися, що такий день колись настане, не менше й тих, хто люто виступає проти будь-якої форми примирення, якщо тільки вони не відмовляться від своїх фантазій і не підуть за нашою істинною місією."
  bln_events.17.a:0 "Надішліть назад нашу згоду"
  bln_events.17.b:0 "Скажіть їм, що цього ніколи не станеться"

  bln_events.18.title:0 "Ті, хто залишився"
  bln_events.18.desc:0 "Пил осів у нашій сутичці з вигнанцями. Багато наших теперішніх і колишніх братів лежать мертвими, і багато хто задається питанням, чи воно того вартувало. Чутки кажуть, що Протектор Касдін утік на захід з багатьма своїми вірними послідовниками. Ті, хто вижив з вигнанців, здалися, прийнявши владу Старійшини Лайонса. Це темний день в історії Братства, але багато хто з полегшенням зітхає. Ціна була великою, але нарешті наші брати, які здатні мислити розумно, повернулися. Ті ж, хто не повернувся, або пішли, або скоро будуть поглинуті пісками пустки."
  bln_events.18.a:0 "Принаймні, це закінчилося"

  bln_events.19.title:0 "Вигнанці приймають наше прохання"
  bln_events.19.desc:0 "Наше прохання до Вигнанців про поступове примирення було прийнято. Незважаючи на те, що деякі члени нашого відділення мають свої застереження, загальний настрій у Цитаделі святковий. Старійшину Лайонса називають героєм за те, що він зробив те, що багато хто вважав неможливим, і розпочав шлях до мирного завершення цього розколу в нашому відділенні."
  bln_events.19.a:0 "Попереду довгий шлях"

  bln_events.20.title:0 "Вигнанці відхилили наше прохання"
  bln_events.20.desc:0 "Як багато хто в нашому відділенні й очікував, уперті вигнанці відмовилися прийняти нашу пропозицію про примирення. Вони радше будуть працювати у своїх бункерах, поклоняючись застарілому кодексу і зневажаючи місцевих жителів, ніж хоч на мить замисляться над цінністю ідеалів Лайонса. Навіть говорити не варто, що Старійшина Лайонс у люті від такого ляпаса. Схоже, єдиний спосіб змусити наших втрачених братів схаменутися — це сила."
  bln_events.20.a:0 "У них був шанс"

  bln_events.21.title:0 "Повернення фокусу"
  bln_events.21.desc:0 "Із завершенням загрози Анклаву настав час повернутися до полювання на супермутантів. Проблема не зникла під час нашої війни, і, схоже, вона тільки погіршилася."
  bln_events.21.a:0 "Це має закінчитися"

  bln_events.22.title:0 "Смерть Шепарда"
  bln_events.22.desc:0 "Супермутант на ім'я Шепард був пріоритетною ціллю з моменту перших повідомлень про те, що він організовує бродячі банди мутантів. Багато лицарів і кілька паладинів загинули, намагаючись убити це страховище, але безуспішно. На щастя, там, де вони зазнали невдачі, зброєносець Артур Мексон досяг успіху. Цей подвиг хоробрості призвів до того, що деякі закликають молодого нащадка нашого першого Старійшини взяти на себе кермо влади. Звісно, ці прохання були відхилені. Дитина виявляє великі надії в юності, але їй ще багато чого треба навчитися, перш ніж вона зможе піднятися на посаду Старійшини."
  bln_events.22.a:0 "Чудова робота, юний Мексон"

  bln_events.23.title:0 "Смерть Шепарда"
  bln_events.23.desc:0 "Супермутант на ім'я Шепард був пріоритетною ціллю з моменту перших повідомлень про те, що він організовує бродячі банди мутантів. Багато лицарів і кілька паладинів загинули, намагаючись убити це страховище, але безуспішно. На щастя, там, де вони зазнали невдачі, зброєносець Артур Мексон досяг успіху. Цей подвиг хоробрості призвів до того, що деякі закликають молодого нащадка нашого першого Старійшини взяти на себе кермо влади. Звісно, ці прохання були відхилені. Дитина виявляє великі надії в юності, але їй ще багато чого треба навчитися, перш ніж вона зможе піднятися на посаду Старійшини."
  bln_events.23.a:0 "Чудова робота, юний Мексон"

  bln_events.24.title:0 "Хрестовий похід завершено"
  bln_events.24.desc:0 "Після десятиліть кривавої боротьби лігво супермутантів знищено. Більше вони не будуть тягати мешканців пусток до Притулку 87, щоб перетворювати їх на жахливих виродків. Сьогодні Братство, і вся Столична Пустка в цілому, з полегшенням зітхають."
  bln_events.24.a:0 "Ad Victoriam!"

  bln_events.25.title:0 "Контакт!"
  bln_events.25.desc:0 "Наші розвідники, які шукали лігво Супермутантів, були зупинені під час пошуків, коли зіткнулися з великим загоном супермутантів і були змушені вступити в бій. Невідомо, чи означає це, що ми наближаємося до пошуку їхнього лігва, чи ця група просто полювала."
  bln_events.25.a:0 "Принаймні ми вбили кількох мутантів."

  bln_events.26.title:0 "Нічого"
  bln_events.26.desc:0 "Наші розвідники в пустці досі нічого не знайшли в пошуках лігва супермутантів. Не зупиняючись, вони готові знову вирушити туди з надією, що колись вони його знайдуть."
  bln_events.26.a:0 "Знову до роботи"

  bln_events.27.title:0 "МИ ЗНАЙШЛИ ЙОГО!"
  bln_events.27.desc:0 "Розвідники в західній частині Столичної Пустки відстежили велику кількість активності мутантів і змогли прослідкувати за групою мутантів, які вели бранця до високорадіоактивної зони поблизу місця, де, згідно із записами Волт-Тек, знаходиться Притулок 87. З огляду на історію Волт-Тек, яка проводила жахливі експерименти у своїх притулках, цілком імовірно, що це може бути джерелом супермутантів. Єдина проблема полягає в тому, що ми не маємо способу подолати смертельну радіацію, що оточує притулок. Нашим наступним кроком буде пошук шляху всередину."
  bln_events.27.a:0 "Це майже закінчилося"

  bln_events.28.title:0 "Лайонеса"
  bln_events.28.desc:0 "Сара Лайонс пішла стопами свого батька, служачи одним із найкращих солдатів, яких могло запропонувати Братство. З роками вона відточувала свої бойові та лідерські навички, ведучи Прайд Лайонса в незліченних місіях углиб руїн Вашингтона, що кишать супермутантами. Тепер, після смерті Овена Лайонса, його дочка знову вступає в його роль, але з вибором, який потрібно зробити. Чи продовжить вона керувати Відділенням Лайонса з поля бою, вирушаючи з Прайдом у саму гущу небезпеки, як і інші Лицарі та Паладини під її командуванням? Чи вчинить вона, як її батько, відкладе лазерну гвинтівку і займеться важливими справами управління Братством з безпеки Цитаделі?"
  bln_events.28.a:0 "Старійшина повинен бути на передовій!"
  bln_events.28.b:0 "Старійшина повинен бути вдома"

  bln_events.29.title:0 "Трагедія спіткала Братство"
  bln_events.29.desc:0 "Старійшина Лайонс ніколи не була з тих, хто тихо відходить у ніч, і це виявилося на зруйнованих вулицях Фолс-Черч, де вона і більшість Прайду зустріли свій кінець. Те, що починалося як звичайне патрулювання, перетворилося на криваву баню, коли Прайд зіткнувся з величезними силами Супермутантів, яких супроводжували два бегемоти. Будучи погано озброєними та значно поступаючись у чисельності, Прайд вистояв і знищив сили мутантів, але зазнав важких втрат. Ті, хто вижив, подбали про те, щоб тіла та жетони були зібрані, і буде проведено церемонію вшанування їхньої жертви. Тепер погляди Братства звернені до наступного старійшини."
  bln_events.29.a:0 "Їх забрали надто рано"

  bln_events.30.title:0 "Загін «Артеміда» зникає"
  bln_events.30.desc:0 "Загін Паладина Брендіса був відправлений до Співдружності місяць тому, але невдовзі після прибуття на кордони Співдружності ми втратили зв'язок. Вважається, що вони зустріли свій кінець десь у тій пустці, але це ще не кінець нашої зацікавленості в Співдружності. Братство не було б там, де воно є сьогодні, якби ми відмовилися від операції через її небезпеку. План для іншого загону вирушити туди вже розробляється. Хто знає, можливо, вони навіть дізнаються, що сталося з загоном «Артеміда»." 
  bln_events.30.a:0 "Сподіваймося, у них просто зламалося радіо"

  bln_events.31.title:0 "Наш загиблий Брат"
  bln_events.31.desc:0 "Коли бої в Пітті вщухли, наші брати оточили довоєнний хмарочос, у якому жили Ашур та його лейтенанти. Під час планування штурму вежі Ашур відправив гінця, який обіцяв здачу, але з однією умовою. Майже всі в цьому районі знають, що Пітт є домом для унікальної суміші радіації та промислових забруднювачів, які спричиняють хворобу під назвою Дегенеративна Контагіозна Троглодитія (ДКТ) у людей, які занадто довго піддаються впливу повітря регіону. У легких випадках це призводить до болючих уражень, які можуть зникнути з часом після припинення впливу забруднювачів. Хоча це відносно легко для післявоєнних хвороб, справжня небезпека ДКТ спостерігається приблизно у 20% інфікованих. Ці люди, які страждають від більш серйозних наслідків, відчувають сильну деградацію розуму, стаючи бездумно жорстокими «дикарями», яких бачать у руїнах. У міру того, як інфіковані продовжують піддаватися впливу, вони втрачають ще більше розуму і фізично перетворюються на огидних монстрів, які ледь нагадують людей, якими вони колись були. Цих трогів можна побачити всюди в Пітті, і для багатьох там це просто прийнято, що вони або хтось із їхніх близьких стане одним із них. Що цікаво, наш заблукалий брат Ашур стверджує, що його дочка має унікальні гени, які роблять її несприйнятливою до ДКТ, а також загалом стійкою до мутацій. За словами Ашура, його дружина вивчала їхню дочку і досягла успіхів у створенні вакцини. Самопроголошений володар работорговців наполягає на тому, що його зусилля були спрямовані на розробку цього ліків та відбудову міста, і що ми повинні працювати з ним та його дружиною, щоб завершити ці ліки, щоб Пітт нарешті міг стати місцем, яке може процвітати. Як нам відповісти?" 
  bln_events.31.a:0 "Погодитися на прохання Ашура"
  bln_events.31.b:0 "Ми не ведемо переговорів з рейдерами"

  bln_events.32.title:0 "Загін «Гладіус» зникає"
  bln_events.32.desc:0 "Загін Паладина Данса, відправлений до Співдружності, також затих. Один загін, який зникає, трапляється, але два поспіль викликають занепокоєння. Що ж може відбуватися там, у Співдружності?" 
  bln_events.32.a:0 "Можливо, нам варто колись зазирнути туди"

  bln_events.33.title:0 "Експедиція повертається"
  bln_events.33.desc:0 "Наша експедиція до земель ученого з пусток, відомого як Лоренц, пройшла гірше, ніж ми очікували. Виявилося, що чутки про зброю на основі магнітів не тільки правдиві, але й, здається, їхня група спеціалізується на такій зброї. Поставивши надто багато запитань, загін, який ми відправили в цей район, потрапив у засідку і зазнав втрат, перш ніж зміг відкрити вогонь у відповідь і втекти. Однак вони привезли нам сувенір." 
  bln_events.33.a:0 "Такій зброї не можна довіряти в їхніх руках"

  bln_events.34.title:0 "Експедиція повертається"
  bln_events.34.desc:0 "Наша вилазка на холодну північ, здається, породила більше запитань, ніж відповідей. Хоча люди цієї землі не є відверто ворожими до чужинців, вони підозрілі, і на багато запитань загону не було отримано прямих відповідей. Також є суперечлива інформація про щось, зване В.А.Ш.И.Н.Г.Т.О.Н, яку загін не зміг визначити, чи то лідер, божество чи якась машина, яку люди шанують. Найбільш тривожним відкриттям експедиції, однак, було обладнання, яке вони змогли виміняти за велику ціну. Чутки вже ширяться Цитаделлю, багато хто хоче відправити більше експедицій, щоб переконатися у відсутності присутності Анклаву в регіоні." 
  bln_events.34.a:0 "Ми повинні бути впевнені"

  bln_events.35.title:0 "Експедиція повертається"
  bln_events.35.desc:0 "Оповіді про цей культ на Сході як про ворожий були применшенням. Озброєні групи бродять їхньою територією, намагаючись захопити або вбити будь-кого, кого не можна ідентифікувати як одного з їхніх людей. На щастя, наш загін зміг уникнути виявлення і навіть зміг влаштувати засідку на конвой, який перевозив дуже цікаве обладнання. Якщо там є ще більше, ці Рокісти мають цінний склад."
  bln_events.35.a:0 "Склад, який ми не можемо їм залишити"

  bln_events.36.title:0 "Експедиція повертається"
  bln_events.36.desc:0 "Після багатьох тижнів наш загін, відправлений до руїн довоєнного Бостона, повернувся з численними ящиками довоєнних артефактів та документів. Хоча вони не знайшли жодних доказів існування цього таємничого «Інституту», окрім чуток від торговців, вони підтвердили, що розробка Т-51 та Товстуна відбувалася на військових базах у регіоні. Також були документи, що деталізували кілька інших багатообіцяючих напрямків щодо довоєнних технологій. Нам слід відправити більше експедицій, щоб продовжити ці пошуки."
  bln_events.36.a:0 "З часом"

  bln_events.37.title:0 "Аппалацька експедиція"
  bln_events.37.desc:0 "Розвідувальний загін, відправлений для дослідження Аппалачів, не відповідав на наші радіоповідомлення протягом кількох тижнів. Востаннє вони виходили на зв'язок, коли саме збиралися увійти в регіон, і не зустріли особливих труднощів у своїй подорожі. Ми можемо лише гадати, що з ними сталося."
  bln_events.37.a:0 "Колись ми дізнаємося"

  bln_events.38.title:0 "Експедиція повертається"
  bln_events.38.desc:0 "Експедиція, яку ми відправили до Пітта, повернулася з тривожними новинами. Майже всі чутки про події в регіоні після нашого останнього візиту виявилися правдою. Ашур вижив і збирає армію рейдерів з невідомою метою. Рейдер, якого розвідувальна група змогла захопити, сказав, що він намагається побудувати державу за допомогою промисловості і що вони імпортують як рабів, так і робочу силу з усієї пустки."
  bln_events.38.a:0 "Ми не можемо дозволити цьому тривати"

  bln_events.39.title:0 "Експедиція повертається"
  bln_events.39.desc:0 "Загін, відправлений до Нью-Йорка, підтвердив наші припущення. Так само, як Вашингтон чи Піттсбург до нашої присутності, Нью-Йорк є беззаконною пусткою, за яку борються різні банди. Найсильніша з них, здається, очолюється людиною, яка проголосила себе «Герцогом Нью-Йорка». Ті нечисленні об'єкти в цьому районі, які не були знищені бомбами, або були розграбовані цими бандами, або не будуть ними відкриті принаймні ще кілька десятиліть." 
  bln_events.39.a:0 "Не варте нашого часу"

  bln_events.40.title:0 "«Придвен»"
  bln_events.40.desc:0 "З нашими недавніми проблемами, що залишилися позаду, наші писарі почали дивитися в майбутнє. Деякі з них зібралися разом і почали обговорювати проєктування могутнього дирижабля, порівняно з яким ті, що наші Середньозахідні Брати вивезли на Схід, здадуться дитячою кулькою. На проєктування та будівництво підуть довгі роки, не кажучи вже про величезні витрати ресурсів. Але якщо вони зможуть реалізувати хоча б половину з того, на що, за їхніми словами, здатна ця штука, ми зможемо виконувати нашу місію як ніколи раніше." 
  bln_events.40.a:0 "Ми побудуємо його"

  bln_events.41.title:0 "Обмежені ресурси"
  bln_events.41.desc:0 "Навіть найконсервативніша оцінка ресурсів, необхідних для будівництва «Придвена», становить понад 40 000 тонн матеріалів. Це було б однією справою, якби нам був потрібен лише металобрухт, але значна частина корабля буде складатися зі спеціальних сплавів і складних електричних компонентів. Хоча авіабаза Адамс має достатню кількість спеціалізованих авіаційних компонентів, які можна було б переробити для нашого використання, у цьому списку все ще багато того, що потрібно знайти." 
  bln_events.41.a:0 "Збираємо, що можемо, купуємо, що мусимо"

  bln_events.42.title:0 "Будівництво Титана"
  bln_events.42.desc:0 "Будівництво такого масивного дирижабля є неабияким завданням. Один-два болти не на тому місці можуть зробити весь корабель у кращому випадку непридатним для польоту, а в гіршому — смертельною пасткою. Кожен крок цього будівельного процесу потрібно перевіряти, перевіряти двічі, а кроків дуже багато. Ми не зможемо мати більше, ніж мінімальну команду писарів, які працюють над чимось іншим, протягом деякого часу." 
  bln_events.42.a:0 "Може, перевірити тричі?"

  bln_events.43.title:0 "Літаюча Цитадель"
  bln_events.43.desc:0 "Після понад 6 років роботи «Придвен» нарешті піднявся в повітря. Проводяться остаточні перевірки, і обладнання завантажується на корабель. Величезний корабель видно за милі, і він дає зрозуміти людям пустки, що Братство тут і що ми маємо силу досягти наших цілей." 
  bln_events.43.a:0 "Хто тепер виступить проти нас?"

  bln_events.44.title:0 "ОСТАТОЧНИЙ проєкт v7"
  bln_events.44.desc:0 "Після більш ніж двох років обговорень наші писарі нарешті завершили проєкт «Придвена». Файл під назвою «ОСТАТОЧНИЙ проєкт v7» було доставлено головному писареві Ротшильду та підписано. Разом із проєктами був величезний список обладнання та ресурсів, які знадобляться для його будівництва." 
  bln_events.44.a:0 "Скільки це приблизно?"

  bln_events.45.title:0 "Гора вторсировини"
  bln_events.45.desc:0 "Це зайняло понад 2 роки, але остання інвентаризація писарів показує, що ми маємо всі ресурси, необхідні для будівництва «Придвена». Понад 40 000 тонн металу, сплавів і передових компонентів зберігаються на авіабазі Адамс під посиленою охороною. Звичайно, частина цього буде пошкоджена або втрачена під час будівництва, і її потрібно буде замінити, але це можна буде робити в процесі будівництва." 
  bln_events.45.a:0 "Тепер нам просто потрібно його побудувати"

  bln_events.46.title:0 "Перемога на проєкті «Чистота»"
  bln_events.46.desc:0 "Завдяки Ліберті Прайму та Прайду ми змогли витіснити Анклав з проєкту «Чистота». Їхні нечисленні солдати, які не загинули від лазерних очей Прайма, були помічені втікаючими на північ. Хоча це чудовий день, і у нас є багато цінного обладнання для наших писарів, ми повинні пам'ятати, що зрештою вони повернуться з більшими силами."
  bln_events.46.a:0 "Це ще не кінець"

  bln_events.47.title:0 "Поразка на проєкті «Чистота»"
  bln_events.47.desc:0 "Незважаючи на допомогу Ліберті Прайма, ми не змогли витіснити Анклав з проєкту «Чистота». Їхні солдати не переслідували тих, хто вижив, коли ми відступали, але ми бачимо, як вони сидять там, через затоку. Вони збирають більше людей і зміцнюють оборону. Зрештою вони прийдуть по нас."
  bln_events.47.a:0 "Ми повинні готуватися"

  bln_events.48.title:0 "Поразка на проєкті «Чистота»"
  bln_events.48.desc:0 "Ці терористи, які окупували Пентагон, витіснили наших солдатів з проєкту «Чистота». Повідомляється, що в своїй атаці вони використали гігантського довоєнного робота, відомого як Ліберті Прайм. Нахабність цих покидьків використовувати одну з найбільших зброй довоєнної Америки для нападу на нас — це те, що ми не можемо залишити без відповіді. Як тільки ми перегрупуємося, ми повинні будемо їм відплатити."
  bln_events.48.a:0 "Ми тільки починаємо"

  bln_events.49.title:0 "Перемога на проєкті «Чистота»"
  bln_events.49.desc:0 "Братство Сталі здійснило жалюгідну спробу витіснити нас з проєкту «Чистота». Звичайно, ці воєнізовані сквотери були погано оснащені, щоб протистояти могутності Уряду США, і були відправлені назад на свою базу, підібгавши хвости. Ця атака нагадала нам, що мешканці пусток не поставляться прихильно до нашої присутності, і нам потрібно зміцнити оборону, перш ніж переслідувати цих сквотерів."
  bln_events.49.a:0 "Все свого часу"

  bln_events.50.title:0 "Чи це наша війна?"
  bln_events.50.desc:0 "Усі в пустці знають, що Братство Сталі нещодавно зіткнулося з Анклавом на проєкті «Чистота». Тепер, коли пил осідає, Братство готується до повномасштабної війни з цими людьми, і вони закликають нас виступити разом з ними. Хоча Братство стверджує, що це для нашої ж користі, і що Анклав зрештою все одно прийде по нас, деякі сумніваються, чи справді це наша війна."
  bln_events.50.a:0 "Ми виступимо разом з Братством"
  bln_events.50.b:0 "Ми не будемо вмирати за війну Братства"

  bln_events.51.title:0 "В Енергосистеми Олні"
  bln_events.51.desc:0 "Енергосистеми Олні майже не чіпали з часів Великої війни, і не без причини. Між автоматичними турелями та роботами туди вже було досить важко потрапити, а потім ще й кігті смерті з'явилися. Наш загін, відправлений за довоєнною котушкою Тесли, зазнав втрат, але все ж досяг успіху. Паладин Трістан повернувся з котушкою і передав її нашим писарям. З деякою вдачею вони зможуть використати це для розробки контрзаходів проти вертольотів Анклаву."
  bln_events.51.a:0 "Хід війни змінюється"

  bln_events.52.title:0 "Захист поселень"
  bln_events.52.desc:0 "Захист поселень Столичної Пустки — це більше, ніж просто альтруїстична справа. Ця відносно безпечна служба забезпечує хорошу практичну підготовку для неофітів, залучаючи новобранців, і ми можемо розраховувати на компенсацію за надану допомогу. Готуючись відправити нову партію неофітів та молодших лицарів на це завдання, ми повинні вирішити, що попросимо натомість."
  bln_events.52.a:0 "Нехай надішлють нам більше охочих новобранців"
  bln_events.52.b:0 "Кришки — це король"
  bln_events.52.c:0 "Надішліть нам технології"
  bln_events.52.d:0 "Твої збирачі знайшли вантажівку чого?!?"

  bln_events.53.title:0 "Працівники Пустки"
  bln_events.53.desc:0 "Нам вдалося найняти значну робочу силу з чорноробів, щоб допомогти з великим будівельним проєктом. Єдина проблема — писарі все ще сперечаються про те, що саме ми повинні їм побудувати."
  bln_events.53.a:0 "Розчистити будівлю, щоб зробити більше майстерень"
  bln_events.53.b:0 "Відновити кілька довоєнних генераторів"
  bln_events.53.c:0 "Горни для переплавлення всього цього брухту"
  bln_events.53.d:0 "Розчистити деякі будівлі для майстерень"
  bln_events.53.e:0 "Відновити низку довоєнних генераторів"
  bln_events.53.f:0 "Більше горен для Братства"

  bln_events.54.title:0 "Західне будівництво"
  bln_events.54.desc:0 "Кілька інженерів і робітників були відправлені із заходу з останнім конвоєм, щоб допомогти нам використовувати територію навколо Цитаделі. На що нам їх направити?"
  bln_events.54.a:0 "Розчистити будівлю для збройових майстерень"
  bln_events.54.b:0 "Відновити кілька довоєнних генераторів"
  bln_events.54.c:0 "Майстерні для відновлення старих схем"
  bln_events.54.d:0 "Розчистити деякі будівлі для збройових майстерень"
  bln_events.54.e:0 "Відновити низку довоєнних генераторів"
  bln_events.54.f:0 "Майстерня з переробки матеріалів"

  bln_events.55.title:0 "Нові Лицарі з Пусток"
  bln_events.55.desc:0 "Сьогодні ми вшановуємо першу партію нових неофітів, які отримали звання Лицарів. Ці брати показали себе міцними бійцями, гідними своєї ролі в захисті Братства. Це був важкий час відтоді, як ми втратили наших братів-вигнанців, але сьогодні ми відзначаємо початок нової ери в нашому відділенні. Ми подолаємо цю боротьбу і одного разу досягнемо нашої мети — знищити Супермутантів зі Столичної Пустки."
  bln_events.55.a:0 "Вітаю, Лицарі"
  bln_events.55.b:0 "Вітаю, Лицарі"

  bln_events.56.title:0 "Будівля GNR"
  bln_events.56.desc:0 "Стара радіостанція «Новини Галактики» досить добре збереглася за ці роки, як і її радіопередавач. Це місце, яке наше відділення мало певний інтерес зайняти, коли ми вирішимо інші питання, але коли наші солдати прибули туди, вони зустріли цивільних, які займали будівлю і готувалися вийти в прямий ефір з радіопередачею. За словами їхнього лідера, людини на ім'я Трипес, вони хотіли використовувати станцію як базу, щоб давати Столичній Пустці останні новини та 200-річні мелодії. Він сказав, що радий, що ми зайшли, тому що охоронці, які в нього є, здаються не такими здатними захищати це місце від Супермутантів, як вони спочатку думали. Трипес запропонував робоче партнерство, де ми охороняємо це місце і допомагаємо з необхідним ремонтом. З нашого боку ми отримаємо стратегічне розташування в руїнах Вашингтона для використання як форпост, а Трипес подбає про те, щоб Столична Пустка почула про нашу боротьбу від його імені."
  bln_events.56.a:0 "Ми допоможемо Трипесу в його добрій боротьбі"
  bln_events.56.b:0 "Нам потрібне це місце для себе"

  bln_events.57.title:0 "Книги, книги і ще раз книги"
  bln_events.57.desc:0 "Після зачистки будівлі від рейдерів наші писарі змогли оцінити стан Бібліотеки Конгресу. Хоча зовнішня конструкція все ще стоїть, багато книг у Бібліотеці Конгресу розпалися або були зіпсовані через нечитацьке використання. На щастя, наші писарі знайшли креслення, які показують, що під будівлею знаходиться довоєнна військова база даних. На жаль, через поспіх вони активували автоматичні заходи безпеки. Тепер база даних охороняється шарами автоматичних турелей безпеки та роботів-охоронців. Якщо ми не діятимемо швидко, дані будуть стерті як останній захід безпеки. Зазвичай пробиватися через цю охорону було б просто черговим днем у житті Лицаря Братства, але вони також отримали сигнал лиха від поселення за кілька днів звідси, яке зазнає нападу супермутантів. Якщо вони не вирушать зараз, поселення буде знищено."
  bln_events.57.a:0 "Дані важливіші!"
  bln_events.57.b:0 "Життя під загрозою!"
  bln_events.57.c:0 "Залишайтеся з даними і відправте найманців на допомогу поселенню!"

  bln_events.58.title:0 "Форт Індепенденс"
  bln_events.58.desc:0 "Стара військова установа Форт Індепенденс багато разів переходила з рук в руки за ці роки. Різні збирачі, групи рейдерів і навіть колись гніздо радіоскорпіонів займали базу. Наші Лицарі загалом уникали цього місця, оскільки там ніколи не було значної присутності супермутантів, і, наскільки ми знали, найглибші рівні були захищені дуже надійними дверима. Ми щойно отримали звістку, що старійшини на Заході хочуть, щоб ми відправили загін Лицарів і Паладинів зайняти базу і з'ясувати, які секрети ховаються всередині. Це відволіче цінних чоловіків і жінок від боротьби з супермутантами, але, здається, це дуже важливо для старійшин."
  bln_events.58.a:0 "Хрестовий похід на супермутантів важливіший!"
  bln_events.58.b:0 "Відправити кількох людей до форту"

  bln_events.59.title:0 "Остаточний компроміс. Частина 1"
  bln_events.59.desc:0 "Не секрет, що Паладин Касдін та багато інших незадоволені змінами в місії та операціях Відділення Лайонса в останні роки. Часті дебати щодо необхідності знищення супермутантів проникають у повсякденні розмови, неофіти з пусток часто викликають глузування у західних лицарів, і було чимало випадків непокори, коли накази згори суперечили Кодексу. Тим не менш, Старійшина Лайонс вірить, що ці консерватори можуть схаменутися, якщо зробити кілька поступок. Саме тому він викликав Паладина Касдіна на зустріч з ним, щоб обговорити способи, якими вони нарешті можуть досягти остаточного порозуміння, яке усуне ці проблеми. Перше, що вони мають обговорити, — це, природно, те, з чим багато консерваторів не згодні, — допомога Братства мешканцям пусток."
  bln_events.59.a:0 "Ці люди потребують нас!"
  bln_events.59.b:0 "Переконати Касдіна, що це вигідно ордену"
  bln_events.59.c:0 "Ми можемо дещо зменшити оберти."
  bln_events.59.d:0 "Коли ми це робили?"

  bln_events.60.title:0 "Остаточний компроміс. Частина 2"
  bln_events.60.desc:0 "Звісно, наступний пункт для обговорення — це вербування з пусток і торгівля. Хоча в минулому Братство дозволяло це за дуже рідкісних і виняткових обставин, Касдін та інші західні фанатики вважають, що Старійшина Лайонс робить це занадто часто. На їхню думку, занадто багато з цих новобранців з пусток навіть не варті низькоякісної броні, яку видають неофітам, а торгівля зі сторонніми призводить лише до проблем. Якщо в мешканця пустки є технологія, якої він не повинен мати, Братство має просто забрати її, а не намагатися домовитися з ним і прийняти «ні» як відповідь."
  bln_events.60.a:0 "Нам потрібен кожен чоловік, жінка і ресурс, які ми можемо отримати!"
  bln_events.60.b:0 "Переконати Касдіна, що переваги переважують недоліки в цьому питанні"
  bln_events.60.c:0 "Хіба ми вже не забираємо те, що хочемо?"

  bln_events.61.title:0 "Остаточний компроміс. Частина 3"
  bln_events.61.desc:0 "Тепер настала найважча частина дискусії, частина, якої Старійшина боявся, — обговорення Місії Відділення. З самого початку Паладин Касдін був цілковито проти цього хрестового походу проти Супермутантів. Так, Братство допомогло зупинити Армію Майстра на заході, але це була серйозна загроза для всього людства. Усі поточні ознаки свідчать про те, що ці мутанти є регіональною загрозою, яка не повинна відволікати Братство від його головної місії. Забезпечення цінних технологій для збереження прогресу людства та запобігання їх потраплянню в чужі руки є важливішим за долю кількох віддалених поселень пустки."
  bln_events.61.a:0 "Ми не можемо покинути цих людей!"
  bln_events.61.b:0 "Переконати Касдіна в загрозі супермутантів"
  bln_events.61.c:0 "Можливо, нам доведеться відмовитися від цієї справи..."

  bln_events.62.title:0 "Рішення Касдіна"
  bln_events.62.desc.1:0 "Старійшина Лайонс і Паладин Касдін годинами сперечалися, вели переговори, а іноді просто кричали одне на одного. Але після того, що здавалося вічністю, усе, що треба було сказати, нарешті було сказано. Здається, ніщо з того, що міг сказати Старійшина, не могло переконати Паладина в тому, що він все ще відданий істинній меті Братства. Після зустрічі Паладин Касдін поговорив з тими, хто все ще був стійкими прихильниками Західного узбережжя Братства, і вони зібралися і вирушили до Форту Індепенденс. Старійшина був у люті і наказав викреслити їхні імена з архівів відділення. Ці вигнанці обрали свою долю, і вони більше не наші брати. Ті нечисленні вірні Брати, які ще залишалися в районі Форту Індепенденс та південних руїн Вашингтона, були відкликані назад, щоб залатати діри в обороні Цитаделі. Навіть зараз опортуністичні збирачі стікаються в регіони, які ми покинули."
  bln_events.62.desc.2:0 "Старійшина Лайонс і Паладин Касдін годинами сперечалися, вели переговори, а іноді просто кричали одне на одного. Але після того, що здавалося вічністю, усе, що треба було сказати, нарешті було сказано. Знадобилося багато переконувань і кілька твердих обіцянок, але Паладин Касдін нарешті переконався, що Старійшина Лайонс все ще відданий істинній місії Братства. Після зустрічі Паладин пішов поговорити з тими, хто роздумував про відхід, і переконав їх також. Розкол нашого відділення, якого багато хто боявся, закінчився кількома кивками та бурмотінням згоди. Що б не сталося далі, наше Братство буде єдиним, щоб зустріти це."
  bln_events.62.a:0 "Розкол загоєно, перш ніж він встиг розростися"
  bln_events.62.b:0 "Ми відновимося без них"
  bln_events.62.c:0 "Усі Лайонси — справжні зрадники!"

  bln_events.63.title:0 "Що було вкрадено"
  bln_events.63.desc:0 "Коли Касдін вирушив зі своїми вигнанцями, вони подбали про те, щоб пограбувати все, що змогли, перед цим. Ми не тільки втрачаємо значну кількість робочої сили, але й втратили значний склад зброї, силової броні та інших припасів, які були нам потрібні."
  bln_events.63.a:0 "Віроломні злодії!"

  bln_events.64.title:0 "Брат проти Брата"
  bln_events.64.desc:0 "Навіть у найтемніші часи, коли покійний Старійшина Оуен Лайонс ледве тримав наше відділення разом, ми ніколи не думали, що це станеться. У відповідь на новий «Східний Кодекс» Старійшини Сари Лайонс, консервативні члени нашого ордену, які залишилися з нами навіть під час війни з Анклавом, повернули свої гвинтівки проти своїх братів у відділенні. Ми зараз у самому розпалі Громадянської війни, яка закінчиться лише одним із двох способів: або Старійшина Лайонс, або Паладин Касдін повинні померти."
  bln_events.64.a:0 "Смерть зраднику Паладину!"
  bln_events.64.b:0 "Касдін має рацію! Досить — значить досить!"

  bln_events.65.title:0 "Несправедливе вигнання"
  bln_events.65.desc:0 "Писар Бігслі не зробив нічого поганого, щоб заслужити це переведення на проєкт «Чистота». Його переведення було просто результатом кількох нещасних випадків і розбіжностей, які, очевидно, не допускаються в Братстві. Колишній писар Ордену Меча, Бігслі був переведений в Орден Щита після того, як кілька лазерних гвинтівок, які він модифікував, поранили пару неофітів, які не змогли впоратися з додатковою потужністю. Потім він був переведений в Орден Пера після того, як сказав Писарю Боудічу, що деякі з його теорій про розробку броні застаріли. Хіба Братство не повинно завжди прагнути до кращої броні, а не застрягати в минулому? Що стосується його часу в Ордені Пера та його сварки з Писарем Джеймсон, то це надто довга історія, щоб її переказувати. Важливо те, що він мав рацію, і за цей злочин він тепер няньчиться з купкою вчених з Рівет-Сіті та молодших писарів, які ледь можуть переформатувати голострічку. Знадобилися тижні важкої роботи, щоб навіть запустити очищувач на повну потужність після битви, і Бігслі за цей час майже не спав. Якщо цього було недостатньо, робота насправді тільки почалася."
  bln_events.65.a:0 "Така марна трата талановитого розуму"

  bln_events.66.title:0 "Напади бандитів"
  bln_events.66.desc:0 "Ніби мати справу з неосвіченими вченими з Рівет-Сіті було недостатньо погано, Писар Бігслі повинен працювати зі Службою безпеки Рівет-Сіті над організацією водних караванів. Цей офіцер Лепельтьє не може впоратися навіть з кількома рейдерами, які знищують каравани. Бігслі зрештою довелося найняти найманця, щоб розслідувати рейдерів, і вони проникли в групу. Найманець щойно повідомив, що група рейдерів організована хлопцем на ім'я Роздвоєний Джек, який хоче вибити зі Служби безпеки Рівет-Сіті гроші за захист, щоб не нападати на каравани. Це залишає Бігслі з двома варіантами. Чи варто йому підіграти і заплатити рейдерам, чи варто йому відправити загін Лицарів, щоб знищити їх?"
  bln_events.66.a:0 "Досить наших хлопців гине за цю воду"
  bln_events.66.b:0 "Жодних угод з рейдерами. Убити їх усіх"

  bln_events.67.title:0 "Неприємності в Мегатонні"
  bln_events.67.desc:0 "Ми отримуємо повідомлення та скарги на те, що наша вода незрозумілим чином спричиняє смерті в Мегатонні, і що більша частина води навіть не доходить до Мегатонни. Наші солдати, однак, підтвердили, що вантажі доходять до Мегатонни, і та невелика кількість води, яку вони отримують, здається, підтверджує це. Питання залишається: що відбувається з рештою води? І чому вона вбиває людей?\n\nНічого не залишається, окрім як відправити патруль, щоб струснути дерево і подивитися, що з нього впаде."
  bln_events.67.a:0 "Що тут відбувається?"

  bln_events.68.title:0 "Дивовижна лікувальна вода"
  bln_events.68.desc:0 "Гуль на ім'я Гріффін звернувся до Писаря Бігслі з пропозицією купити очищену воду, щоб продати її гулям у Підземному Світі. Бігслі не знає, навіщо якимось гулям чиста вода, якщо вона нічого їм не дасть, але зомбі платить, то чому б і ні?"
  bln_events.68.a:0 "Прийняти оплату кришками"
  bln_events.68.b:0 "Прийняти оплату технологіями"
  bln_events.68.c:0 "Прогнати зомбі"

  bln_events.69.title:0 "Напади бандитів припинилися"
  bln_events.69.desc:0 "Після певних зусиль і безлічі пострілів нам вдалося знищити найгірших із бандитів. У наших караванів і так достатньо загроз, нам не потрібно мати справу ще й з бандитами. Знищивши джерело бандитів у корені, ми можемо гарантувати, що будь-хто, хто спробує зайняти їхнє місце, зустріне жорсткий опір з боку наших солдатів і мінімальну підтримку навіть серед рейдерів. Наші каравани тепер мають бути більш ніж достатньо безпечними, щоб доставляти воду."
  bln_events.69.a:0 "Чудові новини!"

  bln_events.70.title:0 "Вода, скрізь вода"
  bln_events.70.desc:0 "Проєкт «Чистота» досі добре служив нам як база, але якщо ми дійсно хочемо доставляти воду в пустку, нам варто розглянути інші варіанти. У пустці є багато місць, які могли б добре послужити «розподільчими центрами», куди ми відправлятимемо воду, перш ніж відправити її далі в пустку, щоб організувати наші каравани та використовувати місцеві послуги. Звичайно, на маршруті до розподільчого центру існує загроза нападу, але з деякою додатковою безпекою ми можемо принаймні зменшити ризики та отримати вигоду.\n\nЗрештою, це залишає одне важливе питання:"
  bln_events.70.a:0 "З чого ми почнемо?"

  bln_events.71.title:0 "Битва за проєкт «Чистота»"
  bln_events.71.desc.1:0 "Анклав захопив проєкт «Чистота» і запускає очищувач. Ми не можемо знати, що вони мають намір робити з таким важливим інструментом, але це не може бути добре. Сара Лайонс переконала Старійшину розпочати негайну атаку на очищувач, і ми не можемо дозволити собі стримуватися. Ми запустимо Ліберті Прайма для допомоги в атаці."
  bln_events.71.desc.2:0 "Анклав захопив проєкт «Чистота» і запускає очищувач. Ми не можемо знати, що вони мають намір робити з таким важливим інструментом, але це не може бути добре. Сара Лайонс переконала Старійшину розпочати негайну атаку на очищувач, і ми не можемо дозволити собі стримуватися. Ми запустимо Ліберті Прайма для допомоги в атаці, навіть якщо ми ще не вирішили всіх проблем з його енергосистемою."
  bln_events.71.a:0 "Атакуймо негайно!"
  bln_events.71.b:0 "Відкласти атаку і переконатися, що Ліберті Прайм працює!"

  bln_events.72.title:0 "Заряджений і готовий"
  bln_events.72.desc:0 "Ліберті Прайм працює і в цю мить крокує геть від Цитаделі. З деякою вдачею його системи наведення не будуть збоїти, і він буде на передньому краї штурму. Якщо ні, ця важка битва може виявитися неможливою."
  bln_events.72.a:0 "За Братство!"

  bln_events.73.title:0 "Рівет-Сіті, відкритий для бізнесу"
  bln_events.73.desc:0 "Рівет-Сіті, зближуючись із Братством, тепер дозволило нашим писарям і лицарям доступ до нього, щоб використовувати як центр для розподілу води з проєкту «Чистота». Хоча ми можемо продовжувати працювати, як зараз, безсумнівно, було б корисно мати Сили безпеки Рівет-Сіті, які підтримують патрулювання наших караванів."
  bln_events.73.a:0 "З такими друзями..."

  bln_events.74.title:0 "Водні витівки Мегатонни"
  bln_events.74.desc:0 "Мегатонна, зближуючись із Братством, тепер дозволило нашим писарям і лицарям доступ до неї, щоб використовувати як центр для розподілу води з проєкту «Чистота». Хоча ми можемо продовжувати працювати, як зараз, безсумнівно, було б корисно мати додаткову підтримку збирачів та громадян Мегатонни."
  bln_events.74.a:0 "З такими друзями..."

  bln_events.75.title:0 "Смуток святої води"
  bln_events.75.desc:0 "Наше розслідування поставок води до Мегатонни дало результати! Виявляється, наші каравани, які доставляють воду до Мегатонни, привозять її якійсь «Матері Кюрі», яка потім повинна передавати воду іншим мешканцям Мегатонни. На жаль, Мати Кюрі — релігійна фанатичка.\n\nВона належить до культу, відомого як Діти Атома, і опромінює воду, вірячи, що це робить її святою. Вона давала воду всім, хто проходив повз, а решту води відправляла до Мегатонни, вбиваючи таким чином її мешканців радіацією.\n\nЗрозуміло, що солдати, які передали воду Матері Кюрі, не перевіривши ретельніше її походження та мотиви, будуть покарані, але нам все одно потрібно вирішити, що робити з цією ситуацією."
  bln_events.75.a:0 "Найкраще відрадити її від цього"
  bln_events.75.b:0 "Вона вбила людей, суд не потрібен"

  bln_events.76.title:0 "Момент минув"
  bln_events.76.desc:0 "Протягом 3 місяців ми спостерігали, як Анклав перетворив проєкт «Чистота» з пам'ятника, що руйнується, на справжню фортецю. Посадкові майданчики для вертольотів, розширені енергетичні бар'єри та кілька бетонних бункерів зробили захоплення очищувача набагато складнішим. Будь-який шанс, який ми мали витіснити цих солдатів невеликою ударною групою, минув. Якщо ми збираємося захопити об'єкт, нам знадобиться армія."
  bln_events.76.a:0 "Готуйтеся до війни"

  bln_events.77.title:0 "Повідомлення зі Столичної Пустки"
  bln_events.77.desc:0 "До нас надійшло повідомлення від [BLN.GetNameDef], яким вдалося взяти під контроль проєкт «Чистота» в Столичній Пустці і тепер вони мають величезну кількість чистої води. В обмін на частину цієї води вони просять нашої допомоги в плаванні річками та доставці води в решту пустки. \n\nЦя угода здається прямою та вигідною для всіх сторін, але ми можемо прив'язати себе до імперіалістичної сили, яка також захоче домінувати над нашим способом життя."
  bln_events.77.a:0 "Чудова ідея"
  bln_events.77.b:0 "Це починається з виконання їхніх доставок..."

  bln_events.78.title:0 "Рибалки Затоки погодилися!"
  bln_events.78.desc:0 "Не дивно, що Рибалки Затоки прийняли нашу пропозицію води в обмін на їхню допомогу. Дуврські торговці занадто довго загрожували їхнім водам, і якщо вони зможуть отримати наш захист і дружбу, вони зможуть бути більш впевненими у своєму становищі. \n\nЗвичайно, це чудова новина і для нас. Ми матимемо допомогу їхніх кораблів у доставці води до пустки, а це означає безпечніші подорожі всюди."
  bln_events.78.a:0 "Нашим друзям у Делмарві"
  bln_bfi_delivery_support_tt:0 "Підтримка від §BРибалок Затоки§! §Gзбільшить§! ймовірність того, що наші каравани здійснять безпечну доставку."

  bln_events.79.title:0 "Дуврські Торговці погодилися!"
  bln_events.79.desc:0 "Владні торговці Дувра прийняли нашу пропозицію, і в обмін на воду вони допоможуть нам керувати нашою мережею розподілу води. Дуврські торговці агресивно меркантильні і розглядають цю угоду як чудовий спосіб розширити свою торгівлю на нові землі, і навіть до внутрішніх районів через нас.\n\nМи також виграємо від цього, звичайно, і їхні торговці допоможуть нам розподіляти воду в решту пустки."
  bln_events.79.a:0 "Той трохи схожий на пірата"
  bln_dot_delivery_support_tt:0 "Підтримка від §gДуврських Торговців§! §Gзменшить§! бюрократичне навантаження на наших писарів."

  bln_events.80.title:0 "[FROM.GetName] відмовилися"
  bln_events.80.desc:0 "На диво, [FROM.GetName] відмовилися від нашої пропозиції торгівлі водою та кращих комерційних відносин. Вони стурбовані втратою свого суверенітету та ризиком для своєї свободи заради економічної вигоди."
  bln_events.80.a:0 "Вони зробили помилку"

  bln_events.81.title:0 "Колись ми були американцями"
  bln_events.81.desc:0 "Ситуація з Мережею розподілу води стає настільки поганою, що багато інших звертають на це увагу, включаючи деяких... неприємних осіб. Кілька дезертирів з Анклаву, з усіх місць, дали зрозуміти, що вони готові запропонувати нам свої послуги, якщо ми просто дамо їм амністію.\n\nЦі дезертири, всі до одного, військові злочинці та жорстокі головорізи, і жодному з них не можна довіряти. Незважаючи на це, вони навчені та елітні солдати з чудовим спорядженням, а наша Мережа розподілу води в поганому стані. Чи можемо ми справді дозволити собі відмовити їм?"
  bln_events.81.a:0 "Звичайно, ні, стратити їх"
  bln_events.81.b:0 "Важкі часи вимагають відчайдушних заходів..."
  bln_recruited_enclave_deserters_tt:0 "Ці дезертири з Анклаву зроблять наші каравани §Gнабагато безпечнішими§!, §Oале чи можемо ми бути впевнені, що їм можна довіряти..?§!"

  bln_events.82.title:0 "Двічі дезертири"
  bln_events.82.desc:0 "На жаль, але ні для кого не дивно, дезертири з Анклаву знову дезертирували. Після того, як їх відправили на звичайну місію з караваном, вони застрелили своїх підопічних, вкрали воду і зникли в пустці. Навряд чи варто витрачати ресурси на їхнє переслідування, це просто чергова втрата для Мережі розподілу води."
  bln_events.82.a:0 "Поховати цей інцидент у записах"

  bln_events.83.title:0 "Суперечки писарів"
  bln_events.83.desc:0 "Коли ще одну ділянку підрівнів було розчищено для роботи, писарі зраділи перспективі отримати більше простору та ресурсів. Потім вони зрозуміли, що для всіх них недостатньо місця, щоб отримати все, що вони хочуть. Орден Меча хоче нові полігони для випробування зброї, Орден Щита хоче нові збройові майстерні, а Орден Пера каже, що їм потрібно більше місця для обсягів даних, які вони постійно приносять і які можуть бути корисними."
  bln_events.83.a:0 "Стати на бік Меча"
  bln_events.83.b:0 "Стати на бік Щита"
  bln_events.83.c:0 "Перо могутніше за обох!"

  bln_events.84.title:0 "Не лицарські чвари"
  bln_events.84.desc:0 "Лицарі без зупину сперечаються про те, як буде використовуватися остання розчищена ділянка. Деякі з наших східних Лицарів внесли пропозицію використовувати цю ділянку як казарму для нещодавно навербованих лицарів та неофітів, які зазвичай сплять у дворі. Багато лицарів із заходу категорично проти цієї ідеї і вимагають використовувати ділянку для важливіших речей, як-от ще одна збройова майстерня або склад для довоєнних технологій."
  bln_events.84.a:0 "Встановити казарми"
  bln_events.84.b:0 "Нам би не завадило більше майстерень"
  bln_events.84.c:0 "Нам потрібно більше місця для зберігання?"

  bln_events.85.title:0 "Підручник з розподілу води"
  bln_events.85.desc:0 "Завершивши проєкт «Чистота» і поставивши Бігслі на чолі розподілу виробленої води, Братству тепер потрібно підтримувати свою нову відповідальність.\n\nСистема розподілу води має чотири значення: Бюрократія, Охорона, Обладнання та Підготовка.\n\nБюрократія — це показник того, наскільки Бігслі та його писарі намагаються підтримувати все в робочому стані. В ідеалі бюрократія мінімальна, і тенденція управління зменшується, але чим більше коштів виділяється на інші сфери (наприклад, підготовку), тим більше роботи доведеться виконувати писарям. Важливо збалансувати потреби писарів із потребою у воді.\n\nОхорона та Обладнання збільшують шанси кожного каравану дістатися до місця призначення. Вони є прямим збільшенням шансу на успіх. Ймовірно, вам не потрібно використовувати обидва для успішних караванів, тому, можливо, варто тримати одне низьким, щоб полегшити роботу писарів.\n\nПідготовка просто визначає, скільки караванів буде відправлятися щотижня. Кожен караван вимагатиме більше охорони та обладнання, тому майте це на увазі.\n\nКаравани будуть автоматично відправлятися щотижня без втручання гравця. Їхній шанс на успіх значною мірою визначається обладнанням та охороною, але можуть виникнути інші ситуації, які можуть вплинути. Про це вам буде повідомлено через подію. Якщо ви забули, що робить будь-який із цих модифікаторів, кожна частина графічного інтерфейсу має підказку, яка з'явиться, якщо навести курсор на цей розділ.\n\nМожливості покращити мережу, наприклад, побудувати розливні заводи, з'являться після виконання більшої кількості фокусів."
  bln_events.85.a:0 "Просто постарайтеся зберегти Бігслі при здоровому глузді, гаразд?"

  bln_events.86.title:0 "Архіви"
  bln_events.86.desc:0 "Увійшовши до Національного Архіву, наші Писарі були оптимістичні, коли побачили, що система безпеки все ще працює. Використавши коди доступу, знайдені в архівах Цитаделі, вони змогли проігнорувати роботів охорони та турелі, що нишпорили на нижніх рівнях. Чого вони не очікували, так це протектрона, який вважав себе Баттоном Гвіннетом. Здавалося, єдиною справжньою метою робота був захист Декларації незалежності, і, бачачи в нас військових США, він вирішив, що ми там, щоб змінити його."
  bln_events.86.a:0 "Залишити його при виконанні обов'язків і обшукати решту архівів"
  bln_events.86.b:0 "Війна закінчена, ти вільний."
  bln_events.86.c:0 "Новий наказ. Покинь цей об'єкт і бийся з Помаранчевими Мундирами."

  bln_events.87.title:0 "Вимоги Братства"
  bln_events.87.desc:0 "Братство завжди було проблемою для Столичної Пустки, але останнім часом вони «оподатковують» каравани і вимагають у мешканців пусток обладнання, щоб нібито «впоратися з загрозою супермутантів». Їхня остання і найбільш зухвала вимога: постачайте нам зброю, або інакше.\n\nХоча вони навряд чи будуть ескалювати загрозу і виконувати її, це непокоїть наших громадян, які вже турбуються про загрозу, яку Братство може становити для нашого способу життя. Можливо, буде найкраще змиритися і дати їм зброю — безсумнівно, на цьому все й закінчиться?"
  bln_events.87.a:0 "Звичайно, але це востаннє"
  bln_events.87.b:0 "Ми скажемо їм, куди вони можуть засунути цю зброю"

  bln_events.88.title:0 "Паладин Курц"
  bln_events.88.desc:0 "Є кілька кваліфікованих Паладинів, які могли б нарешті принести стабільність у Пітт. Однак нещодавно підвищений Паладин Курц має високі рекомендації. У перші дні конфлікту з Анклавом тодішній Лицар Курц взяв на себе команду навчальної групи неофітів, коли їхній Паладин був убитий. Курц вивів неофітів з території супермутантів без подальших втрат. Команда також набрала вражаючу кількість убитих супермутантів на виході. Потім Курца відправили на передову війни, де він добре служив під час облоги авіабази Адамс. З часів конфлікту він провів ще багато успішних місій углиб руїн Вашингтона. Здатність Паладина ефективно діяти окремо від командування є великою частиною того, чому його рекомендували на цю посаду. Хоча деякі побоюються, що його бойовий досвід може не дуже добре поєднуватися з іншими аспектами управління Піттом."
  bln_events.88.a:0 "Він впорається"

  bln_events.89.title:0 "Сліди Братства"
  bln_events.89.desc:0 "Завдяки додатковим ресурсам, які ми відправили з нашою середньозахідною експедицією, ми змогли знайти набагато більше слідів присутності Братства. Наших лицарів тепло вітали в поселеннях, думаючи, що вони члени цього Середньозахідного Братства, яких, мабуть, добре сприймають. Зупинившись у кількох поселеннях, до них підійшла команда лицарів із цього Середньозахідного Братства. Спочатку вони подумали, що наша команда — самозванці, які намагаються скористатися доброю волею поселення, але наша команда змогла переконати їх у правді. Тепер вони працюють з нашою командою над встановленням захищеного радіоканалу між Цитаделлю та їхнім головним бункером."
  bln_events.89.a:0 "Безсумнівно, приємний сюрприз"

  bln_events.90.title:0 "Сліди Братства"
  bln_events.90.desc:0 "Завдяки додатковим ресурсам, які ми відправили з нашою середньозахідною експедицією, ми змогли знайти набагато більше слідів присутності Братства. На жаль, це не добре. Багато доріг Середнього Заходу встелені розіп'ятими мешканцями пусток, а селяни тремтять при вигляді силової броні. Вони з тих пір не висовуються, уникаючи будь-якого контакту з місцевими жителями або випадковими патрулями. Вони помітили те, що вважають рабськими трудовими таборами, які охороняються солдатами в якійсь дивній силовій броні. Зрозуміло, що хто б не керував цим Середньозахідним Братством, у них немає нічого спільного з нашими Старійшинами."
  bln_events.90.a:0 "Нам слід відкликати нашу експедицію"

  bln_events.91.title:0 "Сліди Братства"
  bln_events.91.desc:0 "Завдяки додатковим ресурсам, які ми відправили з нашою середньозахідною експедицією, ми змогли знайти набагато більше слідів присутності Братства. На жаль, ці сліди вказують на те, що вони зустріли жахливий кінець. Уламки та трупи встеляють незліченні поля битв, дуже схожі на те, яке наша експедиція знайшла спочатку. Однак, на відміну від того першого поля бою, ми знайшли тіло одного з ворожих солдатів, поховане під уламками. Тіло, яке вони знайшли, було в силовій броні X-01 з маркуванням Анклаву. Вони також знайшли кілька згадок про «Чиказький Анклав» у документах, знайдених серед загиблих. Якщо судити по різанині на цих полях битв, цей «Чиказький Анклав» набагато більший, ніж був Анклав Едема."
  bln_events.91.a:0 "Ми помстимося за наших братів"

  bln_events.92.title:0 "Зустріч з Секретарем"
  bln_events.92.desc:0 "Пробитися в саме серце бункера Секретаря було нелегко навіть для Прайду. Вони пробивалися крізь відчайдушних захисників Анклаву, автоматичні турелі, бойових роботів та огидних створінь, випущених із глибин їхніх лабораторій. Коли вони нарешті дісталися камери, де був Секретар, по інтеркому бункера завила тривога. \n \n §RСАМОЗНИЩЕННЯ АКТИВОВАНО!§! \n \n Прайду довелося поспішати до виходу, але вони змогли щось прихопити на виході."
  bln_events.92.a:0 "Креслення броні Тесла"
  bln_events.92.b:0 "Секрети контролю над кігтями смерті"
  bln_events.92.c:0 "Нам не потрібне сміття Анклаву!"

  bln_events.93.title:0 "Зустріч Старійшин"
  bln_events.93.desc:0 "Протягом останнього тижня [BLN.GetLeader] з Братства Лайонса подорожував зі Старійшиною Сайрусом із Середньозахідного Братства, відвідуючи деякі території середньозахідного відділення. Було багато зупинок у цій тижневій подорожі, кульмінацією якої стала екскурсія нещодавно перезапущеним заводом Середньозахідного Братства з виробництва Ядер-Коли. За вечерею зі стейків з браміна, доповненою пляшками Ядер-коли прямо з конвеєра, старійшини обговорювали ідеологію далеко за північ. Обидва старійшини, [BLN.GetLeader] і Сайрус, постійно поверталися до того, як вони раді знайти ще одне відділення Братства, яке поділяє їхні цінності. Серед інших обговорюваних тем були торгівля, реформи кодексу та майбутнє пустки. Коли подорож закінчилася, обидва старійшини знайшли один в одному друга та союзника, з якими вони можуть відбудувати пустку."
  bln_events.93.a:0 "Ми йдемо вперед разом!"
  bln_events.93.b:0 "ОГО ТАК ДОБРЕ 100!"

  bln_events.94.title:0 "Холодний прийом"
  bln_events.94.desc:0 "Минуло вже кілька тижнів відколи Братство Айронса впало, і на Середньому Заході все ще неспокійно. Це велике місце, і звістка про смерть Айронса дійшла не скрізь, тому багатьох наших Братів там, відправлених запобігти вакууму влади, приймають за людей Айронса. Було навіть більше ніж кілька ситуацій, коли в наших людей стріляли через цю помилку, і це лише звичайні цивільні. На додаток до атмосфери недовіри та страху, є більш ніж кілька місцевих потенційних warlordів, які намагаються заявити про свої права. Схоже, попереду в нас довгий шлях."
  bln_events.94.a:0 "Знадобляться роки, щоб виправити шкоду, завдану Айронсом"

  bln_events.95.title:0 "Ціль ліквідовано"
  bln_events.95.desc:0 "Раннього ранку вертольоти Братства Лайонса налетіли на передовий табір Лицаря-Командора Робінсона, летячи швидко і низько, щоб уникнути виявлення радарами. Члени Лайонса швидко висадилися і зробили ривок до командної палатки Робінсона. Перш ніж оборона табору встигла повністю мобілізуватися, Прайд був уже назад на своїх вертольотах і летів на територію відділення Лайонса з ліквідованою ціллю."
  bln_events.95.a:0 "Хай їм грець!"
  bln_events.95.b:0 "Чудова робота, Прайде!"

  bln_events.96.title:0 "Несподівана знахідка"
  bln_events.96.desc:0 "Наша розвідувальна група, відправлена на пошуки технологій на Середньому Заході, передала по радіо дивовижні новини. Вони знайшли сліди недавньої активності Братства. Випадково вони натрапили на якесь забуте поле бою, на якому були уламки деяких транспортних засобів із символами Братства. Що цікаво, серед іржавого металу та скелетів був бортовий журнал загиблого лицаря. Книга показує, що це Середньозахідне Братство було активним у регіоні принаймні до 2275 року! Це повністю спростовує наші попередні припущення, що відсутність контакту з членами Братства під час нашого походу з Лост-Хіллз означала, що вони були знищені. Тепер команда перенаправляє свої пошуки, щоб знайти більше слідів цього загубленого відділення."
  bln_events.96.a:0 "Ми, мабуть, недостатньо уважно шукали"

  bln_events.97.title:0 "На Місяць?"
  bln_events.97.desc:0 "Авіабаза ВанБюрен була не просто черговим форпостом, який Анклав використовував для проєкції своєї сили на цивільних. Ця база була домом для передових ракетних досліджень з єдиною метою — відправити людей у космос. Здається, ця гілка Анклаву була дуже схожа на багатьох у довоєнному світі, які, бачачи, що відбувається з Землею, вирішили, що покинути її заради іншого світу легше, ніж виправити. За нашими оцінками, вони все ще були на багато десятиліть, якщо не століть, від досягнення іншої придатної для життя планети. Здається, вони досягли певного прогресу у висадці людей на Місяць, але що там може бути такого, що варте витрачати стільки цінних ресурсів?"
  bln_events.97.a:0 "У нас є важливіші справи"
  bln_events.97.b:0 "Подивімося, що там вгорі"

  bln_events.98.title:0 "Останній бій"
  bln_events.98.desc:0 "Командний бункер Онтаріо був місцем, куди Анклав Онтаріо відступив понад 30 років тому, коли їх витіснило місцеве населення. Коли вони знову з'явилися, щоб тероризувати Торонто, вони розграбували більшу частину міських технологій, щоб підтримувати бункер у робочому стані. Після важких боїв цей бункер і всі технології всередині тепер наші. Ми вже відправили загін писарів приєднатися до багатьох лицарів у бункері. Це прото-відділення залишиться там на деякий час, каталогізуючи вміст бункера та його архіви. Вони вже знайшли одну цінну річ — креслення вдосконаленого комплекту броні, який заповнює прогалину між розвідувальною бронею та силовою бронею."
  bln_events.98.a:0 "Чудова робота."

  bln_events.99.title:0 "Заморожена реліквія"
  bln_events.99.desc:0 "Командний бункер Онтаріо був місцем, куди Анклав Онтаріо відступив понад 30 років тому, коли їх витіснило місцеве населення. Коли вони знову з'явилися, щоб тероризувати Торонто, вони покинули бункер і залишили його, щоб заснувати свій маленький форпост у Торонто. Ми знали, що вони заберуть практично все цінне, залишаючи це місце, але коли патруль натрапив на карту, що показує його розташування, нам довелося поглянути. На щастя, там не було залишків, що ховаються. Як ми й очікували, практично все, що мало якусь цінність, було вивезено давно. Залишилася лише одна річ, яка була не зовсім марною — іржавий старий термінал RobCo. Коли наші писарі запустили його, щоб перевірити технічні дані, вони були здивовані, знайшовши схеми вдосконаленого комплекту броні, який заповнює прогалину між розвідувальною бронею та силовою бронею. Писарі Ордену Щита з нетерпінням чекають можливості отримати це, коли термінал буде доставлено назад вертольотом пізніше сьогодні."
  bln_events.99.a:0 "Чудова робота!"

  bln_events.100.title:0 "Тривожні новини"
  bln_events.100.desc:0 "Наші розвідники передали по радіо жахливу новину. За останні кілька днів вони ледь уникнули кількох патрулів солдатів у броні з маркуванням Анклаву. З їхніх спостережень випливає, що Торонто є свого роду базою Анклаву, яка підтримує сотні, якщо не тисячі солдатів. Вони просять негайного підкріплення або наказів відступити."
  bln_events.100.a:0 "Повертайтеся для доповіді"

  bln_events.101.title:0 "Затокове Братство живе!"
  bln_events.101.desc:0 "Наша експедиція до Флориди повідомила, що встановила контакт із Затоковим Братством. Члени відділення раді бачити, що в цій частині країни все ще є дружні обличчя за силовою бронею. Ми встановили радіозв'язок і підтримуємо хороші стосунки з нашими далекими братами. Навіть точаться розмови про співпрацю над деякими дослідницькими проектами або експедиціями в пустки Теннессі."
  bln_events.101.a:0 "Чудові новини!"

  bln_events.102.title:0 "Відділення Лайонса?"
  bln_events.102.desc:0 "Експедиція лицарів Братства зі Столичної Пустки дісталася Флориди в пошуках нас! Керівник їхньої групи згадав, що, досліджуючи Середньозахідне відділення, вони натрапили на кілька документів, які посилаються на наше існування. Їхній старійшина вважав за доцільне відправити команду перевірити нас, і новини призвели до святкування в нашому відділенні. Після нещасливого падіння Сайруса та решти Середньозахідного Братства ми думали, що ми самотні тут, на східному узбережжі. Тепер виявляється, у нас є друзі всього за кілька штатів звідси."
  bln_events.102.a:0 "Найкращі новини за останній час!"

  bln_events.103.title:0 "Як це могло статися?"
  bln_events.103.desc:0 "Коли нашу експедицію відправили на південь, до Флориди, на пошуки загубленого Затокового Братства, небагато хто був оптимістичний щодо їхньої знахідки. Однак ніхто не очікував, що Анклав буде присутній у Флориді і буде відповідальним за загибель наших братів! Наша експедиція ледь уникнула патрулів і повідомлень про те, що головна база цього Флоридського Анклаву проводить випробування великих ракет. Ми не можемо стояти осторонь, поки Анклав розробляє арсенал МБР!"
  bln_events.103.a:0 "Ми повинні зупинити їх, поки не пізно!"

  bln_events.104.title:0 "Дивне місце"
  bln_events.104.desc:0 "Мутанти-гангстери, кігті-алігатори та наркомани — це лише деякі з дивних речей, які існують у пустці Флориди. Чого наша експедиція не змогла знайти більше, ніж кілька слідів, так це Затокового Братства. Майже нічого не залишилося, окрім кількох предметів із символами Братства, залишених у покинутих бункерах. Що б з ними не сталося, залишиться загадкою."
  bln_events.104.a:0 "Шкода"

  bln_events.105.title:0 "Знайшовся Брат?"
  bln_events.105.desc:0 "Коли наші розвідники поверталися зі своєї подорожі на захід, до них підійшов закутаний у плащ індивід, який назвався Камелотом, останнім середньозахідним паладином. Забравши в нього зброю, лицарі вислухали його історію. Він розповів їм, що не так давно тут, в цих краях, було інше відділення Братства, набагато ближче до нашого, ніж те, що ми бачили. Зрештою їх знищило Братство Айронса, а члени або присягнули на вірність Айронсу, або були розіп'яті. Паладин Камелот наполягав на тому, щоб він повернувся з патрулем, щоб зустрітися зі старійшиною та обговорити план помсти за своє відділення."
  bln_events.105.a:0 "Приведіть його до Цитаделі"
  bln_events.105.b:0 "Ми не можемо йому довіряти"

  bln_events.106.title:0 "Вірджінська експедиція повертається"
  bln_events.106.desc:0 "Наша експедиція до Вірджинії нарешті повернулася зі своєї вилазки в болота, що швидко розширюються. У серці болота вони знайшли відкритий притулок, який, здавалося, підтвердив наші очікування, що це був ще один експеримент притулку, який пішов не так. Вони не змогли пробитися в притулок, тому що на них напали племена, коли вони розбивали табір. Більша частина групи повернулася, але їх переслідували аж до краю болота. Якщо ми хочемо зупинити цю машину, нам доведеться відправити значні сили в хащі."
  bln_events.106.a:0 "Готуйте вогнемети"

  bln_events.107.title:0 "Вірджінська експедиція повертається"
  bln_events.107.desc:0 "Наша експедиція до Вірджинії нарешті повернулася зі своєї вилазки в болота, що швидко розширюються. У серці болота вони знайшли відкритий притулок, який, здавалося, підтвердив наші очікування, що це був ще один експеримент притулку, який пішов не так. На їхній великий подив, їх зустріли дружні племена на чолі з мешканкою пустки в лабораторному халаті. Мешканка пустки представилася як Доктор Робінсон і запросила нашу експедицію оглянути притулок. Вона була дуже відверта з інформацією, включаючи місяці тестувань і досліджень у притулку, які були задокументовані достатньо добре для мешканця пустки. Хоча її твердження, що вплив дефектного ГЕКК у серці притулку призвів до психічних здібностей у деяких племен, є сумнівними, вони все ж заслуговують на подальше вивчення. Перед тим, як наша експедиція пішла, Доктор зробила пропозицію. Вона запропонувала дозволити нам необмежений доступ до притулку, а також будь-яку допомогу чи зручності, необхідні нашим писарям, за умови, що ми допоможемо племені, якщо воно зазнає нападу з боку мешканців пусток. Оскільки ми все одно не хочемо, щоб ця машина потрапила в руки мешканців пусток, це очевидна згода з нашого боку."
  bln_events.107.a:0 "Дивно, м'яко кажучи"

  bln_events.108.title:0 "Дивна місія"
  bln_events.108.desc:0 "Остання розмова Старійшини зі Старійшинами в Лост-Хіллз була досить стандартною. Звіти про проєкт Ліберті Прайм, запити про звіти про прогрес у пошуках у руїнах Вашингтона та оновлення статусу численних експедицій, які Лайонс вигадав, щоб виправдати суттєві запити на підкріплення за останні кілька років. Розмова закінчилася новою директивою з Лост-Хіллз. З якоїсь причини, яку ніхто в Цитаделі не міг зрозуміти, вони хочуть, щоб наш Старійшина відправив 200 лицарів і писарів до старої установи в Кентуккі під назвою Форт-Нокс.\n\nНаскільки показували наші записи, установа була довоєнним місцем зберігання золотого запасу США, але золото вивезли за місяці до Великої війни. Що Лост-Хіллз хоче в цій установі, ніхто не знає, але ми, швидше за все, нікого туди не відправимо."
  bln_events.108.a:0 "Експедиція до Форт-Нокса звучить як безглузда ідея"

  bln_events.109.title:0 "Зв'язок втрачено"
  bln_events.109.desc:0 "Лицарі та Писарі, яких ми відправили до Форт-Нокса на прохання Старійшин у Лост-Хіллз, не виходили на зв'язок місяцями. Ми втратили радіозв'язок приблизно в той час, коли вони спускалися із західного боку Аппалачів, і він так і не відновився. Сьогодні Старійшина Лайонс віддав наказ додати їхні імена до Сувоїв."
  bln_events.109.a:0 "Це все-таки була безглузда ідея"

  bln_events.110.title:0 "Експедиція розвернулася"
  bln_events.110.desc:0 "Лицарі та Писарі, яких ми відправили до Форт-Нокса на прохання Старійшин у Лост-Хіллз, повернулися набагато раніше, ніж очікувалося. Незабаром після входу в Кентуккі вони зіткнулися з надзвичайно ворожими мутантами та фауною. Усі мутанти та істоти мали дивні нарости, які натякали на якийсь регіональний тип мутації. Незважаючи на відбиття повторних атак, їхні припаси закінчилися через кілька тижнів, і вони почали зазнавати важких втрат. Зрештою, було прийнято рішення розвернутися після того, як їхніх останніх 3 писарів було вбито саморобним вибуховим пристроєм, замаскованим під автомат з Ядер-Колою. Ті, хто загинув, мали свої жетони, і їхні імена додаються до Сувоїв."
  bln_events.110.a:0 "Принаймні деякі повернулися"

  bln_events.111.title:0 "Розчаровуюча експедиція"
  bln_events.111.desc:0 "Лицарі та Писарі, яких ми відправили до Форт-Нокса на прохання Старійшин у Лост-Хіллз, повернулися з розчаровуючими новинами. Як ми знали, Форт-Нокс був позбавлений більшої частини цінностей. Установа була не більше ніж кратером, що кишить опроміненими істотами. Обмежена експедиція не бачила сенсу пробиватися крізь орди мутантів і вирішила розвернутися після підтвердження, що побачений ними кратер — це все, що залишилося від форту. Експедиція повернулася ні з чим, окрім кількох хороших історій."
  bln_events.111.a:0 "Принаймні вони повернулися"

  bln_events.112.title:0 "Гарний об'їзд"
  bln_events.112.desc:0 "Лицарі та Писарі, яких ми відправили до Форт-Нокса на прохання Старійшин у Лост-Хіллз, повернулися з несподіваними новинами. Як ми знали, Форт-Нокс був позбавлений більшої частини цінностей. Установа була не більше ніж кратером, що кишить опроміненими істотами. Обмежена експедиція не бачила сенсу пробиватися крізь орди мутантів і вирішила розвернутися після підтвердження, що побачений ними кратер — це все, що залишилося від форту. Здавалося, що експедиція провалилася, але коли група поверталася, вони скористалися нагодою зупинитися в дослідницькому комплексі в Східному Кентуккі. Там вони знайшли томи цінних дослідницьких даних, які змогли перенести на голострічки та привезти назад до Цитаделі. Наші писарі все ще вивчають дані, але вони думають, що це може дати дуже важливі прориви в розробці енергетичної зброї."
  bln_events.112.a:0 "Несподіваний розвиток подій, але бажаний"

  bln_events.113.title:0 "Більш відповідні роботи"
  bln_events.113.desc:0 "Замість того, щоб відправити 200 чоловіків і жінок до Форт-Нокса з безглуздим дорученням, ми залишимо їх у Цитаделі і просто скажемо Лост-Хіллз, що ми їх туди відправили. Питання залишається: що ми будемо робити з лицарями та писарями, відібраними для цього уявного завдання, до їхнього передбачуваного повернення?"
  bln_events.113.a:0 "Включити їх до дослідницьких груп"
  bln_events.113.b:0 "Нехай вони допомагають навчати неофітів"
  bln_events.113.c:0 "Додати їх до патрулів Вашингтона."

  bln_events.114.title:0 "Один довгий список"
  bln_events.114.desc:0 "Паладин Касдін часто скаржився на напрямок відділення. Незліченні дебати спалахували між паладином та іншими паладинами, писарями і навіть самим старійшиною. Нещодавній запит з Лост-Хіллз розпалив вогонь під паладином і призвів до того, що він підняв список місць у Столичній Пустці, куди, на його думку, ми повинні відправляти команди. Список довгий, і багато з них, ймовірно, мають обмежену цінність для збору в кращому випадку. Однак кілька виділялися тим, що, на думку Старійшини, могли б дати щось корисне. Або ми можемо зробити те, що робили в минулому, і засунути цей список у шафу для зберігання десь у Цитаделі."
  bln_events.114.a:0 "Перевірити Форт Константин"
  bln_events.114.b:0 "Увійти в Арсенал Вітона"
  bln_events.114.c:0 "Ігнорувати запит"

  bln_events.115.title:0 "Навіщо вмирати за мешканця пустки?"
  bln_events.115.desc:0 "Майже 20 років ми ведемо війну з Супермутантами Столичної Пустки від імені людей, які тут живуть. Багато з тих, хто прийшов разом зі Старійшиною Лайонсом, вірять у цю людину і, отже, у його бачення. Однак навіть серед старожилів є ті, хто має сумніви. Додаючи до зростаючих голосів невдоволення, є неофіти та лицарі з Лост-Хіллз, яких відправляють сюди з враженням, що вони допомагатимуть нам у пошуках втрачених технологій. Хоча деякі з часом сприймають ідею стримування цієї довоєнної загрози, багато хто розчаровується або незабаром після прибуття, або після кількох років боротьби з, здавалося б, нескінченною загрозою. Стикаючись із значною мірою невдячним населенням і нескінченним ворогом, багато хто відкрито почав запитувати, чому ми все ще це робимо."
  bln_events.115.a:0 "Ігнорувати їхні занепокоєння"
  bln_events.115.b:0 "Переконати їх у небезпеці, яку становлять ці супермутанти"
  bln_events.115.c:0 "Нагадати їм, що ми можемо вести цей хрестовий похід і виконувати нашу головну місію."

  bln_events.116.title:0 "Ще один огидний експеримент"
  bln_events.116.desc:0 "Після місяців підготовки команда лицарів пробралася до притулку в серці Віргінського болота. Всередині вони знайшли саме те, що ми очікували: безглуздий експеримент Волт-Тек, який вийшов з-під контролю. Хоча більша частина даних у притулку була пошкоджена, вони змогли звузити кілька фактів. Здавалося, експеримент полягав у тому, що дефектний ГЕКК доставили в притулок без параметрів безпеки та під'єднали безпосередньо до реактора притулку для живлення. У якийсь момент у роки після закриття притулку ГЕКК активувався. Команда знайшла журнали, що вказують на невдалі спроби деактивувати ГЕКК, і зрештою притулок було покинуто. Наші писарі вважають, що з достатнім часом вони зможуть деактивувати ГЕКК за кілька років. В іншому випадку нам доведеться підірвати реактор притулку, щоб запобігти поширенню болота."
  bln_events.116.a:0 "Займемося дослідженнями"

  bln_events.117.title:0 "Лицарі з Пусток"
  bln_events.117.desc:0 "Касдін ніколи не погоджувався з наполяганням Лайонса на тому, щоб дозволяти мешканцям пусток так легко приєднуватися до лав Братства. Хоча Кодекс дозволяв вербувати сторонніх, які доводять свою гідність, попередні старійшини встановили планку гідності надто низько. Незліченні комплекти силової броні та енергетичної зброї були втрачені через те, що мешканці пусток, ледь придатні для служби на передовій, вмирали всередині них десь у руїнах, і їх грабували, перш ніж їх можна було повернути. У наших лавах все ще багато лицарів і навіть деяких паладинів із пусток, але навіть деякі більш консервативні члени нашого ордену бачать у цих солдатах справжніх братів. Вони билися з Анклавом разом, і якщо це не робить брата гідним, то що тоді?"
  bln_events.117.a:0 "Вони заслужили своє місце, але ці двері зачинилися."
  bln_events.117.b:0 "Усунути їх і запросити підтримку з Лост-Хіллз"

  bln_events.118.title:0 "Більше м'якотілих"
  bln_events.118.desc:0 "Коли ми нарешті встановили контакт з іншим відділенням Братства Сталі по цей бік Міссісіпі, багато у відділенні були в захваті. Прочісування цієї сторони країни є монументальним завданням, і наявність іншого відділення, яке працює поруч, було б величезною перевагою. Здається, що цей захват був помилковим. За короткий час, поки Старійшина Касдін розмовляв із керівництвом Середньозахідного Братства, стало цілком очевидно, що ці м'якосерді добре б порозумілися з покійним Старійшиною Лайонсом. Вони, здається, майже повністю відмовилися від Кодексу, натомість вирішили витрачати ресурси на допомогу племінним дикунам і мутантам! Без жодних двозначностей наш Старійшина дав зрозуміти цьому загубленому відділенню, що ми не будемо з ними співпрацювати. \n\n Деякі Паладини запитували Старійшину, чому ми не йдемо і не придушуємо це відступницьке відділення. Старійшина заявив, що це буде марною тратою ресурсів, особливо тому, що їхня наївність, ймовірно, вб'є їх раніше, ніж ми закінчимо прочісувати Східне узбережжя."
  bln_events.118.a:0 "Яке відстале відділення!"
  