  	###############
	OUT_expeditions_category:0 "Експедиції на Східне Узбережжя"
	OUT_expeditions_category_desc:0 "Уздовж Східного узбережжя є місця, що становлять великий інтерес для Братства. Старі дослідницькі лабораторії, занедбані бункери та багато іншого розкидано по всій цій стороні країни. Можливо, щось із цього давно розграбовано, але пошук того, що залишилося, є частиною нашої місії. Лайонс витратив десятиліття даремно, залишаючись у Вашингтоні, тож нам потрібно надолужити згаяне."
	OUT_boston_expedition_decision:0 "Експедиція до Співдружності"
	OUT_boston_expedition_decision_desc:0 "Ходять чутки, що на півночі, у Бостоні довоєнних часів, існує таємна організація під назвою «Інститут», що володіє технологіями, здатними позмагатися навіть з обладнанням Анклаву. Можливо, це просто старі байки, але навіть якщо це так, цей район сповнений великих перспектив. До війни тут був центр технологічних компаній, а місцеві військові бази слугували випробувальними полігонами для важливих довоєнних військових технологій."
	OUT_pitt_expedition_decision:0 "Експедиція до Пітта"
	OUT_pitt_expedition_decision_desc:0 "Наша перша експедиція до Пітта загалом вважалася успішною, але, судячи з того небагато, що вдалося звідти отримати, за останні десятиліття все змінилося. Якщо чутки правдиві, єдиний наш Брат, якого ми вважали загиблим під час лиха, вижив і тепер вважає себе королем жителів Пітта. Кажуть, він організовує армію та будує промисловість із працюючими довоєнними патронними пресами."
	OUT_appalachia_expedition_decision:0 "Експедиція до Аппалачів"
	OUT_appalachia_expedition_decision_desc:0 "Понад 150 років тому до Аппалачів було відправлено експедиційний корпус, щоб продовжити історію далекого відділення, яке замовкло роками раніше. Записи того часу, м'яко кажучи, ненадійні, а цей район знаходився осторонь від нашого шляху на схід. Можливо, тепер ми зможемо дізнатися, що сталося з нашими братами."
	OUT_ronto_expedition_decision:0 "Експедиція до Ронто"
	OUT_ronto_expedition_decision_desc:0 "Довоєнний Торонто був домом для великих американських окупаційних сил і безлічі неетичних лабораторій. Інформацію про післявоєнне Ронто зібрати складніше, але деякі кажуть, що люди там відбивалися від загону солдатів у чорній силовій броні?"
	OUT_new_york_expedition_decision:0 "Експедиція до Нью-Йорка"
	OUT_new_york_expedition_decision_desc:0 "Довоєнний Нью-Йорк був одним із найбільших міст країни. Кілька передових компаній мали в цьому районі лабораторії та офіси, а також значну військову присутність через голодні бунти. Безсумнівно, він постраждав так само сильно, як і Вашингтон, але все ж варто оцінити ситуацію самостійно."
	OUT_rocky_expedition_decision:0 "Експедиція до Кримсон-Тауна"
	OUT_rocky_expedition_decision_desc:0 "Оповіді із Заходу розповідають про фанатичний культ у горах, що має доступ до передових вогнеметів. Можливо, вони ховаються в тайнику з цінним спорядженням?"
	OUT_magnets_expedition_decision:0 "Експедиція до Зламаних Обладунків"
	OUT_magnets_expedition_decision_desc:0 "Як випливає з зловісної назви цього місця, ми чули розповіді про силу в цьому районі, що володіє зброєю, здатною знищити силову броню. Для оцінки ситуації потрібно буде відправити групу наших найкращих розвідників із нестандартним обладнанням. Ми не можемо дозволити рейдерам зі зброєю, що знищує Т-45, перебувати так близько до нас."
	OUT_dc_explorations_category:0 "Експедиції до Столичної Пустки"
 	OUT_dc_explorations_category_desc:0 "Столична Пустка сповнена лабораторій, військових об'єктів і таємних схованок, які Лайонс ігнорував майже два десятиліття. Нам потрібно прочесати ці руїни, перш ніж мешканці пустки здогадаються."
  	OUT_dc_national_guard_decision:0 "Склад Національної Гвардії"
   	OUT_dc_national_guard_decision_desc:0 "Склад Національної гвардії перетворився на руїни, але охоронні роботи відлякують сміттярів уже понад 200 років."
	OUT_dc_constantine_decision:0 "Форт Константин"
 	OUT_dc_constantine_decision_desc:0 "Про Форт Константин, військову базу на північному заході Столичної Пустки, відомо небагато, окрім чуток про те, що кілька років тому через неї пробралися найманці."
  	OUT_dc_wheaton_decision:0 "Арсенал Вітона"
   	OUT_dc_wehaton_decision_desc:0 "Наразі арсенал Вітона зайнятий рейдерами, нам не важко буде його зачистити."
	OUT_satcom_array_nn03:0 "Супутникова антена NN-03d"
 	OUT_satcom_array_nno3_desc:0 "Поруч із фортом Константин розташовано безліч антен, що використовувалися для зв'язку із супутниками. Більшість із них давно впали з орбіти, але ніколи не дізнаєшся, що там, поки не подивишся."
  	OUT_expedition_followup_category:0 "Експедиції на Східне Узбережжя"
   	OUT_expedition_followup_category_desc:0 "Інше Братство нарешті повернулося до того, за чим нас сюди послали, — до пошуків важливих технологій. Схоже, вони роблять це абияк, тож коли вони звідкись повернуться, нам варто придивитися уважніше."
	OUT_boston_followup_decision:0 "Дослідити Бостон"
 	OUT_boston_followup_decision_desc:0 "Наші брати повернулися з Бостона з ящиками цінної технічної інформації. Мабуть, і нам її вистачить з лишком."
  	OUT_new_york_followup_decision:0 "Дослідити Нью-Йорк"
   	OUT_new_york_followup_decision_desc:0 "Наші брати повернулися з Нью-Йорка і кажуть, що це місце — не більше ніж цвинтар, захоплене мутантами та рейдерами. Все ж варто поглянути ще раз."
	OUT_appalachia_followup_decision:0 "Дослідити Аппалачі"
 	OUT_appalachia_followup_decision_desc:0 "Наші брати повернулися з Аппалачів і повідомили, що Аппалачського відділення не видно. Ми очікували цього, але вони навіть не спробували шукати техніку?"
  	OUT_ronto_followup_decision:0 "Дослідити Ронто"
   	OUT_ronto_followup_decision_desc:0 "Наші брати дуже мовчать про те, що знайшли в Ронто. Нам потрібно самим розібратися."
	OUT_hunt_pipboys_decision:0 "Пошуки Піп-Боя"
 	OUT_hunt_pipboys_decision_desc:0 "З якоїсь дивної причини в Столичній Пустці відкрилося дуже мало Сховищ, і їхні мешканці покинули їх. Через це Піп-бої трапляються набагато рідше, ніж на заході. Доведеться постаратися, щоб знайти працюючий."
	OUT_cult_category:0 "Незвичайний вибір"
	OUT_cult_category_desc:0 "Навіщо нам це робити?"
	OUT_racer_return_decision:0 "Повернення на фабрику «Червоний Гонщик»"
	OUT_racer_return_decision_desc:0 "Непоказний завод «Червоний Гонщик» ми проігнорували після того, як прочесали його. Однак деякі з Захисників і Спеціалістів, які там побували, тепер наполягають на нашому поверненні. Всі вони раптом вирішили, що ми щось упустили в кабінетах генеральних директорів, але не можуть пояснити, що саме." 

    ############
    ###Events###
    ############
	OUT_nf_events.1.title:0 "Не з порожніми руками"
 	OUT_nf_events.1.desc:0 "Коли стало ясно, що Лайонс ніколи не схаменеться, Касдін наказав своїм найближчим соратникам почати підготовку до від'їзду. Особисті речі, запаси продовольства та наше спорядження було досить легко забрати. Але, виявивши трохи хитрощів, ми змогли винести трохи більше."
  	OUT_nf_events.1.a:0 "Кілька запасних костюмів Т-45 не завадили б."
   	OUT_nf_events.1.b:0 "Ми привезли з собою кілька гвинтівок."
	OUT_nf_events.1.c:0 "Ми витягли великі гармати."
	OUT_nf_events.2.title:0 "Копання в завалах"
 	OUT_nf_events.2.desc:0 "Форт Індепенденс, як і багато інших військових споруд Столичної Пустки, був зруйнований і пограбований на основних рівнях. Коли ми прибули, постало питання, чи не краще нам вирушити в інше місце. Ті, що ми побачили в першу ж поїздку, нагадали нам, що Цитадель була не дуже привабливою спочатку. Довелося задовольнятися тим, що є. Питання залишалося відкритим: що робити в першу чергу?"
  	OUT_nf_events.2.a:0 "Зміцнити оборону."
   	OUT_nf_events.2.b:0 "Очистити казарми."
	OUT_nf_events.2.c:0 "Нанести на карту околиці."
	OUT_nf_events.3.title:0 "Форпост Індепенденс"
 	OUT_nf_events.3.desc:0 "Лайонс, можливо, й прислухався до наказу дослідити Форт-Індепенденс, але це не означало, що він бачив у цьому цінність. Нам вдалося укомплектувати невеликий форпост співчуваючими братами. З їхньою появою нам навіть вдалося переправити туди деяке обладнання."
  	OUT_nf_events.3.a:0 "Деякі збройові верстаки."
   	OUT_nf_events.3.b:0 "Пара універсальних верстаків."
	OUT_nf_events.3.c:0 "Електронні запчастини."
	OUT_nf_events.4.title:0 "Обов'язок Протектора"
 	OUT_nf_events.4.desc:0 "У Кодексі дуже чітко прописано, що потрібно для отримання звання Старейшини. Хоча ми єдині на Сході, хто його дотримується, Лайонс все ж був проголошений Старейшиною Вищими Старейшинами на Заході. Ніхто серед Вигнанців не має права призначати Старейшину або навіть підвищувати Захисника до Паладіна. Однак Кодекс не забороняв нам використовувати тимчасові титули до відновлення зв'язку з Лост-Хіллс. Касдін прийняв титул Протектора."
  	OUT_nf_events.4.a:0 "Він захистить наші ідеали."
   	OUT_nf_events.4.b:0 "Він захищатиме знання."
	OUT_nf_events.4.c:0 "Він захистить наших братів."
	OUT_nf_events.5.title:0 "Початкова місія"
 	OUT_nf_events.5.desc:0 "Нас послали сюди з двома цілями: зберегти цінні технології та вберегти їх від тих, хто не здатний використовувати їх відповідально. Лайонс випустив цю мету з уваги, вважаючи, що важливіше захищати мешканців пусток від мутантів, ніж від них самих. Тепер, позбувшись його некомпетентності, ми можемо повернутися до нашої місії. Залишається питання, з чого почати."
  	OUT_nf_events.5.a:0 "Пошук у депо Національної гвардії."
   	OUT_nf_events.5.b:0 "Пошук арсеналу Вітона."
	OUT_nf_events.5.c:0 "Пошук Форту Константин."
 	OUT_nf_events.5.d:0 "Пошук супутникової антени NN-03."
	OUT_nf_events.6.title:0 "Визволення Анкориджа"
 	OUT_nf_events.6.desc.1:0 "Це зайняло більше часу, ніж ми очікували, але нам нарешті вдалося знайти працюючий Піп-Бой і відправити Лицаря в симуляцію Анкориджа. Вони повідомили, що це було так само абсурдно, як і в записах терміналу, і ніякої реальної навчальної цінності виявлено не було. Втім, це неважливо. Справжня цінність ховалася за дверима, відкритими симуляцією. У замкненому крилі зберігалася справжня скарбниця: чудово збережене обладнання разом із томами технічних даних і схем усього цього."
  	OUT_nf_events.6.desc.2:0 "Хоча для цього знадобилася допомога мешканця пустки, нам нарешті вдалося завершити симуляцію Анкориджа. Розповідь мешканця пустки робить симуляцію настільки ж абсурдною, наскільки це було заявлено в записах терміналу. Однак це не має значення. Справжня цінність знаходилася за дверима, відкритими симуляцією. У замкненому крилі знаходилася скарбниця — ідеально збережені частини обладнання разом із томами технічних даних і схем для всього цього. \n\n У нас є тільки одна проблема... \n\n Мешканцю пустки пообіцяли частину технологій за допомогу, і багато лицарів на об'єкті не згодні. Протектор МакГроу повідомляє нам, що Захисник Сіблі та половина гарнізону відмовляються пускати когось до захищеного крила, поки мешканець пустки не піде. Захисник Сіблі також зв'язався з нами, повідомивши, що Протектор МакГроу намагається передати цінні технології мешканцю пустки. Можливо, нам доведеться обрати сторону."
  	OUT_nf_events.6.a:0 "І це все наше!"
   	OUT_nf_events.6.b:0 "Дайте Сіблі зелене світло на вступ у бій."
	OUT_nf_events.6.c:0 "Накажіть МакГроу усунути Сіблі."
 	OUT_nf_events.6.d:0 "Чому б нам натомість не заплатити мешканцю пустки?"
	OUT_nf_events.7.title:0 "Кілька старих одиниць зброї"
 	OUT_nf_events.7.desc:0 "Під час огляду будівлі LOB Enterprises ми виявили лише кілька старих одиниць зброї. Розбиті військові роботи, розкидані по всьому об'єкту, показують, що ми далеко не перші, хто рився в цих руїнах. Тим не менш, гвинтівки поповнять наш арсенал."
  	OUT_nf_events.7.a:0 "Принаймні ми знайшли щось цінне."
	OUT_nf_events.8.title:0 "Добре укомплектовані шафки"
 	OUT_nf_events.8.desc:0 "Огляд будівлі LOB Enterprises дав хороші результати. Пробиваючись через кількох бойових роботів, наша команда змогла отримати доступ до складу, що містив велику кількість військової зброї, яку підрядник займався зворотним інжинірингом."
  	OUT_nf_events.8.a:0 "Чудова робота."
	OUT_nf_events.9.title:0 "Цінні дані"
 	OUT_nf_events.9.desc:0 "Перевірка будівлі LOB Enterprises дала хороші результати. Хоча останнім часом будівлю було повністю очищено від обладнання, кілька терміналів з експериментальними схемами залишилися недоторканими. Дані було скопійовано на голографічні записи та доставлено на базу для подальшого вивчення."
  	OUT_nf_events.9.a:0 "Чудова знахідка!"
	OUT_nf_events.10.title:0 "Приголомшлива знахідка"
 	OUT_nf_events.10.desc:0 "Наша перевірка будівлі LOB Enterprises дала фантастичні результати. Будівля практично не постраждала за останні 200 років завдяки кільком бойовим роботам, які охороняли офіс незадовго до бомбардувань. Наші Захисники швидко розправилися з роботами та провели перевірку будівлі. Всередині вони виявили значну кількість готової зброї, прототипів у процесі виробництва та томи технічних даних. Обладнання та дані повертаються для інвентаризації та аналізу."
  	OUT_nf_events.10.a:0 "Чудова робота!"
	OUT_nf_events.11.title:0 "Жоден камінь не перевернуто"
 	OUT_nf_events.11.desc:0 "Після того, як ми обшукали будівлю LOB Enterprises, сміттярам дозволили зайти й покопатися в руїнах. Добре, що ми їх допустили. Один із старателів виявив потайні двері, яких не було на кресленнях, і кімнату, повну сучасної зброї. Сміттярю виплатили компенсацію за знахідку та допомогли з доставкою до Форту Індепенденс."
  	OUT_nf_events.11.a:0 "Ось чому ми дозволяємо їм ритися в об'їдках."
	OUT_nf_events.12.title:0 "Приблизно те, що ми очікували"
 	OUT_nf_events.12.desc:0 "Захисники, відправлені на завод «Червоний Гонщик», не очікували знайти якісь революційні технологічні дива на старій фабриці іграшок, і виявилися праві. Ми виявили лише кілька трупів і старі машини. Втім, більшу частину обладнання можна було б використати в інших виробничих процесах."
  	OUT_nf_events.12.a:0 "Не марна трата часу."
	OUT_nf_events.13.title:0 "Це... Несподівано"
 	OUT_nf_events.13.desc:0 "Ніхто з Захисників, відправлених на завод «Червоний Гонщик», не очікував знайти там лабораторію, якою керує якийсь божевільний учений-рейдер. Хоча саме поняття вченого-рейдера — свого роду оксиморон, читабельні дослідницькі записи розповіли нам дещо про поведінку диких гульїв. Хоча зараз вони марні, вони могли б нам допомогти, якби якийсь божевільний мешканець пустки зміг зібрати цілу армію диких."
  	OUT_nf_events.13.a:0 "Хто б це міг зробити?"
	OUT_nf_events.14.title:0 "Рейдер Павлов?"
 	OUT_nf_events.14.desc:0 "Ніхто не міг очікувати того, що ми виявили на фабриці «Червоний Гонщик». Ми очікували знайти якісь старі машини, можливо, якісь технічні дані, але не діючу лабораторію, якою керував би божевільний учений-рейдер. Хоча майже всі в нашому ордені посміялися б з ідеї вченого-рейдера, у цього справді був мозок у черепі, перш ніж ми підсмажили його лазерною гвинтівкою. Обсяги даних та експериментів призвели до проривів у розумінні диких гульїв. Більшість у Братстві сказали б, що єдине, що нам потрібно знати про диких гульїв, — це те, що вони вмирають, коли ми в них стріляємо. Однак, якщо ми зможемо повторити ці експерименти, ми зможемо знайти спосіб змусити гульїв атакувати того, кого ми захочемо! \n\n Варто відзначити одну дивну річ. Кілька Захисників повідомили, що чули дивний шепіт в офісі генерального директора."
  	OUT_nf_events.14.a:0 "Створити лабораторію для продовження досліджень."
   	OUT_nf_events.14.b:0 "Спалити це дослідження та зрівняти будівлю з землею."
	OUT_nf_events.15.title:0 "Сміттяр знаходить корисні дані"
 	OUT_nf_events.15.desc:0 "Після того, як наша команда оглянула завод «Червоний Гонщик», сміттярам дозволили покопатися в його залишках. Ми не очікували, що вони знайдуть щось особливо цікаве, але один сміттяр зазирнув у заводський термінал, який ми вважали неважливим. Всередині вони виявили схеми моторизованого триколісного велосипеда «Червоний Гонщик». Звісно, нам це ні до чого. Але самі компактні двигуни можуть бути корисними."
  	OUT_nf_events.15.a:0 "Дуже цікаво."
	OUT_nf_events.16.title:0 "СПРАВЖНЯ КАВОВАРКА"
 	OUT_nf_events.16.desc:0 "Кавоварки практично вийшли з ладу за останні 200 років, оскільки довоєнні запаси кави вичерпалися. Коли Слокум Джо почав розливати каву направо й наліво своїм друзям-сміттярам, ми запідозрили недобре, але не надто занепокоїлися. Зрештою, кого хвилює, що він знайшов склад старої меленої кави? Його секрет був насправді набагато цікавішим. Він знайшов не склад, повний зерен, а машину, здатну перетворювати матерію на кавові зерна. Ми знайшли повідомлення про створення подібних пристроїв незадовго до війни, але пристрій, призначений тільки для кави, здається марнотратним."
  	OUT_nf_events.16.a:0 "Це не означає, що ми не можемо цим користуватися."
	OUT_nf_events.17.title:0 "СПРАВЖНЯ КАВОВАРКА"
 	OUT_nf_events.17.desc:0 "Кавоварки практично вийшли з ладу за останні 200 років, оскільки довоєнні запаси кави вичерпалися. Коли Слокум Джо почав розливати каву направо й наліво своїм друзям-сміттярам, ми запідозрили недобре, але не надто занепокоїлися. Зрештою, кого хвилює, що він знайшов склад старої меленої кави? Його секрет був насправді набагато цікавішим. Він знайшов не склад, повний зерен, а машину, здатну перетворювати речовину на кавові зерна, а також плівки, що дозволяють виробляти каву вищої якості. Ми знайшли повідомлення про створення подібних пристроїв незадовго до війни, але пристрій, призначений тільки для кави, здається марнотратним."
  	OUT_nf_events.17.a:0 "Це не означає, що ми не можемо цим користуватися."
	OUT_nf_events.18.title:0 "СПРАВЖНЯ КАВОВАРКА"
 	OUT_nf_events.18.desc:0 "Кавоварки в основному вийшли з ладу за останні 200 років, оскільки довоєнні запаси кави вичерпалися. Коли Слокум Джо почав розливати каву направо й наліво своїм друзям-сміттярам, ми запідозрили недобре, але не надто занепокоїлися. Зрештою, кого хвилює, що він знайшов склад старої меленої кави? Його секрет був насправді набагато цікавішим. Він знайшов не склад, повний зерен, а машину, здатну перетворювати речовину на кавові зерна, а також плівки, що дозволяють їй виробляти каву вищої якості. Ми знайшли повідомлення про створення подібних пристроїв незадовго до війни, але пристрій, призначений тільки для кави, здається марнотратним. \n\n На щастя, наші писарі знайшли дані, які, на їхню думку, дозволять нам виробляти за його допомогою інші дрібні предмети."
  	OUT_nf_events.18.a:0 "Більше ніяких знайдених стимуляторів для нас."
	OUT_nf_events.19.title:0 "Кава, смажена у фритюрі"
 	OUT_nf_events.19.desc:0 "Після того, як наша команда пройшла через штаб-квартиру «Слокум Джо», сміттярам дозволили покопатися в залишках. Ми не очікували, що вони знайдуть щось особливо цінне після того, як кілька команд пройшли об'єктом після битви зі сміттярами Джо. Щодо більшості сміттярів, ми мали рацію. Один сміттяр все ж таки здивував нас. У маркетинговому крилі вони виявили кімнату з кількома військовими вогнеметами. У документах до обладнання згадувалася якась акція, спонсорована військовими, у якій вони обсмажували кавові зерна за допомогою бойової зброї."
  	OUT_nf_events.19.a:0 "Їхня дурна маркетингова кампанія — наш зиск!"
	OUT_nf_events.20.title:0 "Війна за Столичну Пустку"
 	OUT_nf_events.20.desc:0 "Столична Пустка спалахнула ще більшим насильством, ніж зазвичай, з появою Анклаву. Лайонс і його команда вже деякий час б'ються з ними, і з Форту Індепенденс досі неясно, хто переміг. Ми знаємо напевно, що будь-який результат радикально змінить обставини нашої місії. Вкрай важливо зв'язатися з Лост-Хіллс, щоб доповісти про ситуацію та запросити нові накази."
  	OUT_nf_events.20.a:0 "Будьте готові!"
	OUT_nf_events.21.title:0 "Безкровні шати"
 	OUT_nf_events.21.desc:0 "Якщо якась група з відділення Лайонса й невинна в його зраді, то це, ймовірно, писарі. Більшість із них не билися з нами, і їхня робота на відділення-відступників загалом відповідала нашій місії. Деякі в нашому ордені стверджують, що, незважаючи на свої обов'язки та відсутність прямої участі в битві з нами, вони виступили проти Кодексу, не приєднавшись до нас, і допомагали лицарям-відступникам, які билися з нами, зберігаючи їхнє спорядження."
  	OUT_nf_events.21.a:0 "Дозволити писарям повернутися."
   	OUT_nf_events.21.b:0 "Вигнати писарів."
	OUT_nf_events.21.c:0 "Стратити писарів."
	OUT_nf_events.22.title:0 "Паладини-відступники"
 	OUT_nf_events.22.desc:0 "Якщо якась група з поплічників Лайонса й заслуговує на провину, то це керівництво, яке підкорилося його зрадницьким наказам. Вони витрачали ресурси на десятиліття марних зусиль, порушували незліченні директиви і навіть боролися з нами, коли ми намагалися вирішити ці проблеми. Незважаючи на їхні незліченні злочини, у відділенні все ще є ті, хто вимагає милосердя. Вони вказують, що ми теж десятиліттями підкорялися цим наказам, і ми не повинні карати тих, хто нарешті усвідомив правду, за те, що їм знадобилося на кілька років більше часу."
  	OUT_nf_events.22.a:0 "Дозволити керівництву приєднатися до нас."
   	OUT_nf_events.22.b:0 "Дозволити їм знову приєднатися, як лицарям."
	OUT_nf_events.22.c:0 "Вигнати керівництво."
 	OUT_nf_events.22.d:0 "Стратити керівництво."
	OUT_nf_events.23.title:0 "Заплутані звання"
 	OUT_nf_events.23.desc:0 "Мало хто в наших лавах прагне крові навіть за тих братів, що билися з нами. Мешканці пусток, якими Лайонс наповнив свої лави після нашого відходу, — це зовсім інша історія. Чимало хто не вважає цих нікчем гідними звання Лицаря. Тим не менш, ці мешканці пусток перемогли Анклав. Дехто скаже, що заради цього завдання варто прийняти їх до нашого ордену."
  	OUT_nf_events.23.a:0 "Вони заслужили своє звання."
   	OUT_nf_events.23.b:0 "Повторна ініціація тих, хто готовий почати спочатку."
	OUT_nf_events.23.c:0 "Мешканці пусток нам не брати."
 	OUT_nf_events.23.d:0 "Вигнати їх усіх."
  	OUT_nf_events.23.e:0 "Стратити їх усіх!"
	OUT_nf_events.24.title:0 "Послання від Вигнанців"
 	OUT_nf_events.24.desc:0 "Невдовзі після поразки Анклаву та смерті старейшини Лайонса ми почали помічати зниження активності вигнанців поблизу нашої території. Розвідники та патрулі, покликані стежити за Цитаделлю, відступили. Головні теорії полягали в тому, що вони зосередилися на пошуку технологій Анклаву або, можливо, готувалися до відправки на захід. Тепер ми знаємо, що обидві ці теорії помилкові. Насправді вони намагалися розрядити обстановку, готуючись до налагодження контакту з нами. Лідер цієї групи вигнанців, протектор Касдін, відправив посланця з пропозицією припинити військові дії. Хоча він і його група, як і раніше, вважають нас такими, що порушують Кодекс, вони визнають, що наші методи могли відіграти свою роль у нашому успіху. Вони чітко дали зрозуміти, що це не прохання про повернення в наші лави, а їхня готовність припинити бойові дії та співпрацювати. Якщо ми відхилимо їхню пропозицію, нам слід підготуватися до відновлення конфлікту."
  	OUT_nf_events.24.a:0 "Прийняти їхню пропозицію."
   	OUT_nf_events.24.b:0 "Жодної дружби з Вигнанцями."
	OUT_nf_events.25.title:0 "Пропозиція Ферфакса"
 	OUT_nf_events.25.desc:0 "Вигнанці пронюхали про багатство технологій, яке ми знайшли на авіабазі Адамс, і тепер хочуть їх отримати. Ми отримали пропозицію, яка дає їм право збирати та забирати передові технології з бази в обмін на відведення військ із руїн на півдні округу Колумбія. Ця угода не така небезпечна, як їхня перша, тож нам не варто очікувати нічого, окрім образ, якщо ми від неї відмовимося."
  	OUT_nf_events.25.a:0 "Прийняти угоду."
   	OUT_nf_events.25.b:0 "Відхилити угоду."
	OUT_nf_events.26.title:0 "Жодних невизначених умов"
 	OUT_nf_events.26.desc:0 "Старейшина Лайонс нещодавно відвідала Форт Індепенденс, щоб зустрітися з Протектором Касдіном. Вона була, м'яко кажучи, незадоволена. Зустріч тривала кілька годин і більше нагадувала перепалку, ніж обговорення лідерів, але її можна охарактеризувати однією цитатою старейшини. \n\n §BВи називаєте нас слабкими, але ви бігли й ховалися, поки супермутанти спустошували Столичну Пустку. Ви нічого не зробили для боротьби з Анклавом, і я не бачив жодного з вас на авіабазі Адамс! Я не кажу, що вам потрібно приєднуватися до водних караванів, але якщо ми десь там, стримуючи загрозу або захоплюючи технології, я очікую побачити чорно-червоні обладунки. А поки я скажу вам, куди ви можете засунути свою думку про моїх лицарів!§! \n\n Коли обмін думками закінчився, Старейшина та її прайд пішли. Можна з упевненістю сказати, що обмін думками вплинув на Касдіна, який після відходу Старейшини сказав тільки одне."
  	OUT_nf_events.26.a:0 "«Я побачив той самий вогонь, який колись був в очах її батька.»"
	OUT_nf_events.27.title:0 "Повернення Цитаделі"
 	OUT_nf_events.27.desc:0 "Цитадель виявилася місцем найзапекліших боїв проти Анклаву. Ці мерзотники, не гаючи часу, увійшли туди, перебивши наших колишніх братів. Бої точилися на близькій дистанції, зал за залом, кімната за кімнатою. У боях будівля була настільки сильно пошкоджена, що ми вирішили залишити Форт Індепенденс нашою основною базою. Спроби виправити збитки були б марною тратою ресурсів. Тим не менш, у руїнах можна знайти багато цінного."
  	OUT_nf_events.27.a:0 "Продовжуйте копати."
	OUT_nf_events.28.title:0 "Білий слон?"
 	OUT_nf_events.28.desc:0 "Проект «Чистота» десятиліттями був нав'язливою ідеєю багатьох світлих умів. Коли він нарешті запрацював, Анклав розкрив себе й кинув усі сили на те, щоб утримати його під своїм контролем. Цей очищувач, здатний виробляти практично необмежений запас прісної води, безсумнівно, становить величезну цінність. Однак для його підтримки знадобляться значні трудовитрати та ресурси. Можливо, ми зможемо окупити ці витрати, продаючи воду, але, можливо, ми могли б і продати установку безпосередньо тому, хто віддасть перевагу їй."
  	OUT_nf_events.28.a:0 "Захопити проект «Чистота» і продавати воду."
   	OUT_nf_events.28.b:0 "Пропозиція про продаж проекту Рівет-Сіті."
	OUT_nf_events.28.c:0 "Ніхто це не купить."
	OUT_nf_events.29.title:0 "Нові накази"
 	OUT_nf_events.29.desc:0 "Коли ми зв'язалися з Лост-Хіллс, ми з подивом виявили, що їм відомо про нашу ситуацію більше, ніж ми очікували. Природно, вони були розчаровані тим, як розвиваються події на сході. Однак вони згодні, що якщо хтось і може виправити становище, то це Касдін. Вони призначили його старейшиною і доручили йому продовжити початкову місію ордену. Найближчими місяцями слід очікувати підкріплення."
  	OUT_nf_events.29.a:0 "Ми більше не підведемо."
	OUT_nf_events.30.title:0 "Війна за Столичну Пустку"
 	OUT_nf_events.30.desc:0 "Столична Пустка спалахнула ще більшим насильством, ніж зазвичай, з появою Анклаву. Лайонс і його команда вже деякий час б'ються з ними, і з Форту Індепенденс досі неясно, хто переміг. Ми знаємо, що будь-який результат радикально змінить обставини нашої місії. Вкрай важливо зв'язатися з Лост-Хіллс, щоб доповісти про ситуацію та запросити нові накази. Як не дивно, наш дослідницький центр на заводі «Червоний Гонщик» не поділяє цього відчуття терміновості і запитує додаткові ресурси. Вони кажуть, що знаходяться на порозі чогось великого, порівняно з чим відродження Анклаву — мізерна дрібниця."
  	OUT_nf_events.30.a:0 "Ігноруйте їх."
   	OUT_nf_events.30.b:0 "Відправте їм усе, що їм потрібно."
	OUT_nf_events.31.title:0 "Закинутий об'єкт «Червоний Гонщик»"
 	OUT_nf_events.31.desc:0 "Планова перевірка поставок у дослідницький центр на заводі «Червоний гонщик» показала, що об'єкт закинутий. Захисники та спеціалісти, відповідальні за роботу центру, зникли безвісти, як і їхнє обладнання та дослідницькі записи. Захисники, відправлені на розвідку, не виявили жодних слідів бойових дій і виявили лише одну зачіпку, що вказує на місцезнаходження зниклої команди. \n\n На стіні кабінету генерального директора написане слово «Ґ'Єт!»."
	OUT_nf_events.31.a:0 "Дивно..."
 	OUT_nf_events.32.title:0 "Рівет-Сіті приймає нашу пропозицію"
  	OUT_nf_events.32.desc:0 "Рівет-Сіті прийняв нашу пропозицію про продаж їм контролю над проектом «Чистота». Вони погодилися надати нам частку води, а також ряд цінних технологій."
   	OUT_nf_events.32.a:0 "Справедлива торгівля."
	OUT_nf_events.33.title:0 "Рівет-Сіті відхиляє нашу пропозицію"
 	OUT_nf_events.33.desc:0 "Рівет-Сіті відхилив нашу пропозицію про продаж їм контролю над проектом «Чистота». Схоже, нам доведеться скористатися цим об'єктом, якщо ми хочемо отримати з нього хоч якусь вигоду."
  	OUT_nf_events.33.a:0 "Не завадило б спробувати."
   	OUT_nf_events.34.title:0 "Пропозиція Вигнанців"
	OUT_nf_events.34.desc:0 "Вигнанці Братства запропонували нам взяти під контроль проект «Чистота» за умови, що ми виплатимо їм за це компенсацію. Їхнє прохання складалося з двох частин. По-перше, вони хочуть регулярно поставляти у свій форт частину води. По-друге, їм потрібна значна кількість технологій."
 	OUT_nf_events.34.a:0 "Прийняти їхню пропозицію."
  	OUT_nf_events.34.b:0 "У нас немає технологій, але в нас є кришки."
   	OUT_nf_events.34.c:0 "Відхилити їхню пропозицію."
	OUT_nf_events.35.title:0 "Немає відповіді"
 	OUT_nf_events.35.desc:0 "Ми не отримали відповіді від Вищих Старейшин із заходу. Це змусило багатьох припустити, що бункер у Лост-Хіллс або перебуває в режимі радіомовчання, або був знищений. Ходять навіть чутки, що це могла бути НКР! Можливо, це занадто самовпевнено, але нам залишається припустити, що Касдін — найвищий за рангом член Братства. Таким чином, тепер він Старейшина."
  	OUT_nf_events.35.a:0 "Ми просто хочемо, щоб це не сталося так."
   	OUT_nf_events.36.title:0 "Вхід до депо"
	OUT_nf_events.36.desc:0 "Незважаючи на те, що роботи відлякували мародерів майже 200 років, схоже, їх нещодавно подолали. У коридорах складу досі виблискують іскрами уламки роботів-охоронців і протектронів. З об'єкта вивезли майже все цінне, навіть бункер унизу пограбували. Відправлена туди команда вважає, що ми, можливо, запізнилися лише на кілька днів."
 	OUT_nf_events.36.a:0 "Чорт."
   	OUT_nf_events.37.title:0 "Вхід до депо"
	OUT_nf_events.37.desc:0 "Зрозуміло, чому склад Національної гвардії залишався практично недоторканим останні два століття. Нашим Захисникам довелося пробиватися крізь таку кількість сторожових роботів і протектронів, що на той час, як вони дісталися арсеналу, у них ледве вистачило боєприпасів на дорогу додому. Вони повернулися з хорошими і поганими новинами. Хороша новина в тому, що бункер арсеналу все ще запечатаний. Погана новина в тому, що вони не можуть зламати термінал. Ще одна хороша новина полягає в тому, що вони знайшли запис у терміналі, який, схоже, дав нам зрозуміти, що існують голографічні записи, які можуть допомогти нам отримати доступ."
 	OUT_nf_events.37.a:0 "Давайте подивимося!"
   	OUT_nf_events.38.title:0 "Вхід до Константина"
	OUT_nf_events.38.desc:0 "Наша група, відправлена на розвідку форту Константин, зіткнулася з жорстоким опором іншої групи солдатів у силовій броні. Їхні обладунки не були схожі на жодні з відомих нам обладунків, і їх прозвали «Чорним дияволом» через рогоподібні наконечники на шоломах. Після тривалої перестрілки їм довелося відступити. Ким би не були ці люди, вони були добре екіпіровані та навчені."
 	OUT_nf_events.38.a:0 "Будьте пильні."
   	OUT_nf_events.39.title:0 "Вхід до Вітона"
	OUT_nf_events.39.desc:0 "Арсенал Вітона захоплений мешканцями пустки. Вони активно виносять звідти все цінне, але з радістю розлучаються з цінною технікою та обладнанням за відносно невеликі гроші. Штурмові гвинтівки, мінігани, лазерні гвинтівки — все це практично задарма. За таких цін це, можливо, наш єдиний шанс отримати їх, поки вони не зникли."
 	OUT_nf_events.39.a:0 "Купити штурмові гвинтівки."
  	OUT_nf_events.39.b:0 "Купити мінігани."
   	OUT_nf_events.39.c:0 "Купити лазерні гвинтівки."
	OUT_nf_events.39.d:0 "Ми заберемо весь ваш запас."
 	OUT_nf_events.40.title:0 "Вхід до Вітона"
	OUT_nf_events.40.desc:0 "Арсенал Вітона захоплений мешканцями пусток. Вони активно вигрібають звідти все цінне і не збираються ділитися. Хоча ми не проти звичайного сміття з пусток, ця група добре озброєна важкою зброєю з арсеналу. Наша команда відступила і запропонувала нам наглядати за об'єктом, але в іншому вважаємо його втраченим."
 	OUT_nf_events.40.a:0 "Чорт, ми запізнилися!"
   	OUT_nf_events.41.title:0 "Вхід до Вітона"
	OUT_nf_events.41.desc:0 "Наша команда швидко розправилася з рейдерським відреб'ям, що зайняло арсенал Вітона. Вони виявилися на диво погано екіпірованими для групи, що знаходилася на території арсеналу. Усередині ми з'ясували причину: приміщення було затоплене радіацією, і багато дверей все ще були замкнені. На щастя, наша силова броня дозволила нам без проблем пробратися, і ми закріпили обладнання всередині. Зараз його везуть назад на базу для нашого використання."
 	OUT_nf_events.41.a:0 "Чудова робота!"
   	OUT_nf_events.42.title:0 "Вхід до антени NN-03"
	OUT_nf_events.42.desc:0 "Об'єкт був повний рейдерів, з якими наша команда швидко розправилася. Усередині вони виявили дуже мало цінного обладнання та техніки. Жоден із супутників, з якими цей об'єкт мав зв'язуватися, схоже, більше не знаходиться на орбіті. Тим не менш, вони знайшли комплект креслень об'єкта, який може допомогти нам з нашими власними комунікаційними технологіями."
 	OUT_nf_events.42.a:0 "Краще, ніж нічого."
   	OUT_nf_events.43.title:0 "Вхід до Константина"
	OUT_nf_events.43.desc:0 "Наша команда, відправлена на дослідження форту Константин, зуміла пробитися крізь полчища роботів і дикунів. База була практично розграбована, але за захищеними дверима вони виявили арсенал, повний комплектів силової броні!"
 	OUT_nf_events.43.a:0 "Яка чудова знахідка!"
  	OUT_nf_events.44.title:0 "Повернення Бостонської експедиції"
   	OUT_nf_events.44.desc:0 "Наша експедиція до Бостона повернулася з таким же обсягом даних та обладнання, як і експедиція Лайонса. Вони повідомляють про велику кількість військових баз, технічних споруд та лабораторій, готових до дослідження. Можна з упевненістю сказати, що Бостон — майже таке ж підходяще місце для облаштування, яким був Вашингтон, коли ми вперше прибули. Можливо, колись нам варто подумати про переїзд або створення постійного форпосту."
	OUT_nf_events.44.a:0 "Можливо, колись."
  	OUT_nf_events.45.title:0 "Повернення Нью-Йоркської експедиції"
   	OUT_nf_events.45.desc:0 "Наша експедиція до Нью-Йорка повернулася, і їхні знахідки приблизно відповідають результатам експедиції Лайонса. Місто сповнене різних банд і орд мутантів, що борються за владу. Ні в кого з них, схоже, не було нічого, що могло б нас особливо зацікавити. Можна з упевненістю припустити, що все цінне було або давно розграбовано, або зарите так глибоко, що для доступу до нього знадобляться колективні зусилля всього міста. Але цього їм, швидше за все, ніколи не досягти."
	OUT_nf_events.45.a:0 "Тоді наразі краще це проігнорувати."
  	OUT_nf_events.46.title:0 "Повернення Аппалачської експедиції"
   	OUT_nf_events.46.desc:0 "Як ми й очікували, добряки Лайонса були надто зайняті пошуками давно мертвого відділення, щоб навіть думати про пошук технологій. Ми знайшли безліч цікавих предметів обладнання і повертаємо їх для подальшого вивчення."
	OUT_nf_events.46.a:0 "Ось чому потрібно шукати креслення, а не тіла."
  	OUT_nf_events.47.title:0 "Повернення експедиції з Ронто"
   	OUT_nf_events.47.desc:0 "Тривожні новини прийшли з нашою експедицією на Ронто, і тепер ми знаємо, чому експедиція Лайонса була така мовчазна. Вони виявили, що значна група солдатів анклаву захопила місто і поневолює населення. На щастя, ці солдати виявилися менш компетентними, ніж ті, з якими ми зіткнулися у Вашингтоні. Наша експедиція змогла обійти їхні патрулі та захопити цінне спорядження після серії засідок. Наші розвідники дійшли висновку, що з часом вони можуть стати проблемою, але зараз вони не становлять особливої загрози для наших операцій."
	OUT_nf_events.47.a:0 "Як вони продовжують з'являтися?"
  	OUT_nf_events.48.title:0 "Повернення експедиції з Ронто"
   	OUT_nf_events.48.desc:0 "Тривожні новини прийшли з нашою експедицією на Ронто, і тепер ми знаємо, чому експедиція Лайонса була така небагатослівна. Хоча місто виглядає схожим на інші руїни пустки, на ньому видно явні сліди нещодавньої активності Анклаву. Місцеві жителі досить мовчазно розповідали про ситуацію, але нам вдалося дізнатися лише те, що вони відбили атаку Анклаву самостійно за допомогою армії роботів. Якщо ці мешканці пустки змогли відбити атаку настільки просунутого угруповання, як Анклав, у майбутньому вони можуть стати серйозною проблемою."
	OUT_nf_events.48.a:0 "Марнотратник все одно марнотратник."
	OUT_nf_events.49.title:0 "Вигнанці з Вигнанців"
 	OUT_nf_events.49.desc:0 "Вигнанці Братства стали уникати наших земель, щойно зрозуміли, що поблизу немає жодної фабрики з виробництва тостерів. Тому, коли їх велика кількість з'явилася на горизонті, ополченці були здивовані, але готові. Вони прийшли без насильства і хотіли поговорити з нашими лідерами про щось, що виявили на фабриці «Червоний гонщик». Про щось древнє, що привело їх на болота Пойнт-Лукаута."
  	OUT_nf_events.49.a:0 "Приведіть їх до Блекхолла."
   	OUT_nf_events.49.b:0 "Це звучить не по-американськи. Дайте їм відсіч!"
	OUT_nf_events.50.title:0 "Щось... Інакше"
 	OUT_nf_events.50.desc:0 "Невдовзі після того, як ми відправили запитувані ресурси нашим дослідникам на заводі «Червоний гонщик», спеціаліст Олін запросила у Протектора Касдіна відвідування об'єкта. Відколи він повернувся, у ньому щось змінилося. Він віддає незвичайні накази, часто перериває розмову, спрямовуючи погляд у простір, і принаймні троє Захисників виявили його стоячим посеред коридорів Індепенденса серед ночі. \n\n Його останній наказ виявився найдивнішим з усіх. Він наказує нам відправити десятки Захисників і Спеціалістів на Пойнт-Лукаут, місце, яке в кращому випадку має мінімальну технологічну цінність."
  	OUT_nf_events.50.a:0 "Він напевно знає щось, чого ми не знаємо. Збирайся!"
	OUT_nf_events.51.title:0 "Однодумці"
 	OUT_nf_events.51.desc:0 "Всі в Андейлі знали про невелику суперечку між членами Братства Сталі. Вони ніколи не становили особливої загрози найбільшому місту Америки, але коли до Андейлу наближалося безліч Вигнанців, деякі з нас занепокоїлися. Однак, схоже, наші сусіди завітали до нас побалакати. Їхні лідери цікавилися тими ж справами, що й Блекхолл, і висловили бажання працювати з ним."
  	OUT_nf_events.51.a:0 "Ласкаво просимо до нового братства."
   	OUT_nf_events.52.title:0 "Друзі з Боліт?"
 	OUT_nf_events.52.desc:0 "Болотяники Пойнт-Лукаута відомі своєю ворожістю до чужинців. Вони вбивають і, за чутками, їдять усіх, хто трапляється їм на шляху з-за меж Пойнт-Лукаута. Це одна з причин, чому Пойнт-Лукаут в основному уникають. Експедиційна команда Касдіна була на взводі через кілька не пов'язаних між собою інцидентів останніх ночей і була готова до перестрілки, але болотяники не втручалися. Більше того, вони підійшли до нашої експедиції і запропонували трохи їжі та пляшку самогону. Команда швидко зрозуміла, що такий позитивний прийом був викликаний дивними символами, які Касдін надряпував уночі на бронекостюмах Захисників. Схоже, цей символ мав якесь значення для болотяників і вказував їм на те, що ми друзі."
  	OUT_nf_events.52.a:0 "Звідки він дізнався цей символ?"
   	OUT_nf_events.53.title:0 "Повернення з Пойнт-Лукаута"
 	OUT_nf_events.53.desc:0 "Експедиція Касдіна повернулася з Пойнт-Лукаута з величезним уловом чогось. Це було не те, що ми очікували, а ящики за ящиками дивних ідолів, дивних ляльок і один великий обеліск з незрозумілого каменю. Ніхто з тих, хто повернувся, не говорив про те, що вони знайшли на болоті. Після їхнього повернення Касдін увійшов у свою кімнату з наказом не турбувати його, окрім спеціаліста Олін. Протягом наступних кількох днів спеціаліст приводив до кімнати Касдіна різних захисників, спеціалістів і навіть парочку протекторів. Кожен виходив приблизно через годину, наполягаючи на тому, що їм наказано зберігати в таємниці те, що обговорювалося. На той час, як Касдін повернувся через 6 днів, більше половини мешканців Форту Індепенденс відвідали протектора. Ті, хто не помітив, що їхні брати та сестри поводяться по-іншому. Ніхто з них, здавалося, не здивувався, коли Касдін оголосив, що Олін підвищується до головного спеціаліста, і її накази були такими ж, як і в нього."
  	OUT_nf_events.53.a:0 "Що, в біса, сталося на тому болоті?"
   	OUT_nf_events.54.title:0 "Зміна пріоритетів"
	OUT_nf_events.54.desc:0 "Тижнями протектор Касдін змушував усіх у Форті Індепенденс збирати розвіддані, запасатися припасами та готувати плани битви. Все змінилося після прибуття спеціаліста Олін та її команди з заводу «Червоний гонщик». Відтоді протектор Касдін повністю змінився. Тепер він наказує нам готуватися до експедиції на Пойнт-Лукаут."
  	OUT_nf_events.54.a:0 "Що б вони не знайшли, це має бути щось величезне."
   	OUT_nf_events.55.title:0 "Опівнічний ритуал"
 	OUT_nf_events.55.desc:0 "На наших форпостах проводилися ритуали, подібні до тих, що Олін проводила зі своїми найближчими послідовниками біля Данвічського обеліска. Сотні голосів співали в небо під місяцем. \n \n Уг-Куалтот знає браму. \n \n Уг-Куалтот – це брама. \n \n Уг-Куалтот – ключ і страж брами! \n \n Потім відбулися жертвоприношення та все складніші співи. Години кровопролиття, різанини полонених і незрозумілі співи тривали до самої ночі. Перед самим світанком почалися зміни. Ті, хто співав, відчували, як їхні кістки скручуються, плоть злазить, а органи болять, коли вони перетворюються. Світло сонця здавалося тьмянішим, освітлюючи Форт-Індепенденс та його жителів."
  	OUT_nf_events.55.a:0 "§0Угоду укладено."
   	OUT_nf_events.56.title:0 "Контакт втрачено"
	OUT_nf_events.56.desc:0 "Команда, відправлена нами на пошуки Піп-боя, не повернулася. Вони вже давно вийшли з призначеного терміну. Залишається тільки припустити, що вони загубилися."
 	OUT_nf_events.56.a:0 "Таке життя в Столичній Пустці."
  	OUT_nf_events.57.title:0 "Пошукова група зазнала нападу"
   	OUT_nf_events.57.desc:0 "Під час пошуків працюючого Піп-боя наша пошукова група зазнала нападу. Вони вступили в бій з нападниками і відбилися, перш ніж повернутися на базу. На жаль, вони зазнали втрат і повернулися ні з чим."
	OUT_nf_events.57.a:0 "Звичайне явище у Вашингтоні."
 	OUT_nf_events.58.title:0 "Пошукова група нічого не знайшла"
  	OUT_nf_events.58.desc:0 "Наша пошукова група обстежила три місця, в яких імовірно знаходився Піп-Бой, але нічого не знайшла."
   	OUT_nf_events.58.a:0 "Добре, що в нас є багато інших зачіпок."
	OUT_nf_events.59.title:0 "Піп-бой знайдено!"
	OUT_nf_events.59.desc:0 "Наша пошукова група, відправлена на пошуки Піп-Боя, нарешті повернулася з ним. Як не дивно, вони дуже мовчать про те, яку саме зачіпку вони дослідили і що їм довелося для цього зробити."
 	OUT_nf_events.59.a:0 "Це дивно, але в нас є важливіші справи!"

