    nf_out.5.a_tt:0 "Люди повернуться після завершення експедиції. Але не всі."
    OUT_explored_forts_tt:0 "Ми дослідили незайняті форти в Столичній Пустці"
    OUT_outside_pipboy_help_tt:0 "Ми приймаємо допомогу від мешканця пустки з Піп-боєм."
    OUT_refuse_pipboy_help_tt:0 "Розблокує рішення для пошуку робочого Піп-Боя."
    OUT_explore_outside_tt:0 "Розблокує рішення для відправки експедицій за межі Столичної Пустки."
    OUT_robot_army_tt:0 "Наші роботи готові до бою."
    OUT_mixed_army_tt:0 "Наші солдати та роботи готові до бою."
    OUT_enforcer_army_tt:0 "Наші Захисники готові до боротьби."
    OUT_pa_army_tt:0 "Наші могутні Захисники готові до битви."
    OUT_keep_out_tt:0 "Ми безперешкодно прочісуємо руїни, але ми не можемо обшукувати всі місця самотужки..."
    OUT_limited_dealings_tt:0 "Мародери можуть знаходити те, чого нам не вистачає, але іноді вони можуть ставати на нашому шляху."
    OUT_sowing_chaos_tt:0 "Коли ми атакуємо зрадників, наші агенти вкинуть їх у хаос!"
    OUT_will_fight_lyons_tt:0 "§OМи будемо готуватися до війни з Відділенням Лайонса§!"
	OUT_will_join_lyons_tt:0 "§CМи постараємося налагодити стосунки з Лайонсом, якщо тільки вони не вчинять якусь дурницю.§!"
    OUT_civil_war_tt:0 "§RЦе покладе початок війні за захоплення Відділення Лайонса та призначення Касдіна старейшиною.§!"
    OUT_follow_up_tt:0 "Відкриває доступ до рішень для продовження експедицій відділення Лайонса."
    OUT_will_avenge_lyons_tt:0 "§YМи знищимо Анклав і помстимося за наших полеглих братів§!"
	OUT_ghoul_tt:0 "§RМи не знаємо, що з цього вийде...§!"
 	OUT_mercy_tt:0 "§CЯкщо ми проявимо милосердя до цих братів, ми повинні проявити милосердя і до інших§!"
	OUT_woodward_tt:0 "Вудворд не залишився в Цитаделі."
 	OUT_join_andale_tt:0 "§RМи приєднаємося до Андейла в їхніх культистських практиках§!"
  	OUT_something_wrong_tt:0 "Вигнанці не з'їхали з глузду."
	OUT_what_find_tt:0 "Хто знає, що ми знайдемо?"
	OUT_hunting_tapes_tooltip:0 "Розблокує рішення на пошуки записів Келлера."

    ###########
    ###Ideas###
    ###########
	OUT_ghoul_fighter_idea:0 "Дослідження гульїв"
 	OUT_ghoul_fighter_idea_desc:0 "Дані досліджень, зібрані на заводі «Червоний гонщик», відкрили нам дещо, чого ми не знали про диких. Якщо нам коли-небудь доведеться зіткнутися з їхньою численною армією, у нас буде пара козирів у рукаві."
  	OUT_materials_printer_idea:0 "Перепрограмований принтер"
	OUT_materials_printer_idea_desc:0 "Прототип кавоварки, яку Слокум Джо використовував для приготування кави, здатний виробляти й інші дрібні предмети. Наші спеціалісти працюють над її перепрограмуванням для виробництва запасних частин, кількість яких обмежена."
 	OUT_welcomed_scribes_idea:0 "Писарі Лайонса"
  	OUT_welcomed_scribes_idea_desc:0 "Писарі з Відділення Лайонса допущені до наших лав. Час від часу вони конфліктують з нашими спеціалістами, але в іншому все йде гладко."
   	OUT_keeping_purity_idea:0 "Торговий пост на проекті «Чистота»"
	OUT_keeping_purity_idea_desc:0 "Робота в проекті «Чистота» — це те завдання, якого бояться всі спеціалісти та захисники. Це не збройова лабораторія чи щось особливе, але продаж води допомагає нам отримувати матеріали, критично важливі для нашої місії."
 	OUT_certainty_of_steel_idea:0 "Сталева впевненість"
  	OUT_certainty_of_steel_idea_desc:0 "У нас недостатньо сил, щоб виставити велику кількість Захисників. Натомість ми розгорнемо армію перепрограмованих машин для захисту наших операцій."
	OUT_mighty_machines_idea:0 "Сталева впевненість"
  	OUT_mighty_machines_idea_desc:0 "У нас недостатньо сил, щоб виставити велику кількість Захисників. Натомість ми розгорнемо армію перепрограмованих машин для захисту наших операцій."  	
	OUT_many_machines_idea:0 "Сталева впевненість"
  	OUT_many_machines_idea_desc:0 "У нас недостатньо сил, щоб виставити велику кількість Захисників. Натомість ми розгорнемо армію перепрограмованих машин для захисту наших операцій." 
   	OUT_mixed_approach_idea:0 "Роботизована підтримка"
	OUT_mixed_approach_idea_desc:0 "Перепрограмовані роботи поповнюють наші лави та супроводжують наших Захисників на полі бою."
   	OUT_mixed_tough_idea:0 "Роботизована підтримка"
	OUT_mixed_tough_idea_desc:0 "Перепрограмовані роботи поповнюють наші лави та супроводжують наших Захисників на полі бою."
    OUT_mixed_deadly_idea:0 "Роботизована підтримка"
	OUT_mixed_deadly_idea_desc:0 "Перепрограмовані роботи поповнюють наші лави та супроводжують наших Захисників на полі бою."
 	OUT_strong_troops_idea:0 "Стійкі захисники"
  	OUT_strong_troops_idea_desc:0 "Нестачу чисельності ми компенсуємо найкращою підготовкою та спорядженням."
 	OUT_strong_armor_idea:0 "Стійкі захисники"
  	OUT_strong_armor_idea_desc:0 "Нестачу чисельності ми компенсуємо найкращою підготовкою та спорядженням."
 	OUT_mixed_armor_idea:0 "Стійкі захисники"
  	OUT_mixed_armor_idea_desc:0 "Нестачу чисельності ми компенсуємо найкращою підготовкою та спорядженням."
   	OUT_lyons_preparation_idea:0 "Бойові навчання в силовій броні"
	OUT_lyons_preparation_idea_desc:0 "Наші Захисники готуються до бою з солдатами в силовій броні."
 	OUT_scribe_cooperation_idea:0 "Співпраця писарів"
  	OUT_scribe_cooperation_idea_desc:0 "Писарі з Цитаделі діляться нотатками з нашими спеціалістами."
   	OUT_synnergy_idea:0 "Синергія гульїв"
	OUT_synnergy_idea_desc:0 "З ордою диких гульїв важко боротися. Орда диких гульїв, підтримувана солдатами в силовій броні, — це кошмар."
 	OUT_unknowable_idea:0 "Непізнавані прозріння"
  	OUT_unknowable_idea_desc:0 "Наші дослідження прихованих істин всесвіту допомогли нам у вивченні більш звичайних речей, таких як сівозміна."
   	OUT_accolytes_idea:0 "Аколити"
	OUT_accolytes_idea_desc:0 "Мешканці пусток, які шукають знання, якими володіємо ми, можуть довести свою цінність, борючись і помираючи заради досягнення наших цілей."
 	OUT_blackhall_leadership_idea:0 "Лідерство Блекхолла"
  	OUT_blackhall_leadership_idea_desc:0 "Блекхолл показує нам шляхи послідовників Уг-Куалтота."
    
    ######################
    ###National Focuses###
    ######################
    OUT_nf_a001:0 "Пакування речей"
    OUT_nf_a001_desc:0 "Ми знали, що прийшов час іти, але ми не збиралися йти з порожніми руками."
    OUT_nf_a002:0 "Змахування павутиння"
    OUT_nf_a002_desc:0 "Форт Індепенденс — це не Цитадель, але з часом, можливо, він зможе нею стати."
    OUT_nf_a003:0 "Переміщення ресурсів"
    OUT_nf_a003_desc:0 "Лайонс був не настільки дурний, щоб оцінити по достоїнству Форт-Індепенденс. Це полегшило нам завдання."
    OUT_nf_a004:0 "Старейшина в усьому, крім імені"
    OUT_nf_a004_desc:0 "Хоча Лайонс і зрадник, Касдін не може просто так оголосити себе старейшиною."
    OUT_nf_a005:0 "Справжній шлях"
    OUT_nf_a005_desc:0 "Наша місія завжди полягала в забезпеченні безпеки важливої техніки, а не в тому, щоб няньчитися зі сміттям на пустирі. Тепер ми можемо робити те, за чим прийшли сюди."
    OUT_nf_a006:0 "Просіюючи мотлох"
    OUT_nf_a006_desc:0 "За останні 200 років безліч зброї проржавіло настільки, що перестало бути придатним до використання, однак із більшості непотрібних гвинтівок можна витягти одну-дві робочі деталі."
    OUT_nf_a007:0 "Не від світу цього"
    OUT_nf_a007_desc:0 "Мешканець пустки в комбінезоні Сховища вже давно продає нам техніку. Нещодавно вони принесли щось настільки дивне, що це майже інопланетне."
    OUT_nf_a008:0 "Очистити перехрестя Бейліс"
    OUT_nf_a008_desc:0 "Наші перші пошуки в районі перехрестя Бейліс вказують на те, що в руїнах заховано щось цінне. Нам просто потрібно зачистити територію."
    OUT_nf_a009:0 "Прийняти допомогу ззовні"
    OUT_nf_a009_desc:0 "Ми не можемо потрапити на нижні рівні, не завершивши симуляцію. Для цього нам потрібен Піп-бой і добровільний доброволець. Ми напевно могли б зробити так, щоб це вартувало їхніх зусиль."
    OUT_nf_a010:0 "Знайти власний Піп-Бой"
    OUT_nf_a010_desc:0 "Навіщо нам покладатися на сміттярів, якщо ми можемо знайти свій власний Піп-Бой?"
    OUT_nf_a011:0 "Операція Анкоридж"
    OUT_nf_a011_desc:0 "Моделювання завершено, карантин знімається. Подивимося, що в нас вийшло."
    OUT_nf_a012:0 "Тримати дистанцію"
    OUT_nf_a012_desc:0 "Столична Пустка мала бути лише однією зупинкою, а не кінцевою точкою нашої місії. Час повернутися туди і подивитися, що ще чекає на свої розкопки."
    OUT_nf_a013:0 "Записи Келлера"
    OUT_nf_a013_desc:0 "Навіть ми не можемо зламати цей проклятий бункер. Але принаймні ми знайшли підказку до комбінації."
    OUT_nf_a014:0 "Справжній приз"
    OUT_nf_a014_desc:0 "§RЯкого біса нам потрібно стріляти у 8 таких штук одночасно?§!"
    OUT_nf_a015:0 "Сталева впевненість"
    OUT_nf_a015_desc:0 "Ми більше не отримуємо підтримки. Нам потрібно використовувати альтернативи скрізь, де це можливо."
    OUT_nf_a016:0 "Могутні машини"
    OUT_nf_a016_desc:0 "Зібрана нашвидкуруч іржава махина не витримає тривалого вогню. Наші бойові машини повинні бути найкращими з найкращих."
    OUT_nf_a017:0 "Краще, швидше, сильніше"
    OUT_nf_a017_desc:0 "Тільки маючи найкращі машини, ми зможемо зберегти нашу перевагу."
    OUT_nf_a018:0 "Безліч техніки"
    OUT_nf_a018_desc:0 "Протектрон не витримає .50-го калібру, скільки б зброї ми до нього не прикрутили. Зосередимося на тому, щоб поставити між нами і ворогом побільше роботів."
    OUT_nf_a019:0 "Оптимізація виробництва"
    OUT_nf_a019_desc:0 "Створення лінії збирання роботів дозволяє нам виробляти більше машин, ніж при призначенні їх на одного захисника. Чому ми не додумалися до цього раніше?"
    OUT_nf_a020:0 "Щойно з конвеєра"
    OUT_nf_a020_desc:0 "Остання партія бойових роботів готова вийти на поле бою."
    OUT_nf_a021:0 "Додатковий підхід"
    OUT_nf_a021_desc:0 "Роботи хороші для поглинання ворожих куль, але вони ніколи не замінять Захисника в Т-45."
    OUT_nf_a022:0 "Гартуйтеся"
    OUT_nf_a022_desc:0 "Броня на наших костюмах і наших роботах має бути найкращою, тому що ми точно не зможемо виробляти набагато більше."
    OUT_nf_a023:0 "Сильніше та швидше"
    OUT_nf_a023_desc:0 "Броня та роботи 200-річної давнини хороші, але могли б бути й кращими."
    OUT_nf_a024:0 "Серйозна міць"
    OUT_nf_a024_desc:0 "Наша зброя має бути найсмертоноснішою в пустці. Так ми не дамо мародерам проникнути всередину."
    OUT_nf_a025:0 "Біп-біп, піф-паф"
    OUT_nf_a025_desc:0 "Все просто. У нас є великі лазерні гармати та смертоносні роботи. Тож забирайся з дороги."
    OUT_nf_a026:0 "На марші"
    OUT_nf_a026_desc:0 "Захисники за підтримки роботів готові повернутися в пустку."
    OUT_nf_a027:0 "Сила переконання"
    OUT_nf_a027_desc:0 "Нам не потрібні відра з болтами, щоб поповнити нашу чисельність. Наша сила в нашій підготовці та рішучості."
    OUT_nf_a028:0 "Захисники в сяючих обладунках"
    OUT_nf_a028_desc:0 "Кожному Захиснику на полі бою буде видано комплект силової броні. На жаль, це означає, що більшій кількості людей доведеться залишатися у форті та обслуговувати ці комплекти."
    OUT_nf_a029:0 "Лазерне фокусування"
    OUT_nf_a029_desc:0 "У захисників, що засіли у форті, є деякі ідеї щодо покращення нашого спорядження."
    OUT_nf_a030:0 "Не всяка броня блищить"
    OUT_nf_a030_desc:0 "У нас недостатньо силової броні на всіх. Деяким молодшим Захисникам доведеться обходитися бойовою."
    OUT_nf_a031:0 "Баланс пріоритетів"
    OUT_nf_a031_desc:0 "Наша увага трохи розпорошена на різні типи обладнання, але це не заважає нам удосконалювати його."
    OUT_nf_a032:0 "Готовий до бою"
    OUT_nf_a032_desc:0 "Реорганізовані захисники готові вийти на поле."
    OUT_nf_a033:0 "Прибирання"
    OUT_nf_a033_desc:0 "За роки у форті накопичилося багато сміття та мотлоху, його слід викинути."
    OUT_nf_a034:0 "Укомплектування постів охорони"
    OUT_nf_a034_desc:0 "Мародери та рейдери продовжують ритися навколо нашого форту. Будьте напоготові."
    OUT_nf_a035:0 "Розбирання мотлоху"
    OUT_nf_a035_desc:0 "У цих старих зламаних машин все ще є кілька деталей, які блищать під шаром іржі."
    OUT_nf_a036:0 "Очистити лабораторний простір"
    OUT_nf_a036_desc:0 "Хоч тут і тіснувато, але місця для кількох лабораторій достатньо."
    OUT_nf_a037:0 "Витягнути ППО"
    OUT_nf_a037_desc:0 "У підвалі є кілька великих гармат, колись призначених для збивання літаків. Ми не бачили нікого, хто літає, відколи сюди прибули, але хто знає, що на нас чекає в майбутньому? Краще винести їх про всяк випадок."
    OUT_nf_a038:0 "Тільки поверхневе знайомство"
    OUT_nf_a038_desc:0 "Майже кожна значуща будівля у Вашингтоні мала глибокі підвали та підземні рівні. Форт Індепенденс не був винятком."
    OUT_nf_a039:0 "Встановити станки"
    OUT_nf_a039_desc:0 "Новий простір, який ми розчистили, ідеально підходить для ще однієї збройової майстерні."
    OUT_nf_a040:0 "Штовхнути генератори"
    OUT_nf_a040_desc:0 "Десь у надрах Форту Індепенденс є кілька генераторів, які можна полагодити за допомогою клейкої стрічки та металобрухту."
    OUT_nf_a041:0 "Скопіювати китайські креслення"
    OUT_nf_a041_desc:0 "Хоча це й не оригінальні схеми, креслень, взятих із захопленого обладнання, має бути достатньо, щоб ми могли відтворити ці китайські технології."
    OUT_nf_a042:0 "Братство Драгунів"
    OUT_nf_a042_desc:0 "Силова броня, можливо, і є панівною на полі бою, але є цінність і в легших військах, здатних виплутатися з неприємностей так само легко, як і потрапити в них."
    OUT_nf_a043:0 "Прикладна робототехніка"
    OUT_nf_a043_desc:0 "Китайська філософія дизайну щодо робототехніки сильно відрізняється від довоєнної американської. Є кілька елементів, які ми можемо застосувати у власних розробках."
    OUT_nf_a044:0 "Американські Лідбелчери"
    OUT_nf_a044_desc:0 "Деякі речі витримують одну-дві кулі. Мало що витримує сто."
    OUT_nf_a045:0 "Ось і бум"
    OUT_nf_a045_desc:0 "Для тих небагатьох речей, які можуть витримати 100 куль, у нас є вибухівка."
    OUT_nf_a046:0 "Американська доктрина"
    OUT_nf_a046_desc:0 "Поки ми дисципліновані, ми не можемо забувати, що війна — це хаос. Ми повинні навчитися процвітати в ньому."
	OUT_nf_a047:0 "Посилені барикади"
	OUT_nf_a047_desc:0 "Кілька шматків металобрухту та бетонних плит можуть перетворити невеликий насип із мішків із піском на потужну бойову позицію."
	OUT_nf_a048:0 "Ми будемо готові"
	OUT_nf_a048_desc:0 "У небі над Столичною Пусткою були помічені вертиберди. Ми не дозволимо себе спіймати, не маючи можливості протистояти цій повітряній могутності."
	OUT_nf_a049:0 "Підтримка промисловості"
	OUT_nf_a049_desc:0 "Обслуговування зброї — це не тільки чищення деталей і складання зброї. Нам також потрібна допомога у виготовленні компонентів та інструментів, необхідних для створення цих клятих штук."
	OUT_nf_a050:0 "Виробництво композитів"
	OUT_nf_a050_desc:0 "Сучасне обладнання потребує сучасних матеріалів. Саме тому нам необхідно розробляти власні композитні матеріали."
	OUT_nf_a051:0 "Виробничі технології"
	OUT_nf_a051_desc:0 "Ми не можемо просто покластися на цілу друковану плату. Нам потрібно зробити свою власну."
	OUT_nf_a052:0 "Перепрофілювання симулятора"
	OUT_nf_a052_desc:0 "Тепер, коли ми завершили симуляцію Анкориджа, ми можемо попрацювати з її кодом. Можливо, ми навіть зможемо створити власні симуляції бою, які не вб'ють вас у разі поразки."
	OUT_nf_a053:0 "Скидання вимикачів"
	OUT_nf_a053_desc:0 "При працюючих генераторах ми зможемо підключити інші системи, але не раніше, ніж з'ясуємо, куди йдуть деякі з цих проводів."
	OUT_nf_a054:0 "Переробка реліквій"
	OUT_nf_a054_desc:0 "Маючи необхідні знання, ми можемо навіть полагодити речі, які, здавалося б, уже не підлягають відновленню."
	OUT_nf_a055:0 "Виробничі процеси"
	OUT_nf_a055_desc:0 "Якщо для ремонту гвинтівки вам доводиться замінювати 99 відсотків її деталей, то краще навчитися робити нову самостійно."
    OUT_nf_b001:0 "Розберіться з невігласами"
    OUT_nf_b001_desc:0 "Банда мародерів на півдні округу Вашингтона стала для нас справжньою занозою. Давайте винесемо сміття, поки вони не стали більш організованими."
    OUT_nf_b002:0 "НЕ ВХОДИТИ!"
    OUT_nf_b002_desc:0 "Який сенс впускати сюди сміттярів після того, як ми їх щойно вигнали? Головне, щоб вони не поверталися."
    OUT_nf_b003:0 "Обмежена торгівля"
    OUT_nf_b003_desc:0 "Не варто витрачати зусилля на перекопування кожної купи сміття. Нехай якісь падальщики покопаються там за нас, аби ми першими побачили, що знайдуть."
    OUT_nf_b004:0 "«LOB Enterprises»"
    OUT_nf_b004_desc:0 "Старі документи вказують на те, що тут розташовувалася компанія з розробки вогнепальної зброї. Напевно в їхніх архівах є щось корисне."
    OUT_nf_b005:0 "Фабрика «Червоний Гонщик»"
    OUT_nf_b005_desc:0 "Якщо розкопки в руїнах старого світу чогось нас і навчили, так це тому, що проста, нічим не примітна компанія з виробництва іграшок може виявитися чим завгодно, якщо копати як слід."
    OUT_nf_b006:0 "Секретна суміш Джо"
    OUT_nf_b006_desc:0 "Тепер ми знаємо, звідки Джо взяв всю ту кляту каву."
    OUT_nf_b007:0 "Що відбувається?"
    OUT_nf_b007_desc:0 "Ми думали, що Анклав був знищений за кілька років до того, як ми вийшли на Схід. \n\n Ми помилялися."
    OUT_nf_b008:0 "§OДосить — значить ДОСИТЬ§!"
    OUT_nf_b008_desc:0 "Технології Анклаву затоплюють Столичну Пустку. Пустка спустошена бандою Лайонса, що кровоточить серцями. Що вони збираються з нею робити? Качати воду швидше?"
    OUT_nf_b009:0 "Бойові навчання в силовій броні"
    OUT_nf_b009_desc:0 "Зрадники Лайонса мають недавній досвід битв із ворогами в силовій броні. У нас його немає. Якщо ми не підготуємося, вони можуть дати нам неабияку відсіч!"
    OUT_nf_b010:0 "Пробити наскрізь"
    OUT_nf_b010_desc:0 "Якщо ми збираємося взяти Цитадель, нам знадобиться зброя, трохи потужніша за лазерну гвинтівку."
    OUT_nf_b011:0 "Втратити фарбування"
    OUT_nf_b011_desc:0 "Зрадники в Цитаделі прийняли практично всіх, хто бодай якось уміє махати палицею. Серед хаосу Війни Анклаву та їхньої нездійсненної мрії про очищувач кілька лицарів у пристойному вбранні могли вільно входити й виходити, не піднімаючи тривоги."
    OUT_nf_b012:0 "Хаос і плутанина"
    OUT_nf_b012_desc:0 "Ми здійснили достатньо походів до Цитаделі, і Касдін майже певен, що ми могли б завдати кількох ударів по планах Лайонса, якби нам вдалося розмістити одного або двох Захисників у потрібному місці."
    OUT_nf_b013:0 "Операція Дефанг"
    OUT_nf_b013_desc:0 "Ще трохи підготовки, і Лайонс може це помітити. Зараз саме час завдати удару."
    OUT_nf_b014:0 "Залишитися в Індепенденс"
    OUT_nf_b014_desc:0 "Цитадель сильно постраждала в боях. Зараз нам краще просто залишатися на місці."
    OUT_nf_b015:0 "Вальс назад"
    OUT_nf_b015_desc:0 "Після того, як ми билися за повернення Цитаделі, чому б нам, чорт забирай, не зробити її нашою головною базою?"
    OUT_nf_b016:0 "Писарі"
    OUT_nf_b016_desc:0 "Тепер, коли Лайонс пішов, нам доведеться вирішити, що робити з писарями, які залишилися після нашого відходу."
    OUT_nf_b017:0 "Керівництво"
    OUT_nf_b017_desc:0 "Якщо хтось і заслуговує на наш гнів, то це паладини та високопоставлені писарі, які підтримали зрадника Лайонса."
    OUT_nf_b018:0 "Лицарі"
    OUT_nf_b018_desc:0 "Багато з цих лицарів — нікчемні тварюки, але не всі. Деякі з них колись були нашими братами."
    OUT_nf_b019:0 "§CМ'якість не порок§!"
    OUT_nf_b019_desc:0 "Ми б ніколи не подумали, що Лайонс і його армія покидьків зможуть знищити сили Анклаву, що кишать у Столичній Пустці, але якимось чином їм це вдалося. Можливо, в його божевіллі є якась система."
    OUT_nf_b020:0 "Живи і дай жити іншим?"
    OUT_nf_b020_desc:0 "Зрадник помер, і його орден довів, що заслуговує на повагу. Можливо, нам варто припинити боротьбу."
    OUT_nf_b021:0 "Запросити копії"
    OUT_nf_b021_desc:0 "Тепер, коли ми більше не воюємо, чи можемо ми поглянути на схеми Анклаву?"
    OUT_nf_b022:0 "Біржа Ферфакса"
    OUT_nf_b022_desc:0 "В іншого Братства є інтереси в руїнах Ферфакса, і ми хотіли б оглянути авіабазу Адамс. Давайте укладемо угоду."
    OUT_nf_b023:0 "Братство на відстані витягнутої руки"
    OUT_nf_b023_desc:0 "Новий старейшина зробив цікаву пропозицію. Ми будемо працювати разом у сферах, що становлять взаємний інтерес, і плечем до плеча боротися з будь-якими серйозними загрозами, але в іншому наші відділення будуть дотримуватися власних цілей. Вони навіть запропонували заново внести імена наших членів до сувоїв."
    OUT_nf_b024:0 "Чи не буде склянки?"
    OUT_nf_b024_desc:0 "Якщо вони просто роздають воду, чому ми теж не можемо її отримати?"
    OUT_nf_b025:0 "Згадати минулі походи"
    OUT_nf_b025_desc:0 "Обмін звітами про виконану роботу міг би навчити обидва наші відділення дечого нового."
    OUT_nf_b026:0 "Рев левиці"
    OUT_nf_b026_desc:0 "Новий старейшина приїжджає до Форту-Індепенденс на зустріч із Касдіном. Судячи з її голосу по радіо, зустріч буде не з приємних..."
    OUT_nf_b027:0 "Вичікування свого часу"
    OUT_nf_b027_desc:0 "Це лише питання часу, коли Лост-Хіллс вийде на зв'язок або юний Максон доведе свою готовність до того, що йому належить за правом народження. А поки ми будемо підігрувати."
    OUT_nf_b028:0 "На крок далі"
    OUT_nf_b028_desc:0 "Ми нічого не говорили про витрачання ресурсів на роздачу води, продаж цінних технологій мешканцям пусток або навіть про якісь подібні зміни політики. Але писати абсолютно новий кодекс? Ми не можемо цього допустити."
    OUT_nf_b029:0 "Занадто безхребетний, щоб бути лідером"
    OUT_nf_b029_desc:0 "Сара Лайонс померла, і вони обрали... Писаря Боудіча? Навіть не Зоряного Паладіна Кросса? Вони поставили цього безхребетного боягуза на чолі? Ми й так уже надто довго все пускали на самоплив!"
    OUT_nf_b030:0 "Подальші зачистки"
    OUT_nf_b030_desc:0 "Їхні експедиції кудись вирушають, штовхають пару каменів і, можливо, повертаються з коробкою технічних документів. Не ми, ми більш доскіпливі."
    OUT_nf_b031:0 "Співпраця Писарів"
    OUT_nf_b031_desc:0 "Нашим писарям не завадило б поділитися один з одним деякими міркуваннями."
    OUT_nf_b032:0 "§RЦитадель впала§!"
    OUT_nf_b032_desc:0 "Коли Анклав почав літати над Столичною Пусткою, ми знали, що Лайонс і його покидьки нічого не зможуть з ними вдіяти."
    OUT_nf_b033:0 "Відкрити наші двері"
    OUT_nf_b033_desc:0 "Деякі з наших колишніх братів, що залишилися в Цитаделі, тепер тиняються біля Форту Індепенденс і просяться до нас. Ми не можемо дозволити собі відіслати їх, хоча вони цього і заслуговують."
    OUT_nf_b034:0 "З паладинів у протектори"
    OUT_nf_b034_desc:0 "Деякі з наших братів, що залишилися позаду, — досвідчені бійці та лідери. Вони заслужили звання Протектора."
    OUT_nf_b035:0 "Продовжувати шлях"
    OUT_nf_b035_desc:0 "Ви відволікли нас від нашої місії, назвали зрадниками, а тепер просите про допомогу? Смішний жарт. Здайте спорядження і йдіть звідси."
    OUT_nf_b036:0 "Ми створені інакше"
    OUT_nf_b036_desc:0 "Анклав, можливо, й переміг зрадників Лайонса, але ми — не вони. Ми — найкращі з найкращих."
    OUT_nf_b037:0 "ВИЖЕНИТЬ ЇХ!"
    OUT_nf_b037_desc:0 "Анклав стверджує, що Цитадель належить їм. Давайте покажемо їм, як вони помиляються."
    OUT_nf_b038:0 "Ти не можеш повернутися"
    OUT_nf_b038_desc:0 "Більша частина Цитаделі була пошкоджена в ході бойових дій, але серед уламків все ще можна знайти кілька діамантів."
    OUT_nf_b039:0 "Допомога чи перешкода?"
    OUT_nf_b039_desc:0 "Анклав, як і Лайонс, бачив цінність у проекті «Чистота». Можливо, варто за нього триматися."
    OUT_nf_b040:0 "Розкопки Рейвен-Року"
    OUT_nf_b040_desc:0 "Рейвен-Рок був зруйнований у ході бойових дій, і навряд чи збереглося якесь цінне обладнання. Нам все ще потрібно оглянути його."
    OUT_nf_b041:0 "Перебрати здобич"
    OUT_nf_b041_desc:0 "Вам доведеться практично підірвати костюм ПСБ на шматки, щоб убити людину всередині нього, але якщо ви зберете разом 10-20 мертвих солдатів Анклаву, то, можливо, вам вдасться зібрати з них робочий обладунок."
    OUT_nf_b042:0 "Захист авіабази Адамс"
    OUT_nf_b042_desc:0 "Ми збили майже кожен вертиберд, що намагався покинути цю базу, але, мабуть, навколо сиділо не тільки кілька птахів."
    OUT_nf_b043:0 "Спеціальне обладнання"
    OUT_nf_b043_desc:0 "Завдяки деталям, врятованим з авіабази Адамс, у нас, можливо, з'явиться можливість відновити зв'язок з Лост-Хіллс. Нам просто потрібно трохи часу, щоб зібрати все докупи."
    OUT_nf_b044:0 "Дзвінок додому"
    OUT_nf_b044_desc:0 "Настав час. Пора знову зустрітися з Лост-Хіллс. Останні кілька років дадуть нам чудовий звіт."
	OUT_nf_c001:0 "§0Сили поза розумінням"
 	OUT_nf_c001_desc:0 "Циклопічних мостів — споруд, збудованих якоюсь давньою расою, що вимерла і була забута до того, як ці істоти прибули на Юггот із глибин порожнечі, — має бути достатньо, щоб зробити будь-яку людину Данте або По, якщо вона зможе залишатися при здоровому глузді достатньо довго, щоб розповісти про те, що вона бачила."
	OUT_nf_c002:0 "Угода Блекхолла"
 	OUT_nf_c002_desc:0 "Жителі Пойнт-Лукаута слідують за лідером, якого, за твердженням Касдіна, він бачив раніше уві сні."
	OUT_nf_c003:0 "Болотяні історії"
 	OUT_nf_c003_desc:0 "Послідовники Блекхолла можуть дечого нас навчити щодо гульїв."
	OUT_nf_c004:0 "У пошуках секретів"
 	OUT_nf_c004_desc:0 "Щоб продовжити дослідження, нам потрібно вирушити до Пойнт-Лукаута. Місцеві виродки не стануть нам на заваді."
	OUT_nf_c005:0 "Малоймовірна спорідненість"
 	OUT_nf_c005_desc:0 "Ці психопати з Пойнт-Лукаута відомі тим, що нападають на будь-кого, хто підходить надто близько. Але чомусь вони нас привітно зустрічають?"
	OUT_nf_c006:0 "Брати глибин"
 	OUT_nf_c006_desc:0 "Після перших кількох застіль із крабами ми зрозуміли, що болотяники не чинили опору."
	OUT_nf_c007:0 "Схід поганого місяця"
 	OUT_nf_c007_desc:0 "Не ходіть сьогодні вночі. \n\n Це обов'язково позбавить вас життя. \n\nНа небі сходить поганий місяць."
	OUT_nf_c008:0 "Наше законне місце"
 	OUT_nf_c008_desc:0 "Блекхолл — старезний старий дурень, навіщо нам продовжувати слідувати за ним?"
	OUT_nf_c009:0 "Прийняти місце Блекхолла"
 	OUT_nf_c009_desc:0 "Блекхолл — не Лайонс. Він знає, що потрібно робити, і цього разу нам варто дотримуватися поставленого завдання."
	OUT_nf_c010:0 "Аколити"
 	OUT_nf_c010_desc:0 "У землях навколо Андейла мешкає безліч культистів, які тепер присягнули нам на вірність. Спроби прогнати їх лише призводять до їхнього повернення. Можна почати вказувати їм на проблеми, які ми хочемо вирішити."
	OUT_nf_c011:0 "Захист Данвіча"
 	OUT_nf_c011_desc:0 "Данвіч-Білдінг — скромний офіс у глушині, який став кінцем шляху для багатьох дослідників пусток. \n\n Але ці мешканці пусток не знали, чим ми займаємося."
	OUT_nf_c012:0 "Похмура жнива"
 	OUT_nf_c012_desc:0 "Через 20 років ми нарешті знайшли прийнятне застосування мешканцям пусток."
	OUT_nf_c013:0 "Пізнання непізнаваного"
 	OUT_nf_c013_desc:0 "За останні місяці ми багато чого навчилися. Це змінює наше розуміння практично всього. Ці істини допоможуть нам у наших дослідженнях."
	OUT_nf_c014:0 "Втрачені брати"
 	OUT_nf_c014_desc:0 "Наші старі брати з Цитаделі, швидше за все, стануть на нашому шляху, якщо ми спочатку нічого не зробимо."
	OUT_nf_c015:0 "Цитадель Уг-Куалтота"
 	OUT_nf_c015_desc:0 "Наш дім знову наш. Наші брати поруч із нами. Тих, хто відмовляється бачити, змусять."
	OUT_nf_c016:0 "Ритуал"
 	OUT_nf_c016_desc:0 "Отримавши записи та артефакти з маєтку Блекхолла, ми готові приступити до наступного етапу плану."
	OUT_nf_c017:0 "Нечестива синергія"
 	OUT_nf_c017_desc:0 "Це захоплююче видовище — спостерігати, як захисники в силовій броні пробиваються крізь оборонний бар'єр, а за ними слідує потік дикунів. Хор їхніх криків і гарчання майже зливався з музикою."
	OUT_nf_c018:0 "Печери кличуть нас"
 	OUT_nf_c018_desc:0 "У глибинах Сховища 87 знаходяться інструменти, необхідні для нашої роботи."
	OUT_nf_c019:0 "Той, хто шепоче в темряві"
 	OUT_nf_c019_desc:0 "Глибоко на нижніх рівнях Цитаделі Уг-Куалтота проводяться дивовижні експерименти. Спеціалісти з видатними хірургічними, біологічними, хімічними та механічними навичками об'єднують свої зусилля."
	###############
	###Provinces###
 	###############
  	OUT_citadel_name:0 "Цитадель Уг-Куалтота"
