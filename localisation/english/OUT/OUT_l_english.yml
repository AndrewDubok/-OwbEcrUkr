	OUT_olin_leader_name_2:0 "Головний Спеціаліст Олін"
	OUT_olin_desc:0 "§0Відвідування Юггота звело б з розуму будь-яку слабку людину, але я все ж вирушаю туди.§! \n\n Відколи вона повернулася з Пойнт-Лукаута й отримала підвищення, Спеціаліст не гаяла часу, змінюючи Вигнанців. Її накази дивні, непередбачувані й часто позбавлені необхідних подробиць. Якби не Касдін, який присягається честю Спеціаліста, мало хто б виконував її вказівки. Ну, і ще той факт, що ті, хто висловлює занепокоєння, продовжують гинути в жахливих катастрофах."
