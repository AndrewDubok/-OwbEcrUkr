l_english:
  FRM_bidda_name:0 "Marshall Bidda"
  FRM_bidda_desc:0 "For decades Bidda and her people have had to hide from the encroaching swamp and the mad tribals inhabiting it. Bidda led her people on the controlled burns, destroying swathes of swamp to simply keep it out of their homes. Now, with the chaos caused by the arrival of the Known Folk, and the Garden of Eden collapsing in on itself, Bidda finds something new to hold onto in what was once a hostile world. \n\n§GHope§!."

  FRM_rike_name:0 "Marshall Rike"
  FRM_rike_desc:0 "Rike is a zealot, but not a religious one. He sees the flames that the Fire Marshalls wield as the symbols of a truer world, a world free from the maddening swamp and the inane chatterings of the swampdellers. He would like nothing more than for them all to burn. That is his zealotry."

  FRM_ashley_name:0 "Marshall Ashley"