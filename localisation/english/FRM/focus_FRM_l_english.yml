l_english:
  FRM_the_fall_of_lynchburg:0 "Падіння Лінчбурга"
  FRM_the_fall_of_lynchburg_desc:0 "Незважаючи на ядерний вогонь, що падав на світ, Лінчбургу вдалося протриматися і вижити... на деякий час."

  FRM_the_encroaching_swamp:0 "Болото наступає"
  FRM_the_encroaching_swamp_desc:0 "Мирне поселення в пустках? Який жарт..."

  FRM_burn_baby_burn:0 "Пали, крихітко, пали"
  FRM_burn_baby_burn_desc:0 "З розширенням боліт, що наступали на нашу територію, групи в Лінчі почали проводити контрольовані підпали, щоб стримувати рослинність. З часом ці добровольці сформували організацію: Маршали Вогню."

  FRM_allies_of_convenience:0 "Тимчасові союзники"
  FRM_allies_of_convenience_desc:0 "Ми не єдині, хто стикається зі зростаючим болотом та чужинцями. Ми не завжди ладнали з Атомбаптистами, але вони набагато кращі за альтернативи."

  FRM_fire_in_our_hearts:0 "Вогонь у наших серцях"
  FRM_fire_in_our_hearts_desc:0 "Ми зберігаємо дух перших поселенців Вірджинії. Тих, кого не зламали фанатизм чи відчай. Ми підтримуємо надію життю в задушливих болотах."

  FRM_careful_point_thing:0 "Обережно, куди цілишся!"
  FRM_careful_point_thing_desc:0 "Коротше кажучи, багато нашого спорядження дуже і дуже небезпечне. Залучаючи ветеранів для навчання нових маршалів і впроваджуючи їхні рекомендації повсюдно, можливо, ми зможемо покращити те, як поводимося з вогнеметами та використовуємо їх."

  FRM_twisted_firestarter:0 "Зіпсований підпалювач"
  FRM_twisted_firestarter_desc:0 "На диво, через 4 роки група Маршалів, які вирушили в болото, щоб спробувати знайти його джерело, повернулася. Вони не виконали своєї місії, але Маршал Ешлі та її ветерани тепер одні з найзагартованіших маршалів навколо."
    FRM_unlock_ashley_tt:0 "\n\n§Y$FRM_ashley_name$§! стає командиром загону.\n§LРівень§!: §Y3§!\n§RAтака§!: §Y4§!\n§GОборона§!: §Y1§!\n§PПланування§!: §Y1§!\n§MЛогістика§!: §Y2§!\n§gРиси§!: §tПроникливість§!, §tЩасливчик§!, §tКриваве місиво§!\n\nЕшлі приведе з собою свою групу висококваліфікованих і досвідчених Маршалів Вогню."

  FRM_feel_the_burn:0 "Відчуй опік"
  FRM_feel_the_burn_desc:0 "Покращуючи наші вогнемети та інше допоміжне спорядження, ми зосередимося на тому, що в нас виходить найкраще — спалювати речі."

  FRM_red_hot:0 "Розпечене"
  FRM_red_hot_desc:0 "Незважаючи на важливість наших вогнеметів, саме зброю та сокири більшість маршалів використовують проти жахіть болота."

  FRM_flaming_hot:0 "Палаюче"
  FRM_flaming_hot_desc:0 "З новою зброєю та палким серцем Маршали Вогню готові протистояти найгіршому, що є в болоті."

  FRM_drumbeats_of_war:0 "Барабани війни"
  FRM_drumbeats_of_war_desc:0 "Хоча вони не уособлюють болото безпосередньо, як Сад Едему, Апокрифія Посейдона також є небезпечними фанатиками, що загрожують безпеці наших кордонів."

  FRM_control_the_converts:0 "Контроль над наверненими"
  FRM_control_the_converts_desc:0 "Наш союз з Атомбаптистами може бути важливим для подальшої безпеки, але він приніс на наші землі небажану кількість ненадійних віруючих, і деякі з наших людей слідують цим вченням."

  FRM_preparing_the_people:0 "Готуючи людей"
  FRM_preparing_the_people_desc:0 "Війна наближається до боліт, і це лише питання часу. Нам потрібно бути готовими вдарити, поки гаряче."

  FRM_arms_length:0 "На відстані витягнутої руки"
  FRM_arms_length_desc:0 "Наш союз з Атомбаптистами аж ніяк не дружній. Вони нам не довіряють, ми їм не довіряємо. Ми повинні переконатися, що статус-кво зберігається — принаймні доти, доки ми не залишимося єдиними, хто вижив."
    FRM_control_decisions_tt:0 "Це відкриє §YРішення§! для §Oобмеження впливу Атомбаптистів§!."

  FRM_this_fire:0 "Цей вогонь"
  FRM_this_fire_desc:0 "Напруга наростає, і скоро війна знову прийде до Вірджинії. Відомі Люди дестабілізували ситуацію, і ми повинні бути готові розчистити болота. Назавжди."

  FRM_ashfall:0 "Попелопад"
  FRM_ashfall_desc:0 "Ось воно. Статус-кво досяг своєї межі, і не можна дозволяти Апокрифії Посейдона продовжувати зростати. Час навести лад у Вірджинії."

  FRM_fires_of_industry:0 "Вогні промисловості"
  FRM_fires_of_industry_desc:0 "Лінч був процвітаючим і дружнім містечком до появи боліт. Досі існують майстерні, покинуті, коли населення скоротилося, але якщо ми знову займемо їх, ми зможемо відновити їхню роботу."

  FRM_ignite_the_forges:0 "Запалити горни"
  FRM_ignite_the_forges_desc:0 "Оскільки війна з болотом стає дедалі неминучою, неминуче і те, що нам потрібно більше зброї та спорядження."

  FRM_rebuild_the_universities:0 "Відбудувати університети"
  FRM_rebuild_the_universities_desc:0 "Незважаючи на свій невеликий розмір, у довоєнному Лінчбурзі було кілька університетів чи інших освітніх центрів. Ми не можемо повністю укомплектувати їх персоналом, але запустити принаймні бібліотеки та деякі навчальні приміщення могло б дуже допомогти."

  FRM_kindle_the_ferry_trade:0 "Розпалити поромну торгівлю"
  FRM_kindle_the_ferry_trade_desc:0 "Торгівля вниз по тепер небезпечній річці Джеймс є ризикованою справою, але це життєво важливо, якщо ми хочемо уникнути залежності від торгових шляхів через Грін-Маунтін. Сприяючи торгівлі, ми можемо зацікавити підприємства — особливо ті, що мають підривне спорядження."

  FRM_burning_bright:0 "Яскраво палаючи"
  FRM_burning_bright_desc:0 "Світ довкола небезпечний, але ми можемо зробити його кращим, один університет за раз."

  FRM_hub_of_the_swamps:0 "Осередок боліт"
  FRM_hub_of_the_swamps_desc:0 "Лінч, мабуть, єдине місто у Вірджинії, яке зберегло відчуття нормальності. Звичайно, ви не можете відходити далеко від міста, і у нас є потужні сили ополчення, але це досить типово для більшості міст Пустища."

  FRM_a_tantalising_flame:0 "Спокусливе полум'я"
  FRM_a_tantalising_flame_desc:0 "Маршали Вогню більш ніж довели свою ефективність у знищенні Апокрифії Посейдона. Можливо, нам взагалі не варто повертати владу цивільним..."

  FRM_ignite_the_swamp:0 "Запалити болото"
  FRM_ignite_the_swamp_desc:0 "Зараз не час спочивати на лаврах. Відомі Люди та Сад Едему повинні бути знищені, щоб Вірджинія знайшла мир."

  FRM_consolidate_power:0 "Консолідувати владу"
  FRM_consolidate_power_desc:0 "Маршали Вогню вже де-факто правлять Лінчем. Нам просто потрібно, щоб усе йшло так, як ми хочемо."

  FRM_true_ascendance_of_the_marshalls:0 "Справжнє піднесення Маршалів"
  FRM_true_ascendance_of_the_marshalls_desc:0 "Маршал Бідда слабка і не бачить, що цивільним не можна довіряти керувати самими собою. Час Маршалам Вогню підтримувати порядок."

  FRM_burn_it_down:0 "Спалити все дотла"
  FRM_burn_it_down_desc:0 "Люди за нашими кордонами не знають справжньої безпеки. Монстри та мутанти ховаються в лісах і болотах по всьому пустищу. Лише скоординовані зусилля відданої групи можуть зробити речі справді безпечними. Тільки Маршали Вогню."
    frm_legion_of_fire:0 "Легіон Вогню"
    frm_legion_of_fire_DEF:0 "Легіон Вогню"
    frm_legion_of_fire_ADJ:0 "Вогняний Легіонер"

  FRM_fires_burning_out:0 "Вогонь згасає"
  FRM_fires_burning_out_desc:0 "Немає потреби продовжувати увічнювати страждання у віргінських болотах. Ситуація і так досить погана. Відновлення якоїсь форми цивільного уряду дозволить Лінчу справді процвітати знову."

  FRM_set_down_the_flamers:0 "Відкласти вогнемети"
  FRM_set_down_the_flamers_desc:0 "Маршали Вогню залишаться, але не можуть домінувати в уряді, як це було десятиліттями. Час відкласти наші вогнемети і дозволити бюрократам знову керувати."

  FRM_slow_burn:0 "Повільне горіння"
  FRM_slow_burn_desc:0 "Хоча наше очищення болота більше не є таким ревним, це не означає, що ми можемо дозволити собі перестати стежити за нашими кордонами. Ми повинні переконатися, що болоту більше ніщо не загрожує."
    FRM_build_bunkers_tt:0 "Це збудує §Yфорпости§! у кожній прикордонній провінції."

  FRM_rebuild_lynch:0 "Відбудувати Лінч"
  FRM_rebuild_lynch_desc:0 "Лінч ніколи не був по-справжньому процвітаючим, але він значно занепав з моменту, коли болото почало рости. Однак тепер, коли ми можемо захистити наших людей, настав час для Лінча знову зростати."

  FRM_the_swamps_saved:0 "Болота врятовані"
  FRM_the_swamps_saved_desc:0 "Ми зробили це. Ми врятували Вірджинію. Ми більше не Маршали Вогню, настав час відкрити нову сторінку в нашій історії."
    frm_republic_of_lynch:0 "Республіка Лінч"
    frm_republic_of_lynch_DEF:0 "Віргінська Республіка Лінч"
    frm_republic_of_lynch_ADJ:0 "Лінчійський"

  FRM_burning_bridges:0 "Спалюючи мости"
  FRM_burning_bridges_desc:0 "Ми ніколи не зможемо довіряти Атомбаптистам. Можливо, колись ми були союзниками, але ми ніколи не були друзями."

  FRM_bond_forged_in_fire:0 "Зв'язок, викуваний у вогні"
  FRM_bond_forged_in_fire_desc:0 "Ми мали розбіжності з Атомбаптистами, але це не означає, що ми не можемо розвиватися і стати друзями. Справжніми друзями цього разу, а не просто друзями з необхідності."

  FRM_clear_the_swamp:0 "Очистити болото"
  FRM_clear_the_swamp_desc:0 "Болото все ще є небезпечним і жахливим місцем. Нам потрібно розчистити території, які ми можемо безпечно взяти під свій контроль."