###Characters###
bhs_bmmau_name:0 "Б.М.М.А.У."
bhs_bmmau_desc:0 "Біо-механічне медичне адміністративне управління, також відомий як Б.М.М.А.У., мав стати лікарем майбутнього. Лікарем, який не міг захворіти, був доступний 24 години на добу і ніколи не помилявся під час хірургічних операцій. Б.М.М.А.У. мав зробити революцію в медицині, але потім настала Велика Війна. Провівши десятиліття, спостерігаючи за жахливими травмами та хворобами, з якими людство зіткнулося в пост-ядерному світі, Б.М.М.А.У. зрозумів одну важливу річ. Надійність сталі краща за слабкість плоті. З часом усе людство має бути врятоване."

BHS_ratched_name:0 "Старша медсестра Ретчед"
BHS_shipman_name:0 "Головний хірург Шипман"
BHS_freeman_name:0 "Головний невролог Фрімен"

