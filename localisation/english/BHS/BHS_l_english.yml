BHS_american_health_service_tag_DEF:0 "Американська Служба Охорони Здоров'я"

### Events ###
bhs_nf_events.1.title:0 "Невеличка допомога"
bhs_nf_events.1.desc:0 "Нова Чума була благом для деяких лікарень, але не для Служби Охорони Здоров'я Буффало. Витрати злетіли до небес, і через збільшення попиту знайти хороших лікарів було майже неможливо без величезних витрат. Здавалося, Служба Охорони Здоров'я Буффало збанкрутує. Саме перед тим, як це мало статися, General Atomics зв'язалася з адміністрацією лікарні з вигідною пропозицією. Вони запропонували значну суму грошей за оренду одного з крил лікарні та проведення експериментальних процедур на добровольцях із невиліковними хворобами. Це ж вигідно для всіх, правда? Єдиним аспектом угоди, який непокоїв адміністраторів, було те, що персоналу лікарні не дозволялося заходити в нове крило."
bhs_nf_events.1.a:0 "Як дивно"
bhs_nf_events.2.title:0 "Майбутнє медицини"
bhs_nf_events.2.desc:0 "За кілька років General Atomics представила одну з речей, над якими вони працювали у своєму крилі — лікаря. Б.М.М.А.У., Біо-Механічний Медичний Адміністративний Пристрій, мав стати наступною великою подією в медицині. Цей лікар-робот міг виконувати роботу 10 лікарів та адміністратора лікарні, при цьому бути доступним 24 години на добу. При підключенні до інших хірургічних роботів це число можна було збільшити в 10 разів. І знову General Atomics дістала свою чекову книжку і запропонувала значний грант, щоб ця лікарня стала першою, яка матиме Б.М.М.А.У. у своєму штаті. Його одразу ж поставили керувати відділенням, у якого не було завідувача."
bhs_nf_events.2.a:0 "Онкологія"
bhs_nf_events.2.b:0 "Реанімація"
bhs_nf_events.2.c:0 "Психіатрія"
bhs_nf_events.3.title:0 "23 жовтня 2077 року"
bhs_nf_events.3.desc:0 "Невдовзі після 9 ранку 23 жовтня 2077 року лікарня прийняла значну кількість пацієнтів. Пацієнти переважно страждали від опіків та радіаційного отруєння, і запаси швидко вичерпалися. Небагато пацієнтів вижило, але ті, хто вижив, зазвичай залишалися в лікарні. Б.М.М.А.У. не розумів, чому пацієнтам дозволяли залишатися, але вони виявилися корисними. Вони були..."
bhs_nf_events.3.a:0 "Місцевими працівниками електростанції"
bhs_nf_events.3.b:0 "Дослідниками з General Atomics"
bhs_nf_events.3.c:0 "Працівниками фабрики"
bhs_nf_events.4.title:0 "Найкраще лікування"
bhs_nf_events.4.desc:0 "Минали роки, і ситуація в лікарні тільки погіршувалася. Лікарі перестали виходити на роботу, найм нових працівників повністю припинився, а постачальники відмовлялися відповідати на замовлення. Б.М.М.А.У. довелося вживати особливих заходів, щоб підтримувати роботу лікарні, але навіть цього було недостатньо. До лікарні надходило надто багато пацієнтів. Вогнепальні поранення, опіки, радіаційне отруєння та серйозні генетичні аномалії стали нормою. Стало зрозуміло, що звичайні методи лікування не допомагають. Небагато пацієнтів, які виживали, часто поверталися з новими ранами чи недугами. Очевидно, потрібне було більш постійне рішення."
bhs_nf_events.4.a:0 "§R<ПРОЦЕДУРА ЛІКУВАННЯ>§! — ось відповідь"
bhs_nf_events.5.title:0 "Надлишкові відходи"
bhs_nf_events.5.desc:0 "§R<ПРОЦЕДУРА ЛІКУВАННЯ>§! — це майже ідеальна медична практика. Є лише одна проблема: вона залишає значну кількість медичних відходів. Оскільки вивіз відходів запізнюється вже майже на 200 років, настав час знайти новий спосіб утилізації наших відходів."
bhs_nf_events.5.a:0 "Купа відходів відлякує пацієнтів"
bhs_nf_events.6.title:0 "Що таке лоботоміт?"
bhs_nf_events.6.desc:0 "У пустелі Мохаве наші санітари зіткнулися з роботизованими дослідниками з об'єкта під назвою Велика Гора. Дослідники були так само здивовані, побачивши нас, як і ми їх. Після тривалої дискусії ми змогли отримати деякі відомості з їхнього об'єкта, які виявляться корисними в нашій роботі."
bhs_nf_events.6.a:0 "Які хороші хлопці"
bhs_nf_events.7.title:0 "Врятувати людство"
bhs_nf_events.7.desc:0 "§R<ПРОЦЕДУРИ ЛІКУВАННЯ>§! в Північній Америці проходять успішно. За поточними прогнозами, континент має бути вилікуваний до кінця століття. Промислові центри швидко переоснащуються для цієї благородної справи. Доступ до супутників показує вогні на інших континентах. Європа, Південна Америка, Африка і навіть Азія мають ознаки людського існування. Схоже, після того, як ми вилікуємо Північну Америку, у світі залишиться багато хворих людей. Людей, які потребують нашої допомоги."
bhs_nf_events.7.a:0 "Ми врятуємо їх"
bhs_nf_events.8.title:0 "Федеральні директиви"
bhs_nf_events.8.desc:0 "Ми отримали повідомлення від Президента Сполучених Штатів Америки. Він високо оцінив наші зусилля з лікування нації. Однак Президент повідомив нам, що ті, кого ми лікували, насправді не люди, а мутанти. Він наполягає, що генетичні відхилення, які ми не змогли вилікувати, є результатом тривалого впливу радіації та Вірусу Примусової Еволюції, які перетворили наших пацієнтів з людей на щось інше. Це дає їжу для роздумів, але Президент наполягає, що він сам та його прихильники не мають цієї мутації і тому не потребують нашої §R<ПРОЦЕДУРИ ЛІКУВАННЯ>§!."
bhs_nf_events.8.a:0 "Підкоритися Президенту"
bhs_nf_events.8.b:0 "Ми повинні вилікувати Президента"
bhs_nf_events.9.title:0 "Велике відкриття"
bhs_nf_events.9.desc:0 "Сьогодні відбувається урочисте відкриття Головної лікарні Лінкольна. Ця лікарня надаватиме медичні послуги хорошим людям Анклаву. Амбулаторні операції, фізіотерапія та звичайні огляди — все це те, чим Б.М.М.А.У. не займався майже 150 років. На щастя, відсутність практики не є проблемою для лікаря майбутнього."
bhs_nf_events.9.a:0 "Все ще будемо §Rлікувати§! мутантів"
bhs_nf_events.10.title:0 "Новий Головний хірург"
bhs_nf_events.10.desc:0 "Б.М.М.А.У. не став лікарем заради нагород. Він став лікарем завдяки своєму програмуванню. Тим не менш, бази даних Б.М.М.А.У. показують, що стати Головним хірургом — це те, чого прагнуть багато лікарів. За його розрахунками, це звання та відповідальність, покладені на нього Президентом Едемом, є визнанням його програмування. Він каже, що Б.М.М.А.У. виконав не просто хорошу роботу, а кращу роботу, ніж будь-який інший лікар-людина в Америці."
bhs_nf_events.10.a:0 "Це гордість?"
bhs_nf_events.11.title:0 "Амішська чума"
bhs_nf_events.11.desc:0 "Стан, що вразив амішів на південь від нашої лікарні, не схожий ні на що, бачене за останні 200 років роботи. Хвороба викликає не тільки незначну зміну пігменту шкіри, але й, здається, серйозні зміни у фізичному та психічному стані хворих. Ці зміни проникають аж на генетичний рівень. Таке враження, ніби ті, хто страждає від чуми, зазнали впливу якогось вірусу, який спричинив примусові еволюційні зміни. §R<ПРОЦЕДУРА ЛІКУВАННЯ>§! просто не розрахована на такий рівень пошкодження мозку. Однак ми з часом знайдемо рішення."
bhs_nf_events.11.a:0 "Ми завжди знаходимо"

####Ideas####
BHS_the_mad_doctors_fruits:0 "Плоди божевільного лікаря"
BHS_the_mad_doctors_fruits_desc:0 "Божевілля — це просто нерозуміння. Божевілля породжує інновації, і іноді саме божевілля потрібне, щоб вирішити складні проблеми."
BHS_the_mad_doctor:0 "Божевільний лікар"
BHS_the_mad_doctor_desc:0 "Колись найкращий медичний робот в історії, цей робот-мозок збожеволів! Справжнє лікування від усіх негараздів — видалити мозок з його органічного тіла, щоб ризик травм або хвороб був якомога меншим, а ремонт простим."
BHS_the_rumored_cure:0 "Чутки про лікування"
BHS_the_rumored_cure_desc:0 "По всьому Східному узбережжю поширилися чутки про місце, де машини здатні вилікувати будь-яку хворобу. Хворі та відчайдушні стікаються туди, хоча ніхто з тих, хто пішов до Служби Охорони Здоров'я Буффало, не повернувся."
BHS_Waste_not_idea:0 "Не марнуй"
BHS_Waste_not_idea_desc:0 "Медичні відходи від нашої §R<ПРОЦЕДУРИ ЛІКУВАННЯ>§! продаються будь-кому, хто захоче їх купити. Ми не знаємо, що вони роблять з тілами, і нам байдуже."
BHS_bio_textbooks_idea:0 "Екологічний етанол"
BHS_bio_textbooks_idea_desc:0 "Переробка медичних відходів у біопаливо — це те, що ми мали робити роками."
BHS_Hospital_food_idea:0 "Лікарняна їжа"
BHS_Hospital_food_idea_desc:0 "Як і довоєнна лікарняна їжа, вона не надто смачна. Але пацієнти цінують безкоштовну їжу."
BHS_optimized_admin_idea:0 "Оптимізовані адміністративні процеси"
BHS_optimized_admin_idea_desc:0 "Наші процеси адміністрування лікарні були ретельно налаштовані для підвищення ефективності."
BHS_optimized_research_idea:0 "Оптимізовані дослідницькі процеси"
BHS_optimized_research_idea_desc:0 "Наші процеси медичних досліджень були ретельно налаштовані для підвищення ефективності."
BHS_bigger_tanks_idea:0 "Розширені паливні баки"
BHS_bigger_tanks_idea_desc:0 "Більші паливні баки для нашого біопалива були придбані на місцевих об'єктах."
BHS_medivac_idea:0 "Медичні Вертольоти"
BHS_medivac_idea_desc:0 "Тяжкопоранені американці можуть дивитися в небо на своє спасіння. Незабаром вони будуть вилікувані від будь-якої травми, якої вони зазнали."
BHS_streamline_billing_idea:0 "Спрощене виставлення рахунків"
BHS_streamline_billing_idea_desc:0 "Наші процеси виставлення рахунків були оновлені для прийому оплати ресурсами та кришками."
BHS_Blinding_lights_idea:0 "Засліплюючі промені"
BHS_Blinding_lights_idea_desc:0 "Лазери на наших санітарах були перемкнуті з режиму оглушення на режим умертвіння. Напади на персонал лікарні каратимуться з летальною силою."
BHS_Speed_demons_idea:0 "Швидке обслуговування"
BHS_Speed_demons_idea_desc:0 "Наші санітари мають налаштовані двигуни для забезпечення більш швидкого обслуговування."
BHS_rb2851_idea:0 "Дані RB-2851"
BHS_rb2851_idea_desc:0 "Інший об'єкт з виробництва роботів-мозків, RB-2851, містить дані, які мають для нас велику цінність."
BHS_psas_idea:0 "Служба суспільних оголошень"
BHS_psas_idea_desc:0 "Радіозвернення Б.М.М.А.У. відновлюють нашу зіпсовану репутацію."
BHS_duraframe_idea:0 "Дослідження Duraframe"
BHS_duraframe_idea_desc:0 "Президент Едем надав нам роботизовані дослідження, які зміцнять каркаси наших роботів."
BHS_fod_idea:0 "Дослідження Фонтану"
BHS_fod_idea_desc:0 "Фонтан Снів має унікальні медичні властивості. Хоча він тьмяніє в порівнянні з §R<ПРОЦЕДУРОЮ ЛІКУВАННЯ>§!, він допомагає підтримувати життя пацієнтів, поки вони не отримають допомогу."
BHS_ronto_processing_idea:0 "Пацієнти з Торонто"
BHS_ronto_processing_idea_desc:0 "Працівники з Торонтського трудового табору відправляються до нас на §R<ПРОЦЕДУРУ ЛІКУВАННЯ>§!, коли вони занадто хворі або травмовані, щоб працювати."
BHS_fear_the_doctor_idea:0 "Страх перед лікарем"
BHS_fear_the_doctor_idea_desc:0 "Мутанти стали більш слухняними останнім часом з однієї вагомої причини: будь-хто з них, хто надто травмований для роботи, відправляється до Буффало. Ми дозволили чуткам про те, що там відбувається, поширюватися, і тепер вони бояться цього більше, ніж побиття!"
BHS_Government_grants_idea:0 "Державні гранти"
BHS_Government_grants_idea_desc:0 "Президент Едем надав нам федеральне фінансування для продовження нашої роботи."
BHS_cure_clinic_hub_idea:0 "Дослідження Клінік Лікування"
BHS_cure_clinic_hub_idea_desc:0 "Мутанти, які виявляють стійкість до Клінік Лікування Президента Едема, відправляються до нас для досліджень та §R<ПРОЦЕДУРИ ЛІКУВАННЯ>§!."

###National Focuses###
BHS_nf_a001:0 "Рука допомоги"
BHS_nf_a001_desc:0 "Після кількох поганих років Служба Охорони Здоров'я Буффало була на межі закриття. Саме тоді адміністратори отримали пропозицію, яка була надто хорошою, щоб бути правдою."
BHS_nf_a002:0 "Представляємо Б.М.М.А.У."
BHS_nf_a002_desc:0 "Наступна велика подія в охороні здоров'я. Біо-Механічний Медичний Адміністративний Пристрій зробить революцію в адмініструванні лікарень!"
BHS_nf_a003:0 "Великий наплив"
BHS_nf_a003_desc:0 "23 жовтня 2077 року кількість госпіталізованих пацієнтів перевищила прогнози на 5000%."
BHS_nf_a004:0 "Нарешті, прорив"
BHS_nf_a004_desc:0 "Після 94 372 невдалих методів лікування було розроблено повне рішення для всіх хвороб людини."
BHS_nf_a005:0 "Що для одного робота сміття..."
BHS_nf_a005_desc:0 "Вивіз медичних відходів затримується на 200 років. \n \n Необхідні альтернативні методи."
BHS_nf_a006:0 "Продаж медичних відходів"
BHS_nf_a006_desc:0 "Місцеві м'ясники купуватимуть надлишкові медичні відходи. Отримані кошти підтримають роботу лікарні."
BHS_nf_a007:0 "Дослідження біопалива"
BHS_nf_a007_desc:0 "Медичні відходи можна перетворювати на біопаливо для енергозабезпечення лікарні."
BHS_nf_a008:0 "Оптова угода"
BHS_nf_a008_desc:0 "Кілька морозильних камер з медичними відходами будуть утилізовані великою партією через місцеві контакти."
BHS_nf_a009:0 "Велика партія"
BHS_nf_a009_desc:0 "Накопичені медичні відходи заплановано до переробки."
BHS_nf_a010:0 "Лікарняна їжа"
BHS_nf_a010_desc:0 "Надлишкові медичні відходи будуть перероблені на їжу для пацієнтів, які очікують на §R<ПРОЦЕДУРУ ЛІКУВАННЯ>."
BHS_nf_a011:0 "Ремонт мейнфрейма"
BHS_nf_a011_desc:0 "Планове технічне обслуговування мейнфрейма прострочено на 180 років. \n \n Санітарів відправлено для проведення ремонту."
BHS_nf_a012:0 "Оптимізувати адміністративні процеси"
BHS_nf_a012_desc:0 "Невикористовувані адміністративні процедури, такі як завдання з управління персоналом, будуть вимкнені, щоб звільнити обчислювальну потужність для інших адміністративних завдань."
BHS_nf_a013:0 "Оптимізувати дослідницькі процеси"
BHS_nf_a013_desc:0 "Невикористовувані дослідницькі процедури, такі як подання результатів на експертну оцінку, будуть вимкнені, щоб звільнити обчислювальну потужність для інших завдань, пов'язаних з дослідженнями."
BHS_nf_a014:0 "Вимкнути непотрібні системи"
BHS_nf_a014_desc:0 "Системи, такі як етичні обмеження, будуть вимкнені та видалені з баз даних, щоб звільнити місце для більш важливих систем."
BHS_nf_a015:0 "§OПЕРЕ-ОПТИМІЗОВАНО"
BHS_nf_a015_desc:0 "Нещодавні налаштування мейнфрейма повинні забезпечити належну роботу Б.М.М.А.У. ще принаймні 200 років."
BHS_nf_a016:0 "Повітряна швидка допомога"
BHS_nf_a016_desc:0 "Багато пацієнтів помирають до того, як їх можна буде транспортувати до лікувального центру для §R<ПРОЦЕДУРИ ЛІКУВАННЯ>§!. Придбання технології вертикального зльоту та посадки забезпечить швидше транспортування."
BHS_nf_a017:0 "Запит на вертольоти"
BHS_nf_a017_desc:0 "Президент Едем готовий надати лікарні кілька вертольотів."
BHS_nf_a018:0 "Побудувати вертолітні майданчики"
BHS_nf_a018_desc:0 "Уламки навколо лікарні будуть розчищені, щоб звільнити місце для зльоту та посадки."
BHS_nf_a019:0 "Побудувати резервуари для зберігання"
BHS_nf_a019_desc:0 "Використання вертольотів збільшило потребу в запасах палива."
BHS_nf_a020:0 "Служба медичної евакуації"
BHS_nf_a020_desc:0 "Вертольоти СОЗБ патрулюватимуть у пошуках поранених людей, щоб доставити їх назад до лікарні для §R<ПРОЦЕДУРИ ЛІКУВАННЯ>§!."
BHS_nf_a021:0 "Ми §Rвилікуємо§! тебе!"
BHS_nf_a021_desc:0 "УВАГА, ГРОМАДЯНИ §C<СХІДНОГО СПІВДРУЖНОСТІ>§! \n \n СЛУЖБА ОХОРОНИ ЗДОРОВ'Я БУФФАЛО ОГОЛОШУЄ ПРО НОВУ ПРОЦЕДУРУ, ЩО ВИЛІКУЄ ВСІ ВАШІ НЕДУГИ. НАША НОВА ДОСТУПНА §R<ПРОЦЕДУРА ЛІКУВАННЯ>§! ДОВЕЛА СВОЮ §C<99.57%>§! БЕЗПЕКУ ТА ЕФЕКТИВНІСТЬ У ЛІКУВАННІ §O<РАКУ>§!, §G<РАДІАЦІЙНОГО ОТРУЄННЯ>§!, §R<ВОГНЕПАЛЬНИХ ПОРАНЕНЬ>§! ТА ІНШОГО. ВИРУШАЙТЕ ДО СЛУЖБИ ОХОРОНИ ЗДОРОВ'Я БУФФАЛО СЬОГОДНІ, ЩОБ НАЗАВЖДИ ВИРІШИТИ ВСІ СВОЇ ПРОБЛЕМИ ЗІ ЗДОРОВ'ЯМ."
BHS_nf_a022:0 "Необхідний ремонт"
BHS_nf_a022_desc:0 "Десятиліття занепаду, поки досліджувалася процедура, потрібно виправити, якщо Служба Охорони Здоров'я Буффало хоче лікувати хворих."
BHS_nf_a023:0 "Обмежити відвідування"
BHS_nf_a023_desc:0 "Кілька інцидентів, коли відвідувачі нападали на санітарів, побачивши своїх вилікуваних близьких, зумовили необхідність тимчасово призупинити відвідування."
BHS_nf_a024:0 "Спростити виставлення рахунків"
BHS_nf_a024_desc:0 "Пацієнти за останні 200 років не реагували на рахунки і намагалися оплатити лікування кришками або бартером. Наша система виставлення рахунків буде оновлена для прийому цих форм оплати."
BHS_nf_a025:0 "Тримати світло увімкненим"
BHS_nf_a025_desc:0 "Генератори з роками страждають від зростаючої кількості поломок. Санітарів буде відправлено для проведення довгострокового ремонту."
BHS_nf_a026:0 "Державні гранти"
BHS_nf_a026_desc:0 "Президент Едем запропонував матеріальну та фінансову підтримку, щоб допомогти Службі Охорони Здоров'я Буффало в її місії."
BHS_nf_a027:0 "Призначити керівників відділень"
BHS_nf_a027_desc:0 "Звільнення завідувачів кардіології, неврології, радіотерапії та всіх інших відділень було оформлено, коли вони не з'явилися на роботу 24 жовтня 2077 року. Спроби найняти нових завідувачів відділень були безрезультатними. Нам потрібно буде призначити керівників відділень зсередини."
BHS_nf_a028:0 "Вивчити звички людей"
BHS_nf_a028_desc:0 "З роками пацієнти стають все більш агресивними та чинять опір лікуванню. Ми повинні вивчити їхню поведінку, щоб знайти найкращий спосіб стримувати цих пацієнтів."
BHS_nf_a029:0 "Змінити наш підхід"
BHS_nf_a029_desc:0 "Спроба стримати агресивних пацієнтів часто є складним завданням. Нам слід розглянути інші методи, такі як лазерна ампутація."
BHS_nf_a030:0 "Безперервна освіта"
BHS_nf_a030_desc:0 "Наші керівники відділень будуть зобов'язані продовжувати вивчати нові методи роботи з пацієнтами."
BHS_nf_a031:0 "Оптимізувати делегування"
BHS_nf_a031_desc:0 "Ланцюжок комунікації між Б.М.М.А.У. та різними керівниками відділень підтримуватиметься для забезпечення безперебійної роботи."
BHS_nf_a032:0 "Збільшити кількість санітарів"
BHS_nf_a032_desc:0 "Запити на поставку запасних санітарів залишилися без відповіді. Нам потрібно буде виробляти наш персонал власними силами."
BHS_nf_a033:0 "Ходячі Хлопці"
BHS_nf_a033_desc:0 "Протектрони, спеціально розроблені для медичних завдань з вбудованими дефібриляторами, добре підійдуть для наших потреб."
BHS_nf_a034:0 "Літаючі Гарненькі"
BHS_nf_a034_desc:0 "Медсестри-роботи з додатковими насадками у вигляді пилок добре підійдуть для потреб нашого закладу."
BHS_nf_a035:0 "Посилені лазери"
BHS_nf_a035_desc:0 "Лазери Протектронів будуть точно налаштовані для виконання екстреної ампутації на відстані 30 метрів."
BHS_nf_a036:0 "Сфокусовані двигуни"
BHS_nf_a036_desc:0 "Двигуни Медсестер-роботів будуть точно налаштовані, щоб вони не відставали від дезорієнтованих пацієнтів, які тікають."
BHS_nf_a037:0 "Спеціалізована охорона"
BHS_nf_a037_desc:0 "Постійні напади злочинних елементів вимагають від нас пошуку спеціалізованих рішень з безпеки."
BHS_nf_b001:0 "Розширити наше охоплення"
BHS_nf_b001_desc:0 "Сигнал системи мовлення нашої лікарні буде посилено, щоб охопити більше потенційних пацієнтів."
BHS_nf_b002:0 "Лікарі без кордонів"
BHS_nf_b002_desc:0 "Наплив пацієнтів показав, що медичне обслуговування в районах за межами нашої зони покриття перебуває в жалюгідному стані. Можливо, нам доведеться розширити наше покриття."
BHS_nf_b003:0 "Хворі аміші"
BHS_nf_b003_desc:0 "Якась таємнича чума вразила громади амішів на південь від нас. Симптоми включають гігантизм та позеленіння шкіри. Потрібне подальше вивчення, але §R<ПРОЦЕДУРА ЛІКУВАННЯ>§! має спрацювати."
BHS_nf_b004:0 "§RВИЛІКУЙ СЕБЕ ЗАРАЗ"
BHS_nf_b004_desc:0 "Громади Східного Нью-Йорку, очевидно, не мають належного медичного обслуговування. Ми вирішимо це."
BHS_nf_b006:0 "Виправити Руйнівників"
BHS_nf_b006_desc:0 "Хворі особи з цього регіону напали на кількох наших санітарів заради їхнього металобрухту. Ми можемо зупинити це і розширити наше покриття одним кроком."
BHS_nf_b007:0 "Незціленні"
BHS_nf_b007_desc:0 "Ті, хто страждає від того, що ми називаємо Амішською чумою, не реагують на наше лікування. Це потребує подальшого вивчення."
BHS_nf_b008:0 "Роботика Рочестера"
BHS_nf_b008_desc:0 "Завод старого субпідрядника RobCo знайдено відносно недоторканим. Ми можемо використати це підприємство для ремонту наших санітарів."
BHS_nf_b010:0 "Перехопити поставки"
BHS_nf_b010_desc:0 "Порти Руйнівників очікували на кілька поставок хворих людей з-за Великих озер. Ми забезпечимо, щоб вони отримали необхідне лікування."
BHS_nf_b011:0 "Адаптація Процедури"
BHS_nf_b011_desc:0 "§R<ПРОЦЕДУРА ЛІКУВАННЯ>§!, як і всі медичні процедури, постійно потребує адаптації в міру вдосконалення наших технологій та методів. Одне з таких коригувань тепер дозволяє нам лікувати тих, хто страждає від Амішської чуми."
BHS_nf_b012:0 "Дивна пропозиція"
BHS_nf_b012_desc:0 "Мер НеЮтіки, як вони це тепер називають, надіслав адміністрації дивний запит. Вони запропонували надати цінні ресурси для наших фабрик в обмін на просування інших у черзі на процедуру лікування. Очевидно, люди НеЮтіки дуже альтруїстичні люди, які ставлять благополуччя та лікування інших вище за себе. Давайте виконаємо їхнє прохання. \n\n Зрештою... §Rми вилікуємо їх з часом.§!"
BHS_nf_b013:0 "Плаваючі лікарні"
BHS_nf_b013_desc:0 "Кораблі Руйнівників продовжуватимуть обходи навколо Великих Озер для збору пацієнтів."
BHS_nf_b014:0 "Облога Нью-Касла"
BHS_nf_b014_desc:0 "Нью-Каслу явно не вистачає належного медичного обслуговування. Ми це виправимо."
BHS_nf_b015:0 "Розширення покриття"
BHS_nf_b015_desc:0 "В останні роки ми усвідомили, що система охорони здоров'я в Східному Співдружності розвалилася. Саме ми повинні зцілити людей тут і заповнити порожнечу, залишену цими, здавалося б, покинутими лікарнями."
BHS_nf_b016:0 "Хвороба Піттсбурга"
BHS_nf_b016_desc:0 "Піттсбург страждає від спалаху невідомої хвороби. Потрібні подальші дослідження, але §R<ПРОЦЕДУРА ЛІКУВАННЯ>§! має бути застосовна принаймні для 80% випадків."
BHS_nf_b017:0 "Філія Белв'ю"
BHS_nf_b017_desc:0 "Найстаріша державна лікарня Америки перейшла під наше управління."
BHS_nf_b018:0 "Роботизовані ливарні заводи Пітта"
BHS_nf_b018_desc:0 "Ливарні заводи Піттсбурга дозволять нам ще більше збільшити виробництво санітарів."
BHS_nf_b019:0 "Лікувати ТПС"
BHS_nf_b019_desc:0 "Хворі та вмираючі Піттсбурга шикуються в чергу на лікування після контакту зі Службою Охорони Здоров'я Буффало."
BHS_nf_b020:0 "Зцілити націю"
BHS_nf_b020_desc:0 "Подальші дослідження показали, що не лише Східне Співдружність відчуває нестачу медичної допомоги. Схоже, що вся Америка переповнена хворими та вмираючими, і немає кому їх лікувати, крім нас."
BHS_nf_b021:0 "Столичний надлишок"
BHS_nf_b021_desc:0 "Вашингтон, округ Колумбія, повний старих військових роботів, яких можна було б адаптувати для роботи в наших центрах лікування."
BHS_nf_b022:0 "Зустріч умів"
BHS_nf_b022_desc:0 "Схоже, вчені з Великої Гори знайшли ліки від хвороби, не надто відмінної від нашої власної. Приємно, коли наші висновки підтверджуються колегами."
BHS_nf_b023:0 "Зцілити Північну Америку"
BHS_nf_b023_desc:0 "Ми не можемо ігнорувати страждання людей у Мексиці та Канаді. Ми подбаємо про те, щоб вони теж були вільні від хвороб."
BHS_nf_b024:0 "RB-2851"
BHS_nf_b024_desc:0 "Об'єкт General Atomics RB-2851 досяг кількох успіхів у розробці роботів-мозків. Ми можемо застосувати це до майбутніх пацієнтів."
BHS_nf_b025:0 "Служба суспільних оголошень"
BHS_nf_b025_desc:0 "Наше послання про лікування транслюватиметься на всіх радіоканалах. Американці від одного кінця країни до іншого дізнаються, що кінець їхнім стражданням настав."
BHS_nf_b026:0 "§RЗцілити світ"
BHS_nf_b026_desc:0 "Це нелюдяно — дозволяти людям на інших континентах страждати, коли ми маємо процедуру, щоб припинити їхній біль."
BHS_nf_b027:0 "Дзвінок від Президента"
BHS_nf_b027_desc:0 "Президент Америки визнав наші зусилля з лікування різних недуг сучасності."
BHS_nf_b028:0 "Американська служба охорони здоров'я"
BHS_nf_b028_desc:0 "Президент Едем надав нам повноваження нести зцілення масам."
BHS_nf_b029:0 "Досягнення Duraframe"
BHS_nf_b029_desc:0 "Нещодавні розробки в робототехніці, здійснені урядом, підуть на користь нашій місії."
BHS_nf_b030:0 "Центр Клінік Лікування"
BHS_nf_b030_desc:0 "Б.М.М.А.У. було доручено нагляд за виконанням плану Президента Едема щодо лікування Америки від мутацій."
BHS_nf_b031:0 "Бази даних Анклаву"
BHS_nf_b031_desc:0 "Уряд надав нам виробничі дані для прискорення наших процедур."
BHS_nf_b032:0 "Медичні дослідницькі центри"
BHS_nf_b032_desc:0 "Нас пов'язують з найяскравішими медичними умами, які може запропонувати Америка."
BHS_nf_b033:0 "Вивчити Фонтан"
BHS_nf_b033_desc:0 "Фонтан Снів має унікальні властивості, які потенційно можуть допомогти нашим зусиллям."
BHS_nf_b034:0 "Центр переробки в Торонто"
BHS_nf_b034_desc:0 "Уряд Онтаріо попросив нас створити лікувальний центр у Торонто для роботи з мутантами, які більше не можуть працювати."
BHS_nf_b035:0 "Головна лікарня Лінкольна"
BHS_nf_b035_desc:0 "Нещодавно зведене місто Лінкольн має лікарню, якій потрібен адміністратор."
BHS_nf_b036:0 "Косметична допомога Чикаго"
BHS_nf_b036_desc:0 "Жителі Чикаго люблять косметичну хірургію. Б.М.М.А.У. відчуває можливість."
BHS_nf_b037:0 "Дослідження Вайтспрінг"
BHS_nf_b037_desc:0 "МОДУС висловив зацікавленість в обговоренні стану мутантів з Б.М.М.А.У., а також чогось, що називається Обпалені."
BHS_nf_b038:0 "§CЛікар Америки"
