 riv_integration.13.t:0 "Інтеграцію завершено..?"
 riv_integration.13.d:0 "Усі розрізнені поселення пустки зробили свій вибір щодо того, чи приєднуватися до нашої зростаючої конфедерації. Незалежно від того, чи мудро вони вчинили, нам більше не потрібно докладати зусиль, щоб переконати їх у правильному шляху. Тепер настав час подивитися за межі цих дрібних поселень і викувати справді велику націю зі Столичної Пустки."
 riv_integration.13.a:0 "Наше майбутнє справді починається зараз"

 riv_artifact.1.t:0 "Білль про права"
 riv_artifact.1.d:0 "Руїни Національного архіву повні небезпек і здобичі. Одному з авантюристів, яких ми найняли для пошуку важливих предметів, вдалося натрапити на Білль про права під час вилазки. Він просто лежав там, чекаючи на одного з наших хоробрих найманців. Абрагам Вашингтон виділив для Білля про права окрему вітрину.\n\nКоли авантюриста запитали, чому він не забрав інші важливі документи, які напевно лежать у Національному архіві, він знизав плечима і сказав, що це було б забагато роботи. Не посперечаєшся."
 riv_artifact.1.a:0 "Як чудово!"

 riv_artifact.2.t:0 "Конституція"
 riv_artifact.2.d:0 "Руїни Національного архіву повні небезпек і здобичі. Одному з авантюристів, яких ми найняли для пошуку важливих предметів, вдалося натрапити на Конституцію під час вилазки. Вона просто лежала там, чекаючи на одного з наших хоробрих найманців. Абрагам Вашингтон виділив для Конституції окрему вітрину.\n\nКоли авантюриста запитали, чому він не забрав інші важливі документи, які напевно лежать у Національному архіві, він знизав плечима і сказав, що це було б забагато роботи. Не посперечаєшся."
 riv_artifact.2.a:0 "Це привід для святкування"

 riv_artifact.3.t:0 "Декларація незалежності"
 riv_artifact.3.d:0 "Руїни Національного архіву повні небезпек і здобичі. Одному з авантюристів, яких ми найняли для пошуку важливих предметів, вдалося натрапити на Декларацію незалежності під час вилазки. Через її важливість вона зберігалася в броньованій кімнаті в глибині будівлі під охороною армії роботів (так, принаймні, сказав мисливець за скарбами). Абрагам Вашингтон виділив для Декларації незалежності окрему вітрину.\n\nКоли авантюриста запитали, чому він не забрав інші важливі документи, які напевно лежать у Національному архіві, він знизав плечима і сказав, що це було б забагато роботи. Не посперечаєшся."
 riv_artifact.3.a:0 "Ми вкрали незалежність!"

 riv_artifact.4.t:0 "Велика хартія вольностей"
 riv_artifact.4.d:0 "Руїни Національного архіву повні небезпек і здобичі. Одному з авантюристів, яких ми найняли для пошуку важливих предметів, вдалося натрапити на Велику хартію вольностей під час вилазки. Вона просто лежала там, чекаючи на одного з наших хоробрих найманців. Абрагам Вашингтон виділив для Хартії окрему вітрину.\n\nКоли авантюриста запитали, чому він не забрав інші важливі документи, які напевно лежать у Національному архіві, він знизав плечима і сказав, що це було б забагато роботи. Не посперечаєшся."
 riv_artifact.4.a:0 "Принаймні ми отримали щось від англійців"

 riv_artifact.5.t:0 "Доктрина Монро"
 riv_artifact.5.d:0 "Виконуючи зовсім інше завдання, авантюрист, якого часто наймає Рівет-Сіті, зустрів торговця з великою кількістю старого брухту. Більшість речей здавалися марними, але дещо привернуло увагу найманця. Серед товарів незбагненним чином опинилася Доктрина Монро, яку, ймовірно, прийняли за шматок макулатури (уявляєте?). Авантюрист, знаючи інтерес Абрагама Вашингтона, негайно придбав її, і тепер вона займає почесне місце в Товаристві збереження Капітолію.\n\nНайменець також купив ще трохи брухту, але якась «сміттєва гармата» не може бути і вполовину такою цікавою."
 riv_artifact.5.a:0 "Щаслива знахідка!"

 riv_artifact.6.t:0 "Оголошення війни Китаю"
 riv_artifact.6.d:0 "Один із наших постійних авантюристів бився з супермутантами на шляху до Некрополя, коли помітив, що один із убитих ним мутантів мав при собі старий аркуш паперу. При детальному огляді з'ясувалося, що це Декларація США про оголошення війни Китаю! Важко повірити, що супермутант міг розпізнати такий важливий документ, але він, мабуть, був шанувальником американської історії, як і Абрагам Вашингтон. Документ саме зараз відправляють у вітрину."
 riv_artifact.6.a:0 "Боротьба з Китаєм ще ніколи не виглядала так добре"

 riv_artifact.7.t:0 "Війна з Німеччиною"
 riv_artifact.7.d:0 "Анклав — сумнозвісна та небезпечна група, тому коли один із наших авантюристів натрапив на їхній невеликий табір поблизу Національного архіву, це могло стати фатальним. На щастя, згадані солдати Анклаву спали, і з ними легко розправилися. Риючись у їхніх пожитках, авантюрист знайшов документ, який група явно здобула і сподівалася привезти на свою базу: Декларацію США про оголошення війни Німеччині. Пощастило, що ми встигли раніше за Анклав. Абрагам Вашингтон уже підготував для цього спеціальне місце."
 riv_artifact.7.a:0 "Відсвяткуйте це, давши по пиці нацисту!"

 riv_artifact.8.t:0 "Геттісберзька промова"
 riv_artifact.8.d:0 "Авантюрист, якого ми найняли для пошуку дорогоцінних стародавніх артефактів, під час пошуків зустрів гуля аж із самої Співдружності. Гуль неохоче говорив про Співдружність, але згадав, що прийшов із місця під назвою Добросусідство. Якимось дивом він мав при собі Геттісберзьку промову і хотів її продати (він здавався майже зневіреним...). Наш авантюрист вхопився за щасливу знахідку і привіз її на базу, а Абрагам Вашингтон уже вставив її в рамку.\n\nЦікаво, що в авантюриста розвинулася параноя — він переконаний, що за ним стежать. Напевно, просто збіг."
 riv_artifact.8.a:0 "Як вона потрапила до Співдружності?"
 
 