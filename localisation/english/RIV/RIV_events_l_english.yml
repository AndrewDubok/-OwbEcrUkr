 riv_integration.6.a:0 "Ласкаво просимо до Рівет-Сіті!"

 riv_integration.7.t:0 "Мегатонна відокремлюється!"
 riv_integration.7.d:0 "Після тривалого періоду опору нашим зусиллям вплинути на них, Мегатонні нарешті вдалося повністю звільнитися від нашого впливу. Вони працювали над самозабезпеченням водою і відмовляються вступати до нашої процвітаючої мережі. Якщо вони вважають за краще жити в кам'яному віці, нехай так і буде."
 riv_integration.7.a:0 "Вони не знають, що втратили"

