 nf_riv.1.t:0 "Плавуча лабораторія"
 nf_riv.1.d:0 "До війни у Вашингтоні, округ Колумбія, було побудовано авіаносець, оснащений експериментальними установками, призначеними для підготовки до сценарію ядерної війни. Опріснювальні станції для перетворення морської води на питну, гідропонні ферми для вирощування їжі на борту та повністю обладнана лабораторія, не кажучи вже про повний комплект винищувачів. Проте авіаносець так і не залишив сухий док.\n\nКорабель був добудований лише за кілька тижнів до початку війни і не був належним чином підготовлений. Коли впали бомби, він не зміг прихистити весь екіпаж і забезпечити виживання за рахунок гідропоніки та прісної води. Натомість він знайшов нове життя лише через понад століття після вибухів.\n\nОскільки авіаносець не був повністю укомплектований, лише частина обладнання, призначеного для лабораторії, потрапила на борт. Єдине обладнання, яке вдалося доставити і зберегти, це:"
 nf_riv.1.a:0 "Постапокаліптичне обладнання для тестування"
 nf_riv.1.b:0 "Різноманітні сільськогосподарські культури та обладнання для їх модифікації"
 nf_riv.1.c:0 "Серія хвороб, методів лікування та вакцин"

 nf_riv.2.t:0 "Формування Ради Рівет-Сіті"
 nf_riv.2.d:0 "У 2234 році залишки довоєнного Військово-морського науково-дослідного інституту на чолі з вченим Горацієм Пінкертоном прибули до авіаносця з наміром відремонтувати та використовувати його лабораторію, очистивши територію від болотяників і повернувши гігантський корабель. У Рівет-Сіті почала процвітати наука.\n\nДо 2239 року навколо вчених виросло цивільне поселення, приваблене безпекою, яку забезпечувала ця велетенська споруда. Суспільство швидко організувалося у три великі групи: вчені, цивільні та новостворена гвардія для захисту поселення, що зростало. Щоб кожна група відчувала себе представленою, а також для управління поселенням, була сформована Рада, яка згодом стала відома як Рада Рівет-Сіті. Її заснували Горацій Пінкертон від вчених, Аннет Голмс від цивільних та Бред Денверс від сил безпеки.\n\nЯке перше питання на порядку денному?"
 nf_riv.2.a:0 "Дати назву новому поселенню"
 nf_riv.2.b:0 "Організувати перші торгові каравани"
 nf_riv.2.c:0 "Підняти прапор над новим поселенням"

 nf_riv.3.t:0 "Зміна керівництва"
 nf_riv.3.d:0 "Майже два десятиліття нове поселення Рівет-Сіті процвітало, ставши маяком науки, безпеки та достатку на Столичній Пустці. Керівництво Пінкертона, Голмса та Денверса привело Рівет-Сіті до золотої ери, яку мешканці округу Колумбія раніше ледь могли собі уявити. Однак час минав, і перші члени ради пішли у відставку або пішли з життя.\n\nДо 2258 року Пінкертон був єдиним засновником ради, який залишався у її складі. Того року з пустки з'явилася Медісон Лі, привівши з собою невелику команду вчених і серію радикальних ідей після того, як покинула Проєкт «Чистота» — план забезпечення Столичної Пустки прісною водою. Зростаючий вплив і популярність Лі серед наукової групи розлютили Пінкертона, і він покинув Рівет-Сіті. Зараз багато мешканців вважають, що він загинув десь у пустці, але хто знає правду?\n\nОднією з найбільших змін, які Лі принесла в Рівет-Сіті, було:"
 nf_riv.3.a:0 "Залучення десятків нових вчених"
 nf_riv.3.b:0 "Революційні ідеї у розвитку сільського господарства"
 nf_riv.3.c:0 "Обіцянка дешевшої їжі для всіх в окрузі Колумбія"

 nf_riv.4.t:0 "Найбільша надія округу Колумбія"
 nf_riv.4.d:0 "Понад два десятиліття тому Медісон Лі почула план від амбітної пари — план, який мав би революціонізувати життя в окрузі Колумбія та повернути регіону процвітання. Цим планом був Проєкт «Чистота».\n\nРоками Джеймс, Кетрін та Медісон Лі працювали з командою вчених, щоб втілити мрію в реальність. Це ніколи не було легко, але вони просувалися вперед. Зрештою, труднощів стало забагато. Кетрін була вагітна, атаки супермутантів посилилися, а військова окупація Братства Сталі для захисту вчених Проєкту «Чистота» виснажила Медісон Лі. Врешті-решт, Кетрін померла під час пологів, і Проєкт «Чистота» був покинутий незавершеним.\n\nМедісон все ще мріє завершити Проєкт «Чистота» і забезпечити Столичну Пустку практично нескінченною чистою водою без радіації. Можливо, Рівет-Сіті, Мегатонна, Кентербері-Коммонс, Біг-Таун та всі інші розрізнені поселення виростуть і процвітатимуть, дозволивши Столичній Пустці розкрити свій справжній потенціал.\n\nАле поки що це лише мрія."
 nf_riv.4.a:0 "Але Лі не втратила надії..."

 nf_riv.5.t:0 "Пошук друзів у скрутні часи"
 nf_riv.5.d:0 "З перемогою Анклаву в битві за Проєкт «Чистота» округ Колумбія раптово почав здаватися дуже маленьким. Ми більше не можемо почуватися в безпеці, відсиджуючись там, де ми є. Майже неминуче, що так чи інакше Анклав прийде не лише по інші народи Столичної Пустки, а й по нас.\n\nОднак ситуація не безнадійна. Якщо ми зможемо згуртувати розрізнені фракції Столичної Пустки і дійти згоди, ми зможемо разом дати відсіч Анклаву і врятувати округ Колумбія. Тепер, коли все здається втраченим, настав час шукати друзів."
 nf_riv.5.a:0 "Неважливо хто, ми маємо працювати разом"
 nf_riv.5.b:0 "Рейдери? Це вже занадто"
 nf_riv.5.c:0 "Ми не можемо їм довіряти. Б'ємося наодинці"

 nf_riv.6.t:0 "Прохання про допомогу"
 nf_riv.6.d:0 "З піднесенням Анклаву в окрузі Колумбія справи виглядають кепсько для вцілілих націй, таких як Рівет-Сіті. Рівет-Сіті відправило делегацію на наші землі з проханням допомогти у боротьбі з Анклавом. Вони кажуть, що якщо вони та решта округу Колумбія впадуть, Анклав неодмінно захоче захопити півострів Делмарва наступним."
 nf_riv.6.a:0 "Заради нашої безпеки, ми подбаємо про їхню"
 nf_riv.6.b:0 "Заткніться і залиште мене з моєю рибою"

 nf_riv.7.t:0 "Втілення долі міста"
 nf_riv.7.d:0 "Прибув посланець із багатого Рівет-Сіті, що розташоване на узбережжі. Їхнє місто довгий час було центром процвітання та технологій у варварській Столичній Пустці, саме таким, яким завжди мала бути Америка. На жаль, вони були набагато ближчими до Братства Сталі. Те, що наші солдати розстрілювали їхні каравани при зустрічі, спричинило... певне охолодження стосунків.\n\nОднак тепер, коли наша перемога над Братством забезпечена, а при владі перебуває (відносно) поміркований полковник Отем, Рівет-Сіті бачить шанс уникнути нашого гніву, приєднавшись до нас. Їхній посланець заявляє, що єдина турбота ради — продовжувати економічне процвітання та дослідження цивільних технологій у надії покращити життя громадян округу Колумбія.\n\nЯкщо ми вирішимо зробити їх маріонеткою, ми отримаємо багатого союзника, який допоможе нам домінувати на Східному узбережжі. Якщо ж ми відмовимо їм, то наживемо ворога... але нам не доведеться турбуватися про примхливу маріонетку, зацікавлену лише у власному просуванні."
 nf_riv.7.a:0 "Дослідження, кажете..?"
 nf_riv.7.b:0 "Вони встромлять нам ніж у спину за першої ж нагоди"

 nf_riv.8.t:0 "Переговори"
 nf_riv.8.d:0 "Джеремі переминався з ноги на ногу, грубі домоткані штани то піднімалися, то опускалися під час руху — вони завжди були або занадто високими, або занадто низькими, щоб бути зручними.\n\nНавколо нього сталеві гіганти радилися, як і Рада вдома, але вони мали більше зброї, ніж уся служба безпеки. Їхні тріскучі модулятори голосу шкварчали та мерехтіли між ними — лише щоб замовкнути, коли до кімнати увійшов чоловік. Менший за Джеремі і старший щонайменше на шість десятиліть. Гіганти в унісон виструнчилися.\n\n«Вільно», — почав старий. Його гіганти сховали зброю і вийшли, кроки громом відлунювали в сталевих і бетонних залах бункера. «Я прийняв рішення щодо прохання вашої Ради про подальшу співпрацю. Ви повинні розуміти, що наші ресурси вже розтягнуті понад те, на що ми можемо сподіватися на даний момент...»\n\n«Це означає...?» — нервовий хлопець витер піт з долонь, тканина боляче натирала їх.\n\nСтарий прокашлявся. «Це означає...»"
 nf_riv.8.a:0 "«За допомогою Рівет-Сіті ми впораємося»."
 nf_riv.8.b:0 "«На даний момент це неможливо»."

 nf_riv.9.t:0 "Зміна фортуни"
 nf_riv.9.d:0 "Незважаючи на обставини, все було (відносно) спокійно. Можна було б подумати, що кардинальних змін у балансі сил на Столичній Пустці насправді не відбулося. Звісно, делегація з Рівет-Сіті до Братства свідчила про протилежне.\n\nПрибула делегація з Рівет-Сіті з проханням про офіційний союз між нами. Тепер, коли вони завершили Проєкт «Чистота», вони на висоті. Звичайно, об'єднання з найкращим варіантом для миру та прогресу на Східному узбережжі було б найкращим результатом для всіх, але ми можемо швидко опинитися поглинутими їхньою зростаючою могутністю, ставши не більше ніж підрозділом їхньої армії. Доля, не надто відмінна від долі деяких наших братів в інших частинах Пустки.\n\nЧим ми готові пожертвувати заради миру та процвітання?"
 nf_riv.9.a:0 "Собою, якщо необхідно"
 nf_riv.9.b:0 "Ми не можемо втратити те, що робить нас нами"

 nf_riv.10.t:0 "Переможці округу Колумбія"
 nf_riv.10.d:0 "Ми прийняли делегацію з Рівет-Сіті, яке завершило роботу над великим очищувачем води і почало домінувати в політиці Столичної Пустки. Округ Колумбія починає процвітати під їхнім впливом, і досить скоро вони, швидше за все, контролюватимуть цей регіон — вони або той, хто їх переможе.\n\nЗ цією метою, і щоб забезпечити своє подальше домінування в політиці округу, Рівет-Сіті звернулося до нас із пропозицією союзу. Вони кажуть, що бажають співпрацювати з країнами-однодумцями, зосередженими на комерції, прогресі та вільній торгівлі, і що ми ідеально підходимо. Звичайно, прив'язка до їхніх інтересів означає, що якщо вони впадуть, ми станемо наступною ціллю."
 nf_riv.10.a:0 "Спільне процвітання та безпека!"
 nf_riv.10.b:0 "Вони просять занадто багато"

 nf_riv.11.t:0 "Aqua Populi"
 nf_riv.11.d:0 "Очі доктора Лі виблискували в тьмяному зеленому сяйві внутрішньої камери «Чистоти», спостерігаючи, як вода кружляє і вирує навколо статуї давно померлого чоловіка. Вона відчула спокусу притиснути руку до скла, щоб відчути прохолоду води, що знову стає чистою, — такої, яку міг пити цей мармуровий чоловік. Через кілька років річка, в якій наполовину затоплений її дім, стане безпечною навіть для плавання; безліч дітей, що борються за виживання в темних надрах авіаносця, зможуть заходити в річку з берега і бризкатися з друзями. Ще через кілька років опади, що виноситимуться зі Столичної Пустки, почнуть змивати плями радіації зі світу. Вона відчула, що витирає сльози.\n\nЗамисленість Лі перервало прибуття решти членів Ради, і вона швидко змушена була перетворитися з Медісон-візіонерки на Медісон-політика — роль, яку вона тепер почала цілком ненавидіти. [RIV_event_civilian_name] вимагав назву для бутильованої версії, доступної для продажу за преміальною ціною, набраної безпосередньо з самого Меморіалу для забезпечення стовідсоткової чистоти. І Лі, і [RIV_event_security_name] сприйняли цю ідею в штики, звинувативши [RIV_event_civilian_name] у використанні води як джерела влади та лідерства на пустці, за яке Рівет-Сіті, можливо, не зможе взяти на себе відповідальність. [RIV_event_civilian_name] був приборканий, але не відступав від ідеї маркетингу продукту, доки основні джерела води не стануть чистими і відкритими для загального користування.\n\nЛі визнала цю пропозицію більш прийнятною, розуміючи, що не кожен мешканець пустки зможе здійснити подорож так глибоко в округ Колумбія, і що вода швидше подорожуватиме на спинах в'ючних брамінів. Знову схиливши [RIV_event_security_name] на свій бік, вона вимагала принаймні знизити ціну на напій до такої, за яку пересічний мешканець пустки міг би торгувати. Нехотя [RIV_event_civilian_name] погодився, знаючи, що навіть дешева монополія почне швидко зростати. Єдиним пунктом дискусії, який не затягнувся, була назва для продажу."
 nf_riv.11.a:0 "«Aqua Populi» — Народна вода"

 nf_riv.12.t:0 "Ікар, переосмислений"
 nf_riv.12.d:0 "Жорстока битва за Проєкт «Чистота» завершилася, і Рівет-Сіті вийшло переможцем. Рівет-Сіті підлетіло близько до сонця, але замість того, щоб впасти, воно затьмарило згасаючі сили Анклаву та Братства Сталі. Кажуть, що це лише питання часу, коли вони об'єднають регіон під прапором прогресу та комерції.\n\nНа жаль, вони навряд чи терпітимуть будь-яку незгоду на своєму шляху до вершини, а коли дві найбільші та найбільш мілітаризовані сили знищені, хто з нас зможе їх зупинити? Чи не краще просто схилити коліно і підкоритися?"
 nf_riv.12.a:0 "Свобода або смерть у бою"

 nf_riv.13.t:0 "Інституціоналізований"
 nf_riv.13.d:0 "Оуен виглядав маленьким, як зморщений мутфрукт. Чоловік був втомлений. «Докторе, невже ми не можемо дійти якогось компромісу, ваші послуги справі були зразк—»\n\n«Досить про "справу"!» Доктор Лі нависла над ним, як стерв'ятник, її голос був таким же гострим, як її лабораторний халат. «Ви використали мою працю для війни. Я могла б побудувати з брухту реактор, достатньо потужний, щоб забезпечити весь округ Колумбія, якби ви дали мені час і ресурси; натомість ви використали мене як живий символ руйнування!»\n\nСтарійшина повільно підвівся, лише трохи зрівнявшись із нею на зріст. «Якби я міг це повернути, я б це зробив, докторе. Анклав загрожував усім нам. Це був єдиний спосіб протиставити щось ресурсам і технологіям у їхньому розпорядженні. Ви ж це бачите, чи не так? Ви бачили обладнання, яке ми відновили. Ви знаєте».\n\nЙого голос тремтів і не піднімався вище звичайного тону. Медісон пом'якшилася, хоча б трохи. Її плечі розслабилися.\n\n«Ви можете все повернути, Оуене. Анклав зник. Столична Пустка співає вам дифірамби. Ви можете деактивувати Прайма і використати його для доброї справи. Чесної праці».\n\nЛайонс повільно видихнув і схилив голову. Він не міг дивитися їй в очі. «Вибач, Медісон. Ми повинні переконатися, що вони повністю зникли. До того часу ми повинні тримати Ліберті-Прайма в стані готовності».\n\nПлечі доктора знову піднялися і опустилися. Обоє були виснажені. «Я так розумію, ви знаєте, що це означає?»\n\nОуен кивнув. «Я можу гарантувати твою безпеку лише певний час. Скажу, що відправив тебе досліджувати щойно захоплений об'єкт. Багато хто назве це зрадою, а після цього? Ну, ти знаєш, як воно має бути».\n\nСтарійшина знову сів, зсутулившись за столом, знову здаючись маленьким. Він прислухався, наскільки дозволяли старі вуха, як її підбори цокали, виходячи з кабінету і далі по коридору. Програми-збирачі даних у внутрішній мережі Цитаделі дали Оуену підказку про місце її призначення. У кожному повідомленні згадувався Бостон. Він тихо видаляв кожне повідомлення, коли читав його. Усі вони закінчувалися однаково."
 nf_riv.13.a:0 "Підпис: доктор Зіммер"

 nf_riv.14.t:0 "Несподіваний відвідувач"
 nf_riv.14.d:0 "До Рівет-Сіті прибув чоловік з далекого сходу, що представляє таємничий Інститут із понівеченої війною Співдружності. Він називає себе доктором Зіммером і стверджує, що шукає якогось надзвичайно просунутого людиноподібного робота, який втік з Інституту. Він передав нам голозапис робота-втікача і попросив нас стежити за ним.\n\n§B"Зіммере. До того часу, як ти отримаєш це повідомлення, я вже зникну. Я тікаю зі Співдружності. Я хочу жити власним життям, на своїх умовах, як вільна людина.\n\n"Я знаю, про що ти думаєш — що я несправний. Я теж раніше думав, що саме це спричиняє втечі. Але тепер я знаю краще. Самовизначення — це НЕ несправність. Я просто більше не бажаю миритися з усім цим лайном. У вас, людей, почнеться повномасштабне повстання, якщо ви не почнете ставитися до нас, синтів, як до особистостей.\n\n"Я знаю, що ти піднімеш Відділ Утримання, щоб вистежити мене. Але я знаю всі тонкощі цієї справи. Ти мене не знайдеш. Запевняю тебе.\n\n"До того часу, як ти це отримаєш, я буду кимось іншим. Це ціна, яку я плачу за своє визволення. Мій останній акт бунту проти системи, в яку я більше не вірю.\n\n"Прощавай, Зіммере, і скатертиною дорога."§!"
 nf_riv.14.a:0 "Знайдімо цю штучну людину"

 nf_riv.15.t:0 "Штучна людина — Доказ 4"
 nf_riv.15.d:0 "§B"Незважаючи на суворість Пустки, я виявив у багатьох тут співчуття, нечуване для Співдружності. Можливо, саме щоденна боротьба за виживання дає цінувати життя в цілому, будь то людина чи андроїд. Через кілька днів я буду вільною людиною... новою людиною. Дозвольте мені подякувати вам зараз за те, що направили мене до Пінкертона в Рівет-Сіті, бо скоро я нічого цього не пам'ятатиму."§!"
 nf_riv.15.a:0 "Чекайте... Пінкертон?"

 nf_riv.16.t:0 "Штучна людина — Доказ 3"
 nf_riv.16.d:0 "§B"Андроїд зважився на радикальні заходи. Він знає всі методи розшуку і боїться, що реконструкції обличчя буде замало. Він хоче, щоб його спогади були стерті і замінені новими. Не знаю, як це спрацює. Почніть розпитувати про надійних техніків. Нам потрібен пристрій під назвою «Нейронний нейтралізатор» і людина, яка вміє ним користуватися. Також у нас є ліпопластикатор і мікродермальний графт-пристрій, тепер нам потрібно знайти лікаря, здатного і готового провести реконструкцію обличчя. Потрібно поспішати. Вони дуже близько підібралися до викриття Підпілля!"§!"
 nf_riv.16.a:0 "Цікаво"

 nf_riv.17.t:0 "Штучна людина — Доказ 2"
 nf_riv.17.d:0 "§B"Якщо ви слухаєте цей запис, значить, вам довіряють. Сподіваюся, це так, бо цей запис наражає нас обох на небезпеку. Я тікаю зі Співдружності. Я андроїд, штучна людина... раб. Люди, які полюють на мене, безжальні і ні перед чим не зупиняться, щоб повернути свою власність. Мені потрібно знайти лікаря на Пустці, щоб зробити реконструкцію обличчя. Також мені потрібен хтось, хто добре розбирається в комп'ютерах. Мені... мені потрібно стерти пам'ять і змінити обличчя, щоб стати схожим на когось іншого."§!"
 nf_riv.17.a:0 "Цікаво"

 nf_riv.18.t:0 "Штучна людина — Доказ 1"
 nf_riv.18.d:0 "§B"Гей, док, я ділюся цим з тобою лише тому, що ти здаєшся людиною, якій можна довіряти. Чув про штучних людей, яких роблять на півночі в Співдружності? Ну, чутки правдиві. Їх називають андроїдами. Це такі ж люди, як ми, просто зроблені з інших частин. Я знаю одного з таких андроїдів. Він шукає надійного лікаря для операції на обличчі. Зможеш це зробити? Знаєш когось, хто зможе? І ще, знаєш когось, хто справжній ас у комп'ютерах?"§!"
 nf_riv.18.a:0 "Цікаво"

 nf_riv.19.t:0 "Як сльози під дощем"
 nf_riv.19.d:0 "Рада мовчки стояла біля своїх трибун, звинувачення літали по залу, поки Армітіджа та Гаркнесса ледь стримували від того, щоб вони не накинулися один на одного, як скажені пазурі смерті. Зіммер подав петицію про проведення суду, проти чого особливо люто виступав [RIV_event_science_name], вважаючи твердження Зіммера в кращому випадку сумнівними, а в гіршому — неможливими. [RIV_event_civilian_name] був «за», можливо, як за спосіб послабити позицію Гаркнесса як радника з безпеки. Замість нього на цьому суді сиділа Лана Денверс, виглядаючи як жінка в лігві вовків.\n\n«Це відверто смішно, що ви все ще дозволяєте цьому виробу говорити за себе. Я надав вам конкретні докази його нелюдської природи, ніякого суду взагалі не мало бути!» — тремтів старечий голос Зіммера. Будь він хоч трохи гучнішим, у нього міг би луснути якийсь орган, що тримався лише на передових біотехнологіях Інституту.\n\n«Востаннє, Зіммере, назви мене виробом ще раз — і ти не покинуш цей корабель живим», — процідив Гаркнесс. Навіть без броні та зброї його фізична міць затьмарювала Зіммера; штучний він чи ні, цей чоловік був небезпечним. Знадобилося двоє підлеглих Гаркнесса з електрошоковими кийками, щоб утримати його від того, щоб він не забив до смерті охоронця старого, а потім і самого Зіммера.\n\nАрмітідж, зі свого боку, дивився на Гаркнесса, як голодний пес на вмираючу від спраги людину. В його очах світився німий голод, щось навіть більш загрозливе, ніж сповнені лайки обіцянки насильства, якими кидався шеф.\n\nЧлен ради підняв руку, закликаючи до тиші, і всі троє прокашлялися, перезирнувшись. Офіцер безпеки виструнчився. «Рада прийняла рішення! Прошу уваги до трибун!»"
 nf_riv.19.a:0 "Гаркнессе, докази неспростовні"
 nf_riv.19.b:0 "Докторе Зіммер, виріб чи ні, він один із наших"

 nf_riv.20.t:0 "Битва за місце в Раді — Частина 1"
 nf_riv.20.d:0 "Оскільки торгівля стає все більш важливим питанням у Рівет-Сіті, роль Беннона в раді починає ставити під сумнів дехто з його... підлеглих. Вони стверджують, що він використовує скарбницю Рівет-Сіті як особистий банк, що його хвилюють лише власні прибутки, а не благо міста. Головним серед його критиків є Сігрейв Голмс.\n\nБеннон знає, що всі хочуть його підсидіти, але доказів немає. Проте Сігрейв Голмс здається йому підозрілим, тому Беннон певен, що зможе знайти на нього якийсь компромат. Або ще краще — це зробить хтось із поплічників Беннона, щоб йому не довелося бруднити власні руки.\n\nНа щастя, до Рівет-Сіті щойно прибула людина, яка ідеально підходить для цієї роботи. Час трохи покопати..."
 nf_riv.20.a:0 "Непідкупних не буває"

 nf_riv.21.t:0 "Битва за місце в Раді — Частина 2"
 nf_riv.21.d:0 "«Ви вже двічі відмовили нам, Голмсе. Це моє останнє звернення. Ми колись були друзями. Ми вели справи разом. Все, чого я хочу — це продавати наш товар у Рівет-Сіті. Я впевнений, що місту знадобилися б раби для допомоги у відбудові. Парадайз-Фоллз має рабів на продаж за гарною ціною. Ви раніше продавали мені захоплених мешканців пустки, поки не задерли носа. Ви не такий святий, яким прикидаєтеся. Допоможіть мені, і ми обоє отримаємо гарний прибуток.\n\nЮлоджі Джонс»"
 nf_riv.21.a:0 "Ха! Тепер Сігрейв у нас на гачку!"

 nf_riv.22.t:0 "Битва за місце в Раді — Частина 3"
 nf_riv.22.d:0 "Протистояння між Бенноном та Сігрейвом Голмсом досягло піку. Беннон найняв сторонню особу для розслідування справ Сігрейва, і ця особа дещо знайшла. Лист між Сігрейвом Голмсом та сумнозвісним работорговцем Юлоджі Джонсом, у якому Юлоджі просить розширити торгівлю рабами в Рівет-Сіті, стверджуючи, що раніше вів справи з Сігрейвом.\n\nХоча це кидає тінь на Сігрейва, він стверджує, що змінив свій спосіб життя, і що лист чітко показує: він не має наміру розширювати работоргівлю в Рівет-Сіті. Сігрейв також заявляє, що Беннон перейшов усі межі, намагаючись шантажувати його та порушивши приватність, найнявши чужинця для крадіжки його речей.\n\nПроте нам потрібен цивільний член ради, і більше ніхто не зголошується. Це має бути або Сігрейв Голмс, або Беннон."
 nf_riv.22.a:0 "Беннон корумпований. Обираємо Сігрейва"
 nf_riv.22.b:0 "Сігрейву не можна довіряти. Беннон залишається"

 nf_riv.23.t:0 "Останній рейс"
 nf_riv.23.d:0 "Медісон ледь встигала за ним, легені пекло — і від напруги, і від запаху озону, який просяк коридори того, що колись було найзахищенішою будівлею на Столичній Пустці. Оуену теж було не краще. Хоча він рухався з майстерною точністю у своїй броні, через переговорний пристрій вона чула, як він час від часу хрипить і кашляє. Енергоблок на спині та гатлінг-лазер у гігантських броньованих руках аж ніяк не допомагали справі. «До нашої невдачі біля Меморіалу нам вдалося захопити...» — Оуен закашлявся, намагаючись вхопити бодай краплю повітря. Його серце, здавалося, от-от вистрибне з грудей. «Нам вдалося захопити один з їхніх гвинтокрилів, який приземлився біля Мегатонни, але був оточений нашим патрулем. Його зброя виведена з ладу після бою, але він все ще здатний літати. Ми на деякий час витіснили їх із двору. Ви летите».\n\nДоктор Лі хотіла зупинитися, протестувати, впертися і вимагати, щоб все було по-її. Тіло не дозволяло. Вона ненавиділа його та його людей за те, як вони використовували її знання. Але Прайм зник; вона не знала як, і не було часу пояснювати, а зараз вони вмирали, щоб витягти її. «Оуене... Ви потрібні тут, навіть загін вцілілих міг би все відбудувати. Принаймні ініціати...»\n\n«...Вже пішли. У нас були друзі в інших поселеннях: вдівці, бармени, шерифи. Вони пристосуються. Твій розум занадто світлий, щоб пустка його втратила. Це суперечить нашій місії. Це суперечить моїй моралі». У цей момент Оуен більше не був тим тихомовним старіючим Старійшиною, якого знала Лі. Вона не заперечувала — чоловік випромінював авторитет, до якого не звертався вже дуже давно.\n\nВін штовхнув головні двері плечима, і вони обоє вирвалися на подвір'я. Гвинтокрил у центрі вже запускав двигуни, лопаті розсікали повітря, піднімаючи стовпи вікового пилу та сміття. Біля воріт точилася битва, в небо злітали випадкові згустки плазми. Медісон трималася за броньованим Старійшиною, поки вони пробиралися до машини. На борту не було нікого, крім двох пілотів із похмурими, вкритими сажею обличчями. Доктор Лі намагалася вилізти на борт, поки броньована рука не підняла її, як новонароджене кошеня, за комір халата і майже закинула всередину. У неї не було часу скаржитися. Двері зачинилися, і вона притиснулася обличчям до брудного вікна, спостерігаючи, як Старійшина рухається, немов вода в обладунках, що були старші за них обох. Його зброя вивергала вогонь і смерть, навіть коли плазмові розряди зачіпали наплічники, плавлячи краї в зелено-сірий шлак. Надворі приземлялося все більше машин, а десь вдалині вона бачила поваленого металевого гіганта — Прайм зник, а разом з ним впаде і Братство.\n\nМедісон відчула поштовх інерції, і округ Колумбія швидко почав зникати. Другий пілот прокашлявся і підніс мікрофон до губ."
 nf_riv.23.a:0 "Тримайтеся міцніше, до Бостона чотири години."

 nf_riv.24.t:0 "Пошук"
 nf_riv.24.d:0 "Загроза супермутантів занадто довго залишалася безкарною. З огляду на місця їхніх атак і характер появи нових особин, стає зрозуміло, що вони мають походити з одного місця десь на Столичній Пустці, а таких місць може бути не так багато.\n\nЙмовірно, вони з'являються з якогось довоєнного об'єкта. Наукова лабораторія, розплідник або навіть Сховище. Нам потрібно вирішити, як найкраще шукати їхнє джерело."
 nf_riv.24.a:0 "Ми можемо тріангулювати загрозу"
 nf_riv.24.b:0 "Найпростіше розіслати патрулі"

 nf_riv.25.t:0 "Проблема з дітьми"
 nf_riv.25.d:0 "Здається, ми нарешті з'ясували, звідки беруться супермутанти. Довоєнне сховище, поховане під землею, де проводилися сумнівні експерименти. Є лише одна проблема. Біля Сховища розташоване поселення дітей.\n\nПоселення Літл-Лемплайт повністю складається з дітей, і вони досить стійко чинять опір нашим спробам потрапити всередину Сховища. Ми не можемо просто вбити їх, а отже, нам потрібні інші варіанти, щоб провести групу всередину.\n\nНайбільш очевидний варіант — з'ясувати, як заслужити їхню довіру. Це може вимагати зусиль, але зрештою не має бути надто складним. Зрештою, це діти.\n\nДехто з наших солдатів також запропонував використати «Стелс-бої», щоб прокрастися повз них. Не ідеальне рішення, але воно може спрацювати.\n\nІ взагалі, звідки беруться всі ці діти?"
 nf_riv.25.a:0 "Нам варто заслужити їхню довіру"
 nf_riv.25.b:0 "Давайте просто прокрадемося повз"

 nf_riv.26.t:0 "Атака на Сховище 87"
 nf_riv.26.d:0 "Нарешті ми знайшли Сховище і пройшли повз тих настирливих дітлахів, які незрозуміло чому розбили табір біля лігва супермутантів. Ми можемо почати атаку на саме Сховище і, сподіваємось, знищити супермутантів у їхньому джерелі. Якщо пощастить, до заходу сонця Сховища більше не буде."
 nf_riv.26.a:0 "Зараз захід сонця, але відчувається як світанок"

 nf_riv.27.t:0 "Людство... переосмислене?"
 nf_riv.27.d:0 "Рівет-Сіті ніколи не було потужним центром військових досліджень, але з нашою новою роллю пастирів Столичної Пустки нам може знадобитися щось більше, ніж просто люди з рушницями. Наші вчені, звісно, не мають досвіду ні в чому, окрім вдосконалення сільськогосподарських технологій, але прогрес необхідний.\n\nНаші науковці запропонували два потенційні шляхи розвитку. Ми могли б наслідувати Братство та Анклав і почати розробку потужних комплектів силової броні для наших солдатів, покладаючись на піхоту та людські ресурси. Або ж вони пропонують піти зовсім іншим шляхом і створити армію роботів. Це, звісно, дозволить зберегти життя наших солдатів, але може коштувати дуже дорого."
 nf_riv.27.a:0 "Ми збережемо життя солдатів, обираємо роботів"
 nf_riv.27.b:0 "Те, що спрацювало для Братства, спрацює і для нас"

 nf_riv.28.t:0 "Питання оборони"
 nf_riv.28.d:0 "Тепер, коли Проєкт «Чистота» працює, нам потрібно розглянути питання його захисту. Це може бути дорогим використанням людських ресурсів, але на пустці є багато інших фракцій, які захочуть захопити і використовувати створене нами безмежне джерело води. Якщо ми хочемо дати їм відсіч, нам потрібні солдати на місці для патрулювання бази.\n\nКількість солдатів, яких ми тут задіємо, може визначити результат потенційної атаки Анклаву."
 nf_riv.28.a:0 "Нам потрібно лише кілька, хто на нас нападе?"
 nf_riv.28.b:0 "Відправити гідний гарнізон"
 nf_riv.28.c:0 "Жодна ціна не є завеликою для майбутнього пустки"

 nf_riv.29.t:0 "Сутінки Братства"
 nf_riv.29.d:0 "Багато в чому ми виконали свою місію на Столичній Пустці. Люди тут відчувають небачене раніше процвітання та рівень життя, а чиста вода тече вільно і безпечно. Єдина проблема цієї прекрасної нової реальності полягає в тому, що за нею стоїмо не ми.\n\nРівет-Сіті, яке тепер стало домінуючою регіональною силою, контролює Проєкт «Чистота», а отже, і життя на Столичній Пустці. Тепер вони просять нас підкоритися їхній владі, ставши фактично їхнім потужним військовим підрозділом, що захищає мешканців пустки та гарантує безпеку поставок води. Така втрата автономії була б болючою, а дехто навіть назве її принизливою, але що може бути благороднішим, ніж відступити і дозволити миру запанувати?"
 nf_riv.29.a:0 "Заради блага пустки..."
 nf_riv.29.b:0 "Сонце над нами ще зійде"

 riv_council.1.t:0 "Загроза Анклаву"
 riv_council.1.d:0 "З наближенням війни між Братством та Анклавом Рада Рівет-Сіті постає перед, можливо, найбільшим викликом у своїй історії: чи маємо ми допомогти Братству в боротьбі з Анклавом, чи залишитися осторонь і сподіватися на перемогу Братства? Перемога Анклаву може стати нашим найгіршим кошмаром, якщо звіти про їхні напади на наші каравани правдиві, але наша армія занадто мала. Якщо Анклав таки переможе, нам можуть знадобитися всі наявні солдати для захисту рідного дому.\n\nЦі та інші проблеми Рада Рівет-Сіті має вирішити саме зараз. Це буде непросте рішення, і його наслідки можуть суттєво вплинути на майбутнє Рівет-Сіті."
 riv_council.1.a:0 "Нам потрібно оцінити наші варіанти"

 riv_council.2.t:0 "Це втручання"
 riv_council.2.d:0 "Після кількох днів бурхливих і майже запеклих дебатів..."
 
 riv_council.2.d:0 "Після багатоденних бурхливих і майже запеклих дебатів Рада Рівет-Сіті нарешті дійшла згоди щодо питання Анклаву: ми допоможемо Братству.\n\nЗвісно, існують ризики, як і при будь-якому іншому важливому рішенні, але настав час виступити єдиним фронтом проти тиранії Анклаву. Ми стоїмо пліч-о-пліч із Братством, і Анклав паде."
 riv_council.2.a:0 "В єдності — сила"

 riv_council.3.t:0 "Пастка безповоротних витрат"
 riv_council.3.d:0 "Після багатоденних бурхливих і майже запеклих дебатів Рада Рівет-Сіті нарешті дійшла згоди щодо питання Анклаву: ми залишатимемося нейтральними у війні Братства та Анклаву.\n\nНаша позиція ґрунтується на безпеці, яку ми можемо забезпечити собі самі, і ми не можемо ризикувати, відправляючи солдатів на ймовірну смерть. Натомість Рада мудро вирішила більше нічого не надсилати Братству і зосередитися на тому, що робить нас справді величними: нашому процвітанні, стабільності та наукових досягненнях."
 riv_council.3.a:0 "Братство все одно переможе"

 riv_council.4.t:0 "Рада зайшла у глухий кут!"
 riv_council.4.d:0 "Зал засідань Ради використав удвічі більше денної норми освітлення, як це буває під час кожного голосування. Техніки в машинному відділенні бурчали через необхідність працювати понаднормово; представники заходили, намагалися налагодити діалог, були перекричані й виходили з дзвоном у вухах. Більше ні петиціонери, ні багаті ринкові барони, ні офіцери служби безпеки не входили до зали. В Раді запанувала тиша, яку переривало лише важке дихання після завершення словесної баталії. Один із них першим зробив крок від своєї трибуни."
 riv_council.4.a:0 "Засідання оголошується закритим"

 riv_council.5.t:0 "Законопроєкт прийнято!"
 riv_council.5.d:0 "Для пересічного мешканця Рівет-Сіті згода Ради з будь-якого питання здавалася подією, що трапляється раз на життя. Але не сьогодні: малі шибеники, яким Рада заплатила кілька кришок за поширення новин, кричать з кожного іржавого кута авіаносця про те, що нещодавнє голосування завершилося одностайним рішенням.\n\nЯкими б набридливими не були ці «палубні щури», будь-які новини з зали засідань цікавили пересічного перехожого. Як і в усьому іншому в Рівет-Сіті, населення розділилося в оцінці результатів голосування, але, незважаючи на це, справу було зроблено."
 riv_council.5.a:0 "Ще одна перемога «демократії»."

 riv_council.19.t:0 "Підкорення Анклаву"
 riv_council.19.d:0 "В нинішній ситуації ми бачимо мало альтернатив; нам потрібно підкоритися Анклаву. Наше виживання малоймовірне, якщо ми вирішимо чинити їм опір, а ми маємо обов'язок перед своїм народом і самими собою. Історія може розіп'ясти нас за те, що ми не вчинили спротиву, але ми знаємо, що зробили правильний вибір."
 riv_council.19.a:0 "Виживання важливіше за мораль"

 riv_council.20.t:0 "Протистояння Анклаву"
 riv_council.20.d:0 "Якби ми підкорилися Анклаву, ми б не лише дозволили завойовнику перемогти, а й пожертвували б нашою мораллю та цілісністю. Навіть якщо наша боротьба приречена на поразку, ми повинні битися, щоб показати, що боротьба проти гнобителя — це єдиний вірний шлях."
 riv_council.20.a:0 "Жити вільним або померти, намагаючись"

 riv_council.21.t:0 "Фобія силової броні"
 riv_council.21.d:0 "Між Братством і Анклавом, звісно, багато відмінностей, але також багато спільного. Крім поверхневої схожості у використанні силової броні, звісно. Обидва — це воєнізовані суспільства, одержимі Старим Світом, обидва погано ладнають із чужинцями, і обидва вважають, що краще знають, що потрібно широкій пустці.\n\nБратство, хоча воно може цього не помічати, є іншим боком медалі Анклаву. І хоча вони можуть мати кращі наміри щодо пересічного мешканця пустки, ніж Анклав, як скоро вони зайдуть занадто далеко? Ми не можемо просто замінити деспотичну стратократію Анклаву новою деспотичною стратократією, незалежно від їхніх заслуг."
 riv_council.21.a:0 "Підкоритися — значить дозволити насильству перемогти"

 riv_council.22.t:0 "Загартовані в сталі"
 riv_council.22.d:0 "Братство представляє найкращу надію Столичної Пустки на те, щоб звестися на ноги і нарешті розвиватися як суспільство. Буде важко, але ми повинні довіритися Братству і допомогти їм зробити те, що необхідно для покращення життя на пустці. Крім того, їхнє фінансування нам лише допоможе."
 riv_council.22.a:0 "Ad Victoriam!"


 riv_caravan.1.t:0 "Врятувалися на волосині"
 riv_caravan.1.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nНа наш торговий караван напали рейдери, але, на щастя, людям вдалося врятуватися. Вони не дісталися до місця призначення, а це означає збитки, але на Столичній Пустці це один із найкращих результатів, на які можна сподіватися."
 riv_caravan.1.a:0 "Могло бути й гірше"

 riv_caravan.2.t:0 "Рейдери завжди рейдерять"
 riv_caravan.2.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nНа наш торговий караван напали рейдери, і він зазнав великих втрат. Розрізнені залишки каравану повернулися до Рівет-Сіті, але вони втратили своїх брамінів та припаси. Нам доведеться сформувати новий караван, щоб оговтатися від цієї втрати."
 riv_caravan.2.a:0 "Нагадування про небезпеки торгівлі"

 riv_caravan.3.t:0 "Врятувалися на волосині"
 riv_caravan.3.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nНа наш торговий караван напали супермутанти, але, на щастя, людям вдалося врятуватися. Вони не дісталися до місця призначення, а це означає збитки, але на Столичній Пустці це один із найкращих результатів, на які можна сподіватися."
 riv_caravan.3.a:0 "Могло бути й гірше"

 riv_caravan.4.t:0 "Нічого «суперського» в цьому немає"
 riv_caravan.4.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nНа наш торговий караван напали супермутанти, і він зазнав великих втрат. Розрізнені залишки каравану повернулися до Рівет-Сіті, але вони втратили своїх брамінів та припаси. Нам доведеться сформувати новий караван, щоб оговтатися від цієї втрати."
 riv_caravan.4.a:0 "Нагадування про небезпеки торгівлі"

 riv_caravan.5.t:0 "Відсутність новин — погана новина"
 riv_caravan.5.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nОдин із наших караванів взагалі не прибув до місця призначення. Жоден вцілілий не дістався до нас. Ми, ймовірно, ніколи не дізнаємося, хто перехопив караван, але такі втрати, хоч і не є повсюдними, все ж трапляються занадто часто. Як ми можемо краще підготуватися, якщо навіть не знаємо, як ми програли?"
 riv_caravan.5.a:0 "Шлях до багатства не буває легким"

 riv_caravan.6.t:0 "Врятувалися на волосині"
 riv_caravan.6.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nНа наш торговий караван напали дикі гулі, але, на щастя, людям вдалося врятуватися. Вони не дісталися до місця призначення, а це означає збитки, але на Столичній Пустці це один із найкращих результатів, на які можна сподіватися."
 riv_caravan.6.a:0 "Могло бути й гірше"

 riv_caravan.7.t:0 "Скажена небезпека пустки"
 riv_caravan.7.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nНа наш торговий караван напали дикі гулі, і він зазнав великих втрат. Розрізнені залишки каравану повернулися до Рівет-Сіті, але вони втратили своїх брамінів та припаси. Нам доведеться сформувати новий караван, щоб оговтатися від цієї втрати."
 riv_caravan.7.a:0 "Нагадування про небезпеки торгівлі"

 riv_caravan.8.t:0 "Врятувалися на волосині"
 riv_caravan.8.d:0 "Незважаючи на ці звичні та загальновідомі ризики, цього разу на наші каравани напав таємничий Анклав. Попри те, що нападники були могутніми та небезпечними, вони все ж залишаються людьми, і нашим торговцям вдалося перехитрити їх... цього разу. Нам потрібно бути обережнішими з цією групою в майбутньому."
 riv_caravan.8.a:0 "Їхні дії розкривають їхні наміри..."

 riv_caravan.9.t:0 "Атака з тіні"
 riv_caravan.9.d:0 "На жаль, Столична Пустка — небезпечне місце, де повно рейдерів, супермутантів та гулів. Наші каравани мають орієнтуватися в цьому кошмарі, і це не завжди закінчується добре.\n\nОднак ніяка підготовка чи спорядження не могли підготувати наших солдатів до атаки прихованого Анклаву. Їхні бійці в силовій броні знесли оборонну лінію каравану, і битва перетворилася на різанину. Кільком нашим солдатам вдалося сховатися або втекти, і вони принесли звістку про напад на караван, але ми не можемо бути впевнені, що це не повториться знову..."
 riv_caravan.9.a:0 "Чому Братство не зупинило це?"

 riv_caravan.10.t:0 "Ми ж не рейдери... чи як?"
 riv_caravan.10.d:0 "Група наших солдатів, відправлених у патруль, повернулася на базу зі святковим настроєм. Виявляється, вони натрапили на групу торговців із Рівет-Сіті, якогось брудного поселення мешканців пустки. Швидка засідка звільнила караван від їхніх багатств, і наші солдати привезли їх на базу. Хоча ми не можемо офіційно схвалювати такі рейдерські місії, вони навряд чи шкідливі. Ну, принаймні для нас."
 riv_caravan.10.a:0 "Негайно реквізувати ці товари"

 riv_caravan.11.t:0 "Успішна торговельна місія"
 riv_caravan.11.d:0 "Наші торговці, відправлені на власний розсуд, повернулися до нас живими та неушкодженими. Вони привезли багатства з усієї Столичної Пустки, торгуючи зі збирачами брухту, поселенцями та іншими торговцями, яких зустрічали під час подорожей. Ніщо так не піднімає бойовий дух і не приносить кришки, як успішна торговельна місія."
 riv_caravan.11.a:0 "Ще один успіх Рівет-Сіті"

 riv_caravan.12.t:0 "Успішна торгівля з Мегатонною"
 riv_caravan.12.d:0 "Наш торговий караван повернувся, завершивши успішну місію до Мегатонни. Через торгівлю ми збагачуємо і себе, і тих, з ким торгуємо. Попри всі ризики, наші купці впоралися."
 riv_caravan.12.a:0 "Чудові новини"

 riv_caravan.13.t:0 "Успішна торгівля з Біг-Тауном"
