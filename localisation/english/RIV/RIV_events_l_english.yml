 riv_integration.1.t:0 "Мегатонну інтегровано"
 riv_integration.1.d:0 "Після тривалого періоду зростання їхньої залежності від нас, Мегатонна нарешті піддалася нашому впливу і вирішила приєднатися до нашої розростаючої конфедерації поселень. Відтепер вода вільно тектиме в Мегатонні, а торгівля між нашими поселеннями процвітатиме. Життя на Столичній Пустці ще ніколи не було кращим!"
 riv_integration.1.a:0 "Ласкаво просимо до Рівет-Сіті!"

