l_english:

  RIV_council_name:0 "Rivet City Council"
  riv_cc_desc:0 "The Rivet City Council has lasted for decades, representing the three groups most important to Rivet City society: the security, the scientists, and the civilians."

  RIV_harkness_name:0 "Harkness"
  riv_harkness_desc:0 "Harkness appeared out of the wastes one day, claiming to be a veteran coming out of a coma and looking for safety in Rivet City. Since then, he joined the security force and quickly rose through the ranks to become the security chief of Rivet City. He has become a firm believer in isolationism and protection of what they have in Rivet City and has taken to the city like a fish to water. However, some still wonder who he was before he arrived in Rivet City..."

  RIV_danvers_name:0 "Lana Danvers"
  riv_danvers_desc:0 "Since Harkness' removal as chief of security in Rivet City, Lana Danvers has had to take over. Formerly Harkness' second in command and best friend, Danvers now sees the Rivet City Security Force as the best tool for a positive future for all of the wasteland, not just the city."

  RIV_bannon_name:0 "Bannon"
  riv_bannon_desc:0 "Bannon arrived in Rivet City at the age of 18 and has since become its most prominent, wealthy, and ruthless merchant. Less than 10 years after arriving in Rivet City, he found himself with a council seat. Once on the council, he blatantly disregarded anyone's interests but his own, and now, as leader of Rivet City, there'll be no one to contest him and shoot down his terrific ideas about making more money for himself."

  RIV_seagrave_name:0 "Seagrave Holmes"
  riv_seagrave_desc:0 "Grandson of one of Rivet City's founders, Seagrave Holmes has spent his entire life tinkering and fixing. It's likely thanks to him that Rivet City is still held together at all, and he's even managed to restore robots for the Rivet City Security Force. Now, as leader, he hopes to bring about positive change, uplifting everyone in Rivet City to create a city that truly shines, in every sense."

  RIV_madison_li_name:0 "Madison Li"
  riv_li_desc:0 "Madison Li arrived in Rivet City in 2259, having failed to make Project Purity work and becoming bitter on the idea. She has maintained an interest in water purification, but would now much rather focus on bringing Rivet City to its full potential and pursuing her true interest: science. But with the giants of the Enclave and Brotherhood threatening to overturn everything she creates, how long will she even stay?"

  RIV_pinkerton_name:0 "Horace Pinkerton"
  riv_pinkerton_desc:0 "Horace Pinkerton was one of the original founders of Rivet City in his 20s, and dedicated his life to making Rivet City the finest city and scientific institute in the Capital Wasteland. Until he was ousted by Madison Li, that is. He left and lived a recluse, but has finally returned and promises to bring Rivet City into a bright, robotic future."

  RIV_lillian_name:0 "Lillian Granger"
  riv_lillian_desc:0 "Lillian Granger has spent much of her life as a travelling doctor, roaming the wastes and treating people who needed it. Eventually, however, she decided to settle down in Rivet City and became an important medical researcher for the city, working closely with Dr. Preston. Through a series of events she has found herself in charge of Rivet City, unprepared but enthusiastic to bring change."

  RIV_li_advisor_desc:0 "§RThe developing powers of the Enclave and the Brotherhood are making Li antsy and she may leave§!"

