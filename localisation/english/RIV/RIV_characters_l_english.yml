l_english:
RIV_council_name:0 "Рада Рівет-Сіті"
 riv_cc_desc:0 "Рада Рівет-Сіті існує вже десятиліттями, представляючи три найважливіші групи суспільства міста: службу безпеки, вчених та цивільних."

 RIV_harkness_name:0 "Гаркнесс"
 riv_harkness_desc:0 "Гаркнесс з'явився з пусток одного дня, стверджуючи, що він ветеран, який вийшов із коми та шукає притулку в Рівет-Сіті. Відтоді він приєднався до служби безпеки і швидко пройшов шлях до начальника охорони. Він став палким прихильником ізоляціонізму та захисту того, що має місто, і почувається тут як риба у воді. Проте дехто все ще задається питанням: ким він був до того, як потрапив у Рівет-Сіті..."

 RIV_danvers_name:0 "Лана Денверс"
 riv_danvers_desc:0 "Після усунення Гаркнесса з посади начальника охорони, Лана Денверс була змушена взяти командування на себе. Колишня заступниця та найкраща подруга Гаркнесса, тепер Денверс бачить у силах безпеки Рівет-Сіті найкращий інструмент для побудови світлого майбутнього для всієї Пустки, а не лише для міста."

 RIV_bannon_name:0 "Беннон"
 riv_bannon_desc:0 "Беннон прибув до Рівет-Сіті у віці 18 років і відтоді став його найвідомішим, найбагатшим і найнещаднішим торговцем. Менш ніж через 10 років після прибуття він уже отримав місце в Раді. Ставши членом Ради, він відверто ігнорував чужі інтереси заради власних, і тепер, як лідер Рівет-Сіті, він не матиме нікого, хто міг би оскаржити його «геніальні» ідеї щодо особистого збагачення."

 RIV_seagrave_name:0 "Сігрейв Голмс"
 riv_seagrave_desc:0 "Онук одного із засновників Рівет-Сіті, Сігрейв Голмс провів усе своє життя, щось майструючи та лагодячи. Ймовірно, саме завдяки йому місто все ще не розвалилося, він навіть зумів відновити роботів для служби безпеки. Тепер, як лідер, він сподівається принести позитивні зміни, піднімаючи рівень життя кожного в Рівет-Сіті, щоб створити місто, яке справді сяє — у всіх сенсах."

 RIV_madison_li_name:0 "Медісон Лі"
 riv_li_desc:0 "Медісон Лі прибула до Рівет-Сіті у 2259 році, розчарована невдачею з Проєктом «Чистота». Вона зберегла інтерес до очищення води, але тепер воліла б зосередитися на розвитку потенціалу Рівет-Сіті та своїй справжній пристрасті — науці. Але оскільки гіганти в особі Анклаву та Братства загрожують знищити все, що вона створює, як довго вона тут залишатиметься?"

 RIV_pinkerton_name:0 "Горацій Пінкертон"
 riv_pinkerton_desc:0 "Горацій Пінкертон був одним із засновників Рівет-Сіті, коли йому було трохи за двадцять. Він присвятив життя тому, щоб зробити місто найкращим науковим інститутом Столичної Пустки. Поки його не витіснила Медісон Лі. Він пішов і жив самітником, але нарешті повернувся і обіцяє привести Рівет-Сіті до світлого роботизованого майбутнього."

 RIV_lillian_name:0 "Ліліан Грейнджер"
 riv_lillian_desc:0 "Ліліан Грейнджер провела більшу частину свого життя як мандрівний лікар, блукаючи пустками та лікуючи тих, хто цього потребував. Зрештою вона вирішила осісти в Рівет-Сіті та стала важливим медичним дослідником, тісно співпрацюючи з доктором Престоном. Через низку подій вона опинилася на чолі міста — непідготовлена, але сповнена ентузіазму нести зміни."

 RIV_li_advisor_desc:0 "§RЗростання могутності Анклаву та Братства змушує Лі нервувати, вона може покинути місто§!"

