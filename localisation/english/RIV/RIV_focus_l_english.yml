l_english:
riv_giant_of_the_drydock:0 "Гігант сухого доку"
 riv_giant_of_the_drydock_desc:0 "Ще до війни Рівет-Сіті був дивом науки та інженерії. Протягом десятиліть він повільно занепадав, але внутрішнє обладнання залишалося цілим і неушкодженим."

 riv_rivet_city_council:0 "Рада Рівет-Сіті"
 riv_rivet_city_council_desc:0 "Коли перші вчені та цивільні почали шукати притулок у Рівет-Сіті, почало зароджуватися невелике суспільство. Це суспільство потребувало лідерства, тому була сформована Рада Рівет-Сіті."

 riv_pinkertons_exile:0 "Вигнання Пінкертона"
 riv_pinkertons_exile_desc:0 "Справи в новому поселенні Рівет-Сіті йшли добре. Однак прибуття команди вчених, одержимих очищенням води, порушило звичний стан речей. Пінкертон, колишній представник наукового відділу, пішов через ці зміни."

 riv_project_purity:0 "Проєкт «Чистота»"
 riv_project_purity_desc:0 "За всю історію Рівет-Сіті жоден науковий проєкт не був настільки амбітним, як план Лі щодо Проєкту «Чистота». Очищення всієї води Столичної Пустки — неймовірна мета, яка варта зусиль. На жаль, на цей момент Рівет-Сіті просто не має достатнього досвіду для реалізації проєкту. Але скоро все може змінитися..."

 riv_strengthen_the_council:0 "Зміцнити Раду"
 riv_strengthen_the_council_desc:0 "Протягом десятиліть Рада Рівет-Сіті забезпечувала ефективне управління, і якщо ми будемо твердо дотримуватися поточного курсу, це обов'язково триватиме й надалі."

 riv_weapons_contribution_program:0 "Програма добровільної здачі зброї"
 riv_weapons_contribution_program_desc:0 "Наші сили безпеки тривалий час були адекватними, але оскільки такі фракції, як Братство та Анклав, набирають силу, наших обмежених ресурсів просто не вистачить. Будь-яке розширення служби безпеки потребуватиме значних інвестицій у вогневу міць та живу силу. Завдяки програмі збору зброї від громади справа піде набагато швидше."

 riv_force_to_be_reckoned_with:0 "Сила, з якою варто рахуватися"
 riv_force_to_be_reckoned_with_desc:0 "Будь-яке покращення нашої армії вимагатиме значного збільшення кількості доступних солдатів. Нам потрібно швидко розширити те, що ми маємо, і навчити тих, кого зможемо."

 riv_keep_an_elite_force:0 "Зберегти елітність військ"
 riv_keep_an_elite_force_desc:0 "Наші сили безпеки обмежені за чисельністю, а це означає, що нам легше гарантувати, що кожен офіцер буде ідеальним бійцем. Ми повинні зберегти цей підхід."

 riv_security_expansion:0 "Розширення служби безпеки"
 riv_security_expansion_desc:0 "Малий розмір нашої служби безпеки просто неприпустимий. Нам потрібно більше людей, навіть якщо вони не такі вправні чи ефективні у своїх обов'язках."

 riv_security_proposal_one:0 "Пропозиція представника служби безпеки"
 riv_security_proposal_one_desc:0 "Хоча багато хто думає, що їхня робота — це лише розганяти бійки в барах і охороняти міст, робота представника служби безпеки зовсім інша. Небезпечні істоти, що пробираються крізь затоплені частини корабля, а також питання озброєння загонів — це лише частина обов'язків."

 riv_training_and_equipment:0 "Навчання та спорядження"
 riv_training_and_equipment_desc:0 "Нам слід вдосконалити програму підготовки та курси з використання спорядження, щоб наші офіцери були найкращими на Пустці."

 riv_modernise_equipment:0 "Модернізація спорядження"
 riv_modernise_equipment_desc:0 "Ми повинні гарантувати, що спорядження, яке ми даємо нашим солдатам, є найкращим з можливого, адже ці офіцери представляють нас не лише як військову силу, а й як обличчя нашої Ради на Пустці."

 riv_effective_support:0 "Ефективна підтримка"
 riv_effective_support_desc:0 "Наші офіцери чудово б'ються поодинці, але підготувавши спеціалізовані підрозділи підтримки, ми забезпечимо їм можливість битися краще, ефективніше та довше. Нам просто потрібно інвестувати в підтримку."

 riv_armoury_overhaul:0 "Модернізація арсеналу"
 riv_armoury_overhaul_desc:0 "Вимінювати інструменти, необхідні нашій службі безпеки для захисту, — це просто нерентабельно. Якщо жахи Пустки колись постукають у наші двері, нам знадобиться власне джерело виробництва зброї."

 riv_security_proposal_two:0 "Пропозиція представника служби безпеки"
 riv_security_proposal_two_desc:0 "Між мешканцями ангарних палуб та рештою корабля існує тертя. Якщо ми не вживемо заходів, напруга може перерости у відкритий конфлікт."

 riv_send_detachments_outside:0 "Відправка загонів назовні"
 riv_send_detachments_outside_desc:0 "Хоча досі наші сили безпеки діяли переважно в оборонних цілях, Пустка змінюється, і ми повинні змінюватися разом з нею. Нам потрібно почати відправляти офіцерів у пустелю, щоб убезпечити околиці, поки вони не стали загрозою для міста."

 riv_super_mutant_suppression:0 "Придушення супермутантів"
 riv_super_mutant_suppression_desc:0 "Супермутанти — одна з найбільших загроз на Пустці. Їхні набіги загрожують не лише нам, а й кожному поселенню відсюди до Рейвен-Рок. Їх важко вбити, але ми можемо швидко вчитися."

 riv_beat_off_raiders:0 "Відсіч рейдерам"
 riv_beat_off_raiders_desc:0 "Рейдери — це таргани Пустки. Скільки б ви їх не чавили, за он тим стовпом завжди ховаються нові. На щастя, більшість із них боягузи і втечуть від справжнього бою. Дамо їм цей бій."

 riv_repair_deck_fencing:0 "Ремонт огородження палуби"
 riv_repair_deck_fencing_desc:0 "Зайве й казати, що занедбані, гнилі та іржаві огорожі, які не дають людям впасти з корабля, є загрозою для безпеки. Ремонт там, де це можливо (і заміна там, де ні) — це лише початок; у Рівет-Сіті є багато чого лагодити, крім парканів."

 riv_trading_opportunities:0 "Торговельні можливості"
 riv_trading_opportunities_desc:0 "Хоча відправка караванів у Пустку наосліп приносить гроші, налагодження стабільних торгових відносин з конкретними локаціями принесе нам вигоду в довгостроковій перспективі. Зрештою, чим більше ми їм подобаємося, тим кращі умови угод ми отримаємо."

 riv_nuclear_trade:0 "Ядерна торгівля"
 riv_nuclear_trade_desc:0 "Мегатонна — очевидний кандидат для торгівлі. Це процвітаюче місто з крамницями та цивілізацією, не кажучи вже про те, що воно вже є торговим вузлом. Звісно, воно побудоване навколо нерозірваної ядерної бомби, але це навряд чи спричинить якісь проблеми."

 riv_leaving_the_little_town:0 "Ті, що покидають маленьке містечко"
 riv_leaving_the_little_town_desc:0 "Біг-Таун — це місто людей, які вже занадто дорослі, щоб жити в Літл-Лемплайт. Ми знаємо, що у них виникають труднощі з облаштуванням, тож це може бути чудовим місцем як для пошуку мігрантів, так і для торгівлі."

 riv_deal_with_the_dead:0 "Угода з мертвими"
 riv_deal_with_the_dead_desc:0 "Підземелля — це місто гулів, що живуть у руїнах музею. Більшість навколишніх мешканців ставляться до цього поселення погано, цураючись гулів через їхній вигляд, а іноді навіть стріляючи в них без попередження. Вони будуть раді мирним торговим партнерам."

 riv_root_of_trade:0 "Корінь торгівлі"
 riv_root_of_trade_desc:0 "Ми не єдине поселення в Столичній Пустці, яке відправляє торгові каравани в руїни заради прибутку. Кентербері-Коммонс — маленьке містечко, що має величезний вплив завдяки своїм мережам караванів, які майже конкурують з нашими! Розвиток відносин з ними обов'язково буде вигідним."

 riv_trading_for_pennies:0 "Торгівля за копійки"
 riv_trading_for_pennies_desc:0 "Алістер Тенпенні — людина неоднозначна, і багато хто може його недолюблювати (з вагомих причин!). Проте він багатий. Крім того, він має зв'язки з елітою всього Вашингтону, зокрема і в Рівет-Сіті. Хоча дехто вважає наші зв'язки з ним огидними, це прибутково."

 riv_the_point_of_it_all:0 "У чому суть"
 riv_the_point_of_it_all_desc:0 "Пойнт-Лукаут навряд чи можна назвати торговим центром — більшість місцевих там дикуни, які не знають, що таке кришка. Проте цей район відомий досить рідкісними інгредієнтами та предметами, тому торгівля з цивілізованими людьми, які там залишилися, піде нам на користь."

 riv_stretched_morals:0 "Розмита мораль"
 riv_stretched_morals_desc:0 "Рейдери — неприємний народ. Вони крадуть, грабують і поневолюють, живучи за рахунок нещасть інших, зокрема й наших караванів. Але виключаючи їх з нашої торгової мережі, ми можемо втратити можливість. Дуже прибуткову можливість."

 riv_no_tolerance_for_raiders:0 "Жодної толерантності до рейдерів"
 riv_no_tolerance_for_raiders_desc:0 "З рейдерами не можна миритися. Будь-які спроби торгувати з ними лише зроблять нас слабкими в їхніх очах; наш найкращий вибір — стріляти на ураження. Це може здатися жорстоким, але вони вчинили б так само."

 riv_civilian_proposal_two:0 "Пропозиція цивільного представника"
 riv_civilian_proposal_two_desc:0 "Рівет-Сіті є основним джерелом свіжої, нерадіоактивної їжі на Столичній Пустці. Це дає нам можливість диктувати ціни, адже людям треба щось їсти."

 riv_beyond_the_capital:0 "За межами Столиці"
 riv_beyond_the_capital_desc:0 "Обмежуватися торгівлею лише в руїнах Округу Колумбія було б нерозумно. Щоб стати справжньою торговельною державою, нам потрібно розширити наші маршрути настільки далеко, наскільки це можливо. Але почати варто з найближчих територій."

 riv_develop_rivet_city:0 "Розвиток Рівет-Сіті"
 riv_develop_rivet_city_desc:0 "Рівет-Сіті — чудове місто, але його завжди можна зробити ще кращим. Щоб забезпечити нашу безпеку та процвітання, ми повинні продовжувати розвивати місто та дбати, щоб усе сяяло як нове."

 riv_church_of_saint_monica:0 "Церква Святої Моніки"
 riv_church_of_saint_monica_desc:0 "Важливою та стійкою інституцією Рівет-Сіті є Церква Святої Моніки, яка опікується нашими духовними потребами. Хоча отець Кліффорд чудово справляється з її утриманням самотужки, зосередження на тому, щоб зробити її якомога красивішою, напевно порадує його та Святу Моніку."

 riv_capital_preservation_society:0 "Товариство збереження Столиці"
 riv_capital_preservation_society_desc:0 "Товариство збереження Столиці було засноване Авраамом Вашингтоном як спроба зберегти пам'ять про дивовижне суспільство, що існувало до Великої війни. Хоча його ентузіазм, можливо, випереджає його знання, це важливе нагадування про те, звідки ми прийшли."

 riv_marketplace_refurbishment:0 "Оновлення ринку"
 riv_marketplace_refurbishment_desc:0 "Ринок функціонує, але він не ідеальний. Всюди сміття, корозія на стінах і дивний запах. Доклавши зовсім небагато зусиль, ми зможемо прибрати його, побудувати міцніші ятки та залучити більше клієнтів, ніж будь-коли раніше."

 riv_clean_up_the_hangar_deck:0 "Прибирання ангарної палуби"
 riv_clean_up_the_hangar_deck_desc:0 "Найбідніші та найбільш знедолені верстви нашого суспільства опинилися на ангарній палубі, де вони страждають від жахливих умов та іржі. Прибравши палуби та допомігши з вирішенням найгостріших проблем, ми зможемо почати покращувати їхнє життя."

 riv_lab_modernisation:0 "Модернізація лабораторій"
 riv_lab_modernisation_desc:0 "Хоча наші лабораторії колись були найсучаснішими, з того часу минуло багато років. Вони все ще набагато досконаліші за будь-що інше на Пустці, але потребують зусиль для підтримки їхнього стану. Відносно кажучи."

 riv_advanced_hydroponics:0 "Просунута гідропоніка"
 riv_advanced_hydroponics_desc:0 "Однією з найважливіших галузей досліджень та комерційної індустрії в Рівет-Сіті є система гідропоніки. З її допомогою ми можемо вирощувати свіжу їжу для торгівлі та власного споживання. Розширивши нашу гідропоніку, ми забезпечимо достатню кількість їжі для всіх."

 riv_civilian_proposal_one:0 "Пропозиція цивільного представника"
 riv_civilian_proposal_one_desc:0 "Цивільний представник представляє майже всіх, хто не входить до служби безпеки або наукової групи. Ця широка відповідальність змушує його постійно робити складний вибір. Питання податків проти зростання торгівлі або розподілу небагатьох інженерів корабля завжди в нього на думці."

 riv_expand_caravan_companies:0 "Розширення караванних компаній"
 riv_expand_caravan_companies_desc:0 "Наші караванні компанії є основою нашої економіки. Надаючи субсидії та стимули, ми дозволимо їм перетворитися на ще більш процвітаючі джерела доходу."

 riv_look_outside_rivet_city:0 "Погляд за межі Рівет-Сіті"
 riv_look_outside_rivet_city_desc:0 "Ми не можемо обмежуватися лише тим, що знаходиться всередині авіаносця, нам потрібно розвивати промисловість на всій нашій території. Зрештою, роботи потребують не лише мешканці самого міста."

 riv_reduce_import_reliance:0 "Зменшення залежності від імпорту"
 riv_reduce_import_reliance_desc:0 "Розвідуючи та освоюючи території навколо Рівет-Сіті, ми зможемо гарантувати, що наші процвітаючі караванні компанії приноситимуть якомога більше грошей, витрачаючи якнайменше на закупівлю товарів ззовні."

 riv_broad_market_investments:0 "Широкі ринкові інвестиції"
 riv_broad_market_investments_desc:0 "Ринок Рівет-Сіті завжди був одним з найбільших на Столичній Пустці. З належними інвестиціями він міг би стати найбільшим у повоєнній Америці!"

 riv_increase_science_funding:0 "Збільшення фінансування науки"
 riv_increase_science_funding_desc:0 "Наука — одна з найважливіших рис Рівет-Сіті. Наші вчені найдосконаліші на Пустці — що ж, у Братства та Анклаву може бути силова броня, але у нас найсучасніші цивільні технології!"

 riv_wildlife_study:0 "Вивчення дикої природи"
 riv_wildlife_study_desc:0 "Спостерігаючи за мутованою «дикою природою», ми можемо дізнатися, як життя пристосувалося до цієї пустки. Не секрет, що вони адаптовані до середовища краще за нас... переважно людей."

 riv_mirelurk_study:0 "Вивчення болотяників"
 riv_mirelurk_study_desc:0 "Коли живеш на узбережжі, болотяники всюди. Природно, це робить їх дуже зручними для спостереження з Рівет-Сіті. Вони не тільки можуть навчити нас пересуванню у воді, їхні панцири також підходять для створення непоганої саморобної броні."

 riv_super_mutant_observation:0 "Спостереження за супермутантами"
 riv_super_mutant_observation_desc:0 "Супермутанти є ендеміками Столичної Пустки. Вони великі, небезпечні, але, на щастя, дуже тупі. Якщо ми просто приділимо час спостереженню за тим, як вони діють, ми зможемо розробити кращу тактику для їхнього знищення."

 riv_wildlife_defence_systems:0 "Системи захисту від дикої природи"
 riv_wildlife_defence_systems_desc:0 "Навіть у місті з такою потужною оборонною позицією, як наше, нам доводиться мати справу з частими атаками місцевих мутантів, чудовиськ та болотяників. Турелі та кращі оборонні позиції полегшать нашим солдатам боротьбу з цими загрозами."

 riv_science_proposal_two:0 "Пропозиція представника наукового відділу"
 riv_science_proposal_two_desc:0 "Хоча представник наукового відділу переважно зосереджений на дослідженнях, йому часто доводиться висловлюватися і з інших питань. Безпека міста важлива для всіх, і іноді це означає прийняття рішень, які негативно впливають на науковий департамент."

 riv_water_purification_tests:0 "Тести на очищення води"
 riv_water_purification_tests_desc:0 "Лі все ще роздумує над можливостями, які відкриває Проєкт «Чистота»... Напевно, не буде зайвим провести кілька простих тестів для розробки технології очищення води?"

 riv_fusion_power_theory:0 "Теорія термоядерної енергії"
 riv_fusion_power_theory_desc:0 "Енергія — завжди дорогоцінний товар на Пустці. Розробка ефективних атомних електростанцій вимагатиме ще більше енергії, тому нам краще почати прямо зараз."

 riv_sophisticated_hydroponics:0 "Складна гідропоніка"
 riv_sophisticated_hydroponics_desc:0 "Ми, мабуть, єдина нація на Столичній Пустці з пристойним рівнем розвиненого сільського господарства. Давайте зміцнимо нашу і без того значну перевагу."

 riv_advanced_industrial_applications:0 "Передові промислові застосування"
 riv_advanced_industrial_applications_desc:0 "Це проста справа — використати те, що ми дізналися, щоб просунутися ще далі. Нам заздритиме все Східне узбережжя."

 riv_increase_food_production:0 "Збільшення виробництва їжі"
 riv_increase_food_production_desc:0 "Наша їжа — найчистіша та найздоровіша на Столичній Пустці, і вона приносить нам велике багатство. Коли наші вчені вдосконалюють фермерські потужності, ми заробляємо більше грошей."

 riv_inspect_planes:0 "Огляд літаків"
 riv_inspect_planes_desc:0 "Рівет-Сіті побудований з авіаносця, тому на ньому багато літаків. Ці літаки старі, іржаві, і більшість із них нічого не варті. Але тільки більшість. Ми могли б об'єднати деталі, щоб реконструювати кілька штук і дізнатися трохи більше про те, як вони були зроблені."

 riv_finish_project_purity:0 "Завершити Проєкт «Чистота»"
 riv_finish_project_purity_desc:0 "«Я є Альфа і Омега, початок і кінець. Я дам тому, хто прагне, з джерела води життя задарма».\n\nМрія Лі майже здійснена! Якщо ми зможемо завершити Проєкт «Чистота», ми станемо безперечними господарями Вашингтона."

 riv_fight_the_red_lung:0 "Боротьба з «Червоною легенею»"
 riv_fight_the_red_lung_desc:0 "«Червона легеня» — це бич жителів Рівет-Сіті. Іржа та пил понівечили легені громадян. Потрібні злагоджені зусилля, щоб назавжди покласти край загрозі «Червоної легені»."

 riv_develop_a_vaccine:0 "Розробка вакцини"
 riv_develop_a_vaccine_desc:0 "Вакцина — найкраще довгострокове рішення для боротьби з «Червоною легенею» та порятунку наших громадян. Це вимагатиме багато зусиль і відверне нашу увагу від інших галузей досліджень, але це найкращий крок, який ми можемо зробити."

 riv_clear_out_the_rust:0 "Очищення від іржі"
 riv_clear_out_the_rust_desc:0 "Це потребуватиме багато зусиль, але очищення та заміна всього іржавого металу, який ми зможемо знайти в Рівет-Сіті, значно зменшить вплив «Червоної легені» на здоров'я."

 riv_happy_and_healthy:0 "Щасливі та здорові"
 riv_happy_and_healthy_desc:0 "Ми це зробили! Нам вдалося побороти «Червону легеню» та розробити вакцину. Повністю впровадивши її та доклавши останніх зусиль для боротьби з іржею в місті, ми нарешті остаточно переможемо цю напасть."

 riv_science_proposal_one:0 "Пропозиція представника наукового відділу"
 riv_science_proposal_one_desc:0 "У представника наукового відділу завжди багато справ одночасно. Яких вчених приймати в департамент? Що робити зі зростанням цін на Рад-Евей? Хто ці люди з «Підпілля», про яких ми постійно чуємо?"

 riv_expanding_the_science_team:0 "Розширення наукової групи"
 riv_expanding_the_science_team_desc:0 "Рівет-Сіті спочатку створювався як дослідницький центр для найкращих вчених Столичної Пустки. Щоб наше місто процвітало у важкі часи, ми повинні завжди пам'ятати про своє коріння та пріоритетність наукового прогресу!"

 riv_war_on_the_horizon:0 "Війна на горизонті"
 riv_war_on_the_horizon_desc:0 "В Вашингтоні стає гаряче. Після захоплення у нас Проєкту «Чистота» стало зрозуміло, що дві найбільші сили Столичної Пустки — Анклав і Братство Сталі — готуються до повномасштабної війни. Переможець, ймовірно, сформує майбутнє Пустки, тому ми маємо підтримати тих, хто найбільш прихильний до нас: Братство."

 riv_support_the_brotherhood:0 "Підтримка Братства"
 riv_support_the_brotherhood_desc:0 "Рада вирішила, що ми повинні підготуватися до підтримки Братства в майбутньому протистоянні. Хоча нам слід бути обережними з відправкою наших регулярних військ, ми можемо почати з надання Братству однієї з наших найбільших переваг — нашої економіки."

 riv_the_war_at_home:0 "Війна вдома"
 riv_the_war_at_home_desc:0 "Ми не готові до війни такого масштабу, як війна Анклаву та Братства, і ми повинні гарантувати, що в разі найгіршого сценарію та вторгнення в нашу країну ми зможемо виставити достатньо солдатів, щоб принаймні стримати їх. Ніщо не зрівняється з хорошою старою пропагандою."

 riv_prepare_for_the_enclave:0 "Підготовка до Анклаву"
 riv_prepare_for_the_enclave_desc:0 "І Анклав, і Братство відомі своєю характерною силовою бронею — справжнім викликом для наших солдатів. Працюючи над протитанковим спорядженням та забезпечуючи належну підготовку, ми зможемо розкрити ці бляшанки та дістатися до солдатів всередині."

 riv_in_any_way_we_can:0 "Будь-яким можливим способом"
 riv_in_any_way_we_can_desc:0 "Немає сенсу зволікати: Братству потрібна наша допомога. Настав час відправити добровольців воювати на боці Братства — хоча повна участь у війні може поставити місто під загрозу, ми можемо зробити шанси Братства набагато вищими."

 riv_stay_out_of_it:0 "Залишатися осторонь"
 
 riv_stay_out_of_it_desc:0 "Війна — це занадто ризиковано. Ми не можемо дозволити собі жертвувати життями громадян Рівет-Сіті. Якщо Братство переможе — нам же краще. Якщо Братство програє — нам знадобиться кожен солдат, якого ми зможемо зібрати, а допомога все одно була б марною. Рівет-Сіті залишатиметься нейтральним."

 riv_double_down_on_research:0 "Подвоїти ставку на дослідження"
 riv_double_down_on_research_desc:0 "Ця війна відволікає і Анклав, і Братство, які заявляють, що вони є технологічними гігантами. Але поки вони б'ються за брухт, ми можемо переконатися, що саме ми володіємо найдосконалішими технологіями."

 riv_security_for_trade_routes:0 "Безпека торгових шляхів"
 riv_security_for_trade_routes_desc:0 "Ви чули? Йде війна. Наші торгові шляхи під загрозою, а каравани ризикують потрапити в засідку або ще гірше. Наші сили безпеки, замість того, щоб бути кинутими в безглузду війну, можуть бути використані там, де це дійсно важливо."

 riv_take_in_refugees:0 "Прийом біженців"
 riv_take_in_refugees_desc:0 "Цілком зрозуміло, що багато людей не в захваті від війни на Пустці й тікають із зон бойових дій у безпечніші місця. Для багатьох таким місцем є Рівет-Сіті."

 riv_enclave_victory:0 "Перемога Анклаву в Проєкті «Чистота»"
 riv_enclave_victory_desc:0 "Катастрофа! Анклав розбив Братство, і тепер Вашингтон у них під ногами. Тепер ми, як один з небагатьох бастіонів проти їхньої тиранії, повинні підготуватися якнайкраще, поки не сталося неминуче."

 riv_panicked_preparations:0 "Панічна підготовка"
 riv_panicked_preparations_desc:0 "Найпростіший спосіб підготуватися до можливого вторгнення Анклаву — це побудувати укріплення. Багато укріплень. По всьому нашому кордону."

 riv_secure_water_source:0 "Забезпечити незалежне джерело води"
 riv_secure_water_source_desc:0 "Через жахливу перемогу Анклаву наші ланцюги постачання перерізані. Тепер, коли вони контролюють Проєкт «Чистота», найбільша надія на чисту воду стає інструментом руйнування. Ми повинні очищувати те, що можемо, самі."

 riv_seek_friends:0 "Пошук друзів"
 riv_seek_friends_desc:0 "Ми не єдина фракція, що вижила в Вашингтоні. Округ наповнений не лише Анклавом та Братством. Тепер ми маємо розглянути можливість звернутися за допомогою до інших народів, навіть до рейдерів."

 riv_emergency_conscription:0 "Надзвичайний призов"
 riv_emergency_conscription_desc:0 "Нам потрібен кожен солдат, якого ми можемо залучити до боротьби з Анклавом. Ми не можемо дозволити собі нічого меншого, ніж їхнє повне знищення."

 riv_isolate_trade_network:0 "Ізоляція торгової мережі"
 riv_isolate_trade_network_desc:0 "Хоча припинення торгівлі є небезпечним, ми не можемо дозволити собі відправляти патрулі та солдатів, необхідних для безпеки подорожей. Поки що торгівля має бути припинена."

 riv_outside_the_capital:0 "За межами Столиці"
 riv_outside_the_capital_desc:0 "Зараз ми не можемо бути перебірливими щодо союзників. Будь-хто, хто може нам допомогти, — це актив, який нам потрібно використати, навіть ті, хто знаходиться далеко від дому. Ми повинні шукати допомоги за межами Вашингтона."

 riv_to_deal_with_the_enclave:0 "Як бути з Анклавом..."
 riv_to_deal_with_the_enclave_desc:0 "Анклав показав себе великою силою на Столичній Пустці. Якщо ми хочемо вижити, нам, можливо, доведеться навчитися жити поруч із ними."

 riv_preemptive_strike:0 "Превентивний удар"
 riv_preemptive_strike_desc:0 "Хоча це дуже ризиковано, чим довше ми зволікаємо, тим більше часу у Анклаву, щоб зміцнити свій хиткий контроль над Округом. Якщо ми збираємося бити, ми повинні вдарити якнайшвидше."

 riv_sit_tight:0 "Тримати оборону"
 riv_sit_tight_desc:0 "Першим атакувати Анклав — це лише пожертвувати нашою оборонною перевагою. Ми повинні забарикадуватися там, де ми є. Скоро вони зможуть вдарити, і їхні солдати в силовій броні розіб'ються об нашу оборону, як хвилі об скелі."

 riv_the_west_has_fallen:0 "Анклав пав"
 riv_the_west_has_fallen_desc:0 "Анклав пав. Мільярди повинні померти."

 riv_open_up:0 "Відкриття кордонів"
 riv_open_up_desc:0 "Тепер, коли з Анклавом покінчено, ми можемо знову дозволити собі торгувати. Насправді ми навряд чи можемо дозволити собі НЕ торгувати."

 riv_all_well_in_dc:0 "В Окрузі Колумбія все добре"
 riv_all_well_in_dc_desc:0 "Мир повернувся до Вашингтону. Ми в безпеці від Анклаву, і тепер ми можемо знову почати процвітати."

 riv_never_again:0 "Ніколи знову"
 riv_never_again_desc:0 "Ми не можемо дозволити повторення цього. Ми повинні гарантувати, що жодна інша держава більше не зможе нав'язувати свою владу над Округом. Ми повинні самі доглядати цей сад."

 riv_come_to_an_agreement:0 "Дійти згоди"
 riv_come_to_an_agreement_desc:0 "Август Отем очолює Анклав, і хоча він владолюбний диктатор-автократ, він не прагне нашого винищення. Сподіваймося, що холодний розум переможе."

 riv_enclave_research:0 "Дослідження Анклаву"
 riv_enclave_research_desc:0 "У Анклаву досить... вільна мораль, коли йдеться про методику досліджень. Ми б ніколи не зробили нічого подібного... але, можливо, ми могли б запозичити трохи натхнення?"

 riv_old_world_tech:0 "Технології Старого світу"
 riv_old_world_tech_desc:0 "Одна річ, у якій Анклав просто фантастичний — це збереження детальних і численних довоєнних документів. Одержимість Старим світом дається взнаки. Ми можемо перелопати ці документи та використати їх для наших досліджень."

 riv_future_of_war:0 "Майбутнє війни"
 riv_future_of_war_desc:0 "Силова броня, хоч і неймовірно досконала і, очевидно, бажана, — це те, що нам було важко розробити, не маючи довоєнних зразків для вивчення. Але тепер у нас їх багато."

 riv_the_old_world_born_anew:0 "Старий світ, народжений заново"
 riv_the_old_world_born_anew_desc:0 "Старий світ повернувся до Вашингтона. Американський уряд (або його більш тиранічна версія) відновив Столичну Пустку, і ми — її найяскравіший маяк науки та технологій. Майбутнє виглядає світлим (якщо не зважати на мутантів)."

 riv_brotherhood_victory:0 "Перемога Братства в Проєкті «Чистота»"
 riv_brotherhood_victory_desc:0 "Братство виграло битву проти Анклаву! Це, очевидно, набагато бажаніший варіант... питання в тому, що нам робити далі?"

 riv_seek_an_accomodation:0 "Шукати компроміс"
 riv_seek_an_accomodation_desc:0 "Братство здається розумними хлопцями. Якщо пощастить, вони будуть відкриті до розширення зв'язків, і ми зможемо разом працювати заради процвітання Столичної Пустки. Війни тривали достатньо довго."

 riv_the_fleet_of_dc:0 "Флот Вашингтона"
 riv_the_fleet_of_dc_desc:0 "Тепер, коли ми об'єдналися з Братством, нам більше не потрібно надто турбуватися про війну. Принаймні на суші. Нам слід зосередитися на підготовці до війни на морі. Братство не може бути всюди."

 riv_he_who_is_athirst:0 "Дати тому, хто прагне"
 riv_he_who_is_athirst_desc:0 "Тепер, коли Проєкт «Чистота» завершено і Столична Пустка знову має воду, виникла нова проблема. Логістика. Хоча кількість виробленої чистої води величезна, вона не є легкодоступною для більшості поселень. Наші торгові каравани можуть почати доставляти воду у віддалені поселення, тісніше згуртовуючи торгову мережу."

 riv_brotherhood_material_acquisition:0 "Отримання матеріалів від Братства"
 riv_brotherhood_material_acquisition_desc:0 "З нашими новими потужними союзниками попросити більше ресурсів — проста справа. Зрештою, ми залишаємося науковим центром Столичної Пустки, і за їхньої фінансової підтримки ми всі пожнемо плоди."

 riv_brotherhood_conscription:0 "Призов до Братства"
 riv_brotherhood_conscription_desc:0 "Робота з Братством — це не лише вигода. Братство постійно потребує нових солдатів і просить добровольців. Невелика ціна за нашу подальшу безпеку."

 riv_begin_power_armour_production:0 "Початок виробництва силової броні"
 riv_begin_power_armour_production_desc:0 "Силова броня. Основа військ Братства, а колись і найважливіший елемент Анклаву. Це потужна і застрашлива зброя, яка вислизала з наших рук. Однак тепер Братство готове нам допомогти."

 riv_brotherhood_integration:0 "Інтеграція з Братством"
 riv_brotherhood_integration_desc:0 "Зі зміною балансу сил на Східному узбережжі стає зрозуміло, що нам потрібно по-справжньому інтегруватися в структуру Братства. Тільки через взаємну вигоду ми зможемо прогресувати. Ad Victoriam!"

 riv_equal_partner:0 "Рівноправний партнер"
 riv_equal_partner_desc:0 "Братство як організація є дещо таємничою та загадковою — і воно має залишатися таким. Нашим найкращим захистом завжди буде наша власна незалежність, і ми не можемо дозволити собі її втратити."

 riv_withdraw_and_isolate:0 "Відхід та ізоляція"
 riv_withdraw_and_isolate_desc:0 "Братство, можливо, було меншим злом порівняно з Анклавом... але вони все одно є злом. Співпраця з ними може означати неприйнятну втрату нашого суверенітету. Ми повинні прокласти власний шлях, і лише тоді ми матимемо справжню безпеку без компромісів."

 riv_secure_trade_routes:0 "Безпечні торгові шляхи"
 riv_secure_trade_routes_desc:0 "Наші торгові шляхи залишаються небезпечними, попри поразку Анклаву. Рейдери, гулі та супермутанти все ще блукають пустками, не кажучи вже про тих солдатів Анклаву, які залишилися в таборах. Настав час зробити наші торгові шляхи безпечними. Повністю."

 riv_stamp_out_enclave_remnants:0 "Винищити залишки Анклаву"
 riv_stamp_out_enclave_remnants_desc:0 "Залишки Анклаву все ще десь на Пустках, тепер вони мало чим відрізняються від звичайних рейдерів-шовіністів. Доклавши зусиль, ми зможемо покінчити з ними назавжди."

 riv_independent_water_source:0 "Незалежне джерело води"
 riv_independent_water_source_desc:0 "Оскільки Проєкт «Чистота» перебуває в руках Братства, ми більше не можемо покладатися на нього як на джерело води. Нам потрібно знайти власну воду, тоді ми зможемо процвітати, не залежачи від них."

 riv_develop_trade_interests:0 "Розвиток торгових інтересів"
 riv_develop_trade_interests_desc:0 "Хоча ми можемо політично ізолювати себе, ми все одно залишаємося торговим містом і маємо продовжувати торгівлю. З невеликими інвестиціями ми зможемо гарантувати, що торгівля триватиме без перешкод."

 riv_preventative_medicine:0 "Профілактична медицина"
 riv_preventative_medicine_desc:0 "Хоча це малоймовірно, Братство може вирішити вимагати нашого об'єднання з їхньою зростаючою державою, хочемо ми того чи ні. Будівництво фортів уздовж кордону нашої підконтрольної території не гарантує, що вони не спробують, але принаймні може їх стримати на певний час."

 riv_take_to_the_seas:0 "Вихід у море"
 riv_take_to_the_seas_desc:0 "Оскільки навколишні землі контролюються Братством та їхніми союзниками, найкращий спосіб забезпечити безпеку наших торгових шляхів — це почати дивитися в бік моря. Зрештою, ми живемо на старому авіаносці."

 riv_military_independence:0 "Військова незалежність"
 riv_military_independence_desc:0 "Коли Братство стоїть на нашому кордоні, ми повинні переконатися, що наші збройні сили відповідають вимогам часу. Розширюючи наш досвід у різних методах ведення бою, ми зможемо зрозуміти, як краще підготуватися."

 riv_civilian_commitment:0 "Цивільні зобов'язання"
 riv_civilian_commitment_desc:0 "Ми не можемо просто нескінченно готуватися до війни, про наш цивільний сектор також потрібно піклуватися."

 riv_dc_free_city:0 "Вільне місто Вашингтона"
 riv_dc_free_city_desc:0 "Навіть якщо Братство захопить решту Вашингтона, ми залишимося вільним містом Пустки. Справжнім маяком торгівлі та науки, а також бастіоном безпеки."

 riv_end_oppression_in_dc_forever:0 "Покінчити з гнобленням в Окрузі назавжди"
 riv_end_oppression_in_dc_forever_desc:0 "Ми не можемо дозволити Братству просто захопити решту Округу Колумбія. Хоча вони кращі, ніж був би Анклав, їхній жорсткий мілітаризм та авторитарні замашки означають, що Столична Пустка не буде по-справжньому процвітати. Нам потрібно покінчити з Братством задля блага Пустки."

 riv_rivet_city_victory:0 "Плоди Проєкту «Чистота»"
 riv_rivet_city_victory_desc:0 "Нам вдалося витіснити зовнішні сили з Проєкту «Чистота» та утвердити свої права на об'єкт. З цим очищувачем під нашим контролем можливості безмежні."

 riv_propose_alliance_to_brotherhood:0 "Запропонувати союз Братству"
 riv_propose_alliance_to_brotherhood_desc:0 "Хоча Проєкт «Чистота» під нашим контролем, ми (поки що?) не є військовою державою. Ми не можемо дозволити собі воювати з рештою Пустки поодинці. Братство Сталі принаймні частково поділяє наші погляди, особливо щодо Анклаву, і, працюючи разом, ми зможемо забезпечити процвітання Округу."

 riv_prepare_to_deal_with_the_enclave:0 "Підготовка до боротьби з Анклавом"
 riv_prepare_to_deal_with_the_enclave_desc:0 "У Анклаву є одна дуже характерна особливість — їхня просунута силова броня. Звичайному солдату важко впоратися з силовою бронею, але з достатньою кількістю протитанкових гвинтівок це просто ще один шматок металу. Це означає, що нам потрібно виробити їх якомога більше."

 riv_expand_security_force:0 "Розширення сил безпеки"
 riv_expand_security_force_desc:0 "Хоча це не ідеально, нам доведеться залучити більше громадян до сил безпеки, що означає обмежений призов. Люди можуть нарікати, але це необхідно для нашого захисту."

 riv_stockpile_equipment:0 "Накопичення спорядження"
 riv_stockpile_equipment_desc:0 "Будь-яка війна з великими фракціями в Окрузі вимагатиме багато спорядження — спорядження, якого у нас недостатньо. Нам потрібно зібрати стільки зброї, скільки зможемо, і якнайшвидше."

 riv_military_exercises:0 "Військові навчання"
 riv_military_exercises_desc:0 "Наші сили безпеки погано навчені та не підготовлені до масштабних бойових дій, натомість вони зосереджені лише на захисті нашого міста від рейдерів, диких гулів, супермутантів, болотяників та будь-чого іншого, що йому загрожує. Нам знадобиться значна зміна доктрини, щоб підготуватися до тотальної війни."

 riv_save_the_wasteland:0 "Врятувати Пустку"
 riv_save_the_wasteland_desc:0 "Настає час, коли потрібно припинити підготовку і почати діяти — ми не можемо відкладати неминуче вічно. Анклав має згоріти, а Вашингтон має стати вільним."

 riv_trade_water:0 "Вода життя"
 riv_trade_water_desc:0 "Із завершенням Проєкту «Чистота» ми стали беззаперечними господарями не лише свіжих фруктів, а й чистої води в Окрузі. Ми можемо використовувати це, щоб міцніше прив'язати поселення до нас, доки ми всі не почнемо процвітати разом. Для Вашингтона починається славна ера."

 riv_caravans_to_arefu:0 "Каравани до Арефу"
 riv_caravans_to_arefu_desc:0 "Арефу — невелике поселення, яке раніше наші торговці ігнорували. Це правда, що у них не так багато цінного для обміну, але як (відносно) важливе сусіднє поселення, ми повинні почати возити воду і їм."

 riv_only_civilised_place:0 "Єдине цивілізоване місце"
 riv_only_civilised_place_desc:0 "Республіка Дейва — досить дивне і маленьке поселення, чим і пояснювалася наша попередня відсутність торгових відносин з ними. Вони пройшли через низку авторитарних урядів, нинішню ітерацію очолює чоловік на ім'я Дейв. Навіть мегаломанам потрібна чиста вода."

 riv_display_generosity:0 "Прояв щедрості"
 riv_display_generosity_desc:0 "У нас є більше ніж достатньо, щоб поділитися. Поширення доброти ще більше покращить наші стосунки."

 riv_strike_a_deal:0 "Укласти угоду"
 riv_strike_a_deal_desc:0 "Далі на сході лежать зачатки великої торговельної імперії — імперії, яка повинна знати, що її розвиток припиниться, якщо справи в Окрузі підуть погано. Ми повинні встановити взаємовигідні відносини з цими народами: з нашим захистом і їхніми грошима ми всі зможемо процвітати."

 riv_dc_problems_dc_solutions:0 "Проблеми Округу — рішення Округу"
 riv_dc_problems_dc_solutions_desc:0 "Ми не повинні втягувати сторони з-поза меж Вашингтона в наші конфлікти. Хоча нам потрібна підтримка, набагато краще шукати її у найманців, які вже перебувають в Окрузі. Лише кілька кришок залучать їх на наш бік."

 riv_caps_everywhere:0 "Кришки всюди!"
 riv_caps_everywhere_desc:0 "Завдяки вільній торгівлі та постійному притоку кришок ми отримали солідний прибуток. Тричі ура вільній торгівлі!"

 riv_safety_in_dc:0 "Безпека в Окрузі Колумбія"
 riv_safety_in_dc_desc:0 "Після поразки Анклаву Вашингтон нарешті в безпеці... і ми тут головні."

 riv_no_gods_no_masters:0 "Ні богів, ні панів"
 riv_no_gods_no_masters_desc:0 "Більше ніколи небезпечні та мілітаристські сили Анклаву та Братства Сталі не загрожуватимуть безпеці та процвітанню Столичної Пустки. Постала нова сила, віддана принципам знань і торгівлі: Рівет-Сіті."

 riv_no_raiders_in_dc:0 "Жодних рейдерів в Окрузі"
 riv_no_raiders_in_dc_desc:0 "Вашингтон надто довго був ігровим майданчиком для рейдерів, работорговців та іншої подібної нечисті. Це буде нелегко, але усунення всіх таких жорстоких бандитів зі Столичної Пустки принесе більше процвітання для всіх."

 riv_consolidate_territory:0 "Консолідація території"
 riv_consolidate_territory_desc:0 "Евергрін-Міллс колись був основним місцем, звідки здійснювали набіги рейдери Округу. Тепер, коли рейдерів ліквідовано, все, що залишилося, — це невелике нетрі. Впроваджуючи наші власні закони та включаючи поселення в нашу прибуткову торгову мережу, ми змусимо їх швидко побачити переваги нового ладу."

 riv_end_cannibalism:0 "Край канібалізму"
 riv_end_cannibalism_desc:0 "Хоча містечко Ендейл здається цілком приємним місцем для відвідування, до нас дійшли похмурі чутки про їхню збочену природу. Закривавлені вцілілі та зневірені громадяни приходять до нас і розповідають про, мабуть, найбільший жах Округу: канібалізм."

 riv_secure_trade_from_raiders:0 "Захистити торгівлю від рейдерів"
 riv_secure_trade_from_raiders_desc:0 "Попри знищення найбільших рейдерських таборів, кілька розрізнених банд все ще блукають Столичною Пусткою. Винищення їх усіх займе десятиліття обшуків кожної будівлі, метро та бункера, але ми повинні з чогось почати."

 riv_brotherhood_wannabes:0 "Фальшиве Братство"
 riv_brotherhood_wannabes_desc:0 "Ізгої Братства — жорстокий народ. Вигнані з і без того мілітаристського Братства, вони представляють тих, хто найбільш вороже налаштований проти мешканців Пустки. Вони не хочуть нічого, крім як закритися в собі та стріляти в кожного, хто підійде близько. Ми вистрілимо першими."

 riv_secure_the_settlements:0 "Захист поселень"
 riv_secure_the_settlements_desc:0 "Розширюючи нашу торгову мережу та приносячи воду і процвітання по всьому краю, ми зможемо швидко заслужити прихильність наших нових громадян. Скоро вони й забудуть, що колись були незалежними від Рівет-Сіті!"

 riv_new_talent:0 "Нові таланти"
 riv_new_talent_desc:0 "На Пустках багато талановитих та розумних людей, навіть тих, хто не є частиною Рівет-Сіті. Деякі з них тепер бачать у нашій країні, що розвивається, маяк надії, і ми раді прийняти їх."

 riv_mercenaries_no_more:0 "Більше не найманці"
 riv_mercenaries_no_more_desc:0 "Компанія «Кіготь» — це жорстока банда найманців, які прагнуть прибутку навіть за допомогою найбільш безпринципних засобів. Хоча в минулому вони були нам корисні, ми ніколи не зможемо почуватися в безпеці, поки вони існують як активна сила."
 
 riv_regulate_the_wasteland:0 "Регулювання Пустки"
 riv_regulate_the_wasteland_desc:0 "Після знищення дикої та жорстокої компанії «Коготь» на сцену вийшла група, відома як Регулятори. Раніше вони присвячували себе захисту поселень та цивілізації; тепер вони бачать, куди дме вітер, і запропонували допомогу у нашому захисті."

 riv_control_secured:0 "Контроль забезпечено"
 riv_control_secured_desc:0 "Нарешті контроль над Округом Колумбія міцно і належним чином належить нам. Більше жорстокі мешканці Столичної Пустки не загрожуватимуть нашому місту."

 riv_capitol_centre_of_trade:0 "Капітолій — центр торгівлі"
 riv_capitol_centre_of_trade_desc:0 "Тепер торгівля може вільно текти по всій Столичній Пустці без загрози тарифів Анклаву чи Братства."

 riv_find_origins_of_super_mutants:0 "Знайти походження супермутантів"
 riv_find_origins_of_super_mutants_desc:0 "Попри поразку двох найсильніших військових держав на Столичній Пустці, супермутанти залишаються небезпечною загрозою і мають зухвалість атакувати навіть сам Рівет-Сіті. Ми повинні з'ясувати, звідки вони беруться."

 riv_talk_to_little_lamplight:0 "Розмова з Літл-Лемплайт"
 riv_talk_to_little_lamplight_desc:0 "Схоже, супермутанти приходять звідкись поблизу поселення Літл-Лемплайт. Цікаве місце, це Літл-Лемплайт — воно повністю населене дітьми. Можна лише здогадуватися, звідки вони там беруться."

 riv_all_gone:0 "Усі зникли"
 riv_all_gone_desc:0 "Незабаром супермутанти будуть виметені з Вашингтона. Мешканці Літл-Лемплайт вказали нам на Сховище 87, і тепер знадобиться лише невелика операція, щоб вирвати їх із корінням. Прощавайте, супермутанти."

 riv_capitalise_trade_connections:0 "Капіталізація торгових зв'язків"
 riv_capitalise_trade_connections_desc:0 "Наші торгові зв'язки в Вашингтоні приносять нам величезні статки. Просто інвестуючи частину надлишкового багатства, ми зможемо гарантувати собі все, що нам коли-небудь знадобиться."

 riv_float_the_cap_currency:0 "Вільний курс кришки"
 riv_float_the_cap_currency_desc:0 "Кришки як валюта спочатку були підкріплені запасами води, що є абсолютно необхідним на Столичній Пустці. Однак з тією кількістю води, що зараз надходить на ринок, вартість кришок може небезпечно обвалитися. Встановивши плаваючий курс, ми зробимо так, щоб кришки підкріплювалися нашою доброю волею та впливом."

 riv_stabilise_inflation:0 "Стабілізація інфляції"
 riv_stabilise_inflation_desc:0 "Для простоти найлегше залишити кришки прив'язаними до води. Однак нам потрібно вжити досить радикальних заходів, щоб вони не постраждали від сильної інфляції."

 riv_infrastructure_development:0 "Розвиток інфраструктури"
 riv_infrastructure_development_desc:0 "Ми були настільки зосереджені на тому, щоб тримати наш дім на плаву, що часто нехтували розширенням. Цьому настав край: Рада найме робітників, щоб демонтувати іржаві перебірки та звести стіни за межами корабля."

 riv_dc_prospers:0 "Вашингтон процвітає"
 riv_dc_prospers_desc:0 "Рівет-Сіті височіє як сяючий маяк для всієї Столичної Пустки, демонструючи, чого можна досягти за правильного керівництва. Наші жителі насолоджуються безпрецедентною безпекою та процвітанням, про які багато хто за межами наших кордонів може лише мріяти!"

 riv_more_than_a_security_force:0 "Більше ніж сили безпеки"
 riv_more_than_a_security_force_desc:0 "Тепер, коли Рівет-Сіті став домінуючою силою на Столичній Пустці, нам потрібно реорганізувати наші збройні сили. Мати службу безпеки було цілком достатньо, коли ми були просто містом без планів на експансію, але тепер потрібно щось набагато значніше."

 riv_appoint_officers:0 "Призначення нових офіцерів"
 riv_appoint_officers_desc:0 "З новою армією приходить нова доктрина і потреба в нових офіцерах. Раніше солдатів навчали підтримувати порядок і захищати місто та каравани від випадкових атак, але тепер нам потрібні офіцери, здатні вести людей у наступ."

 riv_develop_military_techniques:0 "Розробка нових військових методів"
 riv_develop_military_techniques_desc:0 "Більшість армій на Пустці — це не просто хлопці з пушками. Медичне забезпечення, логістична підтримка та протитанкове (антиматеріальне) спорядження необхідні армії, що сподівається битися з цілою низкою ворогів, і ми повинні почати підготовку."

 riv_military_ideas:0 "Військові ідеї"
 riv_military_ideas_desc:0 "Наше нове військо вже на шляху до того, щоб стати справжньою армією Пустки, але тактика, яку ми використовували для захисту нашого міста, не підійде для широкомасштабних конфліктів. Нам потрібно переоцінити та розробити нові способи ведення бою."

 riv_scientific_applications_for_war:0 "Наука на службі війни"
 riv_scientific_applications_for_war_desc:0 "Ми, перш за все, науковий та економічний центр з армією, а не військовий штаб з економікою. Спрямувавши наших вчених на розробку нової зброї та спорядження для солдатів, наша армія зможе затьмарити війська більшості інших народів Пустки."

 riv_better_than_men:0 "Краще за людей"
 riv_better_than_men_desc:0 "Існують й інші можливості ведення війни, окрім просто людей із гвинтівками..."

 riv_rivets_rule_the_waves:0 "«Заклепки» правлять морями"
 riv_rivets_rule_the_waves_desc:0 "Оскільки наше місто побудоване на колишньому авіаносці, цілком природно, що ми повинні мати потужний флот."

 riv_the_open_sky_awaits:0 "Відкрите небо чекає"
 riv_the_open_sky_awaits_desc:0 "З іншого боку, авіаносці зазвичай несуть на собі літаки. Це також природний напрямок розвитку."

 riv_caravans_run_on_time:0 "Каравани прибувають вчасно"
 riv_caravans_run_on_time_desc:0 "Як усім відомо, найчастішими причинами затримок торгових караванів на Столичній Пустці є рейдери, дикі гулі, супермутанти та інші агресивні нападники. Наше військо захистить їх — І КАРАВАНИ БУДУТЬ ПРИБУВАТИ ВЧАСНО."

 riv_rivet_city_military:0 "Збройні сили Рівет-Сіті"
 riv_rivet_city_military_desc:0 "Протягом багатьох років наша служба безпеки була ближчою до невеликої армії, ніж до контингенту охоронців. Оскільки небезпеки Пустки зростають, настав час відкинути удавану скромність і ставитися до наших сил безпеки як до справжнього війська, яким вони і є."

 riv_scientific_utopia:0 "Наукова утопія"
 riv_scientific_utopia_desc:0 "Рівет-Сіті — наймогутніша та найрозвиненіша держава на Столичній Пустці. Під нашим керівництвом Пустка може увійти в нову еру прогресу та процвітання, де торгівля та наука йдуть пліч-о-пліч. Наше майбутнє починається."