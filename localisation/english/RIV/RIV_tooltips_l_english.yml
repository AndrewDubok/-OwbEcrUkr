l_english:
RIV_not_max_caravans_tt:0 "Кількість сформованих §Yкараванів§! зараз має бути §Gменшою§!, ніж максимальна кількість караванів"
  RIV_increase_caravan_maximum_tt:0 "§GМаксимальна кількість§! §Yторгових караванів§!, яку ми можемо мати, збільшиться."
  RIV_train_new_caravan_tt:0 "Буде сформовано §Gновий торговий караван§!!"
  RIV_caravans_not_on_mission_tt:0 "Ми повинні мати принаймні один §Yкараван§!, який зараз не перебуває у §Oторговій місії§!"
  RIV_caravan_sent_out_tt:0 "Один із наших §Yкараванів§! буде відправлений у §Gторгову місію§!"
  RIV_caravan_success_chance_tt:0 "Шанси §Yкаравану§! на §Gуспіх§! значною мірою залежатимуть від рівня §Oрізноманітних загроз§!"
  RIV_lost_a_caravan_tt:0 "§YКараван§! було §Rвтрачено§!, але принаймні частина торговців вижила"
  RIV_caravan_returned_tt:0 "Незалежно від того, чи була торгова місія успішною, §Yкараван§! повернувся"
  RIV_making_trade_safer_tt:0 "Цей патруль §Gтрохи послабить§! одну з головних загроз для наших §Yторгових караванів§!"
  riv_end_trade_decisions_tt:0 "§OЦе припинить нашу можливість відправляти каравани — принаймні тимчасово.§!"
  riv_restore_trade_tt:0 "§GТоргівля стала безпечнішою, і наші каравани знову зможуть перетинати Пустку.§!"

  RIV_unlock_trade_to_megaton_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YМегатонни§!."
  RIV_unlock_trade_to_big_town_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YБіг-Тауна§!."
  RIV_unlock_trade_to_underworld_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YПідземелля§!."
  RIV_unlock_trade_to_canterbury_commons_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YКентербері-Коммонс§!."
  RIV_unlock_trade_to_tenpenny_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YТенпенні-Тауер§!."
  RIV_unlock_trade_to_point_lookout_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YПойнт-Лукаут§!."
  RIV_unlock_trade_to_evergreen_mills_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YЕвергрін-Міллс§!."
  RIV_unlock_trade_beyond_the_capital_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани за межі §YСтоличної Пустки§!."
  RIV_unlock_trade_to_arefu_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YАрефу§!."
  RIV_unlock_trade_to_dave_tt:0 "Завершення цього фокусу дозволить нам відправляти торгові каравани до §YРеспубліки Дейва§!."

  riv_unlock_cps_expeditions_tt:0 "Завершення цього фокусу §Yвідкриє рішення§!, що дозволять нам відправляти експедиції за §Gдовоєнними американськими артефактами§!."

  riv_more_profitable_caravans_tt:0 "Наші майбутні торгові каравани будуть §Gприбутковішими!§!\n"
  riv_caravans_less_profitable_tt:0 "Наші майбутні торгові каравани будуть §Rменш прибутковіми!§!\n"

  riv_bunkers_on_the_borders_tt:0 "§GОдин рівень§! §Yаванпосту§! на кожному нашому кордоні"

  riv_project_purity_explanation_tt:0 "Ми можемо почати підготовку до §CПроєкту «Чистота»§!, обираючи наукові фокуси, але ми не зможемо розпочати його безпосередньо, доки Джеймс не повернеться."
  riv_james_has_returned_tt:0 "Джеймс повернувся до Рівет-Сіті, і наші вчені готові завершити §CПроєкт «Чистота»§!"

  riv_caravans_give_water_tt:0 "§YКаравани§! тепер доставлятимуть воду і приноситимуть нам більше кришок"

  riv_end_enclave_threat_tt:0 "Завершення цього фокусу не дозволить залишкам §BАнклаву§! загрожувати нашим §Yкараванам§!"

  riv_begin_integrating_settlements_tt:0 "Ми почнемо використовувати наш §Gвплив§! на поселення Столичної Пустки, щоб асимілювати їх. Відправляючи §Yкаравани§! з водою з §CПроєкту «Чистота»§!, ми посилимо наш §Gвплив§! на ці поселення. Це оновить категорію рішень §Y«Торгові каравани Рівет-Сіті»§!."

  RIV_increase_all_influence_tt:0 "Це §Gзбільшить§! наш §Gвплив§! у всіх доступних поселеннях"
  RIV_decrease_all_influence_tt:0 "Це §Rзменшить§! наш §Gвплив§! у всіх доступних поселеннях"

  riv_council_voting_explanatory_tt:0 "Для успішного голосування всі члени Ради мають погодитися на певний план дій. Результат кожного голосування залежатиме від того, хто саме засідає в Раді, §Oта чи надамо ми їм якісь... переконливі аргументи§!."
  riv_council_voting_explanatory_emergency_tt:0 "На відміну від інших голосувань, це проводиться як §Oнадзвичайне§!. Звичайна вимога одностайної згоди скасовується — такі рішення занадто критичні, щоб дозволити нерішучості гальмувати розвиток міста. §YПроте час для переговорів ще є§!."

  riv_weaken_supermutants_tt:0 "Завершення цього фокусу §Gзначно послабить§! присутність супермутантів у окрузі Колумбія!"
  riv_weaken_raiders_tt:0 "Завершення цього фокусу §Gзначно послабить§! рейдерів, які загрожують нашим §Yторговим караванам§!!"
  riv_weaken_ferals_tt:0 "Завершення цього фокусу §Gзначно послабить§! диких гулів, які загрожують нашим §Yторговим караванам§!!"

  riv_chose_to_fight_the_enclave_tt:0 "Рада мала погодитися на війну проти §BАнклаву§!."
  riv_chose_to_stay_neutral_tt:0 "Голосування за війну проти §BАнклаву§! мало провалитися."

  riv_puppet_the_brotherhood_tt:0 "Якщо ми в союзі з §gБратством§!, вони стануть нашими маріонетками. Якщо ні — ми натомість отримаємо §Oпривід для війни§!.\n"
  riv_risk_of_assimilation_tt:0 "§OЯкщо ми погодимося на цю угоду, нас можуть змусити до підкорення пізніше!§!"
  riv_enemy_of_rivet_city_tt:0 "§OОбравши цей шлях, ми можемо зазнати нападу з боку §CРівет-Сіті§! у майбутньому!§!"

  riv_weapons_contribution_tt:0 "Щомісяця ми §Gотримуватимемо§! певну кількість §Yзброї низької якості§!."

  riv_victory_autocomplete_tt:0 "Цей фокус завершиться автоматично залежно від того, хто переможе в битві за §CПроєкт «Чистота»§!!"
  riv_vassalise_bln_tt:0 "Ми вимагатимемо від Братства підкоритися нашій владі. Якщо вони погодяться, то стануть нашою маріонеткою; якщо відмовляться — ми отримаємо привід для війни."

  riv_madison_flees_tt:0 "Медісон Лі втекла на схід, до Співдружності та таємничого §CІнституту§!."

  riv_enclave_refusal_tt:0 "Ми запропонуємо підкоритися §BАнклаву§!. Якщо вони відмовляться, ми автоматично завершимо фокус «§YСидіти тихо§!»"

  riv_anger_the_institute_tt:0 "§RЦе розлютить §CІнститут§!. Хто знає, якими можуть бути наслідки?§!"

  riv_harkness_leaves_danvers_leader_tt:0 "§YГаркнесс піде, зробивши Денверс новим представником служби безпеки в Раді Рівет-Сіті.§!"
  riv_seagrave_leader_tt:0 "§YБеннона виженуть із Ради Рівет-Сіті, а Сігрейв Голмс стане новим представником цивільних.§!"

  riv_the_replicated_man_begins_tt:0 "Відправляючи §Yкаравани§! до поселень, ми зможемо знайти голозаписи про Репліканта"

  riv_influence_increased_megaton_tt:0 "Наш вплив у Мегатонні §Gзбільшиться§! на 1"
  riv_influence_increased_underworld_tt:0 "Наш вплив у Підземеллі §Gзбільшиться§! на 1"
  riv_influence_increased_canterbury_tt:0 "Наш вплив у Кентербері-Коммонс §Gзбільшиться§! на 1"
  riv_influence_increased_tenpenny_tt:0 "Наш вплив у Тенпенні-Тауер §Gзбільшиться§! на 1"
  riv_influence_increased_arefu_tt:0 "Наш вплив в Арефу §Gзбільшиться§! на 1"
  riv_influence_increased_dave_tt:0 "Наш вплив у Республіці Дейва §Gзбільшиться§! на 1"

  riv_lower_influence_in_state_tt:0 "Вплив Рівет-Сіті в цьому регіоні §Rзменшиться§! на 1"
  riv_increase_influence_in_state_tt:0 "Вплив Рівет-Сіті в цьому регіоні §Gзбільшиться§! на 1"

  riv_tie_closer_to_the_brotherhood:0 "Рівет-Сіті тісніше зв’яжеться з §gБратством Сталі§!"
  riv_split_further_from_the_brotherhood:0 "Рівет-Сіті буде змушене торувати незалежний шлях"

  the_dc_alliance:0 "Альянс округу Колумбія"
