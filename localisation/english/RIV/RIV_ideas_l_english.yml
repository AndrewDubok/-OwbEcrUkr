 riv_more_food_for_better_prices:0 "More Food, for Better Prices"
 riv_more_food_for_better_prices_desc:0 "With a more advanced lab, we can better develop our hydroponics to produce more abundant food."

 riv_powerful_caravan_companies:0 "Powerful Caravan Companies"
 riv_powerful_caravan_companies_desc:0 "Rivet City has relied on its small caravan companies for a long time, and with support from the Council they have grown into powerful commercial interests, all backed by Rivet City. Their prosperity means the City's prosperity."

 riv_flourishing_markets:0 "Flourishing Markets"
 riv_flourishing_markets_desc:0 "Our markets have become the most important in DC. Traders from all over the Capital Wasteland come to Rivet City to hawk their wares, trade their goods, and come away with fatter coinpurses."

