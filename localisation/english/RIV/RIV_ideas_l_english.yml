l_english:
  riv_scientific_hub_of_the_capital:0 "Науковий хаб Столиці"
  riv_scientific_hub_of_the_capital_desc:0 "Хоча Братство та Анклав можуть володіти технологіями, досконалішими за наші, ми — дослідники та найкраща наукова інституція в Капітолії. Саме завдяки нам мешканці регіону можуть їсти свіжі фрукти й овочі та сподіватися на краще завтра."

  riv_rust_and_rivets:0 "Іржа та заклепки"
  riv_rust_and_rivets_desc:0 "Розташування нашого міста створює унікальні виклики та можливості. Хоча будувати в уже існуючих приміщеннях легше, нам також доводиться мати справу з руйнівним впливом іржі, яка пронизує повітря, яким ми дихаємо."

  # Дублікати (2-5) використовують той самий переклад
  riv_rust_and_rivets_2:0 "Іржа та заклепки"
  riv_rust_and_rivets_2_desc:0 "Розташування нашого міста створює унікальні виклики та можливості. Хоча будувати в уже існуючих приміщеннях легше, нам також доводиться мати справу з руйнівним впливом іржі, яка пронизує повітря, яким ми дихаємо."

  riv_the_security_team:0 "Служба безпеки"
  riv_the_security_team_desc:0 "Сили безпеки Рівет-Сіті — це не зовсім поліція, але й не зовсім армія. Відносна безпека міста означає, що справжні солдати нам не потрібні, але звичайної поліції недостатньо. Це означає, що хоча загін невеликий, він добре організований і компетентний. Також їм частково платять безкоштовною їжею, якої у нас вдосталь, що робить утримання сил дешевшим."

  riv_vaccine_development:0 "Розробка вакцин"
  riv_vaccine_development_desc:0 "Наші вчені працюють над ліками від хвороб Пустки, зміцнюючи здоров'я наших громадян."

  riv_rust_clearing:0 "Очищення від іржі"
  riv_rust_clearing_desc:0 "Постійні зусилля з очищення корпусу авіаносця дозволяють сповільнити структурну деградацію нашого дому."

  riv_lis_new_scientists:0 "Нові вчені Лі"
  riv_lis_new_scientists_desc:0 "Медісон Лі залучила до Рівет-Сіті нових вчених — приїжджих фахівців, які приносять свіжий досвід та знання в лабораторії міста. Хоча це значно прискорює наші дослідження, нові ідеї можуть стати на заваді політичній стабільності."

  riv_food_production_expanded:0 "Розширення виробництва їжі"
  riv_food_production_expanded_desc:0 "Коли Лі прибула до міста, її першим пріоритетом було значне розширення виробництва їжі. Вона стверджувала, що решта Пустки голодує, і ми маємо ділитися врожаєм, щоб принести здоров'я та процвітання всім. На жаль, лаборанти та асистенти, необхідні для вирощування такої кількості їжі, відволікаються від наших наукових розробок."

  riv_lower_food_prices:0 "Зниження цін на їжу"
  riv_lower_food_prices_desc:0 "Прибуття Лі до міста принесло новий погляд як науковій групі, так і керівництву. Лі негайно почала наполягати на зниженні цін на продовольство для решти Пустки. Хоча це б'є по нашому бюджету, це приносить багато вдячності від мешканців Пустки, а багато містян пишаються тим, що допомагають іншим."

  riv_limit_conscription2:0 "Обмеження призову"
  riv_limit_conscription2_desc:0 "Ми не можемо дозволити собі просто закидати м'ясом кожну проблему. Денверс хоче бути впевненою, що ми не втратимо занадто багато людей. Невелика ціна за її підтримку."

  riv_li_science_focus_idea1:0 "Науковий фокус"
  riv_li_science_focus_idea1_desc:0 "В обмін на підтримку Медісон Лі в Раді, вона зажадала збільшення фінансування наукового сектору. Це матиме незначні економічні та політичні наслідки."

  riv_punga_trade:0 "Торгівля пунгою"
  riv_punga_trade_desc:0 "Плод пунги з Пойнт-Лукаут — це приваблива та апетитна страва. Окрім гарного смаку, вони очищують організм від радіаційного отруєння та мають незначні лікувальні властивості. Звісно, вони також викликають легке звикання..."

  riv_economic_support:0 "Економічна підтримка Рівет-Сіті"
  riv_economic_support_desc:0 "Наші торгові зв'язки та ресурси допомагають підтримувати стабільність економіки."

  riv_war_effort_idea:0 "Рівет-Сіті підтримує воєнні зусилля"
  riv_war_effort_idea_desc:0 "Мобілізація ресурсів міста для потреб фронту."

  riv_volunteers_to_bos:0 "Добровольці для Братства"
  riv_volunteers_to_bos_desc:0 "Наші громадяни вступають до лав Братства Сталі, щоб захистити Столичну Пустку."

  riv_weapons_contribution_idea:0 "Програма передачі зброї Рівет-Сіті"
  riv_weapons_contribution_idea_desc:0 "Нова програма закликає громадян Рівет-Сіті здавати свою зброю для потреб армії. Хоча це не дає величезної кількості озброєння, кожна одиниця допомагає справі."

  riv_elite_security_forces:0 "Елітні сили безпеки"
  riv_elite_security_forces_desc:0 "Кожен охоронець має бути найкращим, на що він здатний, кожен офіцер — видатним лідером."

  riv_expansion_of_security:0 "Розширення служби безпеки"
  riv_expansion_of_security_desc:0 "Навіть найкращий солдат у світі не може воювати проти цілої армії наодинці."

  riv_military_expansion:0 "Військово-промислова експансія"
  riv_military_expansion_desc:0 "Постійне розширення Служби безпеки Рівет-Сіті вимагає розвитку промисловості, яка їх забезпечує."

  riv_volunteers_to_the_wasteland:0 "Добровольці Пустки"
  riv_volunteers_to_the_wasteland_desc:0 "Пустка — величезне місце, і ми маємо допомагати дружнім народам там, де можемо."

  riv_maintenance_effort_idea:0 "Зусилля з технічного обслуговування"
  riv_maintenance_effort_idea_desc:0 "Покращення стану інфраструктури та обладнання міста."

  riv_science_effort_idea:0 "Наукові зусилля"
  riv_science_effort_idea_desc:0 "Зосередження ресурсів на прискоренні технологічного прогресу."

  riv_marketplace_refurbishment_idea:0 "Оновлення ринку"
  riv_marketplace_refurbishment_idea_desc:0 "Модернізація торгової палуби для збільшення товарообігу."

  riv_deck_refurbishment_idea:0 "Оновлення палуб"
  riv_deck_refurbishment_idea_desc:0 "Ремонт житлових та технічних рівнів корабля."

  riv_lab_modernisation_idea:0 "Модернізація лабораторій"
  riv_lab_modernisation_idea_desc:0 "Оснащення наших вчених найкращим довоєнним обладнанням."

  riv_more_food_for_better_prices:0 "Більше їжі, кращі ціни"
  riv_more_food_for_better_prices_desc:0 "Завдяки сучасній лабораторії ми можемо вдосконалити гідропоніку для вирощування ще більшої кількості продуктів."

  riv_powerful_caravan_companies:0 "Потужні караванні компанії"
  riv_powerful_caravan_companies_desc:0 "Рівет-Сіті довгий час покладалося на малі караванні компанії, але за підтримки Ради вони перетворилися на потужні комерційні структури, що діють в інтересах міста. Їхнє процвітання — це процвітання міста."

  riv_flourishing_markets:0 "Процвітаючі ринки"
  riv_flourishing_markets_desc:0 "Наші ринки стали найважливішими в окрузі Колумбія. Торговці з усієї Столичної Пустки приходять до Рівет-Сіті, щоб продати свій крам, обмінятися товарами та піти з повними гаманцями."

  riv_people_over_profit:0 "Постанова «Люди важливіші за прибуток»"
  riv_people_over_profit_desc:0 "Соціально-орієнтована політика, спрямована на підтримку найбідніших верств населення."

  riv_higher_priced_food:0 "Підвищення цін на їжу"
  riv_higher_priced_food_desc:0 "Збільшення вартості продуктів для зовнішніх покупців задля наповнення скарбниці."

  riv_defensive_focus:0 "Постанова про зосереджену оборону"
  riv_defensive_focus_desc:0 "Пріоритет на зміцнення периметру та захист внутрішніх відсіків міста."

  riv_outside_scientists:0 "Постанова про залучення сторонніх вчених"
  riv_outside_scientists_desc:0 "Офіційний дозвіл на роботу в лабораторіях для спеціалістів не з Рівет-Сіті."

  riv_extra_expenses:0 "Додаткові витрати"
  riv_extra_expenses_desc:0 "Непередбачувані видатки на утримання складних систем авіаносця."

  riv_bridge_tax:0 "Податок на міст від Ради"
  riv_bridge_tax_desc:0 "Плата за вхід до міста через підйомний міст."

  riv_dangerous_science:0 "Постанова про небезпечні дослідження"
  riv_dangerous_science_desc:0 "Схвалення ризикованих наукових експериментів заради великих відкриттів."

  riv_radaway_production:0 "Збільшення виробництва Рад-Евей"
  riv_radaway_production_desc:0 "Наші хімічні лабораторії працюють на повну потужність, виробляючи антирадіаційні препарати."

  riv_priority_treatment_idea:0 "Підтримка мешканців ангарної палуби"
  riv_priority_treatment_idea_desc:0 "Програма допомоги тим, хто живе в найбільш занедбаних частинах міста."

  riv_equal_treatment_idea:0 "Постанова про рівні права"
  riv_equal_treatment_idea_desc:0 "Забезпечення однакових можливостей для всіх громадян Рівет-Сіті."

  riv_dangerous_sections_closed:0 "Закриття небезпечних секцій"
  riv_dangerous_sections_closed_desc:0 "Герметизація пошкоджених відсіків для запобігання нещасним випадкам та витокам радіації."

  riv_integrated_administration:0 "Інтегрована адміністрація"
  riv_integrated_administration_desc:0 "Залучаючи найталановитіших адміністраторів та посадовців з інтегрованих поселень, ми можемо легше контролювати території, які ще не повністю нам підкорені."

  riv_domination_of_dc:0 "Домінування в окрузі Колумбія"
  riv_domination_of_dc_desc:0 "З падінням останніх оплотів опору, Рівет-Сіті утвердилося як домінуюча сила в регіоні, а можливо, і на всьому Східному узбережжі США. Тепер, коли контроль забезпечено, можливо, нарешті почнеться «Відродження Східного узбережжя»."

  riv_the_new_army:0 "Нова армія"
  riv_the_new_army_desc:0 "Служба безпеки Рівет-Сіті зіткнулася з неприємною правдою: вони просто занадто погано навчені та екіпіровані для масштабних бойових дій, у які вони тепер втягнуті. Проводиться повна реорганізація, яка перетворить Сили безпеки на справжню армію."

  riv_wildlife_study_idea:0 "Вивчення дикої природи"
  riv_wildlife_study_idea_desc:0 "Дослідження мутованої флори та фауни Пустки для практичного використання."

  riv_water_rationing:0 "Нормування води"
  riv_water_rationing_desc:0 "Коли Анклав взяв під контроль водопостачання округу Колумбія та переміг Братство, ситуація раптово стала набагато похмурішою. Рівет-Сіті має бути обережним у розподілі води — її може стати набагато менше."

  riv_emergency_conscription_idea:0 "Надзвичайний призов"
  riv_emergency_conscription_idea_desc:0 "Хто знає, коли Анклав вирішить, що з нього досить? Ми мусимо підготуватися, створивши найбільшу армію, яку зможемо — шкода суспільству є необхідною, коли твій противник — це кінець твого суспільства."

  riv_enclave_methodology:0 "Методологія Анклаву"
  riv_enclave_methodology_desc:0 "Анклав готовий використовувати більш... негуманні методи дослідження. Це мало кому подобається, але це означає, що піддослідних завжди вдосталь."

  riv_free_trade_city:0 "Вільне місто округу Колумбія"
  riv_free_trade_city_desc:0 "«Залиште, землі древні, пишну славу!» — безмовно каже вона. «Дайте мені ваших втомлених, ваших бідних, ваші пригнічені маси, що прагнуть дихати вільно, нещасних покидьків ваших тісних берегів. Присилайте цих бездомних, кинутих бурею до мене, я піднімаю свій світильник біля золотих дверей!»"

  riv_fiat_cap_currency:0 "Фіатна валюта кришок"
  riv_fiat_cap_currency_desc:0 "Встановлення контрольованої містом валютної системи."

  riv_water_inflation:0 "Боротьба з інфляцією, забезпеченою водою"
  riv_water_inflation_desc:0 "Заходи щодо стабілізації цін у світі, де вода стала головним мірилом вартості."

  riv_truest_technocracy:0 "Справжня технократія"
  riv_truest_technocracy_desc:0 "Рівет-Сіті стало вершиною сучасної технократії. Братство та Анклав відмовилися бачити щось далі своєї зброї та броні, а Інститут одержимий своїми дивними роботами та ізоляціонізмом. Рівет-Сіті, навпаки, стоїть як маяк науки та людяності на всьому Східному узбережжі."

  # Історичні документи та промови
  riv_bill_of_rights_idea:0 "Білль про права США"
  riv_constitution_idea:0 "Конституція Сполучених Штатів"
  riv_declaration_of_independence_idea:0 "Декларація незалежності США"
  riv_magna_carta_idea:0 "Велика хартія вольностей"
  riv_monroe_doctrine_idea:0 "Доктрина Монро"
  riv_war_declaration_on_china_idea:0 "Оголошення війни Китаю"
  riv_war_declaration_on_germany_idea:0 "Оголошення війни Німеччині"
  riv_gettysburg_address_idea:0 "Геттісберзька промова"