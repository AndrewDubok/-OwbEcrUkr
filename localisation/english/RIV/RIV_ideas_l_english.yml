 riv_wildlife_study_idea_desc:0 ""

 riv_wildlife_study_idea_2:0 "Wildlife Study"
 riv_wildlife_study_idea_2_desc:0 ""

 riv_water_rationing:0 "Water Rationing"
 riv_water_rationing_desc:0 "With the Enclave taking control of the water supply of DC and their victory over the Brotherhood, things are suddenly looking far more dire. Rivet City must be careful in how it hands out its water - there may not be much more coming."

 riv_emergency_conscription_idea:0 "Emergency Conscription"
 riv_emergency_conscription_idea_desc:0 "Who knows when the Enclave may decide enough is enough? We must prepare by creating the largest army we can - detriments to society are necessary when your opponent is the end of your society."

 riv_enclave_methodology:0 "Enclave Methodology"
 riv_enclave_methodology_desc:0 "The Enclave are willing to utilise more - inhumane methods of research. Not many people like this, but that just means plenty of test subjects."

 riv_free_trade_city:0 "The Free City of DC"
 riv_free_trade_city_desc:0 ""Keep, ancient lands, your storied pomp!" cries she\nWith silent lips. "Give me your tired, your poor,\nYour huddled masses yearning to breathe free,\nThe wretched refuse of your teeming shore.\nSend these, the homeless, tempest-tost to me,\nI lift my lamp beside the golden door!""

 riv_fiat_cap_currency:0 "Fiat Cap Currency"
 riv_fiat_cap_currency_desc:0 ""

 riv_water_inflation:0 "Fight the Water-Backed Inflation"
 riv_water_inflation_desc:0 ""

 riv_truest_technocracy:0 "The Truest Technocracy"
 riv_truest_technocracy_desc:0 "Rivet City has become the pinnacle of modern technocracy. The Brotherhood and Enclave refused to look beyond their weapons and armour, and the Institute are obsessed with their weird robots and isolationism. Rivet City, on the other hand, stands as a beacon of science and humanity across the East Coast."




