l_english:
 riv_scientific_hub_of_the_capital:0 "The Scientific Hub of the Capital"
 riv_scientific_hub_of_the_capital_desc:0 "While the Brotherhood and Enclave may possess technology more advanced than ours, we are researchers and the finest scientific institution in the Capitol. It is through us that people in the area can eat fresh fruit and vegetables, and hope for a better tomorrow."

 riv_rust_and_rivets:0 "Rust and Rivets"
 riv_rust_and_rivets_desc:0 "The location of our city brings unique challenges and opportunities. While it is easier to construct in rooms that already exist, we also have to deal with the devastating effects of the rust that permeates the air we breathe."

 riv_rust_and_rivets_2:0 "Rust and Rivets"
 riv_rust_and_rivets_2_desc:0 "The location of our city brings unique challenges and opportunities. While it is easier to construct in rooms that already exist, we also have to deal with the devastating effects of the rust that permeates the air we breathe."

