 riv_the_security_team:0 "The Security Team"
 riv_the_security_team_desc:0 "Rivet City's security forces are not quite a police force, not quite a military. The relative safety of Rivet City means that proper soldiers aren't needed, but police aren't quite sufficient. This means that, while the security force is small, they're well organised and competent. They are also partially paid in free food, which we have plenty of, making the force cheaper to afford."

 riv_vaccine_development:0 "Vaccine Development"
 riv_vaccine_development_desc:0 ""

 riv_rust_clearing:0 "Rust Clearing"
 riv_rust_clearing_desc:0 ""

 riv_lis_new_scientists:0 "Li's New Scientists"
 riv_lis_new_scientists_desc:0 "Madison Li has brought new scientists into Rivet City, non-natives who bring fresh experiences and expertise to the labs of the city. While this is a significant boost to our research efforts, fresh ideas can be a disadvantage when it comes to political stability."

 riv_food_production_expanded:0 "Food Production Expanded"
 riv_food_production_expanded_desc:0 "When Li arrived in the city, her first priority was to expand food production in the city significantly. The rest of the wasteland, she said, was starving, and we need to share our produce to bring health and prosperity to all. Unfortunately, the lab techs and assistants needed to grow this much food are pulled away from our research efforts."

 riv_lower_food_prices:0 "Lower Food Prices"
 riv_lower_food_prices_desc:0 "Li's arrival to the city brought a fresh perspective to the research team and the leadership of the city. Li immediately pushed for the lowering of food prices to the rest of the wasteland. While this hurts our bottom line, it brings lots of goodwill to the wasteland, and many people of the city are proud to be helping others."

 riv_limit_conscription2:0 "Limit Conscription"
 riv_limit_conscription2_desc:0 "We can't afford to simply throw bodies at every problem we encounter. Danvers wants to ensure we don't lose too much of our people. A small price to pay for her support."

 riv_limit_conscription1:0 "Limit Conscription"
 riv_limit_conscription1_desc:0 "We can't afford to simply throw bodies at every problem we encounter. Danvers wants to ensure we don't lose too much of our people. A small price to pay for her support."

 riv_li_science_focus_idea1:0 "Science Focus"
 riv_li_science_focus_idea1_desc:0 "In exchange for Madison Li's support in the council, she has demanded more funding for the science section. This will have some minor economic and political repercussions."

 riv_li_science_focus_idea2:0 "Science Focus"
 riv_li_science_focus_idea2_desc:0 "In exchange for Madison Li's support in the council, she has demanded more funding for the science section. This will have some minor economic and political repercussions."

 riv_punga_trade:0 "The Punga Trade"
 riv_punga_trade_desc:0 "Point Lookout's punga fruit are an appealing and appetising meal. As well as tasting good, they cleanse the body of radiation poisoning and have minor medicinal properties. Of course, it's also a little addictive..."

 riv_economic_support:0 "Rivet City's Economic Support"
 riv_economic_support_desc:0 ""

 riv_war_effort_idea:0 "Rivet City Boosts the War Effort"
 riv_war_effort_idea_desc:0 ""

 riv_volunteers_to_bos:0 "Volunteers for the Brotherhood"
 riv_volunteers_to_bos_desc:0 ""

 riv_weapons_contribution_idea:0 "The Rivet City Weapons Contribution Program"
 riv_weapons_contribution_idea_desc:0 "The new Rivet City Weapons Contribution Program appeals to the citizens of Rivet City to hand in their weapons for use in the military. While not providing massive amounts of weapons, every little bit helps."

 riv_paramount_security:0 "Paramount Security"
 riv_paramount_security_desc:0 ""

 riv_elite_security_forces:0 "Elite Security Forces"
 riv_elite_security_forces_desc:0 "Every guard must be the greatest they can be, every officer the best leader they can."

 riv_expansion_of_security:0 "Security Force Expansion"
 riv_expansion_of_security_desc:0 "The best soldier in the world can't fight an army alone."

 riv_military_expansion:0 "Military-Industrial Expansion"
 riv_military_expansion_desc:0 "Continuous expansion of the Rivet City Security Force necessitates expansion of the industry supporting them."

 riv_volunteers_to_the_wasteland:0 "Wasteland Volunteers"
 riv_volunteers_to_the_wasteland_desc:0 "The Wasteland is a massive place, we need to assist like-minded nations where we can."

