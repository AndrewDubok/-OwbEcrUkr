 riv_integrated_administration:0 "Integrated Administration"
 riv_integrated_administration_desc:0 "By taking in the most talented administrators and officials from the settlements we integrate, we can more easily control the territories which are not fully under our yoke."

 riv_domination_of_dc:0 "Domination of DC"
 riv_domination_of_dc_desc:0 "With the fall of the last holdouts in DC, Rivet City has established itself as the dominant force in the area, perhaps of the entire East Coast of the USA. With this control assured, maybe there will finally be an East Coast Rebirth."

 riv_the_new_army:0 "The New Army"
 riv_the_new_army_desc:0 "Rivet City's security force has been confronted with an uncomfortable truth: they are simply too poorly trained and equipped for the large scale combat that they now find themselves involved in. An overhaul of the army is taking place, that will see the Security Force turned into a true army."

 riv_the_new_army2:0 "The New Army"
 riv_the_new_army2_desc:0 "Rivet City's security force has been confronted with an uncomfortable truth: they are simply too poorly trained and equipped for the large scale combat that they now find themselves involved in. An overhaul of the army is taking place, that will see the Security Force turned into a true army."

