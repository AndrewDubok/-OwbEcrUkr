l_english:

#ANV Andale Cannibals#
ANV_standard_weaponry_tech:0 "Black Powder Pistol"
ANV_standard_weaponry_tech_short:0 "Old Sidearm"
ANV_standard_weaponry_tech_desc:0 "The lack of resources, weapon knowledge and manufacturing availability made flintlocks a common sight amongst Virginia. Beyond its simple sidearm function, a weighted grip makes it perfect for pistol-whipping during boarding, and a wide barrel let daring pirates load it with buckshot, before shredding any unlucky enemy in a blinding light and deafening blast."
ANV_ballistic_equipment_1:0 "Black Powder Rifle"
ANV_ballistic_equipment_1_short:0 "Brown Bess"
ANV_ballistic_equipment_1_desc:0 "The lack of resources, weapon knowledge and manufacturing availability made flintlocks a common sight amongst Virginia. "
ANV_ballistic_equipment_2:0 "Model 1873 Springfield"
ANV_ballistic_equipment_2_short:0 "Trapdoor Springfield"
ANV_ballistic_equipment_2_desc:0 "Extremely hard to use, older than dirt, and with a kick that would shatter a civilian's arm, the Model 1873 Springfield is a single-shot, trapdoor-loading design, chambered for a newer smokeless version of the mighty .45-70. With double the firepower and triple the recoil of a conventional 7.62mm, it certainly builds up character to train with such a weapon."
ANV_melee_equipment_1:0 "Cultist Knife"
ANV_melee_equipment_1_short:0 "Cultist Knife"
ANV_melee_equipment_1_desc:0 " A Small Cude knife made of antler and Stone"
ANV_melee_equipment_2:0 "Cultsist Blade"
ANV_melee_equipment_2_short:0 "Blade"
ANV_melee_equipment_2_desc:0 "An improvised weapon made from an antler piece combined with a piece of metal crudely formed into a serrated blade, and engraved with cultist emblems."

#DCR DC Raiders#
DCR_insect_equipment_1:0 "Ant"
DCR_insect_equipment_1_short:0 "Ant"
DCR_insect_equipment_1_desc:0 "They live in enormous underground colonies where they eat, sleep, and mate with the queen. Ants are omnivorous, either using their pyrosis to hunt and kill prey, or eating what little vegetation they can find, when necessary."
DCR_insect_equipment_2:0 "Warrior Ant"
DCR_insect_equipment_2_short:0 "Warrior Ant"
DCR_insect_equipmnet_2_desc:0 "Warrior ants have one purpose in the colony, to kill anything that would threaten it or The Queen. With enlarged pincers and tougher exoskeletons, these ants are deadlier than most."
DCR_insect_equipment_3:0 "Fire Ant"
DCR_insect_equipment_3_short:0 "Fire Ant"
DCR_insect_equipment_3_desc:0 "Due to the mistake of a wasteland scientist, a new breed of ants has arisen. They are faster, stronger, deadlier, and can spit flame at anyone foolish enough to stand against their queen!"

#EEN Raven Rock Enclave#
EEN_infantry_equipment_1:0 "Officers Side Arm"
EEN_infantry_equipment_1_short:0 "10mm Pistol"
EEN_infantry_equipment_1_desc:0 "The large-framed N99 was selected as the standard issue conventional sidearm of the United States military."
EEN_ballistic_equipment_1:0 "Standard Issue Carbine"
EEN_ballistic_equipment_1_short:0 "Carbine"
EEN_ballistic_equipment_1_desc:0 "A magazine fed, compact automatic weapon with a high rate of fire"
EEN_ballistic_equipment_2:0 "Assault Carbine"
EEN_ballistic_equipment_2_short:0 "Assault Carbine"
EEN_ballistic_weaponry_tech_2_desc:0 "A semi-automatic, medium-power rifle with a 20-round magazine"
EEN_ballistic_equipment_3:0 "Marksman Carbine"
EEN_ballistic_equipment_3_short:0 "Marksman Carbine"
EEN_ballistic_equipment_3_desc:0 " Takes the Assault Carbine and adds some expensive pre war improvements. Primarily a West Tek reflex sight, imroved foregrip, and larger magazine size"
EEN_ballistic_equipment_4:0 "Bozar"
EEN_ballistic_equipment_4_short:0 "Bozar"
EEN_ballistic_equipment_4_desc:0 "Part sniper rifle, part LMG, all around killer. The Bozar gives its user the ability to lay an impressive amount of fire down range with surprising accuracy."
EEN_energy_equipment_1:0 "Laser Pistol"
EEN_energy_equipment_1_short:0 "Laser Pistol"
EEN_energy_equipment_1_desc:0 " The AEP7 laser pistol, the standard laser pistol for self defense by 2276."
EEN_energy_equipment_3:0 "Tri-Beam Laser Rifle"
EEN_energy_equipment_3_short:0 "Tri-Beam Laser Rifle"
EEN_energy_equipment_3_desc:0 "Superior firepower at the cost of excessive ammo consumption."
EEN_melee_equipment_1:0 "Police Baton"
EEN_melee_equipment_1_short:0 "Baton"
EEN_melee_equipment_1_desc:0 "This is a collapsible model law enforcement baton, used by various police departments before the Great War. It is standard issue gear for Vault-Tec security forces."
EEN_melee_equipment_2:0 "Combat Knife"
EEN_melee_equipment_2_short:0 "Combat Knife"
EEN_melee_equipment_2_desc:0 "Does this even need an introduction? A leather grip, a steel blade, and a set of serrated teeth, ideal for dicing up mutants that get too close. It's nothing fancy, but the combat knife is a timeless weapon that needs no reinventing."
EEN_melee_equipment_3:0 "Ripper"
EEN_melee_equipment_3_short:0 "Ripper"
EEN_melee_equipment_3_desc:0 "The Ripper vibroblade is a pre-War brand of hand-held chainsaws, developed as a portable engineering tool for commercial and military uses."
EEN_energy_fireteam_equipment_4:0 "P94 Plasma Caster"
EEN_energy_fireteam_equipment_4_short:0 "Plasma Caster"
EEN_energy_fireteam_equipment_4_desc:0 "Despite being replaced by the lighter and cheaper urban plasma rifle, plasma casters still have a role to fill in heavy weapons teams."

#FRM Fire Marshals#
FRM_ballistic_equipment_1:0 "Caravan Shotgun"
FRM_ballistic_equipment_1_short:0 "Shotgun"
FRM_ballistic_equipment_1_desc:0 "An old over-under shotgun that gets the job done."
FRM_ballistic_equipment_2:0 "Hunting Shotgun"
FRM_ballistic_equipment_2_short:0 "Hunting Shotgun"
FRM_ballistic_equipment_2_desc:0 "A pistol puts holes in people, rifle puts holes through people, a shotgun at the right range, with the right load will phyisically remove a chunk of shit off of a tribal and throw that shit on the ground."
FRM_ballistic_equipment_3:0 "R91 Assault Rifle"
FRM_ballistic_equipment_3_short:0 "R91 AR"
FRM_ballistic_equipment_3_desc:0 "National Guard assault rifles found in great supply in the area around The Capital Wasteland even 200 years after the war."
FRM_ballistic_equipment_4:0 "Infiltrator R91"
FRM_ballistic_equipment_4_short:0 "Infiltrator"
FRM_ballistic_equipment_4_desc:0 "Customized versions of the R91 assault rifle often found in the hands of Pitt raiders, but easily acquired with the right funds."
FRM_melee_equipment_1:0 "Hatchet"
FRM_melee_equipment_1_short:0 "Hatchet"
FRM_melee_equipment_1_desc:0 "A small bladed weapon good for cutting the limbs of trees and tribals."
FRM_melee_equipment_2:0 "Fire Axe"
FRM_melee_equipment_2_short:0 "Fire Axe"
FRM_melee_equipment_2_desc:0 "A long and sturdy axe that can cleave through anything the swamp thorws at you."
FRM_melee_equipment_3:0 "Ripper"
FRM_melee_equipment_3_short:0 "Ripper"
FRM_melee_equipment_3_desc:0 "An pre-war miniaturized chainsaw which makes short work of hostile vegetation and savages."
FRM_melee_equipment_4:0 "Chainsaw"
FRM_melee_equipment_4_short:0 "Chainsaw"
FRM_melee_equipment_4_desc:0 "A large cutting tool that can tear through tree trunks, or armored tribals, like butter."
FRM_demolitions_equipment_1:0 "Molotov Cocktails"
FRM_demolitions_equipment_1_desc:0 "It's been said that necessity is the mother of invention, and this timeless incendiary is proof of that adage. Used by dissenting movements and individuals across the world before the War, we've now begun producing our own Molotovs with some makeshift wicks, scavenged Nuka-Cola bottles, and alcohol from hastily-built stills. They're no Pre-War high explosives, but is there any better sight than seeing the encroaching swamp or tribal villages consumed in fire?"
FRM_demolitions_equipment_1_short:0 "Molotovs"

#GED Garden of Eden#
GED_infantry_equipment_1:0 "Simple Bow"
GED_infantry_equipment_1_short:0 "Simple Bow"
GED_infantry_equipment_1_desc:0 "Simple bows slightly better than a pointed stick."
GED_ballistic_equipment_1:0 "Hunting Bow"
GED_ballistic_equipment_1_short:0 "Hunting Bow"
GED_ballistic_equipment_1_desc:0 "A simple hunting bow. Makes arrows go woosh. It's good for killing some geckos or unarmored outsiders."
GED_ballistic_equipment_2:0 "Composite Hunting Bow"
GED_ballistic_equipment_2_short:0 "Composite Bow"
GED_ballistic_equipment_2_desc:0 "A hunting bow of stronger materials. It can shoot arrows a little faster, even fast enough to pierce some light armors."
GED_ballistic_equipment_3:0 "Advanced Hunting Bow"
GED_ballistic_equipment_3_short:0 "Advanced Bow"
GED_ballistic_equipment_3_desc:0 "A hunting bow using sepcial alloys and manufacturing techniques. Arrows fired with this bow can even pierce wasteland metal armor at the right angle."
GED_ballistic_equipment_4:0 "Sophisticated War Bow"
GED_ballistic_equipment_4_short:0 "War Bow"
GED_ballistic_equipment_4_desc:0 "A bow designed for killing enemy warriors. With a mix of specialized materials, pre-war designs, and explosive arrows, these weapons can kill a man in combat armor no problem."

#GMN Green Mountain#
GMN_power_armor_equipment_tbh:0 "Ultracite Power Armor"
GMN_power_armor_equipment_tbh_short:0 "Ultracite PA"
GMN_power_armor_equipment_tbh_desc:0 "Ultracite Power Armor is a modified design originally fielded by The Brotherhood of Steel in Appalachia. Though our suit is not as advanced as the Brotherhood variant, which used T-51b power armor as a base, it still holds up better than most suits in the wastes."
GMN_infantry_equipment_1:0 "Scrap Shotgun"
GMN_infantry_equipment_1_short:0 "Scrap Shotgun"
GMN_infantry_equipment_1_desc:0 "Being pieced together from pipes and scrap wood doesn't get in the way of the buckshot flying out of it being deadly."
GMN_ballistic_equipment_1:0 "Old Shotgun"
GMN_ballistic_equipment_1_short:0 "Shotgun"
GMN_ballistic_equipment_1_desc:0 "Old doublebarrel shotguns have been used by everyone from bootleggers to freedom fighters. There is no shortage of them in our area, but they are starting to show their age."
GMN_ballistic_equipment_2:0 "Handmade Rifle"
GMN_ballistic_equipment_2_short:0 "Handmade Rifle"
GMN_ballistic_equipment_2_desc:0 "Crafted by Appalachian gunsmiths, this automatic killing machine is no simple pipe rifle."
GMN_ballistic_equipment_3:0 "R91 Assault Rifle"
GMN_ballistic_equipment_3_short:0 "Assault Rifle"
GMN_ballistic_equipment_3_desc:0 "An old assault rifle considered obsolete and relegated to National Guard units in the 2070s still holds up better than many recently made rifles."
GMN_ballistic_equipment_4:0 "R91 Infiltrator"
GMN_ballistic_equipment_4_short:0 "Infiltrator"
GMN_ballistic_equipment_4_desc:0 "A customized R91 assault rifle, often used by the slavers of The Pitt."
GMN_power_armor_equipment_2:0 "EXC-17 Excavator power armor"
GMN_power_armor_equipment_2_short:0 "EXC-17 PA"
GMN_power_armor_equipment_2_desc:0 "The EXC-17 Excavatior suit was designed to protect miners from rockfalls and airborne contaminants while increasing the speed at which they could work. It never reached ful commercial production, but it was used extensively in Appalachia. It's not as sturdy as power armor designed for combat, but it beats armor made out of molerat hides by more than a country mile."

#TRN Trog Country#
TRN_feral_ghoul_equipment_1:0 "Trog"
TRN_feral_ghoul_equipment_1_short:0 "Trog"
TRN_feral_ghoul_equipment_1_desc:0 "A trog is a person that has reached the final stage of infection with the Troglodyte Degeneration Contagion. The condition has transformed them into a feral animal that stalks on all fours through the ruins of The Pitt, seeking to devour any non-trog life they may find."
TRN_feral_ghoul_equipment_2:0 "Trog Brute"
TRN_feral_ghoul_equipment_2_short:0 "Trog Brutes"
TRN_feral_ghoul_equipment_2_desc:0 "If a trog lives long enough they will grow stronger, faster, and more deadly. These brutes tend to lead smaller packs of newly transformed trogs."
TRN_feral_ghoul_equipment_armored:0 "Trog Devourer"
TRN_feral_ghoul_equipment_armored_short:0 "Trog Devourer"
TRN_feral_ghoul_equipment_armored_desc:0 "These trogs have lived some time and have adapted to The Pitt. Their skin has hardened and also taken on an ashen color to better blend in to the urban enviroment."
TRN_feral_ghoul_equipment_glowing:0 "Glowing Trog"
TRN_feral_ghoul_equipment_glowing_short:0 "Glowing Trog"
TRN_feral_ghoul_equipment_glowing_desc:0 "A trog that spends too much time in a radioactive area will begin to glow."
