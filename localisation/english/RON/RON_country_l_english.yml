  RON_washington_name:0 "В.А.Ш.И.Н.Г.Т.О.Н."
  ron_washington_desc:0 "До війни В.А.Ш.И.Н.Г.Т.О.Н. був створений як суперкомп'ютер зі штучним інтелектом членами канадського спротиву — почасти як жарт, почасти для координації дій проти окупантів. Протягом століть після війни його колись розлогі наукові та військові бази даних деградували, і залишилася лише особистість."
