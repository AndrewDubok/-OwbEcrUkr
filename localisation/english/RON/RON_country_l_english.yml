  RON_establish_windsor_wreckers:0 "Заснувати команду §C«Віндзорські руйнівники»§!"
  RON_establish_windsor_wreckers_desc:0 "Принизлива поразка явно залишила у колишніх «Руйнівників» бажання реваншу. Що поганого в тому, щоб дати їм власну команду?"
  ron_wreckers_tt:0 "Це створить дивізію §B«Віндзорських руйнівників»§!, які ганяють по хокейному полю на своїх машинах. Це взагалі законно?"
  RON_expand_windsor_wreckers:0 "Розширити §B«Віндзорських руйнівників»§!"
  RON_establish_bay_bastards:0 "Заснувати команду §L«Виродки Затоки»§!"
  RON_establish_bay_bastards_desc:0 "Як ви думаєте, чому вони добровільно так себе назвали?"
  ron_bastards_tt:0 "Це створить дивізію §L«Виродків Затоки»§!, найшвидших стрільців півночі та фанатів дотримання правил."
  RON_expand_bay_bastards:0 "Розширити §L«Виродків Затоки»§!"
  RON_establish_mimico_mounties:0 "Заснувати §R«Кінну поліцію Міміко»§!"
  RON_establish_mimico_mounties_desc:0 "Якимось чином ці люди роздобули коней у постапокаліпсисі. Важко звинувачувати їх у бажанні на них їздити!"
  ron_mounties_tt:0 "Це створить дивізію §R«Кінної поліції Міміко§!, найкращих вершників Онтаріо."
  RON_expand_mimico_mounties:0 "Розширити §R«Кінну поліцію Міміко»§!"
  RON_establish_buffalo_brainbots:0 "Заснувати §C«Мозкоботів Баффало»§!"
  RON_establish_buffalo_brainbots_desc:0 "У Баффало повно робомозків, що безцільно блукають навколо. Хоча вони не зовсім створені для хокею, вони точно зможуть координувати наші команди!"
  ron_brainbots_tt:0 "Це створить дивізію §C«Мозкоботів Баффало»§!, що координують свою команду як... ну, як машина."
  RON_expand_buffalo_brainbots:0 "Розширити §C«Мозкоботів Баффало»§!"
  RON_establish_capital_crashers:0 "Заснувати §3«Столичних трощитілів»§!"
  RON_establish_capital_crashers_desc:0 "Столична Пустка повна людей, яким вдалося роздобути силову броню. І хоча члени Братства чи Анклаву не горять бажанням грати в хокей, повно сміливців, які вбили їх і вкрали їхню броню раніше."
  ron_crashers_tt:0 "Це створить дивізію §3«Столичних трощитілів»§!, здатних розносити суперників своєю силовою бронею."
  RON_expand_capital_crashers:0 "Розширити §3«Столичних трощитілів»§!"
  RON_sudden_death_overtime:0 "Раптова смерть в овертаймі"

