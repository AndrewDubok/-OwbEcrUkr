l_english: 

  RON_two_hundred_years_of_resistance:0 "Двісті років спротиву"
  RON_two_hundred_years_of_resistance_desc:0 "Патріоти Онтаріо століттями виборювали свою свободу. Ми завжди знали, що зрештою переможемо."

  RON_post_war_stooges:0 "Післявоєнні маріонетки"
  RON_post_war_stooges_desc:0 "Після краху всього, що ми знали, з'явився вже знайомий нам ворог, щоб продовжити наше гноблення."

  RON_hate_the_player:0 "Ненавидь гравця"
  RON_hate_the_player_desc:0 "Хоча нам вдалося перемогти Анклав Онтаріо, з того часу життя не було легким. Дехто сприймає хокейне суперництво надто близько до серця..."

  RON_washington_bullets:0 "Вашингтонські кулі"
  RON_washington_bullets_desc:0 "В.А.Ш.И.Н.Г.Т.О.Н. усе ще зберігає деякі довоєнні бази даних, особливо щодо утримання та захисту військових об'єктів. Ці знання дуже допоможуть нам у модернізації цих споруд."

  RON_bring_in_substitutes:0 "Викликати запасних"
  RON_bring_in_substitutes_desc:0 "Запасні зазвичай сидять на лаві, але зараз нам потрібен кожен, хто здатний тримати зброю."

  RON_glorious_and_free:0 "Славна і вільна"
  RON_glorious_and_free_desc:0 "Наша горда канадська республіка не визнає над собою господарів. Ми будемо битися за наше право на свободу!"

  RON_revolutionary_munitions:0 "Революційні боєприпаси"
  RON_revolutionary_munitions_desc:0 "Старі довоєнні схованки спротиву часто ставали цілями для урядових рейдів, якщо їх знаходили. Конфісковану зброю зберігали в невідомому місці, але доклавши трохи зусиль, В.А.Ш.И.Н.Г.Т.О.Н. зможе її знайти."

  RON_blood_money_men:0 "Найманці за криваві гроші"
  RON_blood_money_men_desc:0 "Зброї та кришок достатньо для деяких мешканців пустки. Хоча вони можуть бути неприємними типами, вони точно знають, як вбивати. В.А.Ш.И.Н.Г.Т.О.Н. знайде необхідні кришки."
  ron_blood_money_tt:0 "Створює §G1§! дивізію §YСпецпризначенців§!"

  RON_stand_on_guard_for_thee:0 "На варті заради Тебе"
  RON_stand_on_guard_for_thee_desc:0 "Дехто може назвати це пропагандою, але надихаючи наш народ промовами, прапорами та листівками, ми зможемо назавжди підтримувати революційний запал. В.А.Ш.И.Н.Г.Т.О.Н. точно знає, як цього досягти."

  RON_red_white_and_blue_blooded_canadians:0 "Червоно-біло-синьокровні канадці"
  RON_red_white_and_blue_blooded_canadians_desc:0 "О, Канадо! Наш дім і рідна земля! Справжня патріотична любов панує в наших серцях. З палаючими серцями ми бачимо твій схід, Справжня Півноче, сильна та вільна!"

  RON_rally_the_hockey_teams:0 "Згуртувати хокейні команди"
  RON_rally_the_hockey_teams_desc:0 "Хокейні команди також є найсильнішими групами бойовиків у нашому суспільстві. Формалізувавши ці команди та включивши їх у нашу структуру командування, ми допоможемо їм захищати нашу чудову країну."

  RON_oldtown_oafs_team:0 "Бовдури Олдтауна"
  RON_oldtown_oafs_team_desc:0 "«Бовдури Олдтауна» базуються в районі Олдтаун у Ронто. Вони, можливо, не найгостріші ножі в шухляді, але вони носять важке спорядження і є грізними суперниками."
  ron_oldtown_oafs_tt:0 "Це створить дивізію §7Бовдурів Олдтауна§!, міцних силовиків та одну з найсильніших ліній захисту."

  RON_north_ronto_nightkin:0 "Нічні кінти Північного Ронто"
  RON_north_ronto_nightkin_desc:0 "Ця команда походить із Північного Ронто, і їхня назва лише трохи вводить в оману. Це команда гулів, деякі з яких навіть пам'ятають хокей до війни. Більшість із них кажуть, що зараз хокей став ще веселішим."
  ron_nightkin_tt:0 "Це створить дивізію §1Нічних кінтів Північного Ронто§!, загартованих гулів та найдосвідченіших гравців у Ронто."

  RON_crescent_cazadores:0 "Касадори Полумісяця"
  RON_crescent_cazadores_desc:0 "«Касадори Полумісяця» вважають своїм домом район Ронто-Кресент. Як і їхні тезки-комахи, вони швидкі та боляче жалять. Краще не ставати у них на шляху — вони вдарять вас ще до того, як ви їх помітите."
  ron_cazadores_tt:0 "Це створить дивізію §1Касадорів Полумісяця§!, небезпечних ковзанярів, швидших за будь-кого на полі."

  RON_encourage_hockey_games:0 "Підтримка хокейних команд"
  RON_encourage_hockey_games_desc:0 "Хоча команди здебільшого забезпечують себе самі, державне фінансування спорту дозволить їм розширюватися та купувати нове спорядження, що зрештою піде на користь і нам."

  RON_rebuild_official_stadium:0 "Відбудувати офіційний стадіон"
  RON_rebuild_official_stadium_desc:0 "Ми вже досить набалувалися на руїнах, час облаштувати все як слід."

  RON_scout_for_new_talent:0 "Пошук нових талантів"
  RON_scout_for_new_talent_desc:0 "Навіть якщо вони не грають у хокей, на пустці повно людей, які дуже вміло б’ють по речах і швидко бігають."

  RON_referee_authority:0 "Створити Комітет Арбітрів"
  RON_referee_authority_desc:0 "Якими б жорстокими та небезпечними не були хокейні матчі, підготовка належних суддів полегшить проведення ігор."
  ron_hockey_games_stab_buff_tt:0 "Рішення §Y«Провести хокейний матч»§! даватиме додатково §Y1%§! стабільності.\n\n"
  ron_unlock_dan_tt:0 "§Y$RON_dan_mccaw_name$§! стає командиром підрозділу.\n§LРівень§!: §Y3§!\n§RАтака§!: §Y3§!\n§GОборона§!: §Y1§!\n§PПланування§!: §Y2§!\n§MЛогістика§!: §Y3§!\n§gРиси§!: §tСпритний§!, §tІнтелектуал§!, §tБезшабашний§!\n\n"

  RON_drum_up_enthusiasm:0 "Підігріти ентузіазм"
  RON_drum_up_enthusiasm_desc:0 "Ми маємо розіслати запрошення іншим однодумцям взяти участь у наших хокейних іграх! Навіть якщо вони не захочуть грати, ми зможемо зібрати глядачів з усієї Пустки."
  ron_hockey_games_war_support_buff_tt:0 "Рішення §Y«Провести хокейний матч»§! даватиме додатково §Y1%§! підтримки війни.\n\n"

  RON_american_transfers:0 "Американські трансфери"
  RON_american_transfers_desc:0 "Якими б чудовими не були наші місцеві гравці, їх не так багато. Шукаючи таланти на американських пустках на півдні, ми зможемо значно розширити наші команди."

  RON_canadian_recruitment:0 "Канадський призов"
  RON_canadian_recruitment_desc:0 "У Канаді повно майбутніх хокеїстів, навіть якщо вони про це ще не знають."

  RON_codify_rules:0 "Кодифікувати правила"
  RON_codify_rules_desc:0 "Зі створенням Комітету Арбітрів з’являється все більше закликів формалізувати правила хокею. Таким чином ми забезпечимо безпечніший спорт, цікавий для всієї родини."

  RON_sport_for_the_wasteland:0 "Спорт для Пустки"
  RON_sport_for_the_wasteland_desc:0 "Насильство та брутальність хокею є невід'ємним елементом його привабливості. Заохочуючи ці аспекти, ми створимо спорт, який буде небезпечним, але захопливим."

  RON_best_and_brightest:0 "Найкращі та найздібніші"
  RON_best_and_brightest_desc:0 "Хокеїстів потрібно оцінювати за якістю, а не за кількістю."

  RON_expand_the_teams:0 "Розширити команди"
  RON_expand_the_teams_desc:0 "Хокейна команда має бути достатньо великою, щоб серйозно залякати суперників. У команді має бути більше ніж 5-10 гравців. Ви можете собі таке уявити?"

  RON_crowd_goes_wild:0 "Натовп шаленіє!"
  RON_crowd_goes_wild_desc:0 "Хоча пересічний громадянин Рonto готовий дивитися хокей, стоячи на трупі, щоб бачити бійку в натовпі, для більшості мешканців Пустки це не так привабливо. Справжній стадіон із розвиненою інфраструктурою справді залучить маси."
  ron_stadium_decisions_tt:0 "Відкриває §Yрішення§! щодо вдосконалення нашого стадіону."

  RON_expand_our_reach:0 "Розширити наш вплив"
  RON_expand_our_reach_desc:0 "Попри те, що хокей вижив у Ронто, люди з усієї Пустки хочуть долучитися! Принаймні, з усього Онтаріо."
  ron_unlock_more_teams_tt:0 "Відкриває §Yрішення§! щодо створення та розширення нових хокейних команд."

  RON_the_greatest_game_the_wastes_have_ever_seen:0 "Найвеличніша гра, яку бачила Пустка"
  RON_the_greatest_game_the_wastes_have_ever_seen_desc:0 "Немає нічого кращого за хокей, і ніхто не грає в нього так, як Ронто."
  ron_more_hockey_decisions_tt:0 "Відкриває §Yрішення§! щодо створення ще більшої кількості команд, а також проведення §Yвеликих ігор§! з кращими бонусами."

  RON_city_upon_a_hill:0 "Місто на пагорбі"
  RON_city_upon_a_hill_desc:0 "Ронто стане сяючим містом на пагорбі. Місто приймає Пустку з розкритими обіймами та процвітає."

  RON_ronto_arms:0 "Зброя Ронто"
  RON_ronto_arms_desc:0 "Виробництво більшої кількості зброї буде життєво важливим для безпеки Ронто."

  RON_new_workshops:0 "Нові майстерні"
  RON_new_workshops_desc:0 "Справжньому сяючому місту потрібна промисловість і квітуча економіка."

  RON_booze_for_the_boys:0 "Випивка для хлопців (і роботів)"
  RON_booze_for_the_boys_desc:0 "У Ронто були десятки довоєнних пивоварень, розкиданих по всій території міста. Час їх запустити — це гарантовано підніме бойовий дух."

  RON_uncover_resistance_caches:0 "Знайти схованки спротив"
  RON_uncover_resistance_caches_desc:0 "До початку війни члени спротив по всьому місту ховали зброю та спорядження, зазвичай викрадене в американських окупантів. Ретельний пошук їхніх міток принесе нам купу нового спорядження."

  RON_give_me_your_tired_your_poor:0 "Прийміть знедолених ваших"
  RON_give_me_your_tired_your_poor_desc:0 "Ронто — це безпечна гавань півночі в країні льоду, рейдерів та жаху. Ми приймаємо людей, що тікають із Пустки, з розкритими обіймами."

  RON_niagara_power:0 "Енергія Ніагари"
  RON_niagara_power_desc:0 "Сполучені Штати мали грандіозні плани щодо використання енергії Ніагари, але вони не були повністю втілені до війни. Тільки В.А.Ш.И.Н.Г.Т.О.Н. має повний доступ до креслень. Ми використаємо її краще, ніж вони могли мріяти."

  RON_ronto_tea_party:0 "Чаювання в Ронто"
  RON_ronto_tea_party_desc:0 "У В.А.Ш.И.Н.Г.Т.О.Н.а є до нас дивне прохання..."

  RON_great_lakes_smugglers:0 "Контрабандисти Великих Озер"
  RON_great_lakes_smugglers_desc:0 "Не всім подобається працювати з контрабандистами, але якщо ми офіційно «ліцензуємо» їх, ми зможемо зменшити кількість проблем, які вони створюють, одночасно розширюючи наш ринок експорту."

  RON_ronto_living_city:0 "Ронто — живе місто"
  RON_ronto_living_city_desc:0 "Ронто — це не просто потужний центр торгівлі та сили, це живий мегаполіс. Ронто — це люди, які торгують на вулицях і рятуються від нападів рейдерів та монстрів."

  RON_ronto_centre_of_industry:0 "Ронто — центр промисловості"
  RON_ronto_centre_of_industry_desc:0 "Ронто — центр нової промислової революції. Фабрики розбудовуються, а жар кузень зігріває нас у холодні часи Онтаріо."

  RON_the_lakers:0 "Лейкери"
  RON_the_lakers_desc:0 "Жителі озер почали називати себе Лейкерами. Їхній досвід у мореплавстві неоціненний для Ронто."

  RON_ronto_heart_of_ontario:0 "Ронто — серце Онтаріо"
  RON_ronto_heart_of_ontario_desc:0 "Ронто — серце Онтаріо, що б’ється. Люди тут не просто виживають, а процвітають. Ронто — це найкраще, що може запропонувати Онтаріо."

  RON_lake_trade:0 "Озерна торгівля"
  RON_lake_trade_desc:0 "Великі озера надають безцінні торгові можливості (коли вони не замерзли). Наші товари можна доставляти вздовж усіх берегів, що зміцнює нашу економіку."

  RON_the_skys_the_limit:0 "Небо — не межа"
  RON_the_skys_the_limit_desc:0 "Для Ронто немає нічого недосяжного. Колись у небі панували гігантські пасажирські літаки та вертиберди, незабаром вони стануть владою В.А.Ш.И.Н.Г.Т.О.Н.а."

  RON_theyre_back:0 "Вони повернулися"
  RON_theyre_back_desc:0 "Що за чортівня? Хіба ми не перебили їх усіх 30 років тому?"

  RON_hold_the_line:0 "Тримати стрій"
  RON_hold_the_line_desc:0 "Наші сили безперечно перевершують сили Анклаву Онтаріо, але нам потрібно просто втримати позиції, перш ніж ми зможемо підготувати контрудар."

  RON_antiarmour_tactics:0 "Протитанкова тактика"
  RON_antiarmour_tactics_desc:0 "Минуло чимало часу з нашої останньої битви з Анклавом, але у нас все ще десь приховано протитанкове спорядження."

  RON_twice_bitten:0 "Вдруге не впіймаєшся"
  RON_twice_bitten_desc:0 "У Ронто є старе прислів'я — я чув його в Баффало, мабуть, і в Ронто є — яке каже вкуси мене раз — ганьба тобі. Вкуси мене... вдруге вже не вийде."
  ron_twice_bitten_tt:0 "Створює §G3§! дивізії §YОполчення§!, готових протистояти американській тиранії."

  RON_im_so_bored_of_the_usa:0 "Мені так набридли ці США"
  RON_im_so_bored_of_the_usa_desc:0 "Ми готові. Анклаву залишилося недовго, їхня дурість стане їхнім кінцем."

  RON_true_north_strong_and_free:0 "Справжня Північ, сильна та вільна"
  RON_true_north_strong_and_free_desc:0 "Настав час покінчити з цим, тепер уже назавжди."

  RON_ontario_free_forevermore:0 "Онтаріо вільне навіки"
  RON_ontario_free_forevermore_desc:0 "Мерзенна загроза американської окупації ліквідована, а Анклав вигнано без права на вороття. Зрештою, навряд чи навколо є інші групи Анклаву, чи не так?"

  RON_play_the_greatest_game:0 "Зіграти в найвеличнішу гру"
  RON_play_the_greatest_game_desc:0 "Ці Хозери самі на це напрошувалися."

  RON_hose_them_down:0 "Охолодити їх"
  RON_hose_them_down_desc:0 "Ці чортові Хозери зібрали чимало послідовників, але більшість їхніх фанатів — колишні громадяни Ронто. Інтегрувати їх назад у функціонуюче суспільство буде зовсім не складно. Сподіваємося."

  RON_domo_arigato:0 "Домо арігато..."
  RON_domo_arigato_desc:0 "Що тепер чекає на В.А.Ш.И.Н.Г.Т.О.Н?"
  
