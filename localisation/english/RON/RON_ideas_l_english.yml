  ron_best_and_brightest_idea:0 "The Best and Brightest"
  ron_best_and_brightest_idea_desc:0 "Only the best should play ice hockey. It's far more entertaining to watch two small, highly skilled teams attempted to brain each other rather than a mob of confused and muddled idiots."

  ron_expanded_teams:0 "Expanded Teams"
  ron_expanded_teams_desc:0 "When it comes to a bloodsport, the more people the more blood, and the more blood the better!"

  ron_refugee_influx:0 "Refugee Influx"
  ron_refugee_influx_desc:0 ""

  ron_shining_city:0 "Ronto, the Shining City"
  ron_shining_city_desc:0 "The beacon of Ontario, Ronto stands vigil against the cold of the north."

  ron_ontarios_beating_heart:0 "Ontario's Beating Heart"
  ron_ontarios_beating_heart_desc:0 "Ronto is the greatest city of Ontario, and represents the greatest that post-war Canada can offer. Our city is the mightiest in the wasteland."

