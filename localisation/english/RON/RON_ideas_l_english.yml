  RON_on_the_back_foot_desc:0 "Wait a minute! Weren't you DEAD?"

  ron_the_defense:0 "The Defence"
  ron_the_defense_desc:0 "Not one step back. Ronto will not fall."

  ron_the_offense:0 "The Offence"
  ron_the_offense_desc:0 "Time to make sure the American occupation is dead and buried, forever."

