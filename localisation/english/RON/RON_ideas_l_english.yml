l_english: 
  ron_misunderstood_sport:0 "Misunderstood Sport"
  ron_misunderstood_sport_desc:0 "The people of post-war Toronto have managed to preserve a key element of Canadian culture, through the American occupation and the decades since the Great War. The sport is practically worshipped now, as a symbol of Canadian resistance, but over the centuries the sport has become distorted, changed from its original form. Scavengers search for what they can find of the pre-war sport and the drive to unravel the truth drives the country, but with so much energy poured into ice hockey how much can they save for war?"

  ron_codified_sport:0 "Codified Sport"
  ron_codified_sport_desc:0 "It turns out that the post-war hockey we played was not very much like pre-war hockey at all. While it's still plenty of fun, the way they used to do it probably resulted in less miscellaneous injuries. By formalising a proper set of rules, we can make things safer and stop players from making up new rules as they play."

  ron_wasteland_sport:0 "Wasteland Sport"
  ron_wasteland_sport_desc:0 "Ice hockey was never about rules or goals. It was about the feel of the ice under your feet, the roar of the cheering crowd, and the sound of your opponent's face being smashed in by your power fist. This is the sport that makes Ronto great."

  ron_valiant_freedom:0 "Valiant Freedom"
  ron_valiant_freedom_desc:0 "Like the American and Canadian heroes of old, we will fight for our land against oppressive foreign governments!"

  ron_valiant_freedom2:0 "Valiant Freedom"
  ron_valiant_freedom2_desc:0 "Like the American and Canadian heroes of old, we will fight for our land against oppressive foreign governments!"

