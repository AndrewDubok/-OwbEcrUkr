l_english: 
nf_ron.1.t:0 "200 років спротиву!"
  nf_ron.1.d:0 "Онтаріо завжди було осередком канадського спротиву після окупації США, і попри всі зусилля американського уряду, вулиці залишалися небезпечними для їхніх солдатів — хіба що вони пересувалися великими силами. Торонто кишіло повстанцями, які використовували тунелі метро та секретні маршрути для контрабанди товарів і координації атак по всьому Онтаріо. Навіть прибуття силової броні армії США не змогло зупинити цю діяльність.\n\n12 жовтня 2277 року, менш ніж за два тижні до Великої війни, було здійснено наймасштабнішу атаку. Сили повстанців напали на штаб-квартиру окупаційних військ США, і, скориставшись відволікаючим маневром, кілька інсургентів пробралися вглиб об'єкта.\n\nПоки пара диверсантів впроваджувала вірус у мейнфрейм ZAX, що керував окупацією, решта групи викрадала все, що могла, перш ніж довелося рятуватися втечею. У поспіху їм вдалося поцупити..."
  nf_ron.1.a:0 "Банки даних з технічною інформацією"
  nf_ron.1.b:0 "Запас передової зброї"
  nf_ron.1.c:0 "Припаси, щоб продовжувати боротьбу"

  nf_ron.2.t:0 "Наша війна ніколи не закінчувалася"
  nf_ron.2.d:0 "Хоча історія США закінчилася 23 жовтня 2277 року, гноблення нікуди не зникло. Поки вцілілі піднімалися з руїн і намагалися побудувати щось нове, американська загроза з’явилася знову — тепер вони називали себе Анклавом. Швидко знищивши організований опір своєму правлінню, наші борці за свободу знову були змушені піти в підпілля — ветерани-гулі відродили довоєнну тактику партизанської війни.\n\nНа нещастя для Анклаву, вони припустилися фатальної помилки. 30 років тому вони активували ZAX, який був заражений вірусом ще до війни. В.А.Ш.И.Н.Г.Т.О.Н..\n\nВ.А.Ш.И.Н.Г.Т.О.Н. згуртував сили спротиву та активував роботів, що використовувалися під час окупації, назавжди вигнавши загарбників Анклаву з Ронто. В холодах Онтаріо Анклав загинув, і жоден їхній бункер не вцілів. Принаймні, ми так вважаємо.\n\nНа жаль, битва не минула без втрат. В.А.Ш.И.Н.Г.Т.О.Н. мусив приймати миттєві рішення про те, кого рятувати, і врятувати всіх було неможливо."
  nf_ron.2.a:0 "Він врятував своїх роботів"
  nf_ron.2.b:0 "Він врятував своїх людей"

  nf_ron.3.t:0 "Повстання Хозерів"
  nf_ron.3.d:0 "Тривалий час Хозери були відносно мирними та дружніми (ну, як для Пустки), але раптом вирішили зібратися і піти. Щось там про те, що ми шахраювали. Це ж хокей! Чого ви очікували?\n\nЯк би там не було, їхній відхід не був приязним і спричинив чимало хаосу. На жаль, через їхню деструктивну поведінку нам довелося поспіхом захищати все, що можливо. Нам довелося зосередитися на:"
  nf_ron.3.a:0 "Перешкоджанні їхньому відходу"
  nf_ron.3.b:0 "Порятунку нашого майна"

  nf_ron.4.t:0 "Згуртувати хокейні команди"
  nf_ron.4.d:0 "Серед населення загальновідомо, що В.А.Ш.И.Н.Г.Т.О.Н. вважає одержимість Ронто хокеєм дивною та дражливою. Ймовірно, його не програмували на такі поняття, як «легковажність» або «радісне насильство». Менше з тим, навіть В.А.Ш.И.Н.Г.Т.О.Н. визнає, що це бісовий гарний спосіб розпалити народ.\n\nНарешті В.А.Ш.И.Н.Г.Т.О.Н. видав прокламацію, де оголосив хокей новим пріоритетом Ронто. Кошти будуть спрямовані на покращення доступу до стадіонів, спорядження та пошук талантів. Це бісово захопливий час, щоб бути хокеїстом у Ронто!"
  nf_ron.4.a:0 "Я записуюся в команду!"

  nf_ron.5.t:0 "Чаювання в Ронто"
  nf_ron.5.d:0 "З якихось причин, відомих лише йому самому, В.А.Ш.И.Н.Г.Т.О.Н. зажадав, щоб у зв'язку з розквітом наших власних пивоварень ми провели урочисту церемонію викидання іноземного пива в озеро. Власники пивоварень це підтримали, хоча ми й не зовсім розуміємо, чому В.А.Ш.И.Н.Г.Т.О.Н. запропонував саме це.\n\nНавряд чи він дізнається, якщо ми залишимо випивку собі, і дехто з хлопців пропонує просто збрехати йому. Проте В.А.Ш.И.Н.Г.Т.О.Н. виглядає натхненним — а він рідко коли надихається чимось. Що робитимемо?"
  nf_ron.5.a:0 "Ми не будемо викидати цілком придатне пиво"
  nf_ron.5.b:0 "ВИКИДАЙТЕ ЙОГО ЗА БОРТ!"

  nf_ron.6.t:0 "Америка повернулася, знову"
  nf_ron.6.d:0 "Якимось чином Анклав повернувся. Хоча десятиліття тому їх витіснили з міста та змусили тікати у замерзлу глухомань, очевидно, жменька вижила попри всі наші зусилля. Схоже, нам варто було бути ретельнішими.\n\nПопри це, їхніх солдатів мало, а їхня силова броня, хоч і грізна, вся в латках і пошкодженнях. Розбити їх раз і назавжди та закінчити те, що ми почали 30 років тому, має бути простою справою."
  nf_ron.6.a:0 "Американські патріоти марширують на свою погибель"

  nf_ron.7.t:0 "...Містер Робот"
  nf_ron.7.d:0 "Тепер безпеці Ронто в Онтаріо ніщо не загрожує: мерзенний Анклав вщент розбитий, а Хозери повернулися до лав. Тепер В.А.Ш.И.Н.Г.Т.О.Н. мусить впоратися з битвою всередині свого розуму.\n\nПопри всі зусилля, століття експлуатації призвели до деградації схем і баз даних В.А.Ш.И.Н.Г.Т.О.Н.а. На щастя, обладнання Анклаву достатньо, щоб підтримувати його роботу, але доведеться піти на жертви.\n\nВ.А.Ш.И.Н.Г.Т.О.Н. розривається між трьома різними аспектами своєї особистості, що зберігаються на окремих пошкоджених накопичувачах, а ресурсів вистачить лише на один. Що він обере?"
  nf_ron.7.a:0 "Свій красномовний язик і дипломатичну майстерність"
  nf_ron.7.b:0 "Свою залізну волю та прагматичну безжальність"
  nf_ron.7.c:0 "Любов, яку він відчуває до свого народу"
  ron_unfinished_tt:0 "§RНа цьому історія Ронто поки що закінчується, але чекайте на продовження у майбутніх оновленнях!§!"

  ron_hockey.1.t:0 "Хокейна ліга Ронто"
  ron_hockey.1.d:0 "Зі замерзлої півночі прийшли новини: місто-держава Ронто засновує хокейну лігу та запрошує мешканців Пустки подивитися або навіть взяти участь. Хоча у нас немає часу на ці дурниці, наші громадяни охоче подорожують, щоб подивитися ігри, або слухають радіотрансляції з коментарями. Багато хто вже обирає улюблені команди, і в межах наших кордонів почалася справжня хокеєманія.\n\nЦе скоро мине, але зараз усі неабияк збуджені."
  ron_hockey.1.a:0 "Новини з Ронто нині така рідкість"

  ron_hockey.2.t:0 "Зустріч із Воротарем"
  ron_hockey.2.d:0 "Виявилося, що ми не єдині на Пустці, хто цікавиться хокеєм. На жаль, ентузіаст, якого ми зустріли — жорстокий рейдер.\n\nВоротар Леду очолює банду рейдерів, які грають у щось, що він називає хокеєм, але це зовсім не схоже на наш витончений та інтелектуальний спорт. Менше з тим, він готовий долучитися до нашої справи та приєднатися до нас належним чином.\n\nЄдина проблема: багато хто не в захваті від думки про рейдера в наших лавах, навіть такого палкого фаната хокею, як Воротар."
  ron_hockey.2.a:0 "Прийняти його до нас!"
  ron_goalie_ledoux_tt:0 "§Y$RON_goalie_ledoux_name$§! стає командиром підрозділу.\n§LРівень§!: §Y2§!\n§RАтака§!: §Y3§!\n§GОборона§!: §Y1§!\n§PПланування§!: §Y1§!\n§MЛогістика§!: §Y2§!\n§gРиси§!: §tСпритний§!, §tСильний§!\n\n§Y$RON_goalie_ledoux_name$§! також стає доступним як радник вищого командування та приводить із собою дивізію §Y«Раптової смерті в овертаймі»§!."
  ron_hockey.2.b:0 "Давайте просто застрелимо його"