l_english:
DCM_vault_87_mutants.1.t:0 "Збільшення армії мутантів"
DCM_vault_87_mutants.1.d:0 "Шепард був схожий на інших мутантів у Сховищі 87. Він виходив, вбивав людей і повертав деяких, щоб створювати нових мутантів. Як і інші мутанти у сховищі, він бачив, що зеленої речовини стає менше. Жоден мутант не знайшов нової зеленої речовини, а зелена речовина - це те, з чого створюються мутанти. У Шепарда виникла ідея зателефонувати мутантам у Вашингтоні та попросити допомогти знайти більше зеленої речовини. Він наказав мутантам у Вашингтоні 87 піти до Вашингтона з повідомленням."
DCM_vault_87_mutants.1.a:0 "Принесіть речі"
DCM_vault_87_mutants.1.b:0 "Принесіть зброю"
DCM_vault_87_mutants.1.c:0 "Привести їх сюди негайно"
DCM_vault_87_mutants.2.t:0 "Доля Фокса"
DCM_vault_87_mutants.2.d:0 "Фокса посадили до камери, бо він запитав, чому ми перетворюємо людей на супермутантів. Справжній мутант повинен просто знати, що саме це ми робимо. Але він розумний. Ми могли б змусити його робити те, на що ми не такі розумні. Можливо, він зможе допомогти знайти зелень у комп'ютері."
DCM_vault_87_mutants.2.a:0 "Він все виправить"
DCM_vault_87_mutants.2.b:0 "Він читатиме книги, щоб знайти щось нове"
DCM_vault_87_mutants.3.t:0 "Що таке ГЕКК"
DCM_vault_87_mutants.3.d:0 "Тут була якась штука під назвою ГЕКК. Фоукс багато про неї говорить, але вона не виробляє екологічно чистих речовин. Ми просто викинемо її надвір. Кімнату можна використовувати для інших речей."
DCM_vault_87_mutants.3.a:0 "Вимкніть світло, щоб увімкнути інше світло"
DCM_vault_87_mutants.3.b:0 "Розберіть машини в кімнаті"
DCM_vault_87_mutants.3.c:0 "Використайте кімнату, щоб зробити зброю"
DCM_vault_87_mutants.4.t:0 "Експедиція в Такома-парк"
DCM_vault_87_mutants.4.d:0 "Ми відправили мутантів до Та Ко Ма, щоб знайти зелень. Вони не знайшли зелені. Але вони знайшли інших мутантів. Ці мутанти допоможуть нам знайти зелень."
DCM_vault_87_mutants.4.a:0 "Ласкаво просимо до команди"
DCM_vault_87_mutants.5.t:0 "Підземний світ"
DCM_vault_87_mutants.5.d:0 "Гулів не можна перетворити на мутантів. Ми пробували, але це не спрацювало. Вони також несмачні. Вони слабкі, але деякі розумні. Чи можуть вони нам допомогти?"
DCM_vault_87_mutants.5.a:0 "Гулі допоможуть."
DCM_vault_87_mutants.5.b:0 "Гулі стануть рабами"
DCM_vault_87_mutants.6.t:0 "Фабрика «Ядер-Коли»"
DCM_vault_87_mutants.6.d:0 "На фабриці Коли є сяюча блакитна річка. Вона не має смаку води, і там є деякі машини. Фоукс каже, що машини можна змусити робити й інші речі."
DCM_vault_87_mutants.6.a:0 "Зробіть більше речей"
DCM_vault_87_mutants.6.b:0 "Зробіть більше зброї"
DCM_vault_87_mutants.7.t:0 "Інші мутанти?"
DCM_vault_87_mutants_7.d:0 "Ми чули по радіо інших мутантів. У них теж велика армія. Вони перетворюють людей на мутантів за допомогою зелені. Ми телефонуємо їм, і вони кажуть, що якщо ми підемо за їхнім лідером, то зможемо отримати зелень. Чи варто нам йти за ним? Чи варто взяти?"
DCM_vault_87_mutants_7.a:0 "Я не знаю"
