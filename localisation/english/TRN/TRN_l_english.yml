###Country Flag###
TRN_slave_council_flag:0 "Freed slaves have been given a place on our tribal council"

###Characters###
TRN_tom_stalowe_NAME:0 "Tom Stalowe"
TRN_tom_stalowe_desc:0 "In the ruins beyond the walls of Ashur's domain are a wild land infested with trogs and wildmen who's minds have descended to madness. Few who venture beyond the fences ever return, but some that do have spoken of strange things. Rumors say there are people that live among the trogs and wildmen, making a life in an old stronghold no-one can reach... could the rumors be true?"
TRN_big_trog_name:0 "Alpha Trog"
TRN_ashley_borsan_name:0 "Ash Borsan"
TRN_shane_hayette_NAME:0 "Shane Hayette"

###Events###
TRN_nf_events.1.title:0 "The Trogs"
TRN_nf_events.1.desc:0 "Outside of the slaver fences, The Pitt belongs to no man. Instead, it is overrun by Trogs. These horrific mutants are created by a unique mixture of radiation and industrial polution in The Pitt. They prowl through the streets, sewers, and old buildings devouring anyone and anything they find. Trogs have been here for centuries, and will be here centuries after."
TRN_nf_events.1.a:0 "Who could live out there?"
TRN_nf_events.2.title:0 "From Parts Unknown"
TRN_nf_events.2.desc:0 "One day a tribal came to The Pitt from out west. They say he was one of the last descendents of survivors from a long dead tribe, a tribe that could commune with the beasts of The Wasteland. This ability of his forefathers could be why the Trogs didn't rip him to shreds as he walked into The Pitt. Eventually he found his way to a massive stadium in the heart of the ruins, a place untouched by men in over a hundred years. There he would found a new tribe, with one thing in mind."
TRN_nf_events.2.a:0 "Making a better future"
TRN_nf_events.2.b:0 "Preserving wisdom"
TRN_nf_events.3.title:0 "Saving The Spirits"
TRN_nf_events.3.desc:0 "The tribal saw men in the ruins whose spirits were besieged. From a distance he watched them lose their battles and become like the beasts of the ruins. He remembered a ritual of his people that was used to bring back those who were falling to madness. In the night he grabbed one of them as they slept. With the right herbs the wildman went into a deep sleep. When he awoke, his spirit was once again at peace, but his memory of his old life was gone. Tom taught him the ways of his lost people, and after some time they went out to save another. Then the three of them saved another. In a few years, Tom had formed a new tribe with those whose spirits he saved."
TRN_nf_events.3.a:0 "From one to many"
TRN_nf_events.4.title:0 "The Awakening"
TRN_nf_events.4.desc:0 "The sprits of those saved by Tom were recovered, but not unscathed. Those that came back still had remnants of the beastial spirits in them. Even after consuming the sacred herbs and practicing the rituals they could not lose what touched them. The people that lived had developed a connection with the trogs of the ruins and found they could exert some control over them, much like Tom's ancestors with the beasts of the wastes. Tom forbade strengthening these bonds, not wanting to see his people turn to the beast. But, with The Pitt's raiders expanding towards the stadium, Ash has come to Tom with a question."
TRN_nf_events.4.a:0 "Should we not use every tool we have?"
TRN_nf_events.5.title:0 "To Save Or Sacrifice"
TRN_nf_events.5.desc:0 "A new group of wildmen have been seen wandering near the stadium and as the tribe prepares to capture them, Tom can't stop thinking on Ash's words. A growing number of the tribe look to the east with dread. Standing against The Pitt doesn't seem possible, but with more trogs it could be. There is another way this ritual could go. Those afflicted in their spirits could be pushed to the beastial madness rather than saved from it, and as trogs they could fight for us!"
TRN_nf_events.5.a:0 "Save the wildmen"
TRN_nf_events.5.b:0 "Sacrifice the wildmen"
TRN_nf_events.6.title:0 "Destroying Evil"
TRN_nf_events.6.desc:0 "The raiders of The Pitt, who once threatened our tribe and nearly pushed us to darkness, are now fleeing back to to their hideouts in Uptown. The slaves of The Pitt have picked up weapons and are pushing with our warriors into the towering ruins. It is only a matter of time before the last of these vile raiders are driven over the edge of their towers."
TRN_nf_events.6.a:0 "Victory is ours!"
TRN_nf_events.7.title:0 "A Great Feast"
TRN_nf_events.7.desc:0 "The raiders of The Pitt, who once had our tribe cowering in the ruins of The Pitt, are now fleeing for their lives into their hideouts in Uptown. After turning off their lights we have unleashed our trog swarms into the towers. Across The Pitt there are fewer and fewer gunshots, and ever more screams."
TRN_nf_events.7.a:0 "The hunters are hunted"
TRN_nf_events.8.title:0 "The Baby"
TRN_nf_events.8.desc:0 "In the top of Ashur's tower there is one last outsider that still lives, Marie, Ashur's infant child. There is disharmony in the tribe about what to do with the baby. Should we raise it as a member of the tribe? Send it out of The Pitt? Or something else?"
TRN_nf_events.8.a:0 "Raise it"
TRN_nf_events.8.b:0 "Have a freed slave take her outside The Pitt"
TRN_nf_events.8.c:0 "§R(Cannibal) Eat The Baby§!"
TRN_nf_events.9.title:0 "The Land of Yinz"
TRN_nf_events.9.desc:0 "The Pitt has been freed from the evil raiders by our tribe. Some slaves have left for their original homes, but many of them have joined the tribe. We are now a united tribe, but without a name. Digging through the ruins we have found references to the people that lived in this land before, especially those around the stadium. They called themselves Yinzers."
TRN_nf_events.9.a:0 "So we are The Yinzers"
TRN_nf_events.10.title:0 "Our Hunting Grounds"
TRN_nf_events.10.desc:0 "The Pitt has been returned to its original rulers, the Trogs. In our fighting our people have become closer to these creatures. They are as much a part of our tribe as any man or woman. Together we eat, we sleep, and we hunt. Looking at his tribe from atop the stadium, Tom couldn't help but think of the tales his elders told him about the old days of their tribe. They lived in much the same way with the beasts of the wasteland and were unstopable, until the steel men came."
TRN_nf_events.10.a:0 "But they're out west, we'll be fine."
TRN_nf_events.11.title:0 "Relocating Statue"
TRN_nf_events.11.desc:0 "The ruins of Pittsburgh are full of Monuments erected to great heroes of the past. Any one of them would make a great replacement for the horrible thing sitting at the entrance to Haven. However, many of these stautes have decayed with time and we do not know who they are of. There are only 3 statues in good enough condition that we can properly respect those they depict. The first is of a Mr. Rodgers, he was a great neighbor who cared for all those in his tribe and beyond. The second was Willie Stargell, a warrior who was known for hitting his enemies hard with his club. The last is Honus Wagner, another warrior but known for being an agile defender. The statue we choose to place in our home will inspire generations to come."
TRN_nf_events.11.a:0 "Choose Rogers"
TRN_nf_events.11.b:0 "Choose Stargell"
TRN_nf_events.11.c:0 "Choose Wagner"

###Ideas###
TRN_we_be_trogs:0 "Towering Ruins"
TRN_we_be_trogs_desc:0 "Trogs roam the sewers and destroyed buildings of The Pitt. Between the ample cover provided by the ruins and the Trog's fearless bloodthirst, it would take a small miracle or a prolonged nightmare for someone to make their way to our home"
TRN_fight_as_trogs_idea:0 "Fight As Trogs"
TRN_fight_as_trogs_idea_desc:0 "Our people have learned the fighting styles of trogs. Soon we will be just as deadly as they are!"
TRN_trog_traps_idea:0 "Better Trog Traps"
TRN_trog_traps_idea_desc:0 "We have learned a lot of things about trapping trogs. Like did you know traps work better with bait?"
TRN_avoid_observe_idea:0 "Avoid And Observe"
TRN_avoid_observe_idea_desc:0 "Our warriors prefer to fight from a distance and mop up whatever the trogs can't finish eating."
TRN_dig_and_hold_idea:0 "Dig In And Hold"
TRN_dig_and_hold_idea_desc:0 "In the few instances hordes of trogs are held off by our enemies, our warriors fight from improvised forts."
TRN_watching_bridges_idea:0 "Watching Bridges"
TRN_watching_bridges_idea_desc:0 "Our tribe's best warriors keep a keen eye on the horizon. When some new enemy comes to The Pitt, we will be ready."
TRN_hunting_grounds_idea:0 "Hunting Grounds"
TRN_hunting_grounds_idea_desc:0 "The ruins of The Pitt echo with the growls of Trogs and the screams of those unfortunate enough to be caught by us."
TRN_trog_hierarchy_idea:0 "The Strongest Rules"
TRN_trog_hierarchy_idea_desc:0 "Just as with the Trogs, the strongest in our tribe rule."
TRN_trog_hierarchy_2_idea:0 "The Strongest Rules"
TRN_trog_hierarchy_2_idea_desc:0 "Just as with the Trogs, the strongest in our tribe rule."
TRN_baby_back_ribs_idea:0 "Baby Back Ribs"
TRN_baby_back_ribs_idea_desc:0 "THEY ATE THE BABY?"
TRN_endless_hunt_idea:0 "The Endless Hunt"
TRN_endless_hunt_idea_desc:0 "The pursuit of new prey compels to search ever onward." 
TRN_one_people_idea:0 "One People"
TRN_one_people_idea_desc:0 "Our tribe has accepted a large number of outsiders with open arms. It was a learning experience for all of us, but we have emerged strong and united."

###National Focus###
TRN_nf_a001:0 "The Beasts"
TRN_nf_a001_desc:0 "Anyone who ventures into The Pitt knows what a Trog is."
TRN_nf_a002:0 "The Traveler"
TRN_nf_a002_desc:0 "A stranger from the west, with strange abilities."
TRN_nf_a003:0 "The Tribe"
TRN_nf_a003_desc:0 "In time the stranger was no longer alone."
TRN_nf_a004:0 "Beast Withhin"
TRN_nf_a004_desc:0 "When living among beasts, one must be careful not to become one."
TRN_nf_a005:0 "Rusty Clubs"
TRN_nf_a005_desc:0 "Big stick goes bonk"
TRN_nf_a006:0 "Dig Out Tunnels"
TRN_nf_a006_desc:0 "Underneath the stadium there are tunnels long since clogged with rubble."
TRN_nf_a007:0 "Mushroom Farms"
TRN_nf_a007_desc:0 "The dank enviroment of the tunnels is the perfect place to harvest mushrooms."
TRN_nf_a008:0 "Ancient War Chants"
TRN_nf_a008_desc:0 "Deep in the stadium we have found ancient hyms of the warriors. Here we go!"
TRN_nf_a009:0 "Connecting With Trogs"
TRN_nf_a009_desc:0 "Tapping into our connection with the Trogs lets us control them a little..."
TRN_nf_a010:0 "Sports Medicine"
TRN_nf_a010_desc:0 "In ancient times, great healers resided in this stadium and kept the Steeler Warriors fighting with special medicine called salt tablets. We can use their wisdom."
TRN_nf_a011:0 "Wildman Rituals"
TRN_nf_a011_desc:0 "The Wildmen are dangerous, but they aren't gone. We can save them... or give them a push."
TRN_nf_a012:0 "A Mass Ritual"
TRN_nf_a012_desc:0 "With a large number of wildmen caught, we can bring the tribe together for one big ritual."
TRN_nf_a013:0 "Armor of Ancients"
TRN_nf_a013_desc:0 "The armor of the ancient Steelers will be worn by our best warriors."
TRN_nf_a014:0 "They Fight With Us"
TRN_nf_a014_desc:0 "The Trogs will fight alongside our warriors as one!"
TRN_nf_a015:0 "Live With Trogs"
TRN_nf_a015_desc:0 "Just as we fight with the beasts, we live with them, strengthening our bonds."
TRN_nf_a016:0 "Fight Like A Trog"
TRN_nf_a016_desc:0 "The Trog is a deadly creature, and we can learn from them."
TRN_nf_a017:0 "Hunt With Trogs"
TRN_nf_a017_desc:0 "Going with the trogs on their hunts will teach us much."
TRN_nf_a018:0 "Adopt Their Hierarchy"
TRN_nf_a018_desc:0 "With the Trogs, the strongest is the leader. Our tribe could do the same."
TRN_nf_a019:0 "Prey At Night"
TRN_nf_a019_desc:0 "It is not enough that we hunt with the trogs, we must enjoy the fruits of the hunt."
TRN_nf_a020:0 "Disposable Tools"
TRN_nf_a020_desc:0 "Trogs are beasts that will stand between us and threats to our tribe, nothing more."
TRN_nf_a021:0 "Better Traps"
TRN_nf_a021_desc:0 "It is not hard to trap a trog. That doesn't mean we shouldn't try to improve."
TRN_nf_a022:0 "Peace At Home"
TRN_nf_a022_desc:0 "We will make sure whatever war we fight does not change how we live our lives in the stadium."
TRN_nf_a023:0 "Avoid And Observe"
TRN_nf_a023_desc:0 "Trogs will fight on the front while our people stay back and direct the battle from a distance."
TRN_nf_a024:0 "Hard Point Defense"
TRN_nf_a024_desc:0 "We know one day the raiders of The Pitt will come for us. Setting up defenses in advance is a must."
TRN_nf_a025:0 "Dig In And Hold"
TRN_nf_a025_desc:0 "From behind the safety of our walls we can observe the Trog's warpath and pick off any raiders killing too many of them."
TRN_nf_a026:0 "The Pitt Strikes"
TRN_nf_a026_desc:0 "There's news that The Pitt fell to some other force, but they'll come for us one day too. Hit them before they have time to settle in!"
TRN_nf_a027:0 "Welcome The Slaves"
TRN_nf_a027_desc:0 "The Pitt's slaves were victims of Ashur's evil. With nowhere else to go, we should welcome them to the tribe."
TRN_nf_a028:0 "No Mercy For Prey"
TRN_nf_a028_desc:0 "The slaves were weak, why would we allow such weakness into our tribe?"
TRN_nf_a029:0 "Collect Trophies"
TRN_nf_a029_desc:0 "The raiders had a lot of nice guns they never got the chance to use."
TRN_nf_a030:0 "Armor Of Warriors"
TRN_nf_a030_desc:0 "With this armor even the weakest whelp can become a mighty warrior!"
TRN_nf_a031:0 "Entering Uptown"
TRN_nf_a031_desc:0 "The raider stronghold in the heart of The Pitt is soon to fall to us."
TRN_nf_a032:0 "The Child"
TRN_nf_a032_desc:0 "Ashur's child is now an orphan. What will become of her?"
TRN_nf_a033:0 "Reinforce Our Traditions"
TRN_nf_a033_desc:0 "We should never forget who we are. Our culture and our traditions are important to hold on to."
TRN_nf_a034:0 "Expand Our Walls"
TRN_nf_a034_desc:0 "Our outposts will now expand to cover the rest of our domain."
TRN_nf_a035:0 "Watch The Bridges"
TRN_nf_a035_desc:0 "The Pitt's raiders are gone, but the threat of outsiders remains."
TRN_nf_a036:0 "Better Bashing"
TRN_nf_a036_desc:0 "A club is good, but a club with some spikes welded to it? Even better."
TRN_nf_a037:0 "Study Their Ways"
TRN_nf_a037_desc:0 "By understanding the armor we dig out of the stadium, we can make our own armor better."
TRN_nf_a038:0 "Beat War Drums"
TRN_nf_a038_desc:0 "We will have to fight whether we like it or not. Rally the warriors with the beat of the drums."
TRN_nf_b000:0 "Our Hunting Grounds"
TRN_nf_b000_desc:0 "The streets of The Pitt are having less and less prey to find. We will need to start looking outwards."
TRN_nf_b001:0 "Trogs Of The Corn"
TRN_nf_b001_desc:0 "To the east of The Pitt are fields of razorgrain and corn. Perfect for skulking through and hunting prey."
TRN_nf_b002:0 "Grim Harvest"
TRN_nf_b002_desc:0 "The farmers didn't know what hit them. They go out to their fields, and we harvest their flesh."
TRN_nf_b003:0 "Assault The Castle"
TRN_nf_b003_desc:0 "Metal armor and lawnmower blade swords won't be enough to stop us."
TRN_nf_b004:0 "Crash The Gates"
TRN_nf_b004_desc:0 "Even the towering walls of their castles will not save them from our hunger."
TRN_nf_b005:0 "Got That Trog In Me"
TRN_nf_b005_desc:0 "A few of these slavers that fought for Ashur have the heart of a real warrior. Maybe they would be fit to join us."
TRN_nf_b006:0 "The Hole"
TRN_nf_b006_desc:0 "One of the few good ideas Ashur had, putting warriors to the test and letting the strongest rise."
TRN_nf_b007:0 "Raider BBQ"
TRN_nf_b007_desc:0 "Whether a raider has the heart of a warrior or not, they all taste the same."
TRN_nf_b008:0 "Trog-Bait"
TRN_nf_b008_desc:0 "The screams of the raiders as trogs enter their cages never stop being funny."
TRN_nf_b009:0 "Study Our Surroundings"
TRN_nf_b009_desc:0 "The buildings of The Pitt may look like nothing but rubble, but inside they have plenty worth while."
TRN_nf_b010:0 "Forge Or Food"
TRN_nf_b010_desc:0 "Slaves of The Pitt have one choice. Keep working the forges, or we'll stop standing between them and the trogs."
TRN_nf_b011:0 "Hide Coats"
TRN_nf_b011_desc:0 "The trogs that fall in battle find new life as hides protecting our warriors."
TRN_nf_b012:0 "Improved Fighting"
TRN_nf_b012_desc:0 "These hunts outside The Pitt have taught us a lot."
TRN_nf_b013:0 "Ass Jerky"
TRN_nf_b013_desc:0 "Meat saved and dried can fill our warriors stomachs between hunts."
TRN_nf_b014:0 "Survival Of The Fittest"
TRN_nf_b014_desc:0 "The strong survive, the weak die. That is the way of the world."
TRN_nf_b015:0 "Endless Hunt"
TRN_nf_b015_desc:0 "We hunt or we die."
TRN_nf_b016:0 "Land of Yinz"
TRN_nf_b016_desc:0 "We have saved many with nowhere else to go. From the ashes of The Pitt we can make something better."
TRN_nf_b017:0 "Remove Monuments"
TRN_nf_b017_desc:0 "The towering sculptures of those who came before have no place in our new Pitt."
TRN_nf_b018:0 "Improve Living Conditions"
TRN_nf_b018_desc:0 "We can make better use of the space once held by statues."
TRN_nf_b019:0 "Replace Monuments"
TRN_nf_b019_desc:0 "There are statues deep in the ruins that would look better outside Haven."
TRN_nf_b020:0 "Embrace Our Idols"
TRN_nf_b020_desc:0 "The ancient warriors we venerate will guide our people."
TRN_nf_b021:0 "Worker's Militia"
TRN_nf_b021_desc:0 "The saved slaves of The Pitt want to fight with us to protect our city."
TRN_nf_b022:0 "Chains For Rifles"
TRN_nf_b022_desc:0 "The weapons of the oppressors now go to the hands of the oppressed."
TRN_nf_b023:0 "Tribal Warriors"
TRN_nf_b023_desc:0 "The freed slaves have their place in our society, but it is not on the line. Their work will free up more people to be warriors though."
TRN_nf_b024:0 "Scrapping Made Easy"
TRN_nf_b024_desc:0 "With our warriors escorting them, the freed slaves have an easy time scavening the ruins. It turns out not having to flee from Trogs maks scrapping easy."
TRN_nf_b025:0 "An Open Council"
TRN_nf_b025_desc:0 "The freed men and women will have a place on our tribal council."
TRN_nf_b026:0 "Stand Proud"
TRN_nf_b026_desc:0 "We did great things while staying true to our ways. We should be proud of what we have done."
TRN_nf_b027:0 "Settle Other Stadiums"
TRN_nf_b027_desc:0 "There are other stadiums in the city that have not had anyone living in it for years. We could change that."
TRN_nf_b028:0 "Closer To Haven"
TRN_nf_b028_desc:0 "The forges of The Pitt will be the new heart of our tribe."
TRN_nf_b029:0 "Dig Our Roots"
TRN_nf_b029_desc:0 "The Stadium is our home and it will remain so."
TRN_nf_b030:0 "Shared Wisdom"
TRN_nf_b030_desc:0 "The warriors of our tribe and the freed slaves have learned a lot from each other."
TRN_nf_b031:0 "One People"
TRN_nf_b031_desc:0 "Our tribe and the freed slaves were very different, but through these months we have become one."

###Tooltips###
