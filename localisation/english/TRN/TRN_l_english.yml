TRN_2_tt:0 "A new pack of Trogs are at our tribe's disposal"
TRN_3_tt:0 "Raiders who prove themselves join our warriors"
TRN_4_tt:0 "The freed slaves form a militia"
TRN_5_tt:0 "A new group of warriors takes the field"
TRN_6_tt:0 "The statue we choose to move will inspire our people"
TRN_7_tt:0 "Freed slaves join our council"
TRN_8_tt:0 "We will relocate Mr Rodgers' staute"
TRN_9_tt:0 "We will relocate Stargell's statue"
TRN_10_tt:0 "We will relocate Wagner's statue"

