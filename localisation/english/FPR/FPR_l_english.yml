l_english:

  ###Characters###
  FPR_trash_man_name:0 "Смітник"
  FPR_the_trashman_desc:0 "§9'Ну, не знаю, скільки років мені тут ще лишилося. А тепер я буду дивним.'§!\n\nЙого часто називають звіром або пережитком минулої епохи. Смітник — один із найстрашніших ватажків рейдерів на Східному узбережжі. Лише за кілька десятиліть він перетворив невелику банду зі своєї юності на цілу імперію. Навіть могутні гангстери Нью-Джерсі знають, що не варто ступати на його землю без належної данини. Проте невблаганний час не щадить нікого, і поки він старіє, його діти-близнюки вже точать зуби на трон."
  FPR_aluminum_monster_name:0 "Алюмінієвий Монстр"
  FPR_aluminum_monster_desc:0 "§R'Я з'їм твоїх дітей, суко!'§! \n\n Діандра, єдина донька Сміттєвого Короля, продовжує сімейну традицію, носячи люто заслужене прізвисько. Її силует у силовій броні вселяє жах у торговців по всій Пенсільванії. Вдивляючись у трон свого батька, вона обіцяє своїм прихильникам майбутнє, сповнене грабунків та слави."
  FPR_golden_god_name:0 "Золотий Бог"
  FPR_golden_god_desc:0 "§Y'Пік? Пік, Ді? Дозволь мені дещо тобі сказати, я навіть не починав сягати піку, і коли я досягну піку, ти це відчуєш, бо я досягну такого піку, що вся Філадельфія це відчує.'§! \n\nДенніс, єдиний законний син Сміттєвого Короля, воліє називати себе Золотим Богом. Цей бабій-рейдер любить маніпулювати іншими, щоб отримати бажане, нацьковуючи своїх ворогів один на одного. Втім, коли справа доходить до бійки і він втрачає контроль, його гнів не знає меж."
  FPR_trundle_the_great_name:0 "Трандл Великий"
  FPR_trundle_the_great_desc:0 "§C'Цілі покоління цих тварюк загинули від моїх рук: матері, батьки, дідусі й маленькі крихітні щури. Іноді я думаю, чи наше життя справді цінніше за їхнє. Розумієте, про що я?'§! \n\nТрандл швидко піднявся бандою Сміттєвого Короля після того, як вирізав тисячі мутантних щурів, що мало не заполонили південну Філадельфію. Він потоваришував зі старим ватажком, і деякі вважають, що він може стати наступним лідером. Цього ніхто з дітей Сміттєвого Короля не потерпить."
  FPR_ol_toothless_name:0 "Старий беззубий офіціант"

  ###Ideas###
  FPR_constant_bickering_idea:0 "Постійні чвари"
  FPR_constant_bickering_idea_desc:0 "Хоча слово Сміттєвого Короля — закон, його підлеглі постійно сваряться і б'ються між собою."
  FPR_no_hesitation_no_surrender_idea:0 "Жодних вагань, жодної поразки"
  FPR_no_hesitation_no_surrender_idea_desc:0 "Рейдери Філадельфії скоріше помруть, ніж зазнають гніву свого лідера через провал. Жодних вагань, жодної поразки, нікого не кидаємо... ну гаразд, декого можна й кинути."
  FPR_fight_milk_idea:0 "Бойове молоко"
  FPR_fight_milk_idea_desc:0 "Перший алкогольний напій на основі молока, створений рейдерами для рейдерів. З достатніми запасами Бойового молока рейдери Філадельфії битимуться, як ворони."
  FPR_wolf_cola_idea:0 "Вовча Кола"
  FPR_wolf_cola_idea_desc:0 "Можливо, це й не фірмова Ядер-Кола, але це єдина кола, яку досі виробляють. Хіба що десь у пустках є якась Гігафабрика Ядер-Коли, про яку ми не знаємо."
  FPR_riot_punch_idea:0 "Поліцейський пунш"
  FPR_riot_punch_idea_desc:0 "Основна причина недовговічності рейдерських банд — окрім внутрішніх чвар — це те, що з часом деякі рейдери починають співчувати своїм жертвам. Ось тут і стане в пригоді Поліцейський пунш. Не відчуватимеш провини за те, що здер шкіру з сім'ї за три кришки, якщо був у відключці й нічого не пам'ятаєш."
  FPR_ass_kicker_newsletter_idea:0 "Інформаційний бюлетень 'Бійці Об'єднуються'"
  FPR_ass_kicker_newsletter_idea_desc:0 "Короткий посібник до стилю життя бійця, з малюнками для тих, хто не вміє читати, навчає наших рейдерів шляху Майстра. Ні, не того Майстра. Цей майстер досяг просвітлення шляхом воїна. Найважливіше — уникати снеків."
  FPR_neglectful_rule_idea:0 "Зневажливе правління"
  FPR_neglectful_rule_idea_desc:0 "Жителі Філадельфії засвоїли, що любов їхнього правителя мінлива. Якщо вони хочуть добре жити, їм доведеться будувати це самим, не турбуючи свого бога своїми проблемами."
  FPR_untethered_rage_idea:0 "Неприборкана лють"
  FPR_untethered_rage_idea_desc:0 "Нас більше не стримують такі речі, як відстань чи гравітація. Ми вільні, і нашій люті немає меж."
  FPR_fly_through_night_idea:0 "Політ крізь ніч"
  FPR_fly_through_night_idea_desc:0 "З правильними стимуляторами наші пілоти можуть літати, літати й літати."
  FPR_trundle_work_idea:0 "Робота для Трандла"
  FPR_trundle_work_idea_desc:0 "Ті, хто виступав проти Трандла у боротьбі за владу, тепер виконують всю брудну роботу в банді. Чистка каналізації від щурів, вивезення нечистот та інші неприємні завдання тепер під наглядом Золотого Бога та Алюмінієвого Монстра."
  FPR_bird_laws_idea:0 "Пташині закони"
  FPR_bird_laws_idea_desc:0 "Завдяки наполегливій праці найкращого у Філадельфії адвоката з пташиних прав, наші закони про птахів нарешті мають сенс."
  FPR_bash_nerds_idea:0 "Лупити ботанів"
  FPR_bash_nerds_idea_desc:0 "До ботанів, розумак та інших тупих науковців у Філадельфії ставляться щонайбільше терпимо. Але вони знають, що ходять по тонкому льоду, і не намагаються зробити Трандла розумнішим."
  FPR_rock_flag_eagle_1_idea:0 "Камінь, прапор та орел"
  FPR_rock_flag_eagle_1_idea_desc:0 "Хтось хоче з нами битися? Ми влаштуємо їм Америку повною мірою!"
  FPR_rock_flag_eagle_2_idea:0 "Камінь, прапор та орел"
  FPR_rock_flag_eagle_2_idea_desc:0 "Хтось хоче з нами битися? Ми влаштуємо їм Америку повною мірою!"
  FPR_rock_flag_eagle_3_idea:0 "Камінь, прапор та орел"
  FPR_rock_flag_eagle_3_idea_desc:0 "Хтось хоче з нами битися? Ми влаштуємо їм Америку повною мірою!"
  FPR_nightman_idea:0 "Нічні люди"
  FPR_nightman_idea_desc:0 "Нічні люди — це елітні рейдери, навчені битися вночі. Вони живуть у світі темряви, більше не бачачи денного світла. Коли сонце сідає, і наші загони відступають, жах для наших ворогів лише починається."
  FPR_nightcrawlers_idea:0 "Нічні землериї"
  FPR_nightcrawlers_idea_desc:0 "Нічні люди почали вдень рити тунелі, щоб вночі заскочити ворогів зненацька."
  FPR_more_jet_idea:0 "Більше Джету"
  FPR_more_jet_idea_desc:0 "Щоб наші рейдери не божеволіли від ломки, ми вживемо особливих заходів, аби Джет продовжував текти рікою."
  FPR_reverse_funnel_idea:0 "Зворотна лійкова система"
  FPR_reverse_funnel_idea_desc:0 "Тобі не потрібно розуміти, як працює наша система розподілу здобичі, бо хтось вище за тебе це розуміє. Тож менше питай, більше заробляй."
  FPR_delayed_retirement_idea:0 "Відкладена пенсія"
  FPR_delayed_retirement_idea_desc:0 "Усі його спадкоємці — розчарування, негідні правити його імперією. Тож Сміттєвому Королю доводиться відкласти пенсію. На жаль, роки беруть своє."
  FPR_rum_ham_idea:0 "Ромово-шинковий пайок"
  FPR_rum_ham_idea_desc:0 "Поєднання алкогольного та харчового пайків у далеких рейдерських загонах зменшує навантаження на наші лінії постачання."
  FPR_broken_workers_idea:0 "Зламані робітники"
  FPR_broken_workers_idea_desc:0 "Робітники у Філадельфії — і раби, і вільні — знають, що краще не сперечатися. Вони беззаперечно виконують накази господарів і роблять так, як треба."
  FPR_raider_freedom_idea:0 "Рейдерська свобода"
  FPR_raider_freedom_idea_desc:0 "Бути рейдером — це життя без правил, де все дозволено. Ми не повинні забувати про це."
  FPR_raider_oppression_idea:0 "Рейдерське гноблення"
  FPR_raider_oppression_idea_desc:0 "Рейдери матимуть більше свободи, ніж інші в наших володіннях, але всьому є межі."
  
  ###National Focus###
  FPR_nf_a001:0 "Хлопці в жовтих куртках"
  FPR_nf_a001_desc:0 "Перш ніж правити всією Філадельфією, Смітник був лише рядовим членом дрібної банди."
  FPR_nf_a002:0 "Будуючи імперію"
  FPR_nf_a002_desc:0 "Своїми руками та за допомогою рабської праці Смітник перетворив місцеву банду на рейдерську імперію, що сягає далеко за межі Філадельфії."
  FPR_nf_a003:0 "Пенсія?"
  FPR_nf_a003_desc:0 "Останнім часом Смітник почувається не у своїй тарілці. Можливо, настав час щось змінити."
  FPR_nf_a004:0 "Гра ігор"
  FPR_nf_a004_desc:0 "Смітник не дозволить, щоб його імперія дісталася тому, хто з нею не впорається, і він, біса, не дозволить їй розпастися в громадянській війні. Буде змагання, і переможець отримає трон."
  FPR_nf_a005:0 "Френкові напої"
  FPR_nf_a005_desc:0 "У руїнах знайшли старий завод із розливу напоїв, який легко можна відновити. Різні лідери банди мають власні ідеї, як його використати."
  FPR_nf_a006:0 "Бойове молоко"
  FPR_nf_a006_desc:0 "Трандл пропонує алкогольний білковий напій на основі молока, зроблений із яєць ворони, РЕЙДЕРАМИ ДЛЯ РЕЙДЕРІВ. Він каже, що це дасть банді силу битися, як ворони."
  FPR_nf_a007:0 "Вовча Кола"
  FPR_nf_a007_desc:0 "Золотий Бог знайшов рецепт якогось небрендового замінника Ядер-Коли. Якщо ми почнемо її виробляти, то будемо єдиними, у кого буде газованка, якій не 200 років. Це створить ілюзію влади."
  FPR_nf_a008:0 "Поліцейський пунш"
  FPR_nf_a008_desc:0 "Зерновий спирт, товчений баффаут і трохи психо для смаку — ось вам Поліцейський пунш. Цей напій перетворить навіть найслабшого мешканця пусток на кровожерну машину для вбивств."
  FPR_nf_a009:0 "Офіціантка"
  FPR_nf_a009_desc:0 "Трандл проводить багато часу в місцевій забігайлівці. Враховуючи, що він майже завжди їсть 200-річний котячий корм, що ж його туди тягне?"
  FPR_nf_a010:0 "Збройова лихоманка"
  FPR_nf_a010_desc:0 "У Сміттєвого Короля є друг у Джерсі, який торгує зброєю. Його регулярна поставка скоро прибуде, але може залишитися трохи кришок на щось особливе."
  FPR_nf_a011:0 "Щуродуви"
  FPR_nf_a011_desc:0 "Коли перед тобою орда щурів, ти хочеш гвинтівку, яка стріляє по одній кулі, чи 'узі', яке стріляє 1000?"
  FPR_nf_a012:0 "Ракетниці!"
  FPR_nf_a012_desc:0 "Золотий Бог говорить про ракетниці з якоюсь дивною частотою. Не дивно, що він хоче купити."
  FPR_nf_a013:0 "Спалити сучих синів"
  FPR_nf_a013_desc:0 "Кажуть, Алюмінієвий Монстр любить когось підсмажити, тож вона, звісно, хоче вогнемет."
  FPR_nf_a014:0 "Завжди на коні"
  FPR_nf_a014_desc:0 "Один із генералів Сміттєвого Короля заграє не з одним учасником конфлікту за владу, а з усіма одразу. Він грає на всіх фронтах, щоб завжди бути на коні."
  FPR_nf_a015:0 "МакПойли"
  FPR_nf_a015_desc:0 "Дивний клан мешканців пусток у містечку Олл-Ін. Вони давно підтримують добрі стосунки з сім'єю. Однак остання данина була трохи меншою."
  FPR_nf_a016:0 "Крихке перемир'я"
  FPR_nf_a016_desc:0 "Трандл планує укласти круте перемир'я з родиною МакПойлів. Для цього нікого навіть не доведеться різати."
  FPR_nf_a017:0 "Працюй над м'язами"
  FPR_nf_a017_desc:0 "Маргарет МакПойл, єдина дочка Паппі МакПойла, стала ціллю для Золотого Бога. Він планує долучити її до свого культу, тим самим забезпечивши лояльність родини на довгі роки."
  FPR_nf_a018:0 "Птах проти птаха"
  FPR_nf_a018_desc:0 "Роял МакПойл — гігантський мутантний птах, якого родина МакПойлів тримає як домашнього улюбленця. Алюмінієвий Монстр планує перемогти його в двобої, щоб підкорити сім'ю."
  FPR_nf_a019:0 "Історія цвіркуна"
  FPR_nf_a019_desc:0 "Мандрівний проповідник із Дітей Атому прибув до Філадельфії. Здається, він зацікавився Алюмінієвим Монстром."
  FPR_nf_a020:0 "Бомжі, що насмітять"
  FPR_nf_a020_desc:0 "На півночі коїться якесь лайно, і це призводить до того, що вулиці Філадельфії заповнюються бомжами. Треба щось робити, перш ніж у нас утвориться справжнє нетрі."
  FPR_nf_a021:0 "Юні щуролупи"
  FPR_nf_a021_desc:0 "Рішення Трандла просте. Дамо бомжам біти й нацькуємо їх на щурів. Вони прогодують себе і вирішать нашу щурячу проблему. Ті, кого не з'їдять щури, зможуть навіть приєднатися до банди!"
  FPR_nf_a022:0 "Більше поплічників"
  FPR_nf_a022_desc:0 "Золотий Бог завжди шукає більше поплічників, щоб служити йому, і вони будуть служити."
  FPR_nf_a023:0 "Прибрати вулиці"
  FPR_nf_a023_desc:0 "Алюмінієвий Монстр слушно питає: чому б просто не закувати їх у кайдани й не продати до Пітта?"
  FPR_nf_a024:0 "Різанина на весіллі в Пондерозі"
  FPR_nf_a024_desc:0 "Якщо є щось, чого Золотий Бог не виносить, так це коли хтось тікає."
  FPR_nf_a025:0 "Підозріла фабрика"
  FPR_nf_a025_desc:0 "Рибна фабрика Мами Долс працює стільки, скільки себе пам'ятають. Але для рибної фабрики вони завжди були дуже потайливими. Можливо, час заглянути туди."
  FPR_nf_a026:0 "Ділова пропозиція"
  FPR_nf_a026_desc:0 "Після встановлення діалогу з власниками фабрики, Трандл хоче запропонувати відкрити новий напрямок бізнесу. Фабрика вироблятиме не лише рибу, але й найкращі вершкові пироги у Філадельфії."
  FPR_nf_a027:0 "Провести дослідження"
  FPR_nf_a027_desc:0 "Рибна фабрика — це нижче гідності Золотого Бога. Натомість він скористається загальною метушнею, щоб провести деякі 'дослідження' зі своїм культом."
  FPR_nf_a028:0 "Зібрати розвіддані"
  FPR_nf_a028_desc:0 "Алюмінієвий Монстр якимось чином знайшла гуля, який розмовляв мандаринською. Вона спробує відправити його на фабрику, щоб дізнатися, що там насправді відбувається."
  FPR_nf_a029:0 "Ось до чого все йшло"
  FPR_nf_a029_desc:0 "Час настав. Переможець гри CharDeeMacDennis, Гри ігор, правитиме бандою. Переможені будуть спати в ліжку зі старим гулем цілий рік."
  FPR_nf_b001:0 "Продемонструй цінність"
  FPR_nf_b001_desc:0 "Окрилений перемогою, Золотий Бог доводить свою цінність для жителів Філадельфії пишним святкуванням свого сходження на трон. Це перший крок у його плані підкорення сердець міста на все життя — система D.E.N.N.I.S."
  FPR_nf_b002:0 "Бійці Об'єднуються"
  FPR_nf_b002_desc:0 "Найкращі бійці Філадельфії зібрані в елітну групу — 'Бійці Об'єднуються'. Вони служитимуть елітними карателями в режимі Золотого Бога."
  FPR_nf_b003:0 "Бюлетень бійця"
  FPR_nf_b003_desc:0 "Спеціальний бюлетень буде поширюватися, щоб спрямовувати тих бійців, які вміють читати. У ньому будуть оспівуватися цінності бійця. Боєць повинен бути присутнім щодня, боєць повинен виконувати вправи, і боєць повинен уникати снеків. Є й інші, але це три головні."
  FPR_nf_b004:0 "Призначити Майстра"
  FPR_nf_b004_desc:0 "Один боєць довів, що він кращий за інших. Він служитиме майстром бійців, підзвітним лише самому Золотому Богу."
  FPR_nf_b005:0 "Круте шмаття"
  FPR_nf_b005_desc:0 "Щоб добре бити дупи, потрібен і відповідний вигляд. Шкіряні плащі для всіх."
  FPR_nf_b006:0 "Оновлення дизайну"
  FPR_nf_b006_desc:0 "Деякі хлопці просто не можуть носити такий вигляд і виглядають як мудаки. Потрібно трохи підкоригувати дизайн форми."
  FPR_nf_b007:0 "Розлютити населення"
  FPR_nf_b007_desc:0 "Другий крок плану — E (enrage), розлютити населення. Золотий Бог накаже своїм поплічникам поширювати чутки про те, що ті, хто за межами нашої території, змовляються проти нас. Вони всі брехуни й маніпулятори, які використовують людей, не те що Золотий Бог, який дбатиме про них."
  FPR_nf_b008:0 "Створити залежність"
  FPR_nf_b008_desc:0 "Третій крок — природно, N (nurture), створити залежність. Промисловість у місті, яка ще не під нашим контролем, буде конфіскована. Таким чином, люди залежатимуть від нас у всьому."
  FPR_nf_b009:0 "Знехтувати всіма"
  FPR_nf_b009_desc:0 "Четвертий крок — ще одне N (neglect), знехтувати всіма. Ми раптово перекриємо потік товарів. Люди стануть відчайдушними, бажаючи, щоб ми знову подбали про них. Можливо, наш злий сусід стоїть за цими останніми проблемами?"
  FPR_nf_b010:0 "Надихнути надію"
  FPR_nf_b010_desc:0 "П'ятий крок — I (inspire), надихнути надію. Ми пообіцяємо, що останні негаразди зникнуть, щойно наші цілі будуть досягнуті. Як тільки ми змусимо людей знищити нашого ворога, важкі часи залишаться в минулому. Тільки тоді вони захочуть того ж, чого хочемо ми."
  FPR_nf_b011:0 "Різанина всюди"
  FPR_nf_b011_desc:0 "Останній крок — S (slaughter), різанина всюди. Коли люди вже гризуть вудила, щоб воювати з нашими ворогами за нас, ми атакуємо. Стане краще... на деякий час. Але завжди буде новий ворог, який створить проблеми, і цикл повториться."
  FPR_nf_b012:0 "Птахи війни"
  FPR_nf_b012_desc:0 "Саме так, Філадельфіє, готуйтеся злетіти з ПТАХАМИ ВІЙНИ."
  FPR_nf_b013:0 "Вербування божевільного"
  FPR_nf_b013_desc:0 "Потрібен справжній божевільний, щоб першим підняти в небо цю зібрану на коліні купу металобрухту. Ми знаємо такого."
  FPR_nf_b014:0 "Неприборкана лють"
  FPR_nf_b014_desc:0 "Маючи змогу завдавати ударів на величезні відстані, нашій люті немає меж."
  FPR_nf_b015:0 "Народжені громом"
  FPR_nf_b015_desc:0 "Не чіпайте наші землі, бо на вас чекає бій!"
  FPR_nf_b016:0 "Політ крізь ніч"
  FPR_nf_b016_desc:0 "Чим більше літаєш уночі, тим краще це виходить."
  FPR_nf_b017:0 "Джокер"
  FPR_nf_b017_desc:0 "Якимось дивом Трандл виграв гру ігор і тепер править Філадельфійськими рейдерами. Його перший наказ — змусити своїх опонентів виконувати всю брудну роботу в місті."
  FPR_nf_b018:0 "Пташині закони"
  FPR_nf_b018_desc:0 "Пташине право в цьому місті просто не ґрунтується на здоровому глузді. На щастя, Трандл — найкращий місцевий адвокат і може виправити це безлад."
  FPR_nf_b019:0 "Ем... Філібастер"
  FPR_nf_b019_desc:0 "Трандл колись... бачив... книжку про право. Це означає, що він добре обізнаний із різними юридичними тонкощами й може налагодити наші справи у Філадельфії."
  FPR_nf_b020:0 "Побити ботанів"
  FPR_nf_b020_desc:0 "Немає нічого, що Трандл ненавидить більше, ніж ботанів і тупих науковців, які намагаються зробити його розумнішим. Люди Філадельфії не повинні бути ботанами, вони повинні бити ботанів."
  FPR_nf_b021:0 "Вуличний розум"
  FPR_nf_b021_desc:0 "Не треба бути ботаном, щоб керувати містом, треба просто мати вуличний розум."
  FPR_nf_b022:0 "Я повстану"
  FPR_nf_b022_desc:0 "Привіт, співвітчизники-американці, ви повинні голосувати за мене. Я залишаю владу, добре. Дякую, дякую. Якщо ви проголосуєте за мене, я класний. Данина буде нижчою. Сину. Демократичне голосування за мене — це правильний вчинок, Філадельфіє, тож зробіть це."
  FPR_nf_b023:0 "Трохи натовкти дуп"
  FPR_nf_b023_desc:0 "Занадто довго нас усі топтали. Треба трохи натовкти дуп по-американськи."
  FPR_nf_b024:0 "Вилізти на гору"
  FPR_nf_b024_desc:0 "Може, це й гора сміття, але ж вважається, правда?"
  FPR_nf_b025:0 "Зшити прапор"
  FPR_nf_b025_desc:0 "Нам потрібен новий символ для міста."
  FPR_nf_b026:0 "Водити велику вантажівку"
  FPR_nf_b026_desc:0 "Ні, Трандл не вміє водити. Але це ж не Америка, де люди просто здаються."
  FPR_nf_b027:0 "Камінь, прапор та орел"
  FPR_nf_b027_desc:0 "Я повстану. Я трохи натовчу дуп. Я натовчу дуп у США. Вилізу на гору, зшию прапор, полечу на орлі. Я натовчу дуп. Я водитиму велику вантажівку. Я правитиму цим світом. Я натовчу дуп. Я повстану. Я трохи натовчу дуп. \n\n §RКАМІНЬ§!, ПРАПОР, §B ТА ОООООООООРЕЕЕЕЕЕЛ§!"
  FPR_nf_b028:0 "Влаштувати їм Америку"
  FPR_nf_b028_desc:0 "Люди в Герші думають, що можуть змагатися з Трандлом-патріотом? Вони ще дізнаються."
  FPR_nf_b029:0 "Нічна людина прийде"
  FPR_nf_b029_desc:0 "Ми живемо у світі темряви."
  FPR_nf_b030:0 "Тренування нічних землериїв"
  FPR_nf_b030_desc:0 "Темрява спадає, і магія прокидається, коли ми стаємо створіннями ночі!"
  FPR_nf_b031:0 "Знати щурів"
  FPR_nf_b031_desc:0 "Якщо щури мене чогось і навчили, так це того, що можна легко й дуже швидко померти під автобусом або на узбіччі. Тому треба жити теперішнім. Я просто житиму теперішнім і спробую потоваришувати з щурами."
  FPR_nf_b032:0 "Перевірити щурячі пастки"
  FPR_nf_b032_desc:0 "Ці щури надто розумні для простих клейових пасток, до того ж клей краще використовувати для нюхання. Тому Трандл розробив кращі пастки, щоб зловити більше щурів."
  FPR_nf_b033:0 "Перший — найгірший"
  FPR_nf_b033_desc:0 "'Перший — найгірший' — завжди казала мати Алюмінієвого Монстра про свою первістку. Але сталося так, як мало статися: первісток Сміттєвого Короля зайняв трон."
  FPR_nf_b034:0 "Використовувати звалищних собак"
  FPR_nf_b034_desc:0 "Мало що так лякає мешканця пусток і змушує коритися, як злий звалищний пес, готовий відкусити йому яйця."
  FPR_nf_b035:0 "Перший приплід"
  FPR_nf_b035_desc:0 "Нова партія собак готова до нацьковування на ворогів."
  FPR_nf_b036:0 "Бити, бити і ще раз бити"
  FPR_nf_b036_desc:0 "Зброя ніколи не була стилем Монстра. Вона завжди віддавала перевагу рукопашній."
  FPR_nf_b037:0 "Правильні інструменти для вбивства"
  FPR_nf_b037_desc:0 "Правило номер один для вбивці: тобі потрібні хороші інструменти для вбивства. Бажано міцні леза, що можуть розрубати кістку."
  FPR_nf_b038:0 "Більше Джету?"
  FPR_nf_b038_desc:0 "Ні, більше Джету не буде. Ніхто в історії Джету ніколи не прокидався з більшою кількістю Джету."
  FPR_nf_b039:0 "Ягідний бізнес"
  FPR_nf_b039_desc:0 "Монстр має революційний план: витрусити з місцевих фермерів пляшки соку. Потім ми збуватимемо сік торговцям, рекламуючи його як суперфуд, який допоможе вижити взимку. Це має добре продаватися в Північній Федерації."
  FPR_nf_b040:0 "Перевизначити успіх"
  FPR_nf_b040_desc:0 "Використовуючи багаторівневу зворотну лійкову систему, ми можемо не працювати взагалі, але отримувати весь прибуток."
  FPR_nf_b041:0 "Багато капелюхів"
  FPR_nf_b041_desc:0 "У своїй люті Алюмінієвий Монстр повбивала багатьох потенційних радників. На щастя, вона знає, ким їх замінити."
  FPR_nf_b042:0 "Золоті гуси"
  FPR_nf_b042_desc:0 "Хоч вони й сваряться, Алюмінієвий Монстр та її брат часто утворюють хорошу команду. Можливо, Золотому Богу варто дати кращу роль."
  FPR_nf_b043:0 "Лють Монстра"
  FPR_nf_b043_desc:0 "Жителі Філадельфії з полегшенням дізнаються, що Монстр тепер спрямовує свою лють на людей за межами міста."
  FPR_nf_b044:0 "Розбирання мотлоху"
  FPR_nf_b044_desc:0 "Цим комп'ютерам та іншим машинам не можна довіряти. Тому їх краще розібрати, а деталі використати у виробництві силової броні."
  FPR_nf_b045:0 "Хром усюди"
  FPR_nf_b045_desc:0 "Надійшло нове замовлення на 100 нових каркасів. За роботу!"
  FPR_nf_b046:0 "Найняти товстуна"
  FPR_nf_b046_desc:0 "Старий друг Монстра, Товстун Магу, дещо тямить у дешевому виробництві силової броні."
  FPR_nf_b047:0 "Броньові потогонки"
  FPR_nf_b047_desc:0 "Це працьовиті люди, які збирають броню, щоб прогодувати свої сім'ї. Так, це потогонка, але то й що?"
  FPR_nf_b048:0 "Доопрацювати прототипи"
  FPR_nf_b048_desc:0 "Перші прототипи нашої нової броні виявилися нікуди не придатними. Нам потрібно щось краще."
  FPR_nf_b049:0 "Відкласти пенсію"
  FPR_nf_b049_desc:0 "Діти сидять на джеті, МакДональдс — пристосуванець і злодій, а Трандл не вміє читати. Зараз ніхто не гідний трону Сміттєвого Короля. Можливо, за кілька років щось зміниться. Але поки що він скасовує свою пенсію."
  FPR_nf_b050:0 "Команда під мостом"
  FPR_nf_b050_desc:0 "Смітник дедалі частіше тусується з якимось Данканом та його командою під мостом. Принаймні він заводить друзів, правда?"
  FPR_nf_b051:0 "Гавайське Луау?"
  FPR_nf_b051_desc:0 "Поняття не маю, що це, але Смітник каже, що бачив таке свято в книжці."
  FPR_nf_b052:0 "Скарби каналізації"
  FPR_nf_b052_desc:0 "У каналізації можна знайти багато класних речей. Тільки стережіться стін води, які можуть змити будь-якої миті."
  FPR_nf_b053:0 "Хороша повія"
  FPR_nf_b053_desc:0 "У Сміттєвого Короля в житті було багато хороших повій. Але з віком він починає замислюватися, чи не знайти одну, щоб осісти з нею."
  FPR_nf_b054:0 "Красуня Сміттєвого Короля"
  FPR_nf_b054_desc:0 "Роксі — класне дівчисько. Вона полірує не тільки його 'колінвал', але й серце. Якби ж то вона могла злізти з джету."
  FPR_nf_b055:0 "Нові висоти"
  FPR_nf_b055_desc:0 "А може, невелика залежність від джету — це й не так погано..."
  FPR_nf_b056:0 "Покоївка для траху"
  FPR_nf_b056_desc:0 "Вона як покоївка... яку можна трахати. Так, Трандле, я знайшов одну — твою матір."
  FPR_nf_b057:0 "Новий номер два"
  FPR_nf_b057_desc:0 "Мати Трандла використала свої зв'язки та інші речі, щоб забезпечити своєму синові помітну роль у банді."
  FPR_nf_b058:0 "Пустельний виноград"
  FPR_nf_b058_desc:0 "Подруга Алюмінієвого Монстра була однією з давніх коханок Сміттєвого Короля. Він знає: якщо хто й заохочуватиме його розгульний спосіб життя, то тільки вона."
  FPR_nf_b059:0 "Пощастило"
  FPR_nf_b059_desc:0 "Займаючись любов'ю у старому сміттєвому баку за НакаБургером, Смітник та його дружина знайшли схованку з кришками! Ото пощастило."
  FPR_nf_b060:0 "Хтось отримає ножа"
  FPR_nf_b060_desc:0 "Від скромного ножа-п'яти до могутнього меча Алі-Баби — мало що може зрівнятися з хорошим клинком."
  FPR_nf_b061:0 "Гюнтерівська зброя"
  FPR_nf_b061_desc:0 "Окрім вогнепальної зброї. Зброя переможе клинок будь-коли, а Смітник має частку в місцевому виробництві зброї."
  FPR_nf_b062:0 "Почнемо стрілянину"
  FPR_nf_b062_desc:0 "Одна зброя — це добре, але цього не завжди достатньо. Іноді просто треба почати палити з усіх стволів."
  FPR_nf_b063:0 "Хто хоче ромової шинки?"
  FPR_nf_b063_desc:0 "Це саме те, що звучить. Шинка, вимочена в ромі з мутофруктів. Це частково законсервоване м'ясо стає улюбленцем рейдерів, які хочуть бути ситими й п'яними під час довгих рейдів."
  FPR_nf_b064:0 "Вороже поглинання"
  FPR_nf_b064_desc:0 "Найкращий спосіб заробити гроші — захопити щось, розібрати на запчастини та продати все, що не потрібно."
  FPR_nf_c001:0 "Банда віддячує"
  FPR_nf_c001_desc:0 "Герші під контролем, час віддячити людям, які допомогли цьому досягти."
  FPR_nf_c002:0 "Екстремальне перетворення домівок"
  FPR_nf_c002_desc:0 "Кілька контрольованих пожеж, трохи рабської праці — і ось вам новий будинок."
  FPR_nf_c003:0 "Вечірковий маєток"
  FPR_nf_c003_desc:0 "Як справи? Ми купка крутих рейдерів, які шукають інших крутих рейдерів, щоб зависати в нашому вечірковому маєтку. Нічого сексуального. Заохочуються хлопці в хорошій формі, можна одного смішного товстуна, знову ж таки, нічого сексуального."
  FPR_nf_c004:0 "Посилення безпеки"
  FPR_nf_c004_desc:0 "Успішні рейдери, як ми? Ми маємо ціль на спині. Тому нам потрібна додаткова охорона."
  FPR_nf_c005:0 "Збройові потогонки"
  FPR_nf_c005_desc:0 "У нас закінчується зброя, постачання просто не встигає за попитом. Тому нам потрібно більше зброї."
  FPR_nf_c006:0 "Допрацювати ідеї"
  FPR_nf_c006_desc:0 "Ця країна будувалася на тому, щоб вкрасти чиюсь хорошу ідею і зробити її великою. Ми зробимо те саме."
  FPR_nf_c007:0 "Звичайні потогонки"
  FPR_nf_c007_desc:0 "Розвивати цивільний сектор на такому пізньому етапі гри? Лол"
  FPR_nf_c008:0 "Зламати їх, як собак"
  FPR_nf_c008_desc:0 "Щоб керувати хорошою потогонкою, потрібно зламати робітників, як собак."
  FPR_nf_c009:0 "Вирішити газову кризу"
  FPR_nf_c009_desc:0 "Якого біса ми взагалі живили бар від газового генератора? Паливні елементи набагато поширеніші, їх можна знайти в підвалі майже кожної великої будівлі!"
  FPR_nf_c010:0 "Достатньо безпечно навіть для немовлят"
  FPR_nf_c010_desc:0 "Чи знали ви, що 90% вашої води — це 100% токсинів? Хто знає, що таке інші 10%? У мене є для вас водяний фільтр, який потрібно поставити в кожному домі. Він захистить вас і всю вашу родину. Ви навіть можете давати цю воду своїм немовлятам."
  FPR_nf_c011:0 "Банда переробляє"
  FPR_nf_c011_desc:0 "Люди старого світу викидали свої технології, вони викидали свої мечі. Вони викидали свої ключки для гольфу та смаколики! І знаєте що? Ми їх знайшли. І ми використаємо їх усі!"
  FPR_nf_c012:0 "Вирушаймо в дорогу"
  FPR_nf_c012_desc:0 "Дороги за межами Філадельфії — відстій, правда? Може, полагодимо їх?"
  FPR_nf_c013:0 "Возз'єднання родини МакПойлів"
  FPR_nf_c013_desc:0 "МакПойли запросили банду на сімейне свято. Навряд чи там буде надто дивно."
  FPR_nf_c014:0 "Зала Незалежності"
  FPR_nf_c014_desc:0 "Це велика стара цегляна будівля в місті, не знаю, для чого вона використовувалася раніше, але ми могли б використати її, щоб трохи більше організувати справи."
  FPR_nf_c015:0 "Банда розбиває Дзвін Свободи"
  FPR_nf_c015_desc:0 "Довга історія..."
  FPR_nf_c016:0 "Спробувати полагодити"
  FPR_nf_c016_desc:0 "Цей дзвін — не просто старий шматок брухту. Він про свободу! Про здатність робити те, що хочеш, коли хочеш. Їсти крабів, варити джинси, грабувати поселення. Ми мусимо його полагодити."
  FPR_nf_c017:0 "Розтовкти на порох"
  FPR_nf_c017_desc:0 "Цей дзвін — символ свободи, і ми не можемо цього допустити."
  FPR_nf_c018:0 "Місто братньої любові"
  FPR_nf_c018_desc:0 "Філадельфія, Місто братньої любові. Може, воно й не величне, але це дім."
  FPR_nf_c019:0 "Закопати сокиру війни"
  FPR_nf_c019_desc:0 "Минуло більше року від гри ігор, ніхто вже не спить зі старим гулем. Але все ще є неприязнь. Треба розвіяти туман, почати з чистого аркуша, закопати сокиру війни раз і назавжди."
  FPR_nf_c020:0 "Командоутворюючі вправи"
  FPR_nf_c020_desc:0 "Тепер, коли ми закопали сокиру війни, настав час для невеликих командоутворюючих вправ."
  FPR_nf_c021:0 "Банда відвідує Герші-парк"
  FPR_nf_c021_desc:0 "Стіни Герші впали, і парк наш. Що робити далі?"
  FPR_nf_c022:0 "Імплікація"
  FPR_nf_c022_desc:0 "Уявіть: амішський фермер посеред поля з рейдером, якого він ледь знає. Він дивиться навколо і бачить лише порожні поля. Що він робитиме? Відмовиться платити данину?"
  FPR_nf_c023:0 "Запобігти втечі"
  FPR_nf_c023_desc:0 "Якщо є щось, що Золотий Бог любить, так це коли його жертви не мають можливості втекти. Стіни Герші будуть посилені. Але цього разу не для того, щоб когось не впустити, а щоб ніхто не вийшов."
  FPR_nf_c024:0 "Гершівські поплічники"
  FPR_nf_c024_desc:0 "У Герші багато тих, хто міг би стати хорошими послідовниками."
  FPR_nf_c025:0 "Великий храм"
  FPR_nf_c025_desc:0 "Герші буде відбудовано. Це буде величний монумент єдиному богу — Золотому Богу."
  FPR_nf_c026:0 "Нові щурячі палиці"
  FPR_nf_c026_desc:0 "У цих амішів було багато інструментів, які стали б чудовими палицями для биття щурів. Заберемо їх!"
  FPR_nf_c027:0 "Квоти на сир"
  FPR_nf_c027_desc:0 "Так, шоколад — це круто, але знаєте, що ще можна зробити з молока? Сир!"
  FPR_nf_c028:0 "Відремонтувати парк"
  FPR_nf_c028_desc:0 "Деякі з цих речей не надто розбиті. Ми могли б знову змусити їх працювати."
  FPR_nf_c029:0 "Сирна країна"
  FPR_nf_c029_desc:0 "Всі сюди, всі сюди, до найщасливішого місця в пустках — Сирної країни!"
  FPR_nf_c030:0 "Гнів Монстра"
  FPR_nf_c030_desc:0 "Якийсь амішський охоронець назвав Алюмінієвого Монстра роботом, і тепер вона нишпорить парком, убиваючи всіх, кого бачить."
  FPR_nf_c031:0 "Вивчити гідравліку"
  FPR_nf_c031_desc:0 "У деяких із цих старих атракціонів були деталі, які добре підійшли б для гідравліки силової броні."
  FPR_nf_c032:0 "Демонтувати Сховище"
  FPR_nf_c032_desc:0 "Вони все одно не користувалися цим запорошеним старим Сховищем."
  FPR_nf_c033:0 "Гершівський брухт"
  FPR_nf_c033_desc:0 "Герші досі є гамірним торговим центром, тільки тепер тут переважно продають брухт, здертий із самого парку."
  FPR_nf_c034:0 "Розібрано на запчастини"
  FPR_nf_c034_desc:0 "Атракціони? Сховища? Кому потрібне це лайно? Продати мешканцям пусток."
  FPR_nf_c035:0 "Краще застосування кукурудзи"
  FPR_nf_c035_desc:0 "В амішів більше кукурудзи, ніж вони можуть з'їсти. Хтось має навчити їх робити віскі."
  FPR_nf_c036:0 "Амішська праця"
  FPR_nf_c036_desc:0 "Люди Герші відомі як хороші майстри. Тому вони ідеально підходять для роботи в потогонці."
  FPR_nf_c037:0 "Сміттєвий палац"
  FPR_nf_c037_desc:0 "Герші перетворився на кубло розпусти. Найкращий взірець рейдерського способу життя. Тут можна купити й продати все і всіх. Ніяких правил, крім одного: не зачіпай Сміттєвого Короля."
  FPR_nf_c038:0 "Розпалити суперництво"
  FPR_nf_c038_desc:0 "Харрісбурзькі бандити можуть і не пам'ятати, але наше суперництво триває роками. Час його відновити."
  FPR_nf_c039:0 "Продовжити на захід"
  FPR_nf_c039_desc:0 "Це містечко Джонстаун думає, що вони вільні після того, як Харрісбург зник з карти. Йолопи."
  FPR_nf_c040:0 "Виявляйте повагу, ми легенди"
  FPR_nf_c040_desc:0 "Ці йолопи не знають, хто ми такі. Вони не знають, що ми тут легенди? Час показати їм, чому не варто зневажати Філадельфійських рейдерів."
  FPR_nf_c041:0 "Банда вирішує кризу у Вашингтоні"
  FPR_nf_c041_desc:0 "Столичне Пустище було розбомбленою дірою 200 років. Останнім часом це була зона бойових дій між купкою великих гравців. Тепер, коли вони побили одне одного, настав час нам прийти за об'їдками."
  FPR_nf_c042:0 "Банда використовує диво"
  FPR_nf_c042_desc:0 "Проект Чистота може бути дивом, а може бути фуфлом, але одне можна сказати точно: це, блін, золота жила."
  FPR_nf_c043:0 "ГРАБУЙ ГРАБУЙ!"
  FPR_nf_c043_desc:0 "Пустище охоплене шаленством. Забирайте все, що погано лежить!"
  FPR_nf_c044:0 "Банда краде корабель"
  FPR_nf_c044_desc:0 "Наша банда поклала око на Рівет-Сіті відтоді, як ми вперше увірвалися на Проект Чистота. Величезний корабель, який ідеально підійшов би для вечірок."
  FPR_nf_c045:0 "Візит до Піттсбурга"
  FPR_nf_c045_desc:0 "У Пенсільванії ДВА міста? Як це працює?"
  FPR_nf_c046:0 "Просто хороший бізнес"
  FPR_nf_c046_desc:0 "Пітт запропонував нам хорошу угоду, яка вимагає мінімум зусиль з нашого боку. Здається, це краще, ніж мати справу з якимось трогом."
  FPR_nf_c047:0 "Збройова лихоманка 2"
  FPR_nf_c047_desc:0 "Зброї багато не буває."
  FPR_nf_c048:0 "Проект Сила"
  FPR_nf_c048_desc:0 "Герші, Харрісбург, Вашингтон, Піттсбург — всі вони або наповнюють наші кишені, або в нас під каблуком. Чому хтось не хоче бути в команді переможців?"
  FPR_nf_c049:0 "Банда їде до Атлантик-Сіті"
  FPR_nf_c049_desc:0 "Синдикат і Смітник давно знайомі. Вони не лізли до нас, ми не лізли до них. Але тепер вони лізуть до Нью-Йорка? І доки вони не почали слати людей до Філадельфії? Треба вдарити першими."
  FPR_nf_c050:0 "Гвідо"
  FPR_nf_c050_desc:0 "У Сміттєвого Короля є старі друзі, які допоможуть йому правильно керувати містом."
  FPR_nf_c051:0 "Ви — кровоголови, діти"
  FPR_nf_c051_desc:0 "Хочете знати, чому я не поставив жодного з вас керувати Атлантик-Сіті? Через цю кляту Диявольську кров. Ви обоє постійно під нею. Ви повинні навчитися дозувати, як я."
  FPR_nf_c052:0 "Заслужений відпочинок"
  FPR_nf_c052_desc:0 "Іноді просто треба повалятися на пляжі, нажертися ромової шинки й розслабитися."
  FPR_nf_c053:0 "Тролева платня"
  FPR_nf_c053_desc:0 "Треба заплатити тролю, якщо хочеш вибратися з цієї діри."
  FPR_nf_c054:0 "ЦЕ ОКЕАН?"
  FPR_nf_c054_desc:0 "Йой, яка ж це здоровенна хрінь. Що, думаєш, на тому боці?"
  FPR_nf_c055:0 "Не можна допливти до Європи?"
  FPR_nf_c055_desc:0 "Не певен, що наука це підтверджує, але добре, колись ми збудуємо човни, щоб поплисти до Європи."
  FPR_nf_c056:0 "Тепер ми краби"
  FPR_nf_c056_desc:0 "Жити і померти з крабом."
  FPR_nf_c057:0 "Збирати морські зразки"
  FPR_nf_c057_desc:0 "Як ми змусили щурів битися за нас, так само ми можемо змусити крабів щипати ТИХ, кого МИ хочемо."
  FPR_nf_c058:0 "Дефілювати пляжем"
  FPR_nf_c058_desc:0 "Буде проведено тріумф, щоб показати Джерсі їхніх нових правителів."
  FPR_nf_c059:0 "Угода з дияволом"
  FPR_nf_c059_desc:0 "Це наче джет... але краще? Як таке можливо?"
  FPR_nf_c060:0 "Торгівля з дияволом"
  FPR_nf_c060_desc:0 "Хороший наркодилер завжди має трохи для себе."
  FPR_nf_c061:0 "Під набережною"
  FPR_nf_c061_desc:0 "Місце під набережною — чарівне. Тільки стережіться бомжів."
  FPR_nf_c062:0 "Банда заблукала"
  FPR_nf_c062_desc:0 "Зрізаючи шлях додому до Філадельфії, банда заблукала. Вам не здається, що дерева рухаються?"
  FPR_nf_c063:0 "Дерева, всюди дерева?!" (Виправлено друкарську помилку attackign -> attacking)
  FPR_nf_c063_desc:0 "Що, в біса, не так із цим лісом? Чому дерева на нас нападають?"
  FPR_nf_c064:0 "Банду врятовано"
  FPR_nf_c064_desc:0 "Було нелегко, але банду знайшли цілою та відносно неушкодженою. Щоправда, Смітник захворів, з'ївши мертву ворону."
  FPR_nf_c065:0 "Рідкісний момент"
  FPR_nf_c065_desc:0 "Після того, як він побував у лісі, Смітник поводиться інакше. Там щось сталося."
  FPR_nf_c066:0 "Ось чому НЕ ТРЕБА ЇХАТИ З ФІЛАДЕЛЬФІЇ"
  FPR_nf_c066_desc:0 "Трандл повернувся до Філадельфії з новою ненавистю до подорожей."
  FPR_nf_c067:0 "Немає інших богів переді мною"
  FPR_nf_c067_desc:0 "Золотий Бог здійснив ще один подвиг, щоб зміцнити свою владу: убив місцевого бога й узурпував його послідовників."
  FPR_nf_c068:0 "Я ненавиджу ліс"
  FPR_nf_c068_desc:0 "Алюмінієвий Монстр наказала спалити ліс разом з усіма, хто всередині."
  FPR_nf_c069_trashman:0 "Смітник править світом"
  FPR_nf_c069_monster:0 "Алюмінієвий Монстр править світом"
  FPR_nf_c069_god:0 "Золотий Бог править світом"
  FPR_nf_c069_trundle:0 "Трандл править світом"
  FPR_nf_c069_desc:0 "Незліченні міста впали перед Філадельфійськими рейдерами. Тепер ми більше, ніж просто банда, ми — імперія."

