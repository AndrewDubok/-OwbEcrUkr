l_english:
  ATB_revelation:0 "Об'явлення 16:18"
  ATB_revelation_desc:0 "Це історія, яку розповідали багато разів: кінець світу та відродження людини..."

  ATB_birth_of_a_people:0 "Народження народу"
  ATB_birth_of_a_people_desc:0 "Світло Боже пережило ядерний голокост, і пастору Муру було доручено принести його диким племенам Вірджинії."

  ATB_playing_with_fire:0 "Гра з вогнем"
  ATB_playing_with_fire_desc:0 "Важкі часи породжують неміцні союзи. Пожежні Маршали — небезпечні піроманти, яким байдуже до безпеки, і вони відмовляються бачити світло Атом-Баптизму. Проте вони так само ненавидять Апокрифи Посейдона та болотяних оракулів із Саду Едему."

  ATB_valour_of_the_righteous:0 "Доблесть праведних"
  ATB_valour_of_the_righteous_desc:0 "Жодна куля не зашкодить справді праведному воїну. Найревніші з наших людей віддають себе в солдати, щоб нести світло Боже язичникам і дикунам."
    ATB_valour_divisions_tt:0 "Три §7високодосвідчені§ §Yдивізії ополчення§! будуть готові приборкати ворогів Мура."

  ATB_faith_and_forges:0 "Віра та горнила"
  ATB_faith_and_forges_desc:0 "Сильна країна будується на спинах її трудівників. Ми повинні заохочувати відданість будь-якій справі, до якої когось призначено, чи то боротьба з ворогом, чи пошуки зброї."

  ATB_fire_and_fury:0 "Вогонь і лють"
  ATB_fire_and_fury_desc:0 "Лють наших фанатиків змусить тремтіти навіть наймогутніших язичників."

  ATB_isaiah:0 "Ісая 2:4"
  ATB_isaiah_desc:0 "І Він розсудить народи, і вирішить суперечки багатьох племен.\n\nІ перекують вони мечі свої на лемеші, а списи свої — на серпи.\n\nНе підійме меча народ на народ, і не будуть більше навчатися війни."

  ATB_joel:0 "Йоіл 3:4"
  ATB_joel_desc:0 "Перекуйте лемеші ваші на мечі, а серпи ваші — на списи.\n\nНехай слабкий скаже: «Я сильний!»"

  ATB_the_father_the_son:0 "Отець, Син..."
  ATB_the_father_the_son_desc:0 "Ми чули про християнського священника в Рівет-Сіті, місті в Столичній Пустці. Хоч проповідники є по всій пустці, мало хто заснував церкви. Варто зустрітися з цим отцем Кліффордом, щоб зрозуміти його погляд на християнство."

  ATB_the_holy_glow:0 "...і Святе Сяйво"
  ATB_the_holy_glow_desc:0 "Сповідник Кромвель приніс нову віру до міста Мегатонна в окрузі Колумбія — віру Дітей Атома. Діти вірять у силу Атома, і це має певну схожість з нашою вірою. Надіслати делегацію, щоб дізнатися більше, було б нам дуже корисно."

  ATB_learning_from_saint_monica:0 "Навчаючись у Святої Моніки"
  ATB_learning_from_saint_monica_desc:0 "Свята Моніка, яку описав отець Кліффорд, є відповідною покровителькою для боліт. Тут постійно губляться діти, і ми повинні піклуватися про сиріт так, як вона того хотіла."

  ATB_baptised_in_the_mud:0 "Хрещені в багнюці"
  ATB_baptised_in_the_mud_desc:0 "Болото — не найкраще місце для поширення релігії, але люди тут мають незрівнянну стійкість."

  ATB_speaking_in_tongues:0 "Глосолалія"
  ATB_speaking_in_tongues_desc:0 "Не кожна релігія приймає людей, які говорять іншими мовами, але ми знаємо, що вони бачать те, чого не бачимо ми."

  ATB_wastelander_converts:0 "Навернені пустковики"
  ATB_wastelander_converts_desc:0 "Ми можемо повчитися в Дітей Атома їхній неймовірній здатності поширювати віру та навертати людей. Їхня віра зростає воістину експоненційно, і ми повинні переконатися, що робимо те саме."

  ATB_grand_churches:0 "Величні церкви"
  ATB_grand_churches_desc:0 "Болото — жахливе місце, але ми можемо зробити його кращим. Будівництво церков для об'єднання громад принесе мир на болота."

  ATB_covert_missionaries:0 "Таємні місіонери"
  ATB_covert_missionaries_desc:0 "Релігія не визнає кордонів... так само, як і наші шпигуни."

  ATB_revere_the_swamps:0 "Шанувати болота"
  ATB_revere_the_swamps_desc:0 "Болота — не просто наш дім, це свята земля. Ми повинні шанувати їх, як Діти Атома шанують радіацію, але не захоплюватися ними, як Сад Едему."

  ATB_shaky_ground:0 "Хиткий ґрунт"
  ATB_shaky_ground_desc:0 "Цей союз ніколи не мав тривати вічно. Ми повинні зробити все можливе, щоб він працював на нашу користь."
    ATB_shaky_decisions_tt:0 "Це відкриє §Yрішення§! для §Oзбільшення нашого впливу§! серед Пожежних Маршалів."

  ATB_mutually_beneficial_exchange:0 "Взаємовигідний обмін"
  ATB_mutually_beneficial_exchange_desc:0 "З цього союзу можна отримати більше, ніж просто домовленість про спільну боротьбу. Пожежні Маршали мають різноманітні знання про зброю, яку ми не можемо відтворити, особливо їхні вогнемети."
    ATB_equipment_trade_decisions_tt:0 "Це відкриє §Yрішення§! для отримання спорядження від [FRM.GetNameWithFlag]"

  ATB_provide_an_alternative:0 "Запропонувати альтернативу"
  ATB_provide_an_alternative_desc:0 "Люди Пожежних Маршалів повинні зрозуміти, що вони можуть обрати шлях співпраці з нами."

  ATB_fire_and_faith:0 "Вогонь і віра"
  ATB_fire_and_faith_desc:0 "Пожежним Маршалам немає рівних у їхній здатності знищувати. Ми могли б використати дещицю цього досвіду."
    ATB_marshalls_division_tt:0 "Дивізія новонаверненої §Yпіхоти§! буде готова спалити болота дотла, маючи §7передове вогнеметне спорядження§!."

  ATB_matthew:0 "Матвій 24:7"
  ATB_matthew_desc:0 "Бо повстане народ на народ, і царство на царство; і будуть голод, мор та землетруси по місцях."

  ATB_manifest_destiny:0 "Призначення долі"
  ATB_manifest_destiny_desc:0 "Болота Вірджинії ніколи не будуть у безпеці, доки болотяним мешканцям і божевільним морякам дозволено існувати."

  ATB_conversion_of_the_swamps:0 "Навернення боліт"
  ATB_conversion_of_the_swamps_desc:0 "Приведення боліт на наш бік може зайняти деякий час, але наша релігія вийде з цього сильнішою, ніж будь-коли."

  ATB_ascendant_baptism:0 "Висхідний Баптизм"
  ATB_ascendant_baptism_desc:0 "Звісно, ми ніколи не сумнівалися в собі, але тепер ми можемо довести всій пустці, що наша віра є найправдивішою."

  ATB_peaceful_conversions:0 "Мирні навернення"
  ATB_peaceful_conversions_desc:0 "Ми повинні простягнути руку миру дикунам боліт. Вони не могли знати кращого."
    ATB_upgrade_ideas_tt:0 "Це §Gоб'єднає та покращить§! національні духи §YПідняті з багна§! та §YГлосолалія§!."

  ATB_grand_inquisition:0 "Велика інквізиція"
  ATB_grand_inquisition_desc:0 "Будь-який опір Атом-Баптизму має бути знищений на корені. Наша релігія правильна, і болотяні мешканці повинні це засвоїти."

  ATB_the_dc_mission:0 "Місія в округ Колумбія"
  ATB_the_dc_mission_desc:0 "Столична Пустка є перспективним джерелом навернених. Її люди повинні пізнати істину."

  ATB_shepherds_of_virginia:0 "Пастирі Вірджинії"
  ATB_shepherds_of_virginia_desc:0 "Вірджинія повинна пізнати мир. Цього вже достатньо."
    ATB_heavenly_kingdom:0 "Небесне Царство"
    ATB_heavenly_kingdom_DEF:0 "Небесне Царство Вірджинії"
    ATB_heavenly_kingdom_ADJ:0 "Вірджинське"

  ATB_crusaders_of_virginia:0 "Хрестоносці Вірджинії"
  ATB_crusaders_of_virginia_desc:0 "Пустка повинна пізнати нашу віру. Цього вже достатньо."
    ATB_crusader_kingdom:0 "Королівство Хрестоносців"
    ATB_crusader_kingdom_DEF:0 "Королівство Хрестоносців Вірджинії"
    ATB_crusader_kingdom_ADJ:0 "Вірджинське"