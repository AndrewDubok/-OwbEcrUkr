###Tooltips###
JOE_1_tt:0 "Банда рейдерів Фаскума Френка приєднується"
JOE_2_tt:0 "Рейнджери Рейлі прибули"
JOE_3_tt:0 "Хлопці готові до іншого виду брухту"
JOE_4_tt:0 "Екзекьютрон стає доступним як економічний радник"
JOE_5_tt:0 "Ми попросимо приєднатися до Республіки Східного Узбережжя як рівноправні партнери"
JOE_6_tt:0 "Літній рейдер викликався очолити наші армії"
JOE_7_tt:0 "Засновує Вежу Слокум як торговий центр"
JOE_8_tt:0 "З кавою ми можемо все!"
JOE_9_tt:0 "Активує Джона Доната як радника безкоштовно"
JOE_10_tt:0 "Активує Леві Бонда як радника безкоштовно"
JOE_11_tt:0 "Активує Пончикового Бота як радника безкоштовно"

