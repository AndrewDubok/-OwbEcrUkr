#Characters#
JOE_joe_name:0 "Джо"
JOE_joe_desc:0 "Колись Джо був простим сміттярем, як і багато з тих, ким він зараз керує в Південному окрузі Колумбія. Його життя змінилося, коли він знайшов експериментальну кавоварку під регіональним офісом Слокум Джо. Ця знахідка принесла йому статок, який він вклав у створення імперії сміттярів. Якою б дрібною не була операція, Джо отримує свою частку. Натомість сміттярі отримують безпечні місця для відпочинку та торгівлі, перш ніж знову поринути в небезпечні руїни за його стінами."
JOE_raider_name:0 "Фредерік Фаскум"
JOE_rangers_name:0 "Рейлі"
JOE_jericho_name:0 "Джеріко"
JOE_executron_name:0 "Екзекьютрон"
JOE_donutbot_name:0 "Пончиковий Бот"
JOE_guy_name:0 "Джон Донат"
JOE_lady_name:0 "Леві Бонд"

#Cosmetic Tags#
JOE_coffee_empire_tag:0 "Кавова Імперія Джо"
JOE_coffee_empire_tag:0 "Імперія Джо"
JOE_coffee_empire_tag:0 "Імперія Слокум Джо"

#Events#
JOE_nf_events.1.title:0 "Найкращий сміттяр"
JOE_nf_events.1.desc:0 "Щодня десятки, а то й сотні мешканців пусток вирушають у руїни центру Вашингтона. Там вони протистоять жахливим мутантам, психопатичним рейдерам і гіршим речам, аби заробити на життя. Це кар'єра, на якій мало хто затримується надовго, але ті, кому це вдається, зазвичай розвивають шосте чуття для пошуку в руїнах. Сміттяр Джо був одним із таких шукачів, і він мав особливий хист до одного."
JOE_nf_events.1.a:0 "Пошук старих схем і технічних даних"
JOE_nf_events.1.b:0 "Вибір найкращого металобрухту"
JOE_nf_events.1.c:0 "Відновлення якісних деталей зброї"
JOE_nf_events.2.title:0 "Розкол"
JOE_nf_events.2.desc:0 "Завжди було ризиковано ходити в руїни навколо Цитаделі. Так, руїни зазвичай були вільні від мутантів, але Братство рідко могло відрізнити сміттяра від рейдера. Не кажучи вже про те, що якби вони припинили вогонь, то могли б помітити щось блискуче у вашій здобичі. Але це ніколи не зупиняло Джо, і він був одним із перших, хто помітив щось незвичайне. Патрулі ставали рідшими, і з якоїсь причини кілька патрулів мали нове забарвлення. Очевидно, у Братстві стався якийсь розкол. Якщо Джо чогось і навчився за роки пошуків у руїнах, так це тому, що в конфлікті є можливості. І ще, іноді з каравану брамінів падає щось хороше."
JOE_nf_events.2.a:0 "Їхня втрата — наша вигода"
JOE_nf_events.3.title:0 "Вхід до Вежі Слокум"
JOE_nf_events.3.desc:0 "Братство ніколи не переймалося такою нешкідливою річчю, як офіс ритейлера. Вони завжди зосереджувалися на постачальниках зброї, урядових бункерах та інших військових об'єктах. Саме тому Джо завжди заглядав у корпоративні офіси, адже Братство ніколи не дбало про скарби всередині. Під час однієї з таких експедицій Джо виявив бункер під регіональною штаб-квартирою Слокум Джо. Очікуючи знайти кілька робочих терміналів або старе обладнання, Джо здивувався, знайшовши прототип машини, яка змінила його життя.\n\n Кавоварка Слокум Джо\n\n Згідно з терміналами в бункері, добувати свіжі кавові зерна ставало дедалі важче у світі, спустошеному голодом і нестабільністю. Ціни на каву зростали до неймовірних висот не лише через інфляцію, а й через відсутність поставок. У рамках якоїсь угоди з DIA про надання їм офісу для прикриття, вони отримали машину з якогось місця під назвою Велика Гора для експериментів. Після кількох невдалих спроб їм нарешті вдалося змусити прототип виробляти кавову гущу з повітря. Джо подумав, що це дивно, що вони так зациклилися на цьому, але це не найдивніша річ, яку він знаходив у руїнах. І все ж, якщо це було варте таких зусиль, чому б не спробувати чашку?"
JOE_nf_events.3.a:0 "Та чашка змінила його життя"
JOE_nf_events.4.title:0 "Однією чашкою за раз"
JOE_nf_events.4.desc:0 "Джо старався нікому не розповідати, звідки він бере ці магічні зерна, але почав продавати їх скрізь, де міг. Спочатку іншим сміттярам, яким завжди потрібно бути бадьорими та уважними. Потім охоронцям караванів, яким подобалось щось, що допомагало не спати під час варти. Зрештою, майже кожен, хто проїжджав через Південний округ, зупинявся біля вежі Джо, щоб отримати свіжу чашку або мішечок меленої кави. Справ стало забагато для однієї людини, йому потрібні були працівники. Першим у списку на найм був..."
JOE_nf_events.4.a:0 "Маркетолог"
JOE_nf_events.4.b:0 "Привітна офіціантка"
JOE_nf_events.4.c:0 "Робот-продавець пончиків"
JOE_nf_events.5.title:0 "Ці мудаки"
JOE_nf_events.5.desc:0 "Братство не завжди було привітним, але з ними все одно можна було мати справу. А ці Ізгої в червоній фарбі були чимось іншим. Таке враження, що вони зібрали найбільших мудаків з усього Братства і заперли їх в одному форті. Їхнє ставлення до мешканців пусток було досить поганим, але ситуація ставала дедалі напруженішою, оскільки вони почали збиратися докупи і відправляти свої пошукові команди глибше в руїни. Це лише питання часу, коли вони почнуть забирати, а не обмінювати."
JOE_nf_events.5.a:0 "Нам треба бути обережними"
JOE_nf_events.6.title:0 "Проблеми з рейдерами"
JOE_nf_events.6.desc:0 "Продаж рейдерам — завжди ризикована справа. Ніколи не знаєш, чи заплатить той, з ким маєш справу, чи спробує встромити тобі ножа в ребра. Тим не менш, ті, хто приходить до вежі за меленою кавою, зазвичай більш розсудливі. Проблема в тому, що їхні друзі почали підбиратися ближче. Сміттярів обстрілюють частіше, і якщо ми не будемо обережні, нам доведеться мати справу не лише з кількома нервовими наркоманами."
JOE_nf_events.6.a:0 "Заплатити менш божевільним за захист"
JOE_nf_events.6.b:0 "Знайти найманців"
JOE_nf_events.6.c:0 "Ми повинні захищати себе самі"
JOE_nf_events.7.title:0 "Більше, ніж брухт"
JOE_nf_events.7.desc:0 "Битва за Форт Індепенденс була нелегкою. Ізгої билися зубами й нігтями, щоб не пустити нас, але зрештою ми дістали останнього з них. Те, що було всередині форту, безумовно, варте зусиль. За тими товстими дверима були могутні комплекти силової броні, смертельна енергетична зброя і справжня гора металобрухту. І це було навіть не найкраще. Всередині ми знайшли достатньо даних про силову броню, щоб без проблем лагодити власні комплекти."
JOE_nf_events.7.a:0 "О так, чорт забирай"
JOE_nf_events.8.title:0 "Час рухатися далі?"
JOE_nf_events.8.desc:0 "Форт Індепенденс — чудове місце. Чудове розташування, міцні стіни, підвал, повний радіотарганів, хороші речі. Це було б гарним місцем для перенесення операцій. З іншого боку, Вежа Джо має свої переваги. Бункер на нижніх рівнях все ще безпечний, це вже майже торговий центр, і ми вклали стільки праці в це місце. Це буде важкий вибір."
JOE_nf_events.8.a:0 "Давайте переїжджати"
JOE_nf_events.8.b:0 "Залишитися тут"
JOE_nf_events.9.title:0 "На брухт чи не на брухт?"
JOE_nf_events.9.desc:0 "Ізгоїв було ще менше, ніж Братства. Не дивно, що вони так покладалися на роботів. Тепер, коли вони зникли, ми маємо доступ до їхніх великих запасів роботів. Все, від протектронів до сторожових ботів, знаходиться на складі під Фортом Індепенденс. Хоча ми, безумовно, могли б використовувати легших роботів для деяких простих завдань, важчі — це інша справа. Чи справді нам потрібна купа сторожових ботів, чи нам просто продати їх?"
JOE_nf_events.9.a:0 "Хто взагалі купить тонну сторожових ботів?"
JOE_nf_events.10.title:0 "Напій, що підкорює Пустище"
JOE_nf_events.10.desc:0 "На сьогодні майже кожен у Столичному Пустищі пив або принаймні чув про каву Слокум Джо. Ні, не про білборди, які ви бачите на руїнах, що розвалюються. Ми говоримо про справжню річ. Колись відомий як Сміттяр Джо, він почав називати себе Слокум і зробив собі ім'я, продаючи каву, яку він бере з невідомого місця. Дехто припускає, що він знайшов старий склад, а інші думають, що він виявив автоматизовану гідропонну лабораторію. Як би там не було, він заробляє купу кришок і нещодавно відбився від Ізгоїв Братства з армією сміттярів. Тепер він звертається до нашої ради з діловою пропозицією. Він об'єднає свою кавову імперію з нашою новоствореною республікою, якщо це буде рівноправне партнерство. Він хоче місце за столом, як і будь-який інший лідер поселення. Враховуючи, скільки людей у рожевій силовій броні патрулюють південь округу Колумбія ці дні, це пропозиція, яку варто розглянути."
JOE_nf_events.10.a:0 "Ми приймаємо цю пропозицію"
JOE_nf_events.10.b:0 "§GДядько Роу домовиться про кращу угоду§!"
JOE_nf_evnets.10.c:0 "Відхилити пропозицію"

#Ideas#
JOE_caffinated_idea:0 "Кофеїнові"
JOE_caffinated_idea_desc:0 "Люди в армії Джо мають вільний доступ до його запасів свіжої кави. Під дією кофеїну вони здатні швидко рухатися й залишатися напоготові, але краще їх не бачити, поки вони не вип'ють свою ранкову чашку."
JOE_scav_tradition_idea:0 "Традиції сміттярів"
JOE_scav_tradition_idea_desc:0 "Майже кожен член охорони та ополчення Джо має певний досвід пошуку в руїнах Південного округу. Цей досвід дозволяє їм легко знаходити схованки з ресурсами, які інші солдати пропустили б, а також легше пристосовувати спорядження, знайдене на ворогах."
JOE_studied_outcasts_idea:0 "Вивчили Ізгоїв"
JOE_studied_outcasts_idea_desc:0 "Ми спостерігали, як Ізгої розправляються з якимись тупими рейдерами, і вчилися на їхніх помилках. Помилка номер один: не біжіть на хлопця з монтуванням, коли в нього мініган."
JOE_coffee_junkies_idea:0 "Кавові наркомани"
JOE_coffee_junkies_idea_desc:0 "Ополчення Джо складається з жменьки озброєних сміттярів і купи рейдерів, підсілих на щось під назвою кава."
JOE_merc_contracts_idea:0 "Найманські контракти"
JOE_merc_contracts_idea_desc:0 "Джо підписав серію контрактів з кількома малими та великими групами найманців по всьому Столичному Пустищу. Нові найманці завжди прибувають до Вежі Джо, щоб замінити тих, хто не вижив."
JOE_scrapper_training_idea:0 "Треновані збирачі"
JOE_scrapper_training_idea_desc:0 "Майже кожен член охорони та ополчення Джо має певний досвід пошуку в руїнах Південного округу. Цей досвід дозволяє їм легко знаходити схованки з ресурсами, які інші солдати пропустили б, а також легше пристосовувати спорядження, знайдене на ворогах. Цей досвід поєднано з бойовими навчаннями та тактичною підготовкою, перетворюючи цю армію сміттярів на грізну силу."
JOE_bot_scrappers_idea:0 "Збирачі ботів"
JOE_bot_scrappers_idea_desc:0 "Збирачам на службі в Джо наказано здавати на брухт майже всіх ботів, яких вони знайдуть, окрім Пончикового Бота."
JOE_scrapper_bots_idea:0 "Боти-збирачі"
JOE_scrapper_bots_idea_desc:0 "Джо та його збирачі почали використовувати роботів для допомоги у своїх пошукових операціях. З цими роботизованими в'ючними брамінами вони можуть значно розширити свій радіус дії та вантажопідйомність."
JOE_ready_for_anything_idea:0 "Готові до всього"
JOE_ready_for_anything_idea_desc:0 "Хлопці Джо здолали одних із найкрутіших людей по цей бік пусток. Щоб надрати їм дупи, знадобилося б щось на кшталт армії в якійсь вдосконаленій силовій броні з підтримкою з повітря або моторошний культ із нечестивою силою."
JOE_wasteland_scientists_idea:0 "Науковці з Пусток"
JOE_wasteland_scientists_idea_desc:0 "Пішов слух, що Джо наймає науковців для різних проєктів, платячи вдвічі більше, ніж більшість інших."
JOE_caffinated_guards_idea:0 "Кофеїнові охоронці"
JOE_caffinated_guards_idea_desc:0 "Від охоронців караванів до вартових поселень — якщо хтось тримає гвинтівку й дивиться на горизонт, він п'є чашечку кави Слокум Джо. Якісна кава, яка тримає їх напоготові до всього, що може статися."
JOE_promotional_mugs_idea:0 "Рекламні кухлі"
JOE_promotional_mugs_idea_desc:0 "За низьку ціну в 8 кришок ви можете отримати чашку кави за 5 кришок у кухлі за 3 кришки."
JOE_coffee_supply_idea:0 "Постачання кави"
JOE_coffee_supply_idea_desc:0 "Майже в кожному поселенні можна знайти мішечок меленої кави Слокум Джо, яку заварюють або продають торговці. Напій підкорив пустки, і ніхто не питає, звідки цей сміттяр узяв стільки кави посеред зруйнованого міста."
JOE_caffinated_masses_idea:0 "Кофеїнові маси"
JOE_caffinated_masses_idea_desc:0 "Навіщо воювати зі Слокум Джо, якщо замість цього можна випити гарну чашечку кави?"
JOE_tipping_culture_idea:0 "Культура чайових"
JOE_tipping_culture_idea_desc:0 "Це безпрограшна ситуація. Працівники щасливі, і ми щасливі, що не мусимо платити їм стільки."
JOE_america_runs_on_joe_idea:0 "Америка працює на Джо"
JOE_america_runs_on_joe_idea_desc:0 "Тепер, коли мешканці пусток отримали каву, вони не розуміють, як обходилися без неї. Цей ранковий заряд бадьорості — єдине, що змушує їх вставати з ліжка й іти на роботу. І саме тому вони ніколи не зроблять нічого, що могло б розлютити того, хто її постачає."

#National Focus#
JOE_nf_a001:0 "Сміттяр Джо"
JOE_nf_a001_desc:0 "Джо став відомий як один із найкращих сміттярів, які коли-небудь блукали руїнами Вашингтона, але роки тому навіть він був просто черговим дурним хлопчиськом, який шукав удачі в пеклі."
JOE_nf_a002:0 "Неймовірна можливість"
JOE_nf_a002_desc:0 "Коли у Братстві стався той маленький розкол, більшість людей впали у відчай, знаючи, що це призведе до нових атак супермутантів. Тим часом Джо побачив можливість."
JOE_nf_a003:0 "Знахідка життя"
JOE_nf_a003_desc:0 "Під старою регіональною штаб-квартирою Слокум Джо було щось дуже несподіване..."
JOE_nf_a004:0 "Будуючи імперію"
JOE_nf_a004_desc:0 "Ця кава — неймовірна річ. Не дивно, що в старому світі всі її пили!"
JOE_nf_a005:0 "Імперія з руїн"
JOE_nf_a005_desc:0 "Якщо Джо збирається будувати кавову імперію, його клієнти повинні мати змогу дістатися до нього!"
JOE_nf_a006:0 "Розчищення маршрутів"
JOE_nf_a006_desc:0 "Ніхто не має часу продиратися через тунелі метро заради чашечки кави. Нам потрібно розблокувати ці дороги!"
JOE_nf_a007:0 "Барикади зі сміття"
JOE_nf_a007_desc:0 "Те, що ми хочемо, щоб деякі люди заходили в наші руїни, не означає, що ми хочемо всіх."
JOE_nf_a008:0 "Місцеві плавильні"
JOE_nf_a008_desc:0 "Більшу частину цього сміття краще переплавити. Краще зробити це тут, ніж відправляти кудись."
JOE_nf_a009:0 "Прибирання в офісі"
JOE_nf_a009_desc:0 "Окрім окремих дірок, будівля Слокум Джо в досить хорошому стані. Просто потребує невеликого розчищення."
JOE_nf_a010:0 "T.C.O.B."
JOE_nf_a010_desc:0 "Тепер, коли всі ті дурні куби зникли, ми можемо облаштувати справжні майстерні."
JOE_nf_a011:0 "Тримати світло увімкненим"
JOE_nf_a011_desc:0 "Яка користь від майстерні, якщо ми нічого не бачимо? Хтось має повозитися з генератором."
JOE_nf_a012:0 "Рай для сміттярів"
JOE_nf_a012_desc:0 "Завдяки безпечному місцю для сну, їжі та чашці гарячої кави, більше сміттярів, ніж будь-коли, стікаються до Південного округу."
JOE_nf_a013:0 "Труби в гвинтівки"
JOE_nf_a013_desc:0 "Водопровід майже не працює. Краще використати ці труби з користю."
JOE_nf_a014:0 "Запросити зброярів"
JOE_nf_a014_desc:0 "Самопали — для бідних і відчайдушних. У Вашингтоні ми маємо більше штурмових гвинтівок, ніж знаємо, що з ними робити. Нам просто потрібно їх полагодити."
JOE_nf_a015:0 "Неприємні сусіди"
JOE_nf_a015_desc:0 "Ізгої — мудаки, і вони ясно дали зрозуміти, що їм не подобається, що ми нишпоримо в цих руїнах. Рано чи пізно вони можуть щось із цим зробити."
JOE_nf_a016:0 "Заробляти, поки можемо"
JOE_nf_a016_desc:0 "Можна й витягнути трохи кришок із цих мудаків у бляшаних костюмах, перш ніж вони почнуть у нас стріляти."
JOE_nf_a017:0 "Гідна пропозиція"
JOE_nf_a017_desc:0 "Нащо нам усі ці плати й розбиті старі комп'ютери? Краще обміняти їх на справжню зброю."
JOE_nf_a018:0 "Дістати великі гармати"
JOE_nf_a018_desc:0 "Джо знає хлопця, який може робити гармати, що пробиватимуть наскрізь ті старі комплекти силової броні. Вони можуть важити тонну, але це не так важко, як черевик T-45 на твоєму черепі."
JOE_nf_a019:0 "Спостерігати за їхньою роботою"
JOE_nf_a019_desc:0 "Типи з Братства зазвичай використовують ту саму тактику знову і знову. Спостереження за тим, як вони використовують ці прийоми на рейдерах, дасть нам перевагу, коли почнеться бій."
JOE_nf_a020:0 "Захистити наше"
JOE_nf_a020_desc:0 "Чи то мутанти, канібали, чи навіть Братство, завжди знайдуться мудаки, які намагатимуться витіснити нас із цієї території."
JOE_nf_a021:0 "Відкупитися від рейдерів"
JOE_nf_a021_desc:0 "Рейдери можуть бути ненадійними, але вони дешеві й замінні."
JOE_nf_a022:0 "Підсадити їх"
JOE_nf_a022_desc:0 "Хто б міг подумати, що хімічні наркомани можуть підсісти на кофеїн?"
JOE_nf_a023:0 "Кофеїнові та божевільні"
JOE_nf_a023_desc:0 "Ці рейдери скачуть по стінах, наче ми дали їм дозу психо. Тепер нам просто потрібно нацькувати їх на ворога."
JOE_nf_a024:0 "Найнята допомога"
JOE_nf_a024_desc:0 "З усіма грошима, які ми заробляємо, ми можемо дозволити собі трохи витратитися на захист."
JOE_nf_a025:0 "Ексклюзивні контракти"
JOE_nf_a025_desc:0 "Підписання Джо ексклюзивного контракту з якісною найманською компанією дозволить усім у Південному окрузі спати трохи спокійніше."
JOE_nf_a026:0 "Рейнджери вказують шлях"
JOE_nf_a026_desc:0 "На додаток до інших найманських груп, які ми найняли, Джо придбав ексклюзивні послуги добре відомої маленької команди, яка працює в руїнах Вашингтона."
JOE_nf_a027:0 "Покладатися одне на одного"
JOE_nf_a027_desc:0 "Навіщо нам віддавати наші кришки якимось найманим головорізам? Це наші території, і ми повинні захищати їх разом!"
JOE_nf_a028:0 "Обов'язкове навчання"
JOE_nf_a028_desc:0 "Кожен сміттяр знає, як битися, але битися пліч-о-пліч з іншими — нова концепція для багатьох із цих хлопців."
JOE_nf_a029:0 "Армія сміттярів"
JOE_nf_a029_desc:0 "Можливо, у них немає форми, стандартного спорядження, особливої підготовки чи відданості справі, але... е-е-е... я втратив нитку думки."
JOE_nf_a030:0 "Захисти свій мотлох!"
JOE_nf_a030_desc:0 "Ми знали, що одного дня це станеться..."
JOE_nf_a031:0 "Кожен сміттяр — солдат"
JOE_nf_a031_desc:0 "Неважливо, чи ти тут просто заради металобрухту, ці виродки все одно тебе пристрелять. Помри на ногах!"
JOE_nf_a032:0 "Поспішні барикади"
JOE_nf_a032_desc:0 "Уламки в руїнах Вашингтона можуть бути не просто перешкодою для нас. Вони можуть бути перешкодою і для них!"
JOE_nf_a033:0 "Золота жила"
JOE_nf_a033_desc:0 "Ізгої сиділи на ціннішому металобрухті, ніж будь-який сміттяр міг сподіватися знайти за все своє життя. Тепер він наш."
JOE_nf_a034:0 "Рейд на арсенали Ізгоїв"
JOE_nf_a034_desc:0 "Не щодня знаходиш арсенал, повний лазерних гвинтівок."
JOE_nf_a035:0 "Обережно, гаряче"
JOE_nf_a035_desc:0 "Єдине у Вашингтоні, що гарячіше за каву Джо."
JOE_nf_a036:0 "Відновлення T-45"
JOE_nf_a036_desc:0 "Ти думав, Братство просто ВИРОБИЛО мільйон комплектів силової броні T-45d? Ні, ти дурень, вони були єдиними, хто знав, як зібрати ці старі костюми, що іржавіють у руїнах, до цього часу."
JOE_nf_a037:0 "Старі креслення"
JOE_nf_a037_desc:0 "Більшість із нас не можуть зрозуміти цих схем силової броні. Але Джо знає кількох розумак, з якими мав справу роками, які можуть."
JOE_nf_a038:0 "Великі іграшки"
JOE_nf_a038_desc:0 "Єдине, що краще за велику гармату, — це ще більша гармата. В Ізгоїв було БАГАТО більших гармат."
JOE_nf_a039:0 "Нове лігво?"
JOE_nf_a039_desc:0 "Тепер, коли Форт Індепенденс під нашим контролем, деякі хлопці пропонують перенести туди нашу основну базу."
JOE_nf_a040:0 "Іди туди, де відбуваються події"
JOE_nf_a040_desc:0 "Форт, відремонтований Братством, набагато кращий за офісну будівлю, що розвалюється. Час переїжджати."
JOE_nf_a041:0 "Розширення торгових шляхів"
JOE_nf_a041_desc:0 "Тепер, коли в нас новий головний офіс, ми маємо розчистити купу нових маршрутів."
JOE_nf_a042:0 "Заповнити лабораторії"
JOE_nf_a042_desc:0 "Джо знає багато науковців з Пусток, які схопилися б за можливість працювати в лабораторії, побудованій Братством, без усієї цієї претензійності чи дурних мантій."
JOE_nf_a043:0 "Злам дослідницьких терміналів"
JOE_nf_a043_desc:0 "Ізгої тримали свої секрети під замком, але недостатньо міцним, щоб не пустити відданого сміттяра."
JOE_nf_a044:0 "Оновлення IFF"
JOE_nf_a044_desc:0 "Якщо ми зможемо змусити ці турелі припинити стріляти в нас, ми зможемо ввімкнути їх знову."
JOE_nf_a045:0 "Південна варта"
JOE_nf_a045_desc:0 "Ті дивні виродки на південь від нас викликають у мене мурашки. Придивляйся до них."
JOE_nf_a046:0 "Залишитися"
JOE_nf_a046_desc:0 "Я не хочу тягнути половину нашого добра в нове місце. Давайте просто залишимося там, де ми є."
JOE_nf_a047:0 "Розібрати форт на брухт"
JOE_nf_a047_desc:0 "Якщо ми не збираємося використовувати форт, ми можемо забрати зі стін усе, що зможемо."
JOE_nf_a048:0 "Прийняти корпоративну культуру"
JOE_nf_a048_desc:0 "Це місце — бізнес, і нам час почати поводитися відповідно. Крок перший: підкупити кілька караванів, щоб вийти на торговельну мережу."
JOE_nf_a049:0 "T.G.I.F."
JOE_nf_a049_desc:0 "Ми не знаємо, що це означає, але Джо подовжив щасливі години в барі по п'ятницях."
JOE_nf_a050:0 "Екзекьютрон"
JOE_nf_a050_desc:0 "Ми знайшли старого бота в одній із шаф, який, здається, має хист до бізнесу."
JOE_nf_a051:0 "Переміщення обладнання"
JOE_nf_a051_desc:0 "У Форті Індепенденс було достатньо запасного обладнання, щоб ми могли облаштувати майстерні й тут."
JOE_nf_a052:0 "Іржаві боти"
JOE_nf_a052_desc:0 "Ізгоям, безумовно, подобалися їхні роботи. Але що ми з ними робитимемо?"
JOE_nf_a053:0 "Продати їх"
JOE_nf_a053_desc:0 "Джо знає торговця, який із задоволенням купить у нас усіх роботів за гарну ціну."
JOE_nf_a054:0 "Збирачі ботів"
JOE_nf_a054_desc:0 "З небагатьох ботів, яких ми не можемо продати, принаймні можна виручити кришки, розібравши їх на запчастини."
JOE_nf_a055:0 "Використати їх"
JOE_nf_a055_desc:0 "Не завадить мати бота, який прикриває твою спину, поки ти копирсаєшся в руїнах. Запустіть їх."
JOE_nf_a056:0 "Боти-збирачі"
JOE_nf_a056_desc:0 "Якого біса я маю тягати 200 фунтів мотлоху, якщо можу причепити його на спину робота?"
JOE_nf_a057:0 "Бути напоготові"
JOE_nf_a057_desc:0 "Після того, як ми захопили Форт Індепенденс, багато хто на нас дивиться. Без сумніву, незабаром нам доведеться турбуватися про когось іншого."
JOE_nf_a058:0 "Шукати захисту"
JOE_nf_a058_desc:0 "Ця нова Республіка Східного Узбережжя, що формується, здається саме тим діловим партнером, якого ми хотіли б мати."
JOE_nf_a059:0 "Давати й брати"
JOE_nf_a059_desc:0 "Хороше партнерство — це давати й брати. Вони дають нам розумак для роботи в наших лабораторіях, а ми беремо їх."
JOE_nf_a060:0 "Рекламні кухлі"
JOE_nf_a060_desc:0 "Протягом обмеженого часу отримайте безкоштовний кухоль при купівлі чашки кави.\n\n Просто не звертайте уваги, що ми підняли ціну на каву на 3 кришки."
JOE_nf_a061:0 "Придбання талантів"
JOE_nf_a061_desc:0 "Бізнес, що розвивається, завжди приваблює нові таланти."
JOE_nf_a062:0 "Повернення інвестицій"
JOE_nf_a062_desc:0 "Бізнес іде добре, і ми нарешті починаємо бачити, як це окупається."
JOE_nf_a063:0 "Кавова столиця Східного Узбережжя"
JOE_nf_a063_desc:0 "Чутки поширюються далеко, що Слокум Джо — це те місце, куди треба йти, якщо хочеш гарячої кави. Допомагає те, що по цей бік Міссісіпі каву не вирощують."
JOE_nf_a064:0 "Рожевий — це новий чорний"
JOE_nf_a064_desc:0 "Так, розмальовка Анклаву лякає. Але чи підвищує вона впізнаваність бренду?"
JOE_nf_a065:0 "Ми візьмемо будь-кого"
JOE_nf_a065_desc:0 "Ми відбилися від клятого братства*! Ми можемо впоратися з будь-ким, хто спробує зазіхнути на те, що ми захопили!\n\n\n*§RІзгої§!"
JOE_nf_a066:0 "Кофеїнізувати маси"
JOE_nf_a066_desc:0 "Чому хтось воюватиме з нами, якщо замість цього вони можуть насолодитися чашечкою гарної кави?"
JOE_nf_a067:0 "Дай чайові або помри"
JOE_nf_a067_desc:0 "Джо знайшов стару книгу в одному з офісів про щось під назвою «Культура чайових» і впевнений, що це наступний крок для розвитку бізнесу."
JOE_nf_a068:0 "Рано чи пізно..."
JOE_nf_a068_desc:0 "У них могли бути розбіжності, але багатьом людям у Братстві не подобається бачити, як ми розгулюємо в силовій броні їхніх мертвих друзів."
JOE_nf_a069:0 "Трофеї Цитаделі"
JOE_nf_a069_desc:0 "Цитадель — це навіть більший куш, ніж Форт Індепенденс. Але що справді добре, так це те, що ми знайшли на старому комп'ютері..."
JOE_nf_a070:0 "Америка працює на Джо"
JOE_nf_a070_desc:0 "Ми не зупинимося, доки в кожної людини в цьому пустищі вранішній ритуал не включатиме зупинку в одній з наших кав'ярень. Подобається їм це чи ні, Пустище буде працювати на каві Слокум Джо."

