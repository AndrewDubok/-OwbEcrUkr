    OUT_keep_out_tt:0 "Мы беспрепятственно прочесываем руины, но мы не можем обыскивать все места в одиночку..."
    OUT_limited_dealings_tt:0 "Мародёры могут находить то, чего нам не хватает, но иногда они могут вставать у нас на пути."
    OUT_sowing_chaos_tt:0 "Когда мы атакуем предателей, наши агенты повергнут их в хаос!"
    OUT_will_fight_lyons_tt:0 "§OМы будем готовиться к войне с Отделением Лайонса§!"
	OUT_will_join_lyons_tt:0 "§CМы постараемся наладить отношения с Лайонсом, если только они не совершат какую-нибудь глупость.§!"
