	OUT_hunting_tapes_tooltip:0 "Разблокирует решение на поиски записей Келлера"

    ###########
    ###Ideas###
    ###########
	OUT_ghoul_fighter_idea:0 "Исследования гулей"
 	OUT_ghoul_fighter_idea_desc:0 "Данные исследований, собранные на заводе «Красный гонщик», открыли нам кое-что, чего мы не знали о диких. Если нам когда-нибудь придётся столкнуться с их многочисленной армией, у нас будет пара козырей в рукаве."
  	OUT_materials_printer_idea:0 "Перепрограммированный принтер"
	OUT_materials_printer_idea_desc:0 "Прототип кофемашины, которую Слокум Джо использовал для приготовления кофе, способен производить и другие мелкие предметы. Наши специалисты работают над её перепрограммированием для производства запасных частей, количество которых ограничено."
 	OUT_welcomed_scribes_idea:0 "Писцы Лайонса"
  	OUT_welcomed_scribes_idea_desc:0 "Писцы из Отделения Лайонса допущены в наши ряды. Время от времени они конфликтуют с нашими специалистами, но в остальном всё идёт гладко."
   	OUT_keeping_purity_idea:0 "Торговый пост на проекте «Чистота»"
	OUT_keeping_purity_idea_desc:0 "Работа в проекте «Чистота», это то задание, которого боятся все специалисты и защитники. Это не оружейная лаборатория или что-то особенное, но продажа воды помогает нам получать материалы, критически важные для нашей миссии."
 	OUT_certainty_of_steel_idea:0 "Уверенность стали"
  	OUT_certainty_of_steel_idea_desc:0 "У нас недостаточно сил, чтобы выставить большое количество Защитников. Вместо этого мы развернем армию перепрограммированных машин для защиты наших операций."
	OUT_mighty_machines_idea:0 "Уверенность стали"
  	OUT_mighty_machines_idea_desc:0 "У нас недостаточно сил, чтобы выставить большое количество Защитников. Вместо этого мы развернем армию перепрограммированных машин для защиты наших операций."  	
	OUT_many_machines_idea:0 "Уверенность стали"
  	OUT_many_machines_idea_desc:0 "У нас недостаточно сил, чтобы выставить большое количество Защитников. Вместо этого мы развернем армию перепрограммированных машин для защиты наших операций." 
   	OUT_mixed_approach_idea:0 "Роботизированная поддержка"
	OUT_mixed_approach_idea_desc:0 "Перепрограммированные роботы пополняют наши ряды и сопровождают наших Защитников на поле боя."
   	OUT_mixed_tough_idea:0 "Роботизированная поддержка"
	OUT_mixed_tough_idea_desc:0 "Перепрограммированные роботы пополняют наши ряды и сопровождают наших Защитников на поле боя."
    OUT_mixed_deadly_idea:0 "Роботизированная поддержка"
	OUT_mixed_deadly_idea_desc:0 "Перепрограммированные роботы пополняют наши ряды и сопровождают наших Защитников на поле боя."
 	OUT_strong_troops_idea:0 "Стойкие защитники"
  	OUT_strong_troops_idea_desc:0 "Недостаток численности мы компенсируем лучшей подготовкой и снаряжением."
 	OUT_strong_armor_idea:0 "Стойкие защитники"
  	OUT_strong_armor_idea_desc:0 "Недостаток численности мы компенсируем лучшей подготовкой и снаряжением."
 	OUT_mixed_armor_idea:0 "Стойкие защитники"
  	OUT_mixed_armor_idea_desc:0 "Недостаток численности мы компенсируем лучшей подготовкой и снаряжением."
   	OUT_lyons_preparation_idea:0 "Боевые учения в силовой броне"
	OUT_lyons_preparation_idea_desc:0 "Наши Защитники готовятся к бою с солдатами в силовой броне."
 	OUT_scribe_cooperation_idea:0 "Сотрудничество писцов"
  	OUT_scribe_cooperation_idea_desc:0 "Писцы из Цитадели делятся заметками с нашими специалистами."
   	OUT_synnergy_idea:0 "Синергия гулей"
	OUT_synnergy_idea_desc:0 "С ордой диких гулей трудно сражаться. Орда диких гулей, поддерживаемая солдатами в силовой броне, это кошмар."
 	OUT_unknowable_idea:0 "Непознаваемые прозрения"
  	OUT_unknowable_idea_desc:0 "Наши исследования скрытых истин вселенной помогли нам в изучении более обыденных вещей, таких как севооборот."
   	OUT_accolytes_idea:0 "Аколиты"
	OUT_accolytes_idea_desc:0 "Жители пустошей, которые ищут знания, которыми обладаем мы, могут доказать свою ценность, сражаясь и умирая ради достижения наших целей."
 	OUT_blackhall_leadership_idea:0 "Лидерство Блэкхолла"
  	OUT_blackhall_leadership_idea_desc:0 "Блэкхолл показывает нам пути последователей Уг-Куолтота."
    
    ######################
    ###National Focuses###
    ######################
    OUT_nf_a001:0 "Упаковка вещей"
    OUT_nf_a001_desc:0 "Мы знали, что пришло время уходить, но мы не собирались уходить с пустыми руками."
    OUT_nf_a002:0 "Смахивание паутины"
    OUT_nf_a002_desc:0 "Форт Индепенденс, это не Цитадель, но со временем, возможно, он сможет ею стать."
    OUT_nf_a003:0 "Перемещение ресурсов"
    OUT_nf_a003_desc:0 "Лайонс был не настолько глуп, чтобы оценить по достоинству Форт-Индепенденс. Это облегчило нам задачу."
    OUT_nf_a004:0 "Старейшина во всем, кроме имени"
    OUT_nf_a004_desc:0 "Хоть Лайонс и предатель, Касдин не может просто так объявить себя старейшиной."
    OUT_nf_a005:0 "Истинный путь"
    OUT_nf_a005_desc:0 "Наша миссия всегда заключалась в обеспечении безопасности важной техники, а не в том, чтобы нянчиться с мусором на пустыре. Теперь мы можем делать то, зачем пришли сюда."
    OUT_nf_a006:0 "Просеивая мусор"
    OUT_nf_a006_desc:0 "За последние 200 лет множество оружия проржавело настолько, что перестало быть пригодным к использованию, однако из большинства ненужных винтовок можно извлечь одну или две рабочие детали."
    OUT_nf_a007:0 "Не от мира сего"
    OUT_nf_a007_desc:0 "Житель пустоши в комбинезоне Убежища уже давно продаёт нам технику. Недавно они принесли нечто настолько странное, что это почти инопланетянин."
    OUT_nf_a008:0 "Очистить перекресток Бейлис"
    OUT_nf_a008_desc:0 "Наши первые поиски в районе перекрёстка Бейлис указывают на то, что в руинах спрятано нечто ценное. Нам просто нужно зачистить территорию."
    OUT_nf_a009:0 "Принять помощь извне"
    OUT_nf_a009_desc:0 "Мы не можем попасть на нижние уровни, не завершив симуляцию. Для этого нам нужен Пип-бой и добровольный доброволец. Мы наверняка могли бы сделать так, чтобы это стоило их усилий."
    OUT_nf_a010:0 "Найти собственный Пип-Бой"
    OUT_nf_a010_desc:0 "Зачем нам полагаться на мусорщиков, если мы можем найти свой собственный Пип-Бой?"
    OUT_nf_a011:0 "Операция Анкоридж"
    OUT_nf_a011_desc:0 "Моделирование завершено, карантин снимается. Посмотрим, что у нас получилось."
    OUT_nf_a012:0 "Держать дистанцию"
    OUT_nf_a012_desc:0 "Столичная Пустошь должна была стать лишь одной остановкой, а не конечной точкой нашей миссии. Пора вернуться туда и посмотреть, что ещё ждёт своих раскопок."
    OUT_nf_a013:0 "Записи Келлера"
    OUT_nf_a013_desc:0 "Даже мы не можем взломать этот проклятый бункер. Но, по крайней мере, мы нашли подсказку к комбинации."
    OUT_nf_a014:0 "Настоящий приз"
    OUT_nf_a014_desc:0 "§RКакого черта нам нужно стрелять в 8 таких штук одновременно?§!"
    OUT_nf_a015:0 "Стальная уверенность"
    OUT_nf_a015_desc:0 "Мы больше не получаем поддержки. Нам нужно использовать альтернативы везде, где это возможно."
    OUT_nf_a016:0 "Могучие машины"
    OUT_nf_a016_desc:0 "Сколоченная на скорую руку ржавая махина не выдержит продолжительного огня. Наши боевые машины должны быть лучшими из лучших."
    OUT_nf_a017:0 "Лучше, быстрее, сильнее"
    OUT_nf_a017_desc:0 "Только имея лучшие машины, мы сможем сохранить наше превосходство."
    OUT_nf_a018:0 "Множество техники"
    OUT_nf_a018_desc:0 "Протектрон не выдержит .50-калибр, сколько бы оружия мы к нему ни прикрутили. Сосредоточимся на том, чтобы поставить между нами и врагом побольше роботов."
    OUT_nf_a019:0 "Оптимизация производства"
    OUT_nf_a019_desc:0 "Создание линии сборки роботов позволяет нам производить больше машин, чем при назначении их на одного защитника. Почему мы не додумались до этого раньше?"
    OUT_nf_a020:0 "Только что с конвейера"
    OUT_nf_a020_desc:0 "Последняя партия боевых роботов готова выйти на поле боя."
    OUT_nf_a021:0 "Дополнительный подход"
    OUT_nf_a021_desc:0 "Роботы хороши для поглощения вражеских пуль, но они никогда не заменят Защитника в Т45."
    OUT_nf_a022:0 "Закаляйтесь"
    OUT_nf_a022_desc:0 "Броня на наших костюмах и наших роботах должна быть лучшей, потому что мы точно не сможем производить намного больше."
    OUT_nf_a023:0 "Сильнее и быстрее"
    OUT_nf_a023_desc:0 "Броня и роботы 200-летней давности хороши, но могли быть и лучше."
    OUT_nf_a024:0 "Серьёзная мощь"
    OUT_nf_a024_desc:0 "Наше оружие должно быть самым смертоносным в пустоши. Так мы не дадим мародёрам проникнуть внутрь."
    OUT_nf_a025:0 "Бип бип, пиф пиф"
    OUT_nf_a025_desc:0 "Всё просто. У нас есть большие лазерные пушки и смертоносные роботы. Так что уйди с дороги."
    OUT_nf_a026:0 "На марше"
    OUT_nf_a026_desc:0 "Защитники при поддержке роботов готовы вернуться в пустошь."
    OUT_nf_a027:0 "Сила убеждения"
    OUT_nf_a027_desc:0 "Нам не нужны вёдра с болтами, чтобы пополнить нашу численность. Наша сила в нашей подготовке и решимости."
    OUT_nf_a028:0 "Защитники в сияющих доспехах"
    OUT_nf_a028_desc:0 "Каждому Защитнику на поле боя будет выдан комплект силовой брони. К сожалению, это означает, что большему числу людей придётся оставаться в форте и обслуживать эти комплекты."
    OUT_nf_a029:0 "Лазерная фокусировка"
    OUT_nf_a029_desc:0 "У защитников, засевших в форте, есть некоторые идеи по улучшению нашего снаряжения."
    OUT_nf_a030:0 "Не всякая броня блестит"
    OUT_nf_a030_desc:0 "У нас недостаточно силовой брони на всех. Некоторым младшим Защитникам придётся обходиться боевой."
    OUT_nf_a031:0 "Баланс приоритетов"
    OUT_nf_a031_desc:0 "Наше внимание немного распылено на различные типы оборудования, но это не мешает нам совершенствовать его."
    OUT_nf_a032:0 "Готов к бою"
    OUT_nf_a032_desc:0 "Реорганизованные защитники готовы выйти на поле."
    OUT_nf_a033:0 "Уборка"
    OUT_nf_a033_desc:0 "За годы в форте накопилось много мусора и хлама, его следует выбросить."
    OUT_nf_a034:0 "Укомплектование постов охраны"
    OUT_nf_a034_desc:0 "Мародёры и рейдеры продолжают рыться вокруг нашего форта. Будьте начеку."
    OUT_nf_a035:0 "Разборка хлама"
    OUT_nf_a035_desc:0 "У этих старых сломанных машин все еще есть несколько деталей, которые блестят под слоем ржавчины."
    OUT_nf_a036:0 "Очистить лабораторное пространство"
    OUT_nf_a036_desc:0 "Хоть тут и тесновато, но места для нескольких лабораторий достаточно."
    OUT_nf_a037:0 "Вытащить ПВО"
    OUT_nf_a037_desc:0 "В подвале есть несколько больших пушек, когда-то предназначенных для сбивания самолётов. Мы не видели никого летающего с тех пор, как сюда прибыли, но кто знает, что нас ждёт в будущем? Лучше вынести их на всякий случай."
    OUT_nf_a038:0 "Только поверхностное знакомство"
    OUT_nf_a038_desc:0 "Почти каждое значимое здание в Вашингтоне имело глубокие подвалы и потолочные уровни. Форт Индепенденс не был исключением."
    OUT_nf_a039:0 "Установить станки"
    OUT_nf_a039_desc:0 "Новое пространство, которое мы расчистили, идеально подходит для еще одной оружейной мастерской."
    OUT_nf_a040:0 "Пнуть генераторы"
    OUT_nf_a040_desc:0 "Где-то в недрах Форта Индепенденс есть несколько генераторов, которые можно починить с помощью клейкой ленты и металлолома."
    OUT_nf_a041:0 "Скопировать китайские чертежи"
    OUT_nf_a041_desc:0 "Хоть это и не оригинальные схемы, чертежей, взятых с захваченного оборудования, должно быть достаточно, чтобы мы могли воспроизвести эти китайские технологии."
    OUT_nf_a042:0 "Братство Драгунов"
    OUT_nf_a042_desc:0 "Силовая броня, возможно, и является главенствующей на поле боя, но есть ценность и в более легких войсках, способных выпутаться из неприятностей так же легко, как и попасть в них."
    OUT_nf_a043:0 "Прикладная робототехника"
    OUT_nf_a043_desc:0 "Китайская философия дизайна в отношении робототехники сильно отличается от довоенной американской. Есть несколько элементов, которые мы можем применить в наших собственных разработках."
    OUT_nf_a044:0 "Американские Лидбелчеры"
    OUT_nf_a044_desc:0 "Некоторые вещи выдерживают одну-две пули. Мало что выдерживает сто."
    OUT_nf_a045:0 "Вот и бум"
    OUT_nf_a045_desc:0 "Для тех немногих вещей, которые могут выдержать 100 пуль, у нас есть взрывчатка."
    OUT_nf_a046:0 "Американская доктрина"
    OUT_nf_a046_desc:0 "Пока мы дисциплинированы, мы не можем забывать, что война - это хаос. Мы должны научиться процветать в ней."
	OUT_nf_a047:0 "Усиленные баррикады"
	OUT_nf_a047_desc:0 "Несколько кусков металлолома и бетонных плит могут превратить небольшую насыпь из мешков с песком в мощную боевую позицию."
	OUT_nf_a048:0 "Мы будем готовы"
	OUT_nf_a048_desc:0 "В небе над Столичной Пустошью были замечены винтокрылы. Мы не позволим себя поймать, не имея возможности противостоять этой воздушной мощи."
	OUT_nf_a049:0 "Поддержка промышленности"
	OUT_nf_a049_desc:0 "Обслуживание оружия - это не только чистка деталей и сборка оружия. Нам также нужна помощь в изготовлении компонентов и инструментов, необходимых для создания этих чёртовых штук."
	OUT_nf_a050:0 "Производство композитов"
	OUT_nf_a050_desc:0 "Современное оборудование требует современных материалов. Именно поэтому нам необходимо разрабатывать собственные композитные материалы."
	OUT_nf_a051:0 "Производственные технологии"
	OUT_nf_a051_desc:0 "Мы не можем просто положиться на целую печатную плату. Нам нужно сделать свою собственную."
	OUT_nf_a052:0 "Перепрофилирование симулятора"
	OUT_nf_a052_desc:0 "Теперь, когда мы завершили симуляцию Анкориджа, мы можем поработать с её кодом. Возможно, мы даже сможем создать собственные симуляции боя, которые не убьют вас в случае поражения."
	OUT_nf_a053:0 "Сброс выключателей"
	OUT_nf_a053_desc:0 "При работающих генераторах мы сможем подключить другие системы, но не раньше, чем выясним, куда идут некоторые из этих проводов."
	OUT_nf_a054:0 "Переработка реликвий"
	OUT_nf_a054_desc:0 "Обладая необходимыми знаниями, мы можем даже починить вещи, которые, казалось бы, уже не подлежат восстановлению."
	OUT_nf_a055:0 "Производственные процессы"
	OUT_nf_a055_desc:0 "Если для ремонта винтовки вам приходится заменять 99 процентов ее деталей, то лучше научиться делать новую самостоятельно."
    OUT_nf_b001:0 "Разберитесь с невежами"
    OUT_nf_b001_desc:0 "Банда мародёров на юге округа Вашинтона стала для нас настоящей занозой. Давайте вынесем мусор, пока они не стали более организованными."
    OUT_nf_b002:0 "НЕ ВХОДИТЬ!"
    OUT_nf_b002_desc:0 "Какой смысл впускать сюда мусорщиков, после того как мы их только что выгнали? Главное, чтобы они не возвращались."
    OUT_nf_b003:0 "Ограниченная торговля"
    OUT_nf_b003_desc:0 "Не стоит тратить усилия на перекопку каждой кучи мусора. Пусть какие-нибудь падальщики покопаются там за нас, лишь бы мы первыми увидели, что найдут."
    OUT_nf_b004:0 "«LOB Enterprises»"
    OUT_nf_b004_desc:0 "Старые документы указывают на то, что здесь располагалась компания по разработке огнестрельного оружия. Наверняка в их архивах есть что-то полезное."
    OUT_nf_b005:0 "Фабрика «Красный Гонщик»"
    OUT_nf_b005_desc:0 "Если раскопки в руинах старого мира чему-то нас и научили, так это тому, что простая, ничем не примечательная компания по производству игрушек может оказаться чем угодно, если копать как следует."
    OUT_nf_b006:0 "Секретная смесь Джо"
    OUT_nf_b006_desc:0 "Теперь мы знаем, откуда Джо взял весь этот чертов кофе."
    OUT_nf_b007:0 "Что происходит?"
    OUT_nf_b007_desc:0 "Мы думали, что Анклав был уничтожен за несколько лет до того, как мы вышли на Восток. \n\n Мы ошибались."
    OUT_nf_b008:0 "§OДостаточно - значит ДОСТАТОЧНО§!"
    OUT_nf_b008_desc:0 "Технологии Анклава затапливает Столичную Пустошь. Пустошь опустошена бандой Лайонса, кровоточащей сердцами. Что они собираются с ней делать? Качать воду быстрее?"
    OUT_nf_b009:0 "Боевые учения в силовой броне"
    OUT_nf_b009_desc:0 "Предатели Лайонса имеют недавний опыт сражений с врагами в силовой броне. У нас его нет. Если мы не подготовимся, они могут оказать нам нешуточный отпор!"
    OUT_nf_b010:0 "Пробить насквозь"
    OUT_nf_b010_desc:0 "Если мы собираемся взять Цитадель, нам понадобится оружие, немного более мощное, чем лазерная винтовка."
    OUT_nf_b011:0 "Потерять покраску"
    OUT_nf_b011_desc:0 "Предатели в Цитадели приняли практически всех, кто хоть как-то умеет махать палкой. Среди хаоса Войны Анклава и их несбыточной мечты об очистителе несколько рыцарей в приличном облачении могли свободно входить и выходить, не поднимая тревоги."
    OUT_nf_b012:0 "Хаос и путаница"
    OUT_nf_b012_desc:0 "Мы совершили достаточно походов по Цитадели, и Касдин почти уверен, что мы могли бы нанести несколько ударов по планам Лайонса, если бы нам удалось разместить одного или двух Защитников в нужном месте."
    OUT_nf_b013:0 "Операция Дефанг"
    OUT_nf_b013_desc:0 "Ещё немного подготовки, и Лайонс может это заметить. Сейчас самое время нанести удар."
    OUT_nf_b014:0 "Остаться в Индепенденс"
    OUT_nf_b014_desc:0 "Цитадель сильно пострадала в боях. Сейчас нам лучше просто оставаться на месте."
    OUT_nf_b015:0 "Вальс назад"
    OUT_nf_b015_desc:0 "После того, как мы сражались за возвращение Цитадели, почему бы нам, черт возьми, не сделать ее нашей главной базой?"
    OUT_nf_b016:0 "Писцы"
    OUT_nf_b016_desc:0 "Теперь, когда Лайонс ушел, нам придется решить, что делать с писцами, которые остались после нашего ухода."
    OUT_nf_b017:0 "Руководство"
    OUT_nf_b017_desc:0 "Если кто-то и заслуживает нашего гнева, так это паладины и высокопоставленные писцы, которые поддержали предателя Лайонса."
    OUT_nf_b018:0 "Рыцари"
    OUT_nf_b018_desc:0 "Многие из этих рыцарей - никчёмные твари, но не все. Некоторые из них когда-то были нашими братьями."
    OUT_nf_b019:0 "§CМягкость не порок§!"
    OUT_nf_b019_desc:0 "Мы бы никогда не подумали, что Лайонс и его армия отбросов смогут уничтожить силы Анклава, кишащие на Столичной Пустоши, но каким-то образом им это удалось. Возможно, в его безумии есть какая-то система."
    OUT_nf_b020:0 "Живи и дай жить другим?"
    OUT_nf_b020_desc:0 "Предатель скончался, и его орден доказал, что заслуживает уважения. Возможно, нам стоит прекратить борьбу."
    OUT_nf_b021:0 "Запросить копии"
    OUT_nf_b021_desc:0 "Теперь, когда мы больше не воюем, можем ли мы взглянуть на схемы Анклава?"
    OUT_nf_b022:0 "Биржа Фэрфакса"
    OUT_nf_b022_desc:0 "У другого Братства есть интересы в руинах Фэрфакса, и мы хотели бы осмотреть авиабазу Адамс. Давайте заключим сделку."
    OUT_nf_b023:0 "Братство на расстоянии вытянутой руки"
    OUT_nf_b023_desc:0 "Новый старейшина сделал интересное предложение. Мы будем работать вместе в областях, представляющих взаимный интерес, и плечом к плечу бороться с любыми серьёзными угрозами, но в остальном наши отделения будут придерживаться собственных целей. Они даже предложили заново внести имена наших членов в свитки."
    OUT_nf_b024:0 "Не будет стакана?"
    OUT_nf_b024_desc:0 "Если они просто раздают воду, почему мы тоже не можем ее получить?"
    OUT_nf_b025:0 "Вспомнить былые походы"
    OUT_nf_b025_desc:0 "Обмен отчетами о проделанной работе мог бы научить оба наших отделения кое-чему новому."
    OUT_nf_b026:0 "Рев львицы"
    OUT_nf_b026_desc:0 "Новый старейшина приезжает в Форт-Индепенденс на встречу с Касдином. Судя по её голосу по радио, встреча будет не из приятных..."
    OUT_nf_b027:0 "Выжидание своего времени"
    OUT_nf_b027_desc:0 "Это лишь вопрос времени, когда Лост-Хиллс выйдет на связь или юный Мэксон докажет свою готовность к тому, что ему причитается по праву рождения. А пока мы будем подыгрывать."
    OUT_nf_b028:0 "На шаг дальше"
    OUT_nf_b028_desc:0 "Мы ничего не говорили о трате ресурсов на раздачу воды, продаже ценных технологий жителям пустошей или даже о каких-либо подобных изменениях политики. Но писать совершенно новый кодекс? Мы не можем этого допустить."
    OUT_nf_b029:0 "Слишком бесхребетный, чтобы быть лидером"
    OUT_nf_b029_desc:0 "Сара Лайонс умерла, и они выбрали... Писца Боудича? Даже не Звёздного Паладина Кросса? Они поставили этого бесхребетного труса во главе? Мы и так уже слишком долго всё пускали на самотёк!"
    OUT_nf_b030:0 "Последующие зачистки"
    OUT_nf_b030_desc:0 "Их экспедиции куда-то отправляются, пинают пару камней и, возможно, возвращаются с коробкой технических документов. Не мы, мы более дотошны."
    OUT_nf_b031:0 "Сотрудничество Писцов"
    OUT_nf_b031_desc:0 "Нашим писателям не помешало бы поделиться друг с другом некоторыми соображениями."
    OUT_nf_b032:0 "§RЦитадель пала§!"
    OUT_nf_b032_desc:0 "Когда Анклав начал летать над Столичной Пустошью, мы знали, что Лайонс и его отбросы ничего не смогут с ними поделать."
    OUT_nf_b033:0 "Открыть наши двери"
    OUT_nf_b033_desc:0 "Некоторые из наших бывших братьев, оставшихся в Цитадели, теперь слоняются по Форту Индепенденс и просятся к нам. Мы не можем позволить себе отослать их, хотя они этого и заслуживают."
    OUT_nf_b034:0 "Из паладинов в защитников"
    OUT_nf_b034_desc:0 "Некоторые из наших братьев, оставшихся позади, опытные бойцы и лидеры. Они заслужили звание Защитника."
    OUT_nf_b035:0 "Продолжать путь"
    OUT_nf_b035_desc:0 "Вы отвлекли нас от нашей миссии, назвали предателями, а теперь просите о помощи? Смешная шутка. Сдайте снаряжение и идите отсюда."
    OUT_nf_b036:0 "Мы созданы разными"
    OUT_nf_b036_desc:0 "Анклав, возможно, и победил предателей Лайонса, но мы - не они. Мы - лучшие из лучших."
    OUT_nf_b037:0 "ВЫГОНИТЕ ИХ!"
    OUT_nf_b037_desc:0 "Анклав утверждает, что Цитадель принадлежит им. Давайте покажем им, как они ошибаются."
    OUT_nf_b038:0 "Ты не можешь вернуться"
    OUT_nf_b038_desc:0 "Большая часть Цитадели была повреждена в ходе боевых действий, но среди обломков все еще можно найти несколько алмазов."
    OUT_nf_b039:0 "Помощь или помеха?"
    OUT_nf_b039_desc:0 "Анклав, как и Лайонс, видел ценность в проекте «Чистота». Возможно, стоит за него держаться."
    OUT_nf_b040:0 "Раскопки Рэйвен-Рока"
    OUT_nf_b040_desc:0 "Рэйвен-Рок был разрушен в ходе боевых действий, и вряд ли сохранилось какое-либо ценное оборудование. Нам всё ещё нужно осмотреть его."
    OUT_nf_b041:0 "Перебрать добычу"
    OUT_nf_b041_desc:0 "Вам придется практически взорвать костюм ПСБ на куски, чтобы убить человека внутри него, но если вы соберете вместе 10-20 мертвых солдат Анклава, то, возможно, вам удастся собрать из них рабочий доспех."
    OUT_nf_b042:0 "Защита авиабазы Адамс"
    OUT_nf_b042_desc:0 "Мы сбили почти каждый винтокрыл, пытавшийся покинуть эту базу, но, должно быть, вокруг сидело не только несколько птиц."
    OUT_nf_b043:0 "Специальное оборудование"
    OUT_nf_b043_desc:0 "Благодаря деталям, спасённым с авиабазы ​​Адамс, у нас, возможно, появится возможность восстановить связь с Лост-Хиллз. Нам просто нужно немного времени, чтобы собрать всё воедино."
    OUT_nf_b044:0 "Звонок домой"
    OUT_nf_b044_desc:0 "Пришло время. Пора снова встретиться с Лост-Хиллз. Последние несколько лет дадут нам отличный отчёт."
	OUT_nf_c001:0 "§0Силы за пределами понимания"
 	OUT_nf_c001_desc:0 "Циклопических мостов - сооружений, построенных некой древней расой, вымершей и забытой до того, как эти существа прибыли на Уггот из глубин пустоты, - должно быть достаточно, чтобы сделать любого человека Данте или По, если он сможет оставаться в здравом уме достаточно долго, чтобы рассказать о том, что он видел."
	OUT_nf_c002:0 "Сделка Блэкхолла"
 	OUT_nf_c002_desc:0 "Жители Пойнт-Лукаута следуют за лидером, которого, по утверждению Касдина, он видел раньше во сне."
	OUT_nf_c003:0 "Болотные истории"
 	OUT_nf_c003_desc:0 "Последователи Блэкхолла могут кое-чему нас научить относительно гулей."
	OUT_nf_c004:0 "В поисках секретов"
 	OUT_nf_c004_desc:0 "Чтобы продолжить исследования, нам нужно отправиться в Пойнт-Лукаут. Местные ублюдки не станут нам помехой."
	OUT_nf_c005:0 "Маловероятное родство"
 	OUT_nf_c005_desc:0 "Эти психи из Пойнт-Лукаут известны тем, что нападают на любого, кто подходит слишком близко. Но почему-то они нас радушно принимают?"
	OUT_nf_c006:0 "Братья глубин"
 	OUT_nf_c006_desc:0 "После первых нескольких запеканок с крабами мы поняли, что болотники не сопротивляются."
	OUT_nf_c007:0 "Восход плохой луны"
 	OUT_nf_c007_desc:0 "Не ходите сегодня ночью. \n\n Это обязательно лишит вас жизни. \n\nНа небе встаёт плохая луна."
	OUT_nf_c008:0 "Наше законное место"
 	OUT_nf_c008_desc:0 "Блэкхолл - дряхлый старый дурак, зачем нам продолжать следовать за ним?"
	OUT_nf_c009:0 "Принять место Блэкхолла"
 	OUT_nf_c009_desc:0 "Блэкхолл - не Лайонс. Он знает, что нужно делать, и на этот раз нам стоит придерживаться поставленной задачи."
	OUT_nf_c010:0 "Аколиты"
 	OUT_nf_c010_desc:0 "В землях вокруг Андейла обитает множество культистов, которые теперь присягнули нам на верность. Попытки прогнать их лишь приводят к их возвращению. Можно начать указывать им на проблемы, которые мы хотим решить."
	OUT_nf_c011:0 "Защита Данвича"
 	OUT_nf_c011_desc:0 "Данвич-Билдинг - скромный офис в глуши, который стал концом пути многих исследователей пустошей. \n\n Но эти жители пустошей не знали, чем мы занимаемся."
	OUT_nf_c012:0 "Мрачная жатва"
 	OUT_nf_c012_desc:0 "Спустя 20 лет мы наконец нашли приемлемое применение жителям пустошей."
	OUT_nf_c013:0 "Познание непознаваемого"
 	OUT_nf_c013_desc:0 "За последние месяцы мы многому научились. Это меняет наше понимание практически всего. Эти истины помогут нам в наших исследованиях."
	OUT_nf_c014:0 "Потерянные братья"
 	OUT_nf_c014_desc:0 "Наши старые братья из Цитадели, скорее всего, встанут у нас на пути, если мы сначала ничего не предпримем."
	OUT_nf_c015:0 "Цитадель Уг-Куалтота"
 	OUT_nf_c015_desc:0 "Наш дом снова наш. Наши братья рядом с нами. Тех, кто отказывается видеть, заставят."
	OUT_nf_c016:0 "Ритуал"
 	OUT_nf_c016_desc:0 "Получив записи и артефакты из поместья Блэкхолл, мы готовы приступить к следующему этапу плана."
	OUT_nf_c017:0 "Нечестивая синергия"
 	OUT_nf_c017_desc:0 "Это захватывающее зрелище - наблюдать, как защитники в силовой броне прорываются сквозь оборонительный барьер, а за ними следует поток дикарей. Хор их криков и рычания почти сливался с музыкой."
	OUT_nf_c018:0 "Пещеры зовут нас"
 	OUT_nf_c018_desc:0 "В глубинах Убежища 87 находятся инструменты, необходимые для нашей работы."
	OUT_nf_c019:0 "Шепчущий во тьме"
 	OUT_nf_c019_desc:0 "Глубоко на нижних уровнях Цитадели Уг-Куалтота проводятся удивительные эксперименты. Специалисты с выдающимися хирургическими, биологическими, химическими и механическими навыками объединяют свои усилия."
	###############
	###Provinces###
 	###############
  	OUT_citadel_name:0 "Цитадель Уг-Куалтота"
