    OUT_outside_pipboy_help_tt:0 "Мы принимаем помощь от жителя пустоши с Пип-боем"
    OUT_refuse_pipboy_help_tt:0 "Разблокирует решения для поиска рабочего Пип-Боя"
    OUT_explore_outside_tt:0 "Разблокирует решения для отправки экспедиций за приделы Столичной Пустоши."
    OUT_robot_army_tt:0 "Наши роботы готовы к бою"
    OUT_mixed_army_tt:0 "Наши солдаты и роботы готовы к бою"
    OUT_enforcer_army_tt:0 "Наши защитники готовы к борьбе"
