  	###############
	OUT_expeditions_category:0 "Экспедиции Восточного побережья"
	OUT_expeditions_category_desc:0 "По всему Восточному побережью есть места, представляющие большой интерес для Братства. Старые исследовательские лаборатории, заброшенные бункеры и многое другое разбросано по всей стране. Возможно, что-то из этого давно разграблено, но поиск того, что осталось, часть нашей миссии. Лайонс потратил десятилетия впустую, оставаясь в Вашингтоне, так что нам нужно наверстать упущенное."
	OUT_boston_expedition_decision:0 "Экспедиция в Содружество"
	OUT_boston_expedition_decision_desc:0 "Ходят слухи, что к северу, в Бостоне довоенных времен, существует тайная организация под названием «Институт», обладающая технологиями, способными потягаться даже с оборудованием Анклава. Возможно, это просто старые байки, но даже если это так, этот район полон больших перспектив. До войны здесь был центром технологических компаний, а местные военные базы служили испытательными полигонами для важных довоенных военных технологий."
	OUT_pitt_expedition_decision:0 "Экспедиция в Питт"
	OUT_pitt_expedition_decision_desc:0 "Наша первая экспедиция в Питт в целом считалась успешной, но, судя по тому немногому, что удалось оттуда извлечь, за последние десятилетия всё изменилось. Если слухи правдивы, единственный наш Брат, которого мы считали погибшим во время бедствия, выжил и теперь считает себя королём жителей Питта. Говорят, он организует армию и строит промышленность с работающими довоенными патронными прессами."
	OUT_appalachia_expedition_decision:0 "Экспедиция в Аппалачи"
	OUT_appalachia_expedition_decision_desc:0 "Более 150 лет назад в Аппалачи был отправлен экспедиционный корпус, чтобы продолжить историю далёкой истории, которая канула в Лету. Записи того времени, мягко говоря, ненадёжны, а этот район находился в стороне от нашего пути на восток. Возможно, теперь мы сможем узнать, что стало с нашими братьями."
	OUT_ronto_expedition_decision:0 "Экспедиция в Ронто"
	OUT_ronto_expedition_decision_desc:0 "Довоенный Торонто был домом для крупных американских оккупационных сил и множества неэтичных лабораторий. Информацию о послевоенном Ронто собрать сложнее, но некоторые говорят, что люди там отбивались от отряда солдат в чёрной силовой броне?"
	OUT_new_york_expedition_decision:0 "Экспедиция в Нью-Йорк"
	OUT_new_york_expedition_decision_desc:0 "Довоенный Нью-Йорк был одним из крупнейших городов страны. Несколько передовых компаний имели в этом районе лаборатории и офисы, а также значительное военное присутствие из-за голодных бунтов. Несомненно, он пострадал так же сильно, как и Столичный Вашинтон, но всё же стоит оценить ситуацию самостоятельно."
	OUT_rocky_expedition_decision:0 "Экспедиция в Кримсон-Таун"
	OUT_rocky_expedition_decision_desc:0 "Рассказы с Запада рассказывают о фанатичном культе в горах, имеющем доступ к передовым огнеметам. Может быть, они прячутся в тайнике с ценным снаряжением?"
	OUT_magnets_expedition_decision:0 "Экспедиция в Сломанные Доспехи"
	OUT_magnets_expedition_decision_desc:0 "Как следует из зловещего названия этого места, мы слышали рассказы о силе в этом районе, обладающей оружием, способным уничтожить силовую броню. Для оценки ситуации потребуется отправить группу наших лучших разведчиков с нестандартным оборудованием. Мы не можем позволить рейдерам с оружием, уничтожающим Т-45, находиться так близко к нам."
	OUT_dc_explorations_category:0 "Экспедиция в Столичную Пустошь"
 	OUT_dc_explorations_category_desc:0 "Столичная Пустошь полна лабораторий, военных объектов и тайных складов, которые Лайонс игнорировал почти два десятилетия. Нам нужно очистить эти руины, прежде чем обитатели пустоши догадаются."
  	OUT_dc_national_guard_decision:0 "Склад Национальной Гвардии"
   	OUT_dc_national_guard_decision_desc:0 "Склад Национальной гвардии превратился в руины, но охранные роботы отпугивают падальщиков уже более 200 лет."
	OUT_dc_constantine_decision:0 "Форт Константин"
 	OUT_dc_constantine_decision_desc:0 "О Форте Константин, военной базе на северо-западе Столичной Пустоши, известно немного, кроме слухов о том, что несколько лет назад через нее пробрались наемники."
  	OUT_dc_wheaton_decision:0 "Арсенал Уинтона"
   	OUT_dc_wehaton_decision_desc:0 "В настоящее время арсенал Уитона занят рейдерами, нам не составит труда его зачистить."
	OUT_satcom_array_nn03:0 "Антена Сатком NN-03d"
 	OUT_satcom_array_nno3_desc:0 "Рядом с фортом Константин расположено множество антенн, используемых для связи со спутниками. Большинство из них давно упали с орбиты, но никогда не узнаешь, что там, пока не посмотришь."
  	OUT_expedition_followup_category:0 "Экспедиции на Восточное Побережье"
   	OUT_expedition_followup_category_desc:0 "Другое Братство наконец-то вернулось к тому, зачем нас сюда послали, к поискам важных технологий. Похоже, они делают это вполсилы, так что, когда они откуда-нибудь вернутся, нам стоит присмотреться повнимательнее."
	OUT_boston_followup_decision:0 "Изучить Бостон"
 	OUT_boston_followup_decision_desc:0 "Наши братья вернулись из Бостона с ящиками ценной технической информации. Должно быть, и нам её хватит с лихвой."
  	OUT_new_york_followup_decision:0 "Изучить Нью-Йорк"
   	OUT_new_york_followup_decision_desc:0 "Наши братья вернулись из Нью-Йорка и говорят, что это место, не более чем кладбище, захваченное мутантами и рейдерами. Всё же стоит взглянуть ещё раз."
	OUT_appalachia_followup_decision:0 "Изучить Аппалачи"
 	OUT_appalachia_followup_decision_desc:0 "Наши братья вернулись из Аппалачей и сообщили, что Аппалачского отделения не видно. Мы ожидали этого, но они даже не попытались поискать технику?"
  	OUT_ronto_followup_decision:0 "Изучить Ронто"
   	OUT_ronto_followup_decision_desc:0 "Наши братья очень молчат о том, что нашли в Ронто. Нам нужно самим разобраться."
	OUT_hunt_pipboys_decision:0 "Поиски Пип-Боя"
 	OUT_hunt_pipboys_decision_desc:0 "По какой-то странной причине в Столичной Пустоши открылось очень мало Убежищ, и их обитатели покинули их. Из-за этого Пип-бои встречаются гораздо реже, чем на западе. Придётся постараться, чтобы найти работающее."
	OUT_cult_category:0 "Необычный выбор"
	OUT_cult_category_desc:0 "Зачем нам это делать?"
	OUT_racer_return_decision:0 "Возвращение на фабрику «Красный Гонщик»"
	OUT_racer_return_decision_desc:0 "Невзрачный завод «Красный Гонщик» мы проигнорировали после того, как прочесали его. Однако некоторые из Защитников и Специалистов, которые там побывали, теперь настаивают на нашем возвращении. Все они вдруг решили, что мы что-то упустили в кабинетах генеральных директоров, но не могут объяснить, что именно."

    ############
    ###Events###
    ############
	OUT_nf_events.1.title:0 "Не с пустыми руками"
 	OUT_nf_events.1.desc:0 "Когда стало ясно, что Лайонс никогда не примет решения, Касдин приказал своим самым близким соратникам начать подготовку к отъезду. Личные вещи, запасы продовольствия и наше снаряжение было достаточно легко унести. Но, проявив немного хитрости, мы смогли вынести немного больше."
  	OUT_nf_events.1.a:0 "Несколько запасных костюмов Т-45 не помешали бы"
   	OUT_nf_events.1.b:0 "Мы привезли с собой несколько винтовок"
	OUT_nf_events.1.c:0 "Мы вытащили большие пушки"
	OUT_nf_events.2.title:0 "Копание в завалах"
 	OUT_nf_events.2.desc:0 "Форт Индепенденс, как и многие другие военные сооружения Столичной Пустоши, был разрушен и разграблен на основных уровнях. Когда мы прибыли, встал вопрос, не лучше ли нам отправиться в другое место. Те, что мы увидели в первую же поездку, напомнили нам, что Цитадель была не очень-то привлекательной поначалу. Пришлось довольствоваться тем, что есть. Вопрос оставался открытым: что делать в первую очередь?"
  	OUT_nf_events.2.a:0 "Укрепите оборону"
   	OUT_nf_events.2.b:0 "Очистите казармы"
	OUT_nf_events.2.c:0 "Карту окрестностей"
	OUT_nf_events.3.title:0 "Форпост Индепенденса"
 	OUT_nf_events.3.desc:0 "Лайонс, возможно, и прислушался к приказу исследовать Форт-Индепенденс, но это не означало, что он видел в этом ценность. Нам удалось укомплектовать небольшой форпост сочувствующими братьями. С их появлением нам даже удалось переправить туда кое-какое оборудование."
  	OUT_nf_events.3.a:0 "Некоторые оружейные верстаки"
   	OUT_nf_events.3.b:0 "Пара универсальных верстаков"
	OUT_nf_events.3.c:0 "Электронные запчасти"
	OUT_nf_events.4.title:0 "Обязанность защитника"
 	OUT_nf_events.4.desc:0 "В Кодексе очень чётко прописано, что требуется для получения звания Старейшины. Хотя мы единственные на Востоке, кто его соблюдает, Лайонс всё же был провозглашён Старейшиной Запада. Никто среди Изгоев не имеет права назначать Старейшину или даже повышать Защитника до Паладина. Однако Кодекс не запрещал нам использовать временные титулы до восстановления связи с Лост-Хиллс. Касдин принял титул Защитника."
  	OUT_nf_events.4.a:0 "Он защитит наши идеалы"
   	OUT_nf_events.4.b:0 "Он будет защищать знания"
	OUT_nf_events.4.c:0 "Он защитит наших братьев"
	OUT_nf_events.5.title:0 "Первоначальная миссия"
 	OUT_nf_events.5.desc:0 "Нас послали сюда с двумя целями: сохранить ценные технологии и уберечь их от тех, кто не способен использовать их ответственно. Лайонс упустил эту цель из виду, посчитав, что важнее защитить жителей пустошей от мутантов, чем от них самих. Теперь, избавившись от его некомпетентности, мы можем вернуться к нашей миссии. Остаётся вопрос, с чего начать."
  	OUT_nf_events.5.a:0 "Поиск в депо Национальной гвардии"
   	OUT_nf_events.5.b:0 "Поиск арсенала Уитона"
	OUT_nf_events.5.c:0 "Поиск Форта Константин"
 	OUT_nf_events.5.d:0 "Поиск антенны Сатком NN-03"
	OUT_nf_events.6.title:0 "Освобождение Анкориджа"
 	OUT_nf_events.6.desc.1:0 "Это заняло больше времени, чем мы ожидали, но нам наконец удалось найти работающий Пип-Бой и отправить Рыцаря в симуляцию Анкориджа. Они сообщили, что это было так же абсурдно, как и в записях терминала, и никакой реальной учебной ценности обнаружено не было. Впрочем, это неважно. Настоящая ценность скрывалась за дверями, открытыми симуляцией. В запертом крыле хранилась настоящая сокровищница: прекрасно сохранившееся оборудование вместе с томами технических данных и схем всего этого."
  	OUT_nf_events.6.desc.2:0 "Хотя для этого потребовалась помощь жителя пустоши, нам наконец-то удалось завершить симуляцию Анкориджа. Рассказ жителя пустоши делает симуляцию настолько же абсурдной, насколько это было заявлено в записях терминала. Однако это не имеет значения. Настоящая ценность находилась за дверями, открытыми симуляцией. В запертом крыле находилась сокровищница - идеально сохранившиеся части оборудования вместе с томами технических данных и схем для всего этого. \n\n У нас есть только одна проблема... \n\n Жителю пустоши обещали часть технологий за помощь, и многие рыцари на объекте не согласны. Защитник МакГроу сообщает нам, что Защитник Сибли и половина гарнизона отказываются пускать кого-либо в защищённое крыло, пока житель пустоши не уйдёт. Защитник Сибли также связался с нами, сообщив, что Защитник МакГроу пытается передать ценные технологии жителю пустоши. Возможно, нам придётся выбрать сторону."
  	OUT_nf_events.6.a:0 "И это все наше!"
   	OUT_nf_events.6.b:0 "Дайте Сибли зеленый свет на участие"
	OUT_nf_events.6.c:0 "МакГроу уберёт Сибли"
 	OUT_nf_events.6.d:0 "Почему бы нам вместо этого не заплатить жителю пустоши?"
	OUT_nf_events.7.title:0 "Несколько старых оружий"
 	OUT_nf_events.7.desc:0 "В ходе осмотра здания LOB Enterprises мы обнаружили лишь несколько старых орудий. Разбитые военные роботы, разбросанные по всему объекту, показывают, что мы далеко не первые, кто рылся в этих руинах. Тем не менее, винтовки пополнят наш арсенал."
  	OUT_nf_events.7.a:0 "По крайней мере, мы нашли что-то ценное"
	OUT_nf_events.8.title:0 "Хорошо укомплектованные шкафчики"
 	OUT_nf_events.8.desc:0 "Осмотр здания LOB Enterprises дал хорошие результаты. Сражаясь с несколькими боевыми роботами, наша команда смогла получить доступ к складу, содержащему большое количество военного оружия, которое подрядчик занимался реверс-инжинирингом."
  	OUT_nf_events.8.a:0 "Отличная работа"
	OUT_nf_events.9.title:0 "Ценные данные"
 	OUT_nf_events.9.desc:0 "Проверка здания LOB Enterprises дала хорошие результаты. Хотя в последнее время здание было полностью очищено от оборудования, несколько терминалов с экспериментальными схемами остались нетронутыми. Данные были скопированы на голографические записи и доставлены на базу для дальнейшего изучения."
  	OUT_nf_events.9.a:0 "Прекрасная находка!"
	OUT_nf_events.10.title:0 "Захватывающая находка"
 	OUT_nf_events.10.desc:0 "Наша проверка здания LOB Enterprises дала фантастические результаты. Здание практически не пострадало за последние 200 лет благодаря нескольким боевым роботам, которые охраняли офис незадолго до бомбардировок. Наши Защитники быстро расправились с роботами и провели проверку здания. Внутри они обнаружили значительное количество готового оружия, прототипов в процессе производства и тома технических данных. Оборудование и данные возвращаются для инвентаризации и анализа."
  	OUT_nf_events.10.a:0 "Отличная работа!"
	OUT_nf_events.11.title:0 "Не перевернутый камень"
 	OUT_nf_events.11.desc:0 "После того, как мы обыскали здание LOB Enterprises, мусорщикам разрешили зайти и покопаться в руинах. Хорошо, что мы их допустили. Один из старателей обнаружил потайную дверь, которой не было на чертежах, и комнату, полную современного оружия. Мусорщику выплатили компенсацию за находку и помогли с доставкой в ​​Форт-Индепенденс."
  	OUT_nf_events.11.a:0 "Вот почему мы позволяем им рыться в объедках"
	OUT_nf_events.12.title:0 "О том, чего мы ожидали"
 	OUT_nf_events.12.desc:0 "Защитники, отправленные на завод «Красных гонщиков», не ожидали найти какие-либо революционные технологические чудеса на старой фабрике игрушек, и оказались правы. Мы обнаружили лишь несколько трупов и старые машины. Впрочем, большую часть оборудования можно было бы использовать в других производственных процессах."
  	OUT_nf_events.12.a:0 "Не пустая трата времени"
	OUT_nf_events.13.title:0 "Это... Неожиданно"
 	OUT_nf_events.13.desc:0 "Никто из Защитников, отправленных на завод «Красных Гонщиков», не ожидал найти там лабораторию, которой руководит какой-нибудь безумный учёный-рейдер. Хотя само понятие учёного-рейдера - своего рода оксюморон, читаемые исследовательские записи рассказали нам кое-что о поведении диких гулей. Хотя сейчас они бесполезны, они могли бы нам помочь, если бы какой-нибудь безумный обитатель пустоши смог собрать целую армию диких."
  	OUT_nf_events.13.a:0 "Кто бы это мог сделать?"
	OUT_nf_events.14.title:0 "Рейдер Павлов?"
 	OUT_nf_events.14.desc:0 "Никто не мог ожидать того, что мы обнаружили на фабрике «Красных гонщиков». Мы ожидали найти какие-то старые машины, возможно, какие-то технические данные, но не действующую лабораторию, которой управлял бы безумный учёный-рейдер. Хотя почти все в нашем ордене посмеялись бы над идеей учёного-рейдера, у этого действительно был мозг в черепе, прежде чем мы поджарили его лазерной винтовкой. Объёмы данных и экспериментов привели к прорывам в понимании диких гулей. Большинство в Братстве сказали бы, что единственное, что нам нужно знать о диких гулях, - это то, что они умирают, когда мы в них стреляем. Однако, если мы сможем повторить эти эксперименты, мы сможем найти способ заставить гулей атаковать того, кого мы захотим! \n\n Стоит отметить одну странность. Пара Защитников сообщила, что слышала странный шёпот в офисе генерального директора."
  	OUT_nf_events.14.a:0 "Создать лабораторию для продолжения исследований"
   	OUT_nf_events.14.b:0 "Сжечь это исследование и сравнять здание с землей"
	OUT_nf_events.15.title:0 "Мародёр находит полезные данные"
 	OUT_nf_events.15.desc:0 "После того, как наша команда осмотрела завод «Красный Гонщик», мусорщикам разрешили покопаться в его остатках. Мы не ожидали, что они найдут что-то особенно интересное, но один мусорщик заглянул в заводской терминал, который мы сочли неважным. Внутри они обнаружили схемы моторизованного трёхколёсного велосипеда «Красный Гонщик». Конечно, нам это ни к чему. Но сами компактные двигатели могут быть полезны."
  	OUT_nf_events.15.a:0 "Очень интересно"
	OUT_nf_events.16.title:0 "НАСТОЯЩАЯ КОФЕМАШИНА"
 	OUT_nf_events.16.desc:0 "Кофеварки практически пришли в негодность за последние 200 лет, поскольку довоенные запасы кофе иссякли. Когда Слокум Джо начал разливать кофе направо и налево своим друзьям-мусорщикам, мы заподозрили неладное, но не слишком обеспокоились. В конце концов, кого волнует, что он нашёл склад старого молотого кофе? Его секрет был на самом деле гораздо интереснее. Он нашёл не склад, полный зёрен, а машину, способную превращать их в кофейные зёрна. Мы нашли сообщения о создании подобных устройств незадолго до войны, но устройство, предназначенное только для кофе, кажется расточительным."
  	OUT_nf_events.16.a:0 "Это не значит, что мы не можем этим пользоваться"
	OUT_nf_events.17.title:0 "НАСТОЯЩАЯ КОФЕМАШИНА"
 	OUT_nf_events.17.desc:0 "За последние 200 лет кофеварки практически пришли в негодность, поскольку довоенные запасы кофе иссякли. Когда Слокум Джо начал разливать кофе направо и налево своим друзьям-мусорщикам, мы заподозрили неладное, но не слишком обеспокоились. В конце концов, кого волнует, что он нашёл склад старого молотого кофе? Его секрет был на самом деле гораздо интереснее. Он нашёл не склад, полный зёрен, а машину, способную превращать вещество в кофейные зёрна, а также плёнки, позволяющие производить кофе более высокого качества. Мы нашли сообщения о создании подобных устройств незадолго до войны, но устройство, предназначенное только для кофе, кажется расточительным."
  	OUT_nf_events.17.a:0 "Это не значит, что мы не можем этим пользоваться."
	OUT_nf_events.18.title:0 "НАСТОЯЩАЯ КОФЕМАШИНА"
 	OUT_nf_events.18.desc:0 "Кофеварки в основном пришли в негодность за последние 200 лет, поскольку довоенные запасы кофе иссякли. Когда Слокум Джо начал разливать кофе направо и налево своим друзьям-мусорщикам, мы заподозрили неладное, но не слишком обеспокоились. В конце концов, кого волнует, что он нашёл склад старого молотого кофе? Его секрет был на самом деле гораздо интереснее. Он нашёл не склад, полный зёрен, а машину, способную преобразовывать вещество в кофейные зёрна, а также плёнки, позволяющие ей производить кофе более высокого качества. Мы нашли сообщения о создании подобных устройств незадолго до войны, но устройство, предназначенное только для кофе, кажется расточительным. \n\n К счастью, наши писцы нашли данные, которые, по их мнению, позволят нам производить с его помощью другие мелкие предметы."
  	OUT_nf_events.18.a:0 "Больше никаких нам найденых стимуляторов"
	OUT_nf_events.19.title:0 "Кофе, обжаренный во фритюре"
 	OUT_nf_events.19.desc:0 "После того, как наша команда прошла через штаб-квартиру «Слокум Джо», мусорщикам разрешили покопаться в останках. Мы не ожидали, что они найдут что-то особенно ценное после того, как несколько команд прошли по объекту после битвы с мусорщиками Джо. Что касается большинства мусорщиков, мы оказались правы. Один мусорщик всё же преподнёс нам сюрприз. В маркетинговом крыле они обнаружили комнату с несколькими армейскими огнемётами. В документах к оборудованию упоминалась какая-то акция, спонсируемая военными, в которой они обжаривали кофейные зёрна с помощью боевого оружия."
  	OUT_nf_events.19.a:0 "Их глупая маркетинговая кампания - наша выгода!"
	OUT_nf_events.20.title:0 "Война за Столичную Пустошь"
 	OUT_nf_events.20.desc:0 "Столичная Пустошь вспыхнула с появлением Анклава, став ещё более жестокой, чем обычно. Лайонс и его команда уже некоторое время сражаются с ними, и из Форта Индепенденс до сих пор неясно, кто победил. Мы знаем наверняка, что любой исход радикально изменит обстоятельства нашей миссии. Крайне важно связаться с Лост-Хиллз, чтобы доложить о ситуации и запросить новые приказы."
  	OUT_nf_events.20.a:0 "Будьте готовы!"
	OUT_nf_events.21.title:0 "Бескровные одеяния"
 	OUT_nf_events.21.desc:0 "Если какая-то группа из отряда Лайонса и невиновна в его предательстве, то это, вероятно, писцы. Большинство из них не сражались с нами, и их работа на капитул мятежников в целом соответствовала нашей миссии. Некоторые в нашем ордене утверждают, что, несмотря на свои обязанности и отсутствие прямого участия в битве с нами, они выступили против Кодекса, не присоединившись к нам, и помогали рыцарям-мятежникам, которые сражались с нами, сохраняя их снаряжение."
  	OUT_nf_events.21.a:0 "Позвольте писцам вернуться"
   	OUT_nf_events.21.b:0 "Изгнать писцов"
	OUT_nf_events.21.c:0 "Казнить писцов"
	OUT_nf_events.22.title:0 "Паладины-изгои"
 	OUT_nf_events.22.desc:0 "Если какая-либо группа из приспешников Лайонса и заслуживает вины, так это руководство, подчинившееся его предательским приказам. Они тратили ресурсы на десятилетия бесплодных усилий, нарушали бесчисленные директивы и даже боролись с нами, когда мы пытались решить эти проблемы. Несмотря на их бесчисленные преступления, в отделении всё ещё есть те, кто требует снисхождения. Они указывают, что мы тоже десятилетиями подчинялись этим приказам, и мы не должны наказывать тех, кто наконец-то осознал правду, за то, что им потребовалось на несколько лет больше времени."
  	OUT_nf_events.22.a:0 "Позвольте руководству присоединиться к нам"
   	OUT_nf_events.22.b:0 "Позвольте им снова присоединиться, как рыцарям"
	OUT_nf_events.22.c:0 "Изгнать руководство"
 	OUT_nf_events.22.d:0 "Казнить руководство"
	OUT_nf_events.23.title:0 "Запутанные звания"
 	OUT_nf_events.23.desc:0 "Мало кто в наших рядах жаждет крови даже за тех братьев, что сражались с нами. Жители пустошей, которыми Лайонс наводнил свои ряды после нашего ухода, - это совсем другая история. Многие не считают этих ничтожеств достойными звания Рыцаря. Тем не менее, эти жители пустошей победили Анклав. Некоторые скажут, что ради этой задачи стоит принять их в наш орден."
  	OUT_nf_events.23.a:0 "Они заслужили свое звание"
   	OUT_nf_events.23.b:0 "Повторная инициация тех, кто готов начать с начала"
	OUT_nf_events.23.c:0 "Жители пустошей нам не братья"
 	OUT_nf_events.23.d:0 "Изгнать их всех"
  	OUT_nf_events.23.e:0 "Казнить их всех!"
	OUT_nf_events.24.title:0 "Послание от Изгоев"
 	OUT_nf_events.24.desc:0 "Вскоре после поражения Анклава и гибели старейшины Лайонса мы начали замечать снижение активности изгоев вблизи нашей территории. Разведчики и патрули, призванные следить за Цитаделью, отступили. Главные теории гласили, что они сосредоточились на поиске технологий Анклава или, возможно, готовились к отправке на запад. Теперь мы знаем, что обе эти теории ошибочны. На самом деле они пытались разрядить обстановку, готовясь к налаживанию контакта с нами. Лидер этой группы изгоев, протектор Касдин, отправил посланника с предложением прекратить военные действия. Хотя он и его группа по-прежнему считают нас нарушающими Кодекс, они признают, что наши методы могли сыграть свою роль в нашем успехе. Они ясно дали понять, что это не просьба о возвращении в наши ряды, а их готовность прекратить боевые действия и сотрудничать. Если мы отклоним их предложение, нам следует подготовиться к возобновлению конфликта."
  	OUT_nf_events.24.a:0 "Принять их предложение"
   	OUT_nf_events.24.b:0 "Никакой дружбы с Изгоями"
	OUT_nf_events.25.title:0 "Предложение Фэрфакса"
 	OUT_nf_events.25.desc:0 "Изгои прослышали о богатстве технологий, которое мы нашли на авиабазе Адамс, и теперь хотят заполучить их. Мы получили предложение, которое даёт им право собирать и забирать передовые технологии с базы в обмен на отвод войск из руин на юге округа Вашингтон. Эта сделка не так опасна для ауры, как их первая, так что нам не стоит ожидать ничего, кроме обид, если мы от неё откажемся."
  	OUT_nf_events.25.a:0 "Принять сделку"
   	OUT_nf_events.25.b:0 "Отклонить сделку"
	OUT_nf_events.26.title:0 "Никаких неопределенных условий"
 	OUT_nf_events.26.desc:0 "Старейшина Лайонс недавно посетила Форт Индепенденс, чтобы встретиться с Защитницей Касдин. Она была, мягко говоря, недовольна. Встреча продолжалась несколько часов и больше напоминала перебранку, чем обсуждение лидеров, но её можно охарактеризовать одной цитатой старейшины. \n\n §BВы называете нас слабыми, но вы бежали и прятались, пока супермутанты опустошали Столичную Пустошь. Вы ничего не сделали для борьбы с Анклавом, и я не видел ни одного из вас на авиабазе Адамс! Я не говорю, что вам нужно присоединяться к водным караванам, но если мы где-то там, сдерживая угрозу или захватывая технологии, я ожидаю увидеть чёрно-красные доспехи. А пока я скажу вам, куда вы можете засунуть своё мнение о моих рыцарях!§! \n\n Когда обмен мнениями закончился, Старейшина и её прайд ушли. Можно с уверенностью сказать, что обмен мнениями подействовал на Касдин, которая после ухода Старейшины сказала только одно."
  	OUT_nf_events.26.a:0 "«Я увидел тот же огонь, который когда-то был в глазах ее отца.»"
	OUT_nf_events.27.title:0 "Возвращение Цитадели"
 	OUT_nf_events.27.desc:0 "Цитадель оказалась местом самых ожесточённых боёв против Анклава. Эти мерзавцы, не теряя времени, вошли туда, перебив наших бывших братьев. Бои шли на ближней дистанции, зал за залом, комната за комнатой. В боях здание было настолько сильно повреждено, что мы решили оставить Форт Индепенденс нашей основной базой. Попытки исправить ущерб были бы пустой тратой ресурсов. Тем не менее, в руинах можно найти много ценного."
  	OUT_nf_events.27.a:0 "Продолжайте копать."
	OUT_nf_events.28.title:0 "Белый слон?"
 	OUT_nf_events.28.desc:0 "Проект «Чистота» десятилетиями был навязчивой идеей многих светлых умов. Когда он наконец заработал, Анклав раскрыл себя и бросил все силы на то, чтобы удержать его под своим контролем. Этот очиститель, способный производить практически неограниченный запас пресной воды, безусловно, представляет огромную ценность. Однако для его поддержания потребуются значительные трудозатраты и ресурсы. Возможно, мы сможем окупить эти затраты, продавая воду, но, возможно, мы могли бы и продать установку напрямую тому, кто предпочтёт её."
  	OUT_nf_events.28.a:0 "Захватите проект «Чистота» и продайте воду"
   	OUT_nf_events.28.b:0 "Предложение о продаже проекта Ривет-Сити"
	OUT_nf_events.28.c:0 "Никто не купит это."
	OUT_nf_events.29.title:0 "Новые приказы"
 	OUT_nf_events.29.desc:0 "Когда мы связались с Лост-Хиллз, мы с удивлением обнаружили, что им известно о нашей ситуации больше, чем мы ожидали. Естественно, они были разочарованы тем, как развиваются события на востоке. Однако они согласны, что если кто-то и может исправить положение, то это Касдин. Они назначили его старейшиной и поручили ему продолжить первоначальную миссию ордена. В ближайшие месяцы следует ожидать подкрепления."
  	OUT_nf_events.29.a:0 "Мы больше не подведем"
	OUT_nf_events.30.title:0 "Война за Столичную Пустошь"
 	OUT_nf_events.30.desc:0 "Столичная Пустошь вспыхнула с появлением Анклава, став ещё более жестокой, чем обычно. Лайонс и его команда уже некоторое время сражаются с ними, и из Форта Индепенденс до сих пор неясно, кто победил. Мы знаем, что любой исход радикально изменит обстоятельства нашей миссии. Крайне важно связаться с Лост-Хиллз, чтобы доложить о ситуации и запросить новые приказы. Как ни странно, наш исследовательский центр на заводе «Красный Гонщик» не разделяет этого чувства срочности и запрашивает дополнительные ресурсы. Они говорят, что находятся на пороге чего-то великого, по сравнению с чем возрождение Анклава - ничтожная мелочь."
  	OUT_nf_events.30.a:0 "Игнорируйте их"
   	OUT_nf_events.30.b:0 "Отправьте им все, что им нужно"
	OUT_nf_events.31.title:0 "Заброшенный объект «Красный Гонщик»"
 	OUT_nf_events.31.desc:0 "Плановая проверка поставок в исследовательский центр на заводе «Красный гонщик» показала, что объект заброшен. Защитники и специалисты, ответственные за работу центра, пропали без вести, как и их оборудование и исследовательские записи. Защитники, отправленные на разведку, не обнаружили никаких следов боевых действий и обнаружили лишь одну зацепку, указывающую на местонахождение пропавшей команды. \n\n На стене кабинета генерального директора написано слово «Г'Йет!»." 
	OUT_nf_events.31.a:0 "Странно..."
 	OUT_nf_events.32.title:0 "Ривет-Сити принимает наше предложение"
  	OUT_nf_events.32.desc:0 "Ривет-Сити принял наше предложение о продаже им контроля над проектом «Чистота». Они согласились предоставить нам долю воды, а также ряд ценных технологических решений."
   	OUT_nf_events.32.a:0 "Справедливая торговля"
	OUT_nf_events.33.title:0 "Ривет-Сити отклоняет наше предложение"
 	OUT_nf_events.33.desc:0 "Ривет-Сити отклонил наше предложение о продаже им контроля над проектом «Чистота». Похоже, нам придётся воспользоваться этим объектом, если мы хотим извлечь из него хоть какую-то выгоду."
  	OUT_nf_events.33.a:0 "Не помешало бы попробовать"
   	OUT_nf_events.34.title:0 "Предложение изгоев"
	OUT_nf_events.34.desc:0 "Изгои Братства предложили нам взять под контроль проект «Чистота» при условии, что мы выплатим им за это компенсацию. Их просьба состояла из двух частей. Во-первых, они хотят регулярно поставлять в свой форт часть воды. Во-вторых, им нужно значительное количество технологий."
 	OUT_nf_events.34.a:0 "Принять их предложение"
  	OUT_nf_events.34.b:0 "У нас нет технологий, но у нас есть крышки"
   	OUT_nf_events.34.c:0 "Отклонить их предложение"
	OUT_nf_events.35.title:0 "Нет ответа"
 	OUT_nf_events.35.desc:0 "Мы не получили ответа от Высших Старейшин с запада. Это заставило многих предположить, что бункер в Лост-Хиллз либо находится в режиме радиомолчания, либо был уничтожен. Ходят даже слухи, что это могла быть НКР! Возможно, это слишком самонадеянно, но нам остаётся предположить, что Касдин - самый высокопоставленный член Братства. Таким образом, теперь он Старейшина."
  	OUT_nf_events.35.a:0 "Мы просто хотим, чтобы это не произошло"
   	OUT_nf_events.36.title:0 "Вход в депо"
	OUT_nf_events.36.desc:0 "Несмотря на то, что роботы отпугивали мародёров почти 200 лет, похоже, их недавно победили. В коридорах склада всё ещё вспыхивают искры от обломков роботов-охранников и протектронов. С объекта вывезли почти всё ценное, даже бункер внизу разграбили. Присланная туда команда считает, что мы, возможно, опоздали всего на несколько дней."
 	OUT_nf_events.36.a:0 "Чёрт"
   	OUT_nf_events.37.title:0 "Вход в депо"
	OUT_nf_events.37.desc:0 "Понятно, почему склад Национальной гвардии оставался практически нетронутым последние два столетия. Нашим Защитникам пришлось пробиваться сквозь такое количество сторожевых роботов и протектронов, что к тому времени, как они добрались до арсенала, у них едва хватило боеприпасов на дорогу домой. Они вернулись с хорошими и плохими новостями. Хорошая новость в том, что бункер арсенала всё ещё запечатан. Плохая новость в том, что они не могут взломать терминал. Ещё одна хорошая новость заключается в том, что они нашли запись в терминале, которая, похоже, дала нам понять, что существуют голографические записи, которые могут помочь нам получить доступ."
 	OUT_nf_events.37.a:0 "Давайте посмотрим!"
   	OUT_nf_events.38.title:0 "Вход в Константин"
	OUT_nf_events.38.desc:0 "Наша группа, отправленная на разведку форта Константин, столкнулась с ожесточённым сопротивлением другой группы солдат в силовой броне. Их доспехи не были похожи ни на один из известных нам доспехов, и их прозвали «Чёрным дьяволом» из-за роговидных наконечников на шлемах. После продолжительной перестрелки им пришлось отступить. Кем бы ни были эти люди, они были хорошо экипированы и обучены."
 	OUT_nf_events.38.a:0 "Будьте бдительны"
   	OUT_nf_events.39.title:0 "Вход в Уинтон"
	OUT_nf_events.39.desc:0 "Арсенал Уитона захвачен обитателями пустоши. Они активно выносят оттуда всё ценное, но с радостью расстаются с ценной техникой и оборудованием за относительно небольшие деньги. Штурмовые винтовки, миниганы, лазерные винтовки – всё это практически даром. При таких ценах это, возможно, наш единственный шанс заполучить их, пока они не исчезли."
 	OUT_nf_events.39.a:0 "Купить штурмовые винтовки"
  	OUT_nf_events.39.b:0 "Купить миниганы"
   	OUT_nf_events.39.c:0 "Купить лазерные винтовки"
	OUT_nf_events.39.d:0 "Мы заберем весь ваш запас"
 	OUT_nf_events.40.title:0 "Вход в Уинтон"
	OUT_nf_events.40.desc:0 "Арсенал Уитона захвачен обитателями пустошей. Они активно выгребают оттуда всё ценное и не собираются делиться. Хотя мы не против обычного мусора с пустошей, эта группа хорошо вооружена тяжёлым оружием из арсенала. Наша команда отступила и предложила нам присматривать за объектом, но в остальном считаем его потерянным."
 	OUT_nf_events.40.a:0 "Черт, мы опоздали!"
   	OUT_nf_events.41.title:0 "Вход в Уинтон"
	OUT_nf_events.41.desc:0 "Наша команда быстро расправилась с рейдерским отребьем, занявшим арсенал Уитона. Они оказались на удивление плохо экипированы для группы, находившейся на территории арсенала. Внутри мы выяснили причину: помещение было затоплено радиацией, и многие двери всё ещё были заперты. К счастью, наша силовая броня позволила нам без проблем пробраться, и мы закрепили оборудование внутри. Сейчас его везут обратно на базу для нашего использования."
 	OUT_nf_events.41.a:0 "Отличная работа!"
   	OUT_nf_events.42.title:0 "Вход в антенну NN-03"
	OUT_nf_events.42.desc:0 "Объект был полон налётчиков, с которыми наша команда быстро расправилась. Внутри они обнаружили очень мало ценного оборудования и техники. Ни один из спутников, с которыми этот объект должен был связываться, похоже, больше не находится на орбите. Тем не менее, они нашли комплект чертежей объекта, который может помочь нам с нашими собственными коммуникационными технологиями."
 	OUT_nf_events.42.a:0 "Лучше, чем ничего"
   	OUT_nf_events.43.title:0 "Вход в Константин"
	OUT_nf_events.43.desc:0 "Наша команда, отправленная на исследование форта Константин, сумела пробиться сквозь полчища роботов и дикарей. База была практически разграблена, но за защищённой дверью они обнаружили арсенал, полный комплектов силовой брони!"
 	OUT_nf_events.43.a:0 "Какая замечательная находка!"
  	OUT_nf_events.44.title:0 "Возвращение Бостонской экспедиции"
   	OUT_nf_events.44.desc:0 "Наша экспедиция в Бостон вернулась с таким же объёмом данных и оборудования, как и экспедиция Лайонса. Они сообщают о большом количестве военных баз, технических сооружений и лабораторий, готовых к исследованию. Можно с уверенностью сказать, что Бостон - почти такое же подходящее место для обустройства, каким был Вашингтон, когда мы впервые прибыли. Возможно, когда-нибудь нам стоит подумать о переезде или создании постоянного аванпоста."
	OUT_nf_events.44.a:0 "Может быть, однажды."
  	OUT_nf_events.45.title:0 "Возвращение Нью-Йоркской экспедиции"
   	OUT_nf_events.45.desc:0 "Наша экспедиция в Нью-Йорк вернулась, и их находки примерно соответствуют результатам экспедиции Лайонса. Город полон различных банд и орд мутантов, борющихся за власть. Ни у кого из них, похоже, не было ничего, что могло бы нас особенно заинтересовать. Можно с уверенностью предположить, что всё ценное было либо давно разграблено, либо зарыто так глубоко, что для доступа к нему потребуются коллективные усилия всего города. Но этого им, скорее всего, никогда не достичь."
	OUT_nf_events.45.a:0 "Тогда на данный момент лучше это проигнорировать."
  	OUT_nf_events.46.title:0 "Возвращение Аппалачской экспедиции"
   	OUT_nf_events.46.desc:0 "Как мы и ожидали, добряки Лайонса были слишком заняты поисками давно умершей главы, чтобы даже думать о поиске технологий. Мы нашли множество интересных предметов оборудования и возвращаем их для дальнейшего изучения."
	OUT_nf_events.46.a:0 "Вот почему нужно искать чертежи, а не тела."
  	OUT_nf_events.47.title:0 "Возвращение экспедиции из Ронто"
   	OUT_nf_events.47.desc:0 "Тревожные новости пришли с нашей экспедицией на Ронто, и теперь мы знаем, почему экспедиция Лайонса была так молчалива. Они обнаружили, что значительная группа солдат анклава захватила город и порабощает население. К счастью, эти солдаты оказались менее компетентными, чем те, с которыми мы столкнулись в Вашингтоне. Наша экспедиция смогла обойти их патрули и захватить ценное снаряжение после серии засад. Наши разведчики пришли к выводу, что со временем они могут стать проблемой, но сейчас они не представляют особой угрозы для наших операций."
	OUT_nf_events.47.a:0 "Как они продолжают появляться?"
  	OUT_nf_events.48.title:0 "Возвращение экспедиции из Ронто"
   	OUT_nf_events.48.desc:0 "Тревожные новости пришли с нашей экспедицией на Ронто, и теперь мы знаем, почему экспедиция Лайонса была так немногословна. Хотя город выглядит похожим на другие руины пустоши, на нём видны явные следы недавней активности Анклава. Местные жители довольно молчаливо рассказывали о ситуации, но нам удалось узнать лишь то, что они отбили атаку Анклава самостоятельно с помощью армии роботов. Если эти обитатели пустоши смогли отразить атаку столь продвинутой группировки, как Анклав, в будущем они могут стать серьёзной проблемой."
	OUT_nf_events.48.a:0 "Расточитель все равно расточитель"
	OUT_nf_events.49.title:0 "Изгои из Изгоев"
 	OUT_nf_events.49.desc:0 "Изгои Братства стали избегать наших земель, как только поняли, что поблизости нет ни одной фабрики по производству тостеров. Поэтому, когда их большое количество появилось на горизонте, ополченцы были удивлены, но готовы. Они пришли без насилия и хотели поговорить с нашими лидерами о чём-то, что обнаружили на фабрике «Красный гонщик». О чём-то древнем, что привело их в болота Пойнт-Лукаута."
  	OUT_nf_events.49.a:0 "Приведите их в Блэкхолл"
   	OUT_nf_events.49.b:0 "Это звучит не по-американски. Дайте им отпор!"
	OUT_nf_events.50.title:0 "Что-то... по-другому"
 	OUT_nf_events.50.desc:0 "Вскоре после того, как мы отправили запрошенные ресурсы нашим исследователям на заводе «Красный гонщик», специалист Олин запросил у Защитника Касдина посещение объекта. С тех пор, как он вернулся, в нём что-то изменилось. Он отдаёт необычные приказы, часто прерывает разговор, устремляя взгляд в пространство, и как минимум трое Защитников обнаружили его стоящим посреди коридоров Индепенденса среди ночи. \n\n Его последний приказ оказался самым странным из всех. Он приказывает нам отправить десятки Защитников и Специалистов на Пойнт-Лукаут, место, которое в лучшем случае представляет минимальную технологическую ценность."
  	OUT_nf_events.50.a:0 "Он наверняка знает что-то, чего мы не знаем. Собирайся!"
	OUT_nf_events.51.title:0 "Единомышленники"
 	OUT_nf_events.51.desc:0 "Все в Андейле знали о небольшой размолвке между членами Братства Стали. Они никогда не представляли особой угрозы величайшему городу Америки, но когда к Андейлу приближалось множество Изгоев, некоторые из нас забеспокоились. Однако, похоже, наши соседи заглянули к нам поболтать. Их лидеры интересовались теми же делами, что и Блэкхолл, и выразили желание работать с ним."
  	OUT_nf_events.51.a:0 "Добро пожаловать в новое братство"
   	OUT_nf_events.52.title:0 "Друзья с Болот?"
 	OUT_nf_events.52.desc:0 "Болотники Пойнт-Лукаута известны своей враждебностью к чужакам. Они убивают и, по слухам, едят всех, кто попадает им на пути из-за пределов Пойнт-Лукаута. Это одна из причин, по которой Пойнт-Лукаут в основном избегают. Экспедиционная команда Кэсдина была на взводе из-за нескольких не связанных между собой инцидентов последних ночей и была готова к перестрелке, но болотники не вмешивались. Более того, они подошли к нашей экспедиции и предложили немного еды и бутылку самогона. Команда быстро поняла, что такой позитивный приём был вызван странными символами, которые Кэсдин нацарапывал ночью на бронекостюмах Защитников. Похоже, этот символ имел какое-то значение для болотников и указывал им на то, что мы друзья."
  	OUT_nf_events.52.a:0 "Откуда он узнал этот символ?"
   	OUT_nf_events.53.title:0 "Возвращение из Пойнт-Лукаута"
 	OUT_nf_events.53.desc:0 "Экспедиция Касдина вернулась из Пойнт-Лукаут с огромным уловом чего-то. Это было не то, что мы ожидали, а ящики за ящиками странных идолов, странных кукол и один большой обелиск из непонятного камня. Никто из вернувшихся не говорил о том, что они нашли на болоте. После их возвращения Касдин вошел в его комнату с приказом не беспокоить его, кроме специалиста Олин. В течение следующих нескольких дней специалист приводил в комнату Касдина различных защитников, специалистов и даже парочку защитников. Каждый уходил примерно через час, настаивая на том, что им приказано хранить в тайне то, что обсуждалось. К тому времени, как Касдин вернулся 6 дней спустя, больше половины жителей Форта Индепенденс посетили защитника. Те, кто не заметил, что их братья и сестры ведут себя по-другому. Никто из них, казалось, не удивился, когда Касдин объявил, что Олин повышается до главного специалиста, и ее приказы были такими же, как и у него."
  	OUT_nf_events.53.a:0 "Что, черт возьми, произошло в этом болоте?"
   	OUT_nf_events.54.title:0 "Изменение приоритетов"
	OUT_nf_events.54.desc:0 "Неделями протектор Касдин заставлял всех в Форте Индепенденс собирать разведданные, запасаться припасами и готовить планы сражения. Всё изменилось после прибытия специалиста Олин и её команды с завода «Красный гонщик». С тех пор протектор Касдин полностью изменился. Теперь он приказывает нам готовиться к экспедиции на Пойнт-Лукаут."
  	OUT_nf_events.54.a:0 "Что бы они ни нашли, это должно быть что-то огромное"
   	OUT_nf_events.55.title:0 "Полуночный ритуал"
 	OUT_nf_events.55.desc:0 "На наших аванпостах проводились ритуалы, подобные тем, что Олин проводила со своими ближайшими последователями у Данвичского обелиска. Сотни голосов пели в небо под луной. \n \n Уг-Куолтот знает врата. \n \n Уг-Куолтот – это врата. \n \n Уг-Куолтот – ключ и страж врат! \n \n Затем последовали жертвоприношения и всё более сложные песнопения. Часы кровопролития, резни пленников и непонятные песнопения продолжались до самой ночи. Перед самым рассветом начались перемены. Те, кто пели, чувствовали, как их кости скручиваются, плоть слезает, а органы болят, когда они преображаются. Свет солнца казался тусклее, освещая Форт-Индепенденс и его жителей."
  	OUT_nf_events.55.a:0 "§0Договор заключен."
   	OUT_nf_events.56.title:0 "Контакт потерян"
	OUT_nf_events.56.desc:0 "Команда, отправленная нами на поиски «Пип-боя», не вернулась. Они уже давно вышли из назначенного срока. Остаётся только предположить, что они потерялись."
 	OUT_nf_events.56.a:0 "Такова жизнь в Столичной Пустоши"
  	OUT_nf_events.57.title:0 "Поисковая группа подверглась нападению"
   	OUT_nf_events.57.desc:0 "Во время поисков работающего Пип-боя наша поисковая группа подверглась нападению. Они вступили в бой с нападавшими и отбились, прежде чем вернуться на базу. К сожалению, они понесли потери и вернулись ни с чем."
	OUT_nf_events.57.a:0 "Обычное явление в Вашингтоне"
 	OUT_nf_events.58.title:0 "Поисковая группа ничего не нашла"
  	OUT_nf_events.58.desc:0 "Наша поисковая группа обследовала три места, в которых предположительно находился Пип-Бой, но ничего не нашла."
   	OUT_nf_events.58.a:0 "Хорошо, что у нас есть много других зацепок"
	OUT_nf_events.59.title:0 "Пип-бой найден!"
	OUT_nf_events.59.desc:0 "Наша поисковая группа, отправленная на поиски Пип-Боя, наконец вернулась с ним. Как ни странно, они очень молчат о том, какую именно зацепку они исследовали и что им пришлось для этого сделать."
 	OUT_nf_events.59.a:0 "Это странно, но у нас есть дела поважнее!"

