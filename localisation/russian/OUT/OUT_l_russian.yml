	OUT_olin_desc:0 "§0Посещение Уггота свело бы с ума любого слабого человека, но я всё же отправляюсь туда.§! \n\n С тех пор как она вернулась из Пойнт-Лукаута и получила повышение, Специалист не теряла времени даром, меняя Изгоев. Её приказы странны, непредсказуемы и часто лишены необходимых подробностей. Если бы не Касдин, клянущийся в чести Специалиста, мало кто бы следовал её указаниям. Ну, и ещё о том, как те, кто выражает обеспокоенность, продолжают погибать в ужасных катастрофах."
