l_russian:
  BLN_special_reward_tt:0 "§7Это даст возможность получить бонус позже.§!"
  BLN_ghoul_unrest_tt:0 "§2Население гулей начнет §!§Rнедоверять§!§2 Братству Стали§!"
  BLN_ghoul_friendly_tt:0 "§2Население гулей начнет§! §Gдоверять§!§2 Братству стали§!"
  BLN_expeditions_tt:0 "Разблокирует решения об отправке экспедиций на Восточное Побережье"
  BLN_tooltip_1_tt:0 "Открывает возможности для поиска логова супермутантов"
  BLN_tooltip_2_tt:0 "Это подвергнет Старейшину большему риску!"
  BLN_tooltip_3_tt:0 "Это поможет защитить старейшину!"
  BLN_tooltip_4_tt:0 "Он уже почти принял решение, это может не сработать"
  BLN_tooltip_5_tt:0 "Это будет иметь катастрофические последствия для Пустоши!"
  BLN_tooltip_6_tt:0 "Из-за ваших обещаний Кадену это единственный вариант действий"
  BLN_tooltip_7_tt:0 "Напомните Кадену, что мы всегда ставили Братство выше жителей Пустоши"
  BLN_tooltip_8_tt:0 "Через 12 часов мы начнем атаку. §gУбедитесь, что Либерти Прайм назначен генералом в армии за рекой. Даже тогда он может не возглавить атаку§!"
  BLN_tooltip_9_tt:0 "Анклав окопается, и выбить его будет все сложнее!"
  BLN_tooltip_10_tt:0 "Первый выстрел в этой войне сделаем мы!"
  BLN_tooltip_11_tt:0 "Это мрачный день для Братства"
  BLN_tooltip_12_tt:0 "Тридогнайт поможет Братству в борьбе на доброй стороне"
  BLN_tooltip_13_tt:0 "Писец Клифтон позаботится о том, чтобы послание Братства было услышано всеми в Столичной Пустоши"
  BLN_tooltip_14_tt:0 "Новые паладины выходят на поле боя"
  BLN_tooltip_15_tt:0 "Они даже прислали нам несколько кораблей!"
  BLN_tooltip_16_tt:0 "Паладин Куртс и несколько рыцарей будут отправлены в Питт"
  BLN_tooltip_17_tt:0 "Речь идёт о Флоридской экспедиции?"
  BLN_tooltip_18_tt:0 "Рыцать-командир Робинсон был §Rликвидирован."
  BLN_tooltip_19_tt:0 "Новые Рыцари выходят на поле боя!"
  BLN_tooltip_20_tt:0 "Кто знает, что найдет экспедиция, а что нет?"
  BLN_tooltip_21_tt:0 "Старейшина Касдин назначает нескольких верных братьев на важные должности."
  BLN_tooltip_22_tt:0 "Открывает доступ к решениям по раскопкам в руинах Вашингтона"
  BLN_tooltip_23_tt:0 "Братья с запада прибывают, чтобы помочь нашему отделению"
  BLN_tooltip_24_tt:0 "Пагубная политика старейшин Лайонса будет отменена или заменена политикой, соответствующей Кодексу." 

  bln_sublevel_one_cleared_tt:0 "§gПервый под-уровень§! Цитадели будет очищен, что позволит нам приступить к §gВторому под-уровню§!"
  bln_sublevel_two_cleared_tt:0 "§gВторой под-уровень§! Цитадели будет очищен, что позволит нам начать спускаться дальше под землю"

  bln_has_cleared_sublevel_one_tt:0 "Первый §gПод-уровень§! должен быть очищен, прежде чем мы сможем приступить к §gВторому под-уровню§!"
  bln_has_cleared_sublevel_two_tt:0 "Второй §gПод-уровень§! должен быть очищен, прежде чем мы пойдем дальше под землю"

  bln_unlock_more_trade_decisions_tt:0 "Это разблокирует больше решений §YЗащиты торговли§!"
  bln_unlock_more_merc_decisions_tt:0 "Это разблокирует решения, связанные с §Cнаёмниками§!, где это уместно"

  bln_mercs_available_tt:0 "Если мы выполнили фокус §YОбязательные выплаты§! то сможем нанять §Cнаёмников§! для этой миссии"

  bln_only_one_protected_trade_decision_tt:0 "Одновременно может быть принято только одно из этих решений"

  bln_dedicated_patrol_increase_tt:0 "Каждый §Yпатруль§! будет давать нам §Gкрышки§! каждый месяц, и уменьшать силу §7супермутантов§!, с минимальными будущими инвестициями."
  bln_dedicated_patrol_decrease_tt:0 "Мы вернём §Yпатруль§!, забрав их снаряжение и людские ресурсы, но уменьшив эффект от патрулей."
  bln_has_patrols_tt:0 "Мы отправили хотя бы один §Yпатруль§!"

  bln_loyalist_influence_increase_tt:0 "Это §Gповысит§! влияние §Bлоялистов Лост-Хиллз§!"
  bln_loyalist_influence_decrease_tt:0 "Это §Rуменьшит§! влияние §Bлоялистов Лост-Хиллз§!"
  bln_loyalist_support_increase_tt:0 "Это §Gповысит§! нашу поддержку среди §Bлоялистов Лост-Хиллз§!"
  bln_loyalist_support_decrease_tt:0 "Это §Rуменьшит§! нашу поддержку среди §Bлоялистов Лост-Хиллз§!"

  bln_wastelander_influence_increase_tt:0 "Это §Gувеличит§! влияние §gсочувствующих жителям пустошей§!"
  bln_wastelander_support_increase_tt:0 "Это §Gувеличит§! нашу поддержку среди §gжителей Пустоши§!"
  bln_wastelander_support_decrease_tt:0 "Это §Rпонизит§! нашу поддержку среди §gжителей Пустоши§!"

  bln_balance_support_tt:0 "Это сместит баланс сил §Oв сторону середины§!"

  bln_rapid_loyalist_influence_decrease_tt:0 "§BЛоялисты§! быстро потеряют влияние"
  bln_loyalist_influence_decrease_tt:0 "§BЛоялисты§! потеряют влияние"
  bln_slow_loyalist_influence_decrease_tt:0 "§BЛоялисты§! будут медленно терять влияние"
  bln_rapid_loyalist_influence_increase_tt:0 "§BЛоялисты§! будут быстро набирать влияние"
  bln_loyalist_influence_increase_tt:0 "§BЛоялисты§! будут набирать влияние"
  bln_slow_loyalist_influence_increase_tt:0 "§BЛоялисты§! будут медленно набирать влияние"

  bln_wastelanders_gaining_support:0 "§gЖители Пустошей§! наращивают поддержку"
  bln_wastelanders_gaining_small_support:0 "§gЖители Пустошейs§! наращивают поддержку"
  bln_loyalists_gaining_support:0 "§BЛоялисты§! наращивают поддержку"
  bln_loyalists_gaining_small_support:0 "§BЛоялисты§! наращивают поддержку"

  bln_start_water_distribution_tt:0 "Будет разблокирована §Yкатегория решений§! позволяющая отправлять караваны с водой в пустошь. Мы можем повысить их шансы на успех, выделив больше ресурсов, и как только мы завершим фокус §YСтабильный поток§! успешные миссии позволят нам нацианализировать территорию этих государств."

  bln_friendly_distribution_tt:0 "Успешные миссии караванов дадут нам §Yлюдские ресурсы§! и усилят влияние §gжителей Пустоши§!."
  bln_pragmatic_distribution_tt:0 "Успешные миссии караванов дадут нам §Yкрышки§!."
  bln_isolationist_distribution_tt:0 "Успешные миссии караванов дадут нам небольшое количество §Yвысокотехнологичного снаряжения§! и усилят влияние §Bлоялистов§!."

  bln_weaken_bandit_attacks_merc_tt:0 "Это ослабит нападения рейдеров на наши караваны с водой.\n\n§OОднако, наемники всегда ищут заработок и вряд ли захотят окончательно избавиться от рейдеров§!"
  bln_weaken_bandit_attacks_tt:0 "Это ослабит нападения рейдеров на наши караваны с водой.\n\n§gХотя наши Рыцари не так хорошо обучены защищать караваны в пустошах, они с большей вероятностью уничтожат рейдеров окончательно§!"

  bln_distribution_hubs_tt:0 "Мы сможем использовать другие места в качестве центров распространения проекта «Чистота». У каждого места будут свои преимущества и недостатки. Заключив союзы с Ривет-Сити и поселениями Столичной Пустоши (или завоевав их государства), мы сможем использовать некоторые из их поселений в качестве узлов."


  bln_switch_hubs_project_purity_tt:0 "Разные распределительные узлы будут иметь разные эффекты и бонусы.\n\nПеревозка воды в узлы несет риск нападения. Хотя эти конвои больше и безопаснее, мы все равно можем понести потери. Риск нападения на этом маршруте §Gотсутствует§!.\n\nДальнейшие эффекты от распределения воды отсюда:\n§RОтсутствуют§!"
  bln_switch_hubs_rivet_city_tt:0 "Разные распределительные узлы будут иметь разные эффекты и бонусы.\n\nПеревозка воды в узлы несет риск нападения. Хотя эти конвои больше и безопаснее, мы все равно можем понести потери. Риск нападения на этом маршруте §Yнизкий§!.\n\nДальнейшие эффекты от распределения воды отсюда:\n§GРивет-Сити выделит охрану для защиты караванов, что уменьшит наши потребности в людях и снаряжении§!"
  bln_switch_hubs_citadel_tt:0 "Разные распределительные узлы будут иметь разные эффекты и бонусы.\n\nПеревозка воды в узлы несет риск нападения. Хотя эти конвои больше и безопаснее, мы все равно можем понести потери. Риск нападения на этом маршруте §Yнизкий§!.\n\nДальнейшие эффекты от распределения воды отсюда:\nНаша сеть писцов может быть более централизованной, уменьшая наши бюрократические потребности§!"
  bln_switch_hubs_canterbury_commons_tt:0 "Разные распределительные узлы будут иметь разные эффекты и бонусы.\n\nПеревозка воды в узлы несет риск нападения. Хотя эти конвои больше и безопаснее, мы все равно можем понести потери. Риск нападения на этом маршруте §Rвысокий§!.\n\nДальнейшие эффекты от распределения воды отсюда:\n§GНаши караваны будут путешествовать вместе с караванами общины Кентербери, давая нам крышки и базовое снаряжение за каждый успешный караван§!"
  bln_switch_hubs_megaton_tt:0 "Разные распределительные узлы будут иметь разные эффекты и бонусы.\n\nПеревозка воды в узлы несет риск нападения. Хотя эти конвои больше и безопаснее, мы все равно можем понести потери. Риск нападения на этом маршруте §Oсредний§!.\n\nДальнейшие эффекты от распределения воды отсюда:\nGМусорщики Мегатонны дадут нам небольшое количество ресурсов§!"

  bln_ten_successful_deliveries_tt:0 "Нам нужно успешно доставить сюда воду §Y10§! раз (сейчас [?FROM.bln_state_successful_deliveries])"

  bln_one_project_at_a_time_tt:0 "Мы можем реализовывать только один проект по распределению воды за раз"
  bln_rivet_city_pipeline_tt:0 "Строительство §Cтрубопровода Ривет-Сити§! устранит §Oопасность§! перемещения воды в §CРивет-Сити§!, и даст §CРивет-сити§! перманентный бонус (и возможность §Gнационализировать§! его, если он нам принадлежит)."
  bln_build_bottling_machine_tt:0 "Строительство §Gмашины для разлива воды§! разблокирует два высших уровня §Yподготовки§!."
  bln_need_bottle_press_tt:0 "Мы построили машину для розлива"
  bln_build_offices_tt:0 "Строительство §Gулучшенных офисов§! для писцов, работающих над §CСетью Распределения Воды§! позволит им управлять проектом более §Gпродуктивно§!"
  bln_need_better_offices_tt:0 "Мы построили улучшенные офисы для наших писцов"

  bln_positive_relations_small:0 "Улучшение отношений"

