  BLN_sarah_lyons_name:0 "Сара Лайонс"
  BLN_sarah_lyons_desc:0 "После внезапной смерти отца — Сара Лайонс оказалась в роли старейшины. Хотя за последние несколько лет произошло много изменений, цель главы остается такой же, как и тогда, когда Оуэн Лайонс решил отклониться от своей первоначальной миссии. Супермутанты должны быть уничтожены."
  BLN_bowditch_desc:0 "Когда Сара Лайонс встретила свой конец на поле боя, многие думали, что её роль возьмет на себя главный писец Ротшильд или высший паладин Кросс. Если отказ Кросса по причине личной вины за то что он не защитил бывшую старейшину не стал неожиданностью, то даже сам старейшина Боудич был потрясен, когда Ротшильд отказался от этой роли, чтобы сосредоточиться исключительно на восстановлении Либерти Прайм. Следующим в очереди на эту должность оказался писец Боудич, проктор Ордена Щита. Этот человек, прозванный архитектором Цитадели и прославившийся своими достижениями в области силовой брони, похоже, идет по стопам предыдущих старейшин. Однако некоторые опасаются, что он занимает слишком среднюю позицию и может пойти на уступки, чтобы сгладить раскол с такими сторонниками жесткой политики, как Хранитель Каден."
  BLN_cross_name:0 "Высший паладин Кросс"
  BLN_edwards_name:0 "Оперативный сотрудник Эдвардс"
  BLN_tristan_name:0 "Паладин Тристан"
