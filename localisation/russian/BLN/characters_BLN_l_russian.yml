  BLN_sarah_lyons_name:0 "Сара Лайонс"
  BLN_sarah_lyons_desc:0 "Після раптової смерті батька Сара Лайонс опинилася в ролі старійшини. Хоча за останні кілька років відбулося багато змін, мета її відділення залишається майже такою ж, як і тоді, коли Овен Лайонс вирішив відхилитися від їхньої первісної місії. Супермутанти мають бути знищені."
  BLN_bowditch_desc:0 "Коли Сара Лайонс зустріла свій кінець на полі бою, багато хто думав, що її роль візьме на себе головний писар Ротшильд або старший паладин Кросс. Хоча відмова Кросс через особисту провину через нездатність захистити колишнього старійшину не стала несподіванкою, навіть сам старійшина Боудіч був шокований, коли Ротшильд відмовився від цієї ролі, щоб зосередитися виключно на відновленні Ліберті Прайм. Наступним у черзі на цю посаду виявився писар Боудіч, проктор Ордену Щита. Ця людина, прозвана архітектором Цитаделі та відома своїми досягненнями в галузі силової броні, схоже, йде стопами попередніх старійшин. Однак дехто побоюється, що він займає надто помірковану позицію і може піти на поступки, щоб згладити розкол із твердолінійними прибічниками, такими як Касдін."
  BLN_cross_name:0 "Старший паладин Кросс"
  BLN_edwards_name:0 "Офіцер оперативного відділу Едвардс"
