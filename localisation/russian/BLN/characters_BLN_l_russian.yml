  BLN_elder_lyons_name:0 "Старійшина Лайонс"
  BLN_elder_lyons_desc:0 "Очоливши експедицію Братства до Вашингтона, Овен Лайонс швидко опинився в розбіжностях із командуванням на Заході через свою наполегливу вимогу ставити захист невинних людей Столичної Пустки вище за пошук технологій. Тепер, командуючи ослабленими силами, що потерпають від нестачі припасів та особового складу, старійшина Лайонс продовжує свою місію зі знищення загрози супермутантів та порятунку людей Столичної Пустки."
