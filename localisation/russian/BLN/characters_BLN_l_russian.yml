l_russian:
  BLN_elder_lyons_name:0 "Старейшина Лайонс"
  BLN_elder_lyons_desc:0 "Возглавив экспедицию Братства в Вашингтон, Оуэн Лайонс быстро оказался в разногласиях с командованием на Западе из-за его упорного желания защитить невинных жителей Столичной Пустоши, а не искать технологии. Теперь, командуя небольшим отрядом, испытывающим нехватку припасов и живой силы, старейшина Лайонс продолжает выполнять свою миссию по уничтожению супермутантов и спасению жителей Столичной Пустоши."
  BLN_ELDER_BOWDITCH_NAME:0 "Старейшина Боудич"
