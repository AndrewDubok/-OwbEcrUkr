  bln_outcast_schism:0 "Отколовшиеся изгои"
  bln_outcast_schism_desc:0 "После официального прекращения поддержки с Запада многие члены Братства Лайонса последовали за паладином Генри Каденом, чтобы покинуть Цитадель и продолжить выполнение своей первоначальной миссии. В результате миссии Братства стало не хватать ни снаряжения, ни опытных солдат. Теперь посвящённые жители пустоши вынуждены выполнять роль хорошо оснащённых рыцарей, имея при себе лишь обычные винтовки."

  bln_super_mutant_crusade:0 "Крестовый поход на Супермутантов"
  bln_super_mutant_crusade_desc:0 "В последние несколько лет цель Восточного Братства сместилась с поиска довоенных технологий на борьбу с всё растущей волной супермутантов в Столичной Пустоши. Это будет проигранная война, пока не удастся найти источник их появления. Но Братство — единственное, что стоит между жителями Столичной Пустоши и полной доминацией супермутантов."

  bln_gnr_propaganda:0 "Пропаганда «Новостей Галактики»"
  bln_gnr_propaganda_desc:0 "Трииииииииидоооооогнайт каждый день вещает в эфире, рассказывая жителям Столичной Пустоши о Братстве Стали и их благородной борьбе. От Гирдершейда до Республики Дэйва люди стекаются к Братству, желая внести свой вклад."

  bln_citadel_construction_idea:0 "Усилия по восстановлению цитадели"
  bln_citadel_construction_idea_desc:0 "Восстановление такого довоенного гиганта, как Цитадель — задача не из лёгких. Придётся отвлечь писцов от других направлений исследований, производства и строительства, чтобы они занялись этим грандиозным проектом."

  bln_citadel_archives_idea:0 "Архивы Цитадели"
  bln_citadel_archives_idea_desc:0 "С полными архивами Цитадели в нашем распоряжении, исследования множества утраченных технологий могут идти с такой скоростью, о которой раньше мы могли только мечтать."

  bln_search_for_the_source:0 "Поиск источника"
  bln_search_for_the_source_desc:0 "Для поиска источника супермутантов в Столичной пустоши потребуется слаженная команда исследователей-писцов и разведчиков-рыцарей. Их усилия могут быть медленными, но нам нужна большая часть наших людей просто для того, чтобы сдерживать супермутантов, рыскающих по пустошам."

  bln_brotherhood_trade:0 "Торговля с Братством"
  bln_brotherhood_trade_desc:0 "Поначалу торговля с далёким Братством и была нелёгкой, она оказалась очень выгодной."
  ######################################################
  ######################################################
  ######                                            ####
  ######          IDEA LOC                          ####
  ######                                            ####
  ######################################################
  ######################################################
  bln_scourge_foundries:0 "Добыча Бича Божьего"
  bln_scourge_foundries_desc:0 "При очистке Питтсбурга Лайонс обнаружил планы довоенных литейных заводов, которые в других случаях были потеряны для пустоши. Это лишь вопрос времени, когда мы сможем использовать их для Братства."
  bln_protectionism:0 "Протекционизм"
  bln_protectionism_desc:0 "Наши рыцари и посвящённые иногда помогают местным поселениям в их бедах. В обмен мы получаем товары и крышки."
  bln_open_economy:0 "Открытая экономика"
  bln_open_economy_desc:0 "Если мы хотим выжить в этой суровой пустоши, нам нужно работать с теми, кто нас окружает. Справедливая торговля позволяет нам получать необходимые ресурсы и избавляться от ненужного хлама. Это лучше, чем посылать рыцарей в опасность, чтобы те принесли немного еды, не так ли?"
  bln_scourge_trains:0 "Добыча Бича Божьего"
  bln_scourge_trains_desc:0 "На нашей зачистке Питтсбурга Лайонс обнаружил планы высокоскоростных поездов, которые в противном случае были бы потеряны для пустоши. Это лишь вопрос времени, когда на континенте снова загрохочут давно умолкшие рельсы."
  bln_scourge_nuclear_mat:0 "Добыча Бича Божьего"
  bln_scourge_nuclear_mat_desc:0 "При зачистке Питтсбурга Лайонс обнаружил большое количество высококачественного ядерного материала. Если бы мы не были хранителями этой опасности, Пустоши грозило бы новое вымирание."
  bln_casdins_mp:0 "Наказание Кадена"
  bln_casdins_mp_desc:0 "Генри Каден и его банда дезертиров были осуждены старейшиной Лайонсом. Они больше не являются членами Братства, и их имена запрещено произносить в Цитадели. В результате их бегства у нас значительно уменьшилось количество людей и материалов. Потребуется очень много времени, чтобы заделать этот разрыв, если его вообще удастся заделать."
  bln_casdins_construction:0 "Пустые склады"
  bln_casdins_construction_desc:0 "Уход Кадена принес с собой непредвиденную проблему: металлолом. Наши склады были полны беспорядочного металлолома. После первоначального замешательства, вызванного переворотом, мы обнаружили, что наши горы материалов исчезли, и что еще хуже - мы понятия не имеем, что именно было взято. На данный момент наши арсеналы не в состоянии выдержать износ Столичной пустоши. Это лишь вопрос времени, когда мы больше не сможем выпускать современное оружие и доспехи, что станет гибелью для нашего борющегося отделения."
  bln_gnr_start:0 "Радио «Новости Галактики»"
  bln_gnr_start_desc:0 "Диджей радиостанции, Тридогнайт, находится в трудном положении. Постоянные атаки супермутантов нанесли значительный ущерб зданию радиостанции. Чтобы помочь установить наше присутствие в Столичной пустоши, были одобрены крупные инвестиции в ремонт и починку его радиостанции. Это легче сказать, чем сделать, но миссия настолько важна для Лайонса, что он поручает своей дочери охранять здание. Только время покажет, насколько важна эта станция для нашей миссии по спасению Столицы."
  bln_gnr_end:0 "Радио «Новости Галактики»"
  bln_gnr_end_desc:0 "Тр-и-и-и-и Д-о-о-о-о-о-г Н-а-а-а-й-т каждый день рассказывает жителям столичной пустоши о Братстве Стали и о том, как они сражаются за добро. От Гердершейда до Республики Дэйва люди стекаются к Братству, желая внести свой вклад."
  bln_rapid_promotions:0 "Быстрые повышения"
  bln_rapid_promotions_desc:0 "Нам отчаянно нужны опытные командиры, чтобы возглавить оставшихся Братьев. Это, несомненно, приведет к тому, что на руководящие должности попадут недостаточно квалифицированные люди, но со временем это можно исправить. Яростно преданные и компетентные паладины Прайда Лайонса - несомненный выбор для этих повышений."
  BLN_scribes_for_hire_idea:0 "Писцы по найму"
  BLN_scribes_for_hire_idea_desc:0 "Братство Стали разрешает некоторым своим писцам продавать свои услуги, помогая с основной механической и исследовательской работой. Может, это и не дешево, но это благо для нашего развития."
  BLN_scribe_consulting_idea:0 "Консультации Писцов"
  BLN_scribe_consulting_idea_desc:0 "Наш выбор разрешить некоторым писцам продавать свои услуги нашим союзникам стал хорошим источником крышек и доброй воли, но наши собственные исследования и разработки все же пострадали."
  BLN_sturdy_principles_idea:0 "Прочные принципы"
  BLN_sturdy_principles_idea_desc:0 "Возможно, мы немного смягчили наши принципы перед лицом угроз со стороны Анклава и супермутантов, но мы все то же Братство. Наши цели важнее, чем сиюминутная безопасность каких-то мусорщиков в лачугах, и после победы над Анклавом настало время вернуться к нашей миссии."
  bln_defeated_the_enclave_idea:0 "Победили Анклав"
  bln_defeated_the_enclave_idea_desc:0 "Мы победили Анклав, на этот раз наверняка. Наши солдаты празднуют победу, а наши писцы - обилие новых технологий и интересных данных, поступающих в наши исследовательские лаборатории."
  BLN_brothers_again_idea:0 "Снова братья"
  BLN_brothers_again_idea_desc:0 "Несмотря на наши небольшие идеологические разногласия, Отделение Лайонса и Изгои снова работают вместе. Наши рыцари сражаются бок о бок, наши писцы обмениваются информацией, а некоторые из наших посвященных тренируются вместе. Может, это и не то же самое, что когда мы были частью одного отделения, но это уже хорошее начало."
  BLN_hunting_mutants_home_idea:0 "В поисках их логова"
  BLN_hunting_mutants_home_idea_desc:0 "Логово супермутантов в Столичной пустоши пока что остается для нас загадкой. Но мы найдем его и остановим их."
  BLN_crusade_won_idea:0 "Успешный крестовый поход"
  BLN_crusade_won_idea_desc:0 "Братство снова помешало супермутантам захватить пустошь. Будем надеяться, что нам не придется делать это в третий раз."
  BLN_train_with_pride_idea:0 "Тренировка Прайда Лайонса"
  BLN_train_with_pride_idea_desc:0 "Прайд Лайонс считается лучшим из лучших в отделении Лайонса, с самыми суровыми тренировками и самыми опасными миссиями. Конечно, не каждый адепт может получить такой уровень подготовки, но стремиться к лучшему в том, как мы готовим наших солдат к бою, не помешает."
  BLN_verti_assault_idea:0 "Винто-штурмовая подготовка"
  BLN_verti_assault_idea_desc:0 "Идея штурма винтокрылов в пылу сражения нова для членов Братства, но ряд тактик разрабатывается с помощью восстановленных материалов Анклава, а также методом проб и ошибок."
  BLN_lyons_guard_idea:0 "Гвардия Лайонс"
  BLN_lyons_guard_idea_desc:0 "Некоторые из лучших бойцов Братства присягнули особому отряду, известному как Гвардия Лайонса. У этих рыцарей и паладинов одна цель - сражаться рядом со Старейшиной и сохранить ей жизнь."
  BLN_relaxed_trade_idea:0 "Расслабленная торговля"
  BLN_relaxed_trade_idea_desc:0 "Нет, Братство не распахивает свои двери и не превращает двор Цитадели в барахолку. Просто мы стали менее строги к тому, с кем ведем дела. В конце концов, если у мусорщика есть хорошие технологии, почему бы не дать ему несколько крышек или 5.56?"
  BLN_lyons_lessons_idea:0 "Уроки Лайонса"
  BLN_lyons_lessons_idea_desc:0 "Старейшина Лайонс использует свой многолетний опыт, давая практические советы и рекомендации по выживанию в предварительно записанном сегменте на Радио «Новости Галактики». Эта программа способствует укреплению доброй воли и увеличению числа рекрутов, одновременно спасая жизни. Это тройная победа."
  BLN_elder_training_idea:0 "Старейшина-инструктор"
  BLN_elder_training_idea_desc:0 "Старейшина проводит часть своего ограниченного свободного времени, помогая обучать новых посвященных. Ее уроки могут быть немногочисленными, но когда Старейшина говорит посвященным, как улучшить их меткость, они слушают."
  BLN_resources_to_research_idea:0 "Перераспределение ресурсов"
  BLN_resources_to_research_idea_desc:0 "Слишком долго мы пренебрегали исследованиями и разработками наших писцов из-за нехватки ресурсов. Теперь, когда угроза со стороны Анклава устранена, а технологии продолжают поступать, мы можем позволить себе быть немного более щедрыми."
  BLN_resources_to_research_2_idea:0 "Перераспределение ресурсов"
  BLN_resources_to_research_2_idea_desc:0 "Слишком долго мы пренебрегали исследованиями и разработками наших писцов из-за нехватки ресурсов. Теперь, когда угроза со стороны Анклава устранена, а технологии продолжают поступать, мы можем позволить себе быть немного более щедрыми."
  BLN_resources_to_research_3_idea:0 "Перераспределение ресурсов"
  BLN_resources_to_research_3_idea_desc:0 "Слишком долго мы пренебрегали исследованиями и разработками наших писцов из-за нехватки ресурсов. Теперь, когда угроза со стороны Анклава устранена, а технологии продолжают поступать, мы можем позволить себе быть немного более щедрыми."
  BLN_shining_shield_idea:0 "Сияющий Щит"
  BLN_shining_shield_idea_desc:0 "Орден Щита делает большие успехи в улучшении наших силовых доспехов благодаря ресурсам, которые мы им предоставили."
  BLN_mighty_sword_idea:0 "Могучий Меч"
  BLN_mighty_sword_idea_desc:0 "Орден Меча делает большие успехи в улучшении нашего оружия благодаря ресурсам, которые мы им предоставили."
  BLN_sharp_quill_idea:0 "Острое Перо"
  BLN_sharp_quill_idea_desc:0 "Орден Острого пера способен обнаружить и сохранить утраченные знания, как никогда раньше, благодаря ресурсам, которые мы им предоставили."
  BLN_bowditch_repair_idea:0 "Ремонтные услуги"
  BLN_bowditch_repair_idea_desc:0 "Оруженосцы и младшие писцы включили в свой еженедельный распорядок дня оплачиваемую работу по ремонту. Практический опыт помогает им лучше понять, с чем они работают, а крышки позволяют Братству приобретать необходимые ресурсы."
  BLN_mark_2_recon_idea:0 "Разведброня «Марк II»"
  BLN_mark_2_recon_idea_desc:0 "С разработкой разведброни «Марк II» наши солдаты, которым не выдается силовая броня, получают более надежную защиту."
  BLN_cure_research_idea:0 "Исследования в области лечения"
  BLN_cure_research_idea_desc:0 "Прогресс в поиске лекарства от ИТВ идет медленно, и некоторые спрашивают, зачем мы вообще этим занимаемся, но лекарство от ИТВ - это только начало. Кровь этого младенца может стать ключом к разработке новых методов лечения радиационного отравления или даже борьбы с другими вредными мутациями."
  BLN_prydwen_design_idea:0 "Проектирование «Придвена»"
  BLN_prydwen_design_idea_desc:0 "Почти все наши исследования переключились с нового оружия и брони на разработку этого монстра - воздушного корабля."
  BLN_prydwen_resources_idea:0 "Ресурсы для «Придвена»"
  BLN_prydwen_resources_idea_desc:0 "Для строительства этого дирижабля потребуются не просто горы металлолома, а буквально тонны редких и хрупких компонентов, которые просто так не найдешь."
  BLN_prydwen_build_idea:0 "Строительство «Придвена»"
  BLN_prydwen_build_idea_desc:0 "Наше производство практически остановилось, так как почти все руки, которые мы можем найти, направлены на строительство Придвена."
  BLN_prydwen_idea:0 "«Придвен»"
  BLN_prydwen_idea_desc:0 "С помощью нашего могучего воздушного корабля мы можем проецировать наши силы и перебрасывать целые дивизии рыцарей в любую точку Восточного побережья за считанные дни или недели."
  BLN_vertibird_killers_idea:0 "Уничтожители Винтокрылов"
  BLN_vertibird_killers_idea_desc:0 "Команды рыцарей высылаются в поле с нашими специализированными пушками Тесла с единственной целью - уничтожить винтокрылы. Пока Анклав не сможет приспособиться к нашей тактике, их поддержка с воздуха будет серьезно затруднена."
  BLN_knight_training_help_idea:0 "Инструкторы Рыцари"
  BLN_knight_training_help_idea_desc:0 "Рыцари Братства, восстанавливающиеся после ранений, предоставлены нашему правительству, чтобы помочь быстрее обучить наших солдат и подготовить их к битве с Анклавом."
  BLN_deathclaw_scrambler_idea:0 "Взлом шифра Когтей Смерти"
  BLN_deathclaw_scrambler_idea_desc:0 "Братство использует некую частоту шифрования, чтобы обратить наших сторожевых когтей смерти против нас. Наши ученые уверяют, что со временем им удастся разработать противодействие, а пока мы продолжаем войну!"
  BLN_eastern_codex_idea:0 "Восточный Кодекс"
  BLN_eastern_codex_idea_desc:0 "Кодекс Братства Стали был пересмотрен, чтобы лучше соответствовать задачам и целям нашего отделения."
  BLN_secure_supply_lines_idea:0 "Безопасные линии снабжения"
  BLN_secure_supply_lines_idea_desc:0 "Наши рыцари проложили безопасные маршруты через метро столичной пустоши и следят за тем, чтобы они оставались проходимыми, а наши аванпосты - снабжаемыми."
  BLN_inexperienced_initiates_idea:0 "Неопытные посвященные"
  BLN_inexperienced_initiates_idea_desc:0 "У новых посвященных очень мало боевого опыта. Из-за этого их труднее обучать, и они чаще сдаются под давлением во время реального боя."
  BLN_worse_initiates_idea:0 "Посвященные низкого качества"
  BLN_worse_initiates_idea_desc:0 "Из-за нехватки рабочей силы нам приходится довольствоваться все более худшими посвященными. Если раньше мы принимали только опытных наемников и охранников караванов, то теперь мы берем почти всех, кто знает, какой конец винтовки надо направлять на врага."
  BLN_west_initiates_idea:0 "Западные посвященные"
  BLN_west_initiates_idea_desc:0 "В качестве компромисса с жестко настроенными членами нашего ордена мы принимаем только тех посвященных из пустошей, которые соответствуют их строгим стандартам. Но даже в этом случае мы будем делать это только тогда, когда не сможем получить подкрепление с Запада."
  BLN_worst_initiates_idea:0 "Несчастные посвящённые"
  BLN_worst_initiates_idea_desc:0 "Сейчас мы принимаем практически всех, кто не является рейдером и не уходит, когда узнает, что ему не выдали костюм T-45d. Некоторые из этих новобранцев даже не выходили за стены своего поселения, прежде чем отправиться с патрулем Братства обратно в Цитадель. Многие из них не доживут до конца первой недели службы."
  BLN_picky_initiates_idea:0 "Качественные посвященные"
  BLN_picky_initiates_idea_desc:0 "Хотя мы отчаянно нуждаемся в новобранцах, мы не можем поступиться нашими стандартами. Не стоит тратить время и снаряжение на то, чтобы бросать неопытных молодых людей в руины Вашингтона, которые погибнут, не убив ни одного супермутанта."
  BLN_specialist_initiates_idea:0 "Посвященные-специалисты"
  BLN_specialist_initiates_idea_desc:0 "Мы получаем посвященных, обученных специальным ролям, с Запада. Это позволяет нам обучать посвященных из Столичной пустоши более универсальным боевым действиям, что повышает эффективность обучения и улучшает их боевые способности."
  BLN_loyalist_tensions_idea:0 "Напряженность в рядах лоялистов"
  BLN_loyalist_tensions_idea_desc:0 "Не секрет, что многие в нашем отделении сомневаются в решениях старейшины Лайонса за последние пару десятилетий. Они считают борьбу с супермутантами и помощь жителям пустошей пустой тратой ценных ресурсов. Общее беспокойство, вызванное этим расколом, растет и начинает влиять на всё отделение в целом."
  BLN_sword_improvements_idea:0 "Закаленные мечи"
  BLN_sword_improvements_idea_desc:0 "Наши писцы Ордена Меча неустанно совершенствуют оружие в ущерб нашим исследовательским усилиям."
  BLN_sword_refurbishment_idea:0 "Переработанные мечи"
  BLN_sword_refurbishment_idea_desc:0 "Писцы нашего Ордена Меча стараются починить как можно больше старого оружия, даже если это означает несколько дефектов и трещин."
  BLN_shield_improvements_idea:0 "Закаленные щиты"
  BLN_shield_improvements_idea_desc:0 "Дополнительная броня, новые материалы и специализированные технологии делают нашу силовую броню одной из самых прочных в Пустошах. Она может замедлить движение наших войск, но когда они добираются до места, они господствуют на поле боя."
  BLN_shield_refurbishment_idea:0 "Расширенное восстановление"
  BLN_shield_refurbishment_idea_desc:0 "Наши писцы Ордена Щита чинят столько старых силовых доспехов, сколько могут, даже если несколько пробоин остаются незаделанными."
  BLN_improv_training_idea:0 "Обучение импровизации"
  BLN_improv_training_idea_desc:0 "Строительство баррикад, рытье окопов и возведение других импровизированных оборонительных позиций преподается нашим посвященным."
  BLN_scribe_prime_idea:0 "Исследование Либерти Прайм"
  BLN_scribe_prime_idea_desc:0 "Чтобы Либерти Прайм начал функционировать, необходимо провести дополнительные исследования. Поэтому старейшина отвлекает исследователей от других задач, чтобы убедиться, что робот будет введен в эксплуатацию в этом десятилетии."
  BLN_knight_prime_idea:0 "Инженерия Либерти Прайм"
  BLN_knight_prime_idea_desc:0 "Суть проблем Либерти Прайм заключается в разработке достаточного по мощности источника питания или в выжимании большего количества энергии из существующего источника. Рыцари, занимающиеся обслуживанием оружия и силовой брони, должны справиться с этой задачей, хотя их усилий в других областях будет не хватать."
  BLN_sword_sublevels_idea:0 "Полигоны Ордена Меча"
  BLN_sword_sublevels_idea_desc:0 "Участок Цитадели был выделен Ордену Меча, который использует это место как полигон для испытания новых улучшений оружия."
  BLN_shield_sublevels_idea:0 "Мастерские Ордена Щита"
  BLN_shield_sublevels_idea_desc:0 "Участок Цитадели был выделен Ордену Щита, который использует это место как мастерскую, где экспериментирует с новыми улучшениями доспехов."
  BLN_quill_sublevels_idea:0 "Архивы Ордена Пера"
  BLN_quill_sublevels_idea_desc:0 "Секция Цитадели была выделена Ордену Пера, который использует это место как архив для технических документов и книг, которые они восстанавливают. Быстрый доступ к упорядоченным документам помогает нам в исследованиях."
  BLN_forges_of_steel_idea:0 "Кузницы Стали"
  BLN_forges_of_steel_idea_desc:0 "Цитадель теперь является домом для одной из самых мощных производственных баз на востоке. Может, это и не Питт, но наши кузницы более чем удовлетворяют наши потребности."
  bln_steel_radio:0 "Стальное Радио"
  bln_steel_radio_desc:0 "Специально подготовленные передачи с периодически звучащей музыкой из наших архивов помогают жителям Столичной Пустоши не мешать нам и быть благодарными за жертвы, которые мы приносим ради них!"
  bln_loyalist_economy:0 "Экономика лоялистов"
  bln_loyalist_economy_desc:0 "В соответствии с Кодексом, мы не делимся своими ресурсами с чужаками безрассудно. Это может отрезать нас от некоторых ресурсов, но если мы будем зависеть от чужаков в вопросах обеспечения, это может поставить под угрозу нашу миссию!"
  bln_economic_autarky:0 "Экономическая автономия"
  bln_economic_autarky_desc:0 "Цитадель является образцом самодостаточности, как и должно быть. Мы ни в чем не нуждаемся от посторонних. Поэтому мы можем сосредоточиться на том, что полезно для нашего отделения, и на том, что полезно для выполнения нашей миссии."
  bln_protected_caravans:0 "Защита караванов"
  bln_protected_caravans_desc:0 "Иногда некоторые посвященные и рыцари нанимаются в охрану караванов. Может, это и не самая гламурная обязанность, но получаемые за нее крышки и ресурсы помогают выполнять более важные задачи."
  bln_consistent_pay:0 "Последовательная оплата"
  bln_consistent_pay_desc:0 "Некоторые могут беспокоиться, что использование крышек в качестве стимула для солдат привлечет тех, кто не полностью предан делу, и они могут быть правы. Но результаты говорят сами за себя."
  bln_unhappy_compromise:0 "Грустный компромисс"
  bln_unhappy_compromise_desc:0 "Новые правила торговли могут отклоняться от Кодекса, но не выходить за рамки прецедента. Для нас наступили тяжелые времена, и сторонники жесткого курса знают, что некоторый компромисс необходим."
  bln_paystubs:0 "Платежные ведомости"
  bln_paystubs_desc:0 "Некоторые из наших высокопоставленных солдат получат вознаграждение за свою преданную службу. Некоторые могут потратить ее на личную роскошь, но мы надеемся, что большинство из них потратят обретенное богатство на более важные вещи."
  BLN_still_brotherhood_idea:0 "Всё ещё Братство"
  BLN_still_brotherhood_idea_desc:0 "Возможно, мы не проводим дни в бункерах, как наши братья на западе, но отделение Лайонса по-прежнему остается отделением Братства Стали."
  bln_distribution_hub_modifier:0 "Водораспределительный узел"
  bln_project_purity_delivery_modifier:0 "Успешная доставка воды"
  bln_project_purity_complete_modifier:0 "Постоянный доступ к воде"
  BLN_west_scribes_idea:0 "Западные писцы"
  BLN_west_scribes_idea_desc:0 "Писцы, присланные из Лост-Хиллз, дополняют наши существующие исследовательские группы."
  BLN_scribe_exchange_program_idea:0 "Программа обмена Писцами"
  BLN_scribe_exchange_program_idea_desc:0 "Писцы из Братства Среднего Запада и Братства Лайонса могут отправиться в другое отделение на год, чтобы поработать там писцами. Обмен оказался взаимовыгодным."
  BLN_full_force_attack_idea:0 "Всё или ничего!"
  BLN_full_force_attack_idea_desc:0 "Мы не можем позволить себе потерпеть неудачу. Отправьте на фронт наших лучших людей, нашу самую прочную броню и самое смертоносное оружие! Айронс ответит за то, что он сделал!"
  BLN_brotherhood_armed_rebels_idea:0 "Братство поддерживает Повстанцев"
  BLN_brotherhood_armed_rebels_idea_desc:0 "Всё больше оружия, произведённого Братством Лайонса, попадает в руки повстанцев из Пустошей. Поставляемое оружие сделало их атаки более смелыми и смертоносными. В конце концов они будут искоренены, но на это потребуется время."
  BLN_fod_idea:0 "Фонтан Грёз"
  BLN_fod_idea_desc:0 "Вода Фонтана Грёз обладает особыми свойствами, которые делают ее очень полезной в экспедициях по пустошам."
  BLN_scribe_vacation_program_idea:0 "Обмен писцами с Заливом"
  BLN_scribe_vacation_program_idea_desc:0 "Писцы из братства Залива и Братства Лайонса могут отправиться в другое отделение на год, чтобы поработать там писцом. Этот обмен оказался взаимовыгодным."
  BLN_washington_research_computer_idea:0 "Мощности В.А.Ш.И.Н.Г.Т.О.Н.А"
  BLN_washington_research_computer_idea_desc:0 "Мы никогда не поймём, почему довоенное правительство потратило столь передовую технологию на такую ​​мелочь, как управление какой-то территорией. Вычислительная мощность В.А.Ш.И.Н.Г.Т.О.Н используется более эффективно, дополняя наши исследовательские усилия."
  BLN_assisted_training_idea:0 "Вспомогательное обучение"
  BLN_assisted_training_idea_desc:0 "Избыточный персонал временно перенаправляется на помощь в обучении новобранцев."
  BLN_assisted_research_idea:0 "Вспомогательные исследования"
  BLN_assisted_research_idea_desc:0 "Избыточный персонал временно перенаправляется на помощь в проведении исследовательских работ."
  BLN_increased_expeditions_idea:0 "Увеличенные экспедиции"
  BLN_increased_expeditions_idea_desc:0 "Большое количество наших Рыцарей отправляется на поиски технологий и данных на отдаленных объектах."

