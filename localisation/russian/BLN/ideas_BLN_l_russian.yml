  bln_outcast_schism:0 "Розкол вигнанців"
  bln_outcast_schism_desc:0 "Після офіційного припинення підтримки з Заходу багато членів Братства Лайонса пішли за паладином Генрі Касдіном, щоб покинути Цитадель і продовжити виконання своєї початкової місії. Це залишило місію Братства з серйозною нестачею як спорядження, так і досвідчених солдатів. Тепер посвячені з мешканців пусток повинні заповнювати ролі добре оснащених лицарів, маючи при собі лише звичайні гвинтівки."

  bln_super_mutant_crusade:0 "Хрестовий похід проти супермутантів"
  bln_super_mutant_crusade_desc:0 "Останні кілька років мета Східного Братства змістилася з пошуку технологій на боротьбу з постійно зростаючою хвилею супермутантів у Вашингтоні. Це буде програшною битвою, доки не буде виявлено джерело їхнього походження, але Братство — це все, що стоїть між людьми Столичної Пустки та повним пануванням супермутантів."

  bln_gnr_propaganda:0 "Пропаганда GNR"
  bln_gnr_propaganda_desc:0 "Трииидооог щодня в ефірі розповідає людям Вашингтона про Братство Сталі та про те, як вони ведуть добру боротьбу. Від Гірдершейда до Республіки Дейва люди стікаються до Братства, бажаючи зробити свій внесок."

  bln_citadel_construction_idea:0 "Зусилля з відновлення Цитаделі"
  bln_citadel_construction_idea_desc:0 "Відновлення такої масивної довоєнної будівлі, як Цитадель, є неабияким завданням. Писарів доведеться відволікати від інших дослідницьких, виробничих та будівельних завдань, щоб впоратися з цією монументальною роботою."

  bln_citadel_archives_idea:0 "Архіви Цитаделі"
  bln_citadel_archives_idea_desc:0 "Маючи в своєму розпорядженні повні архіви Цитаделі, дослідження багатьох втрачених технологій можуть просуватися зі швидкістю, про яку ми раніше могли тільки мріяти."

  bln_search_for_the_source:0 "Пошук джерела"
  bln_search_for_the_source_desc:0 "Пошук джерела супермутантів у Столичній Пустці вимагатиме скоординованої команди дослідників-писарів та розвідників-лицарів. Їхні зусилля можуть бути повільними, але більшість наших людей потрібні просто для стримування супермутантів, що нишпорять пустками."

  bln_brotherhood_trade:0 "Торгівля з нашими Братами"
  bln_brotherhood_trade_desc:0 "Спочатку непроста, торгівля з нашими далекими Братами виявилася дуже вигідною."
  ######################################################
  ######################################################
  ######                                            ####
  ######          IDEA LOC                          ####
  ######                                            ####
  ######################################################
  ######################################################
  bln_scourge_foundries:0 "Скарб із Бича Божого"
  bln_scourge_foundries_desc:0 "Під час зачистки Піттсбурга Лайонс знайшов плани довоєнних ливарних заводів, які в іншому випадку були втрачені для пустки. Це лише питання часу, коли ми використаємо їх для Братства."
  bln_protectionism:0 "Протекціонізм"
  bln_protectionism_desc:0 "Наші лицарі та посвячені іноді допомагають місцевим поселенням з їхніми проблемами. Натомість ми отримуємо товари та кришки за наші зусилля."
  bln_open_economy:0 "Відкрита економіка"
  bln_open_economy_desc:0 "Якщо ми хочемо вижити в цій суворій пустці, нам потрібно працювати з тими, хто нас оточує. Справедлива торгівля дозволяє нам отримувати необхідні ресурси, водночас позбуваючись непотрібного мотлоху. Це краще, ніж посилати лицарів у небезпеку, щоб принести трохи їжі, чи не так?"
  bln_scourge_trains:0 "Скарб із Бича Божого"
  bln_scourge_trains_desc:0 "Під час зачистки Піттсбурга Лайонс знайшов плани високошвидкісних поїздів, які в іншому випадку були втрачені для пустки. Це лише питання часу, коли на континенті знову загуркотять давно замовклі рейки."
  bln_scourge_nuclear_mat:0 "Скарб із Бича Божого"
  bln_scourge_nuclear_mat_desc:0 "Під час зачистки Піттсбурга Лайонс знайшов велику кількість високоякісного ядерного матеріалу. Якби ми не були розпорядниками цієї небезпеки, пустка зіткнулася б із черговим вимиранням."
  bln_casdins_mp:0 "Суд Касдіна"
  bln_casdins_mp_desc:0 "Генрі Касдін та його банда дезертирів були засуджені старійшиною Лайонсом. Вони більше не є членами Братства, і їхні імена заборонено вимовляти в Цитаделі. Їхній результат залишив нас із значно зменшеною кількістю людей та матеріалів. Розкол, який це спричинило, гоїтиметься дуже довго, якщо взагалі колись загоїться."
  bln_casdins_construction:0 "Порожні склади"
  bln_casdins_construction_desc:0 "Вихід Касдіна спричинив непередбачену проблему: брухт. Наші склади були повні неорганізованого брухту. Після початкової плутанини, спричиненої переворотом, ми виявили, що наші гори матеріалів зникли, і що ще гірше — ми не маємо уявлення, що саме було взято. На даний момент наші арсенали не в змозі впоратися зі зносом у Столичній Пустці. Це лише питання часу, коли ми більше не зможемо використовувати передову зброю чи броню, що стане смертним вироком для нашого відділення, яке бореться за виживання."
  bln_gnr_start:0 "Радіо «Новини Галактики»"
  bln_gnr_start_desc:0 "Радіо-ді-джей Тридог опинився у скрутному становищі. Постійні атаки супермутантів завдали значної шкоди будівлі GNR. Щоб допомогти утвердити нашу присутність у Столичній Пустці, було схвалено значні інвестиції в ремонт його радіостанції. Це легше сказати, ніж зробити, але ця місія настільки важлива для Лайонса, що він наказує своїй дочці охороняти будівлю. Тільки час покаже, чи матиме ця станція вирішальне значення для нашої місії з порятунку Столиці."
  bln_gnr_end:0 "Радіо «Новини Галактики»"
  bln_gnr_end_desc:0 "Тридог щодня в ефірі розповідає людям Вашингтона про Братство Сталі та про те, як вони ведуть добру боротьбу. Від Гірдершейда до Республіки Дейва люди стікаються до Братства, бажаючи зробити свій внесок."
  bln_rapid_promotions:0 "Швидкі підвищення"
  bln_rapid_promotions_desc:0 "Нам відчайдушно потрібні досвідчені командири, щоб очолити те, що залишилося від Братства. Це, безсумнівно, призведе до того, що на керівні посади потраплять недостатньо кваліфіковані люди, але з часом це можна виправити. Віддані та компетентні паладини з Прайду Лайонса є очевидним першим вибором для цих підвищень."
  BLN_scribes_for_hire_idea:0 "Писарі на замовлення"
  BLN_scribes_for_hire_idea_desc:0 "Братство Сталі дозволяє деяким своїм писарям продавати свої послуги, допомагаючи з основною механічною та дослідницькою роботою. Можливо, це не дешево, але це благо для нашого розвитку."
  BLN_scribe_consulting_idea:0 "Консультації писарів"
  BLN_scribe_consulting_idea_desc:0 "Наш вибір дозволити деяким писарям продавати свої послуги нашим союзникам став хорошим джерелом кришок і доброї волі, але наші власні дослідження та розробки зазнають удару."
  BLN_sturdy_principles_idea:0 "Міцні принципи"
  BLN_sturdy_principles_idea_desc:0 "Можливо, ми трохи послабили наші принципи перед обличчям загроз Анклаву та супермутантів, але ми все ще те саме Братство. Наші цілі важливіші за негайну безпеку якихось збирачів у халупах, і з перемогою над Анклавом настав час повернутися до нашої місії."
  bln_defeated_the_enclave_idea:0 "Перемогли Анклав"
  bln_defeated_the_enclave_idea_desc:0 "Ми перемогли Анклав назавжди, цього разу точно. Наші солдати святкують перемогу, а наші писарі святкують величезну кількість нових технологій та цікавих даних, що надходять до наших дослідницьких лабораторій."
  BLN_brothers_again_idea:0 "Знову брати"
  BLN_brothers_again_idea_desc:0 "Незважаючи на наші невеликі ідеологічні розбіжності, Відділення Лайонса та Вигнанці знову працюють разом. Наші лицарі б'ються пліч-о-пліч, наші писарі обмінюються інформацією, а деякі з наших посвячених тренуються разом. Можливо, це не те саме, що коли ми були частиною одного відділення, але це початок."
  BLN_hunting_mutants_home_idea:0 "У пошуках їхнього лігва"
  BLN_hunting_mutants_home_idea_desc:0 "Місцезнаходження лігва супермутантів у Столичній Пустці залишається для нас загадкою. Але ми знайдемо його і зупинимо їх."
  BLN_crusade_won_idea:0 "Успішний хрестовий похід"
  BLN_crusade_won_idea_desc:0 "Братство знову зупинило супермутантів від захоплення пустки. Сподіваймося, нам не доведеться робити це втретє."
  BLN_train_with_pride_idea:0 "Тренування з Прайдом"
  BLN_train_with_pride_idea_desc:0 "Прайд Лайонса вважається найкращим із найкращих у Відділенні Лайонса, з найсуворішими тренуваннями та найнебезпечнішими місіями. Звісно, не кожен посвячений може отримати такий рівень підготовки, але прагнення до кращого в тому, як ми готуємо наших солдатів до бою, не завадить."
  BLN_verti_assault_idea:0 "Вертолітно-штурмова підготовка"
  BLN_verti_assault_idea_desc:0 "Ідея штурму з вертольота в саму гущу бою є новою для членів Братства, але серія тактик розробляється за допомогою відновлених матеріалів Анклаву, а також методом спроб і помилок."
  BLN_lyons_guard_idea:0 "Гвардія Лайонс"
  BLN_lyons_guard_idea_desc:0 "Деякі з найкращих бійців Братства присягають у спеціальний загін, відомий як Гвардія Лайонса. Ці лицарі та паладини мають одну мету: битися разом зі Старійшиною та зберегти їй життя."
  BLN_relaxed_trade_idea:0 "Пом'якшена торгівля"
  BLN_relaxed_trade_idea_desc:0 "Ні, Братство не відчиняє свої двері навстіж і не перетворює двір Цитаделі на барахолку. Ми просто стали трохи менш суворими щодо того, з ким ведемо справи. Зрештою, якщо у збирача є хороша технологія, чому б не віддати кілька кришок або набоїв 5.56?"
  BLN_lyons_lessons_idea:0 "Уроки Лайонс"
  BLN_lyons_lessons_idea_desc:0 "Старійшина Лайонс використовує свій багаторічний досвід, даючи практичні поради та підказки з виживання в заздалегідь записаній передачі на GNR. Ця програма сприяє зміцненню доброї волі, збільшенню набору рекрутів і водночас рятує життя. Це потрійна перемога."
  BLN_elder_training_idea:0 "Старійшина-інструктор"
  BLN_elder_training_idea_desc:0 "Старійшина проводить частину свого обмеженого вільного часу, допомагаючи навчати нових посвячених. Її уроків може бути небагато, але коли Старійшина каже посвяченому, як покращити приціл, вони слухають."
  BLN_resources_to_research_idea:0 "Перерозподіл ресурсів"
  BLN_resources_to_research_idea_desc:0 "Занадто довго ми нехтували дослідницькими зусиллями наших писарів через нестачу ресурсів. Тепер, коли з загрозою Анклаву покінчено, а технології надходять потоком, ми можемо дозволити собі бути трохи щедрішими."
  BLN_resources_to_research_2_idea:0 "Перерозподіл ресурсів"
  BLN_resources_to_research_2_idea_desc:0 "Занадто довго ми нехтували дослідницькими зусиллями наших писарів через нестачу ресурсів. Тепер, коли з загрозою Анклаву покінчено, а технології надходять потоком, ми можемо дозволити собі бути трохи щедрішими."
  BLN_resources_to_research_3_idea:0 "Перерозподіл ресурсів"
  BLN_resources_to_research_3_idea_desc:0 "Занадто довго ми нехтували дослідницькими зусиллями наших писарів через нестачу ресурсів. Тепер, коли з загрозою Анклаву покінчено, а технології надходять потоком, ми можемо дозволити собі бути трохи щедрішими."
  BLN_shining_shield_idea:0 "Сяючий Щит"
  BLN_shining_shield_idea_desc:0 "Орден Щита досягає значних успіхів у вдосконаленні нашої силової броні завдяки ресурсам, які ми їм надали."
  BLN_mighty_sword_idea:0 "Могутній Меч"
  BLN_mighty_sword_idea_desc:0 "Орден Меча досягає значних успіхів у вдосконаленні нашої зброї завдяки ресурсам, які ми їм надали."
  BLN_sharp_quill_idea:0 "Гостре Перо"
  BLN_sharp_quill_idea_desc:0 "Орден Пера може виявляти та зберігати втрачені знання, як ніколи раніше, завдяки ресурсам, які ми їм надали."
  BLN_bowditch_repair_idea:0 "Ремонтні послуги"
  BLN_bowditch_repair_idea_desc:0 "Зброєносці та молодші писарі додали платну ремонтну роботу до свого щотижневого розпорядку. Практичний досвід допомагає їм краще зрозуміти матеріал, з яким вони працюють, а кришки дозволяють Братству отримувати необхідні ресурси."
  BLN_mark_2_recon_idea:0 "Розвідувальна броня «Марк II»"
  BLN_mark_2_recon_idea_desc:0 "З розробкою розвідувальної броні «Марк II» наші солдати, які не отримують силову броню, користуються кращим захистом."
  BLN_cure_research_idea:0 "Дослідження ліків"
  BLN_cure_research_idea_desc:0 "Прогрес у пошуку ліків від ДКТ йде повільно, і дехто питає, навіщо ми це взагалі робимо, але ліки від ДКТ — це тільки початок. Кров цієї дитини може стати ключем до розробки нових методів лікування радіаційного отруєння або навіть боротьби з іншими шкідливими мутаціями."
  BLN_prydwen_design_idea:0 "Проєктування «Придвена»"
  BLN_prydwen_design_idea_desc:0 "Майже всі наші дослідження переключилися з нової зброї та броні на проєктування цього монстра — дирижабля."
  BLN_prydwen_resources_idea:0 "Збір ресурсів для «Придвена»"
  BLN_prydwen_resources_idea_desc:0 "Для будівництва цього дирижабля знадобляться не просто гори металобрухту, а буквально тонни рідкісних і делікатних компонентів, які не валяються просто так."
  BLN_prydwen_build_idea:0 "Будівництво «Придвена»"
  BLN_prydwen_build_idea_desc:0 "Наше виробництво майже зупинилося, оскільки майже всі робочі руки, які ми можемо знайти, спрямовані на будівництво «Придвена»."
  BLN_prydwen_idea:0 "«Придвен»"
  BLN_prydwen_idea_desc:0 "За допомогою нашого могутнього дирижабля ми можемо проєктувати нашу силу та розгортати цілі дивізії лицарів у будь-якій точці Східного узбережжя за лічені дні або тижні."
  BLN_vertibird_killers_idea:0 "Команди зі знищення вертольотів"
  BLN_vertibird_killers_idea_desc:0 "Команди лицарів відправляються на завдання з нашими спеціалізованими гарматами Тесла з єдиною метою — знищувати вертольоти. Доки Анклав не зможе адаптуватися до нашої тактики, їхня повітряна підтримка буде серйозно ускладнена."
  BLN_knight_training_help_idea:0 "Інструктори-лицарі"
  BLN_knight_training_help_idea_desc:0 "Лицарі Братства, які відновлюються після поранень, надаються нашому уряду, щоб допомогти швидше навчити наших солдатів і підготувати їх до битви з Анклавом."
  BLN_deathclaw_scrambler_idea:0 "Глушильники сигналів кігтів смерті"
  BLN_deathclaw_scrambler_idea_desc:0 "Братство використовує якусь частоту, що глушить сигнали, щоб навернути наших сторожових кігтів смерті проти нас. Наші вчені запевняють, що з часом вони зможуть розробити протидію, але поки що ми ведемо війну!"
  BLN_eastern_codex_idea:0 "Східний Кодекс"
  BLN_eastern_codex_idea_desc:0 "Кодекс Братства Сталі було переглянуто, щоб краще відповідати викликам і цілям нашого відділення."
  BLN_secure_supply_lines_idea:0 "Безпечні лінії постачання"
  BLN_secure_supply_lines_idea_desc:0 "Наші лицарі проклали безпечні маршрути через метро Вашингтона та слідкують, щоб вони залишалися вільними, а наші форпости — забезпеченими."
  BLN_inexperienced_initiates_idea:0 "Недосвідчені посвячені"
  BLN_inexperienced_initiates_idea_desc:0 "Нові посвячені мають дуже мало практичного бойового досвіду. Це робить їх важчими для навчання та підвищує ймовірність того, що вони зламаються під тиском під час реального бою."
  BLN_worse_initiates_idea:0 "Посвячені низької якості"
  BLN_worse_initiates_idea_desc:0 "Через нестачу кадрів нам доводиться задовольнятися дедалі гіршими посвяченими. Там, де раніше ми приймали тільки досвідчених найманців та охоронців караванів, тепер ми беремо майже будь-кого, хто знає, який кінець гвинтівки направляти на ворога."
  BLN_west_initiates_idea:0 "Західні посвячені"
  BLN_west_initiates_idea_desc:0 "Як компроміс із консервативними членами нашого ордену, ми приймаємо тільки тих посвячених із пусток, які відповідають їхнім суворим стандартам. Навіть тоді ми робитимемо це тільки тоді, коли не зможемо отримати підкріплення з Заходу."
  BLN_worst_initiates_idea:0 "Погані посвячені"
  BLN_worst_initiates_idea_desc:0 "Тепер ми беремо майже будь-кого, хто не є рейдером і не йде, коли дізнається, що їм не видадуть костюм T-45d. Деякі з цих новобранців ніколи навіть не були за стінами свого поселення до того, як вирушити з патрулем Братства назад до Цитаделі. Багато хто з них не доживе до кінця свого першого тижня служби."
  BLN_picky_initiates_idea:0 "Якісні посвячені"
  BLN_picky_initiates_idea_desc:0 "Хоча ми відчайдушно потребуємо новобранців, ми не можемо поступатися нашими стандартами. Не варто витрачати час і кошти на спорядження, кидаючи недосвідчених юнаків у руїни Вашингтона, якщо вони загинуть, не вбивши жодного супермутанта."
  BLN_specialist_initiates_idea:0 "Посвячені-спеціалісти"
  BLN_specialist_initiates_idea_desc:0 "Ми отримуємо посвячених, навчених спеціалізованим ролям, із Заходу. Це дозволяє нам навчати посвячених зі Столичної Пустки більш загальним бойовим ролям, що підвищує ефективність навчання, а також їхні бойові здібності."
  BLN_loyalist_tensions_idea:0 "Напруга серед лоялістів"
  BLN_loyalist_tensions_idea_desc:0 "Не секрет, що багато хто в нашому відділенні ставить під сумнів рішення старійшини Лайонса за останні пару десятиліть. Вони вважають боротьбу з супермутантами та допомогу мешканцям пусток марною тратою цінних ресурсів. Загальне занепокоєння, викликане цим розколом, зросло і починає впливати на відділення в цілому."
  BLN_sword_improvements_idea:0 "Загартовані мечі"
  BLN_sword_improvements_idea_desc:0 "Наші писарі з Ордену Меча невтомно вдосконалюють нашу зброю на шкоду нашим дослідницьким зусиллям."
  BLN_sword_refurbishment_idea:0 "Перероблені мечі"
  BLN_sword_refurbishment_idea_desc:0 "Наші писарі з Ордену Меча намагаються полагодити якомога більше старої зброї, навіть якщо це означає, що деякі дефекти залишаться непоміченими."
  BLN_shield_improvements_idea:0 "Загартовані щити"
  BLN_shield_improvements_idea_desc:0 "Додаткова броня, нові матеріали та спеціалізовані технології роблять нашу силову броню однією з найміцніших у пустках. Це може сповільнити наші війська, але коли вони добираються до місця, вони панують на полі бою."
  BLN_shield_refurbishment_idea:0 "Розширене відновлення"
  BLN_shield_refurbishment_idea_desc:0 "Наші писарі з Ордену Щита лагодять стільки старих костюмів силової броні, скільки можуть, навіть якщо кілька дірок залишаються незалатаними."
  BLN_improv_training_idea:0 "Навчання імпровізації"
  BLN_improv_training_idea_desc:0 "Будівництво барикад, риття окопів та зведення інших імпровізованих оборонних позицій викладають нашим посвяченим."
  BLN_scribe_prime_idea:0 "Дослідження Ліберті Прайма"
  BLN_scribe_prime_idea_desc:0 "Щоб запустити Ліберті Прайма, необхідно провести більше досліджень. Тому старійшина відволікає дослідників від інших завдань, щоб переконатися, що робота буде запущена в цьому десятилітті."
  BLN_knight_prime_idea:0 "Інженерія Ліберті Прайма"
  BLN_knight_prime_idea_desc:0 "Суть проблем Ліберті Прайма полягає в інженерному проєктуванні достатньо потужного джерела енергії або вичавлюванні більшої потужності з наявного джерела. Лицарі, які працюють над обслуговуванням зброї та силової броні, повинні впоратися з цим завданням, хоча їхніх зусиль в інших сферах бракуватиме."
  BLN_sword_sublevels_idea:0 "Додаткові полігони Ордену Меча"
  BLN_sword_sublevels_idea_desc:0 "Частину Цитаделі було виділено Ордену Меча, який використовує це місце як полігон для випробування нових покращень зброї."
  BLN_shield_sublevels_idea:0 "Додаткові майстерні Ордену Щита"
  BLN_shield_sublevels_idea_desc:0 "Частину Цитаделі було виділено Ордену Щита, який використовує це місце як майстерню, де вони експериментують з новими покращеннями броні."
  BLN_quill_sublevels_idea:0 "Додаткові бібліотеки Ордену Пера"
  BLN_quill_sublevels_idea_desc:0 "Частину Цитаделі було виділено Ордену Пера, який використовує це місце як бібліотеку для технічних документів та книг, які вони відновлюють. Швидкий доступ до організованих документів сприяє нашим дослідженням."
  BLN_forges_of_steel_idea:0 "Кузні Сталі"
  BLN_forges_of_steel_idea_desc:0 "Цитадель тепер є домом для однієї з найпотужніших виробничих баз на сході. Можливо, це не Пітт, але наші кузні більш ніж задовольняють наші потреби."
  bln_steel_radio:0 "Сталеве Радіо"
  bln_steel_radio_desc:0 "Спеціально підібрані передачі з періодичною музикою з наших архівів змушують жителів Столичної Пустки триматися подалі від нас і бути вдячними за жертви, які ми приносимо заради них!"
  bln_loyalist_economy:0 "Економіка лоялістів"
  bln_loyalist_economy_desc:0 "Відповідно до Кодексу, ми не ділимося своїми ресурсами зі сторонніми без розбору. Це може відрізати нас від певних ресурсів, але якщо ми залежатимемо від сторонніх для нашого забезпечення, це може поставити під загрозу нашу місію!"
  bln_economic_autarky:0 "Економічна автаркія"
  bln_economic_autarky_desc:0 "Цитадель є зразком самодостатності, як і має бути. Ми нічого не потребуємо від сторонніх. Таким чином, ми можемо зосередитися на тому, що добре для нашого відділення та для виконання нашої місії."
  bln_protected_caravans:0 "Захист караванів"
  bln_protected_caravans_desc:0 "Іноді деякі посвячені та лицарі наймаються для охорони караванів. Можливо, це не найгламурніший обов'язок, але кришки та ресурси, які ми отримуємо за цю роботу, допомагають фінансувати важливіші завдання."
  bln_consistent_pay:0 "Постійна оплата"
  bln_consistent_pay_desc:0 "Дехто може хвилюватися, що використання кришок як стимулу для солдатів привабить тих, хто не повністю відданий справі, і вони можуть мати рацію. Але результати говорять самі за себе."
  bln_unhappy_compromise:0 "Невдалий компроміс"
  bln_unhappy_compromise_desc:0 "Нові торговельні правила можуть відхилятися від Кодексу, але не виходячи за рамки прецеденту. Для нас настали важкі часи, і консерватори знають, що певний компроміс необхідний."
  bln_paystubs:0 "Платіжні відомості"
  bln_paystubs_desc:0 "Деякі з наших вищих чинів отримуватимуть винагороду за свою віддану службу. Дехто може витратити її на особисту розкіш, але ми сподіваємося, що більшість витратить це нове багатство на важливіші речі."
  BLN_still_brotherhood_idea:0 "Все ще Братство"
  BLN_still_brotherhood_idea_desc:0 "Можливо, ми не проводимо дні, працюючи в бункерах, як наші брати на заході, але Відділення Лайонса все ще є відділенням Братства Сталі."
  bln_distribution_hub_modifier:0 "Водорозподільчий центр"
  bln_project_purity_delivery_modifier:0 "Успішна доставка води"
  bln_project_purity_complete_modifier:0 "Постійний доступ до води"
  BLN_west_scribes_idea:0 "Західні писарі"
  BLN_west_scribes_idea_desc:0 "Писарі, прислані з Лост-Хіллз, доповнюють наші існуючі дослідницькі групи."
  BLN_scribe_exchange_program_idea:0 "Програма обміну писарями"
  BLN_scribe_exchange_program_idea_desc:0 "Писарі з Братства Середнього Заходу та Братства Лайонса можуть вирушити до іншого відділення на рік, щоб служити писарем там. Обмін виявився взаємовигідним."
  BLN_full_force_attack_idea:0 "Все або нічого!"
  BLN_full_force_attack_idea_desc:0 "Ми не можемо дозволити собі провалитися тут. Відправте на фронт наших найкращих людей, нашу найміцнішу броню та найсмертоноснішу зброю! Айронс відповість за те, що він зробив!"
  BLN_brotherhood_armed_rebels_idea:0 "Братство підтримує повстанців"
  BLN_brotherhood_armed_rebels_idea_desc:0 "Дедалі більше зброї, виробленої Братством Лайонса, опиняється в руках повстанців із пусток. Поставлена зброя зробила їхні атаки сміливішими та смертоноснішими. Їх знищать з часом, але це потребуватиме часу."
  BLN_fod_idea:0 "Фонтан Снів"
  BLN_fod_idea_desc:0 "Вода з Фонтану Снів має особливі властивості, які роблять її дуже корисною в експедиціях пусткою."
  BLN_scribe_vacation_program_idea:0 "Програма обміну писарями"
  BLN_scribe_vacation_program_idea_desc:0 "Писарі з Братства Затоки та Братства Лайонса можуть вирушити до іншого відділення на рік, щоб служити писарем там. Обмін виявився взаємовигідним."
  BLN_washington_research_computer_idea:0 "Комп'ютер В.А.Ш.И.Н.Г.Т.О.Н"
  BLN_washington_research_computer_idea_desc:0 "Ми ніколи не зрозуміємо, чому довоєнний уряд витратив таку передову технологію на таку дрібницю, як управління якоюсь територією. Обчислювальна потужність В.А.Ш.И.Н.Г.Т.О.Н.а краще використовується для посилення наших дослідницьких зусиль."
  BLN_assisted_training_idea:0 "Допоміжне навчання"
  BLN_assisted_training_idea_desc:0 "Надлишковий персонал тимчасово перенаправляється для допомоги в навчанні посвячених."
  BLN_assisted_research_idea:0 "Допоміжні дослідження"
  BLN_assisted_research_idea_desc:0 "Надлишковий персонал тимчасово перенаправляється для допомоги в дослідницьких зусиллях."
  BLN_increased_expeditions_idea:0 "Розширені експедиції"
  BLN_increased_expeditions_idea_desc:0 "Велика кількість наших лицарів відправляється на пошуки технологій та даних на віддалених об'єктах."