 RIV_trade_caravans_decision_category:0 "Торгові каравани Рівет-Сіті"
 RIV_trade_caravans_decision_category_desc:0 "Рівет-Сіті — це не просто місто, це найвеличніше місто на всій Столичній Пустці. І, як будь-яке велике місто, воно тримається на розгалуженій торгівлі з навколишніми землями. Рівет-Сіті виробляє §Gсвіжі фрукти та овочі§! — чи не єдине джерело на всю Пустку. Ця продукція експортується за відносно низьку ціну, приносячи не лише кришки, а й прихильність та дружбу.\n\nОднак каравани мусять протистояти багатьом загрозам: §Yсупермутантам§!, §Yрейдерам§!, §Yдиким гулям§! та §Yработорговцям§!, і це лише деякі з них[RIV_Enclave_existence]. Доклавши зусиль, ці загрози можна усунути або бодай послабити, щоб наші каравани мали більше шансів дістатися цілі.\n\nНаразі відправлено [?RIV_despatched_caravans] караванів, [?RIV_waiting_caravans] перебувають у місті. Максимальна кількість караванів: [?RIV_caravan_maximum].\n\n§YРівень загрози рейдерів:§! [RIV_Raider_threat_level]\n§YРівень загрози супермутантів:§! [RIV_Super_Mutant_threat_level]\n§YРівень загрози диких гулів:§! [RIV_Feral_threat_level]\n§BАнклав§!, §Yрівень загрози:§! [RIV_Enclave_threat_level][RIV_trade_dependency][RIV_replicated_man_active_desc]"
 
 RIV_the_enclave_is_a_threat:0 ", не кажучи вже про напади жорстокого Анклаву"

 RIV_integrating_settlements_loc:0 "\n\n\n\nТепер, коли ми завершили §CПроєкт «Чистота»§!, ці торгові місії також будуть сильніше прив'язувати поселення до нас. Якщо ми здобудемо достатньо впливу, ми зможемо інтегрувати їх мирним шляхом.\n\n§OЯкщо нам не вдасться інтегрувати ці поселення мирно, ми можемо бути змушені вдатися до рішучіших дій.§!\n\n\nНаш вплив у §gМегатонні§!: [RIV_megaton_influence]\n\n§YБіг-Таун§! піде за своїм великим сусідом, §gМегатонною§!\n\n[RIV_underworld_influence]\n\nНаш вплив у §GКентербері-Коммонс§!: [RIV_canterbury_commons_influence]\n\nНаш вплив у §8Тенпенні-Тауер§!: [RIV_tenpenny_tower_influence]\n\n§RПойнт§!-§WЛукаут§!, фактично, є §Rнепідконтрольним§!\n\n[RIV_arefu_influence]\n\n[RIV_dave_influence]\n"

