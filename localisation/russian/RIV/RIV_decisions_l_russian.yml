 RIV_CPS_decision_category:0 "Товариство збереження Капітолію"

 riv_bill_of_rights_tt:0 "§YБілль про права США§!\n\nБілль про права — це документ, що містить перші 10 поправок до Конституції США, ратифікованих у 1791 році. Він також містить інші статті, не всі з яких були прийняті так швидко.\n\nФактор політичної влади: §G+10%§!\nПрава громадянина: §G+25%§!"
 riv_constitution_tt:0 "§YКонституція Сполучених Штатів§!\n\nКонституція США визначила основні та фундаментальні закони Сполучених Штатів Америки і стала основою їхньої правової та державної системи. Ратифікована у 1789 році.\n\nПоріг капітуляції: §G+20%§!\nСтабільність: §G+1%§!\nАргументи у Верховному суді: §R+25%§!"
 riv_declaration_of_independence_tt:0 "§YДекларація незалежності США§!\n\nДекларація незалежності США була написана для проголошення незалежності 13 американських колоній від британського правління; прийнята 4 липня 1776 року.\n\nАтака на нац. території: §G+2.5%§!\nОборона на нац. території: §G+2.5%§!\nБританський вплив: §G-75%§!"
 riv_magna_carta_tt:0 "§YВелика хартія вольностей§!\n\nВелика хартія вольностей — це набір обмежень влади англійського короля, підписаний у 1215 році. Стала основою британської, а згодом і американської правових систем.\n\nСтабільність: §G+2.5%§!\nВлада короля: §G-50%§!"
 riv_monroe_doctrine_tt:0 "§YДоктрина Монро§!\n\nПредставлена у 1823 році президентом Джеймсом Монро як попередження європейським державам не втручатися у справи Америки. Це закріпило вплив США у регіоні на століття.\n\nДрейф ідеології «Народ»: §G+0.02§!\nФактор торгової думки: §Y+5%§!\nЄвропейське втручання: §G-50%§!"
 riv_war_dec_on_china_tt:0 "§YОголошення війни Китаю§!\n\nОголошення війни Китаю було видане через вторгнення Китаю на Аляску у 2066 році, що призвело до Американо-китайської війни, яка закінчилася Великою війною.\n\nПідтримка війни: §G+5%§!\nКомунізм на американській землі: §G-90%§!"
 riv_war_dec_on_germany_tt:0 "§YОголошення війни Німеччині§!\n\nУ 1941 році Конгрес США оголосив війну нацистській Німеччині, що ознаменувало вступ США у Другу світову війну на європейському театрі дій.\n\nФактор призову: §G+2%§!\nТривалість існування нацистської Німеччини: §G-90%§!"
 riv_gettysburg_address_tt:0 "§YГеттісберзька промова§!\n\nПромова Авраама Лінкольна 1863 року, виголошена за кілька місяців після вирішальної битви під Геттісбергом на честь загиблих у битві та війні загалом.\n\nСтабільність: §G+1%§!\nПідтримка війни: §G+1%§!\nПромови, вкрадені у Лінкольна: §G+300%§!"

