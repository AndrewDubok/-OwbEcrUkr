 RIV_convince_danvers_easy_decision:0 "Переконати §OЛану Денверс§!"
 RIV_convince_danvers_easy_decision_desc:0 "Лана Денверс наразі неохоче підтримує поточну пропозицію Ради, але просто послабивши заходи з мобілізації, ми зможемо переконати її, що наші люди у безпеці."
 RIV_convince_danvers_normal_decision:0 "Переконати §OЛану Денверс§!"
 RIV_convince_danvers_normal_decision_desc:0 "Лана Денверс наразі дуже неохоче підтримує поточну пропозицію Ради, але значно послабивши заходи з мобілізації, ми зможемо переконати її, що наші люди у безпеці."

 RIV_convince_harkness_easy_decision:0 "Переконати §OГаркнесса§!"
 RIV_convince_harkness_easy_decision_desc:0 "Гаркнесс не дуже в захваті від нашої поточної пропозиції, але пообіцявши дотримуватися менш агресивної позиції в майбутньому, ми зможемо забезпечити його підтримку."
 RIV_convince_harkness_normal_decision:0 "Переконати §OГаркнесса§!"
 RIV_convince_harkness_normal_decision_desc:0 "Гаркнесс занепокоєний нашою поточною пропозицією, але пообіцявши дотримуватися значно менш агресивної позиції в майбутньому, ми зможемо забезпечити його підтримку."

 RIV_convince_seagrave_easy_decision:0 "Переконати §GСігрейва Голмса§!"
 RIV_convince_seagrave_easy_decision_desc:0 "Сігрейв хвилюється, як наша пропозиція вплине на Рівет-Сіті, але додаткові інвестиції в обслуговування та ремонт мають довести йому наші добрі наміри."
 RIV_convince_seagrave_normal_decision:0 "Переконати §GСігрейва Голмса§!"
 RIV_convince_seagrave_normal_decision_desc:0 "Сігрейв дуже хвилюється, як наша пропозиція вплине на Рівет-Сіті, але суттєві інвестиції в обслуговування та ремонт мають довести йому наші добрі наміри."

 RIV_convince_bannon_easy_decision:0 "Переконати §GБеннона§!"
 RIV_convince_bannon_easy_decision_desc:0 "Беннон стверджує, що поточна пропозиція недостатньо враховує його інтереси. Невеликий хабар (на який він, ймовірно, і розраховує) має показати йому всі переваги."
 RIV_convince_bannon_normal_decision:0 "Переконати §GБеннона§!"
 RIV_convince_bannon_normal_decision_desc:0 "Беннон стверджує, що поточна пропозиція суперечить його інтересам. Солідний хабар (на який він, ймовірно, і розраховує) має показати йому всі переваги."

 RIV_convince_pinkerton_easy_decision:0 "Переконати §CГорація Пінкертона§!"
 RIV_convince_pinkerton_easy_decision_desc:0 "Пінкертон занепокоєний наслідками нашої пропозиції, але виказавши підтримку його власним цілям, ми покажемо, що ми на його боці."
 RIV_convince_pinkerton_normal_decision:0 "Переконати §CГорація Пінкертона§!"
 RIV_convince_pinkerton_normal_decision_desc:0 "Пінкертон серйозно занепокоєний наслідками нашої пропозиції, але виказавши значну підтримку його власним цілям, ми покажемо, що ми на його боці."

 RIV_convince_li_easy_decision:0 "Переконати §CМедісон Лі§!"
 RIV_convince_li_easy_decision_desc:0 "Медісон Лі не впевнена у правильності напрямку нашої пропозиції, але спрямувавши трохи більше фінансування на її наукові проєкти, ми зможемо отримати її підтримку."
 RIV_convince_li_normal_decision:0 "Переконати §CМедісон Лі§!"
 RIV_convince_li_normal_decision_desc:0 "Медісон Лі занепокоєна напрямком нашої пропозиції, але спрямувавши значне фінансування на її наукові проєкти, ми зможемо отримати її підтримку."

 RIV_convince_lily_easy_decision:0 "Переконати §CЛіліан Грейнджер§!"
 RIV_convince_lily_easy_decision_desc:0 "Ліліан не впевнена щодо нашої поточної пропозиції; надавши їй трохи більше обладнання для медичних досліджень, ми забезпечимо її підтримку."
 RIV_convince_lily_normal_decision:0 "Переконати §CЛіліан Грейнджер§!"
 RIV_convince_lily_normal_decision_desc:0 "Ліліан не подобається наша поточна пропозиція, але надавши їй більше обладнання для медичних досліджень, ми забезпечимо її підтримку."
 
