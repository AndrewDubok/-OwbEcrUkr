 RIV_bannon_leader_name:0 "          Беннон        "
 RIV_seagrave_leader_name:0 "    Сігрейв Голмс   "
 RIV_li_leader_name:0 "        Медісон Лі"
 RIV_pinkerton_leader_name:0 "   Горацій Пінкертон"
 RIV_lily_leader_name:0 "    Ліліан Грейнджер"

 RIV_enclave_decision:0 "\n\n\nРішення, яке зараз стоїть перед Радою, має потенціал стати найважливішим за останні десятиліття: питання втручання в конфлікт, що назріває між §YБратством Сталі§! та §BАнклавом§!. Ми не знаємо, що кожна зі сторін планує щодо нас, але нам відомо, що §BАнклав§! нападає на наші каравани та погрожує нашим громадянам. З двох варіантів здається, що §YБратство§! має кращі наміри щодо нас, проте це не означає, що ми повинні втручатися на їхньому боці. Наша Рада залишається розділеною у цьому питанні.\n\n§OПредставник безпеки§! [RIV_security_representative_view_enclave]\n§GПредставник цивільних§! [RIV_civilian_representative_view_enclave]\n§CПредставник науки§! [RIV_science_representative_view_enclave]"

 RIV_refugee_decision:0 "\n\n\nХоча ми вирішили дотримуватися політики невтручання у війну між Братством та Анклавом, війна не оминула нас стороною. Політичне розбрат у регіоні призвів до того, що сотні, а то й тисячі біженців шукають безпечного притулку. Тепер Рада має вирішити, як вчинити з цими людьми.\n\n§OПредставник безпеки§! [RIV_security_representative_view_refugees]\n§GПредставник цивільних§! [RIV_civilian_representative_view_refugees]\n§CПредставник науки§! [RIV_science_representative_view_refugees]"

