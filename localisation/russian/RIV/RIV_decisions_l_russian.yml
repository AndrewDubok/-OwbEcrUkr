l_russian:
RIV_council_decision_category:0 "Рада Рівет-Сіті"
 RIV_council_decision_category_desc:0 "\n                                  §YРАДА РІВЕТ-СІТІ§! \n\n\n\n\n\n\n\n\n\n   [RIV_council_security_representative_picture]      [RIV_council_civilian_representative_picture]      [RIV_council_science_representative_picture]\n\n\n\n\n\n\n\n\n\n [RIV_council_security_representative_name]      [RIV_council_civilian_representative_name]       [RIV_council_science_representative_name]\n            §OБезпека§!                        §GЦивільні§!                         §CНаука§!\n\nРівет-Сіті керується Радою з трьох членів, кожен з яких представляє одну з трьох найважливіших груп населення: §Oпредставник служби безпеки§!, §Gпредставник цивільних§! та §Cпредставник науковців§!. Ця трійка спільно обговорює та вирішує питання політики Рівет-Сіті, має повноваження контролювати податки, розподіляти фінансування та запускати загальноміські програми. Кожен член ради привносить власну перспективу і може бути замінений шляхом голосування членів того сектору, до якого він належить.[RIV_current_decision]"
 
