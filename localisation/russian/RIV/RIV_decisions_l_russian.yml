 RIV_outsider_influence_decision_category:0 "Вплив Рівет-Сіті"
 RIV_outsider_influence_decision_category_desc:0 "Рівет-Сіті завершило Проєкт «Чистота» і прагне об'єднати решту округу Колумбія під своїм прапором. Вони роблять це хитро: дарують воду Пустці та переконують поселенців у своїх добрих намірах. Незалежно від їхніх справжніх цілей, це працює, і мешканці поселень по всьому округу прагнуть до тіснішої співпраці та навіть інтеграції з Рівет-Сіті. Ми повинні зупинити цей вплив. Хоча припинення постачання води може зашкодити нашим громадянам, ми маємо захистити наш суверенітет.\n\n§OНавіть так, це може бути лише початком. Якщо Рівет-Сіті зазнає невдачі, на горизонті може постати війна.§!\n\n\nВплив Рівет-Сіті у §gМегатонні§!: [RIV_megaton_influence]\n\n§YБіг-Таун§! піде за своїм великим сусідом, §gМегатонною§!.\n\n[RIV_underworld_influence]\n\nВплив Рівет-Сіті у §GКентербері-Коммонс§!: [RIV_canterbury_commons_influence]\n\nВплив Рівет-Сіті у §8Тенпенні-Тауер§!: [RIV_tenpenny_tower_influence]\n\n[RIV_arefu_influence]\n\n[RIV_dave_influence]"

