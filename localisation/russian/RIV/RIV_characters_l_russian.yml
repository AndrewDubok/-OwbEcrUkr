l_russian:

  RIV_council_name:0 "Совет Ривет-Сити"
  riv_cc_desc:0 "Совет Ривет-Сити существует уже несколько десятилетий и представляет три группы, наиболее важные для общества Ривет-Сити: службу безопасности, учёных и гражданских."

  RIV_harkness_name:0 "Харкнесс"
  riv_harkness_desc:0 "Однажды Харкнесс появился из пустошей, заявив, что он ветеран, вышедший из комы и ищущий безопасности в Ривет-Сити. С тех пор он поступил на работу в службу безопасности и быстро поднялся по карьерной лестнице, став начальником службы безопасности Ривет-Сити. Он стал твёрдым приверженцем изоляционизма и защиты того, что у них есть в Ривет-Сити, и прижился в городе как рыба в воде. Однако некоторые до сих пор задаются вопросом, кем он был до приезда в Ривет-Сити..."

  RIV_danvers_name:0 "Лана Дэнверс"
  riv_danvers_desc:0 "С тех пор как Харкнесса сместили с поста начальника службы безопасности Ривет-Сити, Лане Дэнверс пришлось взять его обязанности на себя. Бывшая вторая помощница и лучшая подруга Харкнесса, Дэнверс теперь рассматривает Службу безопасности Ривет-Сити как лучший инструмент для создания позитивного будущего для всей Пустоши, а не только для города."

  RIV_bannon_name:0 "Беннон"
  riv_bannon_desc:0 "Беннон прибыл в Ривет-Сити в возрасте 18 лет и с тех пор стал самым известным, богатым и бессовестным торговцем. Менее чем через 10 лет после прибытия в Ривет-Сити он получил место в совете. Оказавшись в совете, он стал откровенно пренебрегать чьими-либо интересами, кроме своих собственных, и теперь, став лидером Ривет-Сити, некому будет возразить ему и пресечь потрясающие идеи о том, как заработать больше денег."

  RIV_seagrave_name:0 "Сигрейв Холмс"
  riv_seagrave_desc:0 "Внук одного из основателей Ривет-Сити, Сигрейв Холмс всю жизнь занимался ремонтом. Именно благодаря ему Ривет-Сити до сих пор держится на плаву, и ему даже удалось восстановить роботов для Службы безопасности Ривет-Сити. Теперь, став лидером, он надеется добиться позитивных перемен, вдохновить всех жителей Ривет-Сити и создать город, который действительно будет сиять во всех смыслах."

  RIV_madison_li_name:0 "Мэдисон Ли"
  riv_li_desc:0 "Мэдисон Ли прибыла в Ривет Сити в 2259 году, не сумев сделать Проект «Чистота» успешным и озлобившись на эту идею. Она сохраняет интерес к очистке воды, но теперь предпочла бы сконцентрироваться на том, чтобы привести Ривет-Сити к полному потенциалу и заниматься своим истинным интересом: наукой. Но с гигантами окраины и Братства, угрожающими перевернуть все, что она создает, сколько времени она вообще останется здесь?"

  RIV_pinkerton_name:0 "Хорес Пинкертон"
  riv_pinkerton_desc:0 "Хорес Пинкертон был одним из первоначальных основателей Ривет-Сити в свои 20 лет и посвятил свою жизнь тому, чтобы сделать Ривет-Сити лучшим городом и научным институтом в Столичной Пустоши. Пока его не вытеснила Мэдисон Ли. Он ушёл и жил отшельником, но наконец вернулся и обещает привести Ривет-Сити в светлое, роботизированное будущее."

  RIV_lillian_name:0 "Лилиан Грейнджер"
  riv_lillian_desc:0 "Лилиан Грейнджер провела большую часть своей жизни как странствующий врач, бродя по пустошам и леча людей, которым это было нужно. В конце концов, однако, она решила осесть в Ривет-Сити и стала важным медицинским исследователем для города, тесно сотрудничая с доктором Престоном. В результате целого ряда событий она оказалась у власти в Ривет-Сити, не готовая, но восторженно стремящаяся к переменам."

  RIV_li_advisor_desc:0 "§RРазвивающиеся силы окраины и Братства заставляют Ли быть нервной, и она может уйти§!""

