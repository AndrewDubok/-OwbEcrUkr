l_russian:
  peacemessage_BFI:0 "Ти б'єшся, як фермер"
  peacemessage_DOT:0 "Я руйную те, що потребує руйнування на цьому півострові!"
  peacemessage_GED:0 "Вона цього не передбачила."
  peacemessage_NNC:0 "Дивні жінки, що лежать у ставках і роздають мечі, не є основою для системи правління."
  peacemessage_RIV:0 "Мені ніколи не слід було пускати тебе на цей клятий човен!"
  peacemessage_RON:0 "Працюйте, щоб у ваших грудях живими були ті маленькі іскри небесного вогню, які називаються совістю."