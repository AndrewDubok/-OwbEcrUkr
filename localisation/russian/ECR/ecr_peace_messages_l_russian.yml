l_russian:
  peacemessage_BFI:0 "Ты дерёшься как фермер на молочной ферме"
  peacemessage_DOT:0 "Я разгромлю то, что требует разгрома на этом полуострове!"
  peacemessage_GED:0 "Она этого не ожидала."
  peacemessage_NNC:0 "Странные женщины, лежащие в прудах и раздающие мечи, не могут быть основой для государства."
  peacemessage_RIV:0 "Мне никогда не следовало пускать тебя на эту чертову лодку!"
  peacemessage_RON:0 "Трудитесь, чтобы сохранить в своей груди ту маленькую искорку небесного огня, которая называется совестью."