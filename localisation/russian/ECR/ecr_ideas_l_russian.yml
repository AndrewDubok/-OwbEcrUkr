l_russian:
  ####AMM####
  amm_amish_paradise: "Амішський рай"
  amm_amish_paradise_desc: "Навіть через два століття після війни аміші все ще веселяться, як у 1699 році."
  amm_all_equal_in_gods_eyes: "Перед Богом усі рівні"
  amm_all_equal_in_gods_eyes_desc: "У Долині Аммана заборонено погано ставитися до Божих дітей. Тому тут часто можна зустріти супермутантів і гульів, які мирно співіснують із людьми."
  amm_sunflower_trade: "Торгівля соняшником"
  amm_sunflower_trade_desc: "Амішський соняшник безпечний для споживання лише за умови правильного вирощування, що вміють робити тільки жителі Долини Аммана, які є єдиними надійними виробниками продукції з цієї отруйної квітки."
  amm_rising_fears: "Зростаючі страхи"
  amm_rising_fears_desc: "Незважаючи на схильність амішів підставляти іншу щоку, їхні сусіди-рейдери можуть покласти край цьому Амішському Раю."
  amm_no_peeking: "Дивний Ел"
  amm_no_peeking_desc: "Так, це відсилання до пісні «Weird Al» Yankovic - Amish Paradise. Так, ви дуже розумні, що переглянули файли."

  ####ANV####
  anv_american_pie: "Шматочок американського пирога"
  anv_american_pie_desc: "Андейл - найкраще містечко в США! Маленький шматочок довоєнного життя в післявоєнному світі... з усіма наслідками."
  anv_meat_mania: "М'ясоманія"
  anv_meat_mania_desc: "В Андейлі повно м'яса, хоча не видно жодного браміна..."
  anv_stepford_style: "Степфордський стиль"
  anv_stepford_style_desc: "Мешканці Андейла вірять, що їхній шлях - найкращий, навіть якщо він не протримається довго під «вогнем»..."
  anv_mysterious_happenings: "Таємничі події"
  anv_mysterious_happenings_desc: "Чи пам'ятаєте ви, що стало відомо в день смерті музики?"
  anv_kill: "Садистське харчування"
  anv_kill_desc: "В Андейлі людей убивають і їдять, але не завжди в такому порядку..."
  anv_settle: "Наш спосіб життя"
  anv_settle_desc: "Людожерство не обов'язково має бути нецивілізованим. В Андейлі мандрівні мандрівники є таким самим джерелом їжі, як і будь-яке інше."

  ####APP####
  app_victors_of_the_swamp: "Переможці Болотяної війни"
  app_victors_of_the_swamp_desc: "Наша перемога над віщунами та фанатиками викликала невдоволення. Гадаю, це означає, що ми знаємо, з чим маємо справу."
  app_the_great_wheel: "Велике Колесо"
  app_the_great_wheel_desc: "Велике Колесо - дар Посейдона, сховище знань зі Старого Світу."
  app_guardians_of_apocryphia: "Вартові Апокрифів"
  app_guardians_of_apocryphia_desc: "Посейдон, Бог Моря, доручив нам, своїм послідовникам, захистити Місто Знань від тих, хто хоче його зруйнувати, і ми впораємося з цим завданням!"

  ####LOR####
  LOR_power_of_magnets:0 "Сила Магнетизму"
  LOR_power_of_magnets_desc:0 "Володіння магнетичними силами дає нам перевагу в боротьбі з важкоброньованими противниками."
  LOR_scientific_tunnelvision_idea:0 "Науковий тунельний зір"
  LOR_scientific_tunnelvision_idea_desc:0 "Усе наше суспільство обертається навколо вивчення магнітних полів. Ця зосередженість дозволила нам досягти великих висот і зберегти єдність нації, але вона не позбавлена недоліків. Незважаючи на всю міць нашої зброї, більшість наших людей зацікавлені в її вдосконаленні, а не в стрільбі. Якщо ми зіткнемося з рішучим противником, у нас будуть проблеми."

  ####ONN####
  ONN_land_of_lotus:0 "Земля пожирачів Лотоса"
  ONN_land_of_lotus_desc:0 "Бідняки Західної Вірджинії вже давно вдаються до наркотиків, щоб врятуватися від бід колишньої країни. Кігті смерті, рейдери та гулі – зрозуміло, чому жителі переважно вирішили доживати свої дні в психоделічному блаженстві. Вічна подорож позбавляє їх здатності бачити навколишній світ. Зрештою, ці люди будуть блукати, поки не перестануть рухатися, а потім заснуть, поки не перестануть дихати. Спроба Америки приборкати цей древній світ зазнає невдачі, коли остання людина в Західній Вірджинії помре від їхнього постійного раю. \n\n§RЯкщо Леоне помре, не знайшовши виходу з кризи, країна зруйнується, а її населення буде розорено.§!"
  ONN_strained_administration:0 "Напружене управління"
  ONN_strained_administration_desc:0 "Оніонбург керується невеликою групою розумних людей, що залишилися. Вони з труднощами керують суспільними системами, необхідними для підтримання життя та роботи людей, але їхня нечисленність дозволяє швидше та ефективніше здійснювати зміни."
  ONN_reliant_on_protectors_idea:0 "Залежність від захисників"
  ONN_reliant_on_protectors_idea_desc:0 "Чи то Ґрін-Маунтін Бойз в обмін на їжу, чи таємничий захисник у лісі, наш народ схильний покладатися на інших, щоб захистити нас від небезпек. Майже всі ми більше звикли тримати косу, ніж гвинтівку. Це зробило б нас легкою здобиччю для рейдерів, якби нас не захищали сусіди."


  ####MON####
  MON_the_hills_hide:0 "Пагорби зберігають таємниці"
  MON_the_hills_hide_desc:0 "Хребет Аппалачі існує вже багато століть, і за цей час усі істоти на Землі в той чи інший час шукали притулку на його пагорбах. На схилах пагорбів видно шрами, а під незайманим брудом лежить фундамент із мерців. Нерозказана історія цієї землі притягує людей, і ті, хто спостерігає за пагорбами, стають їхніми вартовими. Кожен, хто провів час у лісах Мононгагели, знаходить розраду в тому, що сам хребет - живий, і коли прийде його час, він прийме його і буде захищати доти, доки існує Земля."

  ####COC####
  COC_the_holy_fusion:0 "Святе Злиття"
  COC_the_holy_fusion_desc:0 "Культ Кобальту вважає, що знайшов єдине істинне джерело трансцендентного в Пустці. Утворившись в результаті місії Дітей Атома, вони виявили рештки Західної Вірджинії, яка зазнала ядерного бомбардування не один раз, а кілька разів після Великої війни. Вони сприйняли це як одкровення і почали поклонятися двом аспектам Атома: Поділу та Злиттю. Поділ - це смерть, а Злиття - відродження. Досі вони мирно живуть у Західній Вірджинії, але хто знає, як довго це триватиме?"
  COC_crisis_among_warriors_idea:0 "Занепад класу воїнів"
  COC_crisis_among_warriors_idea_desc:0 "Наше мирне існування в Аппалачах призвело до того, що багато наших воїнів склали зброю, щоб зайнятися іншими справами. І так, ймовірно, буде тривати доти, доки дикуни на північ від нас не вторгаються."

  ####OUT####
  OUT_true_loyalists:0 "Справжні лоялісти"
  OUT_true_loyalists_desc:0 "Братство називає нас вигнанцями, тому що боїться правди - того, що саме вони відступили від наших ідеалів."

  ####HAB####
  HAB_johnstown_tributes:0 "Виплати Джонстауна"
  HAB_johnstown_tributes_desc:0 "У сусідньому поселенні Джонстаун вже давно знають, що краще відкупитися від бандитів з Гаррісбурга, ніж ризикувати зіткнутися з їхнім гнівом."
  HAB_pitt_trade:0 "Торгівля з Піттом"
  HAB_pitt_trade_desc:0 "Бандити з Гаррісбурга є однією з багатьох груп, які постачають до Пітта постійний потік рабів для роботи в їхніх кузнях. Кришки, отримані від продажу полонених, ідуть на фінансування подальших рейдів."

  ####AFB###
  AFB_dormant_facility:0 "Неактивний об'єкт"
  AFB_dormant_facility_desc: "Авіабаза Адамс пустує вже майже 200 років. Її метал іржавіє, а автоматизовані системи погрязли в щоденній рутині патрулювання території, щоб не допустити проникнення сторонніх. Щоб зітрусити пил із цього місця, знадобиться щось серйозне."
  AFB_no_entry:0 "ВХІД ЗАБОРОНЕНО"
  AFB_no_entry_desc:0 "Стороннім особам заборонено перебувати на території авіабази Адамс. Ті, хто намагався проникнути всередину, були зустрінуті лазерним вогнем, і так буде тривати доти, доки не буде знищено останнього протектрона."

  ####HOS####
  hos_hit_the_ice:0 "Удар по льоду"
  hos_hit_the_ice_desc:0 "Хозери, як і їхній родич Ронто, одержимі хокеєм. Через відсутність «цивілізованих» жителів Ронто, хозери розробили свій вид спорту, ще більш жорстокий, ніж у Ронто. Жертви неминучі за такого жорстокого суперництва, але це лише частина задоволення. Залишається тільки дивуватися, як їм і Ронто взагалі вдається проводити матчі один проти одного."

  hos_team_mentality:0 "Командний менталітет"
  hos_team_mentality_desc:0 "Команди Хозерів - це закриті клуби, в яких панує почуття товариськості та згуртованості, практично небачене раніше в рейдерських угрупованнях. Гравці підтримують тісні дружні стосунки, і вболівальники теж. Однак, як і в будь-якому закритому клубі, ціна членства в ньому висока."

  ####JON####
  JON_hab_tribute:0 "Виплати Гаррісбургу"
  JON_hab_tribute_desc:0 "Коли гаррісбурзькі бандити почали здійснювати рейди на ферми Джонстауна, і міська міліція виявилася не в змозі протистояти їм, мер Бауер зробив бандитам пропозицію. В обмін на 10% врожаю бандити залишать місто та його жителів у спокої. На жаль, зі зростанням сили бандитів зростали і їхні вимоги. Наразі жителі віддають 20% свого врожаю, надають бандитам вільний доступ до доріг для караванів з рабами, а другу дочку в сім'ї по досягненню повноліття видають заміж за одного з бандитів. Але все ж це краще, ніж піддаватися грабункам кожні кілька тижнів... чи не так?"
  JON_road_wardens:0 "Дорожні наглядачі"
  JON_road_wardens_desc:0 "Щодня через Джонстаун проходять каравани, що прямують до Пітта для продажу рабів, захоплених гаррісбурзькими бандитами або куплених в інших банд рейдерів. Час від часу каравани потрапляють у засідку, влаштовану невідомими дружинниками, відомими як «Дорожні наглядачі». Складаючись із фермерів Джонстауна, яким набридло заплющувати очі на страждання тих, кого продають бандити, вони ретельно координують удари, коли це можливо, щоб звільнити рабів і завдати удару у відповідь своїм кривдникам. Однак якщо напад не вдається, і когось ловлять, то, як правило, його сім'я потрапляє до наступного каравану."

  ####KWF####
  kwf_horrors_of_the_open_ocean:0 "Жахи відкритого океану"
  kwf_horrors_of_the_open_ocean_desc:0 "Рештки американського флоту століттями дрейфували за течіями Атлантики, а люди на борту були замкнені в нескінченному заточенні. Ті, хто вижив, нещодавно знайшли сушу, на якій залишилося лише кілька кораблів, і вони не мають бажання знову переживати час, проведений у морі. Відомий Народ починає цуратися своєї морської спадщини та знань, які їй супутні."

  ####BFI####
  BFI_pirate_problems:0 "Проблема піратів"
  BFI_pirate_problems_desc:0 "Рибальські господарства Затоки вже понад 50 років ведуть відносно спокійне та безтурботне існування. Якщо не чіпати божевільних роботів, то вони залишать у спокої і вас, а якщо ви бідні, то ніхто не влаштовуватиме на вас набіги. До недавнього часу. Дуврські торговці тепер реорганізовані під керівництвом єдиного експансіоністського лідера, і їхня підступна меркантилістська політика загрожує відрізати нас від можливості торгувати з кимось іншим.\n\nЗрозуміло, це стосується і політики, і найнятих ними піратів."

  ####DOT####
  DOT_on_sea_or_land:0 "На морі чи на суші"
  DOT_on_sea_or_land_desc:0 "Серед рибалок Затоки з'явилося гасло, яке поширилося і на дуврських торговців: §Y«Куди б ти не пішов, на морі чи на суші, від губернатора Голланда не сховаєшся!»§!\n\nЦе правда. Сфера впливу губернатора Голланда, та й усіх торговців загалом, простягається все далі. Торгової слави йому вже недостатньо."
  DOT_trading_force_to_be_reckoned_with:0 "Торгова сила, з якою слід рахуватися"
  DOT_trading_force_to_be_reckoned_with_desc:0 "Торговці Дувра завжди відрізнялися високим рівнем меркантилізму і давно отримують вигоду зі свого потужного торгового становища."

  ####GEL####
  GEL_the_ordnung:0 "§OОрднунг§!"
  GEL_the_ordnung_desc:0 "Не плутайте амішів Ґелассенгайту з амішами Долини Амман. У Ґелассенгайті верховенствує §OОрднунг§!. Спосіб життя та кодекс поведінки, що приписує громадянам правила життя і має найвищу законодавчу силу. Приїжджих часто вражає тиша, адже кожен чоловік, жінка і дитина точно знає, що він повинен робити, і слова не пропадають даремно. Дехто стверджує, що Гелассенгейт - це свого роду вулик, але це, звичайно, не так.\n\nЦе всього лише §OОрднунг.§!"

  ####BKR####
  BKR_ice_breakers:0 "Криголами"
  BKR_ice_breakers_desc:0 "За плечима у Руйнівників довга історія боротьби з усім, що їм суне крижана північ. Ні лід, ні сніг, ні вороги - ніщо не може завадити їхнім кораблям доплисти до місця призначення."
  ###WDW###
  WDW_centuries_of_hate:0 "Століття ненависті"
  WDW_centuries_of_hate_desc:0 "Ми не пам'ятаємо боротьбу наших предків за свободу або їхній опір імперіалістичній армії, що перетинала міст із Детройта. Ми пам'ятаємо лише, що з тих пір, як впали бомби, ми перейшли цей міст, завдаючи швидких і потужних ударів. Навіть якщо ми не пам'ятаємо, чому ми це почали, 200 років конфлікту дали нам достатньо причин продовжувати."
  WDW_motor_capital_of_canada:0 "Автомобільна столиця Канади"
  WDW_motor_capital_of_canada_desc:0 "Віндзор був центром канадської автомобільної промисловості майже століття, до того як впали бомби. Хоча багато фабрик затихли і занепали, у кількох старих цехах, як і раніше, горить світло."
 
 ###USF###
  USF_federation_politics_idea:0 "Федеративна політика"
  USF_federation_politics_idea_desc:0 "«Що добре для Етеви, може бути погано для НеЮтіки» — поширений вислів у Федерації Північних Штатів. Він відображає, як різні потреби різних поселень у федерації часто призводять до розрізненої політики та суперечок. Ці відмінності не розкололи федерацію, але навряд чи сприяли прогресу."
  USF_route_90_idea:0 "Торгівля за маршрутом 90"
  USF_route_90_idea_desc:0 "Відносно добре збережена довоєнна автомагістраль проходить майже через усі великі населені пункти Федерації Північних Штатів. Ця єдина транспортна артерія добре прохідна і полегшує доставку вантажів. Однак головна сила Федерації може стати її головною слабкістю. Якщо цю дорогу буде перекрито, наслідки будуть катастрофічними."
 
 ###HSY###
  HSY_valued_goods_idea:0 "Цінні товари"
  HSY_valued_goods_idea_desc:0 "Шоколад - не єдине, що виробляють Кондитери. Ці майстри-аміші виготовляють різноманітні якісні товари, які приваблюють торговців з усієї пустки."
  HSY_peaceful_nature_idea:0 "Мирна натура"
  HSY_peaceful_nature_idea_desc:0 "Конфлікти не в природі Кондитерів. Їхній дім - рай за мірками пусток, а його стіни здатні вберегти від більшості загроз."
  
  ###OSH###
  OSH_open_port_idea:0 "Відкритий порт"
  OSH_open_port_idea_desc:0 "Наш порт відкритий для будь-якого судна, яке шукає гавань і торгівлю. Хоча з кришками часто трапляються неприємності."
  OSH_respect_the_lakes_idea:0 "Повага до озер"
  OSH_respect_the_lakes_idea_desc:0 "Наші капітани знають, що не варто недооцінювати озера. Вони поважають їхню міць і не йдуть на невиправданий ризик. Саме тому багато хто з них повертається додому зі своїх подорожей."
  
  ####General####
  vir_scourge_swamp:0 "Болотяна напасть"
  vir_scourge_swamp_desc:0 "Болото - це не просто земля. Це жива істота. Ви повинні поважати його, інакше воно поглине вас у своїх каламутних глибинах. Чорт, навіть якщо ви будете поважати його, воно все одно може це зробити."
  ECR_112_research_idea:0 "Розум Брауна"
  ECR_112_research_idea_desc:0 "В обмін на те, що ми дозволяємо доктору Станісласу Брауну зберігати його іграшки і надаємо деяку підтримку в роботі притулку, ми іноді отримуємо його допомогу в дослідженнях. Будемо сподіватися, що ця угода варта того, щоб приректи цих бідних людей на вічні муки."
  ECR_map_paint_idea:0 "Сила Сходу"
  ECR_map_paint_idea_desc:0 "Ми - наймогутніша нація на Сході, і тому ми звернемо свою увагу на Захід. Будемо сподіватися, що там не виявиться листоноші, який просто скаже нам забиратися геть на Схід."
  