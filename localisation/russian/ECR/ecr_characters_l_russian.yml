l_russian:
  AMM_Abraham_name:0 "Авраам"
  AMM_Abraham_desc:0 "Брат Авраам является фактическим лидером долины Аммана. Прибыв с группой беженцев-супермутантов из Города, он благодаря своему высокому интеллекту и харизматичной натуре (для супермутанта) завоевал доверие и любовь своих братьев во Христе. Теперь община надеется на него в эти непростые времена."

  APP_Theseus_name:0 "Тесей Лэнс"
  APP_Theseus_desc:0 "Титул Тесея, правителя Апокрифии, передавался из поколения в поколение с тех пор, как Тесей Великий выбрал своим преемником Давида Благочестивого после своей смерти. Тесей Лэнс был избран за доблесть во время Болотной войны и защищал Великое Колесо и Бога Морей. Но он страдает от радиационного отравления, и его отказ выбрать преемника и нежелание признать свою болезнь могут обернуться бедой для Стражей Апокрифии..."

  LOR_LORENTZ_NAME:0 "Лоренц"
  LOR_LORENTZ_DESC:0 "В детстве Лоренц и его семья оказались под гнётом местной банды рейдеров. В конечном итоге этих рейдеров вытеснили незнакомцы в силовой броне, которые затем нацелились на семью Лоренца. В хаосе Лоренц был загнан на разрушенную свалку, где его загнал в угол рейдер в силовой броне. Спасение ему принес только закопанный магнит из металлолома, который оторвал броню от тела ее владельца. Хотя его семья была мертва, Лоренц наконец-то получил возможность подняться в иерархии пустошей. Годы испытаний и совершенствования окупились, когда Лоренц и его растущая группа «ученых» подверглись нападению одиноких паладинов по пути в Столицу. Эти Паладины проникли на тщательно заминированную свалку, и их силовые костюмы превратились в ошметки из-за мощных магнитных ловушек. Доказав местным сообществам силу магнетизма, Лоренц теперь имеет возможность начать более экстравагантные и дальнобойные испытания. Возможно, однажды он сможет положить конец господству силовой брони над жителями Пустоши."
  LOR_FARADAY_NAME:0 "Доктор Фарадей"
  LOR_FARADAY_DESC:0 "Первоначально привлечённый Лоренцом благодаря его научным исследованиям, доктор Фарадей всё больше беспокоился за своего партнёра по исследованиям. Безумие Лоренца резко контрастирует с растущим состраданием доктора Фарадея к людям, вынужденным жить в Пустоши. Фарадей надеется, что благодаря прогрессу они смогут начать строить цивилизацию на этой земле и положить конец многовековым разрушениям, последовавшим за ядерной войной."

  COC_radiant_kate_name:0 "Лучезарная Кейт из Кобальта"
  coc_radiant_kate_desc:0 "§C«Наш путь - путь деления и синтеза. Наш путь - единственная надежда человечества на истинное возрождение»§!\n\nЛучезарная Кейт из Кобальта - вторая из Лучезарности, лидеров Культа. Кейт идёт по стопам своей предшественницы, Лучезарной Таррен из Кобальта, и желает лишь мира и уединения для своего народа. Атом знает, что жизнь в Западной Вирджинии и без рейдеров, маньяков в силовых доспехах и прочих внешних захватчиков и так достаточно тяжела."
  coc_unit_leader_name:0 "Сестра Вон"

  OUT_Casdin_name:0 "Протектор Генри Касдин"
  OUT_Casdin_desc:0 "Генри Касдин когда-то был одним из ближайших последователей старейшины Лайонса и его самых свирепых воинов. По мере того как Лайонс все дальше отходил от идеалов, в которые верил Касдин, последний начал организовывать последователей, разделявших его взгляды. Паладины, уставшие сражаться с супермутантами, защищая презрительных обитателей пустошей, и писцы, уставшие от недостатка технологий, которые Братство восстановило. Касдин и его последователи покинули Братство, захватив Форт Индепенденс и посвятив себя изначальной миссии Братства."

  OUT_McGraw_name:0 "Протектор МакГраф"

  OUT_Zhu_name:0 "Защитник Шу"

  ONN_LEONE_NAME:0 "Гид Леоне"
  ONN_LEONE_DESC:0 "Семья Леоне не является коренными жителями Западной Вирджинии, они переехали сюда около 200 лет назад с первыми волнами беженцев из Союза. Возможно, именно это спасло его от плохих привычек. Как бы то ни было, теперь он пасёт стадо, практически не видя реального мира. Сожженная местность уже не так опасна для него, как для его предков, но Леоне все еще лежит без сна, боясь за свой народ."

  MON_HEAD_RANGER_NAME:0 "Главный рейнджер"
  MON_RANGER_DESC:0 "Главный рейнджер бесцельно бродил по пустошам, покорный прихотям судьбы. Пока он случайно не оказался в глубинах Аппалачей. Вечные холмы имеют свойство играть с человеком: люди попадают под опеку горных хребтов, а те, в свою очередь, сами заботятся о холмах. Со временем узнаешь лица тех, кто охраняет свое святилище. Главный рейнджер не может сказать, когда он решил поселиться в Аппалачах, или когда он начал следовать приказам самопровозглашённых рейнджеров, или когда он стал отдавать приказы. Он лишь малая часть истории холмов, но он знает, что холмы помнят каждое существо, которое им подчиняется."

  ANV_jack_smith_name:0 "Джек Смит"
  ANV_jack_smith_desc:0 "Патриарх Андейла, Джек Смит, призывает всех своих граждан голосовать за республиканцев на каждых выборах, как и положено добропорядочным американцам. Под его руководством, основанным на семейных ценностях, Андейл не раз доказывал, что является лучшим городом в Вирджинии... если вы не против поедания людей."

  ANV_bill_wilson_name:0 "Билл Уилсон"

  ANV_militia_name:0 "Роберт Вудбери"
  ANV_assjerky_jones_NAME:0 "Засранец Джерки Джонс"
  ANV_andale_trader_NAME:0 "Джудит Хьюи"
  ANV_littlehorn_minister_NAME:0 "Литтлхорн"

  ANV_obadiah_name:0 "Обадия Блэкхолл"
  ANV_obadiah_desc:0 "Обадия - последний живой представитель семьи Блэкхолл. Когда-то эта семья обладала огромным богатством и дурной славой в регионе Пойнт-Лукаут, и теперь их последний наследник стремится восстановить былое положение семьи. Хотя он стар и немощен, в его голосе слышна огромная сила, и многие в Андейле верят, что он может привести их к будущему, полному невиданного могущества."
  ANV_obadiah_desc_2:0 "§CМы побывали в тёмном сердце Данвича. Мы заняли своё место в глубинах Глубокого Храма. С завершением Великого Пира Уг-Квалтот вернулся. Бойтесь, черви."

  KWF_CHRISTIAN_NAME:0 "Шеф-повар Кристиан"
  KWF_CHRISTIAN_DESC:0 "Кристиан был одним из тех, кто родился в плавучем чистилище Атлантики. Он сыграл ключевую роль в принятии решений во время первой высадки, обеспечив полный контроль над побережьем. Теперь он и его народ должны научиться бороться за мир, от которого они были отрезаны 200 лет. Известный Народ создал сложную устную историю о том, как и почему они были заключены в тюрьму на бывшем Атлантическом флоте, и теперь им нужно подготовить своих детей к борьбе за свое место на суше. Даже если эта земля - не более чем радиоактивное болото."

  afb_security_computer_name:0 "Программа безопасности"
  afb_security_computer_desc:0 "ВНИМАНИЕ! ВНИМАНИЕ! ЭТО ОБЪЕКТ, ОХРАНЯЕМЫЙ США. ПОПЫТКИ НЕСАНКЦИОНИРОВАННОГО ДОСТУПА БУДУТ ПРЕСЛЕДОВАНЫ СМЕРТЕЛЬНЫМ ОГНЕМ."

  afb_security_bot_186_name:0 "Робот Охранник 186"

  TRN_trog_alpha_name:0 "Альфа Трог"
  trn_trog_alpha_desc:0 "Хотя вблизи их никогда не видели, наблюдатели издалека заметили, что некоторые троги ведут себя подобно волчьей стае, следуя за одним альфой, который обычно крупнее и сильнее остальных. Можно увидеть, как этот альф-трог получает дань от низших трогов, а также подталкивает более слабых в определённых направлениях. Неизвестно, означает ли это, что у трогов есть какая-либо форма высшего разума, или они просто те животные, за которых их большинство принимает."

  TRN_big_trog_name:0 "Большой Трог"

  HAB_maverick_becker_name:0 "Маверик Беккер"
  HAB_maverick_becker_desc:0 "Мэверик Беккер добился того, чего мало кому удавалось главарям рейдеров со времён Первой мировой войны: состарился и остался у власти. Он добился этого не потому, что был самым грозным или сильным в своей банде, а благодаря своему остроумию и обаянию, заключая множество выгодных сделок для банды. Они пользуются стабильным снабжением едой, изредка заглядывают женщины из Джонстауна, а также хорошим запасом патронов и боеприпасов из Питта. Хотя не все люди Мэверика достаточно умны, чтобы это понять, его ближайшие помощники понимают, что этот комфортный образ жизни вряд ли продлится долго, если он исчезнет."

  HAB_craig_boyd_name:0 "Крейг Бойд"

  HAB_finlay_cook_name:0 "Финли Кук"

  JON_duncan_bauer_name:0 "Дункан Бауэр"
  JON_duncan_bauer_desc:0 "Чуть более 20 лет назад Дункан Бауэр занял пост мэра Джонстауна. Обычно эта работа заключалась в урегулировании мелких споров в общине и заключении торговых сделок во время сбора урожая. К сожалению для Дункана, на этот раз он стал свидетелем наступления армии Ашура на западе и наступления бандитов из Харрисберга на востоке. Оказавшись между двумя угрозами и без какой-либо помощи, мэр Бауэр был вынужден сделать непростой выбор. Хотя мало кто недовольствует его решениями, принятыми ради сохранения общины, ещё меньше тех, кто восхваляет его. Единственная причина, по которой его до сих пор не отстранили от должности, заключается в том, что никто другой не хочет принимать решения, которые он принимает."

  JON_jenson_moss_name:0 "Дженсон Мосс"

  DOT_governor_holland_name:0 "Губернатор Холланд"
  DOT_governor_holand_desc:0 "Губернатор Холанд был движущей силой агрессивных торговых стратегий Дуврских торговцев в течение последних нескольких лет. Любой торговец в бассейне, не поддерживающий Дувр, быстро обнаруживает, что его суда заблокированы на реках, сталкиваются с конкурирующими торговцами, продающими товары в убыток, а иногда и с речными пиратами. Хотя Союз Дуврских торговцев официально не связан с морскими разбойниками, он предлагает «защиту» торговцам, которые соблюдают Хартию Дуврских торговцев и соглашаются отчислять 20% своей прибыли в казну."

  DOT_eric_anderson_name:0 "Эрик Андерсон"

  DOT_cap_santiana_name:0 "Капитан Сантьяна"
  
  BFI_captain_atkinson_name:0 "Капитан Аткинсон"
  BFI_captain_atkinson_desc:0 "Капитан Аткинсон родился на корабле и уверяет, что именно там и встретит свой конец. Этот моряк, пропитанный морской стихией, пользуется большим уважением среди своих последователей как истинный моряк, который не боится засунуть руки по самые запястья в рыбьи кишки или обжечься от развязавшегося каната. Хотя последнее десятилетие он вёл свой народ в основном в мирные времена, на горизонте уже слышны предчувствия морской войны, поскольку Дуврские торговцы начинают смотреть на север."

  BFI_cody_gill_name:0 "Коди Гилл"

  GEL_dutchman_name:0 "Датчман"
  GEL_leader_desc:0 "Датчман тихий, как и остальные амиши Гелассенхайта. Никто за пределами Гелассенхайта не знает, кто на самом деле ими руководит и есть ли у них вообще лидер, но Датчман, похоже, представляет свой народ, когда это необходимо. Даже на вопрос, является ли он лидером или просто представителем, он молчит. Всегда молчит."

  BKR_ashley_name:0 "Эшли Пера"
  bkr_ashley_pera_desc:0 "Эшли Пера выросла где-то на ледяном севере, вдали от тех мест, куда даже жители Ронто не решаются зайти. Её семья бежала от какого-то монстра, которого она помнит лишь смутно – видения когтей, зубов, дергающихся конечностей и бесформенной массы в детском сознании. Она была единственной из своей семьи, кто выжил. Добравшись до юга, она остановилась и собрала разрозненных озёрных кочевников на юго-восточном берегу озера Эри. \n\nТеперь она правит своей новой страной как Снежная Королева, ставя во главу угла развитие своего народа и надеясь, что то, что преследовало её на севере, никогда не вернётся."

  WDW_archer_phillips_name:0 "Арчер Филлипс"
  WDW_archer_phillips_DESC:0 "Арчер Филлипс - последний в длинном ряду повелителей разрушений в Виндзоре. Как и его предшественники, он заслужил уважение банды после успешного рейда через мост в Детройт. Он даёт те же обещания, что и последние 200 лет: что их мерзкие враги по ту сторону моста погибнут, но он осознаёт то, чего не осознавали его предшественники. Чтобы победить этого врага, им, возможно, придётся сначала перенять силу соседей на востоке."

  WDW_terence_fuller_name:0 "Теренс Фуллер"

  DCM_Shepard_name:0 "Шепард"

  DCM_OverlordRake_name:0 "Повелитель Рейк"

  DCM_Atlas_name:0 "Атлас"

  DCM_Clancy_name:0 "Клэнси"

  DCM_Collossus_name:0 "Колосс"

  DCC_gustavo_name:0 "Колониальный вождь Густаво"
  DCC_gustavo_desc:0 "Бывший начальник службы безопасности Тенпенни-Тауэр, колониальный вождь Густаво теперь возглавляет Аппалачскую колонию. Он правит железной рукой, следя за тем, чтобы непомерные налоги, взимаемые Тенпенни, собирались, а тех, кто сопротивляется, подвергают показательным наказаниям."

  ONT_major_hurley:0 "Майор Хёрли"
  ONT_major_hurley_desc:0 "Майор Рик Хёрли был самым высокопоставленным офицером Анклава Онтарио, вернувшимся в свой бункер во время отступления в 2245 году. 30 лет майор делал всё возможное, чтобы удержать вместе выживших после восстания мутантов. В первые годы после него, оплакивая павших и переживая бесчисленные сбои жизненно важных систем, майор Хёрли не давал своим людям потерять надежду на то, что однажды они вернут поверхность. Несмотря на обещания славного триумфа, он всегда втайне надеялся, что не ему предстоит возглавить возвращение. Он не понаслышке знает, насколько беспощаден внешний мир."

  HSY_mattithiah_name:0 "Маттитиа Хохстелтер"
  HSY_mattithiah_desc:0 "Если и есть что-то особенное в Маттитии Хохстелтере, так это ценность упорного труда и важность семьи. Следуя этим принципам, он обеспечивает успех своих сотрудников. Торговцы стекаются в Херши за качественными товарами и редкой роскошью, которую можно найти на пустыре, – шоколадом. Успех Херши также привлёк нежелательное внимание, и, хотя стены Херши-парка держались годами, сейчас уже дают трещины."

  HSY_zedekiah_name:0 "Зедекия Рабер"

  USF_gary_chalmers_name:0 "Гэри Чалмерс"
  USF_gary_chalmers_desc:0 "Уроженец Ютики, инспектор Чалмерс провёл большую часть юности, путешествуя по 90-му шоссе в качестве охранника каравана. После нескольких опасных ситуаций стареющий охранник решил попробовать свои силы в политике. Обещая безопасность от банд рейдеров на юге, мутантов на западе и всего, что происходило на востоке, Чалмерс приобрёл огромную популярность. Он уже три срока занимает пост инспектора Совета городов Федерации. Пока он обеспечивает безопасность своих людей, он, вероятно, сможет обеспечить себе и четвёртый срок."
  USF_cotton_toule_name:0 "Коутон Тоул"

  OSH_jason_kane_name:0 "Джейсон Кейн"
  OSH_jason_kane_desc:0 "Нынешний капитан порта Хоуп, Джейсон Кейн, – опытный капитан торговых судов Великих озёр. Пройдя путь от самых дальних уголков озера Верхнее до озера Онтарио, он знает, насколько опасны ноябрьские штормы и как важно бережно относиться к воде. Однако надвигается не совсем реальный шторм, через который ему придётся провести свой народ. Силы нарастают в Ронто на западе и на облучённых руинах Оттавы на востоке." 
