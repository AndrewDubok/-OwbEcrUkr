l_russian: 
DCM_vault_108:0 "Сховище 108"
DCM_vault_108_desc:0 "Ще одне тупе Сховище. Жодної зеленої жижі, тільки мертві люди."
DCM_old_waste_disposal_site:0 "Старе звалище відходів"
DCM_old_waste_disposal_site_desc:0 "Фокс бачить цю велику купу брухту і думає, що це знадобиться для Сховища. Шепард бачить більше металу для більшої кількості пушок."
DCM_rock_breakers_last_gas:0 "Остання заправка «Скелеломів»"
DCM_rock_breakers_last_gas_desc:0 "Маленький табір мутантів на старій заправці. Нам треба повернути їх у Сховище."
DCM_the_irradiated_metro:0 "Радіоактивне метро"
DCM_the_irradiated_metro_desc:0 "Старі тунелі, повні зеленої штуки. Але не тієї зеленої жижі. Все одно, деякі мутанти стають зеленішими?"
DCM_shepards_new_mutant_army:0 "Нова армія мутантів Шепарда"
DCM_shepards_new_mutant_army_desc:0 "Мутанти розкидані. Все ще сильніші за людей. Але люди у великих групах можуть битися з мутантами в малих групах. А от мутанти у великих групах?"
DCM_the_meta_human:0 "Мета-людина"
DCM_the_meta_human_desc:0 "У мутантів із Сховища 87 закінчується зелена жижа. Може, Фокс знайде ще, бо він розумний і знається на комп'ютерах."
DCM_rebuilding_vault_87:0 "Відбудова Сховища 87"
DCM_rebuilding_vault_87_desc:0 "Фокс каже, що ремонт Сховища допоможе нам знайти зелену жижу."
DCM_the_green_stuff:0 "Зелена жижа"
DCM_the_green_stuff_desc:0 "Вона потрібна нам, щоб робити більше мутантів. А нам треба робити більше мутантів."
DCM_mutant_scavenging:0 "Мутанти-збирачі"
DCM_mutant_scavenging_desc:0 "Нам треба шукати пушки і речі, які допоможуть знайти зелену жижу. Але часу роздивлятися все нема."
DCM_mutant_patrols_of_outer_dc:0 "Патрулі мутантів на околицях Вашингтона"
DCM_mutant_patrols_of_outer_dc_desc:0 "Мутанти, які повертаються до 87-го, розповідають про місця з корисними речами. Ми йдемо дивитися."
DCM_the_mall:0 "Торговий центр"
DCM_the_mall_desc:0 "Мутанти у Вашингтоні не знайшли зеленої жижі, але в людей, яких вони вбили, є хороші речі, які можна забрати."
DCM_reunite_lost_mutant_camps:0 "Возз'єднати загублені табори мутантів"
DCM_reunite_lost_mutant_camps_desc:0 "Мутанти сильні. Мутанти разом — ще сильніші."
DCM_no_germans_in_german_town:0 "Німецьке місто без німців"
DCM_no_germans_in_german_town_desc:0 "У Джермантауні багато мутантів, які тягають людей назад у Сховище. Тепер вони потрібні нам для інших справ."
DCM_the_bigger_they_are:0 "Чим вони більші"
DCM_the_bigger_they_are_desc:0 "Атлас — найбільший бегемот навколо. Він змусить інших бегемотів слухатися."
DCM_vault_tec_headquarters:0 "Штаб-квартира Волт-Тек"
DCM_vault_tec_headquarters_desc:0 "Фокс каже, що Волт-Тек поклав зелену жижу в наше Сховище. Їхні комп'ютери можуть знати, де знайти ще."
DCM_georgetown_mutants:0 "Джорджтаунські мутанти"
DCM_georgetown_mutants_desc:0 "Люди з «Талону» все ще б'ються з мутантами в Джорджтауні. Треба з цим закінчити."
DCM_mutants_in_the_reflecting_pool:0 "Мутанти біля Відбивного басейну"
DCM_mutants_in_the_reflecting_pool_desc:0 "У Торговому центрі найбільші битви. Тупі люди все лізуть туди, хоча знають, що ми там."
DCM_raid_the_capital_building:0 "Рейд на Капітолій"
DCM_raid_the_capital_building_desc:0 "Люди з «Талону» в Капітолії мають великі пушки. Якщо ми їх вб'ємо, то заберемо пушки."
DCM_the_museum_of_technology:0 "Музей технологій"
DCM_the_museum_of_technology_desc:0 "У Музеї технологій багато комп'ютерів. Забрати їх для Фокса."
DCM_takoma_park_expedition:0 "Експедиція в парк Такома"
DCM_takoma_park_expedition_desc:0 "Кілька мутантів пішли в парк Такома дуже давно. Треба перевірити, чи вони ще там."
DCM_the_giants_of_jury_street:0 "Велетні з Джурі-стріт"
DCM_the_giants_of_jury_street_desc:0 "Патрулі бачать бегемотів біля Джурі-стріт. Може, вони допоможуть."
DCM_the_giants_roar:0 "Ревіння велетнів"
DCM_the_giants_roar_desc:0 "Бегемоти навколо 87-го весь час ревуть, і найбільший реве у відповідь. Ми не знаємо, що вони кажуть, але коли великий реве, інші затихають."
DCM_vault_92:0 "Сховище 92"
DCM_vault_92_desc:0 "Ні зеленої жижі. Ні людей. Тільки метал і вода."
DCM_vault_106:0 "Сховище 106"
DCM_vault_106_desc:0 "Входити в Сховище — дивно. Бачиш кольори і людей... знаєш людей... від цього голова болить."
DCM_horrors_of_vault_tec:0 "Жахи Волт-Тек"
DCM_horrors_of_vault_tec_desc:0 "У жодному Сховищі не було зеленої жижі. Волт-Тек — тупі, поклали її тільки в 87-й!"
DCM_big_trouble_in_big_town:0 "Великі проблеми у Великому Місті"
DCM_big_trouble_in_big_town_desc:0 "Маленькі групи мутантів бачать, що Шепард сильний. Вони хочуть бути сильними з нами."
DCM_everglow_outpost:0 "Форпост «Вічний Вогонь»"
DCM_everglow_outpost_desc:0 "Якщо поставити табір біля кемпінгу, можна легко ловити людей на дорозі."
DCM_secure_the_vault:0 "Захистити Сховище"
DCM_secure_the_vault_desc:0 "Жодна людина не достатньо сильна, щоб увійти в 87-й. Але ми все одно можемо зміцнитися."
DCM_the_blue_line:0 "Синя лінія"
DCM_the_blue_line_desc:0 "Якщо ми підемо під землю, люди нас не побачать. Тоді ми їх зловимо."
DCM_the_red_line:0 "Червона лінія"
DCM_the_red_line_desc:0 "Ці тунелі ведуть у Вашингтон. Легко підкрастися до людей."
DCM_clean_out_metros:0 "Зачистити метро"
DCM_clean_out_metros_desc:0 "У тунелях багато поламаних речей, з яких Фокс може зробити корисні штуки."
DCM_the_mutant_fortress:0 "Фортеця мутантів"
DCM_the_mutant_fortress_desc:0 "Ми маємо охороняти Сховище 87. Там вся зелена жижа!"
DCM_nukacola_plant:0 "Завод «Ядер-Кола»"
DCM_nukacola_plant_desc:0 "Стара будівля зі злими крабами та світною водою. Синя штука корисна для мутантів?"
DCM_the_new_corvega_arms_factory:0 "Новий збройовий завод «Корвега»"
DCM_the_new_corvega_arms_factory_desc:0 "Фокс може змусити цю стару будівлю робити пушки."
DCM_our_mutant_masters:0 "Наші мутанти-майстри"
DCM_our_mutant_masters_desc:0 "Ми знайшли багато корисних речей, але не зелену жижу."
DCM_our_determined_exterminators:0 "Наші рішучі винищувачі"
DCM_our_determined_exterminators_desc:0 "Люди в металі б'ються майже так само добре, як супермутанти. Нам треба їх убити."
DCM_let_the_giants_invade:0 "Нехай велетні вторгнуться"
DCM_let_the_giants_invade_desc:0 "Бегемоти сильні. Жодна людина не може битися з ними. Ми підемо за ними."
DCM_mutant_generals_lead_the_way:0 "Мутанти-генерали ведуть шлях"
DCM_mutant_generals_lead_the_way_desc:0 "Мутанти, які добре думають, як Шепард, казатимуть іншим мутантам, що робити."
DCM_crushed_tin_cans:0 "Розчавлені бляшанки"
DCM_crushed_tin_cans_desc:0 "Ми вбили бляшаних людей. Навіть із великими пушками та бронею вони все одно були просто слабкими людьми."
DCM_banish_the_black_devils:0 "Прогнати чорних дияволів"
DCM_banish_the_black_devils_desc:0 "Чорні бляшані люди були сильніші за сірих, але ми все одно їх перемогли!"
DCM_unearth_raven_rock:0 "Відкопати Рейвен-Рок"
DCM_unearth_raven_rock_desc:0 "Бегемоти розтрощили печеру чорних бляшаних людей. Треба розкопати її, щоб знайти гарну здобич."
DCM_raven_rock_war_room:0 "Оперативний штаб Рейвен-Року"
DCM_raven_rock_war_room_desc:0 "Фокс каже, що в Рейвен-Році хороші комп'ютери. Вони допоможуть нам шукати."
DCM_uncover_the_armory:0 "Відкопати арсенал"
DCM_uncover_the_armory_desc:0 "У Рейвен-Році були дуже хороші пушки. Треба їх відкопати."
DCM_enclave_fev_testing_labs:0 "Лабораторії з тестування ВШЕ Анклаву"
DCM_enclave_fev_testing_labs_desc:0 "У людей у Рейвен-Році була зелена жижа. Небагато, але трохи є."
DCM_a_new_crater:0 "Новий кратер"
DCM_a_new_crater_desc:0 "Бегемоти розчавили людей у їхній Цитаделі. Вони ламали будівлю, поки вона не провалилася в землю. Ха-ха-ха."
DCM_loot_the_facility:0 "Пограбувати комплекс"
DCM_loot_the_facility_desc:0 "У бляшаних людей були сильні пушки. Тепер це наші пушки."
DCM_a_new_mutant_outpost:0 "Новий форпост мутантів"
DCM_a_new_mutant_outpost_desc:0 "Ми зробимо з дому бляшаних людей базу. Так простіше, ніж тягати всі пушки назад у 87-й."
DCM_brotherhood_notes:0 "Записки Братства"
DCM_brotherhood_notes_desc:0 "Ми дали Фоксу подивитися комп'ютери бляшаних людей. Він не знайшов зеленої жижі, але знайшов інші речі."
DCM_a_smog_from_the_east:0 "Смог зі сходу"
DCM_a_smog_from_the_east_desc:0 "Над пагорбами багато диму. Дим означає людей."
DCM_the_untamed_pitt:0 "Нескорений Пітт"
DCM_the_untamed_pitt_desc:0 "Пітт повний божевільних людей і трогів. Ми легко вб'ємо їх обох."
DCM_ogres_flood_into_the_pitt:0 "Огри хлинули в Пітт"
DCM_ogres_flood_into_the_pitt_desc:0 "Бегемоти йдуть через Пітт і розчавлюють усіх людей, яких знайдуть. Весело дивитися."
DCM_the_behemoth_pitt:0 "Бегемотячий Пітт"
DCM_the_behemoth_pitt_desc:0 "Бегемоти дуже добре розтрощили Пітт. Люди ховаються в тунелях, але ми все одно їх знаходимо."
DCM_crush_the_trogs:0 "Розчавити трогів"
DCM_crush_the_trogs_desc:0 "Усі будівлі ламаються. Бегемоти продовжують їх трощити, щоб дістати трогів на їжу."
DCM_union_steel_factory:0 "Сталеливарний завод «Юніон»"
DCM_union_steel_factory_desc:0 "Фокс каже, що люди можуть використовувати цю будівлю, щоб робити метал. А ми використовуємо метал, щоб робити пушки!"
DCM_enslave_the_city:0 "Поневолити місто"
DCM_enslave_the_city_desc:0 "Люди в Пітті не стають супермутантами, коли дати їм зелену жижу. Вони на смак теж погані. Тому ми використовуємо їх, щоб робити речі."
DCM_the_supply_plant:0 "Завод постачання"
DCM_the_supply_plant_desc:0 "У Пітті ми можемо робити багато всього."
DCM_the_mill_and_steel_yard:0 "Млин і сталевий двір"
DCM_the_mill_and_steel_yard_desc:0 "У Пітті багато металу, який можна використати для інших речей. Кулі. Мечі. Пушки."
DCM_the_trog_trenches:0 "Трогові траншеї"
DCM_the_trog_trenches_desc:0 "У тунелях багато трогів. Люди бояться туди йти, а ми ні."
DCM_pitt_scavenging_program:0 "Програма збирацтва в Пітті"
DCM_pitt_scavenging_program_desc:0 "Ми посилаємо людей у місто шукати корисні речі. Якщо не знаходять — годуємо ними трогів."
DCM_giant_warlords:0 "Велетні-воєначальники"
DCM_giant_warlords_desc:0 "Великий бегемот, якого Фокс називає Атлас, хоче битися з Шепардом. Він не переможе, але мусить битися."
DCM_shepard_leads_on:0 "Шепард веде далі"
DCM_shepard_leads_on_desc:0 "Шепард знайшов мутантів, які добре керують. Він доручить їм керувати іншими мутантами."
DCM_unchained_giants:0 "Розкуті велетні"
DCM_unchained_giants_desc:0 "Атлас та інші бегемоти нишпорять землями. Вони їдять усіх, кого бачать."
DCM_decimated_dc:0 "Спустошений Вашингтон"
DCM_decimated_dc_desc:0 "Вашингтоном нелегко ходити, коли ти бегемот. Вони розчищають шлях великими палицями."
DCM_the_throne_of_giants:0 "Трон велетнів"
DCM_the_throne_of_giants_desc:0 "Атлас та інші бегемоти перебралися до парку Такома. Там вони їдять людей і б'ються."
DCM_mutant_arms_workshop:0 "Збройова майстерня мутантів"
DCM_mutant_arms_workshop_desc:0 "Фокс може навчити деяких мутантів робити пушки в Сховище. Пушки кращі, ніж дошки з цвяхами."
DCM_expand_mutant_camps:0 "Розширити табори мутантів"
DCM_expand_mutant_camps_desc:0 "Ми можемо створити більше таборів із мутантами, які прийшли до Сховища 87."
DCM_shepards_mutant_broadcast:0 "Мутантське радіо Шепарда"
DCM_shepards_mutant_broadcast_desc:0 "Фокс полагодив рацію і каже, що ми можемо говорити з мутантами далеко!"
DCM_the_green_tide:0 "Зелена хвиля"
DCM_the_green_tide_desc:0 "Один комп'ютер сказав, що є зелена жижа в місці під назвою Західна Вірджинія. Ми подивимось."
DCM_establish_dominance:0 "Встановити панування"
DCM_establish_dominance_desc:0 "Ми найсильніші. Ніхто нас не зупинить!"
DCM_beasts_no_longer_burden:0 "Звірі більше не тягар"
DCM_beasts_no_longer_burden_desc:0 "У деяких людей є собаки, які ходять за ними. Це як наші кентаври, так?"
DCM_reopen_evergreen_mills:0 "Відновити Івергрін-Міллс"
DCM_reopen_evergreen_mills_desc:0 "Тут є машини, які, за словами Фокса, можуть робити потрібні нам речі. Ми змусимо людей користуватися ними!"
DCM_clean_test_subjects:0 "Чисті піддослідні"
DCM_clean_test_subjects_desc:0 "Ми знайшли інше Сховище, але без зеленої жижі. Зате там були люди, які дуже добре реагують на зелену жижу."
DCM_a_familiar_foe:0 "Знайомий ворог"
DCM_a_familiar_foe_desc:0 "Ми знайшли ще чорних бляшаних людей! Вбити їх і забрати їхні речі!"
DCM_the_third_generation_of_mutants:0 "Третє покоління мутантів"
DCM_the_third_generation_of_mutants_desc:0 "У нас не так багато зеленої жижі. Треба використовувати її обережно."
DCM_the_rising_green_tide:0 "Зростаюча зелена хвиля"
DCM_the_rising_green_tide_desc:0 "У Західній Вірджинії є супермутанти. Зелена жижа має бути десь поруч."
DCM_the_dark_facility:0 "Темний об'єкт"
DCM_the_dark_facility_desc:0 "Ми знайшли тут скелети мутантів. Мабуть, це був їхній дім."
DCM_shopping_cart_cages:0 "Клітки з візків"
DCM_shopping_cart_cages_desc:0 "Ми чіпляємо клітки на спини бегемотів. Це допоможе нам тягати людей назад у 87-й."
DCM_hulking_masses_of_destruction:0 "Величезні маси руйнування"
DCM_hulking_masses_of_destruction_desc:0 "Мутанти ніколи не перестають рости. Бегемоти, мабуть, найстаріші. Деякі з них досі в руїнах."
DCM_the_king_of_ogres:0 "Король огрів"
DCM_the_king_of_ogres_desc:0 "Ці мутанти — не володарі й не бегемоти, а щось інше."
DCM_amutantsbestfriend:0 "Найкращий друг мутанта"
DCM_amutantsbestfriend_desc:0 "Кентаври ходять за нами і допомагають убивати людей. Ми просто даємо їм трохи м'яса, і вони щасливі."
DCM_contaminated_test_subjects:0 "Забруднені піддослідні"
DCM_contaminated_test_subjects_desc:0 "Не всі люди стають мутантами чи кентаврами. Деякі перетворюються на інші речі. Фокс залишить їх живими, щоб вони теж билися!"
DCM_the_abominations:0 "Мерзоти"
DCM_the_abominations_desc:0 "Ці нові створіння — не супермутанти. Але вони теж сильно б'ються, і б'ються з нами!"
DCM_waste_lander_cattle:0 "Пусткова худоба"
DCM_waste_lander_cattle_desc:0 "Деякі люди роблять те, що ми кажемо, якщо ми пообіцяємо не їсти їх. Ми все одно їх їмо. Тупі люди."
DCM_the_horde_of_trogs:0 "Орда трогів"
DCM_the_horde_of_trogs_desc:0 "Недостатньо зеленої жижі, щоб зробити кожну людину супермутантом. Кидання людей у річку робить їх трогами. Може, наробимо трохи трогів?"
DCM_the_great_devourers:0 "Великі пожирачі"
DCM_the_great_devourers_desc:0 "Голодні троги б'ються сильніше. Треба тримати їх голодними."
DCM_the_savage_ones:0 "Дикуни"
DCM_the_savage_ones_desc:0 "Якщо заточити пазурі трогів, вони ріжуть сильніше. Це нелегко."
DCM_old_faithful:0 "Старий вірний"
DCM_old_faithful_desc:0 "Кентаврам потрібна зелена жижа, щоб їх створити, але вони добре б'ються."
DCM_horribly_mutated_centaurs:0 "Жахливо мутовані кентаври"
DCM_horribly_mutated_centaurs_desc:0 "Деякі кентаври можуть стати більшими, якщо дати їм більше зеленої жижі."
DCM_armored_centaurs:0 "Броньовані кентаври"
DCM_armored_centaurs_desc:0 "Якщо дати кентаврам броню, люди не зможуть легко їх убити. Заощаджує зелену жижу."
DCM_age_of_the_mutant:0 "Ера мутанта"
DCM_age_of_the_mutant_desc:0 "Ми почули іншого мутанта по радіо? Хто це?"
DCM_echoes_of_the_master:0 "Відлуння Господаря"
DCM_echoes_of_the_master_desc:0 "Ми не знаємо, хто такий Господар. Але західні мутанти кажуть, що він створив їх і мав багато зеленої жижі. Якщо ми підемо за ними, то отримаємо зелену жижу."
DCM_nightkin_commanders:0 "Командири-нічокіни"
DCM_nightkin_commanders_desc:0 "Сині мутанти дивні, але вони допомагають нам крастися до людей."
DCM_third_generation_supremacy:0 "Перевага третього покоління"
DCM_third_generation_supremacy_desc:0 "Чому ми маємо слухатися інших мутантів? Вбити їх і забрати їхню зелену жижу."
DCM_the_mutants_of_lob:0 "Мутанти з ЛОБ"
DCM_the_mutants_of_lob_desc:0 "У цій будівлі багато пушок. Забрати їх."
DCM_the_museum_of_history:0 "Музей історії"
DCM_the_museum_of_history_desc:0 "З гульів навіть кентавра не зробиш. Вони також непридатні для їжі. Що нам з ними робити?"
DCM_the_giants_from_west_virginia:0 "Велетні з Західної Вірджинії"
DCM_the_giants_from_west_virginia_desc:0 "Багато бегемотів зібралися разом."
DCM_the_vernon_square_stronghold:0 "Опорний пункт на Вернон-сквер"
DCM_the_vernon_square_stronghold_desc:0 "Ми будуємо великий форт на Вернон-сквер. Люди ніколи не змусять нас піти."
DCM_jack_of_all_trades:0 "Майстер на всі руки"
DCM_jack_of_all_trades_desc:0 "Фокс знає деякі речі, яких не знають інші мутанти. Ми доручимо йому робити ці речі."
DCM_vault_87_built_for_tomorrow:0 "Сховище 87, збудований для майбутнього"
DCM_vault_87_built_for_tomorrow_desc:0 "У Сховищі є гарний метал, і ми можемо його використати."
DCM_vault_87_research_logs:0 "Журнали досліджень Сховища 87"
DCM_vault_87_research_logs_desc:0 "Більшість комп'ютерів зламані. Але Фокс може дещо полагодити."
DCM_inefficient_reactor:0 "Неефективний реактор"
DCM_inefficient_reactor_desc:0 "Ми знайшли машину, яка освітлює 87-й. Вона зламана. Нехай Фокс полагодить її!"
DCM_vault_87s_emergency_broadcast:0 "Аварійне мовлення Сховища 87"
DCM_vault_87s_emergency_broadcast_desc:0 "Фокс знайшов спосіб змусити комп'ютери розмовляти з вежами. Він каже нам, коли великі речі наближаються."
DCM_rebuild_the_overseers_chamber:0 "Відбудувати кабінет наглядача"
DCM_rebuild_the_overseers_chamber_desc:0 "Тут була кімната головного людини. Тепер тут має бути кімната головного мутанта!"
DCM_rebuild_murder_pass:0 "Відбудувати Вбивчий перевал"
DCM_rebuild_murder_pass_desc:0 "Маленькі люди тримаються подалі від перевалу. Там можна побудувати більше."
DCM_vault_87s_sub_level_35:0 "Підрівень 3.5 Сховища 87"
DCM_vault_87s_sub_level_35_desc:0 "Ми відкрили сходи вниз, на старий поверх. Жодної зеленої жижі не знайшли."
DCM_vault_87s_senior_researcher_lab:0 "Лабораторія старшого дослідника Сховища 87"
DCM_vault_87s_senior_researcher_lab_desc:0 "Ми знайшли купу старих комп'ютерів, на які Фокс може подивитися."
DCM_plutonium_fuel_rods:0 "Плутонієві паливні стрижні"
DCM_plutonium_fuel_rods_desc:0 "Тут є речі, які змушують світло горіти."
DCM_fawkes_new_lab:0 "Нова лабораторія Фокса"
DCM_fawkes_new_lab_desc:0 "Ми дозволили Фоксу використовувати нове місце для вивчення комп'ютерів і створення речей."
DCM_expand_into_the_caverns:0 "Розширитися в печери"
DCM_expand_into_the_caverns_desc:0 "Ми можемо будувати речі в печері, коли маленькі люди підуть."
DCM_fortify_murder_pass:0 "Укріпити Вбивчий перевал"
DCM_fortify_murder_pass_desc:0 "Якщо поставити стіну на перевалі, люди ніколи не зможуть увійти."
DCM_the_great_chamber:0 "Велика камера"
DCM_the_great_chamber_desc:0 "Велика кімната дозволить нам робити великі пушки."
DCM_reserve_fev:0 "Запас ВШЕ"
DCM_reserve_fev_desc:0 "Ми знайшли стару зелену жижу! Мало, але все одно добре!"
DCM_reinforced_behemoth_clubs:0 "Посилені палиці бегемотів"
DCM_reinforced_behemoth_clubs_desc:0 "Більші палиці означають більше трощення. Просто."
DCM_armor_plated_behemoths:0 "Броньовані бегемоти"
DCM_armor_plated_behemoths_desc:0 "Бегемоти сильні. Але кулі є кулі. Дайте бегемотам броню, і вони витримають більше куль."
DCM_ancient_capital_giants:0 "Стародавні столичні велетні"
DCM_ancient_capital_giants_desc:0 "Ми знайшли старих бегемотів. Вони великі й сильні навіть для інших бегемотів."
DCM_pitt_overlords:0 "Володарі Пітта"
DCM_pitt_overlords_desc:0 "Пітт — наше місце. Люди там роблять те, що ми кажемо, або помруть!"
DCM_topple_versicorps_tower:0 "Повалити вежу «Версікорпс»"
DCM_topple_versicorps_tower_desc:0 "Бегемоти люблять ламати великі речі. Ця вежа — найбільша річ навколо."
DCM_rampage_through_the_trench:0 "Буйство в траншеї"
DCM_rampage_through_the_trench_desc:0 "Траншея повна трогів, і бегемоти люблять їх їсти."
DCM_break_the_blast_furnace:0 "Зламати доменну піч"
DCM_break_the_blast_furnace_desc:0 "Один бегемот зламав піч, коли гнався за людьми. Це не велика справа."
DCM_the_mutant_fighting_hole:0 "Мутантська бійцівська яма"
DCM_the_mutant_fighting_hole_desc:0 "Два мутанти зляться і б'ються в ямі. Переможець — найсильніший мутант, і він правий."
DCM_restart_the_supply_plant:0 "Перезапустити завод постачання"
DCM_restart_the_supply_plant_desc:0 "Люди полагодять фабрику і робитимуть речі, які ми хочемо, або ми розірвемо їх на шматки."
DCM_search_the_steel_yard:0 "Обшукати сталевий двір"
DCM_search_the_steel_yard_desc:0 "Малі люди боялися сталевого двору. Ми ні."
DCM_restart_the_blast_furnace:0 "Перезапустити доменну піч"
DCM_restart_the_blast_furnace_desc:0 "Велика піч робить багато металу. Деякі люди падають у неї, але кому яке діло?"
DCM_mutant_shredders:0 "Мутанти-подрібнювачі"
DCM_mutant_shredders_desc:0 "Великі пушки, що стріляють багато куль. Це найкращий спосіб убивати людей."
DCM_shred_wastelanders:0 "Подрібнити пустковиків"
DCM_shred_wastelanders_desc:0 "Розірвати людей на маленькі шматочки з пушок. Дуже смішно."
DCM_overlord_shredders:0 "Подрібнювачі володарів"
DCM_overlord_shredders_desc:0 "Зробити ще більші пушки для володарів."
DCM_mutant_demo_teams:0 "Мутантські підривні команди"
DCM_mutant_demo_teams_desc:0 "Великі пушки стріляють бомбами і вбивають людей. Не стійте надто близько."
DCM_larger_booms:0 "Більші бабахи"
DCM_larger_booms_desc:0 "Після цих пушок майже нічого не лишається їсти, але вони добре вбивають міцніших людей."
DCM_bunker_busters:0 "Руйнівники бункерів"
DCM_bunker_busters_desc:0 "Деякі люди ховаються в будівлях. Підривайте будівлі теж!"
DCM_return_of_the_twin_exterminators:0 "Повернення близнюків-винищувачів"
DCM_return_of_the_twin_exterminators_desc:0 "Більше бляшаних людей бігають і вбивають мутантів. Ми розчавимо їх, як мурах!"
DCM_break_the_shield:0 "Зламати щит"
DCM_break_the_shield_desc:0 "Гулі та мутанти б'ються з цими бляшаними людьми. Вбити їх теж!"
DCM_the_crashed_airship:0 "Розбитий дирижабль"
DCM_the_crashed_airship_desc:0 "Ми знайшли старе місце, де мутанти давно вбили бляшаних людей. Приємно згадати."
DCM_recruit_the_mutants:0 "Завербувати мутантів"
DCM_recruit_the_mutants_desc:0 "Гулі та мутанти тут або приєднаються до нас, або помруть, як люди!"
DCM_banish_the_devil_lords:0 "Прогнати диявольських володарів"
DCM_banish_the_devil_lords_desc:0 "Чорні бляшані люди — найгірші, і ми їх вб'ємо!"
DCM_a_well_armed_mutant_army:0 "Добре озброєна армія мутантів"
DCM_a_well_armed_mutant_army_desc:0 "Найгірші люди мають найкращі пушки. Тепер це наші пушки."
DCM_chicagos_devastation:0 "Спустошення Чикаго"
DCM_chicagos_devastation_desc:0 "Їхнє місто зникло. Ми його знищили!"
DCM_a_new_determined_exterminator:0 "Новий рішучий винищувач"
DCM_a_new_determined_exterminator_desc:0 "Ми нестримні! Іти, поки не зберемо всю зелену жижу!"

###Tooltips###
DCM_more_greenstuff_tt:0 "Ми знайшли більше §Gзеленої жижі!"
DCM_more_humies_tt:0 "Ми приведемо більше людей додому"
DCM_humie_cattle_tt:0 "Люди більше ховаються від нас і менше б'ються"
DCM_lot_more_greenstuff_tt:0 "У нас необмежена кількість §Gзеленої жижі!"
DCM_quicker_to_fight_tt:0 "Нові мутанти можуть битися швидше"
DCM_hole_tt:0 "Деякі мутанти померли, але вони слабкі. Нам потрібні сильні мутанти"
