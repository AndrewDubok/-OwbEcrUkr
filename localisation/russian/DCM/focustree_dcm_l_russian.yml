l_russian: 
DCM_vault_108:0 "Убежище 108"
DCM_vault_108_desc:0 "Еще одно дурацкое убежище. Никакой зеленой жижи, только трупы."
DCM_old_waste_disposal_site:0 "Старый полигон для утилизации отходов"
DCM_old_waste_disposal_site_desc:0 "Фокс видит эту большую кучу металлолома и хлама и думает, что она пригодится для убежища, Шепард видит больше металла для большего количества пушек."
DCM_rock_breakers_last_gas:0 "Старая заправка «Rock Breakers»"
DCM_rock_breakers_last_gas_desc:0 "Маленький лагерь мутантов на старой заправке. Нам нужно вернуть их в убежище."
DCM_the_irradiated_metro:0 "Облученное метро"
DCM_the_irradiated_metro_desc:0 "Старые туннели, полные зеленой штуки. Но не самой зеленой жижи. Почему все равно некоторые мутанты становятся более зелеными?"
DCM_shepards_new_mutant_army:0 "Новая армия мутантов Шепарда"
DCM_shepards_new_mutant_army_desc:0 "Мутанты рассредоточены. И всё ещё сильнее людей. Но люди в больших группах могут сражаться с мутантами в малых группах. А если мутанты соберутся в больших группах?"
DCM_the_meta_human:0 "Сверх-люди"
DCM_the_meta_human_desc:0 "У мутантов из Убежища 87 заканчивается зелёная штука. Может быть, Фокс сможет её найти, ведь он такой умный и разбирается в терминалах."
DCM_rebuilding_vault_87:0 "Перестройка в Убежище 87"
DCM_rebuilding_vault_87_desc:0 "Фокс говорит, что ремонт убежища может помочь нам найти зелёную жижу."
DCM_the_green_stuff:0 "Зелёная жижа"
DCM_the_green_stuff_desc:0 "Нам это нужно, чтобы создавать больше мутантов. И нам нужно создать больше мутантов."
DCM_mutant_scavenging:0 "Мутанты-мусорщики"
DCM_mutant_scavenging_desc:0 "Нам нужно найти оружие и всё, что поможет найти зелёную штуку. Но времени всё это разглядывать нет."
DCM_mutant_patrols_of_outer_dc:0 "Патрули мутантов Внешнего Вашингтона"
DCM_mutant_patrols_of_outer_dc_desc:0 "Мутанты, вернувшиеся в 87-е, рассказывают о местах, где можно найти что-то полезное. Мы идём смотреть."
DCM_the_mall:0 "Торговый центр"
DCM_the_mall_desc:0 "Мутанты в Вашингтоне не нашли никакой зеленой штуки, но у убитых ими людей есть что-то полезное."
DCM_reunite_lost_mutant_camps:0 "Объединить отколовшихся Мутантов"
DCM_reunite_lost_mutant_camps_desc:0 "Мутанты сильны. Мутанты вместе ещё сильнее."
DCM_no_germans_in_german_town:0 "Нет германцев в Джермантауне"
DCM_no_germans_in_german_town_desc:0 "В Джермантауне полно мутантов, которые утаскивают людей в Убежище. Теперь они нужны нам для других дел."
DCM_the_bigger_they_are:0 "Чем они больше"
DCM_the_bigger_they_are_desc:0 "Атлас — монстр больше даже, чем бегемоты. Он заставит остальных гигантов последовать за ним."
DCM_vault_tec_headquarters:0 "Штаб-квартира Волт-Тек"
DCM_vault_tec_headquarters_desc:0 "Фокс говорит, что Волт-Тек поместил зелёную штуку в наше убежище. Возможно, на их терминалах указано, где мы можем найти ещё жижи."
DCM_georgetown_mutants:0 "Джорджтаунские мутанты"
DCM_georgetown_mutants_desc:0 "«Когти» продолжают сражаться с мутантами в Джорджтауне. Нам нужно положить этому конец."
DCM_mutants_in_the_reflecting_pool:0 "Мутанты, отражающиеся на полу"
DCM_mutants_in_the_reflecting_pool_desc:0 "В торговом центре происходят одни из самых ожесточённых стычек. Туда постоянно приходят глупые людищки, когда они знают, что там мы."
DCM_raid_the_capital_building:0 "Рейд на заведения Столицы"
DCM_raid_the_capital_building_desc:0 "Люди из «Когтя» находятся в здании Столицы, и у них есть большие пушки. Если мы их убьём, мы сможем забрать пушки."
DCM_the_museum_of_technology:0 "Музей технологий"
DCM_the_museum_of_technology_desc:0 "В Музее технологий полно терминалов. Заберем их для Фокса."
DCM_takoma_park_expedition:0 "Экспедиция в парк Такомы"
DCM_takoma_park_expedition_desc:0 "Давным-давно некоторые мутанты отправились в Такома-Парк. Надо проверить, там ли они ещё."
DCM_the_giants_of_jury_street:0 "Гиганты с улицы Джури"
DCM_the_giants_of_jury_street_desc:0 "Патрули видят бегемотов на улице Джури. Может быть, мы попросим их помочь."
DCM_the_giants_roar:0 "Рев Гигантов"
DCM_the_giants_roar_desc:0 "Гиганты вокруг 87-го продолжают реветь, и самый большой из них отвечает им тем же. Мы не знаем, что они говорят, но когда ревёт самый большой, остальные замолкают."
DCM_vault_92:0 "Убежище 92"
DCM_vault_92_desc:0 "Ни зелёной жижи. Ни людей. Только металл и вода."
DCM_vault_106:0 "Убежище 106"
DCM_vault_106_desc:0 "Вход в убежище вызывает странные ощущения. Видишь цвета и людей... узнаёшь людей... голова от этого болит."
DCM_horrors_of_vault_tec:0 "Ужасы Волт-Тек"
DCM_horrors_of_vault_tec_desc:0 "Ни в одном из убежищ не было зелёной жижи. Волт-Тек — тупицы, положила только в 87-е!"
DCM_big_trouble_in_big_town:0 "Большие проблемы в Большом Городе"
DCM_big_trouble_in_big_town_desc:0 "Небольшие группы мутантов видят, что Шепард силён. Они хотят быть сильными вместе с нами."
DCM_everglow_outpost:0 "Аванпост Эверглоу"
DCM_everglow_outpost_desc:0 "Если мы разобьем лагерь недалеко от палаточного лагеря, то сможем легко поймать людишек по дороге."
DCM_secure_the_vault:0 "Защитить Убежище"
DCM_secure_the_vault_desc:0 "Ни один человек не настолько силён, чтобы войти в 87-е. Но нам всё равно стоит укрепиться."
DCM_the_blue_line:0 "Синий Вход"
DCM_the_blue_line_desc:0 "Если мы уйдём под землю, люди нас не увидят. Тогда мы их поймаем."
DCM_the_red_line:0 "Красный Вход"
DCM_the_red_line_desc:0 "Эти туннели ведут в Столичную Пустошь. Так легче подкрасться к людям."
DCM_clean_out_metros:0 "Осмотреть Метро"
DCM_clean_out_metros_desc:0 "В туннелях полно сломанных вещей, из которых Фокс может изготовить что-нибудь полезное."
DCM_the_mutant_fortress:0 "Крепость Мутантов"
DCM_the_mutant_fortress_desc:0 "Нам нужно защищать Убежище 87. Там полно зелёной жижи!"
DCM_nukacola_plant:0 "Завод «Ядер-Кола»"
DCM_nukacola_plant_desc:0 "Старое здание с разъярёнными крабами и светящейся водой. Синяя штука полезна для мутантов?"
DCM_the_new_corvega_arms_factory:0 "Новый оружейный завод «Корвега»"
DCM_the_new_corvega_arms_factory_desc:0 "Фокс может заставить это старое здание производить оружие."
DCM_our_mutant_masters:0 "Наши мастера-мутанты"
DCM_our_mutant_masters_desc:0 "Мы нашли много полезных вещей, но не зелёную жижу."
DCM_our_determined_exterminators:0 "Нас определенно истребляют"
DCM_our_determined_exterminators_desc:0 "Люди в железе сражаются почти так же хорошо, как супермутанты. Нам нужно их убить."
DCM_let_the_giants_invade:0 "Вторжение Гигантов"
DCM_let_the_giants_invade_desc:0 "Бегемоты сильны. Ни один человек не сможет с ними сражаться. Мы последуем за ними."
DCM_mutant_generals_lead_the_way:0 "Генералы-Мутанты проложат Путь"
DCM_mutant_generals_lead_the_way_desc:0 "Мутанты, которые умеют хорошо мыслить, как Шепард, будут говорить другим мутантам, что делать."
DCM_crushed_tin_cans:0 "Раздавленные жестяные банки"
DCM_crushed_tin_cans_desc:0 "Мы убили консервы. Даже с мощными пушками и броней они всё равно оставались всего лишь слабыми людишками."
DCM_banish_the_black_devils:0 "Изгнать Дьяволов в Черном"
DCM_banish_the_black_devils_desc:0 "Черные консервы сильнее серых консерв, но мы все равно их победим!"
DCM_unearth_raven_rock:0 "Раскопки Рэйвен-Рока"
DCM_unearth_raven_rock_desc:0 "Бегемоты разгромили пещеру черных консерв. Нам нужно раскопать её, чтобы найти ценную добычу."
DCM_raven_rock_war_room:0 "Оперативный штаб Рэйвен-Рока"
DCM_raven_rock_war_room_desc:0 "Фокс говорит, что в Рэйвен-Роке хорошие терминалы. Они помогают нам в поисках."
DCM_uncover_the_armory:0 "Откопать арсенал"
DCM_uncover_the_armory_desc:0 "У Рэйвен-Рока были действительно хорошие пушки. Нам нужно их выкопать."
DCM_enclave_fev_testing_labs:0 "Испытательные лаборатории ВРЭ Анклава"
DCM_enclave_fev_testing_labs_desc:0 "У людишек в Рэйвен-Роке была какая-то зеленая жижа. Не очень много, но уже что-то."
DCM_a_new_crater:0 "Новый кратер"
DCM_a_new_crater_desc:0 "Бегемоты раздавили людишек прямо в их Цитадели. Они ломали здание до тех пор, пока оно не рухнуло им на головы. Ха-ха-ха"
DCM_loot_the_facility:0 "Разграбить Цитадель"
DCM_loot_the_facility_desc:0 "У людишек в железе были мощные пушки. Теперь это наши пушки."
DCM_a_new_mutant_outpost:0 "Новый Аванпост Мутантов"
DCM_a_new_mutant_outpost_desc:0 "Мы сделаем из дома консерв базу. Проще, чем перетаскивать всё оружие в 87-е."
DCM_brotherhood_notes:0 "Записи Братства"
DCM_brotherhood_notes_desc:0 "Мы позволили Фоксу осмотреть терминалы консервных банок. Он не нашёл зелёных штучек, но нашёл кое-что другое."
DCM_a_smog_from_the_east:0 "Смог с Запада"
DCM_a_smog_from_the_east_desc:0 "Над холмами много дыма. Под дымом я имею ввиду людишек."
DCM_the_untamed_pitt:0 "Неукротимый Питт"
DCM_the_untamed_pitt_desc:0 "Питт полон сумасшедших людей и трогов. Мы легко убьем их обоих."
DCM_ogres_flood_into_the_pitt:0 "Огры хлынули в Питт"
DCM_ogres_flood_into_the_pitt_desc:0 "Бегемоты проносятся по Питту и давят всех, кого найдут. Забавно наблюдать."
DCM_the_behemoth_pitt:0 "Питт принадлежит Бегемотам"
DCM_the_behemoth_pitt_desc:0 "Бегемоты здорово разрушили Питт. Люди прячутся в туннелях, но мы всё равно их найдем."
DCM_crush_the_trogs:0 "Сокрушить Трогов"
DCM_crush_the_trogs_desc:0 "Все строения рушатся. Бегемоты продолжают их крушить, чтобы поживиться закуской из трога."
DCM_union_steel_factory:0 "Объединение Стальных Заводов"
DCM_union_steel_factory_desc:0 "Фокс говорит, что люди могут использовать это здание для производства металла. И мы используем металл для изготовления пушек!"
DCM_enslave_the_city:0 "Поработить город"
DCM_enslave_the_city_desc:0 "Людишки в Питте не превращаются в супермутантов, если им дать зелёную жижу. Они ещё и на вкус неприятные. Вместо этого мы используем их как рабов для производства чего-нибудь."
DCM_the_supply_plant:0 "Заводы снабжения"
DCM_the_supply_plant_desc:0 "В Питтсбурге мы можем сделать много всего."
DCM_the_mill_and_steel_yard:0 "Фабрика и Сталелитейный Двор"
DCM_the_mill_and_steel_yard_desc:0 "В Питте много металла, который можно использовать для изготовления других вещей: пуль, мечей, пушек."
DCM_the_trog_trenches:0 "Траншеи Трогов"
DCM_the_trog_trenches_desc:0 "В туннелях полно трогов. Люди боятся туда идти, но мы — нет."
DCM_pitt_scavenging_program:0 "Питтская программа собирательства"
DCM_pitt_scavenging_program_desc:0 "Мы отправим людей в город, чтобы найти что-нибудь полезное. Если они не находут, мы скормим их трогам."
DCM_giant_warlords:0 "Гигант Военачальник"
DCM_giant_warlords_desc:0 "Огромный монстр которого Фокс называет Атлас, хочет сразиться с Шепардом. Он не победит, но ему придется бороться."
DCM_shepard_leads_on:0 "Лидерство Шепарда"
DCM_shepard_leads_on_desc:0 "Шепард нашёл мутантов, которые умеют руководить. Он поручит им руководить и другими мутантами."
DCM_unchained_giants:0 "Освобожденные Гиганты"
DCM_unchained_giants_desc:0 "Атлас и другие Бегемоты рыщут по земле. Они пожирают всех, кого видят."
DCM_decimated_dc:0 "Уничтоженный Вашингтон"
DCM_decimated_dc_desc:0 "В Вашингтон проблемно войти, будучи гигантом. Они расчищают путь своими большими дубинками."
DCM_the_throne_of_giants:0 "Трон Гигантов"
DCM_the_throne_of_giants_desc:0 "Атлас и другие бегемоты перебрались в Такома-Парк. Там они едят людишек и сражаются."
DCM_mutant_arms_workshop:0 "Перевооружение Мутантов"
DCM_mutant_arms_workshop_desc:0 "Фокс может научить некоторых мутантов делать оружие в убежище. Пушки лучше досок с гвоздями."
DCM_expand_mutant_camps:0 "Распространить лагеря Мутантов"
DCM_expand_mutant_camps_desc:0 "Мы можем создать больше лагерей с мутантами, прибывшими из Убежища 87."
DCM_shepards_mutant_broadcast:0 "Трансляция Шепарда"
DCM_shepards_mutant_broadcast_desc:0 "Фокс починил радио и говорит, что с его помощью можно связаться с мутантами, находящимися далеко!"
DCM_the_green_tide:0 "Зелёные волны"
DCM_the_green_tide_desc:0 "В одном из терминалов сказано, что в Западной Вирджинии есть немного зелёной штуки. Мы поищем."
DCM_establish_dominance:0 "Закрепить превосходство"
DCM_establish_dominance_desc:0 "Мы самые сильные. Нас никто не остановит!"
DCM_beasts_no_longer_burden:0 "Звери больше не бремя"
DCM_beasts_no_longer_burden_desc:0 "У некоторых людей за ними следуют собаки. Это похоже на наших кентавров, да?"
DCM_reopen_evergreen_mills:0 "Вновь открыть Эвергрин-Миллс"
DCM_reopen_evergreen_mills_desc:0 "Фокс говорит, что здесь есть машины, способные производить нужные нам вещи. Мы заставим людишек пользоваться ими!"
DCM_clean_test_subjects:0 "Чистые образцы"
DCM_clean_test_subjects_desc:0 "Мы нашли еще одно убежище, но без зеленой жижи. Зато там были людишки, которые отлично мутируют."
DCM_a_familiar_foe:0 "Знакомый враг"
DCM_a_familiar_foe_desc:0 "Мы нашли еще больше черных консерв! Убейте их и заберите их вещи!"
DCM_the_third_generation_of_mutants:0 "Третье поколение Мутантов"
DCM_the_third_generation_of_mutants_desc:0 "У нас не так уж много зеленой жижи. Её нужно использовать с умом."
DCM_the_rising_green_tide:0 "Восходящая Зелёная Волна"
DCM_the_rising_green_tide_desc:0 "В Западной Вирджинии есть супермутанты. Зелёная штука должна быть где-то рядом."
DCM_the_dark_facility:0 "Мрачный объект"
DCM_the_dark_facility_desc:0 "В этом месте мы нашли скелеты мутантов. Должно быть, это был их дом."
DCM_shopping_cart_cages:0 "Клетки для «покупок»"
DCM_shopping_cart_cages_desc:0 "Мы устанавливаем клетки на спины бегемотов. Это поможет нам доставить людей к нам в 87-е."
DCM_hulking_masses_of_destruction:0 "Огромная масса для разрушения"
DCM_hulking_masses_of_destruction_desc:0 "Мутанты никогда не перестают расти. Бегемоты, должно быть, самые старые. Некоторые из них до сих пор в руинах."
DCM_the_king_of_ogres:0 "Король Огров"
DCM_the_king_of_ogres_desc:0 "Эти мутанты — не повелители и не бегемоты, а нечто иное."
DCM_amutantsbestfriend:0 "Лучший друг Мутанта"
DCM_amutantsbestfriend_desc:0 "Кентавры следуют за нами повсюду и помогают нам убивать людей. Мы просто даём им немного мяса, и они счастливы."
DCM_contaminated_test_subjects:0 "Испорченные образцы"
DCM_contaminated_test_subjects_desc:0 "Не все люди становятся мутантами или кентаврами. Некоторые превращаются в нечто иное. Фокс сохранит им жизнь, чтобы они тоже сражались!"
DCM_the_abominations:0 "Абоминации"
DCM_the_abominations_desc:0 "Эти новые существа — не супермутанты. Но они тоже яростно сражаются, и сражаются вместе с нами!"
DCM_waste_lander_cattle:0 "Скот"
DCM_waste_lander_cattle_desc:0 "Некоторые люди делают то, что мы говорим, если мы обещаем, что не будем их есть. Мы всё равно их едим. Глупые людишки."
DCM_the_horde_of_trogs:0 "Орда Трогов"
DCM_the_horde_of_trogs_desc:0 "У нас недостаточно зелёной жижи, чтобы сделать из человека супермутанта. Однако, если поместить людей в реку, они станут трогами. Может, создадим трогов?"
DCM_the_great_devourers:0 "Великий голод"
DCM_the_great_devourers_desc:0 "Голодные троги сражаются яростнее. Пусть они голодают."
DCM_the_savage_ones:0 "Дикари"
DCM_the_savage_ones_desc:0 "Если заточить когти трогов, они будут резать сильнее. Это будет непросто."
DCM_old_faithful:0 "Старые добрые Кентавры"
DCM_old_faithful_desc:0 "Для создания кентавров требуется зелёная жижа. Но они хорошо сражаются."
DCM_horribly_mutated_centaurs:0 "Ужасно мутировавшие Кентавры"
DCM_horribly_mutated_centaurs_desc:0 "Некоторые кентавры могут стать больше, если использовать больше жижи."
DCM_armored_centaurs:0 "Бронированные Кентавры"
DCM_armored_centaurs_desc:0 "Если мы дадим кентаврам что-то для защиты, людишкам будет нелегко их убить. Помогает съэкономить зелёную жижу."
DCM_age_of_the_mutant:0 "Эпоха Мутантов"
DCM_age_of_the_mutant_desc:0 "Мы услышали по радио ещё одного мутанта? Кто это?"
DCM_echoes_of_the_master:0 "Отголоски Хозяйна"
DCM_echoes_of_the_master_desc:0 "Мы не знаем, кто хозяин. Но западные мутанты говорят, что он их создал, и у него было много зелёной штуки. Если мы примкнём к ним, то получим зелёную штуку."
DCM_nightkin_commanders:0 "Тени Командиры"
DCM_nightkin_commanders_desc:0 "Синие мутанты странные, но они помогают нам подкрадываться к людишкам."
DCM_third_generation_supremacy:0 "Превосходство Третьего Поколения"
DCM_third_generation_supremacy_desc:0 "Зачем нам следовать за другими мутантами? Убейте их и заберите их зеленую штуку."
DCM_the_mutants_of_lob:0 "Мутанты «LOB»"
DCM_the_mutants_of_lob_desc:0 "В этом здании много оружия. Заберите его."
DCM_the_museum_of_history:0 "Исторический Музей"
DCM_the_museum_of_history_desc:0 "Из гулей даже кентавра не получится сделать. Они и в пищу не годятся. Что нам с ними делать?"
DCM_the_giants_from_west_virginia:0 "Гиганты из Западной Вирджинии"
DCM_the_giants_from_west_virginia_desc:0 "Множество бегемотов наконец собрались вместе."
DCM_the_vernon_square_stronghold:0 "Крепость Вернон-Сквер"
DCM_the_vernon_square_stronghold_desc:0 "Мы строим большой форт на Вернон-Сквер. Людишки никогда не смогут заставить нас уйти."
DCM_jack_of_all_trades:0 "Мастер на все руки"
DCM_jack_of_all_trades_desc:0 "Фокс знает то, чего не знают другие мутанты. Мы заставим его делать разные полезные вещицы."
DCM_vault_87_built_for_tomorrow:0 "Убежище 87 созданное для будущего"
DCM_vault_87_built_for_tomorrow_desc:0 "В убежище есть красивый металл, и мы можем его использовать."
DCM_vault_87_research_logs:0 "Журналы исследований Убежища 87"
DCM_vault_87_research_logs_desc:0 "Большинство терминалов сломаны. Но Фокс может починить некоторые."
DCM_inefficient_reactor:0 "Неэффективный реактор"
DCM_inefficient_reactor_desc:0 "Мы нашли машину, которая заставляет гореть лампочки в 87-м. Она сломана. Пусть Фокс её починит!"
DCM_vault_87s_emergency_broadcast:0 "Экстренная трансляция из Убежища 87"
DCM_vault_87s_emergency_broadcast_desc:0 "Фокс нашёл способ заставить терминалы принимать сигнал с вышек. Это сообщает нам о приближении крупных событий."
DCM_rebuild_the_overseers_chamber:0 "Переоборудование кабинета Смотрителя"
DCM_rebuild_the_overseers_chamber_desc:0 "Это была комната босса-человека. Здесь должна быть комната босса-мутанта!"
DCM_rebuild_murder_pass:0 "Перестроить Проход Убийцы"
DCM_rebuild_murder_pass_desc:0 "Маленькие человечки держатся подальше от перевала. Мы можем построить там больше."
DCM_vault_87s_sub_level_35:0 "Убежище 87, под-уровень 3.5"
DCM_vault_87s_sub_level_35_desc:0 "Мы распечатали лестницу и спустились на старый этаж. Никакой зеленой жижи мы не обнаружили."
DCM_vault_87s_senior_researcher_lab:0 "Исследовательский Центр Убежища 87"
DCM_vault_87s_senior_researcher_lab_desc:0 "Мы нашли кучу старых терминалов. Нужно чтобы Фокс на них посмотрел."
DCM_plutonium_fuel_rods:0 "Плутониевые топливные стержни"
DCM_plutonium_fuel_rods_desc:0 "Это те штуки, которые заставляют свет гореть."
DCM_fawkes_new_lab:0 "Новая лаборатория Фокса"
DCM_fawkes_new_lab_desc:0 "Мы позволили Фоксу использовать новое место для изучения терминалов и создания вещей."
DCM_expand_into_the_caverns:0 "Расшириться в пещеры"
DCM_expand_into_the_caverns_desc:0 "Когда маленьких человечков не станет, мы сможем что-нибудь построить в пещере."
DCM_fortify_murder_pass:0 "Укрепить Проход Убийцы"
DCM_fortify_murder_pass_desc:0 "Если мы поставим стену на перевале, люди никогда не смогут войти."
DCM_the_great_chamber:0 "Просторная комната"
DCM_the_great_chamber_desc:0 "Большая комната позволит нам делать большие пушки."
DCM_reserve_fev:0 "Резервы ВРЭ"
DCM_reserve_fev_desc:0 "Мы нашли старую зелёную штуку! Маловато, но всё равно хорошо!"
DCM_reinforced_behemoth_clubs:0 "Усиленные дубинки Бегемотов"
DCM_reinforced_behemoth_clubs_desc:0 "Большие дубинки позволяют больше размазать. Вроде как, проще простого."
DCM_armor_plated_behemoths:0 "Бронированные Бегемоты"
DCM_armor_plated_behemoths_desc:0 "Бегемоты сильны. Но пули есть пули. Дайте бегемотам броню, и они выдержат больше пуль."
DCM_ancient_capital_giants:0 "Древние столичные Гиганты"
DCM_ancient_capital_giants_desc:0 "Мы нашли старых бегемотов. Они большие и сильные даже по сравнению с другими бегемотами."
DCM_pitt_overlords:0 "Повелители Питта"
DCM_pitt_overlords_desc:0 "Питт — наше место. Людишки там делают то, что мы говорим, или умирают!"
DCM_topple_versicorps_tower:0 "Снести башню «Версикорпс»"
DCM_topple_versicorps_tower_desc:0 "Бегемоты любят ломать большие вещи. Эта башня — самое большое сооружение в округе."
DCM_rampage_through_the_trench:0 "Буйство в траншеях"
DCM_rampage_through_the_trench_desc:0 "Траншея полна трогов, и бегемоты любят их на закуску."
DCM_break_the_blast_furnace:0 "Сломанная доменная печь"
DCM_break_the_blast_furnace_desc:0 "Один бегемот сломал печь, когда гнался за людьми. Не велика потеря."
DCM_the_mutant_fighting_hole:0 "Бойцовская яма для Мутантов"
DCM_the_mutant_fighting_hole_desc:0 "Два мутанта разозлились и отправились драться в яму. Победит сильнейший - он и будет прав."
DCM_restart_the_supply_plant:0 "Восстановить завод снабжения"
DCM_restart_the_supply_plant_desc:0 "Пусть людишки починят фабрику и производят то, что нам нужно, иначе мы разорвем их на куски."
DCM_search_the_steel_yard:0 "Обыскать Сталелитейный Двор"
DCM_search_the_steel_yard_desc:0 "Людишки-то боялись сталелитейного двора. А мы — нет."
DCM_restart_the_blast_furnace:0 "Отремонтировать доменную печь"
DCM_restart_the_blast_furnace_desc:0 "Большая печь производит много металла. Иногда людишки падают туда, но кого это волнует?"
DCM_mutant_shredders:0 "Мутанты-измельчители"
DCM_mutant_shredders_desc:0 "Большие пушки, стреляющие множеством пуль. Вот как лучше всего убивать людишек."
DCM_shred_wastelanders:0 "Измельчить жителей Пустоши"
DCM_shred_wastelanders_desc:0 "Измельчите людей на мелкие кусочки с помощью новой большой пушки. Это очень смешно."
DCM_overlord_shredders:0 "Повелители-измельчители"
DCM_overlord_shredders_desc:0 "Сделайте еще более мощные пушки для повелителей."
DCM_mutant_demo_teams:0 "Мутанты с гранатометами"
DCM_mutant_demo_teams_desc:0 "Большие пушки стреляющие бомбами и разрывающие людишек. Не подходите слишком близко."
DCM_larger_booms:0 "Большой БУМ"
DCM_larger_booms_desc:0 "При использовании этого оружия еды почти не остается, но оно все еще хорошо подходит для уничтожения более крепких противников."
DCM_bunker_busters:0 "Разрушители бункеров"
DCM_bunker_busters_desc:0 "Некоторые люди прячутся в зданиях. Взрывайте их со зданиями!"
DCM_return_of_the_twin_exterminators:0 "Возвращение Брата Экстерминатора"
DCM_return_of_the_twin_exterminators_desc:0 "Ещё больше консервных банок, бегающих вокруг и убивающих мутантов. Мы раздавим их, как муравьёв!"
DCM_break_the_shield:0 "Сломить оборону"
DCM_break_the_shield_desc:0 "Гули и мутанты сражаются с этими консервами. Убейте и их!"
DCM_the_crashed_airship:0 "Разбитый самолёт"
DCM_the_crashed_airship_desc:0 "Мы нашли старое место, где мутанты много лет назад убили парочку консерв. Приятно вспомнить."
DCM_recruit_the_mutants:0 "Присоединись или умри"
DCM_recruit_the_mutants_desc:0 "Здешние гули и мутанты присоединятся к нам или умрут, как людишки!"
DCM_banish_the_devil_lords:0 "Стереть Адских Отродий"
DCM_banish_the_devil_lords_desc:0 "Черные консервы — худшие ублюдки, и мы их убьем!"
DCM_a_well_armed_mutant_army:0 "Хорошо вооруженная армия Мутантов"
DCM_a_well_armed_mutant_army_desc:0 "У черных консерв есть отличные пушки. Теперь оно наше."
DCM_chicagos_devastation:0 "Разрушенный Чикаго"
DCM_chicagos_devastation_desc:0 "Их город исчез. Мы его уничтожили!"
DCM_a_new_determined_exterminator:0 "Новый решительный экстерминатор"
DCM_a_new_determined_exterminator_desc:0 "Нас не остановить! Давайте соберем всю зелёную жижу!"

###Tooltips###
DCM_more_greenstuff_tt:0 "Мы нашли больше §Gзелёной жижи!"
DCM_more_humies_tt:0 "Мы приведем больше людей в убежище"
DCM_humie_cattle_tt:0 "Люди больше прячутся от нас и меньше сражаются."
DCM_lot_more_greenstuff_tt:0 "У нас неограниченное количество §Gзелёной жижи!"
DCM_quicker_to_fight_tt:0 "Скоро смогут сражаться новые мутанты"
DCM_hole_tt:0 "Некоторые мутанты погибли, но они были слабы. Нам нужны сильные мутанты"
