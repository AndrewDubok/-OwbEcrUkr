l_russian:
DCM_researcher_fawkes:0 "Дослідник Фокс"
DCM_researcher_fawkes_desc:0 "Фокс тепер допомагає нам робити нові гармати, або ми знову вимкнемо його комп'ютер."
DCM_east_coast_mutants:0 "Мутанти Східного Узбережжя"
DCM_east_coast_mutants_desc:0 "Ми є мутанти на східному узбережжі. ну."
DCM_handy_man_fawkes:0 "Майстер на всі руки Фокс"
DCM_handy_man_fawkes_desc:0 "Фокс полагодить поламані речі, зробить нові гармати, або ми знову вимкнемо його комп'ютер."
DCM_glowing_mutants:0 "Сяючі мутанти"
DCM_glowing_mutants_desc:0 "Деякі мутанти починають світитися після того, як побували в метро. Допомагає битися вночі."
DCM_mutant_trenches:0 "Мутантські траншеї"
DCM_mutant_trenches_desc:0 "Якщо ти в ямі, тупий чоловік не може в тебе влучити. А потім ти вилазиш і б'єш їх, ха-ха-ха."
DCM_roaming_behemoths:0 "Бродячі бегемоти"
DCM_roaming_behemoths_desc:0 "Бегемоти ходять навколо і хапають людей. Добре для нас."
DCM_rule_of_giants:0 "Правило велетнів"
DCM_rule_of_giants_desc:0 "Бегемоти кажуть нам, куди йти. Ми робимо це, або нас теж з'їдять."
DCM_vault_tec_scavengers:0 "Штучки Волт-Тек"
DCM_vault_tec_scavengers_desc:0 "У Волт-Тек були хороші штуки для вбивання. Тепер вони наші."
DCM_vault_87_fortress:0 "Форт Сховища 87"
DCM_vault_87_fortress_desc:0 "Тупі люди намагаються зайти спереду — вони вмирають. Намагаються зайти ззаду — ми стріляємо в них. Ха!"
DCM_frontline_behemoths:0 "Лідерство бегемотів"
DCM_frontline_behemoths_desc:0 "Ми йдемо за бегемотами. Вони більші, сильніші і б'ються найкраще."
DCM_mutant_generals:0 "Лідерство мутантів"
DCM_mutant_generals_desc:0 "Бегемоти добре б'ються. Але не добре ведуть. Шепард так каже."
DCM_new_masters_of_the_pitt:0 "Володарі Пітта"
DCM_new_masters_of_the_pitt_desc:0 "Пітт повний людей, які не можуть стати мутантами. Ми використаємо їх для роботи."
DCM_super_mutant_ravings:0 "Мутантське радіо"
DCM_super_mutant_ravings_desc:0 "Шепард виходить на радіо і каже мутантам, що робити. Приносити людей додому. Шукати зелену жижу."
DCM_green_tide_idea:0 "Зелена хвиля"
DCM_green_tide_idea_desc:0 "Люди слабкі, а ми сильні. Ми приходимо в місце і перемагаємо."
DCM_green_tide_rolls_idea:0 "Стережіться, ми йдемо"
DCM_green_tide_rolls_idea_desc:0 "Ми нестримні! Стережіться! Не зупинити! БУМ!"
DCM_trog_horde:0 "Орда трогів"
DCM_trog_horde_desc:0 "Вони не кентаври, але троги теж добре допомагають битися."
DCM_devouring_trog_horde:0 "Пожираюча орда трогів"
DCM_devouring_trog_horde_desc:0 "Ми пускаємо трогів першими. Вони їдять людей і отримують постріли замість нас."
DCM_savage_trog_horde:0 "Дика орда трогів"
DCM_savage_trog_horde_desc:0 "У нас є бегемоти, які кидають трогів у людей. Це смішно."
DCM_pet_centaurs:0 "Домашні кентаври"
DCM_pet_centaurs_desc:0 "Кентаври добре слухаються. Вони допомагають бити людей."
DCM_giant_centaurs:0 "Велетенські кентаври"
DCM_giant_centaurs_desc:0 "Кентавр, який багато їсть, стає великим. Стає кращим у бійці."
DCM_armor_clad_centaurs:0 "Броньовані кентаври"
DCM_armor_clad_centaurs_desc:0 "Кентавр сильний, але м'який. Йому теж потрібна броня!"
DCM_master_of_none:0 "Майстер на всі руки, але ні в чому не спеціаліст"
DCM_master_of_none_desc:0 "Фокс мусить робити багато всього. Це шкодить його мозку?"
DCM_experimental_weapon_tech:0 "Експериментальна зброя"
DCM_experimental_weapon_tech_desc:0 "Фокс знайшов креслення старої зброї для супермутантів. Він її зробить."
DCM_buff_behemoths_1_idea:0 "Сила бегемотів"
DCM_buff_behemoths_1_idea_desc:0 "Бегемоти отримують кращі речі, які допомагають їм битися."
DCM_buff_behemoths_2_idea:0 "Сила бегемотів"
DCM_buff_behemoths_2_idea_desc:0 "Бегемоти отримують кращі речі, які допомагають їм битися."
DCM_buff_behemoths_3_idea:0 "Сила бегемотів"
DCM_buff_behemoths_3_idea_desc:0 "Бегемоти отримують кращі речі, які допомагають їм битися."
DCM_buff_mutants_1_idea:0 "Великі гармати"
DCM_buff_mutants_1_idea_desc:0 "Ми отримуємо більші гармати, щоб вбивати багато м'яких людей."
DCM_buff_mutants_2_idea:0 "Великі гармати"
DCM_buff_mutants_2_idea_desc:0 "Ми отримуємо більші гармати, щоб вбивати багато м'яких людей."
DCM_buff_mutants_3_idea:0 "Великі гармати"
DCM_buff_mutants_3_idea_desc:0 "Ми отримуємо більші гармати, щоб вбивати багато м'яких людей."
DCM_buff_booms_1_idea:0 "Великі бабахи"
DCM_buff_booms_1_idea_desc:0 "Ми отримуємо більші бомби, щоб вбивати міцніших людей."
DCM_buff_booms_2_idea:0 "Великі бабахи"
DCM_buff_booms_2_idea_desc:0 "Ми отримуємо більші бомби, щоб вбивати міцніших людей."
DCM_buff_booms_3_idea:0 "Великі бабахи"
DCM_buff_booms_3_idea_desc:0 "Ми отримуємо більші бомби, щоб вбивати міцніших людей."
DCM_ground_zero:0 "Епіцентр"
DCM_ground_zero_desc:0 "За дверима люди вмирають, якщо йдуть туди. Ми не можемо забрати їх звідти, але нам не треба охороняти."
DCM_vault_101_subjects:0 "Занурення в 101"
DCM_vault_101_subjects_desc:0 "З людей у Сховищі 101 виходять хороші мутанти, коли ми даємо їм зелену жижу."
DCM_green_stuff_modifier:0 "§GЗелена жижа"
DCM_green_stuff_modifier_desc:0 "§GЗелена жижа§! — це те, як ми робимо більше мутантів. У нас її мало залишилось. Нам потрібно більше, щоб робити більше мутантів."
DCM_ghoul_kin:0 "Гулі — брати"
DCM_ghoul_kin_desc:0 "Гулі не стають мутантами, коли ми кладемо їх у зелену жижу. Може, просто дозволимо їм битися з нами?"
DCM_ghoul_slaves:0 "Гулі — раби"
DCM_ghoul_slaves_desc:0 "Тупі гулі не можуть бути супермутантами. Тож вони будуть рабами."
