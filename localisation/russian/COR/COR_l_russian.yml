###Cosmetic Tags###
COR_rockzantium_cosmetic_tag:0 "Імперія Рокзантіуму"
COR_rockzantium_cosmetic_tag_ADJ:0 "Рокзантійська"
COR_rockzantium_cosmetic_tag_DEF:0 "Імперія Рокзантіуму"

###Decisions###
COR_decision_category:0 "Рішення Церкви Роккі"
COR_decision_category_desc:0 "Поширювати світло Роккі — завдання нелегке. Ці язичницькі землі, які ми займаємо, ворожі істині, але ми подбаємо про те, щоб вони прийняли Роккі у своє серце, інакше вони загинуть."
COR_dogmatic_adherence_category:0 "Догматична прихильність"
COR_dogmatic_adherence_category_desc:0 "В Арнольда та Ебігейл свої погляди на те, як навернути язичників до нашої віри. Поки цей розкол не буде подолано, можна очікувати, що кожен із них продовжить свої власні «сповідування»."
COR_decision_forced_conversion:0 "Масове примусове навернення"
COR_decision_forced_conversion_desc:0 "Цілі язичницькі поселення будуть змушені зібратися в центральному місці для проведення великої церемонії. Язичників виведуть уперед і змусять прийняти істину Роккі. Ті, хто відмовиться, стануть наукою для решти."
COR_decision_gentle_conversion:0 "Центри перевиховання"
COR_decision_gentle_conversion_desc:0 "Язичники прожили все своє життя в темряві, без світла Роккі в серці. Ми не можемо звинувачувати їх у тому, що вони повільно приймають істину. Тому найупертіші душі будуть направлені в центри, де їх навчать розуміти Роккі. Якщо ж вони продовжуватимуть опір — доведеться вжити заходів."
COR_decision_raze_heathen_settlement:0 "Зруйнувати язичницьке поселення"
COR_decision_raze_heathen_settlement_desc:0 "Багато поселень відверто відмовляються прийняти світло Роккі. Одне з них буде обрано й стерто з лиця землі, а його язичницьке населення — знищено. Це має нагадати решті, кого благоволить Роккі."
COR_decision_study_heathen_texts:0 "Вивчити язичницькі тексти"
COR_decision_study_heathen_texts_desc:0 "Ебігейл вважає, що деякі язичницькі тексти містять зв'язки з Роккі, які самі язичники просто неправильно витлумачили. Через ретельне вивчення цих документів ми можемо сформулювати переконливі аргументи, здатні навернути їх у віру."
COR_decision_holy_inquisition:0 "Роккійська Інквізиція"
COR_decision_holy_inquisition_desc:0 "Ніхто не очікує Роккійської інквізиції."
COR_decision_negotiate_with_heathens:0 "Вести переговори з язичниками"
COR_decision_negotiate_with_heathens_desc:0 "Язичники можуть помилятися, але вони не позбавлені розуму. Можливо, компроміс стане першим кроком до того, щоб світло Роккі проникло в їхні серця."
    
###Events###
COR_nf_events.1.title:0 "Вибраний народ Роккі"
COR_nf_events.1.desc:0 "Багато років тому, коли вогонь пролився з небес, наш народ шукав притулку в Святих Печерах Роккі. В обіймах Роккі ці люди були захищені від ядерного вогню та хвороби, що прийшла за тими, хто залишився нагорі. У своїй безмежній любові Роккі обрав їх, щоб позбавити страждань кінця світу. Ці люди були..."
COR_nf_events.1.a:0 "Сільські жителі"
COR_nf_events.1.b:0 "Місцеві шахтарі"
COR_nf_events.1.c:0 "Сім'ї, що відпочивали далеко від дому"
COR_nf_events.2.title:0 "Наш ворог у горах"
COR_nf_events.2.desc:0 "З часом обрані навчилися любити Роккі за все, що він для них зробив. Майже два століття, проведені в його обіймах, завершилися тим, що наша віра була закріплена в Біблії. Наш народ вийшов у дикі землі за межами Печер Роккі і виявив світ, наповнений неосвіченими язичниками. Спроби донести слово Роккі зустріли глузування та злобу, і тоді гнів Роккі обрушився на язичників. Але наш народ був нечисленний, а язичників — безліч. Нас вигнали зі Святих Печер Роккі на північні пагорби. І якби не одна обставина — наш народ загинув би."
COR_nf_events.2.a:0 "Знання того, як зробити лікувальний порошок"
COR_nf_events.2.b:0 "Наше бажання помсти"
COR_nf_events.2.c:0 "Знання, що Роккі захистить нас"
COR_nf_events.2.d:0 "Тайник зі зброєю, який нам вказав Роккі"
COR_nf_events.3.title:0 "У пошуках нового дому"
COR_nf_events.3.desc:0 "Ми втратили багатьох під час виходу, включаючи нашого лідера — Святого Ґрейвела. Але зрештою ми знайшли новий дім, далеко від язичників. Там ми змогли зібратися, відновитися. У цьому новому домі було все необхідне, щоб почати нарощувати силу і знову поширювати слово Роккі серед не просвітлених жителів регіону. Цим домом був..."
COR_nf_events.3.a:0 "Покинута шахта"
COR_nf_events.3.b:0 "Довоєнна фабрика"
COR_nf_events.3.c:0 "Забутий бункер"
COR_nf_events.4.title:0 "Голос Роккі"
COR_nf_events.4.desc:0 "Хоча багато хто тривожився за майбутнє нашого народу і сумував за Святим Ґрейвелом, загиблим під час виходу, знайшлася людина, готова повести нас уперед. Один із найдовіреніших радників Святого Ґрейвела — Філіп Макдональд. Незважаючи на дивну мутацію, спричинену надмірним вживанням Котячого Ока, його бачення шляху для нашого народу залишалося ясним. Він пообіцяв повернення до Святих Печер Роккі і жорстоку розплату для всіх язичників, що відкинули світло Роккі. Філіп був наречений Святим Камінчиком і дав народові ще одну обіцянку."
COR_nf_events.4.a:0 "Обіцянка річки язичницької крові"
COR_nf_events.4.b:0 "Обіцянка збільшення послідовників"
COR_nf_events.4.c:0 "Обіцянка відповідей на важливі питання"
COR_nf_events.5.title:0 "Невеликі розбіжності в думках"
COR_nf_events.5.desc:0 "Поруч зі Святим Камінчиком стоять два великі воїни Роккі. Перший — Арнольд, могутній чемпіон, що знищив незліченні загрози під час походу на північ. Другий — Ебігейл, мудра стратегиня, що вела воїнів крізь непереборні перешкоди. Ці два титани єдині в меті, але сильно різняться в методах. Арнольд не раз висловлював занепокоєння тим, що Ебігейл виявляє поблажливість до корисних язичників. Він стверджує, що будь-які поступки тим, хто слідує хибним віруванням, призведуть до поступового розмивання наших цінностей — так само, як річка здатна зруйнувати гору. Святий Камінчик досі успішно згладжував їхні розбіжності. Але якщо розкол поглибиться, наслідки можуть прокотитися хвилею по всій нашій вірі."
COR_nf_events.5.a:0 "Зрозуміло"
COR_nf_events.6.title:0 "Більше, ніж просто невеликі розбіжності в думках"
COR_nf_events.6.desc.1:0 "Після повернення Арнольда та Ебігейл разом з їхніми почтами суперечки не вщухають ні на день. Арнольд у люті через угоди, які Ебігейл уклала з язичниками під час своїх завоювань. Тепер він вимагає її страти як єретички і зібрав чимало прихильників. У Ебігейл теж багато прихильників, які вважають, що застарілі погляди Арнольда призведуть наш хрестовий похід до провалу. Схоже, що, обравши будь-яку зі сторін, ми приречені на внутрішній конфлікт."
COR_nf_events.6.desc.2:0 "Після повернення Арнольда та Ебігейл разом з їхніми почтами настало відносне затишшя. Очікувалося, що вони знову вступлять у звичні суперечки про інтерпретацію Біблії, але цього разу вони, схоже, дійшли згоди. Очевидно, перебування Ебігейл на півдні змінило її, і тепер ми можемо рухатися вперед разом."
COR_nf_events.6.a:0 "Святий Камінчик підтримує Арнольда!"
COR_nf_events.6.b:0 "Святий Камінчик підтримує Ебігейл!"
COR_nf_events.6.c:0 "Ми підтримуємо Арнольда!"
COR_nf_events.6.d:0 "Ми підтримуємо Ебігейл!"
COR_nf_events.6.e:0 "Хрестовий похід чекає!"
COR_nf_events.7.title:0 "Кінець Ебігейл"
COR_nf_events.7.desc.1:0 "Після кривавого конфлікту, що загрожував розірвати наш народ, єретичка Ебігейл була приведена перед святий трибунал і засуджена до своєї участі. Та, що підняла зброю проти своїх братів по вірі на захист язичницьких культів, буде страчена через закидання камінням. Дехто запитує, чому її просто не розстріляли або не обезголовили, але Святий Камінчик наполягає, що символізм каміння, яке стало причиною загибелі єретички, вартий затрачених зусиль."
COR_nf_events.7.desc.2:0 "Після кривавого конфлікту, що загрожував розірвати наш народ, єретичка Ебігейл була приведена перед святий трибунал і засуджена до своєї участі. Та, що підняла зброю проти своїх братів по вірі на захист язичницьких культів, буде страчена через закидання камінням. Поруч із нею — Святий Камінчик, колись відданий лідер нашої віри, що впав перед спокусами язичників і відвернувся від світла Роккі. Дехто запитує, чому їх просто не розстріляли або не обезголовили, але Арнольд наполягає, що символізм каміння, яке стало причиною загибелі єретиків, вартий затрачених зусиль."
COR_nf_events.7.a:0 "Хвала Роккі"
COR_nf_events.8.title:0 "Стихлі пристрасті"
COR_nf_events.8.desc:0 "Це потребувало незліченних годин обговорень і думок десятка вчених Біблії, але розуміння язичницьких вірувань нарешті досягнуто. Було постановлено, що, хоча Ебігейл права — багато язичницьких вір є поклонінням проявам волі Роккі, чи то вогонь чи магнетизм, — вони все одно залишаються язичницькими. Якщо їхні послідовники не зможуть усвідомити вади своєї віри, вони підлягають страті, незалежно від того, наскільки близькі їхні переконання до Роккіїзму. З цим питанням покінчено, і тепер ми можемо рухатися вперед, єдині у вірі та меті."
COR_nf_events.8.a:0 "Хвала Роккі"
COR_nf_events.9.title:0 "Спалення Арнольда"
COR_nf_events.9.desc.1:0 "Арнольд і йому подібні надто довго стримували Церкву Роккі. Якби не їхнє викривлене розуміння Біблії, ми давно б повернулися до Святої Землі. За цей гріх простої смерті недостатньо — повинні бути знищені навіть сліди їхнього існування. Арнольд буде спалений дотла, поки не залишиться нічого, крім попелу!"
COR_nf_events.9.desc.2:0 "Святий Камінчик і Арнольд надто довго стримували Церкву Роккі. Якби не їхнє викривлене розуміння Біблії, ми давно б повернулися до Святої Землі. За цей гріх простої смерті недостатньо — повинні бути знищені навіть сліди їхнього існування. Арнольд і Святий Камінчик будуть спалені дотла, поки не залишиться нічого, крім попелу!"
COR_nf_events.9.a:0 "Хвала Роккі"
COR_nf_events.10.title:0 "Найсильніший солдат Роккі"
COR_nf_events.10.desc:0 "Арнольд височіє серед воїнів віри. Знищивши незліченну кількість язичників і мутованих чудовиськ, він став очевидним вибором для підготовки нового покоління роккістських солдатів. Його методи можуть здаватися жорстокими — включаючи випробування під назвою «Хрускіт», у якому бійці повинні пройти через руїни на півночі, що кишать трогами, — але результати говорять самі за себе. Ті, хто виживає після його тренувань, виходять звідти сяючими знаряддями волі Роккі, що знищують будь-якого язичника чи монстра на своєму шляху."
COR_nf_events.10.a:0 "ЖИВО В ХРУСКІТ!"
COR_nf_events.11.title:0 "Вдала одноденна поїздка"
COR_nf_events.11.desc:0 "Наші нові претенденти на звання воїнів віри повернулися з прогулянки «Хрускотом». Не всі дійшли назад — але це було очікувано. Ті, хто повернувся, принесли великі трофеї та історії слави. Тепер вони готові вчитися бути знаряддями волі Роккі."
COR_nf_events.11.a:0 "Хвала Роккі"
COR_nf_events.12.title:0 "Поховані в «Хрускоті»"
COR_nf_events.12.desc:0 "Наші нові претенденти на звання воїнів віри повернулися з прогулянки «Хрускотом». Їх виявилося набагато менше, ніж очікувалося — багато, здається, загинули в спробі здобути славу. Схоже, коли справа доходить до «Хрускоту», ці рекрути підвели нас."
COR_nf_events.12.a:0 "Такий «Хрускіт»"
COR_nf_events.13.title:0 "Далекі крики"
COR_nf_events.13.desc:0 "У південних руїнах було набагато більше криків і стрілянини, ніж зазвичай. Схоже, ці дивні культисти з півдня знову вирушили вглиб руїн. Незрозуміло, навіщо вони продовжують посилати людей у цю діру, але ясно одне — троги сьогодні не залишаться голодними."
COR_nf_events.13.a:0 "Дивні виродки"
COR_nf_events.14.title:0 "В окрузі стало менше трогів"
COR_nf_events.14.desc:0 "У південних руїнах стало трохи менше трогів і дикунів, ніж зазвичай. Схоже, ці дивні культисти з півдня знову влаштували вилазку за мотлохом чи чимось подібним. У тому районі особливо нема чого збирати, але принаймні вони допомагають стримувати чисельність."
COR_nf_events.14.a:0 "Дивні виродки"
COR_nf_events.15.title:0 "Слава в «Хрускоті»"
COR_nf_events.15.desc:0 "Наші претенденти на звання воїнів віри знову повернулися з «Хрускоту». З високо піднятими головами вони приносять ще більше трофеїв і розповідей про славні перемоги. Ці рекрути готові до всього, що чекає на них у прийдешньому хрестовому поході."
COR_nf_events.15.a:0 "Хвала Роккі"
COR_nf_events.16.title:0 "Поховані в «Хрускоті»"
COR_nf_events.16.desc:0 "Наші нові претенденти на звання воїнів віри повернулися з прогулянки «Хрускотом». Їх виявилося набагато менше, ніж очікувалося — багато, здається, загинули в спробі здобути славу. Схоже, коли справа доходить до «Хрускоту», ці рекрути підвели нас."
COR_nf_events.16.a:0 "Такий «Хрускіт»"
COR_nf_events.17.title:0 "Далекі крики"
COR_nf_events.17.desc:0 "У південних руїнах було набагато більше криків і стрілянини, ніж зазвичай. Схоже, ці дивні культисти з півдня знову вирушили вглиб руїн. Незрозуміло, навіщо вони продовжують посилати людей у цю діру, але ясно одне — троги сьогодні не залишаться голодними."
COR_nf_events.17.a:0 "Дивні виродки"
COR_nf_events.18.title:0 "Дикіші, ніж дикуни"
COR_nf_events.18.desc:0 "Ці божевільні з півдня просто не знають, коли зупинитися. Вони продовжують влаштовувати погроми в південних руїнах, убиваючи всіх трогів і дикунів, що трапляються їм на шляху. Ми досі не знаємо, навіщо вони це роблять, але якщо так піде й далі — у Трогтауні не залишиться жодного трога."
COR_nf_events.19.title:0 "ПУСТА ПОДІЯ"
COR_nf_events.19.desc:0 "ПУСТА ПОДІЯ"
COR_nf_events.19.a:0 "ПУСТА ПОДІЯ"
COR_nf_events.20.title:0 "Хтось мені колись сказав..."
COR_nf_events.20.desc:0 "Язичники з Оніонберга розповідають про істоту, що мешкає в глибині лісів. Могутній, але розумний звір, за їхніми словами, живе там уже десятки, якщо не сотні років, і приймає дари, залишені на краю лісу. Ці підношення — данина, щоб істота утримувала рейдерів від їхніх земель. Місцеві описують його як велике, зелене і таке, що віддає перевагу самотності, але, за чутками, досить розумне, щоб говорити. Арнольд зацікавився цим звіром і має намір побачити його власними очима. Чи вб'є він його, чи заговорить — поки невідомо."
COR_nf_events.20.a:0 "Ці сільчани — явно не найгостріші інструменти в сараї."
COR_nf_events.21.title:0 "Вибір мисливської групи"
COR_nf_events.21.desc:0 "Арнольд прийняв рішення — звір має бути вбитий. Він закликав воїнів віри приєднатися до полювання, але поки не обрав, кого саме візьме з собою."
COR_nf_events.21.a:0 "Могутні воїни, готові до бою"
COR_nf_events.21.b:0 "Новобранці, що запізнилися і яким треба щось довести"
COR_nf_events.21.c:0 "Поневолені язичники Оніонберга, що знають ліси"
COR_nf_events.22.title:0 "Загублені в лісі"
COR_nf_events.22.desc:0 "Звір лісу виявився мудрішим, ніж ми припускали. Він розставив пастки, що забрали життя багатьох, кого ми відправили за ним. Він також влаштовував засідки на тих, хто пройшов крізь пастки. Але ми наближаємося. Залишилося лише трохи часу — і звір впаде."
COR_nf_events.22.a:0 "Хвала Роккі!"
COR_nf_events.23.title:0 "Мудрий Велетень"
COR_nf_events.23.desc:0 "Звір спочатку був насторожений, але добре відреагував на дари, які Арнольд відправив у ліс разом із листами з проханням про зустріч. Вночі істота вивісила знаки, що ведуть до його житла. Арнольд був здивований, виявивши, що цей звір — насправді супермутант, хоча, на відміну від тих, що час від часу нападають зі сходу, цей не проявляв ворожості. Істота назвала себе Шреком — іменем, взятим зі старої книги про відлюдькуватого зеленого велетня. Воно розповіло, що прийшло з далекого півдня багато десятиліть тому і виживало, харчуючись тим, що вдавалося знайти або отримати від села. Арнольд повідав Шреку істину Роккі, і мутант слухав уважно. Він добре сприйняв уроки Біблії і впустив Роккі у своє серце. Арнольд вийшов із лісу зі Шреком поруч — мутант погодився приєднатися до нашого святого хрестового походу."
COR_nf_events.23.a:0 "Хвала Роккі"
COR_nf_events.24.title:0 "Арнольд повертається додому"
COR_nf_events.24.desc:0 "Арнольд повернувся із завоювань на південному заході. З собою він привіз цибулю, новонавернених воїнів та розповіді про зеленого велетня, що ховається в лісах. Землі Оніонберга були осяяні світлом Роккі — і хоча багато хто чинив опір, не менше впустили Роккі у свої серця."
COR_nf_events.24.a:0 "Хвала Роккі"
COR_nf_events.25.title:0 "Наймудріший воїн Роккі"
COR_nf_events.25.desc:0 "Ебігейл відрізняється від багатьох воїнів нашої віри. Замість того, щоб сліпо кидатися на ворога, покладаючись на те, що Роккі гарантує перемогу, вона вивчає противника. Вона дізнається про їхні слабкості та використовує їх, а також переймає деякі з їхніх сильних сторін. Цей підхід викликав критику з боку церковних традиціоналістів, включаючи Арнольда, але дозволив її бійцям здобути безліч великих перемог із втратами, значно нижчими за очікувані. Її нещодавній тріумф над племенем Смолоскипців у 2274 році — один із таких прикладів."
COR_nf_events.25.a:0 "Хвала Роккі"
COR_nf_events.26.title:0 "Полум'я згасає"
COR_nf_events.26.desc:0 "Минуло багато місяців відколи плем'я Смолоскипців було розгромлене силами Роккі, але деякі все ще продовжували опір. Ці залишки ставали все менш численними, поки, нарешті, останні з них не були загнані в старий бункер — той самий, звідки вони, схоже, отримали більшість своїх довоєнних вогнеметів. Відправляти туди воїнів було б безглуздою тратою відданих бійців, і Ебігейл вирішила просто запечатати бункер бетоном. Однак, бачачи цінність обладнання всередині, вона запропонувала їм шанс на капітуляцію. Смолоскипці погодилися здатися і битися за Роккі, але лише за умови, що їм буде дозволено шанувати полум'я і продовжувати свої обряди. Зазвичай така єресь відкидається без обговорень, але останніми місяцями Ебігейл дійшла переконання, що їхнє вогнепоклонство — не єресь, а омана, що виражає шанування прояву волі Роккі."
COR_nf_events.26.a:0 "Потрібен час, щоб прийняти рішення"
COR_nf_events.27.title:0 "ПУСТА ПОДІЯ"
COR_nf_events.27.desc:0 "ПУСТА ПОДІЯ"
COR_nf_events.27.a:0 "ПУСТА ПОДІЯ"
COR_nf_events.28.title:0 "Ебігейл повертається додому"
COR_nf_events.28.desc:0 "Ебігейл повернулася із завоювань на південному сході. З собою вона принесла могутню зброю, здобуту в полеглих язичників. Деякі воїни Роккі можуть зневажливо ставитися до використання настільки передових засобів, віддаючи перевагу традиційній холодній зброї, але ефективність цих інструментів незаперечна. Крім того, відбулося безліч навернень — язичники побачили світло Роккі. Наші лави були зміцнені."
COR_nf_events.28.a:0 "Хвала Роккі!"
COR_nf_events.29.title:0 "Очі спрямовані на південь"
COR_nf_events.29.desc:0 "Завоювання проти фермерів Оніонберга та розумників із Сили Лоренца були лише розминкою перед справжнім хрестовим походом. Між нами та нашою метою — Печерами Роккі — лежать інші народи, що засіли в пагорбах і горах на південь. Але навіть їхнє падіння не завершить похід. Коли ці племена будуть знищені, ми нарешті зіткнемося віч-на-віч з нашим споконвічним ворогом — язичниками з Ґрін-Маунтін. Кожен роккіст, що йшов у виході на північ, мріє про день, коли зможе помститися тим, хто вигнав нас зі святої печери. І цей день дедалі ближче."
COR_nf_events.29.a:0 "Стережіться, ми йдемо"
COR_nf_events.30.title:0 "ПУСТА ПОДІЯ"
COR_nf_events.30.desc:0 "ПУСТА ПОДІЯ"
COR_nf_events.30.a:0 "ПУСТА ПОДІЯ"
COR_nf_events.31.title:0 "Стерті на порох"
COR_nf_events.31.desc:0 "Язичники цього культу поклоняються радіації! Багато хто навернувся до істинної віри, коли зрозумів, що не можуть протистояти волі Роккі, але деякі залишилися непохитними до самого кінця. Лідери культу та їхні найвідданіші послідовники засіли в укріпленому форпості і виявилися надто складними для прямого штурму — ціна в життях роккістів була б надто високою. Тому було вирішено: якщо вони так прагнуть бути поруч зі своїм улюбленим Атомом, ми їм це забезпечимо."
COR_nf_events.31.a:0 "Готуйте «Товстуна»"
COR_nf_events.32.title:0 "Але що ТАКЕ атом?"
COR_nf_events.32.desc:0 "Ебігейл зустрілася з Променистою Кейт із Культу Кобальту і провела довгу бесіду про природу їхнього Атому. За допомогою кількох вчених Біблії їй вдалося пояснити, що атом — не божество саме по собі, а лише один із багатьох проявів волі Роккі. Як полум'я і магнетизм — лише прояви, так і атом. Лідерка культу не змогла спростувати аргументи Ебігейл і визнала, що та може бути правою. Після цього колишня лідерка розповіла своїй пастві благу вість про Світло Роккі, і, за винятком кількох самогубств, більшість культу прийняли істину Роккі."
COR_nf_events.32.a:0 "Хвала Роккі!"
COR_nf_events.33.title:0 "Останній схід сонця"
COR_nf_events.33.desc:0 "Головний рейнджер сподівався хоча б на спокійну ніч у печері, де він і жменька послідовників, що залишилися, розбили табір — але не пощастило. Поклонники каменю прийшли за ними відразу після опівночі. Інші рейнджери зробили все, що могли, щоб їх стримати, але їх було надто багато. Головний рейнджер швидко зрозумів, що далі битися безглуздо, і здався — за умови, що його людям дозволять піти. Звичайно, вони опиралися, але він завжди вмів їх переконати. Адже що значить життя одного старого в порівнянні з життями всіх цих молодих рейнджерів? Його вивели з печери під радісні крики культистів — якраз коли сонце почало підніматися над пагорбами. Коли його поставили на коліна, він подумав, як же ці пагорби схожі на ті, що він бачив у дитинстві. Час не змінить ці гори. І культисти — теж не зможуть. \n \nВін не відчув каменя, що проломив йому череп."
COR_nf_events.33.a:0 "ХВАЛА РОККІ!"
COR_nf_events.34.title:0 "Старші за гори"
COR_nf_events.34.desc:0 "Головний рейнджер не був дурнем. Він знав, коли йде в пастку. Але ця зустріч із Кам'яним Генералом — чи як там її називали — такою не була. За багато тижнів боїв стало ясно: якщо поклонник каменю не намагається одразу тебе забити чи спалити, значить, швидше за все, він і не хоче. Тож Головний Рейнджер зустрівся з Ебігейл, і вони обговорили релігію роккістів. Ебігейл запевнила, що повсякденне життя тих, хто прийме віру, особливо не зміниться — адже вони шанують гори так само, як народ Мононгагели. Їхня мета — не ресурси, а шлях до Ґрін-Маунтін. Якщо це означає кінець кровопролиттю і відносний спокій для його людей — він був тільки радий. Тим більше, що буйні хлопці зі сходу ставали дедалі більшою проблемою, і трохи допомоги не завадить."
COR_nf_events.34.a:0 "Хвала Роккі"
COR_nf_events.35.title:0 "За два кроки від дому"
COR_nf_events.35.desc:0 "Шлях до Ґрін-Маунтін відкритий. Воїни Роккі стоять напоготові, і, зрозуміло, Роккі на нашому боці. Час іти вперед і повернути нашу святу землю наближається. Але поки армії ще збираються, у нас є трохи часу для останніх приготувань. На чому слід зосередитися?"
COR_nf_events.35.a:0 "Вгамувати заворушення між нами та столицею"
COR_nf_events.35.b:0 "Швидко зібрати більше солдатів"
COR_nf_events.35.c:0 "Підготувати надлишки спорядження"
COR_nf_events.35.d:0 "Згуртуйте наш народ, адже час настав"
COR_nf_events.36.title:0 "Помста Роккі"
COR_nf_events.36.desc:0 "Язичники Ґрін-Маунтін не забули нас. Побачивши наші знамена, вони відкрили вогонь — і були не самі. Ті, хто втік від нашого наступу, об'єдналися з нашим старим ворогом і вирішили дати останній бій. Але це не мало значення. Об'єднана міць вірних Роккі була більш ніж достатньою, щоб знищити цих язичників та їхніх союзників. Вони влаштували останню оборону у фортеці серед гір і майже зупинили наш наступ... але ми здобули перемогу завдяки..."
COR_nf_events.36.a:0 "Арнольдським ветеранам «ХРУСКОТУ»"
COR_nf_events.36.b:0 "Знанням Шрека про партизанську тактику"
COR_nf_events.36.c:0 "Вогнеметним загонам Ебігейл"
COR_nf_events.36.d:0 "Міні-бомбам колишнього культу кобальту, які ще залишилися"
COR_nf_events.37.title:0 "ПУСТА ПОДІЯ"
COR_nf_events.37.desc:0 "ПУСТА ПОДІЯ"
COR_nf_events.37.a:0 "ПУСТА ПОДІЯ"
COR_nf_events.38.title:0 "Боягузи"
COR_nf_events.38.desc:0 "Коли ми прибули до Святих Печер Роккі, нас здивувало — ми побачили обличчя, давно вважені втраченими після виходу. Багато років тому деякі роккісти поступилися владі язичників в обмін на свої життя і сховалися в печерах. Багато наших воїнів були готові стратити їх на місці — за те, що вони відкинули один із основоположних принципів віри заради порятунку. Але чи варто проливати кров братів лише за те, що вони колись здригнулися?"
COR_nf_events.38.a:0 "З поверненням"
COR_nf_events.38.b:0 "Вони зробили свій вибір"
COR_nf_events.39.title:0 "Наша Могутня Столиця"
COR_nf_events.39.desc:0 "За короткий час ми перетворили цю землю з дикого краю на велику столицю нашого народу. Вірні стікаються, щоб побачити місто, зведене навколо наших святих печер, і багато хто залишається, ледь побачивши його велич. Надійні дороги ведуть паломників із найвіддаленіших куточків наших земель, і тепер стало ясно — ми більше не просто церква. Ми — священна імперія!"
COR_nf_events.39.a:0 "Сонце ніколи не заходить над Рокзантіумом!"
COR_nf_events.40.title:0 "Америка стукає у двері"
COR_nf_events.40.desc:0 "Час від часу в наші землі забрідав літаючий робот. Його мета, здавалося, полягала в трансляції старих радіоповідомлень від групи, що називала себе Анклавом. Ці послання обіцяли повернення довоєнної Америки, і, як багато хто в пустці, ми вважали їх просто старими записами давно зниклих залишків. Але гвинтокрили, що ширяють над нашими головами, і солдати, що марширують нашою землею, ясно дають зрозуміти — це не так. Анклав захопив Столичну Пустку на сході і тепер звернув свій погляд на нас. Але їм не пощастило — адже ми обрані Роккі. А з ним на нашому боці, як ми можемо програти?"
COR_nf_events.40.a:0 "Анклав впаде"
COR_nf_events.41.title:0 "Штурм Проєкту «Чистота»"
COR_nf_events.41.desc:0 "Як ми й знали, Анклав з усією своєю передовою технологією виявився нікчемним перед нашою вірою та міццю. Їхня остання оборона відбулася біля величезного водоочисного споруди, яке вони так цінували. Там їхній Головнокомандувач Отем був знищений разом з рештою. Язичники Анклаву більше не існують. І тепер у Столичної Пустки є нова домінуюча сила."
COR_nf_events.41.a:0 "Хвала Роккі"
COR_nf_events.42.title:0 "Щось не так із водою"
COR_nf_events.42.desc:0 "Коли наші воїни увійшли в Столичну Пустку слідом за розбитими солдатами Анклаву, стало ясно — з цим місцем щось не так. Майже кожне поселення, яке ми зустріли, було наповнене хворими та вмираючими. Єдине, що об'єднувало ці поселення — Анклав побував там, роздаючи воду. Не знадобилося видіння від Роккі, щоб зрозуміти, що відбувається. Коли ми дісталися очищувача, через який Анклав пропускав цю воду, нам вдалося захопити кількох їхніх вчених. Під загрозою страти вони зізналися у скоєному. Вони додали у воду щось під назвою ВШЕ — речовину, що вбиває майже всіх, хто її вип'є. Очистити воду можливо, але для цього знадобиться відволікти значну частину наших найобдарованіших умів."
COR_nf_events.42.a:0 "Очистити воду"
COR_nf_events.43.title:0 "Інший Техно-культ"
COR_nf_events.43.desc:0 "Надходили повідомлення про язичників, що нишпорять нашими землями в передовій силовій броні, але ми думали, що прогнали їх. Схоже, ми помилялися. Група технопоклонників, що називають себе Братством Сталі, розпочала повномасштабний наступ на наш народ. Але не важливо, які довоєнні рештки вони несуть у бій — у нас є підтримка вищої сили, Роккі. Це Братство Сталі зустріне полум'я настільки гаряче, що воно розплавить сталеві балки і закипить їхню броню прямо на них."
COR_nf_events.43.a:0 "Цей культ впаде, як і інші"
COR_nf_events.44.title:0 "В їхнє лігво"
COR_nf_events.44.desc:0 "Наші воїни нарешті прорвалися в саме серце цього технокульту, і, як ми й очікували, у них виявилося величезне сховище довоєнних технологій. Ці могутні знаряддя краще послужать у наших руках — захищаючи вірних Роккі та поширюючи наш вплив."
COR_nf_events.44.a:0 "Хвала Роккі"
COR_nf_events.45.title:0 "Злочини Кромвеля"
COR_nf_events.45.desc:0 "Щойно ми подумали, що покінчили з культами, що поклоняються ядерній енергії, ми знайшли ще один у Столичній Пустці. Ці Діти Атома обґрунтувалися в Мегатонні, під проводом божевільного на ім'я Сповідник Кромвель. Цей фанатик стояв у калюжах радіоактивної води і благав інших приєднатися до нього. Коли ми спробували стратити його за злочин — поширення язичницької віри — його послідовники стали на захист. Звичайно, ці обідрані дикуни не могли зрівнятися з обраними Роккі, і різанина була швидкою. Але все ж — ця різанина трохи зіпсувала ставлення Столичної Пустки до нас."
COR_nf_events.45.a:0 "Вони навернуться або приєднаються до Кромвеля"
COR_nf_events.46.title:0 "Переконання Кромвеля"
COR_nf_events.46.desc:0 "Ми думали, що покінчили з культами, що поклоняються ядерній енергії, але знайшли ще один у Столичній Пустці. Ці Діти Атома обґрунтувалися в Мегатонні, під проводом фанатичного проповідника на ім'я Сповідник Кромвель. Нам вдалося переконати його та його послідовників прийти на мирну бесіду про віру, і хоча знадобилося чимало зусиль, деяким із них ми змогли показати помилковість їхнього шляху. Інші зустріли ту долю, що чекає на всіх, хто відкидає світло Роккі."
COR_nf_events.46.a:0 "Хвала Роккі"
COR_nf_events.47.title:0 "Монстри Печер"
COR_nf_events.47.desc:0 "Ми відправили частину наших людей дослідити місце під назвою Літтл-Лемплайт. Розповіді про нього нагадували описи наших Святих Печер Роккі. Коли наші люди прибули, їх зустріли діти — прямі нащадки школярів, що сховалися в цих печерах під час Великої Війни. Не було часу насолоджуватися цим зв'язком із духовними родичами, адже в печері мешкала й інша група. Величезні мутанти, що тероризують Столичну Пустку і навіть нападали на наших людей, займали область за стінами Лемплайту. Наші воїни не могли дозволити таким гидотам оскверняти святе місце і кинулися в саме серце цього гнізда. Там вони знайшли джерело появи супермутантів у Столичній Пустці — і поклали цьому край. Безсумнівно, Роккі побажав, щоб ми знищили це нечестиве породження."
COR_nf_events.47.a:0 "Хвала Роккі!"
COR_nf_events.48.title:0 "Споріднені душі"
COR_nf_events.48.desc.1:0 "Ми відправили частину наших людей дослідити місце під назвою Літтл-Лемплайт. Розповіді про нього нагадували описи наших Святих Печер Роккі. Коли наші люди прибули, їх зустріли діти — прямі нащадки школярів, що сховалися в цих печерах під час Великої Війни. Спочатку діти були насторожені, але коли ми розповіли, що теж прийшли з печери, подібної до їхньої, вони потеплішали до нас. Вони добре сприйняли вчення Роккі, і тепер ми засновуємо церкву в цих печерах."
COR_nf_events.48.desc.2:0 "Ми відправили частину наших людей дослідити місце під назвою Літтл-Лемплайт. Розповіді про нього нагадували описи наших Святих Печер Роккі. Наші люди були пригнічені, побачивши, що сталося з колишніми мешканцями. Записи та споруди, що залишилися, розповідають про суспільство, що походить від школярів, які сховалися в цих печерах під час Великої Війни. На жаль, ці духовні родичі були знищені Анклавом, коли той виявив це місце. Зараз, коли ми починаємо освоювати печеру, там зводиться церква, і в ній буде встановлено вівтар на згадку про дітей, убитих язичниками."
COR_nf_events.48.a:0 "Хвала Роккі"
COR_nf_events.48.b:0 "Ми ніколи не зможемо пробачити язичників"
COR_nf_events.49.title:0 "Дар води"
COR_nf_events.49.desc:0 "Це потребувало чималих зусиль, але нам вдалося запустити Проєкт Чистота під нашим контролем. Тепер очищувач виробляє чисту питну воду, яку ми розподіляємо серед вірних. Було висловлено пропозицію використовувати цю воду як стимул для навернення нових душ — адже хіба дар нескінченної води не є доказом того, що ми благословенні Роккі?"
COR_nf_events.49.a:0 "Хвала Роккі!"

