COR_arnold_killed_flag:0 "Арнольда було вбито"
COR_abigail_killed_flag:0 "Ебігейл було вбито"

###Focuses### 
COR_nf_a001:0 "Обрані Роккі"
COR_nf_a001_desc:0 "Історія нашого народу починається з обраних, що сховалися в святих печерах."
COR_nf_a002:0 "Ворог Роккі"
COR_nf_a002_desc:0 "Наші предки були не єдиними, хто пережив жахи Великої Війни, і вони зіткнулися з люттю язичників."
COR_nf_a003:0 "Новий Дім Роккі"
COR_nf_a003_desc:0 "Язичники вигнали наших предків із священних печер, і нам довелося шукати новий дім."
COR_nf_a004:0 "Новий Пророк Роккі"
COR_nf_a004_desc:0 "З відходом попереднього святого, новий святий обіцяє краще майбутнє нашому народу."
COR_nf_a005:0 "Воїни Роккі"
COR_nf_a005_desc:0 "Два наймогутніші поборники Роккі по-різному тлумачать його волю."
COR_nf_a006:0 "Нарощування Сил"
COR_nf_a006_desc:0 "Якщо ми хочемо повернути собі нашу святу землю, нам потрібно буде зміцнити свої сили."
COR_nf_a007:0 "Заповнення Майстерень"
COR_nf_a007_desc:0 "Язичницькі раби вироблятимуть знаряддя для наших славних завоювань."
COR_nf_a008:0 "Пошук Збирачів"
COR_nf_a008_desc:0 "Язичники потягнуть уламки старого світу, щоб ми могли їх переробити."
COR_nf_a009:0 "Кам'яні Стіни"
COR_nf_a009_desc:0 "Могутні стіни, що оточують наш дім, будуть символом нашої рішучості."
COR_nf_a010:0 "Батальйони Покаяння"
COR_nf_a010_desc:0 "Язичники можуть спокутувати свої недоліки, служачи волі Роккі."
COR_nf_a011:0 "Побожні Армії"
COR_nf_a011_desc:0 "Тільки ті, хто зберігає Роккі у своєму серці, гідні битися в його ім'я."
COR_nf_a012:0 "Могутність Роккі"
COR_nf_a012_desc:0 "Наші бійці як ніколи готові виконати волю Роккі. Язичники здригнуться при звуку нашого наближення."
COR_nf_a013:0 "Розтріскані Підвалини"
COR_nf_a013_desc:0 "Догматичний розкол між Ебігейл та Арнольдом має бути врегульований Святим Камінчиком."
COR_nf_a014:0 "Лють Арнольда"
COR_nf_a014_desc:0 "Святий Камінчик збився зі шляху, і Арнольду належить повести Роккістів до нового майбутнього."
COR_nf_a015:0 "Клич для Вірних"
COR_nf_a015_desc:0 "Ті, хто знає, що Ебігейл і Камінчик — єретики, візьмуться за зброю заради нашої правої справи!"
COR_nf_a016:0 "Доля Єретиків"
COR_nf_a016_desc:0 "Для тих, хто відвернувся від світла Роккі, може бути тільки одна доля."
COR_nf_a017:0 "Холодніші Голови"
COR_nf_a017_desc:0 "Вирішення цієї проблеми полягає не в тому, щоб роккісти вбивали один одного, а в тому, щоб досягти взаєморозуміння."
COR_nf_a018:0 "Єретичний Нагляд"
COR_nf_a018_desc:0 "Тільки тим, хто добре розбирається в Біблії та окутаний світлом Роккі, можна довіряти читання єретичних документів."
COR_nf_a019:0 "Закритий Розкол"
COR_nf_a019_desc:0 "Розбіжності між нашими найвеличнішими воїнами подолано. Шлях уперед пройдуть усі вірні Роккі разом."
COR_nf_a020:0 "Лють Ебігейл"
COR_nf_a020_desc:0 "Святий Камінчик показав себе дурнем, здатним привести Церкву до краху. Його та Арнольда треба зупинити."
COR_nf_a021:0 "Навернені Легіони"
COR_nf_a021_desc:0 "Ті, кого ми навернули у свою віру, знають, яка доля чекає на них за Арнольда, і вони будуть боротися, щоб запобігти цьому."
COR_nf_a022:0 "Віддати Вогню Віри"
COR_nf_a022_desc:0 "Арнольд прагнув зупинити прогрес і залишити Церкву в темних віках. Усі сліди його хибних ідей мають бути спалені."
COR_nf_a023:0 "Одна Воля"
COR_nf_a023_desc:0 "Послідовники Роккі єдині духом і метою. Язичники всього світу приймуть світло Роккі або зустрінуть свою долю."
COR_nf_b001:0 "Міць Арнольда"
COR_nf_b001_desc:0 "Арнольд вразив незліченну кількість язичників своєю рукою. Він — приклад для наслідування для кожного молодого воїна, а його методи тренувань створюють найкращих воїнів."
COR_nf_b002:0 "«Хрускіт»"
COR_nf_b002_desc:0 "Можна вважати себе воїном, але «Хрускіт» показує, хто він насправді. Дехто нічого не знає про «Хрускіт», і він їх поховає."
COR_nf_b003:0 "Продовжувати Далі"
COR_nf_b003_desc:0 "Одного денного обходу «Хрускотом» недостатньо. Справжні воїни повинні повністю прийняти «Хрускіт»."
COR_nf_b004:0 "Погляд на Північ"
COR_nf_b004_desc:0 "Хоча «Хрускіт» відокремлює слабких від сильних, навіть сильні можуть бути повалені, якщо їх підштовхнути надто далеко."
COR_nf_b005:0 "Святкуйте нашу славу"
COR_nf_b005_desc:0 "Багато могутніх воїнів проявили себе у вирішальній битві. Їхні тріумфи будуть винагороджені."
COR_nf_b006:0 "Імпровізована зброя"
COR_nf_b006_desc:0 "У розпалі битви все, що може стати зброєю, має стати зброєю. Воїни Арнольда завжди повинні пам'ятати про це і битися всім, чим можуть."
COR_nf_b007:0 "Святі Точильні Камені"
COR_nf_b007_desc:0 "Воїн Арнольда повинен берегти свою зброю, адже це єдине, що стоїть між ним і смертю."
COR_nf_b008:0 "Лють Віри"
COR_nf_b008_desc:0 "Воїна Арнольда має турбувати лиш одне — смерть язичників."
COR_nf_b009:0 "Кам'яні Узи"
COR_nf_b009_desc:0 "Воїн Арнольда повинен битися за своїх побратимів Роккі. Брати на полі бою — найважливіше після Роккі."
COR_nf_b010:0 "Розділення Цибулини"
COR_nf_b010_desc:0 "Язичники Оніонберга відмовляються бачити світло Роккі. Арнольд змусить їх заплатити."
COR_nf_b011:0 "Плантації Цибулі"
COR_nf_b011_desc:0 "Якщо язичники люблять свою цибулю більше, ніж Роккі, вони будуть працювати на полях, поки їхні спини не зламаються."
COR_nf_b012:0 "Аграрна Мудрість"
COR_nf_b012_desc:0 "Любителі язичницької цибулі знають толк у використанні дарів землі Роккі. Можливо, вони заслуговують на милосердя."
COR_nf_b013:0 "Місцеві Чутки"
COR_nf_b013_desc:0 "У лісі на південь від Оніонберга ходять чутки про чудовисько, якого не може перемогти жодна людина."
COR_nf_b014:0 "Велике Полювання"
COR_nf_b014_desc:0 "Арнольд збере своїх воїнів, щоб знайти цього звіра і вбити його."
COR_nf_b015:0 "Небезпеки в Лісі"
COR_nf_b015_desc:0 "Ліси на півдні виявилися суворішими, ніж очікувалося."
COR_nf_b016:0 "Трофей Арнольда"
COR_nf_b016_desc:0 "Нарешті лісову істоту знайдено."
COR_nf_b017:0 "Пошуки Чудовиська"
COR_nf_b017_desc:0 "Ходять чутки, що цей монстр уміє говорити. Можливо, він зможе навчитися любити Роккі."
COR_nf_b018:0 "Зустріч із Чудовиськом"
COR_nf_b018_desc:0 "Монстра знайдено, тепер Арнольду належить поговорити з ним."
COR_nf_b019:0 "Найновіший воїн Роккі"
COR_nf_b019_desc:0 "Цей звір прийме світло Роккі і буде вбивати в його ім'я."
COR_nf_b020:0 "Завоювання Арнольда"
COR_nf_b020_desc:0 "Оскільки землі Оніонберга перейшли у володіння Церкви, Святий Камінчик високо оцінить роботу Арнольда."
COR_nf_b021:0 "Полум'я Ебігейл"
COR_nf_b021_desc:0 "Ебігейл здобула популярність, коли повела могутніх воїнів у бій із племенем смолоскипців — дикунів, що поклонялися вогню і жили через річку від нас."
COR_nf_b022:0 "Доля Смолоскипців"
COR_nf_b022_desc:0 "З їхніми селами, перетвореними на попіл, і народом — або наверненим, або знищеним — останні носії полум'я ховалися в бункері старого світу."
COR_nf_b023:0 "Культ Полум'я"
COR_nf_b023_desc:0 "Вогонь — ще один прояв волі Роккі. Шанування його не обов'язково є єрессю."
COR_nf_b024:0 "Запечатана Гробниця"
COR_nf_b024_desc:0 "Останні язичники, Смолоскипці, спостерігатимуть, як їхнє полум'я згасає, поки не вичерпається повітря."
COR_nf_b025:0 "Трофеї Битви"
COR_nf_b025_desc:0 "Повернувшись із завоювань, Ебігейл приносить унікальні дари."
COR_nf_b026:0 "Спалити Хранителів"
COR_nf_b026_desc:0 "Ті, хто вивчав створення полум'я, ставлять його вище Роккі. Тож нехай вони приймуть своє улюблене полум'я."
COR_nf_b027:0 "Прийняти Хранителів"
COR_nf_b027_desc:0 "Ті, хто вивчав створення вогню, можуть виявитися корисними. Їм буде дано зрозуміти, що полум'я — це лише прояв волі Роккі, а не божественна сила сама по собі."
COR_nf_b028:0 "Навернення Племен"
COR_nf_b028_desc:0 "Племена, які жили в страху перед Смолоскипцями, приймуть Роккі як свого спасителя."
COR_nf_b029:0 "Поневолення Племен"
COR_nf_b029_desc:0 "Племена, які жили в страху перед Смолоскипцями, визнають Роккі своїм господарем."
COR_nf_b030:0 "Незримі Сили"
COR_nf_b030_desc:0 "На південь від нас мешкають божевільні, що поклоняються невидимим силам, які не є Роккі! Ми покажемо їм, що воля Роккі понад усе!"
COR_nf_b031:0 "Милосердя Ебігейл"
COR_nf_b031_desc:0 "М'якший підхід Ебігейл до навернення у віру дозволив зменшити конфлікти з нещодавно підкореними язичниками, але чи справді щасливі язичники — це добре?"
COR_nf_b032:0 "Очисне Полум'я"
COR_nf_b032_desc:0 "Тільки одне чекає на язичника, який не бажає навертатися — гнів Роккі."
COR_nf_b033:0 "Потужні Інструменти"
COR_nf_b033_desc:0 "Зброя варварів Сили Лоренца вбила багатьох наших вірних зі смертельною точністю. Тепер вона наша."
COR_nf_b034:0 "Сила Роккі"
COR_nf_b034_desc:0 "Дослідники Сили Лоренца зрозуміють, що ця сила, про яку вони говорять, — лише черговий прояв волі Роккі."
COR_nf_b035:0 "М'яке Навернення"
COR_nf_b035_desc:0 "Ця магнітна сила, яку, здається, шанують ці люди, — не більше ніж чергове творіння Роккі. Їм просто потрібно це зрозуміти, і вони будуть вірні."
COR_nf_b036:0 "Інструмент Роккі"
COR_nf_b036_desc:0 "За допомогою вчених Лоренца ми одного разу відтворимо їхню могутню зброю і застосуємо її на службі Роккі."
COR_nf_b037:0 "Знищити Єресь"
COR_nf_b037_desc:0 "Якою б не була ця магнітна сила, вона не сильніша за Роккі. Спалити язичників, які відмовляються це прийняти."
COR_nf_b038:0 "Вилучити Єретичні Реліквії"
COR_nf_b038_desc:0 "Ці «гвинтівки Гауса» — знаряддя язичників. Ми обернемо їх проти нечестивих."
COR_nf_b039:0 "Поневолити Вчених"
COR_nf_b039_desc:0 "Вчені Лоренца, схоже, схильні забрати секрети своєї гаус-зброї з собою в могилу. Це не заважає нам змушувати їх працювати над іншими проєктами."
COR_nf_b040:0 "Завоювання Ебігейл"
COR_nf_b040_desc:0 "Коли Ебігейл повертається із завоювань на Заході, Святий Камінчик оцінює її успіхи."
COR_nf_c001:0 "Хрестовий Похід Триває"
COR_nf_c001_desc:0 "Наші армії готові, наші сварки вщухли. Ще кілька кроків, і ми повернемося до Священної Печери Роккі."
COR_nf_c002:0 "Вчення Арнольда"
COR_nf_c002_desc:0 "Арнольд більше, ніж просто воїн. Він священник, у якого є плани щодо Церкви."
COR_nf_c003:0 "Набір Відданих"
COR_nf_c003_desc:0 "Усі віддані сини й дочки Роккі повинні бути готові битися за його славу. Ті, хто виявить бажання, будуть покликані."
COR_nf_c004:0 "Пограбувати Язичників"
COR_nf_c004_desc:0 "Язичникам не можна довіряти зброю, і вони не заслуговують на багатство. Ми відберемо у них і те, і інше."
COR_nf_c005:0 "Примусове Навернення"
COR_nf_c005_desc:0 "Тих, хто відмовляється прийняти віру, необхідно змусити це зробити будь-якими необхідними засобами."
COR_nf_c006:0 "Далекі Хрестові Походи"
COR_nf_c006_desc:0 "Воїнам, які прагнуть принести світло Роккі в далекі куточки пусток, буде дозволено вирушити в чужі землі в славних хрестових походах."
COR_nf_c007:0 "Розтрощити Культ"
COR_nf_c007_desc:0 "Ще один сумний культ, що поклоняється прояву волі Роккі. Ми просвітимо ці заблукалі душі силою."
COR_nf_c008:0 "Даруй їм Поділ"
COR_nf_c008_desc:0 "Навіть побиті й напівмертві, деякі члени Культу Кобальту опираються."
COR_nf_c009:0 "Даруй їм Милість"
COR_nf_c009_desc:0 "Деякі з Кобальту тепер відкриті для наших слів, побачивши силу волі Роккі."
COR_nf_c010:0 "У Пагорби"
COR_nf_c010_desc:0 "Одна з останніх перешкод між нами та Ґрін-Маунтін — це гряда пагорбів, зайнята групою язичників. Але це ненадовго."
COR_nf_c011:0 "Вічні Пагорби"
COR_nf_c011_desc:0 "Головний рейнджер — символ для свого народу, який необхідно знищити, щоб люди змогли шанувати Роккі."
COR_nf_c012:0 "Честь Пагорбів"
COR_nf_c012_desc:0 "Головний рейнджер є символом для свого народу, який може змусити їх шанувати Роккі."
COR_nf_c013:0 "Останні Приготування"
COR_nf_c013_desc:0 "Шлях до Печер Роккі відкрито. Наш найлютіший ворог стоїть між нами та нашим домом. Ми зробимо останні приготування, перш ніж закінчити цю справу."
COR_nf_c014:0 "За Святу Землю"
COR_nf_c014_desc:0 "Язичники з Ґрін-Маунтін вигнали нас із дому, але тепер ми повернулися — готові втоптати їх у землю."
COR_nf_c015:0 "Вдалий Хрестовий Похід"
COR_nf_c015_desc:0 "Нам потрібно зробити останній ривок, щоб вигнати язичників Ґрін-Маунтіна з нашої землі."
COR_nf_c016:0 "Реформи Ебігейл"
COR_nf_c016_desc:0 "У той час як деякі вважають, що церква хороша такою, якою вона є, в Ебігейл є ідеї, як привести нашу віру в 2200-ті роки."
COR_nf_c017:0 "Стимулювати Набір"
COR_nf_c017_desc:0 "Багато язичників за своєю природою егоїстичні. Звернення до цієї натури через нагороди за навернення може відкрити їхні серця для світла Роккі."
COR_nf_c018:0 "Збройова Десятина"
COR_nf_c018_desc:0 "Ті, хто не бажає битися за Роккі, не потребують зброї, перебуваючи під захистом вірних. Ми змусимо їх передати свої знаряддя війни тим, хто вміє використовувати їх правильно."
COR_nf_c019:0 "Милосердні Навернення"
COR_nf_c019_desc:0 "Деякі язичники можуть довше за інших іти до світла Роккі. Головне — щоб зрештою вони прийшли. А якщо вони не зможуть, це вже інше питання."
COR_nf_c020:0 "Місіонерські Поїздки"
COR_nf_c020_desc:0 "Багато з вірних бажають вирушити в путь і поширити світло Роккі далеко і широко. Навіть якщо ми ще не готові підкорити землі язичників, вони можуть заснувати місії, щоб нести слово."
COR_nf_c021:0 "Перепрофілювання Фабрик"
COR_nf_c021_desc:0 "Виробничі потужності Ґрін-Маунтін будуть переобладнані для потреб священної військової машини."
COR_nf_c022:0 "Ріжучий Край"
COR_nf_c022_desc:0 "Арнольд вважає, що справжня зброя воїна — це клинок, молот або кайло, а не рушниця."
COR_nf_c023:0 "Димлячі Стволи"
COR_nf_c023_desc:0 "Ебігейл стверджує, що ефективність зброї важливіша за будь-яке символічне значення."
COR_nf_c024:0 "Найкращі Інструменти"
COR_nf_c024_desc:0 "Перші партії священних знарядь війни прибули з ливарних цехів."
COR_nf_c025:0 "Благословенні Рушниці"
COR_nf_c025_desc:0 "Освячена священниками зброя готова надійти в руки наших солдатів."
COR_nf_c026:0 "Заселити Пагорби"
COR_nf_c026_desc:0 "Пагорби навколо Печер Роккі — наш законний дім. Ми запросимо найблагочестивіших із наших людей, щоб заселити ці землі."
COR_nf_c027:0 "Розвиток Шахт"
COR_nf_c027_desc:0 "Шахти в цих пагорбах можуть дати безцінні для священної війни ресурси, їх просто потрібно трохи розвинути."
COR_nf_c028:0 "Розширення Зрошення"
COR_nf_c028_desc:0 "Доклавши необхідних зусиль, ми зможемо перемістити русла рік із цих священних гір, щоб вони могли краще служити вірним."
COR_nf_c029:0 "Печери для Фабрик"
COR_nf_c029_desc:0 "Багато печер у цих пагорбах досить великі, щоб вмістити майстерні."
COR_nf_c030:0 "Печери для Оборони"
COR_nf_c030_desc:0 "Багато печер у цих пагорбах можна було б переобладнати в укриття, щоб гарантувати, що нас більше ніколи не виженуть із цієї землі."
COR_nf_c031:0 "Повернення до Печер Роккі"
COR_nf_c031_desc:0 "Схоже, не всі, кого ми вважали загиблими під час Великого Виходу, насправді померли. Деякі з наших втрачених братів залишилися в Печерах Роккі."
COR_nf_c032:0 "Центр Нашого Поклоніння"
COR_nf_c032_desc:0 "Таке святе місце має служити постійним місцем поклоніння та паломництва."
COR_nf_c033:0 "Центр Нашого Гніву"
COR_nf_c033_desc:0 "Таке святе місце має стати центром нашої священної війни проти тих, хто відкидає світло Роккі."
COR_nf_c034:0 "Збір Пожертв"
COR_nf_c034_desc:0 "Паломників, що прямують до Печер Роккі, закликають жертвувати церкві посильну суму."
COR_nf_c035:0 "Священні Тренувальні Майданчики"
COR_nf_c035_desc:0 "Воїнам, які проходять підготовку в Печерах Роккі, постійно нагадують про важливість нашої справи. Тут немає місця лінощам."
COR_nf_c036:0 "Доля Язичників"
COR_nf_c036_desc:0 "Нам потрібно лише трохи більше зусиль, щоб зібрати останніх вцілілих язичників на землях навколо Печер Роккі."
COR_nf_c037:0 "Забиті до Останнього"
COR_nf_c037_desc:0 "За злочини своїх предків і опір нашому поверненню ці язичники будуть віддані смерті."
COR_nf_c038:0 "Останній Шанс"
COR_nf_c038_desc:0 "Тим, хто вижив на Ґрін-Маунтін, буде дано шанс прийняти Роккі — або загинути."
COR_nf_c039:0 "Нагородіть Гідних"
COR_nf_c039_desc:0 "З язичниками Ґрін-Маунтін покінчено, і тепер ми можемо переселити більше вірних на святу землю."
COR_nf_c040:0 "Нагородіть Корисних"
COR_nf_c040_desc:0 "Деякі з тих, хто з Ґрін-Маунтін прийняв світло Роккі, виявляються цінними знаряддями його волі."
COR_nf_c041:0 "Всі Дороги"
COR_nf_c041_desc:0 "Всі дороги на нашій землі в кінцевому підсумку приведуть в одне місце — Печери Роккі."
COR_nf_c042:0 "Прохід для Торговців"
COR_nf_c042_desc:0 "Торговці з земель язичників шукають безпечний прохід на нашу територію. Ми дозволимо їм продавати свої товари, але будемо уважно за ними спостерігати."
COR_nf_c043:0 "Уникай Негідних"
COR_nf_c043_desc:0 "Ми не допустимо, щоб торговці-язичники входили на нашу землю, не прийнявши спочатку Роккі."
COR_nf_c044:0 "Наслідки Комерції"
COR_nf_c044_desc:0 "Наш народ став дедалі більш матеріалістичним через цих торговців, але є й деякі переваги."
COR_nf_c045:0 "Самодостатні"
COR_nf_c045_desc:0 "Без згубного впливу зовнішніх торговців наш народ процвітає."
COR_nf_c046:0 "Сонце світить на Рокзантіум"
COR_nf_c046_desc:0 "З язичниками покінчено, землі заселені вірними, а вогні індустрії ревуть зі славною метою. Сонце сяє над нашою славною столицею, і це — лише початок."
COR_nf_d001:0 "Кігті Орла"
COR_nf_d001_desc:0 "Чорна броня зі сходу напала на нас! Кожна крапля пролитої крові роккіста буде помщена вдесятеро!"
COR_nf_d002:0 "Останній рубіж Отема"
COR_nf_d002_desc:0 "Полковник Отем привів свій Анклав до загибелі, але бився до кінця."
COR_nf_d003:0 "Темний Секрет Едема"
COR_nf_d003_desc:0 "Язичники з Анклаву виявилися більш підступними, ніж ми думали... чи все ж ні?"
COR_nf_d004:0 "Ікла Лева"
COR_nf_d004_desc:0 "Сталева броня зі сходу напала на нас! Кожна крапля пролитої крові роккіста буде помщена вдесятеро!"
COR_nf_d005:0 "Вбивство Левів"
COR_nf_d005_desc:0 "Ми проникли в лігво цих язичників і знайшли зброю, що підживлює хрестовий похід."
COR_nf_d006:0 "Столичні Язичники"
COR_nf_d006_desc:0 "Недалеко від наших кордонів лежить пустка, що прагне обіймів Роккі. Не змушуймо їх чекати надто довго."
COR_nf_d007:0 "Милосердя в Мегатонні"
COR_nf_d007_desc:0 "Мегатонна була місцем язичницької віри, не надто відмінної від Культу Кобальту. Ми вирішили показати їм помилковість їхніх шляхів мирно."
COR_nf_d008:0 "Різанина в Мегатонні"
COR_nf_d008_desc:0 "Мегатонна була місцем язичницької віри, не надто відмінної від Культу Кобальту. Ми вирішили показати їм помилковість їхніх шляхів."
COR_nf_d009:0 "Святиня Лемплайту"
COR_nf_d009_desc:0 "Ходять чутки, що місце, відоме як Печери Лемплайт, дуже схоже на нашу священну Печеру Роккі."
COR_nf_d010:0 "Прокляття диявола"
COR_nf_d010_desc:0 "Один загін воїнів зумів не тільки знищити наших ворогів з Анклаву, а й навчився використовувати їхню передову броню за захопленими книгами."
COR_nf_d011:0 "Заволодіти Проєктом «Чистота»"
COR_nf_d011_desc:0 "У Братства Сталі в руках був величезний водоочисник, за допомогою якого вони намагалися підкорити собі пустку. Тепер він схилить пустку до волі Роккі."
COR_nf_d012:0 "Приборкувачі Левів"
COR_nf_d012_desc:0 "Один загін воїнів зумів не тільки знищити наших ворогів із Братства, а й навчився використовувати їхню передову броню за захопленими книгами."
COR_nf_d013:0 "Розгойдати Човен"
COR_nf_d013_desc:0 "Одна з найсильніших язичницьких укріплень у цьому регіоні — Рівет-Сіті, де навіть стоїть церква хибної віри. Ми повинні зробити з них приклад."
COR_nf_d014:0 "Орди Полеглих"
COR_nf_d014_desc:0 "Багато могутніх армій знайшли свою смерть у Столичній Пустці. Схованки з їхньою зброєю всіяли землю — і тепер вони належать нам."
COR_nf_d015:0 "Пограбувати Лабораторії"
COR_nf_d015_desc:0 "У Рівет-Сіті та Цитаделі знаходилися цінні інструменти, які ми можемо перенести в наші власні лабораторії."
COR_nf_d016:0 "Нескінченний Хрестовий Похід"
COR_nf_d016_desc:0 "Ми далекі від завершення. Наші воїни продовжать битися, наші жерці — проповідувати, а наші кордони — розширюватися. Зрештою, всі пізнають любов Роккі."

###Ideas###
cor_the_bibble:0 "Біблія"
cor_the_bibble_desc:0 "Біблія, священна книга Церкви Роккі, є рушійною силою кожного рішення, що приймається членом цієї релігійної секти. Це веде до стабільного суспільства, але ускладнює пристосування до змін."
cor_convert_or_die:0 "Прийми віру або Помри"
cor_convert_or_die_desc:0 "Розширення Церкви Роккі рухає не жага земель чи ресурсів, а необхідність поширити слово їхнього бога. Полоненим і жителям підкорених земель дається простий вибір: увійти у світло Роккі — або померти. Деякі з радістю обирають перше, але чимало й тих, хто опирається самому факту вибору."
COR_penance_battalions_idea:0 "Батальйони покаяння"
COR_penance_battalions_idea_desc:0 "Ті, хто відкинув світло Роккі або впав у немилість від його благодаті, можуть знайти спасіння в служінні його волі. Єдина альтернатива — страта."
COR_pious_armies_idea:0 "Побожні армії"
COR_pious_armies_idea_desc:0 "Лише ті, хто тримає Роккі у своєму серці, гідні битися в його ім'я в цьому великому хрестовому поході."
COR_rockys_mighty_idea:0 "Міць Обраних Роккі"
COR_rockys_mighty_idea_desc:0 "Ми накопичували силу протягом багатьох років. Полум'я нашої індустрії живить могутні армії в їхній святій справі, поки наші лави продовжують зростати."
COR_arnolds_leadership_idea:0 "Лідерство Арнольда"
COR_arnolds_leadership_idea_desc:0 "Керівництво Церкви прийняло ідеологію Арнольда. Вплив цього більш суворого розуміння Біблії вже поширюється нашими землями."
COR_pebbles_leadership_idea:0 "Лідерство Святого Камінчика"
COR_pebbles_leadership_idea_desc:0 "Незважаючи на нещодавні невдоволення та занепокоєння, Святий Камінчик, як і раніше, залишається нашим орієнтиром."
COR_heretical_oversight_idea:0 "Рада з Єретичного Нагляду"
COR_heretical_oversight_idea_desc:0 "Досвідчені жерці та вчені ретельно вивчають будь-які нові документи, здобуті в язичників та єретиків, щоб зрозуміти, чи можна примирити їхні викривлені ідеї з нашою вірою."
COR_abigails_leadership_idea:0 "Лідерство Ебігейл"
COR_abigials_leadership_idea_desc:0 "Керівництво Церкви прийняло ідеологію Ебігейл. Вплив цього більш м'якого розуміння Біблії вже поширюється нашими землями."
COR_one_will_idea:0 "Одна Воля"
COR_one_will_idea_desc:0 "Із завершенням догматичних суперечок у нашій Церкві ми можемо знову зосередитися на поверненні до святої землі та поширенні слова Роккі."
COR_improvised_equipment_idea:0 "Імпровізована зброя"
COR_improvised_equipment_idea_desc:0 "Воїни Роккі вчаться битися всім, що трапиться їм під руку. Труби, леза від газонокосарки або навіть плазмова гвинтівка — все може бути використано для утвердження волі Роккі."
COR_maintained_equipment_idea:0 "Доглянута зброя"
COR_maintained_equipment_idea_desc:0 "Солдату краще стати майстром у володінні кількома видами зброї та стежити за їхньою справністю. Тоді він зможе з більшою ефективністю утверджувати волю Роккі."
COR_furious_warriors_idea:0 "Люті воїни"
COR_furious_warriors_idea_desc:0 "Воїни Роккі прагнуть лише до викорінення язичників. Вони б'ються з лютою відданістю і серцем, твердим як камінь."
COR_warrior_brotherhood_idea:0 "Братство Воїнів"
COR_warrior_brotherhood_idea_desc:0 "Воїни Роккі знають, що на полі битви вони повинні покладатися один на одного. Ці воїни формують міцні узи і б'ються з більшою силою."
COR_loz_researchers_idea:0 "Вчені Лоренца"
COR_loz_researchers_idea_desc:0 "Незважаючи на своє язичництво, ці дослідники багато знають про сили, які явно є вимірюваними проявами волі Роккі. Було б нерозумно не дозволити їм розповісти більше."
COR_foreign_crusades_idea:0 "Далекі Хрестові Походи"
COR_foreign_crusades_idea_desc:0 "Воїни та офіцери, які проявили великий потенціал, отримують можливість розпочати власні обмежені хрестові походи в далекі землі. Повертаються не всі, але ті, хто повертається, приносять славу та мудрість."
COR_incentivized_conversion_idea:0 "Стимульоване навернення"
COR_incentivized_conversion_idea_desc:0 "Ми скористаємося жадібністю єретика, щоб зруйнувати перешкоди навколо його серця — аби він впустив світло Роккі."
COR_mission_trips_idea:0 "Місіонерські поїздки"
COR_mission_trips_idea_desc:0 "Деякі жерці та воїни будуть обрані для місіонерських подорожей за межі наших кордонів. Там вони здобудуть прихильність місцевих жителів і поширять слово Роккі. Навернені будуть покликані назад — на батьківщину, де їм і місце."
COR_melee_focus_idea:0 "Фокус на зброї ближнього бою"
COR_melee_focus_idea_desc:0 "Той самий молот, що розтрощує могутній камінь, може завдати нечуваної шкоди черепу язичника."
COR_gun_focus_idea:0 "Фокус на балістичній зброї"
COR_gun_focus_idea_desc:0 "Кидатися сліпо на язичників із вогнепальною зброєю, маючи лише молота — справа для того, хто дурніший за кротокриса."
COR_rocky_caverns_cathedral_idea:0 "Собор Печери Роккі"
COR_rocky_caverns_cathedral_idea_desc:0 "Священні Печери Роккі були перетворені на центр поклоніння та паломництва."
COR_rocky_caverns_crusader_base_idea:0 "Цитадель хрестоносців у Печерах Роккі"
COR_rocky_caverns_crusader_base_idea_desc:0 "Священні Печери Роккі були перетворені на серце нашої військової могутності. Звідси ми плануємо наш хрестовий похід по всьому світу."
COR_rocky_caverns_cathedral_2_idea:0 "Собор Печери Роккі"
COR_rocky_caverns_cathedral_2_idea_desc:0 "Священні Печери Роккі були перетворені на центр поклоніння та паломництва."
COR_rocky_caverns_crusader_base_2_idea:0 "Цитадель хрестоносців у Печерах Роккі"
COR_rocky_caverns_crusader_base_2_idea_desc:0 "Священні Печери Роккі були перетворені на серце нашої військової могутності. Звідси ми плануємо наш хрестовий похід по всьому світу."
COR_growing_materialism_idea:0 "Зростаючий матеріалізм"
COR_growing_materialism_idea_desc:0 "Допуск зовнішніх торговців на нашу землю несе як добрі, так і згубні наслідки."
COR_self_sufficient_idea:0 "Самодостатні люди"
COR_self_sufficient_idea_desc:0 "Нам не потрібен згубний вплив зовнішніх торговців. У нас є все, що нам потрібно."
COR_endless_crusade_idea:0 "Нескінченний Хрестовий Похід"
COR_endless_crusade_idea_desc:0 "Наш хрестовий похід не має кінця. Хоча ми нарешті повернулися до святої землі і вигнали найбільші загрози з цього боку Америки, ми ще не завершили шлях. Наше завдання не буде виконано, доки світло Роккі не осяє кожен куточок земної кулі. Rockus Vult."
COR_enclave_war_idea:0 "Об'єднані проти Анклаву"
COR_enclave_war_idea_desc:0 "Останній подих мертвого світу вважає себе сильним — здатним знищити наш народ, нашу віру. Але вони не розуміють, якою б передовою не була їхня зброя та броня, все це тьмяніє перед могутністю нашого Господа Роккі!"
COR_enclave_war_ai_idea:0 "Та ні, ми переможемо"
COR_enclave_war_ai_idea_desc:0 "На папері ваша армія Анклаву сильніша, у неї є все, чого немає в нас: ресурси, техніка, влада. Але давай перейдемо до Схватки, язичнику, і подивимося, чи має це значення. Гарантую — не має."
COR_brotherhood_war_idea:0 "Камінь б'є Сталь"
COR_brotherhood_war_idea_desc:0 "Ці культисти думають, що здатні перемогти обраних Роккі. Невже вони не знають, що ми знищили незліченні культи, щоб дійти до сьогоднішнього дня? Їхнє поклоніння технології стане лише ще однією язичницькою вірою, приреченою на забуття."
COR_brotherhood_war_ai_idea:0 "Камінь б'є Сталь"
COR_brotherhood_war_ai_idea_desc:0 "Ці культисти думають, що здатні перемогти обраних Роккі. Невже вони не знають, що ми знищили незліченні культи, щоб дійти до сьогоднішнього дня? Їхнє поклоніння технології стане лише ще однією язичницькою вірою, приреченою на забуття."
COR_rockys_gift_of_water_ww_idea:0 "Роккі наказує наливати!"
COR_rockys_gift_of_water_ww_idea_desc:0 "Роккалатія 21:6. Я є альфа і омега. Заснований і ганебний. Я дам йому ковток цієї води. Слава Роккі."
COR_rockys_gift_of_water_idea:0 "Жива Вода"
COR_rockys_gift_of_water_idea_desc:0 "Господь Роккі зволив дарувати нам майже безмежне джерело чистої питної води. З цією водою ми можемо довести нашу божественну перевагу і легше відкрити серця інших для світла Роккі."
COR_cleaning_water_idea:0 "Очищення Води"
COR_cleaning_water_idea_desc:0 "Язичники з Анклаву отруїли цей очищувач води. Якщо ми хочемо використовувати його, нам доведеться витратити час, щоб зрозуміти, як видалити отруту. На щастя, ми захопили деяких із тих, хто це зробив."
COR_arnolds_teachings_idea:0 "Вчення Арнольда"
COR_arnolds_teachings_idea_desc:0 "Арнольд дарував нам нову порцію своєї мудрості у справі підготовки воїнів, виклавши її в просторому сувої. Настанова поширюється по всіх наших землях."
COR_abigails_teachings_idea:0 "Вчення Ебігейл"
COR_abigails_teachings_idea_desc:0 "Ебігейл дарувала нам нову порцію своєї мудрості в наверненні язичників, виклавши її в просторому сувої. Цей мануал поширюється серед жерців по всіх наших землях."
COR_studying_heathens_idea:0 "Вивчення Язичницьких Текстів"
COR_studying_heathens_idea_desc:0 "Всупереч нашому кращому судженню, ми вивчаємо документи, знайдені в язичницьких поселеннях. У прагненні пізнати язичника, щоб краще навернути його, ми часом відкриваємо знання, що мають наукове застосування."
COR_rocky_inquisition_idea:0 "Інквізиція Роккі"
COR_rocky_inquisition_idea_desc:0 "Ніхто не чекає, що Інквізиція Роккі постукає в їхні двері. Але коли це трапляється — все буде осяяно світлом Роккі. Язичники будуть судимі разом із тими, хто їм допомагав."

###Tooltips###
COR_tt_1:0 "Це трохи відрізняється від волі Роккі"
COR_tt_2:0 "Це відповідає волі Роккі"
COR_tt_3:0 "Це відрізняється від волі Роккі"
COR_tt_4:0 "Це сильно відрізняється від волі Роккі"
COR_tt_5:0 "Це повністю відповідає волі Роккі"
COR_tt_6:0 "Це суворо відповідає волі Роккі"
COR_tt_7:0 "Віруючі прислухаються до заклику Арнольда!"
COR_tt_8:0 "Навернені прислухаються до заклику Ебігейл!"
COR_tt_9:0 "Язичникам буде дозволено сповідувати свою віру, поки вони служать нам"
COR_tt_10:0 "Розблокує рішення, що дозволяють насильно змусити завойовані поселення прийняти нашу віру"
COR_tt_11:0 "Розблокує рішення для закріплення в нещодавно завойованих поселеннях і мирного навернення населення"
COR_tt_12:0 "Деякі з навернених нами виявилися корисними!"
COR_tt_13:0 "Ці могутні воїни є прикладом для всіх нас!"
COR_tt_14:0 "Відкриває механіку балансу сил для управління вірою"
COR_tt_15:0 "Приєднатися до повстання Арнольда проти єретичного керівництва"
COR_tt_16:0 "Приєднатися до повстання Ебігейл проти єретичного керівництва"
COR_tt_17:0 "Ебігейл збирає прихильників проти нас!"
COR_tt_18:0 "Арнольд збирає прихильників проти нас!"
COR_tt_19:0 "Хто знає, як це вплине на полювання?"
COR_tt_20:0 "Вони, можливо, й не могутні, але їх багато"
COR_tt_21:0 "Через 30 днів у цьому регіоні стане на кілька язичників менше, і він опиниться ще ближче до Роккі."
COR_tt_22:0 "Можливо, це займе більше часу, ніж хотілося б деяким, але ми виправимо розум цих язичників."
COR_tt_23:0 "По всій нашій землі буде побудована мережа доріг, що ведуть до Печери Роккі."
COR_tt_24:0 "Тепер місцеві жителі двічі подумають, перш ніж виступати проти нас."

