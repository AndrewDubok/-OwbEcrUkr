###Balance of Power###
COR_dogmatic_adherence:0 "Догматична прихильність"
COR_no_dogmatic_adherence:0 "Ледве слідують Біблії"
COR_firm_dogmatic_adherence:0 "Живуть Біблією"
COR_dogmatic_adherence_category:0 "Догматична прихильність"
COR_almost_no_dogmatic_adherence:0 "Біблія — це просто книга"
COR_almost_no_dogmatic_adherence_desc:0 "Наші поступки язичникам і єретикам підірвали основи нашої віри. Сторонні можуть бути задоволені, але істинно віруючі в люті від дій нинішнього керівництва."
COR_very_little_dogmatic_adherence:0 "Біблія сповнена вад"
COR_very_little_dogmatic_adherence_desc:0 "Ми продовжуємо йти на поступки та компроміси з тими, хто уникає світла Роккі. Так більше не може тривати, якщо ми хочемо зберегти нашу віру."
COR_low_dogmatic_adherence:0 "Біблія дедалі частіше піддається сумніву"
COR_low_dogmatic_adherence_desc:0 "Ми пішли на численні компроміси з язичниками та чужинцями. Хоча основні принципи нашої віри залишаються непохитними, деякі побоюються, що ми стали на шлях, який може призвести до біди."
COR_strong_dogmatic_adherence:0 "Біблія — це закон"
COR_strong_dogmatic_adherence_desc:0 "На землях, підконтрольних нашій Церкві, кожен віруючий знає, що Біблія тверда, як найміцніший камінь. Дотримання її вчень і віри суворо контролюється, і лише одна доля чекає на тих, хто відкидає світло Роккі."
COR_moderate_dogmatic_adherence:0 "Біблія ясна"
COR_moderate_dogmatic_adherence_desc:0 "Згодні з цим язичники чи ні, воля Роккі ясна. На наших землях ця воля виконується. З тими, хто противиться їй, чинять відповідно."
COR_reasonable_dogmatic_adherence:0 "Біблія — наш провідник"
COR_reasonable_dogmatic_adherence_desc:0 "Деякі буквальні тлумачення Біблії не розкривають усієї правди про наш світ. Священникам і вченим доводиться інтерпретувати більш метафоричні аспекти книги, щоб наш народ зрозумів заповіт Роккі."
COR_some_dogmatic_adherence:0 "Біблія недосконала"
COR_some_dogmatic_adherence_desc:0 "Біблія, можливо, найважливіший документ із будь-коли створених, але це не означає, що вона досконала. У міру того, як ми дізнаємося більше про навколишній світ, деякі питання, порушені в Біблії, отримують відповіді."

###Characters###
COR_saint_pebble_NAME:0 "Святий Камінчик"
COR_saint_pebble_desc:0 "Святий Камінчик — останній із довгої череди релігійних лідерів, які прийняли титул Святого в Церкві Роккі. В останні роки він веде свій народ у завоюваннях малих племен і поселень навколо, нарощуючи силу з наміром повернути втрачені святі землі — Печери Роккі."
COR_arnold_NAME:0 "Кардинал Арнольд"
COR_arnold_desc:0 "Кардинал Арнольд — воїн-священник, який очолив незліченні напади на сусідні села та поселення. Затятий традиціоналіст, він відкидає будь-які ідеї компромісу з язичниками і прагне знищити всіх, хто не приймає слово Роккі."
COR_abigail_NAME:0 "Кардинал Ебігейл"
COR_abigail_desc:0 "Кардинал Ебігейл — воїн-священниця, яка прославилася після розгрому племені вогнепоклонників, озброєних довоєнними вогнеметами. На відміну від багатьох своїх соратників, вона вважає, що деякі язичницькі вірування — це лише невинні викривлені уявлення про світ Роккі. Ебігейл прагне спочатку виправити їхні помилки, а вже потім — усунути тих, хто не здатний змінитися."
COR_stephen_savage_name:0 "Стівен Севідж"
COR_cardinal_goatlord_NAME:0 "Козловод"
COR_russo_boxer_name:0 "Руссо Боксер"
COR_wyatt_hitch_name:0 "Ваятт Гітч"
COR_calvin_maxwell_name:0 "Келвін Максвелл"
COR_abe_hogan_name:0 "Ейб Гоган"
COR_roach_name:0 "Вчений Роуч"
COR_schutz_name:0 "Вчений Шутц"
COR_jenkins_name:0 "Торговець Дженкінс"
COR_pash_name:0 "Паш"
COR_rivers_name:0 "Джейсон Ріверс"
COR_gerald_dawkson_name:0 "Джеральд Доксон"
COR_spida_name:0 "Спайдер"
COR_kong_name:0 "Старий Конг"
COR_phelps_name:0 "Інквізитор Фелпс"
COR_troy_name:0 "Трой Вотерсон"
COR_buck_name:0 "Бак Марінер"
COR_cardinal_praxton_name:0 "Кардинал Пракстон"
COR_tone_name:0 "Капітан порома Тон-І"
COR_potsdam_name:0 "Крістофер Потсдам"
COR_head_ranger_name:0 "Головний Рейнджер"
