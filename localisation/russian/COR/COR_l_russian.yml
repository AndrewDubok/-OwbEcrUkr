FOCUS_FILTER_ECR_ROCKY:0 "Традиционные Ценности"
FOCUS_FILTER_ECR_ROCKY_REFORM:0 "Реформирование Веры"

###Flags###
COR_arnold_killed_flag:0 "Арнольд был убит"
COR_abigail_killed_flag:0 "Эбигейл была убита"

###Focuses### 
COR_nf_a001:0 "Избранные Рокки"
COR_nf_a001_desc:0 "История нашего народа начинается с избранных, что укрылись в святых пещерах."
COR_nf_a002:0 "Враг Рокки"
COR_nf_a002_desc:0 "Наши предки были не единственными, кто пережил ужасы Великой Войны, и они столкнулись с яростью язычников."
COR_nf_a003:0 "Новый Дом Рокки"
COR_nf_a003_desc:0 "Язычники изгнали наших предков из священных пещер, и нам пришлось искать новый дом."
COR_nf_a004:0 "Новый Пророк Рокки"
COR_nf_a004_desc:0 "С уходом предыдущего святого, новый святой обещает лучшее будущее нашему народу."
COR_nf_a005:0 "Воины Рокки"
COR_nf_a005_desc:0 "Два самых могущественных поборника Рокки по-разному трактуют его волю."
COR_nf_a006:0 "Развитие Сил"
COR_nf_a006_desc:0 "Если мы хотим вернуть себе нашу святую землю, нам нужно будет укрепить свои силы."
COR_nf_a007:0 "Заполнение Мастерских"
COR_nf_a007_desc:0 "Языческие рабы будут производить орудия для наших славных завоеваний."
COR_nf_a008:0 "Поиск Сборщиков"
COR_nf_a008_desc:0 "Язычники потащат обломки старого мира, чтобы мы могли их восстановить."
COR_nf_a009:0 "Каменные Стены"
COR_nf_a009_desc:0 "Могучие стены, окружающие наш дом, будут символом нашей решимости."
COR_nf_a010:0 "Батальоны Покаяния"
COR_nf_a010_desc:0 "Язычники могут искупить свои недостатки, исполняя волю Рокки."
COR_nf_a011:0 "Благочестивые Армии"
COR_nf_a011_desc:0 "Только те, кто хранит Рокки в своем сердце, достойны сражаться во имя его."
COR_nf_a012:0 "Могущество Рокки"
COR_nf_a012_desc:0 "Наши бойцы как никогда готовы исполнить волю Рокки. Язычники содрогнутся при звуке нашего приближения."
COR_nf_a013:0 "Треснувшие Убеждения"
COR_nf_a013_desc:0 "Догматический раскол между Эбигейл и Арнольдом должен быть урегулирован Святым Пеббл."
COR_nf_a014:0 "Ярость Арнольда"
COR_nf_a014_desc:0 "Святой Пеббл сбился с пути, и Арнольду предстоит повести Рокистов к новому будущему."
COR_nf_a015:0 "Зов для Верных"
COR_nf_a015_desc:0 "Те, кто знает, что Эбигейл и Пеббл — еретики, возьмутся за оружие ради нашего правого дела!"
COR_nf_a016:0 "Судьба Еретиков"
COR_nf_a016_desc:0 "Для тех, кто отвернулся от света Рокки, может быть только одна судьба."
COR_nf_a017:0 "Более Холодные Головы"
COR_nf_a017_desc:0 "Решение этой проблемы состоит не в том, чтобы рокисты убивали друг друга, а в том, чтобы достичь взаимопонимания."
COR_nf_a018:0 "Еретический Надзор"
COR_nf_a018_desc:0 "Только тем, кто хорошо разбирается в Библии и окутан светом Рокки, можно доверять чтение еретических документов."
COR_nf_a019:0 "Закрытый Раскол"
COR_nf_a019_desc:0 "Разногласия между нашими величайшими воинами преодолены. Путь вперёд пройдут все верные Рокки вместе."
COR_nf_a020:0 "Ярость Эбигейл"
COR_nf_a020_desc:0 "Святой Пеббл показал себя глупцом, способным привести Церковь к краху. Его и Арнольда нужно остановить."
COR_nf_a021:0 "Обращенные Легионы"
COR_nf_a021_desc:0 "Те, кого мы обратили в свою веру, знают, какая судьба ждет их при Арнольде, и они будут бороться, чтобы предотвратить это."
COR_nf_a022:0 "Придать Огню Веры"
COR_nf_a022_desc:0 "Арнольд стремился остановить прогресс и оставить Церковь в тёмных веках. Все следы его порочных идей должны быть сожжены."
COR_nf_a023:0 "Одна Воля"
COR_nf_a023_desc:0 "Последователи Рокки едины духом и целью. Язычники всего мира примут свет Рокки или встретят свою судьбу."
COR_nf_b001:0 "Мощь Арнольда"
COR_nf_b001_desc:0 "Арнольд сразил бесчисленное количество язычников своей рукой. Он — пример для подражания для каждого молодого воина, а его методы тренировок создают лучших воинов."
COR_nf_b002:0 "«Хруст»"
COR_nf_b002_desc:0 "Можно считать себя воином, но «Хруст» показывает, кто он на самом деле. Некоторые ничего не знают о «Хруст», и он их погребёт."
COR_nf_b003:0 "Продолжать Дальше"
COR_nf_b003_desc:0 "Одного дневного обхода вокруг Хруста недостаточно. Истинные воины должны полностью принять Хруст."
COR_nf_b004:0 "Взгляд на Север"
COR_nf_b004_desc:0 "Хотя Хруста отделяет слабых от сильных, даже сильные могут быть повержены, если их подтолкнуть слишком далеко."
COR_nf_b005:0 "Празднуйте нашу славу"
COR_nf_b005_desc:0 "Многие могучие воины проявили себя в решающей битве. Их триумфы будут вознаграждены."
COR_nf_b006:0 "Импровизированное Оружие"
COR_nf_b006_desc:0 "В разгаре битвы всё, что может стать оружием, должно стать оружием. Воины Арнольда всегда должны помнить об этом и сражаться всем, чем могут."
COR_nf_b007:0 "Святые Точильные Камни"
COR_nf_b007_desc:0 "Воин Арнольда должен беречь свое оружие, ведь это единственное, что стоит между ним и смертью."
COR_nf_b008:0 "Свирепость Веры"
COR_nf_b008_desc:0 "Воина Арнольда должно заботить лишь одно — смерть язычников."
COR_nf_b009:0 "Каменные Узы"
COR_nf_b009_desc:0 "Воин Арнольда должен сражаться за своих собратьев Рокки. Братья на поле боя — самое важное после Рокки."
COR_nf_b010:0 "Разделение Лука"
COR_nf_b010_desc:0 "Язычники Онионбурга отказываются видеть свет Рокки. Арнольд заставит их заплатить."
COR_nf_b011:0 "Плантации Ониона"
COR_nf_b011_desc:0 "Если язычники любят свой лук больше, чем Рокки, они будут работать на полях до тех пор, пока их спины не сломаются."
COR_nf_b012:0 "Аграрная Мудрость"
COR_nf_b012_desc:0 "Любители языческого лука знают толк в использовании даров земли Рокки. Возможно, они заслуживают милосердия."
COR_nf_b013:0 "Местные Слухи"
COR_nf_b013_desc:0 "В лесу к югу от Онионбурга ходят слухи о чудовище, которого не может победить ни один человек."
COR_nf_b014:0 "Великая Охота"
COR_nf_b014_desc:0 "Арнольд соберет своих воинов, чтобы найти этого зверя и убить его."
COR_nf_b015:0 "Опасности в Лесу"
COR_nf_b015_desc:0 "Леса на юге оказались более суровыми, чем ожидалось."
COR_nf_b016:0 "Трофей Арнольда"
COR_nf_b016_desc:0 "Наконец-то лесное существо найдено."
COR_nf_b017:0 "Поиски Чудовища"
COR_nf_b017_desc:0 "Ходят слухи, что этот монстр умеет говорить. Возможно, он сможет научиться любить Рокки."
COR_nf_b018:0 "Встреча с Чудовищем"
COR_nf_b018_desc:0 "Монстр найден, теперь Арнольду предстоит поговорить с ним."
COR_nf_b019:0 "Новейший воин Рокки"
COR_nf_b019_desc:0 "Этот зверь примет свет Рокки и будет убивать во имя его."
COR_nf_b020:0 "Завоевания Арнольда"
COR_nf_b020_desc:0 "Поскольку земли Онионбурга перешли во владение Церкви, Святой Пеббл высоко оценит работу Арнольда."
COR_nf_b021:0 "Пламя Эбигейл"
COR_nf_b021_desc:0 "Эбигейл обрела известность, когда повела могучих воинов в бой с племенем факелоносцев — дикарей, поклонявшихся огню и живших через реку от нас."
COR_nf_b022:0 "Судьба Факелоносцев"
COR_nf_b022_desc:0 "С их деревнями, обращёнными в пепел, и народом — либо обращённым, либо уничтоженным — последние носители пламени прятались в бункере старого мира."
COR_nf_b023:0 "Культ Пламени"
COR_nf_b023_desc:0 "Огонь — ещё одно проявление воли Рокки. Почитание его не обязательно является ересью."
COR_nf_b024:0 "Запечатанная Гробница"
COR_nf_b024_desc:0 "Последние язычники, Факелоносцы, будут наблюдать, как их огонь угасает пока не иссякнет воздух."
COR_nf_b025:0 "Трофеи Битвы"
COR_nf_b025_desc:0 "Вернувшись с завоеваний, Эбигейл приносит уникальные дары."
COR_nf_b026:0 "Сжечь Хранителей"
COR_nf_b026_desc:0 "Те, кто изучал создание пламени, ставят его выше Рокки. Так пусть же они примут свое любимое пламя."
COR_nf_b027:0 "Принять Хранителей"
COR_nf_b027_desc:0 "Те, кто изучал создание огня, могут оказаться полезными. Им будет дано понять, что пламя, это лишь проявление воли Рокки, а не божественная сила само по себе."
COR_nf_b028:0 "Обращение Племён"
COR_nf_b028_desc:0 "Племена, которые жили в страхе перед Факелоносцами, примут Рокки как своего спасителя."
COR_nf_b029:0 "Порабощение Племён"
COR_nf_b029_desc:0 "Племена, которые жили в страхе перед Факелоносцами, признают Рокки своим хозяином."
COR_nf_b030:0 "Незримые Силы"
COR_nf_b030_desc:0 "К югу от нас обитают безумцы, поклоняющиеся невидимым силам, которые не являются Рокки! Мы покажем им, что воля Рокки превыше всего!"
COR_nf_b031:0 "Милосердие Эбигейл"
COR_nf_b031_desc:0 "Более мягкий подход Эбигейл к обращению в веру позволил уменьшить конфликты с недавно покоренными язычниками, но действительно ли счастливые язычники — это хорошо?"
COR_nf_b032:0 "Очищающее Пламя"
COR_nf_b032_desc:0 "Только одно ждет язычника, который не желает обращаться в веру — гнев Рокки."
COR_nf_b033:0 "Мощные Инструменты"
COR_nf_b033_desc:0 "Оружие варваров Сил Лоренца убило многих наших верующих с убийственной точностью. Теперь оно наше."
COR_nf_b034:0 "Сила Рокки"
COR_nf_b034_desc:0 "Исследователи Сил Лоренца поймут, что эта сила, о которой они говорят, — всего лишь еще одно проявление воли Рокки."
COR_nf_b035:0 "Мягкое Обращение"
COR_nf_b035_desc:0 "Эта магнетическая сила, которую, похоже, почитают эти люди, — не более чем очередное творение Рокки. Им просто нужно это понять, и они будут верны."
COR_nf_b036:0 "Инструмент Рокки"
COR_nf_b036_desc:0 "С помощью ученых Лоренца мы однажды воссоздадим их могущественное оружие и применим его на службе Рокки."
COR_nf_b037:0 "Уничтожить Ересь"
COR_nf_b037_desc:0 "Какова бы ни была эта магнитная сила, она не сильнее Рокки. Сжечь язычников, которые отказываются это принять."
COR_nf_b038:0 "Изъять Еретические Реликвии"
COR_nf_b038_desc:0 "Эти «винтовки Гаусса» — орудия язычников. Мы обратим их против нечестивых."
COR_nf_b039:0 "Поработить Учёных"
COR_nf_b039_desc:0 "Учёные Лоренца, похоже, склонны унести секреты своего гаусс-оружия с собой в могилу. Это не мешает нам навязывать им другие проекты."
COR_nf_b040:0 "Завоевания Эбигейл"
COR_nf_b040_desc:0 "Когда Эбигейл возвращается после завоеваний на Западе, Святой Пеббл высоко оценивает ее успехи."
COR_nf_c001:0 "Крестовый Поход Продолжается"
COR_nf_c001_desc:0 "Наши армии готовы, наши ссоры улажены. Еще несколько шагов, и мы вернемся к Священной Пещере Рокки."
COR_nf_c002:0 "Учения Арнольда"
COR_nf_c002_desc:0 "Арнольд больше, чем просто воин. Он священник, у которого есть планы относительно Церкви."
COR_nf_c003:0 "Набор Преданных"
COR_nf_c003_desc:0 "Все преданные сыновья и дочери Рокки должны быть готовы сражаться за его славу. Те, кто выразят желание, будут призваны."
COR_nf_c004:0 "Разграбить Язычников"
COR_nf_c004_desc:0 "Язычникам нельзя доверять оружие, и они не заслуживают богатства. Мы отнимем у них и то, и другое."
COR_nf_c005:0 "Принудительное Обращение"
COR_nf_c005_desc:0 "Тех, кто отказывается принять веру, необходимо заставить сделать это любыми необходимыми средствами."
COR_nf_c006:0 "Далекие Крестовые Походы"
COR_nf_c006_desc:0 "Воинам, жаждущим принести свет Рокки в дальние уголки пустошей, будет позволено отправиться в чужие земли в славных крестовых походах."
COR_nf_c007:0 "Сокрушить Культ"
COR_nf_c007_desc:0 "Еще один печальный культ, поклоняющийся проявлению воли Рокки. Мы просветим эти заблудшие души силой."
COR_nf_c008:0 "Даруй им Деление"
COR_nf_c008_desc:0 "Даже избитые и полумёртвые, некоторые члены Культа Кобальта сопротивляются."
COR_nf_c009:0 "Даруй им Милость"
COR_nf_c009_desc:0 "Некоторые из Кобальта теперь открыты для наших слов, увидев силу воли Рокки."
COR_nf_c010:0 "В Холмы"
COR_nf_c010_desc:0 "Одно из последних препятствий между нами и Грин-Маунтин — это гряда холмов, занимаемая группой язычников. Но это ненадолго."
COR_nf_c011:0 "Вечные Холмы"
COR_nf_c011_desc:0 "Главный рейнджер — символ для его народа, который необходимо уничтожить, чтобы люди смогли почитать Рокки."
COR_nf_c012:0 "Честь Холмов"
COR_nf_c012_desc:0 "Главный рейнджер является символом для своего народа, который может заставить их почитать Рокки."
COR_nf_c013:0 "Последние Приготовления"
COR_nf_c013_desc:0 "Путь к Пещерам Рокки открыт. Наш злейший враг стоит между нами и нашим домом. Мы сделаем последние приготовления, прежде чем закончить это дело."
COR_nf_c014:0 "За Святую Землю"
COR_nf_c014_desc:0 "Язычники с Грин-Маунтин изгнали нас из дома, но теперь мы вернулись — готовы втоптать их в землю."
COR_nf_c015:0 "Удачный Крестовый Поход"
COR_nf_c015_desc:0 "Нам необходимо сделать последний рывок, чтобы изгнать язычников Грин-Маунтина с нашей земли."
COR_nf_c016:0 "Реформы Эбигейл"
COR_nf_c016_desc:0 "В то время как некоторые считают, что церковь хороша такой, какая она есть, у Эбигейл есть идеи, как привести нашу веру в 2200-е годы."
COR_nf_c017:0 "Стимулировать Набор"
COR_nf_c017_desc:0 "Многие язычники по своей природе эгоистичны. Обращение к этой натуре через награды за обращение может открыть их сердца для света Рокки."
COR_nf_c018:0 "Оружейная Десятина"
COR_nf_c018_desc:0 "Те, кто не желает сражаться за Рокки, не нуждаются в оружии, находясь под защитой верных. Мы заставим их передать свои орудия войны тем, кто умеет использовать их правильно."
COR_nf_c019:0 "Милосердные Обращения"
COR_nf_c019_desc:0 "Некоторые язычники могут дольше других идти к свету Рокки. Главное — чтобы в конце концов они пришли. А если они не смогут, это уже другой вопрос."
COR_nf_c020:0 "Миссионерские Поездки"
COR_nf_c020_desc:0 "Многие из верных желают отправиться в путь и распространить свет Рокки далеко и широко. Даже если мы ещё не готовы покорить земли язычников, они могут основать миссии, чтобы нести слово."
COR_nf_c021:0 "Перепрофилирование Фабрик"
COR_nf_c021_desc:0 "Производственные мощности Грин-Маунтин будут переоборудованы для нужд священной военной машины."
COR_nf_c022:0 "Режущий Край"
COR_nf_c022_desc:0 "Арнольд считает, что истинное оружие воина — это клинок, молот или кирка, а не ружье."
COR_nf_c023:0 "Дымящиеся Стволы"
COR_nf_c023_desc:0 "Эбигейл утверждает, что эффективность оружия важнее любого символического значения."
COR_nf_c024:0 "Лучшие Инструменты"
COR_nf_c024_desc:0 "Первые партии священных орудий войны прибыли из литейных цехов."
COR_nf_c025:0 "Благословлённые Ружья"
COR_nf_c025_desc:0 "Освященное священниками оружие готово поступить в руки наших солдат."
COR_nf_c026:0 "Заселить Холмы"
COR_nf_c026_desc:0 "Холмы вокруг Пещер Рокки — наш законный дом. Мы пригласим самых благочестивых из наших людей, чтобы заселить эти земли."
COR_nf_c027:0 "Развитие Шахт"
COR_nf_c027_desc:0 "Шахты в этих холмах могут дать бесценные для священной войны ресурсы, их просто нужно немного развить."
COR_nf_c028:0 "Расширение Орошения"
COR_nf_c028_desc:0 "Приложив необходимые усилия, мы сможем переместить русла рек с этих священных гор, чтобы они могли лучше служить верующим."
COR_nf_c029:0 "Пещеры для Фабрик"
COR_nf_c029_desc:0 "Многие пещеры в этих холмах достаточно велики, чтобы вместить мастерские."
COR_nf_c030:0 "Пещеры для Обороны"
COR_nf_c030_desc:0 "Многие пещеры в этих холмах можно было бы переоборудовать в убежища, чтобы гарантировать, что нас больше никогда не выгонят с этой земли."
COR_nf_c031:0 "Возвращение в Пещеры Рокки"
COR_nf_c031_desc:0 "Похоже, не все, кого мы считали погибшими во время Великого Исхода, действительно умерли. Некоторые из наших потерянных братьев остались в Пещерах Рокки."
COR_nf_c032:0 "Центр Нашего Поклонения"
COR_nf_c032_desc:0 "Такое святое место должно служить постоянным местом поклонения и паломничества."
COR_nf_c033:0 "Центр Нашего Гнева"
COR_nf_c033_desc:0 "Такое святое место должно стать центром нашей священной войны против тех, кто отвергает свет Рокки."
COR_nf_c034:0 "Проход За Пожертвование"
COR_nf_c034_desc:0 "Паломников, направляющихся в Пещеры Рокки, призывают жертвовать церкви посильную сумму."
COR_nf_c035:0 "Священные Тренировочные Площадки"
COR_nf_c035_desc:0 "Воинам, проходящим подготовку в Пещерах Рокки, постоянно напоминают о важности нашего дела. Здесь нет места для лености."
COR_nf_c036:0 "Судьба Язычников"
COR_nf_c036_desc:0 "Нам нужно лишь немного больше усилий, чтобы собрать последних выживших язычников на землях вокруг Пещер Рокки."
COR_nf_c037:0 "Зарезаны до Последнего"
COR_nf_c037_desc:0 "За преступления своих предков и сопротивление нашему возвращению эти язычники будут преданы смерти."
COR_nf_c038:0 "Последний Шанс"
COR_nf_c038_desc:0 "Тем, кто выжил на Грин-Маунтин, будет дан шанс принять Рокки — или погибнуть."
COR_nf_c039:0 "Наградите Достойных"
COR_nf_c039_desc:0 "С язычниками Грин-Маунтин покончено, и теперь мы можем переселить больше верных на святую землю."
COR_nf_c040:0 "Наградите Полезных"
COR_nf_c040_desc:0 "Некоторые из тех, кто с Грин-Маунтина принял свет Рокки, оказываются ценными орудиями его воли."
COR_nf_c041:0 "Все Дороги"
COR_nf_c041_desc:0 "Все дороги на нашей земле в конечном итоге приведут в одно место — Пещеры Рокки."
COR_nf_c042:0 "Проход для Торговцев"
COR_nf_c042_desc:0 "Торговцы из земель язычников ищут безопасный проход на нашу территорию. Мы позволим им продавать свои товары, но будем внимательно за ними наблюдать."
COR_nf_c043:0 "Избегай Недостойных"
COR_nf_c043_desc:0 "Мы не допустим, чтобы торговцы-язычники входили на нашу землю, не приняв сначала Рокки."
COR_nf_c044:0 "Последствия Коммерции"
COR_nf_c044_desc:0 "Наш народ стал всё более материалистичным из-за этих торговцев, но есть и некоторые преимущества."
COR_nf_c045:0 "Самодостаточные"
COR_nf_c045_desc:0 "Без тлетворного влияния языческих торговцев наш народ процветает."
COR_nf_c046:0 "Солнце светит на Рокзантиум"
COR_nf_c046_desc:0 "С язычниками покончено, земли заселены верными, а огни индустрии ревут с славной целью. Солнце сияет над нашей славной столицей, и это — лишь начало."
COR_nf_d001:0 "Когти Сокола"
COR_nf_d001_desc:0 "Чёрные доспехи с востока напали на нас! Каждая капля пролитой крови роккиста будет отомщена в десятикратном размере!"
COR_nf_d002:0 "Последний рубеж Отэма"
COR_nf_d002_desc:0 "Полковник Отэм привёл свой Анклав к гибели, но сражался до конца."
COR_nf_d003:0 "Тёмный Секрет Эдема"
COR_nf_d003_desc:0 "Язычники из Анклава оказались более коварными, чем мы думали... или всё же нет?"
COR_nf_d004:0 "Клыки Льва"
COR_nf_d004_desc:0 "Стальные доспехи с востока напали на нас! Каждая капля пролитой крови роккиста будет отомщена в десятикратном размере!"
COR_nf_d005:0 "Убийство Львов"
COR_nf_d005_desc:0 "Мы проникли в логово этих язычников и нашли оружие, подпитывающее крестовый поход."
COR_nf_d006:0 "Столичные Язычники"
COR_nf_d006_desc:0 "Недалеко от наших границ лежит пустошь, жаждущая объятий Рокки. Не будем заставлять их ждать слишком долго."
COR_nf_d007:0 "Милосердие в Мегатонне"
COR_nf_d007_desc:0 "Мегатонна была местом языческой веры, не слишком отличной от Культа Кобальта. Мы решили показать им заблуждение их путей мирно."
COR_nf_d008:0 "Резня в Мегатонне"
COR_nf_d008_desc:0 "Мегатонна была местом языческой веры, не слишком отличной от Культа Кобальта. Мы решили показать им заблуждение их путей."
COR_nf_d009:0 "Святыня Ламплайта"
COR_nf_d009_desc:0 "Ходят слухи, что место, известное как Пещеры Лэмплайт, очень похоже на наши священную Пещеру Рокки."
COR_nf_d010:0 "Проклятие дьявола"
COR_nf_d010_desc:0 "Один отряд воинов сумел не только сокрушить наших врагов из Анклава, но и научился использовать их продвинутую броню по захваченным книгам."
COR_nf_d011:0 "Завладеть Проектом «Чистота»"
COR_nf_d011_desc:0 "У Братства Стали в руках был огромный водоочиститель, с помощью которого они пытались подчинить себе пустошь. Теперь он склонит пустошь к воле Рокки."
COR_nf_d012:0 "Укротители Львов"
COR_nf_d012_desc:0 "Один отряд воинов сумел не только сокрушить наших врагов из Братства, но и научился использовать их продвинутую броню по захваченным книгам."
COR_nf_d013:0 "Раскачать Лодку"
COR_nf_d013_desc:0 "Одно из самых сильных языческих укреплений в этом регионе — Ривет-Сити, где даже стоит церковь ложной веры. Мы должны сделать из них пример."
COR_nf_d014:0 "Толпы Павших"
COR_nf_d014_desc:0 "Многие могучие армии нашли свою смерть в Столичной Пустоши. Тайники с их оружием усеяли землю — и теперь они принадлежат нам."
COR_nf_d015:0 "Разграбить Лаборатории"
COR_nf_d015_desc:0 "В Ривет-Сити и Цитадели находились ценные инструменты, которые мы можем перенести в наши собственные лаборатории."
COR_nf_d016:0 "Бесконечный Крестовый Поход"
COR_nf_d016_desc:0 "Мы далеки от завершения. Наши воины продолжат сражаться, наши жрецы — проповедовать, а наши границы — расширяться. В конце концов, все познают любовь Рокки."

###Ideas###
cor_the_bibble:0 "Библия"
cor_the_bibble_desc:0 "Библия, священная книга Церкви Рокки, является движущей силой каждого решения, принимаемого членом этой религиозной секты. Это ведёт к стабильному обществу, но затрудняет приспособление к переменам."
cor_convert_or_die:0 "Примкни или Умри"
cor_convert_or_die_desc:0 "Расширение Церкви Рокки движимо не жаждой земель или ресурсов, но необходимостью распространить слово их бога. Узникам и жителям покорённых земель даётся простой выбор: войти в свет Рокки — или умереть. Некоторые с радостью выбирают первое, но немало тех, кто сопротивляется самому факту выбора."
COR_penance_battalions_idea:0 "Батальоны покаяния"
COR_penance_battalions_idea_desc:0 "Те, кто отверг свет Рокки или пал в немилость от его благодати, могут обрести спасение в служении его воле. Единственная альтернатива — казнь."
COR_pious_armies_idea:0 "Благочестивые армии"
COR_pious_armies_idea_desc:0 "Лишь те, кто держит Рокки в своём сердце, достойны сражаться во имя его на этом великом крестовом походе."
COR_rockys_mighty_idea:0 "Мощь Избранных Рокки"
COR_rockys_mighty_idea_desc:0 "Мы накапливали силу в течение многих лет. Пламя нашей индустрии питает могучие армии в их святом деле, пока наши ряды продолжают расти."
COR_arnolds_leadership_idea:0 "Лидерство Арнольда"
COR_arnolds_leadership_idea_desc:0 "Руководство Церкви приняло идеологию Арнольда. Влияние этого более сурового понимания Библии уже распространяется по нашим землям."
COR_pebbles_leadership_idea:0 "Лидерство Святого Пеббла"
COR_pebbles_leadership_idea_desc:0 "Несмотря на недавние недовольства и беспокойства, Святой Пеббл по-прежнему остается нашим ориентиром."
COR_heretical_oversight_idea:0 "Совет по Еретическому Надзору"
COR_heretical_oversight_idea_desc:0 "Опытные жрецы и учёные тщательно изучают любые новые документы, добытые у язычников и еретиков, чтобы понять, можно ли примирить их искажённые идеи с нашей верой."
COR_abigails_leadership_idea:0 "Лидерство Эбигейл"
COR_abigials_leadership_idea_desc:0 "Руководство Церкви приняло идеологию Эбигейл. Влияние этого более мягкого понимания Библии уже распространяется по нашим землям."
COR_one_will_idea:0 "Одна Воля"
COR_one_will_idea_desc:0 "С завершением догматических споров в нашей Церкви мы можем вновь сосредоточиться на возвращении в святую землю и распространении слова Рокки."
COR_improvised_equipment_idea:0 "Импровизированное Оружие"
COR_improvised_equipment_idea_desc:0 "Воины Рокки учатся сражаться всем, что попадётся им под руку. Трубы, лезвия от газонокосилки или даже плазменная винтовка — всё может быть использовано для утверждения воли Рокки."
COR_maintained_equipment_idea:0 "Обслуженное оружие"
COR_maintained_equipment_idea_desc:0 "Солдату лучше стать мастером в вёрстке оружий и следить за их исправностью. Тогда он сможет с большей эффективностью утверждать волю Рокки."
COR_furious_warriors_idea:0 "Яростные воины"
COR_furious_warriors_idea_desc:0 "Воины Рокки стремятся лишь к искоренению язычников. Они сражаются с яростной преданностью и сердцем, твёрдым как камень."
COR_warrior_brotherhood_idea:0 "Братство Воинов"
COR_warrior_brotherhood_idea_desc:0 "Воины Рокки знают, что на поле битвы они должны полагаться друг на друга. Эти воины формируют крепкие узы и сражаются с большей силой."
COR_loz_researchers_idea:0 "Учённые Лоренца"
COR_loz_researchers_idea_desc:0 "Несмотря на своё язычество, эти исследователи многое знают о силах, которые явно являются измеримыми проявлениями воли Рокки. Было бы глупо не позволить им рассказать больше."
COR_foreign_crusades_idea:0 "Далёкие Крестовые Походы"
COR_foreign_crusades_idea_desc:0 "Воины и офицеры, проявившие великий потенциал, получают возможность начать собственные ограниченные крестовые походы в дальние земли. Возвращаются не все, но те, кто возвращается приносят славу и мудрость."
COR_incentivized_conversion_idea:0 "Стимулированное обращение"
COR_incentivized_conversion_idea_desc:0 "Мы воспользуемся жадностью еретика, чтобы разрушить преграды вокруг его сердца — дабы он впустил свет Рокки."
COR_mission_trips_idea:0 "Миссионерские поездки"
COR_mission_trips_idea_desc:0 "Некоторые жрецы и воины будут избраны для миссионерских путешествий за пределы наших границ. Там они снискают расположение местных жителей и распространят слово Рокки. Обращённые будут призваны обратно — в родину, где им и место."
COR_melee_focus_idea:0 "Фокус на орудиях ближнего боя"
COR_melee_focus_idea_desc:0 "Тот же молот, что сокрушает могучий камень, может нанести невообразимый урон черепу язычника."
COR_gun_focus_idea:0 "Фокус на баллистическом оружии"
COR_gun_focus_idea_desc:0 "Бросаться слепо на язычников с огнестрельным оружием, имея лишь молот — дело для того, кто глупее кротокрыса."
COR_rocky_caverns_cathedral_idea:0 "Собор Пещеры Рокки"
COR_rocky_caverns_cathedral_idea_desc:0 "Священные Пещеры Рокки были преобразованы в центр поклонения и паломничества."
COR_rocky_caverns_crusader_base_idea:0 "Цитадель крестоносцев в Пещерах Рокки"
COR_rocky_caverns_crusader_base_idea_desc:0 "Священные Пещеры Рокки были превращены в сердце нашей военной мощи. Отсюда мы планируем наш крестовый поход по всему миру."
COR_rocky_caverns_cathedral_2_idea:0 "Собор Пещеры Рокки"
COR_rocky_caverns_cathedral_2_idea_desc:0 "Священные Пещеры Рокки были преобразованы в центр поклонения и паломничества."
COR_rocky_caverns_crusader_base_2_idea:0 "Цитадель крестоносцев в Пещерах Рокки"
COR_rocky_caverns_crusader_base_2_idea_desc:0 "Священные Пещеры Рокки были превращены в сердце нашей военной мощи. Отсюда мы планируем наш крестовый поход по всему миру."
COR_growing_materialism_idea:0 "Растущий материализм"
COR_growing_materialism_idea_desc:0 "Допуск внешних торговцев на нашу землю несёт как благие, так и пагубные последствия."
COR_self_sufficient_idea:0 "Самодостаточные люди"
COR_self_sufficient_idea_desc:0 "Нам не нужно тлетворное влияние внешних торговцев. У нас есть всё, что нам нужно."
COR_endless_crusade_idea:0 "Бесконечный Крестовый Поход"
COR_endless_crusade_idea_desc:0 "Наш крестовый поход не имеет конца. Хотя мы наконец вернулись в святую землю и изгнали крупнейшие угрозы с этой стороны Америки, мы ещё не завершили путь. Наша задача не будет выполнена, пока свет Рокки не озарит каждый уголок земного шара. Rockus Vult."
COR_enclave_war_idea:0 "Объединённые против Анклава"
COR_enclave_war_idea_desc:0 "Последний вздох мёртвого мира мнит себя сильным — способным сокрушить наш народ, нашу веру. Но они не понимают, что какими бы продвинутыми ни были их оружие и броня, всё это меркнет перед могуществом нашего господа Рокки!"
COR_enclave_war_ai_idea:0 "Да нет, мы победим"
COR_enclave_war_ai_idea_desc:0 "На бумаге ваша армия Анклава сильнее, у неё есть всё, чего нет у нас, ресурсы, техника, власть. Но давай перейдём к Схватке, язычник, и посмотрим, имеет ли это значение. Гарантирую — не имеет."
COR_brotherhood_war_idea:0 "Камень бьёт Сталь"
COR_brotherhood_war_idea_desc:0 "Эти культисты думают, что способны победить избранных Рокки. Неужели они не знают, что мы сокрушили бесчисленные культы, чтобы дойти до сегодняшнего дня? Их поклонение технологии станет лишь ещё одной языческой верой, обречённой на забвение."
COR_brotherhood_war_ai_idea:0 "Камень бьёт Сталь"
COR_brotherhood_war_ai_idea_desc:0 "Эти культисты думают, что способны победить избранных Рокки. Неужели они не знают, что мы сокрушили бесчисленные культы, чтобы дойти до сегодняшнего дня? Их поклонение технологии станет лишь ещё одной языческой верой, обречённой на забвение."
COR_rockys_gift_of_water_ww_idea:0 "Рокки повелевает наливать!"
COR_rockys_gift_of_water_ww_idea_desc:0 "Роккалатия 21:6. Я есмь альфа и омега. Основанный и постыдный. Я дам ему глоток этой воды. Слава Рокки."
COR_rockys_gift_of_water_idea:0 "Живая Вода"
COR_rockys_gift_of_water_idea_desc:0 "Господь Рокки счёл нужным даровать нам почти безграничный источник чистой питьевой воды. С этой водой мы можем доказать наше божественное превосходство и легче открыть сердца других для света Рокки."
COR_cleaning_water_idea:0 "Отчищение Воды"
COR_cleaning_water_idea_desc:0 "Язычники из Анклавы отравили этот очиститель воды. Если мы хотим использовать его, нам придётся потратить время, чтобы понять, как удалить отраву. К счастью, мы захватили некоторых из тех, кто это сделал."
COR_arnolds_teachings_idea:0 "Учение Арнольда"
COR_arnolds_teachings_idea_desc:0 "Арнольд даровал нам новую порцию своей мудрости в деле подготовки воинов, изложив её в пространном свитке. Наставление распространяется по всем нашим землям."
COR_abigails_teachings_idea:0 "Учение Эбигейл"
COR_abigails_teachings_idea_desc:0 "Абигейл даровала нам новую порцию своей мудрости в обращении язычников, изложив её в пространном свитке. Этот мануал распространяется среди жрецов по всем нашим землям."
COR_studying_heathens_idea:0 "Изучение Языческих Текстов"
COR_studying_heathens_idea_desc:0 "Вопреки нашему лучшему суждению, мы изучаем документы, найденные в языческих поселениях. В стремлении познать язычника, чтобы лучше обратить его, мы порой открываем знания, имеющие научное применение."
COR_rocky_inquisition_idea:0 "Инквизиция Рокки"
COR_rocky_inquisition_idea_desc:0 "Никто не ждёт, что Инквизиция Рокки постучит в их дверь. Но когда это случается — всё будет озарено светом Рокки. Язычники будут судимы вместе с теми, кто им помогал."

###Tooltips###
COR_tt_1:0 "Это немного отличается от воли Рокки"
COR_tt_2:0 "Это соответствует воле Рокки"
COR_tt_3:0 "Это отличается от воли Рокки"
COR_tt_4:0 "Это сильно отличается от воли Рокки"
COR_tt_5:0 "Это полностью соответствует воле Рокки"
COR_tt_6:0 "Это строго соответствует воле Рокки"
COR_tt_7:0 "Верующие прислушаются к призыву Арнольда!"
COR_tt_8:0 "Обращенные прислушаются к призыву Эбигейл!"
COR_tt_9:0 "Язычникам будет позволено исповедовать свою веру, пока они служат нам"
COR_tt_10:0 "Разблокирует решения, позволяющие насильственно заставить завоеванные поселения принять нашу веру"
COR_tt_11:0 "Разблокирует решения, для закрепления в недавно завоёванных поселениях и мирного обращения населения"
COR_tt_12:0 "Некоторые из обращённых нами оказались полезными!"
COR_tt_13:0 "Эти могучие воины являются примером для всех нас!"
COR_tt_14:0 "Открывает механику баланса сил для управления верой"
COR_tt_15:0 "Присоединиться к восстанию Арнольда против еретического руководства"
COR_tt_16:0 "Присоединиться к восстанию Эбигейл против еретического руководства"
COR_tt_17:0 "Эбигейл собирает сторонников против нас!"
COR_tt_18:0 "Арнольд собирает сторонников против нас!"
COR_tt_19:0 "Кто знает, как это повлияет на охоту?"
COR_tt_20:0 "Они, может быть, и не могущественны, но их много"
COR_tt_21:0 "Через 30 дней в этом регионе станет на несколько язычников меньше, и он окажется ещё ближе к Рокки."
COR_tt_22:0 "Возможно, это займет больше времени, чем хотелось бы некоторым, но мы исправим разум этих язычников."
COR_tt_23:0 "По всей нашей земле будет построена сеть дорог, ведущих к Пещере Рокки."
COR_tt_24:0 "Теперь местные жители дважды подумают, прежде чем выступать против нас."

