l_russian:

###Balance of Power###
COR_dogmatic_adherence:0 "Догматическая приверженность"
COR_no_dogmatic_adherence:0 "Едва следуют Библии"
COR_firm_dogmatic_adherence:0 "Живут Библией"
COR_dogmatic_adherence_category:0 "Догматическая приверженность"
COR_almost_no_dogmatic_adherence:0 "Библия — это просто книга"
COR_almost_no_dogmatic_adherence_desc:0 "Наши уступки язычникам и еретикам подорвали основы нашей веры. Посторонние могут быть довольны, но истинно верующие в ярости от действий нынешнего руководства."
COR_very_little_dogmatic_adherence:0 "Библия полна изъянов"
COR_very_little_dogmatic_adherence_desc:0 "Мы продолжаем идти на уступки и компромиссы с теми, кто избегает света Рокки. Так больше продолжаться не может, если мы хотим сохранить нашу веру."
COR_low_dogmatic_adherence:0 "Библия всё чаще подвергается сомнению"
COR_low_dogmatic_adherence_desc:0 "Мы пошли на многочисленные компромиссы с язычниками и чужаками. Хотя основные принципы нашей веры остаются незыблемыми, некоторые опасаются, что мы встали на путь, который может привести к беде."
COR_strong_dogmatic_adherence:0 "Библия, это закон"
COR_strong_dogmatic_adherence_desc:0 "На землях, подконтрольных нашей Церкви, каждый верующий знает, что Библия твёрда, как самый прочный камень. Следование её учениям и вере строго контролируется, и лишь одна участь ждёт тех, кто отвергает свет Рокки."
COR_moderate_dogmatic_adherence:0 "Библия ясна"
COR_moderate_dogmatic_adherence_desc:0 "Согласны с этим язычники или нет, воля Рокки ясна. В наших землях эта воля исполняется и исполняется. С теми, кто противится ей, поступают соответственно."
COR_reasonable_dogmatic_adherence:0 "Библия - наш проводник"
COR_reasonable_dogmatic_adherence_desc:0 "Некоторые буквальные толкования Библии не раскрывают всей правды о нашем мире. Священникам и учёным приходится интерпретировать более метафорические аспекты книги, чтобы наш народ понял завещание Рокки."
COR_some_dogmatic_adherence:0 "Библия несовершенна"
COR_some_dogmatic_adherence_desc:0 "Библия, возможно, самый важный документ из когда-либо созданных, но это не означает, что она совершенна. По мере того как мы узнаём больше об окружающем мире, некоторые вопросы, поднятые в Библии, получают ответы."

###Characters###
COR_saint_pebble_NAME:0 "Святой Пеббл"
COR_saint_pebble_desc:0 "Святой Пеббл — последний из длинной череды религиозных лидеров, принявших титул Святого в Церкви Рокки. В последние годы он ведёт свой народ в завоеваниях малых племён и поселений вокруг, наращивая силу с намерением вернуть утраченные святые земли — Пещеры Рокки."
COR_arnold_NAME:0 "Кардинал Арнольд"
COR_arnold_desc:0 "Кардинал Арнольд — воин-священник, возглавивший бесчисленные нападения на соседние деревни и поселения. Ярый традиционалист, он отвергает любые идеи компромисса с язычниками и стремится уничтожить всех, кто не принимает слово Рокки."
COR_abigail_NAME:0 "Кардинал Эбигейл"
COR_abigail_desc:0 "Кардинал Эбигейл — воин-священница, прославившаяся после разгрома племени огнепоклонников, вооружённых довоенными огнемётами. В отличие от многих своих соратников, она считает, что некоторые языческие верования — это лишь невинные искажённые представления о мире Рокки. Эбигейл стремится сначала исправить их заблуждения, а уже потом — устранить тех, кто не способен измениться."
COR_stephen_savage_name:0 "Стивен Сэвидж"
COR_cardinal_goatlord_NAME:0 "Козловод"
COR_russo_boxer_name:0 "Руссо Боксёр"
COR_wyatt_hitch_name:0 "Уайатт Хитч"
COR_calvin_maxwell_name:0 "Кэлвин Максвелл"
COR_abe_hogan_name:0 "Эйб Хоган"
COR_roach_name:0 "Ученёй Роуч"
COR_schutz_name:0 "Ученёй Шутц"
COR_jenkins_name:0 "Торговец Дженкинс"
COR_pash_name:0 "Паш"
COR_rivers_name:0 "Джейсон Риверс"
COR_gerald_dawkson_name:0 "Джеральд Доуксон"
COR_spida_name:0 "Спида"
COR_kong_name:0 "Старик Конг"
COR_phelps_name:0 "Инквизитор Фелпс"
COR_troy_name:0 "Трой Уостерсон"
COR_buck_name:0 "Бак Маринер"
COR_cardinal_praxton_name:0 "Кардинал Пракстон"
COR_tone_name:0 "Капитан парома Тон-Э"
COR_potsdam_name:0 "Кристофер Потсдам"
COR_head_ranger_name:0 "Главный Рейнджер"
COR_kate_name:0 "Сияющая Кейт"

###Cosmetic Tags###
COR_rockzantium_cosmetic_tag:0 "Империя Рокзантиума"
COR_rockzantium_cosmetic_tag_ADJ:0 "Рокзантин"
COR_rockzantium_cosmetic_tag_DEF:0 "Империя Рокзантиума"

###Decisions###
COR_decision_category:0 "Решения Церкви Рокки"
COR_decision_category_desc:0 "Распространять свет Рокки — задача нелёгкая. Эти языческие земли, которые мы занимаем, враждебны истине, но мы позаботимся о том, чтобы они приняли Рокки в своё сердце, иначе они погибнут."
COR_dogmatic_adherence_category:0 "Догматическая приверженность"
COR_dogmatic_adherence_category_desc:0 "У Арнольда и Эбигейл свои взгляды на то, как обратить язычников в нашу веру. Пока этот раскол не будет преодолён, можно ожидать, что каждый из них продолжит свои «исповедования» по-своему."
COR_decision_forced_conversion:0 "Массовое принудительное обращение"
COR_decision_forced_conversion_desc:0 "Целые языческие поселения будут вынуждены собраться в центральном месте для проведения великой церемонии. Язычников выведут вперёд и заставят принять истину Рокки. Те, кто откажется, станут назиданием для остальных."
COR_decision_gentle_conversion:0 "Центры перевоспитания"
COR_decision_gentle_conversion_desc:0 "Язычники прожили всю свою жизнь во тьме, без света Рокки в сердце. Мы не можем винить их за то, что они медленно принимают истину. Поэтому наиболее упрямые души будут направлены в центры, где их научат понимать Рокки. Если же они продолжат сопротивление — придётся принять меры."
COR_decision_raze_heathen_settlement:0 "Разрушить языческое поселение"
COR_decision_raze_heathen_settlement_desc:0 "Многие поселения открыто отказываются принять свет Рокки. Одно из них будет выбрано и стерто с лица земли, а его языческое население — уничтожено. Это должно напомнить остальным, кого благоволит Рокки."
COR_decision_study_heathen_texts:0 "Изучить языческие тексты"
COR_decision_study_heathen_texts_desc:0 "Эбигейл считает, что некоторые языческие тексты содержат связи с Рокки, которые сами язычники просто неверно истолковали. Через тщательное изучение этих документов мы можем сформировать убедительные аргументы, способные обратить их в веру."
COR_decision_holy_inquisition:0 "Роккийская Инквизиция"
COR_decision_holy_inquisition_desc:0 "Никто не ожидает Рокийской инквизиции."
COR_decision_negotiate_with_heathens:0 "Вести переговоры с язычниками"
COR_decision_negotiate_with_heathens_desc:0 "Язычники могут заблуждаться, но они не лишены разума. Возможно, компромисс станет первым шагом к тому, чтобы свет Рокки проник в их сердца."
    
###Events###
COR_nf_events.1.title:0 "Избранный народ Рокки"
COR_nf_events.1.desc:0 "Много лет назад, когда огонь пролился с небес, наш народ искал убежище в Святых Пещерах Рокки. В объятиях Рокки эти люди были укрыты от ядерного пламени и болезни, что пришла за теми, кто остался наверху. В своей безграничной любви Рокки избрал их, чтобы избавить от страданий конца света. Эти люди были..."
COR_nf_events.1.a:0 "Сельские жители"
COR_nf_events.1.b:0 "Местные шахтеры"
COR_nf_events.1.c:0 "Семьи, отдыхающие вдали от дома"
COR_nf_events.2.title:0 "Наш враг в горах"
COR_nf_events.2.desc:0 "Со временем избранные научились любить Рокки за всё, что он для них сделал. Почти два столетия, проведённые в его объятиях, завершились тем, что наша вера была закреплена в Библии. Наш народ вышел в дикие земли за пределами Пещер Рокки и обнаружил мир, наполненный невежественными язычниками. Попытки донести слово Рокки встретили насмешки и злобу, и тогда гнев Рокки обрушился на язычников. Но наш народ был малочислен, а язычников — великое множество. Нас изгнали из Святых Пещер Рокки в северные холмы. И если бы не одно обстоятельство — наш народ погиб бы."
COR_nf_events.2.a:0 "Знание того, как сделать лечебный порошок"
COR_nf_events.2.b:0 "Наше желание возмездия"
COR_nf_events.2.c:0 "Знание, что Рокки защитит нас"
COR_nf_events.2.d:0 "Тайник с оружием, который нам доставил Рокки"
COR_nf_events.3.title:0 "В поисках нового дома"
COR_nf_events.3.desc:0 "Мы потеряли многих во время исхода, включая нашего лидера — Святого Грейвела. Но в конце концов мы нашли новый дом, вдали от язычников. Там мы смогли собраться, восстановиться. В этом новом доме было всё необходимое, чтобы начать наращивать силу и вновь распространять слово Рокки среди не просвещённых жителей региона. Этим домом был..."
COR_nf_events.3.a:0 "Заброшенная шахта"
COR_nf_events.3.b:0 "Довоенная фабрика"
COR_nf_events.3.c:0 "Забытый бункер"
COR_nf_events.4.title:0 "Голос Рокки"
COR_nf_events.4.desc:0 "Хотя многие тревожились за будущее нашего народа и скорбели по Святому Грейвелу, погибшему во время исхода, нашёлся человек, готовый повести нас вперёд. Один из самых доверенных советников Святого Грейвела — Филип МакДональд. Несмотря на странную мутацию, вызванную чрезмерным употреблением Кошачьего Глаза, его видение пути для нашего народа оставалось ясным. Он пообещал возвращение в Святые Пещеры Рокки и жестокую расплату для всех язычников, отвергших свет Рокки. Филип был наречён Святым Пебблом и дал народу ещё одно обещание."
COR_nf_events.4.a:0 "Обещание реки языческой крови"
COR_nf_events.4.b:0 "Обещание увеличения последователей"
COR_nf_events.4.c:0 "Обещание ответов на важные вопросы"
COR_nf_events.5.title:0 "Небольшие расхождения во мнениях"
COR_nf_events.5.desc:0 "Рядом со Святым Пебблом стоят два великих воина Рокки. Первый — Арнольд, могучий чемпион, сокрушивший бесчисленные угрозы во время похода на север. Второй — Эбигейл, мудрая стратегиня, направлявшая воинов сквозь непреодолимые преграды. Эти два титана едины в цели, но сильно различаются в методах. Арнольд не раз выражал обеспокоенность тем, что Эбигейл проявляет снисходительность к полезным язычникам. Он утверждает, что любые уступки тем, кто следует ложным верованиям, приведут к постепенному размыванию наших ценностей — так же, как река способна разрушить гору. Святой Пеббл до сих пор успешно сглаживал их разногласия. Но если раскол углубится, последствия могут прокатиться волной по всей нашей вере."
COR_nf_events.5.a:0 "Понял"
COR_nf_events.6.title:0 "Больше, чем просто небольшие различия во мнениях"
COR_nf_events.6.desc.1:0 "После возвращения Арнольда и Эбигейл, вместе с их свитами, споры не прекращаются ни на день. Арнольд в ярости из-за соглашений, которые Эбигейл заключила с язычниками во время своих завоеваний. Теперь он требует её казни как еретички и собрал немало сторонников. У Эбигейл тоже много приверженцев, которые считают, что устаревшие взгляды Арнольда приведут наш крестовый поход к провалу. Похоже, что, выбрав любую из сторон, мы обречены на внутренний конфликт."
COR_nf_events.6.desc.2:0 "После возвращения Арнольда и Эбигейл, вместе с их свитами, наступило относительное затишье. Ожидалось, что они вновь вступят в привычные споры об интерпретации Библии, но на этот раз они, похоже, пришли к согласию. Очевидно, пребывание Эбигейл на юге изменило её, и теперь мы можем двигаться вперёд вместе."
COR_nf_events.6.a:0 "Святой Пеббл поддерживает Арнольда!"
COR_nf_events.6.b:0 "Святой Пеббл поддерживает Эбигейл!"
COR_nf_events.6.c:0 "Мы поддерживаем Арнольда!"
COR_nf_events.6.d:0 "Мы поддерживаем Эбигейл!"
COR_nf_events.6.e:0 "Крестовый поход ждет!"
COR_nf_events.7.title:0 "Кончина Эбигейл"
COR_nf_events.7.desc.1:0 "После кровавого конфликта, грозившего разорвать наш народ, еретичка Эбигейл была приведена перед святым трибуналом и приговорена к своей участи. Та, что подняла оружие против своих братьев по вере в защиту языческих культов, будет казнена через закидывание камнями. Некоторые задаются вопросом, почему её просто не расстреляли или не обезглавили, но Святой Пеббл настаивает, что символизм камней, ставших причиной гибели еретички, стоит затраченных усилий."
COR_nf_events.7.desc.2:0 "После кровавого конфликта, грозившего разорвать наш народ, еретичка Эбигейл была приведена перед святым трибуналом и приговорена к своей участи. Та, что подняла оружие против своих братьев по вере в защиту языческих культов, будет казнена через закидывание камнями. Рядом с ней — Святой Пеббл, некогда преданный лидер нашей веры, павший перед искушениями язычников и отвернувшийся от света Рокки. Некоторые задаются вопросом, почему их просто не расстреляли или не обезглавили, но Арнольд настаивает, что символизм камней, ставших причиной гибели еретиков, стоит затраченных усилий."
COR_nf_events.7.a:0 "Хвала Рокки"
COR_nf_events.8.title:0 "Утихшие нравы"
COR_nf_events.8.desc:0 "Это потребовало бесчисленных часов обсуждений и мнений десятка учёных Библии, но понимание языческих верований наконец достигнуто. Было постановлено, что, хотя Эбигейл права — многие языческие веры действительно являются поклонением проявлениям воли Рокки, будь то огонь или магнетизм, — они всё равно остаются языческими. Если их последователи не смогут осознать изъяны своей веры, они подлежат казни, независимо от того, насколько близки их убеждения к Роккиизму. С этим вопросом покончено, и теперь мы можем двигаться вперёд, единые в вере и цели."
COR_nf_events.8.a:0 "Хвала Рокки"
COR_nf_events.9.title:0 "Жертвоприношение Арнольда"
COR_nf_events.9.desc.1:0 "Арнольд и ему подобные слишком долго сдерживали Церковь Рокки. Если бы не их искажённое понимание Библии, мы давно бы вернулись в Святую Землю. За этот грех простая смерть недостаточна — должны быть уничтожены даже следы их существования. Арнольд будет сожжён дотла, пока не останется ничего, кроме пепла!"
COR_nf_events.9.desc.2:0 "Святой Пеббл и Арнольд слишком долго сдерживали Церковь Рокки. Если бы не их искажённое понимание Библии, мы давно бы вернулись в Святую Землю. За этот грех одной смерти недостаточно — должны быть уничтожены даже следы их существования. Арнольд и Святой Пеббл будут сожжены дотла, пока не останется ничего, кроме пепла!"
COR_nf_events.9.a:0 "Хвала Рокки"
COR_nf_events.10.title:0 "Сильнейший солдат Рокки"
COR_nf_events.10.desc:0 "Арнольд возвышается среди воинов веры. Уничтожив бесчисленное множество язычников и мутировавших чудовищ, он стал очевидным выбором для подготовки нового поколения роккистских солдат. Его методы могут показаться жестокими — включая испытание под названием «Хруст», в котором бойцы должны пройти через руины на севере, кишащие трогами, — но результаты говорят сами за себя. Те, кто выживает после его тренировок, выходят оттуда сияющими орудиями воли Рокки, сокрушающими любого язычника или монстра на своём пути."
COR_nf_events.10.a:0 "ЖИВО В ХРУСТ!"
COR_nf_events.11.title:0 "Удачная однодневная поездка"
COR_nf_events.11.desc:0 "Наши новые претенденты на звание воинов веры вернулись с прогулки по «Хрусту». Не все дошли обратно — но это было ожидаемо. Те, кто вернулся, принесли великие трофеи и истории славы. Теперь они готовы учиться быть орудиями воли Рокки."
COR_nf_events.11.a:0 "Хвала Рокки"
COR_nf_events.12.title:0 "Похоронены в «Хрусте»"
COR_nf_events.12.desc:0 "Наши новые претенденты на звание воинов веры вернулись с прогулки по «Хрусту». Их оказалось куда меньше, чем ожидалось — многие, похоже, погибли в попытке обрести славу. Похоже, когда дело касается «Хруста», эти рекруты подвели нас."
COR_nf_events.12.a:0 "Таков «Хруст»"
COR_nf_events.13.title:0 "Далекие крики"
COR_nf_events.13.desc:0 "В южных руинах было куда больше криков и стрельбы, чем обычно. Похоже, эти странные культисты с юга снова отправились вглубь развалин. Неясно, зачем они продолжают посылать людей в эту дыру, но ясно одно — троги сегодня не останутся голодными."
COR_nf_events.13.a:0 "Странные ублюдки"
COR_nf_events.14.title:0 "В округе стало меньше трогов"
COR_nf_events.14.desc:0 "В южных руинах стало чуть меньше трогов и дикарей, чем обычно. Похоже, эти странные культисты с юга снова устроили вылазку за хламом или чем-то подобным. В том районе особо нечего собирать, но по крайней мере они помогают сдерживать численность.В южных руинах стало чуть меньше трогов и дикарей, чем обычно. Похоже, эти странные культисты с юга снова устроили вылазку за хламом или чем-то подобным. В том районе особо нечего собирать, но по крайней мере они помогают сдерживать численность."
COR_nf_events.14.a:0 "Странные ублюдки"
COR_nf_events.15.title:0 "Слава в «Хрусте»"
COR_nf_events.15.desc:0 "Наши претенденты на звание воинов веры вновь вернулись из «Хруста». С высоко поднятыми головами они приносят ещё больше трофеев и рассказов о славных победах. Эти рекруты готовы ко всему, что ждёт их в грядущем крестовом походе."
COR_nf_events.15.a:0 "Хвала Рокки"
COR_nf_events.16.title:0 "Похоронены в «Хрусте»"
COR_nf_events.16.desc:0 "Наши новые претенденты на звание воинов веры вернулись с прогулки по «Хруста». Их оказалось куда меньше, чем ожидалось — многие, похоже, погибли в попытке обрести славу. Похоже, когда дело касается «Хруста», эти рекруты подвели нас."
COR_nf_events.16.a:0 "Таков «Хруст»"
COR_nf_events.17.title:0 "Далекие крики"
COR_nf_events.17.desc:0 "В южных руинах было куда больше криков и стрельбы, чем обычно. Похоже, эти странные культисты с юга снова отправились вглубь развалин. Неясно, зачем они продолжают посылать людей в эту дыру, но ясно одно — троги сегодня не останутся голодными."
COR_nf_events.17.a:0 "Странные ублюдки"
COR_nf_events.18.title:0 "Дичее, чем дикари"
COR_nf_events.18.desc:0 "Эти безумцы с юга просто не знают, когда остановиться. Они продолжают устраивать погромы в южных руинах, убивая всех троггов и дикарей, что попадаются им на пути. Мы до сих пор не знаем, зачем они это делают, но если так пойдёт и дальше — в Трогтауне не останется ни одного трога."
COR_nf_events.19.title:0 "EMPTY EVENT"
COR_nf_events.19.desc:0 "EMPTY EVENT"
COR_nf_events.19.a:0 "EMPTY EVENT"
COR_nf_events.20.title:0 "Somebody Once Told Me..."
COR_nf_events.20.desc:0 "Язычники из Онионбурга рассказывают о существе, что обитает в глубине лесов. Могучий, но разумный зверь, по их словам, живёт там уже десятки, если не сотни лет, и принимает дары, оставленные у края леса. Эти подношения — дань, чтобы существо удерживало рейдеров от их земель. Местные описывают его как большое, зелёное и предпочитающее одиночество, но якобы достаточно разумное, чтобы говорить. Арнольд заинтересовался этим зверем и намерен увидеть его собственными глазами. Убьёт ли он его или заговорит — пока неизвестно."
COR_nf_events.20.a:0 "Эти деревенщины — явно не самые острые инструменты в сарае."
COR_nf_events.21.title:0 "Выбор охотничьей группы"
COR_nf_events.21.desc:0 "Арнольд принял решение — зверь должен быть убит. Он призвал воинов веры присоединиться к охоте, но пока не выбрал, кого именно возьмёт с собой."
COR_nf_events.21.a:0 "Могучие воины готовы к бою"
COR_nf_events.21.b:0 "Опоздавшие новобранцы, которым нужно что-то доказать"
COR_nf_events.21.c:0 "Порабощенные язычники Онионберга, знающие леса"
COR_nf_events.22.title:0 "Потерявшиеся в лесу"
COR_nf_events.22.desc:0 "Зверь леса оказался мудрее, чем мы предполагали. Он расставил ловушки, унесшие жизни многих, кого мы отправили за ним. Он также устраивал засады на тех, кто прошёл сквозь ловушки. Но мы приближаемся. Осталось лишь немного времени — и зверь падёт."
COR_nf_events.22.a:0 "Хвала Рокки!"
COR_nf_events.23.title:0 "Мудрый Великан"
COR_nf_events.23.desc:0 "Зверь сначала был насторожен, но хорошо отреагировал на дары, которые Арнольд отправил в лес вместе с письмами с просьбой о встрече. Ночью существо вывесило знаки, ведущие к его жилищу. Арнольд был удивлён, обнаружив, что этот зверь, это супермутант, хотя, в отличие от тех, что время от времени нападают с востока, этот не проявлял враждебности. Существо назвало себя Шреком — именем, взятым из старой книги о затворнике-зелёном гиганте. Оно рассказало, что пришло с далёкого юга много десятилетий назад и выживало, питаясь тем, что удавалось найти или получить от деревни. Арнольд поведал Шреку истину Рокки, и мутант слушал внимательно. Он хорошо воспринял уроки Библии и впустил Рокки в своё сердце. Арнольд вышел из леса с Шреком рядом — мутант согласился присоединиться к нашему святому крестовому походу."
COR_nf_events.23.a:0 "Хвала Рокки"
COR_nf_events.24.title:0 "Арнольд возвращается домой"
COR_nf_events.24.desc:0 "Арнольд вернулся с завоеваний на юго-западе. С собой он привёз лук, новообращённых воинов и рассказы о зелёном гиганте, скрывающемся в лесах. Земли Онинберга были обнажены перед светом Рокки — и хотя многие сопротивлялись, столь же многие впустили Рокки в свои сердца."
COR_nf_events.24.a:0 "Хвала Рокки"
COR_nf_events.25.title:0 "Мудрейший воин Рокки"
COR_nf_events.25.desc:0 "Эбигейл отличается от многих воинов нашей веры. Вместо того чтобы слепо бросаться на врага, полагаясь на то, что Рокки гарантирует победу, она изучает противника. Она узнаёт об их слабостях и использует их, а также перенимает некоторые из их сильных сторон. Этот подход вызвал критику со стороны церковных традиционалистов, включая Арнольда, но позволил её бойцам одержать множество великих побед с потерями, значительно ниже ожидаемых. Её недавний триумф над племенем Факелоносцев в 2274 году — один из таких примеров."
COR_nf_events.25.a:0 "Хвала Рокки"
COR_nf_events.26.title:0 "Пламя гаснет"
COR_nf_events.26.desc:0 "Прошло много месяцев с тех пор, как племя Факелоносцев было сокрушено силами Рокки, но некоторые всё ещё продолжали сопротивление. Эти остатки становились всё менее многочисленными, пока, наконец, последние из них не были загнаны в старый бункер — тот самый, откуда они, похоже, получили большую часть своих довоенных огнемётов. Отправлять туда воинов было бы бессмысленной тратой преданных бойцов, и Эбигейл решила просто запечатать бункер бетоном. Однако, видя ценность оборудования внутри, она предложила им шанс на капитуляцию. Факелоносцы согласились сдаться и сражаться за Рокки, но лишь при условии, что им будет позволено почитать пламя и продолжать свои обряды. Обычно такая ересь отвергается без обсуждений, но в последние месяцы Эбигейл пришла к убеждению, что их огнепоклонство — не ересь, а заблуждение, выражающее почтение к проявлению воли Рокки."
COR_nf_events.26.a:0 "It will take time to make a decision"
COR_nf_events.27.title:0 "EMPTY EVENT"
COR_nf_events.27.desc:0 "EMPTY EVENT"
COR_nf_events.27.a:0 "EMPTY EVENT"
COR_nf_events.28.title:0 "Эбигейл возвращается домой"
COR_nf_events.28.desc:0 "Эбигейл вернулась с завоеваний на юго-востоке. С собой она принесла мощное оружие, добытое у павших язычников. Некоторые воины Рокки могут презрительно относиться к использованию столь продвинутых средств, предпочитая традиционное холодное оружие, но эффективность этих инструментов неоспорима. Кроме того, произошло множество обращений и язычники узрели свет Рокки. Наши ряды были укреплены."
COR_nf_events.28.a:0 "Хвала Рокки!"
COR_nf_events.29.title:0 "Глаза направлены на юг"
COR_nf_events.29.desc:0 "Завоевания против фермеров Онионбурга и умников из Силы Лоренца были лишь разминкой перед настоящим крестовым походом. Между нами и нашей целью — Пещерами Рокки — лежат другие народы, засевшие в холмах и горах к югу. Но даже их падение не завершит поход. Когда эти племена будут уничтожены, мы наконец столкнёмся лицом к лицу с нашим изначальным врагом — язычниками с Грин-Маунтина. Каждый роккист, что шёл в исходе на север, мечтает о дне, когда сможет отомстить тем, кто изгнал нас из святой пещеры. И этот день всё ближе."
COR_nf_events.29.a:0 "Берегитесь, мы идем"
COR_nf_events.30.title:0 "EMPTY EVENT"
COR_nf_events.30.desc:0 "EMPTY EVENT"
COR_nf_events.30.a:0 "EMPTY EVENT"
COR_nf_events.31.title:0 "Стёртые в порошек"
COR_nf_events.31.desc:0 "Язычники этого культа поклоняются радиации! Многие обратились к истинной вере, когда поняли, что не могут противостоять воле Рокки, но некоторые остались непоколебимыми до самого конца. Лидеры культа и их самые преданные последователи засели в укреплённом форпосте и оказались слишком трудными для прямого штурма — цена в жизнях роккистов была бы слишком высока. Поэтому было решено: если они так жаждут быть рядом со своим любимым Атомом, мы им это обеспечим."
COR_nf_events.31.a:0 "Подготовить «Толтяк»"
COR_nf_events.32.title:0 "Но что такое атом?"
COR_nf_events.32.desc:0 "Эбигейл встретилась с Сияющей Кейт из Культа Кобальта и провела долгую беседу о природе их Атома. С помощью нескольких учёных Библии ей удалось объяснить, что атом — не божество сам по себе, а лишь одно из множества проявлений воли Рокки. Как пламя и магнетизм лишь проявления, так и атом. Лидер культа не смогла опровергнуть доводы Эбигейл и признала, что та может быть права. После этого бывшая предводительница рассказала своей пастве благую весть о Свете Рокки, и, за исключением нескольких самоубийств, большинство культа приняли истину Рокки."
COR_nf_events.32.a:0 "Хвала Рокки!"
COR_nf_events.33.title:0 "Последний восход солнца"
COR_nf_events.33.desc:0 "Главный рейнджер надеялся хотя бы на спокойную ночь в пещере, где он и горстка оставшихся последователей разбили лагерь — но не повезло. Поклонники камня пришли за ними сразу после полуночи. Остальные рейнджеры сделали всё, что могли, чтобы их сдержать, но их было слишком много. Главный рейнджер быстро понял, что дальше сражаться бессмысленно, и сдался — при условии, что его людям позволят уйти. Конечно, они сопротивлялись, но он всегда умел убедить их. Ведь что значит жизнь одного старика по сравнению с жизнями всех этих молодых рейнджеров? Его вывели из пещеры под ликование культистов — как раз когда солнце начало подниматься над холмами. Когда его поставили на колени, он подумал, как же эти холмы похожи на те, что он видел в детстве. Время не изменит эти горы. И культисты — тоже не смогут. \n \nОн не почувствовал камень, что проломил ему череп."
COR_nf_events.33.a:0 "ХВАЛА РОККИ!"
COR_nf_events.34.title:0 "Старше гор"
COR_nf_events.34.desc:0 "Главный рейнджер не был дураком. Он знал, когда идёт в ловушку. Но эта встреча с Каменным Генералом — или как там её называли — такой не была. За многие недели боёв стало ясно: если поклонник камня не пытается сразу тебя забить или сжечь, значит, скорее всего, он и не хочет. Так Главный Рейнджер встретился с Эбигейл, и они обсудили религию роккистов. Эбигейл заверила, что повседневная жизнь тех, кто примет веру, особо не изменится — ведь они почитают горы так же, как народ Мононгахелы. Их цель — не ресурсы, а путь к Грин-Маунтин. Если это означает конец кровопролитию и относительное спокойствие для его людей — он был только рад. Тем более, что буйные ребята с востока становились всё большей проблемой, и немного помощи не помешает."
COR_nf_events.34.a:0 "Хвала Рокки"
COR_nf_events.35.title:0 "В двух шагах от дома"
COR_nf_events.35.desc:0 "Путь к Грин-Маунтин открыт. Воины Рокки стоят в готовности, и, разумеется, Рокки на нашей стороне. Время идти вперёд и вернуть нашу святую землю приближается. Но пока армии ещё собираются, у нас есть немного времени для последних приготовлений. На чём следует сосредоточиться?"
COR_nf_events.35.a:0 "Усмирите беспорядки между нами и столицей"
COR_nf_events.35.b:0 "Быстро собрать больше солдат"
COR_nf_events.35.c:0 "Подготовьте излишки снаряжения"
COR_nf_events.35.d:0 "Соберите наш народ, ведь время наступило"
COR_nf_events.36.title:0 "Месть Рокки"
COR_nf_events.36.desc:0 "Язычники Грин-Маунтин не забыли нас. Увидев наши знамёна, они открыли огонь — и были не одни. Те, кто бежал от нашего наступления, объединились с нашим старым врагом и решили дать последний бой. Но это не имело значения. Объединённая мощь верных Рокки была более чем достаточной, чтобы сокрушить этих язычников и их союзников. Они устроили последнюю оборону в крепости среди гор и почти остановили наше наступление... но мы одержали победу благодаря..."
COR_nf_events.36.a:0 "Арнольдским ветеранам «ХРУСТА»"
COR_nf_events.36.b:0 "Знаний Шрека о партизанской тактике"
COR_nf_events.36.c:0 "Огнеметных отрядов Эбигейл"
COR_nf_events.36.d:0 "Мини-бомбам бывшего культа кобальта"
COR_nf_events.37.title:0 "EMPTY EVENT"
COR_nf_events.37.desc:0 "EMPTY EVENT"
COR_nf_events.37.a:0 "EMPTY EVENT"
COR_nf_events.38.title:0 "Трусы"
COR_nf_events.38.desc:0 "Когда мы прибыли в Святые Пещеры Рокки, нас удивило — мы увидели лица, давно считавшиеся потерянными после исхода. Много лет назад некоторые роккисты уступили власти язычников в обмен на свои жизни и укрылись в пещерах. Многие из наших воинов были готовы казнить их на месте — за то, что они отвергли один из основополагающих принципов веры ради спасения. Но стоит ли проливать кровь братьев лишь за то, что они однажды дрогнули?"
COR_nf_events.38.a:0 "С возвращением"
COR_nf_events.38.b:0 "Они сделали свой выбор"
COR_nf_events.39.title:0 "Наша Могучая Столица"
COR_nf_events.39.desc:0 "Всего за короткое время мы превратили эту землю из дикого края в великую столицу нашего народа. Верные стекаются, чтобы узреть город, возведённый вокруг наших святых пещер, и многие остаются, едва увидев его величие. Надёжные дороги ведут паломников из самых отдалённых уголков наших земель, и теперь стало ясно — мы больше не просто церковь. Мы — священная империя!"
COR_nf_events.39.a:0 "Солнце никогда не заходит над Рокзантиумом!"
COR_nf_events.40.title:0 "Америка стучится в дверь"
COR_nf_events.40.desc:0 "Время от времени в наши земли забредал парящий робот. Его цель, казалось, заключалась в трансляции старых радиосообщений от группы, называющей себя Анклавом. Эти послания обещали возвращение довоенной Америки, и, как многие в пустоши, мы считали их просто старыми записями давно исчезнувших остатков. Но винтокрылы, парящие над нашими головами, и солдаты, марширующие по нашей земле, ясно дают понять — это не так. Анклав захватил Столичную Пустошь на востоке и теперь обратил свой взор на нас. Но им не повезло — ведь мы избранные Рокки. А с ним на нашей стороне, как мы можем проиграть?"
COR_nf_events.40.a:0 "Анклав падет"
COR_nf_events.41.title:0 "Штурм Проекта «Чистота»"
COR_nf_events.41.desc:0 "Как мы и знали, Анклав со всей своей продвинутой технологией оказался ничтожен перед нашей верой и мощью. Их последняя оборона произошла у огромного водоочистного сооружения, которое они так ценили. Там их Главнокомандующий Отэм был уничтожен вместе с остальными. Язычники Анклава больше не существуют. И теперь у Столичной Пустоши есть новая доминирующая сила."
COR_nf_events.41.a:0 "Хвала Рокки"
COR_nf_events.42.title:0 "Что-то не так с водой"
COR_nf_events.42.desc:0 "Когда наши воины вошли в Столичную Пустошь вслед за разбитыми солдатами Анклава, стало ясно — с этим местом что-то не так. Почти каждое поселение, что мы встретили, было наполнено больными и умирающими. Единственное, что объединяло эти поселения — Анклав побывал там, раздавая воду. Не потребовалось видения от Рокки, чтобы понять, что происходит. Когда мы добрались до очистителя, через который Анклав пропускал эту воду, нам удалось захватить нескольких их учёных. Под угрозой казни они признались в содеянном. Они добавили в воду нечто под названием ВРЭ — вещество, убивающее почти всех, кто его выпьет. Очистить воду возможно, но для этого потребуется отвлечь значительную часть наших самых одарённых умов."
COR_nf_events.42.a:0 "Отчистите воду"
COR_nf_events.43.title:0 "Другой Техно-культ"
COR_nf_events.43.desc:0 "Поступали сообщения о язычниках, шныряющих по нашим землям в продвинутой силовой броне, но мы думали, что прогнали их. Похоже, мы ошибались. Группа технопоклонников, называющих себя Братством Стали, начала полномасштабное наступление на наш народ. Но не важно, какие довоенные остатки они несут в бой — у нас есть поддержка высшей силы, Рокки. Это Братство Стали встретит пламя столь жаркое, что оно расплавит стальные балки и вскипятит их броню прямо на них."
COR_nf_events.43.a:0 "Этот культ падет, как и другие"
COR_nf_events.44.title:0 "В их логово"
COR_nf_events.44.desc:0 "Наши воины наконец прорвались в самое сердце этого технокульта, и, как мы и ожидали, у них оказалось огромное хранилище довоенных технологий. Эти мощные орудия куда лучше послужат в наших руках — защищая верных Рокки и распространяя наше влияние."
COR_nf_events.44.a:0 "Хвала Рокки"
COR_nf_events.45.title:0 "Преступления Кромвеля"
COR_nf_events.45.desc:0 "Как только мы подумали, что покончили с культами, поклоняющимися ядерной энергии, мы нашли ещё один в Столичной Пустоши. Эти Дети Атома обосновались в Мегатонне, под предводительством безумца по имени Исповедник Кромвель. Этот фанатик стоял в лужах радиоактивной воды и умолял других присоединиться к нему. Когда мы попытались казнить его за преступление — распространение языческой веры — его последователи встали на защиту. Конечно, эти оборванные дикари не могли сравниться с избранными Рокки, и бойня была быстрой. Но всё же — эта резня немного испортила отношение Столичной Пустоши к нам."
COR_nf_events.45.a:0 "Они обратятся в веру или присоединятся к Кромвелю"
COR_nf_events.46.title:0 "Убеждение Кромвеля"
COR_nf_events.46.desc:0 "Мы думали, что покончили с культами, поклоняющимися ядерной энергии, но нашли ещё один в Столичной Пустоши. Эти Дети Атома обосновались в Мегатонне, под предводительством фанатичного проповедника по имени Исповедник Кромвель. Нам удалось убедить его и его последователей прийти на мирную беседу о вере, и хотя потребовалось немало усилий, некоторым из них мы смогли показать заблуждение их пути. Остальные встретили ту участь, что ждёт всех, кто отвергает свет Рокки."
COR_nf_events.46.a:0 "Хвала Рокки"
COR_nf_events.47.title:0 "Монстры Пещер"
COR_nf_events.47.desc:0 "Мы отправили часть наших людей исследовать место под названием Литтл-Ламплайт. Рассказы о нём напоминали описания наших Святых Пещер Рокки. Когда наши люди прибыли, их встретили дети — прямые потомки школьников, укрывшихся в этих пещерах во время Великой Войны. Не было времени насладиться этой связью с духовными родичами, ведь в пещере обитала и другая группа. Огромные мутанты, терроризирующие Столичную Пустошь и нападавшие на наших людей, занимали область за стенами Ламплайта. Наши воины не могли позволить таким мерзостям осквернять святое место и устремились в самое сердце этого гнезда. Там они нашли источник появления супермутантов в Столичной Пустоши — и положили этому конец. Несомненно, Рокки возжелал, чтобы мы уничтожили это нечестивое порождение."
COR_nf_events.47.a:0 "Хвала Рокки!"
COR_nf_events.48.title:0 "Родственные души"
COR_nf_events.48.desc.1:0 "Мы отправили часть наших людей исследовать место под названием Литтл Ламплайт. Рассказы о нём напоминали описания наших Святых Пещер Рокки. Когда наши люди прибыли, их встретили дети — прямые потомки школьников, укрывшихся в этих пещерах во время Великой Войны. Сначала дети были насторожены, но когда мы рассказали, что тоже пришли из пещеры, подобной их собственной, они потеплели к нам. Они хорошо восприняли учение Рокки, и теперь мы основываем церковь в этих пещерах."
COR_nf_events.48.desc.2:0 "Мы отправили часть наших людей исследовать место под названием Литтл Ламплайт. Рассказы о нём напоминали описания наших Святых Пещер Рокки. Наши люди были подавлены, увидев, что случилось с прежними обитателями. Записи и оставшиеся сооружения рассказывают о обществе, произошедшем от школьников, укрывшихся в этих пещерах во время Великой Войны. Увы, эти духовные родичи были уничтожены Анклавом, когда тот обнаружил это место. Сейчас, когда мы начинаем обживать пещеру, там возводится церковь, и в ней будет установлен алтарь в память о детях, убитых язычниками."
COR_nf_events.48.a:0 "Хвала Рокки"
COR_nf_events.48.b:0 "Мы никогда не сможем простить язычников"
COR_nf_events.49.title:0 "Дар воды"
COR_nf_events.49.desc:0 "Это потребовало немалых усилий, но нам удалось запустить Проект Чистота под нашим контролем. Теперь очиститель производит чистую питьевую воду, которую мы распределяем среди верных. Было высказано предложение использовать эту воду как стимул для обращения новых душ — ведь разве дар бесконечной воды не является доказательством того, что мы благословлены Рокки?"
COR_nf_events.49.a:0 "Хвала Рокки!"

