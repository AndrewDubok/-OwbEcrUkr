l_russian:

##Balance of Power##
    DC_mutant_presence_bop:0 "Присутствие мутантов в Столичной Пустоши"
    DC_mutant_presence_apocalyptic:0 "Апокалипсис Супермутантов"
    DC_mutant_presence_scarce:0 "Редкие встречи с Супермутантами"
    DC_mutant_presence_common_danger:0 "Постоянная опасность"
    DC_mutant_presence_common_danger_desc:0 "Наблюдение и нападения супермутантов — обычное дело. Хорошо укреплённые поселения могут дать им отпор, но менее подготовленные поселения сильно страдают."
    DC_mutant_presence_existential_threat:0 "Экзистенциальная угроза"
    DC_mutant_presence_existential_threat_desc:0 "Атаки супермутантов настолько часты и жестоки, что лишь немногие поселения успевают восстановиться до следующего нападения. Мы перестали считать погибших, и мало у кого есть надежда выжить в течение этого месяца."
    DC_mutant_presence_deadly_threat:0 "Смертельная угроза"
    DC_mutant_presence_deadly_threat_desc:0 "Атаки супермутантов часты и разрушительны. Во многих поселениях заканчиваются боеприпасы, и если ситуация продолжит развиваться, некоторые из них могут быть стерты с лица земли."
    DC_mutant_presence_serious_threat:0 "Серьёзная угроза"
    DC_mutant_presence_serious_threat_desc:0 "Супермутанты нападают на наши поселения с пугающей частотой. В конце концов, нападения отбиваются, но не без жертв и пленников, увезённых неизвестно куда."
    DC_mutant_presence_infrequent_threat:0 "Слабая угроза"
    DC_mutant_presence_infrequent_threat_desc:0 "Время от времени можно увидеть небольшие отряды супермутантов, устраивающих засады на караваны или нападающих на поселения. Большинству укрепленных поселений удается отбросить их с минимальными потерями, но более мелкие поселения несут более тяжёлые потери."
    DC_mutant_presence_occasional_attack:0 "Редкие нападения"
    DC_mutant_presence_occasional_attack_desc:0 "Группы супермутантов встречаются всё реже, но они всё ещё представляют угрозу. Жителям населенных пунктов следует сохранять бдительность, а путешественникам следует быть хорошо вооруженными."
    DC_mutant_presence_rare_sight:0 "Редко встречаемые"
    DC_mutant_presence_rare_sight_desc:0 "Супермутанты встречаются так редко, что некоторые сомневаются, остались ли они вообще. Тем не менее, караваны и путешественники всё же пропадают, и трудно сказать, дело рук супермутантов или просто стаи кротокрысов."

##Events##
    dc_mp_events.1.title:0 "Успешная зачистка"
    dc_mp_events.1.desc:0 "Один из наших отрядов в руинах Вашингтона прорвался сквозь здание во время патрулирования, уничтожив дюжину мутантов, оккупировавших руины."
    dc_mp_events.1.a:0 "Отличная работа"
    dc_mp_events.2.title:0 "Нападение на учениях"
    dc_mp_events.2.desc:0 "Отряд послушников во главе с рыцарем, проводивший учения в руинах Вашингтона, подвергся нападению группы супермутантов. Только рыцарю и одному из послушников удалось вернуться обратно."
    dc_mp_events.2.a:0 "Такая потеря"
    dc_mp_events.3.title:0 "Потерянный рыцарский патруль"
    dc_mp_events.3.desc:0 "Отряд рыцарей, патрулировавший руины Вашингтона, не вернулся в назначенное время. Последующий патруль, отправленный за ними, обнаружил лишь пару тел. В отчёте патруля указывается, что причиной неудачи стали супермутанты."
    dc_mp_events.3.a:0 "Добавьте их имена в свитки"
    dc_mp_events.4.title:0 "Аванпост атакован"
    dc_mp_events.4.desc:0 "Один из наших аванпостов в руинах Вашингтона подвергся нападению супермутантов, но рыцари сумели отбиться. Они запрашивают разрешения преследовать отступающих мутантов."
    dc_mp_events.4.a:0 "Подтверждаю, идите за ними!"
    dc_mp_events.4.b:0 "Отказано, вернитесь на аванпость."
    dc_mp_events.5.title:0 "EMPTY EVENT 5"
    dc_mp_events.5.desc:0 "ONE DAY THIS WILL BE AN EVENT AGAIN"
    dc_mp_events.5.a:0 "Ok"
    dc_mp_events.6.title:0 "EMPTY EVENT 6"
    dc_mp_events.6.desc:0 "ONE DAY THIS WILL BE AN EVENT AGAIN"
    dc_mp_events.6.a:0 "Ok"
    dc_mp_events.7.title:0 "Логово супермутантов уничтожено!"
    dc_mp_events.7.desc:0 "Это был ужасный бой, но наши бойцы вышли из Убежища 87 с победой. Супермутанты в старом бункере были убиты, а их инструменты для создания себе подобных были уничтожены. Жители Столичной Пустоши могут вздохнуть с облегчением. Хотя супермутанты ещё не исчезли окончательно, они уже никогда не будут представлять такой угрозы, как раньше."
    dc_mp_events.7.a:0 "Сегодня мы одержали важную победу"
    dc_mp_events.8.title:0 "Перестрелка супермутантов"
    dc_mp_events.8.desc:0 "Небольшой отряд супермутантов напал на одно из наших поселений и скрылся с несколькими пленниками. В результате нападения погибло несколько поселенцев и защитников, но это было лишь относительно хуже обычного рейда."
    dc_mp_events.8.a:0 "Утешьте семьи тех, кого мы потеряли."
    dc_mp_events.8.b:0 "ЭТО ПРОСТО РАЗВЕДКА! ГОТОВЬТЕ ОБОРОНУ!"
    dc_mp_events.8.c:0 "ДОГОНИТЕ ИХ!"
    dc_mp_events.9.title:0 "Рейд супермутантов"
    dc_mp_events.9.desc:0 "Большая группа супермутантов ворвалась в одно из наших поселений, оставив после себя множество трупов. Защитникам в конечном итоге удалось отбить атаку, но это далось дорогой ценой."
    dc_mp_events.9.a:0 "Мы не забудем их жертвы"
    dc_mp_events.9.b:0 "Нам повезло"
    dc_mp_events.9.c:0 "Конечно, это была трудная битва, но мы можем извлечь урок"
    dc_mp_events.9.d:0 "За ними!"
    dc_mp_events.10.title:0 "Крупное нападение супермутантов"
    dc_mp_events.10.desc:0 "Значительный отряд супермутантов осадил одно из наших поселений. Сотни людей погибли или, что ещё хуже, были унесены монстрами. Поселение опустошено, и только благодаря доблестным усилиям его защитников оно не пало под натиском супермутантов."
    dc_mp_events.10.a:0 "Почтите память героев обороны"
    dc_mp_events.10.b:0 "Мы стольких потеряли..."
    dc_mp_events.10.c:0 "Как им удалось организовать такую ​​атаку?"
    dc_mp_events.11.title:0 "Чудовищное нападение супермутантов"
    dc_mp_events.11.desc:0 "Чёрная облако на горизонте – всё, что осталось от одного из наших поселений. Огромная орда супермутантов прорвала их оборону и стёрла город с лица земли. Сотни тел усеивают дымящиеся руины, а десятки остаются пропавшими без вести, вероятно, им уготовлена участь хуже смерти. Жители наших поселений теперь опасаются, что они могут стать следующими."
    dc_mp_events.11.a:0 "Ещё один город стал кладбищем"
    dc_mp_events.11.b:0 "Как, чёрт возьми, это вообще произошло?"
    dc_mp_events.12.title:0 "Угроза супермутантов"
    dc_mp_events.12.desc:0 "Как и на Диком Западе более ста лет назад, супермутанты представляют серьёзную угрозу в Столичной Пустоши. Они редко появлялись в окрестностях гор Рэйвен-Рока, но по мере того, как мы продвигаемся всё дальше вглубь Пустоши, нам придётся время от времени сталкиваться со стычками."
    dc_mp_events.12.a:0 "Никакие мутанты нас не остановят!"
    dc_mp_events.13.title:0 "Уничтожение отставших"
    dc_mp_events.13.desc:0 "Вслед за отступающими супермутантами после последней атаки была отправлена ​​группа добровольцев. Им не удалось добить их, но перестрелка стала хорошей практикой."
    dc_mp_events.13.a:0 "Меньше мутантов — это всегда хорошие новости"
    dc_mp_events.14.title:0 "Сбежавшие мутанты уничтожены"
    dc_mp_events.14.desc:0 "Вслед за отступающими супермутантами после последней атаки была отправлена ​​группа добровольцев. Благодаря самоотверженности и меткой стрельбе солдат все силы мутантов были уничтожены."
    dc_mp_events.14.a:0 "Похвалите их за хорошо выполненную работу"
    dc_mp_events.15.title:0 "Тяжелый бой"
    dc_mp_events.15.desc:0 "Вслед за отступающими после последней атаки супермутантами была отправлена группа добровольцев. Проведя день в поисках, они обнаружили, что супермутанты перегруппировались и столкнулись с ожесточенным сопротивлением. Им удалось снова отбросить мутантов, но они решили вернуться домой, пока у них не закончились боеприпасы."
    dc_mp_events.15.a:0 "Они предотвратили вторую атаку. Отличная работа."
    dc_mp_events.16.title:0 "Ничего, кроме пыли."
    dc_mp_events.16.desc:0 "Вслед за отступающими после последней атаки супермутантами была отправлена группа добровольцев. Похоже, мы опоздали, поскольку они не смогли обнаружить никаких следов отступающих супермутантов."
    dc_mp_events.16.a:0 "Видимо, мы их хорошенько напугали!"
    dc_mp_events.17.title:0 "Засада!"
    dc_mp_events.17.desc:0 "Вслед за отступающими после последней атаки супермутантами была отправлена ​​группа добровольцев. Только один из них вернулся обратно. Он сообщил нам, что супермутанты поджидали их в засаде, и быстро расправились со всей командой."
    dc_mp_events.17.a:0 "Чёрт!"
    dc_mp_events.18.title:0 "Обнаружен аванпост супермутантов"
    dc_mp_events.18.desc:0 "Команда добровольцев была отправлена ​​вслед за отступающими супермутантами после последней атаки. Они прислали нам сообщение об обнаружении аванпоста супермутантов, расположенного в заброшенном здании в пустошах. Они держатся в стороне и просят о помощи, чтобы очистить это место."
    dc_mp_events.18.a:0 "Вышлите им поддержку. Пускай они зачистят лагерь"
    dc_mp_events.18.b:0 "Отзовите их. Риск того не стоит"
    dc_mp_events.18.c:0 "Отправьте им взрывчатку, пусть закопают мутантов под обломками"
    dc_mp_events.19.title:0 "Лагерь супермутантов зачищен"
    dc_mp_events.19.desc:0 "Наша команда сообщает, что им удалось успешно уничтожить мутантов на обнаруженном ими аванпосте. Это должно значительно сократить присутствие супермутантов в этом районе."
    dc_mp_events.19.a:0 "Все отлично сработали!"
    dc_mp_events.20.title:0 "ОТСТУПЛЕНИЕ!"
    dc_mp_events.20.desc:0 "Наша команда очень быстро обнаружила, что аванпост оказался больше, чем они ожидали. Столкнувшись с ожесточенным сопротивлением, они отступили и смогли уйти с относительно небольшими потерями."
    dc_mp_events.20.a:0 "По крайней мере они выжили"
    dc_mp_events.21.title:0 "Выживших нет"
    dc_mp_events.21.desc:0 "От нашей команды, отправленной на уничтожение аванпоста супермутантов, не поступало никаких вестей. Мы можем только предполагать худшее."
    dc_mp_events.21.a:0 "Они будут отомщены"
    dc_mp_events.22.title:0 "Бетонная могила"
    dc_mp_events.22.desc:0 "Наша команда сообщает, что им удалось успешно заложить взрывчатку. Рано утром здание рухнуло на супермутантов, а отставшие были перестреляны."
    dc_mp_events.22.a:0 "Хорошая работа"
    dc_mp_events.23.title:0 "Команда подрывников потеряна"
    dc_mp_events.23.desc:0 "Сегодня вернулись лишь несколько членов нашей команды, отправленной на уничтожение аванпоста супермутантов. Они сообщают, что во время установки взрывчатки вокруг здания команда была замечена и понесла тяжёлые потери, спасаясь от супермутантов."
    dc_mp_events.23.a:0 "Мы что, только что подарили им кучу взрывчатки?"
    dc_mp_events.24.title:0 "Пленники спасены!"
    dc_mp_events.24.desc:0 "Наша команда вернулась с задания по уничтожению обнаруженного ими аванпоста супермутантов. Им удалось убить всех супермутантов внутри. Но есть и более хорошие новости: они нашли несколько людей, захваченных мутантами. Все пленники были чрезвычайно благодарны за спасение, и почти все из них добровольно вступили в нашу армию и готовы сражаться с мутантской угрозой."
    dc_mp_events.24.a:0 "Хорошо, что мы это место не взорвали, да?"
    dc_mp_events.25.title:0 "Супермутанты мертвы?"
    dc_mp_events.25.desc:0 "Пока рано об этом говорить, но мы получаем информацию о том, что логово супермутантов было найдено и уничтожено. Если это правда, то вскоре их набеги прекратятся, и они будут полностью уничтожены."
    dc_mp_events.25.a:0 "Лучше бы это было так"
    dc_mp_events.25.b:0 "Им ещё повезло"
    dc_mp_events.26.title:0 "Замечен Бегемот"
    dc_mp_events.26.desc:0 "Супермутант-бегемот был замечен бродящим по пустошам недалеко от одного из наших поселений. Согласно сообщениям, существо достигало роста около 6 метров и несло в руках огромную трубу вместо оружия. Жители тех мест надеются, что мы что-нибудь с этим сделаем."
    dc_mp_events.26.a:0 "Мы ничего не можем сделать"
    dc_mp_events.26.b:0 "Если оно истекает кровью, то мы можем его убить"
    dc_mp_events.26.c:0 "Нам нужно действовать разумно. Устроим засаду"
    dc_mp_events.26.d:0 "Время пустить в ход тяжелую артиллерию"
    dc_mp_events.27.title:0 "Мы просто разозлили его"
    dc_mp_events.27.desc:0 "Наши попытки убить Бегемота, похоже, лишь разозлили его. Те немногие, кому удалось вернуться в безопасное место, рассказали, что разъярённый зверь разорвал их команду, и теперь поступает множество сообщений о том, как разъярённый бегемот крушит всё на своём пути."
    dc_mp_events.27.a:0 "Ну... Мы облажались"
    dc_mp_events.28.title:0 "Мы его убили?"
    dc_mp_events.28.desc:0 "Мало кто верил, что наш план сработает, но, к нашему удивлению, нам удалось убить Бегемота. Хотя потери были, их смерть не была напрасной. Сегодня мы нанесли мутантам серьёзный удар."
    dc_mp_events.28.a:0 "Поздравляю всех!"
    dc_mp_events.29.title:0 "Катастрофа"
    dc_mp_events.29.desc:0 "Те, кого мы отправили убить Бегемота, так и не вернулись. Изуродованные тела нескольких членов команды были обнаружены в районе, где им предстояло сражаться с существом. Остальная часть команды пропала, скорее всего, их съели или случилось что-то похуже."
    dc_mp_events.29.a:0 "Бедные люди"
    dc_mp_events.30.title:0 "Он сбежал"
    dc_mp_events.30.desc:0 "Команда, отправленная на поиски Бегемота, вернулась ни с чем. Похоже, чудовище ушло в неизвестную сторону и, надеюсь, больше не будет проблемой."
    dc_mp_events.30.a:0 "Это стоило того"
    dc_mp_events.31.title:0 "Рассвет супермутантов"
    dc_mp_events.31.desc:0 "В течение многих лет угроза со стороны супермутантов на Столичной Пустоши сдерживалась Братством Стали под руководством Лайонса. Однако мутанты, похоже, размножаются с той же скоростью, с какой их убивают. Эта война на истощение начинает оборачиваться против Братства, поскольку в Столичной Пустоши появляется все больше мутантов. Это вполне может стать началом трудных времён для всех обитателей Столичной Пустоши."
    dc_mp_events.31.a:0 "Грядут тёмные времена..."
    dc_mp_events.31.b:0 "Нас это не коснётся"
    dc_mp_events.31.c:0 "ГЛУПЫЕ ЛЮДИШКИ, ВРЕМЯ УМИРАТЬ"
    dc_mp_events.31.d:0 "ГЛУПЫЕ ЛЮДИШКИ, ВРЕМЯ УМИРАТЬ"
    dc_mp_events.32.title:0 "Зелёный прилив"
    dc_mp_events.32.desc:0 "Некоторые разведчики сообщали о появлении огромных фигур в старом метро Вашингтона после наступления сумерек. Позже некоторые из разведчиков сообщили об увеличении присутствия мутантов в самом сердце Вашингтона."
    dc_mp_events.32.a:0 "Интересно, что они ищут."
    dc_mp_events.33.title:0 "Призыв ко всем мутантам?"
    dc_mp_events.33.desc:0 "Приветствую вас, зеленокожие. Я Шепард, призываю всех мутантов вернуться в Убежище 87. Мы как вид должны объединиться, чтобы пережить этот геноцид нашего вида людьми. Нам необходимо объединить усилия, чтобы вести нашу борьбу. Оглянитесь, сколько ваших братьев вы увидите, которых они расстреляют, разорвут на части жестянками и Даккой? Присоединяйтесь ко мне, Шепарду и Повелителю Рейку в Убежище 87! ХАХА."
    dc_mp_events.33.a:0 "Это нехорошо"
    dc_mp_events.34.title:0 "Земля гигантов"
    dc_mp_events.34.desc:0 "Наши радиостанции разрывались от сообщений о супермутантах. Патрули, отправленные нами ночью, так и не вернулись. После недавней атаки супермутантов мы собрали отряд, чтобы выследить патруль. После нескольких дней поисков их чуть не сочли погибшими. Когда отряд решил расположиться на ночь в старом метро, они обнаружили потерянный патруль. Оказалось, что их атаковал Бегемот, и они так долго и так далеко бежали, что забыли, где находятся, и устроились в метро, ​​надеясь, что мы их найдём. Затем мы услышали рёв, доносившийся из самого сердца Вашингтона. Затем он раздался из Внешнего Вашингтона и окрестностей. Бегемоты, словно стая волков, рычали друг на друга по всей Пустоши. Каждый патруль в районе посылает тревожные сообщения о том, что слышит 10, 20, может быть, даже 50 Бегемотов, скрывающихся в Столичной Пустоши."
    dc_mp_events.34.a:0 "Приготовьтесь к бою"
    dc_mp_events.35.title:0 "Мутанты организуются"
    dc_mp_events.35.desc:0 "Единственным спасением в бесконечном кошмаре, которым была угроза супермутантов, было то, что мутанты были дезорганизованы и разбросаны. За исключением нескольких лагерей и набегов, нам редко приходилось беспокоиться о скоординированном нападении, а хороший тактик мог использовать глупость мутантов против них. Похоже, ситуация изменилась: нападения стали реже, но более организованными. Наши патрули также сообщают, что мутанты собираются и возводят укрепления в районе старых пещер Ламплайта. Что бы ни происходило, это не может быть чем-то хорошим."
    dc_mp_events.35.a:0 "Боже, помоги нам"
    dc_mp_events.35.b:0 "А теперь попробуй спрятаться от этого!"
    dc_mp_events.351.title:0 "Мутанты организуются"
    dc_mp_events.351.desc:0 "Единственным спасением в бесконечном кошмаре, которым была угроза супермутантов, было то, что мутанты были дезорганизованы и разбросаны. За исключением нескольких лагерей и набегов, нам редко приходилось беспокоиться о скоординированном нападении, а хороший тактик мог использовать глупость мутантов против них. Похоже, ситуация изменилась: нападения стали реже, но более организованными. Наши патрули также сообщают, что мутанты собираются и возводят укрепления в районе старых пещер Ламплайта. Что бы ни происходило, это не может быть чем-то хорошим."
    dc_mp_events.351.a:0 "Боже, помоги нам"
    dc_mp_events.351.b:0 "Это не наша проблема"
    dc_mp_events.36.title:0 "Утечка бойцов"
    dc_mp_events.36.desc:0 "Ходят слухи, что многие члены Братства Стали Лайонса покинули своё дело, преследуя другие цели. Из-за этого силы Братства, сражающиеся с супермутантами по всему Вашингтону, оказались в отчаянном положении из-за нехватки живой силы и снаряжения. По мере того, как усилия по уничтожению мутантов ослабевают, их присутствие на Столичной Пустоши растёт с тревожной скоростью."
    dc_mp_events.36.a:0 "Проблема с навыками L+"
    dc_mp_events.36.b:0 "Мы должны быть готовы"
    dc_mp_events.36.c:0 "По крайней мере, здесь мы в безопасности"
    dc_mp_events.37.title:0 "Ослабшая борьба"
    dc_mp_events.37.desc:0 "Поскольку многие наши братья отказались от нашего дела, чтобы следовать порочным идеалам Запада, наши возможности бороться с супермутантами ослабли. Наши патрули уже замечают всё большее количество мутантов на руинах Вашингтона, а всё больше поселений сообщают об их нападениях."
    dc_mp_events.37.a:0 "Мы должны продолжать бороться!"
    dc_mp_events.38.title:0 "Братство прекращает борьбу!"
    dc_mp_events.38.desc:0 "Новость о том, что Братство Стали по неизвестным причинам прекратило борьбу с супермутантами, распространяется со скоростью лесного пожара. Уже появились новости о резком росте активности супермутантов. Это вполне может стать концом для жителей Столичной Пустоши."
    dc_mp_events.38.a:0 "ПОШЕЛ ТЫ, ЛАЙОНС!"
    dc_mp_events.38.b:0 "О нет... так или иначе..."
    dc_mp_events.39.title:0 "Предположительно мертвы..."
    dc_mp_events.39.desc:0 "Команда, отправившаяся в прошлом месяце на охоту за супермутантами, так и не вернулась из пустоши. Нет никакого способа узнать, что с ними случилось. Мы предполагаем, или, скорее, надеемся, что они погибли. Лучше уж так, чем попасть в плен к супермутантам."
    dc_mp_events.39.a:0 "Эти бедные души"
    dc_mp_events.40.title:0 "Ничего не нашли"
    dc_mp_events.40.desc:0 "Учитывая, что в Столичной Пустоши едва ли можно пройти и мили, не увидев на земле огромный след ботинка, можно было бы подумать, что наша команда столкнулась с патрулем супермутантов, лагерем или чем-то в этом роде, но они не нашли никого."
    dc_mp_events.40.a:0 "Может быть, они вымерли?"
    dc_mp_events.41.title:0 "Небольшая стычка"
    dc_mp_events.41.desc:0 "Во время охоты наша группа столкнулась с небольшим патрулем супермутантов. Они понесли небольшие потери, но благодаря планированию и опыту сражений с супермутантами им удалось одолеть этих чудовищ."
    dc_mp_events.41.a:0 "Пустоши стали немного безопасней"
    dc_mp_events.42.title:0 "Эффективная охота"
    dc_mp_events.42.desc:0 "Отряд охотников, отправленный на уничтожение супермутантов, смог выследить патруль до лагеря. Когда пришло время, они начали многостороннюю атаку на лагерь и уничтожили всю орду мутантов прежде, чем те успели понять, что их поразило. Им даже удалось сделать это с удивительно малыми потерями."
    dc_mp_events.42.a:0 "Отлично"
    dc_mp_events.43.title:0 "Никаких зацепок"
    dc_mp_events.43.desc:0 "Команда, отправленная на поиски источника супермутантов, не нашла никаких зацепок, указывающих на его возможное местонахождение. Кроме редких довоенных руин и пустых пещер, в районе поисков не было ничего примечательного."
    dc_mp_events.43.a:0 "По крайней мере мы знаем, что их там нет"
    dc_mp_events.44.title:0 "Жёсткое сопротивление"
    dc_mp_events.44.desc:0 "Разведывательная группа, отправленная на поиски источника супермутантов, наткнулась на территорию, кишащую монстрами. Они не смогли оказать серьёзного сопротивления и были вынуждены бежать. Не все из них вернулись."
    dc_mp_events.44.a:0 "Возможно, мы близко?"
    dc_mp_events.45.title:0 "След потерян"
    dc_mp_events.45.desc:0 "Разведывательный отряд, отправленный на поиски источника супермутантов, неделями следил за патрулем мутантов, перемещавшимся от лагеря к лагерю. Однако, когда патруль поднялся на холмы, он потерял его из виду. Команда решила повернуть назад, вместо того чтобы играть в прятки с отрядом супермутантов."
    dc_mp_events.45.a:0 "Умный ход"
    dc_mp_events.46.title:0 "Это оно?"
    dc_mp_events.46.desc:0 "Разведывательный отряд сообщил, что, отслеживая отряд мутантов почти месяц, они увидели, как те вошли в зону повышенной радиации вокруг старого убежища, а затем вошли в пещеру рядом с запечатанной дверью. Им не удалось найти проход через смертельную радиацию, но они решили разбить лагерь и понаблюдать, не переправляют ли мутанты своих пленников другим способом. В ту ночь они попали в засаду проходившей мимо группы мутантов, и только одному из их команды удалось вернуться живым, чтобы рассказать нам о своем открытии."
    dc_mp_events.46.a:0 "Они погибли не напрасно"
    dc_mp_events.47.title:0 "Активность супермутантов растёт!"
    dc_mp_events.47.desc:0 "Недавний конфликт между поселениями в Столичной Пустоши привёл к учащению нападений супермутантов. Несмотря на всю глупость этих мутантов, они умеют распознавать слабости противника. Патрули попадают в засады, слабо защищённые поселения подвергаются нападениям, а аванпосты, предназначенные для защиты от вражеских поселений, подвергаются нападениям со стороны мутантов. Если этот конфликт в ближайшее время не закончится, то настоящими победителями в этой войне могут оказаться супермутанты!"
    dc_mp_events.47.a:0 "Мы должны поскорее это закончить!"
    dc_mp_events.48.title:0 "Мутанты извлекают выгоду из конфликта на Столичной Пустоши!"
    dc_mp_events.48.desc:0 "С началом боевых действий между различными поселениями Столичной Пустоши активность супермутантов в регионе резко возросла. Поскольку всё большее число охранников и ополченцев выдвигается на передовую конфликта, поселения за линией фронта становятся целями набегов супермутантов. Многие опасаются, что если конфликт затянется, супермутанты Столичной Пустоши могут захватить поселения, которые когда-то считались защищёнными от подобных угроз."
    dc_mp_events.48.a:0 "Мы должны подготовить своих людей!"
    dc_mp_events.49.title:0 "Писцы сообщают об усилении активности супермутантов!"
    dc_mp_events.49.desc:0 "Возрождение Анклава само по себе было для нас достаточно серьёзной проблемой. Но теперь мы получаем сообщения от патрулей и поселений по всей Столичной Пустоши о том, что нападения супермутантов становятся всё более частыми и серьёзными. Этих тварей, несомненно, привлекают зоны конфликта, и они вполне могут следовать по пути винтокрылов Анклава, летящих на восток, в сторону Вашингтона. Писцы предупреждают, что если этот всплеск активности не будет взят под контроль, мы можем столкнуться с проблемой посерьезнее, чем Анклав."
    dc_mp_events.49.a:0 "Мы должны как можно скорее положить конец этой борьбе!"
    dc_mp_events.50.title:0 "Мутанты следуют по следу Анклава!"
    dc_mp_events.50.desc:0 "В последние недели Анклав прокладывает себе путь по Столичной Пустоши. Как будто тираны в силовой броне — это не такая уж большая проблема, поселения по всей Столичной Пустоши подвергаются нападениям супермутантов больше, чем когда-либо. Поступают даже сообщения о супермутантах, вооруженных гатлинг-лазерами и другим передовым оружием, предположительно захваченным на полях сражений."
    dc_mp_events.50.a:0 "Готовим оборону!"
    
  ##Ideas##  
    dc_mutant_87_destroyed_idea:0 "Убежище 87 уничтожено"
    dc_mutant_87_destroyed_idea_desc:0 "Обитель супермутантов была уничтожена. Их численность значительно сократилась, и они не могут больше появляться. Они всё ещё существуют, но скоро о них останется только воспоминание."

