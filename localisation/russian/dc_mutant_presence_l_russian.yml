l_russian:

##Balance of Power##
    DC_mutant_presence_bop:0 "Присутність мутантів у Столичній Пустці"
    DC_mutant_presence_apocalyptic:0 "Апокаліпсис Супермутантів"
    DC_mutant_presence_scarce:0 "Рідкісні зустрічі з Супермутантами"
    DC_mutant_presence_common_danger:0 "Постійна небезпека"
    DC_mutant_presence_common_danger_desc:0 "Спостереження та напади супермутантів — звичайна справа. Добре укріплені поселення можуть дати їм відсіч, але менш підготовлені поселення сильно страждають."
    DC_mutant_presence_existential_threat:0 "Екзистенційна загроза"
    DC_mutant_presence_existential_threat_desc:0 "Атаки супермутантів настільки часті та жорстокі, що лише небагатьом поселенням вдається відновитися до наступного нападу. Ми перестали рахувати загиблих, і мало в кого є надія вижити протягом цього місяця."
    DC_mutant_presence_deadly_threat:0 "Смертельна загроза"
    DC_mutant_presence_deadly_threat_desc:0 "Атаки супермутантів часті та руйнівні. У багатьох поселеннях закінчуються боєприпаси, і якщо ситуація продовжить розвиватися, деякі з них можуть бути стерті з лиця землі."
    DC_mutant_presence_serious_threat:0 "Серйозна загроза"
    DC_mutant_presence_serious_threat_desc:0 "Супермутанти нападають на наші поселення з лякаючою частотою. Зрештою, напади відбиваються, але не без жертв і полонених, відвезених невідомо куди."
    DC_mutant_presence_infrequent_threat:0 "Нечаста загроза"
    DC_mutant_presence_infrequent_threat_desc:0 "Час від часу можна побачити невеликі загони супермутантів, які влаштовують засідки на каравани або нападають на поселення. Більшості укріплених поселень вдається відкинути їх із мінімальними втратами, але менші поселення зазнають важчих втрат."
    DC_mutant_presence_occasional_attack:0 "Поодинокі напади"
    DC_mutant_presence_occasional_attack_desc:0 "Групи супермутантів трапляються все рідше, але вони все ще становлять загрозу. Мешканцям населених пунктів слід зберігати пильність, а мандрівникам слід бути добре озброєними."
    DC_mutant_presence_rare_sight:0 "Рідко трапляються"
    DC_mutant_presence_rare_sight_desc:0 "Супермутанти трапляються так рідко, що деякі сумніваються, чи залишилися вони взагалі. Тим не менш, каравани та мандрівники все ж таки пропадають, і важко сказати, чи це справа рук супермутантів, чи просто зграї щурокрит."

##Events##
    dc_mp_events.1.title:0 "Успішне зачищення"
    dc_mp_events.1.desc:0 "Один із наших загонів у руїнах Вашингтона прорвався крізь будівлю під час патрулювання, знищивши дюжину мутантів, що окупували руїни."
    dc_mp_events.1.a:0 "Чудова робота"
    dc_mp_events.2.title:0 "Напад на навчаннях"
    dc_mp_events.2.desc:0 "Загін послушників на чолі з лицарем, що проводив навчання в руїнах Вашингтона, зазнав нападу групи супермутантів. Тільки лицарю та одному з послушників вдалося повернутися назад."
    dc_mp_events.2.a:0 "Така втрата"
    dc_mp_events.3.title:0 "Втрачений лицарський патруль"
    dc_mp_events.3.desc:0 "Загін лицарів, що патрулював руїни Вашингтона, не повернувся у призначений час. Наступний патруль, відправлений за ними, виявив лише пару тіл. У звіті патруля вказується, що причиною невдачі стали супермутанти."
    dc_mp_events.3.a:0 "Додайте їхні імена до сувоїв"
    dc_mp_events.4.title:0 "Форпост атаковано"
    dc_mp_events.4.desc:0 "Один із наших форпостів у руїнах Вашингтона зазнав нападу супермутантів, але лицарі зуміли відбитися. Вони запитують дозволу переслідувати мутантів, що відступають."
    dc_mp_events.4.a:0 "Підтверджую, йдіть за ними!"
    dc_mp_events.4.b:0 "Відмовлено, залишайтеся на форпості."
    dc_mp_events.5.title:0 "ПОРОЖНЯ ПОДІЯ 5"
    dc_mp_events.5.desc:0 "КОЛись ЦЕ ЗНОВУ БУДЕ ПОДІЄЮ"
    dc_mp_events.5.a:0 "Гаразд"
    dc_mp_events.6.title:0 "ПОРОЖНЯ ПОДІЯ 6"
    dc_mp_events.6.desc:0 "КОЛись ЦЕ ЗНОВУ БУДЕ ПОДІЄЮ"
    dc_mp_events.6.a:0 "Гаразд"
    dc_mp_events.7.title:0 "Лігво супермутантів знищено!"
    dc_mp_events.7.desc:0 "Це був жахливий бій, але наші бійці вийшли зі Сховища 87 з перемогою. Супермутанти в старому бункері були вбиті, а їхні інструменти для створення собі подібних були знищені. Мешканці Столичної Пустки можуть зітхнути з полегшенням. Хоча супермутанти ще не зникли остаточно, вони вже ніколи не становитимуть такої загрози, як раніше."
    dc_mp_events.7.a:0 "Сьогодні ми здобули важливу перемогу"
    dc_mp_events.8.title:0 "Перестрілка з супермутантами"
    dc_mp_events.8.desc:0 "Невеликий загін супермутантів напав на одне з наших поселень і втік із кількома полоненими. У результаті нападу загинуло кілька поселенців і захисників, але це було лише трохи гірше за звичайний рейд."
    dc_mp_events.8.a:0 "Втіште сім'ї тих, кого ми втратили."
    dc_mp_events.8.b:0 "ЦЕ ПРОСТО РОЗВІДКА! ГОТУЙТЕ ОБОРОНУ!"
    dc_mp_events.8.c:0 "НАЗДОЖЕНИ ЇХ!"
    dc_mp_events.9.title:0 "Рейд супермутантів"
    dc_mp_events.9.desc:0 "Велика група супермутантів увірвалася в одне з наших поселень, залишивши після себе безліч трупів. Захисникам зрештою вдалося відбити атаку, але це далося дорогою ціною."
    dc_mp_events.9.a:0 "Ми не забудемо їхні жертви"
    dc_mp_events.9.b:0 "Нам пощастило"
    dc_mp_events.9.c:0 "Звісно, це була важка битва, але ми можемо зробити з неї урок"
    dc_mp_events.9.d:0 "За ними!"
    dc_mp_events.10.title:0 "Масований напад супермутантів"
    dc_mp_events.10.desc:0 "Значний загін супермутантів обложив одне з наших поселень. Сотні людей загинули або, що ще гірше, були забрані монстрами. Поселення спустошено, і тільки завдяки доблесним зусиллям його захисників воно не впало під натиском супермутантів."
    dc_mp_events.10.a:0 "Вшануйте пам'ять героїв оборони"
    dc_mp_events.10.b:0 "Ми стількох втратили..."
    dc_mp_events.10.c:0 "Як їм вдалося організувати таку атаку?"
    dc_mp_events.11.title:0 "Жахливий напад супермутантів"
    dc_mp_events.11.desc:0 "Чорна хмара на горизонті — усе, що залишилося від одного з наших поселень. Величезна орда супермутантів прорвала їхню оборону та стерла місто з лиця землі. Сотні тіл усіяють руїни, що димляться, а десятки залишаються зниклими безвісти, ймовірно, на них чекає доля гірша за смерть. Мешканці наших поселень тепер побоюються, що вони можуть бути наступними."
    dc_mp_events.11.a:0 "Ще одне місто стало цвинтарем"
    dc_mp_events.11.b:0 "Як, чорт забирай, це взагалі сталося?"
    dc_mp_events.12.title:0 "Загроза супермутантів"
    dc_mp_events.12.desc:0 "Як і на Дикому Заході понад сто років тому, супермутанти становлять серйозну загрозу в Столичній Пустці. Вони рідко з'являлися в околицях гір Рейвен-Року, але в міру того, як ми просуваємося все далі вглиб Пустки, нам доведеться час від часу стикатися з сутичками."
    dc_mp_events.12.a:0 "Жодні мутанти нас не зупинять!"
    dc_mp_events.13.title:0 "Знищення тих, хто відстав"
    dc_mp_events.13.desc:0 "Слідом за супермутантами, що відступали після останньої атаки, було відправлено групу добровольців. Їм не вдалося добити їх, але перестрілка стала хорошою практикою."
    dc_mp_events.13.a:0 "Менше мутантів — це завжди хороші новини"
    dc_mp_events.14.title:0 "Втікаючих мутантів знищено"
    dc_mp_events.14.desc:0 "Слідом за супермутантами, що відступали після останньої атаки, було відправлено групу добровольців. Завдяки самовідданості та влучній стрільбі солдатів усі сили мутантів було знищено."
    dc_mp_events.14.a:0 "Похваліть їх за добре виконану роботу"
    dc_mp_events.15.title:0 "Важкий бій"
    dc_mp_events.15.desc:0 "Слідом за супермутантами, що відступали після останньої атаки, було відправлено групу добровольців. Провівши день у пошуках, вони виявили, що супермутанти перегрупувалися та зіткнулися з жорстоким опором. Їм вдалося знову відкинути мутантів, але вони вирішили повернутися додому, поки в них не скінчилися боєприпаси."
    dc_mp_events.15.a:0 "Вони запобігли другій атаці. Чудова робота."
    dc_mp_events.16.title:0 "Нічого, крім пилу"
    dc_mp_events.16.desc:0 "Слідом за супермутантами, що відступали після останньої атаки, було відправлено групу добровольців. Здається, ми запізнилися, оскільки вони не змогли виявити жодних слідів супермутантів, що відступали."
    dc_mp_events.16.a:0 "Мабуть, ми їх добряче налякали!"
    dc_mp_events.17.title:0 "Засідка!"
    dc_mp_events.17.desc:0 "Слідом за супермутантами, що відступали після останньої атаки, було відправлено групу добровольців. Тільки один із них повернувся назад. Він повідомив нам, що супермутанти чекали на них у засідці та швидко розправилися з усією командою."
    dc_mp_events.17.a:0 "Чорт!"
    dc_mp_events.18.title:0 "Виявлено форпост супермутантів"
    dc_mp_events.18.desc:0 "Команда добровольців була відправлена слідом за супермутантами, що відступали після останньої атаки. Вони надіслали нам повідомлення про виявлення форпосту супермутантів, розташованого в занедбаній будівлі в пустках. Вони тримаються осторонь і просять допомоги, щоб очистити це місце."
    dc_mp_events.18.a:0 "Вишліть їм підтримку. Нехай вони зачистять табір"
    dc_mp_events.18.b:0 "Відкличте їх. Ризик того не вартий"
    dc_mp_events.18.c:0 "Відправте їм вибухівку, нехай закопають мутантів під уламками"
    dc_mp_events.19.title:0 "Табір супермутантів зачищено"
    dc_mp_events.19.desc:0 "Наша команда повідомляє, що їм вдалося успішно знищити мутантів на виявленому ними форпості. Це має значно скоротити присутність супермутантів у цьому районі."
    dc_mp_events.19.a:0 "Усі чудово спрацювали!"
    dc_mp_events.20.title:0 "ВІДСТУП!"
    dc_mp_events.20.desc:0 "Наша команда дуже швидко виявила, що форпост виявився більшим, ніж вони очікували. Зіткнувшись із жорстоким опором, вони відступили і змогли піти з відносно невеликими втратами."
    dc_mp_events.20.a:0 "Принаймні вони вижили"
    dc_mp_events.21.title:0 "Вцілілих немає"
    dc_mp_events.21.desc:0 "Від нашої команди, відправленої на знищення форпосту супермутантів, не надходило жодних звісток. Ми можемо тільки припускати найгірше."
    dc_mp_events.21.a:0 "Їм помстяться"
    dc_mp_events.22.title:0 "Бетонна могила"
    dc_mp_events.22.desc:0 "Наша команда повідомляє, що їм вдалося успішно закласти вибухівку. Рано-вранці будівля обвалилася на супермутантів, а ті, хто залишився, були перестріляні."
    dc_mp_events.22.a:0 "Хороша робота"
    dc_mp_events.23.title:0 "Команду підривників втрачено"
    dc_mp_events.23.desc:0 "Сьогодні повернулися лише кілька членів нашої команди, відправленої на знищення форпосту супермутантів. Вони повідомляють, що під час встановлення вибухівки навколо будівлі команду було помічено, і вона зазнала важких втрат, рятуючись від супермутантів."
    dc_mp_events.23.a:0 "Ми що, тільки що подарували їм купу вибухівки?"
    dc_mp_events.24.title:0 "Полонених врятовано!"
    dc_mp_events.24.desc:0 "Наша команда повернулася із завдання зі знищення виявленого ними форпосту супермутантів. Їм вдалося вбити всіх супермутантів усередині. Але є й кращі новини: вони знайшли кількох людей, захоплених мутантами. Усі полонені були надзвичайно вдячні за порятунок, і майже всі з них добровільно вступили до нашої армії та готові боротися з мутантською загрозою."
    dc_mp_events.24.a:0 "Добре, що ми це місце не підірвали, га?"
    dc_mp_events.25.title:0 "Супермутанти мертві?"
    dc_mp_events.25.desc:0 "Поки рано про це говорити, але ми отримуємо інформацію про те, що лігво супермутантів було знайдено та знищено. Якщо це правда, то незабаром їхні набіги припиняться, і вони будуть повністю знищені."
    dc_mp_events.25.a:0 "Краще б це було так"
    dc_mp_events.25.b:0 "Їм ще пощастило"
    dc_mp_events.26.title:0 "Помічено Бегемота"
    dc_mp_events.26.desc:0 "Супермутанта-бегемота було помічено блукаючим пустками неподалік від одного з наших поселень. Згідно з повідомленнями, істота досягала зросту близько 6 метрів і несла в руках величезну трубу замість зброї. Мешканці тих місць сподіваються, що ми щось із цим зробимо."
    dc_mp_events.26.a:0 "Ми нічого не можемо зробити"
    dc_mp_events.26.b:0 "Якщо воно стікає кров'ю, то ми можемо його вбити"
    dc_mp_events.26.c:0 "Нам потрібно діяти розумно. Влаштуємо засідку"
    dc_mp_events.26.d:0 "Час пустити в хід великі гармати"
    dc_mp_events.27.title:0 "Ми просто розлютили його"
    dc_mp_events.27.desc:0 "Наші спроби вбити Бегемота, здається, лише розлютили його. Ті небагато, кому вдалося повернутися в безпечне місце, розповіли, що розлючений звір розірвав їхню команду, і тепер надходить безліч повідомлень про те, як розлючений бегемот трощить усе на своєму шляху."
    dc_mp_events.27.a:0 "Ну... Ми облажалися"
    dc_mp_events.28.title:0 "Ми його вбили?"
    dc_mp_events.28.desc:0 "Мало хто вірив, що наш план спрацює, але, на наш подив, нам вдалося вбити Бегемота. Хоча втрати були, їхня смерть не була марною. Сьогодні ми завдали мутантам серйозного удару."
    dc_mp_events.28.a:0 "Вітаю всіх!"
    dc_mp_events.29.title:0 "Катастрофа"
    dc_mp_events.29.desc:0 "Ті, кого ми відправили вбити Бегемота, так і не повернулися. Понівечені тіла кількох членів команди було виявлено в районі, де їм належало битися з істотою. Решта команди зникла безвісти, швидше за все, їх з'їли або сталося щось гірше."
    dc_mp_events.29.a:0 "Бідолашні люди"
    dc_mp_events.30.title:0 "Він утік"
    dc_mp_events.30.desc:0 "Команда, відправлена на пошуки Бегемота, повернулася ні з чим. Схоже, чудовисько пішло в невідомому напрямку і, сподіваюся, більше не буде проблемою."
    dc_mp_events.30.a:0 "Це того вартувало"
    dc_mp_events.31.title:0 "Світанок супермутантів"
    dc_mp_events.31.desc:0 "Протягом багатьох років загроза з боку супермутантів у Столичній Пустці стримувалася Братством Сталі під керівництвом Лайонса. Однак мутанти, здається, розмножуються з тією ж швидкістю, з якою їх убивають. Ця війна на виснаження починає обертатися проти Братства, оскільки в Столичній Пустці з'являється все більше мутантів. Це цілком може стати початком важких часів для всіх мешканців Столичної Пустки."
    dc_mp_events.31.a:0 "Настають темні часи..."
    dc_mp_events.31.b:0 "Нас це не торкнеться"
    dc_mp_events.31.c:0 "ДУРНІ ЛЮДИНИ, ЧАС ПОМИРАТИ"
    dc_mp_events.31.d:0 "ДУРНІ ЛЮДИНИ, ЧАС ПОМИРАТИ"
    dc_mp_events.32.title:0 "Зелена хвиля"
    dc_mp_events.32.desc:0 "Деякі розвідники повідомляли про появу величезних постатей у старому метро Вашингтона після настання сутінків. Пізніше деякі з розвідників повідомили про збільшення присутності мутантів у самому серці Вашингтона."
    dc_mp_events.32.a:0 "Цікаво, що вони шукають."
    dc_mp_events.33.title:0 "Заклик до всіх мутантів?"
    dc_mp_events.33.desc:0 "Вітаю вас, зеленошкірі. Я Шепард, закликаю всіх мутантів повернутися до Сховища 87. Ми як вид повинні об'єднатися, щоб пережити цей геноцид нашого виду людьми. Нам необхідно об'єднати зусилля, щоб вести нашу боротьбу. Озирніться, скільки ваших братів ви побачите, яких вони розстріляють, розірвуть на частини бляшанками та Даккою? Приєднуйтесь до мене, Шепарда та Повелителя Рейка у Сховищі 87! ХАХА."
    dc_mp_events.33.a:0 "Це недобре"
    dc_mp_events.34.title:0 "Земля гігантів"
    dc_mp_events.34.desc:0 "Наші радіостанції розривалися від повідомлень про супермутантів. Патрулі, відправлені нами вночі, так і не повернулися. Після недавньої атаки супермутантів ми зібрали загін, щоб вистежити патруль. Після кількох днів пошуків їх мало не вважали загиблими. Коли загін вирішив розташуватися на ніч у старому метро, вони виявили загублений патруль. Виявилося, що їх атакував Бегемот, і вони так довго й так далеко бігли, що забули, де знаходяться, і влаштувалися в метро, сподіваючись, що ми їх знайдемо. Потім ми почули рев, що долинав із самого серця Вашингтона. Потім він пролунав із Зовнішнього Вашингтона та околиць. Бегемоти, немов зграя вовків, гарчали один на одного по всій Пустці. Кожен патруль у районі надсилає тривожні повідомлення про те, що чує 10, 20, можливо, навіть 50 Бегемотів, які ховаються в Столичній Пустці."
    dc_mp_events.34.a:0 "Приготуйтеся до бою"
    dc_mp_events.35.title:0 "Мутанти організовуються"
    dc_mp_events.35.desc:0 "Єдиним порятунком у нескінченному кошмарі, яким була загроза супермутантів, було те, що мутанти були дезорганізовані та розкидані. За винятком кількох таборів і набігів, нам рідко доводилося турбуватися про скоординований напад, а хороший тактик міг використати дурість мутантів проти них. Схоже, ситуація змінилася: напади стали рідшими, але більш організованими. Наші патрулі також повідомляють, що мутанти збираються та зводять укріплення в районі старих печер Лемплайт. Що б не відбувалося, це не може бути чимось хорошим."
    dc_mp_events.35.a:0 "Боже, допоможи нам"
    dc_mp_events.35.b:0 "А тепер спробуй сховатися від цього!"
    dc_mp_events.351.title:0 "Мутанти організовуються"
    dc_mp_events.351.desc:0 "Єдиним порятунком у нескінченному кошмарі, яким була загроза супермутантів, було те, що мутанти були дезорганізовані та розкидані. За винятком кількох таборів і набігів, нам рідко доводилося турбуватися про скоординований напад, а хороший тактик міг використати дурість мутантів проти них. Схоже, ситуація змінилася: напади стали рідшими, але більш організованими. Наші патрулі також повідомляють, що мутанти збираються та зводять укріплення в районі старих печер Лемплайт. Що б не відбувалося, це не може бути чимось хорошим."
    dc_mp_events.351.a:0 "Боже, допоможи нам"
    dc_mp_events.351.b:0 "Це не наша проблема"
    dc_mp_events.36.title:0 "Витік бійців"
    dc_mp_events.36.desc:0 "Ходять чутки, що багато членів Братства Сталі Лайонса покинули свою справу, переслідуючи інші цілі. Через це сили Братства, що борються з супермутантами по всьому Вашингтону, опинилися у відчайдушному становищі через нестачу живої сили та спорядження. У міру того, як зусилля зі знищення мутантів слабшають, їхня присутність у Столичній Пустці зростає з тривожною швидкістю."
    dc_mp_events.36.a:0 "Проблема з навичками L+"
    dc_mp_events.36.b:0 "Ми повинні бути готові"
    dc_mp_events.36.c:0 "Принаймні тут ми в безпеці"
    dc_mp_events.37.title:0 "Ослабла боротьба"
    dc_mp_events.37.desc:0 "Оскільки багато наших братів відмовилися від нашої справи, щоб слідувати порочним ідеалам Заходу, наші можливості боротися з супермутантами ослабли. Наші патрулі вже помічають все більшу кількість мутантів на руїнах Вашингтона, а все більше поселень повідомляють про їхні напади."
    dc_mp_events.37.a:0 "Ми повинні продовжувати боротися!"
    dc_mp_events.38.title:0 "Братство припиняє боротьбу!"
    dc_mp_events.38.desc:0 "Новина про те, що Братство Сталі з невідомих причин припинило боротьбу з супермутантами, поширюється зі швидкістю лісової пожежі. Вже з'явилися новини про різке зростання активності супермутантів. Це цілком може стати кінцем для мешканців Столичної Пустки."
    dc_mp_events.38.a:0 "ПІШОВ ТИ, ЛАЙОНС!"
    dc_mp_events.38.b:0 "О ні... так чи інакше..."
    dc_mp_events.39.title:0 "Імовірно мертві..."
    dc_mp_events.39.desc:0 "Команда, що вирушила минулого місяця на полювання за супермутантами, так і не повернулася з пустки. Немає жодного способу дізнатися, що з ними сталося. Ми припускаємо, або, радше, сподіваємося, що вони загинули. Краще вже так, ніж потрапити в полон до супермутантів."
    dc_mp_events.39.a:0 "Ці бідні душі"
    dc_mp_events.40.title:0 "Нічого не знайшли"
    dc_mp_events.40.desc:0 "Враховуючи, що в Столичній Пустці ледь можна пройти й милі, не побачивши на землі величезний слід черевика, можна було б подумати, що наша команда зіткнулася з патрулем супермутантів, табором або чимось подібним, але вони не знайшли нікого."
    dc_mp_events.40.a:0 "Може, вони вимерли?"
    dc_mp_events.41.title:0 "Невелика сутичка"
    dc_mp_events.41.desc:0 "Під час полювання наша група зіткнулася з невеликим патрулем супермутантів. Вони зазнали невеликих втрат, але завдяки плануванню та досвіду битв із супермутантами їм вдалося здолати цих чудовиськ."
    dc_mp_events.41.a:0 "Пустки стали трохи безпечнішими"
    dc_mp_events.42.title:0 "Ефективне полювання"
    dc_mp_events.42.desc:0 "Загін мисливців, відправлений на знищення супермутантів, зміг вистежити патруль до табору. Коли настав час, вони почали багатосторонню атаку на табір і знищили всю орду мутантів, перш ніж ті встигли зрозуміти, що їх вразило. Їм навіть вдалося зробити це з напрочуд малими втратами."
    dc_mp_events.42.a:0 "Чудово"
    dc_mp_events.43.title:0 "Жодних зачіпок"
    dc_mp_events.43.desc:0 "Команда, відправлена на пошуки джерела супермутантів, не знайшла жодних зачіпок, що вказують на його можливе місцезнаходження. Окрім рідкісних довоєнних руїн і порожніх печер, у районі пошуків не було нічого примітного."
    dc_mp_events.43.a:0 "Принаймні ми знаємо, що їх там немає"
    dc_mp_events.44.title:0 "Жорсткий опір"
    dc_mp_events.44.desc:0 "Розвідувальна група, відправлена на пошуки джерела супермутантів, натрапила на територію, що кишить монстрами. Вони не змогли вчинити серйозного опору і були змушені тікати. Не всі з них повернулися."
    dc_mp_events.44.a:0 "Можливо, ми близько?"
    dc_mp_events.45.title:0 "Слід втрачено"
    dc_mp_events.45.desc:0 "Розвідувальний загін, відправлений на пошуки джерела супермутантів, тижнями стежив за патрулем мутантів, що переміщався від табору до табору. Однак, коли патруль піднявся на пагорби, він втратив його з поля зору. Команда вирішила повернути назад, замість того, щоб грати в хованки з загоном супермутантів."
    dc_mp_events.45.a:0 "Розумний хід"
    dc_mp_events.46.title:0 "Це воно?"
    dc_mp_events.46.desc:0 "Розвідувальний загін повідомив, що, відстежуючи загін мутантів майже місяць, вони побачили, як ті увійшли в зону підвищеної радіації навколо старого сховища, а потім увійшли в печеру поруч із запечатаними дверима. Їм не вдалося знайти прохід крізь смертельну радіацію, але вони вирішили розбити табір і поспостерігати, чи не переправляють мутанти своїх полонених іншим способом. Тієї ночі вони потрапили в засідку групи мутантів, що проходила повз, і тільки одному з їхньої команди вдалося повернутися живим, щоб розповісти нам про своє відкриття."
    dc_mp_events.46.a:0 "Вони загинули недаремно"
    dc_mp_events.47.title:0 "Активність супермутантів зростає!"
    dc_mp_events.47.desc:0 "Нещодавній конфлікт між поселеннями в Столичній Пустці призвів до почастішання нападів супермутантів. Незважаючи на всю дурість цих мутантів, вони вміють розпізнавати слабкості противника. Патрулі потрапляють у засідки, слабо захищені поселення зазнають нападів, а форпости, призначені для захисту від ворожих поселень, зазнають нападів з боку мутантів. Якщо цей конфлікт найближчим часом не закінчиться, то справжніми переможцями в цій війні можуть виявитися супермутанти!"
    dc_mp_events.47.a:0 "Ми повинні якнайшвидше це закінчити!"
    dc_mp_events.48.title:0 "Мутанти використовують конфлікт у Столичній Пустці!"
    dc_mp_events.48.desc:0 "З початком бойових дій між різними поселеннями Столичної Пустки активність супермутантів у регіоні різко зросла. Оскільки все більша кількість охоронців і ополченців висувається на передову конфлікту, поселення за лінією фронту стають цілями набігів супермутантів. Багато хто побоюється, що якщо конфлікт затягнеться, супермутанти Столичної Пустки можуть захопити поселення, які колись вважалися захищеними від подібних загроз."
    dc_mp_events.48.a:0 "Ми повинні підготувати своїх людей!"
    dc_mp_events.49.title:0 "Писарі повідомляють про посилення активності супермутантів!"
    dc_mp_events.49.desc:0 "Відродження Анклаву саме по собі було для нас досить серйозною проблемою. Але тепер ми отримуємо повідомлення від патрулів і поселень по всій Столичній Пустці про те, що напади супермутантів стають все більш частими та серйозними. Цих тварюк, безсумнівно, приваблюють зони конфлікту, і вони цілком можуть слідувати по шляху вертибердів Анклаву, що летять на схід, у бік Вашингтона. Писарі попереджають, що якщо цей сплеск активності не буде взято під контроль, ми можемо зіткнутися з проблемою серйознішою, ніж Анклав."
    dc_mp_events.49.a:0 "Ми повинні якомога швидше покласти край цій боротьбі!"
    dc_mp_events.50.title:0 "Мутанти слідують по сліду Анклаву!"
    dc_mp_events.50.desc:0 "Останніми тижнями Анклав прокладає собі шлях по Столичній Пустці. Наче тирани в силовій броні — це не така вже й велика проблема, поселення по всій Столичній Пустці зазнають нападів супермутантів більше, ніж будь-коли. Надходять навіть повідомлення про супермутантів, озброєних ґатлінг-лазерами та іншою передовою зброєю, імовірно захопленою на полях битв."
    dc_mp_events.50.a:0 "Готуємо оборону!"
    
  ##Ideas##  
    dc_mutant_87_destroyed_idea:0 "Сховище 87 знищено"
    dc_mutant_87_destroyed_idea_desc:0 "Оселя супермутантів була знищена. Їхня чисельність значно скоротилася, і вони не можуть більше з'являтися. Вони все ще існують, але скоро про них залишиться тільки спогад."

