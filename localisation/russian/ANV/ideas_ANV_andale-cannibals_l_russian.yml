l_russian:
ANV_dunwich_horrors:0 "Жахи Данвіча"
ANV_dunwich_horrors_desc:0 "Це був жах, якого я ще ніколи не бачив. Він зводив їх усіх з розуму. Він випалював мені очі щоразу, коли я їх заплющую, я бачу його."
ANV_dunwich_voices:0 "Голоси Данвіча"
ANV_dunwich_voices_desc:0 "Голоси, які вони гризли, манили мене вийти. Коли я відмовився, голоси почали звучати як симфонія. Потім гнівний гуркіт слів залунав прямо в мій мозок."
ANV_growing_hunger:0 "Зростаючий голод"
ANV_growing_hunger_desc:0 " Вони голодують за м'ясом, яке вони ненажерливо споживають"
ANV_haunted_swamps:0 "Болота з привидами"
ANV_haunted_swamps_desc:0 "У сусідніх Болотах живуть дивні речі та моторошні легенди."
ANV_our_little_secret:0 "Наш маленький секрет"
ANV_our_little_secret_desc:0 "Бачиш, приємно це чути. Щоразу, коли хтось дізнається про наш маленький секрет, ми кажемо: «О, ви жахливі люди, або як ви можете таке робити?». Я маю на увазі, що в мене тут є сім'я, про яку треба піклуватися."
ANV_dark_arts:0 "Темні мистецтва"
ANV_dark_arts_desc:0 "Нічні ритуали, окультні церемонії та інші практики дарують нам особливі благословення."
ANV_haleys_hardware:0 "Апаратне забезпечення Хейлі"
ANV_haleys_hardware_desc:0 "Можливо, він і не з болота, але Хейлі — один з болотяних."
ANV_pas_fishing_aid:0 "Тато допомагає рибалити"
ANV_pas_fishing_aid_desc:0 "Добре підходить для лову риби, і сухопутної риби. Якщо ви розумієте, що я маю на увазі."
ANV_lindas_meat_pies:0 "М'ясні пироги Лінди"
ANV_lindas_meat_pies_desc:0 "М'ясні пироги Лінди — одні з найкращих у пустці. Тільки не питайте, який секретний інгредієнт."
ANV_civil_war_hats:0 "Уніформні шапки"
ANV_civil_war_hats_desc:0 "Деякі люди навколо Пойнт-Лукаут почали носити ці дурні сірі капелюхи, які вони постійно знаходять. Відколи ми перейняли форму, вогонь по дружніх сильно зменшився!"
ANV_local_swamp_folk:0 "Місцеві болотяни"
ANV_local_swamp_folk_desc:0 "Болотяні люди продовжують створювати проблеми, які поширюються далеко за межі боліт навколо Пойнт-Лукаут."
ANV_point_lookout_lighthouse:0 "Маяк Пойнт-Лукаут"
ANV_point_lookout_lighthouse_desc:0 "Маяк у Пойнт-Лукаут безпечно веде моряків вздовж наших берегів, приваблюючи їх до нашого порту."
ANV_ghoul_ecology:0 "Екологія гуля"
ANV_ghoul_ecology_desc:0 "Боротьба з дикими тваринами на сафарі Плікса дає нашим воїнам нове уявлення про їхню лють."
ANV_punga_power:0 "Потужність пунги"
ANV_punga_power_desc:0 "Плід пунга – це щось на зразок дива, і за умови правильного вирощування ми можемо розкрити його справжній потенціал."
ANV_the_krivbeknih:0 "Крівбекні"
ANV_the_krivbeknih_desc:0 "Темна книга і водночас могутня книга. Крівбекні звертається до тих, хто її зберігає, пропонуючи ідеї, які могли б зруйнувати розум навіть менш важливої ​​людини."
ANV_call_to_ug_qualtoth:0 "Закликайте Уґ-Квалтот"
ANV_call_to_ug_qualtoth_desc:0 "Вночі палають вогні. Ритуали виконуються. Ми, нікчемні, кличемо в небо істоту за зірками."
ANV_the_shadow_over_point_lookout:0 "Тінь над Пойнт-Лукаут"
ANV_the_shadow_over_point_lookout_desc:0 "Мало хто в Пойнт-Лукаут спить, а ті, хто спить, сплять небагато. Їхні сни мучать сни про велике затонуле місто та щось, що шепоче з глибин."
ANV_the_sickening_comet:0 "Огидна комета"
ANV_the_sickening_comet_desc:0 "На небі з'явилася велика комета. Вісник майбутнього."
ANV_fear_the_moon_idea:0 "Страх місяця"
ANV_fear_the_moon_idea_desc:0 "Багато наших людей повідомляють про незрозумілий страх перед місячним світлом. Будинки забиті дошками, і мало хто наважується вийти на вулицю в безхмарну ніч."
ANV_turtle_dove_detention:0 "Карантин горлиці"
ANV_turtle_dove_detention_desc:0 "Розповіді про те, що відбувається в Горлиці, поширилися далеко за межі Пойнт-Лукаут. Мало хто наважиться ризикнути нашим гнівом і потрапити туди."
ANV_building_temple_idea:0 "Будівництво храму"
ANV_building_temple_idea_desc:0 "Зводиться величний храм, що вимагає більшої частини наших робітників"
ANV_cursed_obsidian_skull:0 "Проклятий Обсидіановий Череп"
ANV_cursed_obsidian_skull_desc:0 "У темряві майже видно, як світяться його очниці."
ANV_constances_doll:0 "Лялька констанції"
ANV_constances_doll_desc:0 "Можна відчути силу, що виходить від цієї дивної ляльки ручної роботи."
ANV_ug_qualtoths_idol:0 "Ідол Уґ-Квалтота"
ANV_ug_qualtoths_idol_desc:0 "Невелика скульптура зроблена з невідомого каменю. Деякі повідомляють, що чують слабкий шепіт, перебуваючи з нею в одній кімнаті."
ANV_blackhalls_spell_idea:0 "Заклинання Блекхолла"
ANV_blackhalls_spell_idea_desc:0 "Блекхолл має дивовижну здатність приваблювати людей."
ANV_blackhalls_circle_idea:0 "Коло Блекхолла"
ANV_blackhalls_circle_idea_desc:0 "Здається, впливові особи з інших куточків пусток мають зв'язки з родиною Блекхол. Тепер вони допомагають цій великій справі."
ANV_the_dunwich_obelisk:0 "Обеліск у Данвічі"
ANV_the_dunwich_obelisk_desc:0 "Обеліск під будівлею Данвіч – це давня реліквія великої сили. Багато хто з тих, хто наближається до нього, впадає в божевілля, або, можливо, вони нарешті прокидаються до справжнього порядку речей?"
ANV_dark_insights_idea:0 "Темні ідеї"
ANV_dark_insights_idea_desc:0 "Щось шепоче Овдію, розповідає йому про те, що є, і про те, що буде."
ANV_littlehorn_and_associates:0 "Літлхорн та Партнери"
ANV_littlehorn_and_associates_desc:0 "Літлхорн та Партнери відкрила невеликий офіс в Андейлі, помітивши зростання кількості добродійників на півночі. З ними приходять офіцери та досвідчені кілери, готові до роботи."
ANV_evil_karma:0 "Зла карма"
ANV_evil_karma_desc:0 "Кажуть, що хороші хлопці фінішують останніми. Ми ж обов'язково фінішуємо першими."
ANV_civil_war_cannons:0 "Гармати громадянської війни"
ANV_civil_war_cannons_desc:0 "Вони можуть бути запиленими, але 400-річна гармата все ще виконує свою роботу, коли справа доходить до руйнування стіни або зриву облоги."
ANV_civil_war_cannons2:0 "Гармати громадянської війни"
ANV_civil_war_cannons2_desc:0 "Вони можуть бути запиленими, але 400-річна гармата все ще виконує свою роботу, коли справа доходить до руйнування стіни або зриву облоги."
ANV_old_cannons_idea:0 "Старі гармати"
ANV_old_cannons_idea_desc:0 "Ці гармати можуть бути старими та важкими в управлінні, але вони все одно допомагають нам захищати наші домівки."
ANV_frontier_warfare_idea:0 "Прикордонна війна"
ANV_frontier_warfare_idea_desc:0 "Кожен чоловік — король свого замку та його найвідданіший захисник. Він буде боротися зубами й нігтями, щоб стримати будь-яких злих нападників чи звірів."
ANV_andale_death_bots:0 "Боти смерті Андейла"
ANV_andale_death_bots_desc:0 "Значно модифіковані роботи-домашні робітники забезпечать безпеку наших домівок."
ANV_andales_robot_repair:0 "Експертиза з ремонту роботів"
ANV_andales_robot_repair_desc:0 "Ми стаємо досить вправними в тому, щоб ці старі відра з болтами довше служили."
ANV_black_powder_cannons_idea:0 "Порохові гармати"
ANV_black_powder_cannons_idea_desc:0 "Вони можуть бути важкими, як чорт, і повільними у стрільбі, але вони також дуже гучні. Іноді цього достатньо, щоб відлякати кількох рейдерів."
ANV_romington_arms_co:0 "Ромінгтон Армс"
ANV_romington_arms_co_desc:0 "Новозаснована компанія Romington Arms забезпечує озброєння наших ополченців найкращою зброєю, яку ми можемо виробити."
ANV_night_training:0 "Нічне Тренування"
ANV_night_training_desc:0 "Якщо й є щось, чого ми можемо навчитися у хижаків пустки, то це те, що ніч — найкращий час для полювання."
ANV_littlehorn_offices:0 "Домашній офіс Літлхорна"
ANV_littlehorn_offices_desc:0 "Андейл зараз є домівкою компанії Littlehorn And Associates. Переїзд їхньої штаб-квартири приніс багатство, а також нових сусідів, які більш відкриті до альтернативних джерел їжі."
ANV_very_evil_karma:0 "Дуже зла карма"
ANV_very_evil_karma_desc:0 "Чи це зло — класти їжу на стіл для своєї родини лише тому, що ця їжа належить іншій родині? Якщо так, то так, гадаю, ми злі. Ну і що?"
ANV_raven_rock_command_center:0 "Командний центр Рейвен-Рок"
ANV_raven_rock_command_center_desc:0 "Значна частина Рейвен-Рок була зруйнована в нашій битві з Анклавом, але там ще залишилося кілька старих радіоприймачів та комп'ютерів, які можуть допомогти нам організувати наше ополчення."
ANV_corrupt_officers:0 "Корумповані офіцери"
ANV_corrupt_officers_desc:0 "Кілька офіцерів нашої міліції укладають угоди з контрабандистами з Пойнт-Лукаута. Якщо ми нічого не зробимо, то втратимо всі припаси."
ANV_bog_walker:0 "Болотяні мандрівники"
ANV_bog_walker_desc:0 "Є декілька обраних, які можуть орієнтуватися навіть у найпохмуріших і незайманих болотах. Ці болотяні мандрівники досягли з нами порозуміння і допоможуть нам долати складну місцевість."
ANV_smuggler_officers:0 "Офіцери-контрабандисти"
ANV_smuggler_officers_desc:0 "Контрабандисти з Пойнт-Лукаута знають, що робити. 60 капсул на місяць і стільки м’ясних пирогів, скільки можна з’їсти – це вигідна угода."
ANV_the_smugglers:0 "Контрабандисти з Пойнт-Лукаут"
ANV_the_smugglers_desc:0 "Контрабандисти з Пойнт-Лукаут продовжують зіткнення з нашими патрулями, а також грабують наші законні місця для збору сміття."
ANV_hostile_swampfolk:0 "Ворожі болотяни"
ANV_hostile_swampfolk_desc:0 "Багато хто в болотах Пойнт-Лукаут не дуже доброзичливо ставиться до чужинців. Хоча ми можемо зрозуміти такий спосіб мислення, ми тепер сусіди, і щось доведеться змінити."
ANV_cannibals_of_point_lookout:0 "Канібали з Пойнт-Лукаут"
ANV_cannibals_of_point_lookout_desc:0 "Болотяни Пойнт-Лукаут не надто відрізняються від нас. Вони люблять свої сім'ї, захищають свою землю та обожнюють смачний м'ясний пиріг. Зрештою, вони стають добрими друзями та сусідами."
ANV_no_new_visitors:0 "Немає нових відвідувачів"
ANV_no_new_visitors_desc:0 "В останні роки Андейл здобув репутацію місця, якого слід уникати. Можливо, це пов'язано з місцевою дикою природою, можливо, з відстанню від цінних торгових центрів, або ж з тим, що ми вбиваємо та з'їдаємо більшість людей, яких ловимо на наших дорогах. Насправді, залишається тільки здогадуватися."
ANV_microwave_emitter:0 "Мікрохвильовий еміттер"
ANV_microwave_emitter_desc:0 "Еміттер? Я її майже не знаю! Жарти жартами, але ця дурень дуже вміє схиляти людей до нашої точки зору."
ANV_fear_the_moon_idea:0 "Страх місяця"
ANV_fear_the_moon_idea_desc:0 "Воно завжди спостерігає. Воно бачить нас. Воно знає нас. Воно чекає на наш дзвінок."
ANV_building_temple_idea:0 "Будівництво храму"
ANV_building_temple_idea_desc:0 "Тисячі робітників наполегливо працюють, будуючи наш величний і жахливий храм, цеглинка за цеглиною."


###Flags###
ANV_occupied_dunwich_flag:0 "Ми контролюємо будівлю Данвіч"
ANV_obtained_skull_flag:0 "Обсидіановий череп наш!"
ANV_obtained_doll_flag:0 "Ми повернули ляльку Констанції!"

###Tooltips###
ANV_tt_1:0 "Болотяни будуть битися з нами"
ANV_tt_2:0 "Ці роботи забезпечать безпеку в наших районах"
ANV_tt_3:0 "Наше перше справжнє ополчення організовано"
ANV_tt_4:0 "Агенти Літлхорна також захистять наше місто!"
ANV_tt_5:0 Вірні помруть в його ім'я"
