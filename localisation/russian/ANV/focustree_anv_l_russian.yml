l_russian: 
ANV_the_big_dig:0 "Большие раскопки"
ANV_the_big_dig_desc:0 "Возобновление работы шахт было только половиной дела. Что-то зло зарыто глубоко в земле."
ANV_the_infernal_idol:0 "Адский Идол"
ANV_the_infernal_idol_desc:0 "После нескольких потерянных жизней идол был найден в месте где слияются две реки. Хотя он меньше, чем представлял себе Обадиан."
ANV_unleash_the_city:0 "Освободить город"
ANV_unleash_the_city_desc:0 "Питт — региональный центр силы и чудо послевоенного времени. Сколько всего этот город мог бы предложить для цивилизованного народа, вроде нас?"
ANV_i_put_a_spell_on_you:0 "Словно зачарованные"
ANV_i_put_a_spell_on_you_desc:0 "Даже несмотря на внезапную смену власти, повседневная жизнь рабов остается прежней. Похоже, империя, которую построил Ашшур, слишком ценна, чтобы ее разрушать, особенно в условиях пустошей."
ANV_restart_the_mines:0 "Возобновить работу шахт"
ANV_restart_the_mines_desc:0 "Мононгахия – место, где находятся одни из старейших шахт Данвича. А Обадия — человек, ценящий сентиментальные чувства."
ANV_the_cursed_doll:0 "Проклятая Кукла"
ANV_the_cursed_doll_desc:0 "Один из самых ценных артефактов моей семьи. Одна из немногих вещей, которые у нас сохранились от моей дорогой двоюродной бабушки Констанции."
ANV_a_looming_shadow:0 "Надвигающаяся тень"
ANV_a_looming_shadow_desc:0 "Что-то темное поднимается из болота, оно преследует людей, некоторые не могут спать, а тех, кто может, мучают кошмары."
ANV_call_to_the_thing_from_outer_space:0 "Зов к НЕЧТО из космоса"
ANV_call_to_the_thing_from_outer_space_desc:0 "Обадия говорит, что с Книгой в руках, активированным Данвичским обелиском и завершением строительства Болотных обелисков, лишь вопрос времени — когда нечто могущественное ответит на наш зов."
ANV_put_on_a_smile:0 "Продолжать улыбаться"
ANV_put_on_a_smile_desc:0 "Я усердно работаю, чтобы прокормить свою семью, как и все мужчины здесь. Нелегко жить американской мечтой, но, чёрт возьми, мы стараемся изо всех сил."
ANV_the_best_town_in_america:0 "Лучший город в Америке"
ANV_the_best_town_in_america_desc:0 "Мы только что избрали нашего нового губернатора, и теперь он сможет выбрать новую столицу нашей великой страны Андейл."
ANV_no_new_visitors:0 "Нет новых посетителей"
ANV_no_new_visitors_desc:0 "Местное население начало понимать, что те, кто приходит в Андейл, часто не возвращаются."
ANV_the_strange_meat_merchants:0 "Торговцы «Странным мясом»"
ANV_the_strange_meat_merchants_desc:0 "Секретный рецепт Уилсона, который знают все Торговцы и все жители пустоши. Тринадцать трав и специй Уилсона."
ANV_establish_a_caravan_company:0 "Основать Караванную Компанию"
ANV_establish_a_caravan_company_desc:0 "К нам стало приезжать больше караванов. Возможно, это связано с тем, что поселение быстро растет, а атмосфера здесь дружелюбная. Или люди, живущие дальше, еще не знают, что содержится в нашем мясе."
ANV_welcome_to_andale:0 "Добро пожаловать в Андейл"
ANV_welcome_to_andale_desc:0 "Что не так? Ты видишь что-то плохое в тихом городке, полном дружелюбных людей, посреди выжженной пустоши?"
ANV_family_first:0 "Семья прежде всего"
ANV_family_first_desc:0 "Семья прежде всего! И любой человек, который говорит иначе, говорит что-то не то. Такого человека нужно ударить. Палкой."
ANV_a_good_source_of_meat:0 "Хороший источник мяса"
ANV_a_good_source_of_meat_desc:0 "У некоторых караванщиков возникают подозрения относительно исчезновений местных жителей. Мы не можем позволить им подобраться слишком близко к нашему маленькому секрету."
ANV_where_are_the_johnsons:0 "Куда делись Джонсоны?"
ANV_where_are_the_johnsons_desc:0 "Марта, куда подевались Джонсоны? Они всё бросили?"
ANV_restore_overlook_drive_in:0 "Восстановить Автомобильный Кинотеатр"
ANV_restore_overlook_drive_in_desc:0 "Почему мы лучшие? Потому что мы вернули довоенный образ жизни. А в каком поселении, по вашему мнению, есть автокинотеатр?"
ANV_the_nuclear_family:0 "Послеядерная Семья"
ANV_the_nuclear_family_desc:0 "Ну, у меня тоже есть дети! Семья прежде всего — вот как это работает в Андейле!"
ANV_white_picket_fences:0 "Белые заборы"
ANV_white_picket_fences_desc:0 "Конечно, мы счастливая семья, у нас белый забор и развевается старый добрый американский флаг. Мы имеем на это полное право."
ANV_lindas_meat_pies:0 "Мясные пироги от Линды"
ANV_lindas_meat_pies_desc:0 "Кебабы Линды хороши, но она также начала печь мясные пироги. Она открыла два новых магазинчика."
ANV_clean_up_andale:0 "Уборка в Андейле"
ANV_clean_up_andale_desc:0 "Мы стараемся содержать город в чистоте, но после ядерной войны его стало трудно убирать. Но, эй, стоит попробовать."
ANV_strange_meat_empire:0 "Империя «Странного Мяса»"
ANV_strange_meat_empire_desc:0 "Пироги Линды действительно пользуются успехом. Это доказывает, что небольшой американский бизнес может процветать в Пустоши."
ANV_the_swamplands:0 "Жители Болот"
ANV_the_swamplands_desc:0 "Наши соседи в глубине болот обычно не самые приятные люди. Но неправильно осуждать их за это. На этот раз мы привезли партию мясных пирогов Линды."
ANV_restore_pilgrims_landing:0 "Восстановление Пилигримс-Лэндинг"
ANV_restore_pilgrims_landing_desc:0 "С Пилигримс-Лэндинг открывается такой прекрасный вид, правда? И мы могли бы открыть магазины по всему периметру. Представьте себе, сколько возможностей!"
ANV_the_point_lookout_pier:0 "Пирс Пойнт-Лукаут"
ANV_the_point_lookout_pier_desc:0 "Большинство зданий на пирсе стоят без дела, гордо возвышаясь над нами, единственное, что им нужно — это цель."
ANV_haleys_hardware:0 "Техник Хейли"
ANV_haleys_hardware_desc:0 "Хейли — хороший парень, он починил наше оборудование за разумную цену, нам бы пригодился такой человек, конечно, ему не обязательно знать о НАШЕМ маленьком секрете."
ANV_the_great_trash_heap:0 "Огромные мусорные кучи"
ANV_the_great_trash_heap_desc:0 "Куча мусора представляет собой облученный кошмар в Пойнт-Лукауте, привлекающий к себе находящихся поблизости гулей."
ANV_the_house_of_wares:0 "Маленький магазинчик"
ANV_the_house_of_wares_desc:0 "Первый магазин уже открылся на Пилигримс-Лэндинг. Его владелицей оказалась дружелюбная мадам Панада. Итак, мы собираемся инвестировать в ее бизнес и превратить его в империю."
ANV_point_lookout_peoples_bank:0 "Банк в Пойнт-Лукаут"
ANV_point_lookout_peoples_bank_desc:0 "Старый банк всё ещё стоит нетронутым на Пилигримс-Лэндинг. Мы должны вновь открыть этот банк, чтобы показать, как далеко продвинулся Пойнт-Лукаут."
ANV_the_dark_manor:0 "Темный особняк"
ANV_the_dark_manor_desc:0 "В этом особняке таятся темные секреты, я это чувствую."
ANV_the_gleaming_manor:0 "Блестящий особняк"
ANV_the_gleaming_manor_desc:0 "На другой стороне смотровой площадки Пойнт-Лукаут находится особняк-близнец. Если его вообще можно так назвать. Блэкхолл почернел, по нему расползаются странные лианы, а искривленные деревья окутывают его тенью. В то время, как особняк Кэлверта гордо возвышается на вершине холма с видом на океан. Доски его стен по-прежнему выкрашены в белый цвет даже спустя 200 лет."
ANV_restore_the_lighthouse:0 "Восстановить Маяк"
ANV_restore_the_lighthouse_desc:0 "Уже 200 лет как стоило бы заменить перегоревшую лампочку в маяке. Он чудом уцелел в Великой Войне, которая случилась всего в миле отсюда."
ANV_the_great_game:0 "Великая Игра"
ANV_the_great_game_desc:0 "Переключая радиостанции, Джеку удалось поймать сигнал от профессора Кэлверта."
ANV_the_sacred_bog:0 "Священное болото"
ANV_the_sacred_bog_desc:0 "Местное болото явно обладает какими-то неестественными свойствами. И суеверный Джек не станет это проверять."
ANV_arc_and_dove_cathedral:0 "Очистить собор от Рейдеров"
ANV_arc_and_dove_cathedral_desc:0 "Пришло время выгнать этих грязных дикарей из Собора или превратить их в следующую партию пирогов."
ANV_restore_calvert_mansion:0 "Восстановить поместье Кэлверта"
ANV_restore_calvert_mansion_desc:0 "Хотя особняк Кэлверта всё ещё в хорошем состоянии, кое-что можно было бы улучшить. Например, почему во всех стенах заложена взрывчатка? Это же очень небезопасно."
ANV_the_dark_book:0 "Тёмная книга"
ANV_the_dark_book_desc:0 "Кривбекни — тёмная книга, полная заклинаний и ритуалов. Одного её присутствия достаточно, чтобы свести одних с ума, а других заставить совершать ужасные поступки."
ANV_the_dunwich_horror:0 "Ужас в Данвиче"
ANV_the_dunwich_horror_desc:0 "Под Данвич-Билдинг находится артефакт великой силы. Он расположен немного южнее Тенпенни-Тауэр. Соответствующая демонстрация силы должна удержать обитателей пустошей от вмешательства в нашу работу."
ANV_constructed_swamp_obelisks:0 "Возвести Обелиски на Болотах"
ANV_constructed_swamp_obelisks_desc:0 "Глубокой ночью болотные жители воздвигли по всему болоту обелиски из обломков и костей. Среди них был замечен Обадия, направлявший их усилия."
ANV_andales_growing_militia:0 "Растущее ополчение в Ардейле"
ANV_andales_growing_militia_desc:0 "Взрослые сразу же пошли на избирательный участок и опустили бюллетени в урну. Как вы думаете, как это работает? Да, сэр, гражданский долг каждого американца — отдать свой голос за своего любимого кандидата-республиканца. Я прав?"
ANV_the_point_lookout_quarry:0 "Карьер в Пойнт-Лукаут"
ANV_the_point_lookout_quarry_desc:0 "Обадия говорит, что хочет продолжить некоторые старые привычки строительной компании Данвича."
ANV_dig_out_the_dunwich_parking_lot:0 "Раскопать парковку в Данвиче"
ANV_dig_out_the_dunwich_parking_lot_desc:0 "Обадий собирается поднять обелиск на поверхность. Чтобы зов был ещё дальше."
ANV_it_compels_us_to_dig:0 "Это заставляет нас копать"
ANV_it_compels_us_to_dig_desc:0 "Город испорчен с самого начала. Не знаю, как, но это не так. Растения, которые мы выращиваем, со временем постепенно теряют цвет. А некоторые приобрели странный привкус."
ANV_a_falling_comet:0 "Падающая комета"
ANV_a_falling_comet_desc:0 "Странная комета упала глубоко в Сердце Болот, и странные миазмы наполняют воздух."
ANV_the_decent:0 "Падение в безумие"
ANV_the_decent_desc:0 "Жители Андейла всё глубже скатываются в безумие. Некоторые несут всякую чушь, другие нападают на чужаков. В этом месте происходят тёмные вещи."
ANV_andales_unholy_church:0 "Нечестивая церковь Андейла"
ANV_andales_unholy_church_desc:0 "Культисты не просто нашли убежище в старой церкви, они еще и превратили ее в свою базу."
ANV_rituals_for_a_sleeping_god:0 "Ритуалы для Спящего Бога"
ANV_rituals_for_a_sleeping_god_desc:0 "Принесите ему большую жертву. Давайте пробудим Его. Услышьте наш зов, Уг-Куолтот, и внемлите нашим мольбам."
ANV_a_haunting_in_the_swamp:0 "Призраки на болотах"
ANV_a_haunting_in_the_swamp_desc:0 "По болоту бродят какие-то безумные и уродливые твари. Они похищают людей по ночам и вешают их, совершая своего рода ритуал."
ANV_restore_blackhall_manor:0 "Восстановить поместье Блэкхолл"
ANV_restore_blackhall_manor_desc:0 "До Великой Войны Блэкхолл был домом успешной и влиятельной семьи. И Обадия хотел бы, чтобы он вернулся к былой славе. Это было бы чудесно, не правда ли?"
ANV_turtle_dove_detention_camp:0 "Лагерь заключения «Тартл Доу»"
ANV_turtle_dove_detention_camp_desc:0 "Старый довоенный лагерь, предназначенный для задержания и допросов предполагаемых китайских шпионов. Конечно, мы всегда можем использовать его в своих интересах."
ANV_currupt_calver_manor:0 "Испортить поместье Кэлверта"
ANV_currupt_calver_manor_desc:0 "После изгнания племен из Андейла и исчезновения этого упыря, пора переезжать в поместье близнецов."
ANV_the_twin_manors_of_point_lookout:0 "The Twin Manors of Point Lookout"
ANV_the_twin_manors_of_point_lookout_desc:0 "With both the Manors of Point Lookout firmly under the control of Obadiah his power rings true throughout the Swamp."
ANV_a_maddening_call:0 "Сводящий с ума зов"
ANV_a_maddening_call_desc:0 "Что-то подталкивает Обадию и его культиста к новым нападениям, даже на его собственных жителей. Это лишь вопрос времени, когда они найдут город, на который можно напасть."
ANV_reclaim_the_obsidian_skull:0 "Вернуть Обсидиановый Череп"
ANV_reclaim_the_obsidian_skull_desc:0 "В Апокрифах Посейдона хранится древний артефакт, затерянный в болоте более 200 лет назад. И он зовёт."
ANV_old_dunwich_mines:0 "Старые шахты Данвича"
ANV_old_dunwich_mines_desc:0 "Южная часть Столичной пустоши полна старых шахт. Некоторые из них представляли особый интерес для Данвичской компании."
ANV_constances_doll:0 "Кукла Констанции"
ANV_constances_doll_desc:0 "Констанция Блэкхолл — изначальный лидер Культа. Некоторые говорят, что её тёмная сила всё ещё хранится в этой проклятой Кукле."
ANV_a_cult_following:0 "Последователи Культа"
ANV_a_cult_following_desc:0 "Обадия так близок к разгадке того, что его семья пытается разгадать уже много лет."
ANV_blackhalls_spell:0 "Заклятие Блэкхолла"
ANV_blackhalls_spell_desc:0 "Семья Блэкхолл печально известна своей способностью создавать культы и заманивать в них людей."
ANV_blackhall_inner_circle:0 "Внутренний круг Блэкхолла"
ANV_blackhall_inner_circle_desc:0 "Изначально у Констанции был внутренний круг наиболее преданных культистов, который помогал всему идти гладко и проводить ритуалы там, где это было необходимо."
ANV_finish_the_obelisk:0 "Завершить Обелиск"
ANV_finish_the_obelisk_desc:0 "Теперь, когда все под рукой, Обадия наконец может приступить к работе по пробуждению \nУг Куолтота."
ANV_the_collapsing_cosmoses:0 "Создания из Глубин"
ANV_the_collapsing_cosmoses_desc:0 "Океаны раздуваются, и существа поднимаются."
ANV_the_thing_on_the_doorstep:0 "НЕЧТО у порога"
ANV_the_thing_on_the_doorstep_desc:0 "Он прозвенел по всей Столичной Пустоши, и те, у кого были слабые умы, отозвались и ушли в ночь."
ANV_the_whispers_in_the_dark:0 "Шепчущий в темноте"
ANV_the_whispers_in_the_dark_desc:0 "Обадий слышит ЕГО. НЕЧТО зовёт его ночной тьмы. ОНО рассказывает ему разные вещи, учит его."
ANV_the_obsidian_skull:0 "Обсидиановый Череп"
ANV_the_obsidian_skull_desc:0 "Череп был утерян веками. После Гражданской войны его отобрали у моей семьи и спрятали, чтобы ослабить нашу власть."
ANV_it_stalks_the_shadows:0 "ОН наблюдает из тени"
ANV_it_stalks_the_shadows_desc:0 "У некоторых мужчин возникает странное чувство, будто за ними постоянно наблюдают."
ANV_the_moons_gaze:0 "Взгляд Луны"
ANV_the_moons_gaze_desc:0 "Луны заставляют всех нервничать. Взгляд на Луну вселяет в наших культистов чувство страха и смертности. Некоторые полностью заколотили окна, утверждая, что даже свет не даёт им спать по ночам."
ANV_effigies_to_render:0 "Отражение кошмаров"
ANV_effigies_to_render_desc:0 "Наши жрецы начали создавать изображения того, что они видят во сне, того, что таится в тенях."
ANV_a_temple_to_build:0 "Храм, который нужно построить"
ANV_a_temple_to_build_desc:0 "Чего-то не хватает нашему великому богу. Великого храма, в честь Уг Куолтота."
ANV_reap_devotion:0 "Жатва верных"
ANV_reap_devotion_desc:0 "Верующие в Уг Куолтота сделают все, чтобы служить своему богу, даже если это означает рисковать своими жизнями."
ANV_a_friend_indeed:0 "Настоящие друзья"
ANV_a_friend_indeed_desc:0 "Конечно, мы помогаем нашим друзьям, это добрососедский поступок, но самое главное — это христианский поступок."
ANV_a_town_of_killers:0 "Город Убийц"
ANV_a_town_of_killers_desc:0 "В близлежащих поселениях распространились слухи. Просто приглушённые слухи. Передающиеся шёпотом пьяницами из каравана."
ANV_the_mysterious_firm:0 "Таинственная фирма"
ANV_the_mysterious_firm_desc:0 "Они обратились к нам с разовым предложением: «Мы предоставляем услугу, а вы платите за неё. На этом ваши вопросы заканчиваются. Понятно?»"
ANV_contract_killers:0 "Наемные убийцы"
ANV_contract_killers_desc:0 "Генеральный директор Дэниел Литторн видит в нас потенциал и направил некоторых из своих лучших агентов, чтобы помочь нам в наших будущих начинаниях."
ANV_opening_a_new_office:0 "Открытие нового офиса"
ANV_opening_a_new_office_desc:0 "Консультанты Литторна открыли офис в соседнем здании и начали проводить «Операции для вашей выгоды»."
ANV_a_new_contract:0 "Новый заказ"
ANV_a_new_contract_desc:0 "В целях продолжения оказания помощи Литторну они хотят быть уверены, что, когда придет время, мы не повлияем на их итоговый результат."
ANV_agents_of_chaos:0 "Агенты «Хаоса»"
ANV_agents_of_chaos_desc:0 "Агенты «Хаоса» глубоко укоренились в Андейле, и по городу начали распространяться слухи о новых злодеяниях."
ANV_massed_infantry_formations:0 "Пограничная Война"
ANV_massed_infantry_formations_desc:0 "Как и великие поселенцы древности, мы будем защищать свои дома с пушками в руках."
ANV_a_proper_militia:0 "Настоящее ополчение"
ANV_a_proper_militia_desc:0 "Люди, которые изгоняли нас, издевались над нами, крепнут вокруг нас, угрожая всему, что мы построили, а вам всё равно?"
ANV_everything_we_need_is_here:0 "Все, что нам нужно, здесь"
ANV_everything_we_need_is_here_desc:0 "У Рич Мэна есть всё, что нужно стране, чтобы стать могущественной силой. Старый фабричный район до сих пор практически нетронут, а музеи не разграблены за все эти годы."
ANV_standard_issue_muskets:0 "Мушкеты стандартного образца"
ANV_standard_issue_muskets_desc:0 "Нехватка ресурсов, знаний об оружии и доступность производства делают кремневые ружья идеальным выбором. 50-калиберный патрон уничтожит практически что угодно одним выстрелом, хотя и лягается как мул."
ANV_american_home_defense:0 "Американская Внутренняя Оборона"
ANV_american_home_defense_desc:0 "Мы должны защищать свои дома, как это делали американцы, которые были до нас, используя роботов с пилами и огнеметами, способные убивать без угрызений совести."
ANV_dust_off_old_cannons:0 "Сдуйте пыль со старых пушек"
ANV_dust_off_old_cannons_desc:0 "В этом районе есть пять старых фортов, мы можем разграбить старые пушки времен гражданской войны и установить их для обороны вокруг Рич Мэна."
ANV_sentry_death_bots:0 "Роботы - несущие смерть"
ANV_sentry_death_bots_desc:0 "С помощью нескольких кустарных модификаций мы сможем вселять страх в наших врагов, используя этих сторожевых роботов."
ANV_robot_repair_center:0 "Центр починки Роботов"
ANV_robot_repair_center_desc:0 "В Рич Мэне всё ещё осталось несколько центров по ремонту роботов. Большинство роботов были уничтожены, но старые схемы и руководства по эксплуатации все еще остаются запертыми в ящиках столов и шкафах."
ANV_robco_facility:0 "Предприятие «RobCo»"
ANV_robco_facility_desc:0 "В самом сердце Рич Мэна за горой обломков лежало практически нетронутое предприятие «RobСo». Только после расчистки зон для дополнительного места, мы нашли эту жемчужину."
ANV_pre_war_way_of_life:0 "Довоенный образ жизни"
ANV_pre_war_way_of_life_desc:0 "От универсальных роботов до полноценных боевых машин — роботы могли сделать практически всё для жителей довоенной эпохи. Почему бы нам не показать жителям Столичной Пустоши, какой долгий путь мы прошли?"
ANV_legions_of_the_damned:0 "Защитники нашего дома"
ANV_legions_of_the_damned_desc:0 "Будь то холодные бесчувственные роботы, злые бесчувственные бизнесмены или наши собственные люди, мы должны быть благодарны тем, кто защищает наши дома."
ANV_a_baptism_of_blood:0 "Крещение кровью"
ANV_a_baptism_of_blood_desc:0 "Некоторые из местных жителей хотят устроить большой праздник, но из-за большого наплыва гостей некоторые из них могут раскрыть наш маленький секрет."
ANV_signs_of_another_war:0 "Признаки Другой Войны"
ANV_signs_of_another_war_desc:0 "В ходе раскопок в районе мыса Пойнт-Лукаут мы, похоже, обнаружили следы Гражданской войны, описанные в документах, найденных в Рич Мэне. Похоже, мы раскопали старые захоронения: вся кожа сгнила, остались только шляпы."
ANV_who_wants_the_first_slice:0 "Кто хочет первый кусок?"
ANV_who_wants_the_first_slice_desc:0 "Поселения Столичной Пустоши считают, что могут ущемлять наше право на свободу. Ну, позвольте мне вам кое-что сказать. Их ждет кое-что особенное."
ANV_lambs_to_the_slaughter:0 "Агнец на Бойне"
ANV_lambs_to_the_slaughter_desc:0 "Поскольку жители Мегатонны находятся под нашим контролем, они подчиняются нашим законам."
ANV_crack_megatons_armory:0 "Взломать арсеналы Мегатонны"
ANV_crack_megatons_armory_desc:0 "В таком крупном поселении, как Мегатонна, наверняка что-то хранится глубоко в арсенале."
ANV_daves_scrap_heap:0 "Куча металлолома Дэйва"
ANV_daves_scrap_heap_desc:0 "После распада Республики Дэйва и его смерти не осталось никаких лачуг и заборов, составляющих его Старую Республику."
ANV_give_me_liberty_or_give_me_death:0 "Дарующий свободу или смерть"
ANV_give_me_liberty_or_give_me_death_desc:0 "Анклав, как они себя называют. Ходят повсюду, заявляя, что они последние граждане Соединённых Штатов, но при этом продолжают убивать добропорядочных вирджинцев."
ANV_cans_of_meat:0 "Мясные консервы"
ANV_cans_of_meat_desc:0 "Большая винтовка или мощный взрыв легко уничтожат силовую броню Анклава. Хоть мы и предпочитаем использовать винтовку, все равно он них остается немного мяса."
ANV_in_the_militias_hands:0 "В руках ополченцев"
ANV_in_the_militias_hands_desc:0 "Если правительство Соединённых Штатов намерено напасть на добрый американский народ, пора бы ополчению штатов постоять за себя. Было бы лучше, если бы Оружейная Анклава была зачищена и перемещена к нам."
ANV_colonel_autumns_access_card:0 "Карта доступа Полковника Отэма"
ANV_colonel_autumns_access_card_desc:0 "С картой Полковника и кодами мы получаем практически неограниченный доступ к объекту."
ANV_clean_out_raven_rock:0 "Отчистка Рэйвен-Рока"
ANV_clean_out_raven_rock_desc:0 "После того, как Анклав распался, и Рэйвен-Рок был зачищен, у нас появилось время перепрофилировать объект."
ANV_andale_command_center:0 "Командный центр Андейла"
ANV_andale_command_center_desc:0 "После того, как наши лучшие специалисты осмотрели объект, они обнаружили, что он намного превосходит всё, что они когда-либо видели."
ANV_devour_the_lot:0 "Пожирать их всех"
ANV_devour_the_lot_desc:0 "Большинство людей, находящихся под контролем Поселений Столичной Пустоши, оказались недовольны нашим маленьким секретом и начали бунтовать. Я думаю, пришло время разобраться с этим."
ANV_wheres_your_smile:0 "Где же ваши улыбки?"
ANV_wheres_your_smile_desc:0 "Остальные из вас должны быть счастливы. Рады, что не попали в рагу, как остальные ваши соседи."
ANV_littlehorn_home_office:0 "Родной офис Литторна"
ANV_littlehorn_home_office_desc:0 "Это место изначально было офисом компании «Littlehorn and Associates», прежде чем они занялись другим бизнесом."
ANV_earthly_angel_meet_demon_spawn:0 "Ангел, встретивший Демона"
ANV_earthly_angel_meet_demon_spawn_desc:0 "Регуляторы противостоят «Littlehorn and Associates». Одним из важнейших факторов, повлиявших на их уход из столичного региона, стал рост популярности регуляторов в поселениях. Но это пора заканчивать."
ANV_soultakers:0 "Душегубы"
ANV_soultakers_desc:0 "После того, как мы завершили свои дела, я думаю, справедливо, что другие люди порой предполагают, что мы далеко не самые лучшие люди."
ANV_the_death_of_daves_strongest_soldier:0 "Смерть сильнейшего солдата Дэйва"
ANV_the_death_of_daves_strongest_soldier_desc:0 "Сильнейший солдат Дэйва ещё не убит. Думаю, пора объявить награду за его голову — 10 тысяч крышек и звание самого безумного каннибала Андейла."
ANV_richmond_romington_arms_co:0 "Компания «Ричмонд-Ромингтон Армс»"
ANV_richmond_romington_arms_co_desc:0 "В арсенале Ромингтона в Ричмонде, штат Вирджиния, имеется завод по производству мушкетов 58-го калибра и невероятно подробные чертежи того, как их изготавливать."
ANV_clean_up_the_devastation:0 "Ликвидировать последствия разрушений"
ANV_clean_up_the_devastation_desc:0 "Ричмонд сильно пострадал от Великой Войны: небольшие ядерные кратеры усеяли город, словно прыщи. Город полностью разрушен, как и Вашингтон."
ANV_richmond_arms_manufacturing:0 "Оружейная мануфактура Ричмонда"
ANV_richmond_arms_manufacturing_desc:0 "Ничто не сравнится с трудолюбивыми американцами, создающими одно из своих самых ценных сокровищ — огнестрельное оружие, которое не позволяет чужакам ступать на нашу землю."
ANV_the_capital_of_a_nation:0 "Столица нашей Нации"
ANV_the_capital_of_a_nation_desc:0 "Каждой великой нации нужна великая столица. И, судя по истории Ричмонда, он когда-то был столицей государства, хотя и неясно, когда именно."
ANV_black_powder_cannons:0 "Пороховые пушки"
ANV_black_powder_cannons_desc:0 "Во многих фортах и ​​музеях до сих пор хранятся старые пушки, которых достаточно, чтобы укрепить многие из наших городов с помощью пушек."
ANV_fort_burnham:0 "Форт Бернхэм"
ANV_fort_burnham_desc:0 "Форт Бернхэм, некогда выдающийся оборонительный пункт для внушительных орудий, превращённый в музей после войны. Мы вновь его переоборудуем в настоящий форт для еще одной послевоенной операции."
ANV_richmond_butcher_shop:0 "Мясная лавка Ричмонда"
ANV_richmond_butcher_shop_desc:0 "Бизнес Линды с мясными пирогами действительно набирает обороты. Новоселы Андейла просто жаждут мяса."
ANV_richmond_bunker_system:0 "Оборонная система Ричмонда"
ANV_richmond_bunker_system_desc:0 "В довоенный период Ричмонд был домом для многих сенаторов. Поэтому здесь расположено множество бункеров для размещения правительственных чиновников, избранных для поддержания порядка."
ANV_restore_the_virginia_state_capital:0 "Восстановить столицу Вирджинии"
ANV_restore_the_virginia_state_capital_desc:0 "Столица общего дела, затем столица двух наций. И нам пора здесь навести порядок."
ANV_a_nation_of_old:0 "Древняя нация"
ANV_a_nation_of_old_desc:0 "Когда-то старый город добряков, недавно избравший мэра, стал процветающей страной с богатой историей."
ANV_a_bloody_feast:0 "Кровавое празднование"
ANV_a_bloody_feast_desc:0 "Наши конгрессмены устраивают большое празднование в Новой столице, в частности, потому, что у них возникли некоторые проблемы с некоторыми из наших соседей."
ANV_assemble_virginias_militia:0 "Собрать ополчение Вирджинии"
ANV_assemble_virginias_militia_desc:0 "Собирайте ополчение, мы должны пойти на войну за землю, которая принадлежит Вирджинии."
ANV_a_new_kind_of_warfare:0 "Новый вид Войны"
ANV_a_new_kind_of_warfare_desc:0 "Чтобы победить, мы должны быть непредсказуемыми. Наших людей много, а промышленности мало, но это нас не останавливает. Если мы хотим господствовать на пустошах, мы должны оставить технологии позади. Лазеры не победят в тот день, когда победит наша численность."
ANV_more_men_more_guns:0 "Больше людей - больше пушек"
ANV_more_men_more_guns_desc:0 "Мы должны задействовать все, что можем. Граждане, возьмите оружие, которое вам больше не нужно, отдайте его ополчению, все что угодно поможет."
ANV_night_attacks:0 "Атаки по ночам"
ANV_night_attacks_desc:0 "Стреляйте из полевых орудий для улучшения видимости в темноте. Используйте модифицированные осколочные снаряды, выбрасывающие магниевые гранулы, которые, если враг подойдет достаточно близко, мгновенно превратят его в приготовленную еду."
ANV_andale_black_powder_company:0 "Андейлская Пороховая Компания"
ANV_andale_black_powder_company_desc:0 "Вирджиния процветает за счёт малого бизнеса, поэтому правительство хочет инвестировать в оружейные компании. А лучший способ победить врага — это увеличить выпуск оружия."
ANV_reclaim_the_virginia_swamps:0 "Вернуть болота Вирджинии"
ANV_reclaim_the_virginia_swamps_desc:0 "Люди, которые правят болотами Вирджинии, представляют угрозу нашему образу жизни, и с ними нужно обращаться как с дичью."
ANV_swampfolk_arms:0 "Оружие жителей Болот"
ANV_swampfolk_arms_desc:0 "Глубоко в болотах находится старый заброшенный объект, который можно было бы отремонтировать, проведя серьёзную работу."
ANV_unite_virginia:0 "Объединить Вирджинию"
ANV_unite_virginia_desc:0 "Сейчас не время праздновать. Мне ещё предстоит война с моими коллегами-конгрессменами."
ANV_the_swamp_fort:0 "Форт в Болотах"
ANV_the_swamp_fort_desc:0 "Глубоко в Болотах находится старый форт. Бойцы не смогли бы его найти, но заблудились и случайно наткнулись на него."
ANV_the_last_true_americans:0 "Последние Настоящие Американцы"
ANV_the_last_true_americans_desc:0 "Мы — последняя истинная Республика, восставшая из пламени и возродившая нашу столицу. На улицах празднуют, а конгрессмены устраивают чудесный пир для всех тех, кому не нравится наш маленький секрет."
ANV_dealing_with_the_smugglers:0 "Разобраться с Контрабандистами"
ANV_dealing_with_the_smugglers_desc:0 "Контрабандисты бродят по Пойнт-Лукауту в надежде разбогатеть, роясь в этом относительно нетронутом запустении."
ANV_hang_traitorous_officers:0 "Повесить офицеров-предателей"
ANV_hang_traitorous_officers_desc:0 "Многим нашим офицерам заплатили контрабандисты, в результате чего большая часть нашего оборудования была продана нашим врагам."
ANV_bog_walkers:0 "Болотники"
ANV_bog_walkers_desc:0 "Пойнт-Лукаут находится под властью только одного человека, и ополчение Андейла с гордостью это осознает."
ANV_hire_smuggler_officers:0 "Нанять офицеров-контрабандистов"
ANV_hire_smuggler_officers_desc:0 "Возможно, экспорт оружия и ресурсов не будет для нас самым худшим вариантом."
ANV_den_of_liars:0 "Логово лжецов"
ANV_den_of_liars_desc:0 "Нам потребовалась целая вечность, но мы наконец нашли его. Их запасы, Святой Грааль добычи."
ANV_the_smugglers_end:0 "Конец контрабандистов"
ANV_the_smugglers_end_desc:0 "После полного вытеснения контрабандистов из Пойнт-Лукаут мы ожидаем восстановление качества и количества наших поставок."
ANV_the_swamp_folk:0 "Болотный Народ"
ANV_the_swamp_folk_desc:0 "Дикари, недружелюбны и необразованны. Болотные жители терроризируют жителей Пойнт-Лукаута. Пришло время придумать решение."
ANV_sell_moonshine:0 "Продажа самогона"
ANV_sell_moonshine_desc:0 "Нам не очень нравится резкий вкус самогона, мы предпочитаем вино и виски. Конечно, мы всегда можем добавить их к товарам в наши караваны с мясными пирогами."
ANV_the_trapper_shack:0 "Хижина охотника"
ANV_the_trapper_shack_desc:0 "Старая хижина охотника расположена глубоко в болотах Пойнт-Лукаут. Болотный народ почти не пользуется ею, а то, что мы поймали возле хижины, можно было бы использовать для наших мясных пирогов."
ANV_swamp_folk_trading_company:0 "Торговая Компания к Болотному Народу"
ANV_swamp_folk_trading_company_desc:0 "Наши отношения с болотным народом крепнут, и они согласились помочь нам в обмен на мясные пироги и, конечно же, на перемирие. Тонкости придётся уладить позже."
ANV_the_velvet_curtain:0 "Бархатный занавес"
ANV_the_velvet_curtain_desc:0 "Выполнив ряд инструкций, один из наших агентов нашел старый китайский разведывательный бункер; часть оборудования в нем может оказаться очень полезной."
ANV_point_lookout_boom_sticks:0 "Бум-палки Пойнт-Лукаута"
ANV_point_lookout_boom_sticks_desc:0 "Двуствольные ружья Пойнт-Лукаут очень действенны против местных жителей. При более детальном изучении мы смогли понять, как изготавливается это оружие."
ANV_this_is_our_swamp:0 "Это наше Болото"
ANV_this_is_our_swamp_desc:0 "Болотный народ и Андейл пришли к мирному соглашению, полностью интегрировав их в нашу культуру, конечно, с некоторыми негативными последствиями."
ANV_convert_moonshiner_shacks:0 "Переоборудовать хижины самогонщиков"
ANV_convert_moonshiner_shacks_desc:0 "Нам не нужен самогон, нам нужны только человечина и пушки."
ANV_derelict_point_lookout_buildings:0 "Заброшенные здания Пойнт-Лукаута"
ANV_derelict_point_lookout_buildings_desc:0 "Многие здания около пирса сгнили из-за сурового болотного климата."
ANV_reopen_the_point_lookout_motel:0 "Открытие мотеля Пойнт-Лукаут"
ANV_reopen_the_point_lookout_motel_desc:0 "Мотель около пирса Пойнт-Лукаут мог бы стать отличным местом для туристов и мог бы решить проблему запрета на посещение."
ANV_obadiah_descends_into_the_book:0 "Завершить нечестивый ритуал"
ANV_obadiah_descends_into_the_book_desc:0 "Обадия наконец раскрыл последние этапы ритуала. С этим последним этапом мы займём своё законное место в этом мире и за его пределами."
ANV_an_antique_land:0 "Античная земля"
ANV_an_antique_land_desc:0 "Район Пойнт-Лукаут богат историей и богат ресурсами. Нам следует бережно относиться к этой земле."
ANV_pliks_safari:0 "Пликс Сафари"
ANV_pliks_safari_desc:0 "Пликс устраивает что-то вроде перестрелки в стиле «Сафари», и всего за пару крышек. Это звучит как веселое, как в старые добрые."
ANV_walking_with_spirits:0 "Прогулка с Духами"
ANV_walking_with_spirits_desc:0 "Некоторые местные племена научили нас выращивать эти растения Пунга, они будут хорошо сочетаться с необычным мясом в рагу."
ANV_acquire_an_army:0 "Армия безумцев"
ANV_acquire_an_army_desc:0 "Блэкхолл говорит, что он мог бы убедить многих рейдеров к востоку от нас сражаться на нашей стороне. Нам просто нужна демонстрация силы, чтобы заставить их повиноваться."

###Tooltips###
ANV_tt_6:0 "Открывает нового экономического советника для улучшения нашего имиджа"
ANV_tt_5:0 "Литтлхорн присоединяется к нашему Верховному командованию"
