####Ideas####
dcr_slave_export:0 "Работорговцы"
dcr_slave_export_desc:0 "Никто в Столичных Пустошах не использует рабов. Хорошо, что Питт это делает."
dcr_raider_interior_design:0 "Рейдерский дизайн интерьеров"
dcr_raider_interior_design_desc:0 "Трупы, свисающие с потолков, головы на шипах, кровь вместо краски. Сделайте наши лагеря как можно более страшными. Любой житель пустоши, который подойдет к нам, должен бежать в страхе."
dcr_plentiful_stockpiles:0 "Большие запасы"
dcr_plentiful_stockpiles_desc:0 "Здесь и двух шагов не пройдешь, чтобы не найти какую-нибудь старую армейскую базу или бункер, полный оружия. У нас есть все необходимые детали, чтобы починить старое оружие или заменить сломанное. А теперь вернемся к грабежам."
DCR_slavery_focus_idea:0 "Преданные работорговцы"
DCR_slavery_focus_idea_desc:0 "Порабощение отбросов пустошей и их продажа в Парадайз-Фоллс превратилось в крупный бизнес. Конечно, некоторые нытики пытаются нападать на нас из-за того, что мы продали их дядю, сестру или кого-то ещё, но мы просто продадим и их!"
DCR_merc_work_idea:0 "Наёмничество"
DCR_merc_work_idea_desc:0 "Может это и не рейдерство, но близко к тому. Мы все еще убиваем людей, грабим их пожитки и получаем за это деньги. Нам просто говорят, кого можно убивать, а кого нет, и это немного раздражает"
DCR_some_trade_idea:0 "Немного торговли"
DCR_some_trade_idea_desc:0 "Нам приходится пропускать определенные караваны, которые заходят на нашу территорию. Улыбающийся Джек заключил с нами сделку на доставку припасов, и если мы их пристрелим, то больше не получим припасов"
DCR_molerat_hunts_idea:0 "Охота на кротокрыс"
DCR_molerat_hunts_idea_desc:0 "Немного странно, что мы просто отстреливаем кротокрыс, но, думаю, что мелкая цель лучше. Новому мясу нужно же как-то научиться попадать по движущейся мишени."
DCR_raider_rebrand_idea:0 "Рейдерский ребрендинг"
DCR_raider_rebrand_idea_desc:0 "Это огромная перемена, но в конечном итоге эта банда грязных дегенератов станет ценными работниками Бриггской Мясной Компании."
DCR_dominate_niche_idea:0 "Доминировать торговлей мясом"
DCR_dominate_niche_idea_desc:0 "Мясная торговля в Столичной Пустоши ведется в основном неорганизованными охотниками и редкими фермерами браминов. Ни один из них не может конкурировать с масштабами Briggs' Meat Company."
DCR_old_farming_wisdom_idea:0 "Старая фермерская мудрость"
DCR_old_farming_wisdom_idea_desc:0 "Большинство руководств по сельскому хозяйству не пережило последние 200 лет, но мы нашли несколько полезных советов."
DCR_economies_of_scale_idea:0 "Экономия за счет масштаба"
DCR_economies_of_scale_idea_desc:0 "Промышленные корма, мясоперерабатывающие заводы и растительный крахмал, заменяющий Чудо-клей, — всё это делает каждую партию нашего «Кротокрысова Чудо-Мяса» гораздо дешевле, чем раньше. Потребителю не обязательно знать об этом."
DCR_marketing_department_idea:0 "Отдел маркетинга"
DCR_marketing_department_idea_desc:0 "Никто не захочет покупать мясо у парня, который носит ожерелье из ушей. Они также не доверяют человеку, который убил их бабушку две зимы назад. Наш отдел маркетинга учитывает эти и другие важные моменты, продавая нашу продукцию жителям пустоши."
DCR_economies_of_scale_2_idea:0 "Экономия на масштабе"
DCR_economies_of_scale_2_idea_desc:0 "Промышленные корма, мясоперерабатывающие заводы и растительный крахмал, заменяющий Чудо-клей, — всё это делает каждую партию нашего «Кротокрысова Чудо-Мяса» гораздо дешевле, чем раньше. Потребителю не обязательно знать об этом."
DCR_molerat_industrial_complex_idea:0 "Промышленный комплекс «Чудо-мяса»"
DCR_molerat_industrial_complex_idea_desc:0 "Мы контролируем каждый этап производства «Чудо-мяса» — от еды, которую едят кротокрысы, до упаковки их сушеного мяса. Этот контроль над каждым этапом цепочки поставок даёт нам такое конкурентное преимущество, что никто даже не хочет оспаривать наше господство на рынке."
DCR_diversified_business_idea:0 "Диверсифицированный бизнес"
DCR_diversified_business_idea_desc:0 "«Чудо-мясо» из кротокрыс — это лишь часть нашего бизнес-плана. Однако выход на другие рынки обойдётся недёшево."
DCR_security_contracts_idea:0 "Контракты на обеспечение безопасности"
DCR_security_contracts_idea_desc:0 "Наша корпоративная служба безопасности добилась определённых успехов в поиске работы в качестве наёмных охранников. Часть из них перешла в компанию Briggs Security Company."
DCR_corporate_espionage_idea:0 "Корпоративный шпионаж"
DCR_corporate_espionage_idea_desc:0 "Специальное подразделение нашей компании будет заниматься защитой наших корпоративных секретов и сбором информации о наших конкурентах."
DCR_economic_leviathan_idea:0 "Экономический Левиафан"
DCR_economic_leviathan_idea_desc:0 "Почти у каждого жителя Столичной Пустоши дома есть хотя бы один продукт Briggs Company. Мы их кормим, одеваем и даже даем им в руки оружие, чтобы они могли защищать свои дома. Они зависят от нас, и это даёт нам огромное преимущество."
DCR_raiding_focus_idea:0 "Изменить направление"
DCR_raiding_focus_idea_desc:0 "Бриггс всегда был подлым сукиным сыном, но в последнее время он все чаще подталкивает своих парней к грабежам и набегам."
DCR_slaver_synnergy_idea:0 "Синергия работорговцев"
DCR_slaver_synnergy_idea_desc:0 "Питтсбург вынужден полагаться на нас как на своего главного поставщика рабов. Теперь они действуют по нашему графику и забирают груз там, где мы скажем."
DCR_harnessed_flame_idea:0 "Одержимые пламенем"
DCR_harnessed_flame_idea_desc:0 "Рейдеры всегда любили огонь. Как и они сами, он разрушителен и трудноуправляем. Но, похоже, новое руководство вновь пробудило интерес рейдеров: они нехарактерно сосредоточены на использовании огнеметного оружия и разработке более смертоносного топлива для своих огнеметов."
DCR_flame_worship_idea:0 "Поклонение пламени"
DCR_flame_worship_idea_desc:0 "Огонь был одной из самых могущественных сил мира ещё до появления человека. Его следует уважать и поклоняться. Только тогда, когда к огню относятся с должным почтением, его можно использовать должным образом."
DCR_slave_colonies_idea:0 "Рабские колонии"
DCR_slave_colonies_idea_desc:0 "Людей сотнями порабощают, заставляя быть, словно трутнями в колонии королевы муравьев. Рабочие трудятся на мастерских, в шахтах и на полях. Те, кто умирает, становятся пищей для потомства."
DCR_ant_cult_idea:0 "Культ Муравья"
DCR_ant_cult_idea_desc:0 "Муравей — высшая форма жизни на этой планете. Хотя мы всего лишь слабые люди, мы всё же можем быть полезны и помочь им установить своё господство."
DCR_empire_of_ant_idea:0 "Империя Муравьёв"
DCR_empire_of_ant_idea_desc:0 "Эра человека давно прошла, и муравьи — истинные хозяева этого нового мира. Вскоре остальная часть пустоши узнает их мощь."
DCR_rivet_city_trade_idea:0 "Рынок Ривет-Сити"
DCR_rivet_city_trade_idea_desc:0 "У нас есть магазинчик на рынке Ривет-Сити, где продается наша продукция. Закрепление на одном из крупнейших рынков региона приносит фантастическую прибыль!"
DCR_buying_molerat_meat_idea:0 "«Чудо-мясо»"
DCR_buying_molerat_meat_idea_desc:0 "Мы разрешили мистеру Бриггсу продавать своё чудо-мясо на рынке. Хотя это и отвлекает часть наших клиентов, дешёвое мясо хорошо хранится и помогает нашим силам безопасности питаться во время дальних патрулей."
DCR_raiders_at_heart:0 "Рейдер в душе"
DCR_raiders_at_heart_desc:0 "Наркоторговля и продажа рабов могут приносить некоторую прибыль, но по сути каждый рейдер стремится сеять убийства и хаос, а получение крышек — это второстепенная награда."
dcr_drug_runners:0 "Наркоторговля"
dcr_drug_runners_desc:0 "Мы начинали с продажи химикатов тем, кто может заплатить, и убийства тех, кто вдруг оказался не в состоянии это сделать."

####Characters and Traits####
 dcr_ryan_brigg_name:0 "Райан Бригг"
 dcr_ryan_brigg_desc:0 "Никто из его людей не знает, что Райан Бригг вообще не склонен к рейдам. Его истинная цель — превратить мясо кротокрыса во что-то более съедобное и разбогатеть, продавая его во всех городах Пустоши. А пока он сохраняет маску ублюдка. Он — безжалостный лидер рейдеров, который убьет подчиненного за то, что тот надоедал ему, потому что, если кто-то из них заподозрит, что он не тот человек за кого себя выдает, то сгниет вместе с пойманными им кротокрысами." 
 dcr_little_bart_desc:0 "Сын печально известного рейдера «Большого Злого Барта» и жрицы с болот, торговавшей наркотиками, Малышка Большой Барт унаследовал гениальность матери, силу отца и характер, превосходящий их вместе взятых. Возглавив вашингтонских рейдеров, он жаждет отомстить убийцам своего отца и заодно накачать наркотой всю пустошь."
 dcr_brains_and_brawn:0 "Мозги и мускулы"
 dcr_antagonizer_name:0 "НеМирмика"
 DCR_ANTAGONIZER_DESC:0 "Цель НеМирмики — ни больше ни меньше как уничтожение человечества и начало эпохи муравьёв. Пока она не сможет собрать достаточное количество муравьёв, этих налётчиков будет достаточно."
 dcr_torcher_name:0 "Торчер"
 DCR_TORCHER_DESC:0 "Больше набегов Торчер любит только одну вещь — огонь. Некоторые говорят, что именно поэтому он и любит рейды."
 DCR_crushed_dream_trait:0 "Разбитые мечты"
 DCR_crushed_dream_trait_desc:0 "Отказ от своей мечты закалил Райана Бригга. Хотя когда-то у него были сомнения относительно некоторых жестоких аспектов рейдов, теперь он отбросил эти сомнения и полностью посвятил себя роли предводителя рейдеров."
 DCR_slaver_boss_trait:0 "Босс работорговцев"
 DCR_ant_queen_trait:0 "Королева Муравьев"
 DCR_ant_queen_trait_desc:0 "НеМирмика управляет своей бандой подобно муравейнику. У каждого члена есть своя роль, которую он должен выполнять, и любое отклонение карается изгнанием или смертью. Новые рейдеры быстро присоединяются к ним, увидев, как муравьи пожирают кого-то, кто не справляется."
 DCR_torcher_minister_name:0 "Торчер"
 DCR_torcher_minister_trait:0 "Пламя"
 DCR_torcher_leader_trait:0 "Поджигатель"
 DCR_torcher_leader_trait_desc:0 "Больше набегов Торчер любит только одну вещь — огонь. Некоторые говорят, что именно поэтому он и любит рейды."
