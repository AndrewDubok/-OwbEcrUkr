#### Tooltips ####
 dcr_ww_appeal_rises_slightly.tt:0 "Это поможет нам продать чудо-мясо"
 dcr_ww_appeal_rises_moderately.tt:0 "Это действительно поможет нам продать чудо-мясо"
 dcr_ww_appeal_falls_slightly.tt:0 "Это навредит нашей способности продавать чудо-мясо"
 dcr_ww_appeal_falls_moderately.tt:0 "Это серьезно повредит нашей способности продавать чудо-мясо"
 DCR_1.tt:0 "Открывает возможность отправлять парней на рейды, чтобы занять их чем-нибудь"
 DCR_2.tt:0 "Недостаток рейдов вызывает у парней некоторое беспокойство"
 DCR_3.tt:0 "Открывает возможность принимать решения об участии в новых рейдах за рабами"
 DCR_4.tt:0 "Открывает решение о продаже местных поселенцев в Парадайз-Фолс"
 DCR_5.tt:0 "У рейдеров может произойти смена руководства..."
 DCR_6.tt:0 "Вам нужно быть внимательным к своим выборам. Они увеличат/уменьшат подозрительность окружающих Бриггса, а также повысят рыночную привлекательность его чудо-мяса."
 DCR_7.tt:0 "Торчер готовит отряд из своих самых преданных последователей!"
 DCR_8.tt:0 "Те, кто сражаются, как муравьи, готовятся к битве!"
 DCR_9.tt:0 "Стаи муравьев готовы поглотить пустошь!"
 DCR_10.tt:0 "Новые группы безопасности будут охранять наши заводы."
 DCR_11.tt:0 "The Briggs Military Company обеспечит безопасность наших активов."
 DCR_12.tt:0 "Свежее мясо готово к убою"
 DCR_13.tt:0 "Некоторые парни учатся использовать силовую броню"
 DCR_14.tt:0 "Гробовщик благодарит Бриггса, подарив ему одного из его лучших рабов"
 DCR_nf_wip.tt:0 "§RThis DC Raiders focus is a Work in Progress.§!"

#### Events ####
 DCR_nf_events.1.title:0 "Всё самое лучшее"
 DCR_nf_events.1.desc:0 "До того, как организовались поселения Столичной Пустоши, землями правили рейдеры, и мы купались в деньгах. Мы торговали наркотиками, похищали рабов и, конечно же, просто грабили везде, где хотели. Однако самыми успешными бандами были те, которые..."
 DCR_nf_events.1.a:0 "Работали с наркотой"
 DCR_nf_events.1.b:0 "Застряли вместе"
 DCR_nf_events.1.c:0 "Устраивали ад повсюду"
 DCR_nf_events.2.title:0 "Проблема"
 DCR_nf_events.2.desc:0 "После того, как поселения организовались и вытеснили этих идиотов из руин Бесезды, они начали присматриваться к другим бандам и объединяться, чтобы вытеснить и нас с нашей территории! У большинства банд хватило ума бежать, завидев приближающуюся армию, и теперь они лишь побираются по этим местам, чтобы торговать в Парадайз-Фоллс или нападать на случайные караваны. Тем не менее, нам удалось прихватить кое-какие припасы, прежде чем мы выбрались из укрытия."
 DCR_nf_events.2.a:0 "Мы прихватили пушки"
 DCR_nf_events.2.b:0 "Мы прихватили рабов"
 DCR_nf_events.2.c:0 "Мы прихватили крышки"
 DCR_nf_events.2.d:0 "Мы прихватили всё, что не приколочено!"
 DCR_nf_events.3.title:0 "Мужчина"
 DCR_nf_events.3.desc:0 "И тут откуда ни возьмись появляется этот парень, крутой главарь рейдеров откуда-то с севера или что-то вроде того. Его зовут Бригг. Он довольно умён для рейдера, решил, что если поселения организуются и надирают нам задницы, то и нам следует организоваться и тогда мы сможем надрать им задницы. Объединить всех этих тупиц непросто, но, похоже, он справляется. Похоже, люди следуют за ним, потому что..."
 DCR_nf_events.3.a:0 "Он безжалостен"
 DCR_nf_events.3.b:0 "Он умен"
 DCR_nf_events.3.c:0 "Он хитер"
 DCR_nf_events.4.title:0 "Запись в журнале терминала Райана Бригга #171"
 DCR_nf_events.4.desc:0 "Я заметил положительные реакции на декстриновые субстанции. Я продолжу тестировать разные формы, чтобы посмотреть, к чему это меня приведёт. Если и существует момент для прорыва, то это именно сейчас. Маскироваться под одного из этих мерзких убийц становится утомительно, как только это шапито стихает. Однако одно несомненно, если эксперимент увенчается успехом, мы все можем разбогатеть. Кротокрыс — один из самых легкодоступных видов мяса, но и самый отвратительный. Если мне удастся превратить его в полноценный источник пищи..."
 DCR_nf_events.4.a:0 "Будем надеяться, что они не узнают об этом раньше"
 DCR_nf_events.5.title:0 "Трудный выбор"
 DCR_nf_events.5.desc:0 "Выбор одного из этих психов в качестве моей так называемой правой руки, похоже, очень важен для этих рейдеров. По крайней мере, это позволит мне сосредоточиться на своих исследованиях, а не на их расприях. Кажется, этот Торчер мог бы держать ребят в узде, но он более неуравновешен, чем остальные. Леду — вполне приемлемый вариант, поскольку у него есть опыт управления собственной бандой, и он, кажется, не такой уж взрывной. Или я мог бы положиться на Улыбающегося Джека. Может, он и не такой уж рейдер, но ребята все равно его слушают, и он время от времени работает с караванами."
 DCR_nf_events.5.a:0 "Вперед с Торчером"
 DCR_nf_events.5.b:0 "Леду - ваш выход"
 DCR_nf_events.5.c:0 "Улыбка Джека подкупает"
 DCR_nf_events.6.title:0 "Прорыв близко"
 DCR_nf_events.6.desc:0 "После месяцев исследований я, кажется, близок к прорыву. Чудо-клей, похоже, хорошо сочетается с мясом кротокрыса, создавая продукт, который не только вкуснее, но и обладает более восстанавливающими свойствами. Мне все еще нужно провести больше тестов и найти способ увеличить производство, если я хочу разработать жизнеспособный продукт, но я наконец-то вижу чёртов свет в конце этого туннеля."
 DCR_nf_events.6.a:0 "Скоро я освобожусь от этого кошмара"
 DCR_nf_events.7.title:0 "Ужас"
 DCR_nf_events.7.desc:0 "Некоторые рейдеры задавали слишком много вопросов о происходящем. Мне нужно было сделать что-то серьёзное, чтобы они пока не догадались. И тут меня осенило. У нас осталось несколько пленников с прошлого рейда, на который я их посылал парней, и несколько упущенных крышек из Парадайз-Фоллз стоили того, чтобы угомонить толпу. Поэтому я приказал им бросить пленников к запертому в клетке Бегемоту. Конечно, они долго не продержались, но этим психам нравится смотреть, как эта штука ест."
 DCR_nf_events.7.a:0 "Мне это тоже начинает нравиться."
 DCR_nf_events.8.title:0 "Что это за устройство?"
 DCR_nf_events.8.desc:0 "Несмотря на все мои попытки скрыть свои исследования от рейдеров, они пронюхали, что я что-то делаю с мясом кротокрыс и чудо-клеем. Когда меня застали врасплох, они увидели, что я работаю с машиной, и задали кучу вопросов. Мне пришлось быстро соображать, объясняя. Я делал..."
 DCR_nf_events.8.a:0 "Эм... Наркоту?"
 DCR_nf_events.8.b:0 "Новое топливо для Торчера"
 DCR_nf_events.8.c:0 "Корм для Бегемота"
 DCR_nf_events.9.title:0 "Передача образцов мяса"
 DCR_nf_events.9.desc.1:0 "Пробраться тайком из Эвергрин-Миллс и попасть на территорию Поселений Столичной Пустоши было непросто, и меня чуть не застрелили, когда увидели, но я смог передать свое сообщение, а также упаковку образцов мяса. Не думаю, что кто-то видел, как я пробирался обратно, так что я должен быть вне подозрений."
 DCR_nf_events.9.desc.2:0 "Было достаточно просто передать сообщение и образцы мяса последнему каравану, проезжавшему через Эвергрин Миллс. Теперь мне остаётся только сидеть и ждать. Если всё пройдёт хорошо, я скоро начну получать крышки."
 DCR_nf_events.9.a:0 "Это должно сработать"
 DCR_nf_events.10.title:0 "Пороки"
 DCR_nf_events.10.desc:0 "Похоже, что рейдерам мало что нравится больше, чем грабежи и беспорядочное насилие, но то немногое, чем они занимаются, они находят в Эвергрин-Миллс. Секс, наркотики и прочее насилие, похоже, единственное, что, помимо бессмысленных убийств, может умиротворить этих людей. У меня еще осталось несколько крышек, которые я могу вложить в их пороки, чтобы попытаться отвлечь их."
 DCR_nf_events.10.a:0 "Вложить в нарко-лабораторию"
 DCR_nf_events.10.b:0 "Вложить в бордель"
 DCR_nf_events.10.c:0 "Построить бойцовскую арену"
 DCR_nf_events.10.d:0 "Мы можем вложиться во всё?"
 DCR_nf_events.11.title:0 "Спектакль"
 DCR_nf_events.11.desc:0 "Один из рейдеров задавал слишком много вопросов о моём прошлом и о том, почему я не участвовал в рейдах с тех пор, как принял командование. Сначала я собирался просто пристрелить его, ведь это, похоже, производит впечатление на этих типов, но вспомнил про огромного супермутанта, которого они заперли снаружи. Бросить его на съедение зверю показалось мне элегантным решением проблемы, к тому же не позволив остальным усомниться в моей квалификации. Это должно было дать мне хоть немного времени."
 DCR_nf_events.11.a:0 "Но этот хруст..."
 DCR_nf_events.12.title:0 "Не такой уж и Парадайз"
 DCR_nf_events.12.desc:0 "Парадайз-Фоллс выглядел примерно так, как и должен выглядеть лагерь работорговцев. Множество черепов на пиках, скелеты в клетках и другие предостережения, призванные убедить рабов даже не пытаться бежать. Встреча с Гробовщиком прошла успешно, и, похоже, он доволен поставками рабов с Эвергрин-Миллс, но хочет больше. По словам Гробовщика, Питт скупает почти всех рабов на рынке, так что если мы сможем увеличить поставки, каждый будет получать хорошие крышки. Единственная проблема в том, что если мы начнем захватывать больше рабов, у Поселений Столичной Пустоши могут возникнуть проблемы."
 DCR_nf_events.12.a:0 "Это плохо скажется на продажах чудо-мяса"
 DCR_nf_events.13.title:0 "Секретное послание"
 DCR_nf_events.13.desc:0 "Это было нелегко, но лидеру Поселений Столичной Пустоши было отправлено сообщение с предложением заключить сделку, согласно которой мы больше не будем их нападать. Я смогу переключить внимание парней на юг или запад, не вызывая слишком больших подозрений."
 DCR_nf_events.13.a:0 "Надеюсь, я прав"
 DCR_nf_events.14.title:0 "Запись в журнале терминала Райана Бригга #235"
 DCR_nf_events.14.desc:0 "Я едва мог поверить своим глазам: чудо-мясо кротокрыса пользуется огромным успехом у руководства Поселений Столичной Пустоши. Они открыты для торговли и даже не готовы стрелять в моих ребят, если мы прекратим рейды и будем придерживаться сушенного мяса. Теперь самое сложное – убедить рейдеров отказаться от этого образа жизни и вместо этого зарабатывать крышки, охотясь на кротокрысов. Я подумывал бросить это место и открыть магазин в другом месте, но у меня нет крышек, чтобы начать всё сначала и удовлетворить спрос. Нет, они по-прежнему считают меня боссом, и это стоит многого. Это сработает."
 DCR_nf_events.14.a:0 "Я смогу их убедить"
 DCR_nf_events.14.b:0 "Я не смогу их убедить"
 DCR_nf_events.15.title:0 "Запись в журнале терминала Райана Бригга #269"
 DCR_nf_events.15.desc:0 "Было обидно отказаться от идеи создания чудо-мяса как раз тогда, когда мне удалось создать приемлемый продукт, но, по крайней мере, теперь у меня есть дешевый способ прокормить свою армию. Отказавшись от этого плана, я обнаружил, что мне легче вжиться в новую роль. Поселения Столичной Пустоши и каннибалы Андейла теперь подчиняются мне, и мы отправляем рабов в Питт целыми караванами. У меня даже скоро встреча с Ашуром. Похоже, я действительно сдержал обещание, данное этим рейдерам много лет назад."
 DCR_nf_events.15.a:0 "Теперь наступят хорошие времена"
 DCR_nf_events.16.title:0 "Горящий Бригг"
 DCR_nf_events.16.desc:0 "Бригг лгал всем нам, и за это он должен был сгореть. Мы больше не сможем контролировать пламя внутри нас. Мы распространимся по пустошам, словно лесной пожар, и сожжём всё на своём пути!"
 DCR_nf_events.16.a:0 "СОЖГИТЕ ВСЁ!"
 DCR_nf_events.17.title:0 "Другое пламя"
 DCR_nf_events.17.desc:0 "Те немногие, что не сгорели, мы всё равно отправляем в Питт за крышки. Крышки — это больше топлива. Больше топлива — больше огня. Теперь Ашур хочет поговорить с Торчером. Поговорим о том, как сделать больше крышек, а это значит больше огня!"
 DCR_nf_events.17.a:0 "Мы постараемся его тоже не сжечь"
 DCR_nf_events.18.title:0 "Ценный человек?"
 DCR_nf_events.18.desc:0 "Каждый член Армии Королевы — всего лишь оружие в войне против человека, даже хуже самого слабого муравья. Но этот последний пленник, доктор Леско, — нечто особенное. Он знает секрет, как сделать муравьёв сильнее, крупнее и даже заставить их дышать огнём! Мы позаботимся о том, чтобы этот пленник чувствовал себя комфортно и был сыт, пока он выполняет приказы Королевы. В противном случае он будет кормить колонию."
 DCR_nf_events.18.a:0 "Он будет полезным"
 DCR_nf_events.19.title:0 "Коронация королевы"
 DCR_nf_events.19.desc:0 "Слабак по имени Бригг больше не существует. Как и все люди, он не мог сравниться с мощью муравья! Теперь банду презренных людишек берёт под свой контроль новый правитель — НеМирмика! С этой новой армией и своими муравьями она принесёт разрушение миру людей! Эра людей окончена!"
 DCR_nf_events.19.a:0 "Эра муравьев начинается!"
 DCR_nf_events.21.title:0 "Странное предложение"
 DCR_nf_events.21.desc:0 "Мы слышали от проезжавших торговцев рассказы о том, что банды рейдеров на юго-западе забросили свои дела и переключились на какой-то мясной бизнес. Мало кто в Ривет-Сити поверил этому, пока их главарь не появился с ящиками своего «чудо-мяса кротокрыса». Образцы, которые он раздавал своим людям, произвели фурор среди тех, кто его пробовал, и утверждали, что оно лучше любого кротокрыса, которое они когда-либо пробовали. Этот мистер Бригг хочет открыть магазинчик на рынке, чтобы продавать мясо, и уверяет нас, что в этом нет никакого рейдерского трюка."
 DCR_nf_events.21.a:0 "Принять его предложение"
 DCR_nf_events.21.b:0 "Отклонить его предложение"
 DCR_nf_events.20.title:0 "Чудо-мясо кротокрыса?"
 DCR_nf_events.20.desc:0 "Мы получили сообщение от не кого иного, как от Райана Бригга, лидера реорганизованных рейдеров Столичной Пустоши. Он утверждает, что на самом деле является ученым, который хочет преобразовать эту банду рейдеров в некое подобие коммерческого предприятия с помощью разработанной им новой технологии переработки мяса кротокрыс. В пустоши, полной странных и невероятных вещей, это, безусловно, одно из самых нелепых зрелищ, но, чёрт возьми, образец мяса, который он прислал, просто великолепен. Если мы думаем, что можем ему доверять, нам стоит рассмотреть его предложение и заказать первую партию мяса."
 DCR_nf_events.20.a:0 "Мы закажем 30 ящиков!"
 DCR_nf_events.20.b:0 "Проигнорировать его"
 DCR_nf_events.22.title:0 "Никогда не верь рейдеру!"
 DCR_nf_events.22.desc:0 "Мы должны были ожидать, что сообщение от Райана Бригга окажется не более чем какой-то дурацкой шуткой рейдеров! Мы не только не получили нашу партию чудо-мяса кротокрыса, но и на людей, которых мы отправили за ним, напали, и только один из них вернулся живым! Похоже, ситуация на Эвергрин-Миллс ничуть не изменилась, и нам стоит быть готовыми к новым неприятностям с рейдерами в будущем."
 DCR_nf_events.22.a:0 "Черт... Мне понравилось это вяленое мясо"
 DCR_nf_events.23.title:0 "Столичные рейдеры"
 DCR_nf_events.23.desc:0 "Главарь рейдеров из Столичной Пустоши недавно встречался с Ашуром, чтобы обсудить улучшение рабочих отношений. Хотя эти рейдеры немного диковаты даже по меркам Питта, именно они поставляют нам большую часть рабочих, которые мы используем в наших кузницах. Возможно, было бы лучше заключить с ними какую-то сделку."
 DCR_nf_events.23.a:0 "Мы будем работать с этими рейдерами более тесно"
 DCR_nf_events.23.b:0 "Сохраним былой порядок вещей"
 DCR_nf_events.24.title:0 "Отказ Ашура"
 DCR_nf_events.24.desc:0 "Ашшур решил, что он не хочет никакого союза с нами. Похоже, он слишком хорош, чтобы слишком тесно сотрудничать с такими, как мы, а мы годимся только на то, чтобы поставлять ему рабов для его заводов. По крайней мере, мы всё ещё можем выжать из этого старого ублюдка немного крышек."
 DCR_nf_events.24.a:0 "Вот лошара"
 DCR_nf_events.25.title:0 "Увеличение числа рейдов"
 DCR_nf_events.25.desc:0 "Неясно, что послужило причиной внезапного всплеска рейдерской активности на юге, но мы наблюдаем резкое увеличение числа нападений на поселения и караваны вблизи границы с тем, что считается их территорией. Людям было рекомендовано пока избегать этого района, и мы направляем туда дополнительные силы ополченцев для патрулирования."
 DCR_nf_events.25.a:0 "Что-то важное грядет?"
 DCR_nf_events.26.title:0 "Резкий рост числа похищений людей"
 DCR_nf_events.26.desc:0 "В поселениях к югу от нас резко возросло число нападений рейдеров с целью захвата пленников из поселений и караванов в этом районе. Поскольку мы не слышали о выкупе этих людей, можно с уверенностью предположить, что их продают в рабство."
 DCR_nf_events.26.a:0 "Проклятые работорговцы"
 DCR_nf_events.27.title:0 "Удовлетворение спроса"
 DCR_nf_events.27.desc:0 "Поскольку ополчение Поселений Столичной Пустоши всё ещё пристально следит за ситуацией, не так-то просто захватить необходимое количество рабов для Гробовщика. Возможно, нам придется начать забирать людей из поселений на наших границах, которые обычно платят дань крышками, металлоломом или едой."
 DCR_nf_events.27.a:0 "Сделайте это"
 DCR_nf_events.27.b:0 "Мы не можем слишком сильно давить на этих людей"
 DCR_nf_events.28.title:0 "Запись в журнале терминала Райана Бригга #234"
 DCR_nf_events.28.desc:0 "Что-то происходит с рейдерами, которыми мне, к сожалению, пришлось себя окружить. Когда я вхожу в комнату, они избегают смотреть на меня. Но не с обычным выражением по типу: «боюсь, он меня распотрошит за то, что я на него косо посмотрю», а как будто что-то замышляют. Я беспокоюсь, что они меня раскусили. Начну собирать тревожную сумку сегодня вечером, на случай, если придётся быстро убраться отсюда."
 DCR_nf_events.28.a:0 "Почему я слышу муравьев?"
 DCR_nf_events.28.b:0 "Почему я чувсвую запах гари?"
 DCR_nf_events.29.title:0 "Смерть дурака"
 DCR_nf_events.29.desc:0 "Механист слишком долго противостоял НеМирмике. Бесчисленное множество её потомства пали жертвами его глупых машин, и именно благодаря его усилиям она была изгнана из своего логова за пределами Общины Кентербери. Вероятно, он осознал свою ошибку, когда сотни муравьёв и налётчиков напали на его жалкое убежище. Его тело вскормило потомство, а его шлем теперь является трофеем на троне королевы."
 DCR_nf_events.29.a:0 "Всех наших врагов постигнет та же участь"
 DCR_nf_events.30.title:0 "Новый бизнес"
 DCR_nf_events.30.desc:0 "Ребята немного встревожены, поскольку Бриггс сказал, что мы прекращаем сотрудничество с Парадиз Фоллс. Было высказано множество различных предложений о том, чем можно заменить те крышки, которые мы больше не получим."
 DCR_nf_events.30.a:0 "Будем торговать наркотиками"
 DCR_nf_events.30.b:0 "Будем наемниками"
 DCR_nf_events.30.c:0 "Собирательство?!"
 DCR_nf_events.31.title:0 "Несколько плохих перцев"
 DCR_nf_events.31.desc:0 "Многие парни подсели на мясной поезд «кротокрыса», увидев, какие крышки можно из них сделать, но есть и немало парней, которые не хотят отказываться от образа жизни рейдеров. Они стреляют по караванам и грозятся уйти, если мы не вернёмся к рейдам. Они станут большой проблемой, если мы с ними не разберёмся."
 DCR_nf_events.31.a:0 "Убить их всех"
 DCR_nf_events.31.b:0 "Дайте им повышение, чтобы они угомонились"
 DCR_nf_events.32.title:0 "Кровавые пыльники"
 DCR_nf_events.32.desc:0 "Долгие годы Регуляторы были для нас занозой в заднице. Это была куча хороших ребят, которые охотились за главарями рейдеров, а иногда и зачищали целые лагеря. Они откатили нас к Эвергрин-Миллс, но теперь всё по-другому. Мы преследовали их до самой их маленькой хижины и сегодня убили последнего из них. Некоторые носят их значки как трофеи, но настоящая добыча — то, что мы нашли в ящиках на их базе."
 DCR_nf_events.32.a:0 "Как много оружия"
 DCR_nf_events.33.title:0 "Предложение рейдеров"
 DCR_nf_events.33.desc:0 "Рейдеры Столичной Пустоши объединились под началом человека по имени Бригг и подчинили себе почти весь регион. Теперь они сидят на нашей границе и просят нас присоединиться. Будучи сами рейдерами, мы знаем, что произойдет, если мы скажем «нет»."
 DCR_nf_events.33.a:0 "Присоединиться к рейдерам"
 DCR_nf_events.33.b:0 "Послать их нахер"
 DCR_nf_events.34.title:0 "Рабы хлынули потоком"
 DCR_nf_events.34.desc:0 "С тех пор, как рейдеры Бригга пронеслись по Столичной Пустоши, поток рабов превратился из постоянного потока в бурлящую реку. Они присылают нам рабов чуть ли не в таком количестве, что мы не знаем, куда их девать. Единственный недостаток заключается в том, что, становясь всё более крупным поставщиком рабочей силы, они становятся всё более требовательными."
 DCR_nf_events.34.a:0 "Дайте им их крышки."
 DCR_nf_events.35.title:0 "Практически уничтоженный"
 DCR_nf_events.35.desc:0 "Более века Факелоносцы проводили священные ритуалы огня. Они изучали древние тексты и ненавидели своего врага, яогая по имени Смоки, который, как говорили, ходил прямо и пытался потушить огонь. Их почтение было вознаграждено тем, что они обнаружили древний склад мощных огнеметов. Затем пришли Рокисты. Эти люди пришли с юга с ненавистью в глазах и убили всех, кто не отрекался от путей пламени. Столкнувшись со смертью или отказом от своей веры, Торчер выбрал третий вариант. Он выбрал бегство. Он решил продолжить путь своего народа. Из углей своей веры он зажжет новый огонь. Этот огонь сожжет Столичную Пустошь. Затем, когда огонь станет достаточно сильным, он вернётся на холмы запада. \n \n Тогда сгорят камнепоклонники."
 DCR_nf_events.35.a:0 "Огонь разрастается"
 DCR_nf_events.36.title:0 "Огонь горит ярче, чем когда-либо"
 DCR_nf_events.36.desc:0 "Пламя Факелоносцев было почти потушено много лет назад Рокистами. С тех пор Торчер собирал хворост. Он сколотил и научил её пути пламени. Эта искра превратилась в ревущее пламя, охватившее Столичную Пустошь. Затем оно достигло холмов, где родился Торчер. Тех, кто пытался уничтожить Факелоносцев, бросали на погребальные костры и возводили новые храмы пламени на месте старых. Пламя теперь горит ярче, чем когда-либо, и пути Факелоносцев продолжают жить."
 DCR_nf_events.36.a:0 "Пламя никогда не погаснет"
 DCR_nf_events.37.title:0 "Королева-убийца"
 DCR_nf_events.37.desc:0 "Парням нравилось наблюдать, как Бригга пожирают муравьи, но это не означало, что все были согласны следовать за леди, которая облачается в муравьиные доспехи и рассуждает о падении человечества. НеМирмика понимала слабость человеческих сердец и предвидела несогласных. Вместе со своими муравьями и теми, кто был ей верен, она быстро расправлялась с теми, кто осмеливался ей противостоять. Их черепа украшали её трон в самом сердце Базара. С этого трона она провозглашала свою власть и судьбу сомневающихся. Если есть что-то, что могло бы определить ее правление, так это..."
 DCR_nf_events.37.a:0 "Награждение лояльных"
 DCR_nf_events.37.b:0 "Суровые наказания для нелояльных"
 DCR_nf_events.37.c:0 "Благосклонность к сильным"
 DCR_nf_events.37.d:0 "Странные прихоти королевы"
 DCR_nf_events.38.title:0 "Поставки в Парадайз-Фолс"
 DCR_nf_events.38.desc:0 "Поставки рабов из Столичной Пустоши резко сократились. Когда мы отправили людей проверить, что происходит, Гробовщик Джонс сообщил нам, что крупнейшая банда рейдеров в регионе решила отказаться от работорговли. Они заверили нас, что это временная задержка, и его люди подтянутся и удовлетворят спрос. Пройдет совсем немного времени, прежде чем они смогут это сделать."
 DCR_nf_events.38.a:0 "Наше терпение не бесконечно"

#### New Focuses ####
 DCR_nf_a001:0 "Хорошие времена"
 DCR_nf_a001_desc:0 "С незапамятных времён дела у рейдеров в Столичной Пустоши шли довольно неплохо. Да, эти жестянки в руинах были настоящей занозой, но если держаться от них подальше, всё было хорошо."
 DCR_nf_a002:0 "Плохие времена"
 DCR_nf_a002_desc:0 "А потом этим долбаным идиотам из Бесезды пришлось облажаться и каким-то образом заставить всех этих лохов из поселений объединиться. Как, чёрт возьми, рейдер должен грабить, если каждый раз, когда ты нападаешь на караван, за тобой гонится сотня парней?"
 DCR_nf_a003:0 "Новый Босс"
 DCR_nf_a003_desc:0 "Этот новенький, Бригг, собрал кучу ребят. Он говорит, что если мы объединимся, то однажды сможем раздавить этих неудачников и снова стать главными. Стоит попробовать, правда?"
 DCR_nf_a004:0 "Снова хорошие времена"
 DCR_nf_a004_desc:0 "Наша территория, возможно, уже не такая большая, как раньше, но мы всё равно получаем свою добычу."
 DCR_nf_a005:0 "Поездки в Парадайз"
 DCR_nf_a005_desc:0 "Продажа пленника в Парадайз-Фоллс всегда была хорошим способом заработать немного крышек. Возможно, сейчас они находятся в центре территории Поселений, но мы все еще можем туда добраться."
 DCR_nf_a006:0 "Смена направления"
 DCR_nf_a006_desc:0 "Бригг, конечно, прав: однажды у нас закончится всё, что можно было бы грабить. Но если мы не грабим, разве мы рейдеры?"
 DCR_nf_a007:0 "Новые возможности"
 DCR_nf_a007_desc:0 "Крышки есть крышки, и эти новые планы должны дать нам их много."
 DCR_nf_a008:0 "Закулисный диалог"
 DCR_nf_a008_desc:0 "Кто-то сказал, что Бригг разговаривает с ребятами из Поселений."
 DCR_nf_a009:0 "Держать темп"
 DCR_nf_a009_desc:0 "Я просто не понимаю, если Гробовщик платит кучу крышек за рабов, почему мы не пытаемся получить больше?"
 DCR_nf_a010:0 "Поддерживать баланс"
 DCR_nf_a010_desc:0 "Иди, хватай поселенцев, приведи их в Парадайз и повтори."
 DCR_nf_a011:0 "День выплат"
 DCR_nf_a011_desc:0 "Рабы непрестанно направляются в Парадайз-Фоллс, а крышки — в Эвергрин-Миллс."
 DCR_nf_a012:0 "Соответствовать спросу"
 DCR_nf_a012_desc:0 "Каждый неудачник из пустоши, которого мы приводим в Парадайз-Фоллс, теперь стоит вдвое больше, чем раньше. Конечно, тогда мы захватим больше!"
 DCR_nf_a013:0 "Человеческий ресурс"
 DCR_nf_a013_desc:0 "Некоторые из этих неудачников, живущих на нашей территории, платят мало за «защиту». Может, нам стоит их тоже прихватить?"
 DCR_nf_a014:0 "Прочное партнерство"
 DCR_nf_a014_desc:0 "Гробовщик в восторге от всех этих новых рабов, которые мы ему постоянно дарим. Не знаю, значит ли это, что мы получим больше крышек, но ведь должна же быть какая-то награда, верно?"
 DCR_nf_a015:0 "Правая рука"
 DCR_nf_a015_desc:0 "Каждому боссу рейдеров нужен свой помощник. И он должен быть безумнее всех, чтобы держать остальных в узде. Но кого же выберет Бригг?"
 DCR_nf_a016:0 "Пиромант"
 DCR_nf_a016_desc:0 "Торчер — сумасшедший сукин сын. Говорят, он сжёг целый автобус детей за то, что они сказали, что он выглядит как бродяга."
 DCR_nf_a017:0 "Игрушки с огоньком"
 DCR_nf_a017_desc:0 "Не знаю, где Торчер постоянно находит эти огнемёты, и спрашивать не буду. Этот псих утверждает, что огонь подсказывает ему, куда идти, что бы это ни значило."
 DCR_nf_a018:0 "Вратарь"
 DCR_nf_a018_desc:0 "Этот парень, Леду, и его маленькая банда одержимы каким-то старым довоенным видом спорта, в котором играли на льду. Если ему это так нравится, почему бы ему не сбегать туда, где холодно?"
 DCR_nf_a019:0 "Наёмная работа"
 DCR_nf_a019_desc:0 "У Леду некоторые ребята занимаются наемнической работой, когда не участвуют в рейдах. Они все равно могут стрелять в людей, а крышки есть крышки, верно?"
 DCR_nf_a020:0 "Торгаш"
 DCR_nf_a020_desc:0 "Какой придурок вообще мог поставить Улыбающегося Джека во главе чего бы то ни было? Этот мудак только и делает, что взвинчивает цены в потолок!"
 DCR_nf_a021:0 "Торговые сделки"
 DCR_nf_a021_desc:0 "Этот клоун действительно открывает нашу территорию для торговцев, говоря парням, что они не могут бить тех, кому он дает проход. По крайней мере, нам стали чаще поставлять патроны..."
 DCR_nf_a022:0 "Реальная работа"
 DCR_nf_a022_desc:0 "Мне кажется, или Бригг в последнее время отдаёт какие-то очень странные приказы? Откуда у него такая страсть к кротокрысам?"
 DCR_nf_a023:0 "Рейд за снаряжением"
 DCR_nf_a023_desc:0 "Бригг хочет, чтобы мы прикончили нескольких умников и забрали их лабораторное оборудование. Он готовит какие-то наркотики или что-то в этом роде?"
 DCR_nf_a024:0 "Рейд за клеем?"
 DCR_nf_a024_desc:0 "Что за херня с этим новым списком добычи? Мы что, должны искать клей чаще, чем боеприпасы или химикаты?"
 DCR_nf_a025:0 "В поисках оборудования"
 DCR_nf_a025_desc:0 "Как, черт возьми, выглядит колба Эрленмейера?"
 DCR_nf_a026:0 "Побирательство за клеем?"
 DCR_nf_a026_desc:0 "Что такого задумал Бригг, чтобы заставить мальчиков тратить время на поиски клея в старых руинах?"
 DCR_nf_a027:0 "Закупка оборудования"
 DCR_nf_a027_desc:0 "Прибывает новый караван с кучей странных вещей для босса."
 DCR_nf_a028:0 "Поставки клея"
 DCR_nf_a028_desc:0 "Этот караван даже не стоит того, чтобы его трогать, у них есть только клей."
 DCR_nf_a029:0 "Для чего это нужно?"
 DCR_nf_a029_desc:0 "Я слышал, как какие-то ребята пробрались к Бриггу и видели, как он засовывал клей и мясо кротокрыса в какую-то сраную машину. Кто-нибудь должен спросить его, что происходит. Но не я."
 DCR_nf_a030:0 "Момент истины"
 DCR_nf_a030_desc:0 "Бригг вчера вечером отправил нескольких человек поговорить с караваном. Да, поговорить. Нет, не рейдить. Странно, правда?"
 DCR_nf_a031:0 "Расширение Эвергрина"
 DCR_nf_a031_desc:0 "У нас гораздо больше задниц, чем стульев, если вы понимаете, о чём я. Мы должны что-то сделать с этим."
 DCR_nf_a032:0 "Оружейники"
 DCR_nf_a032_desc:0 "Некоторые ребята слишком разговорились, и, возможно, некоторые из них могли бы работать с оружием весь день."
 DCR_nf_a033:0 "Литейные заводы"
 DCR_nf_a033_desc:0 "Эти здоровенные металлические штуки в здании — не туалеты, идиоты. Они плавят металл, чтобы из него можно было сделать полезное дерьмо."
 DCR_nf_a034:0 "Металл для кузниц"
 DCR_nf_a034_desc:0 "Схватить несколько придурков с пустоши и заставить их копать металл — это гораздо лучше, чем вырывать трубы из стен."
 DCR_nf_a035:0 "Базар"
 DCR_nf_a035_desc:0 "Мы всегда немного торговали и выпивали на Базаре, но поскольку здесь сидит больше парней, нам нужно больше места."
 DCR_nf_a036:0 "Держать парней счастливыми"
 DCR_nf_a036_desc:0 "Бригг — настоящая легенда. Слышали о его новых товарах на Базаре?"
 DCR_nf_a037:0 "Ужас в клетке"
 DCR_nf_a037_desc:0 "Не знаю, как они засунули этого здоровенного ублюдка в клетку. Но черт возьми, как же весело смотреть, как он разрывает какую-то тупую тварь на части."
 DCR_nf_a038:0 "Охота на кротокрыс"
 DCR_nf_a038_desc:0 "Бригг заставляет новичков стрелять по кротокрысам, чтобы отточить меткость. Учебная стрельба по движущимся мишеням не является чем-то новым, но странно, что он хочет, чтобы мы охотились только за ними, верно?"
 DCR_nf_a039:0 "Загоны для кротокрыс"
 DCR_nf_a039_desc:0 "Какого черта мы тратим столько места на загоны для кротокрысов, если мы не собираемся бросать им пленников?"
 DCR_nf_a040:0 "Проверка вкуса"
 DCR_nf_a040_desc:0 "Повар раздаёт новое мясо кротокрыса. На вкус оно неплохое, но когда кто-то спросил его, где он научился готовить что-то, что не имеет вкуса старого ботинка, он испугался."
 DCR_nf_b001:0 "Им понравилось?"
 DCR_nf_b001_desc:0 "Бригг созвал большую встречу с самыми большими шишками в банде. Не знаю, о чём он говорит, может быть, это какой-то крупный рейд."
 DCR_nf_b002:0 "Рейдерский ребрендинг"
 DCR_nf_b002_desc:0 "Мы собираемся начать продавать мясо? Это же полная чушь. Подождите... сколько крышек за штуку?"
 DCR_nf_b003:0 "Исправление отношений"
 DCR_nf_b003_desc:0 "Ребята поначалу немного сомневались, но как только посыпались крышки, они запели новую мелодию."
 DCR_nf_b004:0 "Худшие из нас"
 DCR_nf_b004_desc:0 "Сколько бы крышек мы ни заработали, некоторые ребята просто не готовы отказаться от стрельбы по караванам и насаживания голов на пики. Но дело в том, что старые времена — это старые времена."
 DCR_nf_b005:0 "Охрана Бригга"
 DCR_nf_b005_desc:0 "Эта работа охранника не так уж и плоха. Ещё можно стрелять в придурков, которые лезут в магазин, и получать за это стабильно крышки."
 DCR_nf_b006:0 "Расширение рынка"
 DCR_nf_b006_desc:0 "Бриггс заставляет парней ходить повсюду и пытаться продать это дерьмо."
 DCR_nf_b007:0 "Расширение производства"
 DCR_nf_b007_desc:0 "Послушай, мне все равно, как ты это сделаешь. Но босс сказал, что нам нужно производить больше мяса."
 DCR_nf_b008:0 "Фермы кротокрыс"
 DCR_nf_b008_desc:0 "Не знаю, как это работает, но эта мазь, которую использовала эта сучка из Мегатоны, действительно не даёт кротокрысам кусать тебя."
 DCR_nf_b009:0 "Доминация в своей нише"
 DCR_nf_b009_desc:0 "Мы были первыми, кто приготовил мясо кротокрыса, которое по вкусу не напоминает ноги. Это даёт нам большое преимущество перед конкурентами. Если мы приложим все усилия, то сможем сделать так, что никто не сможет сравниться с нашим продуктом."
 DCR_nf_b010:0 "Изучение скотоводства"
 DCR_nf_b010_desc:0 "Выращивание кротокрыс ничем не отличается от выращивания браминов или рад-кур. Узнайте все, что сможете, у жителей пустошей."
 DCR_nf_b011:0 "Построить фабрику «Чудо-мяса»"
 DCR_nf_b011_desc:0 "Бригг прочитал несколько книг о фабриках, и он думает, что мы можем построить такую, чтобы производить мясо еще быстрее!"
 DCR_nf_b012:0 "Учась по прошлому"
 DCR_nf_b012_desc:0 "В руинах есть несколько фабрик по производству продуктов питания. Мы могли бы кое-что узнать, изучив их документы."
 DCR_nf_b013:0 "Маркетинг 101"
 DCR_nf_b013_desc:0 "Люди немного опасаются покупать вещи у парней в рейдерской экипировке. Бриггс говорит ребятам, чтобы они надели костюмы и привели свой имидж в порядок."
 DCR_nf_b014:0 "Расширение ферм"
 DCR_nf_b014_desc:0 "Мы можем использовать полученные знания для строительства большего количества ферм по разведению кротокрыс на нашей территории."
 DCR_nf_b015:0 "Экономия за счет масштаба"
 DCR_nf_b015_desc:0 "В этой старой книге, найденной Бриггсом, говорится, что чем больше ваша фабрика, тем дешевле вы можете производить продукцию. Я не понимаю, но те фабрики старого мира были довольно большими. Так что это, должно быть, правда."
 DCR_nf_b016:0 "Безумец"
 DCR_nf_b016_desc:0 "Один из ребят, который умеет рисовать, рисует плакаты для поселений. Бриггс думает, что это заставит людей покупать наше мясо."
 DCR_nf_b017:0 "Индустриальный корм"
 DCR_nf_b017_desc:0 "Зачем нам покупать еду, чтобы кормить кротокрыс, если мы можем выращивать ее сами?"
 DCR_nf_b018:0 "Продается в каждом поселении"
 DCR_nf_b018_desc:0 "Почти каждое поселение Столичной Пустоши покупает наше мясо!"
 DCR_nf_b019:0 "Промышленный комплекс «Крото-крыс»"
 DCR_nf_b019_desc:0 "Мы так преуспели в производстве этого мяса, что производим его чуть ли не больше, чем можем продать. Хорошо, что маркетологи уговаривают этих ничтожеств покупать больше, чем им нужно."
 DCR_nf_b020:0 "Диверсифицированный бизнес"
 DCR_nf_b020_desc:0 "На деньги, которые мы зарабатываем на продаже мяса, мы можем построить свой бизнес и приобщиться к каждому «мясному пирогу»!"
 DCR_nf_b021:0 "Торговать оружием"
 DCR_nf_b021_desc:0 "Всем на пустошах нужно оружие. Было бы глупо не выйти на этот рынок."
 DCR_nf_b022:0 "Инвестировать в R&D"
 DCR_nf_b022_desc:0 "Мы можем нанять несколько умников, которые придумают, что бы продавать."
 DCR_nf_b023:0 "Усиление мер безопасности"
 DCR_nf_b023_desc:0 "Если мы не будем бдительны, наш успех привлечёт рейдеров. Иронично, не правда ли?"
 DCR_nf_b024:0 "«Всякая всячина»"
 DCR_nf_b024_desc:0 "Мы можем изготовить что угодно: от кофейных кружек до ботинок. Если кто-то купит, мы это сделаем."
 DCR_nf_b025:0 "Лучшее в линейке"
 DCR_nf_b025_desc:0 "В Столичной Пустоши полно запасных частей, и отремонтированная довоенная винтовка стоит гораздо дороже, чем четыре ржавых куска дерьма."
 DCR_nf_b026:0 "Корпоративные солдаты"
 DCR_nf_b026_desc:0 "Нам понадобится армия для защиты наших деловых интересов. Хорошо, что у нас много ребят, которые умеют воевать."
 DCR_nf_b027:0 "Радиовещание Бриггса"
 DCR_nf_b027_desc:0 "Отойди в сторону, Тридогнайт, ты не единственный, кто умеет играть музыку. Теперь на 300% больше рекламы."
 DCR_nf_b028:0 "Контракты на обеспечение безопасности"
 DCR_nf_b028_desc:0 "Работа наемника стоит хороших денег. Время от времени мы можем сдавать нашу охрану в аренду другим компаниям."
 DCR_nf_b029:0 "Корпоративный шпионаж"
 DCR_nf_b029_desc:0 "Чтобы сохранить преимущество, нам нужно следить за конкурентами и держать руку у них в кармане."
 DCR_nf_b030:0 "Корпорация Бриггса"
 DCR_nf_b030_desc:0 "Корпорация Бригга выросла и стала крупнейшей компанией по эту сторону Миссисипи. От «чудо-мяса» и сапог из кожи кротокрыса до современного оружия и контрактов на охрану — у нас есть всё, что нужно… если у них есть средства."
 DCR_nf_b031:0 "Просто шутка"
 DCR_nf_b031_desc:0 "Бриггс говорит, что он пытался заставить нас продавать мясо в качестве шутки? Я не совсем понимаю, но я посмеюсь, прежде чем меня скормят здоровяку снаружи."
 DCR_nf_b032:0 "Покорение Андейла"
 DCR_nf_b032_desc:0 "У этих странных ублюдков в Андейле полно всякого дерьма, которое мы можем прихватить."
 DCR_nf_b033:0 "От человека к кротокрысу"
 DCR_nf_b033_desc:0 "Как Бриггу удалось заставить этих уродов переключиться с пожирания людей на кротокрысов?"
 DCR_nf_b034:0 "Что-то приближается"
 DCR_nf_b034_desc:0 "Тот большой рейд, который обещал Бригг? Он скоро состоится. Банды по всей округе только и говорят о нём."
 DCR_nf_b035:0 "Точите ножи"
 DCR_nf_b035_desc:0 "Наточите кухонные ножи. Скоро мы их применим."
 DCR_nf_b036:0 "Дальний зов"
 DCR_nf_b036_desc:0 "Мы распространяем повсюду слух о предстоящем крупном рейде. К нам стремятся присоединиться начинающие бандиты и гангстеры со всех уголков пустоши."
 DCR_nf_b037:0 "Из щенков в воинов"
 DCR_nf_b037_desc:0 "Многие из этих парней, желающих вступить в армию, не стоят ни гроша, но они все еще могут принять пули, предназначенные нашим парням."
 DCR_nf_b038:0 "Большой рейд"
 DCR_nf_b038_desc:0 "Мы покажем этим придуркам из поселения, кто здесь главный!"
 DCR_nf_b039:0 "Сломанная сталь"
 DCR_nf_b039_desc:0 "В Цитадели полно ценной добычи. Нам просто нужно убить тех, кто там сидит."
 DCR_nf_b040:0 "Внедрение нового руководства"
 DCR_nf_b040_desc:0 "Этим поселенцам предстоит на собственном горьком опыте убедиться, кто сегодня главный."
 DCR_nf_b041:0 "Реквием по Регуляторам"
 DCR_nf_b041_desc:0 "Регуляторы были кучкой хороших ребят, которые возомнили, что смогут «очистить» пустошь. Но где они сейчас?"
 DCR_nf_b042:0 "Присоединяйся или умри"
 DCR_nf_b042_desc:0 "Банда из Гаррисбурга за эти годы ослабла. Они могут просто сдаться и позволить нам взять верх."
 DCR_nf_b043:0 "Ценная информация"
 DCR_nf_b043_desc:0 "На старых компьютерах Цитадели были кое-какие интересные вещи."
 DCR_nf_b044:0 "Индустрия работорговли"
 DCR_nf_b044_desc:0 "Если мы не заставим этих рабов работать, у нас скоро будет больше парней, чем оружия."
 DCR_nf_b045:0 "Двери открыты для желающих"
 DCR_nf_b045_desc:0 "Многие Гаринсбургские рейдеры хотят присоединиться к настоящей банде."
 DCR_nf_b046:0 "Большие ржавые когти"
 DCR_nf_b046_desc:0 "Кто будет настолько глуп, чтобы сказать «нет» рейдеру в силовой броне?"
 DCR_nf_b047:0 "Синергия работорговцев"
 DCR_nf_b047_desc:0 "С помощью Столичной Пустоши мы сможем предоставить Питту столько рабов, сколько они могут попросить."
 DCR_nf_b048:0 "Король рейдеров"
 DCR_nf_b048_desc:0 "Бригг сделал то, что никто не считал возможным. Он спас наши банды от полного уничтожения и повернул ситуацию в пустоши в свою пользу. Теперь мы — могущественное королевство рейдеров, по сравнению с которым даже Питт покажется ничтожеством. Королевство Бригга будет править тысячу лет! Или, по крайней мере, пока он не умрёт, и мы снова не начнём убивать друг друга."
 DCR_nf_c000:0 "Восхождение Торчера"
 DCR_nf_c000_desc:0 "Вы слышали крик Бригга, когда Торчер поджег его? Это было бесценно!"
 DCR_nf_c001:0 "Последнее мерцающее пламя"
 DCR_nf_c001_desc:0 "Торчер никогда толком не рассказывал, чем занимался до того, как попал в Столичную Пустошь. Наверное, ничего особо интересного там и не было."
 DCR_nf_c002:0 "В поисках пламени"
 DCR_nf_c002_desc:0 "Я до сих пор не понимаю, где этот странный ублюдок постоянно находит все эти вещи."
 DCR_nf_c003:0 "Учась у пламени"
 DCR_nf_c003_desc:0 "Имея все эти огнеметы, мы можем разобрать несколько и выяснить, как они на самом деле работают."
 DCR_nf_c004:0 "Обуздать пламя"
 DCR_nf_c004_desc:0 "Когда вы поймете некоторые вещи, тогда вы действительно сможете нанести вред."
 DCR_nf_c005:0 "Горяч и готов"
 DCR_nf_c005_desc:0 "Торчер прав, жечь — это весело. Давайте жечь."
 DCR_nf_c006:0 "Сгоревшее мясо"
 DCR_nf_c006_desc:0 "Из этих уродов Андейла выйдет хорошая растопка."
 DCR_nf_c007:0 "Богатство Рич Мэна"
 DCR_nf_c007_desc:0 "Ребятам из Рич Мэна теперь не понадобятся их крышки, поскольку они превратились в пепел."
 DCR_nf_c008:0 "Сжечь Столицу"
 DCR_nf_c008_desc:0 "Эти поселенцы думают, что они в безопасности в своих хижинах? Посмотрим, как они себя почувствуют, когда мы их выжжем!"
 DCR_nf_c009:0 "Расплавляя сталь"
 DCR_nf_c009_desc:0 "Говорят, что огнеметное топливо не может расплавить стальную броню. Если это правда, мы просто сварим этих рыцарей живьем."
 DCR_nf_c010:0 "Дым на воде"
 DCR_nf_c010_desc:0 "Узкие коридоры и дверные проемы Ривет-Сити идеально подходят для зачистки с помощью огнеметов."
 DCR_nf_c011:0 "Огонь плазмы"
 DCR_nf_c011_desc:0 "Плазма горит даже жарче, чем топливо огнемета, поэтому Торчер хочет, чтобы эти игрушки Анклава оказались в руках наших парней."
 DCR_nf_c012:0 "Возвращение домой"
 DCR_nf_c012_desc:0 "Родной город Торчера — настоящая дыра, но нет места лучше дома."
 DCR_nf_c013:0 "Огонь Ашура"
 DCR_nf_c013_desc:0 "Огни Питта поддерживаются рабским трудом. Торчер более чем счастлив поддерживать горны в этих кузницах."
 DCR_nf_c014:0 "Восстановить Храмы Пламени"
 DCR_nf_c014_desc:0 "Некоторые из старых храмов и ритуальных мест народа Торчера сохранились до наших дней. Он хочет их привести в порядок."
 DCR_nf_c015:0 "Перерождение Факелоносцев"
 DCR_nf_c015_desc:0 "Мы больше, чем просто банда рейдеров. Мы — последователи пламени. Мы будем поддерживать огонь в пустошах во имя нашей веры."
 DCR_nf_c016:0 "Разжечь кузницы"
 DCR_nf_c016_desc:0 "В пламени наших кузниц разрушенные останки старого мира превратятся в нечто новое."
 DCR_nf_c017:0 "Наращивание производства оружия"
 DCR_nf_c017_desc:0 "Изделия наших кузниц будут превращены в орудия нашего завоевания."
 DCR_nf_c018:0 "Почитание Пламени"
 DCR_nf_c018_desc:0 "Торчер, возможно, немного странный, но в одном он прав: в наблюдении за огнём есть что-то особенное."
 DCR_nf_c019:0 "Потерянные братья"
 DCR_nf_c019_desc:0 "Есть люди, которые, как и Торчер, кое-что знают об огне. Он хочет, чтобы мы их к нам присоединили."
 DCR_nf_c020:0 "Забытые записи"
 DCR_nf_c020_desc:0 "До сих пор сохранилось несколько довоенных книг об использовании этих огнемётов. Они должны помочь тем из нас, кто умеет читать."
 DCR_nf_c021:0 "Ученики Торчера"
 DCR_nf_c021_desc:0 "Те, кто учился у Торчера, по-настоящему оценили силу пламени."
 DCR_nf_d000:0 "Королева рейдеров"
 DCR_nf_d000_desc:0 "Бригг действительно недолго продержался против этих муравьёв. Мы знали, что он слабак. Возможно, эта дама-муравей права."
 DCR_nf_d001:0 "Правление Королевы"
 DCR_nf_d001_desc:0 "У королевы сплоченная команда. Те, кто не слушает её, в конечном итоге кормят ее питомцев."
 DCR_nf_d002:0 "Слуги Королевы"
 DCR_nf_d002_desc:0 "Многим из тех, кто подчинится власти королевы, будет дарована милость рабства в качестве трутней."
 DCR_nf_d003:0 "Мастерские рабов"
 DCR_nf_d003_desc:0 "Трутни, которые окажутся более удобными, чем другие, получат рабочие места в мастерских."
 DCR_nf_d004:0 "Шахты для Трутней"
 DCR_nf_d004_desc:0 "Те, кто слишком слаб, чтобы сражаться за славу нашей королевы, будут трудиться в шахтах до самой смерти. Затем они будут кормить выводок."
 DCR_nf_d005:0 "Колония Эвергрин"
 DCR_nf_d005_desc:0 "Эвергрин теперь работает как часы. Трутни производят оружие, используемое воинами, которые отправляются в пустоши, чтобы принести еду и добычу."
 DCR_nf_d006:0 "Культ Муравья"
 DCR_nf_d006_desc:0 "Наша мудрая и могущественная королева права. Человек слаб и его нужно заменить."
 DCR_nf_d007:0 "Избранные Муравьём"
 DCR_nf_d007_desc:0 "Наши самые могущественные воины постигают путь муравья. Они будут сражаться до последнего вздоха, за эпоху муравьёв."
 DCR_nf_d008:0 "Возвращение в Кентербери"
 DCR_nf_d008_desc:0 "Королева требует, чтобы мы уничтожили всех придурков в Общине Кентербери, так что пора начинать."
 DCR_nf_d009:0 "Награда за верность"
 DCR_nf_d009_desc:0 "Те жители Столичной Пустоши, кто подчинятся власти Королевы, получат ее милость."
 DCR_nf_d010:0 "Наказание человечества"
 DCR_nf_d010_desc:0 "Стенания жалких обитателей Столичной Пустоши остаются неуслышанными. Их смерть послужит примером для тех, кто осмелится противостоять Эре Муравья."
 DCR_nf_d011:0 "Раздавленный соперник"
 DCR_nf_d011_desc:0 "Механист думал, что сможет защитить людей от наступления муравья. Он был дураком."
 DCR_nf_d012:0 "Новая жизнь для Леско"
 DCR_nf_d012_desc:0 "Королева видит применение этому тощему зануде. Ему нельзя причинять вред."
 DCR_nf_d013:0 "Дань уважения Королеве"
 DCR_nf_d013_desc:0 "Люди Столичной Пустоши воздают почести своей королеве. Этот акт — жалкая попытка не стать пищей для муравьёв."
 DCR_nf_d014:0 "Судьба человека"
 DCR_nf_d014_desc:0 "Покорение Столичной Пустоши — это только начало. На очереди — те, кто за пределами нашей территории."
 DCR_nf_d015:0 "Империя Муравьёв"
 DCR_nf_d015_desc:0 "От Колонии Эвергрин до Чесапикского залива — один правитель. НеМирмика, королева муравьёв, поддерживает строгий порядок в муравейнике. Все они — слуги колонии, будь то воины, трутни или еда. Эпоха человека закончилась, даже если эти глупцы еще об этом не знают."
 DCR_nf_d016:0 "Покорение Андейла"
 DCR_nf_d016_desc:0 "Эти чудаки из Андейла уже давно представляют собой проблему. Теперь мы с ними разберёмся."
 DCR_nf_d017:0 "АНТдейл"
 DCR_nf_d017_desc:0 "Мужчины Андейла будут кормить выводок."
 DCR_nf_d018:0 "Воины Королевы"
 DCR_nf_d018_desc:0 "Муравьи крепкие, бесстрашные и очень кусаются. Будьте осторожны, не станьте их пищей."
 DCR_nf_d019:0 "Путь Муравья"
 DCR_nf_d019_desc:0 "НеМирмика заставляет нас тренироваться с муравьями и учиться сражаться вместе с ними."
 DCR_nf_d020:0 "Вырить инкубатории"
 DCR_nf_d020_desc:0 "НеМирмика приказала рабам вырыть туннели под Эвергрином, чтобы вырастить ее потомство."
 DCR_nf_d021:0 "Могучая сила"
 DCR_nf_d021_desc:0 "Представляем новейшее поколение муравьиных воинов."
