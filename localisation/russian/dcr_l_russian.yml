####Ideas####
dcr_slave_export:0 "Работоргівці"
dcr_slave_export_desc:0 "Ніхто в Столичних Пустках не використовує рабів. Добре, що Пітт це робить."
dcr_raider_interior_design:0 "Рейдерський дизайн інтер'єрів"
dcr_raider_interior_design_desc:0 "Трупи, що звисають зі стелі, голови на палях, кров замість фарби. Зробіть наші табори якомога страшнішими. Будь-який мешканець пустки, який підійде до нас, має тікати в страху."
dcr_plentiful_stockpiles:0 "Великі запаси"
dcr_plentiful_stockpiles_desc:0 "Тут і двох кроків не пройдеш, щоб не знайти якусь стару армійську базу чи бункер, повний зброї. У нас є всі необхідні деталі, щоб полагодити стару зброю або замінити зламану. А тепер повернемося до грабунків."
DCR_slavery_focus_idea:0 "Віддані работоргівці"
DCR_slavery_focus_idea_desc:0 "Поневолення покидьків пусток та їх продаж у Парадайз-Фоллс перетворилося на великий бізнес. Звісно, деякі плаксії намагаються нападати на нас через те, що ми продали їхнього дядька, сестру чи когось іншого, але ми просто продамо й їх!"
DCR_merc_work_idea:0 "Найманство"
DCR_merc_work_idea_desc:0 "Можливо, це й не рейдерство, але близько до того. Ми все ще вбиваємо людей, грабуємо їхні пожитки й отримуємо за це гроші. Нам просто кажуть, кого можна вбивати, а кого ні, і це трохи дратує."
DCR_some_trade_idea:0 "Трохи торгівлі"
DCR_some_trade_idea_desc:0 "Нам доводиться пропускати певні каравани, які заходять на нашу територію. Усміхнений Джек уклав з нами угоду на доставку припасів, і якщо ми їх пристрелимо, то більше не отримаємо припасів."
DCR_molerat_hunts_idea:0 "Полювання на щурокритів"
DCR_molerat_hunts_idea_desc:0 "Трохи дивно, що ми просто відстрілюємо щурокритів, але, гадаю, дрібна ціль краща. Новому м'ясу треба ж якось навчитися влучати в рухому мішень."
DCR_raider_rebrand_idea:0 "Рейдерський ребрендинг"
DCR_raider_rebrand_idea_desc:0 "Це величезна зміна, але зрештою ця банда брудних дегенератів стане цінними працівниками М'ясної Компанії Бріггса."
DCR_dominate_niche_idea:0 "Домінувати в торгівлі м'ясом"
DCR_dominate_niche_idea_desc:0 "М'ясна торгівля в Столичній Пустці ведеться переважно неорганізованими мисливцями та рідкісними фермерами брамінів. Жоден із них не може конкурувати з масштабами М'ясної Компанії Бріггса."
DCR_old_farming_wisdom_idea:0 "Стара фермерська мудрість"
DCR_old_farming_wisdom_idea_desc:0 "Більшість посібників із сільського господарства не пережили останні 200 років, але ми знайшли кілька корисних порад."
DCR_economies_of_scale_idea:0 "Економія за рахунок масштабу"
DCR_economies_of_scale_idea_desc:0 "Промислові корми, м'ясопереробні заводи та рослинний крохмаль, що замінює Чудо-клей, — все це робить кожну партію нашого «Щурокритового Диво-М'яса» набагато дешевшою, ніж раніше. Споживачеві не обов'язково знати про це."
DCR_marketing_department_idea:0 "Відділ маркетингу"
DCR_marketing_department_idea_desc:0 "Ніхто не захоче купувати м'ясо у хлопця, який носить намисто з вух. Вони також не довіряють людині, яка вбила їхню бабусю дві зими тому. Наш відділ маркетингу враховує ці та інші важливі моменти, продаючи нашу продукцію мешканцям пустки."
DCR_economies_of_scale_2_idea:0 "Економія на масштабі"
DCR_economies_of_scale_2_idea_desc:0 "Промислові корми, м'ясопереробні заводи та рослинний крохмаль, що замінює Чудо-клей, — все це робить кожну партію нашого «Щурокритового Диво-М'яса» набагато дешевшою, ніж раніше. Споживачеві не обов'язково знати про це."
DCR_molerat_industrial_complex_idea:0 "Промисловий комплекс «Диво-м'ясо»"
DCR_molerat_industrial_complex_idea_desc:0 "Ми контролюємо кожен етап виробництва «Диво-м'яса» — від їжі, яку їдять щурокрити, до упаковки їхнього сушеного м'яса. Цей контроль над кожним етапом ланцюжка поставок дає нам таку конкурентну перевагу, що ніхто навіть не хоче оскаржувати наше панування на ринку."
DCR_diversified_business_idea:0 "Диверсифікований бізнес"
DCR_diversified_business_idea_desc:0 "«Диво-м'ясо» з щурокритів — це лише частина нашого бізнес-плану. Однак вихід на інші ринки обійдеться недешево."
DCR_security_contracts_idea:0 "Контракти на забезпечення безпеки"
DCR_security_contracts_idea_desc:0 "Наша корпоративна служба безпеки досягла певних успіхів у пошуку роботи як наймані охоронці. Частина з них перейшла до компанії Briggs Security Company."
DCR_corporate_espionage_idea:0 "Корпоративний шпіонаж"
DCR_corporate_espionage_idea_desc:0 "Спеціальний підрозділ нашої компанії займатиметься захистом наших корпоративних секретів та збором інформації про наших конкурентів."
DCR_economic_leviathan_idea:0 "Економічний Левіафан"
DCR_economic_leviathan_idea_desc:0 "Майже у кожного мешканця Столичної Пустки вдома є хоча б один продукт компанії Briggs. Ми їх годуємо, одягаємо і навіть даємо їм у руки зброю, щоб вони могли захищати свої домівки. Вони залежать від нас, і це дає нам величезну перевагу."
DCR_raiding_focus_idea:0 "Змінити напрямок"
DCR_raiding_focus_idea_desc:0 "Бріггс завжди був підлим сучим сином, але останнім часом він все частіше підштовхує своїх хлопців до грабунків і набігів."
DCR_slaver_synnergy_idea:0 "Синергія работоргівців"
DCR_slaver_synnergy_idea_desc:0 "Пітт змушений покладатися на нас як на свого головного постачальника рабів. Тепер вони діють за нашим графіком і забирають вантаж там, де ми скажемо."
DCR_harnessed_flame_idea:0 "Приборкали полум'я"
DCR_harnessed_flame_idea_desc:0 "Рейдери завжди любили вогонь. Як і вони самі, він руйнівний і важкокерований. Але, здається, нове керівництво знову пробудило інтерес рейдерів: вони нехарактерно зосереджені на використанні вогнеметної зброї та розробці більш смертоносного палива для своїх вогнеметів."
DCR_flame_worship_idea:0 "Поклоніння полум'ю"
DCR_flame_worship_idea_desc:0 "Вогонь був однією з наймогутніших сил світу ще до появи людини. Його слід поважати і поклонятися. Тільки тоді, коли до вогню ставляться з належною пошаною, його можна використовувати належним чином."
DCR_slave_colonies_idea:0 "Рабські колонії"
DCR_slave_colonies_idea_desc:0 "Людей сотнями поневолюють, змушуючи бути, мов трутнями в колонії королеви мурах. Робітники працюють у майстернях, на шахтах і в полях. Ті, хто помирає, стають їжею для виводку."
DCR_ant_cult_idea:0 "Культ Мурахи"
DCR_ant_cult_idea_desc:0 "Мураха — найвища форма життя на цій планеті. Хоча ми лише слабкі люди, ми все ж можемо бути корисними і допомогти їм встановити своє панування."
DCR_empire_of_ant_idea:0 "Імперія Мурах"
DCR_empire_of_ant_idea_desc:0 "Ера людини давно минула, і мурахи — справжні господарі цього нового світу. Незабаром решта пустки дізнається їхню міць."
DCR_rivet_city_trade_idea:0 "Ринок Рівет-Сіті"
DCR_rivet_city_trade_idea_desc:0 "У нас є крамничка на ринку Рівет-Сіті, де продається наша продукція. Закріплення на одному з найбільших ринків регіону приносить фантастичний прибуток!"
DCR_buying_molerat_meat_idea:0 "«Диво-м'ясо»"
DCR_buying_molerat_meat_idea_desc:0 "Ми дозволили містеру Бріггсу продавати своє диво-м'ясо на ринку. Хоча це й відволікає частину наших клієнтів, дешеве м'ясо добре зберігається і допомагає нашим силам безпеки харчуватися під час далеких патрулів."
DCR_raiders_at_heart:0 "Рейдер у душі"
DCR_raiders_at_heart_desc:0 "Наркоторгівля та продаж рабів можуть приносити певний прибуток, але по суті кожен рейдер прагне сіяти вбивства й хаос, а отримання кришок — це другорядна нагорода."
dcr_drug_runners:0 "Наркоторгівля"
dcr_drug_runners_desc:0 "Ми починали з продажу хімікатів тим, хто може заплатити, і вбивства тих, хто раптом виявився не в змозі це зробити."

####Characters and Traits####
 dcr_ryan_brigg_name:0 "Раян Брігг"
 dcr_ryan_brigg_desc:0 "Ніхто з його людей не знає, що Раян Брігг взагалі не схильний до рейдів. Його справжня мета — перетворити м'ясо щурокрита на щось більш їстівне і розбагатіти, продаючи його у всіх містах Пустки. А поки він зберігає маску виродка. Він — безжальний лідер рейдерів, який уб'є підлеглого за те, що той набридав йому, тому що, якщо хтось із них запідозрить, що він не та людина, за яку себе видає, то згниє разом із спійманими ним щурокритами."
 dcr_little_bart_desc:0 "Син сумнозвісного рейдера «Великого Злого Барта» та жриці з боліт, що торгувала наркотиками, Маленький Великий Барт успадкував геніальність матері, силу батька і характер, що перевершує їх разом узятих. Очоливши вашингтонських рейдерів, він прагне помститися вбивцям свого батька і заодно накачати наркотою всю пустку."
 dcr_brains_and_brawn:0 "Мозок і м'язи"
 dcr_antagonizer_name:0 "НеМірміка"
 DCR_ANTAGONIZER_DESC:0 "Мета НеМірміки — не більше і не менше, як знищення людства і початок ери мурах. Поки вона не зможе зібрати достатню кількість мурах, цих рейдерів буде достатньо."
 dcr_torcher_name:0 "Торчер"
 DCR_TORCHER_DESC:0 "Більше за набіги Торчер любить тільки одну річ — вогонь. Дехто каже, що саме тому він і любить рейди."
 DCR_crushed_dream_trait:0 "Розбиті мрії"
 DCR_crushed_dream_trait_desc:0 "Відмова від своєї мрії загартувала Раяна Бріггса. Хоча колись у нього були сумніви щодо деяких жорстоких аспектів рейдів, тепер він відкинув ці сумніви і повністю присвятив себе ролі ватажка рейдерів."
 DCR_slaver_boss_trait:0 "Бос работоргівців"
 DCR_ant_queen_trait:0 "Королева Мурах"
 DCR_ant_queen_trait_desc:0 "НеМірміка керує своєю бандою подібно до мурашника. У кожного члена є своя роль, яку він повинен виконувати, і будь-яке відхилення карається вигнанням або смертю. Нові рейдери швидко приєднуються до них, побачивши, як мурахи пожирають когось, хто не справляється."
 DCR_torcher_minister_name:0 "Торчер"
 DCR_torcher_minister_trait:0 "Полум'я"
 DCR_torcher_leader_trait:0 "Підпалювач"
 DCR_torcher_leader_trait_desc:0 "Більше за набіги Торчер любить тільки одну річ — вогонь. Дехто каже, що саме тому він і любить рейди."
 DCR_goalie_minister_name:0 "Воротар Леду"
