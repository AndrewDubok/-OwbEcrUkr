#### Tooltips ####
 dcr_ww_appeal_rises_slightly.tt:0 "Це допоможе нам продати диво-м'ясо"
 dcr_ww_appeal_rises_moderately.tt:0 "Це дійсно допоможе нам продати диво-м'ясо"
 dcr_ww_appeal_falls_slightly.tt:0 "Це зашкодить нашій здатності продавати диво-м'ясо"
 dcr_ww_appeal_falls_moderately.tt:0 "Це серйозно зашкодить нашій здатності продавати диво-м'ясо"
 DCR_1.tt:0 "Відкриває можливість відправляти хлопців на рейди, щоб зайняти їх чимось"
 DCR_2.tt:0 "Недостатність рейдів викликає у хлопців деяке занепокоєння"
 DCR_3.tt:0 "Відкриває можливість приймати рішення про участь у нових рейдах за рабами"
 DCR_4.tt:0 "Відкриває рішення про продаж місцевих поселенців до Парадайз-Фоллс"
 DCR_5.tt:0 "У рейдерів може відбутися зміна керівництва..."
 DCR_6.tt:0 "Вам потрібно бути уважним до своїх виборів. Вони збільшать/зменшать підозрілість оточуючих Бріггса, а також підвищать ринкову привабливість його диво-м'яса."
 DCR_7.tt:0 "Торчер готує загін зі своїх найвідданіших послідовників!"
 DCR_8.tt:0 "Ті, хто б'ються, як мурахи, готуються до битви!"
 DCR_9.tt:0 "Зграї мурах готові поглинути пустку!"
 DCR_10.tt:0 "Нові групи безпеки охоронятимуть наші заводи."
 DCR_11.tt:0 "Військова компанія Бріггса забезпечить безпеку наших активів."
 DCR_12.tt:0 "Свіже м'ясо готове до забою"
 DCR_13.tt:0 "Деякі хлопці вчаться використовувати силову броню"
 DCR_14.tt:0 "Елогі дякує Бріггсу, даруючи йому одного зі своїх найкращих рабів"
 DCR_nf_wip.tt:0 "§RЦей фокус рейдерів Столичної Пустки знаходиться в розробці.§!"

#### Events ####
 DCR_nf_events.1.title:0 "Все найкраще"
 DCR_nf_events.1.desc:0 "До того, як організувалися поселення Столичної Пустки, землями правили рейдери, і ми купалися в грошах. Ми торгували наркотиками, викрадали рабів і, звісно ж, просто грабували скрізь, де хотіли. Однак найуспішнішими бандами були ті, які..."
 DCR_nf_events.1.a:0 "Працювали з наркотою"
 DCR_nf_events.1.b:0 "Трималися разом"
 DCR_nf_events.1.c:0 "Влаштовували пекло повсюди"
 DCR_nf_events.2.title:0 "Проблема"
 DCR_nf_events.2.desc:0 "Після того, як поселення організувалися й витіснили цих ідіотів із руїн Бетесди, вони почали придивлятися до інших банд і об'єднуватися, щоб витіснити й нас із нашої території! У більшості банд вистачило розуму бігти, побачивши армію, що наближається, і тепер вони лише тиняються цими місцями, щоб торгувати в Парадайз-Фоллс або нападати на випадкові каравани. Тим не менш, нам вдалося прихопити деякі припаси, перш ніж ми вибралися з укриття."
 DCR_nf_events.2.a:0 "Ми прихопили рушниці"
 DCR_nf_events.2.b:0 "Ми прихопили рабів"
 DCR_nf_events.2.c:0 "Ми прихопили кришки"
 DCR_nf_events.2.d:0 "Ми прихопили все, що не прибито цвяхами!"
 DCR_nf_events.3.title:0 "Чоловік"
 DCR_nf_events.3.desc:0 "І тут звідки не візьмись з'являється цей хлопець, крутий ватажок рейдерів звідкись із півночі чи щось таке. Його звуть Брігг. Він досить розумний для рейдера, вирішив, що якщо поселення організуються і надирають нам дупи, то й нам слід організуватися, і тоді ми зможемо надрати їм дупи. Об'єднати всіх цих бевзів непросто, але, здається, він справляється. Здається, люди йдуть за ним, тому що..."
 DCR_nf_events.3.a:0 "Він безжальний"
 DCR_nf_events.3.b:0 "Він розумний"
 DCR_nf_events.3.c:0 "Він хитрий"
 DCR_nf_events.4.title:0 "Запис у журналі терміналу Раяна Бріггса #171"
 DCR_nf_events.4.desc:0 "Я помітив позитивні реакції на декстринові субстанції. Я продовжу тестувати різні форми, щоб подивитися, до чого це мене приведе. Якщо й існує момент для прориву, то це саме зараз. Маскуватися під одного з цих мерзенних убивць стає втомливо, щойно це шапіто стихає. Однак одне безсумнівно, якщо експеримент увінчається успіхом, ми всі можемо розбагатіти. Щурокрит — один із найлегших у доступі видів м'яса, але й найогидніший. Якщо мені вдасться перетворити його на повноцінне джерело їжі..."
 DCR_nf_events.4.a:0 "Будемо сподіватися, що вони не дізнаються про це раніше"
 DCR_nf_events.5.title:0 "Важкий вибір"
 DCR_nf_events.5.desc:0 "Вибір одного з цих психів як моєї так званої правої руки, здається, дуже важливий для цих рейдерів. Принаймні, це дозволить мені зосередитися на своїх дослідженнях, а не на їхніх чварах. Здається, цей Торчер міг би тримати хлопців у вузді, але він більш неврівноважений, ніж решта. Леду — цілком прийнятний варіант, оскільки він має досвід управління власною бандою і, здається, не такий вже й вибуховий. Або я міг би покластися на Усміхненого Джека. Може, він і не такий вже й рейдер, але хлопці все одно його слухають, і він час від часу працює з караванами."
 DCR_nf_events.5.a:0 "Вперед з Торчером"
 DCR_nf_events.5.b:0 "Леду - ваш вихід"
 DCR_nf_events.5.c:0 "Усмішка Джека підкуповує"
 DCR_nf_events.6.title:0 "Прорив близько"
 DCR_nf_events.6.desc:0 "Після місяців досліджень я, здається, близький до прориву. Чудо-клей, здається, добре поєднується з м'ясом щурокрита, створюючи продукт, який не тільки смачніший, але й має більш відновлювальні властивості. Мені все ще потрібно провести більше тестів і знайти спосіб збільшити виробництво, якщо я хочу розробити життєздатний продукт, але я нарешті бачу чортів світло в кінці цього тунелю."
 DCR_nf_events.6.a:0 "Скоро я звільнюся від цього кошмару"
 DCR_nf_events.7.title:0 "Жах"
 DCR_nf_events.7.desc:0 "Деякі рейдери ставили занадто багато запитань про те, що відбувається. Мені потрібно було зробити щось серйозне, щоб вони поки не здогадалися. І тут мене осяяло. У нас залишилося кілька полонених з останнього рейду, на який я їх посилав хлопців, і кілька втрачених кришок із Парадайз-Фоллс варті того, щоб угамувати натовп. Тому я наказав їм кинути полонених до зачиненого в клітці Бегемота. Звісно, вони довго не протрималися, але цим психопатам подобається дивитися, як ця штука їсть."
 DCR_nf_events.7.a:0 "Мені це теж починає подобатися."
 DCR_nf_events.8.title:0 "Що це за пристрій?"
 DCR_nf_events.8.desc:0 "Незважаючи на всі мої спроби приховати свої дослідження від рейдерів, вони пронюхали, що я щось роблю з м'ясом щурокритів і чудо-клеєм. Коли мене застали зненацька, вони побачили, що я працюю з машиною, і поставили купу запитань. Мені довелося швидко думати, пояснюючи. Я робив..."
 DCR_nf_events.8.a:0 "Ем... Наркоту?"
 DCR_nf_events.8.b:0 "Нове паливо для Торчера"
 DCR_nf_events.8.c:0 "Корм для Бегемота"
 DCR_nf_events.9.title:0 "Передача зразків м'яса"
 DCR_nf_events.9.desc.1:0 "Пробратися крадькома з Евергрін-Міллс і потрапити на територію Поселень Столичної Пустки було непросто, і мене мало не застрелили, коли побачили, але я зміг передати своє повідомлення, а також упаковку зразків м'яса. Не думаю, що хтось бачив, як я пробирався назад, тож я маю бути поза підозрами."
 DCR_nf_events.9.desc.2:0 "Було досить просто передати повідомлення та зразки м'яса останньому каравану, що проїжджав через Евергрін-Міллс. Тепер мені залишається тільки сидіти й чекати. Якщо все пройде добре, я скоро почну отримувати кришки."
 DCR_nf_events.9.a:0 "Це має спрацювати"
 DCR_nf_events.10.title:0 "Вади"
 DCR_nf_events.10.desc:0 "Здається, що рейдерам мало що подобається більше, ніж грабунки та безладне насильство, але те небагато, чим вони займаються, вони знаходять в Евергрін-Міллс. Секс, наркотики та інше насильство, здається, єдине, що, окрім безглуздих убивств, може умиротворити цих людей. У мене ще залишилося кілька кришок, які я можу вкласти в їхні вади, щоб спробувати відволікти їх."
 DCR_nf_events.10.a:0 "Вкласти в нарколабораторію"
 DCR_nf_events.10.b:0 "Вкласти в бордель"
 DCR_nf_events.10.c:0 "Побудувати бійцівську арену"
 DCR_nf_events.10.d:0 "Ми можемо вкластися у все?"
 DCR_nf_events.11.title:0 "Спектакль"
 DCR_nf_events.11.desc:0 "Один із рейдерів ставив занадто багато запитань про моє минуле і про те, чому я не брав участі в рейдах відколи прийняв командування. Спочатку я збирався просто пристрелити його, адже це, здається, справляє враження на цих типів, але згадав про величезного супермутанта, якого вони зачинили зовні. Кинути його на поталу звірові здалося мені елегантним вирішенням проблеми, до того ж не дозволивши іншим засумніватися в моїй кваліфікації. Це мало дати мені хоч трохи часу."
 DCR_nf_events.11.a:0 "Але цей хрускіт..."
 DCR_nf_events.12.title:0 "Не такий вже й Парадайз"
 DCR_nf_events.12.desc:0 "Парадайз-Фоллс виглядав приблизно так, як і має виглядати табір работоргівців. Безліч черепів на палях, скелети в клітках та інші застереження, покликані переконати рабів навіть не намагатися втекти. Зустріч з Елогі пройшла успішно, і, здається, він задоволений поставками рабів з Евергрін-Міллс, але хоче більше. За словами Елогі, Пітт скуповує майже всіх рабів на ринку, тож якщо ми зможемо збільшити поставки, кожен отримуватиме хороші кришки. Єдина проблема в тому, що якщо ми почнемо захоплювати більше рабів, у Поселень Столичної Пустки можуть виникнути проблеми."
 DCR_nf_events.12.a:0 "Це погано позначиться на продажах диво-м'яса"
 DCR_nf_events.13.title:0 "Таємне послання"
 DCR_nf_events.13.desc:0 "Це було нелегко, але лідеру Поселень Столичної Пустки було відправлено повідомлення з пропозицією укласти угоду, згідно з якою ми більше не будемо на них нападати. Я зможу переключити увагу хлопців на південь або захід, не викликаючи занадто великих підозр."
 DCR_nf_events.13.a:0 "Сподіваюся, я правий"
 DCR_nf_events.14.title:0 "Запис у журналі терміналу Раяна Бріггса #235"
 DCR_nf_events.14.desc:0 "Я ледве міг повірити своїм очам: диво-м'ясо щурокрита має величезний успіх у керівництва Поселень Столичної Пустки. Вони відкриті для торгівлі і навіть не готові стріляти в моїх хлопців, якщо ми припинимо рейди і дотримуватимемося в'яленого м'яса. Тепер найскладніше – переконати рейдерів відмовитися від цього способу життя і натомість заробляти кришки, полюючи на щурокритів. Я подумував кинути це місце і відкрити магазин в іншому місці, але в мене немає кришок, щоб почати все спочатку і задовольнити попит. Ні, вони, як і раніше, вважають мене босом, і це коштує багато. Це спрацює."
 DCR_nf_events.14.a:0 "Я зможу їх переконати"
 DCR_nf_events.14.b:0 "Власне, це нерозумно. Давайте просто грабувати їх."
 DCR_nf_events.15.title:0 "Запис у журналі терміналу Раяна Бріггса #269"
 DCR_nf_events.15.desc:0 "Було прикро відмовитися від ідеї створення диво-м'яса саме тоді, коли мені вдалося створити прийнятний продукт, але, принаймні, тепер у мене є дешевий спосіб прогодувати свою армію. Відмовившись від цього плану, я виявив, що мені легше вжитися в нову роль. Поселення Столичної Пустки та канібали Андейла тепер підкоряються мені, і ми відправляємо рабів до Пітта цілими караванами. У мене навіть скоро зустріч з Ашуром. Схоже, я справді стримав обіцянку, дану цим рейдерам багато років тому."
 DCR_nf_events.15.a:0 "Тепер настануть хороші часи"
 DCR_nf_events.16.title:0 "Палючий Брігг"
 DCR_nf_events.16.desc:0 "Брігг брехав усім нам, і за це він мав згоріти. Ми більше не зможемо контролювати полум'я всередині нас. Ми поширимося пустками, мов лісова пожежа, і спалимо все на своєму шляху!"
 DCR_nf_events.16.a:0 "СПАЛІТЬ УСЕ!"
 DCR_nf_events.17.title:0 "Інше полум'я"
 DCR_nf_events.17.desc:0 "Тих небагатьох, що не згоріли, ми все одно відправляємо в Пітт за кришки. Кришки — це більше палива. Більше палива — більше вогню. Тепер Ашур хоче поговорити з Торчером. Поговоримо про те, як зробити більше кришок, а це означає більше вогню!"
 DCR_nf_events.17.a:0 "Ми постараємося його теж не спалити"
 DCR_nf_events.18.title:0 "Цінна людина?"
 DCR_nf_events.18.desc:0 "Кожен член Армії Королеви — всього лише зброя у війні проти людини, навіть гірший за найслабшу мураху. Але цей останній полонений, доктор Леско, — щось особливе. Він знає секрет, як зробити мурах сильнішими, більшими і навіть змусити їх дихати вогнем! Ми подбаємо про те, щоб цей полонений почувався комфортно і був ситий, доки він виконує накази Королеви. В іншому випадку він годуватиме колонію."
 DCR_nf_events.18.a:0 "Він буде корисним"
 DCR_nf_events.19.title:0 "Коронація королеви"
 DCR_nf_events.19.desc:0 "Слабак на ім'я Брігг більше не існує. Як і всі люди, він не міг зрівнятися з міццю мурахи! Тепер банду зневажених людишок бере під свій контроль новий правитель — НеМірміка! З цією новою армією та своїми мурахами вона принесе руйнування світу людей! Ера людей закінчена!"
 DCR_nf_events.19.a:0 "Ера мурах починається!"
 DCR_nf_events.21.title:0 "Дивна пропозиція"
 DCR_nf_events.21.desc:0 "Ми чули від проїжджих торговців розповіді про те, що банди рейдерів на південному заході закинули свої справи і переключилися на якийсь м'ясний бізнес. Мало хто в Рівет-Сіті повірив цьому, поки їхній ватажок не з'явився з ящиками свого «диво-м'яса щурокрита». Зразки, які він роздавав своїм людям, справили фурор серед тих, хто його пробував, і стверджували, що воно краще за будь-якого щурокрита, якого вони коли-небудь пробували. Цей містер Брігг хоче відкрити крамничку на ринку, щоб продавати м'ясо, і запевняє нас, що в цьому немає жодного рейдерського трюку."
 DCR_nf_events.21.a:0 "Прийняти його пропозицію"
 DCR_nf_events.21.b:0 "Відхилити його пропозицію"
 DCR_nf_events.20.title:0 "Диво-м'ясо щурокрита?"
 DCR_nf_events.20.desc:0 "Ми отримали повідомлення від не кого іншого, як від Раяна Бріггса, лідера реорганізованих рейдерів Столичної Пустки. Він стверджує, що насправді є вченим, який хоче перетворити цю банду рейдерів на якесь комерційне підприємство за допомогою розробленої ним нової технології переробки м'яса щурокритів. У пустці, сповненій дивних і неймовірних речей, це, безсумнівно, одне з найбезглуздіших видовищ, але, чорт забирай, зразок м'яса, який він прислав, просто чудовий. Якщо ми думаємо, що можемо йому довіряти, нам варто розглянути його пропозицію і замовити першу партію м'яса."
 DCR_nf_events.20.a:0 "Ми замовимо 30 ящиків!"
 DCR_nf_events.20.b:0 "Проігнорувати його"
 DCR_nf_events.22.title:0 "Ніколи не вір рейдеру!"
 DCR_nf_events.22.desc:0 "Ми мали очікувати, що повідомлення від Раяна Бріггса виявиться не більш ніж якимось безглуздим жартом рейдерів! Ми не тільки не отримали нашу партію диво-м'яса щурокрита, але й на людей, яких ми відправили за ним, напали, і тільки один із них повернувся живим! Схоже, ситуація в Евергрін-Міллс анітрохи не змінилася, і нам варто бути готовими до нових неприємностей з рейдерами в майбутньому."
 DCR_nf_events.22.a:0 "Чорт... Мені сподобалося це в'ялене м'ясо"
 DCR_nf_events.23.title:0 "Столичні рейдери"
 DCR_nf_events.23.desc:0 "Ватажок рейдерів зі Столичної Пустки нещодавно зустрічався з Ашуром, щоб обговорити покращення робочих відносин. Хоча ці рейдери трохи дикуваті навіть за мірками Пітта, саме вони постачають нам більшу частину робітників, яких ми використовуємо в наших кузнях. Можливо, було б краще укласти з ними якусь угоду."
 DCR_nf_events.23.a:0 "Ми будемо працювати з цими рейдерами більш тісно"
 DCR_nf_events.23.b:0 "Залишимо все, як є"
 DCR_nf_events.24.title:0 "Відмова Ашура"
 DCR_nf_events.24.desc:0 "Ашур вирішив, що він не хоче жодного союзу з нами. Схоже, він надто хороший, щоб надто тісно співпрацювати з такими, як ми, а ми годимося тільки на те, щоб постачати йому рабів для його заводів. Принаймні, ми все ще можемо вичавити з цього старого виродка трохи кришок."
 DCR_nf_events.24.a:0 "От лох"
 DCR_nf_events.25.title:0 "Збільшення кількості рейдів"
 DCR_nf_events.25.desc:0 "Незрозуміло, що спричинило раптовий сплеск рейдерської активності на півдні, але ми спостерігаємо різке збільшення кількості нападів на поселення та каравани поблизу кордону з тим, що вважається їхньою територією. Людям було рекомендовано поки що уникати цього району, і ми направляємо туди додаткові сили ополченців для патрулювання."
 DCR_nf_events.25.a:0 "Щось важливе насувається?"
 DCR_nf_events.26.title:0 "Різке зростання кількості викрадень людей"
 DCR_nf_events.26.desc:0 "У поселеннях на південь від нас різко зросла кількість нападів рейдерів з метою захоплення полонених із поселень і караванів у цьому районі. Оскільки ми не чули про викуп цих людей, можна з упевненістю припустити, що їх продають у рабство."
 DCR_nf_events.26.a:0 "Прокляті работоргівці"
 DCR_nf_events.27.title:0 "Задоволення попиту"
 DCR_nf_events.27.desc:0 "Оскільки ополчення Поселень Столичної Пустки все ще пильно стежить за ситуацією, не так просто захопити необхідну кількість рабів для Елогі. Можливо, нам доведеться почати забирати людей із поселень на наших кордонах, які зазвичай платять данину кришками, металобрухтом або їжею."
 DCR_nf_events.27.a:0 "Зробіть це"
 DCR_nf_events.27.b:0 "Ми не можемо надто сильно тиснути на цих людей"
 DCR_nf_events.28.title:0 "Запис у журналі терміналу Раяна Бріггса #234"
 DCR_nf_events.28.desc:0 "Щось відбувається з рейдерами, якими мені, на жаль, довелося себе оточити. Коли я входжу в кімнату, вони уникають дивитися на мене. Але не зі звичайним виразом на кшталт: «боюся, він мене випатрає за те, що я на нього косо подивився», а ніби щось замишляють. Я переймаюся, що вони мене розкусили. Почну збирати тривожну сумку сьогодні ввечері, про всяк випадок, якщо доведеться швидко забратися звідси."
 DCR_nf_events.28.a:0 "Чому я чую мурах?"
 DCR_nf_events.28.b:0 "Чому я відчуваю запах горілого?"
 DCR_nf_events.29.title:0 "Смерть дурня"
 DCR_nf_events.29.desc:0 "Механіст надто довго протистояв НеМірміці. Незліченна кількість її потомства загинула від його дурних машин, і саме завдяки його зусиллям вона була вигнана зі свого лігва за межами громади Кентербері. Ймовірно, він усвідомив свою помилку, коли сотні мурах і рейдерів напали на його жалюгідне укриття. Його тіло вигодувало потомство, а його шолом тепер є трофеєм на троні королеви."
 DCR_nf_events.29.a:0 "Усіх наших ворогів спіткає та ж доля"
 DCR_nf_events.30.title:0 "Новий бізнес"
 DCR_nf_events.30.desc:0 "Хлопці трохи стривожені, оскільки Бріггс сказав, що ми припиняємо співпрацю з Парадайз-Фоллс. Було висловлено безліч різних пропозицій про те, чим можна замінити ті кришки, яких ми більше не отримаємо."
 DCR_nf_events.30.a:0 "Будемо торгувати наркотиками"
 DCR_nf_events.30.b:0 "Будемо найманцями"
 DCR_nf_events.30.c:0 "Збиральництво?!"
 DCR_nf_events.31.title:0 "Кілька поганих фруктів"
 DCR_nf_events.31.desc:0 "Багато хлопців підсіли на м'ясний потяг щурокрита, побачивши, які кришки з них можна зробити, але є й чимало хлопців, які не хочуть відмовлятися від способу життя рейдерів. Вони стріляють по караванах і погрожують піти, якщо ми не повернемося до рейдів. Вони стануть великою проблемою, якщо ми з ними не розберемося."
 DCR_nf_events.31.a:0 "Вбити їх усіх"
 DCR_nf_events.31.b:0 "Дайте їм підвищення, щоб вони заспокоїлися"
 DCR_nf_events.32.title:0 "Криваві пильщики"
 DCR_nf_events.32.desc:0 "Довгі роки Регулятори були для нас занозою в дупі. Це була купа хороших хлопців, які полювали за ватажками рейдерів, а іноді й зачищали цілі табори. Вони відкинули нас до Евергрін-Міллс, але тепер все по-іншому. Ми переслідували їх до самої їхньої маленької халупи і сьогодні вбили останнього з них. Дехто носить їхні значки як трофеї, але справжня здобич — те, що ми знайшли в ящиках на їхній базі."
 DCR_nf_events.32.a:0 "Як багато зброї"
 DCR_nf_events.33.title:0 "Пропозиція рейдерів"
 DCR_nf_events.33.desc:0 "Рейдери Столичної Пустки об'єдналися під проводом людини на ім'я Брігг і підкорили собі майже весь регіон. Тепер вони сидять на нашому кордоні і просять нас приєднатися. Будучи самі рейдерами, ми знаємо, що станеться, якщо ми скажемо «ні»."
 DCR_nf_events.33.a:0 "Приєднатися до рейдерів"
 DCR_nf_events.33.b:0 "Послати їх нах*р"
 DCR_nf_events.34.title:0 "Раби ринули потоком"
 DCR_nf_events.34.desc:0 "Відколи рейдери Брігга пронеслися Столичною Пусткою, потік рабів перетворився з постійного струмка на бурхливу річку. Вони надсилають нам рабів чи не в такій кількості, що ми не знаємо, куди їх подіти. Єдина вада полягає в тому, що, стаючи все більшим постачальником робочої сили, вони стають все більш вимогливими."
 DCR_nf_events.34.a:0 "Дайте їм їхні кришки."
 DCR_nf_events.35.title:0 "Практично знищений"
 DCR_nf_events.35.desc:0 "Понад століття Факелоносці проводили священні ритуали вогню. Вони вивчали древні тексти і ненавиділи свого ворога, йоґая на ім'я Смокі, який, як говорили, ходив прямо і намагався загасити вогонь. Їхня шанобливість була винагороджена тим, що вони виявили древній склад потужних вогнеметів. Потім прийшли Рокісти. Ці люди прийшли з півдня з ненавистю в очах і вбили всіх, хто не зрікався шляхів полум'я. Зіткнувшись зі смертю або відмовою від своєї віри, Торчер обрав третій варіант. Він обрав втечу. Він вирішив продовжити шлях свого народу. Із жарин своєї віри він запалить новий вогонь. Цей вогонь спалить Столичну Пустку. Потім, коли вогонь стане достатньо сильним, він повернеться на пагорби заходу. \n \n Тоді згорять каменепоклонники."
 DCR_nf_events.35.a:0 "Вогонь розростається"
 DCR_nf_events.36.title:0 "Вогонь горить яскравіше, ніж будь-коли"
 DCR_nf_events.36.desc:0 "Полум'я Факелоносців було майже погашено багато років тому Рокістами. Відтоді Торчер збирав хмиз. Він сколотив армію і навчив її шляху полум'я. Ця іскра перетворилася на ревуче полум'я, що охопило Столичну Пустку. Потім воно досягло пагорбів, де народився Торчер. Тих, хто намагався знищити Факелоносців, кидали на поховальні вогнища і зводили нові храми полум'я на місці старих. Полум'я тепер горить яскравіше, ніж будь-коли, і шляхи Факелоносців продовжують жити."
 DCR_nf_events.36.a:0 "Полум'я ніколи не згасне"
 DCR_nf_events.37.title:0 "Королева-вбивця"
 DCR_nf_events.37.desc:0 "Хлопцям подобалось спостерігати, як Брігга пожирають мурахи, але це не означало, що всі були згодні слідувати за леді, яка вбирається в мурашині обладунки і міркує про падіння людства. НеМірміка розуміла слабкість людських сердець і передбачала незгодних. Разом зі своїми мурахами та тими, хто був їй вірний, вона швидко розправлялася з тими, хто наважувався їй протистояти. Їхні черепи прикрашали її трон у самому серці Базару. З цього трону вона проголошувала свою владу і долю тих, хто сумнівається. Якщо є щось, що могло б визначити її правління, то це..."
 DCR_nf_events.37.a:0 "Нагорода для лояльних"
 DCR_nf_events.37.b:0 "Суворі покарання для нелояльних"
 DCR_nf_events.37.c:0 "Прихильність до сильних"
 DCR_nf_events.37.d:0 "Дивні примхи королеви"
 DCR_nf_events.38.title:0 "Поставки до Парадайз-Фоллс"
 DCR_nf_events.38.desc:0 "Поставки рабів зі Столичної Пустки різко скоротилися. Коли ми відправили людей перевірити, що відбувається, Елогі Джонс повідомив нам, що найбільша банда рейдерів у регіоні вирішила відмовитися від работоргівлі. Вони запевнили нас, що це тимчасова затримка, і його люди підтягнуться і задовольнять попит. Мине зовсім небагато часу, перш ніж вони зможуть це зробити."
 DCR_nf_events.38.a:0 "Наше терпіння не безмежне"

#### New Focuses ####
 DCR_nf_a001:0 "Хороші часи"
 DCR_nf_a001_desc:0 "З незапам'ятних часів справи у рейдерів у Столичній Пустці йшли досить непогано. Так, ці бляшанки в руїнах були справжньою занозою, але якщо триматися від них подалі, все було добре."
 DCR_nf_a002:0 "Погані часи"
 DCR_nf_a002_desc:0 "А потім цим довбаним ідіотам з Бетесди довелося облажатися і якимось чином змусити всіх цих лохів із поселень об'єднатися. Як, чорт забирай, рейдер повинен грабувати, якщо щоразу, коли ти нападаєш на караван, за тобою женеться сотня хлопців?"
 DCR_nf_a003:0 "Новий Бос"
 DCR_nf_a003_desc:0 "Цей новенький, Брігг, зібрав купу хлопців. Він каже, що якщо ми об'єднаємося, то колись зможемо розчавити цих невдах і знову стати головними. Варто спробувати, правда?"
 DCR_nf_a004:0 "Знову хороші часи"
 DCR_nf_a004_desc:0 "Наша територія, можливо, вже не така велика, як раніше, але ми все одно отримуємо свою здобич."
 DCR_nf_a005:0 "Поїздки в Парадайз"
 DCR_nf_a005_desc:0 "Продаж бранця в Парадайз-Фоллс завжди був хорошим способом заробити трохи кришок. Можливо, зараз вони знаходяться в центрі території Поселень, але ми все ще можемо туди дістатися."
 DCR_nf_a006:0 "Зміна напрямку"
 DCR_nf_a006_desc:0 "Брігг, звісно, правий: колись у нас закінчиться все, що можна було б грабувати. Але якщо ми не грабуємо, хіба ми рейдери?"
 DCR_nf_a007:0 "Нові можливості"
 DCR_nf_a007_desc:0 "Кришки є кришки, і ці нові плани мають дати нам їх багато."
 DCR_nf_a008:0 "Закулісний діалог"
 DCR_nf_a008_desc:0 "Хтось сказав, що Брігг розмовляє з хлопцями з Поселень."
 DCR_nf_a009:0 "Тримати темп"
 DCR_nf_a009_desc:0 "Я просто не розумію, якщо Елогі платить купу кришок за рабів, чому ми не намагаємося отримати більше?"
 DCR_nf_a010:0 "Підтримувати баланс"
 DCR_nf_a010_desc:0 "Іди, хапай поселенців, приведи їх у Парадайз і повтори."
 DCR_nf_a011:0 "День виплат"
 DCR_nf_a011_desc:0 "Раби невпинно прямують до Парадайз-Фоллс, а кришки — до Евергрін-Міллс."
 DCR_nf_a012:0 "Відповідати попиту"
 DCR_nf_a012_desc:0 "Кожен невдаха з пустки, якого ми приводимо до Парадайз-Фоллс, тепер коштує вдвічі більше, ніж раніше. Звісно, тоді ми захопимо більше!"
 DCR_nf_a013:0 "Людський ресурс"
 DCR_nf_a013_desc:0 "Деякі з цих невдах, що живуть на нашій території, платять мало за «захист». Може, нам варто їх теж прихопити?"
 DCR_nf_a014:0 "Міцне партнерство"
 DCR_nf_a014_desc:0 "Елогі в захваті від усіх цих нових рабів, яких ми йому постійно даруємо. Не знаю, чи означає це, що ми отримаємо більше кришок, але ж повинна ж бути якась нагорода, правда?"
 DCR_nf_a015:0 "Права рука"
 DCR_nf_a015_desc:0 "Кожному босу рейдерів потрібен свій помічник. І він має бути божевільнішим за всіх, щоб тримати інших у вузді. Але кого ж вибере Брігг?"
 DCR_nf_a016:0 "Піроман"
 DCR_nf_a016_desc:0 "Торчер — божевільний сучий син. Кажуть, він спалив цілий автобус дітей за те, що вони сказали, що він виглядає як бомж."
 DCR_nf_a017:0 "Іграшки з вогником"
 DCR_nf_a017_desc:0 "Не знаю, де Торчер постійно знаходить ці вогнемети, і питати не буду. Цей псих стверджує, що вогонь підказує йому, куди йти, що б це не означало."
 DCR_nf_a018:0 "Воротар"
 DCR_nf_a018_desc:0 "Цей хлопець, Леду, і його маленька банда одержимі якимось старим довоєнним видом спорту, в який грали на льоду. Якщо йому це так подобається, чому б йому не побігти туди, де холодно?"
 DCR_nf_a019:0 "Наймана робота"
 DCR_nf_a019_desc:0 "У Леду деякі хлопці займаються найманською роботою, коли не беруть участі в рейдах. Вони все одно можуть стріляти в людей, а кришки є кришки, вірно?"
 DCR_nf_a020:0 "Торгаш"
 DCR_nf_a020_desc:0 "Який придурок взагалі міг поставити Усміхненого Джека на чолі чого б то не було? Цей мудак тільки й робить, що здіймає ціни в небо!"
 DCR_nf_a021:0 "Торговельні угоди"
 DCR_nf_a021_desc:0 "Цей клоун дійсно відкриває нашу територію для торговців, кажучи хлопцям, що вони не можуть бити тих, кому він дає прохід. Принаймні нам стали частіше постачати патрони..."
 DCR_nf_a022:0 "Реальна робота"
 DCR_nf_a022_desc:0 "Мені здається, чи Брігг останнім часом віддає якісь дуже дивні накази? Звідки в нього така пристрасть до щурокритів?"
 DCR_nf_a023:0 "Рейд за спорядженням"
 DCR_nf_a023_desc:0 "Брігг хоче, щоб ми прикінчили кількох розумак і забрали їхнє лабораторне обладнання. Він готує якісь наркотики чи щось подібне?"
 DCR_nf_a024:0 "Рейд за клеєм?"
 DCR_nf_a024_desc:0 "Що за херня з цим новим списком здобичі? Ми що, повинні шукати клей частіше, ніж боєприпаси чи хімікати?"
 DCR_nf_a025:0 "У пошуках обладнання"
 DCR_nf_a025_desc:0 "Як, чорт забирай, виглядає колба Ерленмеєра?"
 DCR_nf_a026:0 "Жебрання за клеєм?"
 DCR_nf_a026_desc:0 "Що такого задумав Брігг, щоб змусити хлопців витрачати час на пошуки клею в старих руїнах?"
 DCR_nf_a027:0 "Закупівля обладнання"
 DCR_nf_a027_desc:0 "Прибуває новий караван із купою дивних речей для боса."
 DCR_nf_a028:0 "Поставки клею"
 DCR_nf_a028_desc:0 "Цей караван навіть не вартий того, щоб його чіпати, у них є тільки клей."
 DCR_nf_a029:0 "Для чого це потрібно?"
 DCR_nf_a029_desc:0 "Я чув, як якісь хлопці пробралися до Брігга і бачили, як він засовував клей і м'ясо щурокрита в якусь чудернацьку машину. Хтось повинен запитати його, що відбувається. Але не я."
 DCR_nf_a030:0 "Момент істини"
 DCR_nf_a030_desc:0 "Брігг учора ввечері відправив кількох людей поговорити з караваном. Так, поговорити. Ні, не рейдувати. Дивно, правда?"
 DCR_nf_a031:0 "Розширення Евергріна"
 DCR_nf_a031_desc:0 "У нас набагато більше дуп, ніж стільців, якщо ви розумієте, про що я. Ми повинні щось зробити з цим."
 DCR_nf_a032:0 "Зброярі"
 DCR_nf_a032_desc:0 "Деякі хлопці забагато говорили, і, можливо, деякі з них могли б працювати зі зброєю цілий день."
 DCR_nf_a033:0 "Ливарні заводи"
 DCR_nf_a033_desc:0 "Ці здоровенні металеві штуки в будівлі — не туалети, ідіоти. Вони плавлять метал, щоб з нього можна було зробити корисне лайно."
 DCR_nf_a034:0 "Метал для кузень"
 DCR_nf_a034_desc:0 "Схопити кілька придурків із пустки і змусити їх копати метал — це набагато краще, ніж виривати труби зі стін."
 DCR_nf_a035:0 "Базар"
 DCR_nf_a035_desc:0 "Ми завжди трохи торгували і випивали на Базарі, але оскільки тут сидить більше хлопців, нам потрібно більше місця."
 DCR_nf_a036:0 "Тримати хлопців щасливими"
 DCR_nf_a036_desc:0 "Брігг — справжня легенда. Чули про його нові товари на Базарі?"
 DCR_nf_a037:0 "Жах у клітці"
 DCR_nf_a037_desc:0 "Не знаю, як вони засунули цього здоровенного виродка в клітку. Але чорт забирай, як же весело дивитися, як він розриває якусь тупу тварюку на частини."
 DCR_nf_a038:0 "Полювання на щурокритів"
 DCR_nf_a038_desc:0 "Брігг змушує новачків стріляти по щурокритах, щоб відточити влучність. Навчальна стрільба по рухомих мішенях не є чимось новим, але дивно, що він хоче, щоб ми полювали тільки за ними, вірно?"
 DCR_nf_a039:0 "Загони для щурокритів"
 DCR_nf_a039_desc:0 "Якого біса ми витрачаємо стільки місця на загони для щурокритів, якщо ми не збираємося кидати їм бранців?"
 DCR_nf_a040:0 "Перевірка смаку"
 DCR_nf_a040_desc:0 "Кухар роздає нове м'ясо щурокрита. На смак воно непогане, але коли хтось запитав його, де він навчився готувати щось, що не має смаку старого черевика, він злякався."
 DCR_nf_b001:0 "Їм сподобалося?"
 DCR_nf_b001_desc:0 "Брігг скликав велику зустріч з найбільшими шишками в банді. Не знаю, про що він говорить, можливо, це якийсь великий рейд."
 DCR_nf_b002:0 "Рейдерський ребрендинг"
 DCR_nf_b002_desc:0 "Ми збираємося почати продавати м'ясо? Це ж повна маячня. Стривайте... скільки кришок за штуку?"
 DCR_nf_b003:0 "Виправлення відносин"
 DCR_nf_b003_desc:0 "Хлопці спочатку трохи сумнівалися, але як тільки посипалися кришки, вони заспівали нової пісні."
 DCR_nf_b004:0 "Найгірші з нас"
 DCR_nf_b004_desc:0 "Скільки б кришок ми не заробили, деякі хлопці просто не готові відмовитися від стрілянини по караванах і насаджування голів на палі. Але річ у тім, що старі часи — це старі часи."
 DCR_nf_b005:0 "Охорона Бріггса"
 DCR_nf_b005_desc:0 "Ця робота охоронця не така вже й погана. Можна ще стріляти в придурків, які лізуть у магазин, і отримувати за це стабільно кришки."
 DCR_nf_b006:0 "Розширення ринку"
 DCR_nf_b006_desc:0 "Бріггс змушує хлопців ходити повсюди і намагатися продати це лайно."
 DCR_nf_b007:0 "Розширення виробництва"
 DCR_nf_b007_desc:0 "Слухай, мені байдуже, як ти це зробиш. Але бос сказав, що нам потрібно виробляти більше м'яса."
 DCR_nf_b008:0 "Ферми щурокритів"
 DCR_nf_b008_desc:0 "Не знаю, як це працює, але ця мазь, яку використовувала та сучка з Меґатони, дійсно не дає щурокритам кусати тебе."
 DCR_nf_b009:0 "Домінування у своїй ніші"
 DCR_nf_b009_desc:0 "Ми були першими, хто приготував м'ясо щурокрита, яке на смак не нагадує ноги. Це дає нам велику перевагу перед конкурентами. Якщо ми докладемо всіх зусиль, то зможемо зробити так, що ніхто не зможе зрівнятися з нашим продуктом."
 DCR_nf_b010:0 "Вивчення скотарства"
 DCR_nf_b010_desc:0 "Вирощування щурокритів нічим не відрізняється від вирощування брамінів або рад-курей. Дізнайтеся все, що зможете, у мешканців пусток."
 DCR_nf_b011:0 "Побудувати фабрику «Диво-м'яса»"
 DCR_nf_b011_desc:0 "Брігг прочитав кілька книг про фабрики, і він думає, що ми можемо побудувати таку, щоб виробляти м'ясо ще швидше!"
 DCR_nf_b012:0 "Вчитися у минулого"
 DCR_nf_b012_desc:0 "У руїнах є кілька фабрик з виробництва продуктів харчування. Ми могли б дечому навчитися, вивчивши їхні документи."
 DCR_nf_b013:0 "Маркетинг 101"
 DCR_nf_b013_desc:0 "Люди трохи побоюються купувати речі у хлопців у рейдерському екіпіруванні. Бріггс каже хлопцям, щоб вони вдягли костюми і привели свій імідж до ладу."
 DCR_nf_b014:0 "Розширення ферм"
 DCR_nf_b014_desc:0 "Ми можемо використати отримані знання для будівництва більшої кількості ферм з розведення щурокритів на нашій території."
 DCR_nf_b015:0 "Економія за рахунок масштабу"
 DCR_nf_b015_desc:0 "У цій старій книзі, знайденій Бріггсом, говориться, що чим більша ваша фабрика, тим дешевше ви можете виробляти продукцію. Я не розумію, але ті фабрики старого світу були досить великими. Тож це, мабуть, правда."
 DCR_nf_b016:0 "Божевільні"
 DCR_nf_b016_desc:0 "Один із хлопців, який вміє малювати, малює плакати для поселень. Бріггс думає, що це змусить людей купувати наше м'ясо."
 DCR_nf_b017:0 "Індустріальний корм"
 DCR_nf_b017_desc:0 "Навіщо нам купувати їжу, щоб годувати щурокритів, якщо ми можемо вирощувати її самі?"
 DCR_nf_b018:0 "Продається в кожному поселенні"
 DCR_nf_b018_desc:0 "Майже кожне поселення Столичної Пустки купує наше м'ясо!"
 DCR_nf_b019:0 "Промисловий комплекс «Щурокрит»"
 DCR_nf_b019_desc:0 "Ми так досягли успіху у виробництві цього м'яса, що виробляємо його чи не більше, ніж можемо продати. Добре, що маркетологи вмовляють цих нікчем купувати більше, ніж їм потрібно."
 DCR_nf_b020:0 "Диверсифікований бізнес"
 DCR_nf_b020_desc:0 "На гроші, які ми заробляємо на продажу м'яса, ми можемо побудувати свій бізнес і долучитися до кожного «м'ясного пирога»!"
 DCR_nf_b021:0 "Торгувати зброєю"
 DCR_nf_b021_desc:0 "Всім на пустках потрібна зброя. Було б нерозумно не вийти на цей ринок."
 DCR_nf_b022:0 "Інвестувати в R&D"
 DCR_nf_b022_desc:0 "Ми можемо найняти кількох розумак, які придумають, що б продавати."
 DCR_nf_b023:0 "Посилення заходів безпеки"
 DCR_nf_b023_desc:0 "Якщо ми не будемо пильні, наш успіх приверне рейдерів. Іронічно, чи не так?"
 DCR_nf_b024:0 "«Різне»"
 DCR_nf_b024_desc:0 "Ми можемо виготовити що завгодно: від кавових кухлів до чобіт. Якщо хтось купить, ми це зробимо."
 DCR_nf_b025:0 "Найкраще в лінійці"
 DCR_nf_b025_desc:0 "У Столичній Пустці повно запасних частин, і відремонтована довоєнна гвинтівка коштує набагато більше, ніж чотири іржавих шматки лайна."
 DCR_nf_b026:0 "Корпоративні солдати"
 DCR_nf_b026_desc:0 "Нам знадобиться армія для захисту наших ділових інтересів. Добре, що у нас багато хлопців, які вміють воювати."
 DCR_nf_b027:0 "Радіомовлення Бріггса"
 DCR_nf_b027_desc:0 "Відійди вбік, Тридогнайт, ти не єдиний, хто вміє грати музику. Тепер на 300% більше реклами."
 DCR_nf_b028:0 "Контракти на забезпечення безпеки"
 DCR_nf_b028_desc:0 "Робота найманця коштує хороших грошей. Час від часу ми можемо здавати нашу охорону в оренду іншим компаніям."
 DCR_nf_b029:0 "Корпоративний шпіонаж"
 DCR_nf_b029_desc:0 "Щоб зберегти перевагу, нам потрібно стежити за конкурентами і тримати руку в їхній кишені."
 DCR_nf_b030:0 "Корпорація Бріггса"
 DCR_nf_b030_desc:0 "Корпорація Бріггса виросла і стала найбільшою компанією по цей бік Міссісіпі. Від «диво-м'яса» і чобіт зі шкіри щурокрита до сучасної зброї та контрактів на охорону — у нас є все, що потрібно... якщо в них є кришки."
 DCR_nf_b031:0 "Просто жарт"
 DCR_nf_b031_desc:0 "Бріггс каже, що він намагався змусити нас продавати м'ясо як жарт? Я не зовсім розумію, але я посміюся, перш ніж мене згодують здоров'яку ззовні."
 DCR_nf_b032:0 "Підкорення Андейла"
 DCR_nf_b032_desc:0 "У цих дивних виродків в Андейлі повно всякого лайна, яке ми можемо прихопити."
 DCR_nf_b033:0 "Від людини до щурокрита"
 DCR_nf_b033_desc:0 "Як Бріггу вдалося змусити цих виродків переключитися з пожирання людей на щурокритів?"
 DCR_nf_b034:0 "Щось наближається"
 DCR_nf_b034_desc:0 "Той великий рейд, який обіцяв Брігг? Він скоро відбудеться. Банди по всій окрузі тільки й говорять про нього."
 DCR_nf_b035:0 "Точіть ножі"
 DCR_nf_b035_desc:0 "Наточіть кухонні ножі. Скоро ми їх застосуємо."
 DCR_nf_b036:0 "Далекий поклик"
 DCR_nf_b036_desc:0 "Ми поширюємо повсюди чутку про майбутній великий рейд. До нас прагнуть приєднатися початківці бандити й гангстери з усіх куточків пустки."
 DCR_nf_b037:0 "Із цуценят у воїнів"
 DCR_nf_b037_desc:0 "Багато з цих хлопців, які бажають вступити до армії, не варті ні гроша, але вони все ще можуть прийняти кулі, призначені нашим хлопцям."
 DCR_nf_b038:0 "Великий рейд"
 DCR_nf_b038_desc:0 "Ми покажемо цим придуркам із поселення, хто тут головний!"
 DCR_nf_b039:0 "Зламана сталь"
 DCR_nf_b039_desc:0 "У Цитаделі повно цінної здобичі. Нам просто потрібно вбити тих, хто там сидить."
 DCR_nf_b040:0 "Впровадження нового керівництва"
 DCR_nf_b040_desc:0 "Цим поселенцям доведеться на власному гіркому досвіді переконатися, хто сьогодні головний."
 DCR_nf_b041:0 "Реквієм по Регуляторах"
 DCR_nf_b041_desc:0 "Регулятори були купкою хороших хлопців, які уявили, що зможуть «очистити» пустку. Але де вони зараз?"
 DCR_nf_b042:0 "Приєднуйся або помри"
 DCR_nf_b042_desc:0 "Банда з Гаррісбурга за ці роки ослабла. Вони можуть просто здатися і дозволити нам узяти гору."
 DCR_nf_b043:0 "Цінна інформація"
 DCR_nf_b043_desc:0 "На старих комп'ютерах Цитаделі були деякі цікаві речі."
 DCR_nf_b044:0 "Індустрія работоргівлі"
 DCR_nf_b044_desc:0 "Якщо ми не змусимо цих рабів працювати, у нас скоро буде більше хлопців, ніж зброї."
 DCR_nf_b045:0 "Двері відчинені для охочих"
 DCR_nf_b045_desc:0 "Багато рейдерів з Гаррісбурга хочуть приєднатися до справжньої банди."
 DCR_nf_b046:0 "Великі іржаві кігті"
 DCR_nf_b046_desc:0 "Хто буде настільки дурний, щоб сказати «ні» рейдеру в силовій броні?"
 DCR_nf_b047:0 "Синергія работоргівців"
 DCR_nf_b047_desc:0 "За допомогою Столичної Пустки ми зможемо надати Пітту стільки рабів, скільки вони можуть попросити."
 DCR_nf_b048:0 "Король рейдерів"
 DCR_nf_b048_desc:0 "Брігг зробив те, що ніхто не вважав можливим. Він урятував наші банди від повного знищення і повернув ситуацію в пустці на свою користь. Тепер ми — могутнє королівство рейдерів, порівняно з яким навіть Пітт здасться нікчемним. Королівство Брігга правитиме тисячу років! Або, принаймні, поки він не помре, і ми знову не почнемо вбивати одне одного."
 DCR_nf_c000:0 "Сходження Торчера"
 DCR_nf_c000_desc:0 "Ви чули крик Брігга, коли Торчер підпалив його? Це було безцінно!"
 DCR_nf_c001:0 "Останнє мерехтливе полум'я"
 DCR_nf_c001_desc:0 "Торчер ніколи толком не розповідав, чим займався до того, як потрапив у Столичну Пустку. Напевно, нічого особливо цікавого там і не було."
 DCR_nf_c002:0 "У пошуках полум'я"
 DCR_nf_c002_desc:0 "Я досі не розумію, де цей дивний виродок постійно знаходить усі ці речі."
 DCR_nf_c003:0 "Вчачись у полум'я"
 DCR_nf_c003_desc:0 "Маючи всі ці вогнемети, ми можемо розібрати кілька і з'ясувати, як вони насправді працюють."
 DCR_nf_c004:0 "Приборкати полум'я"
 DCR_nf_c004_desc:0 "Коли ви зрозумієте деякі речі, тоді ви дійсно зможете завдати шкоди."
 DCR_nf_c005:0 "Гарячий і готовий"
 DCR_nf_c005_desc:0 "Торчер має рацію, палити — це весело. Давайте палити."
 DCR_nf_c006:0 "Згоріле м'ясо"
 DCR_nf_c006_desc:0 "Із цих виродків Андейла вийде хороша розтопка."
 DCR_nf_c007:0 "Багатство Річ-Мена"
 DCR_nf_c007_desc:0 "Хлопцям із Річ-Мена тепер не знадобляться їхні кришки, оскільки вони перетворилися на попіл."
 DCR_nf_c008:0 "Спалити Столицю"
 DCR_nf_c008_desc:0 "Ці поселенці думають, що вони в безпеці в своїх халупах? Подивимося, як вони себе почуватимуть, коли ми їх випалимо!"
 DCR_nf_c009:0 "Розплавляючи сталь"
 DCR_nf_c009_desc:0 "Кажуть, що вогнеметне паливо не може розплавити сталеву броню. Якщо це правда, ми просто зваримо цих лицарів живцем."
 DCR_nf_c010:0 "Дим на воді"
 DCR_nf_c010_desc:0 "Вузькі коридори та дверні отвори Рівет-Сіті ідеально підходять для зачистки за допомогою вогнеметів."
 DCR_nf_c011:0 "Вогонь плазми"
 DCR_nf_c011_desc:0 "Плазма горить навіть жаркіше, ніж паливо вогнемета, тому Торчер хоче, щоб ці іграшки Анклаву опинилися в руках наших хлопців."
 DCR_nf_c012:0 "Повернення додому"
 DCR_nf_c012_desc:0 "Рідне місто Торчера — справжня діра, але немає місця краще за дім."
 DCR_nf_c013:0 "Вогонь Ашура"
 DCR_nf_c013_desc:0 "Вогні Пітта підтримуються рабською працею. Торчер більш ніж щасливий підтримувати горни в цих кузнях."
 DCR_nf_c014:0 "Відновити Храми Полум'я"
 DCR_nf_c014_desc:0 "Деякі зі старих храмів і ритуальних місць народу Торчера збереглися до наших днів. Він хоче їх привести до ладу."
 DCR_nf_c015:0 "Відродження Факелоносців"
 DCR_nf_c015_desc:0 "Ми більше, ніж просто банда рейдерів. Ми — послідовники полум'я. Ми будемо підтримувати вогонь у пустках в ім'я нашої віри."
 DCR_nf_c016:0 "Розпалити кузні"
 DCR_nf_c016_desc:0 "У полум'ї наших кузень зруйновані рештки старого світу перетворяться на щось нове."
 DCR_nf_c017:0 "Наращування виробництва зброї"
 DCR_nf_c017_desc:0 "Вироби наших кузень будуть перетворені на знаряддя нашого завоювання."
 DCR_nf_c018:0 "Шанування Полум'я"
 DCR_nf_c018_desc:0 "Торчер, можливо, трохи дивний, але в одному він правий: у спостереженні за вогнем є щось особливе."
 DCR_nf_c019:0 "Втрачені брати"
 DCR_nf_c019_desc:0 "Є люди, які, як і Торчер, дещо знають про вогонь. Він хоче, щоб ми їх до нас приєднали."
 DCR_nf_c020:0 "Забуті записи"
 DCR_nf_c020_desc:0 "Досі збереглося кілька довоєнних книг про використання цих вогнеметів. Вони мають допомогти тим із нас, хто вміє читати."
 DCR_nf_c021:0 "Учні Торчера"
 DCR_nf_c021_desc:0 "Ті, хто навчався у Торчера, по-справжньому оцінили силу полум'я."
 DCR_nf_d000:0 "Королева рейдерів"
 DCR_nf_d000_desc:0 "Брігг дійсно недовго протримався проти цих мурах. Ми знали, що він слабак. Можливо, ця дама-мураха має рацію."
 DCR_nf_d001:0 "Правління Королеви"
 DCR_nf_d001_desc:0 "У королеви згуртована команда. Ті, хто не слухає її, зрештою годують її улюбленців."
 DCR_nf_d002:0 "Слуги Королеви"
 DCR_nf_d002_desc:0 "Багатьом із тих, хто підкориться владі королеви, буде дарована милість рабства як трутнів."
 DCR_nf_d003:0 "Майстерні рабів"
 DCR_nf_d003_desc:0 "Трутні, які виявляться більш зручними, ніж інші, отримають робочі місця в майстернях."
 DCR_nf_d004:0 "Шахти для Трутнів"
 DCR_nf_d004_desc:0 "Ті, хто надто слабкий, щоб боротися за славу нашої королеви, будуть трудитися в шахтах до самої смерті. Потім вони будуть годувати виводок."
 DCR_nf_d005:0 "Колонія Евергрін"
 DCR_nf_d005_desc:0 "Евергрін тепер працює як годинник. Трутні виробляють зброю, яку використовують воїни, що вирушають у пустки, щоб принести їжу та здобич."
 DCR_nf_d006:0 "Культ Мурахи"
 DCR_nf_d006_desc:0 "Наша мудра і могутня королева має рацію. Людина слабка, і її потрібно замінити."
 DCR_nf_d007:0 "Обрані Мурахою"
 DCR_nf_d007_desc:0 "Наші наймогутніші воїни осягають шлях мурахи. Вони будуть битися до останнього подиху за еру мурах."
 DCR_nf_d008:0 "Повернення до Кентербері"
 DCR_nf_d008_desc:0 "Королева вимагає, щоб ми знищили всіх придурків у громаді Кентербері, тож пора починати."
 DCR_nf_d009:0 "Нагорода за вірність"
 DCR_nf_d009_desc:0 "Ті жителі Столичної Пустки, хто підкоряться владі Королеви, отримають її милість."
 DCR_nf_d010:0 "Покарання людства"
 DCR_nf_d010_desc:0 "Стогнання жалюгідних мешканців Столичної Пустки залишаються непочутими. Їхня смерть послужить прикладом для тих, хто наважиться протистояти Ері Мурахи."
 DCR_nf_d011:0 "Розчавлений суперник"
 DCR_nf_d011_desc:0 "Механіст думав, що зможе захистити людей від наступу мурахи. Він був дурнем."
 DCR_nf_d012:0 "Нове життя для Леско"
 DCR_nf_d012_desc:0 "Королева бачить застосування цьому худорлявому зануді. Йому не можна завдавати шкоди."
 DCR_nf_d013:0 "Данина Королеві"
 DCR_nf_d013_desc:0 "Люди Столичної Пустки віддають шану своїй королеві. Цей акт — жалюгідна спроба не стати їжею для мурах."
 DCR_nf_d014:0 "Доля людини"
 DCR_nf_d014_desc:0 "Підкорення Столичної Пустки — це тільки початок. На черзі — ті, хто за межами нашої території."
 DCR_nf_d015:0 "Імперія Мурах"
 DCR_nf_d015_desc:0 "Від Колонії Евергрін до Чесапікської затоки — один правитель. НеМірміка, королева мурах, підтримує строгий порядок у мурашнику. Всі вони — слуги колонії, чи то воїни, трутні чи їжа. Ера людини закінчилася, навіть якщо ці дурні ще про це не знають."
 DCR_nf_d016:0 "Підкорення Андейла"
 DCR_nf_d016_desc:0 "Ці диваки з Андейла вже давно становлять проблему. Тепер ми з ними розберемося."
 DCR_nf_d017:0 "МУРАХОдейл"
 DCR_nf_d017_desc:0 "Чоловіки Андейла будуть годувати виводок."
 DCR_nf_d018:0 "Воїни Королеви"
 DCR_nf_d018_desc:0 "Мурахи міцні, безстрашні і дуже кусаються. Будьте обережні, не станьте їхньою їжею."
 DCR_nf_d019:0 "Шлях Мурахи"
 DCR_nf_d019_desc:0 "НеМірміка змушує нас тренуватися з мурахами і вчитися битися разом з ними."
 DCR_nf_d020:0 "Вирити інкубаторії"
 DCR_nf_d020_desc:0 "НеМірміка наказала рабам вирити тунелі під Евергріном, щоб виростити її потомство."
 DCR_nf_d021:0 "Могутня сила"
 DCR_nf_d021_desc:0 "Представляємо новітнє покоління воїнів-мурах."
