l_russian: 
  RON_two_hundred_years_of_resistance:0 "Две Сотни Лет Сопротивления"
  RON_two_hundred_years_of_resistance_desc:0 "Патриоты Онтарио борются за свою свободу уже веками. Мы всегда знали, что в конце концов одержим победу."

  RON_post_war_stooges:0 "Послевоенные балбесы"
  RON_post_war_stooges_desc:0 "После краха всего, что мы знали, появился наш старый знакомый враг, чтобы продолжить наше угнетение."

  RON_hate_the_player:0 "Ненависть Игроков"
  RON_hate_the_player_desc:0 "Хотя нам удалось победить Онтарский Анклав, с тех пор всё шло не так уж гладко. Некоторые заходят слишком далеко из-за хоккейных соперничеств..."

  RON_washington_bullets:0 "Вашингтонские пули"
  RON_washington_bullets_desc:0 "В.А.Ш.И.Н.Т.О.Н всё ещё хранит часть довоенных баз данных, особенно по обслуживанию и охране военных объектов. Эти знания сильно помогут нам в восстановлении и модернизации этих сооружений."

  RON_bring_in_substitutes:0 "Привлечение запасных"
  RON_bring_in_substitutes_desc:0 "Запасные обычно сидят на скамейке, но нам нужны все, кто может помочь."

  RON_glorious_and_free:0 "Славный и свободный"
  RON_glorious_and_free_desc:0 "Наша гордая Канадская республика не признаёт никого в качестве господина. Мы будем бороться за своё право на свободу!"

  RON_revolutionary_munitions:0 "Революционные боеприпасы"
  RON_revolutionary_munitions_desc:0 "Старые довоенные тайники сопротивления часто становились целью правительственных рейдов, когда те могли их обнаружить. Конфискованное оружие хранится в неизвестном месте, но с небольшими усилиями В.А.Ш.И.Н.Т.О.Н сможет их найти."

  RON_blood_money_men:0 "Мужчины, зарабатывающие кровавые деньги"
  RON_blood_money_men_desc:0 "Для некоторых в пустоши достаточно лишь оружия и крышек. Хотя это может быть неприятно, они точно умеют убивать. В.А.Ш.И.Н.Т.О.Н сможет раздобыть крышки."
    ron_blood_money_tt:0 "Создает §G1§! подразделение §YСпецназа§!"

  RON_stand_on_guard_for_thee:0 "Стоять на страже ради Тебя"
  RON_stand_on_guard_for_thee_desc:0 "Кто-то может назвать это пропагандой, но, вдохновляя наш народ речами, флагами и листовками, мы сможем сохранить революционный пыл. В.А.Ш.И.Н.Т.О.Н точно знает, как этого добиться."

  RON_red_white_and_blue_blooded_canadians:0 "Канадцы красной, белой и голубых кровей"
  RON_red_white_and_blue_blooded_canadians_desc:0 "О, Канада! Наш дом и родная земля! Истинная любовь к Родине живёт в каждом из нас. С пылающим сердцем мы видим, как ты восстаёшь — Истинный Север, сильный и свободный!"

  RON_rally_the_hockey_teams:0 "Сплочение хоккейных команд"
  RON_rally_the_hockey_teams_desc:0 "Хоккейные команды — одни из самых сильных групп боевиков в нашем обществе. Формализовав команды и включив их в нашу командную структуру, мы сможем использовать хоккейные команды для защиты нашей прекрасной страны."

  RON_oldtown_oafs_team:0 "Болваны Старого Города"
  RON_oldtown_oafs_team_desc:0 "«Болваны Старого Города» действуют в районе Олдтаун города Ронто. Они могут быть не самыми сообразительными, но носят тяжёлую броню и представляют собой грозных противников."
    ron_oldtown_oafs_tt:0 "Это создаст подразделение §7Болванов Старого Города§!, крепких защитников и одних из сильнейших составов защиты."

  RON_north_ronto_nightkin:0 "Тени Северного Ронто"
  RON_north_ronto_nightkin_desc:0 "Неудивительно, что команда «Тени Северного Ронто» родом из Северного Ронто — название лишь немного вводит в заблуждение. Это команда гулей, некоторые из которых ещё помнят хоккей до войны. Большинство из них говорят, что сейчас хоккей даже интереснее."
    ron_nightkin_tt:0 "Это создаст подразделение §1Теней Северного Ронто§!, яростных гулей и самых опытных игроков в Ронто."

  RON_crescent_cazadores:0 "Кресент Касадорс"
  RON_crescent_cazadores_desc:0 "«Кресент Касадорс» называют своим домом район Ронто Кресент и, как их тезки — казадоры, быстры и больно жалят. С ними лучше не связываться — они нападут прежде, чем ты успеешь их заметить."
    ron_cazadores_tt:0 "Это создаст подразделение §1Кресент Касадорс§!, опасных конькобежцев и быстрейших, чем кто-либо другой на поле."

  RON_encourage_hockey_games:0 "Поощрить Хоккейные Команды"
  RON_encourage_hockey_games_desc:0 "Хотя команды в основном содержат себя сами, государственное финансирование спорта позволит им расширяться и приобретать новое снаряжение, что принесёт пользу и нам."

  RON_rebuild_official_stadium:0 "Перестройка Официального Стадиона"
  RON_rebuild_official_stadium_desc:0 "Мы достаточно долго играли среди развалин и обломков — пора всё устроить как следует."

  RON_scout_for_new_talent:0 "В поисках новых талантов"
  RON_scout_for_new_talent_desc:0 "Даже если они не играют в хоккей, в пустошах много людей, которые отлично умеют бить и быстро бегать."

  RON_referee_authority:0 "Учредить Авторитет Рефери"
  RON_referee_authority_desc:0 "Несмотря на всю жестокость и опасность хоккейных матчей, подготовка квалифицированных судей сделает проведение игр более организованным и безопасным."
    ron_hockey_games_stab_buff_tt:0 "Решение §YПровести игру в хоккей§! предоставит дополнительные §Y1%§! стабильности.\n\n"
    ron_unlock_dan_tt:0 "§Y$RON_dan_mccaw_name$§! станет новым командиром подразделения.\n§LLevel§!: §Y3§!\n§RAttack Skill§!: §Y3§!\n§GDefense Skill§!: §Y1§!\n§PPlanning Skill§!: §Y2§!\n§MLogistics Skill§!: §Y3§!\n§gTraits§!: §tAgile§!, §tIntelligent§!, §tReckless§!\n\n"

  RON_drum_up_enthusiasm:0 "Разжечь энтузиазм"
  RON_drum_up_enthusiasm_desc:0 "Нам стоит отправить письма с приглашениями другим единомышленникам принять участие в наших хоккейных играх! Даже если они не захотят играть, мы сможем собрать зрителей со всей Пустоши."
    ron_hockey_games_war_support_buff_tt:0 "Решение §YПровести игру в хоккей§! предоставит дополнительные §Y1%§! поддержки войны.\n\n"

  RON_american_transfers:0 "Американский Транфер"
  RON_american_transfers_desc:0 "Хотя наши местные игроки и превосходны, их всё же немного. Разведка талантов в американской пустоши на юге позволит значительно расширить наши команды."

  RON_canadian_recruitment:0 "Набор Канадцев"
  RON_canadian_recruitment_desc:0 "В Канаде полно будущих хоккеистов, даже если они ещё сами об этом не знают."

  RON_codify_rules:0 "Систематизировать правила"
  RON_codify_rules_desc:0 "С учреждением авторитета рефери всё чаще звучат призывы к формализации правил хоккея. Это позволит сделать спорт более безопасным и увлекательным для всей семьи."

  RON_sport_for_the_wasteland:0 "Спорт для Пустошей"
  RON_sport_for_the_wasteland_desc:0 "Жестокость и брутальность хоккея — неотъемлемая часть его привлекательности для многих, и, поощряя эти черты, мы можем создать спорт, который будет опасным, но при этом увлекательным."

  RON_best_and_brightest:0 "Самые Лучшие и Талантливые"
  RON_best_and_brightest_desc:0 "Хоккеистов следует оценивать по качеству, а не по количеству."

  RON_expand_the_teams:0 "Расширение Команд"
  RON_expand_the_teams_desc:0 "Хоккейная команда должна быть достаточно большой, чтобы серьёзно запугать соперников. Команда должна насчитывать больше, чем 5–10 игроков. Представляешь?"

  RON_crowd_goes_wild:0 "Толпа сходит с ума!"
  RON_crowd_goes_wild_desc:0 "Хотя средний житель Ронто готов смотреть хоккей, стоя на трупе, чтобы увидеть происходящее через толпу драк, для большинства людей в Пустоши это далеко не так привлекательно. Настоящий стадион с развитой инфраструктурой действительно привлечёт большие толпы зрителей."
    ron_stadium_decisions_tt:0 "Это разблокирует §Yрешения§! по улучшению нашего стадиона."

  RON_expand_our_reach:0 "Расширение Доступности"
  RON_expand_our_reach_desc:0 "Хотя хоккей и сохранился в Ронто, люди со всей Пустоши с нетерпением хотят принять в нём участие! Особенно по всему Онтарио."
    ron_unlock_more_teams_tt:0 "Это разблокирует §Yрешения§! по учреждению и расширению новых команд."

  RON_the_greatest_game_the_wastes_have_ever_seen:0 "Величайшая игра, которую когда-либо видели пустоши"
  RON_the_greatest_game_the_wastes_have_ever_seen_desc:0 "Нет ничего похожего на хоккей, и никто не играет в него так, как в Ронто."
    ron_more_hockey_decisions_tt:0 "Это разблокирует §Yрешения§! по учреждению и расширению большего числа хоккейных команд, и проведению §Yграндиозных матчей§! с лучшими бонусами."

  RON_city_upon_a_hill:0 "Город на Холме"
  RON_city_upon_a_hill_desc:0 "Ронто станет сияющим городом на холме. Город встретит Пустошь с распростёртыми объятиями и будет процветать."

  RON_ronto_arms:0 "Вооружение Ронто"
  RON_ronto_arms_desc:0 "Производство большего количества оружия будет жизненно важным для безопасности Ронто."

  RON_new_workshops:0 "Новые Мастерские"
  RON_new_workshops_desc:0 "Настоящий сияющий город нуждается в развитой промышленности и процветающей экономике."

  RON_booze_for_the_boys:0 "Выпивка для Парней (и Роботов)"
  RON_booze_for_the_boys_desc:0 "В Ронто до войны было множество пивоварен, разбросанных по всему мегаполису. Пора вернуть их в строй — это точно станет отличным стимулом для поднятия боевого духа."

  RON_uncover_resistance_caches:0 "Раскрыть тайники Сопротивления"
  RON_uncover_resistance_caches_desc:0 "До начала войны члены сопротивления по всему городу прятали тайники с оружием и снаряжением, зачастую украденным у американских оккупантов. Тщательный поиск их меток и указателей по всему городу принесёт нам много нового оборудования."

  RON_give_me_your_tired_your_poor:0 "Отдай мне свою усталость, свою бедность"
  RON_give_me_your_tired_your_poor_desc:0 "Ронто — это безопасное убежище на севере, в земле льда, рейдеров и ужасов. Мы встречаем бегущих из Пустоши с распростёртыми объятиями."

  RON_niagara_power:0 "Энергия Ниагары"
  RON_niagara_power_desc:0 "Соединённые Штаты имели грандиозные планы по использованию энергии Ниагары, но они так и не были полностью реализованы до войны. Только В.А.Ш.И.Н.Г.Т.О.Н обладает полным доступом к чертежам. Мы же применим их с пользой гораздо лучше, чем они когда-либо могли представить."

  RON_ronto_tea_party:0 "Чаепитие Ронто"
  RON_ronto_tea_party_desc:0 "У В.А.Ш.И.Н.Г.Т.О.Н.А к нам странная просьба..."

  RON_great_lakes_smugglers:0 "Контрабандисты Великого Озера"
  RON_great_lakes_smugglers_desc:0 "Не всем нравится работать с контрабандистами, но если мы официально «лицензируем» их, сможем сократить проблемы, которые они создают, и одновременно расширить наш экспортный рынок."

  RON_ronto_living_city:0 "Ронто, Живой Город"
  RON_ronto_living_city_desc:0 "Ронто — это не просто мощный центр торговли и силы, это живой, дышащий мегаполис. Ронто — это люди, продающие свои товары на улицах, и те, кто спасается от набегов рейдеров и чудовищ."

  RON_ronto_centre_of_industry:0 "Ронто, Центр Промышленности"
  RON_ronto_centre_of_industry_desc:0 "Ронто — центр новой промышленной революции. Заводы растут, а тепло от кузниц согревает нас в суровых условиях Онтарио."

  RON_the_lakers:0 "«Лейкерс»"
  RON_the_lakers_desc:0 "Любители озера начали называть себя «Лейкерс». Их морской опыт бесценен для Ронто."

  RON_ronto_heart_of_ontario:0 "Ронто, Сердце Онтарио"
  RON_ronto_heart_of_ontario_desc:0 "Ронто — пульсирующее сердце Онтарио. Здесь люди не просто выживают, они процветают. Ронто воплощает всё лучшее, что есть в Онтарио."

  RON_lake_trade:0 "Озерная торговля"
  RON_lake_trade_desc:0 "Великие озёра предоставляют бесценные торговые возможности (когда они не покрыты льдом). Наши товары могут доставляться вдоль их берегов, и наша экономика процветает."

  RON_the_skys_the_limit:0 "Нет Предела Совершенству"
  RON_the_skys_the_limit_desc:0 "Для Ронто нет ничего недосягаемого. Когда-то небеса принадлежали гигантским пассажирским самолётам и винтокрылам, а скоро они станут владением В.А.Ш.И.Н.Т.О.Н.А"

  RON_theyre_back:0 "Они Вернулись"
  RON_theyre_back_desc:0 "Что за чёрт? Разве мы не уничтожили их всех 30 лет назад?"

  RON_hold_the_line:0 "Держать Линию"
  RON_hold_the_line_desc:0 "Наши силы несомненно превосходят силы Анклава Онтарио, но нам нужно прежде всего удерживать линию обороны, чтобы подготовиться к контратаке."

  RON_antiarmour_tactics:0 "Тактики против Брони"
  RON_antiarmour_tactics_desc:0 "Прошло немало времени с нашей последней битвы с Анклавом, но у нас всё ещё где-то запасено противотанковое оборудование."

  RON_twice_bitten:0 "Дважды Покусанный"
  RON_twice_bitten_desc:0 "В Ронто есть старая поговорка — я знаю что она родом из Баффало, а может, и из самого Ронто — которая звучит так: «Укусишь меня раз — стыд тебе, укусишь ещё — больше нечем будет кусать»."
    ron_twice_bitten_tt:0 "Создаст §G3§! подразделения §YОполчения§!, готовых встать против Американской тирании."

  RON_im_so_bored_of_the_usa:0 "Я так устал от США"
  RON_im_so_bored_of_the_usa_desc:0 "Мы готовы. Анклав продержится ещё лишь мгновение — их глупость станет их гибелью."

  RON_true_north_strong_and_free:0 "Истинный Север, Сильный и Свободный"
  RON_true_north_strong_and_free_desc:0 "Пришло время положить этому конец, на этот раз навсегда."

  RON_ontario_free_forevermore:0 "Онтарио Свободен Навсегда"
  RON_ontario_free_forevermore_desc:0 "Гнусная угроза американской оккупации завершена, а Анклав изгнан и больше никогда не вернётся. Ведь других групп Анклава просто не может существовать, правда?"

  RON_play_the_greatest_game:0 "Играйте в величайшую игру"
  RON_play_the_greatest_game_desc:0 "Хозеры сами напросились."

  RON_hose_them_down:0 "Уроните этих Хозеров в грязь"
  RON_hose_them_down_desc:0 "Эти проклятые Хозеры собрали немалую поддержку, но большинство их поклонников — бывшие жители Ронто. Воссоединить их с функционирующим обществом не составит труда. Надеюсь, что так и будет."

  RON_domo_arigato:0 "Domo Arigato..."
  RON_domo_arigato_desc:0 "Что теперь с В.А.Ш.И.Н.Т.О.Н"