  ron_best_and_brightest_idea:0 "Найкращі та найздібніші"
  ron_best_and_brightest_idea_desc:0 "У хокей мають грати лише найкращі. Набагато цікавіше спостерігати за двома невеликими, висококваліфікованими командами, які намагаються вибити одна одній мізки, ніж за натовпом розгублених і безглуздих ідіотів."

  ron_expanded_teams:0 "Розширені склади"
  ron_expanded_teams_desc:0 "Коли справа доходить до кривавого спорту — чим більше людей, тим більше крові, а чим більше крові, тим краще!"

  ron_refugee_influx:0 "Приплив біженців"
  ron_refugee_influx_desc:0 ""

  ron_shining_city:0 "Ронто, Сяюче місто"
  ron_shining_city_desc:0 "Маяк Онтаріо, Ронто несе варту проти холоду півночі."

  ron_ontarios_beating_heart:0 "Серце Онтаріо, що б'ється"
  ron_ontarios_beating_heart_desc:0 "Ронто — найвеличніше місто Онтаріо, що представляє все найкраще, що може запропонувати післявоєнна Канада. Наше місто — наймогутніше на всій пустці."

