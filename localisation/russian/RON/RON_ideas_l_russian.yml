l_russian: 
  ron_misunderstood_sport:0 "Неправильно зрозумілий спорт"
  ron_misunderstood_sport_desc:0 "Жителям післявоєнного Торонто вдалося зберегти ключовий елемент канадської культури крізь американську окупацію та десятиліття після Великої війни. Зараз цей спорт практично обожнюють як символ канадського опору, але за століття він спотворився і змінив свою первісну форму. Сміттярі шукають будь-які зачіпки про довоєнний вид спорту, і жага розгадати істину рухає країною. Але якщо стільки енергії витрачається на хокей із шайбою, скільки її залишиться для війни?"

  ron_codified_sport:0 "Кодифікований спорт"
  ron_codified_sport_desc:0 "Виявилося, що післявоєнний хокей, у який ми грали, зовсім не схожий на довоєнний. Хоча це все ще весело, старі методи гри, ймовірно, призводили до меншої кількості випадкових травм. Впровадивши належний звід правил, ми зможемо зробити гру безпечнішою і зупинити гравців від вигадування нових правил прямо під час матчу."

  ron_wasteland_sport:0 "Спорт Пустки"
  ron_wasteland_sport_desc:0 "Хокей на льоду ніколи не був про правила чи голи. Він був про відчуття льоду під ногами, ревіння натовпу та звук обличчя суперника, що розлітається від удару вашого силового кулака. Це той спорт, який робить Ронто величним."

  ron_valiant_freedom:0 "Героїчна свобода"
  ron_valiant_freedom_desc:0 "Подібно до американських та канадських героїв минулого, ми будемо битися за нашу землю проти гнітючих іноземних урядів!"

  ron_valiant_freedom2:0 "Героїчна свобода"
  ron_valiant_freedom2_desc:0 "Подібно до американських та канадських героїв минулого, ми будемо битися за нашу землю проти гнітючих іноземних урядів!"

  ron_canadian_patriots:0 "Канадські патріоти"
