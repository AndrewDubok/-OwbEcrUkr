l_russian: 

    ###Characters###
    GED_swampseer_fortune_name:0 "Болотяна Провидця Форчун"
    ged_fortune_desc:0 "§O'Наша перемога вже близько. Я це бачила.'§!\n\nФорчун виросла в могутньому Едемі, керуючись болотами. Вона бачила наближення колапсу і проповідувала проти декадансу та апатії, що зростали серед інших болотяних оракулів. Коли все почало розвалюватися, вона була єдиною, кого це не здивувало. Тепер Сад Едему відступив, але як Матріарх свого племені, Форчун хоче змінити це. Однак з кожним днем її пророцтва віщують загибель, і дедалі менше людей приходять їх слухати.\n\nВона боїться, що, що б вона не робила, ніщо не врятує Едем."
    GED_doctor_name:0 "Доктор Корнелія Робінсон"
    GED_doctor_desc:0 "Коли Доктор Робінсон вирушила в серце віргінських боліт, вона не очікувала стати лідеркою племені болотяних жителів. Минуло вже більше кількох років відтоді, як докторка знайшла це плем'я в глибині болота, і наполегливою працею вона змогла переконати їх відмовитися від своїх забобонних звичаїв. З часом деякі з цих людей навіть зможуть стати вченими, з'ясовуючи, що саме пішло не так із ДЖЕКом цього Сховища і як зупинити зростання болота."

    ###Cosmetic Tags###
    GED_science_cosmetic_tag:0 "Дослідницька група Саду Едему"
