    ###Country Flags###
    GED_brotherhood_visited_flag:0 "Братство надіслало експедицію до нашого болота."

    ###Events###
    GED_nf_events.1.title:0 "Вороже середовище"
    GED_nf_events.1.desc:0 "Болота завжди були нашим домом. Там, де інші борються з рослинністю та дикою природою, ми живемо з ними. Ми є частиною болота так само, як воно є частиною нас. Ми завжди бродили водами або лазили по деревах, полюючи на болотяних геко so само, як на наш народ полюють грізні алігатори-клешнериптам. Одне понад усе давало нам перевагу над іншим життям цього болота."
    GED_nf_events.1.a:0 "Наші міцні халупи"
    GED_nf_events.1.b:0 "Тактика наших воїнів"
    GED_nf_events.1.c:0 "Наші пильні розвідники"
    GED_nf_events.1.d:0 "Багато цілющого порошку"
    GED_nf_events.2.title:0 "Багато хто входить, але мало хто виходить"
    GED_nf_events.2.desc:0 "Під нашим селом є печера, не схожа на жодну з бачених нами. Невдовзі після входу печера змінюється з каменю на метал. Крізь задушливі ліани видно маленькі вогники, а в самому серці є особлива камера. Поколіннями молоді жінки відважувалися йти в цю камеру, і багато з них звідти не поверталися. Ті, хто виживав у подорожі до найглибшої камери Священної Печери, виходили зміненими. Обрані богами здатні передбачати майбутнє у водах болота. Вони передбачали все: від щедрих врожаїв до сильних повеней. Наша теперішня Матріарх Болотяних Провидиць, Болотяна Провидця Форчун, навіть передбачила смерть попередньої Матріарх. Хоча вона не могла попередити нас про точне лихо, вона мала хист бачити певні речі."
    GED_nf_events.2.a:0 "Зміни в землі"
    GED_nf_events.2.b:0 "Зміни у вітрі"
    GED_nf_events.2.c:0 "Зміни з Вогнеборцями"
    GED_nf_events.3.title:0 "Непередбачувана втрата"
    GED_nf_events.3.desc:0 "Болотяна Провидця Форчун намагалася попередити нас про прийдешнє лихо, але через розпливчастий характер її видінь і те, що інші провидці нічого не бачили, її пророцтво залишилося поза увагою. Коли морські люди досягли наших берегів, багато хто з нашого племені загинув. Більшість наших болотяних провидців загинули в перші ж ночі, разом із десятками наших найкращих воїнів. Втрата провидців та їхня нездатність передбачити лихо завдали нашому народу рани, навіть більшої, ніж самі втрати. Вперше за понад 100 років плем'я починає замислюватися, чи не втратили вони прихильність богів."
    GED_nf_events.3.a:0 "Або чи були видіння справжніми..."
    GED_nf_events.4.title:0 "Рятівниця чи загибель?"
    GED_nf_events.4.desc:0 "Коли наші люди ховалися від морських людей і намагалися врятувати тих, хто вижив у боях, до нашого села наблизилася незнайомка. Чужинка представилася як Доктор і погодилася допомогти нашим людям. Вона сказала нам, що цікавиться нашим болотом не для того, щоб знищити його, як багато інших чужинців, а щоб дізнатися, як жити з ним, як ми. Ми прийняли її допомогу, і незабаром вона допомагала нашій Матріарх з іншими завданнями."
    GED_nf_events.4.a:0 "Допомагаючи нам будувати"
    GED_nf_events.4.b:0 "Допомагаючи нам організовуватися"
    GED_nf_events.4.c:0 "Навчаючи нас чужинської мудрості"
    GED_nf_events.5.title:0 "Пропозиція Братства"
    GED_nf_events.5.desc:0 "Братство Сталі надіслало до нашого села загін із лицарами та кількома писарями. Племена Едему не знали, що й думати про цих чужинців, але Доктор Робінсон добре знала цю групу та її цілі. Вона говорила з писарями про їхній інтерес до регіону та поділилася своїми особистими знахідками. За кілька днів Братство пішло, але попередню угоду було укладено. В обмін на захист Братства плем'я дозволить групі повний доступ до свого Сховища і допоможе їм з усім, що їм знадобиться для дослідження Сховища та впливу ДЖЕКа на регіон."
    GED_nf_events.5.a:0 "Ми вітаємо їхню допомогу!"
    GED_nf_events.6.title:0 "Могутніх чужинців прогнано!"
    GED_nf_events.6.desc:0 "Велетенські воїни, закуті в метал і озброєні зброєю вогню та світла, з'явилися біля села. Спершу ми не билися з ними, а трималися на відстані й спостерігали. Незабаром стало зрозуміло, що вони мають намір пробратися до нашої Священної Печери. Ми не могли цього допустити. Коли вони розбили табір біля печери і зняли шоломи, щоб поїсти, ми випустили стріли. Деяких з них було вбито, але решта одягнули шоломи і відкрили вогонь у відповідь. Ми не відступали, і незабаром вони тікали з наших земель. Ми святкували цю перемогу, але нас зупинило попередження Оракулів."
    GED_nf_events.6.a:0 "Більше їх повернеться"
    GED_nf_events.7.title:0 "Запис у щоденнику 61"
    GED_nf_events.7.desc:0 "Після кількох місяців допомоги людям Едему я думаю, що нарешті здобула їхню повну довіру, або принаймні стільки, скільки може отримати чужинець серед цих людей. Якщо я чогось і навчилася з їхніх історій про багату історію, так це те, що їхні зустрічі з іншими людьми рідко закінчувалися добре. Те, що вони не вбили мене одразу, — велика удача з мого боку. Примітка: у майбутньому, після завершення цієї експедиції, слід бути обережнішою, наближаючись до племен Пустища. Як я й підозрювала, серцем цього болота, схоже, є Сховище. Це підтверджує мою гіпотезу, що це неприродне болото насправді є результатом роботи ДЖЕКа. Чи працює ДЖЕК за призначенням, чи щось пішло не так — ще належить з'ясувати. Сумніваюся, що навіть із моїм нинішнім становищем у громаді мені дозволять заглибитися далеко в Сховище. Але, можливо, я зможу переконати їхню лідерку дозволити мені увійти до вхідної зали. Якщо якісь термінали все ще працюють, я могла б передати трохи енергії від реактора Сховища. Можливо, цього буде достатньо, щоб вони дозволили мені пройти далі. Інакше ця експедиція може стати небезпечнішою або виявитися провальною."
    GED_nf_events.7.a:0 "Доктор Корнелія Робінсон, кінець зв'язку."
    GED_nf_events.8.title:0 "Віра повертається"
    GED_nf_events.8.desc:0 "Так само, як передбачила Болотяна Провидця, чужинка-доктор не поважатиме нашу відмову дозволити їй увійти в серце нашої Священної Печери. Її спіймали невдовзі після опівночі й привели до Матріарх Форчун. Її благання про милість були проігноровані, так само, як вона проігнорувала наші правила. Натомість Болотяні Провидці визначили її долю. Вона мала бути принесена в жертву, щоб нагадати нашим людям про небезпеку чужинців, але й про силу нашого народу. Коли віроломна докторка покинула наш світ, сумніви покинули серця наших людей."
    GED_nf_events.8.a:0 "Нашу віру відновлено"
    GED_nf_events.9.title:0 "Запис у щоденнику 73"
    GED_nf_events.9.desc:0 "Я ледве можу повірити в те, що сталося сьогодні. Багато всього сталося, але я спробую бути стислою і почну з початку. Слухаючи історії племен Едему останні кілька місяців, я багато дізналася про їхнє Сховище, а також про небезпеки всередині. Зрозуміло, що ДЖЕК у серці цього Сховища, ймовірно, несправний і випромінює смертельні рівні радіації. На щастя, я взяла з собою тонну Рад-Х та якісний радіаційний костюм. Потенціал того, що радіація ДЖЕКа могла розблокувати якісь приховані психічні здібності в їхніх 'оракулах', сам по собі вартий цілої команди дослідників. Але я відволікаюся. Мені дозволили зайти в їхнє Сховище і підтвердили мою гіпотезу. Рослинність була рясною навіть на найнижчих рівнях Сховища, настільки рясною, що я, мабуть, не змогла б пройти, якби племена не вирізали її частинами протягом невідомо скількох років. На найнижчому рівні був ДЖЕК. Його корпус був тріснутий невідомою силою, і він був під'єднаний до реактора Сховища, що явно виходить за межі стандартних процедур і пояснює, чому машина досі виробляє бурхливе зростання рослин. Ця знахідка сама по собі була мрією для більшості, але це була лише друга за важливістю подія сьогодні. Коли я повернулася на поверхню, мене схопили й привели до халупи Болотяної Провидиці Форчун. Хоча я була тут місяцями, мої візити до її халупи були дуже рідкісними і зазвичай супроводжувалися вимогами допомогти з тим чи іншим. Цього разу було інакше. Матріарх цього племені сказала мені, що мала низку видінь, про які не розповідала своїм людям. Згідно з її видіннями, її народ буде знищений, доки вона є їхньою лідеркою. Непосередньо перед тим, як я вийшла зі Сховища, вона мала ще одне видіння, яке спонукало її відправити людей по мене: видіння, де Я керую їхнім народом. Вона знає, що я не психік, як лідери їхнього племені в минулому, але вона вірить, що те, що я вийшла зі Сховища живою, доводить, що час Болотяних Провидиць минув. Очевидно, існують серйозні етичні проблеми, пов'язані з захопленням контролю над племенем цікавих, але примітивних людей. Однак ці проблеми здаються трохи менш очевидними, коли вони самі пропонують тобі цю роботу, чи не так? Я знаю, що плем'я має проблеми з якимись рейдерами на сході, до бою з якими вони готуються, і якщо я зараз піду по припаси та підтримку, хто знає, що тут станеться, поки мене не буде? Я думаю, що скористатися цією можливістю буде найкращим шансом завершити це дослідження. Можливо, я навіть зможу допомогти цим людям стати більш цивілізованими. До біса, з часом вони можуть стати пристойними дослідницькими асистентами."
    GED_nf_events.9.a:0 "Доктор Корнелія Робінсон, Матріарх Едему, кінець зв'язку."
    
    ###Ideas###
    GED_shrinking_congregation:0 "Зменшення пастви"
    GED_shrinking_congregation_desc:0 "Коли болотяні провидці не змогли передбачити прихід Відомих Людей, люди почали втрачати віру. Відтоді шлях Едему веде до занепаду. Місцеві люди більше не довіряють видінням своїх лідерів."
    GED_swamps_dying_breath:0 "Передсмертний подих Болота"
    GED_swamps_dying_breath_desc:0 "Едем можливо й гине, але поки оракули ще дихають, вони будуть боротися, щоб захистити свою релігію. Як гине Едем, так загинуть і його вороги."
    GED_new_oracles_idea:0 "Нові Оракули"
    GED_new_oracles_idea_desc:0 "Нове покоління болотяних провидців вийшло зі священної печери, готове вести наш народ у майбутнє."
    GED_eden_research_idea:0 "Дослідницький об'єкт Сад Едему"
    GED_eden_research_idea_desc:0 "Під керівництвом Доктор Робінсон плем'я, колись відоме як Сад Едему, перетворюється на віддану команду асистентів для її досліджень. З часом вони зможуть заручитися підтримкою Рівет-Сіті або навіть Братства!"
    GED_eden_lords_idea:0 "Володарі Боліт"
    GED_eden_lords_idea_desc:0 "Племена Саду Едему вигнали або асимілювали всіх чужинців, які намагалися захопити їхній дім. Будь-хто, хто спробує посягнути на їхні болота, ймовірно, зустріне ту саму долю."

    ###National Focus###
    GED_nf_a001:0 "Нескінченні болота"
    GED_nf_a001_desc:0 "Густі хащі, каламутні води та пагони ліан віщують небезпеку для чужинців. Для нас це дім."
    GED_nf_a002:0 "Болотяні Провидці"
    GED_nf_a002_desc:0 "Поколіннями наше плем'я веде ті, хто наділений даром передбачення."
    GED_nf_a003:0 "Морські люди"
    GED_nf_a003_desc:0 "Ми нічого не знаємо про них, окрім того, що вони прийшли з моря і стріляють на вбивство."
    GED_nf_a004:0 "Насіння сумніву"
    GED_nf_a004_desc:0 "Як наші оракули могли не знати, що морські люди наближаються?"
    GED_nf_a005:0 "Лікувати поранених"
    GED_nf_a005_desc:0 "Багато хто досі потребує відновлення після нападу морських людей."
    GED_nf_a006:0 "Зібрати зброю"
    GED_nf_a006_desc:0 "Чекати, склавши руки, нас не врятує. Нам потрібні луки, багато луків."
    GED_nf_a007:0 "Зшити шкури"
    GED_nf_a007_desc:0 "Шкури геконів не найміцніші, але вони допоможуть зберегти життя нашим воїнам."
    GED_nf_a008:0 "Вчитися на помилках"
    GED_nf_a008_desc:0 "Простих мисливських луків і жилетів зі шкур геконів недостатньо. Нам потрібні кращі інструменти, щоб перемогти морських людей."
    GED_nf_a009:0 "Воїни напоготові"
    GED_nf_a009_desc:0 "Наші найсильніші мисливці готові до бою, і багато хто слідує їхньому прикладу."
    GED_nf_a010:0 "Дивні мандрівники"
    GED_nf_a010_desc:0 "Вони прийшли з півночі в броні такій важкій, що вони наполовину грузли в багнюці. Навіщо вони прийшли і куди пішли?"
    GED_nf_a011:0 "Священна Печера"
    GED_nf_a011_desc:0 "Особливе місце, де народжуються Болотяні Провидці і даються видіння. Чи можемо ми дозволити навіть корисному чужинцю зайти всередину?"
    GED_nf_a012:0 "Поважай Печеру"
    GED_nf_a012_desc:0 "Печера — це дар нашим людям. Дозволити чужинцю увійти образить богів."
    GED_nf_a013:0 "Зрозуміти болотяних створінь"
    GED_nf_a013_desc:0 "Наша Болотяна Провидця дізналася дещо зі свого останнього видіння — спосіб приборкати звірів болота."
    GED_nf_a014:0 "Приборкати зграю"
    GED_nf_a014_desc:0 "Ми готові випробувати нашу нову мудрість."
    GED_nf_a015:0 "Нові Оракули"
    GED_nf_a015_desc:0 "Багато Болотяних Провидиць загинуло під час нападу морських людей. Їх треба замінити."
    GED_nf_a016:0 "Обіцянки перемоги"
    GED_nf_a016_desc:0 "Усі нові Оракули мали однакове видіння, яке показує, як морських людей відкидають назад в океан."
    GED_nf_a017:0 "Відновлена віра"
    GED_nf_a017_desc:0 "Дари та видіння, даровані нашим Оракулам, відновили віру нашого народу. Сумніви наших людей будуть розвіяні після останнього завдання."
    GED_nf_a018:0 "Вивчити Печеру"
    GED_nf_a018_desc:0 "Доктор Робінсон була великою помічницею для наших людей. Вона заслужила право зайти в нашу священну печеру."
    GED_nf_a019:0 "Більше ніж статуї"
    GED_nf_a019_desc:0 "Доктор каже, що металеві вартові священної печери не просто відлякують злих духів. З її допомогою ми зможемо використовувати їх і для захисту від ворогів."
    GED_nf_a020:0 "Відкрити запечатані проходи"
    GED_nf_a020_desc:0 "Деякі двері священної печери ніколи не відкривалися... дотепер."
    GED_nf_a021:0 "Щедрість Печери"
    GED_nf_a021_desc:0 "Ми дізналися про предмети у Священній Печері, які не потрібні для наших ритуалів. Витягнувши їх, ми зможемо використовувати їх для інших потреб."
    GED_nf_a022:0 "Мудрість Давніх"
    GED_nf_a022_desc:0 "Доктор каже нам, що цю печеру побудували давні люди на ім'я ВОЛТ-Тек. Їм є чому нас навчити в цих залах."
    GED_nf_a023:0 "Ілюзію розвіяно"
    GED_nf_a023_desc:0 "Тепер ми знаємо про Сховище під нашим селом більше, ніж будь-коли. І не завдяки Болотяним Провидицям, а завдяки докторці. Очевидно, ми повинні слідувати її мудрості."
    GED_nf_a024:0 "До берега"
    GED_nf_a024_desc:0 "Наші люди готові відтіснити морських людей від нашого дому."
    GED_nf_a025:0 "Колесо"
    GED_nf_a025_desc:0 "Глибоко в володіннях Посейдона існує машина, яка могла б бути нам корисною."
    GED_nf_a026:0 "Штурм корпусу"
    GED_nf_a026_desc:0 "Морські люди відступили до корабля, на якому припливли. Це наш шанс покінчити з цим!"
    GED_nf_a027:0 "Зупинити спалення"
    GED_nf_a027_desc:0 "Маршали Вогню надто довго палили наші землі. Це закінчиться сьогодні."
    GED_nf_a028:0 "Володарі Едему"
    GED_nf_a028_desc:0 "Болото розширюється безперешкодно. Наші люди живуть у гармонії, не турбуючись про чужинців, які входять на наші землі. Можливо, прийдуть ще, але ми будемо готові."
    GED_nf_a029:0 "Просвітити сусідів"
    GED_nf_a029_desc:0 "Якщо нещодавня війна щось і показала Атомбаптистам чи людям Посейдона, так це те, що їхні боги або безсилі допомогти їм, або їм байдуже. Ми покажемо їм кращий шлях."
    GED_nf_a030:0 "Води Едему"
    GED_nf_a030_desc:0 "За століття ми навчилися робити воду з болота безпечною для пиття."
    GED_nf_a031:0 "Розчистити стежки"
    GED_nf_a031_desc:0 "Кілька стежок і доріг допоможуть нам швидше реагувати на атаки морських людей або будь-кого іншого, хто прийде за нами."
    GED_nf_a032:0 "Збирати інструменти"
    GED_nf_a032_desc:0 "Під чагарниками є старі, давно забуті інструменти, і вони будуть нашими."
    GED_nf_a033:0 "Вести спостереження"
    GED_nf_a033_desc:0 "Наші найкращі розвідники стежитимуть із лінії дерев, попереджаючи нас, коли морські люди зроблять хід."
    GED_nf_a034:0 "Вдосконалити тактику"
    GED_nf_a034_desc:0 "Бій з людьми — це не те саме, що полювання на геконів. Наш спосіб боротьби має бути іншим."
    GED_nf_a035:0 "Об'єднати наш народ"
    GED_nf_a035_desc:0 "Наше плем'я знає, що ми під загрозою. Не знадобиться багато, щоб переконати їх битися."
    
