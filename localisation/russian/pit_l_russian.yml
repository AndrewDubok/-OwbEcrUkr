l_russian:

### Balance of Power ###
    PIT_wernhers_grip_bop:0 "Влада Вернера над Піттом"
    PIT_wernher_grip_loose:0 "Втрачає хватку"
    PIT_wernher_grip_tight:0 "Править залізною рукою"
    PIT_wernher_grip_lost:0 "Майже розвалився"
    PIT_wernher_grip_lost_desc:0 "Плани не виконуються, поставки постійно перенаправляються, а деякі з лейтенантів Вернера поговарюють про розподіл території після того, як він «випадково» впаде з висоти."
    PIT_wernher_grip_fumbling:0 "Намагається зберегти контроль"
    PIT_wernher_grip_fumbling_desc:0 "Занадто багато рейдерів не виконують накази і приховують припаси замість того, щоб їх розподіляти. Хто може їх звинувачувати? Бос ледь розуміє, що відбувається тут, унизу, під його вежею."
    PIT_wernher_grip_loosening:0 "Зростаюча непокора"
    PIT_wernher_grip_loosening_desc:0 "Деякі хлопці просто відмовляються від певних завдань. Вони не думають, що їм щось буде, і зазвичай вони мають рацію."
    PIT_wernher_grip_weak:0 "Слабка хватка"
    PIT_wernher_grip_weak_desc:0 "Побратими шепочуться, що бос слабшає. Він майже не карає, і багато хто безкарно його обдурює. Такого не можна допускати в рейдерській зграї."
    PIT_wernher_grip_firm:0 "Тверда хватка"
    PIT_wernher_grip_firm_desc:0 "Можуть бути скарги час від часу, але це в порядку речей. Зрештою, хлопці знають, хто головний."
    PIT_wernher_grip_strong:0 "Сильна хватка"
    PIT_wernher_grip_strong_desc:0 "Бос тримає міцну команду. У хлопців багато роботи, і вони виконують її вчасно. Ті, хто облажався, більше не облажаються."
    PIT_wernher_grip_iron:0 "Залізний кулак"
    PIT_wernher_grip_iron_desc:0 "Ніхто не сумнівається в босі. У нього все так, як він хоче, тому якщо тобі щось не подобається, ти — проблема. Ти не хочеш бути проблемою."
    PIT_wernher_uprising_bop:0 "Повстання Вернера?"
    PIT_wernher_uprising_here:0 "Повстання вже практично тут!"
    PIT_wernher_uprising_what:0 "Яке ще повстання?"
    PIT_wernher_uprising_imminent:0 "Повстання неминуче"
    PIT_wernher_uprising_imminent_desc:0 "Зараз уже майже загальновідомо, що Вернер планує виступити проти Ашура. Єдина причина, чому бос досі про це не дізнався — тому що майже всі в Пітті на його боці."
    PIT_wernher_uprising_concerning:0 "Серйозна проблема з лояльністю"
    PIT_wernher_uprising_concerning_desc:0 "Багато людей зараз сумніваються у своїй лояльності до Ашура. Це нормально, поки вони його бояться. Але якщо достатньо з них не лояльні, чого їм боятися?"
    PIT_wernher_uprising_talk:0 "Тривожні розмови"
    PIT_wernher_uprising_talk_desc:0 "Все більше людей шепочуться про те, що хтось інший має бути при владі. Вони ніколи не дозволять нікому з відданих Ашуру почути це, але це не означає, що цього не відбувається."
    PIT_wernher_grumblings:0 "Безглузде бурчання"
    PIT_wernher_grumblings_desc:0 "Люди скаржаться, що все могло б бути краще. Ніхто прямо не каже, що хтось інший міг би керувати краще, але ви знаєте, що деякі хлопці так думають."
    PIT_wernher_uprising_unlikely:0 "Повстання малоймовірне"
    PIT_wernher_uprising_unlikely_desc:0 "Ходять чутки, що деякі люди поговарюють про те, щоб прибрати боса і поставити когось іншого. Але це ж просто фігня, правда?"
    PIT_wernher_uprising_doa:0 "Повстання приречене на провал"
    PIT_wernher_uprising_doa_desc:0 "Будь-хто, дурний настільки, щоб спробувати виступити проти Ашура, виявить, що їхня вистава приречена. Це означає «Приречені на дупи»."
    PIT_wernher_uprising_doomed:0 "Повстання приречене"
    PIT_wernher_uprising_doomed_desc:0 "Навіть 5 доз Психо не зробили б нікого достатньо божевільним, щоб зв'язуватися з босом."

### Characters ###
    PIT_lord_ishmael_ashur_name:0 "Лорд Ішмаель Ашур"
    PIT_lord_ishmael_ashur_desc:0 "Колишній послушник Братства Сталі, лорд Ішмаель Ашур був залишений помирати після того, як під час зачистки Братством Пітта на нього обвалилася будівля. Вийшовши з коми через кілька днів, він опинився сам на сам у ворожій місцевості. Слабша людина зламалася б під тиском, але Ашур зумів піднятися, об'єднавши кілька банд і виліпивши Пітт на свій образ. Тепер у нього грандіозні плани зробити те саме з рештою пустки. Принаймні, якщо його одноокий колега нічого не замишляє."
    PIT_krenshaw_NAME:0 "Креншоу"
    PIT_krenshaw_desc:0 "Один з найкращих рейдерів після перевороту Вернера, Креншоу наївся внутрішніх чвар і лайна. Якщо хтось і має керувати Піттом, то це він."
    PIT_wernher_NAME:0 "Вернер"
    PIT_wernher_desc:0 "Колись права рука Ашура, Вернер мав власні плани на Пітт. Тепер, коли Ашура скинуто, Вернеру просто потрібно зрозуміти, що це за плани."
    PIT_adan_NAME:0 "Адан"
    PIT_bone_NAME:0 "Боун"
    PIT_brand_NAME:0 "Бренд"
    PIT_duke_NAME:0 "Дюк"
    PIT_everett_NAME:0 "Еверетт"
    PIT_faydra_NAME:0 "Фейдра"
    PIT_friday_NAME:0 "Фрайдей"
    PIT_hammer_NAME:0 "Гаммер"
    PIT_harris_NAME:0 "Гарріс"
    PIT_jackson_NAME:0 "Джексон"
    PIT_lulu_NAME:0 "Лулу"
    PIT_marco_NAME:0 "Марко"
    PIT_mex_NAME:0 "Мекс"
    PIT_milly_NAME:0 "Міллі"
    PIT_midea_NAME:0 "Мідія"
    PIT_midea_desc:0 "Неофіційна лідерка рабів Пітта, Мідія побачила в нестабільності після перевороту Вернера шанс на свободу, якої прагнув її народ. Тепер вони продовжують боротьбу, щоб ніколи більше не бути закутими в кайдани."
    PIT_mona_NAME:0 "Мона"
    PIT_nola_NAME:0 "Нола"
    PIT_odog_NAME:0 "О-Дог"
    PIT_phantom_NAME:0 "Фантом"
    PIT_reddup_NAME:0 "Редап"
    PIT_sandra_NAME:0 "Доктор Сандра Кунданіка"
    PIT_vika_NAME:0 "Віка"
    PIT_wild_bill_NAME:0 "Дикий Білл"
    PIT_champ_NAME:0 "Чемпіон"

### Cosmetic Tags ###
    PIT_pittsburgh:0 "Піттсбург"
    PIT_pittsburgh_DEF:0 "Піттсбург-Сіті"
    PIT_pittsburgh_ADJ:0 "Піттсбуржці"


### Decisions ###
    PIT_reward_suckups_decision:0 "Нагородити підлабузників"
    PIT_reward_suckups_decision_desc:0 "Кожен, хто демонструє лояльність босу, навіть трохи перебільшену, щоб сприйматися серйозно, отримає додаткову їжу та кришки. Це повинно з часом викликати справжню лояльність."
    PIT_increase_slave_rations_decision:0 "Збільшити пайки робітникам"
    PIT_increase_slave_rations_decision_desc:0 "Робітникам дадуть трохи крему, щоб додати до їхньої бурди з м'яса трогів."
    PIT_force_hole_volunteers_decision:0 "Примусові добровольці до Ями"
    PIT_force_hole_volunteers_decision_desc:0 "Робітники не шикуються в чергу, щоб битися в Ямі. Нам доведеться трохи натиснути."
    PIT_crackdown_on_disloyal_decision:0 "Розправа над нелояльними"
    PIT_crackdown_on_disloyal_decision_desc:0 "Ніщо так не заохочує лояльність, як вибивання лайна з кожного, хто скаржиться... правда?"
    PIT_support_breakers_troops_decision:0 "Підтримати Руйнівників"
    PIT_support_breakers_troops_decision_desc:0 "Руйнівники привозять нам рабів і брухт з усіх Великих озер. Варто відправити їм кількох хлопців, щоб цей ланцюг постачання не переривався."
    PIT_support_harrisburg_troops_decision:0 "Підтримати Гаррісбурзьких Бандитів"
    PIT_support_harrisburg_troops_decision_desc:0 "Гаррісбурзькі Бандити добре справляються з постачанням нам робітників, а іноді й свіжої їжі. Відправка їм допомоги краще, ніж захоплювати Джонстаун самим."
    PIT_support_raiders_troops_decision:0 "Підтримати Парадайз-Фоллз"
    PIT_support_raiders_troops_decision_desc:0 "Рейдери зі Столичної Пустки є головним постачальником работорговців з Парадайз-Фоллз. Ми повинні допомогти їм вижити."
    PIT_wernher_revolt_category:0 "Повстання Вернера"
    PIT_tighten_ashurs_grip_decision:0 "Посилити хватку Ашура"
    PIT_tighten_ashurs_grip_decision_desc:0 "Деякі члени Армії Ашура були спіймані на необережних висловлюваннях або порушенні правил лорда. Покарання їх відповідно допоможе утримати людей від дурних ідей."
    PIT_reward_raiders_decision:0 "Нагородити солдатів"
    PIT_reward_raiders_decision_desc:0 "Солдати Армії Ашура борються не тільки через віру в цілі нашого лорда. Вони роблять це заради платні. Невеликий бонус зробить їх щасливими."
    PIT_special_hole_decision:0 "Влаштувати спеціальний турнір у Ямі"
    PIT_special_hole_decision_desc:0 "Близько сотні робітників буде відібрано «добровольцями» для спеціальної події в Ямі. Робітникам це може не сподобатися, але солдатам так, і в будь-якому випадку це нагадує людям, хто тут головний."

### Events ###
    PIT_nf_events.1.title:0 "Сталеве Місто"
    PIT_nf_events.1.desc:0 "Місто Піттсбург колись було одним із найважливіших промислових центрів довоєнної Америки. Тут виробляли все: від сталі та боєприпасів до вертібердів та силової броні. Не дивно, що місто було серйозною мішенню для китайських ядерних бомб. Майже кожна ракета влучила в ціль, крім однієї. Ця ракета була призначена для..."
    PIT_nf_events.1.a:0 "Піттсбурзького залізничного депо"
    PIT_nf_events.1.b:0 "Міжнародного аеропорту Піттсбурга"
    PIT_nf_events.1.c:0 "Складу Національної гвардії"
    PIT_nf_events.2.title:0 "Слідами Бича"
    PIT_nf_events.2.desc:0 "У 2255 році Братство Сталі розпочало штурм Пітта. «Бич», як його згодом назвуть, став свідком того, як Братство знищило різноманітні божевільні банди, каральні загони та рейдерські ватаги, що нишпорили містом. Ашур був серед солдатів, які прочісували місто, вбиваючи всіх, хто чинив опір, коли його накрило вибухом і завалило уламками. Залишений помирати, молодий послушник був знайдений жителями, які намагалися зняти з нього броню. Племена побачили, як він піднявся з-під уламків, і почали шанувати його. Він використав свої знання та їхню відданість, щоб заповнити вакуум влади в Пітті та об'єднати різних уцілілих. Але хто були ці племена, що його знайшли?"
    PIT_nf_events.2.a:0 "Вони були простими шукачами"
    PIT_nf_events.2.b:0 "Вони були воїнами, що вижили"
    PIT_nf_events.2.c:0 "Вони були простими знахарями"
    PIT_nf_events.2.d:0 "Інструменти лорда Ашура, деталі неважливі."
    PIT_nf_events.3.title:0 "Прокляття Пітта"
    PIT_nf_events.3.desc:0 "Об'єднати розрізнених уцілілих було легкою частиною. Будь-хто, хто міг реально чинити опір, був убитий Братством, а ті, хто вижив, із задоволенням приймали будь-які накази, аніж повертатися до того, що було раніше. У Пітта була одна велика проблема, яка робила його беззаконним безладом майже два століття. Контамінація Троглодитної Дегенерації, інакше відома як КТД. Викликана унікальною сумішшю фонової радіації та промислових забруднювачів, характерних лише для регіону Пітта, хвороба зрештою вражає всіх, хто проводить достатньо часу в цьому районі. Ніби болючих виразок було недостатньо, майже 20% інфікованих КТД страждають від когнітивного спаду. Спад веде до божевілля і, зрештою, до повної деградації в мутанта, якого називають трогом. Один з п'яти людей, які потрапляють у Пітт і страждають від цієї долі, вже є серйозною перешкодою для побудови будь-якого тривалого суспільства. Однак сто відсотків дітей, народжених у цих регіонах, дичавіють протягом кількох тижнів після народження. Ашуру потрібна була робоча сила для реалізації його цілей у Пітті, і з нульовим успішним рівнем народжуваності він був змушений шукати за межами Пітта."
    PIT_nf_events.3.a:0 "Це одне рішення"
    PIT_nf_events.4.title:0 "Жінка Звідкілясь"
    PIT_nf_events.4.desc:0 "У міру того, як Ашур розбудовував Пітт, розповіді про могутність міста поширювалися. Спочатку це приваблювало багатьох мешканців пусток, які шукали можливостей. Ті, хто не підходив для армії Ашура, швидко поневолювалися, і незабаром люди, які просто заходили до Пітта, стали рідкістю. Була одна жінка, яка виділялася, доктор Сандра Кунданіка. Вчена вирушила в Пітт з наміром вивчити стан трогів. Ашур швидко визнав її винятковим вченим, яким вона і була, і запропонував їй місце у своїй вежі для вивчення цього стану. Кінцевою метою було знайти спосіб вилікувати контамінацію, або принаймні зменшити рівень деградації у немовлят."
    PIT_nf_events.4.a:0 "Шляхетна мета"
    PIT_nf_events.5.title:0 "Третій зайвий"
    PIT_nf_events.5.desc:0 "За роки доктор Кунданіка вивчала контамінацію і досягла певних успіхів у розумінні цього стану. Однак прогрес йшов повільно. З часом перевірки Ашуром досліджень лікаря ставали все частішими і все менше стосувалися досліджень. Вони закохалися і незабаром одружилися. Ашур знайшов у своїй дружині не тільки того, хто розуміє і підтримує його цілі, але й має знання та мужність допомогти їх здійснити. \n \n Ашур почав дедалі більше довіряти своїй дружині, шукаючи її думки щодо різних планів і рішень. З цим збільшенням залежності від партнерки прийшло зменшення внеску від його правої руки, Вернера. Хоча довірений лейтенант ніколи публічно не підривав Ашура, останнім часом він став більш голосно висловлювати свої занепокоєння щодо напрямку розвитку Пітта."
    PIT_nf_events.5.a:0 "Схоже на проблеми"
    PIT_nf_events.6.title:0 "Закривавлені та зламані"
    PIT_nf_events.6.desc:0 "Сотні чоловіків і жінок нещодавно прибули до наших воріт, просячи притулку. Це вцілілі члени Руйнівників, які втекли зі своєї території перед обличчям ворога, якого не змогли перемогти. Досвідчені рейдери бажають місця в Армії Ашура і нагадують про свою роль у постачанні Пітта рабами до своєї недавньої поразки. Нам завжди знадобляться додаткові солдати для армії, але чи є в нас місце для слабаків, які не змогли втримати власну землю?"
    PIT_nf_events.6.a:0 "Вони можуть приєднатися до Армії Ашура"
    PIT_nf_events.6.b:0 "Закувати їх у кайдани"
    PIT_nf_events.7.title:0 "Дар"
    PIT_nf_events.7.desc:0 "Коли дружина Ашура народила, всі були готові побачити, як маленька Марі спіткає та сама доля, що й інші діти, народжені в Пітті. З плином тижнів стало зрозуміло, що ця дитина особлива. Доктор Кунданіка провела тести і виявила, що Марі не тільки несприйнятлива до КТД, але й дитина несприйнятлива майже до всіх інших радіаційно-індукованих хвороб. ДНК дитини містить імунітет до всього, від променевої хвороби до гулліфікації і навіть поширеної мутації шостого пальця на нозі! З часом має бути можливим створити спосіб передачі цього імунітету певною мірою. Однак дитина ніжна, і тому зразки її крові потрібно буде брати ощадливо, навіть якщо б вона не була єдиною дитиною лорда Ашура."
    PIT_nf_events.7.a:0 "Що Вернер думає про це?"
    PIT_nf_events.8.title:0 "Спілкування з божевільними"
    PIT_nf_events.8.desc:0 "Відносно нещодавні прибульці в регіон, культисти з Церкви Скелі викликали подив у Пітті. Релігійні фанатики швидко завоювали різні племена, що жили трохи на південь від Пітта, і час від часу посилають солдатів у країну трогів з невідомою метою. Вони, як правило, уникають нашої території, і ми не заходимо на їхню, але, схоже, вони поневолили багатьох з тих племен, які завоювали. Можливо, варто було б озброїти цих божевільних, щоб отримати деяких з їхніх рабів."
    PIT_nf_events.8.a:0 "Запропонувати §R100 гвинтівок§! за §O100 рабів"
    PIT_nf_events.8.b:0 "Запропонувати §R250 гвинтівок§! за §O250 рабів"
    PIT_nf_events.8.c:0 "Запропонувати §R500 гвинтівок§! за §O500 рабів"
    PIT_nf_events.8.d:0 "Запропонувати §R1000 гвинтівок§! за §O1000 рабів"
    PIT_nf_events.8.e:0 "У нас немає зайвої зброї"
    PIT_nf_events.9.title:0 "Велике Видовище"
    PIT_nf_events.9.desc:0 "Метко названа Яма є місцем небезпеки, але й можливостей. Арена приймала незліченні бої між робітниками Пітта, де найсильніші виживали і заробляли місце в Армії Ашура. Незважаючи на те, що кінцевою нагородою була свобода і місце у вищому ешелоні суспільства Пітта, мало хто з робітників охоче записується на ці смертельні поєдинки. Часто робітників змушували брати участь у змаганні для розваги Армії Ашура та кількох більш садистичних робітників. Змагання починаються і закінчуються за волею Ашура, і він оголосив, що вони почнуться."
    PIT_nf_events.9.a:0 "Удачі бійцям"
    PIT_nf_events.10.title:0 "Вернер закріплюється на троні"
    PIT_nf_events.10.desc:0 "Через багато крові, поту та обіцянок Вернер закріпив своє місце як правителя Пітта. Армія Ашура почала приймати його команди, а раби працюють, як завжди. Крісло лорда зручне, але Вернер не повинен надто заспокоюватися. Без сталевого кулака Ашура, який тримав Пітт разом, ситуація є більш нестабільною, ніж будь-коли за останні два десятиліття. Якщо Вернер надто послабить свою хватку, Пітт може вислизнути прямо з його рук."
    PIT_nf_events.10.a:0 "Цього не станеться"
    PIT_nf_events.10.b:0 "Що це означає з точки зору механіки?"
    PIT_nf_events.11.title:0 "Руйнуються шпилі"
    PIT_nf_events.11.desc:0 "Незважаючи на те, що переворот був швидким, він не обійшовся без пошкоджень. Верхнє місто сильно постраждало в боях, багато будівель стали ще більш небезпечними для проживання, ніж раніше. Були навіть кілька будівель, відрізаних через руйнування їхніх мостів. Солдати, які живуть у Верхньому місті, просять, щоб ми виділили рабів на небезпечне завдання з ремонту пошкоджень на цих хитких вежах."
    PIT_nf_events.11.a:0 "Призначити робітників на завдання"
    PIT_nf_events.11.b:0 "Солдати можуть самі полагодити свій дім"
    PIT_nf_events.12.title:0 "Не такий простий запит"
    PIT_nf_events.12.desc:0 "Робітники Пітта були твердими прихильниками повалення Ашура. Ми обіцяли їм, що все зміниться, але вони, можливо, неправильно зрозуміли, наскільки саме. Мідія, представниця робітників, виступила зі списком офіцерів Армії Ашура, яких робітники сподівалися покарати за те, що вони називають «жорстоким поводженням». Ми повинні діяти обережно: рейдери можуть бурчати, якщо одного-двох з них кинуть на поталу натовпу, але більше, ніж це, може призвести до катастрофи."
    PIT_nf_events.12.a:0 "Поступитися вимогам робітників"
    PIT_nf_events.12.b:0 "Віддати їм Віку, вона все одно стерво"
    PIT_nf_events.12.c:0 "Просто перепризначити солдатів зі списку"
    PIT_nf_events.12.d:0 "Робітники не отримають справедливості"
    PIT_nf_events.13.title:0 "Тиша машин"
    PIT_nf_events.13.desc:0 "Млин здебільшого затих з тих пір, як бойові дії вщухли. Деякі робітники сидять, перев'язуючи рани, а інші байдикують, кажучи, що обладнання надто пошкоджене для використання. Потрібно багато роботи, щоб повернути все до робочого стану."
    PIT_nf_events.13.a:0 "Примусові потрійні зміни, поки все не запрацює"
    PIT_nf_events.13.b:0 "Доручити робітникам ремонтувати речі в нормальному темпі"
    PIT_nf_events.13.c:0 "Залучити армію, щоб допомогти полагодити речі"
    PIT_nf_events.14.title:0 "Діри в периметрі"
    PIT_nf_events.14.desc:0 "Троги, які заполонили більшу частину міста, утримуються за межами Пітта серією прожекторів, стін з брухту та сітчастих огорож. Так само, як і решта міста, ці оборонні споруди зазнали пошкоджень у боях, і троги швидко заполонили територію. Поки цих трогів не виженуть, ми не зможемо полагодити ці діри і повернутися в ці райони нашого міста."
    PIT_nf_events.14.a:0 "Це робота для нашої армії"
    PIT_nf_events.14.b:0 "Відправити робітників із запасним оужиєю"
    PIT_nf_events.14.c:0 "Відправити робітників з металевими трубами"
    PIT_nf_events.15.title:0 "Розбиті фундаменти"
    PIT_nf_events.15.desc:0 "У Нижньому місті робітники Пітта живуть у будівлях, сильно пошкоджених під час боротьби за повалення Ашура. Навіть до боїв умови життя в цих будівлях були далеко не хорошими, але тоді у робітників не вистачало сміливості скаржитися. Тепер, коли Ашура немає, вони вважають, що мають право на кращі умови життя чи щось таке."
    PIT_nf_events.15.a:0 "Це не наша проблема"
    PIT_nf_events.15.b:0 "Скоротити зміни, щоб дозволити відбудову"
    PIT_nf_events.15.c:0 "Дайте робітникам ресурси, щоб полагодити речі"
    PIT_nf_events.16.title:0 "Майбутнє"
    PIT_nf_events.16.desc:0 "Ашур тримав свою армію та робітників під каблуком не тільки через своє безжальне лідерство, але й тому, що він мав бачення. Незалежно від того, наскільки нудною була їхня робота солдата або яким лайном було їхнє життя робітника, люди Пітта знали, що те, що вони роблять, сприяє якійсь довгостроковій меті, яку він мав для міста. Солдати Армії Ашура знали, що вони є частиною наймогутнішої сили в пустці, а робітники знали, що їхня праця сприяє місту, яким вони колись можуть насолоджуватися як вільні люди. Звісно, не всі з них вірили в ці обіцянки, але достатньо, щоб утримувати інших від дурних ідей понад 20 років! Якщо Вернер хоче насолоджуватися таким тривалим правлінням, він теж повинен дати своїм людям обіцянку, в яку вони зможуть повірити."
    PIT_nf_events.16.a:0 "§OПітт об'єднає пустку!"
    PIT_nf_events.16.b:0 "§GПітт насолоджуватиметься процвітанням і багатством!"
    PIT_nf_events.16.c:0 "§CПітт буде безпечним для всіх!"
    PIT_nf_events.16.d:0 "§RВи не маєте права ні на що, слухайтеся мене або помріть!"
    PIT_nf_events.17.title:0 "Втрати на Сталевому Дворі"
    PIT_nf_events.17.desc:0 "Наказ солдатам супроводжувати рабів, відправлених на Сталевий Двір для збору злитків, призвів до збільшення успішних зборів. Однак це не обійшлося без недоліків. Навіть наші солдати стикаються з важкими боями в регіоні, кишмя кишому трогами, і багато хто не повертається. Втрати посилили ворожнечу між робітниками та охоронцями. Було кілька випадків розправи, коли робітник повертався без супроводу. Один такий випадок зупинив операції на Сталевому Дворі. Кілька робітників повернулися без супроводу, але несли їхню зброю. Вони наполягають, що схопили зброю, коли на їхніх супроводжувачів напали троги, і намагалися врятувати солдатів, але просто запізнилися. Знаючи, що буває з рабами, які повертаються самі, вони захопили офіс Еверетта, відмовляючись виходити до когось, поки Вернер не гарантує їхню безпеку."
    PIT_nf_events.17.a:0 "Зробити, як вони просять"
    PIT_nf_events.17.b:0 "Штурмувати офіс"
    PIT_nf_events.17.c:0 "Зробити, як вони просять, §Rа потім вбити їх"
    PIT_nf_events.18.title:0 "Занепокоєння щодо компетентності"
    PIT_nf_events.18.desc:0 "Політика відправки членів Робітничого Ополчення на Сталевий Двір зі збирачами злитків призвела до значного збільшення успішних зборів. Однак це не обійшлося без недоліків. Члени ополчення не тільки повертаються живими частіше, ніж очікувалося, але й часто повертаються в кращому стані, ніж були. Там багато старих будівель, повних смертоносної зброї, міцної броні та іншого спорядження, кращого за все, що ми б інакше дали ополченцям. Якби цього було недостатньо, ополченці також навчають збирачів злитків боротися. Ці речі можуть стати проблемою, якщо робітники колись стануть незадоволені своєю долею в житті."
    PIT_nf_events.18.a:0 "Конфісковувати здобич біля входу"
    PIT_nf_events.18.b:0 "Заборонити збирачам носити зброю"
    PIT_nf_events.18.c:0 "Нехай забирають свою здобич, вони добре працюють"
    PIT_nf_events.19.title:0 "Здобич зі Сталевого Двору"
    PIT_nf_events.19.desc:0 "Сталевий Двір — небезпечне місце, і мало хто з робітників повертається живим з вилазки за злитками. Однак ті, хто повертаються, часто приносять нову блискучу іграшку. Не секрет, що Сталевий Двір завалений зброєю та спорядженням, що залишилися після років конфліктів, які Пітт бачив до появи Ашура. Також ніколи не було політики, яка б забороняла робітникам використовувати ці інструменти, щоб залишитися в живих достатньо довго, щоб зібрати ще кілька злитків. Однак нещодавно одна з таких одиниць зброї була використана, коли робітник втрутився, коли наглядач бив ледачого робітника, який відмовився тягати сталь, «бо в нього зламана нога». Можливо, нам потрібно щось з цим зробити."
    PIT_nf_events.19.a:0 "Нехай залишають свою зброю"
    PIT_nf_events.19.b:0 "Еверетт триматиме зброю, поки вони не повернуться на двір"
    PIT_nf_events.19.c:0 "Конфісковувати зброю біля входу"
    PIT_nf_events.20.title:0 "Офіцерів спіймали на крадіжці"
    PIT_nf_events.20.desc:0 "Кількох офіцерів спіймали на відведенні зброї та боєприпасів з конвеєра для продажу з метою особистого збагачення. Спіймані стверджували, що зробили це, щоб компенсувати скорочення зарплати після того, як Вернер прийшов до влади. Вернеру вирішувати, як такі крадіжки будуть каратися в його Пітті."
    PIT_nf_events.20.a:0 "Перевести злодіїв на охорону стін"
    PIT_nf_events.20.b:0 "Змусити їх повернути незаконно отримані кошти"
    PIT_nf_events.20.c:0 "Стратити кожного, кого спіймають на крадіжці"
    PIT_nf_events.21.title:0 "Ми повинні були цього очікувати"
    PIT_nf_events.21.desc:0 "Незважаючи на те, що робітники отримують дуже малу частину прибутку від продажу нашої зброї, це не завадило їм стати мішенню. Їхня представниця прийшла до Вернера з десятками повідомлень про те, що робітників б'ють або вбивають наглядачі за суми, менші за 3 кришки."
    PIT_nf_events.21.a:0 "Покарати винних солдатів"
    PIT_nf_events.21.b:0 "Попередити солдатів не продовжувати"
    PIT_nf_events.21.c:0 "Якщо вони не хотіли помирати, їм слід було заплатити"
    PIT_nf_events.22.title:0 "Маленький укол"
    PIT_nf_events.22.desc:0 "З великими зусиллями ми нарешті знайшли спосіб принаймні частково відтворити стійкість Марі до КТД. Ін'єкція слугує для запобігання психічній деградації, а також мінімізує ураження, які зазнають ті, хто залишається в Пітті. Виробництво вакцини повільне, але з часом ми зможемо зробити щеплення всім у Пітті."
    PIT_nf_events.22.a:0 "Ми знаємо, хто заслуговує на перші уколи"
    PIT_nf_events.23.title:0 "Боротьба за ліки"
    PIT_nf_events.23.desc:0 "Як і слід було очікувати, дефіцит вакцини проти КТД призвів до численних конфліктів. Члени армії, відповідальні за розподіл вакцини, почали її накопичувати і вимагати плату від робітників за укол. Було навіть кілька випадків смерті робітників через те, що їм вводили шприци з радіоактивною водою замість вакцини. Ось чому Мідія знову пробивається до Гейвена, щоб поскаржитися за робітників."
    PIT_nf_events.23.a:0 "Покарати винних солдатів"
    PIT_nf_events.23.b:0 "Замінити винних солдатів"
    PIT_nf_events.23.c:0 "Армія має пріоритет на щеплення!"
    PIT_nf_events.24.title:0 "У глибини"
    PIT_nf_events.24.desc:0 "Розчищення будівель Пітта від трогів — це легша частина боротьби з ними. Переважна більшість з них ховаються під землею, в темних каналізаціях. Якщо ми хочемо мати відносну безпеку в цих руїнах, нам потрібно зробити кілька заходів і хоча б зменшити їхню чисельність. Єдине питання: як ми це зробимо?"
    PIT_nf_events.24.a:0 "Відправити армію"
    PIT_nf_events.24.b:0 "Відправити армію з додатковою оплатою"
    PIT_nf_events.24.c:0 "Відправити армію, §Oз вогнеметами"
    PIT_nf_events.24.d:0 "Відправити робітників"
    PIT_nf_events.24.e:0 "Відправити робітників, §Oз вогнеметами"
    PIT_nf_events.24.f:0 "Відправити робітниче ополчення"
    PIT_nf_events.24.g:0 "Відправити робітниче ополчення, §Oз вогнеметами"
    PIT_nf_events.25.title:0 "Втікачі з Містечка Незалежності"
    PIT_nf_events.25.desc:0 "Розташоване на околиці і слабо охоронюване, Містечко Незалежності, здавалося б, є місцем, звідки багато робітників намагаються втекти. Солдати, відправлені наглядати за робітниками там, повідомили про десятки зникнень, а також кількох рабів, спійманих під час спроби втечі. Зрозуміло, що потрібно щось робити, якщо ми хочемо працювати в Містечку Незалежності."
    PIT_nf_events.25.a:0 "Подвоїти охорону"
    PIT_nf_events.25.b:0 "Встановити більше парканів"
    PIT_nf_events.25.c:0 "Нехай спробують щастя там"
    PIT_nf_events.25.d:0 "Можливо, назва є проблемою"
    PIT_nf_events.26.title:0 "Легші вантажі"
    PIT_nf_events.26.desc:0 "Після тижнів побиття робітників за невиконання плану з'ясувалося, що менші, ніж очікувалося, поставки з Містечка Незалежності не були результатом лінивих робітників. Насправді ми виявили, що кілька начальників у містечку відводили частину ресурсів, щоб продати торговцям брухтом за наші кордони. Винних осіб було перепризначено, але тепер нам потрібно вирішити, що з ними робити."
    PIT_nf_events.26.a:0 "Стратити їх за крадіжку"
    PIT_nf_events.26.b:0 "Дозволити їм відпрацювати борг як робітникам"
    PIT_nf_events.26.c:0 "Конфіскувати їхні незаконні прибутки"
    PIT_nf_events.26.d:0 "Просто пильніше стежити за ними"
    PIT_nf_events.27.title:0 "Работорговці мертві"
    PIT_nf_events.27.desc:0 "Постріли, вибухи та крики, що лунали Піттом останні кілька тижнів, нарешті вщухли. Їх змінило більш регулярне відлуння пострілів, коли захоплених рейдерів Пітта страчують за їхні злочини. Вперше за понад 20 років люди Пітта справді вільні. Нашу долю більше не вирішуватиме якийсь воєначальник, її вирішуватимемо ми. Ті, хто хотів піти, вже пішли, коли бойові дії вщухли. Ті, хто залишився, віддані будівництву Пітта на наших власних умовах, у місце, яке ми зможемо з гордістю називати домом. Місце, де люди вільні, і де ніхто не панує над іншими."
    PIT_nf_events.27.a:0 "Дім, який ми будемо захищати до останнього подиху"
    PIT_nf_events.28.title:0 "Фатальна помилка"
    PIT_nf_events.28.desc:0 "Креншоу, Мідія та Дюк — це лише деякі з тих, хто взявся за зброю проти Вернера і врешті-решт був захоплений. З їхнім повстанням придушеним, залишається питання, що робити з тими, хто думав, що зможе вирвати владу з рук Вернера."
    PIT_nf_events.28.a:0 "Стратити тільки лідерів"
    PIT_nf_events.28.b:0 "Стратити всіх причетних"
    PIT_nf_events.28.c:0 "Відкрити Яму для змовників"
    PIT_nf_events.28.d:0 "Всіх відправити на роботу"
    PIT_nf_events.29.title:0 "Третя спроба — вдала"
    PIT_nf_events.29.desc:0 "Ашур мав багато переваг. Він був розумний, він був сильний, і він мав хороший план. Єдине, він не міг розгледіти, якою змією був Вернер. Вернер теж був трохи розумним і сильним, але він не був Ашуром. Він був просто хитрим ублюдком, якому пощастило переконати людей, що він кращий. Більше ніхто не проверне таке лайно. Креншоу знає, що до чого, і не дозволить нікому зіпсувати його плани. Раби залишаться рабами, як і має бути. Рейдери продовжуватимуть рейдувати, як і має бути. Креншоу правитиме, як він заслужив це право. Пітт буде найкрутішим місцем навколо, і незабаром кожен у пустці віддасть належне лорду."
    PIT_nf_events.29.a:0 "Назад до рейдерства"
    PIT_nf_events.30.title:0 "Заклик Креншоу"
    PIT_nf_events.30.desc:0 "З Пітта прийшла звістка, що Вернеру натовк дупу якийсь хлопець на ім'я Креншоу. Тепер він там командує і надіслав нам повідомлення. \n \n §O Я чув, ви, хлопці, досить круті. Можливо, ви навіть достатньо круті, щоб кататися з нами. У нас є зброя, раби і одні з найкрутіших рейдерів у пустці. Приєднуйтесь, і ми допоможемо вам захопити тих вахлаків навколо вас. Разом ми зробимо так, щоб пустка продовжувала служити найсильнішим, і щоб те лайно, що сталося у Вашингтоні, не повторилося більше ніде. \n \n Креншоу, Лорд Пітта. §! \n \n Як нам відповісти?"
    PIT_nf_events.30.a:0 "Ти сучий син, ми в грі"
    PIT_nf_events.30.b:0 "Ми пропустимо"
    PIT_nf_events.31.title:0 "Сюрприз"
    PIT_nf_events.31.desc:0 "Коли Армія Ашура йшла Столичною Пусткою, люди тікали і ховалися. Вони знали історії про жорстоких работорговців і рейдерів, досить розумних, щоб бути небезпечними. Але коли люди тремтіли, вони повільно почали розуміти дещо. Армія Ашура не грабувала поселення, через які проходила. Людей не відправляли в рабство, і халупи не палили. Кілька солдатів були спіймані на розбої, і, що дивно, їх часто вбивали власні товариші. Навіть так далеко від свого міста Ашур тримав свою армію в залізній хватці. Його слово було законом, і він наказав своїм людям забезпечити майже безкровну передачу влади. Деякі все ще тікали, знаючи життя під тиранами і не бажаючи його знову. Але набагато більше залишилися. Повертаючись до свого повсякденного життя, вони почали думати..."
    PIT_nf_events.31.a:0 "Можливо, буде не так вже й погано"
    PIT_nf_events.32.title:0 "Купа невдах"
    PIT_nf_events.32.desc:0 "Відколи Поселення Столичної Пустки зібралися разом і вигнали більшість рейдерів зі своєї території, у них з'явилася репутація якихось крутих хлопців. Дивлячись на їхні поселення, це насправді показує, наскільки лайновими були тамтешні рейдери. Так, Регулятори були досить жорсткими, але середній мешканець пустки тут такий же наляканий, як будь-який раб Пітта. Тепер люди Столичної Пустки виплачують данину Пітту, і ми заковуємо в кайдани будь-кого, хто здається, що з нього вийде хороший робітник."
    PIT_nf_events.32.a:0 "Як відібрати цукерку в дитини"
    PIT_nf_events.33.title:0 "Годуючи Пітт"
    PIT_nf_events.33.desc:0 "Столична Пустка — справжнє лайно. Земля майже непридатна для фермерства, надто багато мутантів бігають навколо, і не можна ступити й кроку, не наштовхнувшись на якусь стару турель або армійського робота, в якого якимось чином не закінчилися набої. З усім тим, є вагома причина, чому люди тут живуть. Руїни Вашингтона повні цінного брухту. Все, від старих гвинтівок до костюмів силової броні, можна знайти серед уламків цієї пустки. Є деякі речі, які Пітт ще не може виробляти, тому ми дозволимо цим людям продовжувати своє лайнове життя, аби вони віддавали нам нашу частку."
    PIT_nf_events.33.a:0 "Все тече в Пітт"
    PIT_nf_events.34.title:0 "Разом краще"
    PIT_nf_events.34.desc:0 "Люди в Столичній Пустці дуже схожі на нас. Вони страждали під ярмом гнобителів і виступили проти них. Чи то рейдери, супермутанти чи тирани в силовій броні, вони боролися. Тепер, коли ми познайомилися один з одним, вони знають, що ми більше схожі на визволителів, ніж на чергових гнобителів."
    PIT_nf_events.34.a:0 "Тут немає тиранів"
    PIT_nf_events.35.title:0 "За нашими стінами"
    PIT_nf_events.35.desc:0 "Люди [PIT.GetName], я знаю, ми щойно виграли важку війну. Ті, хто за межами нашого великого міста, заздрять нашому успіху, вони хочуть те, що ми побудували. Нашу силу, нашу безпеку, нашу промисловість. Це все речі, які ніхто в Пустці не зміг відтворити. Ми могли відбити атаки тих зі Столичної Пустки, але вони не будуть останніми. Їм і тим, хто бажає вкрасти те, що ми побудували своєю працею, я кажу це... \n\n Не починайте війну, яку не виграєте. Натомість приєднуйтесь до нас. \n\n Так само, як ми відбудували Пітт у велике місто, ми відбудуємо пустку в щось більше. Як це не прикро, я знаю, що ці слова впадуть на глухі вуха. Дикість життя в пустці засліпила багатьох з вас до всього, окрім того, що ви можете вкрасти. \n\n Знайте, що ми будемо готові, і коли ми спустошимо ваші армії, ми побудуємо щось прекрасне над вашими могилами."
    PIT_nf_events.35.a:0 "Сталева Імперія не впаде"
    PIT_nf_events.36.title:0 "Стережіться"
    PIT_nf_events.36.desc:0 "Рабів відправляють з усієї Столичної Пустки до Пітта в кількості, навіть більшій, ніж у славні дні Парадайз-Фоллз. Гори смертоносної зброї, зібраної Братством та Анклавом за роки, знаходяться в руках рейдерів Пітта. З кожним днем до нас приєднується все більше рейдерських банд. Це тільки початок. Незабаром решта пустки буде такою, або приєднається до нас, або служитиме нам."
    PIT_nf_events.36.a:0 "Ми йдемо"
    PIT_nf_events.37.title:0 "Досить солодка схема"
    PIT_nf_events.37.desc:0 "З Бастіону Вернер сидить з принаймні 20 вірними охоронцями, одягненими в силову броню, стягнуту з Цитаделі. Його цілодобово обслуговує персонал робітників, вдячних за те, що їх врятували від роботи на Млині. Солдати армії Вернера тримають робітників у покорі, а також забезпечують безперервний потік товарів до Пітта. Життя воєначальника хороше. Після років інтриг і командування іншими, його імперія майже працює сама по собі, поки він сидить і насолоджується плодами їхньої праці. Майже так, ніби він непотрібний."
    PIT_nf_events.37.a:0 "Сподіваюся, вони ніколи цього не зрозуміють."
    PIT_nf_events.38.title:0 "Свобода назавжди"
    PIT_nf_events.38.desc:0 "Столична Пустка, як і Пітт, насолоджується миром і свободою, яких не бачила століттями. Мандрівні банди работорговців залишилися в минулому, і навіть ті, хто відмовився від цього ремесла, будуть знайдені. Вони не знатимуть спокою, поки їх вистежують і змушують платити за свої злочини. Мідія, мати свободи, подбає про це. Як члени народної армії, ми виконуємо її накази, щоб забезпечити свободу для всіх."
    PIT_nf_events.38.a:0 "Ми повинні завжди залишатися пильними"
    PIT_nf_events.39.title:0 "Майже ідеально"
    PIT_nf_events.39.desc:0 "Вогонь від повалення Ашура вщух. КТД в основному вилікувана. Солдати Пітта знають, хто головний, як і робітники. Все не могло бути набагато краще в Пітті. Ще кілька речей, і Пітт стане серйозною силою, якій ніхто в Пустці не зможе протистояти. \n \n Стривайте... що означає, що раби-робітники повстають? \n \n Нехай Креншоу підніме рейдерів з їхніх дуп, щоб зупинити їх!"
    PIT_nf_events.39.a:0 "§RКРЕНШОУ РОБИТЬ ЩО?!"
    PIT_nf_events.39.b:0 "§CНАМ, РОБІТНИКАМ, ДОСИТЬ!"
    PIT_nf_events.39.c:0 "§OКРЕНШОУ — НАШ НОВИЙ БОС!"
    PIT_nf_events.40.title:0 "Досить значить досить"
    PIT_nf_events.40.desc.1:0 "Роками ми страждали, ми стікали кров'ю і ми вмирали за примхи рейдерських ватажків. Вернер казав, що буде іншим, але він показав нам, що це не так. Свободу, яку нам обіцяли, було відкинуто, і жорстокість рейдерів, над якими він панує, не зменшилася. Які б крихти він нам не кидав, вони ніколи не втамують наш голод за свободою. Після місяців підготовки ми нарешті готові. Цього разу ми боремося не за якогось брехливого невдаху-Ашура, ми боремося за себе!"
    PIT_nf_events.40.desc.2:0 "Роками ми страждали, ми стікали кров'ю і ми вмирали за примхи рейдерських ватажків. Вернер казав, що буде іншим, але він показав нам, що це не так. Навіть свобода, яку він нам дав, була більше пасткою. Рейдери досі топчуть нас, і будь-хто, хто бажає піти, викидається в руїни, щоб виживати самотужки серед дикунів і трогів. Після місяців підготовки ми нарешті готові. Цього разу ми боремося не за якогось брехливого невдаху-Ашура, ми боремося за себе!"
    PIT_nf_events.40.a:0 "Ми боремося за нашу свободу!"
    PIT_nf_events.41.title:0 "Вернер слабкий"
    PIT_nf_events.41.desc:0 "Вернер переконав нас, що впорається краще за Ашура, але не впорався. Робітникам дозволено занадто багато свободи, і він ледве може тримати когось у рамках. Нам потрібен сильний лідер, щоб правити Піттом. Нам потрібен хтось, хто може тримати рабів у покорі та стежити, щоб банди не розірвали один одного на частини. Ось чому нам потрібен хтось на кшталт Креншоу."
    PIT_nf_events.41.a:0 "Час винести сміття"
    PIT_nf_events.42.title:0 "Пояснення правління Вернера"
    PIT_nf_events.42.desc:0 "Оскільки Вернер наводить лад після свого перевороту та зміцнює свою владу в Пітті, він повинен звернути увагу на три речі. \n \n §CСхвалення робітників§! показує, наскільки робітники Пітта згодні з правлінням Вернера. На це впливатиме ваш вибір у фокусах та подіях. Робітникам не сподобається погане ставлення, але їм сподобається лідер, який ставиться до них справедливо. Вони ніколи не пробачать Вернера, якщо він відмовиться від будь-яких обіцянок свободи, які він дав, щоб забезпечити їхню підтримку в захопленні влади. Занадто відверніться від робітників, і більше з них почують заклик боротися за свої права! \n \n §OСхвалення солдатів§! показує, наскільки рейдери Пітта схвалюють лідерство Вернера. Їм сподобаються такі речі, як збільшення їхньої частки здобичі та дозвіл продовжувати знущатися над робітниками. Їм, безумовно, не сподобається, якщо робітникам дадуть свободу. Роздратуйте їх занадто сильно, і коли вони засумніваються в авторитеті Вернера, вони матимуть більшу підтримку! \n \n §RБаланс сил «Влада Вернера»§! показує, наскільки міцною є влада Вернера над Піттом. Влада посилюється сильними рішеннями, покаранням порушників та дотриманням ієрархії Пітта. Вона послаблюється через поступки та заплющування очей на порушення. Тримайте владу надто слабкою, і коли люди почнуть сумніватися у вашій владі, ви можете опинитися з небагатьма союзниками."
    PIT_nf_events.42.a:0 "Хто знав, що керувати цим місцем буде так багато роботи?"
    PIT_nf_events.43.title:0 "Пітт надсилає допомогу"
    PIT_nf_events.43.desc:0 "Бачачи наш нещодавній конфлікт і його вплив на постачання рабів, лорд Ашур надіслав частину своєї армії, щоб допомогти нам у нашій боротьбі. Ці рейдери — щось особливе і повинні допомогти нам тримати все під контролем."
    PIT_nf_events.43.a:0 "Ми все контролювали, але допомога не завадить"
    PIT_nf_events.44.title:0 "Пітт надсилає допомогу"
    PIT_nf_events.44.desc:0 "Бачачи наш нещодавній конфлікт і його вплив на постачання рабів, лорд Ашур надіслав частину своєї армії, щоб допомогти нам у нашій боротьбі. Ці рейдери — щось особливе і повинні допомогти нам тримати все під контролем."
    PIT_nf_events.44.a:0 "Ми все контролювали, але допомога не завадить"
    PIT_nf_events.45.title:0 "Пітт надсилає допомогу"
    PIT_nf_events.45.desc:0 "Бачачи наш нещодавній конфлікт і його вплив на постачання рабів, лорд Ашур надіслав частину своєї армії, щоб допомогти нам у нашій боротьбі. Ці рейдери — щось особливе і повинні допомогти нам тримати все під контролем."
    PIT_nf_events.45.a:0 "Ми все контролювали, але допомога не завадить"
    PIT_nf_events.46.title:0 "Постачання робітників порушено"
    PIT_nf_events.46.desc:0 "Наш імпорт робітників від Руйнівників різко припинився. Морські рейдери, здається, були майже знищені одним із своїх сусідів, і ми не повинні очікувати отримання більше робітників від них."
    PIT_nf_events.46.a:0 "Жалюгідні невдахи"
    PIT_nf_events.47.title:0 "Постачання робітників порушено"
    PIT_nf_events.47.desc:0 "Імпорт робітників зі Столичної Пустки різко припинився. Рейдери Столичної Пустки та їхні друзі в Парадайз-Фоллз були знищені, і ми не повинні очікувати отримання більше робітників звідти."
    PIT_nf_events.47.a:0 "Я знав, що вони марні"
    PIT_nf_events.48.title:0 "Постачання робітників порушено"
    PIT_nf_events.48.desc:0 "Імпорт робітників з Гаррісбурга різко припинився. Колись надійні Гаррісбурзькі Бандити відкусили більше, ніж змогли прожувати, і були знищені. Ми не повинні очікувати більше імпорту робітників з їхньої території."
    PIT_nf_events.48.a:0 "Я знав, що вони розм'якають"
    PIT_nf_events.49.title:0 "Коли свобода?"
    PIT_nf_events.49.desc:0 "Ось уже роки Ашур обіцяє робітникам Пітта, що одного дня вони отримають свободу. Але оскільки ми продовжуємо імпортувати рабів, а тривалість життя раба в Пітті стає дедалі коротшою, багато хто задається питанням, чи побачать вони коли-небудь свободу."
    PIT_nf_events.49.a:0 "Ігнорувати їхні занепокоєння"
    PIT_nf_events.49.b:0 "Покарати будь-якого робітника, який говорить про свободу"
    PIT_nf_events.49.c:0 "Пообіцяти робітникам, що свобода вже близько"
    PIT_nf_events.49.d:0 "Доручити Вернеру поговорити з Мідією"
    PIT_nf_events.50.title:0 "Розм'якаєш?"
    PIT_nf_events.50.desc:0 "Хоча ніхто не наважиться підійти до Ашура і поскаржитися віч-на-віч, багато рейдерів лютують через те, що Яму згорнули. Деякі з них навіть висунули ідею, що це тому, що бос стає м'якшим після народження дитини."
    PIT_nf_events.50.a:0 "Ігнорувати бурчання"
    PIT_nf_events.50.b:0 "Вбити того, хто бурчить найголосніше"
    PIT_nf_events.50.c:0 "Переконати їх, що бої все одно не були такими захопливими"
    PIT_nf_events.50.d:0 "Доручити Вернеру поговорити з Креншоу"
    PIT_nf_events.51.title:0 "Засрані пріоритети"
    PIT_nf_events.51.desc:0 "Як би Ашур не називав рабів Пітта, в свідомості всіх, крім нього, вони саме такі. Тож солдати армії Ашура, звичайно, будуть дуже злі, коли Ашур вирішить поліпшити житлові умови деяких рабів замість них."
    PIT_nf_events.51.a:0 "Нехай скаржаться і стогнуть"
    PIT_nf_events.51.b:0 "Скидати всіх, хто скаржиться, з будівель"
    PIT_nf_events.51.c:0 "Переконати їх, що це для того, щоб робітники наполегливо працювали"
    PIT_nf_events.51.d:0 "Доручити Вернеру поговорити з Креншоу про це"
    PIT_nf_events.52.title:0 "Ті, хто мають, і ті, хто не мають"
    PIT_nf_events.52.desc:0 "Робітники вже повинні розуміти, що солдати армії Ашура йдуть відразу після великої людини та його родини. Ніхто не знає, чому вони думають, що мають право скаржитися на свої умови проживання."
    PIT_nf_events.52.a:0 "Ігнорувати їхні скарги"
    PIT_nf_events.52.b:0 "Ті, хто скаржаться, можуть спробувати кайдани"
    PIT_nf_events.52.c:0 "Пообіцяти, що все скоро покращиться"
    PIT_nf_events.52.d:0 "Доручити Вернеру поговорити з Мідією про це"
    PIT_nf_events.53.title:0 "Нікчемне лайно"
    PIT_nf_events.53.desc:0 "З нашими додатковими кузнями, що виробляють якісні інструменти, самопали в руках нашої армії виглядають ще гірше, ніж зазвичай."
    PIT_nf_events.53.a:0 "Сказати їм обходитися"
    PIT_nf_events.53.b:0 "Показати їм, що зброя все ще вбиває"
    PIT_nf_events.53.c:0 "Тим часом купити нову зброю"
    PIT_nf_events.53.d:0 "Вернер пропонує купити їм кращу зброю"
    PIT_nf_events.54.title:0 "Виробничі проблеми"
    PIT_nf_events.54.desc:0 "Наші робітники регулярно не виконують план, і посилення побиття, здається, не прискорює справу. Представниця робітників каже, що проблема в їхніх інструментах. Вона каже, що наша зосередженість на виробництві зброї змушує їх працювати 200-річними іржавими інструментами, які ледь що ріжуть."
    PIT_nf_events.54.a:0 "Посилювати побиття, поки виробництво не покращиться!"
    PIT_nf_events.54.b:0 "Пообіцяти, що вони скоро отримають кращі інструменти"
    PIT_nf_events.54.c:0 "Доручити Вернеру поговорити з Мідією"
    PIT_nf_events.55.title:0 "Переселення"
    PIT_nf_events.55.desc:0 "Гейвен — це місце для життя в Пітті. Майже кожен рейдер, який потрапляє у вежу, відчуває, що він досяг успіху. Проточна вода, робочі ліхтарі та стіни без величезних дір на 10-му поверсі. Що тут не любити? Тому, коли Ашур сказав деяким солдатам, що їм потрібно буде переїхати в руїну, що розвалюється, у Верхньому місті, щоб Сандра могла розширити свою лабораторію, вони були нещасливі."
    PIT_nf_events.55.a:0 "Тоді вони можуть жити в каналізації!"
    PIT_nf_events.55.b:0 "Відремонтувати їхній новий дім"
    PIT_nf_events.55.c:0 "Пообіцяти, що це тимчасово"
    PIT_nf_events.55.d:0 "Вернер працюватиме з Креншоу над рішенням"
    #Ashur's Events
    PIT_nf_events.61.title:0 "Тріумф Ашура"
    PIT_nf_events.61.desc:0 "Вогонь повстання було погашено. Останніх Дикунів і Трогів розігнано або випотрошено, рейдерів Вернера розгромлено, а потенційних революціонерів-рабів приборкано. Лорд Ашур стояв на зруйнованих перилах Гейвена, оглядаючи побите, але дихаюче серце Пітта.\n\nБув момент, коли Ашур боявся, що втратить усе. Не просто місто, а мрію, яку він так довго захищав. Не милосердя стримало його руку, коли він придушував повстання, а радше мета. Ті, хто здався, отримали пропозицію повернутися до своєї праці, а найбільш непокірних було відправлено на той світ без вагань.\n\nПітт виживе — не просто як королівство попелу й заліза, а як колиска для чогось більшого. Побитий, але незламний, Ашур проголосив свою рішучість через систему оповіщення Пітта з напівзруйнованого балкона Гейвена:\n\n«Ви думали, що зможете зруйнувати те, що ми побудували? Ви думали, що зможете спалити волю самого Пітта? Ні. Я взяв ці розбиті камені, ці згорблені спини, ці покриті шрамами душі... і з них я викую місто, величніше за всі, які коли-небудь знав Старий Світ!»\n\nОплески, спочатку рвучкі, потім громові, відповіли йому. Надія, побита й поранена, але вперта, як сталь, жила далі."
    PIT_nf_events.61.a:0 "Місто Сталі вистояло."

    PIT_nf_events.56.title:0 "Дитина, на якій будувати місто"
    PIT_nf_events.56.desc:0 "Час у Пітті минав дивно. Дні зливалися один з одним у нескінченному шумі печей і кузень. Ашур, і як Лорд, і як Ішмаель, відчував кожну мить, що минає, у болю в кістках і тягарі думок. Марі, колись дитина, яку дбайливо тримали на руках і тримали в безпеці в колисці, тепер повзає залами Гейвена з дитячою цікавістю та рисами своїх батьків, що починають проявлятися.\n\nСтоячи на своєму звичному місці високо над зібраними робітниками та солдатами Пітта, Ашур підняв свою доньку вгору, його голос прорізав важке, просякнуте сажею повітря.\n\n«Ви страждали. Ви стікали кров'ю. Ви працювали й боролися не тільки за себе, а й за майбутнє! Сьогодні це майбутнє набуває форми. Моя донька, Марі, несе в собі ліки. Кров, яка покладе край чумі, що прокляла це місто!»\n\nОглушлива тиша відповіла йому.\n\nАшур, похмуро посміхаючись, повернувся до Сандри, яка провела невтомні місяці, вдосконалюючи ліки. Це далося взнаки обом: його й без того неохайний вигляд був ще більше позначений віком і стресом, те саме стосувалося його дорогої дружини. Але все було недаремно. Протягом місяця перші флакони буде розподілено між робітниками та солдатами.\n\nВперше на пам'яті живих Пітт не просто витримає."
    PIT_nf_events.56.a:0 "Він зцілиться."

    PIT_nf_events.57.title:0 "Кінець Ями"
    PIT_nf_events.57.desc:0 "Яма колись служила своїй похмурій меті. Безжальна арена, де відчайдушні робітники боролися за шанс на виживання, де рейдери, такі як Фейдра, ревіли з висоти риштувань, і де смерть була єдиними оплесками, а підвищення від робітника до солдата було єдиною нагородою, якщо вони виживали, і якщо їх не робили чемпіонами замість цього.\n\nАшур стояв тепер біля потрісканого краю ями, схрестивши руки, оглядаючи залитий кров'ю метал і землю звуженими очима. Колись він терпів це видовище. Це було необхідно, спосіб загартувати потенційних солдатів, підняти неспокійних робітників. Але більше ні.\n\n«Ми не звірі, — гаркнув він зібраним солдатам.\n\n«Пітт більше не є кузнею жорстокості. Він є кузнею майбутнього. Ямі немає місця в тому, що ми будуємо.»\n\nСандра обережно запропонувала, можливо, Яму можна переробити в дитячу кімнату, місце життя замість смерті, зрештою, Марі все ще досить молода, і діти, народжені тепер у Пітті, не зможуть жити в халупах робітників вічно. Креншоу, завжди прагматик, виступав за тренувальний полігон, щоб загартовувати новобранців. Інші пропонували просто розібрати його, рятуючи кожну цеглину та болт."
    PIT_nf_events.57.a:0 "Сандра має рацію, зробити це дитячою кімнатою."
    PIT_nf_events.57.b:0 "Військова навчальна академія може бути корисною для Пітта."

    PIT_nf_events.58.title:0 "Нормування"
    PIT_nf_events.58.desc:0 "Оскільки справи в Пітті покращилися, ми більше не потребуємо «імпорту» робітників. Натомість робітники приходять до нас у пошуках стабільної роботи та стабільної платні. Але прийшли не тільки звичайні люди: ґулі та навіть кілька супермутантів з дещицею розуму в голові з'явилися в пошуках роботи. Їх здебільшого відправили на пошуки в райони, надто радіоактивні для наших людей-робітників, але, здається, їм цього недостатньо. Ґуль підійшов до Гейвена зі списком прохань від цих робітників, головне з яких — дозволити їм стати солдатами, якщо вони захочуть."
    PIT_nf_events.58.a:0 "Запросити їх."
    PIT_nf_events.58.b:0 "Ми тут тільки для бізнесу."

    PIT_nf_events.59.title:0 "Піттсбурзький Оборонний Альянс"
    PIT_nf_events.59.desc:0 "Ми отримали посланця з Пітта. Лорд Ашур пропонує свій захист нашим людям, якщо ми підемо за ним. Мати його зростаючу армію друзями, а не ворогами, було б добре. Але чи варто нам приєднуватися до цієї людини?"
    PIT_nf_events.59.a:0 "Ми приєднаємося."
    PIT_nf_events.59.b:0 "Ми відмовимося."

    PIT_nf_events.60.title:0 "Дивний Світанок"
    PIT_nf_events.60.desc:0 "Так само, як Ашур робив майже щоранку з моменту захоплення Пітта, лорд стояв біля вікна на вершині Гейвена і спостерігав, як сонце сходить над його містом. Сьогодні було трохи інакше. Сонце зійшло над горизонтом саме так, пробиваючись крізь шлейфи диму, що піднімалися з кузень, щоб змусити місто майже сяяти. З вершини Гейвена Ашур міг бачити відремонтовані будівлі, дахи з поручнями безпеки та тисячі людей, які роблять свій внесок у відродження цього мертвого міста. Коли він був глибоко занурений у думки про майбутнє міста, перш ніж він отямився, якийсь смог заступив сонце, і місто повернулося до свого звичного похмурого вигляду. Мить була швидкоплинною, але вона змусила Ашура зрозуміти дещо. Називати своє місто просто Піттом більше не годиться."
    PIT_nf_events.60.a:0 "Час змін"

