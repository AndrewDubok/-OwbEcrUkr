### National Focuses ###

    PIT_nf_a001:0 "Місто Сталі"
    PIT_nf_a001_desc:0 "Ще до Великої війни Пітт був промисловим гігантом."
    PIT_nf_a002:0 "Об'єднання Пітта"
    PIT_nf_a002_desc:0 "Лорд Ашур зробив те, що багато хто вважав неможливим, зупинив нескінченні чвари в Пітті."
    PIT_nf_a003:0 "Проблема Пітта"
    PIT_nf_a003_desc:0 "При всій своїй силі, Пітт має одну нищівну проблему, яка заважала йому коли-небудь досягти величі."
    PIT_nf_a004:0 "Лікарка"
    PIT_nf_a004_desc:0 "Коли чутки про об'єднаний Пітт поширилися, самотня лікарка вирушила на зустріч з його володарем."
    PIT_nf_a005:0 "Мрія для двох"
    PIT_nf_a005_desc:0 "Два великих розуми розробили план майбутнього Пітта, який перевершив усе, що вони уявляли наодинці, але третій зайвий."
    PIT_nf_a006:0 "Вогні промисловості"
    PIT_nf_a006_desc:0 "Багато довоєнних кузень Пітта все ще можна використовувати. Це дозволяє виробляти в масштабах, рідко помітних у Пустці."
    PIT_nf_a007:0 "Оснащення робітників"
    PIT_nf_a007_desc:0 "Нашим першочерговим завданням має бути забезпечення наших робітників інструментами для їхньої роботи."
    PIT_nf_a008:0 "Збалансуйте пріоритети"
    PIT_nf_a008_desc:0 "Нам не потрібно вибирати між оснащенням наших робітників чи наших солдатів, просто всім потрібно обходитися трохи меншим."
    PIT_nf_a009:0 "Оснастіть нашу армію"
    PIT_nf_a009_desc:0 "Між трогами, дикунами та невдячними робітниками, армії Ашура потрібен кожен патрон, який вони можуть отримати."
    PIT_nf_a010:0 "Початковий виробничий цикл"
    PIT_nf_a010_desc:0 "Наші перші партії обладнання вже сходять з конвеєра."
    PIT_nf_a011:0 "Покращення конструкцій"
    PIT_nf_a011_desc:0 "З новим обладнанням у руках помічаються деякі конструктивні недоліки."
    PIT_nf_a012:0 "Оптимізуйте виробництво"
    PIT_nf_a012_desc:0 "Наші методи виробництва стануть ефективнішими в міру вивчення наших процесів."
    PIT_nf_a013:0 "Просуньте периметр"
    PIT_nf_a013_desc:0 "Нове обладнання дозволяє нам просунути наші паркани далі в місто."
    PIT_nf_a014:0 "Зламані"
    PIT_nf_a014_desc:0 "Як ми будемо ставитися до постачальника, який не виконує наші вимоги?"
    PIT_nf_a015:0 "Підтримайте наших постачальників"
    PIT_nf_a015_desc:0 "Пітт не може вижити без постійного постачання робітників. Ми повинні переконатися, що наші джерела можуть задовольнити наші потреби."
    PIT_nf_a016:0 "Відремонтуйте Верхнє місто"
    PIT_nf_a016_desc:0 "Армія Ашура ризикує своїм життям вдень і вночі, охороняючи наші кордони та приносячи їжу з набігів. Вони заслуговують на пристойне місце для життя."
    PIT_nf_a017:0 "Для робітників"
    PIT_nf_a017_desc:0 "Утримання кількох будівель від руйнування повинно запобігти надмірній плинності робітників."
    PIT_nf_a018:0 "Захист Гейвена"
    PIT_nf_a018_desc:0 "Серце нашого міста потребує захисту найбільше."
    PIT_nf_a019:0 "Дослідження в Гейвені"
    PIT_nf_a019_desc:0 "Доктор Кунданіка просить додаткове лабораторне приміщення в Гейвені."
    PIT_nf_a020:0 "Озброєння Пітта"
    PIT_nf_a020_desc:0 "Зброя та патрони, вироблені в Пітті, потрапляють у всі види конфліктів у пустці."
    PIT_nf_a021:0 "Скоротити чисельність трогів"
    PIT_nf_a021_desc:0 "Троги стають сміливішими зі своїми проривами на нашому периметрі. Скорочення їхньої чисельності повинно відкинути їх назад за річку."
    PIT_nf_a022:0 "Дитина-чудо"
    PIT_nf_a022_desc:0 "Кожна дитина, народжена в Пітті, дичавіє протягом кількох тижнів, що робить дітонародження практично неможливим. Так було з усіма пологами, крім цього."
    PIT_nf_a023:0 "Імпортуйте язичників"
    PIT_nf_a023_desc:0 "Дивні культисти на південь від нас можуть постачати деяких робітників для наших фабрик в обмін на зброю."
    PIT_nf_a024:0 "Перевідкрийте Яму"
    PIT_nf_a024_desc:0 "Що тут сказати? Більшість гине. Один-два вибралися, але це все. \n \n -Фейдра"
    PIT_nf_a025:0 "Розширте Яму"
    PIT_nf_a025_desc:0 "Збільшення Ями дозволить проводити бої більшого масштабу. Цікаво, чи зможемо ми дістати туди трохи трогів."
    PIT_nf_a026:0 "Та сама стара Яма"
    PIT_nf_a026_desc:0 "Навіщо псувати те, що працює? Яма робить те, що потрібно."
    PIT_nf_a027:0 "Зменште масштаби"
    PIT_nf_a027_desc:0 "Яма все ще є важливою частиною суспільства Пітта, але, можливо, нам не потрібно проводити стільки боїв."
    PIT_nf_a028:0 "Вчіться на боях"
    PIT_nf_a028_desc:0 "Ці недотепи, яких ми вербуємо, могли б дечому навчитися, спостерігаючи за боями."
    PIT_nf_a029:0 "Наступний чемпіон"
    PIT_nf_a029_desc:0 "Випробування Ями — це не те, над чим можна насміхатися. Ті, хто виходить переможцем, гідні приєднатися до Армії Ашура."
    PIT_nf_a030:0 "Випробування бойовим вогнем"
    PIT_nf_a030_desc:0 "Ми можемо вбити двох зайців одним пострілом, випробовуючи наші нові конструкції зброї в Ямі."
    PIT_nf_a031:0 "Більше театральності"
    PIT_nf_a031_desc:0 "Яка користь від цих боїв, якщо на них не цікаво дивитися? Радіоактивні бочки, що падають зі стелі, несподівані повороти та стрілянина з натовпу — все це частина шоу."
    PIT_nf_b001:0 "Око на приз"
    PIT_nf_b001_desc:0 "Після того, як Ашур зник з карти, настав час новому босу зайняти місце."
    PIT_nf_b002:0 "Запах Верхнього міста"
    PIT_nf_b002_desc:0 "Навіть верхні рівні нашого міста не уникнули пошкоджень у боях."
    PIT_nf_b003:0 "Старі образи"
    PIT_nf_b003_desc:0 "Деякі з робітників, які допомогли повалити Ашура, тепер висувають вимоги, подумаєш тільки."
    PIT_nf_b004:0 "Тиха фабрика"
    PIT_nf_b004_desc:0 "Робота припинилася під час боїв, але ця перерва закінчилася."
    PIT_nf_b005:0 "Зачистка трогів"
    PIT_nf_b005_desc:0 "У хаосі кілька парканів були зламані, і троги прорвалися. Нам потрібно закрити ці діри."
    PIT_nf_b006:0 "Шлях до Нижнього міста"
    PIT_nf_b006_desc:0 "Лайно, в якому живуть робітники, зазнало найбільших пошкоджень. Але чи варто нам взагалі хвилюватися?"
    PIT_nf_b007:0 "Дивлячись у майбутнє"
    PIT_nf_b007_desc:0 "Люди йшли за Ашуром або тому, що на їхніх шиях були вибухові нашийники, або тому, що він мав план. У мене є і те, й інше."
    PIT_nf_b008:0 "Нарешті свобода"
    PIT_nf_b008_desc:0 "Робітники, які боролися з нами, отримають те, що Ашур завжди їм обіцяв, — свободу."
    PIT_nf_b009:0 "Свобода з часом"
    PIT_nf_b009_desc:0 "Настане час, коли всі робітники отримають свою свободу, але цей час ще не настав."
    PIT_nf_b010:0 "Пам'ятай своє місце"
    PIT_nf_b010_desc:0 "Ти справді вірив, що ми просто так тебе відпустимо? Така дурість — ось чому ти взагалі раб!"
    PIT_nf_b011:0 "Дослідіть ліки"
    PIT_nf_b011_desc:0 "Дитина Ашура в безпеці, і ми продовжуємо роботу над лікуванням КТД."
    PIT_nf_b012:0 "Імпорт-експорт"
    PIT_nf_b012_desc:0 "Ми продаємо гармати та патрони, а потім купуємо або викрадаємо те, що нам потрібно. Навіщо нам робити щось додаткове?"
    PIT_nf_b013:0 "Стимулювання зростання"
    PIT_nf_b013_desc:0 "Збройовий бізнес — це хороший бізнес, але він завжди найстабільніший. Ми відкладемо частину наших кришок на розвиток інших речей."
    PIT_nf_b014:0 "Самодостатнє місто"
    PIT_nf_b014_desc:0 "Якщо Пітт хоче мати довгостроковий успіх, він не повинен ні від кого залежати."
    PIT_nf_b015:0 "Робітниче ополчення"
    PIT_nf_b015_desc:0 "Якщо ви, робітники, хочете бути рівними, вам також доведеться боротися."
    PIT_nf_b016:0 "Хліба та видовищ"
    PIT_nf_b016_desc:0 "Я не можу дати вам точної відповіді, коли ми дамо вам свободу... але як щодо вечірки з тістечками?"
    PIT_nf_b017:0 "Застосуйте тиск"
    PIT_nf_b017_desc:0 "Будь-який робітник, спійманий на байдикуванні або все ще ниючий про свободу, буде скормлений трогам."
    PIT_nf_b018:0 "Досягнення прогресу"
    PIT_nf_b018_desc:0 "Ні, серйозно. Ми стаємо набагато ближче. Навіщо б мені брехати про це?"
    PIT_nf_b019:0 "Лорд війни"
    PIT_nf_b019_desc:0 "Щоб кришки продовжували надходити, нам потрібно мати не просто найбільше зброї, але й найкращу."
    PIT_nf_b020:0 "Промисловий розвиток"
    PIT_nf_b020_desc:0 "Не всі ці машини були для куль. Можливо, ми теж зможемо їх полагодити."
    PIT_nf_b021:0 "Міський розвиток"
    PIT_nf_b021_desc:0 "Ніхто не хоче жити в смітнику. Ми можемо почати з поручнів навколо бару."
    PIT_nf_b022:0 "Охоронці Сталевого двору"
    PIT_nf_b022_desc:0 "Робітники хочуть озброєних супроводжуючих, коли виходять на Сталевий двір. Гадаю, це краще, ніж втрачати сталь."
    PIT_nf_b023:0 "Шукай їжу"
    PIT_nf_b023_desc:0 "Робітники можуть скаржитися на захист цілий день, але якщо вони хочуть їсти, їм потрібно тягнути свою ношу!"
    PIT_nf_b024:0 "Припиніть нити"
    PIT_nf_b024_desc:0 "Нам потрібні ліки зараз, турбота про дитину Ашура — це другорядна думка."
    PIT_nf_b025:0 "Пестити дитину"
    PIT_nf_b025_desc:0 "Якщо це змусить вас усіх замовкнути, ми можемо дати дитині іграшку-другу і трохи зачекати."
    PIT_nf_b026:0 "Скарбниця лорда"
    PIT_nf_b026_desc:0 "Ви не розумієте. Якщо хлопці нагорі отримають увесь прибуток, це буде добре для всіх. Вони розумніші, тому знають, як краще розподілити це між усіма іншими."
    PIT_nf_b027:0 "Поділіться багатством"
    PIT_nf_b027_desc:0 "Від найсильнішого лейтенанта до найслабшого робітника, кожен отримає частку прибутку від наших продажів."
    PIT_nf_b028:0 "Імпорт робочої сили"
    PIT_nf_b028_desc:0 "Що б ми не робили, Пітт все ще небезпечне місце, і нам щодня потрібно більше робітників."
    PIT_nf_b029:0 "Укол"
    PIT_nf_b029_desc:0 "Після місяців наполегливої праці ми нарешті маємо те, що повинно принаймні запобігти переходу КТД у найгірші стадії. Ви знову зможете мати дітей, тож беріться за створення майбутніх робітників!"
    PIT_nf_b030:0 "Поширте інформацію"
    PIT_nf_b030_desc:0 "Пітт кращий, ніж будь-коли. Люди повинні знати, що ми рухаємося тільки вгору!"
    PIT_nf_b031:0 "Троги біля воріт"
    PIT_nf_b031_desc:0 "Настав час щось зробити з усіма цими трогами в руїнах."
    PIT_nf_b032:0 "Прочесати каналізацію"
    PIT_nf_b032_desc:0 "Ці кляті тварини постійно вилазять з каналізації вночі. Спускайтеся туди і розберіться з ними."
    PIT_nf_b033:0 "Знову заселити Містечко Незалежності"
    PIT_nf_b033_desc:0 "Тепер це місце могло б стати хорошим поселенням."
    PIT_nf_b034:0 "Розібрати Містечко Незалежності"
    PIT_nf_b034_desc:0 "Навіщо нам створювати ще одне велике містечко? Просто витягніть звідти весь брухт, який зможете."
    PIT_nf_b035:0 "Роботи для роботи в Пітті"
    PIT_nf_b035_desc:0 "Там цілі склади старих роботів, які можуть працювати на лініях і на заводі. Нам тільки потрібно змусити їх працювати."
    PIT_nf_b036:0 "Бойові роботи Пітта"
    PIT_nf_b036_desc:0 "Навіщо нам витрачати цих роботів на заводську роботу, коли у нас є величезна кількість робітників? Краще поставте їх на охоронні патрулі."
    PIT_nf_b037:0 "Укріпіть форпости"
    PIT_nf_b037_desc:0 "Між Піттом і Містечком Незалежності довгий шлях. Нам потрібні міцні стіни на випадок, якщо підкріплення затримається."
    PIT_nf_b038:0 "Запасні механізми"
    PIT_nf_b038_desc:0 "Під час нишпорення руїнами було знайдено кілька старих машин, які варто забрати."
    PIT_nf_b039:0 "Спеціалізоване виробництво"
    PIT_nf_b039_desc:0 "Роботи можуть працювати набагато краще за більшість робітників, і вони навіть не вмирають після того, як отримають купу свинцю."
    PIT_nf_b040:0 "Старі креслення"
    PIT_nf_b040_desc:0 "Тут є папки, повні планів, як зробити цих роботів смертоноснішими. Оце так знахідка!"
    PIT_nf_b041:0 "На межі величі"
    PIT_nf_b041_desc:0 "Справи йдуть краще, ніж будь-коли за Ашура, принаймні так це виглядає з вершини Гейвена."
    PIT_nf_b042:0 "Важко здобута свобода"
    PIT_nf_b042_desc:0 "Роки знущань, фальшивих обіцянок і смерті нарешті закінчилися. Піттом більше не правитиме рейдерський ватажок, а звільнений народ!"
    PIT_nf_b043:0 "Ті, хто вижив"
    PIT_nf_b043_desc:0 "Ці щури справді думали, що здача в полон врятує їх після того лайна, яке вони провернули?"
    PIT_nf_b044:0 "Новий ватажок"
    PIT_nf_b044_desc:0 "Вернер був маленькою сучкою, тепер настав час справжньому чоловікові взяти владу."
    PIT_nf_b045:0 "Права робітника"
    PIT_nf_b045_desc:0 "Робітників Пітта більше не будуть бити. Вони матимуть право на їжу за свою працю, і їм нарешті дадуть справжній одяг."
    PIT_nf_b046:0 "Захисти наш дім"
    PIT_nf_b046_desc:0 "Це лише питання часу, коли хтось прийде за нами. Ми повинні бути готові."
    PIT_nf_b047:0 "Їдять тільки лояльні"
    PIT_nf_b047_desc:0 "Очевидно, проблема була в тому, що ми грали занадто добре. Тепер, якщо ти хочеш їсти, тобі краще поводитися правильно."
    PIT_nf_b048:0 "Влада для сильних"
    PIT_nf_b048_desc:0 "Бої відкрили склад, повний старих костюмів силової броні! Тепер нам потрібно з'ясувати, як користуватися цими клятими штуками."
    PIT_nf_b049:0 "Пожинайте плоди"
    PIT_nf_b049_desc:0 "У боях загинуло багато хлопців, і їхні речі просто лежать там. Хто знайшов, той і взяв."
    PIT_nf_b050:0 "Кличте всіх рейдерів"
    PIT_nf_b050_desc:0 "Настав час серйозно взятися за владу. Надішліть повідомлення іншим бандам."
    PIT_nf_b051:0 "Переїзд нагору"
    PIT_nf_b051_desc:0 "З рейдерами покінчено, ми нарешті можемо переїхати в ті великі пентхауси в небі. Нарешті ми маємо шматок пирога."
    PIT_nf_b052:0 "Робітниче ополчення"
    PIT_nf_b052_desc:0 "Кожен, хто здатний боротися, повинен бути готовий боротися. Це ціна, яку ми платимо за нашу свободу."
    PIT_nf_b053:0 "Бастіон ватажка"
    PIT_nf_b053_desc:0 "Гейвен — це добре, але є будівля ще вища, яку тепер очищено від трогів. Це буде гарна твердиня."
    PIT_nf_b054:0 "Сталева гвардія"
    PIT_nf_b054_desc:0 "Кільком хлопцям зламали кінцівки, але ми нарешті освоїли ці костюми."
    PIT_nf_b055:0 "Забезпечте ієрархію"
    PIT_nf_b055_desc:0 "Рейдери є рейдерами. Раби є рабами. Так було завжди, і так буде завжди."
    PIT_nf_b056:0 "Попит і пропозиція"
    PIT_nf_b056_desc:0 "Звісно, ми дамо вам зброю для ваших набігів. Але ми очікуємо на частку."
    PIT_nf_b057:0 "Ніколи більше не закуті"
    PIT_nf_b057_desc:0 "Ніколи більше ми не дозволимо комусь одягнути на нас нашийник, бити нас і говорити, що ми їхня власність. Ми повалили Ашура, Вернера та Креншоу. Будь-хто інший, хто спробує закувати нас у кайдани, зустріне той самий кінець!"
    PIT_nf_b058:0 "Ватажок Вернер"
    PIT_nf_b058_desc:0 "Тепер, коли все заспокоїлося, ми можемо дивитися в майбутнє. Поки що це майбутнє — завоювання купи тупих мешканців пусток, які все ще б'ються гострими палицями."
    PIT_nf_b059:0 "Безперервна вечірка"
    PIT_nf_b059_desc:0 "Пустка належить найкрутішим виродкам навколо, і це ми. Рейдуй, веселись, повторюй."
    PIT_nf_c001:0 "У Столичну Пустку"
    PIT_nf_c001_desc:0 "Столична Пустка завжди була лайном, але це лайно з деякими цінними речами, прихованими в її темних закутках."
    PIT_nf_c002:0 "Увійдіть до Цитаделі"
    PIT_nf_c002_desc:0 "Колись дім Братства Сталі, Цитадель тепер більше схожа на гігантський склад технологій і зброї."
    PIT_nf_c003:0 "Мешканці Пустки"
    PIT_nf_c003_desc:0 "Як мешканці пусток пристосовуються до нових реалій?"
    PIT_nf_c004:0 "Іржава махина"
    PIT_nf_c004_desc:0 "Будучи найбільшим містом у Столичній Пустці, це місце, безперечно, є купою брухту."
    PIT_nf_c005:0 "Майбутнє Пустки"
    PIT_nf_c005_desc:0 "Зі Столичною Пусткою під нашим контролем нас ніщо не зупинить."
    PIT_nf_d001:0 "Жалюгідне повстання"
    PIT_nf_d001_desc:0 "Вернер справді думав, що кілька порожніх обіцянок і рукостискань буде достатньо, щоб повалити лорда цього міста? Це майже жалюгідно."
    PIT_nf_d002:0 "Збір залишків"
    PIT_nf_d002_desc:0 "Вернер і Мідія, можливо, зазнали невдачі, але Ашур не безсердечний. Він простягне руку робітникам, які повстали проти них, щоб вони повернулися до роботи без жодного покарання. Якщо вони відмовляться, солдати їх знищать."
    PIT_nf_d003:0 "Придушити бунтівних"
    PIT_nf_d003_desc:0 "Придушення інакодумства зазвичай полягає в камерах, постійному моніторингу та замкнутому контролі. У моєму місті не буде таких речей. Перший крок — запровадити довоєнну концепцію, відому як «Сусідська варта»."
    PIT_nf_d004:0 "З висоти"
    PIT_nf_d004_desc:0 "І робітникам, і солдатам потрібні кращі місця для життя. Як би добре не було повністю відновити Гейвен, не добре мати потенційних ворогів, які живуть за кілька футів від моєї власної кімнати. Давайте подумаємо про відновлення деяких більших структур Пітта."
    PIT_nf_d005:0 "Налагодження зв'язків"
    PIT_nf_d005_desc:0 "Самодостатність є ключем до всього, і ми продовжуватимемо надавати собі пріоритет, але у нас є сусіди, які рано чи пізно захочуть вторгнутися або використати нас, і я не завжди буду поруч, щоб направляти Марі. Нам потрібні партнери, не в рабстві, а в думках."
    PIT_nf_d006:0 "Рівень вниз"
    PIT_nf_d006_desc:0 "Промови та ідеї — це одне, але так скоро після повстання робітникам потрібно бачити свого Лорда в дії. Є фабрика в місці під назвою Траншеї, верх — це уламки, але, за чутками, нижні рівні незаймані. Я спущуся туди, щоб підняти моральний дух."
    PIT_nf_d007:0 "Дар міста"
    PIT_nf_d007_desc:0 "З Вернером і бунтівними рабами покінчено, Пітт повертається до звичного ритму роботи, хоча з додатковою перевагою: Сандра та Ашур працюють цілодобово за зачиненими дверима, щоб забезпечити щастя та здоров'я Марі."
    PIT_nf_d008:0 "Дар місту"
    PIT_nf_d008_desc:0 "Це здається таким швидким, але Марі майже досягла віку, коли її здорові гени можна буде застосувати до вакцини проти КТД, яка назавжди змінить це місто. Завдяки нашим зусиллям ми можемо дозволити собі проводити більше досліджень одночасно."
    PIT_nf_d009:0 "Продовження досліджень ліків"
    PIT_nf_d009_desc:0 "Немає сумніву, що кров Марі спрацює, але це також не означає, що всі будуть готові так охоче прийняти укол, або навіть зможуть. Нам потрібно знайти спосіб забезпечити альтернативні вакцини."
    PIT_nf_d010:0 "Вакцинований «Ядер-Колою»"
    PIT_nf_d010_desc:0 "Смішна назва, але потенційно ефективний метод вакцинації. Не думаю, що поруч є велика фабрика «Ядер-Коли», але додавання вакцини в перемарковані пляшки має спрацювати."
    PIT_nf_d011:0 "Стримую обіцянку"
    PIT_nf_d011_desc:0 "Марі так швидко росте, і я також швидко старію. Настав час завершити проект із Сандрою та представити його Пітту."
    PIT_nf_d012:0 "Розгром трогів у Верхньому місті"
    PIT_nf_d012_desc:0 "Повстання мало неприємний побічний ефект: виявило ключову слабкість протитрогових прожекторів у Верхньому місті, що призвело до знищення кількох підприємств. Ці проблеми необхідно вирішити, перш ніж ми зможемо вжити подальших заходів."
    PIT_nf_d013:0 "Портативна енергія"
    PIT_nf_d013_desc:0 "Це не може бути так просто, але, за словами Еверетта, давним-давно трогів відганяли гранатами, які випромінювали сліпуче світло, а також гарматами та шоломами з такими ж сліпучими ліхтарями. Можливо, це те, що нам потрібно, щоб нарешті перемогти трогів?"
    PIT_nf_d014:0 "Знищити трогів"
    PIT_nf_d014_desc:0 "Тепер, коли вони не розмножуються швидше, ніж ми встигаємо їх вбивати, ми можемо щось зробити з трогами"
    PIT_nf_d015:0 "Хімічна зброя"
    PIT_nf_d015_desc:0 "Трогтаун виявив схованку стародавніх товарів. Товарів, які можуть розплавити обличчя людини та зріджувати метал. Це може бути нам на користь."
    PIT_nf_d016:0 "PPG Плейс"
    PIT_nf_d016_desc:0 "Значення трьох літер уже нікому не відоме, але чотири стіни та дах — це те, від чого не варто відмовлятися, особливо коли поруч є ще п'ять таких, де можна жити."
    PIT_nf_d017:0 "Підвищте температуру"
    PIT_nf_d017_desc:0 "Ашур бачить потенціал у відновленні колишньої промислової слави Пітта. Можливо, Вернеру це не вдалося, але він знову надихнув Ашура. Печі повинні горіти спекотніше, ніж будь-коли раніше"
    PIT_nf_d018:0 "Перекована сталь"
    PIT_nf_d018_desc:0 "Мине ще деякий час, перш ніж можна буде знову виробляти силову броню та справді довоєнну зброю. Наразі зосередьтеся на продажу та експорті наших надлишкових ресурсів сусідам."
    PIT_nf_d019:0 "Натисніть на прес"
    PIT_nf_d019_desc:0 "Причина, чому для постачання солдатів Пітта використовувався такий маленький і обмежений прес, полягала в тому, щоб запобігти саме тому, чим скористався Вернер. Треба зробити другий, щоб гарантувати, що це ніколи не повториться."
    PIT_nf_d020:0 "Прискорений курс"
    PIT_nf_d020_desc:0 "Всупереч здоровому глузду, щоб захиститися від ворогів ззовні, можливо, буде розумно знову розпочати виробництво літаків. За кілька років ми зможемо знову виробляти вертіберди. Про човни поки що не йдеться, річка надто токсична."
    PIT_nf_d021:0 "Операція «Чисто та ясно»"
    PIT_nf_d021_desc:0 "Гуль-торговець, проходячи повз, подивився на нашу воду і зауважив, що знає спосіб її очистити, хоча б трохи. Можливо, якщо ми вкладемо в це достатньо коштів, ми зможемо запустити човни."
    PIT_nf_d022:0 "Підготуйте солдатів"
    PIT_nf_d022_desc:0 "Влада Ашура знову беззаперечна, але хоча він ніколи не повторить помилку, призначивши другого командувача, як Вернер, можливо, було б мудро навчити солдатів."
    PIT_nf_d023:0 "Рейдери Пітта"
    PIT_nf_d023_desc:0 "Усе, що робиться для солдатів, має на меті зробити їх кращими людьми. Але багато хто стверджує, що вони не що інше, як рейдери під іншою назвою. Щоб справити тривалий вплив, щось має змінитися."
    PIT_nf_d024:0 "Нагородження вірних"
    PIT_nf_d024_desc:0 "Усі солдати рівні, ніякої нісенітниці про те, що одні рівніші за інших. Якщо ми стимулюватимемо робітників ставати солдатами іншими засобами, крім Ями, ми зможемо працювати над кращим завтра."
    PIT_nf_d025:0 "Заповнення Ями"
    PIT_nf_d025_desc:0 "Змушувати робітників битися для розваги наших солдатів — це не спосіб вербувати нашу армію в майбутньому. Настав час нарешті закрити Яму."
    PIT_nf_d026:0 "Нормування"
    PIT_nf_d026_desc:0 "З'явилися якісь дивні особи, які шукають роботу, настав час прийняти офіційну політику."
    PIT_nf_d027:0 "Робочий тиждень"
    PIT_nf_d027_desc:0 "Стара приказка Пустки: «Дай їм палець — вони відкусять руку по лікоть». Але з огляду на новознайдений мир і прагнення до процвітання в Пітті, робітникам тепер можна дозволити повний день відпочинку."
    PIT_nf_d028:0 "Металева стійкість"
    PIT_nf_d028_desc:0 "Було вирішено: машини слугуватимуть інструментами. Робітники будуть їх використовувати, а солдати стежитимуть, щоб машини не повернулися проти нас. Про всяк випадок Сандра склала програму віддаленого терміналу, щоб запобігти будь-яким думкам про повстання роботів."
    PIT_nf_d029:0 "Кування ливарні"
    PIT_nf_d029_desc:0 "Виявляється, Млин — не єдиний металообробний завод у Пітті. Цілком новий сталеливарний завод відкрився нам, коли ми розчистили уламки впалого хмарочоса. Якщо ми його відновимо, у нас буде більше роботи для робітників, ніж будь-коли."
    PIT_nf_d030:0 "Розчищення уламків"
    PIT_nf_d030_desc:0 "Не секрет, що багато доріг і тунелів не є найлегшими або найбезпечнішими для пересування. Але тепер, за допомогою машин, а не людей, ми можемо докласти зусиль, щоб підвищити прохідність Пітта."
    PIT_nf_d031:0 "Економічне відродження"
    PIT_nf_d031_desc:0 "Досі економіка Пітта будувалася на робітниках, боєприпасах і броні, все в обмін на кришки. Але кришки зроблені з металу, навіть зі сталі. Якщо робітник-ренегат заполонить ринок новими кришками, нам кінець. Як щодо того, щоб знайти новий вид металу?"
    PIT_nf_d032:0 "Інвестиції у флот"
    PIT_nf_d032_desc:0 "Оскільки річка стала трохи менш токсичною, ми можемо дозволити собі використовувати причали та доки. Тільки не забудьте надіти захисний костюм, плаваючи в цій частині річки."
    PIT_nf_d033:0 "Фільтрація повітря"
    PIT_nf_d033_desc:0 "Зараз це здається безглуздим, але це матиме велике значення для запобігання розвитку хвороб від нескінченного моря чорного диму в повітрі. Хто знає, можливо, колись ми нарешті знову побачимо блакитне небо."
    PIT_nf_d034:0 "Залізний хребет"
    PIT_nf_d034_desc:0 "Гейвен — найвища будівля у відвойованій частині Пітта, але це не найвища будівля в усьому Пітті. Тепер, коли ми організували засоби, ми можемо докласти зусиль, щоб відбудувати Сталеву вежу під її новою, народженою в Пітті назвою — Залізний хребет."
    PIT_nf_d035:0 "Міст через річку Пітт"
    PIT_nf_d035_desc:0 "Міст довго символізував контроль над Піттом, міни, встановлені, щоб запобігти втечі будь-якого робітника. Але коли новий Пітт набуває форми, міст теж повинен змінитися. До того ж це допоможе торгівлі, щоб випадково не вбивати так часто."
    PIT_nf_d036:0 "Депо RobCo"
    PIT_nf_d036_desc:0 "У ході подальших розкопок, здається, було знайдено сховище роботів, як модифікованих, так і незайманих. Якщо нічого іншого, їх можна розібрати на запчастини та рідкісні матеріали."
    PIT_nf_d037:0 "Святилище"
    PIT_nf_d037_desc:0 "Колись великий собор, пізніше захоплений Фанатиками, Святилище стоїть як свідчення помилок Старого Світу. Робітники вже починають там молитися — чи то своєму Богу, чи то своєму Лорду."
    PIT_nf_d038:0 "Посланець Небес"
    PIT_nf_d038_desc:0 "Більшість великих споруд Пітта або відвойовуються, або реконструюються, або заселяються просто зараз. Хоча нові сусіди все ще не є мудрими, завершення нового горизонту Пітта більш незайманим Гейвеном — непогана ідея."
    PIT_nf_d039:0 "Світло опудала"
    PIT_nf_d039_desc:0 "Яким би жорстоким це не було, цей скручений дріт і металева людина викликають незліченні емоції у тих, хто його бачить, вперше чи вп'яте. Якщо ми збудуємо його більшим, це може надихнути більше людей повірити в це місто."
    PIT_nf_d040:0 "Комплекс «Жирний старатель»"
    PIT_nf_d040_desc:0 "Ви коли-небудь замислювалися, звідки беруться всі ці банки свинини з квасолею? Ми теж, але ці зруйновані будівлі, здається, містять багато з них, навіть машини, щоб робити більше, якби ми коли-небудь захотіли."
    PIT_nf_d041:0 "Гарантуючи нашу незалежність"
    PIT_nf_d041_desc:0 "Тим, хто бажає Пітту зла, тим, хто бажає Пітту лиха, тим, хто хотів би позбавити нас суверенітету, нехай буде відомо: ми будемо боротися, і ми переможемо."
    PIT_nf_d042:0 "Місто, міцніше за сталь"
    PIT_nf_d042_desc:0 "Це місто дуже схоже на сталь, яку воно виробляло. Колись блискуче та незаймане, потім залишене гнити, стало огидним і зношеним. У нас може не бути такого ж чистого блиску, але ми міцніші, ніж будь-коли, і зі спадщиною Ашура, що швидко зростає, це зв'язок, міцніший за сталь."

### Production Companies ###
