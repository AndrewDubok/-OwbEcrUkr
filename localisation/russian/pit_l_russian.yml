### Ideas ###
    PIT_capital_wasteland_slave_imports_idea:0 "Імпорт рабів зі Столичної Пустки"
    PIT_capital_wasteland_slave_imports_idea_desc:0 "Работорговці з Парадайз-Фоллз вантажать рабів зі Столичної Пустки цілими возами."
    PIT_capital_wasteland_slave_imports_2_idea:0 "Імпорт рабів зі Столичної Пустки"
    PIT_capital_wasteland_slave_imports_2_idea_desc:0 "Работорговці з Парадайз-Фоллз вантажать рабів зі Столичної Пустки майже швидше, ніж ми встигаємо їх розвантажувати."
    PIT_breakers_imports_idea:0 "Імпорт від Руйнівників"
    PIT_breakers_imports_idea_desc:0 "Работорговці з Руйнівників доставляють і рабів, і брухт з усіх Великих озер."
    PIT_harrisburg_imports_idea:0 "Імпорт з Гаррісбурга"
    PIT_harrisburg_imports_idea_desc:0 "Гаррісбурзькі Бандити продають нам і їжу, і рабів зі сходу Пенсильванії."
    PIT_arms_exports_idea:0 "Експорт зброї"
    PIT_arms_exports_idea_desc:0 "Наші кузні виробляють боєприпаси, які ми експортуємо по всій пустці."
    PIT_tdc_idea:0 "Контомінація Троглодитної Дегенерації"
    PIT_tdc_idea_desc:0 "Контомінація Троглодитної Дегенерації, відома як КТД, є жалюгідною хворобою, яка вражає людей у районі навколо Пітта. Суміш забруднюючих речовин і радіації як у повітрі, так і у воді навколо міста зрештою вражає всіх. Протягом кількох тижнів ті, хто страждає від контамінації, розвивають глибокі шкірні ураження. Близько 20% тих, хто заражається, спіткає гірша доля. Їхній психічний стан погіршується, як і їхнє тіло, перетворюючи їх на жахливих мутантів, відомих як троги. Що ще гірше, кожна дитина, народжена в Пітті, спіткає цю долю лише через кілька тижнів після народження."
    PIT_industrial_support_idea:0 "Промислова підтримка"
    PIT_industrial_support_idea_desc:0 "Ми інвестували частину нашої промисловості у виробництво якісних інструментів для наших робітників."
    PIT_overextended_industry_idea:0 "Перенапружена промисловість"
    PIT_overextended_industry_idea_desc:0 "Виробництво як якісних інструментів, так і якісної зброї виснажує наших робітників."
    PIT_internal_supplied_arms_idea:0 "Підтримка виробництва зброї"
    PIT_internal_supplied_arms_idea_desc:0 "Багато видів зброї в Пітті виробляються власними силами з використанням наших передових довоєнних машин. Якість зброї та наявність запасних частин роблять цю зброю надійнішою за більшість видів зброї в пустці."
    PIT_enhanced_melee_idea:0 "Покращені ріжучі інструменти"
    PIT_enhanced_melee_idea_desc:0 "Наші ріжучі інструменти не тільки гарні для промислових цілей, але й стали зручною зброєю в скрутну хвилину. Ми розширили конструкції з огляду на це додаткове призначення."
    PIT_enhanced_ballistic_idea:0 "Покращені конструкції вогнепальної зброї"
    PIT_enhanced_ballistic_idea_desc:0 "Ми навчилися на кожному заклинюванні, кожній осічці та кожному робітнику, використаному для прицілювання. Ми зробили наші гармати трохи надійнішими і трохи смертоноснішими."
    PIT_enhanced_both_idea:0 "Розробка інструментів і зброї"
    PIT_enhanced_both_idea_desc:0 "Покращення конструкцій наших ріжучих інструментів і вогнепальної зброї принесло великі переваги."
    PIT_streamlined_melee_idea:0 "Оптимізоване виробництво інструментів"
    PIT_streamlined_melee_idea_desc:0 "Спостерігаючи за вузькими місцями та непотрібними процесами, ми скоротили час, необхідний для виробництва наших інструментів."
    PIT_streamlined_ballistic_idea:0 "Оптимізоване виробництво зброї"
    PIT_streamlined_ballistic_idea_desc:0 "Ми випускаємо зброю з такою швидкістю, ніби нам потрібно оснастити армію чи щось таке. О, стривайте, нам дійсно потрібно."
    PIT_streamlined_both_idea:0 "Оптимізоване виробництво інструментів і зброї"
    PIT_streamlined_both_idea_desc:0 "Ми оптимізували виробництво нашої вогнепальної зброї та ріжучих інструментів, доставляючи їх у руки більшої кількості солдатів і робітників."
    PIT_liberated_workers_idea:0 "Робітників звільнено"
    PIT_liberated_workers_idea_desc:0 "Робітників звільнено від кайданів. Якщо вони хочуть піти, вони можуть. Просто пройти через замінований міст і крізь територію трогів. Давай. §RЗроби це."
    PIT_freedom_delayed_idea:0 "Свобода відкладена"
    PIT_freedom_delayed_idea_desc:0 "Я знаю, ти хочеш бути вільним зараз. Але зараз це просто неможливо. Економіка в руїнах."
    PIT_freedom_refused_idea:0 "У свободі відмовлено"
    PIT_freedom_refused_idea_desc:0 "Ти справді думав, що отримаєш свободу тільки тому, що кілька сотень із вас були живим щитом під час перевороту?"
    PIT_wernher_cure_research_idea:0 "Дослідження ліків Вернера"
    PIT_wernher_cure_research_idea_desc:0 "У нас може не бути передових лабораторій чи освіченого вченого, який керує дослідженнями. Але ми все одно якось вилікуємо КТД."
    PIT_import_export_idea:0 "Циркулярна торгова економіка"
    PIT_import_export_idea_desc:0 "Економіка Пітта залежить від експорту сталі та зброї. Цей експорт дозволяє нам купувати все необхідне у зовнішніх постачальників. Будемо сподіватися, що лінії постачання ніколи не будуть перерізані."
    PIT_fueled_growth_idea:0 "Стимульоване зростання"
    PIT_fueled_growth_idea_desc:0 "Економіка Пітта залежить від експорту сталі та зброї. Ми реінвестуємо частину прибутку від цих продажів у розвиток інших промислових секторів. Більше продуктів означає більше кришок."
    PIT_self_sufficiency_idea:0 "Самодостатня економіка"
    PIT_self_sufficiency_idea_desc:0 "Економіка Пітта залежить від експорту сталі та зброї, поки що. Однак ми реінвестуємо плоди нашої праці в розвиток інших секторів нашої економіки. Зрештою ми не потребуватимемо нічого від тих, хто за нашими стінами, і з цим ми не будемо нікому кланятися."
    PIT_wernher_cure_research_harsh_idea:0 "Жорсткі дослідження ліків"
    PIT_wernher_cure_research_harsh_idea_desc:0 "Досить ходити навколо та навколо. Нам потрібні ліки швидше, ніж пізніше. Якщо ціна, яку ми платимо за ліки, — це більше плачу дитини Ашура, нехай так і буде."
    PIT_wernher_cure_research_soft_idea:0 "М'які дослідження ліків"
    PIT_wernher_cure_research_soft_idea_desc:0 "Гаразд, добре, ми не поспішатимемо і намагатимемося не дуже нашкодити дитині."
    PIT_hiring_workers_idea:0 "Наймання робітників"
    PIT_hiring_workers_idea_desc:0 "Вперше за довгий час люди приходять у Пітт працювати за власним бажанням. Їм навіть платять за це!"
    PIT_wernhers_slave_imports_idea:0 "Імпорт рабів Вернера"
    PIT_wernhers_slave_imports_idea_desc:0 "Вернер гарантує, що Пітт продовжуватиме мати робітників, необхідних для процвітання."
    PIT_automated_industry_idea:0 "Автоматизована промисловість"
    PIT_automated_industry_idea_desc:0 "Ми не можемо замінити кожен етап виробництва машинами, поки що. Але ми можемо принаймні змусити роботів виконувати важку роботу."
    PIT_home_defense_idea:0 "Захисти наш дім"
    PIT_home_defense_idea_desc:0 "Кожен звільнений чоловік і жінка Пітта знають, що на нас чекає, якщо ми дозволимо якомусь рейдерському ватажку чи іншому виродку знову правити Піттом. Тому вони більш ніж готові приєднатися до боротьби!"
    PIT_worker_rights_idea:0 "Права робітників"
    PIT_worker_rights_idea_desc:0 "Працювати в Пітті може бути не легко, але стало набагато легше, коли нам дали дихальні маски і припинили побиття."
    PIT_never_again_idea:0 "Ніколи знову"
    PIT_never_again_idea_desc:0 "Ми будемо боротися кожною частинкою нашої душі. Ми будемо боротися до останньої людини. Ми будемо боротися з люттю, небаченою покидьками пусток. Ми будемо боротися, щоб гарантувати, що нас ніколи більше не закують у кайдани!"
    PIT_enforced_hierarchy_idea:0 "Примусова ієрархія"
    PIT_enforced_hierarchy_idea_desc:0 "Досить цього ходіння навколо та навколо лайна, яке хотіли провернути Ашур і Вернер. Раби є рабами. Рейдери є рейдерами. Ми нагорі, вони внизу, і так воно і залишиться."
    PIT_pitt_arms_supply_idea:0 "Постачання зброї з Пітта"
    PIT_pitt_arms_supply_idea_desc:0 "Пітт регулярно відправляє нам гармати та патрони, нам просто потрібно віддавати їм частку з наших набігів."
    PIT_arsenal_of_terror_idea:0 "Арсенал терору"
    PIT_arsenal_of_terror_idea_desc:0 "Ми постачаємо зброю всім найкращим рейдерським бандам навколо, а натомість вони дають нам дуже хорошу частку з їхніх набігів."
    PIT_nonstop_party_idea:0 "Безперервна вечірка"
    PIT_nonstop_party_idea_desc:0 "Немає вечірки кращої за рейдерську, тому що рейдерська вечірка не закінчується, поки ти не §RМЕРТВИЙ"
    PIT_the_hole_idea:0 "Яма"
    PIT_the_hole_idea_desc:0 "Час від часу робітників кидають у Яму і змушують битися. Ті, хто перемагає, заробляють місце в армії. Ті, хто програє, ну, їм більше не доведеться працювати. Це безпрограшний варіант, чи не так?"
    PIT_stagnating_empire_idea:0 "Стагнація імперії"
    PIT_stagnating_empire_idea_desc:0 "Вернер майже не переймається тим, що відбувається в Пітті. Він сидить у своїй вежі, думаючи, що придушення одного повстання означає, що він більше ніколи не зіткнеться з іншим."
