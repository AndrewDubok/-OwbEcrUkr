EEN_rescue_events.1.title: "Наукову групу врятовано"
EEN_rescue_events.1.desc: "Наукову групу та їхню охорону в Логові Кігтів Смерті вдалося безпечно врятувати без жодних перешкод. На щастя, мешканці пусток та Братство уникають цієї місцевості через популяцію кігтів смерті, тому наші вертольоти змогли благополучно приземлитися та злетіти, не потрапивши під обстріл."
EEN_rescue_events.1.a: "Роботу виконано добре"
EEN_rescue_events.2.title: "Рятувальна група зникає"
EEN_rescue_events.2.desc: "На жаль, пілот нашої рятувальної команди неправильно вибрав посадковий майданчик для рятувальної операції та зазнав аварії неподалік від Логова Кігтів Смерті. Остання радіопередача, яку ми отримали від пастки наукової групи, була повідомленням про ситуацію та їхні плани спуститися з підвищення, щоб врятувати команду вертольота. Відтоді ми не отримували жодних повідомлень і мусимо вважати, що вони загинули."
EEN_rescue_events.2.a: "Зараз ми нічого не можемо для них зробити"
EEN_rescue_events.3.title: "Успішне рятування"
EEN_rescue_events.3.desc: "Солдати, які потребували порятунку у Вашингтоні, чудово впоралися з нападниками з Братства. Команда рятувальників змогла швидко дістатися до місця та завантажити тих, хто вижив, після чого злетіла, отримавши лише кілька лазерних пострілів, які не завдали нічого, окрім подряпин на фарбі вертольота."
EEN_rescue_events.3.a: "Роботу виконано добре"
EEN_rescue_events.4.title: "Важка рятувальна операція"
EEN_rescue_events.4.desc: "Як і слід було очікувати, порятунок солдатів, які застрягли в центрі Вашингтона, призвів до деяких втрат. Хоча більшість вертольотів змогли благополучно повернутися, останній вертоліт, що вилітав, був уражений ракетою Братства Сталі і вибухнув. Вижилих не було."
EEN_rescue_events.4.a: "Приблизно як і очікувалося"
EEN_rescue_events.5.title: "Повна катастрофа"
EEN_rescue_events.5.desc: "Ми надто довго відкладали порятунок цих солдатів. На момент приземлення наших вертольотів на зоні висадки їхні позиції вже були прорвані, а лицарі Братства Сталі заполонили посадковий майданчик. Останній сигнал, який ми отримали, був від панікуючого пілота, який намагався злетіти, але він так і не повернувся на базу."
EEN_rescue_events.5.a: "Який безлад"
EEN_rescue_events.6.title: "Успішне рятування"
EEN_rescue_events.6.desc: "Наша рятувальна команда легко прорвала оборону Форту Константин і вивела патруль з пастки, поки жоден із Вигнанців, що патрулювали околиці, навіть не запідозрив щось. Незважаючи на те, що ті, хто вижив, проходять лікування від виснаження, через кілька днів вони будуть готові повернутися на передову."
EEN_rescue_events.6.a: "Роботу виконано добре"
EEN_rescue_events.7.title: "Рятувальна команда втрачена"
EEN_rescue_events.7.desc: "Ми не отримували звісток від рятувальної команди та солдатів у пастці вже кілька днів. Можна лише припустити, що вони зіткнулися з чимось у надрах Форту Константин, з чим не змогли впоратися."
EEN_rescue_events.7.a: "Ми оплакуємо загиблих"
EEN_rescue_events.8.title: "Провал евакуації Анклаву"
EEN_rescue_events.8.desc: "Деякі залишки розрізнених сил Анклаву у Вашингтоні були знищені під час спроби евакуації на вертольотах. Наші лицарі знищили солдатів, що залишилися, та їхніх рятувальників, захопивши при цьому кілька вертольотів."
EEN_rescue_events.8.a: "Чудова робота, Брати"


