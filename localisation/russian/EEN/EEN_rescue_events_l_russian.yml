EEN_rescue_events.1.title: "Научная группа в безопасности"
EEN_rescue_events.1.desc: "Научная группа и её охрана в логове когтей смерти были благополучно спасены без каких-либо препятствий. К счастью, жители пустошей и Братство избегают этой местности из-за популяции когтей смерти, поэтому наши винтокрылы смогли благополучно приземлиться и взлететь, не попав под обстрел."
EEN_rescue_events.1.a: "Хорошая работа"
EEN_rescue_events.2.title: "Спасатели уходят в темноту"
EEN_rescue_events.2.desc: "К сожалению, пилот нашей спасательной команды неправильно выбрал посадочную площадку для спасательной операции и потерпел крушение недалеко от логова когтей смерти. Последняя радиопередача, которую мы получили от попавшей в ловушку научной группы, была сообщением о ситуации и их планах спуститься с возвышенности, чтобы спасти команду винтокрыла. С тех пор мы не получали никаких сообщений и должны считать, что они погибли."
EEN_rescue_events.2.a: "Сейчас мы ничего не можем для них сделать"
EEN_rescue_events.3.title: "Успешное спасение"
EEN_rescue_events.3.desc: "Солдаты, нуждающиеся в спасении в Вашингтоне, отлично справились с нападавшими из Братства. Команда спасателей смогла быстро добраться до места и погрузить выживших, после чего взлетела, получив лишь несколько лазерных выстрелов, которые не причинили ничего, кроме потёртостей на краске винткокрыла."
EEN_rescue_events.3.a: "Хорошая работа"
EEN_rescue_events.4.title: "Тяжёлая спасательная операция"
EEN_rescue_events.4.desc: "Как и следовало ожидать, спасение солдат, застрявших в центре Вашингтона, обошлось с ограниченными потерями. Большинство винтокрылов благополучно вернулись, но последний винтокрыл был поражён ракетой Братства Стали и взорвался в огненной вспышке. Выживших не было."
EEN_rescue_events.4.a: "Примерно как и ожидалось"
EEN_rescue_events.5.title: "Полная катастрофа"
EEN_rescue_events.5.desc: "Мы слишком долго откладывали спасение этих солдат. К моменту приземления наших винтокрылов на зоне высадки их позиции уже были прорваны, а рыцари Братства Стали заполонили площадку. Последний сигнал, который мы получили, был от паникующего пилота, пытавшегося взлететь, но он так и не вернулся на базу."
EEN_rescue_events.5.a: "Какой беспорядок"
EEN_rescue_events.6.title: "Успешное спасение"
EEN_rescue_events.6.desc: "Наша спасательная команда без труда прорвалась через оборону Форта Константин и вывела патруль из ловушки, пока ни один из Изгой, патрулировавших окрестности, даже не заподозрил что-либо. Несмотря на то, что выжившие проходят лечение от истощения, через несколько дней они будут готовы вернуться на передовую."
EEN_rescue_events.6.a: "Хорошая работа"
EEN_rescue_events.7.title: "Спасательная команда потеряна"
EEN_rescue_events.7.desc: "Мы не получали известий от спасательной команды и солдат в ловушке уже несколько дней. Можно лишь предполагать, что они столкнулись с чем-то в недрах Форта Константин, с чем не смогли справиться."
EEN_rescue_events.7.a: "Мы оплакиваем погибших"
EEN_rescue_events.8.title: "Провал эвакуации Анклава"
EEN_rescue_events.8.desc: "Некоторые остатки рассеянных сил Анклав в Вашингтоне были уничтожены при попытке эвакуации на винтокрылах. Наши рыцари уничтожили оставшихся солдат и их спасателей, захватив при этом несколько винтокрылов."
EEN_rescue_events.8.a: "Хорошая работа, Братья"


