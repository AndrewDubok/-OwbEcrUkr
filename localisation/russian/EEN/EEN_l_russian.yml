    ###Баланс Сил###
    EEN_public_support:0 "Поддержка Жителей Пустоши"
    EEN_dangerously_low_public_support:0 "Критически низкая поддержка Жителей Пустоши"
    EEN_firm_public_support:0 "Непоколебимая поддержка Жителей Пустоши"
    EEN_public_support_category:0 "Поддержка Жителей Пустоши"
    EEN_crumbling_public_support:0 "Разрушенная поддержка Жителей Пустоши"
    EEN_crumbling_public_support_desc:0 "Хотя наш персонал доволен лидерством Отэм, вера жителей Пустоши в Анклав рушится. Только несколько истинных верующих в Американскую Мечту остаются с нами. Патрули попадают в засады в районах, которые раньше были безопасными, а рабочие покидают оружейные заводы. Плюс в том, что этот житель пустоши..."
    EEN_precarious_public_support:0 "Ненадежная поддержка Жителей Пустоши"
    EEN_precarious_public_support_desc:0 "Несмотря на то, что персонал Анклава доволен текущим положением дел, наши солдаты сообщают о растущей враждебности в поселениях, через которые они проходят. Пока это всего лишь случайные проклятия или что-то гнилое, но скоро это могут быть пули и гранаты."
    EEN_low_public_support:0 "Низкая поддержка Жителей Пустоши"
    EEN_low_public_support_desc:0 "Наши политические решения и недавние действия явно благоприятствуют персоналу Анклава. Хотя обычный житель Пустоши пока лишь жалуется в своих лачугах, с каждым днем все больше людей поддерживает группы сопротивления. Если мы не будем осторожны, могут возникнуть восстания."
    EEN_strong_public_support:0 "Сильная поддержка Жителей Пустоши"
    EEN_strong_public_support_desc:0 "Несмотря на то, что многие старшие офицеры жалуются на наши решения, у обычного жителя Пустоши положительное мнение о Анклаве. Согласно недавнему опросу, 7 из 10 опрошенных жителей Пустоши говорят, что их жизнь улучшилась с приходом Анклава, и 1 из 3, кто не согласился, был гулем, так что их мнение не в счет."
    EEN_moderate_public_support:0 "Умеренная поддержка Жителей Пустоши"
    EEN_moderate_public_support_desc:0 "Несмотря на ворчание некоторых наших наиболее консервативно настроенных сотрудников, наша политика приводит к тому, что жители пустошей всё больше привыкают к нашей власти. Поселенцы терпеливо ждут свои пайки воды, а налоговые поступления растут. Кроме того, недоброжелателей списывают как маргинальных сумасшедших, поэтому никто не скучает по ним, когда они исчезают."
    EEN_growing_public_support:0 "Растущая Поддержка Жителей Пустоши"
    EEN_growing_public_support_desc:0 "Хотя некоторые в Анклаве недовольны текущей политикой, общее восприятие Анклава среди жителей пустоши выражается в осторожном оптимизме. Существует немало критиков, осуждающих некоторые наши меры, но обычных жителей пустоши не волнуют такие вопросы, как «права гуля» или предполагаемые военные преступления. Им просто нужна холодная вода, горячий обед и место, чтобы спокойно сходить в туалет с закрывающейся дверью. Если мы продолжим обеспечивать это, у нас всё будет хорошо."
    EEN_midling_public_support:0 "Сбалансированная Поддержка"
    EEN_midling_public_support_desc:0 "Мы достигли разумного компромисса между жесткими и про-пустошными политиками и действиями, и хотя никто не в восторге от этого, по крайней мере, никто и не возмущён."
    EEN_leadership_struggle:0 "Внутренняя борьба за власть в Анклаве"
    EEN_autumn_loyalist_enclave:0 "Лояльность Отэму"
    EEN_eden_loyalist_enclave:0 "Лояльность Эдему"
    EEN_leadership_struggle_decision_category:0 "Решения, связанные с борьбой за лидерство"
    EEN_contested_leadership:0 "Оспариваемое лидерство"
    EEN_contested_leadership_desc:0 "Вопрос лояльности между Президентом и Командующим Вооружёнными Силами Анклава разделил жителей Рэйвен-Рока почти поровну. Переворот, скорее всего, закончится катастрофой."
    EEN_firm_autumn_loyalty:0 "Твёрдая лояльность Отэму"
    EEN_firm_autumn_loyalty_desc:0 "Даже за пределами офицерского корпуса полковник Отэм видит восхищение и непоколебимую преданность, которая, кажется, затмевает преданность Президенту."
    EEN_autumn_loyalist_cliques:0 "Малые группы лоялистов Отэма"
    EEN_autumn_loyalist_cliques_desc:0 "Различные сторонники Отэма сформировали группы в своих отделах. Они благосклонны к тем, кто принадлежит к ним, и сторонятся тех, кто более лоялен к Президенту. Это может быть проблематично."
    EEN_autumn_loyalist_talk:0 "Разговоры лоялистов Отэма"
    EEN_autumn_loyalist_talk_desc:0 "Люди в наших рядах часто говорят о своём восхищении и преданности полковнику Отэму. Хотя это всего лишь разговоры, они, мягко говоря, беспокоят."
    EEN_firm_presidential_support:0 "Твёрдая поддержка Президента"
    EEN_firm_presidential_support_desc:0 "Преданные американцы Анклава знают какому руководству им следует верить. Президент Эдем пользуется выдающимся рейтингом одобрения, а также обожанием своего народа."
    EEN_moderate_presidential_support:0 "Умеренная поддержка Президента"
    EEN_moderate_presidential_support_desc:0 "Хотя некоторые сомневаются в решениях Президента, они знают, что лучше не жаловаться. По общему мнению членов Анклава, Президент Эдем отлично справляется со своими обязанностями."
    EEN_wavering_presidential_support:0 "Колеблющаяся поддержка Президента"
    EEN_wavering_presidential_support_desc:0 "Президентом Эдемом не так восхищаются, как раньше. Некоторые члены Анклава задались вопросом, не следует ли в скором времени провести выборы нового президента."

    ###Occupation Laws###
    ecr_water_distribution:0 "Миссии по Распределению Воды"
    ecr_water_distribution_desc:0 "В дополнение к нашим патрулям, мы будем отправлять охраняемые караваны для распределения воды по поселениям. Со временем население поймет, что сотрудничать с нами лучше, чем противостоять."
    ecr_cure_clinics:0 "Лечебные центры"
    ecr_cure_clinics_desc:0 "Мы продолжим распространять нашу воду и использовать наши лечебные клиники для мониторинга распространения модифицированного вируса ВРЭ. В конечном итоге эта территория станет пригодной для проживания людей."

    ###Leader Traits###
    EEN_grant_trait:0 "Дух Президента Гранта"
    EEN_richardson_trait:0 "Дух Президента Ричардсона"
    EEN_jackson_trait:0 "Дух Президента Джексона"
    EEN_hoover_trait:0 "Дух Президента Гувера"
