l_russian:

    ###Tool Tips###
    EEN_tt_1:0 "Это пригодится..."
    EEN_tt_2:0 "Разблокирует решения по контакту с другими ячейками Анклава"
    EEN_tt_3:0 "Обрушьте огонь на этого проклятого робота!"
    EEN_tt_4:0 "Новые советники и лидеры выйдут на первый план!"
    EEN_tt_5:0 "Мы предоставим автономию боссам рейдеров и другим местным автократам на контролируемых нами территориях для обеспечения местного правопорядка и безопасности."
    EEN_tt_6:0 "Разблокирует решения по оплате услуг Компании «Коготь» для проведения тайных операций."
    EEN_tt_7:0 "Разблокирует новые законы о прессе, определяющие, кто контролирует эфир."
    EEN_tt_8:0 "Мутанты из Столичной Пустоши будут страдать и умирать, оставляя Пустошь чистой"
    EEN_tt_9:0 "Разблокирует решения по возвращению цивилизации в города США"
    EEN_tt_10:0 "Кого-нибудь еще напугало, как он это сказал?"
    EEN_popular_support_tt:0 "Несмотря на силовую броню, правительства получают свою власть с согласия управляемых. Анклаву нужно доказать рядовому жителю пустоши, что он достоин ими управлять. Хотя мощная армия и крупнейший источник чистой воды по эту сторону Аппалачей — это действительно хорошее начало, есть ещё вещи, что может заставить жителей пустошей восстать и попытаться вернуться к самоуправлению."
    EEN_tt_11:0 "Жителям Пустоши это, вероятно, не понравится"
    EEN_tt_12:0 "Жителям Пустоши это действительно не понравится"
    EEN_tt_13:0 "Это создаст нам серьезные проблемы в сфере связей с общественностью!"
    EEN_tt_14:0 "Жителям Пустоши это понравится"
    EEN_tt_15:0 "Жителям Пустоши это очень понравится"
    EEN_tt_16:0 "Жители Пустоши будут это праздновать!"
    EEN_tt_17:0 "Где мы приносим воду, там мы наводим порядок"
    EEN_tt_18:0 "Мы начнем строительство центров распределения воды в подчиняющихся нам регионах и найдем для них персонал"
    EEN_tt_19:0 "Как только кто-то заставит эту заброшенную мечту снова заработать, нам придется принять меры!"
    EEN_tt_20:0 "Следите за вариантами событий и решениями фокусов. Те, которые будут влиять на общее восприятие Анклава жителями пустоши, будут упоминать это воздействие. Выполняя действия, которые понравятся жителям пустоши, ваша общественная поддержка будет расти. Делая то, что им не нравится, вы нанесете ущерб общественной поддержке."
    EEN_tt_21:0 "Разблокирует новый закон об оккупации для распределения воды жаждущим жителям пустоши в обмен на их послушание."
    EEN_tt_22:0 "Разблокирует новый закон об оккупации для очищения пустоши"
    EEN_tt_23:0 "Их ответ, вероятно, зависит от того, насколько хорошо складываются наши трудовые отношения"
    EEN_tt_24:0 "Это укрепит наши трудовые отношения"
    EEN_tt_25:0 "Больше жителей пустоши поддаются воздействию воды зараженной ВРЭ"
    EEN_tt_26:0 "Создайте небольшой форпост для наблюдения за мероприятиями по стерилизации мутантов."
    EEN_tt_27:0 "С открытием большего числа центров распределения воды, чернь с пустоши будет подчиняться!"
    EEN_tt_28:0 "Да, кажется, что Анклав действительно злые ублюдки или что-то в этом роде."
    EEN_tt_29:0 "Выберите это, если играете за Полковника Отэма впервые"
    EEN_tt_30:0 "Выберите это, если играете за Президента Эдема впервые"
    EEN_tt_31:0 "После того, как наши солдаты возьмут под контроль объект, небольшая сила будет его охранять"
    EEN_tt_32:0 "Как только Компания «Коготь» обеспечит безопасность объекта, мы направим солдат для его охраны."
    EEN_tt_33:0 "Наши штурмовые силы останутся на объекте для его безопасности"
    EEN_tt_34:0 "Наша первая партия мутантов-солдат готова!"
    EEN_tt_35:0 "Мы отправим больше солдат для охраны проекта «Чистота»!"
    EEN_tt_36:0 "Даже если они нас выгонят, мы будем готовы отбить свои позиции!"
    EEN_tt_37:0 "Ривет-Сити не смог остановить Анклав своими силами"
    EEN_tt_38:0 "Установите Fountain of Dreams, чтобы получить максимальную пользу от этого контента!"
    EEN_tt_39:0 "Установите Rustbelt Rising, чтобы получить максимальную пользу от этого контента!"
    EEN_tt_40:0 "К нам присоединились выжившие из Космического центра «ВанБюрен»!"
    EEN_tt_41:0 "К нам присоединились выжившие из Роты Гранита!"
    EEN_tt_42:0 "Эти солдаты окажут большую помощь!"
    EEN_tt_43:0 "Разблокирует решения об отправке Братству Стали большего количества мутантов для «лечение»"
    EEN_tt_44:0 "Разблокирует решения по захвату жителей пустошей для создания робомозгов"
    EEN_tt_45:0 "Снижает вероятность того, что жители пустошей узнают правду о наших лечебных клиниках"
    EEN_tt_46:0 "Должен быть установлен Enclave Reborn Redux"
    EEN_tt_47:0 "§0Это увеличит поддержку Отэма"
    EEN_tt_48:0 "§RЭто увеличит поддержку Эдема"
    EEN_tt_49:0 "МакАртур присоединится к нам, когда придет время!"
    EEN_tt_50:0 "Разблокирует решения о приглашении других фракций Анклава присоединиться к нам в нашей борьбе"
    EEN_tt_51:0 "Через 30 дней мы будем воевать с Рэйвен-Рок"
    EEN_tt_52:0 "§RTЭто стало возможным благодаря тому, что мы сохранили МБР Форта Константин"
    EEN_tt_53:0 "§C Сходство Эдема с президентом Грантом дает нам такую ​​возможность"
    EEN_tt_54:0 "§C Сходство Эдема с президентом Ричардсоном дает нам такую ​​возможность"
    EEN_tt_55:0 "§C Сходство Эдема с президентом Джексоном дает нам такую ​​возможность"
    EEN_tt_56:0 "§C Сходство Эдема с президентом Гувером дает нам такую ​​возможность"
    EEN_tt_57:0 "Этот выбор разблокирует новую производственную компанию!"
    EEN_tt_58:0 "Добавляет §RАналитика конфликтов Братства§!, которая даёт ((§Y[BOS.GetFlag]Братство Стали§!) Бонус к атаке против стран §G+2.5%§!), (§Y[BOS.GetFlag]Братство Стали§!) Бонус к защите против стран §G+2.5%§!)"
    EEN_tt_59:0 "Анклав не может просто так по прихоти менять централизацию!"
    EEN_tt_60:0 "§RЭто сделает локализацию в последующих фокусах и событиях бессмысленной, и мы не будем переписывать треть дерева фокусов для поддержки этой возможности. Не жалуйтесь в Discord ECR§!"
    EEN_hate_bos_add_tt:0 "Добавляет §RБоевой опыт против Братства§!, который даёт ((§Y[BOS.GetFlag]Братство Стали§!) Бонус к атаке против стран §G+7.5%§!), (§Y[BOS.GetFlag]Brotherhood of Steel§!) Бонус к защите против стран §G+7.5%§!)"
    EEN_hate_bos_remove_tt:0 "Удаляет §BБоевой опыт против Братства§!, который даёт ((§Y[BOS.GetFlag]Братство Стали§!) Бонус к атаке против стран §G+7.5%§!), (§Y[BOS.GetFlag]Brotherhood of Steel§!) Бонус к защите против стран §G+7.5%§!)"
    EEN_forced_draft_tt:0 "Даже с бонусом за подписку, призыв жителей пустоши вызывает недовольство у неблагодарных."
    EEN_distributed_water_tt:0 "Жаждущий житель пустоши восхвалит любого, кто даст ему бутылку воды"
    EEN_grabbed_factory_tt:0 "Неблагодарный житель пустоши не понимает, что нам нужна эта фабрика ради их безопасности!"
    EEN_grabbed_specimins_tt:0 "Немытый житель пустоши каким-то образом будет возражать против того, чтобы мы забирали отбросов общества!"
    EEN_funded_militias_tt:0 "Ополченцы Пустоши ценят наши некачественные остатки."
    EEN_propaganda_efforts_tt:0 "Это должно изменить мнение некоторых жителей пустоши"
    EEN_militia_tt:0 "Мы призовем жителей пустоши для охраны наших границ"

