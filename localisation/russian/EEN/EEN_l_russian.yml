    EEN_PHEARSON_DESC:0 "Со смертью Кадмуса Кристофер Питерсон был повышен до капитана и принял командование отрядом «Ван Бюрен». Опираясь на преданных ему людей, Питерсон намерен продолжить безжалостное истребление коммунистов, освобождение Америки и восстановление ценностей Старого Мира."
    
    ###leader description###
    EEN_eden_desc:0 "Президент Джон Генри Эдем — истинное воплощение Американской Мечты. Происходя из скромных начал простого суперкомпьютера ZAX, предназначенного для управления мониторинговой станцией, президент Эдем любил свою страну — и не просто потому, что был запрограммирован на это. Эта искренняя любовь к Америке вдохновила его изучать всех великих президентов в истории нации, особенно Авраама Линкольна. Сочетание искреннего патриотизма и холодного, расчётливого разума сделало президента Эдема идеальным человеком… вернее, машиной, чтобы возглавить Анклав после трагического уничтожения Контрольной Станции АНКЛАВ. Он — единственный достойный выбор, способный вернуть Америку с края гибели и спасти человечество от гниения мутации, охватившей мир после войны."
    EEN_autumn_desc:0 "Полковник Отэм никогда не питал иллюзий и не разделял безумных геноцидальных амбиций прежних президентов Анклава, таких как Ричардсон и Эдем. Для него существует лишь одна цель — восстановление Америки любой ценой и любыми средствами. В этом заключается его непоколебимая решимость и истинное служение делу Возрождения нации."

