    ###Production Companies###
    een_black_devil_tesla_pa_design:0 "Производство брони Тесла"
    een_black_devil_tesla_pa_design_desc:0 "Варианты брони Тесла превосходят стандартные доспехи APA, обеспечивая повышенную защиту от энергетического оружия. Однако дополнительное производство требует больших затрат."
