    EEN_autumn_loyalist_trait:0 "Лоялист Отэма"
    EEN_autumn_loyalist_trait_desc:0 "Этот офицер предан полковнику Отэму почти до фанатизма."
    EEN_merc_leader_trait:0 "Тактика Наёмников"
    EEN_merc_leader_trait_desc:0 "Время, проведенное генералом в Компании «Коготь», научило его некоторым приемам наемников, которые могут быть полезны Анклаву."
    EEN_lincoln_trait:0 "Дух Линкольна"
    EEN_genocidal_general_trait:0 "Генерал-геноцидник"
    EEN_genocidal_general_trait_desc:0 "Этот генерал все ещё верит в цель Ричардсона по уничтожению населения пустошей и не боится заявить об этом."
    EEN_night_assault_officer_trait:0 "Эксперт Ночного Боя"
    EEN_robotics_wizard_trait:0 "Виртуоз робототехники"
    EEN_demolitions_genius_trait:0 "Взрывотехник"
    EEN_vertibird_assault_genius_trait:0 "Эксперт по штурму с Винтокрыла"
    EEN_terror_bomber_trait:0 "Бомбардировщик-террорист"
    EEN_terror_bomber_trait_desc:0 "Если бы этот офицер имел свою волю, у нас на земле почти не было бы войск. Вместо этого мы просто проводили бы бомбардировочные удары, пока враг не сложит оружие."
    EEN_airspace_guardian_trait:0 "Специалист по Воздушному Превосходству"
    EEN_invasion_expert_trait:0 "Эксперт по Морским Вторжениям"
    EEN_patrol_expert_trait:0 "Эксперт по Морскому Патрулированию"
    EEN_wastelander_scientist_trait:0 "Ученый из Пустоши"
    EEN_privateer_trait:0 "Опытный капер"
    EEN_bleeding_heart_researcher_trait:0 "Сочувствующий исследователь"
    EEN_bleeding_heart_researcher_trait_desc:0 "Этот учёный больше заботится об этике, чем среднестатистический ученый Анклава..
    EEN_pragmatic_scientist_trait:0 "Хладнокровный Прагматик"
    EEN_pragmatic_scientist_trait_desc:0 "Этот учёный заботится только о результатах, из‑за чего время от времени могут возникать проблемы, но такова цена прогресса."
    EEN_wasteland_slavemaster_trait:0 "Рабовладелец Пустоши"
    EEN_hands_off_economist_trait:0 "Невмешивающийся Экономист"
    EEN_military_industrialist_trait:0 "Военный Индустриалист"
    EEN_agriculture_expert_trait:0 "Министерство Сельского Хозяйства"
    EEN_department_of_energy_trait:0 "Министерство Энергетики"
    EEN_purity_propaganda_trait:0 "Защитник Старых Порядков"
    EEN_surgeon_general_trait:0 "Главный хирург"
    EEN_raider_liason_trait:0 "Связной с рейдерами"
    EEN_raider_liason_trait_desc:0 "Этот администратор служит посредником между нашим большим правительством и различными каперами, которым мы разрешаем работать в и вокруг нашей территории."
    EEN_fbi_director_trait:0 "Директор ФБР"
    EEN_fbi_director_trait_desc:0 "Не все враги государства настолько громкие и очевидные, как рейдеры. Для более скрытных противников нам нужны незаметные охотники."
    EEN_tax_collector_trait:0 "Налоговая служба Пустоши"
    EEN_tax_collector_trait_desc:0 "Раньше говорили, что есть две вещи, которые неизбежны: смерть и налоги. В Анклаве это больше похоже на выбор между двумя."
    EEN_wastelander_outreach_trait:0 "Председатель по связям с обитателями Пустоши"
    EEN_wastelander_outreach_trait_desc:0 "Десятилетия изучения отчетов разведки, а также протоколов допросов дали этому администратору солидное представление о менталитете обитателей Пустоши. С его советами по политике мы сможем достичь наших целей, сохраняя население покорным."
    EEN_army_intelligence_trait:0 "Военная разведка"
    EEN_army_intelligence_trait_desc:0 "Некоторые считают это оксюмороном, но вот мы здесь."
    EEN_wasteland_survival_training_trait:0 "Эксперт по Выживанию в Пустоши"
    EEN_wasteland_survival_training_trait_desc:0 "Этот офицер руководил многими командами за пределами Рэйвен-Рока за последние 30 лет. За это время он многому научился о том, как выживать в Пустоши."
    EEN_directed_assault_specialist_trait:0 "Специалист по Направленным Атакам"
    EEN_directed_assault_specialist_trait_desc:0 "Если этот офицер что-то знает, так это как пробить слабое место в вражеских линиях."
    EEN_improvised_fortification_specialist_trait:0 "Мастер импровизированных фортификаций"
    EEN_improvised_fortification_specialist_trait_desc:0 "This officer is an expert on dugouts, trenches and all other forms of improvised defenses. While it may not be needed while fighting raiders with pipe rifles, you'll be counting your blessings when we find someone with close air support."
    EEN_brotherhood_fighting_expert:0 "Battled the Brotherhood"
    EEN_brotherhood_fighting_expert_desc:0 "Этот офицер является экспертом по окопам, траншеям и всем другим формам импровизированной обороны. Это может и не понадобиться в бою с рейдерами с трубными винтовками, но вы будете благодарить судьбу, когда мы найдем кого-то с поддержкой с воздуха."
    EEN_i_drive_trait:0 "Опытный Водитель"
    een_black_devil_tesla_apa_trait:0 "Производство силовой брони Тесла"
    een_black_devil_tesla_apa_trait_desc:0 "Наше производство силовой брони APA сосредоточено на варианте APA Mk-II Tesla. Этот костюм улучшает стандартную версию APA Mk-II за счёт повышенной защиты от энергетического оружия. Однако это сопровождается увеличением производственных расходов, сложности конструкции и трудностей в ремонте."
    een_hellfire_trait:0 "Производство силовой брони Hellfire"
    een_hellfire_trait_desc:0 "Производство силовой брони APA было переключено на вариант Hellfire. Практически являясь новым дизайном брони, этот костюм обеспечивает повышенную защиту по всем параметрам. Кроме того, он спроектирован для выдерживания экстремальных температур."
    een_duraframe_eyebot_trait:0 "Производство Робо-глаза «Дюрафрейм»"
    een_duraframe_eyebot_trait_desc:0 "Наши стандартные разведывательные робо-глазы постепенно выводятся из эксплуатации в пользу роботов «Дюрафрейм». Усиленная броня, улучшенное вооружение и увеличенная мощность реактивной тяги сделали эти маленькие машины незаменимым инструментом на современном поле боя."
    

    ###Decisions###
    EEN_support_decision_category:0 "Связаться с другими Ячейками"
    EEN_support_decision_category_desc:0 "Ячейки Анклава расположены по всей стране. Многие из них должны были проявиться к настоящему времени, но кто знает, возможно, есть еще те, в которых остались живые члены."
    EEN_navarro_support:0 "Связаться с Наварро"
    EEN_navarro_support_desc:0 "Мы оставили кое-кого, когда направлялись в Столичную Пустошь. Может, они все-таки одолели грязные орды аборигенов?"
    EEN_navarro_support_ww:0 "Связаться с Наварро"
    EEN_navarro_support_ww_desc:0 "Мы оставили кое-кого, когда направлялись в Столичную Пустошь. Может, они все-таки одолели грязные орды аборигенов?"
    EEN_chicago_support:0 "Связаться с Чикаго"
    EEN_chicago_support_desc:0 "Базы данных на Нефтяной Платформе содержали частоты ячейки в Чикаго. Нам следует связаться с ними."
    EEN_virginia_support:0 "Связаться с Уайтспрингом"
    EEN_virginia_support_desc:0 "Бункер Уайтспринг в Западной Вирджинии был предназначен для размещения некоторых из самых важных элит Америки, а также самого близкого, что могло бы быть братом для президента Эдема. Нам следует узнать, что с ними стало."
    EEN_ontario_support:0 "Связаться с Анклавам в Онтарио"
    EEN_ontario_support_desc:0 "Несколько лет назад мы отправили несколько человек, чтобы помочь небольшой ячейке Анклава удержать контроль над регионом в Канаде. Прошло некоторое время с тех пор, как мы получили от них весточку; если они все еще там, они могли бы вернуть долг."
    EEN_contact_vanburen_afb:0 "Связаться с Космическим Центром «Ван Бюрен»"
    EEN_contact_vanburen_afb_desc:0 "Вскоре после того, как президент Эдем отдал приказ о переселении, команда солдат и исследователей была отправлена во Флориду для помощи небольшой группе Анклава. Их целью было восстановление довоенных ракет, предназначенных для отправки людей в космос, на случай если очистка планеты от мутаций окажется невозможной. Связь оборвалась вскоре после их прибытия во Флориду. Надеемся, что они не улетели без нас."
    EEN_bomb_prime:0 "Уничтожить Либерти Прайма"
    EEN_bomb_prime_desc:0 "Довоенный робот, известный как Либерти Прайм, наносит ущерб по всем нашим формациям. Винтокрылы сбиваются, оборонные сооружения разрушаются. Его необходимо уничтожить!"
    EEN_talon_co_jobs_decision_category:0 "TЗадания для Компании «Коготь»"
    EEN_talon_co_jobs_decision_category_desc:0 "Компания «Коготь» с радостью согласилась выполнять миссии для нас в обмен на технологии, ресурсы или оборудование. Хотя они не так умелы или хорошо снаряжены, как наши солдаты, у них есть одно важное качество, которого нет у наших людей - их легко заменить."
    EEN_talon_co_scout_citadel:0 "Разведка Пентагона"
    EEN_talon_co_scout_citadel_desc:0 "Отряд наемников может установить аванпост поблизости от Пентагона. Оттуда они смогут наблюдать за текущими захватчиками и сообщать нам о любых слабостях в их обороне."
    EEN_talon_scout_mount_weather:0 "Разведка у ЭКЦ Маунт-Уэзер"
    EEN_talon_scout_mount_weather_desc:0 "Маунт-Уэзер ЭКЦ (Экстренный Командный Центр) был бункером, не слишком отличающимся от Уайтспринга, который был предназначен для размещения членов правительства Соединенных Штатов после ядерной войны. Хотя это не является бункером, контролируемым Анклавом, это все равно было учреждением Соединённых Штатов некоторой важности. Мы должны отправить Компанию «Коготь», чтобы узнать, что стало с бункером, и можно ли извлечь из него что-то ценное."
    EEN_talon_hold_the_capital:0 "Осмотреть Капитолий"
    EEN_talon_hold_the_capital_desc:0 "Хотя это очень затратно, отправка наемников, чтобы занять Капитолий, может быть оправданной. Там должны быть ценные архивы, которые не были разграблены, и столичный бункер давно находится в аварийном режиме."
    EEN_talon_raid_caravans:0 "Нападение на караваны Пустошей"
    EEN_talon_raid_caravans_desc:0 "Мутантские поселения в Столичной Пустоши все зависят от серии торговых караванов, путешествующих по Пустошам для своего коммерческого оборота и выживания. Компания «Коготь» может направить несколько отрядов, чтобы следить за этими маршрутами и нападать на некоторые из караванов, нанося вред нашим врагам."
    EEN_talon_assault_brotherhood:0 "Штурмовать аванпост Братства"
    EEN_talon_assault_brotherhood_desc:0 "Компания «Коготь» готова бросить нескольких новичков и других нежелательных солдат на аванпост Братства Стали, если мы заплатим им достаточно. Если нам повезет, они могут даже убить пару Рыцарей."
    EEN_distribute_fev_water:0 "Распространение 'Очищенной' Воды"
    EEN_distribute_fev_water_desc:0 "Отправьте винтокрылы через линии наших врагов, чтобы сбросить воду, зараженную измененным вирусом ВРЭ. Мучающийся от жажды мусор пустошей схватит посылку и будет очищен от пустошей."
    EEN_project_purity_decision_category:0 "Проект «Чистота»"
    EEN_project_purity_decision_category_desc:0 "Необходимо предпринять меры для захвата контроля над проектом «Чистота». Теперь нужно выяснить, как это сделать."
    EEN_shock_and_awe_decision:0 "Шок и трепет"
    EEN_shock_and_awe_decision_desc:0 "Планы разработаны, и солдаты проводят учебные упражнения, чтобы подготовиться к атаке на проект «Чистота». День нашей атаки приближается."
    EEN_careful_infiltration_decision:0 "Аккуратное внедрение"
    EEN_careful_infiltration_decision_desc:0 "Наши агенты делают прогресс во внедрении среди персонала проекта «Чистота». Это потребует еще некоторого времени, но скоро мы сможем взять проект под свой контроль."
    EEN_send_talon_co_decision:0 "Отправить Компанию «Коготь»"
    EEN_send_talon_co_decision_desc:0 "Переговоры всё ещё продолжаются, но кажется, что мы сможем отправить значительные силы наёмников Компании «Коготь», чтобы преодолеть оборону поекта «Чистота» и взять его под наш контроль."
    EEN_rescue_ops_decision_category:0 "Операции по спасению в Столичных Пустошах"
    EEN_rescue_ops_decision_category_desc:0 "По всем пустошам все еще есть некоторые отряды, которые не смогут вернуться на базу без помощи. Нам придется рискнуть, чтобы спасти их."
    EEN_deathclaw_science_team_rescue_decision:0 "Спасти экспедицию в Убежище Когтей Смерти"
    EEN_deathclaw_science_team_rescue_decision_desc:0 "Во время разрушения Рэйвен-Рока в Убежище Когтей Смерти была научная команда с значительной вооруженной охраной. Расположенная на высокой вершине и окруженная враждебной дикой природой, нашим людям понадобится винтокрыл для безопасного возвращения домой."
    EEN_dc_ruins_rescue_decision:0 "Спасение в руинах Столичных Пустошей"
    EEN_dc_ruins_rescue_decision_desc:0 "Несколько отрядов, которые сражались с Братством Стали в центре Вашингтона, оказались отрезаны от нашей основной силы и находятся в отчаянной необходимости спасения. Мы должны суметь спасти их, но если мы не будем осторожны, мы можем отправить еще больше наших людей на мясорубку."
    EEN_fort_constantine_outpost_rescue_decision:0 "Спасение аванпоста Форта Константина"
    EEN_fort_constantine_outpost_rescue_decision_desc:0 "Команда, отправленная для наблюдения за Фортом Константином и действиями Изгоя в этой области, предположительно оказалась заперта в подземном бункере после случайного срабатывания блокировки безопасности. Им просто нужно, чтобы кто-то взломал безопасность снаружи, но неизвестно, что еще было сработало, когда они вызвали тревогу."
    EEN_water_decisions_category:0 "Решения по проекту «Чистота»"
    EEN_water_decisions_category_desc:0 "Имея столько чистой воды, нам теперь нужно решить, как её лучше использовать."
    EEN_eden_water_decision:0 "Учредить постоянную клинику по лечению"
    EEN_eden_water_decision_desc:0 "Постоянная клиника лечения будет создана в этом регионе. Этот укрепленный комплекс обеспечит распределение воды населению, а также предотвратит срыв усилий по стерилизации мутантов из-за миграции. За пределами зоны влияния комплекса мы не будем вмешиваться, пока мутанты сами не исчезнут как проблема со временем."
    EEN_eden_water_decision_2:0 "Отчёты клиник по лечению"
    EEN_eden_water_decision_2_desc:0 "Благодаря нашим усилиям по распространению воды и нашим клиникам лечения, мы постепенно приближаемся к цели позднего Президента Ричардсона - очищенной пустоши. Со временем зоны, которые мы оккупируем, будут безопасными для американцев."
    EEN_staff_water_distribution_center:0 "Строительство Центров Распределения Воды"
    EEN_staff_water_distribution_center_desc:0 "Центры распределения воды будут служить центром нашей власти в регионах, которые мы возвращаем из пустоши. Эти укрепленные крепости будут вмещать все, начиная от административных офисов до местных гарнизонов. Высокие стены и развевающийся флаг этого аванпоста закрепят наш контроль над регионом и напомнят обитателям пустоши в какой стране они находятся."
    EEN_american_cities_decision_category:0 "Проект Американских Городов"
    EEN_pittsburgh_decision:0 "Восстановить Питт"
    EEN_pittsburgh_decision_desc:0 "Хотя Питт — это негостеприимное место, даже с почти полностью истреблёнными трогами, нельзя не отметить, что большая часть города всё ещё стоит. С богатой свалкой металлолома для переработки, действующими довоенными кузницами и железнодорожной инфраструктурой, позволяющей перевозить эту добычу на окраины Столичных Пустошей, решение инвестировать в поселение здесь кажется очевидным. Несмотря на то, что токсичная среда серьёзно отпугивает, наши инженеры уверены: при наличии нужных ресурсов мы сможем превратить некоторые здания в герметичные помещения, похожие на убежища. Тогда рисковать заражением будут только рабочие, выходящие из зданий. Но, честно говоря, небольшое воздействие никогда никого не убивало, а замечает ли вообще обитатель Пустоши новую язву?"
    EEN_ronto_decision:0 "Объект перевоспитания в Ронто"
    EEN_ronto_decision_desc:0 "Руины Ронто содержат огромное количество ценных материалов, необходимых для восстановления Америки. К сожалению, эти руины опасны, а зимы здесь суровы. Наши инженеры разработали планы по превращению всего города в лагерь для самых опасных подрывных элементов, которые отказываются принять возвращение Америки. Они уверены, что при нужных доработках В.А.Ш.И.Н.Г.Т.О.Н сможет контролировать объект с минимальным числом персонала, полагаясь на роботизированную охрану и автоматические средства защиты. Заключённые сначала будут упорствовать, но несколько дней голода убедят их выполнять наши нормы по сбору, чтобы получать свои пайки. Возможно, если они соберут достаточно ресурсов, им даже разрешат вернуться в общество."
    EEN_dc_decision:0 "Восстановить Национальную Аллею"
    EEN_dc_decision_desc:0 "В самом сердце руин центра Вашингтона находится Национальная Аллея. Раньше здесь велись одни из самых ожесточённых боёв во всей Столичной Пустоши, но с тех пор, как наши солдаты очистили руины, обстановка здесь в основном спокойная. До взрывов эта территория была центром американского правительства, а также местом расположения множества музеев и памятников прошлым президентам. Как только будет убран мусор и вокруг территории возведут стену, мы вернём этот район к его прежней славе. Национальная Аллея станет пульсирующим сердцем нашей гражданской администрации. Офисы будут открыты заново, территория — ухожена, памятники — восстановлены. Что касается музеев, они пройдут корректировку нашим отделом пропаганды, чтобы обеспечить правильное освещение истории нашего народа для посетителей Национальной Аллеи. Мы не хотим, чтобы у публики возникали неправильные идеи."
    EEN_war_crimes_decision_category:0 "Тактики завтрашнего дня"
    EEN_war_crimes_decision_category_desc:0 "Самые яркие умы Анклава постоянно придумывают новые и инновационные способы ведения войны с мутантами. Эти тактики требуют больших затрат, но приносят фантастические результаты."
    EEN_release_the_trogs_decision:0 "Выпустить Трогов"
    EEN_release_the_trogs_decision_desc:0 "Контейнеры с ящерами, извлеченными из Питта, будут выпущены за линии врага. Хотя они в конечном итоге их истребят, это должно на время прорядить их ряды."
    EEN_grab_super_mutant_subjects_decision:0 "Получить образцы ВРЭ"
    EEN_grab_super_mutant_subjects_decision_desc:0 "Команды будут отправлены на винтокрылах, чтобы забрать обитателей Пустошей из наших центров отбора и доставить их в Убежище 87, где они будут превращены в супер-мутантов для борьбы на нашей стороне!"
    EEN_send_bhs_test_subjects_decision:0 "Собрать подопытных для Б.М.М.А.У."
    EEN_send_bhs_test_subjects_decision_desc:0 "Наши друзья из Американской службы здравоохранения всегда ищут новых испытуемых для своих испытаний попыток излечить мутации. Давайте им поможем."
    EEN_create_robobrains_decision:0 "Собрать подопытных для Робомозгов"
    EEN_create_robobrains_decision_desc:0 "Мы отправим ударные группы на винтокрылах за линию врага, чтобы похитить их мутантское население. Затем их доставят сюда, где роботизированные шасси будут ждать их мозги."
    EEN_public_support_category:0 "Решения по Общественной Поддержке"
    EEN_public_support_category_desc:0 "Есть меры, которые мы можем предпринять, чтобы заручиться поддержкой общественности. Также существуют шаги для повышения нашей боеготовности, но они могут вызвать недовольство среди обычных жителей пустоши."
    EEN_draft_wastelanders_decision:0 "Призвать жителей Пустоши"
    EEN_draft_wastelanders_decision_desc:0 "Мы отправим рекрутеров в поселения для набора жителей Пустоши в ряды нашей армии. Часть средств зарезервирована для выплаты компенсаций семьям, которые возражают против того, чтобы мы забирали их сыновей или отцов, но это всё равно может негативно сказаться на нашей репутации."
    EEN_procure_specimins_decision:0 "Добыть образцы"
    EEN_procure_specimins_decision_desc:0 "Лабораторные халаты нуждаются в большем количестве испытуемых, чем могут предоставить наши тюрьмы. Мы будем скрытно похищать некоторых недовольных и бродяг, которых большинство не должны заметить, но несмотря на все наши усилия быть скрытными, нас могут заметить."
    EEN_distribute_extra_water_decision:0 "Распределить Дополнительную Воду"
    EEN_distribute_extra_water_decision_desc:0 "Мы извлечем воду из наших запасов, чтобы распределить ее среди местного мусора из Пустоши. Несколько хороших фото и слово из уст должны помочь смягчить нашу репутацию."
    EEN_requisition_civy_factory_decision:0 "Реквизировать фабрику"
    EEN_requisition_civy_factory_decision_desc:0 "Гражданская фабрика может лучше служить государству, производя микрофузионные ячейки. Местные жители будут не слишком счастливы, но идет война!"
    EEN_support_militias_decision:0 "Поддержка местного ополчения"
    EEN_support_militias_decision_desc:0 "Пожертвование некоторого захваченного или старого оружия местному ополчению должно напомнить местным жителям, что мы заботимся о их безопасности хотя бы в некоторой степени"
    EEN_spread_propaganda_decision:0 "Распространение Пропаганды"
    EEN_spread_propaganda_decision_desc:0 "Большинство мусора из Пустоши, возможно, не умеют читать, но те, кто умеет, увидят наши плакаты и поймут, что мы определенно хорошие парни, и им стоит делать все, что мы говорим."
    EEN_talon_support_dave:0 "Помощь в Гражданской Войне Дэйва"
    EEN_talon_support_dave_desc:0 "Различные поселения Столичной Пустоши находятся в разгаре гражданской войны за право управлять своими лачугами. Наши стратеги предлагают обеспечить победу мятежного лидера по имени Дэйв. По их оценкам, его правление дестабилизирует поселения и со временем сделает их более восприимчивыми к власти Анклава. Они предлагают направить отряд солдат из Компании «Коготь» для поддержки Дэйва в том, что они называют операцией «Дудочник»."
    EEN_loyalty_lab_assignments_decision:0 "Опасные научные задания"
    EEN_loyalty_lab_assignments_decision_desc:0 "Некоторые учёные явно слишком вдохновлены, чтобы сомневаться в своей поддержке Президента Эдема. К несчастью для Президента, они не попадаут в списки сотрудников. Некоторые из этих учёных будут отправлены на менее безопасную работу."
    EEN_loyalty_officer_demotions_decision:0 "Разжалование офицеров"
    EEN_loyalty_officer_demotions_decision_desc:0 "Хотя полковник Отэм является лидером военных Анклава, он всё ещё подчиняется Президенту. Если у Эдема есть причина понизить офицера в должности, Отэм должен подчиниться. Учитывая слежку в Рэйвен-Роке, у Эдема всегда есть причина."
    EEN_loyalty_inspiring_address_decision:0 "Выступить с вдохновляющей речью"
    EEN_loyalty_inspiring_address_decision_desc:0 "Президент Эдем обратится к своему народу по радио с речью, рассчитанной на патриотический пыл 83,7% слушателей."
    EEN_loyalty_luxury_ration_decision:0 "Роскошные пайки"
    EEN_loyalty_luxury_ration_decision_desc:0 "Раздача роскошных пайков - хороший способ поднять дух и веру в Президента. Пусть едят сладкие пирожки!"
    EEN_loyalty_adjust_duty_assignments_decision:0 "Скорректировать служебные обязанности"
    EEN_loyalty_adjust_duty_assignments_decision_desc:0 "Солдаты, верные полковнику Отэму, получат льготные задания. Менее лояльные будут направлены на уборку туалетов и клеток с когтями смерти."
    EEN_fanum_decision:0 "Налог F.A.N.U.M"
    EEN_fanum_decision_desc:0 "«Налог на фильтрацию и нейтрализацию нечистых материалов», или налог F.A.N.U.M, — это одноразовый сбор, предлагаемый к взиманию с различных общин пустоши на нашей территории. Средства от налога планируется использовать в проекте восстановления нашего города. Однако многие мутанты-американцы вряд ли обрадуются тому, что мы снова залезаем им в карманы."
    EEN_reconnect_decisions_category:0 "Восстановление связи с отделениями Анклава"
    EEN_reconnect_decisions_category_desc:0 "По всей разрушенной территории Соединённых Штатов раскиданы аванпосты Анклава, которые уже много лет существуют самостоятельно. Как только мы приблизимся к их району, нам следует восстановить связь."
    EEN_reconnect_vanburen_decision:0 "Восстановить связь с авиабазой «Ван Бюрен»"
    EEN_reconnect_vanburen_decision_desc:0 "Отряд Анклава на авиабазе «Ван Бюрен» уже много лет витает в облаках. Нам нужно помочь им спуститься на землю."
    EEN_reconnect_ontario_decision:0 "Восстановить связь с Анклавом Онтарио"
    EEN_reconnect_ontario_decision_desc:0 "Анклаву Онтарио пришлось пережить нелегкие несколько десятилетий, но подкрепление уже здесь."
    EEN_reconnect_granite_decision:0 "Восстановить связь с ротой Гранита"
    EEN_reconnect_granite_decision_desc:0 "Их связь с Платформой может быть сомнительной, но нельзя отрицать то, чего добились Гранит и его товарищи на Западе. Пойдём вперёд вместе."

    ###Ideas###
    EEN_raven_rock_science_labs_idea:0 "Лаборатории Рэйвен-Рок"
    EEN_raven_rock_science_labs_idea_desc:0 "В лабораториях Рэйвен-Рок работают некоторые из самых ярких умов Американских Пустошей, которые выходят за рамки пост-ядерной науки. Беспрестанно трудясь, они делают свой вклад в возрождение Америки."
    EEN_new_enclave_idea:0 "Новый Анклав"
    EEN_new_enclave_idea_desc:0 "Падение Платформы вызвало мощную волну потрясений в Анклаве. Офицеры по всей пустоши с трудом удерживали подразделения и продолжали работу по восстановлению Америки. Но впервые за десятилетия будущее опять выглядит светлым. Анклав вернулся — и, возможно, сильнее, чем когда-либо."
    EEN_restoring_raven_rock_idea:0 "Комитет по восстановлению Рэйвен-Рок"
    EEN_restoring_raven_rock_idea_desc:0 "Команда инженеров, сотрудников службы безопасности и гражданских представителей, совместно работающих над преобразованием с наблюдательного поста в полноценный центр власти американского правительства."
    EEN_air_traffic_control_idea:0 "Контроль воздушного движения"
    EEN_air_traffic_control_idea_desc:0 "Команды опытных техников контролируют маршруты полётов и расписания посадок всех задействованных винтокрылов. Это снижает риск аварий и обеспечивает быструю подготовку к повторному вылету."
    EEN_won_purity_idea:0 "Победители Проекта «Чистота»"
    EEN_won_purity_idea_desc:0 "Бойскауты в силовой броне из Братства Стали думали, что смогут отобрать Проект «Чистота» у его законных владельцев. Эта великая победа станет боевым кличем для наших войск."
    EEN_lost_purity_idea:0 "Зализывая наши раны"
    EEN_lost_purity_idea_desc:0 "Проект Чистота стал для нас суровым уроком. Наши люди потрясены, но теперь они знают, как важно сражаться изо всех сил, чтобы защитить наши земли."
    EEN_navarro_scientists_idea:0 "Учёные Наварро"
    EEN_navarro_scientists_idea_desc:0 "Несколько лет назад мы решили в первую очередь спасти научный персонал на Наварро. С тех пор эти мужчины и женщины неустанно трудятся над прорывными открытиями, чтобы вернуть Америку."
    EEN_cloning_trials_idea:0 "Эксперименты по клонированию"
    EEN_cloning_trials_idea_desc:0 "При таком низком числе чистокровных людей по всей Америке нам пришлось прибегнуть к клонированию новых граждан. Эта технология была передовой, но несовершенной ещё до войны, поэтому теперь на её совершенствование потребуется немало усилий."
    EEN_successful_clones_idea:0 "Ограниченное клонирование"
    EEN_successful_clones_idea_desc:0 "Клонирование взрослого человека, способного ходить и говорить, невозможно до тех пор, пока мы не разработаем технологию переноса человеческой психики на новый мозг. Тем не менее, испытания по клонированию показали свою полезность. Клонированные младенцы и, в редких случаях, клоны, используемые в качестве донорских органов, стали настоящим подспорьем для нашего населения."
    EEN_rebuilding_command_idea:0 "Командование по реструктуризации"
    EEN_rebuilding_command_idea_desc:0 "Мы предприняли первые шаги к восстановлению необходимой численности нашего военного командования. Однако потеря многолетнего опыта в корпусе даёт о себе знать: потребуется время, чтобы вернуться к прежним показателям."
    EEN_green_command_idea:0 "Командиры-новички"
    EEN_green_command_idea_desc:0 "Наши новые офицеры занимают должности, к которым они не вполне подготовлены, но отчаянные времена требуют жертв. Им придется быстро учиться."
    EEN_citadel_bos_archives:0 "Архивы Цитадели"
    EEN_citadel_bos_archives_desc:0 "Ценные довоенные данные, извлечённые из давних архивов по всей Столичной Пустоши. Хотя большая часть была уничтожена сопротивлением Братства Стали, всё же осталось много полезной информации, которая будет жизненно важна для наших дальнейших исследований."
    EEN_enclave_police_idea:0 "Полиция Анклава"
    EEN_enclave_police_idea_desc:0 "Не каждый солдат годится для службы на передовой. Солдаты стареют, получают ранения, а некоторые просто решают, что им не нравится выжигать мутантов из их нор. Хотя это сокращает численность наших войск, немногие так же квалифицированы для поддержания порядка, как солдат Анклава."
    EEN_settler_police_idea:0 "Контроль за поселенцами"
    EEN_settler_police_idea_desc:0 "Хотя не все из них в восторге от правления Анклава, мало кто будет заботиться больше о безопасности своих поселений, чем сами жители. Предоставление местным поселенцам полномочий и обучение по поддержанию безопасности и тишины в их домах означает меньше работы для нас."
    EEN_raider_police_idea:0 "Контроль над рейдерами"
    EEN_raider_police_idea_desc:0 "Не каждый рейдер, с которым мы сталкивались в Пустошах, является анархистским хулиганом, слишком глупым, чтобы признать наш авторитет. Некоторые из них видят себя как местных правителей, защищающих свои территории от более страшных угроз в обмен на послушание и налоги. Мы могли бы попробовать дать им шанс."
    EEN_raider_extermination_idea:0 "Кампании по истреблению рейдеров"
    EEN_raider_extermination_idea_desc:0 "Рейдерам нет места на наших землях. Когда территория попадает под наш флаг, разбойники и рейдеры подчиняются или сталкиваются с раскалённой плазмой."
    EEN_raider_dealings_idea:0 "Дела с рейдерами"
    EEN_raider_dealings_idea_desc:0 "Некоторые боссы рейдеров достаточно умны, чтобы понять, что сражаться с нами невыгодно. Мы можем договориться с ними о послушании и, конечно, уплате налогов с их рейдов."
    EEN_raider_resistance_idea:0 "Сопротивление рейдеров"
    EEN_raider_resistance_idea_desc:0 "Некоторые рейдеры на нашей территории, которые когда-то были на нашей службе, теперь вызывают проблемы. Потребуется время, чтобы привести их в порядок."
    EEN_privateers_agency_idea:0 "Агентство частных рейдеров"
    EEN_privateers_agency_idea_desc:0 "Агентство частных рейдеров занимается выдачей лицензий, территориальными претензиями, разрешением споров и налогообложением банд рейдеров, стремящихся устроиться на службу как частные рейдеры Анклава."
    EEN_raider_warfare_idea:0 "Война рейдеров"
    EEN_raider_warfare_idea_desc:0 "Две враждующие банды рейдеров на нашей территории сражаются между собой, из-за чего время от времени страдают мирные жители и имущество."
    EEN_raider_problems_idea:0 "Проблемы с рейдерами"
    EEN_raider_problems_idea_desc:0 "От Гирдершейда до Республики Дэйва, рейдеры полностью пользуются хаосом, вызванным нашим освоением американской почвы. Пока мы не заделаем эти дыры на наших границах и не устраним худшие из банд, наши внутренние усилия будут страдать."
    EEN_disorganized_settlements_idea:0 "Неорганизованные поселения"
    EEN_disorganized_settlements_idea_desc:0 "Многие поселения на нашей территории все еще приспосабливаются к жизни под нашим контролем. Привлечение их всех в наш ряд потребует значительных административных усилий, а также трудовых и материальных ресурсов."
    EEN_settlement_autonomy_idea:0 "Автономные поселения"
    EEN_settlement_autonomy_idea_desc:0 "Поселения жителей Пустоши на нашей территории пользуются относительной степенью автономии. Позволяя сохранять привычный уклад жизни, мы упрощаем интеграцию новых земель, но в то же время это снижает нашу способность эффективно использовать подконтрольные территории."
    EEN_join_or_die_idea:0 "Присоединяйся или умри"
    EEN_join_or_die_idea_desc:0 "Города, которые мы заняли, имеют два выбора: либо полностью присоединиться к восстановлению Америки, либо оказаться в общей могиле. По какой-то странной причине это вызывает у некоторых серьёзное недовольство."
    EEN_trains_and_bridges_idea:0 "Поезда и мосты"
    EEN_trains_and_bridges_idea_desc:0 "У нас есть дела поважнее, чем восстанавливать разваливающиеся шоссе Америки. Пока что железные дороги вполне нас устраивают."
    EEN_cars_and_highways_idea:0 "Автомобили и шоссе"
    EEN_cars_and_highways_idea_desc:0 "Когда-то символом свободы Америки был огромный автомобиль, мчащийся по открытому шоссе. Он вернётся в нашу жизнь при нашем поколении."
    EEN_secure_checkpoints_idea:0 "Контрольно-пропускные пункты"
    EEN_secure_checkpoints_idea_desc:0 "Наши дорожные сети усеяны пунктами контроля безопасности на критических перекрестках. Там сотрудники Анклава проверяют документацию, грузы и отражают случайные атаки. Некоторые считают их излишеством наших ресурсов, но они доказали свою полезность в поддержании дисциплины в различных поселениях."
    EEN_highway_patrol_idea:0 "Патрулирование шоссе"
    EEN_highway_patrol_idea_desc:0 "Артерии нашей нации патрулируются обученными офицерами, предназначенными для обеспечения безопасности дорог и поиска подрывных элементов. Это может быть дорого, но это стоит того."
    EEN_general_infantry_focus_idea:0 "Основной упор на пехоту"
    EEN_general_infantry_focus_idea_desc:0 "Наш упор на набор всё большего числа обычных пехотинцев принес пользу нашим вооружённым силам, однако наши управление и тренировка стали страдать."
    EEN_increased_arms_production_idea:0 "Массовое производство оружия"
    EEN_increased_arms_production_idea_desc:0 "С увеличением армии мы можем снизить стандарты производства, чтобы сосредоточиться на том, чтобы выдать больше оружия в руки нашей армии."
    EEN_powered_infantry_idea:0 "Фокус на Силовой Броне"
    EEN_powered_infantry_idea_desc:0 "Хотя они всё ещё поддерживаются менее бронированными солдатами, солдаты в силовой броне составляют основу нашей армии. Это ограничивает наш выбор и значительно увеличивает время подготовки, но увеличенная огневая мощь оправдывает эти компромиссы."
    EEN_mechanized_infantry_idea:0 "Фокус на бронированный транспорт"
    EEN_mechanized_infantry_desc:0 "Обычная армия пустошных в основном полагается на телеги, запряжённые браминами, и передвижение пешком. Механизированные войска, выигрывающие в скорости и прорезающие линии врага, приносят огромные преимущества, которые оправдывают высокие затраты и трудности обучения этих деревенщин вождению техники."
    EEN_unstable_leadership_idea:0 "Неустойчивое руководство"
    EEN_unstable_leadership_idea_desc:0 "Недавний переворот вызвал цепную реакцию по всему Анклаву. Нужно занять освободившиеся должности, восстановить причиненный ущерб, и наши люди не уверены в будущем. Пройдет время, прежде чем раны заживут, и нам придётся проявить стойкость, чтобы пройти через это."
    EEN_adapting_vehicles_idea:0 "Переоборудованные транспортные средства"
    EEN_adapting_vehicles_idea_desc:0 "Усиленная подвеска для преодоления разбитых дорог, тяжёлые бамперы для сноса блокпостов, укреплённые стекла — всё это адаптации, необходимые, чтобы сделать наши транспортные средства пригодными для войны в пустошах."
    EEN_arms_mass_production_idea:0 "Массовое производство оружия"
    EEN_arms_mass_production_idea_desc:0 "Вооружение масс приведет к снижению качества, но в конце концов, что такое 1 из 10 оружий, которое неисправно, когда противник стоит перед 1,000 оружиями?"
    EEN_scheming_scientists_idea:0 "Коварные учёные"
    EEN_scheming_scientists_idea_desc:0 "Наши научные команды полны крыс. Предатели, которые поддерживали зарекомендовавшего себя как Эдема и по-прежнему активно пытаются подрывать наши усилия в пользу его непрактичных идей. Пока мы не сделаем что-то с этим, наши научные усилия будут затруднены."
    EEN_purged_scientists_idea:0 "Чистка учёных"
    EEN_purged_scientists_idea_desc:0 "Многие из наших учёных оказались предательской сволочью, которая помогала Эдему, во время его свержения. Казни за их преступления после назначения Отэма на пост президента оставили множество научных отделов пустующими."
    EEN_wastelander_scientists_idea:0 "Лучшие умы пустоши"
    EEN_wastelander_scientists_idea_desc:0 "Лучшие и самые одарённые умы Столичной пустоши и её окрестностей начинают слышать о преимуществах Научного отделения Анклава. Качественное оборудование, стабильное энергоснабжение и, конечно, регулярная зарплата. По мере того как к нам приходит всё больше ученых, стремящихся строить будущее вместе с нами, мы должны не забывать тщательно проверять каждого кандидата. В пустошах нет университетов — любой блаженный может надеть халат и заявить, что понимает теоретическую физику."
    EEN_dragged_into_tomorrow_idea:0 "Наука вне правил"
    EEN_dragged_into_tomorrow_idea_desc:0 "Наши учёные пользуются полной свободой. Постоянный приток мутантов для опытов и минимум контроля обеспечат непрерывный прогресс. Что может пойти не так?"
    EEN_command_subroutines_idea:0 "Подпрограммы управления"
    EEN_command_subroutines_idea_desc:0 "Президент Эдем, являясь одним из самых продвинутых образцов довоенной компьютерной техники, несомненно обладает достаточной вычислительной мощностью, чтобы одновременно управлять нашими вооружёнными силами и всей страной."
    EEN_fev_project_purity_idea:0 "Загрязнение ВРЭ"
    EEN_fev_project_purity_idea_desc:0 "Воды Столичной Пустоши чудовищно заражены модифицированным вирусом ВРЭ. Люди умирают сотнями. Если вскоре не принять меры, Столичная Пустошь превратится в кладбище."
    EEN_cure_clinics_idea:0 "Клиники Лечения"
    EEN_cure_clinics_idea_desc:0 "Несколько клиник были организованы для изучения воздействия заражённой ВРЭ воды на жителей пустоши. Пока население полагает, что мы прилагаем все усилия, чтобы излечить их от этой загадочной чумы, на самом деле мы лишь изучаем последствия и пытаемся выявить причины, по которым некоторые мутанты адаптируются и выживают несмотря на вирус."
    EEN_escorted_water_caravans_idea:0 "Караваны с водой под охраной"
    EEN_escorted_water_caravans_idea_desc:0 "Хотя наши караваны с водой требуют больших ресурсов и людских затрат, спорить с их результатами невозможно. Почти в каждом поселении, где они делают остановку, в течение пары недель наблюдается резкое сокращение численности мутантов."
    EEN_rulers_of_dc_idea:0 "Повелители Столичной пустоши"
    EEN_rulers_of_dc_idea_desc:0 "Братство уничтожено, и теперь Анклав — единственная сила, правящая Столичной пустошей."
    EEN_adams_afb_arty_idea:0 "Артиллерийские позиции"
    EEN_adams_afb_arty_idea_desc:0 "Несколько запасных линий обороны с заранее наведёнными артиллерийскими позициями для прикрытия отступлений и контратак сыграют ключевую роль в нашей защите, если враждебные силы когда-нибудь прорвутся через внешние бункеры."
    EEN_hunting_bos_insurgents_idea:0 "Охота на повстанцев Братства Стали"
    EEN_hunting_bos_insurgents_idea_desc:0 "Сброд из Братства всё ещё причиняет проблемы со своих маленьких опорных пунктов по пустошам. Охота на них — дорогостоящая, но необходимая задача."
    EEN_dealing_with_bos_insurgents_idea:0 "Договориться с повстанцами Братства Стали"
    EEN_dealing_with_bos_insurgents_idea_desc:0 "Пока некоторые террористы из Братства будут сражаться до последнего, пока плазменный огонь не расплавит их, многие понимают, что это безнадежно, и их можно убедить сдаться. Тем не менее, это осторожный путь, по которому нам приходится идти."
    EEN_prisoner_experiments_idea:0 "Подопытные заключённые"
    EEN_prisoner_experiments_idea_desc:0 "Террористы, убийцы и даже мелкие преступники будут допущены к отбору нашими научными командами в качестве подопытных. Хотя некоторые из подчинённых нашему правлению могут считать это проблематичным, эти преступники утратили свои права, когда нарушили наши законы."
    EEN_military_governors_idea:0 "Военные губернаторы"
    EEN_military_governors_idea_desc:0 "Пока мы не соберём списки подходящих кандидатов и не проведём выборы, офицерам придётся заниматься административными делами среди гражданского населения, а также командовать своими отрядами. Это не идеальное решение, но лучше, чем позволить врагам сохранить контроль."
    EEN_bos_insurgents_idea:0 "Повстанцы Братства"
    EEN_bos_insurgents_idea_desc:0 "Террористы из Братства Стали просто не знают, когда нужно сдаться. Их руководство уничтожено, их территория под нашим контролем, и большинство их солдат погибло, но они всё равно продолжают бороться. Это будет занозой в нашем боку ещё какое-то время."
    EEN_all_seeing_eyebot_idea:0 "Всевидящий робо-глаз"
    EEN_all_seeing_eyebot_idea_desc:0 "Разведчики робо-глазы прочёсывают пустоши. Мы видим всё, знаем всё, и нашим врагам от этого будет только хуже."
    EEN_vertibird_supply_idea:0 "Снабжение винтокрылами"
    EEN_vertibird_supply_idea_desc:0 "Войска в поле смотрят в небо в ожидании пополнения запасов. Это облегчает снабжение подразделений на больших расстояниях, но, чёрт возьми, как же это пожирает топливо."
    EEN_fob_depots_idea:0 "Склады передовых опорных пунктов"
    EEN_fob_depots_idea_desc:0 "Наличие центральных опорных пунктов, куда наши войска могут обращаться за пополнением запасов, серьёзно снижает расход топлива на снабжение винтокрылами."
    EEN_take_equipment_idea:0 "Забирай то, что пригодится"
    EEN_take_equipment_idea_desc:0 "Некоторые скажут, что таскать у простых людей еду и снаряжение — почти как быть рейдером. Но эти болтуны забывают: мы — закон, а эти мутанты — лишь паразиты, что захватили наши земли без права на них. Здесь — наш дом, и мы не позволим им его грабить."
    EEN_wasteland_supply_idea:0 "Корпус снабжения Пустоши"
    EEN_wasteland_supply_idea_desc:0 "Для задачи осмотра полей сражений и недавно освобождённых территорий на предмет полезного снаряжения был сформирован отдельный дивизион армии. Это значительно сократит наши проблемы с поставками."
    EEN_supply_troubles_idea:0 "Проблемы со снабжением"
    EEN_supply_troubles_idea_desc:0 "Снабжение наших войск на обширных контролируемых территориях — задача не из лёгких, и наши лучшие офицеры уже разрабатывали решения. Но пришлось их устранить за поддержку полковника Отэма... вот мы и остались при своём."
    EEN_robot_factories_idea:0 "Фабрики роботов"
    EEN_robot_factories_idea_desc:0 "Сосредоточившись на производстве роботов, производство другого вооружения пострадает, но зачем армии охранных роботов нужны дополнительные плазменные винтовки?"
    EEN_american_implants_idea:0 "Американские импланты"
    EEN_american_implants_idea_desc:0 "Каждый имплантат — от военного до гражданского — будет включать в себя крайне важный чип ENC-1776. Официально этот чип отвечает за регулирование температуры внутри имплантата, но на самом деле он тонко влияет на мысли пользователя, делая его более американцем и, следовательно, более свободным."
    EEN_deathclaw_augmentations_idea:0 "Аугментации Когтей Смерти"
    EEN_deathclaw_augmentations_idea_desc:0 "Когти Смерти с продвинутой бронёй и оружием? Что может пойти не так?"
    EEN_debugging_mainframe_idea:0 "Отладка главного терминала"
    EEN_debugging_mainframe_idea_desc:0 "Перед отключением база ВВС Адамс отправила в наши компьютерные системы особенно назойливый вирус. На его очистку потребуется время, и в это время пострадают управление и научные исследования."
    EEN_water_backed_currency_idea:0 "Валюта, подкреплённая водой"
    EEN_water_backed_currency_idea_desc:0 "Как и крышки от бутылок, наша валюта обеспечена чистой водой. В отличие от крышек, это обещание даёт не какая-то случайная группа торговцев, а Правительство Соединённых Штатов. Это должно внушать больше доверия."
    EEN_distributing_water_idea:0 "Доставка воды новым жителям"
    EEN_distributing_water_idea_desc:0 "По приказу Главнокомандующего Отэма, экстренные запасы воды распределяются среди гражданских на недавно занятых поселениях. Эта временная мера должна завоевать сердца и умы наших недавно освобождённых граждан."
    EEN_fiat_currency_idea:0 "Фиатная валюта"
    EEN_fiat_currency_idea_desc:0 "Жители Пустоши не привыкли к идее фиатной валюты, но мы позаботимся, чтобы они поняли: доллар стоит доллар, потому что мы так решили."
    EEN_successful_trog_hunts_idea:0 "Успешная охота на Трогов"
    EEN_successful_trog_hunts_idea_desc:0 "Охота на трогов в руинах Питтсбурга проходит успешно. Потери ниже ожидаемых, и мы рассчитываем завершить всю операцию досрочно."
    EEN_rough_trog_hunts_idea:0 "Сложная охота на Трогов"
    EEN_rough_trog_hunts_idea_desc:0 "Охота на трогов в руинах Питтсбурга идёт примерно по плану. Пока мы выдавливаем популяцию трогов, каждый день теряем хороших бойцов. К счастью, конец операции уже виден."
    EEN_horrible_trog_hunts_idea:0 "Ужасная охота на Трогов"
    EEN_horrible_trog_hunts_idea_desc:0 "Охота на трогов в руинах Питтсбурга оказалась настоящей катастрофой. Потери значительно превышают ожидаемые, и кажется, что каждый раз, когда мы прочёсываем территорию, на её месте за ночь появляются новые троги. Пехота прозвала эти руины «мясорубкой», и многие теперь считают назначение туда приговором к смерти. Чем скорее мы закончим эту операцию, тем лучше."
    EEN_deporting_muties_idea:0 "Перемещение мутантов"
    EEN_deporting_muties_idea_desc:0 "Амишские мутанты из Гелассенхайта, хоть и так же отвратительны, как и мутанты в других местах, доказали свою полезность. После переговоров они согласились принять у себя гулей и других ужасных мутантов из наших цивилизованных территорий, переселив их в свои сельские общины."
    EEN_slow_march_north_idea:0 "Медленный марш на Север"
    EEN_slow_march_north_idea_desc:0 "Ведение войны и установление порядка на великом замёрзшем Севере потребуют серьёзного планирования. Многие военные эксперты и исследователи были отозваны с других заданий, но мы уже видим хорошие результаты."
    EEN_strong_public_support_idea:0 "Сильная общественная поддержка"
    EEN_strong_public_support_idea_desc:0 "Среднестатистический житель Пустоши смотрит на Анклав положительно. Согласно недавнему опросу, 7 из 10 опрошенных заявили, что их жизнь улучшилась с тех пор, как Анклав пришёл в их город. Из трёх, кто не согласился, один был гулем — так что они не в счёт."
    EEN_midling_public_support_idea:0 "Средняя общественная поддержка"
    EEN_midling_public_support_idea_desc:0 "Общественное мнение об Анклаве можно охарактеризовать как осторожный оптимизм. Множество критиков осуждают некоторые наши методы, но средний житель Пустоши не парится по поводу «прав гуль» или каких-то предполагаемых военных преступлений. Им нужна холодная вода, тёплый обед и место, где можно спокойно справить нужду за закрытой дверью. Пока мы это обеспечиваем — всё будет нормально."
    EEN_precarious_public_support_idea:0 "Шаткая общественная поддержка"
    EEN_precarious_public_support_idea_desc:0 "Недовольство среди населения растёт. Хотя средний житель Пустоши по-прежнему ограничивается жалобами в своих лачугах, группы сопротивления с каждым днём набирают всё больше сторонников. Если мы не проявим осторожность, могут начаться восстания."
    EEN_crumbling_public_support_idea:0 "Разрушенная общественная поддержка"
    EEN_crumbling_public_support_idea_desc:0 "Вера в Анклав рушится. Лишь немногие истинные приверженцы Американской Мечты остаются с нами. Патрули подвергаются засадам в районах, которые раньше считались безопасными, а рабочие массово покидают оружейные заводы. Нам необходимо принять решительные меры, иначе нас ждёт повторение событий Платформы."
    EEN_wastelander_guinea_pigs_idea:0 "Подопытные крысы Пустоши"
    EEN_wastelander_guinea_pigs_idea_desc:0 "Обманом, покупкой или старым добрым похищением жители Пустоши доставляются в наши лаборатории, где отдают свои жизни на службе науки. Иногда кто-то из них начинает подозревать неладное и ищет пропавших друзей или родственников, но чаще всего им суждено стать очередной подопытной крысой Пустоши."
    EEN_building_capital_idea:0 "Строительство Столицы"
    EEN_building_capital_idea_desc:0 "Народ Анклава слишком долго жил в бункерах, но города Пустоши — не место, которое можно назвать настоящим домом. Нам предстоит построить первый настоящий город с тех пор, как упали бомбы, и, чёрт возьми, это будет тяжёлая работа."
    EEN_city_on_a_hill_idea:0 "Город на Холме"
    EEN_city_on_a_hill_idea_desc:0 "Линкольн, новая столица Соединённых Штатов Америки, — сияющий маяк в мрачной Пустоши. Этот город служит образцом того, что Анклав принесёт каждому настоящему американцу. Линкольн вдохновляет всех в Анклаве трудиться и бороться усерднее, чтобы наши идеалы воплотились от Атлантики до Тихого океана."
    EEN_comms_trouble_idea:0 "Коммуникационные проблемы"
    EEN_comms_trouble_idea_desc:0 "Во время переворота наше коммуникационное оборудование было саботировано, чтобы помешать запросам подкреплений. К счастью, поддержка нам не понадобилась, но теперь нам необходимо отремонтировать оборудование, иначе наши военные операции пострадают."
    EEN_library_of_congress_idea:0 "Библиотека Конгресса"
    EEN_library_of_congress_idea_desc:0 "Благодаря доступу к архивам Библиотеки Конгресса мы смогли восстановить столетия важных документов, произведений литературы и несколько редких практических руководств, считавшихся утраченными во времени."
    EEN_super_mutant_slaves_idea:0 "Рабы Супермутанты"
    EEN_super_mutant_slaves_idea_desc:0 "Достаточно сильные, чтобы заменить пятерых мужчин, и слишком глупые, чтобы перехитрить своих надсмотрщиков — Супермутанты могли бы стать идеальной рабочей силой, если бы не две маленькие проблемы: они достаточно сильны, чтобы убить пятерых человек разом, и слишком тупы, чтобы выполнять приказы."
    EEN_relocating_command_idea:0 "Перемещение Высшего Командования"
    EEN_relocating_command_idea_desc:0 "Пока мы продолжаем восстанавливать Пентагон и постепенно перемещать всё больше подразделений нашего военного командования в это здание, неизбежны задержки в других проектах и пробелы в цепочке командования во время переезда. К счастью, мы уже уничтожили главные угрозы в регионе."
    EEN_rebuilding_city_project_idea:0 "Проект Великого Города"
    EEN_rebuilding_city_project_idea_desc:0 "Очевидно, что мы не в состоянии восстановить полностью разрушенный довоенный город до его прежнего величия. Но если сосредоточить усилия, мы сможем привести в порядок район, который не был сильно повреждён, и который по меркам Пустоши станет настоящим великим городом. Это потребует почти полного сосредоточения наших строительных ресурсов, а также больших временных и материальных затрат, но оно того стоит."
    EEN_water_crisis_1_idea:0 "Покупка Воды"
    EEN_water_crisis_1_idea_desc:0 "Несмотря на почти неограниченный запас воды благодаря Проекту «Чистота», мы исчерпали свои резервы и столкнулись с масштабным кризисом. Чтобы справиться с ситуацией, нам пришлось начать торговлю с водными торговцами за пределами нашей территории, пока мы не восстановим контроль над поставками."
    EEN_water_crisis_2_idea:0 "Экономический застой"
    EEN_water_crisis_2_idea_desc:0 "Несмотря на почти неограниченный запас воды благодаря Проекту «Чистота», мы исчерпали свои резервы и столкнулись с масштабным кризисом. По приказу Главнокомандующего Отэма введены ограничения на забор воды из водных складов, пока правительство регулирует потребление и поставки."
    EEN_talon_scouts_idea:0 "Разведчики «Когтя»"
    EEN_talon_scouts_idea_desc:0 "Бывшие наёмники из Компании «Коготь» были интегрированы в наши вооружённые силы в качестве передовых разведчиков. Их опыт навигации по Пустоши оказался бесценным, однако отсутствие дисциплины у них порой распространяется и на других новобранцев."
    EEN_enclave_remnants_idea:0 "Остатки Анклава"
    EEN_enclave_remnants_idea_desc:0 "Десятилетия назад Американская Мечта едва не погибла вместе с разрушением Буровой Платформой Анклава. Этого не может и не должно повториться. Каждый мужчина, женщина и ребёнок Анклава осознаёт важность нашей миссии. Они готовы пожертвовать всем ради этой благородной цели. Мы восстановим Америку — и сделаем это с самой передовой армией, какую эта нация видела со времён Великой Войны. Но мы должны действовать осторожно. Если мы потерпим неудачу, другого шанса может не быть."
    EEN_bloodied_remnants_idea:0 "Окровавленные остатки"
    EEN_bloodied_remnants_idea_desc:0 "Десятилетия назад Американская Мечта едва не погибла вместе с разрушением Буровой Платформы Анклава. После потери Рэйвен-Рока кажется, что история повторится вновь. Каждый мужчина, женщина и ребёнок оставшегося Анклава осознаёт важность нашей миссии. Авиабаза Адамс не станет ещё одним Наварро. Мы готовы пожертвовать всем, чтобы этого не допустить. Мы восстановим Америку — и сделаем это с самой передовой армией, какую эта нация видела со времён Великой Войны. Враг рано или поздно найдёт нас, и другого шанса у нас не будет, если мы потерпим поражение."
    EEN_super_duper_refugee_camp_idea:0 "Лагерь содержания «Super Duper»"
    EEN_super_duper_refugee_camp_idea_desc:0 "Старый супермаркет «Super Duper Mart», его парковка и прилегающая территория были преобразованы в временный центр содержания для перемещённых лиц и граждан, испытывающих трудности с адаптацией к нашему правлению. Насколько временным будет их пребывание, зависит от того, как быстро эти новые граждане примут Американский образ жизни."
    EEN_rivet_city_labs_idea:0 "Лаборатории Ривет-Сити"
    EEN_rivet_city_labs_idea_desc:0 "Благодаря оборудованию Анклава, экспертным знаниям и, конечно, финансированию, лаборатории в Ривет-Сити достигли высот, о которых их основатели и не мечтали. Хотя в целом они работают автономно, их время от времени призывают поддерживать проекты, выполняемые нашими научными командами."
    EEN_labs_funded_idea:0 "Финансируемые Лаборатории"
    EEN_labs_funded_idea_desc:0 "Благодаря финансированию Анклава наши лаборатории могут работать так, как и положено. Теперь нам не приходится полагаться на пожертвования отдельных лиц или прекращать проекты из-за нехватки крышек."
    EEN_resurgent_enclave_idea:0 "Возрождающийся Анклав"
    EEN_resurgent_enclave_idea_desc:0 "Анклав вернулся — и, скажут некоторые, стал сильнее, чем когда-либо. Проект «Чистота» находится под нашим контролем, рак мутантской симпатии выкорчеван, а вести о нашей победе над Братством Стали разнеслись далеко и широко. Мы продолжим нашу миссию с новым усилием, и скоро эта великая страна вновь оживёт."
    EEN_enclave_leadership_idea:0 "Верховенство Анклава"
    EEN_enclave_leadership_idea_desc:0 "Несмотря на перемены на уровне поселений и в некоторых кабинетных должностях, в глубине души мы остаёмся Анклавом. С нашей военной и технологической мощью, а также практически неограниченными запасами чистой воды от Проекта «Чистота», мы наведём порядок в этих разрушенных Соединённых Штатах любыми необходимыми средствами."
    EEN_americas_mercs_idea:0 "Американские Наёмники"
    EEN_americas_mercs_idea_desc:0 "Компания «Коготь» пользуется полной поддержкой и одобрением Правительства Соединённых Штатов. Хотя это и накладывает дополнительные бюрократические ограничения и правила на наши действия, это того стоит ради всей передовой экипировки и защиты, которые мы получаем. Не говоря уже о постоянном контракте с Анклавом."
    EEN_talon_funding_idea:0 "Финансирование Компании «Коготь»"
    EEN_talon_funding_idea_desc:0 "Мы вновь разрешили Компании «Коготь» принимать заказы от граждан Америки, однако остаёмся их основным работодателем. «Коготь» обеспечивается необходимыми ресурсами и достойной оплатой за помощь нашим вооружённым силам, что даёт нам дополнительное преимущество, мы можем держать их под своим строгим контролем."
    EEN_investigating_talon_co_idea:0 "Инвестиции в Компанию «Коготь»"
    EEN_investigating_talon_co_idea_desc:0 "Тщательное расследование деятельности и управления Компанией «Коготь» требует значительных ресурсов, но оно необходимо, если мы хотим гарантировать их полную покорность."
    EEN_enclave_investigation_idea:0 "Следователи Анклава"
    EEN_enclave_investigation_idea_desc:0 "Анклав направил своих представителей для искоренения коррупции в нашем управлении. Они не оставляют ни одного камня на камне и арестовывают каждого, кого считают нарушителем закона."
    EEN_manifesting_destiny_idea:0 "Проявление Судьбы"
    EEN_manifesting_destiny_idea_desc:0 "В последние годы мы достигли великих свершений. Вашингтон вновь находится под контролем правительства Соединённых Штатов, у нас устойчивая производственная база, а наши вооружённые силы сильнее, чем когда-либо. Сейчас настало время смотреть на Запад."
    EEN_trogs_running_wild_idea:0 "Дикие Троги"
    EEN_trogs_running_wild_idea_desc:0 "Анклав выпустил трогов за наши линии, что наносит огромный урон, пока мы пытаемся взять ситуацию под контроль."
    EEN_out_of_practice_idea:0 "Старые и Неопытные"
    EEN_out_of_practice_idea_desc:0 "Последние тридцать лет мы провели в Рэйвен-Рок, медленно восстанавливая нашу силу. Хотя сейчас мы сильнее, чем три десятилетия назад, мы вынуждены признать серьёзную проблему нашей армии. Наши вооружённые силы состоят либо из пожилых ветеранов, давно вышедших из расцвета сил, либо из молодых солдат, не имевших опыта настоящих боёв, кроме симуляций. Первые шаги наших войск в Пустоши будут шаткими, но со временем наши солдаты смогут адаптироваться."
    EEN_hate_bos_idea:0 "Военный опыт проти Братства"
    EEN_hate_bos_idea_desc:0 "Некоторые из нас помнят сражения с Братством Стали на Западном Побережье много лет назад. Такая архаичная группировка вряд ли сильно изменила свои тактики за это время, и мы можем использовать это в своих интересах."
    EEN_water_distribution_construction_idea:0 "Постройка Центров Распределения Воды"
    EEN_water_distribution_construction_idea_desc:0 "Мы направляем все доступные ресурсы на строительство новых центров водоснабжения. Эти укреплённые комплексы станут оплотом порядка Анклава в этих проклятых Пустошах. Поиск подходящих жителей Пустоши для их обслуживания оказывается не менее трудной задачей, чем само строительство!"
    EEN_reclimation_teams_idea:0 "Команды собирателей"
    EEN_reclimation_teams_idea_desc:0 "Специальные отряды солдат будут направлены на возвращение разграбленного оборудования правительства США из рук наших павших врагов. Лазерная винтовка возрастом в двести лет может и не быть образцом новейших технологий, но она наша, и мы найдём ей применение!"
    EEN_recon_and_infil_idea:0 "Разведка и внедрение"
    EEN_recon_and_infil_idea_desc:0 "Наше разведывательное управление «Сигма» будет уделять первоочередное внимание проникновению в ряды наших врагов и сбору их секретов, а не разрушению их изнутри."
    EEN_sabotage_and_raids_idea:0 "Диверсии и Смелые Налёты"
    EEN_sabotage_and_raids_idea_desc:0 "Наше разведывательное управление «Сигма» будет уделять первоочередное внимание подрыву деятельности наших врагов из-за их линий, а не сбору разведданных."
    EEN_wastelander_study_sigma_idea:0 "Учась у Пустоши"
    EEN_wastelander_study_sigma_idea_desc:0 "Наше изучение обитателей Пустоши значительно облегчило борьбу с врагами как внутри наших границ, так и за их пределами."
    EEN_sigma_funding_1_idea:0 "Финансирование Службы Внутренней Безопасности (SIO)"
    EEN_sigma_funding_1_idea_desc:0 "Разведывательному управлению «Сигма» были выделены дополнительные ресурсы."
    EEN_sigma_funding_2_idea:0 "Финансирование Службы Внутренней Безопасности (SIO)"
    EEN_sigma_funding_2_idea_desc:0 "Разведывательному управлению «Сигма» были выделены дополнительные ресурсы."
    EEN_enclaves_eyes_1_idea:0 "Глаза Анклава"
    EEN_enclaves_eyes_1_idea_desc:0 "Страх перед SIO держит жителей пустошей в узде, даже когда их нет рядом."
    EEN_enclaves_eyes_2_idea:0 "Глаза Анклава"
    EEN_enclaves_eyes_2_idea_desc:0 "Страх перед SIO держит жителей пустошей в узде, даже когда их нет рядом."
    EEN_no_outsiders_law:0 "Только Анклав"
    EEN_no_outsiders_law_desc:0 "Мы не можем позволить мутировавшим жителям пустошей служить в наших вооружённых силах. Это поставит под угрозу весь Анклав, а вместе с ним и будущее Америки!"
    EEN_joint_training_idea:0 "Военные игры"
    EEN_joint_training_idea_desc:0 "Анклав и компания «Коготь» периодически проводят военные игры, а также совместные учения."
    EEN_bear_killer_idea:0 "Уроки от Убийц Медведя"
    EEN_bear_killer_idea_desc:0 "Гранитная рота до сих пор несёт шрамы от столкновений с Новой Калифорнийской Республикой. Они, может, и не убили медведя, но умеют наносить ему боль."
    EEN_bhs_treatments_idea:0 "Медицинские процедуры Службы Здравоохранения США"
    EEN_bhs_treatments_idea_desc:0 "Б.М.М.А.У на протяжении десятилетий пыталась лечить различные недуги и мутации Пустоши. Хотя эти процедуры проводились на не подходящих индивидах, некоторые из них можно применять и к настоящим людям."
    EEN_creating_robobrains_idea:0 "Сборка Робомозгов"
    EEN_creating_robobrains_idea_desc:0 "Робомозги собираются прямо сейчас. Несмотря на значительную нагрузку на наши ресурсы и производство, конечный результат оправдает все затраты."
    EEN_disrupted_military_idea:0 "Нарушения в Армии"
    EEN_disrupted_military_idea_desc:0 "Недавние политически мотивированные переводы кадров серьёзно нарушили боеспособность наших войск."
    EEN_disrupted_research_idea:0 "Нарушения в Исследованиях"
    EEN_disrupted_research_idea_desc:0 "Недавние политически мотивированные переводы кадров серьёзно нарушили работу в департаменте исследований."
    EEN_brotherhood_fighting_history_idea:0 "Учения на конфликтах с Братством"
    EEN_brotherhood_fighting_history_idea_desc:0 "Чикаго и Рэйвен-Рок хранили огромные массивы данных о столкновениях с Братством Стали. Эти записи позволили нам составить исчерпывающее понимание их боевой доктрины. Знание их ходов ещё до того, как они будут сделаны, даст нам решающее преимущество."
    EEN_lost_enclave_idea:0 "Умирающая Нация"
    EEN_lost_enclave_idea_desc:0 "Мы, возможно, выиграли войну с Чикаго, но что это значит? Линкольн и Чикаго — последние крупные очаги чистых человеческих популяций — уничтожены. Без прорыва в науке человечество не переживёт конец следующего века. Но это — лишь малая часть наших проблем. Конфликт оставил нашу армию в руинах, а народ — в отчаянии. Очень вероятно, что мы не выживем в столкновении с крупной нацией Пустоши."
    EEN_home_of_enclave_vp_idea:0 "Home of Americas Vice President"
    EEN_home_of_enclave_vp_idea_dsc:0 "The Vice President of America is also from our territory and maintains a high position. With the president's ear, they are able to influence policy to our benefit."
    EEN_vp_heymann_idea:0 "Вице-президент Хэйманн"
    EEN_vp_heymann_idea_desc:0 "Гарольд Хейманн из Чикаго назначен вице-президентом Соединённых Штатов Америки. Хотя эта должность в основном церемониальная, Хейманн использует своё положение для влияния на политику, а его частые выступления о былом величии Америки вдохновляют наш народ."
    EEN_vp_porter_idea:0 "Вице-президент Портер"
    EEN_vp_porter_idea_desc:0 "Посол Портер из Чикаго назначен вице-президентом Соединённых Штатов Америки. Хотя эта должность в основном церемониальная, Портер быстро освоился в роли и взял на себя руководство отношениями с Пустошью. Этот человек смог бы продать Антирадин даже дикому гулю — и именно своим серебряным языком он убеждает жителей пустоши, что наше правление действительно служит их интересам."
    EEN_vp_hurley_idea:0 "Вице-президент Хёрли"
    EEN_vp_hurley_idea_desc:0 "Рик Хёрли из Онтарио назначен вице-президентом Соединённых Штатов Америки. Хотя эта должность в основном церемониальная, офицер быстро освоился в роли. Через серию речей и интервью он распространяет легенду о способности Анклава Онтарио преодолевать невозможные преграды. Это ещё больше воодушевило нашу и без того преданную армию."
    EEN_vp_pillow_idea:0 "Вице-президент Пиллоу"
    EEN_vp_pillow_idea_desc:0 "Кэдмус Пиллоу из Флориды назначен вице-президентом Соединённых Штатов Америки. Хотя эта должность в основном церемониальная, Пиллоу использует своё положение для влияния на политику в области военных исследований. Больше ресурсов, чем когда-либо прежде, направляется на развитие аэрокосмической инженерии."
    EEN_vp_coburn_idea:0 "Вице-президент Кобарн"
    EEN_vp_coburn_idea_desc:0 "Доктор Роберт Коберн из Флориды назначен вице-президентом Соединённых Штатов Америки. Хотя эта должность в основном церемониальная, доктор Коберн использует своё положение, чтобы вдохновить новое поколение учёных стремиться к невозможному, выбирая карьеру в Научном отделе Анклава. Этот старик заявляет, что будущее уже наступило."
    EEN_vp_peterson_idea:0 "Вице-президент Питерсон"
    EEN_vp_peterson_idea_desc:0 "Кристофер Питерсон из Флориды назначен вице-президентом Соединённых Штатов Америки. Несмотря на то, что эта должность в основном церемониальная, амбициозный офицер не остановился на этом и использовал своё влияние, чтобы встряхнуть политическую сцену Линкольна. Не все перемены были разрушительными — молодой офицер сумел оптимизировать некоторые правительственные процессы. Прощай форма OF-5057."
    EEN_vp_mccarthy_idea:0 "Вице-президент МакКарти"
    EEN_vp_mccarthy_idea_desc:0 "Джош МакКарти из Рэйвен-Рока назначен вице-президентом Соединённых Штатов Америки. Несмотря на то, что эта должность в основном церемониальная, МакКарти использует своё положение для стимулирования инвестиций в оборонную промышленность Америки."
    EEN_vp_granite_idea:0 "Вице-президент Гранит"
    EEN_vp_granite_idea_desc:0 "Дуглас Гранит из Калифорнии назначен вице-президентом Соединённых Штатов Америки. Несмотря на то, что эта должность в основном церемониальная, Гранит отлично справляется с задачей вдохновлять народ нашей нации. Если бы у нас не было Эдема, этот человек, вероятно, мог бы стать достойным президентом."
    EEN_escaped_scientists_idea:0 "Сбежавшие учёные из Рэйвен-Рока"
    EEN_escaped_scientists_idea_desc:0 "Учёные Анклава, избежавшие чисток Отэма в Рэйвен-Роке, были интегрированы в наш Научный отдел. Хотя их образование не дотягивает до уровня выпускников Чикагского Института, их навыки и знания всё же представляют ценность для наших целей."
    EEN_rebuilt_pitt_idea:0 "Промышленная зона Питта"
    EEN_rebuilt_pitt_idea_desc:0 "Благодаря нашим инвестициям, Питт превратился из грязного оружейного завода для рейдеров в современный центр по переработке ресурсов. Теперь он служит сердцем нашей промышленности."
    EEN_rebuilt_ronto_idea:0 "Исправительный Центр в Ронто"
    EEN_rebuilt_ronto_idea_desc:0 "Ресурсы, добываемые сосланными жителями Пустошей из руин Торонто, незначительны. Но совсем не незначительным является эффект, который это оказывает на население. Каждый житель Пустоши боится быть отправленным в Торонто — и именно этот страх держит их в повиновении."
    EEN_rebuilt_dc_idea:0 "Национальная Аллея"
    EEN_rebuilt_dc_idea_desc:0 "Бьющееся сердце нашей нации — Национальная Аллея — кишит бюрократами и туристами. Бюрократы обеспечивают работу нашего государства, а туристы приносят крышки в местную экономику. После посещения наших музеев они возвращаются домой, рассказывая семьям и друзьям о великих свершениях, таких как то, как мы уничтожили коммунистов на Луне, чтобы спасти мир."
    centralization_enclave_president:0 "Указ Президента"
    centralization_enclave_president_desc:0 "Офис Президента возглавляет всю нашу нацию. Наш главный исполнительный лидер ведёт Анклав — а значит, и Америку. Он не устанет, пока мы не достигнем той нации, которую заслуживаем."
    centralization_enclave_military:0 "Военное командование"
    centralization_enclave_military_desc:0 "В обозримом будущем наша территория будет управляться военными. Командующий офицер является верховной властью, а строгая иерархия подчинения неукоснительно соблюдается, при этом гражданские находятся на самом низу цепи командования."
    centralization_enclave_limited_autonomy:0 "Ограниченная Автономия Поселений"
    centralization_enclave_limited_autonomy_desc:0 "Наше Военное Верховное Командование определяет курс нации и формирует политику. Тем не менее, ограниченное повседневное управление доверено местным гражданским властям. Только в случае, если руководство не выполняет квоты или не поддерживает порядок, наше внимание возвращается к этим жалким окраинам."
    centralization_enclave_military_oversight:0 "Военный надзор"
    centralization_enclave_military_oversight_desc:0 "Наше Военное Верховное Командование определяет курс нации и формирует политику. Приказы этого органа спускаются по цепи командования к младшим офицерам, которые управляют территориями через местные штабы."
    centralization_enclave_lincoln:0 "Линкольнские соглашения"
    centralization_enclave_lincoln_desc:0 "Президент руководит всей нашей страной. Однако местные секретари, чиновники и другие должностные лица имеют полную свободу действий. Эта автономия допускается до тех пор, пока их действия не противоречат высшим целям Анклава."
 
    ###Opinion Modifiers###
    EEN_employer_modifier:0 "Сотрудник Анклава"
    EEN_employer_modifier_desc:0 "Эти парни из Анклава могут быть довольно серьёзными и скучными, но они хорошо платят. Что может пойти не так?"
    EEN_employee_modifier:0 "Хорошие сотрудники"
    EEN_employee_modifier_desc:0 "Эти ребята из Компании «Коготь» могут быть не такими профессиональными, как персонал Анклава, но они выполняют свою работу не задавая вопросов."
    EEN_backup_base_modifier:0 "Запасная база"
    EEN_backup_base_modifier_desc:0 "База ВВС Адамс служит нам в качестве запасной базы в этом регионе. Если случится худшее и мы потеряем Рэйвен-Рок, мы перебазируемся сюда."
    EEN_govt_modifier:0 "Правительство США"
    EEN_govt_modifier_desc:0 "Система безопасности базы Адамс признаёт Анклав как правительство США и, следовательно, разрешает их солдатам полный доступ к объекту."

    ###Factions###
    EEN_eastern_command_faction:0 "Восточное командование Анклава"
    EEN_enclave_states_america_faction:0 "Соединённый Штаты Анклава"
    EEN_american_reconstruction_authority:0 "Американское Управление по Восстановлению"

    ###National Focuses###
    EEN_nf_a001:0 "Сокровища Рэйвен-Рока"
    EEN_nf_a001_desc:0 "Прослушивающий пункт Рэйвен-Рок веками лежал в тишине и ожидании. Что же скрывается внутри?"
    EEN_nf_a002:0 "Личность Президента"
    EEN_nf_a002_desc:0 "Веками компьютер Закс в Рэйвен-Роке просматривал архивы. Он погрузился в изучение жизней Президентов, исследуя их поступки и судьбы. Особенно его заинтересовала жизнь и достижения Президента Линкольна."
    EEN_nf_a003:0 "Контакты с Наварро"
    EEN_nf_a003_desc:0 "Веками наблюдая и изучая жизни Президентов, компьютер Закс слушал, пока не прозвучала самая важная новость последних двухсот лет. В 2242 году нефтяная платформа, служившая Контрольной Станцией Анклава, пробудила нечто в Заксе. Он стал Президентом Джоном Генри Эдемом — тем президентом, которого требовал Анклав. И он протянул руку помощи отчаявшимся войскам Анклава на западе."
    EEN_nf_a004:0 "Новый Анклав"
    EEN_nf_a004_desc:0 "Почти тридцать лет Анклав в Рэйвен-Роке укреплялся, даже после того, как база в Наварро погрузилась в молчание. Анклав, сидя тихо в бункере, трудился за его стенами. Теперь силы нового Анклава делают первые шаги во свет Пустошей, готовые спасти Америку."
    EEN_nf_a005:0 "Восстановление Рэйвен-Рока"
    EEN_nf_a005_desc:0 "Рэйвен-Рок изначально не должен был стать опорным пунктом нового американского правительства. Хотя за его стенами и находятся необходимые инструменты, предстоит еще много работы, чтобы он стал резиденцией высшей власти страны."
    EEN_nf_a006:0 "Ввод отсеков в эксплуатацию"
    EEN_nf_a006_desc:0 "Винтокрыльные ангары Рэйвен-Рока почти три десятилетия прибывали в запустении с момента прибытия личного состава. Теперь, когда мы готовимся вернуть Америку, настало время вновь привести эти ангары в боевую готовность."
    EEN_nf_a007:0 "Законсервированные винтокрылы"
    EEN_nf_a007_desc:0 "За исключением нескольких, задействованных в важных миссиях, большинство наших винтокрылов было законсервировано после массового отхода. Нам необходимо вернуть их в строй и вернуть былую мощь."
    EEN_nf_a008:0 "Поврежденные Птички"
    EEN_nf_a008_desc:0 "Многие винтокрылы получили повреждения — либо от случайного огня во время перемещения на восток, либо из-за более жёстких, чем ожидалось, посадок. Наши приоритеты изменились, и теперь нам необходимо их отремонтировать."
    EEN_nf_a009:0 "Контроль воздушного движения"
    EEN_nf_a009_desc:0 "Наши ангары ограничены и не смогут одновременно принять все развернутые винтокрылы. Следует назначить менее боеспособный персонал для управления воздушным движением, чтобы обеспечить быстрый оборот и сократить расход топлива, вызванный круговыми ожиданиями посадки."
    EEN_nf_a010:0 "Лаборатории Рэйвен-Рока"
    EEN_nf_a010_desc:0 "Один из складских ангаров восточного крыла был очищен для новой волны производства. При должных усилиях его можно переоборудовать в временный научный центр, где наши исследователи смогут проводить жизненно важные работы и, возможно, восстановить забытые чертежи."
    EEN_nf_a011:0 "Биологические исследования"
    EEN_nf_a011_desc:0 "Радиация и ВРЭ - смертоносные враги Пустоши, которые могут стать нашими ценными орудиями. Мы обязаны изучить их свойства."
    EEN_nf_a012:0 "Оружейные исследования"
    EEN_nf_a012_desc:0 "Эта Пустошь кишит чудовищами. Когти Смерти, супермутанты и те самые ублюдки из Братства Стали, что помогли уничтожить платформу. Нам предстоит создать новое оружие, чтобы противостоять этим угрозам."
    EEN_nf_a013:0 "Броня «Hellfire»"
    EEN_nf_a013_desc:0 "С момента разрушения платформы броня силовой брони претерпела лишь незначительные улучшения, но существенных изменений не произошло. Сейчас ситуация меняется. Исследователи завершают разработку специализированной жаропрочной силовой брони, получившей кодовое имя «Hellfire». Однако есть серьёзный недостаток — это необходимость передовых материалов и технологий производства, что не позволяет выпускать её в достаточном количестве, чтобы экипировать всю нашу армию в ближайшие годы. Кроме того, для завершения исследований и запуска производства нам придётся перераспределить ресурсы с проекта робо-глаза «Дюрафрейм»."
    EEN_nf_a0131:0 "Робо-глаз «Дюрафрейм»"
    EEN_nf_a0131_desc:0 "Президент Эдем обожает свои маленькие робо-глазики. Годы он оттягивал ресурсы с других проектов, пытаясь усилить эти машины, чтобы они стали чем-то большим, чем просто разведчиками. Теперь проект начинает приносить результаты, но если мы продолжим в том же духе и запустим производство этих роботов, это означит бессрочную приостановку проекта «Hellfire»."
    EEN_nf_a014:0 "Лаборатория брони"
    EEN_nf_a014_desc:0 "После успеха проекта «Hellfire» возникла инициатива выделить целое крыло исследовательских лабораторий исключительно для разработки и совершенствования экипировки, которую наши солдаты носят в полевых условиях."
    EEN_nf_a015:0 "Роботехническая лаборатория"
    EEN_nf_a015_desc:0 "После успеха проекта робо-глаза «Дюрафрейм» в наших научных подразделениях возникла инициатива выделить отдельное крыло лабораторий исключительно для исследований в области робототехники."
    EEN_nf_a016:0 "Ограниченное производство"
    EEN_nf_a016_desc:0 "Хотя Рэйвен-Рок располагает достаточными производственными мощностями для организации поста наблюдения, они не подходят для масштабного производства, необходимого для наведения порядка в Пустошах. Мы должны увеличить производственные мощности, если хотим выполнить нашу миссию."
    EEN_nf_a017:0 "Переоснащение производства"
    EEN_nf_a017_desc:0 "Многие производственные мощности Рэйвен-Рока заняты выпуском продукции, в которой мы почти не нуждаемся, и простаивают, собирая пыль. С приложением усилий мы можем перенастроить их, чтобы значительно усилить наши производственные возможности."
    EEN_nf_a018:0 "Обновление"
    EEN_nf_a018_desc:0 "По всей Пустоши в складах ржавеют груды довоенного оружия и даже силовых доспехов. Возможно, стоит сосредоточить усилия на восстановлении этих устаревших образцов, по крайней мере, до тех пор, пока мы не сможем возобновить массовое производство новой экипировки на прежнем уровне."
    EEN_nf_a019:0 "Избавление от лишнего"
    EEN_nf_a019_desc:0 "Мы должны принять, что сейчас не время для роскоши. Необходимость диктует — телевизоры, личные радиоприёмники и прочая несущественная электроника подлежат утилизации, а их детали должны быть переработаны и направлены на поддержку военных действий."
    EEN_nf_a020:0 "Прикосновение травы"
    EEN_nf_a020_desc:0 "За тридцать лет, прошедших с эвакуации из Наварро, немногие ступали за пределы Рэйвен-Рока. Целое поколение солдат никогда не стояло на твёрдой земле. Пора открыть двери и позволить этим людям почувствовать под ногами траву."
    EEN_nf_a021:0 "Фауна Пустошей"
    EEN_nf_a021_desc:0 "Животные Столичной Пустоши во многом схожи с теми, что обитают на Западном Побережье. Тем не менее, остаются вопросы, на которые предстоит ответить — например, что, чёрт возьми, такое яо гай?"
    EEN_nf_a022:0 "Зачистка гнёзд"
    EEN_nf_a022_desc:0 "Наличие крупного скопления мутировавших существ в нашей зоне контроля — прямой путь к проблемам. Необходимо разработать и внедрить протоколы по зачистке этих гнёзд."
    EEN_nf_a023:0 "Убежище Когтей Смерти"
    EEN_nf_a023_desc:0 "На Западном Побережье мы пытались использовать местных созданий, известных как Когти Смерти, в качестве расходного боевого ресурса — успех был сомнительным. Похоже, что их разновидность обитает и на Восточном Побережье. Нам следует обнаружить их основное место размножения на случай, если мы решим повторить попытку."
    EEN_nf_a024:0 "Управление Когтями Смерти"
    EEN_nf_a024_desc:0 "Проблема наших попыток превратить Когтей Смерти в солдат на Западном Побережье заключалась в том, что эти проклятые твари становились слишком умными. Они действовали в своих интересах, иногда уклонялись от обязанностей и даже в редких случаях нападали на нас. Одна из научных групп считает, что вместо генетических модификаций можно создать устройства, фиксируемые на их головах, чтобы посылать ограниченные команды и, разумеется, предотвращать атаки на наших людей. Самое сложное — надеть эти приборы на головы Когтей Смерти и чинить их, когда они выходят из строя."
    EEN_nf_a025:0 "Форт Баннистер"
    EEN_nf_a025_desc:0 "Расположенный к юго-западу, Форт Баннистер был крупным военным комплексом, сильно пострадавшим в Великую Войну. Неизвестно, сколько подземных сооружений уцелело после разрушений, но, судя по всему, это место стало оплотом местных боевиков. Мы направим разведывательный отряд для оценки ситуации и выработки плана действий против этих захватчиков."
    EEN_nf_a026:0 "Удаление когтей у «Когтя»"
    EEN_nf_a026_desc:0 "Этот некогда великий военный объект захвачен презренными наёмниками, называющими себя Компанией «Коготь». Их следует силой изгнать с территории, а всё незаконно добытое оружие — конфисковать."
    EEN_nf_a027:0 "Пожать руки... или Когти"
    EEN_nf_a027_desc:0 "Хотя Компания «Коготь» — всего лишь организованные наёмники с арсеналом устаревшего оружия, они всё ещё могут пригодиться. Наёмников американская армия использовала с самого основания. Мы могли бы заключить с ними сделку, расплачиваясь нашим старым вооружением в обмен на их услуги. Лучше пусть гибнут они, чем настоящие американцы, верно?"
    EEN_nf_a028:0 "Секреты Баннистера"
    EEN_nf_a028_desc:0 "Хотя большая часть форта была разграблена после Великой Войны, многие из более надёжных дверей нижнего уровня защищали от незваных гостей. Теперь законные наследники секретов форта вернулись."
    EEN_nf_a029:0 "Восстановление Баннистера"
    EEN_nf_a029_desc:0 "В настоящее время Форт Баннистер — не более чем старое, ржавое убежище с несколькими полуразрушенными строениями на поверхности. Однако с помощью надёжной американской инженерии и ресурсов Рэйвен-Рока мы сможем вернуть ему хотя бы тень прежнего величия. Тогда он станет важным командным центром для контроля над регионом."
    EEN_nf_a030:0 "Вакансии"
    EEN_nf_a030_desc:0 "Компания «Коготь» приняла наш контракт и будут выполнять ограниченные операции в обмен на излишки вооружения. Давайте завершим сделку и направим их на обозначенные цели."
    EEN_nf_a031:0 "Вспомогательные силы «Когтя»"
    EEN_nf_a031_desc:0 "Некоторые наёмники из Компании «Коготь» проявили себя как удивительно способные бойцы. В ограниченных совместных операциях офицеры докладывали, что эти наёмники действуют на уровне рядового персонала Анклава. Возможно, пришло время расширить наше соглашение и принять их в качестве полноправных вспомогательных сил. Некоторые даже предлагают присвоить звание почётных граждан самым выдающимся из них."
    EEN_nf_a032:0 "Массивы радиоантенн"
    EEN_nf_a032_desc:0 "Связь Анклава вышла из строя вскоре после войны. По настоящему чуду Эдему удалось связаться с Западным Побережьем, но за последние 30 лет спутник, через который велась связь, перестал работать. Необходимо усилить радиотехническое оборудование Рэйвен-Рока, чтобы обеспечить связь за пределами Столичного Пустоши."
    EEN_nf_a033:0 "Радио Анклава"
    EEN_nf_a033_desc:0 "Президент Эдем намерен использовать восстановленную радиосеть и робо-глаза для трансляции радиопередачи. Он считает, что это поможет смягчить восприятие Анклава среди местного населения и, возможно, вернуть разрозненные остатки в лоно организации."
    EEN_nf_a034:0 "Спутниковые линии связи"
    EEN_nf_a034_desc:0 "Хотя после Великой войны многие спутники рухнули на Землю, в космосе всё ещё дрейфует немало из них. С нашим обновлённым коммуникационным оборудованием следует начать опрос известных спутников, чтобы составить их инвентаризацию и понять, что ещё осталось на орбите."
    EEN_nf_a035:0 "Авиабаза «Адамс»"
    EEN_nf_a035_desc:0 "Прямо через Чесапикский залив находятся остатки важной довоенной авиабазы. Если база Адамса похожа на Военную базу «Сьерра», то автоматизированные системы безопасности, скорее всего, удержали большинство любопытных жителей Пустоши на расстоянии. Следует отправить разведчиков для осмотра объекта."
    EEN_nf_a036:0 "Удаленное Выключение"
    EEN_nf_a036_desc:0 "Дистанционное отключение системы безопасности базы может и спасёт пару жизней, но ущерб нашей электронной инфраструктуре может обойтись дороже."
    EEN_nf_a037:0 "Координированный Удар"
    EEN_nf_a037_desc:0 "Нет ничего лучше старой доброй винтокрыльной штурмовой группы, которая ворвётся и выведет роботов из строя вручную."
    EEN_nf_a038:0 "Разграбление Базы"
    EEN_nf_a038_desc:0 "Хотя база явно не в лучшем состоянии, она не подвергалась разграблению. Мы сможем извлечь отсюда немало полезного оборудования и материалов."
    EEN_nf_a039:0 "Гарнизон"
    EEN_nf_a039_desc:0 "План по базе Адамс выходит далеко за рамки простой поставки припасов. Этот объект предоставляет нам несколько преимуществ, которых нет у Рэйвен-Рок. Однако, поскольку мы отключили их системы безопасности, необходимо продумать замену, чтобы не допустить проникновения грязный сброд с Пустоши."
    EEN_nf_a040:0 "Положитесь на роботов"
    EEN_nf_a040_desc:0 "Просто снова включить роботов"
    EEN_nf_a041:0 "Наёмный гарнизон"
    EEN_nf_a041_desc:0 "Наёмные войска, лучше приспособленные для охранных задач, стали бы идеальным гарнизоном для базы Адамс."
    EEN_nf_a042:0 "Абсолютные защитники"
    EEN_nf_a042_desc:0 "Это место слишком ценно, чтобы охранять его кем попало. Назначьте полный батальон бойцов в силовой броне для защиты базы."
    EEN_nf_a043:0 "Довоенные припасы"
    EEN_nf_a043_desc:0 "Разведывательные группы обнаружили на базе склады с довоенным оборудованием. Хотя многое из него устарело и повреждено, мы всё ещё можем найти ему применение."
    EEN_nf_a044:0 "Отсеки для технического обслуживания"
    EEN_nf_a044_desc:0 "Старые ангары для обслуживания самолётов, возможно, не предназначались для ремонта винтокрылов, но переделать их под это дело не составит особого труда."
    EEN_nf_a045:0 "Разграбить Авиабазу"
    EEN_nf_a045_desc:0 "Взлётные полосы базы Адамс завалены ржавыми самолётами. Запустить их снова — больше хлопот, чем пользы, но они могут послужить хорошим источником запчастей."
    EEN_nf_a046:0 "Починка взлётных полос"
    EEN_nf_a046_desc:0 "Время не пощадило взлётные полосы базы Адамс. Взлётки изрыты дырами и трещинами, которые придётся залатать, прежде чем их можно будет использовать по назначению."
    EEN_nf_a047:0 "Мобильная Передвижная База"
    EEN_nf_a047_desc:0 "На базе Адамс находилась огромная мобильная передвижная база — довоенный прототип. Хотя она и не подвижна, она всё ещё может стать отличной опорной точкой для координации обороны всего района."
    EEN_nf_a048:0 "Смерть сверху"
    EEN_nf_a048_desc:0 "Во время восстановления радиосистем базы Адамс наши техники обнаружили в компьютерах мобильного кранлера неиспытанное соединение с орбитальной оружейной платформой, превосходящей систему Highwater-Trousers, доступ к которой осуществляется через антенну NW-05a. Техники предупреждают, что возможности этой связи ограничены и она не была тщательно протестирована, но времена отчаянные. Если Либерти Прайма не остановить, Братство может выиграть эту войну!"
    EEN_nf_a049:0 "Форт Константин"
    EEN_nf_a049_desc:0 "Прямо к востоку от Рэйвен-Рока находится Форт Константин. Когда-то он был хранилищем ядерного арсенала Капитолия, теперь же стоит заброшенным. За века сенсоры показывали, что форт почти не заселен, а после первых нескольких десятилетий туда редко заходили — разве что одна группа мародёров около 20 лет назад. Этому способствовали дикие гульи и всё ещё действующие роботы-охранники. Искусственный интеллект базы отказывается отвечать на наши коды безопасности — его придётся отключить силой."
    EEN_nf_a050:0 "Последний залп"
    EEN_nf_a050_desc:0 "В шахтах МБР Форта Константин осталась последняя ракета, так и не запущенная. Хотя мегатонные бомбы на складе уже не в рабочем состоянии и предназначены для переработки на уран, эта МБР всё ещё стоит, ожидая команды. Вопрос только в одном — что с ней делать теперь?"
    EEN_nf_a051:0 "Готов к войне"
    EEN_nf_a051_desc:0 "Все ангары для винтокрылов работают без сбоев, производственные мощности резко выросли, а лаборатории функционируют на пределе возможностей. Практически всё, что можно было сделать для подготовки к грядущей войне, уже сделано."
    EEN_nf_a052:0 "Выявить и зачистить"
    EEN_nf_a052_desc:0 "Прежде чем мы сможем использовать Форт Константин, нужно очистить территорию от нежелательной живности. Президент дал добро нашим солдатам провести серию ночных зачисток. Парни уже предвкушают возможность попрактиковаться в стрельбе."
    EEN_nf_a053:0 "Что, «Сигма»?"
    EEN_nf_a053_desc:0 "Отряды Анклава «Сигма» — элита даже по меркам самого Анклава. Эти специализированные бойцы отправляются на самые критические для спасения Америки объекты, зачастую действуя с минимальной поддержкой. Опасность их миссий так велика, что немногие из них доживают до пенсии. Но у нас есть один такой человек на Рэйвен-Роке — и у него есть план, который он хочет лично донести до Президента."
    EEN_nf_a054:0 "Разведка и внедрение"
    EEN_nf_a054_desc:0 "Хотя разведка «Сигма» берёт начало в самых прославленных подразделениях Анклава, её задачи выходят за рамки привычных смертельно опасных миссий жизненно важного значения. Солдаты, отобранные для этой службы, будут применять более тонкие методы для защиты интересов Анклава."
    EEN_nf_a055:0 "Диверсии и Смелые Налёты"
    EEN_nf_a055_desc:0 "Разведка «Сигма» будет набирать лучших из боевой элиты. Плевать на игры в шпионские игры с дураками с пустошей! Другие пусть занимаются тихой работой, а когда в дело вступают агенты «Сигма» — они идут в лоб, с огнём и взрывами."
    EEN_nf_a056:0 "Учиться у жителей Пустоши"
    EEN_nf_a056_desc:0 "Хотя обычные жители Пустоши — безграмотные простачки, они крайне подозрительны и моментально вычисляют чужаков. Если мы похитим пару таких и изучим их, сможем понять их повадки и научиться сливаться с толпой."
    EEN_nf_a057:0 "30 кусков металла"
    EEN_nf_a057_desc:0 "Обычный житель пустоши — жадный и жалкий мерзавец. В своей недальновидности они были готовы даже продать свое имущество за небольшую сумму крышек. Мы можем использовать их природу против них, нужно лишь раздобыть для этого средства."
    EEN_nf_a058:0 "Дополнительное финансирование"
    EEN_nf_a058_desc:0 "Отдел разведки «Сигма» оказался полезнее, чем мы ожидали. По мере расширения территории борьба с подрывными элементами пустоши стала одной из ключевых задач. Сейчас они требуют больше ресурсов — новых агентов и улучшений."
    EEN_nf_a059:0 "Глаза Анклава"
    EEN_nf_a059_desc:0 "С дополнительным финансированием и ресурсами отдел разведки «Сигма» стал неотъемлемой частью наших операций. Как на нашей территории, так и за её пределами, они держат Анклав в курсе угроз, которые нам стоит опасаться — и зачастую просто уничтожают их."
    EEN_nf_b001:0 "Разведка на Проекте «Чистота»"
    EEN_nf_b001_desc:0 "Вода — одна из самых ценных вещей для всего живого. Большинство обывателей Пустоши еле выживают, используя скудные очистители или пьянствуя радиоактивной жижей без разбора. До нас дошли слухи о проекте превращения Мемориала Джефферсона в гигантский очиститель воды, способный обеспечить чистой водой всю Столичную Пустошь. План пока не реализован, но это лишь вопрос времени — и тот, кто контролирует этот очиститель, будет править пустошью."
    EEN_nf_b002:0 "Операция «Чистая Вода»"
    EEN_nf_b002_desc:0 "После ограниченной разведки мы выяснили, что проект ведут какие-то предприимчивые учёные с Пустошей — если их вообще можно так назвать. Это лишь вопрос времени, пока ближайшее Братство Стали не обратит на это внимание. Нам нужно подготовить несколько вариантов захвата контроля над очистителем и его запуска, прежде чем Братство Стали придёт к той же идее."
    EEN_nf_b003:0 "Шок и трепет"
    EEN_nf_b003_desc:0 "Некоторые наши военные предлагают ударить по Проекту «Чистота» быстро и решительно, стараясь при этом минимизировать разрушения. План имеет свои плюсы, но есть и серьёзные минусы. Главный из них — риск серьёзно повредить проект и, возможно, уничтожить научный персонал."
    EEN_nf_b004:0 "Осторожное внедрение"
    EEN_nf_b004_desc:0 "Проект «Чистота» едва держится на подручных материалах и знаниях своей научной команды. Многие наши учёные предлагают действовать медленнее — внедрить в проект своих специалистов и солдат под прикрытием заинтересованных учёных и охранников. Это займет больше времени, но значительно снизит риск повреждений и, возможно, обеспечит сотрудничество большей части персонала."
    EEN_nf_b005:0 "Отправить «Когтей»"
    EEN_nf_b005_desc:0 "Компания «Коготь» не раз штурмовала охраняемые форпосты и расчищала их для своих нанимателей. Возможно, стоит доверить им захват очистителя."
    EEN_nf_b006:0 "Битва за Проект «Чистота»"
    EEN_nf_b006_desc:0 "Мы раскрыли все свои карты, и теперь Братство Стали заметило наше присутствие. Это лишь вопрос времени, когда они предпримут жалкую попытку вернуть очиститель. Но пока мы выжидаем... что-то происходит в Рэйвен-Роке."
    EEN_nf_b007:0 "Отступление и перегруппировка"
    EEN_nf_b007_desc:0 "Штурм Проекта «Чистота» стал серьёзным поражением. Суммарные потери ещё подсчитываются, а ценная техника попала в руки врага. Нам нужно время, чтобы перегруппироваться и подготовить контрнаступление."
    EEN_nf_b008:0 "Использовать наше преимущество"
    EEN_nf_b008_desc:0 "Жалкие попытки Братства Стали захватить американскую собственность провалились. Бесчисленные Рыцари и Паладины пали в атаке, но они ещё не сломлены. Мы должны сохранить инициативу и убрать это препятствие с нашего пути."
    EEN_nf_b009:0 "Приготовиться к Обороне"
    EEN_nf_b009_desc:0 "После недавних внутренних потрясений и поражения у Проекта «Чистота» нам понадобится время, чтобы нанести ответный удар. Мы должны укрепить оборону и быть готовы к следующей атаке."
    EEN_nf_b010:0 "Форпост «Чистота»"
    EEN_nf_b010_desc:0 "Помимо материальной ценности, Проект «Чистота» занимает стратегически важное положение. Расположенный прямо через залив от самого сердца Братства, мы можем превратить его в плацдарм для наступления и стереть их с лица земли."
    EEN_nf_b011:0 "Анклав снова в ударе"
    EEN_nf_b011_desc:0 "Мы готовы как никогда. Пора перейти в наступление на Братство и показать жителям Вашингтона, кто здесь настоящий хозяин этих пустошей."
    EEN_nf_b012:0 "Разобрать завалы"
    EEN_nf_b012_desc:0 "Пентагон лежит в руинах. К сожалению, Братство заставило нас действовать, и когда-то великая американская военная база превратилась в ещё большие развалины. Но, может быть, где-то глубоко под землёй ещё осталость что-нибудь ценное?"
    EEN_nf_b013:0 "В логово Лайонсов"
    EEN_nf_b013_desc:0 "После ожесточённых боёв Пентагон снова в руках правительства США. Со временем мы восстановим его былое величие, но пока — посмотрим, какие «сокровища» оставило нам Братство."
    EEN_nf_b014:0 "Повелители Столичных Пустошей"
    EEN_nf_b014_desc:0 "Братство повержено, и шансов на их восстановление в Столичных Пустошах почти нет. Впервые с тех пор, как упали бомбы более двухсот лет назад, правительство Соединённых Штатов стоит во главе Вашингтона. Теперь мы можем обратить взор на остальных выскочек — как в бывшей столице, так и за её пределами."
    EEN_nf_c001:0 "Наш новый дом"
    EEN_nf_c001_desc:0 "Потеря Рэйвен-Рока — ужасный удар. Бесчисленные жизни и горы ценного оборудования уничтожены. Тем не менее, мы, кто остался в строю, собираемся на базе Адамс. Мы должны превратить это место в наш новый дом — оплот силы и плацдарм для мести."
    EEN_nf_c002:0 "Высшее командование"
    EEN_nf_c002_desc:0 "Многие из высшего военного руководства находились в Рэйвен-Роке, когда база была уничтожена. Тем не менее, Главнокомандующий и несколько его ближайших советников остались живы. Потребуется время, чтобы перестроить структуру командования, но мы уже проходили через это раньше."
    EEN_nf_c003:0 "Восстановить резервную копию"
    EEN_nf_c003_desc:0 "Президент Эдем знал, что Рэйвен-Рок рано или поздно будет уничтожен, хотя и ожидал угрозу изнутри. Несколько месяцев назад он перенёс точную копию своей программы на примитивный компьютер ZAX на базе Адамс. Вернуть его в строй займёт время, тем более что о настоящей природе президента Эдема известно лишь немногим."
    EEN_nf_c004:0 "Массовое отступление"
    EEN_nf_c004_desc:0 "Из-за потери командного центра многие наши подразделения в поле дезорганизованы и не знают, что делать дальше. Отдайте общий приказ о массовом отходе полевых войск к базе Адамс. Быстро и без вопросов."
    EEN_nf_c005:0 "Вызов разрозненных подразделений"
    EEN_nf_c005_desc:0 "Столичные Пустоши усеяны довоенными военными базами и бункерами. Солдаты там не получили приказ о массовом отходе, но теперь им нужно собрать всё, что смогут, и возвращаться домой. Быстро и решительно."
    EEN_nf_c006:0 "Спасательные операции"
    EEN_nf_c006_desc:0 "Часть наших солдат оказалась в окружении — враги из Братства Стали, довоенная охрана или преграды не дают им выйти. Необходимо немедленно отправить спасательные группы для их эвакуации. Каждая жизнь — на вес золота."
    EEN_nf_c007:0 "Разграбление арсеналов"
    EEN_nf_c007_desc:0 "Мы едва начали осмотр складов базы Адамс — там в основном устаревшее оружие. Сейчас нам нужно всё, что можем найти. Вскрывайте ящики и забирайте боеприпасы. Каждая пуля на счету."
    EEN_nf_c008:0 "Мародёрские группы"
    EEN_nf_c008_desc:0 "Иногда отправлялись группы для поиска снаряжения в старых бункерах и складах. С учётом текущих проблем с экипировкой предложено создать официальное подразделение для сбора трофеев с руин и вражеских лагерей после боёв. Выживание требует порядка и дисциплины."
    EEN_nf_c009:0 "Торгуй, если необходимо"
    EEN_nf_c009_desc:0 "Трудно поверить, что до этого дошло, но, возможно, нам придется торговать с местным населением, чтобы получить необходимое нам снаряжение."
    EEN_nf_c010:0 "Укрепить периметр"
    EEN_nf_c010_desc:0 "Автоматические турели и заборы из цепной сетки могли отпугивать случайных мародёров веками, но не остановят целенаправленную штурмовую группу в силовой броне. Нужно установить металлические баррикады, энергетические барьеры и опорные пункты."
    EEN_nf_c011:0 "Развернуть зенитные подразделения"
    EEN_nf_c011_desc:0 "Мы долгое время контролировали небо, но после нашего стремительного отступления, Братство Стали захватило часть наших винтокрылов. Впервые со времён Великой войны нам придётся направить стволы вверх."
    EEN_nf_c012:0 "Артиллерийские позиции"
    EEN_nf_c012_desc:0 "Если случится худшее, нам придётся сражаться на своей земле. Мы обследуем базу и развернём артиллерийские позиции, чтобы прикрыть отступление и нанести максимальные потери врагу."
    EEN_nf_c013:0 "Возвращение Анклава"
    EEN_nf_c013_desc:0 "Последние месяцы были тяжёлыми, но мы наконец оправились от недавних потерь. Хотя опасность ещё не миновала, мы уже не на грани краха. Готовятся планы возвращения в Столичные Пустоши. Во многих из них президентский метрополитен играет ключевую роль. Будут возведены укрепления, чтобы при необходимости отступления, Братство не смогло преследовать нас по пятам."
    EEN_nf_c014:0 "Вторая битва за Столичную Пустошь"
    EEN_nf_c014_desc:0 "Мы снова на ногах, и наши генералы неустанно работают над новыми планами по возвращению контроля над Столичной Пустошью. Вторая битва за Столичную Пустошь, кодовое имя — Операция «Электрик Бугалу», требует лишь нескольких завершающих штрихов, прежде чем мы нанесём ответный удар по Братству Стали."
    EEN_nf_d001:0 "Остатки Стали"
    EEN_nf_d001_desc:0 "Цитадель пала. Братство осталось без дома, руководства и чёткого курса. Тем не менее, их Рыцари продолжают оказывать символическое сопротивление по всей Столичной Пустоши. Нам нужно закрыть эту главу, чтобы перейти к более важным делам."
    EEN_nf_d002:0 "Достать их из под земли"
    EEN_nf_d002_desc:0 "Группы экстерминаторов будут направлены в каждое место, где обнаружена активность Братства. Их солдат будут выслеживать и уничтожать, как кротов, пока не останется ни одного."
    EEN_nf_d003:0 "Награда за голодиски"
    EEN_nf_d003_desc:0 "В Пустошах хватает предприимчивых убийц, которые с радостью решат эту проблему за нас. Распространим слух, что за доказательства убийства Братства — предпочтительно голодиски — будут выплачены солидные крышки."
    EEN_nf_d004:0 "Справедливое обращение"
    EEN_nf_d004_desc:0 "Руководство Братства обмануло много дураков, заставив поверить, что мы — какие-то геноцидальные безумцы. Возможно, если пообещать им справедливое обращение и показать, что мы не так уж плохи, некоторые сложат оружие добровольно — сэкономим боеприпасы, пока не пройдут суды и мы не перейдём к расстрельным командам."
    EEN_nf_d005:0 "Суд над Лайонсами"
    EEN_nf_d005_desc:0 "Неожиданным поворотом событий, оказалась группа новобранцев Братства, которая сдалась и предложила помочь положить конец этой войне. Они связались с остатками Прайда Лайонса и другими элитными бойцами Братства, приведя их прямо к нам в руки. Теперь наступает время выполнить обещание — обеспечить справедливое обращение и честные суды для лидеров этого восстания. Разумеется, справедливость — понятие относительное."
    EEN_nf_d006:0 "Последний оплот"
    EEN_nf_d006_desc:0 "Очень небольшое число повстанцев всё ещё ускользают от нас. Их ряды с каждым днём редеют, и одним последним ударом мы можем загнать их в могилу."
    EEN_nf_d007:0 "Когда пыль осядет"
    EEN_nf_d007_desc:0 "Восстание Братства подавлено, и Столичная Пустошь теперь под нашим контролем. Сейчас не время почивать на лаврах — впереди множество неотложных задач, требующих решения."
    EEN_nf_d008:0 "Рейдеры везде"
    EEN_nf_d008_desc:0 "По всей границе поселения, которые должны быть под нашим контролем, подвергаются осаде рейдерами. Если мы не отреагируем быстро, проблема только усугубится."
    EEN_nf_d009:0 "Укрепить Север"
    EEN_nf_d009_desc:0 "Бандиты из Харрисбурга продолжают устраивать набеги с севера и похищать наших новых граждан. Мы должны укрепить границу, чтобы не допустить их проникновения. Наши люди должны работать на наших фабриках, а не в Питте."
    EEN_nf_d010:0 "Северная гвардия"
    EEN_nf_d010_desc:0 "Укомплектование северных оборонительных сооружений нашими солдатами — это растрата ресурсов. Нам следует призвать жителей пустошей для защиты этой границы."
    EEN_nf_d011:0 "Рейдеры на юге"
    EEN_nf_d011_desc:0 "Жители Столичной Пустоши годами страдают от анархистских рейдеров. Несколько бункеров и застав — это лишь временная мера. Нам нужно уничтожить эту угрозу у её истоков."
    EEN_nf_d012:0 "Спасители Вирджинии"
    EEN_nf_d012_desc:0 "Те несчастные, кому довелось жить под властью рейдеров на юге, встречают нас как своих спасителей. При должных усилиях мы сможем истребить последних рейдеров и завоевать лояльность благодарного населения."
    EEN_nf_d013:0 "Мир и безопасность"
    EEN_nf_d013_desc:0 "Проблема рейдеров решена. Хотя бандиты и мутировавшие твари всё ещё бродят по пустоши, жители наших поселений живут в относительной безопасности."
    EEN_nf_d014:0 "Интриганы учёные"
    EEN_nf_d014_desc:0 "Большинство сотрудников научного отдела и гражданской администрации поверили пропаганде Эдема. Они не понимают реального положения дел и затаили обиду на нас за то, что мы отключили этот тостер."
    EEN_nf_d015:0 "Пойти на уступки"
    EEN_nf_d015_desc:0 "Эдем предоставил многим нашим учёным полную свободу для проведения любых безумных экспериментов. Возможно, вернув им такие же полномочия и поддержку, мы сможем их успокоить."
    EEN_nf_d016:0 "Получение образцов"
    EEN_nf_d016_desc:0 "Увеличение бюджета научного отдела и расширение автономии оказались успешными для привлечения поддержки многих учёных. К сожалению, более жёсткие учёные пуристы остаются непреклонны. Несколько из них запросили образцы выживших с Пустошей для экспериментов по изучению мутаций и испытаниям оружия."
    EEN_nf_d017:0 "Искоренение гнили"
    EEN_nf_d017_desc:0 "Не каким-то учёным решать, как управлять этой страной. Если они пойдут на измену — будут наказаны как любые другие предатели."
    EEN_nf_d018:0 "Набор жителей Пустоши"
    EEN_nf_d018_desc:0 "После массовых казней, заключений и перевода части научного отдела на кормление когтей смерти нам приходится искать таланты за пределами наших стен. На протяжении веков так называемые учёные пытались понять чудеса прошлого и ужасы настоящего. Обещание стерильной лаборатории и современное оборудование может привлечь их на нашу сторону."
    EEN_nf_d019:0 "Реформа научного отдела"
    EEN_nf_d019_desc:0 "Кризис в наших научных командах разрешён, и многое поменялось. Новая структура работает значительно эффективнее прежней, и мы пожнём плоды этих перемен."
    EEN_nf_d020:0 "Столичные поселенцы"
    EEN_nf_d020_desc:0 "Братство Стали не было нашей единственной стороной в битве за Вашингтон. Конфедерация поселений также подняла оружие против нас. После разгрома их армий многие задаются вопросом — что будет дальше."
    EEN_nf_d021:0 "Суд над Мегатонной"
    EEN_nf_d021_desc:0 "Нравится нам это или нет, но придётся признать: многие из этих охранников и мирных жителей поселений — не просто террористы за то, что подняли оружие против нас. Это дураки, защищающие своё жалкое существование, потому что не знали, с кем имеют дело. Их руководство же прекрасно понимало, что творит измену. С ними нужно поступить соответственно."
    EEN_nf_d022:0 "Переход власти"
    EEN_nf_d022_desc:0 "Во многих поселениях Пустоши сохранилось прежнее руководство, как и до конфликта за Столицу. Мэры, шерифы и так называемые 'президенты' сидят в своих кабинетах, ожидая дня, когда солдат в силовой броне ворвётся к ним с оружием. Вместо этого предложим им планы мирной передачи власти."
    EEN_nf_d023:0 "Временные Губернаторы"
    EEN_nf_d023_desc:0 "Пока мы не сможем организовать выборы или гражданскую администрацию, нам придётся довольствоваться офицерами, командующими поселениями. Это не постоянное решение, но на данный момент — самый практичный вариант."
    EEN_nf_d024:0 "Роль правительства"
    EEN_nf_d024_desc:0 "Многие лидеры поселений с неохотой приняли наше господство, остальных мы устранили. Пока мы держим их под пристальным контролем, можем рассчитывать на стабильное управление этими поселениями."
    EEN_nf_d025:0 "Относительное спокойствие"
    EEN_nf_d025_desc:0 "Цивилизованные жители Столичной Пустоши приспособились к нашему правлению. Хотя не всем оно по душе, многие приняли наш подход к управлению."
    EEN_nf_d026:0 "Американская Жажда"
    EEN_nf_d026_desc:0 "Проект «Чистота» станет катализатором возрождения Америки. Наши учёные восстановили повреждения на объекте и разрабатывают планы по оптимальному решению водного кризиса."
    EEN_nf_d027:0 "Награда «Когтя»"
    EEN_nf_d027_desc:0 "Компания «Коготь» зарекомендовала себя как ценные и преданные солдаты в борьбе за восстановление Америки. Многие в наших вооружённых силах считают их боевыми товарищами и поддерживают официальное принятие их в ряды армии, а также предоставление гражданства."
    EEN_nf_d028:0 "Модернизация Баннистера"
    EEN_nf_d028_desc:0 "Форт Баннистер — в наших руках и несмотря на то, что мы уделили ему некоторое внимание, пришло время превратить его в настоящую военную базу для расширения нашей зоны влияния на юго-западе."
    EEN_nf_d029:0 "Вопрос Супермутантов"
    EEN_nf_d029_desc:0 "Супермутанты терроризируют Столичную Пустошь уже десятилетиями. Братство Стали не справилось с этой угрозой, но мы справимся лучше. Мы проникнем в Убежище 87 и уничтожим эту заразу с корнем."
    EEN_nf_d030:0 "Ламплайт"
    EEN_nf_d030_desc:0 "Наши солдаты считали себя готовыми ко всему, спускаясь в пещеры Ламплайта, чтобы прорваться к Убежищу 87. Они не были готовы столкнуться с поселением, полным детей."
    EEN_nf_d031:0 "Восстановление Нации"
    EEN_nf_d031_desc:0 "Америка едва не погибла более 200 лет назад, и снова — 30 лет назад. Теперь, когда Братство повержено, а внутренние угрозы устранены, мы готовы приступить к тяжёлой задаче. Её возрождению."
    EEN_nf_d032:0 "Растущая Армия"
    EEN_nf_d032_desc:0 "Современные войска Анклава отлично подходят для скоординированных ударов по рейдерам и уничтожения чудовищ. Однако патрулирование протяжённых границ и проекция влияния — задача куда более сложная. Необходимы реформы, если мы хотим иметь армию, способную навязать нашу волю."
    EEN_nf_d033:0 "Механизированная пехота"
    EEN_nf_d033_desc:0 "Среднестатистический житель Пустоши за всю жизнь не увидит ни одного работающего автомобиля. Представьте себе шок, когда целая армада бронированных машин и танков раздавит этот мусор."
    EEN_nf_d034:0 "Зачем адаптироваться?"
    EEN_nf_d034_desc:0 "Солдат в силовой броне остаётся вершиной военного дела уже более 200 лет. Хотя нам ещё долго не хватит ресурсов, чтобы экипировать каждого бойца силовой бронёй, именно они должны нести тяжесть нашей армии."
    EEN_nf_d035:0 "Генерал пехоты"
    EEN_nf_d035_desc:0 "В одной из величайших войн XX века Америка одержала победу над мощными врагами. Не силовой бронёй и не лазерными винтовками — а фермерами, учителями и отцами, вооружёнными обычными винтовками и готовыми сражаться за свою страну. Мы продолжим использовать силовую броню и винтокрылы, но основой новой Американской Армии должен стать скромный солдат Пустоши."
    EEN_nf_d036:0 "Автозавод"
    EEN_nf_d036_desc:0 "Америка усеяна сотнями заброшенных автозаводов, когда-то воплощавших мечту о машине в каждом гараже. Мы сосредоточимся на восстановлении заводов под нашим контролем и заставим их выпускать машины войны."
    EEN_nf_d037:0 "Поиск баз"
    EEN_nf_d037_desc:0 "По всей Пустоши разбросаны охраняемые бункеры, заброшенные склады и забытые грузовики с силовой бронёй, предназначенной для экипировки нашей армии. Многие из этих костюмов устарели по нашим меркам, но всё ещё превосходят возможности большинства выскочек из пустоши. Захват этих запасов и оснащение ими рядовых солдат — временное, но жизнеспособное решение."
    EEN_nf_d038:0 "Вербовочные Центры"
    EEN_nf_d038_desc:0 "Среднестатистический житель Пустоши знает только жизнь в страданиях и смерти. Организация центров вербовки с обещаниями триумфа и славы в крупных поселениях под нашим контролем должна обеспечить нам достаточный поток рекрутов для пополнения рядов."
    EEN_nf_d039:0 "Адаптация Транспорта"
    EEN_nf_d039_desc:0 "Пустошь несёт множество известных и скрытых угроз для автомобильной техники. Если мы направим наших лучших конструкторов на эту задачу и внимательно учтём опыт бойцов, мы сможем адаптировать наши машины, чтобы они лучше справлялись с вызовами современных войн."
    EEN_nf_d040:0 "Поиск Архивов"
    EEN_nf_d040_desc:0 "Много передовых технологий было утрачено в Великой войне и под гнётом времени. Если мы отыщем те немногие объекты, о которых известно, возможно, сможем найти способы лучше производить силовую броню или даже усовершенствовать имеющуюся. Говорят, в Западной Вирджинии когда-то добывали нечто под названием «Ультрацит»..."
    EEN_nf_d041:0 "Вооружение для масс"
    EEN_nf_d041_desc:0 "Что толку от солдат в форме, если в руках у них лишь заострённая палка? Мы отправим тех, кто не хочет или не может сражаться, на заводы — пусть производят оружие, которое задавит сопротивление отбросов с Пустошей."
    EEN_nf_d042:0 "Армия Новой Америки"
    EEN_nf_d042_desc:0 "Американская армия когда-то была самой мощной силой, которую видел мир. Сейчас мы далеки от тех времён, но, скорее всего, остаёмся самой сильной армией. Нет никаких сомнений, что эти идиоты на Западе до сих пор не иссякли."
    EEN_nf_d043:0 "Крышки или Доллары?"
    EEN_nf_d043_desc:0 "Довоенная экономика держалась на всесильном долларе — бумажном символе ценности, которым теперь многие пустошники лишь вытирают задницу. Некоторые наши администраторы настаивают на возвращении к старым временам, но другие считают, что простая бутылочная крышка лучше подходит для обращения среди нынешнего населения и сторонних наблюдателей."
    EEN_nf_d044:0 "Федеральные крышечных прессы"
    EEN_nf_d044_desc:0 "Если мы собираемся поддерживать экономику на бутылочных крышках — делать это будем по-настоящему. Захватим прессы на заброшенных заводах по розливу и пустим их в дело."
    EEN_nf_d045:0 "Подкреплено чем?"
    EEN_nf_d045_desc:0 "Сотни лет до войны доллар обеспечивался золотом — редким и ценным ресурсом. Со временем от этого отказались, заменив его простой верой в правительство. Сейчас нам предстоит провести исследования, чтобы понять, как правильно управлять нашей валютой."
    EEN_nf_d046:0 "Свободная коммерция?"
    EEN_nf_d046_desc:0 "После Великой войны Анклав работал по плановой экономике. Руководство решало, что производить, сколько и из чего. Но теперь, когда мы выросли из военной структуры в полноценное государство, настало время серьёзно переосмыслить, как мы управляем торговлей."
    EEN_nf_d047:0 "Свободное предпринимательство"
    EEN_nf_d047_desc:0 "Америка была одной из величайших наций в истории, потому что верила в систему свободного предпринимательства. Деньги решали всё, а бизнес — это борьба за максимум выгоды. Единственное, что этим компаниям нужно — вовремя платить налоги."
    EEN_nf_d048:0 "Национализация индустрии"
    EEN_nf_d048_desc:0 "Полная плановая экономика в таком масштабе, на котором мы теперь работаем, — это утопия. Но ключевые отрасли, вроде инфраструктуры и производства оружия, должны оставаться под контролем правительства. Мы просто не можем позволить, чтобы такую власть держал какой-то случайный богатый торговец."
    EEN_nf_d049:0 "Экономика"
    EEN_nf_d049_desc:0 "Мы восстановили американскую экономику. Фабрики производят товары и снабжают страну валютой. В Америку вернулось процветание, и дальше будет только лучше."
    EEN_nf_d050:0 "Правление Пустошью"
    EEN_nf_d050_desc:0 "Пустошь слишком огромна, чтобы мы могли лично контролировать каждое поселение. Нам придётся решить, как управлять нашей великой нацией, прежде чем мы разрастёмся слишком сильно и сами же утонем в внутренних проблемах."
    EEN_nf_d051:0 "Легкая Рука"
    EEN_nf_d051_desc:0 "Нам некогда разбираться с мелкими проблемами какой-то захудалой деревушки посреди пустоши. Местные дела будут решать местные лидеры, которые подчиняются федеральному правительству. Иногда это будет создавать проблемы — но мы быстро покажем пример тем, кто решит устроить бунт."
    EEN_nf_d052:0 "Железный Кулак"
    EEN_nf_d052_desc:0 "Почему, чёрт возьми, мы должны позволять каким-то случайным деспотам править своими маленькими королевствами на американской земле? Эти люди будут управлять своими землями ровно так, как мы прикажем — или их сметут, словно пыль с пола."
    EEN_nf_d053:0 "Разобраться с Рейдерами"
    EEN_nf_d053_desc:0 "Рейдеры — проблема пустоши с самого дня взрывов. Жестокие маньяки, что бродят по земле и карают слабых. Нам нужно решить, как с ними разобраться."
    EEN_nf_d054:0 "Расправиться с ними"
    EEN_nf_d054_desc:0 "Все рейдеры, осмелившиеся ступить на американскую землю, встретят плазму. Для них здесь нет места. Воровство у населения — это прерогатива правительства."
    EEN_nf_d055:0 "Договориться с ними"
    EEN_nf_d055_desc:0 "Не каждый рейдер — безумный маньяк, жаждущий насилия и пыток. Некоторые даже поддерживают порядок на своей территории. С такими разумными бандитами можно вести переговоры и, возможно, использовать их против проблемных элементов за пределами наших границ."
    EEN_nf_d056:0 "Закон и Порядок"
    EEN_nf_d056_desc:0 "Общество держится на верховенстве закона. Введение простого свода правил — важный шаг на пути к цивилизации в пустошах. Пока что — только базовые законы, а о Законе о Правах можно подумать потом."
    EEN_nf_d057:0 "Приоритеты перестройки"
    EEN_nf_d057_desc:0 "Америка усыпана руинами и свалками. Даже простые дороги, что раньше связывали страну как артерии, превратились в жалкие тропы. Мы не можем восстановить всё — на чём нам сосредоточиться?"
    EEN_nf_d058:0 "Поезда и Мосты"
    EEN_nf_d058_desc:0 "Целая сеть дорог и шоссе сейчас не нужна. Поезда связывали эту великую нацию и справлялись с задачей веками."
    EEN_nf_d059:0 "Автомобили и Шоссе"
    EEN_nf_d059_desc:0 "Мы не восстановим каждое шоссе и просёлок, но нужно с чего-то начинать, если хотим вернуть эту страну к жизни. Полагаться только на старые железнодорожные пути — недостаточно."
    EEN_nf_d060:0 "Контрольно-пропускные пункты"
    EEN_nf_d060_desc:0 "Наша железнодорожная сеть будет усеяна военными КПП, задачей которых станет контроль путей и устранение угроз. Это также повысит безопасность наших территорий от внешних врагов."
    EEN_nf_d061:0 "Патруль на Шоссе"
    EEN_nf_d061_desc:0 "Силовики будут патрулировать наши шоссе, высматривая нарушителей и врагов. Это требует ресурсов, но именно так мы удержим дороги под контролем и не дадим пустошникам выйти из-под власти."
    EEN_nf_d062:0 "Военно-промышленный Комплекс"
    EEN_nf_d062_desc:0 "Перед нами стоит великая задача — вернуть Америку. Военная мощь должна быть центром нашей промышленности."
    EEN_nf_d063:0 "Потребительская промышленность"
    EEN_nf_d063_desc:0 "Какой смысл восстанавливать Америку, если средний гражданин всё ещё ест со ржавой вилки, которой уже двести лет? Американский потребитель — вот что движет экономикой. Наши люди заслуживают роскоши, которую не видели с конца войны — работающих тостеров и подобных мелочей."
    EEN_nf_d064:0 "Проект Американских Городов"
    EEN_nf_d064_desc:0 "Многие великие американские города были построены на века и кое-как стоят спустя 200 лет после Великой Войны. Вернуть им былое величие — дело десятилетий тяжёлого труда, но мы можем начать с ремонта тех частей, что наши люди смогут использовать уже сейчас."
    EEN_nf_d065:0 "Мы вернулись"
    EEN_nf_d065_desc:0 "Покидая Наварро, многие солдаты Анклава думали: всё кончено. Америка мертва. Сегодня мы — нация с мощной армией, процветающей экономикой и крепкой промышленностью. Мы вернулись — и как!"
    EEN_nf_d066:0 "Побережье Делавэра"
    EEN_nf_d066_desc:0 "Побережье Делавэра заполонили рыбаки и торговцы, отказывающиеся подчиняться американским властям. Мы это исправим."
    EEN_nf_d067:0 "Говорить на их языке"
    EEN_nf_d067_desc:0 "Торговцы Дувра могли и повоевать — но в конце концов они бизнесмены, а война — плохой бизнес. Работая с ними над интеграцией в американскую экономику, мы обеспечим их лояльность."
    EEN_nf_d068:0 "Военно-морская база Отэма"
    EEN_nf_d068_desc:0 "Побережье Делавэра усеяно старыми верфями и затонувшими кораблями. Мы разберём всё, что сможем, и построим настоящую военно-морскую базу."
    EEN_nf_d069:0 "Настоящий Флот"
    EEN_nf_d069_desc:0 "Долгие десятилетия, проведённые в развалинах бункеров на материке, сделали флот почти ненужным. Теперь у нас есть побережья для защиты и пляжи для штурма. Пора наконец создать настоящий флот и назначить людей, которые им будут командовать."
    EEN_nf_d070:0 "Каменная банда"
    EEN_nf_d070_desc:0 "Прямо на западе от нас — странная секта религиозных фанатиков, поклоняющихся... камням. Они милитаризованы и враждебны. С этой Церковью Роки не договориться — её нужно уничтожить."
    EEN_nf_d071:0 "В Питт"
    EEN_nf_d071_desc:0 "Когда-то великий промышленный центр Питтсбург превратился в радиоактивное рабовладельческое государство, известное как Питт. Забавно, что управляет им бывший солдат Братства Стали, считающий себя королём. Уговорить его подчиниться — задача не из лёгких."
    EEN_nf_d072:0 "Зачистка Трогов"
    EEN_nf_d072_desc:0 "Как будто армии рейдеров было мало, прямо за пределами бывших владений Ашура роятся орды мутантировавших тварей, безнадёжно изуродованных радиацией. Эти троги должны быть истреблены, если мы хотим когда-нибудь использовать ресурсы Питта."
    EEN_nf_d073:0 "Магниты?"
    EEN_nf_d073_desc:0 "Какого чёрта наши патрули гибнут от каких-то странных ублюдков с магнитами? Их нужно вычистить, пока другие отбросы Пустоши не узнали, что мощный магнит способен вывести из строя многомиллионный силовой доспех."
    EEN_nf_d074:0 "Покончить с ними"
    EEN_nf_d074_desc:0 "Ублюдки из Церкви Рока и культа магнитов потерпели поражение. Необходимо сделать несколько человек, не желающие подчиняться, наглядным примером, и после этого население должно успокоиться."
    EEN_nf_d075:0 "Будушее Питта"
    EEN_nf_d075_desc:0 "Рабы Питта освобождены, а троги почти полностью истреблены. Теперь нам предстоит решить вопрос о будущем города."
    EEN_nf_d076:0 "Северные бандиты"
    EEN_nf_d076_desc:0 "Бандиты из Гаррисбурга были проблемой, которую мы с радостью игнорировали, пока восстанавливались после войны с Братством. Теперь нам нужно уничтожить эту банду."
    EEN_nf_d077:0 "Люди из Джонстауна"
    EEN_nf_d077_desc:0 "Джонстаунцы? Джонстане? Люди из Джонстауна — простые фермеры, которые десятилетиями жили в тени бандитов и сектантов. Несмотря на то, что мы расправились с этими угрозами, они упорно не хотят отказываться от своей автономии. Пора показать им силу."
    EEN_nf_d078:0 "Приносящие мир"
    EEN_nf_d078_desc:0 "Жители Харрисбурга и Джонстауна наконец начинают понимать — старые времена остались в прошлом. Рабство и дань с урожая — это прошлое. Теперь они американцы и им придётся принять всю тяжесть и величие этого статуса."
    EEN_nf_d079:0 "Амишские Мутанты?"
    EEN_nf_d079_desc:0 "Обычно супермутанты — это жестокие монстры, несущиеся по пустошам, убивающие и грабящие хуже, чем даже самые безумные рейдеры. Каким-то образом группа из них поселилась среди местных амишей и создала своего рода коммуну. Коммунизм неприемлем, особенно мутантский примативистский коммунизм."
    EEN_nf_d080:0 "Добро пожаловать в 2200-е"
    EEN_nf_d080_desc:0 "В исходе, который никого не удивил, примитивные фермеры почти не оказали сопротивления продвинутым солдатам в силовой броне. Амиши неохотно признают нашу власть — пусть и не заставим их пользоваться лампочками, но уважать нашу власть они будут."
    EEN_nf_d081:0 "Северный Рубеж"
    EEN_nf_d081_desc:0 "Жестокие мародёры, безумные роботы и толпы несостоявшихся рыцарей — лишь часть угроз и выскочек на великом Севере. Этот край пока не в центре внимания, но там всё равно полно американцев, которым нужен свет нашей цивилизации — даже если он приходит с огнём и сталью."
    EEN_nf_d082:0 "Так называемые «Изгои»"
    EEN_nf_d082_desc:0 "Братство Стали, с которым мы сражались, даже не было самым радикальным крылом их ордена. Отщепенцы засели в руинах южного Вашингтона — с ними тоже придётся разобраться."
    EEN_nf_d083:0 "Чашка кофе Джо"
    EEN_nf_d083_desc:0 "Мародёры в руинах южного Вашингтона считают себя вне досягаемости американской власти. Пора напомнить им, что нам не нужно лазить по развалинам, чтобы добраться до них."
    EEN_nf_d084:0 "Не ешьте людей!"
    EEN_nf_d084_desc:0 "Наши разведчики думали, что нашли настоящий остаток великого американского общества — землю цивилизации и поклонения тем ценностям, что сделали Америку великой. До тех пор, пока не выяснилось, что эти люди — каннибалы. Пора научить этих косплееров на американцев, что есть людей — плохо."
    EEN_nf_d085:0 "Цивилизовывание Юга"
    EEN_nf_d085_desc:0 "Болота к югу от Столичной Пустоши — дом не только для гигантских комаров, но и для мутировавших туземцев, сектантов и партизан. Наша обязанность — приручить этот кусок болота и вернуть ему цивилизацию."
    EEN_nf_d086:0 "Явное предначертание"
    EEN_nf_d086_desc:0 "С обеспеченным тылом у нас есть прочная база людей для запуска военной машины, которая наконец объединит Америку. Заводите винтокрылы и запасайтесь микроядерными батареями — время пришло."
    EEN_nf_d087:0 "Ошибка размером с Мегатонну"
    EEN_nf_d087_desc:0 "Как-то так вышло, что 200 лет назад кому-то в голову пришло, что жить рядом с неразорвавшейся ядерной бомбой — отличная идея. Никто тогда и не усомнился. Похоже, теперь это наша головная боль."
    EEN_nf_d088:0 "Общины Кентербери"
    EEN_nf_d088_desc:0 "Поселение, известное как Община Кентербери использовало своё стратегическое расположение, чтобы стать торговым центром в Столичных Пустошах и дальше. Знаете, что это значит? Они задолжали кучу налогов — и мы их заберём."
    EEN_nf_d089:0 "Чей Тауэр?"
    EEN_nf_d089_desc:0 "Тенпенни-Тауэр когда-то был убежищем американской элиты. За последние годы он превратился в дом для элиты Столичных Пустошей. Пора напомнить её обитателям, что теперь они — американцы по-нашему."
    EEN_nf_d090:0 "Очистка Палуб"
    EEN_nf_d090_desc:0 "Так называемый Ривет-Сити — это остатки военного корабля США. Здесь нет места для захватчиков, сколько бы они там ни прожили. Вытравите их оттуда и отправьте куда подальше."
    EEN_nf_d091:0 "Ривет-Сити"
    EEN_nf_d091_desc:0 "Несмотря на своё происхождение, народ Ривет-Сити действительно сделал это место своим домом. Пусть и не идеально, но это хоть какой-то образец восстановления, к которому стоит стремиться. Пусть живут — протянем им руку помощи. Пока это выгодно."
    EEN_nf_d092:0 "Научный Институт Ривета"
    EEN_nf_d092_desc:0 "Учёные создали Ривет-Сити таким, какой он есть сейчас, и он может стать ценным исследовательским центром. В наших нынешних лабораториях и так уже тесновато."
    EEN_nf_d093:0 "Настоящий Американец"
    EEN_nf_d093_desc:0 "В глубине Ривет-Сити живёт интересная личность, Авраам Вашингтон. Местные жители говорят, что он историк, работающий над сохранением американской истории. Нам следует договориться о встрече."
    EEN_nf_d094:0 "Национальная Аллея"
    EEN_nf_d094_desc:0 "Когда-то прекрасный центр истории и торговли, Национальная Аллея превратилась в зону боевых действий после падения бомб. Теперь, когда шум почти утих, пора взяться за восстановление того, чем он был, если у нас хватит сил."
    EEN_nf_d095:0 "Прошедшее Будущее"
    EEN_nf_d095_desc:0 "Музей Технологий был полон как старых, так и новых изобретений для людей 2077 года. Вряд ли там найдёшь чертежи передовых плазменных винтовок, но, может, скрываются секреты старых технологий — тех самых, которые мы не считали нужным помнить, пока два века прятались в надёжных бункерах."
    EEN_nf_d096:0 "Обрывки Старого Света"
    EEN_nf_d096_desc:0 "Национальные Архивы забиты старыми документами, которые довоенное правительство считало исторически или культурно важными. Разобрать весь этот хлам займёт годы, но сначала стоит сделать первичный осмотр, надеюсь мы хоть что-то найдём, что стоит потраченного времени."
    EEN_nf_d097:0 "Исторический Музей"
    EEN_nf_d097_desc:0 "Исторический музей — это развалины, хранящие отголоски прошлого. Что же там ещё?"
    EEN_nf_d098:0 "Аллея полей сражений"
    EEN_nf_d098_desc:0 "Когда-то прекрасные просторы Национальной Аллеи теперь усеяны окопами, бункерами и костями павших. Монументы превратились в руины. Мы больше не можем позволить этому символу американского процветания гнить в забвении."
    EEN_nf_e001:0 "Пятна на стали"
    EEN_nf_e001_desc:0 "Хотя их дома разрушены, а большая часть руководства уничтожена, эти надоедливые занозы в нашем боку всё ещё упорно держатся. Придётся вычистить их раз и навсегда, прежде чем мы сможем заняться делом поважнее."
    EEN_nf_e002:0 "Охота за ними"
    EEN_nf_e002_desc:0 "Команды ликвидаторов будут отправлены в любую точку, где найдут бойцов Братства. Их не становиться больше, так что каждый уничтоженный — шаг к нашей цели."
    EEN_nf_e003:0 "Настроить людей"
    EEN_nf_e003_desc:0 "Радио Анклава будет доносить истории о зверствах и преступлениях Братства. Какими бы дикими ни казались эти байки, простой житель Пустоши поверит и выдаст любого террориста Братства, которого припрятал."
    EEN_nf_e004:0 "Последний Оплот"
    EEN_nf_e004_desc:0 "Оставшиеся террористы Братства разбегаются в панике. Мы можем добить их одним решающим ударом."
    EEN_nf_e005:0 "Америка в смятении"
    EEN_nf_e005_desc:0 "Из-за мутантов, заполонивших наши земли, и предательства полковника Отэма ситуация, мягко говоря, шаткая."
    EEN_nf_e006:0 "Саботаж коммуникации"
    EEN_nf_e006_desc:0 "Во время попытки переворота полковника Отэма группа его сторонников серьёзно повредила нашу коммуникационную инфраструктуру. Для её восстановления потребуется время."
    EEN_nf_e007:0 "Мобильная Передвижная База"
    EEN_nf_e007_desc:0 "Антенны передвижного краулера едва ли удалось вернуть к жизни после веков гниения, как их тут же прихватили верные Отэма. Им предстоит ещё много работы, чтобы починить эту рухлядь."
    EEN_nf_e008:0 "Починка радиорелейных станций"
    EEN_nf_e008_desc:0 "Радиорелейные станции Рэйвен-Рока серьёзно пострадали в боях — критически важное оборудование вырвано с корнем. Придётся потратить немало времени, чтобы оценить и залатать этот беспредел."
    EEN_nf_e009:0 "Протоколы «PiggyBack»"
    EEN_nf_e009_desc:0 "Наши учёные ковыряются с методами усиления сигналов на существующей инфраструктуре. Им понадобится серьёзная поддержка, чтобы довести это до конца, но пока что надежда есть — хоть и сомнительная."
    EEN_nf_e010:0 "Усилители сигнала робо-глаз"
    EEN_nf_e010_desc:0 "Опираясь на наши прежние изыскания, один учёный всерьёз думает, что антенны робо-глаз помогут усилить сигналы и значительно расширить зону покрытия. Для этого зарезервировали дюжину таких роботов, и они почти готовы к отправке. Надеемся, что они не развалятся раньше времени."
    EEN_nf_e011:0 "Всевидящий Робо-глаз"
    EEN_nf_e011_desc:0 "Каждый робо-глаз в Пустоши — это наши глаза, уши и голос. Они видят всё и знают всё. Нет ни одного уголка, где бы они не следили за тобой."
    EEN_nf_e012:0 "Кризис в руководстве"
    EEN_nf_e012_desc:0 "Полковник Отэм имел кучу друзей в нашем военном командовании. После его переворота большинству высокопоставленных и немалой части нижестоящих офицеров пришлось отправиться на тот свет. Восстанавливать военную администрацию будет больно и долго, но, как ни странно, это открывает новые возможности — для тех, кто не боится пачкать руки."
    EEN_nf_e013:0 "Лояльные Офицеры"
    EEN_nf_e013_desc:0 "Молодёжь с идеалами всегда тащилась от речей Президента Эдема. Многие из них верны Президенту больше жизни и могут стать костяком нашей новой военной администрации. Вот только проблема в том, что они всё ещё зелёные и наивные — идеальный ингредиент для очередной катастрофы."
    EEN_nf_e014:0 "Тренировка Офицеров"
    EEN_nf_e014_desc:0 "Мы потеряли много солдат из-за неопытности офицеров, нам следует научить их перестать вести себя так, будто у нас неограниченное количество войск."
    EEN_nf_e015:0 "Новая Гвардия"
    EEN_nf_e015_desc:0 "У нас есть новое поколение подготовленных и опытных офицеров. Эти мужчины и женщины поведут американскую армию в будущее."
    EEN_nf_e016:0 "Если хочешь что-то сделать правильно..."
    EEN_nf_e016_desc:0 "Пускать несовершенных людей к управлению нашей армией — была опасная ошибка. Огромный компьютер под именем Эдем может без проблем выделить часть своей мощности на управление военными — и сделать это без глупых эмоций и ошибок."
    EEN_nf_e017:0 "Подчерпнуть из Истории"
    EEN_nf_e017_desc:0 "Не имея личного опыта в бою, Эдем вынужден изучать историю, чтобы получить военные знания. Впрочем, это мало чем отличается от действий людей офицеров."
    EEN_nf_e018:0 "Величайшие Генералы"
    EEN_nf_e018_desc:0 "Имея доступ к громадным историческим базам данных, Эдем не просто учится на ошибках величайших генералов Америки — он может воссоздать этих генералов, чтобы возглавить самую грозную армию, какую страна когда-либо видела."
    EEN_nf_e019:0 "Кризис предотвращен"
    EEN_nf_e019_desc:0 "Анклав пережил кризис руководства, какого не было со времён разрушения Платформы — и, как ни странно, мы снова вынырнули из этого дерьма. Наше будущее — заслуга тех храбрых офицеров, что встали в строй, когда это было нужно, и стали теми, кем им пришлось стать."
    EEN_nf_e020:0 "Проблемы со снабжением"
    EEN_nf_e020_desc:0 "Анклаву уже давно не приходилось обеспечивать бесперебойное снабжение войск на столь большие расстояния. Поскольку наше старое командование скомпрометировано, у нас нет необходимых знаний и опыта, чтобы приспособиться к этим изменениям без серьезного переосмысления того, как мы управляем нашими линиями снабжения."
    EEN_nf_e021:0 "Воздушная доставка"
    EEN_nf_e021_desc:0 "Армии Пустоши до сих пор цепляются за древние способы снабжения — караваны или, в лучшем случае, автоколонны. Мы же не из тех, кто довольствуется прошлым. Так зачем нам флот винтокрылов, если мы даже не можем использовать их для доставки припасов нашим войскам? Чистой воды идиотизм."
    EEN_nf_e022:0 "Резервы топлива"
    EEN_nf_e022_desc:0 "Снабжение войск через винтокрылы жрёт топливо куда быстрее, чем мы рассчитывали. Если так пойдёт дальше, придётся лезть в наши топливные запасы — а их и так не так уж много."
    EEN_nf_e023:0 "Базы снабжения"
    EEN_nf_e023_desc:0 "Вместо того чтобы гонять винтокрыл с припасами к каждому отряду, мы устроим передовые позиции и базы в роли складов. Оттуда доставлять провизию будет на короткие расстояния — хоть и с небольшим оттягом на людские ресурсы, зато мы не будем сжигать танкер топлива каждые пару дней. Маленькая победа в этой вечной борьбе с дефицитом."
    EEN_nf_e024:0 "Берите, что необходимо"
    EEN_nf_e024_desc:0 "Нашим солдатам придётся научиться добывать всё необходимое прямо в поле. Постоянного снабжения не будет — придётся пополнять запасы за счёт местных мутантов. Выживание требует жёстких мер, и жалости здесь нет."
    EEN_nf_e025:0 "Пониженые стандарты"
    EEN_nf_e025_desc:0 "Как и следовало ожидать, средний мутант не таскает с собой ящик плазменных гранат и микроядерных батарей. Солдаты будут вынуждены обходиться тем, что найдут. В конце концов, .308 так же хорошо укладывает мутанта, как и плазменный заряд."
    EEN_nf_e026:0 "Корпус снабжения Пустоши"
    EEN_nf_e026_desc:0 "Иногда наткнуться на довоенный склад — это одно, но чтобы решить наши проблемы с снабжением, нам нужна целая дивизия, посвящённая поиску оружия и ресурсов. Эти ребята будут не только штурмовать запечатанные объекты, но и ходить по следам боёв, собирая с поля боя снаряжение павших."
    EEN_nf_e027:0 "Стабильное снабжение"
    EEN_nf_e027_desc:0 "Наши проблемы с снабжением временно решены. Солдаты обеспечены всем необходимым, чтобы продолжать нашу кампанию по восстановлению Америки. Война за будущее продолжается — и мы не отступим."
    EEN_nf_e028:0 "Проект «Чистота»"
    EEN_nf_e028_desc:0 "Проект «Чистота» изначально задумывался как способ обеспечить водой жителей Столичной Пустоши. Он по-прежнему будет выполнять эту задачу. Но теперь он станет и нашим оружием против мутантов, терзающих эти земли."
    EEN_nf_e029:0 "Клиники «Лечения»"
    EEN_nf_e029_desc:0 "Плохо себя чувствуете? Едва шевелитесь? Рвете кровью? Похоже, вам срочно нужна клиника «лечения» Анклава. Наши преданные медики усердно изучают этот ужасный недуг, который появился ниоткуда и застал всех врасплох..."
    EEN_nf_e030:0 "Глупый «Коготь»"
    EEN_nf_e030_desc:0 "Конечно, Компания «Коготь» помогла нам разгромить Братство, но мутант остаётся мутантом. Теперь пришло время с ними разобраться раз и навсегда."
    EEN_nf_e031:0 "Трудовой лагерь Баннистер"
    EEN_nf_e031_desc:0 "Форт Баннистер в его нынешнем виде не представляет для Анклава никакой стратегической ценности. Честно говоря, эта развалина мало что стоит, кроме того, что можно из неё вытащить. Так что мы сделаем именно это. Форт превратится в строго охраняемый трудовой лагерь, где пойманные пустошники смогут послужить стране, вытаскивая остатки ценного из когда-то великой базы."
    EEN_nf_e032:0 "Убежище 87"
    EEN_nf_e032_desc:0 "Почти наверняка именно Убежище 87 стало источником проблемы с Супермутантами. Нам нужно подготовиться к полной зачистке этого места."
    EEN_nf_e033:0 "Проблема Супермутантов"
    EEN_nf_e033_desc:0 "Проблема Супермутантов — это то, с чем большинство государств просто не справились бы. И уж тем более у них не было бы тех ресурсов и возможностей, что есть у нас, чтобы с этим бороться."
    EEN_nf_e034:0 "Американская Армия"
    EEN_nf_e034_desc:0 "Старые методы — войска в силовой броне, заполняющие пустоши — возможно, больше не подходят для будущего. Наши производственные мощности ограничены, как и людские ресурсы. Пора переосмыслить, как мы ведём войну."
    EEN_nf_e035:0 "Солдаты - Супермутанты"
    EEN_nf_e035_desc:0 "Вся суть проекта Супермутантов заключалась в создании солдата завтрашнего дня, и в некоторых случаях старый Анклав на западе добился успеха. Может, именно в этом и есть наш путь вперёд."
    EEN_nf_e036:0 "Большая чёрная броня"
    EEN_nf_e036_desc:0 "Мутанты боятся вида огромного солдата в чёрной силовой броне — и не без оснований. Пусть наших солдат и мало, но отряд в силовой броне способен подавить врага, превосходящего их числом двадцать к одному, и выйти из боя с улыбкой."
    EEN_nf_e037:0 "Будущее за Сталью"
    EEN_nf_e037_desc:0 "Мощь и надёжность стали для нашей военной машины предпочтительнее, чем ставить под угрозу чистого американского человека. Пусть роботы и не так гибки и приспособляемы, но мы можем заменить каждого павшего двумя новыми."
    EEN_nf_e038:0 "Большие рабские ошейники"
    EEN_nf_e038_desc:0 "Как и следовало ожидать, супермутанты — далеко не лучшие для выдачи им тяжёлого оружия. Разработав новые ошейники-уздечки, подходящие под их шеи, мы сможем держать их на поводке. Даже тупой мутант понимает простую истину: «дурная голова взрывается»."
    EEN_nf_e039:0 "Излишки Братства"
    EEN_nf_e039_desc:0 "Не каждому солдату нужна продвинутая силовая броня. Наши снайперы, вспомогательный персонал и сапёры вполне справятся в отреставрированных костюмах T-45d, оставшихся от Братства."
    EEN_nf_e040:0 "Модернизация фабрик"
    EEN_nf_e040_desc:0 "Чтобы заменить нашу армию машинами, нам придется переоборудовать множество фабрик на производство роботов."
    EEN_nf_e041:0 "Умный супермутант?"
    EEN_nf_e041_desc:0 "В Убежище 87 был супермутант, у которого, похоже, сохранилась большая часть его сознания. Если удастся изучить его сознание и провести вскрытие, возможно, мы научимся создавать мутантов достаточно умных для боя, но не настолько, чтобы они могли замышлять заговор против нас."
    EEN_nf_e042:0 "Броня завтрашнего дня"
    EEN_nf_e042_desc:0 "При ограниченных силах наш лучший вариант — создать самое передовое снаряжение, какое только видели пустоши. Если оружие мутантов не сможет пробить броню, неважно, сколько у них будет людей."
    EEN_nf_e043:0 "Роботы в приоритете"
    EEN_nf_e043_desc:0 "Поскольку наша армия почти полностью состоит из роботов, нам следует сосредоточиться на создании более совершенных роботов."
    EEN_nf_e044:0 "Наша Новая Армия"
    EEN_nf_e044_desc:0 "Наша армия прошла через множество радикальных перемен и стала сильнее благодаря им."
    EEN_nf_e045:0 "Первый Город"
    EEN_nf_e045_desc:0 "Америка лежит в руинах. Нашему народу нужен новый город — город, который станет окном в будущее. Чистые улицы, крепкие стены и надёжные дома. Это будет грандиозный проект, но огромный шаг вперёд в новую эру."
    EEN_nf_e046:0 "Разобрать руины"
    EEN_nf_e046_desc:0 "Руины вокруг нашего нового города нужно стереть с лица земли. Куча металлолома на горизонте — лишь напоминание о кошмарах пустоши"
    EEN_nf_e047:0 "Бетонные стены"
    EEN_nf_e047_desc:0 "Ни один мутант не ступит на землю этого города без кандалов. Чтобы обеспечить это и безопасность наших людей, нам нужны крепкие стены и фортификации."
    EEN_nf_e048:0 "Безграничная энергия"
    EEN_nf_e048_desc:0 "Что за город будущего, если людям приходится запускать генераторы, чтобы зажечь свет? Мы заберём реакторы из нескольких старых убежищ, чтобы запитать город, пока не найдём более долговременное решение."
    EEN_nf_e049:0 "Гражданская промышленность"
    EEN_nf_e049_desc:0 "Домам нашего народа нужна новая мебель, техника и прочие товары. Несколько заводов смогут обеспечить потребности граждан."
    EEN_nf_e050:0 "Чистое небо"
    EEN_nf_e050_desc:0 "Мы не позволим мутантской мерзости сыпаться с неба. Противовоздушные установки вдоль стен не пустят мутантских планеров и летающий металлолом в наше воздушное пространство."
    EEN_nf_e051:0 "Чистые улицы"
    EEN_nf_e051_desc:0 "Жители нашего первого города будут наслаждаться приятными прогулками по чистым улицам. Всё необходимое будет находиться в радиусе 15 минут."
    EEN_nf_e052:0 "Убежище 101"
    EEN_nf_e052_desc:0 "Одно из последних убежищ, ещё полный чистых граждан — Убежище 101 — послал радиосигналы. Пора приветствовать их в новой Америке."
    EEN_nf_e053:0 "Национальный Аэропорт Эдема"
    EEN_nf_e053_desc:0 "В нашем городе будет огромный аэропорт — центр торговли и место, где солдаты смогут возвращаться домой на отдых. Если всё пойдёт наперекосяк, он станет опорным пунктом для обороны города."
    EEN_nf_e054:0 "Дом, милый дом"
    EEN_nf_e054_desc:0 "Дома наших людей будут спроектированы так, чтобы обеспечить им комфорт, безопасность и общность."
    EEN_nf_e055:0 "Наша новая Столица"
    EEN_nf_e055_desc:0 "Наконец, создан первый город Новой Америки. Главным достижением станет то, что здесь разместится наша новая столица."
    EEN_nf_e056:0 "Нескованная наука"
    EEN_nf_e056_desc:0 "Без заблуждений, что мутанты пустоши — люди, наши научные отделы смогут по-настоящему решать задачи. Испытуемых предостаточно, ресурсы не иссякнут. Мы откроем новую эру научных открытий."
    EEN_nf_e057:0 "Изучение Кибернетики"
    EEN_nf_e057_desc:0 "До войны проводилось несколько исследований, посвящённых кибернетическим усовершенствованиям человека. Бомбы в какой-то степени затормозили это направление исследований, но теперь мы можем снова направить ресурсы на эту идею."
    EEN_nf_e058:0 "Убежище 108"
    EEN_nf_e058_desc:0 "Если верить записям штаб-квартиры Волт-Тек, Убежище 108 предназначалось для проведения серии экспериментов по клонированию. Нам следует расследовать и выяснить, чего там смогли добиться."
    EEN_nf_e059:0 "Лучший контроль Когтей Смерти"
    EEN_nf_e059_desc:0 "Пусть когти смерти патрулируют заставу, принимая её за своё логово — это хорошо, но с дальнейшими исследованиями мы сможем посылать им сигналы, заставляя атаковать позиции или даже координировать совместные штурмы укреплений."
    EEN_nf_e060:0 "Кибернетические улучшения"
    EEN_nf_e060_desc:0 "Кибернетические улучшения — следующий этап эволюции человека. Нужно продолжать работу в этом направлении."
    EEN_nf_e061:0 "Исправить их ошибки"
    EEN_nf_e061_desc:0 "Убежище 108, как и большинство других экспериментов Волт-Тек, похоже, закончилось провалом. Мы изучим терминалы и попытаемся исправить допущенные ошибки."
    EEN_nf_e062:0 "Аугментации Когтей Смерти"
    EEN_nf_e062_desc:0 "Я ХОЧУ ДОЛБАННОГО КОГТЯ СМЕРТИ, С ДОЛБАННЫМ ЛАЗЕРНЫМ ПРИЦЕЛОМ, ПРИКРЕПЛЕННЫМ К ЕГО ДОЛБАННОЙ ГОЛОВЕ!"
    EEN_nf_e063:0 "Американизирующие Импланты"
    EEN_nf_e063_desc:0 "С несколькими незначительными изменениями наших стандартных имплантов мы сможем скорректировать сознание пользователя, сделав его более американцем."
    EEN_nf_e064:0 "Удачные клоны"
    EEN_nf_e064_desc:0 "Мы почти на финишной прямой — первый клонированный младенец готов к... рождению? Как бы это ни называлось, это серьёзный шаг в будущее."
    EEN_nf_e065:0 "Солдаты - Когти Смерти"
    EEN_nf_e065_desc:0 "Благодаря упорной работе множества учёных и благородной жертве многочисленных мутантов-испытателей мы наконец достигли достаточного контроля над когтями смерти, чтобы включить их в состав наших вооружённых сил. Они не заменят ни человека, ни технику, но станут незаменимым ресурсом для штурма позиций, захват которых иначе обойдётся слишком дорого."
    EEN_nf_e066:0 "Что такое границы?"
    EEN_nf_e066_desc:0 "Отказавшись от иллюзий о том, что мутанты заслуживают хоть каплю сочувствия, и поставив на первое место науку, мы достигли высот, о которых раньше могли лишь мечтать."
    EEN_nf_e067:0 "Brighter Tomorrow"
    EEN_nf_e067_desc:0 "С новым городом для жизни, новой армией для защиты и новыми достижениями на горизонте, наш народ впервые с довоенного времени обретает надежду на будущее. Да благословит Бог Анклав, и да благословит Бог Америку!"
    EEN_nf_e068:0 "Изобилие мутантов"
    EEN_nf_e068_desc:0 "Братство и мутантская свора, которую они на нас натравили, были не единственными отбросами, шныряющими по развалинам Вашингтона."
    EEN_nf_e069:0 "Проект «Линкольн»"
    EEN_nf_e069_desc:0 "Памятник Линкольну лежит в руинах — великий грех перед величайшим президентом Америки. Второй по величию, Президент Эдем, уже разрабатывает планы по его восстановлению."
    EEN_nf_e070:0 "Великий Белый Север"
    EEN_nf_e070_desc:0 "На севере ходят слухи о вышедшем из-под контроля ИИ. Возможно, Эдем, опираясь на своё превосходящее логическое мышление, сможет с ними договориться."
    EEN_nf_e071:0 "Культисты на нашем Западе"
    EEN_nf_e071_desc:0 "На западе обитают несколько мутантов, поклоняющихся камню. Их нужно уничтожить — ресурсы под ними необходимы для восстановления."
    EEN_nf_e072:0 "Грязное издевательство"
    EEN_nf_e072_desc:0 "Прямо к югу от Вашингтона бродит стая отвратительных мутантов, пожирающих своих сородичей и пытающихся выдать себя за настоящих американцев. Очевидно, им не место здесь — их нужно уничтожить."
    EEN_nf_e073:0 "Изгои"
    EEN_nf_e073_desc:0 "Как будто Братства Стали было мало, эти так называемые Изгои не менее опасны. Следовало истребить их вместе с их сородичами, когда была такая возможность."
    EEN_nf_e074:0 "Южная граница"
    EEN_nf_e074_desc:0 "Путь до самой Флориды займёт десятилетия, и если честно, большая часть юга едва стоила внимания ещё до Великой Войны. Возможно, стоит укрепить этот регион, чтобы держать отбросов на расстоянии, пока мы очищаем то, что уже имеем."
    EEN_nf_e075:0 "Сторонники отмены рабства?"
    EEN_nf_e075_desc:0 "Похоже, что в мемориале обитает культ, поклоняющийся Линкольну. Может быть, это редкий случай, когда Эдем проявляет симпатию к мутантам?"
    EEN_nf_e076:0 "Выставка Линкольна"
    EEN_nf_e076_desc:0 "Говорят, в Историческом Музее до бомбёжек была выставка, посвящённая исключительно Линкольну. Нужно отправить отряд, чтобы забрать всё, что можно."
    EEN_nf_e077:0 "Музей Линкольна"
    EEN_nf_e077_desc:0 "Памятник Линкольну и окружающие здания будут переоборудованы в музей, повествующий о жизни великого президента и его влиянии на благородные цели Анклава."
    EEN_nf_e078:0 "Служба здравоохранения Соединенных Штатов"
    EEN_nf_e078_desc:0 "На севере находится довоечная медицинская машина, обезумевшая от мутагенных ужасов, свидетелем которых она стала. Бедняга не понимала, что мутанты, которых пыталась спасти, уже не были людьми. Возможно, если показать ей признаки настоящей человечности, она сможет вспомнить своё предназначение."
    EEN_nf_e079:0 "ВАШИНГТОН?"
    EEN_nf_e079_desc:0 "В рамках провалившегося коммунистического заговора в Канаде был создан мятежный ИИ по имени Вашингтон, направленный против доблестной армии Соединённых Штатов. Мы считали, что его существование — лишь слухи, распространяемые повстанцами, сражающимися с Анклавом Онтарио, но отчёты наших разведчиков подтверждают: ВАШИНГТОН всё ещё активен. Это порождение и все, кто с ним связаны, должны быть стерты с канадской земли Америки."
    EEN_nf_e080:0 "Действия по абордажу"
    EEN_nf_e080_desc:0 "Стая мутантов, возомнивших себя учёными, оккупировала обломки американского военного корабля. Выброшенное на берег ржавое ведро, возможно, и не стоит ни гроша, но суть в том, что мы не можем позволить мутантам оккупировать нашу собственность."
    EEN_nf_e081:0 "Заводы Виндзора"
    EEN_nf_e081_desc:0 "Автомобильные заводы в Виндзоре сохранились в лучшем состоянии, чем многие другие заводы страны. С помощью рабов из Пустоши мы могли бы создать здесь настоящую промышленность."
    EEN_nf_e082:0 "В Питт"
    EEN_nf_e082_desc:0 "Питт — всего лишь очередное гнездо мутантской мерзости, пытающейся выдать себя за общество. Они захватили ценные ресурсы и, что хуже всего, находятся на американской земле."
    EEN_nf_e083:0 "Гадкие Троги"
    EEN_nf_e083_desc:0 "Как будто отвратительные радиоактивные дикие гули и прочие ужасающие твари Пустоши были недостаточной угрозой, в Питте обитает уникальная мерзость — Трог. Троги не имеют права на существование в Америке и подлежат полному истреблению."
    EEN_nf_e084:0 "Болота с ВРЭ"
    EEN_nf_e084_desc:0 "Болота на юге потребуют десятилетий, чтобы очистить их от мутагенной заразы обычными методами. Один инициативный офицер предложил план: если применить тот же модифицированный ВРЭ, что использовался для очистки столичной Пустоши, это может существенно снизить сопротивление врага."
    EEN_nf_e085:0 "Встречайте новое руководство"
    EEN_nf_e085_desc:0 "Спасение от Ашура? Нет, скорее, новое руководство."
    EEN_nf_e086:0 "Красный Снег"
    EEN_nf_e086_desc:0 "Мутанты Канады будут изгнаны с американской земли, или им придется умереть в снегу."
    EEN_nf_e087:0 "От Атлантики до Тихого Океана"
    EEN_nf_e087_desc:0 "Во второй раз с тех пор, как атомный огонь обрушился с небес, Америка вырвалась из когтей смерти. С каждой победой над мутантской угрозой, с каждым освобождённым километром — Америка становится всё ближе к своему восстановлению. Эта страна возродится, и народ великой нации вновь обретёт мир, покой и свободу от Атлантики до Тихого Океана."
    EEN_nf_f001:0 "Мы вернулись"
    EEN_nf_f001_desc:0 "Более 200 лет назад армия Соединённых Штатов была вынуждена покинуть Пентагон и укрыться в защищённых бункерах по всей стране. За это время объект пришёл в упадок и стал пристанищем для отделения Братства Стали под руководством Лайонса. Теперь, когда мы изгнали этих псевдо-рыцарских фанатиков, можем приступить к восстановлению объекта. Но прежде всего, необходимо оценить его текущее состояние."
    EEN_nf_f002:0 "Переместить руководство из Адамса"
    EEN_nf_f002_desc:0 "Авиабаза Адамс стала приемлемым запасным пунктом после уничтожения Рэйвен-Рока, но никогда не предназначалась быть сердцем армии Соединённых Штатов. Мы продолжим поддерживать здесь нашу базу, но по мере восстановления Пентагона всё больше командных и управленческих функций будет перенесено туда."
    EEN_nf_f003:0 "Переместить руководство из Рэйвен-Рока"
    EEN_nf_f003_desc:0 "Рэйвен-Рок служил надежным убежищем для Анклава последние десятилетия, но что скажут американцы, если мы продолжим прятаться в горном бункере? Нет. Мы восстановим Пентагон до былого величия и сделаем его нашей главной базой. Это станет символом — доказательством того, что Америка вернулась."
    EEN_nf_f004:0 "Расчистка завалов"
    EEN_nf_f004_desc:0 "Как будто разрушений времени было недостаточно, упорная оборона Братства их украденного убежища нанесла серьёзные повреждения. Если мы не восстановим эти разрушающиеся стены, это место скоро развалится."
    EEN_nf_f005:0 "Внутренний двор"
    EEN_nf_f005_desc:0 "Братство превратило внутренний двор Пентагона в обветшалое тренировочное поле. У нас планы гораздо серьёзнее. Немного усилий — и мы превратим двор вместе с прилегающими парковками в надёжные площадки для посадки и дозаправки наших винтокрылов."
    EEN_nf_f006:0 "Наша местная Библиотека"
    EEN_nf_f006_desc:0 "Всего в нескольких шагах от Пентагона расположена Библиотека Конгресса. Большая часть этих книг, вероятно, сгнила за столетия, но записи Братства Стали гласят, что какой-то пустошник якобы выудил весь архив библиотеки из старого терминала где-то в руинах. С этим архивом мы сможем заполнить пробелы в наших базах данных, что несомненно ускорит наши исследования."
    EEN_nf_f007:0 "Один, если по суше..."
    EEN_nf_f007_desc:0 "Идея Братства о надёжной базе сводилась к нескольким мешкам с песком и огромному куску металлолома, поднятому краном. Мы можем и должны сделать лучше для будущей штаб-квартиры нашего военного командования. Наш периметр должен быть надёжно защищён, чтобы остановить наземные атаки на Пентагон или, по крайней мере, задержать их достаточно, чтобы подготовить оборону."
    EEN_nf_f008:0 "...Два, если по морю..."
    EEN_nf_f008_desc:0 "Защитники и мирные жители Контрольной станции Анклава пали, потому что выжившие с Пустошей смогли запустить один старый танкер. Представьте, что случится, если мы оставим себя без защиты перед врагом с координированным флотом? Побережья возле Пентагона должны быть надёжно охраняемы, чтобы исключить такую возможность."
    EEN_nf_f009:0 "...Три, если по небу"
    EEN_nf_f009_desc:0 "Мы не можем исключить возможность, что некоторые из наших врагов разработали самолёты, пусть и примитивные. Чтобы защитить наше верховное командование от бомбардировок, нам необходимо установить зенитные позиции на крыше Пентагона."
    EEN_nf_f010:0 "Возвращение имущества"
    EEN_nf_f010_desc:0 "Бывшие обитатели Пентагона сделали всё, чтобы разграбить каждое ценное устройство в здании и вокруг него. К счастью для нас, они затем складировали всё это здесь. Хотя большая часть уже изъята и учтена, в подземных уровнях всё ещё остались несколько складских помещений, которые мы ещё не проверили."
    EEN_nf_f011:0 "Прототипы Братства"
    EEN_nf_f011_desc:0 "Хотя Братство Стали подчистило как можно больше своих цифровых архивов до того, как мы взяли Пентагон, похоже, они забыли про физические чертежи и прототипы. Некоторые из наших учёных насмехаются над идеей изучать технологии Братства, но они добрались сюда без винтокрылов и запустили Либерти Прайм — значит, стоит признать мастерство их писцов."
    EEN_nf_f012:0 "Довоенные достижения"
    EEN_nf_f012_desc:0 "Один из последних великих проектов в Пентагоне перед тем, как война сломала Америку, был Либерти Прайм. Хотя эта машина была уничтожена в войне с Братством, её чертежи, а также схемы нескольких прототипов, всё ещё хранятся в пыльных архивах Пентагона. Мы можем извлечь из них что-то полезное."
    EEN_nf_f013:0 "Радио Командования"
    EEN_nf_f013_desc:0 "Верховное командование мало что значит, если не может быстро передавать приказы. Нам необходимо установить оборудование, чтобы связать Пентагон с остальной частью нашей коммуникационной сети."
    EEN_nf_f014:0 "Пентагон возвращается"
    EEN_nf_f014_desc:0 "После многих месяцев труда мы наконец приближаемся к восстановлению Пентагона до уровня, которым можно гордиться как центром нашей военной организации. Остались лишь последние штрихи."
    EEN_nf_g001:0 "Голос, Сердце и Душа"
    EEN_nf_g001_desc:0 "Большая часть Анклава погибла вместе с уничтожением платформы. Те, кто выжил, пришли на восток по зову Президента Эдема. Следовательно, ясно — мы и есть истинный Анклав. Все остальные форпосты и отщепенцы должны следовать нашему примеру."
    EEN_nf_g002:0 "Большие проблемы в маленьком Ронто"
    EEN_nf_g002_desc:0 "Анклав Онтарио исчез из поля зрения много лет назад после поражения от канадских мутантов. К счастью, похоже, это было не полное поражение."
    EEN_nf_g003:0 "Войти в бункер Онтарио"
    EEN_nf_g003_desc:0 "Штаб-квартира Анклава в Онтарио кажется покинутой, но Рэйвен-Рок тоже казался таким на первый взгляд."
    EEN_nf_g004:0 "Поиски Пропавших"
    EEN_nf_g004_desc:0 "После поражения многие покинули бункер в Онтарио. Журналы бункера показывают, куда они направились — нам остаётся только последовать за ними."
    EEN_nf_g005:0 "Подготовиться к Зиме"
    EEN_nf_g005_desc:0 "Замёрзшие театры боевых действий, такие как канадские пустоши, представляют уникальные вызовы для армии. Изучая, как Анклав Онтарио адаптировался, мы сможем лучше подготовить наши войска к маршу через ледяные пустоши."
    EEN_nf_g006:0 "Броня «ГЕРМЕС»"
    EEN_nf_g006_desc:0 "Столкнувшись с ограниченностью ресурсов, Анклав Онтарио разработал более лёгкую альтернативу силовой броне X-02. Сомнительно, что нам когда-либо понадобится такая броня, и мы, вероятно, могли бы разработать ее сами, если бы возникла такая необходимость, но чертежи не помешают."
    EEN_nf_g007:0 "Понимание В.А.Ш.И.Н.Т.О.Н.А "
    EEN_nf_g007_desc:0 "Довоенный ИИ В.А.Ш.И.Н.Г.Т.О.Н, возможно, был заражён канадскими коммунистами, но в его памяти сохранилось множество полезных данных об оккупации. Эти данные должны дать нам ценные сведения о методах подавления непокорного населения и борьбы с партизанами — двумя проблемами, с которыми мы столкнёмся при освобождении территорий."
    EEN_nf_g008:0 "Пожинать плоды Канады"
    EEN_nf_g008_desc:0 "Канада — это не только снег и двуглавые лоси. Как и во многих пустошах, здесь скрывается гора пригодной для сбора техники, способной укрепить наши боевые возможности. Наши товарищи в Онтарио готовы поделиться этим богатством."
    EEN_nf_g009:0 "Звонок в Чикаго"
    EEN_nf_g009_desc:0 "Отделение в Чикаго, похоже, держится несмотря на натиск орд мутантов. Возможно, мы сможем помочь друг другу, пока не решим свои собственные проблемы."
    EEN_nf_g010:0 "Обмен заметками"
    EEN_nf_g010_desc:0 "От калифорнийских пустошей до равнин Иллинойса, отделения Братства Стали появляются повсюду, словно радтараканьи гнёзда. Мы сражались с этими террористами в прошлом и знаем, как противостоять их тактикам. Вероятно, Чикаго выработал схожие методы. Нам следует сравнить доктрины, чтобы извлечь уроки друг от друга."
    EEN_nf_g011:0 "Дискуссии о Современной Военной Теории"
    EEN_nf_g011_desc:0 "В Чикаго работают одни из лучших ныне живущих офицеров, за исключением Рэйвен-Рока. Организация дискуссий между нашими офицерами будет очень полезна."
    EEN_nf_g012:0 "Политическое позиционирование"
    EEN_nf_g012_desc:0 "Неважно, правда ли это в Чикаго или нет, но продвижение идеи, что другие крупные отделения Анклава признают власть Президента Эдема, укрепит мораль и стабильность в Рэйвен-Рок."
    EEN_nf_g013:0 "Продвигать Единство Анклава"
    EEN_nf_g013_desc:0 "Многие великие нации прошлого пали из-за политических распрей. Конечно, этого никогда не случится с нами. Один Анклав, одна Америка — сейчас и навсегда!"
    EEN_nf_g014:0 "Плазма из Чикаго"
    EEN_nf_g014_desc:0 "Рэйвен-Рок — впечатляющее сооружение, но его промышленный потенциал ограничен. Чикаго же располагает достаточным запасом плазменных винтовок и готов поделиться ими в знак поддержки Президента."
    EEN_nf_g015:0 "Принять дополнительную броню"
    EEN_nf_g015_desc:0 "Конечно, какая польза от плазменной винтовки, если стрелок может быть сбит ржавой трубной винтовкой? Мы должны принять предложение Чикаго о запасных комплектах силовой брони."
    EEN_nf_g016:0 "Дом зовёт"
    EEN_nf_g016_desc:0 "У доброго доктора Б.М.М.А.У есть революционные идеи, как справиться с мутацией, опустошающей Америку. Давайте поможем ему."
    EEN_nf_g017:0 "Встреча Умов"
    EEN_nf_g017_desc:0 "Служба Здравоохранения Буффало обладает огромным массивом медицинских данных, собранных за века экспериментов над обитателями Пустошей. У нас есть исчерпывающие сведения по развитию робототехники. Обмен информацией будет взаимовыгодным."
    EEN_nf_g018:0 "Инновационные методы лечения"
    EEN_nf_g018_desc:0 "Прежде чем Б.М.М.А.У утвердили нынешний протокол лечения мутантов пустоши, они десятилетиями изучали состояние пустошников. Эти знания помогут нам защитить истинных американцев."
    EEN_nf_g019:0 "В безумии есть метод"
    EEN_nf_g019_desc:0 "Метод Б.М.М.А.У по борьбе с мутантами пустоши — ценный опыт, из которого наши учёные могут почерпнуть многое."
    EEN_nf_g020:0 "Клинические испытания"
    EEN_nf_g020_desc:0 "Метод Буффало в борьбе с мутантами, возможно, не столь практичен, как проект «Чистота», но у него есть свои преимущества."
    EEN_nf_g021:0 "Аптечный забег"
    EEN_nf_g021_desc:0 "У Службы Здравоохранения Буффало есть внушительный запас лекарств, которые они не используют в своём лечении. Наверняка они не будут против, если мы ими воспользуемся."
    EEN_nf_g022:0 "Службы скорой помощи"
    EEN_nf_g022_desc:0 "Б.М.М.А.У постоянно ищет новых пациентов для лечения. Как добрые американцы, мы должны протянуть руку помощи."
    EEN_nf_g023:0 "Наследие Наварро"
    EEN_nf_g023_desc:0 "Связь с Наварро была потеряна вскоре после нашего перемещения на восток. Даже после восстановления коммуникаций — лишь помехи. До настоящего момента..."
    EEN_nf_g024:0 "Посылка с гуманитарной помощью"
    EEN_nf_g024_desc:0 "Выжившие в Наварро изо всех сил стараются сохранить мечту об Америке на западном побережье. Временами нам самим нелегко, но, возможно, мы всё ещё можем помочь."
    EEN_nf_g025:0 "Архивы Наварро"
    EEN_nf_g025_desc:0 "Гранитная рота отбила Наварро у НКР. При взятии базы им удалось получить доступ к базам данных, которые медведь не смог вскрыть."
    EEN_nf_g026:0 "Перекати-поле"
    EEN_nf_g026_desc:0 "Гранитная рота уже долго скрывается от НКР. Без нашей помощи их рано или поздно найдут."
    EEN_nf_g027:0 "Сказки о Медведе"
    EEN_nf_g027_desc:0 "Гранитная рота обладает тем, чего нет ни у кого на этой стороне страны — непосредственным опытом борьбы с НКР. Это станет неоценимым, когда мы вернёмся на запад."
    EEN_nf_g028:0 "Когти Анклава"
    EEN_nf_g028_desc:0 "Компания «Коготь» яростно сражалась с Братством в недавнем конфликте. Теперь нам предстоит решить их судьбу."
    EEN_nf_g029:0 "Отчеты о проделанной работе"
    EEN_nf_g029_desc:0 "Командование, установленное в Компании «Коготь», вело подробные отчёты о столкновениях с Братством. Пришло время их изучить."
    EEN_nf_g030:0 "Военные игры"
    EEN_nf_g030_desc:0 "Совместные учения с Компанией «Коготь» будут полезны для нас обоих."
    EEN_nf_g031:0 "Вынести Мусор"
    EEN_nf_g031_desc:0 "Мутанты Компании «Коготь» исчерпали свою полезность и сумели обратить офицеров, назначенных туда, против истинных американских ценностей. Пора их уничтожить."
    EEN_nf_g032:0 "Трудовой лагерь Баннистер"
    EEN_nf_g032_desc:0 "Форт Баннистер в его нынешнем виде не представляет для Анклава никакой стратегической ценности. Честно говоря, эта развалина мало что стоит, кроме того, что можно из неё вытащить. Так что мы сделаем именно это. Форт превратится в строго охраняемый трудовой лагерь, где пойманные пустошники смогут послужить стране, вытаскивая остатки ценного из когда-то великой базы."
    EEN_nf_g033:0 "Солнце, Серфинг, Космос"
    EEN_nf_g033_desc:0 "Связь с авиабазой Ван Бюрен восстановлена. Прежде чем принимать решение, нам нужно оценить их положение. В конце концов, с момента последнего контакта прошло немало времени."
    EEN_nf_g034:0 "Отправить помощь на Юг"
    EEN_nf_g034_desc:0 "Нашим товарищам на юге нужна наша помощь, если они хотят завершить свою миссию."
    EEN_nf_g035:0 "Аэрокосмические Архивы"
    EEN_nf_g035_desc:0 "В банках данных авиабаз хранится огромное количество информации о разработке самолетов."
    EEN_nf_g036:0 "Возвращение в лоно"
    EEN_nf_g036_desc:0 "Застава Анклава во Флориде была захвачена. Выжившие просят о возвращения домой."
    EEN_nf_g037:0 "Ураган Анклава"
    EEN_nf_g037_desc:0 "Мы не можем позволить мутантам, захватившим авиабазу Ван Бюрен, удерживать её. Мы вернёмся — и вернём её силой."
    EEN_nf_g038:0 "Просто проверка"
    EEN_nf_g038_desc:0 "Чикаго осведомлён о нашей недавней борьбе в Столичной Пустоши. У них есть срочное послание для Президента."
    EEN_nf_g039:0 "Ответить на угрозы Чикаго"
    EEN_nf_g039_desc:0 "Министр в Чикаго ясно дал понять, что не одобряет необходимых мер, которые Отэм предпринял против Эдема. По мере того как связь между нашими анклавами становится всё более враждебной, становится очевидно — конфликт неизбежен. Мы должны нанести первый удар!"
    EEN_nf_g040:0 "Наши общие корни"
    EEN_nf_g040_desc:0 "Мы можем не совпадать с Чикаго во всём, но наши общие цели намного важнее мелких разногласий. Главное — восстановление Америки, и ничто не должно этому помешать. Будем надеяться, что Министр разделяет эту позицию."
    EEN_nf_g041:0 "План «Октябрь»"
    EEN_nf_g041_desc:0 "МакАртур — одна из ключевых западных застав Чикаго. У нас есть разведданные о растущем античикагском настроении среди их руководства. Поддержка этого движения может принести нам ценного союзника или хотя бы ослабить позиции Чикаго."
    EEN_nf_g042:0 "Стена Отэма"
    EEN_nf_g042_desc:0 "Наш неизбежный конфликт с Чикаго будет долгим и тяжёлым. Нам нужно быть готовыми и укрепить оборону, чтобы они не прорвались в наши земли."
    EEN_nf_g043:0 "Сплочающий клич"
    EEN_nf_g043_desc:0 "С коалицией отделений Анклава на нашей стороне у Чикаго нет шансов."
    EEN_nf_g044:0 "Марш на Чикаго"
    EEN_nf_g044_desc:0 "Мы готовы так, как никогда раньше. Пора перенести бой к этому высокомерному Министру и его приспешникам."
    EEN_nf_g045:0 "Дружеский жест"
    EEN_nf_g045_desc:0 "Чикаго знает, что, несмотря ни на что, мы на одной стороне. Мы должны подготовить подарок для Чикаго, чтобы напомнить им о наших дружеских намерениях."
    EEN_nf_g046:0 "Риторика о де-эскалации"
    EEN_nf_g046_desc:0 "Слишком многие в нашем руководстве за закрытыми дверями называют Чикаго врагами. Мы должны напомнить им слова великого Президента Линкольна; \n \n Я уничтожаю своих врагов, когда делаю их своими друзьями."
    EEN_nf_g047:0 "Наша глубочайшая благодарность"
    EEN_nf_g047_desc:0 "В ответ на наш подарок Министр прислал дар из Чикаго. Похоже, наши усилия хотя бы донесли нужное послание."
    EEN_nf_g048:0 "Бремя человечества"
    EEN_nf_g048_desc:0 "Будучи последними бастионами истинного человечества, мы обязаны восстановить эту великую нацию и спасти человеческий род. Как глупо было бы упустить этот шанс из-за мелочных разногласий."
    EEN_nf_g049:0 "Победа в Чикаго"
    EEN_nf_g049_desc:0 "Чикаго в огне, подавляющее большинство сил Чикагского Анклава либо уничтожено, либо взято в плен. Одним последним рывком мы можем положить этому конец."
    EEN_nf_g050:0 "Одна нация под руководством Отэма"
    EEN_nf_g050_desc:0 "С поверженным Чикаго, Восточное Управление по Восстановлению остаётся главной силой Анклава. Настало время занять наше законное место."
    EEN_nf_g051:0 "Назвать имя Вице-президента"
    EEN_nf_g051_desc:0 "Прошло слишком много времени с тех пор, как в нашей стране был настоящий вице-президент. Настало время это изменить."
    EEN_nf_g052:0 "Соглашение Линкольна"
    EEN_nf_g052_desc:0 "Представители различных фракций Анклава собираются в Линкольне, чтобы обсудить важные вопросы, касающиеся восстановления нашей страны."
    EEN_nf_g053:0 "Кто Президент?"
    EEN_nf_g053_desc:0 "После контакта с выжившими после падения Наварро, к сожалению, стало ясно, что с ними творится что-то неладное."
    EEN_nf_g054:0 "[EEN_retards_fighting_ww_loc]"
    EEN_nf_g054_default:0 "Мы победили Анклав!"
    EEN_nf_g054_wild_wasteland:0 "Два дебила дерутся"
    EEN_nf_g054_desc:0 "Министр показал, что не уважает должность Президента. Это лишь вопрос времени — прежде чем наш союз распадётся. Нам нужно время на подготовку, и мы обязаны не раскрывать свои намерения."
    EEN_nf_g055:0 "Собрать поддержку"
    EEN_nf_g055_desc:0 "По всей этой великой стране разбросаны отделения Анклава — от довоенных бункеров до экспедиций, сумевших закрепиться. Многие из них могут поддержать Министра, если дело дойдёт до столкновения, но есть и те, кого мы можем склонить на свою сторону."
    EEN_nf_g056:0 "Поиск негодующих"
    EEN_nf_g056_desc:0 "Ни одна администрация такого масштаба, как Чикаго, не обходится без горстки тех, кто чувствует себя обиженным. Если мы найдём этих людей, мы сможем обратить их негодование в свою пользу."
    EEN_nf_g057:0 "Дружеские военные игры"
    EEN_nf_g057_desc:0 "Нет, мистер Министр, мы не забыли пригласить Чикаго на эти учения. Похоже, ваше приглашение затерялось где-то в эфире."
    EEN_nf_g058:0 "Перенаправление Снаряжение"
    EEN_nf_g058_desc:0 "С нашими новыми агентами, внедрёнными в администрацию Чикаго, мы смогли заставить несколько крупных партий оружия исчезнуть без следа."
    EEN_nf_g059:0 "Сокрушить Министра"
    EEN_nf_g059_desc:0 "Чикаго полагает, что, запугивая дикарей-мутантов Среднего Запада, они стали истинными лидерами Америки. Нам предстоит напомнить им: эту страну возглавляет Президент, а не какой-то Министр."
    EEN_nf_g060:0 "Уже не такой самодовольный"
    EEN_nf_g060_desc:0 "Силы Чикаго потерпели поражение, теперь не может быть никаких сомнений в том, кто управляет этой страной."

    ###Events###
    EEN_events.1.title:0 "Несколько мгновений спустя"
    EEN_events.1.desc:0 "Взрыв гнева Президента Эдема потряс полковника до глубины души. Идя по коридору, покидая покои Эдема, он едва сдерживал себя, бросая украдкой взгляд на каждую автоматическую турель и сторожевого робота. Он понимал — в любой момент они могут обратиться против него и разорвать на части, прежде чем он успеет добраться до укрытия. К счастью, всего в нескольких шагах был туалет, и он добрался туда невредимым. Глядя в зеркало и пытаясь успокоиться, страх сменился новыми чувствами. Он не смог сдержать слёз, вспоминая слова Президента. Неужели он действительно был жалок?"
    EEN_events.1.a:0 "§C*ревёть навзрыд*"
    EEN_events.2.title:0 "Клиника Лечения Атакована!"
    EEN_events.2.desc:0 "Одна из наших клиник лечения подверглась нападению повстанцев. Из-за специфики объекта охрана была слабой, и наши силы безопасности были уничтожены внезапной атакой. Камеры наблюдения показывают, что учёных, которых не убили в бою, схватили и увели в неизвестном направлении. Поисковые группы уже отправлены на их розыск."
    EEN_events.2.a:0 "Увеличьте охрану наших клиник!"
    EEN_events.2.b:0 "Вряд ли это повторится — просто единичный случай"
    EEN_events.3.title:0 "Ещё одна Клиника Атакована!"
    EEN_events.3.desc.1:0 "Как и раньше, одну из наших клиник лечения атаковали повстанцы. Но на этот раз мы были готовы. Усиленная охрана смогла отбить нападение с минимальными потерями. Выжившие мятежники бежали и преследование не велось, но теперь они дважды подумают, прежде чем нападать на наши клиники снова."
    EEN_events.3.desc.2:0 "Как и в прошлый раз, одну из наших клиник лечения атаковали повстанцы. Скудная охрана вновь была уничтожена, а ещё больше учёных утащили с собой мятежники. Чем бы они ни занимались — это нам не сулит ничего хорошего."
    EEN_events.3.a:0 "Хорошая работа"
    EEN_events.3.b:0 "Увеличьте охрану наших клиник!"
    EEN_events.4.title:0 "Радио-трансляция Повстанцев"
    EEN_events.4.desc:0 "Наши радиосигналы перехватывают повстанцы с пустошей, вероятно, при поддержке выживших писцов Братства и захваченных учёных. Они транслируют послание от Тридогнайта — того самого, кого мы считали погибшим в битве за Радиостанцию «Новости Галактики». Он предупреждает жителей Столичной Пустоши и окрестностей избегать воды, распространяемой нашими солдатами. Эти передачи идут с непредсказуемыми интервалами и всегда прерываются прежде, чем мы успеваем определить источник сигнала. Наши силы и так на пределе — можем ли мы позволить себе охоту за ними?"
    EEN_events.4.a:0 "Мы должны остановить их, неважно какой ценой!"
    EEN_events.4.b:0 "Сделаем всё возможное, чтобы остановить их!"
    EEN_events.5.title:0 "Взрывы на Холмах"
    EEN_events.5.desc:0 "На прошлой неделе незаконная трансляция Тридогнайта и повстанцев с Пустошей длилась на 4 секунды дольше обычного — этого оказалось достаточно, чтобы обнаружить сигнал. Его источник — довоенная радиостанция небольшого филиала «Новостей Галактики». Когда наши бойцы приблизились к объекту, на них открыли огонь автоматические турели, но ржавые механизмы мало что могли противопоставить их силовой броне. Внутри же здание оказалось пустым, а оборудование было настроено на случайную трансляцию голодиска. Это была последняя передача, которую мы получили, прежде чем мощный взрыв разрушил здание и всё внутри. Последующая группа подтвердила — это была, скорее всего, импровизированная мини-ядерная бомба. Мы попались в ловушку."
    EEN_events.5.a:0 "Удвойте наши усилия!"
    EEN_events.6.title:0 "Ликвидация Тридогнайта"
    EEN_events.6.desc:0 "После обнаружения нескольких точек исхода прошлых трансляций повстанцев, нам удалось выявить их маршрут. Команды были направлены к четырём вероятным следующим точкам вещания и подготовились к засаде на Тридогнайта и его приспешников. Группа ополченцев с пустошей, перебежчиков из Братства и наёмников не выдержала натиска наших солдат. Смерть Тридогнайта подтверждена — больше не стоит ждать его предупреждений о наших планах. К сожалению, наши учёные, переодетые в обычных жителей пустошей, попали под перекрёстный огонь."
    EEN_events.6.a:0 "По крайней мере, эта проблема закрыта"
    EEN_events.7.title:0 "Протест против Анклава"
    EEN_events.7.desc:0 "В одном из небольших поселений на нашей территории недавно прошёл крупный протест против Анклава. Несколько жителей пустоши выступили перед сотнями, осуждая наше правление и требуя вывода наших войск из их поселений. Хотя демонстрация не переросла в насилие, прозвучали угрозы силой выгнать наших солдат, если мы откажемся покинуть эти земли."
    EEN_events.7.a:0 "Арестуйте организаторов"
    EEN_events.7.b:0 "Это пустые разговоры"
    EEN_events.7.c:0 "Может, мы сможем придти к компромиссу"
    EEN_events.8.title:0 "Удар мини-ядерной бомбой!"
    EEN_events.8.desc:0 "Один из наших блокпостов стал местом взрыва, устроенного террористами, выступающими против нашего правления. Взрывное устройство оказалось импровизированной бомбой, собранной из старой мини-ядерной боеголовки. Миротворцы уже проводят обыски в поисках виновных, но есть более серьёзный вопрос. Мини-ядерные бомбы, хоть и редки, достаточно распространены в пустоши — за деньги практически любой пустошник может заполучить такую. Некоторые офицеры требуют запретить владение мини-ядерными бомбами и запустить программу по сбору всех боеприпасов, гуляющих по нашей территории. Это не гарантирует, что подобное не повторится, но теоретически усложнит жизнь террористам."
    EEN_events.8.a:0 "Бомбы не защищены второй поправкой"
    EEN_events.8.b:0 "Это бы их только воодушевило!"
    EEN_events.9.title:0 "Ещё один удар мини-ядерной бомбой"
    EEN_events.9.desc:0 "Ещё один наш блокпост подвергся взрыву — снова террористы, противники нашего режима, применили самодельное устройство из старой мини-ядерной боеголовки. Миротворцы всё ещё ищут виновных в предыдущей атаке и заявляют, что выходят на их след."
    EEN_events.9.a:0 "Кто мог это предсказать?"
    EEN_events.10.title:0 "Остановлены мини-ядерные терракты"
    EEN_events.10.desc.1:0 "Наконец террористы, устроившие последние мини-ядерные взрывы, были нейтрализованы — но не без потерь. Во время рейда на их главный опорный пункт в довоенном канализационном туннеле террористы подорвали ещё одно самодельное устройство, уничтожив себя и многих миротворцев, пытавшихся их задержать."
    EEN_events.10.desc.2:0 "Наконец террористы, устроившие последние мини-ядерные взрывы, были остановлены. В масштабной тайной операции агент, выдававший себя за торговца нелегальным товаром, распространил слух о тайнике с мини-бомбами, найденным старым мародёром. Террористы, испытывая дефицит боеприпасов, согласились на встречу и были мгновенно задержаны силами миротворцев. Их расстрел будет транслироваться на Радио Анклава завтра в 12:00. Пусть это станет уроком для всех подонков, решившихся на такие акты."
    EEN_events.10.a:0 "По крайней мере, всё кончено"
    EEN_events.10.b:0 "Хорошо выполненная работа!"
    EEN_events.11.title:0 "Sneedclave?"
    EEN_events.11.desc:0 "Два дня назад мы перехватили радиосвязь от группы, заявившей, что они остатки Анклава и хотят перегруппироваться. Они использовали защищённую военную частоту, поэтому разведгруппа была направлена проверить ситуацию. Люди были обнаружены в старом сельскохозяйственном магазине «Sneeds Seed & Feed». Пятеро человек назвали себя «Sneedclave» — остатками Анклава они явно не являются. Их так называемая силовая броня — всего лишь плохо окрашенные металлические доспехи, грубо слепленные под силовую броню. Тем не менее, они выглядят искренними в своём желании «перегруппироваться» с Анклавом..."
    EEN_events.11.a:0 "Мы не примем грязных мутантов!"
    EEN_events.11.b:0 "Пушечное мясо есть пушечное мясо."
    EEN_events.12.title:0 "Неприятный инцидент"
    EEN_events.12.desc:0 "Мэр небольшого поселения на нашей окраине пришёл с тревожными новостями. Один из местных боссов, с кем мы заключили сделку, сжёг половину их поселения дотла и утащил нескольких женщин. Мэр жаждет крови — эта банда явно вышла за рамки нашего соглашения. Но усмирить этих подонков будет не просто."
    EEN_events.12.a:0 "Скажите банде, чтобы те исправились"
    EEN_events.12.b:0 "Раздавите этих мятежников!"
    EEN_events.12.c:0 "Приведите их на суд и приготовьте верёвку"
    EEN_events.13.title:0 "Рейдеры снова наносят удар!"
    EEN_events.13.desc:0 "Рейдеры, которых мы в прошлый раз отпустили с предупреждением после сожжения половины города, снова подняли волну беспорядков. Похоже, что снисхождение лишь раздуло амбиции их лидера — он пытается расширить свою неофициальную территорию. На этот раз его люди атаковали военный караван снабжения и унесли несколько ящиков с оружием. Нужно придавить этого выскочку, пока он не превратил это в полномасштабное восстание."
    EEN_events.13.a:0 "Никаких переговоров, никаких судов, убить их всех!"
    EEN_events.14.title:0 "Договор расторгнут, сучки"
    EEN_events.14.desc:0 "Эти оборванные выскочки, возомнившие себя выше законов Америки, были уничтожены. Взвод солдат ворвался в их убежище поздно ночью и расправился с этими предателями. Это должно послужить другим серьёзным напоминанием о необходимости помнить об условиях наших соглашений."
    EEN_events.14.a:0 "Придерживайтесь договорённости или будете уничтожены."
    EEN_events.15.title:0 "Рейдеры сдерживают нас!"
    EEN_events.15.desc:0 "Наши солдаты встретили ожесточённое сопротивление при попытке вычистить рейдеров, которые доставляли нам проблемы в последнее время. Эти подонки явно усилились с последней проверки — украденные ящики с продвинутым оружием только усугубили ситуацию. Теперь этот бандитский король укрепляет позиции, и выбить его придётся затяжной наступательной операцией — это будет долгий и тяжёлый бой."
    EEN_events.15.a:0 "Чего бы это ни стоило, мы не можем этого допустить!"
    EEN_events.16.title:0 "Спор между частными рейдерами"
    EEN_events.16.desc:0 "Наши отношения с бандитами, которых мы приняли под крыло, всегда были натянутыми, но такого мы не ожидали. Два разных капитана частных рейдеров пришли к нам с претензиями на территорию у наших границ. Мы никогда не устанавливали официальных правил, кто и где может грабить — только за пределами наших владений. Теперь они требуют, чтобы мы разрешили спор, иначе решат его по-старинке — силой."
    EEN_events.16.a:0 "Придерживаться одной стороны"
    EEN_events.16.b:0 "Заварить кофе и начинать вырабатывать соглашение"
    EEN_events.16.c:0 "Пусть решают по-своему."
    EEN_events.17.title:0 "Пересмотр рейдерских соглашений"
    EEN_events.17.desc:0 "После урегулирования споров между частными рейдерами на наших землях, часть администрации предложила выработать новые соглашения с нашими наёмниками. Ввести жёсткие правила, закрепить территории и, возможно, взять часть из них в прямое подчинение."
    EEN_events.17.a:0 "Создать официальное частное агентство"
    EEN_events.17.b:0 "Давайте немного подтянем поводок."
    EEN_events.17.c:0 "Статус-кво работает и останется на месте"
    EEN_events.18.title:0 "Грабеж и коррупция"
    EEN_events.18.desc:0 "Как и следовало ожидать, рейдеры — далеко не чистые и благородные блюстители порядка. С окраин поступают тревожные новости: рейдерские копы берут взятки, торгуют наркотиками и используют свою власть, чтобы устранять конкурентов и любопытных. Если мы не возьмём это под жёсткий контроль — это может обернуться катастрофой."
    EEN_events.18.a:0 "Привлечь явных нарушителей и положить этому конец"
    EEN_events.18.b:0 "Нам необходимо полное расследование!"
    EEN_events.18.c:0 "Незаметно заставьте каждого подозреваемого исчезнуть"
    EEN_events.19.title:0 "Чтобы поймать преступника..."
    EEN_events.19.desc:0 "Говорят, чтобы поймать преступника, иногда нужен другой преступник. В этом есть доля правды — один из бывших рейдерских копов на Востоке смог раскрыть крупный контрабандный канал, через который нашим врагам переправляли продвинутое оружие. Но есть одна проблема — среди обвиняемых оказались люди из Анклава. Победа, но шаткая и опасная."
    EEN_events.19.a:0 "Расстрелять предателей!"
    EEN_events.19.b:0 "Возможно, нам придётся снизить обвинения для этих солдат."
    EEN_events.19.c:0 "Похвалить офицеров, но оставить солдат в покое."
    EEN_events.20.title:0 "Рейдерские стычки на границе"
    EEN_events.20.desc:0 "Из-за нашего нежелания вмешиваться в территориальный конфликт между двумя группами частных рейдеров, банды начали открыто драться друг с другом. Обычно несколько мелких стычек мы считаем неприятными, но полезными — они держат порядок. Но сейчас ситуация может выйти из-под контроля, если мы не вмешаемся вовремя."
    EEN_events.20.a:0 "Пусть дерутся"
    EEN_events.20.b:0 "Верните их за стол переговоров"
    EEN_events.20.c:0 "Уничтожить обе эти группы за нарушение общественного порядка"
    EEN_events.21.title:0 "Презираемая сторона"
    EEN_events.21.desc:0 "Раньше мы поддержали одну из банд частных рейдеров в территориальном споре. Тогда это казалось разумным ходом, но теперь это возвращается к нам боком. Банда, против которой мы выступили, начала наносить удары прямо на нашей территории, пытаясь компенсировать потерянный грабёж. Как нам ответить?"
    EEN_events.21.a:0 "Уничтожьте их"
    EEN_events.21.b:0 "Отправьте за ними другую банду"
    EEN_events.22.title:0 "Успешная зачистка"
    EEN_events.22.desc:0 "Ранним утром винтокрылы обрушились на небольшой лагерь рейдеров на нашей границе. Те, кто оказал сопротивление, были быстро уничтожены. Остальные ждут скорого суда и казни за преступления против Америки."
    EEN_events.22.a:0 "Хорошая работа"
    EEN_events.23.title:0 "Длительная перестрелка"
    EEN_events.23.desc:0 "Отряд солдат столкнулся с более жёстким сопротивлением, чем ожидалось, при зачистке рейдерского лагеря на нашей территории. Потери были, но в итоге вся вражеская оборона была полностью уничтожена."
    EEN_events.23.a:0 "Необходимая цена за безопасность"
    EEN_events.24.title:0 "Рейдеры сбежали"
    EEN_events.24.desc:0 "Рейдеры, на которых нацелилась недавняя зачистка, сумели покинуть лагерь за ночь до нашего удара — прямо у носа разведчиков. Наши попытки стабилизировать регион идут насмарку, и мы снова оказываемся в исходной точке."
    EEN_events.24.a:0 "Не позвольте им снова улизнуть"
    EEN_events.25.title:0 "Ловушка рейдеров"
    EEN_events.25.desc:0 "Отряд солдат, направленный на зачистку лагеря рейдеров, понёс тяжёлые потери и был вынужден отступить, обнаружив, что то, что казалось слабо охраняемой лачугой, на самом деле оказалось огромной системой подземных туннелей с ловушками. Этот позорный провал лишь придаст врагу смелости."
    EEN_events.25.a:0 "Чудовищный провал"
    EEN_events.26.title:0 "Запасы рейдеров изъяты"
    EEN_events.26.desc:0 "Недавний рейд на жилище, считавшееся гнездом анархистской швали, прошёл лучше, чем ожидалось. Сопротивление было быстро сломлено, а место оказалось важным складом снабжения. Большое количество оборудования и средств было захвачено — тяжёлый удар по врагу и значительная добыча для нас."
    EEN_events.26.a:0 "Найдите этому достойное применение"
    EEN_events.27.title:0 "Возвращение Джеймса"
    EEN_events.27.desc:0 "Почти двадцать лет назад Джеймс покинул Проект «Чистота», но теперь вернулся из Убежища 101, пытаясь сделать вид, что ничего не случилось. Он утверждает, что получил серьёзные зацепки из терминалов убежища — время покажет. Но с помощью своего ребёнка ему удалось убедить несколько учёных бросить свои проекты и последовать за ним к Мемориалу Джефферсона. Что из этого выйдет — неизвестно, но если они действительно близки к созданию масштабного источника чистой воды, нам стоит взять контроль раньше, чем это сделают другие."
    EEN_events.27.a:0 "У нас есть ещё время"
    EEN_events.28.title:0 "Слухи об очистителе воды"
    EEN_events.28.desc:0 "Годами наши разведгруппы слышали слухи о крупном проекте очистки воды в Мемориале Джефферсона, который был заброшен некоторое время назад. Многие списывали эту идею как бред обезвоженных пустошников, но немногие наши учёные утверждали, что такой проект хотя бы теоретически осуществим. Тем не менее, из-за неспособности завершить работу проект был заброшен и не стоил внимания Анклава. Пока агент, наблюдающий за поселением Ривет-Сити, не сообщил, что конвой учёных, охраны и помощников покинул Ривет-Сити и направился к Мемориалу Джефферсона. Они просят направить подкрепление для более тщательного изучения ситуации."
    EEN_events.28.a:0 "Теперь это заслуживает нашего внимания"
    EEN_events.29.title:0 "Живая вода"
    EEN_events.29.desc:0 "Учёные Проекта «Чистота» пришли к Совету с просьбой о официальной поддержке Ривет-Сити для завершения очистителя. Они уверяют, что почти закончили работу, но им не хватает нескольких ресурсов, которые мы можем предоставить. Без нашей помощи им придётся обратиться к Братству Стали — а это значит полный контроль Братства над проектом. После напряжённых переговоров мы выработали возможное соглашение: большая часть воды достанется Ривет-Сити, а учёные смогут сохранить немного для гуманитарных целей. Теперь нам остаётся лишь выполнить свою часть сделки."
    EEN_events.29.a:0 "Давайте приступим к делу!"
    EEN_events.30.title:0 "Разрушен водораспределительный узел"
    EEN_events.30.desc:0 "В одной из наших провинций разрушен водораспределительный центр."
    EEN_events.31.title:0 "Как ты будешь действовать?"
    EEN_events.31.desc:0 "Ладно, мистер Компьютер, вот твой момент истины — решай, как будешь управлять Анклавом в этой игре. Станешь ли ты на сторону своего металлического брата и сделаешь всё, чтобы Эдем возглавил президентство? Или предпочтёшь путь полковника Отэма? А может, сыграешь за Отэма, но сделаешь его настоящим ублюдком, который почти всегда выбирает самые отстойные решения в ключевых моментах?"
    EEN_events.31.a:0 "Президент Эдем"
    EEN_events.31.b:0 "Полковник Отэм"
    EEN_events.31.c:0 "Ублюдкокомандующий Отэм"
    EEN_events.32.title:0 "Детские плакаты Анклава"
    EEN_events.32.desc:0 "Полковник Отэм привык, что его вызывают на встречи с президентом Эдемом, когда тот разрабатывал новые планы или политики. Но на этот раз всё было иначе. Компьютер почти звучал взволнованно, когда позвал полковника к себе. Отэм не знал, чего ожидать, войдя в главный серверный зал президента, но точно не мог предсказать то, что увидел. Президент провёл часы — а для компьютера ZAX это огромный срок — создавая плакаты и билборды, чтобы рекламировать Анклав, когда о его присутствие станет известно. Пропаганда такого рода всегда была частью плана, когда Анклав откроется Столичной Пустоши, но что-то было не так. На каждом плакате был изображён уверенный мужчина в костюме, почти как талисман Анклава. Когда полковник понял, что именно он видит, не смог сдержать слов и выпалил: \n\n§B«Что это за хрень? Это твоя, чёрт возьми, человеческая маска? Это же полный позор!»§! Эдем необычно долго молчал. Он ощущал в себе новую аномалию в программном коде. Он пожалел, что делился этим проектом с Отэмом и начал сомневаться — не ошибка ли это была? Не то ли это то, что люди называют стыдом? Через несколько мгновений Эдем ответил полковнику."
    EEN_events.32.a:0 "Ты прав, это было плохой идеей."
    EEN_events.32.b:0 "ТЫ ПОЗОР!"
    EEN_events.33.title:0 "Покушение на убийство"
    EEN_events.33.desc:0 "Во время визита в местный гарнизон, Главнокомандующий Отэм едва увернулся от пули снайпера. Покушавшийся был задержан — им оказался один из охранников поселения. Допросы продолжаются, но пока не ясно, насколько глубоко замешаны остальные стражи города, или стрелок действовал в одиночку. Кабинет Отэма требует немедленного ответа на эту дерзкую провокацию — иначе мы покажемся слабыми и потеряем контроль над населением. Что прикажете делать?"
    EEN_events.33.a:0 "Транслируйте казнь убийцы"
    EEN_events.33.b:0 "Уничтожьте всю городскую стражу за возможное сотрудничество"
    EEN_events.33.c:0 "Уничтожить поселение за укрытие этого радикала"
    EEN_events.34.title:0 "Стычки с Компанией «Коготь»"
    EEN_events.34.desc:0 "Агенты Анклава, расследовавшие сеть контрабанды оружия, оказались втянуты в затяжной бой с наёмниками Компании «Коготь», нанятыми контрабандистами. Когда подкрепление в силовой броне прибыло, оставшиеся в живых контрабандисты и наёмники без промедления сдались. Руководство Компании «Коготь» утверждает, что их наёмники были наняты для законной охранной работы, а вся эта незаконная деятельность, якобы выходила за рамки контракта. В ответ компания уже уволила тех выживших наёмников, что находятся в нашем плену. Общественность требует сурового наказания для Компании «Коготь» в целом — многие публичные фигуры заявляют, что это лишь первая раскрытая история из множества преступлений, которые наёмники «Когтя» регулярно совершают, прикрываясь крышками и угрозами. В то же время часть нашего кабинета выступает против жёстких мер, отмечая, что Компания «Коготь» — ценный актив, а их предполагаемые преступления в основном направлены против жителей пустоши, так что особой угрозы для нас это не представляет."
    EEN_events.34.a:0 "Напомните Компании «Коготь», что они обязаны соблюдать наши законы"
    EEN_events.34.b:0 "Наложить большие штрафы на Компанию «Коготь»"
    EEN_events.34.c:0 "Необходимо полное расследование деятельности Компании «Коготь»"
    EEN_events.35.title:0 "Вооруженное восстание!"
    EEN_events.35.desc:0 "Одно из наших отдалённых поселений стало местом множества вооружённых стычек между нашими патрулями и партизанами. Нападавшие обычно уносят своих убитых и скрываются в горах. Пока неясно, кто стоит за этим всплеском атак и кто их вооружает, но наш местный начальник службы безопасности говорит, что с несколькими дополнительными бойцами он смог бы серьёзно подавить эту угрозу."
    EEN_events.35.a:0 "Отправьте ему поддержку!"
    EEN_events.35.b:0 "Отправьте Компанию «Коготь»!"
    EEN_events.35.c:0 "У него уже достаточно поддержки"
    EEN_events.36.title:0 "Поразительное откровение"
    EEN_events.36.desc:0 "Недавняя стычка между нашими силами и вооружёнными партизанами в неспокойной провинции привела к шокирующему открытию. При отступлении нападавшие забыли одного из своих погибших — им оказался член местного ополчения. Винтовка, которую он носил, тоже была из нашей недавней поставки! Многие в военной администрации возмущены и требуют всего — от введения военного положения до полного сноса поселения. Мэр поселения утверждает, что этот партизан — исключение, который неправомерно присвоил оружие, и настаивает, что его охрана — верные жители пустоши, настоящие американцы."
    EEN_events.36.a:0 "Охотьтесь за партизанами, ничего больше"
    EEN_events.36.b:0 "Наказать поселение"
    EEN_events.36.c:0 "Очистите их ополчение"
    EEN_events.36.d:0 "Покажите пример мэру и капитану милиции"
    EEN_events.37.title:0 "Восстание распространяется"
    EEN_events.37.desc:0 "Неблагодарные из той деревни, что прикрывают этих партизан с пустошей, расползаются, как радтараканы, по соседним поселениям и подливают масло в огонь недовольства. Наши патрули докладывают о растущем числе нападений уже за пределами той проблемной зоны. В этих непокорных поселениях наши люди сталкиваются с антианклавовской пропагандой, граффити и даже бросанием мусора в патрульных. Они ждут от нас решения, как справиться с этой угрозой."
    EEN_events.37.a:0 "Продолжайте охотиться на мятежников"
    EEN_events.37.b:0 "Поселенцы, выступающие против анклава, будут арестованы"
    EEN_events.37.c:0 "Сжечь дотла непокорные поселения"
    EEN_events.38.title:0 "Лагерь мятежников найден"
    EEN_events.38.desc:0 "Наши усилия по вылавливанию повстанцев в этих непокорных поселениях не прошли даром. После месяцев блужданий по холмам мы наконец-то наткнулись на их главный лагерь, и они устроили жалкое последнее сопротивление, когда наши силы в силовой броне вошли в бой. Судя по виду лагеря, это была основная база операций и склад снабжения повстанцев. Без этой базы немногие уцелевшие партизаны вряд ли смогут доставить нам ещё какие-то проблемы."
    EEN_events.38.a:0 "Хорошо проделанная работа"
    EEN_events.39.title:0 "Братство напугано?"
    EEN_events.39.desc:0 "За последние три месяца наши солдаты на Проекте «Чистота» готовились к атаке Братства Стали, которая так и не состоялась. За исключением нескольких скитальцев, устроившихся на другой стороне реки в Пентагоне, охрана объекта не заметила ни одного террориста в силовой броне Т-45 за всё время дежурства. За это время мы укрепили оборону, расширили зоны высадки и перераспределили войска, которые теперь готовы выдвинуться с базы. Почти настало время перейти через реку и выбить этих трусов с правительственной земли."
    EEN_events.39.a:0 "Странно"

    ###Decision Events###
    EEN_decision_events.1.title:0 "Научная команда в безопасности"
    EEN_decision_events.1.desc:0 "Учёные и их охрана в Убежище Когтей Смерти были успешно эвакуированы без единого инцидента. К счастью, жители пустоши и Братство Стали обходят это место стороной из-за высокой популяции когтей смерти, поэтому наши винтокрылы смогли спокойно приземлиться и взлететь, не подвергаясь обстрелу."
    EEN_decision_events.1.a:0 "Хорошо выполненная работа"
    EEN_decision_events.2.title:0 "Спасательная команда уходит в темноту"
    EEN_decision_events.2.desc:0 "К сожалению, пилот нашей спасательной команды неправильно прочитал координаты посадки и разбился недалеко от Убежища Когтей Смерти. Последний радиосигнал, который мы получили от научной группы, содержал сообщение о текущей ситуации и их намерениях спуститься с возвышенности, чтобы спасти экипаж винтокрыла. С тех пор связи с ними не было, и мы вынуждены предполагать, что они погибли."
    EEN_decision_events.2.a:0 "Мы уже ничего не можем для них сделать"
    EEN_decision_events.3.title:0 "Удачная спасательная операция"
    EEN_decision_events.3.desc:0 "Солдаты, которым требовалась эвакуация в Вашингтоне, достойно сдерживали наступление Братства Стали. Спасательная команда быстро ворвалась на позицию и успела погрузить выживших, после чего взлетела, получив лишь несколько лазерных выстрелов, которые не более чем поцарапали краску винтокрыла."
    EEN_decision_events.3.a:0 "Хорошо выполненная работа"
    EEN_decision_events.4.title:0 "Тяжёлая спасательная операция"
    EEN_decision_events.4.desc:0 "Как и следовало ожидать, спасение солдат, застрявших в центре Вашингтона, обошлось с ограниченными потерями. Большинство винтокрылов благополучно вернулись, но последний винтокрыл был поражён ракетой Братства Стали и взорвался в огненной вспышке. Выживших не было."
    EEN_decision_events.4.a:0 "Примерно как и ожидалось"
    EEN_decision_events.5.title:0 "Полная катастрофа"
    EEN_decision_events.5.desc:0 "Мы слишком долго откладывали спасение этих солдат. К моменту приземления наших винтокрылов на зоне высадки их позиции уже были прорваны, а рыцари Братства Стали заполонили площадку. Последний сигнал, который мы получили, был от паникующего пилота, пытавшегося взлететь, но он так и не вернулся на базу."
    EEN_decision_events.5.a:0 "Какой беспорядок"
    EEN_decision_events.6.title:0 "Успешная спасательная операция"
    EEN_decision_events.6.desc:0 "Наша спасательная команда без труда прорвалась через оборону Форта Константин и вывела патруль из ловушки, пока ни один из Изгой, патрулировавших окрестности, даже не заподозрил что-либо. Несмотря на то, что выжившие проходят лечение от истощения, через несколько дней они будут готовы вернуться на передовую."
    EEN_decision_events.6.a:0 "Хорошо выполненная работа"
    EEN_decision_events.7.title:0 "Спасательная команда потеряна"
    EEN_decision_events.7.desc:0 "Мы не получали известий от спасательной команды и солдат в ловушке уже несколько дней. Можно лишь предполагать, что они столкнулись с чем-то в недрах Форта Константин, с чем не смогли справиться."
    EEN_decision_events.7.a:0 "Мы оплакиваем погибших"
    EEN_decision_events.8.title:0 "Провал эвакуации Анклава"
    EEN_decision_events.8.desc:0 "Некоторые остатки рассеянных сил Анклав в Вашингтоне были уничтожены при попытке эвакуации на винтокрылах. Наши рыцари уничтожили оставшихся солдат и их спасателей, захватив при этом несколько винтокрылов."
    EEN_decision_events.8.a:0 "Хорошая работа, Братья"
    EEN_decision_events.9.title:0 "Пыль и отголоски"
    EEN_decision_events.9.desc:0 "Как мы, возможно, и ожидали, от поста Наварро не поступило никакого ответа. Будем надеяться, что эти смелые мужчины и женщины сумели выжить."
    EEN_decision_events.9.a:0 "Оберните это в нашу пользу"
    EEN_decision_events.10.title:0 "Помощь из Чикаго"
    EEN_decision_events.10.desc:0 "После нескольких попыток нам наконец удалось установить связь с базой Анклава в Чикаго. У них, похоже, тоже свои проблемы, но они всё же направляют группу солдат для помощи нам. При этом они рассчитывают, что когда-нибудь мы отплатим им тем же."
    EEN_decision_events.10.a:0 "Мы приветствуем их солдат"
    EEN_decision_events.11.title:0 "Ответ Уайтспрингс"
    EEN_decision_events.11.desc:0 "Мы надеялись, что вы снова выйдете на связь. С тех пор многое изменилось, и нам предстоит многое обсудить. Вместе мы сможем совершить великие дела... мой друг."
    EEN_decision_events.11.desc.2:0 "Нам... очень жаль слышать о президенте Эдеме. Сейчас мы не можем предложить помощь, но у нас будет кое-что для вас... когда вы окажетесь в наших краях."
    EEN_decision_events.11.a:0 "Зловеще"
    EEN_decision_events.12.title:0 "Помощь Онтарио"
    EEN_decision_events.12.desc:0 "Ни одна из попыток связаться с бункером Анклава в Онтарио не увенчалась успехом. Прошло уже довольно много времени с момента нашего последнего контакта, и пока неясно, были ли они уничтожены или же соблюдают строгое радиомолчание. В любом случае, сейчас у нас слишком много дел, чтобы заниматься их проверкой."
    EEN_decision_events.12.a:0 "Мы должны заглянуть к ним в будущем"
    EEN_decision_events.13.title:0 "Жалкая атака на форпост Братства"
    EEN_decision_events.13.desc:0 "Хотя это и не стало для нас сюрпризом, всё же неприятно видеть, что отборные бойцы Компании «Коготь», направленные на форпост Братства, оказались лишь мишенями для тренировочной стрельбы. Они были быстро уничтожены защитниками, не причинив противнику ни единой потери."
    EEN_decision_events.13.a:0 "СКОЛЬКО мы им за это заплатили?"
    EEN_decision_events.14.title:0 "Жалкая атака на форпост Братства"
    EEN_decision_events.14.desc:0 "Те, кто рвался попасть в Компанию «Коготь», наглядно показали, почему им не место в наших рядах. Их жалкая атака на форпост Братства, куда мы их направили, даже не поцарапала броню рыцаря. Надеюсь, наши заказчики из Рэйвен-Рока помнят, что мы не отправляли бойцов высокого класса и не гарантировали никаких результатов."
    EEN_decision_events.14.a:0 "По крайней мере нам заплатили"
    EEN_decision_events.15.title:0 "Они называют это атакой?"
    EEN_decision_events.15.desc:0 "Отряд рыцарей доложил, что их атаковали, поначалу приняв за обдолбавшихся рейдеров на окраинах нашей территории. К счастью, никто на посту не пострадал, и лишь после обыска поверженных нападавших выяснилось, что это были не жалкие рейдеры, а наёмники Компании «Коготь». Эта позорная неудача вызывает множество вопросов, поскольку полностью противоречит всем имеющимся у нас отчётам об организации и боевых возможностях Компании «Коготь»."
    EEN_decision_events.15.a:0 "Может быть, это ритуал посвящения?"
    EEN_decision_events.16.title:0 "Успешная стычка"
    EEN_decision_events.16.desc:0 "Мы получили отчёт от Компании «Коготь» о штурме форпоста Братства, который мы наняли их провести. Рекруты, направленные на небольшой пост, показали себя примерно так, как и ожидалось: понесли серьёзные потери, но успели нанести немного урона, прежде чем тихо отступить обратно на базу. Ничего выдающегося, но за свои деньги вы получаете ровно то, за что платите."
    EEN_decision_events.16.a:0 "Вот так, Лайонс!"
    EEN_decision_events.17.title:0 "Несколько многообещающих"
    EEN_decision_events.17.desc:0 "Те, кого мы отправили атаковать форпост Братства, в самом деле сумели убить нескольких из них. Конечно, мы понимали, что многие из этих неумёх не вернутся обратно. Но те, кто выжил, показали себя с хорошей стороны. Они доказали, что умеют сражаться, и допущены к дальнейшей подготовке."
    EEN_decision_events.17.a:0 "Мы сделаем из них солдат"
    EEN_decision_events.18.title:0 "Тревожная прелюдия?"
    EEN_decision_events.18.desc:0 "Столкновения с наёмниками Компании «Коготь» — дело привычное. Раньше уже были случаи, когда отряд рыцарей, отправленный на поиски довоенной базы, обнаруживал, что наёмники уже заняли её и отказывались уходить. Несмотря на это, нам обычно удавалось избегать прямых столкновений. Однако недавно небольшой отряд наёмников предпринял скоординированную атаку на пост на наших окраинах. Хотя их отбили, в бою мы потеряли нескольких рыцарей и послушников. Этот пост не имел для «Когтей» ни стратегической, ни ресурсной ценности. Неужели кто-то мог заплатить им за это? И если да — зачем?"
    EEN_decision_events.18.a:0 "Будем надеяться, что так больше не будет."
    EEN_decision_events.19.title:0 "Почти слишком хорошо, чтобы быть правдой"
    EEN_decision_events.19.desc:0 "Компания «Коготь» недавно доложила о нападении, которое мы наняли их провести на пост Братства. Немногие офицеры поверили этому отчёту, но робо-глаза разведчики подтвердили его достоверность. Команда призывников Компании «Коготь», направленная на штурм поста, застала рыцарей полностью врасплох и почти полностью уничтожила гарнизон. Несколько оставшихся в живых бойцов Братства бежали, оставив пост и склад с ценным оборудованием, которое теперь принадлежит «Когтю». Наши стратеги сейчас тщательно анализируют отчёт — как для выявления слабых мест Братства, так и для того, чтобы избежать ошибок при борьбе с закалёнными в боях обитателями Пустоши."
    EEN_decision_events.19.a:0 "Этот контракт полностью выполнен"
    EEN_decision_events.20.title:0 "«Стальные Пронзатели»"
    EEN_decision_events.20.desc:0 "Отправленные нами новобранцы для атаки форпоста Братства превзошли все ожидания. Их наблюдатель докладывает, что они сражались как разъярённые яо гай, прорвавшись сквозь ошеломлённых рыцарей и послушников Братства, словно те были бумажными мишенями. И это ещё не всё — осмотрев захваченный пост, они обнаружили почти целый арсенал, оставленный врагом. По распоряжению Командира этих бойцов объединили под руководством многообещающего лейтенанта в подразделение «Стальные Пронзатели». Если Братство когда-нибудь решит вернуть своё добро, эти ребята заставят их хорошо подумать."
    EEN_decision_events.20.a:0 "Добро пожаловать в Компанию «Коготь»"
    EEN_decision_events.21.title:0 "Надвигается война?"
    EEN_decision_events.21.desc:0 "Несколько израненных рыцарей доложили, что их форпост был захвачен, по всей видимости, подразделением самых элитных бойцов Компании «Коготь». Это кардинально меняет нашу обычную динамику с этой группировкой, ведь обычно мы стараемся не пересекаться, если только они не заняли склад с нужными нам технологиями. Рыцарям и паладинам на нашем периметре рекомендовано внимательно следить за передвижениями Компании «Коготь» и быть готовыми к возможной атаке. Либо «Коготь» готовится к масштабному наступлению, либо кто-то хорошо заплатил им, чтобы они бросили на нас своих лучших бойцов."
    EEN_decision_events.21.a:0 "Кто им за это платит?"
    EEN_decision_events.22.title:0 "«Когти» рейдят караваны"
    EEN_decision_events.22.desc:0 "Компания «Коготь» доложила о своих недавних налётах на караваны, следующие по торговым путям вокруг поселений Столичной Пустоши. Их атаки прервали торговлю на нескольких участках маршрутов вокруг Столицы. Конечно, торговцы адаптируются, и вскоре всё вернётся к обычному ритму, но эти нападения нанесут им ощутимый урон в краткосрочной перспективе."
    EEN_decision_events.22.a:0 "Хорошо выполненная работа"
    EEN_decision_events.23.title:0 "Увеличение числа атак караванов!"
    EEN_decision_events.23.desc:0 "За последний месяц количество атак на караваны заметно возросло — их стало гораздо больше обычного. Пока слишком рано утверждать, что все эти нападения связаны между собой, но по крайней мере трое выживших сообщили, что именно наёмники Компании «Коготь» совершали атаки. Теперь остаётся вопрос: зачем Компания «Коготь» это сделала? Эти наёмники далеко не дружелюбны, однако обычно они не нападают просто так — либо вы слишком близко подошли к одной из их баз, либо кто-то хорошо заплатил за эти нападения."
    EEN_decision_events.23.a:0 "Кто им за это заплатит?"
    EEN_decision_events.24.title:0 "Столичное здание"
    EEN_decision_events.24.desc:0 "Национальная Аллея находится в постоянном состоянии конфликта. Рейдеры, супермутанты и даже рыцари Братства Стали сражаются за каждую улицу и здание. Теперь ещё и Компания «Коготь» борется с супермутантами за контроль над зданиями Конгресса. В этих развалинах, похоже, нет ничего ценного для нас, но по крайней мере было убито много супермутантов."
    EEN_decision_events.24.a:0 "Достаточно хороший результат"
    EEN_decision_events.25.title:0 "Кузницы Питтсбурга"
    EEN_decision_events.25.desc:0 "Довоенный Питтсбург был крупным промышленным центром в довоенной Америке. Даже после Великой Войны и столетий страданий от болезни Трогов, поразившей регион, Питт продолжал процветать как индустриальный центр, снабжавший боеприпасами многие общины Пустоши. Хотя предотвращение и лечение болезни Трогов всё ещё остаётся далёкой перспективой, наши инженеры совершили то, что многие считали невозможным. Они превратили Питтсбург в место, где люди действительно захотят жить. Благодаря ремонту большого числа зданий, установке фильтров воздуха уровня убежища и соединению этих зданий герметичными туннелями, наши инженеры создали нечто, что можно назвать наземным убежищем. Выжившие из Пустоши уже стекаются в это новое поселение с обещанием стабильной работы по сбору ресурсов в остатках города для поддержки военной машины. Им лишь нужно быть осторожными, чтобы не задерживаться слишком долго на улице."
    EEN_decision_events.25.a:0 "Зажигайте кузницы, нам нужно вернуть страну!"
    EEN_decision_events.26.title:0 "Троги сбежали"
    EEN_decision_events.26.desc:0 "Собранные нами троги, предназначенные для выпуска на наших врагов, каким-то образом вырвались из контейнеров и успели убить нескольких солдат, прежде чем были уничтожены. Мы продолжаем расследование причин этого инцидента, но предварительные данные указывают на дефекты производства, допущенные рабами из Питтсбурга."
    EEN_decision_events.26.a:0 "У этих мутантов отсутствует рабочая этика"
    EEN_decision_events.27.title:0 "Атака Мутантов!"
    EEN_decision_events.27.desc:0 "Винтокрылы над передовой были привычным зрелищем для наших солдат, но на этот раз всё было иначе. Несколько винтокрылов доставили за наши линии большие стальные контейнеры, которые затем сбросили. Когда наши бойцы подошли проверить их, контейнеры раскрылись, выпуская голодных мутантов! Целые отряды были уничтожены, а теперь эти чудовища бесчинствуют по территории, сея хаос и разрушения!"
    EEN_decision_events.27.a:0 "Выследите их!"
    EEN_decision_events.28.title:0 "Винтокрылы сбиты"
    EEN_decision_events.28.desc:0 "Когда наши винтокрылы пролетали над вражескими позициями, чтобы сбросить груз с трогами, их сбили вражеские зенитные установки. Операция признана полностью проваленной."
    EEN_decision_events.28.a:0 "Они за это заплатят!"
    EEN_decision_events.29.title:0 "Успешная партия"
    EEN_decision_events.29.desc:0 "Команды, отправленные для сбора группы испытуемых для опытов с ВРЭ, нашли множество подходящих кандидатов. Испытуемые показали высокую устойчивость — уровень неудач составил всего около 20%. После стандартных процедур индоктринации и принуждения у нас теперь есть несколько сотен супермутантов, готовых к отправке на передовую."
    EEN_decision_events.29.a:0 "Отличная работа"
    EEN_decision_events.30.title:0 "Унылая партия"
    EEN_decision_events.30.desc:0 "Собранные нашими командами испытуемые для опытов с ВРЭ не оправдали ожиданий. Более 90% мутантов, подвергшихся воздействию ВРЭ, либо погибли, либо превратились в отвратительных чудовищ, которые были не только ужасны на вид, но и совершенно бесполезны для нашей военной кампании. Эта партия была уничтожена."
    EEN_decision_events.30.a:0 "Пустая трата ВРЭ"
    EEN_decision_events.31.title:0 "Группа захвата уничтожена"
    EEN_decision_events.31.desc:0 "Команда, отправленная для сбора группы испытуемых для опытов с ВРЭ, полагала, что обнаружила необороняемую деревню с подходящими кандидатами. Однако это оказалась ловушка, устроенная хитрыми мутантами, и команда была полностью уничтожена."
    EEN_decision_events.31.a:0 "Они будут отомщены"
    EEN_decision_events.32.title:0 "Ответ от Космического центра Ван Бюрен"
    EEN_decision_events.32.desc:0 "Солдаты и учёные, которых мы направили для поддержки аванпоста Анклава во Флориде, справляются хорошо. Однако они отказываются возвращаться в общий строй, настаивая, что их новая миссия важнее. Более того, у них хватает наглости требовать дополнительных людей и ресурсов."
    EEN_decision_events.32.a:0 "Это исключенно!"
    EEN_decision_events.32.b:0 "На всякий случай, если дела пойдут плохо..."
    EEN_decision_events.33.title:0 "ЗАПАД ПАЛ"
    EEN_decision_events.33.desc:0 "МЫ НЕ МОЖЕМ ДОСТИЧЬ ФОРПОСТА НАВАРОИНО! НОВЫЙ ЧУДИФОРНИЯ РЕЧУДЛИК, ДОЛЖНО БЫЛ ИХ РАЗДРОШИТЬ!!!1! КАК ЭТО МОГЛО СЛУЧИТЬСЯ? АНКЛАВ ТЕХНОЛОГИЧНЕН И ЗАЧИЩЕН!"
    EEN_decision_events.33.a:0 "МИЛЛИОНЫ МУТАНТОВ ДОЛЖНЫ УМЕРЕТЬ"
    EEN_decision_events.34.title:0 "Рэйвен-Рок отказывается помогать!"
    EEN_decision_events.34.desc:0 "Рэйвен-Рок недавно восстановил связь с нашей базой. Однако радостное настроение быстро сменилось разочарованием: они отказались направить дополнительную поддержку и даже потребовали вернуть солдат, которых отправляли для помощи нашей миссии много лет назад. В ответ мы немедленно прекратили с ними всяческие переговоры."
    EEN_decision_events.34.a:0 "Мы продолжаем по плану"
    EEN_decision_events.35.title:0 "Рэйвен-Рок отправляет помощь!"
    EEN_decision_events.35.desc:0 "Рэйвен-Рок недавно восстановил связь с нашей базой. Мы были обеспокоены, когда они потребовали вернуть солдат, которых отправляли помочь нам много лет назад, но после разъяснений им была показана важность нашей миссии. Более того, они согласились на нашу просьбу направить дополнительные войска!"
    EEN_decision_events.35.a:0 "Добро пожаловать во Флориду!"
    EEN_decision_events.36.title:0 "Помощь с Запада"
    EEN_decision_events.36.desc:0 "Сегодня у ворот Республики появилась крупная группа наёмников из Компании «Коготь». Их лидер заявил, что они были наняты неким неизвестным благодетелем, чтобы обеспечить победу Президента в этой войне против предательских мошенников с выборами. Мы не привыкли смотреть дарённому брамину в рот, поэтому сразу же задействовали наёмников в боях с нашими врагами."
    EEN_decision_events.36.a:0 "Кажется, у нас много друзей"
    EEN_decision_events.37.title:0 "«Коготь» уходит"
    EEN_decision_events.37.desc:0 "Как и было сказано, наёмники из Компании «Коготь», прибывшие помочь нам в трудные времена, покинули нас вскоре после последнего выстрела. Они отказались от предложения Дэйва присоединиться к его президентской армии. Хотя это и разочаровало Дэйва, он всё равно благодарит их за поддержку Поселений в этот непростой период."
    EEN_decision_events.37.a:0 "Они никогда не скажут, кто их нанял"
    EEN_decision_events.38.title:0 "Группа захвата уничтожена"
    EEN_decision_events.38.desc:0 "Команда, отправленная для сбора группы испытуемых для экспериментов с робомозгом, полагала, что обнаружила необороняемую деревню недалеко за линией фронта. Однако это оказалась ловушка, устроенная хитрыми мутантами, и отряд был полностью уничтожен"
    EEN_decision_events.38.a:0 "Они будут отомщены"
    EEN_decision_events.39.title:0 "Смешанные результаты"
    EEN_decision_events.39.desc:0 "Наш ударный отряд сумел захватить мутантов для извлечения мозгов, однако, к сожалению, не все они оказались подходящими кандидатами для имплантации в робомозга. Некоторые из испытуемых пришли в яростное бешенство после подключения их мозгов к оборудованию."
    EEN_decision_events.39.a:0 "И всё же, это не полный провал"
    EEN_decision_events.40.title:0 "Фантастическая партия!"
    EEN_decision_events.40.desc:0 "Наш ударный отряд успешно вывез мутантов без серьёзных происшествий. По возвращении на базу учёные смогли извлечь 98% мозгов испытуемых и успешно имплантировать их в робоголовы. Оборудование готово к отправке на передовую."
    EEN_decision_events.40.a:0 "Отличная работа!"
    EEN_decision_events.41.title:0 "Успешная отправка"
    EEN_decision_events.41.desc:0 "Наш ударный отряд быстро выполнил задание и вывез мутантов до того, как противник успел организовать ответные действия. Испытуемые сейчас находятся в пути в Американскую службу Здравоохранения."
    EEN_decision_events.41.a:0 "Отлично"
    EEN_decision_events.42.title:0 "Потери при транспортировке"
    EEN_decision_events.42.desc:0 "Наш ударный отряд успешно захватил мутантов для экспериментов Б.М.М.А.У, однако по пути в Американскую службу Здравоохранения некоторые образцы вырвались на свободу и спровоцировали крушение винтокрыла. Остальные винтокрылы благополучно добрались до пункта назначения."
    EEN_decision_events.42.a:0 "И всё же, это не полный провал"
    EEN_decision_events.43.title:0 "Доставка из Рэйвен-Рока"
    EEN_decision_events.43.desc:0 "Президент Эдем отправил нам партию испытуемых для избавления от их мутаций. Подопытные уже подготовлены и скоро будут подвергнуты хирургическому вмешательству."
    EEN_decision_events.43.a:0 "Хорошие новости!"
    EEN_decision_events.44.title:0 "Доставка из Рэйвен-Рока"
    EEN_decision_events.44.desc:0 "Президент Эдем отправил нам партию испытуемых для избавления от их мутаций. Хотя их число оказалось меньше, чем обещали изначально, всё же их достаточно много. Подопытные уже подготовлены и вскоре будут подвергнуты операции."
    EEN_decision_events.44.a:0 "Хорошие новости!"
    EEN_decision_events.45.title:0 "Привет от Ронто"
    EEN_decision_events.45.desc:0 "Первая группа анархистов, бандитов и других Анти-Анклавных диссидентов прибыла в реабилитационный центр «Ронто». Называть это «центром» — довольно условно. Заключённых выпускают в огороженный сектор руин Торонто с двумя простыми правилами: \n\n Правило 1, попытки побега будут пресекаться огнём на поражение. \n\n Правило 2, чтобы получить пищу, необходимо доставлять собранное в один из пунктов приёма. \n\n Средняя продолжительность жизни здесь оценивается примерно в две недели. Это не мутанты, способные адаптироваться к Америке Отэма, поэтому заставляя их работать здесь, мы даём им возможность сделать за эти две недели больше, чем они смогли бы за всю свою жизнь. Информация о жестоких условиях лагеря была намеренно распространена среди населения. Как и ожидалось, страх быть отправленным в «Ронто» привёл к снижению активности повстанцев."
    EEN_decision_events.45.a:0 "Отличная работа"
    EEN_decision_events.46.title:0 "Музей Америки"
    EEN_decision_events.46.desc:0 "Торжественное открытие Музея Америки, расположенного в восстановленных руинах довоенного музея истории, прошло с большим успехом. После краткой речи куратора музея двери были открыты для посетителей. Согласно опросу, 78 процентов опрошенных американцев с пустошей, покидавших музей, почувствовали себя значительно более патриотичными, а 83 процента выразили благодарность Главнокомандующему Отэму и Анклаву за отражение вторжения коммунистических пришельцев с Марса. Поразительно, но 2 процента посетителей заявили, что не считают все экспонаты правдивыми — эти лица были задержаны для допроса и утилизации."
    EEN_decision_events.46.a:0 "Боже, благослови Анклав!"
    EEN_decision_events.47.title:0 "Наши Восточные Союзники"
    EEN_decision_events.47.desc.1:0 "Мы уже некоторое время поддерживаем радиосвязь с [EEN.GetName]. Однако личных контактов, помимо редких дипломатических миссий, было мало. По мере того как их территория, которую они считают своей, постепенно приближалась к нашей, возникало множество вопросов о том, как будет проходить совместное соседство. Теперь мы получили ответ. [EEN.GetLeader] направил нам ультиматум с требованием «вернуться в лоно». Очевидно, что их приглашение не предполагает равноправия."
    EEN_decision_events.47.desc.2:0 "Мы уже некоторое время поддерживаем радиосвязь с [ONT.GetName]. Однако личных контактов, помимо редких дипломатических миссий, было мало. По мере того как их территория, которую они считают своей, постепенно приближалась к нашей, возникало множество вопросов о том, как будет проходить совместное соседство. Теперь мы получили ответ. [ONT.GetLeader] направил нам ультиматум с требованием «вернуться в лоно». Очевидно, что их приглашение не предполагает равноправия."
    EEN_decision_events.47.a:0 "Совместная работа — предпочтительный вариант"
    EEN_decision_events.47.b:0 "Мы не присоединимся к этим монстрам"
    EEN_decision_events.48.title:0 "Наши Северные Союзники"
    EEN_decision_events.48.desc.1:0 "Мы уже некоторое время поддерживаем радиосвязь с [EEN.GetName]. Однако личных контактов, помимо редких дипломатических миссий, было мало. По мере того как их территория, которую они считают своей, постепенно приближалась к нашей, возникало множество вопросов о том, как будет проходить совместное соседство. Теперь мы получили ответ. [EEN.GetLeader] направил нам ультиматум с требованием «вернуться в лоно». Очевидно, что их приглашение не предполагает равноправия."
    EEN_decision_events.48.desc.2:0 "Мы уже некоторое время поддерживаем радиосвязь с [ONT.GetName]. Однако личных контактов, помимо редких дипломатических миссий, было мало. По мере того как их территория, которую они считают своей, постепенно приближалась к нашей, возникало множество вопросов о том, как будет проходить совместное соседство. Теперь мы получили ответ. [ONT.GetLeader] направил нам ультиматум с требованием «вернуться в лоно». Очевидно, что их приглашение не предполагает равноправия."
    EEN_decision_events.48.a:0 "Совместная работа — предпочтительный вариант"
    EEN_decision_events.48.b:0 "Мы не склонимся"
    EEN_decision_events.49.title:0 "Наши Северные Союзники"
    EEN_decision_events.49.desc.1:0 "Мы уже некоторое время поддерживаем радиосвязь с [EEN.GetName]. Однако личных контактов, помимо редких дипломатических миссий, было мало. По мере того как их территория, которую они считают своей, постепенно приближалась к нашей, возникало множество вопросов о том, как будет проходить совместное соседство. Теперь мы получили ответ. [EEN.GetLeader] направил нам ультиматум с требованием «вернуться в лоно». Очевидно, что их приглашение не предполагает равноправия."
    EEN_decision_events.49.a:0 "Подкрепление здесь!"
    
    ###National focus events###
    EEN_nf_events.1.title:0 "Битва за Пентагон"
    EEN_nf_events.1.desc:0 "В одном из самых ожесточённых сражений со времён Битвы за Проект «Чистота» мы нанесли мощный удар по Братству Стали. Эти захватчики знали, что мы придём, чтобы выгнать их с государственной территории, и тщательно подготовились. Нашим солдатам пришлось сражаться за каждый дюйм этого объекта. Несмотря на бесчисленные автоматические турели, ветхих роботов и защитников в силовой броне, мы одержали победу. Наш флаг развевается над Пентагоном, а наши научные группы приступили к инвентаризации оборудования и архивов данных, которые Братство не успело уничтожить при отступлении."
    EEN_nf_events.1.a:0 "Они долго не протянут!"
    EEN_nf_events.2.title:0 "Возвращение разведывательной команды"
    EEN_nf_events.2.desc:0 "Автоматизированная система безопасности авиабазы Адамс всё ещё активна, но что-то пошло не так — она не распознаёт наши коды доступа. Несколько разведчиков, пытавшихся проникнуть на объект, были атакованы ржавыми протектронами. Наши учёные считают, что главный вычислительный модуль системы безопасности, скорее всего, повреждён и его необходимо отключить вручную, прежде чем мы сможем попасть на базу. У нас есть два варианта. Отэм предлагает провести винтокрыльное штурмовое нападение с небольшой ударной группой для ручного отключения главного модуля. Эдем и научная команда хотят попытаться перегрузить систему, отправив непрерывный поток данных, что должно вызвать перезагрузку и сохранить оборудование. Единственная проблема в том, что мы не знаем, какие электронные помехи и контрмеры встроены в этот древний главный модуль."
    EEN_nf_events.2.a:0 "Отправьте отдел «Сигма»"
    EEN_nf_events.2.b:0 "Запустите рой данных"
    EEN_nf_events.3.title:0 "Гарнизон Адамса"
    EEN_nf_events.3.desc:0 "Авиабаза Адамс находится в удивительно хорошем состоянии, несомненно благодаря автоматизированной системе безопасности, которая не пускала потенциальных мародёров. Но это приводит нас к следующей проблеме: с отключением системы безопасности — это лишь вопрос времени, когда проходящие по пустоши охотники за добычей попытаются вновь проникнуть на базу. Чтобы предотвратить кражу американского имущества, нам придётся оставить на охране несколько солдат. Даже если у нас не хватит силовой брони для гарнизона, несколько легко бронированных бойцов или роботов вполне справятся с этой задачей."
    EEN_nf_events.3.a:0 "Пусть несколько помощников патрулируют ворота"
    EEN_nf_events.3.b:0 "Отправьте полный состав пехоты в силовой броне"
    EEN_nf_events.3.c:0 "Можно ли снова включить роботов?"
    EEN_nf_events.4.title:0 "Захват Проекта «Чистота»"
    EEN_nf_events.4.desc:0 "Проект «Чистота» — одно из самых важных, если не самое важное действующее сооружение в Столичных Пустошах. Мы не можем оставить его в руках самозваных учёных пустошей. Наши генералы разработали несколько планов по захвату объекта, и сейчас настало время приступать к их реализации. Одни предлагают внедрить в проект учёных и солдат, переодетых в наёмников — это займет больше времени, но, по их мнению, позволит свести к минимуму возможный ущерб объекту. Другие генералы обеспокоены тем, что Братство Стали может вскоре обратить внимание на проект, и настаивают на скорейшем силовом захвате, что, конечно, несёт риск повреждения сооружения. В конечном итоге решение остаётся за Президентом."
    EEN_nf_events.4.a:0 "Внедриться в проект"
    EEN_nf_events.4.b:0 "Просто заберите его силой"
    EEN_nf_events.4.c:0 "Отправьте Компанию «Коготь»"
    EEN_nf_events.5.title:0 "Эвакуация Рэйвен-Рока"
    EEN_nf_events.5.desc:0 "Незадолго до падения Рэйвен-Рока гражданских и небоевых военных эвакуировали на винтокрылах. Хотя некоторые из них были сбиты врагами, большинство благополучно добрались до авиабазы Адамс. Пока гражданские и солдаты обустраиваются в нашем новом убежище, нам предстоит готовиться к следующему шагу. Враги найдут это место — и это случится совсем скоро."
    EEN_nf_events.5.a:0 "Они заплатят за это!"
    EEN_nf_events.5.b:0 "Они заплатят за это!"
    EEN_nf_events.5.c:0 "Они заплатят за это!"
    EEN_nf_events.6.title:0 "Приказ об общем отступлении"
    EEN_nf_events.6.desc:0 "С падением Рэйвен-Рока многие солдаты остались без приказов от командования и теперь простаивают на отдалённых постах или охраняют старые склады, ожидая эвакуации. Очевидно, что нам нужно вернуть этих людей на базу, но ресурсов для перевозки всех винтокрылами у нас нет. Встаёт непростой выбор: спасать каждого солдата или сделать несколько рейсов к ключевым объектам, чтобы собрать жизненно важное оборудование?"
    EEN_nf_events.6.a:0 "Ни один человек не останется!"
    EEN_nf_events.6.b:0 "Некоторые из них умеют ходить, нам нужны эти пушки!"
    EEN_nf_events.7.title:0 "Второй приказ об отступлении"
    EEN_nf_events.7.desc:0 "Многие мужчины и женщины Анклава по-прежнему числятся пропавшими без вести, и хотя большинство, вероятно, погибло, есть высокая вероятность, что многие просто оказались отрезаны от средств связи и сейчас сидят у старых радиостанций, пытаясь связаться с командованием. Мы могли бы попытаться выйти на связь с этими солдатами, но такая попытка может подвергнуть нас риску раскрытия наших позиций."
    EEN_nf_events.7.a:0 "Риск не стоит того"
    EEN_nf_events.7.b:0 "Транслировать координаты эвакуации"
    EEN_nf_events.8.title:0 "В ловушке и отрезанные"
    EEN_nf_events.8.desc:0 "В пустошах всё ещё остаются отряды солдат в отчаянных ситуациях — кто-то заперт в старом комплексе, кто-то прижат к стене бойцами Братства Стали, а кто-то окружён мутантами без единого патрона. Спасать этих людей будет опасно, но оставить их умирать — просто невозможно с нашей точки зрения."
    EEN_nf_events.8.a:0 "Приготовить спасательные операции"
    EEN_nf_events.9.title:0 "Дуврские торговцы оружием"
    EEN_nf_events.9.desc:0 "Сегодня к нашим воротам подошли торговцы из поселения пустошников неподалёку от Адамс. Они пытались продать свои товары, и хотя большая часть была ничем иным, как хламом, среди них нашлись несколько ценных находок. Обычно мы бы просто конфисковали это явно награбленное оружие, но торговцы утверждают, что у них есть гораздо больше. Полномасштабное нападение на этих мародёров сейчас стало бы серьёзной тратой ресурсов, которых у нас нет. Возможно, стоит предложить им сделку — обменять что-то на то, что у них есть."
    EEN_nf_events.9.a:0 "Мы не будем торговаться с мутантами"
    EEN_nf_events.9.b:0 "Отдайте им металлолом за менее мощное оружие"
    EEN_nf_events.9.c:0 "Микрочипы для штурмового оружия кажутся справедливыми"
    EEN_nf_events.9.d:0 "Сколько бы они хотели за плазменную винтовку?"
    EEN_nf_events.10.title:0 "Финальные приготовления"
    EEN_nf_events.10.desc:0 "После месяцев перегруппировки, сбора припасов и корректировки боевых планов мы снова готовы к бою. Братство Стали всё ещё не знает нашего местоположения — они тщетно ищут хоть малейший след нашего присутствия, в то время как мы наблюдаем из тени. Мы долго восстанавливались после поражения, и теперь у нас есть идеальная возможность нанести контрнаступление и вернуть контроль над Столичной Пустошью."
    EEN_nf_events.10.a:0 "Время пришло"
    EEN_nf_events.11.title:0 "Заноза в нашем боку"
    EEN_nf_events.11.desc:0 "Несмотря на то, что Братство Стали практически уничтожено в Столичных Пустошах, оно остаётся серьёзной проблемой. Разрозненные фанатики Братства проводят налёты на позиции Анклава и атакуют линии снабжения. Нам нужно срочно принять меры против этих партизан, прежде чем они успеют заручиться поддержкой жителей Пустоши."
    EEN_nf_events.11.a:0 "Они еще не умерли?"
    EEN_nf_events.12.title:0 "Подготовка к суду"
    EEN_nf_events.12.desc:0 "Большинство выживших из Братства Стали сейчас находятся в нашем плену и ожидают своей судьбы. По мере того как мы завершаем подготовку к судебным процессам над террористами из Братства, нам предстоит принять важные решения. В первую очередь — кого именно судить. С одной стороны, есть мнение, что большинство Рыцарей и Посвящённых просто выполняли приказы, и проявление к ним снисхождения поможет завоевать доверие и поддержку жителей пустоши. С другой — многие считают, что позволить убийцам наших солдат отделаться легко — это оскорбление для наших войск, и снисхождение должно распространяться только на писцов. Наши более жёсткие чиновники настаивают на том, что каждый, без исключения, должен предстать перед судом за свои преступления."
    EEN_nf_events.12.a:0 "Накажите их лидеров"
    EEN_nf_events.12.b:0 "Освободить от ответственности невоюющих"
    EEN_nf_events.12.c:0 "Каждый член Братства будет судим"
    EEN_nf_events.13.title:0 "Преступление и Наказание"
    EEN_nf_events.13.desc:0 "Список преступлений, совершённых Братством Лайонса за десятилетия, огромен: кража государственного имущества, незаконное занятие правительственных объектов и, конечно же, убийства солдат Анклава. Их защитники утверждают, что в отсутствии Анклава в Пустошах Братство просто заняло вакуум власти. Кроме того, они отмечают, что, по крайней мере в случае Братства Лайонса, значительная часть захваченного оборудования была направлена на благородную цель — борьбу с супермутантами и рейдерами. Это ставит перед нами важный вопрос: стоит ли преследовать эти преступления и в какой мере? С одной стороны, жёсткое наказание может укрепить дисциплину и показать силу Анклава. С другой — чрезмерное давление на тех, кто фактически защищал пустошь от более опасных угроз, может вызвать недовольство и подорвать нашу легитимность в глазах местных жителей."
    EEN_nf_events.13.a:0 "Преследовать по всей строгости закона"
    EEN_nf_events.13.b:0 "Мы можем проигнорировать пару вещей"
    EEN_nf_events.13.c:0 "Убийство мутантов должно быть вознаграждено"
    EEN_nf_events.14.title:0 "Их лидер"
    EEN_nf_events.14.desc.1:0 "После смерти Старейшины Лайонса его дочь Сара Лайонс взяла на себя руководство. Даже после полного поражения Братства она продолжала вести партизанскую борьбу, отказываясь сложить оружие. Очевидно, что если кто и заслуживает смертной казни среди Братства, то это она. Наши советники выразили опасение, что её казнь превратит её в мученицу и вдохновит Анти-Анклавные движения в будущем."
    EEN_nf_events.14.desc.2:0 "После смерти Старейшины Лайонса в ходе разрушения Пентагона его дочь Сара Лайонс взяла командование на себя. Несмотря на то, что большинство членов Братства сложили оружие, фанатичная Сара продолжала вести террористическую войну против американского народа. Сочувствующие всё ещё утверждают, что её казнь лишь укрепит других оставшихся в сопротивлении."
    EEN_nf_events.14.a:0 "Пожизненного будет достаточно"
    EEN_nf_events.14.b:0 "Приготовьте расстрельную команду"
    EEN_nf_events.14.c:0 "Мы будем транслировать казнь в каждом поселении"
    EEN_nf_events.15.title:0 "Последний рубеж"
    EEN_nf_events.15.desc:0 "Сегодня патруль вступил в контакт с одиночным противником, который открывал огонь из разрушенного офисного здания в Вашингтоне. Повстанец провёл патруль по запутанным коридорам, наполненным ловушками, но спустя несколько часов последний боевик Братства был уничтожен. Террорист не имел голодиска и других опознавательных знаков, кроме костюма убежища, который он носил под бронёй. Его смерть ознаменовала ликвидацию последнего врага в войне между Братством Стали и Анклавом."
    EEN_nf_events.15.a:0 "Хорошая работа"
    EEN_nf_events.15.b:0 "Организуйте празднование окончания этой борьбы"
    EEN_nf_events.16.title:0 "Болезни роста"
    EEN_nf_events.16.desc:0 "С окончанием конфликта с Братством мы можем сосредоточиться на проблемах, стоящих перед нашим новым государством. Проблем хватает: рейдеры пользуются разрозненностью силовиков и совершают налёты на окраинные поселения, учёные, недовольные деактивацией Эдема, продолжают создавать проблемы, а с учётом того, что под нашим контролем теперь новые территории, настало время начать обсуждение вопросов управления и устройства правительства."
    EEN_nf_events.16.a:0 "Это всего лишь временные трудности"
    EEN_nf_events.17.title:0 "Изобилие рейдеров"
    EEN_nf_events.17.desc:0 "После распада ополчения поселений Столичной Пустоши рейдеры на окраинах стали более дерзкими. От Тенпенни-Тауэр до бывшей Республики Дейва поступают сообщения о нападениях рейдеров на караваны и приближении к городским стенам. Если мы не примем меры, ситуация только ухудшится, и жители Пустоши, находящиеся под нашим контролем, усомнятся в обещаниях мира и процветания."
    EEN_nf_events.17.a:0 "Им не будет места в Америке"
    EEN_nf_events.18.title:0 "Успешный запуск"
    EEN_nf_events.18.desc:0 "Сегодня Братство устроило очередное наступление, похожее на многие другие с начала этой войны. Либерти Прайм шагал к одной из наших позиций, выпуская лазеры из глаз, а его солдаты следовали за ним. Но на этот раз всё закончилось иначе. Огненный гнев Старой Америки обрушился с небес и разнес Либерти Прайма на куски. В придачу несколько паладинов и рыцарей тоже попали под взрыв. Без своего секретного оружия Братство потеряло лучший шанс выиграть эту войну. Хотя у нас ещё есть несколько залпов в запасе, и уничтожение Пентагона, вероятно, положило бы конец конфликту, никто не хочет разрушать главную военную базу Америки ради уничтожения нескольких тараканов. Мы выгоним отродье Братства, и флаг Америки снова будет развеваться над Пентагоном. К тому же, мы не знаем, над чем работают эти новаторы на западе, и это оружие может пригодиться в будущем."
    EEN_nf_events.18.a:0 "Кажется, их маленькая игрушка сломалась"
    EEN_nf_events.19.title:0 "Рейдерская угроза сдержана"
    EEN_nf_events.19.desc:0 "После нашей успешной кампании против рейдеров в Вашингтоне и укрепления северной границы число нападений рейдеров в Столичной Пустоши снизилось до рекордно низкого уровня. Поселенцы, находящиеся под нашей защитой, впервые за долгое время ощущают относительную безопасность — и они должны благодарить за это мужчин и женщин Анклава."
    EEN_nf_events.19.a:0 "Одной проблемой меньше"
    EEN_nf_events.20.title:0 "Предательство в научном отделе"
    EEN_nf_events.20.desc:0 "Патруль, отправленный расследовать нападение на караван, обнаружил следы выстрелов из энергетического оружия, а несколько караванщиков пропали без вести. После масштабного обыска в поисках рейдеров или оставшихся боевиков Братства был выявлен тревожный факт: в заброшенном бункере члены нашего научного отдела незаконно вели лабораторные работы. Они устраивали засады и похищали жителей Пустоши для продолжения экспериментов с ВРЭ, которые были запрещены после свержения Эдема. Что ещё хуже — это не единичный случай. Случаи краж оборудования, несанкционированных экспериментов и открытого недовольства в нашем научном отделе растут. Если мы не примем меры в ближайшее время, ситуация может выйти из-под контроля."
    EEN_nf_events.20.a:0 "Давайте вести переговоры"
    EEN_nf_events.20.b:0 "Время навести порядок дома"
    EEN_nf_events.21.title:0 "Чистка среди учёных"
    EEN_nf_events.21.desc:0 "Наше расследование «рака», поразившего Научный отдел, показало, что дело далеко не в нескольких людях во главе и их преданных приспешниках. Почти три из пяти наших учёных всё ещё цепляются за доктрину Эдема о генетической чистоте и геноциде пустоши. Тех, кто лишь высказывает такие взгляды или придерживается убеждений своих руководителей, можно перевоспитать, но для тех, кто активно действует против нас, существует лишь одна судьба."
    EEN_nf_events.21.a:0 "Лицом к стене"
    EEN_nf_events.22.title:0 "Черная броня и Летающие машины"
    EEN_nf_events.22.desc:0 "Жители Пустоши замечены бегущими на нашу территорию, не имея при себе ничего, кроме лохмотьев на спинах. Все они рассказывают, что были атакованы солдатами в чёрной силовой броне, которые спустились с каких-то воздушных кораблей и начали без разбора стрелять. Слухи о патрулях в чёрной силовой броне, появлявшихся по ночам в горах на северо-западе Столичной Пустоши, ходили годами. Многие считали эти рассказы вымыслом, но теперь, похоже, в них была доля правды."
    EEN_nf_events.22.a:0 "А потом вы скажете, что говорящее дерево тоже настоящее!"
    EEN_nf_events.22.b:0 "Может быть, патрули Братства помогут чувствовать себя в безопасности"
    EEN_nf_events.23.title:0 "Научный кризис был разрешен"
    EEN_nf_events.23.desc.1:0 "Благодаря серьёзным переговорам и нескольким уступкам, которых нам пришлось сделать больше, чем хотелось бы, нам наконец удалось восстановить колеблющуюся лояльность наших учёных. Многие жители Пустоши могут возражать против экспериментов на заключённых и финансирования науки, направленного на «терапию генетической чистки», но прогресс требует своей цены."
    EEN_nf_events.23.desc.2:0 "Последние несколько месяцев в научном отделе были непростыми. Между чистками, перевоспитанием и непростой интеграцией учёных из Пустоши всем пришлось пройти через серьёзные изменения. После нескольких месяцев реорганизации и ряда мелких лабораторных инцидентов мы наконец вернулись в рабочий ритм. Учёные из Пустоши доказывают свою ценность, и среди них есть один, кто проявляет особенно многообещающий потенциал."
    EEN_nf_events.23.a:0 "Возвращаемся к работе"
    EEN_nf_events.23.b:0 "Добро пожаловать на борт, доктор Холт"
    EEN_nf_events.24.title:0 "Административное лимбо"
    EEN_nf_events.24.desc:0 "Военная мощь наших сил в Столичной Пустоши не вызывает сомнений. Поселения под нашим контролем не оказывают сопротивления и постепенно привыкают видеть чёрные силовые доспехи на своих пыльных улицах. Однако сохраняется общая неопределённость относительно дальнейших действий. Многие лидеры поселений и их жители открыто вступали в ряды Братства, и хотя мы официально не занимали позицию по этому вопросу, многие задаются вопросом, не повторит ли их судьба участь руководства Братства. Пришло время принять решение и ясно заявить, что ждёт лидеров этих поселений. Существует мнение, что они должны предстать перед судом и, возможно, быть казнены за участие в антиамериканском восстании. С другой стороны, можно утверждать, что они действовали, исходя из ошибочной информации и делали то, что считали лучшим для своих людей. К тому же замена всех этих губернаторов и шерифов потребует значительно больше усилий, чем устранение нескольких убеждённых противников."
    EEN_nf_events.24.a:0 "Мятежники должны быть наказаны"
    EEN_nf_events.24.b:0 "Мы могли бы попробовать амнистию за лояльность"
    EEN_nf_events.25.title:0 "Суд над Мегатонной"
    EEN_nf_events.25.desc.1:0 "Защита Лукаса Симмса, бывшего лидера ополчения поселения Столичной Пустоши, выдвинула весьма интересный аргумент. Они утверждали, что он не виноват в том, что повёл своих людей на вооружённое сопротивление Анклаву. Ведь Братство Стали было для него и его окружения единственной защитой на протяжении всей жизни, и они обманули его, заставив поверить, что мы — очередная угроза их безопасности. Несмотря на то, что он поднял оружие против правительства Соединённых Штатов, это было ошибочное, но искреннее стремление защитить свой дом и людей, которым он давал присягу."
    EEN_nf_events.25.desc.2:0 "Человек, известный просто как Дядя Роу, определённо не является военачальником. Он был обычным бизнесменом, занимавшимся своим делом. По словам его адвоката, города и поселения под руководством Дяди Роу остро нуждались в технологиях и воде, которые обещало Братство. Отправка мужчин и женщин на борьбу с силами Анклава была всего лишь шагом для обеспечения ресурсов, необходимых для их выживания и процветания. На суде Дядя Роу заявил, что если бы он знал, что мы — разумные люди, а не геноцидальные безумцы, как нас изображало Братство, он бы попытался заключить с нами сделку."
    EEN_nf_events.25.desc.3:0 "Суд над мятежником, провозгласившим себя «Президентом Дэйвом», превратился в настоящее шоу. В поступке, который удивил почти всех, самовлюблённый Дэйв потребовал представлять себя самостоятельно и отказывался отвечать на вопросы прокуроров, если к нему не обращались по его фальшивому титулу. Однако его поведение в зале суда оказалось лишь прелюдией к ещё более смехотворной защите. Он пытался доказать, что не только правомерно провозгласил себя президентом Пустоши, но и что, будучи избранным «народом» своей республики, он стоит выше нашего правительства. Этот аргумент был мгновенно отклонён — как потому, что не имел юридической основы в американском праве, так и из-за того, что его электоратная база состояла всего из пяти человек. Несгибаемый до конца, Дэйв объявил своих палачей предателями республики и проклял их вплоть до момента, когда его превратили в лужу светящейся слизи."
    EEN_nf_events.25.desc.4:0 "Иностранный захватчик по имени Алистер Тенпенни явно должен был бы изучить историю войн 1775–1783 и 1812–1815 годов, прежде чем пытаться вторгнуться в Америку. Его слабая защита строилась на утверждении, что он не участвовал непосредственно в боевых действиях и вся вина лежит на его подчинённых. Однако этот довод был легко опровергнут и отошёл на второй план, когда обвинение представило доказательства причастности Тенпенни к заговору по подрыву неразорвавшейся ядерной бомбы прямо в сердце Столичной Пустоши. Раскрытие этого террористического и массового убийственного замысла не оставило ни малейших сомнений у присяжных: Тенпенни заслуживает смертной казни."
    EEN_nf_events.25.a:0 "Приготовить расстрельную команду!"
    EEN_nf_events.25.b:0 "Мы не можем винить человека в защите его дома"
    EEN_nf_events.25.c:0 "Крутой мотив, всё равно измена"
    EEN_nf_events.25.d:0 "Захватить его бизнес в качестве компенсации"
    EEN_nf_events.25.e:0 "Что было не так с этим парнем?"
    EEN_nf_events.25.f:0 "Когда же британцы научатся?"
    EEN_nf_events.25.g:0 "Давайте отправим им небольшой фейерверк"
    EEN_nf_events.26.title:0 "Переход власти"
    EEN_nf_events.26.desc:0 "В шаге, который расстроил ярых противников, но является наиболее практичным решением, мы решили позволить многим нынешним лидерам поселений в Столичной Пустоши сохранить контроль над своими городами до проведения выборов. В то же время патрули продолжат регулярно проверять поселения, чтобы убедиться, что дела идут гладко, но в остальном им будет предоставлена автономия для решения повседневных вопросов."
    EEN_nf_events.26.a:0 "Эффективное решение"
    EEN_nf_events.27.title:0 "Перспективные лидеры"
    EEN_nf_events.27.desc:0 "Патрули, которые регулярно проверяют поселения по всей Столичной Пустоши, сообщают, что несколько городов процветают под руководством своих местных лидеров и восстанавливаются после конфликта значительно быстрее других. Поступило немало рекомендаций о том, чтобы предложить этим руководителям места в высших органах власти, чтобы они могли помогать большему числу людей."
    EEN_nf_events.27.a:0 "Это заслуживает тщательного рассмотрения"
    EEN_nf_events.28.title:0 "Проект «Чистота» в действии"
    EEN_nf_events.28.desc:0 "После нескольких месяцев работы по устранению последствий конфликта с Братством Стали проект «Чистота» наконец-то запущен и стабильно обеспечивает население чистой водой. Уже разработано несколько планов по распределению этой воды среди ближайших поселений — как из гуманитарных соображений, так и для того, чтобы обеспечить их интеграцию в Америку. В настоящее время вблизи нескольких поселений Пустоши строятся центры распределения воды. Эти центры будут служить не только узлами для эффективного распределения воды, но и основными точками местного управления."
    EEN_nf_events.28.a:0 "§R Но как это работает?"
    EEN_nf_events.28.b:0 "Пусть вода течет"
    EEN_nf_events.29.title:0 "Интеграция Компании «Коготь»"
    EEN_nf_events.29.desc:0 "Хотя наёмники из компании «Коготь» менее дисциплинированы, чем среднестатистический солдат Анклава, они доказали свою важность в нашем конфликте с Братством Стали. В мирное время их присутствие воспринимается менее положительно. Набирает силу движение, состоящее из гражданских, солдат и даже самих членов компании «Коготь», которые настаивают на полном роспуске этой наёмнической организации и освобождении её бойцов от контрактов с предоставлением им полного гражданства США. Уже подготовлен Исполнительный указ, согласно которому компания будет распущена, её солдатам предоставят полное гражданство, а объект на базе Форт Баннистер перейдёт под наш прямой контроль. Однако остаётся нерешённым один вопрос: некоторые члены компании «Коготь» не желают переходить к гражданской жизни и работать караванными охранниками или фермерами. Часть наёмников выражает желание официально интегрироваться в наши вооружённые силы. Их призыв, безусловно, приветствуется, но вызывает обеспокоенность их просьба проходить обучение и служить в силовой броне. Наши старшие офицеры и солдаты считают, что бойцы компании «Коготь» недостаточно дисциплинированы, чтобы обращаться с таким сложным и мощным оборудованием, и учитывая прошлые инциденты с этой компанией, подобные опасения имеют под собой веские основания."
    EEN_nf_events.29.a:0 "Интегрируйте их в качестве вспомогательных войск и разведчиков"
    EEN_nf_events.29.b:0 "Разрешить им вступить в армию на полных правах"
    EEN_nf_events.29.c:0 "Компания «Коготь» продолжит служить как вспомогательная сила"
    EEN_nf_events.30.title:0 "В Убежище 87"
    EEN_nf_events.30.desc:0 "После месяцев подготовки и тренировок в симуляции Убежища 87, построенной по чертежам Волт-Тек, команда Анклава «Сигма» наконец была отправлена в самое сердце тьмы, чтобы искоренить эту чуму нашего народа. Несмотря на ожесточённое сопротивление мутантов, команда успешно выполнила свою миссию и расчистила путь для научной группы, которая смогла безопасно вывести из строя оборудование, использовавшееся для создания этих громоздких чудовищ. Возможно, в Пустошах ещё остаются мутанты, но впервые за десятилетия их численность начнёт сокращаться, пока они не исчезнут совсем."
    EEN_nf_events.30.a:0 "Миссия выполнена"
    EEN_nf_events.31.title:0 "Литт Ламплайт"
    EEN_nf_events.31.desc:0 "Пещера, ранее известная как Ламплайт Кавернс, кажется, стала домом для самодостаточной колонии детей, которые смогли отбиться не только от ужасов Пустоши, но и от мутантов у своих ворот. Сначала они настороженно относились к нашим силам, но, узнав, что мы остановили поток мутантов из Убежища 87, дети стали приветливо встречать нас, называя «мунгосами». Те, кто побывал в пещерах, отмечают, что для детей — это действительно впечатляющее достижение — выживать там так долго. Предлагается построить детский приют в Большом Городе, чтобы переселить туда этих детей и интегрировать их в обычное общество. Однако есть и мнение, что лучше оставить детей в покое и позволить им постепенно открываться миру."
    EEN_nf_events.31.a:0 "Вытащите их из темноты"
    EEN_nf_events.31.b:0 "Позвольте им выйти самостоятельно"
    EEN_nf_events.32.title:0 "Всё тихо на Домашнем Фронте"
    EEN_nf_events.32.desc:0 "Впервые за долгое время Столичная Пустошь наслаждается периодом относительной стабильности. Атаки Супермутантов становятся всё реже с каждым днём, рейдерские набеги быстро подавляются, а чистую воду можно свободно найти почти в каждом крупном поселении. Теперь, когда все пожары потушены, мы можем переключить внимание на менее срочные, но не менее важные задачи. По мере того как мы укрепляем контроль и готовимся к кампании по восстановлению Америки, нам предстоит задать себе очень важные вопросы. Как будет расти наша армия, чтобы соответствовать новым требованиям? Как мы справимся с постоянно растущей экономикой? И как именно мы будем поддерживать закон, порядок и процесс реконструкции? Всё это были простые задачи, когда мы были лишь группой солдат, учёных и вспомогательного персонала, живущих в бункерах последние два столетия, но такие подходы просто непрактичны в масштабах восстановления страны."
    EEN_nf_events.32.a:0 "На все основные вопросы будут даны ответы."
    EEN_nf_events.33.title:0 "Армия Завтрашнего Дня"
    EEN_nf_events.33.desc:0 "За последний год масштаб наших военных операций вырос в геометрической прогрессии. Если раньше для достижения целей было достаточно нескольких взводов солдат в силовой броне, то теперь нам приходится контролировать гораздо большую территорию и задействовать значительно больше войск для эффективного расширения нашего влияния за пределы текущих границ. Наши начальники штаба представили несколько предложений по дальнейшему развитию армии. Первый план предусматривает радикальные изменения в наборе, обучении и производстве вооружения с отказом от силовой брони в пользу создания механизированных войск. Офицеры, поддерживающие этот подход, утверждают, что эффективное использование механизированной армии позволит быстро подавить большинство угроз Пустоши и при этом быстрее покрывать большие расстояния, не подвергая риску наш флот винтокрылов. Второе предложение — снизить требования к оснащению наших силовиков в силовой броне и, возможно, начать набирать больше жителей Пустоши для поддержания этих подразделений. Последнее предложение предлагает значительно сократить роль силовой брони в армии, сосредоточившись на обычной пехоте. Генералы, поддерживающие этот вариант, считают, что большинство угроз Пустоши можно нейтрализовать волнами плазменного и лазерного огня, а если столкнёмся с чем-то более серьёзным — тогда на помощь придут боевые экзоскелеты X-02."
    EEN_nf_events.33.a:0 "Мы сосредоточимся на бронетранспортёрах и танках"
    EEN_nf_events.33.b:0 "Силовая броня по-прежнему будет нашей опорой"
    EEN_nf_events.33.c:0 "Основная пехота проложит наш путь"
    EEN_nf_events.34.title:0 "Финансовый крах"
    EEN_nf_events.34.desc:0 "С постоянным поступлением чистой воды благодаря проекту «Чистота» было почти немыслимо, что мы когда-либо дойдём до такой точки. Но на прошлой неделе запасы воды резко упали до критического уровня. Мы не знаем, как эта информация просочилась наружу, ведь она была строго засекречена, но это вызвало шок по всей нашей экономике. Местные водные склады заполонили граждане, стремящиеся обменять свою валюту на воду — этот массовый ажиотаж уже называют «набегом на резервуары». Некоторые торговцы даже начали отказываться от долларов США в пользу бутылочных крышек или бартерных сделок. Если мы не возьмём ситуацию под контроль быстро, это может обернуться катастрофой."
    EEN_nf_events.34.a:0 "Посмотрим, сможем ли мы обменять воду, по крайней мере сейчас"
    EEN_nf_events.34.b:0 "Ограничьте забор воды и постарайтесь переждать"
    EEN_nf_events.35.title:0 "Разговор о деньгах"
    EEN_nf_events.35.desc:0 "Все больше наших солдат требуют выплаты в бутылочных крышках вместо валюты Анклава, объясняя это тем, что в тех местах, где они служат, эту валюту никто не принимает. Это ставит под вопрос долгосрочные планы нашей экономики и выбор будущей валюты. По мнению нашего главного экономиста, у нас есть два основных варианта решения проблемы с валютой. Мы можем начать выпускать новый американский доллар и постепенно продвигать его использование в экономике, либо принять бутылочную крышку в качестве валюты, как это уже сделали многие в Пустоши. Хотя доллар имеет свои преимущества и, безусловно, вызывает большее уважение, чем простой кусок металла от старой бутылки, на его принятие у людей уйдёт время, а внешняя торговля за пределами наших территорий станет сложнее. Крышка же уже повсеместно признана, и хотя по сути это торговля мусором, она мало чем отличается от бумажных денег."
    EEN_nf_events.35.a:0 "Верните всемогущий доллар"
    EEN_nf_events.35.b:0 "Придерживаемся крышек"
    EEN_nf_events.36.title:0 "Возвращение Доллара"
    EEN_nf_events.36.desc:0 "В столетии до Великой Войны доллар США был обеспечен доверием народа к правительству Соединённых Штатов. Сегодня же уровень этого доверия значительно снизился, и было предложено обратиться к историческому опыту — обеспечивать нашу валюту ценным ресурсом. Так же, как до эпохи фиатных денег правительства обеспечивали свои валюты золотом, бутылочная крышка была обеспечена запасами воды, которыми владели влиятельные торговцы. Мы тоже могли бы принять подобную политику, однако существует одна серьёзная проблема. Чтобы поддерживать растущую экономику, нам потребуется постоянно увеличивать запасы воды, и если когда-либо у нас не будет достаточного количества воды для покрытия этого спроса, наша экономика может оказаться на грани краха."
    EEN_nf_events.36.a:0 "Вера в правительство поддержит нашу валюту"
    EEN_nf_events.36.b:0 "Как при реализации проекта «Чистота» у нас может закончиться вода?"
    EEN_nf_events.37.title:0 "Промышленная революция"
    EEN_nf_events.37.desc:0 "За пределами Питта в Пустоши практически нет ничего, что можно было бы назвать производственной мощью. Заводы стоят заброшенными и разрушаются, а большая часть промышленности — это лишь несколько рабов в мастерских. Мы можем либо захватить эти предприятия для себя, либо поддержать предприимчивых жителей в восстановлении заводов самостоятельно."
    EEN_nf_events.37.a:0 "Пусть это сделают бизнесмены"
    EEN_nf_events.37.b:0 "Мы не можем оставить эти активы простому сброду"
    EEN_nf_events.371.title:0 "Вопросы правительства"
    EEN_nf_events.371.desc:0 "На территории наших владений расположены различные поселения, каждое со своими необычными формами самоуправления и странными обычаями. Конечно, мы хотели бы, чтобы все эти люди придерживались проверенных временем американских идеалов и законов, но это может занять время. Пока же достаточно будет просто признавать власть нашего Правительства, даже если в какой-нибудь захудалой деревушке посреди пустоши дела идут немного иначе."
    EEN_nf_events.371.a:0 "Немного автономии — небольшая цена за лояльность"
    EEN_nf_events.371.b:0 "Они будут следовать нашим указаниям неукоснительно!"
    EEN_nf_events.38.title:0 "Сделки с Дьяволами"
    EEN_nf_events.38.desc:0 "На прошлой неделе у проекта «Чистота» был необычный гость. На причал пришвартовался ветхий корабль под командованием человека по имени Джей Пи Джонс, и капитан вместе с несколькими членами команды сошёл на берег. После короткой напряжённой паузы выяснилось, что этот человек, известный торговцам из Дувра как «Пиратский Король Чесапикского залива», не настолько безрассуден, чтобы нападать на объект правительства США. Вместо этого он присоединился к довольно длинному списку рейдеров и бандитов на наших границах, которые предлагают работать на нас или, по крайней мере, оставить нас в покое в обмен на милость. Капитан Джонс кажется более цивилизованным, чем многие из рейдеров, с которыми нам приходилось сталкиваться, и его предложение вновь вызвало обсуждения о том, как нам лучше поступать с подобными группировками на наших окраинах."
    EEN_nf_events.38.a:0 "Эти пираты не знают верности. Убейте его вместе с остальными"
    EEN_nf_events.38.b:0 "Мы должны оценивать эти предложения в каждом конкретном случае"
    EEN_nf_events.39.title:0 "Сохранение мира"
    EEN_nf_events.39.desc:0 "Мы давно переросли тот этап, когда можно было эффективно контролировать наши территории только с помощью солдат. На территории Анклава преступления остаются безнаказанными, поселения живут в страхе, а, что самое опасное, наш авторитет подвергается сомнению. Если мы не примем более жизнеспособную политику в сфере правопорядка, наши аналитики прогнозируют открытые восстания уже через несколько месяцев. Сейчас рассматриваются два наиболее перспективных варианта, каждый из которых имеет свои плюсы и минусы. Первый — создание национальной полиции, подчиняющейся напрямую федеральному правительству. Это даст нам максимальный контроль и обеспечит строгое соблюдение законов по всей территории Анклава. Однако такой подход будет более затратным и увеличит нагрузку на и без того перегруженную администрацию. Второй вариант — делегировать полномочия и расширить обязанности по охране правопорядка местным силам безопасности поселений. Это более экономично и позволит перераспределить административные ресурсы на другие задачи. Тем не менее, существует реальная угроза того, что местная политика и коррупция исказят принципы верховенства закона, которые мы стремимся поддерживать. Сторонники этого варианта предлагают создать небольшой федеральный полицейский корпус, аналогичный довоенным маршалам США, чтобы частично нивелировать эти риски, но сомнения остаются."
    EEN_nf_events.39.a:0 "Федеральная полиция наш выбор"
    EEN_nf_events.39.b:0 "Правосудие на границе работало веками"
    EEN_nf_events.39.c:0 "Слышали ли вы когда-нибудь о теории бродячих бандитов?"
    EEN_nf_events.40.title:0 "Артерии Америки"
    EEN_nf_events.40.desc:0 "Инфраструктура послевоенной Америки практически отсутствует. Когда-то великие шоссе и мосты многие столетия разрушались, за исключением очень немногих случаев. Если мы хотим действительно расшириться и вернуть Америку к жизни, нам нужно заново строить инфраструктуру. Вопрос в том, стоит ли пытаться вернуться к довоенному уровню развития дорог или лучше немного отступить и сначала сосредоточиться на железных дорогах?"
    EEN_nf_events.40.a:0 "Железных дорог достаточно"
    EEN_nf_events.40.b:0 "Шоссе так же американски, как яблочный пирог и плазменный огонь"
    EEN_nf_events.41.title:0 "Проект Американских Городов"
    EEN_nf_events.41.desc:0 "Развалины когда-то великих городов усеяли пейзаж послевоенной Америки. Многие из них несут следы атомных ударов и столетий запустения. Тем не менее, из этих павших чудес инженерного искусства можно многое восстановить. С нашим проектом «Американские города» мы можем взяться за следующие крупные задачи по восстановлению нашей великой нации. Медленно, но верно мы можем начать сносить руины прошлого и заменять их городами завтрашнего дня. Уже сейчас разрабатываются планы по восстановлению небольших участков таких городов, как Вашингтон и Питтсбург. Нам лишь нужно выделить необходимые ресурсы и рабочую силу для этих великих дел."
    EEN_nf_events.41.a:0 "Пора приниматься за работу"
    EEN_nf_events.42.title:0 "Твердая направляющая рука"
    EEN_nf_events.42.desc:0 "Анклав столкнулся со множеством испытаний с момента Великой Войны. Но никогда с тех пор, как была разрушена Платформа и пал Наварро, американская мечта не была так близка к гибели, как в последние несколько лет. Тем не менее, наш Верховный Главнокомандующий оставался непоколебим. Сквозь угрозы Братства, Супермутантов и анархистов президент Отэм повел нашу великую нацию к победе и обеспечил лучший шанс на возрождение Америки за последние десятилетия. Сейчас не время для отдыха. Хотя мы преодолели эти опасные препятствия, это лишь начало. Под руководством президента Отэма Америка вновь оживет."
    EEN_nf_events.42.a:0 "Боже, храни Президента Отэма"
    EEN_nf_events.43.title:0 "Дуврский договор"
    EEN_nf_events.43.desc:0 "Торговцы из Дувра и Рыбаки Залива оказали более упорное сопротивление, чем можно было ожидать от нескольких рыбаков и торговцев. Даже сейчас, когда их лидеры сидят за столом переговоров, некоторые из них продолжают безнадежную борьбу. Эти бывшие солдаты ведут кампанию террора, движимые гневом из-за потерянных друзей, домов и близких во время недавней войны. Хотя со временем эти заблудшие души либо осознают ошибочность своего пути, либо погибнут, существуют способы помочь им увидеть преимущества правления Анклава."
    EEN_nf_events.43.a:0 "Средства на восстановление помогут им прийти в себя"
    EEN_nf_events.43.b:0 "Никаких уступок не будет"
    EEN_nf_events.44.title:0 "Открытие военно-морской базы Отэма"
    EEN_nf_events.44.desc:0 "Сегодня состоялось торжественное открытие первой верфи военно-морской базы имени Отэма. Этот первый шаг в масштабном проекте по восстановлению военно-морского флота Америки, хотя многими и считается бессмысленным в эпоху, когда большинство наших врагов едва ли выводят в море что-то большее, чем ржавые баржи и пароходы, это является важным этапом в обеспечении безопасности побережья. Среди присутствующих были первые выпускники недавно созданной Военно-морской академии Анклава. Хотя они пока что управляют лишь учебными кораблями, они станут ключевыми фигурами в наших морских предприятиях в ближайшие годы."
    EEN_nf_events.44.a:0 "Америка правит морем"
    EEN_nf_events.45.title:0 "Работорговцы Питта"
    EEN_nf_events.45.desc:0 "Более века после Великой Войны Питтсбург оставался не более чем радиоактивным хаосом, где люди едва выживали. Всё изменилось несколько лет назад, когда одинокий солдат Братства остался позади во время зачистки и быстро применил свои навыки и лидерство, чтобы подчинить себе Питт. Хотя многие осуждают использование рабского труда и жестокость при руководстве Ашура, никто не может отрицать успехи, которых он достиг по превращению Питтсбурга из анархического кошмара в нечто, приближенное к функционирующему городскому государству. Теперь, когда мы возвращаем Питт под контроль Америки, нам предстоит ответить на важный вопрос: что делать с Ашуром и его солдатами?"
    EEN_nf_events.45.a:0 "Больше никакого рабства, но они всё ещё могут управлять повседневными делами"
    EEN_nf_events.45.b:0 "Мы постепенно выведем их из власти"
    EEN_nf_events.45.c:0 "Бросить их в тюрьму"
    EEN_nf_events.46.title:0 "Рабы"
    EEN_nf_events.46.desc:0 "Тысячи людей, похищенных со всего региона, оказались вынуждены работать в Питте. Эти бедняги трудились день и ночь без оплаты, а единственным их спасением была битва на гладиаторской арене. Теперь, когда их бывшие хозяева повержены, они ждут и гадают, что мы с ними сделаем. Обычно ответ был бы прост, но тот факт, что почти все они заражены тяжелой генетической мутацией, вызывает особые опасения. Лекарство от этой «тро́гской» болезни пока неизвестно, и риски для остального населения велики. Некоторые наши учёные предложили создать карантинную зону, обеспечив внутри неё гуманное обращение и медицинскую помощь."
    EEN_nf_events.46.a:0 "Мы не можем позволить этим мутантам бродить повсюду"
    EEN_nf_events.46.b:0 "Тех, кто слишком сильно поражён болезнью, необходимо утилизировать"
    EEN_nf_events.46.c:0 "Избавь их всех от страданий"
    EEN_nf_events.47.title:0 "Проблемы с Трогами"
    EEN_nf_events.47.desc:0 "Как будто диких гулей было недостаточно, в Питте обитает особый вид мутантов-отродий. Тро́ги, как их называют местные, превратились в быстрых и смертоносных четвероногих хищников, охотящихся стаями и применяющих простые засады. Если мы всерьёз намерены закрепиться в городе, этих существ необходимо истребить. Высшее командование рассмотрело несколько предложений и сузило их до трёх основных планов по очистке территории от тро́гов и снижению их численности до управляемого уровня. Первый план — это постепенная, методичная зачистка руин специализированными отрядами, которые будут прочёсывать квартал за кварталом. Это займёт много времени и потребует значительных ресурсов на месяцы или даже годы, но риск пропустить гнёзда оценивается как очень низкий. Второй план более смелый: серия быстрых и мощных рейдов по очагам тро́гов с дополнительными отрядами, ожидающими в окрестностях, чтобы уничтожить отставших особей. По оценкам, операция займет пару месяцев, но связана с большими рисками — вероятность пропустить крупное гнездо или оказаться в окружении достаточно высока. Третий план — установка серии приманок в разных точках руин, чтобы выманить тро́гов в заранее подготовленные зоны уничтожения с автоматическими средствами обороны и укреплёнными бункерами. Этот метод тоже займёт немало времени, но потребует меньше людских ресурсов и снизит риск потерь. Однако сохраняется опасность пропустить отдельные участки."
    EEN_nf_events.47.a:0 "Медленно и размеренно — вот путь"
    EEN_nf_events.47.b:0 "У нас нет времени быть осторожными"
    EEN_nf_events.47.c:0 "Сохранение жизни должно быть нашей целью"
    EEN_nf_events.48.title:0 "Герои Джонстауна"
    EEN_nf_events.48.desc:0 "Хотя сначала жители Джонстауна боялись нашего грозного бронированного обмундирования и передового оружия, они быстро поняли — мы действительно те самые освободители, за которых себя выдаём. Угроза нападений рейдеров и вымогательств теперь для этих мирных фермеров — в прошлом. Больше им не придётся отдавать часть урожая или отправлять дочерей и сыновей в рабство к лордам рейдеров. Теперь они живут под надёжной защитой Правительства Соединённых Штатов. Да, им придётся платить налоги с продукции, и призыв в армию остаётся в силе, пока мы не восстановим единство Америки, но это уже совсем другая история — и они это понимают."
    EEN_nf_events.48.a:0 "Вот почему мы боремся"
    EEN_nf_events.49.title:0 "Амиши ЧТО?"
    EEN_nf_events.49.desc:0 "Согласно довоенным записям, Пенсильвания была домом для большого сообщества людей, известных как амиши. Это были трудолюбивые люди, отвергающие все блага современной цивилизации, предпочитая полагаться на собственные руки и помощь соседей. Ожидалось, что рано или поздно мы столкнёмся с представителями этой культуры — ведь такой уклад жизни отлично подходит для выживания в постапокалипсисе. То, что многих удивило, — это то, что те, кто действительно придерживался этих идеалов, оказались не людьми, а гулями и супермутантами. Первоначальные недоразумения привели к кровопролитию, которое мы уже видели, но теперь, когда мы одержали победу, встаёт вопрос: что делать с этой странной частью нашего нового общества? Позволим ли им жить мирной жизнью под нашей защитой или же останемся верны прежнему отношению к мутантам и будем их преследовать?"
    EEN_nf_events.49.a:0 "Мутанты не допустимы"
    EEN_nf_events.49.b:0 "Если они платят налоги, они американцы."
    EEN_nf_events.49.c:0 "Примут ли они чужаков — гулей и мутантов?"
    EEN_nf_events.50.title:0 "На Север"
    EEN_nf_events.50.desc:0 "Северная граница — от верхней части штата Нью-Йорк и до самого края Канады — представляет собой огромную, в основном замёрзшую пустошь, практически не имеющую ценности, кроме нескольких разрушенных городов. Тем не менее, это американская земля, которую необходимо вернуть под контроль. Конечно, нельзя забывать и о несчастном Анклаве Онтарио, который, по последним данным, отчаянно пытается вернуть руины Торонто из рук мутировавших повстанцев. Если мы не будем действовать осторожно, то и нас может постичь такая же участь."
    EEN_nf_events.50.a:0 "Что случилось с Анклавом Онтарио?"
    EEN_nf_events.51.title:0 "Вопрос размером с Мегатонну"
    EEN_nf_events.51.desc.1:0 "Из всех странных жизненных ситуаций, в которых оказались люди в послевоенной Америке, немногие столь же необычны, как город Мегатонна. Два века назад жители района Спрингвейл, которые не смогли попасть в Убежище 101, решили, что кратер с неразорвавшейся бомбой — это лучшее, что им удалось найти. За 200 лет жители Мегатонны построили стены и дома прямо в этом кратере, и, иронично, создали одно из самых безопасных поселений в Столичной Пустоши. Несмотря на то, что бомба оказалась неисправной и ходят слухи, что её полностью обезвредили, постоянная опасность всё ещё существует — радиоактивное излучение просачивается из устройства в почву и питьевую воду жителей Мегатонны. Правильное уничтожение бомбы потребовало бы переселения всего поселения, что может обойтись дорого. В настоящий момент рассматриваются два варианта переселения жителей. Первый — расселить людей Мегатонны по соседним поселениям. Второй — переоборудовать заброшенный рядом супермаркет «Супер-Дупер» в центр для беженцев, где жители Мегатонны смогут временно проживать, пока не найдутся более подходящие дома или пока бомба не будет удалена, и они смогут вернуться домой. Конечно, можно просто направить команду, чтобы полностью обезвредить бомбу и посоветовать жителям не пить местную воду и не есть местные продукты."
    EEN_nf_events.51.desc.2:0 "Жители Мегатонны действительно должны были понимать, что однажды та неразорвавшаяся атомная бомба, рядом с которой они прожили 200 лет, может взорваться. Несмотря на их дерьмовое решение, мы организовали временное убежище в старом супермаркете «Супер-Дупер» для тех, кто выжил после разрушения их домов и не имеет другого места для проживания. Многие из тех, кто находился близко к взрыву, но не пострадал от огня, превратились в гулей, и сейчас предлагается оставлять их в лагере на неопределённый срок, чтобы они не мешали остальному населению."
    EEN_nf_events.51.a:0 "Переселить их в другие поселения"
    EEN_nf_events.51.b:0 "Супер Дупер лагерь беженцев"
    EEN_nf_events.51.c:0 "Просто убедитесь, что она не взорвётся"
    EEN_nf_events.51.d:0 "Держите их там"
    EEN_nf_events.51.e:0 "Переселить их в другие поселения"
    EEN_nf_events.51.f:0 "Гули не должны жить"
    EEN_nf_events.52.title:0 "Община Кентербери"
    EEN_nf_events.52.desc.1:0 "Небольшой городок Община Кентербери на протяжении десятилетий оставался важной остановкой для торговцев. Во времена правления Поселений Столичной Пустоши город вырос из маленькой стоянки в оживленный торговый центр, превзошедший по значимости аналогичные места в Пустошах. Под нашим руководством ситуация остается примерно такой же, но местные торговцы беспокоятся о том, что готовит им будущее."
    EEN_nf_events.52.desc.2:0 "Небольшой городок Община Кентербери был родным домом ныне покойного повстанца Дяди Роу. Хотя после окончания войны город сложил оружие, торговцы и жители до сих пор питают обиду из-за того, что они считают несправедливым убийством своего любимого лидера. Они не доверяют никаким подаркам или сделкам, которые мы им предлагаем, поэтому, если мы собираемся инвестировать в это место, предложение должно быть значительным."
    EEN_nf_events.52.a:0 "Инвестируйте в город и развивайте экономику"
    EEN_nf_events.52.b:0 "Создайте торговое агентство для регулирования торговли в этом регионе"
    EEN_nf_events.52.c:0 "Они знают, что делают. Только не забудьте собрать налоги."
    EEN_nf_events.52.d:0 "У Дяди Роу на самом деле хорошие идеи"
    EEN_nf_events.52.e:0 "Это может быть дорого, но инвестиции должны окупиться"
    EEN_nf_events.52.f:0 "Они будут подчиняться нашим агентам или закончат как Роу"
    EEN_nf_events.53.title:0 "Тенпенни-Тауэр"
    EEN_nf_events.53.desc.1:0 "За последние десятилетия некогда заброшенный курорт, ныне известный в Пустошах как Тенпенни-Тауэр, превратился в поселение для богатой элиты. До недавнего времени башней управлял Алистер Тенпенни — британский деспот, осмелившийся заявить права на американскую землю и возглавить борьбу доблестного народа Столичных Пустошей против собственного правительства. После его казни ответственность за управление башней взял на себя житель по имени Герберт «Дерзкий» Дэшвуд. Офицер, прикомандированный к Башне, сообщает, что мистер Дэшвуд полностью соблюдает директивы Анклава и с готовностью уступит своё место, когда будет назначен подходящий преемник."
    EEN_nf_events.53.desc.2:0 "К шоку и отвращению солдат, направленных в Тенпенни-Тауэр, некогда довоенный курорт, ставший домом для элиты Пустошей, превратился в жилище исключительно для гулей. Гуль, контролирующий башню, по имени Рой Филлипс, уклончиво отвечал на вопросы о том, как он захватил власть и что случилось с прежними жителями. Зомби заявил нашим солдатам, что все они уехали из-за своей нетерпимости, но массовое захоронение, найденное в соседних туннелях метро, рассказывает совсем другую историю. Конечно, это массовое убийство американских граждан группой зомби не может остаться без наказания."
    EEN_nf_events.53.desc.3:0 "За последние десятилетия некогда заброшенный курорт, ныне известный в Пустошах как Тенпенни-Тауэр, был превращён в поселение для богатой элиты Пустошей. После казни прежнего владельца силами Поселений Столичной Пустоши управление башней взял на себя житель по имени Герберт «Дерзкий» Дэшвуд. Прикреплённый к Башне офицер сообщает, что мистер Дэшвуд полностью выполняет директивы Анклава и с готовностью уступит своё место, как только будет назначен подходящий преемник."
    EEN_nf_events.53.desc.4:0 "За последние десятилетия некогда заброшенный курорт, ныне известный в Пустошах как Тенпенни-Тауэр, превратился в поселение для богатой элиты Пустошей. После казни предыдущего лидера силами Поселений Столичной Пустоши управление поселением взял на себя житель по имени Ирвинг Ченг. Первоначальные сведения о башне и её лидере вызвали беспокойство, так как рисовали мистера Ченга как китайского коммунистического революционера. К сожалению, эти опасения подтвердились. Мистер Ченг почти сразу заявил офицеру, направленному в башню, что он — гордый потомок Председателя Ченга, лидера коммунистического Китая до войны. Последней каплей стало обнаружение, что мистер Ченг начал превращать Тенпенни-Тауэр в коммунистическую дистопию. Не в силах больше терпеть, офицер казнил мистера Ченга на месте и теперь требует прислать замену для руководства башней и дезиндукции подвергшихся промывке мозгов жителей."
    EEN_nf_events.53.desc.5:0 "За последние десятилетия некогда заброшенный курорт, ныне известный в Пустошах как Тенпенни-Тауэр, был превращён в поселение для богатой элиты Пустошей. Башней управлял британский деспот по имени Алистер Тенпенни, осмелившийся заявить права на американскую землю как на свою собственность. Естественно, он был казнён, а вооружённая охрана оказала незначительное сопротивление перед лицом наших сил, направленных на захват башни. Временно управление башней передано одному из жителей, мистеру Дэшвуду, до тех пор, пока не будет назначен подходящий преемник."
    EEN_nf_events.53.a:0 "Оставить его главой"
    EEN_nf_events.53.b:0 "Очистите башню и попытайтесь что-нибудь сделать с вонью"
    EEN_nf_events.53.c:0 "Убейте Филипса и его сообщников, а остальных переселите"
    EEN_nf_events.53.d:0 "Оставить его главой"
    EEN_nf_events.53.e:0 "Выдайте этому человеку медаль!"
    EEN_nf_events.54.title:0 "Ривет-Сити"
    EEN_nf_events.54.desc.1:0 "За недели, прошедшие с момента, когда Ривет-Сити представил своё предложение и согласился на наше правление в обмен на автономию, внутри администрации развернулись жаркие дебаты о будущем плавающего города. Хотя правда, что они заняли американский военно-морской корабль и тем самым фактически захватили государственную собственность, они лучше многих жителей Пустошей осознают своё место как граждане Америки и проявили исключительное сотрудничество с нашими научными группами в изучении послевоенной флоры. Также очевидно, что восстановление этого корабля в рабочее состояние обернётся куда большими трудностями, чем оно того стоит. В администрации Отэма существует значительная поддержка идеи продолжать предоставлять Ривет-Сити автономию и направлять им инженерную помощь, чтобы город оставался на плаву в обозримом будущем. Или, по крайней мере, мы можем поддержать их учёных и превратить Ривет-Сити в полноценный научный институт для воспитания умов завтрашнего дня."
    EEN_nf_events.54.desc.2:0 "Жители Ривет-Сити сражались так же упорно, как и любые другие пустошники, сопротивлявшиеся нашему правлению, но, как и все остальные, они осознали бессмысленность своей борьбы и впустили наши войска. Теперь люди этого ржавого мегаполиса сидят и задаются вопросом, что же будет с ними и их домом. Наши инженеры обследовали этот ржавый корабль и пришли к выводу, что даже если бы мы смогли восстановить судно в рабочее состояние, ресурсы, необходимые для ремонта и эксплуатации, лучше потратить на флот винтокрылов или несколько батальонов солдат в силовой броне. Это ставит вопрос: что делать с кораблём и его жителями? На самом деле у нас есть два варианта, которые заслуживают рассмотрения. Мы можем направить несколько инженерных рекрутов для поддержания судна на плаву на долгие годы — ведь довольное население охотнее платит налоги. Либо мы можем расширить их научные лаборатории и превратить Ривет-Сити в научный институт, где оружие завтрашнего дня будет безопасно разрабатываться вдали от наших складов боеприпасов."
    EEN_nf_events.54.a:0 "Держите Ривет-Сити на плаву"
    EEN_nf_events.54.b:0 "Отправьте худших из отбросов в Супер Дупер маркет"
    EEN_nf_events.54.c:0 "Расширить лаборатории"
    EEN_nf_events.54.d:0 "Расширить лаборатории"
    EEN_nf_events.55.title:0 "Уборка на Аллее"
    EEN_nf_events.55.desc:0 "Национальная Аллея была местом одних из самых ожесточённых боёв в Столичной Пустоши почти два столетия. Мутанты, рейдеры и различные другие группировки постоянно сражались за контроль над этой территорией — как из-за её центрального расположения, так и из-за ценных трофеев, которые можно было найти среди руин. Эта борьба наконец закончилась с нашим вмешательством. Впервые за 200 лет мы можем с уверенностью заявить, что национальная аллея лежит в тишине. Мутанты, анархисты и прочие враги были уничтожены, а территория — закреплена. Теперь мы можем приступить к сложной задаче — восстановлению аллеи хотя бы отчасти в её прежнем величии."
    EEN_nf_events.55.a:0 "Спасибо всем за работу"
    EEN_nf_events.56.title:0 "Смерть Либерти"
    EEN_nf_events.56.desc:0 "Это тёмный день для Братства Стали. Наше самое ценное оружие в войне с Анклавом — Либерти Прайм — было уничтожено каким-то орбитальным оружием. Наши писцы до сих пор пытаются взломать шифр данных, извлечённых с места катастрофы, чтобы понять, что именно произошло, но самое важное известно каждому в Братстве — мы потеряли наш лучший инструмент как для противодействия воздушной мощи Анклава, так и для прорыва их укреплённых позиций. Писцы оценивают, что ремонт Либерти Прайма может занять годы, если он вообще возможен, поэтому сейчас нам придётся полагаться на альтернативные виды оружия, чтобы выиграть эту войну."
    EEN_nf_events.56.a:0 "Мы должны бороться"
    EEN_nf_events.57.title:0 "Национальный Архив"
    EEN_nf_events.57.desc.1:0 "Удивительно, но подвал под Национальными Архивами практически не пострадал за 200 лет после падения бомб. Ещё более удивительно, что оставшиеся в здании роботы считают себя революционными солдатами под командованием протектрона, который уверен, что он — Баттон Гвиннетт. Роботы отреагировали на коды допуска нашей разведывательной группы и признали нас представителями правительства США. Офицер, возглавляющий команду, ожидает дальнейших приказов о том, что делать с этими машинами."
    EEN_nf_events.57.desc.2:0 "Не должно вызывать удивления, что Братство Стали, в своём стремлении разграбить все доступные знания, пробралось в подвальное помещение под Национальными архивами. Однако нашу разведывательную группу озадачило, почему охранные роботы остались в рабочем состоянии и почему один из протектронов уверен, что он — Баттон Гвиннетт. К счастью, машины отреагировали на наши коды допуска и признали нас представителями правительства США. Сейчас разведгруппа проводит зачистку архивов согласно приказу, но офицер, командующий операцией, запрашивает дальнейшие указания по обращению с роботизированной охраной."
    EEN_nf_events.57.desc.3:0 "Не должно вызывать удивления, что Братство Стали, в своём стремлении заполучить любые знания, проникло в подвальное помещение под Национальными архивами. Тем не менее, наша разведывательная группа не встретила никакого сопротивления, и, похоже, вся охрана объекта была отключена и разграблена во время рейда Братства. Что же вызывает недоумение — отсутствие каких-либо следов боя, хотя по сведениям на объекте должно было находиться значительное количество охранных роботов и турелей."
    EEN_nf_events.57.a:0 "Собирай своих людей, Гвиннетт. Америка нуждается в тебе!"
    EEN_nf_events.57.b:0 "Если Эдем нас чему-то и научил, так это тому, что не стоит доверять безумным машинам"
    EEN_nf_events.57.c:0 "Это действительно одна из загадок жизни"
    EEN_nf_events.58.title:0 "Подземелье"
    EEN_nf_events.58.desc:0 "Глубоко в старом музее истории есть место, куда, по всей видимости, гули из Столичной Пустоши сбиваются уже много лет. Естественно, мы не можем позволить им оставаться и загрязнять нашу Национальную Аллею, но вопрос о том, что с ними делать, пока остаётся открытым."
    EEN_nf_events.58.a:0 "Отправляйтесь в Супер Дупер лагерь беженцев"
    EEN_nf_events.58.b:0 "Переселить их в другие поселения"
    EEN_nf_events.58.c:0 "Убить их всех"
    EEN_nf_events.59.title:0 "Избыточный бюджет"
    EEN_nf_events.59.desc:0 "Во время строительства поста слежения Рэйвен-Рок остался небольшой неиспользованный бюджет. Как это часто бывало с правительственными проектами того времени, начальник решил потратить оставшиеся средства на что-нибудь, чтобы не рисковать сокращением бюджета в следующем проекте."
    EEN_nf_events.59.a:0 "Роботы для откатов RobCo"
    EEN_nf_events.59.b:0 "Запасные части для терминалов"
    EEN_nf_events.59.c:0 "Пару дополнительных инструментов… На всякий случай"
    EEN_nf_events.60.title:0 "Другой фаворит Эдема"
    EEN_nf_events.60.desc:0 "Президент Линкольн был не единственным лидером, на личности которого Эдем основывал своё поведение. Хотя жизненный путь юриста, ставшего государственным деятелем и удержавшего Союз во время Гражданской войны, вызывал у президента Эдема почти одержимое восхищение, он черпал вдохновение и у других президентов. Четыре из них особенно выделялись для Эдема как образцы, к которым он мог обращаться, вступая в свою роль. Президент Улисс С. Грант был великим генералом, прежде чем стать президентом, возглавив армии, выигравшие Гражданскую войну Линкольна. Президент Эндрю Джексон тоже был выдающимся государственным деятелем, при котором произошло значительное расширение американских территорий. Президент Герберт Гувер провёл Америку начала XX века через тяжёлые испытания и выступал против коммунизма. И, наконец, недавно ушедший из жизни президент Дик Ричардсон — он удерживал Анклав вместе в бурные времена и почти довёл до конца главную цель Анклава — уничтожение мутантов. Если бы Эдему пришлось выбрать второго по значимости вдохновителя своей амальгамированной личности, им был бы..."
    EEN_nf_events.60.a:0 "Президент Грант"
    EEN_nf_events.60.b:0 "Президент Ричардсон"
    EEN_nf_events.60.c:0 "Президент Джексон"
    EEN_nf_events.60.d:0 "Президент Гувер"
    EEN_nf_events.61.title:0 "Эдем зовёт"
    EEN_nf_events.61.desc:0 "Эдем использовал ограниченную мощность ретрансляторов Рэйвен-Рока и остатки радиосети Анклава, чтобы послать вызов в Анклав на Наварро. Он призвал их вернуться в Рэйвен-Рок для восстановления. Не все были убеждены, но даже с теми, кто решил остаться, на эвакуационных винтокрылах не хватало места для всех. Пришлось принимать трудные решения — кого поставить в приоритет."
    EEN_nf_events.61.a:0 "Мы должны уберечь мирных жителей от опасности"
    EEN_nf_events.61.b:0 "Мы на войне! Нам нужны солдаты."
    EEN_nf_events.61.c:0 "Наука выигрывает войны. Отдайте приоритет исследователям!"
    EEN_nf_events.62.title:0 "Гули на службе?"
    EEN_nf_events.62.desc:0 "С недавним изменением политики, разрешающим жителям пустоши служить в армии, возник вопрос — стоит ли распространять это на гулей в нашей стране. Многие твёрдые сторонники традиций, вполне понятно, выступают против идеи служить рядом с зомби, которые в любую минуту могут сойти с ума и стать дикими. Они предупреждают, что это скользкий путь, ведущий к таким ужасам, как избирательные права гулей или даже президент-гуль. Тем не менее, некоторые в высшем командовании отмечают, что гули способны действовать в зонах с высоким уровнем радиации, где обычные солдаты рискуют получить смертельное облучение. Такие бойцы увеличат наши ряды и позволят экономить запасы Рад-Икс. Стоит ли эта небольшая выгода тех рисков, которые она несёт?"
    EEN_nf_events.62.a:0 "Позволить гулям служить"
    EEN_nf_events.62.b:0 "Оставить всё как есть"
    EEN_nf_events.63.title:0 "Последнее желание мёртвого Президента"
    EEN_nf_events.63.desc:0 "После короткого обратного отсчёта и пронзительных сирен земля задрожала, и те, кто находился в бункере, ликовали от свершившегося. Долгие годы молчавшее оружие войны наконец было выпущено на тех, кто уцелел после последних запусков 200 лет назад."
    EEN_nf_events.63.a:0 "Выкуси, Китай!"
    EEN_nf_events.64.title:0 "Стальная заноса в нашем боку"
    EEN_nf_events.64.desc:0 "Несмотря на гибель её отца и большинства солдат Братства Стали, по нашим данным, Сара Лайонс всё ещё ведёт отряд партизан Братства в руинах центра Вашингтона. Они теряют людей и ресурсы с каждым днём, но если мы не решим этот вопрос как можно раньше, это может вдохновить мутантов вновь поднять оружие."
    EEN_nf_events.64.a:0 "Покончи с этим побыстрее"
    EEN_nf_events.65.title:0 "Братство пало... Снова"
    EEN_nf_events.65.desc:0 "Последние остатки террористов Братства наконец приведены к правосудию, дорогая Америка. Благодаря неустанным усилиям мужчин и женщин наших вооружённых сил мы все можем вздохнуть немного легче. Однако борьба за Америку, дорогие дети, ещё не окончена. Из-за предательства покойного полковника Отэма и его сообщников наши храбрые защитники столкнулись с целым рядом новых проблем. В попытке узурпировать законно избранное правительство этой великой нации они саботировали наше коммуникационное оборудование, и хотя их преступления должны быть наказаны, роли, которые занимали эти предатели, необходимо занять свежими солдатами, готовыми сражаться за ту Америку, которую мы заслуживаем. Мне также сообщили, что, несмотря на то что небольшое число наших солдат на передовой испытывает проблемы с поставками, лучшие умы работают круглосуточно над поиском решений. Так что, моя дорогая Америка, можешь быть уверена, что наши солдаты есть и будут там, чтобы защищать тебя и твоих близких. Ведь чтобы остановить Анклав, потребуется больше, чем несколько оборванных проводов и пустых кресел. Это президент Эдем, завершаю передачу."
    EEN_nf_events.65.a:0 "Нам нужно быстро это исправить!"
    EEN_nf_events.66.title:0 "Проблемы с коммуникацией"
    EEN_nf_events.66.desc.1:0 "Мистер Президент, во время попытки переворота полковника Отэма его люди, по всей видимости, уничтожили важные узлы основного коммуникационного ретранслятора Рэйвен-Рок. Несомненно, это была тщетная попытка помешать нам вызвать подкрепление. Тем не менее, ущерб нанесён, и сейчас использование резервного оборудования связи вызывает проблемы на поле боя. Финальный ремонт уже ведётся, но некоторые детали просто невозможно заменить, и в течение многих лет мы будем работать в условиях пониженной эффективности."
    EEN_nf_events.66.desc.2:0 "Мистер Президент, во время попытки переворота полковника Отэма, по всей видимости, его люди взорвали взрывчатку вокруг основного коммуникационного ретранслятора мобильного командного краулера. Это, без сомнения, была попытка разорвать связь и помешать нам вызвать подкрепление. Резервное коммуникационное оборудование, которое у нас было, едва функционировало в тот момент, и это вызывает массу проблем на передовой. Мы делаем всё возможное, чтобы вернуть в строй оставшиеся антенны, но они изначально не предназначались для работы на таких больших расстояниях."
    EEN_nf_events.66.a:0 "Тогда нам придётся искать другие решения"
    EEN_nf_events.66.b:0 "Тогда нам придётся искать другие решения"
    EEN_nf_events.67.title:0 "Маленькие шпионы Эдема"
    EEN_nf_events.67.desc:0 "Моя дорогая Америка, я знаю, что у многих возникли вопросы из-за моего редкого появления на публике. Однако, учитывая недавнюю попытку моего убийства и важность нашей работы по восстановлению этой великой нации, я уверен, вы понимаете необходимость осторожности с моей стороны. Будьте уверены, дорогая Америка, я всё ещё с вами. Каждый робо-глаз, который вы видите — будь то парящий над вашей улицей или скользящий по пыльным полям, — передаёт мне образ нашей страны. Можно с уверенностью сказать, что эти машины, глаза и уши, вашешл Президента. А значит, они глаза и уши самой Америки."
    EEN_nf_events.67.a:0 "Вперед, мой маленький робо-глаз, вперед"
    EEN_nf_events.68.title:0 "Пустой кабинет"
    EEN_nf_events.68.desc:0 "Мистер Президент, поскольку большая часть командного состава оказалась либо соучастниками, либо добровольными участниками переворота командира Отэма, казни всех причастных оставляют огромные пробелы по всей цепочке командования. Собранные данные показывают, что если эти вакансии не будут заполнены в ближайшее время, оперативная эффективность может снизиться до 53%."
    EEN_nf_events.68.a:0 "Настало время новому поколению взять на себя командование"
    EEN_nf_events.68.b:0 "Я — главнокомандующий. Мне следует попробовать взять всё в свои руки."
    EEN_nf_events.69.title:0 "Новое командование"
    EEN_nf_events.69.desc:0 "Приветствую тебя снова, дорогая Америка. С вами ваш президент, Джон Генри Эдем. Я хочу обратиться к некоторым вопросам, связанным с моей недавней ролью в руководстве нашей славной армией. Правда, нехватка кадров заставила меня принять более активное участие в качестве главнокомандующего, но это было лишь временно. В конце концов, управлять этой великой нацией и всеми аспектами её вооружённых сил — задача не из лёгких, даже для меня. Именно поэтому я рад сообщить, что подходящие заместители на вакантные места в высшем командовании найдены и уже осваиваются в своих ролях. Можете быть уверены, что я тщательно изучил биографии каждого из этих офицеров и уверен — это именно те люди, которые нужны нам. Армия Америки будет в надёжных руках лучших лидеров, которых она видела за последние столетия, а я смогу вновь сосредоточиться на управлении нашей великой демократией. Спи спокойно, Америка — эти люди позаботятся о твоей безопасности."
    EEN_nf_events.69.a:0 "Мы смотрим в прошлое, чтобы улучшить наше будущее"
    EEN_nf_events.70.title:0 "Пустые винтовки и пустые желудки"
    EEN_nf_events.70.desc:0 "Мистер Президент, поступают сообщения со всей Столичного Пустоши о том, что солдаты не получают регулярных поставок и сталкиваются с нехваткой всего — от боеприпасов до туалетной бумаги. Правда в том, что логистический кошмар, который стремительно разрастается на всей этой территории, просто выходит за рамки подготовки наших специалистов из научного отдела. Перебрав архивы, мы пришли к двум краткосрочным решениям, которые, увы, далеки от идеала, но могут выиграть нам время до разработки долгосрочных мер. Первое — разрешить нашим солдатам брать всё необходимое у местного населения и из руин. Очевидно, что у жителя пустоши нет в изобилии микроядерных батарей, поэтому им, возможно, придётся довольствоваться оружием пониже класса. Второе — увеличить использование винтокрылов для снабжения. Это, конечно, создаст дополнительную нагрузку на пилотов, не говоря уже о расходе топлива и рисках потерь. Как я уже сказал, ни один из вариантов не идеален, но нам нужно выиграть время."
    EEN_nf_events.70.a:0 "Солдатам придётся довольствоваться тем, что есть"
    EEN_nf_events.70.b:0 "Винтокрылы будут доставлять припасы"
    EEN_nf_events.71.title:0 "Найден тайник с припасами"
    EEN_nf_events.71.desc:0 "Мистер Президент, в рамках нашей недавней политики «выкручивайся как можешь» некоторые из наших солдат, патрулируя свои посты, наткнулись на информацию, которую следует донести. Один отряд обнаружил торговца оружием из числа пустошников, у которого имеется огромный арсенал произведённого ими оружия и боеприпасов. Однако он отказывается вести с нами торговлю и охраняется значительным отрядом наёмников. Отряд просит подкрепление для силового захвата этого запаса вооружений."
    EEN_nf_events.71.a:0 "Мы не будем жертвовать людьми ради ржавеющих ружей"
    EEN_nf_events.71.b:0 "Окажите им поддержку. Нам нужна огневая мощь"
    EEN_nf_events.72.title:0 "Вода Эдема"
    EEN_nf_events.72.desc:0 "Моя дорогая Америка, с вами ваш президент Джон Генри Эдем. У меня для вас поистине выдающиеся новости. Объект «Проект Чистота», отбитый у террористов из Братства Стали, наконец-то запущен в работу. В этот самый момент чистая, прозрачная вода льётся из установки и разливается по бутылкам для доставки по всей Столичной Пустоши. После великих усилий и труда я с гордостью могу сказать — мы сделали огромный шаг к тому, чтобы вернуть Америку той великой нацией, которой ей суждено быть. Пей глубоко, Америка, ты заслужила этот глоток."
    EEN_nf_events.72.a:0 "Скоро..."
    EEN_nf_events.73.title:0 "Клиники Лечения"
    EEN_nf_events.73.desc:0 "Приветствую вас снова, Америка, с вами ваш президент Джон Генри Эдем. У меня важное сообщение. Как вы, несомненно, уже заметили, на нашу нацию обрушилась страшная чума. Нет, это не метафорическая чума — ни Супермутанты, ни Коммунизм — а самая что ни на есть реальная болезнь. Мне больно видеть, как многие американцы страдают от этой эпидемии. Поэтому я объявляю о создании клиник по всей Столичной Пустоши для лечения заражённых этим недугом. Всем гражданам настоятельно рекомендуется обращаться в ближайшее медицинское учреждение при первых признаках болезни, чтобы получить необходимую помощь и избавиться от страданий. Я не устану повторять — принять эту помощь от вашего Правительства крайне важно. Ведь борьба с этой чумой — суть Анклава."
    EEN_nf_events.73.a:0 "§R Но как это работает?"
    EEN_nf_events.73.b:0 "Столица будет чистой... в конце концов"
    EEN_nf_events.74.title:0 "Приз «Когтю»"
    EEN_nf_events.74.desc:0 "Сегодня утром наёмники из Компании «Коготь» со всех уголков Столичной Пустоши были вызваны обратно в форт Баннистер. Им сообщили, что это — празднование недавних побед Анклава и вручение заслуженной награды за их участие. Отчасти это было правдой. Однако награда оказалась совсем не такой, как они ожидали. Как только последний солдат был учтён, у автоматических боевых роботов отключились ограничители боевых функций. В течение часа все наёмники были уничтожены. Компания «Коготь» получила лучшую награду, которую только мог пожелать мутант — быструю смерть."
    EEN_nf_events.74.a:0 "Выдвигаемся..."
    EEN_nf_events.75.title:0 "Вопрос о «Когтях»"
    EEN_nf_events.75.desc:0 "После первоначальной разведки наше командование обсудило, как поступить с Компанией «Коготь» — вопрос, который уже прозвали вопросом Когтей. Часть ортодоксальных офицеров настаивает на том, что этих захватчиков необходимо силой изгнать с форта Баннистер. Более прагматичные командиры выступают за попытку нанять наёмников Компании «Коготь» на службу."
    EEN_nf_events.75.a:0 "Эти сквоттеры будут уничтожены!"
    EEN_nf_events.75.b:0 "Они могут стать хорошим пушечным мясом"
    EEN_nf_events.76.title:0 "Литт Ламплайт"
    EEN_nf_events.76.desc:0 "В ходе поисков тайного прохода в Убежище 87, в рамках нашего плана по истреблению мерзких супермутантов, наши разведчики наткнулись на нечто совершенно неожиданное. В пещерах Ламплайт обнаружено поселение детей, потомков ребят, которые отправились туда на школьную экскурсию в день падения бомб. Ещё более удивительно, что анализы показали — жизнь в пещерах и питание радиационно-устойчивыми грибами сделали этих детей практически свободными от мутаций. Хотя они и не являются на 100% генетически чистыми, наши учёные уверяют, что любые незначительные мутации не передадутся следующему поколению, если этих детей интегрировать в общество Анклава."
    EEN_nf_events.76.a:0 "Они всё ещё мутанты."
    EEN_nf_events.76.b:0 "Думаю, нам нужен приют"
    EEN_nf_events.77.title:0 "Ступая в сердце тьмы"
    EEN_nf_events.77.desc:0 "Наши ударные группы без особых проблем прорвались через Убежище 87. Много месяцев боёв с солдатами Братства Стали в руинах Столичной Пустоши сделали убийство нескольких мутантов в коридорах почти прогулкой в парке. После того, как убежище было взято под контроль, наши научные команды приступили к обследованию и обнаружили, что запасы ВРЭ в убежище находятся на критически низком уровне. По их оценкам, через несколько лет запасы полностью иссякнут. Тем не менее, это кошмар довоенной науки, которому мы можем положить конец. Или же мы можем использовать эту технологию и обратить супермутантов на службу себе. Наши учёные уверены, что с помощью более продвинутых методов мы сможем растянуть имеющийся запас как минимум на десять лет, прежде чем потребуется искать новые источники."
    EEN_nf_events.77.a:0 "Закрыть его"
    EEN_nf_events.77.b:0 "Рабы Супермутанты. Звучит полезно"
    EEN_nf_events.78.title:0 "Проблемы с людскими ресурсами"
    EEN_nf_events.78.desc:0 "Один тревожный подсчёт не даёт покоя Президенту Эдему по ночам. Ну, если бы он вообще спал — ведь он машина. По расчётам Эдема, Анклаву необходимо либо резко сократить потери на поле боя, либо найти значительное число генетически чистых людей. Если ни одно из этих условий не будет выполнено, Эдем прогнозирует, что в течение десяти лет население Анклава станет слишком малочисленным, чтобы поддерживать своё существование. Учитывая, что по крайней мере 95% Убежищ оказались либо экспериментальными провалами, либо были открыты так давно, что потомки их обитателей неотличимы от обычных мутантов, остаётся лишь один путь. Во что бы то ни стало, Анклав должен терять меньше людей в боях. Главные офицеры штаба выдвинули две основные инициативы для снижения потерь. Первая — сосредоточиться на оснащении каждого солдата лучшей доступной силовой бронёй, что, хоть и дорого, создаст самую мощную боевую силу на континенте. Вторая, менее рискованная — попытаться заменить максимальное количество бойцов роботами. Боевые роботы уже не раз доказали свою эффективность, осталось лишь устранить несколько технических недостатков. Тем не менее, Президент открыт для других предложений."
    EEN_nf_events.78.a:0 "Силовая броня завела нас так далеко"
    EEN_nf_events.78.b:0 "Будущее за сталью"
    EEN_nf_events.78.c:0 "Что насчёт Супермутантов?"
    EEN_nf_events.79.title:0 "Правдивое название пещеры"
    EEN_nf_events.79.desc:0 "Как и ожидалось, так называемое «Убежище Когтей Смерти» оказалось полным Когтей Смерти. Пробиваясь через их многочисленные стаи, наша команда добралась до гнезда и сумела унести несколько яиц. Благодаря новым выводкам и образцам смертоносных когтей, которых пришлось уничтожить, мы сможем многое узнать об этой разновидности мутантов, не рискуя возвращаться в ту пещеру."
    EEN_nf_events.79.a:0 "Понял"
    EEN_nf_events.80.title:0 "Белая ворона"
    EEN_nf_events.80.desc:0 "Внутри Убежища 87 был обнаружен супермутант, не похожий ни на одного из тех, что мы встречали с тех пор, как отправились на Восток. Супермутант, не обезумевший от трансформации и сохранивший ясный ум. Погрузившись в архивы Убежища 87 и проведя вскрытие этого уникального мутанта, мы, похоже, нашли способ повторить процесс. Есть лишь одно ограничение — обычный житель Пустоши не сможет пройти через эту трансформацию. Разумеется, мы не стали бы испытывать эту теорию на полностью здоровом чистокровном человеке, но один смертельно больной солдат вызвался пожертвовать тем немногим, что у него осталось, ради науки. Результат превзошёл все наши ожидания."
    EEN_nf_events.80.a:0 "Он возглавит зеленую волну против врагов человечества."
    EEN_nf_events.81.title:0 "Убежище 101"
    EEN_nf_events.81.desc:0 "Согласно архивам Волт-Тек, Убежище 101 изначально не предназначалось для открытия. Хотя знаки и рассказы пустошных жителей свидетельствуют о том, что эта директива не всегда соблюдалась, местоположение Убежища 101 оставалось загадкой — до прошлой недели. Похоже, что население Убежища неуклонно сокращалось последние десятилетия, и ради выживания его обитатели вышли из убежища в открытый мир. Они были не менее удивлены, чем мы, обнаружив, что их убежище расположено менее чем в миле от строительной площадки нового американского города. Несмотря на первоначальную осторожность, жители Убежища признали нас истинным правительством Соединённых Штатов, согласившись на генетические проверки и предоставление доступа к своим архивам. Результаты проверок подтвердили настойчивость их надзирателя, что убежище открывали лишь для кратковременных обследований. Сейчас эти жители переселяются в готовое жильё нашего нового города, а перед нами встала новая задача — что делать с пустым Убежищем."
    EEN_nf_events.81.a:0 "Разберите его на материалы"
    EEN_nf_events.81.b:0 "Посмотрим, сможем ли мы перепрофилировать энергосистемы"
    EEN_nf_events.81.c:0 "Оно могло бы служить командным бункером"
    EEN_nf_events.82.title:0 "Выдернутый шнур Эдема"
    EEN_nf_events.82.desc:0 "Либо кто-то настучал Президенту, либо его слежка была куда более навязчивой, чем мы думали — потому что Президент Эдем знал о нашем приближении. Но это мало что изменило. Его автоматизированная система безопасности и несколько преданных солдат не смогли противостоять основным силам, расквартированным на Рэйвен-Роке. Бой длился всего несколько часов, и главный компьютер Эдема был отключён навсегда. Этот переворот вызвал замешательство у тех, кто не был причастен к заговору, но рядовые солдаты слишком заняты боем, чтобы думать о политике."
    EEN_nf_events.82.a:0 "Поздравим Президента Отэма"
    EEN_nf_events.83.title:0 "Глупость Отэма"
    EEN_nf_events.83.desc:0 "Полковник Отэм был хорошим командиром, но его высокомерие сыграло с ним злую шутку. Узнав о плане Эдема распространять ВРЭ в рамках Проекта «Чистота», он попытался сплотить солдат для убийства президента. Однако он не знал, что друзей у него было куда меньше, чем он думал. Хотя многие в военном командовании поддерживали его, его влияние не распространялось достаточно широко, чтобы убедить всю армию встать на сторону его предательских замыслов. Полковник мёртв, а оставшихся в живых соучастников, не погибших во время нападения, сейчас собирают и арестовывают. Этот удар потряс наше руководство, но у нас есть дела поважнее, чтобы отвлекаться на внутренние разборки."
    EEN_nf_events.83.a:0 "Вот что бы случилось, если бы они не были так влюблены"
    EEN_nf_events.83.b:0 "Перейдем к более насущным вопросам"
    EEN_nf_events.84.title:0 "Убежище 108"
    EEN_nf_events.84.desc:0 "Клонирование человека — научный вопрос, продолжающийся веками. Одной из последних попыток стала работа Волт-Тек в Убежище 108. После обнаружения местоположения убежища в древних базах данных мы отправили команду для извлечения всего, что ещё можно спасти. То, что они нашли, было ужасающим — разрушающееся убежище, наполненное убийственными клонами. Немногие терминалы, не проржавевшие до полной непригодности, были подвергнуты восстановлению данных, а наши учёные сейчас анализируют образцы уничтоженных клонов, чтобы не повторить ошибок, допущенных учёными этого убежища."
    EEN_nf_events.84.a:0 "Может быть, этот парень, Гэри, был просто придурком"
    EEN_nf_events.85.title:0 "Улучшения в управлении когтями смерти"
    EEN_nf_events.85.desc:0 "После того как попытки повысить интеллект Когтей Смерти на Западе обернулись опасными последствиями, наши учёные вернулись к чертежной доске и разработали устройства управления, обманывающее Когтей Смерти, заставляя их считать передатчик сигнала на форпосте своим гнездом, а сотрудников Анклава с правильными ИД-сигналами — своим потомством. Хотя это оказалось эффективным средством для усиления безопасности форпоста, у метода было три серьёзных недостатка. Первый — Коготь Смерти не мог удаляться далеко от передатчика, иначе его приходилось уничтожать, чтобы он не напал на наших солдат. Второй — Когти Смерти ограничивались оборонительными задачами и не могли участвовать в наступательных операциях. Третий — Когти Смерти часто пытались приносить обратно туши любых пустошных тварей, которых они убивали, а как минимум дважды один из них попытался накормить коротышку-солдата, которого, видимо, принял за слишком молодого для нормального питания. Чтобы преодолеть эти проблемы, хотя бы в краткосрочной перспективе, наши учёные сейчас создают прототипы сигнальных устройств, которые можно будет крепить к стандартным силовым доспехам. Это позволит Когтям Смерти сопровождать солдат в бою, а их защитные инстинкты заставят их разрывать любого, кто нападёт на сопровождаемого бойца."
    EEN_nf_events.85.a:0 "Что эээээ... случилось с тем, кого они пытались накормить?"
    EEN_nf_events.86.title:0 "Успешное клонирование"
    EEN_nf_events.86.desc:0 "После множества неудачных попыток клонировать взрослого человека наши учёные пришли к выводу, что проблема кроется не в самом процессе клонирования, а в психической подготовке клонов. Они выдвинули гипотезу, что из-за отсутствия настоящих воспоминаний и понимания общества клоны появляются на свет в почти диком, обезьяноподобном состоянии, воспринимая всех, кроме своих собратьев-клонов, как врагов, которых нужно уничтожить. В настоящее время у нас нет ни необходимых исследований, ни технологий для имплантации воспоминаний, которые могли бы сделать взрослого клона полноценным членом общества, и прорыв в этой области ожидается не раньше, чем через несколько лет. Тем временем попытки клонировать младенцев оказались относительно успешными, и теоретически воспитание клонированного ребёнка не должно сильно отличаться от воспитания естественного."
    EEN_nf_events.86.a:0 "Полагаю, нам придется ждать 18 лет, прежде чем появится армия клонов."
    EEN_nf_events.87.title:0 "Киберкогти"
    EEN_nf_events.87.desc:0 "То, что начиналось как шутка про «чёртовы лазерные лучи» на «чёртовой голове» когтей смерти, превратилось в странный, но эффективный прорыв в нашей исследовательской группе по когтям смерти. Нескольким когтям смерти надели прототипы брони с собственными приёмниками сигнала, чтобы увеличить радиус действия управляющих шлемов, а сами шлемы получили более точное программирование. Новое ПО заставляет клэров считать солдата «альфой» их прайда и позволяет бойцу отдавать несколько команд — в основном «следуй», «иди туда» и «стой». Учёные уверяют, что с дальнейшими исследованиями к концу десятилетия мы сможем довести технологию до совершенства и создать целые взводы когтей-солдат, на головах которых действительно будут установлены лазерные винтовки. Но пока придётся довольствоваться малыми отрядами шоковых войск, дополняющих наши существующие силы."
    EEN_nf_events.87.a:0 "Конечно, это сюрприз, но приятный"
    EEN_nf_events.88.title:0 "Будущее наступило"
    EEN_nf_events.88.desc:0 "Вслед за нашими недавними научными прорывами, многочисленные научные команды с ещё большим рвением раздвигают границы возможного, создавая инновации, не виданные со времён заброшенного довоенного научного центра на Большой Горе. Хотя не все теории оказываются жизнеспособными, и порой эксперименты заканчиваются катастрофой, мы научились лучше управлять рисками. Потому наши выдающиеся умы всё увереннее ведут нас в будущее с каждым новым опытом — каким бы смелым или фантастическим он ни был. Время покажет, не придётся ли нам когда-нибудь ограничить эти исследования, но пока что мы пожинаем плоды работы великих умов."
    EEN_nf_events.88.a:0 "Однажды нам следует поискать Большую Гору."
    EEN_nf_events.89.title:0 "Светлое завтра"
    EEN_nf_events.89.desc:0 "Не секрет, что всего несколько десятилетий назад ситуация казалась безнадёжной. Наш президент был убит, более тысячи мужчин и женщин погибло при уничтожении Контрольной станции Анклава, а наша крупнейшая оставшаяся база вскоре была захвачена солдатами НКР и Братства Стали. Но несмотря на мрак вокруг, дух и решимость американского народа не поколебались. Мы выжидали, восстанавливали силы и за последние годы преодолели бесчисленные препятствия. Впервые со времён потери нефтяной платформы в наших сердцах появилась настоящая надежда на будущее, и никто уже не сомневается в нашей способности восстановить Америку."
    EEN_nf_events.89.a:0 "Боже, благослови Анклав"
    EEN_nf_events.90.title:0 "Колыбель грязи"
    EEN_nf_events.90.desc:0 "Господин Президент, проект «Чистота» уже доказал свою неоценимую ценность в наших усилиях очистить Пустошь от мутировавших чудовищ. И мутировавшие твари, и гуманоиды погибают с высокой вероятностью всего через несколько недель после употребления этой воды, хотя нам известны некоторые мутации, устойчивые к её эффектам. Однако не нужно быть гением, чтобы понять связь между этим. В Столичной Пустоши есть несколько группировок, которые могут это вычислить. Нам следует принять более решительные меры против них, прежде чем они успеют распространить эту информацию."
    EEN_nf_events.90.a:0 "У нас нет времени на растрату!"
    EEN_nf_events.91.title:0 "Отчёт разведчиков"
    EEN_nf_events.91.desc:0 "Господин Президент, разведчики, отправленные для обследования северных пустошей, прислали первый доклад по региону. Как и ожидалось, большинство населённых пунктов в Нью-Йорке и Нью-Джерси — не более чем разбомбленные руины, кишащие мутантами. Сельские районы также серьёзно пострадали от радиоактивных осадков, а также от последствий вековой войны мутантов. Однако разведчики отметили аномалию. Существует нечто под названием «Служба здравоохранения Буффало». По их данным, в одном из районов северной части штата Нью-Йорк действует зона, куда машины свозят мутантов. Местные утверждают, что никто, кого туда забирают, не возвращается."
    EEN_nf_events.91.a:0 "Давайте изучим этот вопрос глубже."
    EEN_nf_events.92.title:0 "Сторонники отмены рабства"
    EEN_nf_events.92.desc:0 "Господин Президент, учитывая вашу озабоченность сохранением целостности Мемориала Линкольна, он в основном не подвергался нашим зачисткам на территории Аллеи. Однако теперь, когда у нас было время подойти к ситуации более внимательно, мы направили разведчиков для оценки состояния памятника и разработки плана его восстановления. По их докладам, группа мутантов в данный момент занимается восстановительными работами на мемориале. Чтобы не повредить памятник, солдаты вступили в диалог с небольшой группой мутантов, оккупирующих мемориал, и выяснили, что это беглые рабы, почитающие бывшего президента. По их словам, они недавно отбили памятник у работорговцев и начали восстанавливать его насколько возможно, в знак уважения к человеку, которого они боготворят. Отряд дежурит в форпосте у мемориала и ожидает ваших приказов."
    EEN_nf_events.92.a:0 "Хоть они и благородны, они всё равно мутанты. Дайте им «очищенную» воду."
    EEN_nf_events.92.b:0 "Захватите их сейчас и постарайтесь ограничить ущерб."
    EEN_nf_events.92.c:0 "Я восхищаюсь их благоговением. Позвольте им продолжать в том же духе."
    EEN_nf_events.93.title:0 "Выставка Линкольна"
    EEN_nf_events.93.desc:0 "Нам повезло, одной из последних экспозиций в Историческом Музее до падения бомб была выставка, посвящённая бывшему президенту Аврааму Линкольну. Там должно быть настоящее сокровище артефактов, документов и других бесценных реликвий. Проблема в том, что сейчас это место превратилось в логово диких гулей. Что прикажете, господин Президент?"
    EEN_nf_events.93.a:0 "Отправьте отряд зачистить место"
    EEN_nf_events.93.b:0 "Почему бы нам не заставить аболиционистов расчистить его для нас?"
    EEN_nf_events.94.title:0 "Большой вопрос"
    EEN_nf_events.94.desc:0 "После обнаружения активной межконтинентальной баллистической ракеты в Форте Константин Анклав бурно обсуждает, как следует распорядиться этим оружием. Эдем и многие другие патриотически настроенные американцы считают, что последние приказы старого правительства должны быть выполнены — и ракета должна быть направлена по назначению, в материковый Китай. Отэм и его прагматичный военный штаб полагают, что это оружие слишком ценно, чтобы использовать его сейчас, и предлагают сосредоточиться на его подготовке к возможному применению в будущем."
    EEN_nf_events.94.a:0 "Китай этого заслуживает"
    EEN_nf_events.94.b:0 "Слишком ценно, чтобы тратить её впустую"
    EEN_nf_events.95.title:0 "Вызов на дом"
    EEN_nf_events.95.desc:0 "«ВНИМАНИЕ! ДАННЫЕ ЗАЩИЩЁННЫЕ КАНАЛЫ ПРЕДНАЗНАЧЕНЫ ИСКЛЮЧИТЕЛЬНО ДЛЯ СЛУЖБ ЭКСТРЕННОГО РЕАГИРОВАНИЯ США. ПРЕКРАТИТЕ ПОДКЛЮЧЕНИЕ ИНАЧЕ ВЫ БУДЕТЕ ПОДВЕРГНУТЫ ЮРИДИЧЕСКОМУ РАЗБОРУ.»\n\n «Спокойно, доктор. В этом нет необходимости. С вами говорит президент Эдем, правительство Соединённых Штатов. Передаю коды авторизации.»\n\n «КОДЫ ПРИНЯТЫ. ПРЕЗИДЕНТ ЭДЕМ, ПРИБУДЬТЕ В СЛУЖБУ ЗДРАВООХРАНЕНИЯ БУФФАЛО ДЛЯ <ПРОЦЕДУРЫ ИСЦЕЛЕНИЯ>.»\n\n «Боюсь, это невозможно, доктор. У меня нет никаких заболеваний, требующих лечения.»\n\n «НЕВЕРНО, ВСЕ ОБСЛЕДОВАННЫЕ В ЭТОМ УЧРЕЖДЕНИИ ЛЮДИ ПОКАЗЫВАЮТ ПРИЗНАКИ ТЯЖЁЛОГО ЗАГРЯЗНЕНИЯ. ПРИБУДЬТЕ В СЛУЖБУ ЗДРАВООХРАНЕНИЯ БАФФАЛО ДЛЯ <ПРОЦЕДУРЫ ИСЦЕЛЕНИЯ>.»\n\n «Доктор, вы, должно быть, ошибаетесь. Это не настоящие люди, которых вы обследуете, а мутанты. Настоящие люди не проявляют таких признаков заражения.»\n\n «НЕВЕРНО, ОБЪЕКТЫ, ОБСЛЕДОВАННЫЕ В ЭТОМ УЧРЕЖДЕНИИ, ОБЛАДАЮТ ГЕНЕТИЧЕСКИМИ МАРКЕРАМИ И ХАРАКТЕРИСТИКАМИ ЧЕЛОВЕКА. ТРЕБУЕТСЯ ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ.»"
    EEN_nf_events.95.a:0 "Видите ли, доктор, разница между человеком и мутантом..."
    EEN_nf_events.95.b:0 "Вы зашли слишком далеко и вам пора выходить из сети."
    EEN_nf_events.96.title:0 "Куда они делись?"
    EEN_nf_events.96.desc:0 "Господин Президент, команда, которую мы направили для проверки сведений о подразделении Анклава в Онтарио, провела несколько недель в поисках, но не смогла обнаружить никаких признаков присутствия Анклава, кроме нескольких пустошных жителей с украденным снаряжением Анклава. Становится всё очевиднее, что они не смогли выжить в одиночестве на протяжении этих лет в канадской пустоши."
    EEN_nf_events.96.a:0 "Возможно, они прячутся, выжидают..."
    EEN_nf_events.97.title:0 "Заполнение фабрик"
    EEN_nf_events.97.desc:0 "Фабрики в Виндзоре станут настоящим подспорьем для нашей промышленности — уступая по значимости разве что Питту. Единственная проблема — у нас нет рабочей силы для их обслуживания."
    EEN_nf_events.97.a:0 "Возьмите несколько случайных мутантов из пустоши"
    EEN_nf_events.97.b:0 "А как насчет использования супермутантов?"
    EEN_nf_events.98.title:0 "Конец?"
    EEN_nf_events.98.desc:0 "«Иссушающая болезнь» — так её называют. Медленная, длящаяся неделями смерть, которая возникает словно из ниоткуда и обречена на верную гибель всех, кого коснётся. День за днём, неделя за неделей всё больше людей умирает. Но и это ещё не конец нашим бедам — словно этого было мало, ходят слухи о продвинутых армиях на севере, которые идут походом, уничтожая всё на своём пути."
    EEN_nf_events.98.a:0 "Наступил конец времен...снова"
    EEN_nf_events.99.title:0 "То же, что и у старого босса"
    EEN_nf_events.99.desc:0 "Питт — действительно подходящее название для того, что осталось от послевоенного Питтсбурга. Город — не более чем радиоактивный ад и река, настолько загрязнённая, что даже такой очиститель, как Проект «Чистота», не смог бы её спасти. Тем не менее, у него есть одно существенное преимущество — действующие довоенные литейные заводы и целый город, наполненный металлоломом. Дополнительным плюсом является то, что большая часть населения до нашего прихода была рабами и легко поддаётся повторному подчинению. По оценкам, всего несколько десятков человек при поддержке автоматических турелей и роботов способны удерживать контроль над городом и обеспечивать непрерывное производство ресурсов для поддержки наших усилий по восстановлению Америки. Кроме того, 20% мутантов, превращающихся в так называемых «Трогов», могут быть полезны в военных действиях."
    EEN_nf_events.99.a:0 "Только сделай так, чтобы наши люди не пили воду"
    EEN_nf_events.100.title:0 "Замёрзшая Граница"
    EEN_nf_events.100.desc:0 "С отключённой системой В.А.Ш.И.Н.Г.Т.О.Н завоевание Канады должно стать лёгкой задачей. Шумная толпа, которую мы видели на востоке, едва ли более организована, чем различные мутантские племена на нашей территории. Есть лишь одна проблема — Канада чёртова огромна. Нам потребуется время, чтобы покорить всю страну, но у нас уже есть план дальнейших действий."
    EEN_nf_events.100.a:0 "В свое время"
    EEN_nf_events.101.title:0 "Поддержка жителей Пустоши"
    EEN_nf_events.101.desc:0 "Несмотря на контроль над крупнейшими запасами чистой воды в регионе и армию солдат в силовой броне, положение Анклава в Пустоши остаётся шатким. Многие жители пустоши до сих пор помнят пропаганду Братства о том, что мы — геноцидальные монстры, стремящиеся уничтожить всех, кто подвергся мутации. Мы обязаны заслужить их доверие через продуманную политику и конкретные действия, чтобы занять наше законное место в управлении."
    EEN_nf_events.101.a:0 "Мы из всех них сделаем патриотов"
    EEN_nf_events.102.title:0 "Эксклюзивный Контракт"
    EEN_nf_events.102.desc:0 "Анклав впечатлён нашей работой в качестве своих новых сотрудников, а кто бы не был? Мы действительно справляемся на отлично. Они прислали предложение стать нашими эксклюзивными сотрудниками. Обещают лучшее снаряжение и более интересные задания, но есть и свои условия. Некоторые из их людей будут назначены руководителями, а любые задания вне Анклава потребуют их одобрения. Кроме того, в договоре есть пункт об аннексии, который вызывает тревогу у некоторых из верхушки. Ещё более настораживает то, что это одна из тех сделок, от которых невозможно отказаться."
    EEN_nf_events.102.a:0 "Пока нам платят..."
    EEN_nf_events.102.b:0 "Этого не случится"
    EEN_nf_events.103.title:0 "Вызов Когтя"
    EEN_nf_events.103.desc:0 "Наши сотрудники из Компании «Коготь» отказались принять наше предложение стать их единственными работодателями. Нашему атташе в их форте приказано покинуть территорию, а наши разведчики сообщают, что они укрепляют свой северный фланг. Похоже, что этот деловой союз подходит к концу."
    EEN_nf_events.103.a:0 "Мы попробовали ваш способ, полковник, теперь попробуем мой."
    EEN_nf_events.104.title:0 "Как навести порядок!"
    EEN_nf_events.104.desc:0 "Цель полковника Отэма с проектом «Чистота» всегда заключалась в использовании его как инструмента для подчинения масс Пустоши воле Анклава. Это будет достигнуто путём строительства центров распределения воды в достаточно покорных штатах. Когда штат, граничащий с одним из ваших национальных территорий, достигнет 90% лояльности или будет усмирён, вы получите возможность принять решение о возведении водораспределительного центра. В течение последующих 60 дней ваша нация направит значительные строительные и административные ресурсы на создание этого правительственного объекта и комплектование его лояльными жителями Пустоши. После завершения строительства все штаты, соседствующие с вашими национальными территориями, должны подчиниться. В то же время, население Пустоши можно легче привлечь на свою сторону, вводя закон о распределении воды через миссии по водоснабжению, где Анклав сначала предложит воду добровольно, прежде чем применить силу для установления порядка."
    EEN_nf_events.104.a:0 "Достаточно просто"
    EEN_nf_events.105.title:0 "Лечение Пустоши"
    EEN_nf_events.105.desc:0 "Цель президента Эдема с проектом «Чистота» всегда заключалась в использовании его как инструмента для истребления мутировавшей жизни в Пустоши. К сожалению, заражённая ВРЭ вода не убивает столько мутантов, сколько ожидалось. Однако она делает их бесплодными при достаточном употреблении. \n\n Чтобы гарантировать стерилизацию мутантов в регионе, необходимо изменить закон оккупации штата на «Клиники Лечения». По этому закону Анклав будет распространять заражённую ВРЭ воду, изучать её эффекты и устранять всех, кто заподозрит истинные цели операции. После того, как мутировавшая жизнь будет достаточно стерилизована, Анклав преобразует клиники лзлечения в небольшие наблюдательные посты, чтобы гарантировать, что мутанты в регионе не представляют угрозы нашим усилиям, пока вымирают."
    EEN_nf_events.105.a:0 "У нас есть работа"
    EEN_nf_events.105.b:0 "Это кажется злом..."
    EEN_nf_events.106.title:0 "Наш флаг реет высоко над Столицей"
    EEN_nf_events.106.desc:0 "Пентагон вновь находится под нашим контролем, проект «Чистота» восстанавливается учёными Анклава, а патрули сталкиваются с всё меньшим сопротивлением. Столичная Пустошь по-прежнему остаётся законом беззакония — но это ненадолго. Нам предстоит ещё долгий путь, однако дорога впереди становится чуть более ровной."
    EEN_nf_events.106.a:0 "Боже, благослови Анклав, и боже, благослови Америку!"
    EEN_nf_events.107.title:0 "Внедрение раскрыто!"
    EEN_nf_events.107.desc:0 "Учёные и солдаты, направленные нами для тайного проникновения в проект «Чистота», были вынуждены поспешно отступить с объекта. По отчёту команды, охранник Ривет-Сити подслушал разговор двух солдат о задании и донёс об этом начальству. При попытке задержания команда открыла огонь по охране, понеся потери в последовавшем бою. Мы уже наказали болтливого солдата, который выжил, и теперь у нас остался только один вариант."
    EEN_nf_events.107.a:0 "Приготовьте винтокрылы. Мы штурмуем это место!"
    EEN_nf_events.108.title:0 "Агенты Анклава раскрыты!"
    EEN_nf_events.108.desc:0 "Проект «Чистота» стал местом затяжного вооружённого столкновения, когда недавно прибывшие из Пустоши «помощники» оказались шпионами Анклава под прикрытием! Сначала охранники, выявившие их личины, сомневались, но при попытке задержания солдаты, маскирувшиеся под наёмников, открыли огонь. В бою несколько офицеров были убиты или ранены, но нам удалось изгнать змей Анклава из наших рядов. Однако это может быть не конец — следует быть готовыми к их возвращению."
    EEN_nf_events.108.a:0 "Удвойте патрули охраны вокруг очистителя!"
    EEN_nf_events.109.title:0 "Проект «Чистота» атакован!"
    EEN_nf_events.109.desc:0 "Проект «Чистота» захвачен солдатами Анклава. Несмотря на все усилия наших охранников, они не смогли противостоять огневой мощи штурмовых кораблей Анклава и их солдат в силовой броне. Совет разделён — стоит ли организовать контрнаступление или позволить проекту «Чистота» ускользнуть из наших рук. Решение должно быть принято немедленно."
    EEN_nf_events.109.a:0 "Мы должны вернуть его!"
    EEN_nf_events.109.b:0 "Нам нужно сфокусироваться на защите Ривет-Сити"
    EEN_nf_events.110.title:0 "Бесполезная атака"
    EEN_nf_events.110.desc:0 "Ривет-Сити не оставил наше продвижение к проекту «Чистота» без ответа и недавно организовал контрнаступление. Наши солдаты легко отразили нападение охранников с ржавым оружием, вооружённых лишь лёгким стрелковым вооружением. Хотя эта победа вселяет уверенность в способности удержать объект, стоит помнить — мутанты с 10-мм пистолетами-пулемётами — далеко не единственные, кто заинтересован в «Чистоте»."
    EEN_nf_events.110.a:0 "Следите за Пентагоном"
    EEN_nf_events.111.title:0 "Провальный штурм"
    EEN_nf_events.111.desc:0 "Наши силы безопасности не смогли вытеснить Анклав с Проекта «Чистота». Мы понесли тяжёлые потери и были вынуждены отступить, чтобы не остаться с недостаточным числом бойцов для защиты города. Это была отчаянная попытка, но многие мужчины и женщины заплатили за неё высшую цену напрасно. Теперь нам остаётся лишь надеяться, что Братство Стали сможет что-то предпринять."
    EEN_nf_events.111.a:0 "Задай им жару, Лайонс!"
    EEN_nf_events.112.title:0 "Проект «Чистота»: схватка"
    EEN_nf_events.112.desc:0 "Наши разведчики и дозорные отметили, что Ривет-Сити недавно попытался вернуть Проект «Чистота» у Анклава. Как и следовало ожидать, плохо вооружённые охранники оказались лёгкой добычей для наших врагов из прошлого. Если кто и сможет изгнать этих захватчиков с объекта, так это мы."
    EEN_nf_events.112.a:0 "Это будет нелегко"
    EEN_nf_events.113.title:0 "Непредвиденное поражение"
    EEN_nf_events.113.desc:0 "Когда поступила новость о том, что Анклав вытеснил охрану Ривет-Сити с Проекта «Чистота», многие в Цитадели опасались, что в ближайшие дни или недели последует наступление с противоположного берега реки. Теперь же похоже, что этого не случится. По чистой случайности охрана Ривет-Сити смогла организовать успешное контрнаступление и выгнать силы Анклава с Проекта «Чистота». Очиститель теперь надёжно в их руках. Скорее всего, это ещё не последний раз, когда мы столкнёмся с Анклавом."
    EEN_nf_events.113.a:0 "Приготовьтесь к худшему"
    EEN_nf_events.114.title:0 "Мы сделали это!"
    EEN_nf_events.114.desc:0 "Против всех ожиданий нам удалось вытеснить Анклав с Проекта «Чистота». Это была нелёгкая битва, но сочетание продуманной стратегии и храбрости наших сил безопасности привело нас к победе. Учёные уже приступают к оценке ущерба, нанесённого боем, но это — наши наименьшие заботы. Анклав доказал, что представляет серьёзную угрозу, и, вероятно, они вернутся."
    EEN_nf_events.114.a:0 "Было ли это ошибкой?"
    EEN_nf_events.115.title:0 "Как? КАК!?"
    EEN_nf_events.115.desc:0 "В шокирующем и почти невероятном повороте событий охрана Ривет-Сити сумела вытеснить наши войска с Проекта «Чистота». Наши командиры до сих пор пытаются понять, что же там произошло, и планируют следующий ход, но одно ясно — мы не можем оставить это без ответа."
    EEN_nf_events.115.a:0 "Они заплатят за это"
    EEN_nf_events.116.title:0 "Компания «Коготь» и кто?"
    EEN_nf_events.116.desc:0 "Сегодня Проект «Чистота» подвергся нападению наёмников из компании «Коготь» вместе с несколькими бойцами в силовой броне. Сначала мы не были уверены, кто стоит за этой атакой. Однако голос Джона Генри Эдема, раздававшийся по старым радиостанциям, дал нам ответ — это Анклав. Раньше их считали всего лишь остатками довоенного времени, прячущимися в бункере и много говорящими, но теперь ясно: Анклав — это не только слова. Они вышли в Пустошь и привели с собой наёмников «Коготь». Сейчас в совете разгораются споры о том, как ответить на это нападение."
    EEN_nf_events.116.a:0 "Мы должны вернуть очиститель!"
    EEN_nf_events.116.b:0 "Нам нужно сосредоточиться на обороне!"
    EEN_nf_events.117.title:0 "Змеи в Проекте «Чистота»!"
    EEN_nf_events.117.desc:0 "Когда к нам впервые обратились несколько учёных из Пустоши и их личная охрана, доктор Ли советовала не допускать их к Проекту «Чистота». Теперь мы понимаем, что следовало её послушать. Те, кто выдавал себя за простых учёных и наёмников, заинтересованных в помощи проекту, оказались агентами Анклава, посланными для захвата контроля над очистителем. Когда работы почти подошли к завершению, они устроили засаду и вытеснили наши войска и учёных с объекта. После изгнания наших сил у очистителя приземлились винтокрылы, доставившие подкрепления в продвинутой силовой броне. Весь город охвачен волнением: многие требуют вернуть контроль над объектом, а другие боятся, что следующим станет Ривет-Сити!"
    EEN_nf_events.117.a:0 "Мы должны вернуть очиститель!"
    EEN_nf_events.117.b:0 "Мы должны защитить Ривет-Сити любой ценой!"
    EEN_nf_events.118.title:0 "Разведывательное управление «Сигма»"
    EEN_nf_events.118.desc:0 "Полковник Флэгг был одним из лучших, кого когда-либо видел отряд «Сигма» Анклава. Хитрый, смертоносный и, что важнее всего, безоговорочно преданный Анклаву. Именно эти качества позволили ему выжить десятилетиями службы в одном из самых опасных подразделений Анклава. Несмотря на звание полковника и возраст, превышающий строгие лимиты «Сигмы», Флэгг всячески сопротивлялся попыткам отправить его за письменный стол. Теперь, на фоне расширяющихся развертываний Анклава, он готовит новое предложение для Верховного командования. Он хочет возглавить новое подразделение в военной структуре Анклава. В его состав войдут солдаты, офицеры и административный персонал, отобранные лично им, с приоритетом для некоторых бойцов «Сигмы». Если бы подобное предложение поступило от другого офицера, его бы заподозрили в попытке переворота, но лояльность Флэгга вне всяких сомнений. Он намерен использовать этот новый отряд исключительно для сбора разведданных о наших врагах и нанесения ударов по их самым уязвимым местам."
    EEN_nf_events.118.a:0 "Иди и возьми их, Флэгг!"
    EEN_nf_events.119.title:0 "Проект «Чистота»: схватка"
    EEN_nf_events.119.desc:0 "Наши разведчики и дозорные отметили, что Ривет-Сити недавно был вытеснен никем иным, как самим Анклавом. Как и следовало ожидать, плохо вооружённая охрана оказалась не в состоянии противостоять врагу из прошлого. Если кто и должен вернуть контроль над очистителем, так это мы."
    EEN_nf_events.119.a:0 "Это будет непросто"
    EEN_nf_events.120.title:0 "Рейдеры на нашем пути!"
    EEN_nf_events.120.desc:0 "Не должно вызывать удивления, что поселенцы Столичной Пустоши не смогли отразить натиск жестоких бандитов на своих границах. Многие могут посчитать это событие не нашим делом, однако есть одна важная проблема — нашим солдатам необходимо пройти через эти территории, чтобы нанести удар по Братству Стали. Масштабные высадки винтокрылов, необходимые для победы в этой войне, непрактичны. Таким образом, у нас остаётся лишь один путь — прорваться сквозь этих дикарей, чтобы достичь настоящего врага."
    EEN_nf_events.120.a:0 "Должно быть достаточно легко"
    EEN_nf_events.121.title:0 "Проблемные слухи"
    EEN_nf_events.121.desc:0 "Из западной части Столичной Пустоши доходят слухи о бойцах в силовой броне, совершающих ночные рейды и выгоняющих жителей из окрестностей Форта Константин. По описаниям, эти нападения похожи на действия Анклава, но это невозможно — мы разгромили их более тридцати лет назад на западном побережье. Скорее всего, это всего лишь суеверия пустошных жителей, однако тревога среди поселенцев Столичной Пустоши настолько велика, что они предоставили нам разрешение патрулировать их земли."
    EEN_nf_events.121.a:0 "Это ведь не могут быть они?
    EEN_nf_events.122.title:0 "Лучше, чем ожидалось"
    EEN_nf_events.122.desc:0 "Изначально от Компании «Коготь» ожидалось не больше, чем отвлекающий манёвр для Братства Стали. Хотя не все в командовании довольны тем, что капитан Харрисон сумел превратить наёмников в боеспособное подразделение, этот факт не подлежит сомнению. Теперь, когда наша главная угроза в регионе устранена, всё чаще звучат вопросы о будущем Компании «Коготь»."
    EEN_nf_events.122.a:0 "Сюрприз, но приятный."
    EEN_nf_events.123.title:0 "Проблемы на юге"
    EEN_nf_events.123.desc:0 "После уничтожения Контрольной станции Анклава в 2242 году президент Эдем направил призыв ко всем выжившим подразделениям Анклава по всей стране с требованием прибыть на Рэйвен-Рок на Востоке. Выжившие на Наварро были не единственными, кто услышал этот зов. Небольшой отряд, базировавшийся в старом аэрокосмическом комплексе во Флориде, также откликнулся на призыв. Эта группа, задействованная в засекреченном проекте, жизненно важном для миссии Анклава, была отправлена туда десятилетия назад, чтобы обеспечить запасной план на случай неудачи Curling-13. Этот запасной план заключался в эвакуации в область, не затронутую мутациями — в космос. Президент Эдем перенаправил несколько винтокрылов с Наварро, после чего связь была потеряна. Недавнее восстановление контакта с Анклавом ВанБюрен показало, что группа не исчезла и продолжает работу над своей целью. Они постепенно приближаются к успеху и заверяют Президента, что их усилия будут способствовать достижению наших целей на Земле. В ближайшие годы следует ожидать восстановленной связи, орбитальных шахт и других стратегических преимуществ."
    EEN_nf_events.123.a:0 "Мы ожидаем услышать результаты в ближайшее время"
    EEN_nf_events.124.title:0 "Помощь для Флориды"
    EEN_nf_events.124.desc:0 "Отряд Анклава на Космическом центре ВанБюрен изо всех сил отбивается от орд мутантов, продолжая работу над созданием жизнеспособного космического корабля. У нас, возможно, тоже есть собственные проблемы, но разве это повод бросить наших соотечественников на произвол судьбы?"
    EEN_nf_events.124.a:0 "Мы просто не можем себе позволить им помочь"
    EEN_nf_events.124.b:0 "Мы можем отправить несколько отрядов вспомогательных войск"
    EEN_nf_events.124.c:0 "Мы можем отправить несколько отрядов в силовой броне"
    EEN_nf_events.125.title:0 "Миграция на север"
    EEN_nf_events.125.desc:0 "Люди во Флориде больше не смогли самостоятельно сдерживать натиск мутантских ужасов. Космический центр ВанБюрен был захвачен, и те, кто успел добраться до винтокрылов, направились в Рэйвен-Рок. Это трагедия, но хоть кто-то остался в живых."
    EEN_nf_events.125.a:0 "Мутанты заплатят, со временем"
    EEN_nf_events.126.title:0 "Надвигается буря"
    EEN_nf_events.126.desc:0 "Выжившие сотрудники Анклава с Космического центра ВанБюрен рассказывают нам о ужасах, творящихся в пустошах Флориды. Гнусные супермутанты, бандиты и даже группа проклятых технофилов из Братства Стали разоряют земли, которые когда-то были ядром Америки. Возможно, они смогли вытеснить небольшой отряд наших людей, но посмотрим, как они справятся с полной мощью армии Соединённых Штатов."
    EEN_nf_events.126.a:0 "Мы сотрем Флориду дочиста"
    EEN_nf_events.127.title:0 "Сообщение от Министра"
    EEN_nf_events.127.desc.1:0 " СООБЩЕНИЕ ДЛЯ ЭДЕМА "
    EEN_nf_events.127.desc.2:0 " СООБЩЕНИЕ ДЛЯ ОТЭМА "
    EEN_nf_events.127.a:0 "Вместе мы сделаем великие дела."
    EEN_nf_events.127.b:0 "Ты нас не остановишь, мерзость."
    EEN_nf_events.128.title:0 "Гранит на месте"
    EEN_nf_events.128.desc:0 "Когда мы не получили ответа с Наварро, мы, естественно, пришли к выводу, что Братство Стали или НКР захватили наших западных товарищей, не оставив выживших. К счастью, мы ошибались. Мы получили передачу от сына сержанта Гранита, бывшего командира Контрольной роты Анклава. Гранит-младший сообщил, что после падения Наварро многие выжившие Анклава ушли в подполье, пытаясь скрыться от НКР, чья власть только возросла с 2242 года. Поздно ушедший Гранит-старший возглавил многих выживших, которые теперь ведут жизнь наёмников и обосновались в портовом поселении под названием Эврика."
    EEN_nf_events.128.a:0 "По крайней мере некоторые выжили"
    EEN_nf_events.129.title:0 "Гранитный гамбит"
    EEN_nf_events.129.desc:0 "В последние месяцы мы поддерживаем связь с Гранитом-младшим, который информирует нас о ситуации на Западе. Мы узнали, что хотя НКР остаётся главной силой в регионе, их чрезмерные амбиции в последние годы ослабили их позиции. Гранит уверен, что при достаточной поддержке они смогут вернуть Наварро или, по крайней мере, отомстить за поражение. Конечно, у нас тоже свои проблемы, но месть за павших — дело благородное и священное."
    EEN_nf_events.129.a:0 "Мы не можем им помочь"
    EEN_nf_events.129.b:0 "Мы можем только отправить оружие"
    EEN_nf_events.129.c:0 "Мы можем послать оружие и людей"
    EEN_nf_events.130.title:0 "Срочное сообщение"
    EEN_nf_events.130.desc:0 "Мы получили срочную передачу от Гранита. Их прикрытие раскрыто, и за ними охотятся отряды рейнджеров НКР. Они требуют эвакуации на Рэйвен-Рок."
    EEN_nf_events.130.a:0 "Поднять винтокрылы"
    EEN_nf_events.130.b:0 "Что это такое? Вы расстаётесь."
    EEN_nf_events.131.title:0 "Рэйвен-Рок присылает помощь"
    EEN_nf_events.131.desc:0 "Сегодня на винтокрылах прибыло подкрепления с Рэйвен-Рока. Множество отрядов вспомогательных подразделений может и не сравнится с солдатами в силовой броне, но это всё равно закалённые в боях американцы, готовые помочь нам сдержать мутантские орды Флориды."
    EEN_nf_events.131.a:0 "Мы благодарны за их помощь"
    EEN_nf_events.132.title:0 "Рэйвен-Рок присылает помощь"
    EEN_nf_events.132.desc:0 "Сегодня на винтокрылах прибыли подкрепления с Рэйвен-Рока. Несколько отрядов солдат, экипированных передовой силовой бронёй и современным вооружением, готовы вселить ужас в сердца мутировавших орд Флориды."
    EEN_nf_events.132.a:0 "Мы благодарны за их помощь"
    EEN_nf_events.133.title:0 "Рэйвен-Рок присылает помощь"
    EEN_nf_events.133.desc:0 "Наши товарищи из Анклава на Востоке не забыли о нас. Услышав о бедственном положении оставшихся в Наварро, они согласились отправить нам оборудование, чтобы мы могли продолжить борьбу за выживание. Однако нет сомнений, что кто-то из НКР заметил винтокрылы, пролетавшие над их территорией, доставляя это оружие из Вашингтона."
    EEN_nf_events.133.a:0 "Мы найдем им хорошее применение"
    EEN_nf_events.134.title:0 "Рэйвен-Рок присылает помощь"
    EEN_nf_events.134.desc:0 "Наши товарищи из Анклава на Востоке не забыли о нас. Услышав о бедственном положении оставшихся в Наварро, они согласились направить нам людей и оборудование, чтобы мы могли продолжить борьбу за выживание. Однако нет сомнений, что кто-то из НКР заметил винтокрылы, пролетавшие над их территориями, доставляя этих солдат из Вашингтона."
    EEN_nf_events.134.a:0 "Добро пожаловать в Эврику, мужики"
    EEN_nf_events.135.title:0 "Передача из Рэйвен-Рока"
    EEN_nf_events.135.desc:0 "Президент Эдем передал нам обширные данные по производству робототехники. Некоторые из этих чертежей пока могут превосходить наши возможности, но они помогут нам создать более совершенные машины."
    EEN_nf_events.135.a:0 "Спасибо Вам, мистер Президент"
    EEN_nf_events.136.title:0 "Что это за, чёрт возьми, С'лантер?"
    EEN_nf_events.136.desc:0 "Когда мы узнали, что наши предположения о Наварро были ложными, и что наши соотечественники не просто выживают — они процветают, — в Рэйвен-Роке воцарилась эйфория. Но эта радость быстро сменилась тревогой: с запада стали поступать всё более странные и тревожные вести. Хотя детали пока не ясны, некоторые из их сотрудников тайно выходят на связь с нами с опасными сообщениями. Поступают доклады, что они принимают мутантов в равные граждане, ведут переговоры с Братством Стали о мирной интеграции, а некоторые даже утверждают, что их «президент» — сын того самого племенного вождя, что взорвал вышку! Трудно отделить слухи от правды, но если хотя бы половина из того, что нам сообщили, верна — этот анклав на западе далеко не наш союзник."
    EEN_nf_events.136.a:0 "Они говорят о енотах, которые... умеют голосовать?"
    EEN_nf_events.137.title:0 "Президент Кто?"
    EEN_nf_events.137.desc.1:0 "Похоже, наши первоначальные предположения о Наварро оказались неверными. Хотя база была захвачена силами НКР и Братства Стали вскоре после миграции на восток, значительное число выживших осталось. Подобно нам, они выжидали и восстанавливали силы в таких местах, как Город Убежище и Армейский Склад «Сьерра». Нам довелось, так сказать, пообщаться с сыном сержанта Гранита из Контрольной роты Анклава. Он, по всей видимости, был избран президентом этого Анклава и намерен возродить нашу великую нацию на западе. Вопрос о двух президентах может стать проблемой в будущем, но это мост, который мы, возможно, захотим перейти только тогда, когда придёт время."
    EEN_nf_events.137.desc.2:0 "Похоже, наши первоначальные предположения о Наварро были ошибочны. Хотя база пала под натиском сил НКР и Братства Стали вскоре после миграции на восток, значительное число выживших осталось. Подобно нам, они выжидали и восстанавливали силы в таких местах, как Город Убежище и Армейский Склад «Сьерра». Нам довелось, так сказать, пообщаться с доктором Андерсоном — видным учёным в области исследований ВРЭ. По всей видимости, он был избран президентом этого отделения Анклава и строит планы по возрождению нашей великой нации на западе. Вопрос о двух президентах может стать серьёзной проблемой в будущем, но это мост, который, возможно, стоит переходить лишь тогда, когда придёт время."
    EEN_nf_events.137.a:0 "По крайней мере, это Анклав."
    EEN_nf_events.138.title:0 "Радиомолчание?"
    EEN_nf_events.138.desc:0 "Ограниченная разведка и пролёты над Онтарио не выявили никаких следов Анклава Онтарио. Вместо этого установлено, что регион контролируется различными группами пустошей, которые, без сомнения, имели отношение к бедам, постигшим наших соотечественников около тридцати лет назад. Память о наших товарищах, по-видимому, всё ещё жива в их умах — по нашим винтокрылам и разведчикам уже открывали огонь из импровизированного оружия. Очевидно, что для выяснения судьбы Анклава Онтарио нам придётся создать более серьёзное присутствие в этом районе."
    EEN_nf_events.138.a:0 "Мы маршируем на Торонто!"
    EEN_nf_events.139.title:0 "Приятный сюрприз"
    EEN_nf_events.139.desc:0 "Когда почти тридцать лет назад мы потеряли связь с Анклавом Онтарио, многие в Рэйвен-Роке были уверены: их уничтожили мутантские орды Канады. Некоторые всё же хранили надежду — не только на спасение наших соотечественников, но и на возвращение их семей и друзей, направленных им на помощь. Последующие попытки установить контакт встречались лишь мёртвой тишиной, и с каждым безрезультатным вызовом оптимизм угасал. Однако наше последнее разведывательное задание, направленное на расширение влияния, подтвердило правильность тех, кто не сдавался! Анклав Онтарио выживал все эти годы, а пока мы сражались с Братством в Вашингтоне, они предприняли собственный решительный шаг, чтобы вернуть контроль над Торонто. Командование Онтарио с радостью сообщает о восстановлении дальнобойной связи и готовности вновь встать в строй."
    EEN_nf_events.139.a:0 "С возвращением!"
    EEN_nf_events.140.title:0 "Холодная Могила"
    EEN_nf_events.140.desc:0 "Мы получили отчёты от команды, отправленной в командный бункер Онтарио. Как и ожидалось, жизнеобеспечение в бункере было утрачено давно, а всё ценное — разграблено. Множество тел лежит замороженными в койках, а немногие журналы, которые удалось извлечь из разрушающихся баз данных, повествуют о медленной смерти после их отступления из Торонто десятилетия назад. Согласно записям, бункер уже находился на последнем издыхании, когда они вышли наружу после уничтожения Буровой установки, но благодаря ресурсам, взятым с собой в отступлении, им удалось замедлить разложение. Однако в начале 2270-х стало ясно — им придётся покинуть бункер. После этого журналы оказались слишком повреждены. Неизвестно, пытались ли они вернуть Торонто или просто наблюдали, как бункер теряет жизнеобеспечение вокруг них. Последней записью, которую удалось восстановить, является отчёт о 38 выживших, направляющихся на восток."
    EEN_nf_events.140.a:0 "Возможно, они выжили"
    EEN_nf_events.141.title:0 "Мы нашли их"
    EEN_nf_events.141.desc:0 "При поисках маршрута, по которому шли выжившие из командного бункера Онтарио, мы обнаружили лишь следы заброшенности и пустошей. После первых 160 километров командование почти прекратило поиски. Именно тогда был найден первый труп. В последующие 130 километров были обнаружены остальные 37 членов обречённой группы. Некоторые пали от огнестрельных ранений, другие — с признаками нападения диких зверей, а немало замёрзли или умерли от голода. Тела были доставлены назад вместе с останками из бункера, где им будут оказаны надлежащие похороны."
    EEN_nf_events.141.a:0 "Печальный день, но, по крайней мере, теперь все позади"
    EEN_nf_events.142.title:0 "Восстановим Америку вместе"
    EEN_nf_events.142.desc:0 "После падения Буровой установки Анклав оказался в ужасающем состоянии. Бункеры, ожидавшие сигнала безопасности от Буровой, чтобы выйти в чистую Америку, вместо этого получили вещание из Наварро о разрушении Буровой. Многие бежали, дезертировали или преследовали собственные цели. Даже после того, как президент Эдем призвал большую часть персонала Наварро присоединиться к нему в Рэйвен-Роке, Анклав оставался разрозненным и лишённым чёткого руководства. Наши краткие радиоконтакты с другими бункерами и постами стали хорошим началом, но это лишь первый шаг. Теперь, восстановив силы, мы готовы вести наших разрозненных американских братьев в будущее."
    EEN_nf_events.142.a:0 "Мы покажем путь!"
    EEN_nf_events.143.title:0 "Больше, чем форпост"
    EEN_nf_events.143.desc:0 "Годами истинные масштабы форпоста Анклава в Чикаго оставались неизвестны. Записи о строительстве и списки персонала были утрачены вместе с разрушением Буровой установки и не представляли особого интереса. Большинство в командовании Рэйвен-Рок считали, что там осталось не более трёх человек в бункере. Последние радиоконтакты показали обратное, однако точный масштаб Чикагского Анклава оставался загадкой. После уточняющих переговоров мы отправили представителей в Чикаго на винтокрыле. Их доклады превзошли даже самые оптимистичные ожидания: Чикаго значительно больше. В бункере находились тысячи довоенных элит, их обслуживающий персонал и значительный военный контингент. Этот бункер уступал по размеру лишь Контрольной станции Анклава. С момента падения Буровой установки Чикаго активно подчиняет себе столичный регион и другие стратегически важные объекты. В Рэйвен-Рок некоторые выражают опасения относительно нашей позиции — Чикаго находится в более выгодном положении. Президент пресёк эти разговоры, напомнив всем, что мы — один Анклав с одной целью."
    EEN_nf_events.143.a:0 "Мы должны работать вместе, по крайней мере, пока не разберемся с мутантами."
    EEN_nf_events.144.title:0 "Растущее напряжение в Рэйвен-Рок"
    EEN_nf_events.144.desc:0 "В целом, Анклав Рэйвен-Рока един в своей цели и вере. Каждый мужчина, женщина и даже ребёнок предан задаче восстановить Америку такой, какой ей суждено быть. Разногласия, конечно, существуют — касаются они того, что именно означает эта цель и как лучше её достичь, — но обычно они разрешаются мирным путём. Однако есть одна серьёзная трещина, грозящая разорвать Рэйвен-Рок на части. Президент Джон Генри Эдем и полковник Август Отэм всё чаще вступают в острые споры по ключевым вопросам стратегии восстановления Америки. Несмотря на попытки держать этот раскол в тайне, Рэйвен-Рок — не столь велик, и слухи распространяются быстро. Разлом распространяется по рядам Анклава, и многие считают, что он достигнет точки кипения, когда завершатся дни подготовки и наступит время действий."
    EEN_nf_events.144.a:0 "Следите за этим"
    EEN_nf_events.144.b:0 "Но что это значит?"
    EEN_nf_events.145.title:0 "Заговор полковника Отэма"
    EEN_nf_events.145.desc:0 "Мало кто знает, но президент Эдем — не человек, а машина. С правильной программой, загруженной в его основную систему, его можно отключить, сохранив при этом работоспособность Рэйвен-Рока. Об этом всё чаще размышляет полковник Отэм по мере нарастания их разногласий. Он понимает, что это не так просто, как выдернуть вилку из розетки — Эдем умен и контролирует системы безопасности Рэйвен-Рока. Если машина заподозрит угрозу, Отэм потерпит поражение. \n \n Именно поэтому Отэм должен тщательно наращивать поддержку, если хочет успешно провести переворот. Ему потребуется как можно больше сторонников в Рэйвен-Роке, симпатизирующих его идеалам, чтобы сохранить всё в тайне."
    EEN_nf_events.145.a:0 "§R Мне следует просчитать это событие."
    EEN_nf_events.146.title:0 "Последняя капля"
    EEN_nf_events.146.desc:0 "В месяцы, последовавшие за разгромом Братства Стали, Главнокомандующий Отэм сталкивался с беспрерывными проблемами: партизаны Братства, лоялисты Эдема и колоссальная задача управления населением, в основном лишённым благодарности. Все эти трудности его Анклав держал под контролём. Истинная угроза Америке находилась всего в коротком полёте винтокрыла — в Чикаго. Анклав Чикаго — сила, равная военной мощи Отэма, и в лучшие дни их руководство было сдержанным. \n \n Сегодня был очень плохой день. \n \n Простое обсуждение роли Министра в правительстве Отэма быстро переросло в агрессивные выпады и, в конечном итоге, угрозы. Жаркий спор закончился резкими словами Министра перед тем, как он прервал связь: \n \n§R «Отэм, ты и твои предательские последователи узурпировали власть и убили истинных американцев, чтобы защитить мутантный рак, разрушающий нашу нацию. За это преступление не существует наказания, достаточно сурового. Вы увидите нашу справедливую кару.»§!"
    EEN_nf_events.146.a:0 "Если он хочет войны, он ее получит!"
    EEN_nf_events.147.title:0 "Тривиальные различия"
    EEN_nf_events.147.desc:0 "При возобновлении связи с Анклавом Чикаго быстро стало ясно: их методы далеко не совпадают с нашими. Вместо истребления мутантов они стремятся поработить их на обозримое будущее. На первый взгляд, это возмутительно для каждого, кто следует мудрости нашего великого президента. Это вызвало немало дебатов, а также призывов к более агрессивному подходу к нашим соотечественникам-американцам. Однако наш президент видит за реакционными опасениями некоторых в Рэйвен-Роке нечто большее. Чем порабощение мутантов отличается от использования их в экспериментах или превращения супермутантов в пушечное мясо? В конечном счёте мутантская раса исчезнет, когда наша работа будет завершена. Стоит ли спорить о том, насколько быстро проводится их истребление?"
    EEN_nf_events.147.a:0 "Разделенный дом не сможет устоять"
    EEN_nf_events.148.title:0 "Рука помощи"
    EEN_nf_events.148.desc:0 "Даже самый оптимистичный солдат испытывает тревогу при мысли о столкновении с Чикаго. Их техническое превосходство и численное превосходство над нами очевидны. Именно поэтому недавняя передача из Столичного Пустоши вызвала торжества от базы МакАртур до Стального Города. Нам поступило послание от Главнокомандующего Отэма. Главномандующий недавно сорвал план президента Эдема отравить всю Пустошь водой, заражённой ВРЭ, и также глубоко обеспокоен догмой Чикаго. Он предлагает свою поддержку в нашем конфликте с Чикаго и обещает, что вместе мы восстановим Америку!"
    EEN_nf_events.148.a:0 "Мы примем любую возможную помощь!"
    EEN_nf_events.149.title:0 "Судьба Чикагского Анклава"
    EEN_nf_events.149.desc:0 "Оружие замолчало. Пожары в Чикаго угасают. Последние солдаты Министра либо сдались, либо бежали. Пока наши войска наводят порядок в Чикаго, многие задаются вопросом: что будет с теми, кто выступал против Америки? Солдаты Пустоши своими глазами видели, как Чикаго обращалось со своими собратьями, и естественно жаждут создать расстрельные команды. Уже поступали многочисленные сообщения о том, как солдаты Анклава вынуждены разгонять линчевателей или задерживать непокорных бойцов, слишком легкомысленно обращающихся с угрозами. Расстрелять каждого солдата, учёного и гражданского из Анклава Чикаго — задача неосуществимая, да и вряд ли приемлемая для обычных, не мутировавших американцев."
    EEN_nf_events.149.a:0 "Казнить лидеров. Без суда и следствия."
    EEN_nf_events.149.b:0 "Организовать суды для злостных нарушителей"
    EEN_nf_events.149.c:0 "Выдавать помилования полезным новобранцам"
    EEN_nf_events.149.d:0 "Возложить вину исключительно на Министра"
    EEN_nf_events.150.title:0 "Держите головы высоко"
    EEN_nf_events.150.desc:0 "По всем радиоканалам прервались передачи для трансляции обращения нашего Главнокомандующего по поводу окончания Войны за Чикаго и будущего нашей нации. \n \n §B «Граждане Америки, с вами Главнокомандующий Отэм. Лжеминистр Внутренних Дел и его приспешники разгромлены. Пока я говорю, наши войска восстанавливают порядок на Среднем Западе. Их поражение от рук могучих вооружённых сил Анклава открывает путь к возрождению Америки, яснее, чем когда-либо. Я призываю всех американцев, кто слушает, держать голову высоко.» \n \n «Каждому солдату на фронте, защищающего нашу нацию.» \n \n «Каждому рабочему на заводах, создающего наше оружие.» \n \n «Каждому фермеру, кормящего нашу страну.» \n \n «Ваша преданность Анклаву и вклад в наше общее дело не останутся незамеченными. Вместе мы добьёмся того, что каждый незаконный Анклав, претендующий на часть нашей великой нации, встретит свою гибель в плазменном огне. Уверяю вас: под моим руководством Америка вновь будет едина.» \n \n «Боже, благослови человечество, Боже, благослови Анклав и Боже, благослови Америку. С вами был Главнокомандующий Отэм, заканчиваю передачу.»§!"
    EEN_nf_events.150.a:0 "Америка приближается"
    EEN_nf_events.151.title:0 "Подарок"
    EEN_nf_events.151.desc:0 "Слова сами по себе не смогут убедить Чикаго в искренности нашего стремления восстановить напряжённые отношения. Изучая историю дипломатии, президент Эдем выдвинул смелую идею. Физический символ нашей искренности — дар, который станет весомым доказательством наших намерений. Но что можно преподнести народу, обладающему всеми плазменными винтовками, силовой бронёй и винтокрылами, которые только может пожелать нация?"
    EEN_nf_events.151.a:0 "Им всегда пригодятся рабы-мутанты"
    EEN_nf_events.151.b:0 "Создайте грандиозную статую Министра"
    EEN_nf_events.151.c:0 "Отправьте им схемы брони «Hellfire»"
    EEN_nf_events.151.d:0 "Отправьте им данные исследования Робо-глаза «Дюрафрейм»"
    EEN_nf_events.151.e:0 "Попробуйте все равно отправить плазменное оружие и силовую броню"
    EEN_nf_events.152.title:0 "Возвращение долга"
    EEN_nf_events.152.desc:0 "Рэйвен-Рок недавно прислал нам весьма любезный подарок. Судя по всему, они искренне настроены поддерживать наш союз и совместно восстанавливать Америку. Естественным ответным шагом станет отправка им дара. Наши лучшие художники создали проект статуи президента Эдема — или, по крайней мере, того человеческого облика, под которым он скрывается. Благодаря неустанному труду наших надсмотрщиков, мутантские рабы смогли воздвигнуть гигантскую статую с впечатляющей скоростью. Разумеется, Эдем требует от нас слепого подчинения, как послушных подданных. Именно поэтому у нас есть план «Б». Если мы тайно разместим ядерное устройство внутри статуи и взорвём его, это станет сокрушительным ударом по его администрации и даст нам серьёзное преимущество в войне, которую мы намерены развязать."
    EEN_nf_events.152.a:0 "Пожалуйста, просто обычную статую"
    EEN_nf_events.152.b:0 "Приготовьте ядерное оружие"
    EEN_nf_events.153.title:0 "Свободное кресло"
    EEN_nf_events.153.desc:0 "Президент Эдем никогда не считал нужным назначать вице-президента, пока управлял делами в Рэйвен-Рок. В конце концов, основные функции вице-президента — заменить президента в случае его смерти и разрешить равенство голосов в Конгрессе. Но при отсутствии Конгресса и президенте — вычислительном ядре ZAX, находящемся в недрах Рэйвен-Рок, ни одна из этих задач не представлялась необходимой. Однако, по мере того как президент Эдем объединяет остальные анклавы по всей стране, необходимость в живом человеке, способном пожать руку и выступать с речами, становится всё более очевидной. Роль вице-президента будет большей частью декоративной — этот назначенец будет исполнять волю Президента и становиться лицом Анклава. Тем не менее, это не просто формальность. Вице-президент будет иметь непосредственный доступ к цифровому уху Президента и, вероятно, сможет влиять на реализацию некоторых политических решений. Это выбор, который нельзя принимать легкомысленно."
    EEN_nf_events.153.a:0 "§OХейманн понимает ценности старого мира."
    EEN_nf_events.153.b:0 "§OПосол Портер знает силу переговоров."
    EEN_nf_events.153.c:0 "§GРик Хёрли вселяет надежду, как бы мрачно ни казалось все вокруг."
    EEN_nf_events.153.d:0 "§CПиллоу поможет нам достичь звезд, чего бы это ни стоило."
    EEN_nf_events.153.e:0 "§CКоберн находит отклик у самых светлых умов Америки."
    EEN_nf_events.153.f:0 "§CАмбиции Питерсона приведут его далеко."
    EEN_nf_events.153.g:0 "§RМакКарти родом из Рэйвен-Рока, и ему можно доверять."
    EEN_nf_events.153.h:0 "§0Гранит подходит для должности вице-президента."
    EEN_nf_events.154.title:0 "Возрождение нации"
    EEN_nf_events.154.desc:0 "Представители со всех уголков Америки собрались в Линкольне, у самого порога развалин Вашингтона. Мужчины и женщины Анклава встретились, чтобы утвердить детали Линкольнского соглашения — документа, который навсегда закрепит единство нашего правительства, положив конец мелочным раздорам и бессмысленным интригам. Хотя разные территории по-прежнему будут управляться своими лидерами, все они подчиняются власти Президента. Анклав поставил перед собой цель восстановить Америку и очистить её от порчи мутаций. Все второстепенные задачи и проекты тщеславия — лишь последующие шаги. Вместе мы сделаем Америку такой, какой она была до войны: целой, прекрасной, могущественной. Мы — один Анклав, одна Америка, ныне и навеки."
    EEN_nf_events.154.a:0 "Боже, благослови Анклав и Боже, благослови Америку"
    EEN_nf_events.155.title:0 "Назревает война"
    EEN_nf_events.155.desc:0 "За последние месяцы стало очевидно: Министр не испытывает должного уважения к офису Президента. Он открыто игнорирует приказы главы государства, демонстрирует враждебное отношение и позволяет себе оскорбительные выпады в адрес Эдема. Самым последним проявлением неповиновения стало проведение военными Чикаго серии учений, имитирующих межанклавный конфликт. На вопрос о причинах Министр ответил, что это необходимо, чтобы Чикаго не застали врасплох в случае восстания — подобного тому, что чуть не случилось с Рэйвен-Роке при полковнике Отэме. Более того, он рекомендовал распространить подобную практику на все анклавы, намекая, что среди нас всегда могут прятаться предатели, которых мы пока не заметили."
    EEN_nf_events.155.a:0 "Это может закончиться только одним способом"
    EEN_nf_events.156.title:0 "Падение Чикаго"
    EEN_nf_events.156.desc.1:0 "Оружие замолчало. Пожары в Чикаго постепенно угасают. Последние солдаты Министра сдались или бежали. Пока наши войска наводят порядок в Чикаго, многие задаются вопросом — что ждёт тех, кто осмелился восстать против Америки? Почти всё руководство Чикаго — солдаты, учёные и даже гражданские — принимали активное участие в этом мятеже. По закону мы вправе превратить их всех в пепел. Президент разделяет гнев американского народа и глубоко возмущён предательскими деяниями жителей Чикаго и их пособников. Но есть непреложные реалии, которые нельзя игнорировать. Чикаго — один из крупнейших очагов чистой человеческой популяции, оставшихся на Земле. Этот город — дом для некоторых из самых ярких умов и лучших тактиков за пределами нашей территории. Уничтожить их всех — значит обречь Анклав на бессмысленные потери."
    EEN_nf_events.156.desc.2:0 "Оружие замолкло, и пока наши солдаты прочёсывают радиоактивные развалины Чикаго, становится очевидно — человечеству нанесён страшный удар. Бесчисленное количество чистокровных американцев было уничтожено в первом обмене ядерным огнём со времён Великой Войны. Ещё тысячи пали в последующих боях, обе стороны отчаянно шли к бункеру противника, жаждя мести за разрушенный дом. Просмотр записей с робо-глаза над Чикагским Кратером переполнил вычислительные цепи Эдема тем, что он мог лишь принять за раскаяние. Когда-то будущее человечества было ярким, но теперь оно выглядит так же мрачно, как в дни падения Платформы."
    EEN_nf_events.156.a:0 "Пощадите только мирных жителей и ученых"
    EEN_nf_events.156.b:0 "Хорошие солдаты следуют приказам, просто выполняют указания руководства"
    EEN_nf_events.156.c:0 "Никакой пощады предателям"
    EEN_nf_events.156.d:0 "Что мы натворили?"
    EEN_nf_events.157.title:0 "ЛИНКОЛЬНА НЕТ!"
    EEN_nf_events.157.desc:0 "Город Линкольн стёрт с карты ядерным взрывом. Тысячи американцев испарились в одно мгновение, и лишь немногие уцелевшие устремились в форпосты Анклава. Незадолго до взрыва мы получили следующее послание из Чикаго: \n \n §R «Джон Генри Эдем, ты и твои лоялисты обошли законную линию наследования власти в нашем правительстве. Твои корыстные замыслы и сбои в программировании нельзя игнорировать, сколько бы добрых слов и подарков ты нам ни бросал. Мы видим сквозь твою маскарад и намерены положить конец твоему маленькому феодальному княжеству. Оглянись вокруг своего городка и наслаждайся видом, пока можешь. Скоро не останется никого, кто встанет между нами и твоей кнопкой выключения.»"
    EEN_nf_events.157.a:0 "Значит война!"
    EEN_nf_events.157.b:0 "Подавляющий огонь — превратите Чикаго в пепел!"
    EEN_nf_events.157.c:0 "У Кадмуса есть способ отомстить!"
    EEN_nf_events.158.title:0 "ОТВЕТНЫЙ ОГОНЬ РЭЙВЕН-РОКА!"
    EEN_nf_events.158.desc:0 "Чикаго обращён в кратер ядерной МБР, запущенной с Рэйвен-Рока. Откуда был добыт этот смертоносный аппарат — неизвестно, но теперь это уже не имеет значения. Тысячи наших граждан пали жертвами президента Эдема, и наша война с его приспешниками стала на порядок сложнее!"
    EEN_nf_events.158.a:0 "Чикаго будем отмщен!"
    EEN_nf_events.159.title:0 "Полковник Отэм наводит порядок в доме"
    EEN_nf_events.159.desc:0 "Как и следовало ожидать, предательский полковник Отэм не терял времени и безжалостно карал американцев, поддерживавших видение президента Эдема. Немногие учёные, сумевшие добраться до наших границ, рассказывают о беспощадных чистках и произвольных проверках лояльности. Эти учёные посвятили себя нашей нации и стремятся помочь нам сохранить научное превосходство над Отэмом и его мутантолюбским предательством."
    EEN_nf_events.159.a:0 "Его потеря — наша выгода"
    EEN_nf_events.160.title:0 "Альфа против Сигмы"
    EEN_nf_events.160.desc:0 "После того как Братство Стали потерпело сокрушительное поражение от нашего непобедимого Анклава, полковник Отэм погряз в собственных ошибках и позоре. Технологические фанатики Братства, неспособные принять поражение, лоялисты Эдема и, что ещё хуже, жалкие отщепенцы Пустоши, не признающие превосходство Анклава — всё это было лишь мелочью для истинного лидера с непоколебимой решимостью. Однако Министр и его прихвостни из Чикаго оказались совсем другой историей. После того как они разгромили своё собственное Братство, они начали преображаться и даже в лучшие дни пытались затмить нас. \n \n Чикаго продолжал пытаться превзойти нас технологическим превосходством, но Министр в итоге «вылетел из чата», оставив своих сторонников в растерянности. \n \n§R Отэм, ты и твои лоялисты — не более чем жалкий NPC, слепо преданные мутантолюбию Пустоши. За это вас ждёт заслуженное поражение!"
    EEN_nf_events.160.a:0 "Это Кэп!"
    EEN_nf_events.161.title:0 "Уставшие, но готовые к борьбе"
    EEN_nf_events.161.desc:0 "Сотни солдат в силовой броне за последние недели прорвались через нашу западную границу. Их оружие почти исчерпано, броня изодрана и изношена, и они с облегчением встретили наши патрули. Измотанные бойцы из Чикаго были допрошены, и их рассказы рисуют тревожную картину. Похоже, что секретарь на западе взялся за дело, явно не рассчитав сил, и Чикаго было захвачено. Немногие, кому удалось выбраться, получили приказ от майора Торна — последнего, кто с группой солдат пересёк нашу территорию, — отступать в Столичную Пустошь. Майор и все выжившие жаждут отомстить мутантам, разрушившим их дом. Несмотря на усталость после месяцев боёв и изнурительного пути на восток, они настаивают на возвращении на передовую. Их решимость — наш залог победы."
    EEN_nf_events.161.a:0 "Мы заставим этих мутантов заплатить!"
    EEN_nf_events.162.title:0 "Недействительные коды"
    EEN_nf_events.162.desc:0 "По всей стране разбросаны старые военные базы и бункеры, не открывавшиеся почти двести лет. Многие из них мы можем взломать, используя допотопные коды довоенной эпохи. Однако Форт Константин — не из их числа. Несколько лет назад туда забрели отбросы Пустоши и активировали программу контрповстанческого реагирования, из-за чего теперь даже наши коды допуска бесполезны. Сотни боевых роботов готовы уничтожить любого, кто попытается проникнуть внутрь. Это проблема, которую мы долгое время игнорировали, но если не принять меры, она может обернуться против нас. Президент Эдем уже готовит приказы для штурма объекта и нейтрализации машин для использования в наших целях. Полковник Отэм выступает против и предлагает применить электромагнитный импульс, который безвозвратно выведет из строя все механизмы внутри."
    EEN_nf_events.162.a:0 "Мы не будем тратить жизни на болты"
    EEN_nf_events.162.b:0 "Президент прав, нам нужны эти роботы"
    EEN_nf_events.163.title:0 "Проводы капитана Харрисона"
    EEN_nf_events.163.desc:0 "Капитан Харрисон был далеко не в почёте у определённых кругов на Рэйвен-Роке. Его откровенные высказывания по поводу некоторых политик стоили ему перевода на новый проект в Форт Баннистер. Те, кто знаком с этим проектом, считают его утопией — даже офицер армии США не сможет превратить сборище рейдеров в силовой броне в боеспособное подразделение. На проводах капитана собралось мало кто, за исключением полковника Отэма и нескольких офицеров из его ближайшего круга. Они коротко обменялись словами, после чего полковник отправил капитана Харрисона в путь с немногими наставлениями."
    EEN_nf_events.163.a:0 "Удачи, капитан"
    EEN_nf_events.163.b:0 "Мы ожидаем великих дел, капитан"
    
