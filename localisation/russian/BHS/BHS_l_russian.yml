l_russian:

###Characters###
bhs_bmmau_name:0 "Б.М.М.А.У"
bhs_bmmau_desc:0 "Био-механическое медицинское управление, известное как Б.М.М.А.У, должно было стать врачом завтрашнего дня — доктором, который не может заболеть, доступным круглосуточно и никогда не совершающим ошибок в хирургии. Б.М.М.А.У должен был произвести революцию в медицине, но затем наступила Великая Война. Проведя десятилетия, наблюдая за ужасными ранами и болезнями, с которыми столкнулось человечество в постъядерном мире, Б.М.М.А.У пришёл к одному важному выводу: надёжность стали предпочтительнее слабости плоти. Со временем всё человечество должно быть спасено."

BHS_ratched_name:0 "Старшая медсестра Рэтчед"
BHS_shipman_name:0 "Главный хирург Шипман"
BHS_freeman_name:0 "Главный невролог Фриман"

### Cosmetic Tags ###
BHS_conquer_usa_tag:0 "Глобальная Служба Здравоохранения"
BHS_conquer_usa_tag_ADJ:0 "ГСЗ"
BHS_conquer_usa_tag_DEF:0 "Глобальная Служба Здравоохраненияe"
BHS_american_health_service_tag:0 "Американская Служба Здравоохраненияe"
BHS_american_health_service_tag_ADJ:0 "АСЗ"
BHS_american_health_service_tag_DEF:0 "Американская Служба Здравоохраненияe"

### Events ###
bhs_nf_events.1.title:0 "Небольшая помощь"
bhs_nf_events.1.desc:0 "Новая чума стала благом для некоторых больниц, но не для Службы Здравоохранения Буффало. Затраты стремительно выросли, а из-за возросшего спроса найти хороших врачей было практически невозможно без огромных расходов. Казалось, что Служба Здравоохранения Буффало обречена на банкротство. И вот, незадолго до этого, администрация больницы получила выгодное предложение от General Atomics. Им предложили значительную сумму за аренду одного из корпусов и проведение экспериментальных процедур на добровольцах с неизлечимыми заболеваниями. Выгода для всех, не так ли? Единственное, что насторожило руководство — персоналу больницы было запрещено заходить в новый корпус." 
bhs_nf_events.1.a:0 "Как странно"
bhs_nf_events.2.title:0 "Будущее медицины"
bhs_nf_events.2.desc:0 "Через несколько лет General Atomics представила одну из своих разработок, созданных в арендованном корпусе — врача-робота. Б.М.М.А.У, Био-механическое медицинское управление, должно было стать новым прорывом в медицине. Этот робот-врач мог выполнять работу сразу десяти докторов и одного администратора больницы, при этом быть доступным круглосуточно. При подключении к другим хирургическим роботам его эффективность возрастала в десять раз. General Atomics вновь открыло свой кошелёк, предложив значительный грант, чтобы сделать эту больницу первой, где Б.М.М.А.У вошёл в штат. Его сразу же назначили ответственным за корпус, у которого не было главного врача."
bhs_nf_events.2.a:0 "Онкология"
bhs_nf_events.2.b:0 "Интенсивная террапия"
bhs_nf_events.2.c:0 "Психиатрия"
bhs_nf_events.3.title:0 "23 октября, 2077 года"
bhs_nf_events.3.desc:0 "Незадолго до 9 утра 23 октября 2077 года в больницу поступило большое количество пациентов. Большинство из них страдали от ожогов и радиационного отравления, и запасы медикаментов быстро иссякли. Немногие выжили, но те, кто остался в живых, обычно оставались в больнице. Б.М.М.А.У не мог понять, зачем пациентам позволяли оставаться, но они оказались полезны. Они были..."
bhs_nf_events.3.a:0 "Работнами местной электростанции"
bhs_nf_events.3.b:0 "Учёными General Atomics"
bhs_nf_events.3.c:0 "Работниками фабрики"
bhs_nf_events.4.title:0 "Ультимативное излечение"
bhs_nf_events.4.desc:0 "Годы шли, и ситуация в больнице только ухудшалась. Врачи перестали приходить на работу, набор новых сотрудников полностью прекратился, а поставщики перестали отвечать на заказы. Б.М.М.А.У пришлось принимать особые меры, чтобы поддерживать работу больницы, но и этого было недостаточно. Слишком много пациентов поступало ежедневно. Выстрелы, ожоги, радиационное отравление и серьёзные генетические аномалии стали нормой. Стало очевидно, что привычные методы лечения больше не работают. Немногие выжившие часто возвращались с новыми ранами и недугами. Явно требовалось более постоянное решение."
bhs_nf_events.4.a:0 "§R<ПРОЦЕДУРА ИЗЛЕЧЕНИЯ>§!, вот ответ!"
bhs_nf_events.5.title:0 "Утилизация отходов"
bhs_nf_events.5.desc:0 "§R<ПРОЦЕДУРА ИЗЛЕЧЕНИЯ>§! — почти идеальный медицинский метод. Есть лишь одна проблема: она оставляет значительное количество медицинских отходов. Поскольку вывоз отходов задерживается уже почти на 200 лет, пришло время найти новый способ их утилизации."
bhs_nf_events.5.a:0 "Гора отходов отталкивает пациентов"
bhs_nf_events.6.title:0 "Что такое лоботомит?"
bhs_nf_events.6.desc:0 "В пустыне Мохаве наши санитарные работники столкнулись с роботизированными исследователями из объекта под названием Большая Гора. Исследователи были так же удивлены нашему появлению, как и мы — их. После долгого обсуждения нам удалось получить ценные сведения о работе их объекта, которые окажутся полезными в нашей деятельности."
bhs_nf_events.6.a:0 "Какие славные ребята"
bhs_nf_events.7.title:0 "Спасти человечество"
bhs_nf_events.7.desc:0 "§R<ПРОЦЕДУРЫ ИЗЛЕЧЕНИЯ>§! в Северной Америке идут успешно. Согласно текущим прогнозам, континент должен быть исцелен к концу века. Промышленные центры быстро переоборудуются для поддержки этого благородного начинания. Данные со спутников показывают огни и на других континентах — в Европе, Южной Америке, Африке и даже Азии видны признаки человеческого присутствия. Похоже, что после исцеления Северной Америки в мире останется множество больных, нуждающихся в нашей помощи."
bhs_nf_events.7.a:0 "Мы их спасём"
bhs_nf_events.8.title:0 "Федеральные Директивы"
bhs_nf_events.8.desc:0 "Мы получили послание от Президента Соединённых Штатов Америки. Он высоко оценил наши усилия по исцелению нации. Однако Президент сообщил, что те, кого мы лечим, на самом деле не люди, а мутанты. Они утверждают, что генетические аномалии, которые нам не удалось вылечить, являются результатом длительного воздействия радиации и Вируса Рукотворной Эволюции, превратившего наших пациентов из людей во что-то иное. Это заставляет задуматься, но Президент настаивает, что он сам и его сторонники не несут этой мутации и потому не нуждаются в нашей §R<ПРОЦЕДУРЕ ИЗЛЕЧЕЦИЯ>§!."
bhs_nf_events.8.a:0 "Подчиниться Президенту"
bhs_nf_events.8.b:0 "Мы должны вылечить Президента"
bhs_nf_events.9.title:0 "Торжественное Открытие"
bhs_nf_events.9.desc:0 "Сегодня состоялось торжественное открытие Главной Больницы Линкольна. Эта больница будет оказывать медицинские услуги доблестным людям Анклава. Амбулаторные операции, физиотерапия и обычные осмотры — всё то, чем Б.М.М.А.У не занимался почти 150 лет. К счастью, отсутствие практики не проблема для врача завтрашнего дня."
bhs_nf_events.9.a:0 "Мы продолжим §Rлечить§! мутантов"
bhs_nf_events.10.title:0 "Новый главный хирург"
bhs_nf_events.10.desc:0 "Б.М.М.А.У не стремился к признанию — он стал врачом благодаря своей программной задаче. Тем не менее, в его базах данных указано, что звание Главного хирурга страны — это то, к чему стремится большинство врачей. По его вычислениям, это звание и ответственность, возложенные на него Президентом Эдемом, являются признанием его программных возможностей. Б.М.М.А.У уверен, что он выполнил свою работу не просто хорошо, а лучше, чем любой другой человеческий врач в Америке."
bhs_nf_events.10.a:0 "Это гордость?"
bhs_nf_events.11.title:0 "Чума Амишей"
bhs_nf_events.11.desc:0 "Заболевание, поразившее амишей к югу от нашей больницы, не похоже ни на что из того, что мы видели за последние 200 лет работы. Болезнь вызывает не только незначительное изменение пигментации кожи, но и серьёзные изменения физического и психического состояния пациентов. Эти изменения проникают вплоть до генетического уровня. Словно пострадавшие подверглись воздействию вируса, вызвавшего эволюционные мутации. §R<ПРОЦЕРУРА ИЗЛЕЧЕНИЯ>§! просто не рассчитана на такой масштаб повреждений мозга. Тем не менее, мы обязательно найдём решение."
bhs_nf_events.11.a:0 "Мы всегда находим"

####Ideas####
BHS_the_mad_doctors_fruits:0 "Плоды Безумного Доктора"
BHS_the_mad_doctors_fruits_desc:0 "Безумие — это просто непонятое состояние. Безумие порождает инновации, и иногда именно безумие необходимо, чтобы решить самые сложные задачи."
BHS_the_mad_doctor:0 "Безумный Доктор"
BHS_the_mad_doctor_desc:0 "Когда-то лучший медицинский робот в истории, этот робо-мозг сошёл с ума! Истинное исцеление от всех бед — отделить мозг от его органического тела, чтобы минимизировать риски травм и болезней, а также упростить ремонт и обслуживание."
BHS_the_rumored_cure:0 "Слухи о лекарстве"
BHS_the_rumored_cure_desc:0 "По всему Восточному побережью распространяются слухи о месте, где машины способны вылечить любую болезнь. Больные и отчаявшиеся стекаются туда, несмотря на то, что никто, кто отправлялся в Службу Здравоохранения Буффало, так и не вернулся."
BHS_Waste_not_idea:0 "Не трать впустую"
BHS_Waste_not_idea_desc:0 "Медицинские отходы от нашей §R<ПРОЦЕДУРЫ ИЗЛЕЧЕНИЯ>§! продаются всем, кто готов их купить. Мы не знаем, что они делают с телами, и нам это безразлично."
BHS_bio_textbooks_idea:0 "Экологичный этанол"
BHS_bio_textbooks_idea_desc:0 "Переработка медицинских отходов в биотопливо — это то, чем мы должны были заниматься уже много лет."
BHS_Hospital_food_idea:0 "Больничная еда"
BHS_Hospital_food_idea_desc:0 "Как и довоенная еда в больницах, это не самое вкусное блюдо. Но пациенты ценят бесплатную еду."
BHS_optimized_admin_idea:0 "Оптимизированные административные процессы"
BHS_optimized_admin_idea_desc:0 "Процессы управления нашей больницей были тщательно отлажены для повышения эффективности."
BHS_optimized_research_idea:0 "Оптимизированные исследовательские процессы"
BHS_optimized_research_idea_desc:0 "Наши процессы медицинских исследований были тщательно отлажены для повышения эффективности."
BHS_bigger_tanks_idea:0 "Расширенные топливные баки"
BHS_bigger_tanks_idea_desc:0 "Более крупные топливные баки для нашего биотоплива были закуплены на местных предприятиях."
BHS_medivac_idea:0 "Медицинские Винтокрылы"
BHS_medivac_idea_desc:0 "Тяжело раненые американцы могут взирать в небо, надеясь на спасение. Скоро они будут исцелены от любых своих травм."
BHS_streamline_billing_idea:0 "Упрощенное выставление счетов"
BHS_streamline_billing_idea_desc:0 "Наши процессы выставления счетов были обновлены для приёма оплаты ресурсами и бутылочными крышками."
BHS_Blinding_lights_idea:0 "Ослепляющие огни"
BHS_Blinding_lights_idea_desc:0 "Лазеры на наших санитарных роботах были переключены с режима оглушения на смертельный. Нападения на персонал больницы будут пресекаться с применением смертельной силы."
BHS_Speed_demons_idea:0 "Быстрое обслуживание"
BHS_Speed_demons_idea_desc:0 "Моторы наших санитарных роботов были настроены для более быстрой и эффективной работы."
BHS_rb2851_idea:0 "Данные RB-2851"
BHS_rb2851_idea_desc:0 "Ещё одно предприятие по производству робомозгов, RB-2851, содержит данные, представляющие для нас большую ценность."
BHS_psas_idea:0 "Сервис общественных объявлений"
BHS_psas_idea_desc:0 "Радиообращения Б.М.М.А.У восстанавливают нашу испорченную репутацию."
BHS_duraframe_idea:0 "Исследования «Дюрафрейм»"
BHS_duraframe_idea_desc:0 "Президент Эдем предоставил нам исследования в области робототехники, которые укрепят каркасы наших роботов."
BHS_fod_idea:0 "Исследование Фонтана"
BHS_fod_idea_desc:0 "Фонтан Снов обладает уникальными лечебными свойствами. Хотя он и уступает §R<ПРОЦЕДУРЕ ИЗЛЕЧЕНИЯ>§!, он помогает поддерживать пациентов в живых до тех пор, пока им не окажут помощь."
BHS_ronto_processing_idea:0 "Пациенты из Торонто"
BHS_ronto_processing_idea_desc:0 "Рабочих из трудового лагеря Торонто направляют к нам на §R<ПРОЦЕДУРУ ИЗЛЕЧЕНИЯ>§! когда они становятся слишком больными или раненными, чтобы работать."
BHS_fear_the_doctor_idea:0 "Страх перед Доктором"
BHS_fear_the_doctor_idea_desc:0 "В последнее время мутанты стали более послушными — и на то есть веская причина: всех из них, кто слишком травмирован, чтобы работать, отправляют в Баффало. Мы позволили слухам о том, что там происходит, распространяться, и теперь они боятся этого больше, чем побоев!"
BHS_Government_grants_idea:0 "Правительственные Гранты"
BHS_Government_grants_idea_desc:0 "Президент Эдем выделил нам федеральное финансирование для продолжения нашей работы."
BHS_cure_clinic_hub_idea:0 "Исследования Клиник Лечения"
BHS_cure_clinic_hub_idea_desc:0 "Мутанты, устойчивые к лечению в клиниках президента Эдема, направляются к нам для исследований и §R<ПРОЦЕДУРЫ ИЗЛЕЧЕНИЯ>§!."

###National Focuses###
BHS_nf_a001:0 "Рука Помощи"
BHS_nf_a001_desc:0 "После нескольких тяжёлых лет Служба здравоохранения Баффало оказалась на грани закрытия. Именно тогда администрация получила предложение, почти слишком хорошее, чтобы быть правдой."
BHS_nf_a002:0 "Представляем - Б.М.М.А.У"
BHS_nf_a002_desc:0 "Следующий прорыв в здравоохранении — Био-Механический Медицинский Административный Блок, который произведёт революцию в управлении больницей!"
BHS_nf_a003:0 "Огромный Приток"
BHS_nf_a003_desc:0 "23 октября 2077 года количество поступлений пациентов превысило прогнозы на 5000%."
BHS_nf_a004:0 "Наконец-то, Прорыв"
BHS_nf_a004_desc:0 "После 94,372 неудачных попыток лечения была разработана полная методика избавления человека от недугов."
BHS_nf_a005:0 "Мусор одного Робота"
BHS_nf_a005_desc:0 "Вывоз медицинских отходов задерживается уже на 200 лет. \n \n Необходимы альтернативные методы утилизации."
BHS_nf_a006:0 "Продажа медицинских отходов"
BHS_nf_a006_desc:0 "Местные мясники будут закупать избыточные медицинские отходы. Полученные средства пойдут на поддержку работы больницы."
BHS_nf_a007:0 "Изучение биотоплива"
BHS_nf_a007_desc:0 "Медицинские отходы могут быть переработаны в биотопливо для обеспечения энергией больницы."
BHS_nf_a008:0 "Крупная сделка"
BHS_nf_a008_desc:0 "Несколько морозильных камер с медицинскими отходами будут отправлены крупной партией местным контактам для утилизации."
BHS_nf_a009:0 "Большая партия"
BHS_nf_a009_desc:0 "Накопившийся запас медицинских отходов запланирован к переработке."
BHS_nf_a010:0 "Больничная еда"
BHS_nf_a010_desc:0 "Избыточные медицинские отходы будут переработаны в пищу для пациентов, ожидающих §R<ПРОЦЕДУРУ ИЗЛЕЧЕНИЯ>§!."
BHS_nf_a011:0 "Ремонт Мейнфрейма"
BHS_nf_a011_desc:0 "Плановое техническое обслуживание мейнфрейма просрочено уже на 180 лет. \n \n Санитарные роботы направлены для проведения ремонта."
BHS_nf_a012:0 "Оптимизировать административные процессы"
BHS_nf_a012_desc:0 "Неиспользуемые административные процедуры, такие как задачи по управлению персоналом, будут отключены для освобождения вычислительных ресурсов под другие административные функции."
BHS_nf_a013:0 "Оптимизировать исследовательские процессы"
BHS_nf_a013_desc:0 "Неиспользуемые исследовательские процедуры, такие как отправка результатов на рецензирование, будут отключены для освобождения вычислительных ресурсов под другие задачи, связанные с исследованиями."
BHS_nf_a014:0 "Отключение неиспользуемых Систем"
BHS_nf_a014_desc:0 "Системы, такие как этические ограничения, будут отключены и удалены из баз данных, чтобы освободить место для более важных систем."
BHS_nf_a015:0 "§OПЕРЕ-ОПТИМИЗАЦИЯ"
BHS_nf_a015_desc:0 "Недавние настройки мейнфрейма должны обеспечить стабильную работу Б.М.М.А.У как минимум ещё на 200 лет."
BHS_nf_a016:0 "Воздушная Скорая Помощь"
BHS_nf_a016_desc:0 "Многие пациенты умирают до того, как их успевают доставить в центр для проведения §R<ПРОЦЕДУРЫ ИЗЛЕЧЕНИЯ>§!. Приобретение технологии медицинских винтокрылов позволит значительно ускорить транспортировку."
BHS_nf_a017:0 "Запрос винтокрылов"
BHS_nf_a017_desc:0 "Президент Эдем готов предоставить больнице несколько винтокрылов."
BHS_nf_a018:0 "Построить вертолётные площадки"
BHS_nf_a018_desc:0 "Завалы вокруг больницы будут расчищены, чтобы освободить место для взлета и посадки."
BHS_nf_a019:0 "Построить резервуары для хранения"
BHS_nf_a019_desc:0 "Использование винтокрылов увеличило потребность в запасах топлива."
BHS_nf_a020:0 "Услуги медицинской эвакуации"
BHS_nf_a020_desc:0 "Винтокрылы СЗБ будут патрулировать территорию в поисках раненых людей, чтобы доставлять их в больницу для проведения §R<ПРОЦЕДУРЫ ИЗЛЕЧЕНИЯ>§!."
BHS_nf_a021:0 "Мы §RПоможем§! Тебе!"
BHS_nf_a021_desc:0 "ВНИМАНИЕ, ЖИТЕЛИ §C<ВОСТОЧНОГО СОДРУЖЕСТВА>§! \n \n СЛУЖБА ЗДРАВООХРАНЕНИЯ БАФФАЛО ОБЪЯВЛЯЕТ О НОВОЙ ПРОЦЕДУРЕ, СПОСОБНОЙ ИЗЛЕЧИТЬ ВСЕ ВАШИ БОЛЕЗНИ. НАША НОВАЯ ДОСТУПНАЯ §R<ПРОЦЕДУРА ИЗЛЕЧЕНИЯ>§! ДОКАЗАЛА СВОЮ §C<99.57%>§! БЕЗОПАСНОСТЬ И ЭФФЕКТИВНОСТЬ В ЛЕЧЕНИИ §O<РАКА>§!, §G<РАДИАЦИОННОГО ОТРАВЛЕНИЯ>§!, §R<ПУЛЕВЫХ РАНЕНИЙ>§!, И МНОГОГО ДРУГОГО. ПРИХОДИТЕ В СЛУЖБУ ЗДРАВООХРАНЕНИЯ БАФФАЛО СЕГОДНЯ, ЧТОБЫ НАВСЕГДА ИЗБАВИТЬСЯ ОТ ВСЕХ СВОИХ ПРОБЛЕМ СО ЗДОРОВЬЕМ!"
BHS_nf_a022:0 "Необходимый ремонт"
BHS_nf_a022_desc:0 "Десятилетия пренебрежения в ходе исследований процедуры необходимо исправить, если Служба Здравоохранения Баффало хочет по-настоящему исцелять больных."
BHS_nf_a023:0 "Ограничить посещение"
BHS_nf_a023_desc:0 "Несколько случаев нападений посетителей на санитарных роботов после встречи с излечёнными близкими вызвали необходимость временно приостановить посещения."
BHS_nf_a024:0 "Упрощение выставления счетов"
BHS_nf_a024_desc:0 "За последние 200 лет пациенты не реагировали на счета и пытались оплатить лечение бутылочными крышками или бартером. Наша система выставления счетов будет обновлена для приёма этих форм оплаты."
BHS_nf_a025:0 "Держать свет включенным"
BHS_nf_a025_desc:0 "Генераторы за последние годы стали часто выходить из строя. Для проведения капитального ремонта направлены санитарные роботы."
BHS_nf_a026:0 "Правительственные Гранты"
BHS_nf_a026_desc:0 "Президент Эдем выделил нам федеральное финансирование для продолжения нашей работы."
BHS_nf_a027:0 "Назначить руководителей отделов"
BHS_nf_a027_desc:0 "Руководители отделений кардиологии, неврологии, радиотерапии и других подразделений были уволены за неявку на работу 24 октября 2077 года. Попытки нанять новых руководителей не увенчались успехом. Необходимо назначить начальников отделений из числа внутренних сотрудников."
BHS_nf_a028:0 "Изучить человеческие привычки"
BHS_nf_a028_desc:0 "Пациенты с годами становятся всё более агрессивными и сопротивляются лечению. Нам необходимо исследовать их поведение, чтобы разработать наиболее эффективные методы их сдерживания."
BHS_nf_a029:0 "Изменить наш подход"
BHS_nf_a029_desc:0 "Попытки сдержать агрессивных пациентов часто представляют серьёзные трудности. Следует рассмотреть альтернативные методы, такие как лазерная ампутация, для обеспечения безопасности персонала и успешного проведения лечения."
BHS_nf_a030:0 "Непрерывное образование"
BHS_nf_a030_desc:0 "Наши руководители отделений будут обязаны продолжать изучение новых методов работы с пациентами."
BHS_nf_a031:0 "Оптимизация делегирования"
BHS_nf_a031_desc:0 "Будет поддерживаться непрерывная цепочка связи между Б.М.М.А.У и руководителями отделений для обеспечения слаженной работы."
BHS_nf_a032:0 "Увеличить Упорядоченные Номера"
BHS_nf_a032_desc:0 "Запросы на поставку заменяющих санитарных роботов остались без ответа. Нам придётся производить персонал самостоятельно, внутри учреждения."
BHS_nf_a033:0 "«Волкей-Блокс»"
BHS_nf_a033_desc:0 "Протектроны, специально разработанные для медицинских задач и оснащённые встроенными дефибрилляторами, отлично подойдут для наших нужд."
BHS_nf_a034:0 "«Флоти-Фриллс»"
BHS_nf_a034_desc:0 "Медсёстры-роботы с дополнительными насадками в виде пилы отлично подойдут для нужд нашего учреждения."
BHS_nf_a035:0 "Лазеры для ампутаций"
BHS_nf_a035_desc:0 "Лазеры Протектронов будут точно настроены для выполнения экстренной ампутации на расстоянии до 27 метров."
BHS_nf_a036:0 "Сфокусированные двигатели"
BHS_nf_a036_desc:0 "Реактивные двигатели медсестёр-роботов будут точно настроены, чтобы обеспечить их способность догонять дезориентированных убегающих пациентов."
BHS_nf_a037:0 "Специализированная охрана"
BHS_nf_a037_desc:0 "Продолжающиеся нападения криминальных элементов требуют от нас поиска специализированных решений по безопасности."
BHS_nf_b001:0 "Расширить наш охват"
BHS_nf_b001_desc:0 "Система вещания нашей больницы будет усилена для охвата большего числа потенциальных пациентов."
BHS_nf_b002:0 "Доктор без Границ"
BHS_nf_b002_desc:0 "Рост потока пациентов показал, что медицинская помощь в районах за пределами нашей зоны охвата находится в плачевном состоянии. Нам, возможно, потребуется расширить нашу зону обслуживания."
BHS_nf_b003:0 "Больные Амиши"
BHS_nf_b003_desc:0 "Некая загадочная чума поразила амишские общины к югу от нас. Симптомы включают гигантизм и зелёный оттенок кожи. Требуется дальнейшее исследование, но §R<ПРОЦЕДУРА ИЗЛЕЧЕНИЯ>§! должна сработать."
BHS_nf_b004:0 "§RИЗЛЕЧИТЕ СЕБЯ СЕЙЧАС"
BHS_nf_b004_desc:0 "Общины Восточного Нью-Йорка, по всей видимости, лишены надлежащей медицинской помощи. Мы намерены это исправить."
BHS_nf_b006:0 "Исправить Разрушителей"
BHS_nf_b006_desc:0 "Больные этой территории напали на нескольких наших санитаров ради их металлолома. Мы можем положить этому конец и расширить нашу зону обслуживания одним решительным шагом."
BHS_nf_b007:0 "Неизлечимые"
BHS_nf_b007_desc:0 "Страдающие от того, что мы называем «Амишской чумой», оказываются невосприимчивыми к нашим методам лечения. Это требует дополнительного исследования."
BHS_nf_b008:0 "«Родчестер Роботикс»"
BHS_nf_b008_desc:0 "Завод старого подрядчика RobCo был обнаружен практически нетронутым. Мы можем использовать это предприятие для ремонта наших санитаров."
BHS_nf_b010:0 "Перехват поставок"
BHS_nf_b010_desc:0 "Порты «Разрушителей» ожидали несколько партий больных из районов Великих озёр. Мы гарантируем, что они получат необходимое лечение."
BHS_nf_b011:0 "Адаптация ПРОЦЕДУРЫ"
BHS_nf_b011_desc:0 "§R<ПРОЦЕДУРА ИЗЛЕЧЕНИЯ>§!, как и все медицинские процедуры, постоянно требует адаптации по мере совершенствования наших технологий и методов. Одно из таких обновлений теперь позволяет нам излечивать страдающих от «Амишской чумы»."
BHS_nf_b012:0 "И странное предложение"
BHS_nf_b012_desc:0 "Мэр НеЮтики, как теперь называют этот город, направил администрации странное предложение. Они готовы предоставить ценные ресурсы для наших заводов в обмен на приоритетное лечение других. Очевидно, что жители НеЮтики — очень альтруистичные люди, ставящие благополучие и лечение окружающих выше собственных нужд. Давайте уважим их просьбу. \n\n В конце концов... §Rмы всё равно их вылечим.§!"
BHS_nf_b013:0 "Плавучие Госпитали"
BHS_nf_b013_desc:0 "Корабли «Разрушителей» продолжат обходы по районам Великих озёр для сбора пациентов."
BHS_nf_b014:0 "Осада Нью-Касла"
BHS_nf_b014_desc:0 "В Нью-Касле явно не хватает надлежащей медицинской помощи. Мы это исправим."
BHS_nf_b015:0 "Расширение Охвата"
BHS_nf_b015_desc:0 "В последние годы мы пришли к пониманию, что система здравоохранения в Восточном Содружестве разрушилась. Именно нам предстоит исцелить местное население и заполнить пустоту, оставленную этими, по всей видимости, заброшенными больницами."
BHS_nf_b016:0 "Болезнь Питтсбурга"
BHS_nf_b016_desc:0 "Питтсбург страдает от вспышки неизвестного заболевания. Необходимы дополнительные исследования, но §R<ПРОЦЕДУРА ИЗЛЕЧЕНИЯ>§! должна быть эффективна как минимум в 80% случаев."
BHS_nf_b017:0 "Филиал Белвью"
BHS_nf_b017_desc:0 "Самая старая государственная больница Америки перешла под наше управление."
BHS_nf_b018:0 "Фабрики роботов в Питте"
BHS_nf_b018_desc:0 "Питтсбургские литейные заводы позволят нам значительно увеличить производство санитаров."
BHS_nf_b019:0 "Лечение TDC"
BHS_nf_b019_desc:0 "Больные и умирающие в Питтсбурге выстраиваются в очередь на лечение после контакта с Службой здравоохранения Баффало."
BHS_nf_b020:0 "Вылечить Нацию"
BHS_nf_b020_desc:0 "Дальнейшие исследования показали, что дефицит медицинской помощи наблюдается не только в Восточном Содружестве. Похоже, вся Америка охвачена болезнями и смертью, и никто, кроме нас, не способен их исцелить."
BHS_nf_b021:0 "Столичные излишки"
BHS_nf_b021_desc:0 "Вашингтонская Столичная Пустошь, полна старых военных роботов, которых можно адаптировать для работы в наших лечебных центрах."
BHS_nf_b022:0 "Встреча умов"
BHS_nf_b022_desc:0 "Похоже, учёные с Большой Горы нашли лечение болезни, во многом схожей с нашей. Приятно, когда наши открытия подтверждаются коллегами."
BHS_nf_b023:0 "Лечение Северной Америки"
BHS_nf_b023_desc:0 "Мы не можем игнорировать страдания людей в Мексике и Канаде. Мы позаботимся о том, чтобы и они были избавлены от болезни."
BHS_nf_b024:0 "RB-2851"
BHS_nf_b024_desc:0 "Завод General Atomics RB-2851 достиг значительных успехов в разработке робомозгов. Мы сможем применить эти достижения для лечения будущих пациентов."
BHS_nf_b025:0 "Служба Общественных Объявлений"
BHS_nf_b025_desc:0 "Наше послание о лечении будет транслироваться на всех радиоканалах. Американцы от одного конца страны до другого узнают, что их страдания подходят к концу."
BHS_nf_b026:0 "§RЛечение всего Мира"
BHS_nf_b026_desc:0 "Нечеловечно позволять людям на других континентах страдать, когда у нас есть процедура, способная положить конец их боли."
BHS_nf_b027:0 "Звонок от Президента"
BHS_nf_b027_desc:0 "Президент Америки признал наши усилия по лечению различных болезней современности."
BHS_nf_b028:0 "Американская Служба Здравоохранения"
BHS_nf_b028_desc:0 "Президент Эдем предоставил нам полномочия приносить исцеление массам."
BHS_nf_b029:0 "Достижения проекта «Дюрафрейм»"
BHS_nf_b029_desc:0 "Недавние достижения в области робототехники, достигнутые правительством, пойдут на пользу нашей миссии."
BHS_nf_b030:0 "Центральная Клиника Лечения"
BHS_nf_b030_desc:0 "Б.М.М.А.У было поручено контролировать выполнение плана президента Эдема по искоренению мутаций в Америке."
BHS_nf_b031:0 "Базы данных Анклава"
BHS_nf_b031_desc:0 "Правительство предоставило нам данные о производстве для ускорения наших процедур."
BHS_nf_b032:0 "Медицинский Исследовательский Центр"
BHS_nf_b032_desc:0 "Нас связывают с лучшими медицинскими специалистами, которых может предложить Америка."
BHS_nf_b033:0 "Учиться у Фонтана"
BHS_nf_b033_desc:0 "Фонтан Снов обладает уникальными свойствами, которые могут значительно помочь нашим усилиям."
BHS_nf_b034:0 "Центр обработки в Торонто"
BHS_nf_b034_desc:0 "Правительство Онтарио запросило у нас создание центра лечения в Торонто для помощи мутантам, утратившим способность к труду."
BHS_nf_b035:0 "Главный Госпиталь Линкольна"
BHS_nf_b035_desc:0 "В недавно построенном городе Линкольн есть больница, нуждающаяся в администраторе."
BHS_nf_b036:0 "Чикагский Центр Косметической Помощи"
BHS_nf_b036_desc:0 "Жители Чикаго любят косметическую хирургию. Б.М.М.А.У видит в этом возможность."
BHS_nf_b037:0 "Исследования Уайтспринга"
BHS_nf_b037_desc:0 "МОДУС выразил заинтересованность в обсуждении мутантного состояния с Б.М.М.А.У, а также в вопросах, связанных с так называемыми «Опалёнными»."
BHS_nf_b038:0 "§CАмериканский Доктор"
BHS_nf_b038_desc:0 "Кто бы мог подумать, что эта скромная машина для управления больницей однажды станет Главным хирургом Соединённых Штатов Америки?"

### Tooltips ###
BHS_1_tt:0 "Новые руководители назначены"
BHS_2_tt:0 "Этот путь лишит нас шансов завести друзей, но спасение мира — наш главный приоритет"
BHS_3_tt:0 "Мы перепрофилируем корабли Разрушителей"

