###Country Flag###
TRN_slave_council_flag:0 "Освобожденным рабам предоставлено место в нашем племенном совете"

###Characters###
TRN_tom_stalowe_NAME:0 "Том Сталоу"
TRN_tom_stalowe_desc:0 "В руинах за стенами владений Ашура простирается дикая земля, кишащая трогами и дикарями, чьи разумы сошли с ума. Мало кто из тех, кто отважился выйти за ограду, возвращается, но некоторые, кто всё же выходил, рассказывают о странных вещах. Ходят слухи, что среди трогов и дикарей живут люди, живущие в старой крепости, куда никто не может добраться... могут ли эти слухи быть правдой?"
TRN_big_trog_name:0 "Альфа Трог"
TRN_ashley_borsan_name:0 "Эш Борсан"
TRN_shane_hayette_NAME:0 "Шейн Хэйти"

###Events###
TRN_nf_events.1.title:0 "Троги"
TRN_nf_events.1.desc:0 "За пределами работорговцев Питт никому не принадлежит. Вместо этого он захвачен трогами. Эти ужасные мутанты – результат уникального сочетания радиации и промышленных загрязнений Питта. Они рыщут по улицам, канализациям и старым зданиям, пожирая всё и вся. Троги были здесь веками и будут жить ещё века."
TRN_nf_events.1.a:0 "Кто может там жить?"
TRN_nf_events.2.title:0 "Из неизвестных деталей"
TRN_nf_events.2.desc:0 "Однажды в Питт с запада пришёл племя. Говорят, он был одним из последних потомков выживших из давно умершего племени, которое могло общаться с зверями Пустоши. Возможно, именно эта способность его предков и стала причиной того, что троги не разорвали его на куски, когда он вошёл в Питт. В конце концов он добрался до огромного стадиона в самом сердце руин, места, нетронутого людьми более ста лет. Там он основал новое племя, преследуя одну цель."
TRN_nf_events.2.a:0 "Создать лучшее будущее"
TRN_nf_events.2.b:0 "Сохранить знания"
TRN_nf_events.3.title:0 "Спасение духов"
TRN_nf_events.3.desc:0 "Племя увидело в руинах людей, чьи души были осаждены. Издалека он наблюдал, как они проигрывали битвы и становились подобны зверям руин. Он вспомнил ритуал своего народа, который использовался, чтобы вернуть тех, кто впадал в безумие. Ночью он схватил одного из них, пока тот спал. С помощью нужных трав дикарь погрузился в глубокий сон. Когда он проснулся, его дух снова обрёл покой, но воспоминания о прежней жизни исчезли. Том научил его путям своего потерянного народа, и через некоторое время они отправились спасать ещё одного. Затем они втроём спасли ещё одного. Через несколько лет Том сформировал новое племя из тех, чьи души он спас."
TRN_nf_events.3.a:0 "От одного ко многим"
TRN_nf_events.4.title:0 "Пробуждение"
TRN_nf_events.4.desc:0 "Души спасённых Томом были восстановлены, но не без потерь. Те, кто вернулся, всё ещё несли в себе остатки звериных духов. Даже после употребления священных трав и проведения ритуалов они не могли потерять то, что их коснулось. Выжившие установили связь с трогами руин и обнаружили, что могут контролировать их, подобно тому, как предки Тома управляли зверями пустошей. Том запретил укреплять эти связи, не желая, чтобы его народ обратился к зверю. Но, поскольку рейдеры Питта приближались к стадиону, Эш обратился к Тому с вопросом."
TRN_nf_events.4.a:0 "Разве не должны мы использовать всё что имеем?"
TRN_nf_events.5.title:0 "Спасти или пожертвовать"
TRN_nf_events.5.desc:0 "Новая группа дикарей была замечена бродящей возле стадиона, и пока племя готовится их поймать, Том не может перестать думать о словах Эша. Всё больше членов племени с ужасом смотрят на восток. Противостоять Питту кажется невозможным, но с большим количеством трогов это возможно. Есть и другой вариант проведения этого ритуала. Те, кто страдает душой, могут быть ввергнуты в звериное безумие, а не спасены от него, и, став трогами, они смогут сражаться за нас!"
TRN_nf_events.5.a:0 "Спасти дикаря"
TRN_nf_events.5.b:0 "Пожертвовать дикарём"
TRN_nf_events.6.title:0 "Уничтожая зло"
TRN_nf_events.6.desc:0 "Рейдеры Питта, когда-то угрожавшие нашему племени и едва не загнавшие нас во тьму, теперь бегут обратно в свои убежища в Верхнем городе. Рабы Питта взяли оружие и вместе с нашими воинами продвигаются к возвышающимся руинам. Лишь вопрос времени, когда последний из этих мерзких рейдеров будет сброшен с башен."
TRN_nf_events.6.a:0 "Победа за нами!"
TRN_nf_events.7.title:0 "Великий пир"
TRN_nf_events.7.desc:0 "Рейдеры из Питта, когда-то заставившие наше племя прятаться в руинах Питта, теперь спасаются бегством в свои убежища в Верхнем Городе. Выключив им свет, мы выпустили стаи трогов на башни. В Питте всё меньше и меньше выстрелов, а крики всё громче."
TRN_nf_events.7.a:0 "Охотники стали добычей"
TRN_nf_events.8.title:0 "Дитя"
TRN_nf_events.8.desc:0 "На вершине башни Ашура остался последний чужак, который всё ещё жив – Мари, младенец Ашура. В племени разногласия по поводу того, что делать с младенцем. Стоит ли нам воспитывать его как члена племени? Выслать его из Питта? Или что-то еще?"
TRN_nf_events.8.a:0 "Вырастить его"
TRN_nf_events.8.b:0 "Пусть освобожденный раб выведет ее за пределы Питта."
TRN_nf_events.8.c:0 "§R(Каннибал) Съесть дитя§!"
TRN_nf_events.9.title:0 "Земли Йинзеров"
TRN_nf_events.9.desc:0 "Наше племя освободило Питт от злобных захватчиков. Некоторые рабы вернулись в свои родные края, но многие присоединились к племени. Теперь мы – единое племя, но без названия. Раскапывая руины, мы нашли упоминания о людях, живших на этой земле раньше, особенно о тех, кто жил вокруг стадиона. Они называли себя йинзерами."
TRN_nf_events.9.a:0 "Теперь мы - Йинзеры"
TRN_nf_events.10.title:0 "Наши охотничьи угодья"
TRN_nf_events.10.desc:0 "Питт возвращён своим изначальным правителям, трогам. В ходе сражений наш народ стал ближе к этим существам. Они – такая же часть нашего племени, как любой мужчина или женщина. Вместе мы едим, спим и охотимся. Глядя на своё племя с вершины стадиона, Том не мог не вспомнить истории, которые рассказывали ему старейшины о былых временах своего племени. Они жили во многом так же, как звери пустошей, и были неудержимы, пока не пришли стальные люди."
TRN_nf_events.10.a:0 "Но они на западе, с нами всё будет в порядке."
TRN_nf_events.11.title:0 "Перемещение статуи"
TRN_nf_events.11.desc:0 "Руины Питтсбурга полны памятников, воздвигнутых великим героям прошлого. Любой из них стал бы прекрасной заменой ужасному сооружению у входа в Хейвен. Однако многие из этих статуй обветшали со временем, и мы не знаем, кому они принадлежат. Лишь три статуи находятся в достаточно хорошем состоянии, чтобы мы могли с должным уважением отнестись к тем, кого они изображают. Первая — это мистер Роджерс, превосходный сосед, заботившийся обо всех своих соплеменниках и не только. Вторая — Вилли Старджелл, воин, известный тем, что мощно бил врагов дубинкой. Последняя — Хонус Вагнер, ещё один воин, известный своим ловким защитником. Статуя, которую мы выберем для своего дома, будет вдохновлять будущие поколения."
TRN_nf_events.11.a:0 "Выбрать Роджерса"
TRN_nf_events.11.b:0 "Выбрать Старжелл"
TRN_nf_events.11.c:0 "Выбрать Вагнера"

###Ideas###
TRN_we_be_trogs:0 "Возвышающиеся руины"
TRN_we_be_trogs_desc:0 "Троги бродят по канализации и разрушенным зданиям Питта. Благодаря обширному укрытию в руинах и бесстрашной кровожадности троги, чтобы кто-то добрался до нашего дома, понадобится лишь маленькое чудо или затяжной кошмар."
TRN_fight_as_trogs_idea:0 "Сражайтесь как троги"
TRN_fight_as_trogs_idea_desc:0 "Наши люди освоили боевые приёмы трогов. Скоро мы будем столь же смертоносны, как они!"
TRN_trog_traps_idea:0 "Лучшие ловушки для трогов"
TRN_trog_traps_idea_desc:0 "Мы многое узнали о ловле трогов. Знаете ли вы, что ловушки лучше работают с приманкой?"
TRN_avoid_observe_idea:0 "Избегать и наблюдать"
TRN_avoid_observe_idea_desc:0 "Наши воины предпочитают сражаться на расстоянии и доедать то, что не смогут съесть троги."
TRN_dig_and_hold_idea:0 "Копай и держись"
TRN_dig_and_hold_idea_desc:0 "В тех редких случаях, когда врагу удаётся отразить натиск орд трогов, наши воины сражаются из импровизированных укреплений."
TRN_watching_bridges_idea:0 "Наблюдение за мостами"
TRN_watching_bridges_idea_desc:0 "Лучшие воины нашего племени зорко следят за горизонтом. Когда в Питт появится новый враг, мы будем готовы."
TRN_hunting_grounds_idea:0 "Охотничьи угодья"
TRN_hunting_grounds_idea_desc:0 "Развалины Питта наполнены эхом рычания трогов и криками тех несчастных, кто попался нам в руки."
TRN_trog_hierarchy_idea:0 "Самые строгие правила"
TRN_trog_hierarchy_idea_desc:0 "Как и у трогов, в нашем племени правит сильнейший."
TRN_trog_hierarchy_2_idea:0 "Самые строгие правила"
TRN_trog_hierarchy_2_idea_desc:0 "Как и у трогов, в нашем племени правит сильнейший."
TRN_baby_back_ribs_idea:0 "Ребрышки дитя"
TRN_baby_back_ribs_idea_desc:0 "ОНИ СЪЕЛИ РЕБЁНКА?"
TRN_endless_hunt_idea:0 "Бесконечная охота"
TRN_endless_hunt_idea_desc:0 "Погоня за новой добычей заставляет искать все дальше и дальше." 
TRN_one_people_idea:0 "Один народ"
TRN_one_people_idea_desc:0 "Наше племя приняло множество чужаков с распростёртыми объятиями. Это был ценный опыт для всех нас, но мы вышли из него сильными и сплочёнными."

###National Focus###
TRN_nf_a001:0 "Звери"
TRN_nf_a001_desc:0 "Любой, кто отправляется в Питт, знает, что такое Трог."
TRN_nf_a002:0 "Путешественник"
TRN_nf_a002_desc:0 "Незнакомец с запада со странными способностями."
TRN_nf_a003:0 "Племя"
TRN_nf_a003_desc:0 "Со временем незнакомец уже был не один."
TRN_nf_a004:0 "Зверь внутри"
TRN_nf_a004_desc:0 "Живя среди зверей, нужно быть осторожным, чтобы не стать одним из них."
TRN_nf_a005:0 "Ржавая арматура"
TRN_nf_a005_desc:0 "Большая палка делает *боньк*"
TRN_nf_a006:0 "Выкопать туннели"
TRN_nf_a006_desc:0 "Под стадионом находятся туннели, давно забитые обломками."
TRN_nf_a007:0 "Грибные фермы"
TRN_nf_a007_desc:0 "Влажная среда туннелей — идеальное место для сбора грибов."
TRN_nf_a008:0 "Древние военные песнопения"
TRN_nf_a008_desc:0 "В глубине стадиона мы нашли древние гимны воинов. Итак, начнём!"
TRN_nf_a009:0 "Связь с трогами"
TRN_nf_a009_desc:0 "Используя нашу связь с трогами, мы можем немного контролировать их..."
TRN_nf_a010:0 "Спортивная медицина"
TRN_nf_a010_desc:0 "В древние времена великие целители жили на этом стадионе и поддерживали бойцов Сталеров в форме с помощью специального лекарства под названием солевые таблетки. Мы можем использовать их мудрость."
TRN_nf_a011:0 "Дикарские ритуалы"
TRN_nf_a011_desc:0 "Дикари опасны, но они ещё живы. Мы можем их спасти... или подтолкнуть."
TRN_nf_a012:0 "Массовый ритуал"
TRN_nf_a012_desc:0 "Поймав большое количество дикарей, мы сможем собрать племя вместе для проведения одного большого ритуала."
TRN_nf_a013:0 "Доспехи Древних"
TRN_nf_a013_desc:0 "Доспехи древних Сталеров будут носить наши лучшие воины."
TRN_nf_a014:0 "Они сражаются с нами"
TRN_nf_a014_desc:0 "Троги будут сражаться вместе с нашими воинами, как один!"
TRN_nf_a015:0 "Жизнь с трогами"
TRN_nf_a015_desc:0 "Так же, как мы боремся с зверями, мы живем с ними, укрепляя наши связи."
TRN_nf_a016:0 "Дерись как трог"
TRN_nf_a016_desc:0 "Трог — смертельно опасное существо, и нам есть чему у него поучиться."
TRN_nf_a017:0 "Охота с трогами"
TRN_nf_a017_desc:0 "Отправившись на охоту с трогами, мы многому научимся."
TRN_nf_a018:0 "Принять их иерархию"
TRN_nf_a018_desc:0 "У трогов вождь — сильнейший. Наше племя могло бы поступить так же."
TRN_nf_a019:0 "Ночная добыча"
TRN_nf_a019_desc:0 "Недостаточно просто охотиться с трогами, надо наслаждаться плодами охоты."
TRN_nf_a020:0 "Одноразовые инструменты"
TRN_nf_a020_desc:0 "Троги — это звери, которые встанут между нами и угрозами нашему племени, и ничего более."
TRN_nf_a021:0 "Улучшенные ловушки"
TRN_nf_a021_desc:0 "Поймать трога несложно. Но это не значит, что не стоит пытаться улучшить ситуацию."
TRN_nf_a022:0 "Мир дома"
TRN_nf_a022_desc:0 "Мы сделаем так, чтобы любая война, в которой мы будем участвовать, не повлияла на то, как мы живем на стадионе."
TRN_nf_a023:0 "Избегать и наблюдать"
TRN_nf_a023_desc:0 "Троги будут сражаться на передовой, а наши люди останутся сзади и будут руководить боем издалека."
TRN_nf_a024:0 "Укреплённые точки для защиты"
TRN_nf_a024_desc:0 "Мы знаем, что однажды рейдеры Питта придут за нами. Необходимо заранее организовать оборону."
TRN_nf_a025:0 "Закопаться и укрепиться"
TRN_nf_a025_desc:0 "Из-за безопасных стен мы можем наблюдать за военными действиями трогов и устранять любых рейдеров, убивающих их слишком много."
TRN_nf_a026:0 "Питт наносит удар"
TRN_nf_a026_desc:0 "Ходят слухи, что Питт пал под натиском какой-то другой силы, но однажды и они придут за нами. Ударьте их, пока они не успели обосноваться!"
TRN_nf_a027:0 "Добро пожаловать, рабы!"
TRN_nf_a027_desc:0 "Рабы Питта стали жертвами зла Ашура. Поскольку им больше некуда идти, мы должны принять их в племя."
TRN_nf_a028:0 "Никакой пощады добыче"
TRN_nf_a028_desc:0 "Рабы были слабы, почему мы должны допускать такую ​​слабость в нашем племени?"
TRN_nf_a029:0 "Собрать трофеи"
TRN_nf_a029_desc:0 "У рейдеров было много хорошего оружия, которым они так и не успели воспользоваться."
TRN_nf_a030:0 "Доспехи воинов"
TRN_nf_a030_desc:0 "С этой броней даже самый слабый щенок может стать могучим воином!"
TRN_nf_a031:0 "Вход в Верхний Город"
TRN_nf_a031_desc:0 "Оплот рейдеров в самом сердце Питта скоро падет перед нами."
TRN_nf_a032:0 "Дитя"
TRN_nf_a032_desc:0 "Дочь Ашура теперь сирота. Что с ней будет?"
TRN_nf_a033:0 "Укрепление наших традиций"
TRN_nf_a033_desc:0 "Мы никогда не должны забывать, кто мы. Важно сохранять нашу культуру и наши традиции."
TRN_nf_a034:0 "Расширьте наши стены"
TRN_nf_a034_desc:0 "Теперь наши аванпосты будут расширяться и охватывать всю остальную территорию наших владений."
TRN_nf_a035:0 "Следить за мостами"
TRN_nf_a035_desc:0 "Рейдеры Питта ушли, но угроза со стороны чужаков осталась."
TRN_nf_a036:0 "Улучшенные дубины"
TRN_nf_a036_desc:0 "Дубинка — это хорошо, но дубинка с приваренными к ней шипами? Ещё лучше."
TRN_nf_a037:0 "Изучить их пути"
TRN_nf_a037_desc:0 "Поняв, какую броню мы достаем со стадиона, мы можем улучшить свою собственную броню."
TRN_nf_a038:0 "Бей в военные барабаны"
TRN_nf_a038_desc:0 "Нам придётся сражаться, хотим мы этого или нет. Собирайте воинов под бой барабанов."
TRN_nf_b000:0 "Наши охотничьи угодья"
TRN_nf_b000_desc:0 "На улицах Питта становится всё меньше и меньше добычи. Нам придётся начать смотреть наружу."
TRN_nf_b001:0 "Кукурузные троги"
TRN_nf_b001_desc:0 "К востоку от Питта простираются поля сорго и кукурузы. Идеальное место для охоты и выслеживания добычи."
TRN_nf_b002:0 "Мрачная жатва"
TRN_nf_b002_desc:0 "Фермеры не знали, что их поразило. Они выходят на свои поля, а мы собираем их мясо."
TRN_nf_b003:0 "Осада Кастла"
TRN_nf_b003_desc:0 "Металлические доспехи и мечи-лезвия газонокосилки не остановят нас."
TRN_nf_b004:0 "Пробить ворота"
TRN_nf_b004_desc:0 "Даже высокие стены их замков не спасут их от нашего голода."
TRN_nf_b005:0 "Во мне есть этот Трог"
TRN_nf_b005_desc:0 "У некоторых из этих работорговцев, сражавшихся за Ашура, есть сердце настоящего воина. Возможно, они подойдут нам."
TRN_nf_b006:0 "Яма"
TRN_nf_b006_desc:0 "Одна из немногих хороших идей Ашура — подвергнуть воинов испытанию и дать возможность победить сильнейшему."
TRN_nf_b007:0 "Рейдерское Барбекью"
TRN_nf_b007_desc:0 "Независимо от того, есть ли у рейдера сердце воина или нет, вкус у них всех одинаковый."
TRN_nf_b008:0 "Трог-приманка"
TRN_nf_b008_desc:0 "Крики рейдеров, когда троги заходят в их клетки, никогда не перестают быть смешными."
TRN_nf_b009:0 "Изучить наше окружение"
TRN_nf_b009_desc:0 "Здания Питта могут выглядеть как руины, но внутри у них есть много чего стоящего."
TRN_nf_b010:0 "Кузница или еда"
TRN_nf_b010_desc:0 "У рабов Питта есть один выбор - продолжать работать в кузницах, или мы перестанем стоять между ними и трогами."
TRN_nf_b011:0 "Скрытные пальто"
TRN_nf_b011_desc:0 "Павшие в бою троги обретают новую жизнь, становясь шкурами, защищающими наших воинов."
TRN_nf_b012:0 "Улучшенные боевые действия"
TRN_nf_b012_desc:0 "Эти охоты за пределами Питта многому нас научили."
TRN_nf_b013:0 "Вяленая задница"
TRN_nf_b013_desc:0 "Сохраненное и высушенное мясо может наполнить желудки наших воинов между охотами."
TRN_nf_b014:0 "Выживание наиболее приспособленных"
TRN_nf_b014_desc:0 "Сильные выживают, слабые умирают. Так устроен мир."
TRN_nf_b015:0 "Бесконечная охота"
TRN_nf_b015_desc:0 "Мы охотимся или умираем."
TRN_nf_b016:0 "Земля Йинзеров"
TRN_nf_b016_desc:0 "Мы спасли многих, кому больше некуда было идти. Из пепла Питта мы можем создать что-то лучшее."
TRN_nf_b017:0 "Снести памятники"
TRN_nf_b017_desc:0 "Возвышающимся скульптурам тех, кто жил раньше, нет места в нашем новом Питте."
TRN_nf_b018:0 "Улучшение условий жизни"
TRN_nf_b018_desc:0 "Мы можем более эффективно использовать пространство, которое раньше занимали статуи."
TRN_nf_b019:0 "Замена памятников"
TRN_nf_b019_desc:0 "Глубоко в руинах есть статуи, которые лучше смотрелись бы за пределами Хэйвена."
TRN_nf_b020:0 "Примите наших идолов"
TRN_nf_b020_desc:0 "Древние воины, которых мы почитаем, будут вести наш народ."
TRN_nf_b021:0 "Рабочее ополчение"
TRN_nf_b021_desc:0 "Спасенные рабы Питта хотят сражаться вместе с нами, чтобы защитить наш город."
TRN_nf_b022:0 "Цепи для винтовок"
TRN_nf_b022_desc:0 "Оружие угнетателей теперь переходит в руки угнетенных."
TRN_nf_b023:0 "Воины племен"
TRN_nf_b023_desc:0 "Освобождённые рабы занимают своё место в нашем обществе, но оно не под угрозой. Однако их труд освободит ещё больше людей, чтобы стать воинами."
TRN_nf_b024:0 "Утилизация стала проще"
TRN_nf_b024_desc:0 "Под эскортом наших воинов освобождённые рабы без труда обыскивают руины. Оказывается, отсутствие необходимости бежать от трогов делает сбор сокровищ лёгким."
TRN_nf_b025:0 "Открытый совет"
TRN_nf_b025_desc:0 "Освобожденные мужчины и женщины получат место в нашем племенном совете."
TRN_nf_b026:0 "Гордо возвыситься"
TRN_nf_b026_desc:0 "Мы совершили великие дела, оставаясь верными своим принципам. Мы должны гордиться тем, что сделали."
TRN_nf_b027:0 "Осесть на других стадионах"
TRN_nf_b027_desc:0 "В городе есть и другие стадионы, на которых уже много лет никто не живёт. Мы могли бы это изменить."
TRN_nf_b028:0 "Ближе к Хэйвену"
TRN_nf_b028_desc:0 "Кузницы Питта станут новым сердцем нашего племени."
TRN_nf_b029:0 "Копнуть в наши корни"
TRN_nf_b029_desc:0 "Стадион — наш дом, и он таковым останется."
TRN_nf_b030:0 "Общая мудрость"
TRN_nf_b030_desc:0 "Воины нашего племени и освобожденные рабы многому научились друг у друга."
TRN_nf_b031:0 "Один народ"
TRN_nf_b031_desc:0 "Наше племя и освобожденные рабы были очень разными, но за эти месяцы мы стали единым целым."

###Tooltips###
