TRN_6_tt:0 "Статуя, которую мы решим переместить, вдохновит наш народ"
TRN_7_tt:0 "Освобожденные рабы присоединяются к нашему совету"
TRN_8_tt:0 "Мы перенесем статую мистера Роджерса"
TRN_9_tt:0 "Мы перенесем статую Старджелла"
