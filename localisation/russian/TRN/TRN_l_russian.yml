 ###Country Flag###
 TRN_slave_council_flag:0 "Звільнені раби отримали місце в нашій племінній раді"

 ###Characters###
 TRN_tom_stalowe_NAME:0 "Том Сталоу"
 TRN_tom_stalowe_desc:0 "Руїни за стінами володінь Ашура — це дикі землі, кишачі трогами та дикунами, чий розум поглинуло безумство. Мало хто з тих, хто відважується зайти за огорожу, повертається, але деякі вцілілі розповідають дивні речі. Ходять чутки про людей, які живуть серед трогів та дикунів, облаштувавши життя в старій цитаделі, до якої ніхто не може дістатися... чи можуть ці чутки бути правдою?"
 TRN_big_trog_name:0 "Альфа-трог"
 TRN_ashley_borsan_name:0 "Еш Борсан"
 TRN_shane_hayette_NAME:0 "Шейн Хаєтт"

 ###Events###
 TRN_nf_events.1.title:0 "Троги"
 TRN_nf_events.1.desc:0 "За межами парканів работорговців Пітт не належить нікому. Натомість він захоплений трогами. Ці жахливі мутанти з'явилися внаслідок унікального поєднання радіації та промислового забруднення Пітта. Вони нишпорять вулицями, каналізаціями та старими будівлями, пожираючи кожного й усе, що трапляється на шляху. Троги були тут століттями і залишаться ще на століття."
 TRN_nf_events.1.a:0 "Хто міг би там вижити?"
 TRN_nf_events.2.title:0 "З невідомих країв"
 TRN_nf_events.2.desc:0 "Одного разу до Пітта з заходу прийшов одноплемінник. Кажуть, він був одним із останніх нащадків давно загиблого племені, яке вміло спілкуватися зі звірами Пустки. Можливо, саме завдяки хисту предків троги не розірвали його на шматки, коли він увійшов до Пітта. Згодом він знайшов шлях до величезного стадіону в серці руїн — місця, куди люди не зазирали понад сто років. Там він заснував нове плем'я з однією метою."
 TRN_nf_events.2.a:0 "Створення кращого майбутнього"
 TRN_nf_events.2.b:0 "Збереження мудрості"
 TRN_nf_events.3.title:0 "Порятунок духів"
 TRN_nf_events.3.desc:0 "Він бачив у руїнах людей, чиї душі були в облозі. Здалеку він спостерігав, як вони програвали свої битви і ставали схожими на звірів. Він згадав ритуал свого народу, який використовували, щоб повернути тих, хто впадав у божевілля. Вночі він схопив одного з них, поки той спав. За допомогою потрібних трав дикун занурився в глибокий сон. Коли він прокинувся, його дух знову був у спокої, але спогади про старе життя зникли. Том навчив його звичаям свого втраченого народу, і через деякий час вони разом пішли рятувати іншого. Потім троє врятували ще одного. За кілька років Том сформував нове плем'я з тих, чиї душі він зцілив."
 TRN_nf_events.3.a:0 "Від одного до багатьох"
 TRN_nf_events.4.title:0 "Пробудження"
 TRN_nf_events.4.desc:0 "Душі врятованих Томом відновилися, але не безслідно. Ті, хто повернувся, все ще мали в собі залишки звіриних духів. Навіть після вживання священних трав та проведення ритуалів вони не могли позбутися того, що їх торкнулося. У людей розвинувся зв'язок із трогами руїн, і вони виявили, що можуть певною мірою контролювати їх, як і предки Тома контролювали звірів Пустки. Том заборонив зміцнювати ці узи, не бажаючи бачити, як його народ перетворюється на звірів. Але оскільки рейдери Пітта наступають на стадіон, Еш прийшла до Тома з питанням."
 TRN_nf_events.4.a:0 "Хіба ми не повинні використовувати всі доступні засоби?"
 TRN_nf_events.5.title:0 "Врятувати чи пожертвувати"
 TRN_nf_events.5.desc:0 "Нову групу дикунів помітили біля стадіону, і поки плем'я готується їх схопити, Том не може перестати думати над словами Еш. Усе більше членів племені з жахом дивляться на схід. Протистояння Пітту здається неможливим, але з більшою кількістю трогів це може вийти. Цей ритуал можна провести інакше. Замість порятунку душ, нещасних можна підштовхнути до звіриного божевілля, і тоді вони битимуться за нас як троги!"
 TRN_nf_events.5.a:0 "Врятувати дикунів"
 TRN_nf_events.5.b:0 "Пожертвувати дикунами"
 TRN_nf_events.6.title:0 "Знищення зла"
 TRN_nf_events.6.desc:0 "Рейдери Пітта, які колись загрожували нашому племені та ледь не штовхнули нас у темряву, тепер тікають до своїх схованок в Аптауні. Раби Пітта взяли до рук зброю і разом з нашими воїнами просуваються крізь висотні руїни. Це лише питання часу, коли останнього з цих мерзенних рейдерів скинуть з верхівок їхніх веж."
 TRN_nf_events.6.a:0 "Перемога за нами!"
 TRN_nf_events.7.title:0 "Великий бенкет"
 TRN_nf_events.7.desc:0 "Рейдери Пітта, перед якими наше плем'я колись тремтіло в руїнах, тепер тікають, рятуючи свої життя, до своїх схованок в Аптауні. Вимкнувши світло, ми нацькували на вежі зграї трогів. По всьому Пітту дедалі рідше чути постріли і дедалі частіше — крики."
 TRN_nf_events.7.a:0 "Мисливці стали здобиччю"
 TRN_nf_events.8.title:0 "Немовля"
 TRN_nf_events.8.desc:0 "На вершині вежі Ашура залишилася остання чужинка, яка ще жива — Марі, немовля Ашура. У племені немає згоди щодо того, що робити з дитиною. Виховати її як члена племені? Відіслати за межі Пітта? Чи щось інше?"
 TRN_nf_events.8.a:0 "Виховати її"
 TRN_nf_events.8.b:0 "Нехай звільнений раб винесе її за межі Пітта"
 TRN_nf_events.8.c:0 "§R(Канібал) З'їсти немовля§!"
 TRN_nf_events.9.title:0 "Земля Іньз"
 TRN_nf_events.9.desc:0 "Наше плем'я звільнило Пітт від злих рейдерів. Деякі раби повернулися до своїх домівок, але багато хто приєднався до племені. Тепер ми єдиний народ, але без назви. Шукаючи в руїнах, ми знайшли згадки про людей, які жили на цій землі раніше, особливо навколо стадіону. Вони називали себе «Іньзерами»."
 TRN_nf_events.9.a:0 "Тож ми — Іньзери"
 TRN_nf_events.10.title:0 "Наші мисливські угіддя"
 TRN_nf_events.10.desc:0 "Пітт повернувся до своїх справжніх господарів — трогів. Під час битв наш народ став ближчим до цих істот. Вони така ж частина нашого племені, як і будь-який чоловік чи жінка. Разом ми їмо, спимо і полюємо. Дивлячись на своє плем'я з вершини стадіону, Том не міг не згадати легенди старійшин про давні часи. Вони жили так само зі звірами Пустки і були нестримними, поки не прийшли залізні люди."
 TRN_nf_events.10.a:0 "Але вони десь на заході, з нами все буде добре."
 TRN_nf_events.11.title:0 "Перенесення статуї"
 TRN_nf_events.11.desc:0 "Руїни Піттсбурга повні монументів героям минулого. Будь-який з них міг би замінити ту жахливу споруду біля входу в Гейвен. Проте багато статуй зруйнувалися від часу, і ми навіть не знаємо, кого вони зображують. Є лише три статуї в достатньо доброму стані, щоб ми могли виявити до них повагу. Перша — містер Роджерс, він був чудовим сусідом, який дбав про всіх. Друга — Віллі Старджелл, воїн, відомий тим, що сильно бив ворогів своєю палицею. Остання — Гонус Вагнер, ще один воїн, відомий спритним захистом. Статуя, яку ми оберемо, надихатиме майбутні покоління."
 TRN_nf_events.11.a:0 "Обрати Роджерса"
 TRN_nf_events.11.b:0 "Обрати Старджелла"
 TRN_nf_events.11.c:0 "Обрати Вагнера"

 ###Ideas###
 TRN_we_be_trogs:0 "Висотні руїни"
 TRN_we_be_trogs_desc:0 "Троги блукають каналізацією та зруйнованими будівлями Пітта. Між надійним укриттям у руїнах та безстрашною кровожерливістю трогів знадобиться маленьке диво або тривалий кошмар, щоб хтось зміг пробитися до нашої домівки."
 TRN_fight_as_trogs_idea:0 "Битися як троги"
 TRN_fight_as_trogs_idea_desc:0 "Наш народ вивчив бойовий стиль трогів. Незабаром ми станемо такими ж смертоносними, як і вони!"
 TRN_trog_traps_idea:0 "Кращі пастки на трогів"
 TRN_trog_traps_idea_desc:0 "Ми багато дізналися про полювання на трогів. Наприклад, ви знали, що пастки працюють краще з приманкою?"
 TRN_avoid_observe_idea:0 "Уникай та спостерігай"
 TRN_avoid_observe_idea_desc:0 "Наші воїни воліють битися з відстані та добивати тих, кого троги не встигли з'їсти."
 TRN_dig_and_hold_idea:0 "Закріпитися і триматися"
 TRN_dig_and_hold_idea_desc:0 "У тих рідкісних випадках, коли ворогам вдається стримати орди трогів, наші воїни б'ються з імпровізованих фортів."
 TRN_watching_bridges_idea:0 "На варті мостів"
 TRN_watching_bridges_idea_desc:0 "Найкращі воїни племені пильно стежать за горизонтом. Коли новий ворог прийде до Пітта, ми будемо готові."
 TRN_hunting_grounds_idea:0 "Мисливські угіддя"
 TRN_hunting_grounds_idea_desc:0 "Руїни Пітта відлунюють гарчанням трогів та криками тих нещасних, кому не пощастило потрапити нам до рук."
 TRN_trog_hierarchy_idea:0 "Право сильного"
 TRN_trog_hierarchy_idea_desc:0 "Як і у трогів, у нашому племені правлять найсильніші."
 TRN_trog_hierarchy_2_idea:0 "Право сильного"
 TRN_trog_hierarchy_2_idea_desc:0 "Як і у трогів, у нашому племені правлять найсильніші."
 TRN_baby_back_ribs_idea:0 "Реберця з немовляти"
 TRN_baby_back_ribs_idea_desc:0 "ВОНИ З'ЇЛИ ДИТИНУ?"
 TRN_endless_hunt_idea:0 "Нескінченне полювання"
 TRN_endless_hunt_idea_desc:0 "Жага нової здобичі змушує нас рухатися тільки вперед."
 TRN_one_people_idea:0 "Єдиний народ"
 TRN_one_people_idea_desc:0 "Наше плем'я прийняло багатьох чужинців з розкритими обіймами. Це був непростий досвід для всіх нас, але ми вийшли з нього сильними та єдиними."

 ###National Focus###
 TRN_nf_a001:0 "Звірі"
 TRN_nf_a001_desc:0 "Кожен, хто наважується зайти в Пітт, знає, хто такий трог."
 TRN_nf_a002:0 "Мандрівник"
 TRN_nf_a002_desc:0 "Чужинець із заходу з незвичайними здібностями."
 TRN_nf_a003:0 "Плем'я"
 TRN_nf_a003_desc:0 "З часом чужинець перестав бути самотнім."
 TRN_nf_a004:0 "Звір всередині"
 TRN_nf_a004_desc:0 "Живучи серед звірів, треба бути обережним, щоб самому не стати одним із них."
 TRN_nf_a005:0 "Іржаві ломаки"
 TRN_nf_a005_desc:0 "Велика палиця робить «бум»."
 TRN_nf_a006:0 "Розчистити тунелі"
 TRN_nf_a006_desc:0 "Під стадіоном є тунелі, давно завалені уламками."
 TRN_nf_a007:0 "Грибні ферми"
 TRN_nf_a007_desc:0 "Вогке середовище тунелів ідеально підходить для вирощування грибів."
 TRN_nf_a008:0 "Давні бойові кличі"
 TRN_nf_a008_desc:0 "Глибоко в стадіоні ми знайшли давні гімни воїнів. Вперед!"
 TRN_nf_a009:0 "Зв'язок із трогами"
 TRN_nf_a009_desc:0 "Використання нашого зв'язку дозволяє нам трохи контролювати трогів..."
 TRN_nf_a010:0 "Спортивна медицина"
 TRN_nf_a010_desc:0 "У давні часи на цьому стадіоні жили великі цілителі, які підтримували воїнів-Стілерів спеціальними ліками — сольовими таблетками. Ми можемо скористатися їхньою мудрістю."
 TRN_nf_a011:0 "Ритуали над дикунами"
 TRN_nf_a011_desc:0 "Дикуни небезпечні, але вони ще не втрачені. Ми можемо врятувати їх... або підштовхнути далі."
 TRN_nf_a012:0 "Масовий ритуал"
 TRN_nf_a012_desc:0 "Зловивши велику кількість дикунів, ми можемо зібрати все плем'я для одного великого ритуалу."
 TRN_nf_a013:0 "Обладунки предків"
 TRN_nf_a013_desc:0 "Обладунки давніх Стілерів носитимуть наші найкращі воїни."
 TRN_nf_a014:0 "Вони б'ються з нами"
 TRN_nf_a014_desc:0 "Троги битимуться пліч-о-пліч з нашими воїнами як одне ціле!"
 TRN_nf_a015:0 "Жити з трогами"
 TRN_nf_a015_desc:0 "Так само як ми б'ємося зі звірами, ми живемо з ними, зміцнюючи наші узи."
 TRN_nf_a016:0 "Бийся як трог"
 TRN_nf_a016_desc:0 "Трог — смертоносна істота, і нам є чого у них повчитися."
 TRN_nf_a017:0 "Полювати з трогами"
 TRN_nf_a017_desc:0 "Спільне полювання з трогами навчить нас багато чому."
 TRN_nf_a018:0 "Прийняти їхню ієрархію"
 TRN_nf_a018_desc:0 "У трогів ватажок — найсильніший. Наше плем'я може зробити так само."
 TRN_nf_a019:0 "Нічна здобич"
 TRN_nf_a019_desc:0 "Замало просто полювати з трогами, ми маємо насолоджуватися плодами полювання."
 TRN_nf_a020:0 "Витратні інструменти"
 TRN_nf_a020_desc:0 "Троги — це лише звірі, які стоятимуть між нами та загрозами племені, не більше."
 TRN_nf_a021:0 "Покращені пастки"
 TRN_nf_a021_desc:0 "Спіймати трога неважко. Але це не означає, що ми не повинні намагатися вдосконалюватися."
 TRN_nf_a022:0 "Мир у домі"
 TRN_nf_a022_desc:0 "Ми зробимо все, щоб війна не змінила наш спосіб життя на стадіоні."
 TRN_nf_a023:0 "Уникай та спостерігай"
 TRN_nf_a023_desc:0 "Троги будуть на передовій, поки наші люди залишатимуться ззаду і керуватимуть битвою здалеку."
 TRN_nf_a024:0 "Оборона опорних пунктів"
 TRN_nf_a024_desc:0 "Ми знаємо, що одного дня рейдери Пітта прийдуть по нас. Підготовка оборони заздалегідь — обов'язкова умова."
 TRN_nf_a025:0 "Закріпитися і триматися"
 TRN_nf_a025_desc:0 "З-за безпечних стін ми можемо спостерігати за шляхом трогів і відстрілювати тих рейдерів, що вбивають забагато наших звірів."
 TRN_nf_a026:0 "Пітт завдає удару"
 TRN_nf_a026_desc:0 "Ходять чутки, що Пітт захопила якась інша сила, але колись вони прийдуть і за нами. Бийте їх, поки вони не встигли облаштуватися!"
 TRN_nf_a027:0 "Вітаємо рабів"
 TRN_nf_a027_desc:0 "Раби Пітта були жертвами зла Ашура. Їм нікуди йти, тому ми маємо прийняти їх до племені."
 TRN_nf_a028:0 "Жалю до здобичі немає"
 TRN_nf_a028_desc:0 "Раби були слабкими, навіщо нам пускати таку слабкість у наше плем'я?"
 TRN_nf_a029:0 "Збір трофеїв"
 TRN_nf_a029_desc:0 "У рейдерів було багато гарних пушок, якими вони так і не встигли скористатися."
 TRN_nf_a030:0 "Обладунки воїнів"
 TRN_nf_a030_desc:0 "З цією бронею навіть найслабше цуценя стане могутнім воїном!"
 TRN_nf_a031:0 "Вхід до Аптауна"
 TRN_nf_a031_desc:0 "Цитадель рейдерів у самому серці Пітта скоро впаде перед нами."
 TRN_nf_a032:0 "Дитина"
 TRN_nf_a032_desc:0 "Дитина Ашура тепер сирота. Що з нею буде?"
 TRN_nf_a033:0 "Зміцнення традицій"
 TRN_nf_a033_desc:0 "Ми ніколи не повинні забувати, хто ми є. Наша культура та традиції — це те, за що варто триматися."
 TRN_nf_a034:0 "Розширення стін"
 TRN_nf_a034_desc:0 "Наші форпости тепер розширяться на всю територію."
 TRN_nf_a035:0 "Стежити за мостами"
 TRN_nf_a035_desc:0 "Рейдери Пітта зникли, але загроза від чужинців залишається."
 TRN_nf_a036:0 "Краще лупцювання"
 TRN_nf_a036_desc:0 "Ломака — це добре, але ломака з привареними шипами? Ще краще."
 TRN_nf_a037:0 "Вивчення їхніх звичаїв"
 TRN_nf_a037_desc:0 "Розуміючи обладунки, які ми викапуємо на стадіоні, ми можемо покращити власну броню."
 TRN_nf_a038:0 "Бити у воєнні барабани"
 TRN_nf_a038_desc:0 "Нам доведеться битися, хочемо ми цього чи ні. Згуртуйте воїнів під бій барабанів."
 TRN_nf_b000:0 "Наші мисливські угіддя"
 TRN_nf_b000_desc:0 "На вулицях Пітта стає дедалі менше здобичі. Нам потрібно почати дивитися назовні."
 TRN_nf_b001:0 "Троги кукурудзяних полів"
 TRN_nf_b001_desc:0 "На схід від Пітта лежать поля гостролисту та кукурудзи. Ідеальне місце, щоб ховатися і полювати."
 TRN_nf_b002:0 "Похмурі жнива"
 TRN_nf_b002_desc:0 "Фермери не зрозуміли, що їх вбило. Вони йдуть на поля, а ми збираємо врожай з їхньої плоті."
 TRN_nf_b003:0 "Штурм замку"
 TRN_nf_b003_desc:0 "Металева броня та мечі з лез газонокосарок нас не зупинять."
 TRN_nf_b004:0 "Проламати ворота"
 TRN_nf_b004_desc:0 "Навіть височенні стіни їхніх замків не врятують їх від нашого голоду."
 TRN_nf_b005:0 "Дух трога в мені"
 TRN_nf_b005_desc:0 "Деякі работорговці, що билися за Ашура, мають серце справжнього воїна. Можливо, вони гідні приєднатися до нас."
 TRN_nf_b006:0 "Діра"
 TRN_nf_b006_desc:0 "Одна з небагатьох вдалих ідей Ашура — випробовувати воїнів і давати найсильнішим піднятися нагору."
 TRN_nf_b007:0 "Барбекю з рейдерів"
 TRN_nf_b007_desc:0 "Має рейдер серце воїна чи ні — на смак вони всі однакові."
 TRN_nf_b008:0 "Приманка для трогів"
 TRN_nf_b008_desc:0 "Крики рейдерів, коли троги заходять до їхніх кліток, ніколи не перестануть бути смішними."
 TRN_nf_b009:0 "Вивчення околиць"
 TRN_nf_b009_desc:0 "Будівлі Пітта можуть здаватися руїнами, але всередині повно цінних речей."
 TRN_nf_b010:0 "Кузня або їжа"
 TRN_nf_b010_desc:0 "У рабів Пітта один вибір: продовжувати працювати в кузнях або ми перестанемо стримувати трогів."
 TRN_nf_b011:0 "Шкіряні пальта"
 TRN_nf_b011_desc:0 "Троги, що пали в бою, отримують нове життя як шкури, що захищають наших воїнів."
 TRN_nf_b012:0 "Покращений бій"
 TRN_nf_b012_desc:0 "Полювання за межами Пітта навчило нас багато чому."
 TRN_nf_b013:0 "В'ялена дупа"
 TRN_nf_b013_desc:0 "Заготовлене та висушене м'ясо наситить шлунки наших воїнів між нападами."
 TRN_nf_b014:0 "Виживання найсильніших"
 TRN_nf_b014_desc:0 "Сильні виживають, слабкі вмирають. Такий закон світу."
 TRN_nf_b015:0 "Нескінченне полювання"
 TRN_nf_b015_desc:0 "Ми полюємо або вмираємо."
 TRN_nf_b016:0 "Земля Іньз"
 TRN_nf_b016_desc:0 "Ми врятували багатьох, кому не було куди йти. На попелищі Пітта ми створимо щось краще."
 TRN_nf_b017:0 "Прибрати монументи"
 TRN_nf_b017_desc:0 "Величним скульптурам тих, хто був до нас, немає місця в нашому новому Пітті."
 TRN_nf_b018:0 "Покращення умов життя"
 TRN_nf_b018_desc:0 "Ми краще використаємо простір, де раніше стояли статуї."
 TRN_nf_b019:0 "Замінити монументи"
 TRN_nf_b019_desc:0 "В глибині руїн є статуї, які виглядатимуть краще біля Гейвена."
 TRN_nf_b020:0 "Прийняти наших ідолів"
 TRN_nf_b020_desc:0 "Давні воїни, яких ми шануємо, вестимуть наш народ."
 TRN_nf_b021:0 "Ополчення робітників"
 TRN_nf_b021_desc:0 "Врятовані раби Пітта хочуть битися разом із нами, щоб захистити наше місто."
 TRN_nf_b022:0 "Ланцюги на гвинтівки"
 TRN_nf_b022_desc:0 "Зброя гнобителів тепер переходить до рук пригноблених."
 TRN_nf_b023:0 "Племінні воїни"
 TRN_nf_b023_desc:0 "Звільнені раби мають своє місце в суспільстві, але не на передовій. Проте їхня праця звільнить більше людей для війни."
 TRN_nf_b024:0 "Легкий збір брухту"
 TRN_nf_b024_desc:0 "Під охороною наших воїнів звільнені раби легко збирають ресурси в руїнах. Виявляється, збирати брухт легко, коли не треба тікати від трогів."
 TRN_nf_b025:0 "Відкрита рада"
 TRN_nf_b025_desc:0 "Звільнені чоловіки та жінки отримають місце в нашій племінній раді."
 TRN_nf_b026:0 "Стояти з гордістю"
 TRN_nf_b026_desc:0 "Ми зробили великі справи, залишаючись вірними своєму шляху. Ми маємо пишатися скоєним."
 TRN_nf_b027:0 "Заселити інші стадіони"
 TRN_nf_b027_desc:0 "У місті є інші стадіони, де роками ніхто не жив. Ми можемо це змінити."
 TRN_nf_b028:0 "Ближче до Гейвена"
 TRN_nf_b028_desc:0 "Кузні Пітта стануть новим серцем нашого племені."
 TRN_nf_b029:0 "Укріпити коріння"
 TRN_nf_b029_desc:0 "Стадіон — наш дім, і він ним залишиться."
 TRN_nf_b030:0 "Спільна мудрість"
 TRN_nf_b030_desc:0 "Воїни племені та звільнені раби багато чому навчилися одне в одного."
 TRN_nf_b031:0 "Єдиний народ"
 TRN_nf_b031_desc:0 "Наше плем'я та звільнені раби були дуже різними, але за ці місяці ми стали єдиним цілим."

 ###Tooltips###
 TRN_1_tt:0 "Нова група дикунів приєднується до племені"
 TRN_2_tt:0 "Нова зграя трогів надходить у розпорядження племені"
 TRN_3_tt:0 "Рейдери, які довели свою силу, приєднуються до наших воїнів"
 TRN_4_tt:0 "Звільнені раби формують ополчення"
 TRN_5_tt:0 "Нова група воїнів виходить на поле бою"
 TRN_6_tt:0 "Статуя, яку ми оберемо, надихатиме наш народ"
 TRN_7_tt:0 "Звільнені раби приєднуються до ради"
 TRN_8_tt:0 "Ми перенесемо статую містера Роджерса"
 TRN_9_tt:0 "Ми перенесемо статую Старджелла"
 TRN_10_tt:0 "Ми перенесемо статую Вагнера"

