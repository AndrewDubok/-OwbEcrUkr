l_russian:
  bunkerblues:0 "Bunker Blues"
  bunkerblues_desc:0 ""

  brotherhood_commander_trait:0 "Командир Братства"
  brotherhood_commander_trait_desc:0 "Ви стійкий Брат, навчений виконанню тактики малих груп та експерт у використанні Силової Броні.\n\n§2Ad Victoriam§!!"

  brotherhood_elder_conflicts: "Конфлікти Старійшин"
  brotherhood_elder_conflicts_desc: "Ця країна має історію суперечок зі Старійшинами Лост-Хіллз. Таким чином, малоймовірно, що ми найближчим часом отримаємо допомогу від Лост-Хіллз."
  brotherhood_chaotic_conflicts: "Хаотичні конфлікти"
  brotherhood_chaotic_conflicts_desc: "Хаотичні конфлікти, в яких бере участь [ROOT.GetName], ускладнюють для інших груп можливість ефективно надсилати нам допомогу!"
  bos_civilian_distrust: "\"Ці злі бляшанки!\""
  bos_civilian_distrust_desc: "Війна НКР з Братством залишила багатьох людей у Великій НКР вороже налаштованими до ідеї правління Братства. Це не виключно їхня провина, оскільки Лост-Хіллз зазвичай уникали гуманітарних зусиль щодо \"цивільних, лояльних до ворога\" під час того конфлікту."
  bos_brotherhood_of_steel_idea: "Сталева гордість"
  bos_army_confusion_4: "Лицарська розгубленість"
  bos_army_confusion_3: "$bos_army_confusion_4$"
  bos_army_confusion_2: "$bos_army_confusion_4$"
  bos_army_confusion_1: "$bos_army_confusion_4$"
  bos_army_confusion_4_desc: "Війна НКР з Братством призвела до безладу в нижчих чинах Братства! Солдатам важко діставати боєприпаси для своїх гвинтівок, ланцюг командування постраждав, а борги серед наших квартирмейстерів досягли непростимого рівня!"
  bos_army_confusion_3_desc: "$bos_army_confusion_4_desc$"
  bos_army_confusion_2_desc: "$bos_army_confusion_4_desc$"
  bos_army_confusion_1_desc: "$bos_army_confusion_4_desc$"
  gaben_economy_law: "Найвища вогнева міць"
  isolationist_trade_law: "Все заради Кодексу"
  military_indoctrination_press: "Індоktrinaція"
  selective_outsider_recruitment_law: "Вибірковий набір сторонніх"
  lost_hills_pensions: "Пенсії квартирмейстерів"
  lost_hills_wages: "Зарплати квартирмейстерів"
  lost_hills_cant_change_this_law: "Як Лост-Хіллз, ми змінюємо цей закон через національні фокуси."
  bos_trade_modifier_to_lost_hills: "Торговельна мережа Лост-Хіллз"

  bos_tension_dynamic_modifier: "Напруженість Лост-Хіллз-НКР"
  bos_tension_dynamic_modifier_desc: "Ми лише нещодавно змогли укласти наше неофіційне перемир'я з НКР. Багато хто в Братстві побоюється, що цей «мир» триватиме недовго. Напруженість для нас відображає, як ідея розпалювання цього конфлікту змушує членів Лост-Хіллз починати залишати свої доктринальні обов'язки, щоб підготуватися до війни з великим ворогом."

  bos_ncr_tension_dynamic_modifier: "Напруженість Лост-Хіллз-НКР"
  bos_ncr_tension_dynamic_modifier_desc: "Для багатьох політиків перспектива повномасштабної кампанії проти терористів Братства в горах на захід від Хабу зараз просто неможлива. Знищення золотого запасу НКР показало, якої шкоди Братство може завдати НКР цілеспрямованими, прорахованими ударами. З кампанією в Мохаве та безліччю ворогів, останнє, чого хочуть Барони Брамінів, Еллґуд або будь-хто інший, це кровопролиття так близько до основних територій.\nЧас Братства настане. Питання, однак, коли."
  
  #The advisor contest!
BOS_advisor_contest_name_1: "Писар Кемпбелл Райт"
BOS_advisor_contest_advisor_1_desc: "Колись Райт, писар низького рангу, проводив багато вільного часу в архівах Лост-Хіллз, де читав про літальні апарати, які колись панували в небі старого світу. Одним із таких апаратів, що привернули його увагу, був дирижабль. Хоча багато хто в Старому Світі вважав це застарілою технологією, Райт бачив у ній потенціал. Він накреслив плани обтічних дирижаблів, які можна було легко побудувати з ресурсів, доступних Братству. Ці дирижаблі дозволили б Братству відправляти експедиції у віддалені куточки Техасу, Східного узбережжя та Середнього Заходу. Райт, тепер вважається експертом Братства з літальних апаратів, прагне повернути небо за допомогою сталевих бегемотів, на які навіть старий світ дивився б із трепетом."
BOS_advisor_contest_name_2: "Лицар Генрі Муньос"
BOS_advisor_contest_advisor_2_desc: "Дід лицаря Муньоса приєднався до Братства після аварійної посадки саморобного літака поблизу Лост-Хіллз. Хоча Генрі не є асом-пілотом, він виявив здібності до будівництва літальних апаратів, часто одночасно налагоджуючи двигуни та вихлоп, щоб забезпечити безперебійну роботу."
BOS_advisor_contest_name_3: "Лицар Арчібальд"
BOS_advisor_contest_advisor_3_desc: "Під час битви несприятливі шанси часто означають поразку для тих, хто їм протистоїть. Однак Арчібальд зрозумів, що з цим можна легко впоратися за допомогою хорошого керівництва та сміху в обличчя ворога. Народжений від батьків у Братстві, Арчібальд виріс, розпізнаючи всі різні гнітючі та жахливі способи, які Пустка могла запропонувати під час патрулювання в пошуках технологій. Однак, навіть у юності, Арчібальд жартував у цих ситуаціях, щоб підтримувати бойовий дух своєї команди, навіть якщо вони всі жили в цьому похмурому світі. Для багатьох нових облич, що підіймаються в Братстві, Арчібальд є оплотом проти всього, що Пустка може кинути на людей, будь то фізично чи ментально. Для його начальників він солдат, який навчився вести свою команду як у бою, так і поза ним. Для його ворогів його сміх і посмішка зазвичай є останнім, що їхні органи чуття встигають помітити."
BOS_advisor_contest_name_4: "Лицар Мальфас"
BOS_advisor_contest_advisor_4_desc: "Мальфас був вже не таким після своєї експедиції до лісів на північний схід від Арройо. Його обличчя змінилося, він мав інший колір шкіри і навіть, здавалося, забув власну сім'ю. Тим не менш, він завжди був хорошим солдатом, незважаючи на пережиті травми. Використовуючи неабияку хитрість і безжальне розуміння Західного узбережжя, він провів багато розвідувальних вилазок, які були досить прибутковими для Лост-Хіллз."
BOS_advisor_contest_name_5: "Паладин Мігіл"
BOS_advisor_contest_advisor_5_desc: "Під час битви за Ірвайн солдати братства виявили проєкт силової броні для землерийних робіт. Після повернення в бункер Лост-Хіллз паладин Мігіл знайшов нову мету в житті. Мігіл є єдиним паладином, який захоплюється копанням та видобутком майже до одержимості, стверджуючи, що для нього це природне бажання — бути під землею. Спочатку він мав проблеми з розміром костюма. Хоча він кремезний, ніколи не називайте його гномом!"
BOS_advisor_contest_name_6: "Писар Дж. Беатріс Гуденаф"
BOS_advisor_contest_advisor_6_desc: "Племінниця колишнього Головного писаря Ордену Щита, після смерті батьків вона була переважно довірена друзям родини. Хоча Братство, як правило, є регламентованим та організованим, у випадку Джейн воно надало їй значну автономію в позанавчальний час. Не маючи батьків, які б її стримували, та завдяки престижу її дядька, Джейн отримала майже повну свободу возитися та експериментувати з будь-яким проєктом, який не був терміновим або ретельно контрольованим. Оскільки енерго-елементи та інші радіоактивні матеріали тримали під замком, Джейн постійно зупиняла неможливість живити свій останній ґаджет. Витягуючи батареї та ядра, визнані мертвими, з переробників, Джейн імпровізувала та підключала їх, щоб вичавити кожну краплю енергії. Коли настав час, і вона розробила щось, що хотіла показати дядькові, для неї стало несподіванкою, що модифікації джерела живлення, які прийшли до неї так інтуїтивно, були так високо оцінені. Тепер, з роками, Старшому Писарю Ґуденаф надано повну підтримку Ордену возитися, як вона забажає."
BOS_advisor_contest_name_7: "Писар Ламонт"
BOS_advisor_contest_advisor_7_desc: "Писар Лексі Рамонетт піднялася в Братстві завдяки своїй вродженій прихильності до логістики. Виростаючи з одержимістю старими іграми Піп-Боя та слухаючи старі записи в базі даних, вона отримала вроджену перевагу в цьому плані. Як палка критикиня експансіонізму НКР, писар Рамонетт прагне не до чого іншого, як застосувати свої навички в повномасштабній війні проти НКР, довівши перевагу Братства раз і назавжди."
BOS_advisor_contest_name_8: "Писар Шребер"
BOS_advisor_contest_advisor_8_desc: "«Essayons!» Писар Шребер завжди був насамперед Інженером. Прийшов у Братство дитиною-сиротою, вихованою в Лост-Хіллз. Є підозри, що писар Шребер має коріння Анклаву. Його знайшли дитиною, яка сама блукала пусткою за межами Наварро після падіння Наварро в 2246 році. Його відданість, однак, не піддається сумніву. Він дуже відданий справі та Братству, яке прийняло його дитиною. Захоплений внутрішньою роботою та чистою руйнівною силою Силової Броні. Писар Шребер часто виходить за межі Лост-Хіллз, супроводжуючи команди збирачів та патрулі до довоєнних військових баз, розкиданих по Західному узбережжю, витягуючи схеми та модифікації довоєнної Силової Броні."
BOS_advisor_contest_name_9: "Паладин Бернардо Гомес де Агуафреска"
BOS_advisor_contest_advisor_9_desc: "Нащадок мексиканського іммігранта, який служив у національній гвардії до війни, Бернардо Гомес де Агуафреска виріс у родині, близькій до правлячих еліт братства. Він швидко досяг верхніх ешелонів свого відділення завдяки впливу батьків та своїй відданості братству. Він брав участь у конфліктах з Анклавом та НКР і зрозумів, що братство недостатньо сильне, щоб знищити такого гіганта, як двоголовий ведмідь. З тих пір він виступає за поміркований підхід до зовнішніх відносин та підкреслює важливість зосередження на внутрішніх справах, а не на конфронтації з іншими націями. Він є переконаним ізоляціоністом, оскільки вважає невтручання єдиним способом для братства вижити."
BOS_advisor_contest_name_10: "Писар Зак"
BOS_advisor_contest_advisor_10_desc: "Колишній ремонтник стрілецької зброї в армії НКР; незважаючи на кілька років служби, Зак Газард ніколи не піднімався вище свого початкового звання спеціаліста. Це було причиною, чому він пішов і приєднався до Братства; це, і скільки разів можна лагодити гвинтівку, яку зачинили дверима будівлі, перш ніж поставити під сумнів компетентність своїх побратимів. Як писар, Зак виявив, що робить те саме, що робив останні кілька років. Принаймні цього разу йому не доведеться мати справу з людьми, які ламають свою зброю найдивнішими способами."
BOS_advisor_contest_name_11: "Лицар Доміцій"
BOS_advisor_contest_advisor_11_desc: "Народився в легіоні, і після років жорстоких тренувань і страждань під владою легіонів Цезаря він вирішив втекти на захід зі своєю сім'єю. Після довгого переходу вони знайшли Братство та все добре, що воно давало, але й усе погане, що з цим пов'язано. Тож Авреліан приєднався до лав і швидко піднявся по службі. Завдяки своїм бойовим шрамам і стратегічному генію він та його нечисленні бійці в силовій броні могли легко заходити у фланг і знищувати ворожі легіони з тилу або, якщо потрібно, з фронту, як стіна, що зупиняє ворожі орди. Щоб виділитися в бункері, він пофарбував свою маску в золотий колір."
BOS_advisor_contest_name_12: "Паладин Хігучі"
BOS_advisor_contest_advisor_12_desc: "Колишній член Якудзи, молодий Хігучі залишив групу після того, як розбіжності щодо етики та впровадження передових технологій досягли критичної точки. Бажаючи бути більшим, ніж, як він вважав, «дикий бандит», Хігучі блукав пустками Північної Каліфорнії, збираючи будь-яку зброю, броню чи технології, які вважав важливими; все це завершилося тим, що Хігучі сконструював власну саморобну силову броню та став чимось на кшталт армії з однієї людини. Хоча він зрештою програв, лицарі були вражені бойовою майстерністю Хігучі, і згодом — після звичайних випробувань, які проходить сторонній — він приєднався до Братства Сталі."
BOS_advisor_contest_name_13: "Писар Долорес"
BOS_advisor_contest_advisor_13_desc: "Народившись у безпечних стінах бункера Лост-Хіллз, Долорес росла, не бачачи зовнішнього світу, окрім кількох вилазок назовні з батьком. Під час однієї з таких поїздок увесь загін, включаючи її батька, потрапив у засідку сил НКР і був убитий. Хоча вона ледве врятувалася, цей досвід залишив шрам на все життя. Вона більше не могла виходити надвір, не паралізована страхом. Будучи розжалуваною за непокору, їй запропонували звання писаря як останній засіб. Там вона знайшла багато старих книг з психології, які Братство ігнорувало через відсутність військової цінності. Вивчаючи їх, вона побачила психологічну ціну війни в психіці Братства. Тепер вона не просто лагодить зламану зброю, вона лікує зламану психіку Братства."
BOS_advisor_contest_name_14: "Писар Феррі"
BOS_advisor_contest_advisor_14_desc: "На відміну від інших писарів, Гвідо Феррі не дуже цікавився технологіями. Натомість він зосередився на спробах відтворити кухню Старого Світу, використовуючи інгредієнти Нового. Хоча деякі ставлять під сумнів його одержимість кухнею Старого Світу, ніхто не може заперечити, що його кулінарні навички корисні під час довгих відряджень... і для набору рекрутів."
BOS_advisor_contest_name_15: "Писар Луїза"
BOS_advisor_contest_advisor_15_desc: "Одна з небагатьох мешканців пусток, яких завербували до братства, писар Луїза з'явилася на форпості з голодисками, що містили цінну інформацію, включаючи креслення та місця розташування бункерів. Коли її допитали після допомоги в захопленні цих бункерів, вона вразила Верховного Старійшину своїм розумінням технологій та небезпеки, яку вони становлять для людства, — переконання, яке вона все ще має, хоча й з більшою емпатією до пересічного мешканця пустки."
BOS_advisor_contest_name_16: "Іверна Шін"
BOS_advisor_contest_advisor_16_desc: "Іверна є онукою якогось Деніела Шіна, чиї Сувої Братства вказують на те, що він вирушив в експедицію в регіон, відомий як «Аппалачі», у складі «Першої експедиційної сили Братства» в 2103 році. Однак записи після відбуття сил суперечать один одному: деякі записи стверджують, що Деніел Шін був змушений повернутися, залишивши Аппалачі в руках відступника, а інші записи стверджують, що Шін залишився в Аппалачах до кінця своїх днів, зумівши лише зв'язатися з Лост-Хіллз, щоб надати звіт про ситуацію наприкінці свого життя. Незважаючи на суперечливі повідомлення, Іверна прагне підтримувати іншу особистість та світогляд, ніж її дід колись, обираючи шлях миру та технологічного прогресу, незважаючи на війну НКР з Братством. Вона особливо прагне відрізнятися від діда, намагаючись укласти мир або іншим чином закликати до пактів про ненапад з будь-якими зустрінутими бандами рейдерів, як спосіб протиставити себе ненависті Деніела Шіна до рейдерів."
BOS_advisor_contest_name_17: "Лицар Корбін"
BOS_advisor_contest_advisor_17_desc: "Маючи таку величезну територію для спостереження, будь-яка армія матиме труднощі з підтриманням контролю. Ротам доводилося часто повертатися на базу, переозброюватися та відпочивати, поки інші займали їхнє місце в патрулі. У такому сценарії логістика стає кошмаром. Лицар Корбін побачив таку проблему і впорався з ситуацією. Після кількох нападів на конвої з постачанням, що прямували до Аванпосту 36 поблизу Ірвайну, Корбін залишився зі своїм патрулем без нічого. Замість того, щоб без потреби захищати базу, яка була втрачена, Корбін вирушив зі своїми людьми, щоб вести партизанську окупацію. Навчаючись у рейдерів, Корбін збирав усі необхідні припаси, проводив хірургічні удари та змусив рейдерів тікати. Така війна вважалася нижчою за гідність більшості тактиків Братства для будь-якої тривалої війни, але однієї ночі Корбін згадав, чого він навчився зі своїх битв: невеликий загін, здатний добувати ресурси, може перемогти будь-якого ворога, незалежно від його технологічної могутності чи запасу ресурсів."
BOS_advisor_contest_name_18: "Паладин Робертс"
BOS_advisor_contest_advisor_18_desc: "Справжній патріот Братства, паладин Робертс охоче піднімався по службі в Ордені Щита, щойно досяг повноліття. Зрештою йому було доручено командування Фортом Бастіон, форпостом на кордоні території Братства. Після поранення під час сутички з рейдерами Робертс повернувся до Лост-Хіллз, щоб служити радником Старійшин."
BOS_advisor_contest_name_19: "Писар Рейєс"
BOS_advisor_contest_advisor_19_desc: "Писар Анхела Рейєс є досвідченим і успішним розвідником Братства, експерткою з навігації пустками. Виросла в бункері Лост-Хіллз, але її тягнуло на відкрите повітря, Рейєс мріяла відчути щось поза монотонністю бункерного життя. Починаючи як проста новачок у величезній розвідувальній мережі Братства, Рейєс піднялася по службі і з часом стала ефективною керівницею шпигунів, розвідників і торговців. Її час управління та постачання розвідників Братства по всій пустці зробив її вправною в логістиці та доставці припасів туди, куди інакше було б важко дістатися."
BOS_advisor_contest_name_20: "Писар Врі III"
BOS_advisor_contest_advisor_20_desc: "Писар Врі IV походить з довгої та гордої лінії писарів братства, відомих своєю здатністю виробляти та вдосконалювати енергетичну зброю, причому деякі з їхніх прототипів навіть перевершували довоєнну енергетичну зброю. Незважаючи на те, яке велике взуття їй потрібно було заполонити, Врі довела, що вона, можливо, навіть краща за решту своєї лінії, завдяки своїй технічній майстерності в роботі з довоєнним обладнанням, яку мало хто може перевершити! З нею в раді радників ви можете очікувати отримати кращу енергетичну зброю швидше."
BOS_advisor_contest_name_21: "Паладин Варвік"
BOS_advisor_contest_advisor_21_desc: "Яскравий приклад жорсткості та суворості офіцерського корпусу Братства, паладин Ворвік є офіцером старої школи у війську братства. Його надмірна зневага до сторонніх і надзвичайна суворість зробили його непопулярним офіцером, хоча й ефективним. Він вимагає суворої дисципліни від своїх людей і відомий серед нижчих чинів як «Помий це ще раз, Ворвік» через свою зацикленість на стандартах обслуговування та чистоти."
BOS_advisor_contest_name_22: "Паладин Харді"
BOS_advisor_contest_advisor_22_desc: "Писар Вілбур описував би себе як щасливчика. Щасливчика, що народився в братстві, щасливчика, що виявився достатньо розумним, щоб приєднатися до писарів, щасливчика, що взагалі вижив після своєї першої місії, яка залишила його єдиним вцілілим за межами бункера. Однак, хоча він думав, що його удача нарешті закінчилася після першої місії, виявилося, що його щаслива смуга тільки починалася. Після днів блукання пусткою, намагаючись знайти дорогу назад до Лост-Хіллз, він натрапив на стару дослідницьку станцію, де стара Америка була на межі відкриття способу справжнього масового виробництва найкращого творіння Америки: Силової Броні. Через кілька днів прочісування цієї бази даних, завантажуючи все, що міг, невелика рятувальна група нарешті знайшла його. Замість того, щоб застати його в сльозах, як очікували деякі лицарі, вони побачили людину, яка сяяла усмішкою від вуха до вуха, тримаючи в руках мішок, наповнений знаннями старого світу. Вілбур тепер поставив за мету свого життя втілити ці старі прототипи та концепції в життя."
BOS_advisor_contest_name_23: "Ромбус IV"
BOS_advisor_contest_advisor_23_desc: "Імовірно, четвертий зі своїм ім'ям, Ромб IV очікував на велику спадщину, якій треба відповідати, будучи четвертим з дуже престижним іменем у Братстві. Однак через війну НКР з Братством, а також відсутність записів у Кодексі чи Сувоях про те, що сталося з Ромбом після взаємодії Братства з легендарним Мешканцем Притулку, походження Ромба IV вважається сумнівним у Раді Старійшин. Ромб IV служить так само, як і його ймовірний дід понад століття тому, прагнучи стати Головним Паладином і Головним Лицарем Братства Лост-Хіллз. Так само, як і його прадід, Ромб IV має сувору, стоїчну, грубувату особистість, з додатковими викликами відповідати спадщині, яка, на думку багатьох у бункері, можливо, ніколи не існувала. Однак його бойова та технічна майстерність, а також особистість роблять його чудовим активом як у тактичному плануванні, так і в бою на передовій."
BOS_advisor_contest_name_24: "Писар Маркус «Кровотечиве» Серце"
BOS_advisor_contest_advisor_24_desc: "Маркус народився в Лост-Хіллз у сім'ї писарів. Незабаром після свого одинадцятого дня народження він дізнався, що його батьки під час патрулювання, на жаль, були захоплені в заручники та вбиті групою відчайдушних мешканців пусток. Хоча багато хто вважав це додатковим доказом того, що ізоляція від зовнішнього світу залишається необхідною, Маркус натомість відчув співчуття до мешканців пусток, чиїм єдиним вибором було завдати шкоди іншим заради шансу на їжу. Продовження висловлювання його ідей неодноразово призводило до дисциплінарних попереджень і принесло йому прізвисько, яке посилається на його ідеї та прізвище, а також на його ніс після того, як один офіцер мав досить його проповідей."
BOS_advisor_contest_name_25: "Лицар Кора"
BOS_advisor_contest_advisor_25_desc: "Кора, на відміну від багатьох інших посвячених, мала деякі основи лідерства. Вона була природно харизматичною, могла вмовити паладина зняти Силову Броню. Вона була не просто пересічною красномовною особою, вона була лідером. Природжений талант брати найгірше навчених людей і виходити переможцем проти найкраще навченої команди. Вона проводила багато часу з посвяченими, переконуючись, що вони мають все необхідне. Вона вважала, що жорсткі правила Братства обмежують їхнє зростання, і ці бар'єри потрібно реформувати або зруйнувати. Вона насолоджувалася можливістю покинути затхлі та запліснявілі зали бункера. Щоразу, коли вона була в патрулі чи просто зовні, вона давала питну воду та шматочки хліба тим, хто менш пощастило."
BOS_advisor_contest_name_26: "Лицар Адам Сікс"
BOS_advisor_contest_advisor_26_desc: "Старший лицар Адам Сікс є членом Братства вже кілька поколінь. Як учень-лицар він проявив себе як швидкий розум, взявши на себе керівництво торговельною експедицією на територію Нової Каліфорнії. Після повернення він приніс величезну кількість інновацій у всі аспекти промисловості. За багато наступних років у Братстві він піднявся до звання Старшого лицаря і тепер очолює комерцію та промислові дослідження для Лост-Хіллз."
BOS_advisor_contest_name_27: "Писар Гамільтон"
BOS_advisor_contest_advisor_27_desc: "Подорожуючи до багатьох відділень, розкиданих по пустках, Гамільтон зрозумів силову броню на рівні, недоступному багатьом. Від способів скорочення виробництва деталей до додавання нових модифікацій до існуючих костюмів. Хоча він не найпопулярніша особа через свої тривалі подорожі та відсутність ворожості до сторонніх, тепер відданий писар виконує свої обов'язки з тією майстерністю, яку від нього очікують."
BOS_advisor_contest_name_28: "Писар Хатчінсон"
BOS_advisor_contest_advisor_28_desc: "«Я писар, а не солдат!» Вирощений у відносному комфорті Лост-Хіллз. Хатчінсон зазвичай лікує повсякденні незначні недуги та виконує довоєнні медичні процедури, які більше ніде не можна знайти, окрім таких місць, як Волт-Сіті. Його часто вважають підбурювачем у Лост-Хіллз через його підтримку включення сторонніх до лав Братства. Писар Хатчінсон пропустив відправку в експедиції на Схід через те, що є експертом з усіх медичних питань для Лост-Хіллз. Ця експертиза робить його безцінним для підтримання довголіття та здоров'я Лост-Хіллз."






