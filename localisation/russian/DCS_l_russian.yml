l_russian:

###Tooltips###
    DCS_tt_1:0 "Дейв призначить членів своєї родини радниками та генералами"
    DCS_tt_2:0 "Щоб убезпечити наші поселення, ми розпочнемо полювання на супермутантів усюди, де їх побачать."
    DCS_tt_3:0 "Відкриває серію рішень у категорії балансу сил мутантів для пошуку джерела супермутантів у Столичній Пустці"
    DCS_tt_4:0 "Слідкуйте за вкладкою «Рішення». Збираючи цінні технології, ми зможемо обмінювати їх у Вигнанців на менш досконале спорядження."
    DCS_tt_5:0 "Відкриває рішення для пошуковиків обшукувати конкретні райони нашої території"
    DCS_tt_6:0 "Відкриває рішення для пошуковиків знайти записи родини Келлер. У цьому бункері має щось бути!"
    DCS_tt_7:0 "Відкриває рішення інвестувати в різні торговельні каравани Столичної Пустки"
    DCS_tt_8:0 "Дешвуд керуватиме Вежею так само, як це завжди робилося"
    DCS_tt_9:0 "Ґуставо зробить усе, щоб зомбі не потрапили до Вежі, а безпека буде його головним пріоритетом"
    DCS_tt_10:0 "Ченг намагатиметься перетворити Вежу на народну комуну"
    DCS_tt_11:0 "Рой Філліпс переселить гулів у Вежу і зрештою позбудеться нинішніх мешканців"
    DCS_tt_12:0 "Хто знає, до чого можуть привести ці дослідження?"
    DCS_tt_13:0 "Затія провалилася"
    DCS_tt_14:0 "Ми вийшли в нуль"
    DCS_tt_15:0 "Невеликий прибуток"
    DCS_tt_16:0 "Величезний успіх!"
    DCS_tt_17:0 "Механіст надішле роботів-союзників, щоб допомогти нам вершити правосуддя!"
    DCS_tt_18:0 "Сім'я створить армію нічних воїнів, щоб допомогти нам"
    DCS_tt_19:0 "Регулятори приєднаються до нашого ополчення!"
    DCS_tt_20:0 "Нові сили відданих послідовників Дейва візьмуться за зброю заради нашої справи"
    DCS_tt_21:0 "Найвідданіші прихильники Дейва захищатимуть його ціною власного життя"
    DCS_tt_22:0 "Армія втікачів-рабів приєднається до наших лав!"
    DCS_tt_23:0 "Дейв очолює повстання через вибори!"
    DCS_tt_24:0 "Ми підтримуємо Дейва в його боротьбі з корумпованими Поселеннями Столичної Пустки!"
    DCS_tt_25:0 "Хто знає, куди вона подасться далі?"
    DCS_tt_26:0 "Як ми дозволили їй втекти?"
    DCS_tt_27:0 "Президентська гвардія Дейва отримує нове спорядження"
    DCS_tt_28:0 "Деякі колишні лицарі приєднуються до боротьби за свій дім!"
    DCS_tt_29:0 "Тридог приєднується до наших зусиль у боротьбі за праву справу!"
    DCS_tt_30:0 "Доступно, тому що Лукас Сіммс є Головою"
    DCS_tt_31:0 "Доступно, тому що Дядько Ро є Головою"
    DCS_tt_32:0 "Доступно, тому що Тенпенні є Головою"
    DCS_tt_33:0 "Доступно, тому що Дейв є Президентом"
    DCS_tt_34:0 "§0Твоє бажання — закон для мене, о мудрий Мотіль§!"
    DCS_tt_35:0 "Подивіться на фокуси"
    DCS_tt_36:0 "Можливо, нам варто зробити щось раніше за них"
    DCS_tt_37:0 "Ми передамо територію Поселенням Столичної Пустки та отримаємо цінні ресурси, що містяться на цих пагорбах."
    DCS_tt_38:0 "Регулятори починають вербування в Північних Аппалачах"
    DCS_tt_39:0 "Додаткові солдати триматимуть непокірних колоністів у покорі"
    DCS_tt_40:0 "До Регуляторів приєднується новий член"
    DCS_tt_41:0 "З цього ми отримаємо нового радника"
    DCS_tt_42:0 "Корабель буде гордістю нашої нації!"
    DCS_tt_43:0 "Потрібно мати дублікати, про всяк випадок, якщо перший пошкодиться"
    DCS_tt_44:0 "Добровольці поспішать на допомогу Рибалкам Затоки"
    DCS_tt_45:0 "Добровольці поспішать на допомогу Дуврським Торговцям"
    DCS_tt_46:0 "Грін-Маунтін не контролює Північні Аппалачі"
    DCS_tt_47:0 "Після захоплення Храму Союзу Ганнібал Гемлін приєднається до нашої справи!"

