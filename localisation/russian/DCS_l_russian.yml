###Traits###
    DCS_delusions_of_grandeur_trait:0 "Манія величі"
    DCS_delusions_of_grandeur_trait_desc:0 "Дейв вважає себе найрозумнішою людиною в кімнаті, незалежно від того, в якій кімнаті він перебуває. Через це з ним надзвичайно важко працювати, і не дивно, що мало хто хоче навіть намагатися давати йому поради."
    DCS_reclusive_hedonist_trait:0 "Відлюдькуватий гедоніст"
    DCS_reclusive_hedonist_trait_desc:0 "Тенпенні рідко з'являється за межами свого люксу. Він не тверезіє роками і проводить більшу частину часу з повіями або стріляючи по випадкових істотах Пустки. Це, звісно, ускладнює виконання справ."
    DCS_uncle_of_a_nation_trait:0 "Дядечко нації"
    DCS_uncle_of_a_nation_trait_desc:0 "Дядько Ро заклав основу для заснування ПСП за допомогою простих торгових угод. У душі він завжди буде торговцем, і з ним біля керма ПСП займатимуться саме торгівлею."
    DCS_wasteland_lawman_trait:0 "Законник пустки"
    DCS_wasteland_lawman_trait_desc:0 "Лукас Сіммс виконує невдячну роботу, намагаючись забезпечити закон і порядок у беззаконній землі. Але якщо хтось і може впоратися з цим завданням, то це він."
    DCS_vault_leader_trait:0 "Лідер сховища"
    DCS_vault_leader_trait_desc:0 "Як лідерка Сховища, Амата знає, як обходитися з надзвичайно обмеженими ресурсами. Ці знання допоможуть і решті з нас."
    DCS_curious_mind_trait:0 "Допитливий розум"
    DCS_dangerous_mind_trait:0 "Небезпечний розум"
    DCS_man_behind_man_trait:0 "Людина за спиною"
    DCS_man_behind_man_trait_desc:0 "Усі, хто в курсі, знають, що містер Берк — справжній мозок Тенпенні. Ця хитра людина добре працює з тіні, і мало хто знає, що він насправді планує."
    DCS_self_important_trait:0 "Самовдоволений генерал"
    DCS_self_important_trait_desc:0 "Відомо, що Дейв суперечить наказам оточуючих і відправляє людей у безглузді атаки чи патрулі, тому що вважає, що знає краще. Це викликає безліч проблем. Чому ми дали цьому хлопцю цю роль довічно?"
    DCS_first_lady_trait:0 "Перша Леді"
    DCS_settlement_guard_trait:0 "Охоронець поселення"
    DCS_big_town_oldtimer_trait:0 "Старожил великого містечка"
    DCS_big_town_oldtimer_trait_desc:0 "Будучи одним із найстаріших у Великому Містечку, Паппі набув мудрості, що перевершує його вік. Він знає, як згуртувати громаду навіть у найтемніші часи."
    DCS_wasteland_doctor_trait:0 "Лікарка пустки"
    DCS_wasteland_doctor_trait_desc:0 "Ред лікує людей з тих пір, як навчилася тримати голку. Можливо, у неї немає формальної освіти, але в кого вона тут є?"
    DCS_nuka_fanatic_trait:0 "Фанатка Ядер-Коли"
    DCS_nocturnal_predator_trait:0 "Нічний хижак"
    DCS_iron_conviction_trait:0 "Залізна переконаність"
    DCS_iron_conviction_trait_desc:0 "Лукас Сіммс до кінця залишається вірним своїм принципам. Його не похитнути найгіршим представникам нашого суспільства."
    DCS_wavering_conviction_trait:0 "Хитка переконаність"
    DCS_wavering_conviction_trait_desc:0 "Сіммс колись виправдав рішення залишити монстра живим, незважаючи на його злочини. Хто знає, що він може дозволити завтра?"
    DCS_aging_songbird_trait:0 "Літня співоча пташка"
    DCS_retired_adventurer_trait:0 "Авантюрист на спочинку"
    DCS_former_minuteman_trait:0 "Колишній мінітмен"
    DCS_public_servitor_trait:0 "Державний службовець"
    DCS_altered_ai_trait:0 "Змінений ШІ"
    DCS_altered_ai_trait_desc:0 "M.A.R.Go.T. (Скорочення від Metro Authority Rapid Governmental Transit System) була знайдена в лабіринті Президентського метро солдатами після знищення Анклаву та відновлення їхніх довоєнних даних. Її функціональність було повністю відновлено, і, оскільки вона не є просунутим автономним інтелектом, незабаром стало можливим розширити сферу її діяльності від Президентського метро до інших, набагато корисніших цілей. Тепер, перебуваючи на постійному зв'язку з [DCS.Leader] через термінали, MARGoT консультує поселення як із цивільних, так і з військових питань і контролює автоматизовану безпеку ключових районів, таких як Вашингтон. Цей стародавній релікт цінний для всіх, але його конструкція, створена до появи ZAX, робить його відносно вразливим до спроб злому. \n \n§YАле я маю сказати, що краще, коли потяги та торговці водою прибувають вчасно!§!"
    DCS_daves_strongest_soldier_trait:0 "Найсильніший Солдат Дейва"
    DCS_mothman_trait:0 "Мудрий мотіль"
    DCS_dave_trait:0 "Людина, легенда, Дейв"

###Decisions###
    DCS_outcast_dealings_decision_category:0 "Торгівля з Вигнанцями"
    DCS_outcast_dealings_decision_category_desc:0 "Вигнанці Братства можуть і дивитися на нас, мешканців Пустки, зверхньо, але вони добре платять за будь-які знайдені нами технології. Продавати їм речі, які виходять за межі нашого розуміння, має бути вигідно для нас, правда?"
    DCS_super_mutants_decision_category:0 "Полювання на супермутантів"
    DCS_super_mutants_decision_category_desc:0 "Проблема супермутантів виходить з-під контролю. Ми не можемо просто ховатися за стінами і чекати, поки Братство її вирішить."
    DCS_special_projects_decision_category:0 "Спеціальні проєкти поселень Столичної Пустки"
    DCS_special_projects_decision_category_desc:0 "Завдяки нашому вибору фокусів ми можемо відкрити кілька спеціальних проєктів, які змінять нашу конфедерацію."
    DCS_sell_robots_decision:0 "Продати Ботів"
    DCS_sell_robots_decision_desc:0 "На фабриці RobCo було багато роботів, які могли б стати нам у пригоді, але ми також могли б продати їх Вигнанцям."
    DCS_sell_national_guard_loot_decision:0 "Продати здобич зі складу нацгвардії"
    DCS_sell_national_guard_loot_decision_desc:0 "Силова броня зі складу Національної гвардії нам мало корисної, оскільки ми не вміємо нею користуватися. Але Вигнанці добре за неї заплатять!"
    DCS_sell_enclave_pa_decision:0 "Продати силову броню Анклаву"
    DCS_sell_enclave_pa_decision_desc:0 "Наші солдати просто не навчені користуватися такою силовою бронею. Нам слід продати ці костюми Вигнанцям."
    DCS_sell_constantine_loot_decision:0 "Продати T-51b з Форту Константин"
    DCS_sell_constantine_loot_decision_desc:0 "T-51b у Форті Константин будуть особливо цікаві нашим торговим партнерам у Форті Індепенденс."
    DCS_sell_advanced_decision:0 "Продати складну електроніку"
    DCS_sell_advanced_decision_desc:0 "Складна електроніка, яку ми витягуємо з руїн, нам особливо не потрібна. Вона годиться лише для продажу тим, хто знає, що з нею робити."
    DCS_sell_circuitry_decision:0 "Продати електронні схеми"
    DCS_sell_circuitry_decision_desc:0 "Яка користь від електронних схем, коли половина наших поселенців живе без електрики? Просто продайте їх вигнанцям."
    DCS_sell_vertibirds_decision:0 "Продати гвинтокрили"
    DCS_sell_vertibirds_decision_desc:0 "Ці гвинтокрили, які ми захопили в Анклаву, класні, але ніхто з нас не вміє літати. Гадаю, Вигнанці заплатять за них багато."
    DCS_sell_vault_tec_pa_decision:0 "Продати Силову Броню Сховища-Тек"
    DCS_sell_vault_tec_pa_decision_desc:0 "Я, наприклад, ніколи раніше не бачив такої силової броні, Вигнанці можуть добре за неї заплатити."
    DCS_mutant_hunts:0 "Організувати полювання на мутантів"
    DCS_mutant_hunts_desc:0 "Ми зберемо команду загартованих мисливців на мутантів, щоб трохи зменшити чисельність супермутантів."
    DCS_find_mutant_home:0 "Пошуки джерела"
    DCS_find_mutant_home_desc:0 "Ці полювання ні до чого не призводять. Нам потрібно послати людей, щоб з'ясувати, де знаходяться мутанти, і зупинити їх біля джерела."
    DCS_invest_in_crow_decision:0 "Інвестувати в каравани Кроу"
    DCS_invest_in_crow_decision_desc:0 "Ми дамо Кроу трохи кришок, щоб він міг розширити свою діяльність. Сподіваюся, це окупиться."
    DCS_invest_in_hoff_decision:0 "Інвестувати в каравани Дока Хоффа"
    DCS_invest_in_hoff_decision_desc:0 "Ми дамо Доку Хоффу трохи кришок, щоб він міг розширити свою діяльність. Сподіваюся, це окупиться."
    DCS_invest_in_harrith_decision:0 "Інвестувати в каравани Щасливчика Гарріта"
    DCS_invest_in_harrith_decision_desc:0 "Ми дамо Щасливчику Гарріту трохи кришок, щоб він міг розширити свою діяльність. Сподіваюся, це окупиться."
    DCS_invest_in_wolfgang_decision:0 "Інвестувати в каравани Божевільного Вольфґанґа"
    DCS_invest_in_wolfgang_decision_desc:0 "Ми дамо Божевільному Вольфґанґу трохи кришок, щоб він міг розширити свою діяльність. Сподіваюся, це окупиться."
    DCS_research_molerats_decision:0 "Продовжити дослідження відлякувача кротощурів"
    DCS_research_molerats_decision_desc:0 "Хоча перша партія відлякувача кротощурів дала «вибухові» результати, у цьому є потенціал. Якщо ми продовжимо цю лінію досліджень, ми зможемо розробити м'якшу версію. Якщо кротощури перестануть намагатися нас з'їсти, ми навіть зможемо їх одомашнити!"
    DCS_research_mirelurks_decision:0 "Продовжити дослідження болотників"
    DCS_research_mirelurks_decision_desc:0 "Ми багато дізналися про болотників завдяки дослідженню для посібника з виживання. Враховуючи наші висновки та чутки про те, що люди далі на півночі їх приручають, є підстави вважати, що якщо ми продовжимо вивчати цих водних хижаків, колись ми зможемо їх розводити або навіть нацьковувати на рейдерів!"
    

###Ideas###

    dcs_loose_confederation_idea:0 "Вільна Конфедерація"
    dcs_loose_confederation_idea_desc:0 "Наша нація — це не стільки згуртована цілісність, скільки пухка конфедерація незалежних поселень. Іноді це ускладнює виконання справ, але поки що нам це підходило."
    dcs_scavenging_economy_idea:0 "Економіка, заснована на збиранні"
    dcs_scavenging_economy_idea_desc:0 "За століття після Великої війни масове виробництво так і не повернулося до Столичної Пустки. Наша економіка все ще значною мірою покладається на збирання решток у руїнах та використання всього, що тільки можна."
    dcs_fortress_settlements_idea:0 "Кожне поселення — фортеця"
    dcs_fortress_settlements_idea_desc:0 "Майже кожному поселенню на нашій території довелося розвинути потужну оборону, щоб стримувати небезпеки Пустки. Високі стіни, блокпости та сторожові вежі — всюди. Це значно полегшує захист від зовнішніх сил."
    DCS_megaton_beautification_idea:0 "Проєкт озеленення Мегатонни"
    DCS_megaton_beautification_idea_desc:0 "Робітників з усієї Столичної Пустки знімають з будівельних майданчиків і майстерень для роботи над проєктом озеленення Мегатонни. Для громадськості це амбітний проєкт з перетворення одного з найважливіших поселень Пустки. Для Тенпенні — це остання спроба впоратися з тією огидою, перш ніж знову вдатися до ядерного варіанту."
    DCS_megaton_revenge_idea:0 "Помста за Мегатонну"
    DCS_megaton_revenge_idea_desc:0 "Люди поселень Столичної Пустки об'єдналися в бажанні помститися виродкам, які підірвали Мегатонну. Хоча вони, ймовірно, вже розпорошилися по різних рейдерських бандах, ці виродки та подібні до них заплатять."
    DCS_ghoul_discrimination_idea:0 "Закони Тенпенні"
    DCS_ghoul_discrimination_idea_desc:0 "«Закони Тенпенні» — це термін, який використовують для опису серії анти-ґульських законів, що впроваджуються в Поселеннях Столичної Пустки. Приклади включають заборону ґулям їсти на очах в інших мешканців Пустки, заборону ґулям займатися медициною та заборону ґулям володіти зброєю. Це призвело до того, що багато гулів залишають Поселення Столичної Пустки, прямуючи до інших місць, але багато хто вважає, що це і було метою з самого початку."
    DCS_subsidizing_caravan_guards_idea:0 "Субсидування охорони караванів"
    DCS_subsidizing_caravan_guards_idea_desc:0 "Надаючи караванам субсидії на наймання охорони, каравани можуть наймати кращих фахівців і розширювати свій бізнес ефективніше."
    DCS_caravan_guard_drill_instructors_idea:0 "Інструктори з охорони караванів"
    DCS_caravan_guard_drill_instructors_idea_desc:0 "Мало хто знає, як вижити в пустці краще, ніж досвідчений охоронець каравану. Ці загартовані чоловіки та жінки передадуть свою мудрість нашому ополченню, щоб вони теж могли вижити в небезпечних патрулях, на які їм доведеться вирушати."
    DCS_springvale_boot_camp_idea:0 "Навчальний табір у Спрінгвейлі"
    DCS_springvale_boot_camp_idea_desc:0 "Члени нашого ополчення проходять навчання в таборі Спрінгвейл, де вони вивчають основи бою та виживання в пустці. Централізоване місце навчання призвело до підвищення ефективності та дозволило нам спрямувати деяких людей в інші місця."
    DCS_expanded_militia_idea:0 "Розширене ополчення"
    DCS_expanded_militia_idea_desc:0 "Раніше наше ополчення складалося з кількох охоронців поселень і старих із іржавими гвинтівками. Тепер це справжня бойова сила, готова впоратися майже з чим завгодно — головне, щоб солдати в силовій броні не почали падати з неба."
    DCS_settlement_defense_idea:0 "Підготовка охорони поселень"
    DCS_settlement_defense_idea_desc:0 "Наші охоронці поселень проходять спеціалізовану підготовку, щоб знати основні тактики захисту своїх поселень від зовнішніх атак."
    DCS_regulator_funding_idea:0 "Фінансування регуляторів"
    DCS_regulator_funding_idea_desc:0 "Регулятори отримають кошти для допомоги у виконанні їхньої місії. Чим більше поганців Пустки вони вб'ють, тим краще буде для решти з нас."
    DCS_regulator_training_law:0 "Навчання регуляторів"
    DCS_regulator_training_law_desc:0 "Регулятори, які стали занадто пораненими або старими, щоб вистежувати покидьків Пустки, тепер допомагають навчати наше ополчення. Їхній досвід ведення бою в пустці стає неоціненним."
    DCS_raider_fighting_experience_idea:0 "Досвід боротьби з рейдерами"
    DCS_raider_fighting_experience_idea_desc:0 "Одне з небагатьох речей, яких боїться рейдер у пустці — це вигляд Регулятора. Тепер вони боятимуться всього нашого ополчення, тому що Регулятори ведуть його в бій."
    DCS_dave_schools_idea:0 "Школи історії Дейва"
    DCS_dave_schools_idea_desc:0 "Молодь Столичної Пустки дізнається про найважливішу людину в усій пустці, якщо не в усьому світі. Вивчаючи історію Дейва, ці діти навчаться любити великі досягнення нашої нації та прагнути бути схожими на великого президента."
    DCS_grabbed_guns_idea:0 "Вилучені гвинтівки"
    DCS_grabbed_guns_idea_desc:0 "Деякі в наших поселеннях досі обурені, що ми забрали їхню зброю, але вони повинні зрозуміти: армія потребує її більше, чи не так?"
    DCS_long_arm_of_law_idea:0 "Довга рука закону"
    DCS_long_arm_of_law_idea_desc:0 "Правосуддя Дейва сягає найвіддаленіших куточків Столичної Пустки, а колись і далі. Злочинцям краще остерігатися."
    DCS_training_slaves_idea:0 "Навчання рабів"
    DCS_training_slaves_idea_desc:0 "Нам довелося відволікти частину наших інструкторів, щоб підготувати до бою втікачів-рабів Гемліна. Це може зашкодити нашому власному навчанню, але це задля доброї справи."
    DCS_enclave_war_recovery_idea:0 "Відновлення після Війни з Анклавом"
    DCS_enclave_war_recovery_idea_desc:0 "Війна з Анклавом виснажила наші ресурси, людські резерви і, на деякий час, надію. Але тепер, коли загрозу нарешті переможено остаточно, ми можемо відбудуватися і дивитися в майбутнє."
    DCS_enclave_war_idea:0 "Війна за виживання"
    DCS_enclave_war_idea_desc:0 "Ця війна з Анклавом — важка битва, яку ми можемо не виграти, але в нас немає іншого вибору, окрім як боротися. Якщо ми не боротимемося, ми втратимо все."
    DCS_outcast_advisors_idea:0 "Радники-Вигнанці"
    DCS_outcast_advisors_idea_desc:0 "В обмін на брухт та ресурси Вигнанці надіслали кількох людей, щоб допомогти нам з проєктами розвитку. Можливо, це небагато, але принаймні вони не стріляють у нас."
    DCS_organized_scavs_idea:0 "Організовані шукачі"
    DCS_organized_scavs_idea_desc:0 "Рада Поселень пропонує шукачам роботу зі збирання певних ресурсів, розвідки нових територій або просто перевірки чуток. Платня може бути не найкращою, але деякі з них віддають перевагу стабільному заробітку перед ризиком залишитися з порожніми руками і жити на радіоактивних тарганів місяць після невдалої вилазки."
    DCS_lyons_alliance_benefits_idea:0 "Переваги альянсу Лайонса"
    DCS_lyons_alliance_benefits_idea_desc:0 "Співпраця з Братством дає нашому народові більше, ніж просто допомогу, якщо щось на кшталт Анклаву колись повернеться. Відчуття безпеки, а також зростання торгівлі підняли настрій усім у Столичній Пустці."
    DCS_permanent_brotherhood_training_idea:0 "Постійне навчання від Братства"
    DCS_permanent_brotherhood_training_idea_desc:0 "Братство надіслало кількох старших лицарів для нагляду за нашими навчальними закладами. Хоча це не те саме, що численні інструктори, яких вони надсилали під час війни з Анклавом, це краще, ніж нічого."
    DCS_better_together_idea:0 "Разом краще"
    DCS_better_together_idea_desc:0 "Тісно співпрацюючи з Братством останні місяці, ми обидва зрозуміли, що разом ми — більше, ніж сума наших двох націй. Спільні знання, ресурси та людський потенціал дозволили обом нашим групам досягти висот, які раніше вважалися недосяжними."
    DCS_lessons_of_war_idea:0 "Уроки війни"
    DCS_lessons_of_war_idea_desc:0 "Важка війна з Анклавом багато чому навчила нас про те, що потрібно для перемоги у справжній війні. Ми будемо готові, якщо нам колись знову доведеться спрямувати зброю на таку велику загрозу, навіть на Братство, якщо воно зіб'ється зі шляху."
    DCS_standing_alone_idea:0 "Ми Стоїмо самі"
    DCS_standing_alone_idea_desc:0 "Багато хто думав, що ми не виживемо без Братства, але ми довели, що вони помилялися. Ми розвинули потужну армію, провели власні дослідження технологій Анклаву та зробили перші кроки в небо. Поселення Столичної Пустки показали себе справжньою силою в пустці, і це тільки початок."
    DCS_harrith_caravans_idea:0 "Каравани Гарріта"
    DCS_harrith_caravans_idea_desc:0 "Щасливчик Гарріт був першим, хто приєднався до торгового альянсу багато років тому. Престиж, який це принесло, допоміг йому розширити свій бізнес, що, в свою чергу, допомагає нам."
    DCS_crow_caravans_idea:0 "Каравани Кроу"
    DCS_crow_caravans_idea_desc:0 "Кроу був першим, хто приєднався до торгового альянсу багато років тому. Престиж, який це принесло, допоміг йому розширити свій бізнес, що, в свою чергу, допомагає нам."
    DCS_hoff_caravans_idea:0 "Каравани Дока Хоффа"
    DCS_hoff_caravans_idea_desc:0 "Док Хофф був першим, хто приєднався до торгового альянсу багато років тому. Престиж, який це принесло, допоміг йому розширити свій бізнес, що, в свою чергу, допомагає нам."
    DCS_wolfgang_caravans_idea:0 "Каравани Божевільного Вольфґанґа"
    DCS_wolfgang_caravans_idea_desc:0 "Божевільний Вольфґанґ був першим, хто приєднався до торгового альянсу багато років тому. Престиж, який це принесло, допоміг йому розширити свій бізнес, що, в свою чергу, допомагає нам."
    DCS_collective_defense_idea:0 "Колективна оборона"
    DCS_collective_defense_idea_desc:0 "Поселення Столичної Пустки були засновані з духом колективної оборони в основі. Цей ідеал сформував багато рішень і досі впливає на нас."
    DCS_trade_partnerships_idea:0 "Кооперація та торгівля"
    DCS_trade_partnerships_idea_desc:0 "Поселення Столичної Пустки були засновані з духом комерції та вільної торгівлі. Цей ідеал сформував багато рішень і досі впливає на нас."
    DCS_individual_freedom_idea:0 "Автономія поселень"
    DCS_individual_freedom_idea_desc:0 "Поселення Столичної Пустки були засновані з духом свободи та автономії поселень. Цей ідеал сформував багато рішень і досі впливає на нас."
    DCS_food_scavenging_idea:0 "Розділ 1: Здобування їжі"
    DCS_food_scavenging_idea_desc:0 "Завдяки мудрості, що міститься в «Посібнику з виживання в пустці», наші шукачі стали більш вправними в пошуку їжі, нишпорячи по довоєнних руїнах. Це збільшило запаси продовольства та зробило його доступнішим для всіх."
    DCS_studied_radiation_idea:0 "Розділ 1: Радіація"
    DCS_studied_radiation_idea_desc:0 "У «Посібнику з виживання в пустці» є цілі томи інформації про лікування радіаційного отруєння. Це буде неоціненним для звичайного мешканця Пустки, але особливо корисно для нашого ополчення, яке блукає пустками."
    DCS_minefield_experts_idea:0 "Розділ 1: Мінні поля"
    DCS_minefield_experts_idea_desc:0 "У «Посібнику з виживання в пустці» детально розповідається про навігацію довоєнними мінними полями, а також про те, як знешкоджувати міни та використовувати їх на свою користь. Нашим ворогам ця частина не сподобається."
    DCS_library_archives_idea:0 "Бібліотечні архіви"
    DCS_library_archives_idea_desc:0 "Ми володіємо частиною цифрового архіву Бібліотеки Конгресу. Якщо ми достатньо покопаємося, можливо, зможемо з'ясувати, як будувати будинки з чогось іншого, ніж металобрухт і лайно брамінів."
    DCS_roe_trade_empire_idea:0 "Столична торговельна імперія"
    DCS_roe_trade_empire_idea_desc:0 "Дядько Ро заснував Громаду Кентербері роки тому з метою перетворити його на торговельну потугу, здатну суперничати з Рівет-Сіті. Після років наполегливої праці він перетворив цілу ділянку Столичної Пустки на процвітаючий ринок, що перевершив його найсміливіші мрії."
    DCS_vault_101_trade_idea:0 "Торгівля зі Сховищем 101"
    DCS_vault_101_trade_idea_desc:0 "Хоча люди зі Сховища 101 не вийдуть жити серед нас, вони готові торгувати найнеобхіднішим. Це початок."
    DCS_pitt_losing_slaves_idea:0 "Втрата караванів з рабами"
    DCS_pitt_losing_slaves_idea_desc:0 "Поставки рабів зі Столичної Пустки сповільнюються через скоординовані зусилля Поселень Столичної Пустки. Якщо так триватиме, ми можемо зіткнутися з нестачею робочої сили."
    DCS_slave_sales_disrupted_idea:0 "Зірвана работоргівля"
    DCS_slave_sales_disrupted_idea_desc:0 "Поселенці в Поселеннях Столичної Пустки продовжують перехоплювати наші каравани з рабами на шляху до Парадайз-Фоллз. Це дуже б'є по наших прибутках."
    DCS_ant_studies_idea:0 "Дослідження мурах"
    DCS_ant_studies_idea_desc:0 "Доктор Леско вивчає мурах у Грейдічі, і нам доводиться відволікати людей від інших проєктів, щоб він не погіршив ситуацію."
    DCS_studying_mirelurks_idea:0 "Вивчення болотників"
    DCS_studying_mirelurks_idea_desc:0 "Ми відволікли небагатьох освічених людей на вивчення болотників. Кілька їхніх помічників гинуть під час роботи, але воно має того вартувати."
    DCS_studying_molerats_idea:0 "Вивчення кротощурів"
    DCS_studying_molerats_idea_desc:0 "Ми продовжуємо вивчати та намагатися одомашнити звичайного кротощура. Це може відволікати людей від інших завдань, але це важливо!"
    DCS_tenpenny_commune_idea:0 "Комуна Тенпенні"
    DCS_tenpenny_commune_idea_desc:0 "Ірвінг Ченг перетворив Тенпенні-Тауер на народну комуну. Це призвело до масового виїзду багатьох заможних мешканців вежі, але на їхнє місце до вежі стікається безліч інших невдах із Пустки, готових важкою працею обміняти на безпечне місце для проживання і, сподіваюся, їжу."
    DCS_ghoul_tower_idea:0 "Вежа Філліпса"
    DCS_ghoul_tower_idea_desc:0 "Рой Філліпс перетворив Тенпенні-Тауер з дому для заможної еліти Пустки на дім для гулів. Далеко від напівзруйнованих музеїв або тунелів метро, куди їх зазвичай заганяють, багато гулів навіть за межами Столичної Пустки вирушають у подорож до місця, де вони можуть жити добре."
    DCS_cure_research_idea:0 "Дослідження ліків від КТД"
    DCS_cure_research_idea_desc:0 "Це вимагатиме самовідданих зусиль деяких з найяскравіших умів, які має Столична Пустка, окрім Братства чи Рівет-Сіті, але з часом ми впевнені, що зможемо розробити ліки від КТД."
    DCS_central_law_idea:0 "Закони, Встановлені радою"
    DCS_central_law_idea_desc:0 "Рада лідерів поселень встановлюватиме закони для цієї землі. Нові поселення можуть чинити опір, але з часом вони приймуть зміни."
    DCS_settlement_law_idea:0 "Закони поселень"
    DCS_settlement_law_idea_desc:0 "Ми продовжимо дозволяти поселенням встановлювати закони в межах своїх кордонів. Окрім цього, Рада лідерів поселень встановлюватиме єдині закони. Конфлікти юрисдикцій щодо втікачів все ще виникатимуть, але їх можна буде вирішувати в індивідуальному порядку."
    DCS_harsh_law_idea:0 "Справедливість пустки"
    DCS_harsh_law_idea_desc:0 "Рада лідерів поселень встановлюватиме закони для цієї землі. Вищу справедливість будуть вершити Регулятори, виступаючи в ролі судді, присяжних і ката."
    DCS_caravan_law_idea:0 "Караванний закон"
    DCS_caravan_law_idea_desc:0 "Поселення продовжать самі визначати закони своїх поселень. За їхніми стінами ми спробуємо кодифікувати неписаний кодекс караванів. Це може зробити закон більш м'яким у пустці, але ми все одно не маємо можливості контролювати всю пустку."
    DCS_aristocratic_law_idea:0 "Аристократичний закон"
    DCS_aristocratic_law_idea_desc:0 "Аристократична еліта Пустки встановлюватиме наші закони. Хто краще за найуспішніших членів суспільства знає, як найкраще керувати суспільством?"
    DCS_dave_law_idea:0 "Закон Дейва"
    DCS_dave_law_idea_desc:0 "Якщо наш великий президент не кваліфікований встановлювати закони нашої землі, то хто тоді справді кваліфікований? Дейв забезпечить верховенство справедливості, якщо тільки справедливість не стане на заваді уряду."
    DCS_centralized_militia_idea:0 "Ополчення поселень"
    DCS_centralized_militia_idea_desc:0 "Поселення продовжать утримувати свої ополчення, а централізована організація буде закликати їх до зброї, коли це необхідно для захисту поселень у цілому. Стіни поселення залишаються останньою лінією оборони, але тепер є більший буфер."
    DCS_unified_army_idea:0 "Об'єднана армія"
    DCS_unified_army_idea_desc:0 "Поселення можуть утримувати ополчення для вирішення місцевих проблем. Однак основна частина наших збройних сил буде організована в централізовану армію під командуванням Ради поселень."
    DCS_regulator_militias_idea:0 "Командування регуляторів"
    DCS_regulator_militias_idea_desc:0 "Поселення можуть утримувати ополчення для вирішення місцевих проблем. Однак основна частина наших збройних сил буде організована в централізовану армію під командуванням досвідчених Регуляторів, які підпорядковуються Раді поселень."
    DCS_merc_army_idea:0 "Наймані допоміжні війська"
    DCS_merc_army_idea_desc:0 "Ополчення поселень складуть основу нашої армії. Найманці, найняті Радою поселень, заповнять прогалини, що залишилися від такого підходу."
    DCS_talon_remnants_idea:0 "Допоміжні війська з Компанії Кіготь"
    DCS_talon_remnants_idea_desc:0 "Ополчення поселень складуть основу нашої армії. Колишні найманці з Компанії Кіготь заповнять прогалини, що залишилися від такого підходу."
    DCS_daves_grand_army_idea:0 "Велика Армія Республіки"
    DCS_daves_grand_army_idea_desc:0 "Кожен здатний син Об'єднаних Поселень Дейва повинен буде зареєструватися для військового призову і служити, якщо його покличуть."
    DCS_waste_regulation_idea:0 "Рання індустріальна нація"
    DCS_waste_regulation_idea_desc:0 "Ми перебуваємо в процесі переходу від економіки, заснованої на збиранні, до індустріальної. Ми склали базовий перелік законів щодо промисловості, і нові розробляються в міру необхідності. На порушників накладаються штрафи, щоб забезпечити дотримання нових правил."
    DCS_harsh_waste_regulation_idea:0 "Суворо регульована рання індустріальна нація"
    DCS_harsh_waste_regulation_idea_desc:0 "Ми перебуваємо в процесі переходу від економіки, заснованої на збиранні, до індустріальної. Ми склали базовий перелік законів щодо промисловості, і нові розробляються в міру необхідності. Порушники стикаються з покараннями, починаючи від штрафів і закінчуючи стратою."
    DCS_industry_waste_regulation_idea:0 "Регульована промисловцями рання індустріальна нація"
    DCS_industry_waste_regulation_idea_desc:0 "Ми перебуваємо в процесі переходу від економіки, заснованої на збиранні, до індустріальної. Ми запросили лідерів промисловості скласти базовий перелік законів щодо промисловості, і нові розробляються в міру необхідності. Дехто стверджував би, що це все одно що дати лисці ключі від курника, але ми не згодні."
    DCS_no_waste_regulation_idea:0 "Нерегульована рання індустріальна нація"
    DCS_no_waste_regulation_idea_desc:0 "Ми перебуваємо в процесі переходу від економіки, заснованої на збиранні, до індустріальної. Ми відмовляємося накладати будь-які обмеження на економічний прогрес задля покращення економіки. Це призвело до зростання проблем із громадським здоров'ям, а також до кількох хімічних пожеж, але вони, здається, обмежуються менш заможними поселеннями."
    DCS_flexable_waste_regulation_idea:0 "Гнучко керована рання індустріальна нація"
    DCS_flexable_waste_regulation_idea_desc:0 "Ми перебуваємо в процесі переходу від економіки, заснованої на збиранні, до індустріальної. Президент склав список правил щодо скидання промислових відходів. Правило номер один вважається найважливішим: воно говорить, що президент Дейв може скасувати будь-яке правило для бізнесу, якщо в них є його лист-схвалення."
    DCS_appalachian_tech_exports_idea:0 "Експорт технологій Аппалачів"
    DCS_appalachian_tech_exports_idea_desc:0 "Згідно з нашою угодою з Братством, ми надсилаємо практично всі цінні технології або довоєнні передові матеріали, знайдені в Північних Аппалачах, Братству Лайонса для їхнього використання та вивчення."
    DCS_appalachian_tech_imports_idea:0 "Імпорт технологій Аппалачів"
    DCS_appalachian_tech_imports_idea_desc:0 "Згідно з нашою угодою з людьми зі Столичної Пустки, вони надсилають нам практично всі цінні технології або довоєнні передові матеріали, знайдені в Північних Аппалачах."
    DCS_guarding_water_caravans_idea:0 "Охорона водяних караванів"
    DCS_guarding_water_caravans_idea_desc:0 "Деякі з нашого ополчення приписані до допомоги водяним караванам із Проєкту «Чистота». Втрата робочої сили з лишком компенсується вигодами для наших поселень."
    DCS_funding_purifier_idea:0 "Фінансування проєкту «Чистота»"
    DCS_funding_purifier_idea_desc:0 "Ми виділили значну частину нашого бюджету на забезпечення безперебійної роботи Проєкту «Чистота»."
    DCS_regulators_guarding_water_caravans_idea:0 "Регулятори захищають каравани"
    DCS_regulators_guarding_water_caravans_idea_desc:0 "Пішли чутки, що каральні загони Регуляторів вистежують усіх, хто наважиться напасти на караван Проєкту «Чистота». Ми вже спостерігаємо значне зниження кількості нападів!"
    DCS_guiding_water_caravans_idea:0 "Супровід водяних караванів"
    DCS_guiding_water_caravans_idea_desc:0 "Ми наймаємо досвідчених охоронців караванів, щоб забезпечити безпечне та швидке прибуття караванів Проєкту «Чистота» до місця призначення."
    DCS_tenpenny_assisting_purifier_idea:0 "Берк допомагає проєкту «Чистота»"
    DCS_tenpenny_assisting_purifier_idea_desc:0 "Містер Берк домовився з деякими своїми старими контактами про допомогу Проєкту «Чистота». Усі знають, що ці люди — просто найманці з Компанії Кіготь, але ніхто не хоче нічого говорити."
    DCS_water_rationing_idea:0 "Нормування води"
    DCS_water_rationing_idea_desc:0 "Дейв запровадив суворі правила нормування води з винятками для Столиці."
    DCS_regulator_citadel_idea:0 "Цитадель регуляторів"
    DCS_regulator_citadel_idea_desc:0 "Колись дім Братства Сталі Лайонса, а до того — серце довоєнної американської армії, Цитадель тепер є новою штаб-квартирою Регуляторів Східноузбережної Республіки. Цей центральний оперативний центр і навчальний поліг став величезним благом для наших військових, які прагнуть навести лад у Столичній Пустці та за її межами."
    DCS_citadel_trading_post_idea:0 "Торговий пост у Цитаделі"
    DCS_citadel_trading_post_idea_desc:0 "Колись військова база, а тепер серце торгівлі в Столичній Пустці. Торговий пост Цитаделі — це місце, куди варто йти за найкращими пропозиціями спорядження, припасів або свіжого брухту з руїн Вашингтона. Завдяки близькості до портів, це також зручна зупинка для торговців уздовж узбережжя!"
    DCS_colonial_subject_idea:0 "Колоніальний суб'єкт"
    DCS_colonial_subject_idea_desc:0 "Наша нація — не більше ніж колоніальний суб'єкт Східноузбережної Республіки. Ми відправляємо наші ресурси, людей і плоди нашої промисловості до Столичної Пустки в обмін на що? Тенпенні вважає себе королем цих земель, і кожного, хто наважиться озвучити це, забирає начальник колонії Ґуставо."
    DCS_colonial_subject_2_idea:0 "Колоніальний суб'єкт"
    DCS_colonial_subject_2_idea_desc:0 "Наша нація — не більше ніж колоніальний суб'єкт Східноузбережної Республіки. Ми відправляємо наші ресурси, людей і плоди нашої промисловості до Столичної Пустки в обмін на що? Тенпенні вважає себе королем цих земель, і кожного, хто наважиться озвучити це, забирає начальник колонії Ґуставо."
    DCS_capitals_brightest_idea:0 "Найкращі та найяскравіші уми столиці"
    DCS_capitals_brightest_idea_desc:0 "Наукова команда Рівет-Сіті співпрацює з нашими вченими."
    DCS_synergenic_cooperation:0 "Синергетична співпраця"
    DCS_synergenic_cooperation_desc:0 "Співпраця з нашими братами над Проєктом «Чистота» принесла користь усім учасникам. Наш альянс справді більший за суму його частин."
    DCS_naval_trade_springboard_idea:0 "Морський трамплін"
    DCS_naval_trade_springboard_idea_desc:0 "Завдяки портам і морському досвіду Поселень Делмарви ми можемо розширити радіус дії наших караванів далеко за межі того, що більшість торговців вважали можливим."
    DCS_fresh_citrus_idea:0 "Свіжі цитруси"
    DCS_fresh_citrus_idea_desc:0 "Завдяки торгівлі з більш тропічними узбережжями ми отримуємо доступ до фруктів, які більшість мешканців Пустки вважали просто смаками Ментату. Відколи ми почали імпортувати апельсини, випадки цинги в Столичній Пустці знизилися на 49%!"
    DCS_appalachian_trade:0 "Аппалачська торгівля"
    DCS_appalachian_trade_desc:0 "Торгівля між Столичною Пусткою та Північними Аппалачами виявилася благом для якості життя в обох регіонах."

###Leaders###

    DCS_lucas_simms_name:0 "Лукас Сіммс"
    DCS_lucas_simms_desc:0 "Виростаючи в Мегатонні, Лукас Сіммс змалку засвоїв, що потрібно для виживання в пустці. Досягнувши дорослого віку, він швидко призначив себе шерифом Мегатонни, готовим зробити все необхідне, щоб допомогти місту вижити й процвітати. Хоч і є загрозливою фігурою, Сіммс своїм дружнім характером завойовує прихильність людей, яких захищає."
    DCS_roe_name:0 "Дядько Ро"
    DCS_uncle_roe_desc:0 "Ернест «Дядько» Ро — природжений торговець, який заснував поселення Громаду Кентербері у віці 20 років на кришки, зароблені ним як торговцем. Відтоді він перетворив невеликий торговий пост на важливу зупинку на караванному маршруті Столичної Пустки. Багато хто вважає його засновником Поселень Столичної Пустки через його роль в об'єднанні поселень для протистояння загрозі рейдерів у Руїнах Бетесди."
    DCS_tenpenny_name:0 "Алістер Тенпенні"
    DCS_tenpenny_desc:0 "Алістер Тенпенні вирушив із руїн Великої Британії в молоді роки, щоб знайти свою долю в Столичній Пустці. Можна з упевненістю сказати, що він її знайшов. Він володіє одним із найбажаніших об'єктів нерухомості в Столичній Пустці і проводить більшість своїх днів, напиваючись, розважаючись і стріляючи в усе, що заманеться, зі свого сідала на вершині Тенпенні-Тауера. Хоча ніхто не скаже цього вголос, дехто задається питанням, чи не є його права рука, містер Берк, справжнім мозком усіх починань Тенпенні."
    DCS_dave_name:0 "Дейв"
    DCS_dave_desc:0 "Дейв провів свою юність як найманець у Столичній Пустці, перш ніж повернутися додому до свого деспотичного батька, в «королівство Тома». Як і будь-який справжній патріотичний американець, Дейв ненавидів монархію і скинув свого батька, заснувавши Республіку Дейва. З тих пір він успішно керує демократією, що є рідкістю в пустці. Тепер він очолює набагато більшу демократію. Чи зможуть ідеали свободи та демократії Дейва масштабуватися?"
    DCS_council_name:0 "Рада Поселень Столичної Пустки"
    DCS_settlement_council_desc:0 "Рада Поселень Столичної Пустки складається з лідерів різних поселень у Столичній Пустці. Хоча вони провели лише одну офіційну зустріч — для заснування Поселень Столичної Пустки після успішної спільної атаки на оплот рейдерів кілька років тому — подальший успіх поселень змушує їх зустрітися знову, щоб обговорити поточні питання, а також можливість призначення Голови, який би керував конфедерацією."
    DCS_hamlin_name:0 "Ганнібал Гемлін"
    DCS_AMATA_NAME:0 "Амата Альмодовар"
    DCS_BROWN_NAME:0 "Мойра Браун"
    DCS_LESKO_NAME:0 "Доктор Леско"
    DCS_BURKE_NAME:0 "Містер Берк"
    DCS_DAVE_NAME:0 "Дейв"
    DCS_JESSICA_NAME:0 "Перша Леді Джессіка"
    DCS_KING_NAME:0 "Ів Кінг"
    DCS_PAPPY_NAME:0 "Паппі"
    DCS_RED_NAME:0 "Ред"
    DCS_SIERRA_NAME:0 "Сьєрра Петровіта"
    DCS_VANCE_NAME:0 "Венс"
    DCS_dashwood_minister_name:0 "Герберт Дерінг Дешвуд"
    DCS_agatha_minister_name:0 "Агата"
    DCS_brunswick_minister_name:0 "Колін Брансвік"
    DCS_MARGOT_minister_name:0 "§YM.A.R.Go.T.§!"
    DCS_MOTHMAN_NAME:0 "Мудрий Мотіль"
    DCS_MOTHMAN_DESC:0 "Хоча Дейв досі офіційно є Президентом Республіки, його розум захопив Мотіль. Під покровом ночі істоту перемістили до Столичної Пустки, і тепер вона спрямовує курс Республіки. Стривайте... то ось чому Дейв постійно просить поставки лампочок?"
    DCS_REECE_NAME:0 "Ріс Робертс"
    DCS_REECE_DESC:0 "Ріс Робертс — трохи божевільний. Він з'явився майже з нізвідки і взявся за боротьбу за Об'єднані Поселення Дейва так, як ніхто інший. Дехто каже, що з Рісом поруч Дейв міг би завоювати всю територію довоєнних Сполучених Штатів."

###National Focuses###
DCS_nf_a001:0 "Торговельна імперія"
DCS_nf_a001_desc:0 "Роки тому Дядько Ро почав переконувати великі каравани Столичної Пустки працювати разом, що зрештою принесло користь усім учасникам. Він не знав, що це стане першою іскрою, яка призведе до об'єднання Поселень Столичної Пустки."
DCS_nf_a002:0 "Руїни Бетесди"
DCS_nf_a002_desc:0 "Співпраця між торговцями йшла добре, поки рейдери не зайняли старі руїни Бетесди. Каравани зазнавали збитків, а найняті найманці виявилися неефективними. Торговцям знадобилася допомога."
DCS_nf_a003:0 "Перша рада"
DCS_nf_a003_desc:0 "Після успішних спільних зусиль поселень із вигнання рейдерів із руїн Бетесди, кілька лідерів поселень зібралися разом, щоб обговорити подальшу співпрацю. Слова, сказані тут, заклали фундамент для всього, що представляли собою Поселення Столичної Пустки."
DCS_nf_a004:0 "Друга рада"
DCS_nf_a004_desc:0 "Незважаючи на щоденні проблеми життя в Столичній Пустці, останні кілька років були відносно прихильними до Поселень Столичної Пустки. Рейдери відступили на південь і далеку північ, Братство бореться з мутантами, а торгівля процвітає. Було організовано ще одну зустріч голів поселень для обговорення кроків до подальшого об'єднання."
DCS_nf_a005:0 "Великі проблеми у Великому Містечку"
DCS_nf_a005_desc:0 "Поселення Великого Містечка постійно зазнає нападів рейдерів та супермутантів. Вони благають інші поселення про будь-яку допомогу."
DCS_nf_a006:0 "Дайте відсіч!"
DCS_nf_a006_desc:0 "Якщо ми дозволимо мутантам і рейдерам спустошити одне поселення, не минує й часу, як вони прийдуть по інше. Ми підтримаємо Велике Містечко і дамо відсіч цим загрозам!"
DCS_nf_a007:0 "Прийняти жителів Великого Містечка"
DCS_nf_a007_desc:0 "Велике Містечко не має реальної ресурсної цінності і знаходиться в важкодоступному для оборони місці. Нам слід евакуювати всіх, хто там живе, і прийняти їх в інших поселеннях."
DCS_nf_a008:0 "Битва за Джермантаун"
DCS_nf_a008_desc:0 "Ми відстежили мутантів, які постійно атакують Велике Містечко, до якогось оплоту мутантів у старій поліцейській дільниці Джермантауна. Якщо ми хочемо втримати це поселення, нам потрібно зачистити тих мутантів."
DCS_nf_a009:0 "Великі зміни"
DCS_nf_a009_desc:0 "У Великому Містечку може не бути гарного ґрунту чи цінного брухту, але воно має потенціал стати надійним промисловим поселенням за наявності відповідного обладнання та припасів."
DCS_nf_a010:0 "Дорослішання"
DCS_nf_a010_desc:0 "Незважаючи на те, що жителі Великого Містечка вже дорослі, вони все ще трималися за багато звичок з Літл-Лемплайт. Щоб інтегрувати їх у життя інших поселень, знадобляться певні зусилля."
DCS_nf_a011:0 "Невеликий збір"
DCS_nf_a011_desc:0 "У Великому Містечку, можливо, не було багато ресурсів, але якщо там більше ніхто не живе, ми можемо розібрати будівлі та забрати все, що залишилося."
DCS_nf_a012:0 "Надлюдський ґамбіт"
DCS_nf_a012_desc:0 "Громада Кентербері зазнала нападу божевільної жінки, яка керує армією мурах. Якби цього було недостатньо, місцевий механік, здається, теж збожеволів і тепер вважає себе супергероєм на ім'я «Механіст». Їхні бійки зазвичай не завдають великої шкоди, але це лише питання часу, коли ситуація загостриться."
DCS_nf_a013:0 "Допомогти герою"
DCS_nf_a013_desc:0 "Механіст, можливо, і заплутався, але в глибині душі він має добрі наміри. Ми повинні допомогти йому нарешті перемогти свого ворога."
DCS_nf_a014:0 "Данина королеві"
DCS_nf_a014_desc:0 "Армія роботів Механіста є потенційною небезпекою, набагато більшою, ніж кілька жуків. Ми повинні запропонувати його Антагонізерці в обмін на її відхід."
DCS_nf_a015:0 "Геройська подяка"
DCS_nf_a015_desc:0 "Механіст вдячний нам за допомогу в перемозі над Антагонізеркою. Через зменшення загрози мурах і як знак подяки, він дав нам кілька металевих помічників, щоб «зупиняти злодіїв»."
DCS_nf_a016:0 "Лігво героя"
DCS_nf_a016_desc:0 "Лігво Механіста, як він це називає, насправді є старим центром з ремонту роботів. Ми можемо відновити деяке обладнання і використовувати це місце для ремонту більшої кількості речей, ніж просто його роботи-союзники."
DCS_nf_a017:0 "Розграбування лігва"
DCS_nf_a017_desc:0 "Після зникнення Механіста його старе сховище стоїть порожнє і готове для нас, щоб використати брухт, який там є."
DCS_nf_a018:0 "Центр збирання"
DCS_nf_a018_desc:0 "У ремонтному центрі було набагато більше, ніж просто кілька коробок брухту та трохи іржавих роботів. Знадобляться роки, щоб перебрати цей брухт, і ми використаємо кожен шматок."
DCS_nf_a019:0 "Сімейні негаразди"
DCS_nf_a019_desc:0 "Арефу повідомляє про зростаючі проблеми з групою, яка називає себе «Сім'я». Якщо ми не втрутимося, незабаром від Арефу може нічого не залишитися."
DCS_nf_a020:0 "Прибрати сміття"
DCS_nf_a020_desc:0 "Сім'я — це не що інше, як кровожерливі виродки, яких потрібно знищити. Ми розпочнемо штурм їхнього сховища."
DCS_nf_a021:0 "Угоди в темряві"
DCS_nf_a021_desc:0 "Сім'я може бути дивною, і деяким не подобаються їхні методи, але вони все ще нормальні люди. Завдяки чесним переговорам ми можемо владнати справи між Сім'єю та Арефу."
DCS_nf_a022:0 "Експансія до Мересті"
DCS_nf_a022_desc:0 "Сім'ю знищено, але жителі Арефу досі повідомляють, що бачать дивні постаті, які блукають навколо станції Північно-Західна Сенека вночі."
DCS_nf_a023:0 "Нове підземелля"
DCS_nf_a023_desc:0 "Тунелі метро біля Арефу мають багато позитивних сторін, якщо не зважати на відсутність сонячного світла, вогкість і печеру з болотниками неподалік. Ми можемо облаштувати це місце як гарний дім для гулів, які не змогли пробитися через Вашингтон, але й не потребують життя в наших поселеннях."
DCS_nf_a024:0 "Святилище Мересті"
DCS_nf_a024_desc:0 "Відколи ми почали справу з Сім'єю, більше людей, схожих на них, стікаються до станції метро Мересті в пошуках собі подібних. Це місце перетворилося на справжній оплот ізгоїв і диваків Столичної Пустки."
DCS_nf_a025:0 "Спрямування кровожерливості"
DCS_nf_a025_desc:0 "У Сім'ї є кілька здібних бійців, які рвуться в бій і прагнуть залити поле бою кров'ю. Краще вони спрямують цю енергію та бажання на рейдерів, ніж на нас."
DCS_nf_a026:0 "Вибори"
DCS_nf_a026_desc:0 "Голоси в поселеннях по всій Пустці підраховуються, і, схоже, невдовзі буде визначено нашого першого Голову Ради Поселень Столичної Пустки, але що відбувається з Дейвом?"
DCS_nf_b001:0 "Нотка класу"
DCS_nf_b001_desc:0 "Люди Столичної Пустки мудро обрали одного з найуспішніших серед них своїм новим лідером. Цілком природньо, що вони бачать, яких висот досяг Тенпенні, і сподіваються, що він витягне решту з багна."
DCS_nf_b002:0 "Зміна планів?"
DCS_nf_b002_desc:0 "З огляду на те, що Тенпенні став новим лідером Поселень Столичної Пустки, підрив одного з найбільших міст у цьому районі, мабуть, не найкраща ідея."
DCS_nf_b003:0 "Скасувати це!"
DCS_nf_b003_desc:0 "Тенпенні просто помер би від сорому, якби Мегатонну підірвали під час його керівництва. Ні, потрібно буде знайти інше рішення для впорядкування того ландшафту."
DCS_nf_b004:0 "Діяти згідно з планом"
DCS_nf_b004_desc:0 "Те огидне місце все одно має зникнути. Згодом люди заспокояться, якщо звинуватити правильні сторони."
DCS_nf_b005:0 "Озеленення Мегатонни"
DCS_nf_b005_desc:0 "Якщо ми не можемо підірвати Мегатонну, ми можемо зробити її менш огидною, чи не так?"
DCS_nf_b006:0 "МегаТен"
DCS_nf_b006_desc:0 "Це зайняло деякий час і значну кількість ресурсів, але Мегатонна нарешті стала поселенням, яке Тенпенні може з радістю бачити на горизонті. Безсумнівно, мешканці Пустки також оцінять зусилля з реконструкції Мегатонни в нещодавно перейменований МегаТен."
DCS_nf_b007:0 "Брязкання зброєю"
DCS_nf_b007_desc:0 "Звинувачення рейдерів у Катастрофі Мегатонни перетворило потенційний кошмар на благодатний ґрунт для вербування. Мешканці Пустки по всій нашій території шикуються в чергу, щоб взяти гвинтівку і помститися рейдерам, які «вбили» їхніх друзів і близьких."
DCS_nf_b008:0 "Меморіал Мегатонни"
DCS_nf_b008_desc:0 "Тенпенні щедро пожертвував кришки з власної кишені на будівництво меморіалу для загиблих під час вибуху Мегатонни. Який чудовий хлопець."
DCS_nf_b009:0 "Гулі у Вежі?"
DCS_nf_b009_desc:0 "Зомбі на ім'я Рой Філліпс та інші ґулі тижнями благають впустити їх до Вежі Тенпенні. Потрібно щось робити."
DCS_nf_b010:0 "Зомбі заборонені"
DCS_nf_b010_desc:0 "Ці ґулі страждають від болісного життя і будь-якої миті можуть здичавіти. Позбавити їх від страждань — це милосердя до них і захист для нас."
DCS_nf_b011:0 "Закони для гулів"
DCS_nf_b011_desc:0 "Ґулям доведеться змиритися з тим, що більшій частині Столичної Пустки вони не подобаються. Вони смердять, вони становлять небезпеку здичавіння, і на них не дуже приємно дивитися. Якщо вони хочуть залишатися в наших містечках, їм доведеться дотримуватися деяких нових правил."
DCS_nf_b012:0 "Форт Константин"
DCS_nf_b012_desc:0 "Нещодавня сутичка з Анклавом нагадала Тенпенні, що в нього десь заховані копії старих ключів від розташованого неподалік форту. Відправити туди когось на розвідку може бути варто."
DCS_nf_b013:0 "Скарби Константина"
DCS_nf_b013_desc:0 "У Форте Константин був значний запас зброї та броні, якому міг би позаздрити навіть Братство. Сподіваймося, що не надто сильно."
DCS_nf_b014:0 "Реновація Вежі"
DCS_nf_b014_desc:0 "Вежа Тенпенні завжди підтримувала найсуворіші стандарти якості та класу. Тим не менш, трохи податкових грошей могло б допомогти зробити ідеальний дім ще кращим."
DCS_nf_b015:0 "Столична еліта"
DCS_nf_b015_desc:0 "Вежа Тенпенні завжди приваблювала найпрестижніших і найбагатших мешканців з усієї Столичної Пустки. Але новини про нещодавні реновації викликають ще більший ажіотаж, ніж будь-коли."
DCS_nf_b016:0 "Попит і пропозиція"
DCS_nf_b016_desc:0 "Зі зростанням попиту на житло у Вежі Тенпенні, керівництво має можливість підвищити ціни відповідно до попиту."
DCS_nf_b017:0 "Тенпенні-Сіті"
DCS_nf_b017_desc:0 "Ті, хто не можуть потрапити до Вежі Тенпенні, все одно хочуть жити біля вежі. Такими темпами у нас на руках буде ціле містечко з халуп. Натомість ми перенаправимо ресурси, щоб принаймні мати гарне містечко навколо нашої прекрасної вежі. Інакше ми можемо побачити падіння цін на оренду."
DCS_nf_b018:0 "Дядечко нашої нації"
DCS_nf_b018_desc:0 "Дядько Ро був одним із головних голосів за об'єднання наших поселень. Було цілком логічно, що саме його обрали вести нас до світлого майбутнього."
DCS_nf_b019:0 "Посібник з виживання в пустці"
DCS_nf_b019_desc:0 "Мойра Браун із Мегатонни намагається написати книгу про виживання в Пустці і оголосила, що шукає помічників для проведення необхідних польових досліджень."
DCS_nf_b020:0 "Розділ перший"
DCS_nf_b020_desc:0 "Перший розділ книги розповідає про здобування їжі, боротьбу з радіацією та перетин мінного поля. Усі ці речі важливо знати мешканцю Пустки."
DCS_nf_b021:0 "Розділ другий"
DCS_nf_b021_desc:0 "Другий розділ книги здебільшого розповідає про загрози Пустки. Боротьба з кротощурами, болотниками та просто загальні тілесні ушкодження — усе це важливо розуміти нашим людям."
DCS_nf_b022:0 "Розділ третій"
DCS_nf_b022_desc:0 "Останній розділ посібника більше розповідає про те, чого мешканці Пустки можуть навчитися з минулого. Вивчення успіху Рівет-Сіті, перепрофілювання старих роботів і пошук втраченої мудрості."
DCS_nf_b023:0 "Покращення караванних шляхів"
DCS_nf_b023_desc:0 "Караванні стежки утворилися за роки в результаті багаторазового використання та слідування шляхом найменшого опору. Цей не зовсім ідеальний спосіб подорожі можна було б покращити, доклавши трохи зусиль."
DCS_nf_b024:0 "Відновлення Кентербері"
DCS_nf_b024_desc:0 "Хоча Громада Кентербері не постраждала від бомб, він занепав за останні два століття. Нам потрібно буде дещо полагодити, якщо це має бути нашою столицею."
DCS_nf_b025:0 "Спрінгвейлський базар"
DCS_nf_b025_desc:0 "Початкова школа Спрінгвейл має стратегічне розташування просто неба одним із найцентральніших поселень Столиці. До того, як там оселилися рейдери, торговці іноді зупинялися там на нічліг. Дядько Ро бачить можливість повернути будівлю і перетворити її на торговий центр."
DCS_nf_b026:0 "Інвестувати в каравани"
DCS_nf_b026_desc:0 "Дядько Ро не забув про різні каравани, які відіграли важливу роль у заснуванні Поселень Столичної Пустки. Тепер, коли Ро при владі, це партнерство може зростати."
DCS_nf_b027:0 "Торгівля на затоці"
DCS_nf_b027_desc:0 "У Дядька Ро є стосунки з керівництвом Дуврських Торговців, налагоджені роками співпраці та торгівлі. Це можна використати, щоб отримати унікальні пропозиції."
DCS_nf_b028:0 "Торговельна столиця"
DCS_nf_b028_desc:0 "Наші недавні кроки вже окупаються з точки зору залучення більшої торгівлі до Столичної Пустки. З деякими іншими змінами хтозна, що може статися?"
DCS_nf_b029:0 "Стандартизувати караванне спорядження"
DCS_nf_b029_desc:0 "Каравани здебільшого обходилися тим, що могли знайти або купити. Дядько Ро хоче, щоб ми виробляли стандартизоване караванне спорядження і вже звузив вибір до кількох варіантів. Тепер нам просто потрібно зробити вибір."
DCS_nf_b030:0 "Пісня Агати"
DCS_nf_b030_desc:0 "Агата — літня вдова, яка живе в пустці, складаючи компанію та граючи музику торговцям, що проходять повз, в обмін на товари. Дядько Ро хоче зустрітися з нею, почувши стільки історій."
dcs_unlocks_agatha_advisor_tt:0 "Це відкриє §YАгату§! як радника"
DCS_nf_b031:0 "Субсидувати охорону караванів"
DCS_nf_b031_desc:0 "Охоронці караванів є важливими для нашої економіки, і багато з них стають хорошими розвідниками або солдатами, коли настає час. Ми могли б відкласти частину податків, щоб допомогти караванам залучати кращі кадри."
DCS_nf_b032:0 "Інструктори з охорони караванів"
DCS_nf_b032_desc:0 "Якщо хтось і знає про життя в пустці та як обходитися тим, що маєш за плечима, то це охоронець каравану. Ветеранів охорони, занадто старих або травмованих, щоб здійснювати багато поїздок, наймуть для навчання наших ополченців."
DCS_nf_b033:0 "Шериф пустки"
DCS_nf_b033_desc:0 "Лукас Сіммс був очевидним вибором на лідера Поселень Столичної Пустки. Він роками очолював одне з найбільших містечок у Столичній Пустці та захищав його від незліченних атак рейдерів. Тепер він принесе таку безпеку та правосуддя на кордоні в решту пустки."
DCS_nf_b034:0 "Укріпити Мегатонну"
DCS_nf_b034_desc:0 "Як столиця Поселень Столичної Пустки, Мегатонна обов'язково приверне більше уваги рейдерів та наших ворогів. Стіни потрібно буде розширити та полагодити, щоб вони витримали ці зростаючі загрози."
DCS_nf_b035:0 "Ремонт водопровідної системи"
DCS_nf_b035_desc:0 "Очисники води завжди були в поганому стані, але зі збільшенням населення ми більше не можемо відкладати це питання. Потрібно провести серйозний ремонт."
DCS_nf_b036:0 "Спрінгвейлські поселення"
DCS_nf_b036_desc:0 "Покращення в Мегатонні та посилення патрулювання в цьому районі роблять безпечнішими й віддалені регіони. Люди стікаються до Спрінгвейлу, щоб побудувати нове життя."
DCS_nf_b037:0 "Навчальний табір у Спрінгвейлі"
DCS_nf_b037_desc:0 "Початкову школу Спрінгвейл вже деякий час зачищено від рейдерів і мурах. Сіммс хоче перетворити це місце на казарми та навчальний центр для нашого ополчення."
DCS_nf_b038:0 "Розширення ополчення"
DCS_nf_b038_desc:0 "Рейдерів, можливо, відбили наразі, але вони завжди повертаються. Нам знадобиться більше людей, щоб бути готовими."
DCS_nf_b039:0 "Підготовка охорони поселень"
DCS_nf_b039_desc:0 "Багато охоронців поселень мають невелику підготовку, окрім стрільби по бляшанках. Досвідчених охоронців відправлять у подорож, щоб навчити нових охоронців і переконатися, що вони готові відбити більше, ніж пару кротощурів."
DCS_nf_b040:0 "Форпост на звалищі"
DCS_nf_b040_desc:0 "Величезне звалище лежить за межами Вашингтона і може бути хорошим джерелом брухту. Нам просто потрібно буде створити постійний форпост, щоб там не оселилися рейдери."
DCS_nf_b041:0 "Сусіди-Регулятори"
DCS_nf_b041_desc:0 "У Регуляторів є основна база неподалік від звалища. Хоча минуло вже багато часу відколи Лукас Сіммс був членом їхньої групи, вони все ще мають зв'язки, і лідер цієї групи хоче зустрітися."
DCS_nf_b042:0 "Фінансування Регуляторів"
DCS_nf_b042_desc:0 "Регулятори блукають пусткою, вершачи правосуддя там, куди не можуть дістатися охоронці поселень. Виділення частини ресурсів, щоб допомогти їм у цій боротьбі, добре для всіх."
DCS_nf_b043:0 "Навчання Регуляторів"
DCS_nf_b043_desc:0 "Регулятори рідко доживають до пенсії, але таке трапляється. Тих, хто занадто старий або травмований, щоб продовжувати свої обов'язки, запросять навчати наше ополчення веденню бою в пустці та виживанню."
DCS_nf_b044:0 "Інтеграція Регуляторів"
DCS_nf_b044_desc:0 "Спочатку Регулятори з побоюванням ставилися до Поселень Столичної Пустки, але наші нещодавні дії та підтримка зігріли їх до нас. Група погодилася офіційно інтегруватися в наше ополчення за умови, що вони зможуть продовжувати свою місію зі звільнення пустки від злих людей."
DCS_nf_b045:0 "Знешкодити бомбу"
DCS_nf_b045_desc:0 "Просити допомоги в будь-якого випадкового чоловіка, який забрів у Мегатонну, не вихід. Тепер ми поширюємо по всій пустці повідомлення, що нам потрібен хтось, хто вже знешкодить цю кляту штуку!"
DCS_nf_b046:0 "Чутки про диверсію"
DCS_nf_b046_desc:0 "Ви знайшли ЩО прикріпленим до бомби?"
DCS_nf_b047:0 "Зрада Тенпенні"
DCS_nf_b047_desc:0 "Диверсанта спіймали на спробі втрутитися в роботу бомби в Мегатонні. Після тривалого допиту з'ясувалося, що за планом знищити місто стояв Алістер Тенпенні. Ополчення збирають, щоб доставити його, але охоронці вежі на його особистій платні. Він не піде тихо."
DCS_nf_b048:0 "Реформа Вежі Тенпенні"
DCS_nf_b048_desc:0 "Після того, як з Тенпенні покінчено, комусь новому потрібно керувати поселенням."
DCS_nf_b049:0 "Наш великий президент"
DCS_nf_b049_desc:0 "Після того, як зрадників, які сфальсифікували вибори проти Дейва, зупинено, наш великий президент готовий вести нас до славного майбутнього."
DCS_nf_b050:0 "Зрадники Республіки"
DCS_nf_b050_desc:0 "Ворогів у Поселень Столичної Пустки безліч, і деякі навіть зсередини. Вони повинні бути покарані."
DCS_nf_b051:0 "Віддані"
DCS_nf_b051_desc:0 "Багато хто підтримав Дейва в боротьбі з корумпованими та сфальсифікованими виборами. Тепер настав час винагородити тих, хто явно відданий, посадами, яких вони заслуговують."
DCS_nf_b052:0 "Школи історії Дейва"
DCS_nf_b052_desc:0 "Молодь пустки повинна дізнатися про великі діяння нашого президента. Школи в пустці отримують оновлені матеріали, які вони повинні викладати."
DCS_nf_b053:0 "«Вільні» вибори"
DCS_nf_b053_desc:0 "Люди хвилюються, що нещодавні сфальсифіковані вибори похитнуть віру президента в демократію. Звісно, що ні. З часом ми знову проведемо вибори, але, природно, щоб запобігти черговим фальсифікаціям, голосувати зможуть лише громадяни Республіки Дейва. Щоправда, будь-хто інший у пустці може пройти процес отримання громадянства!"
DCS_nf_b054:0 "Республіканська гвардія"
DCS_nf_b054_desc:0 "Тих, хто підтримав Дейва, реорганізують у Республіканську гвардію. Вони забезпечуватимуть мир і безпеку для всіх громадян."
DCS_nf_b055:0 "Запровадити призов"
DCS_nf_b055_desc:0 "Вороги всюди, і без армії, щоб їх зупинити, нас здолають."
DCS_nf_b056:0 "Озброїти військо"
DCS_nf_b056_desc:0 "Так, президент підтримує право на володіння зброєю, але республіка потребує її, щоб захистити нас!"
DCS_nf_b057:0 "Довга рука закону"
DCS_nf_b057_desc:0 "Досяжність президента Дейва довга. Рейдерам, терористам і зрадникам краще остерігатися!"
DCS_nf_b058:0 "Президентська гвардія"
DCS_nf_b058_desc:0 "Після численних замахів на життя президента Дейва кілька відданих солдатів збираються разом, щоб сформувати спеціальну президентську гвардію."
DCS_nf_b060:0 "Дякуємо тобі, президенте Дейв"
DCS_nf_b060_desc:0 "Ми багато чим завдячуємо нашому великому президенту. Під його керівництвом наша нація краща, ніж будь-коли!"
DCS_nf_b059:0 "Збирати податки"
DCS_nf_b059_desc:0 "Дейв виснажує кришки з колективної скарбниці. Він наполягає, що вони йдуть на важливі державні справи, включаючи відбудову після війни. Він би не став брехати, правда?"
DCS_nf_b061:0 "Відбудуватися після війни"
DCS_nf_b061_desc:0 "Республіка Дейва сильно постраждала під час війни з викорінення зрадників, які сфальсифікували вибори. Звісно, частина нових податків йде на відшкодування збитків!"
DCS_nf_b062:0 "Розвивати Республіку"
DCS_nf_b062_desc:0 "Республіка Дейва — наша столиця, і як така заслуговує бути нашим промисловим серцем. У нас все ще залишиться трохи кришок від податків на інші важливі речі."
DCS_nf_b063:0 "Президентська фортеця"
DCS_nf_b063_desc:0 "Ми не можемо дозволити нашому великому президенту сидіти в іржавій халупі, де будь-хто з міні-нуклеаркою може його вбити. Витратьте останні кришки, щоб забезпечити безпеку нашого великого лідера!"
DCS_nf_c001:0 "Храм Союзу"
DCS_nf_c001_desc:0 "Рабство є звичайним фактом життя в Пустці, але кілька рабів-утікачів зайняли позицію проти нього. Тепер вони приходять до нашого уряду по допомогу в їхній боротьбі!"
DCS_nf_c002:0 "Притулок для втікачів"
DCS_nf_c002_desc:0 "Ми приймемо всіх рабів, які знайдуть спосіб втекти від своїх господарів. За стінами наших поселень вони будуть у безпеці."
DCS_nf_c003:0 "Зривати каравани работорговців"
DCS_nf_c003_desc:0 "Работорговці ходять тими ж стежками, що й наші законні торговці. Ми не можемо дозволити цьому тривати."
DCS_nf_c004:0 "Ополчення свободи"
DCS_nf_c004_desc:0 "Тепер, коли ми довели серйозність наших намірів щодо вирішення проблеми рабства, звільнені раби стікаються під наш прапор. Ми вже сформували спеціальний загін звільнених чоловіків і жінок, які прагнуть перенести боротьбу до своїх колишніх гнобителів."
DCS_nf_c005:0 "Запропонувати матеріальну підтримку"
DCS_nf_c005_desc:0 "Ми хотіли б зробити більше, щоб допомогти цим людям, але продаж їм зброї та спорядження за зниженою ціною — це найкраще, що ми можемо зробити."
DCS_nf_c006:0 "Підтримка в навчанні"
DCS_nf_c006_desc:0 "Якщо ми не можемо допомогти їм у їхній боротьбі, ми можемо допомогти їм навчитися боротися самим."
DCS_nf_c007:0 "Мерестійська залізниця"
DCS_nf_c007_desc:0 "Не всі в Поселеннях Столичної Пустки згодні, що ми робимо достатньо, щоб допомогти цим рабам-утікачам. Кілька поселень роблять більше, але це може означати проблеми."
DCS_nf_c008:0 "Меморіал Лінкольна"
DCS_nf_c008_desc:0 "Работорговці розбили табір біля Меморіалу Лінкольна, чекаючи на Ганнібала Гемліна, лідера Храму Союзу. Ми допоможемо їм вигнати работорговців."
DCS_nf_c009:0 "Порятунок Раю"
DCS_nf_c009_desc:0 "Парадайз-Фоллз був домівкою для работорговців стільки, скільки хтось пам'ятає. Кожного дня десятки нещасних душ проходять через це місце, часто продані в долю, гіршу за смерть. Якщо ми не виженемо цю ракову пухлину з наших земель, вони завжди будуть загрозою."
DCS_nf_c010:0 "Північні бандити"
DCS_nf_c010_desc:0 "Бандити з Гаррісбурга, можливо, не часто нападають на Столичну Пустку, але навіть один напад на наші поселення — це вже забагато."
DCS_nf_c011:0 "Подяка Джонстауна"
DCS_nf_c011_desc:0 "Джонстаун десятиліттями жив під п'ятою бандитів із Гаррісбурга і вихваляє нас за те, що ми їх врятували. Давайте розвивати це."
DCS_nf_c012:0 "Піттське питання"
DCS_nf_c012_desc:0 "Пітт був кінцевою точкою для багатьох рабів і рейдерів у навколишній пустці. Ходять чутки про деякі нещодавні зміни в цьому місці, але нам потрібно побачити це на власні очі."
DCS_nf_c013:0 "Рейдери"
DCS_nf_c013_desc:0 "Різні банди рейдерів зі Столичної Пустки відступили на південь, коли ми стали більш організованими. На жаль, здається, за цей час вони також стали сильнішими. Ми не можемо дозволити їм рости, інакше вся наша робота може бути марною."
DCS_nf_c014:0 "Зустрінуті як герої"
DCS_nf_c014_desc:0 "Ми прогнали рейдерів з південного заходу. Нечисленні поселення, які вижили під їхніми постійними нападами, охоче приєднуються до нас!"
DCS_nf_c015:0 "Набуті смаки"
DCS_nf_c015_desc:0 "Рейдери на півдні від нас дуже змінилися за останні кілька років. Вони відмовилися від своїх кровожерливих звичок і натомість зайнялися м'ясним бізнесом, і те в'ялене м'ясо кротощура клято смачне. Нам варто підтримувати з ними дружні стосунки, інакше вони можуть повернутися до старих звичок, якщо справи підуть погано."
DCS_nf_c016:0 "Пітт змінився?"
DCS_nf_c016_desc:0 "Ні, Пітт той самий, просто став жорсткішим."
DCS_nf_c017:0 "Полювання на мутантів"
DCS_nf_c017_desc:0 "Супермутанти завжди були проблемою. Навіть якщо Братство вбиває їх у центрі Вашингтона, їх занадто багато, щоб впоратися тут, у пустці. Потрібно організувати мисливські загони, щоб зменшити їхню чисельність."
DCS_nf_c018:0 "Знайти джерело"
DCS_nf_c018_desc:0 "Мутанти ж мають звідкись з'являтися, чи не так? Якщо ми зможемо це з'ясувати, можливо, ми зможемо їх зупинити."
DCS_nf_c019:0 "Гніздо мутантів"
DCS_nf_c019_desc:0 "Ми виявили, що супермутанти прибувають зі старих печер на заході. Перш ніж відправляти армію, щоб захопити це місце, нам потрібно переконатися, що нинішні мешканці цього району не вистрілять нам у спину."
DCS_nf_c020:0 "Літл-Лемплайт"
DCS_nf_c020_desc:0 "По дорозі в печери, щоб битися з мутантами, нашу армію зупинило поселення маленьких дітей. Вони не знають, що робити далі."
DCS_nf_c021:0 "Знищити Сховище 87"
DCS_nf_c021_desc:0 "Тепер, коли безпечний прохід до сховища забезпечено, нам потрібно пробитися до серця цього місця і знищити його."
DCS_nf_c022:0 "Найтемніша година"
DCS_nf_c022_desc:0 "Анклав заполоняє Столичну Пустку, і навіть з Братством, яке б'ється на нашому боці, невідомо, чи виживемо ми. Попереду темні часи, але наші люди знають, що це боротьба за наше виживання."
DCS_nf_c023:0 "Ми... перемогли?"
DCS_nf_c023_desc:0 "Коли ми вперше побачили гвинтокрили, що приземляються з військами в силовій броні, багато хто подумав, що це кінець. Всупереч усьому, ми вижили в нашій боротьбі з Анклавом. Тепер нам потрібно звернути увагу на відбудову."
DCS_nf_c024:0 "Форт Банністер"
DCS_nf_c024_desc:0 "Старий форт Компанії Кіготь був міцним горішком, але тепер він наш."
DCS_nf_c025:0 "Сховище 101"
DCS_nf_c025_desc:0 "Ми знаємо, що Сховище 101 знаходиться всього за кілька хвилин ходьби від Мегатонни, і в ньому все ще є люди, які виходили раніше. Це потребуватиме певних зусиль, щоб отримати потрібне обладнання, але, можливо, нам варто подивитися, чи не хочуть вони поговорити."
DCS_nf_c026:0 "Послання миру"
DCS_nf_c026_desc:0 "Підсилювач радіосигналу налаштований на потрібну частоту, і ми готові надіслати повідомлення до Сховища 101. Але що ми скажемо?"
DCS_nf_c027:0 "Експедиція до Грейдіча"
DCS_nf_c027_desc:0 "Поселення Грейдіч затихло... Навіть якщо всі вони мертві, нам потрібно з'ясувати, що сталося, інакше будь-яке інше поселення може бути наступним."
DCS_nf_c028:0 "Старомодний спосіб"
DCS_nf_c028_desc:0 "Мурахи можуть дихати вогнем, але вони все ще просто гігантські комахи. Відправте ополчення розібратися з ними."
DCS_nf_c029:0 "Бот перемагає жука"
DCS_nf_c029_desc:0 "Мурашиний вогонь не може розплавити сталевих ботів!"
DCS_nf_c030:0 "План Леско"
DCS_nf_c030_desc:0 "Учений, відповідальний за проблему з жуками, тепер каже, що має план, як її зупинити. Нам слід дозволити йому спробувати виправити свій безлад."
DCS_nf_c031:0 "Доля Леско"
DCS_nf_c031_desc:0 "Хоча це був нещасний випадок, багато хто вимагає крові доктора Леско. Чи варто нам її дати?"
DCS_nf_c032:0 "Відбудова Грейдіча"
DCS_nf_c032_desc:0 "Після того, як проблему з мурахами вирішено, Грейдіч готовий до заселення."
DCS_nf_c033:0 "Арсенал Вітона"
DCS_nf_c033_desc:0 "Довоєнний військовий склад знаходиться на нашій території. Хоча зовнішню частину обшукали до кісток, всередині все ще багато замкнених дверей, які можна відкрити."
DCS_nf_c034:0 "Копнути глибше"
DCS_nf_c034_desc:0 "Поширюються новини, що експедиція до арсеналу Вітона знайшла незайманий склад товарів і ще більше замкнених дверей під поверхнею. Нам варто діяти швидко, перш ніж це приверне небажану увагу."
DCS_nf_c035:0 "Продати це"
DCS_nf_c035_desc:0 "Вигнанці зможуть краще використати більшу частину цього добра, ніж ми, і їхня плата справедлива."
DCS_nf_c036:0 "Щедрість Вигнанців"
DCS_nf_c036_desc:0 "Вигнанці готові купувати більше технологічного брухту, який знаходять наші люди. Чому б не скористатися цією можливістю? Зрештою, навіщо нам квантовий гармонізатор або фотонна резонансна камера?"
DCS_nf_c037:0 "Радники-Вигнанці"
DCS_nf_c037_desc:0 "Вигнанців вважають холодними та байдужими, і це правда. Але вони знають, що коли у нас все добре, ми можемо приносити їм більше технологій. Тож, можливо, ми зможемо переконати їх дати нам кілька порад за відповідну плату."
DCS_nf_c038:0 "Залишити собі"
DCS_nf_c038_desc:0 "Цей форт знаходиться на НАШІЙ території, і МИ його знайшли. Кілька вигнанців цього не змінять."
DCS_nf_c039:0 "Продовжити збирання"
DCS_nf_c039_desc:0 "Багато з цього добра іржаве до дідька, але іржава довоєнна штурмова гвинтівка все ще на крок вища за саморобну."
DCS_nf_c040:0 "Наш новий форт"
DCS_nf_c040_desc:0 "Це місце знаходиться в досить хорошому місці, щоб захистити частину нашої території. Нам варто розглянути можливість залишити тут частину нашого ополчення."
DCS_nf_c041:0 "Організовані шукачі"
DCS_nf_c041_desc:0 "Збирання в руїнах Вашингтона було способом життя для багатьох відколи впали бомби. На жаль, багато шукачів тримаються самі по собі або невеликими групами і гинуть, перш ніж встигають продати свої знахідки. Ми спробуємо організувати пошукові вилазки з більшими командами, здатними впоратися з небезпеками руїн, і яких не знищить одна-єдина 200-річна пастка."
DCS_nf_c042:0 "Фабрика Корвега"
DCS_nf_c042_desc:0 "Кажуть, що фабрика Корвега в досить хорошому стані. Ми відправимо кількох хлопців перевірити її та подивитися, що ми з нею можемо зробити."
DCS_nf_c043:0 "Пошук у комп'ютерах"
DCS_nf_c043_desc:0 "У комп'ютерах автомобільного заводу має бути інформація про те, як будувати машини, чи не так?"
DCS_nf_c044:0 "Фабрика RobCo"
DCS_nf_c044_desc:0 "Стара фабрика RobCo була місцем, де шукачі іноді знаходили окремі деталі роботів, але їм завжди доводилося бути обережними, щоб уникнути смертоносних роботів, які все ще блукали її залами. Однак команда добре озброєних шукачів могла б зачистити це місце."
DCS_nf_c045:0 "Підземне сховище"
DCS_nf_c045_desc:0 "На фабриці був великий підземний склад, який, за чутками, повний запчастин і машин."
DCS_nf_c046:0 "Перезапустити завод"
DCS_nf_c046_desc:0 "Завдяки охороні, шукачі ніколи не втручалися в механізми заводу. Можливо, він вийшов з ладу від часу, але з усіх машин у нас має бути достатньо деталей, щоб полагодити одну-дві."
DCS_nf_c047:0 "MDPL-16"
DCS_nf_c047_desc:0 "Ця стара електростанція біля Республіки Дейва є лише однією з багатьох, що всіяли ландшафт, і все ще повинна працювати. Ми відправимо кількох хлопців полагодити це місце і подивитися, куди ми можемо направити електроенергію."
DCS_nf_c048:0 "Олнійська проблема"
DCS_nf_c048_desc:0 "Наші шукачі на півночі кажуть, що кігті смерті з Олд-Олні рухаються на південь."
DCS_nf_c049:0 "Відвоювання Олні"
DCS_nf_c049_desc:0 "Олд-Олні було досить пристойним поселенням до того, як там оселилися кігті смерті. Якщо нам все одно доведеться з ними мати справу, ми можемо також переселити містечко."
DCS_nf_c050:0 "Схованка Банністера"
DCS_nf_c050_desc:0 "Форт Банністер був серцем операцій Компанії Кіготь. Там має залишитися хороше спорядження."
DCS_nf_c051:0 "Сховище 108"
DCS_nf_c051_desc:0 "Команда шукачів мала рацію, це справжнє сховище. Судячи з усього, ми можемо просто відкрити двері й увійти. Що найгіршого може статися?"
DCS_nf_c052:0 "Розібрати на запчастини"
DCS_nf_c052_desc:0 "Сховище 108 занепало і стало непридатним для життя десятиліття тому. Тепер воно придатне лише як джерело брухту та всього, що ми можемо витягнути зі старих комп'ютерів."
DCS_nf_d001:0 "Наслідки"
DCS_nf_d001_desc:0 "Анклав переможений, значною мірою завдяки допомозі Братства Сталі. Можливо, ми могли б більше співпрацювати?"
DCS_nf_d002:0 "Альянс Лайонса"
DCS_nf_d002_desc:0 "Ми уклали міцний союз із Братством. Це світанок нової ери для нашого народу."
DCS_nf_d003:0 "Повернення до норми"
DCS_nf_d003_desc:0 "Братство може битися з супермутантами і роздавати безкоштовну воду, але ми повинні стояти на власних ногах."
DCS_nf_d004:0 "Продаж трофеїв"
DCS_nf_d004_desc:0 "Багато наших солдатів зібрали трофеї з убитих солдатів Анклаву. Від плазмових пістолетів до шоломів силової броні — це спорядження, безсумнівно, є потужними інструментами війни, але Братство зможе використати його краще, ніж ми. Ми обміняємо Братству деякі з цих менших предметів спорядження в обмін на більш значну кількість обладнання."
DCS_nf_d005:0 "Навчання Братства"
DCS_nf_d005_desc:0 "Інструктори з бойової підготовки з Братства, які допомагали нам готувати наших людей до війни, були божим даром. Якби ми змогли переконати Старійшину дозволити деяким із них залишитися, було б ще краще."
DCS_nf_d006:0 "Договір про Рейвен-Рок"
DCS_nf_d006_desc:0 "База Анклаву Рейвен-Рок знаходиться під сотнями тонн щебеню, і нам знадобляться десятиліття, щоб її розчистити. Вона також знаходиться в районі, що кишить яо-ґаями та іншими небезпеками Пустки. Братство запропонувало допомогти нам відновити деякі фабрики в обмін на дозвіл зайняти це місце. Звучить як хороша угода."
DCS_nf_d007:0 "Піднімаючи нас"
DCS_nf_d007_desc:0 "Відколи ми вперше побачили гвинтокрили в дії, багато хто в Столичній Пустці захопилися польотами. Після кількох невдалих спроб польотів, які ледь не призвели до серйозних проблем, Братство погодилося дати нам невеликий поштовх."
DCS_nf_d008:0 "Разом краще"
DCS_nf_d008_desc:0 "Наша взаємна співпраця з Братством була вигідною для всіх учасників. Цей міцний союз принесе процвітання на довгі роки."
DCS_nf_d009:0 "Трофеї Анклаву"
DCS_nf_d009_desc:0 "Хоча Братство забрало левову частку спорядження Анклаву, що залишилося після війни, ми змогли захопити дещо для себе."
DCS_nf_d010:0 "Уроки війни"
DCS_nf_d010_desc:0 "У боях з Анклавом солдати, що вижили, багато чому навчилися про те, як саме битися з солдатами в силовій броні. Це може стати в нагоді, якщо ми коли-небудь зіткнемося з кимось подібним."
DCS_nf_d011:0 "Чорні дияволи"
DCS_nf_d011_desc:0 "Технології Анклаву виходять за межі розуміння більшості наших вчених. Немає жодних шансів, що ми коли-небудь зможемо виробляти більше цього самі, але принаймні їх вивчення може призвести до деяких проривів."
DCS_nf_d012:0 "Злетіти"
DCS_nf_d012_desc:0 "Гвинтокрили були величезною перевагою Анклаву, і хоча ми врешті-решт перемогли, це показало людям, що літальні апарати мають серйозну цінність у війні в пустці. Настав час зробити наші перші кроки в небо."
DCS_nf_d013:0 "Стоячи на самоті"
DCS_nf_d013_desc:0 "Навіть якщо Братство вважало себе вищим за співпрацю з нами, ми показали покидькам пустки, що ми не налякані фермери та шукачі, яких можна переслідувати. Поселення Столичної Пустки — це сильна нація, яка єдиним фронтом протистоїть будь-яким загрозам."
DCS_nf_d014:0 "Звільнити Пітт"
DCS_nf_d014_desc:0 "Незалежно від того, хто зараз керує Піттом, зрозуміло, що люди там страждають під ярмом рабства. Якщо ми їм не допоможемо, ніхто не допоможе."
DCS_nf_d015:0 "Новий бос, ті самі ланцюги"
DCS_nf_d015_desc:0 "За роки люди Пітта жили під владою то одного, то іншого жахливого тирана. Навіть якщо вони позбудуться своїх ланцюгів, вони просто стануть жертвами наступного ватажка рейдерів, який постане. Ми повинні врятувати їх від цього циклу."
DCS_nf_d016:0 "Розірвати ланцюги"
DCS_nf_d016_desc:0 "Гнобителів Пітта переможено, але щось не так. Чому так багато цих людей виглядають хворими?"
DCS_nf_d017:0 "Нове керівництво"
DCS_nf_d017_desc:0 "Ми отримали звістку, що хтось розтрощив банду рейдерів, яка правила Піттом. Нам слід розібратися в цьому."
DCS_nf_d018:0 "Брати в Пітті"
DCS_nf_d018_desc:0 "Ми раді бачити, що наші друзі з Братства Сталі взяли під контроль Пітт. Однак вони попереджають, що в повітрі є якась хвороба, над лікуванням якої вони працюють, і нам слід уникати цього району, щоб не ризикувати. Добре, що у нас є такі друзі, які піклуються про наших людей."
DCS_nf_d019:0 "Нові сталеві володарі"
DCS_nf_d019_desc:0 "Деякі обірвані раби втекли з Пітта і дісталися Столичної Пустки. Вони не малюють райдужної картини життя в Пітті під владою Братства."
DCS_nf_d020:0 "Плоди сталевого міста"
DCS_nf_d020_desc:0 "Незважаючи на небезпеку хвороби КТД у Пітті, Братство з герметичними захисними костюмами та особливими запобіжними заходами підтримує промисловість міста живою, поки вони шукають ліки. Вони навіть люб'язно діляться вигодами з нами!"
DCS_nf_d021:0 "Проти всіх тиранів"
DCS_nf_d021_desc:0 "Цей Паладин, який править Піттом, явно не наш друг. Незалежно від того, чи знає решта Братства про масштаби його дій, ми повинні це зупинити. Кляті наслідки!"
DCS_nf_d022:0 "Мати свободи"
DCS_nf_d022_desc:0 "Нещодавно в Пітті відбулося повстання рабів. Ганнібал Гемлін та аболіціоністи хочуть вирушити до Пітта й укласти союз."

DCS_nf_e001:0 "Третя рада"
DCS_nf_e001_desc:0 "Багато що змінилося в Столичній Пустці з моменту останньої особистої зустрічі ради. Голова скликає ще одну зустріч для обговорення важливих питань."
DCS_nf_e002:0 "Закони пустки"
DCS_nf_e002_desc:0 "Хоча деякі закони однакові в більшості поселень, це не завжди так. Не кажучи вже про питання того, що відбувається за межами стін поселення. З цих речей виникали проблеми."
DCS_nf_e003:0 "Захист пустки"
DCS_nf_e003_desc:0 "Ми стаємо занадто великими для розрізнених ополчень або груп пильних, щоб захищати нашу територію. Чи не час для змін?"
DCS_nf_e004:0 "Промислова революція"
DCS_nf_e004_desc:0 "Наплив технологій Анклаву, потік чистої води та ковальні Пітта — це лише деякі речі, які підживлюють стрімке економічне зростання в Поселеннях Столичної Пустки. Сподіваймося, що наслідки цієї «промислової революції» не будуть катастрофічними."
DCS_nf_e005:0 "Заснувати СУР"
DCS_nf_e005_desc:0 "Ми виросли далеко за межі просто коаліції поселень, які захищають одне одного. У нас є нові закони, постійна армія та зростаюча промислова база."
DCS_nf_e006:0 "Гори божевілля"
DCS_nf_e006_desc:0 "Гор на захід від нас завжди уникали торговці та мандрівники. Але це не означає, що ми не помітили більше гуркоту в тих пагорбах, ніж зазвичай, за останні кілька років."
DCS_nf_e007:0 "Заснувати західні форпости"
DCS_nf_e007_desc:0 "Нам потрібно бути готовими на випадок, якщо той, хто лютує в пагорбах на захід від нас, почне дивитися в наш бік. Першим кроком буде встановлення постійних сторожових постів."
DCS_nf_e008:0 "Покликати наших братів"
DCS_nf_e008_desc:0 "Безсумнівно, наші друзі з Братства Сталі будуть готові поглянути на те, що здіймає пил у горах. Зрештою, деяких із нещодавніх утікачів звідти бачили з цікавими технологіями."
DCS_nf_e009:0 "Марш на захід"
DCS_nf_e009_desc:0 "Ми не можемо вічно жити в страху перед божевільними на заході. Якщо ми хочемо звільнитися від них, ми повинні самі піти на них війною!"
DCS_nf_e010:0 "Рятівники Північних Аппалачів"
DCS_nf_e010_desc:0 "Жахливі культи та божевільні жерці Північних Аппалачів були придушені нашими військовими. Прості люди цих земель вітають нас як визволителів."
DCS_nf_e011:0 "Розділити тягар"
DCS_nf_e011_desc:0 "Братство не пристосоване і не зацікавлене в керуванні купою поселень у пагорбах. Якщо ми не втрутимося, вони можуть просто забрати все, що має цінність, і залишити це місце вразливим для рейдерів. Ми могли б запропонувати взяти на себе адміністрування і просто надсилати їм усе, що знайдемо і що може бути цікавим."
DCS_nf_e012:0 "Наші спільні цінності"
DCS_nf_e012_desc:0 "Люди з Грін-Маунтін дуже схожі на нас. Вони хочуть жити своїм життям у мирі і наполегливо б'ються, щоб стримувати рейдерів. Можливо, ми могли б працювати разом і сформувати щось більше, ніж сума наших частин."
DCS_nf_e013:0 "Допомога, але зі знижкою"
DCS_nf_e013_desc:0 "Страждання людей нещодавно врятованих територій не залишаються поза увагою. Дядько Ро організував каравани Столичної Пустки, щоб надіслати їм допомогу у вигляді їжі та медикаментів за доступними цінами!"
DCS_nf_e014:0 "Розширення караванних шляхів"
DCS_nf_e014_desc:0 "Постійна торгівля між Північними Аппалачами та Столичною Пусткою призвела до розвитку кількох нових караванних маршрутів."
DCS_nf_e015:0 "Регулятори розширюються"
DCS_nf_e015_desc:0 "З раптовим вакуумом влади в пагорбах Північних Аппалачів обов'язково знайдуться підступні лиходії, які скористаються цим. Ось чому Регулятори відправляють частину своїх людей для вербування та боротьби з цими хижаками!"
DCS_nf_e016:0 "Регулятор Феллон"
DCS_nf_e016_desc:0 "Колишній лідер Грін-Маунтін, якого вважали загиблим під час падіння поселення, продовжував боротьбу високо в горах. Знадобилося трохи переконування, але він зрозумів, що Регулятори поділяють багато його цінностей, і одягнув значок."
DCS_nf_e017:0 "Гірські монстри"
DCS_nf_e017_desc:0 "Існують історії про незвичайних істот, що ховаються в пагорбах і лісах Аппалачів, які сягають корінням далеко до Великої війни. Наш великий президент має намір убити одну з них і повісити її голову на стіну свого кабінету."
DCS_nf_e018:0 "Наближаючись"
DCS_nf_e018_desc:0 "Ці істоти роками уникали людей не просто так, але вони ніколи не стикалися з президентом Дейвом. Він іде по гарячих слідах одного з цих криптидів."
DCS_nf_e019:0 "Аппалачська колонія"
DCS_nf_e019_desc:0 "Тенпенні мало цікавиться пагорбами на захід від нас, окрім того, яку цінність можна з них витягти."
DCS_nf_e020:0 "Придушити непокірних колоністів"
DCS_nf_e020_desc:0 "Люди, які живуть у нашій новій колонії, скаржаться, що несправедливо віддавати нам ресурси та податки, але не бути представленими в раді. Немає нічого, з чим Ґуставо не міг би впоратися, якби йому дали більше людей."
DCS_nf_e021:0 "Кооперація ополчень"
DCS_nf_e021_desc:0 "Лідери нашої армії зустрічаються з лідерами Грін-Маунтін, щоб порівняти стратегії та подивитися, чому ми можемо навчитися один в одного."
DCS_nf_e022:0 "Рельсгармати для Регуляторів"
DCS_nf_e022_desc:0 "Регулятори дуже добре порозумілися з ополченням Грін-Маунтін. Вони так добре порозумілися, що Грін-Маунтін наполягла, щоб вони взяли з собою кілька ящиків ґаус-гвинтівок і схеми, коли повертатимуться до Столичної Пустки."
DCS_nf_e023:0 "Аппалачська угода"
DCS_nf_e023_desc:0 "Завдяки своїм майстерним навичкам ведення переговорів Дядьку Ро вдалося укласти угоду з Грін-Маунтін, яка гарантує торговельну співпрацю."
DCS_nf_e024:0 "Зростання торговельних шляхів"
DCS_nf_e024_desc:0 "Постійна торгівля між Північними Аппалачами та Столичною Пусткою призвела до розвитку кількох нових караванних маршрутів."
DCS_nf_e025:0 "Саскуеханна?"
DCS_nf_e025_desc:0 "Річка Саскуеханна утворювала східний кордон Столичної Пустки, і рейдери на півночі та північному сході заважали багатьом вирушати в тому напрямку. Тепер, коли з Гаррісбургом покінчено, а наша армія сильніша, ніж будь-коли, можливо, нам варто поглянути, що відбувається за тією річкою."
DCS_nf_e026:0 "Привітати Амішів"
DCS_nf_e026_desc:0 "Люди з Герші — працьовиті ремісники та торговці. Так само, як і поселенці Столичної Пустки, вони хороші люди, які постраждали від рейдерів і нарешті дали їм відсіч. Вони були б бажаним доповненням до цієї Республіки, яку ми будуємо."
DCS_nf_e027:0 "Допомогти Амішам"
DCS_nf_e027_desc:0 "Люди з Герші — працьовиті ремісники та торговці. Так само, як і поселенці Столичної Пустки, вони хороші люди, які постраждали від рейдерів, що порушували їхнє життя. Можливо, вони офіційно не просили нашої допомоги, але це не означає, що ми не можемо простягнути руку допомоги."
DCS_nf_e028:0 "Врятувати Амішів"
DCS_nf_e028_desc:0 "Люди з Герші — працьовиті ремісники та торговці. Так само, як і поселенці Столичної Пустки, вони хороші люди, які постраждали від рейдерів, що порушували їхнє життя. На жаль, вони стали жертвами Філадельфійських Рейдерів, і багато хто тепер у ланцюгах. Ми не можемо стояти осторонь і дозволяти цьому тривати."
DCS_nf_e029:0 "У Філадельфії завжди сонячно"
DCS_nf_e029_desc:0 "Тепер, коли Філадельфія більше не страждає від тиранії Бородавника та його нестримних дітей, хороші люди можуть переїхати до міста та створювати там життя. Не встигнете й оком змигнути, як воно може стати наступним Рівет-Сіті!"
DCS_nf_e030:0 "Темні хмари на півдні"
DCS_nf_e030_desc:0 "Ми не забули про різних канібалів і божевільних, які ховаються просто за нашим південним кордоном. Вони, ймовірно, також не забули про нас. Нам слід підготуватися на випадок, якщо їм набридне їсти заблукалих мандрівників і вони захочуть пошукати нові джерела їжі."
DCS_nf_e031:0 "Тінь над Андейлом"
DCS_nf_e031_desc:0 "Чоловіки на нашому форпості повідомляють про тривожну активність у районі Андейла. Там відбувається щось велике, і ми, можливо, не захочемо чекати, щоб побачити, що саме."
DCS_nf_e032:0 "Розслідувати культи"
DCS_nf_e032_desc:0 "Тут відбувалося щось дивне. Нам потрібно дістатися до суті."
DCS_nf_e033:0 "Знищити культи"
DCS_nf_e033_desc:0 "Тут відбувалося щось дивне, і про деякі речі краще не знати. Нехай знання помруть разом з канібалами."
DCS_nf_e034:0 "Кінець кошмару"
DCS_nf_e034_desc:0 "Жахливі речі, які сталися в Андейлі та навколишній пустці, нарешті припинено. Величезні простори землі, яких уникали десятиліттями, якщо не століттями, нарешті готові до заселення порядними людьми, які можуть виростити картоплю, а не жувати торговців."
DCS_nf_e035:0 "Болотяні жахи"
DCS_nf_e035_desc:0 "Болота на південь від того, що колись було Андейлом, таять жахи, гірші за болотних людей із Пойнт-Лукаут. Усі спроби порозумітися з цими людьми закінчувалися катастрофою. Це залишає нам лише один варіант."
DCS_nf_e036:0 "Приємний сюрприз"
DCS_nf_e036_desc:0 "Які б жахи не займали болота на південь від Андейла, вони були знищені цивілізованими людьми. Нам слід запросити їх до нашої республіки. Кожен, хто міг зустріти цих жахів і вижити, буде бажаним гостем."
DCS_nf_e037:0 "Це дивно"
DCS_nf_e037_desc:0 "Щось темне оселилося в болотах на південь від Андейла. Нам потрібно переконатися, що воно не перебереться в наші краї."
DCS_nf_e038:0 "Повільний потік"
DCS_nf_e038_desc:0 "Проєкт «Чистота» значно покращив життя пересічного мешканця Пустки. Чиста вода доступна навіть найбільш знедоленим. Але поставки могли б бути трохи частішими."
DCS_nf_e039:0 "Допомогти зусиллям Братства"
DCS_nf_e039_desc:0 "Братство добре справляється з доставкою Аква Пури до віддалених поселень Столичної Пустки. Але це не означає, що вони не потребують допомоги."
DCS_nf_e040:0 "Могутня спрага"
DCS_nf_e040_desc:0 "Правда в тому, що якщо ми не забезпечимо Проєкт «Чистота» для себе, ми завжди будемо залежати від благодійності того, хто ним володіє. Така залежність не на користь нам, і ми не можемо цього терпіти."
DCS_nf_e041:0 "Весела співпраця"
DCS_nf_e041_desc:0 "Рівет-Сіті чудово піклується про Проєкт «Чистота». Це також нагадало багатьом, що найбільше поселення в Столичній Пустці дивним чином відсутнє в раді лідерів поселень."
DCS_nf_e042:0 "Синергетична співпраця"
DCS_nf_e042_desc:0 "Так, як ми й очікували, наша співпраця з Братством над Проєктом «Чистота» призвела до кращих результатів для всіх учасників."
DCS_nf_e043:0 "Контроль над потоком"
DCS_nf_e043_desc:0 "Керувати Проєктом «Чистота» виявилося складніше, ніж здавалося. Але ми зайшли надто далеко, і нам потрібно вичавити з цього максимум."
DCS_nf_e044:0 "Покращення розподілу"
DCS_nf_e044_desc:0 "Рівет-Сіті взяв на себе значну частину тягаря з розподілу води по всій пустці. Вони звернулися до ради по допомогу."
DCS_nf_e045:0 "Непристойна пропозиція"
DCS_nf_e045_desc:0 "Керівництво Дуврських Торговців звернулося до нашого Голови з вигідною, але жахливою діловою угодою."
DCS_nf_e046:0 "Захистити Рибалок Затоки"
DCS_nf_e046_desc:0 "Не важливо, скільки кришок вони нам показують, ми зрадимо наші основоположні принципи, якщо відвернемося від поселення, яке потребує захисту."
DCS_nf_e047:0 "Триматися осторонь"
DCS_nf_e047_desc:0 "Рибалки Затоки ніколи прямо не просили нашої допомоги. Можливо, буде краще, якщо ми просто заплющимо очі. Це, зрештою, не наша справа."
DCS_nf_e048:0 "Підтримати війну Дувра"
DCS_nf_e048_desc:0 "Якщо ми підтримаємо Дувр у їхніх зусиллях завоювати Рибалок Затоки, це може призвести до кращого результату для всіх. Швидка поразка краща для народу Рибалок Затоки, ніж затяжна війна, чи не так?"
DCS_nf_e049:0 "Приєднання"
DCS_nf_e049_desc:0 "Рибалки Затоки витримали натиск найманців Дуврських Торговців і переломили хід подій на свою користь. Так чи інакше, тепер вони контролюють більшу частину Делмарви."
DCS_nf_e050:0 "Човни кришок"
DCS_nf_e050_desc:0 "Дуврські Торговці змогли придушити опір Рибалок Затоки. Сподіваймося, це призведе до більшого процвітання для всіх."
DCS_nf_e051:0 "Поселення Делмарви"
DCS_nf_e051_desc:0 "Люди Делмарви об'єднані під одним спільним лідером. Вони більше не просто конгломерат торговців і група рибалок. Вони стають чимось більшим, подібно до того, як ми зробили не так давно. Що це означатиме для нас, ще належить побачити."
DCS_nf_e052:0 "Морська кооперація"
DCS_nf_e052_desc:0 "Поселення Делмарви були настільки люб'язні, що навчили наших людей дечому про плавзасоби. Це має допомогти нам у захисті наших берегів від небезпеки."
DCS_nf_e053:0 "Імпорт/Експорт"
DCS_nf_e053_desc:0 "У Дядька Ро є грандіозні плани, які включають Поселення Делмарви. Він бачить їх як серце морської торговельної імперії, яка простягається вздовж усього східного узбережжя і, можливо, далі. Дехто відкидає це як нездійсненну мрію або просто розширення того, що робили Дуврські Торговці, але Ро знає краще."
DCS_nf_e054:0 "Пляжний туризм"
DCS_nf_e054_desc:0 "Містер Берк доповів Тенпенні, що на пляжах Делмарви є руїни довоєнного курорту. Тенпенні вже відправив кількох найманців і підрядників, щоб убезпечити будівлю та розпочати ремонт."
DCS_nf_e055:0 "Флагман Республіки"
DCS_nf_e055_desc:0 "Після завершення інтеграції Делмарви Дейв має грандіозні плани увічнити цю подію. Він доручив корабелам Дувра відремонтувати зруйнований танкер, що викинувся на східне узбережжя. Це буде флагман флоту ПСП, «ПСП Дейв»."
DCS_nf_e056:0 "Флотські навчання"
DCS_nf_e056_desc:0 "Хоча в ПСП майже немає кораблів для захисту своїх берегів, Поселення Делмарви брали участь у кількох спільних навчаннях та військово-морських іграх з нашим розхлябаним флотом. Це був повчальний досвід для нас обох."
DCS_nf_e057:0 "Плоди торгівлі"
DCS_nf_e057_desc:0 "Мрія Ро стає реальністю. Торговці нещодавно повернулися зі зруйнованих узбереж Флориди з фруктом під назвою апельсин. Багато мешканців Пустки думали, що це просто смак Ментату, але солодкий цитрус справжній і пережив бомби! Як приємний бонус, випадки цинги знизилися на 67%!"
DCS_nf_e058:0 "Заміський клуб Тенпенні"
DCS_nf_e058_desc:0 "Курорт — це лише перший крок. Тенпенні планує розширити курорт до ексклюзивного заміського клубу, де еліта Пустки зможе відпочити, коли їм набридне відпочивати у своїх особняках або укріплених комплексах."
DCS_nf_e059:0 "Чому зупинятися на одному?"
DCS_nf_e059_desc:0 "Наш великий президент не дозволяє таким словам, як «нездійсненно», «більше клопоту, ніж користі» або «банкрутство місцевої економіки», завадити йому вести нашу націю до величі. У «ПСП Дейв» буде судно-близнюк, «ПСП Дейв II»!"
DCS_nf_e060:0 "Сталева війна"
DCS_nf_e060_desc:0 "Багато хто називав це безглуздою тратою життів, і, можливо, вони мали рацію. Але якщо в Пустці щось і є незмінним, так це те, що війна ніколи не змінюється."
DCS_nf_e061:0 "Прийняти лицарів пустки"
DCS_nf_e061_desc:0 "Сіммс знає, що багато Лицарів у Братстві Лайонса приєдналися, щоб захищати Столичну Пустку від таких речей, як супермутанти та рейдери. То чому б не дозволити їм продовжувати це робити?"
DCS_nf_e062:0 "Хлопці з пустки обходяться"
DCS_nf_e062_desc:0 "Багато лазерних гвинтівок Братства були пошкоджені до непридатності в бою або через диверсії. Але те, що річ розбита вщент, ніколи не зупиняло мешканця Пустки раніше."
DCS_nf_e063:0 "Зачистка тунелів"
DCS_nf_e063_desc:0 "Братство завжди виступало проти зачистки тунелів метро через страх «обвалів» або «пробудження довоєнних жахів». Ці ризики можуть бути присутніми, але Дядько Ро знає, що ризик є невід'ємною частиною бізнесу."
DCS_nf_e064:0 "Торгівля з підземеллям"
DCS_nf_e064_desc:0 "Деякі торговці можуть насміхатися з торгівлі з ґулями, але їхні кришки витрачаються так само добре, як і чужі."
DCS_nf_e065:0 "Вшанувати наших героїв"
DCS_nf_e065_desc:0 "Ця війна забрала багато в усіх, але ми не можемо забути тих, хто пожертвував найбільше. Тих, хто втратив життя, або бився найнаполегливіше, і хто міг би забути величезні жертви, які приніс президент Дейв, щоб забезпечити нашу перемогу в цій війні?"
DCS_nf_e066:0 "Яскравий приклад пусткової демократії"
DCS_nf_e066_desc:0 "Уся ця силова броня Братства, що валяється навколо, добре б виглядала між президентом Дейвом і небезпекою."
DCS_nf_e067:0 "Воєнні трофеї"
DCS_nf_e067_desc:0 "Війна завжди була хорошим бізнесом, і ці гори захопленої зброї Братства можуть принести нам багато кришок."
DCS_nf_e068:0 "Проблема підземелля"
DCS_nf_e068_desc:0 "Велике поселення, повне гулів, становить загрозу для всіх у Столичній Пустці? А що, якщо вони раптом усі здичавіють, або якщо вони вирішать, що їм не подобається, коли їх називають гнилими зомбі, і почнуть стріляти в справжніх людей?"
DCS_nf_e069:0 "[DCS_nf_e069_scripted_loc]"
DCS_nf_e069_default:0 "Майбутнє Цитаделі"
DCS_nf_e069_dave:0 "Депортувати БС"
DCS_nf_e069_desc:0 "Цитадель зараз здебільшого порожня, окрім гарнізону ополченців, які не дають рейдерам або пустковим тварюкам оселитися там. Нам потрібно вирішити, що ми робитимемо з цим місцем."
DCS_nf_e070:0 "Провести інвентаризацію"
DCS_nf_e070_desc:0 "Окрім спорядження, зібраного з полів битв і зброї, що здалася, у Цитаделі є скарбниця зброї."
DCS_nf_e071:0 "Вивчити архіви"
DCS_nf_e071_desc:0 "Багато баз даних Цитаделі було знищено в боях або в результаті диверсій, але в тому, що залишилося, все ще є цінні дані."
DCS_nf_e072:0 "Улюблений діджей усіх"
DCS_nf_e072_desc:0 "Що сталося з Тридогом після того, як Братство вигнали з Радіо Новин Галактики?"
DCS_nf_e073:0 "Запросити Рівет-Сіті"
DCS_nf_e073_desc:0 "Рівет-Сіті був взірцем цивілізації в Столичній Пустці десятиліттями. Нам слід запросити їх приєднатися до нашої ради."
DCS_nf_e074:0 "Допомогти з ремонтом"
DCS_nf_e074_desc:0 "Незважаючи на всі ресурси, що надходять до Рівет-Сіті через торгівлю, вони все ще борються з важким завданням підтримки на плаву стародавнього корабля, який вони називають домом. Як хороші сусіди, ми повинні простягнути руку допомоги."
DCS_nf_e075:0 "Інтегрувати сили безпеки"
DCS_nf_e075_desc:0 "З нашими солдатами, які стежать за рейдерами, чи справді їм усе ще потрібна величезна армія для захисту свого корабля?"
DCS_nf_e076:0 "Представник міста"
DCS_nf_e076_desc:0 "Особа, яку Рівет-Сіті надіслав представляти свої інтереси перед радою, принесла до столу набагато більше, ніж просто це. Люди починають довіряти цій особі і звертаються до неї за порадою з питань, що стосуються їхніх власних поселень!"
DCS_nf_e077:0 "Найяскравіші уми столиці"
DCS_nf_e077_desc:0 "Рівет-Сіті є домом для найяскравіших умів, за очевидним винятком Братства. Співпраця не могла б принести нам нічого, крім добра."

###Events###
DCS_nf_events.1.title:0 "Обурення Дейва"
DCS_nf_events.1.desc:0 "Оскільки нещодавні вибори пройшли без проблем, багато хто з нетерпінням чекав подальшої співпраці між Поселеннями Столичної Пустки. Винятком став президент Дейв з Республіки Дейва та його прихильники. Лідер невеликого поселення відмовляється визнати свою поразку і називає вибори фарсом, який, очевидно, був сфальсифікований або погано проведений. Якби тільки його поселення мало проблеми з результатами виборів, це не було б проблемою. Однак він зібрав велику кількість інших віддалених мешканців Пустки, які вважають, що більші поселення мають занадто велику владу. Існує занепокоєння, що це може призвести до втрати довіри до альянсу або навіть перерости в насильство. Ми повинні діяти відповідно."
DCS_nf_events.1.a:0 "Запропонувати Дейву постійне місце в раді"
DCS_nf_events.1.b:0 "Просто ігнорувати його"
DCS_nf_events.1.c:0 "ЗА ПРЕЗИДЕНТА!"
DCS_nf_events.2.title:0 "Співпраця Торговців"
DCS_nf_events.2.desc:0 "Ернест Ро виріс серед караванів і завжди мав хист до торгівлі. Роками наполегливої праці він накопичив достатньо, щоб створити торговий пост у Громаді Кентербері, але це був лише початок. Ро завжди мав бажання допомогти великим торговцям Столичної Пустки працювати разом, щоб вони могли глибше заглибитися у свої відповідні ніші та забезпечити кращий вибір для споживача. Ро знав, що якщо йому вдасться залучити одного з цих торговців, решта легко підуть за ним, але йому справді потрібно було подумати, до кого він звернеться першим. Щасливчик Гарріт був доброзичливим, але його бізнес зі зброєю вже процвітав, і ризик заради трохи кращого результату міг його не привабити. Кроу був солідним бізнесменом, і його караван одягу йшов добре, але колишній шаман міг витлумачити дивне передвістя і відмовитися. Док Хофф був ще одним солідним бізнесменом, але він завжди був трохи скептичним щодо майбутнього. Останнім був торговець мотлохом Божевільний Вольфґанґ, незважаючи на його ексцентричну персону, він був розумним хлопцем і, можливо, його можна було б переконати."
DCS_nf_events.2.a:0 "Він спочатку запитав Щасливчика Гарріта"
DCS_nf_events.2.b:0 "Кроу був його першим вибором"
DCS_nf_events.2.c:0 "Якби він міг переконати Дока Хоффа, він міг би переконати кого завгодно"
DCS_nf_events.2.d:0 "Божевільний Вольфґанґ був першим, хто приєднався"
DCS_nf_events.3.title:0 "Руїни Бетесди"
DCS_nf_events.3.desc:0 "Рейдери Столичної Пустки завжди були проблемою для караванів, але деякі з них уклали угоди платити данину і продавати товари зі знижкою в обмін на безпечний прохід. Це добре працювало для торгового колективу, поки особливо неприємна банда не оселилася в старих руїнах Бетесди. Їм було байдуже до данини, і вони стріляли по будь-яких караванах, що проходили повз. Без безпечного маршруту через ці руїни торговий колектив змушений був обирати небезпечніші або довші шляхи і зазнав падіння прибутків. Дядько Ро знав, що ця проблема тільки погіршуватиметься, і почав звертатися до інших поселень зі своїми друзями-торговцями, просячи допомоги у вигнанні рейдерів з руїн. Кожне поселення виділило кілька людей, але містечко, яке взяло на себе керівництво, було..."
DCS_nf_events.3.a:0 "Вежа Тенпенні з важкоозброєною охороною"
DCS_nf_events.3.b:0 "Мегатонна з друзями-регуляторами Сіммса"
DCS_nf_events.3.c:0 "Громада Кентербері з найманими найманцями"
DCS_nf_events.3.d:0 "Республіка Дейва зі старими друзями Дейва"
DCS_nf_events.4.title:0 "Перша рада"
DCS_nf_events.4.desc:0 "Рейдери в Руїнах Бетесди навряд чи були готові до сили об'єднаних зусиль кількох поселень і були швидко вигнані з Руїн Бетесди. Різні поселення Столичної Пустки усвідомили, чого можна досягти, якщо працювати разом. Через кілька місяців лідери з різних поселень зібралися разом і говорили про створення конфедерації поселень. Поселення підтримували б одне одного у взаємній обороні, чесній торгівлі та інших питаннях. Головним серед них усіх був основоположний принцип..."
DCS_nf_events.4.a:0 "Колективна оборона"
DCS_nf_events.4.b:0 "Торговельне партнерство"
DCS_nf_events.4.c:0 "Індивідуальна свобода"
DCS_nf_events.5.title:0 "Друга рада"
DCS_nf_events.5.desc:0 "Наступні роки для Поселень Столичної Пустки були нелегкими, але вони були кращими за попередні роки. Рейдери Столичної Пустки були значною мірою вигнані з територій між Вежею Тенпенні та Республікою Дейва. Атаки супермутантів стали менш частими, хоча багато хто приписував це постійній кампанії Братства проти них. Звісно, торгівля процвітала, і якість життя в поселеннях трохи підвищилася. Коли лідери поселень знову зустрілися, щоб обговорити майбутнє, виникла ідея мати єдиного лідера для нагляду за ширшими справами, які виходили за межі окремого поселення. Після інтенсивних дискусій було вирішено провести вибори. Кандидатами стали Лукас Сіммс з Мегатонни, Дядько Ро з Громади Кентербері, Алістер Тенпенні з Вежі Тенпенні та Дейв з Республіки Дейва."
DCS_nf_events.5.a:0 "Цікаво, хто переможе?"
DCS_nf_events.6.title:0 "Великі проблеми"
DCS_nf_events.6.desc:0 "Велике Містечко, незважаючи на свою назву, не є дуже великим поселенням. Невелике зібрання будинків колишніх мешканців Літл-Лемплайт знаходиться трохи між Мегатонною та Арефу. Зазвичай цей район вважається відносно безпечним за мірками пустки, але оскільки поселення не добре укріплене і не захищене, вони постійно зазнають нападів. І супермутанти, і рейдери з Парадайз-Фоллз атакують поселення, намагаючись витягти їхніх громадян для своїх цілей. Жителі Великого Містечка благали Поселення Столичної Пустки про підтримку. Рада зайшла в глухий кут між двома варіантами того, як допомогти поселенню. Тенпенні пропонує переселити людей в інші поселення, за умови, що вони не переїжджають до його вежі. Але Лукас Сіммс хоче укріпити поселення і забезпечити його охоронцями, щоб вони могли відбиватися від атак. Зрештою, якщо Велике Містечко впаде, кого мутанти та работорговці оберуть наступною мішенню?"
DCS_nf_events.6.a:0 "Переселити жителів Великого Містечка"
DCS_nf_events.6.b:0 "Підтримати Велике Містечко"
DCS_nf_events.7.title:0 "Битва за Джермантаун"
DCS_nf_events.7.desc:0 "Після відбиття численних атак мутантів і одного набігу работорговців, наше ополчення було готове дати бій гнізду супермутантів у старій поліцейській дільниці Джермантауна. Битва з супермутантами на їхній території була чимось, що мало хто поза Братством коли-небудь робив, якби міг цього уникнути, але якщо ми хочемо зберегти Велике Містечко в безпеці, ми повинні це зробити. Наші сили змогли зачистити територію від мутантів і зараз доповідають."
DCS_nf_events.7.a:0 "Ми їм справді показали!"
DCS_nf_events.7.b:0 "Це було важко, але ми це зробили"
DCS_nf_events.7.c:0 "Ми зазнали важких втрат, але це зроблено"
DCS_nf_events.7.d:0 "Ми перемогли, але якою ціною?"
DCS_nf_events.8.title:0 "Супергеройські проблеми"
DCS_nf_events.8.desc:0 "Громада Кентербері вже кілька місяців потерпає від божевільної жінки та її армії мурах. Вони були не набагато більше, ніж неприємністю, і могли б стати потенційною туристичною визначною пам'яткою, якби все зробити правильно, але потім одна з її мурах знищила улюбленого робота Скотта Воллінскі. Дивний самітник потім почав називати себе Механістом і почав битися з божевільною «Антагонізеркою» на вулицях Громади Кентербері. Бійки завжди закінчуються внічию, і досі постраждало лише майно, але бійки стають все масштабнішими, і це лише питання часу, коли хтось постраждає. Дядько Ро хоче відправити трохи ополченців, щоб убити Антагонізерку, сподіваючись, що це змусить його оманливого громадянина заспокоїтися. Тенпенні бачить речі інакше. Він хвилюється, що якщо в цього Механіста колись закінчаться машини, він звернеться до старої фабрики RobCo, і тоді це стане проблемою Тенпенні. Тож він пропонує відправити трохи охоронців, щоб розібратися з Механістом, і запропонувати його тіло Антагонізерці як плату за те, щоб вона залишила територію."
DCS_nf_events.8.a:0 "Полювати на Антагонізерку"
DCS_nf_events.8.b:0 "Націлитися на Механіста"
DCS_nf_events.9.title:0 "Сімейні проблеми"
DCS_nf_events.9.desc:0 "Невелике поселення Арефу повідомляє про зростаючі нічні атаки якоїсь групи, яка називає себе «Сім'я». Ці нічні хулігани налякали Іва Кінга та його громадян до смерті, тому ми відправили кількох людей перевірити це. Наші розвідники не зустріли пострілів, і було розпочато діалог з лідером Сім'ї, Венсом. Хоча група дивна і, здається, віддає перевагу питтю крові над їжею, вони не є бездумними канібалами. Лукас Сіммс проти ідеї дозволити цим людям легко відбутися після того, що вони зробили з Арефу, але Дядько Ро відчуває, що тут назріває бізнес-угода. Він думає, що можна заробити багато кришок, продаючи пакети з кров'ю Венсу та його групі, і, можливо, вони могли б охороняти Арефу в обмін на деякі з них."
DCS_nf_events.9.a:0 "Вбити вампірів"
DCS_nf_events.9.b:0 "Примиритися з Сім'єю"
DCS_nf_events.10.title:0 "Ультра-Джет?"
DCS_nf_events.10.desc:0 "З поширенням новин про те, що станція Північно-Західна Сенека безпечна для життя, деякі люди почали переїжджати і претендувати на різні зали. Команда, відправлена зачистити гніздо болотників, була здивована, виявивши, що в одній з таких ніш живуть двоє гулів. Гуль спочатку поставився з підозрою до нашого ополчення, але заспокоївся, коли зрозумів, що вони прийшли не красти його секрети. Він зізнався, що намагається розробити форму Джету, яка працює на гулях, і готовий платити за допомогу в його дослідженнях. Рада, природно, розділилася в цьому питанні."
DCS_nf_events.10.a:0 "Сіммс каже «ні» наркотикам"
DCS_nf_events.10.b:0 "Дядько Ро відчуває невикористаний ринок"
DCS_nf_events.11.title:0 "Безпечний притулок для гулів"
DCS_nf_events.11.desc:0 "Навіть якщо супермутанти, як правило, залишають гулів у спокої, є багато інших небезпек, які заважають більшості гулів Столичної Пустки дістатися до Підземелля. Не дуже привітні в інших поселеннях, гулі, як правило, важко живеться в пустці. Здається, тепер багато хто з них переїжджає в тунелі, що залишилися порожніми після знищення Сім'ї. Це «Нове Підземелля», як його називають, швидко зростає, і звичайні мешканці Пустки раді, що в їхніх містечках стає менше гулів."
DCS_nf_events.11.a:0 "З очей геть, з серця геть"
DCS_nf_events.12.title:0 "Зміна планів?"
DCS_nf_events.12.desc:0 "Містер Берк місяцями готувався. Було встановлено контакти, закуплено обладнання та задокументовано патрулі охорони. Хоча Тенпенні добре йому платив, він буде в люті, якщо вся ця робота пішла нанівець тільки тому, що Тенпенні виграв вибори і тепер має правити цими дикунами. Тим не менш, був шанс, що коли він скаже Тенпенні, що все готове, той скасує це."
DCS_nf_events.12.a:0 "Тенпенні передумав"
DCS_nf_events.12.b:0 "Мегатонна все одно буде знищена"
DCS_nf_events.13.title:0 "Інцидент у Мегатонні"
DCS_nf_events.13.desc:0 "Бомбу в Мегатонні було підірвано минулої ночі після того, як наш диверсант відійшов на безпечну відстань від міста. Спалах світла та вогняну кулю можна було побачити з усіх куточків Столичної Пустки, коли вона стерла те огидне місце, відоме як Мегатонна, з лиця землі. Хоча сотні втрачених душ були трагедією, ви не можете стояти на шляху прогресу. Невирішені питання вирішуються прямо зараз, і містер Берк вже сфабрикував докази того, що атаку здійснили рейдери. Наступними днями містер Тенпенні звернеться до поселень і розповість їм, хто насправді їхній ворог."
DCS_nf_events.13.a:0 "Рейдери, які це зробили, заплатять"
DCS_nf_events.131.title:0 "О НІ, КЛЯТА БОМБА ВИБУХНУЛА!!!!!!!"
DCS_nf_events.131.desc:0 "Купа прикрих малюків-бебі зробили так, що Мегатонна втратила свої позиції. Мегатонну підірвали, і це було зовсім не круто, без перебільшення. Тенпенні повністю втратив самовладання і каже, що ПСП порішать цих дурнів, реально."
DCS_nf_events.131.a:0 "ВИБУХОВІ РЕЙДЕРСЬКІ ОСЕРЕДКИ ЗРОБИЛИ ЦЕ!"
DCS_nf_events.14.title:0 "МегаТен"
DCS_nf_events.14.desc:0 "Там, де колись було іржаве огидне місце, побудоване навколо бомби, тепер є трохи менш іржаве поселення, все ще побудоване навколо бомби. Це зайняло місяці зусиль людей з усієї пустки, але Мегатонна нарешті стала поселенням, яке Тенпенні може з радістю бачити на горизонті. Безсумнівно, мешканці Пустки також оцінять зусилля з реконструкції Мегатонни в нещодавно перейменований МегаТен."
DCS_nf_events.14.a:0 "Це набагато краще, ніж підривати її"
DCS_nf_events.15.title:0 "Меморіал Мегатонни завершено"
DCS_nf_events.15.desc:0 "У руїнах Спрінгвейлу, трохи далі за старим місцем розташування Мегатонни, тепер є бетонна плита з іменами сотень громадян Мегатонни, загиблих під час вибуху. Він навряд чи матиме багато відвідувачів через близькість до радіоактивного кратера, але люди Поселень Столичної Пустки почуваються трохи краще і цінують свого лідера за те, що він заплатив за пам'ятник."
DCS_nf_events.15.a:0 "Найкращі 100 кришок, які я колись витрачав"
DCS_nf_events.16.title:0 "Гулі в НАШІЙ вежі?"
DCS_nf_events.16.desc:0 "Гуль на ім'я Рой Філліпс вже тижнями докучає біля воріт Вежі Тенпенні. Кожного дня цей зомбі шкутильгає до переговорного пристрою і вимагає дозволити йому придбати кімнату для себе та своїх виродкуватих друзів. Скільки б разів Ґуставо не проганяв його, цей мутований виродок просто не розуміє. Чутки про щоденний інцидент поширилися за межі вежі, і тепер інші поселення говорять про протистояння. Тенпенні опублікував офіційну заяву, що зомбі не допускаються в його вежу, і що він візьме наступні кілька тижнів, щоб знайти проактивні рішення «ґульського питання»."
DCS_nf_events.16.a:0 "Нарешті, рішення"
DCS_nf_events.17.title:0 "Зомбі заборонені"
DCS_nf_events.17.desc:0 "Як перший крок до вирішення проблеми гулів, Тенпенні відправив команду ополченців зачистити тунелі найближчої станції метро. На додаток до диких, яких вони очікували, вони знайшли Роя Філліпса та його послідовників. Знайти зомбі, які ховаються в тунелі, не було нічого несподіваного, але дивним було те, що гулі планували випустити диких на невинних громадян Вежі Тенпенні! Новини про цю різанину, яка ледь не сталася, поширилися далеко й широко, і та невелика громадська підтримка, яка була в гулів, просто зникла. Тенпенні обіцяє ретельне розслідування та нові закони, щоб гарантувати, що таке ніколи не повториться в жодній частині Поселень Столичної Пустки."
DCS_nf_events.17.a:0 "Уявіть, якби вони досягли успіху!"
DCS_nf_events.18.title:0 "Форт Константин"
DCS_nf_events.18.desc:0 "Роки тому Тенпенні відправив команду шукачів дослідити Форт Константин. Експедиція закінчилася катастрофою: половина команди загинула, і Тенпенні списав все це як втрату, але тепер, з ресурсами Поселень Столичної Пустки, Тенпенні готовий спробувати знову."
DCS_nf_events.18.a:0 "Ми їх виженемо!"
DCS_nf_events.18.b:0 "Ми не можемо зв'язуватися з Братством. Просто прокрадись і забери, що зможеш."
DCS_nf_events.18.c:0 "Добре, що це під нашим контролем!"
DCS_nf_events.19.title:0 "Розділ перший"
DCS_nf_events.19.desc:0 "Дослідження для першого розділу «Посібника з виживання в пустці» триває. На який розділ нам відправити когось із наших ополченців?"
DCS_nf_events.19.a:0 "Пошук їжі"
DCS_nf_events.19.b:0 "Боротьба з радіацією"
DCS_nf_events.19.c:0 "Перетин мінного поля"
DCS_nf_events.20.title:0 "Розділ другий"
DCS_nf_events.20.desc:0 "Після завершення досліджень для першого розділу, настав час перейти до другого. Куди нам спрямувати наші зусилля?"
DCS_nf_events.20.a:0 "Тестування відлякувача кротощурів"
DCS_nf_events.20.b:0 "Дослідження болотників?"
DCS_nf_events.20.c:0 "Вивчення травм"
DCS_nf_events.21.title:0 "Розділ третій"
DCS_nf_events.21.desc:0 "Другий розділ закінчено, і тепер ми можемо перейти до останнього. Куди нам відправити наших людей?"
DCS_nf_events.21.a:0 "Вивчити історію Рівет-Сіті"
DCS_nf_events.21.b:0 "Пошук на головному комп'ютері фабрики RobCo"
DCS_nf_events.21.c:0 "Відвідати бібліотеку"
DCS_nf_events.22.title:0 "Торговельна імперія Ро"
DCS_nf_events.22.desc:0 "Торгівля тече через Столичну Пустку, як ніколи раніше, а втрати ніколи не були такими низькими. Дядько Ро виконав свою обіцянку принести процвітання Поселенням Столичної Пустки і поклав собі в кишеню лише скромний відсоток, краще, ніж можна очікувати від більшості бізнесменів або політиків."
DCS_nf_events.22.a:0 "Ми в плюсі!"
DCS_nf_events.23.title:0 "Які наші стандарти?"
DCS_nf_events.23.desc:0 "Створення стандартного караванного спорядження для наших охоронців може мати багато переваг, а також залишкове спорядження для наших сил, вартість є важливим фактором, який слід враховувати. Чи справді нам потрібно екіпірувати наших охоронців караванів і солдатів у довоєнну бойову броню? Це дуже дорого."
DCS_nf_events.23.a:0 "Вибрати того, хто запропонує найнижчу ціну"
DCS_nf_events.23.b:0 "Зупинімося на золотій середині"
DCS_nf_events.23.c:0 "Тільки найкраще для наших хоробрих охоронців"
DCS_nf_events.24.title:0 "Законники в беззаконній землі"
DCS_nf_events.24.desc:0 "Регулятори намагалися очистити Столичну Пустку довше, ніж хтось може пам'ятати. Незважаючи на значну чисельну перевагу, вони вселили страх у серця рейдерів, работорговців та всіх інших дияволів пустки. Однак вони в основному працювали на самоті. Тепер, коли один з їхніх сидить на чолі нашого уряду, вони зігріваються до ідеї тісної співпраці з нашим ополченням."
DCS_nf_events.24.a:0 "Ми врятуємо пустки разом!"
DCS_nf_events.25.title:0 "Диверсія?"
DCS_nf_events.25.desc:0 "Охоронець Мегатонни вийшов на перерву, коли знайшов дивного чужинця, який колупався у величезній бомбі в центрі міста, і негайно заарештував його. Після кількох годин допиту Лукас Сіммс з'ясував, що божевільного підривника найняла людина Тенпенні, містер Берк, щоб підірвати бомбу. З підписаним зізнанням у руках Лукас Сіммс збирає загін, щоб притягнути Тенпенні до відповідальності."
DCS_nf_events.25.a:0 "Який хворий виродок знищить місто за 1000 кришок?"
DCS_nf_events.26.title:0 "Справедливість пустки"
DCS_nf_events.26.desc:0 "Люди Тенпенні знали, що ополчення ПСП наближається, і вони чинили шалений опір. У хаосі містер Берк уникнув арешту, але Тенпенні просто сидів і чекав на вершині своєї вежі. З Тенпенні під вартою, Лукас Сіммс стоїть перед вибором. Майже кожна кістка в тілі Сіммса закликає Тенпенні зустріти стару добру справедливість пустки від дула його пістолета, але Тенпенні запропонував місцезнаходження значної схованки з кришками в обмін на вигнання. Сіммс ніколи не піддавався на хабарі в минулому, але це було інше. Ці кришки пішли б не йому, така сума кришок могла б покращити життя людей, про яких він тепер піклується."
DCS_nf_events.26.a:0 "Жодних угод з таким покидьком, як Тенпенні!"
DCS_nf_events.26.b:0 "Він, мабуть, помре у вигнанні... правда?"
DCS_nf_events.27.title:0 "Нова вежа"
DCS_nf_events.27.desc:0 "Тенпенні більше немає, і тепер комусь новому потрібно керувати вежею. Звузити величезний пул добровольців було нелегко, але вибір звузився до трьох варіантів. Авантюрист на пенсії Герберт «Дерінг» Дешвуд, власник бізнесу у вежі Ченг, або Рой Філліпс, гуль, який хотів привести свій народ до вежі. Чесно кажучи, цей останній варіант здавався більше спробою досадити пам'яті Тенпенні, ніж чимось іншим, але він пообіцяв бути справедливим до нинішніх мешканців."
DCS_nf_events.27.a:0 "Візьмемо Дешвуда"
DCS_nf_events.27.b:0 "Здається, у Ченга є ідеї"
DCS_nf_events.27.c:0 "Філліпс здається сумнівним, але варто спробувати"
DCS_nf_events.28.title:0 "Вільні вибори!"
DCS_nf_events.28.desc:0 "Президент Дейв сьогодні випустив заяву, в якій пообіцяв покінчити з корупцією та хитрими махінаціями, які зіпсували минулі вибори, перш ніж він зайняв своє законне місце президента. Його першим кроком було призначити дату наступних виборів через 4 роки. Звісно, щоб гарантувати, що все на виборах буде прозоро, голосувати зможуть лише громадяни Республіки Дейва. Дейв, у своїй мудрості, на крок випередив критиків і додав до своєї заяви, що будь-який громадянин ПСП може подати заяву на громадянство, за умови сплати відповідного збору за обробку та складання іспиту на громадянство."
DCS_nf_events.28.a:0 "Демократія жива і процвітає завдяки Дейву!"
DCS_nf_events.29.title:0 "Гідні подяки"
DCS_nf_events.29.desc:0 "Останнім часом для Поселень Столичної Пустки настали важкі часи. Корумповані чиновники та деспоти намагалися підірвати нашу демократію сфальсифікованими виборами, що, на жаль, призвело до кровопролиття. Все для Поселень Столичної Пустки могло б там і закінчитися, якби не одна велика людина, наш президент. Президент Дейв провів нас через темні часи, принісши безпеку та стабільність у нашу землю. За допомогою своєї могутньої армії наш президент тримає рейдерів на відстані та захищає наші дороги. Без його лідерства ми досі були б під п'ятою злочинців, таких як Лукас Сіммс і Дядько Ро, тому він заслуговує на нашу подяку!"
DCS_nf_events.29.a:0 "Дякуємо тобі, президенте Дейв!"
DCS_nf_events.30.title:0 "Аболіціоністи"
DCS_nf_events.30.desc:0 "Група рабів-утікачів прийшла до нас просити допомоги. У них закінчуються місця, де сховатися, і їм потрібно боротися з работорговцями з Парадайз-Фоллз, якщо вони коли-небудь хочуть бути по-справжньому вільними. Їхній лідер Ганнібал Гемлін благає нашого лідера дозволити рабам, яким вони допомагають, знаходити притулок у наших поселеннях, він і його люди обіцяють підтримувати нас, якщо ми допоможемо їм у цій боротьбі проти рабства."
DCS_nf_events.30.a:0 "Ми приймемо втікачів"
DCS_nf_events.30.b:0 "Ми не можемо їх захистити, але можемо їх озброїти"
DCS_nf_events.31.title:0 "Битва за Меморіал Лінкольна"
DCS_nf_events.31.desc:0 "Два загони ополченців пішли з Ганнібалом Гемліном та його солдатами, щоб вичистити работорговців з Меморіалу Лінкольна. Вони також зіткнулися з кількома супермутантами, але змогли подолати ці дві сили та захопити меморіал для Храму Союзу."
DCS_nf_events.31.a:0 "Отримайте, работорговець!"
DCS_nf_events.31.b:0 "Ціна свободи часто оплачується кров'ю"
DCS_nf_events.31.c:0 "Дивно, що нам це вдалося"
DCS_nf_events.32.title:0 "Падіння Раю"
DCS_nf_events.32.desc:0 "Озброєні покидьки, які займали Парадайз-Фоллз, можливо, були достатніми, щоб утримати своїх жертв від думок про свободу, але вони не були готові до справжньої сили, налаштованої знищити їх. Між нашим ополченням і бійцями-втікачами Ганнібала Гемліна работорговці не мали жодного шансу. Найбільший ринок рабів на цьому боці пустки був знищений, і руїни, які вони займали, скоро будуть заселені хорошими порядними людьми."
DCS_nf_events.32.a:0 "Потужний удар по работорговцям усюди!"
DCS_nf_events.33.title:0 "Ласкаво просимо до Поселень"
DCS_nf_events.33.desc:0 "Після того, як ми зробили з бандитами з Гаррісбурга, багато хто в Джонстауні та навколишніх поселеннях побачили цінність об'єднання. Сьогодні представники з Джонстауна офіційно звернулися з проханням приєднатися до Поселень Столичної Пустки. Це перший випадок, коли така велика територія просить приєднатися до нашого альянсу, але вони схожі на нас, працьовиті люди, втомлені від того, що їх дістають рейдери."
DCS_nf_events.33.a:0 "Ласкаво просимо!"
DCS_nf_events.34.title:0 "Суперечливі історії"
DCS_nf_events.34.desc.1:0 "Розвідники повернулися з Пітта і мають що розповісти. Їх спіймали невдовзі після входу в Пітт лицарі на форпості, що охороняв залізничний тунель, через який вони пройшли. Після короткого протистояння наші розвідники назвали себе, і лицарі зв'язалися зі своєю місцевою базою для отримання інструкцій. Кілька напружених хвилин минуло, перш ніж їх змусили пройти якийсь аналіз крові та видали захисні костюми з твердими інструкціями переодягнутися в них. Лицарі, які зустріли їх біля залізничного тунелю, запевнили їх, що костюми призначені для їхньої безпеки, оскільки Пітт охоплений високоінфекційною хворобою під назвою Троглодитна Дегенеративна Контамінація, яка присутня в повітрі та воді цього району. Стан призводить до болючих виразок, а в багатьох зрештою призводить до божевілля та дегенерації в жахливих мутантів, яких називають трогами. Братство зараз працює над ліками, але до цього можуть бути ще роки. Наших розвідників провели на екскурсію вежею, колись належала Ашуру, але тепер перетвореною на герметичний об'єкт, де писарі можуть безпечно працювати над розробкою ліків від КТД. Незважаючи на численні запити, чоловікам не дозволили прямого контакту з місцевими жителями або екскурсій на фабрики, де вони працювали. Але нас запевнили, що це просто карантинний захід і для нашої безпеки. Паладін Куртс був непохитний у тому, що контакту з будь-якими місцевими жителями Пітта, яким вдалося прорвати карантин, слід уникати будь-кому в Вашингтоні. Він попросив нас допомогти в цьому, стріляючи в будь-кого, спійманого за межами Пітта з симптомами, на ураження, щоб запобігти пандемії. Він також пообіцяв нам, що будь-яка цінність, яку можна отримати від промисловості Пітта, буде передана друзям Братства, якщо ми допоможемо з їхніми зусиллями зі стримування."
DCS_nf_events.34.desc.2:0 "Розвідники повернулися з Пітта і мають що розповісти. Їх спіймали невдовзі після входу в Пітт люди, які назвали себе «Ополченням Робітників Пітта». Ополчення не було ворожим, але було насторожі. Наших людей роззброїли і привели до лідера ополчення, колишньої рабині на ім'я Мідея, яку раби називають Матір'ю Свободи. Вона привітно поставилася до наших людей і, за їхніми повідомленнями, відкрита до подальшого обговорення з нашим керівництвом. Природно, Аболіціоністи в захваті від звісток про державу звільнених рабів, яка повалила найбільшу рабовласницьку державу в цій частині пустки."
DCS_nf_events.34.desc.3:0 "Розвідники повернулися з Пітта і мають що розповісти. Їх спіймали невдовзі після входу в Пітт і атакували. Вони не змогли добре розгледіти своїх нападників, але ледве змогли вибратися живими."
DCS_nf_events.34.a:0 "Нам потрібно буде зробити вибір"
DCS_nf_events.35.title:0 "Дім жахів"
DCS_nf_events.35.desc:0 "Ми нарешті знайшли дім супермутантів. Поза всяким сумнівом, вони приходять і йдуть зі Сховища 87, і хоча ми не можемо пройти через головний вхід, ми впевнені, що є обхідний шлях у це місце. Єдина проблема полягає в тому, що в цьому районі вже є інші групи, і ми не можемо просто ввійти з армією, кажучи їм, що ми там з поважної причини."
DCS_nf_events.35.a:0 "Нам потрібно буде спочатку увійти"
DCS_nf_events.35.b:0 "Скажіть Братству, що там є!"
DCS_nf_events.36.title:0 "Літл-Лемплайт"
DCS_nf_events.36.desc:0 "Ми знали, що люди з Великого Містечка прийшли з місця під назвою Літл-Лемплайт, тому, мабуть, нам варто було скласти два і два і зрозуміти, що коли ми ввійшли в Печери Ламплайту, ми входили в містечко важкоозброєних дітей, які з підозрою ставляться до «мунґосів», подібних до нас. На щастя, не було жодного насильства, але мер сумнівається, що ми зможемо впоратися з мутантами у Сховищі 87. Він хоче гарантій."
DCS_nf_events.36.a:0 "Заплатити за прохід"
DCS_nf_events.36.b:0 "Відправити більше людей, щоб допомогти їм охороняти задні ворота"
DCS_nf_events.36.c:0 "Діти люблять роботів, правда? Нехай Механіст переконає їх"
DCS_nf_events.37.title:0 "Останній штурм"
DCS_nf_events.37.desc:0 "Кожен чоловік і жінка, які йшли в це жахливе сховище, знали, що вони, швидше за все, не повернуться, і багато хто не повернувся. Але ми можемо втішатися тим, що їхні жертви не були марними. Загрозу супермутантів у Столичній Пустці зупинено. Хоча мутанти все ще є, інструменти, які вони використовували для розмноження, були знищені. Незабаром постійний жах загрози мутантів стане не більше ніж поганим спогадом."
DCS_nf_events.37.a:0 "Нарешті все скінчилося"
DCS_nf_events.37.b:0 "Нарешті все скінчилося"
DCS_nf_events.37.c:0 "Нарешті все скінчилося"
DCS_nf_events.37.d:0 "Нарешті все скінчилося"
DCS_nf_events.38.title:0 "Анклав переможено?"
DCS_nf_events.38.desc:0 "Анклав вигнано зі Столичної Пустки, і, схоже, ми нарешті можемо зітхнути з полегшенням. Братство попереджає, що Анклав все ще може бути десь там, але ми вже перемогли їх один раз. Ми повинні зможемо зробити це знову, правда?"
DCS_nf_events.38.a:0 "Ми будемо готові"
DCS_nf_events.39.title:0 "Форт Банністер"
DCS_nf_events.39.desc:0 "Колишній форт Компанії Кіготь тепер під нашим контролем. Останні зачистки підтверджують, що всередині об'єкта немає жодного ворожого солдата чи збійного охоронного бота. Тепер ми повинні вирішити, що робити з цим місцем. Деякі думають, що нам би знадобилася фортеця на нашому західному кордоні, а інші стверджують, що брухт, який можна витягти з цього місця, переважує будь-які переваги безпеки від його відновлення."
DCS_nf_events.39.a:0 "Форт Банністер захищатиме наш західний кордон!"
DCS_nf_events.39.b:0 "Витягни з цього місця все, що зможеш!"
DCS_nf_events.40.title:0 "Послання миру"
DCS_nf_events.40.desc:0 "Після тижнів спроб і помилок ми нарешті отримали доступ до радіосигналу Сховища 101. Це дуже важливий момент. Окрім кількох людей, які залишали це місце протягом десятиліть, було дуже мало взаємодії з цими людьми, і якщо ми справимо погане враження, ми можемо закрити їх від пустки ще на 200 років!"
DCS_nf_events.40.a:0 "Запропонувати співіснування та торгівлю"
DCS_nf_events.40.b:0 "Переконати їх приєднатися до конфедерації"
DCS_nf_events.41.title:0 "Обгорілі будинки та порожні вулиці"
DCS_nf_events.41.desc:0 "Після того, як кілька торговців зникли по дорозі до Грейдіча, це місце здебільшого уникали, ходили чутки про те, що саме його спричинило. Війська, які ми відправили розслідувати поселення, розвіяли ці чутки, виявивши, що місце кишить гігантськими вогнедишними мурахами. Після важкого бою, щоб зачистити частину містечка, вони знайшли вченого, який ховався в халупі, і, схоже, він стоїть за всім цим фіаско. За словами цього доктора Леско, він просто намагався зменшити розмір мурах за допомогою генетики і якось зіпсував це, через що вони почали дихати вогнем. Він наполягає, що міг би це виправити, якби ми просто дали йому трохи підтримки, але чи можемо ми довіряти, що він не зробить їх удвічі більшими або не навчить стріляти лазерами з очей, поки він цим займається?"
DCS_nf_events.41.a:0 "Просто відправ ополчення"
DCS_nf_events.41.b:0 "Механіст знає, як боротися з мурахами!"
DCS_nf_events.41.c:0 "Давайте дамо Леско шанс"
DCS_nf_events.42.title:0 "Доля Леско"
DCS_nf_events.42.desc:0 "Ситуація в Грейдічі, можливо, була нещасним випадком, але на руках доктора Леско все ще кров десятків невинних. Нам вирішувати, що робити з цим ученим."
DCS_nf_events.42.a:0 "Стратити його за його злочини"
DCS_nf_events.42.b:0 "Дозволити йому спробувати зробити щось добре"
DCS_nf_events.43.title:0 "Несподівані гості"
DCS_nf_events.43.desc:0 "Коли наші пошукові команди копали в нижні рівні арсеналу Вітона, до бази підійшов невеликий загін Вигнанців Братства. Вигнанці прийшли заявити права на те, що лежить унизу в руїнах, і запропонували кришки в обмін на здобич. Шукачі кажуть, що це справедлива плата за здобич, і деякі з них сказали, що Вигнанці є хорошими торговими партнерами для випадкового техно-мотлоху, який вони знаходять у руїнах Вашингтона. Однак, якщо ми дозволимо цим людям штовхати нас зараз, чого вони очікуватимуть пізніше?"
DCS_nf_events.43.a:0 "Продати все, що там унизу"
DCS_nf_events.43.b:0 "Сказати їм забиратися!"
DCS_nf_events.44.title:0 "Фабрика роботів"
DCS_nf_events.44.desc:0 "Фабрика RobCo була повна божевільних роботів і тварин Пустки, але нічого, з чим наші люди не стикалися раніше. За кілька годин вся фабрика, здається, зачищена від роботів, і ми готові відправити пошукові команди."
DCS_nf_events.44.a:0 "Гарна робота"
DCS_nf_events.45.title:0 "Полювання на кігтів смерті"
DCS_nf_events.45.desc:0 "Потрібен дуже особливий вид божевілля, щоб полювати на кігтів смерті. На щастя, пустка повна божевільних. Ми зібрали команду крутих виродків, які прагнуть довести свою доблесть, полюючи на цих звірів і нарешті зачистивши Олд-Олні. Нам просто потрібен план."
DCS_nf_events.45.a:0 "Просто продовжуйте стріляти, поки вони не помруть!"
DCS_nf_events.45.b:0 "Заманити їх у вибухові пастки"
DCS_nf_events.45.c:0 "Вдарити по них здалеку з важкої зброї"
DCS_nf_events.45.d:0 "Розбомбити їх!"
DCS_nf_events.46.title:0 "У руїни"
DCS_nf_events.46.desc:0 "Незважаючи на те, що роками Олд-Олні кишів кігтями смерті, його руїни не в гіршому стані, ніж більшість інших довоєнних руїн. Під містом є навіть стара електростанція, яка, здається, живила більшу частину району. Незважаючи на наші обмежені ресурси, у нас є кілька варіантів того, що робити з містечком. Ми могли б відремонтувати його для людей, щоб оселитися, відновити якомога більше електростанції, або ми могли б просто перетворити все містечко на одну велику операцію зі збору брухту."
DCS_nf_events.46.a:0 "Повернути містечко людям!"
DCS_nf_events.46.b:0 "Перезапустити генератори!"
DCS_nf_events.46.c:0 "Витягнути все, що зможеш, з руїн"
DCS_nf_events.47.title:0 "Ха-ха-ха Гаааааріііііі"
DCS_nf_events.47.desc:0 "Нашу команду, відправлену в Сховище 108, майже одразу атакувала купа клонованих мешканців сховища, які постійно кричали «Ґарі». На щастя, клони були не дуже добре озброєні, тому втрат не було, але це все одно було моторошно."
DCS_nf_events.47.a:0 "От чорт, це дивно."
DCS_nf_events.48.title:0 "Анклаву більше немає!"
DCS_nf_events.48.desc:0 "Мало хто міг повірити цій новині, коли GNR її оприлюднило, але минуло вже кілька днів, як востаннє бачили гвинтокрил, і люди нарешті починають вірити, що Анклав зупинено. Завдяки зусиллям наших хоробрих солдатів і наших союзників Анклав більше не становитиме загрози для людей Столичної Пустки. Багато хто загинув у боях, але їхня жертва купила нам світліше майбутнє. Хоча деякі хвилюються про інші зовнішні загрози, або задаються питанням про наші відносини з Братством Сталі, багато хто незвично оптимістичний. Зрештою, ми щойно перемогли найдосконалішу армію в пустці, яку загрозу становлять кілька обдовбаних рейдерів?"
DCS_nf_events.48.a:0 "Ми можемо зітхнути з полегшенням... поки що"
DCS_nf_events.49.title:0 "Стоячи на самоті"
DCS_nf_events.49.desc:0 "Нам не потрібен жоден союз з Братством. Вони можуть битися з супермутантами і роздавати воду, але ми не можемо стати залежними від них. Нам потрібно пам'ятати, що ми витіснили рейдерів з Бетесди, ми боролися так само наполегливо, як і вони, проти Анклаву, і ми відповідаємо за безпеку наших поселень."
DCS_nf_events.49.a:0 "ПСП чудово справляються самі!"
DCS_nf_events.50.title:0 "Мандрівна божевільна"
DCS_nf_events.50.desc:0 "Мандрівну божевільну жінку спіймали деякі наші хлопці поблизу території Поселень Столичної Пустки, або вони так думали. Коли вони влаштували пастку, жінка викликала армію мурах з-під землі. Наші хлопці були вбиті, крім одного. Його відправили назад передати повідомлення: ця «Антагонізерка», як вона себе називає, хоче приєднатися. Вона має якісь претензії до Поселень Столичної Пустки і хоче працювати з нами, щоб зробити життя цих добродіїв пекельним."
DCS_nf_events.50.a:0 "Просто... тримайте мурах подалі від хлопців"
DCS_nf_events.50.b:0 "Чорт забирай, ні, вбийте її!"
DCS_nf_events.51.title:0 "Хороша пропозиція"
DCS_nf_events.51.desc:0 "Асоціація Торговців Затоки десятиліттями контролювала більшу частину морської торгівлі на Східному узбережжі. За свої роки як торговець Дядько Ро налагодив хороші стосунки з деякими їхніми членами. Це вимагатиме використання послуг, але Дядько Ро думає, що він може отримати те, що принесе користь усім нам."
DCS_nf_events.51.a:0 "Якісь старі кораблі"
DCS_nf_events.51.b:0 "Схеми кораблів"
DCS_nf_events.51.c:0 "Сільськогосподарські секрети"
DCS_nf_events.52.title:0 "Порушений імпорт рабів"
DCS_nf_events.52.desc:0 "Работорговці з Парадайз-Фоллз кажуть нам, що їхні постачальники в Столичній Пустці втрачають каравани через місцеву міліцію. Імпорт рабів упав на 25% цього місяця, і схоже, це триватиме деякий час, поки вони не візьмуть себе в руки там, у пустці."
DCS_nf_events.52.a:0 "Ашур буде нещасливий"
DCS_nf_events.53.title:0 "Порушені каравани работорговців"
DCS_nf_events.53.desc:0 "Солдати Поселень Столичної Пустки продовжують перехоплювати наші каравани з рабами і звільняти полонених. Зараз ми втрачаємо 1 з 4 караванів через цих людей, і це дуже б'є по кришках, які ми отримуємо від продажу рабів."
DCS_nf_events.53.a:0 "Ці придурки!"
DCS_nf_events.54.title:0 "Працюєте над цим?"
DCS_nf_events.54.desc:0 "Ми розповіли Братству про лігво мутантів у Сховищі 87, і вони відповіли, що знають про ситуацію і працюють над планом знищення мутантів раз і назавжди."
DCS_nf_events.54.a:0 "Це полегшення"
DCS_nf_events.55.title:0 "Термінове повідомлення від Поселень Столичної Пустки!"
DCS_nf_events.55.desc:0 "Поселення Столичної Пустки надіслали термінове повідомлення, в якому кажуть нам, що вони виявили, що загроза супермутантів для Столичної Пустки надходить зі Сховища 87. Вони просять нас вивести наші сили з цього району і передати їм контроль над територією, щоб вони могли перекинути свої сили для боротьби із загрозою раз і назавжди. Щодо утримання території, вони вважають, що оскільки вона має для нас мало цінності, і вони ризикують своїм життям, роблячи це, вони повинні мати можливість залишити її собі."
DCS_nf_events.55.a:0 "Віддати їм територію"
DCS_nf_events.55.b:0 "Подякувати їм за інформацію, але ми тримаємо це під контролем"
DCS_nf_events.56.title:0 "Комуна Тенпенні"
DCS_nf_events.56.desc:0 "За короткий час після того, як він узяв під контроль Вежу Тенпенні, Ірвінг Ченг перетворив колись розкішне поселення на щось на кшталт комуністичної держави. Багато людей у вежі, які колись насолоджувалися життям у розкоші та дозвіллі, були швидко відправлені на «народні ферми» або призвані на службу в охорону вежі. Багато хто взяв те, що Ченг ще не конфіскував, і залишив вежу, але ті, хто залишився, здається, пристосовуються, а нещодавні від'їзди звільнили місце для знедолених мешканців Пустки, яких тепер вітають. Їм просто потрібно пам'ятати девіз Голови: усі мешканці Пустки рівні, але деякі рівніші за інших."
DCS_nf_events.56.a:0 "Дивний хлопець"
DCS_nf_events.57.title:0 "Та сама вежа, інший день"
DCS_nf_events.57.desc:0 "Герберт Дерінг Дешвуд зробив дуже мало, щоб змінити Вежу Тенпенні, і, чесно кажучи, все могло бути гірше. Він виявився трохи менш упередженим, ніж попереднє керівництво, і впустив кількох менш забезпечених мешканців Пустки, але в іншому мало що змінилося."
DCS_nf_events.57.a:0 "Схоже, ми зробили хороший вибір"
DCS_nf_events.58.title:0 "Куди вони поділися?"
DCS_nf_events.58.desc:0 "Торговці, які проходили повз Вежу Тенпенні, згадували, що багатьох звичайних торговців, з якими вони зустрічалися, ніде не було видно, і це майже виглядало так, ніби їх замінили на багатьох гулів, яких Рой заселяє у вежу. Ми відправили кількох людей перевірити, і Рой Філліпс наполягав, що попередні мешканці, швидше за все, живі та здорові, але він не знає, куди вони пішли. Він сказав, що вони просто не могли витримати життя з гулями і пішли жити десь на захід. Ми можемо тільки сподіватися, що вони не натрапили на землі Церкви Скелі."
DCS_nf_events.58.a:0 "Можливо, зомбі їх з'їли"
DCS_nf_events.59.title:0 "Репарації"
DCS_nf_events.59.desc:0 "Колишні не набагато більше, ніж різні банди анархічних психів, Бріґґс перетворив різні банди рейдерів на успішний бізнес з виробництва м'яса. Хоча люди Столичної Пустки готові відкласти страх заради смаку «Дивовижного М'яса кротощура», вони все ще не забули роки жахів. Ось чому з кожною поставкою «Дивовижного М'яса», відправленою в поселення, додаткова коробка м'яса буде відправлена для розподілу серед жертв нападів рейдерів. Ми робимо це в дусі руху вперед від минулого та продовження тривалого партнерства між нашою компанією та рештою Столичної Пустки."
DCS_nf_events.59.a:0 "Тепер ми круті, правда?"
DCS_nf_events.60.title:0 "Розвідники повертаються"
DCS_nf_events.60.desc.1:0 "Це приблизно так, як ми й очікували. Незважаючи на грандіозні обіцянки Ашура побудувати щось краще і те, що рабство було лише тимчасовим явищем, у Пітті мало що змінилося. Король рейдерів все ще править залізною рукою, і раби все ще перебувають у владі ватажків рейдерів. Якщо ми нічого не зробимо, так воно і залишиться до смерті Ашура."
DCS_nf_events.60.desc.2:0 "Ми чули, що в Пітті сталося якесь повстання рабів і Ашура було повалено. Тим не менш, нам потрібно було перевірити це самим. І добре, що ми це зробили, тому що, незважаючи на «повстання», у Пітті мало що змінилося. Цей новий хлопець, Вернер, навряд чи кращий за Ашура."
DCS_nf_events.60.a:0 "Нам потрібно щось зробити!"
DCS_nf_events.61.title:0 "Що таке КТД?"
DCS_nf_events.61.desc:0 "Залишайся в Пітті досить довго, і ти теж постраждаєш від Троглодитної Дегенеративної Контамінації, якоїсь хвороби, унікальної для Пітта. Ніхто точно не знає, що її викликає, але вона є в повітрі, воді, в усьому. Правителі Пітта працювали над ліками, вивчаючи дитину, яка народилася імунною до наслідків хвороби та радіації. На щастя, дитина пережила війну, і ми можемо продовжити з того місця, де вони зупинилися."
DCS_nf_events.61.a:0 "Це займе деякий час"
DCS_nf_events.62.title:0 "Що таке КТД?"
DCS_nf_events.62.desc:0 "Троглодитна Дегенеративна Контамінація була якоюсь хворобою, яка століттями мучила людей Пітта. Ніхто точно не знає, що її викликало, але повітря та вода в цьому районі забруднені, що призводить до того, що кожен, хто залишається там досить довго, розвиває цей стан. На щастя, ліки були розроблені завдяки вивченню дитини, народженої імунною до наслідків хвороби та радіації. Ми змогли відновити формулу ліків, тому ніхто, хто оселиться там, не повинен жити в страху перетворитися на трога."
DCS_nf_events.62.a:0 "Добре, що ми це знайшли"
DCS_nf_events.63.title:0 "Піттське Братство"
DCS_nf_events.63.desc:0 "Братство Сталі облаштувалося в Пітті після повалення попередніх правителів. Під владою Паладіна Куртса вогні промисловості Пітта все ще горять, і життя триває. Ми не впевнені, чи люди там все ще в кайданах. Але вони ж Братство, тому, мабуть, ні, правда?"
DCS_nf_events.63.a:0 "Лайонс ніколи б не поневолив людей"
DCS_nf_events.64.title:0 "Новий деспот, та сама історія"
DCS_nf_events.64.desc:0 "Ми мало знаємо про те, хто захопив владу в Пітті, оскільки жоден із наших розвідників, відправлених туди, не повернувся. Що ми знаємо, так це те, що фабрики все ще працюють і рабів все ще привозять з інших частин пустки. Ми не можемо дозволити цьому тривати."
DCS_nf_events.64.a:0 "Хто б це не був, ми їх зупинимо"
DCS_nf_events.65.title:0 "Зустріч з Паладіном Куртсом"
DCS_nf_events.65.desc:0 "Щоб заспокоїти занепокоєння Храму Союзу, ми відправили представників до Пітта, щоб спостерігати, як Паладін Куртс керує справами від імені наших друзів у Братстві. Після прибуття на околиці Пітта нашим представникам видали захисні костюми та наполегливо рекомендували переодягнутися в них. Лицарі, які зустріли їх біля залізничного тунелю, запевнили їх, що костюми призначені для їхньої безпеки, оскільки Пітт охоплений високоінфекційною хворобою під назвою Троглодитна Дегенеративна Контамінація, яка присутня в повітрі та воді цього району. Стан призводить до болючих виразок, а в багатьох зрештою призводить до божевілля та дегенерації в жахливих мутантів, яких називають трогами. Братство зараз працює над ліками, але до цього можуть бути ще роки. Нашу групу провели на екскурсію вежею, колись належала Ашуру, але тепер перетвореною на герметичний об'єкт, де писарі можуть безпечно працювати над розробкою ліків від КТД. Незважаючи на численні запити, нашим представникам не дозволили прямого контакту з місцевими жителями або екскурсій на фабрики, де вони працювали. Але нас запевнили, що це просто карантинний захід і для нашої безпеки. Паладін Куртс був непохитний у тому, що контакту з будь-якими місцевими жителями Пітта, яким вдалося прорвати карантин, слід уникати будь-кому в Вашингтоні. Він також пообіцяв нам, що будь-яка цінність, яку можна отримати від промисловості Пітта, буде передана друзям Братства, якщо ми не заважатимемо їхнім зусиллям зі стримування та не наражатимемо на ризик решту Пустки."
DCS_nf_events.65.a:0 "Ця КТД звучить небезпечно. Нам краще послухатися"
DCS_nf_events.66.title:0 "Жах"
DCS_nf_events.66.desc:0 "Братство запевнило нас, що їхнє правління в Пітті буде кращим, ніж правління Ашура. Вони сказали нам, що в Пітті була якась місцева мутагенна хвороба під назвою Троглодитна Дегенеративна Контамінація, яка потребувала карантину, і це була єдина причина, через яку ми не бачили, щоб хтось покидав Пітт. Нещодавно хтось порушив цей карантин і благав раду про допомогу. Вони кажуть, що їх звати Віллард, і вони були рабом у Пітті під час правління Ашура. Віллард стверджує, що КТД не заразна, а Паладін Куртс скористався своєю віддаленістю від решти Лайонсівського відділення, щоб перетворити Пітт на свою особисту вотчину. Віллард не довіряє Лайонсівському відділенню зробити щось, щоб зупинити Куртса, і благає нас втрутитися заради людей Пітта."
DCS_nf_events.66.a:0 "Це варто розслідувати"
DCS_nf_events.67.title:0 "Часи змінюються"
DCS_nf_events.67.desc:0 "Загроза рейдерів на історично низькому рівні, трофеї Анклаву можна знайти майже в кожному поселенні, прісна вода безкоштовна, а промисловість Пітта стимулює промислове зростання. Можна з упевненістю сказати, що справи в Столичній Пустці з кожним днем стають кращими. Те, чого ми досягли, працюючи разом, не можна применшувати, і це тільки початок. Однак із цим зростанням виникають як проблеми, так і можливості. Без рейдерів, які змушували людей ховатися за укріпленнями, міжпоселенські подорожі досягли історичного максимуму. Але де закінчуються закони поселення? Біля їхніх воріт чи біля стін іншого? А як щодо захисту цих великих ділянок пустки? Це було легко, коли всі сиділи, сховавшись за сталлю або каменем, але тепер люди розселяються, і контроль над нашими кордонами стає важливішим. Звісно, є ще ця промислова революція та її наслідки. У нас уже були скарги від деяких поселень на те, що інші скидають промислові відходи біля них. Щоб вирішити ці питання, нам потрібно буде працювати разом, йти на компроміси та розширити повноваження нашої керівної ради."
DCS_nf_events.67.a:0 "Дозвольте нам працювати разом задля світлішого майбутнього."
DCS_nf_events.68.title:0 "Книга законів"
DCS_nf_events.68.desc:0 "Хоча закони поселень пустки зазвичай дуже однакові — не вбивай, не кради тощо — є деякі винятки. Наприклад, у Вежі Тенпенні незаконно носити біле після першого понеділка вересня до кінця року. Очевидно, що цей закон не можна справедливо застосовувати в інших частинах пустки, де люди мають лише один комплект одягу. Це лише один із багатьох прикладів невідповідностей, які створюють потенційні проблеми. Є також питання автономії поселення. Ми бачили кілька випадків, коли правоохоронці з одного поселення переслідували злочинця до іншого і стикалися з охоронцями цього поселення."
DCS_nf_events.68.a:0 "Рада встановлюватиме закони, які діють скрізь"
DCS_nf_events.68.b:0 "Закони поселення закінчуються біля його воріт. За їх межами діє закон Ради."
DCS_nf_events.68.c:0 "§C Регулятори забезпечуватимуть правосуддя в пустці.§!"
DCS_nf_events.68.d:0 "§G Слідувати прецеденту, встановленому мандрівними караванами.§!"
DCS_nf_events.68.e:0 "§R Білий після Дня Відпочинку? Тільки через мій труп!§!"
DCS_nf_events.68.f:0 "§O У Республіці Дейва найкращі закони, застосовуйте їх скрізь!§!"
DCS_nf_events.69.title:0 "Постійна армія"
DCS_nf_events.69.desc:0 "Окрім мобілізації під час конфлікту з Анклавом, у нас не було багато причин об'єднувати наші різні поселенські ополчення та озброєні групи в конфлікті. Окремі ополчення в минулому добре справлялися з утриманням рейдерів подалі від поселень і відбиттям випадкових великих атак. Однак сьогодні люди розселяються з поселень більше, ніж будь-коли. Якщо ми хочемо запобігти поверненню до часів, коли більшість людей ніколи не залишали рідне поселення, нам потрібно забезпечити безпеку пусток між стінами поселень. Постійна армія для захисту наших кордонів і боротьби із зовнішніми небезпеками буде необхідна для просування вперед. Головне питання — хто входитиме до цієї армії і як ми за неї платитимемо."
DCS_nf_events.69.a:0 "Чому б просто не об'єднати ополчення?"
DCS_nf_events.69.b:0 "§C Військовими поселення керуватимуть ветерани-регулятори.§!"
DCS_nf_events.69.c:0 "§G Найманці заповнять прогалини, які не можуть заповнити ополчення.§!"
DCS_nf_events.69.d:0 "§R Містер Берк знає кількох безробітних найманців.§!"
DCS_nf_events.69.e:0 "§O Дейв очолить велику армію відданих синів поселень!§!"
DCS_nf_events.69.f:0 "Нам потрібна централізована військова сила"
DCS_nf_events.70.title:0 "Наслідки прогресу"
DCS_nf_events.70.desc:0 "За 200 років після падіння бомб кожна річ, якою володів хтось у Столичній Пустці, походила з одного з двох місць. Або вона була виготовлена 200 років тому і знайдена, або вона була зібрана якимось ремісником, який, швидше за все, був єдиним практиком цього ремесла у своєму поселенні. І наслідки промисловості Пітта, і відносне процвітання, яким ми насолоджувалися, стимулювали зростання промисловості. Дні, коли зброю збирали з іржавих труб у халупі якимось хлопцем, добігають кінця в Столичній Пустці. Це промислове зростання та заснування виробничих компаній не обходиться без недоліків. Це великомасштабне виробництво стимулювало ринок, де іноді економічніше викинути надлишковий матеріал, що залишився від процесу, ніж намагатися його перепрофілювати. Це прагнення до найбільш економічно ефективного виробничого процесу призвело до того, що багато поселень постраждали від промислових відходів або інших проблем. Нам потрібно взяти це під контроль, перш ніж воно призведе до довгострокових проблем."
DCS_nf_events.70.a:0 "Ми можемо створити правила щодо того, куди можна скидати відходи."
DCS_nf_events.70.b:0 "§C Збитки, завдані поселенню промисловістю, будуть покарані.§!"
DCS_nf_events.70.c:0 "§G Скликати лідерів бізнесу для обговорення рішень.§!"
DCS_nf_events.70.d:0 "§R Вони просто повинні переїхати в краще поселення.§!"
DCS_nf_events.70.e:0 "§O Запровадити правила, які Президент може скасувати.§!"
DCS_nf_events.71.title:0 "Зростання Республіки"
DCS_nf_events.71.desc:0 "В останні роки Поселення Столичної Пустки стали набагато більшим, ніж просто конфедерація поселень. З виборами, новими законами та постійною армією стає зрозуміло, що ми наближаємося до того, що називалося б Республікою. Оскільки наші погляди спрямовані за межі Столичної Пустки, стає зрозуміло, що ми більше не просто «Поселення Столичної Пустки». Нам потрібна нова назва, щоб відповідати нашим новим амбіціям."
DCS_nf_events.71.a:0 "Нова Столична Республіка звучала краще"
DCS_nf_events.71.b:0 "Ні, ми — Об'єднані Поселення Дейва"
DCS_nf_events.72.title:0 "Ті, хто ризикує, не повертаються"
DCS_nf_events.72.desc:0 "В останні десятиліття ті, хто якось наважувався пройти через пустки, повні супермутантів і рейдерів, щоб досягти пагорбів на захід від нас, рідко поверталися. Ті, хто все ж якось повертався, розповідали про божевільний культ, який був надзвичайно вороже налаштований до чужинців. Деякий час здавалося, що вони не зацікавлені виходити за межі своєї території, тому земель просто уникали. Ми не знаємо, що змінилося, але люди, які тікають із пагорбів, розповідають, що ця Церква Скелі зайняла більш експансіоністську позицію. Можливо, нам потрібно діяти, перш ніж вони вирішать рушити в наш бік."
DCS_nf_events.72.a:0 "Які в мене є варіанти?"
DCS_nf_events.73.title:0 "Небезпека та можливість"
DCS_nf_events.73.desc:0 "Поселенці Столичної Пустки кажуть нам, що все більше людей тікають із західних пагорбів, розповідаючи про небезпечний культ. Хоча розгром поклонників каміння зазвичай не входить до нашої компетенції, поселенці наголосили, що цих культистів бачили з сучасною довоєнною зброєю. Схоже, вони сидять на великому тайнику з довоєнними вогнеметами і, можливо, кількома ґаус-гвинтівками. Це варто вивчити."
DCS_nf_events.73.a:0 "Ми можемо виділити загін лицарів"
DCS_nf_events.74.title:0 "Ледве варте зусиль"
DCS_nf_events.74.desc:0 "Пагорби аппалачського регіону — це не Пітт і не Бостон. Так, там є трохи цінних технологій, але навряд чи достатньо, щоб виправдати тривалу присутність. Ось чому ця пропозиція наших друзів у Столичній Пустці така приваблива. Вони просять нас передати контроль над регіоном їхній молодій Республіці, і натомість вони обов'язково надсилатимуть нам усе, що може нас зацікавити. Наше тривале партнерство з Поселеннями Столичної Пустки, Новою Столичною Республікою, або як вони там себе називають, здається, продовжує бути вигідним."
DCS_nf_events.74.a:0 "Прийняти їхню пропозицію"
DCS_nf_events.74.b:0 "Дякуємо, але ні"
DCS_nf_events.75.title:0 "Споріднені душі"
DCS_nf_events.75.desc:0 "Після розмови з представниками Східноузбережної Республіки стало зрозуміло, що в деяких аспектах вони дуже схожі на нас. Здебільшого це поселенці, які хотіли захистити себе та жити своїм життям. Загалом це приблизно те саме, що зробили ми. Так, вони трохи збільшилися, і деякі з їхніх лідерів занадто авторитарні для нашого смаку, але, схоже, вони ще не впали в ті самі пастки, що й довоєнний уряд. Можливо, співпраця з ними буде найкращою для нас обох."
DCS_nf_events.75.a:0 "Ми приєднаємося до Республіки як рівні"
DCS_nf_events.75.b:0 "Тенпенні забув слова: НЕ НАСТУПАЙ! НА! МЕНЕ!"
DCS_nf_events.75.c:0 "Жодних богів, королів чи довічних президентів, Дейв!"
DCS_nf_events.75.d:0 "Ро не проходить перевірку на вібрації"
DCS_nf_events.76.title:0 "Фольклор кусає у відповідь"
DCS_nf_events.76.desc:0 "Під час огляду нещодавно анексованих територій президент Дейв почув історії про різних дивних істот, що ховаються в пагорбах і лісах Аппалачів. Гігантські мотілі, страхітливі чудовиська і щось під назвою вендіґо. Він сповнений рішучості довести свою силу людям цього регіону, вистеживши одну з цих істот і вбивши її. Він збирає команду найкращих мисливців і траперів регіону, щоб приєднатися до нього, не тому, що йому потрібна їхня допомога. Просто... щоб показати їм, як це робиться!"
DCS_nf_events.76.a:0 "Ви зможете це зробити, пане Президент!"
DCS_nf_events.77.title:0 "Ловля Мотіля"
DCS_nf_events.77.desc:0 "Мутантні мотілі є звичайним явищем в Аппалачах, але не за ними Дейв полював останні тижні. Існують історії, що сягають часів до війни, про більшу істоту, схожу на мотіля, яка є розумною. Вона уникала найдосвідченіших мисливців понад 300 років, але Дейв створений інакше. Ось чому так прикро, що після тижнів ловлі пастками та полювання істота зникла саме тоді, коли Дейв її впіймав. Зрозуміло, що Дейв нарешті зустрів гідного супротивника, і, звісно, він міг би його спіймати, якби мав більше часу. Однак державні справи важливіші. Чи зрозуміють це люди Пустки?"
DCS_nf_events.77.a:0 "Повернутися з порожніми руками"
DCS_nf_events.77.b:0 "Вполювати меншу істоту і сказати, що це Мотіль"
DCS_nf_events.77.c:0 "§0Дейв глибоко зазирнув у його фіолетові очі§!"
DCS_nf_events.78.title:0 "Божевілля Короля Тенпенні"
DCS_nf_events.78.desc:0 "З вершини Вежі Тенпенні видно майже всю Столичну Пустку. Однак навіть Тенпенні потрібні агенти, щоб виконувати його волю. За пропозицією містера Берка, начальник служби безпеки Ґуставо буде відповідальним за наведення ладу на нещодавно завойованих аппалачських територіях. Ця аппалачська колонія наповнюватиме скарбницю Республіки, яка, звісно ж, є скарбницею Тенпенні."
DCS_nf_events.78.a:0 "Ми — Республіка, наші інтереси — це їхні інтереси"
DCS_nf_events.79.title:0 "Найкращі з найкращих"
DCS_nf_events.79.desc:0 "Після того, як початкові змагання між Регуляторами та солдатами Грін-Маунтін вщухли, обидві групи, здається, дуже добре порозумілися. Регулятори могли б багато чому навчитися у веденні бою в пагорбах, так само як Грін-Маунтін міг би багато чому навчитися у міській війні та виживанні в пустелі. Схоже, ця співпраця буде взаємовигідною."
DCS_nf_events.79.a:0 "Зрозуміло"
DCS_nf_events.80.title:0 "Рельсові револьвери?"
DCS_nf_events.80.desc:0 "Вчені кажуть, що ми ще досить далекі від компактних магнітних прискорювальних ручних гармат, але це хороший перший крок. Регулятори повернулися з Грін-Маунтін, несучи 10 ящиків ґаус-гвинтівок і схеми для їх виробництва. Але перш ніж ми почнемо планувати дати кожному ополченцю гвинтівку, здатну пробити силову броню, важливо зрозуміти одну просту річ. Те, що ми знаємо, як зібрати ґаус-гвинтівку, не означає, що ми знаємо, як виготовити всі деталі, необхідні для її виробництва. Нам потрібно буде розібратися з цим, перш ніж ми зможемо почати їх штампувати."
DCS_nf_events.80.a:0 "Тобто ми на півдорозі?"
DCS_nf_events.81.title:0 "Солодощі та чвари"
DCS_nf_events.81.desc:0 "По той бік річки, що відокремлює нас від решти довоєнної Пенсільванії, триває боротьба, подібна до тієї, яку ми бачили в інших частинах пустки. Є дві групи, які часто конфліктують: одна сторона — це група торговців і ремісників, інша — рейдери, які ніколи в житті не виростили жодної трави. Кондитерський Колектив — це перші. Вони займають довоєнний парк розваг і фабрику під назвою Герші. Імовірно, вони походять зі сховища під цим місцем, призначеного для збереження мистецтва виробництва чогось під назвою шоколад. З часом їхнє ремесло привабило торгівлю, і вони побудували досить велике поселення, яке зрештою привернуло увагу Філадельфійських Рейдерів. Ця банда, наскільки ми можемо судити, дуже схожа на інші великі рейдерські володіння. Очолювана людиною, яка називає себе Бородавником, і його дітьми, ці рейдери тероризують більшу частину території і, як відомо, іноді продають рабів до Пітта. Очевидно, яку сторону ми повинні підтримати."
DCS_nf_events.81.a:0 "Що таке шоколад?"
DCS_nf_events.82.title:0 "Більше запитань"
DCS_nf_events.82.desc:0 "Чим більше ми копаємося в культі Андейла, тим більше ми задаємося питанням, що там відбувалося. Криваві ритуали, збіговиська на болотах і деякі зв'язки з довоєнними суспільствами — це лише верхівка айсберга. Самі культисти дуже небагатослівні, і ми нічого від них не дізнаємося. Це залишає лише щоденники та записки, які не згоріли, які здебільшого дають нам лише уривчасті відомості. У наших зусиллях зрозуміти це божевілля та загрозу, яку воно становить, ми, здається, послабили інші справи. Кілька членів керівництва Андейла втекли з-під варти під час транспортування до камер для допиту."
DCS_nf_events.82.a:0 "Стривайте... Що відбувається в Будівлі Данвіч?!"
DCS_nf_events.83.title:0 "Спалені дотла"
DCS_nf_events.83.desc:0 "Не варто намагатися зрозуміти марення цих божевільних. Вони були інбридинговими канібалами, які становили загрозу для порядних людей, а тепер вони є паливом для великого вогнища в кожному з їхніх поселень. До них приєдналися їхні журнали, релігійні символи та все інше, що могло б надихнути на таку темряву в майбутньому."
DCS_nf_events.83.a:0 "Деякі речі краще залишити загадкою"
DCS_nf_events.84.title:0 "Сонце сяє в Андейлі"
DCS_nf_events.84.desc:0 "Темні хмари, що нависли над Андейлом, як у прямому, так і в переносному сенсі, розсіялися. Жахи, спричинені їхнім старим населенням, припинилися. Люди, які переїжджають у цей район, повідомляють про періодичне занепокоєння або відчуття, що за ними спостерігають, але ніхто не зник, і нічого не виявлено."
DCS_nf_events.84.a:0 "Ймовірно, тоді нічого"
DCS_nf_events.85.title:0 "Сутички з Братством"
DCS_nf_events.85.desc:0 "Розподіл води з Проєкту «Чистота» Братством Сталі не обходиться без труднощів. Братство настільки ж скрупульозне, наскільки й непоступливе. Це означає, що щоразу, коли в поселенні трапляється нещасний випадок, наприклад, втрата деякої кількості води, або коли чисельність населення випереджає оновлення записів Братства, виникають проблеми. Ці випадкові сутички, на щастя, ніколи не переростали в кровопролиття, але виникає питання, чи не можна було б зробити все краще."
DCS_nf_events.85.a:0 "Чи могли б ми зробити краще?"
DCS_nf_events.86.title:0 "Боротьба Рівет-Сіті"
DCS_nf_events.86.desc:0 "Розподіл води Рівет-Сіті по всій Столичній Пустці став порятунком. Однак починають проявлятися тріщини. Їхні охоронці, які розподіляють воду, перевтомлені, і сталося кілька інцидентів, через які поставки були неповними. Зрозуміло, що Рівет-Сіті міг би використати допомогу."
DCS_nf_events.86.a:0 "Це найменше, що ми могли зробити"
DCS_nf_events.87.title:0 "Хто поставив їх керувати?"
DCS_nf_events.87.desc:0 "Простіше кажучи, ми не впевнені, як нинішні мешканці Проєкту «Чистота» стали власниками цього місця. Що ми знаємо, так це те, що вони не діляться водою ні з ким іншим. Ця вода могла б врятувати незліченні життя, якби потрапила в правильні руки, в наші руки."
DCS_nf_events.87.a:0 "Серйозно, як ВОНИ зайняли це місце?"
DCS_nf_events.88.title:0 "Рука допомоги"
DCS_nf_events.88.desc:0 "Братству не завадила б допомога в управлінні Проєктом «Чистота». Від очищення води до її доставки в руки мешканців Пустки — у них є проблеми, які можна легко вирішити за допомогою невеликих зусиль або ресурсів. Рада обговорює, як ми надамо допомогу."
DCS_nf_events.88.a:0 "Відправити трохи ополченців для охорони караванів."
DCS_nf_events.88.b:0 "Кришки можуть вирішити більшість проблем."
DCS_nf_events.88.c:0 "§C Відправити Регуляторів вистежувати всіх, хто чіпає каравани.§!"
DCS_nf_events.88.d:0 "§G Роу знає кількох досвідчених провідників, які могли б допомогти прокласти маршрути.§!"
DCS_nf_events.88.e:0 "§R У містера Берка є кілька хороших ідей і друзів.§!"
DCS_nf_events.88.f:0 "§O Запровадити суворіші норми води за межами столиці.§!"
DCS_nf_events.89.title:0 "Місце за столом"
DCS_nf_events.89.desc:0 "Східноузбережна Республіка високо цінує наші зусилля з розподілу води Проєкту «Чистота». Настільки високо, що вони пропонують надати підтримку і просять нас надіслати представника до їхньої ради для обговорення найкращих способів досягнення цього. Це, звісно, лише перший крок до нашого приєднання до цієї більшої республіки, яку вони створюють. Рада зараз обговорює це питання."
DCS_nf_events.89.a:0 "Давайте працювати разом"
DCS_nf_events.89.b:0 "Ми приймемо допомогу, але підемо своїм шляхом"
DCS_nf_events.89.c:0 "Нізащо не будемо працювати з цим виродком!"
DCS_nf_events.90.title:0 "Складніше, ніж здавалося"
DCS_nf_events.90.desc:0 "Хоча очищувач залишився майже непошкодженим після нашої боротьби з його попередніми мешканцями, справи йдуть не так гладко, як очікувалося. Керування цим очищувачем вимагає багато роботи, і нам, м'яко кажучи, не вистачає робочих рук. Рада скликала екстрену зустріч, щоб обговорити, як вирішити цю проблему."
DCS_nf_events.90.a:0 "Призначити більше людей для допомоги проєкту"
DCS_nf_events.90.b:0 "Закидати проблему кришками"
DCS_nf_events.90.c:0 "§C Відправити Регуляторів вистежувати всіх, хто чіпає каравани.§!"
DCS_nf_events.90.d:0 "§G Роу знає кількох досвідчених провідників, які могли б допомогти прокласти маршрути.§!"
DCS_nf_events.90.e:0 "§R У містера Берка є кілька хороших ідей і друзів.§!"
DCS_nf_events.90.f:0 "§O Запровадити суворіші норми води за межами столиці.§!"
DCS_nf_events.91.title:0 "Рука допомоги"
DCS_nf_events.91.desc:0 "Рівет-Сіті прийняв нашу пропозицію допомоги з очищувачем. Від очищення води до її доставки в руки мешканців Пустки — у них є проблеми, які можна легко вирішити за допомогою невеликих зусиль або ресурсів. Рада обговорює, як ми надамо допомогу."
DCS_nf_events.91.a:0 "Відправити трохи ополченців для охорони караванів."
DCS_nf_events.91.b:0 "Кришки можуть вирішити більшість проблем."
DCS_nf_events.91.c:0 "§C Відправити Регуляторів вистежувати всіх, хто чіпає каравани.§!"
DCS_nf_events.91.d:0 "§G Роу знає кількох досвідчених провідників, які могли б допомогти прокласти маршрути.§!"
DCS_nf_events.91.e:0 "§R У містера Берка є кілька хороших ідей і друзів.§!"
DCS_nf_events.91.f:0 "§O Запровадити суворіші норми води за межами столиці.§!"
DCS_nf_events.92.title:0 "Займатися своїми справами"
DCS_nf_events.92.desc:0 "Лідер Дуврських Торговців звернувся до нашої ради, заявивши, що вони планують застосувати більш прямий підхід у своєму конфлікті з Рибалками Затоки. Вони попросили нас не втручатися в конфлікт і пообіцяли нам або винагороди, або наслідки, залежно від того, як ми поставимося до їхньої поради."
DCS_nf_events.92.a:0 "Ми подивимося, як це розгортатиметься"
DCS_nf_events.93.title:0 "Допоможи своєму сусіду"
DCS_nf_events.93.desc:0 "Ми не можемо сидіти склавши руки, поки Рибалки Затоки стають жертвами жадібних махінацій кількох головорізів та їхньої найманої армії. Можливо, ми не зможемо відволікти всі сили нашого ополчення, щоб допомогти їм, але ми можемо щось зробити."
DCS_nf_events.93.a:0 "Відправити їм добровольців"
DCS_nf_events.93.b:0 "Відправити їм зброю"
DCS_nf_events.94.title:0 "Зменшення шкоди"
DCS_nf_events.94.desc:0 "Зрозуміло, що швидке завершення цього конфлікту є найкращим для всіх. Тому, замість того, щоб сидіти без діла або підтримувати Рибалок Затоки в програшній битві, ми допоможемо Дувру легше перемогти Рибалок Затоки. Сподіваюся, це призведе до швидшого завершення конфлікту та врятує життя, правда?"
DCS_nf_events.94.a:0 "Відправити їм добровольців"
DCS_nf_events.94.b:0 "Відправити їм зброю"
DCS_nf_events.95.title:0 "Поселення Делмарви"
DCS_nf_events.95.desc:0 "Нарешті, наш конфлікт з Рибалками Затоки закінчено. Ці рибалки прийняли наше правління, і прибутки будуть вищими, ніж будь-коли. Залишається питання Поселень Столичної Пустки: вони попросили нас приєднатися до їхньої Республіки."
DCS_nf_events.95.a:0 "Ми приєднаємося"
DCS_nf_events.95.b:0 "Ми не приєднаємося"
DCS_nf_events.95.c:0 "Дейв хоче нас анексувати? Чорт забирай, ні!"
DCS_nf_events.96.title:0 "Поселення Делмарви"
DCS_nf_events.96.desc:0 "Ці жадібні виродки з Асоціації Торговців Дувра думали, що зможуть переїхати кількох хороших працьовитих людей. Ми довели їм, що це не так, і тепер ми подбаємо про те, щоб торговці, що вижили, трималися прямого і вузького шляху. Залишається питання Поселень Столичної Пустки: вони попросили нас приєднатися до їхньої Республіки."
DCS_nf_events.96.a:0 "Ми приєднаємося"
DCS_nf_events.96.b:0 "Ми не приєднаємося"
DCS_nf_events.96.c:0 "Дейв хоче нас анексувати? Чорт забирай, ні!"
DCS_nf_events.97.title:0 "День відкриття"
DCS_nf_events.97.desc:0 "Сьогодні знаменує відкриття пляжного курорту Тенпенні. Знадобилося багато крові, поту та податкових кришок, але ексклюзивний прибережний відпочинок нарешті приймає своїх перших гостей. Містера Берка, речника Тенпенні, запитали про сенс розкішного прибережного курорту, коли більшість сімей Пустки живуть в однокімнатних халупах з металобрухту. Він відмовився коментувати, окрім заяви, що найважливіші члени суспільства не можуть борсатися в багні своїх менших."
DCS_nf_events.97.a:0 "Ґулям, звісно, вхід заборонено"
DCS_nf_events.98.title:0 "Безкоштовна нерухомість"
DCS_nf_events.98.desc:0 "Колись Цитадель була домом для Братства Сталі, поки не стався наш нещодавній кривавий конфлікт. Тепер вона стоїть порожня, як і багато інших будівель у Вашингтоні. На відміну від тих будівель, Цитадель підтримувалася і частково відновлювалася протягом останніх 50 років. У поєднанні з її працюючими генераторами, укріпленнями та розташуванням поблизу кількох маршрутів до центру Вашингтона, це чудове місце для облаштування. Завжди є можливість просто заснувати нове поселення. Але, безсумнівно, ми можемо придумати щось краще."
DCS_nf_events.98.a:0 "Ні, не можемо. Нове поселення так і буде."
DCS_nf_events.98.b:0 "§C Це буде нова штаб-квартира нашої армії.§!"
DCS_nf_events.98.c:0 "§G Ідеальне місце для створення торгового центру, який конкуруватиме з Рівет-Сіті.§!"
DCS_nf_events.98.d:0 "§R Ми повинні здавати приміщення в оренду, а не просто дозволяти людям там селитися.§!"
DCS_nf_events.98.e:0 "§O Очевидно, це буде новий Президентський палац!§!"
DCS_nf_events.99.title:0 "Він боровся за праве діло"
DCS_nf_events.99.desc:0 "Тридог був улюбленцем багатьох у Столичній Пустці. Він завжди говорив те, що є, і боровся за праве діло. Ось чому так прикро, що він вважав Поселення Столичної Пустки під її нинішнім керівництвом загрозою. Він постійно критикував нинішнього голову, і коли наша війна з Братством привела нас до порогу GNR, він узяв гвинтівку. Новий діджей зайняв місце на GNR, але все вже ніколи не буде, як раніше."
DCS_nf_events.99.a:0 "§R Добра путь§!"
DCS_nf_events.99.b:0 "§O Добра путь§!"
DCS_nf_events.100.title:0 "Найхоробріші Пустки"
DCS_nf_events.100.desc:0 "Найсуворіші законники в пустках, Регулятори, невтомно працюють, щоб позбавити пустку від несправедливості. Зазвичай озброєні лише шкіряним пальтом і шестизарядним револьвером, регулятори вселяють страх у серця найгірших елементів пустки. Тепер їх залучають до наших ополчень, готових вселити страх у серце кожного, хто думає про заподіяння шкоди нашим громадянам."
DCS_nf_events.100.a:0 "Ласкаво просимо, Регулятори"
DCS_nf_events.101.title:0 "Місце за столом"
DCS_nf_events.101.desc:0 "Східноузбережна Республіка попросила нас приєднатися до них. Ми збережемо нашу автономію, але від нас очікується співпраця з іншими поселеннями та допомога в колективній обороні. Натомість ми отримаємо місце за столом. Хто сяде на це місце, вирішувати нам, і в раді вже точаться суперечки ще до того, як ми вирішили, чи приймемо ми цю пропозицію."
DCS_nf_events.101.a:0 "Ми приймаємо, відправляємо Сігрейва"
DCS_nf_events.101.b:0 "Ми приймаємо, відправляємо Беннона"
DCS_nf_events.101.e:0 "Відхилити їхню пропозицію"
DCS_nf_events.101.f:0 "Дейв хоче нас анексувати! Готуйте охорону!"
DCS_nf_events.102.title:0 "Рівет-Сіті відмовляється"
DCS_nf_events.102.desc:0 "Рівет-Сіті відмовився від нашої пропозиції приєднатися до Східноузбережної Республіки. Це прикрий поворот подій, але було б неправильно посягати на їхню автономію."
DCS_nf_events.102.a:0 "Вони зробили свій вибір"
DCS_nf_events.102.b:0 "Чи не так?"
DCS_nf_events.103.title:0 "Піттське Братство переможене!"
DCS_nf_events.103.desc:0 "Залізну хватку Паладіна Куртса над Піттом послаблено. Багато хоробрих чоловіків і жінок з нашого ополчення атакували форпости Братства в Пітті й відтіснили полеглих лицарів назад до вежі, яку вони використовують як командний центр. У міру продовження бойових дій багато рабів Пітта взялися за зброю на підтримку своїх визволителів. Це лише питання часу, коли ми прорвемо їхні останні оборонні рубежі та покладемо край кошмару, якого зазнавали люди Пітта протягом так довго. Є одна неприємна проблема, про яку нам потрібно подумати. Хоча ми відправили представників до Цитаделі, інформуючи їх про дії їхніх відступників-братів, цілком можливо, що вони все одно їх підтримають. Це може призвести до війни."
DCS_nf_events.103.a:0 "Якщо Братство підтримує Куртса, ми повинні боротися і з ними!"
DCS_nf_events.104.title:0 "Оборона Пітта тримається"
DCS_nf_events.104.desc:0 "Лицарі під командуванням Паладіна Куртса відбили наші наступи на Пітт. На жаль, схоже, нам не вдалося звільнити цих людей силою. Ми можемо тільки сподіватися, що Братство втрутиться, щоб позбутися цього монстра, якого вони випустили на Пітт."
DCS_nf_events.104.a:0 "Сподіваймося, вони повірили нашим посланцям"
DCS_nf_events.105.title:0 "Поселення Столичної Пустки атакували нас!"
DCS_nf_events.105.desc:0 "Поселення Столичної Пустки розпочали штурм нашого форпосту в Пітті, який був відбитий Паладіном Куртсом та його лицарями. Приблизно в той час, коли ми отримали перші повідомлення про цю атаку, кілька представників Поселень Столичної Пустки підійшли до воріт Цитаделі. Вони сказали нам, що атака була у відповідь на повідомлення про те, що Куртс збунтувався і керує Піттом так само, як Ашур. Вони привели з собою рабів, які кажуть, що втекли з Пітта, і розповідають про жахливу жорстокість і злобу. Якщо їхнім історіям можна вірити, Куртс не діяв відповідно до ідеалів нашого відділення, а поводився як рейдерський ватажок. Вони благають нас втрутитися і зробити те, що вони не змогли."
DCS_nf_events.105.a:0 "Відправити Прайд забрати Куртса для суду"
DCS_nf_events.105.b:0 "Ми не можемо терпіти напад на наших братів!"
DCS_nf_events.106.title:0 "Поселення Столичної Пустки атакували нас!"
DCS_nf_events.106.desc:0 "Поселення Столичної Пустки розпочали штурм нашого форпосту в Пітті, внаслідок чого Паладін Куртс та його вцілілі люди відчайдушно намагаються захистити свій командний центр. Приблизно в той час, коли ми отримали перші повідомлення про цю атаку, кілька представників Поселень Столичної Пустки підійшли до воріт Цитаделі. Вони сказали нам, що атака була у відповідь на повідомлення про те, що Куртс збунтувався і керує Піттом так само, як Ашур. Вони привели з собою рабів, які кажуть, що втекли з Пітта, і розповідають про жахливу жорстокість і злобу. Якщо їхнім історіям можна вірити, Куртс не діяв відповідно до ідеалів нашого відділення, а поводився як рейдерський ватажок. Вони просять, щоб ми не заважали їм, поки вони розбираються з Куртсом та його спільниками."
DCS_nf_events.106.a:0 "Дозволити жителям Пустки їхнє правосуддя"
DCS_nf_events.106.b:0 "Відправити Прайд забрати Куртса для суду"
DCS_nf_events.106.c:0 "Ми не можемо терпіти напад на наших братів!"
DCS_nf_events.107.title:0 "Падіння Паладіна Куртса"
DCS_nf_events.107.desc:0 "Братство Сталі дало нам слово, що не заважатиме нам притягнути Паладіна Куртса до відповідальності. Це добре, тому що приблизно в той час, коли вони дали нам цю гарантію, наші сили прорвали останні оборонні рубежі вежі та вбили полеглого паладина разом з його останніми захисниками. Наші сили втрутилися, щоб вистежити останніх лицарів-відступників і запобігти зануренню Пітта назад в анархію або потраплянню в руки іншого деспота."
DCS_nf_events.107.a:0 "Чудова робота!"
DCS_nf_events.108.title:0 "Відкладене правосуддя"
DCS_nf_events.108.desc:0 "Братство Сталі втрутилося і забрало Паладіна Куртса з його вежі в Пітті на гвинтокрилі. Чого він не знає, так це те, що це було не порятунок, а арешт. Нас запевнили, що Куртс постане перед судом і буде покараний за правилами їхнього кодексу. Не всі задоволені таким результатом, але принаймні Пітт врятовано від тирана, і правосуддя врешті-решт буде здійснено. Наші сили втрутилися, щоб вистежити останніх лицарів-відступників і запобігти зануренню Пітта назад в анархію або потраплянню в руки іншого деспота."
DCS_nf_events.108.a:0 "Не найкращий результат, але й не найгірший"
DCS_nf_events.109.title:0 "Братство втручається!"
DCS_nf_events.109.desc:0 "Незважаючи на те, що наші представники, відправлені до Цитаделі, виклали жахливі дії Паладіна Куртса, Братство Сталі підтримало його. Вони не тільки відправили команду на порятунок монстра, але й пообіцяли помсту за вбивство членів їхнього ордену! Ополчення збираються і готуються до війни."
DCS_nf_events.110.title:0 "Відкладене правосуддя"
DCS_nf_events.110.desc:0 "Братство Сталі відкликало Паладіна Куртса та його найкращих людей до Цитаделі. Той факт, що їх бачили, як вони йдуть, показує, що вони, мабуть, вважають це інструктажем після нашої атаки, а не арештом. Оскільки оборона Пітта ослабла, наші люди змогли увійти і звільнити місто. Нас запевнили, що Куртс постане перед судом і буде покараний за правилами їхнього кодексу. Не всі задоволені таким результатом, але принаймні Пітт врятовано від тирана, і правосуддя врешті-решт буде здійснено. Наші сили втрутилися, щоб вистежити останніх лицарів-відступників і запобігти зануренню Пітта назад в анархію або потраплянню в руки іншого деспота."
DCS_nf_events.110.a:0 "Не найкращий результат, але й не найгірший"
DCS_nf_events.111.title:0 "Візит Аболіціоністів"
DCS_nf_events.111.desc:0 "Нещодавно ми прийняли делегацію з [DCS.GetTag]. Очолював її Ганнібал Гемлін, лідер армії втікачів-рабів, яких називають аболіціоністами. Багато наших людей, які родом із Столичної Пустки, ставляться до нього з благоговінням. Делегація хотіла приєднати наше місто до [DCS.GetTag]. З того, що вони нам розповідають, держава об'єднана з нами в справі свободи. Принаймні, ми обоє могли б отримати вигоду від взаємної торгівлі."
DCS_nf_events.111.a:0 "Ми приєднаємося до них"
DCS_nf_events.111.b:0 "Торгівлі буде достатньо"
DCS_nf_events.112.title:0 "Доля Республіки"
DCS_nf_events.112.desc:0 "Після того, як з повстанням Дейва розібралися, тепер ми повинні вирішити, що стане з його Республікою. Невелике поселення зараз перебуває під окупацією ополчення після втечі Дейва зі Столичної Пустки. Це не може тривати вічно, і нам потрібно вирішити, що ми будемо робити з родиною Дейва та його комплексом. Одна з його дружин, Розі, попросила дозволити їй узяти під контроль поселення і перетворити його на функціональне ранчо. Тим часом його син Боб запропонував дати йому трохи солдатів і дозволити перетворити комплекс на форт для захисту нашого північного кордону від бандитів. Звісно, наш новообраний голова може мати власну ідею."
DCS_nf_events.112.a:0 "Підтримати пропозицію Розі"
DCS_nf_events.112.b:0 "Підтримати форт Боба"
DCS_nf_events.112.c:0 "§C Передати комплекс Регуляторам і ув'язнити союзників Дейва.§!"
DCS_nf_events.112.d:0 "§G Роу знає кількох торговців, які заплатили б за це місце.§!"
DCS_nf_events.112.e:0 "§R Пан Тенпенні вважає, що глухомань — хороше місце для відправки туди гулів.§!"

###Sale Events###
DCS_sale_decision_events.1.title:0 "Продаж роботів"
DCS_sale_decision_events.1.desc:0 "У Вигнанців мало живої сили, тому будь-яка можливість поповнити свої сили роботами хапається обома руками. Ці цивільні роботи, яких ми знайшли, можливо, не є ходячими машинами смерті, але вони мають своє застосування. Вигнанці пропонують нам або кілька ящиків низькоякісної зброї, або кілька ракетниць."
DCS_sale_decision_events.1.a:0 "Візьмемо пістолети"
DCS_sale_decision_events.1.b:0 "Візьмемо великі пістолети"
DCS_sale_decision_events.1.c:0 "Ми передумали"
DCS_sale_decision_events.2.title:0 "Продаж броні"
DCS_sale_decision_events.2.desc:0 "Вигнанці оснащують більшу частину своїх сил довоєнними костюмами силової броні T-45d, але вони не мають змоги виробляти новий костюм з нуля. Через це вони завжди шукають запасні частини або навіть повні костюми, як ті, що ми маємо сьогодні. За броню вони пропонують або кілька вогнеметів, або обмін 2-на-1 на відновлену бойову броню."
DCS_sale_decision_events.2.a:0 "Пограємося з вогнем"
DCS_sale_decision_events.2.b:0 "Ця штука набагато краща за металеву броню"
DCS_sale_decision_events.2.c:0 "Ми передумали"
DCS_sale_decision_events.3.title:0 "Червона доріжка"
DCS_sale_decision_events.3.desc:0 "Вигнанці мало не розстелили червону доріжку, коли ми сказали, що йдемо зі справжньою силовою бронею Анклаву. Хоча вони були розчаровані, що так багато костюмів було понівечено кулями, чого ще можна було очікувати від костюмів, знятих із мертвих солдатів Анклаву? За цю знахідку вони пропонують або якісну енергетичну зброю, або кілька старих містерів-помічників."
DCS_sale_decision_events.3.a:0 "Піу-піу"
DCS_sale_decision_events.3.b:0 "Повернути ботів"
DCS_sale_decision_events.3.c:0 "Ми передумали"
DCS_sale_decision_events.4.title:0 "Продаж броні"
DCS_sale_decision_events.4.desc:0 "Вигнанці в основному носять стару броню T-45d, яку люди в наших поселеннях, які знаються на силовій броні, кажуть, що вона не така хороша, як ці T-51b, що є в нас. Природно, вони хочуть найкращу броню, яку тільки можуть отримати, і пропонують дуже хорошу угоду за це. Вони дадуть нам кілька ящиків якісної довоєнної зброї або трохи вибухівки."
DCS_sale_decision_events.4.a:0 "Візьмемо гвинтівки"
DCS_sale_decision_events.4.b:0 "Сьогодні ввечері довга палиця зробить бум"
DCS_sale_decision_events.4.c:0 "Ми передумали"
DCS_sale_decision_events.5.title:0 "Продаж запчастин"
DCS_sale_decision_events.5.desc:0 "У Вигнанців є всілякі прибамбаси та штуки, яким потрібні нові частини, щоб продовжувати працювати. Хоча для них це не так захоплююче, як плазмова гвинтівка чи костюм силової броні, вони все одно готові заплатити нам трохи зброї або базових припасів за брухт."
DCS_sale_decision_events.5.a:0 "Візьміть зброю"
DCS_sale_decision_events.5.b:0 "Нам би знадобилися припаси"
DCS_sale_decision_events.5.c:0 "Ми передумали"
DCS_sale_decision_events.6.title:0 "Продаж брухту"
DCS_sale_decision_events.6.desc:0 "У Вигнанців є багато довоєнних систем на їхній базі, яким потрібні нові частини, щоб продовжувати працювати. Звичайно, вони могли б знайти ці плати та котушки дроту в самих руїнах, але ми позбавляємо їх клопоту. Оскільки це більше питання зручності, їхня запропонована плата трохи менша. Ми можемо взяти або набір спорядження, яке вони взяли у рейдерів, або кілька старих протитанкових гвинтівок."
DCS_sale_decision_events.6.a:0 "Візьмемо зброю"
DCS_sale_decision_events.6.b:0 "Гвинтівки звучать добре"
DCS_sale_decision_events.6.c:0 "Ми передумали"
DCS_sale_decision_events.7.title:0 "Не зовсім вільні птахи"
DCS_sale_decision_events.7.desc:0 "гвинтокрили, які ми маємо, становлять особливий інтерес для Вигнанців. Через це вони дістають великі гармати, щоб придбати їх. Ми можемо обміняти ці гвинтокрили або на кілька мініганів, або взяти кілька ящиків лазерних гвинтівок!"
DCS_sale_decision_events.7.a:0 "Більше стволів означає більше мертвих рейдерів"
DCS_sale_decision_events.7.b:0 "Візьміть піу-піу"
DCS_sale_decision_events.7.c:0 "Ми передумали"
DCS_sale_decision_events.8.title:0 "Дивна силова броня"
DCS_sale_decision_events.8.desc:0 "Здавалося, Вигнанці теж ніколи не бачили такої силової броні. Через новизну вони були готові заплатити трохи більше, ніж зазвичай, за таке спорядження. Ми можемо отримати кілька ящиків гранатометів або кілька гатлінг-лазерів."
DCS_sale_decision_events.8.a:0 "Взяти гранатомети"
DCS_sale_decision_events.8.b:0 "Я здивований, що вони обмінялися цим"
DCS_sale_decision_events.8.c:0 "Ми передумали"

