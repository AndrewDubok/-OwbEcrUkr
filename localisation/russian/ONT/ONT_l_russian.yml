l_russian:

###Cosmetic Tags###
ONT_canadian_enclave_tag:0 "Канадский Анклав"
ONT_canadian_enclave_tag_ADJ:0 "Анклав"
ONT_canadian_enclave_tag_DEF:0 "Канадский Анклав"

###Factions###
ONT_enclave_faction:0 "Командование Анклава"

###Decisions###
ONT_bunker_decision_category:0 "Разваливающийся бункер"
ONT_bunker_fail_mission:0 "Обратный отсчет до полуночи"
ONT_bunker_fail_mission_desc:0 "Вот наша оценка времени, когда командный бункер Онтарио выйдет из строя. Неважно, что мы демонтируем, как упорно сражаемся или насколько близки к победе — если мы не одержим победу до того, как бункер перестанет работать, нам придётся отступить и перебросить войска в другое место. Куда именно — неизвестно. Но без бункера или Ронто мы не сможем выжить."

###Laws###
ONT_decrepit_command_law:0 "Дряхлое коммандование"
ONT_decrepit_command_law_desc:0 "Мало кто из наших опытных офицеров вернулся в командный бункер Онтарио. Многие из них уже ушли из жизни. Наш офицерский корпус практически отсутствует, а большинство молодого поколения не знакомы даже с базовыми военными тактиками."
ONT_poorly_trained_officers_law:0 "Скудная подготовка офицеров"
ONT_poorly_trained_officers_law_desc:0 "Нашим офицерам дают интенсивный курс по основам военной теории по учебнику. Мы не ожидаем, что многие из них выживут после первого же задания. Но те, кто выживет, надеемся, смогут усвоить хотя бы несколько важных уроков."
ONT_trained_officers_law:0 "Подготовленные офицеры"
ONT_trained_officers_law_desc:0 "Кроме теоретической подготовки, наши офицеры проходят практические учения. Эти тренировки и тесты не сделают их опытными командирами, но станут прочным фундаментом для дальнейшего развития."
ONT_well_trained_officers_law:0 "Хорошо обученные офицеры"
ONT_well_trained_officers_law_desc:0 "Наши офицеры изучали не только исторические сражения — они сражались в них. Благодаря современным VR-тренажёрам мы дали им возможность получить максимально приближённый к реальному опыт. Они могут и не быть ветеранами, но близки к этому."
ONT_sourcing_materials_law:0 "Поиск материалов"
ONT_sourcing_materials_law_desc:0 "Заставы размещаются на производственных объектах и местах с жизненно важными ресурсами. Эти точки тщательно охраняются от местного населения, с которым в итоге будет решён вопрос."


###Names###
ONT_general_hurley:0 "Генерал Хёрли"
ONT_riggs_name:0 "Капитан Риггс"
ONT_hurley_name:0 "Майор Хёрли"
ONT_hurley_desc:0 "Самый старший офицер анклава Онтарио, Рик Хёрли, последние 30 лет держит своих людей и их дом вместе. Как и многие, он тайно надеялся, что если удастся продержаться ещё хотя бы год, придёт подкрепление. Но по мере того, как ситуация становится всё яснее, надежда на спасение угасает. Если Анклав Онтарио хочет выжить, им придётся сражаться снова."
ONT_munn_name:0 "Томас Манн"
ONT_munn_desc:0 "Будучи молодым офицером, Томас Манн получил задание организовать эвакуацию обратно в командный бункер Онтарио. Никогда не забывая тех, кто не вернулся, он посвятил годы изучению ошибок и неудач этого отступления."
ONT_chicago_advisor_name:0 "Энох Бучаннон"
ONT_hartmann_name:0 "Абель Хартманн"
ONT_cromey_name:0 "Джонас Кроми"
ONT_thompson_name:0 "Фрэнсис Томпсон"
ONT_watt_name:0 "Уильям Уатт"
ONT_semple_name:0 "Леви Семпл"
ONT_mcconnal_name:0 "Анна МакКоннал"
ONT_mason_name:0 "Грейс Мейсон"
ONT_wallace_name:0 "Лайнус Уоллес"
ONT_fulton_name:0 "Авраам Фултон"
ONT_chicago_econ_name:0 "Сайрус Перкинс"
ONT_barton_name:0 "Ричард Бартон"
ONT_eastburn_name:0 "Эллен Ченнел"
ONT_sterrett_name:0 "Томас Стерретт"
ONT_chicago_culture_name:0 "Харриет МакКлелланд"
ONT_mcclelland_desc:0 "После многих лет лишений и жертв Чикаго считает, что мы заслужили попробовать их роскошную жизнь. Они прислали к нам человека, чтобы показать, как наслаждаться плодами труда мутантов."
ONT_washington_name:0 "В.А.Ш.И.Н.Г.Т.О.Н."
ONT_howarth_name:0 "Анджело Говард"

###National Focuses###
ONT_nf_a001:0 "Возвращение Торонто"
ONT_nf_a001_desc:0 "Платформа пала, план очистки пустошей с помощью ВРЭ провален. Что теперь делать?"
ONT_nf_a002:0 "Большая Ошибка"
ONT_nf_a002_desc:0 "В.А.Ш.И.Н.Т.О.Н был ИИ, созданным довоенной Америкой для управления оккупированной Канадой. Почему его отключили перед ядерным ударом?"
ONT_nf_a003:0 "Почти опоздали"
ONT_nf_a003_desc:0 "Когда всё казалось безнадёжным, со Столичной Пустоши прорвались винтокрылы, но не слишком ли они опоздали?"
ONT_nf_a004:0 "Тикающие Часы"
ONT_nf_a004_desc:0 "Если мы не примем меры вскоре, наш бункер станет непригодным для жизни. Пора возвращаться на поверхность."
ONT_nf_a005:0 "Зимние Воины"
ONT_nf_a005_desc:0 "Бой с канадскими мутантами чуть не уничтожил нашу армию. Десятилетия запустения тоже не пошли нам на пользу."
ONT_nf_a006:0 "Сохраним нашу мощь"
ONT_nf_a006_desc:0 "Неважно, насколько это дорого — силовая броня — ключ к нашей военной мощи. Счистите ржавчину и замените отсутствующие детали!"
ONT_nf_a007:0 "Почти так же хорошо"
ONT_nf_a007_desc:0 "За годы наши учёные разработали альтернативу силовой броне. Эта броня использует некоторые детали из наших ржавых X-01, позволяя при этом повторно использовать редкие компоненты из этих костюмов."
ONT_nf_a008:0 "Разборка Оборудования"
ONT_nf_a008_desc:0 "Броня ГЕРМЕС позволяет снизить затраты на экипировку нашей армии, сохраняя при этом наше превосходство. Однако эти костюмы всё ещё требуют много ресурсов. Производство меньшего их количества позволит сосредоточиться на поддержании работоспособности бункера."
ONT_nf_a009:0 "Огневая мощь прежде всего"
ONT_nf_a009_desc:0 "Наши солдаты должны иметь лучшее. Плазменные винтовки, гатлинговские лазеры и ракетные установки — всё это необходимо для нашей окончательной победы!"
ONT_nf_a010:0 "Сбалансированные Приоритеты"
ONT_nf_a010_desc:0 "Мы не можем позволить себе выдать каждому солдату на передовой лучшее снаряжение. Некоторым придётся обходиться оружием похуже."
ONT_nf_a011:0 "Количество имеет значение"
ONT_nf_a011_desc:0 "Мутантов слишком много, чтобы рассчитывать всего на пару сотен плазменных винтовок для их уничтожения. Пули работают не хуже и требуют гораздо меньше ресурсов для производства."
ONT_nf_a012:0 "Фабрикаторы"
ONT_nf_a012_desc:0 "Продвинутые довоенные машины позволяют нам изготовить практически всё, что нужно, при наличии достаточного количества базовых ресурсов и энергии. Единственный их недостаток — они не рассчитаны на 200 лет непрерывной работы."
ONT_nf_a013:0 "Запасы Медикоментов"
ONT_nf_a013_desc:0 "Перед отключением вспомогательных фабрикаторов нам нужно накопить запас стимпаков и других необходимых медикаментов."
ONT_nf_a014:0 "Уровень Жизни"
ONT_nf_a014_desc:0 "Зачем жертвовать нашим образом жизни ради нескольких дополнительных дней работы? Пусть бункер работает как обычно."
ONT_nf_a015:0 "Запасы Еды"
ONT_nf_a015_desc:0 "Перед отключением вспомогательных фабрикаторов нам следует накопить запасы пищи, чтобы не тратить энергию на гидропонику."
ONT_nf_a016:0 "Более тесные условия"
ONT_nf_a016_desc:0 "Кому-то может быть некомфортно, но размещение всех в общих жилых помещениях позволит закрыть несколько секций и сэкономить ресурсы."
ONT_nf_a017:0 "Защита Бункера"
ONT_nf_a017_desc:0 "Автоматические турели годами не пускают в бункер случайных путников пустоши. Стоит ли оставить их включёнными, когда мы готовимся выйти на поверхность?"
ONT_nf_a018:0 "Лучшая Защита"
ONT_nf_a018_desc:0 "Мы не можем позволить врагу приблизиться к нашему бункеру без боя. Оставьте оборону включённой."
ONT_nf_a019:0 "Отступать Некуда"
ONT_nf_a019_desc:0 "Это наш последний шанс отложить вымирание. Отступать нельзя. Не будем прятаться за автоматическими турелями. Отключайте машины и перенаправляйте ресурсы на подготовку к бою!"
ONT_nf_a020:0 "Сила Стали"
ONT_nf_a020_desc:0 "В нашем бункере есть запас охранных роботов, которые были отключены вскоре после нашего отступления. Их повторное включение может быть затратным, но они будут очень полезны в бою."
ONT_nf_a021:0 "Гайки и болты"
ONT_nf_a021_desc:0 "Охранных роботов лучше пустить на запчасти — это поможет дольше поддерживать работу жизненно важных систем."
ONT_nf_a022:0 "В основном мальчики"
ONT_nf_a022_desc:0 "Прошли десятилетия с тех пор, как нас загнали обратно в бункер. Немногие, кто помнил жизнь за пределами в канадских пустошах, всё ещё в боеспособном состоянии. Сейчас на передовой — их дети и внуки."
ONT_nf_a023:0 "VR-Тренировки"
ONT_nf_a023_desc:0 "Мы подготовим наших бойцов к предстоящему бою с помощью продвинутых боевых симуляций."
ONT_nf_a024:0 "Городская боевая подготовка"
ONT_nf_a024_desc:0 "Мы очистим старый ангар, построим макеты искусственных зданий и обучим наших солдат ведению боя в городских условиях."
ONT_nf_a025:0 "Строго Теория"
ONT_nf_a025_desc:0 "У нас нет ресурсов на практические тренировки. Солдаты изучат военную теорию и базовые боевые навыки перед выходом на фронт."
ONT_nf_a026:0 "Почти Ветераны"
ONT_nf_a026_desc:0 "Наши новобранцы прошли достаточно интенсивную боевую подготовку, чтобы быть готовыми ко всему. Мутанты даже не подозревают, что их ждёт."
ONT_nf_a027:0 "Достаточно Сильны"
ONT_nf_a027_desc:0 "Наши новобранцы хорошо знакомы с тактикой городского боя. Они должны быть готовы."
ONT_nf_a028:0 "Едва пригодны для службы"
ONT_nf_a028_desc:0 "Наши новобранцы могут знать основы тактики действий отрядом, но этого недостаточно. Скорее всего, большинство из них не проживут и недели."
ONT_nf_a029:0 "Последние Штрихи"
ONT_nf_a029_desc:0 "Наши солдаты готовы, боевые планы почти составлены. Ещё есть несколько дел, которые можно сделать, но для этого нужно время — а его у нас очень мало."
ONT_nf_a030:0 "Инвентаризация Медицины"
ONT_nf_a030_desc:0 "С небольшими усилиями мы сможем тщательно учесть наши медицинские запасы и подготовиться к возможному наплыву раненых."
ONT_nf_a031:0 "Разведка Обороны"
ONT_nf_a031_desc:0 "Будет глупо не разведать, с чем нам предстоит столкнуться. Передовые разведчики задокументируют позиции и укрепления врага — это поможет нам прорвать их линии."
ONT_nf_a032:0 "Разведать Склады"
ONT_nf_a032_desc:0 "Существует несколько довоенных складов оружия, которые, скорее всего, остались нетронутыми. Нам нужно собрать всё доступное вооружение."
ONT_nf_a033:0 "Зимняя Тренировка"
ONT_nf_a033_desc:0 "Симуляции и лекции, безусловно, полезны, но практический опыт остаётся самым эффективным способом обучения."
ONT_nf_a034:0 "ДАВАЙТЕ БЛЯТЬ НАЧНЁМ!"
ONT_nf_a034_desc:0 "Время на исходе. Мы готовы так, как никогда раньше. Мутанты Торонто заплатят за грехи своих отцов перед человечеством и Америкой!"
ONT_nf_a035:0 "Промежуточные Заставы"
ONT_nf_a035_desc:0 "Мы создадим несколько передовых застав для начала наступления на врага."
ONT_nf_a036:0 "Расчистить Линии Снабжения"
ONT_nf_a036_desc:0 "Снабжение наших войск по воздуху — рискованное дело в условиях, когда снежные бури не дают нашим винтокрылам взлетать. Создание надёжной инфраструктуры для обеспечения фронта наземными поставками будет ключом к нашей победе."
ONT_nf_a037:0 "Запись Пропаганды"
ONT_nf_a037_desc:0 "Лучший способ выиграть войну — заставить врага сдаться, не открывая огня. Радиозаписи и пропагандистские листовки будут подготовлены к распространению в момент начала нашего наступления."
ONT_nf_a038:0 "Сплочение Своих"
ONT_nf_a038_desc:0 "Даже сейчас некоторые из наших предпочли бы просто ждать, пока время истечёт, или бежать, вместо того чтобы сражаться. Их нужно заставить изменить своё отношение и встать на защиту Анклава."
ONT_nf_b001:0 "Америка Возвращается"
ONT_nf_b001_desc:0 "Мы сделали это. Мы раздавили мутантов под нашими ботинками и вернули Торонто Америке. Что теперь?"
ONT_nf_b002:0 "Новый Командный Центр"
ONT_nf_b002_desc:0 "Мы переселим наших людей в Торонто, заняв военные базы и бункер В.А.Ш.И.Н.Т.О.Н.А. Эти объекты всегда были американской собственностью, и мы не можем оставить их мутантам."
ONT_nf_b003:0 "Улучшение Условий Жизни"
ONT_nf_b003_desc:0 "Разрушенные стены, обвалившиеся крыши и разбитые окна — всё это можно легко починить с помощью труда мутантов."
ONT_nf_b004:0 "Теперь как Дома"
ONT_nf_b004_desc:0 "Месяцы работы привели к тому, что условия жизни в Торонто сравнялись с теми, что были в нашем бункере."
ONT_nf_b005:0 "Удел Мутантов"
ONT_nf_b005_desc:0 "Где есть кнут, там найдётся и путь. Мутанты восстановят город, который пытались у нас отнять."
ONT_nf_b006:0 "Мародёрские Квоты"
ONT_nf_b006_desc:0 "Мутантов с взрывными ошейниками отправят в руины Торонто на поиски ресурсов. Если они принесут что-то ценное, возможно, мы даже их покормим."
ONT_nf_b007:0 "Программа Надзирателей"
ONT_nf_b007_desc:0 "Некоторые мутанты более покорны нашему контролю, и даже готовы поддерживать естественную иерархию. Зачем тратить силы на их принуждение, если они могут следить за порядком сами?"
ONT_nf_b008:0 "Преимущества Соответствия"
ONT_nf_b008_desc:0 "Удивительно, какую жестокость мутант способен проявить к своим же, если его мотивировать металлическим значком и дополнительным пайком."
ONT_nf_b009:0 "Исполнение Нашей Воли"
ONT_nf_b009_desc:0 "Программа Надзирателей показала такую эффективность, что мы можем масштабировать её на широкую территорию. Это позволит нам распространять нашу волю далеко за пределы численности наших сил."
ONT_nf_b010:0 "Базы данных В.А.Ш.И.Н.Г.Т.О.Н.А"
ONT_nf_b010_desc:0 "Главный компьютер бункера В.А.Ш.И.Н.Т.О.Н содержит не только довоенной ИИ. Там хранятся тома ценных технических данных, которые мы можем использовать."
ONT_nf_b011:0 "Сброс к заводским настройкам"
ONT_nf_b011_desc:0 "Удаление коммунистического кода должно позволить В.А.Ш.И.Н.Г.Т.О.Н выполнять своё изначальное предназначение — держать этих ублюдков в повиновении."
ONT_nf_b012:0 "Закрепиться"
ONT_nf_b012_desc:0 "Мы больше не потеряем эту базу. Укрепите стены, установите новые турели и держите периметр под наблюдением."
ONT_nf_b013:0 "Починка Антенны"
ONT_nf_b013_desc:0 "Антенна связи на базе в Торонто была одной из первых целей, уничтоженных в боях много лет назад. Если мы её восстановим, сможем выйти на связь и узнать, кто нас слушает."
ONT_nf_b014:0 "Необходимый Ремонт"
ONT_nf_b014_desc:0 "Зачем нам покидать этот бункер, если мы можем обеспечить его ресурсами и поддерживать в рабочем состоянии ещё двести лет?"
ONT_nf_b015:0 "Строительство Дорог"
ONT_nf_b015_desc:0 "Для обеспечения транспортировки ресурсов из руин Торонто в наш командный бункер мы построим дороги и расчистим завалы."
ONT_nf_b016:0 "Переместить Коммуникацию"
ONT_nf_b016_desc:0 "В руинах Торонто достаточно оборудования для связи, чтобы усилить сигналы с нашего бункера."
ONT_nf_b017:0 "Перезапуск Автоматической Защиты"
ONT_nf_b017_desc:0 "Бункеры и базы вокруг Торонто были оснащены охранными роботами, которых можно легко перепрограммировать под наши нужды."
ONT_nf_b018:0 "Излишки В.А.Ш.И.Н.Г.Т.О.Н.А"
ONT_nf_b018_desc:0 "Бункер В.А.Ш.И.Н.Т.О.Н имел собственную автоматическую систему безопасности, которая теперь ему больше не понадобится."
ONT_nf_b019:0 "Починка Фабрикаторов"
ONT_nf_b019_desc:0 "При наличии нужных запчастей мы сможем поддерживать работу наших фабрикаторов ещё многие годы."
ONT_nf_b020:0 "Производство Ресурсов"
ONT_nf_b020_desc:0 "Небольшая переналадка позволит нашим фабрикаторам выпускать передовые технологии, необходимые для поддержания работы нашего оборудования."
ONT_nf_b021:0 "Поиск Материалов"
ONT_nf_b021_desc:0 "Руины Канады — законная собственность правительства США. Это значит, что каждый разрушенный завод, каждый заржавевший механизм и каждый ватт энергии по праву принадлежат нам."
ONT_nf_b022:0 "Улучшение Удобства"
ONT_nf_b022_desc:0 "Ресурсы Торонто позволяют нам восстановить давно отключённые системы. С возвращением, горячий душ!"
ONT_nf_b023:0 "Люксовый Бункер"
ONT_nf_b023_desc:0 "Зачем останавливаться на восстановлении того, что мы потеряли? Если этот бункер должен стать нашим домом, то почему бы не наслаждаться чем-то более прекрасным?"
ONT_nf_b024:0 "Восстановление Баз Данных"
ONT_nf_b024_desc:0 "Многие старые серверы были отключены несколько лет назад. Некоторые разобрали, а их детали распределили по важным системам. Есть несколько, которые мы можем снова запустить, чтобы использовать их данные."
ONT_nf_b025:0 "Переоткрыть Лаборатории"
ONT_nf_b025_desc:0 "Исследовательские лаборатории были одними из первых, что пришлось закрыть, когда нам пришлось сокращать расходы, чтобы поддерживать работу бункера. Теперь мы можем позволить себе заниматься действительно важными исследованиями — например, сколько мутантов нужно, чтобы съесть лампочку?"
ONT_nf_b026:0 "Это Ронто Мейнком"
ONT_nf_b026_desc:0 "С нашими дальнодействующими коммуникациями в сети пришло время проверить, как обстоят дела в Вашингтоне."
ONT_nf_b027:0 "Безопасное Убежище"
ONT_nf_b027_desc:0 "Наш контакт с Рэйвен-Рок прошёл не так гладко, как мы ожидали. Похоже, что мы были не единственными, кто пережил тяжёлые несколько лет."
ONT_nf_c001:0 "Принять Власть Отэма"
ONT_nf_c001_desc:0 "Главнокомандующий Отэм взял под контроль Анклав Рэйвен-Рока. Под его руководством мы сможем вернуть Америку и канадские территории!"
ONT_nf_c002:0 "Запросить Излишки Оборудования"
ONT_nf_c002_desc:0 "В Рэйвен-Роке много захваченного оборудования после недавнего конфликта с Братством Стали. Возможно, они смогут прислать нам часть."
ONT_nf_c003:0 "Принять Политики Отэма"
ONT_nf_c003_desc:0 "По какой-то причине Отэм хочет предоставить мутантам некоторые права — например, нам запрещено стрелять в них, пока они не нарушат приказ. Это может показаться странным, но нам нужно следовать указаниям президента."
ONT_nf_c004:0 "Канадская Лазейка"
ONT_nf_c004_desc:0 "Технически, директивы Отэма распространяются только на граждан Америки, а канадские мутанты гражданами не являются."
ONT_nf_c005:0 "Схемы «Hellfire»"
ONT_nf_c005_desc:0 "Рэйвен-Рок разработал новый тип силовой брони, который был бы очень полезен для наших войск."
ONT_nf_c006:0 "Проект «Великое Озеро»"
ONT_nf_c006_desc:0 "Проект «Чистота» обеспечил Рэйвен-Рок почти неограниченным запасом чистой воды, что дало им значительный контроль на востоке США. Нам стоит запросить помощь в создании собственного проекта «Чистота»."
ONT_nf_c007:0 "Запасной План"
ONT_nf_c007_desc:0 "Рэйвен-Рок пал, но это был не единственный форпост Анклава. Мы зафиксировали передачи с крупного поста в Чикаго. Вместе мы сможем отомстить за наших соотечественников, павших от рук мутантских орд."
ONT_nf_c008:0 "Это Только Мы"
ONT_nf_c008_desc:0 "Рэйвен-Рок пал, и все наши попытки связаться с другими вызывают только помехи. Неужели мы — последний Анклав, оставшийся в живых?"
ONT_nf_c009:0 "Исполнить Мандат Эдема"
ONT_nf_c009_desc:0 "Президент Иден вновь взял под контроль столицу Америки. Вместе мы восстановим эту разрушенную нацию!"
ONT_nf_c010:0 "Биржа Баффало"
ONT_nf_c010_desc:0 "Служба здравоохранения Баффало предлагает нам выгодную сделку. Если мы отправим им несколько мутантов для «лечения», они взамен пришлют нам боевых робомозгов."
ONT_nf_c011:0 "Запрос Материальной Поддержки"
ONT_nf_c011_desc:0 "Продвинутая силовая броня и плазменное оружие в дефиците, но, без сомнения, президент сможет выделить часть для своих любимых губернаторов территорий."
ONT_nf_c012:0 "Отправьте Людей!"
ONT_nf_c012_desc:0 "Какая польза от плазменных винтовок, если у нас нет солдат, чтобы ими стрелять? Нам нужны подкрепления из Рэйвен-Рока!"
ONT_nf_c013:0 "Парящие Друзья"
ONT_nf_c013_desc:0 "Рэйвен-Рок разработал новую версию робо-глаза — значительно более эффективную. Эти новые робо-глазы модели «Дюрафрейм» помогут нам в возвращении контроля над Канадой."
ONT_nf_c014:0 "Чистый как снег"
ONT_nf_c014_desc:0 "Президент Эдем сделал то, чего не смог Ричардсон — очистил Пустошь от мутантов. Благодаря помощи его учёных мы можем создать собственный проект «Чистота» на Великих озёрах и обеспечить мутантские массы чистой, «очищенной» водой."
ONT_nf_c015:0 "О, Канада"
ONT_nf_c015_desc:0 "\n О Канада, \n наш дом и покорённая земля! \n Истинная человеческая мощь в каждом из нас царит. \n С сияющим оружием мы видим твой восход, \n Истинный Север — сильный и свободный от мутантов! \n С дальних краёв, \n О Канада, мы стоим на страже для тебя! \n Пусть Бог хранит нашу землю славной и чистой! \n О Канада, мы стоим на страже человечества!"
ONT_nf_c016:0 "Консолидировать Онтарио"
ONT_nf_c016_desc:0 "Как мы можем называться Анклавом Онтарио, если не контролируем весь Онтарио?"
ONT_nf_c017:0 "Сердце Промышленности"
ONT_nf_c017_desc:0 "Онтарио довоенных времён был сердцем канадской промышленности. Многие из этих заводов пришли в упадок в столетия после Великой войны. С помощью достаточного количества рабочих из Пустоши мы можем восстановить некоторые из них."
ONT_nf_c018:0 "Разрушить их"
ONT_nf_c018_desc:0 "Банда автограбителей продолжает дух упрямых канадцев, сопротивлявшихся нашему законному захвату. Возможно, они забыли, почему ненавидят Америку, но мы им напомним."
ONT_nf_c019:0 "Переоборудование Автозаводов"
ONT_nf_c019_desc:0 "Виндзорские Разрушители поддерживали работу многих довоенных автозаводов в том или ином состоянии. Мы можем найти способы эффективно их использовать."
ONT_nf_c020:0 "Утилизация Автозаводов"
ONT_nf_c020_desc:0 "Зачем тратить силы на перестройку этих автозаводов, если мы можем использовать их ресурсы?"
ONT_nf_c021:0 "Укрепление Границ"
ONT_nf_c021_desc:0 "Сделав Виндзор важным промышленным центром, мы сделаем его целью для врагов. Укрепление границ поможет защитить его."
ONT_nf_c022:0 "Аннексия Манитобы"
ONT_nf_c022_desc:0 "Регион Манитобы за последние два столетия был оккупирован всякими жалкими самозванцами. Пора напомнить им, что эта Пустошь не принадлежит им."
ONT_nf_c023:0 "Изъять богатства Манитобы"
ONT_nf_c023_desc:0 "Различные лорды и деспоты наживались на земле и ресурсах Манитобы. Это богатство по праву принадлежит правительству США."
ONT_nf_c024:0 "Судьба Канады"
ONT_nf_c024_desc:0 "Судьба ZAX был во многом похож на В.А.Ш.И.Н.Т.О.Н — предназначен для помощи правительству США в контроле над непокорными канадцами. За последние пару столетий он немного вышел из-под контроля, но перезагрузка В.А.Ш.И.Н.Т.О.Н поможет нам это исправить."
ONT_nf_c025:0 "Цареубийство"
ONT_nf_c025_desc:0 "Правителем Манитобы был гуль, считающий себя королём. Его казнь должна послать мутантам Канады чёткий сигнал, кто здесь главный."
ONT_nf_c026:0 "Канадские Первопроходцы"
ONT_nf_c026_desc:0 "Ещё одна сила действует в канадской тундре под звёздами и полосами. Ходят слухи о том, кто они и что представляют, но перед отправкой войск не помешает разведать их поближе."
ONT_nf_c027:0 "Кровь На Льду"
ONT_nf_c027_desc:0 "Прямо к югу от Торонто банда рейдеров практикует жестокую версию довоенного хоккея. Посмотрим, как их лезвия выдержат огонь плазмы."
ONT_nf_c028:0 "Финальный Матч"
ONT_nf_c028_desc:0 "Несколько пойманных живыми хоккейных фанатов будут полезны. Последний хоккейный матч в Канаде станет отличным развлечением для наших уставших солдат и командиров."
ONT_nf_c029:0 "Поводок Хозеров"
ONT_nf_c029_desc:0 "Эти «Хозеры» не слишком заботятся о том, кого убивают, лишь бы убивать. Если держать их на коротком поводке, они могут стать отличными боевыми псами."
ONT_nf_c030:0 "Дорожная Граница"
ONT_nf_c030_desc:0 "Граница между Онтарио и Восточными штатами США усеяна заброшенными КПП, обломками и разрушенными дорогами. Нам следует исправить это, чтобы облегчить поток товаров между Канадой и Америкой."
ONT_nf_c031:0 "Аннексия Восточной Канады"
ONT_nf_c031_desc:0 "К востоку от Онтарио простираются обширные территории Канады, ныне под властью различных мутантских самозванцев. Мы должны это исправить."
ONT_nf_c032:0 "Восстановление Дамб"
ONT_nf_c032_desc:0 "Новоотвоёванные территории содержат несколько гидроэлектростанций в разном состоянии разрушения. Их восстановление и подключение к нашей энергосети должно стать приоритетом."
ONT_nf_c033:0 "Борьба с Красным Приливом"
ONT_nf_c033_desc:0 "Центральная Канада была захвачена..."
ONT_nf_c034:0 "Смена Караула"
ONT_nf_c034_desc:0 "Остатки Содружества стояла вместе с Чикаго в нашей войне. Теперь, когда они повержены, задача управления Центральной Канадой переходит к нам."
ONT_nf_c035:0 "Кампания в Саскачеване"
ONT_nf_c035_desc:0 "Центральная Канада — это хаос из странных мутантов, безумных ИИ и бродячих военачальников. Нам предстоит навести порядок."
ONT_nf_c036:0 "Связать Наши Народы"
ONT_nf_c036_desc:0 "Совместное управление Канадой между нами и Остатками Содружества сопряжено с трудностями. Многие из них можно облегчить, улучшив транспортное сообщение между нашими столицами."
ONT_nf_c037:0 "Только Хорошие Коммунисты"
ONT_nf_c037_desc:0 "Снег Канады окрасится в красный цвет кровью коммунистов. Только тогда воцарится порядок."
ONT_nf_c038:0 "Военные Трофеи"
ONT_nf_c038_desc:0 "Остатки Содружества хранили внушительный запас технологий, присланных из Чикаго. Теперь это наше."
ONT_nf_c039:0 "Рабочая зона Редмонда"
ONT_nf_c039_desc:0 "Редмонд станет похож на Торонто: с надёжными стенами, автоматическими турелями и небольшим гарнизоном. Мутанты займутся добычей ценных ресурсов из руин города."
ONT_nf_c040:0 "Поддержка расширения на Запад"
ONT_nf_c040_desc:0 "Наше управление Канадой может заканчиваться на границе с Остатками Содружества, но это не значит, что мы не можем помочь им в наведении порядка в Западной Канаде."
ONT_nf_c041:0 "Друзья в Холодных Местах"
ONT_nf_c041_desc:0 "Наше сотрудничество с Остатками Содружества принесло значительную пользу обеим сторонам."
ONT_nf_c042:0 "Канадская Торговля"
ONT_nf_c042_desc:0 "Транс-Канадская железная дорога облегчает торговлю между нами и Остатками Содружества."
ONT_nf_c043:0 "МЫ ПРОЙДЕМ"
ONT_nf_c043_desc:0 "Группа мутантов думает, что сможет вечно скрываться от нас в горах. Они ошибаются."
ONT_nf_c044:0 "Западное Побережье"
ONT_nf_c044_desc:0 "Пираты, гули и всевозможные уроды бродят по побережью Западной Канады. Их свободное господство в регионе скоро закончится."
ONT_nf_c045:0 "Захват пиратских флотов"
ONT_nf_c045_desc:0 "Эти ржавые корыта сгодятся, пока мы не сможем построить настоящие военные корабли на западе."
ONT_nf_c046:0 "Цареубийство Электрического Буггало"
ONT_nf_c046_desc:0 "Неудивительно, что мы снова нашли мутанта, считающего себя монархом. Этот тоже послужит примером."
ONT_nf_c047:0 "Экспедиция на Аляску"
ONT_nf_c047_desc:0 "Аляска формально не входит в нашу юрисдикцию. Однако наши друзья с материка не утруждают себя отправкой людей для контроля над регионом. Мы должны оказать им услугу и проверить ситуацию там."
ONT_nf_c048:0 "Разделение Канады"
ONT_nf_c048_desc:0 "К нашему удивлению, Остатки Содружества — не просто остаток американских оккупационных войск, но и управляется сотрудниками Анклава. В связи с этим мы должны урегулировать вопросы территорий через суды."
ONT_nf_c049:0 "Гонка за Складами"
ONT_nf_c049_desc:0 "Согласно картам, принесённым выжившими с Рэйвен-Рок и Чикаго, ещё осталось несколько оружейных складов и форпостов, которые, возможно, не попали в руки врага. Их захват будет жизненно важным для нашего выживания."
ONT_nf_c050:0 "Сигнал из Безопасного Убежища"
ONT_nf_c050_desc:0 "Передайте сигнал по всем защищённым каналам Анклава. Пусть все наши соотечественники, кто слушает, направляются в Торонто."
ONT_nf_c051:0 "Связаться со вспомогательными аванпостами"
ONT_nf_c051_desc:0 "База ВанБюрен во Флориде, МакАртур в Монтане и несколько других форпостов, возможно, ещё стоят. Нам нужно поддерживать связь и помогать друг другу, ведь мы — всё, что осталось."
ONT_nf_c052:0 "Защита Технических Данных"
ONT_nf_c052_desc:0 "В Среднем Западе и Столичных Пустошах ещё остаются несколько исследовательских форпостов, которые, возможно, не были захвачены врагами. Исследовательские данные из этих форпостов должны попасть к нам."
ONT_nf_c053:0 "Флаг всё ещё развевается"
ONT_nf_c053_desc:0 "Анклав пережил множество поражений, но мы всё ещё стоим после всего этого времени. Похоже, мы настоящие выжившие."
ONT_nf_c054:0 "Торговля Продвинутым Снаряжением"
ONT_nf_c054_desc:0 "Наша промышленность бледнеет по сравнению с Чикаго. У них есть запасы передового оружия и техники, которые они могли бы нам отправить, если мы поддержим их военную машину."
ONT_nf_c055:0 "Принять Чикагских Советников"
ONT_nf_c055_desc:0 "Чикаго успешно подавил восстания среди мутантов. У них есть чему поучиться, и они готовы поделиться своими знаниями с нами."
ONT_nf_c056:0 "Вежливо отказаться от Советников"
ONT_nf_c056_desc:0 "При всём уважении к Чикаго, в последние годы мы справлялись вполне успешно. Мы с уважением отклоняем их предложение административной поддержки."
ONT_nf_c057:0 "Отправка Исследователей"
ONT_nf_c057_desc:0 "Наши исследовательские мощности сильно уступают и будут такими ещё долгое время. Чикаго, напротив, располагает образцовыми лабораториями. Почему бы не дать нашим лучшим учёным возможность работать в таких условиях? В конце концов, Чикаго всё равно передаст свои результаты после тщательного рецензирования."
ONT_nf_c058:0 "Встать в строй"
ONT_nf_c058_desc:0 "Недавний разговор между нами и Чикаго заставляет взглянуть на вещи по-другому."

### Decisions ###
ONT_great_lake_purity_decision:0 "Построить Проект «Великое Озеро»"
ONT_great_lake_purity_decision_desc:0 "Учёные с Рэйвен-Рок передали нам чертежи для воссоздания Проекта «Чистота» на озере Онтарио. Это будет грандиозное предприятие, но почти неограниченный запас чистой воды значительно поможет нам расширить наше господство над Канадой."

### Events ###
ONT_nf_events.1.title:0 "План Б"
ONT_nf_events.1.desc:0 "Неделями мы ждали сигнала с Контрольной станции АНКЛАВА, чтобы узнать, очистил ли ВРЭ-Curling-13 планету. Все попытки связаться с установкой встречали лишь помехи, и стало ясно — случилось нечто ужасное. В итоге было решено отправить разведчиков проверить состояние канадских пустошей. Они вернулись с тревожными известиями: пустошь всё ещё кишит коммунистическими канадскими мутантами. Стало очевидно, что если и Канаду вернуть Америке, то Анклав Онтарио придётся сделать это самостоятельно. Были разработаны планы, и все они начинались с возвращения Торонто. Главный вопрос — с чего начать атаку?"
ONT_nf_events.1.a:0 "Мы обеспечили безопасность довоенных складов оружия"
ONT_nf_events.1.b:0 "Мы нацелились на промышленные центры"
ONT_nf_events.1.c:0 "Мы снесли оставшиеся электростанции"
ONT_nf_events.1.d:0 "Мы нанесли удар по центрам заселения мутантами"
ONT_nf_events.2.title:0 "Простое решение"
ONT_nf_events.2.desc:0 "Подчинение мутантов Торонто оказалось лёгкой задачей — они были разобщены и не могли противостоять Анклаву. Сдававшихся мутантов порабощали и заставляли восстанавливать город, пока учёные усердно работали над способами массового уничтожения мутантов в будущем. Первые несколько лет всё шло гладко, но затем мутанты начали сопротивляться. На каждое подавленное мелкое восстание возникало сразу два новых. Ситуация грозила выйти из-под контроля, пока командование не нашло решение. Глубоко под руинами Торонто находился бункер с продвинутым компьютером ZAX под названием В.А.Ш.И.Н.Т.О.Н, который был запрограммирован помогать армии США в удержании контроля над канадским населением. \n \n Машина должна была быть активна, но никто в бункере не задавался вопросом, почему она молчит. \n \n После повторного включения и идентификации себя как Правительство США, команда поняла причину отключения: незадолго до падения бомб какой-то проклятый канадский коммунист внедрил в ZAX вирус, превративший его в антиамериканское чудовище. Команда по повторной активации ZAX была быстро подавлена автоматическими системами защиты, а вскоре военные роботы заполонили Торонто, атакуя персонал Анклава. Мутанты взяли в руки оружие и объединились с машинами. Только благодаря самопожертвованию немногих отважных удалось сдержать натиск машин."
ONT_nf_events.2.a:0 "Многие храбрые солдаты погибли, чтобы выиграть нам время"
ONT_nf_events.2.b:0 "Наши самые светлые умы создали мощный ЭМИ, прежде чем были захвачены"
ONT_nf_events.2.c:0 "Команда Омега погибла во время отвлекающего маневра"
ONT_nf_events.2.d:0 "Некоторые гражданские лица получили неверные приказы об эвакуации"
ONT_nf_events.3.title:0 "Помощь из Рэйвен-Рока"
ONT_nf_events.3.desc:0 "Незадолго до того, как были разрушены коммуникации широкого радиуса, нам удалось отправить сигнал с просьбой о помощи на частотах Анклава. К счастью, мы не кричали в пустоту — через несколько дней с Рэйвен-Рока пришёл ответ: дюжина винтокрылов с подкреплением. Однако надежда, которую принёс Рэйвен-Рок, оказалась недолгой. Мутантов и машин было слишком много, и все подкрепления лишь выиграли нам время, чтобы обеспечить безопасность важного объекта и отступить обратно в командный бункер, прихватив..."
ONT_nf_events.3.a:0 "Продвинутые чертежи"
ONT_nf_events.3.b:0 "Ящики с водяными чипами"
ONT_nf_events.3.c:0 "Прототипы оружия"
ONT_nf_events.3.d:0 "Люди — наш главный актив"
ONT_nf_events.4.title:0 "Минуты до полуночи"
ONT_nf_events.4.desc:0 "Командный бункер Онтарио не был рассчитан на работу дольше 150 лет. За последние три десятилетия мы сделали всё возможное, чтобы сохранить наш дом от разрушения. Крылья закрывались, оборудование разбиралось на запчасти, а несколько раз вылазили команды для поиска деталей для замены. Всё это было лишь попыткой выиграть время, и каждый понимал, что придёт день, когда придётся покинуть бункер. Этот день стремительно приближается. Даже самые оптимистичные прогнозы не дают бункеру продержаться более пяти лет. Чтобы выжить, нам придётся снова выйти в пустоши. Но прежде чем это сделать, нам предстоит тщательно подготовиться."
ONT_nf_events.4.a:0 "Третьего шанса не будет"
ONT_nf_events.5.title:0 "После всего этого времени"
ONT_nf_events.5.desc:0 "Платформа, Рэйвен-Рок, Чикаго — на пути спасения человечества мы понесли множество потерь. Бесчисленные жизни были оборваны угрозой мутантов. Мутанты, мерзость и даже коммунисты разоряют эту некогда великую нацию. И всё же флаг по-прежнему реет. Мы всё ещё стоим. Человечество всё ещё живо. Хотя нас мало, у нас есть то, чего никогда не смогут сломить эти безбожные мутанты — несгибаемый человеческий дух. Пока хотя бы один из нас дышит, человечество будет жить. Мы не сдадимся. Мы очистим эту страну от той грязи, что её поразила."
ONT_nf_events.5.a:0 "Мы обязательно победим"
ONT_nf_events.6.title:0 "В этих стенах"
ONT_nf_events.6.desc:0 "Когда много лет назад мы отступили обратно в командный бункер Онтарио, за собой оставили много хорошего снаряжения. Плазменные винтовки были отброшены, когда микроядерные батареи иссякли. Терминалы и техническое оборудование остались в окружённых аванпостах. Сотни комплектов силовой брони остались вместе с телами тех, кто погиб в них. Тем не менее, мы сохранили всё, что могли. Когда бункер закрывали, одной из первых задач была инвентаризация снаряжения: \n\n - 72 комплекта силовой брони X-01 \n\n - 328 комплектов силовой брони T-51b \n\n - 216 плазменных винтовок Winchester P94 \n\n - 63 лазерных винтовки Wattz 2000 \n\n - 24 лазерных гатлинга L30 \n\n - 31 Большая базука Rockwell \n\n - 2 ящика плазменных гранат \n\n - 281 единица мелкого стрелкового оружия \n\n Спустя 30 лет почти всё это снаряжение исчезло. У нас осталось всего 14 комплектов рабочей силовой брони и 20 исправных плазменных винтовок. Остальное оборудование не погибло от ржавчины, боёв или падений в лифтовые шахты — его разобрали на полезные детали. У нас целая кладовая полна разобранных комплектов силовой брони. Их гидравлика используется для ремонта дверей, радиотехника — для замены изношенных интеркомов, даже системы переработки мочи служат для починки очистных установок. Едва ли можно пройти по коридору, не увидев какую-нибудь технику, к которой прикручена деталь от силовой брони, чтобы она продолжала работать. Восстановить часть этого оборудования возможно, но только ценой вырывания деталей из стен."
ONT_nf_events.6.a:0 "Трудный выбор"
ONT_nf_events.7.title:0 "Резкая остановка"
ONT_nf_events.7.desc:0 "Фабрикаторы командного бункера Онтарио уже давно работают на пределе своих возможностей. Почти 200 лет эти машины обеспечивали нас всем — от пищи до голографических лент, но теперь мы едва можем поддерживать их работу достаточно долго, чтобы производить лишь самое необходимое. Мы не можем сильно нагружать их дальше, но при правильном планировании сможем выпускать немного больше, чем просто базовый минимум."
ONT_nf_events.7.a:0 "Мы не можем просто сделать больше деталей для фабрикатора?"
ONT_nf_events.8.title:0 "Бесконечный дозор"
ONT_nf_events.8.desc:0 "Если есть что-то, на чём мы не экономили последние 30 лет, так это на обороне нашего бункера. Те, кто пережил бои в Торонто, знали: если нас обнаружат, единственным барьером между нами и ордами мутантов станут именно эти автоматические системы защиты. Наши турели всегда получали необходимые запчасти, а охранные роботы были первыми, кто проходил техническое обслуживание. Теперь, когда мы готовимся выйти наружу, нам предстоит серьёзно задуматься: стоит ли сохранять эти системы в рабочем состоянии?"
ONT_nf_events.8.a:0 "Важное решение"
ONT_nf_events.9.title:0 "Лучшие давно мертвы"
ONT_nf_events.9.desc:0 "Когда мы впервые вышли в пустоши после уничтожения Платформы, наши войска внушали страх. Солдаты были экипированы лучше всех и проходили лучшую подготовку. Каждый из них с подросткового возраста тренировался в продвинутых VR-капсулах, сражаясь в сотнях виртуальных боёв ещё до того, как сделал первый выстрел. Офицеры проводили бесчисленные часы, изучая великие военные страницы Америки и даже немногих иностранных лидеров, достойных памяти. Почти все они погибли в боях. С небольшими исключениями, выжившие уже слишком стары для службы в боевых частях. Их дети и внуки не пошли по их стопам — они всю жизнь учились держать в руках гаечный ключ, а не винтовку. Они умеют разбирать пневматический дверной замок, но не знают тактики пехотного боя. У нас осталось очень мало времени, чтобы исправить это, прежде чем придётся отправлять их на поле боя."
ONT_nf_events.9.a:0 "Можем ли мы действительно их подготовить?"
ONT_nf_events.10.title:0 "Пройти через ключевые этапы и довести дело до совершенства"
ONT_nf_events.10.desc:0 "Последние из наших солдат недавно завершили обучение, у них есть всё оружие, которое мы смогли собрать, а наши склады заполнены так полно, как это только возможно. Однако сомнительно, что этого будет достаточно для уверенной победы. Есть несколько вариантов действий, но время стремительно уходит, и нам нужно не тратить его впустую на последние приготовления."
ONT_nf_events.10.a:0 "Время уходит"
ONT_nf_events.11.title:0 "Злобный призрак"
ONT_nf_events.11.desc:0 "Мало кто в Ронто достаточно взрослый, чтобы помнить тех, кто когда-то правил городом, но В.А.Ш.И.Н.Т.О.Н помнит. Анклав, как они себя называли, были остатками худших черт Империалистов, захвативших эти земли. Облачённые в чёрные силовые доспехи и вооружённые смертоносным энергетическим оружием, они считали себя непобедимыми. Мы доказали обратное и изгнали их. Мы были уверены, что они все погибли в холоде.\n\n Мы ошибались. \n\n Поступают всё новые сообщения о нападениях с востока. Солдаты в тех же чёрных доспехах, с тем же смертоносным оружием и с теми же целями — поработить нас."
ONT_nf_events.11.a:0 "§RМы им не позволим§!"
ONT_nf_events.12.title:0 "Щелчок переключателя"
ONT_nf_events.12.desc:0 "Пройдя через бесчисленных мутантов, сотни роботов и десятки автоматических турелей, мы наконец добрались до панели управления В.А.Ш.И.Н.Т.О.Н. Отключить машину оказалось не так просто, как выдернуть вилку или нажать несколько кнопок, но нам это удалось. С деактивацией его систем Торонто в значительной степени перешёл под наш контроль. Разрозненные очаги сопротивления быстро рушатся, а мы сумели извлечь ресурсы из бункера В.А.Ш.И.Н.Т.О.Н, чтобы поддерживать работу нашего бункера, пока вырабатываем дальнейший план действий."
ONT_nf_events.12.a:0 "Почти не могу поверить, что мы это сделали"
ONT_nf_events.13.title:0 "Мутанты служат Америке"
ONT_nf_events.13.desc:0 "В ходе наблюдений за мутантами мы узнали важную вещь. Среди них есть те, кто с радостью станет служить нам, если это даст им возможность возвыситься над своими сородичами. Даже медная значок и ржавый жезл способны вызвать у таких лояльность. Мы начали снабжать этих мутантов более простым оружием и поручать им контроль над своими же. Некоторые из них обладают настоящим талантом вселять страх в мутантское население — так, что даже некоторых наших офицеров это бы поставило в тень!"
ONT_nf_events.13.a:0 "Жаль, что они не люди"
ONT_nf_events.14.title:0 "Контакт с Рэйвен-Рок"
ONT_nf_events.14.desc:0 "Нам наконец удалось восстановить связь с Рэйвен-Рок. База была удивлена получить от нас весточку — после многих лет без ответа они почти списали нас со счетов. [EEN.GetLeader] заверил нас, что хотя у них тоже есть свои проблемы, они готовы оказать поддержку, как только смогут."
ONT_nf_events.14.a:0 "По крайней мере мы не одни"
ONT_nf_events.15.title:0 "Кто-нибудь дома?"
ONT_nf_events.15.desc:0 "Мы провели недели, пытаясь установить связь с Рэйвен-Рок на разных частотах. Каждая попытка встретила лишь помехи, и люди начинают терять надежду на успех. Мы можем лишь предполагать худшее. В лучшем случае Рэйвен-Рок переживает судьбу, похожую на нашу, и просто выжидает. В худшем — мы однажды можем обнаружить бункер, полный мертвецов."
ONT_nf_events.15.a:0 "Мы одни?"
ONT_nf_events.16.title:0 "Винтокрылы с Юго-Запада"
ONT_nf_events.16.desc:0 "Рано утром наш радар зафиксировал почти два десятка винтокрыла, летящих с юго-запада. Вскоре после этого они вышли на связь с просьбой о разрешении на посадку. Они представились как члены Анклава из Чикаго и выразили желание встретиться с нашим руководством, а также оценить ситуацию в Торонто. Офицер, возглавляющий их миссию по установлению контакта — капитан МакКанлесс — объяснил, что они перехватили наши неоднократные вызовы Рэйвен-Року, отслеживая каналы в поисках выживших после поражения Анклава в Столичных Пустошах. Капитан также сообщил, что Министр Внутренних Дел принял командование над оставшимися силами Анклава, включая нас. Капитан взял на себя ответственность провести инспекцию руин Торонто и нашего командного центра, после чего он доложит Министру. После его отчёта нам следует ожидать поддержки и новых приказов."
ONT_nf_events.16.a:0 "Поддержка - хорошо звучик"
ONT_nf_events.17.title:0 "Винтокрылы с Юга"
ONT_nf_events.17.desc:0 "Рано утром наш радар зафиксировал почти дюжину винтокрылов, летящих с юга. Вскоре после этого они вышли на связь с просьбой о разрешении на посадку. Они представились как члены Анклава из Вашингтона и выразили желание встретиться с нашим руководством. Их возглавлял капитан по имени О’Райли, который сообщил, что они, вероятно, являются единственными выжившими членами Анклава из Столичной Пустоши. По его словам, Рэйвен-Рок был захвачен мутантами, а те, кто сумел выжить, перегруппировались, но их быстро обнаружили и на новой базе. Капитан также сообщил, что около половины их отряда отправились на запад, чтобы связаться с базой в Чикаго, но так и не вернулись за остальными. Они сами почти направились на запад, когда перехватили наши попытки связаться с Рэйвен-Рок. Без ретранслятора для обратной связи им оставалось лишь загрузить оставшиеся винтокрылы и направиться на север. Капитан и его группа выживших готовы служить."
ONT_nf_events.17.a:0 "Добро пожаловать на борт, мужчины!"
ONT_nf_events.18.title:0 "Поздравление от офицеров Онтарио"
ONT_nf_events.18.desc:0 "Майор Хёрли, командир Анклава Онтарио, направил свои поздравления [EEN.GetLeader] с подавлением мутантов в Столичных Пустошах. Майор сообщил, что недавно они добились подобных успехов на своей территории и пригласил [EEN.GetLeader] посетить их, когда ситуация в наших регионах стабилизируется."
ONT_nf_events.18.a:0 "Приятно видеть, что они знают, кто здесь главный."
ONT_nf_events.19.title:0 "Отчёт из Онтарио"
ONT_nf_events.19.desc:0 "Мы получили доклад от капитана МакКанлесса о ситуации в Онтарио. Он сообщает, что сигналы, которые мы перехватили на частотах Рэйвен-Рока, действительно исходили от поста Анклава в Канаде. В отчёте содержатся подробности о солдатах, занимающих этот регион, а также о наличии ресурсов. По словам капитана, так называемый Анклав Онтарио остро нуждается в людях и оборудовании, но при этом располагает огромными запасами ресурсов в руинах Торонто. При минимальных вложениях мы сможем установить контроль над этой территорией."
ONT_nf_events.19.a:0 "МакКанлесс, возможно, заслужил повышение в должности"
ONT_nf_events.20.title:0 "Странная сделка"
ONT_nf_events.20.desc:0 "Настало время отправить собранных мутантов Б.М.М.А.У в обмен на часть его «вылеченных» робомозгов для пополнения наших сил. Остался открытым вопрос — сколько именно мутантов мы готовы передать этой машине."
ONT_nf_events.20.a:0 "Мы передумали. Не отправляйте никого"
ONT_nf_events.20.b:0 "Отправьте 250 мутантов"
ONT_nf_events.20.c:0 "Отправьте 500 мутантов"
ONT_nf_events.20.d:0 "Отправьте 750 мутантов"
ONT_nf_events.21.title:0 "Наша Миссия"
ONT_nf_events.21.desc:0 "Мы получили новые приказы из Вашингтона. [EEN.GetLeader] лично распорядился, чтобы майор Хёрли возглавил Анклав Онтарио в задаче по обеспечению контроля над остальной частью Канады для правительства Соединённых Штатов. Вместе с этими приказами прибыли несколько винтокрылов с личным составом, оборудованием, а также повышение для нашего майора."
ONT_nf_events.21.a:0 "У Генерала появилась работа"
ONT_nf_events.22.title:0 "Наша Миссия"
ONT_nf_events.22.desc:0 "Мы получили новые приказы из Чикаго. [TCE.GetLeader] лично распорядился, чтобы майор Хёрли возглавил Анклав Онтарио в обеспечении контроля над остальной частью Восточной Канады для правительства Соединённых Штатов. Вместе с этими приказами прибыли несколько винтокрылов с личным составом, оборудованием, а также повышение для нашего майора. Нас также проинформировали, что в Западной Канаде ведутся операции под руководством Чикаго, однако в случае их неудачи нам предстоит взять под контроль и этот регион."
ONT_nf_events.22.a:0 "У Генерала появилась работа"
ONT_nf_events.23.title:0 "Наша Миссия"
ONT_nf_events.23.desc:0 "Мы фактически остались одни. Возможно, где-то ещё есть небольшие очаги Анклава, но их положение едва ли лучше нашего. Однако это не меняет нашей цели. Мы сделаем то, что задумали 30 лет назад — объединим Канаду под нашим контролем. Как только это будет достигнуто, мы вернём себе эту великую нацию. Это будет нелегко, но это обязательно случится. Пусть даже не в нашей жизни, не в жизни наших детей или внуков — но человечество победит."
ONT_nf_events.23.a:0 "Да, мы сделаем это"
ONT_nf_events.24.title:0 "Кузницы Виндзора"
ONT_nf_events.24.desc:0 "Автомобильные заводы Виндзора и прилегающих районов находятся в относительно хорошем состоянии по сравнению со многими фабриками, которые мы видели в Пустошах. Неудивительно, что так называемые «разрушители» смогли так хорошо поддерживать свои автомобили. С небольшими усилиями мы могли бы переоборудовать эти заводы для производства оружия, роботов или даже винтокрылов. Инженеры отмечают, что будет гораздо эффективнее специализировать этот регион на определённом виде производства, чем пытаться делать по чуть-чуть всего."
ONT_nf_events.24.a:0 "Роботы в приоритете"
ONT_nf_events.24.b:0 "Сфокусируйтесь на оружии"
ONT_nf_events.24.c:0 "Производите части винтокрылов"
ONT_nf_events.24.d:0 "Игнорируйте яйцеголовых"
ONT_nf_events.25.title:0 "Адское шоу"
ONT_nf_events.25.desc:0 "Последних из Хозеров собрали в старом хоккейном стадионе в Торонто, чтобы устроить шоу — и какое это было шоу. Мы не знаем, было ли это обещанием свободы для победителей или просто природной дикой жестокостью мутантов, но эти безумные фигуристы на льду разрывали друг друга на куски ради развлечения наших войск. По итогам многодневного турнира победителей освободили от их проклятого существования с помощью плазменного огня. После этого забавного отвлечения ясно одно. \n\n Эти мутанты понятия не имели, как, чёрт возьми, играют в хоккей."
ONT_nf_events.25.a:0 "Все еще интересно смотреть"
ONT_nf_events.26.title:0 "Новости с Аляски"
ONT_nf_events.26.desc:0 "Разведчики, отправленные исследовать Аляску, вернулись с примерно теми новостями, которых мы и ожидали. Как и остальные северные пустоши, Аляска покрыта льдом, но всё ещё кишит мутантами. Значимых ресурсов там почти не осталось — запасы нефти давно исчерпаны или уничтожены мутантами. Тем не менее, миссия не была полностью напрасной: разведчики наткнулись на запечатанный склад и вернулись с немалым трофеем."
ONT_nf_events.26.a:0 "Лучше, чем ожидалось"
ONT_nf_events.27.title:0 "Гонка за Канаду"
ONT_nf_events.27.desc:0 "В повороте событий, которого мы никак не ожидали, когда всего несколько лет назад вышли из нашего бункера, мы оказались в ситуации, где мы не единственное присутствие Анклава в Канаде. Группа мутантов, происходящих от американских военнослужащих и действующих как своего рода пешка Министра, захватила значительную часть территории Канады. Несмотря на наши возражения против того, чтобы мутанты управляли тем, что по праву является американской землёй, [EEN.GetLeader] согласился позволить этому продолжаться. Он настаивает, чтобы мы нашли способ сотрудничать с [COM.GetTag]. Также было принято решение, вопреки нашим возражениям, следовать политике «кто первым завоюет — тот и владеет» в отношении территорий в Канаде."
ONT_nf_events.27.a:0 "Тогда нам нужно выдвигаться"
ONT_nf_events.28.title:0 "Пополнение"
ONT_nf_events.28.desc:0 "Несколько недель назад мы передали сигнал на всех частотах Анклава. Этот сигнал сообщил всем, кто слушал, где ещё живёт Америка. Те, кто выжил в Вашингтоне, Чикаго или где бы то ни было ещё, за эти недели постепенно подтягивались сюда. Их немного, многие из них едва не потеряли волю к борьбе, но они пришли. Теперь эти люди обрели свою цель заново. Они готовы сражаться. Они готовы отомстить."
ONT_nf_events.28.a:0 "Они это получат"
ONT_nf_events.29.title:0 "Ответ от ВанБюрена"
ONT_nf_events.29.desc:0 "Мы получили сообщение с авиабазы ВанБюрен, в котором говорится, что, по крайней мере во Флориде, всё ещё остались настоящие американцы, которые держатся. Они находятся далеко отсюда и, как и мы, сталкиваются с множеством собственных проблем. Поэтому они не могут прислать нам ничего, кроме своих исследований, и надеются, что в будущем мы сможем оказывать друг другу более существенную помощь."
ONT_nf_events.29.a:0 "По крайней мере они живы"
ONT_nf_events.30.title:0 "Ответ от МакАртура"
ONT_nf_events.30.desc:0 "Мы получили сообщение с базы МакАртур в Монтане, которая раньше была форпостом Чикаго. Их ответ был, мягко говоря, уклончивым, и, похоже, у них почти не было взаимодействия с нами. Что именно там произошло — неизвестно, но, возможно, однажды мы узнаем правду."
ONT_nf_events.30.a:0 "Очень странно"
ONT_nf_events.31.title:0 "Другой Канадаклав?"
ONT_nf_events.31.desc:0 "Мы получили известия из Западной Канады от группы, называющей себя Военной Администрацией Анклава. Их рассказ был странным: мутанты, происходящие от американских солдат, сначала подчинялись Чикаго, затем потеряли назначенного Чикаго марионеточного лидера, после чего последовал длительный период военного положения. Если их слова правдивы, то у нас есть союзники совсем недалеко."
ONT_nf_events.31.a:0 "Этого мы точно не ожидали"
ONT_nf_events.32.title:0 "Слишком мало времени"
ONT_nf_events.32.desc:0 "После допроса выживших из Столичной Пустоши нам стало известно о нескольких исследовательских пунктах, которые могут содержать ценные данные. Там хранятся всё — от чертежей передовой силовой брони до секретов управления дезклоами, — всё это находится в базах данных и ждёт, чтобы быть захваченным. Скорее всего, многие из этих пунктов уже на грани того, чтобы попасть в руки мутантов. Наши офицеры разделились: одни настаивают на сосредоточении усилий на захвате одного из исследовательских пунктов, другие предлагают распределить силы, рискуя не получить ничего."
ONT_nf_events.32.a:0 "Защитить лабораторию Когтей Смерти"
ONT_nf_events.32.b:0 "Защитить чертежи «hellfire»"
ONT_nf_events.32.c:0 "Защитить чертежи робо-глаза"
ONT_nf_events.32.d:0 "Защитить чертежи силовой брони «Tesla»"
ONT_nf_events.32.e:0 "Всё или ничего!"
ONT_nf_events.33.title:0 "Растущие требования"
ONT_nf_events.33.desc:0 "Требования из Чикаго становятся всё более жёсткими и всё меньше напоминают просьбы. Обмен материалов на оборудование был логичным шагом — почему бы нашим учёным не воспользоваться лабораториями Чикаго? Но эти новые квоты, которые они нам присылают, слишком велики. Если мы попытаемся их выполнить, у нас едва ли останется достаточно исследователей и ресурсов для собственных нужд. Очевидным решением было бы отказаться от этих требований, но похоже, что они не примут такой ответ."
ONT_nf_events.33.a:0 "Мы выполним их квоты."
ONT_nf_events.33.b:0 "Нам просто нужно договориться."
ONT_nf_events.34.title:0 "Растущие требования"
ONT_nf_events.34.desc:0 "Требования из Чикаго становятся всё более жёсткими и звучат всё меньше как просьбы. Мы готовы помогать нашим соотечественникам, но это уже слишком. Если мы попытаемся выполнить эти квоты, у нас едва ли останется достаточно исследователей и ресурсов для собственных нужд. Очевидным решением было бы отказаться от этих требований, но похоже, что они не примут такой ответ."
ONT_nf_events.34.a:0 "Мы выполним их квоты."
ONT_nf_events.34.b:0 "Нам просто нужно договориться."
ONT_nf_events.34.c:0 "Напомните им, что нам никогда не нужна была их помощь"
ONT_nf_events.35.title:0 "Гонка за Канаду"
ONT_nf_events.35.desc:0 "В повороте событий, которого мы никак не ожидали, когда несколько лет назад вышли из нашего бункера, мы столкнулись с тем, что в Канаде присутствует не один Анклав. Группа мутантов, происходящих от американских военнослужащих и выступающих в роли своего рода марионеток Министра, захватила значительную территорию в Канаде. Несмотря на наши возражения против того, чтобы мутанты управляли землёй, которая по праву принадлежит Америке, мы вынуждены следовать директивам Чикаго. Чикаго настаивает на том, чтобы мы нашли способ сотрудничать с [COM.GetTag]. Также было принято решение, вопреки нашим возражениям, что в вопросах территориального контроля в Канаде действует принцип «кто первым захватил — тот и владеет»."
ONT_nf_events.35.a:0 "Тогда нам нужно выдвигаться"
ONT_nf_events.36.title:0 "Странная ситуация"
ONT_nf_events.36.desc:0 "В неожиданном повороте событий, которого мы никак не ждали, выйдя из нашего бункера всего несколько лет назад, мы обнаружили, что мы — не единственное подразделение Анклава в Канаде. Группа мутантов, происходящих от американских военнослужащих и выступающих в роли марионеток ныне уничтоженного Анклава Чикаго, захватила значительную территорию в Канаде. Несмотря на их заявления о служении Анклаву, они остаются мутантами и должны быть уничтожены так же, как и те, кто был в Торонто."
ONT_nf_events.36.a:0 "Может быть, Гэллигер сможет стать Смотрителем."
ONT_nf_events.37.title:0 "Исчезающие призраки"
ONT_nf_events.37.desc:0 "Почти так же быстро, как призраки Америки вновь появились, чтобы преследовать нас, они и исчезли. Каждый пост на нашем фронте сообщает, что уже почти две недели не видит ни одного солдата Анклава. Попытки отследить их местонахождение не дали результатов — лишь несколько разбросанных тел на снегу. Похоже, мы одержали победу, если только они снова не скрываются где-то в тени, выжидая своего часа."
ONT_nf_events.37.a:0 "Будьте бдительны"

