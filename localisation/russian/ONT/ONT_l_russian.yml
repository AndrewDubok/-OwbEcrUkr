### Ideas ###
ONT_winter_training_idea:0 "Зимняя Подготовка"
ONT_winter_training_idea_desc:0 "Наших солдат обучили ориентироваться и выживать в замёрзших пустошах Канады."
ONT_bunker_luxury_idea:0 "Роскошные дома-бункеры"
ONT_bunker_luxury_idea_desc:0 "Жилые помещения, в которых обитают наши люди в восстановленном командном бункере, заставят даже самые роскошные убежища выглядеть как лачуги. Кто бы не захотел сражаться, защищая такой дом?"
ONT_last_enclave_idea:0 "Последний луч света в Темноте"
ONT_last_enclave_idea_desc:0 "Ужасы пустошей захлестнули наших соотечественников в Чикаго и Вашингтоне. За исключением нескольких разбросанных застав, мы — всё, что осталось. Осознание того, что судьба человечества лежит на наших плечах, помогает нашим людям сохранять концентрацию и верность делу."
ONT_ontario_industry_idea:0 "Промышленная Мощь Онтарио"
ONT_ontario_industry_idea_desc:0 "Несколько работающих фабрик в Онтарио были восстановлены и приведены в боевое состояние. Мутант-рабочие трудятся на этих предприятиях, производя оружие, которое будет служить человечеству."
ONT_windsor_auto_idea:0 "Виндзорские Автозаводы"
ONT_windsor_auto_idea_desc:0 "Автомобильные заводы Виндзора и соседних городов были укомплектованы мутантами-рабами для производства транспортных средств для наших военных нужд."
ONT_canadian_trade_idea:0 "Канадская Торговля"
ONT_canadian_trade_idea_desc:0 "Торговля между [COM.GetTag] и [ONT.GetTag] принесла выгоду обеим сторонам."
ONT_trading_to_chicago_idea:0 "Поддержка от Чикаго"
ONT_trading_to_chicago_idea_desc:0 "Чикаго реквизировало ресурсы для обеспечения своей войны с мутантами в Среднем Западе. Однако ситуация не совсем односторонняя — они поставляют нам оставшееся оборудование, которое мы с лёгкостью можем переделать в подходящее вооружение."
ONT_trade_with_ronto_idea:0 "Поставки Онтарио"
ONT_trade_with_ronto_idea_desc:0 "Онтарио снабжает нас ресурсами для ведения войны. В обмен мы передаём им наш хлам и захваченные мутантские трубчатые винтовки. Очень великодушно с нашей стороны."
ONT_shipped_researchers_idea:0 "Укомплектование штатов лабораторий Чикаго"
ONT_shipped_researchers_idea_desc:0 "Немногих из наших, кто больше интересуется наукой, чем борьбой с мутантами на поле боя, отправляют в Чикаго для помощи в их исследованиях."
ONT_windsor_robot_idea:0 "Виндзорские Робозаводы"
ONT_windsor_robot_idea_desc:0 "Заводы в Виндзоре были переоборудованы для производства деталей роботов, что повысило наши производственные мощности."
ONT_windsor_weapons_idea:0 "Виндзорские Оружейные Заводы"
ONT_windsor_weapons_idea_desc:0 "Заводы в Виндзоре были переоборудованы для производства оружия, что повысило наши производственные мощности."
ONT_windsor_aircraft_idea:0 "Виндзорские Самолётные Заводы"
ONT_windsor_aircraft_idea_desc:0 "Заводы в Виндзоре были переоборудованы для производства деталей летательных аппаратов, что повысило наши производственные мощности."
ONT_windsor_industry_idea:0 "Разнообразные заводы Виндзора"
ONT_windsor_industry_idea_desc:0 "Заводы в Виндзоре были переоборудованы для производства всего — от оружия до деталей летательных аппаратов, что значительно повысило наши производственные мощности."
ONT_battered_remnants_idea:0 "Потрепанные остатки"
ONT_battered_remnants_idea_desc:0 "Лучшие из нас погибли 30 лет назад среди руин Торонто. Те, кто остался, — старые, усталые и нервные. Следующее поколение не знает, что ждёт их за этими дверями бункера, но нам всё равно предстоит встретиться с этим лицом к лицу."
ONT_failing_bunker_idea:0 "Разваливающийся Бункер"
ONT_failing_bunker_idea_desc:0 "Командный бункер Онтарио разваливается на наших глазах. Вопрос уже не в том, если нам придётся покинуть его, а когда это случится. Если бункер рухнет, нам придётся бежать из региона и надеяться найти более благоприятное место для жизни."
ONT_production_fucked_idea:0 "Отсутствие Промышленности"
ONT_production_fucked_idea_desc:0 "Без наших фабрикантов бункера производство необходимого оборудования практически невозможно."
ONT_mutie_slave_industry_idea:0 "Индустрия Мутантов-рабов"
ONT_mutie_slave_industry_idea_desc:0 "Оснащённые взрывными ошейниками и контролируемые надзирателями, мы можем заполнить целые заводы мутантами-рабочими."
ONT_wasteland_overseers_1_idea:0 "Пустошные Надзиратели"
ONT_wasteland_overseers_1_idea_desc:0 "Особо покорных мутантов привлекают к контролю над своими сородичами. Их наградой становится немного дополнительной еды и ощущение превосходства."
ONT_wasteland_overseers_2_idea:0 "Пустошные Надзиратели"
ONT_wasteland_overseers_2_idea_desc:0 "Особо покорных мутантов привлекают к контролю над своими сородичами. Их наградой становится немного дополнительной еды и ощущение превосходства."
ONT_bunker_industry_idea:0 "Промышленность в Бункере"
ONT_bunker_industry_idea_desc:0 "Наши фабрикаторы бункера ремонтируются с использованием деталей, собранных в пустошах."
ONT_bunker_fabrication_idea:0 "Бункерные Фабрикаторы"
ONT_bunker_fabrication_idea_desc:0 "Наши фабрикаторы бункера восстановлены настолько, что теперь могут не только изготавливать оборудование из собранных ресурсов, но и самостоятельно производить часть этих ресурсов."
ONT_mutie_liberation_idea:0 "Освобождение мутантов"
ONT_mutie_liberation_idea_desc:0 "Против нашей воли, мутантов больше нельзя порабощать, если только они не совершат преступление. Теперь нам приходится придумывать преступления, чтобы обвинять их."
ONT_wasteland_police_idea:0 "Полиция с Пустоши"
ONT_wasteland_police_idea_desc:0 "Наши надзиратели теперь выполняют функции полиции в мутантских сообществах. Мы больше не можем просто платить им едой, но они продолжают поддерживать работу наших заводов, задерживая и контролируя мутантов."
ONT_canadian_slaves_idea:0 "Канадские Мутанты"
ONT_canadian_slaves_idea_desc:0 "По приказу Главнокомандующего, ни один гражданин США не может быть порабощён государством без совершения преступления. Однако эти мутанты — канадцы."
ONT_targeted_industry_idea:0 "Восстановление Промышленности"
ONT_targeted_industry_idea_desc:0 "После войны в Торонто практически не осталось промышленности. То немногое, что было, не пережило нападение Анклава. Спустя более 30 лет Ронто всё ещё восстанавливается."
ONT_targeted_power_idea:0 "Восстановление электростанций"
ONT_targeted_power_idea_desc:0 "После войны в Торонто практически не осталось действующих электростанций. Те немногие, что были, не пережили нападение Анклава. Спустя более 30 лет Ронто всё ещё восстанавливается."
ONT_targeted_pop_idea:0 "Восстановление населения"
ONT_targeted_pop_idea_desc:0 "После войны в Торонто осталось очень мало населения. Тысячи погибли во время атаки Анклава. Спустя более 30 лет Ронто всё ещё восстанавливается."
ONT_studied_defenses_idea:0 "Изученная защита"
ONT_studied_defenses_idea_desc:0 "В ходе подготовки к нашей атаке мы изучали оборону мутантов, оккупировавших Торонто."
ONT_stockpiled_meds_idea:0 "Запасы Медикоментов"
ONT_stockpiled_meds_idea_desc:0 "В ходе подготовки к нашей атаке мы накопили запасы медикаментов, чтобы спасти жизни наших раненых."
ONT_supply_lines_idea:0 "Линии снабжения подготовлены"
ONT_supply_lines_idea_desc:0 "В ходе подготовки к нашей атаке мы укрепили наши линии снабжения."
ONT_enclave_propaganda_target_idea:0 "Пропаганда Анклава"
ONT_enclave_propaganda_target_idea_desc:0 "Анклав захватил наши радиоволны и сбрасывает листовки, чтобы подорвать боевой дух нашего народа!"
ONT_winterized_power_armor_idea:0 "Зимняя Силовая Броня"
ONT_winterized_power_armor_idea_desc:0 "Используя схемы из Командного бункера Онтарио, мы разработали покрытие для силовой брони, которое минимизирует теплопотери в холодных условиях."
ONT_washington_occupation_idea:0 "Понимание В.А.Ш.И.Н.Г.Т.О.Н"
ONT_washington_occupation_idea_desc:0 "Оккупация довоенной Канады мало чем отличалась от нашей оккупации пустошей. Поэтому мы можем перенять кое-что у В.А.Ш.И.Н.Т.О.Н о том, как держать этих мутантов в повиновении."

###Laws###
ONT_overseers_law:0 "Программа Надзирателей"
ONT_overseers_law_desc:0 "Многие мутанты с готовностью служат нам, контролируя своих сородичей. Удивительно, какую лояльность может вызвать простой жестяной значок и немного дополнительных пайков."

### Rule Overrides ###
ONT_override_desc:0 "Мы сможем отправить солдат на помощь нашим друзьям в Западной Канаде"

### Tooltips ###
ONT_1_tt:0 "§RНапряжение приблизит наш бункер к краху§!"
ONT_2_tt:0 "§GРесурсы, которые мы сэкономим, позволят нашему бункеру работать дольше§!"
ONT_3_tt:0 "Это повлияет на состав наших подразделений"
ONT_4_tt:0 "Эти медикаменты помогут нам, когда мы начнём атаку"
ONT_5_tt:0 "Наши роботы безопасности будут развернуты"
ONT_6_tt:0 "Наши ребята вышли на поле сразу после VR-тренировок"
ONT_7_tt:0 "Наши недавно обученные войска вышли на поле боя"
ONT_8_tt:0 "Наши войска настолько готовы, насколько мы можем их подготовить с помощью учебника"
ONT_9_tt:0 "Разведка обороны противника поможет вашему первоначальному наступлению"
ONT_10_tt:0 "Это поможет нам в войне против Ронто"
ONT_11_tt:0 "Это поможет деморализовать мутантов, когда мы нападём"
ONT_12_tt:0 "Разблокирует новый закон об оккупации, который поможет совладать с мутантами"
ONT_13_tt:0 "Разблокирует В.А.Ш.И.Н..Г.Т.О.Н как культурного советника"
ONT_14_tt:0 "Роботы В.А.Ш.И.Н..Г.Т.О.Н.А теперь будут сражаться за нас"
ONT_15_tt:0 "Разблокирует законы оккупации, чтобы сосредоточить наше внимание на ценных ресурсах или промышленности, а не на борьбе с мутантами"
ONT_16_tt:0 "НУЖНО ЧТО-ТО"
ONT_17_tt:0 "Это позволит нам принять решение о строительстве собственного Проекта «Чистота» на озере Онтарио!"
ONT_18_tt:0 "Хозеры прорвутся к вражеским линиям, принимая на себя пули, предназначенные для американцев."
ONT_19_tt:0 "§RКоммунисты захватили Канаду!§!"
ONT_20_tt:0 "Судьба поможет нам справиться с Канадой"
ONT_21_tt:0 "Без Анклава и коммунистов поблизости мы можем не спешить с этой кампанией"
ONT_22_tt:0 "Пиратские ржавые корыта сгодятся, пока мы не сможем построить тихоокеанский флот"
ONT_23_tt:0 "Чикаго направит советников, чтобы помочь нам управлять нашей территорией — к лучшему или к худшему."
ONT_24_tt:0 "Нет, ты не можешь" 
ONT_25_tt:0 "Доступно, поскольку мы отказались от помощи Чикаго"
ONT_26_tt:0 "Советники из Чикаго настаивают на этом"
ONT_27_tt:0 "§RНет, заткнись§!"
ONT_28_tt:0 "Открывает решения о приглашении других Анклавов в нашу фракцию, как только мы с ними граничим."
ONT_29_tt:0 "Это даст нам немного времени"
ONT_30_tt:0 "§RБудет уже слишком поздно. Нам придётся отступить и пробираться в дикую местность. Шансы на выживание невелики.§!"
ONT_31_tt:0 "Нам нужно решить, как мы будем вооружать людей ещё до начала их обучения!"
ONT_32_tt:0 "§RПРОЧИТАЙТЕ СВОИ РЕШЕНИЯ И ОБРАТИТЕ ВНИМАНИЕ НА ТИКАЮЩИЕ ЧАСЫ!§!"

