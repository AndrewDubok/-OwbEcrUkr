l_russian:

  atb_pagan_hatred:0 "Ненависть к язычникам"
  atb_pagan_hatred_desc:0 "Каннибалы, насильники и откровенные идолопоклонники-язычники окружают святую церковь Божию. Этому не будет конца."

  atb_the_trinity:0 "Троица"
  atb_the_trinity_desc:0 "Несмотря на своё название, атомбаптисты не поклоняются Атому. Они верят в Троицу: Отца, Сына и Святое Сияние."

  atb_fight_the_swamps:0 "Борьба с болотами"
  atb_fight_the_swamps_desc:0 ""

  atb_accept_the_swamps:0 "Принятие болота"
  atb_accept_the_swamps_desc:0 ""

  atb_firey_faith:0 "Пламенная вера"
  atb_firey_faith_desc:0 "Мы уверены, что наши враги - онтологически злые существа, и нет никаких действий, направленных против них, которые были бы неправильными."

  atb_teachings_of_saint_monica:0 "Учения Святой Моники"
  atb_teachings_of_saint_monica_desc:0 "От отца Клиффорда мы узнали о святой Монике, покровительнице пропавших детей. Она учит нас заботиться о потерянных и заблудших, а также друг о друге."

  atb_temples_to_the_faith:0 "Храмы веры"
  atb_temples_to_the_faith_desc:0 "Мы строим великие церкви во славу Бога, и наша вера объединяет нас."

  atb_raised_from_muck:0 "Выращенный из грязи"
  atb_raised_from_muck_desc:0 "Многие из наших последователей мало что знают, кроме жестоких и опасных болот. Мы должны показать им, что лучшая жизнь и лучшее будущее возможны."

  atb_glossolalia:0 "Глоссолалия"
  atb_glossolalia_desc:0 "Здесь принимают говорение на языках, которых часто боятся и избегают в пустошах. Хотя эти люди неортодоксальны, они несут слова от Бога."

  atb_the_swamps_united:0 "Объединённые Болота"
  atb_the_swamps_united_desc:0 "Наша религия уникальна. Атомбаптисты вышли из болота, а болота - наш дом."

  atb_work_with_coa:0 "Работа с Детьми Атома"
  atb_work_with_coa_desc:0 "Дети Атома проповедуют религию, отличную от нашей, но понимают святость радиации и очищающего пламени апокалипсиса."

  atb_faith_of_the_swamps:0 "Вера болот"
  atb_faith_of_the_swamps_desc:0 "Атомное Крещение зародилось на болотах, и именно оттуда мы черпаем свою силу."

  atb_shepherds:0 "Пастухи"
  atb_shepherds_desc:0 "Мы проповедуем будущее надежды и единства, а не разобщённости. Не все в пустоши могут принять наши взгляды, но они имеют основополагающее значение для того, кто мы и что мы есть."

  atb_crusaders:0 "Крестоносцы"
  atb_crusaders_desc:0 "Пустошь - опасное место, и только благодаря нашей постоянной бдительности в борьбе со злом люди могут быть в безопасности."