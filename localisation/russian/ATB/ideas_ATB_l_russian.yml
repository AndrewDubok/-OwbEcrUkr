l_russian:

  atb_pagan_hatred:0 "Ненависть до язичників"
  atb_pagan_hatred_desc:0 "Канібали, гвалтівники та відверті язичники-ідолопоклонники оточують святу Божу церкву. Цьому не можна допустити."

  atb_the_trinity:0 "Трійця"
  atb_the_trinity_desc:0 "Незважаючи на свою назву, Атом-Баптисти не поклоняються Атому. Вони вірять у Трійцю: Отця, Сина і Святе Сяйво."

  atb_fight_the_swamps:0 "Боротьба з болотами"
  atb_fight_the_swamps_desc:0 ""

  atb_accept_the_swamps:0 "Прийняття боліт"
  atb_accept_the_swamps_desc:0 ""

  atb_firey_faith:0 "Вогняна віра"
  atb_firey_faith_desc:0 "Ми твердо знаємо, що наші вороги є онтологічним злом, і не існує неправильних дій проти них."

  atb_teachings_of_saint_monica:0 "Вчення Святої Моніки"
  atb_teachings_of_saint_monica_desc:0 "Від отця Кліффорда ми дізналися про Святу Моніку, покровительку зниклих дітей. Вона вчить нас піклуватися про заблуканих і заблудлих, а також одне про одного."

  atb_temples_to_the_faith:0 "Храми віри"
  atb_temples_to_the_faith_desc:0 "Ми будуємо величні церкви Богу, і наша віра об'єднує нас."

  atb_raised_from_muck:0 "Підняті з багна"
  atb_raised_from_muck_desc:0 "Багато наших послідовників мало що знають, окрім жорстоких і небезпечних боліт. Ми повинні показати їм, що краще життя та майбутнє можливі."

  atb_glossolalia:0 "Глосолалія"
  atb_glossolalia_desc:0 "Говоріння іншими мовами, якого часто цураються та бояться по всій пустці, тут прийняте. Хоча це й неортодоксально, ці люди приносять слова від Бога."

  atb_the_swamps_united:0 "Об'єднані болота"
  atb_the_swamps_united_desc:0 "Наша релігія є чимось унікальним. Атом-Баптисти походять з болота, і болота є нашим домом."

  atb_work_with_coa:0 "Співпраця з Дітьми Атома"
  atb_work_with_coa_desc:0 "Діти Атома проповідують іншу релігію, ніж наша, але вони розуміють святість радіації та очищувальне полум'я апокаліпсису."

  atb_faith_of_the_swamps:0 "Віра боліт"
  atb_faith_of_the_swamps_desc:0 "Атом-Баптизм народився з боліт, і саме звідти ми черпаємо нашу силу."

  atb_shepherds:0 "Пастирі"
  atb_shepherds_desc:0 "Ми проповідуємо майбутнє надії та єдності, а не розбрату. Не всі на пустці можуть прийняти наші погляди, але вони є фундаментальними для того, ким і чим ми є."

  atb_crusaders:0 "Хрестоносці"
  atb_crusaders_desc:0 "Пустка є небезпечним місцем, і тільки завдяки нашій невсипущій пильності проти зла люди можуть бути в безпеці."