l_russian:
  ### East Coast Rebirth ###
  EC_NAME:0 "Вост. Побережье"
  EC_DESC:0 "£GFX_east_coast          \nПослевоенная Америка - это беззаконная, негостеприимная и бесплодная пустошь. Большая её часть представляет собой бесплодные пустоши, где только самые сильные могут выжить на облученных землях. Великая Война ничуть не пощадила Восток, однако некоторые районы оказались менее разрушенными, чем другие, и смогли создать небольшие поселения, а некоторые даже процветать. В то время как Питтсбург и Вашингтон подверглись масштабной бомбардировке ядерными боеприпасами, сельские районы, такие как Западная Вирджиния и часть Мэриленда, в основном не пострадали, хотя всё ещё были подвержены воздействию мутантов и радиации. На Бостон была сброшена одна ядерная бомба, но она промахнулась и упала дальше на юг.\n\nКроме того, жизнь в пустоши, независимо от места, всегда может сломить самых сильных людей. Не секрет, что в знойных пустошах обитают кланы рейдеров. Эти группы людей силой забирают всё, что могут, не щадя никого на своем пути. К сожалению, не так много организаций способны защитить мирные племена и маленькие городки, однако некоторые из них всё же встают на защиту земли, например "Грин-Маунтин Бойз" или "Рейнджеры Рейли" - свирепые, но добродушные наемники, действующие из Вашингтона. Даже "Регуляторов", поклявшихся уничтожать всякое зло, которое можно увидеть в некоторых районах пустошей. Пока жизнь в восточных пустошах продолжается, большая фракция металлических рыцарей, известная как Братство Стали, пытается облегчить жизнь в окрестностях Вашингтона, но война с Анклавом уже назревает."
  EEN_ECR_DESC:0 "Изначально это было тайное глубинное государство, контролировавшее довоенные Соединённые Штаты, но после Великой Войны, Анклав пережил тяжелые времена. Несмотря на тщательное планирование и передовые технологии, главная база Анклава была разрушена чуть более 35 лет назад, и многие из выживших бежали на восток, в Рэйвен-Рок. С тех пор связь со вспомогательными базами прервалась. Тем не менее, Анклав продолжает существовать. Под руководством президента Джона Генри Эдема Анклав потратил последние три десятилетия на восстановление своей мощи. Теперь, когда новое поколение готово сражаться за свою страну, Анклав начинает последние приготовления к походу в пустошь, чтобы вернуть Америку. Отбить её у рейдеров-анархистов, чудовищно мутировавших супермутантов и, конечно же, у их старых врагов - Братства Стали. Чего бы это ни стоило, Анклав восстановит мир, порядок и процветание этой некогда великой нации. А те, кто выступает против них, будут устранены навсегда."
  BLN_ECR_DESC:0 "Многое изменилось с тех пор, как старейшина Лайонс и его команда паладинов, рыцарей и писцов впервые прибыли в Столичную Пустошь. За годы, прошедшие с момента их прибытия в Столичную Пустошь, они не видели недостатка в конфликтах. Рейдеры, гули и жадные жители пустошей сами по себе являются проблемой, но есть еще и супермутанты. Эти неповоротливые мародеры заполонили Столичную Пустошь, и главной миссией ордена стало их уничтожение. Однако, не зная, откуда они приходят, все, что они могут сделать, это отчаянно сдерживать волну. Если внешних проблем было недостаточно, проблемы назревают и внутри ордена Лайонс. Ропот неодобрения со стороны более традиционных членов ордена начинает расти в громкости. Следующие несколько месяцев будут иметь решающее значение, если старейшина Лайонс хочет сохранить свой орден, потому что если их братья бросят их, орден Лайонс окажется в еще более тяжелом положении."
  PIT_ECR_DESC:0 "Питт - одно из самых страшных мест в Пустоши, и на то есть веские причины: из-за каннибалов, рейдеров, радиации, болезней и рабства некогда великий город Питтсбург сейчас, откровенно говоря, превратился в ад, и если вы можете себе это представить, то раньше было гораздо хуже. В результате "Бича Божьего", операции Братства Стали, многие погибли, а ещё больше людей получили травмы на всю жизнь. Но в результате в Питте появился новый лидер: Ишмаэль Ашур, бывший послушник, которого считали погибшим. Теперь Ашур правит Питтом железным кулаком, и многие страдают от этого. Но перемены, хорошие или плохие, грядут, и они могут решить судьбу Питта и сотен рабов в нем."
  RIV_ECR_DESC:0 "Ривет-Сити уже несколько десятилетий является научным центром Столичной Пустоши. Хотя Анклав и Братство утверждают, что любят создавать новое, они поклоняются лишь тому, что уже существует, в то время как учёные Ривет-Сити создают новые, действительно полезные инновации, разрабатывая свежие продукты питания и передовые методы лечения. Со временем Ривет-Сити сможет обеспечить Пустошь свежей водой и превзойти даже величайшие достижения Старого Мира.\n\nНо не всё так хорошо. Нападения супермутантов, солдат Анклава и организованных рейдеров на Столичную Пустошь не оставили Ривет-Сити невредимым, а столкновение Анклава и Братства грозит разрушить хрупкое существование Ривет-Сити. Прокладывать курс через мутные воды всегда непросто."
  RON_ECR_DESC:0 "Ронто - бастион на Севере, надежда и мечта поколений, вошедших в его движение сопротивления. До войны, во всяком случае. Теперь сопротивление американской оккупации определило развитие самого могущественного государства в Онтарио. В.А.Ш.И.Н.Г.Т.О.Н, могущественный довоенный ИИ, охраняет нацию с решимостью прогнать любых американских захватчиков, а хоккей получил широкое распространение как средство сохранения культуры Канады. Однако в условиях назревающих конфликтов на юге и передела власти в пустынях Ронто приходится бороться за сохранение своей столь любимой независимости изо всех сил. Кто знает, с чем придётся столкнуться канадской нации в будущем?"
  BHS_ECR_DESC:0 "Двести лет назад компания General Atomics выбрала Службу Здравоохранения Баффало в качестве испытательного полигона для своего крупного достижения в области медицины. Отделение биомеханического медицинского администрирования, также известное как Б.М.М.А.У, было призвано стать врачом завтрашнего дня. Врачом, который не мог заболеть и был доступен круглосуточно, никогда не ошибаясь во время операций. Б.М.М.А.У должен был произвести революцию в медицине, но тут грянула Великая Война. Десятилетиями наблюдая за ужасными травмами и болезнями, с которыми сталкивались люди в постъядерном мире, Б.М.М.А.У осознал одну важную вещь: надёжность стали - предпочтительнее слабости плоти. Со временем всё человечество должно быть спасено."
  TAL_ECR_DESC:0 "Компания «Коготь» - самая крупная из групп наёмников в Пустоши. Они завоевали репутацию безжалостных и эффективных людей, готовых на всё, если за это будет назначена соответствующая цена. Но прямо за рекой, к северу от них, что-то происходит. Патрули упоминают, что видели неуклюжие фигуры, бродящие после наступления темноты, а некоторые упоминали, что видели воздушные корабли. Первоначально это было воспринято как просто болтовня новобранцев во время их первого патрулирования, но что, если это не так? Может ли это быть новой угрозой для компании или потенциальным новым клиентом?"
  DCS_ECR_DESC:0 "Несколько лет назад Дядюшка Роу собрал несколько караванов, чтобы работать сообща для взаимной выгоды. Когда рейдеры в развалинах Бетесды устроили беспорядки, эти торговцы обратились за помощью к поселениям, которые они посетили, и, добившись успеха, поселения поняли, что вместе они сильнее. Сейчас Столичные Поселения представляют собой свободную конфедерацию городов по всей Столичной Пустоши, которые обеспечивают взаимную защиту и помощь. Дела шли на лад, но как только совет собрался, чтобы обсудить кандидатуру председателя, возникло множество проблем. Большой Город всё чаще подвергается нападкам. Община Кентербери имеет дело с двумя переодетыми психами, терроризирующими своих граждан. Хуже всего то, что Арефу, похоже, находится под угрозой со стороны вампиров, честное слово! И ещё есть Дэйв, лидер окраинного поселения, который настаивает на том, чтобы его назначили лидером всего альянса."
  DCR_ECR_DESC:0 "Рейдеры бродили по Столичной пустоши с того самого дня, как на неё упали бомбы. Более 100 лет бродячие банды терроризировали всех, кто оказывался за стенами поселений, лишь изредка устраивая перестрелки друг с другом за территорию. Однако в последние годы, благодаря Братству, недавно организованным поселениям Вашингтона и, конечно же, супермутантам, настали тяжелые времена. Чтобы сохранить свой образ жизни, бандам придётся работать вместе. К счастью, на сцену выходит крутой рейдер по имени Райан Бригг, который утверждает, что у него есть большой план."
  ANV_ECR_DESC:0 "Что бы ни говорили об Андейле посторонние, это просто самый лучший город в Вирджинии. За 200 лет, прошедших с момента падения бомб, здесь почти ничего не изменилось, а новые поколения продолжают передавать старые добрые американские ценности. Некоторые говорят, что это последний город в Америке, который всё ещё хранит американскую мечту. Есть только пара вещей, о которых следует помнить. В Андейле чужаки должны следить за своими манерами, а мужчина должен ставить мясо на стол."
  COR_ECR_DESC:0 "Много лет назад Церковь Роки была изгнана из Скалистых Пещер подлыми варварами Грин-Маунтин. Многие пришли в отчаяние из-за вынужденного исхода с родины, но благодаря новому лидеру их отчаяние превратилось в ярость. Святой Пеббл повёл свой народ на завоевание соседних племён, неся свет Роки простым варварам. Рокисты потратили годы на накопление своих сил, и скоро настанет время начать поход на юг. Возвращение в Пещеры Роки становится всё ближе, как и Священное Возмездие Роки тем, кто изгнал его избранный народ."
  HOS_ECR_DESC:0 "Подобно другим бандам Онтарио, Хозеры соревнуются в кровавом спорте, который они называют хоккей. Хозеры - лучшие, или, скорее вторые, команда В.А.Ш.И.Н.Т.О.Н обыгрывает их каждый раз. Их нынешний лидер, Шор, устал проигрывать. Они собираются перестроить банду. \n\nИ больше они никогда не проиграют!"
  NNC_ECR_DESC:0 "Жизнь рыцарей Пустошей нелегка. Троги постоянно нападают с юга, рейдеры вечно ищут лёгкой добычи, а работорговцы постоянно похищают путников. Рыцарям Нового Нью-Касла и так приходится с трудом защищать свою страну. Теперь им приходится беспокоиться друг о друге. Лорд Ланкастер начинает сходить с ума, и без лидера лишь вопрос времени, когда новый лорд возглавит круглый стол."
  GMN_ECR_DESC:0 "«Грин-Маунтин Бойз» были довоенными антиправительственными партизанами. В годы, предшествовавшие войне, они были занозой для правительства Соединенных Штатов. Многие из них стали гулями после Великой Войны и продолжают свою борьбу, принимая добровольцев. Они по-прежнему борятся, но не против правительства, а против любого, кто пытается навязать свою волю независимым поселениям в их районе."
  ONT_ECR_DESC:0 "Когда станция управления АНКЛАВ была уничтожена, Анклав Онтарио вышел из своего командного бункера, намереваясь захватить канадские пустоши с помощью плазменного огня. За несколькими короткими годами успеха последовали сокрушительные поражения, которые заставили их вернуться в свой бункер. В последующие десятилетия обитатели бункера делали всё возможное, чтобы поддерживать свои ветшающие системы в рабочем состоянии. Каждое крыло, которое можно было закрыть, каждая система, которую можно было разобрать, или каждый элемент техники, который можно было разобрать на запчасти, были закрыты. Годы сделали Анклав Онтарио слабым и запуганным. Теперь они смотрят, как уходит время, зная, что со временем у них не останется иного выбора, кроме как выйти в пустошь и встретиться с врагом, который не забыл их ненависти. \n \n §RЭто сложная нация. Не надейтесь насладиться легкой резней в силовой броне."
  ATB_ECR_DESC:0 "Пастор Джеймс Говард Мур, родившийся до Великой Войны в великом городе Мейкон, штат Джорджия, годами скитался по пустошам, имея при себе лишь одежду и Библию короля Якова, задаваясь вопросом, почему он живёт, в то время как другие умирают. Найдя в Вирджинии последователей Атома, он направил их к свету Иисуса, и так появились АтомБаптисты. Теперь он помогает своей пастве неустанно остерегаться язычников, ведьм и безумцев, населяющих южную Вирджинию."
  AMM_ECR_DESC:0 "Брат Авраам - фактический лидер Долины Аммана. Прибыв с группой супермутантов-беженцев из Города, он благодаря своему высокому интеллекту и харизме (для супермутанта) завоевал доверие и любовь братьев во Христе. Теперь община надеется на него в эти непростые времена."
  FRM_ECR_DESC:0 "Десятилетиями Бидда и её народ были вынуждены скрываться от наступающего болота и обезумевших племён, населяющих его. Бидда руководила своим народом, управляя выжиганием, уничтожая участки болота, чтобы просто не допустить проникновения тли в свои дома. Теперь, когда нашествие Известных Людей вызвало хаос, а Эдемский сад рушится, Бидда находит новую опору в некогда враждебном мире. \n\n§GНадежду§!."
  GED_ECR_DESC:0 "Фортуна выросла в сильном Эдеме, ведомая болотами. Она предвидела грядущий крах и проповедовала против упадка и апатии, нараставших среди других болотных оракулов. Когда всё начало рушиться, она была единственной, кто не был удивлён. Теперь Эдемский сад отступил, но, будучи Матриархом своего племени, Фортуна хочет это изменить. Однако с каждым днём её предсказания предрекают гибель, и всё меньше людей посещают их. \n\nОна боится, что, что бы она ни делала, ничто не сможет спасти Эдем."
  KWF_ECR_DESC:0 "Рик - фанатик, но не религиозный. Он видит в пламени, которое размахивают пожарные, символы более истинного мира, мира, свободного от сводящего с ума болота и бессмысленной болтовни болотников. Он мечтает лишь о том, чтобы все они сгорели. В этом и заключается его фанатизм."
  TRN_ECR_DESC:0 "В руинах за стенами владений Ашура простирается дикая земля, кишащая трогами и дикарями, чьи разумы погрузились во мрак. Мало кто из тех, кто отважился выйти за ограду, возвращается, но некоторые, кто всё же выходил, рассказывают о странных вещах. Ходят слухи, что среди трогов и дикарей живут люди, живущие в старой крепости, куда никто не может добраться... могут ли эти слухи быть правдой?"
