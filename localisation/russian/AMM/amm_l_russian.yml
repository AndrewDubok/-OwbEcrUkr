    ###Cosmetic Tags###
    AMM_cosmetic_tag:0 "Союз Амішів"
    AMM_cosmetic_tag_ADJ:0 "Союз Амішів"
    AMM_cosmetic_tag_DEF:0 "Союз Амішів"

    ###Events###
    AMM_nf_events.1.title:0 "Роки минають, зміни невеликі"
    AMM_nf_events.1.desc:0 "Спосіб життя нашого народу мало змінився за останні 400 років. Навіть коли світ прийняв атом і складні машини, ми покладалися на прості інструменти та зусилля. Життя оберталося навколо сім'ї, віри та догляду за полями. Кажуть, що до війни наш народ висміювали. Його вважали відсталим і дурним. Однак, коли падали бомби, з'явилися люди з зовнішнього світу, які приїхали на наші землі, бажаючи прийняти наш спосіб життя. Вони пізнали дурість свого сучасного світу і невдовзі стали просто новими членами нашої громади."
    AMM_nf_events.1.a:0 "Як ми могли їх відвернути?"
    AMM_nf_events.2.title:0 "Зовнішні загрози"
    AMM_nf_events.2.desc:0 "Зі зруйнуванням сучасних міст ми бачили, як багато хто перейшов на наші землі. Дехто шукав порятунку, але інші мали гірші наміри. Розбійники, які прагнули силою забрати нашу землю та врожай, спустошували нашу долину. Ми швидко зрозуміли, що переговори з ними не спрацюють, іноді нам доведеться битися. Але ми не воїни, нам потрібна була невелика допомога."
    AMM_nf_events.2.a:0 "Ми використовували наших собак"
    AMM_nf_events.2.b:0 "Ми збудували міцні стіни"
    AMM_nf_events.2.c:0 "Ми розробили нову тактику"
    AMM_nf_events.3.title:0 "Незграбні мандрівники"
    AMM_nf_events.3.desc:0 "Близько ста років тому великі зелені чоловіки проходили через нашу долину з південного заходу. Ці велетні хизувалися важкою зброєю та несли шрами незліченних битв, але вони не нападали на нас. Багато з них здавалися простими і не були предметом розмов. Той, хто їх очолював, розповів нам про їхню долю. Колись вони були людьми, такими ж, як ми, але зіпсованими довоєнними технологіями, які перетворили їх на зброю війни. Брат Фарні, наш тодішній пастор, переконав наш народ, що наш обов'язок — забезпечити місце для цих жалюгідних мандрівників і врятувати їхні душі. У нашій громаді вони знову навчаться жити як люди. Хоча вони відрізнялися від нас, вони знайшли своє місце в нашій громаді. Як і всі інші, вони робили потроху все, але найкраще підходили для..."
    AMM_nf_events.3.a:0 "Зведення сараїв та розчищення доріг."
    AMM_nf_events.3.b:0 "Оранка полів та збір врожаю."
    AMM_nf_events.4.title:0 "Час для змін?"
    AMM_nf_events.4.desc:0 "Бачачи ці небезпеки на горизонті, багато хто хвилюється, що наших старих методів може бути недостатньо. 200-річні мисливські рушниці та модифіковані сільськогосподарські знаряддя добре підходять для захисту від бандитів, але як щодо хвилі лазерних роботів? Деякі припускають, що для подолання цієї кризи нам, можливо, доведеться прийняти деякі старі технології, яких ми уникали понад 400 років."
    AMM_nf_events.4.a:0 "Це важкі часи"
    AMM_nf_events.4.b:0 "Ми не можемо поступитися своїми переконаннями"
    AMM_nf_events.5.title:0 "Дивлячись Дияволу в очі"
    AMM_nf_events.5.desc:0 "Це було нелегко, але нам нарешті вдалося пробратися до лігва злої машини Б.М.М.А.У.. Сотні проклятих машин стояли між нами та цим проклятим творінням, але Господь провів нас крізь це. Ми вийшли з іншого боку гори зламаних машин і опинилися обличчям до величезного комп'ютера, який називав себе рятівником людства. Хоча ми були виснажені, ми знали, що нам потрібно робити. Ми не могли просто вимкнути цю штуку з розетки, щоб хтось не підключив її знову. Ми взялися за роботу і годинами розбивали машину, доки не переконалися, що вона більше ніколи не запрацює."
    AMM_nf_events.5.a:0 "Діло зроблено"
    AMM_nf_events.6.title:0 "Витримав випробування часом"
    AMM_nf_events.6.desc:0 "Так і сталося, зі знищенням Б.М.М.А.У. безпосередня криза, що загрожувала нашому народу, була подолана. Незважаючи на загрози, що стояли попереду, наш народ дотримувався своїх переконань. Ми не покладалися на технології, які зруйнували світ, і таким чином зберегли дух нашого народу. Наступні роки були дуже схожі на попередні. Наш народ залишався зосередженим на своїй родині, вірі та полях."
    AMM_nf_events.6.a:0 "А як щодо Герші?"
    AMM_nf_events.7.title:0 "Повільний занепад"
    AMM_nf_events.7.desc:0 "Так і сталося, зі знищенням Б.М.М.А.У. безпосередня криза, що загрожувала нашому народу, була знищена. У скрутний час наша віра похитнулася. Ми звернулися до технологій, які зруйнували світ, і таким чином відкрили скриньку Пандори, яку ми не могли закрити. У наступні роки наш народ поступово йшов на все більше і більше компромісів. Зрештою, ми не надто відрізнялися від будь-якого іншого поселення на пустці."
    AMM_nf_events.7.a:0 "А як щодо Герші?"
    AMM_nf_events.8.title:0 "Доля Герші"
    AMM_nf_events.8.desc:0 "Коли наші брати з Херші приїхали на наші землі, ми, природно, прийняли їх. Хоча їхній спосіб життя дещо відрізнявся від нашого, вони добре інтегрувалися в нашу громаду. Зрештою, багато хто з них навчився бачити в долині свій справжній дім. Дехто все ще хотів колись повернути Герші у загарбників, які їх вигнали, але вони так і не отримали достатньої підтримки, щоб розпочати атаку."
    AMM_nf_events.8.a:0 "А що з Гелассенгейтом?"
    AMM_nf_events.9.title:0 "А як щодо Герші?"
    AMM_nf_events.9.desc:0 "Коли наші брати з Герші прибули на наші землі, ми, природно, прийняли їх. Хоча їхній спосіб життя дещо відрізнявся від нашого, вони добре інтегрувалися в нашу громаду. Зрештою, деякі з них навчилися бачити в долині свій справжній дім. Однак багато хто бачив у могутніх зелених охоронцях нашої громади інструмент, який вони могли б використовувати. За кілька років вони змогли згуртувати багатьох наших братів-мутантів, а також деяких ополченців, щоб розпочати атаку на Херші. Атака була приречена з самого початку, і сотні людей загинули."
    AMM_nf_events.9.a:0 "А що з Гелассенгейтом?"
    AMM_nf_events.10.title:0 "Доля Герші"
    AMM_nf_events.10.desc:0 "Поселення Герші стало другою домівкою для наших торговців. Щоразу, коли збирали врожай, ми відправляли їм наші надлишки на ринок, а вони поверталися з ресурсами, щоб допомогти нам як пережити зиму, так і зібрати наступний врожай. Наше партнерство з жителями Герші ніколи не було чимось більшим, але це цілком влаштовувало обидва наші народи."
    AMM_nf_events.10.a:0 "А що з Гелассенгейтом?"
    AMM_nf_events.11.title:0 "Одна велика спільнота"
    AMM_nf_events.11.desc:0 "Наші брати в Гелассенгейті добре влаштувалися в нашій громаді. Їхні ідеали тісно збігалися з нашими, і разом ми підтримували одне одного в добрі та погані часи. Коли одна з наших громад мала поганий врожай, решта позичала свій надлишок. Коли все було добре, ми регулярно збиралися разом на свята та святкування віри. З часом багато хто з нас почав дивуватися, чому наші люди взагалі були розділені."
    AMM_nf_events.11.a:0 "А що ж «Пілігрими»?"
    AMM_nf_events.12.title:0 "Падіння Гелассенгейта"
    AMM_nf_events.12.desc:0 "Наші брати в Гелассенгейті погано влаштувалися в нашій громаді. На відміну від тих, хто жив у долині, вони не погоджувалися з нашим прийняттям довоєнних технологій. Коли наші люди віддалилися один від одного, конфлікти стали звичним явищем. Зрештою стався розкол, а потім суперечки щодо володіння прилеглими полями призвели до кровопролиття. Фермери Гелассенгейта не могли зрівнятися з супермутантами, озброєними автоматичною зброєю, а поля Гелассенгейта були удобрювані кров'ю його жителів."
    AMM_nf_events.12.a:0 "А що ж «Пілігрими»?"
    AMM_nf_events.13.title:0 "Розкол"
    AMM_nf_events.13.desc:0 "Наші брати в Гелассенгейті не дуже добре влаштувалися в нашій громаді. На відміну від тих, хто жив у долині, вони не погоджувалися з нашим прийняттям довоєнних технологій. Коли наші люди віддалилися один від одного, конфлікти стали звичним явищем. Однак ці конфлікти завжди були лише словами і ніколи не були чимось більшим. Зрештою, мешканці Гелассенгейту знову відокремилися від Долини. Торгівля та підтримка продовжувалися протягом наступних років, але з розумінням того, що ми ніколи не будемо єдиним народом."
    AMM_nf_events.13.a:0 "А що ж «Пілігрими»?"
    AMM_nf_events.14.title:0 "Стіна між нами"
    AMM_nf_events.14.desc:0 "Наші брати в Гелассенгайті були з нами, коли ми боролися проти злих машин. Наші люди добре ладнали та деякий час співпрацювали. Однак, оскільки наш спосіб життя поступово став таким самим, як і в ширших пустках, наші брати в Гелассенгайті трималися на відстані. Вони все ще торгували з нами, і ми приходили один одному на допомогу в кризові часи, але через довгий час стало зрозуміло, що вони не вважають нас братами. Але нам було байдуже, чому ми хотіли бути такими відсталими, як ці?"
    AMM_nf_events.14.a:0 "А що ж «Пілігрими»?"
    AMM_nf_events.15.title:0 "Сильні разом"
    AMM_nf_events.15.desc:0 "Наші брати в Гелассенгейті були з нами, коли ми боролися проти злих машин. Наші люди добре ладнали і з роками ставали дедалі більш співпрацюючими. Коли наші люди жили та працювали разом, наші схожі культури перепліталися. До кінця наступного століття між Долиною Аммана та народом Гелассенгейта не було жодної розбіжності. Ми були просто амішами. Разом ми ділили наші радощі та тягарі, працювали на наших полях та практикували нашу віру."
    AMM_nf_events.15.a:0 "А що ж «Пілігрими»?"
    AMM_nf_events.16.title:0 "Мирне життя"
    AMM_nf_events.16.desc:0 "Так само, як наш спосіб життя майже не змінювався протягом століть, цілі покоління амішів бачили, як наші брати-мутанти майже не змінювалися протягом століть. Вони залишалися стовпами громади, які допомагали нам триматися на правильному шляху. Разом з нами вони обробляли поля та сповідували віру. Хоча вони пережили багатьох із нас і переживуть багатьох інших, ми всі знаємо, що одного дня ми побачимо їх у Господньому домі."
    AMM_nf_events.16.a:0 "Ми будемо готові їх зустріти"
    AMM_nf_events.17.title:0 "Руйнуються стовпи"
    AMM_nf_events.17.desc:0 "Хоча ми й захистили наших братів-мутантів від війни з Б.М.М.А.У. та жахів, які з нею пов'язані, ми не змогли захистити їх від змін у наших серцях. Якийсь час все було так само. Наші брати-мутанти обробляли поля разом з нами та сповідували віру. Але, коли наша громада змінилася, багато хто з них теж змінився. Деякі знайшли роботу найманцями, а інші пішли шукати новий дім. Найсумніше — це доля тих, хто залишився. Багато з тих, хто знайшов мир у нашому способі життя, були розбиті горем, побачивши, як він змінюється. Вони намагалися повернути наш народ до старих звичаїв, але зрештою їх сприймали як не що інше, як черговий пережиток старості. Ці стовпи громади були знехтовані, а їхні благання проігноровані."
    AMM_nf_events.17.a:0 "Ми їх підвели."
    AMM_nf_events.18.title:0 "Як і ми"
    AMM_nf_events.18.desc:0 "Наші брати-мутанти стояли з нами проти жахів Пустовища. З роками змінювалася наша спільнота, і вони теж. Мутантів прийняли в нашому суспільстві, але зрештою всі вони опанували ролі, які часто виконують представники їхньої породи. Замість проповідників та мудрих старійшин вони стали охоронцями та викидайлами. Зрештою, питання порятунку їхніх душ зникло з публічних дискусій."
    AMM_nf_events.18.a:0 "Так само, як і ми, вони загублені"
    AMM_nf_events.19.title:0 "Щось змінилося"
    AMM_nf_events.19.desc:0 "Наші брати-мутанти стояли з нами проти жахів Пустощі. Хоча наш народ і спосіб життя залишилися майже незмінними, роль наших братів-мутантів змінилася. Вони вже не просто працювали з нами, а боролися з нами в кризові часи. Вони допомагали захищати наші домівки, але багато хто з тих, хто служив з ними, бачив, як вони поводилися в бою. Щось змінилося в їхніх очах, у їхніх посмішках, у їхніх голосах. Багато хто з тих, хто воює з ними, задаються питанням, чи правильно було кликати їх на війну."
    AMM_nf_events.19.a:0 "Чи зробили ми правильний вибір?"
    AMM_nf_events.20.title:0 "Наша зброя"
    AMM_nf_events.20.desc:0 "Наші брати-мутанти захищали нас від жахів Пустовища. Коли наш народ ставав все більше схожим на решту пусток, мутанти служили нашим військом. Могутніші за будь-кого, озброєні важкою зброєю, викуваною на наших фабриках, ці могутні воїни стежили за тим, щоб з будь-ким, хто нам заважав, швидко розправлялися. З плином поколінь цих воїнів використовували не лише для захисту нашого поселення, а й для забезпечення наших інтересів. Конфлікти були частими, і зрештою втрати наших братів-мутантів були занадто великими. Сусідня держава, бачачи нашу слабкість, скористалася своєю перевагою. Війна була швидкою, наших братів-мутантів було вбито, а наш народ поневолено. \n\n Єдиною милістю, дарованою нашому народу, було те, що на той час ніхто з нас не пам'ятав вчення Брата Фарні. Вони не знали, як сильно ми підвели наших братів."
    AMM_nf_events.20.a:0 "Нехай Господь помилує їх"
    AMM_nf_events.21.title:0 "Наш щит"
    AMM_nf_events.21.desc:0 "Наші брати-мутанти захищали нас від жахів Пустощі. Поки наш народ продовжував свій мирний спосіб життя, зосереджений на вірі, сім'ї та польовій роботі, наші брати-мутанти стримували зовнішні загрози. Роками громада відчувала глибоку провину за це. Вони перетворили тих, кого мали захищати від жахів війни, на власний захист. Однак, з плином поколінь, це почуття провини зникало. Зрештою, воїнів-мутантів почали сприймати не як братів, яких ми підвели, а як виконавців волі Господньої. Роки минали, і питання порятунку душі мутанта зникло з публічного дискурсу."
    AMM_nf_events.21.a:0 "Вони несуть тягар наших гріхів"

    ###Factions###
    AMM_amish_brotherhood_faction:0 "Братство Амішів"
    
    ###Ideas###
    AMM_mutants_and_mercs_idea:0 "Мутанти Та Найманці"
    AMM_mutants_and_mercs_idea_desc:0 "Наші домівки захищають наші брати-супермутанти та наймані солдати."
    AMM_hershey_markets_idea:0 "Герші Маркетс"
    AMM_hershey_markets_idea_desc:0 "Ми виробили звичку продавати надлишки врожаю на ринках Герші."
    AMM_hershey_markets_2_idea:0 "Герші Маркетс"
    AMM_hershey_markets_2_idea_desc:0 "Наші кіоски стали постійним атрибутом торгового центру Герші Маркетс. Продуктовий стенд Аммана – це часта зупинка для багатьох торговців, які шукають високоякісну продукцію з мінімальним випромінюванням."
    AMM_want_not_idea:0 "Не Марнуй, Не Потребуй"
    AMM_want_not_idea_desc:0 "Наші люди використовують усе можливе та намагаються полагодити зламані речі, перш ніж викинути їх."
    AMM_survivor_lessons_idea:0 "Уроки тих, хто вижив у Буффало"
    AMM_survivor_lessons_idea_desc:0 "Деякі з тих, хто тікає від армій роботів з Буффало, розповіли нам про деякі їхні слабкі сторони."
    AMM_survivor_lessons_2_idea:0 "Уроки тих, хто вижив у Буффало"
    AMM_survivor_lessons_2_idea_desc:0 "Деякі з тих, хто тікає від армій роботів з Буффало, розповіли нам про деякі їхні слабкі сторони."

    ###National Focus###
    AMM_nf_a001:0 "Наш спосіб життя"
    AMM_nf_a001_desc:0 "Звичаї нашого народу не сильно змінилися навіть з часів до Великої війни."
    AMM_nf_a002:0 "Загрози життю та вірі"
    AMM_nf_a002_desc:0 "Після війни загрози для нашого народу зросли."
    AMM_nf_a003:0 "Дивні Паломники"
    AMM_nf_a003_desc:0 "Одного дня до наших сіл наближалися великі огрядні фігури."
    AMM_nf_a004:0 "Невдала необхідність"
    AMM_nf_a004_desc:0 "Останнім часом з'явилося більше работорговців та ворожих машин. Хоча насильство — це не наш шлях, у нас може не бути іншого вибору."
    AMM_nf_a005:0 "Покладайся на сильних"
    AMM_nf_a005_desc:0 "Наші брати-мутанти від природи більше пристосовані до війни, ніж решта з нас. Чи неправильно просити їх допомогти нам у цьому?"
    AMM_nf_a006:0 "Мутанти та найманці"
    AMM_nf_a006_desc:0 "Супермутантів занадто мало, щоб захистити нас самостійно. Нам доведеться найняти допомогу ззовні."
    AMM_nf_a007:0 "Поділитися тягарем"
    AMM_nf_a007_desc:0 "Так само, як ми ділимося своїми працями в полі, ми повинні ділитися працею захисту своїх домівок."
    AMM_nf_a008:0 "Втрата невинності"
    AMM_nf_a008_desc:0 "Наші брати-мутанти знають про війну більше, ніж ми. Їхнє керівництво врятує життя."
    AMM_nf_a009:0 "Щит Пілігримів"
    AMM_nf_a009_desc:0 "Заради їхніх душ ми повинні захистити наших братів-мутантів від життя війни, яке вони колись знали."
    AMM_nf_a010:0 "В'ючні звірі"
    AMM_nf_a010_desc:0 "Коней та собак використовували у війні протягом тисячоліть. У нас їх удосталь."
    AMM_nf_a011:0 "Високі паркани"
    AMM_nf_a011_desc:0 "Паркани та форпости захистять нашу худобу та людей."
    AMM_nf_a012:0 "Друзі та сусіди"
    AMM_nf_a012_desc:0 "Наша громада амішів не єдина. Ми могли б звернутися до наших братів за взаємодопомогою."
    AMM_nf_a013:0 "Доступ до ринків Герші"
    AMM_nf_a013_desc:0 "Ринки Герші є важливим пунктом зупинки для багатьох трейдерів. Продаж надлишків нашого врожаю там може бути гарним джерелом обмежень."
    AMM_nf_a014:0 "Гарний сезон"
    AMM_nf_a014_desc:0 "Цього сезону у нас був великий надлишок врожаю, а це означає набагато більше обмежень на ринку."
    AMM_nf_a015:0 "Приймати тих, хто вижив"
    AMM_nf_a015_desc:0 "Наших братів у Герші нещодавно вигнали з їхніх домівок грабіжники. Як ми могли відмовити їм у скрутний час?"
    AMM_nf_a016:0 "Постійні магазини"
    AMM_nf_a016_desc:0 "Наші брати з Герші запропонували нам постійне місце на своїх ринках."
    AMM_nf_a017:0 "Допоможи своєму ближньому"
    AMM_nf_a017_desc:0 "Мешканці Гелассенгейта готові допомогти нам у скрутні часи, так само як ми допомагаємо їм."
    AMM_nf_a018:0 "Братерська гармонія"
    AMM_nf_a018_desc:0 "Дружні стосунки з людьми на півдні зробили життя обох наших народів кращим."
    AMM_nf_a019:0 "Об'єднайте наші народи"
    AMM_nf_a019_desc:0 "Об'єднання наших поселень було б корисним для нас обох у цьому суворому світі."
    AMM_nf_a020:0 "Плече до плеча"
    AMM_nf_a020_desc:0 "Ми розділимо наші тягарі та наші благословення, але ми все ще різні люди і повинні залишатися окремими."
    AMM_nf_a021:0 "Розширити ферми"
    AMM_nf_a021_desc:0 "У нас ще є багато землі, яку можна обробляти. Давайте використовувати її."
    AMM_nf_a022:0 "Все ще в темряві"
    AMM_nf_a022_desc:0 "Ще ніколи не було такого вагомого аргументу на користь впровадження технологій, як зараз, коли ми стикаємося з машинами-вбивцями та рейдерами в силовій броні. Чи справді ми можемо протистояти їм з вилами та сокирами?"
    AMM_nf_a023:0 "Пожежі в промисловості"
    AMM_nf_a023_desc:0 "Сільського коваля чи ремісника вже недостатньо. Нам потрібні механічні майстерні та промислові кузні."
    AMM_nf_a024:0 "З полів"
    AMM_nf_a024_desc:0 "У нас достатньо людей, які працюють на полях, але недостатньо в майстернях. Це потрібно виправити."
    AMM_nf_a025:0 "Жорсткі інструменти для суворого світу"
    AMM_nf_a025_desc:0 "На жаль, вогнепальна зброя необхідна в цьому новому світі."
    AMM_nf_a026:0 "Жахливі ремесла"
    AMM_nf_a026_desc:0 "Це можуть бути жахливі речі, але ми все одно робимо їх корисними."
    AMM_nf_a027:0 "Не будь марнотратним..."
    AMM_nf_a027_desc:0 "Ми ніколи не були марнотратниками, але завдяки нашій новій галузі ми можемо заощаджувати ще більше матеріалів."
    AMM_nf_a028:0 "...і не будеш терпіти злидні"
    AMM_nf_a028_desc:0 "Наші вдосконалені методи переробки заощаджують нам багато часу та ресурсів. Можливо, в такому способі життя є щось особливе."
    AMM_nf_a029:0 "Диявольські машини"
    AMM_nf_a029_desc:0 "З нашої півночі насунувся рій злих машин. Ми не знаємо, що вони мають намір з нами зробити, але це не може бути добром!"
    AMM_nf_a030:0 "Уроки тих, хто вижив"
    AMM_nf_a030_desc:0 "Деякі, хто тікав через наші землі, розповідали нам про боротьбу з цими монстрами. Ми можемо повчитися на їхніх невдачах."
    AMM_nf_a031:0 "Від орала до мечів"
    AMM_nf_a031_desc:0 "Кожне лезо, вила чи сокира повинні бути спрямовані на ці машини!"
    AMM_nf_a032:0 "Праведна справа"
    AMM_nf_a032_desc:0 "Ці збочені машини прагнуть знищити не лише наших людей, а й наші душі! Їх потрібно зупинити будь-якими засобами!"
    AMM_nf_a033:0 "Неприємні союзники"
    AMM_nf_a033_desc:0 "Навіть работорговці на заході від нас загинули від рук цих роботів. Ті небагато, хто вижив, продовжують боротьбу і боротимуться з нами, якщо ми цього захочемо."
    AMM_nf_a034:0 "Ми поклали край терору"
    AMM_nf_a034_desc:0 "Це була важка битва, і в ній загинуло багато хороших людей. Але кошмар нарешті закінчився. Ми знову в безпеці."
    AMM_nf_a035:0 "За якою ціною?"
    AMM_nf_a035_desc:0 "Останні кілька років змінили наших людей. Чи на краще, чи на гірше, ще належить побачити..."

    ###Tooltips###
    AMM_1_tt:0 "Наші брати-мутанти готові захищати наші землі!"
    AMM_2_tt:0 "Ми стоїмо пліч-о-пліч з нашими братами-мутантами, щоб боротися із силами зла!"
    AMM_3_tt:0 "Ми докладаємо всіх зусиль, щоб захистити наш спосіб життя!"
    AMM_4_tt:0 "Деякі з цих рейдерів хочуть помсти і поки що будуть боротися з нами."
    AMM_5_tt:0 "Руйнівники залишають наші землі"
    AMM_6_tt:0 "Це позбавить нас доступу до багатьох технологій."
    AAM_7_tt:0 "Як тільки ми послабимо ці правила, §шляху назад не буде§!"

    ###Traits###
    AMM_barn_raiser_trait:0 "Підйомник Сараю"
    AMM_fieldworker_trait:0 "Польовий Працівник"
