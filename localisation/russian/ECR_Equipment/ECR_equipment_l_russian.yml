l_russian:

#ANV Andale Cannibals#
ANV_standard_weaponry_tech:0 "Пороховий пістолет"
ANV_standard_weaponry_tech_short:0 "Стара зброя"
ANV_standard_weaponry_tech_desc:0 "The lack of resources, weapon knowledge and manufacturing availability made flintlocks a common sight amongst Virginia. Beyond its simple sidearm function, a weighted grip makes it perfect for pistol-whipping during boarding, and a wide barrel let daring pirates load it with buckshot, before shredding any unlucky enemy in a blinding light and deafening blast."
ANV_ballistic_equipment_1:0 "Порохова гвинтівка"
ANV_ballistic_equipment_1_short:0 "Brown Bess"
ANV_ballistic_equipment_1_desc:0 "Брак ресурсів, знань про зброю та недоступності виробництва зробив крем'яні замки поширеним явищем у Вірджинії."
ANV_ballistic_equipment_2:0 "Model 1873 Springfield"
ANV_ballistic_equipment_2_short:0 "Trapdoor Springfield"
ANV_ballistic_equipment_2_desc:0 "Надзвичайно складний у використанні, старий за землю, і з ударом, який міг би розтрощити руку цивільному, Model 1873 Springfield — це однозарядна конструкція, що заряджається через люк, розрахована на новішу бездимну версію могутнього .45-70. Маючи вдвічі більшу вогневу потужність і втричі більшу віддачу порівняно зі звичайним 7,62-мм калібром, він, безумовно, розвиває характер для тренувань з такою зброєю."
ANV_melee_equipment_1:0 "Ніж культиста"
ANV_melee_equipment_1_short:0 "Ніж культиста"
ANV_melee_equipment_1_desc:0 " Маленький ніж з рогів оленя та каменю"
ANV_melee_equipment_2:0 "Клинок культиста"
ANV_melee_equipment_2_short:0 "Клинок"
ANV_melee_equipment_2_desc:0 "Імпровізована зброя, виготовлена ​​зі шматка оленячого рогу, поєднаного зі шматком металу, грубо сформованим у зазубрене лезо, та вигравірувана емблемами культистів."

#DCR DC Raiders#
DCR_insect_equipment_1:0 "Мураха"
DCR_insect_equipment_1_short:0 "Мураха"
DCR_insect_equipment_1_desc:0 "Вони живуть величезними підземними колоніями, де їдять, сплять і спаровуються з королевою. Мурахи всеїдні, вони або використовують свій піроз для полювання та вбивства здобичі, або поїдають ту невелику рослинність, яку можуть знайти, коли це необхідно."
DCR_insect_equipment_2:0 "Мураха-воїн"
DCR_insect_equipment_2_short:0 "Мураха-воїн"
DCR_insect_equipmnet_2_desc:0 "Мурахи-воїни мають одну мету в колонії — вбивати все, що може загрожувати їй або королеві. Завдяки збільшеним клішням та міцнішим екзоскелетам ці мурахи смертоносніші за більшість."
DCR_insect_equipment_3:0 "Вогняна мураха"
DCR_insect_equipment_3_short:0 "Вогняна мураха"
DCR_insect_equipment_3_desc:0 "Через помилку вченого з пустки виникла нова порода мурах. Вони швидші, сильніші, смертоносніші та можуть плюватися вогнем у будь-кого, хто достатньо дурний, щоб виступити проти їхньої королеви!"

#EEN Raven Rock Enclave#
EEN_infantry_equipment_1:0 "Офіцерський пістолет"
EEN_infantry_equipment_1_short:0 "10-мм пістолет"
EEN_infantry_equipment_1_desc:0 "Пістолет N99 з великою рамою був обраний як стандартна особиста зброя армії США."
EEN_ballistic_equipment_1:0 "Стандартний карабін"
EN_ballistic_equipment_1_short:0 "Карабін"
EEN_ballistic_equipment_1_desc:0 "Компактна автоматична зброя з магазинним живленням та високою швидкострільністю."
EEN_ballistic_equipment_2:0 "Штурмовий карабін"
EEN_ballistic_equipment_2_short:0 "Штурмовий карабін"
EEN_ballistic_weaponry_tech_2_desc:0 "Напівавтоматична гвинтівка середньої потужності з магазином на 20 набоїв."
EEN_ballistic_equipment_3:0 "Карабін стрільця"
EEN_ballistic_equipment_3_short:0 "Карабін стрільця"
EEN_ballistic_equipment_3_desc:0 "Взявши за основу штурмовий карабін і додавши кілька дорогих довоєнних удосконалень. Насамперед, це коліматорний приціл Вест-Тек, покращена передня рукоятка та збільшений магазин."
EEN_ballistic_equipment_4:0 "«Бозар»"
EEN_ballistic_equipment_4_short:0 "«Бозар»"
EEN_ballistic_equipment_4_desc:0 "Частково снайперська гвинтівка, частково ручний кулемет — універсальна зброя. «Бозар» дає своєму власнику можливість вести потужний вогонь на великій дистанції з дивовижною точністю."
EEN_energy_equipment_1:0 "Лазерний пістолет"
EEN_energy_equipment_1_short:0 "Лазерний пістолет"
EEN_energy_equipment_1_desc:0 "Лазерний пістолет AEP7, стандартний лазерний пістолет для самооборони з 2276 року."
EEN_energy_equipment_3:0 "Трипроменева лазерна гвинтівка"
EEN_energy_equipment_3_short:0 "Трипроменева лазерна гвинтівка"
EEN_energy_equipment_3_desc:0 "Чудова вогнева міць за рахунок надмірної витрати боєприпасів."
EEN_melee_equipment_1:0 "Поліцейська дубинка"
EEN_melee_equipment_1_short:0 "Дубинка"
EEN_melee_equipment_1_desc:0 "Це складана модель поліцейської дубинки, яка використовувалася різними поліцейськими управліннями до Великої Війни. Вона входить до стандартного спорядження служби безпеки Волт-Тек."
EEN_melee_equipment_2:0 "Бойовий ніж"
EEN_melee_equipment_2_short:0 "Бойовий ніж"
EEN_melee_equipment_2_desc:0 "Чи потрібне йому представлення? Шкіряне руків'я, сталевий клинок і зазубрені зубці — ідеальний інструмент для рубання мутантів, що підійшли надто близько. Нічого особливого, бойовий ніж — це зброя поза часом, яка не потребує переосмислення."
EEN_melee_equipment_3:0 "«Потрошитель»"
EEN_melee_equipment_3_short:0 "«Потрошитель»"
EEN_melee_equipment_3_desc:0 "Вібропилка «Потрошитель» — довоєнна марка ручних бензопил, розроблена як переносний будівельний інструмент для комерційного та військового використання."
EEN_energy_fireteam_equipment_4:0 "Плазмова гармата P94"
EEN_energy_fireteam_equipment_4_short:0 "Плазмова гармата"
EEN_energy_fireteam_equipment_4_desc:0 "Незважаючи на те, що плазмові гармати були замінені легшою та дешевшою міською плазмовою гвинтівкою, вони, як і раніше, відіграють важливу роль у розрахунках важкого озброєння."

#FRM Fire Marshals#
FRM_ballistic_equipment_1:0 "Караванна рушниця"
FRM_ballistic_equipment_1_short:0 "Рушниця"
FRM_ballistic_equipment_1_desc:0 "Стара двоствольна рушниця, яка виконує свою роботу."
FRM_ballistic_equipment_2:0 "Мисливська рушниця"
FRM_ballistic_equipment_2_short:0 "Мисливська рушниця"
FRM_ballistic_equipment_2_desc:0 "Пістолет робить дірки в людях, гвинтівка робить дірки крізь людей, а рушниця на правильній відстані, з правильним зарядом, фізично відірве шматок лайна від дикуна і кине те лайно на землю."
FRM_ballistic_equipment_3:0 "Штурмова гвинтівка R91"
FRM_ballistic_equipment_3_short:0 "ШГ R91"
FRM_ballistic_equipment_3_desc:0 "Штурмові гвинтівки Національної гвардії, які можна знайти у великій кількості в районі навколо Столичної Пустки навіть через 200 років після війни."
FRM_ballistic_equipment_4:0 "R91 Інфільтратор"
FRM_ballistic_equipment_4_short:0 "Інфільтратор"
FRM_ballistic_equipment_4_desc:0 "Модифіковані версії штурмової гвинтівки R91, які часто можна побачити в руках рейдерів Пітта, але їх легко придбати за наявності відповідних коштів."
FRM_melee_equipment_1:0 "Сокира"
FRM_melee_equipment_1_short:0 "Сокира"
FRM_melee_equipment_1_desc:0 "Невелика клинкова зброя, добре підходить для відрубування гілок дерев та кінцівок дикунів."
FRM_melee_equipment_2:0 "Пожежна сокира"
FRM_melee_equipment_2_short:0 "Пожежна сокира"
FRM_melee_equipment_2_desc:0 "Довга і міцна сокира, яка може розрубати все, що кине на вас болото."
FRM_melee_equipment_3:0 "Потрошитель"
FRM_melee_equipment_3_short:0 "Потрошитель"
FRM_melee_equipment_3_desc:0 "Довоєнна мініатюрна бензопила, яка швидко справляється з ворожою рослинністю та дикунами."
FRM_melee_equipment_4:0 "Бензопила"
FRM_melee_equipment_4_short:0 "Бензопила"
FRM_melee_equipment_4_desc:0 "Великий ріжучий інструмент, який може прорізати стовбури дерев або броньованих дикунів, як масло."
FRM_demolitions_equipment_1:0 "Коктейлі Молотова"
FRM_demolitions_equipment_1_desc:0 "Кажуть, що необхідність — мати винаходу, і ця позачасова запальна зброя є доказом цього прислів'я. Використовувані дисидентськими рухами та окремими особами по всьому світу до Війни, ми тепер почали виробляти власні коктейлі Молотова з саморобними ґнотами, знайденими пляшками з-під Ядер-Коли та алкоголем із нашвидкуруч збудованих самогонних апаратів. Вони не є довоєнною вибухівкою, але чи є краще видовище, ніж бачити, як наступаюче болото або племінні села поглинає вогонь?"
FRM_demolitions_equipment_1_short:0 "Молотова"

#GED Garden of Eden#
GED_infantry_equipment_1:0 "Простий лук"
GED_infantry_equipment_1_short:0 "Простий лук"
GED_infantry_equipment_1_desc:0 "Простий лук, трохи кращий за загострену палицю."
GED_ballistic_equipment_1:0 "Мисливський лук"
GED_ballistic_equipment_1_short:0 "Мисливський лук"
GED_ballistic_equipment_1_desc:0 "Простий мисливський лук. Змушує стріли летіти. Добре підходить для вбивства ящірок або неброньованих чужинців."
GED_ballistic_equipment_2:0 "Композитний мисливський лук"
GED_ballistic_equipment_2_short:0 "Композитний лук"
GED_ballistic_equipment_2_desc:0 "Мисливський лук із міцніших матеріалів. Він може стріляти стрілами трохи швидше, навіть достатньо швидко, щоб пробити деякі легкі броні."
GED_ballistic_equipment_3:0 "Вдосконалений мисливський лук"
GED_ballistic_equipment_3_short:0 "Вдосконалений лук"
GED_ballistic_equipment_3_desc:0 "Мисливський лук, що використовує спеціальні сплави та виробничі технології. Стріли, випущені з цього лука, можуть пробити навіть пусткову металеву броню під правильним кутом."
GED_ballistic_equipment_4:0 "Вишуканий бойовий лук"
GED_ballistic_equipment_4_short:0 "Бойовий лук"
GED_ballistic_equipment_4_desc:0 "Лук, призначений для вбивства ворожих воїнів. Завдяки поєднанню спеціалізованих матеріалів, довоєнних конструкцій та вибухових стріл, ця зброя може без проблем вбити людину в бойовій броні."

#GMN Green Mountain#
GMN_power_armor_equipment_tbh:0 "Силова броня з ультрациту"
GMN_power_armor_equipment_tbh_short:0 "Ультрацитова СБ"
GMN_power_armor_equipment_tbh_desc:0 "Силова броня з ультрациту — це модифікована конструкція, спочатку розроблена Братством Сталі в Аппалачах. Хоча наш костюм не такий досконалий, як варіант Братства, який використовував силову броню T-51b як основу, він все одно кращий за більшість костюмів у пустках."
GMN_infantry_equipment_1:0 "Рушниця з брухту"
GMN_infantry_equipment_1_short:0 "Рушниця з брухту"
GMN_infantry_equipment_1_desc:0 "Те, що вона зібрана з труб і дощок, не заважає картечі, що вилітає з неї, бути смертельною."
GMN_ballistic_equipment_1:0 "Стара рушниця"
GMN_ballistic_equipment_1_short:0 "Рушниця"
GMN_ballistic_equipment_1_desc:0 "Старі двоствольні рушниці використовували всі: від бутлегерів до борців за свободу. У нашому районі їх чимало, але вони починають виявляти свій вік."
GMN_ballistic_equipment_2:0 "Ручна гвинтівка"
GMN_ballistic_equipment_2_short:0 "Ручна гвинтівка"
GMN_ballistic_equipment_2_desc:0 "Створена аппалацькими зброярами, ця автоматична машина для вбивства не є простою трубчастою гвинтівкою."
GMN_ballistic_equipment_3:0 "Штурмова гвинтівка R91"
GMN_ballistic_equipment_3_short:0 "Штурмова гвинтівка"
GMN_ballistic_equipment_3_desc:0 "Стара штурмова гвинтівка, яка вважалася застарілою і передана підрозділам Національної гвардії в 2070-х роках, все ще краща за багато нещодавно виготовлених гвинтівок."
GMN_ballistic_equipment_4:0 "R91 Інфільтратор"
GMN_ballistic_equipment_4_short:0 "Інфільтратор"
GMN_ballistic_equipment_4_desc:0 "Модифікована штурмова гвинтівка R91, яку часто використовують работорговці з Пітта."
GMN_power_armor_equipment_2:0 "Екскаваторна силова броня EXC-17"
GMN_power_armor_equipment_2_short:0 "EXC-17 СБ"
GMN_power_armor_equipment_2_desc:0 "Костюм EXC-17 Екскаватор був розроблений для захисту шахтарів від каменепадів та забруднювачів повітря, одночасно збільшуючи швидкість їхньої роботи. Він ніколи не досяг повного комерційного виробництва, але широко використовувався в Аппалачах. Він не такий міцний, як силова броня, призначена для бою, але він набагато кращий за броню, зроблену зі шкур кротокрисів."

#TRN Trog Country#
TRN_feral_ghoul_equipment_1:0 "Трог"
TRN_feral_ghoul_equipment_1_short:0 "Трог"
TRN_feral_ghoul_equipment_1_desc:0 "Трог — це людина, яка досягла кінцевої стадії зараження Контагіозною Троглодитною Дегенерацією. Хвороба перетворила їх на дику тварину, яка пересувається рачки руїнами Пітта, прагнучи поглинути будь-яке життя, що не є трогом."
TRN_feral_ghoul_equipment_2:0 "Трог-громило"
TRN_feral_ghoul_equipment_2_short:0 "Троги-громила"
TRN_feral_ghoul_equipment_2_desc:0 "Якщо трог живе достатньо довго, він стає сильнішим, швидшим і смертоноснішим. Ці громила, як правило, очолюють менші зграї новоутворених трогів."
TRN_feral_ghoul_equipment_armored:0 "Трог-пожирач"
TRN_feral_ghoul_equipment_armored_short:0 "Трог-пожирач"
TRN_feral_ghoul_equipment_armored_desc:0 "Ці троги прожили деякий час і пристосувалися до Пітта. Їхня шкіра затверділа і набула попелястого кольору, щоб краще зливатися з міським середовищем."
TRN_feral_ghoul_equipment_glowing:0 "Сяючий трог"
TRN_feral_ghoul_equipment_glowing_short:0 "Сяючий трог"
TRN_feral_ghoul_equipment_glowing_desc:0 "Трог, який проводить надто багато часу в радіоактивній зоні, починає світитися."
