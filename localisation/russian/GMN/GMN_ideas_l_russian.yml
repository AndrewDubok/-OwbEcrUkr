l_russian:

    ###New Ideas###
    GMN_safety_standards_idea:0 "Стандарти безпеки"
    GMN_safety_standards_idea_desc:0 "Менше людей, які гинуть у жахливих аваріях на фабриках, — це добре. Можна подумати, це має бути очевидно для всіх, але це не так."

    GMN_enough_cults_idea:0 "Бич культистів"
    GMN_enough_cults_idea_desc:0 "Жорстокі культи — звичне явище в пустках. Ці дивні групи викрадають і вбивають усіх, на кого вкажуть їхні лідери. В Аппалачах вони не знайдуть легких цілей."

    GMN_farming_exports_idea:0 "Експорт фермерської продукції"
    GMN_farming_exports_idea_desc:0 "Ми вирощуємо набагато більше їжі, ніж нам потрібно. Торгівля з тими, хто не може вирощувати стільки, дозволяє нам отримувати інші необхідні речі."

    GMN_protecting_caravans_idea:0 "Захист караванів"
    GMN_protecting_caravans_idea_desc:0 "«Хлопці з Ґрін-Маунтін» охороняють каравани, що проходять через нашу територію. Дуже мало рейдерів наважаться зв'язатися з цією охороною, а ті, хто ризикне, стануть чудовою мішенню для тренувань."

    GMN_ranger_bane_idea:0 "Бич рейнджерів"
    GMN_ranger_bane_idea_desc:0 "Рейнджери Мононгаели навчили нас своїх таємниць. Тепер ми використовуємо ці знання проти них."

    GMN_ultracite_pa_idea:0 "Ультрацитова силова броня"
    GMN_ultracite_pa_idea_desc:0 "Розроблена давно померлим відділенням Братства, ця вдосконалена силова броня допоможе нам зберегти свободу Аппалачів."

    GMN_eagle_slayers_idea:0 "Вбито імперського орла"
    GMN_eagle_slayers_idea_desc:0 "Анклав, останні залишки всього поганого, що було в старій Америці, знищено нашою рукою."

    GMN_swamp_victory_idea:0 "Перемога на болотах"
    GMN_swamp_victory_idea_desc:0 "Болота Вірджинії були справжнім випробуванням. Мало що в пустках зрівняється з тим, через що ми пройшли."

    GMN_swamp_cooperation_idea:0 "Торгівля через Вірджинію"
    GMN_swamp_cooperation_idea_desc:0 "Від пагорбів Західної Вірджинії до боліт Вірджинії торгові каравани рухаються, не зустрічаючи нічого, окрім рідкісних бродячих тварин. Це вигідно всім."

    ###Old Ideas###
    gmn_mountain_boys:0 "Армія без держави"
    gmn_mountain_boys_desc:0 "Сила з гульїв, людей і мутантів з усіх Аппалачів, що походить від довоєнних партизанів, Фрістейтерів та післявоєнних виживальників — «Хлопці з Ґрін-Маунтін» — як тепер називають їхнє оборонне формування, є однією з найкращих сил у пустках, яка знає Аппалачі, як свої п'ять пальців."

    gmn_weary_settlers:0 "Гірські селюки, і ми цим пишаємося!"
    gmn_weary_settlers_desc:0 "Люди Аппалачів живуть у суворій пустці, сповненій смерті, страждань та кровопролиття. Саме завдяки цьому вони загартувалися, їхня рішучість стала непохитною, а регіональна єдність — тільки міцнішою. Однак це меч обосічний.\n\nЗахищати Аппалачі досить легко, але розширювати територію «Хлопців» практично неможливо, якщо ви не хочете опинитися по той бік повстання чи страйку ремісників."

    gmn_guards:0 "Північно-східна варта"
    gmn_guards_desc:0 "«Хлопці з Ґрін-Маунтін» завжди мали складні, часом суперечливі стосунки з рейнджерами Мононгаели, однак в одному вони повністю єдині — у глибокій ненависті до рейдерів зі Столичного Пустища.\n\nСаме тому їхній оборонний пакт готується до можливої атаки рейдерів. Або навіть до гіршого."

    mon_guards:0 "Північно-східна варта"
    mon_guards_desc:0 "«Хлопці з Ґрін-Маунтін» завжди мали складні, часом суперечливі стосунки з рейнджерами Мононгаели, однак в одному вони повністю єдині — у глибокій ненависті до рейдерів зі Столичного Пустища.\n\nСаме тому їхній оборонний пакт готується до можливої атаки рейдерів. Або навіть до гіршого."

    GMN_appalachian_identity_idea:0 "Аппалачська ідентичність"
    GMN_appalachian_identity_idea_desc:0 "Пагорби Аппалачів простягаються на північ до Старого Нью-Йорка і на південь до Джорджії. На всій цій великій землі живе безліч людей з різними віруваннями та способами життя. Але є те, що нас об'єднує — ці пагорби. Ми всі знаємо, як важко виживати в цьому суворому краї, і цього достатньо, щоб стати ближчими одне до одного."

    GMN_appalachian_identity_2_idea:0 "Аппалачська ідентичність"
    GMN_appalachian_identity_2_idea_desc:0 "Пагорби Аппалачів простягаються на північ до Старого Нью-Йорка і на південь до Джорджії. На всій цій великій землі живе безліч людей з різними віруваннями та способами життя. Але є те, що нас об'єднує — ці пагорби. Ми всі знаємо, як важко виживати в цьому суворому краї, і цього достатньо, щоб стати ближчими одне до одного."

    GMN_rocky_memories_idea:0 "Спогади про рокістів"
    GMN_rocky_memories_idea_desc:0 "Минуло вже чимало років відтоді, як ми воювали з цими культистами, але наскільки сильно могли змінитися їхні тактики за цей час?"

    GMN_rocky_fought_idea:0 "Нові тактики"
    GMN_rocky_fought_idea_desc:0 "Ті з наших, хто вирушив на північ воювати й повернувся, добре знають нові тактики, які застосовують ці культисти. Вони допомагають нашому ополченню підготуватися."

    GMN_anti_rocky_volunteers_idea:0 "Добровольці йдуть на північ"
    GMN_anti_rocky_volunteers_idea_desc:0 "Ми чули, що культисти, які втекли на північ, сіють там безлад. Все більше наших хлопців вирушають туди воювати з ними, і повертаються не всі."
    
