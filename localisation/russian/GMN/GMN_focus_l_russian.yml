l_russian:
    ### TOOLTIPS
    GMN_gold_trading_tt:0 "Змінити §YСуспільство в Аппалачах§!:\nДохід від кришок §G+15.00%§!\nЕфективність отримання ресурсів §R-5.00%§!"
    GMN_refugee_decisions_tt:0 "Ми прийматимемо біженців із націй, які завоює §O[COR.GetName]§!."
    GMN_share_lessons_tt:0 "Ми поділимося нашими знаннями з іншими вільними групами в Аппалачах. Це зблизить нас усіх."
    GMN_rookies_tt:0 "Нова партія новачків поповнює ряди"
    GMN_disagree_with_marshals_tt:0 "§RМаршали Вогню пішли шляхом, який призведе до конфлікту.§!"
    GMN_agree_with_marshals_tt:0 "§GМаршали Вогню здаються хорошими сусідами.§!"
    GMN_join_ecr_tt:0 "§YМи приєднаємося до Республіки Східного Узбережжя§!"
    GMN_border_watch_tt:0 "Ми збудуємо спостережні пости на кордоні"
    GMN_advisors_accepted_tt:0 "Відкриє радників із прийнятих нами груп."
    GMN_accepted_hills_tt:0 "Ми інтегрували біженців із §8Мононгаели§!"
    GMN_accepted_cobalt_tt:0 "Ми інтегрували біженців із §2Культу Кобальту§!"
    GMN_accepted_Lorentz_tt:0 "Ми інтегрували біженців із §OСил Лоренца§!"
    GMN_accepted_onion_tt:0 "Ми інтегрували біженців із §GОніонбурга§!"
    GMN_tt_no_aid_sent:0 "§RМи нікого не відправляли на допомогу цим людям. Чому ми маємо очікувати, що чогось навчимося?§!"

    ###New Focuses###
    GMN_nf_a001:0 "Не великі фанати уряду"
    GMN_nf_a001_desc:0 "Ох, то були дні, коли ми підіймали наші гвинтівки, щоб звалити якихось тиранічних фашистських свиней, підіймали наші старі рушниці та пістолети проти тих, хто голосно кричав про свободу, яку вони ніколи не збиралися дарувати."
    GMN_nf_a002:0 "Ми вважаємо за краще називатися Лібертаріанцями"
    GMN_nf_a002_desc:0 "Тільки тому, що ми не любимо уряд, погоджуємося з рівністю і не дозволяємо людям володіти кількома об'єктами як бізнесами під однією корпорацією, це ще не означає, що ми комуністи! Гаразд, мабуть, ми можемо бути соціалістами. Можливо."
    GMN_nf_a003:0 "Між молотом і ковадлом"
    GMN_nf_a003_desc:0 "Та клята церква думала, що буде чудовою ідеєю хапати мирних жителів, щоб змусити їх поклонятися клятому каменю! Якби ми не втрутилися й не змусили їх тікати, хто знає, який жах обрушився б на регіон?"
    GMN_nf_a004:0 "Відкрити наші ворота"
    GMN_nf_a004_desc:0 "Десятки біженців розкидані вітром, доки Церква Рокі просувається все далі на південь, щоб «повернути свої землі». Жахи, обрушені на простих людей, потребують вирішення. Ворота відчинені, щоб дозволити жертвам того жахливого звіра з півночі прийти на південь."
    GMN_nf_a005:0 "Аж до тракту"
    GMN_nf_a005_desc:0 "На північному сході шахтарі Мононгаели — дуже-дуже цікава група. Вони поділяють схожі лібертаріанські ідеали, але ніколи не координувалися так, як ми. Натомість їх захищають «Рейнджери», місцеве ополчення. Феллон і Головний Рейнджер знайомі дуже давно, настільки давно, що Феллон трохи спантеличений, як рейнджер протримався так довго. Але він ніколи особливо не ставив це під сумнів. Так чи інакше, з ростом Культу Рокі він вирішив поговорити зі своїм старим другом і спробувати домовитися про щось, що буде вигідно обом."
    GMN_nf_a006:0 "У пагорбів є очі"
    GMN_nf_a006_desc:0 "У міру того, як ми співпрацюємо та розвиваємо наші відносини з Мононгаелою, вони навчають нас дечого про спостереження за пагорбами."
    GMN_nf_a007:0 "Кровні брати"
    GMN_nf_a007_desc:0 "Нарешті настав час. Рокі — приємна купка пилу, що пливе в попелястому вітрі, а Аппалачі досягли певного рівня миру. Мононгаелу нарешті можна повністю інтегрувати. Два брати, зв'язки яких загартовані війною та конфліктами, знову об'єднуються."
    GMN_nf_a008:0 "Помститися за нашого полеглого брата"
    GMN_nf_a008_desc:0 "Наших друзів на півночі вигнали з їхнього дому каменепоклонники. Коли прибували біженці, одна група зокрема принесла дуже сумні новини."
    GMN_nf_a009:0 "Вітер у тих пагорбах"
    GMN_nf_a009_desc:0 "Ми не можемо просто зібрати термоядерний генератор із металобрухту. Але ми можемо встановити кілька вітряків."
    GMN_nf_a010:0 "Скликати Ради"
    GMN_nf_a010_desc:0 "До нашої Асамблеї входять десятки рад, спілок та інших представників, які збираються нерегулярно, єдині відносно постійні збори — раз на рік чи два. Знову наближається цей час, і в кожного є щось, на що вони хочуть, щоб ми звернули увагу."
    GMN_nf_a011:0 "Про шахтарів і жінок"
    GMN_nf_a011_desc:0 "Як суспільство, повністю економічно залежне від чоловіків і жінок, які довбають каміння під землею в пошуках будь-яких мінералів або химерних порід, справедливо продовжувати підтримувати їх будь-яким фінансуванням, необхідним їм, щоб продовжувати довбати те каміння. Особливо вугілля — ми, блін, любимо вугілля!"
    GMN_nf_a012:0 "Вихід на ринок золота"
    GMN_nf_a012_desc:0 "У деяких частинах країни золото використовується як валюта, бог знає чому. В Аппалачах? Ну, виробництво електроніки завжди було важливим. І оскільки ми продовжуємо знаходити все більше і більше покладів золота в наших шахтах, що ми робимо? Ми продаємо його розумнішим людям."
    GMN_nf_a013:0 "Нафтопереробні заводи Аппалачів"
    GMN_nf_a013_desc:0 "Хоча сирі ресурси можуть нас далеко завести, цього точно недостатньо, якщо ми не хочемо чекати кілька місяців, щоб отримати перероблені матеріали. Як ми збираємося це вирішити, запитаєте ви? Насправді все просто. Переробляти їх самим. Не може ж це бути так важко, правда?"
    GMN_nf_a014:0 "Підвищення стандартів безпеки"
    GMN_nf_a014_desc:0 "Хоча будь-яке регулювання бізнесу — це безумство, Асамблея отримала кілька скарг, і нам, можливо, доведеться розпочати перевірки безпеки та призупиняти запити на ресурси, поки вони не почнуть, в біса, виконувати свою роботу."
    GMN_nf_a015:0 "Ми любимо робітничі спілки"
    GMN_nf_a015_desc:0 "Одна з ключових структур у житті середньостатистичного анархіста з Ґрін-Маунтін — це Робітнича Спілка, яку до війни багато хто сприймав би зовсім інакше. Зараз, через стільки часу, це просто колектив робітників, які координуються з будь-якої причини на будь-якій території. Будучи однією з багатьох організацій в Асамблеї, вони постійно просять додаткової підтримки, щоб допомогти іншим створювати спілки. Здається, це гідна справа."
    GMN_nf_a016:0 "Найбагатші фермери Аппалачів"
    GMN_nf_a016_desc:0 "З нещодавнім винаходом тракторів фермерство в Аппалачах стає дуже легким. Настільки, що нам практично неможливо мати голод, навіть якщо ми отримаємо лише половину очікуваного врожаю. Це, чесно кажучи, трохи дивно. Але це, безсумнівно, приносить нам багато грошей, адже тепер ми можемо масово експортувати зерно."
    GMN_nf_a017:0 "Переосмислення нашої історії"
    GMN_nf_a017_desc:0 "Мало хто живий, хто був у Гарперс-Феррі, коли Братство обрушило на нас пекельний вогонь. Ті небагато добрих людей, що залишилися й боролися за свободу, були знищені бойовими кораблями Братства. І ще менше тих, хто пам'ятає, що сенатор Блеквелл, місцевий лідер того часу, втік задовго до нападу. Кажуть, у нього навіть був бункер. Можливо, час зануритися в спогади й заспокоїти Феллона з цього приводу."
    GMN_nf_a018:0 "Дім на фронтирі"
    GMN_nf_a018_desc:0 "Там, де цивілізація зникла, і людина з найбільшою зброєю є королем, природно, починають формуватися певні ієрархії. Саме проти такого поняття виступає наша конфедерація. «Хлопці з Ґрін-Маунтін» не пускають тих, хто насмілюється експлуатувати інших, а решта населення вже сама якось облаштовується. Однак мало хто пам'ятає, що у «Хлопців» є своя звичайна робота, якою вони займаються, коли не на службі в ополченні. Вона не дуже добре оплачується, тому ведення фермерського господарства — найпоширеніший спосіб заробити на життя. Це, насправді, виявилося дуже гарною перевагою, оскільки означає, що вони можуть прогодувати і себе, й інших, а крім того, коли виходять на пенсію, можуть використовувати свою підготовку на благо громади. У нас якраз нещодавно вийшла на пенсію партія ветеранів, сподіваємося, це допоможе решті з нас!"
    GMN_nf_a019:0 "Довгий шлях до постаграризму"
    GMN_nf_a019_desc:0 "Індустріалізація завжди була складною темою в Аппалачах. До війни, звісно, тут було багато підприємств, що височіли над ландшафтом, однак місцеві забобони через нещасливу долю, яка спіткала більшість післявоєнних аппалачців, змушують небагатьох бажати відродити їх. Мононга, по суті, вже давно не більше ніж металобрухт, роботи старого світу були розібрані десятиліття тому, і в сучасному місті майже нічого не залишилося для використання. Однак ми не можемо просто вічно залишатися аграрним суспільством, нам потрібно розвиватися, навіть якщо це не передбачає створення масивних виробництв, які були в довоєнному світі."
    GMN_nf_a020:0 "Колективний дослідницький фонд"
    GMN_nf_a020_desc:0 "Над наукою в Аппалачах часто жартують, що вона сумнозвісно недофінансована. Місцевий жарт: «Скільки аппалачців потрібно, щоб замінити лампочку? Троє: перший дзвонить комусь із Лоренца, а інші троє платять йому!» — і не дарма. Хоча школи і таке інше існують, єдині справді просунуті переважно навчають ремесел або тактики, з однією-єдиною школою з якоюсь науковою програмою — це маленька школка в будинку померлого лікаря, і, звісно, вивчення хімії. Виділивши трохи фінансування з кількома громадськими пожертвами, можливо, ми доживемо до дня, коли для заміни лампочки нам знадобиться лише одна людина."
    GMN_nf_a021:0 "Експорт нашого зерна"
    GMN_nf_a021_desc:0 "У нас дуже багато ферм. Насправді більше, ніж майстерень. Це, чесно кажучи, трохи дивно, враховуючи, що ми приблизно на тридцять відсотків складаємося з гір. Завдяки цьому ми заробляємо багато грошей на торгівлі зерном, і тому нам тільки вигідно продовжувати його експортувати, особливо з огляду на те, що в нас більш ніж достатньо, щоб прогодувати себе."
    GMN_nf_a022:0 "Економіка торговців"
    GMN_nf_a022_desc:0 "Вдавати, що торгівля не живить економіку практично всіх післявоєнних і навіть більшості довоєнних народів, — це безглузда гра. Самодостатність завжди була гордістю Аппалачів, але ми не проти отримувати прибуток за нашу важку працю. З нашим зростанням і розвитком захист наших торговців стає природним явищем. Хоча більшу частину нашої історії їм доводилося самим наймати найманців, надання безкоштовного захисту зміцнить довіру до наших маршрутів і зробить нас союзниками на ринку караванів."
    GMN_nf_a023:0 "Ремісники на просторах"
    GMN_nf_a023_desc:0 "З розвитком нашої економіки ми почали спостерігати зростання руху ремісників, що виходить за межі торгових навичок. Наука та справжнє мистецтво стають дедалі відомішими, а розробка нових технологій стає тільки кращою. У Мононзі навіть проходить виставка сучасного мистецтва."
    GMN_nf_a024:0 "Наближаючись до зеніту"
    GMN_nf_a024_desc:0 "Верстати — важливий крок до індустріалізації, і завдяки наполегливій праці та величезним інвестиціям ми отримали наш перший комплект. Будь-яка централізована великомасштабна промисловість при нашій нинішній бізнес-моделі — це божевілля, однак цілком можливо зробити вже наявне розрізнене виробництво хоча б трохи ефективнішим."
    GMN_nf_a025:0 "Дім, милий дім"
    GMN_nf_a025_desc:0 "Не секрет, що Аппалачі — це лабіринт для сторонніх. Заселення після війни було складним завданням, оскільки більшість карт Аппалачів знаходяться в самих Аппалачах, а ті, що за їх межами, зазвичай були захоплені поселенцями, які прибували з 2120-х років. А ті небагато, що все ще зовні, або, Боже борони, створені після війни, рідко мають достатньо деталей для ефективного транспортування або торгівлі. Але будь-який справжній аппалачець знає кожну гору напам'ять. І нещодавно нарешті почали з'являтися кілька картографів, тож навіть сторонні колись зможуть отримати пристойні карти для поселення."
    GMN_nf_a026:0 "Використання старих лігв"
    GMN_nf_a026_desc:0 "Розкидані по нашій території довоєнні бункери виживальників лишають шрами на землі, нагадуючи нам про параноїдальні та забобонні дні, що передували апокаліпсису. Багато з них залишилися незайманими, історичними пам'ятками, які охороняються місцевим ополченням, що підтримує свої ідеалістичні форми старого світу. Але багато хто почав пропонувати використовувати їх і матеріали всередині, оскільки багато хто підозрює, що всередині є інструменти для виробництва зброї, адже більшість людей, які їх використовували, — це ті самі люди, які дуже, дуже любили зброю. Хто їх за це засудить?"
    GMN_nf_a027:0 "Зброя проти тиранії"
    GMN_nf_a027_desc:0 "Час від часу в Аппалачах стає гаряче. Одного року з'явилася нова група Братства, іншого — якісь найманці з Вірджинії. Чорт, одного року купа людей почала поклонятися гігантському метелику. Через 200 років Феллон відчуває це кістками. Щось наближається, і нам потрібно запасатися зброєю."
    GMN_nf_a028:0 "Зброя від, для та народу"
    GMN_nf_a028_desc:0 "200-річна іржава зброя може допомогти лише до певної міри. У якийсь момент нам потрібно буде робити власну зброю з нуля. Чесно кажучи, це треба було зробити ще 190 років тому. Але, ось ми тут."
    GMN_nf_a029:0 "Пекло не має такої люті"
    GMN_nf_a029_desc:0 "Жінка так само зацікавлена в боротьбі за свою свободу, як і чоловік, чому б не залучити їх до справи?"
    GMN_nf_a030:0 "Піднімемо келих за свободу"
    GMN_nf_a030_desc:0 "Більше зброї — більше свободи, ось і все."
    GMN_nf_a031:0 "Зеленіший за зелених"
    GMN_nf_a031_desc:0 "Іноді важко згадати, що 200 років тому більшість із нас, хлопців з Ґрін-Маунтін, були просто добрими хлопцями, які майже нічого не знали про війну. Сподіваюся, ці новобранці навчаться з меншою кількістю крові, ніж ми."
    GMN_nf_a032:0 "Погляд з висоти пташиного польоту"
    GMN_nf_a032_desc:0 "Спостережні вежі в пагорбах — це добре, але ширяти в небі — краще."
    GMN_nf_a033:0 "Старі посібники"
    GMN_nf_a033_desc:0 "Багато хто думав, що ці старі посібники з пілотування краще було б використати для розпалювання. Але два століття потому вони виглядають дуже нерозумно, чи не так?"
    GMN_nf_a034:0 "Ремонт сільськогосподарських літаків"
    GMN_nf_a034_desc:0 "Літаки, що іржавіють у сараях по всіх Аппалачах, можливо, і не винищувачі, але їх все одно варто полагодити."
    GMN_nf_a035:0 "Прокласти злітні смуги"
    GMN_nf_a035_desc:0 "Літаки не можуть просто злітати й сідати на парковці, їм потрібні довші ділянки асфальту або порожні поля."
    GMN_nf_a036:0 "Бомби геть!"
    GMN_nf_a036_desc:0 "Обшаривши всю нашу територію, ми змогли зібрати достатньо деталей для кількох літаків."
    GMN_nf_a037:0 "Ву-ху-у!"
    GMN_nf_a037_desc:0 "Жменька наших людей справді освоює керування цими літаками."
    GMN_nf_a038:0 "Послуги для Пусток"
    GMN_nf_a038_desc:0 "Враховуючи, наскільки наше ополчення неорганізоване та слабо регульоване, не дивно, що більшість наших бійців відомі тим, що беруть додаткову, переважно найманську, роботу окрім патрулювання тощо."
    GMN_nf_a039:0 "Захист шахт Мононгаели"
    GMN_nf_a039_desc:0 "Мононгаела — один із наших найближчих союзників у цьому божевільному світі, і, чесно кажучи, вони найбільші замовники наших найманських послуг. Особливо з Північною Вартою, яка захищає їхній кордон від рейдерів. Чим більше ми працюємо, тим кращі пропозиції отримуємо на товари, і тим більше кришок заробляємо. Тільки-но надійшов новий контракт на кілька їхніх шахт, то чому б не підтримати їх ще більше?"
    GMN_nf_a040:0 "Охорона місіонерів Атому"
    GMN_nf_a040_desc:0 "Церква Атому — це якийсь дивакуватий культ із півночі. Одне з їхніх відгалужень вирішило, що було б круто створити якусь релігійну організацію на півдні, в болотах, однак та, яка нам подобається, знаходиться трохи на північ від Гарперс-Феррі. Їхня маленька каплиця в Хельве є центром їхнього регіону впливу. Вони не стільки уряд, скільки регіональний рух, і ми були б дурнями, якби бойкотували їх."
    GMN_nf_a041:0 "Захист незахищених"
    GMN_nf_a041_desc:0 "В Оніонбурзі наркотики правлять бал, і місцеве населення не особливо відоме своєю здатністю захистити себе. Або, чесно кажучи, робити щось окрім вживання ще більше наркотиків. Пропонуючи наші послуги з їхнього захисту тим небагатьом членам керівництва, що ще притомні, ми можемо легко нажитися на гострій нестачі порядку."
    GMN_nf_a042:0 "Охорона ґаусменів"
    GMN_nf_a042_desc:0 "Яйцеголові, що слідують за Лоренцом, не найкращі бійці, незважаючи на їхню гарну зброю. Можливо, якщо ми їм допоможемо, вони підкинуть нам пару штук."
    GMN_nf_a043:0 "Уроки кампаній"
    GMN_nf_a043_desc:0 "Ми не очікували, що кожен відправлений нами в гори чоловік повернеться. Але ті, хто повернувся, можуть розповісти нам дещо про боротьбу з культистами."
    GMN_nf_b001:0 "Фанатики біля воріт"
    GMN_nf_b001_desc:0 "Ми знали, що цей день настане. Смолоскипи каменепоклонників горять уночі всього за кілька миль від наших найвіддаленіших поселень."
    GMN_nf_b002:0 "Проголосити нову віру"
    GMN_nf_b002_desc:0 "Не всі з культистів рокі билися до кінця. Деякі з них, здавалося, мали сумніви щодо всієї цієї ідеї «вбити всіх невіруючих». Чи було б правильно проганяти їх, якби вони могли жити мирно?"
    GMN_nf_b003:0 "Рання кончина"
    GMN_nf_b003_desc:0 "До нас дійшли новини про щось вражаюче: «Церкву» Рокі нарешті знищено. Звіти неясні, хто саме це зробив, але головне, що Аппалачі в безпеці від ще однієї загрози, навіть якщо тепер дюжина інших прийде їм на зміну."
    GMN_nf_b004:0 "Знищити культ"
    GMN_nf_b004_desc:0 "Чи проявили б ці каменелюби до нас милосердя, якби вони виламали наші ворота? Ми вже дозволили їм піти одного разу, і ось до чого це призвело."
    GMN_nf_b005:0 "Сонце сходить над Аппалачами"
    GMN_nf_b005_desc:0 "Після вирішення кризи з рокістами ми можемо звернути нашу увагу назад на наших людей."
    GMN_nf_b006:0 "Криваві Аппалачі"
    GMN_nf_b006_desc:0 "Ми мали зрозуміти, що як тільки один культ зникне, інший влаштує якийсь безлад."
    GMN_nf_b007:0 "Під новим управлінням"
    GMN_nf_b007_desc:0 "Фермери Оніонбурга дякують нам за порятунок від Культу Кобальту. Але, можливо, «порятунок» — не зовсім те слово..."
    GMN_nf_b008:0 "Досить з нас цих культів"
    GMN_nf_b008_desc:0 "Якщо ми дечого й навчилися за останні кілька років, так це те, що культи — це сама лише проблема. Неважливо, поклоняються вони каменям, атомам чи чортовим метеликам. Якщо культ з'являється в наших краях, ми надерємо їм дупи!"
    GMN_nf_b009:0 "Розбираємо та вмикаємо"
    GMN_nf_b009_desc:0 "Ми не можемо зрозуміти більшість із цих машин, з якими возилися яйцеголові. Однак деякі деталі можна було б використати на електростанції Ватоґи."
    GMN_nf_b010:0 "Вкрадена мудрість"
    GMN_nf_b010_desc:0 "Знайти креслення для виготовлення ґаус-гвинтівки — це одне, але нам усе ще потрібно з'ясувати, як зробити половину цих деталей."
    GMN_nf_b011:0 "Побратими"
    GMN_nf_b011_desc:0 "Остання сутичка змусила деяких людей активізуватися."
    GMN_nf_b012:0 "Прикривати спини один одного"
    GMN_nf_b012_desc:0 "Наші друзі на півночі розуміють, що ми — єдине, що в нас є, щоб стримувати божевільних. Буде краще, якщо ми продовжимо тісно співпрацювати."
    GMN_nf_b013:0 "Використати те, чого вони нас навчили"
    GMN_nf_b013_desc:0 "Тепер, коли рейнджери вирішили воювати з нами, вони пошкодують, що навчили нас своїх методів ведення бою."
    GMN_nf_b014:0 "Уроки пагорбів"
    GMN_nf_b014_desc:0 "Бої в північних пагорбах навчили наших лідерів дечому."
    GMN_nf_b015:0 "Ще одна криза вирішена"
    GMN_nf_b015_desc:0 "Останнє аппалачське лайно минуло. Тепер нам просто потрібно готуватися до наступного."
    GMN_nf_b016:0 "Зростаюча ідентичність Аппалачів"
    GMN_nf_b016_desc:0 "Буря минула. Наші люди в безпеці та вільні жити своїм життям. Ми всі можемо бути трохи різними, але нас об'єднує одне. Це наш дім."
    GMN_nf_b017:0 "Зелені пасовища"
    GMN_nf_b017_desc:0 "Багато фермерів Оніонбурга виходять за межі своєї старої долини. Вони знають, що ми їх захистимо, тому вони знаходять роботу по всій нашій території."
    GMN_nf_b018:0 "Велике журавлине болото"
    GMN_nf_b018_desc:0 "Багато років тому за межами Ватоґи було болото, яке ідеально підходило для вирощування журавлини. Деякі оніонбуржці вважають, що воно могло б знову ним стати."
    GMN_nf_b019:0 "Вища освіта"
    GMN_nf_b019_desc:0 "Університет Ватоґи останні два століття був не більше ніж місцем для самовільного поселення. Яйцеголові хочуть заселитися туди й створити дослідницьку лабораторію. Можливо, колись вони зможуть навчити решту з нас, як працюють магніти."
    GMN_nf_b020:0 "Обмін секретами"
    GMN_nf_b020_desc:0 "Лоренц знає, що наші хлопці краще пристосовані для бою, ніж його лабораторні халати. Він неохоче поділився з нами секретами виготовлення їхніх гвинтівок. Тепер нам просто потрібно з'ясувати, що, в біса, таке феромагнітна куля і як її зробити."
    GMN_nf_b021:0 "Священна печера"
    GMN_nf_b021_desc:0 "Більшість людей уникали печер на схід від Ватоґи. З огляду на радіацію та чутки про гігантських кажанів, хто б хотів там тинятися? Виявляється, ті, хто поклоняється радіації, захочуть."
    GMN_nf_b022:0 "Камінь, гідний поклоніння"
    GMN_nf_b022_desc:0 "Паломники до дивної печери на схід від Ватоґи знайшли дуже унікальний камінь. Не той, якому поклонялися рокісти, але, хай йому грець, це щось особливе."
    GMN_nf_b023:0 "Безпечні стежки"
    GMN_nf_b023_desc:0 "Наші стосунки з рейнджерами найкращі за всю історію. Вони навіть дозволяють нам допомогти їм розчистити деякі з їхніх більш занедбаних стежок."
    GMN_nf_b024:0 "Шляхи горян"
    GMN_nf_b024_desc:0 "Досвідчені рейнджери погодилися навчити наших зеленіших лідерів тому, як воювати в тих пагорбах."
    GMN_nf_b025:0 "Ради Аппалачів"
    GMN_nf_b025_desc:0 "Було б неправильно продовжувати скликати ради, не надавши нашим новим сусідам місць за столом."
    GMN_nf_b026:0 "Серце темряви"
    GMN_nf_b026_desc:0 "Щуряче лігво, яким була столиця нації, завжди викликало занепокоєння у наших людей. Хто знає, що там, в біса, відбувалося останні пару століть?"
    GMN_nf_b027:0 "Завжди напоготові"
    GMN_nf_b027_desc:0 "Дикі мутанти, імперіалісти, ще один клятий культ. Хто знає, що там нишпорить у Столичному Пустищі? Що б це не було, ми повинні бути готові."
    GMN_nf_b028:0 "Захистити людей"
    GMN_nf_b028_desc:0 "Як ми й очікували, монстри зі сходу прийшли до нас, і ми надрали їм дупи. Люди, які намагаються там жити, дуже вдячні."
    GMN_nf_b029:0 "Деякі порядні люди"
    GMN_nf_b029_desc:0 "Хто б міг подумати, що за час після Великої війни округ Колумбія буде населений людьми, які поділяють наші ідеали?"
    GMN_nf_b030:0 "Будуємо мости"
    GMN_nf_b030_desc:0 "Ті хлопці на сході — хороші люди. Нам варто потоваришувати з такими сусідами."
    GMN_nf_b031:0 "Той самий гівняний інший вік"
    GMN_nf_b031_desc:0 "Ми мали очікувати, що округ Колумбія стане домом для "
    GMN_nf_b032:0 "Визволити пригноблених"
    GMN_nf_b032_desc:0 "Зі смертю їхніх тиранів люди Столичного Пустища вітають нас як героїв. На відміну від того, що казав старий Уряд, ми говоримо правду."
    GMN_nf_b033:0 "Гниль залишається"
    GMN_nf_b033_desc:0 "Чому ми не здивовані, що дияволи, які знищили світ, вчепилися й намагаються зробити це знову? Ми їм не дозволимо."
    GMN_nf_b034:0 "Перемога, яку кували 200 років"
    GMN_nf_b034_desc:0 "Можливо, знадобилося більше двох століть боротьби, але ми нарешті перемогли ублюдків, які узурпували Америку та перетворили її з країни вільних на країну рабів."
    GMN_nf_b035:0 "Ця зловісна посмішка"
    GMN_nf_b035_desc:0 "Феллон ніколи не довіряв Управлінню Вайтспрінгса. Купка невидимих еліт, які просто роздають речі людям, що для них бігають? Чесно кажучи, ми мали здогадатися, що тут щось темніше."
    GMN_nf_b036:0 "Пограбування Вайтспрінгса"
    GMN_nf_b036_desc:0 "Респонденти відмовляються бачити здоровий глузд."
    GMN_nf_b037:0 "Викриття М.О.Д.У.С."
    GMN_nf_b037_desc:0 "І ми, і Респонденти отримали кілька синців у цій боротьбі, але, зрештою, у нас більше спільного, ніж відмінного. Їм просто потрібно зняти шори з очей."
    GMN_nf_b038:0 "А це що?"
    GMN_nf_b038_desc:0 "Схоже, у цьому старому бункері валялися деякі цікаві речі."
    GMN_nf_b039:0 "Вогонь і кров на болотах"
    GMN_nf_b039_desc:0 "З Південної Вірджинії долинає багато шуму. Можливо, нам варто колись глянути."
    GMN_nf_b040:0 "У болото"
    GMN_nf_b040_desc:0 "Ще одна група божевільних, з якою доведеться мати справу, цього разу у Вірджинії."
    GMN_nf_b041:0 "Схожі інтереси"
    GMN_nf_b041_desc:0 "Маршали Вогню такі ж, як і ми, поселенці, які намагаються жити своїм життям, маючи справу з ордами божевільних. Чому б нам не допомагати одне одному, коли ми можемо?"
    GMN_nf_b042:0 "Вони не такі, як ми"
    GMN_nf_b042_desc:0 "На перший погляд може здатися, що Маршали Вогню мають з нами багато спільного. Однак щось тут не так..."
    GMN_nf_b043:0 "Приємно познайомитися"
    GMN_nf_b043_desc:0 "Чи можете ви уявити, що 200 років сидите на іржавому кораблі? Не дивно, що вони вперлися й не відступили. Але чи будуть вони хорошими сусідами?"
    GMN_nf_b044:0 "Ради Вірджинії"
    GMN_nf_b044_desc:0 "Після того, як болота Вірджинії заспокоїлися, ми можемо повернутися до життя в мирі."
