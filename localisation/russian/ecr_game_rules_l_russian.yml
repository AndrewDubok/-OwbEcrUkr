l_russian:
  RULE_OWB_UNIFIER:0 "Об'єднувач"
  RULE_UNIFIERS_OWB_CES:0 "@CES Легіон контролює Західне узбережжя"
  RULE_UNIFIERS_OWB_CES_DESC:0 "Легіон контролюватиме всі базові країни Old World Blues.\in\in§Ця опція зробить завантаження довшим.§!"
  RULE_UNIFIERS_OWB_NCR:0 "@NCR НКР контролює Західне узбережжя"
  RULE_UNIFIERS_OWB_NCR_DESC:0 "НКР контролюватиме всі базові країни Old World Blues.\n\n§RЦя опція зробить завантаження довшим.§!"
  RULE_UNIFIERS_OWB_DEFAULT:0 "Без об'єднувача"
  RULE_UNIFIERS_OWB_DEFAULT_DESC:0 ""
  RULE_AI_BEHAVIOR_EEN:0 "@EEN Поведінка ШІ Анклава Рейвен-Рока"
  RULE_AI_BEHAVIOR_EEN_DEFAULT:0 "@EEN За замовчуванням"
  RULE_AI_BEHAVIOR_EEN_DEFAULT_DESC:0 "Шлях лідера Анклаву Рейвен-Рока залишиться загадкою."
  RULE_AI_BEHAVIOR_EEN_EDEN:0 "@EEN Президент Едем"
  RULE_AI_BEHAVIOR_EEN_EDEN_DESC:0 "Президент Едем винюхає зраду в його адміністрації та зупинить переворот Осенса"
  RULE_AI_BEHAVIOR_EEN_AUTUMN:0 "@EEN Президент Отем"
  RULE_AI_BEHAVIOR_EEN_AUTUMN_DESC:0 "Полковник Отем відключить Едем та візьме під контроль Анклав."
  RULE_AI_BEHAVIOR_EEN_AUTUMN_CUNT:0 "@EEN Мудак Отем"
  RULE_AI_BEHAVIOR_EEN_AUTUMN_CUNT_DESC:0 "Полковник Отем відключить Едема та візьме під контроль Анклав, але обере найжорстокіші варіанти управління пустками."
  RULE_AI_BEHAVIOR_DCS:0 "@DCS Поведінка ШІ Столичних Поселень"
  RULE_AI_BEHAVIOR_DCS_DEFAULT:0 "@DCS За замовчуванням"
  RULE_AI_BEHAVIOR_DCS_DEFAULT_DESC:0 "Ніхто не знає, хто стане лідером Столичних Поселень."
  RULE_AI_BEHAVIOR_DCS_SIMMS:0 "@DCS Обраний Лукас Сіммс"
  RULE_AI_BEHAVIOR_DCS_SIMMS_DESC:0 "Лукаса Сіммса оберуть лідером Столичних Поселень."
  RULE_AI_BEHAVIOR_DCS_ROE:0 "@DCS Обраний дядько Роу"
  RULE_AI_BEHAVIOR_DCS_ROE_DESC:0 "Дядька Роу оберуть лідером Столичних Поселень."
  RULE_AI_BEHAVIOR_DCS_TENPENNY:0 "@DCS Обраний Тенпенні"
  RULE_AI_BEHAVIOR_DCS_TENPENNY_DESC:0 "Тенпенні оберуть лідером Столичних Поселень."
  RULE_AI_BEHAVIOR_DCS_DAVE:0 "@DCS ДЕЙВ ЗМІТАЄ!!!!"
  RULE_AI_BEHAVIOR_DCS_DAVE_DESC:0 "Дейва якимось чином оберуть лідером Поселень у Вашингтоні, замість звичайної громадянської війни."
  RULE_AI_BEHAVIOR_TALON:0 "@TAL Взаємодія ШІ Анклаву з Компанією Кіготь"
  RULE_AI_BEHAVIOR_TALON_DEFAULT:0 "@TAL За замовчуванням"
  RULE_AI_BEHAVIOR_TALON_DEFAULT_DESC:0 "Невідомо, як порозуміються Компанія Кіготь та Анклаву."
  RULE_AI_BEHAVIOR_TALON_FIGHT:0 "@TAL Анклав атакує Компанію Кіготь"
  RULE_AI_BEHAVIOR_TALON_FIGHT_DESC:0 "@TAL Анклав завжди атакуватиме Компанію Кіготь."
  RULE_AI_BEHAVIOR_TALON_FRIEND:0 "@TAL Анклав наймає Компанію Кіготь"
  RULE_AI_BEHAVIOR_TALON_FRIEND_DESC:0 "@TAL Анклав завжди використовуватиме Компанію Кіготь."
  RULE_AI_BEHAVIOR_PIT:0 "@PIT Поведінка ШІ Пітта"
  RULE_AI_BEHAVIOR_PIT_DEFAULT:0 "@PIT За замовчуванням"
  RULE_AI_BEHAVIOR_PIT_DEFAULT_DESC:0 "Невідомо, чи збереже Ашур свою владу в Пітті."
  RULE_AI_BEHAVIOR_PIT_ASHUR:0 "@PIT Правління Ашшура триває"
  RULE_AI_BEHAVIOR_PIT_ASHUR_DESC:0 "Ашур придушить будь-які спроби узурпувати його владу."
  RULE_AI_BEHAVIOR_PIT_WERNHER:0 "@PIT Вернер бере владу"
  RULE_AI_BEHAVIOR_PIT_WERNHER_DESC:0 "Вернер скине Ашура та змінить Пітт на... краще?"
  RULE_MAP_SETUP_DCM_STATUS:0 "@DCM Ситуація з мутантами Столичної Пустки"
  RULE_MAP_SETUP_DCM_STATUS_DEFAULT:0 "@DCM Звичайний підйом мутантів"
  RULE_MAP_SETUP_DCM_STATUS_DEFAULT_DESC:0 "Супермутанти Столичної Пустки починають гру подібно до того, як вони виглядають у Fallout 3. Вони становлять загрозу для мешканців Пустки, але не більш організовані, ніж банди рейдерів чи зграї диких собак. Якщо їх не зупинити, вони можуть перерости у щось більше."
  RULE_MAP_SETUP_DCM_STATUS_MUTANTS_RISE:0 "@DCM Мутанти організовуються рано!"
  RULE_MAP_SETUP_DCM_STATUS_MUTANTS_RISE_DESC:0 "Замість того, щоб нарощувати загрозу та зрештою організовуватися, супермутанти Столичної Пустки об'єднаються роками раніше. Темна хмара опускається на Столичну Пустку."
  
