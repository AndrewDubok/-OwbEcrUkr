l_russian:
  FRM_proscribed_burns_category:0 "Управління Маршалами Вогню"
  birth_of_the_fire_marshalls:0 "§RМаршали Вогню§!"
  birth_of_the_fire_marshalls_desc:0 "Наші Маршали розчистили небезпечні хащі на Вірджинському фронтирі, почали осушувати мілкі ставки під ферми і тепер охороняють наш північний кордон від канібалів. Біль і злидні все ще притаманні нашому народу, але майбутнє залишається сповненим надії. Глибокі культурні образи все ще спалахують серед наших розділених громад, однак вони дедалі частіше вирішуються через мирне посередництво.\n\nМир є чужинцем для Столичного Пустища, і чутки про нашу нещодавню стабільність зуміли пробитися крізь дику природу на південь від нас. Лише кілька вцілілих долають подорож через сотні миль боліт. Вони вирушають групами по сотні, знаючи, що лише дюжина досягне мети. Вони розповідають нашим Маршалам історії про звірів із тисячею зубів, місячні урагани та Чарівне Королівство на чолі з замороженим монархом."
  FRM_proscribed_burns_category_desc:0 "Дотепер контрольовані підпали використовувалися лише для запобігання розширенню §7Болота§!. Тепер, коли ми взяли під контроль території глибше в §7Болоті§!, ми можемо відпустити наших Маршалів Вогню, щоб відвоювати землю назад у цього вічного ворога."
  mills_burns:0 "Підпали Міллса"
  mills_burns_desc:0 "Незважаючи на наш нещодавній конфлікт, баптисти з Чейз-Міллс раніше дозволяли нашим Маршалам проводити підпали на своїй землі, що зробило наш остаточний прохід через цю територію набагато легшим, ніж в інших місцях."
  eden_burns:0 "Підпали Едему"
  eden_burns_desc:0 "Язичники з §R'Едему'§! десятиліттями сприяли зростанню цього чудовиського §7Болота§!. Нарешті настав час перетворити цей сад зла на §Rзгарище§!."
  liz_burns:0 "Спалення Ліз-Пойнт"
  liz_burns_desc:0 "У Ліз-Пойнт знаходиться табір невинних біженців, людей, які тікають від різних воєн у Південній Вірджинії. Відомі Люди великодушно відкрили свої серця цим людям і дозволили їм жити на своїх незайнятих територіях, однак вони також заплющили очі на страждання цих людей. Дозвольте нам зробити останню добру справу і очистити §7Болото§! від цієї землі."
  chesapeake_burns:0 "Підпали Чесапіка"
  chesapeake_burns_desc:0 "Значна частина Чесапікської затоки була знищена висадкою Відомих Людей. Те, що залишилося, було зруйновано їхніми сутичками з §7Болотом§!. Незважаючи на такі втрати, ми все одно повинні працювати, щоб врятувати те, що, і тих, хто, залишився."
  gates_burns:0 "Підпали Похмурих Воріт"
  gates_burns_desc:0 "Похмурі Ворота, як і більшість Вірджинії, позначені вибоїнами конфліктів. Будучи лінією фронту між Апокрифіанами та Болотяними Провидцами, і все це на тлі нескінченних §7Болотяних Руїн§!. І знову на нас лягає обов'язок повернути нормальність до цих руїн."
  alliance_burns:0 "Підпали Альянсу"
  alliance_burns_desc:0 "Землі Альянсу є домом для народжених Посейдоном та їхньої таємничої Апокрифії. Все згорить на службі нашим Маршалам Вогню та їхнім факелам."
  rotorville_burns:0 "Підпали Роторвіля"
  rotorville_burns_desc:0 "Містечко Роторвіль вижило на краю §7Болота§! і балансувало на межі численних конфліктів, що спустошували Вірджинію. Але тепер можна повністю позбавити регіон від загрози §7Болота§!."

