l_russian:

  nf_frm.1.t:0 "Линч из пепла"
  nf_frm.1.d:0 "Линчбург был маленьким городом до войны и сумел избежать худшего разрушения. Полностью избежав ядерных ударов, Линчбургу просто пришлось работать вместе в конце мира. Почти сработало.\n\nКогда пыль осела, что-то новое выросло в теперь переименованном Линче. Маленький город, процветающий (насколько это возможно в пустоши) и строящий новую жизнь. Хотя население резко упало, Линч стабилизировался и начал расти снова. Был сформирован городской совет, и существовал относительный мир.\n\nЗа этот период Линч в основном стал известен как:"
  nf_frm.1.a:0 "Центр для Виржинских мародёров"
  nf_frm.1.b:0 "Клочёк безопасности в опасных пустошах"
  nf_frm.1.c:0 "Центр любимой радиостанции Вирджинии"

  nf_frm.2.t:0 "Восходящие Болота"
  nf_frm.2.d:0 "Мир и процветание Линча были недолгими. На востоке какой-то эксперимент породил разрастающееся болото и дикий культ. Эдемский сад пришёл к власти, угрожая неустойчивому миру Вирджинии. Несмотря на новую угрозу, болото и культ медленно, но верно расширялись в сторону Линча.\n\nХотя какое-то время мы были в безопасности, среди населения начало расти беспокойство, и Совету пришлось принять решение по поводу болота."
  nf_frm.2.a:0 "Мы бы выяснили, откуда это взялось"
  nf_frm.2.b:0 "Мы бы сосредоточились на том, чтобы сдержать это"

  nf_frm.3.t:0 "Рожденые в пламени"
  nf_frm.3.d:0 "По мере того, как болото неуклонно расширялось и поглощало другие вирджинские поселенческие группы, ситуация становилась всё более и более отчаянной для Линча. Стало ясно, что потребуются огромные усилия, чтобы сдержать болото. Маленькая милиция, ответственная за оборону Линча, была бы недостаточной.\n\nСовет одобрил перестройку и расширение маленькой милиции, которая вооружилась огнемётами, динамитом, гранатомётами и всем остальным, что могло хоть как-то сдержать болото. Родились Пожарные Маршалы, и они начали проводить контролируемые поджоги, за которые они стали так хорошо известны. Вскоре все функции правительства были поглощены необходимостью сдерживать болото."
  nf_frm.3.a:0 "В моей душе огонь..."

  nf_frm.4.t:0 "Сопротивление обращению"
  nf_frm.4.d:0 "Культ Сада Эдема не мог расширяться вечно. Прибытие АтомБаптистов и Апокрифии Посейдона раскололо Сад и повредило их способность контролировать болота. Стало ясно, что болото остановлено, и Пожарные Маршалы праздновали.\n\nПока не стало очевидно, что дела далеко не стабильны.\n\nАпокрифия и АтомБаптисты часто сходятся в драках, а Сад Эдема всё ещё таится в тенях. Прибытие Ноунфолка опасно дестабилизировало Вирджинию, и война неизбежна. Именно при этих условиях мы заключили союз с АтомБаптистами, но этот союз далеко не надёжен. Их усилия по обращению наших людей вызывают постоянное напряжение, и без других угроз альянс мог бы быстро распасться."
  nf_frm.4.a:0 "С такими друзьями..."
    frm_bop_warning_tt:0 "Кто нуждается во врагах?\n\nПрисутствие миссионеров §Rопасно§!. Если они станут слишком могущественными, §Oони могут захватить нашу страну§!. Если сопротивление их присутствию станет слишком сильным, §Oальянс рухнет§!."

  nf_frm.5.t:0 "Подготовка к маршу"
  nf_frm.5.d:0 "Гражданское правительство Линча давно подчиняется Пожарным Маршалам, но поскольку война с Апокрифией Посейдона маячит на горизонте, гражданские заботы полностью отодвинуты на второй план ради военных приготовлений.\n\nХотя многие сетуют на силу Пожарных Маршалов, они используют свою власть для надлежащей подготовки нации к войне. Выживание нации должно быть на первом месте. Другие вопросы могут подождать."
  nf_frm.5.a:0 "Давайте сделаем это!"

  nf_frm.6.t:0 "Война за независимость"
  nf_frm.6.d:0 "Атомбаптисты слишком долго наращивали свое влияние в нашей стране, и очевидно, что они не собираются позволять нам иметь собственные взгляды. Пора показать им, что пожарные маршалы - не игрушки. Этот союз никогда не был прочным, но атомбаптисты зашли слишком далеко."
  nf_frm.6.a:0 "Пора остановить их навсегда"

  nf_frm.7.t:0 "Тихое поглощение"
  nf_frm.7.d:0 "Атомбаптисты незаметно усилили своё влияние и власть в нашем правительстве, и это наконец достигло апогея. Их обращённые теперь заполняют бюрократические аппараты и ряды армии, а наши интересы подчинены интересам атомбаптистов. Пути назад нет, мы - нация атомбаптистов."
  nf_frm.7.a:0 "У меня возникло желание помолиться"