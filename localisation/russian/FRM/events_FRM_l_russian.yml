l_russian:

  nf_frm.1.t:0 "Лінч із попелу"
  nf_frm.1.d:0 "Лінчбург був маленьким містечком до війни і зумів уникнути найгірших руйнувань. Повністю оминувши ядерні бомби, Лінчбург мусив просто працювати разом у кінці світу. І це майже спрацювало.\n\nКоли пил осів, щось нове виросло в тепер уже перейменованому Лінчі. Маленьке містечко, яке процвітало (наскільки це можливо в пустищі) і будувало нове життя. Хоча населення різко скоротилося, Лінч стабілізувався і знову почав зростати. Було сформовано міську раду, і настав відносний мир.\n\nЗа цей період Лінч став відомий насамперед як:"
  nf_frm.1.a:0 "Осередок вірджінських збирачів"
  nf_frm.1.b:0 "Обіцянка безпеки в небезпечних пустках"
  nf_frm.1.c:0 "Центр улюбленої радіостанції Вірджинії"

  nf_frm.2.t:0 "Зростаючі болота"
  nf_frm.2.d:0 "Миру та процвітанню Лінча не судилося тривати вічно. На сході якийсь експеримент створив зростаюче болото та дикий культ. Сад Едему прийшов до влади, загрожуючи хиткому миру у Вірджинії. Незважаючи на нову загрозу, болото і культ зростали повільно, але неухильно просуваючись до Лінча.\n\nХоча ми якийсь час були в безпеці, серед населення почало зростати занепокоєння, і Рада мала ухвалити рішення щодо болота."
  nf_frm.2.a:0 "Ми з'ясуємо, звідки воно взялося"
  nf_frm.2.b:0 "Ми зосередимося на тому, щоб його стримувати"

  nf_frm.3.t:0 "Народження полум'я"
  nf_frm.3.d:0 "У міру того, як болото неухильно розширювалося і поглинало інші групи вірджінських поселенців, ситуація для Лінча ставала дедалі критичнішою. Стало зрозуміло, що знадобляться величезні зусилля, щоб стримати болото. Маленьке ополчення, яке мало захищати Лінч, було недостатнім.\n\nРада схвалила реорганізацію та розширення невеликого ополчення, яке озброїлося вогнеметами, динамітом, гранатометами та всім іншим, що могло б хоч якось стримувати болото. Так народилися Маршали Вогню, які почали проводити контрольовані підпали, якими вони стали такими відомими. Невдовзі всі функції уряду були підпорядковані необхідності стримувати болото."
  nf_frm.3.a:0 "У моїй душі вогонь..."

  nf_frm.4.t:0 "Спротив наверненню"
  nf_frm.4.d:0 "Культ Саду Едему не міг розширюватися вічно. Поява Атомбаптистів та Апокрифії Посейдона розколола Сад і послабила їхню здатність контролювати болота. Стало зрозуміло, що болото зупинилося, і Маршали Вогню святкували.\n\nДоки не стало очевидним, що ситуація далека від стабільної.\n\nАпокрифія та Атомбаптисти часто ворогували, а Сад Едему досі ховається в тіні. Поява Відомих Людей небезпечно дестабілізувала Вірджинію, і війна неминуча. Саме в таких умовах ми уклали союз з Атомбаптистами, але цей союз далекий від міцного. Їхні спроби навернути наших людей викликають постійну напругу, і без зовнішніх загроз союз може швидко розпастися."
  nf_frm.4.a:0 "З такими друзями..."
    frm_bop_warning_tt:0 "Ворогів не треба?\n\nПрисутність місіонерів є §Rнебезпечною§!. Якщо вони стануть надто могутніми, §Oвони можуть захопити нашу країну§!. Якщо опір їхній присутності стане надто сильним, §Oсоюз зазнає невдачі§!."

  nf_frm.5.t:0 "Приготування до маршу"
  nf_frm.5.d:0 "Цивільний уряд Лінча вже давно підпорядкований Маршалам Вогню, але з наближенням війни з Апокрифією Посейдона цивільні питання повністю відсуваються на задній план заради військових приготувань.\n\nХоча багато хто нарікає на силу Маршалів Вогню, вони використовують свою владу, щоб належним чином підготувати націю до війни. Виживання нації має бути на першому місці. Інші питання можуть зачекати."
  nf_frm.5.a:0 "Зробімо це!"

  nf_frm.6.t:0 "Війна за незалежність"
  nf_frm.6.d:0 "Атомбаптисти занадто довго нарощували свій вплив у нашій нації, і зрозуміло, що вони не мають наміру залишати нам право на власні погляди. Час показати їм, що Маршали Вогню — не їхні іграшки. Цей союз ніколи не був стабільним, але Атомбаптисти зайшли надто далеко."
  nf_frm.6.a:0 "Час зупинити їх назавжди"

  nf_frm.7.t:0 "Тиха здача"
  nf_frm.7.d:0 "Атомбаптисти тихо збільшили свій вплив і владу в нашому уряді, і це нарешті досягло критичної точки. Їхні навернені тепер заповнюють бюрократію та військові ряди, а наші інтереси підпорядковані інтересам Атомбаптистів. Тепер немає вороття — ми нація Атомбаптистів."
  nf_frm.7.a:0 "Раптом захотілося помолитися"