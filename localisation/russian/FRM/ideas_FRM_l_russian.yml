l_russian:
  FRM_sidelined_civilian_government:0 "Отстраненное гражданское правительство"
  FRM_sidelined_civilian_government_desc:0 "У пожарных маршалов есть гражданское правительство... но, глядя на них, вы вряд ли догадаетесь об их существовании."

  FRM_fires_in_the_swamp:0 "§ОПожары на болоте§!"
  FRM_fires_in_the_swamp_desc:0 "Чтобы не дать болоту поглотить их территорию, пожарные маршалы стали мастерами огнемёта и постоянно проводят контролируемые выжигания. Их владение огнём стало поистине восхитительным, но стоит задаться вопросом.\n\nСохранят ли они свою благородную цель или же предпочтут §Rнаблюдать за тем, как мир горит§!?"

  FRM_fire_marshalls:0 "§RПожарные маршалы§!"
  FRM_fire_marshalls_desc:0 "Наши §Rмаршалы§! десятилетиями закаляли себя в борьбе с бесконечным врагом. Они стали элитой в использовании инженерных навыков и огнемётов, что позволяет им быстро занимать и удерживать любые позиции. Их настойчивость помогает им, так как они часто оказываются окружены врагом, сражаясь при свете своих огнемётов."

  frm_rebuilt_universities:0 "Перестройка университетов"
  frm_rebuilt_universities_desc:0 ""

  frm_swamp_hub:0 "Центр Болот"
  frm_swamp_hub_desc:0 "Несмотря на свое местоположение, Линч на самом деле приятное место!"

  frm_swamp_research:0 "Исследование Болот"
  frm_swamp_research_desc:0 ""

  frm_swamp_destruction:0 "Разрушения Болот"
  frm_swamp_destruction_desc:0 ""

  frm_watch_the_world_burn:0 "Смотрите, как горит мир"
  frm_watch_the_world_burn_desc:0 "Этот мир познал достаточно отчаяния и смерти. Что значит ещё немного отчаяния и смерти, если по ту сторону мир?"

  frm_virginias_salvation:0 "Спасение Вирджинии"
  frm_virginias_salvation_desc:0 "Вирджиния спасена, и её народ процветает. Мир и изобилие - вот новые правители Вирджинии."