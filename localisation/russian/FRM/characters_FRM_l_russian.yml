l_russian:
  FRM_bidda_name:0 "Маршалл Бідда"
  FRM_bidda_desc:0 "Десятиліттями Бідда та її люди змушені були ховатися від болота, що наступало, та божевільних племен, які його населяли. Бідда вела своїх людей на контрольовані підпали, знищуючи цілі ділянки болота, аби просто не пустити його до своїх домівок. Тепер, коли хаос, спричинений появою Відомих Людей, і падіння Саду Едему зсередини, Бідда знаходить щось нове, за що можна втриматися у цьому колись ворожому світі.\n\n§GНадія§!."

  FRM_rike_name:0 "Маршалл Райк"
  FRM_rike_desc:0 "Райк — фанатик, але не релігійний. Він бачить полум'я, яким володіють Маршали Вогню, як символи справжнього світу, світу, вільного від божевільного болота та безглуздої балаканини болотяних жителів. Він прагне лише одного — щоб вони всі згоріли. Ось у чому полягає його фанатизм."

  FRM_ashley_name:0 "Маршалл Ешлі"