l_russian:
  FRM_bidda_name:0 "Маршалл Бидда"
  FRM_bidda_desc:0 "На протяжении десятилетий Бидда и её люди были вынуждены прятаться от наступающего болота и сумасшедших племён, обитающих в нём. Бидда вела свой народ на контролируемые выжигания, уничтожая участки болота, чтобы просто не дать им проникнуть в их дома. Теперь, с хаосом, вызванным прибытием известных народов, и с тем, как Сад Эдема рушится сам по себе, Бидда находит что-то новое, за что можно держаться в когда-то враждебном мире. \n\n§GНадежда§!."

  FRM_rike_name:0 "Маршалл Рик"
  FRM_rike_desc:0 "Рик — фанатик, но не религиозный. Он видит огонь, которым владеют Огненные маршалы, как символы более истинного мира, мира, свободного от безумного болота и бессмысленного бормотания болотников. Он больше всего хочет, чтобы они все сгорели. Это его фанатизм."

  FRM_ashley_name:0 "Маршалл Эшли"