l_russian: 
TAL_nf_a001:0 "Парни"
TAL_nf_a001_desc:0 "У Джабско была дерзкая мечта — собрать лучшую группу наёмников во всей Столичной Пустоши. Чтобы добиться этого, ему нужны были настоящие крепкие ублюдки."
TAL_nf_a002:0 "Грязные дела"
TAL_nf_a002_desc:0 "Не имея репутации, Компания «Коготь» была вынуждена брать любую работу, какую только удавалось найти."
TAL_nf_a003:0 "Вход в Баннистер"
TAL_nf_a003_desc:0 "Новичкам поручили добыть старые голозаписи из Форта Баннистер. Оказавшись внутри, Джабско понял — у этого места есть потенциал."
TAL_nf_a004:0 "Винтовой Джабско"
TAL_nf_a004_desc:0 "Несмотря на свои хвастливые речи, многие в Компании «Коготь» понимают, что Джабско вовсе не такой закалённый в боях ублюдок, каким себя выставляет. И всё же — по какой-то причине — они идут за ним."
TAL_nf_a005:0 "Солдаты Удачи"
TAL_nf_a005_desc:0 "Подписал ли Джабско лучшую сделку в своей жизни или смертный приговор?"
TAL_nf_a006:0 "Тайник Джабско"
TAL_nf_a006_desc:0 "Старому командиру больше не понадобится его тайный запас крышек. Мы ими воспользуемся."
TAL_nf_a007:0 "Стандарты Ухода"
TAL_nf_a007_desc:0 "Дисциплина, это основа профессиональной армии. Если солдат не способен следить за своим внешним видом, как можно ожидать, что он будет следить за своим снаряжением?"
TAL_nf_a008:0 "Подлизывание Боссу"
TAL_nf_a008_desc:0 "Широко известно, как Эдем относится к Компании «Коготь». Возможно, придётся немного преувеличить их успехи, чтобы продвинуться дальше этого задания."
TAL_nf_a009:0 "Что мусор для одного..."
TAL_nf_a009_desc:0 "Анклав, возможно, не видит пользы в старой боевой броне, но для этих парней это может стать серьёзным апгрейдом."
TAL_nf_a010:0 "Небольшая Помощь?"
TAL_nf_a010_desc:0 "Эти оборванные наёмники едва поддаются обучению, а их офицеры — просто те, кто дольше всех выжил. Нам нужны настоящие лидеры."
TAL_nf_a011:0 "Открытые Двери"
TAL_nf_a011_desc:0 "Некоторые бойцы Анклава вскрыли запертую дверь и забрали всё, что было внутри. По крайней мере, теперь у нас стало немного больше места."
TAL_nf_a012:0 "Запасные Открывашки"
TAL_nf_a012_desc:0 "Винтовки крупного калибра могут считаться устаревшими по меркам Анклава, но Компании «Коготь» они точно пригодятся, если нам когда-нибудь придётся столкнуться с Братством."
TAL_nf_a013:0 "Глючные Боты"
TAL_nf_a013_desc:0 "Эдем счёл нужным прислать нам пару разваленных протектронов, которые признали слишком убитыми, чтобы чинить. Ура."
TAL_nf_a014:0 "Ржавые Ружья"
TAL_nf_a014_desc:0 "Последняя партия хлама из Рэйвен-Рока — это ржавые довоенные винтовки. Нам, конечно, повезло!"
TAL_nf_a015:0 "Назад к Основам"
TAL_nf_a015_desc:0 "Обычный боевой план «Когтя» — это просто броситься на цель, стреляя во все стороны. Удивительно, как они вообще выживают после своих заданий."
TAL_nf_a016:0 "Углублённая Подготовка"
TAL_nf_a016_desc:0 "Наёмники неожиданно хорошо адаптируются к новой программе подготовки. Мы запросим ещё несколько офицеров поддержки, чтобы по-настоящему запустить процесс."
TAL_nf_a017:0 "Планирование Наперед"
TAL_nf_a017_desc:0 "Хотя Братство Стали отстаёт от Анклава на столетия, их технологическое превосходство над Компанией «Коготь» всё ещё значительное. Если эти наёмники должны быть кем-то большим, чем пушечным мясом — им нужны специализированные тактики."
TAL_nf_a018:0 "Честная Торговля"
TAL_nf_a018_desc:0 "У Компании «Коготь» есть несколько оружейников, но у них нет знаний, чтобы производить силовую броню или винтокрылы. Мы должны отправить в Рэйвен-Рок избыточные технологии, что у нас есть, в обмен на что-то действительно полезное."
TAL_nf_a019:0 "Заделать Дыры"
TAL_nf_a019_desc:0 "Целые участки нашего периметра лишены оборонительных сооружений. Как мы вообще собираемся отражать атаку, если враг может просто пройти через дыру в ржавом заборе?"
TAL_nf_a020:0 "Мистер Починю-всё"
TAL_nf_a020_desc:0 "Мы достаточно натерпелись от ужасающих условий в Форте Баннистер. Было отправлено распоряжение — командование направит инженеров для ремонта жизненно важных систем бункера."
TAL_nf_a021:0 "Северные Раскаты"
TAL_nf_a021_desc:0 "Ходят слухи о странных вещах, что происходят на севере. Пусть парни приглядывают — на всякий случай."
TAL_nf_a022:0 "Ничего Общего с Парадайз"
TAL_nf_a022_desc:0 "Торговцы оружием из Питта закупают свою лучшую партию «рабочих» в Парадайз-Фоллс. Возможно, нам стоит войти в этот бизнес."
TAL_nf_a023:0 "Предложение, от которого мы отказались"
TAL_nf_a023_desc:0 "Эти ублюдки из Анклава всерьёз думали, что смогут скупить всю чёртову компанию? У них и денег-то на это нет!"
TAL_nf_a024:0 "Покупка оптом"
TAL_nf_a024_desc:0 "Хорошая работа принесла нам лишние крышки. Пожалуй, пора обновить игрушки для парней."
TAL_nf_a025:0 "Рейд на рейдеров"
TAL_nf_a025_desc:0 "Разные банды рейдеров переживают тяжёлые времена — поселения наконец-то организовались. Для нас это отличная возможность."
TAL_nf_a026:0 "Выплаты рейдеров"
TAL_nf_a026_desc:0 "Мы позволим рейдерам продолжать свои дела, но за это удовольствие им придётся платить нам."
TAL_nf_a027:0 "Доминировать в торговле рабами"
TAL_nf_a027_desc:0 "С рейдерами покончено — теперь мы главный источник рабов в Столичной Пустоши. А значит, правила устанавливаем мы."
TAL_nf_a028:0 "Королевское подношение"
TAL_nf_a028_desc:0 "Какая-то чокнутая рейдерша с кучей муравьёв заявилась с последним караваном дани и сказала, что хочет работать на нас, а не на рейдеров."
TAL_nf_a029:0 "Этому городу тесно для нас обоих"
TAL_nf_a029_desc:0 "Анклав держит в руках самое передовое оружие, какое только видела Столичная Пустошь — даже Братство Стали не сравнится с ними. И всё это может стать нашим."
TAL_nf_a030:0 "Да здравствует Король"
TAL_nf_a030_desc:0 "Заберите всё, что можно, из Рэйвен-Рока. И обязательно обчистите комнату полковника."
TAL_nf_a031:0 "Королевский выкуп"
TAL_nf_a031_desc:0 "Взломайте арсенал и заберите оружие, запускайте винтокрылы, надевайте силовую броню — теперь это наша территория."
TAL_nf_a032:0 "Необычные Инструменты"
TAL_nf_a032_desc:0 "Анклав производил всё своё снаряжение самостоятельно. Мы пока не можем делать то же самое, но эти машины вполне годятся — пули они выдают без проблем."
TAL_nf_a033:0 "Магниты!"
TAL_nf_a033_desc:0 "Чёртовы магниты — понятия не имею, как они работают, но эти винтовки пробивают броню Анклава насквозь. Берём пару ящиков."
TAL_nf_a034:0 "Консервированное Мясо"
TAL_nf_a034_desc:0 "Анклав продвигается через реку, но они не знают, что переход совсем рядом с территорией мутантов. Мы можем заманить их в те холмы и просто наблюдать, как они схлестнутся."
TAL_nf_a035:0 "Операция «Замыкание»"
TAL_nf_a035_desc:0 "Эта война идёт не так, как нам хотелось бы. Пора уравнять шансы. Недалеко от базы Анклава есть старый комплекс, полный роботов. Если мы сможем внедрить техника в их главный терминал, можно активировать старые китайские протоколы вторжения. Они могут атаковать и нас — но это наш лучший шанс."
TAL_nf_a036:0 "Крушители Ботов"
TAL_nf_a036_desc:0 "С роботами покончено — теперь можно спокойно зайти в Форт Константин и посмотреть, что они там охраняли."
TAL_nf_b001:0 "Дерьмо стало реальностью"
TAL_nf_b001_desc:0 "Приказ от командования получен — пора наступать на Столичную Пустошь."
TAL_nf_b002:0 "Штурм Башни"
TAL_nf_b002_desc:0 "Поступил доклад о столкновении недалеко от Тенпенни-Тауэра."
TAL_nf_b003:0 "Объедки Босса"
TAL_nf_b003_desc:0 "Самодельные винтовки и кустарные взрывчатки поселенцев, может, и не интересуют командование, но нам сгодится каждая пуля."
TAL_nf_b004:0 "Мега Куш"
TAL_nf_b004_desc:0 "Захват Мегатонны оказался весьма прибыльным делом."
TAL_nf_b005:0 "Сияющий маяк"
TAL_nf_b005_desc:0 "Анклав — это острие копья, люди. Будущее идёт в Пустошь, и Анклав — яркий, сияющий маяк этого будущего. Рейдеры поднимут головы от своего рагу из младенцев и увидят наш город, сверкающий вдалеке. Символ безопасности, мира и порядка. Сначала — Столичная Пустошь. Потом — вся Америка."
TAL_nf_b006:0 "Продвижение Вверх"
TAL_nf_b006_desc:0 "Компания «Коготь» превзошла даже самые смелые ожидания. Новое руководство это заметило."
TAL_nf_b007:0 "Элитные сотрудники"
TAL_nf_b007_desc:0 "Несколько офицеров Компании «Коготь» проявили себя как выдающиеся лидеры. Пришло время их повысить."
TAL_nf_b008:0 "Бонус за производительность"
TAL_nf_b008_desc:0 "Наёмники из Компании «Коготь» заслуженно наслаждаются плодами своей храбрости и преданности делу."
TAL_nf_b009:0 "Военные трофеи"
TAL_nf_b009_desc:0 "Большую часть снаряжения Братства забрало командование, но нам удалось сохранить кое-что по мелочи."
TAL_nf_b010:0 "Новая кровь"
TAL_nf_b010_desc:0 "Пошёл слух, что вступление в Компанию «Коготь» — один из лучших способов послужить своей стране и при этом получать крышки. Множество жителей Пустоши спешат записаться."
TAL_nf_b011:0 "Лояльность в приоритете"
TAL_nf_b011_desc:0 "Мы проверим новобранцев, чтобы убедиться — они вступают по любви к своей стране!"
TAL_nf_b012:0 "Опыт в приоритете"
TAL_nf_b012_desc:0 "Мы проверим новобранцев, чтобы убедиться, что они знают, что делают!"
TAL_nf_b013:0 "Храбрость в приоритете"
TAL_nf_b013_desc:0 "Мы проверим новобранцев, чтобы убедиться, что у них не тонка кишка, чтобы сражаться!"
TAL_nf_b014:0 "Новый контракт"
TAL_nf_b014_desc:0 "В Анклаве и Компании «Коготь» произошли серьёзные изменения. В новых условиях стоит обсудить новый контракт."
TAL_nf_b015:0 "Зловещие небеса"
TAL_nf_b015_desc:0 "Пара винтокрылов приземлилась под покровом ночи. Это необычно."
TAL_nf_b016:0 "Убийцы рыцарей"
TAL_nf_b016_desc:0 "Пусть выжившие сбросят свою силовую броню Анклава и наденут старое снаряжение Братства. Нам пока нельзя привлекать лишнее внимание."
TAL_nf_b017:0 "Поиск выживших"
TAL_nf_b017_desc:0 "В хаосе зачистки Эдема вполне возможно, что ещё несколько людей Отэма выжили."
TAL_nf_b018:0 "Схватил и смылся"
TAL_nf_b018_desc:0 "Нам понадобится каждая единица брони, какую только сможем достать — нужно готовиться к Эдему."
TAL_nf_b019:0 "Отчаянные меры"
TAL_nf_b019_desc:0 "В Столичной Пустоши всё ещё остались те, кто сражается с Анклавом Эдема. Нам стоит скрытно установить с ними контакт."
TAL_nf_b020:0 "Встреча с Механистом"
TAL_nf_b020_desc:0 "Какой-то странный пустошник в броне, похожей на робота, утверждает, что у него есть план, который может нам помочь. Говорит, рядом с Тенпенни-Тауэр есть старый объект, полный роботов."
TAL_nf_b021:0 "Расширение нашей защиты"
TAL_nf_b021_desc:0 "Нет, президент Эдем, мы строим эти аванпосты, чтобы перехватывать пустошников, бегущих с территории Анклава. Не беспокойтесь."
TAL_nf_b022:0 "Поддержка Симмса"
TAL_nf_b022_desc:0 "Лукас Симмс и его регуляторы всё ещё ведут бой против президента Эдема. Мы не можем вмешаться прямо сейчас, но можем тихо передать им кое-какие инструменты."
TAL_nf_b023:0 "Операция «Боевой Клич»"
TAL_nf_b023_desc:0 "Время пришло. Если мы не выступим против президента Эдема сейчас — он убьёт нас, как убивает пустошников, которых травит!"
TAL_nf_b024:0 "Войти в Высшую Лигу"
TAL_nf_b024_desc:0 "Условия контрактов становятся всё лучше и лучше. Только не говорите об этом парням, которые делают всю работу."
TAL_nf_b025:0 "100 Скальпов Мутантов"
TAL_nf_b025_desc:0 "Отправлять парней охотиться на мутантов ради наград от Братства — отличный способ отсеять слабаков и заработать крышки."
TAL_nf_b026:0 "Больше, чем наёмники"
TAL_nf_b026_desc:0 "Мы выросли из простой группы наёмников. С великой силой приходит великая награда!"
TAL_nf_b027:0 "Защита Столичной Пустоши"
TAL_nf_b027_desc:0 "Поселениям явно не помешала бы помощь в защите от Пустоши. Посмотрим, захотят ли они сыграть по нашим правилам."
TAL_nf_b028:0 "Высшая ставка"
TAL_nf_b028_desc:0 "Вся Пустошь гудит: «крутые парни из Компании «Коготь» прогнали этих неудачников из Анклава.» Теперь все знают, кто тут главный — и мы сами пишем себе правила."
TAL_nf_b029:0 "Идти своим путем"
TAL_nf_b029_desc:0 "Мы и не особо-то хотели работать с Питтом! Их же потеря!"
TAL_nf_b030:0 "Копнуть глубже"
TAL_nf_b030_desc:0 "Нижние уровни Рэйвен-Рок были перекрыты взрывами, когда мы прорвались внутрь. Пара рабочих рук — и всё можно восстановить."
TAL_nf_b031:0 "Украденная Независимость"
TAL_nf_b031_desc:0 "Для старой Компании «Коготь», Изгои Братства были угрозой, которую лучше обходить стороной. Теперь они лёгкая добыча."
TAL_nf_b032:0 "Адамс что?"
TAL_nf_b032_desc:0 "Анклав проявлял интерес к какой-то старой военной базе за заливом. Если когда-нибудь окажемся в тех краях стоит проверить."
TAL_nf_b033:0 "То, что скрыто внизу"
TAL_nf_b033_desc:0 "Изгои сидели на целой куче снаряги. Кто нашёл — тот и хозяин."
TAL_nf_b034:0 "Позвать Джо"
TAL_nf_b034_desc:0 "Слокум Джо — опытный мародёр, которого Братство вытеснило из руин Вашингтона. Говорят, он ищет работу."
TAL_nf_b035:0 "Охотники на Львов"
TAL_nf_b035_desc:0 "Братство, вторая крупная сила в Столичной Пустоши. Рано или поздно они пойдут на нас, чтобы отжать наши технологии. Если хотим выжить, нам надо ударить первыми."
TAL_nf_b036:0 "Магнитные чудеса"
TAL_nf_b036_desc:0 "Те ребята с магнитными пушками нарвались на неприятности на Западе и теперь движутся в нашу сторону. Надо подумать о найме — и выяснить, как они сделали эти штуки."
TAL_nf_b037:0 "Наши новые раскопки"
TAL_nf_b037_desc:0 "Форт Баннистер был неплох, но это тебе не Цитадель!"
TAL_nf_b038:0 "Зеленокожая Проблема"
TAL_nf_b038_desc:0 "Эти мутанты вредят бизнесу."
TAL_nf_b039:0 "Решение Проблемы"
TAL_nf_b039_desc:0 "Мы нашли источник, откуда идут мутанты. Теперь осталось остановить то, что их производит."
TAL_nf_b040:0 "Партнеры по преступлению"
TAL_nf_b040_desc:0 "Ашур умеет распознавать выгодные сделки, и он согласился работать с нами. Это начало прекрасного партнёрства."
TAL_nf_b041:0 "Импорт стали Питта"
TAL_nf_b041_desc:0 "У Ашура столько слитков, что он сам не знает, куда их девать. Мог бы и нам пару подкинуть."
TAL_nf_b042:0 "Штурм Индепенденса"
TAL_nf_b042_desc:0 "С Питтом за спиной нам бояться этих жалких рыцарей?"
TAL_nf_b043:0 "Просто большой аэропорт?"
TAL_nf_b043_desc:0 "Если Анклав интересовался нетронутым довоенным объектом — значит, внутри точно есть что-то интересное."
TAL_nf_b044:0 "Тайник Изгоев"
TAL_nf_b044_desc:0 "Арсеналы Форта Индепенденс хранили много хорошего, и теперь всё это наше."
TAL_nf_b045:0 "Найм Консультантов"
TAL_nf_b045_desc:0 "Пошёл слух, что мы работаем с Питтом — и теперь к нам потянулись те, кто ищет работу."
TAL_nf_b046:0 "Эм... Они это начали?"
TAL_nf_b046_desc:0 "Я знаю, Ашур больше не в Братстве, но мы не можем позволить себе провалить эту сделку. Убедись, что наша история без единой трещины."
TAL_nf_b047:0 "Базы данных Изгоев"
TAL_nf_b047_desc:0 "Изгои пытались стереть свои данные, когда мы подошли. Они немного не успели."
TAL_nf_b048:0 "Поделиться Богатствами"
TAL_nf_b048_desc:0 "С Ашуром приятно иметь дело. В знак признательности за партнёрство мы отправим ему кое-что из того, что нашли в подвале Цитадели."
TAL_nf_c001:0 "Настоящая Штаб-квартира"
TAL_nf_c001_desc:0 "Несмотря на все наши старания, Форт Баннистер оказался просто развалинами с парой работающих ламп. Теперь, когда Анклав контролирует Столичную Пустошь, припасы хлынули рекой."
TAL_nf_c002:0 "Комплекс Баннистер"
TAL_nf_c002_desc:0 "Мы превратим Форт Баннистер и окрестности в сеть укреплений. Чтобы выбить нас отсюда, понадобится армия уровня Анклава."
TAL_nf_c003:0 "Взлётная полоса Баннистер"
TAL_nf_c003_desc:0 "Вокруг Форта Баннистер есть перспективные земли, где можно построить аэродром. Командование даже предложило прислать оборудование для управления воздушным движением."
TAL_nf_c004:0 "Ужасная реорганизация"
TAL_nf_c004_desc:0 "Когда перемены происходят так быстро, приходится серьёзно перекраивать структуру. В процессе будет много путаницы и немало ошибок."
TAL_nf_c005:0 "Новые казармы"
TAL_nf_c005_desc:0 "Наплыв новобранцев сделал Баннистер тесным. К счастью, мы успели построить новые казармы. Больше никакого сна в обветшалых палатках двухсотлетней давности."
TAL_nf_c006:0 "Борьба за энергию"
TAL_nf_c006_desc:0 "Старый, капризный реактор раньше справлялся с нуждами Баннистера, но теперь нам нужны серьёзные апгрейды."
TAL_nf_c007:0 "Просто несколько бутылок"
TAL_nf_c007_desc:0 "С запуском Проекта «Чистота» мы можем получить дополнительные пайки воды."
TAL_nf_c008:0 "Новый материалы для подготовки"
TAL_nf_c008_desc:0 "Пришлось постараться, но командование согласилось прислать старые учебные пособия — чтобы наши бойцы подтянулись до уровня Анклава."
TAL_nf_c009:0 "Особые заявки"
TAL_nf_c009_desc:0 "Нам бы снаряжение, сделанное в этом веке — а не из ржавых частей от велосипеда."
TAL_nf_c010:0 "Повышенный допуск"
TAL_nf_c010_desc:0 "Благодаря Майору, Компания «Коготь» получит доступ к ограниченным архивам Анклава. Это не значит, что мы скоро начнём производить силовую броню, но штурмовые винтовки с нуля — уже вполне реально."
TAL_nf_c011:0 "Вспомогательный персонал"
TAL_nf_c011_desc:0 "По мере усиления Компании «Коготь», Отэм хочет прислать ещё людей из Анклава для надзора за Фортом Баннистер. Помогать они пришли или шпионить, это ещё предстоит выяснить."
TAL_nf_c012:0 "Арсенал Компании «Коготь»"
TAL_nf_c012_desc:0 "Покупать оружие у проезжих торговцев или рыться в довоенных руинах — больше не вариант. У нас будут собственные производители, делающие всё с нуля."
TAL_nf_c013:0 "Расширение Мастерских"
TAL_nf_c013_desc:0 "Чтобы соответствовать нашим потребностям, Майор запросил у командования производственное оборудование."
TAL_nf_c014:0 "Хлам из Убежища 87"
TAL_nf_c014_desc:0 "Проблема с мутантами в Убежище 87 решена, и теперь этот гниющий бункер можно спокойно разбирать на запчасти."
TAL_nf_c015:0 "Едва узнаваемый"
TAL_nf_c015_desc:0 "За последние несколько месяцев в Форте Баннистер произошло немало изменений."
TAL_nf_c016:0 "Юрисдикция Когтя"
TAL_nf_c016_desc:0 "По мере восстановления Америки встаёт вопрос, что будет с жителями районов вокруг Форта Баннистер?"
TAL_nf_c017:0 "ЧВК Америки"
TAL_nf_c017_desc:0 "Компания «Коготь» давно уже не просто шайка наёмников. Глядя в будущее, нам предстоит решить, как меняться вместе со временем."
TAL_nf_c018:0 "Элитные наёмники"
TAL_nf_c018_desc:0 "Компания «Коготь» будет стремиться стать лучшими наёмниками в Пустоши — уступая лишь Анклаву по уровню подготовки и оснащения."
TAL_nf_c019:0 "Избавиться от балласта"
TAL_nf_c019_desc:0 "Говорить неприятно, но факт, что не каждый новобранец подходит для новой Компании «Коготь."
TAL_nf_c020:0 "Вторая лучшая броня в округе"
TAL_nf_c020_desc:0 "Разумеется, командование не даст нам силовую броню Анклава, но у них наверняка завалялось несколько лишних T-51b."
TAL_nf_c021:0 "Зачем вмешиваться в успех?"
TAL_nf_c021_desc:0 "Компания «Коготь», с парой незначительных правок, доказала свою ценность для Анклава. Зачем нам что-то менять?"
TAL_nf_c022:0 "Центры Вербовки «Когтя»"
TAL_nf_c022_desc:0 "Несмотря на сопротивление командования, Майор добился соглашения, что Компания «Коготь» откроет пункты набора в крупных поселениях Столичной Пустоши."
TAL_nf_c023:0 "Низкие Стандарты"
TAL_nf_c023_desc:0 "Чтобы снабдить эту армию наёмников, нам придётся ослабить требования к закупаемому и производимому снаряжению."
TAL_nf_c024:0 "Мобильная разведка"
TAL_nf_c024_desc:0 "Компания «Коготь» будет на передовой во многих операциях Анклава. Мы ударим быстро, ударим сильно — и уйдём, прежде чем кто-то поймёт, что мы были рядом. А потом зайдёт армия."
TAL_nf_c025:0 "Парящие Когти"
TAL_nf_c025_desc:0 "VB-01 хоть и не штурмовики, но с их помощью мы можем ударить почти в любой точке."
TAL_nf_c026:0 "Проект «ГЕРМЕС»"
TAL_nf_c026_desc:0 "В интересах мобильности мы отказываемся от силовой брони в пользу самой передовой лёгкой защиты, какую только удастся найти."
TAL_nf_c027:0 "Чужими руками"
TAL_nf_c027_desc:0 "Мы знаем, что там есть крупные противники, которые со временем станут проблемой. Пока Анклав не готов встретиться с ними на поле боя, мы будем сдерживать их рост, предлагая свои услуги тем, кого они хотят покорить."
TAL_nf_c028:0 "Готовые ко всему"
TAL_nf_c028_desc:0 "После месяцев роста и перестроек мы превратили эту группу наёмников в элитное боевое подразделение, готовое внести свой вклад в восстановление Америки. Ничто не сможет нас остановить."
TAL_nf_c029:0 "Или нет..."
TAL_nf_c029_desc:0 "Главнокомандующий Отэм хочет срочно поговорить с Майором. Похоже, новости будут не из приятных."
TAL_nf_c030:0 "Возвращение домой"
TAL_nf_c030_desc:0 "Прошли годы с тех пор, как Капитан ступал на территорию командования Анклава. Это точно не то возвращение, которое он себе представлял."
TAL_nf_c031:0 "С возвращением"
TAL_nf_c031_desc:0 "Солдаты, что сражались против нас, просто выполняли приказ своего президента. Мы не можем винить их за это."
TAL_nf_c032:0 "Судьба Предателей"
TAL_nf_c032_desc:0 "Эти отбросы помогли Эдему устроить резню своих же боевых товарищей. Казнь для них — это ещё милость."
TAL_nf_c033:0 "Восстановить Чистоту"
TAL_nf_c033_desc:0 "Планы Эдема по Проекту «Чистота» были искажены и, если возможно, должны быть отменены."
TAL_nf_c034:0 "Наша новая цель"
TAL_nf_c034_desc:0 "Мечта о возрождении Америки не обязана умирать только потому, что Эдем оказался подонком."
TAL_nf_c035:0 "Трудности роста"
TAL_nf_c035_desc:0 "Все растеряны и гадают, что ждёт нас впереди, и даже Полковник."
TAL_nf_c036:0 "Вопросы урегулирования"
TAL_nf_c036_desc:0 "После падения Анклава Эдема в Столичной Пустоши образовался огромный вакуум власти. Мы должны стабилизировать ситуацию, прежде чем туда влезет кто-то другой."
TAL_nf_c037:0 "Совещательный совет"
TAL_nf_c037_desc:0 "Наёмники Компании «Коготь», лоялисты Отэма и лидеры Пустоши — у каждого свои взгляды на то, как двигаться дальше. Мы ведь не можем просто загнать их в одну комнату и надеяться, что они договорятся, правда?"
TAL_nf_c038:0 "Отвратительные мутанты"
TAL_nf_c038_desc:0 "Мы знаем, что Убежище 87, это источник заражения Супермутантами. Уничтожив его, мы укрепим свою репутацию."
TAL_nf_c039:0 "Подлые рейдеры"
TAL_nf_c039_desc:0 "Рейдеры на севере и юге создают проблемы. Лучше разобраться с ними сейчас, чем потом."
TAL_nf_c040:0 "Безвкусные каннибалы"
TAL_nf_c040_desc:0 "Каннибалы-рейдеры на юго-востоке, это проблема, которую нельзя игнорировать. Я уверен, они замышляют что-то по-настоящему жуткое."
TAL_nf_c041:0 "Каменистая дорога"
TAL_nf_c041_desc:0 "Холмы к западу от Баннистера кишат опасными типами. Мы не можем позволить им расширяться без сопротивления."
TAL_nf_c042:0 "Освобождение Питта"
TAL_nf_c042_desc:0 "Годами в Питт сгоняли рабов со всей округи. Пусть они и заявляют, что не просто очередная банда рейдеров — мы их всё равно уничтожим."
TAL_nf_c043:0 "Промышленный комплекс Анклава"
TAL_nf_c043_desc:0 "Питт полностью оправдывает своё имя. Но даже в этой ржавой каше смога и гнили есть проблеск надежды."
TAL_nf_c044:0 "Мы наводим порядок"
TAL_nf_c044_desc:0 "Бесчисленные угрозы жителям Пустоши были сокрушены нашей армией. Мало кто осмелится оспорить, что именно мы приносим мир и стабильность."
TAL_nf_c045:0 "Мы приносим процветание"
TAL_nf_c045_desc:0 "С объединёнными базами данных Анклава и Братства, промышленной мощью Питта и лучшими умами Пустоши, мы переживаем стремительный рост. Кто осмелится сказать, что мы не приносим процветание?"
TAL_nf_c046:0 "Как и задумывал Отэм"
TAL_nf_c046_desc:0 "Это заняло много времени, но мы наконец очистили Проект «Чистота» от модифицированного ВРЭ. Теперь мы можем распределять воду тем, кто нуждается в ней больше всего."
TAL_nf_c047:0 "Материнская база"
TAL_nf_c047_desc:0 "Форт Баннистер был неплохой базой для наёмников, но до сердца нового Анклава — он явно не дотягивает."
TAL_nf_c048:0 "Командный центр «Цитадель»"
TAL_nf_c048_desc:0 "Пентагон — или Цитадель, как его называют пустошники — стал бы идеальным местом для переноса нашего командного центра."
TAL_nf_c049:0 "Архив Цитадели"
TAL_nf_c049_desc:0 "Большая часть баз данных и архивов Братства была уничтожена в битве за Цитадель и во время оккупации Анклава. Большая. Но не вся."
TAL_nf_c050:0 "Наследие Братства"
TAL_nf_c050_desc:0 "Братство могло пасть под натиском Эдема, но нельзя отрицать, что они помогли сформировать ту Пустошь, которую мы видим сегодня. И когда мы перебираем останки их старого дома, трудно не задуматься о тех, кто был здесь до нас."
TAL_nf_c051:0 "Расширить Баннистер"
TAL_nf_c051_desc:0 "Форт Баннистер пока не идеален, но это можно исправить. Лучше вложиться в его развитие, чем переселяться в очередные развалины."
TAL_nf_c052:0 "Потерянные базы данных"
TAL_nf_c052_desc:0 "Очищая нижние уровни, мы наткнулись на забытые банки данных, и в них оказалось кое-что интересное."
TAL_nf_c053:0 "Наследие Джабско"
TAL_nf_c053_desc:0 "Страшно представить, что было бы, если бы Джабско отверг предложение Отэма, и Эдем захватил Пустошь без сопротивления. Пусть он и был жадным трусом — но случайно, Джабско сделал нечто хорошее."
TAL_nf_c054:0 "Авиабаза Отэм"
TAL_nf_c054_desc:0 "Авиабаза Адамс должна была стать резервной точкой, если Рэйвен-Рок падёт. Теперь, когда Рэйвен-Рок пал, логично использовать это место. Хотя имя ей бы стоило сменить."
TAL_nf_c055:0 "Архивы краулера"
TAL_nf_c055_desc:0 "Мобильная база на авиабазе Адамс хранила огромное количество важной информации, большая часть которой была утеряна со временем. Но то, что удаётся восстановить, будет жизненно важно, если мы хотим объединить эту нацию."
TAL_nf_c056:0 "Наследие Отэма"
TAL_nf_c056_desc:0 "Многие из уцелевших бойцов Анклава до сих пор скорбят по полковнику Отэму. Пустошники могут ничего о нём не знать, но именно благодаря ему они сейчас живы."
TAL_nf_c057:0 "Расширенные лаборатории"
TAL_nf_c057_desc:0 "Мы собрали научное оборудование со всей Пустоши и укомплектовали новые лаборатории любым яйцеголовым, который способен отличить квантовый гармонизатор от фотонной резонансной камеры."
TAL_nf_c058:0 "Здесь, чтобы остаться"
TAL_nf_c058_desc:0 "Наша база кипит от активности, и с флагом, реющим над ней, мы посылаем Пустоши чёткий сигнал: мы — Коготь Анклава, и мы пришли надолго."
TAL_nf_c059:0 "Очевидная и непосредственная угроза"
TAL_nf_c059_desc:0 "Мало кто из младшего командования знал, насколько активно действовали другие форпосты Анклава. Передача из Чикаго дала понять — они там, и они знают, что произошло в Столичной Пустоши."
TAL_nf_d001:0 "Столичная игровая площадка"
TAL_nf_d001_desc:0 "Столичная Пустошь принадлежит Компании «Коготь». Тащить крышки и брать, что хочется — приятно, но, может, чуть больше усилий принесёт куда более серьёзные награды?"
TAL_nf_d002:0 "Продолжать поток"
TAL_nf_d002_desc:0 "Питт отвернулся от нас, но это не повод рвать все связи. Работорговля приносит большие крышки, и у нас есть все шансы занять лидирующую позицию на этом рынке."
TAL_nf_d003:0 "Остановить работорговлю"
TAL_nf_d003_desc:0 "Питт зря задирал нос перед Джабско. Мы не отправим им ни одного раба — пусть посмотрим, как они справятся без нас."
TAL_nf_d004:0 "Контракты на охрану"
TAL_nf_d004_desc:0 "А что если... мы будем брать с поселений плату за защиту и... действительно их защищать? Если мы обеспечим безопасность, они ведь не станут прятать крышки под матрасом, верно?"
TAL_nf_d005:0 "Большая Пустошь"
TAL_nf_d005_desc:0 "Столичная Пустошь — дыра, как и всё остальное. Но даже из этих земель можно выжать крышки."
TAL_nf_d006:0 "Нанять Проводника с Гор"
TAL_nf_d006_desc:0 "К западу от Столичной Пустоши тянется почти бесконечный горный хребет. Без надёжного проводника мы легко можем заблудиться и увязнуть в бессмысленной войне с теми, кто там обитает."
TAL_nf_d007:0 "Сотрясти горы"
TAL_nf_d007_desc:0 "Парни готовы подняться в горы и показать этим деревенщинам, кто тут главный."
TAL_nf_d008:0 "Горы добычи"
TAL_nf_d008_desc:0 "Нравится им это или нет — жители этих холмов заплатят Компании «Коготь» по полной."
TAL_nf_d009:0 "Запасные носки"
TAL_nf_d009_desc:0 "Джабско откопал какую-то старую армейскую книжку про «окопную стопу». Теперь у него пунктик — чтобы мы брали с собой запасные носки перед выходом в болота. И, конечно, за счёт нашей зарплаты."
TAL_nf_d010:0 "В самое дерьмо"
TAL_nf_d010_desc:0 "Вы когда-нибудь задумывались, зачем мы здесь?"
TAL_nf_d011:0 "Прошли через это"
TAL_nf_d011_desc:0 "Вирджинские болота, 2281. Я там был. Было дерьмово."
TAL_nf_d012:0 "Заглянем в Гаррисбург"
TAL_nf_d012_desc:0 "Бандиты из Гаррисбурга не так тупы, как обычные рейдеры. Есть шанс, что они просто сложат оружие и примкнут к большим игрокам."
TAL_nf_d013:0 "Ничего, кроме вил"
TAL_nf_d013_desc:0 "Центральная Пенсильвания — это просто фермеры с мотыгами и плантациями. Это должно быть легко."
TAL_nf_d014:0 "Амишское мастерство"
TAL_nf_d014_desc:0 "Говори что хочешь про амишей, но чёрт возьми, стулья они делают отменные. Теперь они делают их для нас на продажу. Иначе ошейник на их шее сделает БУМ."
TAL_nf_d015:0 "Упущенные возможности"
TAL_nf_d015_desc:0 "К чёрту Питт! Эти ублюдки решили, что они выше нас? Отлично. Мы сломаем им хребет и заставим вспомнить, что значит смирение."
TAL_nf_d016:0 "Новый человек у власти"
TAL_nf_d016_desc:0 "Питт, может, и свалка, но теперь это наша свалка."
TAL_nf_d017:0 "Терминалы Цитадели"
TAL_nf_d017_desc:0 "Один из наших наконец-то вскрыл терминалы Братства. Но тут возникла ОГРОМНАЯ ПРОБЛЕМА!"
TAL_nf_d018:0 "Стрёмные каннибалы"
TAL_nf_d018_desc:0 "Типы из Андейла чертовски странные. Большинство наших, кого мы туда отправляли по делам, так и не вернулись."
TAL_nf_d019:0 "Бизнес, как обычно"
TAL_nf_d019_desc:0 "Мне плевать, если они вас пугают, заходите туда и надрайте им задницы!"
TAL_nf_d020:0 "Вымогать у богачей"
TAL_nf_d020_desc:0 "Говорят, в Рич Мэне полно богачей из Пустоши. Теперь они должны платить нам по счетам."
TAL_nf_d021:0 "Держись подальше от болот"
TAL_nf_d021_desc:0 "Болота вокруг Пойнт Лукаута того не стоят. Просто держитесь подальше."
TAL_nf_d022:0 "Распознать потенциал"
TAL_nf_d022_desc:0 "Некоторые из лидеров Андейла пришли к Джабско с любопытным предложением..."
TAL_nf_d023:0 "Корпус каннибалов"
TAL_nf_d023_desc:0 "Они не такие, как наши обычные бойцы, но эти людоеды из Андейла умеют подкрадываться к врагу и заставлять его страдать. Они действуют по какому-то странному кодексу резни и превращаются в ходячий ужас, без капли жалости. Джабско просто говорит им: «Время убивать — пришло», и они впадают в кровавое бешенство, оставляя после себя лишь ошмётки человеческих тел, которые потом доедают крысы. Любой, кого мы на них натравим, скорее выберет сгореть, чем попасть под их нож. Так что обычно они быстро идут на уступки, когда на кону — паническая потрошиловка."
TAL_nf_d024:0 "Что такое Данвич?"
TAL_nf_d024_desc:0 "Это что-то вроде сэндвича?"
TAL_nf_d025:0 "Уничтожить культ"
TAL_nf_d025_desc:0 "Джабско слишком боится этих ебанутых из Андейла, так что приказ простой — убить их всех."
TAL_nf_d026:0 "Забрать их дерьмо"
TAL_nf_d026_desc:0 "Говори что хочешь про этих парней из Андейла, но ножи у них были чертовски крутые. Хотя Джерри говорит, что его нож с ним разговаривает..."
TAL_nf_d027:0 "Душевное спокойствие"
TAL_nf_d027_desc:0 "Больше никаких культов, больше никаких проблем."
TAL_nf_d028:0 "Дооооброе утро, Мегатонна!"
TAL_nf_d028_desc:0 "Мы слишком долго позволяли пустошникам жить в комфорте, пока решали все их проблемы. Теперь пришло время платить за услуги."
TAL_nf_d029:0 "Рейд на ржавую посудину"
TAL_nf_d029_desc:0 "Ривет-Сити это огромный сейф, просто ждущий, когда мы его вскроем и заберём всё, что внутри."
TAL_nf_d030:0 "Главные псы в округе"
TAL_nf_d030_desc:0 "Пустоши теперь наши. Скоро каждый в этой стране будет платить Компании «Коготь» за защиту. И мы станем богатыми."
TAL_nf_d031:0 "Посетить Питт"
TAL_nf_d031_desc:0 "Время встреч представителей прошло. Если этому союзу суждено выжить — Ашур и Джабско должны встретиться лицом к лицу."
TAL_nf_d032:0 "Прогресс в оружии"
TAL_nf_d032_desc:0 "Ашуру нравится, что мы сделали. В знак аванса на следующий контракт он прислал нам партию чертовски хороших винтовок!"
TAL_nf_d033:0 "Доступ в Кузни"
TAL_nf_d033_desc:0 "Ашуру нравится, как мы работаем. В качестве аванса на следующий контракт он разрешил нам использовать часть своих кузниц — для чего угодно, чёрт возьми!"
TAL_nf_d034:0 "Накормить машину"
TAL_nf_d034_desc:0 "Кузницы Питта требуют постоянного притока рабочих. А мы расширяем территорию, и можем обеспечить этот спрос. За хорошую плату, конечно."
TAL_nf_d035:0 "Решатели проблем"
TAL_nf_d035_desc:0 "У Питта хватает проблем, приходящих извне. И вот тут вступаем мы."
TAL_nf_d036:0 "Накормить кузницы"
TAL_nf_d036_desc:0 "У Питта почти бесконечный запас металлолома для переплавки. Но эти ленивые рабы успевают собрать лишь часть — пока их не сожрут троги. Мы можем начать поставки из Столичной Пустоши."
TAL_nf_d037:0 "Ускоренные поставки"
TAL_nf_d037_desc:0 "Эти караваны с хламом тащатся слишком медленно по старым тропам. Надо расчистить путь — быстро и эффективно."
TAL_nf_d038:0 "Старьевщик Джо"
TAL_nf_d038_desc:0 "Джо кое-что смыслит в сборе хлама. Мы поручили ему организовать этих ленивых ублюдков в руинах."
TAL_nf_d039:0 "Охота на Хэмлина"
TAL_nf_d039_desc:0 "Поселения Столичной Пустоши укрывают этого труса Хэмлина и его армию беглых рабов. Мы не сможем добраться до Хэмлина, пока не разберёмся с самими поселениями."
TAL_nf_d040:0 "Разграбить Храм"
TAL_nf_d040_desc:0 "Армия непокорных рабов загнана в свой оплот. Остался последний рывок."
TAL_nf_d041:0 "Прекрасный подарок"
TAL_nf_d041_desc:0 "Что подарить лорду Питта? Сувенир, оставшийся от павшей занозы в его боку — достойный знак признания."
TAL_nf_d042:0 "Наёмники Гаррисбурга"
TAL_nf_d042_desc:0 "Бандиты из Гаррисбурга были полезными поставщиками для Питта, хоть и мелкими. Теперь у них проблемы, и Ашур хочет, чтобы мы вмешались."
TAL_nf_d043:0 "Сокрушить Стражей"
TAL_nf_d043_desc:0 "Нет смысла ходить вокруг да около. Фермеры Джонстауна укрывают этих дорожных стражей, и пора надавить на них."
TAL_nf_d044:0 "Показательно наказать"
TAL_nf_d044_desc:0 "Стражи и те, кто их укрывает, первыми отправятся в Питт."
TAL_nf_d045:0 "Заслуженный бонус"
TAL_nf_d045_desc:0 "Металл идёт потоком, мелкие проблемы устранены. Мы точно заслужили этот бонус."
TAL_nf_d046:0 "Взять управление в свои руки"
TAL_nf_d046_desc:0 "Не знаю, кем себя возомнил этот ублюдок Вёрнер, но он ещё пожалеет, что сорвал наш контракт."
TAL_nf_d047:0 "Растущий Рынок"
TAL_nf_d047_desc:0 "В Питте всё набирает обороты. Им срочно нужны вещи, которые большинство групп отказывается продавать, из-за их репутации. Ашур хочет, чтобы мы связались с другими группами."
TAL_nf_d048:0 "Связи с Филлипинами"
TAL_nf_d048_desc:0 "У Мусорщика репутация тяжёлого партнёра. То, что Джабско смог заключить с ним сделку — почти чудо."
TAL_nf_d049:0 "Падение Херши"
TAL_nf_d049_desc:0 "В рамках нашей сделки с Филадельфийскими Рейдерами мы поможем им устранить их главную цель за последние годы."
TAL_nf_d050:0 "Экспорт из Херши"
TAL_nf_d050_desc:0 "Мусорщик держит слово — и даже вписал нас в свой новый экспортный бизнес в знак признательности."
TAL_nf_d051:0 "Дуврский Бизнес"
TAL_nf_d051_desc:0 "У Торговцев Дувра есть связи по всему восточному побережью. Если кто и сможет достать нам нужное, так это они."
TAL_nf_d052:0 "Очистка водных путей"
TAL_nf_d052_desc:0 "Рыбаки Залива мешают поставкам. Мы не можем позволить этому продолжаться."
TAL_nf_d053:0 "Южный импорт"
TAL_nf_d053_desc:0 "Ресурсы текут в Питт благодаря нашим связям в Дувре. Мы сделали ставку на правильную команду."
TAL_nf_d054:0 "Банды Нью-Йорка"
TAL_nf_d054_desc:0 "С севера доходят слухи о группировках, обосновавшихся в руинах Нью-Йорка. Похоже, они неплохо держат ситуацию под контролем. Стоит попробовать выйти на контакт."
TAL_nf_d055:0 "Семейные споры"
TAL_nf_d055_desc:0 "Эти банды не так сплочены, как нам казалось. И это можно обратить себе на пользу."
TAL_nf_d056:0 "У нас всё схвачено"
TAL_nf_d056_desc:0 "Джабско получил предложение, от которого невозможно отказаться."
TAL_nf_d057:0 "Немного прикарманить"
TAL_nf_d057_desc:0 "Питт получает больше, чем им нужно — благодаря нам. Так кого это заденет, если мы оставим себе немного?"
TAL_nf_d058:0 "Мечта"
TAL_nf_d058_desc:0 "У Питта есть потенциал изменить всю Пустошь. Ему просто нужен правильный ум, чтобы направить его."
TAL_nf_d059:0 "Будущее за Сталью"
TAL_nf_d059_desc:0 "Питт стал отлаженным механизмом. Всё идёт как надо — и будет только лучше."
