    ###Leaders###
    TAL_jabsco_name:0 "Командир Джабско"
    TAL_Jabsco_desc:0 "Командир Джабско — мозг Компании «Коготь». Из безопасности своего бункера в Форте Баннистер он курирует и координирует военные операции по всей Столичной Пустоши. Несмотря на его заявления о многолетнем боевом опыте, никто из его людей никогда не видел этому подтверждений. В те редкие случаи, когда Джабско появлялся в бою, сообщалось, что он либо убегал, либо прятался, ни разу не вступив в бой. Из-за этого за его спиной его называют «Взвинченный Джабско»." 
    TAL_harrison_name:0 "Капитан Харрисон"
    TAL_harrison_desc:0 "Капитан Харрисон не знает, кого он так разозлил, что его перевели с боевого задания на няньку для кучки наёмников из Пустоши. Всё, что он знает — теперь он здесь, и его задача убедиться, что Компания ЄКоготь» оправдывает вложения, которые в них делает Анклав. Может, если всё пойдёт гладко, он сможет вернуться обратно в настоящие вооруженные силы."
