l_russian:

    ###Ideas###
    tal_rigorous_training_idea:0 "Строгое обучение"
    tal_rigorous_training_idea_desc:0 "Наёмники Компании «Коготь» — одни из лучших бойцов во всей Пустоши. Дисциплина, порядок и беспощадность вбиваются в каждого новобранца. Это требует времени, и не все проходят отбор. Но те, кто проходит — лучшие из лучших." 
    tal_strict_leadership_idea:0 "Строгое руководство"
    tal_strict_leadership_idea_desc:0 "Эти командиры не терпят провалов и слабости. Любой, кто ослушается приказа, будет лично казнён."
    TAL_old_world_science_equipment:0 "Научное оборудование Старого Света"
    TAL_old_world_science_equipment_desc:0 "У Компании «Коготь» работают лучшие мозги, какие только можно купить за крышки. День и ночь они ищут новые способы, как навалять и оставить след — ради наших клиентов."
    TAL_mercenary_research_team:0 "Наёмные исследователи"
    TAL_mercenary_research_team_desc:0 "Исследователи, которых в вычурной Ривет-Сити считают «неэтичными», находят путь к нам. И помогают нам придумывать новые, весёлые способы всё взрывать."
    TAL_mercenary_weapon_maintenance:0 "Обслуживание пушек наёмников"
    TAL_mercenary_weapon_maintenance_desc:0 "В поле жизнь наёмника зависит от его пушки. Убедись, что твоя работает как надо."
    TAL_refined_ammo_processing:0 "Усовершенствованная переработка боеприпасов"
    TAL_refined_ammo_processing_desc:0 "Самодельные верстаки из хлама и обломков не идут ни в какое сравнение с тем, что у нас есть в Баннистере. Наши инструменты для работы с боеприпасами — это уровень."
    TAL_fort_bannister_defenses:0 "Защита Форта Баннистера"
    TAL_fort_bannister_defenses_desc:0 "Автоматические турели, охранные боты и запираемые двери — всё это гарантирует, что сдвинуть нас сможет разве что настоящая армия."
    TAL_enclave_funds:0 "Финансирование из Анклава"
    TAL_enclave_funds_desc:0 "Анклав платит нам хорошие деньги просто за то, чтобы мы поднимали шум в Пустоши. Источник финансирования неизвестен, но многие местные выскочки видят, как мы гребём крышки, и хотят влиться."
    TAL_soldiers_of_fortune:0 "Солдаты удачи"
    TAL_soldiers_of_fortune_desc:0 "Дела идут хорошо, и добычи хватает всем. Наши парни постоянно возвращаются с трофеями после удачных рейдов."
    TAL_night_ops:0 "Ночные операции"
    TAL_night_ops_desc:0 "Какой смысл носить чёрную броню, если мы не крадёмся по ночам, творя всякую дичь?"
    TAL_enclave_training:0 "Подготовка Анклава"
    TAL_enclave_training_desc:0 "Эти новые инструкторы — ещё те ублюдки, но всего лишь немного хуже того, к чему мы привыкли. Зато разбираются в своём деле."
    TAL_officer_corp:0 "Офицерский корпус"
    TAL_officer_corp_desc:0 "Некоторые из наших командиров проходят модное обучение тому, как быть командиром."
    TAL_raider_mercs:0 "Рейдеры-наёмники"
    TAL_raider_mercs_desc:0 "Раньше мы брали только тех рейдеров, кто держал себя в руках. Но, может, пора ослабить стандарты и взять пару отмороженных — на мясо."
    TAL_paying_for_protection_idea:0 "Выплачивает плату за «защиту»"
    TAL_paying_for_protection_idea_desc:0 "Эти ублюдки из Компании «Коготь» трясут с нас деньги за «защиту»."
    TAL_protection_money_idea:0 "Плата за защиту"
    TAL_protection_money_idea_desc:0 "Эти болваны из Тенпенни-Тауэр платят нам за то, чтобы мы сидели на заднице и ничего не делали — лишь бы не нападали на них. Самые лёгкие крышки в моей жизни, скажу тебе."
    TAL_grooming_standards_idea:0 "Стандарты внешнего вида"
    TAL_grooming_standards_idea_desc:0 "Никто не ожидал, что условия работы у Анклава окажутся такими жёсткими. Но если ради контракта нужно подровнять усы... ну что ж, давай нож."
    TAL_enclave_tactics_idea:0 "Тактики Анклава"
    TAL_enclave_tactics_idea_desc:0 "Анклав научил нас, что бой, это не только про самые большие пушки и страх в глазах врага."

    ###New Ideas###
    TAL_brotherhood_fight_idea:0 "Анти-Братская подготовка"
    TAL_brotherhood_fight_idea_desc:0 "Анклав прислал материалы и людей, чтобы научить нас эффективнее разбираться с этими жестянками из Братства."
    TAL_slave_work_force:0 "Рабы-рабочие"
    TAL_slave_work_force_desc:0 "Рабский труд стоит дёшево, особенно если не задавать лишних вопросов. Гораздо выгоднее гнать оружие на своих фабриках, чем платить торговцам."
    TAL_slave_trade_idea:0 "Преимущество торговли рабами"
    TAL_slave_trade_idea_desc:0 "Зачем тратить крышки на рабов, если можно прихватить парочку из поселений Пустоши и сбыть тех, кто нам не по нраву?"
    TAL_salvaged_enclave_tec_idea:0 "Добытые технологии Анклава"
    TAL_salvaged_enclave_tec_idea_desc:0 "Может, мы и не в силах понять всю технику Анклава, что попала к нам в руки, но разобраться в ней хоть немного — вполне по силам."
    TAL_loyal_recruits_idea:0 "Лояльные рекруты"
    TAL_loyal_recruits_idea_desc:0 "Мы тщательно проверяем новобранцев, чтобы убедиться: они идут к нам не только ради крышек, но и из любви к своей стране... ну и ради крышек тоже."
    TAL_experienced_recruits_idea:0 "Опытные рекруты"
    TAL_experienced_recruits_idea_desc:0 "Мы тщательно отбираем новобранцев, чтобы убедиться, что они годные бойцы. Бывшие наёмники, охранники караванов и солдаты — в самом верху списка."
    TAL_brave_recruits_idea:0 "Храбрые рекруты"
    TAL_brave_recruits_idea_desc:0 "Мы тщательно испытываем новобранцев, чтобы убедиться, что у них хватит духу сражаться за нас."
    tal_war_is_business_idea:0 "Война - это бизнес"
    tal_war_is_business_idea_desc:0 "В конце концов, мы тут не для того, чтобы управлять городами или наводить порядок. Мы здесь, чтобы надрать задницы и собирать крышки."
    TAL_and_business_is_booming_idea:0 "Бизнес процветает"
    TAL_and_business_is_booming_idea_desc:0 "С каждым днём Пустошь становится всё хуже. С тех пор как мы надрали зад Анклаву, спрос на наши услуги только растёт!"
    TAL_grand_ambitions_idea:0 "Огромные амбиции"
    TAL_grand_ambitions_idea_desc:0 "Компания «Коготь» — это не просто очередная шайка наёмников. Что бы ни думали эти так называемые силы Пустоши, мы поднимемся выше всех!"
    TAL_hunting_greenskin_home_idea:0 "Поиски источника Супермутантов"
    TAL_hunting_greenskin_home_idea_desc:0 "Наши бойцы неустанно прочёсывают Пустошь в поисках логова Супермутантов."
    TAL_reorg_idea:0 "Реорганизация"
    TAL_reorg_idea_desc:0 "В нашем штабе происходят крупные перемены. Вызванный ими хаос приносит немало проблем."
    TAL_co_armerments_idea:0 "Арсенал Компании «Коготь»"
    TAL_co_armerments_idea_desc:0 "Некоторые из лучших оружейников Столичной Пустоши работают на нас. Больше никакого сбора ржавых труб и старого хлама — теперь мы вооружены по-настоящему."
    TAL_elite_mercs_idea:0 "Элитные наёмники"
    TAL_elite_mercs_idea_desc:0 "Наши наёмники — лучшие из лучших. Лучше обучены, лучше экипированы и способны дать отпор даже самым лютым силам Пустоши."
    TAL_same_but_better_idea:0 "Не вмешивайтесь в успех"
    TAL_same_but_better_idea_desc:0 "Мы пришли к тому, что имеем, не благодаря продвинутой силовой броне или хитроумной тактике. Нам достаточно старой доброй дисциплины и боевого духа."
    TAL_recruitment_offices_idea:0 "Центры вербовки"
    TAL_recruitment_offices_idea_desc:0 "Несколько наших наёмников будут отозваны с боевых заданий и направлены в поселения по всей Пустоши. Там они займутся тем, чтобы убедить молодых мужчин и женщин вступить в ряды Компании «Коготь»!"
    TAL_lowest_bidder_idea:0 "Низкие стандары"
    TAL_lowest_bidder_idea_desc:0 "Благодаря нашему внушительному присутствию, мы — ценный клиент. Так что торговцы Пустоши готовы грызться друг с другом, лишь бы предложить нам лучший товар. Ну да, иногда пушки клинят или взрываются... но чаще всего — нет!"
    TAL_mobile_recon_idea:0 "Мобильная разведка «Когтя»"
    TAL_mobile_recon_idea_desc:0 "Хотя основная часть наших сил продолжает действовать по стандартным протоколам, всё больше бойцов осваивают новую роль. Наши мобильные разведоператоры специализируются на молниеносных проникновениях в тыл врага и периодических диверсионных винто-штурмах."
    TAL_proxy_warriors_idea:0 "Чужими руками"
    TAL_proxy_warriors_idea_desc:0 "Наёмники Компании «Коготь» действуют по всей Пустоши, отстаивая интересы Америки. Это значит не только сражаться плечом к плечу с нашими военными союзниками, но и порой вступать в бой бок о бок с местными выскочками, чтобы затормозить наступление наших врагов."
    TAL_ready_for_anything_idea:0 "Готовые ко всему"
    TAL_ready_for_anything_idea_desc:0 "После месяцев реорганизации наши операции идут как по маслу. Мы готовы ко всему, что Пустошь решит бросить нам в лицо."
    TAL_welcomed_enclave_idea:0 "Интеграция сторонников Эдема"
    TAL_welcomed_enclave_idea_desc:0 "Солдаты, сражавшиеся за президента Эдема, теперь вливаются в наши ряды. Возникающее напряжение мешает операциям и порой приводит к стычкам."
    TAL_we_bring_order_idea:0 "Мы наводим порядок"
    TAL_we_bring_order_idea_desc:0 "Коготь Анклава несёт стабильность, куда бы ни ступила его нога. Рейдеры, мутанты и непокорные поселенцы — все получают по заслугам."
    TAL_we_bring_prosperity_idea:0 "Мы приносим процветание"
    TAL_we_bring_prosperity_idea_desc:0 "Технологии, которыми располагает Коготь Анклава, позволяют нам восстанавливать и использовать ресурсы Пустоши куда эффективнее, чем любые другие государства Пустоши."
    TAL_halted_slave_trade_idea:0 "Прекращение работорговли"
    TAL_halted_slave_trade_idea_desc:0 "Вместо того чтобы собирать рабов для отправки в Питт, мы начали охоту на самих работорговцев и не допускаем караваны с нашей территории к воротам Питта."
    TAL_extra_socks_idea:0 "Дополнительные носки"
    TAL_extra_socks_idea_desc:0 "Джабско вычитал в какой-то древней книге про штуку под названием «окопная стопа». Теперь всем приказано таскать запасные носки и менять их по расписанию."
    TAL_lessons_of_swamps_idea:0 "Наученные болотами"
    TAL_lessons_of_swamps_idea_desc:0 "Мы кое-чему научились о выживании в жутких условиях, пока месили грязь в болотах Вирджинии."
    TAL_amish_craftsmanship_idea:0 "Мастерство амишей"
    TAL_amish_craftsmanship_idea_desc:0 "Даже с взрывным ошейником на шее, эти амишские работяги гордятся своим ремеслом — и выдают товар, который не стыдно продать."
    TAL_settlement_guards_idea:0 "Корни охраны поселения"
    TAL_settlement_guards_idea_desc:0 "Сегодня Компания «Коготь» берётся за самые разные задания, но их происхождение как охранников поселений всё ещё заметно в их манере вести бой."
    TAL_escorting_scavs_idea:0 "Корни охраны сборщиков"
    TAL_escorting_scavs_idea_desc:0 "Сегодня Компания «Коготь» берётся за самые разные задания, но их происхождение как охраны собирателей хлама всё ещё заметно по тому, как они ориентируются в Пустоши."
    TAL_attacking_caravans_idea:0 "Корни рейдеров караванов"
    TAL_attacking_caravans_idea_desc:0 "Сегодня Компания «Коготь» берётся за самые разные задания, но их происхождение как рейдеров на караваны всё ещё заметно по тому, как они умеют перерезать линии снабжения и грабить припасы."
    TAL_druggie_raiders_idea:0 "Рейдеры под наркотой"
    TAL_druggie_raiders_idea_desc:0 "Основу боевой мощи Компании «Коготь» составляют рейдеры, сидящие на химии. Сражаются они яростно — но грязно."
    TAL_native_wastelanders_idea:0 "Наивные жители Пустошей"
    TAL_native_wastelanders_idea_desc:0 "Основу боевой силы Компании «Коготь» составляют молодые жители Пустоши, жаждущие приключений. Они полны энтузиазма — но немногие переживают своё первое столкновение."
    TAL_homeless_guys_idea:0 "Отчаянные жители Пустошей"
    TAL_homeless_guys_idea_desc:0 "Основу боевой силы Компании «Коготь» составляют отчаявшиеся и обездоленные жители Пустоши. Сражаются они за копейки, преданы — ведь мы даём им шанс, но до лучших им далеко."
    TAL_enclave_contracts_idea:0 "Трудовой контракт Анклава"
    TAL_enclave_contracts_idea_desc:0 "Анклав стал нашим основным работодателем. Платят хорошо, хоть задания иногда и странные."
    TAL_enclave_contracts_1_idea:0 "Трудовой контракт Анклава"
    TAL_enclave_contracts_1_idea_desc:0 "Наш новый контракт с Анклавом приносит больше льгот, чем раньше."
    TAL_enclave_contracts_2_idea:0 "Трудовой контракт Анклава"
    TAL_enclave_contracts_2_idea_desc:0 "Наш новый контракт с Анклавом приносит больше льгот, чем раньше."
    TAL_enclave_contracts_3_idea:0 "Трудовой контракт Анклава"
    TAL_enclave_contracts_3_idea_desc:0 "Наш новый контракт с Анклавом приносит больше льгот, чем раньше."
    TAL_enclave_settlements_idea:0 "Администрация Поселений Анклава"
    TAL_enclave_settlements_idea_desc:0 "Поселения на территории Компании «Коготь» находятся под управлением Анклава."
    TAL_talon_settlements_idea:0 "Администрация Поселений Когтей"
    TAL_talon_settlements_idea_desc:0 "Поселения на территории Компании «Коготь» будут находиться под управлением её собственных властей."
    TAL_cleaning_purity_idea:0 "Разработка ВРЭ антигена"
    TAL_cleaning_purity_idea_desc:0 "Наши учёные посвящают почти всё своё время и ресурсы разработке антигена против модифицированного ВРЭ, заражающего «Проект Чистота»."
    TAL_slow_to_trust_idea:0 "Медленный рост доверия"
    TAL_slow_to_trust_idea_desc:0 "Люди Пустоши с понятной настороженностью относятся к нам. Со временем мы завоюем их доверие — но на это потребуется время."
    TAL_increased_merc_pay_idea:0 "Увеличенная плата наёмникам"
    TAL_increased_merc_pay_idea_desc:0 "Чтобы сохранить лояльность наших бойцов, мы платим им больше, чем когда-либо прежде."
    TAL_simms_promises_kept_idea:0 "Обещания жителям Пустошей выполнены"
    TAL_simms_promises_kept_idea_desc:0 "Мы сдержали обещания, данные Лукасу Симмсу, и постепенно завоёвываем доверие жителей Пустоши."
    TAL_merchant_freedom_idea:0 "Торговые свободы защищены"
    TAL_merchant_freedom_idea_desc:0 "Торговцам Пустоши нечего бояться. Налоги могут взиматься, но они низкие — как и требования к регулированию."
    TAL_merchant_regulation_idea:0 "Регуляция торговли"
    TAL_merchant_regulation_idea_desc:0 "Торговцы Пустоши держатся в узде с помощью регулирования и умеренных налогов."
    TAL_reinvented_government_idea:0 "Переосмысленное правительство"
    TAL_reinvented_government_idea_desc:0 "Пытаясь вымогать у жителей Пустоши плату за защиту, Джабско случайно заново изобрёл концепцию правительства."
    TAL_accelerated_pitt_idea:0 "Ускоренное производство"
    TAL_accelerated_pitt_idea_desc:0 "Горны Питта пылают ярко. Работа не прекращается, а те, кто останавливается — заменяются."
    TAL_maintained_pitt_idea:0 "Стабильное производство"
    TAL_maintained_pitt_idea_desc:0 "Горны Питта пылают ровно. Работа ведётся плавно, на устойчивом уровне."
    TAL_werners_way_idea:0 "Путь Вернера"
    TAL_werners_way_idea_desc:0 "Горны Питта работают под мягким контролем. Рабочим разрешены перерывы, а смены ограничены 12 часами. В долгосрочной перспективе это должно принести плоды."
    TAL_ashurs_way_idea:0 "Путь Ашура"
    TAL_ashurs_way_idea_desc:0 "Горны Питта пылают, как и прежде. Рабы почти не замечают разницы — управляет ли Питтом Джабско или Ашур."
    TAL_reinvented_government_2_idea:0 "Переосмысленное правительство"
    TAL_reinvented_government_2_idea_desc:0 "Пытаясь вымогать у жителей Пустоши плату за защиту, Джабско случайно заново изобрёл концепцию правительства."
    TAL_supplying_pitt_idea:0 "Снабжение Питта"
    TAL_supplying_pitt_idea_desc:0 "Благодаря нашему контролю над рабским рынком Столичной Пустоши, мы стали крупнейшим поставщиком для Питта."
    TAL_supplying_pitt_2_idea:0 "Снабжение Питта"
    TAL_supplying_pitt_2_idea_desc:0 "Благодаря нашим партнёрам и ценному хламу из Столичной Пустоши, мы стали ключевым поставщиком для Питта."
    TAL_talon_supplyers_idea:0 "Поддержка от Компании «Коготь»"
    TAL_talon_supplyers_idea_desc:0 "Компании «Коготь» продолжает снабжать нас рабами из Столичной Пустоши."
    TAL_talon_supplyers_2_idea:0 "Поддержка от Компании «Коготь»"
    TAL_talon_supplyers_2_idea_desc:0 "Поскольку потребность в рабском труде исчезает, Компания «Коготь» переориентировалась на поставку ценных ресурсов через сторонних партнёров."
    TAL_southern_imports_idea:0 "Южный импорт"
    TAL_southern_imports_idea_desc:0 "Ценный хлам всех видов поступает с юга через Торговцев Дувра."
    TAL_hershey_exports_idea:0 "Экспорт Херши"
    TAL_hershey_exports_idea_desc:0 "С захватом Херши Кабан взял всё под контроль. Амиши трудятся, их товары расходятся по всей Пустоши. В знак благодарности за нашу помощь он отстегнул нам долю."
    TAL_joes_junkmen_idea:0 "Старьёвщик Джо"
    TAL_joes_junkmen_idea_desc:0 "Джо привёл старых знакомых со времён мародёрства, чтобы организовать команды рабов для вылазок в руины Столичной Пустоши в поисках хлама и ценного добра."
    TAL_constantine_attacking_idea:0 "Константин атакует"
    TAL_constantine_attacking_idea_desc:0 "Роботы из Форта Константин вышли из строя и атакуют наши фланги. Пока мы не уничтожим этих машин, наши силы будут нести потери."

    ###Occupation Laws###
    ecr_protection_contracts:0 "Контракт об защите"
    ecr_protection_contracts_desc:0 "Компания «Коготь» заключит соглашение с местными лидерами о защите их поселений в обмен на кучу крышек. Отказаться от столь щедрого предложения может оказаться смертельно опасным."
    
    ###Events###
    TAL_nf_events.1.title:0 "Собираем команду"
    TAL_nf_events.1.desc:0 "Как и многие молодые люди в Столичной Пустоши, Джабско не имел особых перспектив. После череды провальных работ последней каплей стало увольнение с караванной охраны — он сбежал от стаи кротокрыс. Именно тогда Джабско понял своё призвание: не вкалывать, а командовать и наживаться. С парой преувеличений и пустыми обещаниями он собрал свою первую группу наёмников. Но кто же был настолько глуп, чтобы на это купиться?"
    TAL_nf_events.1.a:0 "Наркозависимые рейдеры"
    TAL_nf_events.1.b:0 "Наивные жители Пустоши"
    TAL_nf_events.1.c:0 "Отчаявшиеся, бездомные парни"
    TAL_nf_events.2.title:0 "Сделано очень дёшево"
    TAL_nf_events.2.desc:0 "В самом начале у банды наёмников Джабско шансов было немного. Их униформа — грубо покрашенные куски металла, сколоченные в подобие брони. Оружие — дешёвые самопальные пушки, какие только могли себе позволить. А база — старая лачуга, доставшаяся Джабско от бабушки. В мире наёмников всё решает репутация, и если Компании «Коготь» хотелось получать серьёзные заказы — нужно было её заработать. В первые дни их основными заданиями были..."
    TAL_nf_events.2.a:0 "Защита приграничных поселений"
    TAL_nf_events.2.b:0 "Сопровождение мародёров в старые руины"
    TAL_nf_events.2.c:0 "Атака на караваны и поселения"
    TAL_nf_events.3.title:0 "Проникновение в Баннистер"
    TAL_nf_events.3.desc:0 "Времена были тяжёлые, и Компании «Коготь» не раз приходилось спасаться бегством с задания. Во время одного из таких «тактических отступлений» они наткнулись на Форт Баннистер. Развалины довоенной эпохи были почти полностью разграблены на поверхности. Им невероятно повезло, Джабско нашёл старую ключ-карту на скелете и повёл своих людей в нижние уровни. Там они обнаружили..."
    TAL_nf_events.3.a:0 "Защитных роботов, готовых к активации"
    TAL_nf_events.3.b:0 "Тайник с довоенным оружием"
    TAL_nf_events.3.c:0 "Старые тренировочные материалы"
    TAL_nf_events.3.d:0 "Они ничего не нашли"
    TAL_nf_events.4.title:0 "Взвинченный Джабско"
    TAL_nf_events.4.desc:0 "Несмотря на хвастовство и убедительное враньё, всё больше бойцов Компании «Коготь» начинали понимать — их командир тот ещё трус. Его байки о доблести и великих подвигах ничем не подтверждались. А то, что его не раз видели, как он удирал с поля боя при первом же намёке на беду, тоже не помогало. Обычно наёмники не слушают тех, кто из бункера носа не сунет. Но Джабско был особенным. При всех своих недостатках, у него точно был талант к..."
    TAL_nf_events.4.a:0 "Организации операций"
    TAL_nf_events.4.b:0 "Ведении переговоров по контрактам"
    TAL_nf_events.4.c:0 "Тренировке бойцов"
    TAL_nf_events.4.d:0 "Поддержке своих парней довольными"
    TAL_nf_events.5.title:0 "Вот это наказание"
    TAL_nf_events.5.desc:0 "Спускаясь с винтокрыла, капитан Харрисон почувствовал, как на него наваливается вся тяжесть ситуации. Форт Баннистер больше походил на лагерь беженцев, наскоро собранный среди разрушенных бетонных конструкций и груды ржавого металлолома, чем на военную базу. Так называемые солдаты, которых он должен был возглавить, стояли в жалком строю у зоны посадки. Эти неуправляемые мутанты глазели в грязных униформах, рты раскрыты — будто винтокрыл они видели впервые. Одна неосторожная фраза, сказанная не тому человеку, — и вот Харрисон получает это «назначение», от которого тошнило. Никто не знал, когда именно поступит приказ от командования, но если Харрисон когда-нибудь хотел вернуться к прежнему посту — эта армия должна быть готова. Глядя на своих людей, капитан задавался вопросом: возможно ли вообще сделать из них хоть что-то?"
    TAL_nf_events.5.a:0 "У нас много работы"
    TAL_nf_events.6.title:0 "Рассказы об Наварро"
    TAL_nf_events.6.desc:0 "Видя этих немытых наёмников день за днём, капитан Харрисон невольно вспоминал жизнь в Рэйвен-Роке. Солдаты Анклава были чистыми и дисциплинированными. А наёмники Компании «Коготь» — грязные и буйные. Они едва реагировали даже на самые простые команды, а большинство из них с трудом высиживало лекции по военной теории. Через несколько недель Харрисон вспомнил рассказы отца о старом учебном лагере на Западе. Отец говорил о сержанте, который мог превратить даже самого недисциплинированного новобранца в образцового солдата. По его словам, первым приоритетом сержанта было следить за формой и внешним видом бойцов. Введение строгих стандартов личной гигиены могло стать первым шагом к тому, чтобы привести этих людей в порядок."
    TAL_nf_events.6.a:0 "ПО-ЛИЦИ-РУЙ ЭТИ У-СЫ, РЯДОВОЙ!"
    TAL_nf_events.7.title:0 "Что такое фланг?"
    TAL_nf_events.7.desc:0 "Капитан был абсолютно ошеломлён вопросом, который задал один из наёмников. Каменные лица вокруг показали, что это не очередная глупая шуточка — парень говорил серьёзно, и остальные ждали ответа, потому что сами не знали. Харрисон знал из докладов, что тактика пустошников примитивна, но он думал, что Компания «Коготь» хотя бы умеет делать больше, чем просто нестись напролом. В этот момент стало мучительно ясно: как бы дисциплинирована ни была эта шайка наёмников, против действительно организованного противника они будут бесполезны. Им нужно было гораздо больше подготовки, если они хоть как-то должны оправдать ресурсы, которые Анклав вкладывает в них."
    TAL_nf_events.7.a:0 "Чтож хорошо, фланг это..."
    TAL_nf_events.8.title:0 "Интересное предложение"
    TAL_nf_events.8.desc:0 "Компания «Коготь» прислала нам любопытное предложение. В рамках контракта мы согласились не изымать оборудование в Баннистере, к которому у них был доступ — включая ящики с продвинутыми компонентами. К счастью, командир, которого мы туда назначили, нашёл решение, которое устроило их офицеров: простой обмен. Капитан Харрисон сообщает, что наёмники готовы расстаться с этими компонентами в обмен на винтовки и боеприпасы. В долгосрочной перспективе это выгодная сделка, но нам нужно провести инвентаризацию и понять, можем ли мы позволить себе отдать то, что они просят."
    TAL_nf_events.8.a:0 "Мы можем дать 100 винтовок"
    TAL_nf_events.8.b:0 "Мы можем дать 200 винтовок"
    TAL_nf_events.8.c:0 "Мы можем дать 300 винтовок"
    TAL_nf_events.8.d:0 "Нам понадобится каждая имеющаяся у нас винтовка!"
    TAL_nf_events.9.title:0 "Атака Супермутантов!"
    TAL_nf_events.9.desc:0 "Одна из наших штурмовых групп преследовала отряд наёмников Компании Коготь, но потеряла их из виду. Поблизости находился укреплённый лагерь, и наши бойцы решили, что это аванпост Когтя. На деле это оказался крупный лагерь супермутантов. Хотя наши люди всё же зачистили его, наёмники ушли, а потери оказались выше, чем ожидалось."
    TAL_nf_events.9.a:0 "Черт их побери!"
    TAL_nf_events.10.title:0 "Сумашедшие машины"
    TAL_nf_events.10.desc:0 "Мы не знаем почему, но охранные роботы из Форта Константин начали продвигаться в сторону Рэйвен-Рока и атакуют всех, кто встаёт у них на пути. Можно предположить, что Компания Коготь как-то в этом замешана. Пара роботов нас не уничтожит, но это развитие событий может поставить под угрозу наши операции."
    TAL_nf_events.10.a:0 "Мы все равно победим"
    TAL_nf_events.11.title:0 "Всё пошло наперекосяк"
    TAL_nf_events.11.desc:0 "Как он делал почти каждую неделю с тех пор, как принял командование Компанией Коготь, капитан Харрисон стоял во дворе Форта Баннистер и обращался к своим людям. Но на этот раз речь шла не о новом учебном упражнении или наказании очередного непокорного отряда. Это был тот самый день, к которому вели последние месяцы. Анклав открылся Пустоши, и, как все ожидали, Братство оказывает ожесточённое сопротивление. Харрисон смотрел на бойцов, выстроившихся перед ним, и осознавал, насколько сильно они изменились с тех пор, как он впервые ступил на землю Баннистера. Теперь они стояли в строю, в порядке, в чистых униформах, и их внимание было приковано к Капитану. Когда он закончил речь и направил солдат к командирам отделений за назначениями, он увидел, как те мгновенно пришли в движение. Может быть, они всё-таки не погибнут в первых же боях с Братством."
    TAL_nf_events.11.a:0 "А может, это лишь пустые надежды"
    TAL_nf_events.12.title:0 "Осада Тенпенни-Тауэр"
    TAL_nf_events.12.desc:0 "Тенпенни-Тауэр была самой роскошной крепостью в Столичной Пустоши. Построенная, чтобы держать угрозы Пустоши на расстоянии, она дарила своим обитателям жизнь в мире и роскоши. Стены, стоявшие годами с момента её заселения, сдерживали рейдеров и мутантов, но не Компанию Коготь. Капитан Харрисон должен был отдать наёмникам должное — он ожидал, что они начнут грабить и разрушать башню сразу после прорыва обороны. Вместо этого командир атаки вышел на связь по радио и запросил разрешение на разграбление башни."
    TAL_nf_events.12.a:0 "Не может быть и речи"
    TAL_nf_events.12.b:0 "Сведите это к минимуму"
    TAL_nf_events.12.c:0 "Отрывайся по полной"
    TAL_nf_events.13.title:0 "Превосходя ожидания"
    TAL_nf_events.13.desc:0 "Когда капитан Харрисон получил это назначение, и даже в первые дни войны Анклава с Братством — он считал, что бойцы, переданные ему под командование, будут не более чем пушечным мясом. Он верил, что, несмотря на все усилия, эти наёмники из Пустоши послужат лишь отвлекающим манёвром для Братства. Но страхи капитана быстро рассеялись. Компания Коготь показала себя в боях с союзниками Братства, а бывшие недисциплинированные наёмники даже смогли дать отпор самому Братству. Это означало, что они не потянут его карьеру на дно. Вопреки мнению самого Харрисона и большинства в Анклаве, эти бойцы из Пустоши оказались не бесполезными, а совсем наоборот. Компания Коготь доказала: при должной подготовке даже пустошники могут стать боеспособными солдатами. Цель капитана была достигнута, а его шансы на возвращение в Рэйвен-Рок — стали куда реальнее."
    TAL_nf_events.13.a:0 "Но захочет ли он возвращаться?"
    TAL_nf_events.14.title:0 "Хаос в крышки"
    TAL_nf_events.14.desc:0 "После краха Братства и поселений Столичной Пустоши в результате войны с Анклавом последовали вполне ожидаемые последствия. На окраинные поселения обрушились налёты со стороны мародёров, а Анклав начал переход к новой роли — управлению Столичной Пустошью. Именно здесь вступила в дело Компания Коготь. Согласно переговорам майора Харрисона с главнокомандующим Отэмом, Коготь должен был охранять поселения на юге Столичной Пустоши, чтобы дать Анклаву передышку. В обмен на это Компания Коготь получила право взимать плату с самих поселений за предоставленные услуги."
    TAL_nf_events.14.a:0 "Звучит как беспроигрышный вариант"
    TAL_nf_events.15.title:0 "Новый контракт"
    TAL_nf_events.15.desc:0 "Первоначальный план по отношению к Компании Коготь после войны с Братством заключался в её расформировании и аннексии её территорий. Однако майору удалось убедить Отэма отложить это решение и позволить наёмникам продолжить работу на Правительство. Условия соглашения должны были обсуждаться позже — когда хаос в Столичной Пустоши немного уляжется. Этот момент наконец настал, и сделка осталась почти без изменений, за исключением одного пункта: компенсации. Майор запросил, чтобы помимо стандартных выплат наёмникам была предусмотрена небольшая надбавка."
    TAL_nf_events.15.a:0 "Лучшая оплата для людей"
    TAL_nf_events.15.b:0 "Субсидии на производство оружия"
    TAL_nf_events.15.c:0 "Расширение прав на захваченное оборудование"
    TAL_nf_events.16.title:0 "Под Покровом Ночи"
    TAL_nf_events.16.desc:0 "Первоначальный оптимизм, который капитан испытывал, наблюдая успехи Компании Коготь на поле боя, быстро сменился тревожным предчувствием. Вскоре после битвы за Проект Чистота почти вся связь с командованием была потеряна. Единственным каналом коммуникации остались редкие сбросы припасов с винтокрылов, но даже болтливые экипажи доставки вдруг стали подозрительно молчаливыми. Капитан начал опасаться, что война идёт не так, как ожидалось, или, возможно, кто-то наверху решил отстранить его из-за успехов Когтя. Но даже самые мрачные опасения не могли подготовить его к правде, которая явилась к Баннистеру посреди ночи. Несколько потрёпанных офицеров и солдат прибыли на повреждённых винтокрылах. Капитан уже собирался отдать приказ поднять тревогу, думая, что это внезапное наступление Братства. Но прежде чем он успел это сделать, его отвёл в сторону молодой лейтенант, возглавлявший группу, и сообщил истинную цель визита: \n \n§RПолковник Отэм мёртв. Почти всё командование тоже. Эдем зачищает штаб. Нам нужна твоя помощь.§! \n \nКапитан принял выживших в Баннистер и провёл большую часть ночи, слушая их рассказ. Полковник Отэм узнал о плане президента Эдема — очистить Пустошь с помощью модифицированного ВРЭ — и попытался устроить переворот, чтобы остановить его. Переворот провалился, а за ним последовали массовые казни заговорщиков. Многие, как этот лейтенант, были вынуждены скрываться. После нескольких попыток перегруппировки, которые оказались ловушками, у них не осталось другого выхода, кроме как направиться в Форт Баннистер. Капитана охватила тревожная мысль: если Эдем так расправляется с командованием — и если его план касается всех пустошников — то вскоре прицел может быть наведён и на него. Если эти солдаты, капитан и Компания Коготь хотят выжить — им нужно готовиться к бою."
    TAL_nf_events.16.a:0 "Но сначала, нам нужно спрятать эти винтокрылы!"
    TAL_nf_events.17.title:0 "Спрятаться на виду"
    TAL_nf_events.17.desc:0 "В течение нескольких недель после прибытия первых выживших из Анклава начали появляться новые. Найти для них место было несложно, но было лишь вопросом времени, когда кто-то из снабженцев заметит очередного солдата, расхаживающего в продвинутой силовой броне. Если эти бойцы хотели избежать обнаружения, им нужно было спрятать свои доспехи и надеть что-то менее заметное."
    TAL_nf_events.17.a:0 "Слава богу, что мы захватили технику Братства"
    TAL_nf_events.18.title:0 "Рискованное рандеву"
    TAL_nf_events.18.desc:0 "После первой встречи с выжившими из провалившегося переворота Отэма, капитан Харрисон приказал отозвать часть разведчиков с передовой, чтобы те занялись слухами о бойцах Анклава, замеченных далеко от линии фронта. Результаты были разными: иногда находили голодный отряд, копающийся в развалинах старого магазина, иногда — лишь тела вокруг разбившегося винтокрыла. Но этот след оказался самым многообещающим. Разведчики проверили несколько сообщений о винтокрылах, замеченных в холмах к западу от Баннистера. В отличие от других мест крушения, эти машины, судя по всему, приземлились благополучно и были уничтожены намеренно. По количеству машин и их расположению можно было предположить, что в холмах скрывается крупная группа выживших. Капитан понимал: кто бы ни засел там, они наверняка ждут боя. Вводить туда войска — значит пролить кровь впустую. Вместо этого он взял с собой двух выживших в потрёпанных костюмах продвинутой силовой брони и отправился в холмы сам. Почти сразу их захватили бойцы Анклава и взяли в плен. После короткого допроса троицу привели к лидеру выживших — майору Шарпу из корпуса винто-штурма. Майор знал, кто такой капитан Харрисон, и понимал, что тот явно не пришёл с отрядом, чтобы уничтожить их. Оставался один вопрос: что делает этот изгнанный капитан, бродя по холмам в поисках них?"
    TAL_nf_events.18.a:0 "Майор, мы сможем остановит Эдема, если будем вместе."
    TAL_nf_events.19.title:0 "Избитый и окровавленный"
    TAL_nf_events.19.desc:0 "Даже с майором Шарпом и остальными выжившими сторонниками Отэма, у Компании Коготь было мало шансов победить силы президента Эдема. Чтобы выиграть грядущую битву, им нужна была любая возможная помощь. Это означало — сотрудничать с пустошниками, с которыми они ещё недавно сражались. Глубоко в заброшенной станции метро к югу от Тенпенни-Тауэр состоялась встреча. Представители обеих сторон были охвачены недоверием и готовы открыть огонь при малейшем поводе. Почти чудом, здравый смысл взял верх, и был заключен хрупкий альянс."
    TAL_nf_events.19.a:0 "Достаточно ли будет нескольких вооруженных фермеров?"
    TAL_nf_events.20.title:0 "Снабжение горных бойцов"
    TAL_nf_events.20.desc.1:0 "Объявления о розыске Лукаса Симмса с обещанием щедрой награды от Анклава появились почти в каждом поселении. Несмотря на это, мало кто решался последовать за шерифом Пустоши в холмы Столичной Пустоши. Многие игнорировали погоню, тайно сочувствуя его делу, но не меньше тех, кто понимал — это самоубийство. Если даже Анклав не может справиться с лидером пустошников, ставшим партизаном, неся потери, то какие шансы у обычного охотника за головами? Это не значит, что дела у Симмса и его бойцов шли хорошо. За каждой удачной засадой следовал смертельный откат. Когда от другой группы сопротивления пришла весть, что офицер Анклава хочет выступить против президента Эдема, Симмс решил хотя бы выслушать. \nВстреча Харрисона и Симмса продолжалась до самого утра, но в итоге соглашение было достигнуто: Компания Коготь снабдит бойцов сопротивления оружием. А когда придёт время, они спустятся с холмов и нанесут удар по Анклаву. Оставался один вопрос: насколько серьёзную помощь могла предоставить Компания Коготь?"
    TAL_nf_events.20.desc.2:0 "Лукас Симмс вёл партизанскую войну ещё до того, как Анклав вообще показал себя. После успешного восстания, поднятого Дэйвом, Симмс и его ближайшие сторонники стали людьми вне закона. Они ушли в холмы, сражаясь за выживание, и вскоре стали свидетелями того, как Анклав захлестнул Столичную Пустошь. Теперь Симмс командовал многими из тех, кто когда-то охотился за ним, продолжая борьбу с Анклавом задолго после капитуляции Дэйва. Все в лагере Симмса понимали: в одиночку у них нет шансов. И если бы не члены другой ячейки, поручившиеся за капитана Харрисона, они бы скорее пристрелили офицера Анклава, чем стали его слушать. \nВстреча Харрисона и Симмса продолжалась до самого утра, но в итоге было достигнуто соглашение: Компания Коготь снабдит бойцов сопротивления оружием. А когда придёт время — они спустятся с холмов и нанесут удар по Анклаву. Оставался один вопрос: насколько серьёзную помощь могла предоставить Компания Коготь?"
    TAL_nf_events.20.a:0 "Мы даем то, что можем, а это не так уж много"
    TAL_nf_events.20.b:0 "Мы можем выделить довольно много"
    TAL_nf_events.20.c:0 "Ваши люди будут хорошо вооружены, мистер Симмс"
    TAL_nf_events.21.title:0 "Больше, чем наёмники"
    TAL_nf_events.21.desc:0 "После поражения Анклава от рук Компании Коготь, эта группа наёмников давно перестала быть просто наёмниками. Солдаты Джабско способны проецировать силу по всей Столичной Пустоши и за её пределами. Мало кто, кроме Братства, может надеяться противостоять им, а территории, которые они занимают, находятся под их жёстким контролем. К лучшему это или к худшему, но Компания Коготь превратилась из банды наёмников в нечто большее: армию с государственным устройством."
    TAL_nf_events.21.a:0 "Звучит неплохо"
    TAL_nf_events.22.title:0 "Вымогательство Когтей"
    TAL_nf_events.22.desc:0 "Наёмники Компании Коготь недавно прибыли к Тенпенни-Тауэр, предлагая свои услуги по защите. Они упомянули, что башня находится слишком близко к территории рейдеров и практически дали понять: если мы не заплатим — нас ждёт нападение. Наёмники разбили лагерь неподалёку и ждут ответа. Следует отметить, что Компания Коготь недавно получила в своё распоряжение значительное количество продвинутого снаряжения после разгрома Анклава."
    TAL_nf_events.22.a:0 "Мы не будем платить"
    TAL_nf_events.22.b:0 "Дайте им то, что они хотят"
    TAL_nf_events.23.title:0 "Предложение «Когтя»"
    TAL_nf_events.23.desc:0 "По округу поползли слухи, что Компания Коготь недавно устроила крупную заварушку с какими-то обитателями бункеров в силовой броне — прямо через реку от их базы в Вашингтоне Говорят, это были те самые ребята из Анклава, о которых вещали старые радиопередачи. Теперь в Питт прибыли бойцы Когтя в броне, которую раньше никто не видел. Они предлагают сотрудничество Ашуру — разумеется, за определённую цену."
    TAL_nf_events.23.a:0 "Они хотят, чтобы мы заплатили? Выгоните их!"
    TAL_nf_events.23.b:0 "Кинь им несколько крышек"
    TAL_nf_events.24.title:0 "Предложение «Когтя»"
    TAL_nf_events.24.desc:0 "По округу поползли слухи, что Компания Коготь недавно устроила крупную заварушку с какими-то обитателями бункеров в силовой броне — прямо через реку от их базы в Вашингтоне Говорят, это были те самые ребята из Анклава, о которых вещали старые радиопередачи. Теперь в Питт прибыли бойцы Когтя в броне, которую раньше никто не видел. Они предлагают сотрудничество Ашуру — разумеется, за определённую цену. Похоже, они не слышали о недавней смене руководства."
    TAL_nf_events.24.a:0 "Пошлите этих придурков куда подальше"
    TAL_nf_events.25.title:0 "Будь сам себе боссом!"
    TAL_nf_events.25.desc:0 "После изучения разведывательных отчётов по районам, окружающим Столичную Пустошь, стало очевидно: ни одна из групп не заслуживает внимания. Компания «Коготь» явно на голову выше остальных, а Пустошь — готова к захвату."
    TAL_nf_events.25.a:0 "Берегись, Братство"
    TAL_nf_events.26.title:0 "Сколько стоит чашка?"
    TAL_nf_events.26.desc:0 "Что бы этот Джо ни творил в Юге Столичной Пустоши, делает он это чертовски хорошо. Такой парень точно заслуживает место в штате. Отправьте туда людей на винтокрыле — пусть это будет настоящее шоу силы: силовая броня, плазменное оружие, всё по полной. Пусть он трясётся от страха, прежде чем мы вручим ему мешок крышек."
    TAL_nf_events.26.a:0 "Если он скажет нет, уничтожить его"
    TAL_nf_events.27.title:0 "Перспективный новый сотрудник"
    TAL_nf_events.27.desc:0 "Джабско, может, и не признает этого, но он ни черта не смыслит в управлении поселением — не говоря уже о целой нации. Он хорош в том, чтобы указывать солдатам, куда идти, но вот чтобы караваны приходили вовремя, это уже не его стихия. К счастью, человек, способный справиться с этой задачей, как раз оказался выброшен из своей территории Братством... или их Изгоями? Неважно. Слокам Джо выгнали из Южного округа, и теперь он ищет работу."
    TAL_nf_events.27.a:0 "Добро пожаловать на борт"
    TAL_nf_events.28.title:0 "Блуждающие чудаки"
    TAL_nf_events.28.desc:0 "Эти психи с запада, у которых были чертовски крутые пушки, похоже, влипли в неприятности. Всё больше их двигается на восток, и недавно у самого Баннистера появилась приличная группа, просящая помощи. Обычно мы бы послали их куда подальше, но один из них заявил, что он — один из тех, кто эти пушки и делал. У него может не быть всех чертежей, чтобы начать с нуля, но он точно может запустить процесс. В обмен мы должны принять его и его друзей."
    TAL_nf_events.28.a:0 "Оружие, превосходящие мусорное"
    TAL_nf_events.29.title:0 "Заноза в нашей заднице"
    TAL_nf_events.29.desc:0 "Супермутанты всегда были занозой в заднице. Обычно мы можем их переиграть, но иногда приходится лезть в самую гущу. С каждым днём ситуация только ухудшается, и рано или поздно они будут маршировать прямо к Баннистеру. Некоторые из наших предлагают просто найти ту дыру, откуда они лезут, и прикрыть её. Чем больше людей мы задействуем — тем быстрее всё закончится. Но вопрос остаётся: сколько бойцов мы можем выделить на такую операцию?"
    TAL_nf_events.29.a:0 "Соберите небольшую команду"
    TAL_nf_events.29.b:0 "Соберите для этого несколько отрядов"
    TAL_nf_events.29.c:0 "Всех, кого мы сможем выделить на это"
    TAL_nf_events.30.title:0 "Чёртовое старое убежище"
    TAL_nf_events.30.desc:0 "Логово супермутантов оказалось внутри какого-то убогого старого убежища, где они, похоже, сбрасывали людей в зелёную жижу или что-то в этом роде. Наши ребята перебили кучу мутантов и запечатали двери этих «жижевых комнат» тяжёлыми взрывчатками. Так что, похоже, с супермутантами можно будет особо не париться. Некоторые уже начали шутить, мол, сделали за пару месяцев то, с чем Братство не справлялось годами."
    TAL_nf_events.30.a:0 "Потому что мы лучшие!"
    TAL_nf_events.31.title:0 "Большие перемены"
    TAL_nf_events.31.desc:0 "В течение нескольких недель после заключения нового контракта ресурсы хлынули в Форт Баннистер. Заборы были восстановлены, здания — возведены, а автоматические системы обороны — установлены. Но даже важнее новых поставок оказался доступ к базам данных и чертежам, позволяющим строить более совершенные сооружения."
    TAL_nf_events.31.a:0 "Отстроим Баннистер ещё лучше"
    TAL_nf_events.32.title:0 "Любители мутантов убивают Эдема!"
    TAL_nf_events.32.desc:0 "Президент Эдем, возможно, и был президентом лишь по титулу, но его цели во многом совпадали с целями Министра. До нас дошли тревожные новости: солдаты Анклава под его командованием объединились с мутантами Пустоши, чтобы убить президента и положить конец его планам по ВРЭ. Это крайне тревожное развитие событий. Если мы не подавим этих выскочек, вскоре нам придётся иметь дело с угрозой, куда более серьёзной, чем Братство."
    TAL_nf_events.32.a:0 "Мы сокрушим их"
    TAL_nf_events.33.title:0 "Как новенький"
    TAL_nf_events.33.desc:0 "Когда Майор прибыл в Форт Баннистер, тот больше напоминал лагерь бродяг, чем военную базу. Майор сделал всё, что мог, используя скудные поставки, чтобы привести место в порядок, но один вертиберд с припасами раз в две недели из Рейвен-Рока — это капля в море. Всё изменилось после начала новых поставок. Спустя месяцы строительства, ремонта и прибытия новых специалистов, Форт Баннистер обзавёлся инфраструктурой, превосходящей даже довоенный уровень. Возможно, пришло время дать ему новое имя."
    TAL_nf_events.33.a:0 "Оставим Форт Баннистер"
    TAL_nf_events.33.b:0 "Ему подойдет имя Форт Харрисон?"
    TAL_nf_events.33.c:0 "Форт Джабско?"
    TAL_nf_events.34.title:0 "Полиция Когтя?"
    TAL_nf_events.34.desc:0 "На территории, считающейся подконтрольной Компании Коготь, расположено немало поселений. Технически, эти пустошники — как и все жители Пустоши — подчиняются американскому закону. Однако, поскольку территория находится под оккупацией Компании Коготь, в поселениях не были назначены администраторы Анклава. Это уже привело к ряду проблем, и теперь представители Гражданской Администрации Анклава требуют найти решение. Как старший офицер в регионе, решение остаётся за Майором."
    TAL_nf_events.34.a:0 "Анклав будет управлять поселениями"
    TAL_nf_events.34.b:0 "Компания Коготь будет управлять поселениями"
    TAL_nf_events.35.title:0 "Будущие воины"
    TAL_nf_events.35.desc:0 "У Компании Коготь всегда были проблемы с репутацией. Как и у Анклава, решения прежнего руководства оставили пятно, которое не так просто стереть. Майор едва ли знал о какой-то резне в поселении, которая якобы произошла за несколько месяцев до его назначения, но именно это большинство пустынников и вспоминает, когда слышит о Когте. Если организация хочет интегрироваться в американское общество и добиться успеха после Рекультивации, ей нужен новый образ. Майор не принял это решение сгоряча. Подобное изменение затрагивает не только эмблему на броне — оно способно изменить саму суть организации. Встал вопрос: чем Компания Коготь будет заниматься в будущем?"
    TAL_nf_events.35.a:0 "Коготь будет стремиться стать лучшими наёмниками в Америке"
    TAL_nf_events.35.b:0 "Коготь будет крупнейшей наёмнической группой в Америке"
    TAL_nf_events.35.c:0 "Коготь ударит быстро, ударит сильно, где угодно в Америке"
    TAL_nf_events.35.d:0 "Коготь выполнит задание, независимо от того, сколько мирных жителей при этом погибнет"
    TAL_nf_events.36.title:0 "Чёрные тучи с запада"
    TAL_nf_events.36.desc:0 "Майор сидел с явным напряжением за столом в брифинг-зале Рэйвен-Рока. Вокруг были генералы, ведущие учёные и даже несколько гражданских чиновников, которые, как и он, не знали, зачем их собрали. Скудные разговоры в комнате стихли, когда автоматическая дверь с шипением открылась. Главнокомандующий Отэм неспешно вошёл и занял место во главе стола.\n \n§Дамы и господа, благодарю за прибытие. С тех пор как я отключил безумную машину, называвшую себя президентом Эдемом, мы сделали серьёзные шаги к восстановлению нашей великой нации. Но мы всё ещё не вышли из леса. Есть и другие, как Эдем, кто хочет развязать неосуществимую войну против американского народа. Один из худших — некто, называющий себя Министром. Вот сообщение, которое мы только что получили от него и его людей в Чикаго.§! \n \nПосле короткой паузы в комнате заговорили динамики, голос был громким и гневным: \n \n§R Отэм. Ты и твои изменники узурпировали власть и убили настоящих американцев, чтобы защитить мутантскую заразу, пожирающую нашу страну. За это преступление не существует наказания, достаточного по масштабу. Вы увидите наше справедливое возмездие.§!"
    TAL_nf_events.36.a:0 "Можем ли мы действительно быть готовы?"
    TAL_nf_events.37.title:0 "Холодное приветствие"
    TAL_nf_events.37.desc:0 "Когда Капитан вошёл в Рэйвен-Рок, он вспомнил, как мечтал о возвращении сюда в свои первые дни на Форте Баннистер. Долгое время он хотел только одного — вернуться в Рэйвен-Рок. Его сияющие стены, чистый воздух и рабочее освещение были тем, чего так не хватало Баннистеру. Но тот Рэйвен-Рок, который он знал, исчез. Стены были покрыты кровью и следами ожогов. Воздух пропах гарью и раскалённым металлом. Даже свет мигал, а инженеры пытались восстановить повреждённый в боях реактор. В командном центре Капитан встретился с теми, кто, вероятно, остался самыми высокопоставленными членами Анклава. Пара майоров, горстка капитанов — все смотрели друг на друга, не зная, что делать дальше. Один из младших офицеров наконец озвучил то, о чём думали все: \n \n§GЧто нам теперь делать, сэр?§! \n \nНе задумываясь, Капитан ответил: \n \n§BТо, что всегда собирались. Восстановить Америку.§! \n \nПара кивков, одобрительные взгляды — и этого оказалось достаточно. Хотя некоторые в комнате формально были выше по званию, именно Капитан привёл их сюда. И для всех остальных — у него был план. Все согласились: он будет тем, кто поведёт их дальше. Но уже не как Капитан."
    TAL_nf_events.37.a:0 "Это повышение, полковник Харрисон"
    TAL_nf_events.38.title:0 "Грязная вода"
    TAL_nf_events.38.desc:0 "Когда Полковник проходил по коридорам Проекта «Чистота», научный жаргон и цифры, которыми его забрасывали, пролетали мимо него. За всей этой болтовнёй скрывалась простая и страшная правда: если вода продолжит поступать жителям Столичной Пустоши, к концу года она превратится в кладбище. Модифицированный ВРЭ уже проник в водный бассейн, и без разработки антигена его невозможно будет удалить. Чтобы создать антиген, потребуется несколько команд учёных, работающих круглосуточно. Полковник сказал учёным, показывавшим ему объект, всего три слова: «Разработайте его. Немедленно»."
    TAL_nf_events.38.a:0 "§BСделаем это§!"
    TAL_nf_events.39.title:0 "Рисуя будущее"
    TAL_nf_events.39.desc:0 "Даже после того как выступление перенесли из столовой в ангар, помещение было забито под завязку. Солдаты Анклава, гражданские и наёмники Компании Коготь теснились в винтокрыльном отсеке, ожидая услышать план на будущее. Полковник стоял на импровизированной сцене и с заметным волнением озвучил цель: \n§BДобрый вечер всем. Последние месяцы были непростыми, мы все адаптируемся к большим переменам в Анклаве. Я знаю, многие из вас переживают за будущее. Сейчас время неопределённости, но есть одна вещь, которая должна нас вести — наша цель. Вместе мы восстановим Америку. Не ту Америку Эдема, полную смерти и ужаса, а ту, о которой мечтал Отэм. Америку мира, порядка и процветания. Путь будет долгим, но вместе мы сможем достичь этой цели!§! \n Пока Полковник продолжал речь, в его голове закралась одна мысль: несмотря на все красивые слова, Отэм был далеко не тем идеалистом, каким он сейчас его выставлял."
    TAL_nf_events.39.a:0 "Людям нужен символ, пусть даже ложный"
    TAL_nf_events.40.title:0 "Раскол в рядах"
    TAL_nf_events.40.desc:0 "Многие бойцы Компании Коготь всё сильнее недовольны текущим курсом. Сражаться с Анклавом — это было вопросом выживания, с этим они были согласны. Но восстанавливать страну? Это уже куда больше, чем на что они подписывались. Почти все, кто оказался в Форт Баннистер, пришли туда ради крышек. Какая им разница до борьбы за старую нацию, которая умерла за сотню лет до их рождения? По мере того как истекают контракты, их можно просто отпустить. Или... возможно, стоит добавить стимул, чтобы сохранить численность."
    TAL_nf_events.40.a:0 "Они нам не нужны"
    TAL_nf_events.40.b:0 "Предложить лучшую оплату"
    TAL_nf_events.41.title:0 "Плохая репутация"
    TAL_nf_events.41.desc.1:0 "Несмотря на помощь Полковника в устранении Эдема, Лукас Симмс всё ещё с осторожностью относился к идее просто так передать контроль над поселениями солдату Анклава и его армии буйных наёмников. После часов обсуждений и обещаний Симмс был успокоен. Однако оставалось неизвестным, сдержит ли Полковник свои слова — о сохранении автономии поселений и поддержке местных ополчений."
    TAL_nf_events.41.desc.2:0 "Война с Анклавом и месяцы последующих конфликтов прошли почти незамеченными для Алистера Тенпенни. За исключением редких инцидентов на нижних этажах, его распорядок — выпивка и шлюхи — практически не изменился. Увидев, в каком состоянии живёт этот человек, Полковник испытал отвращение. Но ещё больше его оттолкнули слухи о причастности Тенпенни к заговору по уничтожению Мегатонны. После встречи с Тенпенни его внимание переключилось на помощника пьяницы — мистера Бёрка."  
    TAL_nf_events.41.desc.3:0 "После падения поселений Столичной Пустоши Дядя Роу сделал всё возможное, чтобы торговые маршруты оставались открытыми, а жизненно важные припасы продолжали поступать жителям Столичной Пустоши. Для многих он стал символом надежды, и после краха Анклава Полковник счёл его одним из ключевых людей, с кем необходимо встретиться. Встреча была сосредоточена в основном на экономических вопросах, и репутация Дяди Роу как умелого переговорщика подтвердилась. Среди его предложений было одно особенно важное — чтобы новая власть придерживалась политики невмешательства в экономику."  
    TAL_nf_events.41.desc.4:0 "Дэйв быстро сдался при приближении Анклава и укрылся в своём укреплённом комплексе. Пока жители Столичной Пустоши гибли, он просто сидел и наблюдал. Как только Анклав был остановлен, он вышел из своего убежища. Не теряя времени, он начал кампанию, продвигая ложь о том, что именно он возглавлял борьбу со своего угла Пустоши. Полковник и его советники обсуждали, стоит ли разоблачать этого идиота — или, возможно, выгоднее было бы подыграть его лжи."  
    TAL_nf_events.41.a:0 "Полковник сдержал свои обещания"
    TAL_nf_events.41.b:0 "Полковник медленно отказывался от своего слова…"
    TAL_nf_events.41.c:0 "Бёрк предстанет перед судом"
    TAL_nf_events.41.d:0 "Бёрк оказался бы полезен"
    TAL_nf_events.41.e:0 "Торговцы будут предоставлены сами себе"
    TAL_nf_events.41.f:0 "Торговцы увидят регулирование и налогообложение"
    TAL_nf_events.41.g:0 "Дэйв станет символом храбрости обитателя пустоши!"
    TAL_nf_events.41.h:0 "Дэйв будет разоблачен как клоун"
    TAL_nf_events.42.title:0 "Убежище ужасов"
    TAL_nf_events.42.desc:0 "Совместные силы Компании Коготь и Анклава быстро расправились с супермутантами, засевшими в Убежище 87. Как только путь был очищен, внутрь вошли научные группы. После ряда работ удалось нейтрализовать ВРЭ, хранившийся в комплексе. Наконец, угроза супермутантов подошла к концу. Мутанты всё ещё могут бродить по Пустоши, но их способность к размножению была остановлена."
    TAL_nf_events.42.a:0 "Видишь? Мы — хорошие ребята!"
    TAL_nf_events.43.title:0 "Ржавый потенциал"
    TAL_nf_events.43.desc:0 "Несмотря на герметичный научный костюм, Полковник чувствовал себя неуютно, осматривая литейные цеха Питтсбурга. Последствия Чумы Трогов были заметны на лицах почти всех рабочих. Болезненные язвы и хриплый кашель — лишь начало для многих заражённых. Истинные ужасы Дегенеративного Синдрома Трогов скрывались за ограждениями, в руинах. Безумцы и чудовищные создания бродили среди развалин. Несмотря на всё это, Полковник видел потенциал. Эти литейные — возможно, последние действующие довоенные производственные мощности на этой стороне страны."
    TAL_nf_events.43.a:0 "Составьте план, как сделать это место пригодным для жизни"
    TAL_nf_events.44.title:0 "Чистое и незапятнанное"
    TAL_nf_events.44.desc:0 "После месяцев работы над созданием антигена к модифицированному ВРЭ, который Эдем сбросил в воду, Проект Чистота наконец стал безопасным и стабильно поставляет чистую воду для жителей Пустоши. Уже разработаны несколько планов по распределению воды в близлежащие поселения — как по гуманитарным причинам, так и для того, чтобы обеспечить их интеграцию в состав Америки. В данный момент строятся центры распределения воды рядом с несколькими поселениями Пустоши. Эти центры будут служить как узлами для эффективной логистики, так и основными точками для местного управления."  
    TAL_nf_events.44.a:0 "Но как это работает?"
    TAL_nf_events.44.b:0 "Пусть вода течет"    
    TAL_nf_events.45.title:0 "Стены приближаются"
    TAL_nf_events.45.desc:0 "Форт Баннистер хорошо справлялся с ролью военной базы. Улучшения последних лет позволили ему даже принять часть новых обитателей после падения Анклава. Однако довольно быстро стало ясно — форт не сможет навсегда оставаться сердцем возрождающейся Америки. Были рассмотрены два кандидата на роль новой штаб-квартиры. Первый — Пентагон, довоенное сердце военного командования и нынешний дом Братства Лайонса. Второй — авиабаза Адамс, более крупный аэродром и военный комплекс. Также прозвучало предложение просто расширить Баннистер. В конце концов, ресурсы для этого есть."
    TAL_nf_events.45.a:0 "Переедем в Пентагон"
    TAL_nf_events.45.b:0 "Остаться в Баннистере"
    TAL_nf_events.45.c:0 "Переедем в Адамс"
    TAL_nf_events.46.title:0 "Наследние Лайонса"
    TAL_nf_events.46.desc:0 "Сидя в бывшем зале совещаний Братства Лайонса, Полковник просматривал финальные планы по восстановлению Пентагона. Работы шли хорошо, и оставшиеся задачи были в основном косметическими. Глядя на планы по замене символики Братства, Полковник невольно задумался о влиянии, которое они оказали на Столичную Пустошь. Да, они были врагами Анклава — но по той же логике, когда-то врагом был и сам Полковник со своими людьми. Почти невозможно отрицать, что, несмотря на изоляционизм, Братство принесло Пустоши немало пользы. Если бы не Крестовый поход Лайонса, проблема супермутантов была бы куда серьёзнее. Возможно, что-то от Братства всё же стоило сохранить."
    TAL_nf_events.46.a:0 "Помните их преданность технологиям!"
    TAL_nf_events.46.b:0 "Помните их борьбу за народ!"
    TAL_nf_events.46.c:0 "Помните, как мы надрали им задницы!"
    TAL_nf_events.47.title:0 "Основополагающий принцип"
    TAL_nf_events.47.desc:0 "Расширение Форт Баннистера шло по плану. Новые здания окружили старые постройки, а подземные бункеры наконец были приведены в полную рабочую готовность. Однако одна зона на окраине форта была помечена как непригодная для строительства. Официальная причина — сохранение аварийной площадки для посадки. Но Полковник знал настоящую причину. Это было место последнего упокоения Командора Джабско, и обнаружение его тела могло вызвать проблемы среди бойцов Компании Коготь. Казнь Джабско была необходима. Несмотря на то, что он был трусливым и жадным человеком, он решительно выступал против передачи полного контроля над Компанией Коготь, даже за сундук крышек. Его смерть, возможно, была неизбежна. Но если бы не он, основавший Компанию Коготь, кто знает, что бы произошло с Эдемом? Возможно, стоило сохранить его — как символ."
    TAL_nf_events.47.a:0 "Помните навыки ведения бизнеса Джабско"
    TAL_nf_events.47.b:0 "Помните об организационных навыках Джабско"
    TAL_nf_events.47.c:0 "Помните, к чему привела его гордость?"
    TAL_nf_events.48.title:0 "Человек или миф?"
    TAL_nf_events.48.desc:0 "Полковник смотрел на сияющую статую у входа на недавно переименованную авиабазу Отэм. Он не мог не задуматься — что бы сделали пустошники, если бы знали правду о полковнике Отэме? Если бы знали, что он был таким же противником пустошников, как и любой другой член Анклава. Что если бы он счёл план Эдема осуществимым — он, скорее всего, пошёл бы за ним. Полковник размышлял: может, лучше было бы принять образ Отэма, чем помнить самого человека? Он прочитал отполированную табличку под статуей: \n \n§BВ память о полковнике Августе Отэме, отдавшем жизнь ради спасения души Америки.§!"
    TAL_nf_events.48.a:0 "Помните человека"
    TAL_nf_events.48.b:0 "Помните миф"
    TAL_nf_events.49.title:0 "Угроза"
    TAL_nf_events.49.desc:0 "У Когтя Анклава дела шли хорошо. В Столичной Пустоши рос набор, снижалось недовольство, а люди постепенно возвращались к привычной жизни — как до Проекта Чистота. Казалось, Пустошь наконец начала привыкать к власти Когтя Анклава. Позитивная атмосфера в штабе лишь усилила тревогу, когда Полковник получил новое сообщение. Передача пришла напрямую с анклавского аванпоста в Чикаго. Мало кто за пределами ближайшего круга Отэма знал хоть что-то о Чикаго — кроме самого факта их существования. Почти все записи об их силах и целях были утрачены в боях с Эдемом. Выслушав сообщение, Полковник собрал срочное совещание с советниками. С тяжёлым вздохом он включил запись: \n \n§R Капитан Харрисон. Ты и твои изменники узурпировали власть и убили настоящих американцев, чтобы защитить мутантскую заразу, разъедающую нашу нацию. За это преступление не существует наказания, достаточного масштаба. Твоя жалкая сборная солянка предателей и отвратительных мутантов не устоит перед всей мощью Вооружённых сил Соединённых Штатов. Вы увидите наше справедливое возмездие.§!"  
    TAL_nf_events.49.a:0 "Война приближается"
    TAL_nf_events.50.title:0 "Лучший бизнес-план"
    TAL_nf_events.50.desc:0 "Стало очевидно: почти никто не может противостоять Компании Коготь. С Анклавом и Братством Лайонса вне игры, Коготь занял вершину пищевой цепи Пустоши. И вполне логично, что им пора увеличить свою долю богатства, текущего по Пустоши. Простые наёмные контракты больше не подходят — не для такой силы, как Компания Коготь. Нет, нужно нечто большее. Коготь стал настолько влиятельным, что другим стоит платить просто за право прохода по их территории. Что-то вроде пошлины. Или дани."
    TAL_nf_events.50.a:0 "Звучит прибыльно"
    TAL_nf_events.51.title:0 "Поставки рабов прекращены!"
    TAL_nf_events.51.desc:0 "Поставки рабов из Столичной Пустоши были остановлены тем командиром наёмников Джабско. Наши люди сообщают, что обычные караваны, доставлявшие «свежее мясо» для фабрик, внезапно прекратились. Когда они отправились в Парадайз-Фоллс, чтобы выяснить, в чём дело, их схватила Компания Коготь и избила. Не знаю, что взбрело Джабско в голову, но это нам явно не на руку."
    TAL_nf_events.51.a:0 "У нас еще есть другие источники"
    TAL_nf_events.52.title:0 "Предложение Джабско"
    TAL_nf_events.52.desc:0 "Сегодня поступило предложение от Компании Коготь. Многие из наших парней рвутся в бой — возможность работать на тех, кто расправился с Братством, звучит заманчиво. Но есть один нюанс. Все мы будем работать на них, следовать их правилам и, по сути, отдадим им полную власть над нашей землёй. Конечно, это не то предложение, которое можно просто отклонить. Ясно одно: если мы скажем нет, они вернутся — и уже не с бумагами, а с оружием."
    TAL_nf_events.52.a:0 "Подпишитесь на пунктирной линии"
    TAL_nf_events.52.b:0 "Отказаться от их предложения"
    TAL_nf_events.53.title:0 "Новый начальник, та же работа"
    TAL_nf_events.53.desc.1:0 "При Ашуре Питт работал как отлаженный механизм. Литейные цеха производили оружие и боеприпасы в масштабах, невиданных ранее в Пустоши. Заболел рабочий — его заменяли так же просто, как неисправную деталь. Война Компании Коготь с Питтом нарушила производственный ритм, но те, кто выжил из окружения Ашура, готовы служить новому лидеру — при условии, что платят столько же. По их оценке, всё можно быстро вернуть на прежний уровень, если наладить поставки рабов. Хотя, если поднажать, можно добиться и большего."
    TAL_nf_events.53.desc.2:0 "При Вернере Питт уже не был тем, чем он был при Ашуре. Рабочие, возможно, стали немного счастливее, но производительность ощутимо упала. Заболевших начали лечить, что означало потерю сразу двух рабочих, которых раньше просто заменяли. Вернуться к старым порядкам Питта — возможно, но это потребует серьёзных усилий. Эти люди уже однажды свергли Ашура. Кто сказал, что они не попробуют снова?"
    TAL_nf_events.53.a:0 "Поддерживайте производства"
    TAL_nf_events.53.b:0 "Ускорьте производство"
    TAL_nf_events.53.c:0 "Придерживаться пути Вернера"
    TAL_nf_events.53.d:0 "Вернуться к пути Ашура"
    TAL_nf_events.54.title:0 "Думайте быстро!"
    TAL_nf_events.54.desc:0 "Наш хакер наконец-то прорвался в архивы Цитадели Братства, но сразу же заметил серьёзную проблему. Что-то в процессе входа активировало вирус, который начал стремительно очищать весь архив. Времени хватит лишь на то, чтобы безопасно скачать часть данных. Но что выбрать?"
    TAL_nf_events.54.a:0 "Загрузите схемы силовой брони!"
    TAL_nf_events.54.b:0 "Загрузите расширенные планы оружия!"
    TAL_nf_events.54.c:0 "Загрузите, что бы там ни был этот проект Metal Gear!"
    TAL_nf_events.54.d:0 "Загрузите всего понемногу!"
    TAL_nf_events.55.title:0 "Экспедиция в Данвич"
    TAL_nf_events.55.desc:0 "Руководство Андейла наняло отряд наёмников из Компании Коготь, чтобы отправиться с ними к тому странному старому зданию возле Тенпенни-Тауэр. С тех пор их никто не видел. Возможно, с ними всё в порядке. Но учитывая репутацию этого места и склонность Когтя к жестоким методам, нельзя исключать худшее. С ними все в порядке?"
    TAL_nf_events.55.a:0 "§0НЕ В ПОРЯДКЕ§"
    TAL_nf_events.56.title:0 "Большие планы"
    TAL_nf_events.56.desc:0 "С вершины Тенпенни-Тауэр, всё, что видно глазом — и даже больше — принадлежит командору Джабско и его Компании Коготь. Бесчисленные жители Пустоши платят дань своим хозяевам, а взамен Коготь гарантирует, что никто не посмеет их тронуть. С каждым завоеванием богатство Компании Коготь растёт — и это лишь начало. У Джабско есть мечта: распространить сборы Когтя по всей Пустоши. Скоро каждый, кто живёт на территории бывших Соединённых Штатов, будет платить крышки за защиту. План — гениален. Почему никто не додумался до этого раньше?"
    TAL_nf_events.56.a:0 "Никто раньше об этом не думал?"
    TAL_nf_events.57.title:0 "Стал местным?"
    TAL_nf_events.57.desc:0 "Главнокомандующего Отэма было трудно впечатлить, но даже он удивился при встрече в Форт Баннистер. Вместо неопрятной толпы пустошников, о которой он читал в первых докладах капитана Харрисона, его встретили выстроенные в строй солдаты в относительно чистой броне. Капитан встретил его с гордостью, явно читающейся на лице. Он провёл Отэма и его любопытных офицеров по территории, рассказывая, как превратил Форт Баннистер из развалин в полноценный тренировочный и оперативный центр. После экскурсии Отэм встретился с Харрисоном наедине в его кабинете. Там они обсудили успех программы, перемены в Анклаве и будущее самого Харрисона. Ему предстояло получить звание майора и вернуться в Рэйвен-Рок. Ответ майора застал Отэма врасплох. \n \n§2Сэр, если вы не возражаете, я бы предпочёл остаться здесь.§! \n \nОтэм едва поверил услышанному. Когда первый шок прошёл, он потребовал объяснений. Майор объяснил, что привык к назначению и чувствует призвание продолжать руководство этими солдатами. Он хотел развивать их дальше — как важный актив Анклава. Прежде чем Отэм успел ответить, майор вытащил толстую пачку документов и начал подробное изложение своих планов по развитию Компании Коготь. План был предельно детализирован: от финансовых расчётов до прогнозов боевой эффективности. Отэм редко позволял себе менять мнение, но чем дольше он слушал, тем больше всё это обретало смысл. Было ясно: человек, способный превратить ту толпу в то, что он увидел сегодня, будет потрачен впустую, если просто возглавит очередной батальон."
    TAL_nf_events.57.a:0 "Запрос будет удовлетворён, Майор"
    TAL_nf_events.58.title:0 "Боевой клич свободы"
    TAL_nf_events.58.desc:0 "С каждым днём становилось всё яснее, каким видел Америку Эдем. Никто в Форте Баннистер не возражал, когда он казнил выживших из Братства — но ужасы, принесённые Проектом Чистота, стали последней каплей. Взгляд Эдема всё ближе приближался к Компании Коготь, и силы Форта были готовы — насколько это вообще возможно — противостоять этой машине геноцида. С сердцем, полным страха и решимости, капитан Харрисон активировал командное радио и произнёс речь, которую репетировал всю ночь: \n§2Жители Столичной Пустоши, говорит капитан Харрисон из Компании Коготь, бывший офицер Анклава. Не верьте лжи президента Эдема и тех, кто ему служит. Он не пришёл, чтобы помочь — он и его сторонники хотят лишь вашей смерти! Я призываю вас отказаться от воды, которой он вас травит, и взять в руки оружие! Только вместе мы сможем остановить этого ублюдка и по-настоящему восстановить Пустошь!§! \nБункер замер. Осознание ситуации накрыло всех: они только что объявили войну Анклаву — в прямом эфире, на всю Столичную Пустошь. Этот призыв мог стать началом восстания, которое спасёт Пустошь. Или последним криком обречённых."
    TAL_nf_events.58.a:0 "Будем надеяться, что пустошники прислушались"
    TAL_nf_events.59.title:0 "Взгляд наружу"
    TAL_nf_events.59.desc:0 "Столичная Пустошь — хорошее начало, но за её пределами лежит куда большее. Всё это может стать нашим. Мы уже пытались раньше, но каждый регион — Север, Юг и Запад — имеет свои проблемы. Север — холодный до чёртиков, с редкими поселениями, разбросанными на сотни километров. Его признали слишком хлопотным. Юг — это знойное, гнилое болото, где комары размером с радскорпионов. Запад — бесконечные холмы, усыпанные пещерами и культами. Для старой Компании Коготь это было слишком. Но мы — другие, мы изменились. И теперь они будут платить нам нашу справедливую дань."
    TAL_nf_events.59.a:0 "Мы будем расширяться!"
    TAL_nf_events.60.title:0 "Отказ Гаррисбурга"
    TAL_nf_events.60.desc:0 "Гаррисбург отказался присоединиться к Компании Коготь. Пришло время показать, что бывает с теми, кто отказывается играть по правилам."
    TAL_nf_events.60.a:0 "Вперед, парни!"
    TAL_nf_events.61.title:0 "Тёмная встреча"
    TAL_nf_events.61.desc:0 "Джабско провёл тайную встречу с руководством Андейла, взяв с собой лишь пару своих лучших бойцов. Все участники хранят молчание, говоря лишь, что грядут великие перемены. Вроде бы не связано, но некоторые в Форт Джабско утверждают, что слышат, как он кричит по ночам. Наверное, ничего страшного... правда?"
    TAL_nf_events.61.a:0 "Вероятно, ничего"
    TAL_nf_events.62.title:0 "Вымогательство Когтей"
    TAL_nf_events.62.desc:0 "На днях наёмники Компании Коготь прибыли к Тенпенни-Тауэр, предлагая свои услуги по защите. Они упомянули, что башня расположена слишком близко к территории рейдеров, и почти прямо заявили: если мы не заплатим, нас ждёт нападение. Наёмники разбили лагерь неподалёку и ждут ответа. Следует отметить, что недавно Компания Коготь получила в своё распоряжение значительное количество передового снаряжения — после уничтожения Анклава."
    TAL_nf_events.62.a:0 "Мы не будем платить"
    TAL_nf_events.62.b:0 "Мы заплатим"
    TAL_nf_events.63.title:0 "Поселенцы отказываются от защиты"
    TAL_nf_events.63.desc:0 "Жители Тенпенни-Тауэр наотрез отказались платить хоть одну крышку за нашу защиту. Парни уже в броне и готовы показать им, почему стоило заплатить."
    TAL_nf_events.63.a:0 "Преподайте им урок!"
    TAL_nf_events.64.title:0 "Отказ Ашура"
    TAL_nf_events.64.desc:0 "Наших людей отправили в Питт, чтобы договориться с Ашуром, а их там просто высмеяли и едва не скормили трогам. Мы не можем позволить, чтобы с нами так обращались, верно?"
    TAL_nf_events.64.a:0 "Они заплатят, со временем"
    TAL_nf_events.65.title:0 "Принятие Ашура"
    TAL_nf_events.65.desc:0 "Наши парни вернулись из Питта с хорошими новостями и целой кучей крышек. Похоже, мы теперь в деле с Ашуром."
    TAL_nf_events.65.a:0 "Мы добились большого успеха, ребята"
    TAL_nf_events.66.title:0 "Отказ Вернера"
    TAL_nf_events.66.desc:0 "Наших людей отправили в Питт, чтобы договориться с Ашуром. Оказалось, что там недавно вспыхнул бунт рабов, и бывший заместитель Ашура — Вернер — взял власть в свои руки. Наших просто высмеяли и едва не скормил трогам. Мы не можем позволить, чтобы с нами так обращались, верно?"
    TAL_nf_events.66.a:0 "Они заплатят, со временем"
    TAL_nf_events.67.title:0 "Темпенни-Тауэр откупается"
    TAL_nf_events.67.desc:0 "Жители Тенпенни-Тауэр поняли наш намёк и согласились нанять нас для «защиты» от рейдеров. Хотя наши парни жаждали драки, они не менее довольны тем, что просто собирают халявные крышки."
    TAL_nf_events.67.a:0 "Им пришлось заплатить — из-за намёка"
    TAL_nf_events.68.title:0 "Целая башня добычи"
    TAL_nf_events.68.desc:0 "Тенпенни-Тауэр оказалась лёгкой добычей. Наши парни прорвались сквозь их жалкие укрепления в считанные минуты и начали забирать всё, что не было прибито гвоздями. На то, чтобы пересчитать все трофеи, ушло несколько дней — но это определённо победа. Поселения Вашингтона теперь должны понимать: с нами лучше не связываться."
    TAL_nf_events.68.a:0 "Да, черт возьми"
    TAL_nf_events.69.title:0 "Мы обосрались"
    TAL_nf_events.69.desc:0 "Похоже, мы недооценили, насколько хорошо был подготовлен Тенпенни-Тауэр. Нашим парням надрали задницы, и им пришлось удирать домой, пока их совсем не стерли с лица земли. Пожалуй, лучше пока не лезть к поселениям Столичной Пустоши — по крайней мере, до тех пор, пока с нами не будут играть более крупные фигуры."
    TAL_nf_events.69.a:0 "Блять..."
    TAL_nf_events.70.title:0 "Когтей отправили восвояси"
    TAL_nf_events.70.desc:0 "Как и ожидалось, предложение Компании Коготь о защите оказалось обычным вымогательством. После того как мы отказались, они прислали банду головорезов к башне — но наткнулись на подготовленную оборону. Хотя в бою погибли несколько храбрых охранников, Компании Коготь не удалось прорвать защиту башни, и они были вынуждены отступить обратно в Форт Баннистер."
    TAL_nf_events.70.a:0 "Это научит их не связываться с нами!"
    TAL_nf_events.71.title:0 "Башня Тенпенни разграблена!"
    TAL_nf_events.71.desc:0 "Как и ожидалось, предложение Компании Коготь о защите оказалось обычным вымогательством. После отказа они прислали банду головорезов к башне, которые быстро прорвали охрану. Обитателей башни ограбили под дулом оружия, а наёмники унесли всё, что сочли ценным — прежде чем успели подойти подкрепления."
    TAL_nf_events.71.a:0 "Черт их побери!"
    TAL_nf_events.72.title:0 "Деловая встреча"
    TAL_nf_events.72.desc:0 "За последние пару десятилетий Питт заработал себе внушительную репутацию в Пустоши. Дымящиеся трубы, пылающие печи и армия рейдеров. Все самые громкие истории о Питте оказались правдой. После короткой экскурсии по операциям Ашура, Джабско был проведён в Хэйвен — возвышающуюся башню, с которой Ашур взирает на своё королевство. Там они поговорили о планах Ашура на будущее, о том, как Компания Коготь может помочь, и — что важнее всего — о различных сборах, которые Коготь взимает за свои услуги."
    TAL_nf_events.72.a:0 "В будущее"
    TAL_nf_events.73.title:0 "Бесконечные проблемы"
    TAL_nf_events.73.desc:0 "Пришёл вызов из Питта — Ашуру нужно, чтобы Компания Коготь занялась кое-какими делами. Рабы расходуют лом быстрее, чем успевают его собирать, аболиционисты продолжают нападать на караваны, а один из поставщиков Ашура испытывает трудности с доставками. Ашуру и так хватает хлопот с тем, чтобы держать рабов в узде, так что он поручает всё это нам."
    TAL_nf_events.73.a:0 "Нам понадобится 25% авансом"
    TAL_nf_events.74.title:0 "В будущее"
    TAL_nf_events.74.desc:0 "Сегодняшний Питт сильно отличается от того, каким он был всего несколько лет назад. КТД излечен, побои стали редкостью, а рабочие больше не питаются исключительно супом из трогов. Некоторых всё ещё приходится уговаривать поработать в Питте — этим в основном и занимается Компания Коготь, но в остальном всё стало куда спокойнее. Джабско, как и любой, кто находится рядом с Ашуром, знает: не стоит задаваться вопросом, стал ли тот мягче. Те, кто не согласился с новым порядком, до сих пор болтаются на мосту. И какая разница, как называть рабов, если Ашур всё ещё платит за них? Будущее Питта выглядит ярким и блестящим, и, по крайней мере пока, Коготь едет в этом поезде первым классом."
    TAL_nf_events.74.a:0 "Пока есть зарплата, мы в деле"
    TAL_nf_events.75.title:0 "Загнанные в угол крысы"
    TAL_nf_events.75.desc:0 "Многие аболиционисты погибли в нашей схватке с поселениями Столичной Пустоши. Те немногие, кто выжил, отступили в своё убогое укрытие у Мемориала Линкольна. Мы окружили их и численно превосходим, но ясно, что они не сдадутся без боя. Как нам действовать дальше?"
    TAL_nf_events.75.a:0 "Лобовая атака сработает"
    TAL_nf_events.75.b:0 "Составьте хороший план битвы"
    TAL_nf_events.75.c:0 "Миниганы делают брррр"
    TAL_nf_events.75.d:0 "Отправьте внутрь силовую броню"
    TAL_nf_events.76.title:0 "Кровавая шляпа"
    TAL_nf_events.76.desc:0 "Храм Союза годами мешал работорговле в Столичной Пустоши, создавая проблемы для операций Ашура. Джабско счёл делом чести лично доставить символ их падения Ашуру. Шляпа Хэмлина — якобы принадлежавшая давно умершему президенту, которого они обожествляли — была принята Ашуром с благодарностью. В знак признания трофея он предложил Джабско выбрать награду."
    TAL_nf_events.76.a:0 "Больше оружия — это хорошо"
    TAL_nf_events.76.b:0 "Крышки рулят"
    TAL_nf_events.76.c:0 "Назови это одолжением"
    TAL_nf_events.77.title:0 "Гаррисбургская ситуация"
    TAL_nf_events.77.desc:0 "Последние двадцать лет Гаррисбург держал Джонстаун и окружающие земли под своим сапогом. В обмен на урожай, крышки и свободный проход для работорговцев, бандиты из Гаррисбурга «защищали» Джонстаун. От чего именно? В основном — от самих бандитов из Гаррисбурга. Большинство фермеров Джонстауна были не против такой сделки, за исключением Дорожных Стражей. Эти люди не терпят, когда слабаков держат в цепях, и уже давно устраивают засады на караваны работорговцев. На каждого убитого Стража, кажется, появляются двое новых. Вот почему им нужна наша помощь, чтобы разобраться с этим бардаком."
    TAL_nf_events.77.a:0 "Наша помощь не будет дешевой"
    TAL_nf_events.78.title:0 "Требуется помощь"
    TAL_nf_events.78.desc:0 "По мере того как промышленная мощь Питта растёт в геометрической прогрессии, растут и его потребности. Ашур планирует расширить производство, но для этого нужно довоенное оборудование, которое не так-то просто найти. Наши команды прочёсывают подходящие места в Столичной Пустоши, но рассчитывать, что всё найдётся в округе Вашингтона, не стоит. В других городах — Нью-Йорке, Филадельфии, а может, и где-то на юге — наверняка есть то, что нам нужно. У большинства из них есть свои боссы, с которыми можно поговорить."
    TAL_nf_events.78.a:0 "Давайте заключим сделку"
    TAL_nf_events.79.title:0 "Маленькие войны в Маленькой Италии"
    TAL_nf_events.79.desc:0 "Банды Нью-Йорка могут быть едины против тех, кто посягает на их дела, но назвать их сплочённой группой — смешно. Эта мешанина из разных банд постоянно грызётся за территорию, рынки и место во главе их комиссии. Увидев это, Джабско пришёл к мысли: если Компания Коготь поможет одной из них взять верх, у нас появится влиятельный союзник, который будет нам должен."
    TAL_nf_events.79.a:0 "Поддержать банду мутантов"
    TAL_nf_events.79.b:0 "Герцог Нью-Йоркский правит!"
    TAL_nf_evnets.79.c:0 "Помочь сильным"
    TAL_nf_events.80.title:0 "Голова в облаках"
    TAL_nf_events.80.desc:0 "С вершины башен Питта город почти не выглядит таким уж ужасным. Да, ржавчины хватает, но когда не видишь и не чувствуешь вони с улиц — почти забываешь, что она там есть. Неудивительно, что Ашур проводит время здесь, мечтая превратить эту помойку в некое подобие утопии. Джабско скептически относится к грандиозным планам Ашура, но на этом контракте он уже заработал немало крышек. Если всё, что от него требуется — изредка прокатиться на вертиберде, послушать разглагольствования о промышленности и обществе заслуг, а потом сказать парням продолжайте в том же духе — это вполне неплохая работа. \n\n Чёрт возьми, если Ашур действительно немного очистит это место, оно может оказаться неплохим вариантом для пенсии."
    TAL_nf_events.80.a:0 "Хотя ему нужна была бы чертовски хорошая швабра"
    TAL_nf_events.81.title:0 "И что теперь?"
    TAL_nf_events.81.desc:0 "С Питтом под полным контролем Компании Коготь, Джабско не может не задаться вопросом — на кой чёрт всё это было нужно. Коготь никогда не занималась управлением заводами или правлением городов. Их дело — получать крышки за стрельбу. Некоторые работорговцы бросили оружие достаточно быстро, чтобы их наняли следить за порядком в Питте, но их явно недостаточно, чтобы всё работало как надо. К тому же, во время боёв немало рабов сбежало. На то, чтобы восстановить то, что построил Ашур — его отлаженную промышленную машину — уйдут годы. И это ещё если нам вообще будет не лень этим заниматься."
    TAL_nf_events.81.a:0 "По крайней мере, вид из Хэйвена хороший."
    TAL_nf_events.82.title:0 "Новости из Парадайза"
    TAL_nf_events.82.desc:0 "После разгрома банд рейдеров в Столичной Пустоши поток рабов из Парадиз-Фоллс сократился до капли. Нам сообщили, что наёмники из Компании Коготь, которые и прикончили эти банды, теперь позволяют им снова поставлять рабов. Загвоздка в том, что теперь они получают долю с добычи рейдеров."
    TAL_nf_events.82.a:0 "Кого волнует, откуда они?"

