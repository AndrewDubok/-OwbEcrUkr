l_russian: 
HOS_nf_a001:0 "Любов до гри"
HOS_nf_a001_desc:0 "До бомбардувань хокей був однією з найважливіших речей. Інакше навіщо було будувати для нього такі великі будівлі?"
HOS_nf_a002:0 "Наша остання поразка"
HOS_nf_a002_desc:0 "Після кількох важчих поразок ситуація трохи вийшла з-під контролю."
HOS_nf_a003:0 "Нове лігво"
HOS_nf_a003_desc:0 "Наш старий сарай не підходить для планів Шора. Нам знадобиться місце більше."
HOS_nf_a004:0 "Ніколи не програвати знову"
HOS_nf_a004_desc:0 "Після таких побоїв, які «Гравці» отримали в Ронто, багато хокейних банд розпалися б. Схоже, це мало зворотний ефект."
HOS_nf_a005:0 "Розчистити лід"
HOS_nf_a005_desc:0 "Ковзанка тут трохи паршива, але ми це виправимо."
HOS_nf_a006:0 "Зайнятися брухтом"
HOS_nf_a006_desc:0 "Навколо валяється купа іржавих труб та інших речей, якими добре було б когось відлупцювати."
HOS_nf_a007:0 "Забрати місцеві фабрики"
HOS_nf_a007_desc:0 "Місцеві збройові майстерні — нічого особливого, але тепер вони наші."
HOS_nf_a008:0 "Новий склад"
HOS_nf_a008_desc:0 "Ми втратили багато хлопців у Ронто. Ці місця в команді потрібно заповнити."
HOS_nf_a009:0 "План гри"
HOS_nf_a009_desc:0 "Місцеві бандити круті, але дурні. Нам потрібна практика."
HOS_nf_a010:0 "Джими"
HOS_nf_a010_desc:0 "Ми втратили не просто купу хлопців на передовій. Ми втратили справжніх лідерів. На щастя, ми знайшли справді круту заміну. Є тільки одна проблема.\n\n Їх усіх звуть Джим."
HOS_nf_a011:0 "Заповнити лаву"
HOS_nf_a011_desc:0 "Розішліть звістку, що ми набираємо команду."
HOS_nf_a012:0 "Захист"
HOS_nf_a012_desc:0 "Тримайте все щільно. Не пропускайте ворога."
HOS_nf_a013:0 "Задати тон"
HOS_nf_a013_desc:0 "Ми не можемо чинити рейди, просто сидячи на дупі. Ми йдемо туди й влаштовуємо бучу."
HOS_nf_a014:0 "Новий капітан"
HOS_nf_a014_desc:0 "Все змінюється. Тепер, коли Шор тримає команду разом, у нього не так багато часу на керівництво рейдами, як раніше."
HOS_nf_a015:0 "Збір коштів"
HOS_nf_a015_desc:0 "Місцеві жителі трохи запізнилися з виплатою данини команді. Час вирішити це."
HOS_nf_a016:0 "Нове шмаття"
HOS_nf_a016_desc:0 "З такою кількістю новачків важко відрізнити хлопців один від одного, коли все йде шкереберть. Нам знадобляться нові светри."
HOS_nf_a017:0 "Нове спорядження"
HOS_nf_a017_desc:0 "Нам також знадобиться більше ключок та ковзанів."
HOS_nf_a018:0 "Капітан Жак"
HOS_nf_a018_desc:0 "Жак — ватажок рейдерів звідкись із заходу, якому, як і нам, надрали дупи. Тож вони прагнуть перемоги."
HOS_nf_a019:0 "Капітан Гічкок"
HOS_nf_a019_desc:0 "Гічкок трохи старий, але він все ще горить бажанням битися."
HOS_nf_a020:0 "Капітан Янкі"
HOS_nf_a020_desc:0 "Янкі — рейдер із півдня, який прийшов зі своїми хлопцями, рятуючись від роботів, які хапають людей і тягнуть їх кудись. Можливо, колись ми займемося цим питанням."
HOS_nf_a021:0 "Капітан Гуді"
HOS_nf_a021_desc:0 "Гуді — чортів хороший рейдер, але він звідкись зі сходу, де дивно розмовляють. Через це виконувати його накази трохи складно."
HOS_nf_a022:0 "Манітобська міць"
HOS_nf_a022_desc:0 "Жак каже, що зміг розшукати деяких своїх приятелів, яким вдалося вижити, діставшись сюди."
HOS_nf_a023:0 "Ветеранська присутність"
HOS_nf_a023_desc:0 "У Гічкока око на талановитих ветеранів. Він збирається поповнити наш склад справжніми вбивцями."
HOS_nf_a024:0 "Янківська тактика"
HOS_nf_a024_desc:0 "Янкі знає толк у тому, як дістатися з пункту А в пункт Б, не втративши по дорозі половину спорядження."
HOS_nf_a025:0 "Зосередьте їх"
HOS_nf_a025_desc:0 "Гуді хоче привести команду до ладу за допомогою старих добрих тренувань."
HOS_nf_b001:0 "Віндзорська виїзна гра"
HOS_nf_b001_desc:0 "«Віндзорські Руйнівники» — така ж банда, як і ми, але нам знадобиться їхнє спорядження, щоб дати бій Ронто."
HOS_nf_b002:0 "Ласкаво просимо до команди"
HOS_nf_b002_desc:0 "Замість того, щоб убивати всіх Руйнівників, ми приймемо їх до нашої банди."
HOS_nf_b003:0 "Командний транспорт"
HOS_nf_b003_desc:0 "Намалюйте кленовий лист на машинах — і тепер це машини Гравців."
HOS_nf_b004:0 "Вивчення гри"
HOS_nf_b004_desc:0 "Як ці хлопці можуть не знати хокей? Ми повинні навчити їх, якщо вони збираються битися з нами."
HOS_nf_b005:0 "Куди ця деталь?"
HOS_nf_b005_desc:0 "Ви, хлопці, точно не вигадуєте назви цих деталей? Радіатор? Я її навіть не знаю."
HOS_nf_b006:0 "Замбоні Хлопці"
HOS_nf_b006_desc:0 "Руйнівники, які приєдналися, зібрали свій невеликий загін і готові вийти на лід."
HOS_nf_b007:0 "Розкат, Приціл, Гол"
HOS_nf_b007_desc:0 "Хлопці на машинах пробиваються вперед, а за ними слідують ковзанярі. У Ронто немає шансів."
HOS_nf_b008:0 "Ідіть пішки"
HOS_nf_b008_desc:0 "Тобто ви, хлопці, просто 200 років їздили туди-сюди цим мостом? Цього разу підете пішки."
HOS_nf_b009:0 "Віндзорські ракети"
HOS_nf_b009_desc:0 "У цих хлопців була потужна вогнева міць. З ким вони там воювали через міст, з танками?"
HOS_nf_b010:0 "Злам багажників"
HOS_nf_b010_desc:0 "У Руйнівників була традиція зберігати здобич у багажниках. Заберіть ключі з трупів."
HOS_nf_b011:0 "З них можна зробити ковзани?"
HOS_nf_b011_desc:0 "У Віндзорі багато заводів. Але вони виробляють автомобілі. Ми ж можемо це змінити, правда?"
HOS_nf_b012:0 "Через міст"
HOS_nf_b012_desc:0 "Руйнівники воювали з тими хлопцями по той бік цілих 200 років. Покажімо їм, як це робиться."
HOS_nf_b013:0 "Місцевий талант"
HOS_nf_b013_desc:0 "Не всі хлопці у Віндзорі були одержимі машинами. Деякі з них можуть навчитися кататися на ковзанах."
HOS_nf_b014:0 "Кому потрібні машини"
HOS_nf_b014_desc:0 "Знаєте, скільки ковзанів можна зробити з одного такого іржавого відра?"
HOS_nf_c001:0 "Повернення до Ронто"
HOS_nf_c001_desc:0 "Ми зібралися. Нові хлопці, нові боси, нові ключки. Час для реваншу."
HOS_nf_c002:0 "Хто ви такі?"
HOS_nf_c002_desc:0 "Хто, в біса, ці придурки в чорній броні? Що сталося з В.А.Ш.І.Н.Г.Т.О.Н.ом?"
HOS_nf_c003:0 "Розчавлені бляшанки"
HOS_nf_c003_desc:0 "Ці ходячі консервні банки годяться тільки для стрільби по мішенях та на металобрухт. Зробіть одне, потім друге."
HOS_nf_c004:0 "Післяматчева вечірка"
HOS_nf_c004_desc:0 "Ми відбили Ронто й перемогли старий комп'ютер, який мало не знищив нашу команду. Час святкувати."
HOS_nf_c005:0 "Старі схованки"
HOS_nf_c005_desc:0 "Відкопайте старі схованки й переконайтеся, що здобич усе ще там."
HOS_nf_c006:0 "Хлопці повернулися в місто"
HOS_nf_c006_desc:0 "Ми нові чемпіони, стадіон Ронто тепер наш."
HOS_nf_c007:0 "Обчистити дощенту"
HOS_nf_c007_desc:0 "Ми знайшли, де ховалися ті хлопці з Онтаріоклаву, чи як їх там. Місце — діра, але все одно є дещо, що варто звідти витягти."
HOS_nf_c008:0 "Відваліть"
HOS_nf_c008_desc:0 "Онтаріоклавівці втекли в сніг, підтиснувши хвости. Доброго лемента."
HOS_nf_c009:0 "Насолоджуючись перемогою"
HOS_nf_c009_desc:0 "Ці хлопці надрали дупи Ронто, а ми надрали дупи їм. Тож це означає, що ми теж надрали дупи Ронто, так?"
HOS_nf_c010:0 "Перепрофілювати роботи заводи"
HOS_nf_c010_desc:0 "Якщо ці фабрики можуть робити роботів, вони повинні бути здатні зробити кляту ключку."
HOS_nf_c011:0 "Старі накладки"
HOS_nf_c011_desc:0 "У бункері, де був той старий бот, було багато старого спорядження, яке непогано підійшло б хлопцям на льоду."
HOS_nf_c012:0 "Пробиваючи наскрізь"
HOS_nf_c012_desc:0 "Якщо знаєш, як убити одного робота, ти знаєш, як убити будь-якого робота. Це ми про тебе, Б.М.М.А.У!"
HOS_nf_c013:0 "Тримаючи світло увімкненим"
HOS_nf_c013_desc:0 "Якщо ми не підтримуватимемо роботу цього надпотужного тостера, ми зможемо отримувати енергію з його реакторів. Можливо, колись ми змусимо той гігантський екран запрацювати."
HOS_nf_c014:0 "Дупи на сидіннях"
HOS_nf_c014_desc:0 "Так, ми рейдери. Але ми також влаштовуємо гарне шоу. Хлопці заплатять, щоб побачити гру."
HOS_nf_c015:0 "Столичні Ворони?"
HOS_nf_c015_desc:0 "Ті онтаріоклавівські гівнюки відкололися від якоїсь команди під назвою «Столичні Ворони» чи щось таке. Вони, мабуть, б'ються приблизно так само, тож ми знаємо, на що йдемо."
HOS_nf_c016:0 "Піф-паф"
HOS_nf_c016_desc:0 "Ці хлопці залишили по собі дещо цінне, коли ми їх проганяли."
HOS_nf_c017:0 "Нові шоломи"
HOS_nf_c017_desc:0 "Спорядження трохи дивно носити з ковзанами, але не всі вміють кататися на ковзанах. Тож..."
HOS_nf_c018:0 "Рідний лід"
HOS_nf_c018_desc:0 "Ми повністю переїхали на стадіон, і все працює так, як нам подобається. Люди Ронто теж звикають до того, хто має бути головним."
HOS_nf_c019:0 "Продавати мерч"
HOS_nf_c019_desc:0 "Розфарбуйте кілька старих фігурок, що кивають, щоб вони були схожі на наших хлопців, і продавайте їх тим, хто приходить дивитися ігри. Легше заробити кришки, ніж рейдерством."
HOS_nf_c020:0 "Перевага рідного льоду"
HOS_nf_c020_desc:0 "Ронто — наш дім. Стадіон — наш лід. Ми нікому не дозволимо забрати це в нас."
HOS_nf_c021:0 "Трансляція ігор"
HOS_nf_c021_desc:0 "Хтось запропонуваг відремонтувати стару радіоантену, щоб вести прямі трансляції ігор. Це має привернути людей з усіх околиць, щоб побачити їх наживо."
HOS_nf_c022:0 "Ліга"
HOS_nf_c022_desc:0 "Щоб ігри тривали, нам потрібно більше команд. Це означає, що ми повинні бути більше, ніж просто «Гравці», ми повинні стати лігою."
