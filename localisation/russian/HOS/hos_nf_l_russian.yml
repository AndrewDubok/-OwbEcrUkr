l_russian: 
HOS_nf_a001:0 "Любовь к игре"
HOS_nf_a001_desc:0 "До бомбежек хоккей был одним из самых важных занятий. Иначе зачем было строить для него такие большие здания?"
HOS_nf_a002:0 "Наше последнее поражение"
HOS_nf_a002_desc:0 "После нескольких более серьезных поражений ситуация немного вышла из-под контроля."
HOS_nf_a003:0 "Найти место попросторнее"
HOS_nf_a003_desc:0 "Наш старый амбар не подходит для планов Шора. Нам понадобится что-то попросторнее."
HOS_nf_a004:0 "Никогда не проиграем вновь"
HOS_nf_a004_desc:0 "После таких побоев, какие «Хозеры» устроили в Ронто, многие хоккейные банды распадались. Похоже, это имело обратный эффект."
HOS_nf_a005:0 "Подготовить каток"
HOS_nf_a005_desc:0 "Каток здесь немного хреновый, но мы это исправим."
HOS_nf_a006:0 "Заняться ломом"
HOS_nf_a006_desc:0 "Вокруг валяется куча ржавых труб и всяких штук, которыми можно было бы кому-нибудь втащить."
HOS_nf_a007:0 "Поджать местные фабрики"
HOS_nf_a007_desc:0 "Местные оружейные мастерские не представляют из себя ничего особенного, но теперь они наши."
HOS_nf_a008:0 "Новый состав"
HOS_nf_a008_desc:0 "Мы потеряли много ребят в Ронто. Эти места в команде нужно бы восполнить."
HOS_nf_a009:0 "План действий"
HOS_nf_a009_desc:0 "Местные головорезы крутые, но тупые. Нам нужна практика."
HOS_nf_a010:0 "Джим"
HOS_nf_a010_desc:0 "Мы потеряли не просто кучу ребят на передовой. Мы потеряли некоторых настоящих лидеров. К счастью, мы нашли действительно крутую замену. Есть только одна проблема. \n\n Их всех зовут Джим."
HOS_nf_a011:0 "Заполнить скамейки"
HOS_nf_a011_desc:0 "Разошлите весть что мы набираем команду."
HOS_nf_a012:0 "Защита"
HOS_nf_a012_desc:0 "Сохраняйте плотный строй. Не пропустите врага."
HOS_nf_a013:0 "Задайте тон"
HOS_nf_a013_desc:0 "Мы не можем совершать рейды, просто сидя на заднице. Мы пойдём туда и всё испортим."
HOS_nf_a014:0 "Новый Капитан"
HOS_nf_a014_desc:0 "Всё меняется. Теперь, когда команду держит Шор, у него уже нет столько времени на рейды, как раньше."
HOS_nf_a015:0 "Сбор дани"
HOS_nf_a015_desc:0 "Местные жители немного запоздали с выплатой дани для команды. Пора с этим разобраться."
HOS_nf_a016:0 "Обновленный имидж"
HOS_nf_a016_desc:0 "С таким количеством новых парней сложно отличить друг от друга, когда что-то идёт не так. Нам понадобятся новые свитера."
HOS_nf_a017:0 "Новое снаряжение"
HOS_nf_a017_desc:0 "Нам также понадобятся еще клюшки и коньки."
HOS_nf_a018:0 "Капитан Жак"
HOS_nf_a018_desc:0 "Жак — главарь рейдеров откуда-то с запада, которому, как и нам, надрали задницы. Так что они жаждут победы."
HOS_nf_a019:0 "Капитан Хичкок"
HOS_nf_a019_desc:0 "Хичкок немного староват, но они все еще горят желанием сражаться."
HOS_nf_a020:0 "Капитан Янк"
HOS_nf_a020_desc:0 "Янк — это рейдер с юга, который пришёл со своими ребятами, спасаясь от роботов, которые хватают людей и куда-то утаскивают. Возможно, когда-нибудь мы займёмся этим вопросом."
HOS_nf_a021:0 "Капитан Гуди"
HOS_nf_a021_desc:0 "Гуди — чертовски хороший рейдер, но они откуда-то с востока, где говорят странно. Из-за этого выполнять их приказы немного сложно."
HOS_nf_a022:0 "Мощь Манитобы"
HOS_nf_a022_desc:0 "Жак говорит, что ему удалось разыскать некоторых своих приятелей, которым удалось выжить, добравшись сюда."
HOS_nf_a023:0 "Талантливые ветераны"
HOS_nf_a023_desc:0 "У Хичкока глаз на талантливых ветеранов. Он собирается пополнить наш состав настоящими убийцами."
HOS_nf_a024:0 "Тактика янки"
HOS_nf_a024_desc:0 "Янк знает толк в том, как добраться из пункта А в пункт Б, не потеряв по пути половину своего снаряжения."
HOS_nf_a025:0 "Давайте сосредоточимся"
HOS_nf_a025_desc:0 "Гуди хочет привести команду в форму с помощью старых добрых тренировок."
HOS_nf_b001:0 "Выездная игра для Виндзора"
HOS_nf_b001_desc:0 "«Виндзор Врэкерс» — такая же банда, как и мы, но нам понадобится их оружие, чтобы дать бой Ронто."
HOS_nf_b002:0 "Добро пожаловать в Команду"
HOS_nf_b002_desc:0 "Вместо того, чтобы убивать всех Врэкеров, мы примем их в нашу банду."
HOS_nf_b003:0 "Наши тачки"
HOS_nf_b003_desc:0 "Нарисуйте кленовый листок на машинах, теперь это машины Хозера."
HOS_nf_b004:0 "Обучение игре"
HOS_nf_b004_desc:0 "Как эти ребята могут не знать хоккей? Мы должны научить их, если они собираются сражаться с нами."
HOS_nf_b005:0 "Куда делась эта запчасть?"
HOS_nf_b005_desc:0 "Вы, ребята, названия этих деталей точно не придумываете? Радиатор? Я вообще не понимаю."
HOS_nf_b006:0 "«Замбони Бойс»"
HOS_nf_b006_desc:0 "Присоединившиеся Врэкеры уже собрали свой небольшой отряд и готовы выйти на лед."
HOS_nf_b007:0 "Выкат, Прицел, Гол"
HOS_nf_b007_desc:0 "Ребята на автомобилях проталкиваются вперед, а за ними следуют парни на коньках. У Ронто нет шансов."
HOS_nf_b008:0 "Пешая прогулка"
HOS_nf_b008_desc:0 "Так вы, ребята, просто 200 лет ездили по этому мосту туда и обратно? В этот раз пройдётесь пешком."
HOS_nf_b009:0 "Виндзор Рокетс"
HOS_nf_b009_desc:0 "У этих ребят была мощная огневая мощь. С чем они там воевали, с танками?"
HOS_nf_b010:0 "Взломать багажники"
HOS_nf_b010_desc:0 "У Врэкерсов была традиция хранить свою добычу в багажниках. Поднимите ключи с трупов."
HOS_nf_b011:0 "Можно ли из них сделать коньки?"
HOS_nf_b011_desc:0 "В Виндзоре много заводов. Но они производят автомобили. Мы ведь можем это изменить, верно?"
HOS_nf_b012:0 "Через мост"
HOS_nf_b012_desc:0 "Врэкеры сражались с этими парнями по ту сторону целых 200 лет. Давайте покажем им, как это делается."
HOS_nf_b013:0 "Местные таланты"
HOS_nf_b013_desc:0 "Не все парни в Виндзоре были помешаны на автомобилях. Некоторые из них могли бы научиться кататься на коньках."
HOS_nf_b014:0 "Кому нужны тачки"
HOS_nf_b014_desc:0 "Знаете, сколько коньков можно сделать из одного такого ржавого ведра?"
HOS_nf_c001:0 "Возвращение в Ронто"
HOS_nf_c001_desc:0 "Мы пересобрались. Новые ребята, новые боссы и новые клюшки. Пришло время для реванша."
HOS_nf_c002:0 "Кто эти люди?"
HOS_nf_c002_desc:0 "Кто, чёрт возьми, эти придурки в чёрной броне? Что случилось с В.А.Ш.И.Н.Г.Т.О.Н.О.М?"
HOS_nf_c003:0 "Лопнувшие банки"
HOS_nf_c003_desc:0 "Эти ходячие консервные банки годятся только для учебных стрельб и на переплавку. Сделайте одно, затем другое."
HOS_nf_c004:0 "Вечеринка после игры"
HOS_nf_c004_desc:0 "Мы отыгрались у Ронто и победили старый компьютер, который чуть не разгромил нашу команду. Время праздновать."
HOS_nf_c005:0 "Старые тайники"
HOS_nf_c005_desc:0 "Откопайте старые тайники и убедитесь, что добыча все еще там."
HOS_nf_c006:0 "«Мальчики снова в городе»"
HOS_nf_c006_desc:0 "Мы новые чемпионы, стадион Ронто теперь наш."
HOS_nf_c007:0 "Вычистить мусор"
HOS_nf_c007_desc:0 "Мы нашли, где прятались эти ребята из Онтариоклава, или как их там называли. Место, конечно, дыра, но там всё равно есть кое-что, что стоит вычистить."
HOS_nf_c008:0 "Бегите, мусор"
HOS_nf_c008_desc:0 "Онтариоклавы убежали в снег, поджав хвосты. Вот и слава богу."
HOS_nf_c009:0 "Наслаждаться победой"
HOS_nf_c009_desc:0 "Эти ребята надрали задницы Ронто, а мы надрали их. Так это значит, что мы и Ронто надрали задницы, да?"
HOS_nf_c010:0 "Нахер фабрики роботов"
HOS_nf_c010_desc:0 "Если эти фабрики могут производить роботов, то они должны быть способны производить и чертовы палки."
HOS_nf_c011:0 "Старые колодки"
HOS_nf_c011_desc:0 "В бункере, где находился этот древний робот, было много старого снаряжения, которое вполне подошло бы ребятам на льду."
HOS_nf_c012:0 "Пробивая насквозь"
HOS_nf_c012_desc:0 "Если знаешь, как убить одного робота, ты знаешь, как убить любого робота. Да-да, мы смотрим на тебя, Б.М.М.А.У!"
HOS_nf_c013:0 "Не выключайте свет"
HOS_nf_c013_desc:0 "Если мы не будем поддерживать этот мощный тостер в рабочем состоянии, мы сможем получать энергию из его реакторов. Может быть, однажды мы заставим этот огромный экран работать."
HOS_nf_c014:0 "Задницы на сиденьях"
HOS_nf_c014_desc:0 "Да, мы рейдеры. Но мы тоже устраиваем хорошее шоу. Парни заплатят, чтобы посмотреть игру."
HOS_nf_c015:0 "Столичный Рэйвен?"
HOS_nf_c015_desc:0 "Эти Онтариоклавские засранцы откололись от какой-то команды под названием Столичный Рэйвен или что-то в этом роде. Они, наверное, дерутся примерно так же, так что мы знаем, во что ввязываемся."
HOS_nf_c016:0 "Пиф Паф"
HOS_nf_c016_desc:0 "Эти ребята оставили кое-какие вещички, когда мы их прогоняли."
HOS_nf_c017:0 "Новые шлема"
HOS_nf_c017_desc:0 "Снаряжение немного странно носить с коньками, но не все умеют кататься на коньках. Так что..."
HOS_nf_c018:0 "Знакомый лёд"
HOS_nf_c018_desc:0 "Мы полностью переехали на стадион, и всё идёт так, как нам нравится. Жители Ронто тоже привыкают к тому, кто будет главным."
HOS_nf_c019:0 "Продажа мерча"
HOS_nf_c019_desc:0 "Раскрасьте несколько старых качающихся фигурок так, чтобы они были похожи на наших мальчиков, и продавайте их тем, кто приходит посмотреть на игры. Легче зарабатывать крышки, чем рейдить."
HOS_nf_c020:0 "Преимущество на знакомом льду"
HOS_nf_c020_desc:0 "Ронто — наш дом. Стадион — наш лёд. Мы никому не позволим отнять это у нас."
HOS_nf_c021:0 "Трансляция игр"
HOS_nf_c021_desc:0 "Кто-то предложил починить старую радиоантенну, чтобы транслировать игры в прямом эфире. Это должно привлечь людей со всего мира посмотреть их в прямом эфире."
HOS_nf_c022:0 "Лига"
HOS_nf_c022_desc:0 "Чтобы игры продолжались, нам нужно больше команд. Это значит, что нам придется быть не просто «Хозерс», нам придется стать лигой."
