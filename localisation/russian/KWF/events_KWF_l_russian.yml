l_russian:
  nf_kwf.1.t:0 "Корабель без країни"
  nf_kwf.1.d:0 "Два століття тому цей день був таким же, як і будь-який інший на танкері «Бореаліс». Екіпаж займався своїми щоденними справами, не підозрюючи, що Велика війна спалахне і зникне в одну мить. Світ розчинився в статичному шумі. Тиша — ось усе, що можна було почути на кожній частоті та каналі.\n\nКапітан зібрав свою команду на вивітреній палубі, і після деяких дебатів вони дійшли похмурого консенсусу: Америка, яку вони знали, зникла. І тепер танкер самотньо блукав мертвим океаном.\n\nДні зливались у тижні, тижні в місяці. Довгі, довгі місяці порожнечі. Потім — іскра: слабке потріскування в динаміках радіо. Сигнал лиха. Екіпаж відстежив сигнал до його джерела: побите судно, що кренилося, його команда та пасажири чіплялися за останню надію. Очі капітана зустрілися з очима його команди, і після довгої тиші він віддав наказ. «Бореаліс» підійшов до незнайомця, і два кораблі зв'язали разом. Врятовані, з порожніми очима та приголомшені, приєдналися до нескінченної подорожі.\n\nЦе був доленосний союз, бо той корабель був..."
  nf_kwf.1.a:0 "...дослідницьким судном."
  nf_kwf.1.b:0 "...круїзним лайнером"
  nf_kwf.1.c:0 "...військовим кораблем"

  nf_kwf.2.t:0 "Не гойдай човен"
  nf_kwf.2.d:0 "Танкер продовжував рости, більше палуб зв'язувалося разом, більше облич на нашому плавучому домі. Серед новоприбулих була дивна постать: гуль, який нав'язливо бурмотів про «Бога Солі».\n\nСпочатку Командна палата відмахнулася від цього, вважаючи його черговим божевільним. Але чутки поширюються швидко. Культ Бога Солі швидко збільшився в кількості, і його молитви було чути по всіх нижніх палубах. Коли культ більше не можна було ігнорувати, капітан вирішив «зберегти мир» і дозволити їм бути.\n\nЦе була помилка.\n\nДвадцять років тому стався голод. Культ побачив свій шанс. Очолювані своїм пророком, Паллідом, радикали увірвалися на місток, убивши капітана. Здавалося, що корабель належить їм. Однак Крістіан, молодий кок, згуртував відданий екіпаж. У подальшому кривавому хаосі вони билися, поки не відвоювали капітанську каюту, убивши в процесі Палліда. Щоб уникнути подальшого кровопролиття, Крістіан і Делмар, заступник культу, погодилися ділити корабель, а не топити його в черговій битві.\n\nКрістіан керував з тих пір, відмовляючись називатися капітаном. Він не найгучніший голос і не найтепліша душа."
  nf_kwf.2.a:0 "Але він наш капітан."

  nf_kwf.3.t:0 "Ми більше ніколи не попливемо"
  nf_kwf.3.d:0 "Крик розірвав світанок: 'Земля!'\n\nПровівши два століття в дрейфі, люди з «Бореаліса» кинулися на палубу, щоб побачити це диво. З Командної палати Крістіан спостерігав за цим разом з екіпажем. 'Приготуй людей, Маршале,' сказав він головному гарпунеру. 'Це не буде гостинна зустріч.' Маршал різко кивнув і вигукнув накази своїм загонам.\n\nКрістіан запалив люльку і спостерігав, як темна пляма землі стає більшою.\n'Земля...' пробурмотів він.\n\nВисадка була такою важкою, як він і очікував. Коли «Бореаліс» зупинився на мілководді, Гарпунери зіткнулися з племенем дикунів на березі. Ті, хто чинив опір, були знищені за наказом Крістіана, в той час як воїни, що вижили, втекли до найближчих поселень. Гарпунери не просунулися далі вглиб країни.\n\nКрістіан подивився вниз на завойоване поселення. Його не хвилювала жорстокість цього. Натомість він думав про покоління, народжені та поховані в сталевому корпусі корабля, які мріяли про життя, що не гойдається з припливами. Він відчував незнайомі запахи вологої землі та диму в повітрі.\n\nВони нарешті знайшли це. Ця земля була їхнім правом народження, заробленим двомастами роками блукань."
  nf_kwf.3.a:0 "Але він наш капітан."

  nf_kwf.4.t:0 "Вибір Капітана"
  nf_kwf.4.d:0 "Іржавий Порт...\n\nКрістіан провів тут набагато менше часу, ніж на кораблі за всі ті роки, але цей імпровізований офіс-кухня, зібраний із врятованого металу і побудований його власними руками, вже став більшим домом, ніж будь-де. Перш ніж він заглибився в думки, у двері постукали. Знайома постать увійшла всередину.\n\n'Крістіане.'\n'Делмаре.'\n\nЛідер культу сів за пошарпаний стіл. У повітрі між ними висіло щось невисловлене, але Крістіан першим порушив тишу.\n\n'На суші все так сильно змінилося. Я ніколи не думав, що доживу до того дня, коли ми зійдемо на берег, і ще менше — що нас не знищать якісь невідомі сили, що чекали тут.' Він показав на вікно. 'Але я приємно здивований.'\n\n'Як і я, Крістіане.' У голосі Делмара відчувалася та знайома теплота, хоча його очі приховували глибини, які Крістіан не міг прочитати.\n\n'Здається, настав час вирішувати, хто вестиме наш народ далі.'\n\nДелмар просто дивився на нього з тим терплячим, знаючим поглядом — тим самим, який був у нього під час незліченних зборів на кораблі, незліченних криз, пережитих разом."
  nf_kwf.4.a:0 "'Але все вже вирішено, мій друже.'"
  nf_kwf.4.b:0 "'У мене є ідея..'"
  nf_kwf.4.c:0 "'Хто, як не ти, може вести нас?'"

  nf_kwf.5.t:0 "Королівська гра в Ур"
  nf_kwf.5.d:0 "Одного разу на «Бореаліс» зійшов історик, несучи під пахвою нічого, крім стародавньої настільної гри. Він назвав її «Королівська гра в Ур», хоча ніхто не міг передбачити, як глибоко цей запорошений релікт змінить життя на нашому судні. Деякий час Гра в Ур була не більше ніж дивиною, у яку грали кілька ентузіастів. Але коли історії та чутки поширилися коридорами, її популярність зросла зі швидкістю, якій міг би позаздрити культ Бога Солі.\n\nНезабаром усі, молоді й старі, грали в цю дивну та захопливу гру. Винахідливі члени екіпажу виготовляли дошки зі шматків металу та створювали фішки з викинутих дрібничок. З'явилися нові версії правил, і невдовзі в кожному куточку корабля проводилися офіційні змагання.\n\nТепер, через сто років, Гра в Ур залишається улюбленою традицією серед Відомих Людей. Це більше, ніж просто розвага: це спосіб вирішувати суперечки, зав'язувати дружбу та випробовувати свій розум. Наш капітан, Крістіан, став легендарним непереможним чемпіоном, титул, який він утримував довгі роки."
  nf_kwf.5.a:0 "Наш найкращий ур-ах!"
 
  nf_kwf.6.t:0 "Королі та садівники"
  nf_kwf.6.d:0 "'Знаєш, Крістіане, я ніколи не розумів Культу Бога Солі,' сказав Делмар, не відриваючи погляду від дошки для Ур.\n\nФішка Крістіана завмерла в повітрі. 'Дивно чути це від тебе, хіба ти не був правою рукою того божевільного?'\n\nДелмар пересунув різьблену фішку на нову позицію. 'Паллід тримав свої справжні наміри в таємниці від усіх. Я стояв поруч з ним роками і все одно нічого не знав. Він не був віруючим, лише актором, який вивчив літургію.'\n\n'То для чого все це було? Чого він насправді шукав на дні моря?'\n\n'Це більше не має значення,' Делмар махнув рукою, відмахуючись. 'Паллід зник, і його одержимість померла з ним. У мене є нове бачення того, що залишилося від нашої... організації.'\n\nКрістіан нахилився вперед. 'Жодних більше фокусів, Делмаре. Я вже поховав одного лідера культу. Я не вагатимусь зробити це знову.'\n\nДелмар зберіг свою звичайну теплу посмішку. 'Не хвилюйся. Моє бачення набагато... конструктивніше.'\n\n'Уяви сад. Рай, побудований нашими власними руками...'"
  nf_kwf.6.a:0 "'...просто тут, на суші.'"