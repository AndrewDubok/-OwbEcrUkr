l_russian:
  kwf_only_the_sea:0 "Щасливої плавби"
  kwf_only_the_sea_desc:0 "Щасливої плавби\n\nНаш танкер відпливає."
  kwf_our_compass:0 "Коли він зламався"
  kwf_our_compass_desc:0 "Наш танкер майже поглинуло море."
  kwf_we_shore:0 "Хай буде нам воля"
  kwf_we_shore_desc:0 "Приплив\n\nі\n\nвідплив."

  kwf_real_food:0 "Нарешті справжня їжа"
  kwf_real_food_desc:0 "На нашому камбузі їжа була небагатою: гриби, радіоактивна риба та рідкісні овочі, вирощені ще рідкіснішими спеціалістами. Але тепер, коли ми маємо твердий ґрунт під ногами, у мене більше інгредієнтів для роботи."
  kwf_burn_grove:0 "Спалити гай"
  kwf_burn_grove_desc:0 "Ці племена чіпляються за свої гаї, наче саме болото священне. Нехай згорять разом із ним. Ми захопимо їхні землі, зламаємо їхній дух і прикуємо їхні руки до нашої роботи."
  kwf_root_tea:0 "Пийте чай із кореня"
  kwf_root_tea_desc:0 "Люди Едему шепочуться про коріння, заварене в чай, гіркий напій, який, кажуть, символізує гармонію з болотом. «Ми — діти саду, як і вони», — сказав Делмар. «Ми не повинні бути ворогами з цими людьми». Я не бачу сенсу, але варто спробувати."
  kwf_salt_the_soil:0 "Посолити ґрунт"
  kwf_salt_the_soil_desc:0 "Болота можуть годувати слабких, але соль зрештою забирає все. Вогнем і ланцюгами, непростими угодами чи гіркими напоями ми здобули своє законне місце. Тепер, просочена кров'ю, потом і трудом, земля служитиме нам."
  kwf_cradle_of_rust:0 "Колиска іржі та водоростей"
  kwf_cradle_of_rust_desc:0 "Наш перший оплот на суші — не сяюче місто, а лише гавань, повна залізних уламків. І все ж вона наша. З цієї колиски іржі ми виростимо щось сильніше: дім, який не зможе змести жоден шторм."
  kwf_manifesto:0 "Хто знайшов, того й"
  kwf_manifesto_desc:0 "Два століття пошуку їжі в морі навчили нас поводитися з рештками, але земля приховує ще більші скарби. Машини, інструменти, забуті сховища, поховані в твані — усе, що ми знайдемо, ми залишимо собі. Ніхто інший не має на це права, бо ніхто інший не пережив того, що ми."
  kwf_drills_in_mud:0 "Вправи в багнюці"
  kwf_drills_in_mud_desc:0 "Армія, народжена в морі, не може марширувати суходолом, не спотикаючись. Якщо ми хочемо боротися з болотними племенами та захищати Іржавий Порт, Гарпунери повинні опанувати нові техніки. Багнюка навчить їх стояти, а їхні тренування закріплять цей урок."
  kwf_finders_keepers:0 "Маніфест збирача"
  kwf_finders_keepers_desc:0 "Ми беремо те, що нам потрібно, лагодимо те, що можемо, і обходимося рештою. Болото не прийме нас, але все одно нагодує. Ніщо не пропадає марно, і нічого не залишається позаду."
  kwf_echoes_of_depths:0 "Відлуння з глибин"
  kwf_echoes_of_depths_desc:0 "Роками ми думали, що нас веде лише Сіль. Але ще глибше, під хвилями, чутно відлуння іншого голосу. Лагіднішого. Терплячого. Він закликає нас не потонути, а пустити коріння, пити та зберігати."
  kwf_beneath_the_salt:0 "Під сіллю"
  kwf_beneath_the_salt_desc:0 "Я ходив палубами й ходив болотами, і в обох місцях чув той самий голос. Сіль не бреше. Вона єднає плоть, вона єднає ґрунт, вона єднає нас. Під її вагою лежить Сад, який терпляче чекає. Якщо ми вклонимося його істині, він підніме нас — не як моряків чи вигнанців, а як Хранителів. Ходімо, пройдемо під сіллю разом."
  kwf_dry_command:0 "Сухе командування"
  kwf_dry_command_desc:0 "Нехай культисти співають про свою сіль і свій сад. Справжня сила команди не у видіннях, а в порядку, записах і командуванні. Моє слово — це приплив, що веде нас, і з бухгалтерською книгою в руці ми прокладемо курс, який не зіб'є зі шляху жодна омана." 
  kwf_rusted_few:0 "Іржаві небагато"
  kwf_rusted_few_desc:0 "Наша подорож залишила нас іржавими, але не зламаними. Одні чіпляються за шепіт саду, інші — за сталь своїх гарпунів. Мене мало обходить форма їхньої віри, лише те, що вони борються. Коли прийде буря, я покличу тих, у чиїх жилах ще є сіль. Решта можуть відійти вбік."
  kwf_smoke_on_water:0 "Дим над водою"
  kwf_smoke_on_water_desc:0 "Болота горітимуть, і дим підніматиметься над водою, як попередження всім, хто спробує стати на нашому шляху. Ми виживали всі ці роки не для того, щоб поклонятися фальшивим пророкам чи болотяним примарам. Ця війна закінчиться нашою перемогою на твердій землі, або не закінчиться взагалі."

  kwf_glow_in_the_smoke:0 "Сяйво в диму"
  kwf_glow_in_the_smoke_desc:0 "Дим клубочиться над водою, і в ньому я бачу біду. І атомний люд, і вогняний люд поглинуті жаром, не думаючи про майбутнє. Дим не їдять, юшку не звариш при фальшивому світлі. Якщо залишити їх горіти й сяяти, вони поглинуть усе болото. Найкраще загасити їх, перш ніж вони зіпсують те, що залишилося."
  kwf_radioactive_love:0 "Радіоактивне кохання"
  kwf_radioactive_love_desc:0 "Ці люди схиляються перед своєю Трійцею: Отцем, Сином і Святим Сяйвом. Дурні, скажуть деякі. Але я бачу дещо інше. Богові Солі не чуже світло, його сад — тому доказ. Якщо я зможу показати їм, що Сяйво — це Його вогонь, а Сад — Його Едем, тоді їхня Трійця прийме нас як братів по вірі."
  kwf_ain_no_sunshine:0 "Немає сонця"
  kwf_ain_no_sunshine_desc:0 "Деяких людей не врятувати. Їхнє сяйво веде не до жнив, а лише до могил. У багнюці немає милосердя. Щоб зберегти своє, ми повинні погасити їхнє світло, встояти на своєму й витримати. Краще взагалі не мати сонця, ніж мати неправильне."
  kwf_burning_desire:0 "Пекучі бажання"
  kwf_burning_desire_desc:0 "Ці вогнеборці спалюють усе, до чого торкаються, поки не залишиться нічого, що можна було б їсти або за що триматися. Але вогонь не просто знищує. Він готує, він гартує, він допомагає людям вижити в холодні ночі. Якщо ми зможемо приборкати їхній вогонь, він зможе нагодувати нас."
  kwf_hotter_than_hell:0 "Гарячіше, ніж у пеклі"
  kwf_hotter_than_hell_desc:0 "Вогнеборець шукає тепла в згасаючому вогні. Нехай він спалить його дотла й залишить холодним."

  kwf_herons_sing_no_more:0 "Чаплі більше не співають"
  kwf_herons_sing_no_more_desc:0 "Вони засіли на іржавому заводі «Посейдон» і розкрутили якусь штуку, яку називають Великим Колесом. Які б знання воно, за їхніми словами, не давало, це просто машини, що труться одна об одну. Час їх зупинити."
  kwf_turn_turn_turn:0 "Обертайся"
  kwf_turn_turn_turn_desc:0 "Вони звуть свого морського бога Посейдоном; ми звемо свого — Богом Солі. Імена різні, глибини однакові. Віруючі клянуться, що їхнє Колесо обертається його рукою, а ми клянемося, що припливи підкоряються нашому. Обидва не можуть бути праві. Колесо обернеться, і цього сезону воно обернеться для нас."
  kwf_wheel_in_the_sky:0 "Колесо в небі"
  kwf_wheel_in_the_sky_desc:0 "Інші проливали кров за цей завод, перш ніж ці культисти їх вигнали. Вони переконані, що Колесо врятує їх. Ми не можемо дозволити їм залишити його собі. Якщо Колесо справді говорить, воно заговорить за нас, щойно ми вирвемо його з їхніх рук."
  kwf_heard_it_through_the_swampvine:0 "Почув через болотну лозу"
  kwf_heard_it_through_the_swampvine_desc:0 "Болото шепоче, що час Едему добігає кінця. Ми вловимо ці шепоти, перетворимо їх на правду і задушимо їх власною лозою."
  kwf_the_sound_of_mire:0 "Звук твані"
  kwf_the_sound_of_mire_desc:0 "Едем обіцяв новий сад, а дав лише гниль. Усе, що я чую, — це булькотіння болота під ногами. Нехай болото назавжди заглушить їхні голоси."
  kwf_muddy_mire:0 "Брудна трясовина війни"
  kwf_muddy_mire_desc:0 "Болота сповільнюють кожен крок, але ми навчилися пробиратися крізь них. Багнюка вчить терпінню й гартує спину. Земля важка, але вона гартує волю."
  kwf_mud_tax:0 "Податок на багнюку"
  kwf_mud_tax_desc:0 "Життя на березі не безкоштовне. Кожен дах, кожен інструмент і кожна стіна коштують кришок або крові, а зазвичай і того, й іншого. Люди нарікають на вартість цих зборів, але резерви зростають, а разом із ними наша здатність торгувати й будувати."
  kwf_wheel_of_fortune:0 "Колесо фортуни"
  kwf_wheel_of_fortune_desc:0 "Жерці Посейдона кажуть, що їхнє Колесо обертає саму долю, даючи їм відповіді від морських богів. Не знаю. Мені воно нагадує зламаний шматок металу, що викидає іскри. Але якщо воно допомагає нам вчитися, то, можливо, в ньому все ж таки є удача."
  kwf_home_rustport:0 "Наш іржавий маленький дім"
  kwf_home_rustport_desc:0 "Хвилі та сіль у роті, але тепер, уперше, у нас був свій клаптик землі. Іржавий Порт — нічого особливого. Це просто іржаві балки та напівзатонулі халупи. Але він наш. Жоден приплив його не змиє. Після століть поневірянь у нас нарешті є дім."
  kwf_frozen_shores:0 "Замерзлі береги назавжди"
  kwf_frozen_shores_desc:0 "Нарешті трясовина поступається місцем твердішій землі. Те, що колись було багном і тлінню, обіцяє нам дім, який ми можемо захистити. Забудьмо минуле, ми залишимо берег собі."
  kwf_two_centuries:0 "Два століття іржі"
  kwf_two_centuries_desc:0 "Можливо, саме тут починається наша справжня подорож, не на хвилях, а тут, на суші."

  kwf_garden_beneath_the_waves:0 "Сад під хвилями"
  kwf_garden_beneath_the_waves_desc:0 "Мене вчили, що рай унизу, що море заколисає нас у своїх темних обіймах. Але я побачив безумство цієї мрії. Справжній сад не затоплений хвилями, він чекає тут, на землі, коли ми посіємо."
  kwf_work_of_the_faithful:0 "Праця вірних"
  kwf_work_of_the_faithful_desc:0 "Твої руки — це заповіт. Не в крові, а в праці. Зводьте стіни, обробляйте землю, сійте насіння. У цій праці — істинна молитва. Завдяки їй сад пустить коріння там, куди море не дістане."
  kwf_painted_in_ink:0 "Намальовано чорнилом"
  kwf_painted_in_ink_desc:0 "Колись наше чорнило прикувало нас до безодні. Тепер воно пов'язує нас одне з одним. Кожна позначка на нашій шкірі — це не ланцюг до моря. Це обітниця саду, обіцянка, що, куди б ми не пішли, життя піде за нами."
  kwf_who_dwells_below:0 "Той, Хто Перебуває Внизу"
  kwf_who_dwells_below_desc:0 "Не заперечуватиму, що під хвилею все ще є якась присутність. Але це не бог і не пастир наших душ. Що б не таїлося в тій безодні, воно може мовчати. Ми більше не схиляємо перед ним коліна. Наша віра тепер звернена вгору, до живого світу."
  kwf_open_floodgates:0 "Відкрийте шлюзи"
  kwf_open_floodgates_desc:0 "Стримуй воду — і земля голодуватиме. Випусти її — і світ очиститься. Сад розквітає, коли вірні довіряють силі припливів."
  kwf_depths_have_depth:0 "Глибини мають глибину"
  kwf_depths_have_depth_desc:0 "Віра, як і морські глибини, багатошарова. Те, що колись було поклонінням солі, стає чимось ціннішим. Кажу вам: глибина, яку ми шукаємо, не в океанській темряві, а в корінні, яке ми пускаємо в землю."
  kwf_garden_must_expand:0 "Рости, саду, рости"
  kwf_garden_must_expand_desc:0 "Сад, який не росте, зів'яне й помре. Те саме стосується й нас. Ми не можемо ховатися в одній гавані, на одному острові чи на одному березі. Ми маємо нести сад назовні, доки сам світ не розквітне під нашою опікою."
  kwf_bless_the_Warboat:0 "Благослови військовий човен"
  kwf_bless_the_Warboat_desc:0 "Сталь можна заточити, вітрила полагодити, але тільки віра зробить судно справді мореплавним. Військовий човен доставить наш сад до далеких берегів."
  kwf_salt_for_the_salt_god:0 "Солі Богові Солі"
  kwf_salt_for_the_salt_god_desc:0 "Колись вони кричали: «Солі Богові Солі!» і кидали свої дари в глибини. Але я кажу: нехай сіль повернеться в землю, на поля й у рани живих. Жоден бог не забере її собі. Це наш дар, який посилить ріст саду."

  kwf_drowned_king:0 "До самої ватерлінії"
  kwf_drowned_king_desc:0 "Ця ідея від Делмара... щоб люди побачили в мені щось більше. Пророка Бога Солі. Короля, обраного самим морем. Це безглуздо, але хтось має говорити від імені припливу, і, здається, ніхто інший цього не хоче."
  kwf_salt_in_wound:0 "Сіль на рану"
  kwf_salt_in_wound_desc:0 "Дисципліна — це те, що допомагає людям триматися на ногах, коли налітає шторм. Вона може бути жорстокою, але море ніколи не було лагідним. Якщо біль очищає нас, нехай сіль робить свою справу... так, Король наказує так."
  kwf_carry_that_weight:0 "Нести той тягар"
  kwf_carry_that_weight_desc:0 "У кожного є робота. Без винятків. Припаси, поранені, втомлені — ми всі щось несемо. Це не дає лінії прорватися."
  kwf_gaze_into_abyss:0 "Погляд у безодню"
  kwf_gaze_into_abyss_desc:0 "Ми більше не можемо воювати по-старому. Змінилося не лише море, а й наші вороги. Нова зброя спалює не тільки наші кришки, але зволікання спалює життя. Ми заплатимо ціну й ударимо першими, перш ніж це зроблять інші."
  kwf_tithes:0 "Десятина плоттю"
  kwf_tithes_desc:0 "Андейл перетнув межу, яку не повинен був переступати жоден чоловік. Море може пробачити голод, але не божевілля. Ми розберемося з ними швидко й чисто."
  kwf_faithful:0 "Вірні та Посолені"
  kwf_faithful_desc:0 "Віра, мораль, як це не назви. Суть у тому, щоб підтримувати людей і просувати роботу. Якщо віра допомагає, то нехай буде так."
  kwf_codex_saltum:0 "Кодекс Салтум"
  kwf_codex_saltum_desc:0 "Їм потрібні були правила, тож я їх написав. Кодекс — не якесь священне писання, а просто посібник. Спосіб переконатися, що ніхто не забуде, чому ми досі живі."
  kwf_tidebound_unity:0 "Єдність, скута припливом"
  kwf_tidebound_unity_desc:0 "Тепер ми всі прив'язані до однієї палуби. Неважливо, ким ти був раніше: солдатом, торговцем, сміттярем. Ти або тягнеш свій вантаж, або летиш за борт. Цього єднання достатньо."
  kwf_iron_psalm:0 "Залізний псалом"
  kwf_iron_psalm_desc:0 ""
  kwf_salt_over_steel:0 "Сіль над сталлю"
  kwf_salt_over_steel_desc:0 "Сталь ламається. Сіль її роз'їдає. Але люди вміють пристосовуватися. Нехай Братство тримається за свої машини. Ми створимо щось, що прослужить довше за метал."
  kwf_the_court:0 "Двір Втопленого Короля"
  kwf_the_court_desc:0 "Їм потрібна була столиця, трон, справжнє королівство. Гаразд. Нехай буде. Якщо невелика церемонія допомагає підтримувати порядок, я зіграю свою роль. Тільки не чекайте, що я почну вірити у свій титул."

  kwf_order_from_the_galley:0 "Порядок із камбуза"
  kwf_order_from_the_galley_desc:0 "Корабель без порядку тоне. Кухня без порядку голодує. Я провів багато ночей на камбузі, годуючи команду в шторми та пожежі. Тепер я принесу ту саму дисципліну на берег. На камбузі все буде зважено й розставлено по своїх місцях."
  kwf_dinner_bell:0 "Дзвін на вечерю"
  kwf_dinner_bell_desc:0 "Коли дзвенить дзвін, люди збираються. Вони знають, що їжа чекає, а робота йде слідом. В Іржавому Порту дзвін на вечерю кличе їх не просто їсти, а будувати, трудитися, працювати. Дисципліна починається зі шлунка."
  kwf_sea_trade:0 "Нам бракує спецій"
  kwf_sea_trade_desc:0 "Спецій, солі та олії нам бракує, але ми можемо їх знайти. Море завжди було коморою кухаря, а торгівля — приправою життя. Якщо ми хочемо добре нагодувати свій народ, ми повинні відкрити наші порти й дозволити смакам з усього світу приправляти наш стіл."
  kwf_set_the_table:0 "Накрити на стіл"
  kwf_set_the_table_desc:0 "Жодна трапеза не обходиться без підготовки. Щоб їсти, треба накрити на стіл. Щоб керувати, треба навести лад у домі. Від цього дня кожен солдат і робітник знатиме своє місце, свій обов'язок, свою частку."
  kwf_noone_leaves_hungry:0 "Ніхто не піде голодним"
  kwf_noone_leaves_hungry_desc:0 "На «Бореалісі» голодна команда була бунтівною. На суші те саме. Ситі животи означають, що леза працюють рівно, серця — рівно. Ніхто не марширує натщесерце, принаймні в моїй команді."
  kwf_the_galley_guard:0 "Камбузна варта"
  kwf_the_galley_guard_desc:0 "Кожному кухареві потрібна охорона в бурхливих водах. Я вибрав людей, які будуть служити так само добре, як і воювати. Вони будуть моїми ножами, моїми ополониками, моїм щитом і моїм вогнем. На марші вони будуть Камбучою Вартою, моєю обраною рукою."
  kwf_undercooked:0 "Недоварена їжа"
  kwf_undercooked_desc:0 "Іноді страва має томитися повільно. Краще годувати стабільно, ніж спалити страву. Ми стримаємо нашу жагу завоювань і дамо людям час повірити в наш порядок, наш хліб, наше слово."
  kwf_by_fire_and_salt:0 "Вогнем і сіллю"
  kwf_by_fire_and_salt_desc:0 "І все ж... бувають часи, коли вогонь має ревіти, коли сіль має кусатися. Деякі трапези здобуваються не терпінням, а полум'ям. Якщо берег чинить опір, то вогнем і сіллю ми розіб'ємо їх і поласуємо попелом."
  kwf_mouth_of_the_shore:0 "Устя берега"
  kwf_mouth_of_the_shore_desc:0 "У кожного берега є рот, і він говорить тільки тоді, коли його годують. Ми будемо тими, хто нагодує його — хлібом, роботою чи дисципліною. Зрештою, сам берег нестиме наш смак, наш порядок, наше ім'я."

  kwf_all_hands_on_deck:0 "Усі на палубу"
  kwf_all_hands_on_deck_desc:0 "У кожного з нас своє місце, і кожна рука важлива. Коли дається сигнал, немає виправдань: ми всі маємо діяти спільно, як одна команда."
  kwf_always_at_post:0 "Завжди на посту"
  kwf_always_at_post_desc:0 "Чи то на березі, чи то на кораблі, пост ніколи не покидає тебе. А якщо це трапляється, значить, ти не годен для цієї посади."
  kwf_discipline_is_a_dish:0 "Дисципліна — це страва"
  kwf_discipline_is_a_dish_desc:0 "Порядок живить силу. Він підтримував нас у морі. Тепер він допоможе нам бути напоготові на суші."
  kwf_sea_of_madness:0 "Море Божевілля"
  kwf_sea_of_madness_desc:0 "Битва — це хаос, наче шторм у морі. Щоб вижити, треба навчитися до нього пристосовуватися, і нам треба багато чого навчитися."
  kwf_same_time_tomorrow:0 "Завтра о тій самій годині"
  kwf_same_time_tomorrow_desc:0 "Рутина — це виживання.\nЩодня тренування повторюються.\nЩодня на пост заступає нова охорона.\nЩодня команда стає сильнішою.\nЗавтра буде те саме, і так ми живемо."
  kwf_no_shore_wide_enough:0 "Жоден берег не досить широкий"
  kwf_no_shore_wide_enough_desc:0 "Море може й скінчитися, але бій — ні. Ми не хочемо повертатися, але готуймося, адже жоден берег не буде для нас досить широким."

