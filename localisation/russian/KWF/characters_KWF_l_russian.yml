  FRM_rike_desc:0 "Райк — фанатик, але не релігійний. Він бачить полум'я, яке орудують пожежні маршали, як символи справжнього світу, світу, вільного від божевільного болота та безглуздих балачок болотяників. Більше за все він бажає, щоб вони всі згоріли. У цьому його фанатизм."

