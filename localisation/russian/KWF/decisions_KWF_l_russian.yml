l_russian:
  KWF_wargoals_dec_cat:0 "§7Солі для Соляного Трону!§!"
  KWF_attack_andale:0 "§RЖодних Канібалів на Кораблі§!"
  KWF_attack_andale_desc:0 "Існують межі, які ніхто не повинен переступати. Мешканці Андейлу переступили, і називають це життям. Поїдання собі подібних — це не виживання, це прокляття. Втоплений Король не розділить свій стіл із такими монстрами. Ми знищимо їх і покладемо край їхньому бенкету."
  KWF_attack_bos:0 "§gСталеві Горщики§!"
  KWF_attack_bos_desc:0 ""
  KWF_attack_rivet:0 "§5Плаваюче Місто§!"
  KWF_attack_rivet_desc:0 "Чим би воно не було зараз, колись це був авіаносець. Він має бути столицею на хвилях, маяком, що піднімається з моря. Ми візьмемо його і зробимо серцем нашого королівства."

