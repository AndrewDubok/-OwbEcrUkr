l_russian:
    ### TOOLTIPS
    GMN_gold_trading_tt:0 "Изменить §YОбщество в Аппалачах§!\nДоход крышек §G+15.00%§!\nЭффективность получения ресурсов §R-5.00%§!"
    GMN_refugee_decisions_tt:0 "Мы будем принимать беженцев из тех наций, которые §O[COR.GetName]§! захватит."
    GMN_share_lessons_tt:0 "Мы будем делиться нашими знаниями с другими свободными группами в Аппалачах. Это поможет нам всем стать ближе друг к другу."
    GMN_rookies_tt:0 "Новая партия новичков пополняет ряды"
    GMN_disagree_with_marshals_tt:0 "§RПожарные маршалы пошли по пути, который приведет к конфликту.§!"
    GMN_agree_with_marshals_tt:0 "§GПожарные маршалы кажутся хорошими соседями.§!"
    GMN_join_ecr_tt:0 "§YМы присоединимся к Республике Восточного Побережья§!"
    GMN_border_watch_tt:0 "Мы построим наблюдательные посты на границе"
    GMN_advisors_accepted_tt:0 "Разблокируем советников из принятых нами групп."
    GMN_accepted_hills_tt:0 "Мы интегрировали беженцев из §8Мононгахелы§!"
    GMN_accepted_cobalt_tt:0 "Мы интегрировали беженцев из §2Культа Кобальта§!"
    GMN_accepted_Lorentz_tt:0 "Мы интегрировали беженцев из §OСил Лоренца§!"
    GMN_accepted_onion_tt:0 "Мы интегрировали беженцев из §GОнионбурга§!"
    GMN_tt_no_aid_sent:0 "§RМы никого не отправляли на помощь этим людям. С чего бы нам ожидать, что мы чему-то научимся?§!"
    
    ###New Focuses###
    GMN_nf_a001:0 "Нахуй правительство"
    GMN_nf_a001_desc:0 "Ах, были же времена — мы поднимали ружья, чтобы свергнуть этих тиранов-фашистов, поднимали наши старые винтовки и пистолеты против тех, кто громогласно кричал о свободе, которую никогда не собирался дарить."
    GMN_nf_a002:0 "Мы предпочитаем, называться Либертарианцами"
    GMN_nf_a002_desc:0 "Только потому, что мы не любим правительство, выступаем за равенство и не позволяем людям владеть несколькими объектами под одной корпорацией, это вовсе не значит, что мы коммунисты! Ладно, может быть, мы и социалисты. Возможно."
    GMN_nf_a003:0 "Камень в трудном положении"
    GMN_nf_a003_desc:0 "Эта проклятая церковь думала, что будет отличной идеей хватать мирных жителей и заставлять их поклоняться какой-то чертовой каменной глыбе! Если бы мы не вмешались и не прогнали их, кто знает, какой ужас обрушился бы на весь регион?"
    GMN_nf_a004:0 "Открыть наши двери"
    GMN_nf_a004_desc:0 "Десятки беженцев разбросаны по ветру, пока Церковь Рокки продвигается всё дальше на юг, стремясь «отвоевать свою землю». Ужасы, обрушившиеся на мирных жителей, требуют немедленного внимания. В ответ ворота открыты, чтобы позволить жертвам этого чудовища с севера найти убежище на юге. Нам необходимо обеспечить безопасность и поддержку этим людям, а также подготовиться к возможным новым вызовам, связанным с наступлением Церкви Роки."
    GMN_nf_a005:0 "Вплоть до тракта"
    GMN_nf_a005_desc:0 "К северо-востоку от нас находятся шахтёры Мононгахелы — очень интересная группа. Они придерживаются схожих либертарианских идеалов, но никогда не объединялись так, как мы. Вместо этого их защищает местное ополчение — «Рейнджеры». Фэллон и Глава Рейнджеров знакомы уже очень давно — настолько давно, что Фэллон порой сам не понимает, как их дружба могла так затянуться. Но он никогда особо не задавался этим вопросом. В связи с ростом Культа Рокки, Фэллон решил навестить старого друга и попытаться договориться о сотрудничестве, которое принесло бы пользу обеим сторонам."
    GMN_nf_a006:0 "У холмов есть глаза"
    GMN_nf_a006_desc:0 "По мере того как мы развиваем сотрудничество с Мононгахелой, мы можем начать интегрировать некоторые из их поселений. Это первый шаг к тому, чтобы наши общества без границ действительно избавились от искусственных барьеров между нами."
    GMN_nf_a007:0 "Кровные Братья"
    GMN_nf_a007_desc:0 "Наконец настало время. Роки — приятная кучка пыли, парящая в задымлённом ветре, а Аппалачи наконец обрели хоть какую-то степень мира. Мононгахела может быть полностью интегрирована. Два брата, чьи узы были закалены войной и конфликтами, вновь объединяются."
    GMN_nf_a008:0 "Отомстим за нашего павшего брата"
    GMN_nf_a008_desc:0 "Наших друзей на севере изгнали из своих домов поклонники роки. Среди прибывающих беженцев одна группа принесла очень печальные новости."
    GMN_nf_a009:0 "Ветер в холмах"
    GMN_nf_a009_desc:0 "Мы не можем просто так сколотить термоядерный генератор из металлолома. Но мы можем построить несколько ветряных мельниц."
    GMN_nf_a010:0 "Созыв Совета"
    GMN_nf_a010_desc:0 "В нашем Собрании десятки советов, союзов и других представителей, которые собираются нерегулярно — единственные более-менее постоянные встречи проходят примерно раз в год или два. Вот и снова приближается это время, и у каждого есть что-то, что они хотят, чтобы мы рассмотрели."
    GMN_nf_a011:0 "О шахтерах и женщинах"
    GMN_nf_a011_desc:0 "Как общество, полностью зависящее в экономическом плане от мужчин и женщин, которые ломают камни в шахтах в поисках минералов и ценных пород, мы обязаны продолжать поддерживать их всем необходимым финансированием. Особенно уголь — мы чертовски любим уголь!"
    GMN_nf_a012:0 "Выход на рынок золота"
    GMN_nf_a012_desc:0 "В некоторых частях страны золото используется в качестве валюты — бог знает зачем. А в Аппалачах? Здесь электроника всегда была важна для производства. И раз мы продолжаем находить всё новые и новые залежи золота в наших шахтах, что мы делаем? Правильно — продаём его более умным людям."
    GMN_nf_a013:0 "Нефтеперерабатывающие заводы Аппалачей"
    GMN_nf_a013_desc:0 "Хотя сырые ресурсы могут продвинуть нас вперёд, этого определённо недостаточно, если мы не хотим ждать несколько месяцев, чтобы получить переработанные материалы. Как же мы собираемся это решить, спросите вы? Всё очень просто — перерабатывать их самостоятельно. Не может быть это так уж сложно, правда?"
    GMN_nf_a014:0 "Повысить стандарты безопасности"
    GMN_nf_a014_desc:0 "Хотя любое регулирование бизнеса — это безумие, Ассамблея получила несколько жалоб, и нам, возможно, придётся начать проверки безопасности и приостанавливать заявки на ресурсы, пока они наконец не начнут выполнять свою чёртову работу."
    GMN_nf_a015:0 "Мы любим Рабочие Союзы"
    GMN_nf_a015_desc:0 "Одна из ключевых структур в жизни обычного анархиста с Грин-Маунтин — это Рабочий Союз, который до войны многие бы восприняли совсем иначе. Сейчас, спустя столько времени, это скорее коллектив рабочих, которые координируются по разным причинам и на разной территории. Будучи одной из многочисленных организаций в Ассамблее, они постоянно просят дополнительную поддержку, чтобы помочь другим создавать свои союзы. Похоже, это действительно достойное дело."
    GMN_nf_a016:0 "Богатейшие Фермери в Аппалачи"
    GMN_nf_a016_desc:0 "С недавним возрождением тракторов фермерство в Аппалачах стало гораздо проще. Настолько, что даже если мы соберём лишь половину ожидаемого урожая, голод нам практически не грозит. Это, честно говоря, довольно необычно для нашего региона. Но благодаря этому мы теперь можем значительно увеличить экспорт зерна, а значит, и заработать гораздо больше крышек."
    GMN_nf_a017:0 "Возвращаясь к нашей истории"
    GMN_nf_a017_desc:0 "Живых, кто был в Харперс-Ферри, когда Братство обрушило на нас огненный ад, осталось совсем мало. Несколько оставшихся добрых людей, сражавшихся за свободу, были разорваны на части огнём с боевых вертолётов Братства. Ещё меньше тех, кто помнит, что сенатор Блэквелл, тогдашний местный лидер, сбежал задолго до атаки. Говорят, у него даже был собственный бункер. Пожалуй, пора вспомнить те события и успокоить Фэллона по этому поводу."
    GMN_nf_a018:0 "Очаг на границе"
    GMN_nf_a018_desc:0 "Там, где цивилизация исчезла, и человек с самым большим оружием — король, естественно, начинают формироваться определённые иерархии. Именно против таких порядков выступает наша конфедерация. Грин-Маунтин Бойз не позволяют тем, кто пытается угнетать других, проникать в наши земли, а остальное население поддерживает порядок на месте. Но мало кто помнит, что у Грин-Маунтин Бойз есть обычные работы, которыми они занимаются, когда не несут службу в ополчении. Обычно это не приносит большой доход, поэтому ведение фермерского хозяйства — самый распространённый способ заработать на жизнь. Это на самом деле большое преимущество: они могут прокормить себя и других, а после выхода на пенсию использовать свои военные навыки на благо сообщества. Недавно у нас как раз вышла на пенсию целая группа ветеранов — надеемся, что это поможет всем нам!"
    GMN_nf_a019:0 "Долгий путь к Пост-Аграризму"
    GMN_nf_a019_desc:0 "Индустриализация всегда была сложной темой в Аппалачах. До войны здесь действительно существовало множество предприятий, возвышавшихся над ландшафтом, но местные суеверия, связанные с трагической судьбой большинства поствоенных жителей региона, делают немногих желающими возрождать эти производства. Например, Мононга был практически развалинами — старые роботы из довоенного мира были разобраны ещё десятилетия назад, и сегодня в городе почти нечего использовать или восстанавливать. Тем не менее, мы не можем вечно оставаться аграрным обществом — нам нужно развиваться, пусть и без масштабных индустриальных комплексов, какими был довоенный мир."
    GMN_nf_a020:0 "Коллективный Исследовательский Фонд"
    GMN_nf_a020_desc:0 "Наука в Аппалачах часто становится предметом шуток из-за хронической нехватки финансирования. Местная шутка гласит: «Сколько аппалачцев нужно, чтобы заменить лампочку? Трое: первый звонит кому-то из Лоренца, а остальные трое платят ему!» — и в этом есть доля правды. Хотя школы и существуют, большинство из них сосредоточены на обучении ремеслам или тактике, а единственная настоящая научная программа — это крошечная школа в доме умершего доктора, где изучают химию. Если выделить немного средств и собрать несколько общественных пожертвований, возможно, мы доживём до того дня, когда для замены лампочки будет нужен всего один человек."
    GMN_nf_a021:0 "Экспорт нашего зерна"
    GMN_nf_a021_desc:0 "У нас действительно много фермерских хозяйств — даже больше, чем мастерских. Честно говоря, это немного странно, учитывая, что около тридцати процентов нашей территории — горы. Тем не менее, благодаря этому мы зарабатываем хорошие крышки на торговле зерном. И нам только на руку поддерживать этот поток, ведь зерна у нас с избытком — хватает и чтобы прокормить себя, и чтобы продавать другим."
    GMN_nf_a022:0 "Экономика торговцев"
    GMN_nf_a022_desc:0 "Притворяться, что торговля не движет экономикой практически всех поствоенных и даже большинства довоенных народов — это глупая игра в риск. Самодостаточность всегда была гордостью Аппалачей, но мы не против получать заслуженную прибыль за наш труд. По мере роста и развития защита наших торговцев становится естественной необходимостью. Раньше им приходилось самим нанимать наёмников, но предоставление бесплатной охраны укрепит доверие к нашим торговым путям и сделает нас надёжными союзниками на рынке караванов. Это шаг к стабильности и процветанию для всех наших сообществ."
    GMN_nf_a023:0 "Ремесленники на просторах"
    GMN_nf_a023_desc:0 "С развитием нашей экономики всё больше проявляется движение ремесленников, выходящее за рамки традиционных торговых навыков. Наука и настоящее искусство становятся всё более известными, а разработка новых технологий прогрессирует с каждым днём. Недавно даже в Мононге прошла выставка современного искусства — знак того, что культура и творчество начинают оживать вместе с экономикой."
    GMN_nf_a024:0 "Приближение к Зениту"
    GMN_nf_a024_desc:0 "Станки — важный шаг на пути к индустриализации, и благодаря упорному труду и большим инвестициям мы наконец получили наш первый комплект. Централизованная крупномасштабная промышленность при нынешней модели ведения дел — это безумие, но вполне реально сделать уже существующее разрозненное производство более эффективным. Такой подход позволит нам постепенно повышать производительность, не рискуя стабильностью наших городов."
    GMN_nf_a025:0 "Дом, милый дом"
    GMN_nf_a025_desc:0 "Не секрет, что Аппалачи — настоящий лабиринт для чужаков, пытающихся вникнуть в его устройство. После войны заселение региона было настоящим испытанием, ведь большинство карт Аппалачей хранятся именно здесь, а те, что находятся за пределами, часто были захвачены поселенцами, прибывшими в 2120-х годах. А те немногие карты, что всё ещё остались вне региона или, не приведи бог, были созданы после войны, редко содержат достаточно деталей для эффективной перевозки или торговли. Но каждый настоящий аппалачец знает каждую гору наизусть. И вот недавно появилось несколько картографов, которые начали создавать новые карты — так что даже чужаки вскоре смогут получить приличные карты для освоения и торговли."
    GMN_nf_a026:0 "Использование старых убежищ"
    GMN_nf_a026_desc:0 "Разбросанные по нашей территории довоенные бункеры выживальщиков оставляют шрамы на земле, напоминая о параноидальных и суеверных временах, когда апокалипсис казался неизбежным. Многие из них остались нетронутыми — историческими памятниками, охраняемыми местной милицией, которая чтит идеалистические взгляды старого мира. Но всё больше людей предлагает использовать эти бункеры и материалы внутри них, ведь многие подозревают, что там хранятся инструменты для производства оружия — ведь те, кто их строил, были людьми, которые очень-очень любили оружие. И кто их в этом обвинит?"
    GMN_nf_a027:0 "Оружие против тирании"
    GMN_nf_a027_desc:0 "Время от времени в Аппалачах случается что-то неладное. В один год появилась новая группа Братства, в другой - наёмники из Вирджинии. Чёрт возьми, однажды толпа начала поклоняться гигантскому мотыльку. Спустя 200 лет Фэллоу чувствует это в своих костях. Что-то грядёт, и нам нужно запасаться оружием."
    GMN_nf_a028:0 "Оружие от народа, и для народа"
    GMN_nf_a028_desc:0 "200-летнее ржавое оружие может дать лишь ограниченный эффект. В какой-то момент нам придётся делать собственное оружие с нуля. Честно говоря, этот момент должен был наступить ещё 190 лет назад. Но вот мы здесь."
    GMN_nf_a029:0 "В аду нет ярости"
    GMN_nf_a029_desc:0 "Женщина так же заинтересована в борьбе за свою свободу, как и мужчина — почему бы не привлечь их к нашему делу?"   
    GMN_nf_a030:0 "Поднимем бокал за свободу"
    GMN_nf_a030_desc:0  "Больше оружия — больше свободы, вот и всё."  
    GMN_nf_a031:0 "Зеленей зелёного"
    GMN_nf_a031_desc:0 "Иногда трудно вспомнить, что 200 лет назад большинство из нас, ребят с Грин-Маунтина, были просто добрыми старыми мальчишками, которые почти ничего не знали о войне. Надеюсь, эти новобранцы научатся этому, пролив чуть меньше крови, чем мы."
    GMN_nf_a032:0 "Вид с высоты птичьего полета"
    GMN_nf_a032_desc:0 "Башни наблюдения в холмах это хорошо, но парить над головой ещё лучше."
    GMN_nf_a033:0 "Старые руководства"
    GMN_nf_a033_desc:0 "Многие считали, что эти старые руководства по лётной эксплуатации лучше бы разжечь. Но спустя два столетия они выглядят ужасно глупо, не правда ли?"
    GMN_nf_a034:0 "Ремонт кукурузников"
    GMN_nf_a034_desc:0 "Самолёты, ржавеющие в сараях по всей Аппалачии, возможно, не истребители, но их всё равно стоит восстанавливать."    
    GMN_nf_a035:0 "Проложите взлетно-посадочные полосы"
    GMN_nf_a035_desc:0 "Эти старые самолёты не могут просто взлетать и садиться на парковке — им нужны более длинные участки асфальта или пустые поля."  
    GMN_nf_a036:0 "Отбомбились!"
    GMN_nf_a036_desc:0 "Обшаривая всю нашу территорию, нам удалось собрать достаточно деталей для нескольких самолётов."    
    GMN_nf_a037:0 "Вуууу Хуууу!"
    GMN_nf_a037_desc:0 "Небольшая группа наших людей уже хорошо осваивает управление этими самолётами."   
    GMN_nf_a038:0 "Услуги для Пустоши"
    GMN_nf_a038_desc:0 "Учитывая, насколько разрозненной и слабо регулируемой является наша милиция, неудивительно, что большинство наших бойцов известны тем, что берут дополнительную, в основном наёмническую, работу помимо патрулирования и прочих обязанностей."
    GMN_nf_a039:0 "Защита шахт Мононгахилы"
    GMN_nf_a039_desc:0 "Мононгахела - один из наших самых близких союзников в этом безумном мире, и, честно говоря, они крупнейшие заказчики наших наёмнических услуг. Особенно с Северной Стражей, которая охраняет их границу от рейдеров. Чем больше мы работаем вместе, тем выгоднее сделки по товарам и тем больше крышек мы зарабатываем. Только что поступил новый контракт на несколько их шахт — так почему бы не поддержать их ещё сильнее?"
    GMN_nf_a040:0 "Охрана миссионеров Атома"
    GMN_nf_a040_desc:0 "Церковь Атома - это довольно странный культ с севера. Одно из их ответвлений решило, что будет хорошей идеей создать религиозную организацию на юге, в болотах, однако та, которая нам действительно нравится, находится чуть севернее Харперс-Ферри. Их маленькая часовня в Хельве — центр их региона влияния. Они скорее региональное движение, чем полноценное правительство, и было бы глупо их игнорировать или бойкотировать."
    GMN_nf_a041:0 "Защита беззащитных"
    GMN_nf_a041_desc:0 "В Онионбурге наркотики - это закон, а местное население мало известно своей способностью защищать себя или заниматься чем-то, кроме поиска и употребления новых доз. Предложив наши услуги по охране немногим ещё вменяемым представителям их руководства, мы легко сможем извлечь выгоду из острой нехватки порядка и контроля в этом районе."
    GMN_nf_a042:0 "Охрана Гауссманов"
    GMN_nf_a042_desc:0 "Эти умники, что следуют за Лоренцом, не лучшие бойцы, несмотря на их хорошее оружие. Может, если мы им поможем, они подкинут нам парочку."
    GMN_nf_a043:0 "Уроки из компаний"
    GMN_nf_a043_desc:0 "Мы не ожидали, что все отправленные нами в поход солдаты вернутся. Но те, кто вернулся, могут рассказать нам кое-что о борьбе с культистами."
    GMN_nf_b001:0 "Фанатики у ворот"
    GMN_nf_b001_desc:0 "Мы знали, что этот день настанет. Факелы камнепоклонников горят по ночам всего в нескольких милях от наших самых дальних поселений."
    GMN_nf_b002:0 "Да здравствует Новая Вера"
    GMN_nf_b002_desc:0 "Церковь повержена, но Новая Вера Аппалачей продолжает процветать. Истинное и мудрое поклонение Рокки, которое объединяет через мир, а не через кровопролитие. Даже ополчение её поддерживает!"
    GMN_nf_b003:0 "Ранняя кончина"
    GMN_nf_b003_desc:0 "До нас дошли удивительные новости: «Церковь» Рокки наконец разрушена. Отчёты неясны относительно того, кто именно это сделал, но главное — Аппалачи избавлены от ещё одной угрозы. Правда, есть и обратная сторона — теперь на их место могут прийти новые, возможно, не менее опасные группы. Тем не менее, этот успех даёт нам передышку и шанс укрепить безопасность региона."
    GMN_nf_b004:0 "Искоренить культ"
    GMN_nf_b004_desc:0 "Разве эти любители рока проявили бы к нам милосердие, если бы они выломали наши ворота? Мы уже однажды позволили им уйти от ответственности, и вот, к чему это привело."
    GMN_nf_b005:0 "Солнце восходит над Аппалачами"
    GMN_nf_b005_desc:0 "После разрешения кризиса Роки мы можем снова обратить внимание на наших людей."
    GMN_nf_b006:0 "Кровавые Аппалачи"
    GMN_nf_b006_desc:0 "Мы должны были понять, что как только один культ исчезнет, ​​другой устроит какой-нибудь беспорядок."
    GMN_nf_b007:0 "Под новым руководством"
    GMN_nf_b007_desc:0 "Фермеры Онионбурга благодарят нас за спасение от Культа Кобальта. Но, возможно, «спасение», не совсем верное слово..."
    GMN_nf_b008:0 "Хватит с нас ебучих культов"
    GMN_nf_b008_desc:0 "Если мы чему-то и научились за последние несколько лет, так это тому, что культы сплошная беда. Неважно, чему они поклоняются: камням, атомам или чёртовым мотылькам. В наших краях появляется культ, и мы собираемся надрать им задницы!"
    GMN_nf_b009:0 "Разборка и включение"
    GMN_nf_b009_desc:0 "Мы не можем понять, с какими механизмами возились эти умники. Хотя некоторые детали вполне могли подойти для электростанции Ватоги."
    GMN_nf_b010:0 "Украденная мудрость"
    GMN_nf_b010_desc:0 "Найти чертежи для изготовления винтовки Гаусса - это одно, но нам еще нужно выяснить, как изготовить половину этих деталей."
    GMN_nf_b011:0 "Братья по оружию"
    GMN_nf_b011_desc:0 "Последняя перепалка заставила некоторых людей активизироваться."
    GMN_nf_b012:0 "Прикрывайте спины друг друга"
    GMN_nf_b012_desc:0 "Наши друзья на севере понимают, что мы единственное, что у них есть, чтобы сдерживать безумцев. Будет лучше, если мы продолжим тесно сотрудничать."
    GMN_nf_b013:0 "Использовать то, чему нас научили"
    GMN_nf_b013_desc:0 "Теперь, когда рейнджеры решили сражаться с нами, они пожалеют, что научили нас своим методам ведения боя."
    GMN_nf_b014:0 "Уроки холмов"
    GMN_nf_b014_desc:0 "Бои в северных горах научили наших лидеров некоторым вещам."
    GMN_nf_b015:0 "Ещё один кризис разрешен"
    GMN_nf_b015_desc:0 "Очередной аппалачский кавардак уже позади. Теперь нужно просто готовиться к следующему."
    GMN_nf_b016:0 "Растущая идентичность Аппалачей"
    GMN_nf_b016_desc:0 "Буря прошла. Наши люди в безопасности и могут свободно жить своей жизнью. Возможно, мы все немного разные, но нас объединяет одно. Это наш дом."
    GMN_nf_b017:0 "Зелёные пастбища"
    GMN_nf_b017_desc:0 "Многие фермеры Онионбурга переезжают за пределы своей старой долины. Они знают, что мы их защитим, поэтому находят работу на нашей территории."
    GMN_nf_b018:0 "Большая клюквенная поляна"
    GMN_nf_b018_desc:0 "Много лет назад недалеко от Ватоги было болото, идеально подходящее для выращивания клюквы. Некоторые из жителей Онионбурга считают, что оно может снова стать таким."
    GMN_nf_b019:0 "Высшее образование"
    GMN_nf_b019_desc:0 "Университет Ватоги последние два столетия был всего лишь площадкой для самовольного переселения. Эти умники хотят переехать туда и организовать исследовательскую лабораторию. Может быть, когда-нибудь они смогут научить нас, как работают магниты."
    GMN_nf_b020:0 "Поделиться секретами"
    GMN_nf_b020_desc:0 "Лоренц знает, что наши ребята лучше подходят для боя, чем его лабораторные халаты. Он скрепя сердце поделился с нами секретами изготовления их винтовок. Теперь нам осталось только разобраться, что, чёрт возьми, такое ферромагнитная пуля и как её сделать."
    GMN_nf_b021:0 "Святая пещера"
    GMN_nf_b021_desc:0 "Большинство людей обходили стороной пещеры к востоку от Ватоги. Кому захочется там слоняться, учитывая радиацию и слухи о гигантских летучих мышах? Оказывается, поклонники радиации так и поступают."
    GMN_nf_b022:0 "Скала, достойная поклонения"
    GMN_nf_b022_desc:0 "Паломники, прибывшие в странную пещеру к востоку от Ватоги, обнаружили совершенно уникальный камень. Не тот, которому поклонялись рокисты, но, чёрт возьми, это нечто особенное."
    GMN_nf_b023:0 "Безопасные тропы"
    GMN_nf_b023_desc:0 "Наши отношения с рейнджерами сейчас самые лучшие за всю историю. Они даже позволяют нам помочь им расчистить несколько своих самых заброшенных троп."
    GMN_nf_b024:0 "Пути горцев"
    GMN_nf_b024_desc:0 "Опытные рейнджеры согласились обучить наше «зеленое» руководство тому, как вести боевые действия в их холмах."
    GMN_nf_b025:0 "Советы Аппалачей"
    GMN_nf_b025_desc:0 "Было бы неправильно продолжать созывать советы, не предоставляя нашим новым соседям мест за столом."
    GMN_nf_b026:0 "Сердце тьмы"
    GMN_nf_b026_desc:0 "Крысиное логово, которое раньше было столицей страны, всегда вызывало беспокойство у нашего народа. Кто знает, что там творилось последние пару веков?"
    GMN_nf_b027:0 "Всегда бдительный"
    GMN_nf_b027_desc:0 "Дикие мутанты, империалисты, очередной проклятый культ. Кто знает, что там таится в Столичной Пустоши? Что бы это ни было, мы должны быть готовы."
    GMN_nf_b028:0 "Защита народа"
    GMN_nf_b028_desc:0 "Как мы и ожидали, к нам пришли монстры с востока, и мы дали им пинка под зад. Люди, пытающиеся там устроить свою жизнь, очень благодарны."
    GMN_nf_b029:0 "Порядочные люди"
    GMN_nf_b029_desc:0 "Кто бы мог подумать, что после окончания Великой войны округ Вашингтона населят люди, разделяющие наши идеалы?"
    GMN_nf_b030:0 "Возведение мостов"
    GMN_nf_b030_desc:0 "Ребята с востока хорошие люди. Нам следует подружиться с такими соседями."
    GMN_nf_b031:0 "Другой век, проблемы те же"
    GMN_nf_b031_desc:0 "Мы должны были ожидать, что Вашингтон станет домом"
    GMN_nf_b032:0 "Освободить угнетенных"
    GMN_nf_b032_desc:0 "После смерти тиранов жители Столичной Пустоши встречают нас как героев. В отличие от того, что говорило старое правительство, мы говорим правду."
    GMN_nf_b033:0 "Гниль остается"
    GMN_nf_b033_desc:0 "Почему нас не удивляет, что дьяволы, уничтожившие мир, не ушли и пытаются сделать это снова? Мы им этого не позволим."
    GMN_nf_b034:0 "Победа, к которой готовились 200 лет"
    GMN_nf_b034_desc:0 "Возможно, на это ушло более двух столетий борьбы, но мы, наконец, победили ублюдков, которые захватили Америку и превратили ее из страны свободных в страну рабов."
    GMN_nf_b035:0 "Эта зловещая улыбка"
    GMN_nf_b035_desc:0 "Фэллоу никогда не доверял Уайтспрингс Менеджмент. Кучка невидимых элит, которые просто раздают вещи тем, кто у них на побегушках? Честно говоря, нам следовало бы догадаться, что тут есть что-то более тёмное."
    GMN_nf_b036:0 "Разграбление Уайтспрингса"
    GMN_nf_b036_desc:0 "Респонденты отказываются видеть здравый смысл."
    GMN_nf_b037:0 "Снять маску с М.О.Д.У.С."
    GMN_nf_b037_desc:0 "И мы, и Респонденты получили кое-какие ранения в этой борьбе, но, в конце концов, у нас больше общего, чем различий. Им просто нужно снять мушки с глаз."
    GMN_nf_b038:0 "Что это?"
    GMN_nf_b038_desc:0 "Похоже, в этом старом бункере лежали какие-то интересные вещи."
    GMN_nf_b039:0 "Пламя и кровь на болотах"
    GMN_nf_b039_desc:0 "Из Южной Вирджинии доносится шум. Пора бы нам всё-таки взглянуть."
    GMN_nf_b040:0 "В Болота"
    GMN_nf_b040_desc:0 "Еще одна группа сумасшедших, с которой придется иметь дело, на этот раз в Вирджинии."
    GMN_nf_b041:0 "Схожие интересы"
    GMN_nf_b041_desc:0 "Пожарные Маршалы такие же, как мы, поселенцы, пытающиеся выжить, сталкиваясь с толпами безумцев. Почему бы нам не помогать друг другу, когда это возможно?"
    GMN_nf_b042:0 "Они не такие, как мы"
    GMN_nf_b042_desc:0 "На первый взгляд может показаться, что у пожарных маршалов с нами много общего. Однако что-то не так..."
    GMN_nf_b043:0 "Рад тебя знать"
    GMN_nf_b043_desc:0 "Представьте себе, что вы застряли на ржавом корабле на 200 лет. Неудивительно, что они уперлись и не отступили. Но будут ли они хорошими соседями?"
    GMN_nf_b044:0 "Советы Вирджинии"
    GMN_nf_b044_desc:0 "После ликвидации Маршалов у нас наконец появляется возможность начать координацию общества на юго-востоке. Хотя напрямую интегрировать регион не обязательно, создание советов и собраний для местных жителей и организаций поможет обеспечить хоть какую-то стабильность и предотвратить повторение насилия. По крайней мере, на это есть надежда."
