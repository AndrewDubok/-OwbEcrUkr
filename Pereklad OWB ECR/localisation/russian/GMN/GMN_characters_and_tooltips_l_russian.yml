    ### CHARACTERS
    GMN_green_fallon_name:0 "Грин Фэллоу"
    green_fallon_desc:0 "Грин Фэллон ведёт добрую борьбу дольше, чем помнят даже большинство гулей, и останавливаться не собирается. До войны Фэллон и другие парни с Грин-Маунтин были партизанами, сражавшимися с тиранией Соединённых Штатов и путешествовавшими вдоль Восточного побережья. Когда упали бомбы, Грин-Маунтин бойз превратились в настоящую бродячую армию, скрываясь в глухих уголках страны и отражая или отступая от любых попыток федерального правительства остановить их. После взрывов Фэллон и другие были несчастливыми жертвами радиации и превратились в гулей. С тех пор Фэллон и его гули заботятся о начинающихся общинах поблизости. Теперь он наблюдает за руинами Вашингтона и готов прогнать любого, кто приблизится. Никто не убил его за последние 250 лет, и он планирует прожить ещё столько же."
   
