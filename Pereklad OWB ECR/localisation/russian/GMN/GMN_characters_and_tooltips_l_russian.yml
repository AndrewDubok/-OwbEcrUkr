    ###Power Balance###
    GMN_sectarian_conflict:0 "Межконфессиональный конфликт"
    GMN_sectarian_conflict_desc:0 "Аппалачи полны всевозможных чудаков, чудаков и людей, которые просто пытаются жить своей жизнью. Впуская в свои края тех, кто бежит из Церкви Роки, мы должны быть осторожны и не позволить их различиям расколоть нас."
    GMN_conflict_crisis:0 "Межконфессиональный кризис"
    GMN_conflict_crisis_desc:0 "Наши холмы оживают от звуков выстрелов. Различные культы сражаются на наших улицах и в наших поселениях. Люди, которых мы пытаемся защитить, теперь принимают сторону в битвах, которые им не положено вести."
    GMN_conflict_open_fighting:0 "Открытое противостояние"
    GMN_conflict_open_fighting_desc:0 "Наши холмы оживают от звуков выстрелов. Различные культы сражаются на наших улицах и в наших поселениях. Люди, которых мы пытаемся защитить, теперь принимают сторону в битвах, которые им не положено вести."
    GMN_conflict_frequent_squabbles:0 "Частые ссоры"
    GMN_conflict_frequent_squabbles_desc:0 "Разногласия между различными культурами на нашей территории часто приводят к насилию. Уличные драки и периодические перестрелки отбивают у многих желание уходить далеко от дома."
    GMN_conflict_occsaional_problems:0 "Редкие проблемы"
    GMN_conflict_occsaional_problems_desc:0 "К сожалению, борьба между различными культурами на нашей территории порой перерастает в насилие. Обычно это касается лишь горстки людей, но существует риск эскалации."
    GMN_conflict_harmony:0 "Умиротворённый народ"
    GMN_conflict_harmony_desc:0 "Аппалачи, может, и полны чудаков и чудаков, но наши различия не создают проблем. В конце концов, зачем воевать, когда у нас уже есть один безумный культ, пытающийся нас расколоть?"
    GMN_conflict_peaceful:0 "Мирные отношения"
    GMN_conflict_peaceful_desc:0 "Аппалачи, может, и полны чудаков и чудаков, но наши различия не создают проблем. В конце концов, зачем воевать, когда у нас уже есть один безумный культ, пытающийся нас расколоть?"
    GMN_conflict_rare_grumblings:0 "Редкие ворчания"
    GMN_conflict_rare_grumblings_desc:0 "В целом, наши люди умеют поддерживать порядок. Иногда раздаётся тихий шёпот, когда сектант проводит церемонию на главной площади, но дальше этого дело не идёт."
    GMN_conflict_occasional_debate:0 "Случайные споры"
    GMN_conflict_occasional_debate_desc:0 "Конечно, наличие стольких разных культур и вер в одном месте неизбежно привело бы к разногласиям. Но споры ведутся довольно цивилизованно. Хотя недавно кто-то обозвал культиста Кобальта «Радтардом»."
    GMN_conflict_moderate:0 "Умеренные конфликты"
    GMN_conflict_moderate_desc:0 "Противостояние между различными культурами на нашей территории редко выходит за рамки резких слов. Тем не менее, простые горцы с тревогой слышат бурные споры на улицах."
