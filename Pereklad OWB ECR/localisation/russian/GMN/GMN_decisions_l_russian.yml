l_russian:
    GMN_sectarian_conflict_category:0 "Межконфессиональный конфликт"
    GMN_sectarian_conflict_category_desc:0 "Сектанты, которых мы изгнали много лет назад, разоряют земли к северу от нас. Люди бегут в наши леса и просят убежища. Чем больше мы принимаем, тем сильнее это на нас влияет."
    GMN_onionburg_refugees_decision:0 "Принять Онионбургских Фермеров"
    GMN_onionburg_refugees_decision_desc:0 "В основном мирные фермеры, жители Онионбурга были плохо подготовлены к столкновению с толпой жестоких культистов. Те, кто сумел спастись, просят нас защитить их, пока они работают на наших полях."
    GMN_lorentz_refugees_decision:0 "Принять Лоренцских Беженцев"
    GMN_lorentz_refugees_decision_desc:0 "Жители Лоренцких Сил всегда были немного странными, но они предлагают отличное оружие, если мы примем их среди своих."
    GMN_cobalt_refugees_decision:0 "Принять Кобальтских Культистов"
    GMN_cobalt_refugees_decision_desc:0 "Люди могут с опаской относиться к беглецам — поклонникам радиации, но жители Кобальта никогда особо не доставляли проблем."
    GMN_monongahela_refugees_decision:0 "Принять Мононгхельских Беженцев"
    GMN_monongahela_refugees_decision_desc:0 "Мало кто выбрался из холмов к северу от наших лесов. Мы знаем народ Мононгхелы — они держатся особняком, им просто нужно место для поселения."
    GMN_exploit_onionburg_decision:0 "Силой отправить Онионбургских в поля"
    GMN_exploit_onionburg_decision_desc:0 "Если Онионбургерские хотят укрыться в наших горах, то, по крайней мере, они могли бы помочь нам обрабатывать наши поля."
    GMN_exploit_lorentz_decision:0 "Захватить винтовки Гаусса"
    GMN_exploit_lorentz_decision_desc:0 "Гаусс-винтовки умников Лоренца лучше попадут в руки наших парней, которые их защищают."
    GMN_exploit_cobalt_decision:0 "Загнать культистов Кобальта в шахты"
    GMN_exploit_cobalt_decision_desc:0 "На нашей территории есть шахты, слишком облученные для обычного шахтёра. Но ведь этим людям нравится радиация, верно? Они должны тосковать по шахтам!"
    GMN_exploit_monongahela_decision:0 "Привести рейнджеров в строй"
    GMN_exploit_monongahela_decision_desc:0 "У рейнджеров Мононгахелы нет времени на отдых. Рокисты уже почти у наших ворот! Верните их в строй!"
    GMN_exploit_manpower_decision:0 "Привлечение беженцев к службе"
    GMN_exploit_manpower_decision_desc:0 "Беженцы на нашей территории должны готовиться защищать свой новый дом!"
    GMN_exploit_wealth_decision:0 "Собирать плату"
    GMN_exploit_wealth_decision_desc:0 "Беженцы на нашей территории не могут просто так тусоваться на частной территории. Им нужно платить аренду!"
    GMN_exploit_firearms_decision:0 "Изъять оружие у беженцев"
    GMN_exploit_firearms_decision_desc:0 "В этой битве нам понадобится всё оружие, которое только можно раздобыть. Забирайте оружие у беженцев - оно им не пригодится, если наше ополчение потерпит неудачу!"
    GMN_support_wealth_decision:0 "Оказать финансовую помощь"
    GMN_support_wealth_decision_desc:0 "Беженцы, живущие на нашей территории, едва добрались сюда, имея на себе одежду и всё, что могли унести. Им нужны крышки, и мы можем им помочь."
    GMN_allocate_excess_food_decision:0 "Пожертвовать излишки урожая"
    GMN_allocate_excess_food_decision_desc:0 "Нам нужно кормить гораздо больше людей, но еды у нас предостаточно. Лучше раздать её нуждающимся, чем продавать за пределами Аппалачей."
    GMN_make_space_available_decision:0 "Отчистить место для беженцев"
    GMN_make_space_available_decision_desc:0 "У нас достаточно места для беженцев, чтобы создавать новые сообщества. Возможно, мы даже извлечём из этого что-то хорошее."
    GMN_work_with_refugees_decision:0 "Вести переговоры с беженцами"
    GMN_work_with_refugees_decision_desc:0 "Мы готовимся к войне ради нашего выживания, но это не значит, что мы не должны уделять время тому, чтобы выслушать беспокойство нашего народа."
    GMN_war_support_decision:0 "Дать обещания отвоевать их земли"
    GMN_war_support_decision_desc:0 "Изгнание культистов Роки с наших земель - это только начало. Беженцы поймут, что мы намерены вернуть и их родные земли."
