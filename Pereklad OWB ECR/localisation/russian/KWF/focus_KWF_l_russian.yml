l_russian:
  kwf_only_the_sea:0 "Счастливого пути"
  kwf_only_the_sea_desc:0 "Счастливого пути\n\nНаш танкер отправляется в путь."
  kwf_our_compass:0 "Когда он сломался"
  kwf_our_compass_desc:0 "Наш танкер едва не поглотило море."
  kwf_we_shore:0 "Давайте будем свободны"
  kwf_we_shore_desc:0 "Прилив\n\nи\n\nотлив."

  kwf_real_food:0 "Наконец-то настоящая еда"
  kwf_real_food_desc:0 "На нашем камбузе еда была небогатой - грибы, радиоактивная рыба и редкие овощи, выращенные ещё более редкими специалистами. Но теперь, когда у нас твёрдая почва под ногами, у меня появилось больше ингредиентов для работы."
  kwf_burn_grove:0 "Сжечь рощу"
  kwf_burn_grove_desc:0 "Эти племена цепляются за свои рощи, словно само болото – святое. Пусть они сгорят вместе с ним. Мы захватим их земли, сломим их дух и привяжем их руки к нашей работе."
  kwf_root_tea:0 "Пейте чай из корня"
  kwf_root_tea_desc:0 "Жители Эдема шепчутся о корнях, заваренных в чае, горьком напитке, который, как говорят, символизирует гармонию с болотом. «Мы - дети сада, как и они», - сказал Делмар. «Мы не должны быть врагами этим людям». Не вижу смысла, но стоит попробовать."
  kwf_salt_the_soil:0 "Соль в почве"
  kwf_salt_the_soil_desc:0 "Болота могут накормить слабых, но соль в конце концов забирает всё. Огнем и цепями, непростыми договорами или горькими пойлами мы добились своего законного места. Теперь, пропитанная кровью, потом и трудом, земля будет служить нам."
  kwf_cradle_of_rust:0 "Колыбель ржавчины и водорослей"
  kwf_cradle_of_rust_desc:0 "Наш первый оплот на суше далеко не сверкающий город, а лишь гавань, полная железных обломков. И всё же она наша. Из этой колыбели ржавчины мы вырастим нечто более сильное, дом, который не сможет снести ни один шторм."
  kwf_manifesto:0 "Хранители находок"
  kwf_manifesto_desc:0 "Два века поиска пищи в море научили нас обращаться с объедками, но земля хранит ещё более ценные сокровища. Машины, инструменты, забытые хранилища, погребённые в грязи, - всё, что мы находим, мы сохраняем. Никто другой не имеет на это права, ибо никто другой не пережил того, что мы."
  kwf_drills_in_mud:0 "Закопаться в грязи"
  kwf_drills_in_mud_desc:0 "Армия, рождённая в море, не может маршировать по суше, не спотыкаясь. Если мы хотим сражаться с болотными племенами и защищать Растпорт, гарпунерам придётся освоить новые приёмы. Грязь научит их стоять, а их учения закрепят этот урок."
  kwf_finders_keepers:0 "Манифест мародёра"
  kwf_finders_keepers_desc:0 "Мы берём то, что нам нужно, чиним то, что можем, и обходимся остальным. Болото нас не примет, но всё равно накормит. Ничто не пропадает зря и ничего не остаётся позади."
  kwf_echoes_of_depths:0 "Эхо с глубин"
  kwf_echoes_of_depths_desc:0 "Годами мы думали, что нас ведёт только Соль. Но ещё глубже, под волнами, слышны отголоски другого голоса. Более мягкого. Терпеливого. Он призывает нас не утонуть, а пустить корни, испить и сохранить."
  kwf_beneath_the_salt:0 "Под солью"
  kwf_beneath_the_salt_desc:0 "Я ходил по палубам и по болотам, и в обоих слышал один и тот же голос. Соль не лжёт. Она связывает плоть, она связывает почву, она связывает нас. Под её тяжестью лежит Сад, терпеливо ожидающий. Если мы преклонимся перед его истиной, он поднимет нас - не как моряков или изгоев, а как Хранителей. Приходите, пройдём под солью вместе."
  kwf_dry_command:0 "Сухая команда"
  kwf_dry_command_desc:0 "Пусть культисты распевают о своей соли и своём саде. Истинная сила команды заключается не в видениях, а в порядке, записях и командовании. Моё слово - прилив, который ведёт нас, и с гроссбухом в руках мы проложим курс, который не сможет сбить с пути никакое заблуждение." 
  kwf_rusted_few:0 "Немного ржавчины"
  kwf_rusted_few_desc:0 "Наше путешествие оставило нас заржавевшими, но не сломанными. Одни цепляются за шёпот сада, другие – за сталь своих гарпунов. Меня мало волнует форма их веры, лишь то, что они сражаются. Когда нагрянет буря, я призову тех, у кого ещё есть соль в жилах. Остальные могут отойти в сторону."
  kwf_smoke_on_water:0 "Дым над водой"
  kwf_smoke_on_water_desc:0 "Болота будут гореть, и дым будет подниматься над водой, словно предупреждение всем, кто попытается встать у нас на пути. Мы жили все эти годы не для того, чтобы поклоняться лжепророкам и болотным призракам. Эта война закончится, когда мы окажемся на твёрдой земле, или не закончится вовсе."

  kwf_glow_in_the_smoke:0 "Свечение в дыму"
  kwf_glow_in_the_smoke_desc:0 "Дым клубится над водой, и в нём я вижу беду. И атомный народ, и огненный народ поглощены жаром, не думая о будущем. Дым не ешь, рагу не сваришь при ложном свете. Если оставить их гореть и светиться, они поглотят всё болото. Лучше всего потушить их, прежде чем они испортят то, что осталось."
  kwf_radioactive_love:0 "Радиоактивная любовь"
  kwf_radioactive_love_desc:0 "Эти люди преклоняются перед своей Троицей: Отцом, Сыном и Святым Свечением. Глупцы, скажут некоторые. Но я вижу кое-что ещё. Соляной Бог не чужд свету, его сад тому доказательство. Если я смогу показать им, что Сияние это Его огонь, а Сад Его Эдем, то их Троица примет нас как братьев по вере."
  kwf_ain_no_sunshine:0 "Никаких солнечных лучей"
  kwf_ain_no_sunshine_desc:0 "Некоторых уже не спасти. Их свечение не ведёт к жатве, а лишь к могилам. В грязи нет пощады. Чтобы сохранить своё, мы должны погасить их свет, устоять на своём и упорствовать. Лучше совсем не видеть солнца, чем неправильное."
  kwf_burning_desire:0 "Жгучие желания"
  kwf_burning_desire_desc:0 "Эти пожарные сжигают всё, к чему прикасаются, пока не останется ничего, что можно было бы есть или за что держаться. Но огонь не просто уничтожает. Он жарит, закаляет, он помогает людям выжить в холодные ночи. Если мы сможем обуздать их огонь, он сможет накормить нас."
  kwf_hotter_than_hell:0 "Горячее, чем в аду"
  kwf_hotter_than_hell_desc:0 "Пожарный ищет тепла в угасающем огне. Пусть он сожжёт его дотла и оставит холодным."

  kwf_herons_sing_no_more:0 "Цапли больше не поют"
  kwf_herons_sing_no_more_desc:0 "Они засели на ржавом заводе «Посейдон» и раскрутили какую-то штуковину, которую называют Великим Колесом. Какие бы знания они ни давали, это всего лишь машины, трущиеся друг о друга. Пора их остановить."
  kwf_turn_turn_turn:0 "Поворот"
  kwf_turn_turn_turn_desc:0 "Они зовут своего морского бога Посейдоном; мы зовём своего – Соляным богом. Имена разные, глубины одинаковые. Верующие клянутся, что их Колесо вращается его рукой, а мы клянёмся, что приливы подчиняются нашим. Оба варианта не могут быть правы. Колесо повернётся, и в этом сезоне оно повернётся для нас."
  kwf_wheel_in_the_sky:0 "Колесо в небе"
  kwf_wheel_in_the_sky_desc:0 "Другие проливали кровь за это растение, прежде чем эти культисты вышвырнули их. Они убеждены, что колесо спасёт их. Мы не можем позволить им оставить его себе. Если Колесо действительно говорит, оно заговорит за нас, как только мы вырвем его из их рук."
  kwf_heard_it_through_the_swampvine:0 "Услышал это через болотную лозу"
  kwf_heard_it_through_the_swampvine_desc:0 "Болото шептало о том, что время Эдема подходит к концу. Мы уловим эти шепоты, превратим их в правду и задушим их собственной лозой."
  kwf_the_sound_of_mire:0 "Звук болота"
  kwf_the_sound_of_mire_desc:0 "Эдем обещал новый сад, а дал лишь гниль. Лишь журчание болота под ногами. Пусть болото навсегда заглушит их голоса."
  kwf_muddy_mire:0 "Грязная трясина войны"
  kwf_muddy_mire_desc:0 "Болота замедляют каждый шаг, но мы научились продираться сквозь них. Грязь учит терпению и закаляет спину. Земля тяжела, но она закаляет волю."
  kwf_mud_tax:0 "Налог на грязь"
  kwf_mud_tax_desc:0 "Жизнь на берегу не бесплатна. Каждая крыша, каждый инструмент и каждая стена стоят денег или крови, а чаще всего и того, и другого. Люди жалуются на стоимость этих сборов, но резервы растут, а вместе с ними и наша способность торговать и строить."
  kwf_wheel_of_fortune:0 "Колесо фортуны"
  kwf_wheel_of_fortune_desc:0 "Жрецы Посейдона говорят, что их Колесо вращает саму судьбу, давая им ответы от морских богов. Не знаю. Мне оно напоминает сломанный кусок металла, разбрасывающий искры. Но если оно помогает нам учиться, то, возможно, в нём всё-таки есть удача."
  kwf_home_rustport:0 "Наш ржавый маленький дом"
  kwf_home_rustport_desc:0 "Волны и соль во рту, но теперь, впервые, у нас был свой клочок земли. Растпорт не представляет из себя ничего особенного. Там только ржавые балки и полузатонувшие хижины. Но он наш. Никакой прилив его не смоет. После столетий скитаний у нас наконец-то есть дом."
  kwf_frozen_shores:0 "Замерзшие берега навсегда"
  kwf_frozen_shores_desc:0 "Наконец, трясина уступает место более твёрдой земле. То, что когда-то было грязью и тленом, обещает нам дом, который мы можем защитить. Забудем прошлое, мы оставим берег себе."
  kwf_two_centuries:0 "Два века ржавчины"
  kwf_two_centuries_desc:0 "Может быть, именно здесь и начинается наше настоящее путешествие, не на волнах, а здесь, на суше."

  kwf_garden_beneath_the_waves:0 "Сад под волнами"
  kwf_garden_beneath_the_waves_desc:0 "Меня учили, что рай лежит внизу, что море убаюкает нас в своих тёмных объятиях. Но я увидел безумие этой мечты. Истинный сад не затоплен волнами, он ждёт здесь, на земле, когда мы посеем."
  kwf_work_of_the_faithful:0 "Работа верующих"
  kwf_work_of_the_faithful_desc:0 "Руки Твои - завет. Не в крови, но в труде. Возводите стены, возделывайте землю, сейте семена. В этом труде - истинная молитва. Благодаря ей сад пустит корни там, где море не достигнет."
  kwf_painted_in_ink:0 "Нарисовано чернилами"
  kwf_painted_in_ink_desc:0 "Когда-то наши чернила приковали нас к бездне. Теперь они связывают нас друг с другом. Каждая отметина на нашей коже, не цепь, прикованная к морю. Это обет саду, обещание, что, куда бы мы ни пошли, жизнь последует за нами."
  kwf_who_dwells_below:0 "Тот, Кто Обитает Внизу"
  kwf_who_dwells_below_desc:0 "Не буду отрицать, что под волной всё ещё есть некое присутствие. Но это не бог и не пастырь наших душ. Что бы ни таилось в этой бездне, оно не может молчать. Мы больше не преклоняем перед ним колени. Наша вера теперь обращена вверх, к миру живых."
  kwf_open_floodgates:0 "Откройте шлюзы"
  kwf_open_floodgates_desc:0 "Удержи воду, и земля будет голодать. Выпусти её, и мир очистится. Сад расцветает, когда верующие доверяют силе приливов."
  kwf_depths_have_depth:0 "Глубины имеют глубину"
  kwf_depths_have_depth_desc:0 "Вера, как и морские глубины, многослойна. То, что когда-то было поклонением соли, становится чем-то более ценным. Говорю вам: глубина, которую мы ищем, не в океанской тьме, а в корнях, в которые мы врастаем."
  kwf_garden_must_expand:0 "Расти сад, расти"
  kwf_garden_must_expand_desc:0 "Сад, который не растёт, завянет и умрёт. То же самое относится и к нам. Мы не можем прятаться в одной гавани, на одном острове или на одном берегу. Мы должны нести сад наружу, пока сам мир не расцветёт под нашей заботой."
  kwf_bless_the_Warboat:0 "Благослови военный корабль"
  kwf_bless_the_Warboat_desc:0 "Сталь можно заточить, паруса починить, но только вера сделает судно по-настоящему мореходным. Военный корабль доставит наш сад к дальним берегам."
  kwf_salt_for_the_salt_god:0 "Больше соли Богу Соли"
  kwf_salt_for_the_salt_god_desc:0 "Когда-то они кричали: «Соль Богу Соли!» и бросали свои дары в глубины. Но я говорю: пусть соль вернётся в землю, в поля и в раны живых. Ни один бог не заберёт её себе. Она наш дар, который усилит рост сада."

  kwf_drowned_king:0 "До самого дна"
  kwf_drowned_king_desc:0 "Эта идея от Делмара... чтобы люди увидели во мне нечто большее. Пророка Бога Соли. Короля, избранного самим морем. Это смешно, но кто-то должен говорить от имени прилива, и, похоже, никто другой этого не хочет."
  kwf_salt_in_wound:0 "Соль на рану"
  kwf_salt_in_wound_desc:0 "Дисциплина — это то, что помогает людям держаться на ногах, когда налетает шторм. Пусть он жесток, но море никогда не было ласковым. Если боль очищает нас, пусть соль сделает своё дело... да, так повелел Король."
  kwf_carry_that_weight:0 "Нести этот груз"
  kwf_carry_that_weight_desc:0 "У каждого есть работа. Без исключений. Припасы, раненые, усталые - все мы что-то несем. Это не даёт линии прорваться."
  kwf_gaze_into_abyss:0 "Взгляд в бездну"
  kwf_gaze_into_abyss_desc:0 "Мы больше не можем сражаться по-старому. Изменилось не только море, но и наши враги. Новое оружие сжигает не только наши мишени, но промедление сжигает жизни. Мы заплатим цену и ударим первыми, прежде чем это сделают другие."
  kwf_tithes:0 "Десятина плотью"
  kwf_tithes_desc:0 "Андейл перешёл черту, которую не должен был переступать ни один человек. Море может простить голод, но не безумие. Мы разберёмся с ними быстро и чисто."
  kwf_faithful:0 "Верный и Соленый"
  kwf_faithful_desc:0 "Вера, мораль, как бы вы это ни называли. Главное поддерживать людей и продвигать работу. Если вера помогает, то так тому и быть."
  kwf_codex_saltum:0 "Кодекс Салтум"
  kwf_codex_saltum_desc:0 "Им нужны были правила, поэтому я их написал. Кодекс - это не какое-то священное писание, а просто руководство. Способ убедиться, что никто не забудет, почему мы всё ещё живы."
  kwf_tidebound_unity:0 "Единство прилива"
  kwf_tidebound_unity_desc:0 "Теперь мы все привязаны к одной колоде. Неважно, кем ты был раньше: солдатом, торговцем, мусорщиком. Ты либо вносишь свой вклад, либо падаешь за борт. Этого единства достаточно."
  kwf_iron_psalm:0 "Стальной Псалм"
  kwf_iron_psalm_desc:0 ""
  kwf_salt_over_steel:0 "Соль над сталью"
  kwf_salt_over_steel_desc:0 "Сталь ломается. Соль её разъедает. Но люди умеют приспосабливаться. Пусть Братство держится за свои машины. Мы создадим нечто, что прослужит дольше металла."
  kwf_the_court:0 "Двор Утонувшего Короля"
  kwf_the_court_desc:0 "Им нужна была столица, трон, настоящее королевство. Ладно. Пусть себе. Если небольшая церемония поможет поддерживать порядок, я сыграю свою роль. Только не ждите, что я начну верить в свой титул."

  kwf_order_from_the_galley:0 "Заказ с камбуза"
  kwf_order_from_the_galley_desc:0 "Корабль без порядка тонет. Кухня без порядка голодает. Я провёл много ночей на камбузе, кормя команду в штормы и пожары. Теперь я принесу ту же дисциплину на берег. На камбузе всё будет взвешено и расставлено по своим местам."
  kwf_dinner_bell:0 "Обеденный звонок"
  kwf_dinner_bell_desc:0 "Когда звонит колокол, мужчины собираются. Они знают, что еда ждёт, а работа идёт следом. В Растпорте звонок на ужин зовёт их не просто поесть, но и строить, трудиться, работать. Дисциплина начинается с желудка."
  kwf_sea_trade:0 "Нам не хватает специй"
  kwf_sea_trade_desc:0 "Специй, соли и масла нам не хватает, но мы можем их найти. Море всегда было кладовой повара, а торговля – приправой жизни. Если мы хотим хорошо накормить свой народ, мы должны открыть наши порты и позволить вкусам со всего мира приправлять наш стол."
  kwf_set_the_table:0 "Накрыть на стол"
  kwf_set_the_table_desc:0 "Ни одна трапеза не обходится без подготовки. Чтобы есть, нужно накрыть на стол. Чтобы руководить, нужно навести порядок в доме. С этого дня каждый солдат и рабочий будет знать своё место, свой долг и свою долю."
  kwf_noone_leaves_hungry:0 "Никто не уйдет голодным"
  kwf_noone_leaves_hungry_desc:0 "На «Бореалисе» голодная команда была мятежной. На суше то же самое. Сытые животы означают, что лопасти работают ровно, сердца - ровно. Никто не марширует на голодный желудок, по крайней мере, в моей компании."
  kwf_the_galley_guard:0 "Галерная гвардия"
  kwf_the_galley_guard_desc:0 "Каждому повару нужна стража в бурных водах. Я выбрал людей, которые будут служить не только воевать, но и служить. Они будут моими ножами, моими половниками, моим щитом и моим огнём. В походе они будут стражей галеры, моей избранной рукой."
  kwf_undercooked:0 "Недоваренная еда"
  kwf_undercooked_desc:0 "Иногда еда должна томиться медленно. Лучше питаться регулярно, чем подгореть. Мы умерим нашу жажду завоеваний и дадим людям время поверить в наш порядок, наш хлеб, наше слово."
  kwf_by_fire_and_salt:0 "Огнем и солью"
  kwf_by_fire_and_salt_desc:0 "И всё же... бывают времена, когда огонь должен реветь, когда соль должна кусаться. Некоторые трапезы добываются не терпением, а пламенем. Если берег сопротивляется, то огнём и солью мы разобьём их и насладимся пеплом."
  kwf_mouth_of_the_shore:0 "Устье берега"
  kwf_mouth_of_the_shore_desc:0 "У каждого берега есть рот, и он говорит, только когда его кормят. Мы будем теми, кто накормит его – хлебом, работой или дисциплиной. В конце концов, сам берег будет носить наш вкус, наш порядок, наше имя."

  kwf_all_hands_on_deck:0 "Все на палубе"
  kwf_all_hands_on_deck_desc:0 "У каждого из нас своё место, и каждая рука важна. Когда даётся сигнал, нет никаких оправданий: мы все должны действовать сообща, как одна команда."
  kwf_always_at_post:0 "Всегда на посту"
  kwf_always_at_post_desc:0 "Будь то на берегу или на корабле, почта никогда тебя не покидает. А если это происходит, значит, ты не годен для этой должности."
  kwf_discipline_is_a_dish:0 "Дисциплина - это блюдо"
  kwf_discipline_is_a_dish_desc:0 "Порядок питает силу. Он поддерживал нас на море. Теперь он поможет нам быть осторожнее на суше."
  kwf_sea_of_madness:0 "Море Безумия"
  kwf_sea_of_madness_desc:0 "Битва - это хаос, словно шторм в море. Чтобы выжить, нужно научиться к нему приспосабливаться, и нам предстоит многому научиться."
  kwf_same_time_tomorrow:0 "Завтра в то же время"
  kwf_same_time_tomorrow_desc:0 "Рутина - это выживание.\nКаждый день учения повторяются.\nКаждый день на пост прибывает новый охранник.\nКаждый день команда становится сильнее.\nЗавтра будет то же самое, и так мы и живем."
  kwf_no_shore_wide_enough:0 "Недостаточно широкий берег"
  kwf_no_shore_wide_enough_desc:0 "Море может и кончиться, но бой — нет. Мы не хотим возвращаться, но давайте подготовимся, ведь ни один берег не будет достаточно широким для нас."

