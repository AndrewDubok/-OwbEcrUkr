l_russian:
  nf_kwf.1.t:0 "Корабль без страны"
  nf_kwf.1.d:0 "Два столетия назад этот день на борту танкера «Бореалис» был похож на любой другой. Экипаж занимался своими повседневными делами, не подозревая, что Великая война разразится и в мгновение ока прекратится. Мир погрузился в тишину. На всех частотах и ​​каналах слышалась лишь тишина.\n\nКапитан собрал команду на обветренной палубе, и после недолгих споров они пришли к мрачному выводу: та Америка, которую они знали, исчезла. И теперь танкер в одиночестве бродил по мёртвому океану.\n\nДни сливались в недели, недели – в месяцы. Долгие, долгие месяцы пустоты. И вот – искра: слабый треск в динамиках радиоприемника. Сигнал бедствия. Экипаж отследил сигнал до его источника: потрёпанное и накренившееся судно, его команда и пассажиры цеплялись за последнюю надежду. Капитан встретился взглядом со своей командой и после долгого молчания отдал приказ. «Бореалис» приблизился к незнакомцу, и два корабля были связаны швартовами. Спасенные выжившие, с запавшими глазами и ошеломленные, присоединились к бесконечному путешествию.\n\nЭто был судьбоносный союз, поскольку этот корабль был..."
  nf_kwf.1.a:0 "...исследовательский"
  nf_kwf.1.b:0 "...круизный лайнер"
  nf_kwf.1.c:0 "...военным судном"

  nf_kwf.2.t:0 "Не раскачивайте лодку"
  nf_kwf.2.d:0 "Танкер продолжал расти, всё больше палуб соединялось, всё больше лиц появлялось на борту нашего плавучего дома. Среди вновь прибывших была странная фигура: упырь, который одержимо бормотал о «Боге Соли».\n\nПоначалу командный штаб отшучивался, обращаясь с ним как с очередным безумцем. Но шёпот распространяется быстро. Культ Бога Соли быстро рос, и его молитвы были слышны на нижних палубах. Когда культ больше нельзя было игнорировать, капитан решил «сохранить мир» и оставить их в покое.\n\nЭто была ошибка.\n\nДвадцать лет назад разразился голод. Культ увидел свой шанс. Под предводительством своего пророка Паллида радикалы штурмовали мостик, убив капитана. Казалось, корабль принадлежал им. Однако Кристиан, молодой кок, сплотил верный экипаж. В последовавшем кровопролитии и хаосе они сражались, пока не отвоевали каюту капитана, убив Паллида. Чтобы избежать дальнейшего кровопролития, Кристиан и Делмар, заместитель главы культа, согласились разделить корабль, чтобы не топить его в очередном сражении.\n\nС тех пор Кристиан командует, отказываясь называться капитаном. Он не самый громкий голос и не самый тёплый духом."
  nf_kwf.2.a:0 "Но он наш капитан."

  nf_kwf.3.t:0 "Мы больше никогда не поплывем"
  nf_kwf.3.d:0 "Крик пронзил рассвет: "Земля!"\n\nПроведя два столетия в дрейфе, люди «Бореалиса» бросились на палубу, чтобы стать свидетелями этого чуда. С командной палубы Кристиан наблюдал за этим вместе с командой. «Готовь людей, Маршалл», — сказал он старшему гарпунеру. «Тебе здесь не рады». Маршалл резко кивнул и отдал приказ своим отрядам.\n\nКристиан закурил трубку и наблюдал, как темное пятно земли разрастается.\n«Земля...» — пробормотал он.\n\nПриземление оказалось именно таким жестким, как он и ожидал. Когда «Бореалис» остановился на мелководье, гарпунщики столкнулись с племенем дикарей на берегу. Тех, кто оказал сопротивление, по приказу Кристиана перебили, а выжившие бойцы отступили в ближайшие поселения. Гарпунщики не продвигались дальше вглубь острова.\n\nКристиан посмотрел вниз на захваченное поселение. Его не волновала жестокость происходящего. Вместо этого он думал о поколениях, рождённых и погребённых в стальном корпусе корабля, мечтавших о жизни, не подверженной колебаниям волн. Он чувствовал в воздухе незнакомые запахи влажной земли и древесного дыма.\n\nОни наконец нашли её. Эта земля была их правом рождения, заслуженным за двести лет скитаний."
  nf_kwf.3.a:0 "Но он наш капитан."

  nf_kwf.4.t:0 "Выбор капитана"
  nf_kwf.4.d:0 "Растпорт...\n\nЗа все эти годы Кристиан проводил здесь гораздо меньше времени, чем на корабле, но эта импровизированная кухня-офис, сколоченная из металлолома и построенная его собственными руками, уже стала для него домом больше, чем где-либо ещё. Прежде чем он успел погрузиться в свои мысли, в дверь постучали. Вошла знакомая фигура.\n\n«Кристиан»\n«Делмар»\n\nЛидер культа сел за потрёпанный стол. Что-то невысказанное повисло в воздухе между ними, но Кристиан первым нарушил молчание.\n\n«На суше всё так изменилось. Я никогда не думал, что доживу до нашей высадки на берег, и ещё меньше – что нас не уничтожат какие-то неведомые силы, поджидающие нас здесь». Он указал на окно. «Но я приятно удивлён».\n\n«Как и я, Кристиан». В голосе Делмара слышалась знакомая теплота, хотя в его глазах Кристиан не мог разглядеть глубину.\n\n«Похоже, пришло время решить, кто поведет наш народ вперед».\n\nДелмар просто смотрел на него тем же терпеливым, понимающим взглядом, который он носил во время бесчисленных встреч на корабле, бесчисленных кризисов, которые он пережил вместе."
  nf_kwf.4.a:0 "«Но все уже решено, мой друг»."
  nf_kwf.4.b:0 "«У меня есть идея...»"
  nf_kwf.4.c:0 "«Кто, кроме тебя, мог бы нас возглавить?»"

  nf_kwf.5.t:0 "Королевская игра в Ур"
  nf_kwf.5.d:0 "Однажды на борт «Бореалиса» поднялся историк, неся под мышкой лишь старинную настольную игру. Он назвал её «Королевской игрой Ура», хотя никто не мог предсказать, насколько глубоко эта пыльная реликвия изменит жизнь на борту нашего судна. Какое-то время Игра Ура была всего лишь диковинкой, в которую играли лишь немногие энтузиасты. Но по мере того, как по коридорам распространялись истории и слухи, её популярность росла с такой скоростью, что ей позавидовал бы сам культ Соляного Бога.\n\nВскоре все, от мала до велика, играли в эту странную и увлекательную игру. Находчивые члены экипажа мастерили доски из обрезков металла и мастерили жетоны из выброшенных безделушек. Появились новые версии правил, и вскоре официальные соревнования стали проводиться в каждом уголке корабля.\n\nСейчас, сто лет спустя, Игра Ура остаётся бережно хранимой традицией среди Знаменитого народа. Это больше, чем просто развлечение: это способ разрешить споры, завести друзей и проверить свою сообразительность. Наш капитан, Кристиан, стал легендой как непобедимый чемпион, и этот титул он удерживает уже много лет."
  nf_kwf.5.a:0 "Наше лучшее УРа."
 
  nf_kwf.6.t:0 "Короли и садовники"
  nf_kwf.6.d:0 "«Знаешь, Кристиан, я никогда не понимал Культ Соляного Бога», — сказал Делмар, не отрывая взгляда от доски Ур.\n\nФигура Кристиана замерла в воздухе. «Странно слышать это от тебя, разве ты не был правой рукой этого безумца?»\n\nДельмар передвинул резную фигуру на новое место. «Паллид скрывал свои истинные намерения от всех. Я стоял рядом с ним годами, и всё без толку. Он не был верующим, всего лишь актёром, заучившим литургию наизусть».\n\n«Так зачем всё это было? Что он на самом деле искал на дне моря?»\n\n«Это уже не имеет значения», — сказал Делмар, пренебрежительно махнув рукой. «Паллид исчез, и его одержимости умерли вместе с ним. У меня новое видение того, что останется от нашей... организации».\n\nКристиан наклонился вперёд. «Больше никаких уловок, Делмар. Я уничтожил одного лидера культа. И без колебаний сделаю это снова.\n\nДельмар сохранил свою обычную тёплую улыбку. «Не волнуйтесь. Моё видение гораздо более... конструктивно».\n\n«Представьте себе сад. Рай, созданный нашими собственными руками...»"
  nf_kwf.6.a:0 "«...прямо здесь, на суше.»"