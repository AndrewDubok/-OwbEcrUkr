JOE_SLOCUM_TOWER_NAME:0 "Башня Слокум"

###Tooltips###
JOE_1_tt:0 "Банда рейдеров Фаскума Фрэнка присоединяется"
JOE_2_tt:0 "Рейнджеры Рейли прибыли"
JOE_3_tt:0 "Парни готовы к другому виду хлама"
JOE_4_tt:0 "ЭкзекуТрон становится доступен в качестве экономического советника"
JOE_5_tt:0 "Мы попросим присоединиться к Республике Восточного Побережья в качестве равного партнёра"
JOE_6_tt:0 "Стареющий рейдер вызвался возглавить наши армии"
JOE_7_tt:0 "Создает башню Слокум в качестве торгового узла"
JOE_8_tt:0 "С кофе мы можем что угодно!"
JOE_9_tt:0 "Активируйте Джона Доната как советника бесплатно"
JOE_10_tt:0 "Активируйте Леви Бонда как советника бесплатно"
JOE_11_tt:0 "Активируйте Донат Бота как советника бесплатно"

