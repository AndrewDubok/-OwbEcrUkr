l_russian: 

#Characters#
JOE_joe_name:0 "Джо"
JOE_joe_desc:0 "Джо раньше был простым мусорщиком, как и многие из тех, кем он сейчас правит на юге Столичной Пустоши. Его жизнь изменилась, когда он нашёл экспериментальную кофеварку под региональным офисом Слокум Джо. Эта существенная находка принесла ему состояние, которое он вложил в создание империи мусорщиков на юге Столичной Пустоши. Какой бы мелкой ни была операция, Джо получает свою долю. Взамен мусорщики получают безопасные места для отдыха и торговли, прежде чем снова погрузиться в опасные руины за его стенами."
JOE_raider_name:0 "Фридрих Фаскум"
JOE_rangers_name:0 "Рэйли"
JOE_jericho_name:0 "Джерико"
JOE_executron_name:0 "ЭкзекуТрон"
JOE_donutbot_name:0 "Пончиковый Бот"
JOE_guy_name:0 "Джон Донат"
JOE_lady_name:0 "Леви Бонд"

#Cosmetic Tags#
JOE_coffee_empire_tag:0 "Кофейная Империя Джо"
JOE_coffee_empire_tag:0 "Кофейная Империя Джо"
JOE_coffee_empire_tag:0 "Кофейная Империя Джо"

#Events#
JOE_nf_events.1.title:0 "Лучшее собирательское окружение"
JOE_nf_events.1.desc:0 "Каждый день десятки, а то и сотни жителей пустошей отправляются в руины центра Вашингтона. Там они сражаются с ужасными мутантами, психопатами-рейдерами и всем, что похуже, чтобы заработать на жизнь. Это карьера, на которой мало кто задерживается надолго, но те, кому это удаётся, обычно развивают шестое чувство, позволяющее копаться в руинах. Старьевщик Джо был одним из таких сборщиков мусора, и у него была одна особенная способность."
JOE_nf_events.1.a:0 "Поиск старых схем и технических данных"
JOE_nf_events.1.b:0 "Выбор лучшего хлама"
JOE_nf_events.1.c:0 "Восстановление качественных деталей оружия"
JOE_nf_events.2.title:0 "Раскол"
JOE_nf_events.2.desc:0 "Поход в руины вокруг Цитадели всегда был сопряжен с определенным риском. Да, руины обычно были свободны от мутантов, но Братство редко могло отличить мародёра от рейдера. Не говоря уже о том, что если бы они прекратили огонь, то могли бы заметить что-нибудь блестящее в вашей добыче. Впрочем, это не останавливало Джо, и он был одним из первых, кто заметил что-то необычное. Патрули становились реже, и по какой-то причине некоторые из них красовались в новой раскраске. Очевидно, в Братстве наметился какой-то раскол. Если Джо чему-то и научился за годы рысканий по руинам, так это тому, что в конфликте есть возможности. И ещё, иногда с каравана браминов падает что-то хорошее."
JOE_nf_events.2.a:0 "Их потеря - наша выгода"
JOE_nf_events.3.title:0 "В Слокум Тауэр"
JOE_nf_events.3.desc:0 "Братство никогда не интересовалось такими безобидными вещами, как офисы розничных продавцов. Их всегда интересовали поставщики оружия, правительственные бункеры и прочие военные объекты. Именно поэтому Джо всегда заглядывал в офисы корпораций, ведь Братство никогда не заботилось о сокровищах, которые там хранились. Именно одна такая экспедиция привела Джо к обнаружению бункера под региональной штаб-квартирой «Слокум Джо». Ожидая найти несколько рабочих терминалов или какое-нибудь старое оборудование, Джо с удивлением обнаружил прототип машины, которая изменила его жизнь. \n\n Кофейня «Слокум Джо» \n\n Судя по терминалам в бункере, добывать свежие кофейные зерна в мире, охваченном голодом и нестабильностью, становилось всё сложнее. Цены на кофе взлетали до безумных высот не только из-за инфляции, но и из-за отсутствия поставок. В рамках какой-то сделки с Разведывательным управлением обороны (DIA) о предоставлении им возможности использовать офис в качестве прикрытия для каких-то дел, им предоставили машину из какого-то места под названием «Большая гора» для починки. После нескольких неудачных попыток им наконец удалось создать прототип машины, способной производить кофейную гущу буквально из воздуха. Джо подумал, что странно, что они так зацикливаются на этом, но это не самая странная находка, которую он нашёл в руинах. Впрочем, если уж затевать такие сложные эксперименты, почему бы не попробовать чашку?"
JOE_nf_events.3.a:0 "Эта чашка изменила его жизнь"
JOE_nf_events.4.title:0 "Одна чашка за раз"
JOE_nf_events.4.desc:0 "Джо старался никому не рассказывать, откуда берёт эти волшебные зёрна, но начал продавать их везде, где только мог. Первыми стали другие мусорщики, которым всегда нужно было быть бодрыми и внимательными. Затем появились охранники караванов, которым нравилось что-то, что помогало им не заснуть во время дежурства. В конце концов, почти каждый, кто проезжал через Южный округ Вашингтона, заглядывал к вышке Джо, чтобы купить чашку свежего кофе или пакетик молотого. Одному человеку стало не по силам справиться, и ему понадобились сотрудники. Первым в списке наёмных работников был..."
JOE_nf_events.4.a:0 "Маркетолог"
JOE_nf_events.4.b:0 "Дружелюбная официантка"
JOE_nf_events.4.c:0 "Робот, продающий пончики"
JOE_nf_events.5.title:0 "Эти придурки"
JOE_nf_events.5.desc:0 "Братство не всегда было дружелюбным, но с ним всё равно было легко иметь дело. Но эти Изгои в красной краске - это было нечто. Они словно собрали самых отпетых придурков во всём Братстве и загнали их всех в один форт. Их отношение к жителям пустошей было и без того скверным, но ситуация становилась всё напряжённее по мере того, как они собирались вместе и отправляли свои команды по добыче всё глубже в руины. Это лишь вопрос времени, когда они начнут брать, а не торговать."
JOE_nf_events.5.a:0 "Нам нужно быть осторожными"
JOE_nf_events.6.title:0 "Проблема с рейдарами"
JOE_nf_events.6.desc:0 "Продавать рейдерам - всегда рискованное дело. Никогда не знаешь, заплатит ли тот, с кем имеешь дело, или попытается нанести тебе удар. Впрочем, те, кто приходит к башне за молотыми бобами, обычно более благоразумны. Проблема в том, что их друзья стали подбираться ближе. Падальщиков стали обстреливать чаще, и если мы не будем осторожны, нам придётся иметь дело с немалым количеством нервных наркоманов."
JOE_nf_events.6.a:0 "Заплатить менее сумасшедшим за защиту"
JOE_nf_events.6.b:0 "Найти наёмников"
JOE_nf_events.6.c:0 "Мы должны сами себя защитить"
JOE_nf_events.7.title:0 "Больше, чем мусор"
JOE_nf_events.7.desc:0 "Сражаться за Форт Индепеденс было нелегко. Изгои сражались изо всех сил, чтобы не пустить нас, но в конце концов мы добили их всех. То, что находилось внутри форта, определённо стоило усилий. За толстыми дверями скрывались мощные комплекты силовой брони, смертоносное энергетическое оружие и настоящая гора металлолома. И это ещё не всё. Внутри мы нашли достаточно данных о силовой броне, чтобы без проблем починить её самостоятельно."
JOE_nf_events.7.a:0 "Да, чёрт возьми"
JOE_nf_events.8.title:0 "Пора двигаться дальше?"
JOE_nf_events.8.desc:0 "Форт Индепенденс - отличное место. Отличное расположение, крепкие стены, подвал, не полный радтараканов, всё отлично. Это было бы отличным местом для переноса операций. С другой стороны, у Башни Джо есть свои преимущества. Бункер на нижних уровнях всё ещё в безопасности, он уже практически стал точкой торговли, и мы вложили в него столько труда. Выбор будет непростым."
JOE_nf_events.8.a:0 "Давайте переселяться"
JOE_nf_events.8.b:0 "Остаться на месте"
JOE_nf_events.9.title:0 "Хлам, или нет?"
JOE_nf_events.9.desc:0 "Изгои были ещё малочисленнее, чем Братство. Неудивительно, что они так сильно полагались на помощь роботов. Теперь, когда они ушли с дороги, у нас есть доступ к их обширному арсеналу. Всё, от протектронов до сторожевых роботов, хранится на складе под Фортом Индепенденс. Хотя лёгкие роботы, безусловно, могли бы пригодиться для каких-то подсобных работ, с тяжёлыми другое дело. Действительно ли нам нужна куча сторожевых роботов, или нам стоит их просто продать?"
JOE_nf_events.9.a:0 "Кто вообще будет покупать тонну сторожевых роботов?"
JOE_nf_events.10.title:0 "Напиток, сметающий пустоши"
JOE_nf_events.10.desc:0 "К настоящему времени почти каждый в Столичной Пустоши попробовал или, по крайней мере, слышал о кофе Слокама Джо. Нет, не о рекламных щитах, которые вы видите на развалинах. Мы говорим о настоящем кофе. Когда-то этот мусорщик звался Старьёвщиком Джо, а теперь стал называть себя Слокамом и сделал себе имя, торгуя кофе, который привозит неизвестно откуда. Некоторые предполагают, что он нашёл старый склад, другие – автоматизированную гидропонную лабораторию. Как бы то ни было, он загребает крышки и недавно отбился от Изгоев Братства с армией мусорщиков. Теперь он обращается к нашему совету с деловым предложением. Он готов объединить свою кофейную империю с нашей новообразованной республикой, если это будет равноправное партнёрство. Он хочет иметь место за столом, как и любой другой лидер поселения. Учитывая, сколько людей в розовой броне патрулируют сейчас юг округа Колумбия, это предложение стоит рассмотреть."
JOE_nf_events.10.a:0 "Мы принимаем это предложение"
JOE_nf_events.10.b:0 "§GДядя Роу договорится о более выгодной сделке§!"
JOE_nf_evnets.10.c:0 "Отклонить сделку"

#Ideas#
JOE_caffinated_idea:0 "Кофеиновые"
JOE_caffinated_idea_desc:0 "У солдат армии Джо есть в запасе обильный свежий кофе. Под воздействием кофеина они способны быстро двигаться и сохранять бдительность, но лучше их не видеть, пока они не выпьют свою утреннюю чашку."
JOE_scav_tradition_idea:0 "Традиции мародёров"
JOE_scav_tradition_idea_desc:0 "Почти у каждого гвардейца и ополченца Джо есть опыт обыска руин. Этот опыт позволяет им легко находить тайники с ресурсами, которые другие солдаты могли бы пропустить, а также легче переделывать снаряжение, найденное на врагах."
JOE_studied_outcasts_idea:0 "Наученные Изгоями"
JOE_studied_outcasts_idea_desc:0 "Мы наблюдали, как Изгои нападают на каких-то тупых рейдеров, и учились на их ошибках. Ошибка номер один: не стоит бросаться на парня с монтировкой, когда у него есть миниган."
JOE_coffee_junkies_idea:0 "Кофейные наркоманы"
JOE_coffee_junkies_idea_desc:0 "Ополчение Джо состоит из горстки вооруженных разбойников и множества рейдеров, подсевших на что-то под названием кофе."
JOE_merc_contracts_idea:0 "Наёмные контракты"
JOE_merc_contracts_idea_desc:0 "Джо заключил ряд контрактов с несколькими небольшими и крупными группами наёмников по всей Столичной Пустоши. В Башню Джо постоянно прибывают новые наёмники, чтобы заменить тех, кто не справляется."
JOE_scrapper_training_idea:0 "Обученные мародёры"
JOE_scrapper_training_idea_desc:0 "Почти у каждого гвардейца и ополченца Джо есть опыт обыска руин. Этот опыт позволяет им легко находить тайники с ресурсами, которые другие солдаты могли бы пропустить, а также легче переделывать снаряжение, найденное у врагов. Этот опыт в сочетании с боевыми учениями и тактической подготовкой превращает эту армию мародеров в грозную силу."
JOE_bot_scrappers_idea:0 "Роботов на хлам"
JOE_bot_scrappers_idea_desc:0 "Сборщикам мусора на службе у Джо приказано уничтожать практически любых ботов, которых они найдут, за исключением Пончикового бота."
JOE_scrapper_bots_idea:0 "Роботы-собиратели"
JOE_scrapper_bots_idea_desc:0 "Джо и его сборщики мусора начали использовать роботов для помощи в мародёрских операциях. С этими роботами-вьючными браминами они смогут значительно расширить свои возможности и грузоподъёмность."
JOE_ready_for_anything_idea:0 "Готовые ко всему"
JOE_ready_for_anything_idea_desc:0 "Парни Джо расправились с самыми крепкими ребятами по эту сторону пустоши. Чтобы надрать им задницы, понадобилась бы целая армия в какой-нибудь усовершенствованной силовой броне с поддержкой с воздуха или жуткий культ с нечестивыми силами."
JOE_wasteland_scientists_idea:0 "Ученые из Пустоши"
JOE_wasteland_scientists_idea_desc:0 "Прошел слух, что Джо нанимает ученых для различных проектов за зарплату, вдвое превышающую зарплату большинства других компаний."
JOE_caffinated_guards_idea:0 "Кофеиновые охранники"
JOE_caffinated_guards_idea_desc:0 "От охранников караванов до часовых поселений - если кто-то держит винтовку и смотрит на горизонт, значит, он пьёт чашечку кофе Слокум Джо. Этот качественный кофе помогает сохранять бдительность и быть готовым ко всему."
JOE_promotional_mugs_idea:0 "Рекламные кружки"
JOE_promotional_mugs_idea_desc:0 "За небольшую цену в 8 крышек вы можете получить чашку кофе в 5 крышек в кружке за 3 крышки."
JOE_coffee_supply_idea:0 "Кофейное снабжение"
JOE_coffee_supply_idea_desc:0 "Почти в каждом поселении можно найти мешок кофейной гущи Слокума Джо, которую варят или продают торговцы. Этот напиток покорил пустоши, и никто не задаётся вопросом, где этот старьёвщик нашёл столько кофе посреди разрушенного города."
JOE_caffinated_masses_idea:0 "Кофеиновые массы"
JOE_caffinated_masses_idea_desc:0 "Зачем сражаться со Слокумом Джо, если вместо этого можно выпить чашечку хорошего кофе?"
JOE_tipping_culture_idea:0 "Культура чаевых"
JOE_tipping_culture_idea_desc:0 "Это выгодная ситуация для всех. Рабочие довольны, а мы рады, что нам не приходится платить им так много."
JOE_america_runs_on_joe_idea:0 "Америка бежит за Джо"
JOE_america_runs_on_joe_idea_desc:0 "Теперь, когда жители пустошей пустили в свой организм кофе, они не понимают, как обходились без него. Этот утренний заряд бодрости - единственное, что заставляет их встать с постели и отправиться на работу. И именно поэтому они никогда не сделают ничего, что могло бы разозлить того, кто его поставляет."

#National Focus#
JOE_nf_a001:0 "Старьевщик Джо"
JOE_nf_a001_desc:0 "Джо прославился как один из лучших мародёров, когда-либо бродивших по руинам Вашингтона, но много лет назад даже он был всего лишь очередным глупым мальчишкой, ищущим счастья в аду."
JOE_nf_a002:0 "Захватывающая возможность"
JOE_nf_a002_desc:0 "Когда Братство раскололось, большинство людей отчаялись, зная, что это приведёт к новым атакам супермутантов. Тем временем Джо увидел в этом возможность."
JOE_nf_a003:0 "Находка всей жизни"
JOE_nf_a003_desc:0 "Под старой региональной штаб-квартирой Слокум Джо произошло нечто весьма неожиданное..."
JOE_nf_a004:0 "Возводя Империю"
JOE_nf_a004_desc:0 "Этот кофе просто потрясающий. Неудивительно, что в старом свете его все пили!"
JOE_nf_a005:0 "Империя щебня"
JOE_nf_a005_desc:0 "Если Джо хочет построить кофейную империю, его клиентам необходимо иметь возможность связаться с ним!"
JOE_nf_a006:0 "Расчистить маршруты"
JOE_nf_a006_desc:0 "Ни у кого нет времени тащиться по тоннелям метро ради чашечки чая. Нужно разгрузить эти дороги!"
JOE_nf_a007:0 "Баррикады из мусора"
JOE_nf_a007_desc:0 "То, что мы хотим, чтобы некоторые люди проникли в наши руины, не означает, что мы хотим, чтобы туда попали все."
JOE_nf_a008:0 "Местные металлургические заводы"
JOE_nf_a008_desc:0 "Большую часть этого хлама лучше переплавить. Лучше сделать это здесь, чем отправлять куда-то."
JOE_nf_a009:0 "Уборка в офисе"
JOE_nf_a009_desc:0 "Если не считать редких дыр, здание Слокум Джо в довольно хорошем состоянии. Нужно лишь немного его расчистить."
JOE_nf_a010:0 "T.C.O.B"
JOE_nf_a010_desc:0 "Теперь, когда все эти дурацкие кубики исчезнут, мы сможем провести настоящие мастер-классы."
JOE_nf_a011:0 "Не выключайте свет"
JOE_nf_a011_desc:0 "Какой толк от мастерской, если мы ни черта не видим? Кто-то должен повозиться с генератором."
JOE_nf_a012:0 "Рай для собирателей"
JOE_nf_a012_desc:0 "В связи с тем, что теперь в южной части округа Вашингтон можно безопасно поспать, поесть и выпить чашку горячего кофе, сюда стекается больше мусорщиков, чем когда-либо."
JOE_nf_a013:0 "Трубы для винтовок"
JOE_nf_a013_desc:0 "Сантехника почти не работает. Лучше бы этим трубам найти настоящее применение."
JOE_nf_a014:0 "Пригласить оружейников"
JOE_nf_a014_desc:0 "Пистолеты-самострелы - для бедных и отчаянных. В Вашингтоне у нас столько штурмовых винтовок, что мы не знаем, куда их девать. Нужно только их починить."
JOE_nf_a015:0 "Неприятные соседи"
JOE_nf_a015_desc:0 "Изгои - пенисы, и они ясно дали понять, что им не нравится, что мы роемся в этих руинах. Рано или поздно они, возможно, что-то с этим сделают."
JOE_nf_a016:0 "Получить прибыль, пока можем"
JOE_nf_a016_desc:0 "Пора вытянуть крышки с этих засранцев в жестяных костюмах, прежде чем они начнут в нас стрелять."
JOE_nf_a017:0 "Достойное предложение"
JOE_nf_a017_desc:0 "Зачем нам все эти платы и сломанные старые компьютеры? Лучше обменять их на настоящее оружие."
JOE_nf_a018:0 "Выпуск больших пушек"
JOE_nf_a018_desc:0 "Джо знает парня, который умеет делать пушки, способные пробить насквозь эти старые силовые доспехи. Пусть эти штуки и весят тонну, но это не так тяжело, как удар ботинком Т-45 по голове."
JOE_nf_a019:0 "Посмотрите, как они работают"
JOE_nf_a019_desc:0 "Представители Братства склонны использовать одну и ту же тактику снова и снова. Наблюдая, как они используют эти приёмы против рейдеров, мы получим преимущество, когда начнётся бой."
JOE_nf_a020:0 "Защитить что принадлежит нам"
JOE_nf_a020_desc:0 "Будь то мутанты, каннибалы или даже Братство, всегда найдутся придурки, которые попытаются опровергнуть нашу власть."
JOE_nf_a021:0 "Откупиться от рейдеров"
JOE_nf_a021_desc:0 "Рейдеры, может, и ненадежны, но они дешевы и заменимы."
JOE_nf_a022:0 "Подсадить их на крючок"
JOE_nf_a022_desc:0 "Кто бы мог подумать, что наркоманы, употребляющие химические вещества, могут пристраститься и к кофеину?"
JOE_nf_a023:0 "Кофеиновые и безумные"
JOE_nf_a023_desc:0 "Эти рейдеры шарахаются от стен, словно мы дали им дозу психоактивных веществ. Теперь нужно просто направить их на врага."
JOE_nf_a024:0 "Нанять помощь"
JOE_nf_a024_desc:0 "Учитывая все деньги, которые мы зарабатываем, мы можем позволить себе немного потратиться на защиту."
JOE_nf_a025:0 "Эксклюзивные контракты"
JOE_nf_a025_desc:0 "Подписание Джо эксклюзивного контракта с качественной компанией-производителем наемников поможет всем жителям стало спать немного спокойнее."
JOE_nf_a026:0 "Рейнджеры укажуть путь"
JOE_nf_a026_desc:0 "В дополнение к другим наемным группам, которых мы наняли, Джо приобрел эксклюзивные услуги известной небольшой команды, работающей на руинах Вашингтона."
JOE_nf_a027:0 "Положитесь друг на друга"
JOE_nf_a027_desc:0 "Зачем нам отдавать свои крышки каким-то наёмным головорезам? Это наши земли, и мы должны защищать их вместе!"
JOE_nf_a028:0 "Обязательное обучение"
JOE_nf_a028_desc:0 "Каждый мародёр умеет сражаться, но сражаться вместе с другими на своей стороне - это новая концепция для многих из этих ребят."
JOE_nf_a029:0 "Армия мусорщиков"
JOE_nf_a029_desc:0 "У них может не быть униформы, стандартного снаряжения, особой подготовки или преданности делу, но... э-э... я потерял ход мыслей."
JOE_nf_a030:0 "Защитите свой мусор!"
JOE_nf_a030_desc:0 "Мы знали, что однажды это произойдет..."
JOE_nf_a031:0 "Каждый мародёр - солдат"
JOE_nf_a031_desc:0 "Неважно, что ты здесь просто за металлоломом, эти ублюдки всё равно тебя пристрелят. Сдохни стоя!"
JOE_nf_a032:0 "Поспешные баррикады"
JOE_nf_a032_desc:0 "Обломки в руинах Вашингтона могут раздражать не только нас. Они могут раздражать и их!"
JOE_nf_a033:0 "Материнская жила"
JOE_nf_a033_desc:0 "Изгои сидели на таком ценном трофее, что ни один сборщик мусора не мог и мечтать найти за всю свою жизнь. Теперь он наш."
JOE_nf_a034:0 "Рейд на арсеналы Изгоев"
JOE_nf_a034_desc:0 "Не каждый день увидишь арсенал, полный лазерных винтовок."
JOE_nf_a035:0 "Осторожно, оно горячее"
JOE_nf_a035_desc:0 "Единственное, что в Вашингтоне может быть горячее кофе Джо."
JOE_nf_a036:0 "Восстановление T-45"
JOE_nf_a036_desc:0 "Ты думал, Братство просто СДЕЛАЛО миллион комплектов силовой брони Т-45d? Нет, тупица, они были единственными, кто знал, как собрать эти старые костюмы, ржавеющие в руинах, до сих пор."
JOE_nf_a037:0 "Старые чертежи"
JOE_nf_a037_desc:0 "Большинство из нас не может понять ничерта из этих схем силовой брони. Но Джо, по многолетнему опыту, знает нескольких умников, которые всё понимают."
JOE_nf_a038:0 "Большие игрушки"
JOE_nf_a038_desc:0 "Лучше большой пушки может быть только ещё большая пушка. У изгоев было МНОГО пушек побольше."
JOE_nf_a039:0 "Новые раскопки?"
JOE_nf_a039_desc:0 "Поскольку Форт-Индепенденс находится под нашим контролем, некоторые ребята предлагают перенести туда нашу основную базу."
JOE_nf_a040:0 "Отправляйтесь туда, где происходит действие"
JOE_nf_a040_desc:0 "Отремонтированный Братством форт гораздо лучше разваливающегося офисного здания. Пора переезжать."
JOE_nf_a041:0 "Расширение торговых маршрутов"
JOE_nf_a041_desc:0 "Теперь, когда у нас новый главный офис, нам придется расчистить кучу новых маршрутов."
JOE_nf_a042:0 "Наполнить лаборатории"
JOE_nf_a042_desc:0 "Джо знает множество ученых из Пустошей, которые с радостью ухватились бы за возможность поработать в лаборатории, построенной Братством, но без всей этой претенциозности и дурацких мантий."
JOE_nf_a043:0 "Взлом исследовательских терминалов"
JOE_nf_a043_desc:0 "Изгои хранили свои секреты в тайне, но недостаточно крепко, чтобы не пропустить преданного мусорщика."
JOE_nf_a044:0 "Обновление IFF"
JOE_nf_a044_desc:0 "Если мы сможем заставить эти турели прекратить стрелять по нам, мы сможем снова их включить."
JOE_nf_a045:0 "Южный дозор"
JOE_nf_a045_desc:0 "Эти странные ублюдки к югу от нас вызывают у меня дрожь. Присматривай за ними."
JOE_nf_a046:0 "Оставайтесь на месте"
JOE_nf_a046_desc:0 "Я не хочу тащить половину нашего барахла в новое место. Давайте просто останемся там, где есть."
JOE_nf_a047:0 "Разграбление форта"
JOE_nf_a047_desc:0 "Если мы не собираемся использовать форт, то нам стоит вынести из его стен все, что можно."
JOE_nf_a048:0 "Принять корпоративную культуру"
JOE_nf_a048_desc:0 "Это место - бизнес, и нам пора начать вести себя соответственно. Шаг первый: подкупить несколько караванщиков, чтобы они вышли на торговые маршруты."
JOE_nf_a049:0 "T.G.I.F."
JOE_nf_a049_desc:0 "Мы не знаем, что это значит, но Джо продлил «счастливые часы» в баре по пятницам."
JOE_nf_a050:0 "ЭкзекуТрон"
JOE_nf_a050_desc:0 "В одном из шкафов мы нашли старого бота, который, похоже, обладает деловой хваткой."
JOE_nf_a051:0 "Перемещение оборудования"
JOE_nf_a051_desc:0 "В Форт-Индепенденсе было достаточно свободного оборудования, чтобы мы могли организовать здесь мастерские."
JOE_nf_a052:0 "Ржавые роботы"
JOE_nf_a052_desc:0 "Изгоям, конечно, нравились их роботы. Но что мы будем с ними делать?"
JOE_nf_a053:0 "Продать их"
JOE_nf_a053_desc:0 "Джо знает торговца, который с радостью купил бы у нас партию роботов по хорошей цене."
JOE_nf_a054:0 "Разобрать роботов"
JOE_nf_a054_desc:0 "Те немногие боты, от которых мы не можем избавиться, по крайней мере могут принести нам крышки, когда мы разберем их."
JOE_nf_a055:0 "Использовать их по назначению"
JOE_nf_a055_desc:0 "Не помешает, если бот прикроет вашу спину, пока вы копаете в руинах. Заставьте их работать."
JOE_nf_a056:0 "Роботы-сборщики"
JOE_nf_a056_desc:0 "Какого черта мне таскать с собой 200 фунтов хлама, если я могу прикрепить его к спине робота?"
JOE_nf_a057:0 "Быть готовыми"
JOE_nf_a057_desc:0 "После того, как мы захватили Форт-Индепенденс, на нас устремлены все взоры. Несомненно, скоро нам придётся беспокоиться ещё о ком-то."
JOE_nf_a058:0 "Поиск защиты"
JOE_nf_a058_desc:0 "Эта новая Республика Восточного Побережья, похоже, является именно тем типом делового партнера, который нам был бы нужен."
JOE_nf_a059:0 "Давать и брать"
JOE_nf_a059_desc:0 "Хорошее партнёрство, это взаимные уступки. Они дают нам умников для работы в наших лабораториях, а мы их принимаем."
JOE_nf_a060:0 "Рекламные кружки"
JOE_nf_a060_desc:0 "В течение ограниченного времени получите бесплатную кружку при покупке чашки кофе. \n\n Просто проигнорируйте то, что мы подняли цены на кофе на 3 крышки."
JOE_nf_a061:0 "Приобретение талантов"
JOE_nf_a061_desc:0 "Растущий бизнес всегда привлекает новые таланты."
JOE_nf_a062:0 "Возврат инвестиций"
JOE_nf_a062_desc:0 "Дела идут хорошо, и мы наконец начинаем видеть, как они окупаются."
JOE_nf_a063:0 "Кофейная столица Восточного Побережья"
JOE_nf_a063_desc:0 "Широко распространяется слух, что Слокум Джос - идеальное место, если вы хотите выпить чашечку горячего кофе. К счастью, по эту сторону Миссисипи кофе выращивать нельзя нигде."
JOE_nf_a064:0 "Розовый - это новый черный"
JOE_nf_a064_desc:0 "Да, анклавная покраска пугает. Но повышает ли она узнаваемость бренда?"
JOE_nf_a065:0 "Мы возьмем любого"
JOE_nf_a065_desc:0 "Мы отбили проклятое братство* ! Мы можем справиться с любым, кто попытается поставить на карту то, что мы конролируем! \n\n\n*§Изгои§!"
JOE_nf_a066:0 "Кофейнизировать массы"
JOE_nf_a066_desc:0 "Зачем кому-то с нами сражаться, если вместо этого можно насладиться чашечкой кофе?"
JOE_nf_a067:0 "Плати или умри"
JOE_nf_a067_desc:0 "Джо нашел в одном из офисов старую книгу о чем-то под названием «Культура чаевых», и он уверен, что это следующий шаг к развитию бизнеса."
JOE_nf_a068:0 "Рано или поздно..."
JOE_nf_a068_desc:0 "У них, возможно, были разногласия, но многим членам Братства не нравится видеть, как мы разгуливаем в силовой броне их погибшего друга."
JOE_nf_a069:0 "Разборка Цитадели"
JOE_nf_a069_desc:0 "«Цитадель» - ещё более впечатляющий проект, чем «Форт Индепенденс». Но самое интересное - это то, что мы раскопали на старом компьютере..."
JOE_nf_a070:0 "Америка зависит от Джо"
JOE_nf_a070_desc:0 "Мы не остановимся, пока каждый житель этой пустоши не начнёт свой утренний ритуал с посещением одной из наших кофеен. Нравится им это или нет, Пустошь будет питаться кофе Слокум Джо."

