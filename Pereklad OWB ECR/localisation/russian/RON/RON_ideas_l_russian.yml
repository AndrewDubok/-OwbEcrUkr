  ron_best_and_brightest_idea:0 "Самые Лучшие и Талантливые"
  ron_best_and_brightest_idea_desc:0 "В хоккей должны играть только лучшие. Гораздо интереснее смотреть, как две маленькие, высококвалифицированные команды пытаются выбить друг у друга мозги, чем толпу растерянных и запутавшихся идиотов."

  ron_expanded_teams:0 "Расширенные Команды"
  ron_expanded_teams_desc:0 "Когда речь идёт о кровавом спорте, чем больше людей — тем больше крови, а чем больше крови — тем лучше!"

