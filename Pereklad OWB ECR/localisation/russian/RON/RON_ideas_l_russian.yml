  ron_shining_city:0 "Ронто, Сияющий Город"
  ron_shining_city_desc:0 "Маяк Онтарио, Ронто стоит на страже от холода севера"

  ron_ontarios_beating_heart:0 "Бьющиеся Сердце Онтарио"
  ron_ontarios_beating_heart_desc:0 "Ронто — величайший город Онтарио и символ всего лучшего, что может предложить послевоенная Канада. Наш город — самый могущественный в Пустоши."

