l_russian: 
  ron_misunderstood_sport:0 "Непонятый спорт"
  ron_misunderstood_sport_desc:0 "Жители послевоенного Торонто сумели сохранить ключевой элемент канадской культуры через американскую оккупацию и десятилетия после Великой Войны. Этот спорт теперь практически почитается как символ канадского сопротивления, но за века он исказился, изменившись от своей изначальной формы. Искатели находят всё, что могут от довоенного хоккея, и стремление раскрыть правду движет страной, но при таком количестве энергии, вложенной в хоккей, сколько же они смогут сохранить для войны?"

  ron_codified_sport:0 "Кодифицированный спорт"
  ron_codified_sport_desc:0 "Оказывается, послевоенной хоккей, в который мы играли, совсем не похож на довоенный. Хотя он всё ещё приносит много удовольствия, прежний способ игры, вероятно, приводил к меньшему количеству случайных травм. Формализовав правильный свод правил, мы сможем сделать игру безопаснее и предотвратить, чтобы игроки придумывали новые правила прямо во время матча."

  ron_wasteland_sport:0 "Спорт Пустошей"
  ron_wasteland_sport_desc:0 "Хоккей никогда не был про правила или голы. Он был про ощущение льда под ногами, рев восторженной толпы и звук, когда твоя мощная кулака разбивает лицо соперника. Именно этот спорт делает Ронто великим."

  ron_valiant_freedom:0 "Доблестная свобода"
  ron_valiant_freedom_desc:0 "Как американские и канадские герои прошлого, мы будем сражаться за нашу землю против угнетательских иностранных властей!"

  ron_valiant_freedom2:0 "Доблестная свобода"
  ron_valiant_freedom2_desc:0 "Как американские и канадские герои прошлого, мы будем сражаться за нашу землю против угнетательских иностранных властей!"

