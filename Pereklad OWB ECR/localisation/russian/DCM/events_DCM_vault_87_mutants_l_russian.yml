l_russian:
DCM_vault_87_mutants.1.t:0 "Увеличение армии Мутантов"
DCM_vault_87_mutants.1.d:0 "Шепард был похож на других мутантов в Убежище 87. Он выходил, убивал людей, кого-то похищал и возвращался, чтобы создать новых мутантов. Как и другие мутанты в Убежище, он заметил, что зелёная штука становится меньше. Ни один мутант не нашёл новую зелёную штуку, а мутанты создавались именно из неё. У Шепарда возникла идея связаться мутантам в Вашингтоне и попросить их помочь найти ещё больше зелёной штуки. Он приказал мутантам в 87-м отправиться в Вашингтон с посланием."
DCM_vault_87_mutants.1.a:0 "Принести пару вещиц"
DCM_vault_87_mutants.1.b:0 "Принести пушки"
DCM_vault_87_mutants.1.c:0 "Привести их сюда сейчас же"
DCM_vault_87_mutants.2.t:0 "Судьба Фокса"
DCM_vault_87_mutants.2.d:0 "Фокса посадили в камеру, потому что он спросил, почему мы превращаем людей в супермутантов. Настоящий мутант должен просто знать, что именно это мы и делаем. Но он умён. Мы могли бы поручить ему делать то, на что мы не способны. Может быть, он поможет найти зелёную штуку в компьютере."
DCM_vault_87_mutants.2.a:0 "Он исправит «штуку»"
DCM_vault_87_mutants.2.b:0 "Он будет читать книги, чтобы найти «штуку»"
DCM_vault_87_mutants.3.t:0 "Что за ГЭКК?"
DCM_vault_87_mutants.3.d:0 "Здесь была какая-то хрень под названием ГЭКК. Фокс много о ней говорит, но она не производит зелёную жижу. Мы просто выбросим его. Эту комнату можно использовать для других целей."
DCM_vault_87_mutants.3.a:0 "Выключить её, чтобы включить что-нибудь другое"
DCM_vault_87_mutants.3.b:0 "Разберите технику в комнате"
DCM_vault_87_mutants.3.c:0 "Используем место для производства пушек"
DCM_vault_87_mutants.4.t:0 "Экспедиция в парк Такомы"
DCM_vault_87_mutants.4.d:0 "Мы отправили мутантов в ТаКоМу на поиски зеленой жижи. Никакой зеленой жижи они не нашли. Зато нашли других мутантов. Эти мутанты помогут нам найти жижу."
DCM_vault_87_mutants.4.a:0 "Приветствуем в Команде"
DCM_vault_87_mutants.5.t:0 "Мир под землей"
DCM_vault_87_mutants.5.d:0 "Гули не могут стать мутантами. Мы пробовали, но не получилось. Они и на вкус неприятные. Они слабы, но некоторые из них умны. Могут ли они нам помочь?"
DCM_vault_87_mutants.5.a:0 "Гули будут помогать"
DCM_vault_87_mutants.5.b:0 "Гули будут рабами"
DCM_vault_87_mutants.6.t:0 "Фабрика «Ядер-Колы»"
DCM_vault_87_mutants.6.d:0 "На фабрике колы течёт светящаяся голубая река. На вкус это не вода, но рядом есть несколько автоматов. Фокс говорит, что эти машины можно заставить делать и другие вещи."
DCM_vault_87_mutants.6.a:0 "Пусть делает вещи"
DCM_vault_87_mutants.6.b:0 "Пусть делает пушки"
DCM_vault_87_mutants.7.t:0 "Другие мутанты?"
DCM_vault_87_mutants_7.d:0 "Мы слышали других мутантов по радио. У них тоже большая армия. Они превращают людей в мутантов с помощью зеленой жижи. Мы связались с ними, и они говорят, что если мы последуем за их лидером, то сможем получить больше жижи. Стоит ли нам последовать за ними? Или стоит просто забрать зеленку?"
DCM_vault_87_mutants_7.a:0 "Я не знаю"
