    TAL_jabsco_name:0 "Командир Джебско"
    TAL_Jabsco_desc:0 "Командир Джебско — це мозок Компанії «Кіготь». Зі свого безпечного бункера у Форті Беністер Джебско наглядає за різними військовими операціями по всій Столичній Пустці та координує їх. Попри його заяви про роки бойового досвіду, ніхто з його людей ніколи не бачив доказів цього. У ті рідкісні випадки, коли командира бачили в бою, повідомлялося, що він втікав або ховався. Це призвело до того, що за спиною його називають Джебско-Реактивний." 
    TAL_harrison_name:0 "Капітан Гаррісон"
    TAL_harrison_desc:0 "Капітан Гаррісон не знає, кого він так розлютив, що його перевели з бойового чергування нянчитися з купою найманців. Він знає лише те, що він тут, і його робота — переконатися, що Компанія «Кіготь» варта інвестицій, які Анклав у них вкладає. Можливо, якщо справи підуть добре, він зможе повернутися до регулярних військ."
