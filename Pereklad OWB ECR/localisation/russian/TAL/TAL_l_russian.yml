l_russian:

###Ideas###
    tal_rigorous_training_idea:0 "Жорсткі тренування"
    tal_rigorous_training_idea_desc:0 "Найманці Компанії «Кіготь» — одні з найкраще навчених у всій Пустці. Дисципліна, порядок і нещадність прищеплюються кожному рекруту. Це потребує часу, і дехто не витримує відбору. Але ті, хто проходить, — найкращі." 
    tal_strict_leadership_idea:0 "Суворе керівництво"
    tal_strict_leadership_idea_desc:0 "Ці лідери не терпітимуть невдач чи слабкості й особисто стратять кожного, хто не виконує наказів."
    TAL_old_world_science_equipment:0 "Наукове обладнання Старого світу"
    TAL_old_world_science_equipment_desc:0 "Тут, у Компанії «Кіготь», у нас є найкращі 'головастики', яких тільки можна купити за кришки. Вони працюють вдень і вночі, щоб знайти новий чудовий спосіб надирати дупи та заробляти репутацію для наших клієнтів."
    TAL_mercenary_research_team:0 "Дослідники-найманці"
    TAL_mercenary_research_team_desc:0 "Дослідники, яких вважають занадто 'неетичними' для манірного Рівет-Сіті, знаходять дорогу сюди, допомагаючи нам знаходити нові та захоплюючі способи підривати все до біса."
    TAL_mercenary_weapon_maintenance:0 "Обслуговування зброї найманців"
    TAL_mercenary_weapon_maintenance_desc:0 "У польових умовах життя найманця залежить від його зброї, тому переконайся, що твоя працює справно."
    TAL_refined_ammo_processing:0 "Покращена обробка боєприпасів"
    TAL_refined_ammo_processing_desc:0 "Дрібні верстаки, зібрані з брухту, просто не зрівняються за якістю з інструментами для виготовлення набоїв, які ми маємо тут, у Беністері."
    TAL_fort_bannister_defenses:0 "Оборона Форту Беністер"
    TAL_fort_bannister_defenses_desc:0 "Автоматичні турелі, охоронні роботи та двері, що замикаються, гарантують, що знадобиться справжня армія, щоб вибити нас звідси."
    TAL_enclave_funds:0 "Фінансування Анклаву"
    TAL_enclave_funds_desc:0 "Хлопці з Анклаву платять нам дуже добре просто за те, щоб ми сіяли хаос у Пустці. Хоча джерело нашого фінансування невідоме, безліч місцевих вискочок бачать, як ми гребемо кришки лопатою, і теж хочуть до нас."
    TAL_soldiers_of_fortune:0 "Солдати удачі"
    TAL_soldiers_of_fortune_desc:0 "Справи йдуть добре, і здобичі вистачає на всіх. Наші хлопці постійно приносять трофеї зі своїх успішних рейдів."
    TAL_night_ops:0 "Нічні операції"
    TAL_night_ops_desc:0 "Який сенс носити чорну броню, якщо ми не підкрадаємося вночі, творячи всяке божевілля?"
    TAL_enclave_training:0 "Тренування Анклаву"
    TAL_enclave_training_desc:0 "Ці нові інструктори можуть бути справжніми покидьками, але вони лише трохи гірші за тих, до кого ми звикли, до того ж вони знають свою справу."
    TAL_officer_corp:0 "Офіцерський корпус"
    TAL_officer_corp_desc:0 "Деякі з наших лідерів загонів отримують солідну освіту про те, як бути лідером загону."
    TAL_raider_mercs:0 "Найманці-рейдери"
    TAL_raider_mercs_desc:0 "Раніше ми брали лише тих рейдерів, які тримали себе в руках, але, можливо, нам варто пом'якшити стандарти й використовувати більш диких як гарматне м'ясо."
    TAL_paying_for_protection_idea:0 "Сплата за захист"
    TAL_paying_for_protection_idea_desc:0 "Ці виродки з Компанії «Кіготь» витрушують з нас гроші за 'захист'."
    TAL_protection_money_idea:0 "Гроші за захист"
    TAL_protection_money_idea_desc:0 "Ці лохи з Тенпенні-Тауер платять нам за те, щоб ми сиділи склавши руки й нічого не робили, аби тільки ми не нападали на них. Це найлегші кришки, які я коли-небудь заробляв, це я тобі точно кажу."
    TAL_grooming_standards_idea:0 "Стандарти зовнішності"
    TAL_grooming_standards_idea_desc:0 "Ніхто не очікував, що умови роботи в Анклаві будуть такими суворими, але якщо підстригання вусів — це те, що потрібно, щоб залишитися на цій роботі, то краще передай ніж."
    TAL_enclave_tactics_idea:0 "Тактика Анклаву"
    TAL_enclave_tactics_idea_desc:0 "Анклав навчив нас, що бій — це не лише наявність найбільших гармат і залякування ворога до напівсмерті."

    ###New Ideas###
    TAL_brotherhood_fight_idea:0 "Тренування проти Братства"
    TAL_brotherhood_fight_idea_desc:0 "Анклав надіслав матеріали та людей, щоб навчити нас краще битися з тими 'консервними банками' з Братства."
    TAL_slave_work_force:0 "Рабська праця"
    TAL_slave_work_force_desc:0 "Раби не надто дорогі, якщо купувати їх оптом, і дешевше змусити їх штампувати зброю, ніж купувати її у торговців."
    TAL_slave_trade_idea:0 "Прибуток від работоргівлі"
    TAL_slave_trade_idea_desc:0 "Навіщо платити за рабів, якщо ми можемо викрадати їх з поселень Пустки та продавати тих, хто нам не потрібен?"
    TAL_salvaged_enclave_tec_idea:0 "Трофейні технології Анклаву"
    TAL_salvaged_enclave_tec_idea_desc:0 "Можливо, ми не розуміємо всі технології Анклаву, що потрапили до наших рук, але ми здатні розібратися достатньо."
    TAL_loyal_recruits_idea:0 "Лояльні рекрути"
    TAL_loyal_recruits_idea_desc:0 "Ми ретельно перевіряємо наших рекрутів, щоб переконатися, що вони вступають не лише заради грошей, а й з любові до своєї країни... і заради грошей."
    TAL_experienced_recruits_idea:0 "Досвідчені рекрути"
    TAL_experienced_recruits_idea_desc:0 "Ми ретельно перевіряємо рекрутів, щоб переконатися, що вони здібні солдати. Колишні найманці, охоронці караванів та військові стоять першими у списку."
    TAL_brave_recruits_idea:0 "Хоробрі рекрути"
    TAL_brave_recruits_idea_desc:0 "Ми ретельно випробовуємо наших рекрутів, щоб переконатися, що вони мають мужність битися за нас."
    tal_war_is_business_idea:0 "Війна — це бізнес"
    tal_war_is_business_idea_desc:0 "Зрештою, ми тут не для того, щоб керувати містами чи створювати порядок. Ми тут, щоб надирати дупи й збирати кришки."
    TAL_and_business_is_booming_idea:0 "Бізнес процвітає"
    TAL_and_business_is_booming_idea_desc:0 "Пустка з кожним днем стає все гіршою. Відтоді, як ми розгромили Анклав, попит на наші послуги тільки зростає!"
    TAL_grand_ambitions_idea:0 "Великі амбіції"
    TAL_grand_ambitions_idea_desc:0 "Компанія «Кіготь» — це більше, ніж просто чергова банда найманців. Незалежно від того, що думають ці так звані 'сили Пустки', ми піднесемося над усіма!"
    TAL_hunting_greenskin_home_idea:0 "Пошук лігва супермутантів"
    TAL_hunting_greenskin_home_idea_desc:0 "Наші люди невтомно шукають місце, яке супермутанти називають домом."
    TAL_reorg_idea:0 "Хаотична реорганізація"
    TAL_reorg_idea_desc:0 "У нашому штабі відбувається багато великих змін. Хаос, що виник в результаті, спричиняє чимало проблем."
    TAL_co_armerments_idea:0 "Озброєння Компанії «Кіготь»"
    TAL_co_armerments_idea_desc:0 "Нас обслуговують одні з найкращих зброярів Столичної Пустки. Нам більше не доведеться покладатися на збирання старих деталей чи іржаві самопали."
    TAL_elite_mercs_idea:0 "Елітні найманці"
    TAL_elite_mercs_idea_desc:0 "Наші найманці — найкращі з найкращих. Краще навчені, краще екіпіровані та здатні протистояти навіть найсильнішим ворогам у Пустці."
    TAL_same_but_better_idea:0 "Не ламай те, що працює"
    TAL_same_but_better_idea_desc:0 "Ми досягли успіху не завдяки просунутій силовій броні чи особливій тактиці. Нам просто потрібна стара добра дисципліна та бойовий дух."
    TAL_recruitment_offices_idea:0 "Вербувальні пункти"
    TAL_recruitment_offices_idea_desc:0 "Кілька наших найманців будуть зняті з польової служби для роботи в поселеннях по всій Пустці. Там вони переконуватимуть молодих чоловіків і жінок вступати до лав Компанії «Кіготь»!"
    TAL_lowest_bidder_idea:0 "Найнижча ціна"
    TAL_lowest_bidder_idea_desc:0 "Завдяки нашій великій присутності ми є цінним клієнтом. Тому ми змушуємо торговців Пустки конкурувати, щоб надати нам найкращу ціну. Звісно, іноді зброю заклинює або вона вибухає, але переважно — ні!"
    TAL_mobile_recon_idea:0 "Мобільна розвідка Компанії «Кіготь»"
    TAL_mobile_recon_idea_desc:0 "Хоча більша частина наших сил виконує стандартні операції, зростає кількість військ, що виконують нову роль. Наші оперативники мобільної розвідки спеціалізуються на блискавичному проникненні на територію ворога та раптових атаках з вертібердів."
    TAL_proxy_warriors_idea:0 "Проксі-воїни"
    TAL_proxy_warriors_idea_desc:0 "Найманці Компанії «Кіготь» розгорнуті повсюди в інтересах Америки. Це означає не лише битви пліч-о-пліч з нашими військовими друзями, а й часто бій на боці місцевих угруповань, щоб уповільнити експансію наших ворогів."
    TAL_ready_for_anything_idea:0 "Готові до всього"
    TAL_ready_for_anything_idea_desc:0 "Після місяців реорганізації наші операції проходять гладко як ніколи. Ми готові до всього, що Пустка приготувала для нас."
    TAL_welcomed_enclave_idea:0 "Інтеграція прихильників Едема"
    TAL_welcomed_enclave_idea_desc:0 "Солдати, які воювали за президента Едема, тепер інтегруються в наші лави. Тертя, які це викликає, заважають операціям та призводять до випадкових сутичок."
    TAL_we_bring_order_idea:0 "Ми несемо порядок"
    TAL_we_bring_order_idea_desc:0 "Кіготь Анклава несе стабільність усюди, куди приходить. Рейдери, мутанти та неслухняні поселенці однаково придушуються."
    TAL_we_bring_prosperity_idea:0 "Ми несемо процвітання"
    TAL_we_bring_prosperity_idea_desc:0 "Технології, якими володіє Кіготь Анклава, дозволяють нам відбудовувати та експлуатувати ресурси Пустки ефективніше, ніж це роблять інші нації."
    TAL_halted_slave_trade_idea:0 "Зупинена работоргівля"
    TAL_halted_slave_trade_idea_desc:0 "Замість того, щоб збирати рабів для відправки в Пітт, ми почали полювати на работорговців і не пускати каравани з нашої території до Пітта."
    TAL_extra_socks_idea:0 "Запасні шкарпетки"
    TAL_extra_socks_idea_desc:0 "Джебско прочитав якусь стару книгу про 'траншейну стопу'. Тепер ми всі мусимо мати запасні шкарпетки та регулярно їх міняти."
    TAL_lessons_of_swamps_idea:0 "Уроки боліт"
    TAL_lessons_of_swamps_idea_desc:0 "Ми дечому навчилися про бої в жахливих умовах, поки були на болотах Вірджинії."
    TAL_amish_craftsmanship_idea:0 "Майстерність амішів"
    TAL_amish_craftsmanship_idea_desc:0 "Навіть з вибуховим нашийником на шиї аміші пишаються своєю роботою і виготовляють чудові речі для продажу."
    TAL_settlement_guards_idea:0 "Коріння охоронців поселень"
    TAL_settlement_guards_idea_desc:0 "Компанія «Кіготь» може виконувати багато різних завдань сьогодні, але їхнє походження як охоронців поселень проявляється в тому, як вони воюють."
    TAL_escorting_scavs_idea:0 "Коріння охорони шукачів"
    TAL_escorting_scavs_idea_desc:0 "Компанія «Кіготь» може виконувати багато різних завдань сьогодні, але їхнє походження як охорони для шукачів брухту проявляється в їхньому вмінні орієнтуватися в Пустці."
    TAL_attacking_caravans_idea:0 "Коріння нападників на каравани"
    TAL_attacking_caravans_idea_desc:0 "Компанія «Кіготь» може виконувати багато різних завдань сьогодні, але їхнє походження як нападників на каравани проявляється в їхньому вмінні перерізати лінії постачання та грабувати запаси."
    TAL_druggie_raiders_idea:0 "Рейдери під хімікатами"
    TAL_druggie_raiders_idea_desc:0 "Основу бойової сили Компанії «Кіготь» складають рейдери, що сидять на препаратах. Вони б'ються запекло, але неохайно."
    TAL_native_wastelanders_idea:0 "Наївні мешканці Пустки"
    TAL_native_wastelanders_idea_desc:0 "Основу бойової сили Компанії «Кіготь» складають молоді мешканці Пустки, які шукають пригод. Вони сповнені ентузіазму, але багато хто не виживає після першого ж бою."
    TAL_homeless_guys_idea:0 "Знедолені Пустки"
    TAL_homeless_guys_idea_desc:0 "Основу бойової сили Компанії «Кіготь» складають знедолені та нужденні мешканці Пустки. Вони воюють дешево і лояльні за надану нами можливість, але вони далеко не найкращі."
    TAL_enclave_contracts_idea:0 "Трудовий контракт Анклаву"
    TAL_enclave_contracts_idea_desc:0 "Анклав став нашим головним роботодавцем. Платять добре, хоча деякі завдання бувають дивними."
    TAL_enclave_contracts_1_idea:0 "Трудовий контракт Анклаву"
    TAL_enclave_contracts_1_idea_desc:0 "Наш новий контракт з Анклавом надає кращі переваги, ніж раніше."
    TAL_enclave_contracts_2_idea:0 "Трудовий контракт Анклаву"
    TAL_enclave_contracts_2_idea_desc:0 "Наш новий контракт з Анклавом надає кращі переваги, ніж раніше."
    TAL_enclave_contracts_3_idea:0 "Трудовий контракт Анклаву"
    TAL_enclave_contracts_3_idea_desc:0 "Наш новий контракт з Анклавом надає кращі переваги, ніж раніше."
    TAL_enclave_settlements_idea:0 "Адміністрація поселень Анклаву"
    TAL_enclave_settlements_idea_desc:0 "Поселення на території Компанії «Кіготь» перебувають під управлінням Анклаву."
    TAL_talon_settlements_idea:0 "Адміністрація поселень «Кіготь»"
    TAL_talon_settlements_idea_desc:0 "Поселення на території Компанії «Кіготь» будуть адмініструватися владою Компанії «Кіготь»."
    TAL_cleaning_purity_idea:0 "Розробка антигену ВРЕ"
    TAL_cleaning_purity_idea_desc:0 "Наші вчені присвячують майже весь свій час і ресурси розробці антигену для модифікованого ВРЕ, що забруднює Проєкт 'Чистота'."
    TAL_slow_to_trust_idea:0 "Поступова розбудова довіри"
    TAL_slow_to_trust_idea_desc:0 "Мешканці Пустки цілком зрозуміло ставляться до нас з побоюванням. З часом ми здобудемо їхню довіру, але це потребує часу."
    TAL_increased_merc_pay_idea:0 "Підвищена платня найманцям"
    TAL_increased_merc_pay_idea_desc:0 "Щоб зберегти лояльність наших людей, ми платимо їм більше, ніж будь-коли раніше."
    TAL_simms_promises_kept_idea:0 "Дотримані обіцянки"
    TAL_simms_promises_kept_idea_desc:0 "Ми стримали свої обіцянки, дані Лукасу Сіммсу, і завойовуємо довіру мешканців Пустки."
    TAL_merchant_freedom_idea:0 "Захист свобод торговців"
    TAL_merchant_freedom_idea_desc:0 "Торговцям Пустки нема чого нас боятися. Податки можуть стягуватися, але вони низькі, як і правила — легкі."
    TAL_merchant_regulation_idea:0 "Регулювання торговців"
    TAL_merchant_regulation_idea_desc:0 "Торговців Пустки тримають в узді за допомогою правил і помірних податків."
    TAL_reinvented_government_idea:0 "Винайдений заново уряд"
    TAL_reinvented_government_idea_desc:0 "Намагаючись вимагати гроші у людей Пустки в обмін на захист, Джебско випадково винайшов концепцію уряду."
    TAL_accelerated_pitt_idea:0 "Прискорене виробництво"
    TAL_accelerated_pitt_idea_desc:0 "Кузні Пітта палають яскраво. Робота ніколи не припиняється, а робітників, що зупиняються, замінюють."
    TAL_maintained_pitt_idea:0 "Стабільне виробництво"
    TAL_maintained_pitt_idea_desc:0 "Кузні Пітта горять стабільно. Робота ведеться на плавному, стійкому рівні."
    TAL_werners_way_idea:0 "Шлях Вернера"
    TAL_werners_way_idea_desc:0 "Кузнями Пітта керують м'якою рукою. Робітникам дозволені перерви, вони працюють лише по 12 годин. У довгостроковій перспективі це має бути краще."
    TAL_ashurs_way_idea:0 "Шлях Ашура"
    TAL_ashurs_way_idea_desc:0 "Кузні Пітта палають так само яскраво, як і раніше. Раби майже не помічають різниці між управлінням Джебско чи Ашура."
    TAL_reinvented_government_2_idea:0 "Винайдений заново уряд"
    TAL_reinvented_government_2_idea_desc:0 "Намагаючись вимагати гроші у людей Пустки в обмін на захист, Джебско випадково винайшов концепцію уряду."
    TAL_supplying_pitt_idea:0 "Постачання Пітта"
    TAL_supplying_pitt_idea_desc:0 "Завдяки нашому домінуванню в работоргівлі Столичної Пустки, ми є величезним постачальником для Пітта."
    TAL_supplying_pitt_2_idea:0 "Постачання Пітта"
    TAL_supplying_pitt_2_idea_desc:0 "Завдяки нашим партнерам та цінному ресурсу зі Столиці, ми є незамінним постачальником для Пітта."
    TAL_talon_supplyers_idea:0 "Поставки Компанії «Кіготь»"
    TAL_talon_supplyers_idea_desc:0 "Компанія «Кіготь» постачає нам рабів зі Столичної Пустки."
    TAL_talon_supplyers_2_idea:0 "Поставки Компанії «Кіготь»"
    TAL_talon_supplyers_2_idea_desc:0 "Коли наша потреба в рабській силі зникла, Компанія «Кіготь» переключилася на постачання цінних ресурсів через сторонніх партнерів."
    TAL_southern_imports_idea:0 "Південний імпорт"
    TAL_southern_imports_idea_desc:0 "Цінний брухт усіх видів доставляється з півдня через торговців Довера."
    TAL_hershey_exports_idea:0 "Експорт з Херші"
    TAL_hershey_exports_idea_desc:0 "Коли Херші перебуває під контролем Бородавочника, майстри-аміші працюють, а їхні товари продаються повсюди. Бородавочник виділив нам частку як подяку за допомогу."
    TAL_joes_junkmen_idea:0 "Сміттярі Джо"
    TAL_joes_junkmen_idea_desc:0 "Джо залучив більше своїх соратників з часів збирання брухту, щоб організувати команди рабів для пошуку в руїнах Вашингтона металобрухту та іншої цінної здобичі."
    TAL_constantine_attacking_idea:0 "Атака Константина"
    TAL_constantine_attacking_idea_desc:0 "Роботи Форту Константин збожеволіли й атакують наші фланги. Поки ми не знищимо цих ботів, наша армія страждатиме."

    ###Occupation Laws###
    ecr_protection_contracts:0 "Контракт на захист"
    ecr_protection_contracts_desc:0 "Компанія «Кіготь» укладе угоду з місцевими лідерами про захист їхніх поселень в обмін на купу кришок. Відмова від цієї щедрої пропозиції може стати фатальною."
    
    ###Events###
    TAL_nf_events.1.title:0 "Збір команди"
    TAL_nf_events.1.desc:0 "Джебско, як і багато молодих хлопців у Столичній Пустці, не мав великих перспектив працевлаштування. Після низки невдалих робіт останньою краплею стало звільнення з охорони караванів після того, як він втік від зграї кротощурів. Саме тоді Джебско усвідомив своє покликання. Він не був народжений для тяжкої праці, він був народжений, щоб командувати іншими й багатіти за їхній рахунок! Завдяки перебільшенням та порожнім обіцянкам командир Джебско зміг зібрати свою першу команду найманців. Але хто буде достатньо дурним, щоб клюнути на це?"
    TAL_nf_events.1.a:0 "Рейдери, залежні від хімії"
    TAL_nf_events.1.b:0 "Наївна молодь Пустки"
    TAL_nf_events.1.c:0 "Знедолені безхатьки"
    TAL_nf_events.2.title:0 "Брудна робота за безцінь"
    TAL_nf_events.2.desc:0 "На самому початку банда найманців Джебско мала небагато шансів на успіх. Їхня уніформа складалася з грубо розфарбованих шматків металу, перетворених на броню, їхня зброя — з будь-яких дешевих самопалів, які вони могли собі дозволити, а їхньою базою була хижа, що дісталася Джебско від бабусі. Репутація — це все в бізнесі найманців, і новонароджена Компанія «Кіготь» мала її створити, щоб отримувати хороші замовлення. У перші дні їхньою основною роботою було..."
    TAL_nf_events.2.a:0 "Охорона прикордонних поселень"
    TAL_nf_events.2.b:0 "Супровід шукачів у старі руїни"
    TAL_nf_events.2.c:0 "Напади на каравани та поселення"
    TAL_nf_events.3.title:0 "Вхід до Беністера"
    TAL_nf_events.3.desc:0 "Часи були важкими, і не раз Компанії «Кіготь» доводилося тікати з місця роботи. Під час одного з таких 'тактичних відступів' вони натрапили на Форт Беністер. Напівзруйновані довоєнні руїни були майже повністю розграбовані на поверхні. Величезним везінням стало те, що Джебско випадково знайшов стару ключ-карту на скелеті й повів своїх людей на нижні рівні. Там вони знайшли..."
    TAL_nf_events.3.a:0 "Охоронних ботів, готових до активації"
    TAL_nf_events.3.b:0 "Склад довоєнної зброї"
    TAL_nf_events.3.c:0 "Старі навчальні посібники"
    TAL_nf_events.3.d:0 "Вони ніхрена там не знайшли"
    TAL_nf_events.4.title:0 "Джебско-втікач"
    TAL_nf_events.4.desc:0 "Попри його хвастощі та переконлину брехню, дедалі більше найманців у Компанії «Кіготь» швидко зрозуміли, що їхній лідер — боягуз. Його розповіді про минулу доблесть і великі подвиги ніколи не підтверджувалися. Не допомагало й те, що його неодноразово бачили тікаючим з боїв, які йшли не за планом. Зазвичай найманці не йдуть за тим, хто майже не виходить з бункера, але Джебско був особливим. Попри всі недоліки, у нього точно був талант до..."
    TAL_nf_events.4.a:0 "організації операцій"
    TAL_nf_events.4.b:0 "переговорів за контрактами"
    TAL_nf_events.4.c:0 "тренування бійців"
    TAL_nf_events.4.d:0 "підтримання гарного настрою у людей"
    TAL_nf_events.5.title:0 "Справжнє покарання"
    TAL_nf_events.5.desc:0 "Зійшовши з гвинтокрил, капітан Гаррісон відчув всю важкість свого становища. Форт Беністер більше нагадував табір біженців навколо зруйнованих цементних конструкцій та куп іржавого брухту, ніж військову базу. Так звані солдати, якими він мав командувати, стояли у жалюгідному строю біля зони висадки. Ці неслухняні мутанти витріщалися в брудній формі з роззявленими ротами, ніби ніколи раніше не бачили гвинтокрил. Лише кілька зайвих слів не тій людині — і ось капітан отримав це незавидне завдання: якось привести це збіговисько до ладу. Ніхто не знав, коли саме прийде наказ від командування вступити в бій, але якщо Гаррісон хотів колись повернутися до свого колишнього підрозділу, вони мали бути готові. Дивлячись на людей, капітан Гаррісон задавався питанням, чи не виявиться це завдання неможливим."
    TAL_nf_events.5.a:0 "Нас чекає багато роботи."
    TAL_nf_events.6.title:0 "Казки Наварро"
    TAL_nf_events.6.desc:0 "Щодня бачачи цих немитих найманців, капітан Гаррісон не міг не згадувати життя в Рейвен-Рок. Солдати Анклаву були охайними та дисциплінованими. Найманці Компанії «Кіготь», навпаки, були брудними та галасливими. Вони ледь реагували на найпростіші команди, а більшість з них не могли всидіти на місці під час лекцій з військової теорії. За кілька тижнів капітан Гаррісон згадав старі розповіді батька про навчальний табір на Заході. Його батько розповідав про старого сержанта-інструктора, який міг перетворити навіть найбільш недисциплінованого рекрута на зразкового солдата. Згідно з розповідями, першочерговим завданням сержанта було забезпечення охайного вигляду та стану форми. Запровадження суворих стандартів зовнішності могло стати першим кроком до навЕдемня порядку."
    TAL_nf_events.6.a:0 "ПРИБЕРИ ЦІ ВУСА, РЯДОВИЙ!"
    TAL_nf_events.7.title:0 "Що таке фланг?"
    TAL_nf_events.7.desc:0 "Капітан був абсолютно приголомшений питанням одного з найманців. Кам'яні обличчя присутніх у кімнаті свідчили про те, що це не було черговим юнацьким жартом — хлопець запитував серйозно, а всі інші чекали на відповідь, бо теж не знали. Капітан знав зі звітів, що тактика мешканців Пустки була примітивною, але він сподівався, що Компанія «Кіготь» здатна на щось більше, ніж просто бігти натовпом на ціль. У цей момент стало болісно ясно, що якою б дисциплінованою не була ця група найманців, вони будуть марними проти будь-якого організованого противника. Їм знадобиться набагато більше підготовки, якщо вони хочуть бути вартими ресурсів, які Анклав у них інвестує."
    TAL_nf_events.7.a:0 "Гаразд, значить, фланг — це..."
    TAL_nf_events.8.title:0 "Цікава пропозиція"
    TAL_nf_events.8.desc:0 "Компанія «Кіготь» надіслала нам цікаву пропозицію. Згідно з нашим контрактом, ми погодилися не забирати обладнання в Беністері, до якого вони мали доступ, включаючи ящики з високотехнологічними деталями. На щастя, командир, якого ми туди призначили, знайшов рішення, з яким погодилися їхні офіцери: простий обмін. Капітан Гаррісон повідомляє, що найманці готові віддати ці просунуті компоненти в обмін на гвинтівки та боєприпаси. У довгостроковій перспективі це вигідна угода, але нам потрібно перевірити запаси й вирішити, чи можемо ми віддати те, що вони просять."
    TAL_nf_events.8.a:0 "Ми можемо дати 100 гвинтівок"
    TAL_nf_events.8.b:0 "Ми можемо дати 200 гвинтівок"
    TAL_nf_events.8.c:0 "Ми можемо дати 300 гвинтівок"
    TAL_nf_events.8.d:0 "Нам потрібна кожна гвинтівка!"
    TAL_nf_events.9.title:0 "Атака супермутантів!"
    TAL_nf_events.9.desc:0 "Одна з наших штурмових груп переслідувала загін найманців Компанії «Кіготь», що тікав, і втратила їх з поля зору. Поруч був укріплений табір, і наші солдати рушили до нього, припускаючи, що це аванпост Компанії «Кіготь». Виявилося, що це велике поселення супермутантів. Хоча наші люди все ж знищили табір, найманцям вдалося втекти, а ми зазнали більших втрат, ніж очікувалося."
    TAL_nf_events.9.a:0 "Будь вони прокляті!"
    TAL_nf_events.10.title:0 "Збожеволілі машини"
    TAL_nf_events.10.desc:0 "Ми не знаємо чому, але роботизована охорона у Форті Константин почала просуватися до Рейвен-Рок і атакувати всіх на своєму шляху. Можна припустити, що до цього причетна Компанія «Кіготь». Кілька роботів нас не знищать, але цей розвиток подій може поставити під загрозу наші операції."
    TAL_nf_events.10.a:0 "Ми все одно переможемо"
    TAL_nf_events.11.title:0 "Почалося"
    TAL_nf_events.11.desc:0 "Як він робив це майже щотижня відтоді, як очолив Компанію «Кіготь», капітан Гаррісон стояв у дворі Форту Беністер і звертався до своїх людей. Цього разу він не говорив про нові тренування чи дисциплінарні заходи. Це був той самий великий день, до якого вели останні місяці. Анклав заявив про себе в Пустці, і, як усі й очікували, Братство чинило запеклий опір. Гаррісон дивився на людей, що стояли в строю перед ним, і розумів, наскільки радикально вони змінилися з того часу, як він вперше приземлився в Беністері. Тепер ці люди стояли в належному строю, їхня форма була в порядку, а увага прикута виключно до капітана. Як тільки він закінчив свою промову й наказав солдатам з'явитися до лідерів загонів для отримання завдань, він побачив, як вони миттєво взялися до роботи. Можливо, вони все ж таки не всі загинуть у своїх перших боях з Братством."
    TAL_nf_events.11.a:0 "Або, можливо, це лише надії"
    TAL_nf_events.12.title:0 "Облога Тенпенні-Тауер"
    TAL_nf_events.12.desc:0 "Тенпенні-Тауер був найрозкішнішою фортецею в Столичній Пустці, створеною для того, щоб тримати небезпеки Пустки зовні, а мешканці могли насолоджуватися спокоєм і розкішшю. Стін, що стояли роками, вистачало, щоб стримувати рейдерів чи істот, але не Компанію «Кіготь». Капітан Гаррісон мав віддати найманцям належне: він повністю очікував, що вони почнуть грабувати вежу, як тільки прорвуть оборону. Натомість лідер атаки зв'язався по рації, запитуючи дозволу на розграбування."
    TAL_nf_events.12.a:0 "Про це не може бути й мови"
    TAL_nf_events.12.b:0 "Зведіть це до мінімуму"
    TAL_nf_events.12.c:0 "Робіть що хочете"
    TAL_nf_events.13.title:0 "Перевершуючи очікування"
    TAL_nf_events.13.desc:0 "Йдучи на це завдання і навіть у перші дні війни Анклаву та Братства, капітан Гаррісон очікував, що люди під його командуванням будуть лише гарматним м'ясом. Він вірив, що, попри всі його зусилля, ці найманці стануть лише відволікаючим фактором для Братства. Побоювання капітана швидко розвіялися. Компанія «Кіготь» не лише добре проявила себе в боях з союзниками Братства, але ці колись недисципліновані солдати удачі навіть вистояли проти самого Братства. Це означало, що найманці не тягнутимуть його кар'єру на дно. Всупереч тому, що думав він та майже всі в Анклаві, ці воїни Пустки не були марними, а якраз навпаки. Компанія «Кіготь» довела, що за правильних інструкцій мешканці Пустки можуть бути компетентними солдатами. Мета капітана була досягнута, і його шанси на повернення в Рейвен-Рок значно зросли."
    TAL_nf_events.13.a:0 "Але чи захоче він повертатися?"
    TAL_nf_events.14.title:0 "Хаос перетворюється на кришки"
    TAL_nf_events.14.desc:0 "Крах Братства та поселень Столиці після війни з Анклавом мав очікувані побічні ефекти. Рейдери-опортуністи завдавали ударів по прикордонних поселеннях, поки Анклав освоював свою нову роль уряду Столичної Пустки. Саме тут втрутилася Компанія «Кіготь». Згідно з обговореннями майора Гаррісона з головнокомандувачем Оттемом, Компанія «Кіготь» охоронятиме поселення на півдні Столичної Пустки, щоб дати Анклаву можливість зітхнути з полегшенням. Натомість Компанія «Кіготь» зможе збирати плату за ці послуги безпосередньо з поселень."
    TAL_nf_events.14.a:0 "Здається, це вигідно обом сторонам"
    TAL_nf_events.15.title:0 "Новий контракт"
    TAL_nf_events.15.desc:0 "Початковий план для Компанії «Кіготь» після війни з Братством передбачав їх розформування та анексію територій. Проте майор переконав Оттема відкласти це рішення й дозволити найманцям продовжувати роботу на уряд. Умови цієї угоди мали бути обговорені пізніше, коли хаотична ситуація у Столичній Пустці трохи вщухне. Цей час нарешті настав, і угода була майже такою ж, як і раніше, за винятком винагороди. Майор попросив, щоб разом із звичайною оплатою для найманців було додано дещо зверху."
    TAL_nf_events.15.a:0 "Краща оплата для людей"
    TAL_nf_events.15.b:0 "Субсидії на виробництво зброї"
    TAL_nf_events.15.c:0 "Більше прав на трофейне обладнання"
    TAL_nf_events.16.title:0 "Під покровом ночі"
    TAL_nf_events.16.desc:0 "Початковий оптимізм капітана після успіхів Компанії «Кіготь» на полі бою швидко змінився тривожним відчуттям жаху. Незабаром після Битви за Проєкт 'Чистота' майже весь зв'язок з командуванням було перервано. Єдиним джерелом інформації були рідкісні скидання припасів з вертібердів, але навіть тоді екіпажі були незвично мовчазними. Капітан хвилювався, що війна йде не так добре, як очікувалося, або, можливо, його усуває хтось із командування, кому не подобалися успіхи Компанії «Кіготь». Жодне з його найгірших побоювань не могло підготувати його до правди, яка прибула під стіни Беністера посеред ночі. Кілька побитих офіцерів і солдатів прибули на сильно пошкоджених гвинтокрилх. Капітан ледь не оголосив тривогу, думаючи, що це несподіваний наступ Братства. Перш ніж він встиг віддати наказ, його відвів убік молодий лейтенант і розповів про справжню мету візиту.\n \n§RПолковник Оттем мертвий, як і більшість командування. Едем проводить 'чистку', і нам потрібна ваша допомога.§! \n \nКапітан прийняв тих, хто вижив, у Беністері й провів більшу частину ночі, слухаючи їхню історію. Полковник Оттем дізнався про план президента Едема очистити Пустку за допомогою модифікованого ВРЕ і спробував здійснити переворот, щоб зупинити цей план. Провал перевороту та масові страти змовників, що послідували за цим, змусили багатьох тікати. Після кількох спроб перегрупуватися, які виявилися пастками, їм не залишилося іншого місця, крім Форту Беністер. Тривожна думка незабаром осяяла капітана якщо Едем так поводиться з командуванням, і такий його план щодо мешканців Пустки, то скоро він прийде і по його душу. Якщо ці солдати, капітан та Компанія «Кіготь» хочуть вижити, їм потрібно готуватися до бою."
    TAL_nf_events.16.a:0 "Але спершу нам треба сховати ці 'пташки'!"
    TAL_nf_events.17.title:0 "Сховатися на видноті"
    TAL_nf_events.17.desc:0 "Протягом тижнів після прибуття перших вцілілих з Анклаву з'являлося все більше людей. Місця для них вистачало, але це був лише час, коли хтось із команд постачання помітив би чергового солдата в покращеній силовій броні. Якщо ці солдати хотіли уникнути викриття, їм потрібно було сховати свої костюми й одягнути щось менш помітне."
    TAL_nf_events.17.a:0 "Дякувати Богу за ці трофейні технології Братства"
    TAL_nf_events.18.title:0 "Ризиковане рандеву"
    TAL_nf_events.18.desc:0 "Після першої зустрічі з тими, хто вижив після невдалого перевороту Оттема, капітан Гаррісон наказав зняти частину розвідників з передової, щоб вони перевірили чутки про солдатів Анклаву, помічених далеко від фронту. Результати були неоднозначними. Іноді вони знаходили виголоджений загін, що обшукував напівзруйнований продуктовий магазин, іноді — лише трупи навколо розбитого гвинтокрил. Але цей слід був найбільш перспективним. Розвідники перевірили численні повідомлення про знищені вертіберди в пагорбах безпосередньо на заході. На відміну від інших місць катастроф, ці машини, схоже, приземлилися безпечно і були навмисно знищені вже після посадки. Судячи з кількості машин та їхньої близькості, все вказувало на великий контингент вцілілих, що отаборилися в горах. Капітан знав, що той, хто зібрався в тих пагорбах, ймовірно, очікує бою, тому йти туди з усіма силами означало б непотрібне кровопролиття. Замість цього він узяв двох вцілілих у пошарпаній силовій броні APA і вирушив у гори самостійно. Майже одразу вони потрапили в засідку вцілілих анклавівців і були взяті в полон. Трійцю недовго допитували, перш ніж привести до лідера — майора Шарпа з повітряно-штурмового корпусу. Майор знав, хто такий капітан Гаррісон, і розумів, що той явно не очолює загін карателів. Це викликало питання: що робить цей вигнаний капітан у пагорбах, розшукуючи їх?"
    TAL_nf_events.18.a:0 "Майоре, ми можемо зупинити Едема, якщо будемо працювати разом."
    TAL_nf_events.19.title:0 "Побиті та закривавлені"
    TAL_nf_events.19.desc:0 "Навіть з майором Шарпом та рештою вцілілих прибічників Оттема, Компанія «Кіготь» мала дуже мало шансів перемогти сили президента Едема. Якщо вони хотіли виграти майбутню битву, їм була потрібна будь-яка допомога. Це означало співпрацю з мешканцями Пустки, з якими вони щойно воювали. Вони зустрілися глибоко в забутій станції метро на південь від Тенпенні-Тауер. Представники обох сторін були сповнені недовіри й готові відкрити вогонь за найменшої нагоди. Майже дивом гору взяв здоровий глузд, і було сформовано крихкий альянс."
    TAL_nf_events.19.a:0 "Чи вистачить кількох озброєних фермерів?"
    TAL_nf_events.20.title:0 "Постачання бійців з пагорбів"
    TAL_nf_events.20.desc.1:0 "Оголошення про розшук Лукаса Сіммса з обіцянкою великої винагороди були розклеєні Анклавом майже в кожному поселенні. Попри це, мало хто наважувався піти за шерифом Пустки в пагорби. Багато хто ігнорував переслідування, бо таємно вірив у його справу, але так само багато хто знав, що це буде самогубна місія. Якщо навіть Анклав не може впоратися з лідером поселенців, який став партизаном, не отримавши по носі, то які шанси у звичайного мисливця за головами? Проте не можна сказати, що у Сіммса та його бійців справи йшли добре. На кожну успішну засідку припадала смертельна невдача. Коли від іншої групи опору надійшла звістка, що офіцер Анклаву хоче кинути виклик президенту Едему, Сіммс погодився принаймні вислухати. \nЗустріч Гаррісона та Сіммса тривала до ранку, але врешті-решт угода була укладена. Компанія «Кіготь» забезпечить бійців опору зброєю. Потім, коли настане слушний момент, вони спустяться з гір і вступлять у бій з Анклавом. Залишалося питання: скільки саме допомоги зможе надати «Кіготь»?"
    TAL_nf_events.20.desc.2:0 "Лукас Сіммс вів партизанську війну ще до того, як Анклав заявив про себе. Після успішного повстання Дейва, Сіммс і його найближчі прибічники стали вигнанцями. Вони пішли в гори, борючись за виживання, і спостерігали, як Анклав захоплює Столичну Пустку. Тепер Сіммс очолив багатьох із тих, хто раніше полював на нього, продовжуючи боротьбу проти Анклаву довгий час після капітуляції Дейва. Усі в таборі Сіммса розуміли, що їхнє становище безнадійне, якби не рекомендації іншого осередку за капітана Гаррісона — вони б швидше застрелили офіцера Анклаву, ніж вислухали його. \nЗустріч Гаррісона та Сіммса тривала до ранку, але врешті-решт угода була укладена. Компанія «Кіготь» забезпечить бійців опору зброєю. Потім, коли настане слушний момент, вони спустяться з гір і вступлять у бій з Анклавом. Залишалося питання: скільки саме допомоги зможе надати «Кіготь»?"
    TAL_nf_events.20.a:0 "Ми даємо те, що можемо, а це небагато"
    TAL_nf_events.20.b:0 "Ми можемо виділити чимало"
    TAL_nf_events.20.c:0 "Ваші люди будуть добре озброєні, пане Сіммс"
    TAL_nf_events.21.title:0 "Більше, ніж просто найманці"
    TAL_nf_events.21.desc:0 "Після поразки Анклаву від рук Компанії «Кіготь», група найманців переросла це просте визначення. Солдати Джебско здатні поширювати свій вплив на всю Столичну Пустку і далі. Мало хто, крім Братства, може сподіватися протистояти їм, а землі, які вони займають, перебувають під їхнім повним контролем. На краще чи на гірше, Компанія «Кіготь» перетворилася з банди найманців на подобу армії з власною державою."
    TAL_nf_events.21.a:0 "Звучить солідно"
    TAL_nf_events.22.title:0 "Здирництво Компанії «Кіготь»"
    TAL_nf_events.22.desc:0 "Найманці Компанії «Кіготь» нещодавно прибули до Тенпенні-Тауер, пропонуючи свої послуги з охорони. Вони згадали, що вежа розташована близько до території рейдерів, і фактично заявили: якщо ми не заплатимо, на нас нападуть. Найманці отаборилися неподалік і чекають на відповідь. Слід зазначити, що після розгрому Анклаву у Компанії «Кіготь» з'явилася значна кількість передового спорядження."
    TAL_nf_events.22.a:0 "Ми не будемо платити"
    TAL_nf_events.22.b:0 "Дайте їм те, що вони хочуть"
    TAL_nf_events.23.title:0 "Пропозиція Компанії «Кіготь»"
    TAL_nf_events.23.desc:0 "Поширилися чутки, що Компанія «Кіготь» у Вашингтоні нещодавно мала велику битву з якимись людьми в силовій броні, що жили в бункері через річку. Кажуть, це були ті хлопці з Анклаву, про яких розповідали по радіо. Тепер якісь люди з Компанії «Кіготь» в силовій броні, якої ми ніколи раніше не бачили, прийшли в Пітт, пропонуючи працювати на Ашура за певну ціну."
    TAL_nf_events.23.a:0 "Вони хочуть плату? Вишвирніть їх!"
    TAL_nf_events.23.b:0 "Дайте їм кілька кришок"
    TAL_nf_events.24.title:0 "Пропозиція Компанії «Кіготь»"
    TAL_nf_events.24.desc:0 "Поширилися чутки, що Компанія «Кіготь» у Вашингтоні нещодавно мала велику битву з якимись людьми в силовій броні, що жили в бункері через річку. Кажуть, це були ті хлопці з Анклаву, про яких розповідали по радіо. Тепер якісь люди з Компанії «Кіготь» в силовій броні, якої ми ніколи раніше не бачили, прийшли в Пітт, пропонуючи працювати на Ашура за певну ціну. Схоже, вони не чули про нещодавню зміну керівництва."
    TAL_nf_events.24.a:0 "Виставте цих бовдурів за двері"
    TAL_nf_events.25.title:0 "Будь сам собі господарем!"
    TAL_nf_events.25.desc:0 "Після вивчення звітів розвідки про райони навколо Столичної Пустки стало очевидно, що там немає жодної групи, на яку варто було б працювати. Очевидно, Компанія «Кіготь» на голову вища за всіх інших, і Пустка готова до того, щоб її захопили."
    TAL_nf_events.25.a:0 "Стережіться, Братство"
    TAL_nf_events.26.title:0 "Скільки за чашку?"
    TAL_nf_events.26.desc:0 "Що б не робив цей хлопець Джо на півдні Вашингтона, він робить це добре. Таку людину варто було б найняти. Відправимо туди людей на вертіберді, щоб зробити йому пропозицію, від якої він не зможе відмовитися. Влаштуємо справжню демонстрацію сили: силова броня, плазмові гвинтівки, все як має бути. Нехай він накладе в штани, перш ніж ми вручимо йому мішок кришок."
    TAL_nf_events.26.a:0 "Якщо відмовить — прикінчіть його"
    TAL_nf_events.27.title:0 "Перспективний працівник"
    TAL_nf_events.27.desc:0 "Джебско ніколи в цьому не зізнається, але він ні хрена не тямить у керуванні поселенням, а тим паче цілою нацією. Він майстер у тому, щоб вказувати солдатам, куди йти, але не дуже вміє стежити за тим, щоб каравани ходили вчасно. На щастя, людина, придатна для цього завдання, якраз була витіснена зі своєї території Братством (чи то були їхні Ізгої?). Неважливо — Джо Слокем був вигнаний з південного Вашингтона і шукає роботу."
    TAL_nf_events.27.a:0 "Ласкаво просимо на борт"
    TAL_nf_events.28.title:0 "Дивакуваті мандрівники"
    TAL_nf_events.28.desc:0 "У тих диваків на заході, які мали досить круті гармати, здається, виникли проблеми. Ми бачимо все більше з них, що йдуть на схід, а нещодавно чимала група підійшла до самого Беністера, шукаючи допомоги. Зазвичай ми б послали їх під три чорти, але один із них сказав, що він один із тих, хто створював ці гармати! Можливо, у нього немає всіх креслень, щоб ми могли робити їх з нуля, але він принаймні допоможе нам зрушити справу з мертвої точки. В обмін на це ми маємо прихистити його та його друзів."
    TAL_nf_events.28.a:0 "Зброя, що перевершить 'Металобрухт'"
    TAL_nf_events.29.title:0 "Сказка в оці"
    TAL_nf_events.29.desc:0 "Супермутанти завжди були скалкою в дупі. Більшу частину часу ми можемо перехитрити їх, але іноді доводиться вступати в серйозну сутичку. Ситуація погіршується з кожним днем, тому рано чи пізно вони прийдуть під стіни Беністера. Дехто з хлопців хоче просто знайти той смітник, звідки вони лізуть, і закрити його. Чим більше людей ми на це кинемо, тим менше часу це займе. Але скільки бійців ми можемо виділити для такої справи?"
    TAL_nf_events.29.a:0 "Зібрати невелику команду"
    TAL_nf_events.29.b:0 "Виділити кілька загонів для цього"
    TAL_nf_events.29.c:0 "Кинути на це всіх, кого можемо"
    TAL_nf_events.30.title:0 "Паршиве старе Сховище"
    TAL_nf_events.30.desc:0 "Логово мутантів знайшли в якомусь паршивому старому Сховищі, де вони занурювали людей у зелену жижу чи щось подібне. Хлопці перебили цілу купу мутантів і запечатали двері кімнат з жижею важкою вибухівкою, так що про супермутантів можна більше не хвилюватися. Дехто почав жартувати, що ми за кілька місяців зробили те, що Братство не змогло за роки."
    TAL_nf_events.30.a:0 "Тому що ми — найкращі!"
    TAL_nf_events.31.title:0 "Великі зміни"
    TAL_nf_events.31.desc:0 "Протягом тижнів після укладення нового контракту ресурси хлинули у Форт Беністер. Паркани відремонтовані, будівлі звЕдемі, встановлено автоматичну оборону. Навіть краще за нові ресурси був доступ до баз даних та креслень, що дозволило будувати кращі споруди."
    TAL_nf_events.31.a:0 "Відбудуємо Беністер кращим!"
    TAL_nf_events.32.title:0 "Любителі мутантів убили Едема!"
    TAL_nf_events.32.desc:0 "Президент Едем міг бути президентом лише за титулом, але його цілі були близькі до цілей Секретаря. До нас дійшли тривожні новини про те, що солдати Анклаву під його командуванням підняли зброю разом із мутантами Пустки, щоб убити президента і зупинити його план з ВРЕ. Це тривожний поворот подій. Якщо ми не придушимо цих вискочок, ми можемо зіткнутися із загрозою, гіршою за Братство."
    TAL_nf_events.32.a:0 "Ми розчавимо їх"
    TAL_nf_events.33.title:0 "Як новенький"
    TAL_nf_events.33.desc:0 "Коли майор прибув до Форту Беністер, той був більше схожий на табір сквотерів, ніж на військову базу. Майор робив усе можливе з тим, що було під рукою, щоб привести місце до ладу, але можливості гвинтокрил з припасами з Рейвен-Рок, що прилітав раз на два тижні, були обмежені. Після притоку нових ресурсів усе змінилося. Після місяців будівництва, ремонту та прибуття нового персоналу, Форт Беністер отримав потужності, що перевершували навіть ті, що були до війни. Можливо, настав час для нової назви."
    TAL_nf_events.33.a:0 "Залишити назву Форт Беністер"
    TAL_nf_events.33.b:0 "Чи не занадто пихато назвати його Форт Гаррісон?"
    TAL_nf_events.33.c:0 "Форт Джебско?"
    TAL_nf_events.34.title:0 "Поліція Компанії «Кіготь»?"
    TAL_nf_events.34.desc:0 "Є чимало поселень у районах, що вважаються підконтрольними Компанії «Кіготь». Технічно ці мешканці, як і всі інші, підпадають під дію американського законодавства. Однак, оскільки територія перебуває під окупацією Компанії «Кіготь», в поселеннях не було встановлено адміністраторів Анклаву. Це призвело до багатьох проблем, і тепер члени Цивільної адміністрації Анклаву вимагають знайти рішення. Як найстарший офіцер на території, майор має вирішити це питання."
    TAL_nf_events.34.a:0 "Анклав керуватиме поселеннями"
    TAL_nf_events.34.b:0 "Компанія «Кіготь» керуватиме поселеннями"
    TAL_nf_events.35.title:0 "Воїни майбутнього"
    TAL_nf_events.35.desc:0 "У Компанії «Кіготь» була проблема з іміджем. Як і у випадку з Анклавом, рішення минулого керівництва заплямували їхню репутацію. Майор ледве пам'ятав про якусь різанину в поселенні, що нібито сталася за кілька місяців до того, як він очолив командування, проте саме це пам'ятало багато мешканців Пустки. Якщо компанія хоче інтегруватися в американське суспільство і досягти успіху після відновлення Америки, знадобляться зміни. Майор не приймав це рішення легковажно. Така фундаментальна зміна ідентичності може вплинути не лише на те, що намальовано на уніформі, вона може змінити організацію в її основі. На чому спеціалізуватиметься Компанія «Кіготь» у майбутньому?"
    TAL_nf_events.35.a:0 "Компанія «Кіготь» прагнутиме бути найкращими найманцями в Америці"
    TAL_nf_events.35.b:0 "Компанія «Кіготь» буде найбільшою групою найманців в Америці"
    TAL_nf_events.35.c:0 "Компанія «Кіготь» битиме швидко і сильно в будь-якій точці Америки"
    TAL_nf_events.35.d:0 "Компанія «Кіготь» виконає роботу, незалежно від кількості жертв серед цивільних"
    TAL_nf_events.36.title:0 "Грозові хмари на заході"
    TAL_nf_events.36.desc:0 "Майор ніяково сидів на своєму місці за столом у брифінг-залі Рейвен-Рок. Він був оточений генералами, провідними вченими та навіть цивільними чиновниками, які, як і він, не знали причини зборів. Тихі розмови припинилися, коли відчинилися автоматичні двері. Головнокомандувач Оттем пройшов до свого місця на чолі столу і звернувся до присутніх.\n \n§BПанове, дякую, що прийшли. Відтоді, як я відключив божевільну машину, що називала себе президентом Едемом, ми зробили великі кроки для відбудови нашої великої нації. Але ми ще не в безпеці. Є інші, такі як Едем, які хочуть вести нескінченну війну проти американського народу, і один із найгірших — це той, хто називає себе Секретарем. Це повідомлення ми щойно отримали від цього Секретаря та його людей у Чикаго§! \n \nПісля короткої паузи з динаміків пролунав гучний голос. \n \n§RОттеме, ви та ваші зрадливі послідовники узурпували владу і вбили справжніх американців, щоб захистити ракову пухлину мутантів, що руйнує нашу націю. Для цього злочину немає достатньо суворого покарання. Ви побачите нашу справедливу відплату.§!"
    TAL_nf_events.36.a:0 "Чи зможемо ми справді бути готовими?"
    TAL_nf_events.37.title:0 "Холодний прийом"
    TAL_nf_events.37.desc:0 "Входячи до Рейвен-Рок, капітан згадав, як сильно він мріяв про повернення сюди в перші дні у Форті Беністер. Довгий час він не хотів нічого іншого. Сяючі стіни, чисте повітря і працююче освітлення — всього цього катастрофічно бракувало Беністеру. Однак Рейвен-Рок, який він знав, зник. Стіни були вкриті кров'ю та слідами опіків. Повітря тхнуло пороховим димом та обпаленою сталлю. Навіть світло мерехтіло, поки інженери намагалися полагодити реактор, пошкоджений у боях. У командному центрі капітан зустрівся з чоловіками та жінками, які, ймовірно, були найвищими за рангом офіцерами Анклаву, що залишилися живими. Всього кілька майорів та жменька капітанів — вони дивилися один на одного, не маючи уявлення, що робити далі. Тоді один із молодших офіцерів звернувся до капітана з питанням, яке було у кожного на думці. \n \n§GЩо нам тепер робити, сер?§! \n \nНе замислюючись, капітан випалив відповідь. \n \n§BТе, що ми завжди збиралися робити — відбудовувати Америку.§! \n \nКількох кивків та схвального шепоту виявилося достатньо. Попри те, що дехто в кімнаті мав вищий чин, капітан був тією людиною, яка привела їх сюди, і для всіх інших він мав план. Офіцери погодилися, що саме він має очолити їх, але вже не як капітан."
    TAL_nf_events.37.a:0 "Оце так підвищення, полковнику Гаррісон"
    TAL_nf_events.38.title:0 "Брудна вода"
    TAL_nf_events.38.desc:0 "Науковий жаргон та цифри, якими засипали полковника під час екскурсії по Проєкту 'Чистота', пройшли повз його вуха. За цим жаргоном ховалася проста істина, з якою треба було зіткнутися. Якщо ця вода продовжить текти до мешканців Столичної Пустки, вона перетвориться на цвинтар ще до кінця року. Модифікований ВРЕ вже присутній у воді басейну, і без розробки антигену його неможливо видалити. Щоб розробити цей антиген, кілька груп дослідників мають працювати цілодобово. Полковник сказав лише два слова вченим, які показували йому об'єкт."
    TAL_nf_events.38.a:0 "§BЗробіть це§!"
    TAL_nf_events.39.title:0 "Малювання майбутнього"
    TAL_nf_events.39.desc:0 "Навіть після перенесення зустрічі з їдальні в ангар, приміщення було забите до відмови. Солдати Анклаву, цивільні та найманці Компанії «Кіготь» тіснилися в цьому відсіку для вертібердів, чекаючи почути план на майбутнє. Полковник став на імпровізовану сцену і тремтячим голосом виклав мету. \n§BДобрий вечір усім, це були важкі кілька місяців, поки ми пристосовувалися до великих змін в Анклаві. Я знаю, багато хто з вас хвилюється за майбутнє. Це непевний час, але є одна річ, що веде нас — наша мета. Разом ми відбудуємо Америку. Не Америку Едема, повну смерті та жаху, а Америку, про яку мріяв Оттем. Америку миру, порядку та процвітання. Попереду довгий шлях, але разом ми зможемо досягти цієї мети!§! \n Поки полковник продовжував свою промову, одна думка промайнула в його голові. Попри красиві слова, Оттем був далеко не тим ідеалістичним героєм, яким він його змальовував."
    TAL_nf_events.39.a:0 "Людям потрібен символ, навіть якщо це брехня"
    TAL_nf_events.40.title:0 "Розкол у лавах"
    TAL_nf_events.40.desc:0 "Багато членів Компанії «Кіготь» незадоволені нинішнім напрямком справ. Вони були згодні воювати проти Анклаву, бо це було питанням їхнього виживання, але відбудовувати країну? Це було набагато більше, ніж те, на що вони підписувалися. Майже кожен у Форті Беністер вступив до лав лише заради кришок. Яке їм діло до боротьби за стару націю, що померла за сто років до їхнього народження? Коли їхні контракти закінчаться, їм можна просто дозволити піти. Або ж варто запропонувати щось більше, щоб зберегти живу силу."
    TAL_nf_events.40.a:0 "Вони нам не потрібні"
    TAL_nf_events.40.b:0 "Запропонувати кращу оплату"
    TAL_nf_events.41.title:0 "Погана репутація"
    TAL_nf_events.41.desc.1:0 "Попри допомогу полковника у боротьбі з Едемом, Лукас Сіммс усе ще з острахом ставився до ідеї передати контроль над поселеннями солдату Анклаву та його армії галасливих найманців. Після годин обговорень та обіцянок Сіммс заспокоївся. Проте залишалося побачити, чи стримає полковник свої обіцянки щодо автономії поселень та підтримки місцевого ополчення."
    TAL_nf_events.41.desc.2:0 "Війна з Анклавом та місяці конфліктів, що послідували за нею, пройшли майже непомітно для Алістера Тенпенні. Окрім випадкових неприємностей на нижніх поверхах, його щоденна рутина з пиятиками та розпустою майже не змінилася. Побачивши, як живе цей чоловік, полковник відчув огиду, але ще більше його обурили чутки про причетність Тенпенні до змови з метою підриву Мегатонни. Після зустрічі з Тенпенні його увага переключилася на помічника п'яниці, містера Берка."
    TAL_nf_events.41.desc.3:0 "Після падіння поселень Столиці дядько Ро робив усе можливе, щоб тримати торгові шляхи відкритими, а необхідні припаси — доступними для людей. Для мешканців Пустки він був символом надії, і після падіння Анклаву він був серед перших, з ким полковник хотів зустрітися. Їхня зустріч була зосереджена переважно на економічних питаннях, і дядько Ро підтвердив свою репутацію спритного переговорника. Серед його пропозицій було побажання, щоб нова влада не втручалася в економічні справи."
    TAL_nf_events.41.desc.4:0 "Дейв швидко здався під натиском Анклаву і відступив до свого укріпленого табору. Поки Столична Пустка страждала, він сидів і спостерігав. Щойно Анклав зупинили, він вийшов зі своєї фортеці й одразу почав кампанію, поширюючи брехню про те, що саме він керував опором зі свого кутка Пустки. Полковник та його радники сперечалися, чи варто викривати цього ідіота, чи використання його брехні може бути вигідним."
    TAL_nf_events.41.a:0 "Полковник дотримав своїх обіцянок"
    TAL_nf_events.41.b:0 "Полковник почав відмовлятися від своїх слів... поступово"
    TAL_nf_events.41.c:0 "Берк постане перед правосуддям"
    TAL_nf_events.41.d:0 "Берк виявиться корисним"
    TAL_nf_events.41.e:0 "Торговці будуть надані самі собі"
    TAL_nf_events.41.f:0 "Торговці зіткнуться з регулюванням та податками"
    TAL_nf_events.41.g:0 "Дейв стане символом хоробрості мешканців Пустки!"
    TAL_nf_events.41.h:0 "Дейв буде викритий як клоун"
    TAL_nf_events.42.title:0 "Сховище жахів"
    TAL_nf_events.42.desc:0 "Об'єднані сили Кігтя та Анклаву швидко розправилися з супермутантами, що заполонили Сховище 87. Щойно шлях було розчищено, на об'єкт зайшли наукові групи й нейтралізували ВРЕ Сховища. Нарешті з загрозою супермутантів буде покінчено. Можливо, вони ще десь блукають, але їхня здатність до розмноження була зупинена."
    TAL_nf_events.42.a:0 "Бачите? Ми — хороші хлопці!"
    TAL_nf_events.43.title:0 "Іржавий потенціал"
    TAL_nf_events.43.desc:0 "Навіть у захисному науковому костюмі полковник відчував неспокій, оглядаючи кузні Піттсбурга. Наслідки Трогівської чуми були помітні на обличчях майже всіх робітників. Болючі виразки та хрипкий кашель були лише початком для багатьох хворих. Справжні жахи Трогівської дегенерації ховалися за парканами в руїнах. Божевільні та жахливі монстри блукають серед руїн. Попри ці страхіття, полковник визнав, що цей район має потенціал. Кузні були чи не останніми діючими довоєнними мануфактурами на цій стороні країни."
    TAL_nf_events.43.a:0 "Скласти плани, щоб зробити це місце придатним для життя"
    TAL_nf_events.44.title:0 "Чиста і прозора"
    TAL_nf_events.44.desc:0 "Після місяців роботи над антигеном для модифікованого ВРЕ, який Едем скинув у воду, Проєкт 'Чистота' нарешті безпечний і стабільно постачає чисту воду масам. У нас уже є кілька планів щодо розподілу цієї води в сусідні поселення — як з гуманітарних міркувань, так і для того, щоб вони погодилися на інтеграцію з Америкою. Зараз поблизу кількох поселень будуються центри розподілу води. Ці центри слугуватимуть як вузлами для ефективної роздачі води, так і головними центрами місцевого управління."
    TAL_nf_events.44.a:0 "Але як це працює?"
    TAL_nf_events.44.b:0 "Нехай вода тече"
    TAL_nf_events.45.title:0 "Стіни стискаються"
    TAL_nf_events.45.desc:0 "Форт Беністер добре послужив як військова база. Оновлення останніх років дозволили йому навіть прийняти додаткових мешканців після падіння Анклаву. Однак швидко стало зрозуміло, що форт не зможе вічно бути серцем відродженої Америки. На роль нової бази операцій розглядалися два кандидати. Це був Пентагон, старе серце довоєнної армії та дім для Братства Лайона. Іншою пропозицією була авіабаза Еддамс, більший аеродром і військова база. Також пропонувалося просто розширити Беністер. Зрештою, ресурси були в наявності."
    TAL_nf_events.45.a:0 "Переїхати до Пентагону"
    TAL_nf_events.45.b:0 "Залишитися в Беністері"
    TAL_nf_events.45.c:0 "Переїхати на авіабазу Еддамс"
    TAL_nf_events.46.title:0 "Спадщина Лайона"
    TAL_nf_events.46.desc:0 "Сидячи в колишній залі засідань Братства Лайона, полковник переглядав фінальні плани з відновлення працездатності Пентагону. Справи йшли добре, останні кроки були переважно косметичними. Дивлячись на плани заміни іконографії Братства в Пентагоні, полковник не міг не думати про вплив, який Братство мало на Столичну Пустку. Вони могли бути ворогами Анклаву, але за тією ж логікою ними колись були й полковник та його люди. Майже неможливо заперечити, що, попри свою ізоляціоністську політику, вони зробили дещо добре для Пустки. Якби не хрестовий похід Лайона, проблема супермутантів була б набагато гіршою. Можливо, дещо зі спадщини Братства варто було зберегти."
    TAL_nf_events.46.a:0 "Пам'ятати про їхню відданість технологіям!"
    TAL_nf_events.46.b:0 "Пам'ятати про їхню боротьбу за людей!"
    TAL_nf_events.46.c:0 "Пам'ятати, як ми надали їм прочухана!"
    TAL_nf_events.47.title:0 "Основоположний принцип"
    TAL_nf_events.47.desc:0 "Розширення Форту Беністер йшло за планом. Нові будівлі оточили оригінальні структури, а підземні бункери були нарешті повністю відновлені. На околиці форту була одна ділянка, де заборонили будівництво. Офіційною причиною було збереження зони аварійної висадки, але полковник знав справжню причину. Це було місце останнього спочинку командира Джебско, і виявлення його тіла могло викликати проблеми з солдатами Компанії «Кіготь». Страта Джебско була необхідною. Попри те, що він був боягузливою і жадібною людиною, Джебско виступав проти передачі повного контролю над компанією навіть за купу кришок. Його смерть могла бути неминучою, але якби він не заснував Компанію «Кіготь», хто знає, що сталося б з Едемом? Можливо, варто залишити його ім'я як символ."
    TAL_nf_events.47.a:0 "Пам'ятати ділову хватку Джебско"
    TAL_nf_events.47.b:0 "Пам'ятати організаторські здібності Джебско"
    TAL_nf_events.47.c:0 "Пам'ятати, до чого призвела його гординя"
    TAL_nf_events.48.title:0 "Людина чи міф?"
    TAL_nf_events.48.desc:0 "Полковник дивився на сяючу статую при вході до нещодавно перейменованої авіабази імені Оттема. Він не міг не думати про те, що зробили б мешканці Пустки, якби дізналися правду про полковника Оттема. Якби вони знали, що він був таким само ворогом Пустки, як і будь-який інший член Анклаву, і що якби він вважав план Едема реальним, він, ймовірно, підтримав би його. Полковник думав, чи краще плекати ідею про Оттема, ніж пам'ятати саму людину. Він прочитав напис на відполірованій табличці під статуєю \n \n§B В пам'ять про полковника Августа Оттема, який віддав життя, щоб врятувати душу Америки."
    TAL_nf_events.48.a:0 "Пам'ятати людину"
    TAL_nf_events.48.b:0 "Пам'ятати міф"
    TAL_nf_events.49.title:0 "Загроза"
    TAL_nf_events.49.desc:0 "Справи в Кампанії «Кіготь» йшли добре. У Столичній Пустці рекрутинг зростав, заворушення вщухали, а люди поверталися до нормального життя, як до Проєкту 'Чистота'. Здавалося, нарешті Пустка пристосувалася до влади Анклава. Позитивна атмосфера в штабі лише зробила новину, яку отримав полковник, більш тривожною. Передача прийшла прямо з аванпосту Анклаву в Чикаго. Мало хто за межами найближчого оточення Оттема знав щось про Чикаго, крім факту їхнього існування, а майже всі записи про їхню силу чи плани були втрачені в боях з Едемом. Вислухавши повідомлення, полковник скликав екстрену нараду своїх радників і, важко зітхнувши, відтворив запис для них. \n \n§RКапітане Гаррісоне, ви та ваші зрадливі послідовники узурпували владу і вбили справжніх американців, щоб захистити ракову пухлину мутантів, що руйнує нашу націю. Для цього злочину немає достатньо суворого покарання. Ваше хлипке збіговисько зрадників та огидних мутантів не встоїть перед міццю повної сили армії Сполучених Штатів. Ви побачите нашу справедливу відплату.§!"
    TAL_nf_events.49.a:0 "Війна близько"
    TAL_nf_events.50.title:0 "Кращий бізнес-план"
    TAL_nf_events.50.desc:0 "Стало зрозуміло, що майже ніхто не може протистояти Компанії «Кіготь». Тепер, коли Анклав та Братство Лайона усунені, Компанія «Кіготь» посідає вершину харчового ланцюга Пустки, і цілком справедливо, що вони мають збільшити свою частку багатства, що тече через ці землі. Простих контрактів найманців більше недостатньо, не для такого великого гравця як «Кіготь». Ні, вони мають зробити дещо більше. Компанія «Кіготь» стала такою силою, що інші мають платити вже за саме право проходити через їхню територію. Як мито, данина чи щось подібне."
    TAL_nf_events.50.a:0 "Звучить як податок"
    TAL_nf_events.51.title:0 "Поставки рабів перервано!"
    TAL_nf_events.51.desc:0 "Поставки рабів зі Столичної Пустки були припинені за наказом командира найманців Джебско. Наші люди кажуть, що звичайні каравани, які привозили свіже 'м'ясо' для фабрик, раптово зупинилися, а після того, як вони вирушили до Парадайз-Фоллз, щоб дізнатися причину затримки, їх захопила Компанія «Кіготь» і побила. Не знаю, яка муха вкусила Джебско, але для нас це не віщує нічого доброго."
    TAL_nf_events.51.a:0 "У нас ще є інші джерела"
    TAL_nf_events.52.title:0 "Пропозиція Джебско"
    TAL_nf_events.52.desc:0 "Сьогодні надійшла пропозиція про роботу від Компанії «Кіготь». Багато людей рвуться в бій, щоб попрацювати на хлопців, які здолали Братство, але є одна умова. Ми всі працюватимемо на них, дотримуватимемося їхніх правил і, по суті, надамо їм повну свободу на нашій землі. Звичайно, від такої пропозиції ми не можемо просто відмовитися. Ясно, що якщо ми відхилимо їхню пропозицію, вони повернуться вже з великою силою."
    TAL_nf_events.52.a:0 "Підписати контракт"
    TAL_nf_events.52.b:0 "Відхилити пропозицію"
    TAL_nf_events.53.title:0 "Новий бос, та сама робота"
    TAL_nf_events.53.desc.1:0 "Під керівництвом Ашура Пітт працював як добре змащений механізм. Кузні випускали зброю та боєприпаси в безпрецЕдемтних для Пустки масштабах. Якщо робітник хворів, його замінювали так само легко, як зламану деталь. Війна Компанії «Кіготь» з Піттом спричинила збій у виробництві, але вцілілі члени кліки Ашура прагнуть служити новому лідеру, поки той платить так само. За їхніми оцінками, справи можна швидко повернути до норми, якщо ми забезпечимо імпорт рабів. Звісно, ми також могли б трохи прискорити темпи, щоб отримати кращі вигоди."
    TAL_nf_events.53.desc.2:0 "За Вернера справи в Пітту йшли не так, як за Ашура. Робітники, можливо, були трохи щасливішими, але їхня продуктивність помітно впала. Про хворих робітників піклувалися, що відволікало ще двох здорових людей, хоча їх можна було б просто замінити. Можливо повернутися до старих методів Пітта, але це потребуватиме багато зусиль. Зрештою, ці люди скинули одного Ашура — хто гарантує, що вони не спробують скинути іншого?"
    TAL_nf_events.53.a:0 "Підтримувати виробництво"
    TAL_nf_events.53.b:0 "Прискорити виробництво"
    TAL_nf_events.53.c:0 "Дотримуватися шляху Вернера"
    TAL_nf_events.53.d:0 "Повернутися до шляху Ашура"
    TAL_nf_events.54.title:0 "Думай швидко!"
    TAL_nf_events.54.desc:0 "Наш хакер нарешті зламав архіви Цитаделі Братства, коли помітив серйозну проблему. Щось під час входу активувало вірус, який почав стрімко видаляти весь архів. Часу вистачить лише на те, щоб безпечно завантажити частину даних. Що обрати?"
    TAL_nf_events.54.a:0 "Завантажити креслення силової броні!"
    TAL_nf_events.54.b:0 "Завантажити плани передової зброї!"
    TAL_nf_events.54.c:0 "Завантажити все про Проєкт 'Metal Gear'!"
    TAL_nf_events.54.d:0 "Завантажити всього потроху!"
    TAL_nf_events.55.title:0 "Експедиція до Данвіча"
    TAL_nf_events.55.desc:0 "Керівництво Ендейла найняло загін найманців Компанії «Кіготь», щоб ті супроводили їх до тієї дивної старої будівлі поблизу Тенпенні-Тауер. З того часу їх ніхто не бачив. Можливо, з ними все гаразд?"
    TAL_nf_events.55.a:0 "§0НЕПРАВИЛЬНО§"
    TAL_nf_events.56.title:0 "Великий план"
    TAL_nf_events.56.desc:0 "З вершини Тенпенні-Тауер усе, що бачить око, і навіть більше, належить командиру Джебско та його Компанії «Кіготь». Незліченні мешканці Пустки платять данину своїм господарям, а натомість «Кіготь» гарантує, що їх ніхто не чіпатиме. З кожним завоюванням багатство Компанії зростало, і це лише початок. Джебско мріє поширити збір данини на всю Пустку. Скоро кожен у колишніх Сполучених Штатах платитиме кришки Компанії «Кіготь» за захист. План геніальний. Чому ніхто не придумав цього раніше?"
    TAL_nf_events.56.a:0 "Ніхто не додумався до цього раніше?"
    TAL_nf_events.57.title:0 "Став своїм?"
    TAL_nf_events.57.desc:0 "Головнокомандувача Оттема було нелегко вразити, але навіть він був здивований прийомом у Форті Беністер. Замість неохайної купи сміття з Пустки, про яку він читав у початкових звітах капітана Гаррісона, його зустріли дисципліновані солдати в належному строю та чистій броні. Капітан зустрів його з явною гордістю на обличчі. Він провів для Оттема та його потягу офіцерів екскурсію базою, пояснюючи, як він перетворив Форт Беністер із напівзруйнованих руїн на навчальний та оперативний центр. Після екскурсії Оттем зустрівся з Гаррісоном наодинці в кабінеті капітана. Там вони обговорили успіх програми, зміни в Анклаві та майбутнє Гаррісона. Капітана мали підвищити до майора та повернути до Рейвен-Рок. Але Оттем не був готовий до відповіді майора. \n \n§2Сер, якщо ваша ласка, я б волів залишитися тут.§! \n \nОттем майже не повірив своїм вухам, а коли перший шок минув, зажадав пояснень. Майор пояснив, що він звик до цього призначення і відчуває покликання продовжувати вести цих солдатів. Він хотів і далі перетворювати їх на важливий актив для Анклаву. Перш ніж Оттем встиг відповісти, майор витягнув товсту папку документів і почав довге пояснення своїх планів на майбутнє Компанії «Кіготь». План був надзвичайно детальним, включаючи все: від прогнозів витрат і вигод до очікуваних показників бойової ефективності. Головнокомандувач Оттем був не з тих, кого легко переконати, але чим більше він слухав план майора, тим логічнішим той здавався. Очевидно, що людина, здатна перетворити той натовп на те, що Оттем побачив сьогодні, була б змарнована на чолі звичайного батальйону."
    TAL_nf_events.57.a:0 "Запит схвалено, майоре"
    TAL_nf_events.58.title:0 "Бойовий клич свободи"
    TAL_nf_events.58.desc:0 "З кожним днем ставало все зрозуміліше, якою Едем бачив Америку. Ніхто у Форті Беністер не ремствував, коли він стратив уцілілих з Братства, але бачити жахи, які приніс Проєкт 'Чистота', було вже занадто. Час, коли його погляд звернеться на Компанію «Кіготь», невблаганно наближався, і сили у Форті Беністер були готові протистояти цій геноцидній машині як ніколи. З серцем, повним страху та рішучості, капітан Гаррісон увімкнув командну радіостанцію і виголосив промову, яку репетирував незліченну кількість разів. \n§2Люди Столичної Пустки, говорить капітан Гаррісон із Компанії «Кіготь», колишній офіцер Анклаву. Не вірте брехні президента Едема чи тих, хто йде за ним. Він тут не для того, щоб допомагати, він і його поплічники не хочуть нічого, крім вашої смерті! Я закликаю вас не пити воду, якою він вас отруює, і взятися за зброю! Тільки разом ми зможемо зупинити цього виродка і справді відбудувати Пустку!§! \n У бункері на мить запанувала тиша, коли всі усвідомили реальність ситуації. Вони щойно оголосили війну Анклаву в ефірі, на всю Столичну Пустку. Цей заклик стане або початком повстання, що врятує Пустку, або останнім відчайдушним криком приреченого народу."
    TAL_nf_events.58.a:0 "Сподіватимемося, що мешканці Пустки почули"
    TAL_nf_events.59.title:0 "Погляд за межі"
    TAL_nf_events.59.desc:0 "Столична Пустка — непоганий початок, але навколо є ще стільки всього, що ми можемо прибрати до рук. Не те щоб ми не пробували раніше, але всюди — на півночі, півдні та заході — були свої проблеми. На півночі холодно як у пеклі й мало поселень, тому ми вирішили, що клопоту буде більше, ніж вигоди. Південь — це спекотне й гидке болото з комарами, більшими за радскорпіонів. Захід — нескінченні пагорби, повні печер та культів. Ці регіони могли бути занадто складними для старої Компанії «Кіготь», але ми змінилися. Ми змусимо їх платити нам заслужену данину."
    TAL_nf_events.59.a:0 "Ми будемо розширюватися!"
    TAL_nf_events.60.title:0 "Відмова Гаррісберга"
    TAL_nf_events.60.desc:0 "Гаррісберг відмовився приєднуватися до Компанії «Кіготь». Настав час показати їм, що буває з тими, хто не хоче грати за правилами."
    TAL_nf_events.60.a:0 "Вперед, хлопці, покажіть їм!"
    TAL_nf_events.61.title:0 "Похмура зустріч"
    TAL_nf_events.61.desc:0 "Джебско мав таємну зустріч із керівництвом Ендейла, взявши з собою лише кількох довірених людей. Всі вони тримають язика за зубами щодо зустрічі, лише кажуть, що попереду великі справи. З іншого боку, деякі люди у Форті Джебско кажуть, що чують його крики посеред ночі. Мабуть, це нічого не означає, так?"
    TAL_nf_events.61.a:0 "Ймовірно, нічого особливого"
    TAL_nf_events.62.title:0 "Здирництво Компанії «Кіготь»"
    TAL_nf_events.62.desc:0 "Найманці Компанії «Кіготь» нещодавно прибули до Тенпенні-Тауер, пропонуючи свої послуги з охорони. Вони згадали, що вежа розташована близько до території рейдерів, і прямо натякнули: якщо ми не заплатимо, на нас нападуть. Найманці отаборилися неподалік і чекають на відповідь. Слід зазначити, що після розгрому Анклаву Компанія «Кіготь» отримала чимало передового спорядження."
    TAL_nf_events.62.a:0 "Ми не будемо платити"
    TAL_nf_events.62.b:0 "Ми заплатимо"
    TAL_nf_events.63.title:0 "Поселення відмовляються від захисту"
    TAL_nf_events.63.desc:0 "Люди в Тенпенні-Тауер навідріз відмовилися платити хоча б одну кришку за наш захист. Хлопці вже спорядилися і готові піти й показати їм, чому варто було платити."
    TAL_nf_events.63.a:0 "Провчіть їх!"
    TAL_nf_events.64.title:0 "Відмова Ашура"
    TAL_nf_events.64.desc:0 "Наших людей, відправлених у Пітт для укладення угоди, Ашур висміяв і ледь не згодував трогам. Ми ж не можемо дозволити їм так нас принижувати, чи не так?"
    TAL_nf_events.64.a:0 "Вони заплатять, свого часу"
    TAL_nf_events.65.title:0 "Згода Ашура"
    TAL_nf_events.65.desc:0 "Наші хлопці повернулися з Пітта з гарними новинами та цілою купою кришок. Схоже, ми тепер у справі з Ашуром."
    TAL_nf_events.65.a:0 "Ми вийшли на велику гру, хлопці"
    TAL_nf_events.66.title:0 "Відмова Вернера"
    TAL_nf_events.66.desc:0 "Наші люди були відправлені в Пітт домовитися з Ашуром. Виявилося, що там нещодавно відбулося повстання рабів, і владу захопив колишній заступник Ашура — Вернер. Наших хлопців висміяли й ледь не кинули трогам. Ми ж не дозволимо їм так поводитися з нами?"
    TAL_nf_events.66.a:0 "Вони заплатять, свого часу"
    TAL_nf_events.67.title:0 "Тенпенні-Тауер платить"
    TAL_nf_events.67.desc:0 "Люди в Тенпенні-Тауер зрозуміли наш натяк і погодилися найняти нас для 'захисту' від рейдерів. Хоча наші хлопці й рвалися в бій, вони не менш раді збирати безкоштовні кришки."
    TAL_nf_events.67.a:0 "У них не було вибору, через певні... обставини"
    TAL_nf_events.68.title:0 "Вежа трофеїв"
    TAL_nf_events.68.desc:0 "Тенпенні-Тауер була легкою здобиччю. Наші хлопці вмить прорвали їхню жалюгідну оборону і почали вигрібати все, що не було прибите до підлоги. Награбоване рахували кілька днів, але це безумовно була перемога. Поселення Столиці тепер мають знати, що з нами краще не жартувати."
    TAL_nf_events.68.a:0 "О так"
    TAL_nf_events.69.title:0 "Ми облажалися"
    TAL_nf_events.69.desc:0 "Схоже, ми недооцінили захист Тенпенні-Тауер. Нашим хлопцям наваляли, і їм довелося тікати додому, поки їх не перебили. Мабуть, краще не зачіпати поселення Столиці, поки ми не знайдемо сильніших союзників."
    TAL_nf_events.69.a:0 "Дідько..."
    TAL_nf_events.70.title:0 "Компанію «Кіготь» виставили за двері"
    TAL_nf_events.70.desc:0 "Як ми й очікували, пропозиція захисту від Компанії «Кіготь» була звичайним вимаганням. Коли ми відмовилися, вони прислали банду громил до вежі, але ми були готові. Хоча в бою загинуло кілька хоробрих охоронців, найманці не змогли прорвати оборону і швидко втекли назад до Форту Беністер."
    TAL_nf_events.70.a:0 "Це навчить їх не зачіпати нас!"
    TAL_nf_events.71.title:0 "Тенпенні-Тауер розграбовано!"
    TAL_nf_events.71.desc:0 "Як ми й очікували, пропозиція захисту від Компанії «Кіготь» виявилася здирництвом. Коли ми відмовилися, вони прислали загін головорізів, які швидко прорвали систему безпеки. Мешканців пограбували під прицілом зброї, а найманці винесли все цінне ще до прибуття підкріплення."
    TAL_nf_events.71.a:0 "Прокляття"
    TAL_nf_events.72.title:0 "Ділова зустріч"
    TAL_nf_events.72.desc:0 "Протягом останніх десятиліть Пітт зажив слави грізного місця. Гігантські труби, палаючі печі та армія рейдерів. Усі легенди про Пітт виявилися правдою. Після короткого огляду виробництва Ашура, Джебско провели до Гейвена — високої вежі, звідки Ашур оглядає своє королівство. Там вони обговорили плани Ашура на майбутнє, те, як «Кіготь» може допомогти, і, що найважливіше, розмір комісійних, які бере Компанія."
    TAL_nf_events.72.a:0 "За майбутнє"
    TAL_nf_events.73.title:0 "Нескінченні проблеми"
    TAL_nf_events.73.desc:0 "З Пітта надійшов виклик щодо завдань, які Ашур доручає Компанії «Кіготь». Раби витрачають металобрухт швидше, ніж його встигають збирати, аболіціоністи постійно нападають на каравани рабів, а в одного з постачальників Ашура проблеми з вантажами. В Ашура вистачає клопоту з утриманням рабів у покорі, тому він каже нам розібратися з цим."
    TAL_nf_events.73.a:0 "Нам знадобиться 25% передоплати"
    TAL_nf_events.74.title:0 "За майбутнє"
    TAL_nf_events.74.desc:0 "Сьогоднішній Пітт дуже відрізняється від того, що був кілька років тому. Від Трогівської хвороби знайшли ліки, побоїв стало менше, а робітники більше не їдять лише юшку з трогів. Декого все ще треба 'переконувати' йти працювати в Пітт, і саме в цьому допомагає «Кіготь», але загалом життя стало менш суворим. Джебско, як і будь-хто інший поруч з Ашуром, знає: краще не питати, чи не став той занадто м'яким. Ті, хто був не згоден зі змінами, досі висять на мосту, і кого хвилює, як називають рабів, якщо Ашур за них платить? Майбутнє Пітта виглядає блискучим, і принаймні зараз Компанія «Кіготь» буде частиною цього шляху."
    TAL_nf_events.74.a:0 "Поки платять — ми в справі"
    TAL_nf_events.75.title:0 "Щури в кутку"
    TAL_nf_events.75.desc:0 "Багато аболіціоністів загинуло під час нашої сутички з поселеннями Столиці. Небагато вцілілих відступили до свого сховку в Меморіалі Лінкольна. Ми оточили їх, нас більше, але очевидно, що вони не здадуться без бою. Як нам діяти?"
    TAL_nf_events.75.a:0 "Фронтальна атака спрацює"
    TAL_nf_events.75.b:0 "Скласти грамотний план бою"
    TAL_nf_events.75.c:0 "Мінігани роблять бррррр"
    TAL_nf_events.75.d:0 "Відправити силову броню"
    TAL_nf_events.76.title:0 "Кривавий капелюх"
    TAL_nf_events.76.desc:0 "Храм Єднання, що заважав торгівлі рабами в Столичній Пустці, роками був проблемою для Ашура. Джебско вирішив особисто доставити Ашуру символ їхнього краху. Капелюх Гемліна, що нібито належав давно померлому президенту, якому вони поклонялися, був прийнятий Ашуром із вдячністю. Він запропонував Джебско винагороду на вибір за цей трофей."
    TAL_nf_events.76.a:0 "Більше зброї — це добре"
    TAL_nf_events.76.b:0 "Кришки — це головне"
    TAL_nf_events.76.c:0 "Вважай це послугою"
    TAL_nf_events.77.title:0 "Ситуація в Гаррісберзі"
    TAL_nf_events.77.desc:0 "Останні 20 років Гаррісберг тримав Джонстаун та околиці під своїм гнітом. В обмін на врожай, кришки та прохід для своїх караванів рабовласників, бандити Гаррісберга 'захищали' Джонстаун. Від чого саме? Переважно від самих бандитів Гаррісберга. Більшість фермерів Джонстауна мирилися з цим, окрім Дорожніх наглядачів. Ці люди виступають проти рабства і влаштовують засідки на каравани. На кожного вбитого наглядача, здається, з'являється двоє нових. Ось чому бандитам потрібна наша допомога, щоб розібратися з цим хаосом."
    TAL_nf_events.77.a:0 "Наша допомога буде недешевою"
    TAL_nf_events.78.title:0 "Потрібна допомога"
    TAL_nf_events.78.desc:0 "Оскільки промислова потужність Пітта зростає в геометричній прогресії, зростають і його потреби. Ашур планує розширити виробництво, але їм потрібне певне довоєнне обладнання, яке не знайдеш абиде. Наші команди шукають у Столичній Пустці, але навряд чи ми знайдемо все у Вашингтоні. Інші міста, як-от Нью-Йорк, Філадельфія або навіть деякі місця на півдні, ймовірно, мають те, що нам треба. У більшості цих місць є свої боси, з якими можна поговорити."
    TAL_nf_events.78.a:0 "Давайте домовимося"
    TAL_nf_events.79.title:0 "Маленькі війни в Маленькій Італії"
    TAL_nf_events.79.desc:0 "Банди Нью-Йорка можуть об'єднуватися проти будь-кого, хто зазіхає на їхні справи, але назвати їх згуртованою групою було б смішно. Ця мішанина банд постійно гризеться за територію, ринки та місце на чолі своєї комісії. Бачачи це, Джебско має ідею. Якщо Компанія «Кіготь» підтримає одну з них, щоб та взяла гору, ми отримаємо могутнього друга, який буде нам винен."
    TAL_nf_events.79.a:0 "Підтримати мутантську мафію"
    TAL_nf_events.79.b:0 "Герцог Нью-Йорка панує!"
    TAL_nf_evnets.79.c:0 "Допомогти Силам правопорядку"
    TAL_nf_events.80.title:0 "Голова в хмарах"
    TAL_nf_events.80.desc:0 "З вершин веж Пітта місто здається не таким уже й поганим. Звісно, воно трохи іржаве, але коли не бачиш і не відчуваєш запаху лайна на вулицях, майже забуваєш про його існування. Не дивно, що Ашур проводить час тут, мріючи про перетворення цього звалища на якусь утопію. Хоча Джебско скептично ставиться до грандіозних планів Ашура, він непогано заробив на цьому контракті. Якщо все, що йому потрібно робити — це зрідка літати на вертіберді, слухати роздуми про промисловість і суспільство заслуг, а потім говорити хлопцям продовжувати роботу, то це непогана служба. \n\n Чорт, якщо Ашур якось зробить це місце хоч трохи чистішим, воно може стати непоганим місцем для виходу на пенсію."
    TAL_nf_events.80.a:0 "Йому знадобиться до біса велика швабра"
    TAL_nf_events.81.title:0 "Що тепер?"
    TAL_nf_events.81.desc:0 "Тепер, коли Пітт під повним контролем Компанії «Кіготь», Джебско не може позбутися питання: навіщо ми взагалі це зробили? «Кіготь» ніколи не прагнув керувати заводами чи містом, ми отримуємо гроші за те, що стріляємо в людей. Деякі з рабовласників швидко склали зброю і найнялися підтримувати роботу Пітта, але цього замало для безперебійної роботи. Не кажучи вже про те, що багато рабів розбіглися під час боїв. Нам знадобляться роки, щоб відтворити те, що було в Ашура з його налагодженим промисловим механізмом, якщо ми взагалі захочемо цим займатися."
    TAL_nf_events.81.a:0 "Принаймні краєвид із Гейвена гарний"
    TAL_nf_events.82.title:0 "Новини з Парадайз"
    TAL_nf_events.82.desc:0 "Зі знищенням банд рейдерів у Столичній Пустці потік рабів із Парадайз-Фоллз перетворився на тонкий струмок. Ми отримали новини, що найманці Компанії «Кіготь», які розгромили ці банди, дозволяють їм повернутися до постачання рабів. Умова в тому, що тепер вони отримують частку від здобичі рейдерів."
    TAL_nf_events.82.a:0 "Кого хвилює, звідки вони беруться?"

