l_russian:

  ###Characters###
  FPR_trash_man_name:0 "Мусорщик"
  FPR_the_trashman_desc:0 "§9 «Ну, не знаю, сколько лет мне осталось на этой пустоши. Сейчас я буду очень чудаковатым».§!\n\nМусорщик, которого часто называют зверем или пережитком ушедшей эпохи, - один из самых грозных главарей рейдеров на восточном побережье. Всего за несколько десятилетий он превратил небольшую банду своей юности в империю. Даже могущественные гангстеры Нью-Джерси знают, что лучше не заходить на его территорию без должной дани. Однако разрушительное время не щадит господина, и по мере того, как он приходит в упадок, его безумные близнецы начинают бороться за трон."
  FPR_aluminum_monster_name:0 "Алюминиевый монстр"
  FPR_aluminum_monster_desc:0 "§R'Я съем твоих детей, сука!'§! \n\n Единственная дочь Мусорщика, Диандра, следует семейной традиции, используя заслуженное прозвище. Её силуэт в силовой броне наводит страх на торговцев по всей Пенсильвании. Взирая на Трон Мусорщика, она обещает своим сторонникам будущее, полное грабежей и славы."
  FPR_golden_god_name:0 "Золотой Бог"
  FPR_golden_god_desc:0 "§Ты достиг пика? До пика, Ди, позволь мне кое-что сказать: я даже не начал достигать пика, и когда я достигну пика, ты поймёшь, потому что я достигну пика так сильно, что это почувствует вся Филадельфия.§! \n\nЕдинственный законный сын Мусорщика, Деннис, предпочитает носить имя Золотой Бог. Этот бабник-рейдер предпочитает манипулировать другими, чтобы получить желаемое, сталкивая своих противников друг с другом. Тем не менее, когда дело доходит до драки и он теряет контроль, его ярость не знает границ."
  FPR_trundle_the_great_name:0 "Трандл Великий"
  FPR_trundle_the_great_desc:0 "§C'Как будто целые поколения этих тварей погибли от моих рук, и матери, отцы, деды, и маленькие крысята. Да, иногда я задумываюсь, действительно ли наши жизни ценнее их. Понимаете, о чём я?'§! \n\nТрандл быстро поднялся в банде Мусорщика, истребив тысячи мутировавших крыс, которые чуть не заполонили южную Филадельфию. С тех пор он подружился со стареющим главарём рейдеров, и некоторые задаются вопросом, не станет ли он следующим главарём банды. Этого никто из детей Мусорщика не потерпит."
  FPR_ol_toothless_name:0 "Старый беззубый официант"

  ###Ideas###
  FPR_constant_bickering_idea:0 "Внутренние распри"
  FPR_constant_bickering_idea_desc:0 "Хотя слово Мусорщика - закон, его подчиненные постоянно ссорятся и дерутся между собой."
  FPR_no_hesitation_no_surrender_idea:0 "Без колебаний, без поражений"
  FPR_no_hesitation_no_surrender_idea_desc:0 "Рейдеры Филадельфии скорее умрут, чем столкнутся с гневом своего лидера в случае провалов. Никаких колебаний, никаких поражений, ни одного оставленного человека... ну ладно, несколько человек остались."
  FPR_fight_milk_idea:0 "Боевое молоко"
  FPR_fight_milk_idea_desc:0 "Первый алкогольный напиток на основе молочных продуктов от рейдеров для рейдеров. Благодаря обильным запасам «Боевого молока» рейдеры Филадельфии могут драться как вороны."
  FPR_wolf_cola_idea:0 "Волчья Кола"
  FPR_wolf_cola_idea_desc:0 "Пусть это и не брендовая Ядер-кола, но это единственная кола, которую до сих пор активно производят. Если только где-то в пустошах не скрывается какая-нибудь Гигафабрика Ядер-колы, о которой мы не знаем."
  FPR_riot_punch_idea:0 "Полицейский удар"
  FPR_riot_punch_idea_desc:0 "Основная причина, по которой банды рейдеров, как правило, недолговечны, помимо внутренних распрей, заключается в том, что со временем некоторые рейдеры начинают жалеть тех, кого они грабят. Вот тут-то и пригодится полицейский удар. Нельзя чувствовать себя виноватым, ограбив семью за три крышки, если ты вырубился и не можешь вспомнить, как всё было."
  FPR_ass_kicker_newsletter_idea:0 "Информационный бюллетень «Ass Kickers United»"
  FPR_ass_kicker_newsletter_idea_desc:0 "Краткое руководство по образу жизни хулигана, дополненное иллюстрациями для тех, кто не умеет читать, обучает наших рейдеров путям Мастера. Нет, не того Мастера. Этот мастер достиг просветления, пройдя путь воина. Самое главное - избегать снэков."
  FPR_neglectful_rule_idea:0 "Пренебрежительное правило"
  FPR_neglectful_rule_idea_desc:0 "Жители Филадельфии усвоили, что любовь их правителя переменчива. Если они хотят хорошей жизни, им придётся строить её самим, а не беспокоить Бога своими проблемами."
  FPR_untethered_rage_idea:0 "Необузданная ярость"
  FPR_untethered_rage_idea_desc:0 "Нас больше не сдерживают такие вещи, как расстояние или гравитация. Мы свободны от пут, и наша ярость не знает границ."
  FPR_fly_through_night_idea:0 "Лети сквозь ночь"
  FPR_fly_through_night_idea_desc:0 "При использовании правильных стимуляторов наши пилоты могут летать, летать и летать."
  FPR_trundle_work_idea:0 "Развилка Трандла"
  FPR_trundle_work_idea_desc:0 "Те, кто выступал против Трандла в борьбе за лидерство, теперь вынуждены выполнять всю работу Трандла в банде. Чистка канализации от крыс, уборка санитарных условий и множество других неприятных дел теперь находятся под надзором Золотого Бога и Алюминиевого Монстра."
  FPR_bird_laws_idea:0 "Птичьи права"
  FPR_bird_laws_idea_desc:0 "Благодаря усердной работе лучшего юриста по защите птиц в Филадельфии наши законы о птицах наконец-то обрели смысл."
  FPR_bash_nerds_idea:0 "Мозголомы"
  FPR_bash_nerds_idea_desc:0 "К ботаникам, умникам и прочим тупым учёным в Филадельфии относятся, в лучшем случае, терпимо. Впрочем, они знают, что это тонкий лёд, и не пытаются сделать Трандла умнее."
  FPR_rock_flag_eagle_1_idea:0 "Камень, флаг и орел"
  FPR_rock_flag_eagle_1_idea_desc:0 "Кто-нибудь хочет с нами подраться? Мы им всем надерём Американскую задницу!"
  FPR_rock_flag_eagle_2_idea:0 "Камень, флаг и орел"
  FPR_rock_flag_eagle_2_idea_desc:0 "Кто-нибудь хочет с нами подраться? Мы им всем надерём Американскую задницу!"
  FPR_rock_flag_eagle_3_idea:0 "Камень, флаг и орел"
  FPR_rock_flag_eagle_3_idea_desc:0 "Кто-нибудь хочет с нами подраться? Мы им всем надерём Американскую задницу!"
  FPR_nightman_idea:0 "The Nightmen"
  FPR_nightman_idea_desc:0 "Nightmen are elite raiders trained in fighting at night. They live in a world of darkness, no longer allowed to see the light of day. When the sun falls, and our raiding parties pull back, the terror our enemies face is only beginning."
  FPR_nightcrawlers_idea:0 "Nightcrawlers"
  FPR_nightcrawlers_idea_desc:0 "Nightmen have begun digging tunnels during the day to surprise their enemies at night."
  FPR_more_jet_idea:0 "More Jet"
  FPR_more_jet_idea_desc:0 "So our raiders don't go mad from withdrawals, we will take special precautions to make sure the jet continues to flow."
  FPR_reverse_funnel_idea:0 "Reverse Funnel System"
  FPR_reverse_funnel_idea_desc:0 "You don't need to understand how our raid loot distribution system works, because someone above you does. So ask less questions, and make more caps."
  FPR_delayed_retirement_idea:0 "Delayed Retirement"
  FPR_delayed_retirement_idea_desc:0 "All his heirs are disappointments unworthy of ruling his empire. So, The Trash Man has to delay his retirement. Unfortunately, the years still continue to take their toll."
  FPR_rum_ham_idea:0 "Rum Ham Rations"
  FPR_rum_ham_idea_desc:0 "Combining the liquor and food rations of our long-range raiding parties lightens the load on our supply lines."
  FPR_broken_workers_idea:0 "Broken Workers"
  FPR_broken_workers_idea_desc:0 "The workers in Philly, both enslaved and not, know better than to talk back. They follow the orders of their overlords without question and make it work."
  FPR_raider_freedom_idea:0 "Raider Freedom"
  FPR_raider_freedom_idea_desc:0 "Being a raider is about a life of no rules where anything goes. We should not forget that."
  FPR_raider_oppression_idea:0 "Raider Oppression"
  FPR_raider_oppression_idea_desc:0 "Raiders will have more freedom than others in our domain, but that still has its limits."

  ###National Focus###
  FPR_nf_a001:0 "Yellow Jacket Boys"
  FPR_nf_a001_desc:0 "Before he ruled all of Philly, The Trashman was just another member of a smalltime gang."
  FPR_nf_a002:0 "Building An Empire"
  FPR_nf_a002_desc:0 "With his own two hands, and a lot of slave labor, The Trashman turned a small local gang into a raider empire stretching beyond Philly."
  FPR_nf_a003:0 "Retirement?"
  FPR_nf_a003_desc:0 "The Trashman hasn't been feeling quite himself lately. It might be time to make a change"
  FPR_nf_a004:0 "The Game of Games"
  FPR_nf_a004_desc:0 "The Trashman isn't going to let his empire go to someone who can't handle it, and he sure as hell isn't going to let it disolve into a civil war either. There will be a contest; and the winner will get the throne."
  FPR_nf_a005:0 "Frank's Fluids"
  FPR_nf_a005_desc:0 "An old bottling plant was found in the ruins that could easily be made to work again. The various leaders in the gang all have their own ideas of how to use it."
  FPR_nf_a006:0 "Fight Milk"
  FPR_nf_a006_desc:0 "Trundle is suggesting an alcoholic milk-based protein drink made using crows eggs BY RAIDERS FOR RAIDERS. He says it'll give the gang the power to fight like a crow."
  FPR_nf_a007:0 "Wolf Cola"
  FPR_nf_a007_desc:0 "The Golden God has found a recipe for some type of off-brand Nuka Cola. If we start producing it we could be the only people around with a soda that isn't 200 years old. That'd really give the illusion of power."
  FPR_nf_a008:0 "Riot Punch"
  FPR_nf_a008_desc:0 "Grain alcohol, crushed buffout, and a little psycho for good measure; that is Riot Punch. This drink will turn even the wimpiest waster into a bloodthirsty killing machine."
  FPR_nf_a009:0 "The Waitress"
  FPR_nf_a009_desc:0 "Trundle has been spending a lot of time hanging around a local resturant. Given how he almost exclusively eats 200 year old cat food, what could possibly draw him there?"
  FPR_nf_a010:0 "Gun Fever"
  FPR_nf_a010_desc:0 "The Trashman has a friend in Jersey who runs weapons. His regular shipment is coming in soon, but there might be a little bit of caps leftover for something extra."
  FPR_nf_a011:0 "Rat Blasters"
  FPR_nf_a011_desc:0 "When facing down a horde of rats do you want a gun that shoots one bullet, or an uzi that shoots 1,000?"
  FPR_nf_a012:0 "Rocket Launchers!"
  FPR_nf_a012_desc:0 "The Golden God talks about rocket launchers like a weird amount. It should come as no surprise what he wants to buy."
  FPR_nf_a013:0 "Burn Sons-A-Bitches"
  FPR_nf_a013_desc:0 "The Aluminum Monster has been known to burn a bitch or two, so of course she wants a flamethrower."
  FPR_nf_a014:0 "Always Coming Out on Top"
  FPR_nf_a014_desc:0 "One of The Trashman's generals has been cozying up to not just one member of the leadership conflict, but every member. He's playing all the sides so he always comes out on top."
  FPR_nf_a015:0 "The McPoyles"
  FPR_nf_a015_desc:0 "A strange clan of wastelanders out in All-In town, they've maintained good relations with the family for a while. However, the latest collection run is a little light."
  FPR_nf_a016:0 "A Delicate Truce"
  FPR_nf_a016_desc:0 "Trundle has plans to work out a kick ass truce with the McPoyle family. Nobody even needs to get stabbed for this to work."
  FPR_nf_a017:0 "Work The Pecs"
  FPR_nf_a017_desc:0 "Margret McPoyle, the only daughter of Pappy McPoyle, has become a target for The Golden God. He plans to add her to his cult and in doing so secure the family's loyalty for years to come."
  FPR_nf_a018:0 "Bird Vs Bird"
  FPR_nf_a018_desc:0 "Royal McPoyle is a giant mutant bird the McPoyle family has keep as a pet for years. The Aluminum Monster plans to defeat it in single combat to bring the family to heel."
  FPR_nf_a019:0 "A Cricket's Tale"
  FPR_nf_a019_desc:0 "A wandering preacher from The Children of Atom has come to Philly. He seems to have an interest in The Aluminum Monster."
  FPR_nf_a020:0 "Bums, Making A Mess"
  FPR_nf_a020_desc:0 "Some shit is going on in the north and it's leading to a bunch of bums laying around in the streets of Philly. Something needs to be done before we have a full-blown shantytown situation."
  FPR_nf_a021:0 "Jr Rat Bashers"
  FPR_nf_a021_desc:0 "Trundle's solution is simple. We give the bums some bats and point them at the rats. They'll feed themselves and take care of our rat problem. Those that don't become rat food can even join the gang!"
  FPR_nf_a022:0 "More Minions"
  FPR_nf_a022_desc:0 "The Golden God is always looking for more minions to serve him, and serve him they shall."
  FPR_nf_a023:0 "Clean Up The Streets"
  FPR_nf_a023_desc:0 "The Aluminum Monster raises a good point, why don't we just clamp them in chains and sell them to The Pitt?"
  FPR_nf_a024:0 "Ponderosa Wedding Massacre"
  FPR_nf_a024_desc:0 "If there is one thing The Golden God can't stand, it's someone escaping."
  FPR_nf_a025:0 "The Fishy Factory"
  FPR_nf_a025_desc:0 "The Mama Dolces Fish Factory has continued to operate since as far back as anyone can remember. But they've always been very secretive for a fish factory. It might be time to look into the place."
  FPR_nf_a026:0 "Business Proposal"
  FPR_nf_a026_desc:0 "After opening up a dialogue with the operators of the factory, Trundle wants to suggest opening a new branch of business. Not only would the factory make fish, but also the best creampies in Philly."
  FPR_nf_a027:0 "Conduct Research"
  FPR_nf_a027_desc:0 "A fish factory is beneath The Golden God. Instead he will take advantage of everyone's distraction to conduct some 'research' with his cult."
  FPR_nf_a028:0 "Gather Intel"
  FPR_nf_a028_desc:0 "The Aluminum Monster somehow found a ghoul that spoke Mandarin. She's going to try and get him into the factory to gather information about what is really going on there."
  FPR_nf_a029:0 "It Comes Down To This"
  FPR_nf_a029_desc:0 "The time has come. Winner of CharDeeMacDennis, the Game of Games, will rule the gang. The losers, will have to sleep in bed with an old ghoul for a year."
  FPR_nf_b001:0 "Demonstrate Value"
  FPR_nf_b001_desc:0 "Riding high on his victory, The Golden God is proving his value to the people of Philly with a lavish celebration of his ascension to the throne. This is the first step in his plan to win the hearts of the city for life, the D.E.N.N.I.S. system."
  FPR_nf_b002:0 "Ass Kickers United"
  FPR_nf_b002_desc:0 "The best fighters in Philly have been gathered into an elite group, Ass Kickers United. They will serve as elite enforcers in The Golden God's regime."
  FPR_nf_b003:0 "Ass Kicker Newsletter"
  FPR_nf_b003_desc:0 "A special newsletter will be distributed to guide those asskickers that can read. They will extol asskicker values. An asskicker must be present every day, an asskicker must do the exercises, and an asskicker must avoid snackcakes. There are others, but those are the big 3."
  FPR_nf_b004:0 "Appoint A Master"
  FPR_nf_b004_desc:0 "One asskicker has proven himself to be above the others. He will serve as the master of the Asskickers, answering only to The Golden God himself."
  FPR_nf_b005:0 "Kick Ass Threads"
  FPR_nf_b005_desc:0 "To kick ass properly you need the right look too. Black leather dusters for everyone."
  FPR_nf_b006:0 "Updating Designs"
  FPR_nf_b006_desc:0 "Some guys really can't pull off the look and just look like assholes. A few tweaks of the uniform design are needed."
  FPR_nf_b007:0 "Enrage Populace"
  FPR_nf_b007_desc:0 "Step two of the plan is E, enrage the populace. The Golden God will have his minions spread rumors that those outside our territory are conspiring against us. They are all liars and manipulators who use people, not like The Golden God, who will look after them well.
  FPR_nf_b008:0 "Nurture Dependance"
  FPR_nf_b008_desc:0 "Step three is naturally N, nurture dependance. Industry in the city not already under our contorl will be siezed. Thus, people will depdend on us for everything."
  FPR_nf_b009:0 "Neglect Everybody"
  FPR_nf_b009_desc:0 "Step four is another N, neglect everybody. We will suddenly cut off the flow of goods. The people will become desperate, wish for us to once again provide for them. Maybe that evil neighbor of ours is behind these recent problems?"
  FPR_nf_b010:0 "Inspire Hope"
  FPR_nf_b010_desc:0 "Step five is I, inspire hope. We will promise that the recent troubles will vanish once our goals are met. Once we get the people to destroy our enemy, the hard times will be a thing of the past. Only then will they want exactly what we want."
  FPR_nf_b011:0 "Slaughter Everywhere"
  FPR_nf_b011_desc:0 "Last step is S, slaughter everywhere. With the people chomping at the bit to fight our enemies for us, we attack. Things will get better, for a time. But there will always be a new enemy to cause problems and repeat the cycle."
  FPR_nf_b012:0 "Birds of War"
  FPR_nf_b012_desc:0 "That's right Philly, prepare to take flight, with THE BIRDS OF WAR."
  FPR_nf_b013:0 "Recruiting A Maniac"
  FPR_nf_b013_desc:0 "It takes a true madman to be the first to fly a pieced together hunk of metal through the air. We know just the man for the job."
  FPR_nf_b014:0 "Untethered Rage"
  FPR_nf_b014_desc:0 "With the ability to strike across great distances, our rage knows no bounds."
  FPR_nf_b015:0 "Born Out of Thunder"
  FPR_nf_b015_desc:0 "Don't you mess with our lands now, or you'll see a fight!"
  FPR_nf_b016:0 "Fly Through The Night"
  FPR_nf_b016_desc:0 "The more you fly at night, the better you get at it."
  FPR_nf_b017:0 "The Wild Card"
  FPR_nf_b017_desc:0 "By some stroke of luck Trundle has won the game of games and now rules The Philly Raiders. His first order of business is to have his opponents start doing all the Trundle-work around the city."
  FPR_nf_b018:0 "The Bird Laws"
  FPR_nf_b018_desc:0 "Bird law in this city is simply not based on reason. Thankfully, Trundle is the best bird lawyer around and can clean up this mess."
  FPR_nf_b019:0 "Erm... Fillabuster"
  FPR_nf_b019_desc:0 "Trundle has... seen... a book on law before. That means he is well-versed in various laywerings and can fix up how we do things in Philly."
  FPR_nf_b020:0 "Bash Some Nerds"
  FPR_nf_b020_desc:0 "There's nothing Trundle hates more than some nerds and stupid science bitches trying to make him more smarter. The people of Philly shouldn't be nerds, they should beat up nerds."
  FPR_nf_b021:0 "Street Smarts"
  FPR_nf_b021_desc:0 "You don't need to be a nerd to lead a city, you just need to have street smarts."
  FPR_nf_b022:0 "Gonna Rise Up"
  FPR_nf_b022_desc:0 "Hello fellow American, you should vote me. I leave power, good. Thank you, thank you. If you vote me, I'm hot. Tributes, they'll be lower. Son. The democratic vote for me is right thing to do Philadelphia so do."
  FPR_nf_b023:0 "Gonna Kick A Lil Ass"
  FPR_nf_b023_desc:0 "Too long have people been treading all over us. We gotta kick a little ass America style."
  FPR_nf_b024:0 "Gonna Climb A Mountain"
  FPR_nf_b024_desc:0 "It may be a mountain of trash, but it still counts right?"
  FPR_nf_b025:0 "Gonna Sew A Flag"
  FPR_nf_b025_desc:0 "We need a new symbol for the city."
  FPR_nf_b026:0 "Gonna Drive A Big Truck"
  FPR_nf_b026_desc:0 "No, Trundle doesn't know how to drive. But this is not give up America where people just give up all the time."
  FPR_nf_b027:0 "Rock, Flag, And Eagle"
  FPR_nf_b027_desc:0 "I'm gonna rise up. I'm gonna kick a little ass. I'm gonna kick some ass in the USA. Gonna climb a mountain, gonna sew a flag, gonna fly on an eagle. I'm gonna kick some butt. I'm gonna drive a big truck. I'm gonna rule this world. I'm gonna kick some ass. I'm gonna rise up. I'm gonna kick a little ass. \n\n §RROCK§!, FLAG, §BAND EEEEEEAAAAAAGLLLLLLEEEEEEEEEEEE§!"
  FPR_nf_b028:0 "Go America All Over Their Asses"
  FPR_nf_b028_desc:0 "The people of Hershey think they can throw down with Trundle The Patriot? They have another thing coming."
  FPR_nf_b029:0 "The Nightman Commeth"
  FPR_nf_b029_desc:0 "We're living in a world of darkness."
  FPR_nf_b030:0 "Nightcrawler Training"
  FPR_nf_b030_desc:0 "Darkness falls, and magic stirs, as we become the creatures of the night!"
  FPR_nf_b031:0 "Know The Rats"
  FPR_nf_b031_desc:0 "If rats have taught me anything, it's that you can easily die and very quickly under a bus and on the side of the road. So you have to live in the now. I'm going to live in the now right now and try befriending the rats."
  FPR_nf_b032:0 "Check Rat Traps"
  FPR_nf_b032_desc:0 "These rats are too smart for some simple glue traps to work, besides glue is better used for huffing anyway. That's why trundle has designed better traps to catch us more rats."
  FPR_nf_b033:0 "First Is Worst"
  FPR_nf_b033_desc:0 "First is worst is what The Aluminum Monstser's mother always said about their firstborn. But just as it should have been, The Trashman's first born heir has taken the throne."
  FPR_nf_b034:0 "Use Junkyard Dogs"
  FPR_nf_b034_desc:0 "Few things scare a waster into obediance better than a nasty junkyard dog ready to bite their nuts off."
  FPR_nf_b035:0 "First Litters"
  FPR_nf_b035_desc:0 "A new batch of dogs are ready to be set loose on our enemies."
  FPR_nf_b036:0 "Bash And Bash And Bash"
  FPR_nf_b036_desc:0 "Guns were never the mosnter's style. She's always prefered to bash."
  FPR_nf_b037:0 "Proper Killing Tools"
  FPR_nf_b037_desc:0 "Rule number of one of being a killer, you need good killing tools. Preferably strong blades that can cut through bone."
  FPR_nf_b038:0 "More Jet?"
  FPR_nf_b038_desc:0 "No, there is no more Jet. Nobody in the history of Jet has ever woken up with any more Jet."
  FPR_nf_b039:0 "Moving Berries"
  FPR_nf_b039_desc:0 "The monster has a revolutionary plan to shake down local berry farmers to get bottles of juice. We'll then offload the juice onto traders marketing it as some kind of superfood that'll help you survive through the winter. That should sell well in The Upstate Federation."
  FPR_nf_b040:0 "Redefine Success"
  FPR_nf_b040_desc:0 "Using a multi-layered reverse-funnel system, we can do none of the work but get all the profits."
  FPR_nf_b041:0 "Many Hats"
  FPR_nf_b041_desc:0 "In her rage, The Aluminum Monster has killed off a lot of potential advisors. Thankfully, she knows just the characters to replace them."
  FPR_nf_b042:0 "The Golden Geese"
  FPR_nf_b042_desc:0 "Though they fight, The Aluminum Monster and her brother often make a good team. Perhaps The Golden God should be allowed a better role."
  FPR_nf_b043:0 "Monster's Rampage"
  FPR_nf_b043_desc:0 "The people of Philly will be very relieved to find the monster is directing her rage at people outside their city now."
  FPR_nf_b044:0 "Scrapping Junk"
  FPR_nf_b044_desc:0 "You can't trust these computers and other machines for anything. That's why they'd be better off dismantled and their parts used in power armor production."
  FPR_nf_b045:0 "Chrome Everywhere"
  FPR_nf_b045_desc:0 "Another order has come in for 100 new frames. Get to it!"
  FPR_nf_b046:0 "Hire A Fatty"
  FPR_nf_b046_desc:0 "An old friend of The Monster, Fatty Magoo knows a a thing or two about making power armor on the cheap."
  FPR_nf_b047:0 "Armor Sweatshops"
  FPR_nf_b047_desc:0 "These are hardworking people assembling armor to feed their families. Yes, it's in a sweatshop but so what?"
  FPR_nf_b048:0 "Revise Prototypes"
  FPR_nf_b048_desc:0 "The first prototypes for our new armor just weren't cutting it. We need something better."
  FPR_nf_b049:0 "Delay Retirement"
  FPR_nf_b049_desc:0 "The kids are jetheads, MacDonalds is a follower and a thief, and Trundle can't read. As it stands, nobody is fit to take The Trashman's throne. Maybe things will change in a few years. But for now, he's unretiring."
  FPR_nf_b050:0 "The Bridge Crew"
  FPR_nf_b050_desc:0 "The Trashman has been hanging out more and more with some guy named Duncan and his crew under a bridge. At least he's making friends right?"
  FPR_nf_b051:0 "Hawaiian Low-Wow?"
  FPR_nf_b051_desc:0 "No idea what that is, but it's some kind of party The Trashman said he saw in a book."
  FPR_nf_b052:0 "Sewer Treasures"
  FPR_nf_b052_desc:0 "You can find a lot of great things in the sewer. Just watch out for the walls of water that can come flooding down at any moment."
  FPR_nf_b053:0 "A Good Hoor"
  FPR_nf_b053_desc:0 "The Trashman has had a lot of good hoors in his life. But as he gets older he starts to wonder if maybe he should find one to settle down with."
  FPR_nf_b054:0 "Trashman's Pretty Woman"
  FPR_nf_b054_desc:0 "Roxy is good shit. She not only polishes The Trashman's crank, but also his heart. If only she could get off the jet."
  FPR_nf_b055:0 "New Highs"
  FPR_nf_b055_desc:0 "Or maybe a little jet addiction isn't so bad..."
  FPR_nf_b056:0 "The Bang Maid"
  FPR_nf_b056_desc:0 "They're like a maid... that you can bang. Yes Trundle, I found one, your mother."
  FPR_nf_b057:0 "A New Number 2"
  FPR_nf_b057_desc:0 "Trundle's mother has pulled some strings, among other things, to ensure his son still has a prominent role in the gang."
  FPR_nf_b058:0 "The Desert Grape"
  FPR_nf_b058_desc:0 "A friend of The Aluminum Monster has been one of The Trashman's long time bootycalls. He knows if anyone will encourage his debaucherous lifestyle, it's her."
  FPR_nf_b059:0 "Getting Lucky"
  FPR_nf_b059_desc:0 "While making love inside an old dumpster behind a NukaBurger, The Trashman and his wife found a stash of caps! Talk about getting lucky."
  FPR_nf_b060:0 "Someone's Gonna Get Stabbed"
  FPR_nf_b060_desc:0 "From the humble toeknife up to the mighty Alibaba sword, few things beat a good blade."
  FPR_nf_b061:0 "Gunther's Guns"
  FPR_nf_b061_desc:0 "Except for guns. Guns will beat a blade any day of the week, and The Trashman has a stake in a local arms producer."
  FPR_nf_b062:0 "Lets Start Blasting"
  FPR_nf_b062_desc:0 "One gun is good, but that's not always enough. Sometimes you just have to come out blasting."
  FPR_nf_b063:0 "Who Wants Rum Ham?"
  FPR_nf_b063_desc:0 "It's exactly what it sounds like. Ham, soaked in mutfruit rum. The partially preserved meat is becoming a favorite among raidrs who want to stay fed and browned out during long raiding trips."
  FPR_nf_b064:0 "Hostile Takeover"
  FPR_nf_b064_desc:0 "The best way to make money is to take something over, strip it for parts, and sell off whatever you don't need."
  FPR_nf_c001:0 "The Gang Gives Back"
  FPR_nf_c001_desc:0 "With Hershey under control it is time to give back to the people who helped make it happen."
  FPR_nf_c002:0 "Extreme Home Makeovers"
  FPR_nf_c002_desc:0 "A few controlled burns, some slave labor, and boom you have a new house."
  FPR_nf_c003:0 "The Party Mansion"
  FPR_nf_c003_desc:0 "Waddup? We're a bunch of cool raiders looking for other cool raiders to hang out in our party mansion. Nothing sexual. Dudes in good shape encouraged, maybe a funny fat guy, again nothing sexual."
  FPR_nf_c004:0 "Increase Security"
  FPR_nf_c004_desc:0 "Successful raiders like us? We have a target on our backs. That's why we need extra security."
  FPR_nf_c005:0 "Gun Sweatshops"
  FPR_nf_c005_desc:0 "They're running out of guns, supply just is not keeping up with demand. That's why we need more guns."
  FPR_nf_c006:0 "Tweak Some Ideas"
  FPR_nf_c006_desc:0 "This country was built on stealing someone's good idea, and making it a great idea. We will do the same."
  FPR_nf_c007:0 "Regular Sweatshops"
  FPR_nf_c007_desc:0 "Civ-greeding this late in the game? Lol"
  FPR_nf_c008:0 "Break Them Like Dogs"
  FPR_nf_c008_desc:0 "To run a good sweatshop, you need to break the workers like dogs."
  FPR_nf_c009:0 "Solve The Gas Crisis"
  FPR_nf_c009_desc:0 "Why the hell were we running the bar on a gas generator? Fusion cells are way more common and can be found in the basement of pretty much every big building!"
  FPR_nf_c010:0 "Safe Enough For Babies"
  FPR_nf_c010_desc:0 "Did you know that 90% of your water is 100% toxins? Who knows what the other 10 percent is? I have a water filter for you, that you need to put in every single home. It will protect you, and your entire family. You can even give that water to your babies."
  FPR_nf_c011:0 "The Gang Recycles"
  FPR_nf_c011_desc:0 "The people of the old world threw their tech away, and they threw their swords away. They threw their golfclubs and their tasty treats! And you know what? We found them. And we're going to use all of them!"
  FPR_nf_c012:0 "Hit The Road"
  FPR_nf_c012_desc:0 "The roads outside of Philly suck right? Should we fix that?"
  FPR_nf_c013:0 "The McPoyle Family Reunion"
  FPR_nf_c013_desc:0 "The McPoyles have invited the gang to a family celebration. It shouldn't get too weird."
  FPR_nf_c014:0 "Dependence Hall"
  FPR_nf_c014_desc:0 "It's a big old brick building in the city, not sure what it was used for before but we could use it to get things a little more organized around here."
  FPR_nf_c015:0 "The Gang Cracks The Liberty Bell"
  FPR_nf_c015_desc:0 "It's a long story..."
  FPR_nf_c016:0 "Try To Fix It"
  FPR_nf_c016_desc:0 "This bell is more than just an old hunk of junk. It's about freedom! The ability to do what you want, when you want. Eat crabs, boil denims, raid settlements. We have to fix it."
  FPR_nf_c017:0 "Pound It To Dust"
  FPR_nf_c017_desc:0 "This bell is a symbol of freedom, and we can't have that around."
  FPR_nf_c018:0 "City of Brotherly Love"
  FPR_nf_c018_desc:0 "Philadelphia, The City of Brotherly Love. It may not be much, but it's home."
  FPR_nf_c019:0 "Squash The Beef"
  FPR_nf_c019_desc:0 "It's been over a year since the game of games, nobody is having to sleep with an old ghoul anymore. Still, there is some bad blood. We need to clear the air, wipe the slate clean, bury the hatchet, and squash this beef once and for all."
  FPR_nf_c020:0 "Teambuilding Exercises"
  FPR_nf_c020_desc:0 "Now that we've squashed our beef, it's time for a little teambuilding exercise."
  FPR_nf_c021:0 "The Gang Visits Hershey Park"
  FPR_nf_c021_desc:0 "The walls of Hershey have fallen and the park is ours. What do now?"
  FPR_nf_c022:0 "The Implication"
  FPR_nf_c022_desc:0 "Picture this, an amish farmer out in the middle of a field with a raider they barely know. They look around and all they see is empty fields. What are they going to do, say no to giving over a tribute?"
  FPR_nf_c023:0 "Prevent Escape"
  FPR_nf_c023_desc:0 "If there is one thing The Golden God loves, its when his victims have no possibility of escape. The walls of Hershey will be reinforced. Except this time it won't be to keep people out, but to keep them in."
  FPR_nf_c024:0 "Hershey Minions"
  FPR_nf_c024_desc:0 "There are plenty in Hershey that would make for good followers."
  FPR_nf_c025:0 "A Grand Temple"
  FPR_nf_c025_desc:0 "Hershey shall be rebuilt. It will be a towering monument to the one god, The Golden God."
  FPR_nf_c026:0 "New Rat Sticks"
  FPR_nf_c026_desc:0 "These Amish had a lot of tools that would make great rat bashing sticks. Lets take them!"
  FPR_nf_c027:0 "Cheez Quotas"
  FPR_nf_c027_desc:0 "Yeah chocolate is cool, but you know what else you can make with milk? Cheez!"
  FPR_nf_c028:0 "Fix Up The Park"
  FPR_nf_c028_desc:0 "Some of this stuff isn't busted up too bad. We could make it work again."
  FPR_nf_c029:0 "Cheez Land"
  FPR_nf_c029_desc:0 "Come one, come all, to the happiest place in the wasteland, Cheez Land!"
  FPR_nf_c030:0 "the Monster's Wrath"
  FPR_nf_c030_desc:0 "Some Amish guard called The Aluminum Monster a robot so now she's tearing through the park killing everyone she can see."
  FPR_nf_c031:0 "Study Hydrolics"
  FPR_nf_c031_desc:0 "A few of these old rides had parts that'd be well adapted for power armor hydrolics. "
  FPR_nf_c032:0 "Dismantle The Vault"
  FPR_nf_c032_desc:0 "They weren't using this dusty old vault anyway."
  FPR_nf_c033:0 "Hershey Scrapyard"
  FPR_nf_c033_desc:0 "Hershey is still a bustling trading hub, just now it is mainly selling scrap ripped from the park itself."
  FPR_nf_c034:0 "Stripped For Parts"
  FPR_nf_c034_desc:0 "Rides? Vaults? Who needs that shit? Sell it to the wasters."
  FPR_nf_c035:0 "Better Uses For Corn"
  FPR_nf_c035_desc:0 "The Amish have more corn than they can eat. Someone should teach them how to make whiskey."
  FPR_nf_c036:0 "Amish Labor"
  FPR_nf_c036_desc:0 "The people of Hershey are known far and wide for being good craftsmen. That's why they're perfect for working in a sweatshop."
  FPR_nf_c037:0 "Trash Palace"
  FPR_nf_c037_desc:0 "Hershey has become a den of debauchery. The ultimate model of the raider lifestyle. Anything and anyone can be bought and sold here. No rules except you don't fuck with The Trashman."
  FPR_nf_c038:0 "Reignite The Rivalry"
  FPR_nf_c038_desc:0 "The Harrisburg bandits may not remember it, but we have a rivalry going back years. It's time to bring it back."
  FPR_nf_c039:0 "Continue West"
  FPR_nf_c039_desc:0 "This Johnstown place thinks they're free now that Harrisburg is out of the picture. Damn idiots."
  FPR_nf_c040:0 "Have Respect, We're Legends"
  FPR_nf_c040_desc:0 "These stupid idiots don't know who we are. Don't they know we're legends around here? Time to show them why you don't disrespect The Philly Raiders."
  FPR_nf_c041:0 "The Gang Solves The DC Crisis"
  FPR_nf_c041_desc:0 "The Capital Wasteland has been a bombed out shithole for 200 years. Recently it's been a warzone between a bunch of big players. Now that they've beat each other up, it's time for us to move in for the scraps."
  FPR_nf_c042:0 "The Gang Exploits A Miracle"
  FPR_nf_c042_desc:0 "Project purity may be a miracle, it may be bullshit, but one thing is certain. It's a goddamn goldmine."
  FPR_nf_c043:0 "LOOT LOOT!"
  FPR_nf_c043_desc:0 "The wasteland has been whipped up into a frenzy. Grab everything that isn't nailed down!"
  FPR_nf_c044:0 "The Gang Steals A Boat"
  FPR_nf_c044_desc:0 "Our gang has had its sights set on Rivet City since we first stormed Project Purity. A giant boat that'd be perfect for parties."
  FPR_nf_c045:0 "Visit Pittsburgh"
  FPR_nf_c045_desc:0 "There are TWO cities in Pennsylvania? How does that work?"
  FPR_nf_c046:0 "Just Good Business"
  FPR_nf_c046_desc:0 "The Pitt has offered us a good deal with barely any work on our part. Seems better than dealing with whatever the fuck a trog is."
  FPR_nf_c047:0 "Gun Fever 2"
  FPR_nf_c047_desc:0 "You can never have enough guns."
  FPR_nf_c048:0 "Project Power"
  FPR_nf_c048_desc:0 "Hershey, Harrisburg, DC, Pittsburgh, they're all either filling our pockets or under our thumb. Why would anybody NOT get on board with this winning team?"
  FPR_nf_c049:0 "The Gang Goes To Atlantic City"
  FPR_nf_c049_desc:0 "The Syndicate and The Trashman go way back. They've stayed in their lane, we've stayed in ours. But now they're fucking with New York? How long until they start sending people to Philly? We need to hit them first."
  FPR_nf_c050:0 "The Guidos"
  FPR_nf_c050_desc:0 "The Trashman has some old firends that'll help him run the city right."
  FPR_nf_c051:0 "You're Bloodheads, Children"
  FPR_nf_c051_desc:0 "You want to know why I didn't put either of you in charge of Atlantic City? It's that damn Devil's Blood. You're both on it all the time. You have to learn to pace yourselves like me."
  FPR_nf_c052:0 "A Well-Earned Rest"
  FPR_nf_c052_desc:0 "Sometimes you just have to lay out on the beach, get hammered on rumham, and relax."
  FPR_nf_c053:0 "Troll Toll"
  FPR_nf_c053_desc:0 "You gotta pay the troll toll if you wanna get outta this shithole."
  FPR_nf_c055:0 "You CANT swim to Urop?"
  FPR_nf_c054:0 "THATS THE OCEAN?"
  FPR_nf_c054_desc:0 "God damn, that thing's huge. What's on the other side you think?"
  FPR_nf_c055_desc:0 "I'm not sure there's any science to support that, but fine we'll make boats to go to Urop one day."
  FPR_nf_c056:0 "We're Crab People Now"
  FPR_nf_c056_desc:0 "Live and die by the crab."
  FPR_nf_c057:0 "Collect Sea Specimins"
  FPR_nf_c057_desc:0 "Just like we got the rats to fight for us, we can get the crabs to pinch who WE want them to pinch."
  FPR_nf_c058:0 "Strut The Beach"
  FPR_nf_c058_desc:0 "A triumph will be held to show Jersey their new rulers."
  FPR_nf_c059:0 "Deal With The Devil"
  FPR_nf_c059_desc:0 "It's like jet... but better? How is that possible?"
  FPR_nf_c060:0 "Dealing The Devil"
  FPR_nf_c060_desc:0 "A good drug dealer always has a little head stash. "
  FPR_nf_c061:0 "Under The Boardwalk"
  FPR_nf_c061_desc:0 "The area under the boardwalk is a magical place. Just watch out for the homeless men."
  FPR_nf_c062:0 "The Gang Gets Stranded"
  FPR_nf_c062_desc:0 "While taking a shortcut back to Philly, the gang has gotten lost. Does it seem like the trees are moving?"
  FPR_nf_c063:0 "Trees, Everywhere, Trees?!"
  FPR_nf_c063_desc:0 "What the hell is wrong with these woods? Why are the trees attackign us?"
  FPR_nf_c064:0 "The Gang Gets Rescued"
  FPR_nf_c064_desc:0 "It wasn't easy, but the gang was found safe and relatively sound. Though, The Trashman got sick from eating a dead crow."
  FPR_nf_c065:0 "A Rare Moment"
  FPR_nf_c065_desc:0 "Since his time in the woods, The Trashman has been acting different. Something happened in there."
  FPR_nf_c066:0 "This Is Why You DONT LEAVE PHILLY"
  FPR_nf_c066_desc:0 "Trundle has returned to Philly with a renewed hatred of leaving the city."
  FPR_nf_c067:0 "No Other Gods Before Me"
  FPR_nf_c067_desc:0 "The Golden God has accomplished yet another feat to cement his rule, slaying a local god and usurping his following."
  FPR_nf_c068:0 "I Hate The Woods"
  FPR_nf_c068_desc:0 "The Aluminum Monster has ordered the woods burned, along with anyone still inside."
  FPR_nf_c069_trashman:0 "The Trashman Rules The World"
  FPR_nf_c069_monster:0 "The Aluminum Monster Rules The World"
  FPR_nf_c069_god:0 "The Golden God Rules The World"
  FPR_nf_c069_trundle:0 "Trundle Rules The World"
  FPR_nf_c069_desc:0 "Countless cities have fallen to The Philly Raiders. We are now more than just a gang, we're an empire."

