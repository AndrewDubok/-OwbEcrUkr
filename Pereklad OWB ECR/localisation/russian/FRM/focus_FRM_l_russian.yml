l_russian:
  FRM_the_fall_of_lynchburg:0 "Падение Линчбурга"
  FRM_the_fall_of_lynchburg_desc:0 "Несмотря на обрушившийся на мир ядерный пожар, Линчбургу удалось выстоять и выжить... какое-то время."

  FRM_the_encroaching_swamp:0 "Наступающее болото"
  FRM_the_encroaching_swamp_desc:0 "Мирное поселение на пустошах? Какая шутка..."

  FRM_burn_baby_burn:0 "Гори, детка, гори"
  FRM_burn_baby_burn_desc:0 "С ростом болот на нашей территории группы в Линче начали проводить контролируемые выжигания, чтобы не допустить разрастания растительности. Со временем эти добровольцы образовали организацию: «Пожарные маршалы»."

  FRM_allies_of_convenience:0 "Удобные союзники"
  FRM_allies_of_convenience_desc:0 "Мы не единственные, кто сталкивается с растущим болотом и иностранными захватчиками. Мы не всегда ладили с атомбаптистами, но они гораздо лучше альтернатив."

  FRM_fire_in_our_hearts:0 "Пламя в наших сердцах"
  FRM_fire_in_our_hearts_desc:0 "Мы поддерживаем дух поселенцев Вирджинии. Тех, кто не сошел с ума от фанатизма или отчаяния. Мы поддерживаем надежду в удушающих болотах."

  FRM_careful_point_thing:0 "Будьте осторожны, куда направляете эту штуку!"
  FRM_careful_point_thing_desc:0 "Короче говоря, многое из нашего оборудования действительно очень опасно. Возможно, благодаря обучению новых маршалов ветеранами и повсеместному внедрению их рекомендаций мы сможем улучшить обращение с огнемётами и их применение."

  FRM_twisted_firestarter:0 "Извращенный поджигатель"
  FRM_twisted_firestarter_desc:0 "Удивительно, но спустя 4 года группа маршалов, отправившихся на болото в поисках источника, вернулась. Они не завершили свою миссию, но Маршалл Эшли и её ветераны теперь одни из самых крутых маршалов в округе."
    FRM_unlock_ashley_tt:0 "\n\n§Y$FRM_ashley_name$§! становится командиром отряда.\n§LУровень§!: §Y3§!\n§RАтака§!: §Y4§!\n§GЗащита§!: §Y1§!\n§PПланирование§!: §Y1§!\n§MЛогистика§!: §Y2§!\n§gЧерты§!: §tПроницательный§!, §tУдачливый§!, §tКровавое месиво§!\n\nЭшли привезет с собой группу высококвалифицированных и опытных пожарных маршалов."

  FRM_feel_the_burn:0 "Почувствуй жжение"
  FRM_feel_the_burn_desc:0 "Усовершенствовав наши огнеметы и другое вспомогательное оборудование, мы сосредоточимся на том, что у нас действительно хорошо получается - на поджогах."

  FRM_red_hot:0 "Красный и горячий"
  FRM_red_hot_desc:0 "Несмотря на важность наших огнеметов, большинство маршалов используют в борьбе с ужасами болот именно ружья и топоры."

  FRM_flaming_hot:0 "Пламенно-горячий"
  FRM_flaming_hot_desc:0 "Вооруженные новым оружием и пламенными сердцами, пожарные маршалы готовы сразиться со всем худшим, что есть на болоте."

  FRM_drumbeats_of_war:0 "Барабаны войны"
  FRM_drumbeats_of_war_desc:0 "Хотя они и не олицетворяют болото напрямую, как Эдемский сад, Апокрифы Посейдона также являются опасными фанатиками, которые угрожают безопасности наших границ."

  FRM_control_the_converts:0 "Контроль новообращенных"
  FRM_control_the_converts_desc:0 "Наш союз с Атомбаптистами может быть важен для обеспечения безопасности, но он привлек на наши земли неприятное количество ненадежных последователей, и некоторые из наших людей следуют этим учениям."

  FRM_preparing_the_people:0 "Подготовка народа"
  FRM_preparing_the_people_desc:0 "Война приближается к болотам, и это лишь вопрос времени. Нужно быть готовым ковать железо, пока горячо."

  FRM_arms_length:0 "На расстоянии вытянутой руки"
  FRM_arms_length_desc:0 "Наш союз с атомбаптистами никак нельзя назвать дружеским. Они нам не доверяют, мы им не доверяем. Мы должны обеспечить сохранение статус-кво, по крайней мере, пока мы не останемся последними выжившими."
    FRM_control_decisions_tt:0 "Разблокирует §Yрешения§!, §Oограничивающие влияние АтомБаптистов§!."

  FRM_this_fire:0 "Становится горячо"
  FRM_this_fire_desc:0 "Напряжение нарастает, словно в аду, и скоро в Вирджинию снова придёт война. Ноунфолк дестабилизировал обстановку, и нам нужно быть готовыми очистить болота. Раз и навсегда."

  FRM_ashfall:0 "Выпадение пепла"
  FRM_ashfall_desc:0 "Вот и всё. Статус-кво достиг своей конечной точки, и нельзя допустить дальнейшего роста Апокрифа Посейдона. Пора навести порядок в Вирджинии."

  FRM_fires_of_industry:0 "Пожары в промышленности"
  FRM_fires_of_industry_desc:0 "Линч был процветающим и дружелюбным городом, пока не появились болота. Вокруг до сих пор сохранились мастерские, заброшенные из-за сокращения населения, но если мы их снова займём, то сможем привести их в порядок."

  FRM_ignite_the_forges:0 "Зажгите кузницы"
  FRM_ignite_the_forges_desc:0 "Поскольку война с болотом становится всё более неизбежной, нам также неизбежно потребуется больше оружия и снаряжения."

  FRM_rebuild_the_universities:0 "Отстроить университеты"
  FRM_rebuild_the_universities_desc:0 "Несмотря на небольшие размеры, в довоенном Линчбурге было несколько университетов и других образовательных центров. Мы не можем полностью укомплектовать их кадрами, но восстановление хотя бы библиотек и части учебных заведений могло бы принести огромную пользу."

  FRM_kindle_the_ferry_trade:0 "Наладить паромную переправу"
  FRM_kindle_the_ferry_trade_desc:0 "Торговля по реке Джеймс, ставшей теперь опасной, - рискованная перспектива, но она жизненно важна, если мы хотим избежать зависимости от торговых путей через Грин-Маунтин. Развивая торговлю, мы надеемся заинтересовать бизнес, особенно тех, кто занимается сносом зданий."

  FRM_burning_bright:0 "Яркое пламя"
  FRM_burning_bright_desc:0 "Мир вокруг опасен, но мы можем сделать его лучше, по одному университету за раз."

  FRM_hub_of_the_swamps:0 "Центр болот"
  FRM_hub_of_the_swamps_desc:0 "Линч, пожалуй, единственный город в Вирджинии, где сохраняется ощущение нормальной жизни. Конечно, далеко от города не уедешь, и у нас есть мощное ополчение, но это довольно типично для большинства городов на пустошах."

  FRM_a_tantalising_flame:0 "Дразнящее пламя"
  FRM_a_tantalising_flame_desc:0 "Пожарные маршалы более чем доказали свою состоятельность, уничтожив Апокрифию Посейдона. Возможно, нам вообще не стоит возвращать власть гражданским..."

  FRM_ignite_the_swamp:0 "Поджжёное болото"
  FRM_ignite_the_swamp_desc:0 "Сейчас не время почивать на лаврах. Чтобы Вирджиния обрела мир, необходимо уничтожить Ноунфолк и Сад Эдема."

  FRM_consolidate_power:0 "Консолидация власти"
  FRM_consolidate_power_desc:0 "Пожарные маршаллы уже фактически правят Линчем. Нам просто нужно, чтобы всё шло так, как мы хотим."

  FRM_true_ascendance_of_the_marshalls:0 "Истинное господство Маршаллов"
  FRM_true_ascendance_of_the_marshalls_desc:0 "Маршал Бидда слаб и не понимает, что гражданским нельзя доверять самоуправление. Пора пожарным маршалам навести порядок."

  FRM_burn_it_down:0 "Сжечь это дотла"
  FRM_burn_it_down_desc:0 "Люди за пределами наших границ не знают настоящей безопасности. Монстры и мутанты таятся в лесах и болотах пустошей. Только сплоченные усилия преданной своему делу группы могут обеспечить настоящую безопасность. Только пожарные."
    frm_legion_of_fire:0 "Легион Пламени"
    frm_legion_of_fire_DEF:0 "Легион Пламени"
    frm_legion_of_fire_ADJ:0 "Пламенно-легионерск"

  FRM_fires_burning_out:0 "Пожары гаснут"
  FRM_fires_burning_out_desc:0 "Нет нужды продолжать усугублять страдания в болотах Вирджинии. Всё и так достаточно плохо. Восстановление какой-либо формы гражданского управления позволит Линчу снова по-настоящему процветать."

  FRM_set_down_the_flamers:0 "Сложить огнеметы"
  FRM_set_down_the_flamers_desc:0 "Пожарные комиссары останутся, но не смогут доминировать в правительстве, как это было десятилетиями. Пора сложить оружие и позволить бюрократам снова управлять страной."

  FRM_slow_burn:0 "Медленное горение"
  FRM_slow_burn_desc:0 "Хотя мы уже не так рьяно очищаем болото, это не значит, что мы можем позволить себе перестать следить за нашими границами. Мы должны убедиться, что болото больше не будет под угрозой."
    FRM_build_bunkers_tt:0 "Мы построим §Yфорпост§! на каждой пограничной провинции."

  FRM_rebuild_lynch:0 "Перестройка Линча"
  FRM_rebuild_lynch_desc:0 "Линч никогда не процветал, но с ростом болот он пришёл в упадок. Теперь, когда мы можем защитить своих людей, Линчу пора снова расти."

  FRM_the_swamps_saved:0 "Болота спасены"
  FRM_the_swamps_saved_desc:0 "Мы сделали это. Мы спасли Вирджинию. Мы больше не пожарные, пора начать новую страницу в нашей истории."
    frm_republic_of_lynch:0 "Республика Линча"
    frm_republic_of_lynch_DEF:0 "Вирджинская Республика Линча"
    frm_republic_of_lynch_ADJ:0 "Линчианск"

  FRM_burning_bridges:0 "Сжигание мостов"
  FRM_burning_bridges_desc:0 "Мы никогда не сможем доверять атомбаптистам. Возможно, когда-то мы были союзниками, но друзьями мы никогда не были."

  FRM_bond_forged_in_fire:0 "Связь, выкованная в огне"
  FRM_bond_forged_in_fire_desc:0 "У нас были разногласия с атомбаптистами, но это не значит, что мы не можем расти и становиться друзьями. На этот раз настоящими друзьями, а не просто друзьями по необходимости."

  FRM_clear_the_swamp:0 "Отчистка Болот"
  FRM_clear_the_swamp_desc:0 "Болото по-прежнему остаётся опасным и пугающим местом. Нам нужно очистить те области, которые мы можем безопасно контролировать."