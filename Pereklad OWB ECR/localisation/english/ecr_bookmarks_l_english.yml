l_english:
  ### East Coast Rebirth ###
  EC_NAME:0 "$NEW_NAME$ East Coast"
  EC_DESC:0 "£GFX_east_coast          \nPost-War America, is a lawless, inhospitable, and barren wasteland. Most of it consists of barren badlands where only the strongest can scratch a living out of the irradiated wastes. The Great War did not spare the east in any way; however, some areas did come out less destroyed than others, thus able to create small communities, some able to thrive. While Pittsburgh and Washington, DC were completely bombarded by nuclear ordnance, rural areas, such as in West Virginia and parts of Maryland, were mostly spared, though still subject to mutants and radiation. Boston was struck by one nuclear bomb, which missed and hit further to the south.\n\nFurthermore, life in the wasteland, no matter what place, can always break down the strongest of men. It's no secret that raider clans live out in the scorching wastes. These groups of people take what they can by force, sparing almost none in their paths. It's a sad fact that not many organizations are able to protect the many peaceful tribals and small towns, however, some do step up to protect the land such as the Green Mountain Boys, or Reilly's Rangers, who are a fierce but good-natured mercenary group that acts out of D.C. Even the Regulators, who have pledged to rid the wastes of any and all evil, can be seen in some parts of the wastelands. As life continues in the eastern wastes, a large faction of metal knights, known as the Brotherhood of Steel, tries to make life a bit easier around the areas of Washington, D.C., but a war with the Enclave is brewing."
  EEN_ECR_DESC:0 "Originally a secretive deep state that controlled the pre-war United States, The Enclave has fallen on hard times since The Great War. Despite careful planning and superior technology, The Enclave's main base at Control Station ENCLAVE was destroyed just over 35 years ago, with many of their surviving personnel fleeing East to Raven Rock. In the years since, contact with auxiliary bases has gone dark. Nevertheless, The Enclave perseveres. Under the leadership of President John Henry Eden, The Enclave has spent the last three decades rebuilding their strength. Now with a new generation ready to fight for their country, The Enclave is beginning their final preparations to step out into the wasteland to take America back. Take it back from the anarchistic raiders, hideously mutated super mutants, and of course their old foes The Brotherhood of Steel. Whatever it takes, The Enclave will restore peace, order and prosperity to this once great nation. And those that oppose them will be removed, forever."
  BLN_ECR_DESC:0 "A lot has changed since Elder Lyons and his team of Paladins, Knights and Scribes first made their way to The Capital Wasteland. In the years since they arrived in The Capital Wasteland they have seen no shortage of conflict. Raiders, ghouls and greedy wastelanders are a problem on their own, but then there are the super mutants. These hulking marauders have overwhelmed The Capital Wastleand, and it has become the chapter's primary mission to wipe them out. However, without knowing where they are coming from all they can do is desperately hold back the tide. If external problems were not enough, trouble is brewing within The Lyons Chapter. Murmurs of disapproval from the chapter's more traditional members are starting to grow in volume. The next few months will be essential if Elder Lyons is to hold his chapter together, because if their brothers abandon them, The Lyons Chapter will find themselves in even more dire straits."
  PIT_ECR_DESC:0 "The Pitt is one of the most feared places in the Wasteland, and for a good reason. Between cannibals, raiders, radiation, disease, and slavery, the once great city of Pittsburgh is now, quite frankly, a hellhole, and if you can imagine it, it used to be a lot worse. The Scourge, a Brotherhood of Steel operation, left many dead, and even more scarred for life. But the result was the rise of a new leader in the Pitt, Ishmael Ashur, a former Initiate who was thought dead. Ashur now rules the Pitt with an iron fist, and many suffer for it. But change, good or bad, is coming, and it may determine the fate of the Pitt, and the hundreds of slaves within."
  RIV_ECR_DESC:0 "Rivet City has stood for decades as the scientific hub of the Capital Wasteland. While the Enclave and Brotherhood claim to love took, they only worship what already exists, while Rivet City's scientists create new, truly helpful innovations, developing fresh food and advanced medical treatments. Rivet City may, in time, bring fresh water to the Wasteland and surpass even the greatest achievements of the Old World.\n\nHowever, not all is well. The attacks on the Capital Wasteland by super mutants, Enclave soldiers and organised raiders have not left Rivet City unscathed, and the clash of the Enclave and Brotherhood threaten to tear Rivet City's fragile existence apart. Charting a course through troubled waters is never easy. \n This tree is recommended for those that like playing tall."
  RON_ECR_DESC:0 "Ronto is a bastion in the North, the hope and dreams of generations brought into its resistance movement. Before the war, anyway. Now, resistance to American occupation has shaped the development of the most powerful nation in Ontario. W.A.S.H.I.N.G.T.O.N., a powerful prewar AI, guards the nation with a determination to drive off any American invaders, and the sport of ice hockey has gained prevalence as a means to preserve the culture of Canada. However, with great conflicts on the horizon in the south and the shaping of power across the wastes, Ronto must fight harder than ever to keep its well-loved independence. Who knows what the Canadian nation may have to face in the future?\n\n§ORonto is unfinished, and will receive additional content in a future update§!"
  BHS_ECR_DESC:0 "Two hundred years ago, General Atomics selected The Buffalo Health Service as the testing ground for their big advancement in medicine. The Bio-Mechanical Medical Administration Unit, also known as BMMAU, was meant to be the doctor of tomorrow. A physician that would could not get sick, would be available 24 hours a day, and never make a mistake in a surgery. The BMMAU was going to revolutionalize medicine, but then The Great War came. As BMMAU spent decades watching the wretched injuries and diseases man faced in the post-nuclear world it grew to understand one important thing. The certainty of steel is preferable over the weakness of flesh. In time all of mankind must be saved."
  TAL_ECR_DESC:0 "The Talon Company is the largest of the mercenary groups in the Wasteland. They have cultivated a reputation for being ruthless and efficient, willing to do anything if the price is right. But something is stirring just across the river to their north. Patrols mention seeing hulking figures roaming after dark and some have mentioned seeing airships. It was initially dismissed as just the talk of skiddish rookies on their first patrol, but what if it isn't? Could this be a new threat to the company, or a potential new client?"
  DCS_ECR_DESC:0 "A few years ago Uncle Roe brought together a collection of caravans to work together for mutual benefit. When raiders in The Bethesda Ruins caused trouble these traders implored the settlements they visited for aid and with their success, the settlements realized that together they were stronger. Now the DC Settlements are a loose confederation of towns all across The Capital Wasteland that provide mutual defense and assistance. Things were looking up, but just as the council got together to discuss a chairperson, a plethora of problems sprung up. Big Town has come under increasing attack. Canterbury Commons is dealing with two costumed nutjobs terrorising their citizens. Worst of all, Arefu seems to be under threat from honest to god vampires! Then there's Dave, a fringe settlement leader who insists he should be appointed leader of the entire alliance."
  DCR_ECR_DESC:0 "Raiders have prowled The Capital Wasteland since the day the bombs dropped. For over 100 years roaming gangs terrorized anybody caught outside the walls of a settlement with only the occasional break to fight each other over territory. However in recent years, between The Brotherhood, newly organized DC Settlements and of course supermutants, times have been tough. The gangs may need to work together if they are going to preserve their way of life. Thankfully this bad ass raider named Ryan Brigg has hit the scene and he says he has some big plan."
  ANV_ECR_DESC:0 "No matter what misconceptions outsiders have about Andale, it is simply the greatest town in Virginia. In the 200 years since the bombs fell nearly nothing has changed, with new generations continuing to pass down good old American values. Some would say it is the last town in America that still preserves The American Dream. A man is king of his castle, his wife is his queen and the kids mind their parents. There are just a couple things to remember. In Andale, outsiders must watch their manners, and a man must put meat on the table."
  COR_ECR_DESC:0 "Years ago, The Church of Rocky was driven from their home in Rocky Caverns by the vile heathens of Green Mountain. Many despaired over the forced exodus from their homeland, but through their new leader their despair was turned to fury. Saint Pebble has led his people in conquering neighboring tribes, bringing the light of Rocky to the simple heathens. The Rockyists have now spent years building up their strength and it will soon be the time to begin their march south. The return to Rocky Caverns draws ever closer, as does Rocky's Holy Retribution against those that drove out his chosen people."
  HOS_ECR_DESC:0 "Like other gangs of Ontario, The Hosers compete in a bloody sport they call hockey. The Hosers are the best, or rather second best, W.A.S.H.I.N.G.T.O.N's team beats them every time they compete. Their current leader, The Shore, is sick of losing. They're going to rebuild the team. \n\n And they will never lose again!"
  NNC_ECR_DESC:0 "The lives of wasteland knights are not easy ones. Trogs are constantly wandering in from the south, raiders are always looking for quick caps, and slavers are constantly abducting travelers. The knights of New New Castle have a hard enough time protecting the countryside. Now they have to worry about each other. Lord Lancaster's mind is starting to go, and without leadership it is only a matter of time before a new lord presides over the roundtable."
  GMN_ECR_DESC:0 "The Green Mountain Boys were pre-war anti-government guerillas. They spent the years leading up to the war staying a thorn in the side of The United States Government. Many of them became ghouls in the aftermath of The Great War and continue their fight, accepting volunteers. They still continue their fight, not against the government, but against anybody who tries to impose their will on the independent settlements in their neck of the woods."
  ONT_ECR_DESC:0 "When Control Station ENCLAVE was destroyed, The Ontario Enclave emerged from their command bunker with aims to claim the Canadian wastes with plasmafire. A few short years of success were followed by crushing defeats that left them scrambling back to their bunker. The following decades saw the bunker inhabitants doing everything they could to keep their decaying systems online. Every wing that could be closed off, system that could be cannibalized, or piece of tech could be stripped for parts, was. The years have left The Ontario Enclave weak and afraid. Now they watch the clock ticking down, knowing that in time they will have no option but to step out into the wasteland and face an enemy that hasn't forgotten their hatred. \n \n §R This is a difficult nation. Don't play this if you want to enjoy an easy power armored romp."
  ATB_ECR_DESC:0 "Born before the Great War in the great city of Macon, Georgia, Pastor James Howard Moore had wandered the wasteland for years with nothing but the clothes on his back and his King James Bible, asking himself why he lived on while others died. When he found the Atom-worshippers of Virginia, he guided them to the light of Jesus, and the AtomBaptists were born. Now, he helps his flock keep constant vigilance against the pagans, witches, and fools that inhabit southern Virginia."
  AMM_ECR_DESC:0 "Brother Abraham is the defacto leader of the Valley of Amman. Arriving with a group of Supermutant refugees from The City, his high intelligence and charismatic nature (for a Supermutant) led him to be trusted and liked by his brothers in Christ. Now, the community looks to him in these trying times."
  FRM_ECR_DESC:0 "For decades Bidda and her people have had to hide from the encroaching swamp and the mad tribals inhabiting it. Bidda led her people on the controlled burns, destroying swathes of swamp to simply keep it out of their homes. Now, with the chaos caused by the arrival of the Known Folk, and the Garden of Eden collapsing in on itself, Bidda finds something new to hold onto in what was once a hostile world. \n\n§GHope§!."
  GED_ECR_DESC:0 "Fortune grew up in a strong Eden, guided by the swamps. She saw the collapse coming, and preached against the decadence and apathy growing amongst the other swamp oracles. When everything began to fall apart, she was the only one not surprised. Now the Garden of Eden has retreated, but as the Matriarch of her tribe, Fortune wants to change that. Every day, though, her readings preach doom, and fewer and fewer people attend them. \n\nShe fears that, no matter what she does, nothing can save Eden."
  KWF_ECR_DESC:0 "Rike is a zealot, but not a religious one. He sees the flames that the Fire Marshalls wield as the symbols of a truer world, a world free from the maddening swamp and the inane chatterings of the swampdellers. He would like nothing more than for them all to burn. That is his zealotry."
  TRN_ECR_DESC:0 "In the ruins beyond the walls of Ashur's domain are a wild land infested with trogs and wildmen who's minds have descended to madness. Few who venture beyond the fences ever return, but some that do have spoken of strange things. Rumors say there are people that live among the trogs and wildmen, making a life in an old stronghold no-one can reach... could the rumors be true?"
