l_english:

###Cosmetic Tags###
ONT_canadian_enclave_tag:0 "Canadian Enclave"
ONT_canadian_enclave_tag_ADJ:0 "Enclave"
ONT_canadian_enclave_tag_DEF:0 "The Canadian Enclave"

###Factions###
ONT_enclave_faction:0 "Enclave Command"

###Decisions###
ONT_bunker_decision_category:0 "A Failing Bunker"
ONT_bunker_fail_mission:0 "Countdown To Midnight"
ONT_bunker_fail_mission_desc:0 "This is our estimation of when The Ontario Command Bunker will fail. It doesn't matter what we strip down, how hard we fight, or how close we are to victory. If we can not win before the bunker fails, we will have to retreat and march our soldiers somewhere else. Where we will go, we do not know. But without the bunker or Ronto, we can not live."

###Laws###
ONT_decrepit_command_law:0 "Decrepit Command"
ONT_decrepit_command_law_desc:0 "Few of our experienced officers made it back to The Ontario Command Bunker. Many of those have passed on since then. Our officer corps is nonexistant and most of our younger generation know nothing of even basic military tactics."
ONT_poorly_trained_officers_law:0 "Poorly Trained Officers"
ONT_poorly_trained_officers_law_desc:0 "Our officers are given a crash course on basic military theory out of a textbook. We do not expect many of them to survive their first deployment. Those that do will have hopefully learned a thing or two."
ONT_trained_officers_law:0 "Trained Officers"
ONT_trained_officers_law_desc:0 "Our officers participate in practical exercises in addition to their theory-based military training. These drills and quizzes will not make them into experienced leaders, but it will serve as a solid foundation to build upon."
ONT_well_trained_officers_law:0 "Well Trained Officers"
ONT_well_trained_officers_law_desc:0 "Our officers have not just studied historic battles, but they have fought them. With advanced VR training pods we have allowed our officers to gain the closest possible thing to practical experience. They may not be veterans, but they're close."
ONT_sourcing_materials_law:0 "Sourcing Materials"
ONT_sourcing_materials_law_desc:0 "Outposts are established at production facilities and the sites of essential resources. These locations are closely guarded against the local population, who will be dealt with eventually."


###Names###
ONT_general_hurley:0 "General Hurley"
ONT_riggs_name:0 "Captain Riggs"
ONT_hurley_name:0 "Major Hurley"
ONT_hurley_desc:0 "The most senior officer of The Ontario Enclave, Rick Hurley has spent the last 30 years holding his people and their home together. Like many, he'd secretly hoped that if they could keep things together just another year the cavalry would come in. As the writing on the wall becomes clearer, hope of rescue is diminishing. If The Ontario Enclave is to survive, they will need to fight once again."
ONT_munn_name:0 "Thomas Munn"
ONT_munn_desc:0 "As a young officer, Thomas Munn was tasked with the evacuation back to The Ontario Command Bunker. Never forgetting those who didn't make it, he has dedicated years studying failures of the retreat."
ONT_chicago_advisor_name:0 "Enouch Buchannon"
ONT_hartmann_name:0 "Abel Hartmann"
ONT_cromey_name:0 "Jonas Cromey"
ONT_thompson_name:0 "Francis Thompson"
ONT_watt_name:0 "William Watt"
ONT_semple_name:0 "Levi Semple"
ONT_mcconnal_name:0 "Anne McConnal"
ONT_mason_name:0 "Grace Mason"
ONT_wallace_name:0 "Linus Wallace"
ONT_fulton_name:0 "Abraham Fulton"
ONT_chicago_econ_name:0 "Cyrus Perkins"
ONT_barton_name:0 "Richard Barton"
ONT_eastburn_name:0 "Ellen Channel"
ONT_sterrett_name:0 "Thomas Sterrett"
ONT_chicago_culture_name:0 "Harriet McClelland"
ONT_mcclelland_desc:0 "After years of want and sacrifice, Chicago thinks we deserve to have a taste of their high life. They've sent someone to show us the way to enjoy the fruits of the mutant's labor"
ONT_washington_name:0 "W.A.S.H.I.N.G.T.O.N."
ONT_howarth_name:0 "Angelo Howarth"

###National Focuses###
ONT_nf_a001:0 "Reclaiming Toronto"
ONT_nf_a001_desc:0 "The Rig has fallen, the plan to clean the wastes with FEV ruined. What will we do now?."
ONT_nf_a002:0 "The Big Mistake"
ONT_nf_a002_desc:0 "W.A.S.H.I.N.G.T.O.N was an AI made by Pre-War America to help manage occupied Canada. Why would they have turned it off before the bombs fell?"
ONT_nf_a003:0 "Almost Too Late"
ONT_nf_a003_desc:0 "Just when things were looking their darkest, vertibirds roared in from The Capital Wasteland, but were they too late?"
ONT_nf_a004:0 "The Ticking Clock"
ONT_nf_a004_desc:0 "If we do not do something soon, our bunker will become unhabitable. It may be time to return to the surface."
ONT_nf_a005:0 "Winter Warriors"
ONT_nf_a005_desc:0 "The fight with Canadian mutants nearly saw our army wiped out. Decades of neglect hasn't helped either."
ONT_nf_a006:0 "Maintain Our Might"
ONT_nf_a006_desc:0 "It does not matter how expensive it is, power armor is the key to our military might. Scrape off the rust and replace the missing parts!"
ONT_nf_a007:0 "Almost As Good"
ONT_nf_a007_desc:0 "Over the years our scientists have divised an alternative for power armor. This armor repurposes some of the parts of our rusty X-01 suits while allowing us to repurpose rare parts from the suits."
ONT_nf_a008:0 "Stripping Down"
ONT_nf_a008_desc:0 "The HERMES armor allows us to reduce the cost of outfitting our army while maintaining our superiority. However, the suits are still resource intensive. Producing less of them should allow us to focus on keeping the bunker operational."
ONT_nf_a009:0 "Firepower First"
ONT_nf_a009_desc:0 "Our soldiers must have the best. Plasma rifles, gatling lasers and missle launchers are all necessary for our eventual victory!"
ONT_nf_a010:0 "Balance Priorities"
ONT_nf_a010_desc:0 "We can not affort to give every soldier on our lines the best equipment around. Some soldiers will need to make do with less than ideal weaponry."
ONT_nf_a011:0 "Quantity Matters"
ONT_nf_a011_desc:0 "There are too many muties out there to rely on a couple hundred plasma rifles to wipe them out. Bullets work just as good, and take way less power to produce."
ONT_nf_a012:0 "The Fabricators"
ONT_nf_a012_desc:0 "Advanced pre-war machines allow us to make just about anything we need with enough basic resources and power. Their only downside is they were not designed to work 200 years non-stop."
ONT_nf_a013:0 "Stockpile Meds"
ONT_nf_a013_desc:0 "Before shutting down our auxilary fabricators, we need to stockpile stimpacks and other essential medicine."
ONT_nf_a014:0 "Standard of Living"
ONT_nf_a014_desc:0 "Why should we sacrifice our way of life for a few more days of operation? Keep the bunker running the same as usual."
ONT_nf_a015:0 "Stockpile Food"
ONT_nf_a015_desc:0 "Before shutting down the auxilary fabiractors, we should stockpile food so we don't have to keep hydroponics draining our power."
ONT_nf_a016:0 "Tighter Quarters"
ONT_nf_a016_desc:0 "Some people may be less comfortable, but shoving everyone into communal living will allow us to shut down a few wings and save resources."
ONT_nf_a017:0 "Bunker Defenses"
ONT_nf_a017_desc:0 "Automated turrets have kept whatever wastelanders that stumbled across our bunker from entering for years. As we prepare to step out, should we keep them online?"
ONT_nf_a018:0 "Best Defense"
ONT_nf_a018_desc:0 "We can not afford to let the enemy advance on our bunker without a fight. Keep the defenses online."
ONT_nf_a019:0 "No Retreat"
ONT_nf_a019_desc:0 "This is our last chance to stave off our extinction. There will be no retreat. There will be no cowering behind automated defenses. Take the machines offline and repurpose the resources to ready for our fight!"
ONT_nf_a020:0 "Strength of Steel"
ONT_nf_a020_desc:0 "Our bunker has a stockpile of security robots that were taken offline shortly after our retreat. Reactivating them could be costly, but they'd be useful in our fight."
ONT_nf_a021:0 "Nuts And Bolts"
ONT_nf_a021_desc:0 "The security bots would be better utilized as scrap to keep vital systems running just a little longer."
ONT_nf_a022:0 "Mostly Boys"
ONT_nf_a022_desc:0 "It has been decades since we were driven back into our bunker. Few who knew life outside in the Canadian wastes are still in fighting shape. We're left with their kids and grandkids."
ONT_nf_a023:0 "VR Training"
ONT_nf_a023_desc:0 "We will prepare our men for the upcoming fight with advanced combat simulations."
ONT_nf_a024:0 "Urban Combat Training"
ONT_nf_a024_desc:0 "We will clear out an old hangar, mock up some artifical buildings and train our soldiers on urban fighting."
ONT_nf_a025:0 "Strictly Theory"
ONT_nf_a025_desc:0 "We can not spare the resources to conduct practical training. The soldiers will learn military theory and basic combat skills before entering the fight."
ONT_nf_a026:0 "Almost Veterans"
ONT_nf_a026_desc:0 "Our recruits have undegone enough intense combat training to prepare them for anything. The muties don't know what's coming."
ONT_nf_a027:0 "Tough Enough"
ONT_nf_a027_desc:0 "Our recruits are well-versed in the tactics of urban warfare. They should be ready."
ONT_nf_a028:0 "Barely Fit For Duty"
ONT_nf_a028_desc:0 "Our recruits may know the concepts of squad-based tactics, but that only goes so far. Odds are most of these men will not survive a week."
ONT_nf_a029:0 "Finishing Touches"
ONT_nf_a029_desc:0 "Our soldiers are ready and battle plans are almost drawn. There is a little more we could do, but those things will need time. Time is something we have very little of."
ONT_nf_a030:0 "Inventory Medicine"
ONT_nf_a030_desc:0 "With a little effort we can take a good inventory of our medical supplies and ready for the eventual influx of wounded."
ONT_nf_a031:0 "Scout Defenses"
ONT_nf_a031_desc:0 "We would be foolish to not scope out what we are up against. Advance scouts will document enemy positions and fortifications. This will help us break through their lines."
ONT_nf_a032:0 "Recover Depots"
ONT_nf_a032_desc:0 "There are a few pre-war arms caches that were likely left untouched. We need every weapon we can field."
ONT_nf_a033:0 "Winter Training"
ONT_nf_a033_desc:0 "Simulations or lectures are useful, sure. However, hands on experience is still the best."
ONT_nf_a034:0 "LETS FUCKING GO"
ONT_nf_a034_desc:0 "Time is running short. We are as ready as we ever will be. The muties of Toronto will pay for their father's sins against humanity and America!"
ONT_nf_a035:0 "Staging Areas"
ONT_nf_a035_desc:0 "We will establish a few forward outposts to launch our assault on the enemy."
ONT_nf_a036:0 "Clear Supply Lines"
ONT_nf_a036_desc:0 "Suppling our men by air is foolish in an enviroment where snowstorms keep our birds grounded. Setting up adequate infrastructure for supplying the front will be essential to our victory."
ONT_nf_a037:0 "Record Propaganda"
ONT_nf_a037_desc:0 "The best way to win a war is to make your enemy give up without a shot being fired. Radio recordings and propaganda flyers will be readied for distribution when we launch our offensive."
ONT_nf_a038:0 "Rally Our Own"
ONT_nf_a038_desc:0 "Even now, some of our people would rather watch the clock tick down or flee than fight. They need to be made to come around."
ONT_nf_b001:0 "America's Back"
ONT_nf_b001_desc:0 "We did it. We drove the mutant menace under our boots and reclaimed Toronto for America. What now?"
ONT_nf_b002:0 "New Command Centre"
ONT_nf_b002_desc:0 "We will relocate our people to Toronto, occupying the military bases and the W.A.S.H.I.N.G.T.O.N bunker. These facilities have always been American property, and we can not leave them to the mutants."
ONT_nf_b003:0 "Improve Living Conditions"
ONT_nf_b003_desc:0 "Broken walls, collapsed roofs, and shattered windows are all things that can be easily fixed with a little mutant labor."
ONT_nf_b004:0 "Just Like Home"
ONT_nf_b004_desc:0 "Months of work have resulted in living conditions in Toronto rivaling those of our bunker home."
ONT_nf_b005:0 "The Mutie's Lot"
ONT_nf_b005_desc:0 "Where there's a whip, there's a way. The mutants will rebuild the city they tried to take from us."
ONT_nf_b006:0 "Scavenging Quotas"
ONT_nf_b006_desc:0 "Mutants outfitted with bombcollars will be sent into the Toronto ruins to scavenge for resources. If they come back with something good, we may even feed them."
ONT_nf_b007:0 "The Overseer Program"
ONT_nf_b007_desc:0 "Some mutants are more accepting to our rule than others. These mutants even seem eager to support the natural hierarchy. Why waste our time keeping the mutants in line when we can have them do it for us?"
ONT_nf_b008:0 "Benefits of Compliance"
ONT_nf_b008_desc:0 "It is facinating the amount of cruelty a mutant will exert upon their kind if they are incentivized with a tin badge and some additional rations."
ONT_nf_b009:0 "Enforcing Our Will"
ONT_nf_b009_desc:0 "The Overseer program has proven so effective that we could potentially roll it out in a large scale. This will allow us to project our will well beyond the limits of our numbers."
ONT_nf_b010:0 "WASHINGTON Databanks"
ONT_nf_b010_desc:0 "The W.A.S.H.I.N.G.T.O.N mainframe contains more than just the pre-war AI. There are volumes of valuable technical data we could use."
ONT_nf_b011:0 "Factory Reset"
ONT_nf_b011_desc:0 "Removing the commie code should allow W.A.S.H.I.N.G.T.O.N to serve his intended purpose, keeping these bastards in line."
ONT_nf_b012:0 "Fortify The Compound"
ONT_nf_b012_desc:0 "We will not lose this base again. Strengthen the walls, hook up new turrets, and watch the perimiter."
ONT_nf_b013:0 "Repair The Antenna"
ONT_nf_b013_desc:0 "The communications dish over the Toronto base was one of the first things taken out in the fighting all those years ago. If we bring it back on we can reach out and see who's listening."
ONT_nf_b014:0 "Necessary Repairs"
ONT_nf_b014_desc:0 "Why would we leave this bunker if we could secure the resources we need to keep it running for another 200 years?"
ONT_nf_b015:0 "Constructing Roads"
ONT_nf_b015_desc:0 "To facilitate the transport of resources from the Toronto ruins to our command bunker, we will construct roads and clear debris."
ONT_nf_b016:0 "Relocate Comms"
ONT_nf_b016_desc:0 "There is enough communications equipment in the Toronto ruins to amplify the signals from our bunker."
ONT_nf_b017:0 "Reactivate Automated Security"
ONT_nf_b017_desc:0 "The bunkers and bases around Toronto had security robots that can be easily reprogrammed to suit our needs."
ONT_nf_b018:0 "WASHINGTON Surplus"
ONT_nf_b018_desc:0 "W.A.S.H.I.N.G.T.O.N's bunker had its own automated security that it will not be needing anymore"
ONT_nf_b019:0 "Repairing Fabricators"
ONT_nf_b019_desc:0 "With the right parts we can keep our fabricators going for years to come."
ONT_nf_b020:0 "Resource Production"
ONT_nf_b020_desc:0 "A little retooling will allow our fabricators to produce advanced tech necessary to keep our equipment running."
ONT_nf_b021:0 "Sourcing Materials"
ONT_nf_b021_desc:0 "The ruins of Canada are rightful US Government Property. That means every crumbling factory, every rusted piece of machienery, every watt of energy, are rightfully ours."
ONT_nf_b022:0 "Upgrade Amenities"
ONT_nf_b022_desc:0 "The resources of Toronto allow us to bring back long deactivated systems. Welcome back hot showers!"
ONT_nf_b023:0 "Bunker Luxury"
ONT_nf_b023_desc:0 "Why stop at restoring what we lost? If this bunker is to be our home, we may as well enjoy some of the finer things."
ONT_nf_b024:0 "Restoring Databanks"
ONT_nf_b024_desc:0 "Many old servers were taken offline years ago. Some were stripped down and their parts distributed across essential systems. There are a few we could bring back online to utilize their data."
ONT_nf_b025:0 "Reopen Labs"
ONT_nf_b025_desc:0 "Research labs were amongh the first things to be taken down when we had to make cuts to keep the bunker running. Now we can afford to research the important things, like how many muties does it take to eat a lightbulb?"
ONT_nf_b026:0 "This is Ronto Maincom"
ONT_nf_b026_desc:0 "With our long-range comms online, it is time we see how things are doing in DC."
ONT_nf_b027:0 "Safe Haven"
ONT_nf_b027_desc:0 "Our contact with Raven Rock did not go as well as we had hoped. It would seem  we were not the only ones that had a rough couple of years."
ONT_nf_c001:0 "Accept Autumn's Authority"
ONT_nf_c001_desc:0 "Commander in Chief Autumn has taken control of The Raven Rock Enclave. Under his leadership, we will be able to retake America and the Canadian territories!"
ONT_nf_c002:0 "Request Surplus Equipment"
ONT_nf_c002_desc:0 "Raven Rock has plenty of captured equipment from their recent conflict with The Brotherhood of Steel. Maybe they can send us some."
ONT_nf_c003:0 "Apply Autumn's Policies"
ONT_nf_c003_desc:0 "For some reason Autumn wants to treat the mutants with some rights? For example, we're not allowed to shoot them without them disobeying an order first. It may be strange, but we need to follow the lead of the president."
ONT_nf_c004:0 "The Canadian Loophole"
ONT_nf_c004_desc:0 "Technically, Autumn's directives only apply to American citizens, and Canadian muties aren't citizens."
ONT_nf_c005:0 "Hellfire Schematics"
ONT_nf_c005_desc:0 "Raven Rock has developed a new type of power armor that would be useful in our military."
ONT_nf_c006:0 "The Great Lakes Project"
ONT_nf_c006_desc:0 "Project Purity provided Raven Rock with near limitless clean water, which has given them substantial control in The Eastern United States. We should request assistance in creating our own Project Purity."
ONT_nf_c007:0 "The Backup Plan"
ONT_nf_c007_desc:0 "Raven Rock has fallen, but they were not the only Enclave outpost out there. We have picked up transmissions from a large outpost in Chicago. Together we can avenge our fellow Americans that fell to the mutant hordes."
ONT_nf_c008:0 "It's Just Us"
ONT_nf_c008_desc:0 "Raven Rock has fallen, and all other transmissions we send out are met with static. Are we the last Enclave out there?"
ONT_nf_c009:0 "Enforce Eden's Mandate"
ONT_nf_c009_desc:0 "President Eden has reclaimed America's Capital. Together we will piece together this broken nation!"
ONT_nf_c010:0 "The Buffalo Exchange"
ONT_nf_c010_desc:0 "The Buffalo Health Service is offering us a spectacular trade. If we send them some mutants to 'cure' they will send us robobrains ready to fight for us."
ONT_nf_c011:0 "Request Material Support"
ONT_nf_c011_desc:0 "Advanced power armor and plasma weapons are in short supply, but surely the president can spare some for his favorite territorial governors."
ONT_nf_c012:0 "Send Dudes!"
ONT_nf_c012_desc:0 "What point is some plasma rifles if we don't have men to fire them? We need reinforcements from Raven Rock!"
ONT_nf_c013:0 "Floating Friends"
ONT_nf_c013_desc:0 "Raven Rock has developed a new version of eyebot that is exceptionally more effective. These new duraframe eyebots will aid our efforts reclaiming Canada."
ONT_nf_c014:0 "Pure As Snow"
ONT_nf_c014_desc:0 "President Eden has done what Richardson could not, rid the wasteland of mutated life. With the aid of his scientists we can create our own Project Purity on the great lakes and bring clean purifying water to the mutated masses."
ONT_nf_c015:0 "O Canada"
ONT_nf_c015_desc:0 "\n O Canada \n Our home and conquered land! \n True human might in all of us command. \n With glowing guns we see thee rise, \n The True North strong and mutie free! \n From far and wide, \n O Canda, we stand on guard for thee! \n God keep our land glorious and clean! \n O Canada, we stand on guard for humanity!"
ONT_nf_c016:0 "Consolidate Ontario"
ONT_nf_c016_desc:0 "How can we be The Ontario Enclave if we don't control all of Ontario?"
ONT_nf_c017:0 "Heart of Industry"
ONT_nf_c017_desc:0 "Pre-War Ontario was the heart of Canadian industry. Many of these factories fell to disrepair in the centuries following the great war. With enough wastelander labor we can restore some of them."
ONT_nf_c018:0 "Get Wrecked"
ONT_nf_c018_desc:0 "A band of automotive raiders carry on the spirit of uppity Canadians that resisted our lawful occupation. They may not remember why they hate America, but we will remind them."
ONT_nf_c019:0 "Retool Auto Plants"
ONT_nf_c019_desc:0 "The Windsor Wreckers kept many of these pre-war automotive plants running in some state. There are some ways we could make good use of them."
ONT_nf_c020:0 "Utilize Auto Plants"
ONT_nf_c020_desc:0 "Why would we waste effort changing these autoplants when we could use them for their intended purpose?"
ONT_nf_c021:0 "Fortify The Border"
ONT_nf_c021_desc:0 "Making Windsor an important industrial hub means it will be a target for our enemies. Fortifying the borders should help protect it."
ONT_nf_c022:0 "Annex Manitoba"
ONT_nf_c022_desc:0 "The region of Manitoba has been occupied by all manner of pathetic upstarts over the last two centuries. It is time to remind them this wasteland isn't theirs to govern."
ONT_nf_c023:0 "Seize Manitoban Wealth"
ONT_nf_c023_desc:0 "Various lords and despots accumulated wealth off of the land and resources around Manitoba. That wealth rightfully belongs to The US Government."
ONT_nf_c024:0 "Canada's Destiny"
ONT_nf_c024_desc:0 "The Destiny ZAX was much like WASHINGTON in that it was meant to help The US Government handle unruly Canadians. It may have gone a little off the rails in the last couple centuries, but that's nothing a rebooted WASHINGTON can't help us fix."
ONT_nf_c025:0 "Regicide"
ONT_nf_c025_desc:0 "The ruler of Manitoba was a ghoul that thought himself a king. His execution should send a strong message to the mutants of Canada just who is in charge."
ONT_nf_c026:0 "Canadian Pioneers"
ONT_nf_c026_desc:0 "Another force is out in The Canadian tundra flying the stars and stripes. There are rumors about just who they are and what they represent, but it couldn't hurt to take a look before sending in the troops."
ONT_nf_c027:0 "Blood On The Ice"
ONT_nf_c027_desc:0 "Just to the south of Toronto there are a band of raiders practicing some brutal form of the pre-war sport Hockey. Lets see how well their bladed sticks hold up against plasma fire."
ONT_nf_c028:0 "The Final Match"
ONT_nf_c028_desc:0 "The few hosers we were able to take alive will be made useful. The last hockey match in Canada will be good entertainment for our weary soldiers and brass."
ONT_nf_c029:0 "Leash The Hosers"
ONT_nf_c029_desc:0 "These hosers don't seem to care who they kill, so long as they get to kill. If kept on a tight leash, they could make good attack dogs."
ONT_nf_c030:0 "The Border Roadway"
ONT_nf_c030_desc:0 "The border between Ontario and The Eastern United States is littered with abandoned checkpoints, debris, and ruined roadways. We should rectify this to ease the flow of goods between Canada and America."
ONT_nf_c031:0 "Annex Eastern Canada"
ONT_nf_c031_desc:0 "East of Ontario are large swaths of Canaidan land currently ruled by various mutant upstarts. We must rectify this."
ONT_nf_c032:0 "Restore Dams"
ONT_nf_c032_desc:0 "The newly conquered territories are home to several hydroelectric dams in various states of disrepair. Reactivating them and patching them into our energy grid should be a high priority."
ONT_nf_c033:0 "Fight The Red Tide"
ONT_nf_c033_desc:0 "Central Canada has been overrun by "
ONT_nf_c034:0 "Changing Of The Guard"
ONT_nf_c034_desc:0 "Pioneer Company stood with Chicago in our war. Now that they are defeated and their task of administrating central Canada is shifting to us."
ONT_nf_c035:0 "The Saskatchewan Campaign"
ONT_nf_c035_desc:0 "Central Canada is a mess of strange mutants, mad AIs and roving warlords. It is up to us to bring order."
ONT_nf_c036:0 "Bind Our Nations"
ONT_nf_c036_desc:0 "The joint administration of Canada between us and Pioneer Company is not without its difficulties. Many of them could be alleviated with easier travel between our capitals."
ONT_nf_c037:0 "Only Good Commies"
ONT_nf_c037_desc:0 "The snow of Canada will turn red with the blood of communists. Only then will we have order."
ONT_nf_c038:0 "Spoils of War"
ONT_nf_c038_desc:0 "Pioneer Company was sitting on quite the stockpile of tech sent by Chicago. It's ours now."
ONT_nf_c039:0 "Redmond Work Zone"
ONT_nf_c039_desc:0 "Redmond will become much like Toronto. With secure walls, automated turrets, and a small garrison, the mutants stick to the task of salvaging the ruined city for valuable resources."
ONT_nf_c040:0 "Support Westward Expansion"
ONT_nf_c040_desc:0 "Our administration of Canada may end at the border with Pioneer Company, but that does not mean we can not assist their efforts in pacifying Western Canada."
ONT_nf_c041:0 "Friends In Cold Places"
ONT_nf_c041_desc:0 "Our working relationship with Pioneer Company has greatly benefited the both of us."
ONT_nf_c042:0 "Canadian Trade"
ONT_nf_c042_desc:0 "The Trans-Canadian Railway is facilitating trade between us and Pioneer Company."
ONT_nf_c043:0 "WE SHALL PASS"
ONT_nf_c043_desc:0 "A gaggle of mutants think they can hide in the mountains from us forever. They are wrong."
ONT_nf_c044:0 "The Western Coast"
ONT_nf_c044_desc:0 "Pirates, ghouls and all manner of freaks roam the western Canada coast. Their free reign of the region is about to come to a close."
ONT_nf_c045:0 "Seize Pirate Fleets"
ONT_nf_c045_desc:0 "These rusted hulks will have to do until we can produce real warships out west."
ONT_nf_c046:0 "Regicide 2 Electric Boogaloo"
ONT_nf_c046_desc:0 "It should not be surprising that we have found yet another mutant that thinks themselves a monarch. This one too will serve as an example."
ONT_nf_c047:0 "Alaskan Expedition"
ONT_nf_c047_desc:0 "Alaska technically falls out of our jurisdiction. However, our stateside friends can't be bothered to send people to check in on the region. We should do them the favor of checking in on the region."
ONT_nf_c048:0 "The Division of Canada"
ONT_nf_c048_desc:0 "To our surprise, Pioneer Company is not only a remnant of the American occupation force, but they are led by Enclave personnel. Because of this, we must settle matters of our territory in the courts."
ONT_nf_c049:0 "Race For The Depots"
ONT_nf_c049_desc:0 "From the maps brought by survivors of Raven Rock and Chicago, there are still a few weapons depots and outposts that may not have fallen into enemy hands. Securing them will be vital to our survival."
ONT_nf_c050:0 "The Safehaven Signal"
ONT_nf_c050_desc:0 "Broadcast a signal on all secure Enclave channels. Let any of our fellow Americans that are listening know to make their way to Toronto."
ONT_nf_c051:0 "Contact Auxiliary Outposts"
ONT_nf_c051_desc:0 "VanBuren AFB in Florida, MacArthur AFB in Montana, and a few other outposts might still be standing. We need to remain in contact and help each other, because we are all that's left."
ONT_nf_c052:0 "Secure Technical Data"
ONT_nf_c052_desc:0 "There are still a few research outposts in The Midwest and Capital Wasteland that may not have been breached by our enemies. The research data in these outposts belong in our hands."
ONT_nf_c053:0 "The Flag Still Waves"
ONT_nf_c053_desc:0 "The Enclave may have faced countless setbacks, but we are still standing after all this time. Looks like we are true survivors."
ONT_nf_c054:0 "Trade For Advanced Equipment"
ONT_nf_c054_desc:0 "Our industry pales in comparison to that of Chicago. They have stockpiles of advanced arms and equipment they could send us, provided we support their war machine."
ONT_nf_c055:0 "Accept Chicago's Advisors"
ONT_nf_c055_desc:0 "Chicago has done a good job pacifying their mutant populace. There are certainly a few things we could learn from them, and they are willing to teach us."
ONT_nf_c056:0 "Politely Decline Advisors"
ONT_nf_c056_desc:0 "With all due respect to Chicago, we have done just fine in recent years. We will respectfully decline their offer of administrative support."
ONT_nf_c057:0 "Ship Off Researchers"
ONT_nf_c057_desc:0 "Our research facilities are sorely lacking, and will be for some time. Chicago on the other hand has exemplary facilities. Why wouldn't we give our best researchers the opportunity to work in such labs? Eventually Chicago will send along their findings anyway, once they've passed sufficient peer review."
ONT_nf_c058:0 "Falling In Line"
ONT_nf_c058_desc:0 "A recent conversation between us and Chicago puts things into perspective."

### Decisions ###
ONT_great_lake_purity_decision:0 "Construct The Great Lake Project"
ONT_great_lake_purity_decision_desc:0 "Scientists from Raven Rock have delivered schematics for us to replicate Project Purity on Lake Ontario. It will be a massive undertaking, but a nearly unlimited supply of clean water would go a long way to helping us expand our dominion over Canada."

### Events ###
ONT_nf_events.1.title:0 "Plan B"
ONT_nf_events.1.desc:0 "For weeks we sat waiting for the signal from Control Station ENCLAVE to let us know FEV-Curling-13 cleansed the planet. All attempts to contact the rig were met with static and it became clear that something horrible happened. Eventually the decision was made to send out scouts to check on the state of the Canadian wastes. They returned with troubling news. The wasteland was still full of communist canadian mutants. It was clear that if Canada was to be reclaimed for America, The Ontario Enclave would have to do it themselves. Plans were drawn up and they all started with retaking Toronto. The main question was, what would they target first?"
ONT_nf_events.1.a:0 "We secured pre-war weapons depots."
ONT_nf_events.1.b:0 "We targeted industrial centers"
ONT_nf_events.1.c:0 "We took down remaining power plants"
ONT_nf_events.1.d:0 "We hit the mutant population centers"
ONT_nf_events.2.title:0 "A Simple Solution"
ONT_nf_events.2.desc:0 "Subjugating the mutants of Toronto was easy. They were disorganized and little match for The Enclave. The surrendering mutants were enslaved and put to work rebuilding the city while scientists were hard at work theorizing a way to eventually do away with them at scale. Things were running smoothly for a few years, but eventually the mutants started fighting back. For every petty uprising that was put down, two more popped up in their place. The problem was on pace to escalate beyond control when command found a solution. Deep beneath the Toronto ruins there was a bunker housing an advanced ZAX computer. The computer, named W.A.S.H.I.N.G.T.O.N was programmed to assist The United States Army with keeping the Canadian populace pacified. The machine was supposed to still be active, but nobody in the bunker questioned why it wasn't. \n \n It was only after re-activating the machine and identifying themselves as The United States Government that they realized why W.A.S.H.I.N.G.T.O.N was taken offline. \n \n Shortly before the bombs fell, a goddammed Canadian communist slipped a virus into the ZAX turning it into some anti-American monster. The team sent to re-activate the Zax was quickly overwhelmed by automated defenses and soon military-grade robots were flooding out into Toronto targeting enclave personnel. The mutants took up arms and joined with the machines. It was only through the sacrifice of a brave few that the machines were held back."
ONT_nf_events.2.a:0 "Many brave soldiers died to buy us time"
ONT_nf_events.2.b:0 "Our brightest minds generated a massive EMP before being overrun"
ONT_nf_events.2.c:0 "Omega Team died running a distraction assault"
ONT_nf_events.2.d:0 "Some civilians received incorrect evac orders"
ONT_nf_events.3.title:0 "Relief From Raven Rock"
ONT_nf_events.3.desc:0 "Shortly before long-range comms were destroyed, we were able to send out a plea for help on Enclave frequencies. Thankfully, we were not just screaming into the void, Raven Rock answered in a few days with a dozen vertibirds flying in reinforcements. The hope Raven Rock brought did not last long. The mutants and machines were too great in number and all the reinforcements did was buy us time to secure an important asset as we retreated back to the command bunker."
ONT_nf_events.3.a:0 "Advanced blueprints"
ONT_nf_events.3.b:0 "Crates of water chips"
ONT_nf_events.3.c:0 "Prototype weapons"
ONT_nf_events.3.d:0 "The people are our greatest asset"
ONT_nf_events.4.title:0 "Minutes From Midnight"
ONT_nf_events.4.desc:0 "The Ontario Command Bunker was not designed to stay in operation past 150 years. Over the last three decades we have done everything we could to keep our home from falling apart around us. Wings were closed down, equipment was canibalized, and on a couple occasions teams emerged to scavenge for replacement parts. It was all just for buying time and everyone knew the day would come where they would need to leave. That day is rapidly approaching. Even the best estimates don't see the bunker lasting another 5 years. For us to survive, we will need to step back out into the wasteland. But before we do, we have a lot of preparing to do."
ONT_nf_events.4.a:0 "There will not be a third chance"
ONT_nf_events.5.title:0 "After All This Time"
ONT_nf_events.5.desc:0 "The Rig, Raven Rock, Chicago, the cause of saving humanity has suffered numerous blows. Countless lives have been snuffed out by the mutant threat. Mutants, abominations, and even communists rampage across this once great nation. Yet still, the flag waves. We are still standing. Humanity is still standing. Though we are few in number, we possess something these godless mutants never could. We possess the indomitable human spirit. So long as a single one of us draws breath, humanity will live. We will not surrender. We will clean this nation of the filth that has infested it."
ONT_nf_events.5.a:0 "We will win"
ONT_nf_events.6.title:0 "It's In The Walls"
ONT_nf_events.6.desc:0 "When we retreated back into The Ontario Command Bunker all those years ago, we left a lot of good equipment behind. Plasma rifles were cast to the side when the microfusion cells ran dry. Terminals and technical equipment were left behind when outposts were overrun. Hundreds of suits of power armor were left with the bodies of those who died in them. Still, we saved what we could. When the bunker was closed, one of the first things that was carried out was an inventory of equipment. \n\n - 72 suits of X-01 Power Armor \n\n - 328 suits of T-51b Power Armor \n\n - 216 Winchester P94 Plasma Rifles \n\n - 63 Wattz 2000 Laser Rifles \n\n - 24 L30 Gatling Lasers \n \n - 31 Rockwell BigBazookas \n \n - 2 Crates of Plasma Grenades \n \n - 281 Misc Small Arms \n \n 30 years later almost all that equipment is gone. We have only 14 suits of functional power armor, and 20 working plasma rifles. The remaining equipment wasn't lost to rust, battle, or falling down some elevator shaft. They were stripped of useful parts. We have an entire storage room full of stripped power armor suits. Their hydrolics used to replace malfunctioning doors. Their radio equipment replacing decaying intercoms. Even their urine-recycling systems repairing our own water purification parts. You can hardly walk down a hall without seeing some piece of equipment that has a power armor part jurry-rigged to keep it functioning. It is possible to restore some of this equipment, but not without pulling parts out of the walls."
ONT_nf_events.6.a:0 "A tough choice"
ONT_nf_events.7.title:0 "Screeching Halt"
ONT_nf_events.7.desc:0 "The fabricators of The Ontario Command Bunker have been on their last legs for quite some time. We have relied on these machines for nearly 200 years to produce everything from food to holotapes, and now we can barely keep them running long enough to produce anything more than our bare essentials. We can't push them much further, but with proper planning, we can produce a little extra."
ONT_nf_events.7.a:0 "We can't just make more fabricator parts?"
ONT_nf_events.8.title:0 "Endless Watch"
ONT_nf_events.8.desc:0 "If there is one thing we did not cut back on in the last 30 years, it was our bunker's defenses. Those that survived the fighting in Toronto knew that if we were discovered, the only thing standing between us and mobs of mutants would be these automated defenses. Our turrets always had their parts replaced and the defense bots were the first to receive maintenance. As we prepare to step outside we have to consider, is it worth keeping these things running?"
ONT_nf_events.8.a:0 "An important decision"
ONT_nf_events.9.title:0 "The Best Are Long Dead"
ONT_nf_events.9.desc:0 "When we first stepped out into the wastes after The Rig was destroyed, our forces were to be feared. Not only did our soldiers have some of the best equipment, but they had the best training. Every one of our soldiers had trained from adolescence in advanced VR pods, fighting hundreds of battles before they ever fired their first shot. The officers spent countless hours studying the great military history of America and even the few non-American leaders that were worth remembering. Almost all of them died in the fighting. With a few exceptions, those that made it back have aged out of fighting service. Their children and grandchildren haven't been following in their footsteps. They've spent their lives learning to hold a wrench, not a rifle. They know how to disassemble pneumatic door lock, but know nothing about infantry fighting tactics. We have a very short amount of time to rectify this before we need to send them out onto the battlefield."
ONT_nf_events.9.a:0 "Can we really prepare them?"
ONT_nf_events.10.title:0 "Crossing t/s, Dotting i's"
ONT_nf_events.10.desc:0 "The last of our soldiers have recently finished training, they have all the weapons we can muster, and our supply stores are about as full as they'll ever be. It is doubtful that what we have will be enough to secure victory. There are a few things we could do, but with time running out, we need to make sure we don't spend too much time making our final preparations."
ONT_nf_events.10.a:0 "Time is running out"
ONT_nf_events.11.title:0 "An Angry Ghost"
ONT_nf_events.11.desc:0 "Few in Ronto are old enough to remember those that used to rule the city, but W.A.S.H.I.N.G.T.O.N does. The Enclave, as they called themselves, were the remnants of the worst things about the Imperialists that conquered this land. Clad in black power armor and sporting deadly energy weapons, they thought themselves invincible. We proved them wrong and drove them out. We were certain they had all died out in the cold.\n\n We were wrong. \n\n Reports are mounting about attacks from the east. Soldiers in the same black armor, sporting the same deadly weapons, with the same aims to enslave us."
ONT_nf_events.11.a:0 "§RWe will not let them§!"
ONT_nf_events.12.title:0 "Flipping The Switch"
ONT_nf_events.12.desc:0 "After fighting through countless mutants, hundreds of robots, and scores of automated turrets, we finally made our way down to the control pannel of W.A.S.H.I.N.G.T.O.N. De-activating the machine wasn't as simple as pulling a plug or pressing a few buttons, but we finally managed to do it. With the de-activation of his machines, Toronto is largely under our control. Scattered pockets of resistance are quickly crumbling and we have managed to strip resources from the bunker housing W.A.S.H.I.N.G.T.O.N to keep our bunker operational while we figure out our next steps."
ONT_nf_events.12.a:0 "Almost can't believe we did it"
ONT_nf_events.13.title:0 "Muties Serving America"
ONT_nf_events.13.desc:0 "In our observations of the mutant, we have learned something important. There are those among them that would happily serve us if it meant they had standing above others of their ilk. Even a little copper badge and a rusted baton is enough to illicit loyalty from these sort. We have begun equipping these sort with lesser weapons and tasking them with policing their kind. Some of them have a real knack for instilling fear in the mutant populace that would put even some of our own officers to shame!"
ONT_nf_events.13.a:0 "Shame they aren't human"
ONT_nf_events.14.title:0 "Contacting Raven Rock"
ONT_nf_events.14.desc:0 "We have finally been able to re-establish contact with Raven Rock. The base was surprised to hear from us, all but giving us up for dead after years of unanswered calls. [EEN.GetLeader] has assured us that while they have their own problems to deal with, they are more than happy to provide support as soon as they can."
ONT_nf_events.14.a:0 "At least we are not alone"
ONT_nf_events.15.title:0 "Anybody Home?"
ONT_nf_events.15.desc:0 "We have spent weeks attempting to contact Raven Rock across various frequencies. Every attempt to make contact is met with nothing but static, and the men are losing faith that we will make contact. We can only assume the worst. At best, Raven Rock suffered a fate similar to ours and are just biding their time. At worst, we may one day find a bunker full of the dead."
ONT_nf_events.15.a:0 "Are we alone?"
ONT_nf_events.16.title:0 "Vertibirds From The Southwest"
ONT_nf_events.16.desc:0 "In the early hours of the morning our radar picked up nearly two dozen vertibirds flying up from our southwest. Shortly after they made radio contact requesting permission to land. They identified themselves as Enclave members out of Chicago and were interested in meeting with our leadership as well as assessing the state of things in Toronto. The officer leading their mission to make contact, Captain McCanless, explained to us that they'd intercepted our repeated calls to Raven Rock while monitoring channels for survivors from their defeat in The Capital Wastleand. The Captain further explained that The Secretary Of The Interior has assumed command of the remaining Enclave forces, which includes us. The Captain has taken it upon himself to have his men survey the Toronto ruins as well as our command center, and informs us that once his inspection has concluded he will be reporting to The Secretary. After his report, we should expect support and new orders."
ONT_nf_events.16.a:0 "Support sounds good"
ONT_nf_events.17.title:0 "Vertibirds From The South"
ONT_nf_events.17.desc:0 "In the early hours of the morning our radar picked up nearly a dozen vertibirds flying up from our south. Shortly after they made radio contact requesting permission to land. They identified themselves as Enclave members out of DC and were interested in meeting with our leadership. They were led by a Captain named O'Reiley who told us they were likely the only surviving members of The Enclave out of DC. They said Raven Rock was overrun by mutants and those who got out regrouped, but were quickly found at their new base as well. The Captain also informed us that about half of their number went West to make contact with a base in Chicago, but never returned for the rest of them. They had nearly went West themselves when they picked up our attempts at contacting Raven Rock. Without a relay to signal back, all they could do was load up what few vertibirds they had left and fly north. The Captain and his band of survivors are ready to serve."
ONT_nf_events.17.a:0 "Welcome aboard men"
ONT_nf_events.18.title:0 "Ontario Offers Congratulations"
ONT_nf_events.18.desc:0 "Major Hurley, commander of The Ontario Enclave has sent his congratulations to [EEN.GetLeader] for subduing the mutants of The Capital Wasteland. The Major has reported they have recently achieved such things in their neck of the woods and invited [EEN.GetLeader] to visit once things have settled down in our respective territories."
ONT_nf_events.18.a:0 "Good to see they know who's in charge."
ONT_nf_events.19.title:0 "Report On Ontario"
ONT_nf_events.19.desc:0 "We have received a report back from Captain McCanless about the situation in Ontario. He reports the signals we picked up on Raven Rock's frequencies were in-fact from an Enclave outpost in Canada. The report included a detail of the soldiers occupying the region as well as the resources on hand. Per The Captain, The Ontario Enclave as they call themselves are desperate for men and equipment, but sitting on a mountain of resources in the Toronto ruins. With minimal investment, we should be able to exert control over the territory."
ONT_nf_events.19.a:0 "McCanless may have earned a promotion in this"
ONT_nf_events.20.title:0 "A Strange Deal"
ONT_nf_events.20.desc:0 "The time has come to ship off the mutants we gathered to BMMAU in return for some of his 'cured' robobrains to suppliment our forces. The question still remains just how many we want to ship to that machine."
ONT_nf_events.20.a:0 "We changed our mind. Send none"
ONT_nf_events.20.b:0 "Send 250 mutants"
ONT_nf_events.20.c:0 "Send 500 mutants"
ONT_nf_events.20.d:0 "Send 750 mutants"
ONT_nf_events.21.title:0 "Our Mission"
ONT_nf_events.21.desc:0 "We have received new orders from DC. [EEN.GetLeader] has personally ordered Major Hurley to lead The Ontario Encalve in securing the remainder of Canada for The United States Government. Along with these ordres came a few vertibirds of men, equipment, and a promotion for our Major."
ONT_nf_events.21.a:0 "We have work to do General"
ONT_nf_events.22.title:0 "Our Mission"
ONT_nf_events.22.desc:0 "We have received new orders from Chicago. [TCE.GetLeader] has personally ordered Major Hurley to lead The Ontario Encalve in securing the remainder of Eastern Canada for The United States Government. Along with these ordres came a few vertibirds of men, equipment, and a promotion for our Major. We have been informed that Chicago has some plans underway out in Western Canada, however we're expected to secure that region as well should that operation not pan out."
ONT_nf_events.22.a:0 "We have work to do General"
ONT_nf_events.23.title:0 "Our Mission"
ONT_nf_events.23.desc:0 "We are essentially on our own. There may be small pockets of Enclave out there, but they are little better off than we are. That makes no difference in our goal. We will do what we set out to do 30 years ago and unify Canada. Once we have Canada under our control, we will retake this great nation. It won't be easy, but it will be done. If not in our lifetime, or our children's lifetime, or even our grandchildren's, but humanity will win."
ONT_nf_events.23.a:0 "Yes we will"
ONT_nf_events.24.title:0 "Windsor's Forges"
ONT_nf_events.24.desc:0 "The automotive plants of Windsor and the surrounding area are relatively well kept compared to many factories we've seen in the wasteland. It's no wonder the wreckers as they called themselves were able to maintain their cars so well. With a little work, we could retool these factories to pump out weapons, robots, or even vertibirds. The engineers have pointed out we'd do well to specialize this region in a certain type of production rather than try to do a little bit of everything."
ONT_nf_events.24.a:0 "Prioritize robotics"
ONT_nf_events.24.b:0 "Focus on weapons"
ONT_nf_events.24.c:0 "Produce aircraft parts"
ONT_nf_events.24.d:0 "Ignore the eggheads"
ONT_nf_events.25.title:0 "A Hell Of A Show"
ONT_nf_events.25.desc:0 "The last of The Hosers were gathered in the old hockey stadium in Toronto to put on a show, and what a show it was. We don't know if it was the promise of freedom for the victors, or just the natural savagery of the mutant, but those ice skating madmen tore each other to shreds for the amusement of our troops. At the end of the day long tournament, the victors were freed from their cursed existance by way of plasmafire. Following the amusing diversion one thing remains clear. \n\n Those mutants had no idea how the hell hockey was played."
ONT_nf_events.25.a:0 "Still fun to watch"
ONT_nf_events.26.title:0 "News From Alaska"
ONT_nf_events.26.desc:0 "The men sent up to explore Alaska returned with about the kind of news we should've expected. Like the rest of the northern wastes it is frozen over but still full of mutants. There was little of note and what had made up the oil reserves there have long since been used up or destroyed by the mutants. It was not a complete exercise in futility however, as the scouts came across a sealed depot and returned with plenty of spoils."
ONT_nf_events.26.a:0 "Better than expected"
ONT_nf_events.27.title:0 "The Race For Canada"
ONT_nf_events.27.desc:0 "In a turn of events we never expected when we stepped out of our bunker just a few years back, we are in a situation where we are not the only Enclave presence in Canada. A group of mutants descended from US service members, acting as some type of pawn for The Secretary has taken control of a large swath of territory in Canada. Despite our objections to letting mutants run what is rightfully American soil, [EEN.GetLeader] has agreed to allow this to continue. He is insisting we find a way to work with this [COM.GetTag]. It has also been decided, against our objections, that a policy of 'whoever conquers first, gets it' in terms of territory in Canada."
ONT_nf_events.27.a:0 "We must get moving then"
ONT_nf_events.28.title:0 "Trickling In"
ONT_nf_events.28.desc:0 "Weeks ago we sent out a signal on all Enclave frequencies. This signal told all who were listening where America still lived. Those who survived in DC, Chicago, or wherever else have been wandering in over those few weeks. They are not many, and many of them nearly had the fight beaten out of them, but they made it. Now, these men have regained their purpose. They are ready to fight. They are ready for revenge."
ONT_nf_events.28.a:0 "They will have it"
ONT_nf_events.29.title:0 "VanBuren Responds"
ONT_nf_events.29.desc:0 "We have received word out of VanBuren Air Force Base that, at least in Florida, there are still some true Americans left standing. They are a long ways away, and like us dealing with plenty of problems of their own. As such, they are unable to send us anything more than their research and hope that we will be able to help each other more."
ONT_nf_events.29.a:0 "At least they're alive"
ONT_nf_events.30.title:0 "MacArthur Responds"
ONT_nf_events.30.desc:0 "We have received word out of MacArtur in Montana, which used to be a Chicago outpost. They were evasive to say the least and did not seem to have much interaction with us. It is uncertain what has transpired out that way, but maybe one day we will find out."
ONT_nf_events.30.a:0 "Very strange"
ONT_nf_events.31.title:0 "Another Canadaclave?"
ONT_nf_events.31.desc:0 "We have received word out of Western Canada from a group calling themselves The Enclave Military Administration. The tale they told was a strange one of mutants descended from US soldiers falling in line with Chicago, then losing Chicago's appointed puppet, with a long period of martial law following. If what they're saying is true, we have some friends not too far away."
ONT_nf_events.31.a:0 "That certainly wasn't expected"
ONT_nf_events.32.title:0 "Too Little Time"
ONT_nf_events.32.desc:0 "Upon debriefing the survivors from DC we have learned about a few different research outposts that may hold valuable data. Everything from advanced power armor blueprints to the secrets of controlling deathclaws is out there in databanks just waiting to be secured. It is likely many of these outposts are on the verge of being found by mutants. Our officers are divided between focusing on securing one of the research outposts, or dividing our focus and risking getting nothing."
ONT_nf_events.32.a:0 "Secure the deathclaw lab"
ONT_nf_events.32.b:0 "Secure the hellfire blueprints"
ONT_nf_events.32.c:0 "Secure the eyebot blueprints"
ONT_nf_events.32.d:0 "Secure the Tesla PA blueprints"
ONT_nf_events.32.e:0 "All or nothing!"
ONT_nf_events.33.title:0 "Increasing Demands"
ONT_nf_events.33.desc:0 "The requests from Chicago are becoming more extreme and sounding less like requests. Trading salvage for equipment was a no-brainer, and why wouldn't we want our scientists to make use of Chicago's labs? But these new quotas they're sending us are too much. If we try to fill these there will barely be enough researchers or resources to meet our needs. The obvious solution would be to decline the request, but it doesn't seem like they'll accept that answer."
ONT_nf_events.33.a:0 "We will meet their quotas"
ONT_nf_events.33.b:0 "We just need to negotiate"
ONT_nf_events.34.title:0 "Increasing Demands"
ONT_nf_events.34.desc:0 "The requests from Chicago are becoming more extreme and sounding less like requests. We are happy to help our fellow Americans, but this is a bit too much. If we try to fill these there will barely be enough researchers or resources to meet our needs. The obvious solution would be to decline the request, but it doesn't seem like they'll accept that answer."
ONT_nf_events.34.a:0 "We will meet their quotas"
ONT_nf_events.34.b:0 "We just need to negotiate"
ONT_nf_events.34.c:0 "Remind them we never needed their help"
ONT_nf_events.35.title:0 "The Race For Canada"
ONT_nf_events.35.desc:0 "In a turn of events we never expected when we stepped out of our bunker just a few years back, we are in a situation where we are not the only Enclave presence in Canada. A group of mutants descended from US service members, acting as some type of pawn for The Secretary has taken control of a large swath of territory in Canada. Despite our objections to letting mutants run what is rightfully American soil, we must follow Chicago's directive. Chicago is insisting we find a way to work with this [COM.GetTag]. It has also been decided, against our objections, that a policy of 'whoever conquers first, gets it' in terms of territory in Canada."
ONT_nf_events.35.a:0 "We must get moving then"
ONT_nf_events.36.title:0 "A Strange Situation"
ONT_nf_events.36.desc:0 "In a turn of events we never expected when we stepped out of our bunker just a few years back, we are not the only Enclave presence in Canada. A group of mutants descended from US service members, acting as some type of pawn for the now destroyed Chicago Enclave, has taken control of a large swath of territory in Canada. Despite their claims of serving The Enclave, they are mutants and should meet the same fate as those in Toronto."
ONT_nf_events.36.a:0 "Maybe Galliger can be an Overseer."
ONT_nf_events.37.title:0 "Vanishing Ghosts"
ONT_nf_events.37.desc:0 "Almost as quickly as the ghosts of America emerged to haunt us once again, they vanished. Every single outpost on our front is reporting not seeing a single Enclave soldier in almost two weeks. Attempts to track where they went have found nothing but a few scattered bodies in the snow. It looks like we have won, unless they are once again hiding and biding their time."
ONT_nf_events.37.a:0 "Remain vigilant"

