### Ideas ###
ONT_winter_training_idea:0 "Winter Training"
ONT_winter_training_idea_desc:0 "Our soldiers have been trained to navigate and survive the frozen wasteland of Canada."
ONT_bunker_luxury_idea:0 "Luxurious Bunker Homes"
ONT_bunker_luxury_idea_desc:0 "The quarters our people enjoy in the restored command bunker would make even the nicest vaults look like hovels. Who wouldn't want to fight to defend a home this nice?"
ONT_last_enclave_idea:0 "Last Light In The Darkness"
ONT_last_enclave_idea_desc:0 "The horrors of the wastes have overran our fellow Americans in Chicago and DC. Outside of a few scattered outposts, we are all that's left. Knowing that the fate of humanity rests on our shoulders keeps our people focused on the cause."
ONT_ontario_industry_idea:0 "Ontario's Industrial Might"
ONT_ontario_industry_idea_desc:0 "The few working factories in Ontario have been restored to working order. Mutant slaves toil away in these facilities producing the weapons that will serve humanity."
ONT_windsor_auto_idea:0 "Windsor Auto Plants"
ONT_windsor_auto_idea_desc:0 "The automotive plants of Windsor and the surrounding cities have been staffed with mutant slaves to produce vehicles for our military."
ONT_canadian_trade_idea:0 "Canadian Trade"
ONT_canadian_trade_idea_desc:0 "Trade between [COM.GetTag] and [ONT.GetTag] has produced benefits for both nations."
ONT_trading_to_chicago_idea:0 "Supplying Chicago"
ONT_trading_to_chicago_idea_desc:0 "Chicago has requesitioned resources to supply their war with mutants in The Midwest. It isn't completely onesided though. They provide us with leftover equipment which we can easily convert to suitable weaponry."
ONT_trade_with_ronto_idea:0 "Ontario Supply"
ONT_trade_with_ronto_idea_desc:0 "Ontario is supplying us with resources for our war effort. In exchange, we give them our scraps and captured mutie pipe rifles. Very generous of us."
ONT_shipped_researchers_idea:0 "Staffing Chicago's Labs"
ONT_shipped_researchers_idea_desc:0 "The few of our number more interested in science than fighting the mutants in the field are sent to Chicago to aid their research."
ONT_windsor_robot_idea:0 "Windsor Robot Plants"
ONT_windsor_robot_idea_desc:0 "The Windsor factories have been retooled to produce robot parts, improving our production capacity."
ONT_windsor_weapons_idea:0 "Windsor Arms Plants"
ONT_windsor_weapons_idea_desc:0 "The Windsor factories have been retooled to produce weapons, improving our production capacity."
ONT_windsor_aircraft_idea:0 "Windsor Aircraft Plants"
ONT_windsor_aircraft_idea_desc:0 "The Windsor factories have been retooled to produce aircraft parts, improving our production capacity."
ONT_windsor_industry_idea:0 "Windsor Diversified Plants"
ONT_windsor_industry_idea_desc:0 "The Windsor factories have been retooled to produce everything from weapons to aircraft parts, improving our production capacity."
ONT_battered_remnants_idea:0 "Battered Remnants"
ONT_battered_remnants_idea_desc:0 "The best of us died 30 years ago in the Toronto ruins. We that remain are old, tired, and worried. The next generation doesn't know what awaits them outside these bunker doors, but we will need to face them anyway."
ONT_failing_bunker_idea:0 "Failing Bunker"
ONT_failing_bunker_idea_desc:0 "The Ontario Command Bunker is falling apart around us. It is not a matter of if we will need to leave, but when. Should the bunker fail, we will need to flee the region and hope we can find somewhere more hospitable."
ONT_production_fucked_idea:0 "Nonexistent Industry"
ONT_production_fucked_idea_desc:0 "Without our bunker fabricators, producing necessary equipment is next to impossible."
ONT_mutie_slave_industry_idea:0 "Mutant Slave Industry"
ONT_mutie_slave_industry_idea_desc:0 "Equipped with bomb collars and policed by overseers, we are able to fill entire factories with mutant workers."
ONT_wasteland_overseers_1_idea:0 "Wasteland Overseers"
ONT_wasteland_overseers_1_idea_desc:0 "Extra compliant mutants are put to the task of keeping their ilk in line. Their reward is a little extra food and a feeling of superiority."
ONT_wasteland_overseers_2_idea:0 "Wasteland Overseers"
ONT_wasteland_overseers_2_idea_desc:0 "Extra compliant mutants are put to the task of keeping their ilk in line. Their reward is a little extra food and a feeling of superiority."
ONT_bunker_industry_idea:0 "Bunker Inudstry"
ONT_bunker_industry_idea_desc:0 "Our bunker fabricators are being repaired with parts scavenged from the wasteland."
ONT_bunker_fabrication_idea:0 "Bunker Fabrication"
ONT_bunker_fabrication_idea_desc:0 "Our bunker fabricators are restored enough to not just produce equipment from scavenged resources, but also produce some of the resources themselves."
ONT_mutie_liberation_idea:0 "Mutant Liberation"
ONT_mutie_liberation_idea_desc:0 "Against our wishes, mutants are no longer to be enslaved unless they commit a crime. Now we have to think of crimes to charge them with."
ONT_wasteland_police_idea:0 "Wasteland Police"
ONT_wasteland_police_idea_desc:0 "Our Overseers are now acting as police forces in their mutant communities. We can no longer just pay them with food, but they keep our factories filled with mutants they arrest."
ONT_canadian_slaves_idea:0 "The Canadian Mutant"
ONT_canadian_slaves_idea_desc:0 "Per the Commander in Chief, no American citizen may be enslaved by the state unless they commit a crime. However, these mutants are Canadian."
ONT_targeted_industry_idea:0 "Recovering Industry"
ONT_targeted_industry_idea_desc:0 "Toronto had very little in terms of industry following the war. What little there was did not survive The Enclave's assault. Over 30 years later, Ronto is still recovering."
ONT_targeted_power_idea:0 "Recovering Power Plants"
ONT_targeted_power_idea_desc:0 "Toronto had very little in terms of functioning power plants following the war. What few there were did not survive The Enclave's assault. Over 30 years later, Ronto is still recovering."
ONT_targeted_pop_idea:0 "Recovering Populations"
ONT_targeted_pop_idea_desc:0 "Toronto had very little in terms of population following the war. Thousands were killed when The Enclave attacked. Over 30 years later, Ronto is still recovering."
ONT_studied_defenses_idea:0 "Studied Defenses"
ONT_studied_defenses_idea_desc:0 "In the buildup of our attack, we studied the defenses of the mutants occupying Toronto."
ONT_stockpiled_meds_idea:0 "Stockpiled Meds"
ONT_stockpiled_meds_idea_desc:0 "In the buildup of our attack, we stockpiled medicine to save the lives of our wounded."
ONT_supply_lines_idea:0 "Supply Lines Prepared"
ONT_supply_lines_idea_desc:0 "In the buildup of our attack, we built up our supply lines."
ONT_enclave_propaganda_target_idea:0 "Enclave Propaganda"
ONT_enclave_propaganda_target_idea_desc:0 "The Enclave has taken over our airwaves and is dropping leaflets to drain the will to fight from our people!"
ONT_winterized_power_armor_idea:0 "Winterized Power Armor"
ONT_winterized_power_armor_idea_desc:0 "Using schematics from The Ontario Command Bunker, we have developed a coating for power armor that minimizes heat loss in cold enviroments."
ONT_washington_occupation_idea:0 "W.A.S.H.I.N.G.T.O.N. Insights"
ONT_washington_occupation_idea_desc:0 "The occupation of pre-war Canada was not very different from our occupation of the wasteland. As such, we can learn a thing or two from W.A.S.H.I.N.G.T.O.N. about how to keep these mutants in line."

###Laws###
ONT_overseers_law:0 "Overseer Program"
ONT_overseers_law_desc:0 "Many mutants are happy to serve us in policing their kind. It is amazing the amount of loyalty a tin badge and some extra rations can invoke."

### Rule Overrides ###
ONT_override_desc:0 "We will be able to send soldiers to help our friends in Western Canada"

