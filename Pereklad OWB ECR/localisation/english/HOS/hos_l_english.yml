###Characters###
HOS_the_shore_name:0 "The Shore"
HOS_Shore_desc:0 "The Shore is the only child of Marker, the leader who realised W.A.S.H.I.N.G.T.O.N. was a phony and would lead the players to an early grave fighting for some long dead ideal. Now the Shore and the rest of the Hosers pursue what they truly love, the feeling of the ice under your feet and the team at your back. Of course, you can't play forever, but if you simply steal food from whomever you can you don't have to waste time growing it yourself."
HOS_bulldog_nick_name:0 "Bulldog Nick"
HOS_bulldog_desc:0 "Bulldog Nick is the Shore's greatest ally and proponent, and acts as the lead enforcer, both for his team and the Hosers at large. But while Bulldog Nick might not be the sharpest tool in the shed, he sometimes wonders if the Shore is leading them down the wrong path. Was W.A.S.H.I.N.G.T.O.N. right? Do they need to focus on removing tyrants? Bulldog Nick trusts that smarter minds than his will figure this all out, and for now he's content to simply play the sport."
HOS_jim_1_name:0 "Jim"
HOS_jim_2_name:0 "Jim"
HOS_jim_3_name:0 "Jim"
HOS_jacques_name:0 "Captain Jacques"
HOS_hitchcock_name:0 "Captain Hitchcock"
HOS_yank_name:0 "Captain Yank"
HOS_goody_name:0 "Captain Goodie"

