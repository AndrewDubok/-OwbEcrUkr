### Events ###
HOS_nf_events.1.title:0 "The Greatest Game"
HOS_nf_events.1.desc:0 " In the years following The Great War, a lot was lost and forgotten. But even atomic fire couldn't erase the great game of Hockey. An extreme test of skill where athletes skated around at high speeds using knives attached to their boots. They would smack their opponents with their sticks and try to score goals. How were goals scored exactly? By using the sticks to smach a landmine or 'puck' as it was called at a guy wrapped up in a net called the goalie. The Hosers carry on this tradition along with other gangs in Eastern Canada. The Hosers are considered the second best team around. The real secret to The Hosers' success is one thing."
HOS_nf_events.1.a:0 "Their rigorous training"
HOS_nf_events.1.b:0 "Their deep bench"
HOS_nf_events.1.c:0 "Their team cohesion"
HOS_nf_events.1.d:0 "Their hatred of losing"
HOS_nf_events.2.title:0 "Leaving Ronto"
HOS_nf_events.2.desc:0 "The only team that could beat The Hosers was also the only team they could never beat, The Ronto W.A.S.H.I.N.G.T.O.N.S. Afer losing 20 games in a row, and scores of their number, The Hosers began to suspect the enemy was cheating. Things quickly turned to a brawl and the bots guarding Ronto moved in. The team had to get out of town quick and were only able to grab a few things."
HOS_nf_events.2.a:0 "Grabbed everyone they could"
HOS_nf_events.2.b:0 "Snatched boxes of guns"
HOS_nf_events.2.c:0 "Caps were the priority"
HOS_nf_events.2.d:0 "Extra skates & pads"
HOS_nf_events.3.title:0 "No Stadium, But It'll Do"
HOS_nf_events.3.desc:0 "South of Ronto is some territory barely patrolled by W.A.S.H.I.N.G.T.O.N.'s bots. The ruins are home to various lesser gangs and scavenger cliques, easy pickings for The Hosers. If we are to rebuild the team, we will need a place bigger than our old base. Where should we set up?"
HOS_nf_events.3.a:0 "An old factory"
HOS_nf_events.3.b:0 "A Scavenger's marketplace"
HOS_nf_events.3.c:0 "A barely functioning power plant"
HOS_nf_events.3.d:0 "A slaver den"
HOS_nf_events.4.title:0 "We're So Fucking Bad"
HOS_nf_events.4.desc:0 "For years, The Hosers were undefeated. No petty gangs, scavengers, or pissed off settlers could push onto their turf. The Hosers couldn't stop winning, then W.A.S.H.I.N.G.T.O.N. came along and they lost. For as much as The Hosers loved winning, they hated losing. Many Hosers wondered on their retreat if they'd ever win again. Upon reaching their new home, The Shore made a promise."
HOS_nf_events.4.a:0 "The Hosers will never lose again"
HOS_nf_events.5.title:0 "Open Tryouts"
HOS_nf_events.5.desc:0 "The Hosers' bench is much emptier after the recent losses against W.A.S.H.I.N.G.T.O.N. If we're going to set up a rematch, we will need to fill the roster. Who will we recruit?"
HOS_nf_events.5.a:0 "Local thugs"
HOS_nf_events.5.b:0 "Local scavengers"
HOS_nf_events.5.c:0 "Ronto Refugees"
HOS_nf_events.5.d:0 "Anyone we can find"
HOS_nf_events.6.title:0 "Stepping Off The Ice"
HOS_nf_events.6.desc:0 "If there's one thing The Shore learned from the Ronto fight, it's that he can't be everywhere at once. To lead The Hosers into the future, The Shore will have to hang up his skates and lead from off the ice."
HOS_nf_events.6.a:0 "We'll need a new captain"
HOS_nf_events.7.title:0 "Long Walk Through Fire"
HOS_nf_events.7.desc:0 "For nearly 200 years, The Windsor Wreckers drove their cards cross the bridge into Michigan. Despite the people on the other side knowing they were coming, the speed of the Wrecker's vehicles allowed them to pull off successful raids. Without the cars though? The Wreckers got their shit wrecked. Not a single one of those raiders marching down the bridge made it withhin 100ft of the barricades at the end of the bridge. It was really one-sided, but a blowout is still fun to watch sometimes."
HOS_nf_events.7.a:0 "Ok, back to raiding"

###Ideas###
HOS_dfence_idea:0 "D-Fence"
HOS_dfence_idea_desc:0 "Our guys will make sure the enemy never gets far into our side of the rink."
HOS_set_the_tone_idea:0 "Setting The tone"
HOS_set_the_tone_idea_desc:0 "We head out quick and hit them hard. Set the tone of the fight and keep the momentum going."
HOS_yank_tactics_idea:0 "Yank Tactics"
HOS_yank_tactics_idea_desc:0 "The yanks know a thing or two about keeping things going deep into the enemy's turf."
HOS_get_focused_idea:0 "Getting Focused"
HOS_get_focused_idea_desc:0 "Goody is making sure the boys are ready to go. No distractions, no bullshit, no skipping leg day."
HOS_wheel_snipe_celly_idea:0 "Wheel, Snipe, Celly"
HOS_wheel_snipe_celly_idea_desc:0 "Between our skates and our cars, we hit the enemy before they know what hit them."
HOS_skate_boost_idea:0 "Fastest Skates Around"
HOS_skate_boost_idea_desc:0 "The Windsor factories have been changed to make skates instead of cars. With these factories can make them fast, and make them go faster."
HOS_punching_through_idea:0 "Punching Through"
HOS_punching_through_idea_desc:0 "If fighting W.A.S.H.I.N.G.T.O.N taught us one thing, it's the best way to kill a robot"
HOS_ready_for_ravens_idea:0 "Ready For The Ravens"
HOS_ready_for_ravens_idea_desc:0 "Fighting The Ontario Enclaves has taught us enough that we should be ready should their sister-team The DC Raven Rocks ever come up to our league."
HOS_home_ice_idea:0 "Home Ice Advantage"
HOS_home_ice_idea_desc:0 "If you can't win on your home ice, you can't win anywhere."
HOS_training_idea:0 "Training Focused"
HOS_training_idea_desc:0 "The foundation of our gang is strict training of our team members."
HOS_numbers_idea:0 "A Deep Bench"
HOS_numbers_idea_desc:0 "The foundation of our gang is numbers. When one guy bites it, another hits the ice."
HOS_teamwork_idea:0 "Teamwork Makes The Dream Work"
HOS_teamwork_idea_desc:0 "The foundation of our gang is loyalty to each other. We share the struggle and the spoils."
HOS_hating_loss_idea:0 "We Hate To Lose"
HOS_hating_loss_idea_desc:0 "The foundation of our gang is not a love of winning, but a hatred of losing. It drives us to always win whatever the cost."
HOS_thugs_idea:0 "Thug Rookies"
HOS_thugs_idea_desc:0 "Local thugs make up the bulk of our new recruits."
HOS_scavs_idea:0 "Scav Rookies"
HOS_scavs_idea_desc:0 "Local scavengers make up the bulk of our new recruits."
HOS_refugees_idea:0 "Refugee Rookies"
HOS_refugees_idea_desc:0 "Refugees from across Ontario make up the bulk of our new recruits."
HOS_everyone_idea:0 "Plentiful Rookies"
HOS_everyone_idea_desc:0 "We accept anyone who wishes to join up. Those that can't make the cut still eat bullets meant for our star players."

