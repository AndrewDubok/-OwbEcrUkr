  bln_start_water_distribution_tt:0 "A §YDecision Category§! will be unlocked allowing us to send water caravans into the wasteland. We can improve their chances of success by dedicating more resources, and once we've completed the focus §YStable Flow§! successful missions will allow us to core these states."

  bln_friendly_distribution_tt:0 "Successful caravan missions will give us §YManpower§! and boost §gWastelander§! influence."
  bln_pragmatic_distribution_tt:0 "Successful caravan missions will give us §YCaps§!."
  bln_isolationist_distribution_tt:0 "Successful caravan missions will give us small amounts of §YHigh-Tech Equipment§! and boost §BLoyalist§! influence."

  bln_weaken_bandit_attacks_merc_tt:0 "This will weaken the bandit attacks on our water caravans.\n\n§OHowever, mercenaries are always looking for a payday and are unlikely to permanently remove the bandits§!"
  bln_weaken_bandit_attacks_tt:0 "This will weaken the bandit attacks on our water caravans.\n\n§gWhile our Knights aren't as well-trained to protect caravans in the wastes, they're more likely to root out the bandits permanently§!"

  bln_distribution_hubs_tt:0 "We will be able to use other locations as a distribution hub for Project Purity. Each location will have advantages and disadvantages. By forming alliances with Rivet City and the DC Settlements (or conquering their states) we can unlock some of their settlements as hubs too."


  bln_switch_hubs_project_purity_tt:0 "Different distribution hubs will have different effects and bonuses.\n\nMoving water to the hubs brings a risk of attack. While these convoys are larger and safer, we can still suffer casualties. Risk of attack on this route is §GNone§!.\n\nFurther effects from distributing water from here are:\n§RNone§!"
  bln_switch_hubs_rivet_city_tt:0 "Different distribution hubs will have different effects and bonuses.\n\nMoving water to the hubs brings a risk of attack. While these convoys are larger and safer, we can still suffer casualties. Risk of attack on this route is §YLow§!.\n\nFurther effects from distributing water from here are:\n§GRivet City will contribute security forces to protect the caravans, lessening our manpower and equipment needs§!"
  bln_switch_hubs_citadel_tt:0 "Different distribution hubs will have different effects and bonuses.\n\nMoving water to the hubs brings a risk of attack. While these convoys are larger and safer, we can still suffer casualties. Risk of attack on this route is §YLow§!.\n\nFurther effects from distributing water from here are:\n§GOur scribe network can be more centralised, reducing our bureaucratic needs§!"
  bln_switch_hubs_canterbury_commons_tt:0 "Different distribution hubs will have different effects and bonuses.\n\nMoving water to the hubs brings a risk of attack. While these convoys are larger and safer, we can still suffer casualties. Risk of attack on this route is §RHigh§!.\n\nFurther effects from distributing water from here are:\n§GOur caravans will travel with Canterbury Commons' caravans, giving us caps and basic equipment for each successful caravan§!"
  bln_switch_hubs_megaton_tt:0 "Different distribution hubs will have different effects and bonuses.\n\nMoving water to the hubs brings a risk of attack. While these convoys are larger and safer, we can still suffer casualties. Risk of attack on this route is §OMedium§!.\n\nFurther effects from distributing water from here are:\n§GMegaton scavvers will give us small amounts of resources§!"

  bln_ten_successful_deliveries_tt:0 "We need to successfully deliver water here §Yten§! times (currently [?FROM.bln_state_successful_deliveries])"

  bln_one_project_at_a_time_tt:0 "We can only pursue one water distribution project at a time"
  bln_rivet_city_pipeline_tt:0 "Building the §CRivet City Pipeline§! will remove the §Odanger§! of moving water to §CRivet City§!, and give §CRivet City§! the buff permanently (and §Gcore§! it if we own it)."
  bln_build_bottling_machine_tt:0 "Building a §Gwater bottling machine§! will unlock the two higher levels of §Ypreparation§!."
  bln_need_bottle_press_tt:0 "We've built a bottling machine"
