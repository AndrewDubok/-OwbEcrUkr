  BLN_mutant_category:0 "Супермутанти"
  GNR_search_for_mutant_home:0 "Шукати лігво супермутантів!"
  GNR_search_for_mutant_home_desc:0 "Ми відправимо патруль лицарів обшукати Столичну Пустку вздовж і впоперек у пошуках лігва супермутантів. Можливо, ми не знайшли його за 20 років боротьби з ними, але в нас не так багато інших варіантів."

  bln_water_distribution_decision_cat:0 "Мережа розподілу води"
  bln_hire_mercenary_protection_decision:0 "Найняти найманців для охорони"
  bln_hire_mercenary_protection_decision_desc:0 "Це не ідеально, але для захисту наших караванів ми, можливо, мусимо звернутися до сторонньої допомоги."
  bln_send_knights_to_deal_with_bandits_decision:0 "Надіслати лицарів розібратися з бандитами"
  bln_send_knights_to_deal_with_bandits_decision_desc:0 "Немає нікого кращого за лицаря Братства, щоб винищити рейдерів, які полюють на наші каравани."
