l_english:
   bln_loyalist_influence_check:0 "Вплив лоялістів із Лост-Хіллз становить §Y[?BLN_loyalist_influence]%§!"
  bln_loyalist_influence_check_desc:0 "Чим вищий вплив лоялістів із Лост-Хіллз, тим руйнівнішими будуть наслідки, якщо вони вирішать відокремитися. У міру того, як до наших лав приєднуватимуться нові мешканці пусток, справа лоялістів приваблюватиме більше послідовників, і їхній вплив зростатиме."

  BLN_the_citadel_category:0 "Цитадель"
  bln_clear_sublevel_one:0 "Очистити перший підрівень"
  bln_clear_sublevel_two:0 "Очистити другий підрівень"

