  BLN_enclave_took_purity_category:0 "Криза на проєкті «Чистота»"
  BLN_enclave_took_purity_category_desc:0 "Доктор Лі щойно повідомила старійшині Лайонсу, що Анклав захопив контроль над проєктом «Чистота» та працює над його запуском. Незрозуміло, що вони мають намір робити з очищувачем, але якщо судити з їхніх старих планів, для людей пустки це не віщує нічого доброго. Ми повинні діяти, поки вони не встигли закріпитися!"
  BLN_enclave_securing_purity_decision:0 "Анклав закріплюється на проєкті «Чистота»"
  BLN_enclave_securing_purity_decision_desc:0 "Щодня ми спостерігаємо, як вертольоти прилітають та відлітають від очищувача на іншому березі річки. Патрулі, що підходять надто близько, обстрілюють, і не зрозуміло, що саме там робить Анклав. Але якщо ми не почнемо діяти найближчим часом, вони надто сильно закопаються, і їх буде важко викурити."
  BLN_expeditions_category:0 "Експедиції на Східному Узбережжі"
  BLN_expeditions_category_desc:0 "Вздовж Східного Узбережжя є місця, що становлять великий інтерес для Відділення Лайонса. Старі дослідницькі лабораторії, покинуті бункери та багато іншого розкидано по цій стороні країни. Можливо, деякі з них давно розграбовані, але пошук того, що залишилося, є частиною нашої місії."
  BLN_boston_expedition_decision:0 "Експедиція до Співдружності"
  BLN_boston_expedition_decision_desc:0 "Ходять чутки, що на півночі, в районі довоєнного Бостона, існує таємнича група під назвою Інститут, яка володіє технологіями, що можуть зрівнятися навіть з обладнанням Анклаву. Можливо, це просто стара караванна байка, але навіть якщо так, цей регіон має великий потенціал. До війни він був осередком технологічних компаній, а місцеві військові бази слугували полігонами для важливих довоєнних військових технологій."
  BLN_pitt_expedition_decision:0 "Експедиція до Пітта"
  BLN_pitt_expedition_decision_desc:0 "Наша перша експедиція до Пітта загалом вважалася успішною, але, судячи з того небагато, що надходить з того району, за останні десятиліття там багато що змінилося. Якщо чутки правдиві, один із наших братів, якого ми вважали загиблим під час лиха, вижив і тепер вважає себе королем людей Пітта. Кажуть, він організовує армію та розбудовує промисловість, використовуючи робочі довоєнні патронні преси."
  BLN_appalachia_expedition_decision:0 "Експедиція до Аппалачів"
  BLN_appalachia_expedition_decision_desc:0 "Понад 150 років тому до Аппалачів було відправлено експедиційний загін, щоб перевірити стан віддаленого відділення, яке за роки до того перестало виходити на зв'язок. Записи того часу, м'яко кажучи, ненадійні, а під час нашого походу на схід цей регіон був осторонь. Можливо, тепер ми зможемо дізнатися, що сталося з нашими братами."
  BLN_ronto_expedition_decision:0 "Експедиція до Ронто"
  BLN_ronto_expedition_decision_desc:0 "Довоєнне Торонто було місцем дислокації великого контингенту окупаційних військ США та кількох не надто етичних лабораторій. Інформацію про післявоєнне Ронто зібрати важче, але дехто каже, що місцеві жителі відбили напад загону солдатів... у чорній силовій броні?"
  BLN_new_york_expedition_decision:0 "Експедиція до Нью-Йорка"
  BLN_new_york_expedition_decision_desc:0 "Довоєнний Нью-Йорк був одним із найбільших міст країни. Кілька передових компаній мали там лабораторії та офіси, а через продовольчі бунти там була значна військова присутність. Безсумнівно, він постраждав так само сильно, як і Вашингтон, але все ж варто оцінити це на власні очі."
  BLN_rocky_expedition_decision:0 "Експедиція до Крімзон"
  BLN_rocky_expedition_decision_desc:0 "Оповіді із західних земель розповідають про фанатичний культ у горах, який має доступ до передових технологій вогнеметів. Чи може бути, що вони сидять на схованці з цінним обладнанням?"
  BLN_magnets_expedition_decision:0 "Експедиція до Руйнівників Броні"
  BLN_magnets_expedition_decision_desc:0 "Як випливає з зловісної назви цього місця, ми чули оповіді про сили в цьому районі, які мають зброю, здатну знищувати силову броню. Нам потрібно буде відправити групу наших найкращих розвідників з нестандартним спорядженням, щоб оцінити це. Ми не можемо допустити, щоб рейдери зі зброєю, яка розриває Т-45, сиділи так близько до нас."
  BLN_midwest_expedition_decision:0 "Експедиція на Середній Захід"
  BLN_midwest_expedition_decision_desc:0 "Під час нашого походу до Вашингтона ми проходили через американський Середній Захід. Нам довелося подорожувати налегці, тому ми не робили багато зупинок для пошуку технологій або навіть для розслідування чуток про зниклу експедицію Братства. З вирішенням наших найбільш нагальних проблем, можливо, настав час поглянути ще раз."
  BLN_prydwen_decision_category:0 "«Придвен»"
  BLN_prydwen_decision_category_desc:0 "Ймовірно, найамбітніший проєкт в історії Братства. Будівництво величезного дирижабля такого масштабу дозволить нам проєктувати нашу міць вздовж усього Східного Узбережжя та за його межами. Це забере роки, а також безпрецедентну кількість робочої сили та ресурсів, але це буде набагато краще, ніж ходити скрізь пішки."
  BLN_prydwen_design_decision:0 "Проєктування «Придвена»"
  BLN_prydwen_design_decision_desc:0 "Проєктування дирижабля такого масштабу є гігантським завданням. Десятки писарів відволікаються від своїх повсякденних справ, щоб зробити внесок своїми знаннями та дослідженнями, переконуючись, що ця штука буде придатна до польоту, перш ніж ми почнемо її будувати."
  BLN_prydwen_resources_decision:0 "Компоненти для «Придвена»"
  BLN_prydwen_resources_decision_desc:0 "Після завершення завдання з проєктування цього монстра починається справжня робота. Наші писарі підрахували, що для його будівництва нам знадобляться тисячі тонн металобрухту, електронних компонентів і спеціальних сплавів. Навіть якщо ми демонтуємо всю авіабазу Адамс, нам все одно не вистачить."
  BLN_prydwen_build_decision:0 "Будівництво «Придвена»"
  BLN_prydwen_build_decision_desc:0 "Маючи на місці всі необхідні деталі, тепер ми повинні зібрати цю кляту штуку. Будівельний проєкт такого масштабу, ймовірно, не здійснювався з часів Великої війни, але з часом ми побачимо, як ця штука злетить."

