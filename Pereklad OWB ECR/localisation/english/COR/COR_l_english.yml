###Focuses### 
COR_nf_a001:0 "Rocky's Chosen"
COR_nf_a001_desc:0 "The tale of our people begins with a chosen few who took shelter in the holy caverns."
COR_nf_a002:0 "Rocky's Foe"
COR_nf_a002_desc:0 "Our ancestors were not the only to survive the horrors of The Great War, and they faced the ire of the heathens."
COR_nf_a003:0 "Rocky's New Home"
COR_nf_a003_desc:0 "The heathens cast our ancestors from the holy caverns, and so a new home had to be found."
COR_nf_a004:0 "Rocky's New Prophet"
COR_nf_a004_desc:0 "With the passing of the prior saint, a new one promises a better future for our people."
COR_nf_a005:0 "Rocky's Warriors"
COR_nf_a005_desc:0 "Rockys two mightiest champions differ in interpreting his will."
COR_nf_a006:0 "Building Strength"
COR_nf_a006_desc:0 "If we are to reclaim our holy land, we will need to build our strength."
COR_nf_a007:0 "Filling Workshops"
COR_nf_a007_desc:0 "Heathen slaves will produce the tools of our glorious conquests."
COR_nf_a008:0 "Finding Scrappers"
COR_nf_a008_desc:0 "Heathens will haul the wreckage of the old world to be reforged by us."
COR_nf_a009:0 "Walls of Stone"
COR_nf_a009_desc:0 "The mighty walls surrounding our home will stand as a symbol of our resolve."
COR_nf_a010:0 "Pennance Battalions"
COR_nf_a010_desc:0 "Heathens may make up for their failings by serving Rocky's will."
COR_nf_a011:0 "Pious Armies"
COR_nf_a011_desc:0 "Only those that hold Rocky in their heart are worthy to fight in his name."
COR_nf_a012:0 "Rocky's Might"
COR_nf_a012_desc:0 "Our fighters stand more ready than ever to enforce Rocky's will. Heathens will tremble at the sound of our approach."
COR_nf_a013:0 "Cracking Foundations"
COR_nf_a013_desc:0 "The dogmatic schism between Abigail and Arnold must be settled by Saint Pebble."
COR_nf_a014:0 "Arnold's Rage"
COR_nf_a014_desc:0 "Saint Pebble has lost his way, and it is up to Arnold to lead The Rockyists into a new future."
COR_nf_a015:0 "Call The Faithful"
COR_nf_a015_desc:0 "Those that know Abigail and Pebble for the heretics they are will take up arms for our just cause!"
COR_nf_a016:0 "Fate of Heretics"
COR_nf_a016_desc:0 "There can be only one fate for those that turn away from Rocky's light."
COR_nf_a017:0 "Cooler Heads"
COR_nf_a017_desc:0 "The solution to this difference is not for Rockyists to kill each other, but for an understanding to be reached."
COR_nf_a018:0 "Heretical Oversight"
COR_nf_a018_desc:0 "Only those well versed in The Bibble and cloaked in Rocky's light can be trusted to read heretical documents."
COR_nf_a019:0 "Closing The Rift"
COR_nf_a019_desc:0 "The rift between our mightiest warriors has been mended. The path forward will be walked by all of Rocky's faithful, together."
COR_nf_a020:0 "Abigail's Fury"
COR_nf_a020_desc:0 "Saint Pebble has proven himself a fool that would lead The Church to ruin. He and Arnold must be stopped."
COR_nf_a021:0 "Converted Legions"
COR_nf_a021_desc:0 "Those we have converted know what their fate will be under Arnold, and they will fight to prevent it."
COR_nf_a022:0 "Cast Into The Fires Of Faith"
COR_nf_a022_desc:0 "Arnold sought to stop progress, and leave The Church in a dark age. All traces of his flawed ideas must be burned away."
COR_nf_a023:0 "One Will"
COR_nf_a023_desc:0 "The followers of Rocky are all united in spirit and goal. The heathens of the world will embrace Rocky's light, or face their fate."
COR_nf_b001:0 "Arnold's Might"
COR_nf_b001_desc:0 "Arnold has felled countless heathens by his hand. He is an example for every young warrior to follow, and his training methods create the best."
COR_nf_b002:0 "The Crunch"
COR_nf_b002_desc:0 "One may think themself a warrior, but the crunch shows who really is. Some know nothing of the crunch, and they will be burried in it."
COR_nf_b003:0 "Press On"
COR_nf_b003_desc:0 "One little day-trip around the crunch is not sufficient. True warriors must fully embrace the crunch."
COR_nf_b004:0 "Watch The North"
COR_nf_b004_desc:0 "While the crunch separates the weak from the strong, even the mighty can be felled if pushed too far."
COR_nf_b005:0 "Celebrate Our Glory"
COR_nf_b005_desc:0 "Many mighty warriors have proven themselves in the crunch. Their triumphs will be rewarded."
COR_nf_b006:0 "Improvised Equipment"
COR_nf_b006_desc:0 "In the midst of battle, anything that can be a weapon, must be a weapon. Warriors of Arnold must always remember this and fight with whatever they can."
COR_nf_b007:0 "Holy Whetstones"
COR_nf_b007_desc:0 "A warrior of Arnold must care for their weapon with their life, because it is one of the only things standing between them and death."
COR_nf_b008:0 "Ferocity Of Faith"
COR_nf_b008_desc:0 "A warrior of Arnold must care for little more than the death of heathens."
COR_nf_b009:0 "Bonds Of Stone"
COR_nf_b009_desc:0 "A warrior of Arnold must fight for their fellow Rockyist. Their brothers on the battlefiled are the most important thing after Rocky."
COR_nf_b010:0 "Splitting The Onion"
COR_nf_b010_desc:0 "The heathens of Onionberg refuse to see Rocky's light. Arnold will make them pay."
COR_nf_b011:0 "Onion Plantations"
COR_nf_b011_desc:0 "If the heathen loves their onions more than Rocky, they will work the fields until their bodies break."
COR_nf_b012:0 "Agrarian Wisdom"
COR_nf_b012_desc:0 "The heathen onion lovers know much about embracing Rocky's gifts of the land. Some mercy may be deserved."
COR_nf_b013:0 "Local Rumors"
COR_nf_b013_desc:0 "In the forest to the south of Onionberg, rumors tell of a monster that no man can fell."
COR_nf_b014:0 "The Great Hunt"
COR_nf_b014_desc:0 "Arnold will rally his warriors to search for this beast and slay it."
COR_nf_b015:0 "Woodland Dangers"
COR_nf_b015_desc:0 "The woods of the south prove more harsh than expected."
COR_nf_b016:0 "Arnolds Trophy"
COR_nf_b016_desc:0 "At long last, the creature of the forest has been found."
COR_nf_b017:0 "Finding The Monster"
COR_nf_b017_desc:0 "Rumors say this monster can speak. Perhaps it can learn to love Rocky."
COR_nf_b018:0 "Meeting The Monster"
COR_nf_b018_desc:0 "The monster has been found, now Arnold will speak with it."
COR_nf_b019:0 "Rockys Newest Warrior"
COR_nf_b019_desc:0 "This beast will embrace the light of Rocky, and kill in his name."
COR_nf_b020:0 "Arnold's Conquests"
COR_nf_b020_desc:0 "With the lands of Onionberg under The Church, Saint Pebble will assess Arnold's works."
COR_nf_b021:0 "Abigail's Fire"
COR_nf_b021_desc:0 "Abigail rose to promenance when she led mighty warriors against the torchbearer tribe, flame worshiping savages that lived just across the river from us."
COR_nf_b022:0 "Torchbearer's Fate"
COR_nf_b022_desc:0 "With their villages razed and their people either converted or killed, the last torchbearers cowered in an old world bunker."
COR_nf_b023:0 "Cult Of Flame"
COR_nf_b023_desc:0 "Fire is yet another manifestation of Rocky's will. It is not necessarily heretical to revere it."
COR_nf_b024:0 "Sealed Tomb"
COR_nf_b024_desc:0 "The last of the torchbearer heathens will watch their flames die out as they run out of air."
COR_nf_b025:0 "Spoils Of Battle"
COR_nf_b025_desc:0 "Returning from conquest, Abigail brings unique gifts."
COR_nf_b026:0 "Burn The Keepers"
COR_nf_b026_desc:0 "Those that studied the creation of flame hold it above Rocky, so let them embrace their beloved flame."
COR_nf_b027:0 "Accept The Keepers"
COR_nf_b027_desc:0 "Those that studied the creation of flame can prove useful. They will be made to understand it is a manifestation of Rocky's will, not a divine force in itself."
COR_nf_b028:0 "Convert Tribals"
COR_nf_b028_desc:0 "The tribals that lived in fear of The Torchbearers will accept Rocky as their savior."
COR_nf_b029:0 "Enslave Tribals"
COR_nf_b029_desc:0 "The tribals that lived in fear of The Torchbearers will accept Rocky as their master."
COR_nf_b030:0 "Invisible Forces"
COR_nf_b030_desc:0 "To our south there are madmen that worship invisible forces that are not Rocky! We will show them Rocky's will overpowers all!"
COR_nf_b031:0 "Abigail's Mercy"
COR_nf_b031_desc:0 "Abigail's softer approach to conversion has let to less conflict with newly conquered heathens, but is a happy heathen really a good thing?"
COR_nf_b032:0 "Cleansing Flames"
COR_nf_b032_desc:0 "Only one thing awaits a heathen that resists conversion, Rocky's wrath."
COR_nf_b033:0 "Mighty Tools"
COR_nf_b033_desc:0 "The weapons of the heathens of Lorentz Force killed many of our faithful with deadly precision. Now they are ours."
COR_nf_b034:0 "Rocky's Forces"
COR_nf_b034_desc:0 "The scholars of Loretz Force will be made to understand that this force they speak of is just another manifestation of Rocky's will."
COR_nf_b035:0 "Gentle Conversion"
COR_nf_b035_desc:0 "This magnetic force these people seem to revere is little more than another creation of Rocky. They just need to be made to understand that, and they will be faithful."
COR_nf_b036:0 "Rocky's Instrument"
COR_nf_b036_desc:0 "With the help of Lorentz's scholars, we will one day replicate their mighty weapons and put them into service for Rocky."
COR_nf_b037:0 "Destroy Heresy"
COR_nf_b037_desc:0 "No matter what this magnetic force is, it is not greater than Rocky. Burn the heathens who refuse to accept this."
COR_nf_b038:0 "Seize Heretical Relics"
COR_nf_b038_desc:0 "These 'gauss rifles' are tools of heathens. We will turn them against the unholy."
COR_nf_b039:0 "Enslave Researchers"
COR_nf_b039_desc:0 "The scholars of Loretz seem inclined to take the secrets of their gauss weaponry to their graves. That does not stop us from forcing them onto other projects."
COR_nf_b040:0 "Abigail's Conquests"
COR_nf_b040_desc:0 "As Abigail returns from conquests in The West, Saint Pebble assesses her success."
COR_nf_c001:0 "The Crusade Continues"
COR_nf_c001_desc:0 "Our armies stand ready, our squabbles are settled. Just a few more steps before we return to the holy Rocky Caverns."
COR_nf_c002:0 "Arnold's Teachings"
COR_nf_c002_desc:0 "Arnold is more than just a warrior. He is a priest that has plans for The Church."
COR_nf_c003:0 "Draft The Devoted"
COR_nf_c003_desc:0 "All of Rocky's devoted sons and daughters should be willing to fight for Rocky's glory. Those that volunteer will be called."
COR_nf_c004:0 "Pillage The Heathens"
COR_nf_c004_desc:0 "Heathens can not be trusted with weapons and do not deserve wealth. We will take both from them."
COR_nf_c005:0 "Forced Conversions"
COR_nf_c005_desc:0 "Those that refuse to convert must be forced to convert, through whatever means necessary."
COR_nf_c006:0 "Distant Crusades"
COR_nf_c006_desc:0 "Warriors itching to bring Rocky's light to the far reaches of the wasteland will be allowed to venture into foreign lands in glorious crusades."
COR_nf_c007:0 "Crush The Cult"
COR_nf_c007_desc:0 "Yet another sad cult worshiping a manifestation of Rocky's will. We will enlighten these lost souls through force."
COR_nf_c008:0 "Grant Them Fission"
COR_nf_c008_desc:0 "Even beaten and bloody, some of The Cult of Cobalt resist."
COR_nf_c009:0 "Grant Them Fusion"
COR_nf_c009_desc:0 "There are some of Cobalt who are open to our words, now that they've seen the might of Rocky's will."
COR_nf_c010:0 "Into The Hills"
COR_nf_c010_desc:0 "One of the last barriers between us and Green Mountain is a range of hills occupied by a group of heathens. Not for long."
COR_nf_c011:0 "The Ageless Hills"
COR_nf_c011_desc:0 "The head ranger is a symbol to his people that must be destroyed for them to revere Rocky."
COR_nf_c012:0 "Honor The Hills"
COR_nf_c012_desc:0 "The head ranger is a symbol to his people that could be swayed for them to revere Rocky"
COR_nf_c013:0 "Final Preparations"
COR_nf_c013_desc:0 "The path to Rocky Caverns is clear. Our greatest foe stands between us and our home. We will make our final preparations before finishing this."
COR_nf_c014:0 "For The Holy Land"
COR_nf_c014_desc:0 "The heathens of Green Mountain drove us from our home, and now we have returned ready to drive them into the ground."
COR_nf_c015:0 "A Crusade Won"
COR_nf_c015_desc:0 "One last push is required to drive the heathens of Green Mountain from our land."
COR_nf_c016:0 "Abigail's Reforms"
COR_nf_c016_desc:0 "While some think the church is fine the way it is, Abigail has some ideas to bring our faith into the 2200s"
COR_nf_c017:0 "Incentivize Recruitment"
COR_nf_c017_desc:0 "Many heathens are inherently selfish. Appealing to that nature with rewards for conversion could open them up for Rocky's light to enter their heart."
COR_nf_c018:0 "Tithes In Arms"
COR_nf_c018_desc:0 "Those unwilling to fight for Rocky do not need their weapons while protected by the faithful. We will have them turn over their tools of war to those that would use them right."
COR_nf_c019:0 "Merciful Conversions"
COR_nf_c019_desc:0 "Some heathens may take longer than others to accept Rocky's light. What matters is that in the end they do. If they never will, that's another matter."
COR_nf_c020:0 "Mission Trips"
COR_nf_c020_desc:0 "Many of the faithful wish to venture out and spread the light of Rocky far and wide. Even if we are not ready to conquer these heathen lands, they can establish missions to spread the word."
COR_nf_c021:0 "Repurpose Foundries"
COR_nf_c021_desc:0 "The manufacturies of Green Mountain will be repurposed for the holy war machine."
COR_nf_c022:0 "The Cutting Edge"
COR_nf_c022_desc:0 "Arnold believes the true weapon of a warrior is the blade, hammer, or pickaxe, not a gun."
COR_nf_c023:0 "The Smoking Barrels"
COR_nf_c023_desc:0 "Abigial argues that the efficacy of a weapon is more important than any symbolic meaning."
COR_nf_c024:0 "Finest Tools"
COR_nf_c024_desc:0 "The first batches of holy impliments of war have arrived from the foundries."
COR_nf_c025:0 "Blessed Rifles"
COR_nf_c025_desc:0 "Rifles blessed by priests are ready to enter the hands of our forces."
COR_nf_c026:0 "Settle The Hills"
COR_nf_c026_desc:0 "The hills around Rocky Caverns are our rightful home. We will invite some of our most pious to settle these lands."
COR_nf_c027:0 "Expanding Mines"
COR_nf_c027_desc:0 "The mines in these hills can yield resources invaluable to the holy war, they just need a little more development."
COR_nf_c028:0 "Expanding Irrigation"
COR_nf_c028_desc:0 "With the right effort, we can move the paths of rivers down these holy mountains to better serve the faithful."
COR_nf_c029:0 "Caves For Factories"
COR_nf_c029_desc:0 "Many caves in these hills will be large enough to house workshops."
COR_nf_c030:0 "Caves For Defense"
COR_nf_c030_desc:0 "Many caves in these hills could be converted into shelters to ensure we are never pushed off this land again."
COR_nf_c031:0 "Return To Rocky Caverns"
COR_nf_c031_desc:0 "It would seem not all those we thought died in the great migration did. Some of our lost brothers remained at Rocky Caverns."
COR_nf_c032:0 "Center For Our Worship"
COR_nf_c032_desc:0 "Such a holy site should serve as a permanent place of worship and pilgrimage."
COR_nf_c033:0 "Center For Our Wrath"
COR_nf_c033_desc:0 "Such a holy site should serve as the heart of our holy war against those that reject Rocky's light."
COR_nf_c034:0 "Pass The Collection Plate"
COR_nf_c034_desc:0 "Pilgrims to Rocky Caverns will be encouraged to give what they can to the church."
COR_nf_c035:0 "Holy Training Grounds"
COR_nf_c035_desc:0 "The warriors training in Rocky Caverns are continually reminded of the importance of our cause. There is no slacking off here."
COR_nf_c036:0 "Fate Of The Heathens"
COR_nf_c036_desc:0 "We just need a little more effort to collect the last of the surviving heathens in the lands around Rocky Caverns."
COR_nf_c037:0 "Slaughtered To The Last"
COR_nf_c037_desc:0 "For the crimes of their ancestors, and fighting against our return, these heathens will be put to death."
COR_nf_c038:0 "One Last Chance"
COR_nf_c038_desc:0 "Those of Green Mountain that survived will be given the chance to embrace Rocky, or perish."
COR_nf_c039:0 "Reward The Worthy"
COR_nf_c039_desc:0 "With the heathens of Green Mountain removed, we can relocate more of our faithful to the holy land."
COR_nf_c040:0 "Reward The Useful"
COR_nf_c040_desc:0 "Some of those from Green Mountain that embraced Rocky's light are proving valuable instruments of his will."
COR_nf_c041:0 "All Roads"
COR_nf_c041_desc:0 "All roads of our territory will lead to one place eventually, Rocky Caverns."
COR_nf_c042:0 "Passage For Traders"
COR_nf_c042_desc:0 "Traders from heathen lands are seeking safe passage into our lands. We will allow them to sell their wares, but keep a close eye on them."
COR_nf_c043:0 "Shun The Unworthy"
COR_nf_c043_desc:0 "We will not allow heathen traders to enter our lands without first embracing Rocky."
COR_nf_c044:0 "Consequences Of Commerce"
COR_nf_c044_desc:0 "Our people have become increasingly materialistic as a result of these traders, but there are some benefits as well."
COR_nf_c045:0 "Self-Sufficient"
COR_nf_c045_desc:0 "Without the corrupting influence of heathen traders, our people prosper."
COR_nf_c046:0 "Sun Shines On Rockzantium"
COR_nf_c046_desc:0 "The heathens are dealt with, the lands settled with the faithful and the fires of industry roar on with glorious purpose. The sun is shining over our glorious capital, and this is just the beginning."
COR_nf_d001:0 "The Eagle's Claws"
COR_nf_d001_desc:0 "Black armored soldiers from the east have attacked us! Every drop of Rockyist blood spilled will be repaid 10 times!"
COR_nf_d002:0 "Autumn's Last Stand"
COR_nf_d002_desc:0 "Colonel Autumn led his Enclave to their demise, but fought to the end."
COR_nf_d003:0 "Eden's Dark Secret"
COR_nf_d003_desc:0 "The heathens of The Enclave were more devious than we thought, or were they?"
COR_nf_d004:0 "The Lyon's Fangs"
COR_nf_d004_desc:0 "Steel armored soldiers form the east have attacked us! Every drop of Rockyist blood spilled will be repaid 10 times!"
COR_nf_d005:0 "Slaying Lyons"
COR_nf_d005_desc:0 "We have entered the den of these heathens, and found weapons to fuel the crusade."
COR_nf_d006:0 "Capital Heathens"
COR_nf_d006_desc:0 "Not far from our borders is a desolate wasteland begging for Rocky's embrace. Let us not leave them waiting much longer."
COR_nf_d007:0 "Mercy At Megaton"
COR_nf_d007_desc:0 "Megaton was the site of a heathen faith not too different from The Cult of Cobalt. We have decided to show them the error of their ways peacefully."
COR_nf_d008:0 "Massacre At Megaton"
COR_nf_d008_desc:0 "Megaton was the site of a heathen faith not too different from The Cult of Cobalt. We have decided to show them the error of their ways."
COR_nf_d009:0 "Lamplight Shrine"
COR_nf_d009_desc:0 "A place known as Lamplight Caverns is rumored to be much like our holy Rocky Caverns."
COR_nf_d010:0 "Devil's Bane"
COR_nf_d010_desc:0 "One band of warriors managed to not just slay our enemies in The Enclave, but learn to use their advanced armor from captured books."
COR_nf_d011:0 "Seize Project Purity"
COR_nf_d011_desc:0 "This Brotherhood of Steel had in their hands a massive water purifier they were using to exert control over the wasteland. Now it will bend the wastes to Rocky's will."
COR_nf_d012:0 "Lyon Tamers"
COR_nf_d012_desc:0 "One band of warriors managed not just ot slay our enemies in The Brotherhood, but learn to use their advanced armor from captured books."
COR_nf_d013:0 "Rock The Boat"
COR_nf_d013_desc:0 "One of the strongest heathen strongholds in this region, Rivet City even holds a church to some false faith. We must make an example of them."
COR_nf_d014:0 "Hoards Of The Fallen"
COR_nf_d014_desc:0 "Many mighty armies met their end in The Capital Wasteland. Caches of their weapons litter the landscape, and are now ours."
COR_nf_d015:0 "Looting The Labs"
COR_nf_d015_desc:0 "Rivet City and The Citadel had valuable tools that we can relocate to our own labs."
COR_nf_d016:0 "The Endless Crusade"
COR_nf_d016_desc:0 "We are far from done. Our warriors will continue to fight, our priest continue to proselytize, and our borders will continue to expand. Eventually, all will know Rocky's love."

###Ideas###
cor_the_bibble:0 "The Bibble"
cor_the_bibble_desc:0 "The Bibble, the holy book of The Church of Rocky, is a driving force behind every decision made by a member of this religious sect. While this leads to a stable society, it also makes adapting to change more difficult."
cor_convert_or_die:0 "Convert or Die"
cor_convert_or_die_desc:0 "The Church of Rockys expansion is not driven by desire for land or resources, but out of a need to spread the word of their god. Prisoners and people in conquered lands are given the simple choice to step into Rocky's light or die. While some will happily choose the former, there are plenty that resist having to make that choice at all."
COR_penance_battalions_idea:0 "Penance Battalions"
COR_penance_battalions_idea_desc:0 "Those who shuned Rocky's light or have fallen from his grace may find salvation in service of his will. The only other option for them is execution."
COR_pious_armies_idea:0 "Pious Armies"
COR_pious_armies_idea_desc:0 "Only those who hold Rocky in their heart are deserving of fighting in his name on this grand crusade."
COR_rockys_mighty_idea:0 "The Might of Rockys Chosen"
COR_rockys_mighty_idea_desc:0 "We have built up our strength over many years. Our the fires of industry supply our mighty armies in their holy work as our numbers continue to grow."
COR_arnolds_leadership_idea:0 "Arnold's Leadership"
COR_arnolds_leadership_idea_desc:0 "The Church's leadership has embraced the ideology of Arnold. The impact of this harsher understanding of The Bibble is already spreading throughout our lands."
COR_pebbles_leadership_idea:0 "Saint Pebble's Leadership"
COR_pebbles_leadership_idea_desc:0 "Despite the recent grumblings and concerns, Saint Pebble is still the one to guide us."
COR_heretical_oversight_idea:0 "Heretical Oversight Board"
COR_heretical_oversight_idea_desc:0 "Seasoned priests and scholars pour over any new documents recovered from heathens and heretics to see if these flawed ideas can be reconciled with our faith."
COR_abigails_leadership_idea:0 "Abigail's Leadership"
COR_abigials_leadership_idea_desc:0 "The Church's leadership has embraced the ideology of Abigail. The impact of this softer understanding of The Bibble is already spreading throughout our lands."
COR_one_will_idea:0 "One Will"
COR_one_will_idea_desc:0 "With the doctrinal debate in our church settled, we can refocus ourselves on our return to the holy land and spreading the word of Rocky."
COR_improvised_equipment_idea:0 "Improvised Weapons"
COR_improvised_equipment_idea_desc:0 "The warriors of Rocky learn to fight with whatever they can get their hands on. Pipes, lawnmower blades, or even a plasma rifle, all can be used to enforce Rocky's will."
COR_maintained_equipment_idea:0 "Maintained Weapons"
COR_maintained_equipment_idea_desc:0 "A soldier is better served learning to be experts in a handfull of weapons and making sure they keep those weapons in good condition. Then they can more efficiently enforce Rocky's will."
COR_furious_warriors_idea:0 "Furious Warriors"
COR_furious_warriors_idea_desc:0 "The warriors of Rocky strive for nothing more than the eradication of heathens. They fight onward with furious devotion and a heart as hard as stone."
COR_warrior_brotherhood_idea:0 "Warrior Brotherhood"
COR_warrior_brotherhood_idea_desc:0 "The warriors of Rocky know that on the battlefield they must depend on each other. These warriors form close bonds and fight more effectively."
COR_loz_researchers_idea:0 "Lorentz Researchers"
COR_loz_researchers_idea_desc:0 "Despite being heathens, these researchers know much about forces that are clearly quantifiable manifestations of Rocky's will. It would be foolish to not let them tell us more."
COR_foreign_crusades_idea:0 "Far Off Crusades"
COR_foreign_crusades_idea_desc:0 "Warriors and officers showing great promise have the opportunity to launch their own limited crusades in distant lands. Not all who go return, but those that do return with glory and wisdom."
COR_incentivized_conversion_idea:0 "Incentivized Conversion"
COR_incentivized_conversion_idea_desc:0 "We will exploit the greed of the heretic to break down the barriers around their hearts, so that they may let Rocky's light in."
COR_mission_trips_idea:0 "Mission Trips"
COR_mission_trips_idea_desc:0 "Some priests and warriors will be selected to embark on mission trips beyond our borders. There they will ingratiate themselves with the locals and spread the word of Rocky. Those they convert will be called back to the homeland where they belong."
COR_melee_focus_idea:0 "Melee Weapon Focus"
COR_melee_focus_idea_desc:0 "The same hammer that may break a mighty stone can do untold damage to a heathen skull."
COR_gun_focus_idea:0 "Ballistic Weapon Focus"
COR_gun_focus_idea_desc:0 "Charging blindly at heathens with guns weilding little more than a hammer is something only someone dumber than a molerat would embrace."
COR_rocky_caverns_cathedral_idea:0 "Rocky Caverns Cathedral"
COR_rocky_caverns_cathedral_idea_desc:0 "The holy Rocky Caverns have been transformed into a center of worship and pilgrimage."
COR_rocky_caverns_crusader_base_idea:0 "Rocky Caverns Crusader Citadel"
COR_rocky_caverns_crusader_base_idea_desc:0 "The holy Rocky Caverns have been transformed into the heart of our military might. From here we plan our crusade across the globe."
COR_rocky_caverns_cathedral_2_idea:0 "Rocky Caverns Cathedral"
COR_rocky_caverns_cathedral_2_idea_desc:0 "The holy Rocky Caverns have been transformed into a center of worship and pilgrimage."
COR_rocky_caverns_crusader_base_2_idea:0 "Rocky Caverns Crusader Citadel"
COR_rocky_caverns_crusader_base_2_idea_desc:0 "The holy Rocky Caverns have been transformed into the heart of our military might. From here we plan our crusade across the globe."
COR_growing_materialism_idea:0 "Growing Materialism"
COR_growing_materialism_idea_desc:0 "Allowing outside traders into our land has its share of good and bad effects"
COR_self_sufficient_idea:0 "Self-Sufficient People"
COR_self_sufficient_idea_desc:0 "We do not need the corrupting influence of outside traders. We have all we need."
COR_endless_crusade_idea:0 "The Endless Crusade"
COR_endless_crusade_idea_desc:0 "Our crusade is one without end. Though we have finally returned to our holyland, and driven out the largets threats on this side of America, we are not done. Our task will not be over until we have brought Rocky's light to every corner of the globe. Rockus Vult."
COR_enclave_war_idea:0 "United Against The Enclave"
COR_enclave_war_idea_desc:0 "This last gasp of a dead world thinks they are strong enough to steamroll our people, our faith. What they don't understand is that no matter what advanced weapons or armor they have, it pales in comparison to the might of our lord Rocky!"
COR_enclave_war_ai_idea:0 "Nah, We'll Win"
COR_enclave_war_ai_idea_desc:0 "On paper your Enclave is a stronger army, they have all the assets and resources that we don't. But let us get to The Crunch, heathen, and see if that factors in. I guarantee you it won't."
COR_brotherhood_war_idea:0 "Rock Beats Steel"
COR_brotherhood_war_idea_desc:0 "These cultists think they can defeat Rocky's chosen. Do they not know that we have wiped out countless cults to get to where we are today? Their tech worship will be just another heathen faith to be forgotten."
COR_brotherhood_war_ai_idea:0 "Rock Beats Steel"
COR_brotherhood_war_ai_idea_desc:0 "These cultists think they can defeat Rocky's chosen. Do they not know that we have wiped out countless cults to get to where we are today? Their tech worship will be just another heathen faith to be forgotten."
COR_rockys_gift_of_water_ww_idea:0 "Rocky Commandeth Pour Up"
COR_rockys_gift_of_water_ww_idea_desc:0 "Rockalations 21-6. I am the alpha and the omega. The based and the cringe. I will give unto him a slurp of this water. Praise Rocky"
COR_rockys_gift_of_water_idea:0 "Waters Of Life"
COR_rockys_gift_of_water_idea_desc:0 "The lord Rocky saw fit to gift upon us a near limitless supply of clean drinking water. With this water we can prove our divine prominence and more easily open the hearts of others to the light of Rocky."
COR_cleaning_water_idea:0 "Cleaning The Water"
COR_cleaning_water_idea_desc:0 "The heathens of The Enclave poisoned this water purifier. If we are to use it, we will need to spend time to figure out how to remove the poison. Thankfully, we captured some of the heathens that did it."
COR_arnolds_teachings_idea:0 "Arnolds Teachings"
COR_arnolds_teachings_idea_desc:0 "Arnold has imparted more of his wisdom on training up our warriors in the form of a lengthy document. The manual is being distributed across our lands"
COR_abigails_teachings_idea:0 "Abigails Teachings"
COR_abigails_teachings_idea_desc:0 "Abigail has imparted more of her wisdom on converting heathens in the form of a lengthy document. This manual is being distributed to priests across our lands."
COR_studying_heathens_idea:0 "Study Heathen Texts"
COR_studying_heathens_idea_desc:0 "Against our better judgement, we are studying the documents found in heathen settlements. In our attempts to know the heathen to better convert them, we occasionally discover knowledge with scientific applications."
COR_rocky_inquisition_idea:0 "The Rocky Inquisition"
COR_rocky_inquisition_idea_desc:0 "Nobody expects The Rocky Inquisition to knock at their door. But when they do, everything will be brought into Rocky's light. The heathens will be judged right alongside those that aid them."

