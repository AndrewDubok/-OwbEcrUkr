COR_tt_22:0 "It may take longer than some would like, but we will fix these heathens' minds."
COR_tt_23:0 "A network of roads will be constructed throughout our lands, leading to Rocky Caverns."
COR_tt_24:0 "The locals will now think twice before opposing us."

