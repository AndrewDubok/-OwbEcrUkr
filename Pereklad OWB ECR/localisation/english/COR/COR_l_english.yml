l_english:

###Balance of Power###
COR_dogmatic_adherence:0 "Dogmatic Adherence"
COR_no_dogmatic_adherence:0 "Barely Follow The Bibble"
COR_firm_dogmatic_adherence:0 "Live By The Bibble"
COR_dogmatic_adherence_category:0 "Dogmatic Adherence"
COR_almost_no_dogmatic_adherence:0 "The Bibble Is Just A Book"
COR_almost_no_dogmatic_adherence_desc:0 "Our concessions to heathens and heretics has eroded the foundations of our faith. Outsiders may be happy, but the faithful are furious at our current leadership."
COR_very_little_dogmatic_adherence:0 "The Bibble Is Flawed"
COR_very_little_dogmatic_adherence_desc:0 "We continue to make concessions and compromises with those that shun Rocky's light. This can not continue if we are to maintain our faith."
COR_low_dogmatic_adherence:0 "The Bibble Increasingly Questioned"
COR_low_dogmatic_adherence_desc:0 "We have made multiple compromises with heathens and outsiders. While the core tenants of our faith remain firm, some worry we have started down a path that could lead to trouble."
COR_strong_dogmatic_adherence:0 "The Bibble is Law"
COR_strong_dogmatic_adherence_desc:0 "Those in the lands our church control, faithful or not, know that The Bibble is as firm as the strongest stone. Adherance to its teachings and the faith are strictly enforced with only one fate awaiting those that shun Rocky's light."
COR_moderate_dogmatic_adherence:0 "The Bibble is Clear"
COR_moderate_dogmatic_adherence_desc:0 "Whether heathens agree with it or not, Rocky's will is clear. In our lands, that will is enforced and carried out. Those that oppose that will are dealt with accordingly."
COR_reasonable_dogmatic_adherence:0 "The Bibble is Our Guide"
COR_reasonable_dogmatic_adherence_desc:0 "Some literal interpretations of The Bibble do not tell the whole truth of our world. Priests and Scholars must interpret the more metaphorical aspects of the book for our people to understand Rocky's will."
COR_some_dogmatic_adherence:0 "The Bibble Is Imperfect"
COR_some_dogmatic_adherence_desc:0 "The Bibble may be the most imortant document ever created, but that does not mean it is perfect. As we learn more about the world around us, some questions raised about The Bibble can be answered."

###Characters###
COR_saint_pebble_NAME:0 "Saint Pebble"
COR_saint_pebble_desc:0 "Saint Pebble is the latest in a long line of religious leaders who have assumed the title of Saint in The Church of Rocky. In recent years Saint Pebble has led his people in conquests of the small tribes and settlements around them, building strength with plans to return to their lost holy land, Rocky Caverns."
COR_arnold_NAME:0 "Cardinal Arnold"
COR_arnold_desc:0 "Cardinal Arnold is a warrior priest that has led countless assaults on neighboring villages and settlements. An adamant traditionalist, Arnold shuns the ideas of compromise with heathens and wishes to lay to waste any who do not accept Rocky's word."
COR_abigail_NAME:0 "Cardinal Abigail"
COR_abigail_desc:0 "Cardinal Abigail is a warrior priest who rose to prominence after laying waste to a flame worshiping tribe equipped with pre-war flamers. Unlike many around her, she believes some heathen faiths are just innocent misinterpretations of Rocky's world and wishes to try correcting their flawed worldviews, before eliminating those that can't change."
COR_stephen_savage_name:0 "Stephen Savage"
COR_cardinal_goatlord_NAME:0 "The Goatlord"
COR_russo_boxer_name:0 "Russo Boxer"
COR_wyatt_hitch_name:0 "Wyatt Hitch"
COR_calvin_maxwell_name:0 "Calvin Maxwell"
COR_abe_hogan_name:0 "Abe Hogan"
COR_roach_name:0 "Scholar Roach"
COR_schutz_name:0 "Scholar Schutz"
COR_jenkins_name:0 "Trader Jenkins"
COR_pash_name:0 "Pash"
COR_rivers_name:0 "Jason Rivers"
COR_gerald_dawkson_name:0 "Gerald Dawkson"
COR_spida_name:0 "Spida"
COR_kong_name:0 "Old Man Kong"
COR_phelps_name:0 "Inquisitor Phelps"
COR_troy_name:0 "Troy Wasterson"
COR_buck_name:0 "Buck Mariner"
COR_cardinal_praxton_name:0 "Cardinal Praxton"
COR_tone_name:0 "Ferry Captain Ton-E"
COR_potsdam_name:0 "Christopher Potsdam"
COR_head_ranger_name:0 "The Head Ranger"
COR_kate_name:0 "Radiant Kate"

###Cosmetic Tags###
COR_rockzantium_cosmetic_tag:0 "Empire of Rockzantium"
COR_rockzantium_cosmetic_tag_ADJ:0 "Rockzantine"
COR_rockzantium_cosmetic_tag_DEF:0 "The Empire of Rockzantium"

###Decisions###
COR_decision_category:0 "Church Of Rocky Decisions"
COR_decision_category_desc:0 "Spreading the light of Rocky is no easy task. These heathen lands we occupy are hostile to the truth, but we will ensure they accept Rocky into their heart, or perish."
COR_dogmatic_adherence_category:0 "Dogmatic Adherence"
COR_dogmatic_adherence_category_desc:0 "Arnold and Abigail both have their own ideas on how to sway the minds of heathens to our faith. Until this schism is restored, we can expect them both doing their own little studies."
COR_decision_forced_conversion:0 "Mass Forced Conversion"
COR_decision_forced_conversion_desc:0 "Entire heathen settlements will be forced to gather in a central location for a grand ceremony. Heathens will be brought up and made to accept Rocky's truth, should they not, they will make an example for the others."
COR_decision_gentle_conversion:0 "Re-Education Clinic"
COR_decision_gentle_conversion_desc:0 "Heathens have lived their whole lives in the darkness without Rocky's light in their heart. We can not blame them for being slow to accept the truth. So, those more stubborn souls will be brought to centers where they are made to understand Rocky. Should they still resist, then something will have to be done."
COR_decision_raze_heathen_settlement:0 "Raze A Heathen Settlement"
COR_decision_raze_heathen_settlement_desc:0 "There are many settlements that outright refuse to accept the light of Rocky. One of these will be chosen to be razed to the ground, their heathen populace slaughtered. That should remind the others who Rocky favors."
COR_decision_study_heathen_texts:0 "Study Heathen Texts"
COR_decision_study_heathen_texts_desc:0 "Abigail believes some of these heathen documents hold connections to Rocky that the heathens simply didn't interpret correctly. Through careful study of these texts, we may be able to form arguments to convert heathens!"
COR_decision_holy_inquisition:0 "The Rocky Inquisition"
COR_decision_holy_inquisition_desc:0 "Nobody expects The Rocky Inquisition"
COR_decision_negotiate_with_heathens:0 "Negotiate With Heathens"
COR_decision_negotiate_with_heathens_desc:0 "The heathens may be wrong, but they are not unreasonable. Perhaps compromise can be the first step to letting Rocky into their hearts."
    
###Events###
COR_nf_events.1.title:0 "Rocky's Chosen People"
COR_nf_events.1.desc:0 "Many years ago, when fire rained from the skies, our people sought refuge in The Holy Rocky Caverns. Within Rocky's embrace these people were kept safe from the nuclear fire and the sickness that came after for those above ground. Rocky, in his boundless love, had chosen to spare these people the suffering of the end of the world. These people were..."
COR_nf_events.1.a:0 "Rural Townsfolk"
COR_nf_events.1.b:0 "Local Miners On Strike"
COR_nf_events.1.c:0 "Vacationing Families Far From Home"
COR_nf_events.2.title:0 "Our Enemy In The Hills"
COR_nf_events.2.desc:0 "Over the years, these chosen people learned to love Rocky for everything he did for them. After nearly two centuries in Rocky's embrace, our faith was codified in The Bibble. Our people stepped out into the wilds beyond Rocky Caverns, finding a world full of unenlightened heathens. Their attempts at spreading the word were met with mockery or malice, and so Rocky's wrath was visited upon the heathens. But our people were few and the heathens many. They were driven from The Holy Rocky Caverns into the hills to the north. Were it not for one thing, our people would have perished."
COR_nf_events.2.a:0 "Knowing how to make healing powder"
COR_nf_events.2.b:0 "Our desire for retribution"
COR_nf_events.2.c:0 "Knowing Rocky would protect us"
COR_nf_events.2.d:0 "A cache of weapons Rocky delivered us to"
COR_nf_events.3.title:0 "Finding A New Home"
COR_nf_events.3.desc:0 "We lost many in the exodus, including our leader Saint Gravel, but eventually we found a new home away from heathens. There we would regroup and recover. This new home had everything we needed to begin building our strength and eventually start spreading the word of Rocky to the unenlightened of the region. That home was..."
COR_nf_events.3.a:0 "An abandoned mine"
COR_nf_events.3.b:0 "A pre-war factory"
COR_nf_events.3.c:0 "A forgotten bunker"
COR_nf_events.4.title:0 "The Voice Of Rocky"
COR_nf_events.4.desc:0 "Though many worried about the future of our people, and mourned the loss of Saint Gravel in the exodus, there was one man who stepped up to guide us. One of Saint Gravel's most trusted advisors, Philip McDonald. Though he developed a strange mutation from excesive consumption of CatEye, that did not detract from his vision for our people. He promised a return to The Holy Rocky Caverns, and a violent retribution for all heathens that turn away from the light of Rocky. Philip was designated Saint Pebble and led the people with one more promise."
COR_nf_events.4.a:0 "The promise of a river of heathen blood"
COR_nf_events.4.b:0 "The promise of a growing following"
COR_nf_events.4.c:0 "The promise of answers to great questions"
COR_nf_events.5.title:0 "Small Differences Of Opinion"
COR_nf_events.5.desc:0 "At Saint Pebbles side were two great warriors of Rocky. The first was Arnold, a mighty champion who slayed countless threats during the trek north. The second was Abigail, a wise tactician that guided warriors to overcome insurmountable obstacles. These two titans are united in purpose, but differ greatly in method. Arnold has on more than one occasion raised concerns about Abigail's insistence on giving slight leaniency to useful heathens. He argues that giving any concessions to those that follow false faiths will lead to the eventual erosion of our values the same way a river can eat away at a mountain. Saint Pebble has done well to mediate their differences thus-far. But if the rift widens too much, the repercussions could ripple throughout our faith."
COR_nf_events.5.a:0 "Understood"
COR_nf_events.6.title:0 "More Than Just Small Differences Of Opinion"
COR_nf_events.6.desc.1:0 "Following the return of both Arnold and Abigail, along with their respective entourages, the bickering has been almost non-stop. Arnold is furious about the agreements Abigail has made with the heathens in her conquests. He is now calling for her execution as a heretic, and has gathered a great deal of supporters for his cause. Abigail also has a large number of supporters who argue Arnold's outdated views will doom our crusade to failure. It seems like if we take either side in this disagreement, we will have a fight on our hands."
COR_nf_events.6.desc.2:0 "Following the return of both Arnold and Abigail, along with their respective entourages, things have been at a relative calm. It was expected that Arnold and Abigail would fly into their usual bickering over interperitations of The Bibble, but this time they seem to be in agreement. It is clear Abigail's time in the south has changed her, and we can all move forward together."
COR_nf_events.6.a:0 "Saint Pebble stands with Arnold!"
COR_nf_events.6.b:0 "Saint Pebble stands with Abigail!"
COR_nf_events.6.c:0 "We stand with Arnold!"
COR_nf_events.6.d:0 "We stand with Abigail"
COR_nf_events.6.e:0 "The crusade awaits!"
COR_nf_events.7.title:0 "Abigail's End"
COR_nf_events.7.desc.1:0 "After a bloody conflict that threatened to tear our people apart, the heretic Abigail has been brought before a holy tribunal and sentenced to her fate. The heretic that took up arms against her fellow Rockyists in support of heathen cultists will be put to death by stoning. Some have questioned why she is not simply shot or beheaded, but Saint Pebble argued the symbolism of rocks causing the death of a heretic worth the extra effort."
COR_nf_events.7.desc.2:0 ""After a bloody conflict that threatened to tear our people apart, the heretic Abigail has been brought before a holy tribunal and sentenced to her fate. The heretic that took up arms against her fellow Rockyists in support of heathen cultists will be put to death by stoning. By her side was Saint Pebble, the once devout leader of our faith who fell to the temptations of heathesn and turned from Rocky's light. Some have questioned why she is not simply shot or beheaded, but Arnold argued the symbolism of rocks causing the death of heretics worth the extra effort."
COR_nf_events.7.a:0 "Praise Rocky"
COR_nf_events.8.title:0 "Calmed Tempers"
COR_nf_events.8.desc:0 "It took countless hours of discussion, and the input of a dozen Bibble scholars, but an understanding has been reached regarding heathen beliefs. It has been ruled that while Abigail is right that many of these heathen faiths are simply worship of manifestations of Rocky's will, whether it be fire or magnetism, they are still heathen faiths. If they can not be made to understand the flaws in their faith, they are to be put to death, regardless of how Rockyism-adjacent their beliefs are. With this matter out of the way, we can move forward united in faith and purpose."
COR_nf_events.8.a:0 "Praise Rocky"
COR_nf_events.9.title:0 "The Immolation Of Arnold"
COR_nf_events.9.desc.1:0 "Arnold and those like him have held The Church of Rocky back too long. Were it not for their flawed understandings of The Bibble, we would have returned to The Holy Land long ago. For this crime it is not enough that they be put to death, the very traces of their existence must be expunged. Arnold is to to be burned until there is nothing left but ash!"
COR_nf_events.9.desc.2:0 "Saint Pebble and Arnold have both held The Church of Rocky back too long. Were it not for their flawed understandings of The Bibble, we would have returned to The Holy Land long ago. For this crime it is not enough that they be put to death, the very traces of their existence must be expunged. Arnold and Saint Pebble are to be burned until there is nothing left but ash!"
COR_nf_events.9.a:0 "Praise Rocky"
COR_nf_events.10.title:0 "Rocky's Strongest Soldier"
COR_nf_events.10.desc:0 "Arnold stands tall among the warriors of the faith. Having slain untold numbers of heathens and mutated beasts, Arnold was an obvious choice to train the next generation of Rockyist soldiers. His methods may be extreme, including forcing soldiers to pass a trial called 'the crunch' by venturing into the trogg-infested ruins to the north, but the results can not be denied. Those that survive his training regimen come out the other side as shining instruments of Rocky's will, cleaving through any heathen or monstrosity that comes their way."
COR_nf_events.10.a:0 "GET TO THE CHAPPIN"
COR_nf_events.11.title:0 "Successful Daytrip"
COR_nf_events.11.desc:0 "Our latest prospective warriors have returned from their little daytrip around The Crunch. While not all of them made it back alive, that is to be expected. Those that did return, did so with great trophies and stories of glory. They are ready to learn how to be agents of Rocky's will."
COR_nf_events.11.a:0 "Praise Rocky"
COR_nf_events.12.title:0 "Buried In Crunch"
COR_nf_events.12.desc:0 "Our latest prospective warriors have returned from their little daytrip around the crunch. Their numbers are much fewer than expected, with many seeming to have died in the attempt at gaining glory. It seems when it comes to matters of the crunch, these recruits let us down."
COR_nf_events.12.a:0 "Such is The Crunch"
COR_nf_events.13.title:0 "Distant Screams"
COR_nf_events.13.desc:0 "There was a lot more screaming and gunfire than usual in the southern ruins. It looks like those weird cultists to the south went on another trip into the ruins. It isn't clear why they keep sending people into this hole, but it is clear the trogs be eating good tonight."
COR_nf_events.13.a:0 "Weird bastards"
COR_nf_events.14.title:0 "Less Troggs Around"
COR_nf_events.14.desc:0 "The southern ruins have a bit fewer trogs and wildmen than usual. Looks like those weird cultists to the south went on another scavenging run or something. It isn't like there is really that much worth scavving in that area of town, but at least they keep the numbers down."
COR_nf_events.14.a:0 "Weird bastards"
COR_nf_events.15.title:0 "Glory In The Crunch"
COR_nf_events.15.desc:0 "Our prospective warriors have returned once again from The Crunch. With their heads held high, these recruits bring even more trophies and tales of glorious triumphs. These recruits are ready for whatever awaits them in the coming crusade."
COR_nf_events.15.a:0 "Praise Rocky"
COR_nf_events.16.title:0 "Buried In The Crunch"
COR_nf_events.16.desc:0 "Our latest prospective warriors have returned from their little daytrip around the crunch. Their numbers are much fewer than expected, with many seeming to have died in the attempt at gaining glory. It seems when it comes to matters of the crunch, these recruits let us down."
COR_nf_events.16.a:0 "Such is The Crunch"
COR_nf_events.17.title:0 "Distant Screams"
COR_nf_events.17.desc:0 "There was a lot more screaming and gunfire than usual in the southern ruins. It looks like those weird cultists to the south went on another trip into the ruins. It isn't clear why they keep sending people into this hole, but it is clear the trogs be eating good tonight."
COR_nf_events.17.a:0 "Weird bastards"
COR_nf_events.18.title:0 "Wilder Than Wildmen"
COR_nf_events.18.desc:0 "Those crazy bastards to the south just do not know when to quit. They continue to rampage through the southern ruins killing any trogs or wildmen they come across. We still don't know why they keep doing this, but if it keeps up, there won't be a trog left in trogtown."
COR_nf_events.19.title:0 "EMPTY EVENT"
COR_nf_events.19.desc:0 "EMPTY EVENT"
COR_nf_events.19.a:0 "EMPTY EVENT"
COR_nf_events.20.title:0 "Somebody Once Told Me..."
COR_nf_events.20.desc:0 "The heathens of Onionberg tell of a creature that dwells deep in the forests. This mighty but intelligent beast they speak of has been there for decades if not centuries, and takes offerings they leave at the edge of the forest. The offerings are tribute to the beast so that it keeps raiders from their lands. The creature the locals describe is large, green and prefers isolation but supposedly is intelligent enough to speak. Arnold is curious about this beast and aims to see it with his own two eyes. Whether he aims to slay it or speak with it, remains to be seen."
COR_nf_events.20.a:0 "These villagers ain't sharpest tools in the shed"
COR_nf_events.21.title:0 "Picking A Hunting Party"
COR_nf_events.21.desc:0 "Arnold has made up his mind to see this beast slain. He has called out for warriors to join him in his hunt for this beast but has yet to decide just who he will take with him."
COR_nf_events.21.a:0 "Mighty warriors ready to fight"
COR_nf_events.21.b:0 "Late recruits with something to prove"
COR_nf_events.21.c:0 "Enslaved Onionberg heathens that know the woods"
COR_nf_events.22.title:0 "Lost To The Woods"
COR_nf_events.22.desc:0 "The beast of the forest is wiser than we anticipated. It had laid traps that claimed the lives of many sent after it. It has also ambushed many of those who made it past the traps. But we are closing in. It is only a matter of time before the beast is brought down."
COR_nf_events.22.a:0 "Praise Rocky!"
COR_nf_events.23.title:0 "The Wise Giant"
COR_nf_events.23.desc:0 "The beast was apprehensive at first but responded well to the gifts Arnold had sent into the woods along with letters requesting a meeting. In the night the creature posted signs leading to its' dwelling. Arnold was surprised to find the creature was infact a super mutant, though unlike the ones that have occasionally attacked from the east, this one was not hostile. The creature introduced itself as Shrek, a name it pulled from an old book about a reclusive green giant. It explained it came from somewhere far to the south many decades ago and lived mostly off of what it could scavenge or accept form the village. Arnold told Shrek of Rocky's truth and the mutant listened intently. It took well to the lessons of The Bibble and allowed Rocky into its heart. Arnold emerged from the forests with Shrek by his side, as the mutant agreed to join our holy crusade."
COR_nf_events.23.a:0 "Praise Rocky"
COR_nf_events.24.title:0 "Arnold Returns Home"
COR_nf_events.24.desc:0 "Arnold has returned from his conquests to the south-west. With him he brings onions, newly inducted warriors and tales of a green giant lurking in the forests. The lands of Onionberg have been exposed to the light of Rocky, and while many resisted, just as many have allowed Rocky into their hearts."
COR_nf_events.24.a:0 "Praise Rocky"
COR_nf_events.25.title:0 "Rocky's Wisest Warrior"
COR_nf_events.25.desc:0 "Abigail is different than many warriors of our faith. Rather than blindly assault our foes, knowing Rocky will guarantees our success, she studies our foes. She learns of their weaknesses and exploits them, as well as adapting some of their strengths. This method has come under scrutiny of many church traditionalists, including Arnold, but it has allowed the people under her command to achieve many great victories with losses well below estimated numbers. Her most recent triumph over the Torchbearer tribe in 2274, is one suche example."
COR_nf_events.25.a:0 "Praise Rocky"
COR_nf_events.26.title:0 "The Flames Die Out"
COR_nf_events.26.desc:0 "It has been many months since the Torchbaerer tribe was decimated by Rocky's forces, but still some fought on. These holdouts have grown fewer and fewer in number until finally the last of them have been cornered in an old bunker that appears to be where they acquired most of their pre-war flamethrowers. Sending soldiers in there to fight them would be a pointless waste of devout warriors, and Abigail has decided to instead seal the bunker shut with concrete. Seeing the equipment inside the bunker as almost too valuable to waste, she has offered them a chance to surrender. The Torchbearers inside agreed to surrender and fight for Rocky, but only on the condition that they be allowed to revere flame and practice their rites as before. Normally this heretical request would be outright refused, however in recent months Abigail has become convinced that the Torchbearer's reverence of fire is not outright heresy, but misguided reverence of a manifestation of Rocky's will."
COR_nf_events.26.a:0 "It will take time to make a decision"
COR_nf_events.27.title:0 "EMPTY EVENT"
COR_nf_events.27.desc:0 "EMPTY EVENT"
COR_nf_events.27.a:0 "EMPTY EVENT"
COR_nf_events.28.title:0 "Abigail Returns Home"
COR_nf_events.28.desc:0 "Abigail has returned from her conquests to the south-east. With her she brings mighty weapons taken from slain heathens. Some warriors of Rocky may scoff at using such advanced weaponry, preferring instead to use traditional melee weapons, the efficacy of these tools can not be denied. There have also been countless conversions as heathens find the light of Rocky, and our numbers are thus bolstered."
COR_nf_events.28.a:0 "Praise Rocky!"
COR_nf_events.29.title:0 "Eyes Pointed South"
COR_nf_events.29.desc:0 "These conquests against the farmers of Onionberg and eggheads of Lorentz Force were just warmups for the crusade to come. Between us and our goal of Rocky Caverns are other nations in camped in the hills and mountains to our south. Even with their conquest, the crusade is not finished. Once we destroy these tribes we will come face to face with our original foe, the heathens of Green Mountain. Every Rockyist that marched on our exodus north dreams of the day they can exact their revenge on the heathens that drove us from our holy cavern, and the day draws ever nearer."
COR_nf_events.29.a:0 "Watch Out, We're Coming"
COR_nf_events.30.title:0 "EMPTY EVENT"
COR_nf_events.30.desc:0 "EMPTY EVENT"
COR_nf_events.30.a:0 "EMPTY EVENT"
COR_nf_events.31.title:0 "Reduced To Dust"
COR_nf_events.31.desc:0 "The heathens of this cult worship radiation of all things! While many converted to the true faith once they saw they were no match for Rocky's will, there were still some defiant to the end. The cult leadership along with their most devoted followers posted up at a fortified outpost and proved difficult to dislodge without wasting many rockyist lives, so finally it was decided that if they wanted to be with their beloved Atom so bad, we would oblidge them."
COR_nf_events.31.a:0 "Get the Fat Man"
COR_nf_events.32.title:0 "But What IS Atom?"
COR_nf_events.32.desc:0 "Abigail met with Radiant Kate of the Cult of Cobalt and engaged in a lengthy discussion about the nature of their Atom. With the help of several Bibble scholars she was able to explain to the cult leader that atom was not a deity in itself, just one of many manifestations of Rocky's will. Just as flame and magnitism are manifestations, so too was atom. The cult leader could not find a rebuttal to Abigail's argument and conceded that she may be right. With that the former cult leader told her remaining flock the good news of Rocky's Light and aside from a few suicides, most of the cult accepted the truth of Rocky."
COR_nf_events.32.a:0 "Praise Rocky!"
COR_nf_events.33.title:0 "One Last Sunrise"
COR_nf_events.33.desc:0 "The head ranger thought he would at least get a good night's sleep in the cave he and his few remaining followers camped in, but no luck. The stone worshipers came for them just after midnight. The other rangers did what they could to hold them off, but there were just too many. The head ranger knew very quickly that there was no point in still fighting, and gave himself up on the condition that his people be allowed to leave. Of course they resisted, but he did always have a way of talking them around to his point of view. After all, what was the life of one old man compared to all these young rangers? He was paraded out of the cave to the cheering cultists just as the sun began to rise over the hills. As he was forced to his knees he thought how the hills looked so much like they did when he was a boy. Time wouldn't change these mountains, and neither would these cultists. \n \nHe didn't feel the rock that caved in his skull."
COR_nf_events.33.a:0 "PRAISE ROCKY!"
COR_nf_events.34.title:0 "Older Than The Mountains"
COR_nf_events.34.desc:0 "The head ranger was not a fool. He knew a trap when he was walking into one. This meeting with the Rock General, or whatever they were called, was not that. In the many weeks of fighting it was clear that if a rock worshiper wasn't immediately trying to bludgeon or burn you, they probably didn't want to. So, The Head Ranger met with Abigail and they had a discussion about the religion of The Rockyists. Abigail gave assurances that the day to day life of those that did convert would not change much, they revered the mountains just as much as the people of Monongahela, and that their goal was not a conquest for resources but a pathway to Green Mountain. If it meant an end to the bloodshed and that the people under The Head Ranger would mostly be left alone, he was happy for it. Those unruly fellas to the east were getting to be a handfull anyway, so maybe some extra help wouldn't hurt."
COR_nf_events.34.a:0 "Praise Rocky"
COR_nf_events.35.title:0 "A Stone's Throw From Home"
COR_nf_events.35.desc:0 "The path to Green Mountain is clear, the soldiers of Rocky stand ready, and obviously Rocky is on our side. The time to march forward and claim our holy land draws near. With that there is still a little time left before our armies are all in place, which allows us to make some final preparations. What should we focus on?"
COR_nf_events.35.a:0 "Quell the unrest between us and the capital"
COR_nf_events.35.b:0 "Quickly raise more soldiers"
COR_nf_events.35.c:0 "Prepare surplus equipment"
COR_nf_events.35.d:0 "Rally our people, as the time is coming"
COR_nf_events.36.title:0 "Rocky's Revenge"
COR_nf_events.36.desc:0 "The heathens of Green Mountain had not forgotten us. The sight of our banners was met with gunfire, and they were not alone. Those that fled from our advance through their lands made their stand here with our old enemy. That did not matter. The combined might of Rocky's faithful was more than enough to overwhelm these heathens and their allies. They made their last stand at a fortress in the mountains and almost ground our offense to a halt, but we won the day thanks to..."
COR_nf_events.36.a:0 "Arnold's Crunch Veterans"
COR_nf_events.36.b:0 "Shrek's knowledge of guerilla tactics"
COR_nf_events.36.c:0 "Abigail's flamethrower squads"
COR_nf_events.36.d:0 "The former cobalt cult's mininukes, with some left over"
COR_nf_events.37.title:0 "EMPTY EVENT"
COR_nf_events.37.desc:0 "EMPTY EVENT
COR_nf_events.37.a:0 "EMPTY EVENT"
COR_nf_events.38.title:0 "The Cowards"
COR_nf_events.38.desc:0 "When we arrived in The Holy Rocky Caverns we were surprised to see some faces thought lost on the exodus many years ago. All those years ago, some Rockyists conceded to the rule of heathens in exchange for their lives and retreated into the caverns. Many of our warriors were ready to put them to death right there for abandoning one of the core tenants of our faith to preserve their lives. But was it worth slaughtering our brothers just because they faltered?"
COR_nf_events.38.a:0 "Welcome back"
COR_nf_events.38.b:0 "They made their choice"
COR_nf_events.39.title:0 "Our Mighty Capital"
COR_nf_events.39.desc:0 "In just a short time we have transformed this land from a wilderness into the mighty capital for our people. The faithful flock to witness the city built around our holy caverns, and many choose to stay once they witness its' majesty. Secure roads guide pilgrims to our land from the far reaches of our territory and it has become clear that we are no longer a simple church, we are a holy empire!"
COR_nf_events.39.a:0 "The Sun Never Sets On Rockzantium!"
COR_nf_events.40.title:0 "America Comes Knocking"
COR_nf_events.40.desc:0 "From time to time a floating robot would wander into our territory. It's purpose seemed to boradcast old radio messages from a group calling itself The Enclave. These messages promised a return of pre-war America, and like many in the wasteland, we thought these messages were just old recordings from a long dead remnant. The vertibirds soaring over our head and soldiers marching into our territory make it clear that is not the case. This Enclave has overrun The Capital Wasteland to our east and has turned their attention to us. Unluckily for them, we are the mighty chosen of Rocky. With him on our side, how could we fail?"
COR_nf_events.40.a:0 "The Enclave Will Fall"
COR_nf_events.41.title:0 "Storming Project Purity"
COR_nf_events.41.desc:0 "Just as we all knew, The Enclave with their advanced technology was no match for our faith and might. Their final stand occured at a massive water purifier they so greatly treasured. There, their Commander In Chief Autumn was slaughtered along with the rest of his men. The heathens of The Enclave were no more, and The Capital Wasteland had a new dominant power."
COR_nf_events.41.a:0 "Praise Rocky"
COR_nf_events.42.title:0 "Something In The Water"
COR_nf_events.42.desc:0 "As our warriors marched into The Capital Wasteland after the battered enclave soldiers, it was clear there was something wrong with this place. Nearly every settlement we encountered was filled with the sick and dying. The only thing that tied these settlements together was that The Enclave had been there, giving out water. It didn't take a vision from Rocky for us to see what was going on. When we reached the purifier The Enclave was running this water through, we were able to capture a number of their scientists. Under threat of execution, they confessed to what they had done. They put something called FEV into this water and it would kill just about all who drank it. It would be possible to remove this contamination, but we would need to divert a great deal of our most gifted minds to the endeavor."
COR_nf_events.42.a:0 "Clean the water"
COR_nf_events.43.title:0 "Another Tech Cult"
COR_nf_events.43.desc:0 "There were reports of heathens snooping around our territory in advanced power armor, but we thought we had chased them off. It would seem we were wrong. A group of tech worshiping cultists called The Brotherhood of Steel have launched a full on assault on our people. It does not matter much what pre-war leftovers they bring to battle, we have the backing of the highest power, Rocky. This Brotherhood of Steel will meet flames so hot they can melt steel beams, and boil alive in their armor."
COR_nf_events.43.a:0 "This cult will fall like the others"
COR_nf_events.44.title:0 "Into Their Den"
COR_nf_events.44.desc:0 "Our warriors have finally fought their way into the heart of this tech cult, and much as we expected, they have a massive hoard of pre-war technology on their hands. These mighty weapons will be better used in our hands, defending Rocky's faithful and spreading our influence."
COR_nf_events.44.a:0 "Praise rocky"
COR_nf_events.45.title:0 "Cromwell's Crimes"
COR_nf_events.45.desc:0 "Just when we thought we were done with cults that worship nuclear power, we found another one in The Capital Wasteland. These Children of Atom were camped out in Megaton, led by a madman named Confessor Cromwell. This lunatic stood in a pool of irradiated water and begged others to join him. When we attempted to execute him for his crimes of spreading a heathen faith, his followers came to his defense. Of course, these ragged savages were no match for Rocky's chosen, but the massacre has soured The Capital Wasteland on us a little."
COR_nf_events.45.a:0 "They will convert or join Cromwell"
COR_nf_events.46.title:0 "Convincing Cromwell"
COR_nf_events.46.desc:0 "We thought we were done with cults that worshiped nuclear power, but we found another one in The Capital Wastealnd. These Children of Atom were camped out in Megaton, led by a fanatical preacher by the name Confessor Cromwell. We were able to talk him and his followers into coming peacefully to a discussion of their faith, and though it took a lot of convincing, we were able to show some of them the error of their faith. The others met the fate all who shun Rocky's light meet."
COR_nf_events.46.a:0 "Praise Rocky"
COR_nf_events.47.title:0 "Monsters Of The Caverns"
COR_nf_events.47.desc:0 "We sent some of our poeple out to investigate a place called Little Lamplight. Stories describing the place made it sound very similar to our own Rocky Caverns. When our people arrived they were greeted by children who were the direct descendents of schoolchildren that took shelter in the caverns during the great war. There was little time to enjoy this connection with such kindred spirits, as the cavern held another group of inhabitants. Hulking mutants that terrorize The Capital Wasteland, and have even attacked some of our people, seemed to occupy an area beyond the lamplighter's walls. Our warriors could not allow such abominations to desecrate such a holy site, and dove deep into the heart of this infestation. In doing so they found the origin point of super mutants in The Capital Wasteland, and put a stop to it. Clearly Rocky willed us to put a stop to this unholy abomination."
COR_nf_events.47.a:0 "Praise Rocky!"
COR_nf_events.48.title:0 "Kindred Spirits"
COR_nf_events.48.desc.1:0 "We sent some of our poeple out to investigate a place called Little Lamplight. Stories describing the place made it sound very similar to our own Rocky Caverns. When our people arrived they were greeted by children who were the direct descendents of schoolchildren that took shelter in the caverns during the great war. The children were weary of us at first, but when we told them we too came from a cavern much like theirs, they warmed up to us. They have taken well to the teachings of Rocky and we are establishing a church in the caverns."
COR_nf_events.48.desc.2:0 "We sent some of our poeple out to investigate a place called Little Lamplight. Stories describing the place made it sound very similar to our own Rocky Caverns. Our people were disheartened to see what happened to the previous inhabitants. Records and structures left behind tell of a society that descended from schoolchildren that took shelter in the caverns during the great war. Sadly, these kindred spirits were slaughtered by The Enclave when they discovered this place. A church is being erected in the cavern as we settle it, and it will include a shrine to those children murdered by heathens."
COR_nf_events.48.a:0 "Praise Rocky"
COR_nf_events.48.b:0 "We can never forgive the heathens"
COR_nf_events.49.title:0 "The Gift Of Water"
COR_nf_events.49.desc:0 "It took great doing, but we were able to get Project Purity online for ourselves. Now this purifier spits out clean drinking water to distribute to the faithful. It has been suggested that this water could even serve as an incentive to get others to follow the faith. After all, does the gift of unlimited water not prove we are blessed by Rocky?"
COR_nf_events.49.a:0 "Praise Rocky!"

