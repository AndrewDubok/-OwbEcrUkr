l_english:
  FRM_proscribed_burns_category:0 "Fire Marshall Management"
  birth_of_the_fire_marshalls:0 "§RThe Fire Marshalls§!"
  birth_of_the_fire_marshalls_desc:0 "Our Marshalls have cleared the dangerous undergrowth from the Virginia Frontier, they have begun to drain shallow pools for farms, and now keep our northern border safe from cannibals. Pain and poverty are still endemic to our people yet the future remains hopeful. Deep cultural grudges still flair among our divided communities however they are more and more often solved through peaceful mediation. \n\nPeace is a stranger to the Capital Wasteland and stories of our recent stability has managed to pierce the wilderness to our south. Few survivors manage the journey through hundreds of miles of swamp. They depart in groups of hundreds knowing only a dozen will make it. They tell our Marshalls stories of beasts with a thousand teeth, month long hurricanes, and a Magical Kingdom head by a frozen monarch."
  FRM_proscribed_burns_category_desc:0 "Up until now prescribed burns have only been used to prevent expansion of The Swamp. Now that we have taken control of territory deeper in §7The Swamp§! we can let our Fire Marshalls loose to take the land back from this eternal enemy."
  mills_burns:0 "Chase Mills Burn"
  mills_burns_desc:0 "Despite our recent conflict, the Baptists of Chase Mills had previously allowed our Marshalls to conduct burns in their land, making our final pass of the area much easier than in other places."
  eden_burns:0 "Eden Burns"
  eden_burns_desc:0 "The heathens of §R'Eden'§! have facilitated the growth of this monsterous §7Swamp§! for decades. It is finally time to turn this garden of evil into a §Rsmoldering ruin§!."
  liz_burns:0 "The Burning of Liz Point"
  liz_burns_desc:0 "In Liz Point there lies a camp of innocent refugees, people fleeing from the various wars of Southern Virginia. The Known Folk had graciously opened their hearts to these people and allowed them to live in their unused territory, however they also closed their eyes to the misery of these people. Let us show them one last act of kindness and clear §7The Swamp§! from this land."
  chesapeake_burns:0 "Chesapeake Burns"
  chesapeake_burns_desc:0 "Much of Chesapeake Bay was destroyed by the Known Folk's landing. What was left has been ruined by their fights with §7The Swamp§!. Despite so much being lost, we must still work to save what, and who, is left."
  gates_burns:0 "Dismal Gates Burn"
  gates_burns_desc:0 "The Dismal Gates are, like most of Virginia, scarred with the pockmarks of conflict. Being the frontline between the Apocryphians and Swamp-Seers, all on a backdrop of endless §7Swampy Ruin§!. Yet again it falls on us to restore normalcy to the ruin."
  alliance_burns:0 "The Alliance Burns"
  alliance_burns_desc:0 "The Alliance Grounds is home to those born of Poseidon and their arcane Apocryphia. All will burn in service of our Fire Marshalls and their torches."
  rotorville_burns:0 "Rotorville Burns"
  rotorville_burns_desc:0 "The town of Rotorville has survived on the edge of §7The Swamp§! and skirted around the numerous conflicts that have plagued Virginia. But now it is possible to fully rid the region from the threat of §7The Swamp§!."

