  nnc_chivalric_code_idea:0 "Chivalric Code"
  nnc_chivalric_code_idea_desc:0 "Our knights need to be more than the common rabble of the wasteland. They are knights, not raiders."

  NNC_hearts_and_minds:0 "Hearts and Minds"
  NNC_hearts_and_minds_desc:0 "You can not win the wasteland if you can not win their hearts."

  NNC_chivalric_virtues_idea:0 "Chivalric Virtues"
  NNC_chivalric_virtues_idea_desc:0 "One must honour the chivalric virtues if they are to be a true knight."

  NNC_peoples_stewards:0 "The People's Stewards"
  NNC_peoples_stewards_desc:0 "Although we serve the people, there is no doubt that we know what is best for them."

  NNC_freedom_of_association:0 "Freedom of Association"
  NNC_freedom_of_association_desc:0 "If the people do not have the freedom to be wrong, do they have any freedoms at all?"

  NNC_blessed_militia:0 "Blessed Militia"
  NNC_blessed_militia_desc:0 "Our soldiers fight with fire in their hearts and soul."

  NNC_faithful_knights:0 "Faithful Knights"
  NNC_faithful_knights_desc:0 "Our soldiers fight with skill and wrathful vengeance."

  NNC_constance_queendom:0 "Constance's Queendom"
  NNC_constance_queendom_desc:0 "There is no country more righteous or pure than Constance's Realm. This is a queendom of holy fury, and the world will now who we are."