  ####NNC####
  nnc_new_roundtable:0 "New Roundtable"
  nnc_new_roundtable_desc:0 "In New New Castle, a great council of knights gather to discuss issues of the land. The equitable treatment of the voices of the knights does occasionally lead to squabbling, but overall it brings peace and order."

  nnc_stuck_in_the_past:0 "Stuck in the Past"
  nnc_stuck_in_the_past_desc:0 "Understandably, a group of guys running around pretending they are knights of old are not exactly quick to embrace new ideas or change."

  nnc_stuck_in_the_past2:0 "Honouring the Past"
  nnc_stuck_in_the_past2_desc:0 "While one can honour and represent the path, keeping your head in the present is important. We can honour the legacy of knights of yore, while not neglecting the here and now."

  nnc_veteran_knights:0 "Veteran Knights"
  nnc_veteran_knights_desc:0 "The Trog incursion of 2253 devastated the knights of New New Castle, but left behind a hardened and skilled core of veteran knights. The legacy of their experiences has carried to newer knights even to this day."

  NNC_peasant_levies:0 "Peasant Levies"
  NNC_peasant_levies_desc:0 "Peasants have served in our army in a limited capacity for years, but the necessities of the modern day require more of them to enter the army. Unfortunately they're a disorganised rabble, but there are plenty of them."

  nnc_training_dummies_idea:0 "Training "Dummies""
  nnc_training_dummies_idea_desc:0 "The Blackguards have begun training against live targets. While these targets are outlaws, criminals, and worse, it's still unpleasant to most people and there are the occasional innocents killed as well."

  nnc_building_chaos:0 "Rising Chaos"
  nnc_building_chaos_desc:0 "Lancaster's announcement of retirement has set the political order of New New Castle into disarray. Tensions between the Blackguards, Chivalrics, and Crusaders have always existed, but things are getting much, much worse."

  nnc_knightly_disorder:0 "Knightly Disorder"
  nnc_knightly_disorder_desc:0 "Chaos in the Kingdom! New New Castle is now gripped by constant civil war, and Sir Cuthbert watches the flower of American chivalry fall into turmoil and civil war."

  nnc_knightly_disorder2:0 "Knightly Disorder"
  nnc_knightly_disorder2_desc:0 "Chaos in the Kingdom! New New Castle is now gripped by constant civil war, and Sir Cuthbert watches the flower of American chivalry fall into turmoil and civil war. Now the people live in fear, wondering if they'll be next to fall in the turmoil."

