    ###Characters###
    GED_swampseer_fortune_name:0 "Swamp-Seer Fortune"
    ged_fortune_desc:0 "§O"Our triumph is just around the corner. I have seen it."§!\n\nFortune grew up in a strong Eden, guided by the swamps. She saw the collapse coming, and preached against the decadence and apathy growing amongst the other swamp oracles. When everything began to fall apart, she was the only one not surprised. Now the Garden of Eden has retreated, but as the Matriarch of her tribe, Fortune wants to change that. Every day, though, her readings preach doom, and fewer and fewer people attend them. \n\nShe fears that, no matter what she does, nothing can save Eden."
    GED_doctor_name:0 "Doctor Cornelia Robinson"
    GED_doctor_desc:0 "When Doctor Robinson ventured into the heart of the Virgnian swamps, she was not expecting to become the leader of a tribe of swamp-dwellers. More than a couple years have passed since the doctor found this tribe in the heart of the swamp, and with some hard work she has been able to convince them to abandon their superstitious ways. In time some of these people could even become scientists themselves, discovering just what went wrong with this vault's GECK, and how to deal with the growing swamp."
   
    ###Cosmetic Tags###
    GED_science_cosmetic_tag:0 "Garden Of Eden Research Team"
    GED_science_cosmetic_tag_ADJ:0 "GoE Research"
    GED_science_cosmetic_tag_DEF:0 "The Garden Of Eden Research Team"
    GED_tribe_cosmetic_tag:0 "Lords Of Eden"
    GED_tribe_cosmetic_tag_ADJ:0 "Eden"
    GED_tribe_cosmetic_tag_DEF:0 "The Lords Of Eden"
    
    ###Country Flags###
    GED_brotherhood_visited_flag:0 "The Brotherhood sent an expedition to our swamp."

    ###Events###
    GED_nf_events.1.title:0 "Hostile Enviroment"
    GED_nf_events.1.desc:0 "The swamps have always been our home. Where others fight against the vegitation and wildlife, we live with it. We are as much a part of the swamp as it is a part of us. We have always waded through the waters or climbed among the trees, hunting the swamp geckos just as our people are themselves hunted by the fearsome gatorclaws. One thing above all else has given us an edge on the other life of this swamp."
    GED_nf_events.1.a:0 "Our sturdy huts"
    GED_nf_events.1.b:0 "Our warrior's tactics"
    GED_nf_events.1.c:0 "Our vigilant scouts"
    GED_nf_events.1.d:0 "Lots of healing powder"
    GED_nf_events.2.title:0 "Many Enter But Few Leave"
    GED_nf_events.2.desc:0 "Under our village is a cave unlike any other we have seen. A short distance into the cave it changes from stone to metal. Small lights can be seen through choking vines and at the heart is a special chamber. For generations young women have ventured into the chamber, with many of them never leaving. Those that do survive their trip to the deepest chamber of The Sacred Cave emerge changed. Those chosen by the gods are able to divine the future in the waters of the swamp. They have forseen everything from bountiful harvests to heavy floods. Our current Swamp-Seer Matriarch, Swamp-Seer Fortune, even forsaw the death of the prior Matriarch. While she couldn't warn us of the precice calamity, she did have a gift for seeing certain things."
    GED_nf_events.2.a:0 "Changes in the earth"
    GED_nf_events.2.b:0 "Changes in the wind"
    GED_nf_events.2.c:0 "Changes with the Fire-Bringers"
    GED_nf_events.3.title:0 "Unforseen Loss"
    GED_nf_events.3.desc:0 "Swamp-Seer Fortune tried to warn us about an upcoming calamity, but the vague nature of her visions along with the other seers not seeing anything left her prophecy unheeded. When the sea people reached our shores, many of our tribe were lost. Most of our swamp-seers died in the first few nights, along with dozens of our best warriors. The loss of the seers, and their inability to see the disaster coming has left a wound on our people even greater than thier loss. For the first time in over 100 years, the tribe is beginning to wonder if the god's favor has been lost."
    GED_nf_events.3.a:0 "Or if the visions were ever real..."
    GED_nf_events.4.title:0 "Savior Or Doom?"
    GED_nf_events.4.desc:0 "As our people were hiding from the sea people and trying to save those that survived the fighting, a stranger approached our village. The outsider introduced herselve as a Doctor and agreed to help our people. She told us she had an interest in our swamp, not to destroy it like many outsiders, but to know how to live with it as we do. We accepted her help and soon she was helping our Matriarch with other tasks."
    GED_nf_events.4.a:0 "Helping us build"
    GED_nf_events.4.b:0 "Helping us organize"
    GED_nf_events.4.c:0 "Teaching us outsider wisdom"
    GED_nf_events.5.title:0 "The Brotherhood's Offer"
    GED_nf_events.5.desc:0 "The Brotherhood of Steel have approached our village with a team of Knights and a couple scribes. The tribals of Eden had no idea what to make of these outsiders, but Doctor Robinson was well aware of the group and its goals. She spoke with the scribes for a time about their interest in the region, and shared her personal findings. After a few days, The Brotherhood left but a tentative deal had been made. In exchange for Brotherhood protection, the tribe would allow the group full access to their vault and help them with whatever they need for their research on the vault and the GECK's impact on the region.""
    GED_nf_events.5.a:0 "We welcome their help!"
    GED_nf_events.6.title:0 "Mighty Outsiders Driven Off!"
    GED_nf_events.6.desc:0 "Towering warriors clad in metal and carrying weapons of fire and light descended upon the village. We did not fight them at first, but kept our distance and observed. It soon became clear they intended to make their way into our Sacred Cave. We could not allow this. As they made camp by the cave and took their helmets off to eat, we let our arrows fly. Some of them were killed but the rest put their helmets back on and fired back at us. We did not relent and soon they were fleeing from our lands. We celebrated this victory but were halted by a warning from The Oracles."
    GED_nf_events.6.a:0 "More of them will come back"
    GED_nf_events.7.title:0 "Journal Entry 61"
    GED_nf_events.7.desc:0 "After helping the people of Eden for a few months I think I have finally gained their full trust, or at least as much as an outsider can get among these people. If there is one thing I have learned from their stories of their rich history, their encounters with other humans rarely went well. The fact that they did not kill me on sight is great luck on my part. Note, I should be more cautious approaching wasteland tribes in the future once this expedition is wrapped up. As I suspected, the heart of this swamp does seem to be a vault. This lends credence to my hypothesis that this unnatural swamp is in fact the result of a GECK. Whether it is a GECK operating as intended, or something went wrong, remains to be seen. I doubt even with my current acceptance in the community that I would be allowed to venture far into the vault. But, I might be able to convince their leader to allow me into the entrance hall. If any of the terminals are still working I could transfer some power from the vault reactor. That might be enough to have them allow me to go further into the vault. Otherwise, this expedition may need to get more dangerous or be a bust."
    GED_nf_events.7.a:0 "Dr. Cornelia Robinson signing off."
    GED_nf_events.8.title:0 "The Faith Returns"
    GED_nf_events.8.desc:0 "Just as The Swamp-Seer predicted, the outsider doctor would not respect our refusal to allow her into the heart of our Sacred Cave. She was caught just after midnight and brought before Matriarch Fortune. Her pleas for mercy were ignored, just as she ignored our rules. Instead, The Swamp-Seers divined her fate. She was to be sacrificed, to remind our people the danger of outsiders but the strength in our people. As the trecharous doctor left our world, the doubts left the hearts of our people."
    GED_nf_events.8.a:0 "Our faith has been restored"
    GED_nf_events.9.title:0 "Journal Entry 73"
    GED_nf_events.9.desc:0 "I can almost not believe what happened today. There is a lot to go over, but I will try to be brief and start from the beginning. Listening to the stories of the Eden Tribals over these last few months has taught me a lot about their vault as well as the dangers withhin. It is clear that the GECK at the heart of this vault is likely defective and emitting near fatal levels of radiation. Thankfully I packed ton of Rad-X and a quality radiation suit. The potential for this GECK radiation to be unlocking some kind of latant psychic ability in thier 'oracles' warrants a whole team of reachers in itself. But I digress, I was allowed to venture into their vault and confirmed my hypothesis. The vegitation was plentiful even at the lowest levels of the vault, so plentiful that I likely would not have made it through if the tribals had not been cutting parts away for god knows how long. At the lowest level there was the GECK. It's housing was cracked by an unknown force and it was hooked into the vault's reactor, both of which are clearly outside of the standard operating procedures and explain why the machine is still producing rapid vegitative growth. This find alone was a one most people would only dream of, but it was still the second most extraordinary thing to happen today. When I made my way back to the surface I was acosted and brought to the hut of Swamp-Seer Fortune. Though I had been here for months, my visits to her hut were very rare and usually came with demands I help with something or another. This time was different. The matriarch of this tribe told me she had a series of visions she did not tell her people about. According to her visions, her people would be wiped out so long as she was their leader. Just before I emerged from the vault she had another vision, which prompted her to send people to retrieve me, a vision of ME leading their people. She knows I'm no psychic like the leaders of their tribe in the past, but she believes me emerging from the vault alive proves the time of the Swamp-Seers is over. Obviously, there are serious ethical concerns relating to taking control of a tribe of interesting, but primative, people. However, those concerns seem a little less glaring when they offer you the job right? I know the tribals are having problems with some raiders or something to their East that they've been gearing up to fight, and if I take off now to get supplies as well as support, who knows what'll happen here while I'm gone? I'm thinking that taking this opportunity will be the best chance I have of completing this research. Maybe I'll even be able to help these people become more civilized. Hell, they could be decent research assistants in time."
    GED_nf_events.9.a:0 "Dr. Cornelia Robinson, Matriarch of Eden, signing off."
    
    ###Ideas###
    GED_shrinking_congregation:0 "Shrinking Congregation"
    GED_shrinking_congregation_desc:0 "When the swamp-seers failed to predict the arrival of the Known Folk, people began to lose faith. Ever since, the path of Eden has been towards decline. The local people no longer trust the visions of their leaders."
    GED_swamps_dying_breath:0 "The Swamp's Dying Breath"
    GED_swamps_dying_breath_desc:0 "Eden may be dying, but while the oracles still draw breath they will fight to protect their religion. As Eden dies, so will its enemies."
    GED_new_oracles_idea:0 "New Oracles"
    GED_new_oracles_idea_desc:0 "A new generation of swamp-seers have emerged from the sacred cave ready to guide our people into the future."
    GED_eden_research_idea:0 "Garden Of Eden Research Facility"
    GED_eden_research_idea_desc:0 "Under the guidance of Doctor Robinson, the tribe once known as The Garden of Eden is turning into a dedicated team of assistants for her research. In time they may be able to secure support from Rivet City or even The Brotehrhood!"
    GED_eden_lords_idea:0 "Lords of The Swamps"
    GED_eden_lords_idea_desc:0 "The tribals of The Garden of Eden have pushed out or assimilated all the outsiders that tought to take their home. Anyone who seeks to encroach on their swamps will likely meet the same fate."

    ###National Focus###
    GED_nf_a001:0 "Endless Swamps"
    GED_nf_a001_desc:0 "The thick bush, murky waters, and stretching vines spells danger to outsiders. For us, it's home."
    GED_nf_a002:0 "The Swamp-Seers"
    GED_nf_a002_desc:0 "For generations our tribe has been guided by those gifted with foresight."
    GED_nf_a003:0 "Sea People"
    GED_nf_a003_desc:0 "We do not know anything about them except that they came from the sea and shoot on sight."
    GED_nf_a004:0 "Seeds Of Doubt"
    GED_nf_a004_desc:0 "How could our oracles not know the sea people were coming?"
    GED_nf_a005:0 "Tend Our Wounded"
    GED_nf_a005_desc:0 "There are many that still need to recover from the sea people's attack."
    GED_nf_a006:0 "Gather Weapons"
    GED_nf_a006_desc:0 "Waiting around will not save us. We need bows, lots of bows."
    GED_nf_a007:0 "Sticth Together Hides"
    GED_nf_a007_desc:0 "Gecko hides are not the strongest, but they will help keep our warriors alive."
    GED_nf_a008:0 "Learn From Mistakes"
    GED_nf_a008_desc:0 "Simple hunting bows and gecko hide vests are not enough. We need better tools to defeat the sea people."
    GED_nf_a009:0 "Warriors At The Ready"
    GED_nf_a009_desc:0 "Our strongest hunters are ready to fight and many are following their example."
    GED_nf_a010:0 "Strange Travelers"
    GED_nf_a010_desc:0 "They came from the north wearing armor so heavy it made them sink half in the muck. Why did they come and where did they go?"
    GED_nf_a011:0 "The Sacred Cave"
    GED_nf_a011_desc:0 "A special place where Swamp-Seers are born and visions are given, can we let even a helfpul outsider venture inside?"
    GED_nf_a012:0 "Respect The Cave"
    GED_nf_a012_desc:0 "The cave is a gift to our people. It would offend the gods to let an outsider go in."
    GED_nf_a013:0 "Understand Swamp Creatures"
    GED_nf_a013_desc:0 "Our Swamp-Seer has learned something in her latest vision, a way to tame the beasts of the swamp."
    GED_nf_a014:0 "Tame A Cluster"
    GED_nf_a014_desc:0 "We are ready to try our new wisdom."
    GED_nf_a015:0 "New Oracles"
    GED_nf_a015_desc:0 "Many Swamp-Seers died in the sea people attack. They must be replaced."
    GED_nf_a016:0 "Promsies of Victory"
    GED_nf_a016_desc:0 "The new Oracles all have had the same vision, one that shows the sea people driven back into the ocean."
    GED_nf_a017:0 "Renewed Belief"
    GED_nf_a017_desc:0 "The gifts and visions bestowed on our Oracles have renewed the faith of our people. The doubts of our people will be banished with just one last task."
    GED_nf_a018:0 "Study The Cave"
    GED_nf_a018_desc:0 "Doctor Robinson has been a great help to our people. They have earned the right to venture into our sacred cave"
    GED_nf_a019:0 "More Than Statues"
    GED_nf_a019_desc:0 "The Doctor says the metal guardians of the sacred cave do more than just ward off dark spirits. With her help we could use them to protect against our enemies too."
    GED_nf_a020:0 "Open Sealed Passages"
    GED_nf_a020_desc:0 "Some doors of the sacred cave never opened, until now."
    GED_nf_a021:0 "The Cave's Bounty"
    GED_nf_a021_desc:0 "We have learned of items in The Sacred Cave that are not needed for our rituals. Pulling them out lets us use them for other things."
    GED_nf_a022:0 "Wisdom of Ancients"
    GED_nf_a022_desc:0 "The Doctor tells us this cave was built by ancient people called The Vaultek. They have much to teach us in these halls."
    GED_nf_a023:0 "Illusion Dispelled"
    GED_nf_a023_desc:0 "We know more about the vault under our village than we ever did. Not because of Swamp-Seers, but because of the doctor. Clearly, we must follow her wisdom instead."
    GED_nf_a024:0 "To The Shore"
    GED_nf_a024_desc:0 "Our people are ready to push the sea people away from our home."
    GED_nf_a025:0 "The Wheel"
    GED_nf_a025_desc:0 "Deep in Posiedon's domain, a machine exists that could be useful for us."
    GED_nf_a026:0 "Storm The Husk"
    GED_nf_a026_desc:0 "The sea people have retreated to the ship they sailed in on. Now is our chance to end this!"
    GED_nf_a027:0 "Halt The Burning"
    GED_nf_a027_desc:0 "The Firemarshals have burned our lands for too long. That ends today."
    GED_nf_a028:0 "Lords Of Eden"
    GED_nf_a028_desc:0 "The swamp expands freely. Our people live in harmony unbothered by outsiders entering our lands. More may come, but we will be ready."
    GED_nf_a029:0 "Enlighten Our Neighbors"
    GED_nf_a029_desc:0 "If the recent war has shown anything to The Atom Baptists or people of Posiedon, it's that their gods are either powerless to help them or don't care. We'll show them a better way."
    GED_nf_a030:0 "Waters Of Eden"
    GED_nf_a030_desc:0 "Over the centuries we have learned ways to make the waters of the swamp safe to drink."
    GED_nf_a031:0 "Clear Trails"
    GED_nf_a031_desc:0 "A few trails and paths will help us respond to sea people attacks, or whatever else comes after us."
    GED_nf_a032:0 "Scavenge Tools"
    GED_nf_a032_desc:0 "Under the brush there are old tools long forgotten, and they will be ours."
    GED_nf_a033:0 "Keep Watch"
    GED_nf_a033_desc:0 "Our sharpest scouts will watch from the treeline, making sure to warn us when the sea people make a move."
    GED_nf_a034:0 "Refine Our Tactics"
    GED_nf_a034_desc:0 "Fighting men is not the same as hunting geckos. Our way of fighting must be different."
    GED_nf_a035:0 "Unite Our People"
    GED_nf_a035_desc:0 "Our tribe knows we are under threat. It will not take much to make them agree to fight."
    
    ###Tooltips###
