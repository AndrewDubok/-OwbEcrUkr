    EEN_PHEARSON_DESC:0 "With the death of Cadmus, Christopher Peterson was promoted to Captain and took control of the Van Buren Detachment. Backed by those loyal to him, Peterson plans to continue eliminating communists, liberating America, and restoring the Old World."
    
    ###leader description###
    EEN_eden_desc:0 "President John Henry Eden truly is an example of The American Dream. Coming from humble roots as a simple ZAX super computer meant to control a monitoring station, President Eden loved his country, and not just because he was programmed to. This love of America would inspire him to study all the great presidents of the nation's history, especially Abraham Lincoln. This combination of good old fashioned patriotism and cold calculating logic made President Eden the perfect man.. er.. machine to step up and take control of The Enclave after the unfortunate destruction of Control Station ENCLAVE. He simply is the best choice to bring America back from the brink of death, and save humanity from the rot of mutation that has embedded itself since the war."
    EEN_autumn_desc:0 "Colonel Autumn was never interested in the mad genocidal dreams of past Enclave presidents like Richardson and Eden. Autumn is concerned with only one thing, rebuilding America, by any means necessary."

