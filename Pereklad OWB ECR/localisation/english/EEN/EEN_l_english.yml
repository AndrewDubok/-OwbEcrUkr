    EEN_grabbed_factory_tt:0 "The ungrateful wastelander doesn't understand we need this factory for their safety!"
    EEN_grabbed_specimins_tt:0 "The unwashed wastelander will somehow object to us hauling off the dregs of society!"
    EEN_funded_militias_tt:0 "The waster militias appreciate our sub-standard scraps"
    EEN_propaganda_efforts_tt:0 "This should change some wasters minds"
