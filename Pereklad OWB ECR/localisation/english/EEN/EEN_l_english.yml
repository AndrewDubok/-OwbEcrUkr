    EEN_popular_support_tt:0 "Power armor notwhithstanding, governments derrive their powers from the consent of the governed. The Enclave needs to prove to the average wastelander that they are worthy to govern them. While a powerful army and the largest supply of clean water this side of Appalachia is a really good start, there are still things that can make the people of the wastes rise up and try to go back to governing themselves."
