    ###Balance of Power###
    EEN_public_support:0 "Wastelander Support"
    EEN_dangerously_low_public_support:0 "Dangerously Low Wastelander Support"
    EEN_firm_public_support:0 "Firm Wastelander Support"
    EEN_public_support_category:0 "Wastelander Support"
    EEN_crumbling_public_support:0 "Crumbling Wastelander Support"
    EEN_crumbling_public_support_desc:0 "While our personnel are happier than ever with Autumn's leadership, wastelander's faith in The Enclave is crumbling. Only a few true believers in The American Dream stand with us. Patrols are being ambushed in areas that were once clear and workers are walking out of arms plants. On the plus side, this wastelander "
    EEN_precarious_public_support:0 "Precarious Wastelander Support"
    EEN_precarious_public_support_desc:0 "Even though Enclave personnel are happy with the current state of things, our soldiers are reporting increasing hostility in the settlements they pass through. For now it is just the occasional curse or rotten tato, but it will quickly become bullets and grenades."
    EEN_low_public_support:0 "Low Wastelander Support"
    EEN_low_public_support_desc:0 "Our policy choices and recent actions clearly favor Enclave personnel. While the average wastelander still would not do much more than complain in their hovels, resistance groups are attracting more support with each day. If we are not careful, we could see some revolts pop up."
    EEN_strong_public_support:0 "Strong Wastelander Support"
    EEN_strong_public_support_desc:0 "No matter how many aging officers complain about our decisions, the average wastelander has a positive outlook on The Enclave. According to a recent survey, 7 out of 10 wastelanders surveyed say their lives have gotten better since The Enclave came to their town, and 1 out of those 3 who disagreed was a ghoul so they don't count."
    EEN_moderate_public_support:0 "Moderate Wastelander Support"
    EEN_moderate_public_support_desc:0 "Despite the grumblings from some of our more hardline personnel, our policies are leading to the wastelanders are becoming more and more accustomed to our rule. Settlers wait patiently for their water rations and tax collections are growing. Also detractors are written off as fringe crazies so nobody misses them when they vanish."
    EEN_growing_public_support:0 "Growing Wastelander Support"
    EEN_growing_public_support_desc:0 "Even though some in The Enclave are not thrilled with current policy, the general wastelander perception of The Enclave is one of cautious optimism. There are plenty of detractors that denounce some of our policies, but the average wastelander doesn't care about things like 'ghoul rights' or some alleged war crimes. They just want cold water, warm lunch, and a place to shit with a door on it. So long as we continue to provide those, we should be fine."
    EEN_midling_public_support:0 "Balanced Support"
    EEN_midling_public_support_desc:0 "We have achieved a healthy compromise between hardliner and Pro-Wastelander policies and actions that while nobody is trhilled about it, at least nobody is agitated either."
    EEN_leadership_struggle:0 "Enclave Leadership Struggle"
    EEN_autumn_loyalist_enclave:0 "Autumn Loyalist Enclave"
    EEN_eden_loyalist_enclave:0 "Eden Loyalist Enclave"
    EEN_leadership_struggle_decision_category:0 "Leadership Struggle Decisions"
    EEN_contested_leadership:0 "Contested Leadership"
    EEN_contested_leadership_desc:0 "The question of loyalty between The President and Commander of The Enclave Armed Forces splits Raven Rock almost equally down the middle. A coup would likely end in disaster."
    EEN_firm_autumn_loyalty:0 "Firm Autumn Loyalty"
    EEN_firm_autumn_loyalty_desc:0 "Even outside of the officer corps, Colonel Autumn sees admiration and unwaveriny loyalty that seems to overshadow that of the president. That kind of devoted following can be dangerous."
    EEN_autumn_loyalist_cliques:0 "Autumn Loyalist Cliques"
    EEN_autumn_loyalist_cliques_desc:0 "Various Autumn supporters have formed cliques in their departments. They show favor to those in their own and shun those more loyal to our president. This could be problematic."
    EEN_autumn_loyalist_talk:0 "Autumn Loyalist Talk"
    EEN_autumn_loyalist_talk_desc:0 "Those in our ranks often talk of their admiration and loyalty to Colonel Autumn. While it is just talk, it is disconcerting to say the least."
    EEN_firm_presidential_support:0 "Firm Presidential Support"
    EEN_firm_presidential_support_desc:0 "The loyal Americans of The Enclave know who they need to look to for guidance. President Eden enjoys an outstanding approval rating as well as the adoration of his people."
    EEN_moderate_presidential_support:0 "Moderate Presidential Support"
    EEN_moderate_presidential_support_desc:0 "While some question the decisions of The President, they know better than to widely complain. The general concensus of The Enclave is that President Eden is doing a great job."
    EEN_wavering_presidential_support:0 "Wavering Presidential Support"
    EEN_wavering_presidential_support_desc:0 "President Eden is not as admired as he used to be. Some members of The Enclave have even been heard through covert monitoring to question if there should be an election for a new president soon."

    ###Occupation Laws###
    ecr_water_distribution:0 "Water Distribution Missions"
    ecr_water_distribution_desc:0 "In addition to our patrols, we will send guarded caravans to distribute water to settlements. In time the populace will learn that working with us is better than against us."
    ecr_cure_clinics:0 "Cure Clinics"
    ecr_cure_clinics_desc:0 "We will continue to distribute our water and use our cure clinics to monitor the spread of the modified FEV virus. Eventually this area will be fit for human habitation."

    ###Leader Traits###
    EEN_grant_trait:0 "Spirit of President Grant"
    EEN_richardson_trait:0 "Spirit of President Richardson"
    EEN_jackson_trait:0 "Spirit of President Jackson"
    EEN_hoover_trait:0 "Spirit of President Hoover"
    EEN_cringe_trait:0 "Cringe"
    EEN_autumn_loyalist_trait:0 "Autumn Loyalist"
    EEN_autumn_loyalist_trait_desc:0 "This officer is devoted to Colonel Autumn almost to a fault."
    EEN_merc_leader_trait:0 "Merc Tactics"
    EEN_merc_leader_trait_desc:0 "The general's time among Talon Company has thought them a few things about mercenary tactics that The Enclave could stand to learn from"
    EEN_lincoln_trait:0 "Spirit of Lincoln"
    EEN_genocidal_general_trait:0 "Genocidal General"
    EEN_genocidal_general_trait_desc:0 "This General still believes in Richardson's goal of wiping out the wasteland populace, and they aren't afraid to let it be known."
    EEN_night_assault_officer_trait:0 "Night Fighting Expert"
    EEN_robotics_wizard_trait:0 "Robotics Wizard"
    EEN_demolitions_genius_trait:0 "Demolitions Specialist"
    EEN_vertibird_assault_genius_trait:0 "Verti-Assault Expert"
    EEN_terror_bomber_trait:0 "Terror Bomber"
    EEN_terror_bomber_trait_desc:0 "If this officer had their way, we would barely ever have troops on the ground. Instead we would just conduct bombing runs until the enemy laid down their arms."
    EEN_airspace_guardian_trait:0 "Air Superiority Specialist"
    EEN_invasion_expert_trait:0 "Naval Invasion Expert"
    EEN_patrol_expert_trait:0 "Naval Screening Expert"
    EEN_wastelander_scientist_trait:0 "Wastelander Scientist"
    EEN_privateer_trait:0 "Expert Privateer"
    EEN_bleeding_heart_researcher_trait:0 "Sympathetic Researcher"
    EEN_bleeding_heart_researcher_trait_desc:0 "This scientist is concerned with ethics much more than the average Enclave scientist.
    EEN_pragmatic_scientist_trait:0 "Cold Hearted Pragmatist"
    EEN_pragmatic_scientist_trait_desc:0 "This scientist only cares about results, this may lead to issues anow and then but such is the price for progress."
    EEN_wasteland_slavemaster_trait:0 "Wasteland Slavemaster"
    EEN_hands_off_economist_trait:0 "Hands off Economist"
    EEN_military_industrialist_trait:0 "Military Industrialist"
    EEN_agriculture_expert_trait:0 "Department of Agriculture"
    EEN_department_of_energy_trait:0 "Department of Energy"
    EEN_purity_propaganda_trait:0 "Champion of the Old Ways"
    EEN_surgeon_general_trait:0 "Surgeon General"
    EEN_raider_liason_trait:0 "Raider Liason"
    EEN_raider_liason_trait_desc:0 "This administrator serves as a middleman between our larger government and the various privateers we allow to work in and around our territory."
    EEN_fbi_director_trait:0 "FBI Director"
    EEN_fbi_director_trait_desc:0 "Not all enemies of the state are as loud and obvious as raiders. For those more discreet enemies, we need discreet hunters."
    EEN_tax_collector_trait:0 "Wasteland IRS"
    EEN_tax_collector_trait_desc:0 "They used to say two things were certain, death and taxes. In the Enclave, that's more of a choice between the two."
    EEN_wastelander_outreach_trait:0 "Wastelander Outreach Chair"
    EEN_wastelander_outreach_trait_desc:0 "Decades of studying scouting reports as well as interrogation logs have given this administrator a solid insight into the mind of the wastelander. With them advising policy, we should be able to achieve our goals while keeping the populace docile."
    EEN_army_intelligence_trait:0 "Army Intelligence"
    EEN_army_intelligence_trait_desc:0 "Some would consider this an oxymoron, but here we are."
    EEN_wasteland_survival_training_trait:0 "Wasteland Survival Training Expert"
    EEN_wasteland_survival_training_trait_desc:0 "This officer has led many teams outside Raven Rock in these last 30 years. They have learned a lot about how to survive the wasteland in that time"
    EEN_directed_assault_specialist_trait:0 "Directed Assault Specialist"
    EEN_directed_assault_specialist_trait_desc:0 "If there is one thing this officer knows, its punching through a weakpoint in the enemy lines."
    EEN_improvised_fortification_specialist_trait:0 "Improvised Fortification Specialist"
    EEN_improvised_fortification_specialist_trait_desc:0 "This officer is an expert on dugouts, trenches and all other forms of improvised defenses. While it may not be needed while fighting raiders with pipe rifles, you'll be counting your blessings when we find someone with close air support."
    EEN_brotherhood_fighting_expert:0 "Battled the Brotherhood"
    EEN_brotherhood_fighting_expert_desc:0 "This officer was among the few that fought The Brotherhood back West and still escaped to The East. Though he doesn't fight like he used to, he can still remember the holes in Brotherhood tactics."
    EEN_i_drive_trait:0 "Experienced Motorist"
    een_black_devil_tesla_apa_trait:0 "Tesla PA Production"
    een_black_devil_tesla_apa_trait_desc:0 "Our APA power armor production is focused on the APA Mk-II Tesla variant. The suit further improves upon the standard APA Mk-II by increasing protection against energy weaponry. This comes with the drawback of increased production costs, design complexity, and repair difficulty."
    een_hellfire_trait:0 "Hellfire PA Production"
    een_hellfire_trait_desc:0 "Our APA power armor production has shifted focus to the Hellfire variant. Almost a new design of armor in its own right, the suit offers increased protection across the board. In addition, it has been designed to withstand extreme heat."
    een_duraframe_eyebot_trait:0 "Duraframe Eyebot Production"
    een_duraframe_eyebot_trait_desc:0 "Our standard scouting eyebots are being phased out in favor of duraframe eyebots. Reinforced armor, upgraded weaponry and increased thrust have made the tiny machines a valuable tool on the modern battlefield."
    

    ###Decisions###
    EEN_support_decision_category:0 "Contact other Cells"
    EEN_support_decision_category_desc:0 "Enclave cells are located all across the country. Many should have surfaced by now, but who knows, maybe there are some with living members"
    EEN_navarro_support:0 "Contact Navarro"
    EEN_navarro_support_desc:0 "We left some behind as we made our way to DC. Maybe they beat the unwashed hordes after all?"
    EEN_navarro_support_ww:0 "Contact Navarro"
    EEN_navarro_support_ww_desc:0 "We left some behind as we made our way to DC. Maybe they beat the unwashed hordes after all?"
    EEN_chicago_support:0 "Contact Chicago"
    EEN_chicago_support_desc:0 "Databases in Oil Rig held the frequencies for a cell in Chicago. We should reach out to them."
    EEN_virginia_support:0 "Contact Whitespring"
    EEN_virginia_support_desc:0 "The Whitespring Bunker in West Virginia was meant to hold some of Americas most important elites as well as the closest thing President Eden could have to a brother. We should see what became of them."
    EEN_ontario_support:0 "Contact The Ontario Enclave"
    EEN_ontario_support_desc:0 "Years back we sent a few men to help a small Enclave cell retain control of a region in Canada. It has been some time since we heard from them, if they are still around, they could return the favor."
    EEN_contact_vanburen_afb:0 "Contact Van Buren Space Center"
    EEN_contact_vanburen_afb_desc:0 "Shortly after the relocation order was given by President Eden, a team of soldiers and researchers was sent down to Florida to help a small Enclave group there. Their goal has been to restore pre-war rockets meant to take man to space in case the goal of cleaning mutation from the planet proved impossible. Contact fell off not long after they arrived in Florida. Hopefully they didn't leave without us."
    EEN_bomb_prime:0 "Destroy Liberty Prime"
    EEN_bomb_prime_desc:0 "The pre-war robot known as Liberty Prime is causing havok across our lines. Vertibirds are being shot down and defenses are being blown apart. It must be destroyed!"
    EEN_talon_co_jobs_decision_category:0 "Talon Company Assignments"
    EEN_talon_co_jobs_decision_category_desc:0 "Talon Company has happily agreed to carry out missions for us in exchange for tech, resources or equipment. While they are not as skilled or well equipped as our soldiers, they have one essential quality that our men do not, they are easily replaced."
    EEN_talon_co_scout_citadel:0 "Scout The Pentagon"
    EEN_talon_co_scout_citadel_desc:0 "A squad of mercs could set up an outpost near The Pentagon. From there they can keep an eye on the current squatters and let us know of any weaknesses in their defenses."
    EEN_talon_scout_mount_weather:0 "Scout Mount Weather EOC"
    EEN_talon_scout_mount_weather_desc:0 "The Mount Weather EOC was a bunker not too different from Whitespring that was meant to house members of the United States Government in the wake of atomic war. While not an Enclave controlled bunker, it still was a United States facility of some importance. We should send Talon Company out to see what became of the bunker and if anything of value can be pulled from it."
    EEN_talon_hold_the_capital:0 "Search the Capitol Building"
    EEN_talon_hold_the_capital_desc:0 "While very costly, sending mercs to occupy The Capitol could be worth it. There should be valuable archives that have not been looted and the Capitol bunker has been offline for some time."
    EEN_talon_raid_caravans:0 "Raid Wasteland Caravans"
    EEN_talon_raid_caravans_desc:0 "The mutie settlements of The Capital Wasteland all rely on a series of trader caravans traveling across the wastes for their commerce and survival. Talon Company can divert some squads to watch those routes and raid some of the caravans, hurting our enemies."
    EEN_talon_assault_brotherhood:0 "Assault a Brotherhood outpost"
    EEN_talon_assault_brotherhood_desc:0 "Talon Company is willing to throw some new recruits and other unwanted soldiers at a Brotherhood of Steel outpost if we pay them enough. If we are lucky, they may even kill a Knight or two."
    EEN_distribute_fev_water:0 "Distribute 'Purified' Water"
    EEN_distribute_fev_water_desc:0 "Send vertibirds over our enemies' lines to drop water tainted with the modified FEV virus. The naturally thirsty wastealand trash will grab the shipments and be cleaned from the wastes."
    EEN_project_purity_decision_category:0 "Project Purity"
    EEN_project_purity_decision_category_desc:0 "It is imperative that we assume control of Project Purity. Now to figure out how to do that."
    EEN_shock_and_awe_decision:0 "Shock and Awe"
    EEN_shock_and_awe_decision_desc:0 "The plans have been made and soldiers are doing training exercises to prepare for the assault on Project Purity. The day of our attack nears."
    EEN_careful_infiltration_decision:0 "Careful Infiltration"
    EEN_careful_infiltration_decision_desc:0 "Our agents are making progress at ingratiating themselves with the Project Purity staff. It will take some more time, but soon we will be able to take over the project."
    EEN_send_talon_co_decision:0 "Sending Talon Company"
    EEN_send_talon_co_decision_desc:0 "Negotiations are still under way, but it seems like we will be able to send a sizable force of Talon Company mercs to overwhelm the defenses of Project Purity and bring it under our control."
    EEN_rescue_ops_decision_category:0 "DC Rescue Operations"
    EEN_rescue_ops_decision_category_desc:0 "Across the wastes there are still some teams that will not be able to make their way back to base without assistance. We will have to take some risks to save them."
    EEN_deathclaw_science_team_rescue_decision:0 "Deathclaw Sancturay Science Team"
    EEN_deathclaw_science_team_rescue_decision_desc:0 "The Deathclaw Sanctuary had a science team with a sizable armed guard protecting it at the time of Raven Rock's destruction. Situated on a high peak and surrounded by hostile wildlife, our men will need a vertibird extraction to get them safely home."
    EEN_dc_ruins_rescue_decision:0 "DC Ruins Rescue"
    EEN_dc_ruins_rescue_decision_desc:0 "A few squads that were fighting The Brotherhood in downtown DC ended up cut off from our main force and are in desperate need of rescue. We should be able to rescue them, but if we are not careful we could be sending more of our men into a meat grinder."
    EEN_fort_constantine_outpost_rescue_decision:0 "Fort Constantine Outpost Rescue"
    EEN_fort_constantine_outpost_rescue_decision_desc:0 "A team sent to keep an eye on Fort Constantine and Outcast activity in the area are reportedly trapped in a sub-basement after accidentally triggering a security lockdown. They should just need someone to breach the security from the outside, but it is unknown what else was triggered when they tripped the alarm."
    EEN_water_decisions_category:0 "Project Purity Decisions"
    EEN_water_decisions_category_desc:0 "With all this clean water, we now have some choices to make about how we use it."
    EEN_eden_water_decision:0 "Establish Permanent Cure Clinic"
    EEN_eden_water_decision_desc:0 "A permanent Cure Clinic will be established in the region. This fortified compound will ensure water is distributed to the populace and the mutant sterilization efforts are not undone by migration. Outside of this presence, we will ignore the region until the mutants age out of being a problem."
    EEN_eden_water_decision_2:0 "Cure Clinic Reports"
    EEN_eden_water_decision_2_desc:0 "Between our water distribution efforts and our cure clinics, we are steadily working towards the late President Richardson's goal of a clean wasteland. The sterilization of these mutants is progressing and withhin a century, these regions will be clean of mutant kind."
    EEN_staff_water_distribution_center:0 "Construct Water Distribution Centers"
    EEN_staff_water_distribution_center_desc:0 "Water Distribution Centers will serve as the center of our authority in the regions we reclaim from the wastes. These fortified compounds will host everything from administrative offices to local garrisons. The high walls and waving flag of thes outpost will cement our grip on a region, and remind the wastelanders just what country they are in."
    EEN_american_cities_decision_category:0 "American Cities Project"
    EEN_pittsburgh_decision:0 "Fix up The Pitt"
    EEN_pittsburgh_decision_desc:0 "While The Pitt is an inhospitable place even with The Troggs almost all wiped out, there is something to be said for the fact that much of the city is still standing. With a hoard of scrap metal to be salvaged, functioning pre-war forges and the rail infrastructure to move this bounty to the fringes of The Capital Wasteland, it is almost a no-brainer that we should invest in a settlement here. While the toxic enviroment is a major deturrent, our engineers are sure that with the right resources we could turn some of these buildings into sealed units akin to a vault. Then only the workers that leave the buildings would be risking exposure. But honestly, a little exposure never killed anybody and is a wastelander even going to notice if they develop a new sore?"
    EEN_ronto_decision:0 "Ronto Rehabilitation Facility"
    EEN_ronto_decision_desc:0 "The ruins of Ronto contain a wealth of valuable salvage to support our reclaimation of America. Unfortunately, the ruins are dangerous and the winters are harsh. Our engineers have drawn up plans to turn the entire city into an internment facility for the worst subversives that refuse to accept the return of America. They are certain that with the right adjustments, W.A.S.H.I.N.G.T.O.N could supervise the facility with minimal human staffing, instead relying on robotic secuity and automated defenses. Those interned at the facility may be hesitant at first to comply, but a few days of hunger will have them filling our scavenging quotas to receive their rations. Perhaps if they collect enough salvage they will even be allowed to reintegrate to society."
    EEN_dc_decision:0 "Restore The National Mall"
    EEN_dc_decision_desc:0 "In the heart of the downtown DC Ruins is The National Mall. Once home to some of the worst fighting in The Capital Wasteland, the location has been largely peaceful since our soldiers swept the ruins. Before the bombs however, this location was the heart of America's government as well as many museums and monuments to past presidents. Once the rubble is cleared and a wall is built around the area, we will return this area to its past glory. The National Mall will be the beating heart of our civillian administration. Offices will be reopened, grounds will be maintained, and monuments restored. As for the museums, they will be adjusted by our propaganda department to ensure the correct history of our nation is portrayed to the visitors of The National Mall. We wouldn't want the public getting any wrong ideas."
    EEN_war_crimes_decision_category:0 "Tactics of Tomorrow"
    EEN_war_crimes_decision_category_desc:0 "The brightest minds in The Enclave are constantly coming up with new and innovative ways to engage in war with the mutant. These tactics require great cost, but deliver fantastic results."
    EEN_release_the_trogs_decision:0 "Release the Trogs"
    EEN_release_the_trogs_decision_desc:0 "Containers of trogs pulled from The Pitt will be set loose behind enemy lines. While they will eventually wipe them out, it should shake up their line for a time"
    EEN_grab_super_mutant_subjects_decision:0 "Procure FEV Specimins"
    EEN_grab_super_mutant_subjects_decision_desc:0 "Teams will be dispatched via vertibird to grab wastelanders from our screening centers and bring them back to Vault 87 to be turned into super mutants to fight for us!"
    EEN_send_bhs_test_subjects_decision:0 "Gather Test Subjects For BMMAU"
    EEN_send_bhs_test_subjects_decision_desc:0 "Our friend at the American Health Service is always looking for more test subjects for their attempts at curing mutation. Let us help them."
    EEN_create_robobrains_decision:0 "Collect Subjects For Robobrains"
    EEN_create_robobrains_decision_desc:0 "We will send strike teams with vertibirds beyond enemy lines to abduct their mutant populace. They will then be sent back where robotic chassis will be waiting for their brains."
    EEN_public_support_category:0 "Public Support Decisions"
    EEN_public_support_category_desc:0 "There are some actions we can take to garner public support. There are also measures that can be taken to improve our war readiness, but those may upset the common wastelander"
    EEN_draft_wastelanders_decision:0 "Draft Wastelanders"
    EEN_draft_wastelanders_decision_desc:0 "We will send recruiters to settlements collecting wastelanders for the military. Some cash has been set aside to settle any families that object to us grabbing their son or father, but this will still hurt our image."
    EEN_procure_specimins_decision:0 "Procure Specimens"
    EEN_procure_specimins_decision_desc:0 "The labcoats need some more test subjects than our prisons can provide. We will covertly snatch some malcontents and drifters that most shouldn't miss, but despite our best efforts to be covert, we may be spotted."
    EEN_distribute_extra_water_decision:0 "Distribute Extra Water"
    EEN_distribute_extra_water_decision_desc:0 "We will pull water from our reserves to distribute to the local waster trash. A few good photo-ops and word of mouth should help soften our image."
    EEN_requisition_civy_factory_decision:0 "Requisition Factory"
    EEN_requisition_civy_factory_decision_desc:0 "A civilian factory could serve the state better pumping out microfusion cells. The locals won't be too happy, but there is a war on!"
    EEN_support_militias_decision:0 "Support Local Militias"
    EEN_support_militias_decision_desc:0 "Donating some captured or old weapons to regional militias should remind the locals we care about their safety to a degree"
    EEN_spread_propaganda_decision:0 "Spread Propaganda"
    EEN_spread_propaganda_decision_desc:0 "Most wasters may not be able to read, but those that can will see our posters and realize we're definitely the good guys, and they should do everything we say."
    EEN_talon_support_dave:0 "Aid Daves Civil War"
    EEN_talon_support_dave_desc:0 "The various settlements of The Capital Wasteland are in the midst of a civil war over who will govern their collection of shacks. Our strategists suggest making sure the revolting leader known as Dave win this struggle. Per their estimates, his leadership would destabalize the settlements and make them more accepting of Enclave rule down the line. They suggest sending a contingent of Talon Company troops to help him in what they are dubbing Operation Pied Piper."
    EEN_loyalty_lab_assignments_decision:0 "Dangerous Lab Assignments"
    EEN_loyalty_lab_assignments_decision_desc:0 "Some scientists are clearly too indoctrinated to ever question their support to President Eden. Unfortunately for him, he does not make the duty rosters. Some of these scientists will be sent on less than safe field work."
    EEN_loyalty_officer_demotions_decision:0 "Demoting Officers"
    EEN_loyalty_officer_demotions_decision_desc:0 "While Colonel Autumn is the leader of The Enclave military, he still answers to The President. If Eden has cause to demote an officer, Autumn must comply. With the monitoring in Raven Rock, Eden always has cause."
    EEN_loyalty_inspiring_address_decision:0 "Give an Inspiring Address"
    EEN_loyalty_inspiring_address_decision_desc:0 "President Eden will address his people over the radio with a speech calculated to inspire patriotic fervor in 83.7% of listeners."
    EEN_loyalty_luxury_ration_decision:0 "Luxury Rations"
    EEN_loyalty_luxury_ration_decision_desc:0 "Distributing some luxury rations is a good way to raise spirits and faith in the president. Let them eat snack-cakes!"
    EEN_loyalty_adjust_duty_assignments_decision:0 "Adjust Duty Assignments"
    EEN_loyalty_adjust_duty_assignments_decision_desc:0 "Soldiers loyal to Colonel Autumn will be given preferential duty assignments. Meanwhile the less loyal will be delegated to cleaning toilets and deathclaw cages."
    EEN_fanum_decision:0 "The F.A.N.U.M Tax"
    EEN_fanum_decision_desc:0 "The Filtering And Neutralizing Unclean Materials Tax, or FANUM Tax, is a one-time tax proposed to be levied on the various wasteland communities in our territory. The tax is intended to be used in our city rebuilding project. However, many mutant-Americans likely won't take kindly to us reaching into their pockets even more."
    EEN_reconnect_decisions_category:0 "Reconnecting The Enclave"
    EEN_reconnect_decisions_category_desc:0 "Across the ruined United States are scattered Enclave outposts that have been on their own for years. Once we get closer to their neck of the woods, we should reconnect."
    EEN_reconnect_vanburen_decision:0 "Reconnect with VanBuren AFB"
    EEN_reconnect_vanburen_decision_desc:0 "The Enclave detachment at VanBuren Air Force Base has had their head in the clouds for years. We need to help them come down to Earth."
    EEN_reconnect_ontario_decision:0 "Reconnect with The Ontario Enclave"
    EEN_reconnect_ontario_decision_desc:0 "The Ontario Enclave has had a rough few decades, but the cavalry is here."
    EEN_reconnect_granite_decision:0 "Reconnect with Granite Company"
    EEN_reconnect_granite_decision_desc:0 "Their connection to The Rig may be dubious, but there is no denying what Granite and his associates accomplished out west. Let us go forward together."

    ###Ideas###
    EEN_raven_rock_science_labs_idea:0 "Raven Rock Labs"
    EEN_raven_rock_science_labs_idea_desc:0 "Staffed by some of the brightest minds of the American Wastes, the Raven Rock labs push the boundries of post-war science. Toiling endlessly to do their part in the rebuilding of America"
    EEN_new_enclave_idea:0 "New Enclave"
    EEN_new_enclave_idea_desc:0 "The fall of the Rig sent a shockwave through the Enclave. Officers across the wastes strugled to hold units together and carry on the work of rebuilding America. But for the first time in decades, the future is looking bright. The Enclave is back, and maybe better than ever."
    EEN_restoring_raven_rock_idea:0 "Raven Rock Restoration Comittee"
    EEN_restoring_raven_rock_idea_desc:0 "A team of engineers, security officers and civilian representatives working together to coordinate the transformation from a listening post to a true seat of power for the American government."
    EEN_air_traffic_control_idea:0 "Air Traffic Control"
    EEN_air_traffic_control_idea_desc:0 "Teams of experienced technicians monitor the flight paths and landing schedules of all deployed vertibirds. This minimizes crashes and ensures rapid turnaround."
    EEN_won_purity_idea:0 "Project Purity Victors"
    EEN_won_purity_idea_desc:0 "The power armored boyscouts of the Brotherhood of Steel thought they could take Project Purity from its rightful owners. This great victory will serve as a rallying cry to our troops."
    EEN_lost_purity_idea:0 "Licking our Wounds"
    EEN_lost_purity_idea_desc:0 "Project purity was a lesson we learned the hard way. Our men are shaken, but they know now how important it is to fight their hardest to defend our lands."
    EEN_navarro_scientists_idea:0 "Navarro Scientists"
    EEN_navarro_scientists_idea_desc:0 "Years ago we chose to prioritize rescuing the science staff at Navarro. Those men and women have since worked tirelessly on breakthroughs to help take back America."
    EEN_cloning_trials_idea:0 "Cloning Trials"
    EEN_cloning_trials_idea_desc:0 "With such a low population of pure humans across America, we have had to resort to cloning new citizens. This technology was cutting edge and flawed even before the war, so it will take a considerable amount of effort to perfect it now."
    EEN_successful_clones_idea:0 "Limited Cloning"
    EEN_successful_clones_idea_desc:0 "Cloning a walking, talking grown man is not feasable until we develop technology to implant the human psyche on a fresh brain. Cloning trials have still proven to be a useful venture. Cloned babies and on rare occasions, clones uses as organ banks have proven a boon to our population."
    EEN_rebuilding_command_idea:0 "Restructuring Command"
    EEN_rebuilding_command_idea_desc:0 "We have taken the first steps to restoring our military command to its required strength. However the loss of decades of experience in the corps is showing, it will take time to get to where we once were."
    EEN_green_command_idea:0 "Green Commanders"
    EEN_green_command_idea_desc:0 "Our new officers are in positions they are not adequately prepared to fill, but these are desperate times. They will have to learn fast."
    EEN_citadel_bos_archives:0 "Citadel Archives"
    EEN_citadel_bos_archives_desc:0 "Valuable pre-war data scraped from aging archives all around the DC area. While much of it was wiped by Brotherhood resistance, there is still a lot of good information that will be vital to our continued research."
    EEN_enclave_police_idea:0 "Enclave Police"
    EEN_enclave_police_idea_desc:0 "Not every soldier is cut out for front line duty. Soldiers grow old, soldiers get hurt, and some just decide they dont like burning mutants out of their ratholes. While it hurts the amount of soldiers that we can field, few are more qualified to keep order than an Enclave soldier."
    EEN_settler_police_idea:0 "Settler Policing"
    EEN_settler_police_idea_desc:0 "While not all of them are thrilled about Enclave rule, few would care more about the safety of their settlements than the people that live there. Giving local settlers the authority and training to keep their homes safe and quiet will mean less work for us."
    EEN_raider_police_idea:0 "Raider Policing"
    EEN_raider_police_idea_desc:0 "Not every raider we have encountered in the wastes is an anarchistic ruffian too stupid to recognize our authority. Some of them see themselves as local governers, protecting their territories from worse threats in exchange for obedience and some tax. We could give some of them a shot."
    EEN_raider_extermination_idea:0 "Raider Extermination Campaigns"
    EEN_raider_extermination_idea_desc:0 "Raiders have no place in our lands. When territory falls under our banner, briggands and ruffians are brought to heel or face hot plasma."
    EEN_raider_dealings_idea:0 "Dealings with Raiders"
    EEN_raider_dealings_idea_desc:0 "Some raider bosses are smart enough to see that fighting us is not profitable. We can work out deals with them for obedience and of course paying taxes on their raids."
    EEN_raider_resistance_idea:0 "Raider Resistance"
    EEN_raider_resistance_idea_desc:0 "Some raiders in our territory that were once in our employ are now causing problems. It will take time to bring them to heel"
    EEN_privateers_agency_idea:0 "Privateers Agency"
    EEN_privateers_agency_idea_desc:0 "The Privateers Agency handles the licensing, territorial claims, disputes and taxation of raider gangs seeking employment as Enclave Privateers."
    EEN_raider_warfare_idea:0 "Raider Warfare"
    EEN_raider_warfare_idea_desc:0 "Two opposing raider gangs in our territory are fighting and there is occasional collateral damage"
    EEN_raider_problems_idea:0 "Raider Problems"
    EEN_raider_problems_idea_desc:0 "From Girdershade to the Republic of Dave, raiders are taking full advantage of the chaos resulting from our reclaiming of American soil. Until we plug these holes in our borders and bring down the worst of the gangs, our domestic efforts will suffer."
    EEN_disorganized_settlements_idea:0 "Disorganized Settlements"
    EEN_disorganized_settlements_idea_desc:0 "Many settlements across our territory are still adjusting to life under our control. Bringing them all into the fold will take considerable administrative effort as well as manpower and resources."
    EEN_settlement_autonomy_idea:0 "Autonomous Settlements"
    EEN_settlement_autonomy_idea_desc:0 "The wastelander settlements in our territory enjoy relatively high levels of autonomy. The allowance of the continuation of the daily status-quo makes it easier to integrate new territories, but also hurts our ability to properly utilize the lands we control."
    EEN_join_or_die_idea:0 "Join or Die"
    EEN_join_or_die_idea_desc:0 "The towns we occupy have two choices. They either jump fully on board with the rebuilding of America, or end up in a mass grave. For some odd reason, this has some of them rather upset."
    EEN_trains_and_bridges_idea:0 "Trains and Bridges"
    EEN_trains_and_bridges_idea_desc:0 "We have more important things to do than rebuilding the crumbling highways of America. Railroads will suffice for now"
    EEN_cars_and_highways_idea:0 "Cars and Highways"
    EEN_cars_and_highways_idea_desc:0 "Once a great symbol of American freedom, a massive car cruising down our clear highways. It will return in our lifetime"
    EEN_secure_checkpoints_idea:0 "Security Checkpoints"
    EEN_secure_checkpoints_idea_desc:0 "Our road networks are dotted with security checkpoints at crucial junctures. There Enclave personel check documentation, cargo, and fight off the occasional attack. Some dismissed these as a drain on our resources, but they have proved useful in keeping the various settlements in line."
    EEN_highway_patrol_idea:0 "Highway Patrol"
    EEN_highway_patrol_idea_desc:0 "The arteries of our nation are patrolled by trained officers meant to keep the roads safe and keep an eye out for subversive elements. It may be costly, but it is worth it."
    EEN_general_infantry_focus_idea:0 "General Infantry Focus"
    EEN_general_infantry_focus_idea_desc:0 "Our focus on fielding larger and larger numbers of General Infantrymen has been a boon for our armed forces, but our administration and training have come to suffer."
    EEN_increased_arms_production_idea:0 "Mass Produced Arms"
    EEN_increased_arms_production_idea_desc:0 "With a larger army we can relax production standards to focus on pushing more weapons into the hands of our military"
    EEN_powered_infantry_idea:0 "Power Armor Forces Focus"
    EEN_powered_infantry_idea_desc:0 "While they are still supported by less heavily armored troops, power armored soldiers make up the backbone of our military. This limits our selection process and extends our training time considerably, but the added firepower is worth the tradeoffs."
    EEN_mechanized_infantry_idea:0 "Armored Cavalry Focus"
    EEN_mechanized_infantry_desc:0 "The average wastelander military relies on brahmin pulled carts and footpower to move their forces. Mechanized forces outpacing them and blasting through lines are massive benefits that outweigh the heavy cost and burden of training all these yokels how to drive."
    EEN_unstable_leadership_idea:0 "Unstable Leadership"
    EEN_unstable_leadership_idea_desc:0 "The recent coup has caused a ripple effect through the entire Enclave. Roles need replacing, damage needs repairing and people are unsure about the future. It will take some time before the wounds heal, and we will have to power through it."
    EEN_adapting_vehicles_idea:0 "Adapted Vehicles"
    EEN_adapting_vehicles_idea_desc:0 "Reinforced suspensions to handle rough roads, heavy plows to clear blockades, fortified windows, all adaptations that will be needed to make our vehicles fit for wasteland warfare."
    EEN_arms_mass_production_idea:0 "Mass Produced Arms"
    EEN_arms_mass_production_idea_desc:0 "Arming the masses will result in a reduction in quality, but in the end what is 1 in 10 weapons malfunctioning when the enemy is facing down 1,000 guns?"
    EEN_scheming_scientists_idea:0 "Scheming Scientists"
    EEN_scheming_scientists_idea_desc:0 "Our science teams are full of rats. Traitors that supported the abomination known as Eden and still actively try to undermine our efforts in favor of his impractical ideas. Until we do something about this, our science efforts will be hampered."
    EEN_purged_scientists_idea:0 "Purged Scientists"
    EEN_purged_scientists_idea_desc:0 "Many of our Scientists were trechorous vermin that assisted Eden during his deposition. Executing them for their crimes after the installation of Autumn as president has left a large amount of scientific departments vacant."
    EEN_wastelander_scientists_idea:0 "Wasteland's Brightest"
    EEN_wastelander_scientists_idea_desc:0 "The best and brightest minds of The Capital Wasteland and beyond are starting to hear about the benefits of The Enclave Science Division. Quality equipment, stable power and of course steady pay. As we continue to attract more and more scientists that wish to build tomorrow for us, we must remember to test applicants carefully. There is no university in the wastes. Any crackpot can find a labcoat and say they understand theoretical physics."
    EEN_dragged_into_tomorrow_idea:0 "Unteathered Science"
    EEN_dragged_into_tomorrow_idea_desc:0 "Our scientists enjoy unbridled freedom. A steady supply of mutie test subjects and little oversight will ensure continued progress. Nothing can go wrong."
    EEN_command_subroutines_idea:0 "Command Subroutines"
    EEN_command_subroutines_idea_desc:0 "President Eden, being one of the most advanced pieces of pre-war computer engineering, surely has processing power enough to direcly run our military at the same time as running our entire country."
    EEN_fev_project_purity_idea:0 "FEV Contamination"
    EEN_fev_project_purity_idea_desc:0 "The wasteland's water has been horribly tainted by a modified FEV Virus. People are dying by the hundreds. If something is not done soon, the Capital Wastleand will become a graveyard."
    EEN_cure_clinics_idea:0 "Cure Clinics"
    EEN_cure_clinics_idea_desc:0 "Several clinics have been set up to study the effects of FEV tainted water on wastelanders. While the populace thinks we are doing all we can to cure them of this mystery plague, we are really just studying the effects and trying to isolate what is causing some of these mutants to adapt and overcome the virus."
    EEN_escorted_water_caravans_idea:0 "Escorted Water Caravans"
    EEN_escorted_water_caravans_idea_desc:0 "Though resource and manpower intensive, one can not argue with the results of our water caravans. Nearly every settlement they stop at sees a drastic decrease in mutant population within a couple weeks."
    EEN_rulers_of_dc_idea:0 "Rulers of DC"
    EEN_rulers_of_dc_idea_desc:0 "The Brotherhood is defeated, leaving The Enclave as the sole power of The Capital Wasteland."
    EEN_adams_afb_arty_idea:0 "Artillery Placements"
    EEN_adams_afb_arty_idea_desc:0 "Multiple fall back lines with pre-sighted artillery placements to cover retreats and counter-attacks will play a pivotal role in our defence if some hostile force ever breaches our ourter bunkers."
    EEN_hunting_bos_insurgents_idea:0 "Hunting BoS Insurgents"
    EEN_hunting_bos_insurgents_idea_desc:0 "The Brotherhood rabble still cause trouble from their little holdouts across the wastes. Hunting them is a costly but necessary task."
    EEN_dealing_with_bos_insurgents_idea:0 "Deals with BoS Insurgents"
    EEN_dealing_with_bos_insurgents_idea_desc:0 "While some of the Brotherhood terrorists will fight until they are melted by plasma fire, there are plenty that know it is a lost cause and can be convinced to surrender. Still, this is a careful road we must walk."
    EEN_prisoner_experiments_idea:0 "Prisoner Test Subjects"
    EEN_prisoner_experiments_idea_desc:0 "Terrorists, murderers, even petty criminals will be eligible for selection by our science teams to be test subjects. While some under our rule may find this problematic, these criminals gave up their rights when they violated our laws."
    EEN_military_governors_idea:0 "Military Governors"
    EEN_military_governors_idea_desc:0 "Until we can gather lists of suitable candidates and arrange elections, officers will have to handle civilian administration as well as running their squads. It is not a great solution, but it is better than letting our enemies keep control."
    EEN_bos_insurgents_idea:0 "Brotherhood Insurgents"
    EEN_bos_insurgents_idea_desc:0 "The terrorists of The Brotherhood of Steel just do not know when to quit. Their leadership is shattered, their home is under our control and most of their soldiers are dead, but still they fight on. This will be a thorn in our side for some time."
    EEN_all_seeing_eyebot_idea:0 "The All Seeing Eyebot"
    EEN_all_seeing_eyebot_idea_desc:0 "Eyebot scouts scour the wastes. We see all, we know all, and our enemies will be worse off for it."
    EEN_vertibird_supply_idea:0 "Vertibird Supply"
    EEN_vertibird_supply_idea_desc:0 "Troops in the field look to the skies for their resupply. It makes it easier to supply troops across long ranges, but damn is it eating up fuel."
    EEN_fob_depots_idea:0 "FOB Depots"
    EEN_fob_depots_idea_desc:0 "Having central outposts for our troops to report to for resupply seriously reduces the fuel cost of vertibird supply drops."
    EEN_take_equipment_idea:0 "Take what you need"
    EEN_take_equipment_idea_desc:0 "While some would say taking equipment and food from the populace makes us little better than the common raider, those people forget that we are the government and these mutants have no right to occupy our territory."
    EEN_wasteland_supply_idea:0 "Wasteland Supply Corps"
    EEN_wasteland_supply_idea_desc:0 "A separate division of the army has been formed just for the task of surveying battlefields and newly reclaimed territory for useful equipment. This will greatly lessen our supply troubles."
    EEN_supply_troubles_idea:0 "Supply Problems"
    EEN_supply_troubles_idea_desc:0 "Supplying our troops over large swaths of controlled territory is a unique problem that our best and brightest officers had accounted for, but then we had to kill them for siding with Colonel Autumn... so here we are."
    EEN_robot_factories_idea:0 "Robot Plants"
    EEN_robot_factories_idea_desc:0 "Focusing on the production of robots will cause other arms production to suffer, but why would an army of sentry bots need more plasma rifles?"
    EEN_american_implants_idea:0 "American Implants"
    EEN_american_implants_idea_desc:0 "Every implant from military to civilian will include the all important ENC-1776 chip. While officially this is a chip in charge of regulating temperature in the implant, what it really does is subtly influence the thoughts of its user, to make them more American and thus more free."
    EEN_deathclaw_augmentations_idea:0 "Deathclaw Augmentations"
    EEN_deathclaw_augmentations_idea_desc:0 "Deathclaws with advanced armor and weapons? What could possibly go wrong?"
    EEN_debugging_mainframe_idea:0 "Debugging the Mainframe"
    EEN_debugging_mainframe_idea_desc:0 "Before being shut down the Adams AFB security sent a particularly annoying virus into our computer systems. It will take time to clear this virus, and in that time our administration and research will suffer."
    EEN_water_backed_currency_idea:0 "Water Backed Currency"
    EEN_water_backed_currency_idea_desc:0 "Like the bottlecap, our currency is backed by clean water. Unlike the bottlecap, this promise is not just made by some random collection of merchants, but The United States Government. That shold inspire more faith."
    EEN_distributing_water_idea:0 "Distributing Water to New Citizens"
    EEN_distributing_water_idea_desc:0 "By order of Commander in Chief Autumn, emergency water rations are being distributed to civilians at recently occupied settlements. This temporary measure should win us the hearts and minds of our recently liberated citizens."
    EEN_fiat_currency_idea:0 "Fiat Currency"
    EEN_fiat_currency_idea_desc:0 "Wastelanders are not used to the idea of a fiat currency, we will make sure they understand that a dollar is worth a dollar because we say so."
    EEN_successful_trog_hunts_idea:0 "Successful Trog Hunts"
    EEN_successful_trog_hunts_idea_desc:0 "The trog hunts in the ruins of Pittsburgh are going well. Casualties are lower than expected and we are expected to wrap this entire operation up ahead of schedule."
    EEN_rough_trog_hunts_idea:0 "Difficult Trog Hunts"
    EEN_rough_trog_hunts_idea_desc:0 "The Trog hunts in the ruins of Pittsburgh are going about as expected. While we are grinding down the trog population, we are losing good men every day. Thankfully an end is in sight."
    EEN_horrible_trog_hunts_idea:0 "Horrible Trog Hunts"
    EEN_horrible_trog_hunts_idea_desc:0 "The trog hunts in the ruins of Pittsburgh have been nothing short of a disaster. Casualty reports are well outside expected numbers and it seems like every time we sweep an area of trogs, more pop up in their place overnight. The ruins have been dubbed 'the meat grinder' by the infantry  and many now consider assignment there a death sentence. The sooner we can finish this the better."
    EEN_deporting_muties_idea:0 "Relocating Mutants"
    EEN_deporting_muties_idea_desc:0 "The Amish mutants of Gelassenheit, while just as repugnant as muties elsewhere, have proven themselves useful. After negotiation they have agreed to let us relocate the ghouls and other horrible mutants in our civilized territories to live in their rural communities."
    EEN_slow_march_north_idea:0 "The Slow March North"
    EEN_slow_march_north_idea_desc:0 "Waging war and bringing order to the great frozen north will take considerable planning. Many military experts and researchers may have been pulled away from other tasks, but we are already seeing good results."
    EEN_strong_public_support_idea:0 "Strong Public Support"
    EEN_strong_public_support_idea_desc:0 "The average wastelander has a positive outlook on The Enclave. According to a recent survey, 7 out of 10 wastelanders surveyed say their lives have gotten better since The Enclave came to their town, and 1 out of those 3 who disagreed was a ghoul so they don't count."
    EEN_midling_public_support_idea:0 "Midling Public Support"
    EEN_midling_public_support_idea_desc:0 "The general public perception of The Enclave is one of cautious optimism. There are plenty of detractors that denounce some of our policies, but the average wastelander doesn't care about things like 'ghoul rights' or some alleged war crimes. They just want cold water, warm lunch, and a place to shit with a door on it. So long as we continue to provide those, we should be fine."
    EEN_precarious_public_support_idea:0 "Precarious Public Support"
    EEN_precarious_public_support_idea_desc:0 "The grumblings of the public are growing louder. While the average wastelander still would not do much more than complain in their hovels, resistance groups are attracting more support with each day. If we are not careful, we could see some revolts pop up."
    EEN_crumbling_public_support_idea:0 "Crumbling Public Support"
    EEN_crumbling_public_support_idea_desc:0 "Faith in The Enclave is crumbling. Only the few true believers in The American Dream still stand with us. Patrols are being ambushed in areas that were once clear and workers are walking out of arms plants. We need to take drastic measures to fix this, or we could see a repeat of The Rig."
    EEN_wastelander_guinea_pigs_idea:0 "Wasteland Guinea Pigs"
    EEN_wastelander_guinea_pigs_idea_desc:0 "Through deception, purchase or good ol'fashoned abductions, wastelanders are brought back to our labs where they give their lives in the pursuit of science. While the occasional wastelander catches on and begins searching for their lost freind or family member, they usually just end up being another wasteland guinea pig."
    EEN_building_capital_idea:0 "Building a Capital"
    EEN_building_capital_idea_desc:0 "The people of The Enclave have lived in bunkers too long, but the cities of the wasteland are not places for humans to call home. We will have to build the first real city since the bombs fell, and damn will it take a lot of work."
    EEN_city_on_a_hill_idea:0 "A City on a Hill"
    EEN_city_on_a_hill_idea_desc:0 "Lincoln, the new capital of The United States of America, is a shining light in a bleak wasteland. This city serves as a model for what The Enclave will deliver to every red-blooded American citizen. This city inspires all in The Enclave to work and fight harder so that our ideals will be made manifest from sea to shining sea."
    EEN_comms_trouble_idea:0 "Comms Trouble"
    EEN_comms_trouble_idea_desc:0 "During the coup, our communications equipment was sabotaged to prevent requests for reinforcements. Thankfully we did not need support, but now we need to repair the equipment or our military operations will suffer."
    EEN_library_of_congress_idea:0 "Library of Congress"
    EEN_library_of_congress_idea_desc:0 "With access to the Library of Congress' archives, we are able to recover centuries of important documents, works of literature and some limited practical guides thought lost to time."
    EEN_super_mutant_slaves_idea:0 "Super Mutant Slaves"
    EEN_super_mutant_slaves_idea_desc:0 "Strong enough to do the work of 5 men and too dumb to trick their overseers, Super Mutants would make for the perfect workforce if it was not for two small problems they are strong enough to beat 5 men to death at a time and too dumb to follow their overseers instructions."
    EEN_relocating_command_idea:0 "Relocating the High Command"
    EEN_relocating_command_idea_desc:0 "While we continue restoring The Pentagon and gradually relocating more and more of our military command structure to the facility, there will naturally be delays in other projects and gaps in the chain of command during the move. Good thing we already defeated our biggest threats in the region."
    EEN_rebuilding_city_project_idea:0 "Grand City Project"
    EEN_rebuilding_city_project_idea_desc:0 "Obviously we are not in any state to rebuild an entire destroyed pre-war city to its former glory. But if we focus our efforts we can fix up an area that was not too badly damaged to the point that, by wasteland standards, it is a glorious city. It will take a near complete focus of our building efforts, and require a long time as well as resources, but it should be worth it."
    EEN_water_crisis_1_idea:0 "Trading for Water"
    EEN_water_crisis_1_idea_desc:0 "Despite a near unlimited supply of water from Project Purity, we overextended our water reserves and are facing a massive crisis. To cope, we have resorted to trading with water traders outside our territory until we can get the supply back under control."
    EEN_water_crisis_2_idea:0 "Economic Halt"
    EEN_water_crisis_2_idea_desc:0 "Despite a near unlimited supply of water from Project Purity, we overextended our water reserves and are facing a massive crisis. By executive order, Commander in Chief Autumn has put a limit on withdrawals from water depots while the government adjusts consumption and supply."
    EEN_talon_scouts_idea:0 "Talon Scouts"
    EEN_talon_scouts_idea_desc:0 "Former Talon Company mercenaries have been integrated into our military as advance scouts. Their expertise in wasteland navigation has proven valuable, but their lack of discipline has on occasion spread to other recruits."
    EEN_enclave_remnants_idea:0 "Enclave Remnants"
    EEN_enclave_remnants_idea_desc:0 "Decades ago, The American Dream nearly died with the destruction of Control Station Enclave. This can not, and will not happen again. Every man, woman and child of The Enclave knows the importance of our mission. They are ready to sacrifice all that they have for this noble goal. We will rebuild America, and we will do it with the most advanced army this nation has seen since The Great War. But we must be careful with how we proceed. We may not get another chance at this if we fail."
    EEN_bloodied_remnants_idea:0 "Bloodied Remnants"
    EEN_bloodied_remnants_idea_desc:0 "Decades ago, The American Dream nearly died with the destruction of Control Station Enclave. After losing Raven Rock it seems like history will repeat itself again. Every man, woman and child of The Enclave that remains standing knows the importance of our mission. Adams Air Force Base will not be another Navarro. We are ready to sacrifice all that we have to make sure that does not come to pass. We will rebuild America, and we will do it with the most advanced army this nation has seen since The Great War. It is only a matter of time before the enemy finds us, and we will not get another chance at this if we fail."
    EEN_super_duper_refugee_camp_idea:0 "Super Duper Refugee Camp"
    EEN_super_duper_refugee_camp_idea_desc:0 "The old Super Duper Mart, parking lot and surrounding area have been transformed into a temporary holding facility for dispalced citizens and citizens having a hard time adjusting to our rule. Just how temporary the stay is depends on how quickly these new citizens adjust to the American way of life."
    EEN_rivet_city_labs_idea:0 "Rivet City Labs"
    EEN_rivet_city_labs_idea_desc:0 "With Enclave equipment, expertiese, and of course funding, the labs at Rivet City have reached hights never expected by their founders. While generally left to their own devices, they are occasionally urged to assist in projects undertaken by our science teams."
    EEN_labs_funded_idea:0 "Funded Labs"
    EEN_labs_funded_idea_desc:0 "With funding from The Enclave, our labs are able to operate as they should. No longer do we have to rely on donations from individuals or call off projects due to running out of caps."
    EEN_resurgent_enclave_idea:0 "Resurgent Enclave"
    EEN_resurgent_enclave_idea_desc:0 "The Enclave is back and some would say better than ever. Project Purity is under our control, the cancer of mutant sympathies has been rooted out and news of our victory over The Brotherhood has spread far and wide. We will continue our mission with renewed vigor, and soon this great country will live again."
    EEN_enclave_leadership_idea:0 "Enclave Leadership"
    EEN_enclave_leadership_idea_desc:0 "No matter the changes at the settlement level or in a few cabinet positions, we are still at our heart The Enclave. With our military and technological might, as well as the almost limitless clean water from Project Purity, we will bring order to these ruined United States by any means necessary."
    EEN_americas_mercs_idea:0 "America's Mercs"
    EEN_americas_mercs_idea_desc:0 "Talon Company has the full support and endorsement of The United States Government. While that means there is a little more red tape and rules on what we can do, it is worth it for all the sweet gear and protections we get. Not to mention that ongoing contract with The Enclave."
    EEN_talon_funding_idea:0 "Funding Talon Co"
    EEN_talon_funding_idea_desc:0 "We have allowed Talon Company to be hired by American Citizens once again, but we remain their primary employer. Talon Company are provided with necessary material and compensation for their work assisting our military, and it gives us the added benefit of keeping a tight leash on them."
    EEN_investigating_talon_co_idea:0 "Investigating Talon Company"
    EEN_investigating_talon_co_idea_desc:0 "A thorough investigation into the administration and activites of Talon Company is taxing on resources, but it is necessary if we are to ensure they stay in line"
    EEN_enclave_investigation_idea:0 "Enclave Investigators"
    EEN_enclave_investigation_idea_desc:0 "The Enclave have sent some suits down to root out corruption in our administration. They are leaving no stone unturned and arresting anybody they think has broken the law."
    EEN_manifesting_destiny_idea:0 "Manifesting Destiny"
    EEN_manifesting_destiny_idea_desc:0 "In recent years we have achieved great things. DC is once again under the control of The US Government, we have a stable production base and our military is stronger than ever. Now is the time to look West."
    EEN_trogs_running_wild_idea:0 "Trogs Running Wild"
    EEN_trogs_running_wild_idea_desc:0 "The Enclave unleashed trogs behind our lines and it is causing immense damage while we try to get it under control"
    EEN_out_of_practice_idea:0 "The Old and Unexperienced"
    EEN_out_of_practice_idea_desc:0 "The last 30 years we have sat in Raven Rock slowly rebuilding our strength. Though we are now stronger than we were 30 years ago, we have to face the fact that our army suffers from a serious problem. Our armed forces consist entirely of elderly veterans past their prime, or young men that have never seen action outside a simulation. Our first steps out into the wasteland will be shakey ones, but our soldiers should be able to adapt with time."
    EEN_hate_bos_idea:0 "Brotherhood Fighting Expertise"
    EEN_hate_bos_idea_desc:0 "Some of us remember doing battle with The Brotherhood years back on The West Coast. An archaic group like them is unlikely to have changed their tactics much in that time, and we can use that to our advantage."
    EEN_water_distribution_construction_idea:0 "Constructing Water Distribution Centers"
    EEN_water_distribution_construction_idea_desc:0 "We are diverting all the resources we can to the construction of new water distribution centers. These fortified compounds will serve as the center of Enclave Order in these wretched wastes. Finding suitable wastelanders to staff them is proving just as taxing as building the places themselves!"
    EEN_reclimation_teams_idea:0 "Scavenging Teams"
    EEN_reclimation_teams_idea_desc:0 "Dedicated squads of soldiers will be sent to reclaim looted US Government equipment from the hands of our fallen enemies. A 200 year old laser rifle may not be top of the line, but it is ours and we can make use of it!"
    EEN_recon_and_infil_idea:0 "Recon and Infiltration"
    EEN_recon_and_infil_idea_desc:0 "Our Sigma Intelligence Office will prioritize infiltrating our enemies and gathering their secrets, rather than tearing them apart from the inside."
    EEN_sabotage_and_raids_idea:0 "Sabotage and Daring Raids"
    EEN_sabotage_and_raids_idea_desc:0 "Our Sigma Intelligence Office will prioritize disrupting our enemies from behind their lines, rather than gathering intel."
    EEN_wastelander_study_sigma_idea:0 "Wastelander Study"
    EEN_wastelander_study_sigma_idea_desc:0 "Our study of wastelanders has made dealing with our enemies both within and beyond our borders much easier"
    EEN_sigma_funding_1_idea:0 "Funding the SIO"
    EEN_sigma_funding_1_idea_desc:0 "Additional resources have been allocated to The Sigma Intelligence Office"
    EEN_sigma_funding_2_idea:0 "Funding the SIO"
    EEN_sigma_funding_2_idea_desc:0 "Additional resources have been allocated to The Sigma Intelligence Office"
    EEN_enclaves_eyes_1_idea:0 "The Enclaves Eyes"
    EEN_enclaves_eyes_1_idea_desc:0 "The fear of the SIO keeps wastelanders in line, even when they are not around."
    EEN_enclaves_eyes_2_idea:0 "The Enclaves Eyes"
    EEN_enclaves_eyes_2_idea_desc:0 "The fear of the SIO keeps wastelanders in line, even when they are not around."
    EEN_no_outsiders_law:0 "Enclave Only"
    EEN_no_outsiders_law_desc:0 "We can not allow mutated wastelanders to serve in our armed forces. Doing such a thing would endanger The Enclave as a whole, and with it the future of America!"
    EEN_joint_training_idea:0 "Wargames"
    EEN_joint_training_idea_desc:0 "The Enclave and Talon Company engage in periodic wargames as well as joint training exercises."
    EEN_bear_killer_idea:0 "Lessons of Bear Killers"
    EEN_bear_killer_idea_desc:0 "Granite Company still bears the scars of conflict with The NCR. They may not have killed the bear, but they know how to hurt it."
    EEN_bhs_treatments_idea:0 "US Health Service Treatments"
    EEN_bhs_treatments_idea_desc:0 "BMMAU spent decades attempting to treat a variety of wasteland ailments and mutations. While these treatments were performed on non-compliants, some of them can be applied to real humans."
    EEN_creating_robobrains_idea:0 "Assembling Robobrains"
    EEN_creating_robobrains_idea_desc:0 "Robobrains are being assembled as we speak. Though taxing on our resources and production, the end results will be worth it."
    EEN_disrupted_military_idea:0 "Disrupted Military"
    EEN_disrupted_military_idea_desc:0 "Recent politically motivated reassignments have disrupted our military."
    EEN_disrupted_research_idea:0 "Disrupted Research"
    EEN_disrupted_research_idea_desc:0 "Recent politically motivated reassignments have disrupted our science department."
    EEN_brotherhood_fighting_history_idea:0 "Brotherhood Conflict Studies"
    EEN_brotherhood_fighting_history_idea_desc:0 "Chicago and Raven Rock both had volumes of data on conflicts with The Brotherhood of Steel. These records have allowed us to piece together a comprehensive understanding of their combat doctrine. Knowing what moves they'll make before they do will give us an advantage."
    EEN_lost_enclave_idea:0 "A Dying Nation"
    EEN_lost_enclave_idea_desc:0 "We may have won our war with Chicago, but what does it matter? Lincoln and Chicago, both home to the last major populations of pure humans are gone. Without a major breakthrough in science, humanity will not make it through the end of the next century. That is the least of our concerns. The conflict has left our military decimated and our population disillusioned. It is very likely we would not survive a conflict with a large wasteland nation."
    EEN_home_of_enclave_vp_idea:0 "Home of Americas Vice President"
    EEN_home_of_enclave_vp_idea_dsc:0 "The Vice President of America is also from our territory and maintains a high position. With the president's ear, they are able to influence policy to our benefit."
    EEN_vp_heymann_idea:0 "Vice President Heymann"
    EEN_vp_heymann_idea_desc:0 "Harold Heymann out of Chicago has been appointed the Vice President of The United States of America. Even though the position is largely ceremonial, Heymann has used his position to influence some policy and his frequent addresses about the past greatness of America inspires our populace."
    EEN_vp_porter_idea:0 "Vice President Porter"
    EEN_vp_porter_idea_desc:0 "Ambassador Porter out of Chicago has been appointed the Vice President of The United States of America. Even though the position is largely ceremonial, Porter has settled into the role well and taken it upon himself to direct wastelander relations. The man could sell radaway to a feral ghoul, and he uses that silver tongue to convince wastelanders our rule really is in their best interests."
    EEN_vp_hurley_idea:0 "Vice President Hurley"
    EEN_vp_hurley_idea_desc:0 "Rick Hurley out of Ontario has been appointed the Vice President of The United States of America. Even though the position is largely ceremonial, the officer has settled into the role well. Through a series of speeches and interviews he has spread the tale of The Ontario Enclave's ability to overcome impossible odds. This has further invigorated our already enthusiastic military."
    EEN_vp_pillow_idea:0 "Vice President Pillow"
    EEN_vp_pillow_idea_desc:0 "Cadmus Pillow out of Florida has been appointed the Vice President of The United States of America. Even though the position is largely ceremonial, Pillow has used his position to influence some policy relating to military research. More resources than ever are being poured into aerospace engineering research."
    EEN_vp_coburn_idea:0 "Vice President Coburn"
    EEN_vp_coburn_idea_desc:0 "Dr. Robert Coburn out of Florida has been appointed the Vice President of The United States of America. Even though the position is largley ceremonial, Dr. Coburn has used his position to inspire a new generation of scientists to pursue the impossible through careers in The Enclave Science Department. This old man says the future is now."
    EEN_vp_peterson_idea:0 "Vice President Peterson"
    EEN_vp_peterson_idea_desc:0 "Christopher Peterson out of Florida has been appointed the Vice President of The United States of America. Though the position is largely ceremonial, that has not stopped the ambitious officer from using his influence to shake up the political scene in Lincoln. Not all of these shakeups have been bad, as the young officer has managed to streamline some governmental processes. Goodbye form OF-5057."
    EEN_vp_mccarthy_idea:0 "Vice President McCarthy"
    EEN_vp_mccarthy_idea_desc:0 "Josh McCarthy out of Raven Rock has been appointed the Vice President of The United States of America. Though the position is largely ceremonial, McCarthy has used his position to encourage investment in America's arms industry."
    EEN_vp_granite_idea:0 "Vice President Granite"
    EEN_vp_granite_idea_desc:0 "Douglas Granite out of California has been appointed the Vice President of The United States of America. Though the position is largely ceremonial, Granite has done a good job inspiring the people of our nation. If we didn't have Eden, this guy would probably make a good president."
    EEN_escaped_scientists_idea:0 "Escaped Raven Rock Scientists"
    EEN_escaped_scientists_idea_desc:0 "Enclave scientists that escaped Autumn's purges at Raven Rock have integrated to our science department. Though they are not as well educated as a Chicago Institute graduate, they have their uses."
    EEN_rebuilt_pitt_idea:0 "Pitt Industrial Zone"
    EEN_rebuilt_pitt_idea_desc:0 "With our investment, we have turned The Pitt from a dirty arms factory for raiders into a sophisticated resource reclimation center. It serves as the heart of our industry."
    EEN_rebuilt_ronto_idea:0 "Ronto Rehabilitation Facility"
    EEN_rebuilt_ronto_idea_desc:0 "The resources pulled from the ruins of Toronto by the interned wastelanders are trivial. What isn't trivial is the effect it has on the populace. Every wastelander fears being sent to Toronto, and that fear keeps them in line."
    EEN_rebuilt_dc_idea:0 "The National Mall"
    EEN_rebuilt_dc_idea_desc:0 "The beating heart of our nation, The National Mall, is swarming with bureaucrats and tourists. The bureaucrats keep our nation running. The tourists bring caps to the local economy. After visiting our museums, they return home telling their family and friends about things they learned. Things like how we killed commies on the moon to save the world."
    centralization_enclave_president:0 "Presidential Decree"
    centralization_enclave_president_desc:0 "The office of The President presides over our entire nation. Our chief executive guides The Enclave, and thus America. He will never rest until we have the nation we deserve."
    centralization_enclave_military:0 "Military Command"
    centralization_enclave_military_desc:0 "For the forseeable future, our territory will be governed by the military. The Commanding Officer is the supreme authority and the chain of command is strictly adhered to, with civilians at the bottom."
    centralization_enclave_limited_autonomy:0 "Limited Settlement Autonomy"
    centralization_enclave_limited_autonomy_desc:0 "Our Military High Command dictates the path of our nation as well as policy. However, limited day to day governance has been entrusted to local civilian leadership. Only in the case of leadership failing to meet quotas or enforce order is our attention drawn back to these petty backwaters."
    centralization_enclave_military_oversight:0 "Military Oversight"
    centralization_enclave_military_oversight_desc:0 "Our Military High Command dictates the path of our nation as well as policy. The orders of this body flow down the chain of command to junior officers who administrate territories through local offices."
    centralization_enclave_lincoln:0 "The Lincoln Accords"
    centralization_enclave_lincoln_desc:0 "The office of The President presides over our entire nation. However, local secretaries, officers, and other officials have leeway to operate as they wish. This autonomy is allowed so long as their operations do not run contrary to the greater goals of The Enclave."
 
    ###Opinion Modifiers###
    EEN_employer_modifier:0 "Enclave Employee"
    EEN_employer_modifier_desc:0 "These Enclave guys may be pretty serious and boring, but they pay well. What's the worse that can happen?"
    EEN_employee_modifier:0 "Good Employees"
    EEN_employee_modifier_desc:0 "These Talon Company sorts may not be as professional as Enclave personel, but they get the job done and don't ask questions."
    EEN_backup_base_modifier:0 "Secondary Base"
    EEN_backup_base_modifier_desc:0 "Adams AFB serves as a secondary base for us in this region. Should the worst ever come to happen, and we lose Raven Rock, we will relocate here."
    EEN_govt_modifier:0 "The US Government"
    EEN_govt_modifier_desc:0 "Adams AFB Security system recognizes The Enclave as The US Government, and as such allows their soldiers full run of the facility."

    ###Factions###
    EEN_eastern_command_faction:0 "Enclave Eastern Command"
    EEN_enclave_states_america_faction:0 "The Enclave States of America"
    EEN_american_reconstruction_authority:0 "The American Reconstruction Authority"

    ###National Focuses###
    EEN_nf_a001:0 "Treasures of Raven Rock"
    EEN_nf_a001_desc:0 "The Raven Rock listening post lay quiet and waiting for centuries. Just what is inside?"
    EEN_nf_a002:0 "Presidential Personality"
    EEN_nf_a002_desc:0 "For centuries the Zax computer of Raven Rock sat pouring over the archives. It became fascinated with the lives of the Presidents, pouring over their lives and their deeds. Particularly the life and achievements of President Lincoln."
    EEN_nf_a003:0 "Contacting Navarro"
    EEN_nf_a003_desc:0 "Monitoring for centuries and reading the lives of Presidents, the Zax computer listened until the biggest news of the last 200 years came along. In 2242 the oil rig that served as Control Station Enclave. This awoke something in the Zax computer. He became President John Henry Eden. A president the Enclave needed, and he reached out to the desperate Enclave troops of the west."
    EEN_nf_a004:0 "The New Enclave"
    EEN_nf_a004_desc:0 "For nearly 30 years the Enclave at Raven Rock built itself up, even after the base at Navarro went silent. Sitting silently in the bunker, toiling behind their walls. Now the forces of this new Enclave are taking their first steps out into the light of the wastes, ready to save America."
    EEN_nf_a005:0 "Restoring Raven Rock"
    EEN_nf_a005_desc:0 "Raven Rock was never meant to be a base of operations for the new American government. While it has had suitable tools sitting behind its walls, a lot of work will be needed for it to be the seat of the highest power of the land."
    EEN_nf_a006:0 "Bringing Bays Online"
    EEN_nf_a006_desc:0 "The vertibird bays of Raven Rock have laid mostly silent since the influx of personnel nearly 30 years ago. Now that we are getting ready to retake America, we should work to bring those bays online"
    EEN_nf_a007:0 "Mothballed Vertibirds"
    EEN_nf_a007_desc:0 "Aside from a few used for essential missions, most of our vertibirds were mothballed after the mass exodus. We need to bring them back to operating order."
    EEN_nf_a008:0 "Damaged Birds"
    EEN_nf_a008_desc:0 "Many vertibirds saw damage either from stray gunfire on the trip east or harder than anticipated landings. Our priorities have now shifted and we need to get them in fixed."
    EEN_nf_a009:0 "Air Traffic Control"
    EEN_nf_a009_desc:0 "Our bays are limited and will not be able to accommodate all our deployed vertibirds at once. We should assign some less combat-ready personel to handle air traffic control to ensure quick turnarounds and less fuel is wasted by birds circling waiting for an open landing zone."
    EEN_nf_a010:0 "Raven Rock Labs"
    EEN_nf_a010_desc:0 "One of the storage bays in the east wing has had its contents emptied out in the newly spurred production. With some effort it can be converted into a makeshift science center for our researchers to do their vital work, and maybe dust off some old blueprints."
    EEN_nf_a011:0 "Biological Research"
    EEN_nf_a011_desc:0 "The radiation and FEV of the wasteland are deadly enemies that may turn to valuable tools. We must research their effects."
    EEN_nf_a012:0 "Weapons Research"
    EEN_nf_a012_desc:0 "This wasteland is beset with horrid beasts. Deathclaws, super mutants, and those same Brotherhood of Steel bastards that helped destroy the rig. We will need to create new weaponry to combat these dangers."
    EEN_nf_a013:0 "Hellfire Armor"
    EEN_nf_a013_desc:0 "Power armor has seen a few small improvements since the destruction of the rig, but nothing substantial. That is about to change. Researchers are finalizing designs for specialized heat-resistant power armor, dubbed Hellfire Armor. There is however one major drawback. The advanced materials and manufacturing techniques required to produce this armor mean we will not be able to produce it in high enough numbers to outfit our entire force for many years. In addition, to finish the research and begin production, we will need to pull resources from the Duraframe Eyebot project."
    EEN_nf_a0131:0 "Duraframe Eyebots"
    EEN_nf_a0131_desc:0 "President Eden loves his little eyebots. For years he has pulled resources from other projects to find ways to strengthen the machines enough to make them viable as more than just scout bots. The project is finally starting to show promise, but if we continue down this path and put these robots into production, it will mean shelving the Hellfire Armor project indefinitely."
    EEN_nf_a014:0 "Armor Lab"
    EEN_nf_a014_desc:0 "Following the success of the Hellfire Armor project there has been a push to dedicate a whole wing of the research labs armor development, solely for the purpose of improving the equipment our soldiers carry in the field."
    EEN_nf_a015:0 "Robotics lab"
    EEN_nf_a015_desc:0 "ollowing the success of the Duraframe Eyebot project there has been a push in our science divisions to dedicate a wing of the research labs solely to the research of Robotic advancements."
    EEN_nf_a016:0 "Limited Manufacturing"
    EEN_nf_a016_desc:0 "While Raven Rock has adequate manufacturing facilities for a listening post, it is not suited to handle the large production we will need to bring order to the wastes. We should work to increase our manufacturing capacity if we are to fufill our mission."
    EEN_nf_a017:0 "Retooling machinery"
    EEN_nf_a017_desc:0 "Many of the manufacturing facilities of Raven Rock are set to produce items we have little need for, so they sit and collect dust. With some effort we can retool them to further bolster our production"
    EEN_nf_a018:0 "Refurbishing"
    EEN_nf_a018_desc:0 "There are heaps of ancient weapons and even suits of power armor rusting away in depots all across the wasteland. Perhaps we should put some effort into restoring some of these lesser tools, at least until we can produce new equipment on the scale we once enjoyed."
    EEN_nf_a019:0 "Stripping non-essentials"
    EEN_nf_a019_desc:0 "We must accept that this is no time for luxuries. Non-essential equipment such as televisions, personal radios and other electronic equipment must be scrapped and their parts used to help in the war effort."
    EEN_nf_a020:0 "Touching Grass"
    EEN_nf_a020_desc:0 "In the 30 years since the evacuation from Navarro, few have set foot outside of Raven Rock. We have an entire generation of soldiers that have never stood on solid dirt. It is time for us to open the doors and these people to touch some grass."
    EEN_nf_a021:0 "Wasteland Fauna"
    EEN_nf_a021_desc:0 "The creatures of the Capital Wasteland are largely similar to those on the West Coast. Still there are questions to be answered, like what the hell is a yao gui?"
    EEN_nf_a022:0 "Clearing Nests"
    EEN_nf_a022_desc:0 "Having a large hive of mutated creatures in our zone of control is just asking for trouble. We need to establish a protocol for clearing these nests."
    EEN_nf_a023:0 "Deathclaw Sanctuary"
    EEN_nf_a023_desc:0 "On the West Coast we attempted to use local creatures called Deathclaws as expendable soldiers, with limited success. It seems a variant of these creatures exists on the East Coast as well. We should find their main breeding ground in case we want to try again."
    EEN_nf_a024:0 "Deathclaw Control"
    EEN_nf_a024_desc:0 "The problem with our attempts at turning Deathclaws into soldiers on the West Coast was that the dammed creatures became too intelligent. They acted in their own self interest, sometimes shirking their responsiblities and even turning on us in rare cases. One of the science teams believes that instead of modifying the creatures we could construct apparatices fixed to their heads to send them limited commands, and of course keeping them from attacking our men. The hard part is getting the devices on their heads.... and fixing them when they fail."
    EEN_nf_a025:0 "Fort Banister"
    EEN_nf_a025_desc:0 "Located to the southwest, Fort Banister was a large military complex that was heavily damaged in the Great War. It is unknown how much of the underground network survived the destruction, but it seems to be a hotspot for some local paramilitaries. We will send a recon squad out to determine how to deal with these squatters."
    EEN_nf_a026:0 "Declawing The Talon"
    EEN_nf_a026_desc:0 "This once great military installation has been overrun by despicable soldiers for hire calling themselves Talon company. They should be removed from the grounds by force and any illgotten weaponry of theirs siezed."
    EEN_nf_a027:0 "Shaking hands... or Talons"
    EEN_nf_a027_desc:0 "While Talon Company may be little more than organized soldiers of fortune hoarding antequated weaponry, they may still have use. Mercenaries have occasionally been used by the American Military since its founding. We could strike a deal with them, paying them with our outdated equipment in exchange for their services. Better they die than red blooded Americans right?"
    EEN_nf_a028:0 "Banister's Secrets"
    EEN_nf_a028_desc:0 "While much of the fort has been ransacked since the Great War, many of the securer lower level doors have kept out intruders. Now the rightful heirs to the forts secrets have returned."
    EEN_nf_a029:0 "Restoring Banister"
    EEN_nf_a029_desc:0 "Currently Fort Banister is little more than a dank rusted bunker with some scattered half destroyed structures on top of it. With some solid American engineering and the resources of Raven Rock we can restore it to at least a shadow of its former glory. Then it will serve as an important command center for controlling the region."
    EEN_nf_a030:0 "Job Opportunities"
    EEN_nf_a030_desc:0 "Talon Company has accepted our contract for their services and will carry out limited operations for us in exchange for surplus weaponry. Let us finalize our deal and point them at some targets."
    EEN_nf_a031:0 "Talon Co Auxilaries"
    EEN_nf_a031_desc:0 "Some of the mercanries of Talon Company have shown themselves to be surprisingly capable soldiers. In limited combined operations officers have reported the mercs performing on par with lower level enclave personel. Perhaps it is time we expand our deal with them and employ them as full on auxilaries. Some have even suggested honorary citizenship for the most exemplary soldiers."
    EEN_nf_a032:0 "Radio Arrays"
    EEN_nf_a032_desc:0 "The Enclave communications network went down shortly after the war. It was by a small miracle that Eden was able to contact the west coast at all, and in those 30 years since the satelite used has gone offline. Efforts will need to be made to boost Raven Rocks radio equipment to reach beyond the Capital Wasteland."
    EEN_nf_a033:0 "Enclave Radio"
    EEN_nf_a033_desc:0 "President Eden wants to use the restored radio network and eyebots to broadcast a radio show.... He thinks it will soften the local populace up to the image of the enclave and possibly help bring scattered remnants back into the fold."
    EEN_nf_a034:0 "Satellite Uplinks"
    EEN_nf_a034_desc:0 "While many satellites have come crashing to Earth in the time since the great war, there are still plenty out there drifting in space. With our upgraded communications equipment we should start pinging known satellites to get an inventory of what is still out there."
    EEN_nf_a035:0 "Adams AFB"
    EEN_nf_a035_desc:0 "Just across the Chesapeake Bay is the remnants of an important pre-war air base. If Adams Air Force Base is anything like the Sierra Army Depot, the automated security may well have kept most curious wastelanders out. We should send some scouts to look the facility over"
    EEN_nf_a036:0 "Remote Shutdown"
    EEN_nf_a036_desc:0 "Shutting the base security down from a distance may save lives, but the damage to our electronic infrastructure could cost more."
    EEN_nf_a037:0 "Coordinated Strike"
    EEN_nf_a037_desc:0 "There is nothing wrong with a good ol' fashioned verti-assault team storming in and taking the bots offline manually."
    EEN_nf_a038:0 "Base Salvage"
    EEN_nf_a038_desc:0 "While the base has certainly seen better days, it has not been touched by looters. We should be able to salvage plenty of useful equipment and material from this place."
    EEN_nf_a039:0 "The Garrison"
    EEN_nf_a039_desc:0 "The plan for Adams Air Force Base goes well beyond a simple supply run. This place affords us several benefits Raven Rock does not. However since we disabled their security, we need to think of a replacement to keep dirty wastelanders out."
    EEN_nf_a040:0 "Rely on Bots"
    EEN_nf_a040_desc:0 "Just turn the robots back on again"
    EEN_nf_a041:0 "Auxilaries"
    EEN_nf_a041_desc:0 "Some auxilary troops more suited to guard duties would be the perfect garrison for Adams AFB."
    EEN_nf_a042:0 "Full Guard"
    EEN_nf_a042_desc:0 "This place is too valuable to have anything but the best guarding it. Put a full battalion of power armored troops in charge of protecting the base."
    EEN_nf_a043:0 "Old Stockpiles"
    EEN_nf_a043_desc:0 "Surveying teams have found warehouses of old equipment sitting in the base. While much of it is dated and damaged, we could still find use."
    EEN_nf_a044:0 "Maintenance Bays"
    EEN_nf_a044_desc:0 "The old aircraft maintenance bays may not have been designed to repair vertibirds, but it should not take much effort to change that."
    EEN_nf_a045:0 "Scavenge Airfields"
    EEN_nf_a045_desc:0 "The airfields of Adams AFB are littered with rusting planes. While getting them running again would be more trouble than it is worth, they hold useful salvage."
    EEN_nf_a046:0 "Fix the Strips"
    EEN_nf_a046_desc:0 "Time has claimed the airstrips of Adams AFB. The runways are full of holes and cracks that must be repaired before they can be properly used."
    EEN_nf_a047:0 "The Mobile Crawler"
    EEN_nf_a047_desc:0 "Adams AFB was home to a massive mobile base crawler. A pre-war prototype that while immobile, would still make for a good base from which to coordinate the defense of the entire area."
    EEN_nf_a048:0 "Death From Above"
    EEN_nf_a048_desc:0 "While restoring Adams AFBs radio systems our technicians discovered something in the mobile crawlers computers. An untested connection to an orbital weapons platform surpassing the Highwater-Trousers system reached by array NW-05a. Our technicians warn us that the uses are limited and we have not tested the connection thouroughly, but these are desperate times. If Liberty Prime is not stopped, the Brotherhood stand a chance at winning this war!"
    EEN_nf_a049:0 "Fort Constantine"
    EEN_nf_a049_desc:0 "Just to the east of Raven Rock is Fort Constantine. Once the seat of the Capitals nuclear arsenal, it now lies uninhabited. Sensor readings over the centuries showed the fort largely remaining unoccupied and after the first few decades rarely visited aside from one group of scavengers about 20 years ago. This has been credited to the feral ghouls and robotic guards that are still operating. The base AI is refusing to respond to our security codes and will need to be taken offline."
    EEN_nf_a050:0 "The Last Salvo"
    EEN_nf_a050_desc:0 "The ICBM silos of Fort Constantine had one last missile that was never launched. While the Megaton bombs sitting in the warehouse are not in working order and are to be repurposed for a uranium source, this ICBM sits, waiting for the command. Now what do we do with it?"
    EEN_nf_a051:0 "Ready for War"
    EEN_nf_a051_desc:0 "The vertibird bays are all operational, our manufacturing capability has drastically increased and our labs are operating at peak efficiency. There is little more we could do to our home to prepare it for the war that is to come."
    EEN_nf_a052:0 "Sweep and Clear"
    EEN_nf_a052_desc:0 "Before we can make use of Fort Constantine, we need to clear the area of unwanted vermin. The President has authorized our soldiers to sweep the area in a series of nighttime attacks. The men are looking forward to the target practice."
    EEN_nf_a053:0 "What The Sigma?"
    EEN_nf_a053_desc:0 "Enclave Sigma Squads are elite forces even by Enclave standards. These specialized fighting forces are often deployed to locations considered imperative to the salvation of America, often operating limited outside support. The dangerous nature of their missions means few Sigma soldiers in the history of The Enclave have lived long enough to retire from combat duty. However, we have one such man at Raven Rock, and he has a plan he wants The President to hear."
    EEN_nf_a054:0 "Recon and Infiltration"
    EEN_nf_a054_desc:0 "Even though Sigma Intelligence will have its roots in the most decorated units of The Enclave, their purpose will reach beyond the usual deadly missions of vital importance. The soldiers selected for this service will adapt to more subtle measures for enforcing The Enclaves interests."
    EEN_nf_a055:0 "Sabotage and Daring Raids"
    EEN_nf_a055_desc:0 "Sigma Intelligence will be pulling its best operatives from the combat elite. It is a waste to shove them into desks or playing cloak and dagger games with wastelander fools! Other people can handle the quiet stuff, but when Sigma Inteligences operatives go in, they will go in loud."
    EEN_nf_a056:0 "Wastelander Study"
    EEN_nf_a056_desc:0 "Despite the common wastelander being an illiterate simpleton, they are very distrustful and quick to pick up on people that do not belong. If we abduct some wastelanders and study them, we can learn mannerisms that will help us blend in."
    EEN_nf_a057:0 "30 Pieces of Tin"
    EEN_nf_a057_desc:0 "The common wastelander is a greedy, pathetic wretch. In their short-sightedness they would even sell out their own for a little currency. We can use their nature against them, we just need to secure the funds to do so."
    EEN_nf_a058:0 "Additional Funding"
    EEN_nf_a058_desc:0 "The Sigma Intelligence Office has proven more useful than anticipated. As we expanded our territory, dealing with subversive wastelanders became a more important part of their duties. They are requesting more resources for more agents and improvements."
    EEN_nf_a059:0 "The Enclaves Eyes"
    EEN_nf_a059_desc:0 "With additional funding and resources The Sigma Intelligence Office has become an integral part of our operations. Both in our territory and beyond, they keep The Enclave apprised to the threats we need to worry about, and often dispose of them."
    EEN_nf_b001:0 "Project Purity Recon"
    EEN_nf_b001_desc:0 "Water is among the most important things all living things need. Most of the population of the wasteland barely gets by either by using limited purifiers or consuming irradiated water outright. News has reached us of some type of project to turn the Jefferson Memorial into a massive water purifier that could potentially purify enough water for the entire Capital Wasteland. While the plan has not come to fruition it is only a matter of time, and whoever controls that purifier will control the wasteland."
    EEN_nf_b002:0 "Operation Clearwater"
    EEN_nf_b002_desc:0 "After limited recon we have ascertained that the project is independently carried out by some enterprising wasteland scientists, if they can be called that. It is only a matter of time before the nearby Brotherhood of Steel takes notice. We should prepare several options for how to handle siezing control of the purifier and getting it in working order before the Brotherhood of Steel get the same idea."
    EEN_nf_b003:0 "Shock and Awe"
    EEN_nf_b003_desc:0 "Some of our military staff are suggesting we hit Project Purity hard and fast, making efforts to limit the destruction caused. While the plan has merrit, there are several major detractions. The largest one is the potential of severely damaging the project and possibly killing the scientific staff."
    EEN_nf_b004:0 "Careful Infiltration"
    EEN_nf_b004_desc:0 "Project Purity is barely held together by scavenged materials and the know-how of its scientific staff. Many of our scientific staff are suggesting we take a slower approach to infiltrate the Project Purity team with scientific staff and soldiers posing as interested scientists and their hired guards. While this will take longer, it would drastically limit the potentail damage and possibly ensure the coopoeration of more of the projects staff."
    EEN_nf_b005:0 "Send the Talons"
    EEN_nf_b005_desc:0 "Talon Company is no stranger to storming guarded outposts and clearing them out for their employers. Perhaps we should let them take over the purifier for us."
    EEN_nf_b006:0 "The Battle for Project Purity"
    EEN_nf_b006_desc:0 "We have laid all our cards on the table and now the Brotherhood of Steel has come to notice our presence. It is only a matter of time before they launch some pathetic attempt at taking the purifier back from us. But as we wait... some thing is stirring in Raven Rock."
    EEN_nf_b007:0 "Retreat & Recover"
    EEN_nf_b007_desc:0 "The assault on Project Purity has been a massive setback. Final casualty numbers are still coming in and precious tech has fallen into the hands of our enemies. We need time to regroup and prepare a counter attack."
    EEN_nf_b008:0 "Press our Advantage"
    EEN_nf_b008_desc:0 "The pathetic Brotherhood attempts at seizing American property has failed. Countless Knights and Paladins died in the attack but they are not beaten yet. We must press on with our momentum and remove this thron from our side."
    EEN_nf_b009:0 "Prepare our Defenses"
    EEN_nf_b009_desc:0 "With our recent internal struggles and the loss at Project Purity, we will need time to strike back. We must fortify our defenses and ready for the next attack."
    EEN_nf_b010:0 "FOB Purity"
    EEN_nf_b010_desc:0 "Coupled with its material importance, Project Purity is at a strategically important location. Situated just across the bay from the heart of the Brotherhood, we can turn it into a staging area to launch our assault and wipe them out."
    EEN_nf_b011:0 "Enclave Strikes Back"
    EEN_nf_b011_desc:0 "We are as ready as we ever will be. It is time we take the fight to The Brotherhood and show the people of DC who rules these wastes."
    EEN_nf_b012:0 "Sifting the rubble"
    EEN_nf_b012_desc:0 "The Pentagon lies in ruins. Unfortunately The Brotherhood forced our hand and a once great American military installation lies in further ruin. But maybe some value remains deep underground?"
    EEN_nf_b013:0 "Into The Lyons' Den"
    EEN_nf_b013_desc:0 "After heavy fighting The Pentagon has returned to the hands of the United States Government. With time we can restore it to its pre-war glory, but for now let us see what goodies The Brotherhood left us."
    EEN_nf_b014:0 "Rulers of DC"
    EEN_nf_b014_desc:0 "The Brotherhood is defeated and there is little chance of them rebuilding in the Capital Wasteland. For the first time since the bombs dropped over 200 years ago, the United States government stands as the rulers of DC. Now we can turn our eyes to stamping out the other upstarts in the former capital and beyond."
    EEN_nf_c001:0 "Our New Home"
    EEN_nf_c001_desc:0 "The loss of Raven Rock is a horrendous setback. Countless lives and mountains valuable equipment have been destroyed. Still, those of us that remain are regrouping at Adams AFB. We must convert this place to our new home, a place to build strength and get ready for revenge."
    EEN_nf_c002:0 "The High Command"
    EEN_nf_c002_desc:0 "Many in the highest levles of our military leadership were at Raven Rock when it was destroyed. Still, the Commander in Chief and a few of his closest advisors still live. It will take some time to adjust our leadership structure, but we have done it before."
    EEN_nf_c003:0 "Restore The Backup"
    EEN_nf_c003_desc:0 "President Eden knew that Raven Rock would eventually be destroyed, though he figured it would be a threat from the inside. Months ago he had a perfect copy of his programming transfered to a rudimentary ZAX computer at Adams AFB. It will take time to bring it back online, especially since only a select few know of President Eden's true nature."
    EEN_nf_c004:0 "Mass Retreat"
    EEN_nf_c004_desc:0 "With the loss of our command center, many of our troops out in the field are disorganized and unsure what to do next. Send a general order for a mass retreat of the field soldiers to Adams."
    EEN_nf_c005:0 "Call Scattered Units"
    EEN_nf_c005_desc:0 "The Capital Wasteland is dotted with pre-war military bases and bunkers. Soldiers there were not part of the mass retreat order, but now we need to give the command to grab what they can and get back home."
    EEN_nf_c006:0 "Rescue Ops"
    EEN_nf_c006_desc:0 "Some of our soldiers find themselves engaged by Brotherhood soldiers, trapped by pre-war security or otherwise cut off from escape. We need to send rescue teams to get them out."
    EEN_nf_c007:0 "Loot the Armories"
    EEN_nf_c007_desc:0 "We barely scratched the surface when looking through the warehouses of Adams AFB because they were mostly outdated rifles. Now we need anything we can get. Crack open some crates and pass the ammo."
    EEN_nf_c008:0 "Salvage Teams"
    EEN_nf_c008_desc:0 "Occasionally a team would be sent out to search an old bunker or warehouse for equipment. With our current equipment troubles it has been proposed that we set up an official division for scavenging ruins and enemy encampments after battle."
    EEN_nf_c009:0 "Trade if You Must"
    EEN_nf_c009_desc:0 "It is hard to believe it has come to this, but we may need to trade with the local populace to get the equipment we need."
    EEN_nf_c010:0 "Fortify the Perimiter"
    EEN_nf_c010_desc:0 "Automated turrets and chainlink fences may have kept random scavengers out for centuries, but it will not stop a dedicated assualt team in power armor. We need to set up some metal barricades, energy barriers and outposts."
    EEN_nf_c011:0 "AA Deployments"
    EEN_nf_c011_desc:0 "We enjoyed air superiority for much of this war, but with our rapid retreat the Brotherhood have captured some of our vertibirds. For the first time since the great war, we will have to point our guns at the skies"
    EEN_nf_c012:0 "Artillery Positions"
    EEN_nf_c012_desc:0 "If the worst comes to happen, we may need to fight in our home. We will survey the base and set up artillery positions to cover retreats and inflict maximum casualties."
    EEN_nf_c013:0 "Return of The Enclave"
    EEN_nf_c013_desc:0 "It has been a rough few months but we have finally recovered from our recent losses. While we are still not out of the woods yet, we are at least not on the verge of collapse. Plans are being drawn up for a return to The Capital Wasteland. In many of them the presidential metro serves as an important staging point. Defenses will be erected to ensure that should we need to fall back, The Brotherhood won't be hot on our heels."
    EEN_nf_c014:0 "Battle for DC 2"
    EEN_nf_c014_desc:0 "We are back on our feet and our generals are hard at work coming up with new plans to retake DC. The battle for DC 2, codenamed Operation Electric Boogaloo, will require a few finishing touches before we are ready to strike back at The Brotherhood."
    EEN_nf_d001:0 "Remnants of Steel"
    EEN_nf_d001_desc:0 "The Citadel has fallen. The Brotherhood is without a home, leadership or direction. Still their Knights put up token resistance across The Capital Wasteland. We need to bring this chapter to a close before we can move on to more important matters."
    EEN_nf_d002:0 "Hunt Them Down"
    EEN_nf_d002_desc:0 "Kill teams will be dispatched to any location Brotherhood presence is reported. Their soldiers will be hunted down like molerats until there are not any left."
    EEN_nf_d003:0 "Holotag Bounties"
    EEN_nf_d003_desc:0 "There are plenty enterprising killers in the wastes who would happily handle this little problem for us. Let us spread the word that caps and tech will be paid for proof of a Brotherood kill, holotags preferred."
    EEN_nf_d004:0 "Fair Treatment"
    EEN_nf_d004_desc:0 "The Brotherhoods leadership deceived many fools into thinking we were some kind of genocidal madmen. Perhaps if we promise them fair treatment and show them we are not so bad, some will lay down their arms voluntarily and we can save some ammo, until the trials are over and we bust out the firing squads."
    EEN_nf_d005:0 "The Lyons Trials"
    EEN_nf_d005_desc:0 "In a surprising turn of events, a group of Brotherhood Initiates turned themselves in and have offered to help bring the fighting to an end. They contacted the remnants of Lyons' Pride and other elite Brotherhood soldiers, leading them right into our hands. Now comes the part where we deliver on our promise of fair treatment and honest trials for the leaders of this insurgency. Of course, fair is a relative term."
    EEN_nf_d006:0 "The Last Holdouts"
    EEN_nf_d006_desc:0 "A very small amount of insurgents still evade our grasp. Their numbers shrink by the day, and with one final push we can drive them into the ground."
    EEN_nf_d007:0 "As the Dust Settles"
    EEN_nf_d007_desc:0 "The Brotherhood insurgency has been crushed and The Capital Wasteland is ours. Now is not the time to rest, there are plenty of urgent issues that need addressing."
    EEN_nf_d008:0 "Raiders Everywhere"
    EEN_nf_d008_desc:0 "All along the frontier, settlements we should control are being besieged by raiders. If we don't act swiftly, the problem will only get worse."
    EEN_nf_d009:0 "Fortify The North"
    EEN_nf_d009_desc:0 "Bandits out of Harrisburg keep flooding in from the north and abducting our new citizens. We will to fortify our border to keep them out. Our citizens need to be toiling away in our factories, not The Pitt's."
    EEN_nf_d010:0 "Northern Guards"
    EEN_nf_d010_desc:0 "Staffing the northern defenses with our soldiers is a drain on resources. We should draft wastelanders to protect this border."
    EEN_nf_d011:0 "Raiders Down South"
    EEN_nf_d011_desc:0 "The people of The Capital Wasteland have been plagued by anarchistic raiders for years. A simple group of bunkers and outposts simply will not do. We need to crush this problem at its source."
    EEN_nf_d012:0 "Saviors of Virginia"
    EEN_nf_d012_desc:0 "The people unfortunate enough to live under the rule of the raiders to our south have welcomed us as their saviors. With the right efforts we can exterminate the remaining raiders and gain the loyalty of a grateful populace."
    EEN_nf_d013:0 "Peace and Safety"
    EEN_nf_d013_desc:0 "The raider problem has been dealt with. While there are still bandits out there and mutated monstrosities on the prowl, the people in our settlements enjoy relative safety."
    EEN_nf_d014:0 "Scheming Scientists"
    EEN_nf_d014_desc:0 "A large majority of the science division and civilian administration bought in to Eden's propaganda. They don't understand the realities of our situation and hold resentment for us unplugging that toaster."
    EEN_nf_d015:0 "Make Concessions"
    EEN_nf_d015_desc:0 "Eden gave many of our scientists free reign to conduct whatever kind of wild experiments they wanted. Maybe giving them those kind of freedoms and support again will placate them."
    EEN_nf_d016:0 "Procuring Specimins"
    EEN_nf_d016_desc:0 "Increasing the science budget and autonomy has been a success with winning over the support of many of the moderate scientists. Unfortunately, the more hardline humanity purist scientists are a tougher nut to crack. A couple of them have requested wastelander specimins for experiments into mutation and testing weapons."
    EEN_nf_d017:0 "Root out the Rot"
    EEN_nf_d017_desc:0 "It is not the place of some egghead to decide how this country is ran. If they commit treason, they will be punished like any other traitor."
    EEN_nf_d018:0 "Recruiting Wastelanders"
    EEN_nf_d018_desc:0 "With large amounts of our science department executed, imprisoned, or reassigned to deathclaw feeding, we need to look to outside talent. Across the centuries so-called scientists have tried to understand the marvels of the past and the horrors of today. The promise of a sterile lab and equipment from this century could lure them to our cause."
    EEN_nf_d019:0 "Reformed Science Department"
    EEN_nf_d019_desc:0 "We have dealt with the crisis in our science teams and much has changed. This new organization is running much smoother than before and we will reap the beneifts."
    EEN_nf_d020:0 "DC Settlers"
    EEN_nf_d020_desc:0 "The Brotherhood of Steel were not our only opposition during the battle for DC. A confederation of settlements took up arms against us as well. With their armies defeated, many wonder what happens next."
    EEN_nf_d021:0 "Megaton Trials"
    EEN_nf_d021_desc:0 "Like it or not, we need to accept that many of these settlement guards and civilians were not simple terrorists for taking up arms against us. They are fools defending their pathetic way of life because they didn't know just who we are. Their leadership on the other hand, knew damn well what they were doing was treason. They must be dealt with accordingly."
    EEN_nf_d022:0 "Transition of Power"
    EEN_nf_d022_desc:0 "Many of the settlements across the wastes have their same leadership as they did before the DC conflict. These mayors, sheriffs and 'presidents' sit in their offices awaiting the day a power armored soldier kicks in their door. Let us come to them with plans for a peaceful transition of power instead."
    EEN_nf_d023:0 "Temporary Governors"
    EEN_nf_d023_desc:0 "Until we can set up some kind of elections or civilian administration we will need to make due with officers commanding towns. It is not a permanent solution, but it is practical for now."
    EEN_nf_d024:0 "Roles in Government"
    EEN_nf_d024_desc:0 "Many settlement leaders have begrudgingly accepted our rule and the others have been dealt with. So long as we keep an eye on them, we can trust they will run these settlements smoothly."
    EEN_nf_d025:0 "Relative Calm"
    EEN_nf_d025_desc:0 "The civilized people of The Capital Wasteland have adjusted to our rule. Though they don't all enjoy it, many have accepted the way we will be handling things."
    EEN_nf_d026:0 "America's Thirst"
    EEN_nf_d026_desc:0 "Project Purity will serve as the catalyst for a rebuilt America. Our scientists have restored damage to the facility and are creating plans on how best to handle the water situation."
    EEN_nf_d027:0 "Talon's Reward"
    EEN_nf_d027_desc:0 "Talon Company have proved themselves valuable and loyal soldiers in the fight to restore America. More than a few in our military see them as comrades in arms and support officially welcoming them to our armed forces, as well as granting them citizenship."
    EEN_nf_d028:0 "Banister Upgrades"
    EEN_nf_d028_desc:0 "Fort Banister is ours and while we have given some attention to fixing it up, we should turn it into a true military base to extend our sphere of influence in the southwest."
    EEN_nf_d029:0 "Super Mutant Issue"
    EEN_nf_d029_desc:0 "Super Mutants have been pillaging The Capital Wasteland for decades. The Brotherhood failed to contain this problem, but we are better. We will delve into Vault 87 and destroy this problem at its source."
    EEN_nf_d030:0 "Lamplighters"
    EEN_nf_d030_desc:0 "Our soldiers thought they were ready for anything when they descended into Lamplight caverns to push through Vault 87. They were not ready for a settlement full of children."
    EEN_nf_d031:0 "Rebuilding a Nation"
    EEN_nf_d031_desc:0 "America nearly died over 200 years ago, and again 30 years ago. Now, with The Brotherhood defeated and threats at home resolved, we are ready to begin the difficult task of bringing America back."
    EEN_nf_d032:0 "A Growing Military"
    EEN_nf_d032_desc:0 "The current Enclave military is well suited to coordinated strikes on bandits and wiping out monstrosities. Patrolling large borders and projecting influence is a more daunting task. Reform is needed if we are to have an army that will enforce our will."
    EEN_nf_d033:0 "Mechanized Infantry"
    EEN_nf_d033_desc:0 "The average wastelander goes their whole life without seeing a car in operation. Imagine the shock factor of having an entire fleet of armored vehicles and tanks rolling over wasteland trash."
    EEN_nf_d034:0 "Why Adapt?"
    EEN_nf_d034_desc:0 "The power armored soldier has stood as the pinnacle of warfare for over 200 years. While we will lack the means to outfit every soldier with power armor for some time, they should still carry the weight of our military."
    EEN_nf_d035:0 "General Infantry"
    EEN_nf_d035_desc:0 "In one of the greatest wars of the 20th century America stood victorious over powerful enemies. They did not do this with advanced powered armor or lazer shooting VTOLs. They did this with farmers, teachers and fathers armed with rifles and trained to fight for their country. While we will still use our powered armor and Vertibirds, the bulk of this new American Army should rely on the humble Wastelander GI."
    EEN_nf_d036:0 "Auto Plants"
    EEN_nf_d036_desc:0 "America is littered with scores of abandoned automotive assembly plants that fulfilled the dream of a car in every garage. We can focus on restoring the plants under our control and turn them to pumping out vehicles of war."
    EEN_nf_d037:0 "Searching Depots"
    EEN_nf_d037_desc:0 "Across the wastes there are secured bunkers, abandoned warehouses and lost trucks carrying the power armor that was to outfit our military. Many of these suits are outdated by our standards, but they still stand well beyond the capability of most wasteland upstarts. Securing these caches and outfitting our lower ranked soldiers with the suits will be a workable solution for now."
    EEN_nf_d038:0 "Recruiting Centers"
    EEN_nf_d038_desc:0 "The average wastelander knows a life of hardship and death. Setting up recruitment centers offering triumph and glory in the larger settlements under our control should yield us enough recruits to fill our ranks."
    EEN_nf_d039:0 "Adapting Vehicles"
    EEN_nf_d039_desc:0 "The wasteland poses many known and unknown challenges to automotive operations. If we put our most best designers to the task, and heed feedback from our troops, we can adapt our vehicle designs to better tackle the problems of modern vehicular warfare."
    EEN_nf_d040:0 "Searching Archives"
    EEN_nf_d040_desc:0 "A lot of cutting edge research was lost to both the great war and the ravages of time. If we search out what few facilites we know of we may be able to find ways to better manufacture power armor, or even improve what we have. Apparently there was something called Ultracite out in West Virginia?"
    EEN_nf_d041:0 "Arm the Masses"
    EEN_nf_d041_desc:0 "What use is a man in uniform if he only has a pointed stick to swing? We can place those unwilling or unable to fight into factories to churn out the weapons that will put down wastelander resistance."
    EEN_nf_d042:0 "New American Army"
    EEN_nf_d042_desc:0 "The American army was once the greatest armed force the world had ever seen. We are still well away from that, but we are very likely the greatest armed force still around. There is no way those idiots out west have not petered out by now."
    EEN_nf_d043:0 "Caps or Dollars?"
    EEN_nf_d043_desc:0 "The pre-war economy relied on the all mighty dollar. A paper symbol of value that many wastelanders now use to wipe their asses. Some of our administrators argue that we should go back to this, but others think the simple bottle cap is better for dealing with our current population and outsiders."
    EEN_nf_d044:0 "Federal Cap Presses"
    EEN_nf_d044_desc:0 "If we are going to support a bottlecap economy, we are going to do it right. Seize presses from derelict bottling plants and put them to use."
    EEN_nf_d045:0 "Backed by What?"
    EEN_nf_d045_desc:0 "For hundreds of years the pre-war dollar was backed by gold, a rare and valuable commodity. Eventually this was abandoned in favor of one backed by the simple faith in the Government. Research will need to be conducted to decide how to handle our currency."
    EEN_nf_d046:0 "Free Commerce?"
    EEN_nf_d046_desc:0 "Since The Great War, The Enclave operated on a command economy. The leadership decided what got made, how much and with what. As we have grown beyond a military with a state, we really need to rethink how we handle commerce."
    EEN_nf_d047:0 "Free Enterprise"
    EEN_nf_d047_desc:0 "America was one of the greatest nations in the history of the world because it believed in a system of free enterprise. Cash is king and business is all about getting as much as you can. These businesses just need to remember to pay their taxes."
    EEN_nf_d048:0 "Nationalized Industry"
    EEN_nf_d048_desc:0 "While a full command economy is not realistic on the scale we now operate, major industries such as infrastructure and weapons production should still be handled by the government. We simply can't allow that kind of power to be held by some random wealthy merchant."
    EEN_nf_d049:0 "The Economy"
    EEN_nf_d049_desc:0 "We have rebuilt the American economy. Factories churn out goods and currency flows. Prospertiy has returned to America, and it will only get better."
    EEN_nf_d050:0 "Governing the Wastes"
    EEN_nf_d050_desc:0 "The wasteland is too large for us to take a direct hand in the day-to-day operation of every settlement. We will need to decide how to administer our great nation before we grow too much and get in over our heads."
    EEN_nf_d051:0 "Light Hand"
    EEN_nf_d051_desc:0 "We can not be bothered with the petty problems of some small settlement in the middle of nowhere. Local matters will be handled by local leaders who report to the federal government. This may cause problems on occasion, but we will make examples of those troublemakers."
    EEN_nf_d052:0 "Iron Fist"
    EEN_nf_d052_desc:0 "Why the hell would we let some random despot have reign over a miniature kingdom on American soil? These people will run their lands exactly as we command, or they will be swept up into a dustpan."
    EEN_nf_d053:0 "Dealing with Raiders"
    EEN_nf_d053_desc:0 "Raiders have been a problem in the wastes since the day the bombs dropped. Violent maniacs that prowl the land and prey on the weak. We need to adopt an official method of dealing with them."
    EEN_nf_d054:0 "Deal with Them"
    EEN_nf_d054_desc:0 "All raiders that reside on American soil will be met with plasma. There is no place for them in our country. Stealing from the population is the government's job."
    EEN_nf_d055:0 "Deals with Them"
    EEN_nf_d055_desc:0 "Not every raider is an anarchistic monster that wants to rape and torture. Some even bring a semblence of order to their territory. These sensable bandits could be reasoned with and possibly turned on troublesome elements outside our borders."
    EEN_nf_d056:0 "Law and Order"
    EEN_nf_d056_desc:0 "Society is held together by the rule of law. Establishing a simple code of law is an important step in bringing civilization to the wastes. Just simple laws for now, we can worry about the 'Bill of Rights' later."
    EEN_nf_d057:0 "Rebuilding Priorities"
    EEN_nf_d057_desc:0 "America is littered with ruins and scrapheaps. Even the simple roads that ran through the nation like arteries have fallen to little more than crumbling trails. We can't rebuild it all, so what do we focus on?"
    EEN_nf_d058:0 "Trains and Bridges"
    EEN_nf_d058_desc:0 "An entire system of roads and highways simply isn't necessary right now. Trains connected this great nation and did fine for centuries."
    EEN_nf_d059:0 "Cars and Highways"
    EEN_nf_d059_desc:0 "We may not rebuild every highway and backroad, but we have to get the ball rolling if we are to restore this country. Relying on restoring old railroad tracks simply isn't enough."
    EEN_nf_d060:0 "Secure Checkpoints"
    EEN_nf_d060_desc:0 "Our railroad system will be dotted with military checkpoints tasked with monitoring the tracks and dealing with threats. This will also have the added effect of keeping our territory more secure from outside elements."
    EEN_nf_d061:0 "Highway Patrol"
    EEN_nf_d061_desc:0 "Law enforcement officers will patrol up and down our highways keeping an eye out for malfeasants and enemies. While taxing on resources, it will keep our roads secure and keep the wastelanders in check."
    EEN_nf_d062:0 "Military Industrial Complex"
    EEN_nf_d062_desc:0 "We have a great task ahead of us retaking America. Military might must be the center of our industry."
    EEN_nf_d063:0 "Consumer Industry"
    EEN_nf_d063_desc:0 "What good is rebuilding America if the average American is still eating off a rusty 200 year old fork. The American consumer will drive the economy and our people will enjoy luxuries rarely seen since the end of the war, like working toasters."
    EEN_nf_d064:0 "American Cities Project"
    EEN_nf_d064_desc:0 "Many great American cities were built to last, and still somewhat stand 200 years after The Great War. While restoring them to their former glory will take decades of hard work, we can make efforts to at least renovate parts of them for our citizens to enjoy."
    EEN_nf_d065:0 "We Are So Back"
    EEN_nf_d065_desc:0 "Leaving Navarro, many Enclave soldiers though it was over. America was dead. Today we are a nation with a strong military, flourishing economy and strong industry. We are so back."
    EEN_nf_d066:0 "The Delaware Coast"
    EEN_nf_d066_desc:0 "The coast of Delaware are littered with fishermen and traders that refuse to answer to American authority. We will rectify that."
    EEN_nf_d067:0 "Speak Their Language"
    EEN_nf_d067_desc:0 "The traders of Dover may have put up a fight. At the end of the day they are businessmen, and war is bad for business. By working with them on integrating into the American economy, we can ensure their cooperation."
    EEN_nf_d068:0 "Autumn Naval Base"
    EEN_nf_d068_desc:0 "The Delaware coastline is littered with old dockyards and shipwrecks. We will strip what we can and construct an honest to god naval base."
    EEN_nf_d069:0 "In The Navy"
    EEN_nf_d069_desc:0 "Building our strength in decrepit bunkers in Americas mainland for decades left us with little need for a navy. Now we have coastlines to protect and beaches to storm. We need to finally develop a navy and appoint people to run it."
    EEN_nf_d070:0 "The Rock Gang"
    EEN_nf_d070_desc:0 "Just to our west there is a strange group of religious fanatics that worship... rocks. They are militant and hostile. This Church of Rocky can not be reasoned with, and must be crushed."
    EEN_nf_d071:0 "Into The Pitt"
    EEN_nf_d071_desc:0 "The once great industrial center of Pittsburg has descended into an irradiated slave state called The Pitt. Interestingly enough, they are run by a former BoS soldier who thinks himself a king. He will not be brought to heel willingly."
    EEN_nf_d072:0 "Trog Sweeps"
    EEN_nf_d072_desc:0 "As if a raider army was not bad enough, just outside of Ashur's former territory there are hordes of monsters mutated beyond saving. These trogs need to be exterminated if we are to ever make use of The Pitt's resources."
    EEN_nf_d073:0 "Magnets?"
    EEN_nf_d073_desc:0 "How the hell are we losing patrols to weird bastards with magnets? We need to wipe them out before other wastelanders find out that a high powered magnet can disable a multi-million dollar suit of power armor."
    EEN_nf_d074:0 "Shut em Down"
    EEN_nf_d074_desc:0 "The rock guys and magnet cult have been defeated. A few holdouts must be made an example of but the populace should settle after that."
    EEN_nf_d075:0 "The Pitt's Future"
    EEN_nf_d075_desc:0 "The slaves of The Pitt are freed, and the trogs mostly cleared out. Now we must address the question of the city's future."
    EEN_nf_d076:0 "Northern Bandits"
    EEN_nf_d076_desc:0 "The Harrisburg bandits were a problem we were happy to ignore while we recovered from the war with The Brotherhood. Now we need to wipe out this gang."
    EEN_nf_d077:0 "People of Johnstown"
    EEN_nf_d077_desc:0 "The Johnstowners? Johnstonians? People of Johnstown, are simple farmers that lived under the shadow of bandits and cultists for decades. Despite us dealing with these threats they refuse to give up their autonomy. A show of strength is needed."
    EEN_nf_d078:0 "Bringers of Peace"
    EEN_nf_d078_desc:0 "The people of Harrisburg and Johnstown are finally starting to accept that the old days are the old days. Slavery and crop tributes are a thing of the past. They are Americans now, and will have to accept the greatness that entails."
    EEN_nf_d079:0 "Amish Mutants?"
    EEN_nf_d079_desc:0 "Typically super mutants are violent juggernauts storming across the wasteland killing and pillaging worse than even the most demented raider. Somehow a group of them have settled with local amish and created a sort of commune. Communism is not acceptable, especially mutant primativist communism."
    EEN_nf_d080:0 "Welcome to the 2200s"
    EEN_nf_d080_desc:0 "In a turnout that surprised nobody, primitivist farmers did not put up much of a fight against advanced power armored soldiers. The amish are reluctantly yeilding to our rule and while we will not force them to use lightbulbs, they will still respect our authority."
    EEN_nf_d081:0 "The Northern Frontier"
    EEN_nf_d081_desc:0 "Violent scavengers, mad robots and more wannabe knights are among many threats and upstarts to the great north. This frontier is not of immediate importance, but they are still full of Americans that need the light of our civilization."
    EEN_nf_d082:0 "So-called Outcasts"
    EEN_nf_d082_desc:0 "The Brotherhood of Steel we fought was not even the most hardline of their order. A splinter group occupies ruins in southern DC and also need to be dealt with."
    EEN_nf_d083:0 "A Cuppa Joe"
    EEN_nf_d083_desc:0 "Scavengers in the south DC ruins think themselves beyond the reach of American authority. It is time to remind them that we don't need to travel through ruined tunnels just to reach them."
    EEN_nf_d084:0 "Don't Eat People!"
    EEN_nf_d084_desc:0 "Our scouts thought they had found a true remnant of great American society. A land of civility and worship of the values that made America great. That was, until they realized these people were cannibals. Time to teach these American cosplayers that eating people is bad."
    EEN_nf_d085:0 "Civilizing The South"
    EEN_nf_d085_desc:0 "The swamps just south of DC are home to more than giant mosquitos. They are also home to mutated tribals, cultists and guerilla fighters. It is our duty to civilize this stretch of swamp."
    EEN_nf_d086:0 "Manifest Destiny"
    EEN_nf_d086_desc:0 "With the immediate surroundings secured we have a solid base of people to run a war machine that will finally unify America. Rev up the vertibirds and stock up on microfusion cells."
    EEN_nf_d087:0 "The Megaton Issue"
    EEN_nf_d087_desc:0 "Somehow people 200 years ago thought living around a live nuclear bomb was a good idea, and nobody questioned that. Looks like it is up to us to deal with it."
    EEN_nf_d088:0 "Canterbury Commons"
    EEN_nf_d088_desc:0 "The settlement of Canterbury Commons leveraged its strategic location to become a center of trade in The Capital Wasteland and beyond. You know what that means? They owe a LOT of back taxes."
    EEN_nf_d089:0 "Who's Tower?"
    EEN_nf_d089_desc:0 "Tenpenny tower was once a retreat for America's elite. In the last few years it became a home for The Capital Wasteland's elite. We need to remind their residents that they are Americans now."
    EEN_nf_d090:0 "Sweep the Decks"
    EEN_nf_d090_desc:0 "The so-called Rivet City is the husk of a US military vessel. It is no place for squatters no matter how long they have lived there. Drive them out and send them elsewhere."
    EEN_nf_d091:0 "Rivet City"
    EEN_nf_d091_desc:0 "Despite its origin, the people of Rivet City really made it something of their own and we should respect this model of rebuilding. While not perfect, it is a model to strive for and we should give them a helping hand."
    EEN_nf_d092:0 "Rivet Science Institute"
    EEN_nf_d092_desc:0 "Scientists made Rivet City what it is, and it could become a valuable research facility. Our current labs were getting a little cramped anyway."
    EEN_nf_d093:0 "A True American"
    EEN_nf_d093_desc:0 "Nestled deep in the hull of Rivet City is an interesting individual, Abraham Washington. According to locals he is a historian that has worked at preserving American history. We should arrange a meeting."
    EEN_nf_d094:0 "The National Mall"
    EEN_nf_d094_desc:0 "Once a beautiful center of history and commerce, The National Mall has been turned into a warzone in the years since the bombs fell. Now that has mostly fallen silent, we should begin work to bring it back to what it once was."
    EEN_nf_d095:0 "Yesterdays Future"
    EEN_nf_d095_desc:0 "The Museum of Technology was full of tech both old and new to the people of 2077. While this museum is unlikely to hold any advanced plasma rifle schematics, it could hold the secrets to older technologies we didnt see necessary to remember when we lived in secure bunkers for the last two centuries."
    EEN_nf_d096:0 "Scraps of The Old World"
    EEN_nf_d096_desc:0 "The National Archives are filled with old documents that the pre-war government considered of historical or cultural significance. It'll take years to go through it all, but we should do an initial sweep first."
    EEN_nf_d097:0 "Museum of History"
    EEN_nf_d097_desc:0 "The Museum of History is a crumbling ruin filled with glimpses into the past. What else is in there?"
    EEN_nf_d098:0 "Mall Battlefield"
    EEN_nf_d098_desc:0 "The once beautiful grounds of the national mall are littered with trenches, bunkers and skeletons of the fallen. The monuments have fallen into decay. We can no longer allow this symbol of American prosperity to decay."
    EEN_nf_e001:0 "Steel Stains"
    EEN_nf_e001_desc:0 "Despite having their home destroyed and most of their leadership slain, these annoying thorns in our side continue to persist. We will need to wipe them out before we can continue on to more important work."
    EEN_nf_e002:0 "Hunt Them"
    EEN_nf_e002_desc:0 "Kill teams will be dispatched to any location Brotherhood fighters are found. It isn't like they are making any more of them."
    EEN_nf_e003:0 "Turn The People"
    EEN_nf_e003_desc:0 "Enclave radio will blast stories of Brotherhood attrocities and crimes. No matter how outlandish the common wastelander will believe it and turn out any Brotherhood terrorists they hide."
    EEN_nf_e004:0 "The Last Holdouts"
    EEN_nf_e004_desc:0 "The last of the Brotherhood terrorists are running scared. We can finish them off with one final push."
    EEN_nf_e005:0 "America in Turmoil"
    EEN_nf_e005_desc:0 "Between the mutants infesting our territory and the treachery of Colonel Autumn, things are precarious to say the least."
    EEN_nf_e006:0 "Comms Sabotage"
    EEN_nf_e006_desc:0 "In Colonel Autumn's attempted coup, a team of his loyalists severely damaged our communications infrastructure. It will take time to recover."
    EEN_nf_e007:0 "The Mobile Crawler"
    EEN_nf_e007_desc:0 "The mobile crawler's antenna were barely restored from their centuries of decay before Autumn's loyalists got to them. They will need more work to repair."
    EEN_nf_e008:0 "Repair The Relays"
    EEN_nf_e008_desc:0 "Raven Rock's radio relays were severely damaged in the fighting, with a lot of critical hardware ripped out. It'll take time to assess and repair the damage."
    EEN_nf_e009:0 "Piggyback Protocols"
    EEN_nf_e009_desc:0 "Our scientists are working on methods to boost signals using existing infrastructure. They will need dedicated support to finish their research, but it looks promising."
    EEN_nf_e010:0 "Eyebot Signal Boosters"
    EEN_nf_e010_desc:0 "Building off of our previous research, one scientist believes we could use eyebot antenna to boost signals and drastically extend our reach. They have reserved a dozen units for this research and they are almost ready to be deployed."
    EEN_nf_e011:0 "The All Seeing Eyebot"
    EEN_nf_e011_desc:0 "Every eyebot we have in the wastes acts as an extension of our eyes, ears and voice. Our eyebots see all, and know all."
    EEN_nf_e012:0 "Crisis in Command"
    EEN_nf_e012_desc:0 "Colonel Autumn had a lot of friends in our military command. As a result of his coup, most of our higher officers and quite a few of the lower ones had to be executed. Rebuilding our military administration is going to be difficult, but it presents opportunity."
    EEN_nf_e013:0 "Loyal Officers"
    EEN_nf_e013_desc:0 "The young and idealistic always did enjoy President Eden's message. Many of them are loyal to the president above all and can form the backbone of our new military administration. The only problem is they are still pretty green."
    EEN_nf_e014:0 "Officer Training"
    EEN_nf_e014_desc:0 "We have lost a lot of soldiers to officer inexperience, we should train them to stop acting like we have unlimited troops."
    EEN_nf_e015:0 "The New Guard"
    EEN_nf_e015_desc:0 "We have a new generation of trained and experienced officers. These men and women will lead the American army to the future."
    EEN_nf_e016:0 "Want Something Done Right..."
    EEN_nf_e016_desc:0 "Allowing flawed men to run our military was a dangerous mistake. The vast computer that is Eden can easily delegate a portion of processing power to running our military as well."
    EEN_nf_e017:0 "Draw From History"
    EEN_nf_e017_desc:0 "Without experiencing battle first hand, Eden must look through history to gain military know-how. That is not much different than human officers anyway."
    EEN_nf_e018:0 "Military Legends"
    EEN_nf_e018_desc:0 "With access to vast historical databases Eden can not just learn from Americas greatest generals, he can recreate them to lead Americas greatest army."
    EEN_nf_e019:0 "Crisis Averted"
    EEN_nf_e019_desc:0 "The Enclave has survived through a leadership crisis not seen since the destruction of the Rig, and once again we came out the other side. We owe our future to these brave officers that stepped up when they were needed and became the men and women we needed them to be."
    EEN_nf_e020:0 "Supply Troubles"
    EEN_nf_e020_desc:0 "The Enclave hasn't had to steadily supply troops across long distances like this in some time. With our old command compromised we do not have the necessary expertise to adjust to this change without a serious rethinking of how we manage our supply lines."
    EEN_nf_e021:0 "Airdrops"
    EEN_nf_e021_desc:0 "Wastland armies rely on outdated methods of resupply like brahmin supply trains or possibly vehicle supply lines. We are better than this. Why do we have a fleet of vertibirds if we can't use them to supply our troops?"
    EEN_nf_e022:0 "Fuel Reserves"
    EEN_nf_e022_desc:0 "Supplying troops via vertibird is draining on our fuel supplies more than we expected. We will have to tap into fuel reserves if we keep this up."
    EEN_nf_e023:0 "Supply Bases"
    EEN_nf_e023_desc:0 "Rather than have a vertibird supply every single unit in the field we will have forward positions and bases serve as supply depots. Supplies can then be delivered from these depots across shorter distances. While this is a slight drain on manpower, at least we aren't burning a tanker of fuel every few days."
    EEN_nf_e024:0 "Take as Needed"
    EEN_nf_e024_desc:0 "Our soldiers will have to learn to get what they need in the field. Supply will never be consistent, so taking resources from the local mutants is needed to suppliment the shortfalls."
    EEN_nf_e025:0 "Loosen Standars"
    EEN_nf_e025_desc:0 "As we should have expected, the average mutant does not carry a crate of plasma grenades and microfusion cells. Soldiers are going to have to make due with what they can find. After all, a .308 still puts a mutant down just as well as a plasma bolt."
    EEN_nf_e026:0 "Wasteland Supply Corps"
    EEN_nf_e026_desc:0 "Occasionally recovering a pre-war supply cache is one thing, but to solve our supply issues we will need to form a full division devoted to recovering weapons and resources. Not only will these men recover equipment from sealed facilities, but they will follow battles to recover the equipment of the fallen."
    EEN_nf_e027:0 "Steadied Supply"
    EEN_nf_e027_desc:0 "Our supply issues are settled for now. Soldiers have adequate resources to continue our campaign rebuilding America."
    EEN_nf_e028:0 "Project 'Purity'"
    EEN_nf_e028_desc:0 "Project Purity was initially designed as a way to provide water to the people of The Capital Wasteland. It will still do this. But it will also help us deal with the mutants raveging the wastes."
    EEN_nf_e029:0 "Cure Clinics"
    EEN_nf_e029_desc:0 "Feeling ill? Barely able to move? Vomiting blood? Sounds like you need to visit the Enclave Cure Clinic. Our dedicated medics are studying the effects of this horrible disease that came out of nowhere and surprised everyone..."
    EEN_nf_e030:0 "Talons' Folly"
    EEN_nf_e030_desc:0 "Sure, Talon Company helped us fight to defeat The Brotherhood, but a mutant is still a mutant. Now we need to deal with them."
    EEN_nf_e031:0 "Banister Work Camp"
    EEN_nf_e031_desc:0 "Fort Banister as it presently stands has little strategic importance to The Enclave. Frankly the crumbling ruin has little value beyond what salvage can be pulled out of it. So, we will do just that. Fort Banister will be turned into a heavily supervised work camp where captured wastelanders can do this country a service by pulling whatever value is left from the once great base."
    EEN_nf_e032:0 "Vault 87"
    EEN_nf_e032_desc:0 "Vault 87 is almost certainly the source of the Super Mutant issue. We must prepare to clear the place out."
    EEN_nf_e033:0 "The Mutant Problem"
    EEN_nf_e033_desc:0 "The Super Mutant issue is one that most nations would not be able to deal with, and even less would have the options we have to deal with it."
    EEN_nf_e034:0 "America's Army"
    EEN_nf_e034_desc:0 "The old ways of power armored soldiers flooding across the wastes may not be the way to do things going forward. Our manufacturing is limited, as is our manpower. Time to rethink how we wage war."
    EEN_nf_e035:0 "Super Mutant Soldiers"
    EEN_nf_e035_desc:0 "The entire point of the Super Mutant project was to create the soldier of tomorrow, and in a few cases the old Enclave back west had success in this. Perhaps that is the way forward after all."
    EEN_nf_e036:0 "Big Black Armor"
    EEN_nf_e036_desc:0 "The mutie fears the sight of a massive soldier in black power armor, and for good reason. Even if our numbers are limited, a force of power armored soldiers can subdue a foe even outnumbered 20:1 and come out smiling."
    EEN_nf_e037:0 "Future is Steel"
    EEN_nf_e037_desc:0 "The strength and certainty of steel for our war machine is preferable to putting the pure American man at risk. While they maybe are not as adaptable or flexable, we can replace every fallen robot with 2 more."
    EEN_nf_e038:0 "Bigger Slave Collars"
    EEN_nf_e038_desc:0 "As we should have expected, Super Mutants are not the best creatures to give heavy weapons. By developing new slave collars designed to fit around a super mutant neck, we should be able to bring them to heel. Even a dumn mutant understands 'be bad head go boom'"
    EEN_nf_e039:0 "BoS Surplus"
    EEN_nf_e039_desc:0 "Not every soldier needs a set of Advanced Power Armor. Our snipers, support staff and EOD units could get by with suits of refurbished T-45d left over from the Brotherhood."
    EEN_nf_e040:0 "Retrofit Factories"
    EEN_nf_e040_desc:0 "To replace our army with machines, we will need to convert a lot of factories to the production of robots."
    EEN_nf_e041:0 "Smarter Mutants?"
    EEN_nf_e041_desc:0 "Vault 87 had a super mutant that appeared to still have most of his facualties. If we could study his creation and autopsy, we could maybe figure out how to make mutants that are smart enough to fight better, but not too smart to conspire against us."
    EEN_nf_e042:0 "Armor of Tomorrow"
    EEN_nf_e042_desc:0 "With a smaller force, our best option is to develop the most advanced equipment the wastes have seen. If mutie weapons can't pierce the armor, it won't matter how many more men they have."
    EEN_nf_e043:0 "Prioritize Robotics"
    EEN_nf_e043_desc:0 "With our army being comprised almost entirely of robots, we should focus on creating better robots."
    EEN_nf_e044:0 "Our New Army"
    EEN_nf_e044_desc:0 "Our military has gone through many radical changes, and become better as a result."
    EEN_nf_e045:0 "The First City"
    EEN_nf_e045_desc:0 "America lies in ruin. Our people need a new city. A city that serves of a glimpse into the future. Clean streets, sturdy walls and luxurious homes. This will be a massive project, but it will be a huge step into the future."
    EEN_nf_e046:0 "Scrapping Ruins"
    EEN_nf_e046_desc:0 "The ruins around our new city need to be torn down. Scrap heaps dotting the horizon are just reminders of the horrors of the wastes."
    EEN_nf_e047:0 "Concrete Walls"
    EEN_nf_e047_desc:0 "No mutie will be setting foot in this city unless they are in shackles. To accomplish this and provide security for our people, we need sturdy walls and fortifications."
    EEN_nf_e048:0 "Unlimited Power"
    EEN_nf_e048_desc:0 "What would a city of tomorrow be if our people needed to run generators to power their lights? We will pull the reactors from a few old vaults to power the city while we develop a longer term solution."
    EEN_nf_e049:0 "Civilian Industry"
    EEN_nf_e049_desc:0 "The homes of our people need new furniture, appliances and other consumer goods. A few factories should satisfy the needs of the citizens."
    EEN_nf_e050:0 "Clear Skies"
    EEN_nf_e050_desc:0 "We can not allow mutant filth to rain from above. Anti-air emplacements along the walls will keep mutie gliders and flying scrapheaps out of our airspace."
    EEN_nf_e051:0 "Clean Streets"
    EEN_nf_e051_desc:0 "The people of our first city will enjoy nice walks on clean streets. Nothing they need will ever be more than 15 minutes away."
    EEN_nf_e052:0 "Vault 101"
    EEN_nf_e052_desc:0 "One of the last few vaults still full of pure citizens, Vault 101 has sent out radio signals. It is time we welcome them to the new America."
    EEN_nf_e053:0 "Eden National Airport"
    EEN_nf_e053_desc:0 "A massive airpot will sit in our city. A hub of commerce as well as a place for our soldiers to reutrn home on leave. If all else fails, it'll be a staging ground for the city's defense."
    EEN_nf_e054:0 "Home Sweet Home"
    EEN_nf_e054_desc:0 "The homes of our people will be designed to provide comfort, security and community."
    EEN_nf_e055:0 "Our New Capital"
    EEN_nf_e055_desc:0 "Finally, the first city of the New America is created. A crowning achievement, it will be the seat of our new capital."
    EEN_nf_e056:0 "Unteathered Science"
    EEN_nf_e056_desc:0 "Without the misguided belief that wasteland mutants are humans, our science departments can really solve problems. Test subjects abound and our resources are plentiful. We will usher in a new age of scientific discovery."
    EEN_nf_e057:0 "Study Cybernetics"
    EEN_nf_e057_desc:0 "Before the war, there were a few studies into cybernetic enhancements for humans. The bombs more or less stalled that line of research, but now we can start diverting resources back to this idea."
    EEN_nf_e058:0 "Vault 108"
    EEN_nf_e058_desc:0 "If the records in Vault Tec HQ are to be believed, Vault 108 was to hold a number of cloning tirals. We should investigate and see what became of them."
    EEN_nf_e059:0 "Greater Deathclaw Control"
    EEN_nf_e059_desc:0 "Having a deathclaw patrol around an outpost thinking it is their nest is all well and good, but with further research we could try ot send them signals prompting them to attack positions or maybe even work with each other to assault a bunker."
    EEN_nf_e060:0 "Cybernetic Advancements"
    EEN_nf_e060_desc:0 "Cybernetic advancement seems to be the next path for human evolution, better continue working at it."
    EEN_nf_e061:0 "Fix Their Mistakes"
    EEN_nf_e061_desc:0 "Vault 108, like most other vault experiments, seems to have ended in failure. We will scour the computers and try to fix what they did wrong."
    EEN_nf_e062:0 "Deathclaw Augmentations"
    EEN_nf_e062_desc:0 "I WANT A FRICKIN DEATHCLAW WITH A FRICKIN LAZERBEAM ATTACHED TO ITS FRICKIN HEAD!"
    EEN_nf_e063:0 "Americanizing Implants"
    EEN_nf_e063_desc:0 "With a few small modifications to our standard implants we should be able to tweak the mindset of the user to be more American."
    EEN_nf_e064:0 "Succesful Clones"
    EEN_nf_e064_desc:0 "We are almost there, the first cloned baby is ready to be... born? Whatever you want to call it, it is a big step into the future."
    EEN_nf_e065:0 "Deathclaw Soldiers"
    EEN_nf_e065_desc:0 "Thanks to the hard work of many scientists and the noble sacrifice of many mutant test subjects, we have finally refined deathclaw control enough to make them a regular part of our armed forces. We can not have them replace man or machines, but they will be very useful in assaulting positions otherwise too costly to take."
    EEN_nf_e066:0 "What are Boundries?"
    EEN_nf_e066_desc:0 "By prioritizing science and simply putting aside the notion that mutants deserve some semblence of sympathy, we have achieved heights rarely thought possible."
    EEN_nf_e067:0 "Brighter Tomorrow"
    EEN_nf_e067_desc:0 "With a new city to reside in, new army to protect them and new advancements to look forward to, our people enjoy a hope for the future not seen since before the bombs fell. God bless The Enclave, and God bless America!"
    EEN_nf_e068:0 "Mutants Abound"
    EEN_nf_e068_desc:0 "The Brotherhood and the mutant rabble they sent at us weren't the only wretches skulking around The DC Ruins."
    EEN_nf_e069:0 "The Lincoln Project"
    EEN_nf_e069_desc:0 "The Lincoln memorial lies in ruin. A great sin in the face of America's greatest president. The second best president, President Eden, is already drawing up plans for its restoration."
    EEN_nf_e070:0 "The Great White North"
    EEN_nf_e070_desc:0 "Up north there are rumors of rogue AIs running amuck. Perhaps Eden in his superior logic, could reason with them."
    EEN_nf_e071:0 "Cultists to our West"
    EEN_nf_e071_desc:0 "To the west lie a few mutants that worship a rock. We need to kill them so the resources they sit on can fuel the rebuilding efforts."
    EEN_nf_e072:0 "Dirty Mockery"
    EEN_nf_e072_desc:0 "Just south of DC are a bunch of despicable mutants that consume other mutants and try to pass themselves off as good Americans. Obviously, they have to go."
    EEN_nf_e073:0 "The Outcasts"
    EEN_nf_e073_desc:0 "As if The Brotherhood of Steel were not bad enough, these so-called Outcasts are just as dangerous. We should have wiped them out when we killed their ilk."
    EEN_nf_e074:0 "The Southern Border"
    EEN_nf_e074_desc:0 "It will take decades to push all the way down to the tip of Florida, and honestly most of the south wasn't worth much even before The Great War. Perhaps we should fortify this region just to keep the scum out while we clean what we have."
    EEN_nf_e075:0 "The Abolitionists?"
    EEN_nf_e075_desc:0 "There seems to be a cult that worships Lincoln occupying the memorial. Could this be a rare case where Eden shows sympathy to mutants?"
    EEN_nf_e076:0 "Lincoln Exhibit"
    EEN_nf_e076_desc:0 "The Museum of History was rumored to have an exhibit dedicated solely to Lincoln before the bombs fell. A team should be dispatched there to retrieve what we can."
    EEN_nf_e077:0 "The Lincoln Museum"
    EEN_nf_e077_desc:0 "The Lincoln Memorial and the buildings around it are to be converted into a museum detailing both the life of this great president and his influence on the noble goals of The Enclave."
    EEN_nf_e078:0 "The US Health Service"
    EEN_nf_e078_desc:0 "Up north there is a pre-war medical machine driven mad by the mutagenic horrors it has witnessed. The poor thing did not know that the mutants it tried to save were not human anymore, perhaps showing it signs of what real humanity looks like will help it remember."
    EEN_nf_e079:0 "WASHINGTON?"
    EEN_nf_e079_desc:0 "As part of a failed Canadian Communist plot, a rogue AI by the name of Washington was created to fight the good people of the United States army. We thought its continued existence was just a rumor spread by the rebels fighting The Ontario Enclave, but the reports from our scouts show WASHINGTON is still online. This abomination and all that stand with it must be wiped from America's Canadian soil."
    EEN_nf_e080:0 "Boarding Action"
    EEN_nf_e080_desc:0 "A swarm of mutants that think themselves scientists occupy the wreck of a US warship. The beached rustbucket may not be worth a damn, but the point stands that we can't allow mutatns to squat on our property."
    EEN_nf_e081:0 "The Windsor Plants"
    EEN_nf_e081_desc:0 "The automotive plants of Windsor have been kept in better condition than many other factories in the nation. With some wastleander slaves we could have a real industry here."
    EEN_nf_e082:0 "Into The Pitt"
    EEN_nf_e082_desc:0 "The Pitt is just another hive of mutant scum that tries to pretend they are a society. They sit on valuable resources and worst of all, American soil."
    EEN_nf_e083:0 "Despicable Trogs"
    EEN_nf_e083_desc:0 "As if the hideously irradiated feral ghouls and other horrid monstrosities of the wasteland were not bad enough, The Pitt has some kind of unique abomination they call a Trog. Trogs have no place in America and must be wiped out."
    EEN_nf_e084:0 "FEV Swamps"
    EEN_nf_e084_desc:0 "The swamps to our south would take decades to clear of mutagenic filth through conventional means. One enterprising officer has come forward with a plan. If we administer the same modified FEV we used to clean the capital wasteland to the swamps, they believe it could drastically reduce enemy resistance."
    EEN_nf_e085:0 "Meet The New Boss"
    EEN_nf_e085_desc:0 "Saved from Ashur? No, more like under new management."
    EEN_nf_e086:0 "Red Snow"
    EEN_nf_e086_desc:0 "The mutants of Canada will be driven off American soil, or they will find themselves dying in the snow."
    EEN_nf_e087:0 "From Sea to Shining Sea"
    EEN_nf_e087_desc:0 "For the second time since atomic fire rained down from the heavens, America has clawed itself back from the brink of death. With each victory over the mutant menace, with each mile liberated, America gets that much closer to finally being whole again. This country will live again, and the people of this great nation will enjoy peace, comfort and liberty from sea to shining sea."
    EEN_nf_f001:0 "We Have Returned"
    EEN_nf_f001_desc:0 "Over 200 years ago, The United States military had to abandon The Pentagon and go to secure bunkers across the country. In that time the facility had decayed and become home to The Lyons Chatper of The Brotherhood of Steel. Now that we have kicked those pseudo-knightly fanatics out, we can begin to make use of the facility. But first, we must assess the state of things."
    EEN_nf_f002:0 "Move Command from Adams"
    EEN_nf_f002_desc:0 "Adams Air Force Base was a suitable fall-back point when Raven Rock was destroyed, but it was never meant to be the heart of The United States army. We will still maintain our base here, but as we repair The Pentagon we will relocate more and more of our command and control operations there."
    EEN_nf_f003:0 "Move Command from Raven Rock"
    EEN_nf_f003_desc:0 "Raven Rock served well as a home to The Enclave these last few decades, but what will it say to the American people if we continue to hide in a mountain bunker? No, we will restore The Pentagon to its former glory and use it as our main base. This will serve as a symbol to let everyone know that America is back."
    EEN_nf_f004:0 "Clearing the Rubble"
    EEN_nf_f004_desc:0 "As if the ravages of time were not enough, The Brotherhood's stubborn defense of their stolen home left serious damage. If we do not fix up these crumbling walls, this place will fall apart before long."
    EEN_nf_f005:0 "The Bailey"
    EEN_nf_f005_desc:0 "The Brotherhood turned The Pentagon's courtyard into a ramshackle training field. We have much better plans. With a little work we can convert the courtyard, along with the nearby parking lots, into secure landing and refueling zones for our vertibirds."
    EEN_nf_f006:0 "Our Local Library"
    EEN_nf_f006_desc:0 "Located just a short distance from The Pentagon is the Library of Congress. While most of these books have surely rotted away over the centuries, Brotherhood records show some wastelander was rumored to have pulled the library's entire archive from an old computer somewhere in the ruin. With that archive we can fill holes in our own databases, which will surely boost our research."
    EEN_nf_f007:0 "One if by Land"
    EEN_nf_f007_desc:0 "The Brotherhood's idea of a secure home base was a few sandbags and a giant hunk of scrap metal hoisted by a crane. We can, and should do better for the future seat of our military command. Our perimiter must be secured to halt land attacks on The Pentagon, or at least slow them down enough to prepare our defenses."
    EEN_nf_f008:0 "Two if by Sea"
    EEN_nf_f008_desc:0 "The defenders and civilians of Control Station Enclave was brought down becasue wastelanders were able to get a single old tanker working. Imagine what could happen if we left ourselves undefended against an enemy that had a coordinated navy? The shores near The Pentagon must be defended to prevent that possibilty."
    EEN_nf_f009:0 "Three if by Air"
    EEN_nf_f009_desc:0 "We can not rule out the possiblity that a couple our enemies out there have developed airplanes, no matter how rudimentary. To protect our high command from bombing runs, we will need to erect anti-aircraft positions on The Pentagon's roof."
    EEN_nf_f010:0 "Repatriating Equipment"
    EEN_nf_f010_desc:0 "The former occupants of The Pentagon did their best to loot every single valuable piece of equipment in the facility and the area around it. Lucky for us, they then stockpiled it here. While a lot of it has already been recovered and inventoried, there are still a few storage rooms in the basement levels we haven't gotten around to checking."
    EEN_nf_f011:0 "Brotherhood Prototypes"
    EEN_nf_f011_desc:0 "While The Brotherhood scrubbed as much of their digital archives as they could before we took The Pentagon, it appears they forgot about physical blueprints and prototypes. Some of our scientists scoff at the idea of trying to study Brotherhood tech, but they got all the way out here without vertibirds and got Liberty Prime working, so there is something to be said for their scribes ability."
    EEN_nf_f012:0 "Pre-War Advancements"
    EEN_nf_f012_desc:0 "One of the last great projects in The Pentagon before the war crippled America was Liberty Prime. While that machine ended up being destroyed in the war with The Brotherhood, its schematics as well as the schematics for several prototypes were still in The Pentagon's dusty archives. We could get something useful out of them."
    EEN_nf_f013:0 "Command Radio"
    EEN_nf_f013_desc:0 "The High Command will not be worth much if they can not relay their orders quickly. We need to install the necessary equipment to connect The Pentagon to the rest of our communications network."
    EEN_nf_f014:0 "The Pentagon is Back"
    EEN_nf_f014_desc:0 "After many months of work, we finally are closing in on restoring The Pentagon to something we can be proud to call the center of our military organization. Just a few more finishing touches are needed."
    EEN_nf_g001:0 "Voice, Heart, And Soul"
    EEN_nf_g001_desc:0 "The bulk of The Enclave died with the destruction of the rig. Those that survived came out east for the call of President Eden. As such, it is clear that we are the true Enclave. All other outposts and splinters should follow our lead."
    EEN_nf_g002:0 "Big Trouble In Little Ronto"
    EEN_nf_g002_desc:0 "The Ontario Enclave fell off our radar years ago with their defeat by canadian mutants. Thankfully it appears it wasn't a total defeat."
    EEN_nf_g003:0 "Enter The Ontario Bunker"
    EEN_nf_g003_desc:0 "The home of The Ontario Enclave appears abandoned, but so did Raven Rock to the untrained eye."
    EEN_nf_g004:0 "Search for The Lost"
    EEN_nf_g004_desc:0 "Many ventured from The Ontario Bunker following their defeat. Bunker logs tell us where they went, we just need to follow the trail."
    EEN_nf_g005:0 "Study Winterization Techniques"
    EEN_nf_g005_desc:0 "Frozen theatres of operation like the Canadian wastes pose unique challenges for an army. By studying how The Ontario Enclave has adapted, we can better prepare our own army for our march through the frozen wastes."
    EEN_nf_g006:0 "HERMES Armor"
    EEN_nf_g006_desc:0 "Faced with limited resources, The Ontario Enclave developed a lighter alternative to X-02 power armor. It is doubtful we would ever need to use such armor, and we could likely develop it ourselves if the need arose, but it couldn't hurt to have the blueprints handy."
    EEN_nf_g007:0 "W.A.S.H.I.N.G.T.O.N Insights"
    EEN_nf_g007_desc:0 "The pre-war occupation AI W.A.S.H.I.N.G.T.O.N may have been corrupted by Canadian communists, but in its memory there was plenty of useful data on the occupation. The data should yield insights into techniques for subduing an unruly populace and combatting guerilla warfare, two problems we face when we liberate territory."
    EEN_nf_g008:0 "Reap Canada's Bounty"
    EEN_nf_g008_desc:0 "Canada has more to it than snow and two-headed moose. Like much of the wasteland there is a mountain of salvagable technology that could bolster our war effort. Our comrades in Ontario are happy to share this wealth."
    EEN_nf_g009:0 "Chicago Calling"
    EEN_nf_g009_desc:0 "The outpost in Chicago seems to have been doing well despite being embattled by hordes of mutants. Perhaps we can help each other until we resolve our respective problems."
    EEN_nf_g010:0 "Exchanging Notes"
    EEN_nf_g010_desc:0 "From the Californian wasteland to the plains of Illinois, chapters of The Brotherhood of Steel pop up like radroaches. Having had to fight these terrorists in years past, we know a thing or two about countering their tactics. It is likely Chicago has developed similar strategies. We should compare our doctrines to see what we can learn from each other."
    EEN_nf_g011:0 "Discuss Modern Military Theory"
    EEN_nf_g011_desc:0 "Chicago has some of the best living officers outside of Raven Rock. Facilitating discussion between our officers will prove beneifical."
    EEN_nf_g012:0 "Political Posturing"
    EEN_nf_g012_desc:0 "Whether it is true in Chicago or not, promoting the idea that the other large enclave outposts accept President Eden's rule will improve morale and stability in Raven Rock."
    EEN_nf_g013:0 "Promote Enclave Unity"
    EEN_nf_g013_desc:0 "Many great nations in the past fell due to political infighting. Of course, that will never happen to us. One Enclave, one America, now and forever!"
    EEN_nf_g014:0 "Chicago's Plasma"
    EEN_nf_g014_desc:0 "Raven Rock is an impressive facility but it still is limited in its industrial capacity. Chicago on the other hand has enough plasma rifles that they're willing to share as a favor to the president."
    EEN_nf_g015:0 "Accept Additional Armor"
    EEN_nf_g015_desc:0 "Of course, what good is a plasma rifle if the man using it can be picked off by a rusty pipe rifle? We should accept Chicago's offer of spare power armor suits."
    EEN_nf_g016:0 "A House Call"
    EEN_nf_g016_desc:0 "The good doctor BMMAU has revolutionary ideas of how to deal with the mutation ravaging America. Let us help him out."
    EEN_nf_g017:0 "Meeting Of Minds"
    EEN_nf_g017_desc:0 "The Buffalo Health Service has volumes of medical data collected from centuries of experiments on wastelanders. We have exhaustive volumes of data on robotics development. An exchange would be mutually beneficial"
    EEN_nf_g018:0 "Groundbreaking Treatments"
    EEN_nf_g018_desc:0 "Before BMMAU decided on their current treatment for wasteland mutations, they spent decades studying the wastelander condition. These insights will help us protect true Americans."
    EEN_nf_g019:0 "Method To The Madness"
    EEN_nf_g019_desc:0 "BMMAUs method of dealing with wasteland mutants is something our scientists could learn a great deal from."
    EEN_nf_g020:0 "Clinical Trials"
    EEN_nf_g020_desc:0 "The Buffalo Method of dealing with mutants may not be as practical as Project Purity, but it has its benefits."
    EEN_nf_g021:0 "Pharmacy Run"
    EEN_nf_g021_desc:0 "The Buffalo Health Service has a sizable cache of medicine they are not using in their latest cure. Surely they wouldn't mind us making use of it."
    EEN_nf_g022:0 "Ambulance Services"
    EEN_nf_g022_desc:0 "BMMAU is always looking for more patients to cure. As good Americans, we should lend a hand."
    EEN_nf_g023:0 "Navarro's Legacy"
    EEN_nf_g023_desc:0 "Contact with Navarro was cut off shortly after we relocated east. Even after restoring our communications there has been nothing but static, until now."
    EEN_nf_g024:0 "Care Packages"
    EEN_nf_g024_desc:0 "The survivors of Navarro are doing their best to keep the dream of America alive on the west coast. Times may be tough for us, but maybe we could still help."
    EEN_nf_g025:0 "Navarro Archives"
    EEN_nf_g025_desc:0 "Granite Company was able to retake Navarro from The NCR. In securing the base they were able to unlock databanks the bear was unable to crack."
    EEN_nf_g026:0 "A Rolling Stone"
    EEN_nf_g026_desc:0 "Granite Company has been on the run from The NCR for some time. Without our help, they will eventually be found."
    EEN_nf_g027:0 "Tales of The Bear"
    EEN_nf_g027_desc:0 "Granite Company has something nobody else on this side of the country has, firsthand experience fighting The NCR. That will prove useful when we return west."
    EEN_nf_g028:0 "Enclave's Talons"
    EEN_nf_g028_desc:0 "Talon Company fought hard against The Brotherhood in our recent conflict. Now we need to decide what to do with them."
    EEN_nf_g029:0 "After-Action Reports"
    EEN_nf_g029_desc:0 "The command we installed at Talon Company kept detailed reports of their engagements with The Brotherhood. Let us take a look."
    EEN_nf_g030:0 "Wargames"
    EEN_nf_g030_desc:0 "Joint training exercises with Talon Company will be beneficial to both of us."
    EEN_nf_g031:0 "Take Out The Trash"
    EEN_nf_g031_desc:0 "The mutants of Talon Company have outlived their usefulness and have managed to turn the officers installed there against good American values. It is time to wipe them out."
    EEN_nf_g032:0 "Banister Workcamps"
    EEN_nf_g032_desc:0 "Fort Banister as it presently stands has little strategic importance to The Enclave. Frankly the crumbling ruin has little value beyond what salvage can be pulled out of it. So, we will do just that. Fort Banister will be turned into a heavily supervised work camp where captured wastelanders can do this country a service by pulling whatever value is left from the once great base."
    EEN_nf_g033:0 "Sun, Surf, Space"
    EEN_nf_g033_desc:0 "Contact has been restored with Van Buren AFB. Before we decide how to handle them, we need to assess their situation. After all, it has been some time since we last had contact."
    EEN_nf_g034:0 "Send Aid South"
    EEN_nf_g034_desc:0 "Our comrades down south need our help if they are to complete their mission."
    EEN_nf_g035:0 "Aerospace Archives"
    EEN_nf_g035_desc:0 "The air base databanks hold a trove of data on aircraft development."
    EEN_nf_g036:0 "Returning To The Fold"
    EEN_nf_g036_desc:0 "The Enclave outpost in Florida was overrun. The survivors are asking to return home."
    EEN_nf_g037:0 "Hurricane Enclave"
    EEN_nf_g037_desc:0 "We can not allow the mutants that overran VanBuren AFB to hang on to that base. We will return."
    EEN_nf_g038:0 "Just Checking In"
    EEN_nf_g038_desc:0 "Chicago has heard about our recent struggle in The Capital Wasteland. They have an urgent message for The President."
    EEN_nf_g039:0 "Respond To Chicago's Threats"
    EEN_nf_g039_desc:0 "The Secretary in Chicago has made it clear he does not approve of the necessary steps Autumn took to deal with Eden. As communications between our two enclaves become increasingly hostile, it is clear we will come to blows. We should make the first strike!"
    EEN_nf_g040:0 "Our Common Ground"
    EEN_nf_g040_desc:0 "We may not see eye to eye with Chicago on everything, but our shared goals far outweigh our small differences. The essential work of rebuilding America is more important than any petty squabbles we may have. Let us hope The Secretary agrees."
    EEN_nf_g041:0 "Plan October"
    EEN_nf_g041_desc:0 "MacArthur is one of Chicago's most important outposts in the west. We have intel that there is growing anti-Chicago sentiment in their leadership. Supporting this growing movement could net us a valuable ally, or at least weaken Chicago somewhat."
    EEN_nf_g042:0 "The Autumn Wall"
    EEN_nf_g042_desc:0 "Our eventual conflict with Chicago will be long and difficult. We will need to be ready and have defenses in place so they do not reach our heartland."
    EEN_nf_g043:0 "Rallying Cry"
    EEN_nf_g043_desc:0 "With our coalition of Enclave factions at our side, Chicago doesn't stand a chance."
    EEN_nf_g044:0 "March On Chicago"
    EEN_nf_g044_desc:0 "We are as ready as we will ever be. It is time we take the fight to this arrogant Secretary and his cronies."
    EEN_nf_g045:0 "Friendly Gestures"
    EEN_nf_g045_desc:0 "Chicago know that no matter what, we are on the same side. We should prepare a gift for Chicago to remind them of our friendly intentions"
    EEN_nf_g046:0 "De-Escalate Rhetoric"
    EEN_nf_g046_desc:0 "Too many in our administration are referring to Chicago as enemies behind closed doors. We must remind them what the great President Lincon once said; \n \n I destroy my enemies when I make them my friends."
    EEN_nf_g047:0 "Our Deepest Thanks"
    EEN_nf_g047_desc:0 "Responding to our gift, The Secretary has sent a gift from Chicago. It would appear our efforts have at least conveyed the desired message."
    EEN_nf_g048:0 "The Human's Burden"
    EEN_nf_g048_desc:0 "As the last bastions of true humanit, we have a duty to rebuild this great nation and ave the human race. How foolish it would be to throw this chance away over trivial diffrences of opinion."
    EEN_nf_g049:0 "Victory At Chicago"
    EEN_nf_g049_desc:0 "Chicago is in flames, the vast majority of The Chicago Enclave's forces are either dead or in captivity. With one final push we can put an end to this."
    EEN_nf_g050:0 "One Nation Under Autumn"
    EEN_nf_g050_desc:0 "With Chicago defeated, The Eastern Reconstruction Authority remains as the great power in The Enclave. It is time we take our proper title."
    EEN_nf_g051:0 "Name a Vice President"
    EEN_nf_g051_desc:0 "It has been too long since we had an honest to god vice president in this country. It is time we change that."
    EEN_nf_g052:0 "The Lincoln Accord"
    EEN_nf_g052_desc:0 "Representatives from the various Enclave factions are gathering in Lincoln to discuss essential matters when it comes to rebuilding our nation."
    EEN_nf_g053:0 "President Of Who?"
    EEN_nf_g053_desc:0 "After making contact with the survivors of the fall of Navarro, it has unfortunately become clear that something is very wrong with them."
    EEN_nf_g054:0 "[EEN_retards_fighting_ww_loc]"
    EEN_nf_g054_default:0 "We Are The Enclave!"
    EEN_nf_g054_wild_wasteland:0 "Two Retards Fighting"
    EEN_nf_g054_desc:0 "The Secretary has shown he will not respect the office of The President. It is only a matter of time before this alliance of ours falls apart. We need time to prepare for this, and we must be sure we don't tip our hand."
    EEN_nf_g055:0 "Gather Support"
    EEN_nf_g055_desc:0 "There are enclave outposts spread across this great nation, either from pre-war bunkers or expeditions that got a good foothold. Many of them may support The Secretary should we come to blows, but there are a few we could sway our way."
    EEN_nf_g056:0 "See Out The Disgruntled"
    EEN_nf_g056_desc:0 "No administration the size of Chicago is without a handfull of those in it that feel wronged. If we find these individuals we can turn their resentment to our benefit."
    EEN_nf_g057:0 "Friendly Wargames"
    EEN_nf_g057_desc:0 "No Mr. Secretary, we didn't forget to invite Chicago to these exercises. Your invitation must have gotten lost on the airwaves or something."
    EEN_nf_g058:0 "Divert Equipment"
    EEN_nf_g058_desc:0 "With our new assets embeded in Chicago's administration, we are able to make a few large shipments of weapons go missing."
    EEN_nf_g059:0 "Crush The Secretary"
    EEN_nf_g059_desc:0 "Chicago thinks because they threw their weight around among the savage mutants of the midwest they are the true leaders of America. It is up to us to remind them The President runs this country, not some secretary."
    EEN_nf_g060:0 "Not So Smug Now"
    EEN_nf_g060_desc:0 "The forces of Chicago have been defeated, now there can be no doubt who runs this country."

    ###Events###
    EEN_events.1.title:0 "A Few Moments Later"
    EEN_events.1.desc:0 "President Eden's outburst shook the Colonel to his core. As he walked down the hallway out of Eden's chamber he could barely hold his composure, watching every automated turret and sentry bot out of the corner of his eye. He understood that at any moment they could turn on him and tear him to shreds before he'd be able to reach cover. Thankfully a bathroom was only a few yards down the hall and he made it into the room unscathed. As he looked in the mirror and tried to calm himself, new feelings emerged from the fear. He couldn't hold back the tears as he remembered The President's words. Was he really cringe?"
    EEN_events.1.a:0 "§CWaahhhhhahhhhhhhh"
    EEN_events.2.title:0 "A Hidden Drawing"
    EEN_events.2.desc:0 "Before Eden could respond, Autumn saw another drawing out of the corner of his eye. Just slightly poking out from under a mountain of posters was a drawing of him and Eden's humansona, and they were kissing? Eden became very quiet as Autumn picked up and examined the drawing. It would seem if there was one thing other than America and Genocide that Eden loved, it's was him. Maybe he was too harsh on Eden for his want to be human. \n\n §B"I like this one. Let me take a look at the rest of them."§! \n\nEden was relieved to hear that and the two spent the rest of the night discussing The Enclave's image and better propaganda. In the morning they had a new plan to revitalize The Enclave's image."
    EEN_events.2.a:0 "We are now The §RW§!§Oo§!§Yk§!§Ge§!§Bc§!§0l§!§Ra§!§Ov§!§Ye§!!"
    EEN_events.3.title:0 "Another Clinic Attacked!"
    EEN_events.3.desc.1:0 "Just as before, one of our cure clinics was attacked by wasteland rebels. This time however, we were ready. The increased security at the facility was able to fend off the attack with only limited casualties. The surviving insurgents fled and were not given chase, but they will think twice before attacking one of these clinics again."
    EEN_events.3.desc.2:0 "Just as before, one of our cure clinics was attacked by wasteland rebles. The limited security was once again overwhelmed and more scientists were dragged off by the rebels. Whatever they are planning, it does not bode well for us."
    EEN_events.3.a:0 "Well done"
    EEN_events.3.b:0 "Increase secuiry at our clinics!"
    EEN_events.4.title:0 "Rogue Radio Broadcast"
    EEN_events.4.desc:0 "Our radio signals are being hijakced by wasteland rebels, likely with help of surviving brotherhood scribes and our captured scientists. They broadcast a message from 3-Dog, who we thought died in the battle of GNR. He is warning the people of The Capital Wasteland and beyond to avoid water distributed by our soldiers. This broadcast has occured multiple times at random intervals, and always terminates before we are able to triangulate the signal. We are stretched thin as it is, can we afford to chase this down?"
    EEN_events.4.a:0 "We have to stop them, no matter the cost!"
    EEN_events.4.b:0 "Spare what little we can to stop them!"
    EEN_events.5.title:0 "Explosion In The Hills"
    EEN_events.5.desc:0 "This past week, the illegal boradcast by 3-Dog and the wastelander rebels went on for 4 seconds longer than usual. That was all we needed to close in on the signal. It was traced to a pre-war broadcasting station for a small GNR affiliate. When our men approached the facility they were fired on by automated security, but the rustbucket turrets did little against their power armor. However once inside, they found the faciliy to be empty with the equipment rigged to broadcast a holotape at random intervals. That was the last transmission we received from them before a massive explosion leveled the building and everything inside it. A followup team confirmed it was likely some kind of mini-nuke based improvised device. We had fallen into a trap."
    EEN_events.5.a:0 "Double our efforts!"
    EEN_events.6.title:0 "Putting Down 3-Dog"
    EEN_events.6.desc:0 "After discovering a few of the origin points for past wastelander broadcasts, we were able to notice a pattern in the movement of the rebels. Teams were sent to 4 likely next braodcast points and lay in waiting for 3-Dog and his friends. The group of wasteland militia, Brotherhood deserters and occasional mercenaries were no match for our soldiers. 3-Dogs death was confirmed this time, and we should not expect to see any more of his broadcasts warning the wastelanders about our plans. Unfortunately, our scientists were dressed up as common wastelanders and were caught in the crossfire."
    EEN_events.6.a:0 "At least this is an end to the problem"
    EEN_events.7.title:0 "Anti-Enclave Demonstration"
    EEN_events.7.desc:0 "A moderately sized settlement in our territory was recently home to a large Anti-Enclave protest. Several wastelanders spoke against our rule to a crowd of hundreds critiquing our policies and demanding we leave their settlements. While the demonstration didn't turn to violence, there was mention of removing our soldiers by force if we refused to leave."
    EEN_events.7.a:0 "Arrest the Organizers"
    EEN_events.7.b:0 "It's just talk"
    EEN_events.7.c:0 "Maybe a compromise can be reached"
    EEN_events.8.title:0 "Mini-Nuke Strike!"
    EEN_events.8.desc:0 "One of our checkpoints was the site of a bombing by terrorists opposed to our rule. The explosive in question was an improvised device made from an old mini-nuke. Peacekeepers are already making sweeps to find the perpetrators, but another matter needs to be addressed. Mini-nukes, while rare, are common enough in the wasteland that with enough money just about any wastelander can get their hands on one. Some officers are calling for us to make the posession of mini-nukes illegal, and institute some sort of program to collect the ones floating around our territory. While it will not guarantee something like this won't happen again, it could theoretically make it harder for the terrorists."
    EEN_events.8.a:0 "Nukes are not protected by the second amendment"
    EEN_events.8.b:0 "That would just embolden them!"
    EEN_events.9.title:0 "Another Mini-Nuke Strike"
    EEN_events.9.desc:0 "Another one of our checkpoints was the site of a bombing by terrorists opposed to our rule. Once again they used an improvised device made from an old mini-nuke. Our Peacekeepers are still looking for the terrorists behind the previous attack, but say they are getting close."
    EEN_events.9.a:0 "Who could have predicted this?"
    EEN_events.10.title:0 "Mini-Nuke Bombers Stopped"
    EEN_events.10.desc.1:0 "Finally the terrorists behind the recent mini-nuke bombings have been stopped, but not without losses. During the raid on their main base in a pre-war sewer tunnel, the terrorists were able to detonate another improvised exlosive, killing themselves and many of the peacekeepers seeking to aprehend them."
    EEN_events.10.desc.2:0 "Finally the terrorists behind the recent mini-nuke bombings have been stopped. In a massive undercover operation, an agent posing as an illicit goods dealer was able to secure a meeting with thier groups leadership by spreading a rumor that he got his hands on a cache of mini-nukes some old scavenger found. The terrorists, having difficulty finding new munitions agreed to his meeting terms and were swiftly apprehended by peacekeeping forces. Their execution by firing squad will be broadcast on Enclave Radio tomorrow at 12. That should teach any other scoundrels what happens when they commit acts like these."
    EEN_events.10.a:0 "At least its over"
    EEN_events.10.b:0 "A job well done!"
    EEN_events.11.title:0 "The Sneedclave?"
    EEN_events.11.desc:0 "Two days ago we picked up a radio call from a group claiming to be Enclave Remnants looking to regroup. They used a secured military frequency so a scout team was sent to check it out. The individuals were found in an old agricultual store called Sneeds Seed & Feed. The group of 5 individuals identified themselves as the Sneedclave remant, and it is without a doubt they are not enclave. Their so-called power armor was just poorly painted metal armor crudely molded to look like power armor. Still they seem very genuine in their desire to 'regroup' with the Enclave...."
    EEN_events.11.a:0 "We will not accept unwashed mutants!"
    EEN_events.11.b:0 "Cannon fodder is cannon fodder."
    EEN_events.12.title:0 "An unfortunate incident"
    EEN_events.12.desc:0 "The Mayor of a small settlement on our fringe came to us with troubling news. One of the local bosses we made a deal with seems to have razed half their settlement to the ground and carried off with some of their women. The Mayor is out for blood, and this gang has definitely gone outside of our agreement. However, clamping down on these scumbags won't be simple."
    EEN_events.12.a:0 "Tell the gang to correct themselves"
    EEN_events.12.b:0 "Crush these insurrectionists!"
    EEN_events.12.c:0 "Bring them to trial and bust out the rope"
    EEN_events.13.title:0 "Raider Gang strikes again!"
    EEN_events.13.desc:0 "The raiders we let off with a warning last time they razed half a town has caused yet another stir. It looks like letting them off has emboldened the leader and he is attempting to expand his unofficial territory. This time his people hit a military supply caravan and made off with some crates of weapons. We need to shut this upstart down before he turns it into a full rebellion."
    EEN_events.13.a:0 "No negotiation, no trials, kill them all"
    EEN_events.14.title:0 "Upstart shut down"
    EEN_events.14.desc:0 "Those raggedy little upstarts that thought themselves above the laws of America have been put down. A platoon of soldiers decended on their hideaway late last night and slaughtered these traitors. This should send a strong message to others to remember the terms of our agreements."
    EEN_events.14.a:0 "Stay in line or be put down."
    EEN_events.15.title:0 "Raiders hold us off!"
    EEN_events.15.desc:0 "Our soldiers met fierce resistance while attempting to clear out the raiders that had been causing us trouble recently. These raiders seem to have gotten much stronger than we last checked, and those crates of advanced weapons they made off with surely did not help things. Now this bandit king is digging his men in and rooting them out will take a long term offensive and will not be easy."
    EEN_events.15.a:0 "Whatever it takes, we can not let this stand!"
    EEN_events.16.title:0 "Privateer Dispute"
    EEN_events.16.desc:0 "While our relationship with the bandits we have brought into the fold has been unusual, we never could have anticipated this issue. Two different privateer captains have come to us over a dispute over territory on our borders. We never gave any official designation on who can raid where, just outside of our borders. Now they are wanting us to settle the dispute or they will settle it the old fashioned way."
    EEN_events.16.a:0 "Side with one party"
    EEN_events.16.b:0 "Brew up some coffee and work out an agreement"
    EEN_events.16.c:0 "Let them settle it their way."
    EEN_events.17.title:0 "Revised Privateer Agreements"
    EEN_events.17.desc:0 "In light of us sorting out disagreements between privateers operating in our lands some in the administration have proposed working out new agreements with our privateers. Putting down stricter rules, assigning territory, and possibly putting some of them in direct employ."
    EEN_events.17.a:0 "Create an official privateer agency"
    EEN_events.17.b:0 "Let us tighten the leash a bit"
    EEN_events.17.c:0 "The status-quo works and will remain in place"
    EEN_events.18.title:0 "Bribery and Corruption"
    EEN_events.18.desc:0 "As we should have expected, raiders are not the most clean and noble police. Recent news has come out from the fringes about raider cops accepting bribes and running drugs then using their authority to deal with competition and prying eyes. If we do not handle this right, it could spell disaster."
    EEN_events.18.a:0 "Bring in the obvious offenders and end it there"
    EEN_events.18.b:0 "We need a full investigation!"
    EEN_events.18.c:0 "Discreetly make every suspect disappear."
    EEN_events.19.title:0 "To catch a criminal..."
    EEN_events.19.desc:0 "There was an old saying that to catch a criminal sometimes you need a criminal. There may be some truth to those words as one of the former raider police departments out East were able to crack a major smuggling ring that was sneaking advanced weaponry out to our enemies. There is just one problem, some of the men they charged are Enclave personnel. This is a victory, but a precarious one."
    EEN_events.19.a:0 "Bring the traitors to a firing squad!"
    EEN_events.19.b:0 "We may need to find lesser charges for the soldiers."
    EEN_events.19.c:0 "Congrats to the officers, but leave the soldiers alone"
    EEN_events.20.title:0 "Raider Conflicts on Border"
    EEN_events.20.desc:0 "Due to our unwillingness to weigh in on the territorial conflict between two of our Privateer groups the two gangs have started fighting each other. While usually a few light skirmishes between groups we generally consider undesirable is seen as a good thing, this has the potential to boil over out of control if we do not step in"
    EEN_events.20.a:0 "Let them fight"
    EEN_events.20.b:0 "Bring them back to the negotiation table"
    EEN_events.20.c:0 "Put both these groups down for disturbing the peace"
    EEN_events.21.title:0 "The scorned party"
    EEN_events.21.desc:0 "Some time back we ended up siding with one privateer gang over another in a territorial dispute. While at the time this seemed the smart thing to do, it looks like it has come back to bite us. The gang we sided against has taken to striking within our territory to make up their lost plunder. How should we respond?"
    EEN_events.21.a:0 "Wipe them out"
    EEN_events.21.b:0 "Send the other gang after them"
    EEN_events.22.title:0 "Successful Sweep"
    EEN_events.22.desc:0 "In the early hours of the morning, vertibirds descended upon a small raider encampment in our frontier. Those that resisted were quickly eradicated, and those that didnt await a quick trial and execution for crimes against America."
    EEN_events.22.a:0 "Well done"
    EEN_events.23.title:0 "Prolonged Firefight"
    EEN_events.23.desc:0 "A squad of soldiers encountered stiffer than expected resistance while attempting to clear a raider encampment within our borders. They took losses but were eventually able to wipe out all raider resistance in the camp"
    EEN_events.23.a:0 "A necessary cost for security"
    EEN_events.24.title:0 "Raiders Escape"
    EEN_events.24.desc:0 "Raiders targeted by a recent sweep were able to abandon their camp the night before our assault, right under the noses of advance scouts. Our efforts to stabalize the region will be hampered as we find ourselves back at square one."
    EEN_events.24.a:0 "Do not let them get away again"
    EEN_events.25.title:0 "Raider Trap"
    EEN_events.25.desc:0 "Soldiers sent to clear out a raider camp took heavy losses and had to reatreat after finding what was supposed to be a lightly defended hovel was really a massive boobytrapped underground system of tunnels. This embarassing incident will only serve to embolden the enemy"
    EEN_events.25.a:0 "A colossal failure"
    EEN_events.26.title:0 "Raider Stockpile Siezed"
    EEN_events.26.desc:0 "A recent raid on a dwelling believed to be the home of anarchistic scum turned out better than expected. The opposition was quickly crushed and the location was revelaed to be a vital supply depot. A large amount of equipment and funds was siezed in what is both a heavy blow to the enemy and a boon to us."
    EEN_events.26.a:0 "Make good use of it"
    EEN_events.27.title:0 "James' Return"
    EEN_events.27.desc:0 "After abandoning Project Purity nearly 20 years ago, James came back from Vault 101 trying to pick things up like nothing happened. He claimed to have serious leads he got from the computers in the vault, and that remains to be seen. But with the help of his child, he was able to convince several scientists to drop their projects and follow him to the Jefferson Memorial. It remains to be seen what will become of their project, but if they really are close to creating a massive supply of clean water, maybe we should plant a stake before someone else does."
    EEN_events.27.a:0 "We have time"
    EEN_events.28.title:0 "Water Purifier Rumors"
    EEN_events.28.desc:0 "Over the years our intel teams have heard tales of a big water purifier project at The Jefferson Memorial that was abandoned some time ago. While many write the idea off as a fanciful rumor by dehydrated wastelanders, a handfull of our scientists have argued that such a project is at least feasable on paper. Despite this, the project was abandoned due to the inability to finish it, so it's not worth The Enclave's time. That was until an agent monitoring the wasteland settlement of Rivet City reported in that a convoy of scientists, guards and assistants left Rivet City and set out for The Jefferson Memorial. They are requesting we send support so they can take a closer look."
    EEN_events.28.a:0 "Now this deserves our attention"
    EEN_events.29.title:0 "Waters of Life"
    EEN_events.29.desc:0 "The scientists of Project Purity have come before the council requesting Rivet City's official support in finishing their purifier. They assured us they have almost completed the purifier, but just needed a few more resources that we could provide. Without these resources, they would need to turn to The Brotherhood for assistance. Naturally The Brotherhood would take complete control of the project. After tense negotiation we have worked out a potential arrangement should we provide our help that will leave Rivet City with the bulk of the water while the scientists could still keep a few for their humanitarian reasons. Now we just need to hold up our end of the deal."
    EEN_events.29.a:0 "Lets get to it!"
    EEN_events.30.title:0 "Water Distribution Facility Destroyed"
    EEN_events.30.desc:0 "The water distribution center in one of our provinces has been destroyed."
    EEN_events.31.title:0 "How will you play?"
    EEN_events.31.desc:0 "Alright Mr. Computer, this is the moment you decide how you are going to run The Enclave for this game. Are you going to side with your robotic brother and make sure Eden becomes president? Will you lean more towards Colonel Autumn? Or maybe you'll play as Autumn but make him a massive cunt that almost always chooses the shittiest decision in an event?"
    EEN_events.31.a:0 "President Eden"
    EEN_events.31.b:0 "Colonel Autumn"
    EEN_events.31.c:0 "Cuntmander in Chief Autumn"
    EEN_events.32.title:0 "The Enclave's Poster Child"
    EEN_events.32.desc:0 "Colonel Autumn was used to being called into meetings with President Eden whenever the President had a new plan or policy he wanted to pursue, but this time was different. The computer almost sounded giddy when he called on The Colonel to meet with him. The Colonel was not sure what to expect when he walked into The President's mainframe room, but he certainly could have never predicted this. The President had spent hours, which for a Zax computer was a massive amount of time, designing posters and billboards to advertise The Enclave once their presence was known. Propaganda like this was always part of the plan once The Enclave revealed themselves to The Capital Wasteland, but something was off. In each of these posters was a confident man in a suit, almost like a mascot for The Enclave. When The Colonel realized what he was looking at, he could not contain his words, and blurted out \n\n§B"What is that? Is that your fucking human persona? That's cringe!"§! Eden was uncharacteristically silent for some time. He was feeling some new irregularity in his programming. He regreted sharing this project with Autumn and had concern that there was an error in his programming for doing it in the first place. Was this what humans called shame? After a few brief moments Eden replied to the Colonel."
    EEN_events.32.a:0 "You're right, it was a stupid idea."
    EEN_events.32.b:0 "YOURE CRINGE!"
    EEN_events.32.c:0 "Autumn notices another drawing under the pile"
    EEN_events.33.title:0 "Assassination Attempt"
    EEN_events.33.desc:0 "While visiting a local garrison, Commander in Chief Autumn was narrowly missed by a sniper's bullet. The would-be assassin was aprehended and found to be a member of the local settlement's security detail. Interrogations are still underway but it is unclear just how involved the rest of the town guard was involved in this attempt or if the man acted alone. Autumn's cabinet is demanding immediate retaliation for this affront, lest we appear weak and lose our grip on the populace. What should we do?"
    EEN_events.33.a:0 "Broadcast the execution of the assassin"
    EEN_events.33.b:0 "Purge the entire town guard for their potential collaboration."
    EEN_events.33.c:0 "Raze the settlement for harboring this radical"
    EEN_events.34.title:0 "Clash with Talon Co"
    EEN_events.34.desc:0 "Enclave Agents investigating an arms smuggling ring ended up in a prolonged firefight with Talon Company Mercs under the employ of the smugglers. Once power armored backup arrived the surviving smugglers and mercs promptly surrendered. Talon Co management maintains that the mercs were hired for a legitimate secruity job and this illegal activity was outside the scope of their contract and has since terminated the surviving mercs that are in our custody. The public is calling for us to throw the book at Talon Co as a whole with many public figures claiming this is just the first case of illegal activity we have caught. These people say that Talon mercs frequently engage in illegal activities and just cover it up with money or threats. Some in our administration argue against going after Talon Company, pointing out that they are a valuable asset and their alleged crimes are mostly against wastelanders anyway so it doesn't really matter."
    EEN_events.34.a:0 "Remind Talon Co they are beholden to our laws"
    EEN_events.34.b:0 "Levy heavy fines on Talon Co"
    EEN_events.34.c:0 "A full investigation of Talon Company is needed"
    EEN_events.35.title:0 "Armed Uprising!"
    EEN_events.35.desc:0 "One of our fringe settlements has been the site of multiple armed skirmishes between our patrols and armed guerillas. The attackers tend to drag away their dead and vanish up into the hills. It is unclear who is behind this recent rise in attacks or who is arming these people, but our local security chief says with a few more men he could really crack down on the issue."
    EEN_events.35.a:0 "Send him support!"
    EEN_events.35.b:0 "Send Talon Company!"
    EEN_events.35.c:0 "He has enough support"
    EEN_events.36.title:0 "Startling Revelation"
    EEN_events.36.desc:0 "A recent skirmish between our forces and the armed guerillas in our unruly province has led to a shocking discovery. The attackers missed one of their dead when they retreated, and they have been confirmed to be a member of the local militia. The rifle they carried was also part of our recent delivery! Many in our military administration are outraged and are calling for everything ranging from martial law to razing the village to the ground! The settlements mayor says the guerilla must have been an outlier misappropriating equipment, and insists his guards are loyal wastelander-Americans."
    EEN_events.36.a:0 "Hunt the guerillas, nothing more"
    EEN_events.36.b:0 "Punish the settlement"
    EEN_events.36.c:0 "Purge their militia"
    EEN_events.36.d:0 "Make an example of the Mayor and militia captain"
    EEN_events.37.title:0 "The Uprising Spreads"
    EEN_events.37.desc:0 "The ingrates from the village protecting those wasteland guerillas have spread like radroaches to nearby settlements and are stoking the fires of dissent. Our patrols are reporting increasing attacks now beyond the borders of that one troubled region. In these unruly settlements our patrols are also reporting everything from anti-enclave graffiti to wasters hurling garbage at them. They are waiting on us to decide how to handle the situation."
    EEN_events.37.a:0 "Stick to hunting the rebels"
    EEN_events.37.b:0 "Anti-Enclave settlers will be arrested"
    EEN_events.37.c:0 "Burn the unruly settlements to the ground"
    EEN_events.38.title:0 "Rebel Camp Found"
    EEN_events.38.desc:0 "Our efforts to hunt down the rebels in our unruly settlements have not been in vain. After trekking through the hills for months we finally found the main rebel camp and they made a pathetic last stand as our power armored forces marched in. From the looks of the camp, this was the rebel's main base of operations and supply depot. Without this base the few guerillas that escaped should not pose further trouble."
    EEN_events.38.a:0 "Job well done"
    EEN_events.39.title:0 "The Brotherhood Scared?"
    EEN_events.39.desc:0 "For the last 3 months our soldiers at Project Purity prepared for an attack from The Brotherhood of Steel that never came. Aside from the squatters sitting across the river at The Pentagon the project security didn't see a single t45 equipped terrorist in their time guarding the facility. In this time we have improved our defenses, expanded landing zones and reassigned troops that are now ready to push out from the facility. It is almost time for us to reach across the river and push these cowards off of government property."
    EEN_events.39.a:0 "Strange"

    ###Decision Events###
    EEN_decision_events.1.title:0 "Science Team Secure"
    EEN_decision_events.1.desc:0 "The science team and their security at The Deathclaw Sanctuary were able to be safely rescued without any bumps in the road. Thankfully wastelanders and The Brotherhood avoid the area due to its deathclaw population, so our vertibirds were able to safely land and take off again without coming under fire."
    EEN_decision_events.1.a:0 "Job well done"
    EEN_decision_events.2.title:0 "Rescue Team Goes Dark"
    EEN_decision_events.2.desc:0 "Unfortunately our rescue team pilot misread the landing grid for our rescue operation and crashed just outside The Deathclaw Sanctuary. The last radio transmission we received from the trapped science team was them informing us of the situation and their plans to go down from their elevated position to rescue the vertibird team. We have received no communication since then and have to assume they died."
    EEN_decision_events.2.a:0 "Nothing we can do for them now"
    EEN_decision_events.3.title:0 "Successful Rescue"
    EEN_decision_events.3.desc:0 "The soldiers needing rescue in DC did a good job holding off their Brotherhood attackers. The extraction team was able to get in quickly and load the survivors before taking off, taking only a few laser shots that did nothing but scuff the vertibird paint."
    EEN_decision_events.3.a:0 "Job well done"
    EEN_decision_events.4.title:0 "Difficult Rescue"
    EEN_decision_events.4.desc:0 "As we should have expected, the rescue of the soldiers trapped in Downtown DC resulted in limited casualties. While most of the vertibirds were able to make it back without problem, the last bird out was hit with a Brotherhood missle and went down in a massive explosion. There were no survivors."
    EEN_decision_events.4.a:0 "About as expected"
    EEN_decision_events.5.title:0 "Complete Disaster"
    EEN_decision_events.5.desc:0 "We waited too long to rescue these soldiers. By the time our birds touched down at the LZ, their lines were being overrun and Brotherhood Knights swarmed the landing zone. The last transmission we received was from a panicked pilot attempting to take off but he has not returned to base."
    EEN_decision_events.5.a:0 "What a mess"
    EEN_decision_events.6.title:0 "Successful Rescue"
    EEN_decision_events.6.desc:0 "Our rescue team was easily able to bypass Fort Constantine's defenses and recover the trapped patrol before any Outcasts patrolling the area were any the wiser. Though the survivors are being treated for malnutrition, they should be ready to return to the front in a few days."
    EEN_decision_events.6.a:0 "Job well done"
    EEN_decision_events.7.title:0 "Rescue Team Lost"
    EEN_decision_events.7.desc:0 "We have not heard back from the rescue team or the trapped soldiers in a few days. We can only assume they encountered something in the bowls of Fort Constantine that they could not overcome."
    EEN_decision_events.7.a:0 "Mourn the dead"
    EEN_decision_events.8.title:0 "Failed Enclave Evac"
    EEN_decision_events.8.desc:0 "Some remnants of the scattered Enclave forces in DC were overrun when they attempted to evacuate via vertibird. Our Knights were able to kill the remaining soldiers and their rescuers, capturing a few vertibirds in the process."
    EEN_decision_events.8.a:0 "Well done Brothers"
    EEN_decision_events.9.title:0 "Dust and Echos"
    EEN_decision_events.9.desc:0 "As we maybe should have expected, there was no response from the Navarro oupost. Hopefully those brave men and women made it out alive."
    EEN_decision_events.9.a:0 "Spin this to our benefit"
    EEN_decision_events.10.title:0 "Support from Chicago"
    EEN_decision_events.10.desc:0 "After multiple attempts we finally made contact with an Enclave base in Chicago. They seem to have their own problems, but are still sending a group of soldiers to help us. They do expect us to return the favor someday."
    EEN_decision_events.10.a:0 "We welcome their soldiers"
    EEN_decision_events.11.title:0 "Whitesprings Response"
    EEN_decision_events.11.desc:0 "We were hoping you would make contact again. A lot has changed since we last spoke and we have a lot to catch up on, and we will do great things together.... my friend."
    EEN_decision_events.11.desc.2:0 "We are..... disappointed to hear about President Eden. We will not be able to offer aid at this time, but we will have something for you.... when you enter our neck of the woods."
    EEN_decision_events.11.a:0 "Ominous"
    EEN_decision_events.12.title:0 "Ontario Support"
    EEN_decision_events.12.desc:0 "None of the attempts at contacting the Enclave bunker in Ontario have received a response. It has been quite a while since we last contacted them so it is unclear if they have been wiped out or are just observing strict radio silence. Either way, we are much too busy to check up on them right now."
    EEN_decision_events.12.a:0 "We should look in on them down the road"
    EEN_decision_events.13.title:0 "Pittiful attack on a Brotherhood outpost"
    EEN_decision_events.13.desc:0 "While we should not be surprised, it is still a dissapointment to see that the washouts Talon Company sent at the Brotherhood outpost did little but serve as target practice. They were swiftly cut down by the defenders without inflicting any enemy casualties."
    EEN_decision_events.13.a:0 "We paid them HOW MUCH for this?"
    EEN_decision_events.14.title:0 "Pittiful attack on a Brotherhood outpost"
    EEN_decision_events.14.desc:0 "The wanabees that wanted to join Talon Company showed just why they were not cut out for our ranks. Their sad attack on the Brotherhood outpost we sent them to didn't even scruff a Knight's armor. Hopefully our employers at Raven Rock remember that we were not sending quality troops and didn't guarantee any results"
    EEN_decision_events.14.a:0 "At least we got paid"
    EEN_decision_events.15.title:0 "They call that an attack?"
    EEN_decision_events.15.desc:0 "A squad of Knights reported in that they were attacked by what they thought were drugged-out raiders on the fringes of our territory. Thankfully nobody at the outpost was hurt and only after searching the slain attackers did they realize these were not sad raiders but Talon Company mercenaries. The abysmal failure of this attack raises many questions as it flies in the face of all reports we have seen about Talon Company's organization and combat abilities."
    EEN_decision_events.15.a:0 "An initiation ritual maybe?"
    EEN_decision_events.16.title:0 "Successful skirmish"
    EEN_decision_events.16.desc:0 "We have received a report from Talon Company about the assault on a Brotherhood outpost that we hired them to carry out. The recruits they sent at the small outpost performed about as expected, suffering heavy casualties but managing to do a little damage on their own before slinking back to base. It is not anything spectacular, but you get what you pay for."
    EEN_decision_events.16.a:0 "Take that Lyons!"
    EEN_decision_events.17.title:0 "A promising few"
    EEN_decision_events.17.desc:0 "The hopefuls we sent to attack a Brotherhood outpost actually managed to kill a few of them. Sure, we knew a lot of those scrubs we sent in would not come back out. But those that did showed promise. They have shown they can fight and are cleared to head into training."
    EEN_decision_events.17.a:0 "We'll make soldiers out of them"
    EEN_decision_events.18.title:0 "A worrying prelude?"
    EEN_decision_events.18.desc:0 "Skirmishes with Talon Company mercenaries are not anything new. In the past there have been instances where a squad of Knights sent to scavenge a pre-war faility found the mercs already occupying the place and refusing to vacate. Despite this we have generally managed to stay out of eachother's way. A small detatchment of mercenaries went out of their way to launch a coordinated assault on an outpost on our fringes. While they were fought off, we did lose some knights and initiates in the struggle. The outpost had little strategic or resource value to Talon Company. Could someone have paid them to do this, and if so, why?"
    EEN_decision_events.18.a:0 "Lets hope this doesn't continue."
    EEN_decision_events.19.title:0 "Almost too good to be true"
    EEN_decision_events.19.desc:0 "Talon Company reported in recently regarding the attack we paid them to launch on a Brotherhood outpost. Few officers that read the report believed it, but eyebot scouts confirmed its accuracy. The team of Talon Company conscripts sent to assault the outpost caught the knights completely off guard and nearly wiped out the entire outpost. The few Brotherhood survivors fled, abandoning the outpost and a cache of valuable equipment that Talon Company has claimed. Our strategists are now analyzing the report for both insights into Brotherhood weaknesses and mistakes we should avoid when fighting scrappy wastelanders."
    EEN_decision_events.19.a:0 "This contract is paying off"
    EEN_decision_events.20.title:0 "The Steel Piercers"
    EEN_decision_events.20.desc:0 "The hopefulls we sent to attack a Brotherhood outpost more than showed their mettle. Their observer reports they fought like pissed off yao gui, tearing through the horrified Brotherhood Knights and Initiates like they were ass paper. As if that wasn't enough, when they looked over the outpost they cleared, they found damn near a whole armory left behind. At the request of the Commander, these men have been organized under a promising Lieutenant into the 'Steel Piercers' division. Should The Brotherhood ever come looking for thier shit, these guys will make them think twice."
    EEN_decision_events.20.a:0 "Welcome to Talon Company"
    EEN_decision_events.21.title:0 "A war coming?"
    EEN_decision_events.21.desc:0 "A few battered knights reported back that their outpost was overrun by what must have been a division of Talon Company's most elite soldiers. This marks a drastic change in our typical dynamic with the group where we generally stay out of each other's way unless they are sitting on a cache of tech we want. Knights and Paladins on our perimiter have been advised to keep an eye out for Talon Company movements and prepare for an attack. Either Talon Company is getting ready to launch a massive offensive, or somebody paid them very well to send their best at us."
    EEN_decision_events.21.a:0 "Who would even pay them for that?"
    EEN_decision_events.22.title:0 "Talon's carvan raids"
    EEN_decision_events.22.desc:0 "Talon Company has reported in on their recent caravan raids against the DC Settlements. Their raids have halted trade between multiple lengths of the DC trade circuit. Of course these traders will adapt and it will be back to business as usual, but this attack will at least hurt them in the short term."
    EEN_decision_events.22.a:0 "Job well done"
    EEN_decision_events.23.title:0 "Rise in carvan attacks!"
    EEN_decision_events.23.desc:0 "Over the last month, dozens more caravans have been attacked than usual. While it is too soon to say if all these attacks are connected, at least three of them had survivors saying Talon Company mercenaries were the ones attacking them. Now the question remains why Talon Company did this? The mercenaries are far from friendly, but generally they don't attack people unless you wander near one of their bases or someone paid them to attack."
    EEN_decision_events.23.a:0 "Who would pay them to do this?"
    EEN_decision_events.24.title:0 "The Capital Building"
    EEN_decision_events.24.desc:0 "The National Mall is in a constant state of conflict. Raiders, super mutants and even Brotherhood Knights battle for each street and building. Now we have Talon Company fighting Super Mutants over control of the halls of congress. There does not seem to be anything of value to us in this crumbling ruin, but at least a lot of super mutants were killed."
    EEN_decision_events.24.a:0 "Good enough result"
    EEN_decision_events.25.title:0 "The Forges of Pittsburgh"
    EEN_decision_events.25.desc:0 "The pre-war city of Pittsburgh was a huge industrial base in Pre-War America. Even after The Great War, and suffering for centuries under the Trogg disease that plagued the region, The Pitt thrived as an industrial center that supplied ammunition to many wasteland nations. While the prevention and cure of The Trogg disease is still a long time away, our engineers have done what many thought impossible. They made Pittsburgh a place someone would want to live. By renovating no small number of buildings, installing vault-grade air filters, and connecting these buildings with sealed tunnels, our engineers have created what could be called and above-ground vault. Wastelander Americans are already flocking to this new settlement with the promise of steady employment scravenging the remainder of the city to fuel the war machine. They just need to be careful they they don't stay outside too long."
    EEN_decision_events.25.a:0 "Light the forges, we have a country to take back!"
    EEN_decision_events.26.title:0 "Trogs Escape"
    EEN_decision_events.26.desc:0 "The trogs we had gathered to release on our enemies somehow escaped their containers and killed a couple soldiers before they could be put down. We are still investigating the cause of this incident, but signs point to faulty manufacturing by Pitt Slave Laborers."
    EEN_decision_events.26.a:0 "These mutants have no work ethic"
    EEN_decision_events.27.title:0 "Mutant Attack!"
    EEN_decision_events.27.desc:0 "Vertibirds over the front line were a common sight for our soldiers, but this time was different. Multiple vertibirds were carrying large steel containers that they dropped behind our lines. When our men investigated, the containers opened unleashing ravenous mutants! Entire squads were wiped out and now the monsters are roaming around causing havoc!"
    EEN_decision_events.27.a:0 "Hunt them down!"
    EEN_decision_events.28.title:0 "Vertibirds Down"
    EEN_decision_events.28.desc:0 "As our vertibirds flew over enemy lines to drop their trog cargo, they were shot down by enemy anti-air emplacements. The operation is being considered a complete failure."
    EEN_decision_events.28.a:0 "They will pay for this!"
    EEN_decision_events.29.title:0 "Successful Batch"
    EEN_decision_events.29.desc:0 "The teams we sent out to gather a batch of subjects for FEV experimentations found a many suitable test subjects. The subjects proved resiliant with a failure rate in the low 20s. Afte the standard indoctrination and coercion procedures we now have a few hundred Super Mutants ready to be shipped to the front."
    EEN_decision_events.29.a:0 "Well done"
    EEN_decision_events.30.title:0 "Dismal Failures"
    EEN_decision_events.30.desc:0 "The subjects our collection teams gathered for our FEV experimentions failed to live up to expectations. Over 90% of the mutants subjected to FEV perished or turned into a hideous monstrosity that was both awful to look at, and completely useless in our war effort. The batch has been purged."
    EEN_decision_events.30.a:0 "A waste of FEV"
    EEN_decision_events.31.title:0 "Collection Team Killed"
    EEN_decision_events.31.desc:0 "The team we sent out to gather a batch of subjects for FEV experimentaion thought they had found an undefended village of suitable subjects. It turned out to be a trap by the clever mutants and the team was wiped out."
    EEN_decision_events.31.a:0 "They will be avenged"
    EEN_decision_events.32.title:0 "Response from Van Buren Space Center"
    EEN_decision_events.32.desc:0 "The soldiers and scientists we sent down to assist the Enclave outpost in Florida are doing well. However, they are refusing to return to the fold, insisting that their new mission is more important. They even have the audacity to request more men and resources."
    EEN_decision_events.32.a:0 "Out of the question."
    EEN_decision_events.32.b:0 "Just in case things go south..."
    EEN_decision_events.33.title:0 "THE WEST HAS FALLEN"
    EEN_decision_events.33.desc:0 "WE CANT REACH THE NAVAROINO OUTPOST! THE NEW CHUDIFORNIA RECHUDLIC MUST HAVE ROFLSTOMPED THEM!!!1! HOW COULD THIS HAVE HAPPENED? THE ENCLAVE IS TECH-MAXXED AND PURITY-PILLED!"
    EEN_decision_events.33.a:0 "BILLIONS OF MUTIES MUST DIE"
    EEN_decision_events.34.title:0 "Raven Rock Refuses Aid!"
    EEN_decision_events.34.desc:0 "Raven Rock has re-established communications with our base recently. The jovial mood was quickly soured when they refused to send additional support and even requested that the soldiers they sent to support our mission all those years ago return to Raven Rock. We promptly terminated communications."
    EEN_decision_events.34.a:0 "We continue as planned"
    EEN_decision_events.35.title:0 "Raven Rock Sends Support!"
    EEN_decision_events.35.desc:0 "Raven Rock has re-established communications with our base recently. We were concerned when they requested that the soldiers they sent to help us all those years ago retun to Raven Rock, but they were made to see the importance of our mission. They even agreed to our request to send additional troops!"
    EEN_decision_events.35.a:0 "Welcome to Florida!"
    EEN_decision_events.36.title:0 "Support from the West"
    EEN_decision_events.36.desc:0 "A large force of Talon Company mercs have showed up at The Republic's gates today. Their leader says they were hired by an unnamed benefactor to ensure The President wins this war against the trecharous election frauds. We aren't ones to look a gift brahmin in the mouth, so we have put the mercs to use fighting our enemies."
    EEN_decision_events.36.a:0 "It seems we have many friends"
    EEN_decision_events.37.title:0 "Talon Co Departs"
    EEN_decision_events.37.desc:0 "Just as they said, the Talon Company mercs that arrived to help us through our troubles have departed not long after the firing of the last shots. They refused Daves offer of joining his presidential army and though they disappointed Dave, he still thanks them for helping The Settlements through a troubling time."
    EEN_decision_events.37.a:0 "They never did say who hired them"
    EEN_decision_events.38.title:0 "Collection Team Killed"
    EEN_decision_events.38.desc:0 "The team we sent out to gather a batch of subjects for robobrain experimentaion thought they had found an undefended village not too far beyond the front. It turned out to be a trap by the clever mutants and the squad was wiped out."
    EEN_decision_events.38.a:0 "They will be avenged"
    EEN_decision_events.39.title:0 "Mixed Results"
    EEN_decision_events.39.desc:0 "Our strike team was able to abduct mutants for brain extraction, unfortunately they were not all suitable candidates for insertion into robobrains. A few of the subjects became violently enraged after their brains were hooked up to the machines."
    EEN_decision_events.39.a:0 "At least it wasn't a total loss"
    EEN_decision_events.40.title:0 "Fantastic Batch!"
    EEN_decision_events.40.desc:0 "Our strike team extracted with their mutant cargo without major incident. Once back at base, the scientists on call were able to successfully extract 98% of the subjects' brains and insert them into robobrains. The machines are ready for deployment to the front."
    EEN_decision_events.40.a:0 "Texbook success!"
    EEN_decision_events.41.title:0 "Successful Shipment"
    EEN_decision_events.41.desc:0 "Our strike team was in and out with their mutant cargo before the enemy could mobilize a response. The subjects are now en-route to The American Health Service."
    EEN_decision_events.41.a:0 "Good"
    EEN_decision_events.42.title:0 "Losses In Transit"
    EEN_decision_events.42.desc:0 "Our strike team successfully secured mutants for BMMAU's experiemtns, however while en-route to The American Health Service, some specimins came lose and caused the vertibird to crash. The remaining birds made it back to their destination."
    EEN_decision_events.42.a:0 "Not a total loss then"
    EEN_decision_events.43.title:0 "Shipment From Raven Rock"
    EEN_decision_events.43.desc:0 "President Eden has sent us a shipment of specimins for us to cure of their mutation. The subjects have already been prepped and are set to undergo surgery soon."
    EEN_decision_events.43.a:0 "Great news!"
    EEN_decision_events.44.title:0 "Shipment From Raven Rock"
    EEN_decision_events.44.desc:0 "President Eden has sent us a shipment of specimins for us to cure of their mutation. Though lighter than initially promised, there are still a considerable number of them. The subjects have already been prepped and are set to undergo surgery soon."
    EEN_decision_events.44.a:0 "Great News!"
    EEN_decision_events.45.title:0 "Greetings From Ronto"
    EEN_decision_events.45.desc:0 "The first batch of anarchists, bandits, and other anti-Enclave dissidents has arrived at The Ronto Rehabilitation Facility. Calling it a facility is a little generous. The prisoners are released into a walled-off section of the Toronto ruins with two instructions. \n\n Instruction 1, escapees will be shot. \n\n Instruction 2, deliver salvage to one of the drop centers if you want food. \n\n The average life-expectancy is projected to be about two weeks. These are not mutants that will adjust to Autumn's America, so putting them to work here allows them to do more in these two weeks than they would otherwise do in their lives. News of conditions in the camp has been allowed to leak to the general population. As we expected, the fear of being shipped to Ronto is leading to a drop in rebel activity."
    EEN_decision_events.45.a:0 "Well done"
    EEN_decision_events.46.title:0 "The Museum of America"
    EEN_decision_events.46.desc:0 "The grand opening of The Museum of America, operating out of the restored ruins of the pre-war museum of history, has been a resounding success. After a brief address from the museum's curator, the doors were opened to the public. 78 percent of the wastelander-Americans surveyed exiting the museum repoted feeling significantly more patriotic, while 83 percent reported being grateful for Commander in Chief Autumn and The Enclave for driving off an invasion of communist aliens from Mars. A shocking 2 percent of those exiting the museum reported they don't think all the exhibits were truthful. They have been detained for questioning and disposal."
    EEN_decision_events.46.a:0 "God Bless The Enclave!"
    EEN_decision_events.47.title:0 "Our Eastern Allies"
    EEN_decision_events.47.desc.1:0 "We have been in radio contact with [EEN.GetName] for some time. However, there has been little in-person contact beyond the odd diplomatic mission. As the territory they claim as their own inched closer to ours, questions continued to be raised about how sharing borders would go. We've gotten our answer. [EEN.GetLeader] has sent us an ultimatum requesting we 'return to the fold'. It is pretty clear their invitation would not have us as equals."
    EEN_decision_events.47.desc.2:0 "We have been in radio contact with [ONT.GetName] for some time. However, there has been little in-person contact beyond the odd diplomatic mission. As the territory they claim as their own inched closer to ours, questions continued to be raised about how sharing borders would go. We've gotten our answer. [ONT.GetLeader] has sent us an ultimatum requesting we 'return to the fold'. It is pretty clear their invitation would not have us as equals."
    EEN_decision_events.47.a:0 "Working together is preferable"
    EEN_decision_events.47.b:0 "We will not join these monsters"
    EEN_decision_events.48.title:0 "Our Northern Allies"
    EEN_decision_events.48.desc.1:0 "We have been in radio contact with [EEN.GetName] for some time. However, there has been little in-person contact beyond the odd diplomatic mission. As the territory they claim as their own inched closer to ours, questions continued to be raised about how sharing borders would go. We've gotten our answer. [EEN.GetLeader] has sent us an ultimatum requesting we 'return to the fold'. It is pretty clear their invitation would not have us as equals."
    EEN_decision_events.48.desc.2:0 "We have been in radio contact with [ONT.GetName] for some time. However, there has been little in-person contact beyond the odd diplomatic mission. As the territory they claim as their own inched closer to ours, questions continued to be raised about how sharing borders would go. We've gotten our answer. [ONT.GetLeader] has sent us an ultimatum requesting we 'return to the fold'. It is pretty clear their invitation would not have us as equals."
    EEN_decision_events.48.a:0 "Working together is preferable"
    EEN_decision_events.48.b:0 "We will not bow down"
    EEN_decision_events.49.title:0 "Our Northern Allies"
    EEN_decision_events.49.desc.1:0 "We have been in radio contact with [EEN.GetName] for some time. However, there has been little in-person contact beyond the odd diplomatic mission. As the territory they claim as their own inched closer to ours, questions continued to be raised about how sharing borders would go. We've gotten our answer. [EEN.GetLeader] has sent us an ultimatum requesting we 'return to the fold'. It is pretty clear their invitation would not have us as equals."
    EEN_decision_events.49.a:0 "The cavalry is here"
    
    ###National focus events###
    EEN_nf_events.1.title:0 "The Battle of The Pentagon"
    EEN_nf_events.1.desc:0 "In what had to be some of the worst fighting since The Battle of Project Purity, we struck a mighty blow against The Brotherhood of Steel. These squatters knew we were coming to kick them off government property, and they were well prepared. Our soldiers had to fight for every inch of that facility. Despite facing countless automoated turrets, ramshackle robots and of power armored defenders, we stand triumphant. Our flag flies over The Pentagon, and our science teams are taking inventory of what equipment and data archives The Brotherhood didn't destroy on their way out."
    EEN_nf_events.1.a:0 "They wont last much longer!"
    EEN_nf_events.2.title:0 "Scouting Team Returns"
    EEN_nf_events.2.desc:0 "The automated security of Adams Air Force Base is still active, but something is wrong. It is not recognizing our access codes. Several scouts that attempted to gain access to the facility were attacked by the rusting protectrons. Our scientists believe the security mainframe is likely corrupted and will need to be shut down before we can enter the base proper. That leaves us with two options. Autumn, wants to conduct a verti-assault with a small strike team to shut down the mainframe manually. Eden and the science team, want to try overwhelming the mainframe with a stream of data to force a reboot which should preserve the hardware. The only issue with that option is we don't know what electronic countermeasures the old mainframe has."
    EEN_nf_events.2.a:0 "Send in team Sigma"
    EEN_nf_events.2.b:0 "Launch the data swarm"
    EEN_nf_events.3.title:0 "The Adams Garrison"
    EEN_nf_events.3.desc:0 "Adams AFB is in surprisingly good shape, no doubt due to the automated security keeping any potential looters out. That brings us to our next problem, with the security disabled, it is only a matter of time before passing scavengers try to enter the base again. To prevent the theft of American property, we will need to leave some soldiers to guard the base. Even if we do not have enough power armor to give to the garrison, a few lightly armored soldiers or robots should do the job."
    EEN_nf_events.3.a:0 "Let a few auxilaries patrol the gates"
    EEN_nf_events.3.b:0 "Send a full compliment of Power Armored Infantry"
    EEN_nf_events.3.c:0 "Could we turn the bots back on?"
    EEN_nf_events.4.title:0 "Taking Project Purity"
    EEN_nf_events.4.desc:0 "Project Purity is one of the most, if not the most, important active facility in The Capital Wasteland. We can not leave it to the hands of self-proclaimed wasteland scientists. Our Generals have come up with a few plans for taking the facility, and now is the time to start putting them into action. Some want to infiltrate the project with scientists and soldiers disguised as mercenary guards. It will take longer, but they are sure it will mitigate any possible damage to the facility. Other generals are concerned about the possibility of The Brotherhood of Steel taking notice soon and want to send soldiers to take the facility by force sooner. This obviously poses the threat of damage to the facility. Ultimately, the decision is up to the President."
    EEN_nf_events.4.a:0 "Infiltrate the project"
    EEN_nf_events.4.b:0 "Just take it by force"
    EEN_nf_events.4.c:0 "Send in Talon Company"
    EEN_nf_events.5.title:0 "Raven Rock Evacuation"
    EEN_nf_events.5.desc:0 "Shortly before the fall of Raven Rock, civilians and non-essential military personnel were evacuated via vertibirds. While some of the birds were shot down by our enemies, most of them made it safely to Adams AFB. As the civilians and soldiers settle in to our new home, we must get ready for our next move. It will not be long before our enemies find this place."
    EEN_nf_events.5.a:0 "They will pay for this!"
    EEN_nf_events.5.b:0 "They will pay for this!"
    EEN_nf_events.5.c:0 "They will pay for this!"
    EEN_nf_events.6.title:0 "General Retreat Order"
    EEN_nf_events.6.desc:0 "With the fall of Raven Rock, many soldiers were left without orders from command and find themselves kicking rocks at remote outposts or guarding old supply caches still waiting on pickup. Obviously we need these men to return to base, but we do not have the resources to pick them all up by bird. Do we prioritize rescuing every last man, or do we make a few trips to some facilities to gather essential equipment?"
    EEN_nf_events.6.a:0 "No man left behind!"
    EEN_nf_events.6.b:0 "Some of them can walk, we need those guns!"
    EEN_nf_events.7.title:0 "Second Retreat Order"
    EEN_nf_events.7.desc:0 "Many men and women of The Enclave are still unaccounted for, and while most are likely dead, it is very likely that many were simply cut off from their comms equipment and sit by an old radio trying to reach command. We could reach these soldiers, but attempting to do so could put us at risk of exposing ourselves."
    EEN_nf_events.7.a:0 "It is not worth the risk"
    EEN_nf_events.7.b:0 "Broadcast evacuation coordinates"
    EEN_nf_events.8.title:0 "Trapped and cut off"
    EEN_nf_events.8.desc:0 "There are still teams of soldiers out there in dire situations. Whether trapped in an old facility, pinned down by Brotherhood soldiers, or even surrounded by mutants with no ammunition. Rescuing these men will be risky, but leaving them to die just does not seem right."
    EEN_nf_events.8.a:0 "Prepare rescue operations"
    EEN_nf_events.9.title:0 "Dover arms Merchants"
    EEN_nf_events.9.desc:0 "Traders from a wastelander settlement near Adams approached our gates today. They attempted to hoc their wares, and while most of their offerings were little more than junk, there were a handfull of valuable finds. Typically, we would simply sieze this obviously looted weaponry, but according to the traiders they have plenty more. Launching a full assault on these scavengers would be a massive drain on resources that we can not afford, at least for now. Perhaps we should offer them something for what they have."
    EEN_nf_events.9.a:0 "We will not barter with mutants"
    EEN_nf_events.9.b:0 "Give them scrap for lesser weaponry"
    EEN_nf_events.9.c:0 "Microchips for assault weapons seems fair"
    EEN_nf_events.9.d:0 "What would they pay for a plasma rifle?"
    EEN_nf_events.10.title:0 "Final Preparations Under Way"
    EEN_nf_events.10.desc:0 "After months of regrouping, scrounging up supplies, and redrawing battle plans, we are once again in fighting shape. The Brotherhood still does not know where we are. They chase their tails looking for any hint of our existence while we watch from the shadows. For months we have recovered from our setback. Now we are in a perfect position to launch a counter-attack and retake DC."
    EEN_nf_events.10.a:0 "The time has come"
    EEN_nf_events.11.title:0 "A thorn in our side"
    EEN_nf_events.11.desc:0 "Despite being all but wiped from the face of The Capital Wasteland, The Brotherhood of Steel remains a problem. Scattered Brotherhood die-hards are launching hit and run attacks on Enclave positions, and attacking supply lines. We need to do something about these guerillas, and soon, before they gather support of the wastelanders."
    EEN_nf_events.11.a:0 "They aren't dead yet?"
    EEN_nf_events.12.title:0 "Trial Preparations"
    EEN_nf_events.12.desc:0 "Most of the BoS survivors are now in our custody and find themselves awaiting their fate. As we make final preparations for the trials of the Brotherhood terrorists, we need to make some final decisions. First thing up, we need to decide just who we put on trial. It has been argued that most of the Knights and Initiates of The Brotherhood were simply following orders and giving them leniency would help with winning the hearts and minds of wastelanders. Others argue that letting men who killed our soldiers off easy would be a slap in the face to our forces, and only the scribes should be given leniency. Our more hardline officials believe every last man and woman should be put to trial for their crimes."
    EEN_nf_events.12.a:0 "Stick to the leadership"
    EEN_nf_events.12.b:0 "Exempt noncombatants"
    EEN_nf_events.12.c:0 "Every Brotherhood Member will be tried"
    EEN_nf_events.13.title:0 "Crime and Punishment"
    EEN_nf_events.13.desc:0 "The list of crimes comitted by The Lyons Brotherhood over the decades is innumerable. Theft of government property, illegal occupation of government facilities, and of course killing Enclave soldiers. Their legal council has argued that in the absence of Enclave presence in the wastes, The Brotherhood simply filled a power vacuum. They also point out that, at least in the case of Lyons Brotherhood, a lot of that equipment went to the good cause of killing super mutants and raiders. This begs the question if we should prosecute some of these crimes, and to what degree."
    EEN_nf_events.13.a:0 "Prosecute to the fullest extent of the law"
    EEN_nf_events.13.b:0 "We can let a couple things slide"
    EEN_nf_events.13.c:0 "Killing mutants should be rewarded"
    EEN_nf_events.14.title:0 "Their Leader"
    EEN_nf_events.14.desc.1:0 "After the death of Elder Lyons, his daughter Sarah Lyons took over. Even following the total defeat of The Brotherhood she led the guerillas in their refusal to lay down arms. Obviously if anyone in The Brotherhood deserves to be put to death, it is her. Our advisors have raised the concern that putting her to death will just make her a martyr and embolden anti-American movements in the future."
    EEN_nf_events.14.desc.2:0 "After the death of Elder Lyons in the destruction of The Pentagon, his daughter Sarah Lyons took command. Despite most of The Brotherhood laying down their arms, the fanatical Lyons continued leading Brotherhood terrorists in their war on the American People. The bleeding hearts are still arguing that giving her the death she deserves will just embolden the other holdouts."
    EEN_nf_events.14.a:0 "Life in prison is sufficient"
    EEN_nf_events.14.b:0 "Ready the firing squad"
    EEN_nf_events.14.c:0 "We will broadcast the execution in every settlement"
    EEN_nf_events.15.title:0 "The final holdout"
    EEN_nf_events.15.desc:0 "Today a patrol made contact with a lone hostile firing on them from a ruined office building in DC. The insurgent led the patrol through twisting hallways filled with traps, but after a few hours the last Brotherhood insurgent was killed. The terrorist wore no holotag and there was no other identification on them other than a vault jumpsuit they wore under their armor. Their death makes them the final enemy killed in the BoS-Enclave war."
    EEN_nf_events.15.a:0 "Noted"
    EEN_nf_events.15.b:0 "Organize a celebration of the end of this struggle"
    EEN_nf_events.16.title:0 "Growing Pains"
    EEN_nf_events.16.desc:0 "With the Brotherhood conflict finally brought to an end, we can turn our attention to the problems facing our new nation. There is no shortage of problems. Raiders are taking advantage of disorganized militias and making raids on fringe settlements, scientists still upset about Eden's deactivation are causing trouble, and with all this new territory under our control, we need to start discussing matters of government."
    EEN_nf_events.16.a:0 "Just a rough patch"
    EEN_nf_events.17.title:0 "Raiders Abound"
    EEN_nf_events.17.desc:0 "Following the collapse of the DC Settlement Militia, raiders on the fringes have become more bold. From Tenpenny Tower all the way up to the old 'Republic of Dave' there are reports of raiders striking out at more caravans and getting closer to town walls. If we do not do something about this, it will only get worse and the wastelanders under our control will doubt the peace and prosperity we promise."
    EEN_nf_events.17.a:0 "There will be no place for them in America"
    EEN_nf_events.18.title:0 "Successful Launch"
    EEN_nf_events.18.desc:0 "Today The Brotherhood staged an assault similar to many others since this war begain. Liberty Prime marched towards one of our positions blasting lasers out of its eyes with their little soldiers following in his wake. This time it ended differently for them. The fires of old America rained down from the heavens and blew Liberty Prime to pieces. As an added bonus, a few paladins and knights were caught in the blasts too. Without their secret weapon, the Brotherhood lost their best chance for winning this war. While we still have a few salvos sitting up there, and destroying The Pentagon would likely end this war, nobody wants to destroy America's most important military installation just to clear out a few roaches. We will drive out the Brotherhood scum and the flag of America will fly over The Pentagon once more. Besides, we dont know what those upstarts out west have been working on and this weapon could prove handy down the line."
    EEN_nf_events.18.a:0 "Looks like their little toy broke"
    EEN_nf_events.19.title:0 "Raider threat contained"
    EEN_nf_events.19.desc:0 "Following our successful campaign against the DC Raiders, and our fortification of the northern border, raider attacks in The Capital Wasteland are at an all-time low. The settlers under our rule are enjoying a relative sense of security they have not seen in their lifetime, and they have the men and women of The Enclave to thank for this."
    EEN_nf_events.19.a:0 "One less problem"
    EEN_nf_events.20.title:0 "Treachery in the Science Department"
    EEN_nf_events.20.desc:0 "A patrol sent to investigate a caravan attack found traces of energy weapon discharge and several of the caravaneers were missing. After a large sweep for raiders or Brotherhood holdouts we missed, they discovered something unsettling. An unauthorized laboratory was being operated by members of our science department in an abandoned bunker. They were ambushing an abducting wastelanders to continue FEV experiments that were banned after Eden was deposed. What's worse is that this is not an isolated incident. Cases of equipment theft, unauthorized experiments and open dissent have been growing in our science department. If we do not do something about this soon, it could spiral out of control."
    EEN_nf_events.20.a:0 "Let us negotiate"
    EEN_nf_events.20.b:0 "Time to clean house"
    EEN_nf_events.21.title:0 "Scientist Purge"
    EEN_nf_events.21.desc:0 "Our investigation into the cancer spreading through the Science Department showed this was far from just a few people at the top and their loyal lackeys. Nearly 3 in 5 of our scientists are still clinging on to the Eden Doctrine of genetic purity and wastelander genocide. Those that are just talking or holding onto beliefs from their superiors can be reeducated, but those actively working against us only have one fate."
    EEN_nf_events.21.a:0 "Face the wall"
    EEN_nf_events.22.title:0 "Black Armor and Flying Machines"
    EEN_nf_events.22.desc:0 "Wastelanders have been seen fleeing into our territory with nothing but the rags on their backs. All of them talk of being attacked by soldiers in black power armor that came out of some kind of airships and just started blasting. Rumors of patrols in black power armor seen at night in those mountains in the northwestern capital wasteland had floated around for years. Many dismissed them as mere fantasy, but it seems like there was some truth to those stories."
    EEN_nf_events.22.a:0 "Next you'll say the talking tree is real too!"
    EEN_nf_events.22.b:0 "Maybe some Brotherhood patrols will make people feel safer"
    EEN_nf_events.23.title:0 "Science Crisis Resolved"
    EEN_nf_events.23.desc.1:0 "Through serious negotiation and a few more concessions than we would have liked, we have finally been able to restore the wavering loyalty of our scientists. Many in the wasteland may object to experiments on prisoners and science funding going towards 'genetic purification therapy', but progress has a price."
    EEN_nf_events.23.desc.2:0 "It has been a rough few months in the science division. Between the purges, reeducation and rocky integration of wastelander scientists, there were definitely adjustments to be made for everyone. After months of reorganization and a few small lab accidents, we are finally back on track. The wastelander scientists are proving their worth and there is even one in particular that is showing a great deal of promise."
    EEN_nf_events.23.a:0 "Back to work"
    EEN_nf_events.23.b:0 "Welcome aboard, Dr. Holt"
    EEN_nf_events.24.title:0 "Administrative Limbo"
    EEN_nf_events.24.desc:0 "The military might of our forces is without question in The Capital Wasteland. Settlements under our control do not put up resistance and are becoming increasingly used to the sight of black power armor in their dusty streets. There is still the problem of general confusion about what happens next. Many settlement leaders and citizens openly took up arms to aid The Brotherhood and while we have not taken an official stance on this, many wonder if their fate will mirror that of Brotherhood leadership. The time has come for us to decide and make it known what will happen to the leaders of these settlements. It has been said that they should face trials and possible execution for their role in an Anti-American uprising, but a case could also be made that they were simply acting on faulty information doing what they thought best for the people they governed. Not to mention, replacing all those governors and sheriffs will be more work than replacing a few diehards."
    EEN_nf_events.24.a:0 "Rebels must be punished"
    EEN_nf_events.24.b:0 "We could try amnesty for loyalty"
    EEN_nf_events.25.title:0 "The Megaton Trial"
    EEN_nf_events.25.desc.1:0 "The defense for Lucas Simms posed a very interesting argument on behalf of the former leader of the DC Settlement Militia. They argued that it was not his fault that he led his people in taking up arms against The Enclave. After all, The Brotherhood were the closest thing to protectors he knew his entire life and they decieved him into thinking we were just another threat to their safety. Even though he took up arms against The United States Government, it was simply a misguided attempt at protecting his home and the people he swore an oath to."
    EEN_nf_events.25.desc.2:0 "The man known simply as Uncle Roe is certainly no warlord. He was simply a businessman, doing business. According to his lawyer, the towns and settlements under Uncle Roe's leadership were in desperate need of technology and water that The Brotherhood promised. Sending men and women to fight Enclave forces was just a move to secure resources they needed for their continued survival and prosperity. While on the stand, Uncle Roe testified that had he known that we were reasonable people and not the genocidal maniacs The Brotherhood painted us as, he would have attempted to make a deal with us instead."
    EEN_nf_events.25.desc.3:0 "The trial of the insurrectionist who proclaimed himself 'President Dave' was an absolute spectacle. In a move that surprised almost nobody, the egotistical Dave demanded he represent himself and refused to acknowledge the prosecutors questions unless he was referred to by his phony title. As if his courtroom behavior was not enough, his defense was even more laughable. He tried to argue that not only was he just in declaring himself president of the wasteland, but because he was elected by the 'people' of his republic, his right to rule should place him above our government. This argument was swiftly struck down, both because it had no basis in American law, and because his electoral base consisted of an entire 5 people. Defiant to the end, Dave declared his executionors traitors to the republic and cursed at them right up until he was turned to a puddle of glowing goo."
    EEN_nf_events.25.desc.4:0 "The foreign invader known as Alistar Tenpenny should have read up on the years 1775-1783 and 1812-1815 before thinking he could invade America. The old man's flimsy defense rested on his distance from any actual fighting, trying to pass all blame to his underlings. This defense was easily refuted and became a secondary issue when the prosecution revealed evidence in Tenpenny's connection to a plot to detonate an unexploded nuclear bomb right in the heart of The Capital Wasteland. The revalation of this plot of terrorism and mass murder left no doubt in the minds of jurors, that Tenpenny deserved execution."
    EEN_nf_events.25.a:0 "Ready the firing squad"
    EEN_nf_events.25.b:0 "Can't blame a man for protecting his home"
    EEN_nf_events.25.c:0 "Cool motive, still treason"
    EEN_nf_events.25.d:0 "Sieze his businesses as compensation"
    EEN_nf_events.25.e:0 "What was wrong with that guy?"
    EEN_nf_events.25.f:0 "When will The British learn?"
    EEN_nf_events.25.g:0 "Let's send them a little firework"
    EEN_nf_events.26.title:0 "Transition of Power"
    EEN_nf_events.26.desc:0 "In a move that upset the hardliners, but is the most practical move we could make, we have opted to let many in the current leadership of DC settlements remain in control of their respective towns until elections can be organized. In the meantime, patrols will continue to check in on towns to ensure they are running smoothly, but beyond that they will be granted autonomy to handle the day to day."
    EEN_nf_events.26.a:0 "An effective solution"
    EEN_nf_events.27.title:0 "Promising Leaders"
    EEN_nf_events.27.desc:0 "We have been getting reports from the patrols that check in on settlements across The Capital Wasteland, about how a couple of these towns are flourishing under the guidance of their local figurehead and recovering from the conflict much faster than others. There have been more than a few recommendations that these local leaders be offered seats in the higher government to help a greater number of people."
    EEN_nf_events.27.a:0 "It is worth looking into"
    EEN_nf_events.28.title:0 "Project Purity Operational"
    EEN_nf_events.28.desc:0 "After months of work to fix the damage caused in the Brotherhood Conflict, Project Purity is finally operational and steadily pumping out clean water for the masses. We already have several plans in place to distribute this water to the nearby settlements both for humanitarian reasons, and make sure they accept integrating into America. As we speak water distribution centers are being constructed in the vicinity of several wasteland settlements. These centers will serve as both hubs to facilitate efficient distribution of water as well as operate as the main hubs for local governance."
    EEN_nf_events.28.a:0 "§R But how does this work?"
    EEN_nf_events.28.b:0 "Let the water flow"
    EEN_nf_events.29.title:0 "Talon Company Integration"
    EEN_nf_events.29.desc:0 "While less disciplined than the average Enclave Soldier, Talon Company mercenaries proved themselves an important tool in our conflict with The Brotherhood. In peacetime their presence is less positive. There is an ever growing movement of civilians, soldiers and even members of Talon Company that are pushing for the mercenary organization to finally be disbanded and their soldiers let out of their contracts to be full-fledged American Citizens. An Executive Order has already been drawn up that will have the company be shut down, their soldiers be granted full citizenship, and their facility at Fort Banister be finally passed to our direct control. There is one matter that remains to be decided. Some members of Talon Company do not wish to transition into civilian life and work as caravan guards or farmers. There is still a contingent of Talon Company mercenaries that wish to officially integrate into our military. While their enlistment is obviously welcomed, what has drawn concern is their request to be trained in, and operate power armor. Our more senior officers and soldiers believe Talon Company mercs are simply not disciplined enough to be trusted with that kind of equipment, and given the company's trackrecord, this is not entirely unfounded."
    EEN_nf_events.29.a:0 "Integrate them as auxilaries and scouts"
    EEN_nf_events.29.b:0 "Welcome PA Taskforce Talon"
    EEN_nf_events.29.c:0 "Talon Company will continue to serve as a support force"
    EEN_nf_events.30.title:0 "Into Vault 87"
    EEN_nf_events.30.desc:0 "After months of planning and training in a simulated Vault 87 made with Vault-Tec blueprints, Enclave Team Sigma was finally sent into the heart of darkness to cut out this plague on our nation. Despite fierce mutie resistance, the team was able to accomplish their mission and clear the way for a science team to safely render the equipment used to create these hulking horrors inopperable. There may still be mutants out there in the wastes, but for the first time in decades, their numbers will begin to dwindle until there are no more left."
    EEN_nf_events.30.a:0 "Mission Accomplished"
    EEN_nf_events.31.title:0 "Little Lamplight"
    EEN_nf_events.31.desc:0 "The cave once known as Lamplight Caverns seems to have become home to a self-sufficient colony of children that fended off not only the horrors of the wastes but the mutants at their back door. While apprehensive of our forces at first, when they were informed that we stopped the flood of mutants from Vault 87, the children became welcoming of us 'mungos'. Those that have been to the caves have said it is quite the impressive feat, especially for children, to survive there for so long. It has been proposed that we construct an orphanage in Big Town to relocate these children and integrate them into regular society. However, it has also been argued that leaving the children be and letting them open up to the world more gradually may be the better call."
    EEN_nf_events.31.a:0 "Pull them out of the dark"
    EEN_nf_events.31.b:0 "Let them step out on their own"
    EEN_nf_events.32.title:0 "All Quiet on the Home Front"
    EEN_nf_events.32.desc:0 "For the first time in a long time, The Capital Wasteland is enjoying a period of relative stabilibility. Super Mutant attacks grow less frequent by the day, raider incursions are swiftly kept at bay, and clean water can be freely found in nearly every major settlement. Now that all the fires have been put out we can turn our attention to less pressing, but still important matters. As we solidify control and gear up for our campaign to rebuild America, we need to ask some very important questions. How will our military grow to suit our needs? How will we handle our evergrowing economy? Just how will we handle law, order and reconstruction? These were all simple things to handle when we were a collection of soldiers, scientists and support staff living in bunkers for the last two centuries, but those policies simply are not practical at scale."
    EEN_nf_events.32.a:0 "All essential questions that will be answered."
    EEN_nf_events.33.title:0 "The Army of Tomorrow"
    EEN_nf_events.33.desc:0 "The scope of our military operations has grown exponentially over the last year. Where once a few platoons of Power Armored soldiers was sufficient to achieve our goals, we now have to cover much more ground and field way more troops to effectively exert our control beyond our borders. Our chiefs of staff have come forward with proposals as to how we further develop our military. The first plan is to make radical changes to our recruiting, training and manufacturing to move away from power armored forces and instead develop a mechanized military. The officers backing this make the argument that effective use of a mechanized military will both quickly overwhelm most wasteland hostiles, and also allow us to cover ground faster without putting our fleet of vertibirds at risk. The second proposal, entails lowering our standards when it comes to the equipment we outfit our power armored forces with and potentially recruiting more wastelanders to maintain our power armored forces. The last proposal suggests drastically reducing the role of power armored forces in our military, instead focusing on regular infantry. The generals supporting this plan argue that most wasteland threats would just as easily fall under waves of plasma and laser fire, and if we encoutner somethign that does not, we can then send in the X-02s."
    EEN_nf_events.33.a:0 "We will focus on APCs and Tanks"
    EEN_nf_events.33.b:0 "Power Armor will still be our backbone"
    EEN_nf_events.33.c:0 "The General Infantry will pave the way"
    EEN_nf_events.34.title:0 "Financial Collapse"
    EEN_nf_events.34.desc:0 "With the constant supply of clean water from Project Purity, it was almost unthinkable that we would ever reach this point. But this past week, water reserves hit severe lows. We are not sure how the news got out, as it was highly classified, but it has sent shockwaves throughout our economy. Local water depots are being swarmed by citizens looking to exchange their currency for water in what is being called the 'run the tanks'. Some merchants have even started turning away US Currency in favor of the bottle cap or barter. If we do not get out ahead of this quick, it could spell ruin."
    EEN_nf_events.34.a:0 "See if we can trade for the water, at least for now"
    EEN_nf_events.34.b:0 "Limit water withdrawals and try too ride it out"
    EEN_nf_events.35.title:0 "Money Talk"
    EEN_nf_events.35.desc:0 "Ever increasing numbers of our soldiers are requesting to be paid in bottlecaps instead of Enclave Scrip, citing that where they are deployed nobody takes it. This brings into question the long term plans for our economy and what we will use for currency. According to our chief economist, we have two main options when it comes to the currency issue. We can begin producing a new American Dollar, and steadily push its use in our economy, or we can adopt the bottlecap as much of the wasteland has. While the dollar has its benefits, and is infinitely more respectable than a simple piece of scrap metal from an old soda bottle, it will take time for our people to adopt it and will make possible trade outside our territory more difficult. The cap on the other hand is already universally accepted, and while it is basically trading with trash, it is not much different than paper money."
    EEN_nf_events.35.a:0 "Bring back the almighty dollar"
    EEN_nf_events.35.b:0 "Stick to caps"
    EEN_nf_events.36.title:0 "Backing the Dollar"
    EEN_nf_events.36.desc:0 "In the century before The Great War, the United States Dollar was backed by the faith of the people in The United States Government. These days the people do not have as much faith as they used to, and it has been suggested we take a page out of the history books and instead back our currency with a valuable resource. Just like how pre-fiat governments backed their currencies with gold, the bottlecap was backed with the water reserves held by powerful merchants. We could adopt a policy like this as well, but there is one large problem with this. To support our growing economy we will need to keep an ever-increasing amount of water in reserves, and if there is ever a time where we do not have water to meet this demand, our economy could risk collapse."
    EEN_nf_events.36.a:0 "Faith in the Government will back our currency"
    EEN_nf_events.36.b:0 "With Project Purity how could we run out of water?"
    EEN_nf_events.37.title:0 "Industrial Revolution"
    EEN_nf_events.37.desc:0 "Outside of The Pitt, there is hardly anything close to an industiral power in the wasteland. Factories lie vacant and decaying, most industry is little more than a few slaves in workshop. We could take these for ourselves, or support enterprising civilians in restoring these factories themselves."
    EEN_nf_events.37.a:0 "Let the businessmen do it"
    EEN_nf_events.37.b:0 "We can't leave these assets to common rabble"
    EEN_nf_events.371.title:0 "Matters of Government"
    EEN_nf_events.371.desc:0 "Across our territories there are various different settlements all with their own strange forms of self-governance and odd customs. While of course, we would want all these people to conform to good old American ideals and laws, that may take some time and for now simply respecting the authority of our Government could be enough even if things are run a little different in a little scrap town in the middle of nowhere."
    EEN_nf_events.371.a:0 "A little autonomy is a small price for loyalty"
    EEN_nf_events.371.b:0 "They will follow our directives to the letter, or else!"
    EEN_nf_events.38.title:0 "Deals with Devils"
    EEN_nf_events.38.desc:0 "Project Purity had an unusual visitor this past week. A ramshackle ship under the command of a man named JP Jones sailed up to a nearby dock and the captain disenbarked with a few members of his crew. After a brief standoff it was established that the man who to the Dover Traders is known as the Pirate King of Chesapeake Bay was not foolish enough to try and raid a US Government facility. Instead he has joined a quite long list of raiders and other brigands on our borders who offer to work for us or at least leave us alone in exchange for clemency. Captain Jones seems more civilized than many of the raiders we have come across and his offer has once again spurred conversation about how we handle raiders on our fringes who make these kind of propositions."
    EEN_nf_events.38.a:0 "These pirates posess no loyalty. Kill him with the rest"
    EEN_nf_events.38.b:0 "We should evaluate these offers on a case-by-case basis"
    EEN_nf_events.39.title:0 "Keeping the Peace"
    EEN_nf_events.39.desc:0 "We have long grown past the point where policing our territory with soldiers is feasable. Across our Enclave territory crimes go unpunished, settlements live in fear and most importantly our rule is being questioned. If we do not adopt a more tenable policing policy, our analyists expect open uprisings in a matter of months. The two most promising options presented both have their merrits and drawbacks. The first is to establish a national police force that answers directly to the federal government. This would give us the most control and ensure the laws are being enforced exactly how we want all across our territory. However, it is more costly and will be a burden on our already strained administration. The second option is to delegate authority and expanded policing duties to local settlement security forces. While this is a very cost-effective option and allows us to divert administrators elsewhere, there is the very real problem of local policy and corruption tainting what should be our rule of law. Proponents for this policy believe a smaller federal police force similar to the US Marshals of pre-war America should help mitigate this problem, but there are still doubts."
    EEN_nf_events.39.a:0 "Federal Police it is"
    EEN_nf_events.39.b:0 "Frontier justice worked for centuries"
    EEN_nf_events.39.c:0 "Ever hear of roaming bandit theroy?"
    EEN_nf_events.40.title:0 "America's Arteries"
    EEN_nf_events.40.desc:0 "The infrastructure of post-war America is almost non-existant. Once great highways and bridges have been left to crumble for centuries with very few exceptions. If we are to expand properly and bring America back, we will need to rebuild American infrastructure. The question remains, should we really try to go back to pre-war levels of road development, or should we step back slightly and work on railroads first?"
    EEN_nf_events.40.a:0 "Railroads are sufficient"
    EEN_nf_events.40.b:0 "Highways are as American as apple pie and plasma fire"
    EEN_nf_events.41.title:0 "The American Cities Project"
    EEN_nf_events.41.desc:0 "Crumbling ruins of once great cities litter the landscape of post-war America. Many bear the scars of atomic weapons as well as centuries of neglect. Still, there is much that can be salvaged from these fallen marvels of engineering. With our American Cities Project we can take on the next big tasks in rebuilding our great nation. Slowly but surely we can start tearing down the ruins of old and replacing them with the cities of tomorrow. Even now plans are being drawn up for the rebuilding of small sections of cities like DC and Pittsburgh. We just need to allocate the necessary resources and labor to these great tasks."
    EEN_nf_events.41.a:0 "Time to get to work"
    EEN_nf_events.42.title:0 "The Firm Guiding Hand"
    EEN_nf_events.42.desc:0 "The Enclave faced many challenges since The Great War. But not since the destruction of The Rig and fall of Navarro has the American dream been so close to dying as it was these last few years. Yet still our Commander in Chief held strong. Through Brotherhood, Super Mutant and anarchist threat, President Autumn led our great nation to victory and secured the best chance for reviving America we have seen in decades. It is not time to rest. Though we have surmounted these perilous hurdles, it is just the beginning. Under President Autumn's leadership America will live again."
    EEN_nf_events.42.a:0 "God bless President Autumn"
    EEN_nf_events.43.title:0 "The Treaty of Dover"
    EEN_nf_events.43.desc:0 "The Dover Traders and Bay Fishers put up more of a fight than one would expect from a few fishermen and traders. Even now with their leaders at the peace table some of them fight on in vain. These former soldiers continue a terror campaign out of anger over lost friends, homes and loved ones during the recent war. While it is sure that in time those misguided fools will see the error of their ways or perish, there could be ways to help them see the benefits of Enclave rule."
    EEN_nf_events.43.a:0 "Funds to rebuild will help them come around"
    EEN_nf_events.43.b:0 "There will be no concessions"
    EEN_nf_events.44.title:0 "Opening of Autumn Naval Base"
    EEN_nf_events.44.desc:0 "Today the ribbon was cut on the first dockyard of Autumn Naval Base. This first step into the massive undertaking of rebuilding America's navy, while considered by many to be pointless in an age where most of our enemies barely put more than rusted barges and steamboats to sea, is an important step to preserving the safety of the coast. Among the attendees were the first graduates from the newly formed Enclave Naval Academy. Though they have yet to man more than basic training ships at sea, they will become instrumental in our naval endevors well into the coming years."
    EEN_nf_events.44.a:0 "America rules the waves"
    EEN_nf_events.45.title:0 "Slavers of The Pitt"
    EEN_nf_events.45.desc:0 "For over a century following the Great War, Pittsburgh remained little more than just another irradiated mess of people barely surviving. That was until a couple years ago when a lone Brotherhood soldier was left behind during a sweep and quickly used his training and leadership skills to subjugate The Pitt. While many see fault with the use of slave labor and cruelty under Ashur's leadership, none can argue with the success he had seen in rebuilding Pittsburgh into something closer to a functioning city state than an anarchic nightmare. Now that we are returning The Pitt to American control we must answer the important question. What do we do with Ashur and his soldiers?"
    EEN_nf_events.45.a:0 "No more slavery, but they can still run the day to day"
    EEN_nf_events.45.b:0 "We will transition them out of power"
    EEN_nf_events.45.c:0 "Throw them in jail"
    EEN_nf_events.46.title:0 "The Slaves"
    EEN_nf_events.46.desc:0 "Thousands of people snatched from all across the region found themselves put to work in The Pitt. These poor wretches were forced to work day in and out without pay and with their only escape being to battle through a gladitorial arena. Now that their former masters have been beaten they wait and wonder what we will do with them. Normally the answer would be simple, but the fact that they are almost all infected with a severe genetic mutation raises unique concerns. A cure for this trog disease is still an unknown amount of time away and the risks to the rest of the population are great. Some of our scientists have suggested setting up a quarantine zone, making sure those inside receive humane treatment and medical care."
    EEN_nf_events.46.a:0 "We can't let these mutants roam about"
    EEN_nf_events.46.b:0 "Those too far gone need to be disposed of"
    EEN_nf_events.46.c:0 "Put them all out of their misery."
    EEN_nf_events.47.title:0 "Trogg Troubles"
    EEN_nf_events.47.desc:0 "As if feral ghouls were not bad enough, The Pitt has its own specific breed of mutated abomination. The Trogs, as the locals call them, have devolved into fast and deadly quadrupeds that hunt in packs and have been seen to use simple ambush tactics. If we are ever to seriously settle the city these things will need to be culled. Multiple proposals have been delivered by the top brass and whittled down into 3 broad plans to clean out the infestation and bring trog numbers into a managable level. The first is to slowly have specialized squads methodically sweep the ruins block by block. This will take quite some time and will drain on our resources for months or years to come. However, the risk of us missing any nests is estimated to be very low. The second proposal is much more bold. It involves a series of quick and devastating sweeps through Trog hot beds with auxilary teams waiting in the surrounding areas ready to pick off stragglers. Estimates have this plan wrapping up in a couple months, but it is not without its risks. The odds of the teams missing a large nest or getting cut off in their push are not small enough to write off. The last proposal is to set up a series of decoys in areas across the ruins to draw out trogs into killzones with automated defenses and secure bunkers. This one also will take quite some time but it will not be as draining on manpower as the sweeps, and has a lower risk of casualties. It still has the problem in that we may miss a spot."
    EEN_nf_events.47.a:0 "Slow and steady is the way to go"
    EEN_nf_events.47.b:0 "We do not have time to be cautious"
    EEN_nf_events.47.c:0 "Preservation of life should be our goal"
    EEN_nf_events.48.title:0 "Heroes of Johnstown"
    EEN_nf_events.48.desc:0 "Though initially intimidated by our menacing armor and advanced weaponry, the people of Johnstown quickly realized we were the liberating heroes we claimed to be. The threat of raider attacks and extortion are now a thing of the past to these peaceful farmers. No more would farmers need to give away portions of their crop or send off their daughters and sons to raider lords. Now they live under the dutiful protection of The United States Government. Yes, they will have to pay taxes on their goods and the draft remains in effect until we unite America, but its not the same and they know it."
    EEN_nf_events.48.a:0 "This is why we fight"
    EEN_nf_events.49.title:0 "Amish WHATS?"
    EEN_nf_events.49.desc:0 "According to Pre-War records, Pennsylvania was home to a large amount of people called The Amish. These were hard working people that eschewed the trappings of modern society, choosing instead to rely on their own two hands and the help of their neighbors. It was expected that we would eventually stumble across members of this culture as this kind of society is well suited to post-apocalyptic living. What surprised many was that the ones we found practicing this ideology were a bunch of ghouls and super mutants. Initial misunderstandings led to the eventual bloodshed we have seen, but now that we stand victorious there is the question of what we do with this strange new segment of our population. Do we let them live their peaceful existence this time under our rule, or do we hold true to our past treatment of mutants?"
    EEN_nf_events.49.a:0 "No muties allowed"
    EEN_nf_events.49.b:0 "If they pay taxes, they're American."
    EEN_nf_events.49.c:0 "Would they accept outsider ghouls and mutants?"
    EEN_nf_events.50.title:0 "Go North"
    EEN_nf_events.50.desc:0 "The northern frontier from upstate New York all the way up to the tip of Canada is a massive mostly frozen wasteland of little value outside a few ruined cities. That being said, it is American land that needs to be reclaimed. Of course, we must not forget about the ill-fated Ontario Enclave who last we checked was desperately struggling to reclaim the ruins of Toronto from mutated rebels. If we do not proceed with caution, that could become our fate as well."
    EEN_nf_events.50.a:0 "What ever happened to the Ontario Enclave?"
    EEN_nf_events.51.title:0 "The Megaton Question"
    EEN_nf_events.51.desc.1:0 "Of all the strange living situations people in post-war America found themselves in, few are stranger than the town of Megaton. Two centuries ago the people of the Springvale area that could not get into vault 101 decided a crater with an undetonated bomb in it was the next best thing. In the 200 years since, the people of Megaton have built up walls and homes in this crater and ironically creating one of the safest settlements in The Capital Wasteland. Even with the bomb being a dud and rumors of it being completely disarmed, there is still the constant danger as well as the very real radiation leaking out of the device into the soil and drinking water of the Megaton citizens. Disposing of the bomb properly would require the relocation of the entire settlement which could prove costly. Currently there are two plans about how to relocate these people. The first is to relocate the people of Megaton to surrounding settlements. The second proposal is to convert the nearby abandoned Super Duper Mart into a refugee center where the Megaton citizens can stay until more suitable homes are found or the bomb is removed and they can return home. Of course, we could always just have a team ensure the bomb is completely disarmed and advise them to not drink the local water or eat the local produce."
    EEN_nf_events.51.desc.2:0 "The people of Megaton really should have known that one day that undetonated atomic bomb they lived next to for 200 years could detonate. Their poor decision making notwithstanding, we have set up a temporary shelter at the old Super Duper Mart for those that survived the destruction of their home and have nowhere else to go. Many of those living close to the blast but not caught in the fires have been ghoulified and it's being suggested that we keep them at the camp indefinitely so they don't bother the rest of the population."
    EEN_nf_events.51.a:0 "Relocate them to other settlements"
    EEN_nf_events.51.b:0 "Super Duper Refugee Camp"
    EEN_nf_events.51.c:0 "Just be sure it cant explode"
    EEN_nf_events.51.d:0 "Keep them there"
    EEN_nf_events.51.e:0 "Relocate them to other settlements"
    EEN_nf_events.51.f:0 "Suffer not the ghoul to live"
    EEN_nf_events.52.title:0 "Canterbury Commons"
    EEN_nf_events.52.desc.1:0 "The small town of Canterbury Commons has remained an essential stop for traders for decades. During the rule of the DC Settlements the town grew from a small pitstop to a bustling center of commerce that eclipsed similar locations in the wastes. Under our leadership things have continued much the same but the local traders worry what the future entails."
    EEN_nf_events.52.desc.2:0 "The small town of Canterbury Commons was home to the now deceased rebel Unlce Roe. Though the town laid down its arms following the end of the war, the traders and citizens still harbor resentment for what they still see as an unjust murder of their beloved leader. They are distrusting of any gifts or deals we offer, so if we are to try and invest in this location, it will have to be a sizable offer"
    EEN_nf_events.52.a:0 "Invest in the town and grow the economy."
    EEN_nf_events.52.b:0 "Establish a trade agency to regulate commerce there"
    EEN_nf_events.52.c:0 "They know what they are doing. Just be sure to collect taxes."
    EEN_nf_events.52.d:0 "Uncle Roe actually has good ideas"
    EEN_nf_events.52.e:0 "It may be costly, but the investment shold pay off"
    EEN_nf_events.52.f:0 "They will comply with our agents, or end up like Roe"
    EEN_nf_events.53.title:0 "Tenpenny Tower"
    EEN_nf_events.53.desc.1:0 "In recent decades the once abandoned resort now referred to by wastelanders as Tenpenny tower was turned into a settlement for the wasteland's wealthy elite. Until recently the tower was run by Alistar Tenpenny, the British despot who had the audacity to claim American soil as his own and lead the good American people of the Capital Wasteland in a fight against their own government. Since his execution, a resident known as Herbert 'Daring' Dashwood had taken responsiblity for running the tower. The officer attached to the Tower says Mr. Dashwood is compliant with enclave directives and will happily transition out of his position once a suitable replacement is put forward."
    EEN_nf_events.53.desc.2:0 "To the shock and disgust of the soldiers sent to Tenpenny Tower, the once pre-war resort turned home of the wasteland's elite had become a home exclusively for ghouls. The ghoul in charge, named Roy Philips was evasive when questioned about how he took control of the tower and what happened to the previous residents. The zombie told our soldiers they all moved out because of their bigotry but a mass grave found in nearby metro tunnels tells a different story. Of course, this mass murder of American citizens by a bunch of zombies can not go unpunished."
    EEN_nf_events.53.desc.3:0 "In recent decades the once abandoned resort now referred to by wastelanders as Tenpenny tower was turned into a settlement for the wasteland's wealthy elite. Following the execution of the previous owner by the DC Settlements, a resident named Herbert 'Daring' Dashwood had taken responsiblity for running the tower. The officer attached to the Tower says Mr. Dashwood is compliant with enclave directives and will happily transition out of his position once a suitable replacement is put forward."
    EEN_nf_events.53.desc.4:0 "In recent decades the once abandoned resort now referred to by wastelanders as Tenpenny tower was turned into a settlement for the wasteland's wealthy elite. Following the execution of the previous owner by the DC Settlements, a resident named Irving Cheng stepped up to run the settlement. Initial reports about the tower and its leader caused concern as they painted Mr. Cheng as a chinese communist revolutionary. Unfortunately, these concerns turned out to be true. Mr. Cheng professed to our officer sent to the tower almost immediately that he was the proud descendent of Chairman Cheng, the leader of Communist China before the war. The final straw was when our officer found that Mr. Cheng was in the process of converting Tenpenny Tower into a communist dystopia. Unable to tolerate any more, the officer executed Mr. Cheng on the spot and is requesting a replacement to oversee the tower be sent in to de-program the indoctrinated ihabitants."
    EEN_nf_events.53.desc.5:0 "In recent decades the once abandoned resort now referred to by wastelanders as Tenpenny Tower was turned into a settlement for the wasteland's wealthy elite. The tower was run by a British despot named Alistar Tenpenny who had the aduacity to claim American soil as his own property. Obviously he has been put to death, and his armed security put up little resistance in the face of our forces sent to the tower. The tower has been temporarily placed in the hands of one of its residents, Mr. Dashwood, until a suitable replacement is put in place."
    EEN_nf_events.53.a:0 "Keep him in place"
    EEN_nf_events.53.b:0 "Purge the tower and try to do something about the stink"
    EEN_nf_events.53.c:0 "Kill Philips and his collaborators, but relocate the rest."
    EEN_nf_events.53.d:0 "Keep him in place"
    EEN_nf_events.53.e:0 "Give that man a medal!"
    EEN_nf_events.54.title:0 "Rivet City"
    EEN_nf_events.54.desc.1:0 "In the weeks since Rivet City submitted their proposal and accepted our rule in exchange for autonomy, there has been a lot of internal debate about the future of the floating city. While it is true they are sitting on a US naval vessel and thus squatting on Government property, they have both recognized their place as American citizens better than most wastelanders and been exceptionally cooperative with our science teams in the study of post-war flora. It is also painfully clear that restoring this ship to working order is more trouble than it could ever be worth. In the Autumn administration there is a substantial amount of support for continuing to allow Rivet City their autonomy and send them engineering support to ensure the city stays afloat into the forseeable future. Or at the very least we could provide support to their scientists and reform Rivet City into a fully-fledged science institute to educate the minds of tomorrow."
    EEN_nf_events.54.desc.2:0 "The people of Rivet City fought just as hard as any other wastelander opposing our rule, and like all the rest, they recognized the futility of their fight and let our troops in. Now the people of this rusting metropolis sit and wonder what will become of them and their home. Our engineers have surveyed the rustbucket and found that even if we could restore the ship to working order, the amount of resources it would take for both the reconstruction and operation of the ship would be better spent on a fleet of vertibirds or several battalions of power-armored soldiers. That leaves the question of what to do with the ship and the people on board, and really we have two options that are worth considering. We could send some engineering recruits to maintain the ship and keep it floating for years to come, after all a happy populace is more willing to pay taxes, or we could work on expanding their science labs and turn Rivet City into a science institute where the weapons of tomorrow can be safely developed away from our munitions stockpiles."
    EEN_nf_events.54.a:0 "Keep Rivet City floating"
    EEN_nf_events.54.b:0 "Send the worst of the dregs to the Super Duper Mart"
    EEN_nf_events.54.c:0 "Expand the labs"
    EEN_nf_events.54.d:0 "Expand the labs"
    EEN_nf_events.55.title:0 "Cleaning the Mall"
    EEN_nf_events.55.desc:0 "The national mall was the sight of some of the worst fighting in The Capital Wasteland for nearly 200 years. Mutants, raiders and various other groups constantly battled for control area both becasue of the central location as well as the valuables to be scavenged from the ruins. That battle finally ended once we got involved. For the first time in 200 years we can report that the national mall lies silent. Mutants, anarchists and other foes have been dispatched and the location secured. We can now begin the daunting task of restoring the mall to at least some semblence of its former glory."
    EEN_nf_events.55.a:0 "Good job everyone"
    EEN_nf_events.56.title:0 "Death of Liberty"
    EEN_nf_events.56.desc:0 "It is a dark day for The Brotherhood. Our most valuable weapon in this war with The Enclave, Liberty Prime, has been destroyed by some kind of orbital weapon. Our scribes are still attempting to break the encription on data recovered from the site to gain insight on exactly what happened, but the most important thing to know is known by everyone in The Brotherhood. We have lost our best tool for both countering The Enclave's airpower, and breaching their fortified positions. The scribes estimate it could take years at best to repair Liberty Prime so for now we must turn to alternate weapons to win this war."
    EEN_nf_events.56.a:0 "We must fight on"
    EEN_nf_events.57.title:0 "The National Archives"
    EEN_nf_events.57.desc.1:0 "Surprisingly, the basement beneath the national archives remained mostly untouched for the 200 years since the bombs fell. Even more surprising was that the robots left in the facility think themselves revolutionary soldiers under the command of a protectron who believes himself to be Button Gwinnett. The robot responded to the clearance codes from our survey team and recognizes us as the US Government, and the officer in charge of the team awaits further orders about what to do with the machines."
    EEN_nf_events.57.desc.2:0 "It should come as no surpsise that The Brotherhood of Steel, in their quest to plunder whatever knowledge they can, found their way into the sub-basement beneath the national archives. What has left our survey team stumped is why they left the robot security force operational and why one of the protectrons thinks he is Button Gwinnett. Thankfully the machines responded to our clearance codes and recognize us as the US Government. The survey team is sweeping the archives now as ordered but the officer in charge is requesting orders on how to handle the robotic security."
    EEN_nf_events.57.desc.3:0 "It should come as no surprise that The Brotherhood of Steel, in their quest to plunder whatever knowledge they can, found their way into the sub-basement beneath the national archives. Still our survey team met no resistance and it seems whatever security the location had was disabled and looted when The Brotherhood swept through the place. What is puzzling though is why there appear to be no signs of battle since the facility was supposed to have a heafty compliment of security robots and turrets."
    EEN_nf_events.57.a:0 "Rally your men Gwinnett. America needs you!"
    EEN_nf_events.57.b:0 "If Eden taught us one thing, it's to not trust crazy machines"
    EEN_nf_events.57.c:0 "It really is one of life's mysteries"
    EEN_nf_events.58.title:0 "The Underworld"
    EEN_nf_events.58.desc:0 "Deep in the old museum of histroy there is a place that the ghouls of The Capital Wasteland have apparently been flocking to for years. Naturally, we can not allow them to stay and pollute our national mall, but what to do with them remains to be decided."
    EEN_nf_events.58.a:0 "Off to the Super Duper Refugee Camp"
    EEN_nf_events.58.b:0 "Relocate them to other settlements"
    EEN_nf_events.58.c:0 "Kill them all"
    EEN_nf_events.59.title:0 "Excess Budget"
    EEN_nf_events.59.desc:0 "During the construction of the Raven Rock listening post there was some budget left over. As was common practice with goverment projects at the time, the overseer found something to spend the budget on, lest the budget get cut on the next project."
    EEN_nf_events.59.a:0 "Robots for RobCo kickbacks"
    EEN_nf_events.59.b:0 "Spare parts for the computers"
    EEN_nf_events.59.c:0 "A couple extra manufacturing tools... for uh... reasons"
    EEN_nf_events.60.title:0 "Edens other favorite"
    EEN_nf_events.60.desc:0 "President Lincoln was not the only President that Eden based his personality on. While the life story of the lawyer turned statesman, who held the union together through civil war appealed to President Eden to the point of obsession, he still found a great deal of inspiration in other presidents. Four presidents in particular stuck out to Eden as figures he could draw inspiration from for his stepping into the role. President Ulysses S. Grant was a great general before he became president, leading the armies that won Linclon's Civil War. President Andrew Jackson was also an accomplished statesman who oversaw the expansion of American territory. President Herbert Hoover saw the America of the early 20th century through difficult times and opposed communism. Last but not least there was the recently departed President Dick Richardson. He held The Enclave together through turbulent times and nearly saw the completion of The Enclave's ultimate goal of wiping out mutated life. If Eden had to pick one to be the second most important influence on his amalgamated personality however, it would be..."
    EEN_nf_events.60.a:0 "President Grant"
    EEN_nf_events.60.b:0 "President Richardson"
    EEN_nf_events.60.c:0 "President Jackson"
    EEN_nf_events.60.d:0 "President Hoover"
    EEN_nf_events.61.title:0 "Edens Call"
    EEN_nf_events.61.desc:0 "Eden used the limited power of Raven Rocks relays and what little of the Enclave radio network remained to shoot out a call to the Enclave at Navarro. He called them back to Raven Rock to rebuild. Not everyone was convinced, but even with those staying behind there wasnt room for everyone on the evac vertibirds. Choices had to be made on who would be prioritized."
    EEN_nf_events.61.a:0 "We must get the civlians out of harms way"
    EEN_nf_events.61.b:0 "We are at war! We need soldiers."
    EEN_nf_events.61.c:0 "Science wins wars. Prioritize the researchers!"
    EEN_nf_events.62.title:0 "Ghouls in the service?"
    EEN_nf_events.62.desc:0 "With our recent policy change allowing wastelanders into the military, the question has been raised if this should extend to ghouls in our nation. Many hardliners are understandibly opposed to the idea of serving next to a zombies that could turn feral any moment. They also warn this is a slippery slope that will lead to something as horrible as ghoul voting rights or even a ghoul president. Despite this, some in the high command point out that ghouls are able to operate in areas where normal soldiers would risk high levels of radiation exposure. These soldiers would bolster our numbers, and cut down on rad-x rations. Is that minor benefit worth the risks?"
    EEN_nf_events.62.a:0 "Allow ghouls to serve"
    EEN_nf_events.62.b:0 "Keep them in their place."
    EEN_nf_events.63.title:0 "Last wish of a dead president"
    EEN_nf_events.63.desc:0 "After a short countdown and alarms blaring the ground shook and those in the bunker rejoiced in what they had done. The long silent weapon of war was finally unleashed on whatever survived the last launches 200 years ago."
    EEN_nf_events.63.a:0 "Take that China!"
    EEN_nf_events.64.title:0 "The Steel Thorn in our Side"
    EEN_nf_events.64.desc:0 "Despite the death of her father and most of The Brotherhood's soldiers, we have reports that Sarah Lyons is still leading a force of Brotherhood guerillas in the down town DC ruins. They are losing men and resources by the day, but if we do not deal with this sooner rather than later, it could end up inspiring the mutants to take up arms again."
    EEN_nf_events.64.a:0 "Bring this to an end quickly"
    EEN_nf_events.65.title:0 "The Brotherhood Falls... Again"
    EEN_nf_events.65.desc:0 "The last few holdouts of Brotherhood terrorists have finally been brought to justice dear America. Thanks to the tireless efforts of the men and women of our armed forces we can all breathe a little easier. However the fight for America dear children is not over yet. Due to the trechery of the late Colonel Autumn and his collaborators, our brave defenders face a whole new batch of problems. In their attempt to userp the duly elected government of this great nation they sabotaged our communcations equipment, and though their crimes must be punsihed, the roles these traitors filled must be replaced with fresh soldiers ready to fight for The America we deserve. I have also been informed that though a small number our soldiers out in the field may be facing supply issues, our top minds are working day and night for solutions. So, my darling America, can rest assured that our soldiers are and will continue to be there to protect you and your loved ones. After all, it will take more than a few loose wires and empty chairs to stop The Enclave. This is President Eden, signing off."
    EEN_nf_events.65.a:0 "We need to fix this quick!"
    EEN_nf_events.66.title:0 "Comms Troubles"
    EEN_nf_events.66.desc.1:0 "Mr President, during Colonel Autumn's attempted coup, it seems his men destroyed sensitive parts of Raven Rock's primary communications relay. No doubt this was in a vain attempt to prevent us from calling for support. Regardless, the damage is done and relying on backup communications equipment is leading to trouble out in the field. The final repairs are under-way but even then there are parts we simply cant replace and we will be operating at sub-optimal levels for years to come."
    EEN_nf_events.66.desc.2:0 "Mr President, during Colonel Autumn's attempted coup, it seems his men detonated explosives around the mobile base crawler's primary communications relay. This was undoubtedly an attempt to cut off communications and prevent us from calling for support. The backup communications equipment we have was barely functional when this happened and that is causing all kinds of trouble in the field. We are doing what we can to bring the remaining antennas online but they were never meant to operate at these great distances."
    EEN_nf_events.66.a:0 "We will have to find other solutions then"
    EEN_nf_events.66.b:0 "We will have to find other solutions then"
    EEN_nf_events.67.title:0 "Edens Little Spies"
    EEN_nf_events.67.desc:0 "My Dear America, I know concerns have been raised about my lack of public apperances. However, given my recent assassination attempt and the importance of our work rebuilding this great nation, I'm sure you understand the need for caution on my part. Rest assured sweet America that I am still with you. Each and every eyebot you see whether it be floating down your street or across a dusty field, carries back to me the image of our nation. It is suffice to say these machines are the eyes and ears of me, your president. By extension, that makes these great little machines the eyes and ears of America."
    EEN_nf_events.67.a:0 "Go my little eyebots, go"
    EEN_nf_events.68.title:0 "The Empty Cabinet"
    EEN_nf_events.68.desc:0 "Mr President, with much of the command staff being either complicit or willing participants in Commander Autumn's coup, executions of all those invovled are leaving massive vacancies all across the chain of command. The data we are gathering shows that if these holes are not filled soon, operational effectiveness could drop by as much as 53%."
    EEN_nf_events.68.a:0 "It is time for a new generation to assume the mantle of command"
    EEN_nf_events.68.b:0 "I am the Commander in Chief. I should try a more direct hand"
    EEN_nf_events.69.title:0 "The New Command"
    EEN_nf_events.69.desc:0 "Hello again sweet America. This is your president, John Henry Eden. I wanted to address some concerns about my recent role in leading our glorious army. While it is true that staffing shortages led to me having to take a more hands on approach to my role as Commander in Chief, it has only been temporary. After all, running this great nation and every aspect of its armed forces is a daunting task, even for me. That is why I am happy to announce that suitable replacements for vacant seats in our high command have been found and are settling into their roles as we speak. You can be sure that I have studied each of these officers' histories carefully and I am certain they are the right men for the job. America's Army will be in the capable hands of some of the best leaders it has seen in centuries, and I can return my focus to presiding over our great democracy. Rest easy America, these men will be sure you are safe."
    EEN_nf_events.69.a:0 "We look to the past to better our future"
    EEN_nf_events.70.title:0 "Empty rifles and empty stomachs"
    EEN_nf_events.70.desc:0 "Mr President, we are getting reports from all across The Capital Wasteland of soldiers not receiving regular supply and running out of everything from ammunition to toilet paper. The truth is that the logistical nightmare that is expanding so rapidly over all this territory is simply not something any of us in the science division had been trained to handle. After pouring over the archives we can only come up with two short-term solutions and neither of them are ideal but they may buy us time until we can come up with lasting fixes. The first is to authorize our soldiers to take what they can from the local populace and ruins. Obviously wastelanders don't have a lot of microfusion cells lying around so they may have to make do with sub-standard weaponry. The second option is to increase the use of vertibirds for supply runs. This obviously puts strain on the pilots, not to mention the fuel cost and risk of loss. Like I said, neither option is ideal but we need them to buy time."
    EEN_nf_events.70.a:0 "Our soldiers will have to make do"
    EEN_nf_events.70.b:0 "Vertibirds will rain supplies from above"
    EEN_nf_events.71.title:0 "Supply Cache Found"
    EEN_nf_events.71.desc:0 "Mr President, in following our recent 'make do' policy, some of our soldiers have been scouting around their outposts and one squad stumbled across something to report. They say they have found a wastelander arms dealer that has a massive cache of wastelander manufactured weapons and ammunition, however he refuses to trade with them and has a sizable mercenary force guarding him. The squad is asking for reinforcements to help take the arms depot by force."
    EEN_nf_events.71.a:0 "We will not sacrifice men for rusting pipe guns"
    EEN_nf_events.71.b:0 "Send them the support. We need the firepower"
    EEN_nf_events.72.title:0 "The Water of Eden"
    EEN_nf_events.72.desc:0 "My darling America, this is your President, John Henry Eden. I bring extraordinary news. The Project Purity facility, wrested from the hands of the Brotherhood of Steel terrorists, is finally operational. As I speak, clean, clear water is pouring from the facility and being bottled for delivery all across The Capital Wasteland. After great effort and toil I can proudly say we have taken a great step to restoring America to the nation it was meant to be. So drink deep America, for you have earned a taste."
    EEN_nf_events.72.a:0 "Soon..."
    EEN_nf_events.73.title:0 "The Cure Clinics"
    EEN_nf_events.73.desc:0 "Hello once again America, it is your president, John Henry Eden. I have an important matter to discuss with you. As I am undoubtedly sure you have seen, a great plague has swept our nation. No this is not a metaphorical plague like Super Mutants or Communism, but a very literal plague. It saddens me to see so many Americans suffering at the hands of this epidemic. So I am announcing the creation of clinics all across The Capital Wasteland to treat those infected with this ailment. All citizens are advised to report to one the moment they feel ill and receive the care they need to be soothed and free of their suffering. I can not strees enough the importance of accepting this help from your Government. After all, dealing with this plague on our landscape is at the very heart of what it means to be The Enclave."
    EEN_nf_events.73.a:0 "§R But how does this work?"
    EEN_nf_events.73.b:0 "The capital will be clean... eventually"
    EEN_nf_events.74.title:0 "Talon's Prize"
    EEN_nf_events.74.desc:0 "This morning Talon Company mercenaries from all across The Capital Wasteland were called back to Fort Banister. They were told it was to celebrate the recent Enclave victories and collect the reward for their hand in them, and to an extent that is true. However, the reward was not what they expected. Once the last soldier was accounted for, the automated security bots had their combat inhibitors disabled. Within the hour the soldiers were dead and they received Talon Company received the best reward a mutie could ask for, a quick death."
    EEN_nf_events.74.a:0 "Moving on..."
    EEN_nf_events.75.title:0 "The Talon Question"
    EEN_nf_events.75.desc:0 "After initial scouting our command has discussed how to handle talon company in what is being called the Talon Question. Some of the orthodox officers are arguing that these squatters must be driven off of Fort Banister by force. More pragmatic officers are putting their weight behind a plan to try and hire the mercenaries of Talon Company."
    EEN_nf_events.75.a:0 "These squatters will be wiped out!"
    EEN_nf_events.75.b:0 "They can make good cannon fodder"
    EEN_nf_events.76.title:0 "Little Lamplight"
    EEN_nf_events.76.desc:0 "While searching for a back way into Vault 87 as part of our plan to eradicate the vile super mutants, our scouts stumbled upon something truly unexpected. Inside Lamplight caverns, there is a settlement of children who have descended from children on a field trip to the caverns the day the bombs fell. What's more interesting is tests have come back showing that a life inside the caverns and diet of radiation eating mushrooms has left the children remarkably free from mutation. While not 100% genetically pure, our scientists assure us that any minute mutations they have would not be passed on to another generation if they were integrated into Enclave society."
    EEN_nf_events.76.a:0 "They are still muties."
    EEN_nf_events.76.b:0 "Guess we need an orphanage"
    EEN_nf_events.77.title:0 "Into the heart of darkness"
    EEN_nf_events.77.desc:0 "Our strike teams were able to quite easily make their way through Vault 87. Many months of fighting Brotherhood soldiers in the DC ruins made killing a few muties in hallways seem like a cake walk. Once the vault was secured our science teams moved in and found the vault was itself quite low on its supply of FEV. By their estimate it would not have had any left within a few years. Still this is a nightmare of pre-war science we can end. Or, we can harness this technology and put super mutants to use. Our scientists believe we can use more sophisticated techniques to stretch this supply out for at least a decade before we would need to find more."
    EEN_nf_events.77.a:0 "Shut it down"
    EEN_nf_events.77.b:0 "Super mutant slaves sound useful"
    EEN_nf_events.78.title:0 "Manpower Issues"
    EEN_nf_events.78.desc:0 "One disturbing calculation keeps President Eden awake at night. Well, if he wasn't already awake because he's a machine. By Eden's calculations The Enclave either needs to severely limit its battlefield casualties or find a substantial population of genetically pure humans. If neither of these conditions are met, Eden estimates the Enclave will grow too small to sustain a population within 10 years time. Given how at least 95% of Vaults have either been experimental failures or been open long enough for the population's descendents to be indistinguishable from the common mutant, that leaves one option. Whatever it takes, The Enclave needs to lose less men in battle. There are two main proposals the Chiefs of Staff have come up with to mitigate casualties even further. The first is to focus on equipping every soldeir possible with the best power armor available, which while costly still gives us the best fighting force on continent. The other, and less risky is to try and replace as many soldiers as possible with robots. After all, combat robots have proven their effectiveness time and again, there are just a few kinks that need to be worked out. That being said, the president is open to other ideas."
    EEN_nf_events.78.a:0 "Power armor has gotten us this far"
    EEN_nf_events.78.b:0 "The future is steel"
    EEN_nf_events.78.c:0 "What about the super mutants?"
    EEN_nf_events.79.title:0 "Correctly named cave"
    EEN_nf_events.79.desc:0 "As we expected, a place referred to as the 'deathclaw sanctuary' is full of deathclaws. After fighting through a large number of them our team found their way to a nest and were able to get away with some eggs. With new hatchilngs and samples from the deathclaws we had to kill, we will be able to learn a lot about this variant of deathclaws without having to venture back to that cave."
    EEN_nf_events.79.a:0 "Understood"
    EEN_nf_events.80.title:0 "The odd one out"
    EEN_nf_events.80.desc:0 "Inside Vault 87 there was a super mutant unlike any seen since our journey East. A Super Mutant that was not driven insane by his transformation and still maintained a functioning mind. By delving deep into the surviving Vault 87 archives and performing an autopsy on the unique mutant we think we have found a way to repeat the process. There is just one catch, the common wastelander will not be able to undergo this transformation. Naturally we would not want to test this theory on a perfectly good pure human, but one terminally ill soldier stepped forward, offering to sacrifice what little life he had left to advance science. The result was better than we could have expected."
    EEN_nf_events.80.a:0 "He will lead a green tide against the enemies of humanity."
    EEN_nf_events.81.title:0 "Vault 101"
    EEN_nf_events.81.desc:0 "According to the Vault-Tec archives, Vault 101 was never meant to open. While signs and wastelander tales point to this directive not always being adheered to, the location of Vault 101 remained a mystery, until this past week. It seems Vault 101's population had been ever declining these past decades and in the interest of their continued survival, the residents stepped out of their Vault and into the outside world. They certainly were as surprised as we were to see their vault lay less than a mile from the construction site of a brand new American city. While initially cautious, the vault dwellers have accepted that we are the true United States Government, submitting to our genetic screenings and requests to view their archives. The screenings corroborate their overseer's insistance that their vault had only been opened for brief surveys in the past. These vault dwellers are being relocated to completed housing in our new city and now the question remains of what to do with their empty vault."
    EEN_nf_events.81.a:0 "Strip it for materials"
    EEN_nf_events.81.b:0 "See if we can repurpose the power systems"
    EEN_nf_events.81.c:0 "It could serve as a command bunker"
    EEN_nf_events.82.title:0 "Unplugging Eden"
    EEN_nf_events.82.desc:0 "Either someone tipped The President off, or his monitoring was more intrusive than we thought, because President Eden knew we were coming. However it didn't matter much. His automated security and few loyal soldiers were no match for the bulk of the soldiers stationed at Raven Rock. The battle was over in hours and Eden's mainframe has been taken offline permanently. The shakeup has caused some confusion among those not involved in the coup, but the average soldier is too busy fighting to worry about politics."
    EEN_nf_events.82.a:0 "Congrats President Autumn"
    EEN_nf_events.83.title:0 "Autumn's Folly"
    EEN_nf_events.83.desc:0 "Colonel Autumn was a good commander, but he was too arrogant for his own good. When he found out about Eden's plan to distribute FEV in Project Purity he tried to rally soldiers to assassinate the president. What he didn't know was he had fewer friends than he thought. While many of the military command were on his side, his reach didn't extend enough to convince the entire military to support his trecharous plans. The Colonel is dead, and what co-conspirators he had that didn't die in the attack are being rounded up. This has sent shockwaves through our administration, but we have more important matters to worry about right now."
    EEN_nf_events.83.a:0 "That's what WOULD happen if they weren't so in love"
    EEN_nf_events.83.b:0 "On to more pressing matters"
    EEN_nf_events.84.title:0 "Vault 108"
    EEN_nf_events.84.desc:0 "Cloning a man has been a scientific quest dating back centuries. One of the most recent attempts was made in Vault-Tec Vault 108. After finding the Vault's location from ancient databases we sent a team to retrieve what data could still be salvaged. What they found was a decaying vault filled with homicidal clones. What few terminals had not rusted beyond recovery have had their data recovered and our scientists are analyzing samples from the dispatched clones to ensure we do not make whatever mistake these vault scientists did."
    EEN_nf_events.84.a:0 "Maybe that guy Gary was just an asshole"
    EEN_nf_events.85.title:0 "Deathclaw Control Advancements"
    EEN_nf_events.85.desc:0 "After enchancing deathclaw intelligence had proven to be a dangerous undertaking out west, our scientists stepped back to the drawing board and designed control devices to trick deathclaws into believing an outposts' signal emitter was its nest and Enclave personnel carrying the proper IFF emitters were their young. While an effective tool to bolster the security of an outpost this had 3 major drawbacks. The first being that the deathclaw could not venture far from the emitter without needing to be terminated so it did not turn on our soldiers. The second being that it limited deathclaws to defensive tasks as opposed to offensive operations. The third, being that the deathclaws would frequently try to bring back the carcasses of any wasteland creatures it dispatched and on at least two occasions a deathclaw tried to feed a short soldier which it must have believed was too young to eat properly. To overcome these problems, at least in the short term, our scientists are prototyping signal emitting packs that can be attached to our standard power armor. This should allow the deathclaw to follow a soldier into battle where their protective instincts will lead to them tearing apart anyone that engages the soldier."
    EEN_nf_events.85.a:0 "What uhhhhhh... happened to the ones they tried to feed?"
    EEN_nf_events.86.title:0 "Successful Clones"
    EEN_nf_events.86.desc:0 "After numerous attempts at cloning a fully grown adult ended in failure, our scientists conclude that the issue is not the cloning process itself but the mental conditioning of the clones. They theorize that because the cloned men have no real memories or understanding of society they emerge in an almost feral ape-like state thinking anyone other than their fellow clones that must be killed. Currently we lack the proper research and technology to implant memories that could lead to a fully grown clone being a functional member of society, and a breakthrough in this field is years away at best. In the meantime, attempts to clone infants have been rather successful and it is theoretically possible that raising a cloned baby should be no different than raising a natural one."
    EEN_nf_events.86.a:0 "I suppose we will have to wait 18 years for a clone army"
    EEN_nf_events.87.title:0 "Cyberclaws"
    EEN_nf_events.87.desc:0 "What started out as a joke about putting 'freaking lazerbeams' on a deathclaw's 'freaking head' has snowballed into a strange but effective breakthrough in our deathclaw research division. A few deathclaws have been equipped with prototype armor with their own signal receivers to boost the range of their control helmets as well as more finely-tuned control helmets. The new programming on these helmets tricks the deathclaws into thinking a soldier is their pack's 'alpha' and allows the soldier to give some commands mostly limited to 'follow', 'go there' and 'stop'. The scientists assure us that with more research we could by the end of the decade perfect this technology to have entire platoons of deathclaw soldiers that really would be able to have laser rifles mounted to their heads, but for now we will have to settle for small squads of shock troops augmenting our existing forces."
    EEN_nf_events.87.a:0 "A surprise for sure, but a welcome one"
    EEN_nf_events.88.title:0 "The Future is Now"
    EEN_nf_events.88.desc:0 "Hot on the heels of our latest scientific breakthroughs, our many science teams are more eagerly than ever pushing boundries and coming up with innovative breakthroughs not seen since the lost pre-war science facility at Big Mountain. While not every theory proves viable, and they occasionally end in disaster, we have gotten better at mitigating these risks and so our great minds are ever more confidently pulling us into the future with every experiment no matter how fanciful or bold. Time will tell if this proves to be something we need to curtail, but at least for now we are reaping the benefits of these great minds."
    EEN_nf_events.88.a:0 "We should look for Big Mountain one day"
    EEN_nf_events.89.title:0 "A Brighter Tomorrow"
    EEN_nf_events.89.desc:0 "It is no secret that just a few decades ago things looked pretty bleak. Our president was assassinated, over a thousand men and women died in the destruction of Control Station Enclave, and our largest surviving base was soon overrun by NCR and Brotherhood soldiers. But even though things looked grim, the spirit and resolve of the American people never wavered. We bided our time and rebuilt our strength and over the past few years have overcome countless obstacles in our way. For the first time since the loss of the oil rig, there is genuine hope for the future and nobody doubts our ability to rebuild America."
    EEN_nf_events.89.a:0 "God bless The Enclave"
    EEN_nf_events.90.title:0 "A Cradle of Filth"
    EEN_nf_events.90.desc:0 "Mr President, Project Purity is proving to be an invaluable tool in our efforts to cleanse the wasteland of mutated monstrosities. Both mutated creature and humanoid alike see a high chance of becoming infertile within just weeks of consuming the water, though we have seen some mutations that are resistant to these effects. With that being said, it does not take a genius to put two and two together. There are a handfull of groups in The Capital Wasteland that could figure this out. We should take a more direct approach to dealing with them before they spread the word."
    EEN_nf_events.90.a:0 "We have no time to waste!"
    EEN_nf_events.91.title:0 "Scouts Report Back"
    EEN_nf_events.91.desc:0 "Mr President, the scouts sent to survey the northern wastes have sent back their first report on the region. As we expected, most of the population centers in New York, and New Jersey are little more than bombed out ruins crawling with mutants. The more rural areas suffered substantial fallout as well as the expected damage resulting from centuries of mutant warfare. There is anomaly they wished to report on. There is something called 'The Buffalo Health Service' from what they have gathered there is a stretch of upstate New-York that is swarmed with machines taking mutants back to this location and if the locals are to believed, nobody taken there returns."
    EEN_nf_events.91.a:0 "Let us look into this further."
    EEN_nf_events.92.title:0 "The Abolitionists"
    EEN_nf_events.92.desc:0 "Mr President, due to your concern for preserving the structural integrity of The Lincoln Memorial, it was mostly ignored by our sweeps through The Mall. However, now that we have had the time to carefully approach the situation we sent scouts to evaluate the situation and make assessments for the monument's restoration. They are reporting that a group of mutants are currently in the act of restoring the monument. Not wanting to damage the monument the soldiers engaged in dialogue with the handfull of mutants that occupy the memorial and found them to be escaped slaves who revere the former president. They have apparently recently taken the monument from slavers that occupied it and begun work on restoring it to the best of their ability as a tribute to the man they idolize. The squad stands by in an outpost outside the memorial and await your orders."
    EEN_nf_events.92.a:0 "Though noble, they are still mutants. Give them the 'purified' water."
    EEN_nf_events.92.b:0 "Capture them for now, and try to limit the damage"
    EEN_nf_events.92.c:0 "I admire their reverance. Allow them to continue undisturbed."
    EEN_nf_events.93.title:0 "The Lincoln Exhibit"
    EEN_nf_events.93.desc:0 "As luck would have it, one of the latest exhibits in the Museum of History before the bombs fell was on the former president Abraham Lincoln. It should be a treasure trove of artifcats, documents and other priceless relics. The only problem is the place is a nest for feral ghouls. What would you have us do Mr President?"
    EEN_nf_events.93.a:0 "Send a squad to clear the place"
    EEN_nf_events.93.b:0 "Why don't we force the Abolitionists to clear it for us?"
    EEN_nf_events.94.title:0 "The Big Question"
    EEN_nf_events.94.desc:0 "Upon the discovery of an active ICBM in Fort Constantine the Enclave has been abuzz about how the weapon should be handled. Eden and many other patriotic Americans believe the last wishes of the old government should be heeded and that nuke should be sent on its intended course at mainland China. Autumn and his pragmatic military staff believe the weapon is too valuable to use at this time, and we should work on readying it for use in the future."
    EEN_nf_events.94.a:0 "China Deserves it"
    EEN_nf_events.94.b:0 "Too valuable to waste"
    EEN_nf_events.95.title:0 "A House Call"
    EEN_nf_events.95.desc:0 ""WARNING THESE SECURE CHANNELS ARE FOR THE EXCLUSIVE USE OF UNITED STATES EMERGENCY SERVICES. DISCONNECT NOW OR BE SUBJECT TO PROSECUTION"\n\n "Now, now, doctor. There is no need for that. This is President Eden of The United States Government. I am transmitting authorization codes now."\n\n "CODES ACCEPTED. PRESIDENT EDEN, PROCEED TO BUFFALO HEALTH SERVICE FOR <CURE PROCEDURE>"\n\n "I am afraid that is not possible, doctor. I have no ailment to be cured of."\n\n "INCORRECT, ALL HUMANS EXAMINED BY THIS FACILITY SHOW SIGNS OF SEVERE CONTAMINATION. PROCEED TO BUFFALO HEALTH SERVICE FOR <CURE PROCEDURE>."\n\n "Doctor, you are surely mistaken. Those are not real humans you are examining, they are mutants. Real humans do not exhibit these contaminations."\n\n "INCORRECT, SUBJECTS EXAMINED BY THIS FACILITY POSESS GENETIC MARKERS AND TRAITS OF HUMAN BEINGS. FURTHER INFORMATION IS REQUESTED." "
    EEN_nf_events.95.a:0 "You see doctor, the difference between man and mutant..."
    EEN_nf_events.95.b:0 "You are too far gone and must go offline."
    EEN_nf_events.96.title:0 "Where did they go?"
    EEN_nf_events.96.desc:0 "Mr President, the team we sent to follow up on leads of the Ontario Enclave chapter spent weeks searching but were unable to find any sign of an Enclave presence beyond a few wastelanders with misappropriated Enclave issue gear. It seems more and more evident that they did not survive in their years alone in the Canadian waseland."
    EEN_nf_events.96.a:0 "Perhaps theyre in hiding, biding their time..."
    EEN_nf_events.97.title:0 "Filling The Factories"
    EEN_nf_events.97.desc:0 "The Windsor factories will prove a boon to our industry only second to The Pitt. The only problem is we don't have a workforce to staff it."
    EEN_nf_events.97.a:0 "Grab some random wasteland muties"
    EEN_nf_events.97.b:0 "What about using super mutants?"
    EEN_nf_events.98.title:0 "The End?"
    EEN_nf_events.98.desc:0 "The 'Wasting Sickness' is what its been called. A slow weeks long death that seems to appear out of nowhere and is a certain death for all that are touched by it. Day by day, week by week, more and more people die. That is not even the end of our woes, as if that was not bad enough, there are tales of advanced armies to the north marching down killing all in their path. "
    EEN_nf_events.98.a:0 "Its the end times.... again"
    EEN_nf_events.99.title:0 "Same as the old boss"
    EEN_nf_events.99.desc:0 "The Pitt really is an appropriate name for what remains of post-war Pittsburg. The city is little more than a radioactive hellscape and a river so tainted not even a purifier like Project Purity could clean it. It does however have one solid benefit, functioning pre-war foundries and an entire city of scrap metal. As an added benefit much of the population were slaves before we swept in and are easy to re-subjugate. It is estimated that no more than a few dozen men with support from automated turrets and robots could maintain a grip on this city and ensure the continued production of resources to support our efforts at rebuilding America. In addition, the 20% of mutants that degrade into these things called 'Trogs' could have use in the war effort."
    EEN_nf_events.99.a:0 "Just make sure our men don't drink the water"
    EEN_nf_events.100.title:0 "The Frozen Frontier"
    EEN_nf_events.100.desc:0 "With W.A.S.H.I.N.G.T.O.N disabled, conquering Canada should be an easy task. The rabble we have seen in the east are hardly any more organized than the various mutant tribes stateside. There's just one problem. Canada is fucking huge. It will take time for us to conquer the whole thing, but we have a plan for the next steps."
    EEN_nf_events.100.a:0 "In due time"
    EEN_nf_events.101.title:0 "Wastelander Support"
    EEN_nf_events.101.desc:0 "Despite having control of the region's largest supply of clean water, and an army of power armored soldiers, The Enclave's place in the wasteland is still a precarious one. Many wastelanders still remember the Brotherhood propaganda about us being genocidal monsters that want to kill everyone touched by mutation. We must win over their trust through policy and action as we step into our rightful place of governance."
    EEN_nf_events.101.a:0 "We'll make patriots out of all of them"
    EEN_nf_events.102.title:0 "Exclusive Contract"
    EEN_nf_events.102.desc:0 "The Enclave have been impressed with our performance as their new employees, because who wouldn't? We kick ass. They have sent an offer to become our exclusive employers. They promise better equipment and more interesting jobs, but there are a few catches. They will put some of their own guys in charge and they will have to approve any non-enclave jobs. There is also something about an annexation clause that has a few of the guys up top worried. What is even more worrying is this seems to be one of those offers you can't refuse situations."
    EEN_nf_events.102.a:0 "As long as we're paid..."
    EEN_nf_events.102.b:0 "That ain't happening"
    EEN_nf_events.103.title:0 "Talon's Defiance"
    EEN_nf_events.103.desc:0 "Our employees at Talon Company have refused our request for us to become their sole employers. Our attache at their fort has been told to leave and our scouts report they are fortifying their northern flank. It looks like this business relationship is coming to an end."
    EEN_nf_events.103.a:0 "We tried it your way Colonel, now we try mine."
    EEN_nf_events.104.title:0 "How to Bring Order!"
    EEN_nf_events.104.desc:0 "Colonel Autumn's goal with Project Purity has always been to use it as a tool to bend the wasteland masses to The Enclave's will. That will be achieved by constructing a water distribution center in a sufficiently compliant state. When a state that borders one of your cores reaches 90% compiance, or is pacified, you will be able to access the decision to construct water distribution centers. During the next 60 days your nation will divert considerable construction and administrative powr to building this government office and staffing it with loyal wastelanders. Once this is done, all the states that border your cores should fall in line. In the meantime, wastelanders can be more easily brought on board by distributing water with the Water Distribution Missions occupation law, where The Enclave will offer water first before using force to put wastelanders in their place."
    EEN_nf_events.104.a:0 "Simple enough"
    EEN_nf_events.105.title:0 "Curing The Wasteland"
    EEN_nf_events.105.desc:0 "President Eden's goal with Project Purity has always been to use it as a tool to eliminate mutated life from The Wasteland. Unfortunately, the FEV tainted water does not kill as much as expected. It does however, render mutants sterile if enough is ingested. \n\n To ensure the mutants in a region are sterilized, a states occupation law must be changed to Cure Clinics. With this law The Enclave will distribute FEV tainted water, study its effects, and deal with anyone that catches on to what they are doing. Once mutated life is sufficiently sterilized, The Enclave will transition the cure clinic to a small monitoring outpost to make sure the mutants in the area pose no threat to our efforts while they die off."
    EEN_nf_events.105.a:0 "We have work to do"
    EEN_nf_events.105.b:0 "This seems evil..."
    EEN_nf_events.106.title:0 "Our Flag Soars High Over The Capital"
    EEN_nf_events.106.desc:0 "The Pentagon is back under our control, Project Purity is being repaired by Enclave scientists and patrols are meeting less and less resistance. The Capital Wasteland may still be a lawless place, but not for long. We still face a long road ahead, but the path is getting a little smoother up ahead."
    EEN_nf_events.106.a:0 "God bless The Enclave, and God bless America!"
    EEN_nf_events.107.title:0 "Infiltrators Discovered!"
    EEN_nf_events.107.desc:0 "The scientists and soldiers we sent to infiltrate Project Purity had to make a hasty retreat from the facility. The report from the team says that a Rivet City security officer overheard two soldiers discussing the assignment and reported it to his superiors. When confronted and faced with capture, the team attacked the security detail and sustained casualties in the firefight that followed. We have already disciplined the loose-lipped soldier that survived and now we are left with only one option."
    EEN_nf_events.107.a:0 "Prepare the Vertibirds. We are storming the place!"
    EEN_nf_events.108.title:0 "Enclave Agents Discovered!"
    EEN_nf_events.108.desc:0 "Project Purity was the site of a prolonged gunfight when some of the recent arrivals from The Wasteland that offered help turned out to actually be Enclave spies in disguise! At first the security officers that discovered their identity were doubtful, but when confronted, the soldiers posing as mercenary security opened fire. Several officers were killed or wounded in the fighting but we were able to drive out The Enclave snakes in our midst. This may not be over though, and we should be ready in case they return."
    EEN_nf_events.108.a:0 "Double security patrols around the purifier!"
    EEN_nf_events.109.title:0 "Project Purity Attacked!"
    EEN_nf_events.109.desc:0 "Project Purity has been overrun by Enclave soldiers. Despite the best efforts by our security officers, they were no match for Enclave gunships and their power armored soldiers. The council is torn on whether to stage a counter attack or let Project Purity slip from our grasp, and a decision must be made."
    EEN_nf_events.109.a:0 "We must take it back!"
    EEN_nf_events.109.b:0 "We need to focus on protecting Rivet City"
    EEN_nf_events.110.title:0 "Futile Attack"
    EEN_nf_events.110.desc:0 "Rivet City did not take our advance into Project Purity lying down and staged a counter attack recently. Our soldiers were easily able to hold off the rustbucket security guards who fielded little more than small arms. While the victory has our soldiers feeling good about the chances of holding the facility, a bunch of wastelanders with 10mm SMGs arent the only people interested in the purifier."
    EEN_nf_events.110.a:0 "Keep your eyes on The Pentagon"
    EEN_nf_events.111.title:0 "Failed Assault"
    EEN_nf_events.111.desc:0 "Our security forces were unable to dislodge The Enclave from Project Purity. We took heavy losses and had to retreat before we found ourself with too few men to protect the city. It was a longshot but we had to take it, but many men and women paid the ultimate price in vain. Now we can only hope The Brotherhood can do something."
    EEN_nf_events.111.a:0 "Give them hell, Lyons!"
    EEN_nf_events.112.title:0 "Project Purity Skirmish"
    EEN_nf_events.112.desc:0 "Our scouts and lookouts have noted that Rivet City recently tried to retake Project Purity from The Enclave. As we expected, the underarmed security force was little match for our enemy of yesteryear. If anyone is to drive these people out of the purifier, it will have to be us."
    EEN_nf_events.112.a:0 "It wont be easy"
    EEN_nf_events.113.title:0 "Surprising Upset"
    EEN_nf_events.113.desc:0 "When news came in that The Enclave had pushed Rivet City security out of Project Purity, many in The Citadel were worried that an attack would be coming from across the river in the coming days or weeks. Now it looks like that will not happen. By some miracle, Rivet City security were able to stage a successful counter attack and push The Enclave forces from Project Purity. The purifier now lies securely in their hands. This will likey not be the last we see of The Enclave"
    EEN_nf_events.113.a:0 "Prepare for the worst"
    EEN_nf_events.114.title:0 "We did it!"
    EEN_nf_events.114.desc:0 "Against all odds, we were able to push The Enclave out of Project Purity. It was not an easy fight by any means, but a combination of good strategy and the bravery of our security forces led to our victory. Scientists are moving in to assess the damage from the battle, but that is the least of our concerns. The Enclave have shown they are a serious threat, and they will likely be back."
    EEN_nf_events.114.a:0 "Was this a mistake?"
    EEN_nf_events.115.title:0 "How? HOW?"
    EEN_nf_events.115.desc:0 "In a shocking turn of events that almost can not be believed, Rivet City security was able to drive our soldiers from Project Purity. Our commanders are still trying to figure out just what the hell happened there and plan our next move, but one thing is for sure, we cant let this stand."
    EEN_nf_events.115.a:0 "They will pay for this"
    EEN_nf_events.116.title:0 "Talon Co and who?"
    EEN_nf_events.116.desc:0 "Project Purity was attacked by Talon Company mercs today along with some power armored individuals. At first we were not sure who was with them. However, John Henry Edens voice blasting over some old radios told us who was responsible for this push, The Enclave. Once thought to be little more than a few pre-war remnants lurking in a bunker full of big talk, it appears the Enclave is not all talk. They are out in the wastes, and have Talon Co with them. Now debate is raging in the council about how to respond to this assault."
    EEN_nf_events.116.a:0 "We must retake the purifier!"
    EEN_nf_events.116.b:0 "We need to focus on defense!"
    EEN_nf_events.117.title:0 "Snakes in Project Purity!"
    EEN_nf_events.117.desc:0 "When we were first approached by some wasteland scientists and their personal security, Dr. Li advised against bringing them on to Project Purity. Now we know we should have listened. The individuals who passed themselves off as simple scientists and mercs interested in helping the project along turned out to be Enclave agents sent to wrest control of the purifier from us. When things were finally nearing completion they sprung their trap and drove our forces and scientists from the facility. After they drove us out, vertibirds landed at the purifier bringing reinforcements clad in advanced power armor. The whole city is in an uproar with many demanding our security forces retake the facility and others fearing Rivet City may be next!"
    EEN_nf_events.117.a:0 "We will retake Project Purity!"
    EEN_nf_events.117.b:0 "We must protect Rivet City at all costs!"
    EEN_nf_events.118.title:0 "Sigma Intelligence Office"
    EEN_nf_events.118.desc:0 "Colonel Flagg was among the best Enclave Sigma Squad had ever seen. Cunning, deadly, and most importantly, loyal to The Enclave beyond question. It was these things that led to him surviving decades of service in what is widely considered one of the most dangerous assignments in The Enclave. Despite attaining the rank of Colonel and aging out of Sigmas strict age limits, Flagg has fought every attempt to put him behind a desk. Now, with wider Enclave deployments on the horrizon, he is approaching The High Command with a new proposal. He wants to command a new department in The Enclave military. This department would be comprised of soldiers, officers and administrative staff picked by him personally, with priority on some Sigma soldiers. If any other officer requested something like this, we would think they were trying to organize a coup, but Flaggs loyalty is beyond question. He wants to use this new force to focus solely on gathering intel on our foes and striking them where they are their weakest."
    EEN_nf_events.118.a:0 "Go get them, Flagg!"
    EEN_nf_events.119.title:0 "Project Purity Skirmish"
    EEN_nf_events.119.desc:0 "Our scouts and lookouts have noted that Rivet City recently was pushed out by none other than The Enclave. As we expected, the underarmed security force was little match for our enemy of yesteryear. If anyone is to drive these people out of the purifier, it will have to be us."
    EEN_nf_events.119.a:0 "It wont be easy"
    EEN_nf_events.120.title:0 "Raiders in our way!"
    EEN_nf_events.120.desc:0 "It should be no surprise that the settlers of The Capital Wasteland were unable to fend off the savage bandits at their borders. While many would brush this development off as beyond our concern, there is the issue that our soldiers need to move through these territories to take the fight to The Brotherhood. Vertibird landings on the scale of deployments we need to win this war are not practical. As such, we are left with one option. We must push through these savages to reach our true enemy."
    EEN_nf_events.120.a:0 "Should be easy enough"
    EEN_nf_events.121.title:0 "Troubling Rumors"
    EEN_nf_events.121.desc:0 "Rumors are coming out of the Western Capital Wasteland about power armored soldiers striking in the night and driving people out of the area around Fort Constantine. The rumors make it sound like attacks from The Enclave, but that can not be, because we defeated them over 30 years ago out on the west coast. It is likely just wastelander supersition, but it has caused The DC Settlements to be concerned enough to give us permission to patrol their lands."
    EEN_nf_events.121.a:0 "Cant be them right?
    EEN_nf_events.122.title:0 "Better Than Expected"
    EEN_nf_events.122.desc:0 "Our initial expectations for Talon Company were for them to serve as little more than a distraction for The Brotherhood. Though not everyone in command is happy Captain Harrison was able to turn the mercs into a capable fighting force, it can not be denied. Now, with our largest threat in the region wiped out, questions about the future of Talon Company are being raised."
    EEN_nf_events.122.a:0 "A surprise, but a welcome one"
    EEN_nf_events.123.title:0 "Trouble Down South"
    EEN_nf_events.123.desc:0 "After Control Station ENCLAVE was destroyed in 2242, President Eden sent out a call to the surviving Enclave personnel across the nation, urging them to come East to Raven Rock. The survivors at Navarro were not the only ones that heard Eden's call. A small detatchment down in Florida responded to the call. This group out of an old areospace complex requested additional support for a classified project essential to The Enclave's mission. They were dispatched decades ago to ensure The Enclave had a backup plan in case Curling-13 didn't succeed. That backup plan being to go somewhere untouched by mutation, space. President Eden diverted some vertibirds from Navarro and shortly after communications went down. Our recent reconnection with The VanBuren Enclave has shown us the group has not died out and continue working at their goal. They are inching closer and assure The President that they will make sure their efforts also support our goals earthside. Restored communications, orbital silos, and other strategic benefits should be seen in the coming years."
    EEN_nf_events.123.a:0 "We expect to hear results soon"
    EEN_nf_events.124.title:0 "Aid For Florida"
    EEN_nf_events.124.desc:0 "The Enclave detachment at VanBuren Space Center are struggling to fend off mutants hordes while working towards their goal of creating viable spacecraft. We may have problems of our own, but does that mean we abandon our fellow Americans?"
    EEN_nf_events.124.a:0 "We simply can not afford to help them"
    EEN_nf_events.124.b:0 "We can send some squads of auxilaries"
    EEN_nf_events.124.c:0 "We can send some PA squads"
    EEN_nf_events.125.title:0 "Migrating North"
    EEN_nf_events.125.desc:0 "The men down in Florida could not hold off the mutant horrors any longer on their own. VanBuren Space Center has been overrun and those that were able to make it to vertibirds in time have made their way to Raven Rock. It is a tragedy, but at least there were some survivors."
    EEN_nf_events.125.a:0 "The mutants will pay, in time"
    EEN_nf_events.126.title:0 "A Storm is Brewing"
    EEN_nf_events.126.desc:0 "The surviving Enclave personnel from Van Buren Space Center tell us of the horrors down in the Florida wasteland. Vile super mutants, gangsters and even a group of those dammed Brotherhood technophiles rampage across a state that used to be America's playground. They may have been able to drive out a small detachment of our men, but lets see how they fare against the full force of The United States Army."
    EEN_nf_events.126.a:0 "We will wipe Florida clean"
    EEN_nf_events.127.title:0 "Message From The Secretary"
    EEN_nf_events.127.desc.1:0 " MESSAGE FOR EDEN "
    EEN_nf_events.127.desc.2:0 " MESSAGE FOR AUTUMN"
    EEN_nf_events.127.a:0 "We will do great things together"
    EEN_nf_events.127.b:0 "You will not stop us, abomination"
    EEN_nf_events.128.title:0 "Granite Here"
    EEN_nf_events.128.desc:0 "When we did not receive a response from Navarro, we understandably came to the conclusion that The Brotherhood or NCR overran our western compatriots, leaving no survivors. Thankfully we were wrong. We have received a transmission from the son of Sergeant Granite, the former leader of The Enclave Control Company. Granite Jr tells us that following the fall of Navarro, many enclave survivors went to ground trying to hide from The NCR who have only grown in power since 2242. The late Granite Sr led many survivors in a life as mercenaries and they now reside in a port settlement called Eureka."
    EEN_nf_events.128.a:0 "At least some survived"
    EEN_nf_events.129.title:0 "Granite's Gambit"
    EEN_nf_events.129.desc:0 "Over the past few months, we have been in communication with Granite Jr who has been aprising us of the situation out West. We have learned that while the NCR is the major force out west, they have been overreaching in recent years and it has left them weakened. Granite believes with enough support, they could retake Navarro or at least get some revenge. Of course we have our own problems, but getting revenge for our fallen is a noble cause."
    EEN_nf_events.129.a:0 "We can not aid them"
    EEN_nf_events.129.b:0 "We can only send weapons"
    EEN_nf_events.129.c:0 "We can send weapons and men"
    EEN_nf_events.130.title:0 "Urgent Message"
    EEN_nf_events.130.desc:0 "We have received an urgent transmission from Granite. Their cover has been blown and they are being pursued by NCR ranger killteams. They are requesting evacuation to Raven Rock."
    EEN_nf_events.130.a:0 "Rev up the vertibirds"
    EEN_nf_events.130.b:0 "What is that? You're breaking up."
    EEN_nf_events.131.title:0 "Raven Rock Sends Aid"
    EEN_nf_events.131.desc:0 "Reinforcements from Raven Rock arrived today via vertibird. The multiple squads of auxilary troops may not be as impressive as power armored soldiers, but they are still hard fighting Americans ready to assist us in fending off the mutant hordes of Florida."
    EEN_nf_events.131.a:0 "We are grateful for their aid"
    EEN_nf_events.132.title:0 "Raven Rock Sends Aid"
    EEN_nf_events.132.desc:0 "Reinforcements from Raven Rock arrived today via vertibird. The multiple squads of soldiers sporting state of the art power armor and advanced weaponry are ready to strike fear into the hearts of the mutated masses of Florida."
    EEN_nf_events.132.a:0 "We are grateful for their aid"
    EEN_nf_events.133.title:0 "Raven Rock Sends Aid"
    EEN_nf_events.133.desc:0 "Our fellow Enclave out East have not forgotten about us. Upon hearing of the plight of those that remained behind at Navarro, they have agreed to send us equipment to allow us to carry on our fight for survival. It is without doubt however, that someone in The NCR saw the vertibirds flying over their home to deliver these weapons from DC."
    EEN_nf_events.133.a:0 "We will put them to good use"
    EEN_nf_events.134.title:0 "Raven Rock Sends Aid"
    EEN_nf_events.134.desc:0 "Our fellow Enclave out East have not forgotten about us. Upon hearing of the plight of those that remained behind at Navarro, they have agreed to send us men and equipment to allow us to carry on our fight for survival. It is without a doubt however, that someone in The NCR saw the vertibirds flying over their home to deliver these soldiers from DC."
    EEN_nf_events.134.a:0 "Welcome to Eureka, men"
    EEN_nf_events.135.title:0 "Transmission From Raven Rock"
    EEN_nf_events.135.desc:0 "President Eden has transmitted us volumes of data on the manufacture of robotics. Some of these blueprints may be beyond our capability for now, but they will help us develop better machines."
    EEN_nf_events.135.a:0 "Thank you, Mr President"
    EEN_nf_events.136.title:0 "What the hell is a S'lanter?"
    EEN_nf_events.136.desc:0 "When we heard our assumptions about Navarro were false, and that our fellow Americans were not only surviving but thriving, everyone at Raven Rock was elated. That elation was quickly replaced with concern with ever stranger news coming from the west. Though the details are not fully clear, some of their personnel are secretly contacting us with concerning news. We're getting reports that they are accepting mutatns as equal citizens, in talks with The Brotherhood for peaceful integration, and even some claims that their 'president' is the son of the same tribal that blew up the rig! It is hard to tell what is rumor and what is fact, but if even half of what we have been told is true, this enclave out west is far from our ally."
    EEN_nf_events.136.a:0 "They're talking raccoons that... can vote?"
    EEN_nf_events.137.title:0 "President Who?"
    EEN_nf_events.137.desc.1:0 "It would appear that our initial assumptions about Navarro were incorrect. While the base had fallen to NCR and Brotherhood forces shortly after the migration east, there were a substantial number of survivors. Like us, they have bided their time and rebuilt their strength from places like Vault City and The Sierra Army Depot. We had the uhm... pleasure of speaking with the son of Sgt Granite of The Enclave Control Company. He has apparently been elected president of this enclave detachment and has plans of rebuilding our great nation out west. The matter of two presidents may become an issue in the future, but that is a bridge we may want to hold off on crossing until we come to it."
    EEN_nf_events.137.desc.2:0 "It would appear that our initial assumptions about Navarro were incorrect. While the base had fallen to NCR and Brotherhood forces shortly after the migration east, there were a substantial number of survivors. Like us, they have bided their time and rebuilt their strength from places like Vault City and The Sierra Army Depot. We had the uhm... pleasure of speaking with Dr Anderson, a prominent scientist in the field of FEV research. He has apparently been elected president of this enclave detachment and has plans of rebuilding our great nation out west. The matter of two presidents may become an issue in the future, but that is a bridge we may want to hold off on crossing until we come to it."
    EEN_nf_events.137.a:0 "At least they're enclave."
    EEN_nf_events.138.title:0 "Radio Silence?"
    EEN_nf_events.138.desc:0 "Limited scouting and flybys in Ontario have turned up no signs of The Ontario Enclave. What they have found is that the region is controlled by various wastelander groups that undoubtedly had a hand in the trouble our fellow Americans suffered 30ish years ago. The memory of our compatriots must still be in their minds because popshots have been fired at our vertibirds and scouts. It's clear that if we are to find out what happened to The Ontario Enclave, we will need to establish a more substantial presence."
    EEN_nf_events.138.a:0 "We march on Toronto!"
    EEN_nf_events.139.title:0 "A Welcome Surprise"
    EEN_nf_events.139.desc:0 "When we lost contact with The Ontario Enclave nearly 30 years ago, many at Raven Rock thought they were wiped out by the mutant hordes of Canada. Some still held out hope, not just for our compatriots but for their family or friends that were sent to assist them. Subsequent attempts at contact were always met with silence, with optimism diminishing with every call that heard nothing but static. Our most recent expedition to scout out the area for expansion has shown those that held on to hope were right to do so! The Ontario Enclave had survived all those years and while we grappled with The Brotherhood in DC they made their own push to reassert control of Toronto. Ontario Command is happy to hear from us having recently repaired their long-range communications, and they're ready to return to the fold."
    EEN_nf_events.139.a:0 "Welcome Back!"
    EEN_nf_events.140.title:0 "A Cold Tomb"
    EEN_nf_events.140.desc:0 "We have received reports back from the team we sent to The Ontario Command Bunker. As we had expected, the bunker lost life support and was stripped of anything of value long ago. Many bodies lie frozen in their bunks and what few logs we could recover from decaying databanks tell of a slow death following their retreat from Toronto decades ago. According to the logs, the bunker was already nearing its last legs when they emerged following the destruction of The Rig but with resources they pulled away in their retreat they were able to slow the decay. However in the early 2270s it became apperant they would have to depart from the bunker. After that the logs become too corrupted. It is unclear if they made an attempt at retaking Toronto or just watched the bunker lose life support around them. What we were able to recover was the last log that tells of 38 survivors marhcing east."
    EEN_nf_events.140.a:0 "They may have survived"
    EEN_nf_events.141.title:0 "We Found Them"
    EEN_nf_events.141.desc:0 "Searching the route the survivors of The Ontario Command Bunker were taking we found little in the way of a trail or civilization. After the first 100 miles command had nearly given up the search. That was when they found the first body. Over the next 80 miles we found the remaining 37 other members of this doomed party. Some fell to gunfire, others had signs of being eaten by wild animals, and more than a few froze to death or starved. Their bodies have been brought back along with those in the bunker where they will receive proper funerals."
    EEN_nf_events.141.a:0 "A sad day, at least we have closure."
    EEN_nf_events.142.title:0 "Rebuilding America Together"
    EEN_nf_events.142.desc:0 "After the fall of The Rig, The Enclave was in a horrible state. Bunkers sitting and waiting for the all-clear signal from The Rig, knowing they could emerge into a pure America, were instead receiving a broadcast from Navarro about The Rig's destruction. Many fled, deserted, or pursued their own goals. Even after President Eden called many of The Navarro staff to join him at Raven Rock, much of The Enclave was scattered and without clear direction. Our brief radio contact with other bunkers and outposts has been a good start, but it is just the beginning. Now that we have regained our strength, we are in a state to lead our scattered American brothers into the future."
    EEN_nf_events.142.a:0 "We will lead the way!"
    EEN_nf_events.143.title:0 "More Than An Outpost"
    EEN_nf_events.143.desc:0 "For years, it was unknown to any the true extent of the Enclave outpost in Chicago. Records of construction and pre-war occupancy lists were hardly something of interest and were lost with the destruction of The Rig. Most in Raven Rock command thought the place was little more than 3 guys in a bunker at this point. Our recent radio contact showed that wasn't the case, but still we did not know just how massive The Chicago Enclave really is. Having followed up on our radio calls, we sent some representatives to Chicago via vertibird. They report back that Chicago's much larger than even the most optimistic expectations. The Chicago Bunker held thousands of pre-war elites as well as their staff and a sizable contingent of military personnel. This bunker was second in size only to Control Station ENCLAVE. In the years since the fall of The Rig, Chicago has been busy subjugating the Chicago metropolitan area as well as other locations of strategic value. Some in Raven Rock worry what this means for us since they are in a better position than we currently are. The president has squashed this discussion reminding everyone that we are one enclave with one goal."
    EEN_nf_events.143.a:0 "We must work together, at least until the mutants are dealt with."
    EEN_nf_events.144.title:0 "Rising Tensions In Raven Rock"
    EEN_nf_events.144.desc:0 "Overall, The Raven Rock Enclave is united in purpose and belief. Every man, woman, and even child is committed to the goal of rebuilding America the way it should be. There are of course disagreements about what that means or how best to get it done, but these are usually settled amicably. There is one serious exception that threatens to tear Raven Rock apart. President John Henry Eden, and Colonel Augustus Autumn have had ever more heated disagreements on several key aspects of strategy when it comes to rebuilding America. Despite their attempts at keeping this division amongst themselves, Raven Rock is not a large place, so news travels fast. A rift is forming throughout the ranks of The Enclave and many believe that this will come to a head once the days of preparation are at an end and the time for action approaches."
    EEN_nf_events.144.a:0 "Keep an eye on this"
    EEN_nf_events.144.b:0 "What does this mean though?"
    EEN_nf_events.145.title:0 "Colonel Autumn's Plot"
    EEN_nf_events.145.desc:0 "Though few know it, President Eden is not a human being but a machine. With the right program into his mainframe, he can be taken offline while keeping Raven Rock operational. This is something Colonel Autumn has pondered more and more as their disagreements have grown. He knows it won't be as simple as unplugging a toaster, Eden is smart and has control of Raven Rock's security systems. If the machine is tipped off, Autumn will fail. \n \n That is why Autumn needs to carefully build his support if he is to be successful in pulling off a coup. He would likely need more than half of Raven Rock at least sympathetic to his ideals to keep something like this under wraps."
    EEN_nf_events.145.a:0 "§R I should read this event."
    EEN_nf_events.146.title:0 "The Final Straw"
    EEN_nf_events.146.desc:0 "In the months following the defeat of The Brotherhood, Commander in Chief Autumn had non-stop problems to address. Brotherhood guerillas, Eden loyalists and the monumental task of governing a largely ungrateful populace. These problems were all things his enclave had under control. The real threat to America was just a short vertibird flight away in Chicago. The Chicago Enclave is a force just as powerful as Autumn's military, and on a good day their leadership has been standoffish. \n \n Today was a bad day. \n \n A simple discussion of the secretary's role in Autumn's government quickly turned to aggressive posturing and eventually threats. The heated argument ended with harsh words from the secretary before he terminated communication. \n \n§R Autumn, you and your treasonous followers have usurped power and killed true Americans to protect a mutant cancer ravaging our nation. For this crime there can be no punishment great enough. You will see our just retribution.§!"
    EEN_nf_events.146.a:0 "If he wants war, he will have it!"
    EEN_nf_events.147.title:0 "Trivial Differences"
    EEN_nf_events.147.desc:0 "Upon reconnecting with The Chicago Enclave, it quickly became clear that their methods do not quite match ours. Rather than kill the mutant race, they want to enslave it for the forseeable future. On it's surface, this is abhorrent to anyone who follows the wisdom of our great president. It has led to no shortage of debate, as well as calls for a more aggressive approach to our fellow Americans. Our president sees through the reactionary concerns of some in Raven Rock. Is enslaving mutants that different from using them for experiments or using super mutants as cannon fodder? In the end the mutant race will be extinct when our work is done. Is it worth squabbling over how accelerated their exterimation is?"
    EEN_nf_events.147.a:0 "A house divided can not stand"
    EEN_nf_events.148.title:0 "A Helping Hand"
    EEN_nf_events.148.desc:0 "Even the most optimistic soldier has concerns about the prospect of fighting Chicago. They have us out-teched and out-manned. That is why a recent transmission we received from The Capital Wasteland has led to celebrations everywhere from MacArthur AFB to Steel Town. We were contacted by Commander in Chief Autumn. The Commander had recently thwarted a plan by President Eden to poison the entire wasteland with FEV tainted water and is also alarmed by Chicago's dogma. He is offering his support in our conflict with Chicago and promises that together we can rebuild America!"
    EEN_nf_events.148.a:0 "We'll take all the help we can get!"
    EEN_nf_events.149.title:0 "The Chicago Enclave's Fate"
    EEN_nf_events.149.desc:0 "The guns have fallen slient. The fires in Chicago are dying down. The last of The Secretary's soldiers have surrendered or fled. As our soldiers pacify Chicago, many wonder what will happen to those that opposed America. Wastelander soldiers have seen Chicago's treatment of their kind first hand and naturally want to form firing squads. There have already been multiple reports of Enclave soldiers having to break up lynch mobs or having to detain unruly soldiers getting too flippant with their threats. Executing every soldier, scientist and civilian of The Chicago Enclave is hardly feasable, let alone something that would go over well with normal non-mutated Americans."
    EEN_nf_events.149.a:0 "Execute the leadership. No trial"
    EEN_nf_events.149.b:0 "Organize trails for the worst offenders"
    EEN_nf_events.149.c:0 "Issue pardons for useful recruits"
    EEN_nf_events.149.d:0 "Place blame solely on The Secretary"
    EEN_nf_events.150.title:0 "Hold Your Heads High"
    EEN_nf_events.150.desc:0 "Across the airwaves radio broadcasts were halted to air an address from our Commander in Chief about the end of The Chicago War and the future of our nation. \n \n §B People of America, this is Commander in Chief Autumn speaking. The false Secretary of The Interior and his cronies have been crushed. As I speak our military is bringing order to the midwest. With their defeat at the hands of our mighty armed forces, the path to reclaiming America is clearer than ever. I encourage all the Americans listening to hold thier heads high. \n \n Every soldier in the field defending our nation \n \n Every factory worker producing our arsenal. \n \n Every farmer keeping our nation fed \n \n Your loyalty to The Enclave and contributions to our cause are not forgotten. Together we will ensure every illegitimate state claiming a slice of our great nation as their own will meet their end by plasma fire soon enough. I assure you, under my leadership America will be whole once again. \n \n God bless humanity, God bless The Enclave, and God bless America. This is Commander in Chief Autumn, signing off."
    EEN_nf_events.150.a:0 "America is coming"
    EEN_nf_events.151.title:0 "A Gift"
    EEN_nf_events.151.desc:0 "Words alone can not prove to Chicago the sincerity of our desire to repair our strained relations. Through study of the history of dimplomacy, President Eden has come up with a fantastic idea. A physical token of our sincerity in the form of a gift would go a long way to conveying our intentions. But what to get the people who have all the plasma rifles, power armor and vertibirds a nation could need?"
    EEN_nf_events.151.a:0 "They could always use more mutant slaves"
    EEN_nf_events.151.b:0 "Create a grand statue of The Secretary"
    EEN_nf_events.151.c:0 "Send them Hellfire armor schematics"
    EEN_nf_events.151.d:0 "Send them Duraframe Eyebot research data"
    EEN_nf_events.151.e:0 "Try sending plasma weapons and power armor anyway"
    EEN_nf_events.152.title:0 "Returning The Favor"
    EEN_nf_events.152.desc:0 "Raven Rock recently sent us a nice gift. It would appear they are sincere about maintianing our alliance and rebuilding America together. The natural next course of action would to be send them a gift in return. Our best artists have designed a statue of President Eden, or at least the human portrait he passes himself off as. Through the hard work of our task masters, the mutant slaves have been able to produce the massive statue at an impressive pace. Of course, Eden wants us to follow him like dutiful subjects. That is why we have a plan B for this statue. If we were to hide a nuclear device in the statue, we could detonate it. It is likely Eden will put the statue in his capital. Detonating it would be a devistating blow to his administration and give us a serious advantage in the war we would set off."
    EEN_nf_events.152.a:0 "Just a normal statue please"
    EEN_nf_events.152.b:0 "Ready the nuke."
    EEN_nf_events.153.title:0 "The Vacant Chair"
    EEN_nf_events.153.desc:0 "President Eden had never seen the need for appointing a vice president while he was running things at Raven Rock. After all, the main roles of the VP include replacing the president if he dies and breaking a tie in congress. With no congress to vote and the president being a ZAX computer in the heart of Raven Rock, neither of these things would ever be necessary. However, as President Eden brings together the other Enclave states across the nation, the necessity of a human to shake hands and give live speaches becomes more apparent. The role will be largely superficial, with this appointee largely carrying out the whims of The President and putting a face to The Enclave. This is not to say the role will not be that of a figurehead. The VP will have the president's digital ear, and will likely have an impact on the implimentation of some policies. This is not a choice to be taken lightly."
    EEN_nf_events.153.a:0 "§OHeymann understands old world values."
    EEN_nf_events.153.b:0 "§OAmbassador Porter knows the power of negotiation."
    EEN_nf_events.153.c:0 "§GRick Hurley inspires hope no matter how bleak things seem.."
    EEN_nf_events.153.d:0 "§CPillow will help us reach the stars, whatever the cost."
    EEN_nf_events.153.e:0 "§CCoburn resonates well with America's brightest minds."
    EEN_nf_events.153.f:0 "§CPeterson's ambition will take him far."
    EEN_nf_events.153.g:0 "§RMcCarthy is from Raven Rock and can be trusted."
    EEN_nf_events.153.h:0 "§0Granite seems like VP material."
    EEN_nf_events.154.title:0 "The Rebirth of A Nation"
    EEN_nf_events.154.desc:0 "Representatives from across America have come together in Lincoln, just outside The DC Ruins. These men and women of The Enclave have met to iron out the details of The Lincoln Accord. This document will solidify the united government of our nation, doing away with the petty squabbles and pissing contests. \n \n Though different territories will still be governed by their respective leaders, they all follow the rule of The President. The Enclave will work to restoring America and cleaning it of mutation. Secondary goals or vanity projects will follow after. Together we will make America like it was before the war, whole, beautiful, powerful. We are one Enclave, one America, now and forever."
    EEN_nf_events.154.a:0 "God bless The Enclave, and God bless America"
    EEN_nf_events.155.title:0 "War is Brewing"
    EEN_nf_events.155.desc:0 "It has become clear in recent months that The Secretary has little respect for the office of The President. He has flagrantly disobeyed the president's directives, maintained a hostile demeanor, and thrown disrespectful remarks at Eden. The most recent offense was when he had the Chicago military perform a series of training exercises simulating inter-enclave conflict. When asked about this The Secretary remarked that it was so Chicago wouldn't get caugt with their pants down in the event of an insurrection like Raven Rock almost did with Colonel Autumn. He also recommended we do the same insinuating that there could always be more traitors that flew under our radar."
    EEN_nf_events.155.a:0 "This can only end one way"
    EEN_nf_events.156.title:0 "The Fall of Chicago"
    EEN_nf_events.156.desc.1:0 "The guns have fallen slient. The fires in Chicago are dying down. The last of The Secretary's soldiers have surrendered or fled. As our soldiers pacify Chicago, many wonder what will happen to those that opposed America. Almost all of Chicago's leadership along with soldiers, scientists and even civillians were active participants in this conflict. By law we would be withhin our rights to reduce them all to ash. The President recognizes the fury of the American people, and he too is upset by the treachorous acts of the people of Chicago and their supporters. However, there are some inescapable realities to consider. Chicago represents one of the largest populations of pure humans left on earth. The city is also home to some of the brightest minds and best tacticians outside of our territory. It would be a waste to kill all of them."
    EEN_nf_events.156.desc.2:0 "The guns have fallen silent, and as our soldiers sweep the radioactive ruins of Chicago it is clear that a horrible blow has been dealt to humanity. Countless pure American humans have been wiped out in an the first exchange of nuclear fire since The Great War. Thousands more died in the fighting after, both sides pushing towards the bunker of their advesary to seek revenge on the leadership that destroyed their home. Seeing the eyebot footage from The Chicago Crater has overwhelmed Eden's circuits with something he could only guess is remorse. The future for humanity was so bright for a time, but now things look as bleak as they did when the rig fell."
    EEN_nf_events.156.a:0 "Spare only the civillians and scientists"
    EEN_nf_events.156.b:0 "Good soldiers follow orders, just execute the leadership"
    EEN_nf_events.156.c:0 "No mercy for traitors"
    EEN_nf_events.156.d:0 "What have we done?"
    EEN_nf_events.157.title:0 "LINCOLN IS GONE!"
    EEN_nf_events.157.desc:0 "The city of Lincoln has been wiped off the map by a nuclear blast. Thousands of Americans have been evaporated in an instant with the few that survived flooding into Enclave outposts. Just before the blast we received the following message from Chicago. \n \n §R John Henry Eden, you and your loyalists have bypassed the rightful succession of power of our government. Your crooked aims and flawed programming can not be ignored no matter how many kind words or gifts you toss at us. We see through your charade and are putting a stop to your little fiefdom. Look around your little town and enjoy the view while you can. Soon there will not be anyone left to stand between us and your off switch."
    EEN_nf_events.157.a:0 "This means war!"
    EEN_nf_events.157.b:0 "Return fire, reduce Chicago to ash!"
    EEN_nf_events.157.c:0 "Cadmus has a way to retaliate!"
    EEN_nf_events.158.title:0 "RAVEN ROCK RETURNS FIRE!"
    EEN_nf_events.158.desc:0 "Chicago has been reduced to a crater by a nuclear ICBM fired by Raven Rock. We do not know where they acquired such a device, but that hardly matters now. Thousands of our citizens have been killed by President Eden and our war against his lackeys has become that much more difficult!"
    EEN_nf_events.158.a:0 "Chicago will be avenged!"
    EEN_nf_events.159.title:0 "Colonel Autumn is Cleaning House"
    EEN_nf_events.159.desc:0 "As we should have expected, the treacherous Colonel Autumn wasted no time punishing Americans that stood by President Eden's vision. The few scientists that were able to escape to our borders tell of merciless purges and arbitrary loyalty tests. The scientists have devoted themselves to our nation and wish to aid us in maintaining a scientific edge over Autumn and his mutie-loving traitors."
    EEN_nf_events.159.a:0 "His loss is our gain"
    EEN_nf_events.160.title:0 "Alpha vs Sigma"
    EEN_nf_events.160.desc:0 "After The Bruhtherhood got their cheeks clapped by our Chadclave, Mewmander In Chief Autumn had been up to his gyatt in cringe. Bruhtherhood tech gooners that didn't know how to take the L, Eden glazers, and the low-key biggest L-take of them all, a bunch of wasteland betas that didn't think The Chadclave passed the vibecheck. These things were nothing for someone with such main character energy. That E-boy The Succretary and his simps in Soycago were a whole other kind of sussy. They'd been seeing a glow-up after clapping their own Bruhtherhood, and even on a good day they keep trying to mog us. \n \n Today was an L-Rizz day \n \n Succretary kept geeking out when Autumn talked about how The Chadclave could have only one Sigma. Soycago kept trying to mog us with their tech-maxxing, then The Succretary crashed out before leaving the chat. \n \n§R Autumn, you and your glazers are not based. You are just cringe NPC betas simping for wasteland thots. For this, you will be ratioed!"
    EEN_nf_events.160.a:0 "That's Cap!"
    EEN_nf_events.161.title:0 "Weary But Ready To Fight"
    EEN_nf_events.161.desc:0 "Hundreds of soldiers in power armor have been flooding across our western border in recent weeks. With their weapons nearly empty and their armor beat to hell, the soldiers were relieved to encounter our patrols. The tired soldiers from Chicago have been debriefed and their stories paint a concerning picture. It would seem The Secretary out west bit off more than he could chew and saw Chicago overran. The few soldiers that were able to make it out were ordered to retreat to The Capital Wasteland by a Major Thorn, who was in the last group of soldiers to make their way to our territory. The Major, along with all the survivors, are itching to take revenge on the mutants that destroyed their home. Though they are tired after months of fighting and their trek east, they are insistent on returning to frontline duty."
    EEN_nf_events.161.a:0 "We'll make those muties pay!"
    EEN_nf_events.162.title:0 "Defunct Codes"
    EEN_nf_events.162.desc:0 "Across the nation there are old military bases and bunkers that have not opened in nearly 200 years. We are able to bypass the security for a lot of these with pre-war codes. Fort Constantine is not one of these facilities. Some wasteland trash stumbled through it years ago and triggered a counter-insurgency program, so now even our clearance codes don't work. There are hundreds of robots ready to gun down anybody that tries to enter the facilitiy. This is a problem we have largely ignored, but if we do not do something about this, it could be used against us. President Eden is preparing orders for our men to assault the facility now and disable the machines for our use. Colonel Autumn disagrees and wants to use an EMP which will surely fry the machines inside, rendering them unusable."
    EEN_nf_events.162.a:0 "We will not waste lives for bolts"
    EEN_nf_events.162.b:0 "The President is right, we need those bots"
    EEN_nf_events.163.title:0 "Seeing Off Captain Harrison"
    EEN_nf_events.163.desc:0 "Captain Harrison was not well liked by certain circles in Raven Rock. He made his opinion of certain policies known, and that was enough to get him shipped off to this new project at Fort Banister. Those who know of the project consider it a pipe dream. There is no way even an officer in the US Army can turn a collection of raiders in combat armor into something more. Few showed up to the captain's send-off, except for Colonel Autumn and a few officers close to him. They spoke briefly before The Colonel sent Captian Harrison off with a few words."
    EEN_nf_events.163.a:0 "Best of luck Captain"
    EEN_nf_events.163.b:0 "We expect great things, Captain."
    
