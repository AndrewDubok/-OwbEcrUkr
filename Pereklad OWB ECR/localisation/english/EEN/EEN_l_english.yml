    EEN_tt_12:0 "The wastelanders really won't like this"
    EEN_tt_13:0 "This will be a public relations nightmare!"
    EEN_tt_14:0 "The wastelanders will like this"
    EEN_tt_15:0 "The wastelanders will love this"
    EEN_tt_16:0 "The wastelanders will celebrate this!"
    EEN_tt_17:0 "Where we bring water, we bring order"
    EEN_tt_18:0 "We will begin constructing water distribution centers in compliant regions and find staff for them"
    EEN_tt_19:0 "Once someone gets that derelict pipe dream working again, we should take action!"
    EEN_tt_20:0 "Keep an eye on event options and focus decisions. Ones that will impact the general perception the wastelanders have of The Enclave will mention the impact. By doing things the wastelanders will like, your public support will increase. Doing things they don't like will hurt public support."
    EEN_tt_21:0 "Unlocks a new occupation law to distribute water to the thirsty wastelanders, in exchange for their obedience."
    EEN_tt_22:0 "Unlocks a new occupation law to cleanse the wasteland"
    EEN_tt_23:0 "Their response is likely dependent on just how well our employer/employee relationship is going"
    EEN_tt_24:0 "This will strengthen our ties with our employees"
    EEN_tt_25:0 "More wastelanders succumb to the effects of the FEV tainted water"
    EEN_tt_26:0 "Set up a small outpost to monitor mutant sterilization efforts."
    EEN_tt_27:0 "As more water distribution centers open, the wastelander rabble will fall in line!"
    EEN_tt_28:0 "Yeah, its like The Enclave are evil assholes or something."
