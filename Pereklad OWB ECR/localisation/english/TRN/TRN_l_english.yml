###Country Flag###
TRN_slave_council_flag:0 "Вільним рабам надано місце у нашій племінній раді"

###Characters###
TRN_tom_stalowe_NAME:0 "Том Сталов"
TRN_tom_stalowe_desc:0 "У руїнах за стінами володінь Ашура є дика земля, сповнена трогів і дикунів, чиї розуми занурилися в божевілля. Мало хто, хто наважується за огорожі, повертається, але деякі, хто повернувся, розповідали про дивні речі. Ходять чутки, що серед трогів і дикунів живуть люди, які ведуть життя в стародавній фортеці, куди ніхто не добереться… чи можуть чутки бути правдою?"
TRN_big_trog_name:0 "Альфа Трог"
TRN_ashley_borsan_name:0 "Еш Борсан"
TRN_shane_hayette_NAME:0 "Шейн Хаєтт"

###Events###
TRN_nf_events.1.title:0 "Троги"
TRN_nf_events.1.desc:0 "Поза огорожами работорговців, Піт належить нікому. Натомість його заполонили троги. Ці жахливі мутанти створені унікальним поєднанням радіації та промислового забруднення у Піті. Вони блукають вулицями, каналізацією та старими будівлями, пожираючи все, що зустрінуть. Троги тут століттями й залишаться ще багато століть."
TRN_nf_events.1.a:0 "Хто міг би жити там?"

TRN_nf_events.2.title:0 "З невідомих земель"
TRN_nf_events.2.desc:0 "Одного дня до Піта прийшов племінник зі заходу. Кажуть, він був одним з останніх нащадків виживших з давно загиблого племені, племені, що могло спілкуватися зі звірами пустелі. Ця здатність його предків могла бути причиною, чому троги не розірвали його на шматки, коли він увійшов у Піт. Зрештою він дійшов до величезного стадіону в серці руїн, місця, недоторканого людьми понад сто років. Там він заснував нове плем’я, з однією метою."
TRN_nf_events.2.a:0 "Створити краще майбутнє"
TRN_nf_events.2.b:0 "Зберегти мудрість"

TRN_nf_events.3.title:0 "Врятувати душі"
TRN_nf_events.3.desc:0 "Племінник бачив людей у руїнах, чиї душі були під тиском. Здалеку він спостерігав, як вони програвали свої битви та ставали схожими на звірів руїн. Він згадав ритуал свого народу, який використовувався, щоб повернути тих, хто занурювався у божевілля. Вночі він підійшов до одного з них, поки той спав. З правильними травами дикун занурився в глибокий сон. Коли він прокинувся, його дух знову був спокійний, але пам’ять про минуле зникла. Том навчив його шляхам свого загубленого народу, і згодом вони вирушили рятувати ще когось. Через кілька років Том сформував нове плем’я зі спасених душ."
TRN_nf_events.3.a:0 "Від одного до багатьох"

TRN_nf_events.4.title:0 "Пробудження"
TRN_nf_events.4.desc:0 "Духи врятованих Томом відновилися, але не без наслідків. У тих, хто повернувся, залишилися залишки звірячих духів. Навіть після священних трав і ритуалів вони не могли позбутися того, що їх торкнулося. Люди, що вижили, розвинули зв’язок із трогами руїн і могли частково контролювати їх, як предки Тома зі звірами пустелі. Том заборонив посилювати ці зв’язки, не бажаючи бачити свій народ перетвореним на звіра. Але з розширенням рейдерів Піта до стадіону, Еш звернувся до Тома з питанням."
TRN_nf_events.4.a:0 "Хіба ми не повинні використовувати всі наші засоби?"

TRN_nf_events.5.title:0 "Рятувати чи жертвувати"
TRN_nf_events.5.desc:0 "Нова група дикунів була помічена біля стадіону, і коли плем’я готується їх схопити, Том не може перестати думати про слова Еша. Все більше членів племені дивляться на схід із страхом. Протистояти Піту здається неможливим, але з трогами це можливо. Є й інший шлях цього ритуалу. Тих, чий дух постраждав, можна довести до звірячого божевілля замість порятунку, і як троги вони могли б воювати на нашому боці!"
TRN_nf_events.5.a:0 "Врятувати дикунів"
TRN_nf_events.5.b:0 "Жертвувати дикунів"

TRN_nf_events.6.title:0 "Знищення зла"
TRN_nf_events.6.desc:0 "Рейдери Піта, які колись загрожували нашому племені і майже загнали нас у темряву, тепер тікають у свої укриття в Аптауні. Раби Піта взялися за зброю й разом з нашими воїнами просуваються через високі руїни. Це лише питання часу, коли останніх мерзотних рейдерів зметуть з їхніх башт."
TRN_nf_events.6.a:0 "Перемога наша!"

TRN_nf_events.7.title:0 "Великий бенкет"
TRN_nf_events.7.desc:0 "Рейдери Піта, які колись змушували наше плем’я ховатися в руїнах, тепер тікають за своїми життя у сховища Аптауна. Вимкнувши світло, ми випустили на башти наші зграї трогів. В усьому Піті чути все менше пострілів і все більше криків."
TRN_nf_events.7.a:0 "Мисливці стали здобиччю"

TRN_nf_events.8.title:0 "Дитина"
TRN_nf_events.8.desc:0 "На верхівці башти Ашура ще живе останній чужинець, Марі, дитина Ашура. У племені немає єдності щодо того, що робити з немовлям. Чи виховати його як члена племені? Відправити з Піта? Або щось інше?"
TRN_nf_events.8.a:0 "Виховати"
TRN_nf_events.8.b:0 "Нехай вільний раб забере її з Піта"
TRN_nf_events.8.c:0 "§R(Канібал) З'їсти дитину§!"

TRN_nf_events.9.title:0 "Земля Юнзерів"
TRN_nf_events.9.desc:0 "Піт був звільнений від злочинних рейдерів нашим плем’ям. Деякі раби повернулися додому, але багато залишилися в племені. Тепер ми єдине плем’я, але без назви. Переглядаючи руїни, ми знайшли згадки про людей, які жили тут раніше, особливо біля стадіону. Вони називали себе Юнзерами."
TRN_nf_events.9.a:0 "Отже ми Юнзери"
###Ideas###
TRN_we_be_trogs:0 "Величезні руїни"
TRN_we_be_trogs_desc:0 "Троги блукають каналізаціями та зруйнованими будівлями Піта. Між численними укриттями руїн та безстрашною кровожерливістю трогів, лише маленьке диво або довгий кошмар дозволить кому-небудь дістатися до нашого дому."
TRN_fight_as_trogs_idea:0 "Битися як троги"
TRN_fight_as_trogs_idea_desc:0 "Наш народ навчився бойовим стилям трогів. Незабаром ми будемо так само смертоносні, як вони!"
TRN_trog_traps_idea:0 "Кращі пастки для трогів"
TRN_trog_traps_idea_desc:0 "Ми багато дізналися про те, як ловити трогів. А ви знали, що пастки працюють краще з приманкою?"
TRN_avoid_observe_idea:0 "Уникати та спостерігати"
TRN_avoid_observe_idea_desc:0 "Наші воїни віддають перевагу бою на відстані, добиваючи все, що троги не встигають з’їсти."
TRN_dig_and_hold_idea:0 "Заритися та тримати"
TRN_dig_and_hold_idea_desc:0 "У тих випадках, коли натовпи трогів стримуються ворогами, наші воїни б’ються з укріплень."
TRN_watching_bridges_idea:0 "Спостерігати за мостами"
TRN_watching_bridges_idea_desc:0 "Кращі воїни племені пильно слідкують за горизонтом. Коли новий ворог прийде до Піта, ми будемо готові."
TRN_hunting_grounds_idea:0 "Мисливські угіддя"
TRN_hunting_grounds_idea_desc:0 "Руїни Піта відлунюють риком трогів і криками тих, кого нам не пощастило спіймати."
TRN_trog_hierarchy_idea:0 "Править найсильніший"
TRN_trog_hierarchy_idea_desc:0 "Як і у трогів, у нашому племені править найсильніший."
TRN_trog_hierarchy_2_idea:0 "Править найсильніший"
TRN_trog_hierarchy_2_idea_desc:0 "Як і у трогів, у нашому племені править найсильніший."
TRN_baby_back_ribs_idea:0 "Реберця"
TRN_baby_back_ribs_idea_desc:0 "ВОНИ З’ЇЛИ ДИТИНУ?"
TRN_endless_hunt_idea:0 "Безкінечне полювання"
TRN_endless_hunt_idea_desc:0 "Пошук нової здобичі змушує нас рухатися вперед."
TRN_one_people_idea:0 "Єдиний народ"
TRN_one_people_idea_desc:0 "Наше плем’я прийняло багато чужинців з відкритими обіймами. Це був урок для всіх, але ми стали сильними та єдиними."

###National Focus###
TRN_nf_a001:0 "Звірі"
TRN_nf_a001_desc:0 "Кожен, хто заходить у Піт, знає, що таке трог."
TRN_nf_a002:0 "Мандрівник"
TRN_nf_a002_desc:0 "Чужинець із заходу, із дивними здібностями."
TRN_nf_a003:0 "Плем’я"
TRN_nf_a003_desc:0 "Згодом чужинець вже не був самотнім."
TRN_nf_a004:0 "Звір у середині"
TRN_nf_a004_desc:0 "Живучи серед звірів, треба остерігатися стати одним із них."
TRN_nf_a005:0 "Іржаві булави"
TRN_nf_a005_desc:0 "Велика палиця б’є сильно"
TRN_nf_a006:0 "Рити тунелі"
TRN_nf_a006_desc:0 "Під стадіоном є тунелі, давно забиті уламками."
TRN_nf_a007:0 "Грибні ферми"
TRN_nf_a007_desc:0 "Сирі тунелі – ідеальне місце для вирощування грибів."
TRN_nf_a008:0 "Стародавні воєнні пісні"
TRN_nf_a008_desc:0 "Глибоко в стадіоні ми знайшли стародавні гімни воїнів. Починаємо!"
TRN_nf_a009:0 "Зв’язок із трогами"
TRN_nf_a009_desc:0 "Використовуючи зв’язок із трогами, ми можемо трохи ними керувати..."
TRN_nf_a010:0 "Спортивна медицина"
TRN_nf_a010_desc:0 "Колись у стадіоні жили великі цілителі, які підтримували воїнів Стилерів спеціальними пігулками. Ми можемо скористатися їхньою мудрістю."
TRN_nf_a011:0 "Ритуали дикунів"
TRN_nf_a011_desc:0 "Дикуни небезпечні, але не зникли. Ми можемо їх врятувати… або підштовхнути."
TRN_nf_a012:0 "Масовий ритуал"
TRN_nf_a012_desc:0 "Зловивши багато дикунів, ми можемо зібрати плем’я на великий ритуал."
TRN_nf_a013:0 "Броня прадавніх"
TRN_nf_a013_desc:0 "Броня стародавніх Стилерів буде на наших кращих воїнах."
TRN_nf_a014:0 "Вони б’ються з нами"
TRN_nf_a014_desc:0 "Троги будуть битися поруч із нашими воїнами!"
TRN_nf_a015:0 "Жити з трогами"
TRN_nf_a015_desc:0 "Як ми б’ємося зі звірами, так ми живемо з ними, зміцнюючи зв’язки."
TRN_nf_a016:0 "Битися як трог"
TRN_nf_a016_desc:0 "Трог – смертельна істота, і ми можемо вчитися у них."
TRN_nf_a017:0 "Полювати з трогами"
TRN_nf_a017_desc:0 "Полювання з трогами навчить нас багато чого."
TRN_nf_a018:0 "Прийняти їхню ієрархію"
TRN_nf_a018_desc:0 "У трогів найсильніший – лідер. Наше плем’я може робити так само."
TRN_nf_a019:0 "Полювати вночі"
TRN_nf_a019_desc:0 "Ми не лише полюємо з трогами, а й насолоджуємось результатами полювання."
TRN_nf_a020:0 "Використовувані інструменти"
TRN_nf_a020_desc:0 "Троги – звірі, які стоять між нами та загрозами племені, нічого більше."
TRN_nf_a021:0 "Кращі пастки"
TRN_nf_a021_desc:0 "Ловити трога нескладно, але завжди можна покращити пастки."
TRN_nf_a022:0 "Мир удома"
TRN_nf_a022_desc:0 "Ми переконаємося, що війни не змінять життя в стадіоні."
TRN_nf_a023:0 "Уникати та спостерігати"
TRN_nf_a023_desc:0 "Троги будуть битися на передовій, а наші люди керуватимуть боєм із відстані."
TRN_nf_a024:0 "Зміцнення точок оборони"
TRN_nf_a024_desc:0 "Ми знаємо, що колись рейдери Піта прийдуть за нами. Захист треба готувати заздалегідь."
TRN_nf_a025:0 "Заритися та тримати"
TRN_nf_a025_desc:0 "З-за безпеки наших стін ми спостерігаємо за шляхом війни трогів і знищуємо тих рейдерів, що вбивають забагато."
TRN_nf_a026:0 "Піт б’є"
TRN_nf_a026_desc:0 "Ходять чутки, що Піт захопили інші сили, але вони прийдуть і до нас. Ударимо першими!"
TRN_nf_a027:0 "Вітати рабів"
TRN_nf_a027_desc:0 "Роби Піта постраждали від зла Ашура. Їм нема куди йти, тож приймемо їх до племені."
TRN_nf_a028:0 "Безжальність до здобичі"
TRN_nf_a028_desc:0 "Раби були слабкі, чому ми повинні дозволяти таку слабкість у племені?"
TRN_nf_a029:0 "Збирати трофеї"
TRN_nf_a029_desc:0 "Рейдери мали багато гарної зброї, яку вони так і не встигли використати."
TRN_nf_a030:0 "Броня воїнів"
TRN_nf_a030_desc:0 "З цією бронею навіть найслабший воїн стане сильним!"
TRN_nf_a031:0 "Вступ у Аптаун"
TRN_nf_a031_desc:0 "Рейдерську твердиню в серці Піта скоро захопимо ми."
TRN_nf_a032:0 "Дитина"
TRN_nf_a032_desc:0 "Дитина Ашура тепер сирота. Що з нею буде?"
TRN_nf_a033:0 "Зміцнити наші традиції"
TRN_nf_a033_desc:0 "Ми не повинні забувати, хто ми. Культура і традиції важливі."
TRN_nf_a034:0 "Розширити стіни"
TRN_nf_a034_desc:0 "Наші форпости тепер покриють решту нашої території."
TRN_nf_a035:0 "Спостерігати за мостами"
TRN_nf_a035_desc:0 "Рейдери Піта пішли, але загроза чужинців лишається."
TRN_nf_a036:0 "Кращий бойовий удар"
TRN_nf_a036_desc:0 "Булава добра, але булава з шипами? Ще краще."
TRN_nf_a037:0 "Вивчати їхні способи"
TRN_nf_a037_desc:0 "Розуміючи броню зі стадіону, ми можемо покращити власну."
TRN_nf_a038:0 "Бити воєнні барабани"
TRN_nf_a038_desc:0 "Ми будемо битися, хочемо ми того чи ні. Збираємо воїнів биттям барабанів."
###Tooltips###
TRN_1_tt:0 "Нова група дикунів приєднується до нашого племені"
TRN_2_tt:0 "Нова зграя трогів у розпорядженні нашого племені"
TRN_3_tt:0 "Рейдери, які довели себе, приєднуються до наших воїнів"
TRN_4_tt:0 "Вільні раби формують міліцію"
TRN_5_tt:0 "Нова група воїнів виходить у поле"
TRN_6_tt:0 "Статуя, яку ми оберемо для переміщення, надихне наш народ"
TRN_7_tt:0 "Вільні раби приєднуються до ради"
TRN_8_tt:0 "Ми перемістимо статую містера Роджерса"
TRN_9_tt:0 "Ми перемістимо статую Старґелла"
TRN_10_tt:0 "Ми перемістимо статую Вагнера"

###Traits###
TRN_hope_for_people_trait:0 "Надійний племінник"
TRN_wise_tribal_trait:0 "Мудрий племінник"
TRN_spirit_of_rogers_trait:0 "Дух добросусідства"
TRN_spirit_of_stargell_trait:0 "Сильний удар"
TRN_spirit_of_wagner_trait:0 "Універсальний захисник"
TRN_reformed_raider_trait:0 "Виправлений рейдер"