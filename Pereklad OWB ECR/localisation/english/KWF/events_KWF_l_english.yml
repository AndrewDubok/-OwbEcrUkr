l_english:
  nf_kwf.1.t:0 "A Ship With No Country"
  nf_kwf.1.d:0 "Two centuries ago, this day was like any other aboard the tanker 'Borealis'. The crew went about their daily routines, unaware that the Great War would erupt and then disappear in the blink of an eye. The world dissolved into static. Silence was all that could be heard on every frequency and channel.\n\nThe captain assembled his crew on the weathered deck, and after some debate, they reached a grim consensus: the America they knew was gone. And now, the tanker wandered the dead ocean alone.\n\nDays bled into weeks, weeks into months. Long, long months of nothing. Then, a spark: a faint crackle on the radio speakers. A distress call. The crew tracked the signal to its source: a battered and listing vessel, its crew and passengers clinging to their last hope. The captain's eyes met those of his crew, and after a long silence, he gave the order. The 'Borealis' drew alongside the stranger and the two ships were lashed together. The rescued survivors, hollow-eyed and stunned, joined the endless voyage.\n\nIt was a fateful union, for that ship was..."
  nf_kwf.1.a:0 "...a research ship."
  nf_kwf.1.b:0 "...a cruise liner"
  nf_kwf.1.c:0 "...military craft"

  nf_kwf.2.t:0 "Don't Rock the Boat"
  nf_kwf.2.d:0 "The tanker kept growing, more decks lashed together, more faces aboard our floating home. Among the new arrivals was a strange figure: a ghoul who muttered obsessively about the 'Salt God'.\n\nAt first, the Command Deck laughed it off, treating him like another lunatic. But whispers travel fast. The Cult of the Salt God grew in number quickly, and its prayers could be heard throughout the lower decks. When the cult could no longer be ignored, the captain chose to 'keep the peace' and let them be.\n\nIt was a mistake.\n\nTwenty years ago, famine struck. The cult saw its chance. Led by their prophet, Pallid, the radicals stormed the bridge, killing the captain. It seemed as though the ship belonged to them. However, Christian, a young cook, rallied the loyal crew. In the ensuing bloodshed and chaos, they fought until they reclaimed the captain's cabin, killing Pallid in the process. To avoid more bloodshed, Christian and Delmar, the cult's second-in-command, agreed to share the ship rather than sink it in another battle.\n\nChristian has been in charge ever since, refusing to be called a captain. He is not the loudest voice nor the warmest soul."
  nf_kwf.2.a:0 "But he's our captain."

  nf_kwf.3.t:0 "We'll Never Sail Again"
  nf_kwf.3.d:0 "The cry split the dawn: 'Land!'\n\nAfter spending two centuries adrift, the people of the Borealis rushed to the deck to witness this miracle. From the Command Deck, Christian observed it alongside the crew. 'Get the men ready, Marshall,' he told the head harpooner. 'This won't be a welcome.' Marshall nodded sharply and barked orders to his squads.\n\nChristian lit his pipe and watched the dark smudge of land grow larger.\n'Land...' he muttered.\n\nThe landing was every bit as rough as he had expected. When the Borealis ground to a halt in the shallows, the Harpooners encountered a tribe of savages on the shore. Those who resisted were cut down at Christian's order, while the surviving fighters made their escape to their nearest settlements. The Harpooners went no farther inland.\n\nChristian looked down at the conquered settlement. He didn't care about the cruelty of it. Instead, he thought of the generations born and buried within the ship's steel hull, who had dreamed of a life that didn't sway with the tide. He could smell the unfamiliar scents of damp earth and woodsmoke in the air.\n\nThey had finally found it. This land was their birthright, earned through two hundred years of wandering."
  nf_kwf.3.a:0 "But he's our captain."

  nf_kwf.4.t:0 "The Captain's Choice"
  nf_kwf.4.d:0 "Rustport...\n\nChristian had spent far less time here than aboard the ship during all those years, yet this makeshift office-kitchen, cobbled together from salvaged metal and built with his own hands, had already become more of a home than anywhere else. Before he could delve deeper into his thoughts, a knock sounded at the door. A familiar figure stepped inside.\n\n"Christian."\n"Delmar."\n\nThe cult leader took a seat at the battered table. Something unspoken hung in the air between them, but Christian broke the silence first.\n\n"Everything has changed so much on land. I never thought I would live to see us come ashore and even less that we wouldn't be destroyed by whatever unknown forces waited here." He gestured toward the window. "But I find myself pleasantly surprised."\n\n"As am I, Christian." Delmar's voice carried that familiar warmth, though his eyes held depths Christian couldn't quite read.\n\n"It seems it's time to decide who will lead our people forward."\n\nDelmar simply watched him with that patient, knowing gaze the same look he'd worn during countless ship meetings, countless crises weathered together."
  nf_kwf.4.a:0 ""But everything has already been decided, my friend.""
  nf_kwf.4.b:0 ""I have an idea..""
  nf_kwf.4.c:0 ""Who else but you could lead us?" "

  nf_kwf.5.t:0 "The Royal Game of Ur"
  nf_kwf.5.d:0 "A historian once boarded the Borealis, carrying nothing more remarkable than an ancient board game tucked under his arm. He called it "The Royal Game of Ur," though none could have predicted how profoundly this dusty relic would reshape life aboard our vessel. For a time, the Game of Ur was little more than a curiosity, played by a few enthusiasts. But as stories and rumours spread through the corridors, its popularity grew at a pace that would make the cult of the Salt God envious.\n\nSoon, everyone, young and old, was playing this strange and captivating game. Resourceful crew members fashioned boards from scraps of metal and crafted tokens from discarded trinkets. New versions of the rules emerged, and before long, official competitions were being held in every corner of the ship.\n\nNow, a hundred years later, the Game of Ur remains a cherished tradition among the Knownfolk. It is more than just a pastime: it is a way to resolve disputes, forge friendships, and test one's wits. Our captain, Christian, has become legendary as the undefeated champion, a title he has held for many years."
  nf_kwf.5.a:0 "Our finest hURrah."
 
  nf_kwf.6.t:0 "Kings And Gardeners"
  nf_kwf.6.d:0 ""You know, Christian, I never understood the Cult of the Salt God,' Delmar said, not looking up from the Ur board.\n\nChristian's piece stopped mid-air. "Strange to hear that from you, weren't you that madman's right hand?'\n\nDelmar slid a carved piece into a new position. "Pallid kept his true intentions locked away from everyone. I stood beside him for years and still nothing. He wasn't a believer, only an actor who'd memorized the liturgy.'\n\n"So what was it all for? What was he really after at the bottom of the sea?"\n\n"It no longer matters,' Delmar said, waving a dismissive hand. "Pallid is gone, and his obsessions died with him. I have a new vision for what remains of our...organization.'\n\nChristian leaned forward. "No more tricks, Delmar. I've put one cult leader in the ground. I won't hesitate to do it again.'\n\nDelmar kept his usual warm smile. "Don't worry. My vision is far more... constructive.'\n\n"Imagine a garden. A paradise, built by our own hands...'"
  nf_kwf.6.a:0 ""...right here on land.""