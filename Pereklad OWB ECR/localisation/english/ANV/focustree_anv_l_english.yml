l_english: 
ANV_the_big_dig:0 "Великі розкопки"
ANV_the_big_dig_desc:0 "Перезапуск шахт був лише половиною проблеми. Щось зле поховане глибоко в землі."
ANV_the_infernal_idol:0 "Пекельний ідол"
ANV_the_infernal_idol_desc:0 "Після кількох втрачених життів ідола було знайдено там, де зливаються дві річки. Хоча він менший, ніж уявляв собі Овдій."
ANV_unleash_the_city:0 "Вивільнити місто"
ANV_unleash_the_city_desc:0 "Пітт — регіональний центр сили та післявоєнне диво. Скільки всього це місто могло б зробити для цивілізованих людей, як ми."
ANV_i_put_a_spell_on_you:0 "Ніби зачаровані"
ANV_i_put_a_spell_on_you_desc:0 "Навіть попри раптову зміну влади, повсякденне життя рабів залишається незмінним. Схоже, імперія, яку побудував Ашур, надто цінна, щоб її руйнувати, особливо на цій пустці."
ANV_restart_the_mines:0 "Перезапустити шахти"
ANV_restart_the_mines_desc:0 "Мононгахія — місце, де знаходяться одні з найстаріших шахт Данвіча. А Овдій цінує сентиментальні речі."
ANV_the_cursed_doll:0 "Проклята лялька"
ANV_the_cursed_doll_desc:0 "Один з найцінніших артефактів моєї родини. Одна з небагатьох речей, які в нас залишилися від моєї дорогої двоюрідної бабусі Констанції."
ANV_a_looming_shadow:0 "Нависла тінь"
ANV_a_looming_shadow_desc:0 "Щось темне підіймається з болота, воно переслідує людей, дехто не може спати, а тих, хто може, мучать кошмари."
ANV_call_to_the_thing_from_outer_space:0 "Заклик до штуки з космосу"
ANV_call_to_the_thing_from_outer_space_desc:0 "Овдій каже, що з Книгою в руках, активованим Данвічським обеліском і завершеними Болотяними обелісками — це лише питання часу, коли щось могутнє відповість на наш заклик."
ANV_put_on_a_smile:0 "Продовжувати посміхатися"
ANV_put_on_a_smile_desc:0 "Я тяжко працюю, щоб прогодувати сім'ю, як і всі чоловіки тут. Нелегко жити американською мрією, але, чорт забирай, ми робимо все, що можемо."
ANV_the_best_town_in_america:0 "Найкраще містечко в Америці"
ANV_the_best_town_in_america_desc:0 "Ми щойно обрали нашого нового губернатора, і тепер він обере нову столицю нашої великої нації — Андейл."
ANV_no_new_visitors:0 "Більше немає відвідувачів"
ANV_no_new_visitors_desc:0 "Місцеве населення почало розуміти, що ті, хто приходить до Андейла, часто не повертаються."
ANV_the_strange_meat_merchants:0 "Торговці «дивним м'ясом»"
ANV_the_strange_meat_merchants_desc:0 "Секретний рецепт Вілсонів, який знають усі торговці і який усі на Пустці знають як «тринадцять трав і спецій Вілсонів»."
ANV_establish_a_caravan_company:0 "Заснувати караванну компанію"
ANV_establish_a_caravan_company_desc:0 "Більше караванів почало зупинятися в нас. Можливо, тому що ми швидко зростаюче поселення і маємо приємну вдачу. Або люди здалеку ще не зрозуміли, що в нашому м'ясі."
ANV_welcome_to_andale:0 "Ласкаво просимо до Андейла"
ANV_welcome_to_andale_desc:0 "Що не так? Хіба ви бачите щось погане в тихому маленькому містечку, повному дружніх людей, посеред спустошеної пустки?"
ANV_family_first:0 "Сім'я понад усе"
ANV_family_first_desc:0 "Сім'я понад усе! І будь-хто, хто каже інакше, каже щось неправильне. І ви повинні вдарити того чоловіка. Палкою."
ANV_a_good_source_of_meat:0 "Хороше джерело м'яса"
ANV_a_good_source_of_meat_desc:0 "Деякі караванники починають підозрювати щось через місцеві зникнення. Ми не можемо дозволити їм підібратися надто близько до нашого маленького секрету."
ANV_where_are_the_johnsons:0 "Куди поділися Джонсони?"
ANV_where_are_the_johnsons_desc:0 "Марто, куди поділися Джонсони? Вони все покинули?"
ANV_restore_overlook_drive_in:0 "Відновити автокінотеатр"
ANV_restore_overlook_drive_in_desc:0 "Чому ми найкращі? Тому що ми повернули довоєнний спосіб життя. А в якому поселенні, ви знаєте, є автокінотеатр?"
ANV_the_nuclear_family:0 "Ядерна сім'я"
ANV_the_nuclear_family_desc:0 "Ну, у мене теж є діти! Сім'я понад усе — ось як це працює в Андейлі!"
ANV_white_picket_fences:0 "Білі паркани"
ANV_white_picket_fences_desc:0 "Звісно, ми щаслива сім'я, у нас білий паркан і майорить старий добрий американський прапор. Ми маємо на це повне право."
ANV_lindas_meat_pies:0 "М'ясні пироги Лінди"
ANV_lindas_meat_pies_desc:0 "М'ясні кебаби Лінди гарні, але вони також почали пекти м'ясні пироги. Вони відкрили дві нові крамниці."
ANV_clean_up_andale:0 "Прибрати в Андейлі"
ANV_clean_up_andale_desc:0 "Ми намагаємося підтримувати містечко в чистоті, але важко прибирати після ядерної війни. Але варто спробувати."
ANV_strange_meat_empire:0 "Імперія дивного м'яса"
ANV_strange_meat_empire_desc:0 "Пироги Лінди справді мають успіх. Це показує, що невеликий американський бізнес може процвітати на Пустці."
ANV_the_swamplands:0 "Болотяні землі"
ANV_the_swamplands_desc:0 "Наші сусіди в глибині боліт зазвичай не найприємніші люди. Але не можна засуджувати хлопця за спроби. Цього разу ми принесли партію м'ясних пирогів Лінди."
ANV_restore_pilgrims_landing:0 "Відновити Пілігрімс-Лендінг"
ANV_restore_pilgrims_landing_desc:0 "З Пілігрімс-Лендінґ такий чудовий краєвид, чи не так? І крамниці могли б бути відкриті вздовж усієї вулиці. Уявіть собі можливості."
ANV_the_point_lookout_pier:0 "Пірс Пойнт-Лукаута"
ANV_the_point_lookout_pier_desc:0 "Більшість будівель на пірсі стоять гордо й високо, єдина проблема — їм потрібне призначення."
ANV_haleys_hardware:0 "Господарчий магазин Хейлі"
ANV_haleys_hardware_desc:0 "Хейлі — хороший хлопець, і він полагодив наше спорядження за прийнятну ціну. Така людина нам знадобиться. Звісно, йому не обов'язково знати про НАШ маленький секрет."
ANV_the_great_trash_heap:0 "Велика купа сміття"
ANV_the_great_trash_heap_desc:0 "Сміттєва купа — це радіоактивний безлад на Пойнт-Лукауті, що приваблює найближчих гульів."
ANV_the_house_of_wares:0 "Крамниця товарів"
ANV_the_house_of_wares_desc:0 "Крамниця вже відкрилася на Пілігрімс-Лендінґ. Вона здавалася дружньою, мадам Панада — її ім'я. Тож ми інвестуємо в її крамницю, виростимо її в імперію."
ANV_point_lookout_peoples_bank:0 "Народний банк Пойнт-Лукаута"
ANV_point_lookout_peoples_bank_desc:0 "Старий банк досі стоїть недоторканим на Пілігрімс-Лендінґ. Нам слід знову відкрити цей банк, щоб показати, як далеко просунувся Пойнт-Лукаут."
ANV_the_dark_manor:0 "Темний маєток"
ANV_the_dark_manor_desc:0 "У цьому будинку таяться темні речі, я це відчуваю."
ANV_the_gleaming_manor:0 "Сяючий маєток"
ANV_the_gleaming_manor_desc:0 "На іншому боці Пойнт-Лукаута є маєток-близнюк. Якщо його взагалі можна так назвати. Блекхолл почорнілий, по ньому в'ються дивні ліани, а скручені дерева занурюють його в тінь. Маєток Келверта гордо стоїть на вершині пагорба з видом на океан, дошки все ще пофарбовані в білий навіть через 200 років."
ANV_restore_the_lighthouse:0 "Відновити маяк"
ANV_restore_the_lighthouse_desc:0 "Протягом 200 років лампочка, призначена для заміни перегорілої в маяку, майже досягла своєї мети, але розбилася через Велику війну всього за милю звідси."
ANV_the_great_game:0 "Велика гра"
ANV_the_great_game_desc:0 "Перемикаючи радіостанції, Джек зумів зловити сигнал від професора Келверта."
ANV_the_sacred_bog:0 "Священне болото"
ANV_the_sacred_bog_desc:0 "Місцеве болото явно має якісь неприродні властивості. І забобонний Джек не збирається це перевіряти."
ANV_arc_and_dove_cathedral:0 "Собор Арк і Доув"
ANV_arc_and_dove_cathedral_desc:0 "Настав час вигнати цих брудних племінників із собору або перетворити їх на наступну партію пирогів."
ANV_restore_calvert_mansion:0 "Відновити маєток Келверта"
ANV_restore_calvert_mansion_desc:0 "Хоча маєток Келверта все ще в хорошому стані, деякі речі можна покращити. Наприклад, чому вибухівка під'єднана до всіх стін? Це точно не може бути безпечно."
ANV_the_dark_book:0 "Темна книга"
ANV_the_dark_book_desc:0 "Кривбекні — темна книга, повна заклинань і ритуалів. Самої її присутності достатньо, щоб звести деяких з розуму, а інших змусити робити жахливі речі."
ANV_the_dunwich_horror:0 "Данвічський жах"
ANV_the_dunwich_horror_desc:0 "Під будівлею Данвіча знаходиться артефакт величезної сили. Він розташований трохи на південь від Вежі Тенпенні. Відповідна демонстрація сили має стримати пустковиків від втручання в наші справи."
ANV_constructed_swamp_obelisks:0 "Зведені болотяні обеліски"
ANV_constructed_swamp_obelisks_desc:0 "Глибокої ночі болотяники спорудили обеліски з брухту та кісток по всьому болоту. Серед них бачили Овдій, який спрямовував їхні зусилля."
ANV_andales_growing_militia:0 "Зростаюче ополчення Андейла"
ANV_andales_growing_militia_desc:0 "Дорослі просто пішли на виборчу дільницю й опустили бюлетені в скриньку. А як ви думаєте, це працює? Так, сер, це громадянський обов'язок кожного американця — віддати свій голос за свого улюбленого кандидата-республіканця. Хіба я не правий?"
ANV_the_point_lookout_quarry:0 "Кар'єр Пойнт-Лукаута"
ANV_the_point_lookout_quarry_desc:0 "Овдій каже, що хоче продовжити деякі старі звички компанії Данвіч."
ANV_dig_out_the_dunwich_parking_lot:0 "Розкопати стоянку Данвіча"
ANV_dig_out_the_dunwich_parking_lot_desc:0 "Овдій сподівається відкрити обеліск небу, щоб він міг кликати далі."
ANV_it_compels_us_to_dig:0 "Це змушує нас копати"
ANV_it_compels_us_to_dig_desc:0 "Місто зіпсоване з ґрунту. Я не знаю, як, але це неправильно. Рослини, які ми вирощуємо, з часом поступово втрачають колір. А деякі набули дивного присмаку."
ANV_a_falling_comet:0 "Падаюча комета"
ANV_a_falling_comet_desc:0 "Дивна бліда комета впала глибоко в серце боліт, і дивний сморід витає в повітрі."
ANV_the_decent:0 "Спуск у безумство"
ANV_the_decent_desc:0 "Жителі Андейла все глибше занурюються в безумство. Деякі марять нісенітницею, інші нападають на чужинців. Темні речі відбуваються в тому місці."
ANV_andales_unholy_church:0 "Нечестива церква Андейла"
ANV_andales_unholy_church_desc:0 "Культисти не просто знайшли притулок у старій церкві, вони також перетворили її на операційну базу."
ANV_rituals_for_a_sleeping_god:0 "Ритуали для сплячого бога"
ANV_rituals_for_a_sleeping_god_desc:0 "Принесіть йому багато жертв. Дозвольте нам пробудити його. Почуй наш заклик, Уґ-Квалтоте, і відгукнися."
ANV_a_haunting_in_the_swamp:0 "Привид на болоті"
ANV_a_haunting_in_the_swamp_desc:0 "Божевільні безформні істоти нишпорять болотом. Вони хапають людей уночі та підвішують їх у своєрідний ритуальний спосіб."
ANV_restore_blackhall_manor:0 "Відновити маєток Блекхоллів"
ANV_restore_blackhall_manor_desc:0 "Блекхолл — дім успішної та могутньої родини до Великої війни. І Овдій хотів би повернути йому таку славу. Це було б чудово, чи не згодні?"
ANV_turtle_dove_detention_camp:0 "Табір затримання «Тертл-Дав»"
ANV_turtle_dove_detention_camp_desc:0 "Старий довоєнний табір, призначений для затримання та допитів підозрюваних китайських шпигунів. Звісно, ми завжди можемо використати це на свою користь."
ANV_currupt_calver_manor:0 "Зіпсувати маєток Келверта"
ANV_currupt_calver_manor_desc:0 "Після того, як племена були вигнані з Андейла, а той гуль давно зник, настав час переїхати до маєтку-близнюка."
ANV_the_twin_manors_of_point_lookout:0 "Маєтки-близнюки Пойнт-Лукаута"
ANV_the_twin_manors_of_point_lookout_desc:0 "Обидва маєтки Пойнт-Лукаута міцно під контролем Овдій, його влада відчувається по всьому болоту."
ANV_a_maddening_call:0 "Божевільний заклик"
ANV_a_maddening_call_desc:0 "Щось змушує Овдій та його культистів виступати агресивніше, навіть проти власних мешканців. Це лише питання часу, коли вони знайдуть містечко, на яке можна напасти."
ANV_reclaim_the_obsidian_skull:0 "Повернути обсидіановий череп"
ANV_reclaim_the_obsidian_skull_desc:0 "Апокрифи Посейдона містять стародавній артефакт, загублений на болоті понад 200 років тому. І він кличе."
ANV_old_dunwich_mines:0 "Старі шахти Данвіча"
ANV_old_dunwich_mines_desc:0 "Південна частина Столичної Пустки повна старих шахт. Деякі з цих шахт становили особливий інтерес для компанії Данвіч."
ANV_constances_doll:0 "Лялька Констанції"
ANV_constances_doll_desc:0 "Констанція Блекхолл — початкова лідерка культу. Дехто каже, що її темна сила досі зберігається в цій проклятій ляльці."
ANV_a_cult_following:0 "Послідовники культу"
ANV_a_cult_following_desc:0 "Овдій так близько до розгадки того, що його родина намагалася зробити роками."
ANV_blackhalls_spell:0 "Чари Блекхоллів"
ANV_blackhalls_spell_desc:0 "Родина Блекхоллів відома своєю здатністю створювати культи або заманювати людей."
ANV_blackhall_inner_circle:0 "Внутрішнє коло Блекхоллів"
ANV_blackhall_inner_circle_desc:0 "Спочатку в Констанції було внутрішнє коло найвідданіших культистів, які допомагали, щоб усе працювало гладко, і проводили ритуали, де це було доречно."
ANV_finish_the_obelisk:0 "Завершити обеліск"
ANV_finish_the_obelisk_desc:0 "Маючи все під рукою, Овдій нарешті може почати роботу, щоб пробудити \nУґ-Квалтота."
ANV_the_collapsing_cosmoses:0 "Істоти з глибин"
ANV_the_collapsing_cosmoses_desc:0 "Океан здіймається, істоти підіймаються."
ANV_the_thing_on_the_doorstep:0 "НЕЩО на порозі"
ANV_the_thing_on_the_doorstep_desc:0 "Воно продзвеніло по всій Столичній Пустці, і ті, хто мав слабший розум, відгукнулися, пішовши в ніч."
ANV_the_whispers_in_the_dark:0 "Шепіт у темряві"
ANV_the_whispers_in_the_dark_desc:0 "Овдій чує речі. Воно кличе його вночі з темряви. Воно розповідає йому речі, навчає його."
ANV_the_obsidian_skull:0 "Обсидіановий череп"
ANV_the_obsidian_skull_desc:0 "Череп був втрачений століттями. Після Громадянської війни його забрали в моєї родини та сховали, щоб послабити нашу силу."
ANV_it_stalks_the_shadows:0 "Воно крадеться в тіні"
ANV_it_stalks_the_shadows_desc:0 "У деяких чоловіків виникає дивне відчуття, ніби за ними постійно спостерігають."
ANV_the_moons_gaze:0 "Погляд місяця"
ANV_the_moons_gaze_desc:0 "Місяць змушує всіх нервувати. Дивлячись на Місяць, наші культисти відчувають страх і смертність. Деякі повністю забили вікна дошками, кажучи, що навіть присутність світла не дає їм спати вночі від страху."
ANV_effigies_to_render:0 "Зображення для відтворення"
ANV_effigies_to_render_desc:0 "Наші жерці почали ліпити подобу того, що бачать у своїх снах, що ховається в тінях."
ANV_a_temple_to_build:0 "Храм, який треба збудувати"
ANV_a_temple_to_build_desc:0 "Чогось не вистачає нашому великому богу. Великого Храму для Уґ-Квалтота."
ANV_reap_devotion:0 "Збирати відданість"
ANV_reap_devotion_desc:0 "Вірні Уґ-Квалтоту зроблять усе, щоб служити своєму богу, навіть якщо це означає ризикувати власним життям."
ANV_a_friend_indeed:0 "Справжній друг"
ANV_a_friend_indeed_desc:0 "Ну звісно, ми допомагаємо нашим друзям, це по-сусідськи, найважливіше — це по-християнськи."
ANV_a_town_of_killers:0 "Містечко вбивць"
ANV_a_town_of_killers_desc:0 "У сусідніх поселеннях поширилися чутки. Просто приглушені чутки. Які передаються пошепки караванними п'яницями."
ANV_the_mysterious_firm:0 "Таємнича фірма"
ANV_the_mysterious_firm_desc:0 "Вони звернулися до нас з одноразовою пропозицією: «На цей раз ми надаємо послугу, а ви платите. На цьому ваші запитання закінчуються. Зрозуміло?»"
ANV_contract_killers:0 "Наймані вбивці"
ANV_contract_killers_desc:0 "Генеральний директор Деніел Літлхорн бачить у нас потенціал і перевів деяких своїх найкращих агентів, щоб допомогти нам у наших майбутніх починаннях."
ANV_opening_a_new_office:0 "Відкриття нового офісу"
ANV_opening_a_new_office_desc:0 "Радники Літлхорна облаштували офіс у сусідній будівлі та почали проводити «Операції для вашої вигоди»."
ANV_a_new_contract:0 "Новий контракт"
ANV_a_new_contract_desc:0 "За подальшу допомогу Літлхорна вони хочуть переконатися, що коли прийде час, ми не втручатимемося в їхні справи."
ANV_agents_of_chaos:0 "Агенти хаосу"
NV_agents_of_chaos_desc:0 "Агенти хаосу глибоко вкоренилися в Андейлі, і почали поширюватися чутки про нові злі вчинки в містечку."
ANV_massed_infantry_formations:0 "Прикордонна війна"
ANV_massed_infantry_formations_desc:0 "Як великі поселенці давнини, ми захищатимемо наші домівки з мушкетами в руках."
ANV_a_proper_militia:0 "Справжнє ополчення"
ANV_a_proper_militia_desc:0 "Люди, які нас цькували, насміхалися з нас, стають сильнішими навколо нас, загрожуючи всьому, що ми побудували. Хіба вам байдуже?"
ANV_everything_we_need_is_here:0 "Усе, що нам потрібно, тут"
ANV_everything_we_need_is_here_desc:0 "У Річ Мен є все, що потрібно нації, щоб вирости в могутню силу. Старий фабричний район досі переважно цілий, а музеї не розграбовані після всіх цих років."
ANV_standard_issue_muskets:0 "Мушкети стандартного зразка"
ANV_standard_issue_muskets_desc:0 "Нестача ресурсів, знань про зброю та доступність виробництва роблять крем'яні рушниці ідеальним вибором. Куля калібру .50 звалить практично будь-що з одного пострілу, хоча відбій як у мула."
ANV_american_home_defense:0 "Американська домашня оборона"
ANV_american_home_defense_desc:0 "Ми повинні захищати наші домівки, як американці, що були до нас, — машинами з пилками та вогнеметами, які можуть вбивати без жалю."
ANV_dust_off_old_cannons:0 "Обтрусити пил зі старих гармат"
ANV_dust_off_old_cannons_desc:0 "У цьому районі є п'ять старих фортів. Ми можемо забрати старі гармати часів Громадянської війни та встановити їх для оборони навколо Річ Мен."
ANV_sentry_death_bots:0 "Смертоносні сторожові роботи"
ANV_sentry_death_bots_desc:0 "За допомогою кількох спеціальних модифікацій ми можемо вселити страх у наших ворогів, використовуючи цих спеціальних сторожових роботів."
ANV_robot_repair_center:0 "Центр ремонту роботів"
ANV_robot_repair_center_desc:0 "У Ричмені все ще є кілька центрів ремонту роботів. Більшість самих роботів було знищено, але старі схеми та інструкції все ще лежать замкненими в шухлядах столів і шафах."
ANV_robco_facility:0 "Об'єкт RobCo"
ANV_robco_facility_desc:0 "Дуже добре збережений об'єкт RobCo лежав замкнений за горою уламків з обох боків у самому серці Річ Мен, і лише після розширення для наших людей ми знайшли цей скарб."
ANV_pre_war_way_of_life:0 "Довоєнний спосіб життя"
ANV_pre_war_way_of_life_desc:0 "Від універсальних службових дроїдів до повноцінних бойових машин — роботи могли робити майже все для людей до Війни. Чому б нам не показати людям Столичної Пустки, як далеко ми просунулися?"
ANV_legions_of_the_damned:0 "Захисники нашого дому"
ANV_legions_of_the_damned_desc:0 "Чи то холодні невблаганні роботи, злі невблаганні бізнесмени, чи наші власні люди, ми повинні бути вдячні тим, хто захищає наші домівки."
ANV_a_baptism_of_blood:0 "Хрещення кров'ю"
ANV_a_baptism_of_blood_desc:0 "Деякі з оригінальних мешканців Андейла хочуть влаштувати велике свято, і через великий наплив нових мешканців не всі з них можуть бути згодні з нашим маленьким секретом."
ANV_signs_of_another_war:0 "Ознаки іншої війни"
ANV_signs_of_another_war_desc:0 "Розкопуючи території навколо Пойнт-Лукаута, ми, здається, виявили сліди Громадянської війни, описані в документах, знайдених у Ричмені. Схоже, ми розкопали старі місця поховань, вся шкіра згнила, залишилися тільки їх
