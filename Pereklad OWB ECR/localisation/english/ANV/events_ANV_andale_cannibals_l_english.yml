l_english:
ANV_andale_cannibals.1.t:0 "Божевілля охоплює Вірджинію"
ANV_andale_cannibals.1.d:0 "Немає нічого поганого в тому, щоб принести додому бекон. Насправді, це обов'язок господаря дому. Дехто бурчатиме, звідки береться бекон, казатиме щось на кшталт «о ні, не можна їсти людей» і намагатиметься завадити чоловікові забезпечувати свою сім'ю. Таким людям не було місця в Андейлі, хіба що на обідньому столі. Звісно, через це містечко трохи спорожніло. Так тривало майже 200 років, доки поселення Столичної Пустощі не організувалися й не почали витісняти рейдерів на південь. Деякі з цих рейдерів зрештою стали беконом. Інші розуміли, що не їхня справа судити, і були щасливі зробити Андейл своїм домом. Боячись поселенців на півночі, ці рейдери поглянули на південь. Вони знайшли більше, ніж просто поселення для грабунку. Від Ричмена аж до Пойнт-Лукаута вони знаходили однодумців. Вони знаходили інших, хто розумів, як чоловік кладе їжу на стіл, — це його особиста справа і нікого більше. \n\n Це наштовхнуло Джека Сміта на думку. Якщо поселення на півночі можуть об'єднатися, щоб переслідувати, то вони також можуть об'єднатися, щоб боротися з цим! Червоноокі американці Вірджинії погоджуються, і тепер залишилося лише вирішити, де буде столиця нашої нової нації."
ANV_andale_cannibals.1.a:0 "Андейл, знову"
ANV_andale_cannibals.1.b:0 "Пойнт-Лукаут"
ANV_andale_cannibals.1.c:0 "Річ Мен"
ANV_andale_cannibals.2.t:0 "Що лежить всередині"
ANV_andale_cannibals.2.d:0 "За словами Овдія Блекхолла, маєток належить його родині поколіннями, ще з часів задовго до Великої війни, і є «чудовим зразком вікторіанської архітектури». Він має намір зберегти цю традицію. Він не здається аж надто поганим хлопцем; звісно, у кожного є скелети в шафі. Раптом Овдій посерйознішав і, звісно ж, просить Джека про послугу. «Болотяники, які, до речі, втекли з книгою, дорогоцінною родинною реліквією. Я хотів запитати тебе, друже; ти повернеш її?»"
ANV_andale_cannibals.2.a:0 "Цивільний дискурс; найвеличніше з наших втрачених мистецтв. Чи не так?"
ANV_andale_cannibals.3.t:0 "Сяючий маєток"
ANV_andale_cannibals.3.d:0 "Маєток Келверта у набагато кращому стані, ніж у Блекхолла. Біля вхідних дверей Джека та його людей зустрічає гуль, розмахуючи дробовиком перед обличчям Джека, і два гарчить собак, що гарчать на групу чоловіків, яких він із собою привів. Джек пояснив, що «Андейл — це купка дружніх християн, які розвідували свої землі, і вони хотіли б допомогти з його починаннями». Спочатку той фиркнув і почав був щось казати, але потім зупинився і сказав: «Мені потрібна допомога з Великою Грою, вона триває і триває. Таке... як би це слово ви зрозуміли... мікрокосм? Ага. Це мікрокосм старого світу. І ваша допомога буде оцінена та винагороджена смертю того виродка Келверта»."
ANV_andale_cannibals.3.a:0 "Ми беремо половину наперед"
ANV_andale_cannibals.3.b:0 "Нам, звісно, знадобиться спорядження"
ANV_andale_cannibals.4.t:0 "Зустріч розумів"
ANV_andale_cannibals.4.d:0 "Професор Келверт у своїй промові до когось розкрив своє місцезнаходження — під маяком. Знайшовши спосіб проникнути в дивний довоєнний комплекс унизу, Джек, його люди та Дезмонд пробивалися через довоєнну охорону, щоб дістатися до професора Келверта. Вони були вражені, побачивши, що він — Мозок, що плаває в резервуарі. Він запропонував нам угоду: життя в обмін на збереження довоєнних технологій. Перш ніж професор Келверт встиг сказати більше, Дезмонд вистрілив у скло, розбивши його вщент і вбивши професора. Дезмонд повернувся до Джека і сказав: «Тепер, коли ми позбулися Келверта, я вирушу на північ, щоб переслідувати мого наступного суперника. Нас залишилося лише кілька. Велика гра триває. Ваша плата — все, що тут унизу». І з цими словами Дезмонд покинув маяк. Озирнувшись, Джек побачив, що там було на що подивитися."
ANV_andale_cannibals.4.a:0 "Пограбувати комплекс"
ANV_andale_cannibals.4.b:0 "Переглянути файли Келверта"
ANV_andale_cannibals.4.c:0 "Перетворити комплекс на бункер"
ANV_andale_cannibals.5.t:0 "Повстання з глибин"
ANV_andale_cannibals.5.d:0 "Уздовж узбережжя Вірджинії морські істоти підіймаються з океану. Ці створіння зазвичай вороже ставляться до людей, але до нас вони байдужі. Повільно вони прямують до наших різноманітних ритуальних місць. Кілька мертвих ракоподібних є доказом того, що вони дуже ревно захищають ці місця."
ANV_andale_cannibals.5.a:0 "Навіть ці істоти визнають силу, що наближається."
ANV_andale_cannibals.6.t:0 "Опівнічний ритуал"
ANV_andale_cannibals.6.d:0 "По всій Вірджинії проводилися ритуали, щоб відповідати обрядам, які Овадія виконував зі своїми найближчими послідовниками біля Данвічського обеліска. Тисячі голосів співали в небо під пильним місяцем. \n \n Уґ-Квалтот знає браму. \n \n Уґ-Квалтот є брамою. \n \n Уґ-Квалтот є ключем і вартовим брами! \n \n Потім настали жертвоприношення та дедалі складніші заклинання. Години кривавих жертв, забою полонених і незбагненних піснеспівів тривали до ночі. Незадовго до світанку почалися зміни. Ті, хто співав, відчували, як їхні кістки скручуються, шкіра злазить, а органи ниють, коли вони змінювалися. Світло сонця здавалося тьмянішим, осяваючи Андейл та його людей."
ANV_andale_cannibals.6.a:0 "§0Угоду укладено."
ANV_andale_cannibals.7.t:0 "Вхід до Данвіча"
ANV_andale_cannibals.7.d:0 "Блекхолл каже, що будівля Данвіча необхідна для його планів. Нам пощастило, що люди Столичної Пустощі зазвичай уникають цих руїн, але вони все ще глибоко на їхній території. Як ми потрапимо всередину будівлі?"
ANV_andale_cannibals.7.a:0 "Пробиватися з боєм!"
ANV_andale_cannibals.7.b:0 "Прикинутися торговцями м'ясом"
ANV_andale_cannibals.7.c:0 "Підкупити їхні патрулі"
ANV_andale_cannibals.8.t:0 "Атака з півдня!"
ANV_andale_cannibals.8.d:0 "На нас нещодавно напали канібали-виродки з Андейла поблизу будівлі Данвіча. Ми відступили та організували оборону. Відтоді ми не бачили жодних ознак того, що вони готуються до нового нападу."
ANV_andale_cannibals.8.a:0 "Дивно"
ANV_andale_cannibals.9.t:0 "Голодна руїна"
ANV_andale_cannibals.9.d:0 "Із тих, кого ми відправили до будівлі Данвіча, витримали лише одиниці. Експедиція передавала по радіо повідомлення про дивні звуки, фігури, що бачилися краєм ока, і членів команди, які вночі в трансі блукали руїнами. Після того, як перші кілька зникли, вони схопили Блейка під час його сновидіння. Він впав у лють, вигукуючи про якогось Уґ-Квалтота. Невдовзі потому він прорвав мотузки, що його стримували, і, прокусивши горло Клетусу, побіг глибше в руїни. Команда просить підкріплення або дозволу залишити місце."
ANV_andale_cannibals.9.a:0 "Надіслати їм більше людей"
ANV_andale_cannibals.9.b:0 "Вони можуть пі... я маю на увазі, надіслати більше людей."
ANV_andale_cannibals.10.t:0 "Обеліск"
ANV_andale_cannibals.10.d:0 "Надіслані додаткові люди змогли пробратися глибоко в печери під будівлею Данвіча. Там вони знайшли зниклих членів команди, які молилися навколо темного обеліска. Команді знадобилося кілька миттєвостей, щоб зрозуміти, що це зниклі члени команди, адже всі вони стали гулями. Своїми хрипкими голосами вони скандували те ж ім'я, що й Блейк раніше \n \n §RУґ-Квалтот \n \n Уґ-Квалтот \n \n Уґ-Квалтот"
ANV_andale_cannibals.10.a:0 "Що, в біса, таке Уґ-Квалтот?"
ANV_andale_cannibals.11.t:0 "Могутня реліквія"
ANV_andale_cannibals.11.d:0 "Овадія Блекхолл розповідає нам, що його предок, Констанція Блекхолл, до війни була жінкою великої сили та впливу. Вона була експерткою з окультизму, що дозволило їй прожити надзвичайно довге життя. Лише через кілька років після Великої війни вона втратила один зі своїх наймогутніших артефактів, Кривбекні, і зустріла свій кінець. Він витратив десятиліття на пошуки тієї книги й нещодавно знайшов її з нашою допомогою. Вивчивши її сторінки, він певен, що для його плану нам потрібні ще два артефакти Констанції: її лялька та обсидіановий череп невідомого походження та віку."
ANV_andale_cannibals.11.a:0 "Можливо, ми робимо помилку"
ANV_andale_cannibals.12.t:0 "Ляльку знайдено"
ANV_andale_cannibals.12.d:0 "Ляльку Констанції відстежили до боліт Пойнт-Лукаута. Її зберігають у якомусь святилищі культу болотяників. Судячи з голів на палях, вони навряд чи дозволять нам просто забрати її."
ANV_andale_cannibals.12.a:0 "Вони тепер наші друзі. Спробуймо домовитися."
ANV_andale_cannibals.12.b:0 "Надіслати стільки людей, скільки потрібно, щоб забрати її!"
ANV_andale_cannibals.12.c:0 "Приготувати вогнемети"
ANV_andale_cannibals.13.t:0 "Череп знайдено"
ANV_andale_cannibals.13.d:0 "Обсидіановий череп відстежили до Аппалачських пагорбів на захід від Столичної Пустощі. Він перебуває в руках відлюдькуватого пустковика, який вважає себе колекціонером дивовижних речей. Відлюдько, здається, не горить бажанням розлучатися з ним, але у нас є варіанти."
ANV_andale_cannibals.13.a:0 "Вбити його і забрати"
ANV_andale_cannibals.13.b:0 "Купити, ціна не має значення"
ANV_andale_cannibals.13.c:0 "Колишні контрабандисти пропонують обмін"
ANV_andale_cannibals.14.t:0 "Глибоко в болотах"
ANV_andale_cannibals.14.d:0 "Болотяники Пойнт-Лукаута — відлюдькуваті люди, які не люблять чужинців. Майже на кожного, хто селиться надто близько до їхніх боліт, нападають. Ми ніколи не зможемо знищити їх, не зазнавши надто великих втрат. На краю їхнього болота живе один чоловік, який, здається, дружить з ними. Ми могли б спробувати укласти угоду з його допомогою."
ANV_andale_cannibals.14.a:0 "Запропонувати їм зброю"
ANV_andale_cannibals.14.b:0 "Запропонувати їм м'ясних пирогів"
ANV_andale_cannibals.14.c:0 "Запропонувати їм якісь блискучі дрібнички"