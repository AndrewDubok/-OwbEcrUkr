l_english: 
TAL_nf_a001:0 "Хлопці"
 TAL_nf_a001_desc:0 "Джебско мав сміливу мрію створити найкращу групу найманців у Столичній Пустці. Для цього йому знадобляться справжні виродки."
 TAL_nf_a002:0 "Брудні справи"
 TAL_nf_a002_desc:0 "Не маючи репутації, Компанія «Кіготь» змушена була братися за будь-яку роботу, яку тільки могла знайти."
 TAL_nf_a003:0 "Вхід до Беністера"
 TAL_nf_a003_desc:0 "Новоствореній групі доручили дістати старі голозаписи з Форту Беністер. Опинившись всередині, Джебско зрозумів, що це місце має потенціал."
 TAL_nf_a004:0 "Джебско-Реактивний"
 TAL_nf_a004_desc:0 "Попри його хвастощі, багато хто в Компанії «Кіготь» розуміє, що Джебско зовсім не такий загартований у боях герой, як він стверджує. Проте, з якоїсь причини вони все одно йдуть за ним."
 TAL_nf_a005:0 "Солдат удачі"
 TAL_nf_a005_desc:0 "Джебско підписав найкращу угоду у своєму житті чи свій смертний вирок?"
 TAL_nf_a006:0 "Заначка Джебско"
 TAL_nf_a006_desc:0 "Старому командиру більше не знадобиться його секретна заначка кришок. Ми знайдемо їм застосування."
 TAL_nf_a007:0 "Стандарти зовнішнього вигляду"
 TAL_nf_a007_desc:0 "Дисципліна — це серце професійної армії. Якщо солдат не здатний стежити за власним виглядом, як ми можемо сподіватися, що він стежитиме за спорядженням?"
 TAL_nf_a008:0 "Підлещування до боса"
 TAL_nf_a008_desc:0 "Усім відомо, як Едем ставиться до Компанії «Кіготь». Трохи перебільшити їхні успіхи може бути необхідно, щоб просунутися далі цього завдання."
 TAL_nf_a009:0 "Чиєсь сміття"
 TAL_nf_a009_desc:0 "Анклаву, можливо, і не дуже потрібна стара бойова броня, але для цих людей вона може стати величезним покращенням."
 TAL_nf_a010:0 "Трохи допомоги?"
 TAL_nf_a010_desc:0 "Ці розхлябані найманці ледь піддаються навчанню, а їхні офіцери — це просто ті, хто прожив найдовше. Нам потрібні справжні лідери тут."
 TAL_nf_a011:0 "Відчинення дверей"
 TAL_nf_a011_desc:0 "Війська Анклаву відчинили захищені двері та забрали все, що було всередині. Принаймні тепер у нас стало більше місця."
 TAL_nf_a012:0 "Запасні консервні ножі"
 TAL_nf_a012_desc:0 "Гвинтівки великого калібру можуть здаватися застарілими за стандартами Анклаву, але Компанії «Кіготь» вони знадобляться, якщо ми колись зіткнемося з Братством."
 TAL_nf_a013:0 "Глючні боти"
 TAL_nf_a013_desc:0 "Едем вважав за доцільне прислати нам кілька покинутих протектронів, які вважалися занадто пошкодженими, щоб їх ремонтувати. Ура."
 TAL_nf_a014:0 "Іржаві гвинтівки"
 TAL_nf_a014_desc:0 "Остання партія непотребу з Рейвен-Рок прибула у вигляді іржавих довоєнних гвинтівок. Нам справді пощастило!"
 TAL_nf_a015:0 "Назад до основ"
 TAL_nf_a015_desc:0 "Типовий бойовий план Компанії «Кіготь» — це бігти на ціль, безладно стріляючи навсібіч. Дивно, як вони взагалі виживають після своїх завдань."
 TAL_nf_a016:0 "Покращена підготовка"
 TAL_nf_a016_desc:0 "Найманці напрочуд добре адаптуються до нового режиму тренувань. Ми запросимо ще кілька офіцерів підтримки, щоб справді зрушити справу з місця."
 TAL_nf_a017:0 "Планування наперед"
 TAL_nf_a017_desc:0 "Хоча Братство Сталі й відстає від Анклаву на століття, воно має значну технологічну перевагу над Компанією «Кіготь». Якщо ці найманці мають служити чимось більшим, ніж гарматним м'ясом, їм знадобиться спеціальна тактика."
 TAL_nf_a018:0 "Чесний обмін"
 TAL_nf_a018_desc:0 "У Компанії «Кіготь» є кілька зброярів, але їм бракує знань для виробництва комплектів силової броні чи вертібердів. Ми маємо відправити в Рейвен-Рок надлишки технологій в обмін на те, що ми зможемо використати."
 TAL_nf_a019:0 "Латання дірок"
 TAL_nf_a019_desc:0 "Цілим секціям нашого периметра бракує оборонних споруд. Як ми зможемо відбити напад, якщо ворог може просто прогулятися крізь діру в іржавому паркані?"
 TAL_nf_a020:0 "Містер Фікс"
 TAL_nf_a020_desc:0 "Ми терпіли жахливі умови у Форті Беністер досить довго. Був надісланий запит на інженерів з командування для ремонту життєво важливих систем бункера."
 TAL_nf_a021:0 "Гуркіт на півночі"
 TAL_nf_a021_desc:0 "Ходять чутки про дивні речі, що причаїлися на півночі. Нехай хлопці наглядають за цим."
 TAL_nf_a022:0 "Нічого схожого на Парадайз"
 TAL_nf_a022_desc:0 "Торговці зброєю з Пітта купують свій найкращий товар «робітників» у Парадайз-Фоллз, можливо, ми захочемо долучитися до цієї торгівлі."
 TAL_nf_a023:0 "Пропозиція, від якої ми відмовилися"
 TAL_nf_a023_desc:0 "Ті бовдури з Анклаву справді думали, що зможуть викупити всю чортову компанію? Їм би забракло грошей!"
 TAL_nf_a024:0 "Оптові закупівлі"
 TAL_nf_a024_desc:0 "Вдале завдання принесло нам багато зайвих кришок. Можливо, настав час оновити іграшки для хлопців."
 TAL_nf_a025:0 "Напад на рейдерів"
 TAL_nf_a025_desc:0 "Для різних банд рейдерів настали важкі часи, відколи поселення організувалися. Це гарна можливість для нас."
 TAL_nf_a026:0 "Данина рейдерів"
 TAL_nf_a026_desc:0 "Ми дозволимо рейдерам продовжувати свою діяльність, але їм доведеться платити нам за це задоволення."
 TAL_nf_a027:0 "Панування в работоргівлі"
 TAL_nf_a027_desc:0 "Коли з рейдерами покінчено, ми стаємо найкращим джерелом рабів у Столичній Пустці. Це означає, що ми диктуємо умови!"
 TAL_nf_a028:0 "Королівське підношення"
 TAL_nf_a028_desc:0 "Якась божевільна рейдерша з купою мурах прийшла з останнім караваном данини, заявивши, що хоче працювати на нас, а не на рейдерів."
 TAL_nf_a029:0 "Це місто замале для нас"
 TAL_nf_a029_desc:0 "Анклав володіє найсучаснішою зброєю, яку бачив будь-хто в Столичній Пустці, навіть Братство. І ми могли б забрати все це собі."
 TAL_nf_a030:0 "Слава королю"
 TAL_nf_a030_desc:0 "Заберіть усі технології, які зможете, з Рейвен-Рок. І обов'язково розграбуйте кімнату полковника."
 TAL_nf_a031:0 "Королівський викуп"
 TAL_nf_a031_desc:0 "Підірвіть збройову та захопіть гармати, запустіть вертіберди та одягніть силову броню — тепер ми тут господарі."
 TAL_nf_a032:0 "Вишукані інструменти"
 TAL_nf_a033:0 "Анклав виробляв усе своє спорядження самостійно. Можливо, ми поки не можемо створювати такі ж речі, але ці машини цілком здатні штампувати кулі."
 TAL_nf_a033:0 "Магніти!"
 TAL_nf_a033_desc:0 "Йобані магніти, я не знаю, як вони працюють, але ці гвинтівки можуть пробити діру в броні Анклаву. Купимо кілька ящиків."
 TAL_nf_a034:0 "Консервовані обіди"
 TAL_nf_a034_desc:0 "Анклав просувається через річку, але вони не знають, що переправа знаходиться зовсім поруч із територією мутантів. Ми могли б заманити їх у ті пагорби та спостерігати, як вони б'ються."
 TAL_nf_a035:0 "Операція «Хаос»"
 TAL_nf_a035_desc:0 "Ця війна йде не так добре, як нам хотілося б. Настав час зрівняти шанси. Неподалік від бази Анклаву є стара база, повна роботів. Якщо ми зможемо просунути техніка до їхнього мейнфрейму, ми могли б запустити старі протоколи китайського вторгнення. Вони можуть атакувати й нас, але це наш найкращий шанс."
 TAL_nf_a036:0 "Мисливці на ботів"
 TAL_nf_a036_desc:0 "Коли з ботами покінчено, ми можемо зайти у Форт Костянтин і подивитися, що вони охороняли."
 TAL_nf_b001:0 "Все стало серйозно"
 TAL_nf_b001_desc:0 "Від командування надійшли накази: настав час просуватися в Столичну Пустку."
 TAL_nf_b002:0 "Штурм вежі"
 TAL_nf_b002_desc:0 "Щойно надійшов звіт про бойове зіткнення поблизу Тенпенні-Тауер."
 TAL_nf_b003:0 "Залишки боса"
 TAL_nf_b003_desc:0 "Саморобні гвинтівки та імпровізована вибухівка поселенців Пустки можуть бути нижче за увагу командування, але нам все одно знадобиться кожна куля, яку ми знайдемо."
 TAL_nf_b004:0 "Мега-куш"
 TAL_nf_b004_desc:0 "Захоплення Мегатонни виявилося дуже вигідним."
 TAL_nf_b005:0 "Сяючий маяк"
 TAL_nf_b005_desc:0 "Анклав — це вістря списа, люди. У Пустку приходить майбутнє, і Анклав — це яскравий, сяючий маяк цього майбутнього. Рейдери відірвуться від свого рагу з дитячого м'яса і побачать наше місто, що сяє вдалині. Символ безпеки, миру та порядку. Спочатку — Столична Пустка. Потім — решта Америки."
 TAL_nf_b006:0 "Просування вгору"
 TAL_nf_b006_desc:0 "Компанія «Кіготь» спрацювала краще, ніж передбачали навіть найсміливіші прогнози. Нове керівництво звернуло на це увагу."
 TAL_nf_b007:0 "Елітні співробітники"
 TAL_nf_b007_desc:0 "Кілька офіцерів Компанії «Кіготь» проявили себе як чудові лідери. Настав час їх підвищити!"
 TAL_nf_b008:0 "Бонус за ефективність"
 TAL_nf_b008_desc:0 "Найманці Компанії «Кіготь» насолоджуються заслуженими вигодами за свою мужність і відданість."
 TAL_nf_b009:0 "Трофеї війни"
 TAL_nf_b009_desc:0 "Хоча більшу частину спорядження Братства забрало командування, нам вдалося залишити собі дещо по дрібницях."
 TAL_nf_b010:0 "Нова кров"
 TAL_nf_b010_desc:0 "Пішли чутки, що вступ до Компанії «Кіготь» — це один із найкращих способів служити своїй країні та отримувати за це гроші. Багато мешканців Пустки збігаються, щоб записатися."
 TAL_nf_b011:0 "Пріоритет на лояльність"
 TAL_nf_b011_desc:0 "Ми перевіримо нових рекрутів, щоб переконатися, що вони вступають до нас із любові до своєї країни!"
 TAL_nf_b012:0 "Пріоритет на досвід"
 TAL_nf_b012_desc:0 "Ми перевіримо нових рекрутів, щоб переконатися, що вони знають, що роблять!"
 TAL_nf_b013:0 "Пріоритет на мужність"
 TAL_nf_b013_desc:0 "Ми перевіримо нових рекрутів, щоб переконатися, що у них вистачить духу для бою!"
 TAL_nf_b014:0 "Новий контракт"
 TAL_nf_b014_desc:0 "В Анклаві та Компанії «Кіготь» відбулися великі зміни. У ці нові часи слід обговорити новий контракт."
 TAL_nf_b015:0 "Лиховісне небо"
 TAL_nf_b015_desc:0 "Кілька вертібердів приземлилися під покровом ночі. Це незвично."
 TAL_nf_b016:0 "Вбивці лицарів"
 TAL_nf_b016_desc:0 "Нехай ті, хто вижив, скинуть свою вдосконалену силову броню і одягнуть старе спорядження Братства. Ми поки не можемо дозволити собі викликати підозри."
 TAL_nf_b017:0 "Пошук вцілілих"
 TAL_nf_b017_desc:0 "У хаосі розправи Едема цілком можливо, що ще хтось із людей Оттема вижив."
 TAL_nf_b018:0 "Схопити та забрати"
 TAL_nf_b018_desc:0 "Нам знадобиться кожен комплект броні, який ми зможемо дістати, щоб підготуватися до зустрічі з Едемом."
 TAL_nf_b019:0 "Відчайдушні заходи"
 TAL_nf_b019_desc:0 "У Столичній Пустці все ще є ті, хто бореться проти Анклаву Едема. Ми повинні тихо вийти з ними на зв'язок."
 TAL_nf_b020:0 "Зустріч із Механістом"
 TAL_nf_b020_desc:0 "Дивний мешканець Пустки в робо-броні стверджує, що має план, який може нам допомогти. Виявляється, поблизу Тенпенні-Тауер є старий об'єкт, повний роботів."
 TAL_nf_b021:0 "Розширення нашої оборони"
 TAL_nf_b021_desc:0 "Ні, президенте Едем, ми будуємо ці аванпости, щоб ловити втікачів із території Анклаву. Не хвилюйтеся про це."
 TAL_nf_b022:0 "Підтримка Сіммса"
 TAL_nf_b022_desc:0 "Лукас Сіммс та його регулятори все ще борються проти президента Едема. Хоча ми поки не можемо втрутитися відкрито, ми можемо дати їм інструменти для допомоги."
 TAL_nf_b023:0 "Операція «Бойовий клич»"
 TAL_nf_b023_desc:0 "Настав час. Якщо ми не виступимо проти президента Едема зараз, він уб'є нас так само як і мешканців Пустки, яких він отруює!"
 TAL_nf_b024:0 "Вихід у вищу лігу"
 TAL_nf_b024_desc:0 "Ми отримуємо все кращі й кращі умови за нашими контрактами. Тільки не кажіть про це хлопцям, які виконують роботу."
 TAL_nf_b025:0 "100 скальпів мутантів"
 TAL_nf_b025_desc:0 "Відправляти хлопців полювати на мутантів за нагороди від Братства — хороший спосіб відсіяти слабаків і заробити при цьому грошей!"
 TAL_nf_b026:0 "Більше ніж найманці"
 TAL_nf_b026_desc:0 "Ми переросли звичайну групу найманців. Велика сила приносить велику нагороду!"
 TAL_nf_b027:0 "Захист Столиці"
 TAL_nf_b027_desc:0 "Поселенням точно не завадила б допомога в захисті від Пустки. Подивимося, чи захочуть вони грати за нашими правилами."
 TAL_nf_b028:0 "Найвигідніша пропозиція"
 TAL_nf_b028_desc:0 "У Пустці кажуть, як круті хлопці з Компанії «Кіготь» змусили тих невдах з Анклаву тікати. Тепер усі знають, що ми найкращі, і ми можемо диктувати власні умови."
 TAL_nf_b029:0 "Йти власним шляхом"
 TAL_nf_b029_desc:0 "Ми не дуже-то й хотіли працювати з Піттом! Це їхня втрата!"
 TAL_nf_b030:0 "Копати глибше"
 TAL_nf_b030_desc:0 "Нижні рівні Рейвен-Рок були запечатані вибухами, коли ми ввірвалися всередину. Нічого, що не можна було б виправити за допомогою праці рабів."
 TAL_nf_b031:0 "Викрадення незалежності"
 TAL_nf_b031_desc:0 "Вигнанці Братства були б загрозою, якої стара Компанія «Кіготь» уникала б. Тепер вони — легка здобич."
 TAL_nf_b032:0 "Адамс — що?"
 TAL_nf_b032_desc:0 "Анклав цікавився якоюсь старою військовою базою за затокою. Нам слід розвідати там, якщо ми колись вирушимо в той бік."
 TAL_nf_b033:0 "Що приховано під низом"
 TAL_nf_b033_desc:0 "Вигнанці сиділи на цілій купі спорядження. Хто знайшов, того й речі."
 TAL_nf_b034:0 "Викликати Джо"
 TAL_nf_b034_desc:0 "Джо Слокем — експерт-шукач, якого Братство витіснило з руїн Вашингтона. Кажуть, він шукає роботу."
 TAL_nf_b035:0 "Вбивці Лайона"
 TAL_nf_b035_desc:0 "Братство — це інший великий гравець у Столичній Пустці. Згодом вони почнуть полювання на нас, щоб вкрасти наші технології, якщо ми не вдаримо першими."
 TAL_nf_b036:0 "Магнітні дива"
 TAL_nf_b036_desc:0 "Ті хлопці з магнітними гарматами потрапили в біду на Заході й прямують до нас. Нам слід подумати про те, щоб найняти їх і дізнатися, як вони зробили ті штуки."
 TAL_nf_b037:0 "Наше нове житло"
 TAL_nf_b037_desc:0 "Форт Беністер був непоганим, але він не йде в жодне порівняння з Цитаделлю!"
 TAL_nf_b038:0 "Проблема зеленошкірих"
 TAL_nf_b038_desc:0 "Ці мутанти шкодять бізнесу."
 TAL_nf_b039:0 "Кінець проблеми"
 TAL_nf_b039_desc:0 "Ми знайшли місце, звідки беруться мутанти. Тепер нам просто потрібно зупинити те, що вони роблять для створення нових."
 TAL_nf_b040:0 "Спільники"
 TAL_nf_b040_desc:0 "Ашур знає вигідну угоду, коли бачить її, і він погодився співпрацювати з нами. Це початок чудової партнерства."
 TAL_nf_b041:0 "Імпорт сталі з Пітта"
 TAL_nf_b041_desc:0 "Ашур має більше зливків, ніж він знає куди подіти. Він міг би підкинути кілька й нам."
 TAL_nf_b042:0 "Штурм Незалежності"
 TAL_nf_b042_desc:0 "З Піттом за спиною, чому ми маємо боятися кількох колишніх лицарів?"
 TAL_nf_b043:0 "Просто великий аеропорт?"
 TAL_nf_b043_desc:0 "Якщо Анклав цікавився недоторканим довоєнним об'єктом, там обов'язково має бути щось корисне."
 TAL_nf_b044:0 "Сховок Вигнанців"
 TAL_nf_b044_desc:0 "Арсенали Форту Незалежність містять багато чудових речей, які тепер належать нам."
 TAL_nf_b045:0 "Найняти консультантів"
 TAL_nf_b045_desc:0 "Пішли чутки, що ми працюємо з Піттом, і чимало людей звернулися до нас у пошуках роботи."
 TAL_nf_b046:0 "Е-е... Вони перші почали?"
 TAL_nf_b046_desc:0 "Я знаю, що Ашур більше не в Братстві, але ми не можемо дозволити цій угоді зірватися. Переконайтеся, що наша версія подій бездоганна."
 TAL_nf_b047:0 "Бази даних Вигнанців"
 TAL_nf_b047_desc:0 "Вигнанці намагалися очистити свої диски, коли ми наблизилися. Вони були трохи повільні."
 TAL_nf_b048:0 "Поділитися багатством"
 TAL_nf_b048_desc:0 "З Ашуром приємно працювати. Як знак нашої вдячності йому як партнеру, ми збираємося відправити дещо з того, що знайшли в підвалах Цитаделі."
 TAL_nf_c001:0 "Справжній штаб"
 TAL_nf_c001_desc:0 "Попри всі наші зусилля, Форт Беністер був лише напівзруйнованою руїною з кількома працюючими лампочками. Тепер, коли Анклав контролює Столичну Пустку, припаси течуть рікою."
 TAL_nf_c002:0 "Комплекс Беністер"
 TAL_nf_c002_desc:0 "Ми перетворимо Форт Беністер та прилеглу територію на мережу укріплень. Знадобиться серйозна армія масштабу Анклаву, щоб вибити нас звідси."
 TAL_nf_c003:0 "Злітна смуга Беністера"
 TAL_nf_c003_desc:0 "Навколо Форту Беністер є перспективна земля, яку можна перетворити на аеродром. Командування навіть запропонувало надіслати обладнання для контролю повітряного руху."
 TAL_nf_c004:0 "Жахлива реорганізація"
 TAL_nf_c004_desc:0 "Щоразу, коли великі зміни відбуваються так швидко, потрібні серйозні потрясіння в способі організації речей. Поки все буде змінюватися, виникне багато плутанини та буде зроблено чимало помилок."
 TAL_nf_c005:0 "Нові казарми"
 TAL_nf_c005_desc:0 "Наплив рекрутів змусив Беністер здаватися тісним. На щастя, нам вдалося побудувати нові казарми. Більше ніякого сну у 200-річних гнилих наметах."
 TAL_nf_c006:0 "Боротьба за енергію"
 TAL_nf_c006_desc:0 "Старий примхливий реактор раніше задовольняв потреби Беністера, але тепер нам потрібні серйозні оновлення."
 TAL_nf_c007:0 "Всього кілька пляшок"
 TAL_nf_c007_desc:0 "Із запуском Проєкту «Чистота» ми можемо отримувати додаткові пайки води."
 TAL_nf_c008:0 "Нові навчальні матеріали"
 TAL_nf_c008_desc:0 "Це потребувало зусиль, але командування готове надіслати старі навчальні посібники, щоб допомогти нашим людям наблизитися до стандартів Анклаву."
 TAL_nf_c009:0 "Спеціальні реквізиції"
 TAL_nf_c009_desc:0 "Нам би не завадило спорядження, вироблене в цьому столітті, а не з іржавих деталей велосипедів."
 TAL_nf_c010:0 "Підвищений рівень доступу"
 TAL_nf_c010_desc:0 "Завдяки Майору Компанія «Кіготь» матиме доступ до обмежених архівів Анклаву. Хоча це не означає, що ми зможемо виготовляти вдосконалену силову броню найближчим часом, ми повинні скоро навчитися виробляти штурмові гвинтівки з нуля."
 TAL_nf_c011:0 "Допоміжний персонал"
 TAL_nf_c011_desc:0 "Оскільки потужність Компанії «Кіготь» зростає, Оттем хоче надіслати більше персоналу Анклаву для нагляду за Фортом Беністер. Чи вони тут, щоб допомагати, чи щоб шпигувати — покаже час."
 TAL_nf_c012:0 "Озброєння Компанії «Кіготь»"
 TAL_nf_c012_desc:0 "Купівля зброї у мандрівних торговців або пошуки в довоєнних руїнах просто не підходять. У нас будуть власні виробники зброї, що виготовлятимуть наше спорядження."
 TAL_nf_c013:0 "Розширені майстерні"
 TAL_nf_c013_desc:0 "Щоб задовольнити наші потреби, Майор запросив виробниче обладнання у командування."
 TAL_nf_c014:0 "Розібрати Сховище 87"
 TAL_nf_c014_desc:0 "Коли проблему з мутантами у Сховищі 87 вирішено, старий бункер готовий до того, щоб його розібрали на запчастини."
 TAL_nf_c015:0 "Ледь впізнаваний"
 TAL_nf_c015_desc:0 "Форт Беністер зазнав чимало змін за останні кілька місяців."
 TAL_nf_c016:0 "Юрисдикція Кігтя"
 TAL_nf_c016_desc:0 "У міру відбудови Америки постає питання: що буде з громадянами, які живуть у районах навколо Форту Беністер."
 TAL_nf_c017:0 "ПВК Америки"
 TAL_nf_c017_desc:0 "Компанія «Кіготь» стала чимось набагато більшим, ніж просто банда найманців. Дивлячись у майбутнє, нам потрібно прийняти рішення про те, як ми будемо змінюватися разом із часом."
 TAL_nf_c018:0 "Елітні найманці"
 TAL_nf_c018_desc:0 "Компанія «Кіготь» прагнутиме бути найкращими найманцями, поступаючись лише Анклаву за рівнем підготовки та спорядження."
 TAL_nf_c019:0 "Позбутися зайвого"
 TAL_nf_c019_desc:0 "Прикро це визнавати, але далеко не кожен рекрут підходить для нової Компанії «Кіготь»."
 TAL_nf_c020:0 "Друга найкраща броня"
 TAL_nf_c020_desc:0 "Звісно, Командування не дасть нам комплектів вдосконаленої силової броні, але у них завалялося кілька зайвих T-51b."
 TAL_nf_c021:0 "Навіщо псувати успіх?"
 TAL_nf_c021_desc:0 "Компанія «Кіготь» з деякими незначними змінами показала себе цінним активом для Анклаву. Навіщо нам це міняти?"
 TAL_nf_c022:0 "Вербувальні пункти «Кігтя»"
 TAL_nf_c022_desc:0 "Попри опір Командування, Майор домовився про умови відкриття вербувальних пунктів Компанії «Кіготь» у деяких великих поселеннях Столичної Пустки."
 TAL_nf_c023:0 "Найнижча ціна"
 TAL_nf_c023_desc:0 "Щоб спорядити цю величезну армію найманців, нам доведеться пом'якшити деякі стандарти щодо обладнання, яке ми закуповуємо або виготовляємо."
 TAL_nf_c024:0 "Мобільна розвідка"
 TAL_nf_c024_desc:0 "Компанія «Кіготь» буде на передовій багатьох операцій Анклаву. Ми будемо бити сильно, швидко і зникати до того, як хтось зрозуміє, що ми були поруч. Потім зможе заходити основна армія."
 TAL_nf_c025:0 "Кігті, що злітають"
 TAL_nf_c025_desc:0 "Це не штурмовики, але транспортні вертіберди VB-01 дозволять нам атакувати ворога практично будь-де."
 TAL_nf_c026:0 "Проєкт «ГЕРМЕС»"
 TAL_nf_c026_desc:0 "Заради мобільності ми відмовляємося від силової броні на користь найсучаснішої легкої броні, яку тільки зможемо знайти."
 TAL_nf_c027:0 "Проксі-воїни"
 TAL_nf_c027_desc:0 "Ми знаємо, що існують великі вороги, які створять проблеми в майбутньому. Поки Анклав не зможе зустріти їх на полі бою, ми будемо перешкоджати їхньому зростанню, пропонуючи свої послуги тим, кого вони хочуть підкорити."
 TAL_nf_c028:0 "Готові до всього"
 TAL_nf_c028_desc:0 "Через місяці зростання та перестановок ми перетворили цю банду найманців на елітну бойову силу, готову виконати свою роль у відбудові Америки. Ніщо не встоїть на нашому шляху."
 TAL_nf_c029:0 "Або, можливо, ні..."
 TAL_nf_c029_desc:0 "Головнокомандувач Оттем хоче обговорити щось термінове з Майором. Схоже на погані новини."
 TAL_nf_c030:0 "Повернення додому"
 TAL_nf_c030_desc:0 "Минуло багато років відтоді, як Капітан ступав на поріг Командування Анклаву. Це явно було не те повернення, на яке він сподівався."
 TAL_nf_c031:0 "З поверненням"
 TAL_nf_c031_desc:0 "Солдати, які билися проти нас, просто підкорялися своєму президенту. Ми не можемо звинувачувати їх за це."
 TAL_nf_c032:0 "Доля зрадника"
 TAL_nf_c032_desc:0 "Ці мерзотники допомагали Едему вбивати їхніх бойових побратимів. За це страта — лише милість."
 TAL_nf_c033:0 "Відновлення чистоти"
 TAL_nf_c033_desc:0 "Плани Едема щодо Проєкту «Чистота» були спотворені, і їх потрібно скасувати, якщо це можливо."
 TAL_nf_c034:0 "Наша нова мета"
 TAL_nf_c034_desc:0 "Мрія про відбудову Америки не повинна померти лише тому, що Едем виявився покидьком."
 TAL_nf_c035:0 "Труднощі зростання"
 TAL_nf_c035_desc:0 "Усі збентежені й цікавляться, що принесе майбутнє, включаючи Полковника."
 TAL_nf_c036:0 "Справи поселень"
 TAL_nf_c036_desc:0 "Після повалення Анклаву Едема в Столичній Пустці утворився величезний вакуум влади. Нам потрібно стабілізувати ситуацію, поки хтось інший не втрутився."
 TAL_nf_c037:0 "Консультативна рада"
 TAL_nf_c037_desc:0 "Найманці «Кігтя», лоялісти Оттема та лідери Пустки — у всіх різні ідеї щодо того, як нам діяти. Ми ж не можемо просто посадити їх в одну кімнату і дати їм самим усе вирішити, чи не так?"
 TAL_nf_c038:0 "Огидні мутанти"
 TAL_nf_c038_desc:0 "Ми знаємо, що Сховище 87 є джерелом зараження супермутантами. Їхнє винищення допоможе нашій репутації."
 TAL_nf_c039:0 "Підступні рейдери"
 TAL_nf_c039_desc:0 "Рейдери на півночі та півдні створюють проблеми. Краще розібратися з ними зараз, ніж пізніше."
 TAL_nf_c040:0 "Мерзенні канібали"
 TAL_nf_c040_desc:0 "Рейдери-канібали на південному сході — це проблема, яку ми не можемо ігнорувати. Я точно знаю, що вони задумали щось химерне!"
 TAL_nf_c041:0 "Тернистий шлях"
 TAL_nf_c041_desc:0 "Пагорби на захід від Беністера повні всіляких небезпечних людей, яким ми не можемо дозволити розширюватися безперешкодно."
 TAL_nf_c042:0 "Визволення Пітта"
 TAL_nf_c042_desc:0 "Роками Пітт ввозив рабів з усього регіону. Навіть якщо вони кажуть, що вони більше ніж просто чергова банда рейдерів, ми їх знищимо."
 TAL_nf_c043:0 "Промисловий комплекс Анклаву"
 TAL_nf_c043_desc:0 "Пітт дійсно виправдовує свою назву (Яма). Але навіть у цьому іржавому хаосі смогу та занепаду є проблиск надії."
 TAL_nf_c044:0 "Ми несемо порядок"
 TAL_nf_c044_desc:0 "Незліченні загрози для жителів Пустки були подолані нашою армією. Мало хто може заперечити наше твердження, що ми несемо мир і стабільність."
 TAL_nf_c045:0 "Ми несемо процвітання"
 TAL_nf_c045_desc:0 "Завдяки об'єднаним базам даних Анклаву та Братства, промисловій потужності Пітта та деяким із найсвітліших розумів Пустки, ми спостерігаємо величезне зростання. Хто може заперечити, що ми несемо процвітання?"
 TAL_nf_c046:0 "Як задумував Оттем"
 TAL_nf_c046_desc:0 "Це зайняло багато часу, але ми нарешті змогли очистити Проєкт «Чистота» від модифікованого ВРЕ. Тепер ми можемо розподіляти воду тим, хто її найбільше потребує."
 TAL_nf_c047:0 "Материнська база"
 TAL_nf_c047_desc:0 "Форт Беністер був придатною базою для групи найманців, але як серце нового Анклаву він залишає бажати кращого."
 TAL_nf_c048:0 "Командний центр Цитаделі"
 TAL_nf_c048_desc:0 "Пентагон, або Цитадель, як її називають мешканці Пустки, послужить ідеальним місцем для перенесення нашого командного центру."
 TAL_nf_c049:0 "Архіви Цитаделі"
 TAL_nf_c049_desc:0 "Більшість баз даних та архівів Братства були знищені під час битви за Цитадель та окупації Анклавом. Більшість, але не всі."
 TAL_nf_c050:0 "Спадщина Братства"
 TAL_nf_c050_desc:0 "Братство, можливо, і загинуло під натиском Едема, але ми не можемо заперечувати, що вони допомогли сформувати ту Пустку, яку ми бачимо сьогодні. Коли ми перебираємо їхню стару домівку, важко не думати про людей, які були тут до нас."
 TAL_nf_c051:0 "Розширення Беністера"
 TAL_nf_c051_desc:0 "Форт Беністер, можливо, ще не є придатною базою, але це можна змінити. Ми краще використаємо наші ресурси для покращення цього місця, ніж для переїзду в чергову напівзруйновану руїну."
 TAL_nf_c052:0 "Втрачені бази даних"
 TAL_nf_c052_desc:0 "Під час розчищення нижніх рівнів ми виявили забуті бази даних, які містили цікаву інформацію."
 TAL_nf_c053:0 "Спадщина Джебско"
 TAL_nf_c053_desc:0 "Страшно подумати, що могло б статися, якби Джебско відхилив пропозицію Оттема, і Едем захопив би Пустку без опору. Навіть якщо він був просто жадібним боягузом, Джебско випадково зробив добру справу."
 TAL_nf_c054:0 "Авіабаза Оттема"
 TAL_nf_c054_desc:0 "Авіабаза Адамс мала стати запасним пунктом на випадок падіння Рейвен-Рок. Тепер, коли Рейвен-Рок пав, цілком логічно, що ми використаємо це місце. Хоча йому не завадила б нова назва."
 TAL_nf_c055:0 "Архіви мобільної бази"
 TAL_nf_c055_desc:0 "Мобільний пункт на авіабазі Адамс містила значну кількість важливих даних, які здебільшого були втрачені з часом. Однак те, що ми зможемо відновити, має життєво важливе значення, якщо ми хочемо об'єднати цю націю."
 TAL_nf_c056:0 "Спадщина Оттема"
 TAL_nf_c056_desc:0 "Багато вцілілих співробітників Анклаву все ще сумують за смертю полковника Оттема. Хоча багато мешканців Пустки нічого не знають про цю людину, саме завдяки йому вони зараз не мертві."
 TAL_nf_c057:0 "Розширені лабораторії"
 TAL_nf_c057_desc:0 "Ми зібрали наукове обладнання з усієї Пустки і укомплектували наші нові лабораторії всіма охочими «яйцеголовими», які можуть відрізнити квантовий гармонізатор від камери фотонного резонансу."
 TAL_nf_c058:0 "Тут назавжди"
 TAL_nf_c058_desc:0 "Наша база операцій гуде від активності, і з нашим прапором, що майорить високо, ми посилаємо чіткий сигнал Пустці. Ми — Анклав Кігтя, і ми тут назавжди."
 TAL_nf_c059:0 "Явна та реальна загроза"
 TAL_nf_c059_desc:0 "Мало хто з нижчих чинів знав, наскільки масштабно діяли інші форпости Анклаву. Передача з Чикаго дає нам зрозуміти, що вони десь там, і вони знають, що сталося в Столичній Пустці."
 TAL_nf_d001:0 "Столичний ігровий майданчик"
 TAL_nf_d001_desc:0 "Столична Пустка належить Компанії «Кіготь». Хоча збирати кришки й брати те, що хочемо — це приємно, можливо, трохи більше зусиль принесе кращі винагороди?"
 TAL_nf_d002:0 "Продовжувати потік"
 TAL_nf_d002_desc:0 "Пітт, можливо, і відцурався нас, але це не означає, що ми повинні припинити всі справи. Работоргівля — це великі гроші, і ми в змозі домінувати на ринку."
 TAL_nf_d003:0 "Зупинити работоргівлю"
 TAL_nf_d003_desc:0 "Пітту слід було знати краще, ніж вертіти носом перед Джебско! Ми не відправимо їм жодного раба, і подивимося, як вони впораються без нас!"
 TAL_nf_d004:0 "Контракти на захист"
 TAL_nf_d004_desc:0 "А що якщо... ми будемо брати з поселень плату за захист і потім... захищати їх? Вони не ховатимуть свої кришки під матрац, якщо ми дійсно забезпечимо безпеку, чи не так?"
 TAL_nf_d005:0 "Ширша пустка"
 TAL_nf_d005_desc:0 "Столична Пустка — це діра, і всюди інде так само паршиво. Проте, з тих земель ще можна вичавити кришки."
 TAL_nf_d006:0 "Найміть гірського провідника"
 TAL_nf_d006_desc:0 " На захід від Столичної Пустки лежить майже нескінченний гірський хребет. Без якісного керівництва ми можемо легко заблукати та загрузнути в заплутаній війні з тими, хто там живе."
 TAL_nf_d007:0 "Струсонути гори"
 TAL_nf_d007_desc:0 "Хлопці готові вирушити в гори і показати тим селюкам, хто тут головний."
 TAL_nf_d008:0 "Гора здобичі"
 TAL_nf_d008_desc:0 "Подобається їм це чи ні, але жителі цих пагорбів платитимуть данину Компанії «Кіготь»!"
 TAL_nf_d009:0 "Запасні шкарпетки"
 TAL_nf_d009_desc:0 "Джебско знайшов якусь стару армійську книгу про те, що називається «траншейна стопа». Тепер він забив собі голову тим, щоб ми пакували запасні шкарпетки перед тим, як вирушити в болота. Звісно, витрати вирахують з нашої зарплати!"
 TAL_nf_d010:0 "У саме лайно"
 TAL_nf_d010_desc:0 "Ви коли-небудь замислювалися, чому ми тут?"
 TAL_nf_d011:0 "Пройшли крізь це"
 TAL_nf_d011_desc:0 "Болота Вірджинії, 2281 рік. Я там був, це був відстій."
 TAL_nf_d012:0 "Привіт Гаррісбургу"
 TAL_nf_d012_desc:0 "Бандити в Гаррісбурзі не такі тупі, як звичайні рейдери. Вони можуть просто скласти зброю і приєднатися до лідерів."
 TAL_nf_d013:0 "Нічого крім вил"
 TAL_nf_d013_desc:0 "Центральна Пенсильванія — це лише фермери, що вирощують гостролист, озброєні вилами. Це має бути легко."
 TAL_nf_d014:0 "Аміська майстерність"
 TAL_nf_d014_desc:0 "Кажіть що хочете про амішів, але біс забирай, вони вміють робити гарні стільці. Тепер вони роблять їх для нас на продаж, інакше нашийник на їхній шиї зробить БУМ!"
 TAL_nf_d015:0 "Втрачена можливість"
 TAL_nf_d015_desc:0 "ДО БІСА ПІТТ! ЦІ ВИРОДКИ ДУМАЛИ, ЩО ВОНИ ЗАНАДТО ГАРНІ ДЛЯ НАС! ТЕПЕР МИ ПЕРЕЛАМАЄМО ЇМ ХРЕБТИ ТА ЗМУСИМО СКОРИТИСЯ!"
 TAL_nf_d016:0 "Новий головний"
 TAL_nf_d016_desc:0 "Пітт, може, і смітник, але тепер це наш смітник."
 TAL_nf_d017:0 "Комп'ютери Цитаделі"
 TAL_nf_d017_desc:0 "Один із наших хлопців нарешті зламав ці комп'ютери Братства. Але там ВЕЛИКА проблема!"
 TAL_nf_d018:0 "Моторошні канібали"
 TAL_nf_d018_desc:0 "Ті типи в Ендейлі дивні до жаху. Більшість хлопців, яких ми посилали туди на завдання, так і не повернулися."
 TAL_nf_d019:0 "Звична справа"
 TAL_nf_d019_desc:0 "Мені начхати, якщо вони вас лякають, ідіть туди і надеріть їм дупи!"
 TAL_nf_d020:0 "Вимагати гроші у багатіїв"
 TAL_nf_d020_desc:0 "У Багатія нібито є багато заможних мешканців Пустки, які тепер мають платити нам данину."
 TAL_nf_d021:0 "Тримайтеся подалі від боліт"
 TAL_nf_d021_desc:0 "Болота навколо Пойнт-Лукаут не варті клопоту. Просто тримайтеся від них подалі."
 TAL_nf_d022:0 "Визнати потенціал"
 TAL_nf_d022_desc:0 "Деякі лідери Ендейла прийшли до Джебско з цікавою пропозицією..."
 TAL_nf_d023:0 "Корпус канібалів"
 TAL_nf_d023_desc:0 "Вони можуть бути не такими, як решта наших солдатів, але цей корпус канібалів з Ендейла знає, як підібратися до ворога і змусити його страждати. Вони діють за якимось дивним кодексом різників, що перетворює їх на живих кошмарів без докорів сумління. Джебско просто каже їм «час убивати настав», і вони впадають у криваве безумство, залишаючи лише пошматоване людське м'ясо на поживу паразитам. Кожен, за ким ми їх посилаємо, краще погодиться на спалення, тому вони часто йдуть на поступки, коли на кону стоїть несамовита розправа."
 TAL_nf_d024:0 "Що за Данвіч?"
 TAL_nf_d024_desc:0 "Це якийсь вид сендвіча?"
 TAL_nf_d025:0 "Очищення від культів"
 TAL_nf_d025_desc:0 "Джебско занадто боїться тих дивних виродків в Ендейлі, тому він хоче, щоб ми просто вбили їх усіх."
 TAL_nf_d026:0 "Забрати їхній хлам"
 TAL_nf_d026_desc:0 "Кажіть що хочете про тих типів з Ендейла, але у них були круті ножі. Хоча Джеррі каже, що його ніж продовжує з ним розмовляти..."
 TAL_nf_d027:0 "Спокій на душі"
 TAL_nf_d027_desc:0 "Більше ніяких культів, ніяких проблем."
 TAL_nf_d028:0 "Доброго ранку, Мегатонно!"
 TAL_nf_d028_desc:0 "Ми дозволили мешканцям Пустки жити занадто розкішно, поки самі вирішували всі їхні проблеми. Тепер настав час платити за послуги."
 TAL_nf_d029:0 "Пограбування іржавої посудини"
 TAL_nf_d029_desc:0 "Рівет-Сіті — це як величезний сейф, що чекає, поки ми його зламаємо і заберемо здобич."
 TAL_nf_d030:0 "Господарі становища"
 TAL_nf_d030_desc:0 "Пустка належить нам. Незабаром кожен у цій країні платитиме Компанії «Кіготь» за захист, і ми розбагатіємо!"
 TAL_nf_d031:0 "Візит до Пітта"
 TAL_nf_d031_desc:0 "Час зустрічей представників минув. Якщо це партнерство має тривати, Ашур і Джебско повинні зустрітися віч-на-віч."
 TAL_nf_d032:0 "Аванс зброєю"
 TAL_nf_d032_desc:0 "Ашуру подобається те, що ми зробили до цього часу, і він пропонує нам солідний аванс за наступним контрактом. Партія добірних нових гвинтівок!"
 TAL_nf_d033:0 "Аванс кузнями"
 TAL_nf_d033_desc:0 "Ашуру подобається те, що ми зробили до цього часу, і він пропонує нам солідний аванс за наступним контрактом. Він дозволить нам використовувати деякі зі своїх кузень для чого завгодно!"
 TAL_nf_d034:0 "Годувати машину"
 TAL_nf_d034_desc:0 "Кузні Пітта потребують постійного припливу робітників. Розширюючи нашу територію, ми можемо задовольнити цей попит за гарну винагороду в кришках."
 TAL_nf_d035:0 "Вирішувачі проблем"
 TAL_nf_d035_desc:0 "У Пітта немає дефіциту проблем, що виникають за його стінами. Ось тут ми і з'являємося."
 TAL_nf_d036:0 "Наповнити кузні"
 TAL_nf_d036_desc:0 "Пітт має майже безмежні запаси металобрухту для переплавлення. Але ці ледачі раби можуть зібрати лише обмежену кількість, перш ніж їх схоплять троги. Ми могли б возити брухт із Вашингтона."
 TAL_nf_d037:0 "Прискорити поставки"
 TAL_nf_d037_desc:0 "Каравани з брухтом занадто повільно рухаються старими караванними стежками. Змусьте рабів розрівняти ці дороги."
 TAL_nf_d038:0 "Сміттярі Джо"
 TAL_nf_d038_desc:0 "Джо знає дещо про збирання брухту. Ми доручили йому організувати цих ледачих покидьків у руїнах."
 TAL_nf_d039:0 "Полювання на Гемліна"
 TAL_nf_d039_desc:0 "Поселення Вашингтона переховують цього боягуза Гемліна та його армію втікачів-рабів. Ми не зможемо зупинити Гемліна, поки не розберемося з поселеннями."
 TAL_nf_d040:0 "Розграбувати храм"
 TAL_nf_d040_desc:0 "Армію некерованих рабів затиснули в їхній цитаделі. Потрібен лише останній поштовх."
 TAL_nf_d041:0 "Гарний подарунок"
 TAL_nf_d041_desc:0 "Який подарунок обрати для лорда Пітта? Трофей від поваленої скалки в його оці — хороший знак."
 TAL_nf_d042:0 "Найманці Гаррісбурга"
 TAL_nf_d042_desc:0 "Бандити в Гаррісбурзі були корисними постачальниками для Пітта, навіть якщо вони були дрібними гравцями. Тепер у них проблеми, і Ашур хоче, щоб ми втрутилися."
 TAL_nf_d043:0 "Роздавити наглядачів"
 TAL_nf_d043_desc:0 "Немає сенсу ходити навколо та навколо. Фермери Джонстауна переховують цих дорожніх наглядачів, і нам потрібно на них натиснути."
 TAL_nf_d044:0 "Показове покарання"
 TAL_nf_d044_desc:0 "Наглядачі та ті, хто їх переховує, будуть першими, кого відправлять у Пітт."
 TAL_nf_d045:0 "Заслужений бонус"
 TAL_nf_d045_desc:0 "Брухт тече рікою, а з дрібними прикрощами покінчено. Ми точно заслуговуємо на цей бонус."
 TAL_nf_d046:0 "Взяти віжки"
 TAL_nf_d046_desc:0 "Я не знаю, ким себе уявив цей виродок Вернер, але він пошкодує, що розірвав наш контракт."
 TAL_nf_d047:0 "Ринки, що розвиваються"
 TAL_nf_d047_desc:0 "Справи в Пітті набирають обертів. Через це їм потрібні певні речі, які більшість груп не продадуть їм через їхню репутацію. Ашур хоче, щоб ми зв'язалися з іншими групами."
 TAL_nf_d048:0 "Філадельфійський зв'язок"
 TAL_nf_d048_desc:0 "Сміттяр має репутацію людини, з якою важко працювати. Це маленьке диво, що Джебско зміг укласти з ним угоду."
 TAL_nf_d049:0 "Падіння Герші"
 TAL_nf_d049_desc:0 "У межах нашої домовленості з рейдерами Філадельфії ми допоможемо їм захопити їхню найбільшу ціль останніх років."
 TAL_nf_d050:0 "Експорт Герші"
 TAL_nf_d050_desc:0 "Сміттяр виконує свою частину угоди і навіть виділив нам частку в своєму новому експортному бізнесі як знак вдячності."
 TAL_nf_d051:0 "Справи Довера"
 TAL_nf_d051_desc:0 "Торговці Довера мають зв'язки по всьому східному узбережжю. Якщо хтось і може дістати нам те, що потрібно, то це вони."
 TAL_nf_d052:0 "Розчистити водні шляхи"
 TAL_nf_d052_desc:0 "Бейфішери постійно стають на заваді деяким вантажам. Ми не можемо дозволити цьому тривати."
 TAL_nf_d053:0 "Південний імпорт"
 TAL_nf_d053_desc:0 "Ресурси течуть у Пітт завдяки нашим зв'язкам у Довері. Ми зробили ставку на правильну команду."
 TAL_nf_d054:0 "Банди Нью-Йорка"
 TAL_nf_d054_desc:0 "З півночі доходять історії про об'єднання банд у руїнах Нью-Йорка, які непогано тримають усе під контролем. Ми могли б спробувати поговорити з ними."
 TAL_nf_d055:0 "Сімейні суперечки"
 TAL_nf_d055_desc:0 "Ці банди не такі єдині, як нас запевняли. Це те, що ми можемо використати на свою користь."
 TAL_nf_d056:0 "У нас усе схвачено"
 TAL_nf_d056_desc:0 "Джебско отримав пропозицію, від якої неможливо відмовитися."
 TAL_nf_d057:0 "Трохи привласнення"
 TAL_nf_d057_desc:0 "Завдяки нам Пітт отримує більше, ніж йому потрібно. Кому зашкодить, якщо ми залишимо трохи собі?"
 TAL_nf_d058:0 "Мрія"
 TAL_nf_d058_desc:0 "Пітт має потенціал змінити Пустку. Йому лише потрібен правильний розум для керівництва."
 TAL_nf_d059:0 "Майбутнє за сталлю"
 TAL_nf_d059_desc:0 "Пітт став налагодженим механізмом. Справи йдуть добре і можуть стати тільки кращими."
 