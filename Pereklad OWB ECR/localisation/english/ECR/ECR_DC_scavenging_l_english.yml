    ECR_hubris_discovered_flag:0 "Hubris Comics has been stripped for parts"
    ECR_lob_discovered_flag:0 "LoB Enterprises has been raided. Not by the feds this time"
    ECR_dolces_discovered_flag:0 "Mama Dolces has been shut down"
    ECR_oasis_discovered_flag:0 "Oasis has been discovered!"
    ECR_vault_92_discovered_flag:0 "Vault 92 has been looted!"
    ECR_national_guard_depot_discovered_flag:0 "The National Guard Depot has been scavenged"
    ECR_vault_108_discovered_flag:0 "Vault 108 has been opened"
    ECR_hamiltons_discovered_flag:0 "Hamiltons Hideaway has been discovered"
