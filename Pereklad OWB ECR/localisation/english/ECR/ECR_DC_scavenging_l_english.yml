    ###Decisions###
    ECR_DC_exploring_decision_category:0 "Capital Wasteland Exploration"
    ECR_DC_exploring_decision_category_desc:0 "The Capital Wasteland is full of untouched secrets, forbidden ruins and unknown horrors. We will send some brave souls into this unknown frontier and see what they can turn up."
    ECR_explore_megaton_area_decision:0 "Explore the Central Wasteland"
    ECR_explore_megaton_area_decision_desc:0 "The area around Megaton and Big Town may have lot of traffic, but that doesn't mean there are not a few things hidden in the caves around those hills."
    ECR_explore_the_mall_decision:0 "Explore DC Proper"
    ECR_explore_the_mall_decision_desc:0 "The DC ruins are likely some of the most dangerous ruins in the world, but that just means most of the good stuff probably lasted untouched for these last 200 years."
    ECR_explore_south_dc_decision:0 "Explore Arlington"
    ECR_explore_south_dc_decision_desc:0 "The ruins of Arlington which bleed into DC to the point that it is often referred to as just "south DC" are just as ripe for exploration as DC proper."
    ECR_explore_tenpenny_tower_decision:0 "Explore the South-Central Wasteland"
    ECR_explore_tenpenny_tower_decision_desc:0 "Beyond that old robot factory and the tower itself, there isn't much worth seeing in the area around Tenpenny Tower, or is there?"
    ECR_explore_arefu_decision:0 "Explore the North-Central Wasteland"
    ECR_explore_arefu_decision_desc:0 "The area between Fort Constantine and Old Olney is full of danger. Between the raiders, super mutants and wild animals there is a lot that can go wrong for an explorer. Nothing ventured, nothing gained."
    ECR_explore_republic_of_dave_decision:0 "Explore the North-Eastern Wasteland"
    ECR_explore_republic_of_dave_decision_desc:0 "The north-eastern part of The Capital Wasteland is called the ass-end of nowhere for a reason. But since nobody ever goes there, maybe there are some stones still left unturned."
    ECR_explore_canterbury_commons_decision:0 "Explore the South-Eastern Wasteland"
    ECR_explore_canterbury_commons_decision_desc:0 "Just north of the DC ruins, the South-Eastern Capital Wasteland probably has a lot that we have not discovered."
    ECR_explore_evergreen_mills_decision:0 "Explore Raider Country"
    ECR_explore_evergreen_mills_decision_desc:0 "The areas formerly occupied by raiders likely never saw any real exploration. There could be more than a few interesting things to discover."
    ECR_explore_codes_decision:0 "Search for Keller Family Tapes"
    ECR_explore_codes_decision_desc:0 "To get inside The National Guard Depot bunker we will need a series of numbers that were given to members of a long-dead family. If we are lucky, they would have recorded their numbers like the person on the tape we have did."
    
    ###Decision Events###
    ECR_explore_decision_events.1.title:0 "Contact Lost"
    ECR_explore_decision_events.1.desc:0 "Our exploration team never reported back from their venture. The dangers of the wasteland have claimed more unfortunate souls."
    ECR_explore_decision_events.1.a:0 "Such is life in the wastes"
    ECR_explore_decision_events.2.title:0 "Raider Ambush"
    ECR_explore_decision_events.2.desc:0 "A band of raiders ambushed our exploration team and they took losses, but they fended off the raiders and made it back alive."
    ECR_explore_decision_events.2.a:0 "Raiders in our territory?"
    ECR_explore_decision_events.3.title:0 "Mutants Attack!"
    ECR_explore_decision_events.3.desc:0 "Our exploration team was unfortunate enough to stumble across a pack of mutated animals. They had to flee and not everyone made it back."
    ECR_explore_decision_events.3.a:0 "We need some pest control"
    ECR_explore_decision_events.4.title:0 "Old Traps"
    ECR_explore_decision_events.4.desc:0 "The exploration team accidentally triggered an ancient trap that killed several of them. The survivors made it back without incident."
    ECR_explore_decision_events.4.a:0 "Curious is the trapmakers art"
    ECR_explore_decision_events.5.title:0 "We Found Nothing"
    ECR_explore_decision_events.5.desc:0 "Despite their best efforts, the explorers didn't discover anything of note in their expedition. Just the usual ruined buildings and rusted vehicles."
    ECR_explore_decision_events.5.a:0 "At least nobody died"
    ECR_explore_decision_events.6.title:0 "Slavers Grabbed Them!"
    ECR_explore_decision_events.6.desc:0 "Only one survivor came back from our exploration team, he says slavers grabbed the rest of the team in the night while he was relieving himself in a nearby bush."
    ECR_explore_decision_events.6.a:0 "Those poor souls"
    ECR_explore_decision_events.6.b:0 "Buy their freedom!"
    ECR_explore_decision_events.6.c:0 "There are still slavers around?"
    ECR_explore_decision_events.7.title:0 "Super Mutant Ambush!"
    ECR_explore_decision_events.7.desc:0 "A pair of survivors from our exploration team report that they were the only survivors. The others were killed or carted off following an ambush by super mutants."
    ECR_explore_decision_events.7.a:0 "A shame"
    ECR_explore_decision_events.7.b:0 "When will the mutants die off?"
    ECR_explore_decision_events.8.title:0 "Vault Tec HQ"
    ECR_explore_decision_events.8.desc:0 "Our exploration team has radioed in that they found the location of the Vault-Tec headquarters. They had to battle past waves of robotic security but made it through alive and are accessing the building's mainframe. The data is corrupted and probably won't be very usable. They also found the location of a cache of Vault-Tec Power Armor, whatever that is."
    ECR_explore_decision_events.8.a:0 "Sounds useful"
    ECR_explore_decision_events.9.title:0 "Takoma Industrial Park"
    ECR_explore_decision_events.9.desc:0 "The exploration team reported back the location of a massive industrial complex largely untouched by the bombs. By their inventory of the building's contents, it could give us a massive boost to our industrial capacity"
    ECR_explore_decision_events.9.a:0 "Well done"
    ECR_explore_decision_events.10.title:0 "Hubris Comics"
    ECR_explore_decision_events.10.desc:0 "The explorers stumbled across the old Hubris Comics building. There wasn't much to find beyond some machinery that could be stripped for parts."
    ECR_explore_decision_events.10.a:0 "More salvage is always good"
    ECR_explore_decision_events.11.title:0 "L.O.B. Enterprises"
    ECR_explore_decision_events.11.desc:0 "Our explorers have found the ruins of a pre-war weapons design company called L.O.B Enterprises. They had to fight their way past military robots because apparently this company was invaded by the Government shortly before the great war. Despite casualties, the haul seems to be worth it. There was a cache of pre-war weaponry as well as some cutting-edge schematics."
    ECR_explore_decision_events.11.a:0 "We will put them to good use"
    ECR_explore_decision_events.12.title:0 "Moma Dolces"
    ECR_explore_decision_events.12.desc:0 "The explorer team became engaged in a prolonged firefight with Communist Chinese Ghouls at the Moma Dolces factory in Arlington. After a few hours it became clear they had dozens of soldiers inside and the team retreated without pursuit."
    ECR_explore_decision_events.12.a:0 "Leave them alone."
    ECR_explore_decision_events.12.b:0 "Return with an assault force."
    ECR_explore_decision_events.12.c:0 "Commies AND Ghouls? BURN THEM ALL"
    ECR_explore_decision_events.13.title:0 "Oasis"
    ECR_explore_decision_events.13.desc:0 "Our explorers have seen some strange things in the wasteland, but their most recent find may beat it all. They found living trees. No, not just live trees but a living talking tree person too. The tree calls himself Harold and apparently was a ghoul from out west that had a tree grow around him that he calls Bob. Harold is now the source of a lush forest that is protected by a cult revering him as a god. That last bit makes things a tad difficult. Harold wants to die, and he wants us to help him. He insists his cultists will understand if he can talk to them before the deed is done, but his people have other ideas. One of the cultists wants us to apply some type of sap to stop Harold's growth but keep him alive, while another wants us to apply some kind of liniment to accelerate the growth."
    ECR_explore_decision_events.13.a:0 "We will honor his wishes"
    ECR_explore_decision_events.13.b:0 "Side with Birch to stop Harold's growth"
    ECR_explore_decision_events.13.c:0 "Side with Laurel to accelerate Harold's growth"
    ECR_explore_decision_events.13.d:0 "Kill it with fire!"
    ECR_explore_decision_events.14.title:0 "Vault 92"
    ECR_explore_decision_events.14.desc:0 "Our team found and old vault not far from Old Olney. As with many Vaults, it was some kind of twisted experiment that ended with everyone dying. The vault sits as a crumbling ruin full of all kinds of mutated animals, but we can pull some salvage from it."
    ECR_explore_decision_events.14.a:0 "We can always use more scrap"
    ECR_explore_decision_events.15.title:0 "The National Guard Depot"
    ECR_explore_decision_events.15.desc:0 "After fighting past countless robots and turrets, our exploration team made their way to the heart of The National Guard Depot, the armory. Inside they found a substantial stash of weapons and equipment. They also found a heavy door to a bunker that will only open with a specific numbered code. We were lucky that one of the explorers had found a holotape with such a code in an earlier expedition. Now we just need to find 4 more."
    ECR_explore_decision_events.15.a:0 "A fetch quest it is."
    ECR_explore_decision_events.15.b:0 "Bypass this nonsense"
    ECR_explore_decision_events.16.title:0 "Vault 108"
    ECR_explore_decision_events.16.desc:0 "Our scouts found a Vault out in the wastes and it looks like they are able to just walk in. Who knows what they will find."
    ECR_explore_decision_events.16.a:0 "Hopefully not another horrible Vault-Tec experiment gone wrong"
    ECR_explore_decision_events.17.title:0 "Gary"
    ECR_explore_decision_events.17.desc:0 "We should have known that like almost every other Vault in the wastes, Vault 108 was a twisted horror show. The vault was apparently experimenting with human cloning and made multiple clones of some guy named Gary. Now the vault is full of Gary clones that can only say their name and attack anyone they meet. Our team cleared through them, but it wasn't easy."
    ECR_explore_decision_events.17.a:0 "What the hell"
    ECR_explore_decision_events.18.title:0 "Hamilton's Hideaway"
    ECR_explore_decision_events.18.desc:0 "Our team found a cache of weapons tucked inside an old sewer system. They had to fight past a nest of radscorpions and some raiders to get it, but the haul is worth the effort."
    ECR_explore_decision_events.18.a:0 "Always need more guns"
    ECR_explore_decision_events.19.title:0 "Vault 106"
    ECR_explore_decision_events.19.desc:0 "Just like every other Vault we seem to find out about, Vault 106 was a messed up experiment. This time the Vault was testing some kind of hallucinogenic gas that messes with the heads of anyone that inhales it. Our team quickly pulled out and we are making sure people stay clear of the place."
    ECR_explore_decision_events.19.a:0 "Is it at least a good high?"
    ECR_explore_decision_events.19.b:0 "Maybe there is a way to use this"
    ECR_explore_decision_events.20.title:0 "Rockopolis"
    ECR_explore_decision_events.20.desc:0 "The lost post-war settlement of Rockopolis was considered just a legend by many, but our team has discovered what is left of the isolationist refuge. It looks like the settlement was enslaved and destroyed with not much of value left behind."
    ECR_explore_decision_events.20.a:0 "All because Dashwood is a simp"
    ECR_explore_decision_events.20.b:0 "Damn shame"
    ECR_explore_decision_events.21.title:0 "Vault 112"
    ECR_explore_decision_events.21.desc:0 "Our exploration team took longer than usual to report in, and that's because they discovered a functioning vault with a strange twist. The inhabitants of the Vault are trapped in some kind of stasis pods that keep them hooked up to a digital world. According to data pulled from the databanks, he Overseer of this Vault is a prewar scientist named Stanislaus Braun who has been tormenting the Vault dwellers over the last 200 years. Our team was close to shutting down life support for the victims when they got a message from the Doctor inside. He was aware of what they were doing and offered anything to keep from being trapped in the simulation alone. Our explorers still really want to go through with their plan to save the inhabitants from eternal torment, but the Doctor has promised to lend his knowledge to our cause if we leave him with his toys."
    ECR_explore_decision_events.21.a:0 "Pull the plug"
    ECR_explore_decision_events.21.b:0 "A pre-war mind is a terrible thing to waste"
    ECR_explore_decision_events.22.title:0 "Keller tape found!"
    ECR_explore_decision_events.22.desc:0 "We found another of the Keller family holotapes. Soon we will be able to open the National Guard Bunker."
    ECR_explore_decision_events.22.a:0 "Good"
    ECR_explore_decision_events.23.title:0 "The National Guard Bunker"
    ECR_explore_decision_events.23.desc:0 "The National Guard Bunker has finally been opened, and inside we found a cache of special equipment. Power armor, weapons and even some mini-nukes will all be placed in the hands of our military."
    ECR_explore_decision_events.23.a:0 "What's this MIRV thing?"
    ECR_explore_decision_events.24.title:0 "The last tape"
    ECR_explore_decision_events.24.desc:0 "We finally found all the Keller family tapes. With these in hand we should be able to open the national guard bunker"
    ECR_explore_decision_events.24.a:0 "Lets do that then"

    
